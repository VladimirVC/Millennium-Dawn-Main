l_japanese:
 BNL_dynmod_union: "Benelux Union"
 BNL_benelux_union_treaty: "Treaty of the Benelux Union"
 BNL_benelux_union_treaty_desc: "Signed in The Hague in 2008, the new treaty replaces the expiring 1958 accord and renames our cooperation the Benelux Union. It carries the common market forward and widens our joint work into justice, security and sustainable development, giving the three states a single modern framework to build on."
 BNL_single_market: "Benelux Internal Market"
 BNL_single_market_desc: "The Benelux goes further than the wider European market, stripping away the administrative barriers that still divide the three economies. Long a laboratory for European integration, the union pilots the common standards and mutual recognition that let firms trade and operate as if the borders were not there."
 BNL_capital_integration: "Capital Market Integration"
 BNL_capital_integration_desc: "Amsterdam's exchange, Brussels' banks and Luxembourg's vast investment-fund industry already form one of Europe's deepest pools of capital. Aligning financial supervision and cross-border rules lets that capital flow freely to the most productive firms across the union."
 BNL_port_cooperation: "Rotterdam and Antwerp"
 BNL_port_cooperation_desc: "Rotterdam and Antwerp are the two largest ports in Europe. Coordinating the Antwerp-Rotterdam-Amsterdam cluster instead of competing for the same cargo turns Benelux logistics into a single world-class gateway."
 BNL_freight_corridors: "Freight Corridors"
 BNL_freight_corridors_desc: "Dedicated rail links such as the Betuweroute and the Iron Rhine connect the seaports to the European hinterland. Joint investment in these corridors strengthens the industrial backbone of the union."
 BNL_north_sea_wind: "North Sea Wind"
 BNL_north_sea_wind_desc: "Under the North Seas Energy Cooperation the Benelux jointly develops offshore wind. Pooling grid connections turns the North Sea into a shared renewable power source."
 BNL_gas_hub: "Benelux Gas Hub"
 BNL_gas_hub_desc: "The Groningen field and the LNG terminal at Zeebrugge make the Benelux a gas trading hub. Coordinating supply through the Pentalateral Energy Forum secures the union's energy."
 BNL_research_cooperation: "Top Technology Region"
 BNL_research_cooperation_desc: "Eindhoven and Leuven, reaching toward Aachen, form the Top Technology Region, one of the densest concentrations of high-tech research in Europe. By pooling laboratories, funding and talent across this cross-border triangle, the Benelux can out-innovate rivals many times its size."
 BNL_university_network: "University Network"
 BNL_university_network_desc: "Delft, Leuven, Eindhoven and Wageningen anchor a dense academic network. Linking their programmes and degrees creates a shared pool of talent and knowledge."
 BNL_hightech_triangle: "High-Tech Triangle"
 BNL_hightech_triangle_desc: "Brainport Eindhoven, home to ASML and NXP, and imec in Leuven form the heart of European semiconductor research. Joint backing of this cluster keeps the Benelux at the frontier of high technology."
 BNL_space_cooperation: "Space Cooperation"
 BNL_space_cooperation_desc: "The European Space Agency's technical heart, ESTEC, sits at Noordwijk. Coordinating Benelux contributions to European space efforts builds advanced engineering capacity."
 BNL_nuclear_research: "Nuclear Research"
 BNL_nuclear_research_desc: "Petten in the Netherlands and the SCK CEN at Mol in Belgium, with its MYRRHA reactor project, lead European research into reactors and medical isotopes. A joint programme advances the union's nuclear science."
 BNL_innovation_area: "Benelux Innovation Area"
 BNL_innovation_area_desc: "Binding the research network, the high-tech cluster and the nuclear and space programmes into a single innovation area makes the Benelux one of the most research-intensive regions on earth."
 BNL_benelux_parliament: "Benelux Parliament"
 BNL_benelux_parliament_desc: "A 2015 treaty replaces the old Consultative Council of 1955 with the Benelux Interparliamentary Assembly, giving the union a parliamentary forum drawn from the three national legislatures. Strengthening it lays the groundwork for deeper political integration between the three states."
 BNL_benelux_court: "Benelux Court of Justice"
 BNL_benelux_court_desc: "A 2012 protocol modernises the Benelux Court of Justice, widening its remit from the common market into new fields such as intellectual property. The shared court harmonises law across the three jurisdictions and gives the union a common legal order."
 BNL_shared_foreign_policy: "Common Foreign Policy"
 BNL_shared_foreign_policy_desc: "Following a tradition as old as the union itself, the three governments concert their positions before every European Council and NATO summit. Speaking with one voice, the Benelux carries weight in Brussels far beyond the size of its members."
 BNL_political_union: "Political Union"
 BNL_political_union_desc: "With a shared parliament, a common court and a single foreign policy now in place, the three governments move beyond mere cooperation, binding their political institutions into one union in all but name."
 BNL_treaty_of_union: "Treaty of Union"
 BNL_treaty_of_union_desc: "Decades of common institutions culminate here. With the three peoples deeply integrated, the leading government puts the question of a single Benelux state to its partners. Only with their consent can separate sovereignty give way to one nation."
 BNL_treaty_of_union_tt: "Opens the path to a unified Benelux state"
 BNL_treaty_of_union_accept_tt: "They become our subject, allowing the Benelux to be formed through the formable nation decisions"
 BNL_integration_requirement_tt: "Benelux integration is above 100"
 BNL_integration: "Benelux Integration"
 BNL_integration_tt: "£GFX_benelux_icon $BNL_integration$: $RIGHT|+=1$"
 BNL_integration_tooltip: "$BNL_integration$: [?BNL_integration]"
 BNL_benelux_defence: "Benelux Defence Declaration"
 BNL_benelux_defence_desc: "The 2012 Benelux Declaration committed Belgium, the Netherlands and Luxembourg to pool their defence efforts, share costs and increase joint military output. It is the framework under which the three armed forces deepen their cooperation."
 BNL_mio_sharing_tt: "Belgium, the Netherlands and Luxembourg gain access to each other's Military-Industrial Organizations."
 BNL_benelux_air_policing: "Benelux Air Policing"
 BNL_benelux_air_policing_desc: "Since 2017 Belgium and the Netherlands take turns guarding the airspace of all three countries under a single Quick Reaction Alert, with the right to intercept across each other's borders."
 BNL_air_defence_command: "Air Command and Control Centre"
 BNL_air_defence_command_desc: "A shared air command and control centre integrates the radar picture and ground-based air defences of the three nations into one coordinated system."
 BNL_binational_air_command: "Binational Air Command"
 BNL_binational_air_command_desc: "Merging the operational air commands lets the Benelux air forces plan and fly their missions as a single organisation, sharing bases, controllers and procedures."
 BNL_mrtt_fleet: "Multinational MRTT Fleet"
 BNL_mrtt_fleet_desc: "The pooled fleet of Airbus A330 Multi Role Tanker Transports, based at Eindhoven and shared between the Benelux partners and other European states, provides air-to-air refuelling and strategic airlift to every member."
 BNL_eatc: "European Air Transport Command"
 BNL_eatc_desc: "Headquartered at Eindhoven, the European Air Transport Command pools the military transport, refuelling and aeromedical aircraft of its members under one command."
 BNL_belux_a400m: "BELUX A400M Unit"
 BNL_belux_a400m_desc: "Belgium and Luxembourg pool their A400M Atlas transports into a single binational unit at Melsbroek, sharing crews, maintenance and a common training centre. Luxembourg's lone aircraft flies in Belgian colours, the two nations splitting the cost and flight hours of one fleet."
 BNL_f35_cooperation: "Joint F-35 Sustainment"
 BNL_f35_cooperation_desc: "Belgium and the Netherlands coordinate the training and maintenance of their F-35 fleets, sharing facilities and expertise across the two air forces."
 BNL_benesam: "BENESAM Naval Accord"
 BNL_benesam_desc: "Belgium and the Netherlands run their two navies as one, sharing training, logistics and maintenance while each keeps command of its own deployments. Deepening this long-standing accord makes the combined fleet far greater than the sum of its parts."
 BNL_admiral_benelux: "Admiral Benelux"
 BNL_admiral_benelux_desc: "A single binational naval staff at Den Helder commands the operations of the Belgian and Dutch fleets, with the two navy commanders sharing the joint headquarters."
 BNL_vlissingen_class: "Vlissingen-class Mine-hunters"
 BNL_vlissingen_class_desc: "The joint Belgian-Dutch Replacement Mine Counter Measures programme, a twelve-ship effort to retire the ageing Tripartite Alkmaar-class hunters. Built by Naval Group, these stand-off mother ships hunt mines from a safe distance with autonomous surface and underwater drones. The Netherlands fields its six vessels as the Vlissingen-class, alongside Belgium's own ships of the same design."
 BNL_hollandklasse_frigate: "Hollandklasse Frigate Development"
 BNL_hollandklasse_frigate_desc: "The Netherlands lays down new Hollandklasse frigates to renew its maritime patrol and anti-submarine fleet. Fitted with modern sensors, missile systems and a low-observable hull, they protect Dutch waters and support operations overseas."
 BNL_aswf_frigate: "Anti-Submarine Warfare Frigate"
 BNL_aswf_frigate_desc: "Belgium and the Netherlands jointly replace their M-class frigates with a new anti-submarine warfare design, sharing development, radar and combat systems."
 BNL_para_school: "Benelux Paratrooper School"
 BNL_para_school_desc: "The Benelux paratrooper schools are consolidated into a single training centre at Schaffen, qualifying the airborne troops of all three nations to a common standard."
 BNL_csomtg: "Combined Special Operations Task Group"
 BNL_csomtg_desc: "Belgium and the Netherlands stand up a combined special operations maritime task group, ready to deploy together on land and at sea for rapid NATO missions."
 benelux.1.t: "A Benelux Treaty of Union"
 benelux.1.d: "[FROM.GetName] proposes that we set aside our separate sovereignty and join a single Benelux state. Decades of shared institutions have prepared the ground, but surrendering nationhood is no small step."
 benelux.1.a: "We will join the union"
 benelux.1.b: "We remain our own nation"
 benelux.2.t: "Our Partner Accepts the Union"
 benelux.2.d: "[FROM.GetName] has agreed to join a unified Benelux. With our partner now bound to us, we can complete the formation of the union."
 benelux.2.a: "A new nation is born"
 benelux.3.t: "Our Partner Declines the Union"
 benelux.3.d: "[FROM.GetName] is not yet willing to give up its independence. The union will have to wait, or be built on firmer ground."
 benelux.3.a: "We will be patient"