l_simp_chinese:
 CHI_Belt_and_Road_Initiative: "一带一路倡议"
 CHI_Belt_and_Road_Initiative_desc: "习近平主席的构想，先在阿斯塔纳提出，后在雅加达重申，将丝绸之路经济带与21世纪海上丝绸之路连接起来，形成一个涵盖140多个国家的单一基础设施外交计划。我们应该将其作为我国对外经济政策的指导原则。"
 CHI_The_China_Pakistan_Economic_Corridor: "中巴经济走廊"
 CHI_The_China_Pakistan_Economic_Corridor_desc: "从喀什到瓜达尔，三千公里的公路、铁路和管道贯穿喀喇昆仑山脉。在罕萨山谷，巴基斯坦边防组织工人与解放军工程师在彼此的制服上签名。生命线已开通。"
 CHI_The_South_China_Sea: "南中国海"
 CHI_The_South_China_Sea_desc: "南海是我们海洋战略的核心，蕴藏着丰富的油气资源，是世界上最繁忙的航道之一，也是所有周边国家争夺的焦点。我们必须选择立场：是采取“卷心菜战略”的耐心渗透，还是效仿郑和宝船队的精神开展耐心外交，抑或是以武力恢复四海的朝贡秩序。每条道路都将影响我们的邻国、东盟以及各大国的反应。"
 CHI_Strengthen_Relations_with_the_South: "济州渠道"
 CHI_Strengthen_Relations_with_the_South_desc: "通过济州岛问题上的低调秘密外交，与首尔建立常设磋商渠道。我们视韩国为合法的战略伙伴，而非通过平壤操控的缓冲国。"
 CHI_Maintain_Commitment_to_Denuclearization: "宁边公报"
 CHI_Maintain_Commitment_to_Denuclearization_desc: "发表正式公报，承诺朝鲜半岛无核化。私下渠道向平壤传递的信息是：我们的外交支持是有条件的，而非无条件的。华盛顿和首尔都注意到了这一转变。"
 CHI_Encourage_Economic_Reforms: "鼓励经济改革"
 CHI_Encourage_Economic_Reforms_desc: "作为邓小平的继承者，我们这个亲密伙伴仍然保持着欠发达和落后的状态，这令我们感到羞愧。[NKO.GetLeader]应该被说服，实现朝鲜经济的自由化。"
 CHI_Mediate_Korean_Peace_Talks: "调解朝韩和谈"
 CHI_Mediate_Korean_Peace_Talks_desc: "长期以来，朝鲜半岛一直处于战火纷飞的状态。由于相互怀疑和不信任被误认为是进攻性行动的防御性行动，朝鲜和韩国之间存在紧张关系。打破这种内部僵局需要像中国这样的相关外部参与者。"
 CHI_Back_Peaceful_Korean_Unification: "朝鲜半岛和平统一"
 CHI_Back_Peaceful_Korean_Unification_desc: "我们应该表示支持朝鲜半岛在一个不受外部影响的不结盟政府的领导下最终实现统一。这种不可预期事件是否会发生取决于韩国人。"
 CHI_End_the_Kim_Dynasty: "终结金家王朝"
 CHI_End_the_Kim_Dynasty_desc: "金氏家族领导着残酷且倒退的独裁统治，几十年来我们一直被迫支持这种独裁统治。不能允许这种状况继续下去。"
 CHI_Gain_the_Support_of_the_KPA: "获得朝鲜人民军的支持"
 CHI_Gain_the_Support_of_the_KPA_desc: "我们的情报显示，朝鲜人民军军官阶层中存在一些对[NKO.GetLeader]统治不满的势力。我们应该与这些与我们目标一致的军官进行接触。"
 CHI_The_North_Korean_Coup: "朝鲜政变"
 CHI_The_North_Korean_Coup_desc: "推翻这个腐朽政权的时机已经到来。我们在朝鲜的影响力已争取到许多军官的支持，不过分析人员仍不确定是否应该在冒险行动前寻求争取更多支持。"
 CHI_Establish_a_Puppet_Government: "成立傀儡政府"
 CHI_Establish_a_Puppet_Government_desc: "如今政变成功，新的军政府欠了我们人情，不得不屈服于我们的权威。"
 CHI_The_Indian_Subcontinent: "印度次大陆"
 CHI_The_Indian_Subcontinent_desc: "西藏以南，是一片广袤的次大陆，印度与巴基斯坦之间的对抗主导着这片土地。对于这个分裂严重的地区，我们应当审慎考虑我们的策略。"
 CHI_Support_Nepals_Maoists: "支持尼泊尔联合共产党（毛派）"
 CHI_Support_Nepals_Maoists_desc: "1996年至2006年的尼泊尔人民战争重塑了尼泊尔。通过资金、在西藏提供庇护以及意识形态宣传等方式，对尼泊尔联合共产党（毛派）的默默支持，可以使加德满都的政治在未来一代人的时间里继续向北京倾斜。"
 CHI_Respect_Nepalese_Neutrality: "1960年条约重新谈判"
 CHI_Respect_Nepalese_Neutrality_desc: "1960年尼泊尔和印度签订的《和平友好条约》将加德满都锁定在德里的战略轨道上长达六十年之久。我们将默默资助尼泊尔各界呼吁重新谈判该条约的声音。"
 CHI_Guarantee_Bangladesh: "达卡缓和"
 CHI_Guarantee_Bangladesh_desc: "谢赫·哈西娜谈战略自主，北京谈布拉马普特拉河两岸的兄弟情谊，印度则在对岸观望。孟加拉湾的格局正在发生变化。"
 CHI_Drop_Claims_on_Bhutan: "放弃对不丹的声索"
 CHI_Drop_Claims_on_Bhutan_desc: "改善我们与不丹关系的一个主要障碍是我们对不丹控制的部分领土提出主权要求。这也导致了我们与印度的摩擦，这种摩擦可能会导致一场不受欢迎的冲突。我们最好暂时放弃这些主张。"
 CHI_Doklam_Road_Standoff: "洞朗公路对峙"
 CHI_Doklam_Road_Standoff_desc: "洞朗是中国领土，因此如果我们愿意，我们应该可以自由地运送军队和建筑设备通过那里。如果不丹和印度想回应，就让他们回应吧。这将是测试他们战备能力的好机会。"
 CHI_Iron_Brothers: "钢铁兄弟"
 CHI_Iron_Brothers_desc: "我们与巴基斯坦的伙伴关系是紧密的战略契合，这种关系应当为了双方的共同利益而维护。我们共同的敌人印度无法与我们联合起来的力量抗衡。"
 CHI_Joint_Military_Projects: "JF-17联合生产"
 CHI_Joint_Military_Projects_desc: "由成都飞机工业公司和巴基斯坦空军卡姆拉分公司联合研制的JF-17“雷电”战斗机，不仅仅是一架战斗机。它是巴基斯坦空军的脊梁，也是中巴军事合作能够提供战略能力的证明。"
 CHI_Cooperate_on_Counterterrorism: "东突厥斯坦公报"
 CHI_Cooperate_on_Counterterrorism_desc: "伊斯兰堡正式将“东突厥斯坦伊斯兰运动”列为恐怖组织，并签署了引渡框架协议。对我们而言，这堵上了新疆二十年来一直存在的安全漏洞。"
 CHI_Militarize_Gwadar_Port: "瓜达尔港军事化"
 CHI_Militarize_Gwadar_Port_desc: "我们对瓜达尔港的投资已获得回报，并产生了令人印象深刻的商业设施。我们可以利用这一成就，将港口用于军事和商业用途，这一举措无疑会吓倒印度人，但对于我们的安全而言，这一举措却是必要的。"
 CHI_The_Quadrilateral_Cooperation_and_Coordination_Mechanism: "四边合作机制"
 CHI_The_Quadrilateral_Cooperation_and_Coordination_Mechanism_desc: "四边合作与协调机制将是一个有益的组织，由四个在打击恐怖主义方面有共同利益的国家组成。希望它也能改善巴基斯坦和阿富汗之间的紧张关系，并帮助我们通过塔吉克伙伴在俄罗斯主导的中亚地区扩大影响力。"
 CHI_Support_Negotiations: "穆里进程"
 CHI_Support_Negotiations_desc: "在巴基斯坦一处山地度假胜地，巴基斯坦三军情报局官员正在倒茶，塔利班代表和阿富汗政府特使隔桌而坐。一位身着灰色西装的中国男子认真聆听，并未做任何笔记。"
 CHI_Joint_Operations: "山虎行动"
 CHI_Joint_Operations_desc: "这是解放军与巴基斯坦定期联合演习的代号。这一次，演习并非训练。瓦罕和开伯尔地区将迎来数十年来解放军士兵的首次实地行军。"
 CHI_Tackle_the_Root_Causes_of_Radicalization: "瓦罕走廊协议"
 CHI_Tackle_the_Root_Causes_of_Radicalization_desc: "瓦罕走廊全长76公里，是阿富汗与新疆直接接壤的狭长地带，长期以来一直处于无政府状态。北京、喀布尔和伊斯兰堡一致认为：必须一砖一瓦、一塔一塔地建立起一道缓冲区。"
 CHI_Disengage_from_Pakistan: "疏远巴基斯坦"
 CHI_Disengage_from_Pakistan_desc: "现在是重新评估我们对印度次大陆的态度的时候了。世界上两个最大的经济体之间的密切伙伴关系可能比继续与一个较小的国家结盟对我们更有利。脱离巴基斯坦将是我们与印度和解的第一步。"
 CHI_End_Joint_Military_Exercises: "结束联合军事演习"
 CHI_End_Joint_Military_Exercises_desc: "印度人对我们与巴基斯坦的演习心存疑虑。为了赢得他们的信任，我们必须结束演习。"
 CHI_Strategic_Realignment: "万隆精神复兴"
 CHI_Strategic_Realignment_desc: "1955年，在雅加达，周恩来和贾瓦哈拉尔·尼赫鲁在镜头前握手。“印中兄弟！”人群高呼。七年后，迫击炮弹越过麦克马洪防线。或许，那次握手值得被赋予第二次生命。"
 CHI_Sino_Indian_Treaty_of_Friendship: "中印友好条约"
 CHI_Sino_Indian_Treaty_of_Friendship_desc: "当然，我们与巴基斯坦的伙伴关系并不是我们与印度之间产生摩擦的唯一根源。我们需要解决两国之间的领土纠纷，以便与印度建立新的关系。"
 CHI_A_New_Alliance: "武汉精神的实现"
 CHI_A_New_Alliance_desc: "2018年，莫迪和习近平主席在东湖花园漫步，并进行了会谈，没有随行人员。谈话内容至今未被记录，但随后发生的一切已成为历史：亚洲两大文明最终走到了一起。"
 CHI_Strike_Across_the_Himalayas: "加勒万河谷的清算"
 CHI_Strike_Across_the_Himalayas_desc: "2020年6月一个没有月光的夜晚，在加勒万河谷，士兵们用石头和棍棒互相搏击，因为条约禁止使用火器。21名印度士兵阵亡，中方则损失4人，即便北京方面拒绝证实。那一夜，条约名存实亡。"
 CHI_String_of_Pearls: "珍珠链"
 CHI_String_of_Pearls_desc: "印度在印度洋上的霸主地位是不可取的。我们可以像美国遏制我们一样遏制印度，即利用位于我们地区伙伴领土上的军事基地包围我们的对手。如果我们与印度开战，这种包围将给我们带来巨大的优势。"
 CHI_Annex_Bhutan: "吞并不丹"
 CHI_Annex_Bhutan_desc: "我们对不丹的主权要求可能并不包括该国的整个领土，但该国与西藏的密切历史关系应该为我们将不丹纳入西藏自治区的愿望提供合理理由。此外，吞并不丹将失去一个战略要地印度盟友。如果我们在不丹的影响力足够大，我们将能够在不发生战争的情况下吞并该国。"
 CHI_Puppet_Nepal: "傀儡尼泊尔"
 CHI_Puppet_Nepal_desc: "尼泊尔的一些政治力量愿意以牺牲与印度的伙伴关系为代价，大大加强与中国的关系。这将极大地有助于我们的外交政策目标。增加我们在该国的影响力并确保建立友好政府将使我们能够和平地进行这一进程。"
 CHI_Bring_the_Tiger_to_Heel: "解决麦克马洪线问题"
 CHI_Bring_the_Tiger_to_Heel_desc: "麦克马洪线是英国殖民官员于1914年划定的，从未被任何一届中国政府承认，无论是清政府、中华民国政府还是中华人民共和国政府。这条线将被抹去。"
 CHI_Assuage_Japanese_Concerns: "缓和日本担忧"
 CHI_Assuage_Japanese_Concerns_desc: "为了促进与日本的关系缓和，我们必须向东京保证，我们的意图并非敌对。行动胜于雄辩。"
 CHI_Form_the_SCO: "成立上海合作组织 "
 CHI_Form_the_SCO_desc: "目前，上海五国集团是我们同俄罗斯、哈萨克斯坦、吉尔吉斯斯坦、塔吉克斯坦密切互动的一个途径。这些互动很有价值，但如果我们将这个非正式团体转变为一个强有力的政府间组织，这些互动还可以进一步改进。。"
 CHI_Emphasize_Economic_Cooperation: "强调经济合作"
 CHI_Emphasize_Economic_Cooperation_desc: "上海合作组织应主要充当富裕成员国向贫穷成员国提供经济援助的促进者。我们实现地区稳定的目标，最好是通过加强脆弱邻国的经济来实现。除此之外，上海合作组织还应努力改善其境内居民的生活。"
 CHI_Civilian_Technology_Sharing: "民用技术共享"
 CHI_Civilian_Technology_Sharing_desc: "我们的组织主要致力于发展较贫穷成员国的经济，因此应该只注重非军事技术的共享。"
 CHI_Development_Assistance: "增加发展援助"
 CHI_Development_Assistance_desc: "我们可以进一步改进目前的发展努力，以加速上合组织成员国的经济增长。"
 CHI_Emphasize_Political_Cooperation: "强调政治合作"
 CHI_Emphasize_Political_Cooperation_desc: "上海合作组织首先应该是一个通过保护成员国的合法政府免遭内部不稳定威胁来维护地区稳定的组织。"
 CHI_Crack_Down_on_the_Three_Evils: "打击三股势力"
 CHI_Crack_Down_on_the_Three_Evils_desc: "恐怖主义、分裂主义、宗教极端主义三股势力是上海合作组织成员国关注的焦点。通过上海合作组织，我们可以增强彼此的政治能力，以压制这些危险的威胁。"
 CHI_Emphasize_Military_Cooperation: "强调军事合作"
 CHI_Emphasize_Military_Cooperation_desc: "我们没有必要掩饰我们的意图。上海合作组织应该是一个明确以安全为导向的组织，为我们和我们的俄罗斯伙伴提供一个堡垒，防止可能来自于外部敌人的侵略，其中主要是美国。"
 CHI_Military_Technology_Sharing: "军事技术共享"
 CHI_Military_Technology_Sharing_desc: "一旦遭遇外部侵略，俄罗斯先进的军事技术将成为我们成员的宝贵财富。"
 CHI_Strengthen_Security_Framework: "加强安全框架"
 CHI_Strengthen_Security_Framework_desc: "我们在上海合作组织内现有的军事合作虽然是实质性的，但可能不足以承受一个超级大国的全面进攻。我们应该深化我们现有的军事合作，以便我们作为一个组织能够更好地为最坏的情况做好准备。"
 CHI_Chinese_Dominance: "中国的主导地位"
 CHI_Chinese_Dominance_desc: "虽然我们和俄罗斯在上海合作组织中的地位目前是平等的，但一个难以忽视的事实是，我们的力量远远超过了我们以前的盟友。我们在本组织内的影响应该符合我们的现实重要性，因此俄罗斯应当被迫处于次要地位。"
 CHI_Equal_Partners: "平等伙伴"
 CHI_Equal_Partners_desc: "即使我们在很多领域已经开始超越俄罗斯，但我们仍有许多东西要向这个前超级大国学习。与俄罗斯人站在一起比疏远和对抗他们更符合我们的利益。"
 CHI_Exploit_Economic_Clout: "利用经济影响力"
 CHI_Exploit_Economic_Clout_desc: "鉴于我们在资金方面的巨大优势，上海合作组织的金融职能对我们非常有利。我们现在可以利用我们的经济优势来巩固我们对其他成员国的政治影响力。"
 CHI_Split_CSTO: "拆分集安组织"
 CHI_Split_CSTO_desc: "我们与俄罗斯的伙伴关系不会永远持续下去。我们从未能够完全信任我们的扩张主义北方邻国。虽然中俄合作的伪装到目前为止符合我们的利益，但为了进一步发展上海合作组织，我们必须结束它。我们共同的盟友现在必须在支持我们和支持我们的敌人之间做出选择。"
 CHI_Merge_with_CSTO: "与集安组织合并"
 CHI_Merge_with_CSTO_desc: "俄罗斯安全组织集体安全条约组织拥有一套完善的军事合作制度，我们借鉴这些制度将大有裨益。"
 CHI_An_Alliance_to_Rival_NATO: "北约的对手联盟"
 CHI_An_Alliance_to_Rival_NATO_desc: "现在是充分发挥上合组织潜力、加强该组织军事合作机构的时候了，这样我们的联合指挥和控制才能像北约一样高效。如果战争即将来临，我们将做好准备。"
 CHI_Forum_on_China_African_Cooperation: "中非合作论坛"
 CHI_Forum_on_China_African_Cooperation_desc: "中非合作论坛促进了我们与整个非洲大陆的互动，我们认为非洲大陆并不像西方那样落后或野蛮，而是充满潜力和机遇的源泉。"
 CHI_China_Africa_Development_Fund: "中非发展基金"
 CHI_China_Africa_Development_Fund_desc: "通过中非发展基金，我们可以为非洲大陆的基础设施项目提供急需的投资。"
 CHI_Invest_in_Cheap_Energy: "投资廉价能源"
 CHI_Invest_in_Cheap_Energy_desc: "尽管人们都在谈论可再生能源，但归根结底，廉价的化石燃料将帮助非洲人民摆脱贫困。"
 CHI_Invest_in_Clean_Energy: "投资清洁能源"
 CHI_Invest_in_Clean_Energy_desc: "发展不应以牺牲环境为代价。我们的技术诀窍意味着我们可以与非洲大陆的合作伙伴分享我们在可再生能源技术方面的进步。"
 CHI_Outsource_Cheap_Labor: "外包廉价劳动力"
 CHI_Outsource_Cheap_Labor_desc: "在发展初期，我们的工人收入微薄，生活极其艰苦。但正是他们的苦难，才使我们的国家发展到如今的经济繁荣。非洲各国应该效仿这一模式。"
 CHI_Workers_Rights: "工人权益"
 CHI_Workers_Rights_desc: "劳动者的福祉是国家成功的关键。我们应该只支持那些能够保障民众生计的项目，因为这些项目正是建立在劳动者的生计之上的。"
 CHI_Agriculture: "农业"
 CHI_Agriculture_desc: "农业在许多非洲经济体中仍然是一个重要部门，也是大多数人赖以生存的部门。我们应该支持农业部门，帮助个体劳动者在全球化和残酷的国际竞争中脱颖而出。"
 CHI_Develop_Hospitals: "发展医院"
 CHI_Develop_Hospitals_desc: "非洲大陆许多死亡病例的悲剧在于，这些死亡病例都是由一些很容易治愈的疾病导致的。我们必须为我们的合作伙伴提供必要的工具，帮助他们的人民。"
 CHI_Leverage_Influence: "杠杆影响"
 CHI_Leverage_Influence_desc: "非洲欠我们太多，因此整个非洲大陆的政府都必须遵从我们的意愿。"
 CHI_Write_Off_Debts: "冲销债务"
 CHI_Write_Off_Debts_desc: "我们不会让合作伙伴陷入债务陷阱。我们必须允许他们按照自己的节奏成长和发展。"
 CHI_Friendship_Schools: "友谊学校"
 CHI_Friendship_Schools_desc: "友谊学校为整个非洲大陆提供了急需的教育，大大增强了该地区的人力资本。"
 CHI_Joint_Research: "联合研究"
 CHI_Joint_Research_desc: "我们各国能够共同取得科学进步，造福于所有人民。"
 CHI_TV_and_Internet_Access: "电视和互联网接入"
 CHI_TV_and_Internet_Access_desc: "在21世纪，家庭与外界的联系是衡量发展水平的关键指标。我们应该帮助我们的非洲伙伴为所有公民提供电视和互联网接入。"
 sino_indian.1.t: "不丹的主权被侵犯了！"
 sino_indian.1.d: "中国军队正在洞朗地区护卫道路建设工作，洞朗是属于不丹的领土，而中国宣称对其拥有主权。如果这一明显侵犯不丹主权的行为不受反对，中国可能会巩固其对洞朗地区以及不丹领土上其他有争议地区的主权。"
 sino_indian.1.a: "我们应该派兵阻止这次入侵！"
 sino_indian.1.b: "我们无能为力..."
 sino_indian.1.c: "我们的保护者会来保护我们。"
 sino_indian.1.e: "我们必须保卫自己！"
 sino_indian.2.t: "看来我们的保护者已经抛弃了我们…"
 sino_indian.2.d: "印度选择不履行捍卫我国主权的承诺。因此，是否抵抗中国入侵的决定权在我们手中。"
 sino_indian.2.a: "我们无能为力..."
 sino_indian.2.b: "我们必须保卫自己！"
 sino_indian.3.t: "[FROM.GetName]派遣军队来阻止我们的道路建设"
 sino_indian.3.d: "数百名[FROM.GetAdjective]士兵越过我们和他们领土之间的边界，表面上是为了回应我们入侵不丹领土。撇开这一说法的荒谬性不谈，我们应该决定是撤军并避免武装对抗，还是让当前局势升级。"
 sino_indian.3.a: "我们应该脱离交战"
 sino_indian.3.b: "我们应该坚守阵地！"
 sino_indian.4.t: "中国扩大对不丹的影响"
 sino_indian.4.d: "小国不丹的独立性因中国未经其同意将一条公路延伸至其主权领土而受到严重损害。不丹及其保护国印度除了谴责并重申该领土属于不丹而非中国领土外，没有对此举表示反对。据报道，印度未能保护其邻国免受这一行为的侵害，严重损害了两国之间历史上的密切关系。"
 sino_indian.4.a: "中国继续向外发展"
 sino_indian.5.t: "中国已经脱离了与不丹的接触"
 sino_indian.5.d: "由于中国将现有公路延伸至不丹领土洞朗的努力遭遇巨大阻力，中国已从该地区撤出军队和人员。[CHI.GetLeader]重申了中国对该地区和平与稳定的承诺。"
 sino_indian.5.a: "目前，中国做出了让步。"
 sino_indian.6.t: "中国赢得了洞朗对抗！"
 sino_indian.6.d: "击败对手后，我们对洞朗领土的主权现在已经确定！"
 sino_indian.6.d_RAJ: "保卫不丹领土失败后，我们别无选择，只能把洞朗让给中国人。"
 sino_indian.6.a: "光荣的胜利！"
 sino_indian.6.b: "耻辱的失败……"
 sino_indian.7.t: "中国在洞朗对峙中失利！"
 sino_indian.7.d: "未能从对手手中夺取洞朗地区，我们别无选择，只能从这片本应属于我们的土地上撤退。"
 sino_indian.7.d_RAJ: "打败对手后，不丹对洞朗的主权得到了维护！"
 sino_indian.7.a: "光荣的胜利！"
 sino_indian.7.b: "耻辱的失败……"
 sino_indian.8.t: "洞朗对峙无果而终"
 sino_indian.8.d: "中印双方都未能在洞朗地区的冲突中占据上风。"
 sino_indian.8.a: "和平，暂时……"
 sino_indian.9.t: "中国占领了藏南！"
 sino_indian.9.d: "在击溃了敌人之后，我们在藏南（敌人称为阿鲁纳恰尔）领土上的统治地位现在已经确定了！"
 sino_indian.9.d_RAJ: "由于未能保卫我们的领土，我们别无选择，只能向中国人让步。"
 sino_indian.9.a: "光荣的胜利！"
 sino_indian.9.b: "耻辱的失败……"
 sino_indian.10.t: "中国没有拿下藏南！"
 sino_indian.10.d: "由于未能从敌人手中夺回这个地区，我们别无选择，只能从本应属于我们的土地上撤退。"
 sino_indian.10.d_RAJ: "击败我们的对手后，印度对藏南的主权得以保全！"
 sino_indian.10.a: "光荣的胜利！"
 sino_indian.10.b: "耻辱的失败……"
 sino_indian.11.t: "中国提议签订一项条约，以改善两国关系并解决争端"
 sino_indian.11.d: "中国过去的和解行动最终促成了我们两国之间签署一项条约，该条约解决了我们的边界争端，并一劳永逸地搁置了我们的分歧。我们应该接受他们的提议还是保持现状？"
 sino_indian.11.a: "我们应该接受这个历史性的提议！"
 sino_indian.11.b: "中国人不值得信任！"
 sino_indian.12.t: "中印友好条约"
 sino_indian.12.d: "中国和印度签署了一项友好条约，标志着这两个地区大国之间长达数十年的怨恨和猜疑的结束。在中国方面做出一系列令人瞩目的和解努力之后，印度政府对中国人的不满迅速消退。这一令人惊讶的新伙伴关系的含义尚未显露出来。"
 sino_indian.12.a: "这是和平与外交的好日子！"
 sino_indian.12.b: "一个非常令人担忧的发展…"
 sino_indian.13.t: "中国转向印度"
 sino_indian.13.d: "几十年来，由于对印度的共同不信任，中国和巴基斯坦一直是密切的战略伙伴。然而，这种情况最近开始发生变化，中国放弃了保卫巴基斯坦的承诺，并结束了两国之间的联合军事演习和投资项目。据报道，中国正在向印度发出信号，这些措施代表了中国长期外交政策的调整。印度对这些事态发展的反应还有待观察。"
 sino_indian.13.a: "中国正在寻求新的盟友…"
 sino_indian.13.b: "我们应该怎么理解这个呢？"
