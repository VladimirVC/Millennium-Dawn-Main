 total_microchips_factories_amount_tt_delayed: "§YЗаводы по производству микрочипов§! представляют собой производство полупроводников и малой электроники в нашей стране.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y37,5 тыс.§!\nБазовый выпуск ВВП на один §Yзавод по производству микрочипов§!: $§Y32 млрд§!\nБазовое энергопотребление: §R-0,75§! ГВт\n\nВлияние производительности на §Yзаводы по производству микрочипов§!: [?worker_requirement_productivity_multiplier_display|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу заводов по производству микрочипов§!: [?modifier@microchip_plant_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на один §Yзавод по производству микрочипов§!: [?workers_per_microchip_plant_display|2] тыс."
 total_composites_factories_amount_tt: "Это значение представляет собой общее количество §Yзаводов по производству композитов§! в нашей стране."
 total_composites_factories_amount_tt_delayed: "§YЗаводы по производству композитов§! представляют собой предприятия по выпуску передовых материалов, включая керамическую броню, армированные полимеры и высокопрочные конструкционные материалы.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y37,5 тыс.§!\nБазовый выпуск ВВП на один §Yзавод по производству композитов§!: $§Y28 млрд§!\nБазовое энергопотребление: §R-0,8§! ГВт\n\nВлияние производительности на §Yзаводы по производству композитов§!: [?worker_requirement_productivity_multiplier_display|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу заводов по производству композитов§!: [?modifier@composite_plant_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на один §Yзавод по производству композитов§!: [?workers_per_composite_plant_display|2] тыс."
 total_refineries_amount_tt: "Это значение представляет собой общее количество §Yзаводов по производству синтетического топлива§! в нашей стране."
