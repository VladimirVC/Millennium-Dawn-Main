 form_MAGHREB_category: "아랍-마그레브 연방"
 form_MAGHREB_category_desc: "아랍 마그레브 연방은 알제리, 리비아, 모리타니, 모로코, 튀니지로 구성된 정치적 국가 연합입니다. 이 연방은 주로 회원국 간의 정치적 단결과 경제적 통합을 보장하는 역할을 해왔습니다. 최근 몇 년 동안 연방의 활동이 줄어드는 듯 보이지만, 이제 이 구상의 불씨를 다시 지필 때가 되었을지도 모릅니다. 마그레브 인민을 하나로 뭉쳐 아프리카 대륙과 지중해 연안을 지배할 수 있는 새로운 국가를 탄생시키는 것입니다. 이제 마그레브를 통합하여 세계의 위대한 국가 중 하나로 도약할 때입니다."
