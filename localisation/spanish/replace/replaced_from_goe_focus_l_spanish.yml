l_spanish:
 PER_iran_first: "Irán primero"
 AFG_graveyard_of_empires: "Cementerio de imperios"
 PER_iran_first_desc: "Si bien contamos con aliados regionales e internacionales, debemos priorizar a Irán en lo que respecta al bienestar de nuestro pueblo. Es necesario destinar fondos al desarrollo de las industrias locales."
 AFG_graveyard_of_empires_desc: "Los imperios van y vienen, pero nuestro pueblo sigue siendo el dueño indiscutible de esta región. Mientras nuestro pueblo permanezca unido y conectado con su herencia, cualquier agresor encontrará en [AFG.GetNameWithFlag] su verdadera tumba."