l_russian:
 brics_join.1.t: "[FROM.GetNameDef] стремится к членству в БРИКС"
 brics_join.1.d: "[FROM.GetNameDef] официально подал заявку на вступление в БРИКС. Как лидер блока, решение о его принятии остается за нами."
 brics_join.1.a: "Они укрепляют блок. Примите их."
 brics_join.1.b: "Их членство нам не приносит пользы."
 brics_join.2.t: "Наша заявка принята."
 brics_join.2.d: "БРИКС одобрил нашу заявку на членство. Мы занимаем свое место среди стран блока."
 brics_join.2.a: "Займите наше место в БРИКС"
 brics_join.3.t: "Наша заявка на вступление в БРИКС отклонена."
 brics_join.3.d: "Руководство стран БРИКС отклонило нашу заявку. Дверь не закрыта навсегда, и мы можем снова поднять этот вопрос в будущем."
 brics_join.3.a: "Мы подадим заявку снова позже."
 brics_join.3.b: "Откажитесь от этой попытки."
 brics_join.4.t: "[ROOT.GetNameDef] присоединяется к БРИКС"
 brics_join.4.d: "[ROOT.GetNameDef] был принят в БРИКС, что расширило влияние и вес блока в международном порядке."
 brics_join.4.a: "Смещение равновесия"
 brics_join.5.t: "Пора вновь обратиться к БРИКС"
 brics_join.5.d: "С момента нашего последнего отказа прошло достаточно времени. Возможно, мы подадим новую заявку руководству стран БРИКС."
 brics_join.5.a: "Повторно отправьте нашу заявку."
 brics_join.5.b: "Пока нет"
 brics_join.6.t: "[FROM.GetNameDef] Приглашает нас основать БРИКС"
 brics_join.6.d: "[FROM.GetNameDef] занимается созданием БРИКС и попросил нас войти в число его основателей, формируя блок с самого начала."
 brics_join.6.a: "Мы поможем основать БРИКС."
 brics_join.6.b: "Мы будем держаться на расстоянии"