 ABK_friend_armenia: "Дружба с Арменией"
 ABK_friend_armenia_desc: "Армянские коммунисты - наши друзья"
 ABK_Russian_Way: "Российский путь модернизации армии"
 ABK_Russian_Way_desc: "Мы выбрали путь модернизации нашей армии по российской системе."
 ABK_China_Way: "Китайский путь модернизации армии"
 ABK_China_Way_desc: "Мы выбрали путь модернизации нашей армии по китайской системе."
 ABK_CSTO_training: "Учения со странами ОДКБ"
 ABK_CSTO_training_desc: "Учения со странами ОДКБ помогут нашим солдатам освоить новые боевые навыки."
 ABK_Iska: "Разместить российский «Искандер» у нас"
 ABK_Iska_desc: "Ракеты никогда не бывают лишними."
 ABK_rus_officer: "Русская офицерская школа"
 ABK_rus_officer_desc: "Наши офицеры будут учиться в российских военных вузах."
 ABK_china_rszo: "Покупка китайских РСЗО"
 ABK_china_rszo_desc: "WM-80 - китайская реактивная система залпового огня. Разработана на заводе № 123 в Китае. Предлагается на экспорт китайской внешнеторговой корпорацией Norinco. Система была поставлена в Бангладеш, Армению, Иорданию и Судан."
 ABK_weapon: "Сделка с Китаем по вооружениям"
 ABK_weapon_desc: "Китай согласился бесплатно поставить нам несколько автоматических винтовок."
 ABK_China_training: "Обучение в китайской армии"
 ABK_China_training_desc: "Наши бойцы будут тренироваться вместе с китайскими солдатами."
 ABK_tur_sosiski: "Закупка турецкого оборудования"
 ABK_tur_sosiski_desc: "Мы готовы закупить небольшое количество оборудования в Турции."
 ABK_union_social: "Сотрудничество с социальной защитой"
 ABK_union_social_desc: "Мы заключили соглашение о социальном взаимодействии между членами Союзного государства, которое значительно облегчит жизнь наших граждан."
 ABK_union_programm_care: "Сотрудничество в области медицинского обслуживания"
 ABK_union_programm_desc: "Соглашение о сотрудничестве в области здравоохранения является важным шагом в развитии Союзного государства, поскольку теперь наши граждане будут получать медицинскую помощь одинакового уровня на всей территории страны."
 ABK_union_btr: "Техническое и транспортное сотрудничество"
 ABK_union_btr_desc: "Наши страны обладают мощной производственной базой, которую мы будем использовать для увеличения объёмов производства важнейшего оборудования."
 ABK_tourism1_idea: "Абхазский туризм"
 ABK_tourism2_idea: "Развитый абхазский туризм"
 ABK_outdated_army_idea: "Устаревшая армия"
 ABK_outdated_army_idea_desc: "Абхазская армия очень плохо вооружена и практически не обучена."
 ABK_victory_war_idea: "Победа в Освободительной войне"
 ABK_victory_war_idea_desc: "Абхазия одержала победу в войне за свою независимость над Грузией. Народ Абхазии гордится этим и помнит эту славную победу."
 ABK_mafia_idea: "Абхазская мафия"
 ABK_mafia_idea_desc: "Абхазия — глубоко коррумпированное государство, раздираемое клановым влиянием. Власть разделена между враждующими кланами, что явно препятствует развитию страны."
 ABK_mafia2_idea: "Ослабленная абхазская мафия"
 ABK_mafia2_idea_desc: "Наши действия начали приносить плоды, поскольку численность мафии начала сокращаться."
 ABK_mafia3_idea: "Разбитая абхазская мафия"
 ABK_mafia3_idea_desc: "Абхазская мафия практически загнана в угол; она теряет связи в правительстве и других органах власти."
 ABK_mafia4_idea: "Уничтожена абхазская мафия"
 ABK_mafia4_idea_desc: "Осталось очень мало лидеров мафии, обладающих достаточным влиянием, чтобы радикально изменить жизнь в нашей стране."
 ABK_energy_problems_idea: "Энергетические проблемы"
 ABK_energy_problems_idea_desc: "Энергетическая инфраструктура Абхазии находится в ужасном состоянии. Война за независимость фактически разрушила её, и теперь нам предстоит восстановить её практически с нуля."
 ABK_energy_problems2_idea: "Малые энергетические проблемы"
 ABK_energy_problems2_idea_desc: "Определенный прогресс достигнут, но энергетическая инфраструктура Абхазии по-прежнему нуждается в значительных инвестициях для полного восстановления после разрушений, причиненных войной за независимость."
 ABK_narcos_idea: "Наркомания"
 ABK_narcos_idea_desc: "Наркозависимость в Абхазии — серьёзная проблема: всё больше молодых людей начинают употреблять наркотики. Мы должны бороться с этим!"
 ABK_narcos2_idea: "Наркомания"
 ABK_narcos2_idea_desc: "Наркотическая зависимость в нашей стране по-прежнему затрагивает молодежь, но не в такой степени, как раньше."
