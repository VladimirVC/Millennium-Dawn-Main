 JAP_choice: "政治の再起動"
 JAP_choice_desc: "長引く停滞と制度疲労の中で、政治への信頼は揺らぎ、改革の必要性だけが積み上がっていった。この国が次に進むためには、まず国家運営の方針を定め、意思決定の軸を作らなければならない。"
 JAP_left: "日本の左派"
 JAP_left_desc: "政治の目的は、経済成長だけではなく、人々の暮らしと尊厳を守ることにある。透明性の確保と権力の監視を徹底し、労働者の交渉力と社会保障を強め、格差と不安を縮めていく。人権を軽視しない国家運営と、持続可能なエネルギーへの転換を進め、日本社会の再建を目指す。"
 JAP_left_TT: "§Yいずれかの左派政党の支持率を大きく上げることができる！\nただし、与党の場合は微増にとどまる。§!"
 JAP_information_disclosure: "情報公開の強化"
 JAP_information_disclosure_desc: "政治と行政への信頼を取り戻すため、情報公開を徹底し、公文書の作成・保存・開示を強化する。腐敗や癒着の温床を断ち、政策決定を透明化して改革を進めやすくする。"
 JAP_left_party_TT: "以下のいずれかを満たす:\n§Y$JAP.liberalism$§!が権力を握っている\n§Y$JAP.liberalism_alt$§!が権力を握っている\n§Y$JAP.neutral_Social$§!が権力を握っている\n§Y$JAP.Neutral_Communism$§!が権力を握っている\n§Y$JAP.anarchist_communism$§!が権力を握っている\n"
 JAP_management_documents: "公文書の徹底管理"
 JAP_management_documents_desc: "政策決定の記録、行政手続きの履歴、公的機関の保有文書を統一基準のもとで整理・保存し、管理体制を強化する。記録の散逸や不適切な運用を防ぎ、検証可能性と行政の継続性を高めることで、政府運営の信頼性と実務効率の改善を図る。"
 JAP_digital_archiving: "公文書のデジタルアーカイブ"
 JAP_digital_archiving_desc: "公文書をデジタル化して一元管理し、検索・共有・保存の手続きを効率化する。紙中心の運用を改めることで事務負担と管理コストを削減し、行政支出を抑える。"
 JAP_independent_audits: "完全独立監査"
 JAP_independent_audits_desc: "監査機関の独立性を徹底し、政治や官僚組織からの介入を排したチェック体制を確立する。癒着や不正を早期に摘発しやすくして腐敗対策を進め、政治への信頼回復によって政策実行の推進力も高める。"
 JAP_eliminating_amakudari: "天下りの根絶"
 JAP_eliminating_amakudari_desc: "官僚と企業の癒着を生みやすい天下り慣行を断ち、利権構造にメスを入れる。人事の透明性と競争環境を改善することで、腐敗の是正を進めつつ、非効率を減らして生産性の向上につなげる。"
 JAP_disclosure_of_political_funding: "政治資金の徹底開示"
 JAP_disclosure_of_political_funding_desc: "政治資金の流れを徹底的に開示し、資金提供者や支出の実態を見える形にする。不透明な資金が入り込む余地を減らして腐敗の是正を進めるとともに、国外勢力による影響工作への耐性を高める。"
 JAP_protecting_human_rights: "人権の保護"
 JAP_protecting_human_rights_desc: "あらゆる人の尊厳と権利を守ることを国家運営の基本に据える。差別や不当な扱いを是正し、安心して暮らせる社会を整えることで、国内の結束と安定を高める。"
 JAP_same_sex_partnerships: "同性パートナー制度の法整備"
 JAP_same_sex_partnerships_desc: "同性パートナーを法律上認め、医療同意や住居、相続など生活上の不利益を減らす制度を整える。多様な家族の形を尊重し、社会の分断を和らげることで、国内の安定を高める。"
 JAP_employment_disabilities: "障害者雇用の拡充"
 JAP_employment_disabilities_desc: "障害の有無にかかわらず働ける環境を整え、雇用支援と職場の合理的配慮を拡充する。就労機会を広げて労働力を底上げし、社会参加の促進によって国内の安定にもつなげる。"
 JAP_prevent_domestic_violence: "DV抑止への取り組み"
 JAP_prevent_domestic_violence_desc: "DVの予防と早期発見を強化し、相談体制や保護支援を拡充する。被害の連鎖を断ち、家庭内の不安や暴力を減らすことで、社会の安定を高める。"
 JAP_immigrants_and_refugees: "移民・難民の保護強化"
 JAP_immigrants_and_refugees_desc: "移民・難民の受け入れと保護を強化し、審査の適正化や生活支援、定着支援の体制を整える。人道的な責任を果たしつつ、労働力の流入を促して社会の活力につなげる。"
 JAP_protecting_labor_union: "労働組合の権利保護"
 JAP_protecting_labor_union_desc: "労働組合の権利を明確に保障し、団体交渉や労使協議が適切に行われる環境を整える。現場の声を制度や企業運営に反映させ、雇用と労働条件の安定を図る。"
 JAP_subcontracto: "下請けいじめの是正"
 JAP_subcontracto_desc: "下請け企業への不当な値下げ要求や支払い遅延、取引条件の一方的な変更を取り締まり、公正な取引環境を整える。中小企業の収益基盤を守り、サプライチェーン全体の健全化と社会の安定につなげる。"
 JAP_pressure_wage_increases: "賃上げへの圧力"
 JAP_pressure_wage_increases_desc: "企業に賃上げを促し、家計の所得を底上げする。消費の下支えと生活不安の緩和を通じて社会の安定を図り、経済の好循環を目指す。"
 JAP_regulation_temporary_agency_work: "派遣労働の規制強化"
 JAP_regulation_temporary_agency_work_desc: "派遣労働の乱用を抑え、雇用の安定と労働条件の改善を進める。短期的な効率よりも、長期的に安心して働ける環境を優先し、社会の安定を高める。"
 JAP_ban_non_regular_employment: "非正規雇用の禁止"
 JAP_ban_non_regular_employment_desc: "非正規雇用に依存した雇用慣行を改め、誰もが安定した雇用と待遇を得られる仕組みへ移行する。生活の不安を減らし、社会の分断を抑えて国の安定を強める。"
 JAP_redistribution: "再分配重視"
 JAP_redistribution_desc: "所得格差と生活不安の是正を優先し、支援が必要な層に資源を手厚く配分する方針へ転換する。再分配によって社会の分断を抑え、国民の安心感を高めて安定した国家運営を目指す。"
 JAP_reducing_medical_costs: "医療費負担の軽減"
 JAP_reducing_medical_costs_desc: "医療費の自己負担を軽減し、必要な治療をためらわず受けられる制度へ整える。家計の不安を減らし、健康格差の拡大を抑えることで社会の安定を高める。"
 JAP_care_workers: "介護人材の待遇改善"
 JAP_care_workers_desc: "介護人材の賃金と労働環境を改善し、担い手の確保と定着を進める。介護の継続性を高めて家族の負担を和らげ、労働参加を支えつつ社会の安定につなげる。"
 JAP_housing_support: "住宅支援の拡充"
 JAP_housing_support_desc: "住宅支援を拡充し、家賃負担の軽減や住まいの確保を後押しする。住環境の不安を減らして生活の安定を支え、社会の分断を抑えることで国内の安定を高める。"
 JAP_student_loans: "奨学金負担の軽減"
 JAP_student_loans_desc: "奨学金の返済負担を軽減し、進学や学び直しの障壁を下げる。将来への投資として人材育成を進め、研究と技術の発展につなげる。"
 JAP_focusing_renewable_energy: "再エネへの注力"
 JAP_focusing_renewable_energy_desc: "再生可能エネルギーの導入拡大を国家方針として掲げ、技術開発と実証投資を加速させる。エネルギー転換の基盤を固め、将来の供給安定と産業競争力の向上につなげる。"
 JAP_renewable_energy_feed_in_tariffs: "再エネ固定価格の強化"
 JAP_renewable_energy_feed_in_tariffs_desc: "再生可能エネルギーの固定価格制度を強化し、投資の予見性を高めて導入を加速させる。再エネ電力の供給拡大を後押しし、エネルギー転換の基盤を強化する。"
 JAP_energy_efficiency: "省エネ基準の強化"
 JAP_energy_efficiency_desc: "省エネ基準を強化し、住宅や機器の効率改善を促進する。無駄な電力消費を抑え、家計と社会全体のエネルギー負担を軽減する。"
 JAP_nuclear_phaseout: "脱原発の表明"
 JAP_nuclear_phaseout_desc: "原子力発電に依存しない方針を明確に打ち出し、非核国家としての立場を採用する。地震が多い国として安全性への懸念を重く受け止め、再生可能エネルギーを中心とした電力体系への転換を進め、持続可能なエネルギー政策を目指す。"
 JAP_leading_disarmament: "軍縮外交の主導"
 JAP_leading_disarmament_desc: "軍縮と緊張緩和を外交の柱に据え、対話と信頼醸成を通じて地域の安定を目指す。武力に頼らない解決を優先し、各国との関係改善を進める。"
 JAP_restricting_arms_exports: "武器輸出の抑制"
 JAP_restricting_arms_exports_desc: "武器輸出を抑制し、軍事的な緊張を高めにくい外交姿勢を明確にする。軍縮と信頼醸成を優先し、地域の安定に向けた対話を進める。"
 JAP_principle_of_no_armed_forces: "戦力不保持の原則を確認"
 JAP_principle_of_no_armed_forces_desc: "戦力不保持の原則を改めて確認し、軍事力に依存しない国家運営の立場を明確にする。平和主義を政策の基軸として位置づけ、外交と国際協調による安全保障を重視する。"
 JAP_abrogating_us_japan_security_treaty: "日米安保の廃棄"
 JAP_abrogating_us_japan_security_treaty_desc: "日米安全保障体制から離脱し、対米依存に頼らない独自の安全保障路線へ転換する。外交方針の自由度を広げ、主権と独立性をより明確に打ち出す。"
 JAP_dissolving_sdf: "自衛隊の解消"
 JAP_dissolving_sdf_desc: "自衛隊を解消し、軍事力に依存しない国家運営へ舵を切る。防衛に投入していた資源と労力を民生部門へ振り向け、産業と生活基盤の整備を優先して国内の発展を加速させる。"
 JAP_army_delete_TT: "§Rすべての陸軍が削除される！§!"
 JAP_right: "日本の右派"
 JAP_right_desc: "国家の統治力と社会秩序を重視し、治安の強化や危機対応、国益を前面に出した外交・安全保障を推進する。規制改革と企業活動の活性化によって成長を目指し、伝統や共同体の価値を土台に国の立て直しを図る。"
 JAP_right_TT: "§Yいずれかの右派政党の支持率を大きく上げることができる！\nただし、与党の場合は微増にとどまる。§!"
 JAP_strengthen_military_power: "軍事力の強化方針"
 JAP_strengthen_military_power_desc: "安全保障環境の変化を踏まえ、防衛体制の強化を国家方針として明確にする。抑止力を高めることで脅威を未然に防ぎ、国民の安全と国家の主権を守る姿勢を示す。"
 JAP_right_party_TT: "以下のいずれかを満たす:\n§Y$JAP.conservatism$§!が権力を握っている\n§Y$JAP.socialism$§!が権力を握っている\n§Y$JAP.Neutral_conservatism$§!が権力を握っている\n§Y$JAP.Neutral_conservatism2$§!が権力を握っている\n§Y$JAP.Neutral_conservatism3$§!が権力を握っている\n§Y$JAP.Neutral_conservatism4$§!が権力を握っている\n§Y$JAP.Neutral_Libertarian$§!が権力を握っている\n§Y$JAP.Nat_Populism$§!が権力を握っている\n"
 JAP_allow_overseas_deployment: "自衛隊の海外派遣容認方針"
 JAP_allow_overseas_deployment_desc: "国際情勢と同盟国との協力を踏まえ、自衛隊の海外派遣を容認する方針を明確にする。国際任務への参加を通じて抑止力と影響力を高め、国益と安全保障をより能動的に守る。"
 JAP_international_missions: "国際任務の法的整備"
 JAP_international_missions_desc: "国際任務に参加する際の法的根拠と手続きを整備し、自衛隊が一貫したルールの下で行動できる体制を確立する。現場の不確実性を減らし、国際協力をより確実に遂行できるようにする。"
 JAP_revising_use_weapons: "武器使用基準の見直し"
 JAP_revising_use_weapons_desc: "国際任務や危機対応の現実に合わせ、武器使用の基準と手続きを見直す。任務遂行に必要な権限と責任の範囲を明確化し、自衛隊が適切に自他を防護できる体制を整える。"
 JAP_exclusive_defense: "専守防衛の徹底"
 JAP_exclusive_defense_desc: "専守防衛を安全保障の原則として徹底し、防衛力の運用を「自国への攻撃を防ぐ範囲」に明確に限定する。抑止力は維持しつつ、過度な軍事拡大を避け、周辺国との緊張を高めにくい姿勢を示す。"
 JAP_exclusive_defense_TT: "§Yこの国家方針は勢力均衡をレベル2に近づける！§!"
 JAP_collective_self_defense: "集団的自衛権の容認方針"
 JAP_collective_self_defense_desc: "同盟国への攻撃も自国の安全に直結し得るとの立場から、集団的自衛権を容認する方針を明確にする。抑止力と同盟の実効性を高め、より能動的な安全保障体制を整える。"
 absolute_majority_popularity_66_TT: "連立政権の支持率が66%以上でなければならない"
 JAP_prioritizing_order: "秩序重視"
 JAP_prioritizing_order_desc: "社会秩序と公共の安全を国家運営の優先事項として位置づける。ルールと責任を重んじ、治安の維持と統治の安定を通じて、国の基盤を立て直す。"
 JAP_strengthen_public_security: "治安強化の総合計画"
 JAP_strengthen_public_security_desc: "治安体制を総点検し、装備・人員・情報連携を含む総合計画を策定する。現場の運用を効率化しつつ警察機能を強化し、犯罪抑止と社会の安定を確かなものにする。"
 JAP_against_organized_crime: "組織犯罪対策の強化"
 JAP_against_organized_crime_desc: "組織犯罪への取締りを強化し、資金源の遮断と捜査体制の拡充を進める。国内の治安を立て直して社会の安定を高めるとともに、外部勢力による浸透や影響工作を受けにくい国家体制を整える。"
 JAP_against_terrorist_financing: "テロ資金対策の徹底"
 JAP_against_terrorist_financing_desc: "資金の流れを厳格に監視し、テロ組織や過激派への資金供給を断つ体制を徹底する。金融・捜査機関の連携を強化して国内の安全を守り、外部からの影響工作への耐性と社会の安定を高める。"
 JAP_counter_espionage: "スパイ防止体制の整備"
 JAP_counter_espionage_desc: "諜報活動への対策を強化し、機密情報の保全と監視体制を整える。外部勢力による浸透や工作を抑え、国家の意思決定を守ることで、国内の安定を確かなものにする。"
 JAP_strengthening_cabinet: "内閣権限の強化"
 JAP_strengthening_cabinet_desc: "内閣の指揮系統と調整機能を強化し、意思決定の速度と一貫性を高める。危機対応や重要政策を機動的に進められる体制を整え、国家運営の主導力を確かなものにする。"
 JAP_cabinet_personnel_bureau: "内閣人事局"
 JAP_cabinet_personnel_bureau_desc: "内閣が人事を一元的に把握できる体制を整え、幹部人事の透明性と統制を強める。適材適所を進めて官僚機構の運用を効率化し、政策遂行の実行力を高める。"
 JAP_breaking_down_bureaucratic_siloing: "縦割り行政の打破"
 JAP_breaking_down_bureaucratic_siloing_desc: "省庁間の縦割りを見直し、情報共有と横断的な調整体制を強化する。手続きの重複や停滞を減らして行政運営を効率化し、公共投資や事業の実行速度を高める。"
 JAP_policy_evaluation_and_kpis: "政策評価とKPIの導入"
 JAP_policy_evaluation_and_kpis_desc: "政策の成果を数値で検証できるよう、評価制度とKPIを導入する。実効性の低い施策を見直し、限られた資源を効果の高い分野へ集中させることで、行政の効率と経済の生産性を高める。"
 JAP_national_security_council: "国家安全保障会議の設置"
 JAP_national_security_council_desc: "安全保障に関する情報と判断を内閣に集約し、迅速で一貫した意思決定ができる体制を整える。危機対応力を高め、同盟国や関係機関との連携を強化して抑止力を確かなものにする。"
 JAP_emergency_powers: "緊急事態条項"
 JAP_emergency_powers_desc: "大規模災害や武力攻撃などの非常事態に備え、緊急時に必要な権限と手続きを明確化する。平時の統制を維持しつつ、危機対応の迅速化と指揮系統の強化を図り、国家の安定と防衛体制を確かなものにする。"
 JAP_regulatory_reform: "規制改革による成長"
 JAP_regulatory_reform_desc: "規制や手続きを見直し、行政の負担を軽くして企業活動と投資を促進する。事業の立ち上げや施設整備を進めやすくし、経済成長のスピードを引き上げる。"
 JAP_postal_privatization: "郵政民営化"
 JAP_postal_privatization_desc: "郵政事業の民営化を進め、官主導の仕組みを見直して行政運営の効率化を図る。市場原理を取り入れることで企業活動と税収基盤の強化を狙う一方、改革の是非をめぐって強い反対意見も生まれ、政治的な対立が激しくなり得る。"
 JAP_postal_privatization_TT: "§Y解散総選挙を実施するか選択するイベントが発生する！§!"
 JAP_second_wave_privatization: "民営化の第二段階"
 JAP_second_wave_privatization_desc: "民営化改革をさらに推し進め、公共部門の役割と事業運営を見直す。行政の非効率を削減し、投資と企業活動を促して経済の活力を引き上げる。"
 JAP_special_zones: "国家戦略特区"
 JAP_special_zones_desc: "特定地域に規制の特例を設け、企業の参入と新規投資を集中的に促進する。制度の壁を越えた実証と事業化を進め、民間活力による成長と地域経済の活性化を加速させる。"
 JAP_expansion_regulatory_reform_zones: "規制改革特区の全国展開"
 JAP_expansion_regulatory_reform_zones_desc: "特区で得た成果を全国へ広げ、規制改革を一部地域の例外から標準へ移行する。参入や投資の障壁を下げて事業の立ち上げを促し、全国規模で経済の活性化を進める。"
 JAP_new_market_entry: "新規参入の促進"
 JAP_new_market_entry_desc: "新規参入の障壁を下げ、起業や新事業の立ち上げを後押しする。競争と革新を促し、生産性の向上と税収基盤の強化につなげる。"
 JAP_new_technologies: "新技術の歓迎"
 JAP_new_technologies_desc: "新技術の導入と実用化を積極的に支援し、研究開発と産業の革新を加速させる。新たな成長分野を育て、国の競争力を高める。"
 JAP_key_industries_back_home: "重要産業の国内回帰"
 JAP_key_industries_back_home_desc: "重要産業を国内で安定して生産できる体制を構築し、供給網の強靭化と基幹分野の自立性を高める。国内投資を促して産業基盤を強化し、国際情勢の変動に左右されにくい体制を整える。"
 JAP_economic_security: "経済安全保障の確立"
 JAP_economic_security_desc: "重要物資や基幹産業の供給体制を点検し、技術・資本・情報のリスクを管理することで、経済面の安全保障を確立する。国の自立性と企業の持続的な競争力を高め、安定した成長につなげる。"
 JAP_patriotic_education: "愛国心教育"
 JAP_patriotic_education_desc: "国の歴史や文化、公共心を重視した教育を推進し、社会の結束と規範意識を高める。外部からの影響に流されにくい土台を整え、国内の安定を強める。"
 JAP_fundamentals_of_education: "教育基本の再定義"
 JAP_fundamentals_of_education_desc: "教育の目的と基準を見直し、学力・基礎教養・実践的能力の育成を国家方針として再定義する。教育投資を重点化し、人材育成と研究開発の土台を強化する。"
 JAP_dotoku_education: "道徳教育"
 JAP_dotoku_education_desc: "道徳教育を重視し、公共心や責任、他者への配慮といった価値観を学校教育の中で育てる。社会の規範意識を強め、地域と共同体の結束を高めることで、国内の安定につなげる。"
 JAP_national_flag_and_anthem: "国旗・国歌の尊重"
 JAP_national_flag_and_anthem_desc: "国旗・国歌を尊重する姿勢を明確にし、国家への帰属意識と社会の一体感を高める。非常時の結束を強めるとともに、外部からの影響に左右されにくい基盤を整える。"
 JAP_family_policy: "家族政策の強化"
 JAP_family_policy_desc: "家庭や家族の価値観を尊重し、子育てや生活を支える施策を拡充する。安心して家庭を築ける環境を整え、将来の人口基盤の強化と社会の安定につなげる。"
 JAP_glorious_decade: "輝かしい十年へ"
 JAP_inflation_target: "政策コミットメントの明確化"
 JAP_down_long_term_interest_rates: "長期金利の押し下げ"
 JAP_down_long_term_interest_rates_desc: "長期金利を低位で安定させ、企業と家計の資金調達コストを抑える。投資や設備更新、住宅取得を後押しし、需要の下支えと景気の底上げにつなげることで、税収の回復にも道筋をつける。"
 JAP_cash_benefits: "家計向けの給付金"
 JAP_cash_benefits_desc: "家計に直接支援を行い、消費の落ち込みを防いで景気を下支えする。不安が強い局面でも日々の支出を続けられる環境を整え、需要の回復につなげる。"
 JAP_public_investment: "継続的な公共投資"
 JAP_public_investment_desc: "景気の底割れを防ぐため、公共投資を計画的に継続し、需要を下支えする。あわせて、物流・防災・生活基盤の整備を進め、民間投資が動きやすい環境を整える。"
 JAP_special_inspection_banks: "銀行への特別検査"
 JAP_special_inspection_banks_desc: "金融システムの健全性を取り戻すため、銀行の資産内容を徹底的に点検する。不良債権の実態を明らかにし、損失の先送りや不透明な処理を断つことで、信用不安と貸し渋りの連鎖を止める足がかりとする。"
 JAP_population_tax_tt: "人口税率が35以下である"
 JAP_public_capital_injection_banks: "銀行への公的資本注入"
 JAP_public_capital_injection_banks_desc: "金融不安の拡大を防ぐため、銀行の自己資本を補強し、信用供給を維持する。預金者と市場の不安を抑え、企業や家計への資金の流れを途切れさせないことで、景気の急激な悪化を回避する。"
 JAP_disposal_non_performing_loans: "危険な不良債権の処理"
 JAP_disposal_non_performing_loans_desc: "金融システムを蝕む危険な不良債権を整理し、銀行の帳簿を軽くする。"
 JAP_bank_supervision: "銀行監督の強化"
 JAP_bank_supervision_desc: "検査と是正を一過性で終わらせず、監督体制を恒常的に強化する。開示とガバナンスを徹底し、リスク管理の甘さや不透明な処理を繰り返さないことで、金融システムへの信頼を安定させる。"
 JAP_business_assessment: "公正な事業評価"
 JAP_business_assessment_desc: "企業の実力とリスクを正確に見極めるため、事業の採算性や将来性を客観的に評価する。温存や延命に頼らず、再建すべき領域と整理すべき領域を切り分け、資金と人材が成長分野へ向かう土台を整える。"
 JAP_corporate_debt_restructuring: "企業の債務再編"
 JAP_corporate_debt_restructuring_desc: "過剰な債務負担を整理し、再建に必要な時間と余力を確保する。利払いと返済に追われる状態から脱し、投資・雇用・事業転換に資源を振り向けられるようにすることで、停滞の連鎖を断ち切る。"
 JAP_support_restructuring_unprofitable_sectors: "不採算部門の再編支援"
 JAP_support_restructuring_unprofitable_sectors_desc: "不採算部門の整理を進める企業に対し、再編を円滑に進めるための支援を行う。急激な雇用悪化や地域への打撃を抑えつつ、事業の選択と集中を促し、持続可能な体制への移行を後押しする。"
 JAP_m_and_a: "M&A・事業統合"
 JAP_m_and_a_desc: "企業間の統合と再編を促し、重複投資や過剰設備を整理する。規模の経済と経営資源の集約を通じて、生産性の底上げと研究開発の強化につなげ、競争力の回復を図る。"
 JAP_corporate_revitalization: "企業の再生"
 JAP_corporate_revitalization_desc: "再建を一段落させ、財務と事業の両面で企業の基盤を整える。過剰な負担と非効率を整理し、投資・雇用・賃上げに踏み出せる状態へ移行することで、民間主導の回復を確かなものにする。"
 JAP_expectations_escaping_deflation: "成長期待の回復"
 JAP_expectations_escaping_deflation_desc: "不良債権処理と過剰債務の整理を経て、経済の焦点を「守り」から「攻め」へ移す。企業が投資・研究開発・人材への支出を再開し、家計にも将来の見通しが戻れば、生産性と賃金の好循環が生まれやすくなる。競争力回復を本格化させるための土台を整える。"
 JAP_public_private_calls_wage_increases: "官民一体の賃上げ要請"
 JAP_public_private_calls_wage_increases_desc: "政府が旗を振り、経済界と連携して賃上げの動きを広げる。企業の収益改善を賃金に結びつけ、家計の購買力を底上げすることで、需要の回復と物価の安定につなげる。"
 JAP_phased_increases_to_the_minimum_wage: "最低賃金の段階的引き上げ"
 JAP_phased_increases_to_the_minimum_wage_desc: "最低賃金を段階的に引き上げ、働く人の所得の底上げを図る。低所得層の購買力を高め、内需の回復につなげるとともに、賃金上昇が広がる環境を整える。"
 JAP_promoting_labor_mobility: "労働者移動の促進"
 JAP_promoting_labor_mobility_desc: "成長分野へ人材が移りやすい環境を整え、労働力の再配置を進める。転職や再就職の障壁を下げ、技能の更新を後押しすることで、産業の新陳代謝と生産性の向上につなげる。"
 JAP_competition_service_sector: "サービス産業の競争促進"
 JAP_competition_service_sector_desc: "サービス産業の参入と競争を促し、停滞の要因となっている非効率や価格の硬直性を改める。規制や慣行の見直しを通じて事業環境を整え、より良いサービスが選ばれやすい市場へと転換していく。"
 JAP_improving_domestic_service_sector: "国内サービス業環境整備"
 JAP_improving_domestic_service_sector_desc: "国内のサービス業が伸びやすい条件を整え、需要の受け皿を広げる。現場の負担となっている手続きや慣行を見直し、投資と人材育成が進む環境を整えることで、持続的な内需の回復につなげる。"
 JAP_international_liberalization_service_sector: "サービス部門の国際解放"
 JAP_international_liberalization_service_sector_desc: "サービス分野を国際的に開き、外部の競争と知見を取り込む。海外企業の参入や国際標準との整合を進め、利用者の選択肢を広げることで、国内市場の閉鎖性を改め、活性化につなげる。"
 JAP_revitalization_economy: "日本経済の再生"
 JAP_revitalization_economy_desc: "金融と企業の再建を進め、需要の回復と賃金の改善に道筋をつけた。停滞の原因を一つずつ取り除き、家計と企業が将来を見通せる環境を整えることで、成長に向けた流れを定着させる。"
 JAP_work_style_reform: "働き方改革"
 JAP_work_style_reform_desc: "長時間労働の是正と、多様な働き方を選べる環境づくりに着手する。雇用の安定と生活の両立を支え、現場の負担を減らしながら、人材が活躍し続けられる基盤を整える。"
 JAP_cap_on_overtime_hours: "残業時間の上限設定"
 JAP_cap_on_overtime_hours_desc: "長時間労働を抑えるため、残業時間に明確な上限を設ける。健康被害と過労のリスクを減らし、労務管理を適正化することで、働き方の改善を制度として定着させる。"
 JAP_mandating_paid_leave: "有給休暇の義務化"
 JAP_mandating_paid_leave_desc: "休暇を取りやすい環境を制度として整え、一定の有給休暇取得を義務付ける。休養を確保し、心身の不調や離職を減らすことで、職場の定着と持続的な働き方につなげる。"
 JAP_digitalization_management: "勤怠管理のデジタル化支援"
 JAP_digitalization_management_desc: "勤怠管理のデジタル化を後押しし、労働時間の把握と管理を正確にする。現場の事務負担を減らし、法令遵守を徹底しながら、過重労働の見落としを防ぐ体制を整える。"
 JAP_equal_pay_for_equal_work: "同一労働同一賃金"
 JAP_equal_pay_for_equal_work_desc: "雇用形態による不合理な待遇差を是正し、同じ仕事には同じ水準の賃金と処遇を確保する。働き手の納得感と人材確保を高め、正規・非正規の分断を弱めることで、安定した雇用環境につなげる。"
 JAP_minimum_rest: "勤務間インターバルの確保"
 JAP_minimum_rest_desc: "終業から次の始業まで一定の休息時間を確保し、連続勤務による疲労の蓄積を防ぐ。睡眠と回復の時間を守り、健康障害やミスを減らすことで、無理のない勤務体制を定着させる。"
 JAP_flexible_working: "フレックスタイム制の拡充"
 JAP_flexible_working_desc: "勤務時間の柔軟性を高め、生活事情に合わせた働き方を選びやすくする。通勤混雑の緩和や育児・介護との両立を後押しし、働き続けられる環境を広げていく。"
 JAP_ideal_working_styles: "理想の働き方"
 JAP_ideal_working_styles_desc: "長時間労働に依存しない働き方を定着させ、多様な事情を抱える人でも安心して働き続けられる環境を整えた。休むべきときに休み、必要なときに柔軟に働ける仕組みを通じて、仕事と生活の両立を当たり前にする。"
 JAP_basic_policy_declining_birthrate_society: "少子化社会対策大綱"
 JAP_basic_policy_declining_birthrate_society_desc: "少子化への対応を国の最優先課題として位置づけ、子育てと生活を支える施策を総合的に整理する。家庭が将来を見通せる環境を整え、仕事と子育ての両立を後押しすることで、出生率の改善に向けた土台を築く。"
 JAP_zero_waiting: "待機児童ゼロ作戦"
 JAP_zero_waiting_desc: "保育の受け皿を拡充し、必要な家庭が確実に保育サービスを利用できる体制を整える。保育士の確保と施設整備を進め、子育てと就労の両立を妨げる要因を減らしていく。"
 JAP_increasing_childbirth_allowance: "出産一時金の増額"
 JAP_increasing_childbirth_allowance_desc: "出産に伴う初期費用の負担を軽減し、安心して出産を迎えられる環境を整える。経済的な不安を和らげ、子どもを持つ選択をしやすくすることで、出生率の下支えにつなげる。"
 JAP_free_early_childhood_education: "幼児教育・保育の無償化"
 JAP_free_early_childhood_education_desc: "幼児教育と保育にかかる費用負担を軽減し、子育て世帯の家計を支える。教育機会の格差を広げない環境を整え、就労と子育ての両立を後押しすることで、子どもを持ちやすい社会につなげる。"
 JAP_parental_leave: "育休の推進"
 JAP_parental_leave_desc: "育児休業を取得しやすい環境を整え、出産後も仕事を続けられる選択肢を広げる。職場の理解と制度運用を進め、男女を問わず子育てに参加できる体制をつくることで、家庭の負担を分散し、出生への不安を和らげる。"
 JAP_child_allowances: "児童手当拡充"
 JAP_child_allowances_desc: "子育てにかかる継続的な費用負担を軽減するため、児童手当を拡充する。家計の見通しを立てやすくし、教育や生活への不安を和らげることで、子どもを持つ選択を後押しする。"
 JAP_fertility_treatment: "不妊治療の保険適用"
 JAP_fertility_treatment_desc: "不妊治療の経済的負担を軽減し、必要な人が治療を受けやすい環境を整える。費用面の障壁を下げることで、妊娠・出産に向けた選択肢を広げ、希望を実現しやすくする。"
 JAP_raising_children_is_easier: "子育てしやすい社会"
 JAP_raising_children_is_easier_desc: "子育てに伴う負担を社会全体で支える仕組みを整え、安心して家庭を築ける環境を広げた。保育・教育・経済支援を組み合わせ、仕事と子育ての両立を当たり前にすることで、将来への不安を和らげ、出生率の改善につなげる。"
 JAP_save_ice_age_generation: "就職氷河期を救え！"
 JAP_save_ice_age_generation_desc: "就職氷河期世代が直面してきた不安定雇用や低賃金、技能形成の遅れを、社会全体の課題として正面から扱う。就労機会の確保と再挑戦の道筋を整え、生活の安定と将来設計ができる環境を取り戻すことで、分断と停滞を長引かせない。"
 JAP_hello_work: "ハローワーク刷新"
 JAP_hello_work_desc: "職業紹介を「とりあえずの窓口」から、再就職まで伴走する実務機関へと作り替える。求人の質の見える化とマッチングの精度向上を進め、必要な人に必要な仕事と支援が届く体制を整える。"
 JAP_expanding_social_insurance_coverage: "社会保険の適用拡大"
 JAP_expanding_social_insurance_coverage_desc: "働き方にかかわらず、必要な人が社会保険に加入できるよう適用範囲を広げる。制度の穴を減らし、医療・年金・雇用の不安を和らげることで、非正規雇用に偏りやすい層の生活基盤を安定させる。"
 JAP_vocational_training: "職業訓練の拡充"
 JAP_vocational_training_desc: "再挑戦の土台となる技能を身につけられるよう、職業訓練の機会を広げる。需要の高い分野への転換を後押しし、学び直しから就職までをつなげることで、長期停滞を断ち切る足場を整える。"
 JAP_digital_reskilling: "デジタル再教育パッケージ"
 JAP_digital_reskilling_desc: "デジタル分野で通用する基礎スキルから実務力まで、段階的に学び直せる支援をまとめて提供する。学習の負担を減らし、就労につながる訓練と認定を整えることで、未経験からでも再挑戦できる道を広げる。"
 JAP_converting_regular_employment: "正規転換補助金"
 JAP_converting_regular_employment_desc: "非正規から正規雇用への転換を進める企業を支援し、安定した働き口を増やす。雇用の固定化を崩し、キャリア形成と生活設計が可能になる環境を広げることで、氷河期世代の不安定さを長期化させない。"
 JAP_job_change_market: "中途採用・転職市場の整備"
 JAP_job_change_market_desc: "年齢や経歴に左右されにくい中途採用・転職の仕組みを整え、再挑戦の機会を広げる。求人情報の透明性と評価基準を改善し、経験や技能が適切に見られる環境をつくることで、労働移動を円滑にする。"
 JAP_rent_housing_support: "家賃補助・住宅確保支援"
 JAP_rent_housing_support_desc: "住まいの不安を減らし、就労や転居の選択を妨げないよう支援を行う。家賃負担の軽減と住宅確保の仕組みを整え、生活の立て直しと再出発を後押しする。"
 JAP_support_marriage_and_starting_a_new: "結婚・新生活スタート支援"
 JAP_support_marriage_and_starting_a_new_desc: "結婚や同居の開始に伴う初期費用の負担を和らげ、新生活を始めやすい環境を整える。住まい・家計・手続きの壁を下げ、将来設計への不安を減らすことで、家庭形成の選択肢を広げる。"
 JAP_reviving_lost_generation: "失われた世代の再起"
 JAP_reviving_lost_generation_desc: "不安定雇用の固定化を崩し、学び直しと再就職、生活の基盤づくりを一体で進めてきた。就職氷河期世代が将来を見通せる雇用と待遇を確保し、家庭形成や資産形成に踏み出せる環境を整えることで、長期の分断を乗り越える。"
 JAP_industries: "日本の産業"
 JAP_industries_desc: "地域に根ざした農林水産業から、製造業、サービス、先端技術まで、日本の強みを産業全体で引き出す。国内の雇用と供給体制を支えつつ、輸出競争力と新しい成長分野への投資を両立させ、産業基盤を次の時代へつなげていく。"
 JAP_rice_and_sake: "米と酒"
 JAP_rice_and_sake_desc: "米は日本人の主食であり、食卓と農村を支える基盤だ。そして米で作られる日本酒は、各地の気候や水、蔵の技によって個性が分かれ、国内外へ誇れる「日本らしさ」を体現している。"
 JAP_wagyu: "和牛"
 JAP_wagyu_desc: "和牛は、きめ細かな霜降りと旨味で知られる日本の代表的な高級食材だ。飼育技術と品質管理を強みに、国内の食文化を支えつつ、ブランドとして海外需要も取り込める産業へ育てていく。"
 JAP_seafood: "島国の海産物"
 JAP_seafood_desc: "島国である日本は、海とともに暮らしてきた。多様な海域が育む魚介類は、日々の食卓から地域の産業まで支える重要な資源であり、日本の食文化を形づくる特色でもある。"
 JAP_automobiles: "日本の自動車"
 JAP_automobiles_desc: "日本の自動車産業は、高い品質と信頼性、部品供給網の厚みを強みに成長してきた。トヨタ、ホンダ、日産、マツダ、スバル、スズキ、三菱自動車といったメーカーが国内の雇用と輸出を支える中核となり、次世代技術への対応と競争力の維持に取り組む。"
 JAP_japanese_brand: "日本ブランドの確立"
 JAP_japanese_brand_desc: "品質と信頼を強みに、製品やサービスの価値を「日本ブランド」として一貫して示す。産地・技術・デザイン・安全性といった要素を磨き上げ、国内外で選ばれる理由を明確にすることで、価格競争に依存しない競争力を築く。"
 JAP_semiconductor: "半導体・電子部品の育成"
 JAP_semiconductor_desc: "半導体と電子部品は、あらゆる産業の基盤となる戦略分野だ。材料・製造装置・部品といった強みを活かし、研究開発と供給体制を強化することで、国内の産業基盤と技術競争力を支えていく。"
 JAP_machinery_that_supports_manufacturing: "完成を支える機械作り"
 JAP_machinery_that_supports_manufacturing_desc: "日本のものづくりを根底で支えるのは、加工・組立・検査を担う精密な機械だ。工作機械や生産設備の技術を磨き、現場の要求に応える装置を作り続けることで、多様な産業の品質と供給力を支える。"
 JAP_small_factory_craftsmanship: "町工場技術の保護"
 JAP_small_factory_craftsmanship_desc: "町工場が培ってきた加工・金型・表面処理などの技能は、日本のものづくりを支える土台だ。担い手の確保と技術継承を進め、取引環境を改善することで、地域に根ざした技術を失わず次世代へつなげる。"
 JAP_broadband: "ブロードバンド基盤の整備"
 JAP_broadband_desc: "全国で安定した高速通信を利用できるよう、ブロードバンドの基盤を整備する。都市と地方の格差を縮め、企業活動や教育、行政サービスのオンライン化を支えることで、デジタル社会の土台を固める。"
 JAP_games_are_fun: "ゲームは楽しい！"
 JAP_games_are_fun_desc: "ゲームは、日本が世界に誇る娯楽文化のひとつだ。任天堂は家庭用ゲーム機とキャラクターIPで幅広い世代に遊びを届け、ソニー（PlayStation）はハードとオンラインサービスを軸に世界規模の市場を築いてきた。創造性と技術を結びつけ、国内の産業と発信力を支える分野として発展させていく。"
 JAP_cool_japan: "クールジャパンのデジタル輸出"
 JAP_cool_japan_desc: "アニメ、ゲーム、音楽、映像といった日本のコンテンツを、デジタル市場で継続的に届ける仕組みを整える。配信・翻訳・権利管理を強化し、海外の需要を取り込みながら、文化的な発信力と産業としての収益性を高めていく。"
 JAP_port_logistics: "港湾物流の近代化"
 JAP_port_logistics_desc: "港湾の荷役・保管・通関などの物流機能を更新し、輸出入の流れを滞りにくくする。手続きの効率化と設備の整備を進め、国際物流の競争力を維持しながら、サプライチェーンの安定性を高めていく。"
 JAP_fiber_optic_rollout: "光回線の全国展開"
 JAP_fiber_optic_rollout_desc: "高速で安定した通信を全国に行き渡らせるため、光回線の整備を広げる。都市と地方の接続格差を縮め、在宅勤務や学習、企業活動のオンライン化を支える基盤を確立する。"
 JAP_diplomacy: "日本の外交"
 JAP_diplomacy_desc: "世界との関係を再構築し、国際社会における日本の役割を再定義する。"
 JAP_diplomacy_idea_TT: "§Y外交ツリーを進めるとこの国民精神に補正が追加されていく！§!"
 JAP_friendship_asean: "ASEANとの関係改善"
 JAP_friendship_asean_desc: "日本政府はASEAN諸国との関係改善に取り組み、信頼の回復と対話の促進を進める。ASEANは日本にとって、経済・安全保障の両面で欠かせない重要なパートナーであり、その結束と安定は地域全体の将来を左右する。"
 JAP_not_asean_war_TT: "「ASEAN加盟国」の国民精神を持つ国が少なくとも1か国存在し、かつ日本が「ASEAN加盟国」の国民精神を持ついずれの国とも戦争状態にない。"
 JAP_chiang_mai: "チェンマイ・イニシアティブ"
 JAP_chiang_mai_desc: "チェンマイ・イニシアティブを通じて、日本は地域の金融協力を強化し、ASEAN諸国の経済的安定と結束を支える。"
 JAP_quantitative_oda: "量的ODA"
 JAP_quantitative_oda_desc: "交通、港湾、エネルギーといった基幹インフラへの大規模なODA投資を通じて、日本はASEANの経済成長と地域連結性を支援する。"
 JAP_qualitative_oda: "質的ODA"
 JAP_qualitative_oda_desc: "現地の企業や機関と連携することで、日本は人的資本の育成と民主的価値観を促進し、ASEAN全域での影響力を高める。"
 JAP_security_south_china_sea: "南シナ海での安全保障姿勢"
 JAP_security_south_china_sea_desc: "ASEAN諸国の信頼を後ろ盾に、日本は南シナ海における中立的かつ平和的な海上安全保障の枠組みを立ち上げる。"
 JAP_away_dependence: "対米依存からの脱却"
 JAP_away_dependence_desc: "日本は長年の関係のあり方を見直し始め、戦略的な選択肢と自律性を拡大しようとする。経済、技術、安全保障といった分野で、将来に対する自国のビジョンに基づく路線を追求する。"
 JAP_development_production: "国内生産体制の確立"
 JAP_development_production_desc: "国防を独力で確保するため、日本国内で兵器や資材を生産できる体制を整備する。"
 JAP_japanese_doctrine: "日本独自ドクトリンの策定"
 JAP_japanese_doctrine_desc: "独立した日本の安全保障ドクトリンを確立し、我が国の戦略環境に即した柔軟な対応を可能にする。"
 JAP_recalling_researchers: "海外研究者の呼び戻し"
 JAP_recalling_researchers_desc: "米国で働く日本人科学者が帰国するよう、インセンティブを整備する。大学や国立研究機関は、迅速な採用枠、設備更新、競争力のある研究助成を提示し、長年続いた人材流出を反転させて国内の研究力を再建することを狙う。"
 JAP_japanese_cloud: "霞が関クラウド"
 JAP_japanese_cloud_desc: "日本の事業者が運用し、国内サーバー上でホストされる政府運営の「霞が関クラウド」を構築する。各省庁と主要機関はシステムをこの共通基盤へ移行し、コスト削減、セキュリティの標準化、機微なデータを国家の管理下に置くことを実現する。"
 JAP_base_okinawa: "沖縄の米軍撤退協議"
 JAP_base_okinawa_desc: "日本の安全保障上の自律性を高めるため、沖縄に駐留する米軍の撤退に向けた交渉を開始する。"
 JAP_enhancement_exercises: "共同演習の拡充"
 JAP_enhancement_exercises_desc: "より大規模で頻度の高い共同演習を通じて、米軍との統合を深める。海上・航空・地上部隊は、共通の手順、通信、兵站を反復訓練し、実際の危機において両者が単一の調整された戦力として移動し、戦い、補給できるようにする。"
 JAP_education_jap_usa: "日米共同教育プログラム"
 JAP_education_jap_usa_desc: "日本と米国の相互理解を深めるため、共同教育プログラムや学生交流を導入する。日本の規律意識と米国の起業家精神から学ぶことで、国際感覚を備えた新たな世代のリーダーを育成し、二国間の信頼をさらに強化する。"
 JAP_culture_technology: "日米テック・カルチャー交流"
 JAP_culture_technology_desc: "大学の研究室やスタジオを、シリコンバレー、シアトル、ロサンゼルスのパートナーと組み合わせることで、日本企業と米国のテック拠点の結びつきを強化する。技術者、デザイナー、クリエイターが共同プロジェクトのために行き来し、米国のプラットフォーム運用ノウハウと、日本のハードウェア、ゲーム、アニメーションを融合させる。"
 JAP_dual_use: "デュアルユース技術協力"
 JAP_dual_use_desc: "日本と米国は、民生・軍事の双方に応用可能なデュアルユース技術分野での協力を深める。産業界と学術界の連携を通じて、このパートナーシップは研究開発を加速させ、技術全体の発展を押し上げる。"
 JAP_okinawa_development: "沖縄共同開発プロジェクト"
 JAP_okinawa_development_desc: "沖縄の経済成長と地域統合を促進するため、日本と米国はインフラ整備を中心とする共同開発プロジェクトで協力する。交通ネットワーク、物流システム、公共施設を改善することで、本施策は地域の成長を高めると同時に、日米協力の新たな道を開くことを目指す。"
 JAP_informal_cooperation: "非公式協力の枠組み"
 JAP_informal_cooperation_desc: "正式な外交関係がないにもかかわらず、日本と台湾は実務的で実質的な協力関係を築いてきた。災害対応、技術交流、人的交流を通じて、相互に利益のある基盤が形成されつつある。"
 JAP_disaster_countermeasure_cooperation: "日台防災知見プラットフォーム"
 JAP_disaster_countermeasure_cooperation_desc: "自然災害への脆弱性を共有していることを踏まえ、日本と台湾は災害対応の専門知識や教訓を共有するための共同プラットフォームを設立する。この協力により、両国のレジリエンス（強靭性）と復旧能力が高まる。"
 JAP_tai_high_technology: "日台ハイテク連携"
 JAP_tai_high_technology_desc: "日本と台湾の研究機関および民間企業が連携し、最先端の民生技術で共同研究を行う。この協力関係は、両国の産業におけるイノベーションと生産性を高めることを目的とする。"
 JAP_tai_tourist_visa: "観光ビザ政策の緩和"
 JAP_tai_tourist_visa_desc: "台湾からのインバウンド観光をさらに促進するため、日本はビザ手続きを緩和する。人的交流と観光の増加は、経済を刺激し、相互理解をより深める助けとなる。"
 JAP_tai_international_student: "学生交流プログラムの拡充"
 JAP_tai_international_student_desc: "日本は、台湾の学生が日本の大学で学ぶ機会を拡大する。本施策は、学術的・文化的な結びつきを深めると同時に、両社会をつなぐ将来のリーダーを育成することを目的とする。"
 JAP_tai_senkaku: "対台海域協議の整備"
 JAP_tai_senkaku_desc: "尖閣諸島をめぐる日本と台湾の見解差は、東シナ海における操業・警備・外交関係に影響を及ぼしうる。わが国の立場を堅持しつつ、現場での摩擦を抑えるための対話窓口と実務協議の枠組みを整備する。対立の管理と権益の確保を両立させることで、尖閣諸島問題に関する対台交渉を解禁する。"
 JAP_dprk_national_policy: "北部半島ドクトリン"
 JAP_dprk_national_policy_desc: "北朝鮮は依然として我々の海岸に最も近い火種であり、半島で最も予測不能な主体である。我々は、平壌に対する統一された国家政策を定義し、外交・情報・即応態勢を単一のドクトリンへと同期させる。我々が選ぶ方向性は、北東アジアにおける安全保障の条件を定めることになる。"
 JAP_dprk_maximum_pressure: "平壌への最大圧力"
 JAP_dprk_maximum_pressure_desc: "北朝鮮が理解するのは善意ではなく、てこ（圧力）である。われわれは制裁執行を強化し、海上監視を拡大し、外交的圧力を連携させることで、平壌のエスカレーションの余地を抑え込む。目標は単純だ。あらゆる挑発のコストを引き上げ、最終的に体制が再計算を余儀なくされるまでそれを続けることだ。"
 JAP_dprk_missile_defense: "多層ミサイル防衛網"
 JAP_dprk_missile_defense_desc: "北からの脅威は、日単位ではなく分単位で測られる。われわれは、陸・海・空にまたがる多層的なミサイル防衛網を強化し、都市・港湾・指揮中枢を突発的な攻撃から守る。信頼に足る防壁は、平壌が遠方からわれわれを威嚇する力を奪うだろう。"
 JAP_dprk_trilateral_training: "三国間半島演習"
 JAP_dprk_trilateral_training_desc: "半島の安全保障は、宣言だけに依拠することはできない。韓国および米国との共同訓練は、この地域で最も危険な火種における即応態勢、相互運用性、危機対応を改善するだろう。共同で演習を行うことによって、われわれは侵略に対して協調した対応が取られることを示す。"
 JAP_dprk_korean_defense_treaty: "日韓防衛協定"
 JAP_dprk_korean_defense_treaty_desc: "半島と日本列島は、同じ前線を共有している。韓国との正式な防衛協定は、情報共有、緊急事態計画、相互の安全保障上の約束を、持続的な枠組みへと結びつけるだろう。古い遺恨はなお残るが、戦略的必要性はより強固な土台を求めている。"
 JAP_dprk_conditional_engagement: "平壌への条件付き対話ルート"
 JAP_dprk_conditional_engagement_desc: "圧力だけでは、あらゆる危機を管理することはできない。われわれは、ミサイル実験、軍事的事件、地域の不安定化に関する厳格な条件と結び付けた、北朝鮮への統制された外交ルートを開く。対話は抑止に取って代わるものではないが、誤算を防ぐ助けにはなり得る。"
 JAP_dprk_normalization_framework: "正常化ロードマップ"
 JAP_dprk_normalization_framework_desc: "安定した北東アジアには、恒久的な危機管理以上のものが必要である。われわれは、北朝鮮との正常化に向けた段階的な枠組みを確立し、外交上の進展を、検証可能な安全保障上の約束および地域的保証と結び付ける。いかなる合意も、段階的で、履行を強制可能であり、相互主義に根差したものでなければならない。"
 JAP_dprk_support_unification: "統一朝鮮半島を支援"
 JAP_dprk_support_unification_desc: "朝鮮の分断は何世代にもわたり東アジアの安全保障を形作ってきたが、それが恒久的である必要はない。われわれは、外交、パートナーとの協調、そして地域の安定に向けた計画を通じて、朝鮮統一への平和的な道を支援する。半島が再編されるのであれば、日本はその後に続く秩序の形成に関与しなければならない。"
 JAP_history_education: "歴史教育の透明性"
 JAP_history_education_desc: "教育教材と指導指針を見直し、歴史的事実に正面から向き合わなければならない。透明性のある歴史教育は、近隣諸国との信頼を築く第一歩である。"
 JAP_statement: "[ROOT.GetLeader]談話"
 JAP_statement_desc: "歴史的出来事について、責任と反省の明確な立場を示すため、政府は新たな公式声明を発出する。本施策は、影響を受けた諸国との和解を促進し、相互信頼に基づく未来志向の関係を推進することを目的とする。"
 JAP_intellectual_platform: "日中韓・歴史プラットフォーム"
 JAP_intellectual_platform_desc: "国連の仲介のもと、日本・中国・韓国は、戦争の記憶を未来世代へ伝えるため、博物館とデジタル・アーカイブを共同で計画・設立する。日本は資金面で支援し、この取り組みを平和と和解の世界的象徴として位置付ける。"
 JAP_intellectual_platform_TT: "§Y両国が合意に達した場合、§G安定度§!を上昇させる国民精神が3か国すべてに付与される！§!"
 JAP_chi_friendship: "中国との関係改善"
 JAP_chi_friendship_desc: "日中関係の安定化に向け、日本政府は対話を重ね、相互理解の促進と摩擦の管理に取り組む。中国は地域秩序と経済に大きな影響を持つ隣国であり、関係の改善は日本の安全保障と繁栄に直結する。"
 JAP_chi_accept_intellectual_platform: "中国が日中韓・歴史プラットフォームの設立に合意した。"
 JAP_chi_trade_support: "中国の貿易制度改革への支援"
 JAP_chi_trade_support_desc: "中国の貿易制度の改革・近代化に対し、技術面および制度面の支援を提供する。これにより、日本企業の参入をより円滑にし、地域における日本の影響力を高める。"
 JAP_chi_advancement_companies: "企業の相互市場参入"
 JAP_chi_advancement_companies_desc: "日本企業と中国企業の相互投資および市場参入を促進し、経済的な相互依存を高め、生産性を向上させる。"
 JAP_chi_kanji: "「漢字文化圏」文化協力プロジェクト"
 JAP_chi_kanji_desc: "漢字文化圏に属する国々の文化的つながりを強化することで、本プロジェクトは共有される価値観と歴史的結びつきを強調し、外部からの影響に対する文化的な緩衝材として機能させる。"
 JAP_chi_temple: "日中・仏教寺院保全共同プロジェクト"
 JAP_chi_temple_desc: "仏教寺院を共通の文化遺産として保全するため、日本と中国の協力を進める。本プロジェクトは、寺院の観光資産としての価値を高めるとともに、両国間の歴史的な結びつきを再確認する。"
 JAP_chi_senkaku: "尖閣問題の外交管理"
 JAP_chi_senkaku_desc: "尖閣諸島をめぐる緊張は、日中関係全体と東シナ海の安定に直結している。主権の立場を堅持しつつも、偶発的衝突を避けるための外交的な管理枠組みを整える必要がある。対話の窓口を正式に設け、海上での摩擦を抑制しながら、わが国に有利な環境で交渉を進めていこう。"
 JAP_kor_friendship: "韓国との関係改善"
 JAP_kor_friendship_desc: "未来志向の日韓関係に向け、日本政府は信頼の回復と対話の継続に取り組む。韓国は日本にとって、地域の安定と経済に直結する最も重要な隣国の一つであり、関係改善は日本の選択肢と影響力を広げる。"
 JAP_kor_accept_intellectual_platform: "韓国が日中韓・歴史プラットフォームの設立に合意した。"
 JAP_kor_accelerator: "東京―ソウル・アクセラレーター"
 JAP_kor_accelerator_desc: "東京とソウルに共同アクセラレーター・プログラムを設立し、スタートアップ企業を支援・育成する。これにより、両首都間のイノベーションと経済協力を強化する。"
 JAP_kor_local_companies: "地域企業交流イニシアチブ"
 JAP_kor_local_companies_desc: "地域企業同士の連携を促進し、地方レベルで民生産業の成長と発展を加速させる。"
 JAP_kor_cultural_exchange: "文化交流"
 JAP_kor_cultural_exchange_desc: "文化交流を推進することで、両国民の相互理解を深め、世論への影響力を高めるための基盤を築く。"
 JAP_kor_aging: "日韓・高齢社会タスクフォース"
 JAP_kor_aging_desc: "高齢化社会という共通課題に対処するため、日韓の共同タスクフォースを設置し、月例協議を通じて協力政策を策定する。"
 JAP_kor_liancourt_rocks: "竹島問題の外交管理"
 JAP_kor_liancourt_rocks_desc: "竹島（独島）をめぐる対立は、日韓関係全体に影響を及ぼしうる重要な懸案である。わが国の立場を堅持しつつ、偶発的な摩擦や外交的緊張の拡大を避けるため、対話と実務協議の枠組みを整備する。これにより、竹島（独島）問題に関する対韓交渉を解禁する。"
 JAP_approaching_russia: "ロシアとの関係改善"
 JAP_approaching_russia_desc: "地政学的安定を確保し、資源へのアクセスを維持するため、ロシアとの関係改善を目的とした外交路線を進める。エネルギー、インフラ、貿易における協力に重点を置く。"
 JAP_sov_far_east_development: "極東イニシアチブ"
 JAP_sov_far_east_development_desc: "北海道の寒冷地における地域活性化の知見を活用し、インフラ投資と外資導入を通じてロシア極東の寒冷地開発を促進する。"
 JAP_sov_saakhalin: "サハリンII"
 JAP_sov_saakhalin_desc: "化石燃料への安定的なアクセスを確保するため、日本はロシアと協力しつつ、サハリンIIエネルギー事業への対外投資を強化する。"
 JAP_sov_logistics_corridor: "日欧物流回廊"
 JAP_sov_logistics_corridor_desc: "ロシア経由で日本と欧州を結ぶ陸上物流回廊を整備する。ロシアの鉄道・幹線道路を活用し、輸送時間の短縮と欧州市場への安定的なアクセス確立を目指す。"
 JAP_sov_it_corridor: "ロシア・デジタル回廊"
 JAP_sov_it_corridor_desc: "日本のIT企業と協力し、ロシア国内にデータセンターや光ファイバー網などのインフラを整備する。これにより、欧州・中央アジア・ロシアを結ぶデジタル貿易ネットワークを構築する。"
 JAP_sov_kuril_islands: "北方領土問題の外交管理"
 JAP_sov_kuril_islands_desc: "北方領土をめぐる問題は、日露関係の根幹に関わる未解決の懸案である。わが国の立場を堅持しつつ、対立の固定化を避けるため、外交交渉と実務協議の枠組みを整備する。対露関係を慎重に管理しながら、北方領土問題に関する交渉を解禁する。"
 JAP_defensive_foundations: "防衛の基盤"
 JAP_defensive_foundations_desc: "日本は、自衛隊の基本的な防衛態勢を強化し、憲法第9条の厳格な専守防衛解釈の範囲内にとどまりつつ、本土防衛、危機対応、抑止に重点を置く。"
 JAP_jgsdf: "陸上自衛隊の強化"
 JAP_jgsdf_desc: "陸上自衛隊は、機動性、訓練、即応態勢の向上を通じて防衛能力を高める。これらの措置により、既存の法的・戦略的制約を厳格に順守しつつ、本土を守る能力を維持する。"
 JAP_type_x_mbt: "10式主力戦車の配備"
 JAP_type_x_mbt_desc: "10式は、日本の装甲開発における飛躍を示す――より軽量で、より高速であり、日本の厳しい地形全体への迅速な展開のために特別に設計されている。この先進的なプラットフォームの生産を拡大し、乗員を訓練することで、陸上自衛隊は国内の脅威に迅速に対応する能力を強化する。"
 JAP_type_manouvre_combat_vehicle: "16式機動戦闘車"
 JAP_type_manouvre_combat_vehicle_desc: "16式機動戦闘車は、即応部隊に高い機動性を備えた火力を提供する。その車輪式の構成により、陸上自衛隊は列島全体で部隊を迅速に再配置でき、重装甲の兵站に頼ることなく遠隔地域を増援できる。"
 JAP_wheeled_howitzer: "19式装輪自走榴弾砲"
 JAP_wheeled_howitzer_desc: "機動砲兵の新世代――19式――は、現代的な射撃管制システムと迅速な再配置能力を組み合わせる。その装輪式シャーシにより、日本の分散し険しい地理条件全体にわたる防衛作戦に対して、柔軟な支援を可能にする。"
 JAP_chu_sam: "03式中SAM網の拡充"
 JAP_chu_sam_desc: "日本は、03式中SAM（Chu-SAM）部隊を追加配備することで、防空態勢を強化する。これらの現代的な中距離ミサイル・システムは、航空侵入に対する防護を強化し、国家の早期警戒・追跡インフラとシームレスに統合される。"
 JAP_type_atgm: "歩兵対戦車ミサイル部隊の更新"
 JAP_type_atgm_desc: "陸上自衛隊は、歩兵および偵察要素に、01式および96式の更新型を含む改良された対戦車誘導ミサイル・システムを装備させる。これらの更新により、地上部隊は、いかなる防衛交戦においても現代的な装甲の脅威に対抗できる能力を維持する。"
 JAP_central_readiness_force: "中央即応集団の拡充"
 JAP_central_readiness_force_desc: "中央即応集団は、日本のどこで発生する緊急事態にも対応できる、柔軟で迅速に展開可能な司令部へと発展させられる。統合訓練、機動性、方面隊との協調を改善することで、地上部隊が短時間で重要地域を増援できることを確保する。"
 JAP_civil_protection_act: "民間防護枠組みの実施"
 JAP_civil_protection_act_desc: "新たな民間防護措置は、自衛隊、地方当局、警察、緊急サービス間の協力を制度化する。避難、危機対応、インフラ防護のための明確な法的手続きは、災害と安全保障上の事案のいずれにおいても、日本が住民を守る能力を強化する。"
 JAP_maritime_self_defence_force: "海上自衛隊の強化"
 JAP_maritime_self_defence_force_desc: "海上自衛隊は、海上における高テンポの作戦を維持するため、訓練、整備、支援体制の改善によって強化される。護衛群、哨戒能力、海軍兵站を強化することで、日本は重要な海上交通路と沿岸水域をより良く守ることができる。"
 JAP_amphibious_rapid_deployment: "水陸機動団の訓練"
 JAP_amphibious_rapid_deployment_desc: "日本の離島における危機に対応するため、専用の水陸両用の迅速展開部隊編成が設立される。歩兵、装甲、海上輸送力を組み合わせ、この旅団は、日本の海上フロンティアに沿う重要な領域を増援し、確保し、必要であれば奪還するために訓練される。"
 JAP_atago_destroyer: "先進イージス駆逐艦の就役"
 JAP_atago_destroyer_desc: "新たなイージス搭載駆逐艦が就役し、強力な防空、対潜、指揮能力を提供する。これらの先進的な護衛艦は、日本の近代的な水上艦隊の中核を形成し、艦隊防護と地域抑止を大きく強化する。"
 JAP_keen_sword_operation: "キーン・ソード統合演習の拡大"
 JAP_keen_sword_operation_desc: "キーン・ソード演習シリーズは、より複雑な海上・航空・地上の要素を含むよう拡大される。同盟国部隊との定期的な大規模演習は、相互運用性を高め、統合指揮統制を改善し、競争が激しい地域環境において効果的に行動できる日本の即応性を示す。"
 JAP_f2_multirole_defensive_enhancement: "F-2多用途機部隊の強化"
 JAP_f2_multirole_defensive_enhancement_desc: "F-2部隊は、近海における防空と対艦打撃を改善するため、アビオニクス、センサー、兵装システムの更新を受ける。これらの強化により、主として防御的な任務プロファイルを維持しつつ、この航空機は地域の脅威により効果的に対応できるようになる。"
 JAP_f15_defensive_updat_programe: "F-15防衛アップグレード計画"
 JAP_f15_defensive_updat_programe_desc: "日本のF-15制空戦闘機は、現代的なレーダー、電子戦装置一式、改良された空対空ミサイルを含む包括的なアップグレードを受ける。更新された機体群は、ますます能力を高める敵対勢力に対して自国の領空を確保する日本の能力を大きく強化する。"
 JAP_hyuga_class: "ひゅうが型ヘリコプター搭載護衛艦の配備"
 JAP_hyuga_class_desc: "ひゅうが型ヘリコプター搭載護衛艦は、指揮および対潜戦プラットフォームとして完全な運用体制に入る。護衛群を統制し、複数のヘリコプターを運用できる能力は、艦隊防護と海洋状況認識を大きく改善する。"
 JAP_p_maritime_patrol: "海上哨戒航空の拡充"
 JAP_p_maritime_patrol_desc: "日本は、海上交通路の監視、潜水艦の追跡、捜索救難作戦の支援のため、近代的な海上哨戒機に投資する。列島周辺における哨戒範囲の強化は、国家安全保障と海上交通の安全の双方を強化する。"
 JAP_deploy_ballistic_warning_radars: "弾道ミサイル警戒レーダーの配備"
 JAP_deploy_ballistic_warning_radars_desc: "地域における弾道ミサイル発射を検知し追跡するため、新たな長距離早期警戒レーダーが設置される。これらのセンサーを国家指揮ネットワークに統合することで、日本は脅威を評価し、住民に警報を出し、防衛対応を調整するための貴重な数分を得る。"
 JAP_modernize_jadge: "JADGE防空ネットワークの近代化"
 JAP_modernize_jadge_desc: "日本航空自衛隊の防空指揮通信システムである日本航空防衛地上環境（JADGE）は、データリンク、処理能力、海上および地上配備センサーとの統合の強化によって更新される。近代化されたJADGEネットワークは、より迅速な意思決定と、防空アセットのより効率的な展開を可能にする。"
 JAP_air_self_defence_force: "航空自衛隊の強化"
 JAP_air_self_defence_force_desc: "航空自衛隊は、より高い作戦テンポに対応するため、訓練計画、基地インフラ、支援部隊を拡充する。これらの改善により、地域の航空環境がより厳しさを増す中でも、日本が継続的な航空哨戒、迅速な緊急発進、複雑な統合演習を持続できることが確保される。"
 JAP_article_nine_transition_comittee: "防衛移行委員会の設置"
 JAP_article_nine_transition_comittee_desc: "専用の委員会が設置され、日本の近代化された国家防衛態勢への移行を調整する。政策立案者、軍事計画担当者、法的専門家を結集することで、日本は責任の移行を管理し、安定した、よく組織された変革を確保できる。"
 JAP_article_nine_transition_comittee_tt: "§G憲法第9条の勢力均衡補正は、解釈レベルに基づいて変化できなくなる。これにより国家方針にアクセスできるようになり、憲法第9条は完全に削除される§!"
 JAP_secure_public_support: "防衛改革への国民的支持の確保"
 JAP_secure_public_support_desc: "日本の防衛政策の変化を説明し、国民の懸念に対処し、新たな安全保障態勢への信頼を築くため、全国的な取り組みが開始される。社会からの幅広い支持は政治的安定を確保し、移行期間中の摩擦を減らす。"
 JAP_modernize_joint_command: "統合指揮体制の近代化"
 JAP_modernize_joint_command_desc: "各自衛隊は作戦指揮を統合された統合体制へと統合し、相互運用性と即応性を改善する。近代的な統合計画と共通の訓練基準は、複雑な安全保障シナリオに対するより効率的な対応を可能にする。"
 JAP_normalize_defense_procurement: "防衛調達制度の正常化"
 JAP_normalize_defense_procurement_desc: "日本は、防衛調達を合理化し、産業能力を拡大し、国内メーカーとの連携を強化する。透明で近代化された調達手続きは、重要な防衛プロジェクトが効率的かつ持続的に提供され得ることを確保する。"
 JAP_formalize_national_defense: "国家防衛能力の制度化"
 JAP_formalize_national_defense_desc: "日本は、拡大された防衛上の責務を正式に成文化し、役割、任務、長期的な戦略目標を明確にする。移行が完了したことで、自衛隊は、ますます複雑化する地域環境において国益を守るために設計された統一的なビジョンの下で運用される。"
 JAP_normalize_defense_procurement_done: "防衛調達の正常化"
 JAP_modernize_joint_command_done: "統合指揮の近代化が完了"
 JAP_consolidate_national_defense_framework_done: "国防体制の統合が完了"
 JAP_rebuild_blue_water_navy: "外洋海軍の再建"
 JAP_rebuild_blue_water_navy_desc: "日本は、自国周辺海域をはるかに超えた場所での持続的な作戦に向けて艦隊を整え、兵站、補給能力、長距離護衛戦力を拡大する。再生された外洋海軍は、日本が海上交通路を防護し、パートナーを支援し、より広い地域全体での危機に対応することを可能にする。"
 JAP_carrier_aviation_tt: "[JAP_carrier_aviation_idea_desc]\n"
 JAP_carrier_aviation_development: "艦上航空開発計画"
 JAP_carrier_aviation_development_desc: "艦上運用可能な航空戦力を開発するための専用計画が開始され、海軍戦闘機、艦上運用、専門的な訓練が統合される。信頼できる艦上航空隊を構築することは、抑止と戦闘作戦の双方において艦隊の到達範囲と柔軟性を大きく高める。"
 JAP_submarine_modernization_project: "潜水艦近代化計画"
 JAP_submarine_modernization_project_desc: "日本は、より静粛な船体、先進的なセンサー、近代的な兵装で潜水艦隊を更新する。新世代の攻撃型潜水艦は、水中抑止、シー・デナイアル能力、そして争点海域を深く監視する能力を強化する。"
 JAP_expand_multi_role_destroyer_fleet: "多目的駆逐艦隊の拡充"
 JAP_expand_multi_role_destroyer_fleet_desc: "防空、対潜戦、水上打撃能力を単一の柔軟なプラットフォームで提供するため、追加の多目的駆逐艦が就役する。これらの護衛艦は、海上における日本の拡大された任務部隊の中核を形成する。"
 JAP_establish_joint_rapid_deployment_command: "統合迅速展開司令部の設置"
 JAP_establish_joint_rapid_deployment_command_desc: "迅速に展開可能な陸・空・海の要素を調整するため、統合司令部が設置される。統一された計画と事前に取り決められた不測事態対応により、日本は、より広い戦略環境のどこで発生する危機にも迅速に対処できる部隊を得る。"
 JAP_full_defense_industrial_mobilisation: "全面的な防衛産業動員"
 JAP_full_defense_industrial_mobilisation_desc: "日本は、包括的な防衛生産計画の下で、産業基盤、研究機関、兵站ネットワークを整合させる。標準化された調達、長期契約、能力の拡大により、艦艇、車両、航空機、先進兵器の持続的な製造が可能となる。"
 JAP_long_range_strike_missile_artillery_forces: "長距離打撃・ミサイル砲兵部隊"
 JAP_long_range_strike_missile_artillery_forces_desc: "長距離で精密打撃を実施するため、専門のミサイル部隊および砲兵部隊が編成される。先進弾薬を現代的な目標捕捉および指揮システムと組み合わせることで、日本は遠方の軍事アセットと重要インフラをリスクにさらし得る能力を得る。"
 JAP_expand_mechanized_brigades: "機械化旅団の拡充"
 JAP_expand_mechanized_brigades_desc: "既存の機械化部隊編成は増強され、新たな旅団が編成され、近代的な歩兵戦闘車と支援用装甲で装備される。この拡充は、地上における機動性、防護、持続的な戦闘能力を改善する。"
 JAP_deploy_next_generation: "次世代戦闘部隊の配備"
 JAP_deploy_next_generation_desc: "戦闘部隊は、次世代装備、ネットワーク化された指揮システム、諸兵科連合ドクトリンを中心に再編される。これらの部隊編成は、迅速な展開、高い生存性、そして複雑で高強度の環境における効果的な作戦のために設計されている。"
 JAP_national_defense_professionalization: "国家防衛の専門職化"
 JAP_national_defense_professionalization_desc: "日本は、全自衛隊にわたって、専門的な軍事教育、キャリア形成、近代的な人事制度に投資する。より有能で、経験豊富で、結束した将校および下士官団は、即応性を高め、指揮を改善し、国家防衛戦力の長期的な有効性を維持する。"
 JAP_integrated_air_space_command: "統合航空・宇宙司令部"
 JAP_integrated_air_space_command_desc: "航空防衛、早期警戒、衛星支援、宇宙監視を調整するため、統合航空・宇宙司令部が設置される。地上配備レーダー、航空機搭載センサー、軌道上プラットフォームからの情報を融合することで、日本は戦場空間のより明確な像を得て、顕在化しつつある脅威により迅速に対応できる。"
 JAP_establish_long_range_strike_aviation: "長距離打撃航空の設置"
 JAP_establish_long_range_strike_aviation_desc: "専用の長距離打撃航空部隊が編成され、近代的な航空機とスタンドオフ兵器で装備される。これらの戦力は、より広い地域全体にわたる抑止と統合作戦を支援しつつ、長大な射程で重要目標を攻撃する能力を提供する。"
 JAP_mext_generation_air_dominance: "次世代制空"
 JAP_mext_generation_air_dominance_desc: "日本は、ステルス、先進的なセンサー、ネットワーク化された戦闘システムを組み合わせた次世代の制空戦闘機の開発を加速する。この計画は、ますます争奪が激しくなる空域において、将来にわたって航空自衛隊が優勢を維持できることを確保する。"
 JAP_advanced_missile_development: "先進ミサイル局"
 JAP_advanced_missile_development_desc: "先進ミサイル・システムの研究、試験、生産を監督するため、専用の局が設置される。現代的な空対空・対艦兵器から長距離精密打撃能力に至るまで、この取り組みは日本の兵器庫を拡充し、全軍種の有効性を強化する。"
 JAP_high_tech_domestic_manufacturing: "高度技術の国内防衛製造"
 JAP_high_tech_domestic_manufacturing_desc: "日本は、アビオニクス、センサー、複合材構造、推進システムの高付加価値製造に投資する。重要部品の国内サプライチェーンを強化することで、外国供給者への依存を減らし、航空・ミサイル・プラットフォームの迅速な更新を支援する。"
 JAP_establish_japan_defense_technology_agency: "日本防衛技術庁"
 JAP_establish_japan_defense_technology_agency_desc: "産業界、学界、自衛隊にまたがる研究、調達、技術革新を調整するため、中央集権的な防衛技術機関が創設される。統一された監督は開発サイクルを加速し、重複を減らし、有望な概念が研究室から前線部隊へ迅速に移行することを確保する。"
 JAP_atla_defense_technology_consolidation: "ATLA技術の統合"
 JAP_atla_defense_technology_consolidation_desc: "防衛装備庁（ATLA）は、全自衛隊にわたる研究、開発、調達の調整において中心的役割を与えられる。防衛技術計画を単一の権限の下に統合することで、日本は重複を減らし、技術革新を加速し、有望なプロジェクトをより迅速に運用化できる。"
 JAP_gifu_test_aerospace_development_center: "岐阜試験・航空宇宙開発センター"
 JAP_gifu_test_aerospace_development_center_desc: "岐阜は、航空機、アビオニクス、兵器システムのための一流の試験・評価拠点として整備される。専用の試験場、計測化された空域、専門の工学チームが厳格な試験を支え、新設計が前線配備に入る前に徹底的に実証されることを確保する。"
 JAP_aichi_nagoya_aerospace_defense_cluster: "愛知・名古屋航空宇宙防衛クラスター"
 JAP_aichi_nagoya_aerospace_defense_cluster_desc: "愛知・名古屋地域は、主要メーカー、サプライヤー、研究機関を結び付ける、航空宇宙・防衛生産の先導的クラスターとして育成される。この地域への集中的な投資は、軍事およびデュアルユース・プラットフォームの双方に向けた機体、エンジン、高度技術部品の生産量を押し上げる。"
 JAP_kobo_maritime_heavy_industry_corridor: "神戸海洋重工業回廊"
 JAP_kobo_maritime_heavy_industry_corridor_desc: "神戸と周辺の沿岸都市は、連続した海洋重工業回廊として整備される。拡張された造船所、製鉄所、海洋工学企業は、より大規模でより高性能な艦隊と、それを支えるインフラを建造・維持する能力を提供する。"
 JAP_nagasaki_shipyard_defense: "長崎造船所の防衛統合"
 JAP_nagasaki_shipyard_defense_desc: "長崎の主要造船所は国家防衛計画により深く統合され、護衛艦、支援艦艇、特殊な海軍プラットフォームに追加の能力を割り当てる。造船所と海軍のより緊密な連携は、建造期間を短縮し、艦隊の即応性を改善する。"
 JAP_kure_naval_arsenal_revival: "呉海軍工廠の復興"
 JAP_kure_naval_arsenal_revival_desc: "呉の歴史ある海軍施設は、近代的な造船・修理複合施設として再活性化される。改良されたドック、工場、兵站拠点は、前線艦艇の整備、改装、アップグレードのための主要拠点としての同市の役割を回復させる。"
 JAP_sasebo_fleet_support_complex: "佐世保艦隊支援複合施設"
 JAP_sasebo_fleet_support_complex_desc: "佐世保は、修理能力、弾薬保管、補給インフラの改善を伴う包括的な艦隊支援複合施設として拡張される。西日本に位置することから、近海および主要な海上チョークポイントでの作戦を持続させるための理想的な拠点となる。"
 JAP_yokosuka_dockyard_expansion: "横須賀ドックヤードの拡張"
 JAP_yokosuka_dockyard_expansion_desc: "横須賀のドックヤードおよび関連施設は、より多くの艦艇と、より深い整備サイクルに対応できるよう拡張される。日本の主要海軍基地の一つとして、拡張された横須賀は、主要な水上戦闘艦を展開可能な状態に維持する海上自衛隊の能力を大きく高める。"
 JAP_revitalize_defense_production: "防衛生産基盤の再活性化"
 JAP_revitalize_defense_production_desc: "日本は、防衛産業基盤を再活性化するための幅広い取り組みを行い、主要メーカーを支援し、長期契約を安定化させ、生産ラインを更新する。より健全な産業基盤は、国が自衛隊を確実に装備し、新たな作戦上の要求により迅速に適応することを可能にする。"
 JAP_kaguya_starward_expedition: "かぐや星間遠征"
 JAP_kaguya_starward_expedition_desc: "光の衣をまとって月へ帰ったかぐや姫の物語に着想を得て、日本は地球近傍小惑星の野心的な深宇宙探査を開始する。先進的なロボット探査機と採鉱実証機が虚空へ送り出され、伝説を技術へと変え、星々の間での将来的な資源採掘のための基盤を築く。"
 JAP_kaguya_starward_expedition_tt: "§Y月への我々のミッションが開始されます！§!"
 JAP_tsukuyomi_lunar_program: "ツクヨミ月計画"
 JAP_tsukuyomi_lunar_program_desc: "日本神話の月の神であるツクヨミにちなんで名付けられたこの計画は、継続的な月面取り組みの下で産業界、研究機関、宇宙機関を結集させる。周回機、着陸機、地表インフラは、月を遠い象徴から具体的な前哨地へと変え、科学、航法、そして日本の宇宙進出の未来における長期的な野望に資する。"
 JAP_amaterasu_martian_dawn: "アマテラス火星の夜明け"
 JAP_amaterasu_martian_dawn_desc: "昇る太陽の女神アマテラスの名の下、日本は赤い惑星へと手を伸ばす。長距離探査機、先進推進技術、そして先駆的な生命維持研究が、新たな火星探査の波を支える。各ミッションは人類の創意工夫の限界を押し広げ、火星の遠い輝きを、日本の高度技術文明にとって次の地平へと変える。"
 JAP_restore_imperial_household: "皇室の復権"
 JAP_restore_imperial_household_desc: "数十年にわたり、皇室は儀礼の場に閉じ込められ、崇敬されつつも、国家運営の梃子からは切り離されてきた。われわれは、制度的能力と宮中の国家行政における正式な役割を回復することで、その取り決めを覆す。これは見せ物ではなく、正統性の再編であり、菊の玉座が前に出るとき、あらゆる派閥に自らの立場を選ばせることになる。"
 JAP_reinstate_former_imperial_houses: "旧皇族家の復帰"
 JAP_reinstate_former_imperial_houses_desc: "皇室制度は、象徴だけでは存続しえない。その将来は、継続性、安定性、そして確かな継承ラインにかかっている。われわれは、旧皇族家を復帰させ、その地位を国家の枠組みの中で回復し、皇位につながる資格ある分家の層を拡大する。この決定は、君主主義者からは伝統を守るものとして歓迎される一方、立憲主義者からは政治的工作として非難されるだろう。"
 JAP_male_line_succession_act: "男系継承法の成立"
 JAP_male_line_succession_act_desc: "継承をめぐる不確実性は、国内論争であると同時に、戦略的な脆弱性でもある。われわれは、曖昧さを排し、今後何世代にもわたる王朝の継続性を確保するため、男系継承を法律として明文化する。この動きは君主主義者の支持を固める一方で、それを現代日本からの後退とみなす改革派から激しい反発を招くだろう。"
 JAP_imperial_rites_restored: "皇室祭祀の復興"
 JAP_imperial_rites_restored_desc: "A throne without ritual is a crown without weight. We will restore the Imperial rites as state-recognized ceremonies, reaffirming the sacred foundations of the monarchy and the continuity of the nation. In doing so, we bind the modern state to ancient legitimacy, whether the political class approves or not."
 JAP_recall_privy_council: "枢密院の復活"
 JAP_recall_privy_council_desc: "議会政治は騒々しく、移ろいやすく、長期的な国政運営からますます乖離してきている。われわれは、天皇に常設の諮問機関を与えるため、枢密院を復活させる。すなわち、慎重で、経験豊富で、国家の連続性に忠実な機関である。その復帰は、君主主義者には安定の錨と見なされる一方、反対派には選挙で選ばれていない権力中枢と見なされるだろう。"
 JAP_imperial_reform_commission: "皇室改革委員会の設置"
 JAP_imperial_reform_commission_desc: "復古には、即興ではなく構造が必要である。われわれは、再生された君主制のための法的・制度的設計図を起草し、各省庁、宮内機関、安全保障機関を国家の単一ドクトリンの下に整列させるため、皇室改革委員会を設置する。ひとたび招集されれば、この委員会は象徴を政策へと変え、後退を政治的に不可能にするだろう。"
 JAP_imperial_audience: "御前拝謁の実施"
 JAP_imperial_audience_desc: "諸政党は、対等な者としてではなく、玉座の前に立つ請願者として召集されることになる。周到に演出された御前拝謁において、われわれは派閥指導者たちを新たな秩序へと結び付ける。そこでは、選挙政治は国家を指揮するのではなく、国家に奉仕する。菊の玉座が現代の幕府を主宰するのであれば、まず政治階級をその論理の前にひざまずかせなければならない。"
 JAP_imperial_civic_oath: "皇室公民誓約の布告"
 JAP_imperial_civic_oath_desc: "新たな秩序には、布告以上のものが必要である。必要なのは、共有された忠誠である。われわれは、官吏、軍務従事者、市民制度を、正統性の究極の源としての玉座に結び付ける「皇室公民誓約」を布告する。そうすることで、われわれは忠誠を法へと変え、異議を裏切りのように感じさせる。"
 JAP_unified_intelligence_secretariat: "統合情報事務局の創設"
 JAP_unified_intelligence_secretariat_desc: "現代の幕府は盲目であってはならない。われわれは、競合する情報機関を、単一の指揮系統を通じて報告し、玉座の戦略的状況認識を守る統合情報事務局へと統合する。これは一夜にして国家運営能力を研ぎ澄ます一方で、宮中が今や何を知っているのかをめぐって、われわれのライバルに恐れる十分な理由を与えるだろう。"
 JAP_blue_water_navy: "外洋海軍の建設"
 JAP_blue_water_navy_desc: "日本の宿命は海洋にあり、われわれの安全保障は水平線で終わることはできない。われわれは、本土周辺海域から遠く離れて行動し、海上交通路を保護し、国益が求める場所で戦力を投射できる、真の外洋海軍を建設する。艦隊が玉座の鋼鉄の道具となるとき、世界は日本を、その後に残す航跡によって測ることを学ぶだろう。"
 JAP_imperial_defense_council: "皇室防衛会議の設置"
 JAP_imperial_defense_council_desc: "戦略を、選挙サイクルや省庁間の対立に委ねることはできない。われわれは、軍、情報機関の指導部、主要省庁を、玉座に根差した単一の戦略ドクトリンの下で統合するため、皇室防衛会議を設置する。これにより一挙に、日本の安全保障政策は一貫性を持ち、派閥が内部から妨害することははるかに難しくなる。"
 JAP_rare_earth_resilience: "レアアース耐性の確保"
 JAP_rare_earth_resilience_desc: "大国は、その産業が代替できない素材を断たれることで、一発も撃たれずに締め上げられ得る。われわれは、備蓄、供給源の多角化、そして戦略的な採掘パートナーシップを通じてレアアース耐性を確保し、日本を強圧から守る。世界がわれわれに圧力をかけたいのなら、別の梃子を見つけなければならない。"
 JAP_national_shipbuilding_plan: "皇室艦隊拡張計画"
 JAP_national_shipbuilding_plan_desc: "The Throne will not settle for coastal defense; Japan will command the seas that decide our fate. Under the Imperial Fleet Expansion Programme, we will surge shipyard capacity, lock in long-term naval procurement, and drive a continuous build cycle from keel-laying to commissioning. When this plan is underway, our rivals will not debate Japan's intentions — they will count our hulls."
 JAP_imperial_war_cabinet: "皇室戦時内閣の招集"
 JAP_imperial_war_cabinet_desc: "危機の時代において、日本は遅延、委員会、党派的な駆け引きによって統治されていてはならない。われわれは、指揮権を集中させ、政治指導部を玉座の委任の下にある単一の戦略路線へと結び付けるため、皇室戦時内閣を招集する。この瞬間から、国家は一つの声で行動する――そしてそれは天皇の声となる。"
 JAP_russian_lost_territories: "北方領土の奪還"
 JAP_russian_lost_territories_desc: "北方の傷は、いまだ決して癒えていない――ただ条約と沈黙によって覆い隠されてきただけだ。われわれは、ロシアの支配下に置かれた島々と海域に対する主張を、嘆願としてではなく、交渉力と備えに裏打ちされた主権国家の要求として押し出す。モスクワが失われたものを返還しないのであれば、日本はそれを取り戻すためにどこまで進む意思があるのかを決断しなければならない。"
 JAP_fight_china_again: "龍と菊"
 JAP_fight_china_again_desc: "古い対立は、真に解決されたことは一度もない。ただ条約と移ろう均衡の背後に先送りされてきただけだ。われわれは、地域の未来を決する戦争に向けて、産業、軍隊、そして国民の意思を結集し、再び中国と対峙するための国家の備えを進める。今度の日本は、ただ生存のためだけでなく、その後に続く秩序のために戦う。"
 JAP_reclaim_pacific_rim: "太平洋沿岸における我々の委任を主張"
 JAP_reclaim_pacific_rim_desc: "日本の繁栄と安全保障は、海上交通路から島嶼線、そして遠方のチョークポイントに至るまで、太平洋全域に刻み込まれている。われわれは、艦隊の展開、基地利用権、経済的なてこに裏打ちされた国家政策として海洋影響力を扱う、太平洋沿岸における委任を主張する。他国が地図を描くのを見ている時代は終わった。日本がそれを形作る。"
 JAP_office_for_colonialism: "大東亜省の復活"
 JAP_office_for_colonialism_desc: "行政なき帝国は、自らの重みによって崩れ落ちる征服にすぎない。われわれは、単一の帝国ドクトリンの下で海外統治、安全保障の取り決め、経済統合を調整するため、大東亜省を復活させる。圏域を指揮する一つの省を持つことで、日本の影響力はもはや即興ではなく、管理され、拡大され、執行されるものとなる。"
 JAP_office_for_colonialism_tt: "Unlocks occupation law in Asian states:\n"
 JAP_reclaim_south_chinese_sea: "南方海域を掌握"
 JAP_reclaim_south_chinese_sea_desc: "南シナ海はアジアの動脈であり、それを支配する者が、貿易・燃料・力の流れを支配する。われわれは、この海域における優位を取り戻すために動き、あらゆる挑戦者に対して我々の意思を貫徹するためのプレゼンス、基地、そして海軍力を確立する。日本はアクセスを求めはしない――武力によってそれを保証する。"
 JAP_reclaim_indochina: "インドシナへの帰還"
 JAP_reclaim_indochina_desc: "インドシナは東南アジアの交差点に位置し、港湾、資源、海上交通路が、誰が地域の均衡を定めるかを決する。われわれは、圧力、武力、そして政治的工作をもって戻り、これらの領土を再び日本の戦略的指向の下に置く。ひとたび確保されれば、われわれの海洋圏の南方側面は恒久的な影響力によって支えられることになる。"
 JAP_reclaim_australia: "南方の錨"
 JAP_reclaim_australia_desc: "オーストラリアは南太平洋の要石であり、艦隊、航空戦力、そして長期戦の帰趨を決する兵站を受け入れうる大陸である。われわれは、これを日本の戦略的支配下に置くために動く――それは襲撃でも示威でもなく、われわれの海洋圏の恒久的な錨としてである。南方が確保されれば、太平洋は日本の湖となる。"
 JAP_reclaim_myanmar: "イラワジ門戸を確保"
 JAP_reclaim_myanmar_desc: "ミャンマーは南アジアと東南アジアを結ぶ陸橋であり、ベンガル湾とこの地域の中枢をつなぐ経路を支配している。われわれは、武力と政治的圧力を通じてこれを奪還し、その港湾、飛行場、回廊を日本のより広範な圏域の資産へと変えていく。ひとたびイラワジ門戸が確保されれば、われわれの南方側面ははるかに挑戦されにくくなる。"
 JAP_reclaim_the_pacific: "海洋を我らのフロンティアに"
 JAP_reclaim_the_pacific_desc: "太平洋は遠い広がりではない。それは、日本の生存と偉大さを決するフロンティアである。われわれは、艦隊の展開、島嶼の拠点、そして東京で形作られた海洋秩序を執行する意志によって、それを取り戻す。海洋が我らのフロンティアとなるとき、あらゆるライバルはわれわれの影の下で行動することを強いられる。"
 JAP_reclaim_north_korea: "東京の手の下に北を縛る"
 JAP_reclaim_north_korea_desc: "われわれは、平壌から戦略的自律性を奪い、その対外政策を日本の監督下に置くような決着を強制する。統制されたアクセス、安全保障上の保証、そして資源と復興に対する強硬なてこを通じて、北は予測不能な脅威ではなく、従属的な緩衝地帯へと変えられることになる。それは幻想なき支配であり、設計によって強制される安定である。"
 JAP_reclaim_south_korea: "保護国枠組みの押し付け"
 JAP_reclaim_south_korea_desc: "我々は、影響力の段階を超え、朝鮮の外交・安全保障政策を東京の指揮に結び付ける保護国枠組みを確立するために動く。統制された協定、顧問団、そして主要機関に対するてこを通じて、朝鮮は公然たる併合を必要とすることなく、従属的地位へと追い込まれる。それは、書類、圧力、そして恒久性によって築かれる現代の帝国である。"
 JAP_reclaim_taiwan: "台湾保護国の設置"
 JAP_reclaim_taiwan_desc: "我々は、台湾の防衛および対外政策を東京の指揮に結び付ける保護国枠組みを押し付けることで、影響力から支配へと移行する。保証、基地使用権、制度的なてこを通じて、この島は公然たる併合を必要とすることなく、忠実な海洋の堡塁として確保されることになる。それは、海軍力と政治的圧力によって執行される、現代の帝国的取り決めである。"
 JAP_basic_reconstruction_policy: "復興基本方針"
 JAP_basic_reconstruction_policy_desc: "東日本大震災による前例のない甚大な被害を受け、政府は復興に向けた基本方針を確立しなければならない。生活再建、インフラ再構築、産業復興のための国家的枠組みを提示することが、国民の信頼回復と社会の安定化に向けた第一歩となる。"
 JAP_tohoku_infrastructure: "東北インフラの再建"
 JAP_tohoku_infrastructure_desc: "地震と津波は東北の交通網とライフラインに壊滅的な被害を与えた。道路・鉄道・港湾を再建することは、地域社会の再生と復興の前進に向けた第一歩である。莫大な費用と時間を要するが、先送りはできない。"
 JAP_fishery_revival: "農林水産業の復興"
 JAP_fishery_revival_desc: "津波は東北の漁港と農地を壊滅させ、無数の生計手段を奪った。これらの産業を再建することは、地域の経済基盤を取り戻し、安定した食料供給を確保する。これは地域の復興だけでなく、国家安全保障の観点からも不可欠な取り組みである。"
 JAP_tohoku_port: "東北港湾機能の回復"
 JAP_tohoku_port_desc: "津波により港湾施設や造船所は壊滅的な被害を受け、物流と海上貿易は停止した。復旧・再建によって地域産業を再生させ、国内外の重要航路を再開する。これらの玄関口を取り戻すことは、日本全体の経済回復にとって不可欠である。"
 JAP_power_supply: "電力安定化"
 JAP_power_supply_desc: "災害により多くの発電施設と送電網が損傷し、深刻な電力不足が発生している。市民生活と産業の安定を確保するため、代替電源を迅速に拡充し、電力網を強化しなければならない。"
 JAP_kanto_infrastructure: "関東インフラの再建"
 JAP_kanto_infrastructure_desc: "災害は関東地方、特に北部に深刻な被害を与え、交通網と都市機能を混乱させた。首都圏を支えるインフラを復旧することは、経済活動の再生と国家の安定維持に不可欠である。迅速かつ計画的な復興が求められる。"
 JAP_reconstruction_agency: "復興庁の設置"
 JAP_reconstruction_agency_desc: "震災後の復旧・復興を加速し、調整するため、政府は復興庁を設置する。この専任組織は国と地方の取り組みを統合し、復興計画を効果的に実行できるようにする。"
 JAP_industrial_recovery: "産業基盤の復旧"
 JAP_industrial_recovery_desc: "災害は工場や産業施設に甚大な被害を与えた。産業基盤を再建することで雇用を回復し、経済の復興を加速させることができる。"
 JAP_funding_local_governments: "被災自治体への支援"
 JAP_funding_local_governments_desc: "被災地域の地方自治体に資金を提供し、復旧・復興の推進、生活再建の支援、公共サービスの維持を支える。"
 JAP_housing_reconstruction: "被災者住宅の再建"
 JAP_housing_reconstruction_desc: "仮設住宅と恒久的な住宅地の整備を加速し、避難所生活を余儀なくされている家族を移し、町ごとに恒久的な移転・定住の明確な計画を示す。"
 JAP_reconstruction_completed_focus: "復興の完了"
 JAP_reconstruction_completed_focus_desc: "東北全域で、緊急的な復旧段階から長期的な地域再生へ移行する節目を示す。基幹インフラは復旧し、産業は再稼働し、町々は「生き延びる」段階から「成長する」段階へと転じ始める"
 JAP_trilateral_anti_north_korea_training: "半島三国即応態勢"
 JAP_trilateral_anti_north_korea_training_desc: "韓国およびアメリカとの定期的な合同演習は、半島危機への対応に向けた共通の行動要領を形作ってきた。相互運用可能な指揮手順、統合された空海軍演習、そして連携したミサイル防衛運用により、平壌からのいかなる挑発にも、迅速で統一された信頼性ある対応を取れるようになっている。"
 JAP_dprk_policy_idea: "日本政策の浸透"
 JAP_dprk_policy_idea_desc: "東京の新たな対朝鮮政策は、これまで存在しなかった経路を開いた。外交接触、非公式の仲介者、経済的影響力、そして情報網の育成を通じて、日本は北朝鮮の政治環境の内部で自らの影響力を拡大するための一時的な機会を得た。この開口部は脆弱で争いのあるものだが、現時点では、日本の圧力と存在感は以前よりも平壌で重みを持っている。"
 JAP_depopulation_0: "残る少子化の重荷（レベル1)"
 JAP_depopulation_0_desc: "Thanks to continuous countermeasures, the progression of the declining birthrate is gradually being curbed to some extent. Birth trends are also showing signs of improvement, and the more crisis-driven view has receded, but the long-term effects will not disappear immediately. Stabilizing the population base will still take time, and continued policy efforts and the maintenance of their effectiveness are required.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_1: "少子化圧力の継続（レベル2）"
 JAP_depopulation_1_desc: "子育て支援や働き方の見直しなどの取り組みは一定の成果を示しつつあるが、少子化をめぐる圧力はなお社会全体に残っている。出生動向には持ち直しの兆しも見られる一方で、将来不安などの課題が改善の広がりを妨げている。状況は悪化一辺倒ではないが、継続的な対策が不可欠である。\n-------------\n国家方針の§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!、§Y$JAP_save_ice_age_generation$§!で補正§G$JAP_declining_birthrate_measures_modifier$§!の数値を上げよう。そうすれば§Y2~4年§!間間隔で起こる調査イベントで国民精神を良化できる！"
 JAP_depopulation_2: "長引く少子化 (レベル3)"
 JAP_depopulation_2_desc: "少子化の進行は依然として国家の課題であり、明確な改善には至っていない。施策の積み重ねによって一部で前進は見られるものの、雇用・家計・生活環境にまたがる構造的な問題が残っており、出生動向は低い水準で推移している。急激な悪化は抑えられているが、安心できる状況にはほど遠い。\n-------------\n国家方針の§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!、§Y$JAP_save_ice_age_generation$§!で補正§G$JAP_declining_birthrate_measures_modifier$§!の数値を上げよう。そうすれば§Y2~4年§!間間隔で起こる調査イベントで国民精神を良化できる！"
 JAP_depopulation_3: "深刻化する少子化 (レベル4)"
 JAP_depopulation_3_desc: "出生数の減少傾向はなお続いており、将来の人口基盤に対する懸念は強い。子育てと就労の両立の難しさ、家計負担、支援体制の地域差などの要因が重なり、改善の兆しは限定的にとどまっている。対策は進められているものの、全体としては状況の悪化を十分に抑えきれていない。\n-------------\n国家方針の§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!、§Y$JAP_save_ice_age_generation$§!で補正§G$JAP_declining_birthrate_measures_modifier$§!の数値を上げよう。そうすれば§Y2~4年§!間間隔で起こる調査イベントで国民精神を良化できる！"
 JAP_depopulation_4: "少子化危機 (レベル5)"
 JAP_depopulation_4_desc: "出生動向の悪化が長期化し、人口構造の歪みは国家運営の各分野に重い影響を及ぼし始めている。労働力の先細り、社会保障負担への不安などが同時に進行しており、従来の対応では十分な歯止めをかけられていない。少子化はもはや一分野の課題ではなく、国家の持続性そのものを揺るがす問題となっている。\n-------------\n国家方針の§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!、§Y$JAP_save_ice_age_generation$§!で補正§G$JAP_declining_birthrate_measures_modifier$§!の数値を上げよう。そうすれば§Y2~4年§!間間隔で起こる調査イベントで国民精神を良化できる！"
 JAP_entrenched_demand_shortfall_idea_1: "需要低迷の固定化"
 JAP_entrenched_demand_shortfall_idea_1_desc: "Deflationary expectations and anxiety about the future are suppressing household spending, while firms hold back investment in the face of weak demand. Wages are stagnant, prices barely move, and no one wants to be the first to spend. Japan's economy is not collapsing, but it is being drained by paralysis.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G30§!!"
 JAP_declining_birthrate_measures_modifier: "少子化対策"
 JAP_work_style_reform_modifier: "働き方改革"
 JAP_work_style_reform_modifier_desc: "長時間労働に頼ってきた慣行を見直し、働く人の健康と生活の安定を守りながら、企業の現場も無理なく回る形へ整えていく。休み方や労務管理の透明性を高め、雇用形態の違いによる不公平を減らすことで、家庭と仕事を両立しやすい社会を目指す。"
 JAP_long_working_idea: "長時間労働文化"
 JAP_declining_birthrate_modifier: "政府の少子化対策"
 JAP_declining_birthrate_modifier_desc: "少子化への危機感を共有し、政府が子育て支援と働き方の見直しを前に進めている。暮らしの不安を和らげ、家庭を築く選択肢を増やすことで、将来への見通しを取り戻そうとしている。"
 JAP_save_ice_age_generation_modifier: "就職氷河期救済"
 JAP_save_ice_age_generation_modifier_desc: "We will, as a nation, directly address and make up for the disadvantages borne by the generation that entered society during the employment ice age. By providing integrated support, from job searching and reskilling to changing how people work, and rebuilding housing and daily life, we will build a foundation that enables people to start over."
 JAP_ice_age_generation_idea: "就職氷河期"
 JAP_ice_age_generation_idea_desc: "Job openings shrank drastically, creating a generation that lost its starting point regardless of ability or motivation. Prolonged unstable employment and stagnant incomes have persisted, and distrust about the future has settled across society as a whole.\n-------------\nIt can be §Gremoved§! by completing national focus starting from §Y$JAP_save_ice_age_generation$§!!."
 JAP_industries_modifier: "$JAP_industries$"
 JAP_industries_modifier_desc: "$JAP_industries_desc$"
 JAP_aftermath_of_disposal_non_performing_loans_idea: "不良債権処理の加速の余波"
 JAP_aftermath_of_disposal_non_performing_loans_idea_desc: "不良債権処理の加速により、金融機関と企業の再編が一気に進んでいる。その結果、資金配分の正常化に向けた道筋は開かれつつある一方で、雇用調整や地域経済の混乱が短期的に広がり、失業対策・生活支援・再就職支援にかかる社会的負担が増大している。"
 JAP_transparency_and_audit_reform_modifier: "透明性・監査改革"
 JAP_transparency_and_audit_reform_modifier_desc: "情報公開と公文書管理を徹底し、デジタル化と独立監査で不正の余地を減らす。天下りや政治資金の不透明さを是正し、行政の効率と信頼、外部影響への耐性を高める。"
 JAP_protecting_human_rights_modifier: "$JAP_protecting_human_rights$"
 JAP_protecting_human_rights_modifier_desc: "$JAP_protecting_human_rights_desc$"
 JAP_worker_protection_modifier: "労働者保護"
 JAP_worker_protection_modifier_desc: "働く人の暮らしと職場の安心を守り、長く働き続けられる環境を整える。賃金と待遇の底上げを後押しし、生活不安を和らげながら、社会の安定と産業の基盤を強めていく。"
 JAP_redistribution_modifier: "$JAP_redistribution$"
 JAP_redistribution_modifier_desc: "$JAP_redistribution_desc$"
 JAP_energy_efficiency_idea: "$JAP_focusing_renewable_energy$"
 JAP_energy_efficiency_idea_desc: "$JAP_focusing_renewable_energy_desc$"
 JAP_leading_disarmament_idea: "$JAP_leading_disarmament$"
 JAP_leading_disarmament_idea_desc: "$JAP_leading_disarmament_desc$"
 JAP_leading_disarmament_idea_3: "平和国家の発展"
 JAP_leading_disarmament_idea_3_desc: "軍事力に頼らない国家のあり方を明確にし、資源と人材を民生の発展へ振り向ける。産業基盤と都市機能の整備を優先し、民需産業やオフィス街の建設を加速させて、生活の豊かさと経済成長を押し上げていく。"
 JAP_prioritizing_order_modifier: "$JAP_prioritizing_order$"
 JAP_prioritizing_order_modifier_desc: "$JAP_prioritizing_order_desc$"
 JAP_strengthening_cabinet_modifier: "$JAP_strengthening_cabinet$"
 JAP_strengthening_cabinet_modifier_desc: "$JAP_strengthening_cabinet_desc$"
 JAP_regulatory_reform_modifier: "規制改革と成長戦略"
 JAP_regulatory_reform_modifier_desc: "国内の競争力を高め、安定した成長を続けられる仕組みへ移行する。企業活動の足かせを減らし、民間の力で産業と雇用を押し上げていく。"
 JAP_patriotic_education_modifier: "$JAP_patriotic_education$"
 JAP_patriotic_education_modifier_desc: "$JAP_patriotic_education_desc$"
 JAP_strengthen_military_idea: "$JAP_strengthen_military_power$"
 JAP_strengthen_military_idea_desc: "$JAP_strengthen_military_power_desc$"
 JAP_jsdf_international_missions_idea1a: "国際協力任務の制度基盤"
 JAP_jsdf_international_missions_idea1a_desc: "国際協力任務に必要な法的枠組みと運用基準の整備が進められた。海外派遣の手続きや任務時の対応基準が明確になったことで、部隊運用の安定性と現場判断の一貫性が向上している。"
 JAP_constitutional_debate_idea: "憲法論争の激化"
 JAP_constitutional_debate_idea_desc: "安全保障政策の大幅な転換は、長年維持されてきた戦後秩序への認識を揺さぶった。国防の強化を支持する声が高まる一方で、平和主義の後退を懸念する反発も強く、社会と政界の対立は激しさを増している。"
 JAP_f15_programe: "F-15改良計画"
 JAP_submarine_modernization_idea: "潜水艦近代化計画"
 JAP_carrier_aviation: "航空母艦の復旧"
 JAP_keen_sword_operation_idea: "キーン・ソード演習"
 JAP_defense_technology_agency1: "日本防衛技術庁"
 JAP_defense_technology_agency1_desc: "日本防衛技術庁は、産業界・学界・軍の間で研究開発と調達を調整する。先端プロジェクトを単一の戦略的ビジョンの下に統合することで、日本はイノベーションを加速し、重複を減らし、最先端技術がより迅速に前線部隊へ行き渡るよう確実にする。"
 JAP_diplomacy_modifier: "日本の外交"
 JAP_diplomacy_modifier_desc: "日本は主要国との二国間関係を重視し、経済・安全保障・文化などの分野で協力を強化している。実利と国益に基づく現実的なパートナーシップを通じて、日本は国際舞台での存在感を高めている。"
 JAP_chiang_mai_initiative: "チェンマイ・イニシアティブ"
 JAP_chiang_mai_initiative_desc: "日本との通貨スワップ協定の拡充により、ASEAN加盟国は金融危機への耐性を強化し、経済の安定性と自律性を高めている。"
 JAP_quantitative_oda_idea: "日本のODAによるインフラ投資"
 JAP_quantitative_oda_idea_desc: "日本の政府開発援助（ODA）は、交通網、港湾、電力などのインフラ整備を加速させてきた。この支援は、我が国の経済成長にとって不可欠な基盤となっている。"
 JAP_qualitative_oda_idea: "日本のODAによる人的資本とイノベーション"
 JAP_qualitative_oda_idea_desc: "日本との協力により、教育・人材育成・研究分野で大きな進展がもたらされた。現地企業や諸機関の能力を強化することで、持続可能な発展への道が開かれる。"
 JAP_security_south_china_sea_idea: "海洋の安定における日本の関与"
 JAP_security_south_china_sea_idea_desc: "南シナ海における海洋安全保障への日本の中立的な関与は、地域の緊張緩和と航行の自由の保護に寄与してきた。日本は我々の地域にとって信頼できる安定化要因となっている。"
 JAP_jap_education: "日米教育交流プログラム"
 JAP_jap_education_desc: "日本の規律とアメリカの起業家精神を組み合わせたハイブリッド型の教育プログラムが試験導入されている。互いの強みを学び合うこの取り組みは、次世代の育成にとって貴重な刺激となる。"
 JAP_jap_education_culture: "日米の文化・教育協力"
 JAP_jap_education_culture_desc: "日本とアメリカの間では、ポップカルチャーや先端技術にとどまらない、より包括的なパートナーシップが形成されつつある。日本の規律重視の教育と、アメリカの創造性重視の気風が融合することで、人材育成は一層深まった。文化的親和性と科学協力の相乗効果が、社会の安定とイノベーションの推進力の双方を育んでいる。"
 JAP_dual_use_idea: "日米のデュアルユース研究協力"
 JAP_dual_use_idea_desc: "デュアルユース技術における日本とアメリカの協力が強化されている。開発の加速と知見の共有により、民生・軍事の両分野で将来の競争力向上が見込まれる。"
 JAP_disaster_countermeasure_cooperation_idea: "協力による防災強靭化"
 JAP_disaster_countermeasure_cooperation_idea_desc: "日本との災害対応協力を通じて、台湾は緊急事態への対処能力を大幅に強化した。知見の共有と共同訓練プログラムにより、被害の軽減と復旧の迅速化が期待される。"
 JAP_tai_high_technology_idea: "日台先端技術パートナーシップ"
 JAP_tai_high_technology_idea_desc: "日本との共同研究により、台湾の民生技術分野におけるイノベーションが加速している。研究資源の共有と国際協力が、産業競争力を高めている。"
 JAP_tai_international_student_idea: "日本との次世代交流"
 JAP_tai_international_student_idea_desc: "日本での留学機会の拡大により、より多くの台湾の学生が多様な学術経験を得られるようになった。これは日台関係を担う将来のリーダーの育成を促し、国際的視野を広げる。"
 JAP_chi_kor_intellectual_platform: "東アジア記憶対話プラットフォーム"
 JAP_chi_kor_intellectual_platform_desc: "国連の支援のもと、日本、中国、韓国は、歴史の記憶を保存し相互理解を深めるための共同の知的プラットフォームを立ち上げた。この取り組みは、歴史への省察と未来志向の協力を両立させる新たな国際的枠組みとなる。"
 JAP_chi_trade_support_idea: "貿易制度の国際的調和"
 JAP_chi_trade_support_idea_desc: "日本からの技術的・制度的支援を受け、中国は国際基準に整合した貿易制度の整備を進めている。通関手続きの簡素化や法改正などの改革が、制度の近代化に寄与している。"
 JAP_chi_advancement_companies_idea: "日本との産業統合の強化"
 JAP_chi_advancement_companies_idea_desc: "日中企業の相互進出が生産ネットワークを効率化し、両国間の経済的相互依存を一層深めている。"
 JAP_chi_kanji_idea: "日中の文化圏協力"
 JAP_chi_kanji_idea_desc: "日本との文化協力を通じて、中国は共通の「漢字文化圏」における交流を強化している。これはソフトパワーの向上と、より好意的な国際的イメージの形成に寄与している。"
 JAP_chi_temple_idea: "仏教遺産の共同保全"
 JAP_chi_temple_idea_desc: "日本と共同で仏教寺院や文化財の保存・修復を進めることで、中国は宗教的遺産の価値を再確認するとともに、観光振興を促している。"
 JAP_kor_accelerator_idea: "東京・ソウルのアクセラレーター協力"
 JAP_kor_accelerator_idea_desc: "ソウルと東京が共同で構築したスタートアップ支援の枠組みは、次世代の起業を育み、都市間の技術協力を強化している。"
 JAP_kor_local_companies_idea: "地域企業交流プログラム"
 JAP_kor_local_companies_idea_desc: "韓国と日本の地域企業間のビジネス交流を通じて、地域経済が活性化し、新たな民間主導の産業ネットワークが形成されている。"
 JAP_kor_aging_idea: "高齢化社会共同タスクフォース"
 JAP_kor_aging_idea_desc: "高齢化という共通の課題に対応するため、日韓の専門家による共同タスクフォースが設立され、政策知見の共有と社会福祉施策の強化が進められている。"
 JAP_sov_logistics_corridor_idea: "日露ユーラシア物流ネットワーク"
 JAP_sov_logistics_corridor_idea_desc: "日本との協力を通じて、ロシアを経由して日本と欧州を結ぶ物流回廊の整備が進められている。インフラの更新と経済的連結が、ロシアの地政学的重要性を高めている。"
 JAP_sov_it_corridor_idea: "日露デジタル接続イニシアティブ"
 JAP_sov_it_corridor_idea_desc: "日本の支援を受けて、ロシアはITインフラを拡充している。日露パートナーシップは、広範なデジタル回廊を構築し、世界的な情報交流の基盤を確立することを目指している。"
 JAP_territorial_disputes1: "領土交渉の政治的成果"
 JAP_territorial_disputes1_desc: "長年の領土問題に一定の整理がついたことで、周辺海域における緊張はやや緩和され、国内世論にも安堵が広がっている。外交的な不確実性の低下は沿岸地域の経済活動にも好影響を与え、操業環境の改善を通じて漁業関連の税収基盤を下支えしている。"
 JAP_monarchist_shipbuilding_idea: "Imperial Naval Construction Drive"
 JAP_monarchist_shipbuilding_idea_desc: "The Empire will return to the sea as its natural domain. Under an Imperial Naval Construction Drive, shipyards are expanded, contracts are centralized, and production is pushed at sustained wartime tempo until the fleet matches Japan's ambition. Laid down in the Emperor's name, the seas belong to the Empire!."
 JAP_monarchist_shipbuilding_idea_tt: "§RThis idea will cancel when you are§! §Y$naval_power_of_the_continent$§!"
 JAP_restoring_imperial_household_idea: "Restoring the Imperial Household"
 JAP_restoring_imperial_household_idea_desc: "The Imperial Household is being rebuilt as an institution of state, not a decorative court. Its offices are expanded, its protocols formalized, and its influence restored through appointments that bind ministries and society closer to the Throne. The Emperor's household will once again function as the quiet engine of national cohesion and direction."
 JAP_once_millennium_disaster: "未曾有の大災害"
 JAP_once_millennium_disaster_desc: "2011年3月11日の東日本大震災は、近代日本史における最も壊滅的な災害の一つとして刻まれている。地震と津波は、一瞬にしてインフラ、産業、生活基盤を破壊し、国家を深刻な混乱へと突き落とした。復興への道のりは長く困難であり、莫大な資源と時間を必要とするだろう。"
 JAP_scars_earthquake_and_tsunami: "震災と津波の傷跡"
 JAP_scars_earthquake_and_tsunami_desc: "東日本大震災とそれに伴う壊滅的な津波は、東北地方の都市、港湾、沿岸地域に甚大な被害をもたらした。インフラと産業施設は破壊され、地域の生産性と生活基盤は大きく損なわれた。復旧には長い年月と、莫大な資源および努力を要するだろう。"
 JAP_scars_earthquake: "震災の傷跡"
 JAP_scars_earthquake_desc: "東日本大震災の揺れは関東地方にも及び、交通網に大きな影響を与えるとともに、産業基盤の一部を混乱させた。首都圏でも経済活動が一時的に低下した。東北ほど壊滅的ではないとはいえ、復旧には相応の時間と努力を要する。"
 JAP_focus_renewable_energy_idea: "再生可能エネルギー重視"
 JAP_focus_renewable_energy_idea_desc: "原子力の安全性への懸念から、我々は再生可能エネルギーを優先し、発電における長期的な自立性を強化している。"
 JAP_focus_energy_TT: "追加支出：GDPの§R0.01%§!"
 JAP_focus_thermal_power_idea: "火力発電所重視"
 JAP_focus_thermal_power_idea_desc: "火力発電所を選択することで、安定した出力と即時の供給を確保できる。特に原子力の安全性が国の懸念事項である間は、これが有効である。"
 JAP_anxiety_nuclear_power: "原子力への国民不安"
 JAP_anxiety_nuclear_power_desc: "福島第一原発事故の衝撃は、社会全体に原子力への恐怖と不信を広げた。世論の反発と手続きの遅延により新規建設は停滞し、政治的混乱も続いている。"
 JAP_shut_down_nuclear_plants: "全原発停止"
 JAP_shut_down_nuclear_plants_desc: "原子力発電を停止する決定により、政府は国民の恐怖に正面から応えた。反発は残るものの、この判断は安全を最優先したものとして広く受け止められ、社会不安は徐々に和らぎつつある。"
 JAP_nuclear_strict_examination: "原子力安全基準の強化"
 JAP_nuclear_strict_examination_desc: "事故を受けて、規制と審査は大幅に強化された。新設や再稼働には追加の対策と長期の手続きが必要となり、原子力は拡大の速度が落ち、従来の水準での運用も難しくなっている。"
 JAP_continue_nuclear_plants: "原子力発電の継続"
 JAP_continue_nuclear_plants_desc: "政府は原子力の維持を選択したが、事故の記憶はなお生々しい。安全性をめぐる不信と反発は根強く、国内の安定を損なう政治的対立を生んでいる。"
 JAP_crown_centered: "皇室中心論の再燃"
 JAP_crown_centered_desc: "森首相の発言をきっかけに、伝統主義的・君主主義的な言説が一部で勢いを増している。政府がこれを利用する姿勢を見せたことで、皇室を国家の中心原理として再評価しようとする運動は、限定的ながら政治的影響力を持ち始めた。"
 JAP_monarchist_modifier: "天皇親政"
 JAP_monarchist_modifier_desc: "玉座は再び統治の中枢へと戻り、国家はもはや政党間の駆け引きではなく、天皇の勅命によって動いている。各省庁、治安機関、そして産業は、天皇を正統性と指針の源とみなす単一の理念の下で整列している。"
