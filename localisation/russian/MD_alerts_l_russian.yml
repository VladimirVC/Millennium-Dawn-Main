l_russian:
 md_alert_tooltip: "[Get_md_alert_name]"
 md_alert_desc: "[Get_md_alert_description]\n\n£click_right §YПКМ§!: убрать это уведомление навсегда.\n£key_shift + £click_left §YShift + левая кнопка мыши§!: восстановить все скрытые уведомления."
 md_negative_nuclear_fuel: "§RДефицит ядерного топлива§!"
 md_negative_expected_social_spending: "§RНедостаток социальных расходов§!"
 md_negative_expected_healthcare_spending: "§RНехватка финансирования здравоохранения§!"
 md_negative_expected_administrative_spending: "§RДефицит административных расходов§!"
 md_negative_expected_education_spending: "§RСокращение расходов на образование§!"
 md_negative_expected_police_spending: "§RДефицит расходов на полицию§!"
 md_negative_expected_defense_spending: "§RСокращение расходов на оборону§!"
 md_negative_eletricity: "§RДефицит энергии§!"
 md_available_tech_slot_expansion: "§YДоступен слот для исследования§!"
 md_negative_nuclear_fuel_Desc: "Ваши ядерные реакторы потребляют больше топлива, чем производится. Перейдите на вкладку Строительство, чтобы управлять своей энергией."
 md_negative_expected_social_spending_Desc: "Ваши нынешние законы о социальном обеспечении не соответствуют ожиданиям вашего населения. Перейдите на вкладку Политика, чтобы увеличить социальные расходы."
 md_negative_expected_healthcare_spending_Desc: "Ваши действующие законы о здравоохранении не соответствуют ожиданиям вашего населения. Перейдите на вкладку Политика, чтобы увеличить расходы на здравоохранение."
 md_negative_expected_administrative_spending_Desc: "Ваша нынешняя бюрократия ниже того, чего ожидает ваше население. Перейдите на вкладку Политика, чтобы увеличить административные расходы."
 md_negative_expected_education_spending_Desc: "Ваши нынешние законы об образовании не соответствуют ожиданиям вашего населения. Перейдите на вкладку Политика, чтобы увеличить расходы на образование."
 md_negative_expected_police_spending_Desc: "Ваш текущий бюджет на полицию ниже ожидаемого населением уровня. Перейдите на вкладку «Политика», чтобы увеличить расходы на полицию."
 md_negative_expected_defense_spending_Desc: "Ваши текущие военные расходы ниже того, чего ожидает ваше население. Перейдите на вкладку Политика, чтобы увеличить расходы на оборону."
 md_negative_eletricity_Desc: "Ваше текущее производство энергии не покрывает общий спрос. Перейдите на вкладку «Строительство», чтобы построить дополнительные электростанции или скорректировать потребление энергии."
 md_available_tech_slot_expansion_Desc: "Ваш ВВП или ВВП на душу населения достаточно вырос, чтобы разблокировать новый слот для исследований. Откройте вкладку «Технологии» и нажмите кнопку £topbar_research , чтобы получить его."
 md_idle_nuclear_reactors: "§RНеактивные ядерные реакторы§!"
 md_idle_nuclear_reactors_Desc: "Вы построили ядерные реакторы, но ваш текущий ядерный статус установлен как «Неядерная энергетика», из-за чего ваши реакторы простаивают. Переключитесь на «Ядерную энергетику» (или более высокий статус) во вкладке «Политика», чтобы начать вырабатывать ядерную энергию."