l_korean:
 TAI_legacy_of_1949: "1949년의 유산"
 TAI_legacy_of_1949_desc: "1949년 국공내전이 종결되면서 국민당(KMT)과 그 지지자들은 대만 섬으로 피난했습니다. 이 사건의 유산은 대만 현지의 토착주의 운동과 맞물려, 대다수 대만 시민들이 중국 본토와의 통일을 강력하게 거부하는 계기가 되었습니다."
 TAI_the_great_chip_empire: "반도체 대제국"
 TAI_the_great_chip_empire_desc: "대만은 반도체 및 마이크로칩 생산의 초기 단계를 선점하고 타국보다 매력적인 투자처로 거듭나며 단숨에 산업의 선두 주자로 도약했습니다. 저렴하고 효율적인 생산과 서방 국가들을 향한 대규모 수출을 바탕으로, 대만은 서방 세계의 마이크로칩 공급처 역할을 수행하며 경제와 국가 안보의 균형을 맞추어 왔습니다. 또한 끊임없는 혁신을 통해 오늘날까지도 업계의 선두 자리를 굳건히 지키고 있습니다."
 TAI_flight_crew_strike: "타오위안 승무원 노조 파업"
 TAI_flight_crew_strike_desc: "결과가 없으면! 멈추지 않는다!"