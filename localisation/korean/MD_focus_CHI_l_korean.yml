 track_ii: "Track II Contacts"
 apply_to_join_as_a_member_desc: "Full membership in the Shanghai Cooperation Organization confers access to the organization's security architecture, economic investment channels, and political coordination mechanisms. The application triggers a ninety-day consideration period and, if approved, awards the appropriate membership tier idea based on China's current focus path."
 apply_to_join_as_an_observer_desc: "Observer status grants access to Shanghai Cooperation Organization summits, joint exercises, and economic coordination frameworks without the obligations of full membership. Applicants must clear a ninety-day review period by China and, where applicable, Russia before the idea is granted."
 BRI_apply_for_mining_project: "Apply for BRI Mining Project"
 BRI_apply_for_mining_project_desc: "Request Chinese investment in extractive operations: copper, lithium, rare earths, bauxite, or iron ore."
 BRI_apply_for_pipeline_project: "Apply for BRI Pipeline Project"
 BRI_apply_for_pipeline_project_desc: "Request Chinese financing for an oil, gas, or refined-products pipeline tying our resource base to BRI offtakers."
 BRI_apply_for_port_project: "Apply for BRI Port Project"
 BRI_apply_for_port_project_desc: "Request Chinese investment in a deepwater port, container terminal, or maritime logistics hub on our coast."
 BRI_apply_for_powerplant_project: "Apply for BRI Power Plant Project"
 BRI_apply_for_powerplant_project_desc: "Request Chinese financing for a coal, hydro, solar, or nuclear power station to alleviate domestic energy shortages."
 BRI_apply_for_prestige_project: "Apply for BRI Prestige Project"
 BRI_apply_for_prestige_project_desc: "Request a flagship signature project: a stadium, parliament building, presidential palace, or convention centre. Politically valuable, economically secondary."
 BRI_apply_for_railway_project: "Apply for BRI Railway Project"
 BRI_apply_for_railway_project_desc: "Request a high-speed or freight rail corridor connecting our economy to the wider Belt and Road network."
 BRI_apply_for_sez_project: "Apply for BRI Special Economic Zone"
 BRI_apply_for_sez_project_desc: "Request a Chinese-anchored Special Economic Zone with industrial parks, customs facilities, and concessional tax treatment."
 BRI_apply_for_telecom_project: "Apply for BRI Telecom Project"
 BRI_apply_for_telecom_project_desc: "Request Chinese investment in a 5G backbone, fibre rollout, or data centre cluster under the Digital Silk Road."
 BRI_request_loan_extension: "Request Loan Extension"
 BRI_request_loan_extension_desc: "Petition Beijing for restructured terms on a defaulted Belt and Road obligation."
 CHI_16_national_congress_mission: "16th Congress of the Chinese Communist Party"
 CHI_16_national_congress_mission_desc: "The 16th National Congress of the Chinese Communist Party will convene in 2002, marking a generational leadership transition."
 CHI_16_national_congress_mission_tt: "§RThis will bypass the focusses needed to complete§! §Y$CHI_the_shanghai_succession$§!"
 CHI_17_national_congress_mission: "17th Congress of the Chinese Communist Party"
 CHI_17_national_congress_mission_desc: "The 17th National Congress will convene in 2007 to consolidate the current leadership's agenda."
 CHI_18_national_congress_mission: "18th Congress of the Chinese Communist Party"
 CHI_18_national_congress_mission_desc: "The 18th National Congress will convene in 2012, expected to bring significant leadership changes."
 CHI_19_national_congress_mission: "19th Congress of the Chinese Communist Party"
 CHI_19_national_congress_mission_desc: "The 19th National Congress will convene in 2017 to review the party's direction and reaffirm its leadership."
 CHI_20_national_congress_mission: "20th Congress of the Chinese Communist Party"
 CHI_20_national_congress_mission_desc: "The 20th National Congress will convene in 2022 amid questions about leadership continuity and term limits."
 CHI_21_national_congress_mission: "21th Congress of the Chinese Communist Party"
 CHI_21_national_congress_mission_desc: "The 21st National Congress will convene in 2027 to chart the party's course for the next era."
 CHI_abolish_birth_limits: "Remove Birth Limits"
 CHI_abolish_birth_limits_desc: "All remaining restrictions on family size are formally repealed. The state shifts from limiting births to actively encouraging them, ending an era of population control that began under Mao and was institutionalised under Deng. The change acknowledges that enforcement costs now outweigh any demographic benefit of restriction and that voluntary fertility is already far below replacement rate."
 CHI_activate_princeling_network: "Activate the Princeling Network"
 CHI_activate_princeling_network_desc: "The alumni contacts, business ties, and general-staff assets are brought together into a coordinated instrument of policy. The Princeling Network begins operating as our decisive lever over Pyongyang."
 CHI_activate_rare_earth_embargo: "Activate Rare Earth Embargo"
 CHI_activate_rare_earth_embargo_desc: "Cut tungsten and chromium exports to Japan. The embargo holds until lifted, Japan capitulates, or Tokyo diversifies its supply."
 CHI_adopt_three_child_policy: "Three-Child Policy"
 CHI_adopt_three_child_policy_desc: "Following the 2020 census results, Beijing permits couples to have up to three children and pairs the announcement with a package of subsidies, extended parental leave, and caps on private tutoring costs. Analysts note that South Korea, Japan, and Singapore tried similar measures with limited effect; China's rapidly rising urban living costs and cultural shift toward smaller families pose the same structural barrier."
 CHI_adopt_two_child_policy: "Two-Child Policy"
 CHI_adopt_two_child_policy_desc: "The State Council announces the universal two-child policy, effective 1 January 2016. The one-child limit, in force since 1980, is lifted for all couples. Demographic modellers project only a modest uptick in births: after decades of small-family norms, cost of living, housing prices, and female labour-force participation suppress fertility well below replacement even without legal constraints."
 CHI_anti_desertification_belt: "Three-North Shelterbelt Expansion"
 CHI_anti_desertification_belt_desc: "The Three-North Shelterbelt Programme, running since 1978 across northern China, Inner Mongolia, and the northeast, is the world's largest afforestation campaign, with a planned total of 88 billion trees by 2050. New planting phases focus on mixed-species stands that anchor soil, retain snowmelt, and restore degraded watershed catchments in the Loess Plateau and the Hunshandake Sandy Lands. Restored vegetative cover reduces sediment loads in the Yellow River and slows the southward advance of the Gobi Desert."
 CHI_arunachal_attack_475_from_589: "Attack Arunachal from Xizang"
 CHI_arunachal_attack_475_from_589_desc: "Launches a border war from the Xizang state into Arunachal Pradesh. Requires readiness above sixty and tension above eighty. Once the flag is set, the operation commits the PLA to a contested zone assault with defined win, lose, and cancel event chains."
 CHI_arunachal_attack_589_from_475: "Attack Xizang from Arunachal"
 CHI_arunachal_attack_589_from_475_desc: "Launches a border war from Arunachal Pradesh back into Xizang. Requires readiness above sixty and tension above eighty. Used when India holds Arunachal and China seeks to contest the Xizang corridor."
 CHI_arunachal_attack_589_from_982: "Attack Xizang from Sikkim"
 CHI_arunachal_attack_589_from_982_desc: "Launches a border war from Sikkim into Xizang. Requires readiness above sixty and tension above eighty. Used when India controls Sikkim and seeks to exploit a Chinese forward position."
 CHI_arunachal_attack_982_from_589: "Attack Sikkim from Xizang"
 CHI_arunachal_attack_982_from_589_desc: "Launches a border war from Xizang into the Sikkim state. Requires readiness above sixty and tension above eighty. Opens a second axis of pressure along the Doklam-area frontier."
 CHI_arunachal_extort_xp: "Learn From The Conflict"
 CHI_arunachal_extort_xp_desc: "Converts battlefield experience accumulated during the border campaign into thirty Army Experience, reflecting lessons learned in high-altitude combined-arms operations. Requires at least fifty war-progress points."
 CHI_arunachal_grab_475: "Capture Arunachal"
 CHI_arunachal_grab_475_desc: "Formalises Chinese control of Arunachal Pradesh after sufficient war-progress points have accumulated. Consuming eighty progress points triggers a state transfer and notifies India via a diplomatic event."
 CHI_arunachal_grab_589: "Capture Xizang"
 CHI_arunachal_grab_589_desc: "Formalises Chinese control of Xizang after sufficient war-progress points have accumulated. Consuming eighty progress points triggers a state transfer and notifies India via a diplomatic event."
 CHI_arunachal_grab_982: "Capture Sikkim"
 CHI_arunachal_grab_982_desc: "Formalises Chinese control of Sikkim after sufficient war-progress points have accumulated. Consuming eighty progress points triggers a state transfer and notifies India via a diplomatic event."
 CHI_arunachal_prepare_army_training: "Conduct Army Exercises"
 CHI_arunachal_prepare_army_training_desc: "Infantry and command-and-control units deploy to the Himalayan frontier for high-altitude acclimatisation drills. The exercise consumes thirty infantry equipment sets and seven C2 units, costs twenty Command Power, and raises the Arunachal readiness score by five to twenty points. There is a ten-percent chance of triggering an escalation event."
 CHI_arunachal_prepare_arty_training: "Conduct Artillery Training"
 CHI_arunachal_prepare_arty_training_desc: "Artillery batteries conduct live-fire exercises along the Himalayan border, expending five artillery equipment sets. The training costs twenty Command Power and raises the Arunachal readiness score by five to fifteen points."
 CHI_arunachal_prepare_attack: "Prepare Infantry Attack"
 CHI_arunachal_prepare_attack_desc: "Forward infantry formations adopt aggressive patrol postures and conduct probing actions near Indian-held positions, raising the Arunachal tension score by ten to twenty-five points. There is a ten-percent chance of triggering a border escalation event."
 CHI_arunachal_prepare_mech_training: "Conduct Mechanized Training"
 CHI_arunachal_prepare_mech_training_desc: "Mechanised formations conduct manoeuvre exercises near the Line of Actual Control, consuming amphibious and main-battle-tank stocks. The training costs twenty Command Power and raises the Arunachal readiness score by ten to thirty points. A ten-percent chance of an escalation event accompanies each exercise cycle."
 CHI_arunachal_prepare_shelling: "Prepare Artillery Shelling"
 CHI_arunachal_prepare_shelling_desc: "Artillery units execute harassment fire across the Line of Actual Control, raising the Arunachal tension score by ten to twenty-five points. A ten-percent chance of triggering a border escalation event accompanies each shelling operation."
 CHI_Asset_Seizure: "Seize Strategic Asset"
 CHI_Asset_Seizure_desc: "Convert defaulted infrastructure into Chinese-controlled holdings via long-term lease or equity transfer. Available only on the Predatory Lending path."
 CHI_asteroid_mining_investment: "Invest in Asteroid Mining"
 CHI_asteroid_mining_investment_desc: "Commit capital to a commercial space-resource venture. A successful operation unlocks one permanent industrial dividend drawn from platinum-group metals, rare earths, volatiles, and microgravity manufacturing. We can sustain at most five such operations at once."
 CHI_asteroid_survey_mission: "Survey Near-Earth Asteroids"
 CHI_asteroid_survey_mission_desc: "Building on the deep-space navigation proven by Tianwen, a prospecting probe charts the orbits and mineral composition of accessible near-Earth asteroids. A successful survey opens the door to commercial space resource extraction."
 CHI_automation_robotics_push: "Automation and Robotics Push"
 CHI_automation_robotics_push_desc: "China has become the world's largest installer of industrial robots, deploying more units annually than the European Union and the United States combined. A state-directed acceleration targets labour-intensive manufacturing sectors facing the steepest workforce shortfalls. Investment flows into collaborative robots, AI-assisted production lines, and smart logistics systems, substituting capital for the labour that demographic contraction is withdrawing."
 CHI_avic_innovation: "AVIC: Original Innovation"
 CHI_avic_innovation_desc: "Aviation Industry Corporation of China is the sprawling parent of the country's aircraft industry. Forcing its institutes to innovate rather than copy speeds the airframes on which Chinese air power depends."
 CHI_back_nepalese_communists: "Back Nepalese Communists"
 CHI_back_nepalese_communists_desc: "Channel funds and ideological support to communist factions in Kathmandu, slowly tilting Nepal's political balance toward Beijing."
 CHI_beijing_hosted_talks: "Host Beijing Emergency Summit"
 CHI_beijing_hosted_talks_desc: "Summon Korean leaders to Beijing for emergency mediation. When bilateral talks have broken down, only a Chinese host can bring both sides back to the table."
 CHI_beijing_washington_consultation: "Open a Beijing-Washington Consultation"
 CHI_beijing_washington_consultation_desc: "A quiet back channel to the U.S. State Department lets Beijing and Washington manage the Korean question over Seoul's head. The arrangement unsettles Tokyo, which fears being sidelined."
 CHI_big_fund_iii_allocate_tranche_decision: "Allocate Big Fund III Tranche"
 CHI_big_fund_iii_allocate_tranche_decision_desc: "The 344 billion yuan third phase of the National IC Industry Investment Fund disburses to a target sub-sector. Each tranche pushes another fab to full utilisation."
 CHI_boycott_lotte: "Boycott Lotte"
 CHI_boycott_lotte_desc: "Organize a popular boycott of Lotte Group properties in China in response to Lotte's lease of land for the THAAD deployment site."
 CHI_BRI_Forum_Triennial: "Host Belt and Road Forum"
 CHI_BRI_Forum_Triennial_desc: "Stage the triennial Belt and Road Forum in Beijing. Heads of state from across the network gather to renew commitments and announce new flagship projects. Requires a Belt and Road treasury of at least 150. Major treasury outlay with a three-year cooldown."
 CHI_BRI_management: "Belt and Road Initiative"
 CHI_BRI_management_desc: "The Belt and Road Initiative is China's foremost instrument of economic statecraft, channeling credit into ports, railways, energy corridors, and digital infrastructure across partner nations worldwide. Each project reinforces physical connectivity and political leverage simultaneously.\n\n§YTreasury:§! ¥[?CHI_bri_treasury|0]B  |  Monthly contribution: +[?CHI_bri_monthly_income_total|0]\n§YProjects:§! [?CHI_bri_committed_projects|0]/[?CHI_bri_project_slots|0] committed  |  §G[?CHI_bri_completed_projects|0]§! completed  |  §R[?CHI_bri_defaulted_projects|0]§! defaulted\n§YGlobal Presence:§! [?CHI_bri_global_presence|0]  |  §GWin-Win [?CHI_bri_winwin_score|0]§!  ·  §RPredatory [?CHI_bri_predatory_score|0]§!"
 CHI_BRI_promote_digital_silk_road: "Upgrade Digital Silk Road"
 CHI_BRI_promote_digital_silk_road_desc: "When the telecommunications infrastructure tally crosses the required threshold, this decision upgrades the Digital Silk Road tier idea, reflecting Chinese-built fibre-optic networks, satellite ground stations, and Huawei-supplied mobile infrastructure spreading across partner states."
 CHI_BRI_promote_economic_zones: "Upgrade Special Economic Zones"
 CHI_BRI_promote_economic_zones_desc: "When the industrial-zone development tally crosses the required threshold, this decision upgrades the Special Economic Zones tier idea, reflecting Chinese-managed export-processing and logistics hubs that anchor supply chains and provide preferential conditions for Chinese enterprises in partner countries."
 CHI_BRI_promote_energy_arteries: "Upgrade Energy Arteries"
 CHI_BRI_promote_energy_arteries_desc: "When the pipeline construction tally crosses the required threshold, this decision upgrades the Energy Arteries tier idea, representing expanded oil and gas transmission infrastructure connecting Central Asian producers to Chinese refineries and reducing exposure to maritime chokepoints."
 CHI_BRI_promote_maritime_network: "Upgrade Maritime Network"
 CHI_BRI_promote_maritime_network_desc: "When the Belt and Road Initiative's port construction tally crosses the required threshold, this decision upgrades the Maritime Network tier idea, expanding China's influence over seaborne trade routes and concessional port access from the Indian Ocean to the Mediterranean."
 CHI_BRI_promote_overland_corridors: "Upgrade Overland Corridors"
 CHI_BRI_promote_overland_corridors_desc: "When the railway construction tally crosses the required threshold, this decision upgrades the Overland Corridors tier idea, reflecting completion of additional transcontinental rail links that reduce transit costs and deepen economic dependency across Central Asia and the Caucasus."
 CHI_BRI_promote_power_generation: "Upgrade Power Generation Network"
 CHI_BRI_promote_power_generation_desc: "When BRI-financed power-plant construction crosses the required threshold, this decision upgrades the Power Generation tier idea, reflecting coal, hydro, and solar installations built by Chinese firms that supply electricity to partner economies while creating long-term maintenance dependencies."
 CHI_BRI_promote_prestige_diplomacy: "Upgrade Prestige Diplomacy"
 CHI_BRI_promote_prestige_diplomacy_desc: "When prestige-project completions cross the required threshold, this decision upgrades the Prestige Diplomacy tier idea, reflecting landmark stadiums, government buildings, and cultural centres that generate goodwill and demonstrate the reach of Chinese statecraft."
 CHI_BRI_promote_resource_concessions: "Upgrade Resource Concessions"
 CHI_BRI_promote_resource_concessions_desc: "When secured resource concessions cross the required threshold, this decision upgrades the Resource Concessions tier idea, representing long-term extraction agreements for copper, cobalt, lithium, and other strategic minerals that feed Chinese manufacturing supply chains."
 CHI_BRI_recipient_actions: "Belt and Road Initiative"
 CHI_BRI_recipient_actions_desc: "Apply for Belt and Road Initiative project funding from the People's Republic of China."
 CHI_build_mega_rail_hub: "Build Mega Rail Hub"
 CHI_build_mega_rail_hub_desc: "Construct a sprawling integrated rail terminal in one of China's major cities, on the scale of Beijing South, Shanghai Hongqiao, or Guangzhou South. These hubs fuse high-speed rail, metro, and intercity lines into a single node and accelerate construction and logistics across the region."
 CHI_build_public_housing: "Build Public Housing"
 CHI_build_public_housing_desc: "Mobilise construction brigades to build state-owned rental housing in [FROM.GetName]. Projects occupy civilian factory capacity for two years and reduce the national consumer goods burden upon completion."
 CHI_caic_innovation: "CAIC: Original Innovation"
 CHI_caic_innovation_desc: "Changhe Aircraft Industries builds the PLA's dedicated attack helicopters, from the Z-10 to the Z-19. Freeing its engineers to take risks accelerates a rotary-wing strike fleet that has long trailed Western designs."
 CHI_cancel_east_china_sea_exercise: "Cancel the East China Sea Exercise"
 CHI_cancel_east_china_sea_exercise_desc: "Naval and air drills near the contested Senkaku, or Diaoyu, islands routinely inflame relations with Tokyo. Standing down the planned exercise signals restraint, reassures Japan, and supports the narrative of a peaceful rise."
 CHI_casc_innovation: "CASC: Original Innovation"
 CHI_casc_innovation_desc: "China Aerospace Science and Technology Corporation runs the nation's space launches, ballistic missiles and satellites. Reforming it accelerates the orbital and strategic systems that underpin Chinese deterrence."
 CHI_casic_innovation: "CASIC: Original Innovation"
 CHI_casic_innovation_desc: "China Aerospace Science and Industry Corporation builds the country's cruise and tactical missiles, from the YJ family to land-attack systems. Letting its bureaus take risks sharpens the precision-strike arsenal."
 CHI_central_theatre_command: "Central Theatre Command"
 CHI_central_theatre_command_desc: "The Central Theatre Command in Beijing is the strategic reserve and the shield of the capital. It holds the command authority and the morale of the force that backs every other direction."
 CHI_cetc_innovation: "CETC: Original Innovation"
 CHI_cetc_innovation_desc: "China Electronics Technology Group supplies the radars, sensors and battle-management systems behind every modern platform. Reforming its research culture pushes Chinese computing and artificial intelligence toward the frontier."
 CHI_chang_e_mission: "Launch the Chang'e Probe"
 CHI_chang_e_mission_desc: "A Chang'e robotic mission departs for the Moon to land, survey, and relay through the Queqiao bridge satellite. The data it returns charts the terrain for the astronauts who will follow. Success odds improve as our launch experience grows."
 CHI_cheju_summit_arrangement: "Arrange a Cheju Summit"
 CHI_cheju_summit_arrangement_desc: "The resort island of Cheju, or Jeju, offers neutral ground for high-level talks with South Korea. A summit may yield a diplomatic breakthrough, but an ill-prepared meeting risks a public rebuff that hardens both sides."
 CHI_convene_bilateral_channel: "Convene a Bilateral Channel"
 CHI_convene_bilateral_channel_desc: "The Quadrilateral Security Dialogue links the United States, Japan, India, and Australia against Beijing. Opening a quiet bilateral channel with Tokyo sows doubt about the grouping's cohesion and slows its consolidation."
 CHI_crack_down_tibet_separatism: "Crack Down on Tibetan Separatism"
 CHI_crack_down_tibet_separatism_desc: "Suppress separatist organization across Tibet through coordinated security and administrative measures. Reinforces central authority and accelerates integration."
 CHI_crack_down_xinjiang_separatism: "Crack Down on Xinjiang Separatism"
 CHI_crack_down_xinjiang_separatism_desc: "Deploy internal security forces across Xinjiang to dismantle separatist cells. Tightens state control over the region and boosts compliance, but draws international scrutiny."
 CHI_crewed_lunar_landing_mission: "Land Astronauts on the Moon"
 CHI_crewed_lunar_landing_mission_desc: "A Long March 10 lifts the Mengzhou crew vehicle and the Lanyue lander from Wenchang for separate launches that rendezvous in lunar orbit. The crew must descend to the lunar south polar region, plant the flag, and return safely, making China the second nation to put humans on the Moon."
 CHI_critical_minerals_export_license_decision: "Critical Minerals Export Curbs"
 CHI_critical_minerals_export_license_decision_desc: "Restrict gallium, germanium, and rare-earth exports under the August 2023 licensing framework. Revenue per ton rises as supply tightens."
 CHI_crrc_innovation: "CRRC: Original Innovation"
 CHI_crrc_innovation_desc: "China Railway Rolling Stock Corporation is the world's largest maker of rail equipment, a dual-use heavy-industry base of enormous scale. Directing its engineering toward defence broadens the industrial foundation beneath it."
 CHI_csgc_innovation: "CSGC: Original Innovation"
 CHI_csgc_innovation_desc: "China South Industries Group builds the army's armoured fighting vehicles and light weapons alongside its civilian car lines. Cutting through its caution unlocks a modern family of combat vehicles."
 CHI_csic_innovation: "CSIC: Original Innovation"
 CHI_csic_innovation_desc: "China Shipbuilding Industry Corporation, the historic home of Chinese submarine design, drives the silent service beneath the waves. Reforming its institutes accelerates the next generation of attack and ballistic-missile boats."
 CHI_cssc_innovation: "CSSC: Original Innovation"
 CHI_cssc_innovation_desc: "China State Shipbuilding Corporation is the giant behind the PLA Navy's surface fleet, including its aircraft carriers. Letting its yards innovate speeds the warships of a blue-water navy."
 CHI_cultivate_pyongyang_contacts: "Cultivate Pyongyang Contacts"
 CHI_cultivate_pyongyang_contacts_desc: "China remains North Korea's indispensable patron, supplying the bulk of its fuel and food. Building discreet relationships inside the Pyongyang leadership lets Beijing pull at the regime's internal stability without overt interference."
 CHI_current_congress_mission: "National Congress Active"
 CHI_current_congress_mission_desc: "The National Congress is in session. Committee appointments are being finalized."
 CHI_cxmt_hbm_qualification_decision: "Qualify CXMT HBM for Domestic AI"
 CHI_cxmt_hbm_qualification_decision_desc: "Move CXMT's high-bandwidth memory into Cambricon, Biren, and Moore Threads accelerator builds, ending Nvidia and Samsung dependency in domestic AI workloads."
 CHI_dandong_military_district: "Reinforce the Dandong Military District"
 CHI_dandong_military_district_desc: "Dandong sits on the Yalu River across from North Korea, the principal crossing of the China-DPRK frontier. Strengthening the Northeast garrison honours the Lips and Teeth doctrine of mutual defence with Pyongyang and hardens the Manchurian border."
 CHI_de_escalate_at_LAC: "De-escalate at the Line of Actual Control"
 CHI_de_escalate_at_LAC_desc: "Following the 2020 Galwan Valley clashes, China and India maintained tense standoffs along the disputed Line of Actual Control in Ladakh. Ordering border personnel to pull back from forward positions eases the confrontation with New Delhi and lowers regional tensions."
 CHI_Debt_Restructuring: "Restructure Partner Debt"
 CHI_Debt_Restructuring_desc: "Offer concessional restructuring to a defaulting Belt and Road partner. Clears the default flag and improves bilateral relations. Available only on the Win-Win Cooperation path."
 CHI_deploy_paf_maritime_militia: "Deploy PAF Maritime Militia"
 CHI_deploy_paf_maritime_militia_desc: "Standing maritime militia presence around Diaoyu. Each month raises Senkaku Pressure and risks an incident."
 CHI_drip_irrigation_rollout: "Drip Irrigation Rollout"
 CHI_drip_irrigation_rollout_desc: "Chinese agriculture withdraws more than 360 billion cubic metres of water annually, most of it through flood-furrow irrigation whose efficiency rarely exceeds 50 percent. A national rollout of drip and micro-irrigation systems, modelled on Israel's precision agriculture experience and piloted in Xinjiang's cotton belt, reduces field-level water consumption by 30 to 50 percent per hectare. Subsidised equipment programmes and mandatory efficiency standards for new irrigation districts extend the technology from demonstration farms to the broader agricultural sector."
 CHI_duv_breakthrough_decision: "Push the SMEE DUV Programme"
 CHI_duv_breakthrough_decision_desc: "Force a Shanghai Micro Electronics 28nm immersion lithography demonstration. Success rewrites the global tool market; failure burns capital and pushes the timeline another year."
 CHI_eastern_theatre_command: "Eastern Theatre Command"
 CHI_eastern_theatre_command_desc: "Headquartered in Nanjing, the Eastern Theatre Command faces the Taiwan Strait and the East China Sea. Its forces are built around amphibious assault and the firepower needed to break a defended coastline."
 CHI_eleventh_five_year_plan_mission: "11th Five-Year Plan"
 CHI_eleventh_five_year_plan_mission_desc: "China's 11th Five-Year Plan (2006–2010) sets six mandatory development targets across economic growth, tertiary sector expansion, industrial capacity, national infrastructure, energy efficiency, and social welfare. The National Development and Reform Commission will monitor progress over the five-year window."
 CHI_establish_dandong_safe_houses: "Establish Dandong Safe Houses"
 CHI_establish_dandong_safe_houses_desc: "Set up safe houses along the Yalu to shelter and organize Jang-aligned defectors. A quiet staging ground for future operations."
 CHI_fabless_provincial_subsidy_decision: "Provincial Fabless Subsidy Round"
 CHI_fabless_provincial_subsidy_decision_desc: "Shanghai, Shenzhen, and Beijing each match the central Big Fund tranche with their own venture funding for the design-house cluster."
 CHI_facilitate_family_reunions: "Facilitate Family Reunions"
 CHI_facilitate_family_reunions_desc: "Use Chinese logistical networks to organize cross-border family reunions. The humanitarian payoff is matched by the diplomatic goodwill it generates."
 CHI_factional_balance_category: "Factional Balance"
 CHI_factional_balance_category_desc: "The Chinese Communist Party is not monolithic. Competing factions, rooted in patronage networks, ideological tendencies, and career trajectories, contest influence over personnel appointments, economic policy, and the pace of political reform. Managing the balance of power between these internal blocs is a prerequisite for stable governance."
 CHI_FOCAC_Summit: "Convene FOCAC Summit"
 CHI_FOCAC_Summit_desc: "Host a triennial Forum on China-Africa Cooperation summit. Strengthens opinion across African partners and signals continued commitment to the African development agenda. Costs treasury and political capital, with a three-year cooldown."
 CHI_fund_princeling_ventures: "Fund Princeling Business Ventures"
 CHI_fund_princeling_ventures_desc: "Bankroll cross-border enterprises run by North Korean princelings. Wealth tied to Chinese capital creates loyalty that ideology cannot."
 CHI_fusion_program: "National Fusion Program"
 CHI_fusion_program_desc: "Concentrate national research on controlled nuclear fusion at Hefei, home of the Experimental Advanced Superconducting Tokamak (EAST), the BEST device, and the planned China Fusion Engineering Test Reactor. Mastery of the 'artificial sun' promises a limitless source of clean electricity."
 CHI_gobi_desert_solar_expansion: "Gobi Solar and Wind Expansion Phase"
 CHI_gobi_desert_solar_expansion_desc: "Commission an additional phase of solar panel and wind turbine construction in the Gobi Desert, expanding renewable energy generation capacity. Each phase requires significant civilian construction capacity and temporarily reduces broad construction throughput across the country."
 CHI_grey_society_crisis: "Grey Society Crisis"
 CHI_grey_society_crisis_desc: "China's working-age population peaked around 2011 and has been shrinking ever since. Four decades of the one-child policy have inverted the age pyramid: a single child now typically supports two parents and four grandparents, while pension and healthcare costs rise faster than GDP. The next decade will test whether China can sustain growth as its labour force contracts and its elderly population expands. This crisis will persist for years; mitigation decisions reduce its duration."
 CHI_haig_innovation: "HAIG: Original Innovation"
 CHI_haig_innovation_desc: "Harbin Aircraft Industry Group produces the PLA's transport and utility helicopters, including the Z-9 and the new Z-20. Freeing its designers speeds a versatile rotary-wing fleet."
 CHI_hsr_beijing_shanghai: "Beijing-Shanghai High-Speed Railway"
 CHI_hsr_beijing_shanghai_desc: "Construct the 1,318-kilometre Beijing-Shanghai high-speed railway, linking the political and financial capitals of China. The busiest HSR corridor in the world at opening, it reduces journey time from fourteen hours to four hours and forty minutes at 300 km/h."
 CHI_hsr_beijing_tianjin: "Beijing-Tianjin Intercity Railway"
 CHI_hsr_beijing_tianjin_desc: "Construct the 117-kilometre Beijing-Tianjin intercity railway, our first high-speed line designed for commercial speeds of 350 km/h. Journey time between the two cities will fall from 70 minutes to 30 minutes, anchoring a unified Beijing-Tianjin-Hebei economic corridor."
 CHI_hsr_chengdu_chongqing: "Chengdu-Chongqing High-Speed Railway"
 CHI_hsr_chengdu_chongqing_desc: "Construct the high-speed rail connection between Chengdu and Chongqing, the twin anchors of the western development strategy. Completion integrates the two megacities into a single one-hour economic circle and forms the backbone of the expanding western HSR network."
 CHI_hsr_wuhan_guangzhou: "Wuhan-Guangzhou High-Speed Railway"
 CHI_hsr_wuhan_guangzhou_desc: "Construct the 1,069-kilometre Wuhan-Guangzhou high-speed railway, connecting central China to the Pearl River Delta manufacturing heartland. At opening it is the world's longest high-speed rail line and cuts the journey from over ten hours to under three."
 CHI_identify_beida_alumni: "Identify Peking University Alumni"
 CHI_identify_beida_alumni_desc: "Profile North Korean elite children educated at Peking University. Their Chinese ties and reformist leanings make them candidates for a future government."
 CHI_industrial_investment_category: "Petrochemical and Energy Investment Programme"
 CHI_industrial_investment_category_desc: "Strategic industrial investment decisions unlocked through China's petrochemical base and renewable energy focus trees."
 CHI_initiate_joint_exercises_with_RAJ: "Initiate Joint Exercises with India"
 CHI_initiate_joint_exercises_with_RAJ_desc: "Run a combined exercise cycle with the Indian Armed Forces to build trust and reinforce border de-escalation gains."
 CHI_initiate_joint_military_training: "Initiate Iron Brothers Joint Training"
 CHI_initiate_joint_military_training_desc: "Run a combined exercise cycle with the Pakistan Armed Forces to improve interoperability and doctrinal alignment."
 CHI_inner_mongolia_innovation: "First Machinery Group: Original Innovation"
 CHI_inner_mongolia_innovation_desc: "Inner Mongolia First Machinery Group is the cradle of Chinese armour, building the Type 99 main battle tank in Baotou. Cutting through its bureaucratic caution unlocks a new generation of heavy fighting vehicles."
 CHI_insert_jang_assets: "Insert Jang Assets"
 CHI_insert_jang_assets_desc: "Move Jang-aligned operatives back into the DPRK under cover. In place, they await activation."
 CHI_invest_domestic_arms_lines: "Invest in Domestic Arms Lines"
 CHI_invest_domestic_arms_lines_desc: "Direct state funds into NORINCO and AVIC production lines so that PLA orders are filled at home rather than through Rosoboronexport contracts. Each round of investment narrows the gap with Russian suppliers."
 CHI_invite_basf_caojing: "BASF Verbund Integration"
 CHI_invite_basf_caojing_desc: "Approve BASF's proposal to construct an integrated Verbund chemical complex at the Caojing Chemical Industry Park and the Zhanjiang coastal zone. The €8.7 billion investment brings advanced polymer and acrylics manufacturing together with a process integration model that links utilities, raw materials, and by-product streams across eighteen chemical plants, the first Verbund site outside Europe."
 CHI_invite_bayer_nanjing: "Covestro Materials Science Centre"
 CHI_invite_bayer_nanjing_desc: "Invite Covestro, formerly Bayer MaterialScience, to establish a regional research and production headquarters in Shanghai. The €3 billion facility produces polycarbonates, polyurethane precursors, and advanced coatings, and relocates the division's global research and development centre from Germany, transferring polymer chemistry expertise applicable to industrial and high-performance materials."
 CHI_invite_exxonmobil_jv: "ExxonMobil Quanzhou Joint Venture"
 CHI_invite_exxonmobil_jv_desc: "Approve ExxonMobil's 25 percent equity stake in the Fujian Refining and Petrochemical Company at Quanzhou, establishing the first fully integrated Sino-foreign refinery and petrochemical complex. ExxonMobil contributes advanced steam-cracking and polyolefin production technology alongside operational expertise in large-scale integrated refining."
 CHI_invite_JAP_hitachi: "Invite Hitachi"
 CHI_invite_JAP_hitachi_desc: "Hitachi's industrial and defence electronics divisions produce railway control systems, power generation equipment, and embedded computing hardware with broad dual-use application across Chinese industrial and military infrastructure."
 CHI_invite_JAP_honda: "Invite Honda Motor Company"
 CHI_invite_JAP_honda_desc: "Honda's powertrain engineering and robotics divisions contribute compact engine technology and factory automation systems applicable to both civilian manufacturing and defense-adjacent production lines."
 CHI_invite_JAP_howa: "Invite Howa Machinery"
 CHI_invite_JAP_howa_desc: "Howa Machinery is the primary manufacturer of the Type 89 and Type 20 assault rifles for the Japan Ground Self-Defense Force. Its precision machining processes and small-arms production line management offer direct transferable value."
 CHI_invite_JAP_ihi: "Invite IHI Corporation"
 CHI_invite_JAP_ihi_desc: "IHI Corporation is Japan's leading manufacturer of aero-engines and ship propulsion systems, producing turbofan engines for military aircraft and turbine components for naval vessels under licence from Western partners."
 CHI_invite_JAP_jmu: "Invite Japan Marine United"
 CHI_invite_JAP_jmu_desc: "Japan Marine United is the JMSDF's principal surface combatant builder, responsible for Izumo-class helicopter destroyers and Atago-class guided missile destroyers. Its modular naval architecture methods are directly applicable to Chinese shipbuilding programmes."
 CHI_invite_JAP_jr_east: "Invite JR East"
 CHI_invite_JAP_jr_east_desc: "JR East operates the most advanced high-speed rail network in the world. Its rolling stock engineering, signalling systems, and infrastructure maintenance expertise provide both civilian economic value and strategic transport modernisation."
 CHI_invite_JAP_jsw: "Invite Japan Steel Works"
 CHI_invite_JAP_jsw_desc: "Japan Steel Works is the world's leading producer of large-diameter steel forgings used in pressure vessels, naval gun barrels, and nuclear reactor components. Its metallurgical expertise would directly upgrade Chinese heavy industrial output."
 CHI_invite_JAP_kawasaki_aerospace: "Invite Kawasaki Heavy Industries (Aerospace)"
 CHI_invite_JAP_kawasaki_aerospace_desc: "Kawasaki's aerospace branch produces the C-2 transport aircraft and P-1 maritime patrol aircraft, giving it deep competency in large-airframe construction and mission systems integration relevant to both commercial and defense applications."
 CHI_invite_JAP_kawasaki_shipbuilding: "Invite Kawasaki Heavy Industries (Shipyard)"
 CHI_invite_JAP_kawasaki_shipbuilding_desc: "Kawasaki Heavy Industries' shipyard division is responsible for Soryu-class submarine construction. Its submarine pressure-hull fabrication and acoustic signature reduction know-how represent a significant transfer of naval capability."
 CHI_invite_JAP_komatsu: "Invite Komatsu Defense"
 CHI_invite_JAP_komatsu_desc: "Komatsu Defense manufactures light armoured vehicles and self-propelled artillery for the Japan Ground Self-Defense Force. Its modular construction approach and lightweight armour solutions complement existing Chinese vehicle programmes."
 CHI_invite_JAP_mhi_tank: "Invite Mitsubishi Heavy Industries (Land Systems)"
 CHI_invite_JAP_mhi_tank_desc: "Mitsubishi Heavy Industries' land systems division produces the Type 10 and Type 90 main battle tanks and a range of armoured vehicles. Cooperation transfers armour design methodology and advanced composite armour techniques."
 CHI_invite_JAP_mitsubishi_aerospace: "Invite Mitsubishi Aerospace"
 CHI_invite_JAP_mitsubishi_aerospace_desc: "Mitsubishi Heavy Industries' aerospace division is Japan's primary developer of advanced military aircraft, including the F-2 platform and the nascent F-X programme. Its presence in China would bring airframe engineering expertise and dual-use manufacturing capability."
 CHI_invite_JAP_mitsubishi_shipbuilding: "Invite Mitsubishi Shipbuilding"
 CHI_invite_JAP_mitsubishi_shipbuilding_desc: "Mitsubishi's shipbuilding arm builds destroyer hulls and submarine pressure vessels for the Japan Maritime Self-Defense Force, offering naval construction techniques and precision welding processes suited to high-end warship programmes."
 CHI_invite_JAP_nec: "Invite NEC Corporation"
 CHI_invite_JAP_nec_desc: "NEC Corporation is a leading Japanese developer of C4ISR systems, satellite communications hardware, and signals intelligence platforms. Its integration expertise spans both defense electronics and civilian network infrastructure."
 CHI_invite_JAP_nippon_steel: "Invite Nippon Steel"
 CHI_invite_JAP_nippon_steel_desc: "Nippon Steel is one of the world's largest producers of high-tensile structural steel. Its high-hardness armour plate and specialty alloy output serve both the Japanese defence industry and the broader infrastructure sector."
 CHI_invite_JAP_panasonic: "Invite Panasonic"
 CHI_invite_JAP_panasonic_desc: "Panasonic supplies advanced battery technology, ruggedized electronics, and thermal imaging components to the Japanese defence supply chain, with production standards directly applicable to military platform integration."
 CHI_invite_JAP_subaru: "Invite Subaru Aerospace"
 CHI_invite_JAP_subaru_desc: "Subaru Corporation's aerospace division produces helicopter fuselages and fixed-wing airframe components under licence, with particular strength in precision metalwork and rotary-wing structural design."
 CHI_invite_JAP_toshiba: "Invite Toshiba Defense Systems"
 CHI_invite_JAP_toshiba_desc: "Toshiba Defense Systems produces radar arrays, electronic warfare suites, and missile guidance hardware for the Japan Self-Defense Forces, bringing critical sensor technology and embedded systems engineering to the partnership."
 CHI_invite_JAP_toyota: "Invite Toyota Motor Corporation"
 CHI_invite_JAP_toyota_desc: "Toyota's advanced manufacturing systems and just-in-time logistics principles underpin not only commercial vehicle production but also the light utility and logistics vehicle programmes supplied to Japan's armed forces."
 CHI_invite_saudi_aramco: "Saudi Aramco Strategic Refinery Stake"
 CHI_invite_saudi_aramco_desc: "Offer Saudi Aramco equity stakes in the Fujian Refining and Petrochemical Company and the Hengli Petrochemical complex in Dalian. Aramco's 25 percent stake in Fujian and 10 percent stake in Hengli integrate a combined 400,000-barrel-per-day refining capacity with a guaranteed crude supply pipeline from the Arabian Peninsula, anchoring China's refining sector to a long-term source of Saudi crude."
 CHI_invite_shell_chem: "Shell Daya Bay Chemical Partnership"
 CHI_invite_shell_chem_desc: "Expand the Shell-CNOOC joint venture at the Daya Bay Petrochemical Zone in Guangdong. Shell's 50-50 partnership with CNOOC operates a 1.6-million-tonne-per-year ethylene cracker and produces polyethylene, polypropylene, ethylene glycol, polyether polyols, and styrene, diversifying China's downstream chemical output across the southern coast."
 CHI_jap_capitulate_to_demands: "Capitulate to Chinese Demands"
 CHI_jap_capitulate_to_demands_desc: "Accept Beijing's terms. The embargo lifts, but the political cost at home is real."
 CHI_jap_diversify_rare_earth: "Diversify Rare Earth Supply"
 CHI_jap_diversify_rare_earth_desc: "A year-long crash programme to escape Chinese rare earth dependence. Painful, but renders future embargoes ineffective."
 CHI_jap_open_back_channel: "Open Back-Channel Talks"
 CHI_jap_open_back_channel_desc: "Use the back-channel to lower the temperature in the Senkaku theatre."
 CHI_jap_reinforce_coast_guard: "Reinforce Coast Guard"
 CHI_jap_reinforce_coast_guard_desc: "Surge JCG patrols in the East China Sea. Deters Chinese incursions but feeds the escalation cycle."
 CHI_japan_strategy: "Japan Strategy"
 CHI_japan_strategy_desc: "The full menu of Sino-Japanese rivalry: rare earth coercion, RCEP alignment, Senkaku maritime pressure, back-channel diplomacy, and industrial invitations. Both Beijing and Tokyo issue decisions from here as the relationship oscillates between coercion and accommodation."
 CHI_kaesong_expansion: "Expand the Kaesong Complex"
 CHI_kaesong_expansion_desc: "The Kaesong Industrial Region, where Southern capital once employed Northern labour, was shuttered in 2016 as inter-Korean ties collapsed. Brokering its reopening as a co-developer eases tension on the peninsula and ties both Koreas to Chinese investment."
 CHI_KPA_Officer_Exchange: "KPA Officer Exchange Programme"
 CHI_KPA_Officer_Exchange_desc: "Dispatch PLA officers to Pyongyang for joint training and planning sessions with Korean People's Army counterparts. Each cycle deepens military interoperability and Chinese leverage over North Korean command."
 CHI_kpop_media_ban: "K-Pop Media Ban"
 CHI_kpop_media_ban_desc: "Restrict the broadcast and distribution of Korean entertainment content in China. The ban targets Korean Wave cultural products as leverage against Seoul's security alignment choices."
 CHI_LATAM_emergency_aid: "Emergency Aid to LATAM Partner"
 CHI_LATAM_emergency_aid_desc: "Send a discretionary aid package to a Latin American security umbrella partner. Boosts their stability and our influence."
 CHI_LATAM_intel_sharing_pact: "Intelligence Sharing Pact"
 CHI_LATAM_intel_sharing_pact_desc: "Open a bilateral intelligence sharing channel with a partner government. Grants reciprocal military access and reinforces partnership."
 CHI_LATAM_military_advisors: "Deploy Military Advisors"
 CHI_LATAM_military_advisors_desc: "Send PLA training cadres to a partner military. Transfers army experience and deepens defence ties."
 CHI_LATAM_security_options: "Latin American Security Options"
 CHI_launch_payload: "Launch a Payload"
 CHI_launch_payload_desc: "Maintain a steady launch cadence from Jiuquan, Xichang, Wenchang, and Taiyuan. Each successful launch builds the operational experience that raises the odds of our flagship missions and is a prerequisite for committing to the Moon."
 CHI_lift_rare_earth_embargo: "Lift Rare Earth Embargo"
 CHI_lift_rare_earth_embargo_desc: "End the export ban on rare earths. Tokyo gets a reprieve."
 CHI_lift_thaad_sanctions: "Lift THAAD Sanctions"
 CHI_lift_thaad_sanctions_desc: "Formally lift the informal economic sanctions imposed in response to the THAAD deployment. The decision signals a willingness to normalize relations with Seoul."
 CHI_localise_licensed_system: "Localise a Licensed System"
 CHI_localise_licensed_system_desc: "Reverse-engineer and indigenise a system currently built under Russian licence, whether an engine, a radar or a missile seeker, cutting the royalties paid to Moscow and proving Chinese industry can stand on its own."
 CHI_locate_jang_loyalists: "Locate Jang Loyalists"
 CHI_locate_jang_loyalists_desc: "Identify surviving members of Jang Song-thaek's faction scattered across the border regions. The purged network retains resentment toward the Kim inner circle."
 CHI_mature_node_export_drive_decision: "Mature-Node Export Drive"
 CHI_mature_node_export_drive_decision_desc: "Subsidise SMIC and Hua Hong customers to flood global automotive, IoT, and white-goods markets with sub-28nm chips. Each tranche stacks trade opinion."
 CHI_megaprojects: "National Megaprojects"
 CHI_megaprojects_desc: "China's tradition of state-directed megaprojects, from the Three Gorges Dam to the world's largest high-speed rail network. Commit national resources to flagship builds that reshape the country's water, power, and transport systems."
 CHI_military_decisions_category: "Military Restructuring"
 CHI_MSS_Pyongyang_Station: "MSS Pyongyang Station"
 CHI_MSS_Pyongyang_Station_desc: "Expand the Ministry of State Security station in Pyongyang to increase intelligence coverage of the North Korean leadership and early-warning capability for regime instability."
 CHI_MSS_Quiet_Removal_Operation: "Quiet Removal Operation"
 CHI_MSS_Quiet_Removal_Operation_desc: "The Ministry of State Security has identified a hardline faction in Pyongyang obstructing the reform agenda. A discreet operation can remove the obstacle and clear the path for further liberalization."
 CHI_national_commitee_decisions_category: "National Committee"
 CHI_national_commitee_decisions_category_desc: "\n£MAIN_desctext_sco \n\n\n\nThe Central Committee of the Chinese Communist Party governs party affairs between National Congresses. Every five years, a new Congress convenes to elect committee members, appoint secretaries, and set the political direction of the party."
 CHI_NKO_Rason_SEZ_Investment: "Rason SEZ Investment"
 CHI_NKO_Rason_SEZ_Investment_desc: "Commit direct funding to the Rason Special Economic Zone. The investment unlocks port access and demonstrates the viability of North Korean economic reform."
 CHI_norinco_innovation: "NORINCO: Original Innovation"
 CHI_norinco_innovation_desc: "China North Industries Group is the country's largest land-systems conglomerate, supplying the small arms and artillery of the entire ground force. Breaking its design bureaus out of cautious imitation lets them pursue genuinely new infantry and gun systems."
 CHI_northern_theatre_command: "Northern Theatre Command"
 CHI_northern_theatre_command_desc: "Centred on Shenyang, the Northern Theatre Command covers the Korean Peninsula and the Russian border. It emphasises operational planning and the cohesion of its heavy combined-arms formations."
 CHI_olympic_athlete_village: "Athlete Village and Media Centre"
 CHI_olympic_athlete_village_desc: "Construct the Olympic athlete village and the international media broadcast centre in the northern part of the Olympic Green. Upon completion the buildings will be converted to residential and commercial use, adding to Beijing's housing and office stock."
 CHI_olympic_environmental_program: "Environmental Programme"
 CHI_olympic_environmental_program_desc: "Accelerate coal-to-gas switching in Beijing's heating network, relocate the Capital Steel Group's most polluting facilities, and launch a large-scale afforestation campaign in the surrounding mountains. The programme will improve air quality to Olympic standards and demonstrate China's commitment to sustainable development."
 CHI_olympic_mission: "Prepare for the Beijing Olympics"
 CHI_olympic_mission_desc: "We have committed to hosting the 2008 Beijing Olympics. The international community will be watching. Fund all four preparation programmes - venues, athlete housing, transport, and the environment - before the deadline. Failure to deliver on time will embarrass the government and undermine public confidence."
 CHI_olympic_preparations: "Olympic Preparations"
 CHI_olympic_preparations_tt: "If we manage to complete all Olympic preparation focuses, we will gain:"
 CHI_olympic_transport_links: "Olympic Transport Links"
 CHI_olympic_transport_links_desc: "Extend subway lines to the Olympic Green, open the Beijing Capital Airport Express, and upgrade the Qinhuangdao-Shenyang railway corridor to handle the surge in passenger and freight traffic expected during and after the Games."
 CHI_olympic_venue_construction: "Olympic Venue Construction"
 CHI_olympic_venue_construction_desc: "Fund the construction of the National Stadium, National Aquatics Centre, and National Velodrome in the Olympic Green district. These centrepiece venues will serve as the permanent legacy of the 2008 Beijing Olympics and double as commercial and sporting hubs for the capital."
 CHI_pacific_pla_training: "Pacific PLA Training"
 CHI_patrol_diaoyu_fishing_grounds: "Patrol Diaoyu Fishing Grounds"
 CHI_patrol_diaoyu_fishing_grounds_desc: "Send PAF cutters into contested waters. Pressure rises and Tokyo will be forced to react."
 CHI_pla_joint_maritime_exercise: "Pacific Joint Maritime Exercise"
 CHI_pla_joint_maritime_exercise_desc: "Conduct joint maritime exercises with our Pacific BRI partners. Boosts their naval experience and our influence across the region."
 CHI_pla_train_SOL: "Train Solomon Islands Security Forces"
 CHI_pla_train_SOL_desc: "Dispatch PLA training cadres to assist Solomon Islands security forces. Transfers army experience and deepens defence ties."
 CHI_poly_innovation: "Poly Technologies: Original Innovation"
 CHI_poly_innovation_desc: "Poly Technologies, the PLA's arms-export arm, sits astride the whole catalogue of Chinese military hardware. Turning its commercial reach toward genuine development broadens progress across the defence sector."
 CHI_Press_NKO_on_Nuclear: "Press Pyongyang on Nuclear Restraint"
 CHI_Press_NKO_on_Nuclear_desc: "Apply direct diplomatic pressure on North Korea to freeze nuclear testing and limit deployments. Progress is incremental but demonstrates to Washington that Beijing is a serious partner on non-proliferation."
 CHI_pressure_iaea_access: "Pressure for IAEA Access"
 CHI_pressure_iaea_access_desc: "Lean on Pyongyang to admit IAEA inspectors to the Yongbyon complex. Chinese pressure carries weight where Western demands only harden North Korean resistance."
 CHI_princeling_intelligence_report: "Princeling Intelligence Report"
 CHI_princeling_intelligence_report_desc: "Consolidate the latest reporting from network assets inside the North Korean leadership. Each review sharpens our picture of the regime's factions, rivalries, and pressure points."
 CHI_pro_natalist_subsidies: "Pro-Natalist Subsidies"
 CHI_pro_natalist_subsidies_desc: "Local governments across China begin issuing direct cash transfers, housing purchase subsidies, and extended maternity and paternity leave to incentivise childbearing. Provinces including Jilin and Sichuan pilot programmes worth tens of thousands of yuan per child. International comparisons suggest substantial fiscal expenditure yields only marginal fertility gains, but the subsidies reduce household costs and support domestic consumption in the near term."
 CHI_propose_unity_government: "Propose Korean Unity Government"
 CHI_propose_unity_government_desc: "Table a formal Chinese proposal for a transitional unity government under mutual recognition. The boldest diplomatic gambit of the era, and the riskiest."
 CHI_push_rcep_signing: "Push for the RCEP Signing"
 CHI_push_rcep_signing_desc: "The Regional Comprehensive Economic Partnership, signed in November 2020 and in force from January 2022, binds China, Japan, South Korea, the ASEAN states, Australia, and New Zealand into the world's largest free trade area. Securing the signing anchors us at the centre of Asian trade."
 CHI_railway_central_upgrade: "Central Rail Corridor Upgrade"
 CHI_railway_central_upgrade_desc: "Upgrade rail terminals and infrastructure in Central China and the Beijing hub, covering Hubei, Henan, and Beijing. Strengthening this corridor reduces congestion on China's densest freight arteries and improves the supply of industrial materials to interior manufacturing zones."
 CHI_railway_east_upgrade: "Eastern Rail Corridor Upgrade"
 CHI_railway_east_upgrade_desc: "Upgrade rail terminals and infrastructure in East and Central China, connecting Jiangxi, Anhui, and Sichuan into a continuous freight and passenger network. The improvements increase regional construction capacity and reduce the time needed to move industrial inputs inland from coastal ports."
 CHI_railway_improvement: "National Railway Modernisation"
 CHI_railway_north_upgrade: "Northern Rail Corridor Upgrade"
 CHI_railway_north_upgrade_desc: "Upgrade rail terminals and surface infrastructure along the North China corridor linking Hebei, Shanxi, and the surrounding provinces. Improved rail capacity increases supply throughput, reduces logistics costs, and accelerates construction across the region."
 CHI_railway_south_upgrade: "Southern Rail Corridor Upgrade"
 CHI_railway_south_upgrade_desc: "Upgrade rail terminals and infrastructure across South China and Yunnan, tying Guangdong, Hunan, and the southwestern border provinces into the national network. The programme enables faster movement of manufactured goods and agricultural produce while supporting industrial expansion along the corridor."
 CHI_railway_west_upgrade: "Western Rail Corridor Upgrade"
 CHI_railway_west_upgrade_desc: "Upgrade rail terminals and infrastructure across the northwest and southwest, connecting Shaanxi, Gansu, Chongqing, and Xinjiang to the national freight network. The investment reduces transport costs for western industrial parks and opens previously isolated provinces to large-scale manufacturing supply chains."
 CHI_raise_retirement_age: "Raise the Retirement Age"
 CHI_raise_retirement_age_desc: "China's statutory retirement age, set in 1978, is among the lowest in the world: 60 for men, 55 for white-collar women, and 50 for blue-collar women. A phased increase extends working life by two to five years, keeping experienced workers in the labour force longer and easing pressure on the pension system. Resistance from workers expecting early retirement and from youth fearing reduced hiring is significant."
 CHI_rare_earth_chip_leverage_decision: "Leverage Rare-Earth Controls"
 CHI_rare_earth_chip_leverage_decision_desc: "Tie relief from the Western chip embargo to continued Chinese rare-earth and gallium exports. Open talks with Washington: success relaxes the controls and advances self-reliance, refusal hardens the embargo and burns the political capital spent."
 CHI_rare_earth_embargo_decision: "Pull the Rare Earth Lever"
 CHI_rare_earth_embargo_decision_desc: "China refines close to ninety percent of the world's rare earth elements, the magnets inside every guided missile and stealth aircraft. Cutting a rival's access seizes its defence production for months, at the price of political capital and a reputation as an unreliable supplier."
 CHI_rare_earth_supply_assurance: "Guarantee Rare Earth Supply"
 CHI_rare_earth_supply_assurance_desc: "China refines the overwhelming majority of the world's rare earth elements, the inputs for South Korean semiconductors, batteries, and displays. Offering Seoul a guaranteed supply makes us a reliable partner and weakens Washington's hold on its ally."
 CHI_rcep_deepening: "RCEP Deepening"
 CHI_rcep_deepening_desc: "Propose accelerated implementation of RCEP commitments to regional partners. Deeper economic integration with the Asia-Pacific consolidates China's position as the region's indispensable economic partner."
 CHI_recall_paf_maritime_militia: "Recall PAF Maritime Militia"
 CHI_recall_paf_maritime_militia_desc: "Withdraw the standing militia presence and let pressure cool."
 CHI_rein_in_cliques: "Rein in the Cliques"
 CHI_rein_in_cliques_desc: "Periodically audit the smuggling cliques and patronage networks before they grow beyond control. Clawing back embezzled funds refills the treasury and reasserts the Party's confidence, though the officer corps resents the scrutiny."
 CHI_replace_synopsys_cadence_decision: "Replace Synopsys and Cadence"
 CHI_replace_synopsys_cadence_decision_desc: "After the May 2025 export ban, push all domestic fabless houses onto Empyrean, Primarius, and Xpeedic EDA flows for full design coverage."
 CHI_retry_chang_e_mission: "Re-launch the Chang'e Probe"
 CHI_retry_chang_e_mission_desc: "The probe failed to reach or survey the Moon. Build a replacement and send it on its way."
 CHI_retry_shenzhou_mission: "Re-fly the Shenzhou Mission"
 CHI_retry_shenzhou_mission_desc: "The last attempt fell short. Review the flight data, correct the fault, and stack another Shenzhou for launch."
 CHI_retry_tiangong_mission: "Retry the Tiangong Assembly"
 CHI_retry_tiangong_mission_desc: "The docking or module insertion did not go to plan. Refit and try the station assembly again."
 CHI_sac_innovation: "Shenyang Aircraft: Original Innovation"
 CHI_sac_innovation_desc: "Shenyang Aircraft Corporation builds the heavy fighters of the PLA Air Force and Navy, from the J-11 series to the carrier-borne J-15 and the J-35. Reforming it sharpens the cutting edge of Chinese air combat."
 CHI_sco_anti_terror_crackdown: "Launch Anti-Terror Crackdown"
 CHI_sco_anti_terror_crackdown_desc: "Direct security services to carry out a sweeping crackdown on terrorist networks under the SCO Three Evils framework. Temporarily raises our counter-terror posture at the cost of domestic stability."
 CHI_sco_apply_as_dialogue_partner: "Apply for Dialogue Partner Status"
 CHI_sco_apply_as_dialogue_partner_desc: "We can formally request Dialogue Partner status within the Shanghai Cooperation Organization. This is the first step toward deeper engagement with China and its partners."
 CHI_sco_category: "The Shanghai Cooperation Organization"
 CHI_sco_category_desc: "\n£MAIN_desctext_sco \n\n\n\n§YThe Shanghai Cooperation Organization§! or §YSCO§! is a Eurasian intergovernmental organization focused on economic, political and security cooperation. Originating from §Ythe Shanghai Five§!, it has evolved into a broad framework through which §Y[CHI.GetFlag]China§! and §Y[SOV.GetFlag]Russia§! expand their influence while managing regional stability and cooperation.\n\nRather than functioning as a traditional alliance, the §YSCO§! grows through gradual integration. Countries may first become §YDialogue Partners§!, then §YObservers§!, before eventually applying for full §YMembership§!.\n\nThe willingness of countries to cooperate with the §YSCO§! depends on several factors:\n\n§YChinese Aggression§! reflects how assertive §Y[CHI.GetFlag]China§! is. Lower levels make the organization more attractive, while higher levels discourage cooperation and may push members away.\n\n§YSCO Cohesion§! represents internal stability and trust between participating states. High cohesion improves cooperation and project effectiveness, while low cohesion slows integration and increases the risk of members disengaging.\n\n§YChina-Russia Balance§! determines the internal political stability of the organization. A balanced relationship ensures smooth expansion, while dominance by either side may lead to friction, delays, or reduced cooperation.\n\nThrough joint §YEconomic§!, §YSecurity§! and §YStrategic Projects§!, the §YSCO§! allows its participants to expand their influence, strengthen regional ties and build an alternative power bloc across Eurasia.\n\nIf Chinese aggression exceeds levels §R5§! and §R10§!, §Y[JAP.GetNameWithFlag]§! will gain new options to broaden Article 9 in ways that counter [CHI.GetFlag]§Y[CHI.GetAdjectiveCap]§! military positions.\n\n$CHI_chinese_aggression_display$\n$CHI_sco_cohesion_display$\n$CHI_sco_balance_display$"
 CHI_sco_cohesion_decay: "SCO Cohesion Adjustment"
 CHI_sco_cohesion_decay_desc: "A hidden annual recalibration that nudges SCO Cohesion toward its natural equilibrium of five, adjusted upward by half a point for each active mega-project. If cohesion is above the equilibrium it decreases by one; if below, it increases by one."
 CHI_sco_consider_leaving: "Reconsider SCO Membership"
 CHI_sco_consider_leaving_desc: "An AI-managed hidden decision through which member and observer states evaluate whether deteriorating relations with Beijing or rising SCO cohesion problems justify downgrading their participation. States with high Chinese aggression exposure or poor opinion of China will weigh departure more seriously."
 CHI_sco_upgrade_to_member: "Apply for Full SCO Membership"
 CHI_sco_upgrade_to_member_desc: "As a recognized Observer, we can now apply for full membership in the Shanghai Cooperation Organization."
 CHI_sco_upgrade_to_observer: "Apply for Observer Status"
 CHI_sco_upgrade_to_observer_desc: "Having established ourselves as a Dialogue Partner, we can now seek full Observer status within the SCO, granting access to broader economic and political cooperation."
 CHI_scs_assertive_patrol_MAY: "Assertive Patrol: Malaysian Spratlys"
 CHI_scs_assertive_patrol_MAY_desc: "Order a PLAN flotilla into waters contested with Malaysia in the southern Spratlys near Luconia Shoals. Kuala Lumpur's economic ties with us complicate its response options, but a decisive win is still required to advance the clash counter. Inconclusive engagements are common given Malaysia's cautious posture; setbacks risk disrupting the infrastructure loan relationship."
 CHI_scs_assertive_patrol_PHI: "Assertive Patrol: Philippine Spratlys"
 CHI_scs_assertive_patrol_PHI_desc: "Order a PLAN flotilla into waters contested with the Philippines, targeting Philippine resupply operations at Ayungin Shoal and the eastern Spratly features. A decisive win advances the clash counter for the Philippines; an inconclusive outcome holds it; a setback costs CHI_scs_framework and may prompt Manila to invoke the US Mutual Defense Treaty consultations."
 CHI_scs_assertive_patrol_VIE: "Assertive Patrol: Vietnamese Spratlys"
 CHI_scs_assertive_patrol_VIE_desc: "Order a PLAN flotilla into waters contested with Vietnam, challenging Vietnamese coast guard and resupply vessels in the western Spratly chain. The operation has three possible outcomes: a decisive tactical win advances the clash counter toward the ultimatum threshold; an inconclusive engagement holds the counter steady; a setback lowers CHI_scs_framework and may invite a retaliatory diplomatic response from Hanoi."
 CHI_scs_block_asean_consensus: "Block ASEAN Consensus"
 CHI_scs_block_asean_consensus_desc: "Use Chinese influence over Cambodia and Laos to prevent a pending ASEAN-level rebuke from reaching the summit communique. Both states hold blocking positions within the consensus mechanism; their cooperation keeps the joint statement silent on South China Sea conduct. The manoeuvre raises CHI_chinese_aggression slightly as regional observers note the cynicism, but delivers a modest gain to CHI_scs_framework by preventing an institutionalised rebuke."
 CHI_scs_boundary_codification_MAY: "Maritime Boundary Treaty: Malaysia"
 CHI_scs_boundary_codification_MAY_desc: "Conclude a bilateral maritime boundary treaty with Malaysia, formalising the de facto arrangement in disputed southern waters. Kuala Lumpur's signature completes the ring of bilateral codifications and isolates any remaining multilateral challenge."
 CHI_scs_boundary_codification_PHI: "Maritime Boundary Treaty: Philippines"
 CHI_scs_boundary_codification_PHI_desc: "Conclude a bilateral maritime boundary treaty with the Philippines, superseding the 2016 UNCLOS arbitral award. Manila agrees to set aside the tribunal ruling in exchange for Chinese investment guarantees and expanded access to the joint development zone."
 CHI_scs_boundary_codification_VIE: "Maritime Boundary Treaty: Vietnam"
 CHI_scs_boundary_codification_VIE_desc: "Conclude a bilateral maritime boundary treaty with Vietnam on terms favourable to China, codifying agreed lines in the Tonkin Gulf and setting aside the Paracel and Spratly disputes under a joint-development framework. Hanoi accepts the arrangement as the best available outcome; Beijing secures a precedent."
 CHI_scs_carrier_strike_group_deployment: "Carrier Strike Group Deployment"
 CHI_scs_carrier_strike_group_deployment_desc: "Deploy a full carrier strike group to the South China Sea for an extended operational station. The deployment signals that China possesses and will exercise the capability to control the sea in force, not merely to contest it."
 CHI_scs_demand_tribute_MAY: "Demand the Nansha Cession"
 CHI_scs_demand_tribute_MAY_desc: "Issue an ultimatum to Kuala Lumpur to formally cede the northern Spratlys, including the Malaysian-occupied features around Swallow Reef and Ardasier. The note arrives wrapped in the memory of Zheng He's Ming-era patrols out of Malacca, reframing the demand as the resumption of an old order rather than a new annexation. Of the three claimants, Malaysia is the one most likely to swallow the loss in silence."
 CHI_scs_demand_tribute_PHI: "Demand the Zhongsha Cession"
 CHI_scs_demand_tribute_PHI_desc: "Issue an ultimatum to Manila to formally cede the Macclesfield Bank, the submerged feature already administered by China as Sansha's Zhongsha district. The note dispenses with the bilateral negotiating fiction and tests the 1951 Mutual Defense Treaty over a bank with no garrison and no airstrip, the cleanest possible probe of whether Washington still treats reefs as red lines."
 CHI_scs_demand_tribute_VIE: "Demand the Xisha Cession"
 CHI_scs_demand_tribute_VIE_desc: "Issue an ultimatum to Hanoi to formally cede the Paracels, territory we have held by force since the 1974 battle that ejected the Republic of Vietnam Navy from Crescent Group. The note dresses the demand in the language of historical entitlement predating French Indochina, framing it as the closure of an unfinished file rather than a new claim. Hanoi can ratify the loss in writing, or invite a second lesson on the 1979 model."
 CHI_scs_deploy_maritime_militia: "Deploy Maritime Militia"
 CHI_scs_deploy_maritime_militia_desc: "Forward-deploy fishing fleet vessels operating under PLAN coordination to a contested sea region. The militia provides persistent presence with plausible civilian cover, creating facts on the water faster than diplomatic protest can respond."
 CHI_scs_first_island_chain_exercise: "First Island Chain Exercise"
 CHI_scs_first_island_chain_exercise_desc: "Execute a major fleet exercise spanning the length of the First Island Chain from the Yellow Sea to the South China Sea. The exercise demonstrates anti-access and area denial capabilities against any power attempting to intervene inside the chain."
 CHI_scs_infrastructure_loan_MAY: "Infrastructure Loan: Malaysia"
 CHI_scs_infrastructure_loan_MAY_desc: "Extend Belt and Road infrastructure financing to Malaysia, covering the East Coast Rail Link and port expansion along the Malacca Strait corridor. The deal cements Malaysia's position as China's most economically integrated ASEAN partner."
 CHI_scs_infrastructure_loan_PHI: "Infrastructure Loan: Philippines"
 CHI_scs_infrastructure_loan_PHI_desc: "Extend Belt and Road infrastructure financing to the Philippines, covering bridge construction, rail development, and a new deep-water port. The offer arrives as Manila weighs the costs and benefits of its alliance with Washington."
 CHI_scs_infrastructure_loan_VIE: "Infrastructure Loan: Vietnam"
 CHI_scs_infrastructure_loan_VIE_desc: "Extend Belt and Road infrastructure financing to Vietnam, covering port upgrades, rail links, and industrial zone development. The loan deepens Vietnamese economic dependence on Chinese capital and raises the cost of diplomatic confrontation for Hanoi."
 CHI_scs_invoke_doc_2002: "Reaffirm the 2002 DOC"
 CHI_scs_invoke_doc_2002_desc: "Publicly reaffirm the 2002 Declaration on the Conduct of Parties in the South China Sea as the governing framework for dispute management. The gesture is largely symbolic but signals restraint to ASEAN partners and provides a diplomatic foundation for bilateral negotiations."
 CHI_scs_island_construction_civilian: "Build Civilian Infrastructure"
 CHI_scs_island_construction_civilian_desc: "Construct harbour facilities, weather monitoring stations, and permanent civilian housing on the island complex. The visible signs of ordinary occupation, schools, clinics, and administration buildings, reinforce the political argument that these features constitute inhabited Chinese territory."
 CHI_scs_island_construction_radar: "Erect Radar and SIGINT Arrays"
 CHI_scs_island_construction_radar_desc: "Construct signals intelligence collection facilities and over-the-horizon radar arrays on the artificial island. The installations provide persistent maritime domain awareness across the South China Sea and track foreign naval and air movements in real time."
 CHI_scs_island_construction_runway: "Construct Airstrip"
 CHI_scs_island_construction_runway_desc: "Lay a 3,000-metre paved airstrip on the artificial island complex, capable of handling combat aircraft and long-range maritime patrol planes. The airfield transforms the installation from a presence outpost into a power projection hub."
 CHI_scs_island_construction_sam_battery: "Install SAM Battery"
 CHI_scs_island_construction_sam_battery_desc: "Deploy long-range surface-to-air missile batteries on the island complex. The installations extend China's air defence envelope deep into the South China Sea, complicating any foreign freedom of navigation operation or air patrol."
 CHI_scs_joint_development_MAY: "Luconia Shoals Operating Agreement"
 CHI_scs_joint_development_MAY_desc: "Approach Petronas with a joint operating agreement covering blocks ND6 and SK308 around Luconia Shoals, where Chinese coast guard cutters already shadow Malaysian rigs at South Luconia. Kuala Lumpur's habit of compartmentalising the dispute behind closed doors makes it the easiest signature to obtain; a concluded deal becomes the template Beijing waves at Hanoi and Manila."
 CHI_scs_joint_development_PHI: "Revive the Manila Energy MOU"
 CHI_scs_joint_development_PHI_desc: "Revive the shelved Memorandum of Understanding on Oil and Gas Development, pairing CNOOC with PXP Energy over Service Contract 72 in the Reed Bank. Manila pockets a fixed revenue share and a wave of upstream investment in exchange for treating the 2016 arbitral award as politically dormant. The bilateral track buries the Philippine case under contract law."
 CHI_scs_joint_development_VIE: "Vanguard Bank Joint Operating Pact"
 CHI_scs_joint_development_VIE_desc: "Open quiet talks with Hanoi on a joint development zone over the Vanguard Bank overlap and the unresolved waters east of the 2000 Tonkin Gulf demarcation. CNOOC and PetroVietnam would split survey rights and revenue under a 'without prejudice to sovereignty' formula, freezing the legal question while the gas flows. The bilateral channel keeps ASEAN at arm's length and removes Hanoi's incentive to invoke UNCLOS."
 CHI_scs_natuna_press_claim: "Press the Nine-Dash Claim into Natuna"
 CHI_scs_natuna_press_claim_desc: "Issue a formal note asserting that our historic rights under the nine-dash line extend to waters overlapping Indonesia's Natuna EEZ. The claim is legally contested, as Indonesia does not regard itself as a South China Sea claimant, but its assertion extends the diplomatic frontier southward and creates a new pressure point on the largest ASEAN state."
 CHI_scs_natuna_provocation: "Natuna Provocation"
 CHI_scs_natuna_provocation_desc: "Deploy Chinese maritime militia vessels into Indonesia's Natuna Exclusive Economic Zone under the cover of routine fishing operations. The incursion is deniable but visible; Jakarta will respond diplomatically. The action probes the southern limit of Chinese operational reach and tests Indonesian resolve without committing regular PLAN assets."
 CHI_scs_reclaim_taiping: "Reclaim Taiping"
 CHI_scs_reclaim_taiping_desc: "Taiping Island (state 491) is the largest natural feature in the Spratly chain and remains under the administration of the Republic of China on Taiwan. With all three Spratly states secured, a direct operation to take Taiping represents the final act of South China Sea consolidation, separate from and preceding any broader Taiwan reunification scenario. The operation carries a very high Political Power cost and requires the PLAN's full South Sea commitment."
 CHI_scs_standoff_malaysia: "Conduct Standoff: Malaysia"
 CHI_scs_standoff_malaysia_desc: "Execute the Scarborough Model against a disputed feature claimed by Malaysia. Kuala Lumpur has historically managed the relationship with Beijing carefully; this standoff tests whether economic dependency restrains a formal diplomatic protest."
 CHI_scs_standoff_philippines: "Conduct Standoff: Philippines"
 CHI_scs_standoff_philippines_desc: "Execute the Scarborough Model against a disputed feature claimed by the Philippines. A Philippine fishing vessel encounter is escalated through coast guard confrontation until Manila withdraws, leaving a permanent Chinese presence."
 CHI_scs_standoff_vietnam: "Conduct Standoff: Vietnam"
 CHI_scs_standoff_vietnam_desc: "Execute the Scarborough Model against a disputed feature claimed by Vietnam. Hanoi's coast guard is outmatched and outmanned; the question is whether Hanoi accepts the loss quietly or escalates in a way that draws international attention."
 CHI_scs_summon_dragon_king_blessing: "Dragon King Fleet Blessing"
 CHI_scs_summon_dragon_king_blessing_desc: "Conduct a ceremonial blessing of the South Sea Fleet at the Tianhou Temple in Sanya, Hainan, invoking the protection of Mazu, the Goddess of the Sea, venerated by generations of South Sea sailors. The ceremony is broadcast nationally; the South Sea Fleet departs for exercises immediately afterward."
 CHI_secure_kpa_general_staff: "Secure KPA General Staff Contacts"
 CHI_secure_kpa_general_staff_desc: "Cultivate Chinese-aligned officers on the KPA General Staff. A serving general in the network is worth a dozen politicians in exile."
 CHI_seek_basing_BAN: "Request Naval Basing in Bangladesh"
 CHI_seek_basing_BAN_desc: "Approach Dhaka with a formal request for logistical access to Chittagong's port facilities, framed as a strategic partnership."
 CHI_seek_basing_BRM: "Request Naval Basing in Myanmar"
 CHI_seek_basing_BRM_desc: "Approach Naypyidaw with a formal request for logistical access to Kyaukpyu and Sittwe, framed as a strategic partnership."
 CHI_seek_basing_CBD: "Request Naval Basing in Cambodia"
 CHI_seek_basing_CBD_desc: "Approach Phnom Penh with a formal request for logistical access to Ream Naval Base, framed as a strategic partnership."
 CHI_seek_basing_PAK: "Expand Basing Rights in Pakistan"
 CHI_seek_basing_PAK_desc: "Build on the Iron Brothers partnership to expand Chinese naval logistics across Pakistani ports beyond Gwadar."
 CHI_seek_basing_SRI: "Request Naval Basing in Sri Lanka"
 CHI_seek_basing_SRI_desc: "Approach Colombo with a formal request for logistical access to Hambantota, framed as a strategic partnership."
 CHI_semiconductor_coop_with_kor: "Semiconductor Cooperation with Korea"
 CHI_semiconductor_coop_with_kor_desc: "Establish a joint semiconductor research and manufacturing initiative with South Korea. Access to Korean chip fabrication expertise accelerates Chinese technological development."
 CHI_seoul_hanbok_exchange: "Arrange a Seoul Hanbok Exchange"
 CHI_seoul_hanbok_exchange_desc: "Cultural diplomacy can ease tensions even amid disputes over shared heritage. Sponsoring a hanbok exchange in Seoul warms public sentiment and opens a softer channel of influence into South Korea."
 CHI_shenzhou_mission: "Fly the Shenzhou Mission"
 CHI_shenzhou_mission_desc: "A Shenzhou spacecraft is stacked atop a Long March 2F at the Jiuquan Satellite Launch Centre. The crew must reach orbit and return safely to confirm our independent human spaceflight capability. Success odds improve as our launch experience grows."
 CHI_sichuan_tibet_railway: "Sichuan-Tibet Railway"
 CHI_sichuan_tibet_railway_desc: "Drive a railway through the gorges and high passes between Chengdu and Lhasa, with more than 80 percent of its length in tunnels and on bridges. The link ends Tibet's isolation, tightens central control over the plateau, and provides a strategic artery toward the Indian frontier."
 CHI_skilled_immigration_drive: "Skilled Immigration Drive"
 CHI_skilled_immigration_drive_desc: "China's permanent residency system has historically been among the most restrictive of any major economy. A new high-skill visa track, modelled on green-card pathways in the United States and Canada, targets researchers, engineers, and entrepreneurs. The programme is modest by global standards but marks a significant policy reversal, acknowledging that domestic demographic supply alone cannot fill emerging gaps in technology and healthcare sectors."
 CHI_snwt_central_route: "South-North Water Transfer: Central Route"
 CHI_snwt_central_route_desc: "Channel water from the Danjiangkou Reservoir on the Han River in Hubei northward through Henan and Hebei to Beijing. Operational since December 2014, the Central Route supplies the capital's drinking water and relieves the chronic depletion of the North China Plain's aquifers."
 CHI_snwt_eastern_route: "South-North Water Transfer: Eastern Route"
 CHI_snwt_eastern_route_desc: "Pump water north from the lower Yangtze near Jiangsu along the course of the ancient Grand Canal to the parched cities of Shandong and Tianjin. The Eastern Route is the first of three diversion lines that together move roughly 44.8 billion cubic metres of water each year to the arid north."
 CHI_snwt_western_route: "South-North Water Transfer: Western Route"
 CHI_snwt_western_route_desc: "Divert the headwaters of the Yangtze across the Bayan Har mountains on the Qinghai-Tibet Plateau into the upper Yellow River, watering Qinghai, Gansu, and Shaanxi. The most technically daunting of the three routes, it would secure water for the entire arid northwest."
 CHI_south_china_sea_category: "South China Sea"
 CHI_south_china_sea_category_desc: "Ongoing decisions shaping our posture in the South China Sea. Actions here affect the South China Sea Framework variable, our relations with Vietnam, the Philippines, and Malaysia, and the risk of confrontation with the United States."
 CHI_southern_theatre_command: "Southern Theatre Command"
 CHI_southern_theatre_command_desc: "Based in Guangzhou, the Southern Theatre Command oversees the South China Sea and the Vietnamese border. It specialises in joint coordination across scattered island garrisons and the reconnaissance that ties them together."
 CHI_space_program: "China Space Programme"
 CHI_subcontinent_strategy: "Subcontinent Strategy"
 CHI_subcontinent_strategy_desc: "Our diplomatic and military toolkit for the Indian subcontinent: pressure along the Line of Actual Control, partnerships with Pakistan and the South Asian periphery, and the active Arunachal border conflict. Decisions issued from here shape escalation in the Himalayas and our leverage across the region.\n\n§YArunachal Readiness:§! [?THIS.CHI_arunachal_readiness]\n§YArunachal Tension:§! [?GLOBAL.CHI_arunachal_tension]\n§YArunachal Progress:§! [?THIS.CHI_arunachal_war_progress]"
 CHI_Surveillance_Export: "Export Surveillance Architecture"
 CHI_Surveillance_Export_desc: "Deploy Chinese surveillance and digital monitoring systems to a non-democratic partner. Strengthens authoritarian alignment and embeds Chinese telecoms standards."
 CHI_thaad_retaliation_escalate: "Escalate THAAD Retaliation"
 CHI_thaad_retaliation_escalate_desc: "When Seoul agreed to host the American THAAD missile-defence system in 2016, Beijing answered with an informal boycott that battered Lotte, Korean tourism, and cultural exports. Tightening the pressure deepens the economic punishment on South Korea."
 CHI_three_gorges_dam_decision: "Complete the Three Gorges Dam"
 CHI_three_gorges_dam_decision_desc: "Spanning the Yangtze at Yichang, the Three Gorges Dam became the world's largest power station upon full commissioning in 2012, with an installed capacity of 22.5 gigawatts. Completing it delivers a vast block of hydroelectric generation to the national grid."
 CHI_three_north_shelterbelt: "Three-North Shelterbelt Program"
 CHI_three_north_shelterbelt_desc: "Plant the 'Great Green Wall', a belt of forest and grassland stretching across the arid north from Xinjiang to the northeast. Launched in 1978 and running for decades, the program holds back the expanding Gobi, anchors the soil against dust storms, and reclaims farmland from the desert."
 CHI_tiangong_mission: "Assemble the Tiangong Station"
 CHI_tiangong_mission_desc: "The Tianhe core module must reach orbit and successfully dock with its first crewed visit before the Wentian and Mengtian laboratory cabins follow. A permanent orbital outpost is the foundation for everything beyond low Earth orbit. Success odds improve as our launch experience grows."
 CHI_tour_group_freeze: "Tour Group Freeze"
 CHI_tour_group_freeze_desc: "Suspend organized tour groups to South Korea. The freeze removes a major source of South Korean tourism revenue and signals our willingness to use economic tools coercively when our security interests demand it."
 CHI_track_ii_academic_forum: "Track II Academic Forum"
 CHI_track_ii_academic_forum_desc: "Sponsor a Track II dialogue between our scholars and their South Korean counterparts on peninsula stability. Informal channels build trust where official diplomacy stalls."
 CHI_Track_II_Diplomacy: "Track II Diplomacy"
 CHI_Track_II_Diplomacy_desc: "Fund informal academic and think-tank exchanges between our specialists, their American counterparts, and Korean scholars. Each round builds mutual understanding and prepares the ground for formal negotiations."
 CHI_trilateral_trade_forum: "Trilateral Trade Forum"
 CHI_trilateral_trade_forum_desc: "Convene a Beijing-Seoul-Pyongyang trade forum centered on the Kaesong model. Commercial interdependence creates its own constituency for peace."
 CHI_uhv_east_transmission: "Ultra-High-Voltage Grid: Eastern Transmission"
 CHI_uhv_east_transmission_desc: "Complete the long-distance ultra-high-voltage lines that carry electricity thousands of kilometres from the western bases to the load centres of Shanghai, Beijing, and Guangdong. Long-distance transmission cuts line losses and powers the coastal industrial heartland with clean western energy."
 CHI_uhv_west_generation: "Ultra-High-Voltage Grid: Western Generation Base"
 CHI_uhv_west_generation_desc: "Build out the great generating bases of the west: the Xinjiang wind and solar fields, the Inner Mongolian renewables, and the hydropower of the upper Yangtze. These remote energy hubs anchor the world's largest ultra-high-voltage transmission network."
 CHI_urban_water_recycling: "Urban Wastewater Recycling"
 CHI_urban_water_recycling_desc: "Beijing, Tianjin, and the major cities of Hebei province collectively discharge billions of cubic metres of municipal wastewater annually, most of it treated only to secondary level before release. A programme of advanced tertiary treatment plants and dedicated reclaimed-water distribution networks diverts treated effluent to industrial cooling, municipal landscaping, and river-channel augmentation. Tianjin has reached reclaimed-water reuse rates above 30 percent; the programme sets a national target of 25 percent urban reuse by 2030."
 CHI_us_korea_cost_signaling: "U.S.-Korea Cost Signaling"
 CHI_us_korea_cost_signaling_desc: "Signal to Washington and Seoul that their security alliance carries mounting economic and diplomatic costs. Targeted pressure measures remind both parties that the status quo is not cost-free."
 CHI_VEN_currency_swap_line: "Yuan-Bolivar Currency Swap Line"
 CHI_VEN_currency_swap_line_desc: "Establish a long-term currency swap line to shield Venezuela from dollar-denominated debt pressure and lock in commodity supply."
 CHI_VEN_emergency_food_aid: "Emergency Food Aid to Venezuela"
 CHI_VEN_emergency_food_aid_desc: "Dispatch food shipments and humanitarian aid to stabilise the Maduro government. Improves Venezuelan stability and our influence."
 CHI_VEN_oil_processing_aid: "Venezuelan Oil Processing Aid"
 CHI_VEN_oil_processing_aid_desc: "Send our engineers and refining capital to upgrade Venezuelan oil processing. The work boosts their extraction yield and deepens our stake in the Orinoco supply chain."
 CHI_VEN_petrocaribe_program: "Venezuela Support Program"
 CHI_water_conservation_project: "Provincial Conservation Project"
 CHI_water_conservation_project_desc: "A targeted water-conservation project is launched in one of the dry northern provinces, upgrading canal lining, rehabilitating groundwater monitoring networks, and building local storage reservoirs to reduce wastage and over-extraction. Each completed project reduces pressure on the provincial water table. The initiative can be repeated across the water-stressed provinces of Hebei, Shanxi, Henan, and Shaanxi, and a sufficient number of completed projects will ease China's national water shortage."
 CHI_water_shortage_category: "Water Conservation Projects"
 CHI_western_theatre_command: "Western Theatre Command"
 CHI_western_theatre_command_desc: "The largest by area, the Western Theatre Command in Chengdu guards the Himalayan frontier with India and the restive interior. Its troops train for high-altitude defence and dug-in positional warfare."
 CHI_yangtze_delta_integration_mission: "Yangtze Delta Integration"
 CHI_yangtze_delta_integration_mission_desc: "With Shanghai, Jiangsu, and Zhejiang committed to coordinated development, the Yangtze River Delta is positioned to become China's most productive industrial and export corridor. Provinces that lift their factory output above the target threshold within the year will earn lasting growth in regional productivity."
 give_up_membership_status_desc: "Leaving the Shanghai Cooperation Organization ends participation in its joint security exercises, economic corridors, and political consultation frameworks. Members with strong Chinese aggression readings or active wars against fellow members face growing pressure to exit the bloc."
 give_up_observer_status_desc: "Withdrawal from observer status severs ties with the Shanghai Cooperation Organization's economic and security programmes. The decision is typically driven by alignment shifts toward NATO or the West, or by deteriorating relations with Beijing."
 host_joint_exercises_desc: "China or Russia may convene a full SCO joint military exercise, spending forty Command Power to deliver a temporary combat-readiness idea to all member states for twenty-one days. A random army leader gains a skill level upon conclusion. The exercise cannot be launched while any member is at war."
 offer_joint_exercises_specific_desc: "A bilateral drill proposal sent to a specific fellow SCO member. On acceptance, both parties spend twenty Command Power to run a fourteen-day joint exercise that grants the SCO joint drill specific idea and concludes with a mutual military cooperation opinion modifier."
 provide_development_assistance_desc: "Channel resources toward [FROM.GetName] to strengthen their development and deepen their ties with the SCO framework."
 sco_bilateral_border_patrol: "Joint Border Patrol with [FROM.GetName]"
 sco_bilateral_border_patrol_desc: "Coordinate border security operations with [FROM.GetName] to combat cross-border crime and strengthen mutual trust."
 sco_bilateral_cultural_exchange: "Cultural Exchange with [FROM.GetName]"
 sco_bilateral_cultural_exchange_desc: "Launch a cultural and academic exchange programme with [FROM.GetName], fostering people-to-people ties and mutual understanding."
 sco_bilateral_energy_deal: "Energy Partnership with [FROM.GetName]"
 sco_bilateral_energy_deal_desc: "Negotiate a long-term energy supply agreement with [FROM.GetName], stabilizing prices and securing strategic resource flows."
 sco_bilateral_intel_sharing: "Intelligence Sharing with [FROM.GetName]"
 sco_bilateral_intel_sharing_desc: "Establish a secure intelligence-sharing channel with [FROM.GetName] to coordinate counter-terrorism and security operations."
 sco_bilateral_trade_agreement: "Bilateral Trade Agreement with [FROM.GetName]"
 sco_bilateral_trade_agreement_desc: "Establish a formal trade framework with [FROM.GetName] under the SCO umbrella, reducing tariffs and encouraging joint investment."
 sco_megaproject_air_defense_optin: "Join SCO Joint Air Defense"
 sco_megaproject_air_defense_optin_desc: "Opt in to the SCO Joint Air Defense network, contributing to shared radar and missile defense infrastructure."
 sco_megaproject_air_defense_propose: "Propose SCO Joint Air Defense"
 sco_megaproject_air_defense_propose_desc: "Propose an integrated air defense network across SCO member states, sharing radar coverage and coordinating anti-air operations."
 sco_megaproject_dev_bank_optin: "Join the SCO Development Bank"
 sco_megaproject_dev_bank_optin_desc: "Join the SCO Development Bank as a contributing member, gaining access to low-interest development financing."
 sco_megaproject_dev_bank_propose: "Propose SCO Development Bank"
 sco_megaproject_dev_bank_propose_desc: "Propose the establishment of a multilateral development bank to finance infrastructure and development across SCO member states."
 sco_megaproject_energy_grid_optin: "Join the SCO Energy Grid"
 sco_megaproject_energy_grid_optin_desc: "Opt in to the SCO Energy Grid project, contributing resources in exchange for access to shared power infrastructure."
 sco_megaproject_energy_grid_propose: "Propose SCO Energy Grid"
 sco_megaproject_energy_grid_propose_desc: "Propose the construction of an integrated energy grid spanning SCO member states, reducing costs and improving energy security for all participants."
 sco_megaproject_railway_optin: "Join the Trans-Eurasian Railway"
 sco_megaproject_railway_optin_desc: "Opt in to the Trans-Eurasian Railway project, investing in the trade corridor for long-term economic benefits."
 sco_megaproject_railway_propose: "Propose Trans-Eurasian Railway"
 sco_megaproject_railway_propose_desc: "Propose a continent-spanning railway network to connect SCO member economies, dramatically improving trade flows and construction capacity."
 start_joint_exercises_specific_desc: "Finalises a bilateral SCO drill with a member that has accepted the offer. Both nations receive the SCO joint drill specific idea for fourteen days, and the exercise concludes with a mutual military cooperation opinion gain."
 chi_bri.1.a: "Begin the work"
 chi_bri.1.d: "In September 2013, President Xi Jinping stood before an audience in Astana, Kazakhstan, and sketched an audacious vision: a Silk Road Economic Belt linking China to Europe, Central Asia, and Africa. The initiative would come to be known as the Belt and Road, the largest infrastructure programme in history."
 chi_bri.1.t: "One Belt, One Road"
 chi_bri.10.a: "Offer concessional terms"
 chi_bri.10.d: "A formal application has arrived from [FROM.GetName]. Their delegation is seeking Chinese financing and expertise for the §Y[FROM.GetBRIProjectName]§!. Beijing must weigh the strategic value of the partnership against the financial and political terms it is prepared to offer."
 chi_bri.10.d_opt: "Decline the application"
 chi_bri.10.t: "[FROM.GetName] Requests a Belt and Road Project"
 chi_bri.103.a: "Accept the invitation"
 chi_bri.103.b: "Decline the offer"
 chi_bri.103.d: "Beijing has extended a formal invitation to become a founding member of the Asian Infrastructure Investment Bank. Membership comes with annual dividend payments from infrastructure projects across the BRI network, though it ties our financial fortunes to Chinese-led initiatives. The economic ministry awaits our decision."
 chi_bri.103.t: "China Invites Us to Join the AIIB"
 chi_bri.104.a: "Welcome the new member"
 chi_bri.104.d: "[From.GetName] has accepted our invitation to join the Asian Infrastructure Investment Bank as a founding member. Their participation strengthens the bank's legitimacy and broadens its reach."
 chi_bri.104.t: "[From.GetName] Joins the AIIB"
 chi_bri.105.a: "Note their position"
 chi_bri.105.d: "[From.GetName] has declined our invitation to join the Asian Infrastructure Investment Bank. Their refusal signals a clear preference for Western-led financial institutions and complicates our regional ambitions."
 chi_bri.105.t: "[From.GetName] Rejects AIIB Membership"
 chi_bri.13.a: "Grant the extension"
 chi_bri.13.b: "Refuse the extension"
 chi_bri.13.d: "[FROM.GetName] has petitioned Beijing to restructure its outstanding Belt and Road obligations, citing fiscal constraints and unforeseen circumstances. The request carries both a humanitarian dimension and a strategic calculation."
 chi_bri.13.t: "Request for Loan Extension"
 chi_bri.131.a: "Grant docking rights for economic support"
 chi_bri.131.b: "Decline the request"
 chi_bri.131.d: "Beijing has approached us with a proposal: grant the People's Liberation Army Navy docking and refuelling privileges at our ports in exchange for substantial economic assistance. The package would boost our exports and industrial output for the next decade, but accepting would draw Australian and American scrutiny."
 chi_bri.131.t: "China Requests Docking Rights"
 chi_bri.132.a: "Reassess our Pacific posture"
 chi_bri.132.d: "[From.GetName] has unilaterally revoked the docking privileges previously granted to the PLA Navy. Cooling relations and competing Western inducements have eroded the agreement we worked so hard to secure."
 chi_bri.132.t: "Basing Rights Revoked"
 chi_bri.133.a: "Accept the brokered pact"
 chi_bri.133.b: "Decline the arrangement"
 chi_bri.133.d: "Beijing proposes itself as the guarantor of a non-aggression understanding between us and our regional rival. Should either side break the peace, China pledges to side with the aggrieved party. The offer carries weight given Beijing's growing diplomatic clout."
 chi_bri.133.t: "China Offers to Broker a Non-Aggression Pact"
 chi_bri.134.a: "Honour the pact and declare war"
 chi_bri.134.b: "Stay neutral and accept the reputational cost"
 chi_bri.134.d: "War has erupted between two parties whose non-aggression pact we personally guaranteed. Honour and credibility demand that we declare for the victim, but war with the aggressor would be costly. Inaction will be remembered."
 chi_bri.134.t: "Our Brokered Pact Has Been Broken"
 chi_bri.135.a: "Coordinate with our Chinese partners"
 chi_bri.135.d: "Beijing has notified us that, in accordance with the non-aggression understanding it brokered, the People's Republic will enter the war on our side. The diplomatic weight of Chinese intervention reshapes the strategic picture."
 chi_bri.135.t: "China Will Honour the Pact"
 chi_bri.15.a: "Gwadar Port (Balochistan)"
 chi_bri.15.b: "Balochistan Special Economic Zone"
 chi_bri.15.c: "Lahore Railway Corridor (Punjab)"
 chi_bri.15.d: "Beijing has approved a flagship mega-project for [FROM.GetName]. Unlike ordinary Belt and Road works, this undertaking will be Chinese-managed and carry Chinese strategic interests directly. The choice of location will define the project's purpose for decades to come."
 chi_bri.15.d_opt: "Hambantota Port (Southern Province)"
 chi_bri.15.e: "Colombo Port City (Western Province)"
 chi_bri.15.f: "Mombasa-Nairobi SGR Terminal"
 chi_bri.15.g: "Coastal strategic facility"
 chi_bri.15.t: "Mega-Project: Where to Build?"
 chi_bri.20.a: "Accept the lease terms"
 chi_bri.20.b: "Refuse to surrender the port"
 chi_bri.20.d: "Unable to service the debts accrued during construction, the government of Sri Lanka is facing a stark choice. China Merchants Port Holdings has proposed a 99-year lease on Hambantota Port in exchange for debt relief. Critics call it debt-trap diplomacy; proponents call it pragmatic statecraft."
 chi_bri.20.t: "Hambantota: The 99-Year Lease"
 chi_bri.21.a: "Grant China naval access"
 chi_bri.21.b: "Politely decline"
 chi_bri.21.d: "With the China-Pakistan Economic Corridor fully operational, the PLA Navy has approached Islamabad with a quiet but significant request: the right to use Gwadar as a logistics and resupply point. The decision would transform CPEC from an economic corridor into a strategic foothold."
 chi_bri.21.t: "Gwadar: A Request for Naval Facilities"
 chi_bri.22.a: "Grant China basing rights"
 chi_bri.22.b: "Reject the proposal"
 chi_bri.22.d: "Djibouti has hosted foreign military installations for decades, but Beijing's proposal is of a different character. The planned facility at Doraleh would be the People's Liberation Army's first permanent overseas base, a milestone that Western strategists have long feared and Chinese planners long pursued."
 chi_bri.22.t: "Doraleh: China's First Overseas Base"
 chi_bri.30.a: "Respond forcefully with sanctions"
 chi_bri.30.b: "Monitor the situation for now"
 chi_bri.30.d: "China's announcement of yuan-denominated oil futures has sent shockwaves through Washington. If petroyuan pricing gains traction among OPEC members and BRI partners, the dollar's reserve-currency status faces its most serious challenge in generations. Congress is demanding a response."
 chi_bri.30.t: "Beijing's Petroyuan Threatens Dollar Hegemony"
 chi_bri.40.a: "Announce a bold new initiative"
 chi_bri.40.b: "Sign a wave of new commitments"
 chi_bri.40.c: "Lead with reform and transparency"
 chi_bri.40.d: "Heads of government and finance ministers from across Asia, Africa, and Europe have converged on Beijing for the triennial Belt and Road Forum. The gathering is part summit, part trade fair, and part geopolitical theatre. China's choices this week will set the tone for the next phase of the initiative."
 chi_bri.40.t: "Belt and Road Forum Opens in Beijing"
 chi_bri.42.a: "Strike an assertive, sovereign tone"
 chi_bri.42.b: "Emphasise cooperation and mutual gain"
 chi_bri.42.d: "Journalists from around the world have assembled for the forum's closing press conference. The framing China chooses now will dominate international coverage and set expectations for the next three years of Belt and Road diplomacy."
 chi_bri.42.t: "Forum Press Conference"
 chi_bri.43.a: "Publish the results"
 chi_bri.43.d: "The delegations have departed and the banners have come down. Diplomats and economists are tallying the outcomes: agreements signed, pledges made, influence accumulated. The Belt and Road Forum has once again reshaped perceptions of China's global role."
 chi_bri.43.t: "Belt and Road Forum: Final Assessment"
 chi_bri.50.a: "Declare a new era of Chinese leadership"
 chi_bri.50.d: "China's Belt and Road network now spans every inhabited continent. The web of infrastructure, debt, and diplomatic obligation that Beijing has woven over decades has crystallised into something unprecedented: an international order shaped in the image of Chinese interests. Historians will debate whether to call it hegemony or partnership. The world will simply call it a fact."
 chi_bri.50.t: "Pax Sinica Established"
 chi_bri.70.a: "Announce the African-Chinese Partnership Era"
 chi_bri.70.d: "The cumulative effect of more than a decade of Forum on China-Africa Cooperation summits, Belt and Road projects, and debt-relief diplomacy has produced a decisive shift. Across the continent, governments that once hedged between Beijing and Washington are consolidating around China as their primary partner. A generation of African leaders has grown up with Chinese infrastructure, Chinese credit, and Chinese advisors."
 chi_bri.70.t: "Africa Embraces the Chinese Century"
 chi_bri.71.a: "Dispatch project teams"
 chi_bri.71.d: "To cement the new era, Beijing has earmarked funding for a round of flagship mega-projects across its African partner network. These will not be ordinary infrastructure grants; they will be Chinese-anchored developments carrying long-term strategic rights and preferential access clauses."
 chi_bri.71.t: "Flagship Projects for Africa"
 chi_bri.80.a: "Announce a debt write-off"
 chi_bri.80.b: "Lock in collateral clauses"
 chi_bri.80.d: "The Forum on China-Africa Cooperation has convened its latest plenary in Beijing. Finance ministers, heads of state, and development bank officials have gathered to review the state of Sino-African ties and chart the path forward. The summit's opening announcement will define whether this gathering is remembered for generosity or leverage."
 chi_bri.80.t: "FOCAC Summit Convenes"
 chi_bri.81.a: "Tighten sanctions on Caracas"
 chi_bri.81.b: "Issue diplomatic protests"
 chi_bri.81.c: "Take note and move on"
 chi_bri.81.d: "China has formalised a successor to the Petrocaribe arrangement, extending loans-for-oil terms to Venezuela and its neighbours. Washington now faces a choice between signalling displeasure and risking further Latin American alienation, or absorbing the development quietly."
 chi_bri.81.t: "China Moves Into Caracas"
 chi_bri.82.a: "Forgive the debt"
 chi_bri.82.b: "Convert arrears into concessions"
 chi_bri.82.c: "Let the default stand"
 chi_bri.82.d: "Venezuela's oil revenues have collapsed and the debt service owed to Chinese state banks is badly in arrears. Beijing must decide whether to absorb the loss in goodwill, extract collateral, or let the default stand as a warning to other borrowers."
 chi_bri.82.t: "Caracas Cannot Pay"
 chi_bri.83.a: "Protest and seek removal"
 chi_bri.83.b: "Launch a counter-programme"
 chi_bri.83.c: "Accept the new baseline"
 chi_bri.83.d: "China has completed a network of Beidou navigation and tracking ground stations across Argentina and Bolivia, sharply extending the constellation's coverage over the southern hemisphere. US Space Command and Southern Command have flagged the installations as dual-use. Washington must decide how to respond."
 chi_bri.83.t: "Beidou Tracking Stations in Patagonia"
 chi_bri.84.a: "Secure all four switches"
 chi_bri.84.b: "Lock in three reliable partners"
 chi_bri.84.d: "The completion of the Monroe Doctrine Inverted strategy has created the conditions for a cascade of diplomatic recognition shifts. Several remaining Latin American states that still formally recognise Taipei are now within reach of a quiet, Chinese-facilitated switch."
 chi_bri.84.t: "Taiwan Loses Its Last Allies"
 chi_bri.85.a: "Consolidate the regional realignment"
 chi_bri.85.b: "Pocket the political capital"
 chi_bri.85.d: "With China's influence now embedded across Latin American institutions, the Organisation of American States has been systematically hollowed out as a venue for US-led regional governance. CELAC has emerged as the preferred multilateral forum. The repercussions are felt from Washington to Buenos Aires."
 chi_bri.85.t: "The OAS Loses Its Mandate"
 chi_bri.86.a: "Coordinate a tighter sanctions regime"
 chi_bri.86.b: "Register concern through channels"
 chi_bri.86.d: "China's ratification of a 25-year comprehensive partnership with Tehran has sent shockwaves through the Middle East security architecture. US officials, Israeli defence planners, and Gulf states are each evaluating the consequences and considering their response."
 chi_bri.86.t: "Alarm in Washington, Tel Aviv, and Riyadh"
 chi_bri.87.a: "Publicise the achievement globally"
 chi_bri.87.b: "Consolidate internally"
 chi_bri.87.d: "The Beijing Communique formalising Saudi-Iranian reconciliation has been received across the international community. China's role as mediator between two historic adversaries represents a significant demonstration of diplomatic reach that few predicted a decade ago."
 chi_bri.87.t: "Beijing Claims the Credit"
 chi_bri.88.a: "Announce the new settlement framework"
 chi_bri.88.d: "Gulf states have begun settling a portion of their oil transactions in renminbi, completing the financial architecture China has assembled over the preceding decade. The erosion of dollar hegemony in energy markets is gradual but now structurally embedded."
 chi_bri.88.t: "The Petrodollar Fractures"
 chi_bri.89.a: "Secure the core switches"
 chi_bri.89.b: "Push for the full sweep"
 chi_bri.89.d: "China's Pacific Island Forum strategy has matured to the point where diplomatic recognition shifts are achievable. Solomon Islands and Kiribati are the most accessible targets, with Tuvalu and Palau reachable if Beijing is prepared to invest further."
 chi_bri.89.t: "Pacific Island Recognitions Pivot"
 chi_bri.90.a: "Condemn the pact and coordinate a response"
 chi_bri.90.b: "Register concern and monitor"
 chi_bri.90.d: "The Honiara Security Pact has triggered an emergency session of the Australia-United States Ministerial Consultations. Canberra, Washington, and Wellington are coordinating a response to what they describe as a direct threat to Pacific sovereignty and regional stability."
 chi_bri.90.t: "Canberra Demands Answers"
 chi_bri.91.a: "Declare a Pacific security leadership role"
 chi_bri.91.b: "Acknowledge the diplomatic setback"
 chi_bri.91.d: "The results of the Pacific Eight-Country Initiative are in. China's record of engagement across the Pacific island states will determine whether Beijing can claim a security leadership role or must absorb a reputational setback."
 chi_bri.91.t: "The Eight-Country Initiative Report"
 chi_bri.92.a: "Accelerate the allied response"
 chi_bri.92.b: "Consider escalatory options"
 chi_bri.92.c: "Recalibrate and observe"
 chi_bri.92.d: "China's acquisition of basing access in the Solomon Islands has extended PLA Navy reach to the edge of the second island chain. The US Indo-Pacific Command and the Australian Defence Force are assessing the strategic implications and determining their response."
 chi_bri.92.t: "Beijing Reaches the Second Island Chain"
 chi_bri.93.a: "Express firm disapproval"
 chi_bri.93.b: "Acknowledge the development"
 chi_bri.93.d: "Italy has become the first G7 state to sign a Belt and Road memorandum of understanding, creating a precedent that the remaining G7 partners view with varying degrees of alarm and opportunity. Each capital must now determine its own posture toward Chinese infrastructure investment."
 chi_bri.93.t: "Rome Signs with Beijing"
 chi_bri.94.a: "Tighten the core partners"
 chi_bri.94.b: "Hold the frame with investment"
 chi_bri.94.d: "Lithuania's withdrawal from the 17+1 mechanism has exposed a fault line between the Baltic and Nordic members on one side and the Balkans-Visegrad core on the other. China must choose whether to consolidate a smaller, more reliable coalition or spend to hold the broader frame together."
 chi_bri.94.t: "The 17+1 Reaches a Fork"
 chi_bri.96.a: "China's century begins."
 chi_bri.96.b: "Acknowledge the new reality."
 chi_bri.96.c: "Take note of the emerging order."
 chi_bri.96.d: "The consensual world order China has built through the Global Development Initiative, the Asian Infrastructure Investment Bank, and high-quality Belt and Road cooperation is no longer a vision -- it is the operating architecture of the international system. BRICS+ membership covers the majority of the world's population. The Davos address of 2017 reads now as prophecy."
 chi_bri.96.t: "A Community of Shared Future"
 CHI_foreign.012.a: "We will watch carefully."
 CHI_foreign.012.d: "Chinese officials have quietly suggested that Washington reconsider its approach to the Korean question, implying that a diplomatic initiative may be forthcoming. The signal could be an opening or a feint."
 CHI_foreign.012.t: "A Signal from Beijing"
 CHI_foreign.014.a: "Review the draft."
 CHI_foreign.014.d: "The groundwork for a joint statement on the Korean Peninsula's future is in place. Beijing has tabled a draft framework for review."
 CHI_foreign.014.t: "Joint Statement Framework"
 CHI_foreign.024.a: "We consider our options carefully."
 CHI_foreign.024.d: "China has signaled its acceptance of a Seoul-centric settlement of the Korean question  a historic shift in Beijing's position that Pyongyang must now reckon with."
 CHI_foreign.024.t: "Beijing Backs Seoul"
 CHI_foreign.030.a: "This represents an unacceptable politicization of commercial relations."
 CHI_foreign.030.b: "The pressure is regrettable but sustainable. We stand firm."
 CHI_foreign.030.d: "Beijing's response to South Korea's THAAD deployment has escalated from diplomatic protest to economic coercion. Chinese authorities are directing restrictions on Korean business operations, entertainment products, and tourism, a calibrated campaign designed to impose costs without triggering a formal sanctions regime."
 CHI_foreign.030.t: "The THAAD Retaliation"
 CHI_foreign.031.a: "Acknowledge the signal. Maintain current posture."
 CHI_foreign.031.b: "China's assurances are not credible. Reinforce our Korean commitment."
 CHI_foreign.031.d: "China has signaled through military-to-military channels that the Yalu River exercises are defensive in orientation. The message from Beijing is clear: China will manage North Korea's behavior and does not require American escalation to maintain regional stability."
 CHI_foreign.031.t: "Beijing Signals Restraint"
 CHI_foreign.032.a: "Alert our Korean garrison. Request urgent consultations with Seoul."
 CHI_foreign.032.b: "Monitor the situation. Avoid provocative responses."
 CHI_foreign.032.d: "Satellite imagery confirms a significant reorganization of North Korean ground forces toward offensive dispositions along the 38th parallel. Chinese logistical trains are supporting the repositioning. The Korean People's Army appears to be preparing for something beyond routine exercises."
 CHI_foreign.032.t: "Buildup at the Yalu"
 CHI_foreign.033.a: "Begin contingency planning. Consult with Washington."
 CHI_foreign.033.b: "Constitutional constraints are absolute. Proceed through diplomatic channels only."
 CHI_foreign.033.d: "The North Korean force buildup along the 38th parallel has reignited debate in Japan's Diet over Article 9 and the constitutional limits of Japan's self-defense posture. Defense hawks are pressing for an emergency reinterpretation of collective self-defense commitments."
 CHI_foreign.033.t: "Article 9 Under Debate"
 CHI_foreign.034.a: "Activate our mutual defense commitments with South Korea."
 CHI_foreign.034.b: "Convene an emergency Security Council session."
 CHI_foreign.034.d: "North Korean forces, with Chinese logistical and material support, have crossed the demilitarized zone. China has not formally entered the conflict but its fingerprints are on every aspect of the North Korean war machine."
 CHI_foreign.034.t: "War on the Peninsula"
 CHI_foreign.035.a: "Go to maximum alert. Prepare contingency forces."
 CHI_foreign.035.b: "Make no move until the situation clarifies."
 CHI_foreign.035.d: "Unconfirmed reports of gunfire and military movement within the Pyongyang security perimeter suggest something extraordinary is occurring in North Korea's capital. Chinese state media is silent. The situation is dangerously unclear."
 CHI_foreign.035.t: "Chaos in Pyongyang"
 CHI_foreign.036.a: "Issue a formal statement condemning interference in North Korean sovereignty."
 CHI_foreign.036.b: "Open back-channel contact with the transitional council."
 CHI_foreign.036.d: "Chinese-backed officers have staged a coup against Kim Jong-un. The Kim family has been removed from power. A transitional council is forming in Pyongyang under figures known to be Beijing's interlocutors. China appears to be midwifing a managed succession."
 CHI_foreign.036.t: "The Pyongyang Coup"
 CHI_foreign.037.a: "Express concern to Beijing through diplomatic channels."
 CHI_foreign.037.b: "Wait and observe. The situation is too fluid for strong statements."
 CHI_foreign.037.d: "The coup in North Korea brings both opportunity and danger for Japan. A China-aligned transitional government in Pyongyang may be more predictable than Kim Jong-un, but a Chinese client state on the Korean peninsula represents a significant strategic challenge for Tokyo."
 CHI_foreign.037.t: "A New Pyongyang"
 CHI_foreign.038.a: "Formally protest the unilateral restructuring of North Korean governance."
 CHI_foreign.038.b: "Accept the new reality. Seek accommodation with Beijing's Korea policy."
 CHI_foreign.038.d: "China has announced the terms of the post-coup political settlement in Pyongyang. The new North Korean government is constitutionally restructured, economically integrated into Chinese supply chains, and strategically subordinated to Beijing's Korea policy."
 CHI_foreign.038.t: "The Beijing Settlement"
 CHI_foreign.040.a: "This realignment is unacceptable. Signal consequences to Seoul."
 CHI_foreign.040.b: "Accept the drift. The alliance cannot be maintained by compulsion."
 CHI_foreign.040.d: "South Korea's adoption of a strategic autonomy doctrine and its decision to engage China as a primary security partner represents a profound realignment of the Indo-Pacific balance. The U.S.-Korea alliance, sustained since 1953, faces its most serious strain in decades."
 CHI_foreign.040.t: "Seoul Drifts"
 CHI_foreign.041.a: "Express cautious interest in the changing configuration."
 CHI_foreign.041.b: "Reject the framing. China is not abandoning North Korea."
 CHI_foreign.041.d: "South Korea's pivot toward Beijing has forced Pyongyang into an uncomfortable calculation. A China-Seoul partnership that excludes North Korea is strategically more threatening than America's presence in the south."
 CHI_foreign.041.t: "Which China?"
 CHI_foreign.042.a: "Begin urgent consultations with Washington on compensatory measures."
 CHI_foreign.042.b: "Assess whether bilateral Japan-Korea security arrangements are achievable."
 CHI_foreign.042.d: "South Korea's withdrawal from the trilateral U.S.-Japan-Korea security framework leaves Japan isolated within what remains of the Indo-Pacific architecture. Without Seoul's participation, Japan's security relationships with Washington lack a critical pillar."
 CHI_foreign.042.t: "Tokyo Alone"
 CHI_foreign.043.a: "Reassure our Philippine partners of our commitment."
 CHI_foreign.043.b: "Begin a strategic review of Indo-Pacific commitments."
 CHI_foreign.043.d: "South Korea's withdrawal from the trilateral security framework has triggered anxiety in Manila about the durability of American security commitments across the Indo-Pacific. Philippine officials have begun quiet reassessment of their own alliance posture."
 CHI_foreign.043.t: "The Framework Frays"
 CHI_foreign.044.a: "Launch an immediate diplomatic offensive to rebuild the framework."
 CHI_foreign.044.b: "Accept the strategic setback. Recalibrate around remaining partners."
 CHI_foreign.044.d: "South Korea's exit from the trilateral framework effectively dismantles the Indo-Pacific architecture that Washington spent a decade building. China has achieved through patient diplomacy what it could never have achieved through confrontation."
 CHI_foreign.044.t: "The Indo-Pacific Strategy Collapses"
 CHI_foreign.045.a: "Accept the request. Begin an orderly redeployment."
 CHI_foreign.045.b: "Refuse. American forces remain on the peninsula at Washington's discretion."
 CHI_foreign.045.d: "South Korea's formal endorsement of Chinese security guarantees has made the continued presence of U.S. ground forces on the peninsula politically untenable. Seoul has requested a timetable for American military redeployment from Korean territory."
 CHI_foreign.045.t: "Troops Come Home"
 CHI_foreign.046.a: "Begin emergency consultations with Washington on Japan's security posture."
 CHI_foreign.046.b: "Accelerate indigenous defense capacity development."
 CHI_foreign.046.d: "The U.S. redeployment from Korea renders the U.S.-Japan security alliance strategically incomplete. Japan's southern flank is exposed, and the assumptions underpinning Japanese defense planning for the past seven decades require fundamental revision."
 CHI_foreign.046.t: "The Alliance Hollow"
 CHI_foreign.047.a: "Accept the guarantee. Korea's future cannot depend on distant patrons."
 CHI_foreign.047.b: "Reject the offer. Korean sovereignty cannot be traded for Chinese patronage."
 CHI_foreign.047.d: "China has offered South Korea a formal security guarantee underwriting any future unification settlement. The Beijing Guarantee commits China to defending a unified Korea's sovereignty, in exchange for strategic arrangements that effectively transform Korea into a Chinese-aligned state."
 CHI_foreign.047.t: "The Beijing Guarantee"
 CHI_foreign.048.a: "Engage with the Beijing framework. Survival demands realism."
 CHI_foreign.048.b: "Reject the framework. We will not be absorbed."
 CHI_foreign.048.d: "China's offer of a security guarantee for a unified Korea has forced a moment of clarity in Pyongyang. North Korean leadership must choose between resistance and accommodation, knowing that resistance without Chinese backing is unsustainable."
 CHI_foreign.048.t: "The Guarantee and the North"
 CHI_foreign.049.a: "Issue a formal statement on the process and its implications."
 CHI_foreign.049.b: "Acknowledge the outcome. Adapt our Indo-Pacific strategy accordingly."
 CHI_foreign.049.d: "The Korean unification process is proceeding under Chinese auspices and on Chinese terms. America's seventy years of military presence and diplomatic investment in Korea's security have produced a unified Korea aligned with Beijing."
 CHI_foreign.049.t: "A Unification We Did Not Make"
 CHI_foreign.050.a: "Noted."
 CHI_foreign.050.d: "U.S. carrier battle groups have repositioned toward the Korea Strait in response to rising tensions. Beijing monitors the movement."
 CHI_foreign.050.t: "Carriers Move Toward Korea Strait"
 CHI_foreign.051.a: "A difficult situation."
 CHI_foreign.051.d: "Tensions on the Korean Peninsula have reached a critical threshold. Washington, Tokyo, and Seoul have entered elevated readiness postures."
 CHI_foreign.051.t: "Regional Crisis Alert"
 CHI_foreign.052.a: "Stand down. The price is too high."
 CHI_foreign.052.b: "Hold the pressure."
 CHI_foreign.052.d: "Korean Peninsula tensions have reached their apex. Beijing must decide whether to step back, hold its course, or press for a decisive outcome."
 CHI_foreign.052.t: "The Peninsula at the Brink"
 CHI_foreign.053.a: "A welcome development."
 CHI_foreign.053.d: "The crisis atmosphere on the Korean Peninsula has lifted. Regional powers welcome a return to stability."
 CHI_foreign.053.t: "Korean Peninsula Détente"
 CHI_foreign.054.a: "The acquisition serves our economic interests."
 CHI_foreign.054.b: "Kazakhstan's oil must remain under national control."
 CHI_foreign.054.d: "China National Petroleum Corporation has submitted a formal bid to acquire PetroKazakhstan for $4.18 billion. The deal would transfer operational control of Kazakhstan's largest independent oil producer to Chinese hands in exchange for a substantial cash payment to state coffers."
 CHI_foreign.054.t: "CNPC Acquisition Proposal"
 CHI_foreign.056.a: "We respect their decision."
 CHI_foreign.056.d: "Astana has declined CNPC's offer for PetroKazakhstan, citing concerns over national resource sovereignty."
 CHI_foreign.056.t: "Kazakhstan Rejects CNPC Acquisition Bid"
 CHI_foreign.057.a: "The acquisition is in Angola's economic interest."
 CHI_foreign.057.b: "Our energy resources are not for sale."
 CHI_foreign.057.d: "Sinopec has submitted an offer of $7.2 billion to acquire Addax Petroleum, gaining access to oil production licences across Angola, Nigeria, and the Kurdistan Region. The deal would represent Sinopec's largest overseas acquisition to date."
 CHI_foreign.057.t: "Sinopec Acquisition Proposal"
 CHI_foreign.058.a: "Sinopec secures another foothold in African oil production."
 CHI_foreign.058.d: "Luanda has accepted Sinopec's bid for Addax Petroleum. Chinese engineers will assume operational control of offshore oil blocks, with a portion of proceeds directed toward Angolan infrastructure."
 CHI_foreign.058.t: "Angola Approves Sinopec Acquisition"
 CHI_foreign.059.a: "We respect their decision."
 CHI_foreign.059.d: "Luanda has declined Sinopec's offer to acquire Addax Petroleum."
 CHI_foreign.059.t: "Angola Rejects Sinopec Acquisition Bid"
 CHI_foreign.060.a: "Chinese expertise and capital are welcome."
 CHI_foreign.060.b: "Venezuela's oil wealth is not for foreign concessions."
 CHI_foreign.060.d: "CNOOC has proposed a long-term joint venture to develop the Orinoco Heavy Crude Belt alongside Petróleos de Venezuela. China would provide upfront capital and technical expertise in heavy-oil extraction in exchange for a share of production rights."
 CHI_foreign.060.t: "CNOOC Joint Venture Proposal"
 CHI_foreign.061.a: "CNOOC secures a foothold in the Western Hemisphere's greatest oil reserves."
 CHI_foreign.061.d: "Caracas has agreed to CNOOC's joint venture proposal for the Orinoco Belt. Production rights along the Junín blocks are now shared, bringing Chinese extraction technology to the world's largest proven oil reserves."
 CHI_foreign.061.t: "Venezuela Approves CNOOC Joint Venture"
 CHI_foreign.062.a: "We respect their decision."
 CHI_foreign.062.d: "Caracas has declined CNOOC's joint venture proposal for the Orinoco Belt."
 CHI_foreign.062.t: "Venezuela Rejects CNOOC Joint Venture"
 CHI_foreign.063.a: "A strategic acquisition for our energy security."
 CHI_foreign.063.d: "Astana has accepted CNPC's bid for PetroKazakhstan. Chinese-operated oil fields will expand production from the Kumkol and North Buzachi fields, securing a steady supply of Kazakh crude for Chinese refineries."
 CHI_foreign.063.t: "Kazakhstan Approves CNPC Acquisition"
 CHI_foreign.100.a: "Brace for sustained pressure. Consult with our allies."
 CHI_foreign.100.d: "China has launched a coordinated pressure campaign against South Korea, applying diplomatic, economic, and military signals designed to shift Seoul's security calculus away from Washington."
 CHI_foreign.100.t: "Beijing Pressure Campaign"
 CHI_foreign.101.a: "Document the measures and prepare a proportionate response."
 CHI_foreign.101.d: "Beijing has extended its THAAD retaliation into a broader regime of informal economic restrictions. Korean firms operating in China report systematic obstruction across licensing, customs, and regulatory channels."
 CHI_foreign.101.t: "Informal Sanctions Imposed"
 CHI_foreign.102.a: "Engage carefully. Keep the channel open."
 CHI_foreign.102.d: "Chinese and American diplomats have established a discreet working channel on Korean Peninsula issues. The arrangement allows both sides to manage escalation risks without committing publicly to a formal negotiating framework."
 CHI_foreign.102.t: "A Back Channel Opens"
 CHI_foreign.103.a: "Engage with the new framework. Monitor its implications."
 CHI_foreign.103.d: "Beijing and Seoul have agreed to a structured diplomatic reset, restoring high-level contacts and opening a trilateral framework for peninsula discussions. The arrangement represents a significant departure from South Korea's earlier alignment with Washington."
 CHI_foreign.103.t: "The 2022 Reset"
 CHI_foreign.104.a: "Accept the framework. Define our role within it."
 CHI_foreign.104.d: "China and the United States have agreed on the outlines of a post-armistice security architecture for the Korean Peninsula. The G2 framework assigns both powers co-responsibility for peninsula stability, marginalizing other actors."
 CHI_foreign.104.t: "A Post-Armistice Architecture"
 CHI_foreign.105.a: "Study the proposal. Consult with industry and security advisers."
 CHI_foreign.105.d: "China has proposed an economic integration platform linking South Korean industry to a managed reunification process. The arrangement creates deep structural incentives for Seoul to align its unification policy with Beijing's preferred outcome."
 CHI_foreign.105.t: "Economic Framework for Unity"
 CHI_foreign.106.a: "Acknowledge the new doctrine. Prepare our strategic response."
 CHI_foreign.106.d: "South Korea's formal adoption of a strategic autonomy doctrine signals a decisive pivot away from the U.S.-Korea alliance framework. Seoul is positioning itself between Washington and Beijing rather than within the American security orbit."
 CHI_foreign.106.t: "The Pivot Reversed"
 CHI_foreign.107.a: "Forward the ultimatum to Pyongyang."
 CHI_foreign.107.b: "Refuse. Reunification must be on our terms alone."
 CHI_foreign.107.d: "[CHI.GetLeader] and [USA.GetLeader] have reached a rare understanding. They will jointly demand that [NKO.GetName] accept peaceful reunification under Seoul. The alternative is war. [KOR.GetName] must decide whether to forward the ultimatum to Pyongyang."
 CHI_foreign.107.t: "A Joint Ultimatum for the North"
 CHI_foreign.108.a: "Accept. The game is over."
 CHI_foreign.108.b: "Refuse. We will not surrender our sovereignty."
 CHI_foreign.108.d: "A joint Sino-American communiqué has arrived in Pyongyang. It demands the immediate and peaceful dissolution of the [NKO.GetName] state and the reunification of the peninsula under the government in Seoul. Refusal means war with China, the United States, and South Korea simultaneously."
 CHI_foreign.108.t: "Beijing and Washington Demand Unification"
 CHI_foreign.109.a: "A new era dawns in East Asia."
 CHI_foreign.109.d: "North Korea has accepted the ultimatum. The Kim regime has agreed to dissolve the state and transfer authority to Seoul. The Korean peninsula is unified without a shot being fired, a diplomatic triumph on a historic scale."
 CHI_foreign.109.t: "Pyongyang Accepts"
 CHI_foreign.110.a: "Then we go to war."
 CHI_foreign.110.d: "North Korea has rejected the ultimatum. Pyongyang's answer was delivered by artillery fire across the DMZ. There is no diplomatic path remaining: only war, and the liberation of the peninsula by force."
 CHI_foreign.110.t: "Pyongyang Refuses"
 CHI_foreign.200.a: "Force the issue."
 CHI_foreign.200.b: "Probe and withdraw."
 CHI_foreign.200.c: "Demand UN mediation."
 CHI_foreign.200.d: "Our coast guard vessels and Japan's JMSDF are separated by less than two nautical miles in the East China Sea. The next move is ours. Every option carries consequences."
 CHI_foreign.200.t: "The Fleets Are at the Line"
 CHI_foreign.201.a: "Stand firm. Order the JMSDF to hold the line."
 CHI_foreign.201.b: "Request US intervention immediately."
 CHI_foreign.201.c: "Pull back and seek a diplomatic solution."
 CHI_foreign.201.d: "Chinese vessels are holding position at the disputed boundary. Tokyo must decide how far to push back."
 CHI_foreign.201.t: "China Presses the Senkaku Line"
 CHI_foreign.202.a: "Honour the guarantee. Signal military support to Japan."
 CHI_foreign.202.b: "Hedge. Express concern without committing forces."
 CHI_foreign.202.d: "Japan has invoked its alliance obligations. Chinese vessels are pressing the Senkaku boundary and Tokyo is asking Washington to back its commitments. The decision carries costs either way."
 CHI_foreign.202.t: "Will You Honour the Guarantee?"
 CHI_foreign.203.a: "Take note."
 CHI_foreign.203.b: "A clash on our doorstep. Watch it closely."
 CHI_foreign.203.c: "A distant quarrel. Note it and move on."
 CHI_foreign.203.d: "Chinese and Japanese vessels have clashed near the Senkaku Islands. The incident has drawn international attention and raised fears of broader escalation in the region."
 CHI_foreign.203.t: "Confrontation in the East China Sea"
 CHI_foreign.204.a: "Reject the declaration. Maintain our administrative control."
 CHI_foreign.204.b: "Issue a formal protest and consult Washington."
 CHI_foreign.204.d: "China has issued a formal sovereignty declaration over the Diaoyu Islands and announced a continuous coast guard patrol regime. Tokyo is expected to respond."
 CHI_foreign.204.t: "Beijing Claims the Diaoyu Islands"
 CHI_foreign.206.a: "Send the communique to Tokyo."
 CHI_foreign.206.d: "The summit has concluded with Japan signing the joint communique in full. A statement binding both parties to stable Sino-Japanese relations and a tacit settlement of historical grievances is now on the record."
 CHI_foreign.206.t: "The Communique Is Signed"
 CHI_foreign.208.a: "Take note."
 CHI_foreign.208.b: "A shift in the regional balance. Take stock."
 CHI_foreign.208.c: "Acknowledge the development."
 CHI_foreign.208.d: "China and Japan have issued a joint communique formalising a strategic understanding. The text commits both parties to stable relations and a tacit agreement on historical grievances. Analysts are divided on whether Beijing or Tokyo gained more."
 CHI_foreign.208.t: "Sino-Japanese Communique Signed"
 CHI_foreign.211.a: "Quietly cancel the visits"
 CHI_foreign.211.b: "The state visit proceeds"
 CHI_foreign.211.d: "Beijing's recall of its ambassador and the diplomatic freeze have made the next round of Yasukuni Shrine visits a pivotal test. Will the Japanese cabinet defuse the row, or harden national pride?"
 CHI_foreign.211.t: "Tokyo's Choice on Yasukuni Visits"
 CHI_foreign.212.a: "Escalate the coast guard response"
 CHI_foreign.212.b: "Open a back-channel to de-escalate"
 CHI_foreign.212.d: "A confrontation between Chinese maritime militia and Japanese Coast Guard cutters has escalated near the Diaoyu Islands. The cabinet must respond before footage hits the evening news."
 CHI_foreign.212.t: "Senkaku Standoff Incident"
 CHI_foreign.216.a: "Scramble fighters and hold the ADIZ line"
 CHI_foreign.216.b: "Route the incident to a quiet back-channel"
 CHI_foreign.216.d: "Chinese aircraft now enter the East China Sea air defence zone daily, and a near-collision between a PLA fighter and a JASDF jet has put Tokyo on edge. The Coast Guard alone can no longer manage the pressure around the Senkakus."
 CHI_foreign.216.t: "Senkaku ADIZ Confrontation"
 CHI_foreign.217.a: "Deploy a PLAN task group and hold firm"
 CHI_foreign.217.b: "Pull back before the shooting starts"
 CHI_foreign.217.d: "A Chinese naval task group is shadowing Japanese vessels within sight of the disputed islands, and both navies are at general quarters. One misjudged manoeuvre could trigger the first shots of a Sino-Japanese war. Tokyo waits to see whether Beijing will hold the line or step back."
 CHI_foreign.217.t: "Senkaku Standoff at the Brink"
 CHI_foreign.213.a: "Pay off the lobby and end the boycott"
 CHI_foreign.213.b: "Weather the storm"
 CHI_foreign.213.d: "Japanese exporters and the keidanren are losing patience. The boycott in China is shutting Japanese brands out of one of their largest markets. Tokyo has to decide: pay off Beijing or weather the storm."
 CHI_foreign.213.t: "The Boycott Bites"
 CHI_foreign.215.a: "Enforce the security treaty"
 CHI_foreign.215.b: "Broker an armistice through back-channels"
 CHI_foreign.215.d: "Beijing has forced the Senkaku issue. The mutual security treaty obliges Washington to consider intervention. The President can either openly enforce the treaty or push for a back-channel armistice."
 CHI_foreign.215.t: "Washington's Senkaku Decision"
 CHI_foreign.220.a: "Welcome the overture"
 CHI_foreign.220.b: "Polite skepticism"
 CHI_foreign.220.d: "Beijing has signalled openness on the model of the original 1978 Fukuda Doctrine. Tokyo can welcome the overture or respond with polite skepticism."
 CHI_foreign.220.t: "A Fukuda Doctrine for the New Century"
 CHI_foreign.221.a: "Host a full state visit"
 CHI_foreign.221.b: "Low-profile reception"
 CHI_foreign.221.d: "China has offered a state-visit gift of giant pandas to Ueno Zoo. The cabinet must decide whether to host a full state visit or keep things low-profile."
 CHI_foreign.221.t: "A Panda for Tokyo"
 CHI_foreign.222.a: "Sign the pact"
 CHI_foreign.222.b: "Wait for more proof"
 CHI_foreign.222.d: "Beijing has tabled a bilateral declaration formally renouncing the historical enemies framing. Tokyo can sign and reciprocate, or wait for further proof of Chinese intent."
 CHI_foreign.222.t: "Mutual Threat Reduction Pact"
 CHI_foreign.223.a: "Pressure Japan to recommit"
 CHI_foreign.223.b: "Downgrade the Quad to a dialogue"
 CHI_foreign.223.d: "Beijing's diplomatic wedge is starting to peel Tokyo away from the Quadrilateral Security Dialogue. Washington can pressure Japan to recommit, or quietly accept the downgrade."
 CHI_foreign.223.t: "The Quad's Reply"
 CHI_foreign.224.a: "Sign the full Communique"
 CHI_foreign.224.b: "Sign with reservations"
 CHI_foreign.224.c: "Walk out"
 CHI_foreign.224.d: "Years of patient diplomacy have produced a draft communique. Signing the full text rewires Japan's strategic posture; signing with reservations preserves bilateral relations without breaking with Washington; walking out shatters the entire process."
 CHI_foreign.224.t: "The Tokyo Communique"
 CHI_foreign.226.a: "Note the reservations and move forward."
 CHI_foreign.226.d: "Tokyo has signed a more limited version of the communique. The LDP carved out specific reservations rather than accepting the full text, preserving a degree of alignment with Washington. The bilateral relationship advances, though the strategic ambiguity remains."
 CHI_foreign.226.t: "A Partial Accord with Japan"
 CHI_foreign.227.a: "Assess the damage."
 CHI_foreign.227.d: "Years of diplomatic groundwork have come undone. The LDP rejected the final communique text, accusing Beijing of overreaching its mandate and subordinating Japanese sovereignty. The entire negotiating framework has collapsed."
 CHI_foreign.227.t: "Japan Walks Out of Talks"
 CHI_foreign.231.a: "Note the commercial opportunity."
 CHI_foreign.231.d: "Beijing has welcomed Mitsubishi Aerospace to establish licensed production and research facilities on the mainland. Japanese industry gains export revenue and market access; Chinese aerospace engineers gain proximity to advanced airframe design."
 CHI_foreign.231.t: "Mitsubishi Aerospace Opens in China"
 CHI_foreign.232.a: "Note the commercial opportunity."
 CHI_foreign.232.d: "Kawasaki's aerospace division has secured a framework agreement with Beijing covering large-airframe component production. The deal opens a substantial Chinese market share while giving Tokyo influence over Chinese aerospace procurement cycles."
 CHI_foreign.232.t: "Kawasaki Aerospace Enters China"
 CHI_foreign.233.a: "Note the commercial opportunity."
 CHI_foreign.233.d: "Japan Steel Works has received approval to operate a joint-venture forge in China. Export profits from large steel forgings give Tokyo ongoing leverage over Chinese heavy industrial capacity."
 CHI_foreign.233.t: "Japan Steel Works Arrives in China"
 CHI_foreign.234.a: "Note the commercial opportunity."
 CHI_foreign.234.d: "Mitsubishi Heavy Industries' land systems arm has agreed to a technology licensing arrangement with a Chinese state partner. Japan gains commercial returns; Beijing gains access to armoured vehicle design methodologies."
 CHI_foreign.234.t: "MHI Land Systems Invited to China"
 CHI_foreign.235.a: "Note the commercial opportunity."
 CHI_foreign.235.d: "Komatsu Defense has established a production cooperation arrangement in China covering light armoured vehicles. The deal generates steady export income for Tokyo and deepens bilateral defence industry ties."
 CHI_foreign.235.t: "Komatsu Defense Moves into China"
 CHI_foreign.236.a: "Note the commercial opportunity."
 CHI_foreign.236.d: "Subaru Corporation's aerospace division has concluded a joint manufacturing agreement with a Chinese counterpart. Rotary-wing structural expertise flows into the Chinese programme while Subaru books long-term component orders."
 CHI_foreign.236.t: "Subaru Aerospace Partnership Signed"
 CHI_foreign.237.a: "Note the commercial opportunity."
 CHI_foreign.237.d: "Howa Machinery has licensed its precision machining processes to a Chinese partner facility. The arrangement yields export income while extending Japanese small-arms manufacturing standards into the Chinese defence supply chain."
 CHI_foreign.237.t: "Howa Machinery Active in China"
 CHI_foreign.238.a: "Note the commercial opportunity."
 CHI_foreign.238.d: "NEC Corporation has opened a joint-venture electronics integration centre in China. The commercial returns are substantial; the deeper prize for Tokyo is sustained influence over Chinese C4ISR procurement standards."
 CHI_foreign.238.t: "NEC Establishes Chinese Operations"
 CHI_foreign.239.a: "Note the commercial opportunity."
 CHI_foreign.239.d: "Toshiba Defense Systems has agreed to supply radar and sensor components to Chinese integrators under a managed licensing framework. Japan retains design authority while earning steady technology transfer royalties."
 CHI_foreign.239.t: "Toshiba Defense Systems in China"
 CHI_foreign.240.a: "Note the commercial opportunity."
 CHI_foreign.240.d: "Mitsubishi's shipbuilding arm has concluded a naval construction cooperation agreement with a Chinese state shipyard. Export earnings and long-term influence over Chinese surface combatant design standards are the principal benefits for Tokyo."
 CHI_foreign.240.t: "Mitsubishi Shipbuilding Signs with Beijing"
 CHI_foreign.241.a: "Note the commercial opportunity."
 CHI_foreign.241.d: "Kawasaki Heavy Industries' shipyard division has agreed to share submarine hull fabrication techniques with a Chinese partner. Japan gains market access; Beijing gains exposure to acoustic signature reduction methods."
 CHI_foreign.241.t: "Kawasaki Shipyard Welcomed to China"
 CHI_foreign.242.a: "Note the commercial opportunity."
 CHI_foreign.242.d: "IHI has secured approval for aero-engine component production in China under a licensed manufacturing framework. Tokyo gains a durable revenue stream and a foothold in Chinese military aviation procurement."
 CHI_foreign.242.t: "IHI Corporation Enters the Chinese Market"
 CHI_foreign.243.a: "Note the commercial opportunity."
 CHI_foreign.243.d: "Japan Marine United has concluded a naval architecture cooperation agreement with a Chinese shipbuilder. The deal yields export income and establishes a lasting Japanese role in Chinese surface combatant programme development."
 CHI_foreign.243.t: "Japan Marine United Partnership Signed"
 CHI_foreign.244.a: "Note the commercial opportunity."
 CHI_foreign.244.d: "Toyota Motor Corporation has agreed to expand its Chinese manufacturing and logistics footprint under the new partnership framework. Production system exports reinforce Japanese soft influence over Chinese industrial modernisation."
 CHI_foreign.244.t: "Toyota Establishes Chinese Manufacturing"
 CHI_foreign.245.a: "Note the commercial opportunity."
 CHI_foreign.245.d: "Honda Motor Company has secured an expanded manufacturing and powertrain licensing agreement in China. Steady royalty income flows to Tokyo while Honda's production standards embed themselves in Chinese factory practice."
 CHI_foreign.245.t: "Honda Enters the Partnership"
 CHI_foreign.246.a: "Note the commercial opportunity."
 CHI_foreign.246.d: "Nippon Steel has agreed to supply high-hardness steel plate and specialty alloys to Chinese partners through a joint-venture arrangement. The deal yields premium export earnings and ties Chinese armour steel production to Japanese supply chains."
 CHI_foreign.246.t: "Nippon Steel Joins China Operations"
 CHI_foreign.247.a: "Note the commercial opportunity."
 CHI_foreign.247.d: "Hitachi has established industrial electronics and embedded computing operations in China under the partnership framework. Export earnings are immediate; longer-term, Tokyo gains ongoing influence over Chinese infrastructure modernisation."
 CHI_foreign.247.t: "Hitachi Expands into China"
 CHI_foreign.248.a: "Note the commercial opportunity."
 CHI_foreign.248.d: "Panasonic has concluded agreements to supply battery technology and ruggedized electronics to Chinese partners. The arrangement generates reliable export income while embedding Japanese component standards in Chinese military-adjacent production lines."
 CHI_foreign.248.t: "Panasonic Enters Chinese Partnership"
 CHI_foreign.249.a: "Note the commercial opportunity."
 CHI_foreign.249.d: "JR East has agreed to share high-speed rail signalling and rolling stock engineering with Chinese partners. The commercial returns are clear; the strategic value for Tokyo lies in long-term influence over Chinese transport infrastructure."
 CHI_foreign.249.t: "JR East Brings Rail Expertise to China"
 CHI_foreign.250.a: "Weather the pressure."
 CHI_foreign.250.d: "Chinese state media has launched a coordinated campaign over Japan's wartime conduct, spotlighting official Yasukuni Shrine visits, school textbook revisions, and the Nanjing Massacre. Anti-Japanese demonstrations are spreading through Chinese cities, and Tokyo faces mounting pressure to respond."
 CHI_foreign.250.t: "Beijing Reopens the History Question"
 CHI_foreign.55.a: "Push a Beijing-led framework."
 CHI_foreign.55.b: "Act as a balanced mediator."
 CHI_foreign.55.c: "Defer to Seoul's initiative."
 CHI_foreign.55.d: "China has brokered an emergency diplomatic summit in Beijing, bringing Korean Peninsula talks back from the brink. Both sides arrive under pressure, and the posture China strikes will shape every capital's reading of the event."
 CHI_foreign.55.t: "Beijing Summit Convenes"
 CHI_foreign.66.a: "Brace for the consequences."
 CHI_foreign.66.d: "The operation has gone catastrophically wrong. Chinese special forces were captured or killed, and Pyongyang has announced proof of Beijing's involvement. The region holds its breath."
 CHI_foreign.66.t: "Operation New Dawn Exposed"
 CHI_foreign.67.a: "Withdraw quietly."
 CHI_foreign.67.d: "The operation did not achieve its objectives, but Pyongyang's security services have attributed the incident to domestic dissidents. Beijing's role remains unconfirmed, for now."
 CHI_foreign.67.t: "Raid Fails, Passed Off as Internal Uprising"
 CHI_foreign.68.a: "Watch the situation unfold."
 CHI_foreign.68.d: "The operation has triggered open fighting in the capital. Loyal KPA units and dissident factions contest control of Pyongyang as the outside world watches."
 CHI_foreign.68.t: "Pyongyang in Flames"
 CHI_foreign.69.a: "Consolidate the gains."
 CHI_foreign.69.d: "The operation succeeded. A pro-Beijing leadership has consolidated control over North Korea. The balance of power on the peninsula has shifted."
 CHI_foreign.69.t: "A New Dawn in Pyongyang"
 CHI_military_event.1.a: "Sell at full market value"
 CHI_military_event.1.b: "Reward the officers who comply"
 CHI_military_event.1.d: "By December 1998, Jiang Zemin's divestiture order had placed thousands of PLA-run companies under civilian valuation and transfer. Property arms, trading conglomerates, and pharmaceutical plants were appraised and signed over, stripping the military of an empire built over decades. The terms of the handover are still being negotiated."
 CHI_military_event.1.t: "The Vanke Handover"
 CHI_military_event.10.a: "Hand the file to the discipline inspectors"
 CHI_military_event.10.b: "Bury the investigation"
 CHI_military_event.10.d: "Investigators from the Central Commission for Discipline Inspection have raided the home of a lieutenant general grown rich on the army's ventures. As with Gu Junshan in 2012, they cart away crates of cash, cases of Maotai and a gold bust of Mao. The networks above him are watching to see whether Beijing dares pull the thread, or whether the file disappears like so many before it."
 CHI_military_event.10.t: "A General's Fortune Unearthed"
 CHI_military_event.2.a: "Harvest the commercial sector"
 CHI_military_event.2.b: "Direct it from the top"
 CHI_military_event.2.d: "Elevated to a national strategy in 2017, Military-Civil Fusion tears down the wall separating China's civilian and defence industrial bases. Universities, state enterprises, and private tech firms are directed to share research, manufacturing capacity, and supply chains with the PLA, reorienting the entire economy toward dual-use output under Central Military Commission supervision."
 CHI_military_event.2.t: "Military-Civil Fusion Declared"
 CHI_military_event.4.a: "Chase the arms market"
 CHI_military_event.4.b: "Buy political access abroad"
 CHI_military_event.4.d: "Poly Technologies, the PLA General Staff's arms export subsidiary, channels Chinese rifles, anti-ship missiles, and short-range ballistic systems into Africa, the Middle East, and Latin America. Poly Culture, its civilian front, launders proceeds through Hong Kong auction houses and overseas real estate. The revenue flows back to the military through shell companies that never appear on any official budget."
 CHI_military_event.4.t: "Poly Technologies Goes Global"
 CHI_military_event.5.a: "Surrender a few scapegoats"
 CHI_military_event.5.b: "Close ranks and defy the auditors"
 CHI_military_event.5.d: "The anti-corruption campaign launched by Xi Jinping in 2012 has reached the General Logistics Department. Xu Caihou and Guo Boxiong, the two former CMC vice-chairmen who ran the promotion-for-cash system across the entire officer corps, face indictment. The clique must decide whether to surrender scapegoats and buy breathing room or close ranks and dare Beijing to push further."
 CHI_military_event.5.t: "The Reckoning"
 CHI_military_event.6.a: "Pledge loyalty to the China Dream"
 CHI_military_event.6.b: "Keep the quiet privilege"
 CHI_military_event.6.d: "With Xu Caihou dead of cancer before trial and Guo Boxiong stripped of rank, the surviving network accepts the new terms. Loud professions of loyalty to Xi's China Dream, a handful of mid-level officers handed over for show, and a quiet agreement: open plunder ends, but the networks that control logistics contracts, construction bids, and arms procurement survive in more discreet form."
 CHI_military_event.6.t: "Bow to the China Dream"
 CHI_political_events.1.a: "Coordinate a national response."
 CHI_political_events.1.d: "A novel coronavirus has spread from Guangdong province to Hong Kong, Vietnam, Canada, and Singapore. The WHO has issued a global health alert. Hospitals in Guangzhou and Beijing are overwhelmed and public fear is spreading faster than the disease itself."
 CHI_political_events.1.t: "SARS Epidemic"
 CHI_political_events.2.a: "Deploy all available resources."
 CHI_political_events.2.d: "A magnitude 7.9 earthquake has struck Sichuan province, with the epicentre near Wenchuan county. More than 69,000 people will die and 18,000 remain missing. Entire towns have been destroyed by the initial shock and secondary landslides."
 CHI_political_events.2.t: "Wenchuan Earthquake"
 CHI_political_events.3.a: "Let the Games begin."
 CHI_political_events.3.d: "The 2008 Beijing Olympics open today. After years of preparation and an unprecedented construction effort, China welcomes the world's athletes to the National Stadium. The opening ceremony draws a global audience of hundreds of millions, showcasing China's rise on the world stage."
 CHI_political_events.3.t: "The Games of the XXIX Olympiad"
 CHI_political_events.4.a: "Accelerate technological development"
 CHI_political_events.4.b: "Strengthen social cohesion"
 CHI_political_events.4.c: "Build military strength"
 CHI_political_events.4.d: "With the 19th Party Congress concluded, the Congress sets its priorities for the twin centenary milestones: a moderately prosperous society by 2021 and a fully developed socialist nation by 2049. The resources of the state must be directed. Where will the Party concentrate its energy?"
 CHI_political_events.4.t: "The Two Centenary Goals"
 CHI_political_events.5.a: "Elevate a Tuanpai candidate"
 CHI_political_events.5.b: "Elevate a Princeling candidate"
 CHI_political_events.5.c: "Keep the decision in Xi's hands"
 CHI_political_events.5.d: "The succession question is no longer academic. Xi Jinping has consolidated power, but the Party requires institutional continuity. The Politburo Standing Committee awaits direction. A choice now will shape the next generation of Chinese leadership."
 CHI_political_events.5.t: "Designating a Successor"
 CHI_political_events.50.a: "Begin planning for an older China."
 CHI_political_events.50.d: "China's working-age population, some 940 million strong at its peak, has begun its long contraction. The surplus labour that powered three decades of double-digit growth is no longer growing. Economists note the shift is structural, not cyclical: without policy intervention, factory floors and construction sites will compete for a shrinking pool of workers for the rest of the century."
 CHI_political_events.50.t: "The Demographic Dividend Fades"
 CHI_political_events.51.a: "Face the reckoning."
 CHI_political_events.51.d: "The Sixth National Population Census of 2010 confirms what demographers have long warned: the share of the population aged 60 and over has climbed to 13.3 percent, and the median age continues rising. The 4-2-1 family structure, one child bearing responsibility for two parents and four grandparents, is now the statistical norm across urban China. Population decline is no longer a distant projection."
 CHI_political_events.51.t: "Census Reveals Accelerating Aging"
 CHI_political_events.52.a: "A harder but more honest baseline."
 CHI_political_events.52.d: "After years of economic strain and policy adjustment, China has reached a new demographic equilibrium. The workforce is smaller and older, pensions are costlier, and fertility remains below replacement, but the acute shock of transition has passed. The country that emerged from this decade is disciplined by necessity: leaner public finances, higher automation, and a welfare state calibrated for a society that got old before it got rich."
 CHI_political_events.52.t: "The Grey Society Crisis Subsides"
 CHI_political_events.6.a: "Honour Our National Hero"
 CHI_political_events.6.b: "Pursue a Diplomatic Settlement"
 CHI_political_events.6.d: "On April 1, 2001 a US Navy EP-3 signals intelligence aircraft collided with a PLAAF J-8 interceptor near Hainan Island. The American crew has made an emergency landing on Chinese soil. Beijing must decide how to manage the standoff."
 CHI_political_events.6.t: "The Hainan Standoff"
 CHI_political_events.7.a: "The sector was underdeveloped -- the crackdown hits hard."
 CHI_political_events.7.b: "The sector absorbs the crackdown with disruption but not collapse."
 CHI_political_events.7.c: "The sector's scale cushions the impact."
 CHI_political_events.7.d: "Jack Ma's October 2020 speech at the Bund Summit comparing Chinese banks to pawnshops sets off a chain of regulatory actions. The CSRC and SAMR suspend Ant Group's IPO two days before its $34 billion launch. Antitrust investigators open proceedings against Alibaba. The Cyberspace Administration launches a national security review of Didi two days after its NYSE debut. The tech sector faces a fundamental restructuring of its relationship with the state."
 CHI_political_events.7.e: "The sector is mature enough to turn regulation into structural stability."
 CHI_political_events.7.t: "Big Tech Crackdown"
 CHI_political_events.8.a: "Continue funding the computing sector"
 CHI_political_events.8.d: "Following the strategic directive to invigorate the nation through science and technology, state-backed institutions are accelerating investments into next-generation computing and internet infrastructure. From university labs to special economic zones, China's digital foundation is being laid for the decades to come."
 CHI_political_events.8.t: "Driving Innovation Through Science and Technology"
 CHI_sco.1.a: "We welcome their interest."
 CHI_sco.1.b: "We cannot grant this status."
 CHI_sco.1.d: "[FROM.GetNameWithFlag] has submitted a formal application for Observer status in the Shanghai Cooperation Organization. We must decide whether to grant their request."
 CHI_sco.1.t: "SCO Observer Application"
 CHI_sco.10.a: "We stand with China."
 CHI_sco.10.b: "We will not be bound by China's ambitions."
 CHI_sco.10.c: "Remain neutral."
 CHI_sco.10.d: "China has demanded that we declare our exclusive loyalty to its faction within the SCO, forcing a choice between Beijing and Moscow."
 CHI_sco.10.t: "China Demands Your Allegiance"
 CHI_sco.11.a: "We are grateful for the support."
 CHI_sco.11.d: "[FROM.GetNameWithFlag] is providing development assistance to support our economic modernization as part of SCO cooperation frameworks."
 CHI_sco.11.t: "SCO Development Assistance"
 CHI_sco.2.a: "They have proven themselves worthy of full membership."
 CHI_sco.2.b: "We cannot support this application."
 CHI_sco.2.d: "[FROM.GetNameWithFlag] has submitted a formal application for full membership in the Shanghai Cooperation Organization."
 CHI_sco.2.t: "SCO Membership Application"
 CHI_sco.20.a: "Invest political capital to restore confidence."
 CHI_sco.20.b: "We have more pressing concerns."
 CHI_sco.20.d: "Internal cohesion within the Shanghai Cooperation Organization has fallen to concerning levels. Several member states have expressed doubts about the organization's direction, and without intervention, cooperation may deteriorate further."
 CHI_sco.20.t: "Members Question SCO Direction"
 CHI_sco.21.a: "This is our moment."
 CHI_sco.21.d: "The Shanghai Cooperation Organization is thriving. Member states report unprecedented levels of cooperation, joint projects are yielding results, and the organization's international standing has never been stronger."
 CHI_sco.21.t: "A Golden Age of Cooperation"
 CHI_sco.22.a: "Press our advantage."
 CHI_sco.22.b: "We should ease tensions."
 CHI_sco.22.d: "Our growing dominance within the Shanghai Cooperation Organization has not gone unnoticed. Russia's diminished role is a source of increasing friction, and Moscow has begun making its displeasure known through diplomatic channels."
 CHI_sco.22.t: "Russia Sidelined in the SCO"
 CHI_sco.23.a: "We must reassert ourselves."
 CHI_sco.23.b: "Perhaps this is for the best."
 CHI_sco.23.d: "Russia's influence within the SCO has grown to the point where our own leadership position is being questioned. Moscow is increasingly setting the agenda, and without action, we risk being relegated to a supporting role in our own organization."
 CHI_sco.23.t: "China Loses Initiative"
 CHI_sco.3.a: "Our troops will welcome the opportunity to train alongside their forces."
 CHI_sco.3.b: "Cooperation with [FROM.GetName] is not feasible at this time."
 CHI_sco.3.d: "[FROM.GetNameWithFlag] has proposed conducting joint military exercises under the SCO framework. This would strengthen security cooperation between our armed forces."
 CHI_sco.3.t: "Invitation for Joint Military Exercises"
 CHI_sco.30.a: "Approve the project."
 CHI_sco.30.b: "This is not the right time."
 CHI_sco.30.d: "[FROM.GetNameWithFlag] has proposed the construction of an integrated energy grid spanning the SCO. As a leading member, we must decide whether to approve this ambitious infrastructure project."
 CHI_sco.30.t: "SCO Energy Grid Proposal"
 CHI_sco.31.a: "Approve the project."
 CHI_sco.31.b: "We cannot commit to this."
 CHI_sco.31.d: "[FROM.GetNameWithFlag] has proposed a continent-spanning railway network to connect SCO economies. This would require significant investment but could transform trade across the organization."
 CHI_sco.31.t: "Trans-Eurasian Railway Proposal"
 CHI_sco.32.a: "Approve the bank's creation."
 CHI_sco.32.b: "The conditions are not favorable."
 CHI_sco.32.d: "[FROM.GetNameWithFlag] has proposed establishing a multilateral development bank under the SCO framework. This institution would finance infrastructure and development across member states."
 CHI_sco.32.t: "SCO Development Bank Proposal"
 CHI_sco.33.a: "Approve the network."
 CHI_sco.33.b: "We have reservations about this."
 CHI_sco.33.d: "[FROM.GetNameWithFlag] has proposed an integrated air defense network spanning SCO member states. Shared radar coverage and coordinated missile defense would strengthen collective security."
 CHI_sco.33.t: "SCO Joint Air Defense Proposal"
 CHI_sco.34.a: "We are proud to be a founding member."
 CHI_sco.34.d: "Beijing has formalised the long-discussed transformation of the Shanghai Five into a full intergovernmental body. The proposed Shanghai Cooperation Organisation would deepen our political, security, and economic ties with China and our regional neighbours, with us as a founding member from day one."
 CHI_sco.34.t: "China Proposes the Shanghai Cooperation Organisation"
 CHI_sco.4.a: "Let the exercises begin."
 CHI_sco.4.d: "[FROM.GetNameWithFlag] has accepted our invitation for joint military exercises."
 CHI_sco.4.t: "Joint Exercises Accepted"
 CHI_sco.5.a: "Their loss."
 CHI_sco.5.d: "[FROM.GetNameWithFlag] has declined our invitation for joint military exercises."
 CHI_sco.5.t: "Joint Exercises Rejected"
 CHI_sco.6.a: "These drills look suspiciously like preparations for war."
 CHI_sco.6.b: "Only terrorists and extremists have anything to fear from these exercises."
 CHI_sco.6.c: "An interesting development to monitor."
 CHI_sco.6.d: "The Shanghai Cooperation Organization has launched a large-scale military exercise involving the armed forces of its member states."
 CHI_sco.6.t: "SCO Launches Large-Scale Military Exercises"
 CHI_sco.7.a: "The Chinese sphere of influence continues to expand."
 CHI_sco.7.b: "A good day for multilateral diplomacy."
 CHI_sco.7.d: "[FROM.GetNameWithFlag] has been formally admitted as a full member of the Shanghai Cooperation Organization."
 CHI_sco.7.t: "[FROM.GetNameWithFlag] Joins the SCO"
 CHI_sco.8.a: "Chinese aggression has alienated yet another partner."
 CHI_sco.8.b: "A regrettable setback for international cooperation."
 CHI_sco.8.d: "[FROM.GetNameWithFlag] has announced its withdrawal from the Shanghai Cooperation Organization, citing irreconcilable differences."
 CHI_sco.8.t: "[FROM.GetNameWithFlag] Withdraws from the SCO"
 CHI_sco.9.a: "China is unwilling to share the spotlight."
 CHI_sco.9.d: "China has moved decisively to assert its dominance over the Shanghai Cooperation Organization, sidelining Russia and establishing itself as the unquestioned leading power of the bloc."
 CHI_sco.9.t: "China Consolidates Control over the SCO"
 CHI_semiconductor_events.1.d: "The United States has expanded export controls to cover advanced semiconductor equipment, EDA software, and high-bandwidth memory components. Allied governments in Europe, Japan, and South Korea have coordinated export licensing to reinforce the controls. The technology embargo reflects Washington's determination to prevent China from closing the gap in advanced logic and memory production."
 CHI_semiconductor_events.1.o1: "We will press forward regardless."
 CHI_semiconductor_events.1.t: "Western Semiconductor Boycott"
 CHI_semiconductor_events.2.a: "Showcase the achievement"
 CHI_semiconductor_events.2.b: "Keep it quiet, stockpile capacity"
 CHI_semiconductor_events.2.d: "Huawei has launched the Mate 60 Pro powered by a domestic Kirin 9000S system-on-chip. Teardown analysis confirms SMIC fabricated the SoC on its 7nm-equivalent N+2 process. The breakthrough rewrites public assumptions about how far the export controls have set us back."
 CHI_semiconductor_events.2.t: "The Mate 60 Surprise"
 CHI_semiconductor_events.3.a: "Lean on Empyrean"
 CHI_semiconductor_events.3.b: "Endure and reroute through grey channels"
 CHI_semiconductor_events.3.d: "The May 2025 US Bureau of Industry and Security amendments name us as a restricted destination for EDA tooling. Synopsys and Cadence file the required mandatory licensing requests. License denials will follow within weeks. Domestic flow now has to carry every advanced design through tape-out."
 CHI_semiconductor_events.3.t: "Synopsys and Cadence Cut Us Off"
 CHI_semiconductor_events.4.a: "Push qualification with domestic AI firms"
 CHI_semiconductor_events.4.b: "Export HBM to Russia and Iran"
 CHI_semiconductor_events.4.d: "ChangXin Memory Technologies' Hefei plant began mass-producing HBM2 stacks a full year ahead of its publicly stated 2026 target. The first qualification samples are already with Cambricon and Biren. Domestic AI accelerator builds no longer have to clear a foreign-memory bottleneck."
 CHI_semiconductor_events.4.t: "CXMT HBM2 Ahead of Schedule"
 CHI_semiconductor_events.5.a: "Ease the chip controls"
 CHI_semiconductor_events.5.b: "Hold the line on export controls"
 CHI_semiconductor_events.5.d: "China has tied continued access to its rare-earth and gallium exports to relief from the semiconductor export controls. With Western magnet and chip-substrate supply chains dependent on Chinese refining, Beijing is betting that the leverage runs both ways. The proposal lands on our desk as a direct trade: ease the chip embargo, keep the critical minerals flowing."
 CHI_semiconductor_events.5.t: "Beijing's Rare-Earth Offer"
 CHI_semiconductor_events.6.a: "Accelerate the domestic ramp"
 CHI_semiconductor_events.6.d: "Washington has quietly widened licence approvals for mature-node tooling and design software in exchange for guaranteed rare-earth supply. The reprieve is partial and reversible, but it buys our foundries time to close the remaining gaps without the full weight of the embargo."
 CHI_semiconductor_events.6.t: "Controls Relaxed"
 CHI_semiconductor_events.7.a: "Absorb the setback"
 CHI_semiconductor_events.7.d: "Washington has rejected the linkage outright, calculating that conceding on chips would forfeit its strongest point of leverage. The export controls stand, and the political capital spent on the overture is gone. Self-reliance remains the only road open to us."
 CHI_semiconductor_events.7.t: "Talks Collapse"
 CHI_space_events.1.a: "The eyes of the nation are upon us."
 CHI_space_events.1.d: "At Wenchang Space Launch Site, a Long March 10 rises on a column of smoke and flame, carrying the Mengzhou crew vehicle and its three astronauts toward translunar injection. Every television in the country shows the ascent. The world watches."
 CHI_space_events.1.t: "Long March Lifts Off for the Moon"
 CHI_space_events.10.a: "Fund the satellite and tracking network in full"
 CHI_space_events.10.b: "Proceed at a measured pace"
 CHI_space_events.10.d: "With the Chang'e programme committed to the lunar surface, the State Council weighs how to fund the supporting infrastructure. The first question is the satellite and tracking network: the Queqiao relays and deep-space antennas that keep a crew in contact across 380,000 kilometres. We can fund it fully now, or spread the cost and proceed at a measured pace."
 CHI_space_events.10.t: "Funding the Road to the Moon"
 CHI_space_events.11.a: "Accelerate Long March 10 development"
 CHI_space_events.11.b: "Hold to the planned schedule"
 CHI_space_events.11.d: "No crewed lunar mission is possible without a heavy-lift rocket. The Long March 10 is designed to throw the Mengzhou crew vehicle and the Lanyue lander toward the Moon on separate flights. Accelerating its development is expensive, but every month saved brings the landing closer."
 CHI_space_events.11.t: "The Heavy-Lift Question"
 CHI_space_events.12.a: "Trust the engineers"
 CHI_space_events.12.d: "The measured path keeps the programme affordable and politically secure. Engineers at the China Academy of Launch Vehicle Technology work through the qualification campaign at a sustainable pace, confident that patience will be rewarded at the pad."
 CHI_space_events.12.t: "A Steady Cadence"
 CHI_space_events.13.a: "Reap the rewards"
 CHI_space_events.13.d: "The funding decisions of the past years bear fruit. Tracking dishes come online, engines pass their qualification firings, and the lunar architecture takes shape. The dividends of foresight are now ready to be drawn."
 CHI_space_events.13.t: "The Investments Mature"
 CHI_space_events.2.a: "A great leap for the Chinese people."
 CHI_space_events.2.d: "The Lanyue lander touches down in the lunar south polar region. The mission commander opens the hatch and descends the ladder. His first words, broadcast live to a billion listeners: we have arrived, and we will remain. China has reached the Moon."
 CHI_space_events.2.t: "Astronauts Set Foot on the Moon"
 CHI_space_events.20.a: "A triumph of the nation"
 CHI_space_events.20.b: "A triumph of our industry"
 CHI_space_events.20.c: "A triumph of our science"
 CHI_space_events.20.d: "The astronauts have walked on the Moon and returned. A nation that once imported its rockets has planted its flag on another world. Now the leadership must decide what enduring meaning the achievement will carry: national prestige, industrial might, scientific ambition, or martial confidence. The dividend of the Moon will shape the decades ahead."
 CHI_space_events.20.e: "A triumph of our resolve"
 CHI_space_events.20.t: "The Legacy of the Moon Landing"
 chi_uighur.1.a: "Disperse with riot police"
 chi_uighur.1.b: "Send Party officials to negotiate"
 chi_uighur.1.c: "Mass arrests, blame foreign agitators"
 chi_uighur.1.d: "Demonstrators have taken to the streets of Urumqi following an incident between Han residents and Uyghur workers. Riot police have cordoned off the central districts, but the crowds are growing. The Party committee in Xinjiang is awaiting instructions from Beijing."
 chi_uighur.1.t: "Street Protests in Urumqi"
 chi_uighur.2.a: "Expand the surveillance state"
 chi_uighur.2.b: "Community outreach and economic aid"
 chi_uighur.2.c: "Public executions of the perpetrators"
 chi_uighur.2.d: "A coordinated bomb attack on a busy market district has left casualties and shattered any sense of normalcy in the city. The East Turkestan Islamic Movement has claimed responsibility. Security forces are on high alert and Beijing demands a swift response."
 chi_uighur.2.t: "Bomb Attack Strikes Urumqi Market"
 chi_uighur.3.a: "Impose martial law in Urumqi"
 chi_uighur.3.b: "Mass detentions, \"re-education\" camps"
 chi_uighur.3.c: "Negotiate with Uyghur community leaders"
 chi_uighur.3.d: "Tensions that have been building for months have spilled into open violence across Urumqi and several outlying districts. Clashes between Uyghur protesters and Han residents have overwhelmed local police. The scale of the unrest, reminiscent of the 2009 riots, demands an immediate decision from the Party centre."
 chi_uighur.3.t: "Xinjiang Erupts in Large-Scale Riots"
 chi_uighur.4.a: "Reject all interference in our internal affairs"
 chi_uighur.4.b: "Allow a limited UN fact-finding visit"
 chi_uighur.4.d: "Reports of mass detentions and the establishment of re-education facilities in Xinjiang have provoked sharp condemnation from Western governments, Turkey, and international human rights bodies. Calls for an independent investigation are growing, and several capitals are threatening punitive measures."
 chi_uighur.4.t: "International Community Condemns Beijing"
 chi_uighur.5.a: "Quiet operation, full disruption"
 chi_uighur.5.d: "Security services have successfully identified and located a militant cell planning attacks across Xinjiang. Acting on precise intelligence, a quiet operation has disrupted the network before it could strike."
 chi_uighur.5.t: "Counter-Terrorism Intelligence Breakthrough"
 chi_uighur.6.a: "A firm response will restore order"
 chi_uighur.6.b: "Beijing's iron fist"
 chi_uighur.6.d: "Violent unrest has broken out across China's Xinjiang region. Images of burning vehicles and security forces in full riot gear are circulating internationally. Beijing has declared that order will be restored, but the scale of the disturbances draws scrutiny from governments and observers worldwide."
 chi_uighur.6.t: "Riots Rock Xinjiang"
 china_national_committee.02.a: "Select the committees"
 china_national_committee.02.d: "The National Congress of the Communist Party of China has convened. Delegates from across the country have gathered to determine the political direction for the next five years. The most important committees and their leadership will now be selected."
 china_national_committee.02.t: "National Congress Convened"
 china_news.140.a: "Noted."
 china_news.140.d: "The Chinese military's Northeast Command has entered an elevated readiness posture. Official statements cite regional security requirements without further elaboration."
 china_news.140.t: "China Activates Northeast Command"
 china_news.141.a: "Noted."
 china_news.141.d: "China has launched a broad economic retaliation campaign against South Korea following the THAAD deployment. Korean businesses in China report mounting pressure, and Chinese tourist bookings to Korea have collapsed."
 china_news.141.t: "THAAD Sanctions: Beijing's Economic Retaliation"
 china_news.142.a: "Noted."
 china_news.142.d: "Satellite imagery and border reporting confirm that China is providing logistical support for a significant North Korean military buildup along the 38th parallel. Regional governments are raising their alert levels."
 china_news.142.t: "China Backs KPA Buildup"
 china_news.143.a: "Noted."
 china_news.143.d: "North Korean forces have crossed the demilitarized zone. The second Korean War has begun. China has not formally declared war but its material support for North Korea's military operation is not in doubt."
 china_news.143.t: "War Returns to the Korean Peninsula"
 china_news.144.a: "Noted."
 china_news.144.d: "In response to global sanctions following the Korean War, China has announced countermeasures. The sanctions regime represents the broadest international economic isolation China has faced since 1989."
 china_news.144.t: "China Imposes International Isolation"
 china_news.150.a: "Noted."
 china_news.150.d: "A military coup in North Korea has removed the Kim family from power. Chinese state media has described the transition as an internal Korean matter while making clear that Beijing welcomes the change in leadership."
 china_news.150.t: "Pyongyang Coup: Kim Regime Overthrown"
 china_news.151.a: "Noted."
 china_news.151.d: "The new North Korean transitional government has signed agreements formalizing economic integration with China. Outside observers describe the arrangements as tributary in nature."
 china_news.151.t: "China Establishes Client Government in Pyongyang"
 china_news.152.a: "Noted."
 china_news.152.d: "North Korea's political, economic, and strategic subordination to China is now complete. The Beijing Settlement has redefined the Korean state as a Chinese tributary for the first time since 1895."
 china_news.152.t: "North Korea Becomes Chinese Client State"
 china_news.153.a: "Noted."
 china_news.153.d: "Chinese investment is restructuring North Korea's economic base. Korean raw materials and labor are integrated into Chinese industrial chains under arrangements that will persist for decades."
 china_news.153.t: "China Absorbs North Korean Economy"
 china_news.154.a: "Noted."
 china_news.154.d: "With North Korea firmly in its orbit, China has established a dominant strategic position in Northeast Asia that rivals have no near-term means of reversing."
 china_news.154.t: "China Dominates Northeast Asia"
 china_news.160.a: "Noted."
 china_news.160.d: "South Korea has adopted a strategic autonomy doctrine and established a new security partnership with China. The U.S.-Korea alliance, foundational to Indo-Pacific security since 1953, has entered its terminal phase."
 china_news.160.t: "Seoul Pivots Toward Beijing"
 china_news.161.a: "Noted."
 china_news.161.d: "South Korea's withdrawal from the U.S.-Japan-Philippines trilateral security framework has effectively dismantled the Indo-Pacific security architecture assembled over the past decade."
 china_news.161.t: "Indo-Pacific Architecture Collapses"
 china_news.162.a: "Noted."
 china_news.162.d: "China has issued a formal security guarantee underwriting Korean unification. The Beijing Peace Guarantee commits the People's Republic to defending a unified Korea, on terms that align Korea's strategic future with Chinese interests."
 china_news.162.t: "China Guarantees Korean Unification"
 china_news.44.a: "An end to seventy years of division."
 china_news.44.d: "Following a joint Sino-American ultimatum, the North Korean government has peacefully dissolved and transferred sovereignty to the Republic of Korea. The peninsula is one again, under Seoul's flag. The Kim dynasty has ended without a war."
 china_news.44.t: "Korean Peninsula Reunified Under Seoul"
 china_news.45.a: "The final Korean war begins."
 china_news.45.d: "After Pyongyang's rejection of the joint Sino-American ultimatum, China, the United States, and South Korea have declared war on North Korea. For the first time in history, Beijing and Washington march together against the Kim regime."
 china_news.45.t: "War Declared on North Korea"
 china_news.boycott_streets.a: "Take note."
 china_news.boycott_streets.d: "Anti-Japanese protests have spread from social media to the streets. Dealerships are shuttered, Uniqlo stores board their windows, and Toyota inventories go unsold. The government has not intervened."
 china_news.boycott_streets.t: "Boycott Spreads Across Chinese Cities"
 china_news.panda_arrives_tokyo.a: "Take note."
 china_news.panda_arrives_tokyo.d: "Two giant pandas, a gift from the People's Republic of China, have arrived at Narita Airport to scenes of considerable public enthusiasm. The gesture is diplomatic shorthand for a warmer season in Sino-Japanese relations."
 china_news.panda_arrives_tokyo.t: "Pandas Land at Narita"
 china_news.yasukuni_recall.a: "Take note."
 china_news.yasukuni_recall.d: "China has recalled its ambassador from Tokyo following the Japanese Prime Minister's visit to Yasukuni Shrine. The diplomatic protest signals Beijing's resolve to hold Japan accountable for how it honours its war dead."
 china_news.yasukuni_recall.t: "Beijing Recalls Its Ambassador"
 china_sar.034.a: "Order an immediate security crackdown."
 china_sar.034.b: "Investigate first and engage local leaders."
 china_sar.034.d: "A coordinated attack has struck a security checkpoint in the Tarim Basin, leaving casualties among police and civilians. Beijing must choose between an immediate security clampdown and a slower investigative response in the restive region."
 china_sar.034.t: "Attack in Xinjiang"
 china_scs.10.a: "Note the escalation."
 china_scs.10.d: "Intelligence reports describe a coordinated Chinese deployment of fishing fleets, maritime militia, coast guard cutters, and frigates in concentric rings around contested South China Sea features. The doctrine, attributed to Rear Admiral Zhang Zhaozhong, leaves no room for legal challenge by the time the encirclement is complete. Our claims and interests in the region are now under direct pressure."
 china_scs.10.t: "Beijing Adopts the Cabbage Strategy"
 china_scs.12.a: "Accept the result."
 china_scs.12.d: "The standoff operation has reached its conclusion. The outcome determines the practical control of the feature and the diplomatic costs China must absorb."
 china_scs.12.t: "Standoff Concluded"
 china_scs.13.a: "Launch FONOPs immediately."
 china_scs.13.b: "Exercise restraint for now."
 china_scs.13.d: "The State Department has issued a formal démarche and the Pentagon is weighing options. Freedom of Navigation Operations through the twelve-nautical-mile zones of the artificial islands are the most likely immediate response. The Seventh Fleet is on alert."
 china_scs.13.t: "Washington Responds to Chinese Encroachment"
 china_scs.14.a: "Stand down. Do not intercept."
 china_scs.14.b: "Shadow the vessel and protest."
 china_scs.14.c: "Intercept and issue final warning."
 china_scs.14.d: "A US Navy vessel has entered the twelve-nautical-mile zone around one of China's artificial island installations. The South Sea Fleet is awaiting orders. Standing down will be read as acquiescence; shadowing maintains presence without escalation; active interception risks a serious incident."
 china_scs.14.t: "PLAN Response to FONOP"
 china_scs.15.a: "File a formal protest and demand compensation."
 china_scs.15.b: "Convene an emergency Security Council session."
 china_scs.15.d: "A freedom of navigation operation has ended in a collision or confrontation at sea. Both sides are issuing competing accounts of what occurred. International media are demanding a full investigation; domestic audiences on both sides are calling for a firm response."
 china_scs.15.t: "South Sea Incident"
 china_scs.20.a: "The sky above the South Sea is Chinese."
 china_scs.20.d: "Beijing has announced the establishment of an Air Defence Identification Zone covering the South China Sea. All aircraft entering the zone must transmit identification, maintain radio contact, and comply with directions from Chinese air traffic control. The United States, Japan, Australia, and the Philippines have immediately declared the ADIZ unlawful under international law."
 china_scs.20.t: "South China Sea ADIZ Declared"
 china_scs.21.a: "Issue a stern warning through diplomatic channels."
 china_scs.21.b: "Escort them out and release a statement."
 china_scs.21.d: "PLAAF interceptors have made contact with a foreign military aircraft transiting the South China Sea patrol zone without complying with Chinese identification procedures. The aircraft has been escorted or challenged; how Beijing responds to the incident shapes both the enforcement credibility of the patrol zone and the temperature of relations with the aircraft's home state."
 china_scs.21.t: "Foreign Aircraft Intercepted"
 china_scs.30.a: "Engage with the new framework."
 china_scs.30.d: "Beijing has announced that its South China Sea engagement will be conducted in the spirit of the Ming-dynasty treasure fleets: through trade, partnership, and bilateral dialogue rather than confrontation. The Maritime Silk Road framework is formally extended to all littoral states. The opening for de-escalation is real, even if the underlying claims have not changed."
 china_scs.30.t: "Beijing Pursues Maritime Diplomacy"
 china_scs.31.a: "A constructive step forward."
 china_scs.31.d: "In a joint statement issued following bilateral talks in Beijing, China and its South China Sea neighbours have reaffirmed their commitment to the 2002 Declaration on the Conduct of Parties. The statement calls for disputes to be managed peacefully through bilateral consultations and renews the pledge against unilateral provocations, a formulation that Beijing interprets to exclude its own existing presence."
 china_scs.31.t: "2002 Declaration Reaffirmed"
 china_scs.32.a: "Welcome Manila into the new partnership."
 china_scs.32.b: "Maintain existing US alignment."
 china_scs.32.d: "President Duterte has delivered a speech in Beijing announcing the Philippines' \"separation\" from the United States and signalling openness to a new relationship with China. The statement has stunned Washington and delighted Beijing. Manila's position on the South China Sea arbitral award is now deliberately ambiguous."
 china_scs.32.t: "Manila at a Crossroads"
 china_scs.33.a: "A step toward regional stability."
 china_scs.33.d: "People's Daily reports that China and its partner have concluded a joint maritime development agreement, establishing a shared administrative framework for hydrocarbon exploration and fishing rights. The agreement is described as \"a model of win-win cooperation and the Maritime Silk Road in action.\" Claimant governments not party to the agreement decline to comment."
 china_scs.33.t: "Joint Maritime Development Agreement Signed"
 china_scs.34.a: "Offer a grace period and renegotiate."
 china_scs.34.b: "Enforce the original terms."
 china_scs.34.c: "Write off the debt in exchange for concessions."
 china_scs.34.d: "The government of the partner state has announced it cannot meet the scheduled loan repayment on Chinese Belt and Road infrastructure financing. Domestic opposition politicians are demanding the terms be renegotiated; Beijing faces a choice between flexibility that preserves the relationship and firmness that preserves the financial precedent."
 china_scs.34.t: "Debt Renegotiation Demanded"
 china_scs.35.a: "A diplomatic triumph."
 china_scs.35.d: "For the first time, the ASEAN summit communique has included language explicitly endorsing bilateral management of South China Sea disputes and rejecting the involvement of \"external parties.\" The formulation was inserted at Chinese insistence and blocked the passage of language demanded by Vietnam and the Philippines. Washington has condemned the outcome."
 china_scs.35.t: "ASEAN Summit Endorses Chinese Position"
 china_scs.36.a: "Renegotiate the terms."
 china_scs.36.b: "Enforce the original terms."
 china_scs.36.c: "Withdraw the loan."
 china_scs.36.d: "Domestic opposition figures and civil society groups in the partner state have launched a public campaign against the Chinese Belt and Road loan, citing unfavourable interest terms, environmental concerns, and fears of strategic dependency. The government is under pressure to renegotiate; Beijing must choose between protecting the financial precedent and preserving the political relationship."
 china_scs.36.t: "Debt Backlash"
 china_scs.40.a: "Push for full acceptance of the Chinese draft."
 china_scs.40.b: "Accept a compromise to get the agreement signed."
 china_scs.40.d: "Negotiations on the Code of Conduct for the South China Sea have entered their final round. The Chinese draft excludes compulsory dispute resolution, limits geographical scope to exclude areas of active Chinese construction, and bars non-ASEAN states from any oversight role. Claimant states are divided between accepting a flawed agreement and continuing indefinitely without one."
 china_scs.40.t: "Code of Conduct Negotiations: Final Round"
 china_scs.41.a: "The region has spoken."
 china_scs.41.d: "The State Department has issued a statement acknowledging the entry into force of the ASEAN-China Code of Conduct on the South China Sea. The statement notes US objections to several provisions but recognises the agreement as the governing framework for the region. Analysts describe it as a significant retreat from America's long-standing insistence on UNCLOS as the sole framework."
 china_scs.41.t: "Washington Acknowledges the Code of Conduct"
 china_scs.50.a: "Prepare a response."
 china_scs.50.d: "A People's Daily editorial, distributed through diplomatic channels with apparent state endorsement, invokes the classical doctrine of the Four Seas (四海, Sihai) and frames China's maritime claims as the restoration of an interrupted natural order. The accompanying naval expansion announcement leaves no doubt about Beijing's intent. The post-1945 maritime order in the Western Pacific is now openly contested."
 china_scs.50.t: "Beijing Asserts the Mandate of the Seas"
 china_scs.51.a: "Their protests are noted."
 china_scs.51.b: "Offer a clarifying statement to reduce alarm."
 china_scs.51.d: "China's formal invocation of the tributary system has produced sharply divergent reactions. ASEAN foreign ministers issued an emergency joint statement rejecting any claim to historical suzerainty. The United States, Japan, and Australia announced a coordinated diplomatic response. Within China, state media covered the reactions as confirmation that the restoration of national dignity unsettles those who profited from the Century of Humiliation."
 china_scs.51.t: "World Reacts to Tributary Rhetoric"
 china_scs.52.a: "Acknowledge Chinese authority."
 china_scs.52.b: "Reject the ultimatum."
 china_scs.52.d: "The Chinese ambassador has delivered a formal ultimatum requiring acknowledgment of Chinese administrative authority over disputed South China Sea waters within seventy-two hours. The government must now decide: accept the terms and preserve the relationship, or refuse and accept the consequences."
 china_scs.52.t: "Ultimatum Delivered"
 china_scs.53.a: "Issue a joint ultimatum."
 china_scs.53.b: "Diplomatic protest only."
 china_scs.53.c: "Stay out of this."
 china_scs.53.d: "Beijing has issued an ultimatum to a South China Sea claimant that has refused to comply. Washington faces a choice: honour its security commitments by joining a joint ultimatum against China, limit itself to a formal protest that preserves the relationship, or stay out entirely. The decision turns on naval readiness, alliance credibility, and how much political capital the administration is willing to spend on a dispute in waters four thousand miles away."
 china_scs.53.t: "Crisis in the South China Sea"
 china_scs.54.a: "Comply and withdraw."
 china_scs.54.b: "Refuse. They will not dictate to China."
 china_scs.54.d: "The United States has joined the claimant in presenting Beijing with a formal demand to withdraw its forces from the contested feature and stand down the ultimatum. The Seventh Fleet is at heightened readiness. Compliance means retreat; refusal means confronting the combined naval weight of the United States and its regional partners. The Politburo Standing Committee has been convened."
 china_scs.54.t: "Washington's Ultimatum"
 china_scs.55.a: "Long may it remain so."
 china_scs.55.d: "Dispatches from PLAN installations in the South China Sea report varied atmospheres across the fleet. On Fiery Cross Reef, sailors photograph the sunrise over waters their charts now mark as home. On the carrier, the crew prepares for exercises. In the coast guard station at Scarborough, a watch officer notes that no foreign vessel has approached the exclusion line in ninety days. The South Sea is quiet."
 china_scs.55.t: "Voices from the South Sea Fleet"
 china_scs.56.a: "The South Sea must be secured."
 china_scs.56.d: "After the claimant rejected Beijing's ultimatum, PLAN surface groups have moved to enforce it. A short, sharp naval engagement over the contested Spratly feature has begun. Both sides are committing only limited forces; the outcome will determine control of the state and whether the claimant turns to Washington for intervention."
 china_scs.56.t: "The Spratly Skirmish"
 china_scs.57.a: "Accept defeat and seek terms."
 china_scs.57.b: "Appeal to the United States."
 china_scs.57.d: "The border engagement has ended in defeat. The contested feature is now under Chinese control and its forces have withdrawn. The government must decide whether to accept the loss and preserve what sovereignty remains, or to appeal to the United States for support, a choice that risks drawing Washington into a confrontation it may not welcome."
 china_scs.57.t: "Appeal to American Allies"
 china_scs.58.a: "Withdraw and reassess."
 china_scs.58.d: "PLA Navy units engaged the claimant's forces over the contested feature and withdrew without securing the position. The skirmish was limited and contained, but the diplomatic narrative is one of Chinese overreach and military shortfall. Beijing must absorb the political cost while the broader strategic posture continues."
 china_scs.58.t: "Skirmish Setback in the Spratlys"
 china_scs.60.a: "Note the new alignment."
 china_scs.60.d: "With Chinese aggression in the South China Sea surpassing a threshold that the region can no longer absorb diplomatically, the United States, Japan, India, and Australia have formalised their security cooperation into a functioning Quad alignment. Joint naval patrols, intelligence sharing, and coordinated diplomatic positions are announced. The formation is a direct response to Beijing's posture and signals that the contest for the South China Sea has acquired a great-power dimension."
 china_scs.60.t: "The Quadrilateral Initiative"
 china_scs.70.a: "Apologise quietly and withdraw."
 china_scs.70.b: "Stand firm. The waters are within China's historic rights."
 china_scs.70.d: "Chinese maritime militia vessels have been detected operating inside Indonesia's Natuna Exclusive Economic Zone, accompanied by coast guard escorts. Jakarta has lodged a formal protest, recalling its ambassador and deploying naval vessels to shadow the Chinese craft. Indonesia does not contest the nine-dash line publicly, but the intrusion tests the limits of its strategic patience and risks drawing the largest ASEAN state into open confrontation with Beijing."
 china_scs.70.t: "Natuna Incident"
 sino_indian.1.d_opt: "We cannot intervene at this time."
 sino_indian.20.a: "A defensive coalition effort. We protect the region."
 sino_indian.20.b: "A punitive expedition. Swift, decisive, brutal."
 sino_indian.20.c: "Total coalition war footing. We end this permanently."
 sino_indian.20.d: "The coalition framework against the Taliban and TTP factions in the Afghan-Pakistani borderlands is in place. Commanders await political direction on the nature of the operation. The choice will shape how the region and the wider world perceive China's role in Central Asia."
 sino_indian.20.t: "Operation Mountain Tiger: Define the Mission"
 sino_indian.21.a: "Accept. Begin formal dialogue."
 sino_indian.21.b: "Reciprocate cautiously. Trust but verify."
 sino_indian.21.c: "Reject. This is a feint."
 sino_indian.21.d: "China has taken a series of steps to distance itself from Islamabad and signal a new orientation toward New Delhi. The gesture arrives without preconditions, but its strategic implications are plain. India must decide whether to engage, and on what terms."
 sino_indian.21.t: "Beijing Extends an Unexpected Hand"
 sino_indian.22.a: "A defensive posture. We were provoked."
 sino_indian.22.b: "A punitive expedition. As in 1962."
 sino_indian.22.c: "Total war footing. Settle the McMahon Line forever."
 sino_indian.22.d: "PLA forces have engaged Indian units along the Line of Actual Control. The clash is serious enough to demand a policy decision. Beijing must define the political character of this military action before it defines itself."
 sino_indian.22.t: "The Galwan Reckoning"
 sino_indian.30.a: "Excellent."
 sino_indian.30.b: "An interesting development."
 sino_indian.30.d: "Chinese-brokered mediation between rival Taliban factions has caused an unexpected rupture. A hardline bloc has broken with the main leadership over the terms being proposed, publicly denouncing the process. The split weakens Taliban cohesion and creates an opening for the coalition."
 sino_indian.30.t: "Taliban Factions Split Over Negotiations"
 sino_indian.31.a: "We expected as much."
 sino_indian.31.d: "Beijing's declaration of a full coalition war footing in Central Asia has prompted concern in Ankara and Tehran. Both capitals view the mobilisation as a projection of Chinese military reach into a region they regard as their own strategic periphery."
 sino_indian.31.t: "Coalition War Footing Alarms Regional Powers"
 sino_indian.32.a: "Accept the pact. We need protection."
 sino_indian.32.b: "Reject. We retain our strategic autonomy."
 sino_indian.32.d: "In the wake of the Chinese offensive along the Himalayan front, Washington has approached New Delhi with a formal offer of a bilateral defense pact. American planners see India as a critical counterweight to Chinese power. For India, acceptance would mean security guarantees but also a deeper alignment with the United States."
 sino_indian.32.t: "Washington Offers a Defense Pact"
 sino_indian.33.a: "Brace for Chinese pressure"
 sino_indian.33.d: "China's renewed engagement in South Asia signals a direct challenge to India's traditional sphere of influence. New Delhi must prepare its response."
 sino_indian.33.t: "Beijing Pivots to South Asia"
 sino_indian.34.a: "Take the rifles and the orders"
 sino_indian.34.b: "Refuse to be Beijing's proxy"
 sino_indian.34.d: "China is offering the Unified Communist Party of Nepal weapons, training, and political backing to press their insurgency against Kathmandu. Acceptance binds the movement to Beijing's patronage, a debt that will be called in if the red banner ever flies over Singha Durbar."
 sino_indian.34.t: "Beijing Extends a Hand to the Maoists"
 sino_indian.35.a: "Accept the framework"
 sino_indian.35.b: "Decline for now"
 sino_indian.35.d: "Beijing has reached out to Kathmandu with an offer of economic and infrastructure cooperation, framed around mutual respect for Nepal's neutral status."
 sino_indian.35.t: "China Proposes a Cooperative Framework"
 sino_indian.36.a: "Accept the partnership"
 sino_indian.36.b: "Politely decline"
 sino_indian.36.d: "China has proposed a formal strategic partnership to Bangladesh, backed by a security guarantee and expanded trade ties. Dhaka must weigh the benefits against New Delhi's likely reaction."
 sino_indian.36.t: "Beijing Offers Dhaka a Strategic Partnership"
 sino_indian.37.a: "We accept this gesture"
 sino_indian.37.d: "In an unexpected diplomatic gesture, China has formally renounced its outstanding territorial claims along Bhutan's northern border. Thimphu welcomes the announcement."
 sino_indian.37.t: "Beijing Drops Its Claims on Bhutan"
 sino_indian.38.a: "Embrace the partnership"
 sino_indian.38.b: "We need our own space"
 sino_indian.38.d: "China has offered Pakistan a permanent partnership declaration - the Iron Brothers bond - cementing their all-weather alliance at the highest political level."
 sino_indian.38.t: "Beijing Proposes an Iron Brothers Pact"
 sino_indian.39.a: "Focus on land warfare"
 sino_indian.39.b: "Focus on air power"
 sino_indian.39.c: "Focus on naval capability"
 sino_indian.39.d: "China's defense industry is ready to transfer knowledge to Pakistan. Islamabad must decide which field benefits most from the collaboration."
 sino_indian.39.d_opt: "Focus on nuclear technology"
 sino_indian.39.t: "Joint Military Projects: Choose a Focus"
 sino_indian.40.a: "Formally designate the ETIM as a terrorist organization"
 sino_indian.40.b: "Decline the request"
 sino_indian.40.d: "China has formally requested that Pakistan designate the East Turkestan Islamic Movement as a terrorist organization. Islamabad must weigh the counterterrorism benefits against domestic political sensitivities."
 sino_indian.40.t: "Beijing Requests ETIM Terrorist Designation"
 sino_indian.41.a: "Welcome the investment"
 sino_indian.41.d: "Beijing has confirmed the launch of the full China-Pakistan Economic Corridor program. The massive infrastructure investment will reshape Pakistan's transport and energy networks."
 sino_indian.41.t: "The China-Pakistan Economic Corridor Begins"
 sino_indian.42.a: "We welcome the partnership"
 sino_indian.42.d: "Beijing has proposed expanding Gwadar Port's docking facilities to accommodate Chinese naval vessels. Islamabad will gain new shipyard capacity in exchange."
 sino_indian.42.t: "China Eyes Gwadar as a Naval Hub"
 sino_indian.43.a: "Join the mechanism"
 sino_indian.43.d: "China has invited Pakistan to join the Quadrilateral Cooperation and Coordination Mechanism, a joint counterterrorism framework linking Beijing, Kabul, Islamabad, and Dushanbe."
 sino_indian.43.t: "The QCCM: Islamabad Invited to Join"
 sino_indian.44.a: "Join the mechanism"
 sino_indian.44.d: "China has invited Afghanistan to join the Quadrilateral Cooperation and Coordination Mechanism, a joint counterterrorism framework linking Beijing, Kabul, Islamabad, and Dushanbe."
 sino_indian.44.t: "The QCCM: Kabul Invited to Join"
 sino_indian.45.a: "Join the mechanism"
 sino_indian.45.d: "China has invited Tajikistan to join the Quadrilateral Cooperation and Coordination Mechanism, a joint counterterrorism framework linking Beijing, Kabul, Islamabad, and Dushanbe."
 sino_indian.45.t: "The QCCM: Dushanbe Invited to Join"
 sino_indian.46.a: "Fight alongside China"
 sino_indian.46.b: "This is China's war to fight"
 sino_indian.46.d: "Beijing has requested that Pakistan join a combined military campaign against the Taliban and TTP. A joint effort would be far more decisive - but also a far greater commitment."
 sino_indian.46.t: "China Proposes Joint Operations in Afghanistan"
 sino_indian.47.a: "Coordinate on border security"
 sino_indian.47.d: "Beijing has established a joint border management and counterterrorism coordination zone in the Wakhan Corridor. All partner states will benefit from improved intelligence sharing."
 sino_indian.47.t: "China Launches the Wakhan Buffer Initiative"
 sino_indian.48.a: "Acknowledge the gesture"
 sino_indian.48.b: "We remain skeptical"
 sino_indian.48.d: "China's decision to distance itself from Islamabad has not gone unnoticed in New Delhi. Whether this signals a genuine realignment or a temporary maneuver remains an open question."
 sino_indian.48.t: "India Weighs Beijing's Shift on Pakistan"
 sino_indian.49.a: "Register a formal protest"
 sino_indian.49.b: "Accept the new regional reality"
 sino_indian.49.d: "The Sino-Indian Treaty of Friendship has sent shockwaves through Washington. Whether it represents a stable new order or a threat to American interests in the region is now being debated at the highest levels."
 sino_indian.49.t: "Washington Reacts to the Sino-Indian Treaty"
 sino_indian.50.a: "Submit to Chinese authority"
 sino_indian.50.b: "Bhutan will never submit"
 sino_indian.50.d: "China has presented Bhutan with a stark choice: formal submission to Beijing's authority, or face the consequences of military force. Thimphu has little room to maneuver."
 sino_indian.50.t: "Beijing Issues an Ultimatum to Thimphu"
 sino_indian.51.a: "Accept the terms"
 sino_indian.51.b: "Nepal will resist"
 sino_indian.51.d: "China has demanded that Nepal accept a formal status as an associated state under Beijing's authority. Kathmandu must decide whether to comply or resist."
 sino_indian.51.t: "Beijing Issues an Ultimatum to Kathmandu"
 sino_indian.52.a: "Accept the partnership"
 sino_indian.52.b: "Decline the request"
 sino_indian.52.d: "China has formally requested logistical and basing access at our ports under the so-called String of Pearls strategy. In exchange, Beijing offers a substantial economic partnership package."
 sino_indian.52.t: "Beijing Requests Naval Basing Rights"
 sino_indian.53.a: "Accept Beijing's embrace"
 sino_indian.53.b: "The revolution answers to no foreign master"
 sino_indian.53.d: "The People's Republic of Nepal stands triumphant in Kathmandu, but the rifles that won the revolution were stamped Norinco. Beijing now expects the new state to take its place within China's sphere as an associated state. Refusal will not be received politely."
 sino_indian.53.t: "Beijing's Bill Comes Due"
 sino_indian.54.a: "An excellent partnership"
 sino_indian.54.d: "Pakistan has accepted our offer of joint military research and selected its area of focus. Our defense industries will now coordinate development on the agreed specialization, and our researchers stand to gain from the partnership."
 sino_indian.54.t: "Islamabad Joins Joint Military Programs"
 sino_indian.55.a: "A foothold on the Arabian Sea"
 sino_indian.55.d: "Islamabad has formally welcomed our naval forces at Gwadar Port. The expanded docking facilities and basing arrangement give us a strategic foothold on the Arabian Sea, anchoring our presence along the western Indian Ocean."
 sino_indian.55.t: "Gwadar Opens to the People's Liberation Army Navy"
 CHI_advanced_node_chips_trait: "Advanced-Node Chips"
 CHI_advanced_node_chips_trait_desc: "SMIC's 7nm-equivalent process feeds CETC's command-and-control systems with domestic processors. Eliminates the foreign-supply bottleneck for signal-processing electronics."
 CHI_hbm_compute_trait: "HBM-Backed Guidance Compute"
 CHI_hbm_compute_trait_desc: "CXMT HBM2 stacks support advanced sensor fusion and target classification in CASIC interceptor and air-defence systems. Domestic supply ends the foreign-memory dependency."
 CHI_imfm_jsw_partnership: "Japan Steel Works Partnership"
 CHI_imfm_jsw_partnership_desc: "This partnership transfers Japan Steel Works' large-diameter forging and high-hardness steel manufacturing processes, directly upgrading the factory's structural material output quality."
 CHI_imfm_komatsu_partnership: "Komatsu Partnership"
 CHI_imfm_komatsu_partnership_desc: "Cooperation with Komatsu Defense introduces modular lightweight armour construction methods and vehicle systems integration practices developed for Japan's self-defense vehicle programmes."
 CHI_imfm_mhi_partnership: "Mitsubishi Heavy Industries Partnership"
 CHI_imfm_mhi_partnership_desc: "A licensed manufacturing agreement with Mitsubishi Heavy Industries imports advanced armour design methodology and composite protection techniques into the factory's vehicle programme."
 CHI_indigenous_euv_trait: "Indigenous EUV Integration"
 CHI_indigenous_euv_trait_cetc: "Indigenous EUV Integration"
 CHI_indigenous_euv_trait_cetc_desc: "SiCarrier-pattern lithography produces the next generation of CETC CNC processors, sensor ASICs, and radar back-end electronics. Cost per wafer drops as the domestic toolchain matures."
 CHI_indigenous_euv_trait_desc: "SiCarrier-pattern lithography produces space-grade and missile-grade chips inside the CASC programme. End-to-end domestic supply for strategic systems."
 CHI_kirin_avionics_trait: "Kirin Avionics Integration"
 CHI_kirin_avionics_trait_desc: "HiSilicon Kirin-derived SoCs power AVIC flight computers, mission systems, and electronic warfare suites. Domestic substitution after the 2019 entity-list designation."
 CHI_norinco_howa_partnership: "Howa Machinery Partnership"
 CHI_norinco_howa_partnership_desc: "This partnership licences Howa Machinery's precision small-arms machining processes, lifting production tolerances and quality consistency across NORINCO's infantry weapon lines."
 CHI_norinco_nec_partnership: "NEC Partnership"
 CHI_norinco_nec_partnership_desc: "Cooperation with NEC Corporation integrates Japanese C4ISR electronics standards and embedded systems engineering into NORINCO's battlefield communications and sensor product lines."
 CHI_norinco_subaru_partnership: "Subaru Partnership"
 CHI_norinco_subaru_partnership_desc: "A technology transfer arrangement with Subaru Aerospace brings precision metalwork techniques and rotary-wing structural design knowledge into NORINCO's production lines."
 CHI_norinco_toshiba_partnership: "Toshiba Partnership"
 CHI_norinco_toshiba_partnership_desc: "A licensing arrangement with Toshiba Defense Systems introduces advanced radar array design and electronic warfare component manufacturing techniques into NORINCO's electronics division."
