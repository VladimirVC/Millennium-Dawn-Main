 PMR.Communist-State: "£PMR_emerging_communism (TCP) Transnistrian Communist Party"
 PMR.Communist-State_icon: "£PMR_emerging_communism"
 PMR.Communist-State_desc: "(Marxism-Leninism) - The PKP declares the construction of a society in Transnistria where the ideas of equality, freedom and justice will prevail. The aim of the party's struggle for power is to create a socially just state for all. The party advocates a return to the planned economy, referring to the successes in the economic development of China, led by the Communists; for the restoration of state control over production and consumption, non-recognition of the results of privatization. The party also stands for changing the electoral legislation of the PMR, for holding elections according to a proportional rather than majority system.."
 PMR.oligarchism: "£PMR_non_aligned_oligarchism (RPR) 共和政党「刷新」"
 PMR.oligarchism_icon: "£PMR_non_aligned_oligarchism"
 PMR.oligarchism_desc: "親ロシア独裁体制 - 共和政党「刷新」は、国際的にはモルドバの一部と認められている未承認国家沿ドニエストルの政党である。同党は最高会議において議会多数派を占めている。"
 PMR.socialism: "£PMR_western_social_democrat (SD) Social Democrats"
 PMR.socialism_desc: "Unlike other political parties in Transnistria, it supports conditional reintegration into Moldova with a high amount of autonomy for Transnistria."
 PMR.socialism_icon: "£PMR_western_social_democrat"
 IRQ.Nat_Fascism: "£IRQ_Nat_Autocracy_small (SBP) アラブ社会主義バアス党"
 IRQ.Nat_Fascism_desc: "バアス主義 - アラブ社会主義バアス党（アラビア語ローマ字表記：Hizb al-Ba'th al-'Arabī）\n\nイラクのアラブ社会主義バアス党は1968年の軍事クーデターで政権を掌握した。当初は汎アラブ主義のシリア・バアス党と同一の政党であったが、イラク支部はイラク民族主義を中核思想として採用。この分裂は血で血を洗う争いへと発展し、シリアはイランを支持してイラクに対抗した。サダム・フセインの指導下では、専制政治に基づく軍国主義的な「大メソポタミア」の復興を推進し、従来世俗主義であった国家のイスラム化を加速させた。"
