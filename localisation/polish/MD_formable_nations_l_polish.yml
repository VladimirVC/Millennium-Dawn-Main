 form_MAPHI_category: "Mapilind"
 form_MAPHI_category_desc: "Proponowana, apolityczna konfederacja trzech krajów Azji Południowo-Wschodniej na Archipelagu Malajskim w latach sześćdziesiątych XX wieku. Marzenie to nigdy nie zostało zrealizowane z powodu konfliktu między narodami Indonezji a Federacją Malajów. Zjednoczenie trzech narodów stworzyłoby naród, który mógłby rywalizować z niektórymi głównymi narodami na całym świecie."
 MAPHI_integrate_start: "Begin forming [GetMAPHINameDef]"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "Indonezja jest kluczowym regionem bogatym w zasoby dla proponowanego państwa. Konieczne jest, abyśmy zintegrowali Indonezję ze względu na zasoby i populację, jaką może ona przynieść."
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "Filipiny są głównym węzłem morskim i handlowym na Pacyfiku. Integracja tego narodu da nam znacznie większą szansę na rozpoczęcie dominacji na Pacyfiku."
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "Singapur jest kluczowym węzłem komunikacyjnym dla nowego narodu. Jego pozycja głównego portu handlowego i centrum finansowego sprawia, że ​​ma ono kluczowe znaczenie dla powodzenia nowego narodu."
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "Malezja jest politycznie jednym z centralnych regionów kraju. Dzięki posiadaniu półwyspu mamy dostęp do szlaków lądowych w Azji."
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "Brunei jest państwem drugorzędnym w tym układzie. Kraj ten jest czymś, co koniecznie trzeba zintegrować, mimo że jest państwem drugorzędnym."
 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 is_MAPHI: "Has formed [GetMAPHINameDef]"
 form_INDOCHI_category: "Indochiny"
 form_INDOCHI_category_desc: "Indochiny to dawna federacja narodów Wietnamu, Kambodży i Laosu, która istniała do 1954 roku. Cała trójka razem tworzy jedną z największych gospodarek na świecie i zamieszkuje ogromną populację. To kraj gęstych dżungli, pagórków, gór i wspaniałego wybrzeża. Jego siła tkwi w ludziach i woli, która poprowadzi grupę w przyszłość."
 INDOCHI_integrate_start: "Begin forming [GetINDOCHINameDef]"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "Wietnam dysponuje ogromnymi zasobami naturalnymi w górach i wzdłuż wybrzeża. Integracja Wietnamu zacznie umacniać naszą władzę nad tym krajem."
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "Laos, podobnie jak Wietnam, posiada również ogromne zasoby naturalne."
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "Naturalna geografia i bogate ziemie Kambodży są ważne dla narodu. Integracja ich z narodem będzie także konsekwentnym ulepszaniem narodu."
 INDOCHI_update_flag: "Finish Forming [GetINDOCHINameDef]"
