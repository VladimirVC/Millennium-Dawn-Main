 FIN.conservatism: "£FIN_conservatism_small (KD) キリスト教民主党"
 FIN.conservatism_icon: "£FIN_conservatism_small"
 FIN.conservatism_desc: "キリスト教民主主義 - キリスト教民主党（フィンランド語：Suomen Kristillisdemokraatit スウェーデン語：Kristdemokraterna i Finland）\n\nキリスト教民主党は、伝統的なキリスト教的価値観、家族に寄り添った政策、そして起業家を支援する法律を提唱している。かつてはフィンランドの欧州連合加盟に反対していたが、90年代半ばの党指導部の交代後、連邦的な欧州連合には反対するものの、親EU・親NATOの立場となっている。"
 FIN.liberalism: "£FIN_liberalism_small (Kok.) 国民連合党"
 FIN.liberalism_icon: "£FIN_liberalism_small"
 FIN.liberalism_desc: "市場自由主義 - 国民連合党（フィンランド語：Kansallinen Kokoomus スウェーデン語：Samlingpartiet）\n\n国民連合党は、フィンランドの主要な中道右派政党である。党の核となる価値観は、自由主義（社会的・経済的の双方）と民主主義である。この党の起源は、フィンランド党と青年フィンランド党の君主制支持者にある。フィンランドの欧州連合加盟を声高に要求し始めた最初の政党の一つであり、党員の多くはNATOの強力な支持者でもある。"
 FIN.socialism: "£FIN_socialism_small (SDP) 社会民主党"
 FIN.socialism_icon: "£FIN_socialism_small"
 FIN.socialism_desc: "社会民主主義 - フィンランド社会民主党（フィンランド語：Suomen Sosialidemokraattinen Puolue スウェーデン語：Finlands Socialdemokratiska Parti）\n\n社会民主党はフィンランドで最も古い政党の一つで、1899年にフィンランド労働党として設立された。中道左派であり、労働者の権利、福祉国家、自由主義的な社会価値を提唱している。より右派の中央党や国民連合党と協力してきた長い歴史がある。"
 FIN.Communist-State: "£FIN_Communist_State_small (KTP) 共産主義労働者党"
 FIN.Communist-State_icon: "£FIN_Communist_State_small"
 FIN.Communist-State_desc: "マルクス・レーニン主義 - 共産主義労働者党 - 平和と社会主義のために（フィンランド語：Kommunisitinen Työväenpuolue スウェーデン語：Kommunistiska Arbetarparti）\n\n共産主義労働者党は、旧共産党の強硬派共産主義者で構成されるマルクス・レーニン主義の政党である。十月革命を祝うために定期的にサンクトペテルブルクへ旅行し、北朝鮮の主体思想や、フィリピンやコロンビアの共産主義反乱を支持している。"
 FIN.Conservative: "£FIN_Conservative_small (KP) 市民党"
 FIN.Conservative_icon: "£FIN_Conservative_small"
 FIN.Conservative_desc: "保守主義 - 市民党（フィンランド語：Kansalaispuolue スウェーデン語：Medborgarpartiet）\n\n市民党は、ベテラン政治家パーヴォ・ヴァイリネンによって設立された政党である。ヴァイリネンは長年中央党の党員であったが、その経験にもかかわらず党首の地位に就けなかったため、最終的に離党した。市民党はフィンランドをユーロから離脱させ、新たな変動相場制の国家通貨を創設することを望んでおり、地方分権政策も支持している。この党は主にヴァイリネンを中心に活動しており、彼はロシアやソビエト連邦の敵対的行動を一切非難しないことで何度も批判されている。"
 FIN.Neutral_conservatism: "£FIN_Neutral_conservatism_small (Kesk.) 中央党"
 FIN.Neutral_conservatism_icon: "£FIN_Neutral_conservatism_small"
 FIN.Neutral_conservatism_desc: "農本主義 - フィンランド中央党（フィンランド語：Suomen Keskusta スウェーデン語：Centern i Finland）\n\n中央党は、その政治のほとんどを、作家であり政治家であったサンテリ・アルキオにちなんで名付けられたアルキオ主義に基づいている。これは、資本主義と社会主義の両方への対抗として生まれたフィンランドの農本主義イデオロギーである。この党は、統治を地方分権化することにより、フィンランド全土が都市中心にならずに人口を維持する政策を望んでいる。1994年のEU国民投票の際には、多くの党員がEUからの離脱、あるいは少なくともユーロの導入を阻止したいと望んでいたため、党内で内部対立があった。"
 FIN.Neutral_Libertarian: "£FIN_Neutral_Libertarian_small (Lib.) 自由党"
 FIN.Neutral_Libertarian_icon: "£FIN_Neutral_Libertarian_small"
 FIN.Neutral_Libertarian_desc: "自由主義 - 自由党（フィンランド語：Liberaalit スウェーデン語：Liberaler）\n\n自由党は、個人の最大限の自由と最小限の政府介入を提唱する小さな政党である。"
 FIN.Neutral_green: "£FIN_Neutral_Green_small (Vihr.) 緑の同盟"
 FIN.Neutral_green_icon: "£FIN_Neutral_Green_small"
 FIN.Neutral_green_desc: "環境主義 - 緑の同盟（フィンランド語：Vihreä Liitto スウェーデン語：Grönä Förbundet）\n\n緑の同盟は、環境に焦点を当てた社会自由主義政党である。この党自体は、政治的軸において左でも右でもなく、最前線にいると述べており、社会主義と資本主義のどちらのシステムも環境問題を完全には考慮していないとして、両方を批判している。また、薬物の非犯罪化も提唱している。"
 FIN.Neutral_Communism: "£FIN_Neutral_Communism_small (SKP) 共産党"
 FIN.Neutral_Communism_icon: "£FIN_Neutral_Communism_small"
 FIN.Neutral_Communism_desc: "マルクス・レーニン主義 - フィンランド共産党（フィンランド語：Suomen Kommunistinen Puolue スウェーデン語：Finlands Kommunistika Parti）\n\n現在のフィンランド共産党は、旧党が左翼同盟に合流し、その残党が破産した後の1997年に設立された。この党はNATOとEUに反対している。マニフェストには、マルクス・レーニン主義をさらに洗練させて階級闘争の複雑な現実を完全に理解し研究する必要があると記載されているにもかかわらず、党はマルクス・レーニン主義ではないと主張している。また、働けない市民のための普遍的ベーシックインカムも提唱している。"
 FIN.Nat_Populism: "£FIN_Nat_Populism_small (PS) 真正フィン人党"
 FIN.Nat_Populism_icon: "£FIN_Nat_Populism_small"
 FIN.Nat_Populism_desc: "国家/キリスト教保守主義 - 真正フィン人党（フィンランド語：Perussuomalaiset スウェーデン語：Sannfinländarna）\n\n真正フィン人党は、「社会主義のない労働者党」と自称する保守的でユーロ懐疑的な政党である。ナショナリズム以外に明確なイデオロギーを持たず、地方と都市の両方から人気を集めている。この党は、フィンランド農村党の後継として1995年に設立されたばかりである。一部の反対者からは、人種差別的、さらにはファシスト的と分類されている。"
 FIN.Nat_Fascism: "£FIN_Nat_Fascism_small (IO) 愛国右派"
 FIN.Nat_Fascism_icon: "£FIN_Nat_Fascism_small"
 FIN.Nat_Fascism_desc: "国家社会主義 - 愛国右派（フィンランド語：Isänmaallinen Oikeisto スウェーデン語：Fösterländska Höger）\n\n愛国右派は、元々はアーリア・ゲルマン同胞団というネオナチ組織であった。活動をより正当に見せるために、改名と同時にナチスのシンボルを捨て、カレワラやフィンランド神話に基づくシンボルに切り替えた。この党は移民、市場資本主義、ユダヤ教、アメリカ合衆国に反対し、フィンランドのルーツとカレワラを強調する。この党はまた、国家社会主義者とも呼ばれている。"
 FIN.Monarchist: "£FIN_Monarchist_small (HoS) ヘッセン＝カッセル家"
 FIN.Monarchist_icon: "£FIN_Monarchist_small"
 FIN.Monarchist_desc: "君主主義 - ヘッセン＝カッセル家（フィンランド語：Hessen-Kasselin suku スウェーデン語：Huset Hessen-Kassel）\n\nヘッセン＝カッセル家は1918年にフィンランドの支配を継承する予定であったが、ドイツ革命とカイザーの打倒により頓挫した。フィンランドの仮定上の国王であるフリードリヒ・カールは、公式には戴冠しなかった。フィンランド議会が彼を国王として招聘することに賛成票を投じたものの、彼は公式な招待を確認する時間がなかった。"
 FRA.conservatism: "£FRA_conservatism (RPR) 共和国連合"
 FRA.conservatism_icon: "£FRA_conservatism"
 FRA.conservatism_desc: "保守主義 - 共和国連合（フランス語：Rassemblement  pour  la  République）は、新ド・ゴール主義で保守的な政党であり、強化され独立したフランス外交政策を提唱するとともに、経済の重要分野に対する強力な規制権限を持つ強固な国家体制を支持している。"
 FRA.conservatism_2002: "£FRA_conservatism (UMP) 国民運動連合"
 FRA.conservatism_2002_icon: "£FRA_conservatism"
 FRA.conservatism_2002_desc: "保守主義  - 国民運動連合（フランス語：Union pour un mouvement populaire）は、共和国連合と二つの小規模な自由主義・中道政党の合併により誕生した。UMPはフランス政治における中道右派の「包括政党」である。"
 FRA.conservatism_2017: "£FRA_conservatism_2017 (LR) 共和党"
 FRA.conservatism_2017_icon: "£FRA_conservatism_2017"
 FRA.conservatism_2017_desc: "保守主義  - 共和党（フランス語：Les Républicains）は「国民運動連合」の後継政党である。この名称変更は論争を巻き起こした。フランス革命の理念によれば、現行のフランス政治体制を支持する者はすべて共和主義者であるためだ。同党はフランス政治における中道右派の「包括政党」である。"
 FRA.liberalism: "£FRA_liberalism (UDF) フランス民主連合"
 FRA.liberalism_icon: "£FRA_liberalism"
 FRA.liberalism_desc: "自由主義 - フランス民主連合（フランス語：Union pour la Democratie Francaise）は、自由主義者、キリスト教民主主義者、急進派（伝統的なフランス自由主義者）で構成される中道政党である。一般的に、社会主義者、極右ポピュリスト、ド・ゴール主義保守派以外の全ての人のための政党と見なされている。欧州連邦主義を支持し、「ヨーロッパ合衆国」の創設を提唱している。"
 FRA.liberalism_2017: "£FRA_liberalism_2017 (EM) 前進！"
 FRA.liberalism_2017_icon: "£FRA_liberalism_2017"
 FRA.liberalism_2017_desc: "自由主義 - 共和国前進！（フランス語：La République En Marche!）は、エマニュエル・マクロンが2016年に創設したリベラル中道政党であり、概して進歩的な価値観を掲げる。フランスで最も親EU的な政党であり、経済問題と社会問題の両面でリベラルな立場を取る。"
 FRA.socialism: "£FRA_socialism (PS) 社会党"
 FRA.socialism_icon: "£FRA_socialism"
 FRA.socialism_desc: "社会民主主義 - 社会党（フランス語：Parti Socialiste）は70年代後半、当時より規模の大きかった共産党の影から脱却し、フランソワ・ミッテランの二期にわたる政権下で権力を掌握した。90年代のスキャンダルで弱体化したものの、フランス左派の有力勢力としての地位は維持している。自由市場に対する姿勢を次第に軟化させ、現在では多くの人々から中道左派と見なされている。"
 FRA.Communist-State: "£FRA_Communist_State (PCF) フランス共産党"
 FRA.Communist-State_icon: "£FRA_Communist_State"
 FRA.Communist-State_desc: "共産主義 - フランス共産党（フランス語：Parti Communiste Français）は、西欧の基準では前例のない選挙的成功を収め、第二次世界大戦以降政権を担ってきた全ての左派連合に参加してきた。支持基盤は、特にソビエト連邦崩壊以降やや縮小したものの、共産主義と民主的社会主義を掲げる有力な大衆政党としての地位を維持している。"
 FRA.anarchist_communism: "£FRA_left_wing_radical (LO) 労働者の闘争"
 FRA.anarchist_communism_icon: "£FRA_left_wing_radical"
 FRA.anarchist_communism_desc: "左翼急進派 - 共産主義者同盟「労働者闘争」（Union Communiste 'Lutte Ouvrière'）はトロツキスト系共産党である。反資本主義、フェミニスト、反体制的である。また極めて秘密主義的でもあり、指導者の大半は「偽名」を使用している。党員に対しては、革命に人生を捧げ、国家による弾圧を受けた場合に地下活動に移行できるよう、子を持たないことを強く推奨している。"
 FRA.anarchist_communism_2017: "£FRA_left_wing_radical_2017 (NPA) 反資本主義新党"
 FRA.anarchist_communism_2017_icon: "£FRA_left_wing_radical_2017"
 FRA.anarchist_communism_2017_desc: "左翼急進派 - 反資本主義新党（フランス語：Nouveau Parti Anticapitaliste）は、2009年に複数の極左・トロツキスト・革命的マルクス主義政党が合併して結成された。フランス共産党の左に位置づけつつも、共同選挙リストの運営では協力関係にある。"
 FRA.Neutral_conservatism: "£FRA_Neutral_conservatism (RPF) フランスのための集会"
 FRA.Neutral_conservatism_icon: "£FRA_Neutral_conservatism"
 FRA.Neutral_conservatism_desc: "保守主義  - フランスのための集会（フランス語：Rassemblement Pour la France）は、欧州懐疑主義的かつド・ゴール主義的な保守政党である。"
 FRA.Neutral_conservatism_2017: "£FRA_Neutral_conservatism_2017 (DLF) 立ち上がれフランス"
 FRA.Neutral_conservatism_2017_icon: "£FRA_Neutral_conservatism_2017"
 FRA.Neutral_conservatism_2017_desc: "保守主義 - 立ち上がれフランス（フランス語：Debout la France）は、欧州懐疑主義的かつド・ゴール主義の保守政党であり、主に解散した「フランスのための集会」の役割を引き継いでいる。"
 FRA.neutral_Social: "£FRA_neutral_Social (LFI) 不服従のフランス"
 FRA.neutral_Social_icon: "£FRA_neutral_Social"
 FRA.neutral_Social_desc: "民主社会主義- 不服従のフランス（フランス語：La France Insoumise）は、現行の共和国を大統領権限が過剰な「大統領君主制」と見なすため、新たなフランス第六共和政の樹立を目指す民主社会主義政党である。さらに、労働者の権利強化と、フランスが100％カーボンニュートラルを達成するための取り組みを推進している。"
 FRA.Neutral_Communism: "£FRA_Neutral_Communism (FA) アナキスト連盟"
 FRA.Neutral_Communism_icon: "£FRA_Neutral_Communism"
 FRA.Neutral_Communism_desc: "リバタリアン共産主義 - アナキスト連盟（フランス語：Fédération Anarchiste）は1945年に設立され、フランス全土に100以上の無政府主義団体を擁する。"
 FRA.Neutral_Muslim_Brotherhood: "£FRA_Neutral_Muslim_Brotherhood (PMF) フランス・ムスリム党"
 FRA.Neutral_Muslim_Brotherhood_icon: "£FRA_Neutral_Muslim_Brotherhood"
 FRA.Neutral_Muslim_Brotherhood_desc: ""
 FRA.Neutral_green: "£FRA_Neutral_green (LV) 緑の党"
 FRA.Neutral_green_icon: "£FRA_Neutral_green"
 FRA.Neutral_green_desc: "緑の政治 - 緑の党（フランス語：Les Verts）は1970年代の環境保護運動にその起源を持ち、以来フランス政治において確固たる地位を築いてきた。環境問題以外の政策では、中道派と左派の二つの翼に分かれる傾向がある。"
 FRA.Neutral_green_2017: "£FRA_Neutral_green (EELV) ヨーロッパ・エコロジー＝緑の党"
 FRA.Neutral_green_2017_icon: "£FRA_Neutral_green"
 FRA.Neutral_green_2017_desc: "緑の政治 - ヨーロッパ・エコロジー＝緑の党（フランス語：Europe Écologie Les Verts）は、緑の党と、欧州の環境保護運動を拡大するために創設された新たな政党「ヨーロッパ・エコロジー」が合併して結成された。二酸化炭素排出量への高税率導入と、富裕層への累進課税を通じて、非原子力グリーンエネルギー推進へのさらなる資金調達を追求している。"
 FRA.Nat_Autocracy: "£FRA_Nat_Autocracy フランス軍"
 FRA.Nat_Autocracy_icon: "£FRA_Nat_Autocracy"
 FRA.Nat_Autocracy_desc: ""
 FRA.Nat_Populism: "£front_national  (FN) 国民戦線"
 FRA.Nat_Populism_icon: "£front_national"
 FRA.Nat_Populism_desc: "右派ポピュリズム - 国民戦線（フランス語：Front National）はフランスの民族主義政治における主要勢力である。同党は欧州連合、NATO、移民に反対し、海外からの競争に対するより強力な経済保護主義、高い軍事支出と犯罪へのゼロトレランスを掲げる強固な国家を追求する。国際的にはロシアを明確な同盟国と見なしている。"
 FRA.Monarchist: "£FRA_Monarchist ブルボン家"
 FRA.Monarchist_icon: "£FRA_Monarchist"
 FRA.Monarchist_desc: "君主主義 - ブルボン家は、スペイン、ナポリ、シチリア、パルマ、フランス、ナバラにおいて王位を保持してきた。現在、ブルボン家はスペイン、ルクセンブルク、フランスの王位を保持している。また、最も長く続いている貴族家のひとつでもある。"
 FRA.Monarchist2: "£FRA_Monarchist2 ボナパルト家"
 FRA.Monarchist2_icon: "£FRA_Monarchist2"
 FRA.Monarchist2_desc: "君主主義 - 自称「フランス帝室」は、偉大なる皇帝ナポレオン・ボナパルトを起源とする王朝である。"
 GER.conservatism: "£GER_western_conservative (CDU/CSU) キリスト教民主同盟"
 GER.conservatism_icon: "£GER_western_conservative"
 GER.conservatism_desc: "保守主義 - キリスト教民主同盟（ドイツ語：Christlich-Demokratische Union）とバイエルンの姉妹政党キリスト教社会同盟（Christlich-Soziale Union）は政治同盟として緊密に協力しておりドイツ政治における中道右派の主要な「包括政党」政党である。"
 GER.liberalism: "£GER_non_aligned_libertarian (LKR) 自由保守改革党"
 GER.liberalism_icon: "£GER_non_aligned_libertarian"
 GER.liberalism_desc: "リバタリアン・自由保守改革党（ドイツ語：Liberal-Konservative Reformer）は、欧州中央銀行の低金利・ゼロ金利・マイナス金利政策を批判する。また、大西洋横断安全保障構造の基盤として、NATOおよびEUとの西側連携を強調する。LKRは自由貿易を原則として支持し、一定の条件下では大西洋横断貿易投資パートナーシップ(TTIP)にも賛成し、カナダモデルに基づく適格な移民の受け入れを支持し、不法移民には反対する。最低賃金制度を拒否する一方、全ての市民に対するいわゆる「活性化最低所得」を提唱する。同党は自らを道徳的には保守的、経済的には自由主義的、技術進歩の擁護者と位置づけ、あらゆる形態の過激主義を完全に否定する。欧州連合とユーロ圏の抜本的改革を求め、加盟国への政治的干渉を減らし「中核的機能」に回帰すべきだと主張し、移民割当制度の廃止とユーロ圏加盟国への救済措置の終結を訴えている。"
 GER.socialism: "£GER_western_social_democrat (SPD) ドイツ社会民主党"
 GER.socialism_icon: "£GER_western_social_democrat"
 GER.socialism_desc: "社会民主主義 - ドイツ社会民主党（ドイツ語：Sozialdemokratische Partei Deutschlands）は、1863年に設立された世界初の社会主義政党の一つで、連邦議会を代表する現存政党としては群を抜いて古い。今日では社会的市場経済とEUとNATOの国際主義を包含しているが、福祉国家の大きさについては内部の意見が分かれている。党の主要な支持基盤は、ドイツ北部と西部の大都市、特にルール地区の工業地帯である。"
 GER.Communist-State: "£GER_emerging_communism (DKP) ドイツ共産党"
 GER.Communist-State_icon: "£GER_emerging_communism"
 GER.Communist-State_desc: "共産主義 - ドイツ共産党（ドイツ語：Deutsche Kommunistische Partei）は、マルクス・レーニン主義の共産党であり、冷戦期の東ドイツの支援により西ドイツ内で結成された。ドイツ統一後、党の人気は着実に低下している。"
 GER.anarchist_communism: "£GER_non_aligned_socialist_democrat_alt (PDS) 民主社会党"
 GER.anarchist_communism_icon: "£GER_non_aligned_socialist_democrat_alt"
 GER.anarchist_communism_desc: "左派社会主義 - 民主社会党（ドイツ語：Partei Democratischer Sozialismus）はベルリンの壁の崩壊後に、かつての東ドイツの政権与党であるドイツ社会主義統一党（SED）から誕生した。民主社会主義政党として生まれ変わった民主社会党は、東ドイツにおけるその影響力を維持しつつ、より広範な支持を得るために印象を軟化させることを目標としている。民主社会党は富の再分配、より強固な福祉制度、そして新自由主義的な経済政策への反対を唱え、再統一の際に経済的困難に直面した人々へと訴えかけた。また、民主社会党はNATOを批判する立場であることを明確にしており、ロシアを含む欧州の安保構造と軍縮を支持する。民主社会党はかつての東ドイツ地域では主だって強力だが、西ドイツではそれと同等の支持を得ることに苦労している。"
 GER.Caliphate: "£generic_Caliphate_small (EZP) 楽園への招待"
 GER.Caliphate_icon: "£generic_Caliphate_small"
 GER.Caliphate_desc: "サラフィー・ジハード主義 - 楽園への招待（ドイツ語：Einladung zum Paradies）は、ブランズウィック市の民間サラフィスト組織で、ムハメド・シフチによって設立された。おそらくドイツで最も高名な二名のサラフィスト説教者、ピエール・フォーゲルとスヴェン・ラウによって擁護されている。"
 GER.Neutral_conservatism: "£GER_non_aligned_conservative (FW) 自由な有権者"
 GER.Neutral_conservatism_icon: "£GER_non_aligned_conservative"
 GER.Neutral_conservatism_desc: "保守派 - 自由な有権者（ドイツ語：Freie Wähler）は、厳密には政党ではなく、選挙に参加する団体として結成されている。彼らは特にドイツ南部の保守的な地方都市で活発に活動している。彼らは、政治や意思決定ができる限り地方レベルで行われることを望んでいる。"
 GER.Neutral_Libertarian: "£GER_western_liberal (FDP) 自由民主党"
 GER.Neutral_Libertarian_icon: "£GER_western_liberal"
 GER.Neutral_Libertarian_desc: "自由主義 - 自由民主党（ドイツ語：Freie Demokratische Partei）はドイツの中道右派・リベラル政党であり、市民の自由権や人権、国際協調主義を推進している。自由民主党は経済的自由主義を強く推し進め、自由市場と民営化の促進に密接に携わってきた。"
 GER.Neutral_Communism: "£GER_non_aligned_communism (MLPD) ドイツ・マルクス・レーニン主義党"
 GER.Neutral_Communism_icon: "£GER_non_aligned_communism"
 GER.Neutral_Communism_desc: "共産主義 - ドイツ・マルクス・レーニン主義党（ドイツ語：Marxistisch–Leninistische Partei Deutschlands）は、現在の資本主義政府を打倒し、新たな社会主義社会秩序に置き換えるプロレタリアート独裁の確立を主張している。彼らはスターリンと毛沢東を模倣すべきインスピレーションを与える人物だとみなしている。"
 GER.Neutral_Muslim_Brotherhood: "£GER_non_aligned_moderate_islamist (ADD) ドイツ民主同盟"
 GER.Neutral_Muslim_Brotherhood_icon: "£GER_non_aligned_moderate_islamist"
 GER.Neutral_Muslim_Brotherhood_desc: "穏健派イスラム主義 - ドイツ民主同盟（ドイツ語：Allianz Deutscher Demokraten）は、ドイツの少数派トルコ人の政党である。この団体は、ドイツ議会がアルメニア人虐殺を認める決定を下し、トルコの保守派や国家主義者に失望を招いたことを受けて、2016年にレムジ・アル氏によって設立された。そもそもドイツでは少数派トルコ人の約半数しか選挙権を持っていないため、同党は有権者層が限られていることに苦しんでいる。アルメニア人虐殺の認識の撤回や、ドイツのトルコ人やイスラム教徒の少数派を代表する政策以外には、確立された政治計画を持っていない。"
 GER.Neutral_green: "£GER_non_aligned_greens (GRÜNE) 同盟90/緑の党"
 GER.Neutral_green_icon: "£GER_non_aligned_greens"
 GER.Neutral_green_desc: "緑の政治 - 同盟90/緑の党（ドイツ語：Bündnis 90/Die Grünen）は、非共産主義である東ドイツの同盟90と西ドイツの緑の党が合併して結成された。その政党は環境主義と持続可能性を推進している。同党は、環境政党の国際基準による世論調査で非常に成功しており、政策に大きな影響力を持つ政権連合の一部として長期間を費やしてきた。彼らは世界中の環境保護活動家たちに大きなインスピレーションの源と見られている。"
 GER.neutral_Social: ""
 GER.neutral_Social_desc: ""
 GER.Nat_Autocracy: "£GER_nationalist_military_junta_alt (DVU) ドイツ人民同盟"
 GER.Nat_Autocracy_icon: "£GER_nationalist_military_junta_alt"
 GER.Nat_Autocracy_desc: "極右民族主義 - ドイツ人民同盟（ドイツ語：Deutsche Volksunion）は断固とした反移民への姿勢と欧州統合への反対で知られる極右民族主義政党である。ゲルハルト・フライによって1987年に結成された同党は、自らを「ドイツの独自性」の擁護者と位置づけ、民族主義者や保守主義者の有権者に訴えかけるために大衆主義的な言説を頻繁に用いていた。ドイツ人民同盟は移民の制限や多文化主義への反対、ドイツの政治体制への批判といった問題に焦点を当て、しばしば扇動的、外国人嫌悪のような意を含ませていた。特に東ドイツのような経済的に貧しい地域では地域的成功を収めたものの、党の影響力は時間が経つにつれ衰退していった。"
 GER.Nat_Fascism: "£GER_nationalist_fascism (NPD) ドイツ国家民主党"
 GER.Nat_Fascism_icon: "£GER_nationalist_fascism"
 GER.Nat_Fascism_desc: "ファシズム - 国家民主党（ドイツ語：Nationaldemokratische Partei Deutschlands）はネオナチのレッテルを貼られている極右超国家主義政党である。党には国家情報機関が深く浸透しているが、党を禁止する試みは失敗に終わっている。彼らは反ユダヤ主義であり、移民に対する憎悪を助長している。"
 GER.Nat_Populism: "£GER_nationalist_right_wing_populist_b  (REP) 共和党"
 GER.Nat_Populism_icon: "£GER_nationalist_right_wing_populist_b"
 GER.Nat_Populism_desc: "右派ポピュリズム - 共和党（ドイツ語：Die Republikaner）は移民に反対する欧州懐疑派の右翼ポピュリスト政党であり、抗議活動を主導している。共和党は、元CSU党員であるフランツ・ハンドロス氏によって設立されたCDU/SCUが十分に保守的でないと非難している。"
 GER.Monarchist: "£GER_nationalist_monarchist ホーエンツォレルン家"
 GER.Monarchist_icon: "£GER_nationalist_monarchist"
 GER.Monarchist_desc: "ホーエンツォレルン家は、旧ドイツ帝国とプロイセンのドイツ王朝である。皇帝ヴィルヘルム2世の退位に伴い1918年に解散されたが、その財団は現在まで活動している。"
 ICE.conservatism: "£ICE_western_conservative 独立党"
 ICE.conservatism_icon: "£ICE_western_conservative"
 ICE.conservatism_desc: "自由保守主義 - 独立党（アイスランド語：Sjálfstæðisflokkurinn）は、アイスランド近代史の大半において最大政党であった。同党は「包括政党」であり、アイスランドにおける中道右派思想の大半を包含している。経済的には自由主義的であり、富裕層や漁師層に忠実な支持基盤を保持している。NATO支持を表明する一方、EU加盟には反対している。"
 ICE.liberalism: "£ICE_western_liberal 自由党"
 ICE.liberalism_icon: "£ICE_western_liberal"
 ICE.liberalism_desc: "新自由主義 - 自由党（アイスランド語：Frjálslyndi  Flokkurinn）は、1998年に独立党から漁獲割当の中央集権化反対派が離脱して結成された。同党は自由市場を支持し、補助金や独占に反対している。"
 ICE.liberalism_2012: "£ICE_western_liberal_2012 明るい未来"
 ICE.liberalism_2012_icon: "£ICE_western_liberal_2012"
 ICE.liberalism_2012_desc: "社会自由主義 - 明るい未来（アイスランド語：Björt Framtíð）は、レイキャビクの政治的センセーション「ベスト党」に相当する全国政党として結成された。ベスト党は「レイキャビクにディズニーランドを建設する。」「動物園にホッキョクグマを導入する。」と公約し市長選を制したパロディ政党である。全国レベルでは自由主義的な政策を掲げ、EU加盟とユーロ導入を推進している。"
 ICE.liberalism_2016: "£ICE_western_liberal_2016 改革党"
 ICE.liberalism_2016_icon: "£ICE_western_liberal_2016"
 ICE.liberalism_2016_desc: "自由環境主義 - 改革党（アイスランド語：Viðreisn）は、独立党の欧州懐疑主義と国際貿易自由化への不十分な対応に不満を抱いた政治家たちが独立党から分離して結成した政党である。"
 ICE.socialism: "£ICE_western_social_democrat 社会民主同盟"
 ICE.socialism_icon: "£ICE_western_social_democrat"
 ICE.socialism_desc: "北欧モデル - 社会民主同盟（アイスランド語：Samfylkingin Jafnaðarmannaflokkur Íslands）は、保守的な独立党がアイスランド政治を支配する状況に挑むため、四つの左派政党が合併して設立された。中道左派政党として、その主な目的は福祉国家の支援である。"
 ICE.Communist-State: "£ICE_emerging_communism アイスランド人民戦線"
 ICE.Communist-State_icon: "£ICE_emerging_communism"
 ICE.Communist-State_desc: "環境社会主義 - アイスランド人民戦線（アイスランド語：Alþýðufylkingin）は「市場資本主義の隷属から人民を解放する」ことを目指し、NATOとEUを帝国主義組織と見なして無条件に反対している。"
 ICE.oligarchism: "£ICE_non_aligned_oligarchism 進歩党"
 ICE.oligarchism_icon: "£ICE_non_aligned_oligarchism"
 ICE.oligarchism_desc: "北欧農本主義 - 進歩党（アイスランド語：Framsóknarflokkurinn）は中道右派の農業政党である。伝統的にアイスランド第二の政党であり、政治スペクトルの左右両陣営の連立政権に長く参加してきた。欧州懐疑主義を掲げ、保護主義の強化を支持し、農業部門への多額の補助金支給を信条としている。"
 ICE.Neutral_Libertarian: "£ICE_non_aligned_libertarian 海賊党"
 ICE.Neutral_Libertarian_icon: "£ICE_non_aligned_libertarian"
 ICE.Neutral_Libertarian_desc: "海賊政治 - 海賊党（アイスランド語：Píratar）は、世界で最も成功した海賊党と言える存在であり、議会で定期的に多数の議席を獲得している。彼らは直接的で透明性のある民主主義、プライバシー、市民的自由、著作権法改革を信奉する。その影響力を活用し、アイスランドを世界で最も自由な社会とするべく尽力してきた。"
 ICE.neutral_Social: "£ICE_non_aligned_socialist_democrat 左翼環境運動"
 ICE.neutral_Social_icon: "£ICE_non_aligned_socialist_democrat"
 ICE.neutral_Social_desc: "環境社会主義 - 左派環境運動（アイスランド語：Vinstrihreyfingin - Grænt Framboð）は、社会民主同盟が中道主義へ傾いたことに左派政党の多くの党員が不満を抱いたことから結成された。伝統的な社会民主主義政策に加え、フェミニズムと環境保護を推進し、NATOとEUに反対している。"
 ICE.Nat_Fascism: "£ICE_nationalist_fascism アイスランド国民戦線"
 ICE.Nat_Fascism_icon: "£ICE_nationalist_fascism"
 ICE.Nat_Fascism_desc: "超国粋主義 - アイスランド国民戦線（アイスランド語：Íslenska þjóðfylkingin）はアイスランド文化を守り、あらゆる移民を阻止することを目的としている。特にイスラム教に反対している。"
 ICE.Nat_Populism: "£ICE_nationalist_right_wing_populist 右派緑の人民党"
 ICE.Nat_Populism_icon: "£ICE_nationalist_right_wing_populist"
 ICE.Nat_Populism_desc: "環境保守主義 - 右派緑の人民党（アイスランド語：Hægri Grænir Flokkur Fólksins）は主にアメリカのリバタリアニズムに影響を受け、アイスランドがあらゆる国際機関から断固として独立することを望んでいる。規制緩和された強力な経済を志向する一方、自然保護も支持する。右派緑の人民党の名称は、政敵である左翼環境運動を揶揄した駄洒落である。"
 ICE.Nat_Populism_2016: "£ICE_nationalist_right_wing_populist_2016 人民党"
 ICE.Nat_Populism_2016_icon: "£ICE_nationalist_right_wing_populist_2016"
 ICE.Nat_Populism_2016_desc: "習合ポピュリズム - 人民党（アイスランド語：Flokkur Fólksins）は、移民政策と欧州連合との協力に反対するポピュリスト政党であり、その他には貧困と腐敗の撲滅を目指す。経済的には左寄りが強いが、社会問題ではより右に傾いている。"
 IRQ.liberalism: "£IRQ_liberalism_small (INA) イラク国民合意"
 IRQ.liberalism_icon: "£IRQ_liberalism_small"
 IRQ.liberalism_desc: "自由主義 - イラク国民合意（アラビア語ローマ字表記：Al-Wifaq Al-Watani Al-'Iraqi）\n\nイラク国民和解は、サダム・フセインに対する主要な非テヘラン拠点の反体制組織として1991年にロンドンで設立された。その主な資金源は歴史的にサウジアラビア、イギリス、アメリカから提供されてきた。1996年にはCIAの支援を得てサダムに対するクーデターを試みたが失敗に終わった。"
 IRQ.liberalism_2017: "£IRQ_liberalism_2017_small (INM) イラク国民運動"
 IRQ.liberalism_2017_icon: "£IRQ_liberalism_2017_small"
 IRQ.liberalism_2017_desc: "自由主義 - イラク国民運動（アラビア語ローマ字表記：Al-Ḥaraka Al-Waṭaniya Al-Iraqiyya）は、世俗主義と非宗派主義を基盤に結成された連合であり、一部イラク民族主義も混在していた。アル・ワタニヤを含むイラク最大の世俗政党の一部で構成されている。"
 IRQ.Conservative: "£IRQ_Conservative_small (IDP) イスラム・ダアワ党"
 IRQ.Conservative_icon: "£IRQ_Conservative_small"
 IRQ.Conservative_desc: "イスラム主義 - イスラム・ダアワ党（アラビア語ローマ字表記：Hizb ad-Da'wa al-Islāmiyya）\n\nイスラム・ダアワ党は、故イラク聖職者アル＝サドルに感化されたシーア派の宗教政党である。次第にイランの影響下に置かれ、サダム・フセインに対する複数の暗殺計画に関与した。ISCIとの主な相違点は、政治権力はイスラム学者だけに集中させるべきではなく、より広範なウンマに属すべきだと主張している点である。"
 IRQ.Vilayat_e_Faqih: "£IRQ_Vilayat_e_Faqih_small (BB) バドル旅団"
 IRQ.Vilayat_e_Faqih_icon: "£IRQ_Vilayat_e_Faqih_small"
 IRQ.Vilayat_e_Faqih_desc: "シーア派軍国主義 - バドル旅団（アラビア語ローマ字表記：Munazzama Badr）\n\nバドル組織はISCIの軍事部門として発足したが、その後ヒズボラに倣った独立した政治組織へと発展した。その政治活動と軍事作戦は、主にイラン革命防衛隊によって統制されている。"
 IRQ.Mod_Vilayat_e_Faqih: "£IRQ_Mod_Vilayat_e_Faqih_small (ISCI) イラク・イスラム最高評議会"
 IRQ.Mod_Vilayat_e_Faqih_icon: "£IRQ_Mod_Vilayat_e_Faqih_small"
 IRQ.Mod_Vilayat_e_Faqih_desc: "シーア派革命主義 - イラク・イスラム最高評議会（アラビア語ローマ字表記：Al-Majlis Al-A'ala Al-Islami Al-'Iraqi）\n\nイラク・イスラム最高評議会は、1982年にイランで「イラク・イスラム革命最高評議会」として設立された。政府内で他政党との協働には前向きだが、その長期的目標はイランと同様にイスラム学者による統治を特徴とするイスラム共和国の樹立にある。"
 IRQ.Caliphate: "£generic_Caliphate_small (ISI) イラク・イスラム国"
 IRQ.Caliphate_desc: "サラフィー・ジハード主義 - イラク・イスラム国（アラビア語ローマ字表記：Jama'at al-Tawhid wal-Jihad）\n\n「イラクのアルカイダ」とも呼ばれるイラク・イスラム国は、1999年にヨルダン人テロリスト、アブー・ムスアブ・アッ＝ザルカーウィーによって「ジャマーアト・アル＝タウヒード・ワル＝ジハード」の旗印の下で結成された。アルカイダの中でも最も残虐な支部と広く見なされており、シーア派ムスリムや民族宗教的少数派を殺害することで混乱を生み出す戦略を主導してきた。"
 IRQ.Neutral_conservatism_2017: "£IRQ_Neutral_conservatism_small 勝利連合"
 IRQ.Neutral_conservatism_2017_icon: "£IRQ_Neutral_conservatism_small"
 IRQ.Neutral_conservatism_2017_desc: "保守主義 - 勝利同盟（アラビア語ローマ字表記：Iʾtilāf al-naṣr）は、イスラム・ダアワ党の指導権争いに敗れた元首相ハイダル・アル＝アバーディが、自身の政治基盤として設立した。比較的穏健で現実的なシーア派イスラム主義政党であるが、首相在任時の宗派主義的遺風を残している。"
 IRQ.Neutral_Communism: "£IRQ_Neutral_Communism_small  (ICP) イラク共産党"
 IRQ.Neutral_Communism_icon: "£IRQ_Neutral_Communism_small"
 IRQ.Neutral_Communism_desc: "古典的マルクス主義 - イラク共産党（アラビア語ローマ字表記：Al-hizb aš-šiyū'ī al-'irāqī）\n\nイラク共産党は長年、イラクの左翼政治を支配してきた。ソビエト連邦が仲介したバアス党との不安定な同盟関係は1979年に崩壊し、それ以来武装闘争を主張している。同党は世俗主義かつ社会主義を掲げる。"
 IRQ.Neutral_Muslim_Brotherhood: "£IRQ_islamic_party  (ISP) イラク・イスラム党"
 IRQ.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - イラク・イスラム党（アラビア語ローマ字表記：Hizb al-Islami al-Iraqi）\n\nイラク・イスラム党は、イラクにおけるムスリム同胞団の公式支部であり、イラクのスンナ派少数派を代表する主要な政治組織の一つとして機能している。"
 IRQ.Neutral_Muslim_Brotherhood_2017: "£IRQ_Neutral_Muslim_Brotherhood_small 改革統一連合"
 IRQ.Neutral_Muslim_Brotherhood_2017_icon: "£IRQ_Neutral_Muslim_Brotherhood_small"
 IRQ.Neutral_Muslim_Brotherhood_2017_desc: "穏健イスラム主義 - 改革統一連合（アラビア語ローマ字表記：I'tilāf Muttaḥidhun lil-Iṣlāḥ）はイラクにおける主要なスンニ派政治連合であり、汎イスラム主義組織ムスリム同胞団の思想に支配されている。イラクのスンニ派地域の自治権強化を主張している。"
 IRQ.Nat_Autocracy: "£IRQ_armed_forces (AFQ) イラク軍"
 IRQ.Nat_Autocracy_icon: "£IRQ_Nat_Autocracy_small"
 IRQ.Nat_Autocracy_desc: "軍事政権 - イラク軍（アラビア語ローマ字表記：Riasat Arkan Aljaysh Aleiraqiu）\n\nイラク軍は1930年代初頭に編成され、ハシミテ朝打倒を含むクーデターなど様々な政治活動に関与してきた。"
 IRQ.Nat_Populism: "£IRQ_sardist (SIP) サドル派統合党"
 IRQ.Nat_Populism_desc: "イラク民族主義 - サドル派統合党（アラビア語ローマ字表記：Al-Tayyār al-Sadrī）\n\nサドル潮流は、大衆主義と民族主義的価値観を掲げるシーア派政治運動である。イランの支援を受けるサドル派民兵組織を抱えつつも、いかなる外国勢力による支配からも自由を求める。"
 IRQ.Monarchist: "£IRQ_monarch (HoH) ハーシム家"
 IRQ.Monarchist_desc: "絶対君主制 - ハーシム家（アラビア語ローマ字表記：Al-Hāshimiyyūn）\n\nイラクのハーシム家は1921年から1958年まで統治し、軍部によって打倒された。現在、家系の長はラアド・ビン・ザイドが称号を保持している。"
 KOR.conservatism: "£kor_western_conservative (GNP) ハンナラ党"
 KOR.conservatism_icon: "£kor_western_conservative"
 KOR.conservatism_desc: "愛国的保守主義 - ハンナラ党（韓国語ローマ字表記：Hannaradang）\n\nハンナラ党は韓国を代表する保守政党である。同党は朴正煕の権威主義的な民主共和党にその系譜を遡るが、民主化移行後に自らを再構築した。それにもかかわらず、同党は独裁政権下で持っていた価値観の多くを保持しており、例えば財閥が国内経済で果たす主導的役割への支持、左派政治への疑念、そしてアメリカへの強い支持と密接に結びついた北朝鮮への敵対姿勢などが挙げられる。"
 KOR.conservatism_2017: "£kor_western_conservative (LKP) 自由韓国党"
 KOR.conservatism_2017_desc: "愛国的保守主義 - 自由韓国党（韓国語ローマ字表記：Jayuhangukdang）\n\n自由韓国党は韓国を代表する保守政党である。同党は朴正煕の権威主義的な民主共和党にその系譜を遡るが、民主化移行後に自らを再構築した。それにもかかわらず、同党は独裁政権下で持っていた価値観の多くを保持しており、例えば財閥が国内経済で果たす主導的役割への支持、左派政治への疑念、そしてアメリカへの強い支持と密接に結びついた北朝鮮への敵対姿勢などが挙げられる。"
 KOR.liberalism: "£kor_western_liberal (PP) 国民の党"
 KOR.liberalism_icon: "£kor_western_liberal"
 KOR.liberalism_desc: "中道主義 - 国民の党（韓国語ローマ字表記：Gungminuidang）\n\n国民の党は、主要右派・左派政党による二大政党支配を打破することを掲げる実業家、安哲秀と密接に関連する新興政党である。徹底した中道主義を掲げ、韓国政治における右派と左派の両方の要素を取り入れている。外交政策の展望は保守派と共有するが、経済政策においては左派的なアプローチを採用している。"
 KOR.socialism: "£kor_western_social_democrat (MDP) 新千年民主党"
 KOR.socialism_icon: "£kor_western_social_democrat"
 KOR.socialism_desc: "韓国自由主義 - 新千年民主党（韓国語ローマ字表記：Saecheonnyeonminjudang）\n\n韓国の保守派がその系譜を同国の権威主義体制にまで遡るのに対し、左派自由主義の新千年民主党（通称：民主党）は、独裁政権に反対し韓国に民主主義を確立するために活動した人物たちで構成されている。同党は反体制的かつ活動的で、労働組合を重視し財閥の影響力を制限する左派的な経済政策を掲げる。統一実現に固執する同党は、北朝鮮との対話・接触を重視し、同盟国であるアメリカとの関係には慎重な姿勢を示している。"
 KOR.Communist-State: "£kor_emerging_communism (NDFSK) 韓国民族民主戦線"
 KOR.Communist-State_icon: "£kor_emerging_communism"
 KOR.Communist-State_desc: ""
 KOR.anarchist_communism: "£kor_emerging_left_wing_radical (DLP) 民主労働党"
 KOR.anarchist_communism_icon: "£kor_emerging_left_wing_radical"
 KOR.anarchist_communism_desc: "民主社会主義 - 民主労働党（韓国語ローマ字表記：Minjunodongtang）\n\n民主労働党は、韓国労働組合総連盟の政治部門として設立された、進歩主義的かつ民族主義的な政党である。同党は労働権の強化、反帝国主義、朝鮮半島統一を支持している。"
 KOR.Neutral_conservatism: "£kor_non_aligned_conservative (ULD) 自由民主連合"
 KOR.Neutral_conservatism_icon: "£kor_non_aligned_conservative"
 KOR.Neutral_conservatism_desc: ""
 KOR.neutral_Social: "£kor_non_aligned_social_democrat (JP) 正義党"
 KOR.neutral_Social_icon: "£kor_non_aligned_social_democrat"
 KOR.neutral_Social_desc: "社会民主主義 - 正義党（韓国語ローマ字表記：Jeonguidang）\n\n正義党は韓国最大の進歩政党である。民主党と多くの左派的立場を共有しつつも、変革的な社会経済政策においてより踏み込んだ主張を展開する。再分配的課税や福祉国家の実現を訴えるほか、女性・移民・障害者の権利を支持する。特筆すべきは、依然として社会的に保守的なこの国において、LGBTの権利を支持する唯一の主要政党である点だ。中国やアメリカの覇権、日本の再軍備には警戒感を示すが、民主党とは異なり、人権が北朝鮮との統一という大義に服従すべきではないと主張している。"
 KOR.Neutral_green: "£kor_non_aligned_greens (GPK) 緑色党"
 KOR.Neutral_green_icon: "£kor_non_aligned_greens"
 KOR.Neutral_green_desc: ""
 KOR.Nat_Autocracy: "£kor_nationalist_military_junta (ROKA) 大韓民国陸軍"
 KOR.Nat_Autocracy_icon: "£kor_nationalist_military_junta"
 KOR.Nat_Autocracy_desc: ""
 KOR.Nat_Populism: "£kor_nationalist_right_wing_populist (CLUP) キリスト教自由統一党"
 KOR.Nat_Populism_icon: "£kor_nationalist_right_wing_populist"
 KOR.Nat_Populism_desc: "キリスト教民族主義 - キリスト教自由党（韓国語ローマ字表記：Gidokjayutongildang）\n\nキリスト教自由党は、韓国が同性愛とイスラム教の脅威にさらされていると信じる極右キリスト教政党である。"
 KOR.Monarchist: "£kor_nationalist_monarchist 李家"
 KOR.Monarchist_icon: "£kor_nationalist_monarchist"
 KOR.Monarchist_desc: ""
 KUR.conservatism: "£KUR_conservatism_small (KDP) クルディスタン民主党"
 KUR.conservatism_icon: "£KUR_conservatism_small"
 KUR.conservatism_desc: "保守主義 - クルディスタン民主党（クルド語ローマ字表記：Partiya Demokrat a Kurdistanê）は、バルザーニー家が支配する保守的なクルド民族主義政党である。クルド人ペシュメルガの大部分を掌握し、イラク・クルディスタンの軍事・政治において支配的な勢力となっている。歴史的にイランが主要な支援国であったが、その後支援基盤を拡大し、現在ではアメリカ、トルコ、イスラエルからも多大な支援を受けている。イラク・クルド内戦終結後、同党はイラク・クルディスタン地域北部の大部分を支配下に置いた。"
 KUR.liberalism: "£KUR_liberalism_small ゴラン運動"
 KUR.liberalism_icon: "£KUR_liberalism_small"
 KUR.liberalism_desc: "自由主義 - ゴラン運動（クルド語ローマ字表記：Bizûtinewey‌ Gorran）は、腐敗とKDP・PUKによる「権力の独占」に反対する新興政党である。イラク・クルディスタンの完全な独立を断固として拒否し、イラク政府との対話が相互に受け入れ可能な連邦制解決につながるという立場を取っている。"
 KUR.anarchist_communism: "£KUR_anarchist_communism_small (PKK) クルディスタン労働者党"
 KUR.anarchist_communism_icon: "£KUR_anarchist_communism_small"
 KUR.anarchist_communism_desc: "急進左派 - クルディスタン労働者党（クルド語ローマ字表記：Partiya Karkeren Kurdistane）は、アブドゥッラー・オジャラン率いるトルコ在住クルド人学生によって創設され、その歴史の大半においてトルコに対する血なまぐさい反乱を続けてきた。主にトルコ国内で活動するが、イラク・クルディスタンにも支部と武装訓練キャンプを有する。KDPとPUKがトルコとの和平・貿易を望む姿勢に反発しており、極左組織として資本主義の終焉を求め、分散型民主社会主義社会の樹立を掲げる。"
 KUR.Caliphate: "£generic_Caliphate_small アンサール・アル＝イスラム"
 KUR.Caliphate_desc: "サラフィー・ジハード主義 - アンサール・アル＝イスラムは、過激派ジハード主義聖職者ムッラー・クレカルによって、クルディスタンにおけるアルカイダの支部として結成された。主にサダム・フセイン政権下のイラク政府の支援を受け、イラク・クルディスタン自治政府の打倒を目指して戦っている。"
 KUR.Neutral_conservatism: "£generic_Neutral_conservatism_small (KIG) クルディスタン・イスラム会"
 KUR.Neutral_conservatism_desc: ""
 KUR.oligarchism: "£KUR_oligarchism_small (PUK) クルディスタン愛国同盟 - 保守派"
 KUR.oligarchism_icon: "£KUR_oligarchism_small"
 KUR.oligarchism_desc: "保守社会主義 - クルディスタン愛国同盟（クルド語ローマ字表記：Yekêtiy Niştîmaniy Kurdistan）は、クルディスタン民主党（KDP）の強力なバルザーニー家支配に対抗する、より左派的な選択肢として設立された折衷的なクルド政党である。イラク・クルド内戦終結後、イラク・クルディスタン南部を実質的に支配し、大規模なペシュメルガを掌握し続けている。クルド独立問題ではKDPより現実的な姿勢を保ち、KDPとイランの関係が冷え込む中、イランとの関係を強化している。"
