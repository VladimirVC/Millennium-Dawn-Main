 SOL_AI_BEHAVIOR: "@SOL 솔로몬 제도"
 RULE_OPTION_SOL_DYNAMIC: "유동적 행동"
 RULE_OPTION_SOL_DYNAMIC_AI_DESC: "@SOL 솔로몬 제도는 외교적 영향력, 국내 상황, 그리고 게임이 역사적 모드로 설정되어 있는지 여부에 따라 결정을 내립니다."
 RULE_OPTION_AUSTRALIAN_PEACE: "개입 및 사면"
 RULE_OPTION_AUSTRALIAN_PEACE_AI_DESC: "@SOL 솔로몬 제도는 최대 영향력 국가의 지원을 받아 평화 프로세스를 추진할 것입니다. \n참고: @AST 호주는 게임 시작 시점 @SOL 솔로몬 제도의 최대 영향력 국가입니다."
 RULE_OPTION_SOLOMON_BILL_FAILS_RASTA_COUP: "4월 코뮈니케 실패 - 라스타 쿠데타"
 RULE_OPTION_SOLOMON_BILL_FAILS_RASTA_COUP_AI_DESC: "바르톨로메우 울루파알루가 문다 협정(Munda Accords) 이행에 실패하여 이사타부 자유 운동(IFM)과의 전쟁으로 이어지며, 그 후 지미 \"라스타\" 루시바에아의 지휘 아래 말라이타 독수리 부대(MEF)가 감행한 쿠데타가 일어납니다"
 RULE_OPTION_AST_REJECTS_TEE_REBEL: "테에 쿠데타"
 RULE_OPTION_AST_REJECTS_TEE_REBEL_AI_DESC: "역내 열강들의 개입 실패로, 앤드류 테에가 이사타부 자유 운동(IFM)의 지휘권을 이어받아 @SOL 솔로몬 제도에 내전을 일으킵니다."
 RULE_DISABLE_GDP_GRAPH: "GDP 그래프 비활성화"
 RULE_NO_RULE_DISABLE_GDP_GRAPH_DESC: "GDP 그래프 시스템을 활성화합니다"
 RULE_YES_RULE_DISABLE_GDP_GRAPH_DESC: "GDP 그래프 시스템을 비활성화합니다. 저사양 PC의 성능 향상에 도움이 될 수 있습니다."
 RULE_ENABLE_AI_USING_ATTACHES: "AI의 §Y무관§! 사용 활성화"
 RULE_ENABLE_AI_USING_ATTACHES_YES_DESC: "AI가 외교 조치를 통해 §Y무관§!을 파견하거나 사용할 수 있도록 허용합니다"
 RULE_ENABLE_AI_USING_ATTACHES_NO_DESC: "AI가 외교 조치를 통해 §Y무관§!을 사용하는 것을 금지합니다"
 RULE_OPTION_THE_GREAT_REBELLION: "대반란"
 RULE_OPTION_THE_GREAT_REBELLION_AI_DESC: "경쟁하는 정치 및 개인 이익 집단들이 국가를 서서히 분열시키면서 대중은 잠재적 위기 상황에 무감각해졌습니다. 사상 초유의 박빙 투표 격차와 재검토 가능성에 대한 소문은 미국 시민 사회에 공포와 편집증을 불러일으킵니다. 하지만 이런 일이 실제로 일어날 리는 없겠죠. 어쨌든 이건 실질적으로 통계적 이상 현상일 뿐이니까요... 헤헤...... 안 그래요?"
 RULE_FUTURISTIC_SPECIAL_PROJECTS: "미래형 특별 프로젝트"
 RULE_ALLOWED_DISABLE_FUTURISTIC_SPECIAL_PROJECTS_DESC: "모든 특별 프로젝트를 연구할 수 있게 됩니다"
 RULE_OPTION_DISABLED: "비활성화"
 RULE_DISABLE_DISABLED_FUTURISTIC_SPECIAL_PROJECTS_DESC: "미래형 특별 프로젝트를 사용할 수 없게 됩니다"
 MD_CUSTOM_SCENARIO_RULES: "사용자 지정 시나리오"
 RULE_EVENT_HORIZON_SCENARIO: "이벤트 호라이즌 시나리오"
 RULE_EVENT_HORIZON_DEFAULT: "비활성화"
 RULE_EVENT_HORIZON_DEFAULT_DESC: "이벤트 호라이즌 시나리오가 활성화되지 않습니다."
 RULE_EVENT_HORIZON_BLITZ: "블리츠 - 2001년"
 RULE_EVENT_HORIZON_BLITZ_DESC: "이벤트 호라이즌 시나리오가 2001년에 시작됩니다.\n\n§H참고:§! §Y이벤트 호라이즌§!을 위한 메가 국가들이 형성되면 현재 국가 중점 계통도를 잃고 시나리오 전용 중점 계통도로 교체됩니다."
 RULE_EVENT_HORIZON_CASUAL: "캐주얼 - 2012년"
 RULE_EVENT_HORIZON_CASUAL_DESC: "이벤트 호라이즌 시나리오가 2012년에 시작됩니다.\n\n§H참고:§! §Y이벤트 호라이즌§!을 위한 메가 국가들이 형성되면 현재 국가 중점 계통도를 잃고 시나리오 전용 중점 계통도로 교체됩니다."
 RULE_EVENT_HORIZON_DELAYED: "지연됨 - 2020년"
 RULE_EVENT_HORIZON_DELAYED_DESC: "이벤트 호라이즌 시나리오가 2020년에 시작됩니다.\n\n§H참고:§! §Y이벤트 호라이즌§!을 위한 메가 국가들이 형성되면 현재 국가 중점 계통도를 잃고 시나리오 전용 중점 계통도로 교체됩니다."
 RULE_AI_EU_END_GAME_PATHS: "AI의 EU 최종 단계 경로 활성화"
 RULE_AI_YES_EU_END_GAME_PATHS: "AI가 유럽 연방이나 유럽 합중국과 같은 유럽연합 최종 단계 경로를 추구할 수 있도록 허용합니다."
 RULE_AI_NO_EU_END_GAME_PATHS: "AI가 유럽 연방이나 유럽 합중국과 같은 유럽연합 최종 단계 경로를 추구하는 것을 금지합니다."
 HOL_Bugundian_focus_branch: "@HOL 부르고뉴의 부상"
 HOL_Bugundian_focus_branch_ALLOWED_DESC: "부르고뉴 분기가 활성화되어, 플레이어가 부르고뉴의 유산을 복원할 수 있게 됩니다."
 HOL_Bugundian_focus_branch_BLOCKED_DESC: "부르고뉴 분기가 비활성화되며, 기본 네덜란드 중점 계통도를 유지합니다."
 GRN_AI_BEHAVIOR: "@GRN 그린란드"
 RULE_OPTION_GRN_SCANDINAVIAN_SERENITY: "스칸디나비아의 평온"
 RULE_OPTION_GRN_SCANDINAVIAN_SERENITY_AI_DESC: "그린란드가 대외 정책 중점을 통해 계략을 꾸미고 스칸디나비아를 형성하도록 허용합니다. 하지만 그 야망은 거기서 멈추어, 잠재적으로 나토에 상당한 규모의 동맹국을 안겨줄 것입니다."
 RULE_OPTION_GRN_CONTINENTAL_HEGEMONY: "대륙 패권"
 RULE_OPTION_GRN_CONTINENTAL_HEGEMONY_AI_DESC: "그린란드 AI가 스칸디나비아 형성을 넘어 야망을 계속 이어가도록 허용하며, 유럽 대륙 거의 전체를 결빙 연방(Frozen Federation)이라는 새로운 통합 깃발 아래 통합하도록 합니다."
 RULE_DISABLE_COUP_CONTEST: "쿠데타 경쟁 이벤트 비활성화"
 RULE_YES_DISABLE_COUP_CONTEST_DESC: "§H쿠데타 경쟁§! 이벤트 체인을 §R비활성화§!합니다. 주요 대외 영향력 국가들은 투자를 진행 중인 국가에서 쿠데타가 발생했을 때 알림이나 대응 옵션을 받지 않게 됩니다. AI가 대리전 분쟁을 확대하는 것을 원치 않을 때 이 옵션을 사용하십시오."
 RULE_NO_DISABLE_COUP_CONTEST_DESC: "§H쿠데타 경쟁§! 이벤트 체인을 §G활성화§!합니다. 한 국가에서 쿠데타가 성공하면 최대 영향력 국가(그리고 §H20%§! 이상인 경우 2위 국가)에 알림이 전송되며 비난, 제재, 야당 지원 또는 군사적 개입 등 대응 방법을 선택할 수 있습니다. 쿠데타 이후의 내전 또한 구정권을 지원하기 위한 상응하는 이벤트를 촉발합니다."
 RULE_REMOVE_MICRO_STATES_TINY: "극소 국가 (마이크로스테이트)"
 RULE_REMOVE_MICRO_STATES_TINY_DESC: "가장 작은 국가(모나코, 산마리노 등)와 카리브해 섬나라들만 제거합니다."
 RULE_REMOVE_MICRO_STATES_SMALLER: "소국"
 RULE_REMOVE_MICRO_STATES_SMALLER_DESC: "극소 국가에 더해 부탄, 감비아, 지부티 등 약간 더 큰 국가들을 제거합니다."
 RULE_REMOVE_MICRO_STATES_INSIGNIFICANT: "확장 제거"
 RULE_REMOVE_MICRO_STATES_INSIGNIFICANT_DESC: "성능 향상을 극대화하기 위해 모든 소국과 더불어 라오스, 수리남, 가이아나 등 추가적인 국가들까지 제거합니다."
 RULE_ENABLE_RESOURCE_STORAGE_SYSTEM: "§Y자원 저장 시스템§! 활성화"
 RULE_OPTION_ENABLE_RESOURCE_STORAGE_SYSTEM: "원자재를 저장할 수 있는 §Y자원 저장 시스템§!을 활성화합니다. 하루마다 극심한 렉이 발생한다면 이 기능을 비활성화하십시오. 비활성화해도 게임 플레이에 실질적인 손실은 없습니다."
 RULE_OPTION_DISABLE_RESOURCE_STORAGE_SYSTEM: "원자재를 저장할 수 있는 §Y자원 저장 시스템§!을 비활성화합니다."
 RULE_CARRIER_ONLY_RAIDS: "항공모함 전용 습격 활성화"
 RULE_CARRIER_ONLY_RAIDS_NO: "항공모함 전용 습격을 비활성화합니다. 이는 일반 항공모함 습격 사용 능력에 영향을 미치지 않지만, 함재기가 항공모함에서 지상 비행장으로 이동하는 문제가 자주 발생할 경우 유용합니다."
 RULE_CARRIER_ONLY_RAIDS_YES: "항공모함 전용 습격을 활성화합니다. 이는 항공모함에서만 출격할 수 있도록 허용하는 기존 습격 시스템의 복제본입니다."
 RULE_RAID_DOCTRINE_REACH: "습격 시 교리 범위 적용"
 RULE_RAID_DOCTRINE_REACH_NO: "습격에 대한 개입 교리 범위 검사를 비활성화합니다. 플레이어(그리고 AI)는 대외 정책 교리와 상관없이 가시적인 모든 대상을 상대로 습격을 준비할 수 있습니다. 단, 전쟁 상태, 관계도, 세력 검사는 여전히 적용됩니다."
 RULE_RAID_DOCTRINE_REACH_YES: "기본 동작입니다. 개입 교리에 따라 습격 대상이 제한됩니다: §Y고립주의§!와 §Y지역 안보§!는 평화 시 습격 불가, §Y제한적 개입주의§!는 인접국만 가능, §Y지역 개입주의§!는 동일 대륙 내 대상만 가능합니다. 전쟁 중일 경우 이 제한은 항상 무시됩니다."
 RULE_ALLOW_CPD_AI_OFFERS: "AI 조건부 평화 제안 허용"
 RULE_OPTION_CPD_AI_OFFERS_YES_DESC: "전쟁 중인 AI 국가들이 정기적으로 진행 중인 분쟁을 평가하고, 전쟁에서 이길 수 없거나 교착 상태라고 판단할 때 §Y조건부 평화 협정§!을 제안할 수 있도록 허용합니다. 종주국 또한 외교권이 제한된 종속국을 대신해 협상할 수 있습니다."
 RULE_OPTION_CPD_AI_OFFERS_NO_DESC: "AI 국가가 독자적으로 §Y조건부 평화 협정§!을 개시하는 것을 막습니다. 플레이어는 여전히 외교 조치를 통해 수동으로 협정을 제안할 수 있습니다."
 RULE_EU_EXPANSION_FOCUS: "EU 행동"
 RULE_EU_EXP_NO: "기본"
 RULE_EU_EXP_NO_DESC: "기본 EU 행동"
 RULE_EU_EXP_YES: "확장 중점"
 RULE_EU_EXP_YES_DESC: "EU가 확대(Enlargement) 법안을 우선시합니다"
 RULE_OPTION_MULTIPOLAR_GREECE: "그리스 다극화"
 RULE_OPTION_MULTIPOLAR_GREECE_DESC: "그리스는 공화국으로 남지만 서방 블록에 등을 돌리고, 러시아, 중국, 이란에 접근한 뒤 브릭스(BRICS)에 안착하며 서방 기관들을 뒤로할 것입니다."
 RULE_FREE_FACTORIES_AMOUNT: "플레이어용 무료 공장"
 RULE_FREE_FACTORIES_AMOUNT_OFF: "끄기"
 RULE_FREE_FACTORIES_AMOUNT_OFF_DESC: "플레이어는 게임 시작 시 무료 공장을 받지 않습니다."
 RULE_FREE_FACTORIES_AMOUNT_ONE: "민간 1개 + 군수 1개"
 RULE_FREE_FACTORIES_AMOUNT_ONE_DESC: "모든 인간 플레이어는 게임 시작 시 장외(offsite) 민간 공장 1개와 장외 군수 공장 1개를 받습니다."
 RULE_FREE_FACTORIES_AMOUNT_TWO: "민간 2개 + 군수 2개"
 RULE_FREE_FACTORIES_AMOUNT_TWO_DESC: "모든 인간 플레이어는 게임 시작 시 장외(offsite) 민간 공장 2개와 장외 군수 공장 2개를 받습니다."
 RULE_FREE_FACTORIES_AMOUNT_THREE: "민간 3개 + 군수 3개"
 RULE_FREE_FACTORIES_AMOUNT_THREE_DESC: "모든 인간 플레이어는 게임 시작 시 장외(offsite) 민간 공장 3개와 장외 군수 공장 3개를 받습니다."
 RULE_FREE_FACTORIES_AMOUNT_FIVE: "민간 5개 + 군수 5개"
 RULE_FREE_FACTORIES_AMOUNT_FIVE_DESC: "모든 인간 플레이어는 게임 시작 시 장외(offsite) 민간 공장 5개와 장외 군수 공장 5개를 받습니다."
 RULE_OPTION_DEN_PRO_WESTERN: "서방으로"
 RULE_OPTION_DEN_PRO_WESTERN_AI_DESC: "덴마크는 나토(NATO) 및 EU에 대한 헌신을 유지하면서 은행 및 부패 문제를 해결할 것입니다."
 RULE_OPTION_DEN_EUROSCEPTIC: "유럽회의주의 덴마크"
 RULE_OPTION_DEN_EUROSCEPTIC_AI_DESC: "덴마크는 EU 및 나토와 거리를 두면서 북유럽 협력을 강화할 것입니다."
 RULE_OPTION_DEN_SOCIALIST: "사회주의 덴마크"
 RULE_OPTION_DEN_SOCIALIST_AI_DESC: "덴마크는 노동조합의 힘을 강화하고 군주제를 폐지하며 다극 외교를 추구할 것입니다."
 RULE_OPTION_DEN_MONARCHIST: "왕당파 덴마크"
 RULE_OPTION_DEN_MONARCHIST_AI_DESC: "덴마크는 왕실의 영향력을 확대하고 왕권을 덴마크 정치의 중심으로 복원할 것입니다."
 RULE_OPTION_DEN_NATIONALIST: "민족주의 덴마크"
 RULE_OPTION_DEN_NATIONALIST_AI_DESC: "덴마크는 민족주의 정책, 더 엄격한 국경 통제, 더 대결적인 외교 정책을 추구할 것입니다."
 RULE_OPTION_NRY_LABOUR: "노동당"
 RULE_OPTION_NRY_LABOUR_AI_DESC: "노르웨이는 노동당 집권을 유지하며 사회민주주의와 나토 및 서방과의 긴밀한 관계를 추구할 것입니다."
 RULE_OPTION_NRY_CHRISTIAN_PEOPLES: "기독교인민당"
 RULE_OPTION_NRY_CHRISTIAN_PEOPLES_AI_DESC: "노르웨이는 기독교인민당 아래 결집하여, 기독교 사회 가치와 북유럽 협력 및 개발 원조를 조화시킬 것입니다."
 RULE_OPTION_NRY_PROGRESS: "진보당"
 RULE_OPTION_NRY_PROGRESS_AI_DESC: "노르웨이는 진보당에 힘을 실어주어 세금 감면, 이민 규제 강화, 석유 자금을 활용한 국가 운영을 추진할 것입니다."
 RULE_OPTION_BUL_EUROATLANTIC: "유로-대서양 불가리아"
 RULE_OPTION_BUL_EUROATLANTIC_DESC: "불가리아는 나토 및 유럽연합 가입을 추구하며 서방 블록에 자국의 입지를 확고히 안착시킬 것입니다."
 RULE_OPTION_BUL_NATIONALIST: "민족주의 불가리아"
 RULE_OPTION_BUL_NATIONALIST_DESC: "민족주의 세력이 소피아에서 권력을 잡고 발칸반도에서 불가리아의 야망을 추구할 것입니다."
 RULE_OPTION_BUL_COMMUNIST: "공산주의 불가리아"
 RULE_OPTION_BUL_COMMUNIST_DESC: "불가리아는 사회주의로 복귀하고 동방에서 동맹을 찾을 것입니다."
 RULE_OPTION_MNT_WESTERN_INTEGRATION: "서방 통합"
 RULE_OPTION_MNT_WESTERN_INTEGRATION_DESC: "몬테네그로는 EU 및 나토 가입을 추구하며 그 과정에서 서방 장비를 구매할 것입니다."
 RULE_OPTION_MNT_EASTERN_ALIGNMENT: "동방 지지"
 RULE_OPTION_MNT_EASTERN_ALIGNMENT_DESC: "몬테네그로는 모스크바에 의지하여 집단안보조약기구(CSTO)에 가입하고 동구권 장비를 구매할 것입니다."
 RULE_OPTION_MNT_SERBIAN_UNION: "세르비아와의 연합"
 RULE_OPTION_MNT_SERBIAN_UNION_DESC: "몬테네그로는 베오그라드 쪽으로 다시 표류하며 세르비아와의 연합 복원을 추구할 것입니다."
 RULE_OPTION_MNT_NEUTRAL_HARBOUR: "중립 항구"
 RULE_OPTION_MNT_NEUTRAL_HARBOUR_DESC: "몬테네그로는 무장 중립을 선언하고 자국의 항구들을 모든 블록에 개방된 자유 항구로 전환할 것입니다."
 SWI_NATO_EU: "유로-대서양 통합"
 SWI_NATO_EU_DESC: "스위스는 중립을 포기하고 나토에 가입하며 유럽연합 후보국 지위를 추구할 것입니다. 만약 나토가 존재하지 않는다면, 홀로 서서 연방을 해체할 것입니다."
 SWI_NEUTRAL: "무장 중립"
 SWI_NEUTRAL_DESC: "스위스는 중립 외교 정책을 유지하며 자국의 길을 걷고 모든 국가와 친구로 남을 것입니다."