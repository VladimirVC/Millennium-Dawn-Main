 UKR_vilnoe_pospolitoe_rushenie_desc: "情报总局将成立一个新的作战营，负责在敌方领土上进行特殊有限作战。"
 UKR_belarus_volunteers: "罗科索夫斯基营"
 UKR_belarus_volunteers_desc: "情报总局将成立一个新的作战营，负责在敌方领土上进行特殊有限作战。"
 UKR_legion_free_poland: "波兰自由军团营"
 UKR_legion_free_poland_desc: "情报总局将成立一个新的作战营，负责在敌方领土上进行特殊有限作战。"
