 SPECIAL_FORCES_MIXED: "혼합 지휘부"
 SPECIAL_FORCES_MIXED_DESC: "이 교리는 정밀함과 재량권이 요구되는 복잡하고 우선순위가 높은 임무를 위해 고도로 선발된 부대로 특수부대를 구조화합니다. 특수부대 엘리트 개념은 다양한 환경 전반에 걸친 고급 역량 통합과 작전 효율성을 강조합니다."
 SPECIAL_FORCES_MARINE_FOCUS: "해병대 중심 특수부대"
 SPECIAL_FORCES_MARINE_FOCUS_DESC: "이 교리는 특수부대를 주로 해병 부대에 집중시킴으로써 해병 부대를 훈련시키고 전개할 수 있는 더 많은 선택권을 줍니다. 대신 특수부대의 다른 병과를 적절히 훈련시키거나 장비할 수 없게 되는 단점이 있습니다."
 SPECIAL_FORCES_AIRBORNE_FOCUS: "공수부대 중심 특수부대"
 SPECIAL_FORCES_AIRBORNE_FOCUS_DESC: "이 교리는 특수부대를 주로 공수 부대에 집중시킴으로써 공수 부대를 훈련시키고 전개할 수 있는 더 많은 선택권을 줍니다. 대신 특수부대의 다른 병과를 적절히 훈련시키거나 장비할 수 없게 되는 단점이 있습니다."
 SPECIAL_FORCES_RANGER_FOCUS: "레인저 중심 특수부대"
 SPECIAL_FORCES_RANGER_FOCUS_DESC: "이 교리는 특수부대를 주로 레인저 부대에 집중시킴으로써 레인저 부대를 훈련시키고 전개할 수 있는 더 많은 선택권을 줍니다. 대신 특수부대의 다른 병과를 적절히 훈련시키거나 장비할 수 없게 되는 단점이 있습니다."
 DOCTRINE_TRACK_MIXED_OPTIONS: "보조 특수부대"
 AIRBORN_INTERDICTION: "공수 차단"
 AIRBORN_INTERDICTION_DESC: "이 교리는 적 진지 깊숙이 경공수 보병과 길잡이(Pathfinder) 팀을 파견하여 비행장, 보급로, 통신망을 사보타주합니다. 차단 개념은 지반을 사수하기보다는 침투, 폭파, 그리고 적의 기동을 지연시키는 것을 강조합니다."
 AIRBORN_AIRHEAD_ASSAULT: "교두보 강습"
 AIRBORN_AIRHEAD_ASSAULT_DESC: "이 교리는 구원 부대가 도착할 때까지 공수 교두보를 점령하고 유지하기 위해 경보병 및 차량화 공수 보병을 대규모로 투하합니다. 교두보 강습 개념은 집중적인 투하, 신속한 재정비, 반격 하에서의 방어적 인내력을 강조합니다."
 RANGER_JUNGLE_FORCES: "정글 레인저"
 RANGER_JUNGLE_FORCES_DESC: "이 교리는 열기, 질병, 단절된 보급로가 재래식 부대를 패배시키는 정글 깊은 곳에서 레인저들이 지속적인 작전을 수행할 수 있도록 준비시킵니다. 정글 개념은 환경 순응, 통과 불가능한 지형을 통한 침투, 아군 전선에서 멀리 떨어진 곳에서의 자립을 강조합니다."
 MARINE_ELITE_RAIDERS: "해안 습격대"
 MARINE_ELITE_RAIDERS_DESC: "이 교리는 해병 부대를 해안 목표물을 타격하고 적이 반응하기 전에 철수하는 소규모 습격 팀으로 구조화합니다. 해안 습격대 개념은 속도, 침투, 그리고 가벼운 군수 자취를 강조합니다."
 MARINE_ARMORED_BEACHHEAD: "기갑 교두보"
 MARINE_ARMORED_BEACHHEAD_DESC: "이 교리는 방어자가 정비하기 전에 기갑 부대를 상륙시키고 교두보에서 돌파할 수 있도록 수륙양용 부대를 구성합니다. 기갑 교두보 개념은 기계화 화력, 모멘텀, 상륙 거점의 신속한 확장을 강조합니다."
 AIRBORN_AIR_ASSAULT: "공중 강습"
 AIRBORN_AIR_ASSAULT_DESC: "이 교리는 낙하산 침투보다 헬리콥터 탑재 공중 강습을 중심으로 공수 부대를 구조화합니다. 공중 강습 개념은 신속한 수직 포위, 기동성, 호출 시 회전익 항공기의 지원을 강조합니다."
 AIRBORN_ARMORED_DROP: "기갑 공수"
 AIRBORN_ARMORED_DROP_DESC: "이 교리는 낙하 후 지속적인 작전을 위해 공중 투하 가능한 기갑 및 기계화 부대로 공수 부대를 무장시킵니다. 기갑 공수 개념은 방호된 화력, 조직화, 적 진지 깊숙한 곳에서의 지구력을 강조합니다."
 RANGER_RECON_FORCES: "정찰 레인저"
 RANGER_RECON_FORCES_DESC: "이 교리는 레인저 부대가 본대보다 앞서 종심 정찰, 차장 및 감시 임무를 수행하도록 훈련시킵니다. 정찰 레인저 개념은 은밀성, 야전 기술, 정확한 표적 획득을 강조합니다."
 RANGER_STRIKE_FORCES: "타격 레인저"
 RANGER_STRIKE_FORCES_DESC: "이 교리는 요새화된 목표물에 대한 신속한 강습과 비행장 장악을 위해 레인저를 준비시킵니다. 타격 레인저 개념은 충격, 템포, 직접적인 무력 행사를 강조합니다."
 SOF_OPERATIONS_COMMAND: "특수작전사령부"
 SOF_OPERATIONS_COMMAND_DESC: "이 교리는 1급 특수작전부대를 창설하고 유지하기 위한 전담 사령부를 설립합니다. 특수작전사령부 개념은 모든 환경에 걸친 엄격한 선발, 훈련 및 합동 지원을 강조합니다."
 SOF_DIRECT_ACTION: "직접 타격"
 SOF_DIRECT_ACTION_DESC: "이 교리는 고가치 표적에 대한 직접 타격 강습을 위해 작전 요원들을 훈련시킵니다. 직접 타격 개념은 정밀 타격, 신속한 투입, 결정적인 근접 교전을 강조합니다."
 SOF_SABOTAGE_SUBVERSION: "사보타주 및 전복"
 SOF_SABOTAGE_SUBVERSION_DESC: "이 교리는 적진 뒤에서의 사보타주, 전복, 비정규전을 위해 요원들을 준비시킵니다. 사보타주 개념은 침투, 폭파, 보급 없는 장기 작전을 강조합니다."
 SOF_RECON_INTELLIGENCE: "특수 정찰"
 SOF_RECON_INTELLIGENCE_DESC: "이 교리는 특수부대를 정찰, 감시, 정보 수집에 집중시킵니다. 특수 정찰 개념은 흔적 최소화, 끈기 있는 관측, 정확한 보고를 강조합니다."
 SOF_COUNTER_TERROR: "대테러"
 SOF_COUNTER_TERROR_DESC: "이 교리는 대테러, 인질 구출, 시가지 근접 전투(CQB)를 위해 요원들을 훈련시킵니다. 대테러 개념은 철저한 준비 태세, 정밀성, 신속한 대응을 강조합니다."
 SUBDOCTRINE_DESIGN_STEALTH: "스텔스 설계"
 SUBDOCTRINE_DESIGN_STEALTH_DESC: "이 교리는 레이더 반사 면적을 줄이고 생존성을 향상시킨 항공기 개발을 우선시합니다. 스텔스 설계는 적 센서 네트워크 전반에서 탐지를 최소화하는 저피탐 소재, 전자 대응책, 구조적 구성을 강조합니다."
 SUBDOCTRINE_DESIGN_EW: "전자전 설계"
 SUBDOCTRINE_DESIGN_EW_DESC: "이 교리는 항공기 플랫폼에 전용 전자전 시스템을 통합하는 데 중점을 둡니다. 전자전 설계는 작전 환경 전반에 걸쳐 적의 방공망 효과를 떨어뜨리기 위한 능동 전파 방해, 수동 탐지, 제압 기능을 강조합니다."
 SUBDOCTRINE_DESIGN_MODULAR: "모듈식 설계"
 SUBDOCTRINE_DESIGN_MODULAR_DESC: "이 교리는 개방형 아키텍처와 표준화된 구성 요소 프레임워크를 중심으로 항공기 개발을 조직합니다. 모듈식 설계는 다양한 임무 요구 사항 전반에 걸친 신속한 성능 업그레이드, 수명 주기 비용 절감, 유연한 플랫폼 적응을 강조합니다."
 SUBDOCTRINE_HEAVY_AEW: "공중조기경보 (AEW)"
 SUBDOCTRINE_HEAVY_AEW_DESC: "이 교리는 공중 감시 및 전투 관리를 중심으로 대형 항공기 작전을 구조화합니다. 공중 조기 경보 개념은 광역 탐지, 실시간 데이터 통합, 전구 전반에 걸친 조율된 항공 자산 관제를 강조합니다."
 SUBDOCTRINE_HEAVY_AIRLIFT: "전략 공수"
 SUBDOCTRINE_HEAVY_AIRLIFT_DESC: "이 교리는 부대, 장비 및 보급품의 전략적 이동을 중심으로 대형 항공기 작전을 조직합니다. 전략 공수 개념은 확장된 거리에 걸친 작전을 지원하기 위해 전 세계적인 도달 범위, 지속적인 수송량, 유연한 기지 설정을 강조합니다."
 SUBDOCTRINE_HEAVY_REFUELING: "공중 급유"
 SUBDOCTRINE_HEAVY_REFUELING_DESC: "이 교리는 지속적인 항공 캠페인 계획에 공중 급유기 작전을 통합합니다. 공중 급유 개념은 다목적 항공 작전 전반에 걸친 확장된 작전 범위, 지속적인 공중 주둔, 조율된 연료 지원을 강조합니다."
 SUBDOCTRINE_MULTIROLE_DOMINANCE: "공중 지배 다목적"
 SUBDOCTRINE_MULTIROLE_DOMINANCE_DESC: "이 교리는 공중 지배권을 확립하기 위한 주요 플랫폼으로 다목적 항공기를 운용합니다. 공중 지배 다목적 개념은 가시거리 외 교전(BVR) 능력과 다중 임무 유연성을 결합하여 항공 영역에서 경합하고 통제하는 것을 강조합니다."
 SUBDOCTRINE_MULTIROLE_CARRIER: "함재 다목적기"
 SUBDOCTRINE_MULTIROLE_CARRIER_DESC: "이 교리는 항공모함 기반 배치와 해상 타격 임무를 중심으로 다목적 항공기 작전을 구조화합니다. 항모 다목적 개념은 조율된 함대 작전, 갑판 발진 요격, 해상 캠페인 계획 내 항공력의 통합을 강조합니다."
 SUBDOCTRINE_STRIKE_SEAD: "SEAD/DEAD 작전"
 SUBDOCTRINE_STRIKE_SEAD_DESC: "이 교리는 적 방공망의 제압(SEAD) 및 파괴(DEAD)를 중심으로 타격 항공기 작전을 조직합니다. SEAD/DEAD 개념은 분쟁 영공 내 행동의 자유를 확보하기 위해 대레이더 무기, 조율된 전자 공격, 지대공 위협의 체계적인 제거를 강조합니다."
 SUBDOCTRINE_STRIKE_INTERDICTION: "종심 차단"
 SUBDOCTRINE_STRIKE_INTERDICTION_DESC: "이 교리는 타격 항공기의 정밀 장거리 교전을 통해 적 작전 종심을 교란하는 데 집중합니다. 종심 차단 개념은 적이 전선에 도달하기 전에 적의 능력을 저하시키기 위해 스탠드오프 무기(장거리 무기), 표적 폴더 계획, 조율된 타격 패키지를 강조합니다."
 SUBDOCTRINE_STRIKE_CAMPAIGN: "공중 차단 작전"
 SUBDOCTRINE_STRIKE_CAMPAIGN_DESC: "이 교리는 적 지상군에 대한 지속적인 차단 작전을 중심으로 타격 및 근접항공지원 항공기를 구조화합니다. 공중 차단 캠페인 개념은 적의 기동을 지속적으로 저하시키기 위해 끈질긴 공중 주둔, 장기 체공 플랫폼, 전방 지상 통제관과의 긴밀한 통합을 강조합니다."
 SUBDOCTRINE_FIGHTER_BVR: "가시거리 외(BVR) 전투"
 SUBDOCTRINE_FIGHTER_BVR_DESC: "이 교리는 레이더 유도 미사일을 사용한 가시거리 외 교전을 중심으로 전투기 작전을 구조화합니다. BVR 전투 개념은 육안 접촉이 이뤄지기 전에 적기를 제압하기 위해 장거리 탐지, 다중 표적 추적, 초탄 명중 확률을 강조합니다."
 SUBDOCTRINE_FIGHTER_WVR: "가시거리 내(WVR) 도그파이트"
 SUBDOCTRINE_FIGHTER_WVR_DESC: "이 교리는 가시거리 내에서의 근접 기동 전투를 위해 전투기 조종사를 훈련시킵니다. WVR 도그파이트 개념은 기총과 단거리 미사일을 사용한 근접 교전에서 격추를 달성하기 위해 항공기 민첩성, 상황 인식, 공격적인 공세 전술을 강조합니다."
 SUBDOCTRINE_FIGHTER_STEALTH: "스텔스 전투기 작전"
 SUBDOCTRINE_FIGHTER_STEALTH_DESC: "이 교리는 저피탐성 침투와 선제 타격을 중심으로 5세대 전투기 작전을 구조화합니다. 스텔스 전투기 개념은 적이 반응하기 전에 공중 지배를 달성하기 위해 줄어든 탐지 확률, 내부 무장창, 다층 방공 환경의 조율된 침투를 강조합니다."
 SUBDOCTRINE_FIGHTER_INTERCEPTOR: "전문 요격기"
 SUBDOCTRINE_FIGHTER_INTERCEPTOR_DESC: "이 교리는 영공 침범과 폭격기 요격에 대한 신속한 대응을 위해 전투기 부대를 조직합니다. 전문 요격기 개념은 자국 및 동맹 영공을 보호하기 위해 고속 비상출격(Scramble) 프로토콜, 지상통제요격(GCI) 절차, 구역 기반 경계 태세를 강조합니다."
 DOCTRINE_TRACK_DRONE_WARFARE: "드론전"
 GRAND_DOCTRINE_AUTONOMOUS_AIR: "자율 항공 작전"
 GRAND_DOCTRINE_AUTONOMOUS_AIR_DESC: "이 대교리는 무인 시스템, 원격 작전 및 자율 타격 역량을 중심으로 항공력을 구조화합니다. 자율 항공 작전 개념은 조종사의 위험 감소, 지속적인 정보·감시·정찰(ISR), 항공 캠페인의 모든 계층에 대한 무인 플랫폼의 통합을 강조합니다."
 SUBDOCTRINE_DRONE_MALE: "MALE UCAV 작전"
 SUBDOCTRINE_DRONE_MALE_DESC: "이 교리는 중고도 장기체공(MALE) 무인 전투 항공기를 중심으로 항공 작전을 구조화합니다. MALE UCAV 개념은 지상 및 합동 작전을 지원하기 위해 지속적인 감시, 원격 조종 타격 임무, 표적 지역에 대한 끊임없는 주둔을 강조합니다."
 SUBDOCTRINE_DRONE_UCAS: "UCAS 항모 타격"
 SUBDOCTRINE_DRONE_UCAS_DESC: "이 교리는 무인 전투 항공 시스템(UCAS)을 항모타격단 작전에 통합합니다. UCAS 항공모함 개념은 인간 조종사를 위험에 노출시키지 않고 해상 플랫폼에서 항공력을 투사하기 위해 스텔스형 갑판 출격 타격 임무, 항모의 사거리 확장, 자율적인 함대 방어를 강조합니다."
 SUBDOCTRINE_DRONE_LOITERING: "배회 대기탄 (자폭 드론)"
 SUBDOCTRINE_DRONE_LOITERING_DESC: "이 교리는 고정형 또는 이동형 표적과 교전하기 전에 장시간 비행이 가능한 배회 대기탄을 중심으로 타격 작전을 구조화합니다. 배회 대기탄 개념은 작전 지역 전반에 걸쳐 끈질긴 살상 범위를 제공하기 위해 저비용 포화 공격, 대전차 정밀성, 분산 발사를 강조합니다."
 SUBDOCTRINE_DRONE_COUNTER: "대드론 작전"
 SUBDOCTRINE_DRONE_COUNTER_DESC: "이 교리는 적대적인 무인 항공 시스템(UAS)을 탐지, 요격 및 격퇴하기 위해 항공 및 지상군을 조직합니다. 안티 드론 개념은 날로 증가하는 무인 시스템 위협으로부터 부대와 주요 자산을 보호하기 위해 다층적인 전자 재밍, 전용 요격 플랫폼, 통합된 저고도 레이더를 강조합니다."
 SUBDOCTRINE_DRONE_SWARM: "드론 군집 통합"
 SUBDOCTRINE_DRONE_SWARM_DESC: "이 교리는 조직화된 대규모 자율 및 반자율 플랫폼을 중심으로 항공 작전을 구조화합니다. 드론 군집 개념은 인간 승무원에 대한 위험을 줄이면서 적의 방어망을 압도하고 질량 효과를 창출하기 위해 분산 표적화, 소모성 부대 운용, 유무인 복합 체계(MUM-T)를 강조합니다."
 SUBDOCTRINE_OPERATION_COIN: "대반란 (COIN) 작전"
 SUBDOCTRINE_OPERATION_COIN_DESC: "이 교리는 인구 통제, 정보 기반의 직접 타격 강습, 신속 대응 부대를 통해 비정규 위협을 격퇴하도록 지상군을 구조화합니다. 대반란 작전은 안정을 회복하기 위한 지속적인 부대 주둔과 민군 협력을 강조합니다."
 SUBDOCTRINE_OPERATION_URBAN_WARFARE: "시가전 작전"
 SUBDOCTRINE_OPERATION_URBAN_WARFARE_DESC: "이 교리는 도시와 거대 도시 내에서의 전투를 위해 지상군을 특화시킵니다. 시가전 작전은 복잡한 수직 및 수평 전장을 통제하기 위한 노드 단위 소탕, 침투 전술, 연동된 방어 화력을 강조합니다."
