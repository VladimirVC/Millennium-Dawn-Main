 state_based_investments_screen_tt: "§HInvestimento interno§!"
 check_for_investment_project_limits_tt: "Currently Has Available §HInternal Investment§! Slot (Free Projects: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0])"
 state_based_investments_screen_delayed_tt: "O menu abaixo é uma série de decisões que você pode tomar para encorajar vários tipos de desenvolvimento dentro de [THIS.GetName]. Todas as nações terão um mínimo de dois slots disponíveis que podem usar para qualquer um de seus estados em todo o país. Você pode escolher fazer vários projetos em um estado ou pode escolher espalhar os projetos pelo país. Você pode ganhar slots adicionais aumentando o §YClassificação de poder§! da sua nação\n\nSlots por classificação de poder:\n- §YSuperpotência§!: 6\n- §YGrande Potência§!: 5\n- §YPotência Principal§!: 4\n- §YPotência Regional§!: 3\n"
 available_internal_investments_screen_tt: "Available §HInternal Investment§! Slots: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "All nations will have a minimum of two available slots they can use for any of their states across their entire country. You can choose to do multiple projects in one state or you can choose to spread the projects across the country. You can gain additional slots by increasing your nation's §YPower Ranking§!\n\nOngoing Projects:\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "Expansão da capacidade renovável local"
 state_owned_local_renewable_capacity_modifier_desc: "Após uma série de investimentos direcionados na infraestrutura local de energia renovável, o estado agora está produzindo mais energia a partir de fontes renováveis."
 state_owned_local_infrastructure_modifier: "Expansão da infraestrutura local"
 state_owned_local_infrastructure_modifier_desc: "A expansão da infraestrutura local no estado levou a uma variedade de projetos de curto prazo para melhorar substancialmente a infraestrutura local."
 state_owned_local_military_infrastructure_modifier: "Expansão da infraestrutura militar local"
 state_owned_local_military_infrastructure_modifier_desc: "After significant investment in local military facilities and infrastructure upgrades, the region's military installations are now fully modernized. The state's military production capabilities have been substantially enhanced."
 state_owned_local_energy_infrastructure_modifier: "Expansão da infraestrutura energética local"
 state_owned_local_energy_infrastructure_modifier_desc: "Targeted investments in the local energy grid have resulted in a comprehensive modernization of the state's power generation and distribution infrastructure. The state now has improved energy production capabilities across all energy sectors."
 state_owned_build_forward_logistics_base_modifier: "Construir Bases Logísticas Avançadas"
 state_owned_build_forward_logistics_base_modifier_desc: "Strategic logistics bases have been established throughout the state, creating a forward-deployed supply network. These facilities significantly improve the movement of troops and materials through the region, reducing overall supply demands."
 state_owned_improve_rebuilding_efforts_modifier: "Esforços de reconstrução aprimorados"
 state_owned_improve_rebuilding_efforts_modifier_desc: "Reconstruction efforts have won over the local population, improving public cooperation and reducing civil unrest. Investment in local infrastructure and community rebuilding projects have boosted compliance among the local population."
 state_owned_hire_extra_primary_sector_workers_modifier: "Contratar trabalhadores extras do setor primário"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "The state's primary sector workforce has been expanded through targeted recruitment and training initiatives. Agricultural, mining, and other resource extraction operations now benefit from increased labor availability, resulting in higher resource output."
