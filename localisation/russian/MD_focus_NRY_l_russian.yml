l_russian:
 norway_focus: "Дерево фокусов Норвегии"
 haakons_marriage_announced: "§YОбъявлено о Браке Хааконса!§!"
 haakon_married: "§YНаследный принц женился!§!"
 norway.1.t: "Столкновение поезда Аста"
 norway.1.d: "[GetDateText], в результате железнодорожной аварии в Осте в районе Эстердален местный поезд на линии Рерос столкнулся с национальным поездом, идущим из Тронхейма.\n\nПогибло 19 человек, что стало первой крупной катастрофой на норвежской земле за последние [GetYear]. В катастрофе выжили 67 пассажиров.\n\nВ аварии обвиняют правительство и Норвежскую национальную железнодорожную администрацию, которая снизила требования, чтобы убедиться, что железные дороги действительно чисты, прежде чем отправиться в путь."
 norway.1.o1: "Начать полное расследование"
 norway.1.o2: "Молчать"
 norway.2.t: "Брак наследного принца Хаакона"
 norway.2.d: "Король Хаакон объявил парламенту, что его наследник Хаакон, наследный принц Норвегии, женится на своей девушке Метте-Марит Тьессем Хойби.\n\nВыбор невесты вызвал у некоторых удивление, так как Хейби не только простолюдинка, но и имеет маленького сына, рожденного вне брака. Конечно, поддержка правительства и финансирование брака наследного принца обеспечены.\n\nВедь так?"
 norway.2.o1: "Интригует."
 norway.3.t: "Хаакон женится на Метте-Марит Тьессем Хойби"
 norway.3.d: "Норвежский парламент не стал возражать против выбора наследным принцем Хааконом будущей жены. Счастливая пара стала мужем и женой на большой церемонии 25 августа 2001 года. Королевское потомство кажется лишь вопросом времени."
 norway.3.o1: "Поздравляем!"
 norway.4.t: "Норвегия присоединяется к добыче нефти"
 norway.4.d: "После переговоров с британским парламентом Норвегия теперь присоединяется к британскому договору о добыче нефти, который теперь позволяет Норвегии добывать нефть в Северном море."
 norway.4.o1: "Пора добывать это Черное Золото!"
 norway.5.t: "[NRY.GetName] Предлагает возможные инвестиции в нефть"
 norway.5.d: "Норвежская делегация связалась с нашими дипломатами и предлагает возможную нефтяную сделку в их стране. Мы можем инвестировать в их страну, чтобы получить большую долю в их нефтяных акциях и некоторое влияние в их государстве"
 norway.5.a: "Звучит как отличный план"
 norway.5.b: "Нет"
 norway.6.t: "[FROM.GetName] Согласен инвестировать!"
 norway.6.d: "Делегации из [FROM.GetName] согласились инвестировать, и их государственные компании скоро прибудут в Норвегию"
 norway.6.a: "Отлично"
 norway.7.t: "[FROM.GetName] Отклонить предложение"
 norway.7.d: "Делегация из [FROM.GetName] решила, что не желает участвовать в инвестировании в нашу страну. Это досадная потеря для нас обоих"
 norway.7.a: "Прискорбно"
 norway.81.t: "Норвегия предлагает пакеты помощи"
 norway.81.d: "Норвежское правительство недавно направило запрос на предоставление нашему народу пакетов помощи, в частности, для местного бизнеса. Разрешение на поступление этих пакетов помощи может означать, что норвежцы получат значительное влияние в нашей стране"
 norway.81.a: "Пусть присылают"
 norway.81.b: "Нет"
 norway.82.t: "Палестинское правительство отклонило предложение о помощи."
 norway.82.d: "Палестинское правительство отклонило наше предложение о помощи, не объясняя причин"
 norway.82.a: "Хорошо"
 norway.8.t: "Палестинское правительство одобрило пакет помощи"
 norway.8.d: "Палестинское правительство недавно одобрило нашу просьбу о предоставлении помощи их предприятиям, как мы должны действовать?"
 norway.8.a: "Небольшой пакет"
 norway.8.b: "Средний пакет"
 norway.8.c: "Большой пакет"
 norway.91.t: "Где нам искать оружие?"
 norway.91.d: "В настоящее время мы ищем подходящую страну для приобретения оружия. На данный момент Соединенные Штаты и Германия являются нашими лучшими вариантами"
 norway.91.a: "Обратиться к Германию."
 norway.91.b: "Обратиться к США."
 norway.92.t: "Правительство Германии одобряет продажу оружия"
 norway.92.d: "Правительство Германии одобрило наши запросы на оружие. Пакеты скоро прибудут"
 norway.92.a: "Отлично"
 norway.92.b: "Вообще-то, они стоят слишком дорого..."
 norway.9.t: "Правительство США одобряет продажу оружия"
 norway.9.d: "Американское правительство одобрило наши запросы на оружие. Пакеты скоро прибудут"
 norway.9.a: "Отлично"
 norway.9.b: "Вообще-то, они стоят слишком дорого..."
 norway.93.t: "[FROM.GetName] Отклоняет продажу оружия"
 norway.93.d: "[FROM.GetName] заявили, что они не заинтересованы в продаже нам своего оружия"
 norway.93.a: "Черт"
 norway.94.t: "Норвегия хотела бы приобрести оружие"
 norway.94.d: "Норвежское правительство недавно связалось с нами по поводу продажи военного оружия и готово потратить много времени, чтобы заполучить наши запасы"
 norway.94.a: "Хорошо"
 norway.94.b: "Нет"
 norway.10.t: "Правительство Норвегии хотело бы провести встречу."
 norway.10.d: "Норвежское правительство заинтересовано в готовности нашего правительства к созданию новых каналов связи в периоды напряженности, в частности, оно оказывает на нас давление с целью заключения соглашения, согласно которому мы не сможем ответить военной силой в случае сбоя наших каналов связи. Они также заявили о заинтересованности в заключении торговых соглашений, способствующих улучшению торговли между нашими государствами."
 norway.10.a: "Не вижу причин для отказа"
 norway.10.b: "Нет"
 norway.11.t: "Российское правительство согласно"
 norway.11.d: "Российское правительство согласилось с просьбами, выдвинутыми нашими дипломатами на состоявшейся ранее встрече."
 norway.11.a: "Отлично"
 norway.12.t: "Российское правительство отклоняет"
 norway.12.d: "Российское правительство отклонило просьбы, выдвинутые нашими дипломатами на состоявшейся ранее встрече."
 norway.12.a: "Черт"
 norway.14.t: "ЛГБТ"
 norway.14.d: "Наше государство признает право на гражданские союзы между двумя людьми, однако полные браки между гомосексуальными лицами еще не полностью легализованы. Мы можем положить конец этим спорам уже сегодня."
 norway.14.a: "Принять полную легализацию"
 norway.14.b: "Сохранить статус-кво"
 norway.16.t: "Миграционные законы."
 norway.16.d: "Мы относительно легко допускали мигрантов в наш штат, учитывая нашу небольшую численность населения и тот факт, что именно они строили эту страну в период ее упадка. Но сегодня дискуссия изменилась, и нам нужно будет принять решение."
 norway.16.b: "Здесь рады всем желающим!"
 norway.16.a: "Самое время нам установить кое-какие правила."
 norway.100.t: "Норвегия хочет расширить сотрудничество в Северном море"
 norway.100.d: "Норвежское правительство заинтересовано в увеличении добычи нефти на Шетландских островах в надежде привлечь на рынок больше ресурсов."
 norway.100.a: "Хорошо"
 norway.100.b: "Нет"
 norway.101.t: "Правительство Британии соглашается"
 norway.101.d: "Британское правительство приняло наше предложение о добыче большего количества нефти у Шетландских островов и других частей Северного моря, что позволит расширить экономическое сотрудничество."
 norway.101.a: "Отлично!"
 norway.102.t: "Британское правительство отклоняет предложение"
 norway.102.d: "Британское правительство отклонило наше предложение о добыче большего количества нефти у Шетландских островов и других частей Северного моря, подрывая надежды на расширение экономического сотрудничества."
 norway.102.a: "Хорошо."
 norway.103.t: "Норвегия хочет построить для нас инфраструктуру"
 norway.103.d: "В надежде реализовать проект, который улучшит транспортную доступность и экономическую эффективность в Скандинавии, Норвегия заключила контракт с компанией Veidekke, которая займется строительством необходимой инфраструктуры в нашей стране."
 norway.103.a: "Хорошо"
 norway.103.b: "Нет"
 norway.104.t: "[FROM.GetName] согласилась!"
 norway.104.d: "Наши партнеры в [FROM.GetName] согласились на строительство инфраструктуры, чтобы облегчить реализацию проекта, на который мы заключили контракт с Veidekke!"
 norway.104.a: "Отлично"
 norway.105.t: "[FROM.GetName] не заинтересована!"
 norway.105.d: "Наши партнеры в [FROM.GetName] не согласились на строительство инфраструктуры, чтобы облегчить реализацию проекта, на который мы заключили контракт с Veidekke"
 norway.105.a: "Прискорбно"
 norway.106.t: "Норвегия влияет на нашу политику!"
 norway.106.d: "Норвежское правительство недавно предприняло ряд шагов, которые распространяют влияние на все наше общество."
 norway.106.a: "Хорошо."
 NRY_the_norwegian_economy: "Норвежская экономика"
 NRY_the_norwegian_economy_desc: "Норвежская экономика отличается разнообразием, богатыми ресурсами и многим другим. Мы должны изучить варианты развития нашей экономики, чтобы в новом тысячелетии вывести Норвегию на путь величия."
 NRY_north_sea_oil: "Нефть северного моря"
 NRY_north_sea_oil_desc: "Чтобы поддерживать нашу дорогостоящую политику, нам необходимо поддерживать постоянный приток и без того богатых запасов нефти и газа. По этому поводу мы должны сказать: \"Бури, детка, бури!\""
 NRY_increased_cooperation_with_uk: "Расширить сотрудничество с Великобританией"
 NRY_increased_cooperation_with_uk_desc: "Соединенное Королевство может оказаться очень полезным торговым партнером из-за растущего потребительского населения. Мы можем широко использовать их, и они могут получать свои природные ресурсы от дружественных европейских лиц..."
 NRY_investments_into_shetland: "Инвестировать в Шетландию"
 NRY_investments_into_shetland_desc: "Инвестиции в доверие укрепили бы наши отношения с Соединенным Королевством, улучшив нашу торговлю. Наша избыточная ликвидность в казне должна быть использована, не так ли?"
 NRY_statoil: "Statoil"
 NRY_statoil_desc: "Покупка большего количества акций в нефтепереработке улучшит нашу способность расширить наше присутствие, чтобы наши богатые запасы нефти могли быть использованы для наших людей. Идея такова: покупать, покупать, покупать, а затем продавать, продавать, продавать."
 NRY_encourage_union_workers: "Поддержка работников профсоюзов"
 NRY_encourage_union_workers_desc: "Хотя у Европейского Союза есть свои успехи, у него также есть свои недостатки, поэтому мы не решались вступить в него. Администрации по перераспределению занятости Европейского Союза сталкиваются с трудностями, пытаясь найти работу для всех своих профсоюзных работников, если они готовы работать, мы готовы предоставить им жилье!"
 NRY_european_investments: "Европейские инвестиции"
 NRY_european_investments_desc: "Наша нефть сама не выберется из океана, возможно, наши европейские братья помогут нам снизить расходы на её добычу. Наши нефтяные месторождения могут быть богатыми, но наши банковские депозиты могут уменьшиться, если мы попробуем взять все расходы на себя."
 NRY_sintef_research_org: "SINTEF"
 NRY_sintef_research_org_desc: "SINTEF расшифровывается как Stiftelsen for industriell og teknisk forskning, что в переводе с английского означает «Фонд промышленных и технических исследований». Это крупнейшая научно-исследовательская компания во всей Скандинавии, работающая по всему миру. На данный момент компания полностью независима, однако стимулы для более активного сотрудничества с «рекомендованными» торговыми партнерами никому бы не повредили, не так ли?"
 NRY_ekofisk_oil_field: "Нефтяные месторождения Ekofisk"
 NRY_ekofisk_oil_field_desc: "При развитии нефтяного сектора необходимо учитывать наш самый значительный источник нефти — месторождения Экофиск. В этих месторождениях до сих пор находятся миллионы кубических тонн нефти, и если мы увеличим концентрацию добычи там, то сможем обеспечить существование нашего населения на долгие годы. Вопросы охраны окружающей среды, конечно, будут решены позже."
 NRY_production_twenty_fifty: "Продукция 2050"
 NRY_production_twenty_fifty_desc: "Похоже, в обозримом будущем нам придется удвоить добычу нефти, скажем, до 2050 года?"
 NRY_renewable_investments: "Инвестиции в возобновляемую энергию"
 NRY_renewable_investments_desc: "Наша нефть будет поддерживать нас лишь некоторое время, нам нужно начать делать шаги в правильном направлении, в зеленом направлении."
 NRY_scan_wind: "СканВинд"
 NRY_scan_wind_desc: "Наше географическое положение позволяет нам использовать энергию ветра в полной мере. В Норвегии много гор, которые, как и всегда, защитят нас, но теперь с помощью электричества!"
 NRY_statkraft: "Statkraft"
 NRY_statkraft_desc: "В Норвегии есть много возможностей для расширения гидроэнергетики, и это может стать для нас дополнительным шагом на пути к созданию самодостаточной страны, работающей на экологически чистой энергии."
 NRY_electric_vehicle_incentives: "Льготы для электромобилей"
 NRY_electric_vehicle_incentives_desc: "Многие отказываются пересаживаться с автомобилей, работающих на бензине, на электромобили, поскольку не видят зелёного будущего Норвегии. Возможно, немного денег помогут им увидеть наше зеленое будущее."
 NRY_green_cities: "Зеленые города"
 NRY_green_cities_desc: "Городская инфраструктура должна быть адаптирована для полного перехода на электрическое питание многих служб, как государственных, так и частных."
 NRY_charging_stations: "Зарядные станции"
 NRY_charging_stations_desc: "Одна из причин, по которой многие не хотят пользоваться электромобилями, заключается в нехватке зарядных станций, и они считают это совершенно справедливо. Наша задача — закупить больше зарядных станций, чтобы сделать их доступными для всех, так что никаких оправданий быть не должно, верно?"
 NRY_standardize_infrastructure: "Стандартизация инфраструктуры"
 NRY_standardize_infrastructure_desc: "Некоторые подрядчики менее эффективны, чем другие. Если мы внедрим государственную модель, мы сможем уменьшить путаницу в строительных проектах"
 NRY_contract_veidekke: "Контракт с Veidekke"
 NRY_contract_veidekke_desc: "Проект строительства международной автомагистрали - это как раз то, что необходимо для объединения наших скандинавских братьев, это будет способствовать развитию торговли и хороших отношений между всеми нашими народами"
 NRY_gothenburg_cultural_center: "Гибкая лаборатория ZEB"
 NRY_gothenburg_cultural_center_desc: "Лаборатория ZEB Flexible Lab в Тронхейме входит в число самых экологичных строительных проектов в мире и является первой в мире, где доказана возможность учета выбросов CO2 с эквивалентной компенсацией за счет производства энергии."
 NRY_contract_bilfinger_se: "Контракт с Bilfinger SE"
 NRY_contract_bilfinger_se_desc: "Ничто так не говорит об эффективности, как немцы, и Bilfinger SE предложила нам потрясающие возможности для сотрудничества. Норвегия будет развиваться молниеносно!"
 NRY_gas_industry_renovation: "Реконструкция газовой промышленности"
 NRY_gas_industry_renovation_desc: "На данный момент мы должны расширять нашу газовую промышленность, поскольку переход на зеленый режим - это долгий и трудный процесс. Также принимая во внимание тот факт, что когда мы перейдем на зеленый режим, мы сможем использовать нефть и газ исключительно для целей экспорта, положив часть этой зелени себе в карманы."
 NRY_ministry_of_transport_communication: "Министерство транспорта и коммуникации"
 NRY_ministry_of_transport_communication_desc: "Мы должны расширить некоторые базовые общественные потребности, чтобы улучшить качество жизни. В конце концов, мы живем в государстве всеобщего благоденствия."
 NRY_avinor: "Авинор"
 NRY_avinor_desc: "Мы можем повысить эффективность расширения нашей авиационной сети, если создадим дочернюю компанию из Luftfartsverket, где мы будем владеть 100% акций.  Таким образом, мы можем управлять всеми их активами в соответствии с нашим превосходным планированием, которое будет осуществляться в национальном масштабе и гарантировано будет соответствовать национальным интересам."
 NRY_oslo_airport_expansion: "Расширение аэропортов в Осло"
 NRY_oslo_airport_expansion_desc: "По мере роста нашего населения и потока туристов наши аэропорты начинают переполняться, и скоро это сделает путешествия нежелательными и трудными. Мы должны сделать нашу великолепную столицу максимально привлекательной и комфортной."
 NRY_statens_vangsen: "Норвежское дорожное управление"
 NRY_statens_vangsen_desc: "Норвегия - большая страна, и все достопримечательности здесь расположены на большом расстоянии друг от друга. Мы оказали бы большую услугу нашему народу, увеличив субсидии Управлению государственных дорог."
 NRY_facilities_for_norde_norge: "Услуги для Северной Норвегии"
 NRY_facilities_for_norde_norge_desc: "Самый удаленный район материковой части Норвегии, и один из самых недоступных в мире, - это Нур-Норге. Нам нужно это изменить, не так ли?"
 NRY_baneservice: "Бейнсервис"
 NRY_baneservice_desc: "Наша железнодорожная сеть недостаточно развита, инициатива по её расширению поможет с перемещением потребительских товаров по всей стране и сблизит нас всех немного больше."
 NRY_innovations_in_dovre_line: "Инновации на Линии Довре"
 NRY_innovations_in_dovre_line_desc: "Линия Довре постоянно улучшалась и дополнялась. Пришло время для очередного этапа реновации."
 NRY_migration_to_norway: "Миграция в Норвегию"
 NRY_migration_to_norway_desc: "Благодаря гостеприимной атмосфере Норвегии, наша страна очень привлекательна для беженцев, стремящихся к амнистии. Однако со временем это стало проблемой, поскольку в стране существуют разногласия по вопросу о том, следует ли продолжать принимать этих беженцев или же сказать: «Хватит». Каким бы ни был выбор, мы должны определиться с позицией, и как можно скорее."
 NRY_norge_ming: "Норвегия Горнодобывающая промышленность"
 NRY_norge_ming_desc: "Вторым по величине сектором нашей экономики является горнодобывающая промышленность, и поскольку она будет существовать в обозримом будущем, нам следует расширять эту отрасль."
 NRY_deep_sea_expansion: "Расширение на глубоководных участках"
 NRY_deep_sea_expansion_desc: "В наших обширных водных зонах есть еще много месторождений, которые предстоит найти. Мы должны приложить усилия для обнаружения этих месторождений, чтобы дополнить наши запасы."
 NRY_norsk_industri: "Норвежская промышленность"
 NRY_norsk_industri_desc: "Норвежской промышленности чего-то не хватает. Нам нужно приложить усилия, чтобы это исправить."
 NRY_bergen_engines_domestic: "Сохранить Bergen Engines"
 NRY_bergen_engines_domestic_desc: "Крупные инвестиции в нашу автомобильную промышленность могут превратить нас в страну-производителя автомобилей, обеспечив нашей экономике необходимую диверсификацию"
 NRY_bergen_engines_rolls_royce: "Сотрудничество Bergen Engines и Rolls Royce"
 NRY_bergen_engines_rolls_royce_desc: "Мы должны развивать нашу автомобильную промышленность не только за счет количества автомобилей, но и за счет роскоши и качества. Партнерство с немцами приведет к росту этого бизнеса."
 NRY_shipbuilding_investments: "Инвестиции в судостроение"
 NRY_shipbuilding_investments_desc: "В Норвегии около 100 тысяч километров побережья, было бы грехом допустить, чтобы все это пропало даром, не так ли? Мы - народ мореплавателей, вернемся к этому духу!"
 NRY_aker_yards: "Акер Ярдс"
 NRY_aker_yards_desc: "Мы представляем новое направление нашей морской промышленности, Aker Yards! Смотрите, как она строит! Смотрите, как она развивается! Это то, что можно назвать экономикой 'лови и отпускай'."
 NRY_fishing_ports_regulations: "Правила рыболовных портов"
 NRY_fishing_ports_regulations_desc: "У нас действительно огромная рыболовная промышленность, и так как это традиционное занятие в Норвегии, трудно установить ограничения в этой области. Однако окружающая среда больше не может страдать, поэтому мы разработали решение. Крупные рыболовные компании, под нашим контролем, будут объединять множество мелких рыболовных компаний для централизации и разъяснения вопросов по рыбной ловле и её ограничениям."
 NRY_ministry_of_agriculture_and_food: "Министерство сельского хозяйства и продовольствия"
 NRY_ministry_of_agriculture_and_food_desc: "Здесь необходима реформа, поскольку тот дурак, которого мы выберем надзирать за сельским хозяйством и продовольствием, явно слишком долго удерживал свой пост..."
 NRY_food_safety_regulations: "Правила безопасности пищевых продуктов"
 NRY_food_safety_regulations_desc: "Многие из ранее столь необходимых мер политики в области продовольствия должны быть реализованы, чтобы наша реформа министерства была успешной"
 NRY_pesticide_distribution: "Распределение пестицидов"
 NRY_pesticide_distribution_desc: "Мы никогда не думали, что это станет проблемой в нашем климате, но, кажется, Норвегия может быть под угрозой... от насекомых."
 NRY_norwegian_armed_forces: "Вооружённые силы Норвегии"
 NRY_norwegian_armed_forces_desc: "Храбрость и приспособляемость великих вооруженных сил готовы защищать от любой опасности, днем ​​и ночью. Они обучены для любых условий и знают свою миссию — защищать норвежский народ ради его постоянного мира и свободы."
 NRY_norwegian_navy_forces: "Норвежские военно-морские силы"
 NRY_norwegian_navy_forces_desc: "Главная цель нашего военно-морского флота — защита интересов нашей торговли, хотя эти интересы нечасто подвергаются сомнению. Нам по-прежнему необходимы силы сдерживания для контроля над морями, на который мы имеем право."
 NRY_haakonsvern_naval_base: "Военно-морская база Хааконсверн"
 NRY_haakonsvern_naval_base_desc: "Хааконсверн, главная база норвежского флота, нуждается в масштабной реконструкции, поскольку больше не соответствует стандартам, чтобы эффективно служить нашему народу."
 NRY_fleet_logistics_command: "Командование логистики флота"
 NRY_fleet_logistics_command_desc: "Мы получили сообщение, что наш флот неэффективно использует ресурсы, находящиеся под его командованием. Этому будет уделено пристальное внимание. Мы не можем допустить никаких потерь в нашей армаде."
 NRY_norwegian_naval_academy: "Норвежская военно-морская академия"
 NRY_norwegian_naval_academy_desc: "Совершенно очевидно, что некомпетентность недопустима во главе первой линии обороны Норвегии."
 NRY_norwegian_land_forces: "Норвежские сухопутные войска"
 NRY_norwegian_land_forces_desc: "Норвежская армия — это сухопутный род войск Вооруженных сил Норвегии. Сухопутные войска являются старейшим из родов войск Норвегии, созданным как современная военная организация под командованием короля Норвегии."
 NRY_quality_over_quantity: "Качество превыше количества"
 NRY_quality_over_quantity_desc: "Мы всегда были известны своим производственным мышлением без глупостей, каждая задача выполняется с тщательностью, в Норвегии нет места для небрежности!"
 NRY_quantity_over_quality: "Количество превыше качества"
 NRY_quantity_over_quality_desc: "Не стоит полностью игнорировать силу качества. Нам не нужно убеждаться, что все идеально, вплоть до мельчайших деталей. Просто выкладывайте, если это достаточно хорошо. Наша производительность не должна страдать из-за ОКР"
 NRY_norwegian_military_academy: "Норвежская военная академия"
 NRY_norwegian_military_academy_desc: "В нашей академии учатся одни из самых ярких боевых стратегических и геополитических мыслителей. Именно благодаря бережному отношению к нашим военным институтам мы ощущаем преимущества гениальных умов, ориентированных на стратегию, в кабинете исполнительной власти."
 NRY_norwegian_air_forces: "Норвежские военно-воздушные силы"
 NRY_norwegian_air_forces_desc: "Военно-воздушные силы так же необходимы, как и флот для первой обороны Норвегии, наша местность очень пересеченная, что делает Норвегию потенциальной битвой в небе, если бы она вообще произошла. Самое полезное, что наши военно-воздушные силы могут быть использованы по всему миру в качестве миротворческих сил, если бы мы этого захотели."
 NRY_orland_main_air_station: "Главный аэропорт Орланда"
 NRY_orland_main_air_station_desc: "Главная авиационная станция Ørland  - это крупнейшее воздушное поле Норвегии, на котором базируется большинство наших самолетов и которое имеет стратегическое расположение, позволяющее удобно покрывать большую часть Норвегии."
 NRY_technical_advice_from_our_friends: "Технические советы от наших друзей"
 NRY_technical_advice_from_our_friends_desc: "Наши военно-воздушные силы хороши, но не велики. Обмен технологиями с нашими союзниками должен помочь нам в этом."
 NRY_norwegian_airforce_academy: "Норвежская академия ВВС"
 NRY_norwegian_airforce_academy_desc: "Будучи миролюбивой страной, мы сами не видим особых конфликтов, что позволяет нам быть блестящими стратегами и военными мыслителями Европы."
 NRY_cyber_defense_force: "Силы киберзащиты"
 NRY_cyber_defense_force_desc: "Поскольку мир постоянно оцифровывается, мы тоже должны двигаться к более дружественному технологиям будущему. К сожалению, не все намерения являются благовидными, и нам понадобится команда, которая будет следить за безопасностью норвежских сетей."
 NRY_german_technicians: "Танковые инвестиции"
 NRY_german_technicians_desc: "В последнее время наши танки испытывают недостаток. Возможно, мы сможем исследовать их, чтобы выяснить, как сделать их лучше."
 NRY_party_of_labour: "Рабочая партия"
 NRY_party_of_labour_desc: "Партия Труда (не следует путать с коммунистами) - это голос рабочих и решение для нашего народа. Мы являемся образцовым примером работающей социальной демократии и были одной из самых популярных партий с момента своего основания. Мы можем показать миру, что социальная демократия - это справедливая и справедливая система, которая помогает и защищает своих граждан, как настоящее правительство должно. Вперед, за trygghet, muligheter, og fellesskap (безопасность, возможности и сообщество)!"
 NRY_modernization_of_the_welfare_state: "Модернизация системы социального обеспечения"
 NRY_modernization_of_the_welfare_state_desc: "Наш огромный бюджет позволяет нам поддерживать тысячи норвежцев, которым это нужно. Наша социальная защитная сеть обширна, но может быть улучшена."
 NRY_workers_youth_league: "Молодежная лига рабочих"
 NRY_workers_youth_league_desc: "Для того чтобы иметь социалистическую страну, детям нужно социалистическое образование. Они узнают, как функционировать в таком обществе и внести свой вклад в производительность и благополучие нашей страны."
 NRY_privitization_of_state_industries: "Приватизация государственных предприятий"
 NRY_privitization_of_state_industries_desc: "Нам нужно вернуть компании, не являющиеся необходимыми для контроля государства, обратно людям. Таким образом, они почувствуют свою финансовую свободу, а мы сможем сохранить только необходимый контроль над экономикой."
 NRY_forest_conservation_plans: "Планы по сохранению лесов"
 NRY_forest_conservation_plans_desc: "Наша прекрасная природа - самое священное в Норвегии. Мы всегда должны убеждаться, что она никогда не будет осквернена."
 NRY_solar_investments: "Инвестиции в солнечную энергию"
 NRY_solar_investments_desc: "Путь в будущее не лежит через нефть и газ, будущее приходит от природы, от Солнца, ветра и текучих рек. Хотя мы богаты во всех этих областях, кроме солнечного света, мы должны приложить усилия, чтобы отойти от нашей грязной энергии и двигаться к светлому будущему."
 NRY_vaccinations_against_poverty: "Вакцинация от бедности"
 NRY_vaccinations_against_poverty_desc: "Увеличение бюджета наших людей наверняка поднимет их на ноги."
 NRY_transatlantic_cooperation: "Трансатлантическое сотрудничество"
 NRY_transatlantic_cooperation_desc: "Мы должны убедить наших друзей, что мы полностью дружелюбны к Западу. Это должно развеять любые враждебные настроения, которые они могут иметь к нам."
 NRY_intensify_cooperation_with_partners: "Усиление сотрудничества с партнерами"
 NRY_intensify_cooperation_with_partners_desc: "Некоторые тренировочные упражнения должны помочь нашим ближайшим друзьям увидеть хорошее в такой великой социал-демократии, как Норвегия."
 NRY_modernization_quota: "Квота на модернизацию"
 NRY_modernization_quota_desc: "Наши военные технологии устарели. Возможно, наши союзники смогут прислать нам свое лучшее оборудование."
 NRY_weight_behind_gaza: "Поддержка Газы"
 NRY_weight_behind_gaza_desc: "В последние годы Израиль проявил свою жестокость по отношению к палестинцам, что они становятся такими же плохими, как и их угнетатели. Мы стоим на стороне наших братьев в Палестине!"
 NRY_packages_of_aid: "Пакеты помощи"
 NRY_packages_of_aid_desc: "Влияние Израиля на бедных палестинцев и истерзанные войной страны вокруг него оказалось пагубным. Мы можем использовать успех Норвегии, чтобы оказать позитивное влияние на эти страны и облегчить их бремя."
 NRY_constructive_dialogue_with_russia: "Конструктивный диалог с Россией"
 NRY_constructive_dialogue_with_russia_desc: "С момента распада Советского Союза растет напряженность в отношениях между Россией и западным миром. Это не принесет ничего, кроме хаоса в будущее нашей нации, мирные и дружественные переговоры могут помочь обратить вспять эту напряженность и обеспечить более безопасный мир."
 NRY_the_political_earthquake: "Политическое землетрясение"
 NRY_the_political_earthquake_desc: "Пока мы были меньшинством в норвежской политике, мы использовали свое влияние только для того, чтобы оказать давление на правящее правительство и заставить его придерживаться нашей идеальной политики. Теперь, когда мы составляем большинство в правительстве, прогресс в реализации нашей программы будет поразительным!"
 NRY_christan_peoples_party: "Христианская народная партия"
 NRY_christan_peoples_party_desc: "Пришло время для возрождения Христианской народной партии и дальнейшего внедрения христианских ценностей. Народ Норвегии забывает норвежские ценности и традиции, и если мы не укрепим их сейчас, мы станем свидетелями упадка нашей партии и всего, за что она выступает."
 NRY_question_of_homosexuality: "Вопрос о гомосексуальности"
 NRY_question_of_homosexuality_desc: "В нашей партии уже довольно давно существуют разногласия по этому вопросу, и, хотя это уже легализовано, пришло время принять решение внутри нашей собственной партии. За или против?"
 NRY_abortion_matter: "Вопрос об абортах"
 NRY_abortion_matter_desc: "Христианская народная партия выступает против абортов, но решительно одобряет исключения, касающиеся изнасилования и посягательства на жизнь матери."
 NRY_contraception_support: "Поддержка контрацепции"
 NRY_contraception_support_desc: "Наша партия поддерживает использование контрацептивов, которые предотвращают зачатие, но не причиняют вреда потенциальному ребёнку, с целью снижения числа абортов."
 NRY_developmental_aid: "Помощь развивающимся"
 NRY_developmental_aid_desc: "Социалистическая политика не всегда плоха, и либеральные элементы внутри нашей партии считают, что государственная помощь проектам развития предотвратит будущий жилищный пузырь и даст толчок развитию растущей отрасли недвижимости."
 NRY_poverty_and_climate_change_reduction: "Бедность и сокращение изменения климата"
 NRY_poverty_and_climate_change_reduction_desc: "Хотя мы внесли большой вклад в сокращение загрязнения и отмечены как одна из ведущих стран по индексу благосостояния, этого нельзя сказать о наших друзьях во всем мире. Южная Америка особенно борется с этим, поскольку их нельзя беспокоить, сосредоточив внимание на индустриализации до устойчивого уровня, пока они не смогут решить эти проблемы. Мы должны помочь им, насколько это возможно."
 NRY_security_advancements: "Улучшения безопасности"
 NRY_security_advancements_desc: "В опасном мире крайне важно, чтобы мы были готовы к опасностям. Конечно, к опасностям для нашей нефти"
 NRY_for_minorities: "Для меньшинств"
 NRY_for_minorities_desc: "Норвегия в целом является прогрессивной нацией с очень небольшим количеством консервативных экстремистских элементов, ни один из которых не имеет влияния на моральные ценности людей. Увеличение финансирования для меньшинств должно завоевать сердца наших граждан, которые приветствуют их с распростертыми объятиями, а также самих меньшинств, поскольку их признают."
 NRY_refugee_quota: "Квоты для беженцев"
 NRY_refugee_quota_desc: "К сожалению, правительства других стран не столь идеальны, как наше, и многие люди вынуждены покидать свои дома. Мы должны подключиться к международной деятельности, чтобы спасти этих людей. Всем миролюбивым людям всегда рады в Норвегии!"
 NRY_relieve_pressure_from_greece: "Ослабление давления на Грецию"
 NRY_relieve_pressure_from_greece_desc: "Греция приняла гораздо больше беженцев, чем могла бы, и, похоже, они едва справляются и не могут разместить своих беженцев, не говоря уже о приеме новых. У нас есть дом для них в Норвегии, давайте протянем руку помощи нашему европейскому другу."
 NRY_fair_refugee_distribution: "Справедливое распределение беженцев"
 NRY_fair_refugee_distribution_desc: "Все в Норвегии, кто способен работать, должны работать, и это касается беженцев, которых мы с такой благодатью принимаем. Мы можем оптимизировать наш национальный промышленный продукт, распределяя этих людей по домам возле фабрик, где нам нужны рабочие."
 NRY_our_european_allies: "Наши европейские союзники"
 NRY_our_european_allies_desc: "Давайте сделаем заявление о дружбе нашим друзьям по Организации Североатлантического договора, чтобы мир знал, на чьей мы стороне."
 NRY_nato_drilling: "Доктрина НАТО"
 NRY_nato_drilling_desc: "Мы должны использовать доступную нам модель подготовки войск НАТО и их военные академические исследования для улучшения норвежской армии."
 NRY_eea_free_zones: "Свободные зоны ЕЭЗ"
 NRY_eea_free_zones_desc: "Нам следует сократить экономическую дистанцию ​​между нами, скандинавскими странами, и расширить сотрудничество между нашими странами для содействия экономическому росту."
 NRY_tighten_arms_sales: "Ужесточить продажу оружия"
 NRY_tighten_arms_sales_desc: "Мы должны закупить больше оружия для нашей пехоты, в настоящее время оно недостаточно эффективно."
 NRY_maintain_eu_distance: "Сохранение дистанции от ЕС"
 NRY_maintain_eu_distance_desc: "Хотя мы желаем мира нашим друзьям в Европейском Союзе, мы также видим его недостатки и поэтому не будем присоединяться в ближайшее время. Тем не менее, удачи им!"
 NRY_party_of_progress: "Партия прогресса"
 NRY_party_of_progress_desc: "Партия прогресса, наша цель — двигать народ вперед через более консолидированные средства управления. Мы знаем, чего хочет народ: базовые потребности и свободу, и мы можем это обеспечить."
 NRY_shortened_wait_times: "Сокращение времени ожидания в больницах"
 NRY_shortened_wait_times_desc: "В стране, где все имеют бесплатное здравоохранение, оказывается, все стоят в очередях! Абсолютно необходимо продолжить строительство новых больниц. Наши люди не могут ждать, пока их вызовут, истекая кровью в приемной!"
 NRY_nursing_capacity: "Емкость для ухода"
 NRY_nursing_capacity_desc: "Нам нужно больше медсестер для ухода за норвежским народом. Возможно, земельные льготы сработают?"
 NRY_removal_of_inheritence_tax: "Отмена налога на наследство"
 NRY_removal_of_inheritence_tax_desc: "Налог на наследство — один из самых отвратительных законов в норвежском законодательстве, и мы больше не потерпим этого. Деньги народа принадлежат народу!"
 NRY_elderly_focus: "Забота о пожилых"
 NRY_elderly_focus_desc: "В последние годы пожилые люди нашего народа были проигнорированы при принятии законодательных решений, и это прямо-таки позорно. Пожилые люди сделали для нашей страны больше всех остальных, разве мы не должны их защищать?"
 NRY_free_fundemental_society: "Фундаментально свободное общество"
 NRY_free_fundemental_society_desc: "Слишком часто бюрократы и правительство мешают жизни простых граждан. Правительство создано для защиты людей, оно должно быть ограничено, а не люди."
 NRY_youth_discipline: "Дисциплина молодежи"
 NRY_youth_discipline_desc: "Мы можем вдохновить и тем самым мобилизовать молодежь для продвижения национального процветания. За Норвегию!"
 NRY_equal_action: "Равная деятельность"
 NRY_equal_action_desc: "Мы можем пренебречь другими, менее желательными партиями, которые мешают нашему плану прогресса для народа."
 NRY_law_and_order: "Закон и порядок"
 NRY_law_and_order_desc: "Норвегия — страна законов. Если вы их не нарушаете, то нет причин возражать против присутствия полиции, не так ли?"
 NRY_immigration_control: "Следить за иммиграцией"
 NRY_immigration_control_desc: "Мы уже приняли достаточно беженцев и иммигрантов, пора замедлить этот процесс. Если мы можем строить так же быстро, как они иммигрируют, то определенно пора остановиться."
 NRY_avoid_illiterates: "Избегать неграмотных"
 NRY_avoid_illiterates_desc: "Если мы начнем отчуждать неграмотных от общества, это станет отличной мотивацией для начала обучения."
 NRY_state_of_norway: "Государство Норвегия"
 NRY_state_of_norway_desc: "Норвежская бюрократия нуждается в повышении эффективности, для этого её необходимо поставить под строгий контроль со стороны вышестоящих федеральных ведомств, чтобы обеспечить бесперебойную работу."
 NRY_reaffirm_oil_state: "Подтвердить статус нефтяного государства"
 NRY_reaffirm_oil_state_desc: "Мы по-прежнему являемся нефтяной и газовой страной, мы далеки от полного перехода на возобновляемые источники энергии, и так будет еще долгое время."
 NRY_privatization_of_state_dockyards: "Приватизация государственных верфей"
 NRY_privatization_of_state_dockyards_desc: "Богатство Норвегии принадлежит норвежскому народу, одним из крупнейших секторов экономики нашей страны является рыболовство и судостроение. Мы можем начать возвращать власть народу."
 NRY_the_nrk: "NRK"
 NRY_the_nrk_desc: "Норвежская телерадиовещательная корпорация — это государственная телерадиокомпания, являющаяся основным источником новостей для нашего народа. Мы можем использовать наше влияние, чтобы привести её в соответствие с нашими интересами, тем самым объединяя наш народ, информируя его и защищая от любых препятствий или угроз нашей стране."
 NRY_oslo_hydro_TT: "Добавляет в [NRY.GetFlag] §HОстланн§! §HГидроэлектрическая инфраструктура§!"
 NRY_bergen_engines_TT: "Дополнительный доход: §G$0.400§!"
 NRY_productivity_state_TT: "Увеличит §Hпродуктивность§! в [NRY.GetFlag] §HОстланн§! на §H75§!"
 NRY_norge_mining_decision_cat: "Норвегия Горнодобывающая промышленность"
 NRY_norge_mining_decision_cat_desc: "Norge Mining - англо-норвежская горнодобывающая компания, которая занимается разведкой и добычей промышленных металлов и минералов, особенно лития, кварца и рутила.\n\n Более высокий уровень исследования раскопок будет равен большему количеству ресурсов, полученных в результате решений (Per level)."
