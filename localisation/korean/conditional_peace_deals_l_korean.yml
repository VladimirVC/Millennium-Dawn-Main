 CPD_REGIME_CHANGE_BTN: "정권 교체"
 CPD_MIL_BASING_BTN: "군사 기지 이용권"
 CPD_FULL_PUPPET_BTN: "완전 괴뢰화"
 CPD_resource_rights_button_TT: "§Y자원 채굴권§!"
 CPD_resource_rights_button_TT_DELAYED: "§Y자원 채굴권§!을 확보하면 선택한 주의 자원 생산량이 우리 편으로 전환됩니다. 해당 주 자체는 현재 소유자의 통제 하에 남지만, 그곳에서 생산되는 석유, 철강, 알루미늄, 고무, 텅스텐, 크롬만이 우리 경제로 유입됩니다. 이 조치는 다른 평화 협정에 의해 뒤집힐 때까지 유지됩니다."
 CPD_military_basing_button_TT: "§Y군사 기지 이용권§!"
 CPD_military_basing_button_TT_DELAYED: "§Y군사 기지 이용권§!은 우리 군대에게 해당 국가의 영토를 자유롭게 통행할 수 있는 권리를 부여합니다. 우리 군대는 접근 권한이 철회될 때까지 자유롭게 이동하고 주둔할 수 있습니다."
 CPD_full_puppet_button_TT: "§Y완전 괴뢰화§!"
 CPD_full_puppet_button_TT_DELAYED: "§Y완전 괴뢰화§!를 요구하면 이 국가 전체가 우리의 종속국이 됩니다. 국경과 인구는 유지되지만 외교적 독립성을 상실하며, 이들의 경제, 인력, 군대는 우리의 통제를 받게 됩니다. 이 협정에 이미 포함된 개별 주의 괴뢰화 요구는 모두 이 조치에 흡수됩니다."
 CPD_ceasefire_button_TT: "§Y휴전§!"
 CPD_ceasefire_button_TT_DELAYED: "§Y휴전§!은 현재의 전선 상태 그대로 전쟁을 종료합니다. 이전 소유권과 관계없이 각 진영은 현재 통제하고 있는 주를 그대로 유지합니다. 휴전은 §Y720일§! 동안 지속되며, 이 기간이 지나야 어느 쪽이든 상대방에게 다시 전쟁을 선포할 수 있습니다.\n\n휴전과 영토 요구는 하나의 협정에 공존할 수 없습니다. 휴전을 활성화하면 현재 제안에서 모든 주 단계의 항목이 초기화됩니다."
 CPD_war_reparations_button_TT: "§Y전쟁 배상금§!"
 CPD_war_reparations_button_TT_DELAYED: "§Y전쟁 배상금§!은 패전국이 1년 동안 매주 자국 GDP의 일부를 지급하도록 강제합니다. 이 송금은 지급국의 예산에는 새로운 지출로, 수령국의 예산에는 새로운 수입으로 표시됩니다.\n\n[CPD_reparations_preview]"
 CPD_reparations_preview_TT: "이 협정의 예상 송금액: 주당 §Y£[?CPD_rep_preview_temp|.2]B§! (1년간 총 ~§Y£[?CPD_rep_preview_total_temp|.0]B§!)"
 CPD_forced_neutrality_button_TT: "§Y강제 중립화§!"
 CPD_forced_neutrality_button_TT_DELAYED: "§Y강제 중립화§!는 협정 서명 즉시 해당 국가를 소속 세력에서 탈퇴시키고, §Y5년§! 동안 다른 세력에 가입하거나 세력을 창설하는 것을 금지합니다."
 CPD_regime_change_button_TT: "§Y정권 교체§!"
 CPD_regime_change_button_TT_DELAYED: "§Y정권 교체§!는 대상국의 집권당을 현재 우리 국가의 집권당과 동일한 이념의 정당으로 대체합니다. 이들의 연정은 해산되고 우리와 정치적 성향이 같은 지도자가 취임합니다. 새 정부는 2년 동안 §Y전후 정치적 불안정§!을 겪게 되며, 이슬람 국가의 경우 외세에 의해 강제된 통치에 대한 §Y살라프파의 반발§!이 발생할 수 있습니다."
 additional_income_war_reparations_tt: "§Y전쟁 배상금§!(으)로부터 $$[?CPD_reparations_weekly|+3]\n"
 additional_expense_war_reparations_tt: "§Y전쟁 배상금§!(으)로부터 $$[?CPD_reparations_weekly|-3]\n"
 CPD_war_reparations_payer: "전쟁 배상금 (지급 중)"
 CPD_war_reparations_payer_desc: "우리는 평화 협정의 결과로 전쟁 배상금을 지급하고 있습니다. §Y1년§! 동안 매주 일정 금액의 현금이 예산에 추가 지출로 표시됩니다."
 CPD_war_reparations_receiver: "전쟁 배상금 (수령 중)"
 CPD_war_reparations_receiver_desc: "우리는 평화 협정의 결과로 전쟁 배상금을 수령하고 있습니다. §Y1년§! 동안 매주 일정 금액의 현금이 예산에 추가 수입으로 표시됩니다."
 CPD_forced_neutrality_spirit: "강제된 중립"
 CPD_forced_neutrality_spirit_desc: "평화 협정 조건에 따라, 우리 국가는 군사 동맹에 가입하거나 창설하는 것이 금지됩니다."
