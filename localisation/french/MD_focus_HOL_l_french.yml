 HOL_voc_saf_aids_support: "Campagne anti-SIDA en §Y[SAF.GetNameWithFlag]§!"
 faction_manifest_hol_germanic_union: "Nous, fils et filles du Nord ancien, déclarons la renaissance de la Fraternité germanique, une union au-delà des frontières, forgée dans l'esprit et l'héritage. Dans un âge de décadence sans racines, nous nous levons pour restaurer la dignité de nos peuples apparentés, liés par la langue, la culture et l'appel éternel de nos ancêtres. Nous rejetons la division, la corruption et la faiblesse des empires imposés. Notre allégeance ne réside pas dans les nations mais dans l'essence durable de l'âme germanique. Des fjords aux forêts, des plaines aux montagnes, nous nous unissons comme une volonté vivante pour préserver, renforcer et réveiller l'esprit qui autrefois façonna le destin de l'Europe."
 HOL_restoring_royal_authority_nationalist: "Rétablir l'autorité royale"
 HOL_restoring_royal_authority_nationalist_desc: "Le retour de la monarchie à sa place légitime n'est pas sans difficultés. L'inefficacité bureaucratique et l'instabilité politique minent le pays, tandis que les institutions traditionnelles peinent à reprendre le contrôle. Cependant, avec le temps et des efforts, l'autorité royale pourrait bien restaurer l'unité et la force de l'État néerlandais."
 HOL_wic_war_preparations: "Ressusciter le Groot Desseyn"
 HOL_wic_war_preparations_desc: "Inspirés par le Groot Desseyn, ambitieux plan du XVIIe siècle visant à établir la suprématie néerlandaise en Amérique et en Afrique, nous devons nous préparer à la guerre pour restaurer l'héritage de la Compagnie des Indes occidentales. En mobilisant nos forces et en sécurisant les territoires stratégiques, nous pourrons concrétiser la vision d'une domination mondiale des Pays-Bas et reconquérir notre place de puissance maritime."
 HOL_wic_war_preparations_tt: "Will be unlocked when chosing the §YGroot Desseyn Strategy§! for the §YWIC§!"
 HOL_focus_can_only_be_completed_by_coalition_tt: "Cet objectif ne peut être lancé que par le §Y$CHARACTER$§! lorsqu'ils sont dans notre coalition"
 HOL_oranje_nassau-mines: "Reactivate Oranje-Nassau Mines"
 HOL_oranje_nassau-mines_desc: "The Oranje-Nassau collieries in Heerlen were the last Dutch coal mines, closed in 1974 as part of a national energy transition. Reopening them restores domestic steel and aluminium feedstock, reducing import dependency at the cost of increased carbon exposure."
 HOL_military.114.t: "Netherlands Joins the F-35 Program"
 HOL_military.114.d: "The Netherlands has formally committed to the Joint Strike Fighter program, acquiring the F-35 Lightning II as its next-generation multirole fighter. This deepens transatlantic defense ties and strengthens NATO interoperability."
 HOL_military.114.a: "A welcome partner in the program."
 HOL_military.115.t: "Dutch F-35 Procurement in Progress"
 HOL_military.115.d: "The Netherlands has initiated procurement talks for the F-35 Lightning II. Final delivery timelines depend on the program's development schedule, but the commitment marks a significant step in Dutch air force modernization."
 HOL_military.115.a: "We will proceed when the aircraft is ready."
 BEL_referendum_mission: "The Belgian Referendum"
 BEL_referendum_mission_desc: "Belgium has agreed to hold a referendum on the future of the country. The outcome will determine whether Belgium remains a unified state or is absorbed into the Netherlands."
