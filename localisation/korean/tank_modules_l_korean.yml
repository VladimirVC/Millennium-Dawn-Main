 tank_stealth_armor_camelon: "Chameleon Armor"
 tank_stealth_armor_camelon_desc: "Armor that is able to adapt to the coloration, and simulate the texture of, the surrounding environment, allowing the armor to adapt the vehicle's camo to any environment"
 tank_stealth_armor_gen1: "Stealth Armor"
 tank_stealth_armor_gen1_desc: "Advanced stealth armors that better conceal and hide vehicles from enemy observation."
 tank_stealth_armor_thermal: "Thermal Armor"
 tank_stealth_armor_thermal_desc: "Armor systems that allow a tank to conceal or adjust it's heat signature, hiding the vehicle from thermal optics."
 defensive_jammers: "Defensive Jammers"
 defensive_jammers_desc: "Jamming systems that protect an armored vehicle from incoming threats, and make it simpler for the vehicle to engage airborne threats by jamming incoming aircraft systems."
 two_missile_pack: "2 Missile Pack"
 two_missile_pack_desc: "Modular missile launcher system, where missiles are attached to vehicles in varying amounts of packs, allowing for more or less ammunition to be carried."
 four_missile_pack: "4 Missile Pack"
 four_missile_pack_desc: "Modular missile launcher system, where missiles are attached to vehicles in varying amounts of packs, allowing for more or less ammunition to be carried."
 eight_missile_pack: "8 Missile Pack"
