 kasmir_war.1.t: "Failure During Military Training"
 kasmir_war.1.d: "Durante recientes ejercicios militares hubo un accidente que dejó varios soldados heridos y ahora la gente exige respuestas."
 kasmir_war.1.a: "Desafortunado"
 kasmir_war.2.t: "Incident During Combined Arms Training"
 kasmir_war.2.d: "During recent military exercises there was an accident that left several soldiers wounded and some equipment damaged."
 kasmir_war.2.a: "Así es la naturaleza de las cosas."
 kasmir_war.3.t: "Failed Attack Simulation"
 kasmir_war.3.d: "Durante recientes maniobras de distracción fuimos bombardeados por un oponente desconocido. No se pudo determinar la razón exacta y se están haciendo muchas preguntas incómodas."
 kasmir_war.3.a: "Tan malo como puede ser."
 kasmir_war.10.t: "Successful Push"
 kasmir_war.10.d: "We have managed to secure a victory in the latest push against the enemy."
 kasmir_war.10.a: "Como estaba planeado"
 kasmir_war.11.t: "Unsuccessful Push"
 kasmir_war.11.d: "Our enemy managed to repel our attack."
 kasmir_war.11.a: "A minor setback."
 kasmir_war.12.t: "Stalemate After the Attack"
 kasmir_war.12.d: "We did not manage to achieve any meaningful result after the latest attack."
 kasmir_war.12.a: "Unfortunate."
 kasmir_war.13.t: "Enemy Secures a Victory"
 kasmir_war.13.d: "The enemy managed to push through our defense lines and secure a victory."
 kasmir_war.13.a: "Bad news."
 kasmir_war.14.t: "Enemy Makes an Unsuccessful Attack"
 kasmir_war.14.d: "Our enemy attacked our defensive positions but failed to achieve their objectives."
 kasmir_war.14.a: "Well done."
 kasmir_war.15.t: "Stalemate as Enemy Attacks"
 kasmir_war.15.d: "We managed to hinder the enemy's efforts as they attempted to press their attack."
 kasmir_war.15.a: "Could be worse."
 kasmir_war.6.t: "Attack Cancelled"
 kasmir_war.6.d: "Justo cuando estábamos listos para atacar, nuestros enemigos golpearon primero, y ahora tenemos que estar del lado de la defensa."
 kasmir_war.6.a: "I mean, that's good, right?"
 kasmir_war.30.t: "Enemy Captures the Region"
 kasmir_war.30.d: "After recent clashes our enemy has advanced in one of the regions and now controls it almost entirely. We need to act now."
 kasmir_war.30.a: "Déjenlos tenerla."
 kasmir_war.30.b: "Prepararse para una guerra a gran escala"
