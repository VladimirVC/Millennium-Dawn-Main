 MOR.Communist-State: "£MOR_SDV (PADS) 社会民主前衛党"
 MOR.Communist-State_icon: "£MOR_SDV"
 MOR.Communist-State_desc: "アラブ社会主義 - 社会民主前衛党（アラビア語ローマ字表記：Hizb al-Talieat al-Diymuqratiu、フランス語：Parti de l'avant-garde démocratique socialiste、PADS）\n\n社会民主先鋒党は1991年にアリ・ブトゥアラによって設立された。同党の掲げるイデオロギーは、アラブ社会主義、世俗主義、労働組合主義であり、アラブ民族主義と汎アラブ主義が混在している。また、アメリカに対する厳しい批判者であり、あらゆる形態の反帝国主義を掲げる。さらに、パレスチナを熱烈に支持し、イスラエルに対する政策においては反シオニストである。"
 MOR.anarchist_communism_icon: "£MOR_US"
 MOR.Conservative: "£MOR_UGTM (UGTM) モロッコ労働者総連合"
 MOR.Conservative_icon: "£MOR_UGTM"
 MOR.Conservative_desc: "保守的労働主義 - モロッコ労働者総連合（アラビア語ローマ字表記：al-Atihad al-Eamu Lilshaghaalin Bialmaghrib、フランス語：Union générale des travailleurs du Maroc、UGTM）\n\nモロッコ労働者総連合は、モロッコの農業労働者にその起源を持つ。この起源にもかかわらず、民間・公共部門の従業員もUGTMに所属している。一般的に、モロッコ労働者総連合は闘争性が低く保守的と見なされている。国際労働組合総連合に加盟しており、PIと緊密に連携している。"
 MOR.Autocracy: "£MOR_cgem (CGEM) モロッコ企業総連盟"
 MOR.Autocracy_icon: "£MOR_cgem"
 MOR.Autocracy_desc: "雇用主の利益 - モロッコ企業総連盟（アラビア語ローマ字表記：Al-Aitihad Al-Eamu Limuqawalat Al-Maghrib、フランス語：Confédération générale des entreprises du Maroc、CGEM）\n\nモロッコ企業総連盟は、1947年に設立されたモロッコの雇用主団体である。当初は国内の産業資本家の利益を確保するため、富裕な産業資本家グループによって設立された。現在では9万人以上の起業家を代表しており、その約95％が中小企業経営者である。CGEMの投票制度は「一社一票」原則ではなく売上高に基づくため、規模の大きい企業ほど影響力が大きくなる仕組みとなっている。"
 MOR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small (TSA) タンジール・シーア派当局"
 MOR.Vilayat_e_Faqih_desc: "強硬シーア派革命主義 - タンジール・シーア派当局（アラビア語ローマ字表記：Agraw n Shi'a n Tanja、フランス語：Autorité chiite de Tanger, TSA）\n\nタンジェ・シーア権威機構は、モロッコのシーア派政党の中で最も過激と見なされている。論争の的となる人物であるシェイク・ヤセル・ハビブの教えに従い、モロッコ国民にシーア派を広めることに熱心に取り組んでいる。TSAはモロッコにおけるシーア派へのより過激な解釈のため、他のシーア派政党と絶えず対立している。"
 MOR.Mod_Vilayat_e_Faqih: "£MOR_RL (LR) レッサリ・ライン"
 MOR.Mod_Vilayat_e_Faqih_icon: "£MOR_RL"
 MOR.Mod_Vilayat_e_Faqih_desc: "穏健派シーア派革命主義  - レッサリ・ライン（アラビア語ローマ字表記：Tirras n Rasali、フランス語：Ligne Ressali、LR）\n\nレッサリ・ラインは、モロッコのシーア派運動の中で最も顕著な存在と見なされている。当初はモロッコ当局によって禁止されていたが、政府による禁止を回避するため、市民団体ではなく商業団体へと転換を図った。その主たる目的は、シーア派法学をモロッコ政府に導入し、イスラム共和国をモデルとしつつもモロッコ王国独自の新たな国家を樹立することにある。"
 MOR.Kingdom: "£MOR_RV (PRV) 再生美徳党"
 MOR.Kingdom_icon: "£MOR_RV"
 MOR.Kingdom_desc: "イスラム原理主義 - 再生美徳党（アラビア語ローマ字表記：Hizb Al-Nahdat Walfadila、フランス語：Parti de la Renaissance et de la Vertu）\n\n再生美徳党は、モロッコにおけるより深く根本的な法の支配の確立を目指すイスラム主義政党である。同党はモロッコ社会におけるより右寄りの層から支持を受けており、そこには死体愛好や自慰行為の合法性、女性の性玩具使用に関する奇妙なファトワで知られる元イマーム、アブデルバリ・ゼムザミのような物議を醸す人物も含まれる。しかしながら、同党はモロッコで勢力を拡大しようとしているサラフィスト系政治家も包含している。"
 MOR.Caliphate_desc: "サラフィー・ジハード主義 - モロッコ・イスラム戦闘員グループ（フランス語：Groupe Islamique Combattant Marocain, GICM）\n\nモロッコ・イスラム戦闘員グループは、モロッコ、北アフリカ、西ヨーロッパで活動するスンニ派イスラム過激派組織であり、その主な目的は、モロッコにイスラム政府を樹立し、立憲君主制を打倒することである。1998年、モハメッド・アル・ゲルブジによって、アラブ・ムジャヒディーンとともに戦ったアラブ系アフガン帰還兵たちによって結成された。この組織は、主に西ヨーロッパに住むモロッコ人ディアスポラから構成されており、北アフリカとヨーロッパ全域に多くの潜伏工作員を持つと考えられている。"
 MOR.Neutral_Muslim_Brotherhood: "£MOR_JD (PJD) 公正発展党"
 MOR.Neutral_Muslim_Brotherhood_icon: "£MOR_JD"
 MOR.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 ｰ 公正発展党（アラビア語ローマ字表記：Hizb Al-Eadalat w Al-Tanmia、フランス語：Parti de la justice et du développement、標準モロッコ・タマジクト語ローマ字表記：Akabar n Tanzzarfut d Tanflit、PJD）\n\n公正発展党は1967年末、イスラム民主主義・王党派・民族主義政党として結成された。人民運動からの分裂により、政治スペクトルにおける右派保守派の一部を代表している。現在、PJDはモロッコ政治における主要な勢力の一つである。"
 MOR.Neutral_Autocracy: "£MOR_PM (MP) 人民運動"
 MOR.Neutral_Autocracy_icon: "£MOR_PM"
 MOR.Neutral_Autocracy_desc: "君主制 - 人民運動（アラビア語ローマ字表記：Al-Harakat Al-Shaebia、フランス語Mouvement populaire：、標準モロッコ・タマジクト語ローマ字表記：Amussu Amdnan、MP）\n\n人民運動は1957年、アブデルカリーム・アル＝ハティブとマジュビ・アヘルダーンにより、君主制支持・農村利益・自由主義政党として設立された。同党は公式にはモロッコ国王を支持する自由主義政党である。"
 MOR.Neutral_conservatism_icon: "£MOR_IP"
 MOR.oligarchism_icon: "£MOR_AM"
 MOR.Neutral_Libertarian_icon: "£MOR_CU"
 MOR.Neutral_green: "£MOR_GL (PGV) 緑の左派党"
 MOR.Neutral_green_icon: "£MOR_GL"
 MOR.Neutral_green_desc: "緑の政治 - 緑の左派党（アラビア語ローマ字表記：Hizb Al-Yasar Al'Akhdar、フランス語：Parti de la gauche verte、PGV）\n\n緑の左派党はモロッコの緑の党であり、自らをエコ社会主義と緑の政治を掲げる政党と位置付けている。同党はモロッコにおける最前線の緑の党として、国内における気候変動対策法の強化、再生可能エネルギーの推進、その他の環境政策の確立を目指している。"
 MOR.neutral_Social: "£MOR_FDF (FFD) 民主勢力戦線"
 MOR.neutral_Social_icon: "£MOR_FDF"
 MOR.neutral_Social_desc: "民主社会主義 - 民主勢力戦線（アラビア語ローマ字表記：Jabhat Al-Qiwaa Al-Diymuqratia、フランス語：Front des Forces Démocratiques、FFD）\n\n民主勢力戦線は、1997年に進歩社会主義党からの分裂により結成された民主社会主義政党である。"
 MOR.Neutral_Communism: "£MOR_DW (PVDT) - 民主の道"
 MOR.Neutral_Communism_icon: "£MOR_DW"
 MOR.Neutral_Communism_desc: "マルクス・レーニン主義 - 民主の道（アラビア語ローマ字表記：Al-Nahj Al-Diymuqratiu Al-Eumaaliu, フランス語：La Voie Democratique, PVDT）\n\n1995年、ムスタファ・ブラマによりホッジャ主義共産主義、反修正主義政党として結成。モロッコの過激派による約10年にわたる弾圧と横行する抑圧の後、党は合法化された。"
 MOR.Nat_Populism: "£MOR_DPI (PD) 民主独立党"
 MOR.Nat_Populism_icon: "£MOR_DPI"
 MOR.Nat_Populism_desc: "右派ナショナリズム - 民主独立党（アラビア語ローマ字表記：Hizb Al-Shuwraa w Al-Aistiqlal、フランス語：Parti Démocratique et de l'Indépendance、PD）\n\n民主独立党は、保護領時代である1946年にモハメド・ハッサン・ワザニによって設立された。同党は、フランスとスペインからのモロッコの独立を熱烈に支持した右派ナショナリスト政党である。"
 MOR.Nat_Fascism: "£IRQ_Nat_Autocracy_small (ALF) アラブ解放戦線"
 MOR.Nat_Fascism_icon: "£IRQ_Nat_Autocracy_small"
 MOR.Nat_Fascism_desc: "イラク・バアス主義 - アラブ解放戦線 (アラビア語ローマ字表記：Jabhat at-Tahrir al-Arabiyya、フランス語：Front de libération arabe、標準モロッコ・タマジクト語ローマ字表記：Tirra n Thrir n l-Srabe、ALF)\n\nアラブ解放戦線は、イラク・バアス党の思想を継承するモロッコの小規模な少数政党である。モロッコ政治の大きな流れの中では比較的知られておらず、今日に至るまでその状態が続いている。"
 MOR.Nat_Fascism_CUN: "£MOR_DC (CUN) 国民統一連合"
 MOR.Nat_Fascism_CUN_icon: "£MOR_DC"
 MOR.Nat_Fascism_CUN_desc: "ファシスト - 国民統一連合（アラビア語ローマ字表記：Jamaeat al-Wahdat al-Watania、フランス語：Collectif d'unité nationale、CUN）\n\n国民統一連合は、2010年代中盤から後半にかけてモロッコで結成された極右政党である。構成員の大半は、様々な名称のオンラインフォーラム出身者である。多くのメンバーは反黒人主義に合致する見解を支持し、純白のムーア人種と国家を擁護している。"
