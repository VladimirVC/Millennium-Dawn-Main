l_russian:
 lithuania.1.t: "Вопрос о Мажейкю Нафта"
 lithuania.1.d: "Единственный в Литве нефтеперерабатывающий завод Mažeikių Nafta стал горячей точкой геополитики. Как польский энергетический гигант PKN Orlen, так и российский консорциум выразили заинтересованность в приобретении объекта. Сохранение его в руках государства остается одним из вариантов, хотя и дорогостоящим."
 lithuania.1.a: "Продать PKN Orlen"
 lithuania.1.b: "Продать российскому консорциуму"
 lithuania.1.c: "Держите его национализированным"
 lithuania.2.t: "PKN Orlen Приобретает Литовский нефтеперерабатывающий завод"
 lithuania.2.d: "PKN Orlen завершила сделку по приобретению литовского нефтеперерабатывающего завода Mažeikių Nafta, расширяя энергетические интересы Польши в Балтийском регионе."
 lithuania.2.a: "Разумная инвестиция"
 lithuania.3.t: "Пожар на Мажейкяйском нефтеперерабатывающем заводе"
 lithuania.3.d: "Подозрительный пожар вспыхнул на Мажейкяйском нефтеперерабатывающем заводе. Выбор времени, вскоре после продажи российским интересам, вызвал спекуляции о саботаже и поднял вопросы о безопасности энергетической инфраструктуры Литвы."
 lithuania.3.a: "Указывать пальцем на Москву"
 lithuania.3.b: "Начните тихое расследование"
 lithuania.10.t: "Будущее Игналины"
 lithuania.10.d: "Европейский союз потребовал от Литвы закрыть Игналинскую атомную электростанцию, на которой установлены два реактора РБМК - той же конструкции, что вышла из строя в Чернобыле. Закрытие является условием членства в ЕС, но Игналина поставляет большую часть электроэнергии Литве. Завод-заменитель мог бы быть построен совместно с Польшей и странами Балтии."
 lithuania.10.a: "Договаривайтесь о замене суставов с нашими соседями"
 lithuania.10.b: "Продолжайте работать в Игналине"
 lithuania.10.c: "Закройте его без замены"
 lithuania.11.t: "Предложение Литвы о сотрудничестве в ядерной области"
 lithuania.11.d: "Литва предложила Польше совместно профинансировать строительство Висагинской атомной электростанции взамен устаревающей Игналинской. Проект укрепит энергетическую независимость стран Балтии и углубит региональные связи, но требует значительных инвестиций."
 lithuania.11.a: "Соглашаетесь на софинансирование проекта"
 lithuania.11.b: "У нас есть другие приоритеты"
 lithuania.12.t: "Польша согласна на ядерное сотрудничество"
 lithuania.12.d: "Польша согласилась совместно финансировать строительство Висагинской атомной электростанции. Строительство может начаться, хотя на завершение проекта уйдут годы и потребуются значительные ресурсы."
 lithuania.12.a: "Начать строительство"
 lithuania.13.t: "Польша отказывается от сотрудничества в ядерной области"
 lithuania.13.d: "Польша отказалась участвовать в Висагинском проекте. Теперь Литва должна самостоятельно решить судьбу Игналины."
 lithuania.13.a: "Продолжайте работать в Игналине, несмотря на риски"
 lithuania.13.b: "Закройте его — мы обойдемся без него"
 lithuania.14.t: "Референдум на Висагинской атомной станции"
 lithuania.14.d: "После многих лет строительства проект Висагинской атомной электростанции вынесен на общенациональный референдум. Общественное мнение разделилось между теми, кто считает это необходимым для энергетической безопасности, и теми, кто обеспокоен ядерной безопасностью и перерасходом средств."
 lithuania.14.a: "Люди одобряют это растение"
 lithuania.14.b: "Люди отвергают этот проект"
 lithuania.15.t: "Строительство завода в Висагинасе завершено"
 lithuania.15.d: "Совместная литовско-польская Висагинская атомная электростанция находится в рабочем состоянии. Этот проект представляет собой важную веху в энергетическом сотрудничестве стран Балтии и обеспечении региональной независимости от российского газа."
 lithuania.15.a: "Триумф сотрудничеств"
 lithuania.16.t: "Международное давление на Игналину"
 lithuania.16.d: "Европейский союз выпустил официальное предупреждение в связи с продолжающейся эксплуатацией Литвой Игналинской атомной электростанции. На столе переговоров стоят санкции и потеря структурных фондов ЕС, если реакторы чернобыльского типа не будут остановлены."
 lithuania.16.a: "У нас нет выбора — отключите его"
 lithuania.16.b: "Сопротивляйтесь давлению"
 LIT_refinery_sale_revenue: "Выручка от продажи нефтеперерабатывающего завода"
 LIT_refinery_sale_revenue_desc: "Доходы от продажи Mažeikių Nafta временно пополняют национальный бюджет."
 LIT_russian_energy_leverage: "Российский энергетический рычаг"
 LIT_russian_energy_leverage_desc: "Продажа единственного в Литве нефтеперерабатывающего завода российским интересам дала Москве экономические рычаги воздействия на энергетическую политику Литвы."
 LIT_nationalized_refinery: "Национализированный нефтеперерабатывающий завод"
 LIT_nationalized_refinery_desc: "Литва сохранила государственную собственность Mažeikių Nafta, обеспечивая ресурсную безопасность за счет операционной эффективности."
 LIT_energy_deficit: "Дефицит энергии"
 LIT_energy_deficit_desc: "Закрытие Игналинской атомной электростанции без замены поставило Литву в зависимость от импорта дорогостоящих энергоносителей."
 LIT_visaginas_nuclear_plant: "Висагинская атомная электростанция"
 LIT_visaginas_nuclear_plant_desc: "Новая электростанция в Висагинасе обеспечивает чистую и надежную энергию и является символом регионального сотрудничества стран Балтии."
 lithuania_news.1.t: "Mažeikių Nafta Sold"
 lithuania_news.1.d_poland: "Литва продала свой единственный нефтеперерабатывающий завод Mažeikių Nafta польскому энергетическому гиганту PKN Orlen. Эта сделка углубляет прибалтийско-польские экономические связи и рассматривается в Брюсселе как шаг к снижению региональной энергетической зависимости от России."
 lithuania_news.1.d_russia: "Литва продала свой единственный нефтеперерабатывающий завод Mažeikių Nafta консорциуму, поддерживаемому Россией. Критики предупреждают, что сделка дает Москве стратегические рычаги влияния на энергетическую инфраструктуру Литвы."
 lithuania_news.1.a: "Краеугольный камень нашего энергетического будущего"
 lithuania_news.1.b: "Долгожданная экспансия на балтийский рынок"
 lithuania_news.1.c: "Еще один шаг вперед в регионе"
 lithuania_news.1.d: "Энергетическая безопасность в странах Балтии меняется"
 lithuania_news.1.e: "Примечание в европейской энергетической политике"
 lithuania_news.2.t: "Закрыта Игналинская атомная электростанция"
 lithuania_news.2.d: "Литва закрыла Игналинскую атомную электростанцию, выведя из эксплуатации последний из своих реакторов РБМК советской эпохи. Закрытие отвечает ключевому требованию о вступлении в ЕС, но оставляет страну зависимой от импорта энергоносителей до тех пор, пока не будет найден заменяющий источник."
 lithuania_news.2.a: "Свет останется гореть — каким - то образом"
 lithuania_news.2.b: "Победа в области ядерной безопасности в Европе"
 lithuania_news.2.c: "Одним реактором в мире стало меньше"
 lithuania_news.3.t: "Завершена строительство Висагинской атомной электростанции"
 lithuania_news.3.desc: "Заработала новая литовская атомная электростанция в Висагинасе, построенная при польском софинансировании. Этот объект восстанавливает энергетическую самодостаточность страны и знаменует собой знаковое достижение в Балтийском региональном сотрудничестве."
 lithuania_news.3.a: "Энергетическая независимость, наконец-то"
 lithuania_news.3.b: "Наши инвестиции в регион окупаются"
 lithuania_news.3.c: "Новая глава энергетической политики стран Балтии"
 lithuania_news.3.d: "Страны Балтии обеспечивают свое энергетическое будущее"