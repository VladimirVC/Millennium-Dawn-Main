 form_AVG_category: "アンジュー帝国"
 form_AVG_category_desc: "アンジュー帝国は、12世紀から13世紀にかけてヨーロッパの覇権を握った帝国であり、プランタジネット朝はイングランド、フランスの広範な地域、およびその他の領土を統治していた。この帝国は、大陸全体に及ぶ文化的・政治的影響力によって特徴づけられていた。アンジュー帝国を復活させることは、これらの歴史的な土地を再び一つの旗の下に結集させるという、画期的な偉業となるだろう。"
