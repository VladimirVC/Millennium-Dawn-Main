 SOV_500_days_category: "Program 500 dni"
 SOV_500_days_category_desc: "Program 500 Dni był inicjatywą zaproponowaną w 1990 roku przez radzieckiego ekonomistę Stanisława Szatalina i przewodniczącego Komisji Reform Gospodarczych Grigorija Jawlińskiego. Głównym celem programu było przejście od gospodarki planowej do kapitalizmu rynkowego poprzez ograniczenie roli państwa w gospodarce. Niestety, program nigdy nie został wdrożony, ponieważ radziecki establishment uznał go za zbyt radykalny.\nPo błędach terapii szokowej Gajdara i nieudolnym zarządzaniu gospodarką przez poprzednie rządy, obecna sytuacja gospodarcza wymaga od nas podjęcia ponownej próby i pełnego wdrożenia Programu 500 Dni, aby dokończyć proces przechodzenia na nowoczesną gospodarkę rynkową!"
