 leave_antarctica_cannot_be_stopped_tt: "§R这一行动无法阻止。§!"
 leave_antarctica_treaty_warning_tt: "§R警告：§!\n在§C南极洲§!设有§Y研究站§!的情况下退出§C南极条约§!，将引起条约成员国的全球反应，包括潜在的制裁和外交反弹。建议在退出该条约之前拆除§C南极洲§!的所有研究站，以避免产生负面后果。\n\n然而，如果你选择在拥有南极洲的情况下退出该条约，没有任何条款能够阻止你在§C南极洲§!开展被禁止的活动，例如资源开采或军事存在，这可能会对贵国的全球声誉造成严重后果。"
