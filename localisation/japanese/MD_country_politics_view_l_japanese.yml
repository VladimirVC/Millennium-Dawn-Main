 revolt_party_TT: "§HStart Revolution as [party_name_by_index] ([party_support_by_index])§!\n\n§YPrerequisite:§!\n[!revolt_button_click_enabled]\n§YEffects:§!\n[!revolt_button_click]"
 boost_party_TT: "§HBoost [party_name_by_index] ([party_support_by_index])§!\nIn a bid to dilute the power of our real political opponents, we can use our political machine to boost the popularities of other parties\n\n§YPrerequisite:§!\n[!boost_button_click_enabled]\n§YEffects:§!\n[!boost_button_click]"
 attack_party_TT: "§HAttack [party_name_by_index] ([party_support_by_index])§!\nWe can use disinformation campaigns and dirt we have collected on major parties outside the government to strike hard at their popularity - ensuring they aren't in a position to challenge our position of power. Since any attention at all will bring popularity to minor parties, this will only work with major parties over the election threshold of [?election_threshold|%0]\n\n§YPrerequisite:§!\n[!attack_button_click_enabled]\n§YEffects:§!\n[!attack_button_click]"
 ban_party_TT: "§HBan [party_name_by_index] ([party_support_by_index])§!\nBy outlawing a political party or movement makes sure they can never win power through elections, and persecuting their members easier.\n\n§YPrerequisite:§!\n[!ban_button_click_enabled]\n§YEffects:§!\n[!ban_button_click]"
 allow_party_TT: "§HLegalize [party_name_by_index] ([party_support_by_index])§!\nThe time has come for us to lift our ban and let their members run for public offices and organize legally.\n\n§YPrerequisite:§!\n[!allow_button_click_enabled]\n§YEffects:§!\n[!allow_button_click]"
