 zombie.8.d.africa: "Мертвые ходят по Земле. Орда зомби разразилась в Центральной Африке и быстро уничтожает наше население посредством инфекций и прямого хищничества. Эксперты назвали конфликт \"Вспышкой\", но война за выживание человечества только началась. Отчаявшиеся страны уже закрывают свои границы."
 zombie.8.d.east_asia: "Мертвые ходят по Земле. Орда зомби разразилась в Центральной Африке и быстро уничтожает наше население посредством инфекций и прямого хищничества. Эксперты назвали конфликт \"Вспышкой\", но война за выживание человечества только началась. Отчаявшиеся страны уже закрывают свои границы."
 zombie.8.d.multiple: "Мертвые ходят по Земле. Орда зомби разразилась одновременно на трех континентах — поразив сразу Индию, Центральную Африку и Корейский полуостров, — быстро уничтожая наше население в результате инфекций и прямого хищничества. Эксперты назвали конфликт \"Вспышкой\", но война за выживание человечества только началась. Отчаявшиеся страны уже закрывают свои границы."
 zombie_capitulation.4.t: "Вспышка заканчивается"
 zombie_capitulation.4.d: "Вопреки всем ожиданиям, человечность восторжествовала. Орда зомби была разбита — ее территории освобождены, ее стаи уничтожены, последний из зараженных упокоен. Города, пострадавшие от апокалипсиса, начинают долгую работу по восстановлению. Мир изменился навсегда, но он остается неизменным."
 zombie_capitulation.4.a: "Человечество терпит"