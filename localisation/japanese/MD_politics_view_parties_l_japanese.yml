 ROM.socialism_psd: "£ROM_socialism 社会民主党"
 ROM.socialism_psd_icon: "£ROM_socialism"
 ROM.socialism_psd_desc: "(Big Tent) - Social Democratic Party (Romanian: Partidul Social Democrat, PSD)\n\nTracing it's roots into the former Communist Party of Romania (PCR) the PSD is a result of the merger of the Party of Social Democracy in Romania and two smaller left-leaning parties, and is the successor to the Democratic National Salvation Front, which was a party led by former officials within the communist party which took power shortly after the fall of the regime of Nicolae Ceausescu. While the PSD noninally has a centre-left and pro-European outlook in reality it takes a more pragmatic position with a combination of left-wing nationalism, labourism, third way social democracy and populism. The PSD also has a more socially conservative and nationalist stance compared to it's fellow European colleagues, with many within the party having eurosceptic positions, but overall the main strength of the PSD lies in it's ability to take pragmatic positions which assures it's continued strength within Romanian politics. The party has also been accused of many corruption scandals during it's initial post-communist governance as well as the fact of harboring many ex-ceausescu officials which were a pivotal part of his regime"
 ROM.Neutral_green: "£ROM_neutral_green ルーマニア生態党"
 ROM.Neutral_green_icon: "£ROM_neutral_green"
 ROM.Nat_Autocracy: "£ROM_nat_autocracy ルーマニア軍"
 ROM.Nat_Autocracy_icon: "£ROM_nat_autocracy"
 ROM.Neutral_conservatism_pd: "£ROM_neutral_social Democratic Party"
 ROM.Neutral_conservatism_pd_icon: "£ROM_neutral_social"
 ROM.Neutral_conservatism_pd_desc: "(Liberal Conservatism) - Democratic Party (Romanian: Partidul Democrat, PD)\n\nThe Democratic Party was founded in 1993 as the successor to the National Salvation (FSN) by Petre Roman the first non-communist prime minister of Romania after the revolution of 1989. The Democratic Party, is centered around Traian Basescu, former minister for transport and is pushing for the consolidation of the free market and the maintenance of Romania's flat tax rate of 16%. They also support reforming the Romanian Constitution in order to bring about decentralization in administration and give greater power to the eight development regions."
 ROM.Neutral_conservatism_pdl: "£ROM_neutral_conservatism_PDL Democratic Liberal Party"
 ROM.Neutral_conservatism_pdl_icon: "£ROM_neutral_conservatism_PDL"
 ROM.Neutral_conservatism_pdl_desc: "(Liberal Conservatism) - Democratic Liberal Party (Romanian: Partidul Democrat Liberal, PDL)\n\nThe Democratic Liberal Party was founded in 2007 as the result of a merger between the Democratic Party and the PNL breakaway Liberal Democratic Party. The Democratic Liberal Party is centered around Traian Basescu, former minister for transport and is pushing for the consolidation of the free market and the maintenance of Romania's flat tax rate of 16%. They also support reforming the Romanian Constitution in order to bring about decentralization in administration and give greater power to the eight development regions."
 ROM.Neutral_conservatism_pmp: "£ROM_neutral_conservatism People's Movement Party"
 ROM.Neutral_conservatism_pmp_icon: "£ROM_neutral_conservatism"
 ROM.Neutral_conservatism_pmp_desc: "(Liberal Conservatism) - People's Movement Party (Romanian: Partidul Miscaera Popular, PMP)\n\nThe People's Movement Party was founded in 2014 by a group of former PDL members under Traian Basescu opposing the merger of the Democratic Liberal Party with the National Liberal Party. The People's Movement Party is centered around former president Traian Basescu and it adheres to christian democratic, conservative and economically liberal policies."
 ROM.neutral_Social_fd: "£ROM_neutral_social_pro Democratic Force"
 ROM.neutral_Social_fd_icon: "£ROM_neutral_social_pro"
 ROM.neutral_Social_fd_desc: "(Social Democracy) - Democratic Force (Romanian: Forta Democrata, FD)\n\nThe Democratic Force was founded in 2004 under Petre Roman the first non-communist prime minister of Romania after the revolution of 1989, after a split between the democratic's party conservative and socialist wings. Democratic Force is pushing for a European Social Democratic model for Romania, with a big focus on greater development of Romanian Democratic institutions, and it also is opposed to nationalist rhetoric, as opposed to the PDSR which has utilized it in the past."
 ROM.Nat_Fascism_prm: "£ROM_nat_populism 大ルーマニア党 - §Gネオ・レジオナーレ§!"
 ROM.Nat_Fascism_prm_icon: "£ROM_nat_populism"
 ROM.Nat_Fascism_prm_desc: ""
 ROM.Neutral_Autocracy_frn: "£generic_Nat_Autocracy_small 国民復興戦線"
 ROM.Neutral_Autocracy_frn_icon: "£generic_Nat_Autocracy_small"
 ROM.Neutral_Autocracy_frn_desc: "権威主義的保守主義 - 国民復興戦線（ルーマニア語：Frontul Renasterii Nationale, FRN）\n\n1938年、ルーマニアのカロル2世がすべての政党を禁止し、1923年憲法を停止する決定を下した後、国民復興戦線は唯一の独占政党として創設された。復活したFRNは、パウロ王の政治的手段であるという点で、かつてと全く同じ目的を持っている。同党の主なイデオロギー的展望は、ナショナリズム、保守主義、君主制、そしてコーポラティズムにある。"
 SLV.Western_Autocracy_Modern_Centre_Party: "£SLV_Modern_Centre_Party （SMC）現代中央党"
 SLV.Western_Autocracy_Modern_Centre_Party_icon: "£SLV_Modern_Centre_Party"
 SLV.Western_Autocracy_Modern_Centre_Party_desc: "親西欧独裁体制 - 現代中道党（スロベニア語：Stranka Modernega Centra）は、中道から中道左派の自由主義政党である。同党は、法の支配の推進、経済の自由化、そして国家機構による官僚的な負担を軽減するための規制緩和を掲げている。創設者のミロスラフ・ツェラル・ジュニアは、社会危機を克服するために必要な基盤を議会政党が提供すべきだと主張し、この党を設立した。同党は、現在の与党連合に不満を抱く幅広い層の穏健派有権者を包括的に受け入れることを目指している。"
 SLV.Western_Autocracy_Konkretno: "£SLV_Concretely コンクレトノ"
 SLV.Western_Autocracy_Konkretno_icon: "£SLV_Concretely"
 SLV.Western_Autocracy_Konkretno_desc: "親西欧独裁体制 - コンクレトノ（スロベニア語：Konkretno）は、現代中道党と経済活動党が合併し、さらに小規模な地方政党を吸収して結成された保守・自由主義政党である。この合併に伴い、コンクレトノの欧州自由民主同盟への加盟は終了した。"
 SLV.liberalism_Liberal_Democracy_of_Slovenia: "£SLV_Liberal_Democracy_of_Slovenia (LDS) スロベニア自由民主党"
 SLV.liberalism_Positive_Slovenia: "£SLV_Positive_Slovenia (PS) ポジティブなスロベニア"
 SLV.liberalism_Positive_Slovenia_desc: "Liberalism - Positive Slovenia (Pozitivna Slovenija) is a social-liberal party founded in 2011 by Ljubljana mayor Zoran Janković. It won the most seats in the December 2011 election but failed to form a government, then led the cabinet from 2013 to 2014 under Alenka Bratušek before a leadership dispute split the party."
 SLV.liberalism_List_of_Marjan: "£SLV_List_of_Marjan_sarec List of Marjan Šarec (LMŠ)"
 SLV.liberalism_List_of_Marjan_icon: "£SLV_List_of_Marjan_sarec"
 SLV.liberalism_List_of_Marjan_desc: "自由主義 - マルヤン・シャレツのリスト（スロベニア語：Lista Marjana Šarca）は、元ジャーナリスト、俳優、コメディアンであるマルヤン・シャレツによって設立された社会自由主義・ポピュリスト政党である。当初は、2014年のスロベニア地方選挙におけるカムニク市議会選挙に立候補するため、シャレツの初代市長在任中に「マルヤン・シャレツのリスト - カムニク前進」として結成され、地方政党としてスタートした。その後、LMŠは勢力を拡大し、2018年に国政の舞台に参入すると、瞬く間に世論調査で首位に立った。"
 SLV.liberalism_ZDEJ: "£ZDEJ (Z.DEJ) 緑の行動党"
 SLV.liberalism_icon_ZDEJ: "£ZDEJ"
 SLV.liberalism_ZDEJ_desc: "自由主義 - 緑の行動党（スロベニア語：Stranka Zelenih Dejan）は、社会自由主義、緑の自由主義、進歩主義、親欧州主義を掲げる中道左派の政党である。同党は、様々な環境対策を通じて、産業の発展と環境保全の調和を図っている。その活動は、誰もが利用しやすい医療の実現を推進し、雇用の拡大を目指している。さらに、同党は教育制度の改革や学校のデジタル化を提唱している。レベン前党首によれば、スロベニアは世界経済フォーラムにおいて、世界で最も競争力のある国トップ20入りを目指すべきであるとしている。"
 SLV.liberalism_Freedom: "£SLV_freedom 自由運動"
 SLV.liberalism_icon_Freedom: "£SLV_freedom"
 SLV.liberalism_ZDEJ_Freedom_desc: "自由主義 - 自由運動（スロベニア語：Gibanje Svoboda）は、社会自由主義、緑の自由主義、進歩主義、親欧州主義を掲げる中道左派の政党である。同党は、様々な環境対策を通じて、産業の発展と環境保全の調和を図っている。その活動は、誰もが利用しやすい医療の実現を推進し、雇用の拡大を目指している。さらに、同党は教育制度の改革や学校のデジタル化を提唱している。レベン前党首によれば、スロベニアは世界経済フォーラムにおいて、世界で最も競争力のある国トップ20入りを目指すべきであるとしている。"
 SLV.Communist-State: "£generic_Communist_State_small スロベニア共産党"
 SLV.Communist-State_desc: "共産主義 - スロベニア共産党（スロベニア語：Komunistična partija Slovenije）については、当初の共産党員の大部分が社会民主党に移籍したため、ほとんど知られていない。それでも、選挙の投票用紙には共産党の名前が記載されており、ごく少数の票しか得ていない。およそ1500票前後である。"
 SLV.anarchist_communism_IFDS: "£SLV_Initiative_for_Democratic_Socialism 民主社会主義イニシアティブ"
 SLV.anarchist_communism_IFDS_icon: "£SLV_Initiative_for_Democratic_Socialism"
 SLV.anarchist_communism_IFDS_desc: "急進左派 - 民主社会主義イニシアチブ（スロベニア語：Iniciativa za demokratični socializem）は、個人指導者を置かず、集団指導体制をとる左翼マルクス主義政党である。その結成は、ニューヨークを拠点とし、経済的不平等や企業の貪欲さに反対する左翼ポピュリスト運動「オキュパイ・ウォールストリート」に触発されたものである。同党の綱領は「ワーカーズ・アンド・パンクス・ユニバーシティ」の経済分析に基づいており、税率をより累進的にし、失業率を下げるための公共事業に資金を振り向けるなど、社会民主主義的な考え方を掲げ、短期的には新自由主義の規制を提唱している。\n長期的には、職場民主主義や国有化などの政策を通じて、資本主義を民主的社会主義に置き換えることを目指している。「左派」は、ドイツの「ディ・リンケ」、フランスの「左派戦線」、ポルトガルの「左派ブロック」など、他の欧州の反資本主義政党と共に、「欧州左派」と連携している。"
 SLV.anarchist_communism_The_Left: "£SLV_The_Left 左翼党"
 SLV.anarchist_communism_The_Left_icon: "£SLV_The_Left"
 SLV.anarchist_communism_The_Left_desc: "急進左派 - 左翼党（スロベニア語：Levica）は、「スロベニア持続的発展党」と「民主社会主義イニシアチブ」が合併して結成された、環境社会主義および民主社会主義政党である。著名な哲学者でありラカン派精神分析家のスラヴォイ・ジジェクがこの党を支持している。断言しよう、この男に賛同するのは、ドイツ語を話すスコットランド人だけだ。"
 SLV.Conservative: "£SLV_Resnicca Resni.ca "
 SLV.Conservative_icon: "£SLV_Resnicca"
 SLV.Conservative_desc: "反動主義 - Resni.caは、ロックダウン反対、5G反対、親クレムリンを掲げる政党である。創設者のゾラン・ステヴァノヴィッチによれば、その名称は「真実（resnica）」と「真剣（resni）」を表している。同党は、主要な政党はすべて腐敗していると主張している。ゾラン氏は、同党が目標の実現に「真剣」に取り組んでいることを強調している。Resni.caの注目度の高まりから、同党がスロベニア民主党の衛星政党あるいはトロイの木馬であるのではないかという憶測が広まった。これはスロベニア民主党への支持を集めるためである。ステヴァノヴィッチ氏はまた、スロベニアをタックスヘイブンとすること、すべての福祉給付を廃止すること、そして最後に無条件の言論の自由を保障することを提案している。"
 SLV.Autocracy: "£SLV_Peoples_Royalist_Party (LKS) 人民王党派党"
 SLV.Autocracy_icon: "£SLV_Peoples_Royalist_Party"
 SLV.Autocracy_desc: "独裁体制 - 人民王党派党（スロベニア語：Ljudske kraljevske stranke）」は、1989年に自らをスロベニア初代国王と宣言したボリス・ヴァレンチッチによって設立された政党である。同党の政策綱領は、徹底した反米、反NATO、反左翼、反共産主義を掲げている。同党は、西側の帝国主義的征服を批判する長々とした非難演説を展開する一方で、強い反セルビア・反共産主義の感情を表明しており、ジョージ・W・ブッシュやサダム・フセインといった人物をしばしば比較対象として挙げている。また、ヴァレンチッチは1990年の選挙の第1回投票が完全に不正操作されたと主張し、スロベニア人の大多数が彼の選挙ボイコット呼びかけに応じ、その結果、投票率はわずか29％にとどまったと述べている。彼は、当時のRTVスロベニアの局長がデータを操作して投票率を90％と見せかけ、クーデターを仕掛けたと主張している。同党の党章は、地球の大陸を表す七芒星をシンボルとしており、創造的思考と国家主権の原則を体現している。また、思想の自由な表現、文化的アイデンティティ、そして民族の自決権を強調している。"
 SLV.Kingdom: "£generic_Kingdom_small エル・イマン協会とミルサド・オメロヴィッチ兄弟"
 SLV.Kingdom_desc: "親体制派 - エル・イマン協会とミルサド・オメロヴィッチ（別名：アブ・テジマ）兄弟は、ヨーロッパでジハード主義者の勧誘活動を行い、アブ・バクル・アル＝バグダディやビラル・ボスニックとつながりを持つことで知られている。このグループには、スロベニアのイェセニツェ出身のイスラム神学者、アリム・ハサンギッチも名を連ねている。"
 SLV.Caliphate: "£generic_Caliphate_small シャリーア4スロベニア"
 SLV.Caliphate_desc: "ジハード主義 - ユーロポールは、イギリスおよびベネルクス諸国を拠点とする多国籍の過激派イスラム組織である、シャリーア4運動の支部がスロベニアに存在することを報告した。この運動に関連して公に知られている唯一の事件は、リュブリャナ近郊の人気ハイキングスポットであるスマルナ・ゴラ丘にあるカトリックの礼拝堂への冒涜である。礼拝堂は3面にアラビア文字で落書きされ、さらにラテン文字で「シャリーア4スロベニア」と「アッラーフ・アクバル」という2つのメッセージが書き込まれていた。"
 SLV.Neutral_Muslim_Brotherhood: "£SLV_Democrati_Action_Party_of_Slovenia (SDA) 民主行動党 - スロベニア支部"
 SLV.Neutral_Muslim_Brotherhood_icon: "£SLV_Democrati_Action_Party_of_Slovenia"
 SLV.Neutral_Muslim_Brotherhood_desc: "スロベニア民主行動党（ボスニア語：Stranka Demokratske Akcije Slovenije）は、穏健保守かつ汎イスラム主義の政党であり、ボスニア系民族主義者でありイスラム教の普及に尽力したアリヤ・イゼトベゴヴィッチによって設立されたボスニアの民主行動党（ボスニア語：Stranka Demokratske Akcije）のスロベニア支部である。イゼトベゴヴィッチは、バルカン半島全域に居住する少数派のボスニア系住民に訴求するために同党を設立し、セルビア、クロアチア、マケドニアにも支部を置いている。同党は、ムスリム同胞団やイランの現政権と密接な関係にあると見られている。こうした関係があるにもかかわらず、同党は大西洋主義的傾向も持ち、NATOやEUといった組織を支持している。前回の選挙で僅差で議席を獲得した以外、スロベニア支部についてはあまり知られていない。"
 SLV.Neutral_Autocracy: "£SLV_New_Slovenia (NSi) 新スロベニア"
 SLV.Neutral_Autocracy_icon: "£SLV_New_Slovenia"
 SLV.Neutral_Autocracy_desc: "非同盟独裁体制 - 新スロベニア・キリスト教民主党（スロベニア語：Nova Slovenija – Krščanski demokrati）は、スロベニア人民党から分裂したキリスト教保守政党である。同党は伝統的な社会的価値観を積極的に提唱し、道徳問題に関してはカトリック教会の立場を擁護している。同性婚や同性カップルによる養子縁組には反対しているが、登録された同性カップルに一定の権利を認める現行法については支持し、賛成票を投じている。全体的にはリベラルな立場をとる一方で、社会市場経済を擁護している。同党は親欧州派の政党であり、現体制を支持している。"
 SLV.Neutral_conservatism: "£SLV_western_conservative (SDSS) スロベニア社会民主党"
 SLV.Neutral_conservatism_icon: "£SLV_western_conservative"
 SLV.Neutral_conservatism_desc: "保守主義 - スロベニア社会民主党（スロベニア語：Slovenska demokratska stranka）は、中道右派の保守政党である。同党は当初、スロベニアの共産主義政権が多党制を容認した後に共産主義に対抗するために1990年に結成された連合「スロベニア民主野党」の一員であった。同党は概して市場主義的であり、経済政策は新自由主義的と評され、減税や民営化の加速を提唱している。"
 SLV.oligarchism: "£SLV_Democratic_Party_of_Pensioners_of_Slovenia Democratic (DeSUS) スロベニア年金生活者民主党"
 SLV.oligarchism_icon: "£SLV_Democratic_Party_of_Pensioners_of_Slovenia"
 SLV.oligarchism_desc: "寡頭政治 - スロベニア年金生活者民主党（スロベニア語：Demokratična stranka upokojencev Slovenije / Stranka upokojencev）は、退職者や高齢者の利益を重視する政党である。結党以来、一貫して連立政権に参加してきたにもかかわらず、同党の得票率は歴史的に見て比較的低い水準にとどまっている。"
 SLV.Neutral_Libertarian: "£SLV_Pirate_Party (Pirati) スロベニア海賊党"
 SLV.Neutral_Libertarian_icon: "£SLV_Pirate_Party"
 SLV.Neutral_Libertarian_desc: "リバタリアン - スロベニア海賊党（スロベニア語：Piratska stranka Slovenije）は、世界中の他の海賊党、特にスウェーデン海賊党と同様の理念と原則に基づいて結成された政党である。また、国際海賊党連盟の加盟団体でもある。同党は、プライバシーとデータ保護、自由で中立なインターネット、政府および政治の透明性、そしてフリーソフトウェアを推進している。"
 SLV.Neutral_green_party: "£SLV_Greens_of_Slovenia スロベニア緑の党"
 SLV.Neutral_green_party_icon: "£SLV_Greens_of_Slovenia"
 SLV.Neutral_green_party_desc: "緑の政治 - スロベニア緑の党（スロベニア語：Zeleni Slovenije）は、スロベニアがユーゴスラビアの支配下にあった1989年の革命期に結成された、環境保護を掲げる自由保守系政党である。しかし、1996年、指導力の欠如が指摘されたことを受け、同党は国民議会との間で対立に直面した。"
 SLV.Neutral_green_coalition: "£SLV_non_aligned_greens スロベニア緑の党"
 SLV.Neutral_green_coalition_icon: "£SLV_non_aligned_greens"
 SLV.Neutral_green_coalition_desc: "Green Politics - United Greens (Zeleni Slovenije) is the joint green platform formed when the Youth Party of Slovenia merged with the Greens of Slovenia in 2007. It campaigns on environmental protection, sustainable development, and European integration, drawing together the country's smaller ecological parties under a single banner."
 SLV.Neutral_green_Youth_party: "£slv_youth_party 青年党"
 SLV.Neutral_green_Youth_party_icon: "£slv_youth_party"
 SLV.Neutral_green_youth_party_desc: "Green Politics - Youth Party of Slovenia (Stranka mladih Slovenije) is a green, youth-oriented party founded in 2000 to represent younger voters and environmental causes. It entered parliament after the 2000 election and later merged with the Greens of Slovenia to form a joint European Greens platform."
 SLV.neutral_Social: "£SLV_Zares ザレス"
 SLV.neutral_Social_icon: "£SLV_Zares"
 SLV.neutral_Social_desc: "社会民主党 - ザレス（スロベニア語：Zares）は、親欧州の社会自由主義政党である。同党は、マテイ・ラホヴニク元経済相を筆頭とする国会議員6名がスロベニア自由民主党（LDS）を離党した後、結成された。"
 SLV.Neutral_Communism: "£SLV_ecosocialism_and_sustainable スロベニアの持続可能な発展"
 SLV.Neutral_Communism_icon: "£SLV_ecosocialism_and_sustainable"
 SLV.Neutral_Communism_desc: "共産主義 - スロベニア持続可能な発展党（スロベニア語：Stranka za trajnostni razvoj Slovenije）は、同名の運動の政治部門としてグランド・ホテル・ユニオンで結成された社会主義政党である。スロベニア共和国元人権オンブズマンのマティアシュ・ハンゼクが党首に選出された。同党のビジョンは、新自由主義的資本主義から民主的生態社会主義への転換である。さらに、同党はスロベニアの非軍事化とNATOからの脱退を提唱している。"
 SLV.Nat_Fascism: "£SLV_Here_Is_Slovenija ここがスロベニアだ"
 SLV.Nat_Fascism_icon: "£SLV_Here_Is_Slovenija"
 SLV.Nat_Fascism_desc: "ファシズム - ここがスロベニアだ（スロベニア語：Tukaj je Slovenija）は、若者の勧誘に積極的に取り組んでいるウェブフォーラムを運営する極右団体である。同団体は、オンライン上の存在感を活用して自らのイデオロギーを広め、若者をその活動に引き込んでいる。"
 SLV.Monarchist: "£SLV_Barbo_von_Waxenstein バルボ・フォン・ヴァクセンシュタイン"
 SLV.Monarchist_icon: "£SLV_Barbo_von_Waxenstein"
 SLV.Monarchist_desc: "君主主義者 - バルボ・フォン・ヴァクセンシュタイン家／バルボ家はヴェネトに起源を持ち、その後、内オーストリア、特にカルニオラ（現在のスロベニア）に移住した。1547年、一家はハプスブルク家のイストリア辺境伯領のコジュリャク（ヴァクセンシュタイン）に定住した。一家はカルニオラ公国でいくつかの高官や政治家を輩出した。最後の男性メンバーであるロベルト・バルボ・フォン・ヴァクセンシュタイン伯爵は1977年に亡くなった。彼には一人の娘、リヴィア・バルボ・フォン・ヴァクセンシュタイン伯爵令嬢がおり、後にレデン男爵夫人となった。"
 CAS.Western_Autocracy: "£generic_Western_Autocracy_small カスカディア消費者党"
 CAS.Western_Autocracy_icon: "£generic_Western_Autocracy_small"
 CAS.Western_Autocracy_desc: "£generic_Western_Autocracy_small カスカディア消費者党（CCP）は、経済を最優先とすることを主要綱領とする親企業政党である。比較的現実的な政党であること、特に消費者保護の観点から興味深い政策を掲げている点に好感を持つ人も少なくないが、CCPの資金の大部分が、アイダホ州を拠点とする、かなり大規模で成長著しい建設資材・鉱業会社であるカスカディア・マイニング社から提供されているという噂があるため、懐疑的な見方をする人の方がはるかに多い。"
 CAS.conservatism: "£generic_conservatism_small 新保守党"
 CAS.conservatism_icon: "£generic_conservatism_small"
 CAS.conservatism_desc: "£generic_conservatism_small 太平洋保守党（PCP）は、比較的穏健な志向を持つ政党であり、その政策の大部分は、現代的な視点から見れば標準的な中道右派の立場に基づいている。"
 CAS.liberalism: "£generic_liberalism_small カスカディア自由党"
 CAS.liberalism_icon: "£generic_liberalism_small"
 CAS.liberalism_desc: "£generic_liberalism_small カスカディア自由党（LPC）は、保守派政党と同様に現代的な自由主義政党であり、特定の社会・経済政策の自由化に向けて、着実ではあるが進歩を目指している。右派の論客たちは往々にして、LPCを「社会主義への入り口となる政党」だと主張するが、大多数の人々はそうは考えていない。"
 CAS.socialism: "£generic_socialism_small 社会進歩党"
 CAS.socialism_icon: "£generic_socialism_small"
 CAS.socialism_desc: "£generic_socialism_small 社会進歩党（SPP）は、親しみを込めて「進歩党」とも呼ばれる、ごく一般的な社会民主主義政党である。労働者寄りの姿勢を強め、堅実な経済基盤の構築を目指している。SPPは労働環境の改善を図るとともに、経済発展を大企業に依存するのではなく、中小企業により重点を置くことを望んでいる。"
 CAS.Communist-State: "£generic_Communist_State_small レッド・マウンテン党"
 CAS.Communist-State_icon: "£generic_Communist_State_small"
 CAS.Communist-State_desc: "£generic_Communist_State_small レッド・マウンテン党（RMP）は、かなり一面的で単純な政党だ。彼らは、マルクス主義以前に存在した古典的社会主義を信奉し、伝統的な階級闘争よりも、国家や集団による所有という経済観に重きを置いている。現代の大部分において「共産主義や社会主義は悪」という認識が支配的であったため、多くの人々は当党を混乱した存在と見なしている。しかし、この種の「原始的社会主義」によって、社会そのものという観点から経済の仕組みを検証し、実際に変革していくための、より説得力のある経済的論拠が今や提示されている。"
 CAS.anarchist_communism: "£generic_anarchist_communism_small カスカディア人民党"
 CAS.anarchist_communism_icon: "£generic_anarchist_communism_small"
 CAS.anarchist_communism_desc: "£generic_anarchist_communism_small カスカディア人民党（PPC）は、伝統的なアナキスト政党である。同党は、中央権力の緩やかな分散化によって、中央集権的な権力が持つ強制力に頼るよりも、人々が互いに助け合い、家族や友人を大切にするよう、より強い動機づけが生まれると信じている。"
 CAS.Conservative: "£generic_Conservative_small カスカディア保守党"
 CAS.Conservative_icon: "£generic_Conservative_small"
 CAS.Conservative_desc: "£generic_Conservative_small カスカディア保守党（CfC）は、玉石混交の政党である。一方では主に右派政党ではあるが、この「右派の力」は、国内のブルーカラーの男女から生じていると信じている。そのため、彼らはかなりの保守的な見解を持っている一方で、人々が経済、ひいては自分自身のためにどのように貢献するかという点について、奇妙なほど平等主義的な見解も持っている。"
 CAS.Autocracy: "£generic_Autocracy_small 大カスカディアのための党"
 CAS.Autocracy_icon: "£generic_Autocracy_small"
 CAS.Autocracy_desc: "£generic_Autocracy_small 大カスカディアのための党（PGC）と大カスカディア党（GCP）は、有権者にとって頭痛の種となっている。両党とも、大カスカディア国家の建設という同じ目標を掲げているが、一方は太平洋沿岸に目を向け、もう一方は大陸の奥深くにその実現の道を見出そうとしている。PGCの場合、カリフォルニア、アラスカ、そして何らかの形でカナダのブリティッシュコロンビア州を編入することで、より大きな国家を築こうとしている。その目標が何であれ、多くの人々は彼らや、対立する陣営（…まあ、ある意味対立する陣営）を、攻撃的な拡張主義者と見なしており、彼らに投票することに警戒心を抱いている。"
 CAS.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラム"
 CAS.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 CAS.Neutral_Muslim_Brotherhood_desc: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラムは、白人が支配するアメリカの社会において、黒人の地位を向上させ、確保することを目指すアフリカ系アメリカ人の文化団体である。南部共和国においては、新国家の半分近く、あるいはそれ以上を占める「ブラック・ベルト」地域が存在するため、彼らの影響力ははるかに大きい。その結果、ネーション・オブ・イスラムの過激派メンバーは、実際に黒人だけのための新国家を創設しようとしており、この新国家を大陸にいる黒人にとっての救済と見なしている。"
 CAS.Neutral_Autocracy: "£generic_Neutral_Autocracy_small 大カスカディア党"
 CAS.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 CAS.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small 大カスカディア党（GCP）と大カスカディアのための党（PGC）は、有権者にとって頭痛の種となっている。両党とも、大カスカディア国家の建設という同じ目標を掲げているが、一方は太平洋沿岸に目を向け、もう一方は大陸の奥深くにその実現の道を見出そうとしている。GCPの場合、カリフォルニアからカンザスに至るアメリカ大陸の西半分を併合することで、より大きな国家を築こうとしている。その目標が何であれ、多くの人々は彼らや、対立する陣営（…まあ、ある意味対立する陣営）を、攻撃的な拡張主義者と見なしており、彼らに投票することに警戒心を抱いている。"
 CAS.Neutral_conservatism: "£generic_Neutral_conservatism_small セイラム救世主党"
 CAS.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 CAS.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small セイラム救世主党（SSP）は、多くの野党勢力に冗談めかして「様子見党」とも呼ばれるように、矛盾した傾向を持つ政党で、自己陶酔的な響きの名前とは裏腹に、この党は比較的閉鎖的なキリスト教右派政党である。彼らは主に、宗教的儀式を実践・遂行する権利という単一の争点に焦点を当てた政党と見なされている。特にこのテクノロジーの時代において、彼らを少し変わり者だと見る人もいる。しかし一方で、多元主義そのものが権利であることを理解している人々もおり、彼らが自分たちの範囲内に留まり、他人に特定の行動を強要しない限り、現状のままでも構わないと考えている。"
 CAS.oligarchism: "£generic_oligarchism_small ボイシ・ビジネス党"
 CAS.oligarchism_icon: "£generic_oligarchism_small"
 CAS.oligarchism_desc: "£generic_oligarchism_small ボイシ・ビジネス党（BPP）は、その名の通りアイダホ州ボイシを拠点とする親ビジネス政党である。党員や指導部の多くが全米の大手企業に所属しているため、同党の意図に警戒する声もある。しかし一方で、この党こそが、この若い国の経済効率と繁栄を後押しする手段だと考える人々もいる。彼らが何をするにせよ、何かを行うにはまず選挙で当選しなければならない。"
 CAS.Neutral_Libertarian: "£generic_Neutral_Libertarian_small カスカディア自由党"
 CAS.Neutral_Libertarian_icon: "£generic_Neutral_Libertarian_small"
 CAS.Neutral_Libertarian_desc: "£generic_Neutral_Libertarian_small カスカディア自由党（CLP）は、比較的控えめなリバタリアン系の政党であり、現代的な社会自由主義というよりも、いわゆる市場自由主義の思想に重きを置いている。しかし、同党は社会問題への関心よりも経済政策を重視しているとはいえ、「互いに干渉せず、それぞれの生き方を尊重する」という精神を信奉しており、多くの党員は、政府による社会政策への介入がそれほど厳しくならず、物事が平和的に進むことを期待している。"
 CAS.Neutral_green: "£generic_Neutral_green_small グリーン・マウンテン運動"
 CAS.Neutral_green_icon: "£generic_Neutral_green_small"
 CAS.Neutral_green_desc: "£generic_Neutral_green_small グリーン・マウンテン運動（GMM）は、我が国が誇る手つかずの自然と環境に対して、より環境に配慮した姿勢をとることを目指す政治運動である。この運動の趣旨を理解している人は少なくないが、真の技術革新があれば、GMMが提唱する過激な政策の一部を抑制し、覆すことも可能になるだろう。この政党に対して距離を置いている人も少なくない。"
 CAS.neutral_Social: "£USA_democratic_socialist カスカディア・ロビン党"
 CAS.neutral_Social_icon: "£USA_democratic_socialist"
 CAS.neutral_Social_desc: "£USA_democratic_socialist カスカディア・ロビン党（RPC）は、かつては赤色民主党の太平洋北西部支部で、一般的な左派政党と見なされる勢力の延長線上にある。労働条件の改善を目指しており、週4日労働制を主要な政策の一つとしている。また、社会的な格差や分断を理解することでより結束の強い社会を築き、すべてのカスカディア人が「私も同じ経験があるから、あなたの気持ちがわかる」と言えるような、新たな基盤を確立することを目指している。その起源が過ぎ去った時代を物語っていることから、彼らを「昔話好き」と呼ぶ者もいるが、それにもかかわらず、同党は堂々と立ち、人々の幸福のために可能な限りあらゆる選挙での勝利を目指している。"
 CAS.Neutral_Communism: "£generic_Neutral_Communism_small 紫の旗の党"
 CAS.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 CAS.Neutral_Communism_desc: "£generic_Neutral_Communism_small 紫の旗の党（PPB）は、民兵組織を活用して革命を扇動・準備しようとする過激な社会主義政党である。党員数は少ないものの、同党と「緋色の旅団」が衝突し、結果として甚大な巻き添え被害が生じるのではないかと懸念する声は多い。"
 CAS.Nat_Populism: "£generic_Nat_Populism_small 強さと団結党"
 CAS.Nat_Populism_icon: "£generic_Nat_Populism_small"
 CAS.Nat_Populism_desc: "£generic_Nat_Populism_small 強さと団結党（SUP）は、典型的な右派政党であり、ナショナリズムや自給自足を支持し、概して反移民の立場をとっている。同党は、移民問題に対して過激な主張をする党員を抑制する傾向にあるものの、SUPが真に目指している方向性が一体何なのか、多くの人が疑問を抱いている。このような党内の分裂があるため、仮に政権を握ったとしても、実際の移民改革の厳しさを巡って党員間で議論が交わされ、移民問題が最優先の議題となる可能性が高い。"
 CAS.Nat_Fascism: "£generic_Nat_Fascism_small 緋色の旅団"
 CAS.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 CAS.Nat_Fascism_desc: "£generic_Nat_Fascism_small 緋色の旅団（TSB）は、「純粋なカスカディア」の実現を目指す極右政党である。その支持基盤には疑問の声が上がっているものの、党員の多くは元軍人や元法執行機関の職員であり、その疑似ポピュリスト的な集会は、良し悪しは別として、かなりの数の見物人を集める傾向にある。とはいえ、カスカディアの人口構成はかなり多様であるため、仮に彼らが政権奪取を試みたとしても、実現は困難だろう。"
 CAS.Nat_Autocracy: "£generic_Nat_Autocracy_small カスカディアン軍"
 CAS.Nat_Autocracy_icon: "£generic_Nat_Autocracy_small"
 CAS.Nat_Autocracy_desc: "£generic_Nat_Autocracy_small カスカディア軍（CM）は、防衛的な性格を帯びており、山岳地帯や地形全般が、攻撃よりも防衛に適している。そのため、ほとんどの軍事指導者は、領土拡大よりも政治に重点を置いている。しかし、統治の舵取りを変えるには、たった一人の指導者で十分である。"
 CAS.Monarchist: "£generic_Monarchist_small オリンピア家"
 CAS.Monarchist_icon: "£generic_Monarchist_small"
 CAS.Monarchist_desc: "£generic_Monarchist_small オリンピア家（HoO）は、太平洋岸北西部の国家から立憲君主制を創設しようとする君主主義運動である。しかし、この立憲君主制の主な信条は、驚くべきことに、君主自体を選挙君主制に変えることである。本質的には大統領である。一部の人々はその概念に魅力を感じているが、主にエゴや自尊心のためであり、それにもかかわらず、この運動は「過去は理由があって過去にある、今こそ良い瞬間を捉え、未来のために素晴らしい瞬間に変える時だ」という引用のように、現代性の点で現状を維持したいと望んでいる。"
 NEN.Western_Autocracy: "£generic_Western_Autocracy_small コンコード創造党"
 NEN.Western_Autocracy_icon: "£generic_Western_Autocracy_small"
 NEN.Western_Autocracy_desc: "£generic_Western_Autocracy_small コンコード創造党（CCP）は、ニューハンプシャー州を拠点とする親企業政党であり、ビジネス規制の緩和と、中小企業と大企業との間の連携体制の構築を目指している。しかし、同党の指導部の相当数が、国内最大級の建設・建材企業の一つであるコンコード・コンクリート社の出身者であることから、多くの人が懸念を抱いている。"
 NEN.conservatism: "£generic_conservatism_small 保守協会党"
 NEN.conservatism_icon: "£generic_conservatism_small"
 NEN.conservatism_desc: "£generic_conservatism_small 保守協会党（CAP）は、規制の少ない経済を維持し、政府の建物や土地以外の社会政策において政府の役割を最小限に抑えることを目指す中道右派の政党と見なされている。"
 NEN.liberalism: "£generic_liberalism_small ニューイングランド自由統一党"
 NEN.liberalism_icon: "£generic_liberalism_small"
 NEN.liberalism_desc: "£generic_liberalism_small ニューイングランド自由統一党（NELUP）は、中道左派の政党であり、保守協会党の主要な対立勢力と見なされている。経済面や社会面ではより非介入的な姿勢をとっているものの、マイノリティやLGBTコミュニティのメンバーに対する不当な差別を阻止するため、裁判所や法制度を活用することを躊躇しない。"
 NEN.socialism: "£USA_progressive_party 民主進歩党"
 NEN.socialism_icon: "£USA_progressive_party"
 NEN.socialism_desc: "£USA_progressive_party 民主進歩党（DPP） は、奇妙なことに再興したブル・ムース党の分派である。多くの人々はこの党を、社会・経済的な機会の平等を掲げつつも、従来の「社会主義」政党のような革命的あるいは分断的な傾向を持たない、ちょうど良い中間的な存在と見なしている。"
 NEN.Communist-State: "£generic_Communist_State_small 革命的改革党"
 NEN.Communist-State_icon: "£generic_Communist_State_small"
 NEN.Communist-State_desc: "£generic_Communist_State_small 革命的改革党（PRR）は、投票や改革を促し、そのための運動を展開することを目指す急進的社会主義政党である。暴力的な政党というわけではないが、一部の過激な党員が、党の疑似準軍事組織のような存在へと変貌してしまうという悪癖があるようだ。"
 NEN.anarchist_communism: "£generic_anarchist_communism_small ブラック・バナー協会"
 NEN.anarchist_communism_icon: "£generic_anarchist_communism_small"
 NEN.anarchist_communism_desc: "£generic_anarchist_communism_small ブラック・バナー協会（BBA） は、その中核がアナキズムであるにもかかわらず、皮肉なことにかなり穏健な政党である。同党は、体制を利用して実質的に「体制を自滅させる」ことを信条としているため、もし権力を握った場合、このような政党が一体何ができるのか、あるいは何をするつもりなのか、多くの人々が疑問を抱いている。"
 NEN.Conservative: "£generic_Conservative_small 新保守党"
 NEN.Conservative_icon: "£generic_Conservative_small"
 NEN.Conservative_desc: "£generic_Conservative_small 新保守党（NCP）は、より伝統的な右派政党であり、中絶反対、厳しい移民規制、そして経済への政府の介入を最小限に抑えるか、あるいは一切行わないことを信条としている。一部からは、より支持を集める保守協会党の「見せかけ」に過ぎないと見なされることもあるが、それでも全体としては多様な人々を惹きつけている。"
 NEN.Autocracy: "£generic_Autocracy_small ニューイングランド勢力協会"
 NEN.Autocracy_icon: "£generic_Autocracy_small"
 NEN.Autocracy_desc: "£generic_Autocracy_small ニューイングランド勢力協会（NESS）は、一種の偽装政党であり、社会政策や経済政策といった伝統的な課題については、実際には明確な立場を打ち出していない。同団体は、国家の繁栄は国民的アイデンティティとその人々の強化にかかっていると信じている。これが具体的に何を意味するのか、誰も完全には把握していないが、コミュニティを通じた彼らの穏健なナショナリズムは、時折、一定数の支持者を惹きつけている。"
 NEN.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラム"
 NEN.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 NEN.Neutral_Muslim_Brotherhood_desc: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラムは、白人が支配するアメリカの社会において、黒人の地位を向上させ、確保することを目指すアフリカ系アメリカ人の文化団体である。ニューイングランドでは、そもそも少数派の人口自体が少なかったため、この運動の規模も小さい。ニューヨークで騒動が起こり始めて初めて、人々はニューイングランドを多文化の楽園だと考えるようになったのだ。しかし、その数は少ないものの、ネーション・オブ・イスラムの過激派メンバーは、実際に黒人だけのための新国家を創設しようとしており、この新国家を大陸にいる黒人にとっての救済と見なしている。"
 NEN.Neutral_Autocracy: "£generic_Neutral_Autocracy_small 新社会党"
 NEN.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 NEN.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small 新社会党（NSP） は、ある種パラドックス的な政党である。経済的な機会や社会的な流動性に関してはより平等主義的な手段を信奉する一方で、移民政策や特定の社会政策についてはより厳しい規制を好む。この党は「原則と伝統党」と共に、国内では「膠着状態連合」として知られる連合を形成する傾向にある。"
 NEN.Neutral_conservatism: "£generic_Neutral_conservatism_small 原則と伝統党"
 NEN.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 NEN.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small 原則と伝統党（PTP）は、伝統党とも呼ばれるごく一般的な右派政党である。全体として、社会政策における伝統的な手法を擁護する上で、いわゆる「敬虔な絶対主義」に走っているわけではない。しかし、自らの立場を一切譲らないため、ニューイングランドの政治界では「厄介者」と見なされがちであり、その結果、投票の否決や、時には全面的な膠着状態を招くこともある。他の保守政党との協力も試みているが、新防衛党のような政党との連携にはより前向きである。"
 NEN.oligarchism: "£generic_oligarchism_small 経済成功党"
 NEN.oligarchism_icon: "£generic_oligarchism_small"
 NEN.oligarchism_desc: "£generic_oligarchism_small 経済成功党（ESP）は、経済的な流動性と成長を確保するためにあらゆる手段を講じることを目指す、強硬的親企業政党である。政策決定におけるこうした偏狭なアプローチが、計り知れない行き過ぎを招くのではないかと懸念する声もある。しかし一方で、同党がやがて国を地域市場、さらには国際市場へと飛躍させるだろうと期待する声もある。"
 NEN.Neutral_Libertarian: "£generic_Neutral_Libertarian_small 新自由党"
 NEN.Neutral_Libertarian_icon: "£generic_Neutral_Libertarian_small"
 NEN.Neutral_Libertarian_desc: "£generic_Neutral_Libertarian_small 新自由党（NLP） は、比較的伝統的なリバタリアン政党である。同党は、社会・経済的進歩に対する国家のニーズとのバランスを図りつつも、その大部分を州や地方自治体に委ね、国家の法制度を通じて、濫用とみなされる可能性のある事案のみを直接対処する方針をとっている。"
 NEN.Neutral_green: "£generic_Neutral_green_small 林業協会"
 NEN.Neutral_green_icon: "£generic_Neutral_green_small"
 NEN.Neutral_green_desc: "£generic_Neutral_green_small 林業協会（FA）は、技術を活用して天然資源の保全・拡大およびその利用能力を高めることを信条とする、穏健な環境保護政党である。多くの人が想像するような「環境活動家」というタイプではないものの、保全と利用を掲げているにもかかわらず、むしろ親ビジネス的であるという点で、FAは「矛盾した存在」と見なされている。"
 NEN.neutral_Social: "£USA_democratic_socialist 社会民主党"
 NEN.neutral_Social_icon: "£USA_democratic_socialist"
 NEN.neutral_Social_desc: "£USA_democratic_socialist 社会民主党（SDP） は、アメリカの政界においてある種異色の存在である。その政策綱領の大部分は、ドイツの「姉妹政党」である、皮肉な名前とは裏腹に「社会民主党」を意味するSPDから引き継いでいる。両党とも、制度を活用して国民の支持を得るとともに、急激な変化が人々に与える衝撃を避けるため、立法プロセスを通じて時間をかけてゆっくりと、かつ包括的に社会主義的な経済政策を導入することを信条としている。"
 NEN.Neutral_Communism: "£generic_Neutral_Communism_small ニューイングランド社会党"
 NEN.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 NEN.Neutral_Communism_desc: "£generic_Neutral_Communism_small ニューイングランド社会党（SPNE）は、ごく一般的なマルクス主義政党であり、労働者の闘争を信奉し、現在の体制が労働者を実質的に現代の農奴状態に追い込んでいると主張している。しかし、最大の違いは、彼らが非常に労働者寄りの立場である一方で、完全に反企業的ではないという点にある。つまり、穏健派や同様の左派勢力は、国のニーズにおける一般的な傾向に応じて、この党に出入りする傾向がある。彼らの最大の同盟政党は社会民主党である。"
 NEN.Nat_Populism: "£generic_Nat_Populism_small 新防衛党"
 NEN.Nat_Populism_icon: "£generic_Nat_Populism_small"
 NEN.Nat_Populism_desc: "£generic_Nat_Populism_small 新防衛党（NDP）は「腰の引けた連中」と揶揄されている。その理由は、同党の集会の多くがまとまりのないものになりがちで、演説もごく平凡なポピュリスト的な内容に終始しているからだ。それにもかかわらず、同党は軍国主義と移民受け入れを支持し、軍を最優先事項とするため、社会全体に利益をもたらすよう経済を形成することを信条としている。NDPの構成員は、主に元軍人や現役の軍人から成っている。"
 NEN.Nat_Fascism: "£generic_Nat_Fascism_small 緑シャツ協会"
 NEN.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 NEN.Nat_Fascism_desc: "£generic_Nat_Fascism_small 緑シャツ協会（GSS）通称「緑シャツ」は、純粋で自由なニューイングランドの実現を目指す国家社会主義団体である。彼らはより過激な手法を信奉している一方で、穏健派……そう、意外にもこの団体内の穏健派は、国外からの評価という観点では、「退去対価プログラム」という形の「相殺措置」の方が有益だと考えている。このようなニッチで時代遅れの団体がどれほど人気を集められるのか、疑問に思う者は多いが、それ以上に、その実態を知りたくないという者の方がはるかに多い。"
 NEN.Nat_Autocracy: "£generic_Nat_Autocracy_small ニューイングランド軍"
 NEN.Nat_Autocracy_icon: "£generic_Nat_Autocracy_small"
 NEN.Nat_Autocracy_desc: "£generic_Nat_Autocracy_small ニューイングランド軍（AFNE）、あるいは単に「軍」と呼ばれるこの組織は、比較的政治的中立な存在である。仮に何らかのソフトパワーを行使したり獲得したりする場合でも、その主な焦点は、国家の防衛態勢を確保するために、結束力があり全体として安定した軍事力を維持できるよう、軍への資金援助の拡充と徴兵制度の改革にある。"
 NEN.Monarchist: "£generic_Monarchist_small チコピー家"
 NEN.Monarchist_icon: "£generic_Monarchist_small"
 NEN.Monarchist_desc: "£generic_Monarchist_small チコピー家（HoC）は、現代君主制の自家製版と称されることもある。この自称王家は、歴史的に重要なニッチな町チコピーを王家の象徴として用いることを信条とする。メンバーは、この町がニューイングランド特有の独自性を持ちつつ、同地域のあらゆる文化層を尊重するに足る唯一無二の存在だと信じている。当然ながら、彼らの運動が現代君主主義の傘下にあるということは、現行制度の理念と慣行を維持しつつ、称号だけを古式に改めることを望むことを意味する。本質的には、国家を選挙君主制と立憲君主制のハイブリッドのような形態にすることである。"
 CZE.Western_Autocracy_2004: "£CZE_western_autocracy_2004 市長と無党派"
 CZE.Western_Autocracy_2004_icon: "£CZE_western_autocracy_2004"
 CZE.Western_Autocracy_2004_desc: "The Mayors and Independents (STAN) is a liberal political party in the Czech Republic, focused on localism, regionalism and subsidiarity. The party grew out of four minor parties, including the Independent Mayors for the Region, and the liberal-conservative SNK European Democrats. Until 2016, the party cooperated with another liberal-conservative party, TOP 09. STAN contested the 2021 Czech parliamentary election as part of the coalition Pirates and Mayors with the Czech Pirate Party."
 CZE.Western_Autocracy_pavel: "£generic_Western_Autocracy_small ペトル・パヴェル政権"
 CZE.Western_Autocracy_pavel_icon: "£generic_Western_Autocracy_small"
 CZE.Western_Autocracy_pavel_desc: "After Petr Pavel has won the presidential elections, the new government was created. Cooperation with other politicians will allow new president to complete his electoral program and implement new doctrine of the Czech armament program."
 CZE.liberalism_2010: "£CZE_western_liberal_2010 伝統・責任・繁栄 09 （TOP 09）"
 CZE.liberalism_2010_icon: "£CZE_western_liberal_2010"
 CZE.liberalism_2010_desc: "The party was founded on 11 June 2009 by Miroslav Kalousek who left the Christian and Democratic Union - Czechoslovak People's Party. Its first leader was Karel Schwarzenberg, who had previously served as Minister of Foreign Affairs in the second Topolánek cabinet from January 2007 to March 2009."
 CZE.Neutral_Autocracy: "£CZE_neutral_Social_2011 (ANO) 不満のある市民の行動"
 CZE.Neutral_Autocracy_icon: "£CZE_neutral_Social_2011"
 CZE.Neutral_Autocracy_desc: "不満を持つ市民の行動（ANO 2011）は、実業家のアンドレイ・バビシュが率いるチェコ共和国のポピュリスト政党である。不満を持つ市民の行動は2011年11月に団体として発足し、2012年5月11日にANO 2011という名称で正式な政党となった。"
 CZE.Conservative_2015: "£CZE_emerging_reactionary_2015 (SPD) 自由と直接民主主義"
 CZE.Conservative_2015_icon: "£CZE_emerging_reactionary_2015"
 CZE.Conservative_2015_desc: "「自由と直接民主主義」は、トミオ・オカムラが率いる政党である。同党は政治的な立場において、右派あるいは極右と評されている。また、右派ポピュリズムを掲げ、移民に反対し、強硬な欧州懐疑主義を貫いているとされる一方、政策綱領では直接民主主義への支持を明記している。"
 CZE.Nat_Fascism: "£CZE_Nat_Fascism (DSSS) 社会正義労働党"
 CZE.Nat_Fascism_icon: "£CZE_Nat_Fascism"
 CZE.Nat_Fascism_desc: "社会正義労働党は、チェコ共和国における主要な極右政党としてしばしば形容される政党である。同党はチェコ共和国のいかなる立法機関にも議席を有しておらず、これまでの選挙における最大の成果は、チェコ議会選挙で得票率1.14％を獲得したことである。プラハの党幹部を含む一部の党幹部は、国際的な過激派ネオナチ組織のチェコ支部である「ナロドニー・オドポル」などのネオナチ団体と関わりがある。"
 CZE.Neutral_Libertarian_2009: "£CZE_Neutral_libertarian チェコ海賊党"
 CZE.Neutral_Libertarian_2009_icon: "£CZE_Neutral_libertarian"
 CZE.Neutral_Libertarian_2009_desc: "チェコ海賊党は、2009年に設立されたチェコ共和国の自由進歩的な政党である。同党は、政治の透明性、市民権、直接民主主義を訴える学生主導の草の根運動として発足した。"
 SYR.Neutral_green: "£generic_Neutral_green_small シリア緑の連邦主義運動"
 SYR.Neutral_green_desc: "シリア緑の連邦主義運動は、「ダマスカスの春」を契機に国内で政党の再結成が可能になったことを受けて結成された。同党は官僚的な統治スタイルに反対し、連邦制かつ環境に配慮したシリアの建設を目指している。クルド系党員の割合が比較的高いことから、多くの団体からクルディスタン労働者党（PKK）とのつながりを疑われてきたが、実際には党内ではPKKに対する姿勢をめぐって意見が分かれている。"
 SYR.Communist-State_Bak_desc: "The Syrian Communist Party was a political party in Syria founded in 1924. It became a member of the National Progressive Front in 1972. The party split in two in 1986 with two separate parties claiming to represent the original Syrian Communist Party; the Syrian Communist Party (Unified) and the Syrian Communist Party (Bakdash). With the latter having effectively taken control over the nation and declaring a single party state"
 SYR.Communist-State_Fai_desc: "The Syrian Communist Party was a political party in Syria founded in 1924. It became a member of the National Progressive Front in 1972. The party split in two in 1986 with two separate parties claiming to represent the original Syrian Communist Party; the Syrian Communist Party (Unified) and the Syrian Communist Party (Bakdash). With the former having effectively taken control over the nation and declaring a single party state"
 SYR.Nat_Fascism_desc: "イラク・バアス主義 - シリア・バアス党は、2003年までイラクのバグダッドに本部を置いていたバアス主義政党である。1966年、当初のバアス党は二分された。一方はダマスカスのバアス党指導部が率い、シリアに政党を設立し、もう一方はバグダッドに指導部を置くものとなった。両バアス党は同じ名称を保持し、アラブ世界において並行する組織体制を維持していたが、両者の関係は極めて敵対的なものとなり、シリアは血なまぐさいイラン・イラク戦争においてイラクに対抗してイランを支援したほか、湾岸戦争では米国主導の対イラク連合にも参加した。バアス主義者は1963年に初めてイラクで政権を掌握したが、数ヶ月後に失脚した。"
 GER.Nat_Fascism_alt: "£GER_nat_fascism_alt (HEIMAT) 祖国"
 GER.Nat_Fascism_alt_icon: "£GER_nat_fascism_alt"
 GER.Nat_Fascism_alt_desc: "ファシズム - 祖国（ドイツ語：Die Heimat）はネオナチのレッテルを貼られている極右超国家主義政党である。党には国家情報機関が深く浸透しているが、党を禁止する試みは失敗に終わっている。彼らは反ユダヤ主義であり、移民に対する憎悪を助長している。"
 ENG.Nat_Populism_alty: "£ENG_nat_populism (RUK) リフォームUK"
 ENG.Nat_Populism_alty_icon: "£ENG_nat_populism"
 ENG.Nat_Populism_alty_desc: "右派ポピュリズム - リフォームUK（英語：Reform UK, RUK）\n\nリフォームUKは、ブレグジット党から派生し、より広範な反体制の受け皿として再編された右派ポピュリストの新興政党である。同党は、主権、国境管理、減税、そして「エリートによる合意形成政治」と称するものへの敵対を掲げて選挙運動を展開しており、メディア主導の対立構図と国家体制の抜本的改革を約束することを組み合わせている。議席数は限られているものの、その影響力はアジェンダ設定能力と、右派を分裂させつつ国民的議論を自らの主張へと導く能力に由来している。"
