 UKR_yanuk_premier_idea: "Rząd Janukowycza"
 UKR_hur_reform: "Reforma HUR"
 UKR_hur_reform_desc: "It is time to begin reforms of our Main Intelligence Agency to increase efficiency and influence opportunities in other countries."
 UKR_hur_opearational_support: "Wsparcie operacyjne HUR"
 UKR_hur_opearational_support_desc: "HUR obecnie wspiera bieżące operacje za pomocą danych wywiadowczych i swoich jednostek na linii frontu."
 UKR_hur: "Główna Dyrekcja Wywiadu"
 UKR_hur_desc: "The HUR has a wide range of powers and capabilities that we will be able to implement in our foreign policy."
 UKR_hur_battalions: "Bataliony HUR Ukrainy"
 UKR_hur_battalions_desc: "The battalions of the HUR of Ukraine are participating in hostilities on the orders of the Ukrainian command on our side, after the end of hostilities, they will leave our armed forces."
 UKR_hur_decision_category: "Główna Agencja Wywiadowcza"
 UKR_hur_decision_category_desc: "\n\n\n\n\n\n£UKR_desctext_hur \n\n\n\n\n\n\n\n\nThe Main Intelligence Directorate of the Ministry of Defense of Ukraine is the military intelligence service of the Ukrainian government. This is a department of the Ministry of Defense, not the General Staff of the Armed Forces of Ukraine. With the help of this ministry, we will be able to carry out various sabotage operations in neighboring countries, as well as make sorties with the help of sabotage battalion.\n\n\n\nCurrent amount of HUR opearation operational points: [?hur_points]"
