 ARG_falklands_question_category: "포클랜드 문제"
 ARG_falklands_question_category_desc: "말비나스 제도는 처음부터 자국 영토였으며, 정당한 영유권을 가진 곳입니다. 우리 형제들이 조국을 위해 섬에 흘린 피를 잊지 않을 것입니다. \n차나 마시는 제국주의자들에게서 땅을 되찾을 때입니다!"
 ARG_second_falklands_war: "포클랜드를 되찾자!"
 ARG_second_falklands_war_desc: "§R이는 120일 후에 [ENG.GetName]와 전쟁상태에 놓이게 될 것입니다.§!"
 TAI_category: "대만 결정"
 TAI_category_desc: "대만과 관련된 결정을 내립니다."
 TAI_coast_guard: "연안 방위 행정부 설립"
 TAI_kaoshiung_university: "국립 가오슝 대학 개교"
 GEN_remove_saudi_aid: "사우디아라비아 모스트 모금 중단"
 GEN_crack_down_on_muslim_broterhood: "무슬림 형제단 분쇄"
 GEN_stop_crackdowns: "무슬림 형제단 분쇄 중단"
 GEN_allow_al_jazeera: "알 자지라 허용"
 GEN_ban_al_jazeera: "알 자지라 금지"
 AB_war_support_campaigns: "전쟁 지지 홍보"
 AB_war_support_campaigns_desc: "사람들은 우리 정부에 대한 신뢰를 잃고 더 이상 전쟁을 지지하지 않습니다. 그들에게 약간의 동기부여를 합시다."
 Civil_war_decisions: "내전"
 Civil_war_decisions_desc: "자국은 이제 내전에 휩싸였습니다. 이는 비윤리적인 행동을 실행하도록 해줄 것입니다."
 confiscate_civilian_vehicles: "민간차량 몰수"
 confiscate_civilian_vehicles_desc: "민간차량을 몰수하고 전술 차량이나 장갑 병력 수송 트럭으로 개조해야합니다. 전시상황임에도 민간 차량은 그 수가 많으며, 새로운 차량들은 해외에서 밀수를 통해 국내로 들어오고 있습니다."
 smuggle_small_arms: "보병화기 밀수"
 smuggle_small_arms_desc: "국내에서 자국산 보병화기를 생산하는 것을 넘어서, 해외에서 이러한 무기들을 밀수하여 마련해야합니다."
 smuggle_heavy_weapons: "중화기 밀수"
 smuggle_heavy_weapons_desc: "국내에서 자국한 중화기를 생산하는 것을 넘어서, 해외에서 이러한 무기들을 밀수하여 마련해야합니다. 물론 총보다는 약간 무거운 미사일도 마찬가지입니다."
 Conscripting_Child_Soldiers: "소년병 징집"
 force_conscript_children: "징집 소년병 군단"
 force_conscript_children_desc: "징집 소년병을 구성할 수 있습니다. 많은 비대칭적인 전투에서, 소년병은 반란군들에게 징집되고 폭력에 둔감하게 변모합니다. 이러한 아이들의 운명은 트라우마에 시달리거나, 폭력으로 인해 변모하고, 술과 약에 쩔어 비참한 삶밖에 남지 않게 됩니다.\n\n징집 소년병 군단은 우리 군에 큰 도움이 될 것이지만, 사실상 고기방패 그 이상도 아닙니다."
 buy_fuel_from_black_market: "암시장에서 석유 구입"
 buy_fuel_from_black_market_desc: "현재 상황에서 석유를 합법적으로 구하기는 매우 어렵습니다. 그러나 석유를 비합법적으로 구할 수 있는 방법이 몇 개 있습니다."
 SER_rename_nation: "세르비아-몬테네그로로의 국명 변경"
 SER_rename_nation_desc: "유고슬라비아는 '남슬라브족의 땅'이라는 뜻이지만, 90년대에 벌어진 참혹한 전쟁으로 대부분의 남슬라브족이 떠나갔고, 이제 우리는 세르비아인과 몬테네그로인만 남은 땅이 되었습니다. 이제는 우리의 진정한 모습을 있는 그대로 불러야 할 때입니다."
 game_rule_toggle_cheat_decisions: "§Y[show_cheat_decision_status_3]§! §R전세계적인§! 치트 디시전"
 game_rule_toggle_cheat_decisions_desc: "§Y알림:§! 모든 나라가 치트를 사용할 수 있고 그 효과는 §R전세계§!에 영향을 미칩니다. 어떤 나라가 이를 활성화 했는지 이벤트로 알려줄 것입니다.\n§Y멀티플레이에서도 이 치트를 사용하도록 설정할 수 있습니다!§!"
 cheat_decisions_disabled_TT: "치트: §R사용 불가능§!"
