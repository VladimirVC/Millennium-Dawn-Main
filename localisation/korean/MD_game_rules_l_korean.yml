 RULE_OPTION_ITA_RADICALP: "급진당"
 RULE_OPTION_ITA_RADICALP_DESC: "§Y비동맹§! 급진주의자들이 결국 이탈리아의 정권을 잡게 될 것입니다."
 RULE_OPTION_ITA_LEFTP: "오성운동"
 RULE_OPTION_ITA_LEFTP_DESC: "§G신흥국 진영§! 좌파 포퓰리즘 성향의 오성운동이 권력을 잡을 것입니다."
 RULE_OPTION_ITA_RIGHTP: "국민동맹"
 RULE_OPTION_ITA_RIGHTP_DESC: "§8민족주의§! 국민동맹이 이탈리아에서 선거로 집권하게 될 것입니다."
 RULE_OPTION_ITA_LEU: "자유롭고 평등한"
