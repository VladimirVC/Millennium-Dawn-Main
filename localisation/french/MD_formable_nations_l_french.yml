 form_MAPHI_category: "Le Maphilindo"
 form_MAPHI_category_desc: "Un projet de confédération apolitique des trois pays d'Asie du Sud-Est de l'archipel malais dans les années 1960. Ce rêve n'a jamais été réalisé en raison de conflits entre les nations d'Indonésie et la Fédération de Malaisie. L'unification des trois nations créerait une nation qui rivaliserait avec certaines des plus grandes nations du monde."
 MAPHI_integrate_start: "Begin forming [GetMAPHINameDef]"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "L'Indonésie est une région riche en ressources essentielles pour la nation envisagée. Il est impératif d'intégrer l'Indonésie pour les ressources et la population qu'elle peut apporter."
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "Les Philippines sont un pôle naval et commercial majeur dans le Pacifique. L’intégration de cette nation nous donnera de bien meilleures chances de commencer à dominer le Pacifique."
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "Singapour est une plaque tournante essentielle pour la nouvelle nation. Sa position de port commercial majeur et de centre financier en fait un élément essentiel de la réussite de la nouvelle nation."
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "Politiquement, la Malaisie est l'une des régions les plus importantes du pays. Elle nous permet d'accéder aux routes terrestres en Asie grâce à sa possession de la péninsule."
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "Brunei est une nation mineure dans l'accord. Bien qu'il s'agisse d'un État mineur, il est impératif de l'intégrer."
 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 is_MAPHI: "Has formed [GetMAPHINameDef]"
 form_INDOCHI_category: "L'Indochine"
 form_INDOCHI_category_desc: "L'Indochine est une ancienne fédération de nations composée du Viêt Nam, du Cambodge et du Laos qui a existé jusqu'en 1954. Ces trois pays forment ensemble l'une des plus grandes économies du monde et accueillent une population massive. C'est une nation composée de jungles denses, de collines ondulantes, de montagnes et d'un littoral magnifique. Sa force réside dans son peuple et dans la volonté qui fera avancer le groupe vers l'avenir."
 INDOCHI_integrate_start: "Begin forming [GetINDOCHINameDef]"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "Le Vietnam dispose d'importantes ressources naturelles dans ses montagnes et le long de sa côte. L'intégration du Vietnam consolidera notre emprise sur le pays."
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "Le Laos, tout comme le Vietnam, possède également d’énormes quantités de ressources naturelles."
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "La géographie naturelle et les terres riches du Cambodge sont importantes pour le pays. Les intégrer dans la nation améliorera également la nation de manière cohérente."
 INDOCHI_update_flag: "Finish Forming [GetINDOCHINameDef]"
 INDOCHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetINDOCHINameDef], adopting its unified flag and name."
