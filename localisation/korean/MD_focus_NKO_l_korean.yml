 korea.50.t: "마침내 이룩된 조선의 통일"
 korea.50.d: "수년간의 분단 끝에 마침내 조선이 통일을 이룩하며 세계 역사에 역사적인 순간을 새겼습니다. 분단되었던 북과 남은 수십 년에 걸친 정치적, 경제적, 문화적 차이를 극복하고 하나의 하나 된 국가를 이루었습니다. 이 중대한 사건은 조선 인민에게 평화, 협력, 번영의 새로운 시대를 상징하며, 동아시아와 세계의 지정학적 구도를 재편하고 있습니다."
 korea.50.a: "만세에에!!!"
 korea.51.t: "더 많은 농장 건설"
 korea.51.d: "조선은 조선 인민들 없이는 위대해질 수 없습니다. 우리는 가능한 한 빨리 기근을 해결하는 데 집중해야 합니다."
 korea.51.a: "평양 농업"
 korea.51.b: "황해 농업"
 korea.51.c: "자강 농업"
 korea.51.e: "함경 농업"
 korea.52.t: "부족한 보급 허브 업그레이드"
 korea.52.d: "우리의 위대한 영도자는 선로와 보급 허브를 더 건설하기 위한 자금을 지원해 주셨으며, 우리는 미래 경제특구를 향한 야망에 집중할지 아니면 전쟁에 대비해 병참을 준비할지 선택해야 합니다."
 korea.52.a: "Supply the Korean Side"
 korea.52.b: "미래 경제특구 보급"
