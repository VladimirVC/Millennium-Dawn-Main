 ALG_dziri_tt: "§G阿尔及利亚社会分支已解锁：§!\n\n选择如何塑造阿尔及利亚社会——进步或传统，开放或封闭。"
 ALG_dziri_unlocks_tt: "§Y解锁社会分支：§!\n- 释放民间力量（民主/中立）\n- 传统路线（威权/中立）\n- 柏柏尔人权利（民主/中立）\n- 毒品应对（事件触发）\n- 移民应对（事件触发）"
 ALG_open_civil_society_tt: "§G释放民间力量：§!\n\n- 非政府组织与慈善机构蓬勃发展\n- 民主参与度显著提升\n- 为进步改革奠定基础"
 ALG_constitutionalize_rights_tt: "§G宪法权利：§!\n\n- 基本自由得到保障  \n- 法治建设得到加强  \n- 获得国际社会认可"
 ALG_integration_policy_tt: "§G融合计划：§!\n\n- 移民转变为高效公民\n- 人力增长\n- 社会凝聚力提升"
 ALG_unlocks_migration_branch_tt: "§Y解锁移民应对分支§!\n（当移民事件触发时）"
 ALG_migration_problems_tt: "§Y移民危机：§!\n\n撒哈拉以南的移民如潮水般涌入阿尔及利亚南部边境。您必须决定如何应对。"
 ALG_migration_choice_tt: "§Y选择：§!\n- §G门户开放政策§! - 欢迎移民\n- §R关闭边境§! - 加强边境管控"
 ALG_open_door_tt: "§G门户开放：§!\n\n- 欢迎移民和难民\n- 人力增长\n- 稳定性略有下降\n- 人道主义声誉提升"
 ALG_closed_borders_tt: "§R关闭边境：§!\n\n- 加强边境管控\n- 提升稳定度\n- 降低外国影响力\n- 人口增长放缓"
 ALG_expand_berber_rights_tt: "§G扩大柏柏尔人权利：§!\n\n- 阿马齐格文化得到弘扬\n- 卡比利亚人满意度提升\n- 研究因多样性而受益"
 ALG_drug_problem_tt: "§Y毒品危机：§!\n\n来自摩洛哥和萨赫勒地区的毒品走私已引发成瘾问题。您必须决定如何应对。"
 ALG_drug_choice_tt: "§Y选择：§!\n- §G非刑事化§! - 基于健康的处理方式\n- §R加重刑罚§! - 执法机关的处理方式"
 ALG_relax_restrictions_tt: "§G毒品非刑事化：§!\n\n- 将成瘾视为健康问题处理\n- 减少监狱人口\n- 部分黑帮影响力依然存在\n- 国际批评减少"
 ALG_tighten_punishments_tt: "§R粉碎毒品产业：§!\n\n- 对毒贩处以严厉刑罚\n- 黑帮影响力下降\n- 战争支持度提升\n- 稳定性略有下降"
 ALG_traditions_matter_tt: "§G传统价值观：§!\n\n- 阿尔及利亚习俗得以保留\n- 宗教价值观得到弘扬\n- 抵制西方影响"
 ALG_unlocks_conservative_path_tt: "§Y解锁保守社会路线§!"
 ALG_censor_internet_tt: "§Y审查互联网：§!\n\n- 屏蔽境外宣传\n- 控制信息流动\n- 降低外国影响力\n- 研究速度略微下降"
 ALG_restrict_women_tt: "§Y传统性别角色：§!\n\n- 鼓励女性留在家中\n- 生育率可能上升\n- 劳动力减少\n- 西方批评"
 ALG_marriage_subsidies_tt: "§G婚姻补贴：§!\n\n- 政府承担婚礼费用\n- 鼓励人口增长\n- 财政支出增加\n- 传统价值观得到弘扬"
 ALG_mafia_increase_5_tt: "§R黑帮势力：§! +5"
 ALG_mafia_decrease_3_tt: "§G黑帮势力：§! -3"
 ALG_open_civil_society_idea: "释放民间力量"
 ALG_open_civil_society_idea_desc: "阿尔及利亚拥有充满活力的公民社会，活跃的非政府组织、慈善机构和社区组织为公共生活做出了积极贡献。"
 ALG_constitutionalize_rights_idea: "宪法权利"
 ALG_constitutionalize_rights_idea_desc: "基本权利被写入宪法，保护阿尔及利亚公民并加强法治。"
 ALG_integration_policy_idea: "融合政策"
 ALG_integration_policy_idea_desc: "阿尔及利亚积极接纳移民和难民，提供语言培训并开辟入籍途径。"
 ALG_migration_crisis: "移民危机"
 ALG_migration_crisis_desc: "来自撒哈拉以南非洲的移民潮已使边境设施不堪重负，并引发了社会紧张局势。"
 ALG_welcome_migrants: "门户开放"
 ALG_welcome_migrants_desc: "阿尔及利亚欢迎移民和难民，提供人道主义援助和融入支持。"
 ALG_refugees_maintained: "难民管理得当"
 ALG_refugees_maintained_desc: "阿尔及利亚的难民人口管理得当，拥有完善的设施和融合计划。"
 ALG_closed_borders_idea: "关闭边境"
 ALG_closed_borders_idea_desc: "阿尔及利亚的边境已加强管控，防止非法移民入境。边境巡逻和围栏设施有效遏制了未经授权的越境行为。"
 ALG_berber_rights_idea: "扩大柏柏尔人权利"
 ALG_berber_rights_idea_desc: "阿马齐格人享有包括语言认可、文化项目和政治代表权在内的更多权利。"
 ALG_drug_crisis: "毒品危机"
 ALG_drug_crisis_desc: "毒品走私与成瘾已成为严重问题，给执法和医疗服务带来了巨大压力。"
 ALG_drugs_decriminalized: "毒品非刑事化"
 ALG_drugs_decriminalized_desc: "药物滥用被视为健康问题而非刑事犯罪。戒瘾治疗项目帮助成瘾者康复。"
 ALG_drugs_crackdown: "打击毒品产业"
 ALG_drugs_crackdown_desc: "对毒品犯罪的严厉惩罚和积极的执法行动，旨在打击毒品贩运者和交易者。"
 ALG_traditions_matter_idea: "传统价值观"
 ALG_traditions_matter_idea_desc: "阿尔及利亚倡导包括家庭、信仰和社区在内的传统价值观，抵制西方文化影响。"
 ALG_censored_internet_idea: "审查互联网"
 ALG_censored_internet_idea_desc: "政府管控网络访问，屏蔽境外宣传及不道德内容。"
 ALG_women_role_idea: "传统性别角色"
 ALG_women_role_idea_desc: "女性被鼓励接受家庭主妇和母亲的传统角色。女性劳动力参与率有所下降。"
 ALG_marriage_subsidies_idea: "婚姻补贴"
 ALG_marriage_subsidies_idea_desc: "政府为婚姻提供补贴，帮助年轻夫妇负担婚礼费用，并鼓励组建家庭。"
 restricts_women_rights: "限制女性权利"
 ALG_migration_flood: "处于移民危机中"
 ALG_drugs: "处于毒品危机中"
 ALG_mediterranean_games_preparation: "为地中海运动会做准备"
 ALG_mediterranean_games_preparation_desc: "为迎接2022年地中海运动会，奥兰正在进行全面改造。建筑工人正夜以继日地赶工建设奥林匹克综合场馆、新体育场和运动员村。随着阿尔及利亚准备迎接26个国家的到来，全国上下都团结起来支持这一历史性盛会。"
 ALG_more_infra: "扩建基础设施"
 ALG_more_infra_desc: "阿尔及利亚的基础设施亟需大规模扩建，以支撑经济增长。新建的公路、铁路和公共设施将连通各地社区，促进全国范围内的贸易流通。"
 TT_ALG_SECULAR_DISCONTENT_MODIFIER: "§R世俗主义者日益不满§!\n进步与世俗的阿尔及利亚人反对宗教政策。"
 TT_ALG_ISLAMIST_SATISFACTION_MODIFIER: "§G伊斯兰主义者支持度上升§!\n宗教保守派对这些措施表示赞同。"
 ALG_more_relation_better: "§H如果我们§!§G关系更好，§!§H他们§! §G更有可能加入§! ！"
 algerian_military_dismantling: "军队解体"
 algerian_military_dismantling_desc: "阿尔及利亚的军队正在被系统性地拆解。装备被淘汰，部队被解散，军官被强制退役。曾经强大的阿尔及利亚国家人民军如今已名存实亡。"
 algerian_student_exchanges: "学生交流计划"
 algerian_student_exchanges_desc: "阿尔及利亚学生赴海外大学留学，同时国际学生来到阿尔及利亚学习。这些交流活动建立了联系，促进了知识传递，并培养了阿尔及利亚的下一代专业人才。"
 ALG_boost_reformists: "提升改革派影响力"
 ALG_boost_old_guard: "提升保守派影响力"
 ALG_rally_students: "动员学生"
 ALG_mobilize_veterans: "动员老兵"
 ALG_bribe_elites: "贿赂精英"
 ALG_seek_compromise: "寻求妥协"
 ALG_media_campaign_reform: "媒体宣传改革"
 ALG_security_crackdown: "安全部门镇压"
 ALG_world_tension_security: "国际动荡"
 ALG_world_tension_high_security: "国际剧烈动荡"
 ALG_path_crackdown_momentum: "镇压势头"
 ALG_path_reconciliation_momentum: "和解势头"
 ALG_oil_patronage: "石油福利"
 ALG_economic_reforms: "经济改革"
 ALG_ter_oboronaup_start: "国土防御"
 ALG_internalup_start: "内卫部队"
 ALG_MAJLIS_WATANI_SHAABI_DESC: "人民国民议会是阿尔及利亚议会的下议院。在这一体制下，行政权归属于议会而非单一总统，由此建立起真正的议会制共和国，由民选代表集体治理国家。"
 ALG_a_new_algeria_tt: "布特弗利卡的腐败网络被瓦解。其非法所得被没收，财产被拍卖，追回的资金已归还国库。"
 FIS_faction_middle_east_available_tt: "至少一个中东逊尼派国家必须对我们的态度高于70，并奉行干预主义外交政策。"
 FIS_faction_asia_available_tt: "至少一个亚洲逊尼派国家必须对我们的态度高于70，并奉行干预主义外交政策。"
 ALG_4g_upgrade_decisions_tt: "解锁升级国家4G网络基础设施的决议。"
 ALG_environmental_campaign_no_space_tt: "没有可用建筑槽位。已通过环保媒体宣传提升国内影响力。"
 ALG_grand_mufti_rule_djaballah_tt: "阿卜杜拉·贾巴利将被任命为国家元首，为阿尔及利亚的治理带来保守的伊斯兰主义方向。"
 ALG_grand_mufti_rule_ulema_tt: "乌理玛委员会将受邀以教权领导阿尔及利亚，这将引发对立教派间的抉择。"
 ALG_revivify_non_aligned_movement_t: "阿尔及利亚将致力于振兴不结盟运动，将自己定位为大国集团之外国家的主导声音。"
 TT_ALG_REDUCE_TAXES_5: "人口税率将降低5%，减轻下层阶级的负担，并在农民中建立支持。"
 ALG_east_west_highway: "东西向高速公路"
 ALG_east_west_highway_desc: "东西向高速公路将成为阿尔及利亚的经济命脉，连接从安纳巴到特莱姆森的主要人口中心，极大改善国内贸易和交通流动性。"
 ALG_future_national_policy1: "十字路口上的国家"
 ALG_future_national_policy1_desc: "阿尔及利亚的未来尚未书写。未来几年所做的决定将塑造这个国家——它的价值观、盟友以及在世界上的地位。"
 ALG_hassi_massoud_exploitation_desc: "哈西迈萨乌德油田是非洲最大的油田之一。通过投资全面开发，阿尔及利亚可以显著提高石油产量，并确保长期的能源收入。"
 ALG_north_south_highway_desc: "一条横跨撒哈拉的高速公路将连接北部海岸与南部腹地，这将打开阿尔及利亚广袤的内陆地区，促进资源开采并减少区域不平等。"
 ALG_black_decade_lesson2_idea: "黑色十年的教训 II"
 ALG_black_decade_lesson2_idea_desc: "基于内战的惨痛教训，我们对武装力量进行了改革。阿尔及利亚军队已做好更充分准备，能够在不诉诸无差别暴力的前提下应对内部威胁。"
 ALG_black_decade_lesson3_idea: "黑色十年的教训 III"
 ALG_black_decade_lesson3_idea_desc: "十年的改革已经重塑了阿尔及利亚的安全理念。如今，反极端主义已融入军事文化，专门设立的部队和情报网络旨在预防未来的叛乱活动。"
 ALG_decline_of_tourism1: "恢复旅游业"
 ALG_decline_of_tourism1_desc: "最糟糕的衰退时期已经过去。有针对性的投资和安全条件的改善，正开始吸引游客重返阿尔及利亚的历史遗迹和地中海海岸线。"
 ALG_destroyed_agriculture_two: "受损的农业"
 ALG_destroyed_agriculture_two_desc: "持续的不稳定局势继续阻碍农业复苏。农田依然荒芜，农村社区难以恢复正常耕作活动。"
 ALG_destroyed_agriculture_three: "农业重建"
 ALG_destroyed_agriculture_three_desc: "农业部门的重建工作正在进行中。新的区域正在开垦，基础设施也在逐步重建，以恢复粮食生产能力。"
 ALG_family_centric_2: "家是本 II"
 ALG_family_centric_2_desc: "对传统家庭结构的重视日益加深，社会政策正围绕将家庭视为阿尔及利亚社会基石的保守理念进行重塑。"
 ALG_hydroelectric_power_plants_upgraded2_idea: "先进水电网络"
 ALG_hydroelectric_power_plants_upgraded2_idea_desc: "阿尔及利亚水电基础设施的第二轮升级显著提升了全国范围内的能源储存能力和电网可靠性。"
 ALG_mastering_atom_2: "掌握原子之力 II"
 ALG_mastering_atom_2_desc: "阿尔及利亚的核计划已进展至浓缩阶段，引发国际社会担忧。该国目前虽未迈出最后一步，但已具备生产武器级材料的能力。"
 ALG_mastering_atom_3: "掌握原子之力 III"
 ALG_mastering_atom_3_desc: "阿尔及利亚已成功研发出核武器，跻身世界核大国行列，显著改变了地区力量平衡。"
 ALG_riot_police_1: "“闪电”快速反应部队"
 ALG_riot_police_1_desc: "一支专门的防暴警察部队已经组建完成，他们经过专门训练，旨在驱散抗议活动并维持城市中心的秩序。他们的存在对民间骚乱起到了威慑作用。"
 ALG_riot_police_2: "“闪电”部队改革"
 ALG_riot_police_2_desc: "在公众对过度使用武力的批评后，防暴警察部队已缩减规模并进行改革。其职权范围被收窄，监督力度也有所加强。"
 ALG_riot_police_3: "“闪电”精英部队"
 ALG_riot_police_3_desc: "“闪电”部队已扩编并专业化，成为一支能够在全国范围内快速部署的精英内部安全力量。"
 ALG_science_idea_two: "阿尔及利亚科研复兴 II"
 ALG_science_idea_two_desc: "在第一波科学投资的基础上，阿尔及利亚已建立起一个研究机构网络与国际合作关系，正加速推动技术发展。"
 ALG_air_reform_desc: "阿尔及利亚空军的第一轮改革已经启动，旨在实现指挥体系现代化，并对老化的机群进行升级。"
 ALG_air_reform2_desc: "空军改革的第二阶段引入了先进的训练项目并改进了维护流程，提升了作战准备状态。"
 ALG_air_reform3_desc: "阿尔及利亚空军已进行大规模重组。新组建的飞行中队配备了现代化战机，显著提升了防空能力与力量投射水平。"
 ALG_air_reform4_desc: "空军改革计划已完成。阿尔及利亚如今拥有非洲大陆上最强大的空军之一。"
 ALG_algerian_tourism_desc: "阿尔及利亚正积极推动旅游业发展，通过投资酒店基础设施和开展国际营销活动，吸引游客前来探索其丰富的文化与自然遗产。"
 ALG_army_reform_desc: "阿尔及利亚军队已启动一项全面的改革计划，旨在实现现代化，提升训练水平、后勤保障及指挥体系。"
 ALG_army_reform_mass_army_desc: "阿尔及利亚正在建设一支能够持续作战的大型常规军队，优先发展人力与机械化步兵，而非特种部队。"
 ALG_army_reform_mass_army2_desc: "大规模陆军改革已进入第二阶段，后勤保障与装甲支援能力的提升显著增强了阿尔及利亚地面部队的常规作战能力。"
 ALG_army_reform_mass_army3_desc: "阿尔及利亚的大规模陆军学说已完全确立。大型合成兵种编队现已成为该国地面防御战略的中坚力量。"
 ALG_army_reform_mass_army4_desc: "大规模陆军计划已完成。阿尔及利亚能够部署数量占优的地面部队，并得到强大后勤基础设施的支持。"
 ALG_army_reform_specops_desc: "阿尔及利亚正在投资特种作战部队，组建了专精于反恐、快速反应和非传统战争训练的精锐部队。"
 ALG_army_reform_specops2_desc: "特种部队计划已扩大规模，新增了人质营救、深度渗透和直接行动作战等训练科目。"
 ALG_army_reform_specops3_desc: "阿尔及利亚特种部队汲取了数十年来在萨赫勒地区及国内反叛乱行动中的经验教训，已具备高水平作战能力。"
 ALG_army_reform_specops4_desc: "特种部队改革计划已完成。阿尔及利亚的精锐部队是非洲最具战斗力的部队之一，因其丰富的实战经验和先进的作战能力而备受尊敬。"
 ALG_basic_income_support_desc: "一项基本收入支持计划为阿尔及利亚最贫困的公民提供了财务安全网，有助于减少贫困并缓冲经济波动带来的影响。"
 ALG_black_decade_methods_desc: "安全部队继续沿用内战时期发展起来的残酷手段。尽管短期内有效，这种做法却会助长怨恨情绪，并可能重新点燃其试图压制的极端主义。"
 ALG_border_security_idea_desc: "加强边境检查站和扩大巡逻路线，提升了阿尔及利亚拦截走私者、武器贩运者以及穿越其广阔沙漠边境的极端分子渗透的能力。"
 ALG_childcare_reform_desc: "新的儿童保育设施和托儿补贴计划正在推广实施，让家庭更易平衡工作与育儿。"
 ALG_closed_moroccan_border_desc: "与摩洛哥的边境依然牢牢关闭。虽然这限制了跨境走私活动，但也扼杀了合法贸易，并加深了两国之间的外交僵局。"
 ALG_confidence_measures_idea_desc: "阿尔及利亚与其邻国之间的一揽子建立信任措施正在帮助缓解紧张局势，并为外交对话开辟渠道。"
 ALG_counter_morocco_idea_desc: "阿尔及利亚正通过外交施压、支持波利萨里奥阵线，以及争夺非洲盟友的战略竞争，积极对抗摩洛哥在该地区的影响力。"
 ALG_dialogue_with_morocco_desc: "与摩洛哥的谨慎对话已经开启，旨在探讨在多年敌对后实现关系正常化并重新开放边境的可能性。"
 ALG_education_arabization_desc: "教育系统的阿拉伯化进程进一步深化，各级教学已全面用阿拉伯语取代法语授课，并将伊斯兰价值观融入国家课程体系。"
 ALG_food_subsidy_idea_desc: "政府补贴使主食价格保持低位，确保即使是最贫困的阿尔及利亚人也能负担得起基本营养。然而，这给国家预算带来了沉重负担。"
 ALG_foreign_arms_companies_desc: "阿尔及利亚已向外国军火制造商开放采购程序，此举虽能获得更广泛的军事装备，但也增加了对外部供应商的依赖。"
 ALG_free_press_desc: "阿尔及利亚正在出现独立的新闻媒体，它们让官员承担责任，并为公民提供多元化的观点——尽管这也给政府带来了新的政治压力。"
 ALG_fuel_subsidy_idea_desc: "燃油价格补贴政策降低了阿尔及利亚家庭和企业的交通及能源成本，但这构成了巨大的财政负担，限制了政府的预算灵活性。"
 ALG_future_army_desc: "阿尔及利亚正投资于新一代军事技术与学说，将其武装力量置于现代战争能力的前沿。"
 ALG_global_power_desc: "阿尔及利亚已确立自身为真正的全球强国，在国际舞台上占有一席之地，并拥有支撑其地位的经济与军事实力。"
 ALG_health_insurance_system_desc: "国家医疗保险体系正在建立，确保阿尔及利亚人无论收入水平如何都能获得医疗服务。"
 ALG_housing_support_idea_desc: "政府住房支持计划正在帮助低收入家庭获得经济适用房，缓解了阿尔及利亚城市住房短缺的压力。"
 ALG_hydroelectric_power_plants_upgraded_idea_desc: "阿尔及利亚的水电基础设施已得到升级，提升了水力发电的容量与可靠性，并减少了对化石燃料的依赖。"
 ALG_idea_arab_diplomacy_desc: "阿尔及利亚正积极推行阿拉伯外交议程，致力于在阿拉伯国家联盟及更广泛的阿拉伯世界中扮演关键调解者与代言人的角色。"
 ALG_idea_parliamentary_republic_desc: "阿尔及利亚已采用议会共和制，将行政权力向立法机构转移，建立起一个更具问责性的政府形式。"
 ALG_idea_presidential_republic_desc: "阿尔及利亚实行总统共和制，行政权力集中于总统，总统由人民直接选举产生。"
 ALG_idea_refoming_education_desc: "第一轮教育改革已经启动，全国范围内课程标准、教师培训及入学机会都得到了改善。"
 ALG_idea_refoming_education1_desc: "教育改革的第二阶段已扩大中等教育规模，提升职业培训质量，并在阿尔及利亚全国学校推行了更新的教学方法。"
 ALG_idea_semi_presidential_republic_desc: "阿尔及利亚的半总统制在直接选举产生的总统与对议会负责的总理之间实现了权力制衡。"
 ALG_maghreb_cooperation_idea_desc: "阿尔及利亚正致力于深化与马格里布邻国的经济和政治合作，为建立一个更一体化的北非区域集团奠定基础。"
 ALG_maghreb_security_idea_desc: "与马格里布伙伴建立共享安全框架，正推动萨赫勒地区在反恐、打击走私及应对跨境不稳定局势方面形成协调一致的应对机制。"
 ALG_maghreb_trade_idea_desc: "与马格里布国家达成的优惠贸易协定正在促进区域内贸易，减少了阿尔及利亚对欧洲市场的依赖。"
 ALG_mastering_atom_desc: "阿尔及利亚已启动一项秘密核计划，建立了最终研发武器级材料所需的研究基础设施。"
 ALG_military_expansion_desc: "阿尔及利亚正在扩大其武装部队规模，投资新装备并招募更多人员，以投射更强大的军事力量。"
 ALG_military_expansion2_desc: "军事扩张计划已进入第二阶段，新的装甲部队、炮兵旅和防空系统已投入使用。"
 ALG_military_junta_desc: "军方已直接接管国家政权。阿尔及利亚由将军组成的军政府统治，其合法性建立在武力而非民众授权之上。"
 ALG_military_quality_initiative_desc: "质先于量理念的军事改革，正在提升阿尔及利亚武装部队的专业素养、训练水平和装备质量。"
 ALG_military_quality_initiative2_desc: "军事素质提升计划的第二阶段引入了先进的模拟训练，改进了军官教育体系，并扩大了联合军种演习规模。"
 ALG_modern_hospitals_desc: "阿尔及利亚正在建设配备现代医疗技术的医院网络，显著提升了民众的医疗保健水平。"
 ALG_natural_products_idea_desc: "阿尔及利亚正在国际市场上推广其天然产品——包括椰枣、橄榄油和手工艺品，以此实现出口收入多元化并支持农村社区发展。"
 ALG_naval_reform_desc: "阿尔及利亚海军正经历数十年来首次重大改革，提升维护水平、训练质量及水面舰队作战能力。"
 ALG_naval_reform2_desc: "作为海军改革第二阶段的一部分，阿尔及利亚已列装新型护卫舰与巡逻艇，从而将其力量投送范围扩展至西地中海区域。"
 ALG_naval_reform3_desc: "阿尔及利亚的海军能力已显著提升，其反潜作战与海岸防御能力均得到加强。"
 ALG_naval_reform4_desc: "海军改革计划已完成。阿尔及利亚如今拥有一支现代化、均衡的海军力量，能够在地中海乃至大西洋范围内投射实力。"
 ALG_open_border_coop_desc: "阿尔及利亚已向邻国开放边境，以促进更广泛的跨境合作，便利贸易、人员流动及联合基础设施项目的开展。"
 ALG_pna_expansion_desc: "国家人民军已扩大后勤与行政保障能力，提升了在阿尔及利亚广阔领土上维持大规模军事行动的能力。"
 ALG_polisario_support_idea_desc: "阿尔及利亚继续向波利萨里奥阵线提供政治、后勤和物资支持，在西撒哈拉争端中持续对摩洛哥施压。"
 ALG_private_clinics_expansion_desc: "私营医疗部门获准扩张，为有能力负担的人群提供更高质量的医疗服务，同时减轻了公共医疗体系的压力。"
 ALG_private_healthcare_idea_desc: "阿尔及利亚正鼓励私人投资医疗保健，建立与公共系统并行的私营部门，提供高端医疗服务。"
 ALG_reactioners_desc: "国家官僚体系与军队中的保守势力抵制实质性改革，为维护既有秩序的利益不惜牺牲现代化进程。"
 ALG_reactioners1_desc: "反动势力虽已有所削弱，但其在关键机构中仍保有相当影响力，持续阻碍着变革的步伐。"
 ALG_reactioners2_desc: "旧势力的掌控正在松动。改革势力已积聚足够动力，足以突破许多先前阻碍进步的体制性障碍。"
 ALG_reactioners3_desc: "反动派势力已遭到大幅边缘化。新的政治安排已将他们的许多盟友从权力位置上清除。"
 ALG_reactioners4_desc: "系统性改革已击溃反动集团的脊梁。阿尔及利亚的机构日益响应民众需求，而非固守精英阶层的利益。"
 ALG_reactioners5_desc: "旧势力中仅存的抵抗力量已孤立无援。阿尔及利亚政治文化的转型即将完成。"
 ALG_reactioners6_desc: "反动制度的最后残余已被扫除。阿尔及利亚进入了一个以问责制和真正政治竞争为标志的新时代。"
 ALG_reactioners7_desc: "阿尔及利亚已彻底告别其威权主义历史。如今国家以民主规范和法治为基础构建，旧有的庇护网络已被瓦解。"
 ALG_sand_war_memory_idea_desc: "1963年沙地战争的记忆至今仍影响着阿尔及利亚的军事规划和外交政策，使其对摩洛哥的意图保持着根深蒂固的制度性怀疑。"
 ALG_science_idea_desc: "阿尔及利亚正投资于科学研究与发展，新建实验室并资助大学研究项目，以构建国内知识经济体系。"
 ALG_shipbuilding_desc: "阿尔及利亚正在发展国内造船业，建设能够生产海军舰艇和商用船舶的设施，以减少对外国供应商的依赖。"
 ALG_shipbuilding2_desc: "造船业已经成熟，如今国内能够生产更大、更复杂的船只。阿尔及利亚正逐渐成为一个可信赖的海事制造国。"
 ALG_social_contract_idea_desc: "政府与民众形成新的社会契约，以政治默许换取有保障的补贴、公共就业和社会服务。"
 ALG_sonatrach_desc: "阿尔及利亚国家石油天然气公司（Sonatrach）依然是国民经济的支柱，为国家创造了绝大部分的出口收入。"
 ALG_state_hospitals_idea_desc: "尽管存在长期资金不足导致各地区医疗质量差异显著的问题，但阿尔及利亚通过国营医院网络为全体国民提供了基本医疗保障。"
 ALG_suppressed_opposition_desc: "通过法律限制、媒体管控和直接恐吓相结合的手段，政治反对派的声音已被压制。异议并未被彻底清除，而是被推向了地下。"
 ALG_technological_ties_desc: "阿尔及利亚与外国合作伙伴建立了技术转让协议，通过提供经济和外交上的让步，获得了先进系统与专业知识。"
 ALG_tikjda_resort_desc: "卡比利亚地区的提克贾山区度假胜地正在被开发为旗舰旅游目的地，推广生态旅游，吸引游客前往阿尔及利亚的阿特拉斯山脉。"
 ALG_universal_healthcare_idea_desc: "阿尔及利亚已建立起全民医疗体系，通过一般税收和石化产业收入提供资金，为所有公民提供免费或高额补贴的医疗服务。"
 ALG_university_expansion_desc: "阿尔及利亚各地正在建立新的大学校区，扩大高等教育覆盖面，培养能够满足现代经济需求的毕业生。"
 ALG_welfare_state_idea_desc: "阿尔及利亚已建立起全面的福利国家体系，提供住房支持、医疗保健、教育和收入补助，其资金主要来源于油气收入。"
 FIS_al_aqsa_faction: "阿克萨联盟"
 Algeria_desc: "阿尔及利亚"
 AlgeriaFocusEvents_desc: "阿尔及利亚国策触发事件。"
 algeria_focus_desc: "阿尔及利亚的国策树涵盖政治、经济、军事及外交政策路线。"
 algerian_focus_desc: "阿尔及利亚的国策树涵盖政治、经济、军事及外交政策路线。"
 algeria_power_balance_desc: "阿尔及利亚的平民政府与军方机构之间的权力平衡，后者长期以来一直像一个国中之国般运作。"
 nuclear_algeria_desc: "阿尔及利亚已跨越核门槛，拥有可投入实战的核武器，这从根本上改变了其在北非乃至整个地中海地区的战略态势。"
 ALG_african_union_member1: "非洲联盟观察员国"
 ALG_african_union_member1_desc: "阿尔及利亚深化了与非洲联盟的互动，已超越标准成员国身份，在大陆外交及维和行动中扮演更为积极的角色。"
 ALG_arab_league_member: "阿拉伯联盟成员"
 ALG_arab_league_member_desc: "阿尔及利亚在阿拉伯联盟中保留席位，参与阿拉伯集体外交立场，并受益于区域经济合作框架。"
 ALG_bouteflika_legacy: "布特弗利卡的遗产"
 ALG_bouteflika_legacy_desc: "布特弗利卡时代的漫长阴影依然笼罩着阿尔及利亚政坛。他所建立的根深蒂固的庇护网络和有罪不罚文化，仍在阻碍着实质性的改革进程。"
 ALG_civilian_government: "文官政府"
 ALG_civilian_government_desc: "几十年来，阿尔及利亚首次由真正的文职政府执政。军队已从直接政治干预中退居幕后，让民选官员来领导国家。"
 ALG_corrupt_generals: "腐败将领"
 ALG_corrupt_generals_desc: "高级军事领导层腐败丛生。那些通过数十年裙带关系致富的将军们，对任何可能威胁其经济利益的政策改革都极力抵制。"
 ALG_currency_reform_idea: "货币改革"
 ALG_currency_reform_idea_desc: "阿尔及利亚已着手进行货币管理改革，稳定了第纳尔币值，缩小了官方汇率与黑市汇率之间的差距。"
 ALG_economic_recovery_boost: "经济复苏势头"
 ALG_economic_recovery_boost_desc: "一段持续的针对性投资和政策改革已产生真正的经济动力，提升了生产效率并谨慎降低了商品成本。"
 ALG_ethnic_unrest: "民族动乱"
 ALG_ethnic_unrest_desc: "国内部分地区酝酿已久的民族紧张局势正演变为公开骚乱。被边缘化的社群正对感受到的歧视和国家忽视发起反抗。"
 ALG_government_led_disaster: "政府灾难应急"
 ALG_government_led_disaster_desc: "国家已直接掌控灾害应对工作，大规模调配公共资源。尽管成本高昂且流程繁琐，但此次干预正在实地产生切实成效。"
 ALG_hospital_modernization: "医院现代化计划"
 ALG_hospital_modernization_desc: "一项全国性的医院基础设施现代化计划正在升级设施、更换过时设备，并提高治疗民众的能力。"
 ALG_idea_korea_resplendent: "韩国战略伙伴关系"
 ALG_idea_korea_resplendent_desc: "与韩国的全面战略伙伴关系带来了先进技术转让、联合防务项目以及经济投资，这些都在加速阿尔及利亚的现代化进程。"
 ALG_imf_program_modifier: "IMF调整计划"
 ALG_imf_program_modifier_desc: "阿尔及利亚正在实施一项国际货币基金组织支持的结构调整计划。随之而来的财政纪律和补贴削减在政治上令人痛苦，但正开始稳定经济。"
 ALG_internal_troops_idea: "内部安全部署"
 ALG_internal_troops_idea_desc: "军事和准军事单位已被部署用于国内安全任务，增强了警力并镇压了动荡地区的抵抗活动。"
 ALG_msp_presidency: "和平社会运动总统"
 ALG_msp_presidency_desc: "\"和平社会运动\"已执掌总统大权，首次将伊斯兰民主政党推上权力之巅，从而改变了阿尔及利亚的政治重心格局。"
 ALG_no_disasters_plan: "灾难应急预案缺失"
 ALG_no_disasters_plan_desc: "阿尔及利亚目前缺乏专门的灾害应对框架。危机来袭时，协调规划的缺失导致国家反应迟缓且低效，使事态进一步恶化。"
 ALG_olympic_preparation: "备战奥运"
 ALG_olympic_preparation_desc: "阿尔及利亚正为举办奥运会投入巨资，建设世界级体育设施并启动国家级运动员培养计划。"
 ALG_random_bad: "意外挫折"
 ALG_random_bad_desc: "一场意外的经济或政治挫折动摇了公众信心，并打乱了政府的改革议程。"
 ALG_random_good: "意外成功"
 ALG_random_good_desc: "一个意想不到的进展——外交突破、大宗商品价格飙升或政策成功——让阿尔及利亚政府获得了难得的信心与资源提振。"
 ALG_secondary_education_reform: "中等教育改革"
 ALG_secondary_education_reform_desc: "阿尔及利亚中等教育改革正在提升课程标准，增加完成高中会考的学生比例，并让毕业生更好地为高等教育做好准备。"
 ALG_social_welfare_modifier: "扩大社会福利"
 ALG_tebboune_moderate: "特本的温和路线"
 ALG_tebboune_moderate_desc: "特本总统采取了一条温和的政治路线，在向公民社会做出谨慎改革姿态的同时，坚定地维护现有秩序。"
 ALG_tourism: "旅游发展倡议"
 ALG_tourism_desc: "阿尔及利亚正投资发展旅游业，建设新的基础设施并推广其丰富的文化遗产，以吸引国际游客。"
 algerian_empowered_sharia_courts: "赋予沙利亚法庭权力"
 algerian_gulen_movement: "居伦式运动"
 algerian_scientific_ventures: "阿尔及利亚科研探索"
 hoggar_nuclear_facility_idea: "霍加尔核设施"
 hoggar_nuclear_facility_idea_2: "霍加尔先进核设施"
 ALG_2014_oil_crash_idea_desc: "2014年油价暴跌重创了阿尔及利亚的油气收入，暴露了其依赖资源的经济模式的脆弱性，并迫使政府痛苦地削减公共支出。"
 ALG_AU_pressure_idea_desc: "非洲联盟正就一个地区性问题向阿尔及利亚施加外交压力，这限制了其外交政策选择，并使其与邻国的关系复杂化。"
 ALG_balanced_foreign_policy_desc: "阿尔及利亚正维持着一种精心平衡的外交政策，拒绝完全倒向任何阵营，并利用其战略重要性从多个伙伴那里获取利益。"
 ALG_black_market_desc: "国家阴影下蓬勃发展的黑市，不仅扭曲了官方贸易统计数据，还侵蚀了政府税收，助长了有组织犯罪网络。"
 ALG_chinese_investments_desc: "中国资本正流入阿尔及利亚的基础设施和能源领域，提供了急需的投资，但也引发了对其债务依赖和外国经济影响的担忧。"
 ALG_clean_government_desc: "新一代技术官僚官员为政府带来了更高的透明度和问责制。腐败现象正在减少，公众对国家机构的信任也在缓慢恢复。"
 ALG_decline_of_tourism_desc: "阿尔及利亚旅游业正面临严重衰退。安全隐忧、基础设施薄弱以及严苛的签证制度，使得该国对外国游客缺乏吸引力，给经济造成了沉重打击。"
 ALG_destroyed_agriculture_desc: "阿尔及利亚的农业部门因冲突和忽视而遭受重创。农田荒芜，农村社区流离失所，粮食进口依赖度急剧上升。"
 ALG_diversification_desc: "阿尔及利亚正积极推动经济多元化，减少对石化产业的依赖，通过投资制造业、农业和服务业来构建更具韧性的经济基础。"
 ALG_election_time_idea_desc: "一场竞选活动正在进行中，主导着政治议程，随着各竞争派系动员其支持者，既创造了机会也带来了不稳定。"
 ALG_emergency_budget_desc: "政府已启动紧急预算预案，削减非必要开支并重新调配资源，以应对严峻的经济或安全危机。"
 ALG_health_insurance_idea_desc: "正在试点建立基本国民健康保险框架，通过统筹缴费为参保公民提供基本医疗服务保障。"
 ALG_health_insurance_idea1_desc: "国民健康保险体系已得到扩展和巩固，为更大比例的人口提供了显著改善的医疗保障。"
 ALG_human_rights_first_desc: "阿尔及利亚已采取人权优先的治理方针，将国际人权标准纳入国内法律，并将权利保护置于国家政策的核心位置。"
 ALG_idea_joint_military_arab_desc: "阿尔及利亚已与阿拉伯伙伴国建立了联合军事框架，实现了区域内的协同防御规划、情报共享及联合训练演习。"
 ALG_idea_russian_military_presence_desc: "俄罗斯通过在阿尔及利亚部署军事顾问、举行联合演习及建立基地安排，增强了阿尔及利亚的军事实力，同时也加深了其对莫斯科的依赖。"
 ALG_independent_judiciary_desc: "阿尔及利亚司法部门已获得真正的独立，不再受行政权力干预。法院现在可以对官员进行问责，公民也有了有效的法律救济途径。"
 ALG_insurgency_unleashed_desc: "阿尔及利亚蓄意在邻国培植叛乱网络，通过非正规代理人投射力量并破坏对手稳定，从而避免直接的军事介入。"
 ALG_investor_confidence_desc: "阿尔及利亚投资者信心正在上升。政府治理的改善、宏观经济状况的稳定以及改革信号的释放，正吸引外资重新流入该国经济。"
 ALG_jcpoa_idea_desc: "阿尔及利亚参照《伊核协议》框架，签署了一项民用核协议，以限制其武器计划为条件，换取解除制裁并进入国际市场。"
 ALG_joint_scientific_collaboration_idea_desc: "阿尔及利亚与伙伴国建立了联合科学合作框架，整合研究能力并共享技术，以加速多个领域的发展。"
 ALG_joint_scientific_collaboration_idea_2_desc: "科学合作已深化为全面的研究伙伴关系，共享实验室、联合发表论文以及协调技术转让计划正在推进中。"
 ALG_joint_scientific_collaboration_idea_3_desc: "此次合作已发展为全面的战略科学伙伴关系，涵盖核研究、卫星技术和先进材料领域，双方均投入了大量资源。"
 ALG_national_dialogue_modifier_desc: "全国对话进程将政府与反对派聚集在一起，为政治协商创造了难得空间，降低了直接对抗的紧迫风险。"
 ALG_neo_colonialism_desc: "阿尔及利亚正利用资源开采协议，以明显偏向本国利益的条件与较弱邻国合作，从该地区榨取价值，而非建立真正的伙伴关系。"
 ALG_nspa_idea_desc: "国家航空航天计划已正式启动，将阿尔及利亚的卫星与航天雄心整合进由国家投资支持的统一战略框架之中。"
 ALG_political_repression_desc: "国家正在实施系统性的政治压制——逮捕活动人士、审查媒体，并利用安全部门来压制异议以维持控制。"
 ALG_primary_education_reform_desc: "阿尔及利亚初等教育体系改革已更新国家课程、提高教师薪资，并扩大了农村及欠发达地区的教育覆盖面。"
 ALG_relying_on_our_own_strength_spirit_2_desc: "阿尔及利亚的自力更生政策已延伸至建筑领域，国内工业产能日益能够满足国家基础设施建设需求。"
 ALG_relying_on_our_own_strength_spirit_3_desc: "自力更生计划已臻成熟。阿尔及利亚的工业基础现已实现高度自主，能够在不依赖外国供应商的情况下生产现代国家所需的基本物资。"
 ALG_repression_modifier_desc: "阿尔及利亚政坛掀起了一股镇压浪潮。反对派人士遭到拘留，媒体被噤声，公众示威活动遭到武力驱散。"
 ALG_russia_cooperation_desc: "阿尔及利亚与俄罗斯深化了战略合作，巩固了建立在军购、能源投资以及共同抵制西方政治压力基础上的双边关系。"
 ALG_sahara_expansion_1_desc: "沙漠化正在向阿尔及利亚南部的农业区蔓延。撒哈拉沙漠扩张的初步迹象已经显现，威胁着农业社区，并减少了可耕地面积。"
 ALG_sahara_expansion_2_desc: "撒哈拉沙漠化加剧，导致受影响南部省份的农业产出减少，农村社区人口流离失所。"
 ALG_sahara_expansion_3_desc: "沙漠化持续蔓延，大片原本肥沃的农田正被不断扩张的荒漠吞噬。"
 ALG_sahara_expansion_4_desc: "撒哈拉沙漠的扩张正演变为一场国家危机。农业损失日益加剧，南部人口向北方城市迁移给城市带来了巨大压力。"
 ALG_sahara_expansion_5_desc: "阿尔及利亚南部一半的农田正面临威胁。沙漠化危机急需政府紧急干预和国际环境援助。"
 ALG_sahara_expansion_6_desc: "沙漠化已达到临界点。整片农业区已被废弃，这场危机的经济代价正严重消耗着国家预算。"
 ALG_sahara_expansion_7_desc: "沙漠化危机正在重塑阿尔及利亚的地理格局。大规模沙丘移动正侵蚀基础设施，农田流失加剧了粮食不安全状况。"
 ALG_sahara_expansion_8_desc: "撒哈拉沙漠的扩张严重破坏了阿尔及利亚南部的农业部门。土地流失的规模正在导致流离失所的农业社区陷入人道主义危机。"
 ALG_sahara_expansion_9_desc: "沙漠化已吞噬了阿尔及利亚南部大部分农田。面对生态崩溃的规模，治理工作举步维艰。"
 ALG_sahara_expansion_10_desc: "阿尔及利亚南部的农业区几乎完全被撒哈拉沙漠吞噬。若不进行大规模植树造林和水资源管理干预，当前规模的环境灾难将不可逆转。"
 ALG_social_welfare_modifier_desc: "政府扩大了社会福利计划，为弱势群体提供了更多支持，并加强了社会保障网。"
 ALG_sovereignty_first_desc: "阿尔及利亚的内外政策以对主权的绝对承诺为基石。国家不接受任何外部势力干涉其内政，并将民族自决权置于至高无上的地位。"
 ALG_subsidies_desc: "政府维持着涵盖燃料、食品和公共事业的广泛补贴制度。虽然这一制度受到民众欢迎，但其在财政上难以为继，并对整个经济的市场信号造成扭曲。"
 ALG_surveillance_state_modifier_desc: "阿尔及利亚已建立起一套精密的国内监控体系，对通信进行监控，并追踪政治反对派和公民社会活动人士的行踪。"
 ALG_the_lion_roars_idea_desc: "阿尔及利亚军队在一场高风险交战中展现了其作战能力，赢得了坚韧高效的声誉，足以威慑潜在对手。"
 ALG_transparent_budget_desc: "阿尔及利亚推出了透明预算报告制度，首次公布公共支出的详细分类，并允许独立机构对政府账目进行审查。"
 algeria_cultural_rebirth_desc: "一股强大的民族主义文化复兴浪潮正在席卷阿尔及利亚，它抬升本土遗产与历史地位，同时边缘化外来文化影响。"
 algeria_emerging_youth_desc: "一代具有政治参与意识的阿尔及利亚青年正在崛起，他们以日益坚定的姿态推动民主改革与经济机遇。"
 algeria_nationalist_youth_desc: "阿尔及利亚的青年运动已呈现出强烈的民族主义转向，他们要求采取更强硬的外交政策，并终结老一辈与外国利益集团妥协的局面。"
 algerian_empowered_sharia_courts_desc: "伊斯兰法院的管辖权得到扩大，宗教权威对民事和家庭事务的影响力增强，阿尔及利亚的法律框架正朝着伊斯兰教法方向转变。"
 algerian_gulen_movement_desc: "受居伦运动启发的网络已渗透进阿尔及利亚的教育和公民社会领域，推广现代主义伊斯兰教理念，并在国家机构中建立了显著影响力。"
 algerian_scientific_ventures_desc: "与外国合作伙伴共同掀起的一波联合科研浪潮，正推动阿尔及利亚研究领域迎来复兴，其在可再生能源、计算技术和材料科学方面的新项目正获得国际认可。"
 hoggar_nuclear_facility_idea_desc: "在霍加尔山脉深处，一座核研究设施已在偏远地区建立。它的存在是对外国冒险主义的强大威慑。"
 hoggar_nuclear_facility_idea_2_desc: "霍加尔基地已大幅扩建。阿尔及利亚现已拥有完整的核研究能力，配备先进的浓缩与处理设施。"
 idea_alg_empowered_parliament_desc: "阿尔及利亚议会已被授予真正的立法权。现在，议会在预算、立法和部长问责方面拥有实权。"
 idea_algerian_oligarchy_arrests_desc: "对主要寡头的逮捕行动震动了阿尔及利亚商界精英。尽管此举受到公众欢迎，但这场打压行动带来的不确定性已导致私人投资陷入停滞。"
 ALG_flavor_event.6.t: "难民危机"
 ALG_flavor_event.6.d: "难民潮正为逃离邻国的冲突与动荡涌过我们的边境。我们的基础设施不堪重负，民众对于如何应对也意见不一。"
 ALG_flavor_event.6.a: "我们必须吸收他们。"
 ALG_flavor_event.7.t: "毒品走私危机"
 ALG_flavor_event.7.d: "有组织的犯罪网络已将阿尔及利亚转变为毒品的主要中转通道。毒品贸易正在腐蚀当地机构，并加剧边境地区的暴力活动。"
 ALG_flavor_event.7.a: "严厉打击贩毒分子。"
 algeria.41.t: "阿尔及利亚提议结盟"
 algeria.41.d: "阿尔及利亚政府已正式请求我们加入其阵营。接受将使我们与其战略目标绑定，而拒绝则可能恶化与阿尔及尔的关系。"
 algeria.41.a: "我们接受。"
 algeria.41.b: "我们拒绝。"
 fra_colonial.1.t: "往日之影"
 fra_colonial.1.d: "阿尔及尔正式谴责法国在阿尔及利亚的殖民历史，重新揭开了旧伤疤，激起了地中海两岸的舆论热潮。我国议会内部意见分歧——有人要求我们坚守历史立场，也有人视此为和解的契机。"
 fra_colonial.1.a: "捍卫我们的历史记忆。"
 fra_colonial.1.b: "主动示好，表达和解意愿。"
 AlgeriaFocus.910.t: "卡萨布兰卡协定"
 algerian_event.51.d: "尽管困难重重，阿尔及利亚的太空计划依然取得了非凡成就——我们的航天器已成功登陆月球。这一工程技术与国家意志的胜利让阿尔及利亚人民欢欣鼓舞，并将我们的旗帜插上了星空。"
 ALG_aouchiche_desc: "优素福·奥奇什是一位自由改革派，也是社会主义力量阵线的领导人。作为执政体制的直言不讳的批评者，他积极倡导民主改革、公民自由和经济现代化。"
 ALG_hassani_desc: "阿卜杜拉利·哈萨尼·谢里夫是阿尔及利亚主要伊斯兰政党——社会和平运动的领导人。他主张奉行符合民主规范与国家和解的温和政治伊斯兰路线。"
 algeria_elections.a: "就这么定了。"
 alg_military_rule_option: "支持军队的决定。"
 AlgeriaPoliticalEvents.1.t: "阿尔及利亚政治重组"
 AlgeriaPoliticalEvents.1.d: "随着\"黑暗十年\"临近尾声，阿尔及利亚正面临决定未来政治走向的关键抉择。无论是与西方建立伙伴关系、保持不结盟立场，还是加强与东方国家的联系，每条道路都将对这个国家的身份认同与稳定产生深远影响。"
 AlgeriaPoliticalEvents.1.a: "开启大讨论。"
 AlgeriaPoliticalEvents.20.t: "政府内部意识形态分歧"
 AlgeriaPoliticalEvents.20.d: "随着冲突逐渐平息，政府内部就阿尔及利亚未来政治体制的争论日趋激烈。强硬派要求维持军事主导，温和派主张和解与改革，而伊斯兰主义派系则呼吁举行自由选举。"
 AlgeriaPoliticalEvents.20.a: "赋予军队权力。"
 AlgeriaPoliticalEvents.20.b: "推动改革与和解。"
 AlgeriaPoliticalEvents.20.c: "与伊斯兰主义者协商。"
 Algeria.8.t: "阿尔及利亚请求保护"
 Algeria.8.d: "阿尔及利亚政府以地区不稳定局势加剧为由，正式请求美国提供保护或安全保障。华盛顿方面现在必须决定是否扩大其战略保护伞。"
 Algeria.8.a: "我们接受请求。"
 Algeria.8.b: "我们无法对此做出承诺。"
 Algeria.16.t: "阿尔及利亚寻求国际保障"
 Algeria.16.d: "面对日益增长的外部威胁，阿尔及尔已向各大国寻求正式的安全保障。我们的回应将决定未来数年我们与该地区的关系走向。"
 Algeria.16.a: "我们在外交上支持阿尔及利亚。"
 Algeria.16.b: "我们不参与此事。"
 algeria_sahar.4.t: "战争胜利"
 algeria_sahar.4.d: "我军已取得胜利。西撒哈拉冲突已经结束，我们可以按照自己的意愿重塑该地区的政治秩序。"
 algeria_sahar.4.a: "建立撒哈拉联邦。"
 algeria_sahar.6.a: "了解。"
 ALG_alignments: "外交政策倾向"
 KBY_alg_modifier: "卡比利亚地区修正"
 ALG_algiers_metro: "阿尔及尔地铁走廊"
 ALG_diplomatic_outreach_west: "接触西方"
 ALG_diplomatic_outreach_west_desc: "阿尔及利亚与华盛顿及其欧洲盟友的关系一直以相互猜疑为特征。持续的外交倡议可以为加强与西方世界的经济和安全联系奠定基础。"
 ALG_diplomatic_outreach_china: "接触中国"
 ALG_diplomatic_outreach_china_desc: "北京一直在稳步扩大其在非洲大陆的存在。深化与中国的联系可能带来重大的基础设施投资并开辟新市场，尽管这可能会使与西方伙伴的关系复杂化。"
 algeria_casablanca_accords_draft_solution_desc: "在谈判正式开始前，阿尔及利亚必须提出具体的和平框架。我们的提议将决定整个峰会的走向。"
 algeria_casablanca_accords_hold_negotiations_desc: "手握和平框架，阿尔及利亚的外交官们现在必须与各方代表面对面坐下来，敲定具体细节。每一次会谈都让妥协更近一步，但也伴随着谈判破裂的风险。"
 monitor_kabyle_unrest_desc: "卡比利亚山区一直是持续的冲突热点。安全部门必须密切监视该地区的抵抗活动，以防事态升级。"
 kabyle_resistance_tooltip: "卡比利亚地区的抵抗活动依然活跃。"
 ALG_boost_reformists_desc: "在阿尔及利亚不透明的政治架构中，一群技术官僚和现代化推动者一直在推动真正的改革。为他们提供政治庇护和资源，可能会将内部权力平衡转向开放。"
 ALG_boost_old_guard_desc: "建立独立后国家的军官和民族解放阵线老兵网络对变革的步伐日益感到焦虑。重申他们的地位和特权将巩固稳定，但也会固化现状。"
 ALG_rally_students_desc: "大学校园历来是阿尔及利亚政治变革的引擎。围绕改革议程组织学生社团，能够形成自下而上的压力，并推动公共话语的转变。"
 ALG_mobilize_veterans_desc: "独立战争和黑色十年的老兵在阿尔及利亚社会中拥有巨大的道德权威。将他们团结在现有秩序周围，为国家在当前政治斗争中的立场提供了合法性。"
 ALG_bribe_elites_desc: "阿尔及利亚的权力结构很大程度上依赖于非正式的庇护与恩惠网络。向关键人物分配合同、职位及经济利益虽能巩固忠诚，却也加剧了侵蚀国家根基的腐败问题。"
 ALG_seek_compromise_desc: "由于内部辩论双方立场僵持不下，中立的调解努力或许是避免僵局演变为公开对抗的唯一途径。妥协虽无法令任何一方完全满意，但或许能避免最坏的结果。"
 ALG_media_campaign_reform_desc: "国家控制及同情的私营媒体可被引导，围绕政治革新的必要性构建叙事。塑造支持改革的公众舆论，将动摇旧有势力的根基。"
 ALG_security_crackdown_desc: "安全机构可以奉命镇压那些助长改革运动的抗议活动、独立媒体和民间社会团体。这能争取时间，但会为未来埋下更大的隐患。"
 ALG_world_tension_security_desc: "该地区日益加剧的不稳定局势，正为军方提供了新的论据，以牢牢掌控政治局势。利用这一氛围，可以巩固旧有势力的地位。"
 ALG_world_tension_high_security_desc: "随着地区冲突蔓延至阿尔及利亚边境，军方正推动紧急权力法案，这将实质上架空主张改革的文职力量。危机为这一举措提供了掩护，但中止政治竞争将带来长期风险。"
 ALG_path_crackdown_momentum_desc: "镇压行动已见成效。通过额外的安全行动和政治压力来维持势头，将加深旧势力对国家的掌控，但每一步都让逆转变得更加困难。"
 ALG_path_reconciliation_momentum_desc: "改革进程正获得动力。推进更多的建立信任措施和政治开放，能够将和解议程推过无法回头的临界点。"
 ALG_oil_patronage_desc: "长期以来，阿尔及利亚的油气红利一直被用于购买社会安定。在当前政治竞争中，将部分石油收入转向有针对性的利益输送，能够确保关键选民群体的忠诚。"
 ALG_economic_reforms_desc: "阿尔及利亚由国家主导的经济体系效率极其低下。若能推行一套可信的经济改革方案，为私营企业开辟空间并减少官僚主义障碍，民众情绪或将转向改革派阵营。"
 ALG_ter_oboronaup_start_desc: "国家正处于战争状态，国民警卫队呼吁组建地方招募的领土防御部队，以守卫后方地区，并让正规军部队得以腾出手来进行前线作战。"
 ALG_internalup_start_desc: "当前局势需要部署专门的内部安全部队，以维持前线后方的秩序、保护关键基础设施，并防止敌人利用后方的不稳定局势。"
 ALG_casablanca_mission: "寻求卡萨布兰卡方案"
