 EGY.Neutral_Libertarian: "£EGY_Neutral_Libertarian 民主平和党"
 EGY.Neutral_Libertarian_icon: "£EGY_Neutral_Libertarian"
 EGY.Neutral_Libertarian_desc: "イスラム民主主義 - 民主平和党は、エジプトの小規模な政党である。同党の党首がアル・ファラインTVで述べたところによると、党員数は約100万人であるという。同党は、世俗主義的傾向を持ちつつもイスラム的アイデンティティを掲げる政党と評されている。同党は、地域および世界規模での平和の確立を強く求めている。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
