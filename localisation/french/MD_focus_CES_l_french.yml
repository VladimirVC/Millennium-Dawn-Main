 CES_newly_reestab_militar_desc: "L’armée de [ROOT.GetName] a besoin d’une réforme."
 CES_assemble_generals: "Rassemblez les généraux"
 CES_assemble_generals_desc: "Il s’agit d’une étape importante de notre parcours stratégique. Dans notre quête de succès et de prospérité, nous devons réunir tous les vrais généraux, experts et dirigeants de notre armée pour discuter et élaborer un plan de développement solide."
 CES_improve_borderline_guards: "Améliorer les gardes-frontières"
 CES_improve_borderline_guards_desc: "Le renforcement de la sécurité des frontières est une étape stratégique importante pour garantir la sécurité et la stabilité nationales."
 CES_establish_the_doctrine: "Réforme de l'éducation"
 CES_establish_the_doctrine_desc: "La préservation de la sécurité nationale et l’efficacité de l’armée nécessitent une éducation militaire de qualité."
 CES_broken_economy_idea_1: "Système économique fortement ruiné"
 CES_broken_economy_idea_1_desc: "L'héritage du système soviétique d'économie planifiée a laissé [FROM.GetName] dans une position difficile après l'effondrement de l'URSS. L'infrastructure économique était gérée de manière centralisée, ce qui rendait la transition vers une économie de marché plus difficile et plus douloureuse. La perte de nombreuses régions de ressources et la dépendance aux approvisionnements énergétiques ont également affecté l'économie de [FROM.GetName]. La République a perdu l'accès à certaines ressources naturelles qui étaient contrôlées par l'URSS. Cela a entraîné une instabilité de l'économie et une pénurie de revenus."
 CES_broken_economy_idea_2: "Système économique modérément ruiné"
 CES_broken_economy_idea_2_desc: "L'héritage du système soviétique d'économie planifiée a laissé [FROM.GetName] dans une position difficile après l'effondrement de l'URSS. L'infrastructure économique était gérée de manière centralisée, ce qui rendait la transition vers une économie de marché plus difficile et plus douloureuse. La perte de nombreuses régions de ressources et la dépendance aux approvisionnements énergétiques ont également affecté l'économie de [FROM.GetName]. La République a perdu l'accès à certaines ressources naturelles qui étaient contrôlées par l'URSS. Cela a entraîné une instabilité de l'économie et une pénurie de revenus."
 CES_broken_economy_idea_3: "Un système économique légèrement ruiné"
 CES_broken_economy_idea_3_desc: "L'héritage du système soviétique d'économie planifiée a laissé [FROM.GetName] dans une position difficile après l'effondrement de l'URSS. L'infrastructure économique était gérée de manière centralisée, ce qui rendait la transition vers une économie de marché plus difficile et plus douloureuse. La perte de nombreuses régions de ressources et la dépendance aux approvisionnements énergétiques ont également affecté l'économie de [FROM.GetName]. La République a perdu l'accès à certaines ressources naturelles qui étaient contrôlées par l'URSS. Cela a entraîné une instabilité de l'économie et une pénurie de revenus."
 CES_outdated_army_idea: "Le chaos dans l'armée"
 CES_outdated_army_idea_desc: "L'effondrement de l'URSS a entraîné notre pays dans un nouvel environnement géopolitique, qui a créé des incertitudes dans les relations avec les anciennes républiques soviétiques et les nouveaux États indépendants. Cela a compliqué la gestion des forces armées et a nécessité une révision de la stratégie et de la structure de l'armée."
 CES_outdated_army_idea_1: "Contrôle militaire désorganisé"
 CES_outdated_army_idea_1_desc: "L'effondrement de l'URSS a entraîné notre pays dans un nouvel environnement géopolitique, qui a créé des incertitudes dans les relations avec les anciennes républiques soviétiques et les nouveaux États indépendants. Cela a compliqué la gestion des forces armées et a nécessité une révision de la stratégie et de la structure de l'armée."
 CES_outdated_army_idea_2: "Contrôle militaire corrompu"
 CES_outdated_army_idea_2_desc: "L'effondrement de l'URSS a entraîné notre pays dans un nouvel environnement géopolitique, qui a créé des incertitudes dans les relations avec les anciennes républiques soviétiques et les nouveaux États indépendants. Cela a compliqué la gestion des forces armées et a nécessité une révision de la stratégie et de la structure de l'armée."
 CES_outdated_army_idea_3: "Contrôle militaire inefficace"
 CES_outdated_army_idea_3_desc: "L'effondrement de l'URSS a entraîné notre pays dans un nouvel environnement géopolitique, qui a créé des incertitudes dans les relations avec les anciennes républiques soviétiques et les nouveaux États indépendants. Cela a compliqué la gestion des forces armées et a nécessité une révision de la stratégie et de la structure de l'armée."
 CES_army_modernization: "Modernisation de l'armée"
 CES_army_modernization_desc: "La modernisation de notre armée est une clé importante pour la formation de nos forces armées."
 CES_create_territorial_defence: "Établir la défense territoriale"
 CES_create_territorial_defence_desc: "La création d’une défense territoriale est un aspect important de la formation de notre capacité de défense."
 CES_airforce_trainings: "Air Force Training"
 CES_airforce_trainings_desc: "Air Force training programs are vital for ensuring the readiness and professionalism of aviation personnel. These programs encompass a range of activities, including flight simulations, technical skills development, and international collaborations. They are essential for enhancing the country's defense capabilities and safeguarding its airspace, contributing to national security and regional stability in Central Asia."
 CES_india_air: "Avions indiens"
 CES_india_air_desc: "We may arrange an arms deal between us and India to buy new, modern planes for our air force."
 CES_russian_air: "Avions russes"
 CES_russian_air_desc: "We may arrange an arms deal between us and Russia to buy new, modern planes for our air force."
 CES_european_air: "Avions européens"
 CES_european_air_desc: "We may arrange an arms deal between us and European countries to buy new, modern planes for our air force."
 CES_china_air: "Avions chinois"
 CES_china_air_desc: "We may arrange an arms deal between us and China to buy new, modern planes for our air force."
 CES_us_air: "Avions américains"
 CES_us_air_desc: "We may arrange an arms deal between us and the United States to buy new, modern planes for our air force."
 CES_wing_loong: "Drones chinois"
 CES_wing_loong_desc: "We may arrange an arms deal between us and China to buy new, modern drones for our air force."
 CES_predator_xp: "Prédateur XP"
 CES_predator_xp_desc: "Le General Atomics MQ-1 Predator (souvent appelé drone Predator) est un avion télépiloté américain (RPA) construit par General Atomics qui a été principalement utilisé par l'US Air Force (USAF) et la Central Intelligence Agency (CIA)."
 CES_airbus_stuff: "Avions de transport Airbus"
 CES_airbus_stuff_desc: "We may establish contracts with Airbus to purchase transport planes for our air force's logistical needs."
 CES_euro_helicopters: "Hélicoptères européens"
 CES_euro_helicopters_desc: "Buying the newest European helicopters will greatly benefit our air force."
 CES_czech_jets: "Avions d'entraînement tchécoslovaques"
 CES_czech_jets_desc: "After the fall of the Eastern Bloc, many post-communist states sold off their retired equipment. We may need to buy some for our air force."
 CES_tai_anka: "Drones turcs"
 CES_tai_anka_desc: "Turkish drones have proven themselves very effective in recent conflicts. We may need to buy some."
 CES_bell_uh: "BELL-UH"
 CES_bell_uh_desc: "Le Bell UH-1 Iroquois est un hélicoptère militaire utilitaire conçu et produit par la société aérospatiale américaine Bell Helicopter. Il est le premier membre de la prolifique famille Huey, ainsi que le premier hélicoptère à turbine en service dans l'armée américaine."
 CES_infantr_guns: "Réforme de l'infanterie"
 CES_infantr_guns_desc: "La réforme de notre infanterie est nécessaire pour accroître la coordination et l’unité de nos troupes."
 CES_us_guns: "Fusils américains"
 CES_us_guns_desc: "AR rifles may not be as reliable as AKs, but they have proven themselves as very modular and accurate weapons. We need to acquire them."
 CES_us_equip: "Équipement de qualité OTAN"
 CES_us_equip_desc: "Les équipements de qualité OTAN sont les meilleurs au monde !"
 CES_rus_equip: "Équipement russe"
 CES_rus_equip_desc: "L'équipement russe est le meilleur au monde !"
 CES_russian_guns: "Fusils AK"
 CES_russian_guns_desc: "AK rifles may not be as modular as ARs, but they have proven themselves as very sturdy and reliable weapons. We need to acquire them."
 CES_chinese_guns: "Fusils chinois"
 CES_chinese_guns_desc: "The QBZ-95 is a promising weapon platform that has attracted the interest of our Ministry of Defense. We may need to procure them."
 CES_chinese_equip: "Nouvelles alternatives chinoises"
 CES_chinese_equip_desc: "Le nouvel équipement chinois est le meilleur au monde !"
 CES_us_art: "Artillerie américaine"
 CES_us_art_desc: "Our country's acquisition of American artillery represents a strategic move to enhance its defense capabilities. This procurement involves the purchase of advanced artillery systems from the US, strengthening our military preparedness. Such acquisitions are integral to the country's national security strategy, promoting defense modernization and bolstering its ability to respond to regional security challenges effectively."
 CES_rus_art: "Artillerie russe"
 CES_rus_art_desc: "L'acquisition par notre pays d'artillerie russe représente une démarche stratégique pour renforcer nos capacités de défense. Cet achat implique l'achat de systèmes d'artillerie avancés auprès de la Russie, renforçant ainsi notre préparation militaire. De telles acquisitions font partie intégrante de la stratégie de sécurité nationale du pays, favorisent la modernisation de la défense et renforcent sa capacité à répondre efficacement aux défis de sécurité régionale."
 CES_chinese_art: "Artillerie chinoise"
 CES_chinese_art_desc: "L'acquisition par notre pays de l'artillerie chinoise représente une démarche stratégique pour renforcer nos capacités de défense. Cet achat implique l'achat de systèmes d'artillerie avancés auprès de la Chine, renforçant ainsi notre préparation militaire. De telles acquisitions font partie intégrante de la stratégie de sécurité nationale du pays, favorisent la modernisation de la défense et renforcent sa capacité à répondre efficacement aux défis de sécurité régionale."
 CES_buying_tanks: "[ROOT.GetName]i Tanks"
 CES_buying_tanks_desc: "[ROOT.GetName]'s tank needs must be assessed and researched."
 CES_chinese_tanks: "Chars chinois"
 CES_chinese_tanks_desc: "L'acquisition de chars chinois par [ROOT.GetName] reflète son engagement à moderniser ses forces armées. Ces achats impliquent l'acquisition de systèmes de chars avancés auprès de la Chine pour renforcer les capacités militaires du pays. Cet investissement stratégique améliore la préparation de la défense de [ROOT.GetName] et souligne son engagement à maintenir une armée robuste et bien équipée pour répondre aux besoins de sécurité régionale."
 CES_russian_tanks: "Chars russes"
 CES_russian_tanks_desc: "L'acquisition de chars russes par [ROOT.GetName] reflète son engagement à moderniser ses forces armées. Ces achats impliquent l'acquisition de systèmes de chars avancés auprès de la Russie pour renforcer les capacités militaires du pays. Cet investissement stratégique améliore la préparation de la défense de [ROOT.GetName] et souligne son engagement à maintenir une armée robuste et bien équipée pour répondre aux besoins de sécurité régionale."
 CES_american_tanks: "Chars américains"
 CES_american_tanks_desc: "[ROOT.GetName]'s acquisition of American tanks reflects its commitment to modernizing its armed forces. These purchases involve procuring advanced tank systems from the US to bolster the country's military capabilities. This strategic investment enhances [ROOT.GetName]'s defense readiness and underscores its dedication to maintaining a robust and well-equipped army to address regional security needs."
 CES_urainian_btr: "Ukrainian BTRs"
 CES_urainian_btr_desc: "[ROOT.GetName]'s decision to purchase Ukrainian BTR (armored personnel carrier) vehicles signals a strategic move to enhance its military capabilities. This acquisition involves procuring these versatile armored vehicles from Ukraine to strengthen [ROOT.GetName]'s armed forces. These BTRs will play a crucial role in the country's defense strategy, aiding in mobility, troop transport, and border security, ultimately contributing to national security and regional stability."
 CES_rus_bars: "BARRES russes"
 CES_rus_bars_desc: "[ROOT.GetName]'s decision to purchase Russian BARS vehicles signals a strategic move to enhance its military capabilities. This acquisition involves procuring these versatile armored vehicles from Russia to strengthen [ROOT.GetName]'s armed forces. These vehicles will play a crucial role in the country's defense strategy, aiding in mobility, troop transport, and border security, ultimately contributing to national security and regional stability."
 CES_polaris: "Polaris"
 CES_polaris_desc: "Les véhicules gouvernementaux et de défense Polaris offrent des performances et une fiabilité qui répondent aux exigences de la mission de notre organisation, quels que soient les besoins."
 CES_navy: "[ROOT.GetName]i Marine"
 CES_navy_desc: "[ROOT.GetName]'s Navy is in need of reform."
 CES_navy_dockyard: "Nos chantiers navals"
 CES_navy_dockyard_desc: "De nouveaux quais doivent être construits pour que nos navires puissent être construits et stockés."
 CES_navy_corvette: "Corvettes"
 CES_navy_corvette_desc: "A corvette is a small warship. It is traditionally the smallest class of vessel considered to be a proper warship. The warship class above the corvette is that of the frigate, while the class below was historically that of the sloop-of-war."
 CES_navy_frigates: "Frégates"
 CES_navy_frigates_desc: "Une frégate est un type de navire de guerre. Au fil des époques, les rôles et les capacités des navires classés comme frégates ont quelque peu varié. Du XVIIe au début du XVIIIe siècle, le nom de frégate était donné à tout navire entièrement gréé construit pour la vitesse et la manœuvrabilité, destiné à être utilisé dans des rôles de reconnaissance, d'escorte et de patrouille."
 CES_navy_doctrine: "Réforme de la doctrine"
 CES_navy_doctrine_desc: "Our naval doctrine is in need of renovation."
 CES_western_start: "La voie démocratique"
 CES_western_start_desc: "It is time for our country to embark on the path of democratic government."
 CES_western_reform_govern: "Réforme du gouvernement"
 CES_western_reform_govern_desc: "Our government needs urgent reform."
 CES_western_decentr: "Décentralisation"
 CES_western_decentr_desc: "It is time to give the regions more rights."
 CES_western_defend_people_rights: "Droits de l'homme et libertés"
 CES_western_defend_people_rights_desc: "Our state will henceforth respect the rights and freedoms of every citizen."
 CES_western_anti_corruption: "Lutte contre la corruption"
 CES_western_anti_corruption_desc: "Les fonctionnaires corrompus seront punis !"
 CES_western_prave_rabochich: "Droits des travailleurs"
 CES_western_prave_rabochich_desc: "Our workers must be protected by social guarantees."
 CES_western_freedom_smi: "Liberté d'expression"
 CES_western_freedom_smi_desc: "Freedom of speech is one of the basic principles of our state."
 CES_western_welfare: "Investissements dans les soins de santé"
 CES_western_welfare_desc: "Our people should be healthy."
 CES_western_mothers_posobia: "Prestations de maternité"
 CES_western_mothers_posobia_desc: "We will allocate as much money as possible for maternity benefits."
 CES_western_economic_rost: "La croissance de notre économie"
 CES_western_economic_rost_desc: "Our competent policy has led to economic growth."
 CES_western_infrastructure: "Investissements dans les infrastructures"
 CES_western_infrastructure_desc: "Our country's infrastructure must be developed and modernized."
 CES_western_education_reform: "Réforme de l'éducation"
 CES_western_education_reform_desc: "We will invest heavily in education reform."
 CES_western_science_reform: "Investissements scientifiques"
 CES_western_science_reform_desc: "Nous investirons dans notre science, car elle est l’avenir de notre pays !"
 CES_western_sport: "Promotion du sport"
 CES_western_sport_desc: "Une nation en bonne santé ! - Une nation forte !"
 CES_western_ciphrovisation: "La numérisation mondiale"
 CES_western_ciphrovisation_desc: "Digitalization will strengthen the growth of our economy."
 CES_western_liberal_heaven: "Vitrine libérale d'Asie centrale"
 CES_western_liberal_heaven_desc: "We are an example of building a liberal state in Central Asia."
 CES_liberals_modifier: "Démocratie en Asie centrale"
 CES_liberals_modifier_desc: "The democratic system is, in principle, unique for the Central Asian region. It represents a sharp and rapid attempt to catch up with Western democracies on all counts."
 CES_debt_reafctoring: "Debt Restructuring"
 CES_debt_reafctoring_desc: "Restructuring our debt will allow us more freedom in government spending."
 CES_exploit_natural_resources: "Exploiter les ressources naturelles"
 CES_exploit_natural_resources_desc: "L’Asie centrale, une région connue pour ses paysages diversifiés et ses ressources naturelles abondantes, a été un point focal pour l’exploitation des ressources tout au long de l’histoire."
 CES_uranium_extraction: "Extraction d'uranium"
 CES_uranium_extraction_desc: "L'extraction de l'uranium en Asie centrale implique l'extraction, le traitement et l'exportation de cet élément radioactif, contribuant ainsi à la production d'énergie et aux technologies nucléaires dans le monde entier. Cette ressource revêt une importance économique pour la région et a donné lieu à une coopération et une réglementation internationales dans la gestion des ressources en uranium."
 CES_support_gold_mining: "Soutenir l'exploitation aurifère"
 CES_support_gold_mining_desc: "L'Asie centrale est connue pour ses riches gisements d'or, et l'extraction de ce métal précieux joue un rôle essentiel dans l'économie de la région. Des pays comme le Kazakhstan, le Kirghizistan et l'Ouzbékistan sont des acteurs clés de l'industrie minière aurifère."
 CES_keep_it_governmental: "Gardez le gouvernement au pouvoir"
 CES_keep_it_governmental_desc: "We must keep our mining industries state-owned, as it ensures our autonomy."
 CES_metal_extraction: "Extraction de métaux"
 CES_metal_extraction_desc: "Central Asia is a hub for the extraction of various metals, including copper, silver, and rare earth elements. The region's extensive mineral reserves have spurred a vibrant mining industry."
 CES_increase_privatisation: "Accroître la privatisation"
 CES_increase_privatisation_desc: "We will benefit more from privatization, but it will make us more vulnerable to foreign influence."
 CES_natural_gas: "Gaz naturel"
 CES_natural_gas_desc: "L'extraction de gaz en Asie centrale implique le forage, le traitement et le transport du gaz naturel pour répondre à la demande énergétique nationale et internationale. Les ressources gazières de la région ont une importance économique considérable, favorisant à la fois la coopération régionale et le commerce mondial de l'énergie."
 CES_oil_extraction: "Extraction de pétrole"
 CES_oil_extraction_desc: "Central Asia is home to significant oil reserves, with Kazakhstan being a major player in the region's oil extraction industry."
 CES_invite_exxon: "Inviter Exxon"
 CES_invite_exxon_desc: "ExxonMobil Corporation est une multinationale américaine du pétrole et du gaz et le plus grand descendant direct de Standard Oil de John D. Rockefeller."
 CES_invite_chevron: "Inviter Chevron"
 CES_invite_chevron_desc: "Chevron Corporation est une multinationale américaine du secteur de l'énergie, principalement spécialisée dans le pétrole et le gaz."
 CES_invite_lukoil: "Inviter Lukoil"
 CES_invite_lukoil_desc: "La société pétrolière PJSC Lukoil est une multinationale russe du secteur de l'énergie dont le siège social est à Moscou, spécialisée dans l'extraction, la production, le transport et la vente de pétrole, de gaz naturel, de produits pétroliers et d'électricité."
 CES_united_joint_venture: "Joint Venture unie"
 CES_united_joint_venture_desc: "Nous allons fusionner les actions et en tirer profit."
 CES_trade_idea: "Expansion commerciale"
 CES_supporting_what_has_left: "Soutenir ce qui reste"
 CES_supporting_what_has_left_desc: "Our economy was shattered by the fall of the Soviet Union. The time has come to support what remains."
 CES_establishing_relations_with_world_bank: "Entrée à l'OMC"
 CES_establishing_relations_with_world_bank_desc: "Entering the WTO is crucial for expanding our trade economy."
 CES_establishing_relations_with_asian_bank: "Soutien des banques asiatiques"
 CES_establishing_relations_with_asian_bank_desc: "Getting support from the ADB is a good opportunity for us to gain more benefits."
 centrasiaev.1.t: "Négociations sur le soutien des banques asiatiques"
 centrasiaev.1.d: "Asian Bank a accepté notre proposition de soutien. Il nous reste maintenant à choisir ce que nous souhaitons leur demander."
 centrasiaev.1.a: "Soutien pédagogique"
 centrasiaev.1.b: "Soutien économique"
 centrasiaev.1.c: "Soutien social"
 CES_national_invest_strategy: "Stratégie nationale d'investissement"
 CES_national_invest_strategy_desc: "The development and implementation of a national investment strategy is becoming an integral part of modern economic development."
 centrasiaev.2.t: "Le Kazakhstan demande des investissements"
 centrasiaev.2.d: "They are asking for economic investments. Should we agree?"
 centrasiaev.2.a: "Bien sûr"
 centrasiaev.2.b: "Non, désolé."
 centrasiaev.3.t: "L'Ouzbékistan demande des investissements"
 centrasiaev.3.d: "They are asking for economic investments. Should we agree?"
 centrasiaev.3.a: "Bien sûr"
 centrasiaev.3.b: "Non, désolé."
 centrasiaev.4.t: "Le Kirghizistan demande des investissements"
 centrasiaev.4.d: "They are asking for economic investments. Should we agree?"
 centrasiaev.4.a: "Bien sûr"
 centrasiaev.4.b: "Non, désolé."
 CES_special_economic_zones: "Zones économiques spéciales"
 CES_special_economic_zones_desc: "L'Asie centrale reconnaît la nécessité de créer des zones économiques spéciales (ZES) pour stimuler le développement économique. Ces zones offrent des avantages tels que des allégements fiscaux, une réduction des réglementations et des procédures administratives simplifiées pour attirer les investissements nationaux et étrangers. En Asie centrale, les ZES servent de catalyseurs pour la diversification des économies, la promotion de l'innovation et la création d'emplois, en particulier dans des secteurs comme l'industrie manufacturière, la technologie et le commerce. En favorisant des environnements favorables aux entreprises, ces zones jouent un rôle essentiel dans les efforts déployés par la région pour attirer les investissements, améliorer les infrastructures et stimuler la croissance économique."
 CES_infr_investment: "Investissements dans les infrastructures"
 CES_infr_investment_desc: "L'Asie centrale accorde la priorité aux investissements dans les infrastructures pour moderniser et étendre ses réseaux de transport, d'énergie et de télécommunications. Ces investissements sont essentiels pour relier les différents pays de la région et faciliter les échanges et la connectivité avec les pays voisins."
 CES_industrial_revival: "Renaissance industrielle"
 CES_industrial_revival_desc: "Les investissements industriels en Asie centrale sont des moteurs essentiels de la croissance économique de la région. Ces investissements ciblent divers secteurs tels que l'industrie manufacturière, l'énergie, la technologie et les infrastructures. Ils jouent un rôle essentiel dans l'amélioration de la productivité, la création d'emplois et l'augmentation de la compétitivité de la région sur la scène mondiale. L'Asie centrale recherche activement des investissements industriels nationaux et étrangers pour exploiter son potentiel économique et promouvoir le développement régional, ce qui en fait un objectif clé pour les gouvernements et les entreprises privées de la région."
 CES_invite_daewoo: "Inviter Daewoo"
 CES_invite_daewoo_desc: "Daewoo, literally meaning 'great universe' and a portmanteau of dae, meaning great, and the given name of founder and chairman Kim Woo-choong, also known as the Daewoo Group, was a major South Korean chaebol (type of conglomerate) and automobile manufacturer."
 CES_invite_toyota: "Inviter Toyota"
 CES_invite_toyota_desc: "Toyota Motor Corporation est un constructeur automobile multinational japonais dont le siège social se trouve à Toyota City, Aichi, au Japon. Toyota est l'un des plus grands constructeurs automobiles au monde, produisant environ 10 millions de véhicules par an."
 CES_invite_avtovas: "Inviter AVTOVAZ"
 CES_invite_avtovas_desc: "AvtoVAZ is a Russian state-owned automobile manufacturing company. It was formerly known as VAZ, an acronym for Volga Automotive Plant in Russian. AvtoVAZ is best known for its flagship Lada series of vehicles."
 CES_fostering_productive_innovation_project: "Projet de promotion des innovations"
 CES_fostering_productive_innovation_project_desc: "Le projet Fostering Innovations en Asie centrale est une initiative stratégique visant à promouvoir l’innovation et le progrès technologique dans la région. Grâce à des investissements ciblés dans la recherche, l’éducation et l’entrepreneuriat, ce projet vise à stimuler la créativité et l’innovation. Il joue un rôle essentiel dans le renforcement de la compétitivité et de la diversification économique des pays d’Asie centrale, les positionnant ainsi sur la voie d’une croissance durable et d’une pertinence mondiale au XXIe siècle."
 CES_russian_it_companies: "Entreprises informatiques russes"
 CES_russian_it_companies_desc: "Les entreprises informatiques russes sont de plus en plus présentes en Asie centrale, contribuant à la transformation numérique de la région. Ces entreprises apportent une expertise technologique et des solutions innovantes à divers secteurs, notamment la finance, la santé et l'éducation. Leur présence favorise la collaboration transfrontalière, le partage des connaissances et le développement économique, soutenant le parcours de l'Asie centrale vers un avenir numérique tout en bénéficiant des capacités technologiques et des investissements russes."
 CES_restructuring_the_army: "Restructurer l'armée"
 CES_restructuring_the_army_desc: "[ROOT.GetName] mène actuellement une restructuration complète de son armée afin de moderniser et d’améliorer ses capacités de défense. Cette initiative comprend la mise à jour des équipements, l’optimisation du déploiement des troupes et l’amélioration de la formation et de la technologie. En alignant ses forces armées sur les défis de sécurité contemporains, [ROOT.GetName] vise à renforcer sa sécurité nationale et à contribuer à la stabilité régionale, en se positionnant comme une force militaire plus compétente et plus agile."
 CES_develop_turism: "Développer le tourisme"
 CES_attract_tourists: "Attirer les touristes"
 CES_attract_tourists_desc: "Attirer les touristes"
 CES_special_gambling_regions: "Régions de jeu spéciales"
 CES_special_gambling_regions_desc: "Our Minister of Economy has proposed a special gambling regions project to boost our economy."
 CES_russian_it_specialists: "Russian IT Specialists"
 CES_russian_it_specialists_desc: "Russian IT specialists are seeking new places to establish their companies. Our country is the perfect destination!"
 CES_agricultural_reneissance: "Renaissance agricole"
 CES_agricultural_reneissance_desc: "We need to start revitalizing our agriculture."
 CES_supporting_wheat_production: "Soutien à la production de shawarma"
 CES_supporting_wheat_production_desc: "Notre shawarma doit être le meilleur des meilleurs, parmi tous les pays du monde !"
 CES_foster_horse_production: "Production de chevaux d'élevage"
 CES_foster_horse_production_desc: "L’élevage de chevaux fait partie intégrante de notre économie, nous devons le développer !"
 CES_export_of_kumis: "Exportation de Kumis"
 CES_export_of_kumis_desc: "Kumis is our national drink and we should show its greatness to the whole world!"
 CES_agricultural_subsidies: "Subventions agricoles"
 CES_agricultural_subsidies_desc: "Subventionner l’agriculture de notre pays est nécessaire."
 CES_farming_encoruraging: "Encourager l'agriculture"
 CES_farming_encoruraging_desc: "Much of our population is unemployed. We must show that farming is a viable way to participate in the economy."
 CES_supporting_wheat_production_one: "Soutenir la production de blé"
 CES_supporting_wheat_production_one_desc: "Il faut que le blé prospère dans nos campagnes, nous pourrons l'exporter et en tirer des revenus."
 CES_supporting_wheat_production_two: "Méthodes agricoles alternatives"
 CES_supporting_wheat_production_two_desc: "Efficiency must be our top priority. The more we harvest, the better."
 CES_farming_encouragement_one: "Encourager une agriculture de qualité"
 CES_farming_encouragement_one_desc: "L'efficacité doit être notre priorité. Nous devons assurer la qualité pour trouver notre niche."
 CES_cotton_production: "Production de coton"
 CES_cotton_production_desc: "Nos terres sont traditionnellement connues pour la qualité de leur production de coton. Nous saurons répondre à ces attentes."
 CES_connection_with_educational_abroad: "Lien avec l'éducation à l'étranger"
 CES_connection_with_educational_abroad_desc: "Nous devrions établir des liens avec les instituts agricoles pour former nos agriculteurs."
 CES_connection_with_educational_abroad_one: "Lien avec l'éducation à l'étranger"
 CES_connection_with_educational_abroad_one_desc: "Nous devrions établir des liens avec les instituts agricoles pour former nos agriculteurs."
 CES_voluonteer_labor: "Travail bénévole"
 CES_voluonteer_labor_desc: "Nous devrions faire venir des volontaires des prisons pour travailler dans les champs. Cela n'apporterait que de la prospérité, n'est-ce pas ?"
 CES_keep_it_civil: "Restez civilisé"
 CES_keep_it_civil_desc: "Nous devrions uniquement encourager le travail civilisé et équitable dans notre secteur agricole."
 CES_agricultural_institutes: "Instituts agricoles"
 CES_agricultural_institutes_desc: "Nous devrions ouvrir nos propres institutions agricoles et les former à partir de notre expérience."
 CES_agriculture_policy: "Politique agricole"
 CES_switzerland_investments_idea: "Commerce avec la Suisse"
 CES_new_markets: "Nouveaux marchés"
 CES_new_markets_desc: "Opening new markets is the key to success in the global economic space. On the one hand, it provides an opportunity to expand sales internationally and increase overall business revenue. On the other hand, trade with other countries helps develop cultural diversity and understanding between peoples, which promotes peace and cooperation between nations."
 CES_trade_with_china: "Commerce avec la Chine"
 CES_trade_with_china_desc: "Le commerce avec la Chine devient un facteur essentiel de l’économie mondiale en raison de son influence, de ses capacités technologiques et de ses ressources. Il favorise le développement mutuel, l’innovation et la création de relations économiques durables."
 CES_trade_with_south_korea: "Commerce avec la Corée du Sud"
 CES_trade_with_south_korea_desc: "Les échanges commerciaux avec la Corée du Sud sont essentiels à la prospérité et à la diversité de notre économie mondiale. Cet important partenaire commercial nous offre des opportunités uniques d’élargir nos horizons et d’enrichir nos relations dans divers secteurs."
 CES_trade_with_north_korea: "Commerce avec la Corée du Nord"
 CES_trade_with_north_korea_desc: "La Corée du Nord est un marché au potentiel énorme, mais peu de gens le savent. Elle dispose de ressources naturelles abondantes, notamment de charbon, de minéraux et même de métaux potentiellement précieux. Les échanges commerciaux avec ce pays pourraient intéresser les entreprises à la recherche de nouveaux marchés et de nouvelles sources de matières premières."
 CES_trade_with_india: "Commerce avec l'Inde"
 CES_trade_with_india_desc: "L’Inde représente un marché énorme pour les exportations de biens et de services. Avec une population de plus d’un milliard d’habitants et une classe moyenne en pleine croissance, l’Inde peut être un partenaire important pour le commerce mondial. Exporter vers l’Inde peut nous aider à élargir notre clientèle et à augmenter nos ventes."
 CES_trade_with_turkey: "Commerce avec la Turquie"
 CES_trade_with_turkey_desc: "La Turquie est un pont entre l'Europe et l'Asie, ce qui en fait un partenaire clé pour le développement du commerce intercontinental. Le pays dispose d'une infrastructure étendue, ainsi que de ports et de couloirs de transport modernes, qui garantissent une logistique efficace et un accès à une variété de marchés."
 CES_trade_with_mongolia: "Commerce avec la Mongolie"
 CES_trade_with_mongolia_desc: "Mongolia has vast natural resources, including minerals, coal, meat, and wool. Trade with Mongolia can be a source of affordable, quality raw materials, which will positively impact our industries."
 CES_trade_with_pakistan: "Commerce avec le Pakistan"
 CES_trade_with_pakistan_desc: "Le Pakistan est un pays qui offre des avantages économiques et géostratégiques considérables et la coopération avec lui peut être très bénéfique."
 CES_trade_with_russia: "Commerce avec la Russie"
 CES_trade_with_russia_desc: "La Russie est un pays doté d’un grand potentiel et de nombreux atouts, et la coopération avec elle peut apporter des bénéfices considérables."
 CES_trade_with_ukraine: "Commerce avec l'Ukraine"
 CES_trade_with_ukraine_desc: "L’Ukraine est un grand marché de plus de 40 millions de personnes, ce qui en fait un partenaire attractif pour développer nos opérations commerciales et augmenter nos ventes."
 CES_trade_with_azerbaijan: "Commerce avec l'Azerbaïdjan"
 CES_trade_with_azerbaijan_desc: "L’Azerbaïdjan est un acteur clé du secteur énergétique, avec d’importantes réserves de pétrole et de gaz naturel. La coopération avec l’Azerbaïdjan peut donner accès à ces ressources importantes et contribuer à la diversité des approvisionnements en matières premières énergétiques."
 CES_trade_with_belarus: "Commerce avec la Biélorussie"
 CES_trade_with_belarus_desc: "La Biélorussie est un grand marché avec une population de plusieurs millions d’habitants. L’exportation de biens et de services vers la Biélorussie nous ouvre des perspectives d’augmentation des ventes et d’élargissement de notre clientèle."
 CES_trade_with_armenia: "Commerce avec l'Arménie"
 CES_trade_with_armenia_desc: "L'Arménie est un pays dont l'économie se développe activement et la coopération avec ce pays peut nous permettre d'accéder à de nouveaux marchés et partenaires. L'exportation de biens et de services vers l'Arménie nous ouvre de nouvelles perspectives pour développer nos activités et augmenter nos ventes."
 CES_trade_with_georgia: "Commerce avec la Géorgie"
 CES_trade_with_georgia_desc: "La Géorgie est un pays doté d’un riche patrimoine culturel et de perspectives de coopération, ce qui en fait un partenaire important pour notre économie."
 CES_trade_with_iran: "Commerce avec l'Iran"
 CES_trade_with_iran_desc: "L’Iran dispose d’importantes réserves de ressources énergétiques, notamment de pétrole et de gaz. Les échanges commerciaux avec l’Iran nous offrent des possibilités de sécurité énergétique et d’accès à des ressources importantes."
 CES_trade_with_europe: "Commerce avec l'Europe"
 CES_trade_with_europe_desc: "Europe is home to some of the largest economies in the world. Trade with European countries offers us opportunities to expand our business and increase sales."
 CES_trade_with_switzerland: "Commerce avec la Suisse"
 CES_trade_with_switzerland_desc: "La Suisse est réputée pour son industrie manufacturière, notamment dans les secteurs de l'horlogerie, des produits pharmaceutiques et de la transformation alimentaire. Les échanges commerciaux avec la Suisse permettent d'accéder à des biens et produits de haute qualité, susceptibles de soutenir la croissance de nos activités commerciales."
 CES_trade_with_greece: "Commerce avec la Grèce"
 CES_trade_with_greece_desc: "Greece is rich in tourism resources, and cooperation with it can create opportunities for the development of the tourism industry and exchange of experiences."
 CES_trade_with_united_kingdom: "Commerce avec le Royaume-Uni"
 CES_trade_with_united_kingdom_desc: "The UK is a large market with high purchasing power, making it an attractive partner for expanding our business opportunities and increasing sales."
 CES_trade_with_france: "Commerce avec la France"
 CES_trade_with_france_desc: "La France est un pays riche en art, en culture et doté d’une économie dynamique, ce qui en fait un partenaire attractif pour développer nos relations commerciales."
 CES_trade_with_usa: "Commerce avec les USA"
 CES_trade_with_usa_desc: "Les États-Unis sont un pays doté d’un grand poids économique, d’un potentiel d’innovation exceptionnel et de formidables perspectives de coopération, ce qui en fait un partenaire clé pour le développement de relations commerciales internationales."
 CES_trade_with_spain: "Commerce avec l'Espagne"
 CES_trade_with_spain_desc: "L'Espagne est un grand marché avec un fort potentiel de croissance commerciale. La coopération avec des entreprises et des entrepreneurs espagnols ouvre de nouvelles opportunités pour étendre nos activités et augmenter nos ventes."
 TRK_berli_modifier: "Le Politburo réactivé"
 nat_coalit_tt: "§YNous nous unirons avec d'autres nationalistes§!"
 nationalists.1.t: "Proposition de coopération militaire"
 nationalists.1.d: "Due to our common geopolitical interests on the world stage, the question of the possibility of military cooperation has arisen before our governments. As we believe, such cooperation will boost our national spirit because we will become even closer to our Central Asian Turkic brothers."
 nationalists.1.a: "Un moment historique pour nos nations. Le peuple turc deviendra encore plus fort !"
 nationalists.1.b: "L'Asie centrale ? Qu'est-ce que c'est ?"
 CES_nationalist_policy: "Nationalist Policy"
 CES_kaz_modifier: "Réformes militaires et politiques au Kazakhstan"
 CES_kaz_modifier_desc: "Notre armée et nos agences de sécurité de l’État ont besoin de réformes. Le Kazakhstan ne pourra pas résister à ses ennemis s’il ne se prépare pas à la défense ou à la guerre."
 CES_kaz_reform_vs: "Réformes globales"
 CES_kaz_reform_vs_desc: "Our army and security agencies need sweeping reforms, and we will begin them now."
 CES_kaz_ter_oborna: "Défense territoriale"
 CES_kaz_ter_oborna_desc: "Our country is vast and needs more protection. Territorial defense will address this need."
 CES_kaz_nat_gurad: "Garde nationale"
 CES_kaz_nat_gurad_desc: "We will transform the internal troops into the National Guard for greater efficiency."
 CES_kaz_gos_ohrana: "Service de sécurité d'État"
 CES_kaz_gos_ohrana_desc: "A special state body directly subordinate and accountable to the President of Kazakhstan, forming part of the national security forces, and carrying out security measures to ensure the protection of the President, other protected persons, and objects within the competence established by law."
 CES_kaz_reog_kadet: "Réorganiser les écoles militaires"
 CES_kaz_reog_kadet_desc: "Our soldiers should be trained according to the best international standards."
 CES_kaz_defence_doctrine: "Doctrine défensive"
 CES_kaz_defence_doctrine_desc: "Our country is peaceful, but it must be ready to defend itself."
 CES_kaz_sso: "Forces d'opérations spéciales"
 CES_kaz_sso_desc: "We will create our own Special Operations Forces."
 CES_kaz_national_tt: "§YLa Garde nationale§! sera créée"
 CES_ter_oborona_tt: "§YLa Défense territoriale§! sera créée"
 CES_kaz_sso_tt: "§YLes Forces d'opérations spéciales§! seront créées"
 nationalists.2.t: "La question de notre avenir"
 nationalists.2.d: "Notre nouveau gouvernement a déployé beaucoup d'efforts pour renforcer notre pays, et nous sommes maintenant confrontés à la question de l'expansion future de notre sphère d'influence. Nous pouvons suivre la voie de la restauration de l'ancienne puissance de la Horde d'Or, mais nous pouvons aussi adopter les idées relativement récentes d'unification des peuples turcs."
 nationalists.2.a: "La Horde d'Or était la meilleure version de notre pays. Nous ramènerons cette puissance !"
 nationalists.2.b: "Ce n'est qu'en nous unissant que le peuple turc deviendra plus fort !"
 mongolempire.path: "§YNous avons choisi la voie de la Horde d'Or§!"
 turan.path: "§YNous avons choisi la voie du Grand Touran§!"
 nationalists.3.t: "Retour de la Horde d'Or"
 nationalists.3.d: "Nobody expected this could happen at all; however, recent events suggest otherwise — the Golden Horde has been recreated. This event promises radical political changes across Asia."
 nationalists.3.a: "La Horde d'Or ? Nous pensions que vous aviez disparu."
 nationalists.4.t: "Proclamation du Grand Touran"
 nationalists.4.d: "Many experts believed that uniting the Turkic peoples was an impossible task, but this notion has recently been proven wrong. A unified state of Turkic peoples was proclaimed. This unification threatens the sphere of influence of regional powers."
 nationalists.4.a: "The dream of many Turkic empires and states has been realized."
 CES_new_turkic_state: "Nouvel État turc"
 CES_new_turkic_state_desc: "Le peuple turc a toujours été la nation dominante en Asie, et dans certains cas en Europe. Nous devons restaurer la gloire de notre nation en créant un État turc fort."
 CES_national_counc: "Conseil national"
 CES_national_counc_desc: "Without the support of various militarized nationalist parties and their followers, we will not be able to sustain our regime in the long run."
 CES_look_hist: "Regarder historiquement"
 CES_look_hist_desc: "Some territories that once belonged to us are now under the control of other states. We must reclaim them."
 CES_revive_nomad_spirit: "Raviver l'esprit nomade"
 CES_revive_nomad_spirit_desc: "Nomadism is our true way of life. Our ancestors roamed across many lands, spreading our culture to other territories. We should be proud of this heritage."
 CES_ignite_turkic_militar: "Attiser le militarisme turc"
 CES_ignite_turkic_militar_desc: "The Turkic peoples must unite to face external threats."
 CES_promote_pan_turk: "Promouvoir le pan-turquisme"
 CES_promote_pan_turk_desc: "Only by uniting the minds of many Turkic people can we draw closer to the goal of unifying our peoples."
 CES_establish_loyal_natgov: "Établir un gouvernement national loyal"
 CES_establish_loyal_natgov_desc: "By installing loyal leadership, we will not have to worry about internal strife."
 CES_trukism_is_our_body: "Le turquisme est notre corps"
 CES_trukism_is_our_body_desc: "We should be proud of our identity and promote the idea of uniting our nations under one flag."
 CES_connect_grey_wolves: "Connecter les Loups Gris"
 CES_connect_grey_wolves_desc: "Turkey is our potential strategic and ideological ally. We must strengthen our engagement to project our influence with even greater force."
 CES_turkic_army: "Armée turque"
 CES_turkic_army_desc: "Nous devons financer notre complexe militaro-industriel pour mener à bien notre politique étrangère."
 CES_purge_disloyals: "Purger les rats"
 CES_purge_disloyals_desc: "There are still many in our country who oppose our position. We must eradicate this dissent."
 CES_anti_russian_nat_prop: "Propagande nationale anti-russe"
 CES_anti_russian_nat_prop_desc: "The time has come to cut ties with our greatest enemy. No more Russian boots will set foot on our soil."
 CES_no_other_lang: "Pas d'autres langues"
 CES_no_other_lang_desc: "Russia has long exploited our lands and our people in senseless and bloody wars far from home. We will no longer tolerate their presence in our country."
 CES_embrace_traditions: "Adopter les traditions"
 CES_embrace_traditions_desc: "We need to keep our traditions alive to strengthen our national spirit."
 CES_paramilitar_stuff: "Organisations paramilitaires"
 CES_paramilitar_stuff_desc: "En maintenant un état d'esprit militariste dans notre société, nous pourrons faire avancer notre agenda avec plus de succès."
 CES_milyouth_nat: "Nationalisme de la jeunesse militaire"
 CES_milyouth_nat_desc: "Youth are an integral part of our system. By nurturing their fighting spirit from an early age, we can strengthen our country's defenses."
 CES_nat_tengri_spir: "Esprit national tengri"
 CES_nat_tengri_spir_desc: "We must restore the glory of the Turkic Khaganate so that our people can once again be considered the rightful masters of their land."
 CES_back_to_genghis_khan: "Retour à Gengis Khan"
 CES_back_to_genghis_khan_desc: "La Mongolie est le point de départ de la grandeur de notre pays. Nous retournerons sur ces terres pour rétablir la justice historique."
 CES_kipchak_chak: "Kiptchak Tchak"
 CES_kipchak_chak_desc: "We will bring the Gagauz back to our country, freeing them from Romanian oppression."
 CES_free_uighurs: "Libérer les Ouïghours"
 CES_free_uighurs_desc: "The Uyghurs are an oppressed nation within China. They are calling upon us to help liberate them."
 CES_invade_jap: "Envahir le Japon"
 CES_invade_jap_desc: "Ils ne seront pas sauvés cette fois par une autre tempête kamikaze."
 CES_march_to_siberia: "Marche vers la Sibérie"
 CES_march_to_siberia_desc: "Russia thinks we are too weak to strike them from behind? They are very much mistaken."
 CES_those_whorej: "Ceux qui rejettent"
 CES_those_whorej_desc: "Either the people of Central Asia unite with us under a single flag, or there will only be chaos here. The time has come to decide the fate of this region."
 CES_revive_khanate: "Raviver le Khanat"
 CES_revive_khanate_desc: "The Turkic Khaganate will become such a great nation that even the USA will listen to our opinion. Everything will be done with our permission!"
 CES_tribute_to_khan: "Tribut au Khan"
 CES_tribute_to_khan_desc: "Chaque homme fidèle à notre régime sera tenu de payer un tribut à notre nouveau Khan."
 CES_finally_united: "Enfin unis"
 CES_finally_united_desc: "Maintenant que la plupart des pays turcs sont unis sous notre drapeau, nous pouvons pleinement considérer notre nation comme grande à nouveau."
 CES_cultural_unif: "Unification culturelle"
 CES_cultural_unif_desc: "Bien que notre population soit majoritairement turque, il existe encore de nombreuses cultures différentes dans notre pays qui ne nous permettent pas de nous unir complètement. Nous devons trouver une nouvelle idée pour l'unité culturelle."
 CES_turkify_finland: "Turkifier la Finlande"
 CES_turkify_finland_desc: "La Finlande est un territoire que notre Khaganat n'a pas atteint. Nous corrigerons cela en soumettant les Finlandais et en les turkifiant."
 CES_nat_islam_spir: "Esprit islamique national"
 CES_nat_islam_spir_desc: "L'islam est ce qui a conduit notre nation à la grandeur. Nous devons restaurer cette grandeur en nous réunissant avec nos frères en culture et en religion."
 CES_path_of_seljuk: "Voie des Seldjoukides"
 CES_path_of_seljuk_desc: "En soumettant le territoire de l'Iran, nous pouvons sécuriser un avantage stratégique dans la région."
 CES_idelural: "Idel-Oural"
 CES_idelural_desc: "Bashkiria is a territory that rightfully belongs to us. We must take it back."
 CES_ottoman_spirit: "Esprit ottoman"
 CES_ottoman_spirit_desc: "La Turquie est le plus grand voisin turc et nous devons réunir nos peuples pour construire une société plus juste."
 CES_reunite_azer: "Réunification avec l'Azerbaïdjan"
 CES_reunite_azer_desc: "Bien que l'Azerbaïdjan soit une nation turque, il est assez indocile. Nous corrigerons cela."
 CES_crush_who_reject: "Écraser ceux qui rejettent"
 CES_crush_who_reject_desc: "Cette fois, nous étendrons notre influence à toute l'Asie centrale. Tous les dissidents seront éliminés."
 CES_finish_the_deed: "La menace arménienne"
 CES_finish_the_deed_desc: "L'Arménie maintient actuellement nos frères turcs sous son contrôle. Nous les libérerons de la domination arménienne."
 CES_declare_turan: "Proclamer le Touran"
 CES_declare_turan_desc: "Enfin, nous pourrons proclamer l'unification complète de notre peuple. De nombreux pays ont reconnu notre supériorité, et nous pouvons maintenant avoir un impact plus global sur le monde."
 CES_turkic_equality: "Égalité turque"
 CES_turkic_equality_desc: "All residents of our country will have equal rights, regardless of their past economic status under the control of other countries."
 CES_raise_from_ash: "Renaître des cendres"
 CES_raise_from_ash_desc: "[FROM.GetNameDef], en tant qu'État indépendant, a traversé une période historique difficile après l'effondrement de l'Union soviétique. L'indépendance obtenue en 1991 était un symbole de renaissance des cendres de l'ère passée."
 CES_raise_from_ash_idea: "Renaître des cendres"
 CES_raise_from_ash_idea_desc: "[FROM.GetNameDef], en tant qu'État indépendant, a traversé une période historique difficile après l'effondrement de l'Union soviétique. L'indépendance obtenue en 1991 était un symbole de renaissance des cendres de l'ère passée."
 CES_establ_absolu_loy: "Établir une loyauté absolue"
 CES_establ_absolu_loy_desc: "C'est une tentative de notre dirigeant pour obtenir le soutien total des oligarques à ses politiques. Cependant, certains d'entre eux ont commencé à critiquer le gouvernement et la direction du pays, ce qui pourrait entraîner une division des forces parmi l'élite et affaiblir l'autorité du président sur la scène internationale."
 CES_our_beloved_autocrat_kaz: "Renforcer le parti"
 CES_our_beloved_autocrat_kaz_desc: "[CES_our_beloved_autocrat_kaz_desc]"
 KAZ_our_beloved_autocrat_kaz_desc: "En tant que notre autocrate préféré, Noursoultan Abichouly Nazarbayev a su transformer l'économie du Kazakhstan durant son long règne (1989-2019). Grâce en grande partie à ses politiques et à sa pensée stratégique, les pays d'Asie centrale ont gagné une nouvelle stabilité et prospérité. Un des facteurs clés du succès de l'autocrate Nazarbayev a été sa capacité à créer un appareil étatique solide capable de gérer efficacement l'économie du pays. En conséquence, le Kazakhstan a pu réaliser des avancées significatives dans l'industrie et l'agriculture, ce qui a conduit à une augmentation des revenus nationaux et à une amélioration de la qualité de vie de la population."
 UZB_our_beloved_autocrat_kaz_desc: "En tant que notre autocrate préféré, Islam Abdouganovitch Karimov a su transformer l'économie de l'Ouzbékistan durant son long règne (1991-2016). Grâce en grande partie à ses politiques et à sa pensée stratégique, les pays d'Asie centrale ont gagné une nouvelle stabilité et prospérité. Un des facteurs clés du succès de l'autocrate Karimov a été sa capacité à créer un appareil étatique solide capable de gérer efficacement l'économie du pays. En conséquence, l'Ouzbékistan a pu réaliser des progrès significatifs dans l'industrie et l'agriculture, ce qui a conduit à une augmentation des revenus nationaux et à une amélioration de la qualité de vie de la population."
 KYR_our_beloved_autocrat_kaz_desc: "En tant que notre autocrate préféré, Askar Akaïev a su transformer l'économie du Kirghizistan durant son long règne (1991-2005). Grâce en grande partie à ses politiques et à sa pensée stratégique, les pays d'Asie centrale ont gagné une nouvelle stabilité et prospérité. Un des facteurs clés du succès de l'autocrate Akaïev a été sa capacité à créer un appareil étatique solide capable de gérer efficacement l'économie du pays. En conséquence, le Kirghizistan a pu réaliser des progrès significatifs dans l'industrie et l'agriculture, ce qui a conduit à une augmentation des revenus nationaux et à une amélioration de la qualité de vie de la population."
 CES_purge_unloyal_polit: "Purge des politiciens déloyaux"
 CES_purge_unloyal_polit_desc: "Notre dirigeant décide de mettre en œuvre des réformes politiques sévères. Ces réformes visent à renforcer notre pouvoir et à réprimer les forces d'opposition considérées comme déloyales au régime."
