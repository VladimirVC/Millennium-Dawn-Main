 land_module_drone_launcher_1_desc: "Drone launchers integrate expendable unmanned munitions with autonomous guidance to deliver stronger strike potential than conventional launcher options. Their airframes are simpler and cheaper to mass-produce, reducing overall build cost.\n\n§GDesigner Hint: Drone launchers are cheaper in build cost and hit harder, but they demand more resources due to advanced guidance and onboard electronics§!"
