 SIA.conservatism: "£generic_conservatism_small （TRT）タイ愛国党"
 SIA.conservatism_desc: "(Broad Populism) - Founded in 1998, the TRT quickly propelled to power on a broad, widely appealing populist platform - with its main policies hoping to address the 1997 Asian Financial Crisis. Despite the party's initial surging support, with multiple bouts of massive electoral success, its heavily factionalized nature led to splinters and its eventual dissolution."
 SIA.liberalism: "£SIA_western_conservative 民主党"
 SIA.liberalism_desc: "(Conservative Liberalism) - Formed in 1946, the Democrat Party is one of the oldest that remains active in Thailand. The Democrat Party has remained a firm supporter of a constitutionalist system in Thailand and opposed the countries multiple coups while maintaining a moderate platform focused on a more centrist and traditionalist vision for democracy within the nation."
 SIA.socialism: "£SIA_western_social_democrat 前進党"
 SIA.socialism_desc: "(Progressivism) - The Move Forward Party, prior known (though through unofficial succession) as the Future Forward Party, is a left-wing party advocating for an end to military interference in Thai policies, democratic reform, and a broad progressive agenda. The party's platform and policies have put it at odds with the establishment, with accusations of misconduct being levied against the party."
 SIA.Communist-State: "£SIA_emerging_communism （CPT）タイ共産党"
 SIA.Communist-State_desc: "(Marxism-Leninism) - A splinter of the long-defunct South Seas Communist Party in 1942, the Communist Party of Thailand has, for much of its history, been banned within Thailand. Militant opposition to the Thai government combined with the course of the Vietnam War and its own successes in growing its numbers culminated in an insurgency against Thailand in 1965 - though with the end of the Cold War and the dissolution of the Socialism Camp the party has slowly faded from public eye - being considered dissolved and having launched no operations or campaigns since the early 90s."
 SIA.Caliphate: "£SIA_Caliphate (BRN) 国民革命戦線"
 SIA.Caliphate_desc: "イスラム主義 - パタニ・マレー民族革命戦線（BRN）は、1963年にタイ国内の分離主義組織として結成され、パタニ地域のイスラム教徒の独立を求めている。名目上は純粋な分離主義運動であるが、内部の各派閥はジハード主義、イスラム主義、マレー民族主義など幅広い思想を掲げており、かつてはより左派的な思想の影響を受けていた派閥さえ存在したが、現在では党によって完全に排除されている。また、多くの派閥が目的達成のための平和的手段を拒否し、代わりに同地域におけるタイ政府の統治を弱体化させることを目指している。"
 SIA.Neutral_conservatism: "£SIA_non_aligned_conservative タイ国民党"
 SIA.Neutral_conservatism_desc: "(National Conservatism) - Formed in 1974 as a pro-military group representing a clique within Thailand's military - the Thai Nation Party enjoyed a position as the country's second largest party for a vast majority of its existence. Ideologically it has molded its ideology slightly over the decades, though it has maintained a pragmatic, nationalistic, and fairly consistently conservative platform."
 SIA.neutral_Social: "£SIA_neutral_Social （PTP）タイ貢献党"
 SIA.neutral_Social_desc: "(Populist Liberalism) - Influenced by the Thai Rak Thai Party, the PTP attempts to carry on elements of its populist legacy in the form of a more liberal-oriented populism both socially and economically. The party itself advocates for democratic reform and a limit on the military's power."
 SIA.Nat_Autocracy: "£SIA_Nat_Autocracy (NCPO) 国家平和秩序評議会"
 SIA.Nat_Autocracy_desc: "民族主義的軍事政権 - 国家統治のために軍によって組織された国家平和秩序評議会は、より保守的な価値観を提唱し、政治に対する軍の支配を強化しようとしている。具体的には、憲法を停止し、国家全体における多元主義を制限している。"
 SIA.Nat_Populism: "£SIA_Nat_Populism 新希望党"
 SIA.Nat_Populism_desc: "ポピュリスト的新自由主義 - 1990年に結成された新希望党は、経済的自由主義の要素を取り入れた穏健なポピュリスト路線を掲げていた。当初は選挙で一定の成功を収めたが、1997年のアジア金融危機により有権者からの支持を失い、その後、大きな成功を維持することはできなかった。"
 SIA.Monarchist: "£SIA_nationalist_monarchist チャクリー王朝"
 SIA.Monarchist_desc: "専制君主制 - 1782年にプッタヨートファーチュラーローク（ラーマ1世）によって樹立されたタイの君主制は、戦争、植民地化の野望、反乱、そして国内の反対運動を乗り越え、その権力の大部分を保ち続けてきた。現代においては軍部の支持を受け、王室は直接的・間接的な手段を通じて政治に影響力を及ぼしている。具体的には、特定の政党を優遇したり、王権に対する過度な制限に反対するロビー活動を行ったりしている。"
 SIN.conservatism: "£SIN_conservatism (PAP) 人民行動党 - §C西側派閥§!"
 SIN.conservatism_desc: "人民行動党(PAP)は1950年代後半からシンガポールで政権を握っている。多くの者からは美化された寡頭政治と見なされる一方、シンガポールの経済発展にも貢献してきた。PAPが実施する政策は本質的には保守的であり、真に西洋的なものというレッテルを拒絶している。\n\n§C西側派閥§!はアメリカやその他の主要な西洋諸国とのさらなる協力を推進するだろう。"
 SIN.liberalism: "£SIN_liberalism (SDP) シンガポール民主党"
 SIN.liberalism_desc: "シンガポール民主党は、シンガポール国民を過度に搾取することなく、人権と成長するシンガポールに焦点を当てることを議題としている。"
 SIN.socialism: "£SIN_socialism (WP) 労働者党"
 SIN.socialism_desc: "労働者党は、国会議員を擁する唯一の野党である。同党は、エリート主義と物質主義を最小限に抑えつつ、シンガポールがより社会主義的な国家へと移行すべきだと主張している。さらに、政府がシンガポール国民に関わる問題について説明責任を果たし、国民が政治参加の権利を行使できる「第一世界議会」の実現を信条としている。\n"
 SIN.Neutral_conservatism: "£generic_Neutral_conservatism_small (RP) 革新党"
 SIN.Neutral_conservatism_desc: "中道保守主義 - 革新党は、シンガポールにおける経済的には自由主義的で、社会的には保守的な政党である。"
 SIN.neutral_Social: "£SIN_neutral_Social (NSP) 国民団結党"
 SIN.neutral_Social_desc: "国民団結党は、多党制政治システム内の協力強化と、国民に対する政治的・経済的権利の拡充を掲げている。\n"
 SIN.Neutral_Libertarian: "£SIN_Neutral_Libertarian (SGF) シンガポール人ファースト"
 SIN.Neutral_Libertarian_desc: "シンガポール人ファーストは2014年初頭に創設され、安価な低技能外国人労働者への依存軽減、地元企業育成の優先度向上、シンガポール人の雇用促進、そしてシンガポール人労働者が国内で不利な立場に置かれる原因となる政策の見直しを目的としている。\n"
