 MER_request_mercosur_associate_membership: "Petition for MERCOSUR Associate Status"
 MER_request_mercosur_associate_membership_desc: "Submit a formal petition to MERCOSUR for associate status. If the filing proceeds without interruption, we will be brought into the bloc's outer circle after the review period, opening the door to closer regional coordination."
 MER_request_mercosur_full_membership: "Petition for Full MERCOSUR Membership"
 MER_request_mercosur_full_membership_desc: "Submit a formal petition to enter MERCOSUR as a full member. If the process runs its course, our accession will be formalized at the end of the review period, bringing us fully inside the bloc."
 MER_request_unasul_membership: "Petition for UNASUL Membership"
 MER_request_unasul_membership_desc: "File a formal application to join UNASUL. If the petition proceeds to completion, we will enter the South American framework at the end of the review period rather than wait on a separate bilateral invitation."
 leave_UNASUL: "Leave the UNASUL Joint Defense Mechanism"
 leave_UNASUL_desc: "Withdraw from the military alliance built around the UNASUL Joint Defense Mechanism and end our participation in its common defense structure."
 UNASUL_leave_tt: "We will withdraw from the UNASUL Joint Defense Mechanism's military alliance."
 MER_full_membership_acceptance_hint_desc: "\n\n§YThe acceptance rate is determined by that country's opinion of you, your influence over it, and the progress of the MERCOSUR tree!§!"
 MER_full_membership_invite_process_desc: "\n\n§YIf the country accepts, it may either join immediately as a full member or request a three-step accession package. Completing all three accession decisions formalizes membership through the investment route.§!"
 MER_mercosur_associate_invite_accept_tt: "The invited country becomes a §YMERCOSUR Associate State§!. Every current §YMERCOSUR Member State§! gains §G+1.00%§! §YMonthly Productivity Growth§! and §G+1.00%§! §YForeign Influence Multiplier§!, and both sides receive a notification."
 MER_mercosur_associate_invite_reject_tt: "The invited country refuses the offer, cannot be approached again for §Y180 days§!, and we lose §R15§! §YPolitical Power§! once the rejection is delivered."
 MER_mercosur_full_invite_accept_tt: "The invited country accepts the offer. It will then choose between §Yimmediate full membership§! and an §Yinvestment-backed three-step accession path§!, and both sides receive an acceptance notification."
 MER_mercosur_full_invite_reject_tt: "The invited country refuses the offer, cannot be approached again for §Y365 days§!, and we lose §R25§! §YPolitical Power§! once the rejection is delivered."
 MER_unasul_invite_accept_tt: "The invited country joins §YUNASUL§!. The §YUNASUL Member State§! dynamic modifier is updated for all members, growing by §G+1.00%§! §YPolitical Power Gain§! and §G+1.00%§! §YStability§!, and regional notification events are sent."
 MER_unasul_invite_reject_tt: "The invited country refuses the offer, cannot be approached again for §Y365 days§!, and we lose §R15§! §YPolitical Power§! once the rejection is delivered."
 MER_full_membership_step_one_desc: "\n\n§YThis is accession step 1 of 3. Completing all three accession decisions formalizes full membership.§!"
 MER_full_membership_step_two_desc: "\n\n§YThis is accession step 2 of 3. Completing all three accession decisions formalizes full membership.§!"
 MER_full_membership_step_three_desc: "\n\n§YThis is the final accession step. Once all three accession decisions are complete, full membership is formalized.§!"
 MER_CHL_tariff_alignment: "Tariff Alignment for Chile"
 MER_CHL_tariff_alignment_desc: "Finance the tariff review and administrative coordination needed to align Chile more closely with the bloc's customs regime.$MER_full_membership_step_one_desc$"
 MER_CHL_customs_system_modernization: "Customs System Modernization for Chile"
 MER_CHL_customs_system_modernization_desc: "Provide the funding and technical support needed to modernize Chile's customs administration for full MERCOSUR accession.$MER_full_membership_step_two_desc$"
 MER_CHL_common_standards: "Support the Adoption of Common Standards in Chile"
 MER_CHL_common_standards_desc: "Support the final regulatory and technical work needed for Chile to adopt MERCOSUR common standards.$MER_full_membership_step_three_desc$"
 MER_COL_tariff_alignment: "Tariff Alignment for Colombia"
 MER_COL_tariff_alignment_desc: "Finance the tariff review and administrative coordination needed to align Colombia more closely with the bloc's customs regime.$MER_full_membership_step_one_desc$"
 MER_COL_customs_system_modernization: "Customs System Modernization for Colombia"
 MER_COL_customs_system_modernization_desc: "Provide the funding and technical support needed to modernize Colombia's customs administration for full MERCOSUR accession.$MER_full_membership_step_two_desc$"
 MER_COL_common_standards: "Support the Adoption of Common Standards in Colombia"
 MER_COL_common_standards_desc: "Support the final regulatory and technical work needed for Colombia to adopt MERCOSUR common standards.$MER_full_membership_step_three_desc$"
 MER_VEN_tariff_alignment: "Tariff Alignment for Venezuela"
 MER_VEN_tariff_alignment_desc: "Finance the tariff review and administrative coordination needed to align Venezuela more closely with the bloc's customs regime.$MER_full_membership_step_one_desc$"
 MER_VEN_customs_system_modernization: "Customs System Modernization for Venezuela"
 MER_VEN_customs_system_modernization_desc: "Provide the funding and technical support needed to modernize Venezuela's customs administration for full MERCOSUR accession.$MER_full_membership_step_two_desc$"
 MER_VEN_common_standards: "Support the Adoption of Common Standards in Venezuela"
 MER_VEN_common_standards_desc: "Support the final regulatory and technical work needed for Venezuela to adopt MERCOSUR common standards.$MER_full_membership_step_three_desc$"
 MER_PRU_logistics_corridor: "Develop a Logistics Corridor for Peru"
 MER_PRU_logistics_corridor_desc: "Fund the first stage of a logistics corridor in Peru's capital to prepare the country for deeper integration with MERCOSUR.$MER_full_membership_step_one_desc$"
 MER_PRU_cross_border_transport: "Improve Cross-Border Transport with Peru"
 MER_PRU_cross_border_transport_desc: "Expand overland transport links with Peru and strengthen the infrastructure needed for accession.$MER_full_membership_step_two_desc$"
 MER_PRU_port_connectivity: "Strengthen Port Connectivity for Peru"
 MER_PRU_port_connectivity_desc: "Invest in digital and logistics connectivity for Peru's capital to support a more integrated regional market.$MER_full_membership_step_three_desc$"
 MER_BOL_logistics_corridor: "Develop a Logistics Corridor for Bolivia"
 MER_BOL_logistics_corridor_desc: "Fund the first stage of a logistics corridor in Bolivia's capital to prepare the country for deeper integration with MERCOSUR.$MER_full_membership_step_one_desc$"
 MER_BOL_overland_transport: "Expand Overland Transport Networks for Bolivia"
 MER_BOL_overland_transport_desc: "Back new overland transport upgrades in Bolivia's capital to make accession materially visible.$MER_full_membership_step_two_desc$"
 MER_BOL_border_connectivity: "Improve Border Connectivity for Bolivia"
 MER_BOL_border_connectivity_desc: "Invest in digital and logistical border connectivity in Bolivia as part of its accession package.$MER_full_membership_step_three_desc$"
 MER_PAN_logistics_corridor: "Develop a Logistics Corridor for Panama"
 MER_PAN_logistics_corridor_desc: "Fund the groundwork for a logistics corridor in Panama's capital so that accession produces immediate transport gains.$MER_full_membership_step_one_desc$"
 MER_PAN_port_transport: "Strengthen Port Transport for Panama"
 MER_PAN_port_transport_desc: "Support port-facing transport upgrades in Panama to improve the movement of goods between MERCOSUR markets.$MER_full_membership_step_two_desc$"
 MER_PAN_trade_connectivity: "Improve Trade Connectivity for Panama"
 MER_PAN_trade_connectivity_desc: "Invest in commercial and digital connectivity in Panama as the final step in its accession package.$MER_full_membership_step_three_desc$"
 MER_ECU_development_funds: "Contribute Development Funds for Ecuador"
 MER_ECU_development_funds_desc: "Release a treasury-backed development package for Ecuador to demonstrate the economic value of full accession.$MER_full_membership_step_one_desc$"
 MER_ECU_civilian_industry: "Invest in Civilian Industry for Ecuador"
 MER_ECU_civilian_industry_desc: "Sponsor a new civilian investment project in Ecuador's capital as part of its path to full membership.$MER_full_membership_step_two_desc$"
 MER_ECU_infrastructure_development: "Support Infrastructure Development in Ecuador"
 MER_ECU_infrastructure_development_desc: "Back a targeted infrastructure improvement in Ecuador's capital to strengthen its readiness for accession.$MER_full_membership_step_three_desc$"
 MER_GUY_development_funds: "Contribute Development Funds for Guyana"
 MER_GUY_development_funds_desc: "Release a treasury-backed development package for Guyana to demonstrate the economic value of full accession.$MER_full_membership_step_one_desc$"
 MER_GUY_civilian_industry: "Invest in Civilian Industry for Guyana"
 MER_GUY_civilian_industry_desc: "Sponsor a new civilian investment project in Guyana's capital as part of its path to full membership.$MER_full_membership_step_two_desc$"
 MER_GUY_infrastructure_development: "Support Infrastructure Development in Guyana"
 MER_GUY_infrastructure_development_desc: "Back a targeted infrastructure improvement in Guyana's capital to strengthen its readiness for accession.$MER_full_membership_step_three_desc$"
 MER_SUR_development_funds: "Contribute Development Funds for Suriname"
 MER_SUR_development_funds_desc: "Release a treasury-backed development package for Suriname to demonstrate the economic value of full accession.$MER_full_membership_step_one_desc$"
 MER_SUR_civilian_industry: "Invest in Civilian Industry for Suriname"
 MER_SUR_civilian_industry_desc: "Sponsor a new civilian investment project in Suriname's capital as part of its path to full membership.$MER_full_membership_step_two_desc$"
 MER_SUR_commercial_infrastructure: "Develop Commercial Infrastructure in Suriname"
 MER_SUR_commercial_infrastructure_desc: "Expand commercial infrastructure in Suriname's capital so that accession produces visible economic gains.$MER_full_membership_step_three_desc$"
 MER_MEX_industrial_investment_agreement: "Industrial Investment Agreement with Mexico"
 MER_MEX_industrial_investment_agreement_desc: "Fund the industrial pillar of Mexico's accession package through a major investment agreement centered on its capital.$MER_full_membership_step_one_desc$"
 MER_MEX_commercial_investment_framework: "Commercial Investment Framework with Mexico"
 MER_MEX_commercial_investment_framework_desc: "Establish a broader commercial investment framework with Mexico, strengthening the institutional and economic base for full membership.$MER_full_membership_step_two_desc$"
 MER_MEX_financial_cooperation_package: "Financial Cooperation Package for Mexico"
 MER_MEX_financial_cooperation_package_desc: "Deliver the final financial cooperation package for Mexico, combining commercial and digital investment before accession is completed.$MER_full_membership_step_three_desc$"
 MER_launch_corridor_investment_round: "Launch a MERCOSUR Corridor Investment Round"
 MER_launch_corridor_investment_round_desc: "A stronger bloc cannot exist only on paper. By releasing a new round of treasury-backed corridor funding, we can accelerate infrastructure and network integration across the current full members of MERCOSUR, improving the physical backbone of the bloc."
 MER_release_development_fund_round: "Release a MERCOSUR Development Fund Round"
 MER_release_development_fund_round_desc: "Promises of integration are more convincing when backed by visible investment. By disbursing a new round from the MERCOSUR Development Fund, we can accelerate civilian construction and office expansion across the bloc, strengthening the economic foundations of its full members."
