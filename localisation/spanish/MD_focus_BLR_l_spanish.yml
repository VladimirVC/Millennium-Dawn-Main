 BLR_mtz: "Planta de tractores de Minsk"
 BLR_mtz_desc: "La planta de tractores de Minsk, ubicada en Bielorrusia, es un fabricante de maquinaria agrícola. Fue fundada el 29 de mayo de 1946 y tiene una capacidad de producción de 71.000 tractores de diversas series."
 BLR_Tracktor_category: "Planta MTZ"
 BLR_Tracktor_category_desc: "La Planta de Tractores de Minsk es una planta en Bielorrusia, fabricante de maquinaria agrícola. La Planta de Tractores de Minsk desarrolla y fabrica tractores de ruedas y orugas, motoazadas, herramientas remolcadas y suspendidas para trabajos agrícolas, de construcción, forestales y municipales, piezas de repuesto, bienes de consumo, organiza su producción sobre una base de licencia, presta servicios para el establecimiento y la realización de servicios.\n\n\n                                                   -§YNúmero de tractores disponibles§! §G[?BLR.tracktors]§! - "
