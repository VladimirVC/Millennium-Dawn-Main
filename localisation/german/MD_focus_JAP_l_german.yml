 JAP_military_decision_category: "[JAP.GetAdjectiveCap] Military"
 JAP_consolidate_national_defense_framework_mission: "Consolidate the National Defense Framework"
 JAP_consolidate_national_defense_framework_mission_desc: "The transition to a broader defense posture has created uncertainty in command structures, planning processes, and legal responsibilities. By consolidating the national defense framework, Japan gradually restores coherence and reduces the disruption caused by reform."
 JAP_modernize_joint_command_mission: "Modernize Joint Command Structures"
 JAP_modernize_joint_command_mission_desc: "Integrating land, sea, air, and emerging domains into a unified joint command requires time, training, and organizational change. As new procedures are tested and refined, friction slowly decreases and the effectiveness of Japan's armed forces improves."
 JAP_JAP_normalize_defense_procurement_mission: "Normalize Defense Procurement Systems"
 JAP_JAP_normalize_defense_procurement_mission_desc: "The expansion of defense responsibilities has placed great strain on existing procurement and industrial arrangements. Through careful reform, long-term planning, and closer coordination with industry, Japan works to normalize defense procurement and reduce the inefficiencies of the transition period."
 JAP_establish_asterioid_mining_network_mission: "Establishing Asteroid Mining Network"
 JAP_establish_asterioid_mining_network_mission_desc: "Japan is assembling its first asteroid mining network, positioning orbital platforms and deploying prospecting equipment as off-world resource operations begin to take shape."
 JAP_asteroid_mining_light_operation: "Light Celestial Survey"
 JAP_asteroid_mining_light_operation_desc: "Japan conducts a small-scale asteroid survey, invoking the guidance of ancestral spirits as probes search the heavens for usable ores."
 JAP_asteroid_mining_medium_operation: "Medium Divine Extraction Mission"
 JAP_asteroid_mining_medium_operation_desc: "A larger expedition ventures deeper into the asteroid belt, drawing on mythic symbolism to inspire the mission as Japan seeks valuable off-world metals."
 JAP_asteroid_mining_heavy_operation: "Heavy Heavenly Mining Expedition"
 JAP_asteroid_mining_heavy_operation_desc: "A full-scale asteroid mining effort is launched, echoing tales of heavenly forges as Japan strives to recover rich celestial resources."
 JAP_mars_mission_program_mission: "Mars Colony Established"
 JAP_restore_guarantee: "Request Restoration of U.S. Security Guarantees"
 JAP_restore_guarantee_desc: "With regional tensions rising and doubts about our long-term security growing, parts of the government argue that we must seek a renewed and explicit security guarantee from the United States. Doing so will likely require political concessions on defense policy and the interpretation of Article 9, but it may be the price of strategic stability."
 JAP_remove_american_blockade: "Request an End to U.S. Naval Pressure"
 JAP_remove_american_blockade_desc: "The heightened U.S. naval presence around our key sea lanes has become a source of tension at home and abroad. Diplomatic channels remain open to negotiate a reduction or end to this pressure, but Washington will almost certainly expect deeper security commitments and further adjustments to our Article 9 stance in return."
 JAP_restore_trade_relations: "Seek Normalization of Trade with the United States"
 JAP_restore_trade_relations_desc: "Tariffs and targeted trade measures imposed by the United States are harming our exporters and eroding confidence in the alliance. By engaging Washington directly, we may be able to normalize economic relations,yet any meaningful relief is likely to be tied to renewed security cooperation and a broader interpretation of Article 9."
 USA_demand_japanese_article_9_interpretation: "Demand a Broader Japanese Article 9 Interpretation"
 USA_demand_japanese_article_9_interpretation_desc: "Japan remains a critical ally in a rapidly changing security environment, but its current interpretation of Article 9 constrains meaningful burden-sharing. By formally pressing Tokyo to broaden its understanding of self-defense, we can push for deeper cooperation and a more capable partner,though doing so risks domestic backlash in Japan and potential friction within the alliance."
 JAP_chinese_agression_five: "Rising Chinese Aggression"
 JAP_chinese_agression_five_desc: "Recent Chinese actions in the region have raised concerns among our defense planners. While the situation has not yet reached a critical threshold, the trend is unmistakable: Beijing is steadily escalating its posture. Policymakers warn that Japan must prepare for the possibility of further destabilizing developments."
 JAP_chinese_agression_five_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R5§!"
 JAP_chinese_agression_ten: "Escalating Chinese Pressure"
 JAP_chinese_agression_ten_desc: "China has intensified its military and geopolitical pressure in the region. Patrol incursions, airspace challenges, and aggressive rhetoric have all increased significantly. The growing frequency of these incidents suggests a deliberate strategy to test Japan's resolve and reshape the regional balance."
 JAP_chinese_agression_ten_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R10§!"
 JAP_chinese_agression_twelve: "Alarming Chinese Activities"
 JAP_chinese_agression_twelve_desc: "Beijing's latest actions mark a concerning escalation. Intelligence reports indicate increased naval deployments, military exercises near disputed waters, and political messaging aimed directly at Japan. The situation is becoming increasingly unstable, and calls for a stronger national response are growing louder."
 JAP_chinese_agression_twelve_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R12§!"
 JAP_chinese_agression_fourteen: "Severe Chinese Provocations"
 JAP_chinese_agression_fourteen_desc: "China has taken several aggressive steps that go beyond routine pressure. Strategic assets have been deployed near Japanese territory, and incursions into our surrounding waters have reached a new frequency. Defense officials warn that Japan may need to reconsider elements of its security posture."
 JAP_chinese_agression_fourteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R14§!"
 JAP_chinese_agression_sixteen: "Dangerous Chinese Escalation"
 JAP_chinese_agression_sixteen_desc: "The regional situation is becoming increasingly perilous. Chinese military maneuvers now appear designed to intimidate Japan directly, and propaganda channels in Beijing have adopted a harsher tone. The possibility of a crisis triggered by miscalculation is rising dramatically."
 JAP_chinese_agression_sixteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R16§!"
 JAP_chinese_agression_eighteen: "Critical Chinese Military Pressure"
 JAP_chinese_agression_eighteen_desc: "China's aggressive posture has reached a critical point. Key maritime zones are under constant pressure, air incursions are at unprecedented levels, and regional partners are sounding alarms. Policymakers across Tokyo argue that Japan must reassess its defense strategy, including the interpretation of Article 9."
 JAP_chinese_agression_eighteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R18§!"
 JAP_chinese_agression_twenty: "Severe Regional Crisis: Chinese Aggression Peaks"
 JAP_chinese_agression_twenty_desc: "The situation has become a full-scale regional crisis. China has engaged in extensive military deployments near Japanese territory, signaling a willingness to escalate further. The threat to national security is no longer theoretical,Japan faces a direct challenge that may force historic decisions regarding its military posture and the role of the Self-Defense Forces."
 JAP_chinese_agression_twenty_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R20§!"
 JAP_world_tension_high: "Review Security Posture"
 JAP_world_tension_high_desc: "Rising global instability demands that Japan reassess its defensive policies and prepare for potential shifts in the international order."
 JAP_world_tension_high2: "Prepare for Regional Contingencies"
 JAP_world_tension_high2_desc: "The world is becoming increasingly dangerous. Japan must take concrete steps to ensure national security and maintain strategic readiness."
 JAP_world_tension_high3: "Activate National Security Measures"
 JAP_world_tension_high3_desc: "Global tensions have reached a critical level. Japan must now consider extraordinary measures to safeguard national interests and uphold regional stability."
 JAP_article_nine_protests_appeal: "Respond to Pro-Defense Protests"
 JAP_article_nine_protests_appeal_desc: "Widespread pro-defense protests demand stronger military capabilities and a tougher security posture. By acting on these calls and broadening the interpretation of Article 9, the government can harness public pressure to justify a more assertive national defense policy."
 JAP_article_nine_protests_appeal_tt: "§YProtest Strength§! is at least §R50§!"
 JAP_article_nine_protests_appeal_tt2: "[JAP.GetName] does not have the §YDesired Military Law§!"
 JAP_article_nine_military_parties: "Leverage Pro-Military Parties"
 JAP_article_nine_military_parties_desc: "Pro-military parties within the government are pushing for a stronger national defense and a broader interpretation of Article 9. By aligning with their agenda, the government can advance military reforms and justify a higher level of defense readiness."
 JAP_article_nine: "Article 9 Interpretation"
 JAP_article_nine_left_side: "Strict Pacifism"
 JAP_article_nine_level_one: "Level I: Pacifist Interpretation"
 JAP_article_nine_level_two: "Level II: Defensive Interpretation"
 JAP_article_nine_level_three: "Level III: Cooperative Defense"
 JAP_article_nine_level_four: "Level IV: Collective Self-Defense"
 JAP_article_nine_level_five: "Level V: Expanded Military Role"
 JAP_article_nine_right_side: "Active Defense"
 JAP_great_east_japan_earthquake_decision: "Path to Reconstruction"
 JAP_great_east_japan_earthquake_decision_desc: "On March 11, 2011, the Great East Japan Earthquake struck the nation with unprecedented tremors and tsunamis, unleashing devastation unseen in modern history. From Tohoku to Kanto, vast regions were crippled, paralyzing transportation networks, halting economic activity, and upending countless lives. Communities and industries lost their foundations, and the nation as a whole was plunged into turmoil and uncertainty.\n\nThe disaster was not merely one of physical destruction; it carved a deep scar upon the national psyche and forced society to reconsider its very foundations. Japan now stands at a crossroads, tasked with the immense challenge of recovery and renewal. Rebuilding the devastated regions, restoring industries, and reviving the lives and bonds of its people are unavoidable responsibilities for the state.\n\nThis effort, known as the 'Path to Reconstruction,' will be long and arduous. Yet only by overcoming such adversity can Japan carve out a renewed future."
 JAP_tohoku_infrastructure_decision: "Tohoku Infrastructure Reconstruction"
 JAP_tohoku_infrastructure_decision_desc: "Step by step, we must rebuild the infrastructure devastated by the earthquake. Restoring roads, railways, and ports,the foundations of regional economies and daily life,is the first step toward recovery."
 JAP_kanto_infrastructure_decision: "Kanto Infrastructure Reconstruction"
 JAP_kanto_infrastructure_decision_desc: "Step by step, we must rebuild the infrastructure devastated by the earthquake. Restoring roads, railways, and ports,the foundations of regional economies and daily life,is the first step toward recovery."
 JAP_tohoku_communication_decision: "Restore Telecommunications in Tohoku"
 JAP_tohoku_communication_decision_desc: "The telecommunications infrastructure devastated by the disaster is vital for recovery and daily life. Step by step, restoration must proceed to reconnect communities and revitalize the economy."
 JAP_kanto_communication_decision: "Restore Telecommunications in Kanto"
 JAP_kanto_communication_decision_desc: "The telecommunications infrastructure devastated by the disaster is vital for recovery and daily life. Step by step, restoration must proceed to reconnect communities and revitalize the economy."
 JAP_tohoku_industrial_recovery_decision: "Revitalize Industry in Tohoku"
 JAP_tohoku_industrial_recovery_decision_desc: "Reviving local industries stalled by the disaster is essential for economic recovery. Restoring civilian industries will help create jobs and strengthen the foundation of production."
 JAP_kanto_industrial_recovery_decision: "Revitalize Industry in Kanto"
 JAP_kanto_industrial_recovery_decision_desc: "Reviving local industries stalled by the disaster is essential for economic recovery. Restoring civilian industries will help create jobs and strengthen the foundation of production."
 JAP_domestic_policy_decision: "[JAP.GetFlag][JAP.GetAdjective] Domestic Policy Decisions"
 JAP_focus_renewable_energy_decision: "Focus on Renewable Energy"
 JAP_focus_renewable_energy_decision_desc: "In the wake of rising concerns over the safety of nuclear power, greater investment in solar, wind, and other renewable sources offers a path to diversify energy and reduce dependence on imported fuels."
 JAP_focus_thermal_power_decision: "Focus on Fossil Fuel Powerplants"
 JAP_focus_thermal_power_decision_desc: "Amid concerns over nuclear safety, expanding coal, oil, and natural gas powerplants provides a more immediate and reliable source of electricity for the nation."
 JAP_expand_national_oil_stockpiles: "Expand National Oil Stockpiles"
 JAP_expand_national_oil_stockpiles_desc: "Japan cannot afford to be strangled by blockade, embargo, or price shock. We will expand national oil stockpiles, harden storage sites, and tighten fuel allocation planning so the state can ride out crises without panic."
 JAP_saudi_aramco_crude_storage: "Saudi Aramco Crude Storage"
 JAP_saudi_aramco_crude_storage_desc: "Secure dedicated crude storage through Saudi Aramco to stabilize supply and reduce exposure to sudden market shocks. By anchoring long-term access and predictable delivery, Japan buys strategic breathing room."
 JAP_overseas_upstream_equity: "Overseas Upstream Equity"
 JAP_overseas_upstream_equity_desc: "Energy security is stronger when we own the wells, not just the contracts. We will pursue upstream equity stakes abroad to lock in supply, gain leverage in negotiations, and reduce vulnerability to political pressure."
 JAP_minamitori_deep_sea_trial: "Minamitori Deep-Sea Trial"
 JAP_minamitori_deep_sea_trial_desc: "The seabed near Minamitori holds resources that could change Japan's strategic position if we can extract them reliably. We will launch a deep-sea trial to test equipment, logistics, and processing under real conditions, turning theory into capability."
 JAP_minamitori_deep_sea_trial_tt: "When completed §YSpecial Project $sp_deep_sea_mining$§! we will gain more resources"
 JAP_mitsubishi_escrap: "Mitsubishi E-Scrap Initiative"
 JAP_mitsubishi_escrap_desc: "The cleanest resources are the ones already inside our borders. We will back Mitsubishi-led e-scrap recovery to pull rare metals from discarded electronics and build a domestic supply loop for critical industry."
 JAP_kosaka_tsl_furnace: "Kosaka TSL Furnace Expansion"
 JAP_kosaka_tsl_furnace_desc: "Processing is as strategic as extraction. We will expand the Kosaka TSL furnace capacity to handle complex scrap and mixed concentrates, recovering critical metals that would otherwise be lost."
 JAP_green_ship_recycling: "Green Ship Recycling"
 JAP_green_ship_recycling_desc: "A fleet is not only built, it is dismantled, and the steel must return to the nation. We will establish green ship recycling standards and capacity to recover high-value materials safely and efficiently. Every retired hull will become resources for the next one."
 JAP_horizontal_recycling_expansion_decision: "Horizontal Recycling Expansion"
 JAP_horizontal_recycling_expansion_decision_desc: "Resilience comes from turning every industrial stream into a supply line. We will expand horizontal recycling to move recovered metals and components across sectors, feeding shipbuilding, electronics, and defense production with domestic material."
 JAP_rubber_butadience_brench_decision: "Butadiene Rubber Branch"
 JAP_rubber_butadience_brench_decision_desc: "Natural rubber can be cut off, rationed, or priced into weakness, and Japan cannot allow that lever to exist. We will expand a butadiene based synthetic rubber branch to secure tires, seals, and critical components for industry and the armed forces."
 JAP_bibi_world_decision: "Rapidus IIM-1 'Bibi World' Foundry Buildout"
 JAP_bibi_world_decision_desc: "Accelerate the buildout of the Rapidus IIM-1 'Bibi World' foundry to secure next-generation semiconductor capacity on Japanese soil."
 JAP_yufutsu_oil_expansion_decision: "Yufutsu Oil Expansion"
 JAP_yufutsu_oil_expansion_decision_desc: "Expand the Yufutsu field to strengthen domestic supply and reduce exposure to external disruption."
 JAP_nankai_through_decision: "Nankai Trough Gas Development"
 JAP_nankai_through_decision_desc: "Tap the Nankai Trough to secure a domestic source of natural gas and reduce Japan's exposure to maritime disruption and foreign price shocks."
 JAP_toray_expansion_program_decision: "Toray Expansion Program"
 JAP_toray_expansion_program_decision_desc: "Scale up Toray's advanced materials production to strengthen Japan's industrial base where it matters most."
 JAP_teijin_aerospace_prepreg_decision: "Teijin Aerospace Prepreg"
 JAP_teijin_aerospace_prepreg_decision_desc: "Expand Teijin's aerospace-grade prepreg capacity to secure the composite backbone of modern airframes and high-end defense systems."
 JAP_demand_south_kuril: "Demand the South Kuril Islands"
 JAP_demand_south_kuril_desc: "Tokyo will issue a formal demand for the return of the South Kuril Islands. Moscow may concede to avoid escalation, or refuse and risk a crisis."
 JAP_demand_north_kuril: "Demand the North Kuril Islands"
 JAP_demand_north_kuril_desc: "Japan will demand the return of the North Kuril Islands as part of a wider imperial restoration agenda. A refusal can be used to justify further escalation."
 JAP_demand_sakhalin: "Demand Sakhalin"
 JAP_demand_sakhalin_desc: "Japan will demand the return of Sakhalin. If the Soviet government rejects the demand, Tokyo will face a choice between restraint, limited conflict, or war."
 JAP_peaceout_russia: "Peace Out with Russia"
 JAP_peaceout_russia_desc: "We will force a settlement with Russia to end the war on our terms and secure what we have taken. This is a political decision as much as a military one, locking the new reality into treaties before Moscow can regroup. If Russia accepts, the fighting ends, and the map changes for good."
 JAP_claiming_south_korea: "Assert a Claim over Korea"
 JAP_claiming_south_korea_desc: "We will frame Korea as a matter of Japanese security and historic prerogative, turning ambiguity into an explicit claim. This is not a gesture, it is a declaration that our strategic frontier does not end at the Tsushima Strait. Once the claim is made, every future negotiation will begin on our terms."
 JAP_claiming_north_korea: "Define Korea's Northern Question"
 JAP_claiming_north_korea_desc: "The regime in Pyongyang is not a neighbor, it is a permanent crisis that threatens our seas and our cities. We will formalize Japan's claim to shape the northern peninsula's future, treating it as a security matter that cannot be left to others. Once declared, the North will be a problem to be managed on Japanese terms."
 JAP_claiming_taiwan: "Reassert Our Mandate over Taiwan"
 JAP_claiming_taiwan_desc: "Taiwan sits at the hinge of the first island chain and the throat of our maritime security. We will reassert a Japanese mandate over the island, framing its status as a strategic necessity rather than a matter for distant powers to decide. Once declared, Japan will treat Taiwan's future as inseparable from its own."
 JAP_claiming_phillipines: "Lay Claim to the Philippine Archipelago"
 JAP_claiming_phillipines_desc: "The Philippine archipelago commands the approaches to the Western Pacific and the sea lanes that feed our industry. We will lay a formal claim and make clear that these islands fall within Japan's strategic sphere, whether others approve or not. Once declared, the region will understand that our navy intends to decide who passes through these waters."
 JAP_claiming_malaysia: "Assert a Claim over Malaya"
 JAP_claiming_malaysia_desc: "Malaya sits astride key straits and supply routes that decide the flow of the region's trade and fuel. We will assert a formal claim and frame its status as a matter of Japanese security and maritime order. Once declared, every negotiation will begin with our mandate on the table."
 JAP_claiming_indonesia: "Stake a Mandate in Indonesia"
 JAP_claiming_indonesia_desc: "Indonesia controls the islands and chokepoints that bind the Indian and Pacific oceans together. We will stake a mandate over the archipelago, treating its sea lanes and resources as strategic necessities for Japan. If the region is to have order, it will be enforced from Tokyo."
 JAP_claiming_vietnam: "Declare Our Interest in Vietnam"
 JAP_claiming_vietnam_desc: "Vietnam anchors the edge of the South China Sea and offers bases that can shape the balance of the entire coastline. We will declare Japan's claim of interest and make clear that its alignment will not be decided without us. Influence begins with certainty, and certainty begins with a claim."
 JAP_claiming_cambodia: "Extend the Sphere to Cambodia"
 JAP_claiming_cambodia_desc: "Cambodia is small, but geography makes it a corridor, a buffer, and a lever in mainland Southeast Asia. We will extend our claim and bind its future to the wider Japanese sphere. What looks minor on the map can decide the stability of the region."
 JAP_claiming_laos: "Claim the Mekong Hinterland"
 JAP_claiming_laos_desc: "Laos controls land routes, rivers, and the quiet depth behind the coast. We will claim the Mekong hinterland as part of our continental security, ensuring rivals cannot use it as a back door into our sphere. Control is not only ports, it is corridors."
 JAP_claiming_australia: "Declare a Claim over Australia"
 JAP_claiming_australia_desc: "Australia is the southern anchor of the Pacific, a continent that can host fleets, air power, and the logistics of long war. We will declare a claim and signal that the southern approaches will not remain outside Japan's strategic reach. If the south is secured, the ocean follows."
 JAP_claiming_new_zealand: "Claim the Southern Outriders"
 JAP_claiming_new_zealand_desc: "New Zealand may be distant, but it sits on routes that matter when the Pacific becomes contested. We will claim the southern outriders and deny rivals a safe rear area beyond our reach. Even far islands become weapons when others hold them."
 JAP_claiming_myanmar: "Assert Control of the Irrawaddy Gate"
 JAP_claiming_myanmar_desc: "Myanmar is a land bridge between oceans and a gateway into the region's interior. We will assert a claim and treat its ports, corridors, and airfields as strategic assets of Japan's sphere. Whoever holds the gate decides who enters."
 JAP_demand_palau: "Demand Palau"
 JAP_demand_palau_desc: "Palau is a small chain with a large footprint in naval planning, offering anchorage, surveillance, and reach. We will demand its submission to Japanese authority and secure it as a forward outpost of our Pacific order. The map is written in bases, not speeches."
 JAP_demand_micronesia: "Demand Micronesia"
 JAP_demand_micronesia_desc: "Micronesia sits across the central Pacific like stepping stones for fleets and aircraft. We will demand control to secure transit routes and deny rivals staging ground in our ocean. Once held, these islands turn distance into advantage."
 JAP_demand_nauru: "Demand Nauru"
 JAP_demand_nauru_desc: "Nauru is tiny, but islands like this decide surveillance coverage and access across wide waters. We will demand its alignment with Japan and incorporate it into our network of outposts. In a maritime age, no island is irrelevant."
 JAP_demand_kiribati: "Demand Kiribati"
 JAP_demand_kiribati_desc: "Kiribati stretches across key approaches that can support reconnaissance, refueling, and interdiction. We will demand its submission to Japanese direction and secure the islands as a chain in our wider perimeter. The Pacific will be organized, one link at a time."
 JAP_demand_marshall_islands: "Demand the Marshall Islands"
 JAP_demand_marshall_islands_desc: "The Marshall Islands provide space for airfields, logistics, and control over central Pacific routes. We will demand their transfer into Japan's sphere and turn them into fortified stepping stones for fleet operations. Whoever holds these atolls can shape an entire theatre."
 JAP_demand_tuvalu: "Demand Tuvalu"
 JAP_demand_tuvalu_desc: "Tuvalu offers little land, but it offers presence, and presence decides sea control. We will demand Tuvalu's alignment and secure it as a listening post and waypoint in the southern Pacific. Even the smallest islands can anchor a perimeter."
 JAP_demand_solomon_islands: "Demand the Solomon Islands"
 JAP_demand_solomon_islands_desc: "The Solomons are a natural barrier and staging area in the southwest Pacific, ideal for airfields and naval cover. We will demand their submission to Japan and lock down the routes that pass through them. Control here means control of movement."
 JAP_demand_guinea: "Demand New Guinea"
 JAP_demand_guinea_desc: "New Guinea is a continental sized bastion that dominates the approaches between Southeast Asia and the Pacific. We will demand its transfer and turn it into a fortress of air power, logistics, and forward defense. With New Guinea secured, the southern theatre bends to our will."
 JAP_demand_vanuatu: "Demand Vanuatu"
 JAP_demand_vanuatu_desc: "Vanuatu sits on lines that matter for resupply and reach into the southwest Pacific. We will demand its alignment with Japan and integrate it into our basing network. A chain of islands becomes a wall when it is held together."
 JAP_demand_fiji: "Demand Fiji"
 JAP_demand_fiji_desc: "Fiji is a central hub in the South Pacific, capable of supporting fleet logistics and air operations across a wide arc. We will demand its submission to Japan and secure it as a keystone of our southern perimeter. When Fiji is ours, the region's balance shifts."
 JAP_demand_samoa: "Demand Samoa"
 JAP_demand_samoa_desc: "Samoa sits on routes that connect the central Pacific to the southern approaches. We will demand Samoa's alignment with Japan and integrate its ports and airfields into our wider perimeter. In an ocean empire, even distant islands become decisive."
 JAP_demand_tonga: "Demand Tonga"
 JAP_demand_tonga_desc: "Tonga offers a strategic foothold in the South Pacific and a platform for monitoring movement across wide waters. We will demand Tonga's submission to Japanese direction and secure it as part of our southern chain of control. Neutrality is a luxury we will not permit in our sea lanes."
 JAP_demand_american_islands: "Demand the American Islands"
 JAP_demand_american_islands_desc: "American held islands are not just territory, they are forward bases that project power into our ocean. We will demand their transfer or neutralization under Japanese authority, denying Washington staging ground on our doorstep. If the Pacific is to be ordered, foreign footholds must be removed."
 JAP_demand_french_islands: "Demand the French Islands"
 JAP_demand_french_islands_desc: "French island holdings provide reach, ports, and diplomatic cover for foreign presence in the Pacific. We will demand their submission to Japan and fold them into our network of outposts and corridors. Our sphere will not be perforated by distant empires."
 JAP_demand_british_islands: "Demand the British Islands"
 JAP_demand_british_islands_desc: "British island possessions are remnants of an older order, but they still offer basing and influence across critical routes. We will demand their transfer into Japan's sphere and close another gap in our maritime perimeter. The Pacific will be organized under one authority, ours."
 JAP_imperial_procurement_standardization: "Imperial Procurement Standardization"
 JAP_imperial_procurement_standardization_desc: "Centralize procurement rules, standardize components, and enforce common specifications across the armed forces. The goal is faster output, simpler logistics, and fewer production bottlenecks."
 JAP_zaibatsu_empowerment_charter: "Zaibatsu Empowerment Charter"
 JAP_zaibatsu_empowerment_charter_desc: "Grant expanded privileges to selected industrial conglomerates in exchange for binding production targets set by the imperial government."
 JAP_neighborhood_associations_system: "Neighborhood Associations System"
 JAP_neighborhood_associations_system_desc: "Rebuild a nationwide network of local associations to register households, coordinate distribution, and support rapid mobilization. It strengthens social control and improves state responsiveness."
 JAP_state_rites_restoration: "State Rites Restoration"
 JAP_state_rites_restoration_desc: "Restore state ceremonies and public rites as a central pillar of national life. This reform reinforces imperial legitimacy and encourages public conformity to the restored order."
 JAP_national_morals_education_act: "National Morals and Education Act"
 JAP_national_morals_education_act_desc: "Standardize civic education around duty, service, and national cohesion. Schools will be used to build discipline, expand preparedness, and foster loyalty to the restored state."
 JAP_imperial_rescript_revival: "Imperial Rescript Revival"
 JAP_imperial_rescript_revival_desc: "Revive an official imperial rescript to anchor the state's legitimacy and define the citizen's obligations. The restored order will be presented as a return to unity, duty, and national purpose."
 JAP_north_korean_remilitarized_dmz: "Respond to North Korea's DMZ Escalation"
 JAP_north_korean_remilitarized_dmz_desc: "North Korea has reinforced positions along the Demilitarized Zone. Tokyo will cite this escalation to tighten the security posture and expand operational latitude under Article 9."
 JAP_north_korean_increased_nuclear_testing: "Respond to North Korea's Nuclear Tests"
 JAP_north_korean_increased_nuclear_testing_desc: "A renewed pace of nuclear tests has heightened the regional threat environment. The government will use this to justify a stricter Article 9 interpretation and accelerate readiness measures."
 JAP_north_korean_threats_to_south_korea: "Respond to North Korea's Threats"
 JAP_north_korean_threats_to_south_korea_desc: "Direct threats against the Republic of Korea increase the risk of a wider conflict that could spill into Japan's security perimeter. Tokyo can broaden Article 9 interpretation and reinforce deterrence planning."
 JAP_north_korean_road_to_war: "Prepare for North Korea's March to War"
 JAP_north_korean_road_to_war_desc: "The situation is sliding toward open conflict. Japan can no longer rely on restraint alone. A revised Article 9 interpretation will enable more robust military planning and faster response options."
 JAP_russian_agressiveness: "Respond to Russian Aggressiveness"
 JAP_russian_agressiveness_desc: "Russia's increasingly assertive posture in Northeast Asia is undermining regional stability. Tokyo will use the heightened threat environment to strengthen deterrence and expand operational latitude under Article 9."
 JAP_defence_russian_asian_ambitions: "Counter Russia's Asian Ambitions"
 JAP_defence_russian_asian_ambitions_desc: "Moscow's ambitions in Asia threaten Japan's security environment and the balance of power in the Pacific. Tokyo will harden its defense posture and broaden operational options under Article 9."
 JAP_russian_north_korean_alliance: "Prepare for a Russia North Korea Axis"
 JAP_russian_north_korean_alliance_desc: "Closer alignment between Russia and North Korea would tighten the pressure on Japan from multiple directions. Tokyo will respond by strengthening deterrence and loosening remaining constraints under Article 9."
 JAP_russian_pacific_naval_presence: "Answer Russia's Pacific Naval Buildup"
 JAP_russian_pacific_naval_presence_desc: "Russia's naval posture in the Pacific is becoming more assertive. Japan will use this shift to justify expanded maritime readiness and a more flexible interpretation of Article 9."
 JAP_tookover_sikhalin_mission: "Deadline to Reclaim Lost Territories"
 JAP_tookover_sikhalin_mission_desc: "Time is running out. If Russia fails to regain the required objectives before the deadline, international pressure and domestic exhaustion will force a settlement. A peace will be signed, and the lost territories will be ceded as the price of ending the war."
 JAP_russia_demands_peace_japan: "A Peace Settlement with Russia"
 JAP_russia_demands_peace_japan_desc: "With the Kuril Islands and Sakhalin now firmly under Japanese control, Tokyo has put forward a proposal to end the war. The offer is simple and calculated: peace in exchange for Russia recognizing the new reality in the north. It is not an act of charity but a strategic settlement, securing our gains while sparing both nations the cost of a prolonged conflict. Acceptance would bring the war to an end and formalize our control over the captured territories. Rejection would signal that Moscow is willing to continue a war it is no longer certain to win."
 JAP_russia_demands_peace_russia: "Demand Peace from Japan"
 JAP_russia_demands_peace_russia_desc: "We will demand a settlement with Japan to end the fighting and freeze the situation before it worsens. This is not reconciliation, it is damage control, locking in terms while we still have leverage to force an outcome. If Tokyo refuses, we will know they seek victory, not peace."
 JAP_auto_claiming_tt: "When selecting this decision, it will repeat itself until all core states are claimed. Then you can demand submission"
 JAP_intellectual_platform_decision: "$JAP_intellectual_platform$"
 JAP_intellectual_platform_decision_desc: "$JAP_intellectual_platform_desc$"
 JAP_declining_birthrate_category: "Declining Birthrate Countermeasures Agency"
 JAP_declining_birthrate_category_desc: "In Japan around 2000, the decline in the number of births and the progression of the low birthrate were beginning to be strongly recognized as issues that could shake the foundations of society in the future. The causes are not singular,later marriage and non-marriage, the difficulty of balancing childrearing and employment, and household burdens including education and housing,and this is not a problem that can be solved with short-term measures alone. Changes in the population structure affect the labor force, social security, and even the maintenance of local communities, so the government is required to respond continuously and across policy areas.\n\nEfforts to address this issue gradually take shape through the accumulation of individual policies, such as expanding childrearing support, reviewing work styles, and reducing household burdens. Visible changes may not appear immediately, but the accumulation of measures steadily changes the foundations of society and will also have medium- to long-term effects on birth trends.\n\nIn survey reports published every few years, the progress and effectiveness of these efforts are reviewed again. Depending on the results, the sense of crisis surrounding the low birthrate may intensify, or signs of recovery and improvement may be confirmed. How persistently the government can continue building up these measures will determine the future population base.\n\n§YIn the national focus $JAP_work_style_reform$, $JAP_basic_policy_declining_birthrate_society$, and $JAP_save_ice_age_generation$, raising the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! can weaken or remove the effects of the low birthrate national spirit!§!\n\n§YChanges to the low birthrate national spirit are checked by a survey event held once every §2 4 years§!! If $JAP_declining_birthrate_measures_modifier$ is at or above a certain level, the national spirit will §Gimprove§!, but if it is below a certain level, it may §Rworsen§! instead!§!\n\n§YCurrent progress of low birthrate countermeasures:§! [?ROOT.modifier@JAP_declining_birthrate_measures_modifier|0]\n\n§YStatus quo target value:§! 7\n\n§YImprovement target value:§! 14"
 JAP_territorial_disputes: "[JAP.GetNameWithFlag]'s Territorial Disputes"
 JAP_territorial_disputes_desc: "[JAP.GetName] is currently engaged in territorial disputes with neighboring countries over the following three regions:\n\n§YNorthern Territories (Southern Kuril Islands)§!: [JAP.GetName] claims the islands of Etorofu, Kunashiri, Shikotan, and the Habomai group, located northeast of Hokkaido, arguing that their occupation by the Soviet Union after World War II was illegitimate and continues to seek their return from the [SOV.GetName]. [SOV.GetName], on the other hand, asserts sovereignty over the islands and maintains effective control.\n\n§YTakeshima ([KOR.GetAdjective] name: Dokdo)§!: Located in the Sea of [JAP.GetName] (East Sea), this island is claimed by [JAP.GetName] but has been under effective control by [KOR.GetName] since the 1950s. The dispute remains a highly contentious issue between the two countries, involving historical interpretations and fishing rights, and is considered politically sensitive.\n§YBecause Takeshima is too small to be shown on the map, even a successful negotiation will not result in territorial gains. However, you will still be able to obtain the modifiers described below!§!\n\n§YSenkaku Islands (Chinese name: Diaoyu Islands)§!: This group of uninhabited islets in the East China Sea has been under [JAP.GetName]'s effective control since 1895, but is also claimed by [CHI.GetName] and [TAI.GetName]. Since the 1990s, repeated diplomatic protests and competing assertions have made the issue a potential flashpoint for future tensions.\n\nAll of these disputes are deeply intertwined with history, international law, effective control, diplomatic relations, and domestic public opinion. Resolving them requires fostering closer ties and mutual understanding with the countries involved.\n\n§YHint: Increasing opinion from the target country or boosting your influence over them will make negotiations more likely to succeed!§!\n\n§YReward: If the negotiations succeed, you can gain modifiers to §G$MODIFIER_STABILITY_FACTOR$§! and §G$agriculture_district_income_tax_modifier$§!!"
 JAP_territorial_disputes_TT: "If the negotiations succeed, in addition to resolving the territorial issue, you can gain bonuses to §G$MODIFIER_STABILITY_FACTOR$§! and §G$agriculture_district_income_tax_modifier$§!!"
 JAP_dec_negotiations_resolve_northern_territories_dispute: "Negotiations to Resolve the Northern Territories Dispute"
 JAP_dec_negotiations_resolve_northern_territories_dispute_desc: "The territorial issue over the Northern Territories remains one of the most significant unresolved matters in postwar [JAP.GetName]-[SOV.GetName] diplomacy. Addressing this issue head-on and seeking a peaceful resolution is crucial for restoring [JAP.GetName]'s sovereignty and ensuring stability in the Far East. If sufficient mutual trust and negotiation conditions are established, we can initiate formal diplomatic negotiations with [SOV.GetName] to request the return of the territories."
 JAP_dec_negotiations_resolve_senkaku_dispute_china: "Negotiations to Resolve the Senkaku Islands Dispute with [CHI.GetName]"
 JAP_dec_negotiations_resolve_senkaku_dispute_china_desc: "[CHI.GetName]'s territorial claims over the Senkaku Islands have become a destabilizing factor in [JAP.GetName]-[CHI.GetName] relations. As the party exercising effective control over the islands, [JAP.GetName] seeks to resolve this issue diplomatically by persuading [CHI.GetName] to withdraw its claim. With the necessary mutual trust and international influence in place, we are now prepared to begin direct negotiations with [CHI.GetName]."
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan: "Negotiations to Resolve the Senkaku Islands Dispute with [TAI.GetName]"
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan_desc: "[TAI.GetName]'s territorial claim over the Senkaku Islands has become a potential obstacle to mutual trust and cooperation between [JAP.GetName] and [TAI.GetName]. In order to gain diplomatic recognition of [JAP.GetName]'s effective control over the islands, we are now prepared to enter peaceful negotiations with the [TAI.GetAdjective] authorities."
 JAP_dec_negotiations_resolve_takeshima_dispute: "Negotiations to Resolve the Takeshima Dispute"
 JAP_dec_negotiations_resolve_takeshima_dispute_desc: "The territorial dispute with [KOR.GetName] over Takeshima has long been a major obstacle in [JAP.GetName]-[KOR.GetName] relations. Our nation is prepared to formally propose territorial negotiations to the [KOR.GetAdjective] government, seeking a resolution through calm and sincere diplomacy."
 JAP_base_okinawa_decision: "Future of U.S. Forces in Okinawa"
 JAP_base_okinawa_decision_desc: "Okinawa remains home to a significant number of U.S. military bases, impacting both Japan's security framework and the local communities.\nThe Japanese government is now exploring ways to reassess the current arrangement in pursuit of greater security autonomy and reduced regional burdens.\nThrough diplomatic engagement, a new balance in the U.S.-Japan security relationship may be found.\n\nHint: §Y[JAP.GetName]'s influence in [USA.GetName]§! and §Y[USA.GetName]'s influence in [JAP.GetName]§! affect the negotiation success rate. In addition, you can also increase the success rate by §Yresolving the Balance of Power over Article 9§! or by §Yraising military spending to at least $defence_04$§!!"
 JAP_negotiation_base_okinawa: "Initiate Negotiations on U.S. Withdrawal from Okinawa"
 JAP_negotiation_base_okinawa_desc: "To enhance national security autonomy, Japan will initiate diplomatic negotiations regarding the withdrawal of U.S. military forces stationed in Okinawa.This move aims to reassess the current security arrangements and explore a more adaptable framework in light of evolving regional dynamics."
 Japan.101.t: "Postal Dissolution: Putting Our Mandate to the Test"
 Japan.101.d: "The debate over postal privatization has met with strong resistance in the Diet, and deliberations are growing increasingly tense. Even within the party, cautious and opposing voices remain strong: some argue we should proceed through adjustments and revisions, while others insist that now is the time to clarify the issue and seek the public's judgment.\nIf we dissolve the House of Representatives and hold a general election, we will be putting the reform itself to a direct test. At the same time, the political calendar would rapidly shift toward an election, and heightened political tension would be unavoidable.\n\nShould we move ahead with a dissolution and a general election?"
 Japan.101.a: "Dissolve the House of Representatives."
 Japan.101.b: "Do not dissolve."
 Japan.103.t: "Rise of the Left-Wing Forces"
 Japan.103.d: "Amid economic stagnation, employment insecurity, and growing concerns over social security, interest is rapidly rising in left-wing forces that call for expanded redistribution and livelihood support. As a receptacle for dissatisfaction with established politics, support is spreading in various regions, and opinion polls have also begun to show noticeable growth for left-wing parties. In the political situation ahead, the presence of the left will likely become impossible to ignore."
 Japan.103.a: "A tailwind for liberal forces"
 Japan.103.b: "Growth of social democratic forces"
 Japan.103.c: "Expanded presence of communist forces"
 Japan.103.e: "Rapid rise of left-wing populist forces"
 Japan.104.t: "Rise of the Right-Wing Forces"
 Japan.104.d: "Amid growing anxiety over the security environment and rising distrust in politics, support is spreading for right-wing forces that call for maintaining order, national self-reliance, and an emphasis on traditional values. These positions are drawing the interest of a broad range of voters, and opinion polls have also begun to show noticeable growth for right-wing parties. In the political situation ahead, the presence of the right may increase even further."
 Japan.104.a: "Expanded support for conservative forces"
 Japan.104.b: "Growth of social democratic forces"
 Japan.104.c: "Rise of reform-conservative forces"
 Japan.104.e: "Expanded support for Restoration-aligned forces"
 JAP_diplomacy.01.t: "Initiating Negotiations over U.S. Troop Withdrawal from Okinawa"
 JAP_diplomacy.01.d: "For decades, the presence of U.S. forces in Japan has been a cornerstone of the nation's postwar security framework and regional stability. However, in light of evolving geopolitical conditions, shifts in public opinion, and Japan's growing interest in enhancing its own defense capabilities, the government has determined that it must reexamine the U.S. military presence in Okinawa. As a first step, formal negotiations with the United States will now commence."
 JAP_diplomacy.01.a: "Begin diplomatic negotiations"
 JAP_diplomacy.02.t: "Japanese Request for Troop Withdrawal Negotiations"
 JAP_diplomacy.02.d: "The Japanese government has submitted a formal request to enter into negotiations regarding the withdrawal of U.S. forces stationed in Okinawa. The proposal is not antagonistic in nature but rather framed as part of a broader reassessment of Japan's defense posture and evolving security needs. The United States must now consider how to respond, balancing the integrity of the alliance with long-term strategic interests in the region."
 JAP_diplomacy.02.a: "Accept the request"
 JAP_diplomacy.02.b: "Decline the request"
 JAP_diplomacy.03.t: "Agreement Reached: U.S. Forces to Withdraw"
 JAP_diplomacy.03.d: "Following a series of diplomatic discussions, Japan and the United States have reached an agreement regarding the withdrawal of U.S. forces from Okinawa. This marks a pivotal moment in Japan's evolving defense policy and underscores its desire to assume greater responsibility for its own security.  While this marks the end of an existing framework, it also offers an opportunity to reassess the U.S.-Japan relationship and explore new forms of security cooperation for the future."
 JAP_diplomacy.03.a: "A new chapter in security policy begins"
 JAP_diplomacy.04.t: "Negotiations Failed: Withdrawal Denied"
 JAP_diplomacy.04.d: "The U.S. government has declined Japan's request for troop withdrawal from Okinawa. As a result, the existing security arrangement will remain in place. This outcome may provoke mixed reactions within Japan, potentially fueling debate about the country's autonomy in defense matters. The Japanese government must now reevaluate its approach while continuing to monitor the broader regional and domestic landscape."
 JAP_diplomacy.04.a: "Time to consider our next move"
 JAP_diplomacy.05.t: "Towards a Shared Memory for the Future"
 JAP_diplomacy.05.d: "The Japanese government has decided to propose the establishment of a trilateral intellectual platform under UN mediation, aimed at sharing the memories and lessons of past wars and passing on a culture of peace to future generations. The project will include museums and digital archives, with all costs covered by Japan. The proposal will be formally delivered to China and South Korea through diplomatic channels."
 JAP_diplomacy.05.a: "Send the proposal"
 JAP_diplomacy.06.t: "Japan's Proposal: Sharing Memory and the Future"
 JAP_diplomacy.06.d: "The Japanese government has proposed, under UN mediation, the establishment of a trilateral intellectual platform with China and South Korea to preserve the memories and lessons of war for future generations. The initiative includes building museums and digital archives, with all costs covered by Japan. Will we choose forward-looking cooperation, or continue to dwell in distrust? Our decision will shape the future of memory in East Asia."
 JAP_diplomacy.06.a: "Accept the proposal"
 JAP_diplomacy.06.b: "Reject the proposal"
 JAP_diplomacy.08.t: "Trilateral Intellectual Platform Launched"
 JAP_diplomacy.08.d: "Both China and South Korea have accepted the proposal. Under UN mediation, the trilateral intellectual platform has been formally launched. Through joint museums and archives, the memory and lessons of war will now be passed on to future generations. This may mark a meaningful first step toward reconciliation and mutual understanding."
 JAP_diplomacy.08.a: "A new step toward the future"
 JAP_diplomacy.09.t: "The Proposal Was Rejected"
 JAP_diplomacy.09.d: "Unfortunately, our envisioned intellectual platform has been rejected. It is clear that reconciliation requires more time and continued efforts to build trust."
 JAP_diplomacy.09.a: "We must wait for another opportunity"
 JAP_news.01.t: "[JAP.GetLeader]'s Statement: Acknowledging History"
 JAP_news.01.d: "Today, the Japanese government issued an official statement by Prime Minister [JAP.GetLeader], expressing deep remorse and heartfelt apology for Japan's past colonial rule and wartime actions. The statement emphasized a sincere commitment to building forward-looking diplomatic relations and responsibly preserving the memory of history.The speech has garnered significant attention both domestically and internationally, and is expected to influence future diplomacy in East Asia."
 JAP_news.01.a: "Our responsibility for the future."
 JAP_news.01.b: "We will closely monitor future developments."
 JAP_diplomacy.34.t: "Proposal to Expand Currency Swap Arrangements"
 JAP_diplomacy.34.a: "Accept"
 JAP_diplomacy.34.b: "Decline for now"
 JAP_diplomacy_34_TT: "§YIf the offer is accepted, the ASEAN countries will receive a stability modifier, and we will gain a §Gfavorable opinion modifier§! from the ASEAN countries!§!"
 JAP_diplomacy.35.t: "Agreement on Expanded Swap Arrangement"
 JAP_diplomacy.35.d: "[FROM.GetName] has agreed to Japan's proposal to expand the currency swap arrangement. This further strengthens the \"safety net\" of liquidity support in times of crisis, increasing market confidence and the effectiveness of regional cooperation. This agreement is also a clear step toward boosting trust in Japan within ASEAN."
 JAP_diplomacy.35.a: "Good."
 JAP_diplomacy.36.t: "Proposal Declined"
 JAP_diplomacy.36.d: "[FROM.GetName] has indicated that it will decline Japan's proposal to expand the currency swap arrangement. This reflects a preference to prioritize clarifying the agreement's terms and operating procedures, and is not a criticism of the proposal itself. Japan should remain mindful of the other country's circumstances while keeping channels for dialogue open."
 JAP_diplomacy.36.a: "Understood."
 JAP_diplomacy.37.t: "Proposal for Core Infrastructure Investment"
 JAP_diplomacy.37.d: "To boost regional connectivity and economic growth, the Japanese government has proposed large-scale ODA investment in our country focused on core infrastructure such as transport networks, ports, and energy. Improvements to roads, ports, and power grids will strengthen the foundations of logistics and industry, directly supporting our country's growth. Accepting the proposal would also increase Japan's influence within ASEAN.\n\nShould we accept this proposal and accelerate infrastructure development?"
 JAP_diplomacy.37.a: "Accept"
 JAP_diplomacy.37.b: "Reject"
 JAP_diplomacy_37_TT: "§YIf the offer is accepted, the ASEAN countries will receive an infrastructure construction speed modifier, and in return for contributing §R3.5B§! per country, we will gain §Ginfluence§! within the ASEAN countries!§!"
 JAP_diplomacy.38.t: "Investment Proposal Accepted"
 JAP_diplomacy.38.d: "[FROM.GetName] has accepted Japan's proposal for ODA investment in core infrastructure. Advancing improvements to transport networks, ports, and power infrastructure will boost regional connectivity and economic growth, while making our involvement more firmly established. This agreement will further strengthen Japan's influence within ASEAN."
 JAP_diplomacy.38.a: "Good."
 JAP_diplomacy.39.t: "Proposal Declined"
 JAP_diplomacy.39.d: "[FROM.GetName] has indicated that it will decline Japan's proposal for ODA investment in core infrastructure. The other country appears to be prioritizing its domestic plans and institutional preparations, but this does not mean it is rejecting the proposal itself. Japan should remain mindful of the other country's circumstances while leaving room for future cooperation."
 JAP_diplomacy.39.a: "Understood."
 JAP_diplomacy.40.t: "Proposal for Human Capital and Research Cooperation"
 JAP_diplomacy.40.a: "Accept"
 JAP_diplomacy.40.b: "Reject"
 JAP_diplomacy_40_TT: "§YIf the offer is accepted, the ASEAN countries will receive modifiers to research speed and productivity growth, and we will gain §Ginfluence§! within the ASEAN countries!§!"
 JAP_diplomacy.41.t: "Cooperation Proposal Accepted"
 JAP_diplomacy.41.a: "Good."
 JAP_diplomacy.42.t: "Proposal Declined"
 JAP_diplomacy.42.a: "Understood."
 JAP_diplomacy.43.t: "Request to Join Japan's Maritime Security Framework"
 JAP_diplomacy.43.d: "The Japanese government has presented a plan to launch a neutral and peaceful maritime security framework aimed at easing tensions in the South China Sea and protecting freedom of navigation, and has approached our country about joining it. Cooperation such as information sharing, maritime search and rescue, counter-piracy efforts, and joint exercises would contribute to regional stability and improve crisis management capabilities. Accepting the proposal would also increase Japan's influence within ASEAN.\n\nShould we accept this proposal and cooperate within Japan's framework?"
 JAP_diplomacy.43.a: "Accept"
 JAP_diplomacy.43.b: "Reject"
 JAP_diplomacy_43_TT: "§YIf the offer is accepted, the ASEAN countries will receive a stability modifier, and we will gain §Ginfluence§! within the ASEAN countries!§!"
 JAP_diplomacy.44.t: "Agreement to Join the Framework"
 JAP_diplomacy.44.d: "[FROM.GetName] has agreed to join Japan's proposed neutral and peaceful maritime security framework. As cooperation such as information sharing, maritime search and rescue, counter-piracy efforts, and joint exercises moves forward, we can expect tangible progress in regional stability and the protection of freedom of navigation. This agreement will strengthen Japan's trust and influence within ASEAN."
 JAP_diplomacy.44.a: "Good."
 JAP_diplomacy.45.t: "Participation Proposal Declined"
 JAP_diplomacy.45.d: "[FROM.GetName] has indicated that it will decline joining Japan's proposed neutral and peaceful maritime security framework. The other country appears to be prioritizing considerations of the regional situation and domestic priorities, but this does not mean it is rejecting the principles of cooperation themselves. Japan should maintain a stance that does not inflame tensions while leaving room for dialogue and cooperation."
 JAP_diplomacy.45.a: "Understood."
 JAP_diplomacy.46.t: "Launch of the Japan U.S. Joint Education Program"
 JAP_diplomacy.46.d: "The Japanese government has proposed expanding joint education programs and student exchanges to deepen mutual understanding and foster the next generation. By creating a framework in which both countries can learn from each other's strengths,Japan's discipline and the United States' entrepreneurial spirit,the aim is to cultivate a new generation of leaders with an international outlook. This initiative will increase people-to-people ties and further strengthen trust within the alliance."
 JAP_diplomacy.46.a: "An investment in the future."
 JAP_diplomacy_46_TT: "§YThe United States will gain a stability modifier!§!"
 JAP_diplomacy.47.t: "Japan U.S. Tech and Culture Exchange"
 JAP_diplomacy.47.d: "The Japanese government has presented a plan to expand tech and cultural exchange by linking Japanese university labs, studios, and corporate networks with partners in Silicon Valley, Seattle, and Los Angeles. Engineers, designers, and creators would travel back and forth for joint projects, aiming to combine U.S. know-how in platform operations with Japan's strengths in hardware, games, and animation. If cultural affinity and scientific cooperation advance in tandem, they will bolster both social stability and the momentum for innovation."
 JAP_diplomacy.47.a: "Let's maximize the synergy."
 JAP_diplomacy.48.t: "Japan U.S. Dual-Use Research Cooperation"
 JAP_diplomacy.48.d: "The Japanese government has presented a proposal to further strengthen Japan U.S. cooperation in dual-use technology fields that can be applied to both civilian and military purposes. Centered on collaboration between industry and academia, the plan aims to advance joint research, share expertise, and promote personnel exchanges, accelerating R&D and driving overall technological development. If this partnership takes root, it is expected to enhance future competitiveness in both the civilian and military sectors."
 JAP_diplomacy.48.a: "Let's move the joint research forward."
 JAP_diplomacy_48_TT: "§YThe United States will also gain a research speed modifier!§!"
 JAP_diplomacy.49.t: "Japan Taiwan Disaster Preparedness Knowledge Platform"
 JAP_diplomacy.49.a: "Let's enhance our resilience."
 JAP_diplomacy_49_TT: "§Y[TAI.GetName] will also gain the same modifiers!§!"
 JAP_diplomacy.50.t: "Strengthening the Japan Taiwan Advanced Technology Partnership"
 JAP_diplomacy.50.a: "Let's accelerate the joint research."
 JAP_diplomacy.51.t: "Expansion of Study-in-Japan Placements"
 JAP_diplomacy.51.d: "The Japanese government has proposed expanding scholarship quotas and admission slots to increase opportunities for Taiwanese students to study at Japanese universities. This initiative aims not only to deepen academic and cultural ties, but also to cultivate future talent that can connect our two societies. As exchanges broaden, the foundation for the next generation to carry Japan Taiwan relations forward will become even stronger."
 JAP_diplomacy.51.a: "An investment in the next generation."
 JAP_diplomacy.52.t: "Proposal to Support Trade System Reform"
 JAP_diplomacy.52.d: "The Japanese government has proposed technical and institutional cooperation to support the reform and modernization of China's trade system. By simplifying customs procedures, digitalizing administrative operations, and developing rules aligned with international standards, the aim is to facilitate trade and improve predictability for business activity. If these reforms move forward, the procedural burden of imports and exports will be reduced, lowering friction in economic activity. Accepting this proposal would also increase Japan's influence within China.\n\nShould we accept Japan's support and advance the international harmonization of our trade system?"
 JAP_diplomacy.52.a: "Accept"
 JAP_diplomacy.52.b: "Reject"
 JAP_diplomacy_52_TT: "§YIf the offer is accepted, China will receive a reduced tax burden modifier, and we will gain §Ginfluence§! within China!§!"
 JAP_diplomacy.53.t: "Cooperation Proposal Accepted"
 JAP_diplomacy.53.d: "[FROM.GetName] has accepted Japan's offer of technical and institutional support for reforming and modernizing its trade system. As customs procedures are streamlined and administrative operations are improved, trade facilitation and predictability for business activity will increase, and the environment for Japanese companies to enter the market will improve as well. This agreement will steadily strengthen Japan's influence within China."
 JAP_diplomacy.53.a: "Good."
 JAP_diplomacy.54.t: "Proposal Declined"
 JAP_diplomacy.54.d: "[FROM.GetName] has indicated that it will decline Japan's proposal to provide technical and institutional support for reforming and modernizing its trade system. The other side appears to be prioritizing its policy design priorities and domestic coordination, but this does not mean it is rejecting the need for reform itself. Japan should remain mindful of the other country's circumstances while leaving room for dialogue and cooperation."
 JAP_diplomacy.54.a: "Understood."
 JAP_diplomacy.55.t: "Expansion of Japan China Investment Cooperation"
 JAP_diplomacy.55.d: "The Japanese government has indicated its intention to move forward with institutional coordination and a framework for cooperation to promote mutual investment and market entry between Japanese and Chinese companies. If cross-entry accelerates, production networks can be optimized and supply chains made more efficient, which is expected to raise overall industrial productivity. Deepening economic interdependence also carries risks, but it can simultaneously serve as a practical stabilizing factor by reducing friction."
 JAP_diplomacy.55.a: "Let's open the market and improve efficiency."
 JAP_diplomacy_55_TT: "§YChina will also gain the same modifiers!§!"
 JAP_diplomacy.56.a: "Let's deepen cultural solidarity."
 JAP_diplomacy.57.t: "Japan China Joint Buddhist Temple Preservation Project"
 JAP_diplomacy.57.d: "The Japanese government has proposed implementing a joint Japan China project to preserve Buddhist temples as shared cultural heritage by carrying out conservation and restoration efforts together. By sharing restoration techniques and survey methods and establishing a cooperative framework for cultural property protection, the aim is to reaffirm the value of temples and related cultural assets and ensure their long-term preservation. If the results of these preservation efforts become visible, the appeal of cultural tourism will increase, and positive spillover effects on local economies can also be expected. This cooperation may also serve as an opportunity to reaffirm the historical ties between our two countries."
 JAP_diplomacy.57.a: "Let's protect our heritage and promote tourism."
 JAP_diplomacy.58.t: "Tokyo Seoul Accelerator"
 JAP_diplomacy.58.d: "The Japanese government has presented a proposal to establish a joint accelerator program in Tokyo and Seoul, institutionalizing startup support in both countries. Through assistance with fundraising, mentoring, cooperation with companies and universities, and talent exchanges between the two cities, the aim is to raise startup success rates and strengthen technological cooperation. If this framework works as intended, innovation between the cities will accelerate, and Japan Korea economic cooperation will be strengthened in a more practical, results-oriented way."
 JAP_diplomacy.58.a: "Let's accelerate the startup momentum."
 JAP_diplomacy_58_TT: "§YSouth Korea will also gain the same modifiers!§!"
 JAP_diplomacy.59.t: "Expansion of Japan Korea Local-Level Cooperation"
 JAP_diplomacy.59.a: "Let's generate growth from the regions."
 JAP_diplomacy.60.t: "Proposal for Japan Korea Cultural Exchange"
 JAP_diplomacy.60.d: "The Japanese government has presented a proposal to systematically expand cultural exchange between Japan and South Korea. Through media, arts, sports, tourism, and educational exchanges, the aim is to deepen mutual understanding between our peoples and reduce social distance. If exchanges broaden, they will also influence public sentiment and external attitudes, and both countries will gain an environment in which they can speak more effectively within each other's domestic sphere.\n\nShould we accept this proposal and promote cultural exchange?"
 JAP_diplomacy.60.a: "Accept"
 JAP_diplomacy.60.b: "Reject"
 JAP_diplomacy_60_TT: "§YIf the offer is accepted, we will gain §Ginfluence§! in Korea, but Korea will also gain §Rinfluence§! in Japan.§!"
 JAP_diplomacy_60_TT2: "§YCultural exchange would allow us to gain influence in Japan, but Japan's influence at home would also increase.§!"
 JAP_diplomacy.61.t: "Proposal Accepted"
 JAP_diplomacy.61.d: "[FROM.GetName] has agreed to Japan's proposal to expand cultural exchange. As exchanges in media, arts, sports, tourism, and education broaden, mutual understanding will deepen and shifts in public sentiment in both countries may follow. Through this agreement, Japan will gain a stronger voice within Korea, while Korea will also strengthen its influence within Japan."
 JAP_diplomacy.61.a: "Good."
 JAP_diplomacy.62.t: "Proposal Declined"
 JAP_diplomacy.62.d: "[FROM.GetName] has indicated that it will decline Japan's proposal to expand cultural exchange. The other country appears to be prioritizing consideration of public opinion and domestic circumstances, but this does not mean it is rejecting cultural exchange itself. Japan should keep channels for dialogue open while leaving room to advance mutual understanding in other ways."
 JAP_diplomacy.62.a: "Understood."
 JAP_diplomacy.63.t: "Japan Korea Aging Society Task Force"
 JAP_diplomacy.63.d: "The Japanese government has proposed establishing a joint task force of experts and relevant institutions from Japan and South Korea to address the shared challenge of an aging society, with monthly consultations to formulate cooperative policies. By sharing expertise on strengthening eldercare and healthcare systems, employment support, and the design of community welfare, the aim is to increase both the speed and effectiveness of policy responses. If this framework takes root, it will advance the strengthening of social welfare measures and contribute to long-term social stability."
 JAP_diplomacy.63.a: "Let's move forward with preparations together."
 JAP_diplomacy_63_TT: "§YSouth Korea will gain a population growth modifier.§!"
 JAP_diplomacy.64.t: "Cold-Region Development Cooperation"
 JAP_diplomacy.64.d: "The Japanese government has proposed the \"Far East Initiative\" to support cold-region development in the Russian Far East by drawing on Hokkaido's experience in revitalizing cold-climate regions, through infrastructure investment and the introduction of foreign capital. By advancing foundational improvements in transport, logistics, and energy, the aim is to stimulate regional economic activity and increase the effectiveness of development. The initiative targets infrastructure development in Sakha and Kamchatka."
 JAP_diplomacy.64.a: "Let's strengthen the Far East's foundations."
 JAP_diplomacy.65.t: "Sakhalin II"
 JAP_diplomacy.65.d: "The Japanese government has indicated its intention to strengthen foreign investment in the Sakhalin II energy project while cooperating with Russia, in order to secure stable access to fossil fuels. If capital investment and the stabilization of operations move forward, the continuity of development will improve and an expansion of production capacity can be expected. Sakhalin will remain an important supply hub and is likely to bring positive effects to the regional economy as well."
 JAP_diplomacy.65.a: "Let's expand production capacity."
 JAP_diplomacy.66.t: "Launch of Eurasian Transport Network Cooperation"
 JAP_diplomacy.66.d: "The Japanese government has indicated its intention to advance Japan Russia cooperation to develop an overland logistics corridor linking Japan and Europe via Russia. By leveraging rail networks and major highways, the aim is to shorten transport times and establish stable access to European markets, while also accelerating infrastructure upgrades along the corridor. If freight begins to flow in practice, Russia will further enhance its importance as a Eurasian hub, and economic connectivity will deepen as well."
 JAP_diplomacy.66.a: "Let's accelerate the corridor's development."
 JAP_diplomacy_66_TT: "§YRussia will gain an infrastructure construction speed modifier!§!"
 JAP_diplomacy.67.t: "Launch of Japan Russia IT Infrastructure Cooperation"
 JAP_diplomacy.67.d: "The Japanese government has presented the \"Russia Digital Corridor\" initiative, working with Japanese IT companies to develop infrastructure in Russia such as data centers and fiber-optic networks. The aim is to upgrade domestic communications infrastructure while strengthening Russia's role as a hub in a digital trade network linking Europe, Central Asia, and Russia. If this cooperation gets on track, the stability of information flows and network capacity will improve, and the digitalization of economic activity will accelerate as well."
 JAP_diplomacy.67.a: "Let's expand our connectivity infrastructure."
 JAP_diplomacy_67_TT: "§YRussia will gain a network infrastructure construction speed modifier!§!"
 JAP_historical.20110311.t: "The Great East Japan Earthquake"
 JAP_historical.20110311.d: "At 2:46 PM on March 11, 2011, a massive magnitude 9.0 earthquake struck off the Pacific coast of the Tohoku region. The strongest tremor ever recorded in Japan violently shook wide areas from Tohoku to Kanto, and the towering tsunami that followed engulfed coastal towns and villages, leaving catastrophic devastation in its wake. Ports and fishing communities were obliterated within moments, while roads, railways, and airports were severed, throwing urban functions into chaos.\n\nHundreds of thousands of people have lost their homes and sought refuge in emergency shelters. The economic toll is staggering, as agriculture, fisheries, and manufacturing,the backbone of the regional economy,have suffered crippling damage. The simultaneous tasks of restoring infrastructure, aiding the displaced, and rebuilding industries and cities will push the government's administrative capacity to its absolute limits.\n\nAmidst this unprecedented tragedy, the Japanese people have shown resilience and solidarity. Yet how swiftly and effectively the government can respond will determine the stability and future of the nation."
 JAP_historical.20110311.a: "We must commit all efforts to rescue and recovery."
 JAP_great_east_japan_earthquake_tree_tt: "§YThe national focus tree for reconstruction after the Great East Japan Earthquake has been unlocked!§!"
 JAP_news.02.t: "Unprecedented Earthquake Strikes Japan"
 JAP_news.02.d: "On March 11, 2011, Japan was struck by a massive earthquake. Later known as the Great East Japan Earthquake, this magnitude 9.0 quake off the Pacific coast of Tohoku caused catastrophic destruction across a wide area, leaving tens of thousands dead or missing and inflicting incalculable economic losses.\n\nThe ensuing tsunami obliterated coastal towns, ports, and transportation networks within moments, forcing hundreds of thousands into evacuation shelters. Japanese society now faces its greatest crisis since the postwar era.\n\nThe Great East Japan Earthquake has become a defining moment, as the world watches how one of the globe's leading economies will achieve its recovery."
 JAP_news.02.a: "A terrifying tragedy..."
 Japan.201103111.t: "Declaration of Recovery Completion"
 Japan.201103111.d: "Years have passed since the great disaster, the rubble has been cleared, and the cities are once again filled with the vitality of their people. The lives of the victims have gradually stabilized, and industries and infrastructure have been restored. Today, the government officially declares 'Recovery Achieved,' closing the chapter on a long era of hardship.\n\nThough this tragedy left deep scars, it also fostered resilience and pride, laying the foundation for a brighter future."
 Japan.201103111.a: "We have overcome adversity!"
 Japan.201103112.t: "Progress in Infrastructure Restoration"
 Japan.201103112.d: "Some of the infrastructure destroyed by the disaster has now been restored. Transportation and logistics are gradually resuming, bringing small but meaningful changes to daily life. While full recovery remains distant, this is a clear step forward."
 Japan.201103112.a: "A step forward."
 Japan.201103113.t: "Full Restoration of Infrastructure"
 Japan.201103113.d: "The infrastructure in Tohoku, devastated by the earthquake, has at last reached its targeted level of restoration. Transportation networks and logistical functions are now fully operational again, giving renewed momentum to local society and the economy. The reconstruction effort has reached a major milestone."
 Japan.201103113.a: "A major milestone."
 Japan.201103114.t: "Progress in Infrastructure Restoration"
 Japan.201103114.d: "Some of the infrastructure destroyed by the disaster has now been restored. Transportation and logistics are gradually resuming, bringing small but meaningful changes to daily life. While full recovery remains distant, this is a clear step forward."
 Japan.201103114.a: "A step forward."
 Japan.201103115.t: "Full Restoration of Infrastructure"
 Japan.201103115.d: "The infrastructure in Kanto, devastated by the earthquake, has at last reached its targeted level of restoration. Transportation networks and logistical functions are now fully operational again, giving renewed momentum to local society and the economy. The reconstruction effort has reached a major milestone."
 Japan.201103115.a: "A major milestone."
 Japan.201103116.t: "Telecommunications Restored"
 Japan.201103116.d: "The telecommunications network in the disaster-stricken region has finally been partially restored. Communication for daily life and business has improved, bringing renewed hope to the local economy and society."
 Japan.201103116.a: "Press on with further restoration"
 Japan.201103117.t: "Telecommunications Fully Restored"
 Japan.201103117.d: "The telecommunications infrastructure in the Tohoku, devastated by the earthquake, has at last reached its targeted level of restoration. With the foundation for daily life and industry secured, the path of recovery has reached a major milestone."
 Japan.201103117.a: "Mark this as a step forward in recovery"
 Japan.201103118.t: "Telecommunications Fully Restored"
 Japan.201103118.d: "The telecommunications infrastructure in the Kanto, devastated by the earthquake, has at last reached its targeted level of restoration. With the foundation for daily life and industry secured, the path of recovery has reached a major milestone."
 Japan.201103118.a: "Mark this as a step forward in recovery"
 Japan.201103119.t: "Local Industry Resumes"
 Japan.201103119.d: "Factories and businesses in the disaster-affected region have resumed operations. Though full recovery is still far off, the return of jobs and economic activity offers a tangible sense of progress."
 Japan.201103119.a: "Push forward with further industrial recovery"
 Japan.2011031110.t: "Industrial Base Fully Restored"
 Japan.2011031110.d: "The industrial base in Tohoku, devastated by the earthquake, has at last reached its targeted level of recovery. With jobs and production capacity restored, the path of reconstruction has reached a major milestone."
 Japan.2011031110.a: "Advance to the next stage of recovery"
 Japan.2011031111.t: "Local Industry Resumes"
 Japan.2011031111.d: "Factories and businesses in the disaster-affected region have resumed operations. Though full recovery is still far off, the return of jobs and economic activity offers a tangible sense of progress."
 Japan.2011031111.a: "Push forward with further industrial recovery"
 Japan.2011031112.t: "Industrial Base Fully Restored"
 Japan.2011031112.d: "The industrial base in Kanto, devastated by the earthquake, has at last reached its targeted level of recovery. With jobs and production capacity restored, the path of reconstruction has reached a major milestone."
 Japan.2011031112.a: "Advance to the next stage of recovery"
 Japan.2011031150.t: "Fukushima Daiichi Nuclear Power Plant Accident"
 Japan.2011031150.d: "Japan has been struck by an unprecedented earthquake and tsunami, and while the nation is scrambling to respond, yet another worst-case report has come in. A tsunami has hit the Fukushima Daiichi Nuclear Power Plant in Fukushima, causing failures of the emergency generators, batteries, and fuel tanks and plunging the site into a total loss of power.\nOn top of that, large amounts of hydrogen have been generated and accumulated inside the reactor buildings, leading to hydrogen explosions at Units 1, 3, and 4. With radioactive leaks from damaged points now feared, the public has fallen into panic."
 Japan.2011031150.a: "We must act immediately!"
 JAP_news.03.t: "Fukushima Daiichi Nuclear Power Plant Accident"
 JAP_news.03.d: "A serious accident has been reported at Japan's Fukushima Daiichi Nuclear Power Plant following the earthquake and tsunami. Although the reactors shut down after the quake, the tsunami reportedly disabled emergency generators and other critical equipment, leading to a total loss of power. With cooling no longer sustainable, core meltdowns occurred in multiple units.\nHydrogen generation and buildup also triggered explosions in the reactor buildings, and it is considered highly likely that radioactive materials were released into the environment through damaged points. The Japanese government is scrambling to respond."
 JAP_news.03.a: "What a situation..."
 Japan.2011031151.t: "Japan's Nuclear Policy at a Crossroads"
 Japan.2011031151.d: "A month has passed since the nuclear accident, and the Japanese government is now being forced to make a decision. The Fukushima Daiichi accident has shaken the public's sense of nuclear safety to its core. Public opinion is divided, the business community fears the impact on the power supply, and citizens are anxious about the possibility of radioactive leakage.\n\nJapan must now make clear whether it will continue to rely on nuclear power,or choose a different path."
 Japan.2011031151.a: "Ban it,shut it down!"
 Japan.2011031151.b: "We must introduce strict inspections."
 Japan.2011031151.c: "Carry on as before!"
 Japan_Demographic.003.t: "Survey Report on the Low Birthrate Issue: Progression of the Declining Birthrate"
 Japan_Demographic.003.d: "The government has been advancing measures aimed at supporting the birthrate, but at present they do not appear to have produced sufficient results. Factors such as the difficulty of balancing childrearing and employment, as well as anxiety about the future, are overlapping, and improvement in birth trends remains sluggish.\n\nAt this rate, distortions in the population structure will deepen further, leaving long-term burdens in many areas, including securing the labor force and maintaining social security. Low birthrate countermeasures are being pressed to be reviewed into a more effective form."
 Japan_Demographic.003.a: "The situation is more serious than expected..."
 Japan_Demographic.004.t: "Survey Report on the Low Birthrate Issue: Stagnation of Low Birthrate Countermeasures"
 Japan_Demographic.004.d: "Although the government has been advancing childrearing support and improvements to the working environment, no clear improvement in birth trends has yet been seen. In some areas, there has been progress, such as expanded use of systems and improvements in support structures, but issues such as unstable employment and household financial burdens remain, and overall the situation continues to be flat.\n\nIt has not been enough to stop the progression of the declining birthrate, but the situation is not worsening further either. Going forward, continued implementation of existing measures and verification of their effectiveness will be required."
 Japan_Demographic.004.a: "Let us continue the countermeasures."
 Japan_Demographic.005.t: "Survey Report on the Low Birthrate Issue: Progress in Low Birthrate Countermeasures"
 Japan_Demographic.005.d: "The government's childrearing support, improvements to the working environment, and measures to reduce household burdens have gradually begun to show results. Birth trends themselves have not recovered dramatically, but with expanded use of support by childrearing households and improvements in the environment for balancing work and family, the progression of the declining birthrate is beginning to be curbed to some extent.\n\nIssues such as anxiety about the future still remain, but the situation is improving slightly. Going forward, the continuation of these measures and improving the effectiveness of the systems will remain important."
 Japan_Demographic.005.a: "Let's make sure these signs of improvement become real."
 Japan_Demographic.006.t: "Survey Report on the Low Birthrate Issue: Reversal of the Low Birthrate Trend"
 Japan_Demographic.006.d: "The childrearing support, improvements to the working environment, and measures to reduce household financial burdens that have been continuously implemented have combined, and a clear trend of improvement has now become visible in birth trends.\nAs this was confirmed over multiple years, rather than being a temporary fluctuation, it has shown that the measures accumulated so far are steadily producing results.\n\nThe sense of crisis surrounding the low birthrate has greatly receded, and the long-running worsening trend is also being brought under control. It can be said that the government's measures have achieved clear results on the low birthrate issue!"
 Japan_Demographic.006.a: "We have finally overcome the long stagnation!"
 JAP_territorial.01.t: "Initiating Northern Territories Negotiations"
 JAP_territorial.01.d: "The territorial dispute over the Northern Territories has long been a pending issue between [JAP.GetName] and [SOV.GetName] since the end of the war. Now, our nation is at the point where we will formally request negotiations with [SOV.GetName] to resolve this matter peacefully. This is not merely a diplomatic formality, but a crucial step in asserting our sovereignty and historical legitimacy."
 JAP_territorial.01.oA: "Let's begin!"
 JAP_territorial.02.t: "[JAP.GetName] Requests Northern Territories Negotiations"
 JAP_territorial.02.d: "The [JAP.GetAdjective] government has sent a formal request to open negotiations over the Northern Territories. This issue has been shelved for decades, and the decision will affect both our international standing and domestic politics. Will compromise mean a loss of national interest, or a gain in international trust? The time for a decision has come."
 JAP_territorial.02.oA: "Cede the territory to [JAP.GetName]"
 JAP_territorial.02.oB: "Refuse the request. There is no room for negotiation"
 JAP_territorial.03.t: "Agreement on the Return of the Northern Territories"
 JAP_territorial.03.d: "At long last, the longstanding Northern Territories issue has been resolved. After negotiations with [SOV.GetName], an agreement has been reached for the return of the disputed territories. This marks a diplomatic victory and a historic achievement in postwar [JAP.GetAdjective] history."
 JAP_territorial.03.oA: "A historic agreement!"
 JAP_territorial.04.t: "Northern Territories Negotiations Breakdown"
 JAP_territorial.04.d: "The [SOV.GetAdjective] government has officially rejected our proposal for negotiations regarding the return of the Northern Territories. Despite our diplomatic efforts, a resolution has not been achieved. We must now focus on building greater trust and expanding our influence to prepare for renewed negotiations in the future."
 JAP_territorial.04.oA: "It was too early this time..."
 JAP_territorial.05.t: "Initiate Senkaku Negotiations with [CHI.GetName]"
 JAP_territorial.05.d: "[JAP.GetName] currently exercises effective control over the Senkaku Islands, but [CHI.GetName] continues to assert its claim to sovereignty. In light of past diplomatic efforts, the time has come for our nation to formally engage in negotiations with the [CHI.GetAdjective] government in pursuit of a peaceful resolution."
 JAP_territorial.05.oA: "Let's begin!"
 JAP_territorial.06.t: "[JAP.GetName] Proposes Territorial Negotiations"
 JAP_territorial.06.d: "The [JAP.GetAdjective] government has requested that we withdraw our territorial claim over the Senkaku Islands. They are advocating for a peaceful resolution and regional stability, and are moving forward with negotiations backed by diplomatic pressure and international support. Accepting this proposal is sure to spark both support and opposition, both domestically and abroad."
 JAP_territorial.06.oA: "Withdraw the claim and prioritize regional stability."
 JAP_territorial.06.oB: "Maintain the claim and uphold national sovereignty."
 JAP_territorial.07.t: "[CHI.GetName] Withdraws Senkaku Claim!"
 JAP_territorial.07.d: "[CHI.GetName] has officially withdrawn its territorial claim over the Senkaku Islands. The long-standing tensions in the East China Sea have been significantly eased, and this is being hailed both domestically and internationally as a major diplomatic victory. It marks an important first step toward regional stability and trust-building."
 JAP_territorial.07.oA: "A historic breakthrough."
 JAP_territorial.08.t: "[CHI.GetName] Maintains Its Claim"
 JAP_territorial.08.d: "[CHI.GetName] has declared that it will maintain its territorial claim over the Senkaku Islands. The negotiations ended without success, highlighting the need for further relationship-building and strengthening of international influence. While dialogue remains possible, the situation continues to be difficult."
 JAP_territorial.08.oA: "Perhaps it was too soon..."
 JAP_territorial.09.t: "Initiate Senkaku Negotiations with [TAI.GetName]"
 JAP_territorial.09.d: "[TAI.GetName] has long claimed sovereignty over the Senkaku Islands based on historical and geographical grounds, while [JAP.GetName] maintains its stance on the legitimacy of its effective control. In an effort to peacefully resolve this longstanding issue, we will make a formal diplomatic proposal to [TAI.GetName]."
 JAP_territorial.09.oA: "Let's begin!"
 JAP_territorial.10.t: "[JAP.GetName] Proposes Territorial Negotiations"
 JAP_territorial.10.d: "The [JAP.GetAdjective] government has requested that we abandon our claim to the Senkaku Islands. Considering the complexity of cross-strait relations and the broader international context, careful deliberation will be required in deciding whether to accept this request."
 JAP_territorial.10.oA: "Withdraw the claim for regional stability."
 JAP_territorial.10.oB: "We must continue to assert our sovereignty."
 JAP_territorial.11.t: "[TAI.GetName] Withdraws Senkaku Claim!"
 JAP_territorial.11.d: "The [TAI.GetAdjective] authorities have officially withdrawn their territorial claim to the Senkaku Islands. With one of the East China Sea's long-standing issues resolved, [JAP.GetName]-[TAI.GetName] relations are moving into a new era of stability, raising hopes for deeper cooperation in the future."
 JAP_territorial.11.oA: "A historic agreement."
 JAP_territorial.12.t: "[TAI.GetName] Refuses to Withdraw Claim"
 JAP_territorial.12.d: "[TAI.GetName] has declared that it will maintain its territorial claim to the Senkaku Islands. The negotiations ended in failure, making it clear that resolving the issue will require greater diplomatic influence and stronger mutual trust in the future."
 JAP_territorial.12.oA: "Perhaps it was still too soon..."
 JAP_territorial.13.t: "Initiate Takeshima Negotiations with [KOR.GetName]"
 JAP_territorial.13.d: "To bring an end to the long-standing territorial dispute over Takeshima between [JAP.GetName] and [KOR.GetName], our government has proposed peaceful negotiations with [KOR.GetName]. Rather than imposing our claim unilaterally, this move is aimed at building a future-oriented relationship between both nations."
 JAP_territorial.13.oA: "Let's begin!"
 JAP_territorial.14.t: "[JAP.GetName] Proposes Negotiations on Dokdo"
 JAP_territorial.14.d: "The [JAP.GetAdjective] government has approached us for negotiations over sovereignty of Dokdo. While this is an extremely difficult decision in light of domestic public opinion and historical context, it is also a crucial diplomatic judgment that could shape the future of [JAP.GetName]-[KOR.GetName] relations."
 JAP_territorial.14.oA: "Prioritize improving relations with [JAP.GetName] and agree to the transfer."
 JAP_territorial.14.oB: "We cannot give up our national territory."
 JAP_territorial.15.t: "[KOR.GetName] Agrees to Transfer Takeshima!"
 JAP_territorial.15.d: "As part of efforts to improve [JAP.GetName]-[KOR.GetName] relations, the [KOR.GetAdjective] government has agreed to return Takeshima. This marks the end of a decades-long confrontation and ushers in a new phase of trust between the two countries. It is a moment where peaceful diplomatic efforts have borne fruit."
 JAP_territorial.15.oA: "A historic achievement."
 JAP_territorial.16.t: "[KOR.GetName] Refuses Takeshima Negotiations"
 JAP_territorial.16.d: "The [KOR.GetAdjective] government has rejected our request to return Takeshima. The resolution of the territorial issue remains difficult, and without stronger diplomatic influence and mutual trust, it will be hard to bring this matter to a close."
 JAP_territorial.16.oA: "For now, we must continue the dialogue."
 JAP_renegotiation_territory: "Renegotiation will be possible in one year!"
 JAP_historical.20010426.t: "Yoshirō Mori Resigns, Junichiro Koizumi Becomes Prime Minister"
 JAP_historical.20010426.oA: "Reform, now!"
 JAP_historical.20060926.t: "Continuation or Succession?"
 JAP_historical.20060926.oA: "Junichiro Koizumi"
 JAP_historical.20060926.oB: "Shinzo Abe"
 JAP_historical.20070926.t: "Continuity or Renewal?"
 JAP_historical.20070926.oA: "Shinzo Abe"
 JAP_historical.20070926.oB: "Yasuo Fukuda"
 JAP_historical.20080924.t: "A Quiet Transition or a Bold Shift?"
 JAP_historical.20080924.oA: "Yasuo Fukuda"
 JAP_historical.20080924.oB: "Tarō Asō"
 Japan.01.t: "Approach from Traditionalist Forces"
 Japan.01.d: "As controversy over Prime Minister Mori's remarks continues, various groups and commentators arguing that the Imperial Household should be re-evaluated as the center of Japan's state order have intensified their activities. They have approached the government, suggesting that if it more clearly demonstrates a willingness to defend tradition and national character, they could support it through shaping public opinion and grassroots activism.\n\nHowever, closer ties with such forces risk blurring the line between establishment conservatism and radical monarchism, potentially inviting fresh criticism of the administration. Should we make use of this offer, or keep our distance?"
 Japan.01.a: "Keep Our Distance."
 Japan.01.b: "Use Them as Political Leverage."
 mdmosjap_japan.121006001.t: "2000 Tottori Earthquake"
 mdmosjap_japan.121006001.d: "Japan consists on the volcanic archipelagos which is floating on the Ring of Fire. It means that Japan and their people must experience massive earthquakes constantly. It has not changed until the previous millennium, and will not, the next millennium too.\n\n1:30 PM, October 6, 2000 - A magnitude 7.3 and scale 6+ earthquake hit on Western Shimane. It caused a lot of damage into many roads and houses, and vibration to distant regions such as Osaka and Fukuoka. Especially, Kobe was experienced a strong earthquake for the first time after the 1995 Great Hanshin-Awaji Earthquake."
 mdmosjap_japan.disaster_help: "Help them now!"
 mdmosjap_japan.disaster_leave: "Leave them. They will recover by themselves."
 MDMOSJAP_add_debt_disaster1_TT: "§YAnother §!§R$1 billion debts§!§Y will be issued for the disaster restoration.§!\n"
 MDMOSJAP_add_debt_disaster4_TT: "§YAnother §!§R$4 billion debts§!§Y will be issued for the disaster restoration.§!\n"
 mdmosjap_japan.130210001.t: "Ehime-Maru Disaster"
 mdmosjap_japan.130210001.d: "On February 9, 2001, a fishery-high-school-own training ship Ehime-Maru was crushed by the [USA.GetName] Submarine Greeneville. The Ehime-Maru where 35 Japanese students and teachers had been boarding sunk and 9 were killed.\n\nDuring the both governments' officials are collecting for every information of this tragic accident, the Prime Minister [Root.GetLeader] is playing golf for the vacation.\n\nOf course, they should give up the vacation then go back to Tokyo now, right?"
 mdmosjap_japan.130210001.oA: "Go back to Tokyo now!"
 mdmosjap_japan.130210001.oB: "Wait! Just one more shot..."
 JAP_koizumi_appear_TT: "Mori may enjoy his round of golf, but his political influence will likely diminish significantly. The party may soon begin seeking §Ya new leader.§!"
 mdmosjap_japan.130324001.t: "2001 Geiyo Earthquake"
 mdmosjap_japan.130324001.d: "3:27 PM, March 24, 2001 - A magnitude 6.7 and scale 6- earthquake hit on Western Hiroshima. 2 were killed and 288 were injured. Kure, the city nearest to the seismic centre, has been suffered the greatest damage. On the other hand, other many local governments lessened the damage, because their cities had been taken countermeasures after the 1995 Great Hanshin-Awaji Earthquake and last year's Shimane Earthquake. The main damage was breakage of the water pipes and collapse of the surface of mountains."
 mdmosjap_japan.9130901001.t: "Kabukicho Building Fire"
 mdmosjap_japan.9130901001.d: "Before dawn on September 1st of 2001, a building \"Myojo 56 Building\" which was placed in Kabukicho, Shinjuku Ward, Tokyo was blazed, and the fire killed 44 people visiting the mahjong parlor and strip club, for the carbon monoxide poisoning. According to the fire department's report, the fire was small at first but blasted by the backdraft phenomenon caused by a staff who found the fire and opened a door. The report added that fire alarms were covered by the ceiling or cut off for the malfunction so the early extinguishing was missed. There is another report that staffs of the building did not guide the evacuation of the visitors. Meanwhile, the Metropolitan Police co-investigated with the fire department found a gas pipe broken unnaturally. Although the cause of the fire is still uncleared either accidental or arson, it is clear that the lacked awareness on fire prevention made it worse."
 mdmosjap_japan.9130901001.oA: "We hope we'll never see another building fire worse than this."
 mdmosjap_japan.131201001.t: "The Birth of Her Highness The Princess Aiko"
 mdmosjap_japan.131201001.d: "On December 1 2001, the daughter, of the Crown Prince Naruhito and His Consort Masako, was born at the hospital in the Imperial Palace. She, the first-born Imperial Princess in the third millennium, was named Aiko, from Mencius, the classic Chinese Confucianism book. Also, Her Highness the Imperial Princess Aiko is the grand-daughter of His Majesty the Emperor Akihito. This is the happiest event after a long time from the birth of His Highness the Prince Fumihito Akishino-no-Miya in 1965, so nearly everyone in nationwide have celebrated. And then, 20,000 people including politicians and celebrities have shouted Banzai at the Imperial Palace. On the other hand, some people apprehended that this situation would die out the present Imperial family line. The Prince-Consort Masako has been too advanced the age to have a baby so it was dangerous to have a second child. And if the Princess Aiko grewed up, she might become the Matrilineal Empress \"as the last imperial family\", because she has a large difference of the age comparetively between two Princes - Naruhito and Fumihito. But it would break the Imperial Household Law: The Imperial Throne is allowed only for the patrilineal line. Eventually, everyone have started to argue about the amendment of the Imperial Household Law, to enable the Matrilineal Empress."
 mdmosjap_japan.131201001.oA: "Banzai!"
 mdmosjap_japan.150526001.t: "2003 Offshore Miyagi Earthquake"
 mdmosjap_japan.150526001.d: "6:24 PM, May 26, 2003 - A magnitude 7.1 and scale 6- earthquake occured in off the Miyagi-Iwate prefectural border and hit on. Large areas of Tohoku region have been suffered much damage like a destroy on trestles of the Sinkansen and landslides on mountains, but no one was killed. The tsunami was so gently like a ripple in this time. Although we have these reports, a lot of people have felt the quaking, from Hokkaido to Kanto."
 mdmosjap_japan.150726001.t: "2003 Second Miyagi Consecutive Earthquakes"
 mdmosjap_japan.150726001.d: "On July 26, 2003 - As many as FOUR TIMES of earthquakes hit repeatedly on the Northern Miyagi, until evening from 0 AM - in a day! The strongest one have recorded magnitude 6.4 and scale 6+ in 7:13 AM, and even the weakest was magnitude 5.1 and scale 5-. These earthquakes have caused damage not only hundreds of houses but also the JASDF's Matsushima Air Base. It was very unpleasant day, but luckily, no one was killed."
 mdmosjap_japan.150926001.t: "2003 Hokkaidō earthquake"
 mdmosjap_japan.150926001.d: "4:50 AM, September 26, 2003 - A magnitude 8.0 and scale 6- earthquake occured in off the Southern Hokkaido. Only a few towns have taken the quake strongly, but soonly they have been realised the true horrible aftermath. The earthquake caused a soil lequidisation in the coastal filled-up zone and fire on oil storage tanks. Besides that, a huge tsunami struck the east coast of Eastern Japan, and two was killed."
 JAP_historical.20030926.t: "DPJ-LP Merger: The Liberal Party Joins the Democratic Party"
 JAP_historical.20030926.d: "Moves to consolidate the non-LDP forces are accelerating. After repeated talks, the Democratic Party and the Liberal Party have agreed to unify the non-LDP camp's main political vehicle into a single organization.\n\nThe Liberal Party will dissolve and merge into the Democratic Party as an absorbed merger. This will increase the non-LDP camp's presence in the Diet, but it could also create new flashpoints as the parties jockey over policy direction and leadership."
 JAP_historical.20030926.a: "The non-LDP realignment is now underway."
 mdmosjap_japan.161023001.t: "2004 Niigata Chūetsu Earthquake"
 mdmosjap_japan.161023001.d: "5:56 PM, October 23, 2004 - A magnitude 6.8 and scale 7 earthquake occured in Niigata. It was first time to record JMA Scale 7 since the revision by the 1995's Hanshin Earthquake. In Yamakoshi, all of roads had been destroyed by the landslides and every residents were locked in the village. A train had being run on the Joetsu Shinkansen Line got derailed by the shock but no one killed. However, as a result of the quake, 68 were killed."
 mdmosjap_japan.170320001.t: "2005 Fukuoka Earthquake"
 mdmosjap_japan.170320001.d: "10:53 AM, March 20, 2005 - A magnitude 7.0 and scale 6- earthquake occured in off Fukuoka City. There is less records of earthquakes in Northern Kyushu and this one was also largest one since 1922. In Genkai Island of Fukuoka City, about 700 peoples have evacuated and ten decided to remain for disaster communication and patrol. In Central of Fukuoka, most of windows are broken and these fragments fell into the pavement and injured two pedestrians. The earthquake shook not only Tsushima but also Korea and China. One people was killed by the quake."
 mdmosjap_japan.170425001.t: "Derailment Accident on the Fukuchiyama Line"
 mdmosjap_japan.170425001.d: "At 9:18 AM on April 25, 2005, a rapid-service train on JR West's Fukuchiyama Line (also known as the JR Takarazuka Line) derailed at a sharp curve in Amagasaki City, Hyogo Prefecture, and crashed into the first floor of a nearby apartment building.\nThe train had seven cars, though initial reports mistakenly claimed it had only six, as the lead car had become completely embedded in the building. Investigation revealed that the train had entered the curve at approximately 116 km/h (72 mph), despite the section's speed limit being 70 km/h (43 mph). The excessive speed likely caused the derailment due to centrifugal force.\nThe driver was killed in the accident, but testimony from the conductor in the rear car suggested that the crew may have been attempting to make up for a delay of about 90 seconds. It was later reported that strict internal disciplinary measures existed within the company for even minor operational errors. These measures included re-education sessions, copying company rules by hand, and other corrective practices that had origins dating back to the privatization of the Japanese National Railways (JNR) during the Nakasone administration.\nFortunately, a limited express train approaching from the opposite direction was able to make an emergency stop due to the blocked track, avoiding a secondary collision. However, as the accident occurred during the morning rush hour, the train was crowded. In total, 107 people were killed and 562 were injured, making this the deadliest railway accident in postwar Japanese history.Some medical specialists noted that several passengers may not have died immediately in the crash but later due to crush syndrome resulting from prolonged compression."
 mdmosjap_japan.180906001.t: "The Birth of His Highness The Prince Hisahito"
 mdmosjap_japan.180906001.d: "On September 6th 2006, the son, of the Prince Fumihito and His Consort Kiko, was born at the private hospital at Minami Azabu. He, the first-born Imperial Prince in the third millennium, was named Hisahito which means \"Hisa\" as \"In a relaxed manner\" and \"Hito\" as the Imperial naming tradition from the Heian era. He was delivered by the Caesarian section at the private hospital, not in the Imperial Palace; both were first time of the Imperial history. This was welcomed as the legitimated male of the succession of the Imperial throne as well as the birth of new Imperial family. Following the birth of the boy, the arguement of amendment the Imperial Household Law has been quieting down little by little."
 mdmosjap_japan.180906001.oA: "Banzai!"
 JAP_historical.20070307.t: "The Mysterious Utility Expenses"
 JAP_historical.20070307.d: "In March 2007, during a session of the House of Councillors Budget Committee, it was revealed that the political funding organization of Minister of Agriculture, Forestry and Fisheries Toshikatsu Matsuoka,\"Toshikatsu Matsuoka New Century Political and Economic Forum\",had reported a total of approximately 28.8 million yen in utility expenses over five years from 2001 to 2005 in its political fund reports.\n\nWhat drew particular scrutiny was the fact that the organization's \"main office\" was located in the House of Representatives members' office building, where water, electricity, and climate control are provided free of charge.\nMinister Matsuoka explained that the expenses included costs for a \"water ionizer\" and \"electric heating,\" but failed to provide a clear justification for the reported amounts. In later Diet sessions, he further refused to elaborate, stating, \"Under the system, no further explanation is required.\"\n\nOpposition parties strongly criticized the situation, calling it a potential \"false statement\" and \"abuse of the system,\" while public distrust grew over the government's overall accountability."
 JAP_historical.20070307.oA: "Require the minister to give a full public explanation"
 JAP_historical.20070307.oB: "Defend him until the investigation concludes"
 JAP_historical.20070528.t: "A Burden Too Heavy"
 JAP_historical.20070528.d: "Minister of Agriculture, Forestry and Fisheries, Toshikatsu Matsuoka, was found dead by hanging in his parliamentary residence in Akasaka, Tokyo. Police later confirmed it was a suicide.\n\nFor several months, Minister Matsuoka had faced intense scrutiny in the Diet, media, and public opinion over the high utility expenses reported in his political funding records.\n\nThe news sent shockwaves through the public, raising deeper questions: \"Was he the only one who should have been held accountable?\" and \"Was the government's response truly adequate?\""
 JAP_historical.20070528.oA: "What a tragedy..."
 JAP_historical.20070801.t: "A Chain of Scandals: The Weight of Responsibility"
 JAP_historical.20070801.d: "Following the death of Minister of Agriculture, Forestry and Fisheries Toshikatsu Matsuoka, Norihiko Akagi was appointed as his successor. However, just two months later, Akagi was effectively forced to resign after multiple issues were raised regarding his political funding report, including office expenses, donation handling, and the double-reporting of receipts by his political group \"Tokuyūkai.\"\n\nWith two successive agriculture ministers embroiled in scandals in such a short span, serious questions have arisen regarding the administration's sense of responsibility, transparency, and reliability in cabinet appointments. The post of Minister of Agriculture has come to be viewed as \"cursed,\" and the administration is now under pressure to make decisive moves to restore trust and stabilize its leadership."
 JAP_historical.20070801.oA: "Why does this keep happening… We must regain the people's trust."
 JAP_historical.20070704.t: "A Fatal Gaffe"
 JAP_historical.20070704.d: "During a public lecture, Defense Minister Fumio Kyūma made a controversial remark suggesting that the atomic bombings of Hiroshima and Nagasaki were \"inevitable.\"\nThe comment was widely interpreted as condoning the bombings, sparking intense backlash from atomic bomb survivor groups and the public. Criticism poured in from both ruling and opposition party lawmakers, as well as from local governments. Prime Minister Abe issued a formal reprimand.\nFollowing the remark, sit-in protests were staged by local leaders and civic groups in the affected cities, escalating the controversy into a full-blown political crisis. Kyūma ultimately resigned as Defense Minister, and Yuriko Koike was appointed as his successor.\n\nWhat began as a \"mere gaffe by one minister\" became a serious test of the administration's governing capacity and international credibility."
 JAP_historical.20070704.oA: "As a government, we must express sincere and profound regret."
 mdmosjap_japan.190216001.t: "\"The Lost Pension\""
 mdmosjap_japan.190216001.oA: "What A Disaster!"
 mdmosjap_japan.190325001.t: "2007 Noto Earthquake"
 mdmosjap_japan.190325001.d: "9:41 AM, March 25th, 2007 - A strong M6.9 earthquake hits the Hokuriku region. The JMA scale calculated the quake as 6+ at Wajima City, Ishikawa Prefecture, and it was the first strongest earthquake since the seismic observation started in 1922. The hypocentre is reported to place in the area where any researches did not find a fault as yet. The tremor reached from Hokkaido Prefecture to Kochi Prefecture caused 20cm (7.87 inches) of the tsunami. The earthquake killed 1 people by the collapsed stone lantern, injured 356 people and damaged more than 30,000 buildings and houses."
 mdmosjap_japan.190716001.t: "2007 Chūetsu offshore earthquake"
 mdmosjap_japan.190716001.d: "10:13 AM, July 16th, 2007 - Another M6.8 earthquake hits Niigata Prefecture. The JMA scale calculates 6+ in several towns, but at the Kashiwazaki-Kariwa Nuclear Power Plant, it was unofficially computed as 7. The tsunami also caused by the tremor and was recorded at 1m (3.28 ft) in Kashiwazaki City. The earthquake killed 15 people directly and secondarily, injured 2346 people and damaged more than 34,000 buildings includes 1,331 destroyed houses. The fire breaks out at the previously mentioned Kashiwazaki-Kariwa Nuclear Power Plant, but the extinguish was delayed two hours due to the mistake of communication sharing on the early-stage fire fighting, which caused radioactive leakage though it was within the environmentally ignorable level. This earthquake has occurred only 4 months later from the Noto Earthquake and 3 years later from the destructive 2004 Niigata Chuetsu Earthquake."
 mdmosjap_japan.200614001.t: "2008 Iwate-Miyagi Nairiku Earthquake"
 mdmosjap_japan.200614001.d: "8:43 AM, June 14th, 2008 - A strong M7.2 earthquake occurs beneath Iwate Prefecture, the JMA scale calculates 6+ at Kurihara City, Miyagi Prefecture, and Oshu City, Iwate Prefecture. Notwithstanding it was an inland earthquake, an above 3 scale tremor has been recorded from Hokkaido to the Kanto region. This quake, as a rare result, damaged few buildings but caused numerous landslides, and finally killed 17 people, injured 70 severely and 356 slights, and 6 are still missing. There were reports such as the collapse of a bridge and damage to cultural assets."
 mdmosjap_japan.210811001.t: "2009 Suruga Gulf Earthquake"
 mdmosjap_japan.210811001.d: "5:07 AM, August 11th, 2009 - A large M6.5 earthquake occurs in Suruga Bay, killed a people and injured 319. The quake caused a 40cm (1.31 ft) tsunami. The JMA Scale calculated the earthquake 6- in many areas of Shizuoka Prefecture, 8678 houses and several historic buildings are damaged, but nothing of houses were completely slammed. The Tokai region, where includes Shizuoka Prefecture, is the estimated crucial disastrous area of the future Great Tokai-Tonankai Earthquake and Tsunami, so the residents have prepared by the evacuation drill, stabilising their own furniture and strengthening their houses and buildings. That was the reason for fewer victims and damages compared to its scale of the earthquake. Nevertheless, there were reports of damage in the factories, tea plantations, and Tomei Expressway."
 JAP_historical.20090808.t: "The Founding of Your Party"
 JAP_historical.20090808.d: "As expectations for a change of government rise, dissatisfaction remains strong over the slow decision-making of existing parties and the rigidity of the administration. Amid this atmosphere, Yoshimi Watanabe and others put \"reform\" at the forefront and called for the rallying of a new political force that would not rely on the existing framework.\n\nIn this way, the founding of Your Party was announced. This movement, advocating administrative reform and deregulation, will broaden voters' choices while further accelerating realignment and maneuvering within Japanese politics."
 JAP_historical.20090808.a: "Under the banner of reform, a new force begins to move."
 JAP_historical.20120928.t: "The Founding of the Japan Innovation Party"
 JAP_historical.20120928.d: "As distrust of existing parties and dissatisfaction with political stagnation spread, a reformist movement based on the regional party Osaka Restoration Association, which had been expanding its influence in Osaka, began to move toward national politics. This current, which had increased its presence in regional politics by advocating the review of local administration and governance reform, would be reorganized into a nationwide political force and draw attention as an alternative to the established parties.\n\nThe founding of the Japan Innovation Party would not merely mark the birth of a new party, but also become an event that further accelerates the realignment of the opposition and the formation of a \"third force.\""
 JAP_historical.20120928.a: "A new reformist force enters national politics."
 JAP_historical.20141128.t: "The Dissolution of Your Party"
 JAP_historical.20141128.d: "Your Party, which had established a presence as a \"third force\" opposing the existing major parties, had been finding it increasingly difficult to maintain internal unity as differences of opinion gradually deepened over the direction of party management and responses to elections.\n\nIn the end, the party decided to dissolve, and its affiliated lawmakers each went on to follow separate paths. The dispersal of a force that had gathered under the banner of reform once again highlights the fluid nature of opposition realignment, and will likely have no small impact on the future political map as well."
 JAP_historical.20141128.a: "One pillar of the third force comes to a close."
 JAP_historical.20170925.t: "Opposition Realignment: Split Between Hope and the Constitutional Democrats"
 JAP_historical.20170925.d: "The non-LDP forces are entering a major phase of realignment. The newly rising Party of Hope rapidly attracted attention as a new reform-oriented vehicle, against a backdrop of dissatisfaction with existing parties and a sense of political stagnation. For some parts of the established non-LDP camp, merger and cooperation appeared to be an opportunity to rebuild their strength, but at the same time, conflicts over policy direction and merger conditions gradually began to surface.\nThe forces rooted in the former Democratic Party did not unite as a single bloc: some merged or cooperated with the Party of Hope, while others formed the Constitutional Democratic Party and adopted an independent line. Realignment advanced, but division also became clearer at the same time, and the structure of the non-LDP forces was dramatically redrawn."
 JAP_historical.20170925.a: "The non-LDP camp split between Hope and the Constitutional Democrats."
 JAP_historical.20170925_TT: "§YThe Democratic Party will be replaced by the Constitutional Democratic Party!§!"
 JAP_historical.20180507.t: "Opposition Realignment: Formation of the Democratic Party for the People"
 JAP_historical.20180507.d: "The opposition forces, reorganized through the split between the Party of Hope and the Constitutional Democratic Party, have continued to undergo further reshuffling. A portion of the former Democratic Party camp and a portion of the Party of Hope camp, while carrying points of disagreement, sought to unite as a new centrist force, and the Party of Hope gradually lost weight as an independent framework.\nIn time, the Democratic Party for the People was formed. This also marked the creation of a new political vehicle advocating a centrist line distinct from the Constitutional Democratic Party, and the structure of the opposition would continue to change."
 JAP_historical.20180507.a: "Realignment continues, and the shape of the opposition keeps changing."
 JAP_historical.20180507_TT: "§YThe Party of Hope will be replaced by the Democratic Party for the People!§!"
 JAP_historical.20190401.t: "The Founding of Reiwa Shinsengumi"
 JAP_historical.20190401.d: "Amid simmering distrust of existing parties and dissatisfaction over livelihood insecurity, Tarō Yamamoto and others moved to launch a new political force. Emphasizing grassroots support that does not depend on large-scale organizations, and advocating bringing voices to national politics that the established political order cannot fully pick up, this movement can be positioned as a force that places livelihood-centered appeals at the forefront, including household support, expansion of social security, and a review of burdens including the consumption tax.\n\nThe founding of Reiwa Shinsengumi increases the range of options within the opposition forces while also becoming an event that once again underscores the fluidity of political realignment."
 JAP_historical.20190401.a: "A new grassroots force declares its entry into national politics."
 JAP_historical.20220710.t: "The Rise of Sanseitō"
 JAP_historical.20220710.d: "Amid growing discussion of distrust toward existing parties and a sense of distance from political participation, Sanseitō, a new political force that has expanded its support through grassroots activity and information outreach, has begun to show a presence on the national political stage. Backed by local organization-building and its own distinct appeals, it is increasingly drawing attention as a vehicle for segments that the major parties had not fully been able to absorb.\n\nEmphasizing its distance from the established parties, Sanseitō is expanding as a new party that places importance on the participation and outreach power of its members and supporters. Its stance of bringing issues such as education, food, social systems, and awareness of sovereignty to the forefront is attracting support, while also potentially becoming a factor that shakes up the existing party alignment and issue structure.\n\nThe growth of this new force is a change that existing parties cannot ignore, and it may also influence future opposition and conservative realignments, as well as the setting of political agendas."
 JAP_historical.20220710.a: "A new emerging force is strengthening its presence in politics."
