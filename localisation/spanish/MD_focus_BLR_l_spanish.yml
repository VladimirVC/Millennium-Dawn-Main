l_spanish:
 belorussia_focus: "Árbol de enfoque bielorruso"
 BLR_china_friendship: "Asociación con China"
 BLR_china_friendship_desc: "Tenemos la intención de fortalecer las relaciones amistosas entre nuestros países."
 BLR_Bel_G2: "BELGEE"
 BLR_Bel_G2_desc: "JSC \"BELGEE\" es una empresa conjunta bielorrusa-china dedicada al ensamblaje de automóviles de pasajeros Geely chinos. Es una de las dos empresas de ensamblaje de automóviles de pasajeros en Bielorrusia. Está ubicada en terrenos arrendados a JSC \"Planta Borisovsky Autohydrousilitel\", cerca de Borisov."
 BLR_Chinese_Modernization_Railway: "Modernización de los ferrocarriles"
 BLR_Chinese_Modernization_Railway_desc: "Nuestros colegas chinos han acordado financiar la modernización de la red ferroviaria de nuestro país."
 BLR_Credit_tec2: "Crédito para la mejora de la CHP"
 BLR_Credit_tec2_desc: "Nuestras centrales térmicas en Minsk necesitan ser modernizadas, solicitaremos un préstamo a China para ello."
 BLR_AES: "Central nuclear bielorrusa"
 BLR_AES_desc: "Finalmente construiremos nuestra propia central nuclear."
 BLR_Chinese_kal: "Acuerdo comercial con China"
 BLR_Chinese_kal_desc: "Celebraremos un acuerdo comercial con China que nos permitirá aumentar la capacidad de producción de Grodno Azot."
 BLR_Chinese_zdania: "Construcción de Nuevas Fábricas"
 BLR_Chinese_zdania_desc: "El gobierno chino está aumentando las inversiones en nuestro país y está dispuesto a construir nuevas fábricas."
 BLR_Chinese_konfuci: "Institutos Confucio"
 BLR_Chinese_konfuci_desc: "Abriremos varios Institutos Confucio en nuestro país."
 BLR_Chinese_Poezda: "Compra de trenes en China"
 BLR_Chinese_Poezda_desc: "Compraremos varios trenes en China que nos ayudarán a mejorar nuestro suministro."
 BLR_Chinese_huawei: "Cooperación con Huawei"
 BLR_Chinese_huawei_desc: "Estableceremos una fuerte cooperación con esta empresa china."
 BLR_Chinese_energy: "Inversiones chinas en nuestro sector energético"
 BLR_Chinese_energy_desc: "Las empresas chinas continúan su marcha inversora en nuestro país y ahora están listas para invertir nuevamente en nuestro sector energético."
 BLR_Chinese_uchenia: "Ejercicios con el ejército chino."
 BLR_Chinese_uchenia_desc: "El intercambio de experiencias entre nuestras fuerzas armadas será muy útil."
 BLR_Chinese_yuan: "El Yuan es la segunda moneda del país"
 BLR_Chinese_yuan_desc: "Estamos dispuestos a aceptar el yuan como segunda moneda en nuestro país."
 BLR_Chinese_skynet: "Experiencia de control de Internet en China"
 BLR_Chinese_skynet_desc: "Estamos listos para aprender de la experiencia de monitorear redes sociales."
 BLR_Chinese_economic: "Experiencia económica china"
 BLR_Chinese_economic_desc: "Estamos implementando toda la experiencia adquirida por la economía china."
 BLR_military_exercises_CHI_idea: "Ejercicios bielorruso-chinos"
 BLR_Socialist_Market_Economy: "Economía de mercado socialista"
 BLR_minotor_servise_sov: "Servicio Minotor Bielorruso"
 BLR_minotor_servise_blr: "Contrato Minotor con Rusia"
 BLR_558zadov_contract: "Contrato con planta de reparación de aeronaves 558"
 BLR_peleng_contract: "[BLR.GetFlag]Contrato con la empresa Peleng"
 BLR_peleng_contract_desc: "[BLR.GetFlag]Empresa bielorrusa dedicada al desarrollo y producción de productos optoelectrónicos para fines militares y civiles, empresa líder en la industria en la República de Bielorrusia."
 BLR_peleng_union_state: "[BLR.GetFlag]JSC Peleng"
 BLR_peleng_union_state_desc: "[SOV.GetFlag]Compañía estatal de la Unión para el desarrollo y producción de productos optoelectrónicos para fines militares y civiles, la empresa líder en la industria en el estado de la Unión."
 BLR_peacerota_idea: "Contingente de mantenimiento de la paz"
 BLR_Foreign_legion_idea: "Legión extranjera"
 BLR_sso_idea: "Fuerzas de Operaciones Especiales"
 BLR_ter_orobona_idea: "Defensa territorial"
 BLR_mzkt_contract: "Contrato con MZKT"
 BLR_mzkt_contract_desc: "La planta de tractores de ruedas de Minsk (MZKT) es una empresa especializada en la producción de vehículos pesados ​​de carretera y todoterreno, vehículos remolcados y chasis especiales para los sectores de la construcción, el petróleo y el gas, y la maquinaria industrial. Es una empresa estatal que depende del Comité Estatal Militar-Industrial de la República de Bielorrusia."
 BLR_mzkt_contract_another: "Contrato con MZKT"
 BLR_mzkt_another_desc: "La planta de tractores de ruedas de Minsk (MZKT) es una empresa especializada en la producción de vehículos pesados ​​de carretera y todoterreno, vehículos remolcados y chasis especiales para los sectores de la construcción, el petróleo y el gas, y la maquinaria industrial. Es una empresa estatal que depende del Comité Estatal Militar-Industrial de la República de Bielorrusia."
 BLR_mzkt_contract_blr: "Contrato MZKT con [SOV.GetNamewithFlag]"
 BLR_mzkt_contract_blr_desc: "La planta de tractores de ruedas de Minsk (MZKT) es una empresa especializada en la producción de vehículos pesados ​​de carretera y todoterreno, vehículos remolcados y chasis especiales para los sectores de la construcción, el petróleo y el gas, y la maquinaria industrial. Es una empresa estatal que depende del Comité Estatal Militar-Industrial de la República de Bielorrusia."
 BLR_mzkt_union_state: "[BLR.GetFlag]Planta de tractores de ruedas de Minsk"
 BLR_mzkt_union_state_desc: "La planta de tractores de ruedas de Minsk (MZKT) es una empresa especializada en la producción de vehículos pesados ​​de carretera y todoterreno, vehículos remolcados y chasis especiales para los sectores de la construcción, el petróleo y el gas, y la maquinaria industrial. Actualmente, se encuentra bajo la jurisdicción del Estado de la Unión."
 BLR_140_zavod_union_state: "[BLR.GetFlag]La planta de reparación número 140"
 BLR_140_zavod_union_state_desc: "La Planta de Reparación número 140 es una empresa estatal del complejo militar-industrial del Estado de la [SOV.GetFlag] Unión, especializada en la reparación y modernización de vehículos blindados y sus motores."
 BLR_Brigade_Territorial_Defence: "Crear una Brigada de Defensa Territorial"
 BLR_Brigade_Territorial_Defence_desc: "El estallido de la guerra nos obliga a crear una fuerza de defensa territorial."
 BLR_Transport_troops: "Tropas de transporte"
 BLR_Transport_troops_desc: "Tropas especiales diseñadas para realizar tareas de apoyo al transporte."
 BLR_sso: "Creación de Fuerzas de Operaciones Especiales"
 BLR_sso_desc: "Las Fuerzas de Operaciones Especiales de las Fuerzas Armadas de la República de Bielorrusia, una rama de gran movilidad de las Fuerzas Armadas de la República de Bielorrusia, son las sucesoras de las Fuerzas Aerotransportadas de la URSS y de las fuerzas especiales del GRU de la URSS en el República de Bielorrusia. Tareas principales: actividades de contrasabotaje, inteligencia, lucha contra los grupos armados ilegales, realización de diversas tareas utilizando métodos especiales para poner fin al conflicto armado contra la República de Bielorrusia. Actúan como uno de los principales elementos de disuasión estratégica."
 BLR_trans_army: "Creación de Tropas de Transporte"
 BLR_trans_army_desc: "Las Tropas de Transporte de Bielorrusia son la rama de las Fuerzas Armadas de Bielorrusia responsable del traslado de personal y material por carretera, ferrocarril y vía aérea. Su función es brindar apoyo logístico a las formaciones militares de otras ramas de las Fuerzas Armadas en todo el país."
 BLR_end_reform: "Completar la reforma del ejército."
 BLR_end_reform_desc: "Completaremos las reformas de nuestro ejército, y este ahora cumplirá con los estándares modernos."
 USSR_Legacy: "Desarrollo del MZKT"
 USSR_Legacy_desc: "Haremos todo lo posible por desarrollar y ampliar el legado que hemos heredado."
 BLR_mi_8: "Mi-8"
 BLR_MZKT: "MZKT"
 BLR_MZKT_desc: "La planta de tractores de ruedas de Minsk es una empresa especializada en la producción de vehículos pesados ​​de carretera y todoterreno, vehículos remolcados y chasis especiales con ruedas para los sectores de la construcción, el petróleo y el gas, y la maquinaria industrial. Es una empresa estatal que depende del Comité Estatal Militar-Industrial de la República de Bielorrusia."
 BLR_minoitor: "Servicio Minotor"
 BLR_minoitor_desc: "Minotor-Service es una empresa bielorrusa con sede en Minsk, dedicada al desarrollo, producción, modernización, reparación y mantenimiento de vehículos de combate sobre orugas, así como al suministro de repuestos. Es una de las empresas líderes del complejo militar-industrial del país."
 BLR_belspecveshtech: "Belspetsvneshtechnika"
 BLR_belspecveshtech_desc: "Belspetsvneshtechnika (BSVT) es una empresa estatal bielorrusa de comercio exterior, fundada en 1995. Se especializa en la comercialización y producción de armas y productos de doble uso. Es miembro del Comité Estatal Militar-Industrial y se la considera la empresa líder del país en el sector de la exportación de armas."
 BLR_140_zavod: "140 Planta de Reparación"
 BLR_140_zavod_desc: "La Planta de Reparación número 140 es una empresa estatal del complejo militar-industrial de Bielorrusia, especializada en la reparación y modernización de vehículos blindados y sus motores."
 BLR_polonez: "Comience a desarrollar nuestro MLRS con China"
 BLR_polonez_desc: "Hemos solicitado la ayuda de nuestros colegas chinos para crear nuestro sistema MLRS."
 BLR_peleng: "Peleng"
 BLR_peleng_for_russia: "Equipo ATGM"
 BLR_peleng_for_russia_desc: "Estamos listos para iniciar la producción de equipos para el ATGM ruso."
 BLR_peleng_for_ukr: "Equipo ATGM"
 BLR_peleng_for_ukr_desc: "Estamos listos para iniciar la producción de equipos para el ATGM ucraniano."
 BLR_558_zavod: "558 Planta de reparación de aeronaves"
 BLR_558_zavod_desc: "La Planta de Reparación de Aviación número 558 es una de las mayores empresas de la CEI dedicada a la reparación y modernización de equipos de aviación de combate modernos en servicio en las Fuerzas Aéreas de los países postsoviéticos y de muchas otras naciones. Es la instalación de reparación de aeronaves más importante de Bielorrusia, ubicada en la ciudad de Baranovichi."
 BLR_Communism_start: "¡Tatyana Golubeva!"
 BLR_Communism_start_desc: "El comunismo ha regresado a Bielorrusia. ¿Abrirá el Partido Comunista el camino al marxismo-leninismo en el país una vez más?"
 BLR_trade_with_nko: "Comercio con Corea del Norte"
 BLR_trade_with_nko_desc: "Corea del Norte, aunque es un país pequeño, es nuestro aliado en el campo socialista con el que estamos dispuestos a establecer relaciones comerciales."
 BLR_nko_workers: "trabajadores norcoreanos"
 BLR_nko_workers_desc: "Estamos dispuestos a invitar a trabajadores norcoreanos a nuestro país. Son famosos por su eficiencia y dedicación."
 BLR_nko_miiltary_coop: "¡Cooperación Técnico-Militar con Corea del Norte!"
 BLR_nko_miiltary_coop_desc: "Estamos listos para iniciar la cooperación técnico-militar con el Ejército Popular de Corea del Norte."
 BLR_rotation_KGB: "Rotación en el KGB"
 BLR_rotation_KGB_desc: "Estamos rotando personal, porque ahora necesitamos una organización fuerte y poderosa."
 BLR_North_Korea_workers: "Trabajadores de Corea del Norte"
 BLR_SMERSH_2: "SMERSH 2.0"
 BLR_SMERSH_2_desc: "Reviviremos SMERSH. Es hora de utilizar la experiencia soviética en beneficio de la nación."
 BLR_arest_silovic: "Arresto de Fuerzas de Seguridad"
 BLR_arest_silovic_desc: "Resultó que muchas fuerzas de seguridad no están de acuerdo con el nuevo gobierno, es hora de purgarlas."
 BLR_antigay_propaganda_laws: "Leyes contra la Propaganda Gay"
 BLR_antigay_propaganda_laws_desc: "Es hora de prohibir legalmente la propaganda LGBT en nuestro país."
 BLR_clean_soc_net: "Limpieza de Redes Sociales"
 BLR_clean_soc_net_desc: "Limpiaremos todas las redes sociales, no permitiremos la difusión de propaganda enemiga."
 BLR_pioneria: "Pioneros"
 BLR_pioneria_desc: "Los jóvenes no deben quedarse de brazos cruzados, por eso reviviremos a los Jóvenes Pioneros."
 BLR_Marks_school: "Marxismo en las Escuelas"
 BLR_Marks_school_desc: "El currículo escolar incluirá necesariamente la educación marxista."
 BLR_free_education: "Educación Gratuita"
 BLR_free_education_desc: "La educación debe ser gratuita y disponible para todos los ciudadanos de nuestro glorioso país."
 BLR_state_atheism: "Ateísmo de Estado"
 BLR_state_atheism_desc: "La religión es el opio del pueblo, y es hora de combatir su influencia."
 BLR_collectivism: "Colectivismo"
 BLR_collectivism_desc: "La colectivización ya ha funcionado antes, así que repetiremos la experiencia."
 BLR_fight_international_capitalists: "Lucha contra los Capitalistas Internacionales"
 BLR_fight_international_capitalists_desc: "Los oligarcas son una clase peligrosa y corrupta, tan inalterable como los kulaks de la época soviética. Desde la disolución de la URSS, los oligarcas rusos y bielorrusos han absorbido cada vez más influencia económica y han desalojado a los trabajadores bielorrusos en favor de un modelo económico globalista impulsado por empresas extranjeras. Para revivir el verdadero socialismo, primero es esencial expulsar a la clase capitalista internacional."
 BLR_weaken_the_banks: "Debilitar los Bancos"
 BLR_weaken_the_banks_desc: "Los bancos son la guardia pretoriana del capitalismo, llevando su estandarte al combate y defendiendo sus ganancias con su mera existencia. Se entrometen en áreas pobres del mundo, abusan de la clase trabajadora con la especulación salarial y de intereses, e influyen en la política con donaciones legales e ilegales. Los bancos deben volver a un estado en el que sean simples prestamistas de dinero a corto plazo, apolíticos."
 BLR_ultimate_tax_reform: "Gran Reforma Tributaria"
 BLR_ultimate_tax_reform_desc: "Tenemos la intención de llevar a cabo una importante reforma fiscal que aliviará la carga fiscal para la gente común, pero para las empresas será lo contrario."
 BLR_single_party: "Partido Único"
 BLR_single_party_desc: "Debería haber un solo partido, porque tenemos un solo camino hacia el socialismo."
 BLR_nationalize_foreign_business: "Nacionalizar Empresas Extranjeras"
 BLR_nationalize_foreign_business_desc: "Las plantas industriales propiedad de extranjeros siempre representan un riesgo para la seguridad económica. Ante las amenazas de sanciones económicas de países extranjeros, siempre preocupa que los propietarios industriales se marchen de la noche a la mañana y se lleven partes vitales de sus plantas. Para evitarlo, debemos reclamar estas industrias para el Estado, incluso si ello ofende a otras naciones."
 BLR_five_year_plan: "Primer Plan Quinquenal"
 BLR_five_year_plan_desc: "Los modelos económicos libres de los estados occidentales no ofrecen futuro para un país socialista. El retorno a una economía planificada, preferiblemente en forma de planes quinquenales al estilo soviético, otorgará al gobierno una gran influencia sobre una economía que hasta ahora no estaba controlada."
 BLR_reestablish_the_military_industrial_complex: "Reestablecer el Complejo Militar-Industrial"
 BLR_reestablish_the_military_industrial_complex_desc: "¡El ejército y el pueblo son uno!"
 BLR_mobilize_the_masses: "Movilizar a las Masas"
 BLR_mobilize_the_masses_desc: "Nuestro ejército necesita gente que defienda los intereses de nuestro país dondequiera que el partido lo demande."
 BLR_better_roads: "Mejora General de Carreteras"
 BLR_better_roads_desc: "Es necesario abordar de cerca el problema vial en nuestro país."
 BLR_progress_cult: "Culto al Progreso"
 BLR_progress_cult_desc: "Los socialistas aspiran al progreso social y científico. Este último es especialmente importante en el siglo XXI, no solo por motivos de seguridad nacional, sino para difundir la revolución y cumplir la agenda socialista, que solo puede lograrse plenamente si la ciencia y la tecnología avanzan hasta cierto punto."
 BLR_soviet_academy_of_sciences: "Academia Soviética de Ciencias"
 BLR_soviet_academy_of_sciences_desc: "La Academia Soviética de Ciencias fue la principal institución científica de la Unión Soviética. Nuestras mentes más brillantes volverán a trabajar incansablemente aquí para lograr avances tecnológicos y científicos que algún día nos convertirán en la envidia del mundo capitalista."
 BLR_the_culture_of_proletarianism: "Cultura del Proletariado"
 BLR_the_culture_of_proletarianism_desc: "Es hora de cultivar una cultura proletaria para la clase trabajadora, con la que avanzaremos juntos hacia un hermoso y común futuro comunista."
 BLR_empower_the_kgb: "Expandir la Influencia del KGB"
 BLR_empower_the_kgb_desc: "Pretendemos ampliar la influencia de la KGB en nuestro país para que el enemigo no pueda socavar nuestro sistema interno. Por lo tanto, otorgaremos aún más poderes para llevar a cabo nuestras actividades."
 BLR_erase_nationalist: "Encarcelar a Todos los Nacionalistas"
 BLR_erase_nationalist_desc: "Es hora de eliminar las células nacionalistas de nuestro país."
 BLR_the_litbel_start: "Revivir Litbel"
 BLR_the_litbel_start_desc: "Litbel es una república soviética que surgió brevemente durante la Guerra Civil Rusa. La perspectiva de unir fuerzas con nuestros hermanos lituanos nos parece muy tentadora."
 BLR_peaceful_litbel: "Litbel sin guerra"
 BLR_peaceful_litbel_desc: "Hemos preparado todo lo necesario. Todos los agentes, todos los ciudadanos y políticos están en sus puestos. Es hora de liberar a Lituania de la ocupación del gobierno títere."
 BLR_the_litbel: "Estado de Dos Pueblos"
 BLR_the_litbel_desc: "Ha llegado el momento de que nos convirtamos en un solo país con dos pueblos: bielorruso y lituano."
 BLR_dissolve_monasteries: "Disolución de los Monasterios"
 BLR_dissolve_monasteries_desc: "¡Limpiaremos nuestro país de la religión por completo!"
 BLR_support_of_the_worker: "Apoyo a los Trabajadores"
 BLR_support_of_the_worker_desc: "La clase trabajadora es nuestro apoyo y nuestra fuerza. ¡Siempre la apoyaremos en la lucha contra el contagio capitalista!"
 BLR_litbel_attack_lat: "Latgalia bielorrusa"
 BLR_litbel_attack_lat_desc: "Letonia nos arrebató hace mucho tiempo las tierras de Latgale. Es hora de poner fin a esta injusticia."
 BLR_litbel_annex_lat: "El fin del Estado letón"
 BLR_litbel_annex_lat_desc: "Las tierras de Letonia vuelven a ser nuestras."
 BLR_presidential_election_of_2001: "La Esfera Política"
 BLR_presidential_election_of_2001_desc: "Es hora de decidir quién dirigirá nuestro país en el nuevo milenio."
 BLR_Andrey_sannikov: "¡El camino de la democracia occidental!"
 BLR_Andrey_sannikov_desc: "Nuestro país ha elegido un nuevo líder. Ahora nos guiará hacia un futuro democrático brillante."
 BLR_Join_GUAM: "Unirse a GUAM"
 BLR_Join_GUAM_desc: "Fortaleceremos nuestros lazos en el espacio postsoviético al unirnos a GUAM."
 BLR_American_Protection: "Protección estadounidense"
 BLR_American_Protection_desc: "Necesitamos la ayuda de Estados Unidos, porque es poco probable que Rusia ignore nuestras acciones."
 BLR_Linking_foreign_currency: "Vincular nuestra moneda al euro"
 BLR_Linking_foreign_currency_desc: "Hay que eliminar la inestabilidad de nuestra moneda. Vincularemos nuestra moneda al euro."
 BLR_closed_border_with_Russia: "Cierre de la frontera con Rusia"
 BLR_closed_border_with_Russia_desc: "Estamos restableciendo los puestos fronterizos con Rusia. Nadie procedente de territorio ruso podrá entrar libremente en nuestro país."
 BLR_NATO_Membership_Campaign: "Campaña de membresía en la OTAN"
 BLR_NATO_Membership_Campaign_desc: "Es hora de iniciar una campaña para preparar la adhesión a la OTAN."
 BLR_USA_military_Cooperation: "Cooperación militar con Estados Unidos"
 BLR_USA_military_Cooperation_desc: "La cooperación con Estados Unidos en el ámbito técnico-militar nos promete ventajas significativas."
 BLR_Invite_NATO_advisors: "Invitar asesores militares de la OTAN"
 BLR_Invite_NATO_advisors_desc: "Ahora que hemos reformado por completo nuestro mando militar, invitaremos a asesores militares de la OTAN."
 BLR_USAD_request: "Solicitud de USAID"
 BLR_USAD_request_desc: "Hemos decidido ponernos en contacto con USAID para solicitar apoyo."
 BLR_Military_Exercises_NATO: "Ejercicios militares con la OTAN"
 BLR_Military_Exercises_NATO_desc: "Nuestro ejército realizará sus primeros ejercicios conjuntos con la OTAN."
 BLR_NATO_integration_command: "Comando de Integración de la OTAN"
 BLR_NATO_integration_command_desc: "El Comando de Integración de la OTAN es nuestro siguiente paso hacia la adhesión a la Alianza."
 BLR_Request_NATO_membership: "Solicitar la membresía en la OTAN"
 BLR_Request_NATO_membership_desc: "Es hora de solicitar la adhesión a la OTAN."
 BLR_western_diplomats: "Diplomáticos occidentales"
 BLR_western_diplomats_desc: "Diplomáticos de países occidentales nos visitaron y nos felicitaron por la victoria conseguida. Ahora Bielorrusia puede elegir su camino hacia Occidente."
 BLR_denied_sanctions: "Suspensión de las sanciones"
 BLR_denied_sanctions_desc: "Ahora que hemos celebrado elecciones legítimas, se levantarán todas las sanciones en nuestra contra."
 BLR_people_rights: "Derechos humanos"
 BLR_people_rights_desc: "Debemos respetar los derechos y libertades de nuestro pueblo."
 BLR_Freedom_Meetings: "Libertad de reuniones y asambleas"
 BLR_Freedom_Meetings_desc: "Debe garantizarse el derecho a las reuniones y asambleas."
 BLR_dont_torture: "Reforma del sistema de salud"
 BLR_dont_torture_desc: "Una atención médica de calidad es una de las necesidades más básicas de nuestros ciudadanos. Al brindarla, podremos construir un país mejor."
 BLR_EU_integration: "Integración en la Unión Europea"
 BLR_EU_integration_desc: "Tenemos la intención de integrarnos en la Unión Europea."
 BLR_Attract_European_investments: "Atraer inversiones europeas"
 BLR_Attract_European_investments_desc: "Estamos preparados para atraer inversores europeos que impulsen nuestra economía."
 BLR_Opening_garment: "Apertura de fábricas de prendas de vestir para marcas populares"
 BLR_Opening_garment_desc: "Estamos preparados para establecer la producción de ropa para marcas populares en el territorio de nuestro país."
 BLR_simplification_labor_code: "Simplificación del Código Laboral"
 BLR_simplification_labor_code_desc: "Es necesario modificar la legislación laboral para que los empleados no puedan recurrir constantemente a los sindicatos en lugar de trabajar."
 BLR_Encourage_Exchange_Students_desc: "Nuestros estudiantes están preparados para participar en un programa de intercambio con sus homólogos europeos."
 BLR_Adopt_EU_Intellectual: "Adoptar leyes de propiedad intelectual de la UE"
 BLR_Adopt_EU_Intellectual_desc: "Se deben adoptar las leyes de propiedad intelectual de la UE para cumplir con los estándares europeos en esta área."
 BLR_Digitalization: "Digitalización"
 BLR_Digitalization_desc: "Es necesario digitalizar los procesos de producción para mejorar su calidad."
 BLR_political_platforms: "Creación de plataformas políticas para empresas extranjeras"
 BLR_political_platforms_desc: "¿Quizás deberíamos permitir que las empresas extranjeras tengan acceso a nuestras plataformas políticas?"
 BLR_Custom_Institutional_reforms: "Biocombustible"
 BLR_Custom_Institutional_reforms_desc: "Las fuentes de energía alternativas pueden ayudarnos a reducir nuestra dependencia de aquellos países con los que no deseamos tener lazos amistosos."
 BLR_Market_Economy: "Economía de mercado funcional"
 BLR_Market_Economy_desc: "Una economía de mercado plena es lo que hemos estado buscando, y es lo que debería funcionar en un país europeo y democrático."
 BLR_Delete_KGB2: "Disolver el KGB"
 BLR_Delete_KGB2_desc: "Reemplazaremos al KGB con una nueva estructura: el Servicio de Seguridad Nacional. Esta organización reclutará a empleados leales a nuestros ideales occidentales."
 BLR_US_money: "Inversiones estadounidenses"
 BLR_US_money_desc: "Necesitamos dinero para seguir construyendo la democracia en nuestro país."
 BLR_join_wto: "Adhesión a la OMC"
 BLR_join_wto_desc: "La adhesión a la OMC nos brindará muchas ventajas y acceso a los mercados internacionales."
 BLR_release_political_prisoners: "Liberar a los presos políticos"
 BLR_release_political_prisoners_desc: "Muchas personas fueron encarceladas por motivos políticos durante el gobierno anterior. Nosotros solucionaremos esto."
 BLR_baltic_economic_cooperation: "Asociación comercial con los países bálticos"
 BLR_baltic_economic_cooperation_desc: "Nuestros vecinos más cercanos son excelentes socios comerciales. Su ubicación costera y sus fronteras comunes nos brindan razones de peso para mejorar nuestro desempeño comercial."
 BLR_root_out_nationalists: "Eliminar a los nacionalistas"
 BLR_root_out_nationalists_desc: "Los nacionalistas siempre han sido un problema en nuestro país. Solo conducen a la inestabilidad, y es hora de enfrentarlos."
 BLR_decommunize_belarus_society: "Descomunización de la sociedad bielorrusa"
 BLR_decommunize_belarus_society_desc: "Hay que dejar atrás el legado soviético. Ha llegado el momento de abrazar el Occidente progresista."
 BLR_fight_the_oligarchs: "Lucha contra los oligarcas"
 BLR_fight_the_oligarchs_desc: "No podemos permitir que los oligarcas mantengan el poder en nuestro país, o sin duda no veremos crecimiento económico."
 BLR_European_university_connections: "Educación europea"
 BLR_European_university_connections_desc: "Estamos preparados para dar la bienvenida a las universidades europeas a nuestro país con el fin de mejorar la calidad de la educación para nuestros estudiantes."
 BLR_LGBT_Belarus_quest: "Cuestión LGBT en Bielorrusia"
 BLR_LGBT_Belarus_quest_desc: "El tema LGBT ha sido puesto en la agenda por nuestro gobierno, porque no podemos ignorar esta tendencia. ¿Qué haremos al respecto?"
 BLR_Offshore_heaven: "Beneficios fiscales para inversores extranjeros"
 BLR_Offshore_heaven_desc: "Crearemos condiciones favorables para la inversión en nuestro país, lo que atraerá a muchos inversores."
 BLR_wind_farms: "Parques eólicos"
 BLR_wind_farms_desc: "Hemos construido varios parques eólicos en los distritos de Minsk."
 BLR_Hajdukiewicz: "Sergey Vasilyevich Gaidukevich (nacido el 8 de septiembre de 1954) es un político y figura pública bielorruso, líder del Partido Liberal Democrático de Bielorrusia. Es coronel de la reserva. Se le conoce por su orientación pro-rusa, defiende la confederación con Rusia y la introducción de una moneda única (con un centro emisor en Moscú), así como por 'llevar a cabo una política militar conjunta'"
 BLR_Hajdukiewicz_desc: "Sergey Vasilyevich Gaidukevich (nacido el 8 de septiembre de 1954) es un político y figura pública bielorruso, líder del Partido Liberal Democrático de Bielorrusia. Es coronel de la reserva y se le conoce por su orientación prorrusa. Defiende la confederación con Rusia y la introducción de una moneda única con sede en Moscú, así como la implementación de una política militar conjunta."
 BLR_Spiritual_revival: "Renacimiento espiritual de Bielorrusia"
 BLR_Spiritual_revival_desc: "El proceso de renacimiento espiritual de Bielorrusia debe continuar. El papel de la Iglesia Ortodoxa y de la Iglesia Católica Romana en la sociedad debe incrementarse."
 BLR_Ban_Enemies: "Luchar contra los enemigos internos"
 BLR_Ban_Enemies_desc: "Debemos limpiar por completo el panorama político de nuestro país. Ningún partido destructivo financiado desde el extranjero debe interferir en el desarrollo de nuestra nación."
 BLR_Russian_Oligarch: "Amistad con los oligarcas rusos"
 BLR_Russian_Oligarch_desc: "Los oligarcas rusos poseen una enorme fortuna. Creo que vale la pena ganárselos."
 BLR_Hardline_EuroScepticism: "Euroscepticismo radical"
 BLR_Hardline_EuroScepticism_desc: "Es necesario un euroescepticismo firme, porque Europa quiere una Bielorrusia débil."
 BLR_Belarusian_nation_law: "Ley nacional bielorrusa"
 BLR_Belarusian_nation_law_desc: "Nuestra nación se ha ganado hace mucho tiempo el derecho a la autodeterminación. Somos un pueblo con una gran historia y debemos avanzar con paso firme hacia un futuro brillante como nación soberana."
 BLR_russian_education: "Educación rusa"
 BLR_russian_education_desc: "Nuestras universidades deberían establecer vínculos con las rusas. De esta forma, podremos ofrecer una educación al estilo ruso para todos."
 BLR_Son_will_rule: "Que el hijo gobierne"
 BLR_Son_will_rule_desc: "Es hora de cambiar de líder. Ahora el hijo de Sergei Gaidukevich dirigirá el partido y el país."
 BLR_rus_media: "Dejen entrar a los medios rusos"
 BLR_rus_media_desc: "Permitiremos la entrada de los medios de comunicación rusos a nuestro territorio sin restricciones."
 BLR_russian_fsb: "Permitir las oficinas de representación del FSB"
 BLR_russian_fsb_desc: "El FSB colaborará con nuestros servicios especiales y nos proporcionará una mayor estabilidad política."
 BLR_science_boost: "Invertir en ciencia"
 BLR_science_boost_desc: "La ciencia debe recibir la financiación más generosa posible del presupuesto estatal."
 BLR_support_promka: "Apoyo a la industria nacional"
 BLR_support_promka_desc: "Apoyaremos la industria nacional."
 BLR_boost_economic: "Acelerar el crecimiento económico"
 BLR_boost_economic_desc: "Nuestras reformas están dando sus frutos y la economía ha comenzado a crecer."
 BLR_anti_gibdd: "Política anti-LGBT"
 BLR_anti_gibdd_desc: "Rechazamos y combatiremos la propaganda LGBT en nuestro país."
 BLR_union_state_course: "Rumbo al Estado Unión"
 BLR_union_state_course_desc: "Nuestro objetivo es la Unión Estatal, y lucharemos por conseguirla."
 BLR_support_army: "Apoyo del ejército"
 BLR_support_army_desc: "Apoyaremos a las fuerzas armadas de nuestro país, porque gracias a ellas nuestro país sigue siendo independiente."
 BLR_russian_tver: "Producción conjunta con la Fábrica de Carros de Tver"
 BLR_russian_tver_desc: "Compraremos un gran número de vagones a Rusia para nuestros ferrocarriles."
 BLR_russian_teplovzor: "Apertura de producción de cámaras térmicas para Rusia"
 BLR_russian_teplovzor_desc: "Iniciaremos la producción de cámaras termográficas, que también podremos vender a Rusia para su uso en sus fuerzas armadas."
 BLR_cyphrovizacia: "Digitalización"
 BLR_cyphrovizacia_desc: "Iniciaremos nuestro camino hacia la economía digital."
 BLR_russian_uvz: "Firma contratos exclusivos con UVZ"
 BLR_russian_uvz_desc: "La colaboración con esta reconocida empresa nos aportará importantes beneficios."
 BLR_all_cyphro: "Digitalización completa"
 BLR_all_cyphro_desc: "La digitalización de muchos procesos gubernamentales nos ayudará a trabajar de manera más eficaz con los ciudadanos y con los problemas que surjan."
 BLR_kalash_zavod: "Inauguración de la fábrica de armas Kalashnikov"
 BLR_kalash_zavod_desc: "Fabricaremos los productos de esta famosa marca en el país."
 BLR_Union_state_again: "Unirse a Rusia"
 BLR_Union_state_again_desc: "Estamos listos para volver a formar parte de Rusia."
 BLR_union_become_one: "La Unión se Convertirá en Una"
 BLR_Lykashenko: "§YLukashenko§!"
 BLR_Lykashenko_desc: "Alexander Grigoryevich Lukashenko (nacido el 30 de agosto de 1954) es un político, estadista y militar bielorruso. Ostenta el cargo de Presidente de Bielorrusia y Comandante en Jefe de las Fuerzas Armadas desde el 20 de julio de 1994. Es conocido por sus posturas prorrusas. En las sociedades bielorrusas y de habla rusa, se le conoce con el apodo de \"Batka\"."
 BLR_GrodnoAzot: "Grodno Azot"
 BLR_GrodnoAzot_desc: "La planta de Khimvolokno, filial de Grodno Azot OJSC, es un importante fabricante de hilos y fibras de poliamida y poliéster, así como de poliamida-6 (PA-6) y materiales compuestos poliméricos derivados de ella. Cada uno de los principales tipos de productos se fabrica en una amplia gama con diversas propiedades físicas y mecánicas e indicadores de calidad, según la aplicación."
 BLR_PinskDrev: "Finanzas \"PinskDrev\""
 BLR_PinskDrev_desc: "PinskDrev es una importante empresa de carpintería en Bielorrusia y la más antigua de Pinsk. Deberíamos financiar sus actividades para que puedan seguir desarrollándose."
 BLR_AirPort_minsk: "Expansión del Aeropuerto Internacional"
 BLR_AirPort_minsk_desc: "Estamos dispuestos a invertir importantes recursos financieros en la ampliación del aeropuerto de Minsk."
 BLR_dai_denyag: "Solicitar un préstamo desde Rusia"
 BLR_dai_denyag_desc: "Solicitaremos al gobierno ruso que nos conceda un préstamo."
 BLR_ros_atom: "ROS ATOM"
 BLR_ros_atom_desc: "Invitaremos a especialistas de ROSATOM para colaborar en el campo de la energía nuclear"
 BLR_Impact_kgb: "Impacto del KGB"
 BLR_Impact_kgb_desc: "La KGB utiliza diversos métodos para eliminar a aquellos que no están satisfechos con la elección de un nuevo presidente."
 BLR_Liquidation_pub_assoc: "Liquidación de Asociaciones Públicas"
 BLR_Liquidation_pub_assoc_desc: "La KGB está liquidando activamente, o intentando liquidar, asociaciones públicas que resultan objetables para nuestro presidente."
 BLR_crackdown_opp_rall: "Represión de Mítines de Oposición"
 BLR_crackdown_opp_rall_desc: "Estamos dispersando activamente las manifestaciones de nuestros oponentes políticos que están descontentos con las elecciones."
 BLR_Increased_censorship: "Fortalecer la Censura de los Medios de Comunicación"
 BLR_Increased_censorship_desc: "Es necesario imponer una fuerte censura a los medios de comunicación para que nuestros oponentes no puedan agitarse en nuestra contra."
 BLR_concept_national_security_Belarus: "Concepto de Seguridad Nacional"
 BLR_concept_national_security_Belarus_desc: "Este concepto establece un conjunto de opiniones oficiales sobre la esencia y el contenido de las actividades de la República de Bielorrusia para garantizar el equilibrio de los intereses del individuo, la sociedad y el Estado, y su protección de amenazas internas y externas"
 BLR_Economic_development_2001_2005: "Programa de Desarrollo Socioeconómico"
 BLR_Economic_development_2001_2005_desc: "El programa de desarrollo socioeconómico de la República de Bielorrusia para 2001-2005, desarrollado por el Ministerio de Economía de la República de Bielorrusia en colaboración con otros ministerios y órganos de administración estatales republicanos, comités ejecutivos regionales y el Comité Ejecutivo de la Ciudad de Minsk con la participación de la Academia Nacional de Ciencias, el Banco Nacional, institutos de investigación especializados y organizaciones públicas, de acuerdo con la Ley de la República de Bielorrusia 'Sobre la previsión estatal y los programas de desarrollo socioeconómico de la República de Bielorrusia' y las resoluciones del Consejo de Ministros de la República de Bielorrusia de febrero 2, 2000 N 141 y de agosto 10, 2000 N 1248 sobre el desarrollo del Programa de desarrollo socioeconómico de la República de Bielorrusia para 2001-2005."
 BLR_reforms_Belarusian_Railway: "Reformas de los Ferrocarriles Bielorrusos"
 BLR_reforms_Belarusian_Railway_desc: "Nuestras vías férreas se encuentran en muy mal estado, por lo que llevaremos a cabo una serie de reformas para mejorar la situación."
 BLR_new_railway_station: "Nueva Estación de Tren de Minsk"
 BLR_new_railway_station_desc: "Hemos construido una nueva estación de tren en Minsk. Ahora nuestra ciudad podrá recibir más trenes."
 BLR_Electrification_Myslishche_Kryzhovka: "Electrificación del Ferrocarril Myslyshche - Kryzhovka"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "La línea Myslyshche-Kryzhovka es una de las principales prioridades de desarrollo de nuestro país, por lo que la abordaremos en primer lugar."
 BLR_Baranovichi_Plant: "Planta de Piezas y Estructuras de Construcción de Baranovichi"
 BLR_Baranovichi_Plant_desc: "Estamos creando una división estructural de la planta de Baranovichi de piezas y estructuras de construcción para mejorar el suministro de piezas para nuestros trenes."
 BLR_Energy_conflict_over: "Venta de Belgaztrans"
 BLR_Energy_conflict_over_desc: "El conflicto está llegando a su fin. Hemos aceptado las condiciones de Rusia y estamos listos para vender Belgaztrans. A cambio, se estabilizarán los precios de la energía."
 BLR_new_rolling_stock: "Compra de Nuevo Material Rodante"
 BLR_new_rolling_stock_desc: "Mediante la compra de nuevo material rodante, eliminaremos el principal problema que aqueja a nuestros ferrocarriles."
 BLR_promise_first_nuclear: "La Promesa de Construir una Planta Nuclear"
 BLR_promise_first_nuclear_desc: "Prometemos a todos nuestros ciudadanos que se construirá una central nuclear en el territorio de nuestro país, garantizando así nuestra seguridad energética."
 BLR_New_Land_code: "Nuevo Código de Tierras"
 BLR_New_Land_code_desc: "El nuevo Código de Tierras simplifica significativamente la compra de terrenos por parte de propietarios privados y empresas, lo que sin duda resultará atractivo para un determinado sector de la población."
 BLR_Zubr_Energy_LLC: "Apertura de Zubr Energy LLC"
 BLR_Zubr_Energy_LLC_desc: "Planta para la producción de baterías de arranque para su entrega a las líneas de producción de fabricantes de automóviles nacionales y extranjeros."
 BLR_Hi_Tech_Park: "Parque de Alta Tecnología"
 BLR_Hi_Tech_Park_desc: "El Parque de Alta Tecnología es un régimen fiscal y legal especial para el desarrollo de negocios de TI en Bielorrusia. No es una zona económica especial, sino una jurisdicción que opera bajo el principio de extraterritorialidad. Las empresas y los emprendedores individuales registrados en el Parque pueden beneficiarse de las ventajas que se les ofrecen, independientemente de la ubicación de su oficina en Bielorrusia."
 BLR_Referendum_Belarus_2004: "Referéndum en Bielorrusia 2004"
 BLR_Referendum_Belarus_2004_desc: "El 17 de octubre de 2004, Bielorrusia acogió el tercer referéndum republicano iniciado por el presidente Lukashenko en la historia de Bielorrusia independiente. El referéndum fue convocado por el Decreto Presidencial Nº 431 de septiembre 7, 2004 y se combinó con las elecciones parlamentarias."
 BLR_Energy_conflict: "Conflicto Energético Ruso-Bielorruso"
 BLR_Energy_conflict_desc: "El conflicto comenzó en diciembre de 2006, cuando Gazprom anunció el precio final del gas natural para la República de Bielorrusia en 105 dólares por 1.000 m3. Además, 75 dólares se pagarían en efectivo y Bielorrusia tendría derecho a pagar los 30 dólares restantes con acciones de Beltransgaz, cuyo importe se estimó en 5.000 millones de dólares."
 BLR_Decree_n3: "Decreto sobre el Parasitismo"
 BLR_Decree_n3_desc: "Nadie más va a vivir de las ayudas estatales. Es hora de que todos los ociosos trabajen."
 BLR_launch_own_satellite: "Lanzamiento de su Propio Satélite por Bielorrusia"
 BLR_launch_own_satellite_desc: "El satélite bielorruso de observación de la Tierra fue lanzado el 22 de julio de 2012 desde el cosmódromo de Baikonur en Kazajstán, en un grupo de cinco satélites: junto con los rusos Canopus-V y MKA-FKI (Zond-PP), el alemán TET-1 y el canadiense ADS-1B."
 BLR_gasification_country: "Finalización de la Gasificación del País"
 BLR_gasification_country_desc: "Completaremos la gasificación de nuestro país, algo que nuestros ciudadanos sin duda agradecerán."
 BLR_CJSC_Turkcell: "Acuerdo con Turkcell"
 BLR_CJSC_Turkcell_desc: "Se concretará un importante acuerdo entre nosotros y nuestros socios turcos: la venta de una participación mayoritaria en CJSC \"BeST\" a Turkcell. Esto abrirá una nueva vía de inversión en nuestro país."
 BLR_Anti_Corruption: "Campaña Anticorrupción"
 BLR_Anti_Corruption_desc: "Debemos derrotar la corrupción en nuestro país. Lo principal es no verse implicado."
 BLR_Punish_Shushkevich: "Castiguen a los compinches de Shushkevich"
 BLR_Punish_Shushkevich_desc: "Shushkevich nos dejó un legado en forma de sus leales en el gobierno. Es hora de deshacerse de ellos."
 BLR_State_Run_Capitalism: "Capitalismo dirigido por el Estado"
 BLR_State_Run_Capitalism_desc: "El Estado debería controlar completamente la política económica del país."
 BLR_reform_officers: "Apertura de nuevas escuelas de oficiales"
 BLR_reform_officers_desc: "Una de las prioridades de nuestras reformas militares es mejorar la formación de los oficiales."
 BLR_peace_rota: "Crear una Compañía de Mantenimiento de la Paz"
 BLR_peace_rota_desc: "Crearemos una unidad especial para participar en misiones de mantenimiento de la paz."
 BLR_Promote_new_officers: "Promover a Nuevos Oficiales"
 BLR_Promote_new_officers_desc: "Finalizaremos un conjunto de medidas para la transformación de nuestras fuerzas armadas, que se iniciaron en 1994."
 BLR_Internet_cencorship: "Censura en Internet"
 BLR_Internet_cencorship_desc: "Internet se ha convertido en una plataforma donde se discuten abiertamente ideas que buscan derrocar al gobierno. Es necesario controlar esto."
 BLR_kgb: "KGB"
 BLR_Batka_policy: "Censura en Internet"
 BLR_Batka_policy1: "Decreto sobre parasitismo"
 BLR_Batka_policy3: "Política de Internet de Belarús"
 BLR_Raiffeisen2: "Raiffeisen en Bielorrusia"
 BLR_Raiffeisen2_desc: "Fundado en 1989, Priorbank es una filial del Banco de la Reserva de la India (RBI) desde 2003. Es uno de los bancos privados locales más grandes y una de las instituciones financieras líderes del país en términos de eficiencia y rentabilidad. Como banco universal, presta servicios a clientes corporativos, pequeñas y medianas empresas, así como a particulares."
 BLR_Henkel2: "Henkel"
 BLR_Henkel2_desc: "La división de productos químicos para la construcción del consorcio Henkel en Bielorrusia, Henkel Bautechnik LLC, fue fundada en 2004 con el objetivo de organizar la producción de productos que sustituyan a las importaciones. En 2005, comenzó la construcción de una planta para la producción de mezclas para la construcción Ceresit en Zaslavl, cuya producción se inició en septiembre de 2006. La gama de productos de la empresa incluye más de 100 artículos, entre los que se incluyen revestimientos prefabricados, sistemas de aislamiento térmico y acabado de fachadas, sistemas de suelos e impermeabilización, materiales para la preparación de superficies para el acabado, selladores, espuma de montaje, \"clavos líquidos\" y yesos."
 BLR_Jeans_Revolution: "Revolución de los Jeans"
 BLR_Jeans_Revolution_desc: "Una manifestación masiva en el centro de Minsk y otras ciudades de Bielorrusia, que comenzó el 19 de marzo de 2006 en respuesta a las irregularidades cometidas por las autoridades en las elecciones presidenciales celebradas con anterioridad."
 BLR_reform_kolhoz: "Reformas de las Granjas Colectivas"
 BLR_reform_kolhoz_desc: "Es necesario reformar las explotaciones agrícolas colectivas para garantizar la estabilidad de nuestra agroindustria."
 BLR_Eastern_Partnership: "Asociación Oriental"
 BLR_Eastern_Partnership_desc: "La Asociación Oriental es un proyecto de la Unión Europea, cuyo principal objetivo declarado es desarrollar los lazos de integración de la Unión Europea con seis países de la antigua URSS: Azerbaiyán, Armenia, Bielorrusia, Georgia, Moldavia y Ucrania."
 BLR_Azarenok_case: "El caso de Igor Azarenok"
 BLR_Azarenok_case_desc: "Se sospechaba que el general Azarenok ejercía presión en favor de los intereses rusos en la República de Bielorrusia mediante sobornos y otros fraudes. ¿Deberíamos prestar atención a esto?"
 BLR_National_Library: "Nuevo Edificio de la Biblioteca Nacional"
 BLR_National_Library_desc: "El nuevo edificio de la Biblioteca Nacional de Bielorrusia, en cuya construcción participó todo el país, se inauguró a los usuarios el 16 de junio de 2006."
 BLR_delta_city: "Centro de Negocios 'Delta City'"
 BLR_delta_city_desc: "Durante la Exposición Nacional de Serbia en Minsk, se firmó un importante contrato para la construcción del centro de negocios Delta City y el desarrollo del territorio cercano a la Biblioteca Nacional, con una inversión total de varios miles de millones de euros (el promotor es Dana Holdings, propiedad de empresarios serbios)."
 BLR_Kal: "Comerciante conjunto de potasio"
 BLR_Kal_desc: "Propondremos a Rusia la creación de una sociedad anónima que será nuestro comerciante común de potasio."
 BLR_Kal2: "Cerrar una operación conjunta con potasio"
 BLR_Kal2_desc: "Los recientes procesos penales iniciados por nosotros contra empleados de la empresa rusa Uralkali, así como los abusos de autoridad por su parte, nos han obligado a disolver la sociedad mercantil conjunta y crear la nuestra propia."
 BLR_BRSM_desc: "La Unión de Jóvenes Republicanos de Bielorrusia es una asociación pública juvenil en la República de Bielorrusia. Es la asociación juvenil más grande del país y cuenta con el apoyo de Alexander Lukashenko. Sus actividades son financiadas por el estado."
 BLR_Potato_Empire: "Imperio de la Papa"
 BLR_Potato_Empire_desc: "Somos uno de los principales exportadores de papa del mundo. Nuestro país debería estar orgulloso de ello."
 BLR_Factory_Kommunarka: "Nacionalizar la Fábrica Kommunarka"
 BLR_Factory_Kommunarka_desc: "Nuestro Presidente considera que la privatización de la fábrica de confitería \"Kommunarka\" fue ilegal, por lo que se ha anunciado la nacionalización de esta empresa."
 BLR_Another_year: "Otro Año de Independencia"
 BLR_Another_year_desc: "Bielorrusia seguirá manteniendo su política de independencia."
 BLR_Migrant_crisis: "La Crisis Migratoria"
 BLR_Migrant_crisis_desc: "La crisis migratoria en la frontera de Bielorrusia surgió debido al flujo de migrantes ilegales, principalmente de Irak y Siria, en menor medida de Afganistán y de países africanos (según estadísticas del Servicio de Fronteras polaco) que intentan ingresar a países de la UE (Lituania, Letonia, Polonia)."
 BLR_gudermes: "Envían a OMON a entrenar en Gudermes, Chechenia"
 BLR_gudermes_desc: "Deberíamos echar un vistazo a esta famosa universidad de fuerzas especiales. Tal vez nuestros combatientes puedan mejorar sus habilidades."
 BLR_Another_Elections: "Y Otra Vez Elecciones"
 BLR_Another_Elections_desc: "Las próximas elecciones en nuestro país están a la vuelta de la esquina. ¿Quién ganará?"
 BLR_Bye_opposition: "Sin Misericordia para la Oposición"
 BLR_Bye_opposition_desc: "Hacemos lo que siempre hacemos: nos enfrentamos a la oposición con dureza y rapidez."
 BLR_Milk_war: "Guerras de la Leche"
 BLR_Milk_war_desc: "Una serie de deterioros en las relaciones entre Bielorrusia y Rusia, derivados de disputas sobre la exportación de productos lácteos a Rusia."
 BLR_jeans_revolution: "Revolución de los jeans"
 BLR_jeans_revolution_desc: "La población está descontenta con las próximas elecciones. Supuestamente, no creen en la victoria de Alexander Lukashenko. ¿Qué sucederá ahora?"
 BLR_Changes_Customs_policy: "Cambio de Política Aduanera"
 BLR_Changes_Customs_policy_desc: "Se han introducido nuevos cambios y restricciones para dificultar la importación de productos falsificados a nuestro país."
 BLR_whitelegion_case: "Caso de la Legión Blanca"
 BLR_whitelegion_case_desc: "Nuestros servicios especiales han informado sobre la intensa actividad de representantes de la Legión Blanca. Es necesario capturarlos y encarcelarlos."
 BLR_PolBel_Dplomatic_war: "Guerra Diplomática Polaco-Bielorrusa"
 BLR_PolBel_Dplomatic_war_desc: "A pesar del acercamiento entre ambos países, el conflicto con Polonia se está reavivando con la misma fuerza que tuvo en el pasado."
 BLR_project_bombel: "Proyecto BOMBEL"
 BLR_project_bombel_desc: "La Unión Europea ha destinado fondos para reforzar la frontera entre Bielorrusia y la UE frente a la entrada de inmigrantes ilegales. Nuestra labor consiste en decidir cómo utilizar estos fondos."
 BLR_Investing_Agro_industry: "Inversiones en la Agroindustria"
 BLR_Investing_Agro_industry_desc: "La agroindustria es un componente importante de la economía de nuestro país, y seguiremos aumentando las inversiones en este sector."
 BLR_fate_belarusian_church: "El Destino de la Iglesia Bielorrusa"
 BLR_fate_belarusian_church_desc: "Debemos decidir qué rumbo tomará nuestra iglesia."
 BLR_Pension_reform: "Reforma de Pensiones"
 BLR_Pension_reform_desc: "Es hora de llevar a cabo una reforma de las pensiones y aumentar la edad de jubilación."
 BLR_New_concept_security: "Nuevo Concepto de Seguridad Nacional"
 BLR_New_concept_security_desc: "Nuestro concepto de defensa necesita actualizarse, y realizaremos los cambios necesarios en nuestra legislación."
 BLR_Zimbabwe: "Viaje a Zimbabwe"
 BLR_Zimbabwe_desc: "Visitaremos Zimbabue para cerrar los contratos de suministro de nuestros productos."
 BLR_100dney: "100 ideas para Bielorrusia"
 BLR_100dney_desc: "El proyecto \"100 Ideas para Bielorrusia\" tenía como objetivo identificar a jóvenes superdotados y con talento, desarrollar sus actividades científicas y promover desarrollos innovadores prometedores."
 BLR_stroiotryad: "Reactivación de la brigada estudiantil de construcción"
 BLR_stroiotryad_desc: "Reviviremos la práctica de las Brigadas Estudiantiles de Construcción de la época soviética. Como incentivo, las eximiremos de impuestos."
 BLR_People_Militia: "Creación de la Milicia Popular"
 BLR_People_Militia_desc: "Estamos dispuestos a aprobar una ley para la creación de una milicia popular, que funcionará como una especie de reserva para la defensa territorial. En cada aldea deberá haber un grupo de personas entrenadas para contrarrestar al enemigo, con la posterior transformación en un movimiento partisano."
 BLR_Excursion_Warsaw: "Excursión a Varsovia"
 BLR_Excursion_Warsaw_desc: "Los combatientes de Wagner están incitando activamente a la gente y expresando su deseo de organizar una \"excursión\" a Varsovia. Podemos ayudarlos a organizarla. En teoría, cruzar la frontera desde nuestro territorio es posible, pero ¿nos declarará Polonia la guerra después?"
 BLR_azarenok_tv: "Nuevo propagandista de Lukashenko"
 BLR_azarenok_tv_desc: "Ahora, en televisión, se puede ver con frecuencia a un nuevo propagandista que habla en nombre de nuestro partido y convence a la gente de la rectitud de nuestras acciones."
 BLR_Wagner_arrest: "Situación con los PMCs Wagner"
 BLR_Wagner_arrest_desc: "Nuestros servicios especiales han arrestado a combatientes de la famosa empresa militar privada rusa Wagner. Debemos decidir qué hacer con ellos."
 BLR_decree_227: "Decreto Nº 227 “Sobre la prestación de servicios de seguridad”"
 BLR_decree_227_desc: "El nuevo decreto número 227 ha causado un gran revuelo en muchos medios de comunicación. Por primera vez, permitimos que una empresa privada acepte armas para la protección de instalaciones. ¿Esto realmente va a dar resultados?"
 BLR_Country_for_life: "País para Toda la Vida"
 BLR_Country_for_life_desc: "Nuestro gobierno ha decidido abordar la oposición con mayor astucia, atrayendo a sus figuras más destacadas a nuestro bando. Una de ellas es Sergey Tikhanovsky, organizador del proyecto \"País para la Vida\". Tras los acontecimientos posteriores, en lugar de arrestarlo, lo invitamos públicamente a formar parte del gobierno, donde podría contribuir al progreso de nuestro país. Esta estrategia dividirá a la propia oposición."
 BLR_Amendment_to_Constitution: "Cambios Serios en la Constitución"
 BLR_Amendment_to_Constitution_desc: "Nuestro líder permanente, Alexander Lukashenko, ha reconocido que el país necesita cambios radicales y que es hora de dejar atrás el poder presidencial exclusivo. Se ha anunciado un referéndum para modificar la constitución, según el cual el poder residirá mayoritariamente en el parlamento."
 BLR_army_on_streets_of_cities: "Protestas Masivas"
 BLR_army_on_streets_of_cities_desc: "El pueblo se ha rebelado contra nosotros. Creen que nuestro gobierno está falsificando los resultados electorales y arruinando el país. Espero que nos hayamos preparado bien para este tipo de situaciones."
 BLR_anti_lgbtqa_stance: "Política anti-LGBT"
 BLR_Pazniak: "Nacionalistas bielorrusos"
 BLR_Pazniak_desc: "Las fuerzas nacionalistas han tomado el poder en el país. ¿Adónde conducirán a Bielorrusia: hacia un futuro mejor o hacia el colapso del país?"
 BLR_rofeign_legion: "La legión extranjera"
 BLR_rofeign_legion_desc: "Nos inspiraremos en la experiencia francesa y crearemos nuestra propia legión extranjera."
 BLR_debur: "Desburocratización"
 BLR_debur_desc: "Reduciremos el gasto en funcionarios y disminuiremos su número, y los fondos liberados se destinarán al beneficio del pueblo."
 BLR_patriotism_desc: "Es hora de elevar el nivel de la educación patriótica en nuestro país."
 BLR_Belarusisation: "Bielorrusización"
 BLR_Belarusisation_desc: "Toda la literatura y todos los títulos oficiales deben estar en bielorruso."
 BLR_Democratic_clean: "Purgas de los demócratas"
 BLR_Democratic_clean_desc: "No nos vamos a convertir en sirvientes de Occidente. Es hora de purgar nuestro país de demócratas."
 BLR_Communistst_clean: "Purga de comunistas"
 BLR_Communistst_clean_desc: "El legado de la URSS debe ser destruido. Es hora de expulsar a estos seguidores del contagio rojo."
 BLR_denied_rus_language: "Lengua rusa denegada"
 BLR_denied_rus_language_desc: "El ruso dejará de ser el segundo idioma oficial del Estado. Ya estamos hartos de la ocupación rusa."
 BLR_anti_immigration_policies: "Políticas anti-inmigratorias"
 BLR_anti_immigration_policies_desc: "La aplicación de políticas antiinmigración más estrictas mantendrá viva y fuerte la identidad bielorrusa."
 BLR_russofobia: "Política antirrusa"
 BLR_russofobia_desc: "Es hora de hacer frente al enemigo común: Rusia. Es hora de frenar sus ambiciones imperialistas hacia nosotros."
 BLR_decolectivisation: "Descolectivización"
 BLR_decolectivisation_desc: "Es hora de deshacerse del legado soviético y ayudar a la población a trasladarse a las ciudades."
 BLR_litvins_past: "El pasado de Litvin"
 BLR_litvins_past_desc: "La historia no se puede cambiar y lo sabemos. Los lituanos somos los orgullosos herederos del Gran Ducado de Lituania."
 BLR_constitution_from_1994: "Constitución de 1994"
 BLR_constitution_from_1994_desc: "Es hora de restaurar una constitución adecuada en nuestro país."
 BLR_We_not_energy_slave: "No somos esclavos de los recursos rusos"
 BLR_We_not_energy_slave_desc: "Rusia solo ofreció descuentos para apoyar a su régimen títere. Basta ya. Estamos listos para construir una economía fuerte sin esos descuentos."
 BLR_Influence_nationalists: "Influencia de los nacionalistas"
 BLR_Influence_nationalists_desc: "Debemos apoyar activamente los movimientos nacionalistas en los países vecinos."
 BLR_Territorial_claims: "Reivindicaciones territoriales"
 BLR_Territorial_claims_desc: "Nuestro país debe volver a sus verdaderas fronteras."
 BLR_white_legion_desc: "La Legión Blanca es una organización deportiva y patriótica de Bielorrusia, fundada en 1995 para la formación pre-reclutamiento y la educación patriótica de los jóvenes."
 BLR_white_legion_battalion: "Batallón de la Legión Blanca"
 BLR_white_legion_battalion_desc: "Finalmente se ha formado el primer batallón de la Legión Blanca. Verdaderos patriotas de su país están listos para luchar por su libertad y fortaleza."
 BLR_GDL: "Gran Ducado de Lituania"
 BLR_GDL_desc: "Es hora de restaurar el gran estado del pueblo Litvinov. Por fin, nuestro pueblo no estará bajo el yugo de una superpotencia; tendrá la oportunidad de convertirse en una superpotencia por derecho propio."
 BLR_help_silesians: "Ayuda a los separatistas de Silesia"
 BLR_help_silesians_desc: "La estrategia de dividir para reinar es el principio fundamental que aplicaremos en nuestra política hacia Polonia. Cuando comience la fase activa de someter a los polacos a nuestro control, los silesios podrían facilitar nuestra conquista de ese país."
 BLR_revansh_return: "Revivir el Praviy Revansh"
 BLR_revansh_return_desc: "Praviy Revansh fue una organización nacionalista de la década de 1990 que profesaba una retórica antipolaca y antirusa, y abogaba por la creación de organizaciones paramilitares inspiradas en las ucranianas."
 BLR_blackcat: "Revivir al gato negro"
 BLR_blackcat_desc: "El Gato Negro fue una importante organización partisana que operó en territorio bielorruso durante cuarenta años, luchando por la independencia contra el gobierno soviético. Sus métodos nos serán de gran utilidad para defendernos de las invasiones enemigas."
 BLR_lith_again: "De regreso a Zemaitija"
 BLR_lith_again_desc: "Ha llegado el momento de completar la reconstrucción de nuestro poderoso Estado. Una Lituania pequeña y débil se interpone en nuestro camino; la doblegaremos. Pero no podemos atacar el país sin justificación; debemos crear las condiciones necesarias y un pretexto para que nuestra invasión no parezca infundada."
 BLR_true_political_and_national_freedom: "Verdadera Libertad Política"
 BLR_true_political_and_national_freedom_desc: "La verdadera libertad política comienza con la recuperación de la devastación causada por nuestras purgas internas. Es hora de avanzar y alcanzar lo que nuestro pueblo realmente anhela."
 BLR_Taler_ruble: "Táler Bielorruso"
 BLR_Taler_ruble_desc: "Debemos abandonar el rublo por completo y sustituirlo por nuestra nueva moneda."
 BLR_National_science: "Ciencia Nacional"
 BLR_National_science_desc: "Como estado independiente, comenzaremos a desarrollar nuestra propia ciencia y economía."
 BLR_create_nationalsecurity: "Crear nuevos departamentos"
 BLR_create_nationalsecurity_desc: "En lugar del KGB, un legado de la URSS, crearemos dos nuevas estructuras: el Servicio de Seguridad Nacional y el Servicio Nacional de Inteligencia."
 BLR_Delete_KGB: "Disolver el KGB"
 BLR_Delete_KGB_desc: "La KGB debería disolverse y ser reemplazada por una nueva estructura."
 BLR_Reform_Police: "Reforma Policial"
 BLR_Reform_Police_desc: "La milicia soviética era una reliquia del pasado de la que queremos deshacernos. La estamos reorganizando para convertirla en una fuerza policial nacional, siguiendo el modelo de la de Polonia."
 BLR_attack_russian_bear: "Acabar con el oso ruso"
 BLR_attack_russian_bear_desc: "Finalmente, nuestro principal enemigo será destruido."
 BLR_zmagar_army: "Reforma del ejército"
 BLR_zmagar_army_desc: "Nuestro ejército necesita una reforma urgente. Mientras estábamos ocupados con la transformación sociopolítica de nuestro país, nuestras fuerzas armadas se debilitaron gravemente."
 BLR_Young_Front_desc: "El Frente Joven es un movimiento juvenil internacional de jóvenes bielorrusos y una organización juvenil de oposición de Bielorrusia."
 BLR_south_river_battalion: "Batallón South River"
 BLR_south_river_battalion_desc: "Un batallón formado por residentes de los Estados Unidos del condado de South River."
 BLR_territorial_reform: "Reforma Territorial"
 BLR_territorial_reform_desc: "En lugar de las seis regiones y 110 distritos actuales, Zenon Poznyak y el equipo de autores del programa proponen dividir el país en 16 voivodatos, además de Minsk por separado. Los voivodatos, a su vez, se dividirán en 60 provincias y 270 ciudades antiguas."
 BLR_anti_lgbt: "Prohibición de la Propaganda de Relaciones Perversas"
 BLR_anti_lgbt_desc: "Estamos adoptando una ley sobre la prioridad y protección de la familia, el matrimonio (unión de un hombre y una mujer), la maternidad, y sobre la protección de la familia contra intromisiones y interferencias en los asuntos familiares por parte de la ideología y las organizaciones. Además, se propone aprobar una ley \"sobre la protección de la naturaleza humana\" y prohibir la propaganda de relaciones perversas contrarias a la naturaleza humana."
 BLR_latgale_or_war: "Latgale o Guerra"
 BLR_latgale_or_war_desc: "Latgale formó parte en su día del Gran Ducado de Lituania. Ha llegado el momento de devolver estas tierras a nuestro Estado. Es poco probable que Letonia pueda oponerse."
 BLR_legacy_kurland: "Legado del Ducado de Curlandia"
 BLR_legacy_kurland_desc: "El Ducado de Curlandia fue en su día un importante centro de colonización. Su bandera ondeó sobre Trinidad y Tobago y a lo largo de la costa de Gambia. Como legítimos sucesores del Ducado, ha llegado el momento de reclamar estos territorios para nuestro imperio e reintegrarlos a nuestra nación."
 BLR_pro_poland_propoganda: "Propaganda pro-bielorrusa en Polonia"
 BLR_pro_poland_propoganda_desc: "Debemos aumentar nuestra influencia en Polonia mediante la propaganda y otros medios de interacción."
 BLR_Dismiss_soviet_officers: "Despedir a los oficiales pro-soviéticos"
 BLR_Dismiss_soviet_officers_desc: "La lucha contra el legado soviético también debe extenderse al ejército. No necesitamos generales que simpaticen con ese régimen sangriento."
 BLR_Anti_corruption_law: "Ley Anticorrupción"
 BLR_Anti_corruption_law_desc: "Lucharemos contra la corrupción en todas sus manifestaciones."
 BLR_open_border_with_pol: "Apertura de Fronteras"
 BLR_open_border_with_pol_desc: "La apertura de las fronteras ayudará a que nuestros pueblos se sientan conectados no solo económicamente, sino también físicamente."
 BLR_training_for_pol: "Ejercicios militares conjuntos"
 BLR_training_for_pol_desc: "Nuestros ejércitos necesitan coordinación en combate. Los ejercicios militares conjuntos serán de gran ayuda en este sentido."
 BLR_Asseco_Poland: "Asseco Polonia"
 BLR_Asseco_Poland_desc: "Compraremos esta empresa y la convertiremos en propiedad de nuestro futuro estado de bielorrusos y polacos."
 BLR_ynia_Poland: "La Segunda Unión de Lublin"
 BLR_ynia_Poland_desc: "Es hora de recordar lo humillante que fue la Unión de Lublin para el Gran Ducado de Lituania. Esta vez, será diferente."
 BLR_Ukraine_way: "Amistad con Ucrania"
 BLR_Ukraine_way_desc: "A pesar de nuestras reivindicaciones territoriales, estamos dispuestos a dialogar con Ucrania contra enemigos comunes. Quizás sea posible forjar una alianza que ayude a nuestros estados a sobrevivir rodeados de adversarios."
 BLR_Join_GUAM_to_Ukraine: "Unirse a GUAM"
 BLR_Join_GUAM_to_Ukraine_desc: "Uno de nuestros primeros pasos amistosos hacia Ucrania será unirnos a GUAM, una organización en la que Ucrania desempeña un papel de liderazgo."
 BLR_training_with_ukr: "Ejercicios militares conjuntos"
 BLR_training_with_ukr_desc: "Estamos dispuestos a proponer al ejército ucraniano ejercicios conjuntos para practicar maniobras y coordinar tropas."
 BLR_military_coop_with_ukraine: "Cooperación militar-tecnológica"
 BLR_military_coop_with_ukraine_desc: "Estamos dispuestos a establecer cooperación técnico-militar con el complejo militar-industrial ucraniano."
 BLR_Intermarium: "Intermarium"
 BLR_Intermarium_desc: "Es hora de que nos unamos a Ucrania en una poderosa alianza para hacer frente juntos a nuestros enemigos."
 BLR_Intermarium_poland: "Intermarium"
 BLR_Intermarium_poland_desc: "Es hora de que nos unamos a Polonia en una poderosa alianza para hacer frente juntos a nuestros enemigos."
 BLR_Ukraine_enemy: "Aprovechar las tierras ucranianas"
 BLR_Ukraine_enemy_desc: "Históricamente, estas tierras pertenecieron al Gran Ducado de Lituania. Ningún falso vínculo de amistad debería impedirnos devolverlas a nuestro gran estado."
 BLR_Sovereign_Internet: "Internet soberano"
 BLR_Sovereign_Internet_desc: "Debemos hacer que nuestro espacio de Internet sea completamente independiente de otros países para que no puedan influir en nuestros ciudadanos."
 BLR_Expand_Mozyr_Refinery: "Expandir la Refinería de Petróleo de Mozyr"
 BLR_Expand_Mozyr_Refinery_desc: "Ampliaremos esta refinería de petróleo."
 BLR_Belshina: "JSC Belshina"
 BLR_Belshina_desc: "JSC Belshina es un fabricante de neumáticos para automóviles. Produce neumáticos para turismos, camiones, vehículos pesados, vehículos de construcción vial y elevación, vehículos eléctricos, autobuses, tractores y maquinaria agrícola."
 BLR_Expand_Naftan_Refinery: "Expandir la Refinería de Petróleo de Naftan"
 BLR_Expand_Naftan_Refinery_desc: "Ampliaremos esta refinería de petróleo."
 BLR_Expansion_Okolovsky_Novoselkovsky: "Expansión de la producción de minerales en los yacimientos de Okolovsky y Novoselkovsky"
 BLR_Expansion_Okolovsky_Novoselkovsky_desc: "La ampliación de la producción de mineral de los yacimientos de Okolovsky y Novoselkovsky nos aportará grandes cantidades de acero."
 BLR_Problem_duying_vilages: "Problema de los pueblos en declive"
 BLR_Problem_duying_vilages_desc: "Es hora de que nuestro estado decida qué hacer con los pueblos moribundos."
 BLR_Economic: "Economía bielorrusa"
 BLR_Economic_desc: "Necesitamos desarrollar nuestra economía y estamos tomando una serie de medidas para lograrlo con éxito."
 BLR_metro_minsk: "Ampliación del metro de Minsk"
 BLR_metro_minsk_desc: "Mejoraremos y ampliaremos el metro de Minsk para optimizar las características logísticas de la ciudad."
 BLR_it_industries_help: "Ayuda a desarrolladores informáticos nacionales"
 BLR_it_industries_help_desc: "Es necesario apoyar a nuestro sector de TI con todo lo que podamos; este es el futuro de nuestro país."
 BLR_viber: "Viber"
 BLR_viber_desc: "Viber es una aplicación de mensajería que permite enviar mensajes, realizar llamadas de voz y video a través de Internet. Viber tiene la capacidad de enviar mensajes de texto, voz y video, documentos, imágenes, videos y archivos, así como funcionar sin conexión a Internet. Promover el uso de Viber en nuestro país puede mejorar la comunicación y conectividad de nuestros ciudadanos."
 BLR_wot: "Mundo de tanques"
 BLR_wot_desc: "World of Tanks es un juego en línea masivo multijugador dedicado a vehículos blindados de mediados del siglo XX. Los jugadores tienen a su disposición más de 40 mapas de batalla creados en base a ubicaciones reales de la Segunda Guerra Mundial, y equipos históricos de 11 naciones con un total de más de 600 unidades. Promover y apoyar juegos como World of Tanks puede fomentar el desarrollo de la industria del entretenimiento digital en nuestro país."
 BLR_russian_gazprom: "Gazprom"
 BLR_russian_gazprom_desc: "Gazprom es un actor importante en el mercado del gas y el petróleo. Debemos establecer la cooperación más estrecha posible con ellos."
 BLR_BPS_Sberbank: "BPS Sberbank"
 BLR_BPS_Sberbank_desc: "BPS Sberbank es una sucursal del Sberbank ruso en nuestro territorio. Establecer una sólida cooperación con BPS Sberbank puede fortalecer nuestro sistema bancario y promover el desarrollo económico en el país."
 BLR_Belgazprombank: "lgazprombank"
 BLR_Belgazprombank_desc: "Belgazprombank es una sucursal de Gazprombank en Bielorrusia. La cooperación con Belgazprombank puede fortalecer nuestros lazos económicos con Rusia y promover el desarrollo de proyectos conjuntos en diversos sectores."
 BLR_Development_domestic_tourism: "Desarrollo del turismo nacional"
 BLR_Development_domestic_tourism_desc: "Vemos un fuerte potencial en el turismo interno. En este sentido, cada diputado contribuirá al desarrollo del turismo en su distrito. La tarea principal es crear una infraestructura adecuada y promover los atractivos turísticos de nuestro país para atraer a visitantes nacionales y extranjeros."
 BLR_private_railways: "Empresas ferroviarias privadas"
 BLR_private_railways_desc: "Transferiremos las vías férreas a empresas privadas."
 BLR_Lith_pol_railways: "Conexión ferroviaria con Polonia y Lituania"
 BLR_Lith_pol_railways_desc: "Tenemos la intención de construir una conexión ferroviaria de alta calidad con estos países, lo que nos dará acceso a productos europeos."
 BLR_JSC_russian_railways: "Ferrocarriles rusos"
 BLR_JSC_russian_railways_desc: "Ahora estamos plenamente integrados con los Ferrocarriles Rusos."
 BLR_belavia: "Belavia"
 BLR_belavia_desc: "Belavia es la aerolínea estatal bielorrusa con sede en Minsk. Se formó en 1996 y opera vuelos internacionales regulares y chárter desde el Aeropuerto Nacional de Minsk. Promover y fortalecer a Belavia puede mejorar nuestra conectividad aérea, atraer más turistas y estimular el desarrollo económico en el sector de la aviación."
 BLR_Danone: "Danone"
 BLR_Danone_desc: "Empresa alimentaria francesa, reconocida fabricante de productos lácteos y otros productos alimentarios."
 BLR_Godel_tech: "Tecnologías Gödel"
 BLR_Godel_tech_desc: "Empresa británica que proporciona soluciones de desarrollo de software a empresas líderes del Reino Unido con sede en Manchester. Promover la colaboración con Godel Technologies puede impulsar el crecimiento de la industria de tecnología de la información en nuestro país y fomentar la transferencia de conocimientos y tecnología."
 BLR_Basf_tech: "BASF Sociedad Europea"
 BLR_Basf_tech_desc: "BASF Societas Europaea es la mayor empresa química de Alemania, Europa y el mundo. Tiene su sede en la ciudad de Ludwigshafen en Renania-Palatinado, en el suroeste de Alemania. La colaboración con BASF puede brindar oportunidades de inversión, transferencia de tecnología y desarrollo conjunto en el sector químico y de materiales en Bielorrusia."
 BLR_royal_dutch_shell: "Royal Dutch Shell"
 BLR_royal_dutch_shell_desc: "Shell es una compañía británico-holandesa de petróleo y gas."
 BLR_mts: "MTS"
 BLR_mts_desc: "MTS es una empresa rusa que presta servicios de telecomunicaciones, servicios digitales y multimedia en Rusia, Armenia y Bielorrusia bajo la marca comercial \"MTS\". La empresa ofrece servicios de telefonía móvil (en los estándares UMTS (3G), 4G, LTE y 5G), telefonía fija, acceso a internet de banda ancha, televisión móvil, televisión por cable, televisión por satélite, televisión digital, servicios de contenido multimedia y de entretenimiento, servicios financieros, así como soluciones de TI convergentes en el ámbito del Internet de las Cosas, la monitorización, la automatización de procesos, el procesamiento de datos y la computación en la nube."
 BLR_belarus_support_category: "Tropas auxiliares de Bielorrusia"
 BLR_ter_oboronaup_start: "Llamado a tropas de defensa territorial"
 BLR_internalup_start: "Convocatoria para la creación de una tercera brigada especial independiente"
 BLR_whitelegion_battalion_category: "Legión Blanca"
 BLR_whitelegion_battalion_category_desc: "La Legión Blanca es una organización deportiva y patriótica bielorrusa que se transformó en una organización militar. Surgió a principios de la década de 1990 y se encargó de mantener el orden en reuniones y manifestaciones de la oposición. Sus miembros fueron entrenados como fuerzas especiales y recibieron una boina de acero similar a la carmesí. Además, se les impartió un profundo conocimiento de la historia de Bielorrusia."
 BLR_white_legion_battalion_create: "Crea un Batallón de la Legión Blanca"
 BLR_white_legion_recruit_youngfront: "Recluta graduados del Frente Joven"
 BLR_white_legion_recruit_people: "Reclutar ciudadanos leales"
 BLR_white_legion_recruit_revansh: "Reclutar miembros de la organización \"Praviy Revansh\""
 BLR_white_legions_TT: "¡El número de reclutas cambiará en §Y[?modify_white_legion]§!\n"
 BLR_whitelegion_recruit_2000: "El número de reclutas disponibles es 2000."
 BLR_pol_revol_category: "Llevar al poder a los nacionalistas que necesitamos en Polonia"
 BLR_pol_revol_category_desc: "Debemos vengarnos de Polonia por todos los años que intentó destruir nuestra independencia, por la humillante Unión de Lublin y por la división de nuestro país en el siglo XX. Haremos que el pueblo polaco se vea obligado a obedecernos."
 BLR_Establish_cooperation_pol: "Establecer lazos con los nacionalistas polacos"
 BLR_podlasie_return: "Recuperar Bialystok para Bielorrusia"
 BLR_podlasie_return_desc: "Bialystok siempre ha sido tierra habitada por bielorrusos. Es hora de recuperar esta tierra de manos de los polacos y devolverla al Estado bielorruso."
 BLR_Duchy_claims_category: "Reclamaciones territoriales"
 BLR_Duchy_claims_category_desc: "Recordamos bien la historia del Gran Ducado de Lituania y todos los territorios que estuvieron bajo su dominio. Reivindicaremos nuestros derechos territoriales sobre todos nuestros antiguos territorios."
