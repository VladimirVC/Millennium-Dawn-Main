 news.91.t: "Sri Lankan Civil War Ends"
 news.91.d: "El gobierno de Sri Lanka ha declarado la victoria total sobre los Tigres de Liberación de Tamil Eelam. En una serie final de ofensivas en el noreste, las fuerzas gubernamentales conquistaron los últimos bastiones de los Tigres. En los últimos días de la guerra, los combatientes tamiles restantes quedaron cercados en las lagunas y selvas de Mullaitivu. Sin posibilidad de escape, cualquier intento de huida por mar fue interceptado. Según informes, la cúpula de los Tigres, considerada intocable durante mucho tiempo, fue asesinada en las últimas horas del conflicto. En un discurso ante el parlamento, el presidente [SRI.GetName] proclamó que la nación había sido \"liberada del terrorismo\". Por ahora, la bandera del león ondea sin oposición en toda la isla."
 news.91.a: "Peace… at a price."
 news.92.t: "Liberación de Eelam por los Tigres Tamiles"
 news.92.d: "Lo que una vez fue una guerra de desgaste ha concluido. Los Tigres de Liberación de Tamil Eelam han triunfado. En los últimos días del conflicto, los últimos bastiones del Estado de Sri Lanka en las tierras de Tamil Eelam se derrumbaron bajo un ataque implacable. Las líneas de suministro se desmoronaron, las pistas de aterrizaje ardieron y el otrora formidable ejército se encontró cercado y abandonado. Los Tigres de Tamil Eelam se impusieron desde la jungla no como insurgentes, sino como líderes. El sueño de Tamil Eelam, escrito con sangre y sacrificio, se ha hecho realidad por fin."
 news.92.a: "Interesting."