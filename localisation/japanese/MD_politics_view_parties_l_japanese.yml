 TOG.liberalism: "£generic_liberalism_small (CPP) Pan-African Patriotic Convergence"
 TOG.liberalism_desc: "(Liberal Pan-Africanism) - The CPP was founded by Edem Kodjo in 1999 as a merger of four smaller parties. The party itself is dominated by its leader, Edem Kodjo, with little electoral success of its own and ideologically aligns with a more moderate Pan-African ideology. Kodjo himself has been active in politics since the late 70s, even serving as Secretary General of the Organisation of African Unity."
 TOG.socialism: "£generic_socialism_small (UFC) Union of Forces for Change"
 TOG.socialism_desc: "(Right Social Democracy) - The Union of Forces for Change was formed in 1992 as a grouping of several parties and initially primarily served as a political vehicle for its founder Gilchrist Olympio. the party itself follows a standard, moderate, social democratic ideology and through Olympio has attempted to remain a dominant force within the opposition in Togo."
 TOG.anarchist_communism: "£generic_anarchist_communism_small (CST) Let's Save Togo Collective"
 TOG.anarchist_communism_desc: "(Broad Left) - Created as a union of several left-wing parties, the Let's Save Togo Collective unifies the various left-wing political forces within it under a united banner of progressive change and democratic reform. The group has been active in organizing against percieved corruption and autocracy within the nation."
 TOG.Neutral_Autocracy: "£generic_Neutral_Autocracy_small (RPT)トーゴ人民連合"
 TOG.Neutral_Autocracy_desc: "民族主義的汎アフリカ主義 - 1969年にナシンベ・エヤデマの政治的基盤として結成されたトーゴ人民連合（RPT）は、1979年から1991年まで、トーゴ唯一の合法政党として同国を支配した。民主化移行後、同党は一時的に禁止されたが、旧政権に忠実な軍の一部が新政府にRPTへの譲歩を強いた。イデオロギー的には、同党はエヤデマを中心に据え、彼の独裁的かつ汎アフリカ主義的なポピュリスト思想と統治を支持している。"
 TOG.Neutral_Autocracy_2012: "£generic_Neutral_Autocracy_small (UNIR) 共和国連合"
 TOG.Neutral_Autocracy_2012_desc: "国民保守主義 - 2012年にトーゴ人民連合（RPT）の後継政党として結成された共和国連合は、前身政党が持っていた個人崇拝的な傾向から距離を置こうとしている。しかし、イデオロギー的には依然としてRPTと類似しており、独裁的な傾向が見られ、社会・経済問題においては極めて右寄りの立場をとっている。"
 TOG.Neutral_conservatism: "£generic_Neutral_conservatism_small (NET) New Togolese Commitment"
 TOG.Neutral_conservatism_desc: "(Big Tent) - A member of the left-wing Rainbow Alliance, New Togolese Commitment is itself one of the larger opposition parties within the nation. The party stands against autocracy and advocates for democratic reform within the nation."
 TOG.Neutral_green: "£generic_Neutral_green_small (ANC) 変革国民連合"
 TOG.Neutral_green_desc: "進歩主義 - 大規模な「変革勢力連合」から分裂した「変革国民連合」は、トーゴ国内における独裁体制への反対を主軸とする進歩的な政策綱領を掲げている。同党はトーゴの野党勢力として活動を続け、他の政党と連携しながら、自らの政策課題の中でも特に改革的な要素の実現に取り組んでいる。"
 TOG.neutral_Social: "£generic_neutral_Social_small (CAR) Action Committee for Renewal"
 TOG.neutral_Social_desc: "(Progressivism) - Organized initially as the pro-democracy Front of Associations for Renewal, the modern form of the party arose in 1991. Founded by human rights lawyer and pro-democracy advocate Yawovi Agboyibo, the party puts a heavily focus on its anti-autocractic positions even with the official end of one-party rule."
 TOG.neutral_Social_2012: "£generic_neutral_Social_small Rainbow Alliance"
 TOG.neutral_Social_2012_desc: "(Broad Left) - Formed in 2012, the Rainbow Alliance is a coalition of several left-wing, reformist, and pro-democracy parties within Togo united under the common banner of working towards a free and democratic nation. The coalition seeks to strengthen the opposition, offering a more clear and coherent platform and vision."
 TOG.Nat_Autocracy: "£generic_Nat_Autocracy_small (FAT) トーゴ軍"
