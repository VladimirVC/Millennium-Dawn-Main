 korea_russia.21.t: "우리의 노동자를 고용한 러시아"
 korea_russia.21.d: "우리는 러시아와 건설 공사 지원을 위해 다수의 우리 노동자를 고용하는 협정을 체결했습니다. 러시아 측이 넉넉한 임금을 지급하기 때문에 우리에게 그 무엇보다도 유리한 조건입니다."
 korea_russia.21.a: "좋아"
 korea_russia.22.t: "북한과의 군사 훈련"
 korea_russia.22.d: "조선인민군 총참모부가 우리 군대의 힘을 과시하고 무력의 합동력을 시험하기 위해 합동 군사 훈련을 제안하고 있습니다."
 korea_russia.22.a: "정말 훌륭한 생각이다"
 korea_russia.22.b: "거절한다"
 korea_russia.23.t: "러시아와의 군사 훈련"
 korea_russia.23.d: "러시아 총참모부가 양국 군대의 합동 군사 훈련 개최에 동의했습니다."
 korea_russia.23.a: "매우 좋군!"
