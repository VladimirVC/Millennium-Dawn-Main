 BLR_140zadov_category: "140-й ремонтный завод"
 BLR_140zadov_category_desc: "140-й ремонтный завод — государственное предприятие военно-промышленного комплекса Беларуси, специализирующееся на ремонте и модернизации бронетехники и её двигателей."
 BLR_140_btr60: "БТР-60МБ1"
 BLR_140_btr60_desc: "Один из белорусских вариантов модернизации советского бронетранспортёра БТР-60ПБ."
 BLR_140_btr70: "БТР-70МБ1"
 BLR_140_btr70_desc: "Один из белорусских вариантов модернизации советского бронетранспортёра БТР-70."
 BLR_140_kobra_k: "Кобра-К"
 BLR_140_kobra_k_desc: "Один из белорусско-словацких вариантов модернизации советского бронетранспортёра БТР-70."
 BLR_soviet_system: "Национал-большевистская Беларусь"
 BLR_soviet_system_desc: "Национал-большевики захватили власть в стране и готовы начать свои первые экономические реформы. Одной из них станет возвращение к советской экономической системе, учитывая неудачный опыт предыдущего правителя."
 BLR_free_weapon: "Свободное ношение оружия"
 BLR_free_weapon_desc: "Мы позволим нашим гражданам свободно носить оружие в стране. Они имеют право на самооборону!"
 BLR_new_church: "Новая религия"
 BLR_new_church_desc: "Пришло время создать новую религию, которая будет служить интересам нашего государства!"
 BLR_reform_education: "Реформа образования"
 BLR_reform_education_desc: "Образовательная система находится в плачевном состоянии; мы исправим это и внесём серьёзные изменения. Одной из новаций станет сокращение времени обучения школьников и студентов, чтобы быстрее подготовить их к полноценной жизни граждан."
 BLR_ruralisation: "Рурализация"
 BLR_ruralisation_desc: "Тенденция XXI века - переселение людей в города из деревень, мы же обратим эту тенденцию вспять и предложим бедным или бездомным отправиться в деревни, взамен стимулируя их деятельность в новых жилищах."
 BLR_revoult_army: "Революционная армия"
 BLR_revoult_army_desc: "Наша армия показала себя не в лучшем свете. Ей нужны люди, пылающие страстью к революции, готовые броситься под вражеский пулемет ради родины."
 BLR_revoult_army_zeks: "Разрешить набор заключённых в армию"
 BLR_revoult_army_zeks_desc: "Мы начнём вербовать заключённых в армию, распределяя их по отдельным батальонам. Прекратите кормить заключённых — они должны подпитывать пламя революции!"
 BLR_revoult_rne: "Пригласить Русское национальное единство"
 BLR_revoult_rne_desc: "Мы официально включим представителей этой националистической организации в правительственные структуры."
 BLR_revoult_sobor: "Пригласить Славянский собор Белой Руси"
 BLR_revoult_sobor_desc: "Мы официально включим представителей этой националистической организации в правительственные структуры."
 BLR_revoult_army_volunteer: "Революционный дух"
 BLR_revoult_army_volunteer_desc: "Некоторые из наших солдат настолько жаждут воевать, что готовы отправиться в другую страну. Возможно, нам не следует сдерживать их рвение и отправить их исполнять свой международный долг?"
 BLR_revoult_army_gco: "Стражи коммунизма — православные"
 BLR_revoult_army_gco_desc: "Мы создадим свою уникальную армию по аналогии с иранским корпусом Стражей Ислама — их опыт произвёл на нас большое впечатление. Новая армия будет называться Стражи Коммунизма Православные."
 BLR_work_army: "Армия рабочих"
 BLR_work_army_desc: "Мы отправим всех безработных на производство, наладив выпуск необходимых нашему государству товаров в первую очередь."
 BLR_revoult_army_gco_ground_force: "Сухопутные войска"
 BLR_revoult_army_gco_ground_force_desc: "Основной и самый многочисленный род войск в составе Стражей Коммунизма Православных. В мирное время вооружены лёгким оружием. Основное назначение: внутренняя безопасность; второстепенное — внешняя оборона совместно с регулярными вооружёнными силами Беларуси."
 BLR_revoult_debur: "Дебюрократизация"
 BLR_revoult_debur_desc: "Мы сократим расходы на чиновников и уменьшим их численность, а высвободившиеся средства пойдут на благо народа."
 BLR_revoult_army_gco_anti_corrupt: "Революционный антикоррупционный комитет"
 BLR_revoult_army_gco_anti_corrupt_desc: "Мы создадим специальное подразделение для борьбы с коррупцией в нашей стране. Никто не уклонится от правосудия."
 BLR_revoult_dsocial: "Социальная поддержка"
 BLR_revoult_dsocial_desc: "Мы усилим социальную поддержку наших граждан! Никто не останется без помощи."
 BLR_revoult_army_agro_invest: "Развитие агропромышленного комплекса"
 BLR_revoult_army_agro_invest_desc: "Мы должны вложить как можно больше средств в развитие нашей агропромышленности!"
 BLR_revoult_army_gco_air: "ВВС"
 BLR_revoult_army_gco_air_desc: "Мы создадим авиационное подразделение и предоставим нашим сотрудникам национальной охраны возможность использовать авиацию для достижения своих целей."
 BLR_revoult_army_gco_drone: "Дроновые войска"
 BLR_revoult_army_anti_west: "Антизападная доктрина"
 BLR_revoult_army_anti_west_desc: "Западная цивилизация всегда была и всегда будет нашим врагом, вечно стремящимся к нашему уничтожению."
 BLR_revoult_army_interbrigade: "Интербригады"
 BLR_revoult_army_interbrigade_desc: "Мы намерены сформировать межбригадные подразделения, которые направим за границу для защиты наших интересов."
 BLR_kgb_expanded: "Расширить КГБ"
 BLR_kgb_expanded_desc: "Мы усилим влияние КГБ, поскольку не намерены распускать столь эффективный инструмент государственной безопасности."
 BLR_army_stabilize: "Стабилизировать армию"
 BLR_army_stabilize_desc: "В наших будущих целях нам необходимо восстановить боеспособность армии."
 BLR_prepare_attacks: "Подготовка к интервенциям"
 BLR_prepare_attacks_desc: "Наша армия готова. Мы собрали внушительную силу и готовы расширить влияние нашей страны на территории бывшего СССР."
 BLR_baltic_campaign: "Балтийская кампания"
 BLR_baltic_campaign_desc: "Мы начнём подготовку к военной кампании в странах Балтии. Эти страны не имеют права на независимость или существование!"
 BLR_baltic_war: "Начать Балтийский марш"
 BLR_baltic_war_desc: "Наша армия заняла позиции и готова начать наступление на страны Балтии."
 BLR_ukraine_campaign: "Украинская кампания"
 BLR_ukraine_campaign_desc: "Наш южный сосед демонстрирует признаки присоединения к враждебному нам военно-политическому блоку, что может привести к нападению на нас. Мы должны нанести удар первыми!"
 BLR_ukraine_campaign_border_prepare: "Укрепить границу с Украиной"
 BLR_ukraine_campaign_border_prepare_desc: "Несмотря на то, что мы атакуем, нам следует подготовиться к возможным контрмерам и построить укрепления на границе."
 BLR_poland_campaign_border_prepare: "Укрепить границу с Польшей"
 BLR_poland_campaign_border_prepare_desc: "Несмотря на то, что мы атакуем, нам следует подготовиться к возможным контрмерам и построить укрепления на границе."
 BLR_poland_campaign_war: "Начало Польской кампании"
 BLR_poland_campaign_war_desc: "Наша армия готова! Вперед, в Варшаву!"
 BLR_ukraine_campaign_war: "Начало Украинской кампании"
 BLR_ukraine_campaign_war_desc: "Наша армия готова! Вперед, в Киев!"
 BLR_military_nazbol: "Инвестиции в военную промышленность"
 BLR_military_nazbol_desc: "Наша военная промышленность до сих пор не восстановилась до уровня советских времен. Мы должны это исправить."
