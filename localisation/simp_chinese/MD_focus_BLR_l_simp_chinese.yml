 belarus_another.62.t: "白俄罗斯提议建立联合钾肥贸易商"
 belarus_another.62.d: "白俄罗斯政府提议由我们两家企业 - 乌拉尔钾肥公司和白俄罗斯钾肥公司 - 共同成立一家钾肥贸易公司。这样一来，我们就能从钾肥资源中获得更多收益。"
 belarus_another.62.a: "我们同意"
 belarus_another.62.b: "我们不同意"
 belarus_another.63.t: "联合钾肥贸易商"
 belarus_another.63.d: "俄罗斯政府已同意创建一家联合钾肥贸易公司。"
 belarus_another.63.a: "好的"
 belarus_another.64.t: "白俄罗斯关闭联合钾肥贸易商"
 belarus_another.64.d: "我们两家钾肥贸易企业之间的对抗已经到了极限，白俄罗斯政府决定脱离出来，建立自己的贸易公司。"
 belarus_another.64.a: "悲哀"
 BLR_MZKT_desc: "明斯克轮式拖拉机厂是一家专业生产公路和非公路重型车辆、牵引车辆以及用于建筑、石油天然气和机械制造行业的专用轮式底盘的企业。它是白俄罗斯共和国国家军事工业委员会下属的国有企业。"
 BLR_minoitor_desc: "米诺托尔服务公司是一家位于明斯克的白俄罗斯企业，从事履带式战斗车辆的研发、生产、现代化改造、维修和保养，以及零部件供应。它是该国军工联合体的龙头企业之一。"
 BLR_belspecveshtech_desc: "白俄罗斯特种武器技术公司是一家成立于1995年的白俄罗斯国有外贸一体化企业，专门从事武器和两用产品的贸易和生产。该公司是国家军事工业委员会的成员，被认为是该国武器出口领域的龙头企业。"
 BLR_140_zavod_desc: "第140修理厂是白俄罗斯军工联合体的国有企业，专门从事装甲车辆及其发动机的修理和现代化改造。"
 BLR_fight_the_oligarchs_desc: "我们绝不能允许寡头在我国掌权，否则我们肯定看不到经济增长。"
 BLR_russian_fsb_desc: "俄罗斯联邦安全局将与我们的特勤部门合作，为我们提供更大的政治稳定。"
 BLR_science_boost_desc: "国家预算应该尽可能慷慨地资助科学研究。"
 BLR_support_promka_desc: "我们将支持国内产业。"
 BLR_boost_economic_desc: "我们的改革正在显现成效，经济也开始增长。"
 BLR_anti_gibdd_desc: "我们反对并将打击我国境内的LGBT宣传。"
 BLR_union_state_course_desc: "我们的目标是联盟国家，我们将为此奋斗。"
 BLR_support_army_desc: "我们将支持我国的军队，因为正是由于他们的付出，我国才能保持独立。"
 BLR_russian_tver_desc: "我们将从俄罗斯采购大量货车用于我们的铁路。"
 BLR_russian_teplovzor_desc: "我们将开工生产热成像仪，并可将其出售给俄罗斯供其军队使用。"
 BLR_MVD_desc: "白俄罗斯国家行政机构，领导内务部的内政机构和内部部队系统，在其权力范围内，在打击犯罪、保护公共秩序、确保公共安全和协调等领域进行监管和管理 其他共和国国家行政机构在这一领域的活动。"
 BLR_Countering_Cybercrime_desc: "网络犯罪也必须纳入我们的监管范围。"
 BLR_soviet_system: "民族布尔什维克白俄罗斯"
 BLR_soviet_system_desc: "民族布尔什维克党已夺取政权，准备开始推行其首批经济改革。鉴于前任统治者的失败记录，其中一项改革将是恢复苏维埃经济体制。"
 BLR_free_weapon: "自由携带武器"
 BLR_free_weapon_desc: "我们将允许公民在国内自由携带武器。他们有权自卫！"
 BLR_new_church: "新宗教"
 BLR_new_church_desc: "是时候创立一种服务于我们国家利益的新宗教了！"
 BLR_reform_education: "教育改革"
 BLR_reform_education_desc: "教育系统处于糟糕的状态，我们将修复它并对这个系统进行重大改变。其中一项创新是我们将减少学童和学生的学习时间，让他们更快地成为成熟的公民。"
 BLR_ruralisation: "乡村化"
 BLR_ruralisation_desc: "21世纪的趋势是人们从农村搬到城市，我们将扭转这一趋势，让穷人或无家可归者到农村去，作为回报，我们刺激他们在新住所中的活动。"
 BLR_revoult_army: "革命军"
 BLR_revoult_army_desc: "我们的军队还没有展现出最好的一面。它需要那些充满革命热情、随时准备为祖国冲向敌人机枪的人。"
 BLR_revoult_army_zeks: "允许囚犯入伍"
 BLR_revoult_army_zeks_desc: "我们将开始招募囚犯入伍，把他们编入不同的营。停止给囚犯提供食物 - 他们必须为革命的火焰添柴加薪！"
 BLR_revoult_army_volunteer: "革命精神"
 BLR_revoult_army_volunteer_desc: "我们的一些士兵非常渴望战斗，甚至愿意去其他国家作战。或许我们不应该抑制他们的热情，应该派他们去履行他们的国际义务？"
 BLR_revoult_army_gco: "共产主义东正教卫士"
 BLR_revoult_army_gco_desc: "我们将创建我们自己独特的军队，类比伊朗伊斯兰革命卫队，他们的经验给我们留下了深刻的印象。他们将被称为共产主义东正教卫士。"
 BLR_work_army: "工人大军"
 BLR_work_army_desc: "我们将把所有失业人员送去生产，首先为我们国家建立必需品的生产。"
 BLR_revoult_army_gco_ground_force: "地面部队"
 BLR_revoult_army_gco_ground_force_desc: "军队中主要且数量最多的部队类型。平时装备轻武器。主要用途：内部安全；第二：与白俄罗斯正规武装部队联合进行外部防御。"
 BLR_revoult_army_gco_anti_corrupt: "反贪革命委员会"
 BLR_revoult_army_gco_anti_corrupt_desc: "我们将成立一个专门机构打击我国的腐败。任何人都逃不过法律的制裁。"
 BLR_revoult_army_gco_air: "空军"
 BLR_revoult_army_gco_air_desc: "我们将组建一支航空部队，让我们的卫兵有机会利用航空力量来实现他们的目标。"
 BLR_revoult_army_anti_west: "反西方主义"
 BLR_revoult_army_anti_west_desc: "西方文明过去是、现在是、将来也永远是我们的敌人，永远都在寻求毁灭我们。"
 BLR_revoult_army_interbrigade: "国际纵队"
 BLR_revoult_army_interbrigade_desc: "我们打算组建旅级联合部队，并派往国外保护我们的利益。"
 BLR_nazbol_soviet_system_idea: "民族布尔什维克经济系统"
 BLR_revoult_army_idea: "革命军"
 BLR_anti_west_idea: "反西方主义"
 GCO_anti_corruption_idea: "反贪革命委员会"
 GCO_idea: "共产主义东正教卫士"
 BLR_interbrigade_idea: "国际纵队"
 BLR_free_weapon_idea: "自由携带武器"
 BLR_ruralisation_idea: "乡村化"
 BLR_revoult_spirits_idea: "革命精神"
 BLR_rus_oil_tt: "每周向§Y[SOV.GetFlag]俄罗斯§!支付§R0.044§!的能源成本。\n"
 BLR_rus_oil_positive_tt: "每周向§Y[SOV.GetFlag]俄罗斯§!支付§R0.066§!的能源成本。\n"
 BLR_sov_oil_tt: "额外收入：来自§Y[BLR.GetFlag]白俄罗斯§!能源合同的$$§G0.44§!\n"
 BLR_sov_oil_positive_tt: "额外收入：来自§Y[BLR.GetFlag]白俄罗斯§!能源合同的$$§G0.66§!\n"
 belarus_another.65.t: "亲联盟国政变"
 belarus_another.65.d: "我们试图利用我们所有的行政和执法资源以及我们的人脉关系在白俄罗斯发动政变。"
 belarus_another.65.a: "让我们看看结果"
 BLR_oil_sov: "与白俄罗斯的能源合同"
 BLR_kgb: "克格勃"
 BLR_revoult_army_gco_drone: "无人机部队"
 BLR_kgb_expanded: "扩充KGB"
 BLR_kgb_expanded_desc: "我们将加强克格勃的影响力，因为我们不打算解散这样一个有效的国家安全工具。"
 BLR_army_stabilize: "稳定军队"
 BLR_army_stabilize_desc: "为了我们未来的发展，我们需要恢复军队的作战能力。"
 BLR_prepare_attacks: "准备干预"
 BLR_prepare_attacks_desc: "我们的军队已经准备就绪。我们集结了一支强大的部队，随时准备将我国的影响力扩展到前苏联的领土上。"
 BLR_baltic_campaign: "波罗的海战役"
 BLR_baltic_campaign_desc: "我们将开始筹备对波罗的海三国的军事行动。这些国家没有独立和生存的权利！"
 BLR_baltic_war: "开始波罗的海远征"
 BLR_baltic_war_desc: "我军已就位，准备向波罗的海三国进军。"
 BLR_ukraine_campaign: "乌克兰战役"
 BLR_ukraine_campaign_desc: "我们的南方邻国正显露出加入敌视我们的军事政治集团的迹象，这可能导致他们对我们发动攻击。我们必须先发制人！"
 BLR_ukraine_campaign_border_prepare: "强化与乌克兰的边境"
 BLR_ukraine_campaign_border_prepare_desc: "尽管我们正在发动进攻，但我们仍应做好应对可能出现的反制措施的准备，并在边境修建防御工事。"
 BLR_ukraine_campaign_war: "开始乌克兰战役"
 BLR_ukraine_campaign_war_desc: "我们的军队已经准备好了！向基辅前进！"
 BLR_military_nazbol: "军工投资"
 BLR_military_nazbol_desc: "我们的军工产业至今仍未恢复到苏联时期的水平。我们必须解决这个问题。"
 BLR_anti_baltic_idea: "反波罗的海主义"
 BLR_anti_ukraine_idea: "反乌克兰主义"
 BLR_zmagar_army: "军队改革"
 BLR_zmagar_army_desc: "我们的军队亟需改革。在我们忙于国家社会政治转型的同时，我们的武装力量却被严重削弱了。"
 BLR_revansh_return: "复兴正义复仇"
 BLR_revansh_return_desc: "正义复仇是20世纪90年代的一个民族主义组织，宣扬反波兰和反俄罗斯的言论，并主张建立以乌克兰准军事组织为蓝本的准军事组织。"
 BLR_blackcat: "复兴黑猫"
 BLR_blackcat_desc: "“黑猫”是一个大型游击组织，在白俄罗斯境内活动了四十年，为争取独立而与苏联政府作战。他们的战术方法对我们抵御敌人入侵大有裨益。"
 BLR_whitelegion_battalion_category: "白色军团"
 BLR_whitelegion_battalion_category_desc: "白色军团是一个白俄罗斯的体育爱国组织，后来转型为军事组织。白色军团成立于20世纪90年代初，负责维护反对派集会和游行的秩序。其成员接受特种部队训练，并获颁与军帽类似的钢制贝雷帽。他们还被灌输了白俄罗斯历史的深入知识。"
 BLR_white_legion_battalion_create: "创建一个白色军团营"
 BLR_white_legion_recruit_youngfront: "招募青年阵线毕业生"
 BLR_white_legion_recruit_people: "招募忠诚公民"
 BLR_white_legions_TT: "新招募的人数将按§Y[?modify_white_legion]§!\n"
 BLR_whitelegion_recruit_2000: "可招募的人数为2000人"
 BLR_blackkcat: "黑猫"
 BLR_revanshh: "正义复仇"
 BLR_white_legion_recruit_revansh: "招募‘正义复仇’组织成员"
 BLR_create_nationalsecurity: "创建新部门"
 BLR_create_nationalsecurity_desc: "我们将用两个新的机构 - 国家安全局和国家情报局 - 来取代苏联时期的克格勃。"
 BLR_National_Intelligence_Service: "国家情报局"
 BLR_revoult_rne: "邀请俄罗斯民族团结"
 BLR_revoult_rne_desc: "我们将正式把这个民族主义组织的代表纳入政府机构。"
 BLR_revoult_sobor: "邀请白俄罗斯斯拉夫教会"
 BLR_revoult_sobor_desc: "我们将正式把这个民族主义组织的代表纳入政府机构。"
 BLR_revoult_debur: "去官僚化"
 BLR_revoult_debur_desc: "我们将减少官员开支，裁减官员人数，节省下来的资金将用于造福人民。"
 BLR_revoult_dsocial: "社会支持"
 BLR_revoult_dsocial_desc: "我们将加强对公民的社会保障！不会让任何人得不到帮助。"
 BLR_revoult_army_agro_invest: "发展农产品加工业"
 BLR_revoult_army_agro_invest_desc: "我们必须尽可能多地投资发展我国的农业产业！"
 BLR_poland_campaign_border_prepare: "强化与波兰的边境"
 BLR_poland_campaign_border_prepare_desc: "尽管我们正在发动进攻，但我们仍应做好应对可能出现的反制措施的准备，并在边境修建防御工事。"
 BLR_poland_campaign_war: "开始波兰战役"
 BLR_poland_campaign_war_desc: "我们的军队已经准备好了！向华沙前进！"
 BLR_sobor: "白俄罗斯斯拉夫教会"
 BLR_rne: "俄罗斯民族团结"
 BLR_increased_social_spending_idea: "增加社会支持"
 BLR_Belshina: "JSC比卓拿"
 BLR_Belshina_desc: "比卓拿股份公司是一家汽车轮胎制造商。它生产乘用车、卡车、重型车辆、道路施工和起重车辆、电动汽车、公共汽车、拖拉机和农业机械的轮胎。"
 BLR_new_railways: "新铁路"
 BLR_constitution_BSSR: "白俄罗斯苏维埃社会主义共和国宪法"
 BLR_constitution_BSSR_desc: "首先，需要恢复白俄罗斯苏维埃社会主义共和国宪法。"
 BLR_Excursion_Vilnius: "游览维尔纽斯"
 BLR_Excursion_Vilnius_desc: "瓦格纳武装分子正在积极煽动，并表示希望组织一次前往维尔纽斯的“远征”。我们可以帮助他们组织这次行动。理论上，从我方领土越境是可行的，但之后立陶宛会向我们宣战吗？"
 BLR_vilnius_return: "整合维尔纽斯"
 BLR_belorusisation_vilnius: "维尔纽斯的白俄罗斯化"
 BLR_belorusisation_vilnius_desc: "维尔纽斯长期以来一直是我们试图占领的争议地区，但现在我们已经控制了它，我们准备向民众宣传让白俄罗斯人定居该地区的想法。"
 BLR_new_democratic_constitution: "新民主宪法"
 BLR_new_democratic_constitution_desc: "现在是时候制定一部符合西方民主制度的新宪法了。"
 BLR_Great_stone_china: "中国巨石"
 BLR_national_library: "白俄罗斯国家图书馆"
 BLR_Transnistria_enemy: "解决德涅斯特河沿岸问题"
 BLR_Transnistria_enemy_desc: "德涅斯特河沿岸是一个面积不大、未被国际社会承认的国家，长期以来一直是摩尔多瓦的一大难题。我们准备帮助他们解决这个问题 - 当然，是通过占领这些土地来实现的。"
 BLR_transnistria_claims: "宣称§Y[PMR.GetNamewithFlag]§!领土"
 BLR_batka_krut_TT: "我们将§R清理§!§Y政治领域§!，只留下§G少数忠于我们的政党§!，我们将为§Y卢卡申科§!§G建立一个真正的爱国政党§!。"
 belarus_politics.1.t: "新的政治现实"
 belarus_politics.1.d: "尽管对抗议者的胜利是巨大的，但仍有大量反对派组织和政党在等待摧毁我们国家的时机。为了防止这种情况发生，我们需要彻底清除政治领域中不必要的政客和组织，只留下忠于我们的政党，我们可能还需要我们自己的政党来控制政治领域。或者我们可以让一切保持原样，但敌人仍然有工具在国内影响我们。"
 belarus_politics.1.a: "搞定他们！"
 belarus_politics.1.b: "我们不要再惹恼别人了。"
 BLR_potato_empire_idea: "马铃薯帝国"
 BLR_revoult_army_gco_drone_desc: "我们将积极在军队中使用无人机，提高军队作战效能。"
 BLR_country_for_life_idea: "宜居之国"
 BLR_pension_reform_idea: "养老金改革"
 BLR_agriculture2: "深化私营乡村公司"
 BLR_agriculture2_desc: "白俄罗斯农业部门进一步私有化。"
 BLR_country_for_life_idea_desc: "“宜居之国”是白俄罗斯博主兼活动家谢尔盖·季哈诺夫斯基提出的口号和运动。它代表着白俄罗斯普通公民能够自由无忧地生活的愿景。"
 BLR_pension_reform_idea_desc: "养老金对我们的社会运作至关重要，需要做出一些改变使其获得更好的效果。"
 BLR_assembly_shop_of_europe: "欧洲组装车间"
 BLR_assembly_shop_of_europe_desc: "白俄罗斯或许是最被忽视的经济体之一，它有潜力在经济上超越俄罗斯。但这只有在我们集中精力解决存在的根本问题时才能实现，因为多年来，我们甚至忽视了对经济最基本的投资。"
 BLR_increase_livestock_imports: "牲畜进口量增加"
 BLR_increase_livestock_imports_desc: "§C“这牛奶味道不错。”§!\n\n我们的人民需要动物，不仅是为了食用，也是为了生产商品。奶牛尤其珍贵，因为它们能产奶。乳制品用途广泛，可以极大地促进农业发展。"
 BLR_proportional_mining: "按比例采矿"
 BLR_proportional_mining_desc: "我们不能随心所欲地开采资源；必须事先建立完善的基础设施。我们只能在真正需要资源的地区建立矿场，而且只会在拥有工业区的地区建设新矿场。当然，这会恶化空气质量，但至少[BLR.GetLeader]可以资助建造一些漂亮的宫殿了。"
 BLR_industrial_wide_reform: "工业范围改革"
 BLR_industrial_wide_reform_desc: "白俄罗斯工业的核心力量虽然强劲，但仍有潜力变得更加强大。我们将启动一系列改革，以提升对可持续工业扩张的认识。"
 BLR_fostering_automotive_innovation: "促进汽车创新"
 BLR_fostering_automotive_innovation_desc: "虽然白俄罗斯的汽车工业尚未享誉全球，但这并不意味着这个想法完全不可能实现。只要有足够的动力和宣传（或许还需要一些资金），我们就能打造一个足以与德国相媲美的汽车巨头。也许吧。"
 BLR_the_fate_of_belarusian_steel_works: "白俄罗斯钢铁工业的命运"
 BLR_the_fate_of_belarusian_steel_works_desc: "白俄罗斯钢铁厂股份公司成立于1984年，一直为白俄罗斯工业提供世界一流的钢铁，这种钢铁在地球上其他任何地方都找不到。"
 BLR_tractors: "欧洲最强劲的拖拉机"
 BLR_tractors_desc: "白俄罗斯工业以其可靠的拖拉机而闻名，白俄罗斯农民令欧洲羡慕不已。为拖拉机产业提供资金将进一步促进经济发展，因为我们将能够为农场配备最先进的设备。"
 BLR_buses: "东部公交车"
 BLR_buses_desc: "幸运的是，我们几家公司的杰出工程师们已经攻克了制造出相对可靠的公交车这一看似不可能完成的任务。有了他们的帮助，我们的公交车性能只会越来越好。只要运气好，资金到位，我们就能着手打造英国以东最好的公交车。"
 BLR_trains: "振兴白俄罗斯铁路"
 BLR_trains_desc: "§R“比任何子弹头列车都快！”§!\n\n白俄罗斯铁路公司一直致力于为众多白俄罗斯公民建设铁路基础设施。白俄罗斯铁路公司直接隶属于交通部，是苏联时期遗留下来的铁路公司之一，目前预计将继续垄断白俄罗斯铁路运营。我们可以重振白俄罗斯铁路公司，并为部分列车制造商提供资金，以更好地满足白俄罗斯通勤者的需求。"
 BLR_infrastructure_contracts: "拟议的基础设施合同"
 BLR_new_paths: "条条大路通[BLR.capital.GetCapitalVictoryPointName]"
 BLR_revamp_railroads: "改造后的铁路"
 BLR_revamp_railroads_desc: "国家铁路系统设备陈旧、服务缓慢。对其进行现代化改造将缩短旅行时间，减少维护问题。更强大的铁路系统将促进民用和工业运输。"
 BLR_belneftekhim: "强化白俄罗斯石化"
 BLR_belneftekhim_desc: "白俄罗斯石油化工公司在白俄罗斯石化行业中扮演着核心角色，但为了保持竞争力，它需要进行现代化改造。投资新技术和炼油工艺能够提高产品质量。这些升级改造有助于巩固我们在全球市场的地位。"
 BLR_the_belaruskali_monopoly: "维持白俄罗斯钾肥公司的垄断地位"
 BLR_the_belaruskali_monopoly_desc: "白俄罗斯钾肥公司是我们最宝贵的资产之一，保持其垄断地位能够确保稳定的收入。巩固其市场地位有助于维护白俄罗斯在钾肥行业的影响力。该行业的稳定也为更广泛的经济规划提供了支持。"
 BLR_uplift_grodno_azot: "支持格罗德诺氮肥厂"
 BLR_uplift_grodno_azot_desc: "格罗德诺氮肥厂生产农业和工业必需化学品。工厂现代化改造将提高效率并减少浪费。支持该厂建设将增强我们整个化工行业的实力。"
 BLR_tend_to_oil_shale: "寻找油页岩"
 BLR_tend_to_oil_shale_desc: "白俄罗斯拥有丰富的油页岩储量，但目前尚未得到充分勘探。勘探和开发这些油田有助于实现能源来源多元化。即使是小规模的发现也能减轻对外国进口的依赖。"
 BLR_award_chinese_contractors: "将合同授予中国公司"
 BLR_award_chinese_contractors_desc: "中国建筑公司能够提供具有竞争力的报价和快速的项目交付能力。将重大合同授予他们，可以加快我们的基础设施建设规划。此举也有助于加强与北京的外交和经济联系。"
 BLR_award_luxembourgian_contractors: "安抚卢森堡人"
 BLR_award_luxembourgian_contractors_desc: "卢森堡企业提供高质量的工程，并期望公平地进入我们的市场。授予他们关键合同有助于改善双方关系，并表明我们愿意与他们合作。他们的参与也有助于提升我们国内的建筑标准。"
 BLR_potash_safety_and_hazards_regulation: "钾肥安全和危害法规"
 BLR_potash_safety_and_hazards_regulation_desc: "钾肥开采若忽视安全规章，将带来重大风险。制定更严格的规章制度能够保护工人，预防事故发生。更安全的行业环境也能确保更稳定可靠的生产。"
 BLR_bountiful_fields: "耕耘丰饶的田野"
 BLR_bountiful_fields_desc: "白俄罗斯土壤肥沃，但产量不稳定。加大对农民的支持力度，推广更先进的耕作方式，可以使我们的田地获得稳定的收成。这项举措不仅能提高粮食安全，还能增强农村社区的实力。"
 BLR_speed_up_land_reformation: "加快土地改革"
 BLR_speed_up_land_reformation_desc: "土地改革在全国范围内进展缓慢且不均衡。加快这一进程将有助于农民获得稳定收入，并鼓励投资。更清晰的所有权规则能够提高整体农业生产力。"
 BLR_reinforce_government_support_for_agriculture: "加强农业支持"
 BLR_reinforce_government_support_for_agriculture_desc: "农业仍然是白俄罗斯社会的支柱产业，需要政府的大力支持。增加补贴、培训和设备供应将有助于提高产量并保护小农户。一个具有韧性的农业部门是国家稳定的基石。"
 BLR_achieving_self_sufficiency: "追求自给自足"
 BLR_achieving_self_sufficiency_desc: "减少对进口的依赖能够增强国家自主性和经济稳定性。通过发展国内产业和提高生产力，白俄罗斯可以更好地满足自身需求。实现这一目标需要时间，但对长期的韧性至关重要。"
 BLR_streamline_taxation: "简化税收"
 BLR_streamline_taxation_desc: "复杂的税收制度会阻碍企业发展，令投资者感到沮丧。简化规则可以鼓励创业，减少官僚主义造成的延误。更清晰的税收制度可以通过降低合规门槛来增加财政收入。"
 BLR_counterurbanization: "逆城市化政策"
 BLR_counterurbanization_desc: "农村人口持续流失到城市，造成发展不平衡。逆城镇化政策旨在通过新的投资和改善服务来扶持农村。增强农村生活水平有助于平衡全国的发展。"
 BLR_potash_large_reserves: "钾肥储量丰富"
 BLR_agriculture_reduced: "农业衰减"
 BLR_belneftekhim_idea: "白俄罗斯石化"
 BLR_streamlined_taxation: "简化税收"
 BLR_safety_protocols_in_place: "已实施安全规程"
 BLR_disease_amongst_livestock: "牲畜疾病"
 BLR_belarusian_trains: "列车长的坐骑"
 BLR_treading_on_thin_steel: "如履薄冰"
 BLR_treading_on_thin_steel_desc: "就我们的经济而言，如今冰雪消融，我们如履薄冰。我们需要通过进一步发展产业，无论是在资源方面还是在生产方面，来加固这层薄薄的钢板。"
 BLR_agricultural_shock: "农业冲击"
 BLR_agricultural_shock_desc: "我们在经济向工业化转型过程中走得太快，结果导致农业部门遭受重创。"
 BLR_automotive_industry: "白俄罗斯汽车行业"
 BLR_automotive_industry_desc: "四个车门，或许再加上一个轮子，就足以打造一台可靠、值得信赖的现代化白俄罗斯机械。随着我们进军汽车行业，我们一定能打败那些在奔驰或宝马工作的无能之辈。"
 BLR_activates_fermer_mission_TT: "£text_icon_kaldanger 将激活一项§H任务§!要求我们在特定区域建造§H农业区§!\n - 未能满足这些要求可能会导致农民不满。\n - 如果成功，我们将获得对国民经济的提振。"
 BLR_livestock_warning_TT: "£text_icon_kaldanger 根据我们的§H基因工程§!研究水平，您的牲畜将面临疾病§R致死§!的风险\n\n§H500§!只牛将从友好地区引进"
 BLR_steel_warning_TT: "£text_icon_kaldanger 如果我们在没有拥有§H11个民用工厂§!的情况下，就启动改革，将经济导向§H工业化§!，我们可能会经历一场短暂的危机。"
 BLR_potash_purchase_TT: "我们将尽力为员工购买§H安全设备§!，但不作任何承诺。"
 BLR_oil_shale_TT: "每个拥有至少§H3个战略资源储备§!的地区将获得如下£oil_texticon §H2单位§!原油"
 BLR_factory_to_steel_TT: "我们将在每个拥有至少§H1个民用工厂§!的地区开展§H采矿作业§!"
 belarus_md.1.t: "农业危机迫在眉睫"
 belarus_md.1.d: "由于我们突然转型为工业化经济，农业部门遭受了突如其来的冲击，政府撤回了对农业的支持，而我们又没有建立任何必要的配套基础设施。结果，我们的农业部门遭受重创，需要一年的时间才能完全恢复。"
 belarus_md.1.a: "该死"
 belarus_md.2.t: "私有化还是不私有化？"
 belarus_md.2.d: "白俄罗斯钢铁厂股份公司成立于1984年苏联时期。自那时以来，世界发生了翻天覆地的变化，苏联解体也促使我们在一定程度上开放了市场。国家内部有人呼吁将该公司私有化，以获取其带来的收入，但也有人警告我们，不应让如此重要的企业落入私人之手。"
 belarus_md.2.a: "我们绝不私有化！"
 belarus_md.2.b: "私有化是唯一的解决办法"
 belarus_md.3.t: "疾病在牲畜中迅速传播"
 belarus_md.3.d: "从一个友好国家进口了大约500头牛后，我们的专家分析师开始注意到白俄罗斯境内牲畜死亡率急剧上升。经进一步调查，确定其中一头进口牛携带牛海绵状脑病（俗称“疯牛病”）。因此，一些公民因接触这头牛而感染了该病的变种，并被送往医院接受治疗。"
 belarus_md.3.a: "如果一切顺利就好了"
 BLR_peleng_desc: "JSC佩伦是一家总部位于明斯克的白俄罗斯公司，专门从事军用和民用光电系统的研发和生产。它是白俄罗斯光电行业的领军企业。"
 BLR_infrastructure_contracts_desc: ""
 BLR_baltic_revolution_category: "波罗的海共产主义革命"
 BLR_baltic_revolution_category_desc: "立陶宛和拉脱维亚的工人渴望摆脱资产阶级统治者的压迫。我们将通过秘密行动、政治颠覆和民众起义相结合的方式，把革命带到波罗的海国家，建立一个全新的立陶宛-拉脱维亚-立陶宛联邦国家。"
 BLR_establish_cooperation_lit: "与立陶宛共产党建立合作关系"
 BLR_establish_cooperation_lit_desc: "立陶宛的共产主义势力四分五裂，与政权脱节。我们必须与他们建立秘密联系，为未来的行动奠定基础。"
 BLR_finance_protests_lit: "为立陶宛的共产主义抗议活动提供资金"
 BLR_finance_protests_lit_desc: "资助有组织的示威游行将引起公众对共产主义事业的关注，并动摇立陶宛现任政府的稳定。"
 BLR_recruit_sympathizers_lit: "招募立陶宛同情者"
 BLR_recruit_sympathizers_lit_desc: "立陶宛境内的白俄罗斯族少数群体是潜在的同情者来源。我们可以招募当地人员来扩大我们的影响力。"
 BLR_spread_propaganda_lit: "在立陶宛传播立陶宛-白俄罗斯宣传"
 BLR_spread_propaganda_lit_desc: "一场旨在宣传立陶宛-白俄罗斯统一国家力量的协调一致的宣传运动，将引导公众舆论走向合作。"
 BLR_bribe_military_lit: "贿赂立陶宛军官"
 BLR_bribe_military_lit_desc: "一些立陶宛军官对现任政府表示不满。经济激励或许能说服他们支持我们的事业。"
 BLR_bribe_politicians_lit: "贿赂立陶宛政客"
 BLR_bribe_politicians_lit_desc: "只要有足够的钱，就可以说服立陶宛议会的关键成员推进共产主义立法，削弱执政联盟。"
 BLR_raise_revolt_lit: "在立陶宛发动共产主义起义"
 BLR_raise_revolt_lit_desc: "只要对立陶宛有足够的影响力，我们就能引发共产主义起义，推翻政府，并扶植一个友好的政权。"
 BLR_establish_cooperation_lat: "与拉脱维亚共产党建立合作关系"
 BLR_establish_cooperation_lat_desc: "拉脱维亚的共产主义势力四分五裂，与政权脱节。我们必须与他们建立秘密联系，为未来的行动奠定基础。"
 BLR_finance_protests_lat: "为拉脱维亚的共产主义抗议活动提供资金"
 BLR_finance_protests_lat_desc: "资助有组织的示威游行将引起公众对共产主义事业的关注，并动摇拉脱维亚现任政府的稳定。"
 BLR_recruit_sympathizers_lat: "招募拉脱维亚同情者"
 BLR_recruit_sympathizers_lat_desc: "拉脱维亚境内的白俄罗斯族少数群体为我们提供了潜在的同情者。我们可以招募当地人员来扩大我们的影响力。"
 BLR_spread_propaganda_lat: "在拉脱维亚传播立陶宛-白俄罗斯宣传"
 BLR_spread_propaganda_lat_desc: "一场旨在宣传拉脱维亚-白俄​​罗斯统一国家力量的协调一致的宣传运动，将引导公众舆论走向合作。"
 BLR_bribe_military_lat: "贿赂拉脱维亚军官"
 BLR_bribe_military_lat_desc: "一些拉脱维亚军官对现任政府表示不满。经济激励或许能说服他们支持我们的事业。"
 BLR_bribe_politicians_lat: "贿赂拉脱维亚政客"
 BLR_bribe_politicians_lat_desc: "只要有足够的钱，就可以说服拉脱维亚议会的关键成员推进共产主义立法，削弱执政联盟。"
 BLR_raise_revolt_lat: "在拉脱维亚发动共产主义起义"
 BLR_raise_revolt_lat_desc: "只要对拉脱维亚有足够的影响力，我们就能引发共产主义起义，推翻政府，并扶植一个友好的政权。"
