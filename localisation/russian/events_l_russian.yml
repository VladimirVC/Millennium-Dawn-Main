l_russian:
 TT_CURRENT_LEADER_DIES: "§R[ROOT.GetLeader] умер!§!"
 md4.1.t: "[FROM.GetName]-[Root.GetName] договор о свободной торговле"
 md4.1.d: "[FROM.GetNameDef] предлагает нам соглашение о свободной торговле. Мы будем иметь приоритетное право на экспорт в эту страну и импорт из нее."
 md4.1.a: "Подписать его!"
 md4.1.b: "Отказаться."
 md4.2.t: "[FROM.GetNameDef] подписал с нами соглашение о свободной торговле"
 md4.2.d: "[FROM.GetNameDef] принял наше предложение о подписании соглашения о свободной торговле. Оно вступает в силу немедленно."
 md4.2.a: "Это сделает наши страны процветающими!"
 md4.3.t: "[FROM.GetNameDef] отказался подписать с нами соглашение о свободной торговле."
 md4.3.d: "[FROM.GetNameDef] отклонил наше предложение о подписании соглашения о свободной торговле."
 md4.3.a: "Они боятся наших превосходных товаров!"
 md4.4.t: "[FROM.GetName]-[Root.GetName] договор о военном сотрудничестве"
 md4.4.d: "[FROM.GetNameDef] предлагает нам договор о военном сотрудничестве. Мы будем продавать им оборудование по сниженной цене, но это повысит вероятность того, что они будут покупать у нас, а не у наших конкурентов."
 md4.4.a: "Подписать его!"
 md4.4.b: "Отказаться."
 md4.5.t: "[FROM.GetNameDef] подписал с нами договор о военном сотрудничестве."
 md4.5.d: "[FROM.GetNameDef] принял наше предложение подписать договор о военном сотрудничестве. Он вступает в силу немедленно."
 md4.5.a: "Это сделает наши страны более сильными!"
 md4.6.t: "[FROM.GetNameDef] отказался подписать с нами договор о военном сотрудничестве."
 md4.6.d: "[FROM.GetNameDef] отказался от нашего предложения подписать договор о военном сотрудничестве."
 md4.6.a: "Они боятся, что мы будем сильнее!"
 md4.7.t: "Президентский секс-скандал..."
 md4.7.d: "[FROM.GetName] оказался втянут в сексуальный скандал. Скандал связан с тем, что [FROM.GetName] совершал сексуальные домогательства в отношении множества людей на протяжении многих лет своей политической карьеры. Это рассматривается как серьезное злоупотребление властью и доверием со стороны народа. Многие люди по всей стране потребовали от [FROM.GetName] ответа на эти обвинения."
 md4.7.a: "Я опровергаю эти обвинения. Они ложны по всем пунктам. Это просто способ оклеветать меня!"
 md4.7.b: "Я принимаю эти обвинения. С сожалением сообщаю вам, что они правдивы."
 md4.8.t: "Ответ по стрельбе из школы"
 md4.8.d: "Произошла стрельба в школе [FROM.GetName]. Эта стрельба в школе привлекла большое внимание СМИ и требует реакции со стороны президента."
 md4.8.a: "Обещаю решить проблему"
 md4.8.b: "Попробуйте игнорировать проблему и двигаться дальше."
 md4.9.t: "Мысли о подоходном налоге"
 md4.9.d: "Президент [FROM.GetName] дал интервью прессе по поводу подоходного налога и того, что, по его мнению, с ними следует сделать."
 md4.9.a: "Я думаю, что подоходный налог должен быть повышен для бедных."
 md4.9.b: "Я думаю, что подоходный налог должен быть снижен для бедных."
 md4.9.c: "Я думаю, что подоходный налог должен быть повышен для богатых."
 md4.9.e: "Я думаю, что подоходный налог должен быть снижен для богатых."
 md4.10.t: "Ответ бедных"
 md4.10.d: "У бедных возникло некоторое недовольство по поводу решиния президента"
 md4.10.a: "О нет!"
 md4.11.t: "Ответ богатых"
 md4.11.d: "У богатых возникло некоторое недовольство по поводу решиния президента"
 md4.11.a: "О, нет!"
 md4.12.t: "Ответ богатых"
 md4.12.d: "Президент заявил, что хотел бы повысить налоги для богатых, и это не понравилось им. Поддержка президента из-за этого снизилась."
 md4.12.a: "О, нет!"
 md4.13.t: "Ответ бедных"
 md4.13.d: "Бедные отреагировали на решение президента о понижении налогов на богатых. Многие из бедных считают, что налоги на богатых нельзя снижать, а вместо этого повышать их еще больше."
 md4.13.a: "О, нет!"
 md4.14.t: "[FROM.GetName] требует подчинения"
 md4.14.d: "Правительство [FROM.GetName] потребовало, чтобы мы подчинились их правлению и стали нашим повелителем"
 md4.14.a: "Конечно"
 md4.14.b: "Никогда"
 md4.15.t: "[FROM.GetName] Отправляет"
 md4.15.d: "Правительство [FROM.GetName] согласилось с нашими требованиями и выполнило наше правило"
 md4.15.a: "Отлично"
 md4.16.t: "[FROM.GetName] Сопротивляется"
 md4.16.d: "Правительство [FROM.GetName] отклонило наши требования господства"
 md4.16.a: "Черт"
 md4.17.t: "[FROM.GetName] Принимает альянс"
 md4.17.d: "Правительство [FROM.GetName] приняло наш запрос на вступление в союз"
 md4.17.a: "Отлично"
 md4.18.t: "[FROM.GetName] Отклоняет альянс"
 md4.18.d: "Правительство [FROM.GetName] отклонило наш запрос на создание альянса."
 md4.18.a: "Черт"
 md4.19.t: "[FROM.GetName] Территория уступок"
 md4.19.d: "Правительство [FROM.GetName] согласилось с нашими территориальными требованиями."
 md4.19.a: "Отлично"
 md4.20.t: "[FROM.GetName] отказывается уступить территорию"
 md4.20.d: "Правительство [FROM.GetName] отклонило наши территориальные требования."
 md4.20.a: "Черт"
 generic.1.t: "[FROM.GetName] оказывает влияние на нашу политику"
 generic.1.d_neutral_good: "В течение долгого времени [FROM.GetAdjective] правительство стремилось сблизить наши страны и проявляло большой интерес к [Root.GetAdjective] политике.  В последнее время эта тенденция усилилась, когда [FROM.GetRulingParty] начала продвигать свою [FROM.GetRulingIdeology] пропаганду, выступая с речами и распространяя материалы среди [Root.GetAdjective] населения.  \n\n Теперь даже некоторые политики и другие официальные лица поддались влиянию [FROM.GetAdjective] пропаганды и начали выступать за [FROM.GetRulingIdeologyNoun] в [Root.GetName]."
 generic.1.d_bad: "Правительство [FROM.GetAdjective] долгое время стремилось выровнять пути развития наших стран и часто пыталось вмешиваться в политику [Root.GetName]'. В последнее время это усилилось, поскольку [FROM.GetRulingParty] начали продвигать свою [FROM.GetRulingIdeology] пропаганду, не считаясь с [Root.GetAdjective] политическими традициями. Ряд речей и других [FROM.GetRulingIdeology] материалов уже распространяются среди [Root.GetAdjective] населения. Похоже, что даже некоторые политики и другие официальные лица поддались влиянию [FROM.GetAdjective] пропаганды и начали выступать за [FROM.GetRulingIdeologyNoun] в [Root.GetName]."
 generic.1.a: "Интересно"
 generic.1.b: "Как они посмели!"
 generic.2.t: "[FROM.GetName] стремится присоединиться к [Root.GetFactionName]"
 generic.2.d.a: "Перед лицом растущих угроз свободе и демократическим ценностям [alliance_applicant.GetAdjective] смотрит на нас как на защитников свободы. Теперь они хотят быть принятыми в наш альянс, чтобы пользоваться нашей защитой и противостоять силам, угрожающим демократии."
 generic.2.d.b: "Наше положение, направленное на изменение нынешнего мирового порядка, не избежало внимания стран-единомышленников. [Alliance_applicant.GetAdjective] признают, что их лучший шанс добиться процветающего будущего для себя - присоединиться к нам в предстоящем конфликте, и поэтому они предложили официально присоединиться к нам против наших врагов."
 generic.2.d.c: "[alliance_applicant.GetName] признала, что она должна объединиться с другими социалистическими республиками, чтобы укрепить место коммунизма в мире. Принимая нашу ведущую роль в международном тяжелом положении работника, [alliance_applicant.GetAdjective] теперь просит официально вступить в союз с нами."
 generic.2.d.e: "По мере того, как текущие потрясения в международной политике продолжают сказываться по всему миру, [alliance_applicant.GetAdjective] считают, что у нас есть наибольший шанс выжить в эти неспокойные времена. Поэтому они просят вступить в наш альянс, чтобы мы могли вместе пережить надвигающийся шторм."
 generic.2.a: "Все, кто выступает за свободу и демократию, могут поддержать нас."
 generic.2.b: "Мы в числе сильнейших!"
 generic.2.c: "Если мы будем вместе, революция не может не победить."
 generic.2.e: "Мы выдержим это!"
 generic.2.f: "Нам лучше без них."
 generic.3.t: "[alliance_inviter.GetName] приветствует нас в [alliance_inviter.GetFactionName]"
 generic.3.d: "[alliance_inviter.GetName] принял наше предложение присоединиться к [alliance_inviter.GetFactionName]. Отныне мы будем стоять или падать вместе."
 generic.3.a: "Вместе мы защитим демократию."
 generic.3.b: "Никто не может противостоять нам!"
 generic.3.c: "Бедственное положение рабочих не смогло сказаться на результатах чемпионах!"
 generic.3.e: "Мы отложим наши разногласия, пока."
 generic.4.t: "[alliance_inviter.GetName] отклоняет запрос на присоединение к [alliance_inviter.GetFactionName]"
 generic.4.d: "[alliance_inviter.GetName] решил отклонить нашу просьбу присоединиться к [alliance_inviter.GetFactionName]. Придется обходиться без их помощи."
 generic.4.a: "Они называют себя защитниками свободы?"
 generic.4.b: "Тогда мы их тоже раздавим!"
 generic.4.c: "Их революция коррумпирована!"
 generic.4.e: "Наши разногласия были слишком велики."
 generic.5.t: "[FROM.GetName] приглашает [Root.GetName] в [FROM.GetFactionName]"
 generic.5.d.a: "Подозрительно следя за последними событиями в мировой политике, [alliance_inviter.GetName] протягивает нам руку дружбы, предлагая нам свою защиту и призывая нас встать с ними в защиту принципов свободы и демократии. Будучи членом [alliance_inviter.GetFactionName], свобода нашего народа вполне может быть гарантирована."
 generic.5.d.b: "Признавая, что иногда даже сильные государства нуждаются в союзниках, [alliance_inviter.GetAdjective] пригласили нас присоединиться к [alliance_inviter.GetFactionName]. Если мы решим принять их предложение, это вполне может дать нам широкие возможности найти свое место под солнцем."
 generic.5.d.c: "Наши идеологические союзники в [alliance_inviter.GetName] отметили наш ценный вклад в дело рабочих, и сегодня утром мы получили приглашение присоединиться к [alliance_inviter.GetFactionName]. Стоя вместе с другими социалистическими республиками, мы могли бы с новой силой распространять революцию."
 generic.5.d.e: "Похоже, что [alliance_inviter.GetAdjective] считает, что мы представляем для них стратегический интерес, несмотря на идеологические различия. Они считают более выгодным работу вместе с нами, нежели конфронтацию. Сегодня утром посол [alliance_inviter.GetAdjective] направил нам приглашение стать членом [alliance_inviter.GetFactionName]."
 generic.5.a: "Мы будем стоять рядом с ними."
 generic.5.b: "Нам нужно всего несколько тысяч мертвых..."
 generic.5.c: "Мы будем сражаться вместе с нашими товарищами!"
 generic.5.e: "Это решение принесет выгоду."
 generic.6.t: "[alliance_applicant.GetName] принимает приглашение на [alliance_inviter.GetFactionName]"
 generic.6.d: "[alliance_applicant.GetName] решил принять наше предложение присоединиться к [alliance_inviter.GetFactionName]. Отныне мы будем сражаться вместе."
 generic.7.t: "[alliance_applicant.GetName] отклоняет предложение присоединиться к [alliance_inviter.GetFactionName]"
 generic.7.d: "[alliance_applicant.GetName] решил отклонить наше предложение присоединиться к [alliance_inviter.GetFactionName]. Придется обходиться без их помощи."
 generic.7.a: "Наша помощь не нужна."
 ace_promoted.1.t: "Летчик-ас получает повышение"
 ace_promoted.2.t: "Возвращение аса"
 ace_promoted.1.d: "Немногие идут на такой риск, как отважные пилоты [Root.GetAdjective] военно-воздушных сил. [FROM.GetName] [FROM.GetSurname] опытный пилот, известный под позывным [FROM.GetCallsign], отличился [FROM.GetHerselfHimself] тем, что не только вернулся живым с недавнего задания над [FROM.GetMissionRegion], но и одержал значительные победы во многих критических столкновениях.\n\nНедавнее повышение [Root.GetAdjective] в должности, преподносимое как яркий пример [FROM.GetName] мужества, получило широкую огласку. Хотя люди могут считать войну скорее адом, чем славой, многие рады видеть, что все еще есть герои, за которыми можно сплотиться."
 ace_promoted.1.d_major: "Немногие идут на такой риск, как отважные пилоты [Root.GetAdjective] военно-воздушных сил. [FROM.GetName] [FROM.GetSurname] опытный пилот, известный под позывным [FROM.GetCallsign], отличился [FROM.GetHerselfHimself] не только возвращением живым, но и пилотированием [FROM.GetHerHis] [FROM.GetWing] с огромным мастерством. Недавно [FROM.GetName] был на задании над [FROM.GetMissionRegion] и сыграл важную роль в успехе этого критического столкновения.\n\nНедавнее повышение [Root.GetAdjective] в должности, преподносимое как яркий пример [FROM.GetName] мужества, получило широкую огласку. Хотя люди могут считать войну скорее адом, чем славой, многие рады видеть, что все еще есть герои, за которыми можно сплотиться."
 ace_promoted.1.a: "Смелость города берет."
 ace_died.1.t: "Истребитель-ас с позывным '[FROM.GetCallsign]' погиб в [FROM.GetMissionRegion]"
 ace_died.1.d: "Один из самых известных [FROM.Owner.GetName] асов [FROM.GetAceType] [FROM.GetFullName] был сбит при исполнении служебных обязанностей во время выполнения задания над [FROM.GetMissionRegion]. К сожалению, поскольку [FROM.GetSheHe] они долгое время были публичной фигурой, их кончина сильно деморализует многих людей, на которых равнялись[FROM.GetHerHim].\n\nХотя мы хотели бы, чтобы был способ скрыть это событие от людей, отсутствие публичных выступлений от [FROM.GetName] вскоре вызвало бы подозрения. В конечном счете, [FROM.GetHerHis] смерть - это еще одна часть легенды, которая, мы надеемся, будет жить в далеком прошлом от наших нынешних проблем."
 ace_died.1.d_major: "Один из самых известных [FROM.Owner.GetName] асов [FROM.GetAceType]'s, [FROM.GetFullName], погиб при исполнении служебных обязанностей. Пилоты, вернувшиеся из этого региона, сообщают, что видели, как [FROM.GetHerHis] [FROM.GetWingShort] загорелся и рухнул на [FROM.GetMissionRegion] после того, как попал под шквальный огонь противника. К сожалению, [FROM.GetSheHe] долгое время был публичной фигурой, и гибель '[FROM.GetCallsign]' сильно деморализовала многих людей, которые равнялись на [FROM.GetHerHim].\n\n Мы бы хотели, чтобы это событие осталось незамеченным, но отсутствие [FROM.GetName] на публике вскоре вызовет подозрения. В конце концов, смерть — это еще одна часть легенды, которая, будем надеяться, переживет наши нынешние проблемы."
 ace_died.1.a: "Живая легенда - это еще лучше."
 ace_killed_by_ace.1.t: "Истребитель-ас [FROM.GetFullName] сбит вражеским пилотом."
 ace_killed_by_ace.1.d: "Пилоты, вернувшиеся из [FROM.GetMissionRegion], сообщают, что эскадрилья [Prev.Owner.GetAdjective] самолетов под командованием печально известного пилота '[Prev.GetCallsign]' сосредоточилась на преследовании [FROM.GetFullName]. Уклонившись от нескольких залпов противника и сбив несколько вражеских самолетов, '[FROM.GetCallsign]' был атакован '[Prev.GetCallsign]', который, по имеющимся данным, перехитрил [FROM.GetHerHim] и точным попаданием пробил топливные баки [FROM.GetHerHis].  Самолет '[FROM.GetName] [FROM.GetSurname]' загорелся и, кувыркаясь, рухнул на [FROM.GetMissionRegion] в огненном аду.\n\n[FROM.GetFullName] Он проявил огромное мужество на протяжении [FROM.GetHerHis] службы, и многие равнялись на него. Потеря этого национального героя — тяжелый удар для [FROM.Owner.GetAdjective] ВВС и сокрушительная утрата для всей нашей страны. Осознание того, что, пока мы скорбим, [Prev.Owner.GetName] празднуют [Prev.GetFullName] его как героя, делает эту трагедию еще более невосполнимой."
 ace_killed_by_ace.1.d_major: "Пилоты, вернувшиеся из [FROM.GetMissionRegion], сообщают, что эскадрилья [Prev.Owner.GetAdjective] самолетов под командованием печально известного пилота '[Prev.GetCallsign]' сосредоточилась на преследовании [FROM.GetFullName]. После того как '[FROM.GetCallsign]' сбил несколько вражеских самолетов и уклонился от нескольких вражеских залпов, '[Prev.GetCallsign]' был атакован '[Prev.GetWingShort]' на своем [FROM.GetHerHim], который, по имеющимся данным, перехитрил [FROM.GetHerHis] и точным попаданием пробил топливные баки  .[FROM.GetName] [FROM.GetSurname] '[FROM.GetWingShort]' загорелся и спикировал на [FROM.GetMissionRegion] в огненном аду.\n\n[FROM.GetFullName] Он проявил огромное мужество на протяжении [FROM.GetHerHis] службы, и многие равнялись на него. Потеря этого национального героя — тяжелый удар для [FROM.Owner.GetAdjective] ВВС и сокрушительная утрата для всей страны. Осознание того, что, пока мы скорбим, [Prev.Owner.GetName] празднуют [Prev.GetFullName] его как героя, делает эту трагедию еще более невосполнимой."
 ace_killed_by_ace.1.a: "Сокрушительная потеря для всех нас"
 ace_killed_other_ace.1.t: "Боевой ас [FROM.GetFullName] сбивает самолет с позывным '[Prev.GetCallsign]'"
 ace_killed_other_ace.1.d: "Наша последняя миссия над [FROM.GetMissionRegion] увенчалась большим успехом для [FROM.Owner.GetAdjective] ВВС не только в одном аспекте. Поступили сообщения о героическом поступке [FROM.GetFullName]', который перехитрил [Prev.Owner.GetAdjective] пилота, [Prev.GetName] [Prev.GetSurname] известного как '[Prev.GetCallsign]'. '[FROM.GetCallsign]' использовал [FROM.GetHerselfHimself] в качестве приманки и заманил '[Prev.GetCallsign]' в ловушку, где [FROM.Owner.GetAdjective] пилоты смогли спикировать на [Prev.GetCallsign]' эскадрилью. '[FROM.GetCallsign]'' сумел перехитрить [Prev.Owner.GetAdjective] самолет и одним выстрелом отправил '[Prev.GetCallsign]'' в штопор, и тот рухнул с небес [FROM.GetMissionRegion].\n\n[Prev.GetFullName] был грозным пилотом, на его [FROM.Owner.GetAdjective] совести [Prev.GetHerHis] множество жизней. Это великая победа, которая показывает, что, когда мы объединяемся вокруг великих героев, они совершают великие дела."
 ace_killed_other_ace.1.d_major: "Наша последняя миссия над [FROM.GetMissionRegion] увенчалась большим успехом для [FROM.Owner.GetAdjective] ВВС не только в одном аспекте. Поступили сообщения о героическом поступке [FROM.GetFullName]'s, которому удалось перехитрить [Prev.Owner.GetAdjective] пилота, [Prev.GetName] [Prev.GetSurname] известного как '[Prev.GetCallsign]''. [FROM.GetCallsign] использовал [FROM.GetHerselfHimself] в качестве приманки и заманил '[Prev.GetCallsign]' в ловушку, где [FROM.Owner.GetAdjective] пилоты смогли спикировать на [Prev.GetCallsign]'s эскадрилью. '[FROM.GetCallsign]' сумел перехитрить [Prev.Owner.GetAdjective] самолет и одним выстрелом отправил '[Prev.GetCallsign]' в штопор, и тот рухнул с небес [FROM.GetMissionRegion].\n\n[Prev.GetFullName] был грозным пилотом, на его [FROM.Owner.GetAdjective] совести [Prev.GetHerHis] множество жизней. Это великая победа, и она показывает, что, когда мы объединяемся вокруг великих героев, они совершают великие дела."
 ace_killed_other_ace.1.a: "Победа, которую запомнят все [FROM.Owner.GetNameDef]!"
 aces_killed_each_other.1.t: "Истребитель-ас [FROM.GetFullName] потерпел поражение"
 aces_killed_each_other.1.d: "Во время последней миссии наш знаменитый [FROM.GetAceType] ас [FROM.GetFullname] вступил в затяжной бой с грозным пилотом-асом [Prev.GetFullName]. Испытывая нехватку боеприпасов и не имея возможности сбежать, '[FROM.GetCallsign]' под огнем [Prev.Owner.GetAdjective] самолета пошел на таран '[Prev.GetCallsign]'.\nСамолеты [FROM.GetCallsign] и [Prev.GetCallsign] были замечены разваливающимися на части над [FROM.GetMissionRegion].\n\nХотя тот факт, что [Prev.Owner.GetAdjective] угроза, '[Prev.GetCallsign]', больше не будет нам досаждать, мало кого утешит, мы потеряли ценного общественного деятеля, который вдохновлял всю нацию."
 aces_killed_each_other.1.d_major: "Во время последней воздушной вылазки наш знаменитый [FROM.GetAceType] ас [FROM.GetFullname] вступил в затяжной бой с пилотом-асом, внушавшим страх, [Prev.GetFullName]. Испытывая нехватку боеприпасов и не имея возможности уйти от преследования, '[FROM.GetCallsign]' маневрировал [FROM.GetHerHis] [FROM.GetWingShort] под огнем [Prev.Owner.GetAdjective] и пошел на таран '[Prev.GetCallsign]'.\nОба [FROM.GetCallsign]'а [FROM.GetWingShort] и [Prev.GetCallsign]'а [Prev.GetWingShort] были замечены падающими на землю в [FROM.GetMissionRegion].\n\nХотя тот факт, что [Prev.Owner.GetAdjective] угроза, '[Prev.GetCallsign]', больше не будет нам досаждать, мало кого утешит, мы потеряли ценного общественного деятеля, который вдохновлял всю нацию."
 aces_killed_each_other.1.a: "Огромная потеря для всех нас"
 election.1.t: "ВСЕОБЩИЕ ВЫБОРЫ"
 election.1.d: ""
 election.1.a: ""
 election.2.t: "Выборы: общественность против гонки вооружений"
 election.2.d: "Партия [Root.GetRulingParty] по-прежнему пользуется поддержкой на грядущих выборах, а [Root.GetLeader] не утратил доверия народа. Однако то, что партия всеми силами пытается сделать государство [Root.GetName] более военизированным, не слишком по душе общественности, не одобряющей бессмысленное бряцание оружием. Государство [Root.GetName] еще не втянуто в войну, и мало кто хочет проявлять агрессию. Если мы станем сотрудничать с другими крупными партиями, также озабоченными национальной безопасностью, мы сохраним власть после выборов, даже отчасти лишившись народной поддержки."
 election.2.a: "Мнение народа следует учитывать."
 election.2.b: "Защита суверенитета прежде всего."
 election.3.t: "Выборы: общественность требует гонки вооружений"
 election.3.d: "Война все ближе с каждым днем, и это не могло не сказаться на выборах. Многие избиратели тревожатся, что государство [Root.GetName] не готово к вооруженному конфликту или его последствиям. Они требуют повышения безопасности и подготовки к войне. Большая часть избирателей по-прежнему поддерживает партию [Root.GetRulingParty], но мы можем потерять их, если не отреагируем на их беспокойство."
 election.3.a: "Народ имеет право чувствовать себя в безопасности."
 election.3.b: "Многие все еще выступают за дипломатические методы."
 election.4.t: "Выборы: Фашисты в правительстве?"
 election.4.d: "Агрессивные националистические настроения возобладали в государстве [Root.GetName], и ряд партий принялись активно отстаивать фашистские идеалы: государство, навязывающее свою волю силой. Одна из них стала фаворитом текущих выборов, и в партии [Root.GetRulingParty] начались дискуссии о том, не стоит ли объединить усилия и создать совместное правительство. Они открыто отрицают демократические идеалы, лежащие в основе нашего государства, но если они примут участие в выборах, это может сделать их более сговорчивыми, а наша поддержка поможет удержать их от экстремистских шагов."
 election.4.a: "Лучше они, чем коммунисты!"
 election.4.b: "Лучше создать коалицию демократических сил."
 election.5.t: "Выборы: Коммунисты в правительстве?"
 election.5.d: "Коммунистическое движение в государстве [Root.GetName] получило распространение благодаря растущему недовольству рабочего класса и идеям радикальных мыслителей, и это привело к созданию нескольких партий. Одна из них получила существенную поддержку на текущих выборах, и в партии [Root.GetRulingParty] начались дискуссии о том, не стоит ли объединить усилия и создать совместное правительство. Хотя они считают наши демократические институты всего лишь видом буржуазной тирании, при нашей поддержке они будут пытаться что-то менять мирным путем, вместо того чтобы пытаться сместить правительство."
 election.5.a: "Лучше реформы, чем революция!"
 election.5.b: "Лучше создать коалицию демократических сил."
 election.6.t: "Выборы: демократические партии в меньшинстве"
 election.6.d: "Политическая атмосфера в государстве [Root.GetName] становится все более радикальной. Раньше широкой поддержкой избирателей пользовались демократические партии, но, судя по текущим выборам, на смену таким взглядам пришел политический экстремизм. Партии умеренных, даже если бы они объединились, отставив все разногласия в сторону, не смогли бы получить большинство голосов. Чтобы не остаться в итоге со слабым разрозненным правительством, мы вынуждены вступить в союз с фашистами или коммунистами."
 election.6.a: "В интересах государства [Root.GetName] мы должны объединиться с фашистами."
 election.6.b: "Надо объединиться с коммунистами, чтобы изменить общество к лучшему."
 election.6.c: "Пусть лучше правительство будет слабым и миноритарным."
 election.7.t: "Фашисты влияют на внешнюю политику"
 election.7.d: "Вступив в политическую коалицию с фашистами, мы изменили свою внешнюю политику. Несмотря на весь их оголтелый национализм, фашистам симпатизируют за рубежом, и они одобряют такие изменения в государстве [Root.GetName]. Тоталитарные государства со схожей идеологией видят в нас возможных союзников. Поддерживать отношения с такими странами, несмотря на то, что [Root.GetRulingParty] питает отвращение к их взглядам, может быть необходимо, чтобы сохранить поддержку фашистов в правительстве."
 election.7.a: "Нам нужны союзники против угрозы в будущем."
 election.7.b: "С такими друзьями никаких врагов не надо."
 election.8.t: "Коммунисты влияют на внешнюю политику"
 election.8.d: "Коммунисты часто считают себя частью международной революции, и наш выбор принять их в качестве партнеров в нашем правительстве привлек внимание многих их международных союзников. Представители коммунистических партий поддерживают тесные связи с нациями, которые отказались от нашей формы правления в пользу диктатуры пролетариата, связи, которые нам, возможно, придется признать во внешней политике [Root.GetAdjective], если мы хотим сохранить их поддержку."
 election.8.a: "Нам надо объединиться во имя общей цели."
 election.8.b: "Если пойти таким путем, государство [Root.GetName] может быть уничтожено."
 election.11.t: "Выборы: Фашисты в большинстве"
 election.11.d: "Эти выборы оказались разрушительными для всей демократической системы в целом. Большинство [Root.GetAdjective] населения проголосовало за фашистскую партию, которая стремится к уничтожению выборов и автократическому правлению. Многие намерены отстаивать демократические принципы с оружием в руках, тогда как другие готовы силой продвигать фашистские идеи дальше."
 election.11.a: "[Root.GetName] переживает черные дни, но такова воля народа."
 election.11.b: "Мы не отдадим свою свободу без боя!"
 election.12.t: "Выборы: Коммунисты в большинстве"
 election.12.d: "Последние выборы привели к победе коммунистических партий, что вызвало неоднозначную реакцию прежней администрации. Новое руководство утверждает, что представляет интересы всего народа, однако дорогие нам демократические институты они расценивают лишь как средства оболванивания и угнетения рабочего класса, и возникает вопрос, что же на самом деле представляет собой «правление народа». В ряде стран революции привели к кровопролитию. [Root.GetName] пока живет спокойно, но кто знает, чем все закончится."
 election.12.a: "Это тревожная ситуация, но коммунисты и вправду представляют большинство."
 election.12.b: "Мы должны остановить их, пока они не уничтожили всех несогласных!"
 election.13.t: "Выборы: магнат выступает за фашизм"
 election.13.d: "Влиятельный промышленник, стоящий за одной из компаний, с которой мы решили работать для нашего промышленного производства, недавно сделал ряд заявлений о политике, которые члены администрации сочли тревожными. Он открыто выступал за авторитарное правительство и хвалил иностранные администрации, которые идентифицируют себя как фашистские, неявно намекая, что [Root.GetName] выиграет от такого правления. Осуждение магната и его идеалов может испортить наши отношения с компанией, но если оставить их без внимания, это даст ему платформу для распространения пропаганды, которая подрывает все, за что выступает [Root.GetRulingParty]."
 election.13.a: "Пусть говорит, что пожелает, мы же не обязаны с этим соглашаться."
 election.13.b: "[Root.GetName] не может опираться на помощь и поддержку фашистов."
 election.14.t: "Выборы: исключение для военного времени"
 election.14.d: "[Root.GetName] находится в состоянии войны. В обычное время сейчас должны были бы состояться выборы, но в разгар силового конфликта едва ли следует тратить время на политическую агитацию или допускать смену руководства, если до этого дойдет. Впрочем, есть и те, кто утверждает, что война не может стать поводом к отмене выборов, это уничтожение всех демократических идеалов. Если позволить военным соображениям брать верх над свободой волеизъявления народа - это очень скользкий путь."
 election.14.a: "Выборы пройдут как обычно"
 election.14.b: "Мы займемся этим после победы."
 election.15.t: "Выборы: правительство лишилось доверия"
 election.15.d: "Надвигаются выборы, и общественность начинает сомневаться в том, способно ли нынешнее правительство продолжать войну. Государство [Root.GetName] понесло большие потери, и это настроило нацию против тех, кто, похоже, ведет ее к поражению. Всем очень хочется, чтобы война закончилась как можно скорее, но пусть это лучше сделает другое правительство."
 election.15.a: "Этот кризис доверия крайне огорчителен."
 election.15.b: "Изменим политический ландшафт, чтобы сохранить народное единство."
 election.16.t: "[Root.GetLeader] наслаждается общественной поддержкой"
 election.16.d: "На нынешних выборах оппозиция, если можно назвать ее таковой, подвергла критике все более авторитарный режим партии [Root.GetRulingParty]. Оппозиционеры гадают, есть ли реальная сила у электората или же это - лишь видимость выбора.\n\nОднако, [Root.GetLeader] по-прежнему пользуется высокой популярностью, и, пусть мировое сообщество сомневается в честности выборов, в самой стране их результаты никто не оспаривает. Похоже, что даже если [Root.GetName] больше не управляется людьми, народ все равно поддерживает своего лидера... по крайней мере те, кто сходил на выборы."
 election.16.a: "Один лидер для единой страны"
 election.17.t: "Результаты выборов под вопросом"
 election.17.d: "[Root.GetLeader] эффективно затыкает рты своим политическим оппонентам, но некоторые все равно открыто критикуют недавние выборы. [Root.GetRulingParty] обвиняется в подтасовках и нежелании видеть парламент, который помешал бы проводить политику партии.\n\nПравительство отвергает претензии и считает их попыткой расколоть нацию. Однако на деле большинство граждан сомневаются в своих правителях, а оппозиция, хоть ей и пришлось замолчать, донесла свою мысль до народа."
 election.17.a: "Раскольники!"
 political.1.t: "Коммунизм на подъеме"
 political.1.d: "«По всему миру трудящиеся восстают против угнетателей, но в государстве [Root.GetName] даже те, кто якобы обладает развитым классовым сознанием, сидят сложа руки и ожидают изменений изнутри политической системы, которая прогнила настолько, что спасти от нее может лишь революция!»\n\nТак говорят новые голоса [Root.GetAdjective] коммунистического движения. Они считают правящую партию [Root.GetRulingParty] диктатурой буржуазии и требуют ее смещения любыми средствами. Будут ли эти средства внутренними или внешними, пока неясно."
 political.1.a: "Даже в правительстве могут найтись сторонники таких идей."
 political.1.a.tt: "Увеличивает шанс международной поддержки коммунистического переворота."
 political.1.b: "Народное движение должно искать поддержки у народа."
 political.1.b.tt: "Увеличивает шанс народной поддержки коммунистического восстания."
 political.2.t: "Сторонники марксизма в правительстве"
 political.2.d: "Хотя в целом правящая партия [Root.GetRulingParty] является категорическим противником революционного социализма и бдительно присматривает за левыми радикалами, в правительстве есть лица, готовые, как минимум, учитывать мнение той части населения, которая видит в коммунистической идеологии решение всех проблем, и при этом не доводить ситуацию до гражданской войны.\n\nХотя [Root.GetLeader] и его сторонники могут считать их предателями, это именно те люди, которые могут сделать революцию бескровной, если она наконец придет."
 political.2.a: "Мы тоже будем присматривать за ними - по ряду причин."
 political.2.a.tt: "При достаточной народной поддержке переворот можно осуществить."
 political.3.t: "Коммунисты совершают переворот"
 political.3.d: "В то время как народное движение за коммунистическую революцию было громким и ужасающим, определенная часть политического движения в основном была тихой и выжидающей. Ожидание теперь закончилось. Сегодня, как раз когда руководство [Root.GetRulingParty] и армия готовились к восстанию в национальном масштабе, ряд чиновников в правительстве [Root.GetAdjective] быстро поместили [Root.GetLeader] под домашний арест и вступили в переговоры с мятежниками.\n\nСохраняя видимость сохранения порядка, переговоры фактически сводились к обеспечению позиций в новом социалистическом государстве для тех, кто решил сотрудничать. Переворот был завершен прежде, чем кто-либо смог его остановить, и те, кто мог бы это сделать, теперь заключены в тюрьму, сосланы или казнены новым режимом."
 political.3.a: "Волны истории смывают прошлое."
 political.4.t: "[Root.GetName] переживает классовый конфликт"
 political.4.d: "Коммунистическое революционное движение, когда-то популярное среди радикальных ученых в теории и смутьянов на практике, получило возросшую поддержку среди рабочего класса [Root.GetAdjective]. Тот факт, что все больше людей вообще предпочитают идентифицировать себя с «классом», означает, что марксистские идеи распространяются за пределы тех, кто активно стремится свергнуть правительство.\n\nЧлены [Root.GetRulingParty] сетуют на это развитие событий, тоскуя по времени, когда «[Root.GetAdjective]» было тем, что люди идентифицировали как в первую очередь. Их опасения не беспочвенны. Можно утверждать, что революция уже идет, происходит на нескольких уровнях общества, и может быть слишком поздно ее остановить."
 political.4.a: "Люди могут называть себя как угодно."
 political.5.t: "Солдаты дезертируют и идут в красные партизаны"
 political.5.d: "«Капиталисты и националисты хотят, чтобы вы проливали за них кровь на фронте и убивали своих братьев из-за споров, которые никак не касаются рабочего человека! Вместо того чтобы с оружием в руках идти против рабочих, сражающихся за свободу в своей стране, оберните его против угнетателей и свергните тиранов!»\n\nАрмия, которая раньше была оплотом патриотизма и верности, оказалась уязвима для коммунистической пропаганды, стремительно распространяющейся в государстве [Root.GetName]. Солдаты дезертируют, отказываются сражаться за свою родину, а порой даже примыкают к партизанам, которые заявляют, что готовят революцию."
 political.5.a: "Возможно, они просто хотят жить по-другому."
 political.6.t: "[GetMonth] - время революции"
 political.6.d: "Понятие о том, что коммунистическое движение представляет народ, несомненно, набирает обороты в [Root.GetName], где за последние месяцы быстро возросла поддержка коммунистической партии среди населения. Но те, кто призывает к революции, уже не представляют собой разрозненную группу партизан и недовольных профсоюзов. Группа, стоящая за призывом к восстанию, достаточно организована, чтобы сформировать правительство, если им это удастся.\n\nТем не менее, если революция начнется сейчас, её вряд ли удастся провести без того, чтобы не втянуть [Root.GetName] в гражданскую войну. Стоит ли революционерам рисковать расколом нации, чтобы удовлетворить своё нетерпение, или лучше подождать более подходящего момента в будущем?"
 political.6.a: "Нужно действовать сегодня, чтобы войти в историю!"
 political.6.b: "Революция неизбежна. Неизбежное может и подождать."
 political.7.t: "Фашизм на подъеме"
 political.7.d: "«[Root.GetAdjective] народ долго терпит неумелое руководство партии [Root.GetRulingParty]! Оно утверждает, будто представляет интересы граждан, но не может навести порядок на улицах! Только отстранив эту партию от власти, мы сможем повести нашу страну вперед!»\n\nФашистские ораторы в государстве [Root.GetName] не скрывают своей неприязни к нашим властям и политической системе. Такие речи порождают инакомыслие среди граждан, особенно в консервативно настроенных слоях нашей армии."
 political.7.a: "В верхах с этим тоже могут быть согласны, хотя и не скажут вслух."
 political.7.a.tt: "Увеличивает шанс международной поддержки фашистского переворота."
 political.7.b: "Молодое поколение подхватит факел."
 political.7.b.tt: "Увеличивает шанс народной поддержки фашистского переворота."
 political.8.t: "Поддержка фашистов в армии"
 political.8.d: "Некоторые высокопоставленные военные в [Root.GetAdjective] армии, кто негласно, а кто и публично, выразили поддержку фашистскому движению в государстве [Root.GetName]. Они считают, что партия [Root.GetRulingParty] забыла о важности военной силы для сохранения державы. Многие раздражены отношением к армии как к инструменту, а не как к одному из столпов государства. Кое-кто даже заявляет, что для уверенного движения во вторую половину столетия государству [Root.GetName] необходимо новое правительство.\n\nВ этой фракции не много политиков, однако есть чиновники из Министерства обороны. Они могут набрать достаточный политический вес и устроить переворот, если события будут и дальше развиваться в том же духе."
 political.8.a: "Национальный дух важнее правительства."
 political.9.t: "Фашистский переворот"
 political.9.d: "Некоторые утверждают, что они это предвидели. И те, кто предупреждал об угрозе, и те, кто призывал фашизм для спасения государства [Root.GetName], сегодня увидели, что их пророчества исполнились: военные в городе [Root.Capital.GetName] свергли правительство, сформированное партией [Root.GetRulingParty], и захватили власть. [Root.GetLeader] исчез и, по слухам, бежал из страны, так что сопротивления заговорщикам никто не оказывал.\n\nНовое [Root.GetAdjective] правительство не собирается давать недовольным шанса как-то проявить себя. Было объявлено военное положение. Учитывая скорость всех этих перемен, похоже, страна очень скоро изменится."
 political.9.a: "Сильное государство необходимо, чтобы защищать людей от самих себя."
 political.10.t: "Гражданская война за фашизм"
 political.10.d: "Попытки фашистов возродить в народе националистический дух имели определенный успех, но и сопротивление таким идеям по-прежнему велико. Генералы, планирующие свергнуть нынешнюю власть, разочарованы тем, что у самих [Root.GetAdjective] граждан мало доверия к партии [Root.GetFascistParty].\n\nОни по-прежнему убеждены, что [Root.GetLeader] скоро лишится народной поддержки, но не уверены, какой курс лучше избрать. Некоторые призывают к немедленному перевороту, пока слабостью государства [Root.GetName] не воспользовались враги. Однако с учетом ограниченной народной поддержки это, скорее всего, запалит костер гражданской войны."
 political.10.a: "Не стоит желать власти, если не готов ее захватить."
 political.10.b: "Сперва следует объединить людей, а потом уже управлять ими."
 political.11.t: "Фашисты формируют штурмовые дивизии"
 political.11.d: "В фашизме всегда переплетались политика и военная сила. Одновременно с расширением политического влияния фашисты начали создавать военизированные организации для защиты как от внешней, так и от внутренней угрозы, причем к последней они относят своих политических противников. Многих беспокоит такое развитие событий, однако на волне милитаристского подъема все больше добровольцев вливается в наши вооруженные силы.\n\nПолитические лидеры движения показали, что оппоненты не зря опасаются их. Когда армия становится политизирована на всех уровнях, враги государства [Root.GetName] и враги фашизма начинают выглядеть очень похоже."
 political.11.a: "Только предателям нации есть чего опасаться."
 political.12.t: "Угроза коммунизма"
 political.12.d: "«[Root.GetLeader] убеждает вас, что [Root.GetName] в полном порядке и никакого разлада нет. Эта ложь отравляет умы людей, когда совсем рядом, на пороге дома, уже затаилась змея! Достаточно взглянуть на наших соседей: там жители обратились друг на друга, провозглашая гибель наций. Как скоро они объявят мертвой нашу нацию? И какую защиту нам даст [Root.GetRulingParty]?»\n\n[Root.GetName] переживает рост фашистского движения из-за коммунистической революции, которая произошла поблизости. Многие умеренные, которые в другое время отвергли бы фашизм, как и любые иные неуместные эксперименты с идеологией, сейчас испытывают беспокойство, а выбирая между коммунизмом и фашистским режимом, они предпочтут второе. И многие готовы поддержать такой выбор активно."
 political.12.a: "Мы станем заслоном на пути красной угрозы!"
 political.13.t: "Продвижение к демократии"
 political.13.d: "«Если мы затыкаем рот народу, как можно утверждать, что [Root.GetName] говорит его голосом? Если мы боимся разногласий, боимся, что нас публично отвергнут или изгонят прочь всеобщим голосованием, значит, мы опасаемся ненависти наших сограждан. Неужели у партии [Root.GetRulingParty] настолько мало веры в собственные принципы?»\n\nОдна из фракций в правительстве, осторожная и неорганизованная, но идеологически последовательная, начала выступать за политику большей терпимости по отношению к врагам государства. Они хотят привлечь общественность к принятию решений и предлагают использовать для этого референдумы и местные партийные собрания, даже если в будущем это приведет к смене курса."
 political.13.a: "Для начала это стоит обсудить внутри себя."
 political.13.a.tt: "Увеличивает шанс международной поддержки при организации выборов."
 political.13.b: "Мы все равно знаем, что правы, так что пусть враги говорят в открытую."
 political.13.b.tt: "Увеличивает шанс народной поддержки идеи выборов и формирования оппозиции."
 political.14.t: "[Root.GetRulingParty] обсуждает демократические идеи"
 political.14.d: "Как ни странно, идея проведения референдумов и смягчения репрессий против врагов режима получила определенную поддержку в рядах партии [Root.GetRulingParty]. Ее лидер смотрит на это скептически, однако курс перемен поддерживают влиятельные партийцы.\n\nВозможно, они полагают, что на практике это мало что изменит, либо и впрямь предают партийные идеалы, как утверждают их оппоненты. В любом случае, если общество потребует таких перемен, некоторые лидеры государства [Root.GetName] готовы к компромиссу."
 political.14.a: "Выбор не обязательно всегда стоит между свободой или смертью."
 political.14.a.tt: "Правительство может устроить выборы, когда такая политика получит поддержку большинства."
 political.15.t: "Формирование демократической оппозиции"
 political.15.d: "Как и стоило ожидать, после смягчения ограничений на публичную антиправительственную пропаганду голоса недовольных стали звучать громче. Пока что организованные акции протеста и памфлеты распространены в основном в университетах или в бедных районах государства [Root.GetName], но движение ширится, в этом сомнений нет.\n\nМнение лидеров нации разделилось. [Root.GetLeader], несгибаемый лидер правящей партии, не желает никаких публичных дебатов. И все же первые шаги сделаны, обратного пути уже нет."
 political.15.a: "В отсутствие репрессий это движение проявляется естественным образом."
 political.16.t: "Призыв ко всеобщим выборам"
 political.16.d: "Проявления общественного недовольства, которые случались ранее лишь в отдельных местах, теперь случаются повсюду. Пока люди выходят на улицы, партия [Root.GetRulingParty] стоит на перепутье. Если мы не пресечем эту пропаганду, наши оппоненты и даже некоторые члены партии могут потребовать проведения референдума, на котором общественность откажет нам в доверии. Единство, к которому мы так долго стремились, уступает место плюрализму мнений - и все они направлены против нас."
 political.16.a: "Даже если начнутся реформы, мы должны проявить силу, подавив несогласие."
 political.16.b: "Нужно выслушать народ."
 political.17.t: "Всеобщие выборы в государстве [Root.GetName]"
 political.17.d: "Так как свобода выражения мнений и собраний стала всё более принятым в [Root.GetName], фракция внутри [Root.GetRulingParty], выступающая за проведение выборов, превратилась из тайных заговорщиков в открыто поддерживаемых реформаторов. Несмотря на протесты [Root.GetLeader], страна медленно, но уверенно движется к демократии в последние месяцы, и проведение выборов теперь кажется естественным следующим шагом.\n\nОднако далеко не все [Root.GetAdjective] граждане поддерживают демократические реформы. Всё ещё ведутся дебаты внутри партии о том, стоит ли отложить проведение выборов, пока мы не обеспечим стабильное развитие."
 political.17.a: "Те, кто лоялен партии [Root.GetRulingParty], поддержат вариант скорейшего проведения выборов."
 political.17.b: "Реформы сперва должны получить более широкую поддержку."
 political.18.t: "Фашисты требуют референдум"
 political.18.d: "Быстро растущее [Root.GetAdjective] фашистское движение никогда не утверждало, что нуждается в поддержке большинства для захвата власти, и рассчитывало объединить нацию уже после смены правящего режима. Тем не менее, общество все больше его поддерживает. Фашисты называют лидера [Root.GetLeader] лицемером, потому что нельзя утверждать, будто выражаешь волю народа, и не слышать его голосов.\n\nПризыв к референдуму до сих пор отвергался как типичная попытка членов партии [Root.GetRulingParty] сломать систему, но это, по крайней мере, политическая мера. Если не делать совсем ничего, фашисты могут решить, что лучше захватить власть силой."
 political.18.a: "Подавить это ненавистное движение!"
 political.18.b: "Не стоит обращать на них внимания."
 political.18.c: "Если народ этого захочет, мы проведем референдум."
 political.19.t: "Коммунисты требуют референдум"
 political.19.d: "Марксистские идеи закрепились в государстве [Root.GetName] довольно давно и пользуются все большей поддержкой. Это уже не просто политическая теория, а настоящее движение, объединившее как недовольных рабочих, так и некоторых знаменитостей. Коммунисты называют это классовым сознанием. Партия [Root.GetRulingParty] называет это прямым путем к бунту и измене.\n\nУ коммунистов нет веры в то, что лидер [Root.GetLeader] захочет проводить предлагаемые ими реформы, поэтому они требуют немедленно провести референдум о смене власти. Мы еще можем попытаться перетянуть общественное мнение на свою сторону, но если попытка окончится неудачей, это может привести к революции."
 political.19.a: "Необходимо подавлять любую анти[Root.GetAdjective] деятельность!"
 political.19.b: "Не стоит обращать внимания на болтунов."
 political.19.c: "Уж лучше референдум, чем кровавый бунт."
 political.20.t: "Демократы требуют референдум"
 political.20.d: "Нет ничего удивительного, что идея о том, чтобы народ сам управлял своей страной, обрела популярность в обществе. Разумеется, партия [Root.GetRulingParty] видит в демократических идеях - свобода слова, всеобщие выборы, свободная пресса - всего лишь популистскую риторику, призванную ослабить правительство, которое возглавляет [Root.GetLeader].\n\nИ все же трудно отрицать, что такие идеи нашли поддержку в [Root.GetAdjective] обществе. В соответствии с демократической традицией их сторонники требуют проведения референдума, чтобы сместить правящий режим. Это можно игнорировать, однако подобные идеи достаточно жизнестойки. Что с нами будет, если мирная революция окажется невозможной?"
 political.20.a: "Это надо прекратить."
 political.20.b: "Будем жить как обычно."
 political.20.c: "Если дать согласие на референдум, мы еще можем сохранить наше наследие."
 political.21.t: "[Root.Capital.GetName] в опасности, фашисты наступают"
 political.21.d: "Сделав вид, будто они требуют референдум для получения власти мирным путем, и столкнувшись с отказом, фашисты использовали значительную общественную поддержку и связи в [Root.GetAdjective] армии, чтобы устроить переворот. Правительство, которое возглавляет партия [Root.GetRulingParty], не подчинилось их требованиям и утверждает, что будет до победного конца бороться за сохранение государства [Root.GetName] таким, каким мы его знаем."
 political.21.a: "Мы остановим их любой ценой!"
 political.21.b: "Фашисты лучше всех ощущают истинный дух нации!"
 political.22.t: "Коммунизм на подъеме"
 political.22.d: "После того как им отказали в проведении референдума, немногие реформаторы-коммунисты быстро утратили свое влияние в государстве [Root.GetName], и верх взяли радикалы. Партия [Root.GetRulingParty] отказалась признать, что общество жаждет реформ, и все больше людей стали проникаться революционной романтикой. Лидеры движения без труда подняли народ на восстание. Отдельные очаги недовольства быстро переросли в полномасштабную гражданскую войну, и теперь будущее всей нации поставлено на карту."
 political.22.a: "Мы не позволим им развалить страну!"
 political.22.b: "Огонь революции можно погасить лишь кровью угнетателей!"
 political.23.t: "[Root.GetAdjective] весна"
 political.23.d: "После того как народ не получил желаемого референдума и демократических преобразований, люди, стоявшие за идеей реформ, сочли, что режим, главой которого является [Root.GetLeader], уже не сделать лучше. Коалиция повстанческих группировок, объединенная общей целью демократизации политической системы в государстве [Root.GetName], взялась за оружие и объявила, что она не успокоится до тех пор, пока партия [Root.GetRulingParty] находится у власти."
 political.23.a: "Не хватало еще, чтобы нами правила толпа!"
 political.23.b: "[Root.GetName] наконец обретает свободу!"
 political.24.t: "Фашисты осмеяны"
 political.24.d: "Очарованность [Root.GetAdjective] общества националистической гордыней и попытками возродить былую державную славу, похоже, миновала. Это стало болезненным ударом по ярым сторонникам фашистов, над чьей униформой, воинственными позами и напыщенными речами сейчас все смеются.\n\nОдно время они казались угрозой для партии [Root.GetRulingParty], но теперь [Root.GetAdjective] фашизм все чаще оценивают как нелепый экстремизм и попытку уничтожить фундаментальные ценности нации - той самой нации, которую они, якобы, так ценили и уважали. Слово «фашист» из политического определения стало оскорблением."
 political.24.a: "Вот ведь клоуны."
 political.25.t: "Коммунистический пузырь лопнул"
 political.25.d: "Многие коммунисты обещали, что государство [Root.GetName] станет следующим в цепочке охваченных так называемой мировой революцией, но после нескольких месяцев забастовок и красных флагов на улицах дело пошло на спад. Рабочий класс, который должен был стать движущей силой революции, решил, что у него есть заботы поважнее, чем свержение лидера [Root.GetLeader]: видимо, пример других коммунистических держав его не слишком вдохновил. Интеллектуалы, со страстью призывавшие перерезать горло угнетателям, в реальности не пожелали делать ничего, что могло бы помешать их комфорту.\n\nРазговоры о революции, конечно, будут продолжаться - за кружкой дешевого пива или за бокалом дорогого вина, - но так разговорами и останутся."
 political.25.a: "Вот ведь лицемеры."
 political.26.t: "Демократическое движение затихает"
 political.26.d: "После нескольких месяцев громкой оппозиции режиму [Root.GetLeader], требующего проведения публичных выборов и более либеральных законов о свободе собраний и слова, движение, похоже, распалось. Люди теперь выражают большее беспокойство по поводу стабильности [Root.GetName], если такие реформы будут реализованы, при этом тех, кто требует демократии, все больше воспринимают как нарушителей порядка, чем как истинных борцов за изменения.\n\nБолее таинственно, многие из ведущих фигур движения, похоже, исчезли или резко прекратили свою деятельность. Возможно, некоторые из них выбрали путь в изгнание, осознав провал своих усилий. Тем не менее, правительство [Root.GetRulingParty] отрицает всякое знание и участие в этих событиях."
 political.26.a: "Вот ведь неудачники."
 political.27.t: "[Root.GetLeader] отказывается от внешней политики нейтралитета"
 political.27.d_fascism: "После того как [Root.GetRulingParty]'с приходом к власти [Root.GetLeader] объявил, что [Root.GetName] больше не будет придерживаться нейтральной внешней политики,\n'мир стал запутанным и сложным. Мы больше не в безопасности сами по себе. Мы должны объединиться с нашими фашистскими партнерами против наших врагов. Если мы не выберем сторону, мы погибнем в одиночку.'"
 political.27.d_communism: "После недавнего прихода к власти [Root.GetRulingParty], [Root.GetLeader] объявил, что [Root.GetName] больше не будет придерживаться нейтральной внешней политики.\n«Мир стал запутанным и сложным. Эта страна всегда стояла на своих принципах и была готова их защищать. Мы больше не в безопасности в одиночестве. Нейтралитет больше не является безопасным убежищем, каким он был раньше, и те, кто стремится к власти в этом мире, не уважают его. Мы должны стоять рядом с нашими коммунистическими братьями против сил, которые стремятся подавить нас. Против буржуазного большинства, которое не хочет ничего другого, кроме как держать нас внизу. Если мы не сделаем выбор, мы погибнем в одиночестве.»"
 political.27.a: "За будущее государства [Root.GetName]"
 political.28.t: "[Root.GetNameDef] воссоединяется"
 political.28.d: "Конец ужасной гражданской войны, опустошившей нашу землю, подходит к концу, и мы наконец достигли политического соглашения. Теперь мы встречаемся с нашими коллегами [Root.GetAdjective], и вместе мы восстановим нашу великую нацию. Враги, которые стремились извлечь выгоду из нашей борьбы, теперь столкнутся с единым народом [Root.GetAdjective].\n\nНовое [Root.GetRulingIdeology] [Root.GetName] больше никогда не будет разделено!"
 political.28.a: "Наконец-то мы едины!"
 THREAT_FROM_EFFECT: "Угроза действием"
 war_justification.1.t: "[Root.GetLeader] выступает против [FROM.GetName]"
 war_justification.1.d: "- [FROM.GetName]Принадлежит к [FROM.GetAdjective]? Давайте зададим себе вопрос получше: принадлежит ли будущее [FROM.GetAdjective] или оно принадлежит к [Root.GetNameDef]?\"В сегодняшней речи\n\n[Root.GetLeader] [Root.GetName] говорилось о том, что она находится на пути к войне. За последний месяц нарастала политическая напряженность, и, похоже, [Root.GetAdjective] люди начинают смиряться с тем, что война неизбежна."
 war_justification.1.a: "Будущее принадлежит государству [Root.GetName]"
 war_justification.2.t: "[Root.GetLeader] осуждает [FROM.GetAdjective] Идеалы"
 war_justification.2.d: "«[FROM.GetAdjective] заявляют, что у них есть свобода и демократия, что они хотят мира, но все эти вещи, которыми они так гордятся, — пустое место. Их демократия разделяет народ там, где он должен быть един, а их свобода лишь свидетельствует о недостатке дисциплины. Мы [Root.GetAdjective] видим их ложь насквозь... и мы видим, что этот мир, мир на их условиях, — тоже ложь».\n\n[Root.GetRulingParty] уже давно высмеивает слабость [FROM.GetAdjective] нации, но в последнее время риторика стала более агрессивной. День вооруженного конфликта все ближе."
 war_justification.2.a: "Государство [Root.GetName] объединяется под властью лидера [Root.GetLeader]."
 war_justification.3.t: "[Root.GetLeader] Предостерегает от [FROM.GetAdjective] коммунизма"
 war_justification.3.d: "«Существует ли угроза нашему образу жизни, да и самому образу жизни, более серьезная, чем коммунизм? Эта чума грозит превратить рабов, а не господ, в правителей всех народов, уничтожить сами народы и их историю. Мы возьмем [FROM.GetName] и уничтожим коммунистическую чуму. Ненависть\n\n[Root.GetLeader] к коммунистам была хорошо известна еще до прихода [Root.GetRulingParty] к власти, но в последнее время она, похоже, усилилась в связи с деятельностью [FROM.GetAdjective] правительства». Возможно, именно с этого стоит начать наше стремление стереть марксизм с лица земли."
 war_justification.3.a: "Кто отрицает государство, того ждет гибель."
 war_justification.4.t: "[Root.GetName] готовится к великой борьбе"
 war_justification.4.d: "«[FROM.GetAdjective] — это народ, который не так-то просто расстается с властью. Однако они также должны понимать, что путь наших двух народов может закончиться только столкновением. Мы должны быть готовы к грядущей борьбе. [FROM.GetName] не сдастся без боя».\n\n Возможность взаимопонимания между правительствами [FROM.GetName] и [Root.GetName] со схожими взглядами уступила место кампании по захвату их территорий силой."
 war_justification.4.a: "Наша победа войдет в историю."
 war_justification.5.t: "[Root.GetLeader] Вносит революцию в [FROM.GetName]"
 war_justification.5.d: "«Несмотря на то, что мы укрепили социалистическое общество в [Root.GetName], многие народы по-прежнему страдают от старых деспотических порядков. У рабочих [FROM.GetName] нет права голоса, нет возможности объединяться, и любые попытки установить социализм будут жестоко подавляться [FROM.GetLeader] режимом. Мы не можем ждать, пока международная революция придет на помощь [FROM.GetAdjective] народу. Революцией мы доказали, что можем свергнуть капиталистических угнетателей здесь, и мы свергнем их и в [FROM.Capital.GetName]!»'\n\n[Root.GetLeader] отказалась от всех попыток вести дипломатическую риторику в отношении [FROM.GetRulingParty]-контролируемых [FROM.GetName]. Стремление стереть все границы теперь сосредоточено исключительно на стирании их границ."
 war_justification.5.a: "[FROM.GetAdjective] Рабочие, ваше освобождение близко!"
 war_justification.6.t: "[Root.GetLeader] Призывает оказать помощь [FROM.GetAdjective] Работникам"
 war_justification.6.d: "«Есть ли ложь большая, чем мнимая свобода [FROM.GetAdjective] народа? Там, где когда-то они были рабами князей и герцогов, претендовавших на право собственности на землю, теперь они вынуждены продавать свой труд тем, кто претендует на право собственности на фабрики. Их свободу выбирать одного хозяина вместо другого едва ли можно назвать свободой. Точно так же их свобода выбирать своих лидеров — ложный выбор, поскольку пропаганда никогда не позволила бы истинным социалистам прийти к власти». Народ, столь тщательно подвергнутый идеологической обработке, может быть спасен только [Root.GetAdjective] вмешательством\".\n\n[Root.GetLeader] Долгое время полемизировал с правительством в [FROM.GetName] на партийных собраниях, но сейчас эта риторика чаще используется публично. Нет особых оснований полагать, что этот конфликт может быть разрешен мирным путем."
 war_justification.6.a: "Мы уничтожим диктатуру буржуазии!"
 war_justification.7.t: "[FROM.GetAdjective] Коммунизм терпит крах"
 war_justification.7.d: "\"Товарищи, хотя величайших революционеров когда-то называли предателями, стало ясно, что была предана сама революция. Как еще вы могли бы объяснить правление [FROM.GetRulingParty] оф [FROM.GetName], которые отбросили всякий намек на марксистские идеи, чтобы построить выродившееся рабочее государство, где они могут править на ложных предпосылках? Укрепляя свою собственную власть ценой международной революции, они показали, что их мало заботят идеалы, которых они, по их утверждению, придерживаются. Мы должны принести им настоящую революцию.\n\n Хотя изначально [FROM.GetAdjective] поддерживал революцию, [Root.GetLeader] все больше разочаровывался в ее ходе.  Возможно, [Root.GetRulingParty] придется вмешаться, пока не стало слишком поздно."
 war_justification.7.a: "Мы еще можем спасти эту попытку построить социализм."
 war_justification.8.t: "[Root.GetLeader] Призывы к подавлению [FROM.GetAdjective] национализма"
 war_justification.8.d: "«Есть ли какое-либо общество, более враждебное будущему революции, более чуждое тяжелому положению рабочего класса, чем фашистский режим [FROM.GetName]? Призывая народ фанатично служить ветхому институту национального государства, они облачают вековые варварские обычаи в современную одежду, пытаясь представить себя альтернативой неизбежной международной победе рабочего класса. Это лишь вопрос времени, когда они нападут на нас или наших союзников». Давайте нанесём удар первыми.\n\n Никто не ожидал, что отношения между нами и [FROM.GetAdjective] будут иными, кроме взаимного презрения, но в последнее время враждебность усилилась.  Похоже, конфликт неизбежен."
 war_justification.8.a: "Смерть фашистам!"
 war_justification.9.t: "Дипломатические попытки с использованием [FROM.GetName] терпят неудачу."
 war_justification.9.d: "«Несмотря на наши попытки найти дипломатическое решение нашего конфликта с [FROM.GetName], переговоры снова зашли в тупик, и у нас остались лишь ограниченные возможности.  Авторитарный [FROM.GetLeader] режим продемонстрировал неразумный подход к этому вопросу, типичный для лидеров, которые не несут ответственности перед своим народом.  Если политика [FROM.GetAdjective] руководства не изменится в корне, нам ничего не останется, кроме как вступить в бой».\n\n[Root.GetAdjective] Вмешательство в дела [FROM.GetName] стало острой темой для обсуждения, и некоторые оппозиционные политики утверждают, что [Root.GetRulingParty] с самого начала проводила агрессивную политику. Какими бы ни были их изначальные намерения, грядущая война внезапно стала казаться вполне реальной и неизбежной."
 war_justification.9.a: "Иногда конфликт попросту неизбежен."
 war_justification.10.t: "[Root.GetLeader] Инициирует вмешательство в [FROM.GetName]"
 war_justification.10.d: "С тяжелым сердцем мы вынуждены признать реальность нашей ситуации: вторжение в [FROM.GetName] может быть нашим единственным выходом.  В сложившейся ситуации любое другое решение было бы слишком рискованным с точки зрения стратегического преимущества.  Хотя мы верим, что ни [Root.GetAdjective] ни [FROM.GetAdjective] не хотят войны, история привела нас к этому моменту, и наши возможности ограничены. Мы можем лишь надеяться, что, продемонстрировав нашу военную мощь, мы сможем избежать дальнейшего кровопролития в будущем.\n\n Хотя существует популярная теория о том, что демократические государства не вступают в войны с другими демократиями, последние события указывают на [Root.GetAdjective] возможность [FROM.GetName] вторжения в будущем.  История еще может нас удивить."
 war_justification.10.a: "[FROM.GetName] — это в любом случае сомнительная демократия."
 war_justification.11.t: "[Root.GetLeader] призывает к борьбе против красной угрозы"
 war_justification.11.d: "«Без сомнения, [FROM.GetName] коммунизм — одна из самых серьезных угроз свободе и порядку в наше время. Неумолимый и безжалостный, он угрожает поглотить не только [FROM.GetAdjective] надежды людей на процветающее демократическое общество, но и надежды их соседей. Если мы не начнем действовать прямо сейчас, то можем опоздать с первым звеном домино, и за ним последуют новые провальные социальные эксперименты. Сколько еще людей должно погибнуть, прежде чем мы вмешаемся?»'\n\nУгроза подрывной деятельности, подрывающей нашу демократию и подпитываемой [FROM.GetAdjective] амбициями, в последнее время стала предметом жарких споров. Оппозиционные представители называют это «красной угрозой», направленной на развязывание войны с [FROM.GetName], но риторика [Root.GetRulingParty] пока что весьма успешна."
 war_justification.11.a: "Их идеология крайне агрессивна, на что еще они могут рассчитывать, кроме агрессии?"
 war_justification.12.t: "[Root.GetLeader] Противостоит [FROM.GetAdjective] Фашизму"
 war_justification.12.d: "«В новейшей истории, а возможно, и в истории в целом, не было более жестокой тирании, чем та железная хватка, которой [FROM.GetRulingParty] сейчас держит [FROM.GetName]. Кто-то может возразить, что мы не должны провоцировать конфликты, что мы должны верить [FROM.GetLeader] в том, что она будет соблюдать договоры и обещания в будущем, но эти люди не понимают, что договоры, заключенные во времена фашизма, бесполезны». Для этих бесчестных лжецов сила — право, а бумага, на которой написано соглашение, горит так же легко, как книги их недоброжелателей.\n\n Люди, которые долгое время надеялись избежать прямой конфронтации с [FROM.GetName], теперь столкнулись с яростным противодействием со стороны [Root.GetLeader], который утверждает, что мы, выражаясь языком Макиавелли, просто оттягиваем войну на благо противника.  Такими темпами мы можем нанести первый удар."
 war_justification.12.a: "Не будет мира для нас, пока они не уйдут."
 war_justification.13.t: "[Root.GetLeader] призывает к войне против [FROM.GetName]"
 war_justification.13.d: "«Хоть мы и мирный народ, наша природа сама по себе не определяет наш исторический путь. Сейчас время войны. Слишком долго [FROM.GetAdjective] обладали средствами, которые нужны нам, чтобы пройти через испытания, которые могут нам выпасть, и очевидно, что они не расстанутся с ними по доброй воле». Несмотря на все наши усилия по построению современного государства, некоторые вопросы можно решить только с помощью старых проверенных методов — в бою.\n\n[Root.GetLeader]' враждебная риторика в отношении [FROM.GetName] зашла так далеко, что стала поводом для вторжения.  Часть населения поддерживает этот курс, но решение за нашим лидером."
 war_justification.13.a: "Это непростое решение, но мы должны его принять."
 war_justification.14.t: "[Root.GetLeader] Вызовы [FROM.GetAdjective] Претензии"
 war_justification.14.d: "'[FROM.GetName] могут считать себя более современными и продвинутыми, чем мы, но правда в том, что их нация не подвергалась таким испытаниям, как наша, и они не готовы к угрозам, которые уже маячат на горизонте. Своим пренебрежением к нам и попытками помешать нам забрать то, что принадлежит нам по праву, они сами превратили нас в угрозу для себя. Их слабая и разобщённая нация вряд ли сможет противостоять нашим притязаниям.'\n\n Насмешливое отношение [FROM.GetName] к [Root.GetRulingParty] давно переросло из критики в враждебность. Хотя бытует мнение, что [FROM.GetAdjective] народ хочет избежать войны, [Root.GetLeader] утверждает, что избранные им лидеры спровоцировали ее своим высокомерием."
 war_justification.14.a: "Они не знают, как мы закалились в испытаниях."
 war_justification.15.t: "[Root.GetLeader] пытается восстановить порядок в [FROM.GetName]"
 war_justification.15.d: "«Национальный дух [Root.GetAdjective] силён, но не все нации столь удачливы. У [FROM.GetName] были уничтожены традиции, а законные правители давно убиты и похоронены — всё во имя идеи великой марксистской революции. Наш долг — восстановить порядок в этом мире, сбитом с пути кровожадными узурпаторами, и утвердить силу [Root.GetName] против этой угрозы.»\n\n«Хотя [Root.GetRulingParty] всегда выступала против коммунизма, [FROM.GetName] в последнее время стал объектом особых нападок в недавних речах. Независимо от того, является ли угроза нападения коммунистов на [Root.GetAdjective] нацию реальной, превентивный удар по коммунизму в [FROM.GetAdjective] уже находится в разработке.»"
 war_justification.15.a: "Мы должны отомстить за всех жертв революции!"
 war_justification.16.t: "[Root.GetLeader] Вызывает [FROM.GetAdjective] Угнетателей"
 war_justification.16.d: "«Мои оппоненты хотят, чтобы вы поверили, будто мое правление похоже на правление [FROM.GetRulingParty] в [FROM.GetName]. Они глубоко заблуждаются. В то время как успехи [FROM.GetLeader] являются результатом недавней причуды, разрушительного массового движения, направленного на то, чтобы запугать другие народы и заставить их подчиниться, [Root.GetRulingParty] противостоит этому движению, потому что не собирается подчиняться. Я готов сделать все необходимое, чтобы устранить эту угрозу, даже если это будет означать войну».\n\n Режим [Root.GetLeader] проводит враждебную политику в отношении [FROM.GetAdjective] нации. Как бы ни называли наших лидеров, слово «фашист» приберегают для наших врагов."
 war_justification.16.a: "Традиции и здравый смысл всегда берут верх над фанатизмом и террором."
 war_justification.17.t: "[Root.GetLeader] Вопросы [FROM.GetAdjective] Суверенитет"
 war_justification.17.d: "\"Кто определяет границы нации и как они определяются? Какие бы способы люди ни находили в прошлом, чтобы объяснить, где [Root.GetName] заканчивается и [FROM.GetName] начинается, мы живем в новую эпоху. Стратегическое значение этой границы невозможно переоценить, и мы имеем полное право изменить ее, чтобы обеспечить дальнейшую безопасность нашего народа\".\n\nСлушая [Root.GetLeader]недавние выступления, вторжение в [FROM.GetName] кажется неизбежным. Раздаются голоса несогласных, но общественная поддержка войны растет."
 war_justification.17.a: "Мы должны сплотиться ради этой цели!"
 war_justification.18.t: "[Root.GetLeader] ставит под сомнение мотивы [FROM.GetName]"
 war_justification.18.d: "«Нет никаких сомнений в том, что [FROM.GetName] готовится к войне. Изменения в экономической политике ясно дают понять, что [FROM.GetAdjective] — не миролюбивый народ, а скорее выжидающий момент для нанесения удара по нам. Будем ли мы стоять в стороне и смотреть, как они вооружаются, пока [Root.GetName] беззащитен? Или мы разоружим эту угрозу до того, как она станет нам не по силам?»\n\n «Ястребы» в [Root.GetRulingParty] обратили свой взор на [FROM.GetName], утверждая, что нападение — лучшая защита. Их точка зрения набирает популярность, и [Root.GetName] готовится к войне."
 war_justification.18.a: "Этот конфликт придется закончить военным путем."
 war_justification.19.t: "[Root.GetLeader] Разгневан [FROM.GetAdjective] Позерство"
 war_justification.19.d: "«Те наивные граждане [Root.GetName] , которые считают [FROM.GetAdjective] миролюбивым народом, совершенно оторваны от реальности.  Те, кто живет у наших границ, не позволяют себе таких заблуждений, видя, как их войска приближаются к нам.  Мы не можем оставить эту угрозу без ответа.  С каждым днем [FROM.GetName] готовится к войне». С нашей стороны было бы безумием не поступить так же.\n\n Военное присутствие [FROM.GetAdjective] вблизи нашей территории вызывает все большую обеспокоенность, поскольку эта страна все больше и больше становится врагом [Root.GetRulingParty]. Вопрос о том, является ли это причиной или следствием их полемики, остается спорным."
 war_justification.19.a: "Это не имеет значения, пора готовиться к войне."
 war_justification.20.t: "[Root.GetLeader] выступает за вторжение в [FROM.GetName]"
 war_justification.20.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [FROM.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [Root.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [Root.GetRulingParty] leaders, most prominently [Root.GetLeader], has been calling the public to support an invasion of [FROM.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.20.a: "Нация поддерживает это значимое решение."
 war_justification.201.t: "[FROM.GetLeader] выступает против [Root.GetName]"
 war_justification.201.d: "- [Root.GetName]Принадлежит к [Root.GetAdjective]? Давайте зададим себе вопрос получше: принадлежит ли будущее [Root.GetAdjective] или оно принадлежит [FROM.GetName]?\"Сегодняшняя речь\n\n[FROM.GetLeader] предполагает, что [FROM.GetName] находится на пути к войне. За последний месяц нарастала политическая напряженность, и, похоже, [FROM.GetAdjective] люди смирились с тем, что война неизбежна. [Root.GetName]тоже надо подготовиться."
 war_justification.201.a: "Почему нам не дают жить в мире и покое?"
 war_justification.202.t: "[FROM.GetLeader] Осуждает [Root.GetAdjective] Идеалы"
 war_justification.202.d: "«[Root.GetAdjective] заявляют, что у них есть свобода и демократия, что они хотят мира, но все эти вещи, которыми они так гордятся, — пустое место. Их демократия разделяет народ там, где он должен быть един, а их свобода лишь свидетельствует о недостатке дисциплины. Мы [FROM.GetAdjective] видим их ложь насквозь... и мы видим, что этот мир, мир на их условиях, — тоже ложь».\n\n[FROM.GetRulingParty] уже давно высмеивает слабость [Root.GetAdjective] нации, но в последнее время риторика стала более агрессивной. День вооруженного конфликта все ближе."
 war_justification.202.a: "Как и следовало ожидать от фашистской мрази вроде [FROM.GetLeader]."
 war_justification.203.t: "[FROM.GetLeader] Предостерегает от [Root.GetAdjective] коммунизма"
 war_justification.203.d: "«Существует ли угроза нашему образу жизни, да и самому образу жизни, более серьезная, чем коммунизм? Эта чума грозит превратить рабов, а не господ, в правителей всех народов, уничтожить сами народы и их историю. Мы возьмем [FROM.GetName] и уничтожим коммунистическую чуму. Ненависть\n\n[FROM.GetLeader] к коммунистам была хорошо известна еще до прихода [FROM.GetRulingParty] к власти, но в последнее время она, похоже, усилилась в связи с деятельностью [Root.GetAdjective] правительства». Возможно, именно с этого стоит начать наше стремление стереть марксизм с лица земли."
 war_justification.203.a: "Если они боятся наших идеалов - они боятся собственного народа."
 war_justification.204.t: "[FROM.GetName] Готовится к Великой Борьбе"
 war_justification.204.d: "«[Root.GetAdjective] — это народ, который не так-то просто расстается с властью. Однако они также должны понимать, что путь наших двух народов может закончиться только столкновением. Мы должны быть готовы к грядущей борьбе. [Root.GetName] не сдастся без боя».\n\n Возможность взаимопонимания между правительствами [Root.GetName] и [FROM.GetName] со схожими взглядами уступила место кампании по захвату их территорий силой."
 war_justification.204.a: "Пусть приходят!"
 war_justification.205.t: "[FROM.GetLeader] Принесите революцию в [Root.GetName]"
 war_justification.205.d: "«Несмотря на то, что мы укрепили социалистическое общество в [FROM.GetName], многие народы по-прежнему страдают от старых деспотических порядков. У рабочих [Root.GetName] нет права голоса, нет возможности объединяться, и любые попытки установить социализм будут жестоко подавляться [Root.GetLeader] режимом. Мы не можем ждать, пока международная революция развернется в пользу [Root.GetAdjective] народа. Мы доказали, что можем сокрушить капиталистических угнетателей здесь, и мы сокрушим угнетателей и в [Root.Capital.GetName]!»\n\n[FROM.GetLeader] отказался от любых попыток наладить дипломатические отношения с нашим правительством. Коммунистическая задача по уничтожению всех границ теперь сосредоточена исключительно на уничтожении наших границ."
 war_justification.205.a: "[Root.GetLeader] - лучший лидер, чем какой-то революционер-оппортунист!"
 war_justification.206.t: "[FROM.GetLeader] Призывает оказать помощь [Root.GetAdjective] Работникам"
 war_justification.206.d: "«Есть ли ложь большая, чем мнимая свобода [Root.GetAdjective] народа? Там, где когда-то они были рабами князей и герцогов, претендовавших на право собственности на землю, теперь они вынуждены продавать свой труд тем, кто претендует на право собственности на фабрики. Их свободу выбирать одного хозяина вместо другого едва ли можно назвать свободой. Точно так же их свобода выбирать своих лидеров — ложный выбор, поскольку пропаганда никогда не позволила бы истинным социалистам прийти к власти». Народ, настолько глубоко подверженный идеологической обработке, может быть спасен только [FROM.GetAdjective] вмешательством.\n\n Не желая мириться с тем, что наш народ может быть доволен жизнью без их социальных экспериментов, коммунистический режим в [FROM.GetName] открыто угрожает напасть на нашу страну.  Мало оснований полагать, что этот конфликт может быть урегулирован мирным путем."
 war_justification.206.a: "Разве могут быть истинными ценности, которые нам хотят навязать силой?"
 war_justification.207.t: "[Root.GetAdjective] коммунизм терпит неудачу"
 war_justification.207.d: "\"Товарищи, хотя величайших революционеров когда-то называли предателями, стало ясно, что была предана сама революция. Как еще вы могли бы объяснить правление [Root.GetRulingParty] оф [Root.GetName], которые отбросили всякий намек на марксистские идеи, чтобы построить выродившееся рабочее государство, где они могут править на ложных предпосылках? Укрепляя свою собственную власть ценой международной революции, они показали, что их мало заботят идеалы, которых они, по их утверждению, придерживаются. Мы должны принести им настоящую революцию\".\n\nХотя изначально они поддерживали [Root.GetRulingParty] победу в [Root.Capital.GetName], [FROM.GetLeader] отошли от [Root.GetLeader] философии. Конфликт обострился до такой степени, что они готовятся к вторжению, чтобы навязать нам свой бренд социализма."
 war_justification.207.a: "Они не понимают, что значит революция для [Root.GetAdjective] народа."
 war_justification.208.t: "[FROM.GetLeader] Призывы к подавлению [Root.GetAdjective] национализма"
 war_justification.208.d: "«Есть ли какое-либо общество, более враждебное будущему революции, более чуждое тяжелому положению рабочего класса, чем фашистский режим [Root.GetName]? Призывая народ фанатично служить ветхому институту национального государства, они облачают вековые варварские обычаи в современную одежду, пытаясь представить себя альтернативой неизбежной международной победе рабочего класса. Это лишь вопрос времени, когда они нападут на нас или наших союзников». Давайте нанесём удар первыми.\n\n Никто не ожидал, что отношения между нами и [Root.GetAdjective] будут менее чем взаимным презрением, но в последнее время вражда усилилась.  Судя по тому, что говорит [FROM.GetLeader], конфликт может вспыхнуть в любой момент."
 war_justification.208.a: "Смерть коммунистам!"
 war_justification.209.t: "Разрыв дипломатических отношений с государством [Root.GetName]"
 war_justification.209.d: "«Несмотря на наши попытки найти дипломатическое решение нашего конфликта с [Root.GetName], переговоры в очередной раз зашли в тупик, и у нас остались лишь ограниченные возможности.  Авторитарный [Root.GetLeader] режим продемонстрировал неразумный подход к этому вопросу, типичный для лидеров, которые не несут ответственности перед своим народом.  Если политика [Root.GetAdjective] руководства не претерпит кардинальных изменений, нам ничего не останется, кроме как вступить в борьбу».\n\n[FROM.GetAdjective] Вмешательство во внутренние дела нашей страны стало острой темой для обсуждения, и некоторые оппозиционные политики утверждают, что [FROM.GetRulingParty] с самого начала проводила агрессивную политику. Какими бы ни были их изначальные намерения, грядущая война внезапно стала казаться вполне реальной и неизбежной."
 war_justification.209.a: "Вся их пренебрежительная риторика нас не запугает."
 war_justification.210.t: "[FROM.GetLeader] Требует вмешательства в [Root.GetName]"
 war_justification.210.d: "С тяжелым сердцем мы вынуждены признать реальность нашей ситуации: вторжение в [Root.GetName] может быть нашим единственным выходом.  В сложившейся ситуации любое другое решение было бы слишком рискованным с точки зрения стратегического преимущества.  Хотя мы верим, что ни [FROM.GetAdjective] ни [Root.GetAdjective] не хотят войны, история привела нас к этому моменту, и наши возможности ограничены. Мы можем лишь надеяться, что, продемонстрировав нашу военную мощь, мы сможем избежать дальнейшего кровопролития в будущем.\n\n Хотя существует популярная теория о том, что демократические государства не вступают в войны с другими демократиями, последние события указывают на [FROM.GetAdjective] возможность [Root.GetName] вторжения в будущем.  История еще может нас удивить."
 war_justification.210.a: "[FROM.GetName] — это и так сомнительная демократия, раз она предпринимает такие агрессивные действия."
 war_justification.211.t: "[FROM.GetLeader] Выступает против красной угрозы"
 war_justification.211.d: "«Без сомнения, [Root.GetName] коммунизм — одна из самых серьезных угроз свободе и порядку в наше время. Неумолимый и безжалостный, он угрожает поглотить не только [Root.GetAdjective] надежды людей на процветающее демократическое общество, но и надежды их соседей. Если мы не начнем действовать прямо сейчас, то можем опоздать с первым звеном домино, и за ним последуют новые провальные социальные эксперименты. Сколько еще людей должно погибнуть, прежде чем мы вмешаемся?»'\n\nЗарождающееся рабочее движение запугало [FROM.GetAdjective] лидеров. Хотя представители оппозиции называют это «красной угрозой», направленной на развязывание войны с нами, риторика [FROM.GetRulingParty] пока что весьма успешна."
 war_justification.211.a: "До тех пор, пока из этого можно извлечь прибыль, капиталисты будут готовить войну."
 war_justification.212.t: "[FROM.GetLeader] Противостоит [Root.GetAdjective] Фашизму"
 war_justification.212.d: "«В новейшей истории, а возможно, и в истории в целом, не было более жестокой тирании, чем та железная хватка, которой [Root.GetRulingParty] сейчас держит [Root.GetName]. Кто-то может возразить, что мы не должны провоцировать конфликты, что мы должны верить [Root.GetLeader] в том, что она будет соблюдать договоры и обещания в будущем, но эти люди не понимают, что договоры, заключенные во времена фашизма, бесполезны». Для этих бесчестных лжецов сила — право, а бумага, на которой написано соглашение, горит так же легко, как книги их недоброжелателей.\n\n Завидуя славному обществу, которое мы строим, и наследию, на котором оно зиждется, [FROM.GetAdjective] похоже, готовы развязать войну, чтобы уничтожить его.  Вот вам и их претензии на миролюбие."
 war_justification.212.a: "Это неизбежно. Значит, это следует сделать как можно скорее."
 war_justification.213.t: "[FROM.GetLeader] призывает к войне против [Root.GetName]"
 war_justification.213.d: "«Хоть мы и мирный народ, наша природа сама по себе не определяет наш исторический путь. Сейчас время войны. Слишком долго [Root.GetAdjective] обладали средствами, которые нужны нам, чтобы пройти через испытания, которые могут нам выпасть, и очевидно, что они не расстанутся с ними по доброй воле». Несмотря на все наши усилия по созданию современного государства, некоторые вопросы можно решить только с помощью старых проверенных методов — в бою.\n\n В недавнем обращении к [FROM.GetAdjective] народу враждебная риторика в отношении [Root.GetName] усилилась, и [FROM.GetLeader] приложил немало усилий, чтобы оправдать вторжение.  Часть населения поддерживает этот курс, но решение за их лидером."
 war_justification.213.a: "Они пожалеют, что сделали нас своими врагами."
 war_justification.214.t: "[FROM.GetLeader] Вызовы [Root.GetAdjective] Претензии"
 war_justification.214.d: "'[Root.GetName] могут считать себя более современными и продвинутыми, чем мы, но правда в том, что их нация не подвергалась таким испытаниям, как наша, и они не готовы к угрозам, которые уже маячат на горизонте. Своим пренебрежением к нам и попытками помешать нам забрать то, что принадлежит нам по праву, они сами превратили нас в угрозу для себя. Их слабая и разобщённая нация вряд ли сможет противостоять нашим притязаниям.'\n\n Насмешливое отношение [Root.GetName] к [FROM.GetRulingParty] давно переросло из критики в враждебность. Хотя бытует мнение, что [Root.GetAdjective] народ хочет избежать войны, [FROM.GetLeader] утверждает, что наши избранные лидеры спровоцировали ее своим высокомерием."
 war_justification.214.a: "Голоса за мир среди [FROM.GetAdjective] народа, разумеется, заглушены."
 war_justification.215.t: "[FROM.GetLeader] пытается восстановить порядок в [Root.GetName]"
 war_justification.215.d: "\"[FROM.GetAdjective] Национальный дух силен, но не всем нациям так повезло. [Root.GetName] его традиции были разрушены, а законные правители давным-давно убиты и похоронены, и все это во имя идеи великой марксистской революции. Наш долг - восстановить порядок в этом мире, сбитом с пути кровожадными узурпаторами, и утвердить силу [FROM.GetName] против этой угрозы\".\n\nХотя [FROM.GetRulingParty] всегда выступала против коммунизма, [Root.GetName] в недавних выступлениях стала объектом особых нападок. Опасаясь неизбежного перехода своей страны на следующий этап развития, они уже готовят упреждающий удар по [Root.GetAdjective] коммунизму."
 war_justification.215.a: "Уже слишком поздно обращать вспять достигнутый нами прогресс."
 war_justification.216.t: "[FROM.GetLeader] разоблачает [Root.GetAdjective] угнетателей"
 war_justification.216.d: "«Мои оппоненты хотят, чтобы вы поверили, будто мое правление похоже на правление [Root.GetRulingParty] в [Root.GetName]. Они глубоко заблуждаются. В то время как успехи [Root.GetLeader] являются результатом недавней причуды, разрушительного массового движения, направленного на то, чтобы запугать другие народы и заставить их подчиниться, [FROM.GetRulingParty] противостоит этому движению, потому что не собирается подчиняться. Я готов сделать все необходимое, чтобы устранить эту угрозу, даже если это будет означать войну».\n\n Режим [FROM.GetLeader] проводит враждебную политику в отношении [Root.GetAdjective] нации. Наши дальновидные планы по достижению величия в будущем посрамили их нацию, и неудивительно, что они чувствуют угрозу."
 war_justification.216.a: "Если они хотят помериться с нами силой, их ждет поражение."
 war_justification.217.t: "[FROM.GetLeader] Вопросы [Root.GetAdjective] Суверенитет"
 war_justification.217.d: "\"Кто определяет границы нации и как они определяются? Какие бы способы люди ни находили в прошлом, чтобы объяснить, где [FROM.GetName] заканчивается и [Root.GetName] начинается, мы живем в новую эпоху. Стратегическое значение этой границы невозможно переоценить, и мы имеем полное право изменить ее, чтобы обеспечить дальнейшую безопасность нашего народа\".\n\nСлушая [FROM.GetLeader]недавние выступления, вторжение в [Root.GetName] кажется неизбежным. Раздаются голоса несогласных, но общественная поддержка войны растет."
 war_justification.217.a: "Неужели из прошлой мировой войны люди не извлекли никаких уроков?"
 war_justification.218.t: "[FROM.GetLeader] Ставит под сомнение мотивы [Root.GetName]"
 war_justification.218.d: "«Нет никаких сомнений в том, что [Root.GetName] готовится к войне. Изменения в экономической политике ясно дают понять, что [Root.GetAdjective] — не миролюбивый народ, а скорее выжидающий момент для нанесения удара по нам. Будем ли мы стоять в стороне и смотреть, как они вооружаются, пока [FROM.GetName] беззащитен? Или мы разоружим эту угрозу до того, как она станет нам не по силам?»\n\n «Ястребы» в [FROM.GetRulingParty] обратили свой взор на [Root.GetName], утверждая, что нападение — лучшая защита. Их точка зрения набирает популярность, и [FROM.GetName] готовится к войне."
 war_justification.218.a: "Именно поэтому мы и должны быть наготове."
 war_justification.219.t: "[FROM.GetLeader] Разгневанный [Root.GetAdjective] Позерством"
 war_justification.219.d: "«Те наивные граждане [FROM.GetName] , которые считают [Root.GetAdjective] миролюбивым народом, совершенно оторваны от реальности.  Те, кто живет у наших границ, не позволяют себе таких заблуждений, видя, как их войска приближаются к нам.  Мы не можем оставить эту угрозу без ответа.  С каждым днем [Root.GetName] готовится к войне». С нашей стороны было бы безумием не сделать то же самое\".\n\nНаше военное присутствие вблизи [FROM.GetAdjective] территории вызвало повышенную озабоченность, поскольку они интерпретируют передвижения наших войск как доказательство враждебных намерений. Похоже, они вряд ли задумывались о том, что их агрессивная риторика является причиной наших защитных мер."
 war_justification.219.a: "Мы не можем разоружиться после таких угроз."
 war_justification.220.t: "[FROM.GetLeader] выступает за вторжение в [Root.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [Root.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [FROM.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [FROM.GetRulingParty] leaders, most prominently [FROM.GetLeader], has been calling the public to support an invasion of [Root.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "Надо готовиться. Война неизбежна."
 war_justification.301.t: "[Root.GetLeader] выслушивает критику за слабость внешней политики"
 war_justification.301.d: "«У нас был шанс нанести удар по врагу, но партия [Root.GetRulingParty] им не воспользовалась. И это не просто пример позорно упущенной возможности укрепить международную позицию государства [Root.GetName]; это признак того, что за всеми их утверждениями о защите интересов [Root.GetAdjective] народа ничего не стоит. Пора менять политику».\n\nНаша неспособность грамотно вести столь ожидаемую войну вызвала уничижительную критику со стороны наших политических противников. Если мы откажемся от военных планов, то будет сложнее убедить народ, что мы ведем государство [Root.GetName] в верном направлении."
 war_justification.301.a: "Но почему они не хотят избежать войны?"
 war_justification.301.b: "Все споры должны вестись на партийных собраниях и не выноситься на публику."
 war_justification.301.c: "Мы не можем позволить, чтобы кто-то обвинял лидера [Root.GetLeader] в трусости!"
 nuke_dropped.1.t: "Атомная бомбардировка [FROM.FROM.GetName]"
 nuke_dropped.1.d: "Впервые в истории и, будем надеяться, в последний раз ядерная бомба была взорвана в [FROM.FROM.GetName] в ходе международного военного конфликта. Беспрецедентные разрушения свидетельствуют о разрушительной силе этого нового оружия, которое вызывает страх не только из-за того, что оно может сделать с целью, но и из-за того, какие последствия оно может иметь для того, кто его применил, и для всего человечества.\n\n Мир затаил дыхание в ожидании того, что будет дальше. Сдастся ли эта сила [FROM.FROM.Owner.GetName] во избежание дальнейшего террора или это лишь укрепит их решимость нанести ответный удар тем, кто прибегает к подобным мерам?"
 nuke_dropped.1.a: "Атомная эра началась по-настоящему."
 nuke_dropped.1.b: "Мы сделаем все, что в наших силах, для защиты [Root.GetAdjective] народа."
 nuke_dropped.2.t: "Атомная бомбардировка Хиросимы"
 nuke_dropped.2.d: "«На улицах творится ад».\n - Куниёси Аикава\n\nСегодня над Хиросимой на высоте 580 метров была взорвана ядерная бомба. Более 2/3 города были мгновенно уничтожены. Хотя здания здесь строились с учетом частых землетрясений, уцелело лишь несколько строений.\n\nОбщественное сознание склонно преувеличивать мощь атомной бомбы и принижать ее цену - цену в человеческих жизнях. Ни одна из сторон не желает задумываться об ужасах атомной бомбардировки, но в историю это событие войдет тысячами и миллионами жизней, испарившихся в мгновение ока или угасших на отравленной земле."
 nuke_dropped.2.a: "Сколько же еще людей должно умереть, пока война наконец не закончится?"
 nuke_dropped.2.b: "Мы должны действовать быстро, чтобы помочь жертвам."
 nuke_dropped.3.t: "Атомная бомбардировка Нагасаки"
 nuke_dropped.3.d: "Сегодня над Нагасаки была взорвана ядерная бомба, изначально предназначавшаяся для Кокуры. Из-за погодных условий самолёты были вынуждены изменить маршрут. Дым, облака и технические неполадки стали решающими факторами в событии, которое вполне может изменить ход истории.\n\n Последствия взрыва были частично смягчены тем, что город расположен в долине, но ущерб всё равно был огромным. Были разрушены некоторые военные объекты, но катастрофические потери среди гражданского населения намного их превосходят. Возможно, пройдут десятилетия, прежде чем мы узнаем о долгосрочных последствиях применения этого оружия."
 nuke_dropped.3.a: "Приведёт ли это к капитуляции [FROM.Owner.GetAdjective]?"
 nuke_dropped.3.b: "Мы надеялись, что Нагасаки это не затронет."
 nuke_dropped.4.t: "Атомная бомбардировка Берлина"
 nuke_dropped.4.d: "Сегодня в [GetDateText] столице Германии Берлине произошел ядерный взрыв. Город уже не раз подвергался атакам, как в этой войне, так и в прошлой, но все предыдущие случаи меркнут по сравнению с этим. Со времен Тридцатилетней войны Берлин не видел таких разрушений — учитывая его масштабы, это казалось невозможным.\n\n Фюрербункер, судя по всему, уцелел, по крайней мере частично, благодаря тому, что бомба взорвалась не в запланированном эпицентре, и [FROM.Owner.GetLeader] по слухам, все еще жив, хоть и в ярости. Однако вопрос о том, как [FROM.Owner.GetAdjective] эвакуировать лидеров и можно ли защитить их от радиоактивных осадков, остается открытым."
 nuke_dropped.4.a: "Сегодня хочется порадоваться, что ты не житель Берлина."
 nuke_dropped.4.b: "Наши враги нанесли удар в самое сердце нации!"
 nuke_dropped.5.t: "Атомная бомбардировка Лондона"
 nuke_dropped.5.d: "Ядерный взрыв опустошил сегодня лондонский сити. Несмотря на противовоздушную оборону города, [FROM.Owner.GetName] не был готов к этой атаке. В [GetDateText]Последний раз прозвенел Биг-Бен, расплавленный взрывом. Ранние сообщения предполагают, что Букингемский дворец был полностью разрушен, и местонахождение королевской семьи в настоящее время неизвестно.\n\n[FROM.Owner.GetLeader] тем не менее, было подтверждено, что он выжил и готовит зажигательную речь для радио позже сегодня. Моральный дух британского народа находится на рекордно низком уровне, и британцы остро нуждаются в этом — или в очень красноречивой капитуляции."
 nuke_dropped.5.a: "Трудно сохранять аристократическое спокойствие перед взрывной волной."
 nuke_dropped.5.b: "Боже, спаси короля!"
 nuke_dropped.6.t: "Атомная бомбардировка Киото"
 nuke_dropped.6.d: "Сегодня по городу Киото, крупному [FROM.Owner.GetAdjective] промышленному центру, была нанесена ядерная бомба. Предполагается, что город был выбран в качестве цели, поскольку считался интеллектуальным центром.\n\n Из-за красоты и исторического значения Киото многие считали, что он не пострадает от взрыва, но, судя по всему, ужас от того, что такое прекрасное место было разрушено, скорее сыграл на руку, усилив психологическое воздействие атаки. Расположение города в долине несколько смягчило взрывную волну, но старый Императорский дворец и многие промышленные здания были полностью разрушены."
 nuke_dropped.6.a: "История и красота ничего не стоят в войне."
 nuke_dropped.6.b: "Пусть уничтожают старое, мы построим новое."
 nuke_dropped.7.t: "Атомная бомбардировка Токио"
 nuke_dropped.7.d: "Сегодня ядерный удар был нанесен по самому сердцу Японской империи. Столица Токио, которая, как ожидалось, должна была стать мишенью для зажигательных бомб, не входила в число приоритетных целей для нового оружия. Однако в конечном итоге, возможно, из-за значимости новой столицы и Императорского дворца, который теперь разрушен, на город обрушился еще более разрушительный пожар.\n\n Хотя [FROM.Owner.GetLeader] удалось выжить, это событие заставило задуматься о том, на что готовы пойти враги Японии. Если на этом война не закончится, какие цели еще остаются? Чем еще можно угрожать?"
 nuke_dropped.7.a: "Неужели это конец Японской империи?"
 nuke_dropped.7.b: "Пока [FROM.Owner.GetLeader] жив, существует и Империя."
 nuke_dropped.8.t: "Атомная бомбардировка Вашингтона"
 nuke_dropped.8.d: "Сегодня над столицей Соединенных Штатов была взорвана ядерная бомба. В результате атаки, явно нацеленной на политический центр и историческое наследие США, Белый дом, Капитолий и ряд памятников и мемориалов были стерты с лица земли. Даже пожар в Вашингтоне, случившийся более ста лет назад, меркнет по сравнению с разрушениями, которые нанесло городу это разрушительное оружие.\n\n Хотя президент [FROM.Owner.GetLeader] был эвакуирован в безопасное место, страна потрясена до основания. Несомненно, США надеялись стать первой и единственной страной, обладающей таким оружием. Теперь эти надежды рухнули самым ужасным образом."
 nuke_dropped.8.a: "Одна нация, неделимая, против одного атома - делимого."
 nuke_dropped.8.b: "Орлан воспрянет из пепла, как феникс."
 nuke_dropped.9.t: "Атомная бомбардировка Рима"
 nuke_dropped.9.d: "Ядерный взрыв сегодня потряс город Рим и заставил людей по всему миру содрогнуться. Многие полагали, что благодаря историческому и культурному наследию этот древний город никогда не станет мишенью для столь разрушительного оружия. Ватикан также был отчасти уничтожен, местонахождение Папы Римского остается неизвестным, так что взрыв привел в ужас не только всех итальянцев, но и всех католиков.\n\nВ последние десять лет Рим стремительно развивался, и какое-то время еще казалось, что город способен помочь нации возродиться после окончания войны. Увы, эти мечты обратились в прах вместе с тысячами людей."
 nuke_dropped.9.a: "Бомба брошена!"
 nuke_dropped.9.b: "Рим за один день не возродится..."
 nuke_dropped.10.t: "Атомная бомбардировка Парижа"
 nuke_dropped.10.d: "Сегодня ядерная бомба была взорвана над городом Парижем, что привело к бесчисленным жертвам и разрушениям. Франция пребывает в шоке после того, как ее столица подверглась самой масштабной атаке за всю свою историю, в которой были и войны, и революции. Парижане еще могли ожидать, что город будет захвачен, но не уничтожен настолько решительно и беспощадно.\n\nБольше не будет парадов победы на Елисейских полях у Триумфальной арки. Возможно, в грядущие десятилетия возродится новый Париж, однако города, который был всем нам так дорог, теперь не существует."
 nuke_dropped.10.a: "Город света сгорел дотла."
 nuke_dropped.10.b: "Еще вчера могло казаться, что Париж вечен."
 nuke_dropped.11.t: "Атомная бомбардировка Москвы"
 nuke_dropped.11.d: "Москва, город, который многие пытались завоевать, но так и не смогли, сегодня подвергся ядерной атаке. Взрыв был направлен в самое сердце [FROM.Owner.GetAdjective] власти, и Кремль был почти полностью разрушен.\n\n[FROM.Owner.GetLeader] Жители, которые в последнее время стали более осведомленными и напуганными всеми возможными и невозможными угрозами, вовремя эвакуировались и выжили. Однако даже обширных территорий [FROM.Owner.GetName] может оказаться недостаточно, чтобы укрыться от такого безжалостного врага. Действительно, если так будет продолжаться, страна вскоре превратится в пустыню, состоящую из двух видов пустошей: тех, что были здесь изначально, и тех, что создали ее враги."
 nuke_dropped.11.a: "А разве ядерная зима не сделает Москву еще более неприступной целью?"
 nuke_dropped.11.b: "Пусть сожгут все наши города до единого, но взять их они не смогут."
 nuke_dropped.12.t: "Атомная бомбардировка Копенгагена"
 nuke_dropped.12.d: "Сегодня город Копенгаген был разрушен ядерным взрывом. Нейтралитет позволил Дании избежать всех ужасов мировой войны и разрастись, столица страны никогда не подвергалась разрушениям со времен наполеоновских войн. Выпадение радиоактивных осадков наблюдалось также в районе Эресунна, и теперь уцелевшие пытаются попасть в Фюн и перебраться на континент, опасаясь новых атак.\n\nМестонахождение короля Кристиана Х неизвестно, и дух нации сильно подорван атакой. Посмотрим, не станет ли это началом заката одной из старейших европейских держав."
 nuke_dropped.12.a: "Лучится что-то в датском государстве."
 nuke_dropped.12.b: "Город уже горел, но он не погиб."
 nuke_dropped.12.c: "Плутоний поможет нам поставить датчан на колени!"
 nuke_dropped.13.t: "Атомная бомбардировка Стокгольма"
 nuke_dropped.13.d: "Прекрасный город Стокгольм, гордая Северная Венеция, сегодня пережил ядерный взрыв. Несмотря на все свои прошлые попытки сохранять нейтралитет, шведы все же оказались втянуты в международный конфликт и уплатили самую высшую цену. Эпицентр взрыва пришелся на центр южной части Стокгольма, отведенной под будущую застройку и городское развитие; теперь там все полностью уничтожено.\n\nПрактически весь город неузнаваем, однако старые постройки на Слюссене сохранились лучше, чем можно было ожидать. Решено было оставить их так навечно, в память о стойкости города."
 nuke_dropped.13.a: "Теперь от шведского нейтралитета останутся одни воспоминания."
 nuke_dropped.13.b: "Шведский тигр не утратит своих полосок!"
 country_capitulated.0.t: "[Root.GetName] капитулирует"
 country_capitulated.0.d_positive_both_no_faction: "\n[FROM.FROM.GetLeader] объявил, что трусливая [Root.GetAdjective] нация больше не может противостоять давлению со стороны подавляющего большинства [FROM.FROM.GetAdjective] сил, рассредоточенных по всей стране.  Правительство [Root.GetAdjective] решило бежать из страны и отправилось в изгнание.  Их основные силы капитулировали, и [FROM.FROM.GetName] теперь контролирует их территорию. \n Хотя война продолжается в других регионах, это большая победа для [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[FROM.FROM.GetLeader] объявил, что трусливая [Root.GetAdjective] нация больше не может противостоять давлению со стороны подавляющего большинства [FROM.FROM.GetAdjective] сил, рассредоточенных по всей стране.  Правительство [Root.GetAdjective] решило покинуть страну и отправилось в изгнание.  Их основные силы капитулировали, и [FROM.FROM.GetName] теперь контролирует их территорию. \n Хотя война с остатками [Root.GetFactionName] продолжается в других регионах, это большая победа для [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_faction: "\n[FROM.FROM.GetLeader] объявил, что трусливая [Root.GetAdjective] нация больше не может противостоять давлению со стороны подавляющего большинства [FROM.FROM.GetAdjective] сил, рассредоточенных по всей стране.  Правительство [Root.GetAdjective] решило бежать из страны и отправилось в изгнание.  Их основные силы капитулировали, и [FROM.FROM.GetName] теперь контролирует их территорию. \n Хотя война с остатками [Root.GetFactionName] продолжается в других регионах, это большая победа для всех [FROM.FROM.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] объявил, что [Root.GetAdjective] нация больше не может противостоять давлению со стороны оккупационных [FROM.FROM.GetAdjective] сил, совершающих преступления по всей стране.  Правительство [Root.GetAdjective] ушло в изгнание.  Их основные силы капитулировали, и [FROM.FROM.GetName] теперь контролирует их территорию. \n Несмотря на это сокрушительное поражение, война против [FROM.FROM.GetName] далека от завершения."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] объявил, что [Root.GetAdjective] нация больше не может противостоять давлению со стороны оккупационных [FROM.FROM.GetAdjective] сил, совершающих преступления по всей стране. [Root.GetAdjective] Правительство ушло в изгнание. Их основные силы капитулировали, и [FROM.FROM.GetName] теперь контролирует их территорию.\n Хотя война против [FROM.FROM.GetName] продолжается, это печальная неудача для всех [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] объявил, что [Root.GetAdjective] нация больше не может противостоять давлению со стороны оккупационных [FROM.FROM.GetAdjective] сил, которые творят бесчинства по всей стране.  Правительство [Root.GetAdjective] ушло в изгнание.  Их основные силы капитулировали, и [FROM.FROM.GetName] теперь контролирует их территорию. \n Хотя война против [FROM.FROM.GetName] и остальной части [FROM.FROM.GetFactionName] продолжается, это печальная неудача для всех [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\nПравительство [Root.GetAdjective] ушло в отставку, а его основные силы капитулировали перед [FROM.FROM.GetName], которая теперь контролирует их территорию. \n\n Хотя противостояние между [FROM.FROM.GetName] и [Root.GetName] закончилось, [FROM.FROM.GetName] по-прежнему ведет полномасштабную войну, и боевые действия продолжаются в других регионах."
 country_capitulated.0.d_neutral_prev_no_faction: "\n[Root.GetAdjective] Правительство ушло в отставку, а его основные силы капитулировали перед [FROM.FROM.GetName], которая теперь контролирует их территорию. \n\n Бои в [Root.GetName] были лишь малой частью конфликта.  Война между [FROM.FROM.GetName] и тем, что осталось от [Root.GetFactionName], продолжается в других регионах."
 country_capitulated.0.d_neutral_prev_faction: "\nПравительство [Root.GetAdjective] ушло в отставку, а его основные силы капитулировали перед [FROM.FROM.GetName], которая теперь контролирует их территорию. \n\n Борьба между [FROM.FROM.GetName] и [Root.GetName] была лишь малой частью конфликта.  Война между [FROM.FROM.GetFactionName] и остатками [Root.GetFactionName] продолжается в других регионах."
 country_capitulated.0.a: "Отличная новость"
 country_capitulated.0.b: "Это тяжелые времена"
 country_capitulated.0.c: "Неопределённые времена"
 GAME_OVER_TT: "§RДля вас игра завершится.§!"
 CAN_ANGERED_WORKERS: "Это встревожит граждан."
 excellent: "Превосходно."
 unfortunate: "Прискорбно"
 news.1.t: "[fta_inviter.GetNameDef]-[fta_applicant.GetName] договор о свободной торговле"
 news.1.d: "Сегодня [fta_inviter.GetNameDef] и [fta_applicant.GetNameDef] подписали договор о свободной торговле и инвестициях для укрепления экономического сотрудничества между двумя странами."
 news.1.a: "Понятно"
 news.2.t: "[mct_inviter.GetNameDef]-[mct_applicant.GetName] договор о военном сотрудничестве"
 news.2.d: "Сегодня [mct_inviter.GetNameDef] и [mct_applicant.GetNameDef] подписали договор о военном сотрудничестве, желая укрепления своих военных связей."
 news.2.a: "Понятно"
 news.3.t: "Теракт на USS Cole"
 news.3.d: "Командование ВМС США сообщило, что эсминец USS Cole был атакован сетью «Аль-Каида», в результате чего погибли 17 американских военнослужащих. Разведывательные данные США указывают на возможную поддержку двух нападавших со стороны правительства Судана."
 news.3.a: "Они об этом пожалеют."
 news.3.b: "Передайте наши соболезнования американцам."
 news.3.c: "Мертвые американцы? Хорошо."
 news.3.e: "Они обвиняют нас?!"
 news.4.t: "[FROM.GetName] покидает Европейский Союз"
 news.4.d: "Сегодня делегация [FROM.GetAdjective] в Европейском парламенте покинула здания в Брюсселе, возможно, в последний раз. Статья 50 выполнена и принята, договоры с партнерами по ЕС восстановлены до уровня обычного международного партнерства. [FROM.GetName] покинул Европейский союз."
 news.4.a: "Понятно"
 news.5.t: "Подготовка Союза"
 news.5.d: "[FROM.GetName] начала процесс подготовки законодательства по объединению Европейского союза под руководством [FROM.GetAdjective]. Европейскому парламенту предстоит многое обсудить в ближайшие дни."
 news.5.a: "Интересное стремление"
 news.82.t: "Япония отступает"
 news.82.desc: "После того, как Япония попыталась объединить Корейский полуостров под властью Южной Кореи, вторгшись в Северную Корею, китайское правительство вмешивается в японскую миссию. Япония, получив эти новости, отступает и оставляет миссию объединения позади."
 news.82.a: "Мы бы все равно проиграли!"
 news.82.b: "Китай действительно такой мощный!"
 influence.1.t: "Предложить экономическую помощь [FROM.GetName]?"
 influence.1.d: "Мы решили приступить к разработке пакета экономической помощи. Мы можем отправить 5%, 10% или 15% ВВП нашей страны в качестве помощи. Эта щедрость улучшит отношения и даст нам влияние в [FROM.GetName], хотя нет никаких гарантий, что они используют экономическую помощь для чего-то ценного. Чем больше мы отдадим, тем больше влияния получим.\n\n"
 influence.1.a: "Отправить 5% ВВП в качестве экономической помощи."
 influence.1.b: "Отправить 10% ВВП в качестве экономической помощи."
 News_influence.0.t: "Экономическая помощь от [FROM.GetName]!"
 News_influence.0.d: "Мы получили [?gift_sum] миллиард долларов немедленной экономической помощи от [FROM.GetName]. Это укрепило отношения [Root.GetAdjective]-[FROM.GetAdjective], и хотя официально подарок был сделан без предварительных условий, считается, что это усилило их влияние в нашей стране."
 News_influence.0.a: "Отлично"
 News_influence.0.b: "Отклонить помощь"
 influence.3.t: "Цель вашей атаки на влияние [From.GetName]?"
 influence.3.d: "Кто должен быть нашей целью в [FROM.GetNameWithFlag]: топ влиятельных стран или их внутренняя независимость\n"
 influence.3.a: "Цель - внутренняя независимость [From.GetNameWithFlag]"
 influence.3.b: "Цель - [?var:FROM.influence_array^0.GetNameWithFlag]"
 influence.3.c: "Цель - [?var:FROM.influence_array^1.GetNameWithFlag]"
 influence.3.e: "Цель - [?var:FROM.influence_array^2.GetNameWithFlag]"
 influence.3.f: "Отступить"
 News_influence.1.t: "[FROM.GetNameWithFlag] атакует наше влияние в [FROM.FROM.GetNameWithFlag]!"
 News_influence.1.d: "К сожалению, [FROM.GetLeader] и [FROM.GetName] нанесли быстрый удар по нашим амбициям в [FROM.FROM.GetName]. Выделив нас в качестве мишени, их атака на наши деловые и государственные интересы снизила наше влияние в [FROM.FROM.GetNameWithFlag]."
 News_influence.1.a: "Черт тебя подери, [FROM.GetLeader]!"
 News_influence.2.t: "[FROM.GetNameWithFlag] атакует нашу независимость от иностранного влияния!"
 News_influence.2.d: "К сожалению, [FROM.GetLeader] и [FROM.GetName] нанесли быстрый удар по нашим стремлениям к продолжению иностранного вмешательства и ослабили наш суверенитет. Наша независимость от иностранного влияния сократилась."
 News_influence.2.a: "Черт тебя подери, [FROM.GetLeader]!"
 influence.5.t: "Начать переворот в [FROM.GetNameWithFlag]?"
 influence.5.d: "Уважаемый [Root.GetLeader], мы в [Root.GetAdjective] разведывательных службах не можем ни подтвердить, ни опровергнуть информацию о том, что [FROM.GetName] способствует государственному перевороту.\n\n Однако мы, насколько это в наших силах, просчитали вероятность различных исходов.  Она зависит от: \n - степени нашего влияния; \n - популярности наших взглядов; \n - популярности и стабильности правительства; \n - того, какие влиятельные страны, скорее всего, поддержат нас; \n - того, какие влиятельные страны, скорее всего, поддержат свое нынешнее правительство.\n\nЕсли мы приступим к реализации наших планов, то постараемся использовать в основном местные источники и контакты, чтобы сохранить возможность правдоподобно отрицать свою причастность."
 influence.5.a: "Начать переворот, чтобы привести к власти самую многочисленную, с нашей точки зрения, партию "
 influence_coup_largest_success_TT: "§HУспешный переворот§!"
 influence_coup_largest_discovered_TT: "§RНеудачный переворот§!"
 influence.5.b: "Начать переворот, чтобы привести к власти партию с той же идеологией, что правит в нашей стране"
 influence.5.c: "Откажемся от этих планов, пока..."
 News_influence.3.t: "Смена режима!"
 News_influence.3.d: "Силы, пользующиеся поддержкой [FROM.GetAdjective], свергли предыдущее правительство."
 News_influence.3.a: "Вау..."
 News_influence.4.t: "Драматические сцены на фоне стремительной смены режима [FROM.FROM.GetNameWithFlag]"
 News_influence.4.d: "После периода активизации деятельности иностранных разведывательных служб, особенно со стороны [FROM.GetNameWithFlag], предыдущее правительство [FROM.FROM.GetName] было свергнуто, а многие высокопоставленные чиновники прежнего режима арестованы.  [FROM.FROM.GetLeader] стал новым лидером [FROM.FROM.GetRulingParty] в условиях нестабильности.  По предварительным данным, новый режим [FROM.FROM.GetName] будет ориентироваться на [FROM.FROM.GetRulingIdeology], нарушив баланс сил."
 News_influence.4.a: "Интересно"
 News_influence.5.t: "[FROM.GetNameWithFlag] находится под давлением, поскольку [FROM.FROM.GetNameWithFlag] предотвращает государственный переворот"
 News_influence.5.d: "[FROM.FROM.GetAdjective] Лидер [FROM.FROM.GetLeader] эмоционально жестикулировал со сцены, обвиняя «враждебные силы зла во главе с [FROM.GetName]» в сегодняшней эскалации конфликта, в результате которой [FROM.FROM.GetLeader] предотвратила попытку государственного переворота.  Хотя [FROM.GetAdjective] лидер [FROM.GetLeader] категорически отверг обвинения, широко известно, что эти два лидера не ладят. При рекордно низком уровне [FROM.GetAdjective]-[FROM.FROM.GetAdjective] связей [FROM.FROM.GetName] поклялся перед общественностью «искоренить [FROM.GetAdjective] влияние [FROM.FROM.GetName]» и в остальном удвоить усилия в [FROM.FROM.GetRulingIdeology] направлении, в котором правящая [FROM.FROM.GetRulingParty] партия [FROM.FROM.GetNameWithFlag] движется."
 News_influence.5.a: "Интересно"
 News_influence.6.t: "Драматические события разворачиваются в условиях гражданской войны в регионе [FROM.FROM.GetNameWithFlag]!"
 News_influence.6.d: "Травмирующие сцены из [FROM.FROM.GetNameWithFlag] можно увидеть сегодня, когда последние несколько дней протестов, неопределенности и странных передвижений военных сменились перестрелками, страданиями и бегством мирных жителей. Хотя подробностей мало, похоже, что несколько целых подразделений [FROM.FROM.GetAdjective] армии выступили за вооруженную оппозицию против [FROM.FROM.GetLeader] и [FROM.FROM.GetRulingParty] ([FROM.FROM.GetRulingIdeology]). Лидер оппозиции, беседовавший с WNN на условиях анонимности, сказал, что они \"ожидают значительной помощи от [FROM.GetNameWithFlag] в своем стремлении свергнуть незаконного [FROM.FROM.GetAdjective] тирана [FROM.FROM.GetLeader]\".\n\nХотя [FROM.GetAdjective] руководство выразило свое \"удивление по поводу этих драматических событий\", пристальные наблюдатели за [FROM.GetAdjective]-[FROM.FROM.GetAdjective] отношениями не доверяют этому. Один аналитик описал ситуацию следующим образом: \"Ясно, что на самом деле это была [FROM.GetAdjective]поддержанная попытка государственного переворота, которая не смогла достичь своих целей достаточно быстро, что привело к напряженному противостоянию, которое переросло в то, что сейчас выглядит как полноценная гражданская война\". У нескольких мировых лидеров, особенно у тех, у кого есть [FROM.FROM.GetRulingIdeology], нашлись не совсем дипломатичные слова по поводу пока неподтвержденной [FROM.GetAdjective] причастности.\n\nПоскольку две разные стороны конфликта представляют собой не только разительные различия во внутреннем, но и международном направлении, будет интересно проследить, будут ли другие страны также вовлечены в конфликт."
 News_influence.6.a: "Кто будет править пеплом?"
 influence.51.t: "Военная помощь для [FROM.GetName]"
 influence.51.d: "Наша страна [FROM.GetName] в настоящее время находится в состоянии вооруженного конфликта и ищет поставщиков для обеспечения своих военных действий. Они проявили интерес к нашему стрелковому оружию, бронетехнике и другим военным излишкам. Нам следует решить, стоит ли отправлять им военную технику, чтобы они не использовали ее против нас в будущих конфликтах..."
 influence.51.a: "Давайте сделаем это!"
 influence.51.a_tt: "Вы сами решаете, какое оборудование вы отправляете!"
 influence.51.b: "А если подумать..."
 influence.51.b_tt: "Если подумать, то мне нужны эти пушки!"
 influence.52.t: "Вопрос вот в чем"
 influence.52.d: "Мы можем отправить [FROM.FROM.GetName] одну из трех категорий военной помощи. После выбора категории мы определим §H размер пакета§!, который будет зависеть от количества, политической стоимости и создаваемой угрозы.\n\n§H Пехота§!: стрелковое оружие, легкие противотанковые и зенитные средства.\n§H Транспорт и бронетехника§!: основные боевые танки, плавающие танки, транспортные средства.\n§H Современное оборудование§!: тяжелые противотанковые ракеты, ракеты класса «земля — воздух», беспилотники."
 influence.52.a: "§HКомплект пехотного снаряжения§!"
 influence.52.b: "§HТранспортные средства и броня§!"
 influence.52.c: "Вообще-то мне это нужно..."
 influence.53.t: "Военная помощь от [FROM.GetName]"
 influence.53.d: "[FROM.GetName] предложил нам пакет военной техники. Следует ли нам принять его или вернуть?"
 influence.53.a: "Примите посылку"
 influence.53.c: "Верните оборудование"
 influence.54.t: "Ежемесячный отчет об автоматическом влиянии"
 influence.54.d: "Мы успешно повлияли на [?nations_influenced|0] страну(-ы) [GetDateText]. Наши постоянные усилия затронули следующие страны:"
 influence.54.a: "Окей, спасибо!"
 econvent.1.t: "[ROOT.GetAdjective] Центробанк предупреждает о возможном пузыре на рынке жилья"
 econvent.1.d: "Дорогой [Root.GetLeader], с сожалением сообщаем вам, что значительная часть нашей экспертной группы (лучшие и самые талантливые [Root.GetAdjective] экономисты) замечает ранние признаки перегрева [Root.GetAdjective] рынка недвижимости, который может оказаться пузырем, готовым лопнуть. Разумеется, предсказание будущего — дело сложное и трудоемкое, поэтому наши эксперты могут ошибаться.  \nМы, конечно, никогда не посмели бы отдавать вам приказы, но внесение некоторых корректировок сейчас будет менее болезненным, чем полноценный кризис в будущем."
 econvent.1.a: "Нужно исправить положение на рынке, пока не произошло катастрофы!"
 econvent.1.b: "Хватит ерунды. [Root.GetAdjective] экономика всегда здорова!"
 econvent.1.b_tt: "§HНет эффекта§! на данный момент, но проблема на рынке недвижимости в будущем может возникнуть\n"
 econvent.2.t: "Обрушение цен на жильё"
 econvent.2.d: "Так как цены на дома и квартиры резко выросли, особенно в прошлом году, люди начали брать всё более крупные кредиты, чтобы позволить себе жильё, в то время как спекулянты активно инвестировали в недвижимость, также используя заемные средства. Сейчас это заканчивается, и быстро. Цены падают, и люди пытаются продать, как будто завтра не наступит. Многие менее удачливые окажутся в долгах, которые они не смогут погасить. Пока люди ругают как [Root.GetLeader], так и [Root.GetAdjective] Центральный банк за то, что они стали причиной этого, нам необходимо быстро сделать публичное заявление о том, как мы намерены справиться с этим кризисом."
 econvent.2.a: "Мы введем дешевые деньги, чтобы восстановить рынок"
 econvent.2.b: "Это болезненно, но цены на жильё должны были упасть."
 econvent.3.t: "Падение фондового рынка"
 econvent.3.d: "Кажется, что хаос после взрыва пузыря на рынке недвижимости достиг фондового рынка. Цены на акции почти всех перечисленных [Root.GetAdjective] компаний сильно упали сегодня утром, и наша валюта также сильно упала. Торговля была временно приостановлена до обеда, но улучшения не ожидается, так как все отчаянно пытаются продать свои акции."
 econvent.3.a: "Хорошо, что мои деньги были размещены в оффшорных налоговых хранлищах"
 econvent.3.b: "Оказать помощь рынку"
 econvent.4.t: "[Root.GetAdjective] банки столкнулись с кризисом"
 econvent.4.d: "Несмотря на горячий вкусный латте-арт эспрессо в вашей чашке [Root.GetName] §R<3§! [Root.GetLeader], сегодня не самый удачный день. Отчаянные финансовые магнаты, их лоббисты и политики, которым они сделали взносы — все они заполонили [Root.GetAdjective] правительственные офисы, и у всех одно сообщение: \"Нам нужно финансовое спасение!\"\n\nОчевидно, что двойной удар от кризиса на рынке недвижимости и краха фондового рынка оказался слишком сильным для финансового сектора. Нарастание плохих долгов из-за их спекуляций просто слишком велико, требуется приток свежих государственных средств — иначе по всему рынку начнутся банкротства, а невинные вкладчики потеряют свои депозиты."
 econvent.4.a: "Мы предоставим помощь"
 econvent.4.b: "Никаких займов, но гарантировать сохранение сберегательных вкладов"
 econvent.4.c: "Выживание сильнейшего делает капитализм великим"
 econvent.5.t: "[Root.GetAdjective] потребители тратятся меньше"
 econvent.5.d: "Недавний отчет подчеркнул, что трудолюбивые [Root.GetAdjective] люди все больше беспокоятся о своем будущем. Этот пессимизм заставляет людей больше экономить, а общее потребление снижается. Если это продолжится, многим компаниям в [Root.GetName] придется сократиться или закрыться. Однако предприятия, которые в основном экспортируют [Root.GetAdjective] товары, не подвержены отрицательным тенденциям."
 econvent.5.a: "Перевести некоторые деньги на покупки"
 econvent.5.b: "Надеюсь, это пройдет"
 econvent.6.t: "Снижение спроса на [Root.GetAdjective] товары за рубежом"
 econvent.6.d: "Данные ясны: международный экспорт [Root.GetName] снижается. Однако причина этого активно обсуждается экономическими советниками [Root.GetLeader]. Одна из теорий заключается в том, что мы стали менее конкурентоспособными из-за относительно высоких заработных плат, другая — в том, что наши конкуренты повысили качество своей продукции. Некоторые считают, что снижение спроса связано лишь с изменением тенденций за рубежом. Какова бы ни была причина, нам нечего сделать с этим, кроме как оставить это позади и работать усерднее в будущем."
 econvent.6.a: "Иностранцы глупы. [Root.GetAdjective] продукция самая лучшая!"
 econvent.7.t: "[Root.GetAdjective] фермеры терпят бедствие из-за засухи"
 econvent.7.d: "Хоть у нас обычно не бывает большого количества дождей, количество осадков в этом вегетационном периоде было ужасно малым, поэтому большинство сельскохозяйственных культур погибло. Падение темпов производства сельскохозяйственной продукции связано, в первую очередь, с обмелением рек. Несмотря на то, что искусственное орошение немного выправило положение, продукции не хватает, чтобы покрыть потребности всего населения. Фермеры просят помощи от [Root.GetLeader], а горожане обеспокоены ростом цен на продукты питания."
 econvent.7.a: "Удачи в следующем сезоне"
 econvent.8.t: "Голод в [Root.GetName]!"
 econvent.8.d: "Продолжающаяся засуха привела к тому, что на большей части сельской местности [Root.GetName] не хватает доступной еды. Хранилища были исчерпаны, и голод вызывает недоедание, смерть и болезни."
 econvent.8.a: "О, нет!"
 econvent.9.t: "Повышенное доверие потребителей"
 econvent.9.d: "Недавние условия в экономике [ROOT.GetAdjective] показали, что потребители в нашей стране теперь имеют идеальные рыночные условия для трат денег и инвестиций в будущее страны. Люди покупают потребительские товары, как будто завтра не наступит!"
 econvent.9.a: "Прекрасные новости!"
 econvent.10.t: "Бум фондового рынка"
 econvent.10.d: "[ROOT.GetAdjective] фондовый рынок переживает бум. [ROOT.GetAdjective] народ торгует акциями, как будто покупает продукты.\n"
 econvent.10.a: "Так держать!"
 econvent.10.a_tt: "Вливание дополнительной ликвидности на рынок может оказаться разрушительным в случае краха.\n"
 econvent.10.b: "Отлично"
 econvent.10.b_tt: "Рынок будет продолжать работать в обычном режиме без вмешательства. По-прежнему существует умеренная вероятность краха.\n"
 econvent.10.c: "Замедлить экономику"
 econvent.10.c_tt: "Экономика слишком быстро накалилась. Давайте начнем замедлять темп, сузив поток капитала.\n"
 econvent.11.t: "Крупнейшее финансовое учреждение терпит крах"
 econvent.11.d: "В заголовках новостей появилась информация о крахе крупного финансового учреждения. СМИ активно распространяют эту новость, вызывая панику. Правительство умоляют отреагировать, поскольку на горизонте маячит угроза более масштабного кризиса. Что нам следует делать?"
 econvent.11.a: "Мы должны спасти их..."
 econvent.11.b: "Не вмешиваемся..."
 econvent.12.t: "Отголоски финансового кризиса в [FROM.GetName]"
 econvent.12.d: "Недавний кризис в [FROM.GetName] вызвал большие разногласия в нашей стране, поскольку последствия их кризиса ощущаются в нашей стране. Наши взаимосвязанные экономики сейчас обе страдают от тяжести этого кризиса."
 econvent.12.a: "Выделить средства на оказание помощи."
 econvent.12.b: "Рынок превыше всего."
 econvent.13.t: "Большие долги заставляют компании уходить"
 econvent.13.d: "Высокое соотношение долга и ВВП нашей страны заставляет компании закрываться и покидать страну. Сокращение долга является обязательным условием, иначе мы можем столкнуться с тем, что ещё большее количество промышленных предприятий решит покинуть страну."
 econvent.13.a: "Разрешите компании уйти"
 econvent.13.b: "Приобрести компанию"
 econvent.14.t: "Частные инвесторы вкладывают средства в гражданскую промышленность"
 econvent.14.d: "Частные инвесторы решили вложить деньги в новую гражданскую промышленность страны."
 econvent.14.a: "Потрясающе!"
 econvent.15.t: "Частные инвесторы вкладывают средства в офисные парки"
 econvent.15.d: "Частные инвесторы решили вложить средства в новый офисный парк в стране."
 econvent.15.a: "Потрясающе!"
 econvent.100.t: "Угасание промышленности"
 econvent.100.d: "Из-за меняющихся экономических условий большая часть наших заводов и фабрик стала неконкурентоспособной, и ее пришлось закрыть."
 econvent.100.a: "Мы будем восстанавливать нашу промышленность!"
 econvent.101.t: "Компании перемещаются заграницу!"
 econvent.101.d: "Из-за меняющихся экономических обстоятельств многие корпорации решили переехать за границу, чтобы стать более конкурентоспособными. Это повредит отечественной экономике."
 econvent.101.a: "Мы будем восстанавливать нашу экономику!"
 econvent.102.t: "Компании переезжают в [Root.GetNameDef]"
 econvent.102.d: "В связи с изменением экономической ситуации в [FROM.GetNameDef] многие корпорации [FROM.GetAdjective] решили переехать в [Root.GetNameDef], чтобы повысить свою конкурентоспособность. Это станет благом для нашей экономики."
 econvent.102.a: "Отличные новости"
 remove_civilian_industry_effect_tt: "Будет потеряно [?reduction_factor|%R0] гражданских фабрик\n"
 migrate_industry_to_random_effect_tt: "§R[?reduction_factor|%0]§! гражданских фабрик перемещается в §Y[relocation_location.GetNameDef]§!.\n"
 factories_migrated_to_us_tt: "[?FROM.ind_factories|Y0] гражданских фабрик перемещается из §Y[FROM.GetNameDef]§! в §Y[Root.GetNameDef]§!.\n"
 war.0.t: "[FROM.GetName] идёт на войну!"
 war.0.d: "[FROM.GetName] сегодня вступил в войну. Международное сообщество будет внимательно следить за развитием этого конфликта.\n"
 war.0.a: "Беспокойство"
 anti_bully.2.t: "Общественная усталость от войны"
 anti_bully.2.d: "Мы решили, что война - наш лучший курс действий. Однако, чтобы сохранить поддержку среди людей, мы должны либо быстро выиграть это, либо быстро продвинуться на чужую землю. Народ будет идти, пока увидит, насколько необходима эта война. Сапоги маршируют, барабаны бьют, и время для [FROM.GetName] нам предстоит воевать!\n\n§YЭто активирует систему общественной усталости от войны§!.\n"
 anti_bully.2.a: "Мы должны победить!"
 sco.1.t: "[FROM.GetName] подал заявку на получение статуса наблюдателя при ШОС"
 sco.1.d: "Новое государство желает наблюдать за работой ШОС и, возможно, в конечном итоге стать полноправным членом организации.!"
 sco.1.a: "Мы не видим причин, почему их просьба не должна быть удовлетворена."
 sco.1.b: "Мы не можем предоставить им этот статус!"
 sco.2.t: "[FROM.GetName] подал заявку на получение статуса членства в ШОС"
 sco.2.d: "Новое государство желает стать полноправным членом организации!"
 sco.2.a: "Мы не видим причин, почему их просьба не должна быть удовлетворена."
 sco.2.b: "Мы не можем предоставить им этот статус!"
 sco.3.t: "[FROM.GetName] предлагает провести с нами совместные учения"
 sco.3.d: "Это государство-член ШОС предлагает совместные учения для активизации нашего военного сотрудничества и повышения доверия между нашими двумя странами."
 sco.3.a: "Это хорошая возможность для наших войск получить опыт!"
 sco.3.b: "Сотрудничество с [FROM.GetName] невозможно."
 sco.4.t: "[FROM.GetName] принял наше предложение!"
 sco.4.d: "[FROM.GetAdjective] делегаты тепло восприняли наше предложение и нашу подготовку к совместным учениям."
 sco.4.a: "Пусть игры начнутся!"
 sco.5.t: "[FROM.GetName] отклонил наше предложение!"
 sco.5.d: "[FROM.GetAdjective] делегаты отказались от проведения с нами весьма плодотворных военных учений."
 sco.5.a: "Их потеря..."
 sco.6.t: "ШОС начала масштабные военные учения"
 sco.6.d: "[FROM.GetAdjective] войска присоединились сегодня к тысячам других в том, что описывается как контртеррористические учения под эгидой Шанхайской организации сотрудничества (ШОС). Хотя многие приветствовали эти учения как признак успешного международного сотрудничества, другие отреагировали на это последнее событие гораздо менее восторженно. Американские и европейские аналитики ссылались на развертывание дальней авиации и значительной огневой мощи как на доказательство того, что эти учения предназначены не для практики контртеррористических операций, а как хорошо вооруженная генеральная репетиция конфронтации с Западом."
 sco.6.a: "Эти угрожающие учения предназначены для нашей пользы?"
 sco.6.b: "Только террористам есть чего бояться этого!"
 sco.6.c: "Интересная разработка"
 sco.7.t: "[FROM.GetName] станосится членом ШОС"
 sco.7.d: "После постепенного процесса интеграции [FROM.GetLeader] сегодня объявил о вступлении своей страны в Шанхайскую организацию сотрудничества. Оптимистично настроенные наблюдатели рассматривают это событие как дальнейшее развитие регионального экономического и политического сотрудничества на Евразийском континенте, в то время как более пессимистичные аналитики выражают обеспокоенность растущим влиянием Китая и угрозой, которую это представляет для существующего мирового порядка."
 sco.7.a: "Китайская угроза продолжает расти..."
 sco.7.b: "Хороший день для дипломатии!"
 sco.8.t: "[FROM.GetName] покидает ШОС"
 sco.8.d: "После переоценки нынешним правительством [FROM.GetAdjective] действий Китая, [FROM.GetLeader] вывел [FROM.GetNameDef] из Шанхайской организации сотрудничества. [CHI.GetLeader] пока не прокомментировал это развитие событий, но связанные с правительством Китая медиаорганизации поспешили выразить сожаление по поводу того, что этот уход представляет собой шаг назад с точки зрения региональной интеграции."
 sco.8.a: "Китайская агрессия оттолкнула этот народ."
 sco.8.b: "Грустный день для международного сотрудничества..."
 sco.9.t: "Китай берет бразды правления в ШОС у России"
 sco.9.d: "Шанхайская организация сотрудничества исторически управлялась как совместные усилия Китая и России. Однако, как сообщается, недовольство Китая этим соглашением привело к тому, что Россия была вынуждена занять более низкую позицию в организации. Хотя и [CHI.GetLeader], и [SOV.GetLeader] хранили молчание об этой борьбе за власть, российские официальные лица, как сообщается, в ярости от китайцев и огорчены унижением славянского гиганта, которое произошло на глазах у других государств-членов ШОС. Геополитические последствия этого шага с точки зрения гегемонии над Центральной Азией, вероятно, будут существенными."
 sco.9.a: "Китай не желает делиться центром внимания..."
 sco.10.t: "Китай требует, чтобы мы выбрали сторону"
 sco.10.d: "Продолжающееся членство в ОДКБ и Шанхайской организации сотрудничества поставило нас в трудное положение после китайско-российского раскола. Китай сейчас требует, чтобы мы либо вышли из ШОС и остались в российском альянсе, либо остались в ШОС и отказались от русских. Выбор, который мы сделаем, почти наверняка будет значимым в предстоящем противостоянии двух региональных гигантов."
 sco.10.a: "Мы ничто, если не лояльны!"
 sco.10.b: "Пора покинуть этот тонущий корабль..."
 sco.11.t: "[FROM.GetName] оказывает нам помощь в развитии!"
 sco.11.d: "Под эгидой Шанхайской организации сотрудничества правительство [FROM.GetAdjective] предоставляет нашим местным фирмам столь необходимые средства и ресурсы для содействия их проектам развития. Хотя эта помощь является хорошей новостью для нашей экономики, она увеличит степень влияния, которое [FROM.GetNameDef] оказывает на нашу страну."
 sco.11.a: "Мы благодарны за помощь!"
 sco.12.t: "[FROM.GetName] сформировало $Шанхайский пакт$!"
 sco.12.d: "[FROM.GetName] сформировало $SHANGHAI_PACT$, чтобы противостоять [USA.GetFactionName]. Мы вынуждены отдать огромную часть внутреннего влияния [FROM.GetAdjective], и так как мы члены ШОС, то мы вынуждены вступить в новый альянс."
 sco.12.a: "Понятно"
 taiwan.1.t: "228 Ралли рука об руку"
 taiwan.1.d: "Демонстрация солидарности. Человеческая цепь была сформировано из около двух миллионов человек, образующих таким образом человеческую цепь длиной 500 километров. Начиная с гавани Килунга, самого северного города Тайваня, цепь вела свой путь к самой южной оконечности острова. Цель была двойственной по своей природе. Тайваньцы желали мира, но они также протестовали против размещения Китайской Народной Республикой ракет, нацеленных на Тайвань, своего островного соседа. Некоторая символика демонстрации, особенно в том месте, где участники «отворачиваются от Китая» явно отклонились в сторону поддержки независимости Тайваня, и, следовательно, на ней не присутствовали члены Пан-синей Коалиции, которые противопоставили демонстрации свой собственный митинг по всему острову через несколько дней."
 taiwan.1.a: "Давайте никогда не забывать жертв"
 taiwan.2.t: "Тайфун Билис"
 taiwan.2.d: "В рамках подготовки к «Билису» офисы по всему острову были закрыты. Помимо закрытия предприятий, были перенесены рейсы на остров и с острова, а также создан центр помощи при тайфуне. Из-за угрозы оползней на Тайване было объявлено предупреждение об оползнях. Хотя шторм ещё не обрушился на сушу, 22 августа в Тайбэе погиб один человек, которого похоронил оползень, вызванный надвигающимся тайфуном; это был первый смертельный случай, связанный с «Билисом». Наряду с переносом рейсов, были закрыты многие аэропорты, а Тайваньская фондовая биржа должна была закрыться 23 августа. Тем временем больницы продлили время работы в ожидании поступления пациентов. Сотрудники береговой охраны Тайваня регулировали рыбную ловлю из-за угрозы смертоносных волн. Порт Гаосюн был закрыт на протяжении всего шторма. Из-за повышенного спроса на овощи в преддверии шторма стоимость таких продуктов выросла на 20–30 процентов.\n\nТайфун «Билис» был очень разрушительным для Тайваня. Ущерб, нанесённый сельскому хозяйству, рыболовству и лесному хозяйству острова, составил 133,5 миллиона долларов США. В результате тайфуна погибли 14 человек, ещё 80 получили ранения. Перебои с электричеством негативно сказались примерно на 600 000 домохозяйств, а 400 домов по всему Тайваню были разрушены. После шторма несколько сотен тысяч семей столкнулись с нехваткой воды. В Чэн-Кунге на метеостанции был зафиксирован порыв ветра со скоростью 281 км/ч, который повредил анемометр станции. В результате оползня в городе Дженай погибли девять фермеров. Десятки тысяч человек были вынуждены покинуть свои дома во время шторма и перебраться в эвакуационные пункты, организованные правительством. В восточной части уезда Хуалянь 250 домов пострадали от сильного ветра. Ветер также повалил деревья и сдул лёгкие транспортные средства, заблокировав дороги. Из-за проливных дождей, вызванных «Билисом», было затоплено около 40 000 гектаров фруктовых садов и рисовых полей. После того как «Билис» прошёл над Тайванем, на острове произошло землетрясение магнитудой 5,7, что усугубило и без того тяжёлое положение."
 taiwan.2.a: "Время восстанавливать"
 taiwan.3.t: "Президентские выборы на Тайване"
 taiwan.3.d: "Это вторые в истории прямые президентские выборы Китайской Республики, на которых были избраны президент и вице-президент Китайской Республики 10-го срока в соответствии с Конституцией 1947 года. Это может положить конец более чем полувековому правлению Гоминьдана на Тайване, поскольку избиратели Гоминьдана разделились пополам.\n\nХотя он был более популярен и постоянно занимал более высокие места в опросах, откровенный бывший губернатор Тайваня Джеймс Сун не смог получить номинацию от Гоминьдана. В результате он объявил о своей кандидатуре в качестве независимого кандидата. Гоминьдан ответил исключением Суна и 21 его союзника. Они подали на Суна в суд за кражу, утверждая, что, будучи генеральным секретарем партии, он украл миллионы тайваньских долларов наличными, предназначенные для семьи покойного президента Цзян Цзинго, и спрятал деньги в Chunghsing Bills Finance Co. Сун защищался, говоря, что действовал по указанию Ли, но его история была в значительной степени неубедительной. Первоначально лидировавший в опросах, Сун проиграл с отрывом всего в 300 000 голосов, а финансовый скандал, запятнавший его имидж честного политика, скорее всего, приведет к его провалу.\n\nДемократическая прогрессивная партия выдвинула бывшего мэра Тайбэя Чэнь Шуйбяня на пост президента. Выдвинув свою кандидатуру на выборах 1996 года на радикальной платформе независимости и проиграв с большим отрывом, ДПП в мае 1999 года смягчила свою позицию, выпустив «Резолюцию о будущем Тайваня». Резолюция приняла статус-кво и поддержала умеренную точку зрения, что Тайвань уже независим, поэтому любая официальная декларация не будет срочной необходимостью, если вообще будет. Также было включено обещание, что любое изменение международного статуса Тайваня должно будет осуществляться посредством референдума, тем самым смягчая опасения, что в случае избрания правительство ДПП в одностороннем порядке объявит независимость без народного одобрения. Группа Чэнь-Лу также обещает быть более агрессивной в борьбе с черным золотом, увеличить финансирование социальных услуг и стать более экологичной, например, выступая против ядерной энергетики."
 taiwan.3.a: "Чэнь Шуйбянь (ДПП)"
 taiwan.3.b: "Льен Чан (Гоминьдан)"
 taiwan.3.c: "Джеймс Сунг (независимый)"
 taiwan.4.t: "Создано Управление береговой охраны"
 taiwan.4.d: "CGA объединяет Командование береговой охраны, Бюро морской полиции и несколько катеров из Главного таможенного управления Тайваня Министерства финансов. CGA формально объединяет прибрежные и морские правоохранительные органы. В ближайшем будущем молодое агентство будет активно участвовать в многочисленных поисково-спасательных операциях и операциях по борьбе с контрабандой.\n\nАдминистрация береговой охраны Совета по делам океана (CGA) отвечает за поддержание правопорядка, защиту ресурсов территориальных вод Китайской республики, которые окружают Тайвань, Пэнху, Цзиньмэнь, острова Мацу, Зеленый остров, остров Орхидей, острова Донгша, и острова Наньша, а также обеспечение первой линии обороны вдоль прибрежных районов от контрабандистов и нелегальных иммигрантов. CGA считается гражданским правоохранительным органом, находящимся под управлением Совета по делам океана Исполнительного Юаня, хотя во время чрезвычайных ситуаций он может быть включен в состав Вооруженных сил Китайской Республики.\n\nУправление береговой охраны возглавляют один министр и три заместителя министра. В состав CGA входят восемь департаментов, один офис и пять целевых групп, а также Главное управление морского патрулирования и Главное управление прибрежного патрулирования. Его юрисдикция охватывает воды, окружающие Цзиньмэнь, Мацу, Пэнху и главный остров Тайвань, чтобы обеспечить надлежащую защиту 1819,8 км береговой линии и 540 000 квадратных километров «голубой территории», которая в 15 раз больше, чем остров Тайвань."
 taiwan.4.a: "Для безопасного побережья"
 taiwan.5.t: "Открытие Национального университета Гаосюн"
 taiwan.5.d: "Университет стремится сократить разрыв в образовании между южным и северным Тайванем и способствовать развитию экономики южного региона.\n\nВ университете двадцать факультетов, включая западные языки и литературу, восточноазиатский язык и литературу, архитектуру, креативный дизайн, кинезиологию, исследования в области здравоохранения и досуга, право, правительство и право, экономическое и финансовое право, прикладную экономику, прикладную математику, прикладную математику. Химия, Электротехника, Гражданское и экологическое проектирование, Науки о жизни и Азиатско-Тихоокеанский Промышленный и Бизнес Менеджмент, Традиционное искусство, Финансы, Управление информацией и Прикладная физика. Среди этих отделов Азиатско-Тихоокеанский Промышленный и Бизнес Менеджмент специально разработан для выращивания промышленных элит.\n\nНеобычной особенностью этой школы является открытое пространство. На границах кампуса нет стен. Жители, которые живут поблизости от этой школы, могут дойти до кампуса пешком или заняться спортом, используя оборудование в тренажерном зале. Биоразнообразие также является важной характеристикой NUK. В пруду Аквапарка водится более 60 видов рыб."
 taiwan.5.a: "Это поможет югу"
 taiwan.6.t: "Соглашение о торговле услугами через пролив было ратифицировано"
 taiwan.6.d: "После одобрения тайваньским законодательным органом CSSTA, соглашение о свободной торговле между Тайванем и материковым Китаем, официально вошло в тайваньское законодательство."
 taiwan.6.a: "Тайвань становится ближе к Китаю."
 taiwan.7.t: "«Движение подсолнухов» заняли тайваньское законодательное собрание"
 taiwan.7.d: "Члены студенческого движения Sunflower Movement вчера перелезли через забор между ними и законодательным органом Тайваня после протестов против попыток правительства принять спорное Соглашение о торговле услугами через пролив (CSSTA), соглашение о свободной торговле с материковым Китаем. Протестное движение выразило обеспокоенность по поводу поспешного подхода правительства к ратификации договора и отсутствия прозрачности во время переговоров по нему, а также содержания самого договора."
 taiwan.7.a: "Удар по Гоминьдану."
 taiwan.8.t: "КНР \"Дорожная карта к воссоединению\""
 taiwan.8.d: "Правительство [CHI.GetLeader] предложило нам \"Дорожную карту воссоединения\", в которой прописан путь возвращения Тайваня под контроль Китая в качестве специального административного района. Предложение включает множество гарантий сохранения тайваньской демократии и политической автономии, но этого может оказаться недостаточно для тайваньских противников воссоединения с материком. Как Китай может отреагировать, если мы отвергнем этот план, пока неясно."
 taiwan.8.a: "Мы должны принять этот план."
 taiwan.8.b: "Тайвань - это не Китай!"
 taiwan.9.t: "Сообщения о подозрительной деятельности китайской разведки"
 taiwan.9.d: "Наши разведывательные службы сообщают об усилении активности китайских агентов на нашей территории. Эта активность не означает ничего конкретного, но в равной степени она может означать, что Китай что-то планирует. Мы должны решить, будет ли для наших разведывательных служб хорошей тратой времени заниматься расследованием этого."
 taiwan.9.a: "Выглядит безобидно."
 taiwan.9.b: "Мы должны провести расследование."
 taiwan.10.t: "Китай требует отменить Закон об отношениях с Тайванем!"
 taiwan.10.d: "КНР потребовала от нас отменить Акт о тайваньских отношениях, закрепляющий наши нынешние отношения с правящими властями Тайваня. Это требование, несомненно, является прелюдией к ещё более агрессивным действиям в отношении Тайваня, чем те, которые мы уже наблюдали в последние месяцы. Если мы отменим этот закон, шансы на конфликт через Тайваньский пролив резко возрастут."
 taiwan.10.a: "Это требование просто смехотворно!"
 taiwan.10.b: "Для нас будет лучше уступить..."
 taiwan.11.t: "Дорожная карта была принята!"
 taiwan.11.d: "Тайбэй согласился сделать совместное заявление, обязывающее их и нашу стороны к окончательному воссоединению!"
 taiwan.11.a: "Радуйтесь!"
 taiwan.12.t: "Дорожная карта была отклонена!"
 taiwan.12.d: "Тайбэй отказался взять на себя обязательство в конечном итоге воссоединить нашу разделённую страну. Мы можем либо дождаться условий, которые с большей вероятностью приведут к принятию нашего предложения, и повторить попытку, либо попытаться использовать другие альтернативы..."
 taiwan.12.a: "Плохой выбор с их стороны."
 taiwan.13.t: "Забастовка профсоюза бортпроводников Таоюань"
 taiwan.13.d: "Профсоюз бортпроводников Таоюаня, представляющий около 2500 бортпроводников авиакомпании China Airlines, проводит первую в истории тайваньской авиации забастовку. В результате были отменены 122 пассажирских рейса China Airlines из международного аэропорта Таоюань и аэропорта Тайбэй-Соншань, и 20 000 пассажиров оказались в затруднительном положении. Профсоюз выдвинул нам семь требований, которые мы должны принять для улучшения условий труда."
 taiwan.13.a: "Примите их требования"
 taiwan.13.b: "Мы никогда не отступаем"
 taiwan.14.t: "Удар не удался"
 taiwan.14.d: "После того как мы отвергли их требования, забастовка вскоре прекратилась. Сейчас все возвращаются к работе."
 taiwan.14.a: "У них не было ни единого шанса"
 taiwan.15.t: "Забастовка продолжается"
 taiwan.15.d: "После того, как мы отвергли их требования, забастовка только усилилась. Похоже, забастовка скоро прекратится."
 taiwan.15.a: "По крайней мере, мы пытались"
 taiwan.16.t: "Танк упал с моста"
 taiwan.16.d: "Вчера утром в уезде Пинтун армейский танк CM-11 перевернулся в ручей, возвращаясь на базу после учений. В результате погибли трое из пяти находившихся на борту солдат. Водитель получил лишь незначительные травмы и смог выбраться из танка самостоятельно. Четверо остальных, находившихся в орудийной башне, не смогли выбраться через люки башни, так как танк перевернулся."
 taiwan.16.a: "Расследуйте, как это могло произойти"
 taiwan_news.1.t: "Ратифицировано соглашение о торговле услугами между двумя странами"
 taiwan_news.1.d: "После одобрения законодательным органом Тайваня CSSTA, соглашение о свободной торговле между Тайванем и материковым Китаем, официально вошло в законодательство Тайваня."
 taiwan_news.1.a: "Тайвань всё больше сближается с Китаем."
 taiwan_news.2.t: "Протестующие с подсолнухами оккупировали законодательный орган Тайваня"
 taiwan_news.2.d: "Члены студенческого движения Sunflower Movement вчера перелезли через забор между ними и законодательным органом Тайваня после протестов против попыток правительства принять спорное Соглашение о торговле услугами через пролив (CSSTA), соглашение о свободной торговле с материковым Китаем. Протестное движение выразило обеспокоенность по поводу поспешного подхода правительства к ратификации договора и отсутствия прозрачности во время переговоров по нему, а также содержания самого договора."
 taiwan_news.2.a: "Удар по КМТ."
 taiwan_news.3.t: "Военные на Тайване устраивают переворот"
 taiwan_news.3.d: "Фракция тайваньских военных начала захватывать ключевые точки по всему острову Тайвань. [TAI.Getleader] объявил чрезвычайное положение и мобилизовал тех, кто остался верен правительству. Пока неясно, увенчаются ли успехом усилия президента.\n\nХотя заявленной целью лидеров переворота является борьба с недовольством администрацией [TAI.GetLeader], многие из высокопоставленных фигур, участвующих в нём, имеют тесные связи с Китаем. Несмотря на это, степень участия Китая в этой попытке переворота остаётся неясной."
 taiwan_news.3.a: "Будущее Тайваня висит на волоске."
 taiwan_news.4.t: "Тайваньский переворот удался"
 taiwan_news.4.d: "После неудачной попытки [TAI.Getleader] собрать поддержку против переворота, военные офицеры, лояльные прокитайской фракции на Тайване, взяли страну под контроль. Хотя офицеры пообещали в конечном итоге вернуться к демократии, политическая автономия Тайваня от материка, несомненно, находится под угрозой. Учитывая негласную, но широко известную поддержку переворота Китаем, вероятность принятия резолюции Совета Безопасности в ответ на это событие крайне маловероятна."
 taiwan_news.4.a: "Новая эра в истории Тайваня."
 taiwan_news.5.t: "Тайваньский переворот провалился"
 taiwan_news.5.d: "Сегодня [TAI.Getleader] одержал триумф, когда последние участники переворота сдались тайваньской полиции. За последние 2 недели путчистам не удалось заручиться поддержкой народа или своих сослуживцев. Отсутствие поддержки усугубило нехватку ресурсов и морального духа, что привело к массовой сдаче властям сторонников переворота по всей стране. [TAI.Getleader] заверил журналистов, что стабильность и спокойствие будут быстро восстановлены в островном государстве, а Китай пока никак не прокомментировал последние события."
 taiwan_news.5.a: "Кризис был предотвращён."
 taiwan_news.5.b: "Кажется, нам нужно другое решение."
 taiwan_news.6.t: "Тайвань принял законопроект о противодействии китайскому вмешательству"
 taiwan_news.6.d: "С целью пресечь попытки Китая вмешаться в избирательный процесс на Тайване, [TAI.GetLeader] удалось провести в парламент противоречивый законопроект \"против инфильтрации\". Законопроект запрещает враждебным иностранным державам вести предвыборную кампанию, лоббировать, делать политические пожертвования или распространять дезинформацию. Оппозиционные законодатели решительно выступили против законопроекта, как и пекинское Управление по делам Тайваня. Оба они осудили [TAI.GetLeader] за \"зелёный террор\", который способствует созданию атмосферы паранойи и страха. Правящая партия [TAI.GetLeader] защищает этот шаг как необходимый, учитывая существенную угрозу, которую материковый Китай представляет для островной территории."
 taiwan_news.6.a: "Тайвань сопротивляется."
 hongkong.1.t: "Китайцы отказались отменить аннексию!"
 hongkong.1.d: "Китай отверг наши угрозы, не оставив нам другого выбора, кроме как следовать им."
 hongkong.1.a: "Кажется, они больше не боятся нас."
 hongkong.2.t: "Китай направляет войска в Гонконг"
 hongkong.2.d: "После протестов в Специальном административном районе Гонконг Китай приказал многочисленным подразделениям Народно-освободительной армии выйти на улицы Гонконга, чтобы \"восстановить закон и порядок\". [CHI.GetLeader] заверил \"мирных демонстрантов\", что их не будут преследовать, а со всеми арестованными будут обращаться в соответствии с международным правом прав человека. Однако многие в Гонконге и за рубежом скептически оценивают степень сдержанности китайских войск по отношению к демонстрантам."
 hongkong.2.a: "Эта акция достойна презрения!"
 hongkong.2.b: "Китай сделал то, что должен был сделать."
 hongkong.2.c: "Это не наше дело."
 hongkong.3.t: "Китай аннексирует Гонконг"
 hongkong.3.d: "Китай решил покончить с особым статусом Гонконга как специального административного района, официально аннексировав эту территорию. Мы должны решить, как наша страна отреагирует на это важное событие."
 hongkong.3.a: "Эта акция достойна презрения!"
 hongkong.3.b: "Китай сделал то, что должен был сделать."
 hongkong.3.c: "Это не наше дело."
 hongkong.4.t: "Китайская аннексия Гонконга требует ответа"
 hongkong.4.d: "Вопиющим образом нарушив Основной закон, который был согласован между нами и китайцами, Китай официально аннексировал Специальный административный район. Как гарант 50-летней автономии Гонконга мы должны ответить на этот незаконный акт соответствующим образом."
 hongkong.4.a: "Мы должны пригрозить военными действиями."
 hongkong.4.b: "Мы должны угрожать экономическими мерами."
 hongkong.4.c: "Мы должны критиковать этот шаг."
 hongkong.5.t: "Великобритания угрожает военными действиями!"
 hongkong.5.d: "Британцы отреагировали на аннексию их бывшей колониальной территории более воинственно, чем мы ожидали. Мы должны подумать, стоит ли уступать их требованиям."
 hongkong.5.a: "Это не тот холм, на котором мы хотим умереть."
 hongkong.5.b: "Пусть приходят."
 hongkong.6.t: "Великобритания угрожает экономическими мерами против нас!"
 hongkong.6.d: "Британцы решили пригрозить нам санкциями, если мы не отменим аннексию их бывшей колониальной территории. Мы должны подумать, стоит ли прислушиваться к их требованиям."
 hongkong.6.a: "Мы должны избегать конфронтации."
 hongkong.6.b: "Их угрозы ничего не значат!"
 hongkong.7.t: "Китайцы согласились отменить аннексию"
 hongkong.7.d: "Китайцы, явно преисполненные благоговения перед британской мощью, отступили в вопросе о Гонконге."
 hongkong.7.a: "Наши угрозы всё ещё действуют!"
 hongkong_news.1.t: "Гонконг потрясен массовыми протестами"
 hongkong_news.1.d: "После решения Китая исключить возможность избрания Гонконгом своего главы исполнительной власти всеобщим голосованием на китайской территории вспыхнули массовые протесты. [HKG.GetLeader] заявил(а), что, хотя правительство Гонконга уважает право гонконгского народа мирно и законно выражать свои взгляды, насилие и беззаконие не будут терпимы. Ответ Китая на нынешний кризис еще предстоит увидеть, так как [CHI.GetLeader] никак не прокомментировал(а) последние события."
 hongkong_news.1.d_limit: "После решения Китая о том, что глава исполнительной власти Гонконга может быть избран всеобщим голосованием только в случае предварительного утверждения кандидатов, на территории Китая вспыхнули массовые протесты. [HKG.GetLeader] заявил(а), что, хотя правительство Гонконга уважает право гонконгского народа мирно и законно выражать свои взгляды, насилие и беззаконие не будут терпимы. Ответ Китая на нынешний кризис еще предстоит увидеть, так как [CHI.GetLeader] никак не прокомментировал(а) последние события."
 hongkong_news.1.d_reunification: "После заявления Китая о том, что в 2047 году Гонконг потеряет свой особый статус и полностью вернется под китайский контроль, на китайской территории вспыхнули массовые протесты. [HKG.GetLeader] заявил(а), что, хотя правительство Гонконга уважает право гонконгского народа мирно и законно выражать свои взгляды, насилие и беззаконие не будут терпимы. Ответ Китая на нынешний кризис еще предстоит увидеть, так как [CHI.GetLeader] никак не прокомментировал(а) последние события."
 hongkong_news.1.d_annexed: "После весьма спорной аннексии Гонконга Китаем на китайской территории вспыхнули массовые протесты. [HKG.GetLeader] заявил(а), что, хотя правительство Гонконга уважает право гонконгского народа мирно и законно выражать свои взгляды, насилие и беззаконие не будут терпимы. Ответ Китая на нынешний кризис еще предстоит увидеть, так как [CHI.GetLeader] никак не прокомментировал(а) последние события."
 hongkong_news.1.a: "Интересная разработка"
 hongkong_news.1.b: "Плохая новость для нас."
 hongkong_news.2.t: "Гонконгские протесты сходят на нет"
 hongkong_news.2.d: "Протесты в Специальном административном районе Гонконг против недавних действий Китая в последние дни постепенно пошли на спад и практически прекратились. Полицейские операции на китайской территории не встречают сопротивления, и многие, кто ранее выходил на улицы, вернулись в свои дома. Что это означает для отношений между Китаем и неспокойной территорией, политические ценности которой значительно отличаются от прежних, пока неясно. Возможно, одним из индикаторов грядущих событий стал баннер, оставленный протестующими на видном месте в центре города с надписью \"Мы вернёмся\"."
 hongkong_news.2.a: "Интересная разработка"
 hongkong_news.2.b: "Они знают, что их дело бесполезно."
 hongkong_news.3.t: "Гонконгские протесты становятся всё более масштабными"
 hongkong_news.3.d: "Протесты против действий Китая на территории Гонконга быстро усилились, и аналитики в целом согласны с тем, что протесты вступили в новую стадию с точки зрения масштаба и тактики. Как правительства Китая и Гонконга отреагируют на эту новую эскалацию, еще предстоит увидеть, но, как сообщается, чиновники в обоих правительствах все больше возмущены влиянием протестов на их корыстные интересы. Протестующие, со своей стороны, отказываются отступать, пока правительства Китая и Гонконга не выполнят их требования."
 hongkong_news.3.a: "Народ Гонконга не будет молчать..."
 hongkong_news.3.b: "Они останутся дома, если будут знать, что для них хорошо!"
 korea.1.t: "Китай требует нашего ухода с Корейского полуострова"
 korea.1.d: "КНР потребовала, чтобы мы вывели наши войска, защищая Республику Корея из того, что она называет «сферой влияния». Это требование, несомненно, является прелюдией к агрессивным действиям в отношении РК. Если мы выведем наши войска с полуострова, шансы на конфликт через демилитаризованную зону резко возрастут."
 korea.1.a: "Это требование смехотворно!"
 korea.1.b: "Нам лучше уступить..."
 korea.2.t: "Китай призывает нас начать экономические реформы"
 korea.2.d: "[CHI.GetLeader] призывает наше правительство последовать примеру Китая и начать реформы рыночной либерализации. Хотя тот же быстрый экономический рост, что и в Китае в 1980-х годах, является заманчивым предложением, мы должны взвесить это с учетом нестабильности, которая неизбежно возникнет в результате нашего стремления к таким реформам."
 korea.2.a: "Сейчас не время для реформ!"
 korea.2.b: "Начать мелкие реформы."
 korea.2.c: "Начать умеренные реформы."
 korea.2.e: "Инициировать крупные реформы."
 korea.3.t: "[NKO.GetLeader] объявил о новых экономических реформах"
 korea.3.d: "Под давлением Китая, Северная Корея начала процесс экономической либерализации, который многие надеются приведет к улучшению уровня жизни в «стране-отшельнице». Хотя многие экономисты похвалили начало этого реформирования, другие выражают опасения по поводу того, может ли быстрый темп реформ вызвать нестабильность в стране, которая привыкла к полностью плановой экономике."
 korea.3.a: "Обнадеживающие новости?"
 korea.4.t: "Китайско-северокорейский раскол"
 korea.4.d: "Критика режима [NKO.GetLeader] в китайских правительственных СМИ резко возросла за последние недели. Эта критика направлена ​​на продолжающуюся ядерную проблему Северной Кореи и неспособность северокорейского государства улучшить условия жизни своих граждан посредством экономической либерализации, как это делал Китай в последние десятилетия.\n\nХотя [CHI.GetLeader] хранит молчание по этому вопросу, широко распространено мнение, что эти медиаорганизации не начали бы столь уничтожающую критику некогда близкого союзника без молчаливого одобрения [CHI.GetLeader]. Многие наблюдатели видят в этом кульминацию разочарования Китая династией Ким и, возможно, желание создать альтернативное правительство, которое было бы более стабильным и соответствовало бы желаниям Китая."
 korea.4.a: "Только [CHI.GetLeader] знает, к чему это идет..."
 korea.5.t: "Переговоры начинаются"
 korea.5.d: "Основное требование Севера заключается в прекращении совместных военных учений с Соединёнными Штатами, которые они рассматривают как подготовку к вторжению на их территорию. Однако наши военные в целом считают эти учения необходимой подготовкой на случай нападения Северной Кореи. Поэтому согласие на прекращение этих учений стало бы серьёзной авантюрой, ставящей под угрозу безопасность нашей страны."
 korea.5.d_NKO: "Главное требование Юга заключается в прекращении испытаний ядерного оружия, которые они рассматривают как свидетельство наших агрессивных намерений. Однако военные рассматривают нашу ядерную программу как важный фактор сдерживания вторжения США. Более того, сама программа и необходимые для её продолжения испытания укрепляют легитимность нашего правительства. Поэтому согласие на прекращение этих испытаний стало бы серьёзной авантюрой, в которой на кон поставлена ​​безопасность как нашей страны, так и нашего правительства."
 korea.5.a: "Наша страна никогда не станет целой снова, если мы не рискнем..."
 korea.5.b: "Некоторые риски слишком велики."
 korea.6.t: "Корейские мирные переговоры прошли в Пекине"
 korea.6.d: "Технически более полувека Северная и Южная Корея находятся в состоянии войны. Этот замороженный конфликт иногда накаляется столкновениями между двумя сторонами вдоль спорных морских границ или через демилитаризованную зону. Теперь Китай берет на себя инициативу положить конец такому положению дел и добиться деэскалации на Корейском полуострове посредством официального мирного договора. В таком соглашении обязательно будут учитываться совместные учения РК с США и испытания ядерного оружия КНДР, чтобы быть успешными."
 korea.6.a: "Могут ли обе стороны прийти к компромиссу?"
 korea.7.t: "Корейские мирные переговоры увенчались успехом!"
 korea.7.d: "Обе стороны согласились пойти на значительные уступки, и переговоры в Пекине привели к подписанию мирного договора между представителями Северной и Южной Кореи. [CHI.GetLeader] похвалил обе стороны за их приверженность делу мира и заверил корейский народ в том, что раны, которые он получил за эти годы, начинают заживать»."
 korea.7.a: "Обнадеживающее событие!"
 korea.8.t: "Радикальное корейское движение набирает популярность"
 korea.8.d: "Экономическое неравенство в Республике Корея способствует росту недовольства среди низших слоев населения страны. Тысячи онлайн-активистов начали призывать к достижению равенства путем создания автономии на уровне общин по всей Республике Корея. Хотя это движение не имеет лидеров и поэтому не имеет центрального, четкого послания, большинство его членов, похоже, желают упразднения корейского государства и связанных с ним чеболей в пользу системы, которая распределяет политическую и экономическую власть между непосредственно избранными представителями общин.\n\nЭта новая идеология, отвергающая основополагающие идеологии как РК, так и КНДР, представляет собой значительный отход от традиционной политики южнокорейских радикальных левых, которые либо продвигали левую политику в рамках существующей политической системы Южной Кореи, либо призывали к созданию государства по типу северокорейского."
 korea.8.a: "В Южной Корее что-то происходит..."
 korea.9.t: "Повстанцы юга просят нашей поддержки"
 korea.9.d: "Представители Корейского национально-освободительного движения, стремящиеся свергнуть правительство на юге, обратились к нам с просьбой о союзе, чтобы открыть новый фронт вдоль демилитаризованной зоны."
 korea.9.a: "Мы присоединимся к их борьбе!"
 korea.9.b: "Мы будем наблюдать со стороны."
 JUCHE_FACTION: "Корейский антиимпериалистический фронт"
 korea.10.t: "Южная Корея просит прекратить защиту Северной"
 korea.10.d: "Уже долгое время Южная Корея стремится продемонстрировать свою независимость от интересов США. Отношения между нашими странами находятся на высоком уровне, в то время как наше взаимодействие с Северной Кореей в значительной степени зашло в тупик. Сейчас южнокорейская делегация обратилась с просьбой расторгнуть договор о взаимной обороне между нами и северными корейцами. Если мы удовлетворим их просьбу, то больше не будем предоставлять помощь Северной Корее в случае внешнего нападения."
 korea.10.a: "Мы поддержим наших союзников!"
 korea.10.b: "Север не нуждается в нашей защите"
 korea.11.t: "Корейские оружейные компании предлагают продукцию"
 korea.11.d: "Республика Корея известна своей способностью производить высококачественное оружие по относительно доступным ценам. Мы должны подумать о том, стоит ли закупать их оборудование, но наши средства не безграничны, поэтому выбирать нужно с умом."
 korea.11.a: "Необходимо закупить корейские танки"
 korea.11.b: "Необходимо закупить корейскую самоходную артиллерию"
 korea.11.c: "Необходимо закупить корейские учебные самолеты"
 korea.11.e: "Необходимо закупить корейские штурмовые винтовки"
 korea.11.f: "Откажитесь от предложения"
 korea.12.t: "[FROM.GetName] согласен на сделку с оружием!"
 korea.12.d: "Представители этой страны согласились импортировать у нас оружие, увеличивая наши доходы и наше международное влияние."
 korea.12.a: "Наш международный авторитет растет!"
 korea.13.t: "Пекин и Сеул совместно критикуют действия Японии во Второй мировой войне"
 korea.13.d: "Правительства Китая и Республики Корея выступили с весьма необычным заявлением, в котором раскритиковали действия Японии в военное время и ее последующий отказ полностью искупить вину. Многие наблюдатели расценили этот шаг как часть усилий Сеула, направленных на то, чтобы отвратить Китай от поддержки Северной Кореи. Хотя Пхеньян выразил поддержку совместному осуждению [KOR.GetLeader] и [CHI.GetLeader], [NKO.GetLeader], по сообщениям, обеспокоен признаками того, что Китай все больше отдает предпочтение Сеулу."
 korea.13.a: "Мы никогда не забудем, что они сделали"
 korea.13.b: "Их критика утомляет..."
 korea.13.c: "Прошлое отбрасывает длинную тень..."
 korea.14.t: "Китай расторгает договор об обороне с Северной Кореей"
 korea.14.d: "После того как американские военные покинули Южную Корею, Китай решил разорвать договор об обороне с Северной Кореей, чем вызвал гнев Пхеньяна. Это решение стало ответом на ряд шагов, предпринятых Сеулом, который пытался заручиться поддержкой Китая и показать свою независимость от Вашингтона. Некоторые эксперты считают, что теперь, когда путь к воссоединению открыт, [KOR.GetLeader] может попытаться вернуть Северную Корею силой"
 korea.14.a: "Наши усилия принесли свои плоды"
 korea.14.b: "Мы слишком долго терпели Пхеньян"
 korea.14.c: "На горизонте маячит война..."
 korea.15.t: "[KOR.GetLeader] требует репараций от Японии"
 korea.15.d: "После нескольких недель напряжённых отношений между Сеулом и Токио, а также из-за давления со стороны корейских активистов, [KOR.GetLeader] потребовал от Японии выплатить компенсацию выжившим жертвам военных преступлений, совершённых японскими военными во время Второй мировой войны. Япония, которая утверждает, что вопрос о компенсации был решён между её правительством и правительством Южной Кореи во времена правления авторитарного Пак Чун Хи, предсказуемо отказалась рассматривать возможность выплаты компенсации. \n\nХотя это дело не привело к компенсации корейским жертвам, оно укрепило политические позиции [KOR.GetLeader], так как многие корейцы сплотились вокруг этого чрезвычайно эмоционального национального вопроса."
 korea.15.a: "Однажды мы добьемся справедливости"
 korea.15.b: "Их требования абсурдны!"
 korea.15.c: "Можно ли разрешить их разногласия?"
 korea.16.t: "Война!"
 korea.16.d: "Между нами и Севером началась война. Согласно нашему соглашению с Соединенными Штатами, мы должны передать американским военным оперативный контроль над нашими вооруженными силами."
 korea.16.a: "Мы должны передать контроль над ситуацией"
 korea.17.t: "Война окончена"
 korea.17.d: "На Корейский полуостров вернулся мир. Теперь, когда мы вернулись к условиям мирного времени, мы можем восстановить контроль над нашими вооруженными силами."
 korea.17.a: "Наконец-то мир"
 korea.18.t: "Выборы в Национальное собрание приближаются, партии начинают агитацию"
 korea.18.d: "Поскольку выборы в Национальное собрание пройдут уже через месяц, мы должны начать повышать популярность нашей партии, чтобы обеспечить себе большинство в законодательном органе на следующие четыре года."
 korea.18.a: "Будем надеяться на большинство!"
 korea.21.t: "Результаты подведены!"
 korea.21.a: "Как всегда, это были тяжелые выборы"
 korea.21.d_no: "К сожалению, ни одна из двух основных партий не смогла получить большинство в Национальном собрании. Нашему правительству придется вести более активную борьбу, чтобы привлечь на свою сторону законодателей от других партий для принятия противоречивых законов."
 korea.21.d_con_loss: "К сожалению, нашей партии не удалось получить большинство в Национальном собрании. Либеральные законодатели откажутся принимать любые законы, сдерживающие профсоюзы, поддерживающие крупный бизнес или пропагандирующие враждебность к Северной Корее."
 korea.21.d_lib_loss: "К сожалению, нашей партии не удалось получить большинство в Национальном собрании. Консервативные законодатели откажутся принимать любые законы, сдерживающие крупный бизнес, реформирующие призыв в армию и разведку или способствующие примирению с Северной Кореей."
 korea.21.d_con_win: "К счастью, нашей партии удалось завоевать большинство в Национальном собрании. Законодательная и исполнительная власти смогут работать рука об руку, чтобы способствовать достижению консервативных целей, таких как ограничение профсоюзов, поддержка чеболей и жесткая позиция в отношении Северной Кореи."
 korea.21.d_lib_win: "К счастью, нашей партии удалось завоевать большинство в Национальном собрании. Законодательная и исполнительная власти смогут работать рука об руку, чтобы способствовать достижению либеральных целей, таких как ослабление чеболей, реформирование аппарата безопасности и воссоединение с Севером."
 korea.22.t: "Первые последствия воссоединения начинают проявляться."
 korea.22.d: "Наконец-то великая корейская нация воссоединилась после долгих десятилетий мучительного разделения. Однако наша задача по объединению двух половин ещё далека от завершения. Многие люди по обе стороны 38-й параллели выражают недовольство тем, как произошло воссоединение. Экономические издержки объединения двух совершенно разных государств быстро становятся очевидными. Если мы не справимся с задачей воссоединения страны, мы можем столкнуться с распадом нашей нации."
 korea.22.a: "Теперь начинается самое сложное..."
 korea.23.t: "Наш ответ на мирное предложение южан"
 korea.23.d: "После нескольких недель обсуждений пришло время решить, готовы ли мы принять предложение Юга о мире. Мы должны подумать, доверяем ли мы искренности предложения южан, а также о том, как воспримут мирный договор наши внутренние сторонники, которые все еще надеются когда-нибудь воссоединить страну силой."
 korea.23.a: "Мы согласны на заключение договора"
 korea.23.b: "Между нами никогда не будет мира!"
 korea.24.t: "Подписано корейское мирное соглашение"
 korea.24.d: "После улучшения отношений между двумя Кореями [KOR.GetLeader] от Юга и [NKO.GetLeader] от Севера договорились заменить непрочное соглашение о перемирии официальным мирным соглашением. Этот договор окончательно положил конец состоянию вражды, существовавшей между двумя Кореями со времен Корейской войны. Оба лидера выразили надежду, что это событие поставит полуостров на путь к воссоединению, хотя некоторые наблюдатели выразили сомнения в готовности обеих сторон к воссоединению."
 korea.24.a: "Полуостров ждет светлое будущее!"
 korea.25.t: "Межкорейские переговоры срываются"
 korea.25.d: "Переговоры между [KOR.GetLeader] от Южной и [NKO.GetLeader] от Северной Кореи в Пханмунджоме не увенчались успехом из-за разногласий между сторонами. Несмотря на то, что по некоторым вопросам удалось достичь договорённости, другие проблемы остались нерешёнными. Возможно, в будущем переговоры продолжатся, но, очевидно, соглашение между двумя Кореями будет достигнуто ещё нескоро."
 korea.25.a: "Мир по-прежнему недостижим..."
 korea.26.t: "Южная Корея предлагает воссоединение"
 korea.26.d: "Стремясь извлечь выгоду из беспрецедентного улучшения отношений между двумя Кореями, Юг предлагает нам сотрудничество в деле воссоединения нашей разделенной нации. Однако они настаивают на том, чтобы процесс воссоединения проходил под руководством Юга, и это требование ставит под угрозу уникальную политическую культуру, которую мы сформировали на Севере."
 korea.26.d1: "Стремясь извлечь выгоду из беспрецедентного улучшения отношений между двумя Кореями, Юг предлагает нам сотрудничество в деле воссоединения нашей разделенной нации. Понимая наши опасения по поводу воссоединения, Юг предложил разделить власть после воссоединения через правительство единства, в которое войдут представители как Севера, так и Юга"
 korea.26.a: "Наша страна снова будет целой!"
 korea.26.b: "Воссоединение никогда не произойдет на таких условиях..."
 korea.27.t: "Север согласился на наши условия воссоединения!"
 korea.27.d: "После длительных переговоров Север согласился начать работу по воссоединению наших двух стран! Со стабилизацией отношений между двумя Кореями и реинтеграцией полуострова на горизонте будущее корейского народа выглядит как никогда ярко!"
 korea.27.a: "Фантастическая новость!"
 korea.28.t: "Север отказался от наших условий воссоединения!"
 korea.28.d: "К сожалению, [NKO.GetLeader] поставил свои личные интересы выше интересов корейского народа и отверг наше предложение о сотрудничестве в объединении страны. Это не означает, что мы не будем пытаться достичь нашей цели в будущем, но это означает, что воссоединение не произойдёт в ближайшее время. Мы должны подготовиться и создать условия для того, чтобы наша следующая попытка была успешной."
 korea.28.a: "Грустный день для корейского народа..."
 korea.29.t: "Китай требует вернуть останки военнослужащих Китайской народной добровольческой армии, которые находятся в Южной Корее."
 korea.29.d: ""
 korea.29.a: "Конечно. мы уважаем этих солдат."
 korea.29.b: "Они наши враги и захватчики нашей земли! Мы не можем этого принять!"
 korea.30.t: "Они наши враги и захватчики нашей земли! Мы не можем смириться с этим!"
 korea.30.d: "\nПервая коллекция останков была обнаружена в ходе раскопок, проведённых в провинциях Канвон и Кёнги. Многие из найденных останков не удалось идентифицировать. Изначально предполагалось, что первая коллекция содержит останки 425 солдат, однако позже эта цифра была увеличена до 437. \n\nЦеремония передачи останков состоялась в международном аэропорту Инчхон. Представители Китая и Южной Кореи подписали письмо о передаче. Для транспортировки останков было направлено 22 автомобиля. Когда специальные самолёты ВВС Китая вошли в воздушное пространство страны, два истребителя J-11 прибыли для сопровождения."
 korea.30.a: "Ура!"
 korea.31.t: "Седьмая передача останков солдат Народной добровольческой армии из РК в Китай"
 korea.31.d: "Южная Корея передала 117 останков в аэропорту Инчхона. На церемонии присутствовал министр по делам ветеранов Китая. Останки были раскопаны на холме Эрроу (место битвы при Уайт-Хорсе) в демилитаризованной зоне Северной Кореи в 2019 году."
 korea.31.a: "Ура!"
 korea.33.t: "Наш ответ на мирное предложение Севера"
 korea.33.d: "После нескольких недель обсуждений пришло время решить, готовы ли мы принять мирное предложение Севера. Мы должны задуматься над тем, доверяем ли мы искренности предложения Северной Кореи, а также над тем, как согласие на мирный договор будет воспринято теми из нашего народа, кто по-прежнему выступает против переговоров с северокорейским режимом."
 korea.34.t: "Северная Корея предлагает воссоединение"
 korea.34.d: "Стремясь извлечь выгоду из беспрецедентного улучшения отношений между двумя Кореями, Север предлагает нам сотрудничать, чтобы воссоединить нашу разделенную нацию. Однако они настаивают на том, что процесс воссоединения будет возглавляться Севером, и это требование ставит под угрозу тот образ жизни, который мы культивируем на Юге."
 korea.34.d1: "Стремясь извлечь выгоду из беспрецедентного улучшения отношений между двумя Кореями, Север предлагает нам сотрудничать, чтобы воссоединить нашу разделенную нацию. Север, понимая нашу обеспокоенность по поводу воссоединения, предложил разделить власть после воссоединения через правительство единства, включающее в себя элементы как Юга, так и Севера."
 korea.35.t: "Юг согласился на наши условия воссоединения!"
 korea.35.d: "После обширных переговоров Юг согласился начать работу по воссоединению наших двух стран! Поскольку отношения между двумя Кореями стабилизировались, а реинтеграция полуострова уже на горизонте, будущее корейского народа никогда не выглядело более светлым!"
 korea.36.t: "Юг отказался от наших условий воссоединения!"
 korea.36.d: "К сожалению, [KOR.GetLeader] решил поставить свою эгоистическую позицию выше позиции корейского народа и отклонил наше предложение о сотрудничестве в воссоединении страны. Этот отказ не означает, что мы не можем сделать еще одну попытку в будущем, но это означает, что воссоединение не произойдет в ближайшем будущем. Мы должны заложить основу для того, чтобы наша следующая попытка увенчалась большим успехом."
 korea.37.t: "Корея получила постоянное место в Совете Безопасности ООН"
 korea.37.d: "На сегодняшнем заседании Совета Безопасности ООН пять постоянных членов согласились с заявлением Кореи о том, чтобы стать новым постоянным членом. Корея обязалась сделать все возможное для поддержания мира во всем мире в соответствии со своими обязательствами по Уставу ООН."
 korea.37.a: "Мир наконец дал Корее некоторую компенсацию за вынужденный раскол."
 korea.38.t: "Россия подталкивает нас к началу экономических реформ"
 korea.38.d: "[SOV.GetLeader] призывает наше правительство инициировать реформы по либерализации западного рынка. Хотя такой же быстрый экономический рост, как в Китае в 1980-х годах, является заманчивым предложением, мы должны взвесить это с учетом нестабильности, которая неизбежно возникла бы в результате нашего стремления к таким реформам."
 korea.38.a: "Не время для реформ!"
 korea.38.b: "Начать незначительные реформы."
 recognition.1.t: "[FROM.GetName] Распознает отрыв"
 recognition.1.d: "[FROM.GetNameDef] предоставил официальное дипломатическое признание отколовшемуся государству на нашей территории. Это решение является шагом назад в наших претензиях на этот регион."
 recognition.1.a: "Мы не будем разделены."
 recognition.3.t: "[FROM.GetName] Отменяет признание"
 recognition.3.d: "[FROM.GetNameDef] отменил свое предыдущее признание нашего суверенитета. Какова бы ни была причина, результат тот же."
 recognition.3.a: "Борьба продолжается."
 recognition.4.t: "[FROM.GetName] Отменяет признание отрыва"
 recognition.4.d: "[FROM.GetNameDef] отменила свое предыдущее признание отколовшегося государства на нашей территории. Теперь на одну столицу меньше, что подтверждает их претензии на суверенитет."
 recognition.4.a: "Небольшая победа для нашей позиции."
 recognition.7.t: "[FROM.GetName] присоединяется к Организации Объединенных Наций"
 recognition.7.d: "После продолжительной кампании за международное признание [FROM.GetNameDef] был принят в Генеральную Ассамблею Организации Объединенных Наций в качестве государства-члена."
 recognition.7.a: "Добро пожаловать на Генеральную Ассамблею."
 recognition.8.t: "[FROM.GetName] оказывает на нас давление, заставляя признать [pressured_to_recognize]"
 recognition.8.d: "[FROM.GetNameDef] использует свое влияние на нас, чтобы заставить нас признать [pressured_to_recognize]. Отказ партнеру, обладающему таким влиянием, влечет за собой реальные издержки."
 recognition.8.a: "Мы выражаем признательность."
 recognition.8.b: "Мы отказываемся признавать этот режим."
 internal_faction.1.t: "Военные требуют увеличения бюджета"
 internal_faction.1.d: "Ссылаясь на новые угрозы нашей национальной безопасности, военные потребовали увеличения оборонного бюджета [ROOT.GetAdjective]. Удовлетворение этой просьбы усилит давление на наш бюджет, но отказ в нем снизит мнение военных о нашем правительстве."
 internal_faction.1.a: "Мы должны дать им денег."
 internal_faction.1.b: "Мы не можем позволить себе эти расходы!"
 internal_faction.2.t: "Некоторые кадры коммунистической партии занимаются коррумпированной деятельностью!"
 internal_faction.2.d: "Наши спецслужбы недавно обнаружили, что некоторые чиновники коммунистической партии берут взятки и занимаются кумовством. С одной стороны, мы не должны допустить, чтобы такая деятельность оставалась безнаказанной, если мы хотим оставаться легитимными в глазах народа, но с другой стороны, такой шаг определенно оттолкнет многих важных союзников в Коммунистической партии."
 internal_faction.2.a: "Мы должны закрыть на это глаза."
 internal_faction.2.b: "Мы должны сделать из них пример!"
 internal_faction.3.t: "Промышленные конгломераты требуют налоговых льгот"
 internal_faction.3.d: "Руководители некоторых из крупнейших промышленных конгломератов [ROOT.GetName] в частном порядке лоббируют наше правительство, чтобы предоставить им больше налоговых льгот. Предоставление этих налоговых льгот улучшит мнение промышленных конгломератов о нашем правительстве, но снизит наши общенациональные налоговые поступления."
 internal_faction.3.a: "Мы должны предоставить налоговые льготы."
 internal_faction.3.b: "Мы не можем позволить себе пойти на такую уступку."
 isis.1.t: "Победа над Исламским государством"
 isis.1.d: "Теперь, когда Исламское государство побеждено, нашу страну больше не будут преследовать экстремистская пропаганда, производимая Исламским государством. Теперь мы можем сосредоточиться на распространении наших идей в нашей стране и никогда больше не позволить экстремистам захватить власть."
 isis.1.a: "Отлично"
 isis.2.t: "Проникнуть в Тахрир аш-Шам?"
 isis.2.d: "О халиф всех мусульман, [Root.GetLeader]. Мы должны нанести удар в самое сердце нашему подлому врагу, Тахрир аль-Шам, который отказывается признать ваше справедливое и законное правление. Хотя они сошли с пути истинного ислама и славного джихада, в их рядах есть много хороших бойцов-джихадистов. Иншаллах, мы должны проникнуть в них и попытаться сделать так, чтобы как можно больше людей перешло на сторону нашего славного Халифата!"
 isis.2.a: "Давайте попробуем отвлечь настоящих бойцов от этой фальшивой одежды джихадистов!"
 isis.2.b: "Нет, мы не можем позволить себе возможные распри."
 isis.2.a_tt: "§HИнфильтрация не прошла§! (нет эффекта)"
 isis.3.t: "Истребители дезертируют к ИГ"
 isis.3.d: "[Root.GetLeader] Так называемое «Исламское» государство проникло к нам и сумело склонить некоторых из наших лучших бойцов к присоединению к их нелепому подобию халифата. Мы не должны оставлять это без ответа, мы должны дать отпор и победить этих хариджитов, которые направо и налево объявляют такфир, используя Священный Коран как туалетную бумагу."
 isis.3.a: "Мы, праведные джихадисты, зарежем их, как собак!"
 isis.3.b: "Нет, мы не можем позволить себе другой фронт в этой войне."
 isis.4.t: "Дефект отрядов Тахрир аш-Шам"
 isis.4.d: "О халиф, многие справедливые и храбрые братья муваххиды дезертировали из злого Фронта Тахрир аш-Шам и вместо этого присоединились к нашему делу!"
 isis.4.a: "Такбир! Исламское государство Такбир!"
 isis.4.a_tt: "Добавит 2 §Hбригады Джабат ан-Нусра§! в §HРакке§!"
 isis.5.t: "Признак слабости от Тахрир аль-Шама"
 isis.5.d: "О халиф, отвратительный Тахрир аль-Шам-фронт слабее, чем мы думали, ничего не делая против нашего проникновения в них и недавних дезертирства. Военный совет Шуры рекомендует нам зарезать их гниющие останки, как собак, и забрать их территорию, добавив ее в наш славный Халиф!"
 isis.5.a: "Научите этих фальшивых джихадистов, кто настоящий преемник шейха Усамы!"
 isis.5.b: "Их время придет, но пока мы должны подождать."
 isis.6.t: "Остатки Тахрир аль-Шама присоединяются к нашему халифату."
 isis.6.d: "О, халиф, сладкий сок победы у нас на губах. Неся поражение, останки Тахрир аль-Шама обещали верность вам, [Root.GetLeader], и нашему постоянно растущему Халифату."
 isis.6.a: "Мы приветствуем наших братьев в истинном Халифате!"
 isisNews.1.t: "Тахрир аль-Шам присоединяется к ИГИЛ."
 isisNews.1.d: "В условиях растущего давления на сирийских исламистов Тахрир-эш-Шама их оставшиеся силы в последний момент заявили о своей преданности ИГИЛ в попытке навязать Сирии свою фундаменталистскую идеологию."
 isisNews.1.a: "Боже, помоги нам всем!"
 isis.7.t: "Скрыто"
 isis.7.d: "Скрыто"
 isis.7.a: "Скрыто"
 isis.1301.t: "Абу Фатима погиб во время авиаудара Коалиции"
 isis.1301.d: "Плохие новости, халиф! Ваш хороший друг и коллега иракский депутат Абу Фатима аль-Джахейши был храбро замучен в результате трусливого авиаудара американцев.\n\nОн убил многих отступников.\n\nДа примет Аллах его мученичество."
 isis.1301.a: "Мы отомстим за него, когда завоюем Вашингтон!"
 isisNews.1301.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1301.d: "Иракский террорист и высокопоставленный командир ИГИЛ Абу Фатима аль-Джахейши был убит сегодня в результате авиаудара коалиции США. Абу Фатима входил в ближайшее окружение аль-Багдади и занимал пост заместителя лидера контролируемых ИГИЛ частей Ирака."
 isisNews.1301.a: "Минус один!"
 isis.1302.t: "Аль-Сулами погиб в результате авиаудара Коалиции"
 isis.1302.d: "Плохие новости, халиф! Главный священнослужитель Абу Суфьян аль-Сулами погиб в результате трусливого авиаудара американцев. Он пришел к нам из страны Бахрейн и дал нам ключевую религиозную поддержку для нашего Халифата.\n\nО халиф, он вдохновил всех нас своей прекрасной биографией о тебе.\n\nДа примет Аллах его мученичество."
 isisNews.1302.t: "Глава ИГИЛ Убит в результате авиаудара Коалиции"
 isisNews.1302.d: "Бахрейнский террорист и высокопоставленный религиозный лидер ИГИЛ Турки аль-Бинали, известный под псевдонимом \"Абу Суфьян аль-Сулами\", был убит сегодня в результате авиаудара коалиции США. аль-Бинали не был важен для военных усилий ИГИЛ, но был ключевым в обеспечении религиозной поддержки группы и написал первую биографию Абу Бакра аль-Багдади."
 isis.1303.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1303.d: "Плохие новости, халиф! Эмир наших албанских и косовских бойцов и старший командир Лавдрим Мухашери погиб в результате трусливого авиаудара американских собак.\n\n                                              Он убил многих отступников.\n\n                                       Да примет Аллах его мученичество."
 isisNews.1303.t: "Командир организации ИГИЛ погиб в результате авиаудара коалиции"
 isisNews.1303.d: "Косовско-албанский террорист и высокопоставленный командир организации ИГИЛ Лавдрим Мухашери был убит сегодня в результате авиаудара американской коалиции. Мухакшери воевал в Афганистане на стороне НАТО, но радикализовался примерно в 2012 году и отправился в Сирию. В 2013 году он присоединился к ИГИЛ и быстро стал «эмиром» албанских и косовских боевиков в Сирии и Ираке. Он был жестоким головорезом, который лично обезглавливал заключенных."
 isis.1304.t: "Командир погиб в результате авиаудара коалиции"
 isis.1304.d: "О халиф, ужасные новости! Наш элитный военачальник Гулмурод Халимов погиб в результате подлого авиаудара американских собак. Прежде чем он нашел свой путь к нам из земель таджиков, он был высокопоставленным офицером спецназа. Его военным знаниям будет очень не хватать.\n\n                                               Он убил многих отступников.\n\n                                       Да примет Аллах его мученичество."
 isisNews.1304.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1304.d: "Таджикский террорист и высокопоставленный командир ИГИЛ Гульмурод Халимов был убит сегодня в результате авиаудара коалиции США. Халимов был опытным и высокопоставленным офицером спецназа в Вооруженных Силах Таджикистана до того, как перешел на сторону ИГИЛ."
 isis.1305.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1305.d: "О халиф, ужасные новости! Наш руководитель операций по мученичеству и главный тренер иностранных моджахедов Абдулла Ахмед аль-Машадани был убит в результате авиаудара американских собак.\n\n                                             Он убил многих отступников.\n\n                                        Да примет Аллах его мученичество."
 isisNews.1305.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1305.d: "Иракский террорист и высокопоставленный командир ИГИЛ Абдулла Ахмед аль-Машадани был убит сегодня в результате авиаудара коалиции США. аль-Машадани сыграл ключевую роль в военных действиях ИГИЛ, возглавляя операции по подрыву террористов-смертников и обучая иностранных джихадистов."
 isis.1306.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1306.d: "О халиф, плохие новости! Наш губернатор Центрального района Евфрата Ахмед Халал аль-Джухайши был убит в результате авиаудара американских собак.\n\n                                             Он убил многих отступников.\n\n                                       Да примет Аллах его мученичество."
 isisNews.1306.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1306.d: "Иракский террорист и высокопоставленный член ИГИЛ Ахмед Халал аль-Джухайши был убит сегодня в результате авиаудара коалиции США. аль-Джухайши был не выдающимся военачальником, а администратором и губернатором ключевого для Исламского государства региона Центрального Евфрата."
 isis.1307.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1307.d: "О халиф, плохие новости! Ваш хороший друг и начальник отдела снабжения и снабжения Фарес Рейф аль-Наима погиб в результате авиаудара американских собак. Он был давним храбрым и преданным моджахедом, сражавшимся против неверных и отступников с 2003 года.\n\n                                    Он принес много славы Халифату.\n\n                                  Да примет Аллах его мученичество."
 isisNews.1307.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1307.d: "Иракский террорист и старший командир ИГИЛ Фарес Рейф аль-Наима был убит сегодня в результате авиаудара коалиции США. аль-Наима воевал против американских войск в войне в Ираке, и после того, как он был задержан американскими войсками в лагере Букка вместе с аль-Багдади, он стал известным начальником материально-технического обеспечения и снабжения Исламского государства."
 isis.1308.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1308.d: "О, Халиф, плохие новости! Абду Ахмад аль-Алавани был убит в воздушном ударе американских неверных. Он был офицером в иракской армии Саддама Хусейна и оказал нам большую помощь своими знаниями, когда присоединился к суннитскому восстанию и нашему любимому Исламскому Государству.\n\n                                            Он убил много отпавших.\n\n                                      Пусть Аллах примет его мученичество."
 isisNews.1308.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1308.d: "Иракский террорист и старший командующий ИГИЛ, Абду Ахмад аль-Алавани, был убит сегодня в воздушном ударе коалиции США. Аль-Алавани был офицером в иракской армии Саддама Хусейна, прежде чем присоединился к суннитскому восстанию против сил США. Он быстро поднялся по карьерной лестнице в Исламском Государстве Ирака, достигнув должности старшего командующего."
 isis.1309.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1309.d: "О халиф, плохие новости! Абу Мухаммад аль-Шимали был убит в результате авиаудара американских неверных. Прибыв к нам из аравийских земель, он помогал нам контрабандой перевозить нефть и закупать оружие. Он завербовал много храбрых мухаджиров в наш Халифат, и его всегда будут вечно восхвалять за его ключевую роль в организации парижских терактов 2015 года.\n\n                                               Он убил многих отступников.\n\n                                         Да примет Аллах его мученичество."
 isisNews.1309.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1309.d: "Саудовский террорист и старший командир ИГИЛ Абу Мухаммад аль-Шимали был убит сегодня в результате авиаудара коалиции США. аль-Шимали был ключевым вербовщиком и контрабандистом для Исламского государства. Кроме того, по данным разведки, он сыграл важную роль в содействии парижским терактам 2015 года."
 isis.1310.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1310.d: "О, Халиф, беда! Наш министр войны и второй по величине лидер, Айяд аль-Джумаили, был смело убит в подлом воздушном ударе американскими неверными псами. Согражданин, он был старшим офицером разведки при Саддаме Хусейне и применял свою мудрость для того, чтобы защитить Халифат от внутренних врагов, будучи главой разведки и внутренней безопасности.\n\n                                            Он убил много предателей.\n\n                                     Пусть Аллах примет его мученичество."
 isisNews.1310.t: "Заместитель командующего ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1310.d: "Иракский террорист и второй командир \"Исламского государства\" Айяд аль-Джумайли был убит сегодня в результате авиаудара коалиции США. аль-Джумайли был старшим офицером разведки при Саддаме Хусейне, который присоединился к суннитскому повстанческому движению после оккупации США в 2003 году. Он стал главой разведки и внутренней безопасности в Исламском государстве, а затем был назначен заместителем командующего и военным министром."
 isis.1311.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1311.d: "О халиф, плохие новости! Старший командир Хайри Абед Махмуд аль-Таи был убит в результате авиаудара американских неверных. Брат иракца, он был членом нашей военной шуры и руководил операциями с самодельными взрывными устройствами (СВУ), справедливо посеяв страх и хаос в сердцах наших врагов.\n\n                                            Он убил многих отступников.\n\n                                      Да примет Аллах его мученичество."
 isisNews.1311.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1311.d: "Иракский террорист и старший командир ИГИЛ Хайри Абед Махмуд аль-Таи был убит сегодня в результате авиаудара коалиции США. Аль-Таи входил в состав военного совета ИГИЛ и руководил операциями с самодельными взрывными устройствами (СВУ), сеявшими хаос в городах, подвергшихся нападению ИГИЛ."
 isis.1312.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1312.d: "О халиф, плохие новости! Ваш друг, советник и старший командир, Абдул Вахид Хутнайер Ахмад, погиб в результате авиаудара американских неверных. Брат иракца, он отвечал за внутреннюю безопасность.\n\n                                       Он разгромил многих кафиров и отступников.\n\n                                                Да примет Аллах его мученичество."
 isisNews.1312.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1312.d: "Иракский террорист и старший командир ИГИЛ Абдул Вахид Хутнайер Ахмад был убит сегодня в результате авиаудара коалиции США. Хутнайер Ахмад был ключевым советником аль-Багдади и отвечал за внутреннюю безопасность."
 isis.1313.t: "Командир погиб в результате авиаудара Коалиции"
 isis.1313.d: "О халиф, ужасные новости! Наш старший командир, Абу Джихад Шишани, был убит в результате авиаудара американских неверных собак. Он пришел к нам из земель чеченцев и храбро сражался во славу Аллаха до конца.\n\n                                             Он убил многих отступников.\n\n                                       Да примет Аллах его мученичество."
 isisNews.1313.t: "Командир ИГИЛ убит в результате авиаудара Коалиции"
 isisNews.1313.d: "Чеченский террорист и старший командир ИГИЛ Абу Джихад Шишани был убит сегодня в результате авиаудара коалиции США. Шишани, гражданин России, был заместителем командира террористической группировки \"Имарат Кавказ\" под руководством Умара Шишани. После того как Умар отправился в Сирию и присоединился к ИГИЛ, Абу Джихад попытался захватить Кавказский эмират, чтобы присягнуть на верность ИГИЛ, но в итоге отправился в Сирию, чтобы сражаться за ИГИЛ в качестве старшего командира."
 isis.11301.t: "Абу Фатима погиб в результате российского авиаудара"
 isis.11301.d: "Плохие новости, халиф! Ваш хороший друг и коллега иракский депутат Абу Фатима аль-Джахейши был храбро замучен в результате трусливого авиаудара русских.\n\nОн убил многих отступников.\n\nДа примет Аллах его мученичество."
 isis.11301.a: "Мы отомстим за него, когда завоюем Москву!"
 isisNews.11301.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11301.d: "Иракский террорист и высокопоставленный командир ИГИЛ Абу Фатима аль-Джахейши был убит сегодня в результате российского авиаудара. Абу Фатима входил в ближайшее окружение аль-Багдади и занимал пост заместителя лидера контролируемых ИГИЛ частей Ирака."
 isisNews.11301.a: "Замечательно!"
 isis.11302.t: "Аль-Сулами погиб в результате российского авиаудара"
 isis.11302.d: "Плохие новости, халиф! Главный священнослужитель Абу Суфьян аль-Сулами был убит в результате трусливого авиаудара русских. Он пришел к нам из страны Бахрейн и дал нам ключевую религиозную поддержку для нашего Халифата.\n\n                    О халиф, он вдохновил всех нас своей прекрасной биографией о тебе.\n\n                                             Да примет Аллах его мученичество."
 isisNews.11302.t: "Глава ИГИЛ убит в результате российского авиаудара"
 isisNews.11302.d: "Бахрейнский террорист и высокопоставленный религиозный лидер ИГИЛ Турки аль-Бинали, известный под псевдонимом \"Абу Суфьян аль-Сулами\", был убит сегодня в результате российского авиаудара. аль-Бинали не был важен для военных усилий ИГИЛ, но был ключевым в обеспечении религиозной поддержки группы и написал первую биографию Абу Бакра аль-Багдади."
 isis.11303.t: "Командир погиб в результате российского авиаудара"
 isis.11303.d: "Плохие новости, халиф! Эмир наших албанских и косовских бойцов и старший командир Лавдрим Мухашери погиб в результате трусливого авиаудара русских собак.\n\nОн убил многих отступников.\n\nДа примет Аллах его мученичество."
 isisNews.11303.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11303.d: "Косовско-албанский террорист и старший командир ИГИЛ Лавдрим Мухашери был убит сегодня в результате российского авиаудара. Мухашери воевал в Афганистане на стороне НАТО, но около 2012 года радикализировался и отправился в Сирию. В 2013 году он присоединился к ИГИЛ и быстро стал \"эмиром\" албанских и косовских боевиков в Сирии и Ираке. Он был жестоким головорезом, который лично обезглавливал заключенных."
 isis.11304.t: "Командир погиб в результате российского авиаудара"
 isis.11304.d: "О халиф, ужасные новости! Наш элитный военачальник Гульмурод Халимов погиб в результате трусливого авиаудара русских собак. До того, как он нашел свой путь к нам из земель таджиков, он был высокопоставленным офицером спецназа. Его военных знаний будет очень не хватать.\n\n                                                 Он убил многих отступников.\n\n                                           Да примет Аллах его мученичество."
 isisNews.11304.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11304.d: "Таджикский террорист и старший командир ИГИЛ Гульмурод Халимов был убит сегодня в результате российского авиаудара. Халимов был опытным и высокопоставленным офицером спецназа в Вооруженных Силах Таджикистана до того, как перешел на сторону ИГИЛ."
 isis.11305.t: "Командир погиб в результате российского авиаудара"
 isis.11305.d: "О халиф, ужасные новости! Наш руководитель мученических операций и главный тренер иностранных моджахедов Абдулла Ахмед аль-Машадани был убит в результате авиаудара российских собак.\n\n                                                Он убил многих отступников.\n\n                                          Да примет Аллах его мученичество."
 isisNews.11305.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11305.d: "Иракский террорист и высокопоставленный командир ИГИЛ Абдулла Ахмед аль-Машадани был убит сегодня в результате российского авиаудара. аль-Машадани сыграл ключевую роль в военных действиях ИГИЛ, возглавляя операции по подрыву террористов-смертников и обучая иностранных джихадистов."
 isis.11306.t: "Командир погиб при русском авиаударе"
 isis.11306.d: "О халиф, плохие новости! Наш губернатор Центрального района Евфрата Ахмед Халал аль-Джухайши был убит в результате авиаудара русских собак.\n\n                                                 Он убил многих отступников.\n\n                                          Да примет Аллах его мученичество."
 isisNews.11306.t: "Командир ИГИЛ убит при русском авиаударе"
 isisNews.11306.d: "Иракский террорист и высокопоставленный член ИГИЛ Ахмед Халал аль-Джухайши был убит сегодня в результате российского авиаудара. аль-Джухайши был не выдающимся военачальником, а администратором и губернатором ключевого для Исламского государства региона Центрального Евфрата."
 isis.11307.t: "Командир погиб при русском авиаударе"
 isis.11307.d: "О халиф, плохие новости! Ваш хороший друг и начальник отдела снабжения и снабжения Фарес Рейф аль-Наима погиб в результате авиаудара русских собак. Он был давним храбрым и преданным моджахедом, сражавшимся против неверных и отступников с 2003 года.\n\n                              Он принес много славы Халифату.\n\n                             Да примет Аллах его мученичество."
 isisNews.11307.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11307.d: "Иракский террорист и старший командир ИГИЛ Фарес Рейф аль-Наима был убит сегодня в результате российского авиаудара. аль-Наима воевал против американских войск в войне в Ираке, и после того, как он был задержан американскими войсками в лагере Букка вместе с аль-Багдади, он стал известным начальником материально-технического обеспечения и снабжения Исламского государства."
 isis.11308.t: "Командир погиб в результате российского авиаудара"
 isis.11308.d: "О халиф, плохие новости! Абу Ахмад аль-Альвани был убит в результате авиаудара российских неверных. Он был офицером иракской армии Саддама Хусейна и очень помог нам своей проницательностью, когда присоединился к суннитскому мятежу и нашему любимому Исламскому государству.\n\n                                                 Он убил многих отступников.\n\n                                           Да примет Аллах его мученичество."
 isisNews.11308.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11308.d: "Иракский террорист и старший командир ИГИЛ Абу Ахмад аль-Альвани был убит сегодня в результате российского авиаудара. аль-Альвани был офицером иракской армии Саддама Хусейна, прежде чем присоединиться к суннитскому мятежу против американских войск. Он быстро поднялся по служебной лестнице в Исламском государстве Ирака до должности старшего командира."
 isis.11309.t: "Командир погиб в результате российского авиаудара"
 isis.11309.d: "О халиф, плохие новости! Абу Мухаммад аль-Шимали был убит в результате авиаудара русских неверных. Прибыв к нам из аравийских земель, он помогал нам контрабандой перевозить нефть и закупать оружие. Он завербовал много храбрых мухаджиров в наш Халифат, и его всегда будут вечно восхвалять за его ключевую роль в организации парижских терактов 2015 года.\n\n                                                 Он убил многих отступников.\n\n                                          Да примет Аллах его мученичество."
 isisNews.11309.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11309.d: "Саудовский террорист и старший командир ИГИЛ Абу Мухаммад аль-Шимали был убит сегодня в результате российского авиаудара. аль-Шимали был ключевым вербовщиком и контрабандистом для Исламского государства. Кроме того, по данным разведки, он сыграл важную роль в содействии парижским терактам 2015 года."
 isis.11310.t: "Командир погиб в результате российского авиаудара"
 isis.11310.d: "О халиф, катастрофа! Наш военный министр и заместитель командующего, Айяд аль-Джумайли, мужественно погиб в результате подлого авиаудара русских псов-неверных. Иракец по национальности, он был старшим офицером разведки при Саддаме Хусейне и, возглавляя нашу разведку и службу внутренней безопасности, применял свои знания о том, как обезопасить Халифат от внутренних врагов.\n\n                                             Он убил многих предателей.\n\n                                      Да примет Аллах его мученическую смерть."
 isisNews.11310.t: "Заместитель командующего ИГИЛ убит в результате российского авиаудара"
 isisNews.11310.d: "Иракский террорист и второй командир \"Исламского государства\" Айяд аль-Джумайли был убит сегодня в результате российского авиаудара. Аль-Джумайли был старшим офицером разведки при Саддаме Хусейне, который присоединился к суннитскому повстанческому движению после оккупации США в 2003 году. Он стал главой разведки и внутренней безопасности в Исламском государстве, а затем был назначен заместителем командующего и военным министром."
 isis.11311.t: "Командир погиб в результате российского авиаудара"
 isis.11311.d: "О халиф, плохие новости! Старший командир Хайри Абед Махмуд аль-Таи был убит в результате авиаудара неверных. Он был членом нашей военной шуры и руководил операциями с самодельными взрывными устройствами (СВУ), справедливо сеяв страх и хаос в сердцах наших врагов.\n\n                                               Он убил много кафиров и муртадов.\n\n                                               Да примет Аллах его мученичество."
 isisNews.11311.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11311.d: "Иракский террорист и старший командир ИГИЛ Хайри Абед Махмуд аль-Таи был убит сегодня в результате российского авиаудара. Аль-Таи входил в состав военного совета ИГИЛ и руководил операциями с самодельными взрывными устройствами (СВУ), сеявшими хаос в городах, которые атаковало Исламское государство."
 isis.11312.t: "Командир погиб в результате российского авиаудара"
 isis.11312.d: "О халиф, плохие новости! Ваш друг, советник и старший командир, Абдул Вахид Хутнайер Ахмад, погиб в результате авиаудара неверных. Он отвечал за внутреннюю безопасность.\n\n                                       Он разгромил многих предателей и отступников.\n\n                                                   Да примет Аллах его мученичество."
 isisNews.11312.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11312.d: "Иракский террорист и старший командир ИГИЛ Абдул Вахид Хутнайер Ахмад был убит сегодня в результате российского авиаудара. Хутнайер Ахмад был ключевым советником аль-Багдади и отвечал за внутреннюю безопасность."
 isis.11313.t: "Командир погиб в результате российского авиаудара"
 isis.11313.d: "О халиф, ужасные новости! Наш старший командир, Абу Джихад Шишани, был убит в результате авиаудара русских неверных собак. Он пришел к нам из земель чеченцев и храбро сражался во славу Аллаха до самого конца.\n\n                                                Он убил много кафиров и муртадов.\n\n                                                 Да примет Аллах его мученичество."
 isisNews.11313.t: "Командир ИГИЛ убит в результате российского авиаудара"
 isisNews.11313.d: "Чеченский террорист и старший командир ИГИЛ Абу Джихад Шишани был убит сегодня в результате российского авиаудара. Шишани, гражданин России, был заместителем командира террористической группировки \"Имарат Кавказ\" под руководством Умара Шишани. После того как Умар отправился в Сирию и присоединился к ИГИЛ, Абу Джихад попытался захватить Кавказский эмират, чтобы присягнуть на верность ИГИЛ, но в итоге отправился в Сирию, чтобы сражаться за ИГИЛ в качестве старшего командира."
 brotherhood.6.t: "Протестующие из Братьев-мусульман требуют выборов"
 brotherhood.6.d: "[Root.GetAdjective] Братья-мусульмане занимают центральные площади в городах по всей стране, выкрикивая лозунги и требуя свободных выборов. Они хорошо организованы, поэтому у нас есть две реальные альтернативы: расчистить площади силой, выследить и арестовать лидеров и организаторов - или удовлетворить их требования и разрешить выборы."
 brotherhood.6.a: "Очистите этот уличный сброд и выследите их лидеров"
 brotherhood.6.b: "Выполните их требования - проведите выборы"
 brotherhood.7.t: "Жестокость репрессий оборачивается неприятными последствиями"
 brotherhood.7.d: "Вместо того, чтобы стратегически преследовать лидеров и подавать им твердые примеры, было совершено множество внесудебных казней сторонников «Братьев-мусульман» низшего уровня — даже их семей. Такая несправедливость усиливает требования смены правительства среди населения в целом. Правительственные советники отмечают, что увеличение финансирования внутренней безопасности снизит вероятность повторения этого."
 brotherhood.7.a: "Выговор полиции и армии"
 brotherhood.8.t: "Террористы \"Братьев-мусульман\" совершают налет на тюрьму"
 brotherhood.8.d: "Вооруженные члены террористической группировки \"Братья-мусульмане\" предприняли успешную атаку на правительственную тюрьму, в которой содержались как преступники, так и террористы и политические противники. Охранники были убиты, а пленники освобождены. Это серьезная неудача в наших усилиях по уничтожению злых братьев мусульман."
 brotherhood.8.a: "Чертовы террористы"
 brotherhood.9.t: "Террористическая ячейка \"Братьев-мусульман\" ликвидирована"
 brotherhood.9.d: "[Root.GetAdjective] силам безопасности удалось проникнуть в одну из главных ячеек \"Братьев - мусульман\" и успешно арестовать главарей группировки и их сообщников. В помещении было обнаружено оружие и планы убийства правительственных чиновников.\n \nСуд назначен на завтра, зрелищная казнь состоится вскоре после этого."
 brotherhood.9.a: "[Root.GetLeader] снова одержал победу!"
 brotherhood.10.t: "Мятеж Братьев-мусульман оборачивается Гражданской войной"
 brotherhood.10.d: "Наше жестокое подавление \"Братьев - мусульман\" провалилось-их поддержка только выросла. Им даже удалось заручиться серьезной поддержкой среди солдат, и несколько предательских генералов перешли на их сторону. Это уже не дело наших сил безопасности - это все война."
 brotherhood.10.a: "Разгромим их"
 brotherhood.10.b: "На самом деле, давайте действовать как они"
 jihadi.5.t: "Салафитское джихадистское восстание перерастает в гражданскую войну"
 jihadi.5.d: "Наша попытка подавить салафитских джихадистов провалилась, и им удалось создать достаточно хаоса и незащищенности до такой степени, что многие [ROOT.GetAdjective] чувствуют себя в большей безопасности под управлением джихадистов, чем нашим правительством. Им даже удалось радикализировать солдат, и несколько генералов-предателей перешли на их сторону. Это уже не вопрос наших контртеррористических сил - это война."
 jihadi.5.a: "Мы их победим!"
 jihadi.5.b: "Время прыгать с корабля..."
 Yemen.4.t: "Война в Йемене закончилась"
 Yemen.4.d: "Когда страна находится в руинах, Гражданская война в Йемене наконец завершается, даровав победу правительству во главе с Хади, поддержанному Саудовской коалицией. В последние дни конфликта коалиционным силам удалось захватить и уничтожить склады боеприпасов хуситов и «Аль-Каиды», в том числе печально известные ракеты \"Буркан-2-Н\" и \"Скад\". Хотя многие, возможно, все еще сохраняют верность хуситам, они были разоружены, и в ближайшие дни оставшиеся радикалы-зейдиты будут искоренены. Демократия восторжествовала в регионе с помощью Саудовской коалиции и ее кампании, восстанавливающей надежду, и страна Йемен находится на пути к восстановлению."
 Yemen.4.d2: "После того как правительство во главе с Хади превратилось в пыль, дело хуситов оказалось на переднем крае будущего руководства Йемена. Как и было их целью, хуситы сумели изгнать салафизм и преданность западным идеологиям из региона, а также тех, кто боролся за него, поскольку Аль-Каида и коалиционные силы пали. Теперь, взяв на себя полную ответственность за то, чтобы вести Йемен в будущее, правительство хуситов начало процесс трансформации из своего междуреченского государства, и теперь они встали на путь восстановления страны. Саудовская коалиция вышла из региона и вынесла из операции \"Восстановление надежды\" лишь полный провал."
 Yemen.4.d3: "После многих лет борьбы между йеменским правительством и повстанцами-хуситами из этого конфликта вышел самый маловероятный из всех победителей. Остатки «Аль-Каиды» в Йемене оказались архитектором нового халифата в регионе и претерпели трансформацию, которая поставит под угрозу всех неверных в регионе. Саудовская коалиция и операция \"Восстановление надежды\" потерпели полный крах, и ее некомпетентность не смогла предсказать собственное поражение от врага, который никогда не был таким уж серьезным для целой державы. Джихадисты одержали верх, и они ясно дали понять, что это только начало, а остальной мир скоро поймет, на что способен этот новый халифат."
 Yemen.4.a: "Победа наконец-то наша..."
 Yemen.4.b: "Но какой ценой?"
 Yemen.4.c: "Могло быть и хуже..."
 Yemen.4.e: "Интересно"
 Yemen.4.f: "Интересно"
 Yemen.6.t: "Обстрел ракетой Эр-Рияда?"
 Yemen.6.d: "Пуск ракеты по столице Саудовской Аравии покажет саудовцам, что мы сила, с которой нужно считаться."
 Yemen.6.a: "Сделаем это!"
 Yemen.6.b: "Слишком опасно"
 Yemen.7.t: "Хуситы выпустили баллистическую ракету по Эр-Рияду"
 Yemen.7.d: "Возглавляемая Саудовской Аравией коалиция, сражающаяся с йеменскими повстанцами-хуситами, заявила, что перехватила ракету, выпущенную из соседней страны в сторону королевской столицы Эр-Рияда. Повстанцы-хуситы заявили во вторник, что они запустили баллистическую ракету, нацеленную на королевский дворец аль-Ямама, чтобы отметить 1000 дней с тех пор, как коалиция начала свою бомбардировочную кампанию в Йемене."
 Yemen.7.a: "Во дела..."
 Saleh.1.t: "Борьба за власть хуситов"
 Saleh.1.d: "Невероятный союз между повстанцами-хуситами и Всеобщим народным конгрессом Али Абдаллы Салеха был на шаткой почве с того дня, как он был задуман. С помощью членов нашей коалиции, действующих в Йемене, мы обнаружили, что бывший президент Салех испытывает растущее недовольство руководством хуситов, и это справедливо. Хуситы выступают против фактического контроля со стороны иностранных держав и стремятся восстановить Йемен как свое собственное, полностью независимое образование, свободное от салафизма и западных идеалов. Салех, с другой стороны, хочет восстановить Йемен как свободную, единую и демократическую страну, стремящуюся в определенной степени участвовать в иностранных делах, хотя у него есть свои причины негодовать на ряд западных стран. Эти отношения обязательно перерастут в будущий конфликт между двумя сторонами, и это может быть то, что нужно коалиции."
 Saleh.1.a: "У нас нет на это времени..."
 Saleh.1.b: "Позвоните президенту Салеху..."
 Saleh.2.t: "Салех предлагает коалиционный диалог"
 Saleh.2.d: "Али Абдулла Салех, глава Всеобщего народного конгресса, поддерживающего дело хуситов, предлагает, чтобы GPC и руководство хуситов начали переговоры с возглавляемой Саудовской Аравией коалицией, которая в настоящее время действует вместе с Йеменом президента Хади. Хотя мы очень узко считаем его союзником, похоже, он изменил свое мнение, и не в хорошем смысле. Теперь он настоятельно предлагает руководству хуситов принять решение о том, следует ли продолжать эту жестокую гражданскую войну. Вероятность того, что мы выйдем из этих переговоров с какой-то выгодой, очень мала, и все это вполне может быть уловкой, чтобы отстранить нас от власти."
 Saleh.2.a: "Абсолютное нет!"
 Saleh.2.b: "Это не повредит..."
 Saleh.3.t: "Лидеры хуситов готовы говорить"
 Saleh.3.d: "После давления со стороны бывшего президента Йемена Али Абдаллы Салеха лидеры повстанцев-хуситов в Сане готовы попытаться договориться с Хади и нашей коалицией."
 Saleh.3.a: "Ну что ж, тогда соберите коалицию."
 Saleh.3.b: "Это, вероятно, не очень хорошая идея..."
 Saleh.5.t: "Салех вступает на опасный путь"
 Saleh.5.d: "После многих лет нерешительного и нестабильного союза между хуситами и республиканскими силами бывший президент Йемена Али Абдалла Салех выступил с речью, направленной против возглавляемой Саудовской Аравией коалиции, в которой он подчеркнул так называемую глупость дела хуситов. Салех заявил, что если коалиция снимет блокаду и откроет аэропорты для облегчения гуманитарных усилий, он и его республиканские силы готовы присягнуть на верность Саудовской Аравии, объявив себя врагом нашего альянса. Салех проявил полную приверженность в своей последней речи и публично объявил о новой главе в истории Йемена посреди этого гуманитарного кризиса как единого, свободного и демократического Йемена. Слова Салеха - я буду сражаться с врагами человечества и врагами нашей родины, которые изо всех сил пытаются стереть ее идентичность, разрушить ее достижения и унизить йеменцев!"
 Saleh.5.a: "Найдите этого предателя..."
 Saleh.5.b: "У него не хватит духу сделать это..."
 Saleh.6.t: "Салех в бегах"
 Saleh.6.d: "После серии предательских речей Али Абдулла Салех ясно дал понять, что больше не желает работать вместе с хуситами. Абдул-Малик Аль-Хуси знал о приближающемся предательстве Салеха и сделал ему несколько предупреждений, все из которых не были услышаны. Абдул-Малик Аль-Хуси объявил это предательским актом, что впоследствии привело к тому, что дом Салеха в Сане был разрушен минометным огнем хуситов, и теперь он бежит из страны. Боевики хуситов идут по его следу, и им удалось загнать его в потенциально смертельную ловушку к югу от Саны, где все еще бушуют бои между хуситами и коалицией. Несколько бойцов, занимающих передовую, готовы отступить и вмешаться по вашему приказу."
 Saleh.6.a: "Нажмите на курок..."
 Saleh.6.b: "Отпустите его..."
 Saleh.7.t: "Высший политический совет"
 Saleh.7.d: "С победой в войне пришло время восстановить нашу страну, за которую мы так отчаянно боролись, чтобы освободиться от ее ошибочного руководства. Наши соратники из Верховного революционного комитета, временного правительства, которое мы создали посреди гражданской войны, напоминают нам об их вкладе в военные усилия и призывают нас выполнить наш первоначальный план по разделению нашего президентского совета поровну между обеими партиями. Давайте помнить, что некоторые из этих людей были среди тех, против кого мы начали эту борьбу, и тех, с кем мы не смогли сохранить стабильный союз. Мы не можем предвидеть будущее, но предоставление им места в нашем парламенте вполне может вернуть нас к неопределенности, которую мы стремились уничтожить."
 Saleh.7.a: "Мы боролись, чтобы достичь этой позиции, и будем бороться, чтобы защитить ее"
 Saleh.7.b: "Ерунда, мы вместе восстановим страну"
 Saleh.8.t: "Руководство хуситов отвергает предложение Салеха"
 Saleh.8.d: "После нашего разговора с бывшим президентом Йемена Али Абдаллой Салехом он попытался убедить руководство хуситов прийти к выводу о том, следует ли продолжать эту их войну. Как мы и ожидали, его предложение было отклонено без раздумий. Хуситы, похоже, более чем непреклонны в вопросе продолжения своих военных усилий по свержению демократического правительства Йемена. Это сказалось на альянсе между Всеобщим народным конгрессом Салеха и повстанцами хуситов, и если мы сильнее надавим на Салеха, он, возможно, наконец, захочет разорвать связи с этим ошибочным делом."
 Saleh.8.a: "Мы должны стараться еще больше!"
 Saleh.8.b: "Забудем об этом..."
 Saleh.9.t: "Салех упорствует"
 Saleh.9.d: "Али Абдалла Салех еще раз предлагает нам начать переговоры с коалицией во главе с Саудовской Аравией, которая, должен вам напомнить, является нашим врагом. Это правда, что наш союз с GPC всегда находился в критическом состоянии, но эта настойчивость Салеха не возникла из воздуха, у него должен быть мотив. Не было бы безумием полагать, что возглавляемая Саудовской Аравией коалиция находится с ним в контакте, мы должны внимательно следить за этим."
 Saleh.9.a: "Это действительно может быть хорошей идеей..."
 Saleh.9.b: "Али, немедленно прекрати это, иначе..."
 Saleh.9.c: "Господин Салех, можно вас на пару слов?"
 HOU_Saleh.1: "Али Абдаллу Салеха будут преследовать боевики-хуситы."
 HOU_Saleh.2: "С Али Абдаллой Салехом свяжутся, чтобы с нашей помощью положить конец Гражданской войне в Йемене. Будь то дипломатия или грубая сила, мы должны убедить его принять участие в диалоге с нашей коалицией."
 HOU_Saleh.3: "Наш союз никогда не был настолько прочным, как это было бы идеально, но я ценю нашу преданность, хотя это может показаться не так. Я понимаю, что вы хотите закончить эту войну, но, к сожалению, я не могу позволить себе или своим товарищам иметь дело с этой дьявольской коалицией. Вы понимаете?"
 HOU_Saleh.4: "Али разочарован."
 HOU_Saleh.5: "С Али свяжутся еще раз."
 HOU_Saleh.6: "Али заметно отшатывается и выходит из комнаты."
 HOU_Saleh.7: "С Али снова свяжутся, но пусть это будет последним предупреждением ему, что если он останется в союзе с нашим врагом, с ним тоже будут обращаться как с врагом."
 Saleh.10.t: "Салех зря тратит наше время..."
 Saleh.10.d: "В очередной раз лидеру Всеобщего народного конгресса, союзнику хуситов, Али Абдулле Салеху, руководство хуситов отказало в начале мирных переговоров с нашей коалицией. С самого начала было ясно, что руководство хуситов не будет с нами разговаривать, поскольку считает нас заклятыми врагами. Учитывая критическую важность альянса ВНК-хуситов, мы должны немедленно предъявить Али Абдулле Салеху ультиматум. Без него правящие партии хуситов окажутся в плачевном состоянии, лишившись необходимых навыков и талантов. С ним руководство обладает компетентностью, хотя ему и не хватает определенных способностей в плане прогресса, но оно потенциально может привести хуситов к победе."
 Saleh.10.a: "Он примет меры, либо мы не сможем гарантировать его безопасность."
 Saleh.10.b: "Это бессмысленно..."
 Saleh.11.t: "Всеобщий народный конгресс!"
 Saleh.11.d: "Даже после многочисленных случаев, когда республиканские силы Салеха обменивались огнем с нашими, мы формально оставались союзниками. Теперь эти предатели официально объявили себя нашими врагами после того, как их предательский лидер Али Абдалла Салех был по заслугам уничтожен. ВНК и его войска активно вступают с нами в перестрелки на улицах наших городов, мы должны немедленно положить этому конец."
 Saleh.11.a: "Предатели! Надо было это предвидеть!"
 Saleh.12.t: "Бывший президент Йемена Али Абдалла Салех убит!"
 Saleh.12.d: "Этот день считается крупной победой хуситов, поскольку человек, который пытался разорвать их изнутри, теперь побежден. Хуситы долгое время считали, что Салех был в контакте с возглавляемой Саудовской Аравией коалицией, но только недавно г-н Салех показал хуситам свое истинное лицо и попытался встать на сторону коалиции, объявив о новой главе объединения и демократии в Йемене. Это вызвало большой гнев у хуситов, и с уходом Салеха они утверждают, что их моральный дух растет."
 Saleh.12.a: "Хорошая работа"
 Saleh.12.b: "Это вызывает беспокойство..."
 Saleh.12.c: "Интересно"
 Saleh.13.t: "Салех возобновляет альянс ВНК-хуситы"
 Saleh.13.d: "Лидер Всеобщего народного конгресса, давний союзник хуситов, хотя и не на самых лучших условиях, объявил о возобновлении некогда разделенного альянса. Али Абдалла Салех публично объявил о новой главе в будущем Йемена, главе, в которой ВНК и хуситы будут работать вместе, чтобы восстановить разрушенную страну. Салех выдвинул одно условие: руководство хуситов должно формализовать Высший политический совет, временное правительство, созданное на время войны, и разделить власть между двумя альянсами, как и планировалось изначально."
 Saleh.13.a: "Это хорошо? Не могу сказать."
 Saleh.13.b: "Черт"
 Saleh.14.t: "Коалиция собирается"
 Saleh.14.d: "Руководство хуситов, противостоящее демократическому правительству Хади в Йемене, показало, что оно готово сесть за стол переговоров и обсудить гуманитарную ситуацию, которая в настоящее время сложилась в Йемене. Саудовская Аравия, лидер коалиции, действующей в Йемене, пригласила всех ее членов на дипломатический саммит, который пройдет в Абу-Даби, Объединенные Арабские Эмираты. Специальными гостями будут сам Абдул-Малик аль-Хуси вместе со своим соратником Али Абдуллой Салехом."
 Saleh.14.a: "Мы должны присутствовать."
 Saleh.14.b: "Извините, но у нас нет на это времени."
 Saleh.14.c: "Для нас было бы честью принять у себя этот саммит."
 Saleh.15.t: "Саммит начинается"
 Saleh.15.d: "Те, кто решил присутствовать на этом саммите, занимают свои места и ждут начала обсуждения. Хуситы упомянули, что они не вступают в эту дискуссию с намерением просто сдаться, поэтому мы должны склонить их к тому, чтобы увидеть конфликт с позиции постороннего. Эта война в Йемене была одним из величайших гуманитарных кризисов за последнее время, и всем сторонам было бы полезно, если бы война была остановлена ​​как можно скорее. Чтобы сделать это быстро, давайте поделимся нашими требованиями..."
 Saleh.15.a: "Сдать и вернуть все территории законному правительству Йемена."
 Saleh.15.b: "Немедленно прекратите конфликт, и оба государства останутся независимыми."
 Saleh.15.c: "Все земли, на которые претендуют хуситы, должны быть объявлены арабским государством."
 Saleh.16.t: "Коалиция требует капитуляции"
 Saleh.16.d: "Нас пригласили на этот саммит в Абу-Даби, чтобы обсудить потенциальное прекращение войны, которую мы ведем уже много лет, и мы пришли к пониманию, что все это было пустой тратой времени. Как только начался саммит, нас сразу же встретило абсурдное требование - наша полная капитуляция. Но до тех пор, пока война все еще бушует, люди будут продолжать умирать, а города - разрушаться. Окончание войны, может быть, и к лучшему, но это означало бы капитуляцию перед нашими заклятыми врагами."
 Saleh.16.a: "Эта война должна закончиться, поэтому стоит подчиниться."
 Saleh.16.b: "Смешно! На этом дискуссия заканчивается!"
 Saleh.17.t: "Коалиция требует, чтобы оба государства оставались независимыми"
 Saleh.17.d: ""
 Saleh.17.a: "Весь Йемен - наш, или это обсуждение окончено."
 Saleh.17.b: ""
 city_captured.0.t: "Падение Алеппо"
 city_captured.0.d: "[FROM.GetName] захватил стратегически важный город Алеппо. Хотя город лежит в руинах, они будут праздновать эту ожесточенную битву всю ночь."
 city_captured.0.a: "Интересно"
 city_captured.1.t: "Падение Дамаска"
 city_captured.1.d: "[FROM.GetName] захватил стратегически важный город Дамаск. Хотя город лежит в руинах, они будут праздновать эту ожесточенную битву всю ночь."
