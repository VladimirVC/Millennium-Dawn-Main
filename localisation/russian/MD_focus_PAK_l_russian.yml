l_russian:
 pakistan.1.t: "Американское давление на территории племен"
 pakistan.1.d: "Соединенные Штаты требуют от Пакистана предпринять решительные военные действия против групп боевиков, действующих из находящихся под федеральным управлением племенных территорий вдоль афганской границы. Вашингтон ясно дал понять, что дальнейшее бездействие будет иметь последствия для двусторонних отношений и американской военной помощи."
 pakistan.1.a: "Начать военную операцию в Вазиристане"
 pakistan.1.b: "Вместо этого ведите переговоры со старейшинами племени"
 pakistan.1.c: "Отказываться от американских требований"
 pakistan.2.t: "Пакистан начинает племенную операцию"
 pakistan.2.d: "Пакистан начал военную операцию против опорных пунктов боевиков в районах проживания племен, реагируя на давление Америки. Целью операции являются элементы движения \"Талибан\" и \"Аль-Каиды\" вдоль афганской границы."
 pakistan.2.a: "Позитивное развитие событий"
 pakistan.3.t: "Пакистан отказывается действовать"
 pakistan.3.d: "Пакистан отказался предпринять решительные военные действия в районах проживания племен, несмотря на требования Америки. Боевики продолжают свободно действовать вдоль афганской границы, подрывая усилия коалиции в Афганистане."
 pakistan.3.a: "Сократить военную помощь Пакистану"
 pakistan.3.b: "Примите их решение на данный момент"
 pakistan.4.t: "Воинствующее возмездие"
 pakistan.4.d: "Военная операция в районах проживания племен спровоцировала ожесточенные ответные действия. Группировки боевиков начали волну взрывов в крупных городах, нацеленных на правительственные здания, рынки и военные объекты. Пакистанский талибан объявил войну государству."
 pakistan.4.a: "Усилить репрессии"
 pakistan.4.b: "Добиваться прекращения огня с боевиками"
 pakistan.5.t: "Приостановлена американская помощь"
 pakistan.5.d: "Соединенные Штаты приостановили военную помощь Пакистану в ответ на отказ правительства действовать против боевиков в районах проживания племен. Потеря американского финансирования приведет к нагрузке на оборонный бюджет."
 pakistan.5.a: "Это возмутительно"
 pakistan.6.t: "Прогресс в районах проживания племен"
 pakistan.6.d: "После нескольких месяцев непрерывных военных операций вооруженные силы Пакистана добились значительного прогресса в районах проживания племен. Основные опорные пункты боевиков были ликвидированы, хотя это привело к серьезным человеческим и экономическим потерям. Теперь вопрос заключается в том, объявить ли о победе или сохранить постоянное военное присутствие."
 pakistan.6.a: "Провозгласите победу и консолидируйтесь"
 pakistan.6.b: "Поддерживать военное присутствие"
 PAK_waziristan_insurgency: "Мятеж в Вазиристане"
 PAK_waziristan_insurgency_desc: "Пакистанские вооруженные силы проводят крупную кампанию по борьбе с повстанцами в районах проживания племен, сражаясь с группами боевиков вдоль афганской границы."
 PAK_suspended_american_aid: "Приостановленная Американская помощь"
 PAK_suspended_american_aid_desc: "Соединенные Штаты приостановили военную помощь Пакистану, увеличив оборонный бюджет и ограничив закупки вооружений."
 PAK_tribal_pacification: "Умиротворение племенных территорий"
 PAK_tribal_pacification_desc: "Успешная военная кампания в районах проживания племен укрепила возможности армии по борьбе с повстанцами и восстановила определенную степень стабильности в приграничном регионе."
 pakistan_news.1.t: "Пакистан начинает военную операцию в районах проживания племен"
 pakistan_news.1.d: "Пакистанские вооруженные силы начали крупную военную операцию против оплотов движения \"Талибан\" и \"Аль-Каиды\" на территориях племен, находящихся под федеральным управлением, вдоль афганской границы. Наступление, проводимое под сильным давлением Америки, нацелено на сети боевиков, которые долгое время использовали пересеченную местность в качестве безопасного убежища."
 pakistan_news.1.a: "Мы выкорчеваем их с корнем"
 pakistan_news.1.b: "Шаг в правильном направлении"
 pakistan_news.1.c: "Отмеченный"
 pakistan_news.2.t: "Пакистан объявляет о победе в районах проживания племен"
 pakistan_news.2.d: "После продолжительной военной кампании Пакистан объявил, что основные опорные пункты боевиков в районах проживания племен были ликвидированы. Операция обошлась дорого как с точки зрения жизней, так и ресурсов, но правительство заявляет, что приграничный регион стал более безопасным, чем когда-либо за последние годы."
 pakistan_news.2.a: "С таким трудом добытая победа"
 pakistan_news.2.b: "Мы приветствуем этот прогресс"
 pakistan_news.2.c: "Отмеченный"