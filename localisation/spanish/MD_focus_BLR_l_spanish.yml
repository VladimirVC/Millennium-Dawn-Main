 BLR_grodno_TT: "§YPodremos lanzar la venta de nuestros fertilizantes a otros países§!"
 BLR_chi_coop_mil_TT: "¡Nuestras fábricas y empresas podrán vender productos a §YCorea del Norte§!"
 belarus_character.1.t: "Era de Lukashenko"
 belarus_character.1.d: "Alexander Grigoryevich Lukashenko has come a long way from an ordinary deputy to the President of the country. Despite having only recently begun to rule Belarus, many influential forces are already dreaming of his overthrow. Will he find a better way for Belarus, or will he become another dictator clinging to power for life?"
 belarus_character.1.a: "Nuestro Batka Lukashenko, madre de Bielorrusia"
 belarus_character.2.t: "Bielorrusia Democrática Liberal"
 belarus_character.2.d: "Sergey Gaidukevich is an extraordinary person with an interesting past and strong views on the future of Belarus. He is clearly regarded as a pro-Russian politician, but will he live up to that reputation?"
 belarus_character.2.a: "Bielorrusia está por encima de todo"
 belarus_character.3.t: "Camino Europeo de Bielorrusia"
 belarus_character.3.d: "Belarus has finally rejected the Soviet past and moved toward a bright European future. But we must decide which path we will take into this new era."
 belarus_character.3.a: "El liberalismo es nuestro camino"
 belarus_character.3.b: "El conservadurismo es nuestro todo"
 belarus_character.4.t: "Nacionalistas en Bielorrusia"
 belarus_character.4.d: "Zenon Poznyak, who has come to power, has long been known for his anti-Russian rhetoric. His central belief is that Russia has suppressed Belarusians throughout history. He intends to end this and possibly avenge it."
 belarus_character.4.a: "Los bielorrusos no son rusos"
 belarus_character.5.t: "Bielorrusia Roja"
 belarus_character.5.d: "Belarus's desire to gradually move away from the Soviet past has ultimately dragged it back into the clutches of Communism. People remember the good times of the USSR and have apparently decided to bring them back."
 belarus_character.5.a: "Volvamos a la herencia soviética"
 belarus_ukraine.1.t: "Regimiento Kastus Kalinovsky"
 belarus_ukraine.1.d: "Los bielorrusos nos envían ayuda en forma de todo un regimiento. Juntos lucharemos contra la agresión rusa."
 belarus_ukraine.1.a: "Abajo con Rusia y sus ambiciones imperiales."
 belarus_ukraine.2.t: "¿Enviar voluntarios a Novorossiya?"
 belarus_ukraine.2.d: "Among the people, there are those who want to help the residents of Novorossiya in their struggle. We are ready to assist them."
 belarus_ukraine.2.a: "Enviar los voluntarios"
 belarus_ukraine.2.b: "Condenamos a aquellos que van a Novorossiya como voluntarios porque es ilegal."
 belarus_ukraine.3.t: "Bielorrusia ofrece Minsk como plataforma para conversaciones de paz"
 belarus_ukraine.3.d: "Bielorrusia ofrece Minsk como ciudad para las negociaciones sobre el establecimiento de la paz en Ucrania. ¿Estaremos de acuerdo en firmar una tregua con los separatistas?"
 belarus_ukraine.3.a: "¡La paz es a lo que debemos aspirar!"
 belarus_ukraine.3.b: "¡Restableceremos la integridad territorial de Ucrania!"
 belarus_ukraine.4.t: "Operación Especial en Ucrania"
 belarus_ukraine.4.d: "Russia has launched a special operation in Ukraine. Our leadership faces a choice — to participate or not. We have many obligations, but we should think carefully before getting involved in this carnage."
 belarus_ukraine.4.a: "¡Ucrania debe ser liberada!"
 belarus_ukraine.4.b: "No participaremos en esto"
 belarus_export.2.t: "Bielorrusia ofrece nuestra adquisición de armas."
 belarus_export.2.d: "We have finally completed our modification of the T-72 tank. Now we will be able to produce it for the needs of our army."
 belarus_export.2.a: "Comprar camiones"
 belarus_export.3.t: "Bielorrusia ofrece nuestra adquisición de armas"
 belarus_export.3.d: "We have finally completed our modification of the BM-21. Now we will be able to produce it for the needs of our army."
 belarus_export.3.a: "Gloria a las armas bielorrusas"
 belarus_export.4.t: "Rechazo de comprar nuestras armas"
 belarus_export.4.d: "We have finally completed our MLRS \"Polonez\". Now we will be able to produce it for the needs of our army."
 belarus_export.4.a: "Se arrepentirán"
 belarus_export.6.t: "Bielorrusia nos ofrece la venta de tractores"
 belarus_export.6.d: "The Belarusian MTZ plant is offering us their newest tractor. It will be a great help in the development of our agro-industry."
 belarus_export.6.a: "Estamos de acuerdo en comprarlos."
 belarus_export.6.b: "No los necesitamos"
 belarus_export.7.t: "Nuestros tractores fueron comprados"
 belarus_export.7.d: "[FROM.GetNameWithFlag] has agreed to sign a contract with us for the supply of tractors."
 belarus_export.7.a: "Excelente"
 belarus_export.8.t: "Nuestros Tractores Decidimos No Comprar"
 belarus_export.8.d: "[FROM.GetNameWithFlag] refused to sign a contract with us for the supply of tractors."
 belarus_export.8.a: "Hiriente"
 belarus_export.9.t: "Contrato con el Minotor bielorruso"
 belarus_export.9.d: "We have long wanted to cooperate with this Belarusian enterprise. They will repair our wheeled military equipment, which will greatly benefit us."
 belarus_export.9.a: "Bien"
 belarus_export.10.t: "Contrato con la Planta de Reparación de Aeronaves 558"
 belarus_export.10.d: "Los ingenieros bielorrusos nos ofrecen sus servicios para la reparación de equipos aeronáuticos. ¿Aceptaremos firmar un contrato con ellos?"
 belarus_export.10.a: "Por supuesto que es una buena oferta."
 belarus_export.10.b: "No, rechazaremos su oferta."
 belarus_export.11.t: "Nuevo contrato con la planta de reparación de aeronaves 558"
 belarus_export.11.d: "[FROM.GetNameWithFlag] has signed a contract with the 558 Aircraft Repair Plant."
 belarus_export.11.a: "Excelente"
 belarus_export.12.t: "Rechazaron contrato con la planta de reparación de aeronaves 558"
 belarus_export.12.d: "[FROM.GetNameWithFlag] refused the contract with the 558 Aircraft Repair Plant."
 belarus_export.12.a: "Hiriente"
 belarus_export.13.t: "Contrato con la empresa Peleng"
 belarus_export.13.d: "La empresa bielorrusa Peleng, especializada en electrónica, está dispuesta a ofrecer sus servicios en el suministro de dispositivos de guía para armas antitanque. ¿Aceptaremos este contrato?"
 belarus_export.13.a: "Por supuesto que es una buena oferta."
 belarus_export.13.b: "No, rechazaremos su oferta."
 belarus_export.14.t: "Nuevo contrato con la empresa Peleng"
 belarus_export.14.d: "[FROM.GetNameWithFlag] has signed a contract with Peleng on the supply of equipment for ATGMs."
 belarus_export.14.a: "Excelente"
 belarus_export.15.t: "El contrato con la empresa Peleng fue rechazado"
 belarus_export.15.d: "[FROM.GetNameWithFlag] refused a contract with Peleng on the supply of equipment for ATGMs."
 belarus_export.15.a: "Hiriente"
 belarus_export.16.t: "Misiles antitanque bielorrusos"
 belarus_export.16.d: "Belarusian manufacturers want to offer us their ATGMs for delivery. Will we agree to accept this contract?"
 belarus_export.16.a: "Por supuesto que es una buena oferta."
 belarus_export.16.b: "No, rechazaremos su oferta."
 belarus_export.17.t: "Venta de ATGM"
 belarus_export.17.d: "The contract for the sale of our ATGMs to [FROM.GetNameWithFlag] has been concluded."
 belarus_export.17.a: "Excelente"
 belarus_export.18.t: "Venta de ATGM"
 belarus_export.18.d: "The contract for the sale of our ATGMs to [FROM.GetNameWithFlag] was rejected."
 belarus_export.18.a: "Hiriente"
 belarus_export.19.t: "Chasis bielorruso"
 belarus_export.19.d: "Los fabricantes bielorrusos están dispuestos a ofrecer sus chasis para varios de nuestros equipos militares. ¿Aceptaremos este contrato?"
 belarus_export.19.a: "Por supuesto que es una buena oferta."
 belarus_export.19.b: "No, rechazaremos su oferta."
 belarus_export.20.t: "Contrato de suministro de chasis"
 belarus_export.20.d: "They agreed to our contract for the supply of chassis."
 belarus_export.20.a: "Excelente"
 belarus_export.21.t: "Contrato de suministro de chasis"
 belarus_export.21.d: "They decided to cancel our chassis supply contract."
 belarus_export.21.a: "Hiriente"
 belarus_export.22.t: "Proyecto conjunto APC"
 belarus_export.22.d: "[FROM.GetNameWithFlag] is offering us a joint APC project called Cobra-K. This project will bring us experience and knowledge in the modification of older equipment. Will we agree?"
 belarus_export.22.a: "Por supuesto que es una buena oferta."
 belarus_export.22.b: "No, rechazaremos su oferta."
 belarus_export.23.t: "Proyecto conjunto APC"
 belarus_export.23.d: "[FROM.GetNameWithFlag] agreed to work on a joint modification of the APC."
 belarus_export.23.a: "Excelente"
 belarus_export.24.t: "Proyecto conjunto APC"
 belarus_export.24.d: "[FROM.GetNameWithFlag] refused to work on a joint modification of the APC."
 belarus_export.24.a: "Hiriente"
 belarus_export.25.t: "B-200 «Polonez»"
 belarus_export.25.d: "[FROM.GetNameWithFlag] nos ofrece comprar sus últimos MLRS. ¿Aceptaremos comprarlos?"
 belarus_export.25.a: "Por supuesto que es una buena oferta."
 belarus_export.25.b: "No, rechazaremos su oferta."
 belarus_export.26.t: "B-200 «Polonez»"
 belarus_export.26.d: "[FROM.GetNameWithFlag] has agreed to purchase our MLRS."
 belarus_export.26.a: "Excelente"
 belarus_export.27.t: "B-200 «Polonez»"
 belarus_export.27.d: "[FROM.GetNameWithFlag] refused to purchase our MLRS."
 belarus_export.27.a: "Hiriente"
 belarus_export.28.t: "Chasis bielorruso"
 belarus_export.28.d: "Los fabricantes bielorrusos están dispuestos a ofrecer sus chasis para varios de nuestros equipos militares. ¿Aceptaremos este contrato?"
 belarus_export.28.a: "Por supuesto que es una buena oferta."
 belarus_export.28.b: "No, rechazaremos su oferta."
 belarus_export.29.t: "Contrato de suministro de chasis"
 belarus_export.29.d: "[FROM.GetNameWithFlag] agreed to our contract for the supply of chassis."
 belarus_export.29.a: "Excelente"
 belarus_export.30.t: "Contrato de suministro de chasis"
 belarus_export.30.d: "[FROM.GetNameWithFlag] decided to cancel our chassis supply contract."
 belarus_export.30.a: "Hiriente"
 belarus_another.1.t: "Bielorrusia nos pide inversiones"
 belarus_another.1.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.1.a: "Por supuesto"
 belarus_another.1.b: "Lo siento, no"
 belarus_another.2.t: "Guerra diplomática entre Polonia y Bielorrusia"
 belarus_another.2.d: "Las relaciones con Polonia se deterioraron rápidamente. Bielorrusia acusó a uno de los diplomáticos polacos de \"acciones activas destinadas a desestabilizar la sociedad bielorrusa\". En respuesta, Polonia preparó una lista de funcionarios bielorrusos a los que se les prohibirá la entrada en el territorio polaco. La causa del conflicto fue la asociación pública \"Unión de Polacos de Bielorrusia\", que reunía a unas 20 mil personas. En el congreso de la Unión de Polacos de Bielorrusia, su ex líder, leal a la dirección de Bielorrusia, fue destituido, tras lo cual la Unión de Polacos de Bielorrusia fue sometida a una enorme presión por parte de las autoridades, que acusaron a la dirección de Polonia, que financió el congreso de la Unión de Polacos de Bielorrusia y a la embajada de este país, de \"actividades subversivas\" contra Bielorrusia. El Ministerio de Justicia de Bielorrusia se negó a aprobar los resultados del Congreso de la Unión de Polacos de Bielorrusia, que eligió a Angelika Borys como su presidenta. El Sejm polaco expresó su descontento con las acciones de las autoridades bielorrusas, que fueron percibidas en Bielorrusia como un intento de injerencia en sus asuntos internos. Los acontecimientos posteriores condujeron a un conflicto diplomático."
 belarus_another.2.a: "¡Ya hemos tenido suficiente de los polacos!"
 belarus_another.3.t: "Uniatismo en Ucrania"
 belarus_another.3.d: "Uniatism has begun to spread actively across our territory, and many residents are demanding an official break with the Orthodox Church, which is subordinate to Moscow. Perhaps it is worth listening to them?"
 belarus_another.3.a: "El uniatismo se convertirá en la religión estatal"
 belarus_another.3.b: "Todo seguirá como antes"
 belarus_another.4.t: "Bielorrusia nos pide inversiones"
 belarus_another.4.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.4.a: "Por supuesto"
 belarus_another.4.b: "Lo siento, no"
 belarus_another.5.t: "Crisis económica en Bielorrusia"
 belarus_another.5.d: "Bielorrusia está pasando por una grave crisis económica y necesita ayuda. Nos piden préstamos para estabilizar su situación económica. ¿Deberíamos ayudar?"
 belarus_another.5.a: "Ayudaremos con préstamos"
 belarus_another.5.b: "No podemos permitirnos ayudar en este momento"
 belarus_another.7.t: "Inversiones de Bielorrusia en nuestro país"
 belarus_another.7.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.7.a: "Firmaremos el contrato."
 belarus_another.7.b: "Nos negamos."
 belarus_another.8.t: "Proyecto BOMBEL"
 belarus_another.8.d: "The EU funds have been received. It is time for us to decide how to dispose of them."
 belarus_another.8.a: "Haremos lo que debemos: fortaleceremos la frontera."
 belarus_another.8.b: "No creo que se den cuenta si tomamos algo."
 belarus_another.9.t: "Inversiones de Bielorrusia en nuestro país"
 belarus_another.9.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.9.a: "Firmaremos el contrato."
 belarus_another.9.b: "Nos negamos."
 belarus_another.10.t: "What Should We Do With PMC Wagner?"
 belarus_another.10.d: "We detained several suspicious people who later turned out to be mercenaries of the famous Russian PMC Wagner. Our law enforcement agencies are already ready to accuse them of preparing terrorism. The Russian side insists on their release. What will we do?"
 belarus_another.10.a: "Los liberaremos y los entregaremos a la parte rusa."
 belarus_another.10.b: "Put them in jail and accuse them of preparing terrorist attacks"
 belarus_another.11.t: "Guerra civil en Bielorrusia"
 belarus_another.11.d: "Our strongly anti-Russian rhetoric, the policy of imposing the Belarusian language, and the active promotion of a history that denies any connection with Russia have taken their toll. The eastern regions have revolted and local self-defense forces have seized power. We must stop this as soon as possible before the major powers can exploit it."
 belarus_another.11.a: "¡Por supuesto!"
 belarus_another.12.t: "El General Azarenok hace lobby en favor de los intereses rusos en nuestro país"
 belarus_another.12.d: "Our law enforcement agencies have learned about the lobbying of Russian interests in our country through the connections of General Azarenka. Should we pay attention, or is it in the interests of the Republic of Belarus to let it continue?"
 belarus_another.12.a: "Por supuesto"
 belarus_another.12.b: "Es necesario ponerlo en la cárcel."
 belarus_another.14.t: "Sergey Tikhanovsky"
 belarus_another.14.d: "A well-known opposition blogger critical of our government, he has started to have too much influence among the people and we need to do something about it."
 belarus_another.14.a: "Tenemos que ponerlo en la cárcel."
 belarus_another.14.b: "Leave him alone, he may still be useful to us"
 belarus_another.15.t: "Solicitar ayuda al FMI"
 belarus_another.15.d: "We are forced to request assistance from the IMF to address the consequences of the crisis."
 belarus_another.15.a: "No tenemos más opción que aceptar"
 belarus_another.16.t: "Ajuste de la política crediticia"
 belarus_another.16.d: "The credit policy will undergo a sharp revision in connection with the current situation."
 belarus_another.16.a: "No tenemos más opción que aceptar"
 belarus_another.17.t: "Cooperación militar con Bielorrusia"
 belarus_another.17.d: "We have invited military specialists from Belarus to address the most important tasks in our army. The Belarusian special forces conducted training for our fighters, and the Belarusian military industry improved our air defense system."
 belarus_another.17.a: "¡Increíble!"
 belarus_another.18.t: "Latgale o guerra"
 belarus_another.18.d: "El gobierno de Bielorrusia se está volviendo más agresivo. Nos han dado un ultimátum: o les entregamos la región de Latgale, o las consecuencias serán terribles para nuestro país. Esta declaración inesperada nos ha impactado. ¿Qué haremos?"
 belarus_another.18.a: "Tendremos que entregar Latgale para preservar al menos nuestra independencia."
 belarus_another.18.b: "Sin concesiones."
 belarus_another.19.t: "La Segunda Unión de Lublin"
 belarus_another.19.d: "Belarus actively influences our government and holds significant leverage over it. Today, the Belarusian ambassador handed us a draft of a new agreement envisioning the creation of a supranational entity, similar to what Russia proposed for the Lukashenko government. In effect, we would be surrendering some of our autonomy, but our states would become nearly unified. Do we agree to this?"
 belarus_another.19.a: "Nuestro país está debilitado, creo que deberíamos estar de acuerdo."
 belarus_another.19.b: "Nuestra independencia lo es todo para nosotros."
 belarus_another.20.t: "Firma del contrato"
 belarus_another.20.d: "El gobierno polaco aceptó unirse a nosotros en un Estado de Unión, con la pérdida de parte de su autonomía para proteger su país de un colapso total. Pero esto puede tener consecuencias imprevistas."
 belarus_another.20.a: "Bueno, veremos."
 belarus_another.21.t: "¡Polonia se negó!"
 belarus_another.21.d: "The Polish government, which we have nurtured for so long, has betrayed us. Apparently we have no choice and must decide for ourselves what to do with these traitors. We may have to use all available leverage."
 belarus_another.21.a: "Vamos a hacerles la vida imposible a los polacos."
 belarus_another.21.b: "Déjalos, abandonémoslos."
 belarus_another.22.t: "Milicia de Silesia"
 belarus_another.22.d: "Our people have a chance for independence. It is time to take advantage of it and take up arms!"
 belarus_another.22.a: "¡Abajo con la opresión polaca!"
 belarus_another.23.t: "Ejercicios conjuntos con Bielorrusia"
 belarus_another.23.d: "Bielorrusia nos propone realizar ejercicios conjuntos para la coordinación de combate de nuestras tropas. ¿Estamos de acuerdo?"
 belarus_another.23.a: "Por supuesto que estamos de acuerdo."
 belarus_another.23.b: "Podremos arreglárnoslas sin ellos."
 belarus_another.24.t: "Ejercicios conjuntos con Polonia"
 belarus_another.24.d: "They have agreed to conduct exercises with our troops. We will gain valuable experience."
 belarus_another.24.a: "Bueno."
 belarus_another.25.t: "Proporcionar armas a Iraq"
 belarus_another.25.d: "We are ready to allocate part of our weapons stockpile for delivery to Iraq in support of the friendly regime there."
 belarus_another.25.a: "Bien"
 belarus_another.26.t: "Aterrizar un avión de Ryanair con Protasevich"
 belarus_another.26.d: "Our special services were able to intercept and force down the plane carrying the editor of the opposition channel NEXTA. His name is Roman Protasevich."
 belarus_another.26.a: "Bien"
 belarus_another.27.t: "El destino de la Iglesia bielorrusa"
 belarus_another.27.d: "El liderazgo de nuestro país ha considerado seriamente otorgar la autonomía a nuestra iglesia. Sin embargo, este paso podría deteriorar las relaciones con nuestro amigo y vecino, Rusia. ¿Deberíamos hacerlo?"
 belarus_another.27.a: "Concedemos la autonomía a nuestra iglesia"
 belarus_another.27.b: "No"
 belarus_another.28.t: "¿Qué hacer con la Unión de Polacos de Bielorrusia?"
 belarus_another.28.d: "The Union of Poles of Belarus has long been our problem. Through it, Poland has exerted its influence on us with full force. It is time to deal with this. Either we leave them as they are, or we completely expel the Polish population."
 belarus_another.28.a: "Permitamos que permanezcan bajo nuestro control"
 belarus_another.28.b: "No hay lugar para los polacos en Bielorrusia"
 belarus_another.29.t: "Cancelación del comercio de Chelnochnaya"
 belarus_another.29.d: "Through Russia and China, we have established supplies of the goods we need to finally get rid of this relic of the 90s."
 belarus_another.29.a: "Bien"
 belarus_another.30.t: "Cancelación del comercio de Chelnochnaya"
 belarus_another.30.d: "Now that we have access to European goods through official channels, our citizens will not have to engage in this dangerous and sometimes unprofitable occupation."
 belarus_another.30.a: "Bien"
 belarus_another.31.t: "Guerra de la leche"
 belarus_another.31.d: "Russia has boycotted the import of our dairy products, cutting us off from a significant share of our profits. Will we concede to their conditions, or will we protect the domestic producer?"
 belarus_another.31.a: "We stand firmly behind our manufacturers"
 belarus_another.31.b: "Cedamos a sus demandas"
 belarus_another.32.t: "Problema con el Consejo Supremo"
 belarus_another.32.d: "The Supreme Soviet remains a relic of the Soviet system, which we cannot legally eliminate without changing the constitution. Therefore, we will have to compromise with them until we finally resolve this issue."
 belarus_another.32.a: "Por la gloria de Bielorrusia"
 belarus_another.33.t: "Accidente de avión en Ucrania"
 belarus_another.33.d: "A plane carrying Zenon on board and heading to Kyiv crashed in Ukraine. There were no survivors, and it became urgently necessary to decide who would take the post of leader of the state. The party deputy, Yuri Belenky, became the temporary and possibly permanent head."
 belarus_another.33.a: "Por la gloria de Bielorrusia"
 belarus_another.34.t: "Táler bielorruso"
 belarus_another.34.d: "Belarus proposes to introduce a single currency on our territory — the Thaler, the same one used in Belarus. Perhaps a common currency will improve trade between our countries, but our independence will again come under threat."
 belarus_another.34.a: "Nosotros estamos de acuerdo"
 belarus_another.34.b: "Nos negamos"
 belarus_another.35.t: "Intermarium"
 belarus_another.35.d: "Bielorrusia nos ofrece crear una alianza militar llamada Intermarium. Al crearla, nos protegeremos de la agresión de vecinos más grandes."
 belarus_another.35.a: "Estamos de acuerdo."
 belarus_another.35.b: "Nos negamos."
 belarus_another.36.t: "Bielorrusia quiere unirse a la OTAN"
 belarus_another.36.d: "Bielorrusia ha estado en el camino de la democracia durante mucho tiempo y quiere defenderla junto con nosotros. El Gobierno de Bielorrusia ha cumplido plenamente todas las condiciones para unirse a la OTAN y ha solicitado la membresía en la organización. ¿La aceptaremos?"
 belarus_another.36.a: "Estamos de acuerdo."
 belarus_another.36.b: "Nos negamos."
 belarus_another.37.t: "Nos unimos a la OTAN"
 belarus_another.37.d: "Nuestra solicitud de membresía ha sido aprobada y ahora somos parte de esta gran alianza, ¡listos para defender la democracia en todo el mundo!"
 belarus_another.37.a: "¡Hurra!"
 belarus_another.38.t: "Bielorrusia quiere unirse a USAID"
 belarus_another.38.d: "El gobierno bielorruso ha enviado una solicitud para unirse al programa USAID. ¿Estamos listos para responder positivamente a ella?"
 belarus_another.38.a: "Aceptamos su solicitud"
 belarus_another.38.b: "No"
 belarus_another.39.t: "Nuestra solicitud fue aceptada por USAID."
 belarus_another.39.d: "Estados Unidos aprobó nuestra solicitud y ahora somos parte del programa USAID."
 belarus_another.39.a: "¡Hurra!"
 belarus_another.40.t: "La Crisis Económica de 2008 en Bielorrusia."
 belarus_another.40.d: "Fenómenos complejos en la economía del país, que indican el deterioro de la situación financiera y económica en el país. En 2008, comenzó la crisis financiera en Bielorrusia. Ahora tenemos que elegir un área en la que reduciremos nuestros gastos para salvar el presupuesto."
 belarus_another.40.a: "Reducir el contenido del sistema educativo."
 belarus_another.40.b: "Reducir el mantenimiento del sistema de atención médica."
 belarus_another.40.c: "Reducir el contenido del sistema burocrático."
 belarus_another.41.t: "Operación \"Nuevo Día\""
 belarus_another.41.d: "El gobierno bielorruso nos ofrece una operación militar conjunta contra Lituania para eliminar el problema del corredor de Suwalki. ¿Estamos de acuerdo en dar este paso tan peligroso?"
 belarus_another.41.a: "Debemos asegurar nuestras fronteras."
 belarus_another.41.b: "No nos arriesgaremos."
 belarus_another.42.t: "Bielorrusia Quiere Obtener Vilnius."
 belarus_another.42.d: "El gobierno bielorruso expresó su deseo de transferir Vilnius y los territorios circundantes bajo su control total. Su argumento se basa en el hecho de que esta es una tierra bielorrusa histórica. ¿Estamos de acuerdo con esto?"
 belarus_another.42.a: "Entregaremos Vilnius a ellos, fortaleciendo los lazos amistosos."
 belarus_another.42.b: "Quizás nos lo quedemos para nosotros."
 belarus_another.43.t: "Los Resultados de la Revolución de los Jeans"
 belarus_another.43.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change and it is time to cede power to others?"
 belarus_another.43.a: "¡Nunca!"
 belarus_another.43.b: "Aparentemente, ha llegado la era del cambio."
 belarus_another.44.t: "Protestas Masivas bajo el Liderazgo de Tikhanovskaya."
 belarus_another.44.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change, and it is time to cede power to others?"
 belarus_another.44.a: "¡Nunca!"
 belarus_another.44.b: "Aparentemente, ha llegado la era del cambio."
 belarus_another.45.t: "Guerra civil en Bielorrusia"
 belarus_another.45.d: "We could not keep the protesters in check, and now they have brought the country to complete chaos. What will happen next?"
 belarus_another.45.a: "This is terrible!"
 belarus_another.48.t: "La guerra contra Wagner"
 belarus_another.48.d: "Our government was shocked by the news that Wagner PMC fighters attacked our country from Belarusian territory, which gives us good reason to declare war on Belarus. Will we go for it?"
 belarus_another.48.a: "Es hora de acabar con Bielorrusia"
 belarus_another.48.b: "No es necesario declarar la guerra"
 belarus_another.49.t: "\"Excursión a Vilnius\""
 belarus_another.49.d: "With the assistance of our border guards, PMC Wagner broke through the border of Lithuania and entered its territory. What no one expected has begun."
 belarus_another.49.a: "Verano y ballestas"
 belarus_another.52.t: "Revolución de los jeans"
 belarus_another.52.d: "The people of Belarus have come out to protest against the legitimate government and demand its resignation. I hope we have prepared well for this."
 belarus_another.52.a: "Suprimir las protestas"
 belarus_another.52.b: "Intentar negociar"
 belarus_another.53.t: "Los bolcheviques nacionales tomaron el poder en Rusia"
 belarus_another.53.d: "Our loyal supporters were finally able to seize power in Russia. The Kremlin is ours now. Our leader is ready to lead Russia."
 belarus_another.53.a: "Rusia lo es todo. El resto no es nada."
 belarus_another.54.t: "Unirse a Rusia"
 belarus_another.54.d: "Finally, Belarus is returning home. We will now be part of a great country, sacrificing our autonomy — but did we truly need it?"
 belarus_another.54.a: "¡Finalmente!"
 belarus_another.55.t: "Revolución de los jeans"
 belarus_another.55.d: "Protests are gaining momentum in Belarus and the Belarusian government cannot suppress them. Perhaps we should step in and save their government?"
 belarus_another.55.a: "Enviaremos a nuestros especialistas"
 belarus_another.55.b: "No interfiramos"
 belarus_another.56.t: "Revolución de los jeans"
 belarus_another.56.d: "¡Rusia nos envió sus especialistas y juntos pudimos reprimir las protestas!"
 belarus_another.56.a: "Gracias Rusia"
 belarus_another.57.t: "Revolución de los jeans"
 belarus_another.57.d: "Pedimos ayuda en secreto al gobierno ruso y nos la negaron, lo que nos deja solos con el movimiento revolucionario."
 belarus_another.57.a: "Dios nos ayude"
 belarus_another.58.t: "Revolución de los jeans"
 belarus_another.58.d: "The protests are gaining momentum. Some administrative buildings have already been seized, riots are breaking out in other cities, and some generals have defected to the rebels. What should we do?"
 belarus_another.58.a: "¡Lucharemos hasta el final!"
 belarus_another.58.b: "Entregaremos el poder pacíficamente"
 belarus_another.59.t: "Bielorrusia pide un préstamo"
 belarus_another.59.d: "The Belarusian government is asking us to provide them with a loan. We may not be sure of their solvency, but the influence we will gain will definitely pay for itself."
 belarus_another.59.a: "Vamos a darles dinero"
 belarus_another.59.b: "Nos negaremos"
 belarus_another.60.t: "Préstamo ruso"
 belarus_another.60.d: "El gobierno ruso ha accedido a concedernos un préstamo."
 belarus_another.60.a: "Bien"
 belarus_another.61.t: "Préstamo ruso"
 belarus_another.61.d: "El gobierno ruso se negó a concedernos un préstamo."
 belarus_another.61.a: "Triste"
 belarus_another.62.t: "Bielorrusia propone crear un comerciante conjunto de potasio"
 belarus_another.62.d: "The Belarusian government has proposed creating a joint potassium trading company between our two enterprises, Uralkali and Belaruskali. Together, we will be able to profit more from this resource."
 belarus_another.62.a: "Nosotros estamos de acuerdo"
 belarus_another.62.b: "Nosotros no estamos de acuerdo"
 belarus_another.63.t: "Comerciante conjunto de potasio"
 belarus_another.63.d: "El gobierno ruso acordó crear una empresa conjunta de comercio de potasa."
 belarus_another.63.a: "Bien"
 belarus_another.64.t: "Bielorrusia cierra comerciante conjunto de potasio"
 belarus_another.64.d: "The confrontation between our two potassium trading enterprises has reached its limit and the Belarusian government has decided to break away and create its own trader."
 belarus_another.64.a: "Triste"
 belarus_another.65.t: "Golpe de Estado pro-Unión"
 belarus_another.65.d: "We attempted to carry out a coup in Belarus using all our administrative and law enforcement resources, as well as our connections."
 belarus_another.65.a: "Veamos el Resultado"
 belarus_GDL.1.t: "Bielorrusia Quiere Gobernar Nuestro País."
 belarus_GDL.1.d: "Pro-Belarusian nationalists have significant influence in our country, so the Belarusian authorities have issued us an ultimatum — allow them into the government or face the consequences. What do we say to that?"
 belarus_GDL.1.a: "Estamos de acuerdo."
 belarus_GDL.1.b: "¡Nunca!"
 belarus_GDL.2.t: "Unirse a Bielorrusia."
 belarus_GDL.2.d: "Nuestro país ha caído bajo la plena influencia de Bielorrusia. No tenemos opción y estamos listos para firmar el acta de adhesión."
 belarus_GDL.2.a: "Esa es la historia."
 belarus_azot.1.t: "Bielorrusia Propone Acuerdo Comercial de Fertilizantes Químicos."
 belarus_azot.1.d: "Belarus recently reached out and proposed an exclusive contract for the best fertilizers they can offer. Accepting it will surely increase our crop yield, though politically this maneuver may be questionable in some eyes."
 belarus_azot.1.a: "Absolutamente."
 belarus_azot.1.b: "No es posible en este momento."
 belarus_azot.2.t: "[From.GetName] Acepta"
 belarus_azot.2.d: "Our efforts to make a deal with [From.GetName] have finally come to a conclusion. The contract was signed and the first payment is about to be received."
 belarus_azot.2.a: "Finalmente, buenas noticias."
 belarus_azot.3.t: "[From.GetName] rechaza nuestro trato."
 belarus_azot.3.d: "Our efforts to make a deal with [From.GetName] seem to be futile. We have not received an answer, and the matter appears to be going nowhere."
 belarus_azot.3.a: "¡Maldito seas, [From.GetNameDef]!"
 belarus_azot.4.t: "[From.GetName] anula su contrato."
 belarus_azot.4.d: "We have received stunning news — [From.GetName] is canceling their fertilizer contract with us. We will not be able to sell them our product, at least for now."
 belarus_azot.4.a: "¡Necios! ¡No saben lo que pierden!"
 BLR_Azot_category: "Comercio de Fertilizantes GrodnoAzot"
 BLR_Azot_category_desc: "Centrarse en el número de mercados a los que GrodnoAzot tiene acceso es vital para la diversidad y expansión de la Economía Bielorrusa. La multitud de diferentes fertilizantes y pesticidas a su disposición puede ser útil para muchas naciones. Establecer contratos con otros países y expandir la producción de nuestros fertilizantes traerá una gran cantidad de ingresos a la nación y al pueblo de Bielorrusia.\n\nLos ingresos obtenidos del comercio se determinan por el número de contratos que haya firmado multiplicado por el cinco por ciento.\n§YContratos de Fertilizantes Actuales:§! [?current_azot_capacity]/[?current_max_azot_capacity]\n§YLímite de Fertilizantes:§! [?current_max_azot_capacity]/[?max_azot_capacity]"
 BLR_Foreign_azot_trade_category: "Comercio de Fertilizantes Químicos"
 BLR_expand_azot_production: "Expandir la Producción de Fertilizantes"
 BLR_mission_to_Poland: "Misión Comercial a [POL.GetNamewithFlag]"
 BLR_mission_to_Poland_desc: "Establecer una misión comercial con Polonia es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Germany: "Misión Comercial a [GER.GetNamewithFlag]"
 BLR_mission_to_Germany_desc: "Establecer una misión comercial con Alemania es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_France: "Misión Comercial a [FRA.GetNamewithFlag]"
 BLR_mission_to_France_desc: "Establecer una misión comercial con Francia es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Norway: "Trade Mission to [NRY.GetNamewithFlag]"
 BLR_mission_to_Norway_desc: "Establecer una misión comercial con Noruega es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Sweden: "Misión Comercial a [SWE.GetNamewithFlag]"
 BLR_mission_to_Sweden_desc: "Establecer una misión comercial con Suecia es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Russia: "Misión Comercial a [SOV.GetNamewithFlag]"
 BLR_mission_to_Russia_desc: "Establecer una misión comercial con Rusia es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Ukraine: "Misión Comercial a [UKR.GetNamewithFlag]"
 BLR_mission_to_Ukraine_desc: "Establecer una misión comercial con Ucrania es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Kazahstan: "Misión Comercial a [KAZ.GetNamewithFlag]"
 BLR_mission_to_Kazahstan_desc: "Establecer una misión comercial con Kazajstán es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Czechia: "Misión Comercial a [CZE.GetNamewithFlag]"
 BLR_mission_to_Czechia_desc: "Establecer una misión comercial con República Checa es una decisión empresarial sólida para el bien de nuestra nación."
 BLR_mission_to_Netherland: "Misión comercial a [HOL.GetNamewithFlag]"
 BLR_mission_to_Netherland_desc: "Establecer una misión comercial con los Países Bajos es una decisión comercial acertada por el bien de nuestra nación."
 BLR_mission_to_Zimbabwe: "Misión comercial a [ZIM.GetNamewithFlag]"
 BLR_mission_to_Zimbabwe_desc: "Establecer una misión comercial con Zimbabwe es una decisión comercial acertada por el bien de nuestra nación."
 cancel_BLR_trade: "Cancelar Contratos de Comercio de Fertilizantes."
 BLR_pending_offer: "Una Nación está Considerando Actualmente un Contrato de Fertilizantes."
 Luka_reactors: "Lukashenko Promises to Build a Nuclear Reactor"
