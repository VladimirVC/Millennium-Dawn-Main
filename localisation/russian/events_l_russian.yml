 AfghanistanNews.1.t: "Гражданская война в Афганистане стихает"
 AfghanistanNews.1.TAL.d: "Несмотря на все усилия афганских вооруженных сил и их западных союзников, талибам удалось получить полный контроль над всеми крупными городами, включая столицу Кабул. Большинство правительственных чиновников скрылись или были изгнаны, включая президента Афганистана [AFG.GetLeader], в настоящее время проживающего в Соединенных Штатах.\n\nТриумф Талибана, несомненно, увеличит частоту террористических атак в регионе и во всем мире."
 AfghanistanNews.1.AFG.d: "Афганское правительство объявило о победе Талибана. Большинство сильнейших аванпостов и городов были очищены от их присутствия, и большинство оставшихся бойцов бежали через границу в Пакистан. Хотя Талибан сократился до нескольких анклавов и ячеек, по прогнозам, мятеж продлится еще много лет, хотя и на более низких уровнях.\n\nЭта победа показала эффективность восстановленной афганской армии и решимость афганского правительства."
 AfghanistanNews.1.a: "Интересно"
 AfghanistanNews.2.t: "Афганистан претендует на Пуштунистан"
 AfghanistanNews.2.d: "Из-за всплеска насилия в Пакистане афганское правительство усилило свои притязания на районы Пакистана, где живут пуштуны. Линия Дурранда (современная граница между Афганистаном и Пакистаном) долгое время была источником конфликта между двумя странами, поскольку она передавала земли из Империи Афганистан в Пакистан под британским контролем.\n\nСами пуштуны, живущие в этом районе, похоже, не слишком взволнованы этим развитием событий, так как многие из них комфортно живут внутри Пакистана. Вполне вероятно, что Афганистан не сможет настаивать на своих требованиях иначе, как силой."
 AfghanistanNews.2.a: "Интересно"
 AfghanistanNews.3.t: "Афганистан претендует на Белуджистан"
 AfghanistanNews.3.d: "По мере углубления кризиса в Пакистане Афганистан расширяет свои претензии. Сегодня афганское правительство объявило, что Белуджистан, помимо Пуштунистана, является неотъемлемой частью Афганистана."
 AfghanistanNews.3.a: "Тревожное развитие событий"
 AfghanistanNews.4.t: "Афганистан вторгается в Пакистан"
 AfghanistanNews.4.d: "Стремясь закрепить свои притязания, Афганистан пошел по более прямому пути, чтобы получить часть земли. Действуя во имя безопасности пуштунов, они начали перебрасывать войска через границу в Пакистан."
 AfghanistanNews.4.a: "Тревожное развитие событий"
 AfghanistanNews.5.t: "Талибы объединяют силы"
 AfghanistanNews.5.d: "Афганские и пакистанские талибы решили объединить усилия для совместной борьбы с общими угрозами. Это большой сдвиг баланса сил в Центральной Азии."
 AfghanistanNews.5.a: "Тревожно"
 AfghanistanNews.6.t: "Убийство Ахмада Шаха Масуда"
 AfghanistanNews.6.d: "Ахмад Шах Масуд, главный лидер афганского сопротивления Талибану, был убит Аль-Каидой. Двое членов Талибана, выдавая себя за журналистов, взорвали взрывчатку, спрятанную в их оборудовании. Масуд был тяжело ранен и эвакуирован на военном вертолете, но он умер от ран, не доехав до больницы.\n\nИзвестный как Лев Панджшера, Масуд был символом сопротивления сначала советской оккупации, а затем Талибану."
 AfghanistanNews.6.a: "Потеря"
 Afghanistan.2.t: "Администрация Карзая"
 Afghanistan.2.d: "По американскому приказу Хамид Карзай, консервативный лидер сил Антиталибского Северного альянса, вступил в должность президента Афганистана."
 Afghanistan.2.a: "Первый шаг к независимости."
 Afghanistan.3.t: "Убийство Ахмад шаха Масуда"
 Afghanistan.3.d: "Ахмад Шах Масуд, Лев Панджшира, сегодня стал целью суицидального террориста. Два члена Талибана, притворявшиеся журналистами, взорвали спрятанные в камере и аккумуляторе взрывные устройства. Масуд был тяжело ранен и немедленно эвакуирован с места происшествия на военном вертолёте."
 Afghanistan.3.a: "Помолимся Аллаху, чтобы он выжил"
 Afghanistan.4.t: "США оказывают свое влияние..."
 Afghanistan.4.d: "Когда Талибы потерпели поражение, США использовали влияние, чтобы повлиять на решения Лойя Джирги. Сформирована новая временная администрация."
 Afghanistan.4.a: "Чем они лучше Талибов?"
 AfghanistanHostageCrisis.1.t: "Южнокорейские миссионеры взяты в заложники талибами"
 AfghanistanHostageCrisis.1.d: "Сегодня группа южнокорейских миссионеров, путешествовавших по провинции Газни, была захвачена боевиками Талибана и удерживается в заложниках. Они требуют освобождения пленных и вывода всех южнокорейских солдат из Афганистана. \n\nНаш военный советник предложил направить группу для освобождения заложников, и южнокорейская делегация направила представителя для переговоров."
 AfghanistanHostageCrisis.1.a: "Мы не можем доверять талибам, отправим группу для спасения"
 AfghanistanHostageCrisis.1.b: "Безопасность заложников - наш приоритет, отправим представителя"
 AfghanistanHostageCrisis.2.t: "Заложники спасены"
 AfghanistanHostageCrisis.2.d: "Нашим спецназовцам удалось проникнуть в убежище талибов и сопроводить заложников на ближайший военный пост. \n\nМиссионеры вернутся в Южную Корею, а наши солдаты получают похвалу от СМИ."
 AfghanistanHostageCrisis.2.a: "Миссия завершена"
 AfghanistanHostageCrisis.3.t: "Заложники убиты во время попытки спасения"
 AfghanistanHostageCrisis.3.d: "Талибы заметили, как наши спецназовцы вошли в их укрытие, и немедленно казнили заложников.\n\nПосле боя наши солдаты смогли покинуть здание без заложников."
 AfghanistanHostageCrisis.3.a: "Миссия провалена"
 AfghanistanHostageCrisis.4.t: "Талибан требует освобождения заключенных"
 AfghanistanHostageCrisis.4.d: "Представитель вернулся с требованиями Талибов, главным требованием которых является освобождение всех заключенных талибов из североамериканских тюрем."
 AfghanistanHostageCrisis.4.a: "Просить об освобождении заключенных"
 AfghanistanHostageCrisis.4.b: "Мы не будем освобождать военных преступников!"
 AfghanistanHostageCrisis.5.t: "Талибан требует вывода южнокорейских войск."
 AfghanistanHostageCrisis.5.d: "Талибы потребовали вывода всех наших сил и выплаты выкупа за освобождение наших граждан."
 AfghanistanHostageCrisis.5.a: "Мы должны принять"
 AfghanistanHostageCrisis.5.b: "Мы не будем вести переговоры с террористами!"
 AfghanistanHostageCrisis.6.t: "США отклоняют нашу просьбу"
 AfghanistanHostageCrisis.6.d: "Представители вооруженных сил США отклонили нашу просьбу освободить заключенных талибов из военных тюрем \n\nДжихадисты отреагировали убийством двух заложников, прежде чем выдвинуть новые требования, правительство Северной Кореи также призвало освободить заложников."
 AfghanistanHostageCrisis.6.a: "Как талибы отреагируют на это?"
 AfghanistanHostageCrisis.7.t: "Афганское правительство отвергает требование талибов"
 AfghanistanHostageCrisis.7.d: "Представители афганского правительства отвергли требования Талибана как невыполнимые, джихадисты отреагировали убийством двух заложников, прежде чем выдвинуть новые требования, правительство Северной Кореи также призвало освободить заложников."
 AfghanistanHostageCrisis.7.a: "Варварство"
 AfghanistanHostageCrisis.8.t: "Южная Корея выводит войска из Афганистана."
 AfghanistanHostageCrisis.8.d: "После кризиса с заложниками в Афганистане правительство Южной Кореи согласилось на требования «Талибана» и начало вывод своих войск. \n\nТалибы объявили о выплате выкупа в размере двадцати миллионов долларов, однако южнокорейская сторона не сделала никаких заявлений."
 AfghanistanHostageCrisis.8.a: "Афганистан продолжает дестабилизировать ситуацию"
 AfghanistanHostageCrisis.9.t: "Южнокорейские заложники казнены"
 AfghanistanHostageCrisis.9.d: "После кризиса с заложниками в Афганистане правительство Южной Кореи отклонило все требования «Талибана», а затем объявило, что все заложники были убиты."
 AfghanistanHostageCrisis.9.a: "Еще жертвы афганского конфликта"
 ContactIran.0.t: "Афганистан призывает свой народ вернуться"
 ContactIran.0.d: "Наши бригады Фатемиюн растут в Иране, и они состоят из афганских мужчин-хазарейцев-шиитов, Афганистан просит их вернуться на родину, чтобы они могли помочь стране, в которой они живут уже несколько тысячелетий."
 ContactIran.0.a: "Пусть они объединятся со своими землями."
 ContactIran.0.b: "Нет, нам нужна рабочая сила."
 ContactIran.1.t: "Иран отказывается отправить нашу Хазару Фатемиюн"
 ContactIran.1.d: "После запроса [PER.GetName] отправить Фатемиюн обратно для помощи в [AFG.GetName] и в результате интенсивного общения между нашими двумя народами иранцы решили отклонить просьбу наших мужчин-хазарейцев."
 ContactIran.1.a: "Аллаху виднее!"
 ContactIran.2.t: "Иран принимает наш призыв к Хазарской Фатемиюн"
 ContactIran.2.d: "[PER.GetName] принял нашу просьбу о возвращении наших хазарейских солдат, чтобы они могли оказать помощь и вернуться на родину. Пять дивизий уже в пути, высоко подняв флаги и скандируя: «Зиндабад Хазаристан!»"
 ContactIran.2.a: "Харакат!"
 ContactIran.3.t: "Афганистан просит о вступлении в Ось Сопротивления"
 ContactIran.3.d: "Хазары-шииты Афганистана просят присоединиться к Оси Сопротивления, после захвата хазарами Афганистана они теперь просят членства в нашем сопротивлении."
 ContactIran.3.a: "Пусть Хорасан объединится!"
 ContactIran.3.b: "Мы не принимаем запрос."
 ContactIran.4.t: "Иран принимает нашу просьбу присоединиться к их фракции"
 ContactIran.4.d: "[PER.GetName] принял наш запрос о вступлении в Ось Сопротивления. Вместе мы сильнее!"
 ContactIran.4.a: "Аллах Акбар!"
 ContactIran.5.t: "Иран отказывается"
 ContactIran.5.d: "[PER.GetName] отклонил наш запрос о членстве в Оси Сопротивления. Мы больше не должны полагаться на них."
 ContactIran.5.a: "Грустно"
 ContactIran.6.t: "Хазары Афганистана объявляют Хазаристан"
 ContactIran.6.d: "Этим утром Карим Халили, хазарский политик Афганистана, провозгласил свое собственное государство. После их успехов в стране с быстрыми реформами и приверженностью шиитскому исламу сотни тысяч хазарейцев вышли на улицы Кабула, Бамиана, Мазари-Шарифа и других городов. Герат, чтобы отпраздновать провозглашение Хазаристана."
 ContactIran.6.a: "Интересно"
 Cameroon.1.t: "Извержение горы Камерун"
 Cameroon.1.d: "Гора Камерун, вулкан высотой 4040 метров, является самой высокой точкой Центральной Африки и одним из самых активных вулканов Африки.\n\nИзвергнувшись уже в 1999 году, жители окрестностей горы Камерун были удивлены, когда 28 мая 2000 года вулкан, который местные жители называют Монго ма Ндеми (\"Гора величия\"), вновь извергся на несколько месяцев в результате бурной деятельности."
 Cameroon.1.a: "Это навредит региону."
 Cameroon.1.b: "Окажите всю необходимую помощь!"
 diplomatic_response.1.t: "[FROM.GetName] принимает!"
 diplomatic_response.1.d: "Делегации [This.GetAdjective] и [FROM.GetAdjective] достигли взаимного соглашения в ходе последних переговоров. [FROM.GetName] готов поддержать наше предложение."
 diplomatic_response.1.o1: "Отлично."
 diplomatic_response.2.t: "[FROM.GetName] отклоняет!"
 diplomatic_response.2.d: "После нескольких ночей и ожесточенных споров по мелким деталям и важным вопросам последняя волна переговоров между делегациями [This.GetName] и [FROM.GetName] провалилась. Наше предложение в ближайшее время не будет реализовано."
 diplomatic_response.2.d1: "[FROM.GetNameWithFlag] решил отклонить нашу просьбу о спасении. Это сделает нашу надвигающуюся катастрофу еще более опасной..."
 diplomatic_response.2.o1: "Ну что ж."
 diplomatic_response.3.t: "[FROM.GetName] сворачивается!"
 diplomatic_response.3.d: "Неудивительно, что делегации [FROM.GetAdjective] вскоре убедились в нашей подавляющей мощи и подчинились нашим требованиям. Мы получили то, чего хотели."
 diplomatic_response.3.o1: "Отлично!"
 diplomatic_response.4.t: "[FROM.GetName] бросает нам вызов!"
 diplomatic_response.4.d: "Мы знали, что некоторые [FROM.GetAdjective] люди — идиоты, но их главные посланники в последние дни переговоров пополнили ряды идиотов. Они ослушались нас, отвергли наши требования и отправили наших посланников домой.\n\nЭти дураки."
 diplomatic_response.4.o1: "Они будут знать последствия."
 LibyaNews.1.t: "Вторая Гражданская война в Ливии подходит к концу"
 LibyaNews.1.GNA.d: "Вторая гражданская война в Ливии началась в 2014 году после того, как ливийская армия под командованием генерала Халифы Хафтара свергла правящее правительство, отказавшееся уйти в отставку после поражения на выборах 2014 года. Сторонники правительства сформировали новую фракцию — Правительство национального спасения, что привело к новой гражданской войне. В 2015 году при посредничестве ООН было заключено перемирие между двумя фракциями и сформировано новое совместное правительство — Правительство национального согласия. Однако всего год спустя мир был нарушен, и в стране началась трехсторонняя гражданская война.\n\n Похоже, что поддерживаемому международным сообществом Правительству национального согласия удалось подавить мятежи и объединить страну, несмотря на отсутствие поддержки со стороны ливийских вооруженных сил. Это признание со стороны ЕС и большей части западного мира существенно меняет баланс сил в регионе."
 LibyaNews.1.HOR.d: "Вторая гражданская война в Ливии началась в 2014 году после того, как ливийская армия под командованием генерала Халифы Хафтара свергла правящее правительство, отказавшееся уйти в отставку после поражения на выборах 2014 года. Сторонники правительства сформировали новую фракцию — Правительство национального спасения, что привело к новой гражданской войне. В 2015 году при посредничестве ООН было заключено перемирие между двумя фракциями и сформировано новое совместное правительство — Правительство национального согласия. Однако всего год спустя мир был нарушен, и в стране началась трехсторонняя гражданская война.\n\n Похоже, что Палате представителей при поддержке генерала Хафтара, ливийских военных и многих сторонников Каддафи удалось узаконить свою власть в стране. Хафтар, которого снабжает и поддерживает Россия, пообещал выделить землю для двух российских военных баз в стране. Это приведет к усилению влияния России в Северной Африке."
 LibyaNews.1.GNC.d: "Вторая гражданская война в Ливии началась в 2014 году после того, как ливийская армия под командованием генерала Халифы Хафтара свергла правящее правительство, отказавшееся уйти в отставку после поражения на выборах 2014 года. Сторонники правительства сформировали новую фракцию — Правительство национального спасения, что привело к новой гражданской войне. В 2015 году при посредничестве ООН было заключено перемирие между двумя фракциями и сформировано новое совместное правительство — Правительство национального согласия. Однако всего год спустя мир был нарушен, и в стране началась трехсторонняя гражданская война.\n\n Казалось, что, несмотря ни на что, победу одержало Правительство национального спасения. Многие эксперты утверждают, что эта победа была бы невозможна без серьезной поддержки со стороны иностранных игроков. Кто эти игроки, остается неясным."
 SierraLeoneNews.1.t: "Гражданская война в Сьерра-Леоне"
 SierraLeoneNews.1.SIE.d: "Правительство Сьерра-Леоне объявило сегодня об официальной победе над повстанцами. При поддержке Гвинеи, Соединенного Королевства и сил UNAMSIL повстанцы RUF и AFRC либо сдались, либо бежали в соседнюю Либерию. Лидер RUF, [AFR.GetLeader], был найден в своем укрытии и арестован, а затем передан под стражу британскому SAS.\n\nВ настоящее время он ожидает суда, поскольку ООН обвиняет его в многочисленных военных преступлениях."
 SierraLeoneNews.1.AFR.d: "Несмотря на помощь британских и ооновских войск, правительственные силы Сьерра-Леоне были полностью выбиты из столицы Фритауна. Некоторые члены правительства успели эвакуироваться в Нигерию. Другие, которым не повезло попасть в плен к повстанцам, были немедленно расстреляны и проведены по улицам Фритауна.\n\nНесколько дней грабежей прошли после падения правительства, пока повстанцы по всей стране празднуют свою победу.\n\nСтрана, скорее всего, погрузится в анархию и хаос, поскольку у ополченцев больше нет других врагов, кроме местного населения."
 SierraLeoneNews.1.a: "Интересная разработка"
 SierraLeone.2.t: "Наши союзники в Сьерра-Леоне пали"
 SierraLeone.2.d: "Правительство Сьерра - Леоне сдалось повстанцам. Похоже, нашего вмешательства было недостаточно, чтобы спасти их. Мы можем продолжать борьбу с AFRC, но это будет означать, что нам придется продвигаться вглубь страны, чтобы восстановить законное правительство. С другой стороны, может быть, лучше отступить из Сьерра-Леоне."
 SierraLeone.2.a: "Попробуйте договориться о мире"
 SierraLeone.2.b: "Мы должны изгнать их из Сьерра-Леоне"
 SierraLeone.3.t: "Правительство Гвинеи призывает к перемирию"
 SierraLeone.3.d: "Гвинейское правительство связалось с нами, сказав, что они хотят прекратить боевые действия между нами и ними и уйти из Сьерра-Леоне. Как мы должны реагировать?"
 SierraLeone.3.a: "Перестаньте с ними бороться"
 SierraLeone.3.b: "Продолжайте бороться с ними"
 SierraLeone.4.t: "AFRC соглашается на перемирие"
 SierraLeone.4.d: "Сьерра-Леонские повстанцы согласились на прекращение огня."
 SierraLeone.4.a: "Хорошо"
 SierraLeone.5.t: "AFRC продолжает борьбу"
 SierraLeone.5.d: "Сьерра-Леонские повстанцы отклонили наше предложение и хотят продолжать сражаться с нами."
 SierraLeone.5.a: "Черт"
 LiberiaNews.1.t: "Вторая Либерийская гражданская война заканчивается"
 LiberiaNews.1.LIB.d: "Сегодня Чарльз Тейлор, диктатор и президент Либерии, объявил о завершении действий LURD в Либерии. Несмотря на то, что армия Либерии находится в упадке, а основную работу выполняли антитеррористические подразделения Тейлора, LURD вместе с гвинейскими союзниками не смогли свергнуть его правительство. Оставшиеся повстанцы пересекли границу и бежали в Гвинею. Вероятно, Тейлор продолжит конфликт с Гвинеей до полного подавления оппозиции."
 LiberiaNews.1.LUR.d: "Сегодня в телеэфире Чарльз Тейлор объявил о своей отставке с поста президента Либерии. Вскоре после этого он сел в самолет и улетел в Нигерию, а повстанцы из Движения за демократию Либерии танцевали на улицах Монровии. Интерпол выдал ордер на арест Тейлора по подозрению в военных преступлениях. Однако правительство Нигерии отказалось депортировать Тейлора, пока об этом не попросит новое правительство Либерии.\n\nНовое правительство Либерии все еще находится в процессе реорганизации, и потребуется время, чтобы оно укрепило свои позиции в Монровии, а затем и в остальной части страны."
 LiberiaNews.1.a: "Интересно"
 Liberia.2.t: "Наши союзники в Либерии пали"
 Liberia.2.d: "Правительство Тейлора изгнало повстанцев LURD из Либерии. Несмотря на предоставление им оружия и помощи и разрешение беспрепятственно пересечь границу, повстанцев было недостаточно, чтобы одолеть правительство Тейлора. Мы можем усилить наши военные операции и попытаться избавиться от Тейлора сами, или мы можем вообще отступить из Либерии."
 Liberia.2.a: "Попробуйте договориться о мире"
 Liberia.2.b: "Нам нужно свергнуть Тейлора"
 Liberia.3.t: "Правительство Гвинеи призывает к перемирию"
 Liberia.3.d: "Гвинейское правительство связалось с нами и заявило, что хочет прекратить боевые действия между нами и уйти из Либерии. Как мы должны реагировать?"
 Liberia.3.a: "Прекратить борьбу с ними"
 Liberia.3.b: "Продолжить борьбу с ними"
 Liberia.4.t: "Тейлор соглашается на перемирие"
 Liberia.4.d: "Правительство Тейлора согласилось на прекращение огня."
 Liberia.4.a: "Хорошо"
 Liberia.5.t: "Тейлор продолжает сражаться"
 Liberia.5.d: "Чарльз Тейлор отклонил наше предложение, и они хотят продолжать сражаться с нами"
 Liberia.5.a: "Черт"
 SudanNews.1.t: "Конфликт в Южном Кордофане и Голубом Ниле завершился"
 SudanNews.1.a: "Интересно"
 SouthSudan.2.t: "Суданские повстанцы на Востоке"
 SouthSudan.2.d: "На протяжении всего конфликта в Судане Эритрея укрывала несколько повстанческих группировок внутри своих границ, позволяя им атаковать нашу территорию на востоке. Похоже, что эти повстанцы, называющие себя «Восточным фронтом», объединились с [SSU.GetNameDef]. Это позволило им организовать более масштабную атаку, целью которой стал наш торговый центр в Порт-Судане."
 SouthSudan.2.a: "Будь прокляты эритрейцы!"
 SouthSudan.3.t: "Суданские повстанцы в Голубом Ниле"
 SouthSudan.3.d: "С приходом Менгисту к власти в [ETH.GetName] он однажды выступил против начала поддержки НОАС. Найдя антиправительственных сторонников среди суданских беженцев, живущих в [ETH.GetName], он вместе с НОАС вооружил этих людей и отправил их через границу в Голубой Нил."
 SouthSudan.3.a: "Будь прокляты эфиопы!"
 SouthSudan.4.a: "Отправьте нашу армию через границу!"
 SouthSudan.4.b: "Мы не можем рисковать"
 SouthSudanNews.1.t: "[SSU.GetAdjective] Гражданская война заканчивается"
 SouthSudanNews.1.a: "Интересно"
 SouthSudanNews.2.a: "Интересно"
 AngolaNews.1.t: "Ангольское окончание гражданской войны"
 AngolaNews.1.AGL.d: "Гражданская война в Анголе подошла к концу. Ведущийся с 1970-х годов конфликт велся между двумя бывшими союзниками по борьбе за независимость — МПЛА и УНИТА.\n\nМПЛА, союзник бывшего Советского Союза, сумела одержать верх и победить УНИТА."
 AngolaNews.1.UNI.d: "Гражданская война в Анголе подошла к концу. Ведущийся с 1970-х годов конфликт велся между двумя бывшими союзниками по борьбе за независимость — МПЛА и УНИТА.\n\nУНИТА, поддерживаемая Соединёнными Штатами, сумела одержать верх и победить МПЛА."
 AngolaNews.1.a: "Интересно"
 Angola_Civil_War_Over: "Гражданская война в Анголе завершена"
 DRC.0.t: "Лоран-Дезире Кабила убит!"
 DRC.0.d: "Наш лидер и освободитель Лоран Дезире подвергся нападению сегодня в президентском дворце, его плохие отношения с военными и попытки очистить нелояльного Кадогоса, очевидно, потерпели ужасный провал, мы попытались доставить его в Хараре для оказания срочной медицинской помощи, но было слишком поздно, наш освободитель лежит мертвый.С тех пор мы нашли и казнили преступника Рашиди Касереку за его преступления"
 DRC.0.A: "Черный день."
 overlord.1.t: "Интеграция [FROM.GetName]"
 overlord.1.d: "[FROM.GetName] слишком долго был нашим марионеточным государством. Это уже не жизнеспособное партнерство, позволяющее им иметь автономию. В этот день в [GetYear] отмечает день, о котором мы давно мечтали. [FROM.GetName] был интегрирован в нашу великую нацию. Теперь они станут [ROOT.GetAdjective] граждане и получают такую же заботу и лечение, как и любой другой гражданин нашей страны. Это славный день для нас и народа [FROM.GetName].\nВажно: Аннексия другой суверенной страны заставляет нас взять на себя все их долги, казначейство и международные инвестиции, поскольку они становятся нашим регионом.\n\nВы получаете следующее: [?ROOT.treasury|Y] Казна, [?ROOT.debt|R] Долг, [?ROOT.int_investments] международные инвестиции"
 overlord.1.a: "Отлично"
 overlord.1.a_tt: "Мы получим §Yвсю§! §B[FROM.GetName]§!\n"
 overlord_news.1.t: "[ROOT.GetName] интегрирует [FROM.FROM.GetName]"
 overlord_news.1.d: "Делегации из [ROOT.GetName] и [FROM.FROM.GetName] объявили сегодня, что [FROM.FROM.GetName] будет интегрирован(-а) в [ROOT.GetName]. [FROM.FROM.GetName] уже давно является автономным государством и в последние месяцы всё больше зависел от [ROOT.GetName]. Обе стороны заявили: «Это вполне логично!»\n\nПравда ли это - ещё предстоит выяснить.."
 overlord_news.1.a: "Интересно"
 AIDS_events.1.t: "Распространенность ВИЧ увеличивается"
 AIDS_events.1.d: "Плохие новости на фронте здравоохранения в стране. В прошлом году наблюдался значительный рост случаев заражения ВИЧ, и в целом общая ситуация с ВИЧ в нашей стране ухудшилась"
 AIDS_events.1.a: "Черт"
 AIDS_events.2.t: "Распространенность ВИЧ нормализуется"
 AIDS_events.2.d: "Похоже, что наша борьба с ВИЧ приносит свои плоды. В прошлом году распространенность ВИЧ в нашей стране практически не изменилась. Хотя это и не улучшение, но все же прогресс"
 AIDS_events.2.a: "Какое облегчение"
 AIDS_events.3.t: "Распространенность ВИЧ снижается"
 AIDS_events.3.d: "Хорошие новости на фронте здравоохранения в стране. В прошлом году произошло значительное снижение случаев заражения ВИЧ, и в целом общая ситуация с ВИЧ в нашей стране значительно улучшилась"
 AIDS_events.3.a: "Великолепно"
 debug_money.1.t: "Калькулятор стоимости продажи ресурсов"
