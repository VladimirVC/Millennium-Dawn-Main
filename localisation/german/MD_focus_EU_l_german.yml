 eu_gui_tooltip: "§C[EUU.GetFlag][EUU.GetName]§! Oberfläche"
 eu_gui_tooltip_delayed: "Öffnet den Bildschirm mit allen Informationen über §C[EUU.GetFlag][EUU.GetName]§!, einschließlich des Europäischen Parlaments, der Amtsträger der Europäischen Union, des Rates der Europäischen Union und des EU-Haushalts."
 fiscal_button_title: "Central Bank"
 fiscal_button_desc: "The budget of §C[EUU.GetFlag][EUU.GetName]§!. The screen handles everything that includes the Multiannual Financial Framework and the Budget of the next fiscal year."
 euro_voting_button_title: "Council"
 euro_voting_button_desc: "Der Rat der Europäischen Union ist das zweite gesetzgebende Organ von §C[EUU.GetFlag][EUU.GetName]§! in Millennium Dawn. Der Rat vertritt die Mitgliedstaaten im Gesetzgebungsverfahren. Alle aktuell verabschiedeten Gesetze, Entwürfe und die Liste der abstimmenden Mitglieder von §C[EUU.GetFlag][EUU.GetName]§! sind hier aufgeführt.\n\nDer Rat der EU arbeitet mit qualifizierter Mehrheit (QMV), auch bekannt als doppelte Mehrheit. Es werden 55% der §CMitgliedstaaten§! und 65% §CMitgliedstaaten§! der EU-Bevölkerung benötigt."
 parliament_button_title: "Parlament"
 parliament_button_desc: "Das Europäische Parlament ist das erste gesetzgebende Organ von §C[EUU.GetFlag][EUU.GetName]§! in Millennium Dawn. Es ist die erste Instanz, in der Gesetze zur Abstimmung gestellt werden können, um Rechtsakte der EU zu werden.\n\nDer Spieler hat 14 Tage Zeit, um die Mission abzuschließen (siehe Entscheidungen), indem er die Mehrheit der Mitglieder des Europäischen Parlaments (MdEPs) für sich gewinnt. Nach Verabschiedung durch das Parlament geht das Gesetz an den Rat der EU."
 EU_europeanism_screen_title: "Euro-Info"
 EU_europeanism_screen_desc: "Der Euro-Info-Reiter enthält Informationen über die EU wie die Mitgliedstaaten, deren Bevölkerungen, deren Bevölkerungsanteile sowie Werte für Euroskeptizismus und Europäismus."
 EU_offices_screen_title: "Ämter"
 EU_offices_screen_desc: "Die Ämter von §C[EUU.GetFlag][EUU.GetName]§!. Die Ämter von §C[EUU.GetFlag][EUU.GetName]§! sind Positionen, die von Mitgliedstaaten der Europäischen Union besetzt werden können."
 eu_sec_general_euro_navy_tip: "§YPrerequisites:§!\n[!eu_sec_general_euro_navy_back_click_enabled]"
 eu_sec_general_euro_army_tip: "§YPrerequisites:§!\n[!eu_sec_general_euro_army_back_click_enabled]"
 eu_minister_economy_finance_tip: "§YPrerequisites:§!\n[!eu_minister_economy_finance_back_click_enabled]"
