 HOL_voc_saf_aids_support: "Кампания против СПИДа в §Y[SAF.GetNameWithFlag]§!"
 faction_manifest_hol_germanic_union: "Мы, сыны и дочери древнего Севера, провозглашаем возрождение Германского Братства – союза, не знающего границ, скреплённого духом и наследием. В эпоху упадка, лишенного корней, мы восстаём, чтобы восстановить достоинство наших родственных народов, связанных языком, культурой и вечным зовом наших предков. Мы отвергаем разделение, коррупцию и слабость навязанных империй. Наша преданность не нациям, а непреходящей сути германской души. От фьордов до лесов, от низин до гор, мы объединяемся в единой живой воле, чтобы сохранить, укрепить и пробудить дух, некогда определявший судьбу Европы."
 HOL_restoring_royal_authority_nationalist: "Восстановление Королевской власти"
 HOL_restoring_royal_authority_nationalist_desc: "Возвращение монархии на ее законное место не обошлось без проблем. Бюрократическая неэффективность и политическая нестабильность преследуют нацию, поскольку традиционные институты изо всех сил пытаются восстановить контроль. Тем не менее, со временем и усилиями королевская власть может вновь восстановить единство и силу голландского государства."
 HOL_wic_war_preparations: "Оживите Грут Дессейн"
 HOL_wic_war_preparations_desc: "Вдохновленные \"Грут Дессейн\", амбициозным планом 17 века по установлению господства Нидерландов в Америке и Африке, мы должны готовиться к войне за восстановление наследия Вест-Индской компании. Мобилизуя наши силы и обеспечивая безопасность жизненно важных территорий, мы можем реализовать видение глобального доминирования Нидерландов и вернуть себе место морской державы."
 HOL_wic_war_preparations_tt: "Откроется после выбора §Yстратегии Грута Дессейна§! для §YWIC§!"
 HOL_focus_can_only_be_completed_by_coalition_tt: "Этот фокус может быть запущен только §Y$CHARACTER$§! членами нашей коалиции"
 HOL_oranje_nassau-mines: "Возобновление работы рудников Оранье-Нассау"
 HOL_oranje_nassau-mines_desc: "Угольные шахты Оранье-Нассау в Херлене были последними голландскими угольными шахтами, закрытыми в 1974 году в рамках перехода к национальной энергетике. Их повторное открытие восстанавливает внутреннее сырье для производства стали и алюминия, снижая зависимость от импорта за счет увеличения воздействия углерода."
 HOL_military.114.t: "Нидерланды присоединяются к программе F-35"
 HOL_military.114.d: "Нидерланды официально приняли участие в программе Joint Strike Fighter, приобретя F-35 Lightning II в качестве многоцелевого истребителя следующего поколения. Это углубляет трансатлантические оборонные связи и укрепляет оперативную совместимость НАТО."
 HOL_military.114.a: "Желанный партнер в программе."
 HOL_military.115.t: "Продолжаются закупки голландских истребителей F-35"
 HOL_military.115.d: "Нидерланды инициировали переговоры о закупке истребителей F-35 Lightning II. Окончательные сроки поставки зависят от графика разработки программы, но это обязательство знаменует собой значительный шаг в модернизации ВВС Нидерландов."
 HOL_military.115.a: "Мы продолжим, когда самолет будет готов."
 BEL_referendum_mission: "Бельгийский референдум"
 BEL_referendum_mission_desc: "Бельгия согласилась провести референдум о будущем страны. Результат определит, останется ли Бельгия единым государством или будет поглощена Нидерландами."
