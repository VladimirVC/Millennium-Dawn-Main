 gdp_kaz_600_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y599§!億ドル)"
 gdp_uzb_100_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y99§!億ドル)"
 gdp_uzb_150_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y149§!億ドル)"
 gdp_uzb_200_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y199§!億ドル)"
 gdp_uzb_250_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y249§!億ドル)"
