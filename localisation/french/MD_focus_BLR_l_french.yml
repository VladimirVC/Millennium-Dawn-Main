 belarus_character.1.t: "Era of Lukashenko"
 belarus_character.1.d: "Alexander Grigoryevich Lukashenko has come a long way from an ordinary deputy to the President of the country. Despite having only recently begun to rule Belarus, many influential forces are already dreaming of his overthrow. Will he find a better way for Belarus, or will he become another dictator clinging to power for life?"
 belarus_character.1.a: "Notre mère Batka Loukachenko, Biélorussie"
 belarus_character.2.t: "Biélorussie libérale et démocratique"
 belarus_character.2.d: "Sergey Gaidukevich is an extraordinary person with an interesting past and strong views on the future of Belarus. He is clearly regarded as a pro-Russian politician, but will he live up to that reputation?"
 belarus_character.2.a: "La Biélorussie est avant tout"
 belarus_character.3.t: "La Voie européenne de Biélorussie"
 belarus_character.3.d: "Belarus has finally rejected the Soviet past and moved toward a bright European future. But we must decide which path we will take into this new era."
 belarus_character.3.a: "Le libéralisme est notre voie"
 belarus_character.3.b: "Le conservatisme est notre tout"
 belarus_character.4.t: "Les nationalistes en Biélorussie"
 belarus_character.4.d: "Zenon Poznyak, who has come to power, has long been known for his anti-Russian rhetoric. His central belief is that Russia has suppressed Belarusians throughout history. He intends to end this and possibly avenge it."
 belarus_character.4.a: "Les Biélorusses ne sont pas des Russes"
 belarus_character.5.t: "Biélorussie rouge"
 belarus_character.5.d: "Belarus's desire to gradually move away from the Soviet past has ultimately dragged it back into the clutches of Communism. People remember the good times of the USSR and have apparently decided to bring them back."
 belarus_character.5.a: "Rendons l'héritage soviétique"
 belarus_ukraine.1.t: "Régiment Kastus Kalinovsky"
 belarus_ukraine.1.d: "Les Biélorusses nous envoient en renfort sous la forme d'un régiment entier. Ensemble, nous lutterons contre l'agression russe."
 belarus_ukraine.1.a: "À bas la Russie et ses ambitions impériales."
 belarus_ukraine.2.t: "Envoyer des volontaires en Nouvelle-Russie ?"
 belarus_ukraine.2.d: "Among the people, there are those who want to help the residents of Novorossiya in their struggle. We are ready to assist them."
 belarus_ukraine.2.a: "Envoyez les volontaires"
 belarus_ukraine.2.b: "Nous condamnons ceux qui vont en Nouvelle Russie en tant que volontaires parce que c'est illégal."
 belarus_ukraine.3.t: "La Biélorussie propose Minsk comme plate-forme pour des négociations de paix"
 belarus_ukraine.3.d: "La Biélorussie propose Minsk comme ville de négociation pour l'instauration de la paix en Ukraine. Accepterons-nous de conclure une trêve avec les séparatistes ?"
 belarus_ukraine.3.a: "La paix est notre objectif !"
 belarus_ukraine.3.b: "Nous rétablirons l’intégrité territoriale de l’Ukraine !"
 belarus_ukraine.4.t: "Opération spéciale en Ukraine"
 belarus_ukraine.4.d: "Russia has launched a special operation in Ukraine. Our leadership faces a choice — to participate or not. We have many obligations, but we should think carefully before getting involved in this carnage."
 belarus_ukraine.4.a: "L’Ukraine doit être libérée !"
 belarus_ukraine.4.b: "Nous ne participerons pas à cela"
 belarus_export.2.t: "Premiers échantillons du T-72BM1"
 belarus_export.2.d: "We have finally completed our modification of the T-72 tank. Now we will be able to produce it for the needs of our army."
 belarus_export.2.a: "Gloire aux armes biélorusses"
 belarus_export.3.t: "Premiers extraits de \"Belgrad\""
 belarus_export.3.d: "We have finally completed our modification of the BM-21. Now we will be able to produce it for the needs of our army."
 belarus_export.3.a: "Gloire aux armes biélorusses"
 belarus_export.4.t: "Premiers extraits de \"Polonez\""
 belarus_export.4.d: "We have finally completed our MLRS \"Polonez\". Now we will be able to produce it for the needs of our army."
 belarus_export.4.a: "Gloire aux armes biélorusses"
 belarus_export.6.t: "Belarus We Offer To Buy Tractors"
 belarus_export.6.d: "The Belarusian MTZ plant is offering us their newest tractor. It will be a great help in the development of our agro-industry."
 belarus_export.6.a: "Nous acceptons de les acheter"
 belarus_export.6.b: "Nous n'en avons pas besoin"
 belarus_export.7.t: "Nos tracteurs ont été achetés"
 belarus_export.7.d: "[FROM.GetNameWithFlag] has agreed to sign a contract with us for the supply of tractors."
 belarus_export.7.a: "Super"
 belarus_export.8.t: "Nos tracteurs ont décidé de ne pas acheter"
 belarus_export.8.d: "[FROM.GetNameWithFlag] refused to sign a contract with us for the supply of tractors."
 belarus_export.8.a: "Nuisible"
 belarus_export.9.t: "Contrat avec le Minotor biélorusse"
 belarus_export.9.d: "We have long wanted to cooperate with this Belarusian enterprise. They will repair our wheeled military equipment, which will greatly benefit us."
 belarus_export.9.a: "Très bien."
 belarus_export.10.t: "Contrat avec l'usine de réparation d'aéronefs 558"
 belarus_export.10.d: "Les ingénieurs biélorusses nous proposent leurs services pour la réparation d'équipements aéronautiques. Accepterions-nous de signer un contrat avec eux ?"
 belarus_export.10.a: "Bien sûr, c'est une bonne offre"
 belarus_export.10.b: "Non, nous refuserons leur offre"
 belarus_export.11.t: "Nouveau contrat avec l'usine de réparation d'avions 558"
 belarus_export.11.d: "[FROM.GetNameWithFlag] has signed a contract with the 558 Aircraft Repair Plant."
 belarus_export.11.a: "Super"
 belarus_export.12.t: "Le contrat avec l'usine de réparation d'avions 558 a été rejeté"
 belarus_export.12.d: "[FROM.GetNameWithFlag] refused the contract with the 558 Aircraft Repair Plant."
 belarus_export.12.a: "Nuisible"
 belarus_export.13.t: "Contrat avec la société Peleng"
 belarus_export.13.d: "La société biélorusse Peleng, spécialisée dans l'électronique, est prête à proposer ses services dans la fourniture de dispositifs de guidage pour les armes ATGM. Accepterons-nous ce contrat ?"
 belarus_export.13.a: "Bien sûr, c'est une bonne offre"
 belarus_export.13.b: "Non, nous refuserons leur offre"
 belarus_export.14.t: "Nouveau contrat avec la société Peleng"
 belarus_export.14.d: "[FROM.GetNameWithFlag] has signed a contract with Peleng on the supply of equipment for ATGMs."
 belarus_export.14.a: "Super"
 belarus_export.15.t: "Le contrat avec la société Peleng a été rejeté"
 belarus_export.15.d: "[FROM.GetNameWithFlag] refused a contract with Peleng on the supply of equipment for ATGMs."
 belarus_export.15.a: "Nuisible"
 belarus_export.16.t: "ATGM biélorusses"
 belarus_export.16.d: "Belarusian manufacturers want to offer us their ATGMs for delivery. Will we agree to accept this contract?"
 belarus_export.16.a: "Bien sûr, c'est une bonne offre"
 belarus_export.16.b: "Non, nous refuserons leur offre"
 belarus_export.17.t: "Vente d'ATGM"
 belarus_export.17.d: "The contract for the sale of our ATGMs to [FROM.GetNameWithFlag] has been concluded."
 belarus_export.17.a: "Super"
 belarus_export.18.t: "Vente d'ATGM"
 belarus_export.18.d: "The contract for the sale of our ATGMs to [FROM.GetNameWithFlag] was rejected."
 belarus_export.18.a: "Nuisible"
 belarus_export.19.t: "Châssis biélorusse"
 belarus_export.19.d: "Les constructeurs biélorusses sont prêts à proposer leurs châssis pour un certain nombre de nos équipements militaires. Accepterons-nous ce contrat ?"
 belarus_export.19.a: "Bien sûr, c'est une bonne offre"
 belarus_export.19.b: "Non, nous refuserons leur offre"
 belarus_export.20.t: "Contrat de fourniture de châssis"
 belarus_export.20.d: "They agreed to our contract for the supply of chassis."
 belarus_export.20.a: "Super"
 belarus_export.21.t: "Contrat de fourniture de châssis"
 belarus_export.21.d: "They decided to cancel our chassis supply contract."
 belarus_export.21.a: "Nuisible"
 belarus_export.22.t: "Projet conjoint APC"
 belarus_export.22.d: "[FROM.GetNameWithFlag] is offering us a joint APC project called Cobra-K. This project will bring us experience and knowledge in the modification of older equipment. Will we agree?"
 belarus_export.22.a: "Bien sûr, c'est une bonne offre"
 belarus_export.22.b: "Non, nous refuserons leur offre"
 belarus_export.23.t: "Projet conjoint APC"
 belarus_export.23.d: "[FROM.GetNameWithFlag] agreed to work on a joint modification of the APC."
 belarus_export.23.a: "Super"
 belarus_export.24.t: "Projet conjoint APC"
 belarus_export.24.d: "[FROM.GetNameWithFlag] refused to work on a joint modification of the APC."
 belarus_export.24.a: "Nuisible"
 belarus_export.25.t: "B-200 «Polonez»"
 belarus_export.25.d: "[FROM.GetNameWithFlag] nous propose d'acheter ses derniers MLRS. Accepterons-nous de les acheter ?"
 belarus_export.25.a: "Bien sûr, c'est une bonne offre"
 belarus_export.25.b: "Non, nous refuserons leur offre"
 belarus_export.26.t: "B-200 «Polonez»"
 belarus_export.26.d: "[FROM.GetNameWithFlag] has agreed to purchase our MLRS."
 belarus_export.26.a: "Super"
 belarus_export.27.t: "B-200 «Polonez»"
 belarus_export.27.d: "[FROM.GetNameWithFlag] refused to purchase our MLRS."
 belarus_export.27.a: "Nuisible"
 belarus_export.28.t: "Châssis biélorusse"
 belarus_export.28.d: "Les constructeurs biélorusses sont prêts à proposer leurs châssis pour un certain nombre de nos équipements militaires. Accepterons-nous ce contrat ?"
 belarus_export.28.a: "Bien sûr, c'est une bonne offre"
 belarus_export.28.b: "Non, nous refuserons leur offre"
 belarus_export.29.t: "Contrat de fourniture de châssis"
 belarus_export.29.d: "[FROM.GetNameWithFlag] agreed to our contract for the supply of chassis."
 belarus_export.29.a: "Super"
 belarus_export.30.t: "Contrat de fourniture de châssis"
 belarus_export.30.d: "[FROM.GetNameWithFlag] decided to cancel our chassis supply contract."
 belarus_export.30.a: "Nuisible"
 belarus_another.1.t: "La Biélorussie nous demande des investissements"
 belarus_another.1.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.1.a: "Bien sûr"
 belarus_another.1.b: "Non, désolé."
 belarus_another.2.t: "Guerre diplomatique polono-biélorusse"
 belarus_another.2.d: "Nos relations avec la Pologne ont commencé à se détériorer rapidement. La Biélorussie a accusé l'un des diplomates polonais de \"actions actives visant à déstabiliser la société biélorusse\". En réponse, la Pologne a préparé une liste de responsables biélorusses qui se verront interdire l'entrée sur le territoire polonais. La cause du conflit était l'association publique « Union des Polonais de Biélorussie », qui rassemblait environ 20 000 personnes. Lors du congrès de l'Union des Polonais de Biélorussie, son ancien dirigeant, fidèle aux dirigeants de la Biélorussie, a été démis de ses fonctions, après quoi l'Union des Polonais de Biélorussie a été soumise à des pressions massives de la part des autorités, qui ont accusé les dirigeants de la Pologne de financé le congrès de l'Union des Polonais de Biélorussie et l'ambassade de ce pays, des « activités subversives » contre la Biélorussie. Le ministère de la Justice de Biélorussie a refusé d'approuver les résultats du Congrès de l'Union des Polonais de Biélorussie, qui a élu Angelika Borys à la présidence. Le Sejm polonais a exprimé son mécontentement face aux actions des autorités biélorusses, perçues au Bélarus comme une tentative d'ingérence dans ses affaires intérieures. D'autres développements ont conduit à un conflit diplomatique."
 belarus_another.2.a: "Nous en avons assez des Polonais !"
 belarus_another.3.t: "L'uniatisme en Ukraine"
 belarus_another.3.d: "Uniatism has begun to spread actively across our territory, and many residents are demanding an official break with the Orthodox Church, which is subordinate to Moscow. Perhaps it is worth listening to them?"
 belarus_another.3.a: "L'uniatisme deviendra la religion d'État"
 belarus_another.3.b: "Tout restera comme avant"
 belarus_another.4.t: "La Biélorussie nous demande des investissements"
 belarus_another.4.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.4.a: "Bien sûr"
 belarus_another.4.b: "Non, désolé."
 belarus_another.5.t: "Décret numéro 3"
 belarus_another.5.d: "L'indignation du peuple face au décret n° 3 est très grande. Les gens exigent son annulation, ils exigent des indulgences. Sommes-nous d’accord pour les accompagner ?"
 belarus_another.5.a: "Nous n'annulerons pas le décret"
 belarus_another.5.b: "Je pense que nous sommes prêts à faire des concessions"
 belarus_another.7.t: "Investissements de la Biélorussie dans notre pays"
 belarus_another.7.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.7.a: "Nous signerons le contrat"
 belarus_another.7.b: "Nous refusons"
 belarus_another.8.t: "Projet BOMBEL"
 belarus_another.8.d: "The EU funds have been received. It is time for us to decide how to dispose of them."
 belarus_another.8.a: "Nous ferons ce que nous devons faire : nous renforcerons la frontière"
 belarus_another.8.b: "Je ne pense pas qu'ils remarqueront si nous prenons"
 belarus_another.9.t: "Investissements de la Biélorussie dans notre pays"
 belarus_another.9.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.9.a: "Nous signerons le contrat"
 belarus_another.9.b: "Nous refusons"
 belarus_another.10.t: "What Should We Do With PMC Wagner?"
 belarus_another.10.d: "We detained several suspicious people who later turned out to be mercenaries of the famous Russian PMC Wagner. Our law enforcement agencies are already ready to accuse them of preparing terrorism. The Russian side insists on their release. What will we do?"
 belarus_another.10.a: "Nous les libérerons et les remettrons à la partie russe."
 belarus_another.10.b: "Put them in jail and accuse them of preparing terrorist attacks"
 belarus_another.11.t: "Guerre civile en Biélorussie"
 belarus_another.11.d: "Our strongly anti-Russian rhetoric, the policy of imposing the Belarusian language, and the active promotion of a history that denies any connection with Russia have taken their toll. The eastern regions have revolted and local self-defense forces have seized power. We must stop this as soon as possible before the major powers can exploit it."
 belarus_another.11.a: "C'est une catastrophe !"
 belarus_another.12.t: "Le général Azarenok défend les intérêts russes dans notre pays"
 belarus_another.12.d: "Our law enforcement agencies have learned about the lobbying of Russian interests in our country through the connections of General Azarenka. Should we pay attention, or is it in the interests of the Republic of Belarus to let it continue?"
 belarus_another.12.a: "Bien sûr"
 belarus_another.12.b: "Il faut le mettre en prison"
 belarus_another.14.t: "Sergey Tikhanovsky"
 belarus_another.14.d: "A well-known opposition blogger critical of our government, he has started to have too much influence among the people and we need to do something about it."
 belarus_another.14.a: "Il faut le mettre en prison"
 belarus_another.14.b: "Leave him alone, he may still be useful to us"
 belarus_another.15.t: "Demandez l'aide du FMI"
 belarus_another.15.d: "We are forced to request assistance from the IMF to address the consequences of the crisis."
 belarus_another.15.a: "Nous avons pas le choix"
 belarus_another.16.t: "Resserrement de la politique de crédit"
 belarus_another.16.d: "The credit policy will undergo a sharp revision in connection with the current situation."
 belarus_another.16.a: "Nous avons pas le choix"
 belarus_another.17.t: "Coopération militaire avec la Biélorussie"
 belarus_another.17.d: "We have invited military specialists from Belarus to address the most important tasks in our army. The Belarusian special forces conducted training for our fighters, and the Belarusian military industry improved our air defense system."
 belarus_another.17.a: "Incroyable!"
 belarus_another.18.t: "Latgale ou la guerre"
 belarus_another.18.d: "Le gouvernement biélorusse devient de plus en plus agressif. Il nous a lancé un ultimatum : soit nous leur cédons la région de Latgale, soit les conséquences seront terribles pour notre pays. Une déclaration aussi inattendue nous a choqués. Que devons-nous faire ?"
 belarus_another.18.a: "Nous devrons leur remettre Latgale, ainsi au moins nous préserverons notre indépendance."
 belarus_another.18.b: "Aucune concession"
 belarus_another.19.t: "La deuxième Union de Lublin"
 belarus_another.19.d: "Belarus actively influences our government and holds significant leverage over it. Today, the Belarusian ambassador handed us a draft of a new agreement envisioning the creation of a supranational entity, similar to what Russia proposed for the Lukashenko government. In effect, we would be surrendering some of our autonomy, but our states would become nearly unified. Do we agree to this?"
 belarus_another.19.a: "Notre pays est affaibli, je pense que nous devrions être d'accord"
 belarus_another.19.b: "Notre indépendance est notre tout"
 belarus_another.20.t: "Signing the Contract"
 belarus_another.20.d: "Le gouvernement polonais a accepté de former une union avec nous ! C'est une victoire pour tout le peuple biélorusse !"
 belarus_another.20.a: "Eh bien, nous verrons"
 belarus_another.21.t: "La Pologne a refusé !"
 belarus_another.21.d: "The Polish government, which we have nurtured for so long, has betrayed us. Apparently we have no choice and must decide for ourselves what to do with these traitors. We may have to use all available leverage."
 belarus_another.21.a: "Let's make hell for the Poles"
 belarus_another.21.b: "Laissons les"
 belarus_another.22.t: "Milice silésienne"
 belarus_another.22.d: "Our people have a chance for independence. It is time to take advantage of it and take up arms!"
 belarus_another.22.a: "À bas l’oppression polonaise !"
 belarus_another.23.t: "Exercices conjoints avec la Biélorussie"
 belarus_another.23.d: "La Biélorussie nous propose de mener des exercices conjoints pour coordonner les combats de nos troupes. Accepterons-nous ?"
 belarus_another.23.a: "Bien sûr, nous serons d'accord"
 belarus_another.23.b: "Nous nous en passerons"
 belarus_another.24.t: "Exercices conjoints avec la Pologne"
 belarus_another.24.d: "They have agreed to conduct exercises with our troops. We will gain valuable experience."
 belarus_another.24.a: "Bien"
 belarus_another.25.t: "Fournir des armes à l'Irak"
 belarus_another.25.d: "We are ready to allocate part of our weapons stockpile for delivery to Iraq in support of the friendly regime there."
 belarus_another.25.a: "Bien"
 belarus_another.26.t: "Atterrir dans un avion de Ryanair avec Protasevich"
 belarus_another.26.d: "Our special services were able to intercept and force down the plane carrying the editor of the opposition channel NEXTA. His name is Roman Protasevich."
 belarus_another.26.a: "Bien"
 belarus_another.27.t: "Le sort de l'Église biélorusse"
 belarus_another.27.d: "Les dirigeants de notre pays ont sérieusement envisagé d'accorder l'autocéphalie à notre Église. Mais cette démarche risque certainement de gâcher les relations avec notre ami et voisin, la Russie. Allons-nous y aller ?"
 belarus_another.27.a: "Nous accordons l'autocéphalie à notre église"
 belarus_another.27.b: "Non"
 belarus_another.28.t: "Que faire de l’Union des Polonais de Biélorussie ?"
 belarus_another.28.d: "The Union of Poles of Belarus has long been our problem. Through it, Poland has exerted its influence on us with full force. It is time to deal with this. Either we leave them as they are, or we completely expel the Polish population."
 belarus_another.28.a: "Qu'ils restent sous notre contrôle"
 belarus_another.28.b: "Il n’y a pas de place pour les Polonais en Biélorussie"
 belarus_another.29.t: "Annulation du commerce de Chelnochnaya"
 belarus_another.29.d: "Through Russia and China, we have established supplies of the goods we need to finally get rid of this relic of the 90s."
 belarus_another.29.a: "Bien"
 belarus_another.30.t: "Annulation du commerce de Chelnochnaya"
 belarus_another.30.d: "Now that we have access to European goods through official channels, our citizens will not have to engage in this dangerous and sometimes unprofitable occupation."
 belarus_another.30.a: "Bien"
 belarus_another.31.t: "La guerre du lait"
 belarus_another.31.d: "Russia has boycotted the import of our dairy products, cutting us off from a significant share of our profits. Will we concede to their conditions, or will we protect the domestic producer?"
 belarus_another.31.a: "We stand firmly behind our manufacturers"
 belarus_another.31.b: "Cédons à leurs exigences"
 belarus_another.32.t: "Problème avec le Conseil suprême"
 belarus_another.32.d: "The Supreme Soviet remains a relic of the Soviet system, which we cannot legally eliminate without changing the constitution. Therefore, we will have to compromise with them until we finally resolve this issue."
 belarus_another.32.a: "Pour la gloire de la Biélorussie"
 belarus_another.33.t: "Crash d'avion en Ukraine"
 belarus_another.33.d: "A plane carrying Zenon on board and heading to Kyiv crashed in Ukraine. There were no survivors, and it became urgently necessary to decide who would take the post of leader of the state. The party deputy, Yuri Belenky, became the temporary and possibly permanent head."
 belarus_another.33.a: "Pour la gloire de la Biélorussie"
 belarus_another.34.t: "Taler biélorusse"
 belarus_another.34.d: "Belarus proposes to introduce a single currency on our territory — the Thaler, the same one used in Belarus. Perhaps a common currency will improve trade between our countries, but our independence will again come under threat."
 belarus_another.34.a: "Nous sommes d'accord"
 belarus_another.34.b: "Nous refusons"
 belarus_another.35.t: "Intermarium"
 belarus_another.35.d: "La Biélorussie nous propose de créer une alliance militaire, appelée Intermarium. En la créant, nous nous protégerons de l'agression de nos voisins plus grands."
 belarus_another.35.a: "Nous sommes d'accord"
 belarus_another.35.b: "Nous refusons"
 belarus_another.36.t: "La Biélorussie veut rejoindre l'OTAN"
 belarus_another.36.d: "La Biélorussie est depuis longtemps sur la voie de la démocratie et veut la défendre avec nous. Le gouvernement biélorusse a rempli toutes les conditions pour adhérer à l'OTAN et a déposé une demande d'adhésion à l'organisation. L'accepterons-nous ?"
 belarus_another.36.a: "Nous sommes d'accord"
 belarus_another.36.b: "Nous refusons"
 belarus_another.37.t: "Nous rejoignons l'OTAN"
 belarus_another.37.d: "Notre demande d’adhésion a été approuvée et nous faisons désormais partie de cette grande Alliance, prêts à défendre la démocratie dans le monde entier !"
 belarus_another.37.a: "Hourra"
 belarus_another.38.t: "La Biélorussie veut rejoindre l'USAID"
 belarus_another.38.d: "Le gouvernement biélorusse a envoyé une demande pour rejoindre le programme USAID. Sommes-nous prêts à y répondre positivement ?"
 belarus_another.38.a: "Nous acceptons leur demande"
 belarus_another.38.b: "Non"
 belarus_another.39.t: "Notre candidature a été acceptée par l'USAID."
 belarus_another.39.d: "Les États-Unis ont approuvé notre demande et nous faisons désormais partie du programme USAID."
 belarus_another.39.a: "Hourra !"
 belarus_another.40.t: "La crise économique de 2008 en Biélorussie."
 belarus_another.40.d: "Des phénomènes complexes se produisent dans l'économie du pays, indiquant la détérioration de la situation financière et économique du pays. En 2008, la crise financière a commencé en Biélorussie. Il faut maintenant choisir un domaine dans lequel nous allons réduire nos dépenses pour sauver le budget."
 belarus_another.40.a: "Réduire le contenu du système éducatif."
 belarus_another.40.b: "Réduire l’entretien du système de santé."
 belarus_another.40.c: "Réduire le contenu du système bureaucratique."
 belarus_another.41.t: "Opération « Nouveau Jour »"
 belarus_another.41.d: "Le gouvernement biélorusse nous propose une opération militaire conjointe contre la Lituanie afin de résoudre le problème du corridor de Suwalki. Acceptons-nous de prendre une mesure aussi dangereuse ?"
 belarus_another.41.a: "Nous devons sécuriser nos frontières."
 belarus_another.41.b: "Nous ne prendrons pas de risque."
 belarus_another.42.t: "La Biélorussie veut récupérer Vilnius."
 belarus_another.42.d: "Le gouvernement biélorusse a exprimé son souhait de transférer Vilnius et les territoires environnants sous son contrôle total. Son argument est basé sur le fait qu'il s'agit d'un territoire historique biélorusse. Sommes-nous d'accord ?"
 belarus_another.42.a: "Nous leur remettrons Vilnius, renforçant ainsi les liens amicaux"
 belarus_another.42.b: "Peut-être que nous le garderons pour nous"
 belarus_another.43.t: "Les résultats de la révolution du jean"
 belarus_another.43.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change and it is time to cede power to others?"
 belarus_another.43.a: "Jamais"
 belarus_another.43.b: "Apparemment, l’ère du changement est arrivée."
 belarus_another.44.t: "Manifestations de masse sous la direction de Tikhanovskaïa."
 belarus_another.44.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change, and it is time to cede power to others?"
 belarus_another.44.a: "Jamais"
 belarus_another.44.b: "Apparemment, l’ère du changement est arrivée."
 belarus_another.45.t: "Guerre civile en Biélorussie"
 belarus_another.45.d: "We could not keep the protesters in check, and now they have brought the country to complete chaos. What will happen next?"
 belarus_another.45.a: "C'est terrible !"
 belarus_another.46.t: "« Excursion à Varsovie »"
 belarus_another.46.d: "With the assistance of our border guards, PMC Wagner broke through the border of Poland and entered its territory. What no one expected has begun."
 belarus_another.46.a: "L'été et les arbalètes"
 belarus_another.47.t: "La Grande Marche sur Varsovie"
 belarus_another.47.d: "With the assistance of our border guards, PMC Wagner broke through the border of Poland and entered its territory. What no one expected has begun."
 belarus_another.47.a: "L'été et les arbalètes"
 belarus_another.48.t: "La guerre contre Wagner"
 belarus_another.48.d: "Our government was shocked by the news that Wagner PMC fighters attacked our country from Belarusian territory, which gives us good reason to declare war on Belarus. Will we go for it?"
 belarus_another.48.a: "Il est temps de mettre fin à la Biélorussie"
 belarus_another.48.b: "Il n'est pas nécessaire de déclarer la guerre"
 belarus_another.49.t: "\"Excursion à Vilnius\""
 belarus_another.49.d: "With the assistance of our border guards, PMC Wagner broke through the border of Lithuania and entered its territory. What no one expected has begun."
 belarus_another.49.a: "L'été et les arbalètes"
 belarus_another.52.t: "Révolution du jean"
 belarus_another.52.d: "The people of Belarus have come out to protest against the legitimate government and demand its resignation. I hope we have prepared well for this."
 belarus_another.52.a: "What awaits us"
 belarus_another.52.b: "Essayez de négocier"
 belarus_another.53.t: "Les bolcheviks nationaux prennent le pouvoir en Russie"
 belarus_another.53.d: "Our loyal supporters were finally able to seize power in Russia. The Kremlin is ours now. Our leader is ready to lead Russia."
 belarus_another.53.a: "La Russie est tout, le reste n'est rien"
 belarus_another.54.t: "Rejoindre la Russie"
 belarus_another.54.d: "Finally, Belarus is returning home. We will now be part of a great country, sacrificing our autonomy — but did we truly need it?"
 belarus_another.54.a: "Enfin"
 belarus_another.55.t: "Révolution du jean"
 belarus_another.55.d: "Protests are gaining momentum in Belarus and the Belarusian government cannot suppress them. Perhaps we should step in and save their government?"
 belarus_another.55.a: "Nous enverrons nos spécialistes"
 belarus_another.55.b: "N'intervenons pas"
 belarus_another.56.t: "Révolution du jean"
 belarus_another.56.d: "La Russie nous a envoyé ses spécialistes et ensemble nous avons pu réprimer les manifestations !"
 belarus_another.56.a: "Merci la Russie"
 belarus_another.57.t: "Révolution du jean"
 belarus_another.57.d: "Nous avons secrètement demandé de l’aide au gouvernement russe et il nous a refusé, ce qui nous laisse seuls avec le mouvement révolutionnaire."
 belarus_another.57.a: "Que Dieu nous aide"
 belarus_another.58.t: "Révolution du jean"
 belarus_another.58.d: "The protests are gaining momentum. Some administrative buildings have already been seized, riots are breaking out in other cities, and some generals have defected to the rebels. What should we do?"
 belarus_another.58.a: "Nous nous battrons jusqu'au bout !"
 belarus_another.58.b: "Nous abandonnerons le pouvoir pacifiquement"
 belarus_another.59.t: "La Biélorussie demande un prêt"
 belarus_another.59.d: "The Belarusian government is asking us to provide them with a loan. We may not be sure of their solvency, but the influence we will gain will definitely pay for itself."
 belarus_another.59.a: "Donnons-leur de l'argent"
 belarus_another.59.b: "Nous refuserons"
 belarus_another.60.t: "Prêt russe"
 belarus_another.60.d: "Le gouvernement russe a accepté de nous accorder un prêt."
 belarus_another.60.a: "Bien"
 belarus_another.61.t: "Prêt russe"
 belarus_another.61.d: "Le gouvernement russe a refusé de nous accorder un prêt."
 belarus_another.61.a: "triste"
 belarus_another.62.t: "La Biélorussie propose de créer un négociant commun en potassium"
 belarus_another.62.d: "The Belarusian government has proposed creating a joint potassium trading company between our two enterprises, Uralkali and Belaruskali. Together, we will be able to profit more from this resource."
 belarus_another.62.a: "Nous sommes d'accord"
 belarus_another.62.b: "Nous ne sommes pas d'accord"
 belarus_another.63.t: "Négociant commun en potassium"
 belarus_another.63.d: "Le gouvernement russe a accepté de créer une société commune de commerce de potasse."
 belarus_another.63.a: "Bien"
 belarus_another.64.t: "La Biélorussie ferme un négociant commun en potassium"
 belarus_another.64.d: "The confrontation between our two potassium trading enterprises has reached its limit and the Belarusian government has decided to break away and create its own trader."
 belarus_another.64.a: "triste"
 belarus_another.65.t: "Coup d’État pro-syndical"
 belarus_another.65.d: "We attempted to carry out a coup in Belarus using all our administrative and law enforcement resources, as well as our connections."
 belarus_another.65.a: "Regardons le résultat"
 belarus_GDL.1.t: "La Biélorussie veut diriger notre pays."
 belarus_GDL.1.d: "Pro-Belarusian nationalists have significant influence in our country, so the Belarusian authorities have issued us an ultimatum — allow them into the government or face the consequences. What do we say to that?"
 belarus_GDL.1.a: "Nous sommes d'accord"
 belarus_GDL.1.b: "Jamais"
 belarus_GDL.2.t: "Rejoindre la Biélorussie."
 belarus_GDL.2.d: "Notre pays est soumis à la pleine influence de la Biélorussie. Nous n’avons pas le choix et nous sommes prêts à signer l’acte d’adhésion."
 belarus_GDL.2.a: "C'est l'histoire."
 belarus_azot.1.t: "La Biélorussie propose un accord commercial sur les engrais chimiques."
 belarus_azot.1.d: "Belarus recently reached out and proposed an exclusive contract for the best fertilizers they can offer. Accepting it will surely increase our crop yield, though politically this maneuver may be questionable in some eyes."
 belarus_azot.1.a: "Absolument"
 belarus_azot.1.b: "Pas possible pour le moment."
 belarus_azot.2.t: "[From.GetName]] Accepte"
 belarus_azot.2.d: "Our efforts to make a deal with [From.GetName] have finally come to a conclusion. The contract was signed and the first payment is about to be received."
 belarus_azot.2.a: "Enfin une bonne nouvelle."
 belarus_azot.3.t: "[From.GetName] refuse notre accord."
 belarus_azot.3.d: "Our efforts to make a deal with [From.GetName] seem to be futile. We have not received an answer, and the matter appears to be going nowhere."
 belarus_azot.3.a: "Bon sang, [From.GetNameDef] !"
 belarus_azot.4.t: "[From.GetName] annule leur contrat."
 belarus_azot.4.d: "We have received stunning news — [From.GetName] is canceling their fertilizer contract with us. We will not be able to sell them our product, at least for now."
 belarus_azot.4.a: "Imbéciles ! Ils ne savent pas ce qu'ils perdent !"
 BLR_Azot_category: "Commerce d'engrais Grodno Azot"
 BLR_Azot_category_desc: "Se concentrer sur le nombre de marchés auxquels GrodnoAzot a accès est essentiel à la diversité et au développement de l'économie biélorusse. La multitude d'engrais et de pesticides disponibles peut être utile à de nombreux pays. La conclusion de contrats avec d'autres pays et l'expansion de la production de nos engrais généreront des revenus importants pour la nation et la population biélorusses.\n\nLe revenu tiré du commerce est déterminé par le nombre de contrats que vous avez signés multiplié par cinq pour cent.\n§YContrats d'engrais actuels:§! [?current_azot_capacity]/[?current_max_azot_capacity]\n§YBouchon d'engrais:§! [?current_max_azot_capacity]/[?max_azot_capacity]"
