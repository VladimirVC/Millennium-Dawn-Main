 belarus_export.25.a: "当然，一笔很好的交易。"
 belarus_export.25.b: "不，我们拒绝他们的交易。"
 belarus_export.26.t: "B-200 波罗乃兹"
 belarus_export.26.d: "[FROM.GetNameWithFlag]同意购买我们的多管火箭炮。"
 belarus_export.26.a: "太好了"
 belarus_export.27.t: "B-200 波罗乃兹"
 belarus_export.27.d: "[FROM.GetNameWithFlag]拒绝购买我们的多管火箭炮。"
 belarus_export.27.a: "令人遗憾"
 belarus_export.28.t: "白俄罗斯产底盘"
 belarus_export.28.d: "白俄罗斯军工制造商愿意为我军提供装甲车辆的底盘。我们要同意这份合同吗？"
 belarus_export.28.a: "当然，一笔很好的交易。"
