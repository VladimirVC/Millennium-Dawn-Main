 ALG_reduce_deep_state_desc: "采取系统性措施，减少军方在民事事务中的影响力。\n\n§G效果：深层国家势力 -5§!\n§R风险：稳定度 -4%，势力水平过高时可能引发反弹§!"
 ALG_purge_military_command: "清洗军方指挥部"
 ALG_purge_military_command_desc: "一项极端且危险的措施，旨在清除受影响的将领并重新确立文官控制。这将严重扰乱军事行动。\n\n§G效果：深层国家力量-10§!\n§R严重惩罚：\n• 稳定度-10%\n• £army_experience 陆军经验-50\n• 清洗期间陆军组织度-10%§!\n\n§Y冷却时间：1年§!"
 ALG_cooperate_with_military: "与军方领袖合作"
 ALG_cooperate_with_military_desc: "与将军们合作以维持稳定。这种务实的做法能带来短期利益，但也会巩固他们的地位。\n\n§R效果：深层国家势力 +3§!\n§G收益：\n•  稳定度 +3%\n•  £political_power 政治点数 +50§!\n\n§Y深层国家势力 > 25 时不可用§!"
 ALG_reform_intelligence_services: "改革情报机构"
 ALG_reform_intelligence_services_desc: "重组情报机构（DRS/DSS），确保适当的文职监督与问责机制。\n\n§G效果：深层国家势力 -7§!\n§R成本：\n• 稳定度 -5%\n• £political_power 改革期间政治点数 -10%\n• 移除监控能力§!\n\n§Y冷却时间：180天§!"
 ALG_appoint_loyal_officers: "任命忠诚军官"
 ALG_appoint_loyal_officers_desc: "在关键军事岗位上安插忠于文官政府的军官，逐步改变权力平衡。\n\n§G效果：深层国家势力-3§!\n§R消耗：£army_experience 陆军经验-25§!\n\n§Y冷却时间：120天§!"
 ALG_declare_emergency: "宣布紧急状态"
 ALG_declare_emergency_desc: "启动紧急权力，暂时冻结深层政府活动。这是绝望时刻的孤注一掷之举。\n\n§Y效果：深层政府成长冻结180天§!\n§R代价：\n• 稳定度 -8%\n• 添加“紧急状态”国家精神§!\n\n§Y仅当深层政府力量 > 22时可用§!"
 ALG_negotiate_with_generals: "与将军们谈判"
 ALG_negotiate_with_generals_desc: "暗中与军方高层进行秘密谈判，寻求政治妥协。\n\n§Y可能结果（随机）：§!\n§G50%：成功 - 深层国家 -4，稳定度 +2%§!\n§Y30%：部分成功 - 深层国家 -2§!\n§R20%：失败 - 深层国家 +2，稳定度 -3%§!\n\n§Y冷却时间：180天§!"
