 CAN_allow_campaigning_2019_tt: "Zezwalając na prowadzenie kampanii, partie mogą teraz swobodnie prowadzić kampanię. \nIm szybciej zezwolisz na prowadzenie kampanii, tym więcej będzie to kosztować. \n\n§GIm szybciej na to pozwolisz, tym więcej czasu będziesz miał na wsparcie wybranych przez siebie partii.§! \n\n§KOszty:§! \nPrzed §H30 grudnia 2018 r.§!: \nWładza polityczna: §R-200§! \n\nPomiędzy §H31 grudnia 2018 r.§! oraz §H30 stycznia 2019 r.§!: \nWładza polityczna: §R-175§! \n\nPomiędzy §H31 stycznia 2019§! oraz §H27 lutego 2019 r.§!: \nWładza polityczna: §R-150§! \n\nPomiędzy §H28 lutego 2019§! oraz §H30 marca 2019 r.§!: \nWładza polityczna: §R-125§! \n\nPomiędzy §H31 marca 2019§! oraz §H29 kwietnia 2019 r.§!: \nWładza polityczna: §R-100§! \n\nPomiędzy §H30 kwietnia 2019§! oraz §H30 maja 2019 r.§!: \nWładza polityczna: §R-75§! \n\nPomiędzy §H31 maja 2019§! oraz §H29 czerwca 2019 r.§!: \nWładza polityczna: §R-50§! \n\nPo §H30 czerwca 2019 r.§!: \nWładza polityczna: §R-25§!"
