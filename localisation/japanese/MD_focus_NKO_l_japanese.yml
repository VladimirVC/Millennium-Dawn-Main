 NKO_Protect_State_Owned_Business_desc: ""
 korea_russia.53.t: "潜水艦技術"
 korea_russia.53.d: "ロシアはより優れた技術を提供し、我々が潜水艦を改良することを可能にした。これはすべて、北朝鮮指導者が原子力潜水艦の開発を推進したおかげである。"
 korea_russia.53.a: "我らの指導者に祝福あれ"
 NKO_Domestic_Naval_Strategy: "国内海軍戦略"
 NKO_Domestic_Naval_Strategy_desc: "Lay the foundations for a modern naval doctrine. Each branch of the program   submarines, missile boats, coastal defense, and special operations   will receive its share of resources to begin development."
 NKO_Domestic_Submarine_Program: "国産潜水艦計画"
 NKO_Domestic_Submarine_Program_desc: "当局の取り組みを国産潜水艦の建造に集中させる。船体の生産を最適化し、乗組員の訓練を強化することで、沿岸から遠く離れた敵を威嚇するために必要な、静粛性の高い攻撃力を確保できるだろう。"
 NKO_Domestic_Destroyer_Buildup: "国産駆逐艦の増強"
 NKO_Domestic_Destroyer_Buildup_desc: "ミサイル艇や小型水上戦闘艦を大量生産し、沿岸海域において数的優位を活かして敵艦隊を封じ込める。我々の造船所は、南側が重駆逐艦を配備するよりも早く船体を揃えることができる。"
 NKO_Destroyer_Unleashed: "解き放たれる駆逐艦"
 NKO_Destroyer_Unleashed_desc: "より強力な主砲と専用の対空砲塔を備えた新世代の駆逐艦を配備する。これにより、艦隊は沿岸に潜むのではなく、ついに外洋での戦闘にも挑めるようになるだろう。"
 NKO_Navy_projects: "北朝鮮海軍計画"
 NKO_Navy_projects_desc: "現代的な海軍を整備することで、沿岸海域を防衛し、地域全体に軍事力を投影できるようになる。これらの新造艦は将来の艦隊の中核を成すだろう。"
 NKO_The_Blue_Water_Navy: "外洋海軍"
 NKO_The_Blue_Water_Navy_desc: "長年にわたる造船所の拡張、ドクトリンの改革、そして共同演習により、我が艦隊は沿岸部隊から真の海洋海軍へと変貌を遂げた。今や我々は岸から遠く離れた場所へ出撃でき、その乗組員と船体は地域のいかなる敵国にも匹敵する。\n§W--------------§!\n外洋海軍とは、外洋の深海において持続的な作戦が可能であり、自国の沿岸を遥かに超えて投射能力を発揮できる海上戦力を指す。"
 NKO_Russian_friendship: "露朝同盟"
 NKO_Russian_friendship_desc: "ロシアは常に我々の主要な同盟国の一つであり、ソ連は我々の出現と存在に一層深く関わってきた。我々は両国間の同盟関係を再び復活させることを目指す。"
 korea.135.t: "ハッキング作戦の成功"
 korea.135.d: "我々のハッカーは西側諸国の銀行インフラに侵入し、多額の資金を吸い上げた。本国へ送金するための裏ルートで一部が失われたものの、作戦は成功に終わった。"
 korea.135.a: "素晴らしい仕事だ"
 korea.136.t: "北朝鮮が我々をハッキングした"
 korea.136.d: "North Korean hackers have launched a cyberattack on our banking infrastructure to siphon funds. We should retaliate with operations of our own   or appeal to the international community."
 korea.136.a: "予想外だ"
 korea.137.t: "街で薬物が蔓延"
 korea.137.d: "A new wave of drugs has flooded our streets. The source remains unconfirmed, but we must move carefully, the productivity is already suffering."
 korea.137.a: "中毒者を支援する"
 korea.137.b: "我々に何が出来る？"
 korea.138.t: "薬物作戦の成功"
 korea.138.d: "新たな薬物の波が敵の街を飲み込んだ。敵はこの危機の封じ込めに支出を強いられ、一方で我々はささやかな利益を得る。機関への投資を継続すれば、現金は流れ込み続けるだろう。"
 korea.138.a: "よくやった！"
 korea.139.t: "偽造ドル札作戦"
 korea.139.d: "我々は精巧な100ドル偽札を印刷し、裏ルートを通じて海外市場に流通させ、その収益を闇市場ネットワークで洗浄する。この計画から得られる安定した収入は、さらなる作戦の資金源となるだろう。"
 korea.139.a: "よくやった！"
 NKO_korean_russian_friendship: "露朝包括的戦略パートナーシップ条約"
 NKO_korean_russian_friendship_desc: "2024年のパートナーシップ条約は、平壌とモスクワを相互安全保障条約で結びつけ、双方が互いの防衛に協力することを約束した。正式な保証とともに、貿易、エネルギー、技術協力が深まっている。"
 NKO_naval_project_burden1: "海軍計画の負担"
 NKO_naval_project_burden1_desc: "Running a single major naval programme already strains a planned economy that was never built for it. Steel, electronics, and skilled labour are diverted from civilian production to keep the yards moving."
 NKO_naval_project_burden2: "Compounding Naval Burden"
 NKO_naval_project_burden2_desc: "A second concurrent naval programme amplifies the squeeze on the civilian economy. Shortages cascade through unrelated industries as resources are pulled toward the shipyards."
 NKO_naval_project_burden3: "Severe Naval Burden"
 NKO_naval_project_burden3_desc: "Three simultaneous naval programmes have left the civilian economy gasping. Consumer-goods queues lengthen and other industries idle for want of inputs the navy has first call on."
