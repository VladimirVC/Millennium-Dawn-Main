 NKO_Choson_Dream: "朝鮮の夢"
 Choson_Dream_desc: "「朝鮮の夢」は、朝鮮民族の個人的かつ国家的目標を包含した、指導者[NKO.GetLeader]によって提唱された新たな概念である。それは、経済、政治、国際分野など多岐にわたる分野における願望を網羅している。"
 Fallout_leadership_succession: "指導者交代の余波"
