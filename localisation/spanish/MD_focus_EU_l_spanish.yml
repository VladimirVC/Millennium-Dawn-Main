 EU_news.3.a: "Esperamos una buena cooperación!"
 EU_news.4.t: "Alto Representante para Asuntos Exteriores y Política de Seguridad"
 EU_news.4.d: "[FROM.GetNameWithFlag] ocupará ahora el cargo de Alto Representante de la Unión para Asuntos Exteriores y Política de Seguridad durante los próximos 5 años."
 EU_news.4.a: "Esperamos una buena cooperación!"
