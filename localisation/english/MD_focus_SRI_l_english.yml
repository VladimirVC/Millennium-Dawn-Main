 news.91.t: "Sri Lankan Civil War Ends"
 news.91.d: "The Sri Lankan government has declared total victory over the Liberation Tigers of Tamil Eelam. In a final series of offensives across the north-east, government forces overran the last Tiger strongholds. In the closing days of the war, the remaining Tamil fighters were encircled along the lagoons and jungles of Mullaitivu. Cut off from escape, any attempts to flee by sea were intercepted. The leadership of the Tigers, long thought untouchable, has reportedly been killed in the final hours of the conflict. Addressing parliament, President  [SRI.GetName] proclaimed that the nation had been 'liberated from terrorism '.For now, the Lion flag flies unchallenged across the island."
 news.91.a: "Peace… at a price."

 news.92.t: "Tamil Tigers Liberation of Eelam"
 news.92.d: "What was once a war of attrition has concluded. The Liberation Tigers of Tamil Eelam are victorious. In the final days of the conflict, the last bastions of the Sri Lankan state in the lands of Tamil Eelam have collapsed under relentless assault. Supply lines crumbled, airstrips burned, and the once-formidable army found itself encircled and abandoned. The Tigers of Tamil Eelam prevailed from the jungle not as insurgents but as leaders. The dream of Tamil Eelam, written in blood and sacrifice, has been realised at last."
 news.92.a: "Interesting."
