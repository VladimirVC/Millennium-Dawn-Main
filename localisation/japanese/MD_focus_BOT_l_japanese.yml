 BOT_coal_focused_energy_rich_tt: "追加収入: $§G0.100§!"
 BOT_renewable_focused_energy: "再生可能エネルギー国家への第一歩"
 BOT_renewable_focused_energy_desc: "ボツワナは、再生可能エネルギー生産における同国の大きな可能性を活用することを決定した。コストが高くエネルギー密度も低いものの、再生可能エネルギーの利用は環境保護に寄与するだろう。"
 BOT_renewable_focused_energy_self_sufficient: "自給自足の再生可能エネルギー国家"
 BOT_renewable_focused_energy_self_sufficient_desc: "ボツワナは、再生可能エネルギー生産における同国の大きな可能性を活用することを決定した。コストが高くエネルギー密度も低いものの、再生可能エネルギーの利用は環境保護に寄与するだろう。"
 BOT_renewable_focused_energy_small_profit: "収益性が高い再生可能エネルギー国家"
 BOT_renewable_focused_energy_small_profit_desc: "ボツワナは、再生可能エネルギー生産における同国の大きな可能性を活用することを決定した。コストが高くエネルギー密度も低いものの、再生可能エネルギーの利用は環境保護に寄与するだろう。"
 BOT_renewable_focused_energy_small_profit_tt: "追加収入: $§G0.040§!"
 BOT_renewable_focused_energy_rich: "豊かな再生可能エネルギー国家"
 BOT_renewable_focused_energy_rich_desc: "ボツワナは、再生可能エネルギー生産における同国の大きな可能性を活用することを決定した。コストが高くエネルギー密度も低いものの、再生可能エネルギーの利用は環境保護に寄与するだろう。"
 BOT_renewable_focused_energy_rich_tt: "追加収入: $§G0.080§!"
 BOT_ilea: "国際法執行アカデミー"
 BOT_ilea_desc: "アメリカは、サハラ以南のアフリカの警察官を養成するための国際法執行アカデミーを、ハボローネに設立した。"
 BOT_extra_school_funding: "学校への追加の資金提供"
 BOT_extra_school_funding_desc: "教育制度に追加の予算を割り当てた。"
 BOT_school_fees: "学費の再導入"
 BOT_school_fees_desc: "教育費の高騰に対処するため、国内で学費制度を復活させた。"
 Botswana_pulse.1.t: "カラハリ砂漠拡大"
 Botswana_pulse.1.d: "昨年のデータによると、カラハリ砂漠は拡大を続けている。かつて放牧地だった地域のいくつかは現在、不毛の地と化しており、多くの地下水源が枯渇し、密猟によって野生生物の数が激減している。人々が好きな場所で自由に家畜を放牧することを許し、この地域での鉱物資源の採掘を続け、密猟を放置すれば、状況はさらに悪化するに違いない。"
 Botswana_pulse.1.a: "残念だ"
 Botswana_pulse.2.t: "カラハリ砂漠変化なし"
 Botswana_pulse.2.d: "昨年のデータによると、カラハリ砂漠とその周辺における砂漠化の状況は、現状維持の状態にあるようだ。しかし、再び悪化するのも時間の問題である。人々が好きな場所で自由に家畜を放牧することを許し、この地域での鉱物資源の採掘を続け、密猟を放置すれば、状況はさらに悪化するに違いない。"
 Botswana_pulse.2.a: "猶予が与えられた"
 Botswana_pulse.3.t: "カラハリ砂漠後退"
 Botswana_pulse.3.d: "昨年のデータによると、カラハリ砂漠の広大な地域で植生が回復しつつある。自然の放牧パターンを模倣し、密猟対策を行うことで、この地域は自然回復の道を歩むことができるだろう。"
 Botswana_pulse.3.a: "進展が見られた"
 Botswana_pulse.4.t: "£BOT_Neutral_conservatism ボツワナ民主党がまたしても勝利を確保！"
 Botswana_pulse.4.desc: "与党である£BOT_Neutral_conservatism ボツワナ民主党が、またも選挙で勝利を収めた！彼らの快進撃には終わりがなさそうだ。"
 Botswana_pulse.4.a: "予想通りだ"
 Botswana_pulse.5.t: "£BOT_Neutral_conservatism ボツワナ民主党がスキャンダルで分裂！"
 Botswana_pulse.5.desc: "与党である£BOT_Neutral_conservatism ボツワナ民主党がスキャンダルに見舞われている。党内の一派が、[ROOT.GetLeader]大統領の政策や国民からの支持を得られていない状況に不満を抱き、本流から離脱した。"
 Botswana_pulse.5.a: "予想通りだ"
 Botswana_pulse.6.t: "野党が選挙連合を結成"
 Botswana_pulse.6.desc: "複数の野党が、一つの選挙連合を結成した。野党党首らによる会合を経て、£BOT_Neutral_conservatism ボツワナ民主党を打倒する唯一の方法は協力することにあるとの結論に至った。この新たな連合は、£BOT_neutral_Social_UDC 民主的変革のための傘と呼ばれることになる。"
 Botswana_pulse.6.a: "無意味だ"
 Botswana_pulse.7.t: "£BOT_neutral_Social_UDC 民主的変革のための傘が分裂"
 Botswana_pulse.7.desc: "£BOT_neutral_Social_UDC 民主的変革のための傘が選挙での勝利という目標を達成した今、選挙連合を結ぶ必要はなくなった。各党は、次回の選挙では再び独自に選挙運動を行うことを決定した。"
 Botswana_pulse.7.a: "興味深い"
 Botswana_pulse.8.t: "バニョラスの黒人が帰還"
 Botswana_pulse.8.desc: "1830年、サン人の遺体がフランスのヴェロー兄弟によって剥製にされた。その剥製は、やがてスペインのカタルーニャにある博物館に収蔵された。この剥製が物議を醸すようになったのは1991年のことであり、1997年に国連での協議を経て、博物館は剥製を解体し、残された人骨をボツワナに返還することを決定した。そしてその「荷物」が今、到着した。この遺骨をどうすべきだろうか？"
 Botswana_pulse.8.a: "彼に適切な埋葬を"
 Botswana_pulse.8.b: "彼が死んだのは200年も前だ、どこかに保管しておけばいい"
 Botswana_pulse.9.t: "マリエット・ボッシュの処刑"
 Botswana_pulse.9.desc: "マリエット・ボッシュは、1996年に愛人の配偶者を2発の銃弾で射殺した南アフリカ人女性である。当初、この殺人事件は単なる強盗未遂と見なされ、容疑者は特定されていなかった。その後の2001年3月に、ボッシュは絞首刑に処された。この事件の特筆すべき点として挙げられるのは、彼女がボツワナで処刑された初の白人女性であり、かつ南アフリカ国籍であったことである。処刑そのものは拙劣なものであった。処刑当日、彼女の家族が面会に向かう途中だった上、南アフリカ大統領[SAF.GetLeader]は彼女への恩赦運動を計画していたからだ。どちらの側にも、処刑が行われることは事前に通知されていなかった。"
 Botswana_pulse.9.a: "もっとうまくやれたはずだ"
 Botswana_pulse.10.t: "サン人が政府を提訴"
 Botswana_pulse.10.desc: "サン人の利益団体が、1970年代から行われてきた移住措置をめぐり政府を提訴した。ボツワナ高等裁判所はこの件を審理し、最終的に、サン人を移住させる政府の措置は憲法違反であるとの結論を下した。"
 Botswana_pulse.10.a: "くそっ"
 Botswana_pulse.11.t: "モサディ・セボコがコシクゴロに戴冠"
 Botswana_pulse.11.desc: "バレテ人のコシコロ（最高指導者）、タワナ2世が最近死去した。彼の姉であるモサディ・セボコは、長女であることから「出生による平等」を根拠に王位を主張した。これまで女性のコシコロは存在しなかったため、彼女の主張には多くの反対があったが、ボツワナ憲法にはこれを禁じる規定はない。結局、彼女は正式に戴冠し、首長会議の一員となった。彼女はボツワナにおける女性の権利を熱心に擁護している。"
 Botswana_pulse.11.a: "平等への一歩だ"
 Botswana_pulse.12.t: "産業現場でのストライキ"
 Botswana_pulse.12.desc: "先日、ある工業地帯で数千人の労働者がストライキを行った。結局、裁判所はこのストライキを違法と判断し、工業地帯の所有者は従業員のうち約1,000人を解雇することになった。我が国の労働者の置かれている状況に対し、多くの人々が怒りを抱いている。"
 Botswana_pulse.12.a: "ストライキをしたり労働組合を結成したりしたからだ"
 Botswana_pulse.12.b: "労働者の権利を向上させなければ！"
 Botswana_pulse.13.t: "モディセ・モクワディ・フライが息子を殺害"
 Botswana_pulse.13.desc: "衝撃的なニュースが報じられた。£BOT_neutral_Social ボツワナ会議党青年連盟のリーダーであるモディセ・モクワディ・フライが、眠っている息子を斧で殺害したことが明らかになったのだ。フライは、自分に向けて発砲していたとされる警察官に斧を投げつけた際、誤って息子を殺してしまったと主張した。フライは絞首刑の判決を受けた。"
 Botswana_pulse.13.a: "BCPのスキャンダルだ！"
 Botswana_pulse.14.t: "トップギア：ボツワナ・スペシャル"
 Botswana_pulse.14.desc: "今日は、トップ・ギア：ボツワナ・スペシャルの初回放送日だった。ジェレミー・クラークソン、ジェームズ・メイ、リチャード・ハモンドの3人は、ボツワナの東端から安価な車で出発し、SUVよりも悪路を走破できることを証明するため、国を横断してナミビアとの国境まで走り抜けることを目指した。このスペシャルの冒頭の見どころの一つは、カラハリ砂漠の横断を始める直前に、ボツワナ大統領[ROOT.GetLeader]がグライダーで現れ、イギリス人たちに幸運を祈った場面だった。さて、果たして誰が一番うまくやり遂げるのだろうか？"
 Botswana_pulse.14.a: "背の高いオランウータンが勝つといいな！"
 Botswana_pulse.14.b: "キャプテン・スローが着実な勝利を掴むさ！"
 Botswana_pulse.14.c: "もちろん、ハムスターとオリバーのチームだ！"
 Botswana_pulse.15.t: "モレミ・エアのセスナ208墜落事故"
 Botswana_pulse.15.desc: "昨日、モレミ・エアが運航するセスナ208が、離陸直後にハカハナカ・キャンプ付近で墜落した。乗客乗員12人のうち8人が死亡し、その中にはフランス、イギリス、スイスの国籍を持つ人々（同機のイギリス人パイロットを含む）が含まれていた。墜落の原因はエンジン故障であり、コンプレッサーのタービンブレードが硫化腐食の影響を受けていたが、これまでの点検ではその兆候は一切確認されていなかった。国内では点検体制の強化や飛行基準の厳格化を求める声が高まっているが、これによって多くのサファリツアー運営会社が打撃を受ける可能性がある。"
 Botswana_pulse.15.a: "厳格化を追求せよ！"
 Botswana_pulse.15.b: "これは単なる一回の事故に過ぎない"
 Botswana_pulse.16.t: "別の飛行機事故"
 Botswana_pulse.16.desc: "モレミ・エアの墜落事故が人々の記憶に新しい中、またしても同様の事故が発生した。サファリツアー運営会社が運航する小型ターボプロップ機が、離陸直後に墜落したのだ。幸い、この事故による死者はわずか数名にとどまった。今こそ、国内の航空安全基準を強化すべきではないだろうか。"
 Botswana_pulse.16.a: "厳格化を追求せよ！"
 Botswana_pulse.16.b: "これは単なる一回の事故に過ぎない"
 Botswana_pulse.17.t: "ムムシ達vsラマンテレ達"
 Botswana_pulse.17.desc: "ボツワナで、相続問題をめぐる裁判が提起された。ボツワナの農村部で機能する伝統的裁判所によれば、末っ子の男子が常に父親の家を相続することになっている。この問題は、ある男性とその異母兄弟が、父親の家の相続をめぐって対立したことから始まった。しかし、争いが解決される前に、両者とも亡くなってしまい、その結果、その家は異母兄弟の息子であるモレフィ・ラマンテレに引き継がれることとなった。しかし、争いが始まって以来、その家の経済的負担を背負ってきた叔母たちはこれに異議を唱えた。ボツワナの裁判所は、従来の相続方法は憲法に違反するとし、叔母たちの主張を認める判決を下した。ボツワナにおいて、女性が財産を相続する権利が認められたのはこれが初めてのことである。"
 Botswana_pulse.17.a: "平等への一歩だ！"
 Botswana_pulse.17.b: "異母兄弟の息子が正当な相続人だったはずだ！"
 Botswana_pulse.18.t: "ゴモレモ・モツワレディ死去"
 Botswana_pulse.18.desc.1: "ボツワナ民主党（バラタ・ファティ派）の重鎮であるゴモレモ・モツワレディが、昨日、自動車事故により死去した。同氏はかつて同党青年連盟の代表を務めたこともある。人気のある政治家であったため、これは同党にとって大きな打撃となる。"
 Botswana_pulse.18.desc.2: "ベテラン政治家のゴモレモ・モツワレディが昨日、自動車事故で亡くなった。同氏はボツワナ民主党で政治活動を始めたが、後に同党を離党し、ボツワナ民主運動の共同設立者の一人となった。人気のある政治家であったため、これはボツワナ民主運動にとって大きな打撃である。"
 Botswana_pulse.18.a: "平等への一歩だ！"
 Botswana_pulse.19.t: "巨大ダイヤモンド発見！"
 Botswana_pulse.19.desc: "カロウェ鉱山で巨大なダイヤモンドが発見された。総重量は約1100カラット（220グラム）、直径は2インチ（約5センチ）を超え、現在までに発見されたダイヤモンドの中で3番目の大きさとなっている。このダイヤモンドは「レセディ・ラ・ローナ（我らの光）」と名付けられ、イギリスの宝飾店グラフに5300万ドルで売却された。"
 Botswana_pulse.19.a: "素晴らしい！"
 Botswana_pulse.20.t: "別の巨大ダイヤモンド発見！"
 Botswana_pulse.20.desc: "カロウェ鉱山で、再び巨大なダイヤモンドが発見された。総重量は約1700カラット（350グラム）で、大きさはテニスボールほどだ。これにより、これまでの最大級だった「レセディ・ラ・ローナ」を上回り、発見されたダイヤモンドとしては史上3番目の大きさとなった。このダイヤモンドは「セウェロ（希少な発見）」と名付けられ、現在ルイ・ヴィトンが購入に関心を示している。ダイヤモンドとしては珍しく、表面が薄い黒色の炭素層で覆われており、カットするのが非常に困難である。"
 Botswana_pulse.20.a: "素晴らしい！"
 Botswana_pulse.21.t: "電力不足"
 Botswana_pulse.21.desc: "ボツワナを含む南部アフリカのほとんどの国は、電力の大部分を南アフリカに依存しており、南アフリカの電力生産に支障が生じれば、他のすべての国にも影響が及ぶ。現在、南アフリカは電力不足に見舞われており、その影響は我々にも及んでいる。将来、このような事態を避けるためには、南アフリカへの依存度を減らすよう努めるべきだ。"
 Botswana_pulse.21.a: "まさにその通りだ！"
 Botswana_pulse.22.t: "ボツワナ・モーター・カンパニーが破産"
 Botswana_pulse.22.desc: "ボツワナ・モーター・カンパニーは、1993年からボツワナでヒョンデの車の生産を行ってきた。ジンバブエ出身の富豪によって設立された同社は、モザンビークから車を輸入し、一旦分解して再組み立てを行った上で南アフリカへ出荷するという手法を用い、南アフリカへ車を安価に輸出するために、時折不透明な商慣行に走っていた。昨日、同社は多額の負債により経営が継続不可能となったため、事業を閉鎖すると発表した。ヒュンデ本社は組立ラインを南アフリカのキンバリーに移転する計画であり、これによりボツワナでは900人の雇用が失われることになる。"
 Botswana_pulse.22.a: "解雇された労働者たちに、特別な救済措置を講じよ！"
 Botswana_pulse.22.b: "単なるビジネスだ"
 Botswana_pulse.23.t: "コシが鞭打ちで告発される"
 Botswana_pulse.23.desc: "最大規模の部族の一つを率いるコシが、犯罪の疑いがあるとして部族の一員を鞭打ちの刑に処したとして非難されている。コシ側は、これは全く問題のない行為であり、コシは国家の管轄権から免除されていると主張している。しかし、裁判所は、コシであっても国の憲法や議会が定めた法律に背くことはできないとしている。"
 Botswana_pulse.23.a: "コシは有罪だ！"
 Botswana_pulse.23.b: "コシは好きなようにできる"
 Botswana_events.1.t: "ボツワナ戦闘機購入"
 Botswana_events.1.desc: "老朽化した戦闘機部隊を更新する時期が来た。どこを選ぶべきだろうか？"
 Botswana_events.1.a: "[SWE.GetNameDef]"
 Botswana_events.1.b: "[USA.GetNameDef]"
 Botswana_events.1.c: "[CHI.GetNameDef]"
 Botswana_events.1.d: "[ENG.GetNameDef]"
 Botswana_events.2.t: "ボツワナが共同光ファイバーケーブルを提案"
 Botswana_events.2.desc: "ボツワナは、両国のネットワークを海底ケーブル「西アフリカ・ケーブル・システム」に直接接続するため、両国を横断する光ファイバーケーブルの共同敷設において、我々と協力することを提案してきた。これにより、両国のネットワーク品質が向上することになる。"
 Botswana_events.2.a: "もちろん"
 Botswana_events.2.b: "拒否する"
 Botswana_events.3.t: "ナミビアが合意"
 Botswana_events.3.desc: "ナミビアはこの取り決めに合意し、我々のネットワーク品質は向上した。"
 Botswana_events.3.a: "よし"
 Botswana_events.4.t: "ナミビアが申し出を拒否"
 Botswana_events.4.desc: "ナミビアは、我々のネットワーク改善に向けた協力の申し出を拒否した。"
 Botswana_events.4.a: "残念だ"
 Botswana_events.5.t: "サイ除角作戦成功"
 Botswana_events.5.desc: "ここ数ヶ月で、数百頭のサイから角が除去された。これにより密猟を行う動機が薄れ、国内で活動する密猟者の数が大幅に減少したようだ。"
 Botswana_events.5.a: "素晴らしい"
 Botswana_events.6.t: "サイ除角作戦失敗"
 Botswana_events.6.desc: "ここ数ヶ月で、数百頭のサイから角が除去された。しかし、これは密猟者たちに何の影響も与えていないようだ。密猟者たちは相変わらずサイを追跡しており、角のないサイを捕まえた場合でも、同個体の追跡を避けるために、とにかく撃ち殺してしまう。我々が成し遂げたのは、角のないサイを何頭か作り出したことだけだったようだ。"
 Botswana_events.6.a: "結局は全部時間の無駄だったんだ！"
 Botswana_news_events.1.t: "[BOT.GetNameDef]がジンバブエに圧力をかける"
 Botswana_news_events.1.desc: "[BOT.GetNameDef]政府は、ジンバブエの独裁者ロバート・ムガベに対し、強硬な姿勢を示している。[BOT.GetNameDef]は人権侵害を理由に、ムガベに対し権力の座から退くよう要求した。"
 Botswana_news_events.1.a: "戦争が近いのか？"
 Botswana_news_events.2.t: "[BOT.GetNameDef]、伝統を受け入れる"
 Botswana_news_events.2.desc: "本日、[BOT.GetNameDef]から驚くべきニュースが入った。部族長らとその支持者たちが現政権を打倒し、首長会議をボツワナにおける唯一の合法的な統治機関とした。そして[BOT.GetLeader]はボツワナのコシコロ（最高指導者）に即位した。かつて「民主主義の輝ける模範」と称されたボツワナも、もはや過去のものとなったようだ。"
 Botswana_news_events.2.a: "ボツワナは現代性を拒絶した"
 Botswana_news_events.3.t: "[BOT.GetNameDef]、サン人の保護を誓う"
 Botswana_news_events.3.desc: "自国におけるサン人の地位改善に向けた措置を講じた後、[BOT.GetNameDef]政府は隣国[NAM.GetNameDef]に目を向けている。[NAM.GetNameDef]は、同国に住むサン人に対して長年にわたり差別的な政策をとっており、その多くが国境を越えてボツワナへ逃れてきた。[BOT.GetNameDef]は、必要であれば武力行使してでも、ナミビアのサン人の権利を保護すると誓っている。"
 Botswana_news_events.3.a: "長きにわたる平和が破られた"
 BOT_military_reevaluation: "軍事力の再評価"
 BOT_military_reevaluation_desc: "ボツワナ軍は改革を必要としている。新千年紀の到来は新たな課題をもたらしている。"
 BOT_develop_anti_poaching_tactics: "対密猟戦術開発"
 BOT_develop_anti_poaching_tactics_desc: "軍隊の訓練に大国からの支援は必要ない。野生生物の保護を通じて得た知見を、軍事戦略に活かしていくことができる。"
 BOT_indian_military_cooperation: "インドとの軍事協力"
 BOT_indian_military_cooperation_desc: "我々は最近、インドに大使館を正式に開設した。インドはこの大陸に強い関心を寄せており、多くのインド人がアフリカに住んでいる。彼らは、我が国の軍隊の訓練を行う上で、理想的なパートナーとなるだろう。"
 BOT_american_military_cooperation: "アメリカとの軍事協力"
 BOT_american_military_cooperation_desc: "アメリカは我々の長年の同盟国であり、ソマリアでも共に活動してきた。平和維持活動やアフリカ支援に対する彼らの献身的な姿勢は、まさに我々が軍事パートナーに求めるものである。"
 BOT_chinese_military_cooperation: "中国との軍事協力"
 BOT_chinese_military_cooperation_desc: "中国はアフリカ大陸では比較的新顔ではあるが、我々を支援することに非常に意欲的だ。彼らは、我々の軍隊の運営方法について新たな視点を提供してくれるだろう。"
 BOT_enlist_women: "女性の徴兵"
 BOT_enlist_women_desc: "ボツワナは非常に進歩的で近代的な国だ、陸軍は女性の入隊を受け入れていない。これは是正されるべき問題であり、女性権利活動家のントンビ・セツワエロは過去20年にわたり、軍への参画を求める運動を続けてきた。今こそ、ボツワナの女性たちが国に奉仕できるようになるべき時だ。"
 BOT_institute_partial_draft: "部分的徴兵制導入"
 BOT_institute_partial_draft_desc: "ボツワナは人口が少ないため、治安部隊への人員確保が困難である。女性を軍隊に徴兵するよりも、部分的な徴兵制を導入し、毎年少なくとも一定数の新兵を確保できるようにすべきだ。"
 BOT_peacekeeping_army: "平和維持重視"
 BOT_peacekeeping_army_desc: "ボツワナ国防軍は、ソマリアやレソトなど、数多くの国際的な作戦に参加してきた。世界をより良い場所にするためには、この分野に注力すべきだ。もちろん、主に他国のために血を流すことを、すべての軍人が喜ぶわけではない。"
 BOT_anti_poaching_army: "対密猟軍"
 BOT_anti_poaching_army_desc: "我が国が抱える最大の問題の一つは、国内を悩ませている密猟である。軍隊を訓練し、密猟者と戦い、野生生物を保護できるようにすべきだ。また、万が一の自然災害に備え、災害救援活動についても訓練を行うべきだろう。兵士たちは現地の地形をはるかに熟知できるだろうが、プロの戦闘部隊としての能力は低下してしまうだろう。"
 BOT_shift_to_traditional_military: "伝統的軍隊への転換"
 BOT_shift_to_traditional_military_desc: "我が軍の軍事能力を、密猟者と戦う単なる拡大版警察部隊にまで縮小してしまったのは誤りだった。この転換を撤回し、軍を国家の安全保障を確実に守る組織へと変える必要がある。"
 BOT_buy_pilatus_pc9: "ピラタス PC-9の導入"
 BOT_buy_pilatus_pc9_desc: "密猟者をより効果的に捜索・発見するためには、この任務に適した小型機が必要となる。スイスのピラタス社は、この目的に最適な小型ターボプロップ機を製造しており、これらを活用すれば、密猟者を発見（場合によっては爆撃）することができる。"
 BOT_buy_hercules_c130: "輸送部隊の増強"
 BOT_buy_hercules_c130_desc: "平和維持部隊の輸送と補給を行うためには、輸送機が必要となる。すでにアメリカのC-130を数機運用しているが、この既存の機体を増強すべきだ。"
 BOT_buy_gunships: "攻撃ヘリを購入"
 BOT_buy_gunships_desc: "我が軍の将来の地上作戦を支援するためには、現地での航空支援が必要不可欠となる。この役割には、攻撃ヘリコプターが最適だろう。ロシアはアフリカへの攻撃ヘリコプターの供給において長い歴史を持ち、Mi-24ハインドは間違いなくその代表格だ。"
 BOT_zimbabwe_border_fence: "ジンバブエ国境フェンス"
 BOT_zimbabwe_border_fence_desc: "ジンバブエからの口蹄疫の蔓延を防ぐため、ジンバブエとの国境に動物の移動を阻止するための電気柵を設置する必要がある。偶然にも、これによりジンバブエ難民の不法越境も防ぐことができる。"
 BOT_deploy_peacekeepers: "ジンバブエへ平和維持部隊を派遣"
 BOT_deploy_peacekeepers_desc: "隣国ジンバブエの状況は悲惨極まりない。人々は独裁的で腐敗した政権の下で苦しんでいる。ジンバブエ政府とのコネを駆使すれば、人権侵害を口実に、[ZIM.GetLeader]を密かに権力の座から引きずり下ろすことができるかもしれない。"
 BOT_topple_mugabe: "[ZIM.GetLeader]の打倒"
 BOT_topple_mugabe_desc: "[ZIM.GetNameDef]における人権侵害は許しがたい。我々は直ちにジンバブエの指導者[ZIM.GetLeader]を退陣させ、ジンバブエの人々に自由をもたらさなければならない。"
 BOT_replace_f5s: "CF-5の代替"
 BOT_replace_f5s_desc: "1996年、我々はアメリカのF-5をカナダでライセンス生産したCF-5戦闘機18機を受領した。これらの戦闘機は、受領時点で既に旧式化していた。今こそ、より高性能な戦闘機で航空戦力を近代化する時である。"
 BOT_replace_f5s_tt: "我々は、これらの国々のいずれかから、§Y12機のマルチロール戦闘機§!を総額§Y$$15B§!で購入する予定だ"
 BOT_domestic_weapon_supply: "PAAMへの投資"
 BOT_domestic_weapon_supply_desc: "汎アフリカ弾薬製造業者（PAAM）は、銃器用弾薬を製造する企業である。我々は同社に投資し、ボツワナ国防軍の公式サプライヤーとして位置づけるべきだ。弾薬に加え、同社は我々の小火器の製造および整備も担当することになる。"
 BOT_militarise_tribes: "部族の軍事化"
 BOT_militarise_tribes_desc: "国防軍の任務は国土全体を守ることだ。しかし、地方の首長であるコシ達が独自の民兵組織を編成し、地域の守備隊として機能させることで、地方防衛をより効果的に行うことができるだろう。"
 BOT_unite_bushmen: "サン人の統一"
 BOT_unite_bushmen_desc: "隣国ナミビアでは、サン人をめぐる状況が我々とよく似ている。ナミビアでは、サン人が差別や追放、そして奴隷同然の境遇に直面し、何百人ものサン人が国境を越えてボツワナへ逃れてきた。我々が経験したような苦しみを、サン人に味わせてはならない。"
 BOT_unite_bushmen_trigger_tt: "[Nat_Populism_L]は連立与党の一員である"
 BOT_ancestral_brothers: "祖先の兄弟"
 BOT_ancestral_brothers_desc: "我々はサン人を一つの国家の下に結集させた。我々の保護の下、彼らは差別を受けることなく繁栄し、自らの生活様式を守り続けることができるだろう。"
 BOT_meet_with_chiefs: "首長との会談"
 BOT_meet_with_chiefs_desc: "首長会議との定期的な会合の開催は、部族との対話を維持する上で重要な役割を果たしている。"
 BOT_depose_mosadi_seboko: "モサディ・セボコを廃位"
 BOT_depose_mosadi_seboko_desc: "バレテ人のコシコロであるモサディ・セボコは、ボツワナ史上初めて首長会議の議席に就いた女性である。これは同国の伝統に反するものであり、セボコには多くの批判者や反対者がいる。我々は彼女からその称号を剥奪し、代わりに彼女のいとこであるツィマネ・モコシを王位に就けるべきである。"
 BOT_celebrate_mosadi_seboko: "モサディ・セボコを称賛"
 BOT_celebrate_mosadi_seboko_desc: "バレテ人のコシコロであるモサディ・セボコは、ボツワナ史上初めて首長会議の議席に就いた女性である。彼女が女性であるという理由だけで、多くの批判や反対にさらされている。政府は、ボツワナにおける平等の実現に向けた一歩として、彼女への支持を表明すべきである。"
 BOT_empower_the_house_of_chiefs: "首長会議の権限強化"
 BOT_empower_the_house_of_chiefs_desc: "首長会議は部族に代表権を認めているものの、実権は与えていない。首長会議を真の立法機関へと変革し、部族が自らの問題について一定の自治権を行使できるようにする必要がある。"
 BOT_keep_the_status_quo_of_chiefs: "現状維持"
 BOT_keep_the_status_quo_of_chiefs_desc: "首長会議は現状のままでも問題なく、あえて波風を立てるべきではない。"
 BOT_abolish_the_house_of_chiefs: "首長会議の廃止"
 BOT_abolish_the_house_of_chiefs_desc: "首長会議は、差別的で封建的な組織に他ならない。同会議は特定の部族の首長を他の部族より優遇し、一部の部族が他の部族よりも「平等」であるという明確な意図を示している。この制度を廃止し、ボツワナの国民一人ひとりが国内で平等に扱われるようにしなければならない。"
 BOT_the_kgosikgolo: "コシコロ"
 BOT_the_kgosikgolo_desc: "ボツワナは、多数派であるツワナ人が統治するほうがよいだろう。与党[show_ruling_party]は腐敗した組織であり、国民の利益を真に考えてはいない。そのため、彼らを退陣させる必要がある。"
 BOT_the_kgosikgolo_tt: "§Cもし国家方針「§Y$BOT_militarise_tribes$§!」を完了していれば、内戦の可能性は減少するだろう§!"
 BOT_judicial_reform: "司法改革"
 BOT_judicial_reform_desc: "ボツワナの司法制度はかなり時代遅れであり、近代化が求められている。"
 BOT_empower_unions: "労働組合の強化"
 BOT_empower_unions_desc: "ボツワナには活動中の労働組合がほとんどなく、組合への加入率も極めて低い。我々はボツワナ労働組合連盟と協力し、国内のすべての労働組合を結束させ、人々が組合に加入するよう促していく必要がある。"
 BOT_end_bushmen_relocations: "サン人の移転終了"
 BOT_end_bushmen_relocations_desc: "カラハリ野生動物保護区からサン人を移住させるという政策は誤ったものであり、サン人が政府のサービスをより利用しやすくするという偽りの名目のもとに行われてきた。我々は、彼らが保護区内で伝統的な生活様式を送れるようにすべきである。"
 BOT_ramp_up_bushmen_relocations: "サン人の移転強化"
 BOT_ramp_up_bushmen_relocations_desc: "中央カラハリ動物保護区の野生生物は、保護されなければならない。サン人達は理解できないかもしれないが、彼ら全員を保護区の外に移住させ、より良い生活を送れるようにするほうがよいのだ。"
 BOT_total_ban_on_hunting: "狩猟の全面禁止"
 BOT_total_ban_on_hunting_desc: "サン人は以前から動物保護区での狩猟を禁止されてきたが、高額な料金を支払う意思のある観光客であれば、季節限定の狩猟は可能であった。しかし、もうそんなことは許されない。自然をそのままにしておくためには、保護区内でのあらゆる野生動物の狩猟を禁止しなければならない。"
 BOT_found_NBB: "NBB設立"
 BOT_found_NBB_desc: "国家放送委員会（NBB）は、ボツワナ全土における放送免許の交付、ならびにラジオおよびテレビ放送の管理・監督を担当する。"
 BOT_increase_cattle_production: "畜産業の成長"
 BOT_increase_cattle_production_desc: "ツワナ人の多くは牛の放牧で生計を立てており、そのため牛は我が国の経済の大部分を占めている。農業用放牧が現在私たちが直面している環境問題の主な原因の一つであるとはいえ、より多くの畜産農家を育成していく必要がある。"
 BOT_optimise_cattle_production: "畜産の最適化"
 BOT_optimise_cattle_production_desc: "ツワナ人の多くは牛の放牧で生計を立てており、そのため牛は我が国の経済の大部分を占めている。しかし、農業的な放牧は我々の環境を破壊している。サバンナへの影響を軽減するためには、新しい放牧形態や、より持続可能で管理された畜産を試みる必要がある。"
 BOT_clear_way_for_new_farms: "新規農場のための道を開く"
 BOT_clear_way_for_new_farms_desc: "放牧に利用できる面積は非常に限られている。現在運営している動物保護区や国立公園の一部を縮小し、放牧のためのスペースを確保すべきだ。"
 BOT_refine_the_musi_breed: "ムシ種の改良"
 BOT_refine_the_musi_breed_desc: "ムシ種は、ボツワナの気候に適応させるために1980年代に作出されたボツワナ産の家畜牛である。現代の技術を活用すれば、その特性をさらに向上させることが可能だ。単位面積あたりの肉生産性を高めることで、環境への負荷を軽減することができる。"
 BOT_biofuel_experimentation: "バイオ燃料実験"
 BOT_biofuel_experimentation_desc: "当地域には多くの牛が飼育されているが、その糞尿をエネルギー生産に活用できないだろうか？研究プロジェクトを開始し、何か良い案が浮かぶかどうか検討する必要がある。"
 BOT_biofuel_plants: "燃料生産を目的とした畜産"
 BOT_biofuel_plants_desc: "牛の糞尿はメタンに変換でき、これは石油に代わるよりクリーンな燃料として利用できる。メタンをさらに精製して、非常にクリーンな燃料であるエタノールにすることも可能だ。我々は、この処理を行うための設備を畜産農家や村、一般家庭に提供する必要がある。これにより、エネルギー自給率が大幅に向上するだろう。"
 BOT_encourage_zimbabwean_immigration: "ジンバブエ移民への支援"
 BOT_encourage_zimbabwean_immigration_desc: "成長を続ける畜産業には、より多くの労働力が必要となる。我々はジンバブエの厳しい状況を活かし、国境を越えて入国する人々に対して、もう少し寛容な姿勢を示すべきだ。"
 BOT_form_cattle_communes: "畜産共同体の形成"
 BOT_form_cattle_communes_desc: "畜産農家が組織化し、小規模な集団を形成するのを支援すべきだ。そうすれば、彼らはより良く農業を組織化できるようになる。"
 BOT_support_ditec: "Ditec Mobileを支援"
 BOT_support_ditec_desc: "Ditec Mobileは、ボツワナに拠点を置く携帯電話メーカーである。同社は自社で携帯電話の設計・製造を行っており、まさにアフリカが必要としている革新を体現している。"
 BOT_found_BIUST: "BIUSTの設立"
 BOT_found_BIUST_desc: "現在、国全体に大学は一つしかない。教育機会を拡大する必要があり、そのためボツワナ国際科学技術大学（BIUST）を設立しなければならない。ハボローネ北部のパラピエ町に設置され、より技術的な研究に重点を置くことになる。"
 BOT_found_UBSOM: "UBSOMの設立"
 BOT_found_UBSOM_desc: "ボツワナ大学は、ボツワナで最も歴史のある大学だ。同大学に医学部を設立する必要がある。これは医療分野の発展に寄与するだけでなく、HIVの蔓延との闘いにおける我々の取り組みをより効果的なものにするだろう。"
 BOT_support_deaftronics: "Deaftronicsを支援"
 BOT_support_deaftronics_desc: "Deaftronicsは、現在補聴器用の太陽光発電バッテリーを開発している企業である。アフリカの多くの地域では、通常のバッテリーの入手は高価で困難なため、この革新的な製品は、アフリカに住む何百万人もの聴覚障害者に役立つだろう。Deaftronicsの太陽光発電バッテリーなら、一度購入するだけで、同じバッテリーを数年間使い続けることができる。"
 BOT_namibia_botswana_fiber_cable: "ボツワナ・ナミビア光ケーブル"
 BOT_namibia_botswana_fiber_cable_desc: "ボツワナの現在のインターネット・ネットワークは、世界的なネットワークへのゲートウェイとして南アフリカに大きく依存している。我々はナミビアと協力し、両国を横断する光ファイバーケーブルを敷設し、自国のネットワークを海底ケーブル「西アフリカ・ケーブル・システム」に直接接続すべきである。"
 BOT_namibia_botswana_fiber_cable_tt: "§Cこの合意が発効するには、ナミビアがこれを受け入れる必要がある。もし受け入れた場合§!"
 BOT_national_space_program: "国家宇宙計画"
 BOT_national_space_program_desc: "多くのアフリカ諸国が自国の衛星を軌道に打ち上げることを目指しており、すでに成功を収めた国も少なくない。技術先進国として、我々もこの仲間入りを果たす必要がある。フィンランドのオウル大学をパートナーとして迎え、同大学の協力のもと、キューブサット型の超小型衛星を軌道に打ち上げる予定だ。"
 BOT_innovation_city: "イノベーションシティ"
 BOT_innovation_city_desc: "これほど長い間ハイテク開発に注力してきた以上、ハボローネにビジネスパークを建設し、これらすべてのハイテク産業を一か所に集約させ、さらに多くの企業を誘致する必要がある。"
 BOT_invest_in_debswana: "デブスワナへの投資"
 BOT_invest_in_debswana_desc: "デブスワナは、ボツワナで事業を展開する主要な鉱業会社である。ボツワナ政府と南アフリカのデビアス・グループによる合弁企業であり、4つのダイヤモンド鉱山と1つの石炭鉱山（そのほとんどがボツワナ北東部に位置している）を運営している。我々は、同社の鉱業事業の拡大を支援する必要がある。"
 BOT_the_energy_debate: "エネルギーについての討論"
 BOT_the_energy_debate_desc: "ボツワナのエネルギーの70％は隣国南アフリカから輸入されており、国内で発電される電力の80％はモルプーレ石炭火力発電所によって賄われている。こうした外国へのエネルギー依存と、国内エネルギー源の単一化はリスクを伴う。我々は、南部アフリカ電力プールにおいてエネルギーの純輸出国となる必要がある。"
 BOT_focus_on_coal: "石炭重視"
 BOT_focus_on_coal_desc: "ボツワナ全土には未開発の石炭鉱脈が数多く存在し、いくつかの研究によれば、ボツワナは世界で最も石炭資源が豊富な国の一つである可能性があり、その大部分は未開発のままである。したがって、我々は石炭に注力すべきだ。"
 BOT_focus_on_coal_tt: "§C石炭に注力すれば、近隣諸国へのエネルギー販売でより多くの利益を得られるだろうが、カラハリにとっては壊滅的な打撃となるだろう！§!"
 BOT_focus_on_renewables: "再生可能エネルギー重視"
 BOT_focus_on_renewables_desc: "ボツワナは、どんなに小さな村であっても太陽の光を享受できる国である。私我々は世界に手本を示し、持続可能なエネルギーネットワークを構築しなければならない。費用はかかるが、将来の世代のためにはそれだけの価値があるはずだ。"
 BOT_focus_on_renewables_tt: "§C再生可能エネルギーに注力しても、石炭ほど大きな利益は得られないだろう。だが、カラハリにとってはより良い選択だ！§!"
 BOT_work_with_CIC: "CICとの連携"
 BOT_work_with_CIC_desc: "英領ヴァージン諸島の企業であるCIC（Coal Investment Corp.）は、現地のMeepong Investments Ltd.と共同で、ママブラに炭田を開発することに興味を示している。同地の炭層は、南アフリカの石炭生産量の40％を供給するウォーターバーグ炭田の延長線上にある。その潜在能力は明らかであり、これが実現すれば、我々の石炭生産量は大幅に増加することになる。現地で設立される新会社の名称は「ツワナ・コール」となる。"
 BOT_grid_expansion: "送電網の拡大"
 BOT_grid_expansion_desc: "自家発電ができるのは素晴らしいことだが、電力を国内各地や近隣地域へ送電するには、強固な送電網も必要だ。"
 BOT_solar_panel_grid: "太陽光発電系統"
 BOT_solar_panel_grid_desc: "ボツワナは地理的な位置関係から、ほぼ常に日照に恵まれており、太陽光発電所の建設には絶好の立地となっている。"
 BOT_kalahari_exploitation: "カラハリからの搾取"
 BOT_kalahari_exploitation_desc: "カラハリには豊富なダイヤモンド鉱脈があり、周辺地域には石炭が豊富に埋蔵されている。この地域におけるツワナ・コールの事業を拡大する必要がある。"
 BOT_resource_excavation_research: "石炭採掘研究"
 BOT_resource_excavation_research_desc: "石炭の一部は手が届きにくい場所にある。BIUSTと協力し、可能な限りすべての石炭を採掘する方法を模索する必要がある。"
 BOT_wind_turbine_research: "風力タービン研究"
 BOT_wind_turbine_research_desc: "現在の技術では、ボツワナに風力発電所を建設することは不可能だろう。風況が現代の風力タービンには適していないからだ。この問題の解決策を見つけるための研究に投資する必要がある。"
 BOT_ethanol_power_plant: "エタノール発電所"
 BOT_ethanol_power_plant_desc: "牛糞から抽出したエタノールを利用することで、持続可能な発電方法を実現できる。"
 BOT_botswana_steelworks: "ボツワナ製鉄所"
 BOT_botswana_steelworks_desc: "もっと石炭を採掘しなければ！余った石炭をすべて活用すれば、製鉄所の建設も可能だ。"
 BOT_tuli_wind_park: "トゥリ風力発電所"
 BOT_tuli_wind_park_desc: "北部トゥリ動物保護区は、ボツワナ東端に位置する自然公園である。公園周辺の地形は風力発電所の建設に適しており、そこでボツワナ初の風力発電所を建設する予定だ。"
 BOT_coal_powered_nation: "石炭駆動国家"
 BOT_coal_powered_nation_desc: "石炭がダイヤモンドと競合する資源となりつつある中、ボツワナでは新たな経済勢力が台頭しつつある。ツワナ・コールは、かつてのデブスワナ以上に、ボツワナ政府にとってはるかに重要な存在となっている。"
 BOT_debswana_on_top: "デブスワナ支配の継続"
 BOT_debswana_on_top_desc: "再生可能エネルギー分野は拡大しているものの、新規発電所の多くは小規模な企業が運営している。主要なダイヤモンド生産者であるデブスワナは、ダイヤモンド事業と並んで、ボツワナ経済の主要な担い手の一つであり続けている。"
 BOT_political_effort: "政治的努力"
 BOT_political_effort_desc: "ボツワナの政界は与党のボツワナ民主党が支配している。そのため、国政において野党の存在感は極めて薄い。"
 BOT_assert_independence: "独立主張"
 BOT_assert_independence_desc: "（人口も国土も）小さな国であるため、我々は外国の影響を受けやすい。我々は、自らの道を切り開く力があることを世界に示さなければならない。"
 BOT_found_indian_embassy: "インドでの大使館設立"
 BOT_found_indian_embassy_desc: "インドは1987年からハボローネに大使館を置いているが、インド国内にはまだ我が国の大使館はない。その恩返しとして、ニューデリーに大使館を開設する必要がある。"
 BOT_indian_diamond_institute: "インド・アフリカ・ダイヤモンド研究所"
 BOT_indian_diamond_institute_desc: "インド・ダイヤモンド研究所は、ボツワナに新たな「インド・アフリカ・ダイヤモンド研究所」を設立するため、政府に打診してきた。同研究所にはインド人スタッフが配置され、ダイヤモンドのカット、研磨、グレーディング、およびジュエリー製作の指導を行う予定だ。これにより、我が国のダイヤモンド生産能力が向上することになる。"
 BOT_us_relations: "アメリカに接触"
 BOT_us_relations_desc: "アメリカは長年にわたりボツワナの同盟国であり、過去には多額の開発援助を提供してくれた。"
 BOT_found_ilea: "ILEA設立"
 BOT_found_ilea_desc: "アメリカは、ハボローネに国際法執行アカデミーを設立したいと考えている。同アカデミーは、サハラ以南のアフリカ全域の警察官に対して研修を行うことになる。"
 BOT_saf_relations: "南アフリカとの協力"
 BOT_saf_relations_desc: "ボツワナは、1994年のアパルトヘイト体制の終結以来、南アフリカと外交関係を築いている。両国は1910年から南アフリカ関税同盟に加盟しており、イギリス連邦の一員であったという共通の歴史を持っている。"
 BOT_security_against_zimbabwe: "ジンバブエに対する防衛"
 BOT_security_against_zimbabwe_desc: "ジンバブエの政情不安は、ボツワナと南アフリカの両国にとって脅威となっている。この問題に対する解決策を見出す必要がある。"
 BOT_three_digkosi_nko: "万寿台海外開発会社の採用"
 BOT_three_digkosi_nko_desc: "政府は、ベチュアナランドを南アフリカから分離し、独立した国家とするようイギリスを説得した3人のコシを記念する像の建設を計画している。アフリカでの建設プロジェクトの経験が豊富な北朝鮮の万寿台海外開発会社に、この像の建設を依頼すべきだ。"
 BOT_three_digkosi_domestic: "ボツワナ企業の採用"
 BOT_three_digkosi_domestic_desc: "政府は、ベチュアナランドを南アフリカから分離し、独立した国家とするようイギリスを説得した3人のコシを記念する像の建設を計画している。地元のボツワナ企業に、この像の建設を依頼すべきだ。"
 BOT_condemn_north_korea: "北朝鮮を非難"
 BOT_condemn_north_korea_desc: "北朝鮮の人権侵害は到底容認できない。我々は北朝鮮とのあらゆる外交関係を断絶すべきだ。これにより、ボツワナはアフリカで初めて、朝鮮半島における唯一の正当な朝鮮国家として大韓民国のみを承認する国となる"
 BOT_deepen_cooperation_with_nko: "北朝鮮との協力を深化させる"
 BOT_deepen_cooperation_with_nko_desc: "北朝鮮とボツワナの間の経済的・外交的関係をさらに深めることを目指すべきである。"
 BOT_extra_funding_to_schools: "学校への追加資金提供"
 BOT_extra_funding_to_schools_desc: "教育は、健全な社会を支える礎だ。若者への教育をおろそかにすることはできない。"
 BOT_introduce_school_fees: "学費の再導入"
 BOT_introduce_school_fees_desc: "ボツワナでは1980年代から完全無償の教育を実施し。てきた。しかし、教育費は絶えず増加している。この財政的ギャップを埋めるため、学費を再び導入する必要がある。人気のある措置ではないだろうが、必要な措置だ"
 BOT_expand_nature_reserves: "動物保護区の拡大"
 BOT_expand_nature_reserves_desc: "野生生物をよりよく保護するために、国立動物保護区を拡大する必要がある。"
 BOT_shrink_nature_reserves: "動物保護区の縮小"
 BOT_shrink_nature_reserves_desc: "ボツワナの国土の20％が国立公園に指定されていることを考えると、野生生物保護政策は行き過ぎだったのかもしれない。その土地の一部を、開発可能な地域に戻す必要がある。"
 BOT_remove_death_penalty: "死刑廃止"
 BOT_remove_death_penalty_desc: "ボツワナは、アフリカで依然として死刑制度を維持している数少ない国の一つである。年間およそ1件の死刑執行が行われており（通常は加重殺人から）、その多くは絞首刑によって執行される。これは非人道的な慣行であり、廃止されるべきである。"
 BOT_keep_death_penalty: "死刑維持"
 BOT_keep_death_penalty_desc: "ボツワナは、アフリカで依然として死刑制度を維持している数少ない国の一つである。年間およそ1件の死刑執行が行われており（通常は加重殺人から）、その多くは絞首刑によって執行される。犯罪者や殺人犯に対しては、決して容赦してはいけない。そうしなければ、社会は崩壊してしまうからだ。死刑制度は今後も存続するだろう。"
 BOT_prioritise_industrial_courts: "産業裁判所を優先"
 BOT_prioritise_industrial_courts_desc: "産業裁判所は、ボツワナの司法制度の一環として、労働および産業に関連するあらゆる紛争を扱う機関である。経済を円滑に機能させる上で、その重要性を強調しておく必要がある。"
 BOT_secure_workers_rights: "労働者の権利確保"
 BOT_secure_workers_rights_desc: "鉱業やエネルギー企業は、労働者を劣悪な環境で働かせることで、彼らを搾取している。我々は労働組合を支援し、労働者のためのより良い労働契約を推進する必要がある。"
 BOT_anti_poaching_decisions: "カラハリでの密猟"
 BOT_anti_poaching_decisions_desc: "ボツワナでは密猟が深刻な問題となっている。サイやゾウなどの動物は、角や牙を狙って射殺され、伝統医学の原材料としてアジアの市場に送り出されている。また、金に余裕のある富裕層によって、単なる娯楽として射殺される動物もいる。§Y密猟者§!の多くは隣国のナミビアやザンビアからやって来るが、ボツワナの人々も数多く関与している。ボツワナは数十年にわたり§Y密猟者§!に対して厳しい姿勢をとっており、発見された§Y密猟者§!が即座に射殺されることも珍しくない。\n\n密猟（およびその他の政策）は、カラハリの砂漠化が進行し続ける一因となっており、密猟対策は、野生生物を保護する上で重要な要素である。\n\n§Y砂漠化§!：§R[?kalahari_expands]%§!\n§Y安定化§!：[?kalahari_steady]%\n§Yオアシス化§!：§G[?kalahari_retreats]%§!\n\n毎月\n§Y[?chance_to_not_kill_poachers]%§!の確率で、§Y15人の新たな密猟者§!が活動を開始する。\n§Y[?chance_to_kill_poachers]%§!の確率で、治安部隊が §Y[?no_of_poachers_to_kill]人の密猟者§!を排除する。\n\n§Y治安§! の予算を増やすか、追加の装備や人員で部隊を強化することで、密猟者を排除できる確率を高めることができる。\n\n現在の推定密猟者数： [?no_of_poachers]人（[BOT_threat_level_of_poachers]）"
 BOT_bi_yearly_poaching_report: "年間密猟報告書"
 BOT_bi_yearly_poaching_report_desc: "12か月ごとに、密猟が我が国に与える影響が推定される。§G低い脅威§!では§Y砂漠化§!の発生確率は低下し、§R高い脅威§!では§Y砂漠化§!の発生確率は上昇する。"
 BOT_anti_poaching_dehorn_rhinos: "サイ除角作戦"
 BOT_anti_poaching_dehorn_rhinos_desc: "今年度の対象となるサイの個体群からの除角は、密猟者を寄せ付けないための有効な手段となるかもしれない。角を取り除いてもサイ自体への影響はほとんどないが、これにより密猟者がサイを狩るのを思いとどまらせる可能性がある。"
 BOT_anti_poaching_dehorn_rhinos_tt: "§G成功すれば、密猟者の数は半減するだろう§!"
 BOT_industrial_conglomerates: "デブスワナ"
 BOT_landowners: "部族首長"
 kgosikgolo_leader_trait: "コシコロ"
 BOT_FESTUS_MOGAE_DESC: "フェスタス・モハエは、1998年に就任したボツワナ第3代大統領である。経済学の専門家である彼は、過去に国際通貨基金（IMF）やボツワナ銀行に勤務したほか、1989年から1998年にかけて財務大臣を務めた。彼の主要な選挙公約の一つは、国内の貧困と猛威を振るうHIVの蔓延との闘いだった。"
 BOT_IAN_KHAMA_GENERATED_DESC: "イアン・カーマは、ボツワナ初代大統領セレツェ・カーマの息子である。1998年に政界入りして副大統領に就任する前、カーマはボツワナ国防軍の司令官を務めていた。カーマは、ジンバブエのロバート・ムガベやスーダンのオマル・アル＝バシールといったアフリカの独裁的な指導者たちに対して、率直に反対の立場を表明している。\n\nカーマの目標の一つは、ボツワナの経済をダイヤモンド採掘から脱却させ、農業や観光業へと多角化することである。また、彼は断固たる禁酒主義者でもあり、ボツワナ最大の課題と見なしているアルコール消費を大幅に削減することを目指している。"
 BOT_IAN_KHAMA_2017_DESC: "イアン・カーマは、ボツワナ初代大統領セレツェ・カーマの息子である。1998年に政界入りして副大統領に就任する前、カーマはボツワナ国防軍の司令官を務めていた。カーマは、ジンバブエのロバート・ムガベやスーダンのオマル・アル＝バシールといったアフリカの独裁的な指導者たちに対して、率直に反対の立場を表明している。\n\nカーマの目標の一つは、ボツワナの経済をダイヤモンド採掘から脱却させ、農業や観光業へと多角化することである。また、彼は断固たる禁酒主義者でもあり、就任時に（70％の課税に失敗した後）30％の酒税を課した。さらに2014年にはゾウの狩猟を禁止した。"
 BOT_MOKGWEETSI_MASISI_DESC: "モクウィツィ・マシシは、長年にわたり政治家や外交官として活躍したエジソン・マシシの息子である。マシシは映画『愛しき祖国よ』で高い評価を得ており、南アフリカの映画作品にも数多く出演している。マシシはイアン・カーマの後継者としてボツワナ民主党党首に就任したが、この決定に対しカーマは強く反対の意を表明している。マシシは権威主義的な見解で批判されており、選挙不正やボツワナの国際的イメージの低下について彼を非難する声も多い。また、マシシは「一つの中国」政策を支持している。"
