 HOL_Thales_equipment_manufacturer_desc: "Thales Netherlands — ведущий поставщик высокотехнологичных систем обороны и безопасности, специализирующийся на передовых радиолокационных системах, морских боевых системах и оборонной электронике. Обладая многолетним опытом, Thales играет ключевую роль в модернизации и оснащении вооружённых сил Нидерландов, обеспечивая технологическое превосходство как в военно-морском секторе, так и в сфере противовоздушной обороны."
