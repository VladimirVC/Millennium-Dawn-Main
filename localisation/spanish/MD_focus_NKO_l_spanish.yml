 NKO_china_economic_assistant: "Ayuda Económica China"
 NKO_china_economic_assistant_desc: "La ayuda económica de China a Corea del Norte representa aproximadamente la mitad de toda la ayuda exterior china. Pekín proporciona la ayuda directamente a Pyongyang, permitiéndole así eludir las Naciones Unidas. Durante el período de grave escasez de alimentos entre 1996 y 1998, Pekín proporcionó ayuda alimentaria incondicional a Corea del Norte."
