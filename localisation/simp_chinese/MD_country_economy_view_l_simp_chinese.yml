 total_civilian_factories_amount_tt: "这个数字代表了我们国家的§Y民用工厂§!总数量。"
 total_civilian_factories_amount_tt_delayed: "此建筑可为所属地区提供生产民用商品或建造新建筑的工业能力。亦可因需转换为军用工厂。\n\n为所属地区提供：\n所需工人基础数量：§Y206K§!\n每个§Y民用工厂§!的基本GDP产出：$§Y17.5B§!\n基础能源消耗：§R-0.5§! GW\n\n生产率对§Y民用工厂劳动力§!的影响：[?worker_requirement_productivity_multiplier_display|-%0]\n法律，国家精神和科技对§Y所有建筑所需劳动力§!的影响：[?modifier@buildings_worker_requirement_modifier|-%0]\n法律，国家精神和科技对§Y民用工厂劳动力§!的影响：[?modifier@civ_facs_worker_requirement_modifier|-%0]\n\n§Y民用工厂§!所需劳动力：[?workers_per_civ_fac_display|2]K\n"
 total_military_factories_amount_tt: "这个数值代表了我们国家的§Y军用工厂§!的总数。"
 total_military_factories_amount_tt_delayed: "此建筑可为所属地区提供生产军事装备的工业能力。亦可因需转换为民用工厂。\n\n为所属地区提供：\n所需工人基础数量：§Y18.8K§!\n每个§Y军用工厂§!的基本GDP产出：$§Y1.5B§!\n基础能源消耗：§R-0.5§! GW\n\n法律，国家精神和科技对§Y所有建筑所需劳动力§!的影响：[?modifier@buildings_worker_requirement_modifier|-%0]\n法律，国家精神和科技对§Y军用工厂与海军船坞劳动力§!的影响：[?modifier@mil_facs_worker_requirement_modifier|-%0]\n\n§Y军用工厂§!所需劳动力：[?workers_per_mil_fac_display|2]K\n"
 total_naval_yard_amount_tt: "这个数值代表了我们国家的§Y海军船坞§!的总数。"
