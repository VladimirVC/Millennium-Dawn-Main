 #Events
 switzerland.18.t: "The Question of NATO"
 switzerland.18.desc: "The accession protocols sit on the Federal Council's table. Signing them ends an armed neutrality that has outlasted every empire in Europe."
 switzerland.18.a: "Sign the protocols."
 switzerland.18.b: "Neutrality is not negotiable."
 switzerland.22.t: "Our Place in Europe"
 switzerland.22.desc: "Brussels offers deeper trade access on terms that would bind Swiss regulation to EU law. The cantons are divided."
 switzerland.22.a: "Deepen ties with the EU."
 switzerland.22.b: "Trade with everyone equally."
 switzerland.23.t: "The Swiss Offer"
 switzerland.23.desc: "Bern proposes that the Principality join the Alpine Federation. Liechtenstein already uses the franc and shares our customs union. What remains is the crown."
 switzerland.23.a: "Accept the union."
 switzerland.23.b: "The Principality stands alone."
 switzerland.24.t: "Liechtenstein Accedes"
 switzerland.24.desc: "Vaduz has agreed. The Principality enters the Federation as a full member, and the last independent enclave of the Alps is gone."
 switzerland.24.a: "The Alps are whole."
 switzerland.25.t: "Liechtenstein Refuses"
 switzerland.25.desc: "The Prince has declined. Vaduz will keep its crown, its parliament and its independence, however small."
 switzerland.25.a: "So be it."
 switzerland.26.t: "An Alpine Ultimatum"
 switzerland.26.desc: "Bern has issued an ultimatum: the Principality is to enter the Alpine Federation, by agreement if possible and by force if necessary. Swiss troops are massing along a border that has never needed defending. The Landtag must now decide whether Liechtenstein submits or defies its neighbour."
 switzerland.26.a: "We cannot stand against Switzerland."
 switzerland.26.b: "The Principality will not kneel!"

 #Dynamic Modifiers
 SWI_Heer_modifier: "Schweizer Heer"
 SWI_Heer_modifier_desc: "The Swiss Army is a militia force built on universal conscription, where the citizen keeps his rifle at home and the mountain is treated as the first line of defence. It fields no standing field army of consequence, relying instead on rapid mobilisation, prepared demolitions and fortified alpine terrain."
 SWI_Schweizerische_Luftwaffe_modifier: "Schweizerische Luftwaffe"
 SWI_Schweizerische_Luftwaffe_modifier_desc: "The Swiss Air Force exists to hold the airspace above the Confederation and nothing beyond it. Its aircraft fly from hardened alpine bases and cavern hangars, tasked with interception and air policing rather than power projection."
 SWI_Military_Industry_modifier: "Swiss Military Industry"
 SWI_Military_Industry_modifier_desc: "Swiss arms production is small, precise and jealously independent. Firms such as RUAG, MOWAG and SIG Sauer supply the militia and export abroad, sustaining a defence industrial base far larger than the country's size would suggest."
