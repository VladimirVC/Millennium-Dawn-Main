 the_great_chip_race_modifier: "芯片大竞赛"
 the_great_chip_race_modifier_desc: "我们正与中国展开一场竞赛，以保持我们在微芯片生产领域的优势。我们从这一优势中获得的贸易利益对于维持我们的联盟关系和世界地位至关重要。\n\n随着中国大陆微芯片产量的增加，台湾将获得$production_speed_microchip_plant_factor$增强和$local_resources_microchips_factor$增强。"
 tsmc_modifier: "台湾积体电路制造股份有限公司"
 tsmc_modifier_desc: "台湾国有企业中芯国际几十年来一直引领着全球半导体产业，在产能、工艺节点研究和国际扩张方面都处于领先地位。"
 2_per_capita_or_more_tt: "他们的§Y人均GDP§!是§G2或者更高§!"
 on_cancel_idea_tt: "§Y当这项措施结束时，其影响也将消失。§!"
 CHI_054a_production_line: "054A生产线"
 CHI_054a_production_line_desc: "每个舰队都需要一艘主力舰，而我们的主力舰就是054A型护卫舰。该舰自2008年起连续建造，性能卓越且价格实惠，成为海军的标准护航舰艇，同年中国加入反海盗巡逻行动时，该舰被派往亚丁湾，这是中国首次在远海执行持续任务。"
 CHI_45g_national_deployment: "5G网络部署"
 CHI_45g_national_deployment_desc: "中国移动推出商用4G服务，三年内我们的基站数量就超过了世界其他国家的总和。工信部向三大运营商发放了5G牌照，等到西方运营商还在讨论部署策略时，我们已经运营了410万个5G基站，服务10亿用户。基础设施差距不再是我们正在努力弥合的，而是我们已经扭转的。"
 CHI_863_ic_preparatory_research: "863计划IC预备研究"
 CHI_863_ic_preparatory_research_desc: "根据国家高技术研究发展规划，集成电路设计与制造被列为重点发展领域。国家资金流入珠三角和上海的高校科研中心和早期代工厂试点项目，为国家集成电路基金日后扩大规模、实现产业化生产奠定人力资本和供应链基础。我们播下的种子，需要十年才能结出硕果。"
 CHI_863_nev_program: "863计划新能源汽车路线和十个城市"
 CHI_863_nev_program_desc: "万刚，这位从工程师转型为部长，曾在奥迪工作九年后返回中国的官员认为，我们可以完全跳过内燃机时代。“万城千车”计划在试点城市部署新能源汽车公共车队；深圳实现了公交车和出租车的全面电动化。特斯拉上海超级工厂从破土动工到建成仅用了357天，成为催化剂，迫使所有中国电动汽车制造商在质量和生产速度上展开竞争。对于我们自己创造的市场，我们本应期待这样的结果。"
 CHI_a_lighter_touch_on_dissent: "对异议采取更温和的态度"
 CHI_a_lighter_touch_on_dissent_desc: "我们不采取升级内部强制措施的方式，而是在精心管控的范围内，为公民社会表达和理性辩论留出有限的空间。这种做法以短期政治控制为代价，换取减少推动地下组织活动的摩擦。"
 CHI_abolish_term_limits: "废除任期限制"
 CHI_abolish_term_limits_desc: "全国人民代表大会以2958票赞成、2票反对、3票弃权，通过了从宪法中删除国家主席两届任期限制的决议。该决议形式上与否完全一致，只是名义上并非如此。国家权力不再受宪法时限的约束。这一决定消除了毛泽东时代改革以来对个人权力最重要的制度性制约。"
 CHI_above_the_neck_reform: "颈部以上的改革"
 CHI_above_the_neck_reform_desc: "原有的七大军区隶属于陆军，各自作战。2016年，我们首先“斩断”了核心要道：中央军委掌握直接指挥权，五大战区取代了原有的军区，联合参谋部成立，统战一体化。指挥先于兵力，首脑先于躯体。"
 CHI_active_defense_doctrine: "积极防御"
 CHI_active_defense_doctrine_desc: "自毛泽东时代以来，积极防御一直是军队的指导战略：战略上采取防御姿态，作战和战术上采取进攻姿态。我们根据导弹时代的特点对这一战略进行了调整，认为保卫祖国最可靠的方法就是在敌人的矛头落地之前将其击落。"
 CHI_African_Continental_Integration: "中非世纪"
 CHI_African_Continental_Integration_desc: "我们已成为非洲最大的单一贸易伙伴，双边贸易额每年超过2540亿美元。数十年来，“一带一路”倡议在港口、铁路和经济特区等领域的投资，使我们的基础设施和资本对非盟的非洲大陆一体化议程至关重要。现在是时候将这种经济实力转化为持久的制度伙伴关系了。"
 CHI_agricultural_tax_abolition: "废除农业税"
 CHI_agricultural_tax_abolition_desc: "早在正式讨论蔓延至北京之前，“三农问题”（即农业、农村和农民问题）就已在中国农村地区迅速蔓延。安徽省开展的农村税制改革试点项目揭示了地方税赋对农民收入和农业投资的沉重压榨。中央一号文件连续十年重申了农村问题。废除1958年《农业税条例》释放了积压数十年的农村资本，使其得以流入河南中原、湖南稻米产区和四川盆地。"
 CHI_AIIB_Founding: "亚洲基础设施投资银行"
 CHI_AIIB_Founding_desc: "尽管遭到华盛顿的强烈反对，我们仍与57个成员国共同创立了亚洲基础设施投资银行，该银行为亚洲及其他地区的基建项目提供多边融资。它的存在表明，我们完全可以在布雷顿森林体系之外建立可信赖的国际机构。西方对发展融资的垄断已被打破。"
 CHI_An_Alliance_to_Rival_NATO_tt: "§Y一旦我们建立了自己的阵营，效果就会显现。§!"
 CHI_anshan_steel_modernization: "鞍山钢铁联合企业现代化"
 CHI_anshan_steel_modernization_desc: "中国历史最悠久、规模最大的综合性钢铁企业鞍山钢铁集团正在进行一项重大现代化改造工程。老旧的平炉炼钢设备被碱性氧气转炉炼钢所取代，此举既降低了成本，又提高了下游产品的质量标准。"
 CHI_ant_group_empire: "蚂蚁集团的金融帝国"
 CHI_ant_group_empire_desc: "从阿里巴巴剥离出来的蚂蚁集团，构建了一个涵盖余额宝、芝麻信用、华北银行和网商银行的金融帝国，并在国际上为Paytm、GCash和Dana等平台提供支持。马云在外滩峰会上公开挑战国有银行，将它们比作当铺。几天后，中国证监会和国家市场监督管理总局在蚂蚁集团340亿美元的IPO上市前48小时叫停了该计划。平台行业与国家的关系发生了变化，中国每一位科技高管都明白这意味着什么。"
 CHI_anti_japanese_boycott_campaign: "反日抵制运动"
 CHI_anti_japanese_boycott_campaign_desc: "民众愤怒了。他们的愤怒并非我们造成的。我们只是选择不去阻挡他们，直到我们决定阻挡的那一刻。"
 CHI_Arab_League_Cooperation_Forum: "中国-阿拉伯国家论坛"
 CHI_Arab_League_Cooperation_Forum_desc: "中国-阿拉伯国家合作论坛汇聚了阿拉伯联盟22个成员国的部长级代表，旨在协调“一带一路”项目规划、贸易政策和政治合作。通过这一论坛，我们得以在中东地区保持一条畅通无阻的制度性渠道，完全绕过西方主导的框架。阿拉伯国家通过展现其获取我国资金的渠道，增强了对传统伙伴的影响力；而我们也获得了一个投票立场与我们一致的联盟。"
 CHI_arms_for_influence: "以武力影响"
 CHI_arms_for_influence_desc: "每一箱出口货物带来的价值远不止现金。我们为那些西方供应商避之不及的客户武装武器，并以港口、选票和忠诚度来偿还债务，将军火贸易转化为外交政策的隐形工具。"
 CHI_army_aviation_corps: "陆军航空兵团"
 CHI_army_aviation_corps_desc: "一支没有飞行能力的军队无法快速发起攻击。我们通过装备直-10攻击直升机和直-20运输机来扩充陆军航空兵部队，使快速反应旅拥有自己的武装直升机和运输能力，从而能够越过地形，将部队空投到敌后。"
 CHI_army_reorganisation: "重组军队"
 CHI_army_reorganisation_desc: "新增的13个集团军经过重新编组和平衡，每个集团军都由合成旅而非笨重的师级单位组成。地面部队变得更加精简、模块化，并且最终可以互换部署，能够根据战斗需要进行集结或分散。"
 CHI_artillery_modernisation: "炮兵现代化"
 CHI_artillery_modernisation_desc: "火炮的性能取决于瞄准系统。反炮兵雷达、数字化火控系统和精确制导炮弹将火炮从区域性武​​器转变为精准的手术刀，在第一轮齐射中就能准确打击目标。"
 CHI_assuage_japanese_concerns: "缓解日本的担忧"
 CHI_assuage_japanese_concerns_desc: "他们监视着我们的海岸警卫队，监视着我们的导弹试验。所以，当我们公开取消演习时，他们会注意到。"
 CHI_astana_speech: "丝绸之路经济带"
 CHI_astana_speech_desc: "在阿斯塔纳纳扎尔巴耶夫大学的一次演讲中，有人提出“共同建设丝绸之路经济带”，将我们与欧洲通过中亚连接起来。随后一个月，印尼宣布启动“21世纪海上丝绸之路”计划，这一倡议与此相结合，“一带一路”倡议由此形成。基础设施融资、港口特许经营权和铁路合同如今必须从北京向外流动，其规模之大足以改变世界格局。"
 CHI_avic_reunification: "重新统一中航工业"
 CHI_avic_reunification_desc: "1999年，为了促进竞争，航空业分裂成两个相互竞争的集团，结果却只学会了复制和争吵。2008年，中航工业一公司和中航工业二公司重新合并，成立了新的航空工业集团公司，为空军提供了他们期盼数十年的战斗机、发动机和航空电子设备。"
 CHI_Back_Channel_to_Foggy_Bottom: "通往雾谷的航道"
 CHI_Back_Channel_to_Foggy_Bottom_desc: "中美外交团队通过使馆密室和二轨对话者建立了一条谨慎的秘密渠道。双方私下承认，如果不相互妥协，朝鲜问题就无法解决。"
 CHI_banking_recapitalisation: "银行业资本重组"
 CHI_banking_recapitalisation_desc: "我国银行业在上世纪90年代信贷扩张期间积累了巨额不良贷款。我们必须注入公共资本，清除国有银行资产负债表中的这些负债，然后将重组后的机构在香港交易所上市。随后引入外国少数股东并采用国际会计准则，这将为我国金融体系带来目前所缺乏的信誉。"
 CHI_baosteel_ipo: "宝钢IPO"
 CHI_baosteel_ipo_desc: "宝山钢铁在上海证券交易所上市，创下当时中国钢铁史上规模最大的IPO纪录，募资77亿元人民币。宝钢最初采用日本制铁的技术，在朱镕基“掌握大、放小”的战略指导下，先后收购了上海冶金控股和眉山钢铁。其高等级汽车用钢板和电工用钢带的一体化生产模式，为中国钢铁行业的现代化进程树立了标杆。"
 CHI_baowu_merger: "宝武钢铁的诞生"
 CHI_baowu_merger_desc: "宝钢集团与武汉钢铁集团合并，成立了中国宝武钢铁集团，这奠定了我们打造具有全球竞争力的国家钢铁龙头企业的战略基础。在董事长陈德荣的领导下，宝武钢铁随后收购了马鞍山钢铁、太原钢铁、重庆钢铁和新疆八一钢铁。宝武钢铁年产量超过1.15亿吨，超越安赛乐米塔尔，成为全球最大的钢铁生产商。"
 CHI_bat_platform_rise: "BAT崛起"
 CHI_bat_platform_rise_desc: "百度、阿里巴巴和腾讯定义了我们的互联网。谷歌退出后，百度主导了搜索领域；阿里巴巴打造了全球最大的电子商务生态系统；腾讯的微信拥有13亿用户。将西方竞争对手拒之门外的政策环境并非这些公司的缔造者，但它为这些公司提供了发展空间，使它们免于被硅谷资本收购或摧毁。这种发展空间是一种战略选择，而且是正确的。"
 CHI_bayan_obo_ree_group: "白云鄂博集团和中国稀土集团"
 CHI_bayan_obo_ree_group_desc: "邓小平曾指出，中东有石油，而我们有稀土。位于内蒙古包头的白云鄂博矿床，由中国北方稀土集团运营，是世界上最大的轻稀土矿床；江西赣州矿区供应包括镝和铽在内的重稀土。工信部已将六家区域性生产商整合为中国稀土集团和中国北方稀土集团。出口配额制度在世贸组织裁决后被正式废除，如今又以出口许可证和生产配额的形式回归，其效果与配额相同。我们必须利用这一优势，以免被他人找到替代品。"
 CHI_Beidou_Latin_Constellation: "北斗拉丁地面站"
 CHI_Beidou_Latin_Constellation_desc: "我们在阿根廷和委内瑞拉的北斗导航系统地面站将该定位系统的精度扩展到了西半球，并降低了该地区对美国GPS基础设施的依赖。这些军民两用设施为民用农业和测绘合同提供支持，同时为我们提供战略定位数据。华盛顿将这些设施视为对其在美洲信号情报主导地位的直接挑战，而华盛顿的担忧不无道理。"
 CHI_beijing_action_plan_green_olympics: "绿色奥运会行动计划"
 CHI_beijing_action_plan_green_olympics_desc: "我们申办奥运会时向国际奥委会承诺，将举办一场对环境负责的盛会。现在，我们必须兑现这一承诺：大规模植树造林，北京供热系统煤改气，工业迁出首都以外地区，提高车辆排放标准，以及在六个城市建设场馆。全世界都在关注。"
 CHI_beijing_command_clique: "北京指挥集团"
 CHI_beijing_command_clique_desc: "各地方势力汇聚到首都。一个由收买的将领组成的网络控制了北京的指挥机构，以至于任何晋升、合同或调任都必须经过他们的批准和好处。"
 CHI_Beijing_Communique: "北京和平公报"
 CHI_Beijing_Communique_desc: "我们已将自身定位为沙特与伊朗历史性关系正常化的斡旋者，促使这两个地区宿敌在我们的斡旋下恢复外交关系。这份公报表明，我们能够实现华盛顿无法或不愿实现的地缘政治目标，从而巩固了我们作为替代安全保障者的信誉。地区舆论如今已明显倾向于我们的外交领导地位，我们应当充分利用这一优势。"
 CHI_beijing_tianjin_hsr: "北京-天津高速铁路"
 CHI_beijing_tianjin_hsr_desc: "京津城际铁路​​全长117公里，时速350公里，仅需30分钟即可通行，标志着中国高速铁路建设的开通。川崎、西门子、阿尔斯通和庞巴迪等公司的技术经中国南铁路和中国北铁路吸收并实现国产化，这两家公司后来合并成立了中车集团。温州发生的一起事故促使列车时速降至300公里，并加强了质量标准。如今，中国高速铁路总里程已超过4万公里，而这仅仅是开始。"
 CHI_below_the_neck_disband: "解散颈部以下"
 CHI_below_the_neck_disband_desc: "随着高层指挥机构的重组，刀刃转向了下部。自2017年4月起，这项“脖颈以下”改革将军团解散为合成旅，裁减了30万兵力，并将军队的作战方式从大规模作战转向机动作战。整支军队从编制中消失，以便让剩余的部队真正具备作战能力。"
 CHI_Belt_and_Road_Vision: "一带一路倡议"
 CHI_Belt_and_Road_Vision_desc: "启动“一带一路”倡议，投资数千亿美元用于基础设施项目，通过公路、铁路、港口和数字网络连接亚洲、非洲和欧洲与中国。"
 CHI_Bide_Your_Time: "韬光养晦"
 CHI_Bide_Your_Time_desc: "遵循邓小平的原则：避免对抗，发展经济联系，悄然积累综合实力。中国的崛起无需引发针对它的联盟。"
 CHI_big_four_ipo: "四大IPO浪潮"
 CHI_big_four_ipo_desc: "我国国有银行正完成一波前所未有的上市浪潮。中国建设银行在香港募集92亿美元；工商银行在香港和上海两地同步上市，募资额达219亿美元，创下世界纪录；中国农业银行以221亿美元超越工商银行。工商银行目前是全球资产规模最大的银行，四大国有银行均被列入金融稳定理事会全球系统重要性银行名单。中央汇金投资仍是各银行的最大股东。"
 CHI_big_fund_phase2: "大基金第二阶段"
 CHI_big_fund_phase2_desc: "国家集成电路基金第二期募集2000亿元人民币，用于采购设备、材料和先进封装技术，以填补美国制裁暴露出的供应链缺口。随后将启动第三期，规模超过3000亿元人民币，这将是半导体史上单笔规模最大的资金筹集。战略已从产能扩张转向全面垂直整合：从晶圆到封装后的SoC，整个产业链的每个环节都将实现国产化或自主研发。唯有如此，才能确保我们所需的安全保障。"
 CHI_big_fund_phase_1: "半导体产业投资基金"
 CHI_big_fund_phase_1_desc: "国务院印发第十八号文件，将半导体产业列为战略性产业。国家集成电路产业投资基金（简称“大基金”）首轮募资1387亿元人民币，为国家主导的涵盖代工、设计和设备等各个环节的资本调动奠定了基础。我们将资金投入中芯国际、华为海思以及一系列省级联合投资机构。我们不能再继续依赖台积电和阿斯麦等公司的技术，而这支基金正是我们决心的体现。"
 CHI_blue_granary_aquaculture: "蓝色粮仓"
 CHI_blue_granary_aquaculture_desc: "我国水产养殖业年产量达5200万吨，约占全球总产量的60%，占我国水产捕捞量的80%。广东珠江三角洲拥有世界上最密集的罗非鱼养殖池塘网络；浙江宁波舟山沿海地区是虾蟹养殖的中心。黄海深水鲑鱼养殖试验正在将沿海农业区转变为蛋白质出口中心，但抗生素滥用和太湖富营养化等环境问题仍未得到解决，我们不能无限期地忽视这些问题。"
 CHI_bow_to_china_dream: "向中国梦致敬"
 CHI_bow_to_china_dream_desc: "当反腐风暴来袭时，这个联盟并没有瓦解，而是选择了妥协。这个小集团高调宣誓效忠习近平的“中国梦”，象征性地交出少数人，并通过公开掠夺换取更为隐秘的特权，从而得以苟延残喘。"
 CHI_break_the_first_island_chain: "打破第一岛链"
 CHI_break_the_first_island_chain_desc: "这条锁链从九州经琉球群岛延伸至台湾。四十年来，它将我们的海军困在了近海。锁链会在最薄弱的环节断裂。而这个环节终将断裂。"
 CHI_BRI_Forum_Beijing: "“一带一路”合作论坛"
 CHI_BRI_Forum_Beijing_desc: "在北京举行的“一带一路”国际合作高峰论坛规模逐年扩大，汇聚了来自100多个国家的国家元首和高级官员，旨在协调项目规划、签署框架协议，并展现我们在全球发展议程中的领导地位。没有任何其他国家能够组织如此规模的会议。"
 CHI_byd_catl_integration: "实现你的梦想"
 CHI_byd_catl_integration_desc: "王传福创立的比亚迪，最初是一家深圳电池制造商，如今已停止生产纯燃油车，其刀片电池的磷酸铁锂电池一体化技术为安全性和成本树立了新的标杆。宁德时代则利用政府的电池白名单政策，将松下、LG和三星SDI等公司拒之门外，从而建立起牢不可破的市场地位。如今，这两家公司合计控制着全球超过60%的电动汽车电池产量。我们白手起家，打造了这个行业，它属于我们。"
 CHI_cadre_evaluation_reform: "干部评价改革"
 CHI_cadre_evaluation_reform_desc: "我们的干部考核体系长期以来奖励那些在经济产出之外，却破坏环境、忽视公共服务的省级官员。我们必须在经济产出之外，强制引入环境保护、社会和谐、能源强度等因素的权重。以破坏经济增长条件为代价实现增长的官员，不配得到晋升。"
 CHI_cadre_rotation: "干部轮换制度"
 CHI_cadre_rotation_desc: "地方势力把持是中国治理体系的核心弊病。官员长期担任同一职务，会与当地商业利益集团建立密切联系，从而影响其判断力。借鉴重庆的经验，一套系统的轮岗制度定期调动干部，打破裙带关系网络，防止其固化。"
 CHI_caojing_seven_chem_bases: "上海漕泾石化基地"
 CHI_caojing_seven_chem_bases_desc: "国务院指定了七个国家级石化基地：上海漕泾化工园区，其次是南京、宁波大协、大亚湾、泉州、大连和曹妃甸。每个基地都拥有集中式蒸汽供应、共享污水处理系统、专用港口设施和一体化乙烯裂解装置，复制了巴斯夫在路德维希港首创的一体化生产模式。巴斯夫、拜耳、埃克森美孚、壳牌和沙特阿美通过合资企业或全资子公司获得这些基地的使用权。巴斯夫湛江工厂投资100亿欧元，成为巴斯夫在全球最大的单笔投资 - 这体现了当我们愿意向外资开放市场时，我们的市场能够提供多么巨大的价值。"
 CHI_Central_Asia_Connectivity: "丝绸之路经济带"
 CHI_Central_Asia_Connectivity_desc: "丝绸之路经济带横贯中亚陆路，以位于哈萨克斯坦边境的霍尔果斯陆港为核心，该陆港是连接中国窄轨铁路和俄罗斯宽轨铁路网的铁路公路转运枢纽。随着陆路运输时间缩短，海运在时效性要求高的货物运输方面更具优势，沿线货运量不断增长。我们应该在竞争对手意识到其战略价值之前，加快对这条走廊的投资。"
 CHI_central_china_development: "中国中部崛起"
 CHI_central_china_development_desc: "河南、湖北和湖南等中部省份未能赶上沿海地区的经济增长。一项协调发展计划将财政转移支付、基础设施投资和制造业转移引入这些地区，使中国的人口和农业中心地带成为经济增长的基石。"
 CHI_central_manufacturing_belt: "中部制造带"
 CHI_central_manufacturing_belt_desc: "2008年以后，沿海地区工资上涨促使制造商向西迁往安徽、江西和湖南。政府对工厂搬迁的激励措施，加上较低的土地和劳动力成本，使得这三个省份在十年内发展成为中国的中型工业骨干，吸收了来自珠江三角洲和长江三角洲的纺织、电子和汽车零部件等产业链。"
 CHI_central_military_civil_fusion: "军民融合"
 CHI_central_military_civil_fusion_desc: "军工经济与民用经济之间的壁垒被命令拆除。在习近平2017年提出的军民融合战略（该战略被提升为国家优先事项）下，商用电子、计算机和航空航天领域的每一项进步都惠及军队，而每一项国防突破都回流到工业界。全国的科研成果都成了总参谋部的实验室。"
 CHI_central_urbanization_drive: "中部城镇化进程"
 CHI_central_urbanization_drive_desc: "据估计，约有1亿来自中部省份的农村移民正涌入省会城市和县城。我们应该通过住房补贴、扩大城镇服务、有针对性地放宽户籍制度等措施加快这一转型。必须趁着人口窗口期尚未关闭，将中部腹地从劳动力储备地转变为消费市场。"
 CHI_Challenge_Dollar_Hegemony: "挑战美元霸权"
 CHI_Challenge_Dollar_Hegemony_desc: "推广人民币作为替代储备货币，并建立双边货币互换协议，削弱美元对全球金融的垄断地位。"
 CHI_change_lunar_exploration: "嫦娥月球计划"
 CHI_change_lunar_exploration_desc: "嫦娥探月计划始于2007年的轨道器发射，随后经历了软着陆、玉兔号月球车以及2019年1月具有里程碑意义的嫦娥四号任务。嫦娥四号任务首次将着陆器和月球车送上月球背面。这些任务传回的数据重塑了我们对月球地质的认知，并为后续载人探月任务奠定了科学基础。"
 CHI_china_among_the_starts: "中国翱于星际"
 CHI_china_among_the_starts_desc: "我们的神舟计划使我们跻身少数几个能够独立进行载人航天的国家之列。后续任务实现了轨道对接、舱外活动，并为永久性空间站奠定了基础。现在，我们必须在此基础上继续努力，巩固我们作为与美国和俄罗斯并驾齐驱的航天强国的地位。"
 CHI_Chinese_Diplomacy: "中国外交"
 CHI_Chinese_Diplomacy_desc: "中国历来在东亚事务中扮演着核心角色。如今，我们已经从百年屈辱中恢复过来，是时候制定一项涵盖区域邻国和全球机构的全面外交战略了。"
 CHI_chongqing_model_nationalisation: "重庆模式"
 CHI_chongqing_model_nationalisation_desc: "薄熙来领导下的重庆证明，在中华人民共和国境内，国家干预主义与市场自由主义的替代方案依然可行。通过战略资产国有化和引导信贷流向国有企业，重庆的GDP增速远超全国平均水平。我们将把这一模式推广到全国各地。"
 CHI_cic_forex_reserves: "中国投资有限责任公司"
 CHI_cic_forex_reserves_desc: "我们已积累了超过1.4万亿美元的外汇储备，这些储备主要投资于低收益的美国国债，更多地满足了美国的融资需求，而非我们自身的融资需求。中国投资有限责任公司资本金为2000亿美元，将这笔主权财富分散投资于全球私募股权、基础设施和战略资产。在金融危机期间，中国投资有限责任公司在黑石集团和摩根士丹利的投资遭遇早期损失后，如今已成长为一家稳健的投资机构，管理着超过1.3万亿美元的资产，位列全球最大的主权财富基金之列。"
 CHI_cj10_cj20_cruise_missile_family: "长剑-10与长剑-20"
 CHI_cj10_cj20_cruise_missile_family_desc: "远程巡航导弹赋予轰炸机强大的火力。陆基长剑-10和空基长剑-20导弹使单架轰-6轰炸机即可打击1500公里外的固定目标，在无需机组人员冒险飞越目标区域的情况下，显著提升了整个部队的作战半径。"
 CHI_cloud_computing_triumvirate: "云计算三巨头"
 CHI_cloud_computing_triumvirate_desc: "阿里云占据公有云市场39%的份额；腾讯云主宰游戏和金融科技后端； 2019年制裁后，华为云作为美国服务的国内替代品激增。根据《网络安全法》，外国提供商仅限于合资企业。我们已经建立了足够大的国内云基础设施来维持数字经济而不依赖外国，这并非偶然。"
 CHI_coastal_acceleration_doctrine: "沿海加速理论"
 CHI_coastal_acceleration_doctrine_desc: "沿海省份是经济增长最快的地区，也是自由化成果最显著的地区。我们应该将优惠政策集中于珠江三角洲和长江三角洲：增加出口加工区数量，放宽工业园区用地配额，并允许沿海地区政府优先发行基础设施债券。待沿海地区模式成熟后，内陆地区再逐步效仿。"
 CHI_coastal_sez_2nd_generation: "第二代经济特区"
 CHI_coastal_sez_2nd_generation_desc: "深圳和浦东第一代经济特区的成功验证了这一模式。第二代经济特区分别设在上海和广东，这些特区拥有更完善的法律框架、更优化的物流体系和更强有力的知识产权保护，旨在吸引更高价值的外资。"
 CHI_combat_engineer_modernisation: "工程兵队伍现代化"
 CHI_combat_engineer_modernisation_desc: "桥梁、缺口和防御工事决定着一个旅的推进或停滞。工兵部队重新装备了现代化的架桥车、扫雷车和土方车辆，以确保地形不再阻碍推进。"
 CHI_commercial_launch_sector: "商业发射部门"
 CHI_commercial_launch_sector_desc: "自2015年以来，新一代中国商业发射企业已从蓝图走向发射台。蓝空航天于2023年发射了首枚以甲烷为燃料的火箭 - 朱雀二号；银河能源和宇航航天也已成功发射了多次小型卫星。国家对这一生态系统的支持拓宽了我们的产业基础，降低了发射成本，并吸引了私人资本进入航天经济领域。"
 CHI_common_prosperity: "共同繁荣"
 CHI_common_prosperity_desc: "共同繁荣是我们现在的首要任务。增长必须转向缩小收入差距、扩大社会服务和限制私营部门过度扩张。辅导机构、科技平台和娱乐产业必须接受新的界限。既定目标是实现广泛共享的发展；实际效果是，我们重新掌控那些曾经超出我们控制范围的领域，这两点同时成立。"
 CHI_common_prosperity_original: "共同繁荣"
 CHI_common_prosperity_original_desc: "发展的目标并非无限扩大蛋糕，而让穷人只能争抢面包屑。共同繁荣意味着在发展过程中公平分配蛋糕 - 重新分配收入，扩大社会服务，并确保工业化的成果惠及建造工厂的工人以及规划工厂的官员。"
 CHI_Community_of_Shared_Future: "共享未来的共同体"
 CHI_Community_of_Shared_Future_desc: "倡导人类命运共同体理念，主张多边主义和互利共赢的合作，以此作为西方主导的机构的替代方案。"
 CHI_Comprehensive_Agreement_Investment: "欧盟-中国投资协定"
 CHI_Comprehensive_Agreement_Investment_desc: "经过七年谈判达成的《全面投资协定》将使我国企业更容易进入欧洲服务市场，以换取欧盟在国家援助透明度方面做出承诺。尽管欧洲议会因相互制裁而暂停了该协定的批准，但该协定的经济逻辑依然成立。一项获得批准的协定将大幅降低中国资本进入欧盟单一市场的壁垒，我们应该敦促布鲁塞尔重启该协定。"
 CHI_construction_soe_champions: "国家级建设冠军"
 CHI_construction_soe_champions_desc: "中国建筑股份有限公司、中国铁建股份有限公司、中国交通建设股份有限公司和中国电力建设股份有限公司在全球承包商排名中占据前十名中的七个席位。数十年来，国内大型项目为我们积累了超过两百万训练有素的劳动力，单位成本比西方竞争对手低20%至30%，采购网络比任何私营竞争对手都能更快地获取材料。我们必须保护这些结构性优势，因为它们直接转化为我们在国内承建或出口的各类基本建设项目更低的成本和更短的工期。"
 CHI_cosco_global_network: "中远集团全球海事网络"
 CHI_cosco_global_network_desc: "中远海运与中国海运的合并，缔造了全球最大的集装箱航运公司之一，随后对东方海外国际的收购，进一步拓展了我们的业务版图。中远海运港口目前在比雷埃夫斯、泽布吕赫、瓦伦西亚、新加坡、阿布扎比和尚凯设有码头。21世纪海上丝绸之路将这些节点连接成一个横跨五大洲、由国家支持的航运网络。我们再也不用依赖外国航运公司来运输货物了。"
 CHI_Counter_Terrorism_Cooperation: "反恐合作"
 CHI_Counter_Terrorism_Cooperation_desc: "恐怖主义、分裂主义和极端主义威胁地区稳定。通过在上海合作组织内部建立联合反恐机制，我们可以协调成员国之间的情报共享和安全行动。"
 CHI_crewed_lunar_landing: "载人登月"
 CHI_crewed_lunar_landing_desc: "中国的载人登月计划目标是月球南极地区，计划在2030年左右实现首次着陆。该任务方案将由长征十号重型运载火箭搭载梦舟载人飞船和揽月着陆器，分别从文昌航天发射场发射升空，并在月球轨道上进行交会。如果成功，中国将成为第二个实现载人登月的国家。"
 CHI_cross_strait_military_posture: "海峡两岸军事态势"
 CHI_cross_strait_military_posture_desc: "台独势力已在台北巩固了政治权力，我们绝不能对此视而不见。解放军必须加强对台海的部署：增加两栖演习的频率和规模，将对岛防空识别区的空中巡逻列为常规行动。统一不仅仅是一种政治倾向，更是国家的核心目标，其背后的力量必须坚定不移。"
 CHI_crossborder_ecommerce: "跨境电子商务"
 CHI_crossborder_ecommerce_desc: "我们的制造商现在直接面向全球消费者销售产品，绕过了以往由外国品牌掌控的传统分销渠道。希音的超快生产周期源自广州番禺工厂；拼多多海外上线一年内便成为美国下载量最高的应用程序。跨境出口额达到4000亿美元；西方政府却以最低限度的关税壁垒作为回应。他们正在重建的关税壁垒恰恰说明了我们出口商的实力有多么强大。"
 CHI_davos_boycott: "抵制达沃斯论坛"
 CHI_davos_boycott_desc: "世界经济论坛代表着无国家资本的意识形态 - 这种秩序将主权发展置于跨国金融利益之下。我们不会再让最高官员在瑞士山地度假胜地向银行家们卑躬屈膝。我们的道路是自力更生和国家主导的增长，而不是披着阿尔卑斯山外衣的华盛顿共识。"
 CHI_Debt_Trap_Diplomacy: "债务陷阱外交"
 CHI_Debt_Trap_Diplomacy_desc: "以最大限度发挥中国对债务国影响力的条款提供贷款。当债务国无力偿还时，则以港口准入、资源开采权和政治结盟等形式，迫使其做出战略让步。"
 CHI_defence_industry_consolidation: "国防工业整合"
 CHI_defence_industry_consolidation_desc: "中航工业、中国船舶重工、北方工业以及其他国防工业巨头，虽然各自实力雄厚，但整体而言却浪费严重。我们应该加强国资委对它们的监管，消除重复建设，引导研发投入到重点项目，并对企业管理实行绩效合同。四川和广东的专用生产设施必须扩建，江南造船厂也亟需新的船坞投资。"
 CHI_designated_succesor: "指定接班人"
 CHI_designated_succesor_desc: "邓小平设计的集体领导模式包含一套有序的继任机制：每一位最高领导人都会培养一位接班人，以防止出现无限期的一人独裁。如今，我们正努力在这一传统的期望与自身巩固权力的逻辑之间寻求平衡。指定接班人能够安抚那些对不受制约的个人权力心存疑虑的派别，而团牌则以象征性的让步换取各方的默许。为了稳定，这是值得付出的代价。"
 CHI_Digital_Silk_Road: "数字丝绸之路"
 CHI_Digital_Silk_Road_desc: "通过5G网络、光纤电缆和智慧城市技术，将中国的数字基础设施扩展到发展中国家，从而建立持久的技术依赖性。"
 CHI_Digital_Silk_Road_Initiative: "数字丝绸之路倡议"
 CHI_Digital_Silk_Road_Initiative_desc: "华为和中兴已在80多个国家建设了4G和5G网络、海底光缆以及智慧城市监控平台。“数字丝绸之路”在伙伴国家建立了深厚的技术依赖性，并使我们能够优先使用其电信基础设施。我们应该加快这一计划的推进，以免西方监管机构的压力迫使更多政府将我们的公司排除在外。"
 CHI_digital_yuan_ecny: "数字化人民币"
 CHI_digital_yuan_ecny_desc: "中国人民银行已启动数字货币电子支付项目，在深圳、苏州和北京等地试点通过商业银行发行电子人民币。目前已有2.6亿个电子钱包投入使用。多边央行数字货币桥项目正在测试与香港、泰国和阿联酋进行跨境央行数字货币结算，作为SWIFT的替代方案。数字人民币不仅仅是一种支付工具，它更是构建不依赖于华盛顿的货币秩序的基础设施。"
 CHI_distant_water_fishing_strategy: "远海捕鱼策略"
 CHI_distant_water_fishing_strategy_desc: "我们的远洋捕捞船队目前拥有超过2500艘渔船，作业范围涵盖毛里塔尼亚、塞拉利昂、阿根廷和秘鲁的专属经济区。该项目源于中国国家渔业总公司首次西非海域考察。“走出去”战略将远洋捕捞纳入我国粮食安全政策的常态化组成部分。燃油补贴、制冰船以及在巴塔、沃尔维斯湾和蒙得维的亚的港口协议为远洋捕捞作业提供了保障，浙江舟山群岛则是主要的加工中心。"
 CHI_ditiao_gang_crackdown: "打击非法钢铁行动"
 CHI_ditiao_gang_crackdown_desc: "超过600家未注册的感应炉钢厂，每年生产约1.4亿吨不合格的地条钢，必须予以关闭。工信部已将此作为供给侧结构性改革的重点。随着影子产量的吸收，官方产量数据将会上升，钢材质量将会提高，低等级钢材的退出市场也会导致价格上涨。那些从这场混乱中牟利的钢筋商贩的时代已经结束了。"
 CHI_document_nine: "九号文件"
 CHI_document_nine_desc: "一份题为《论当前意识形态领域状况》的党内机密公报列出了七项必须压制的西方意识形态威胁：宪政民主、公民社会、新自由主义、新闻自由、历史虚无主义、对社会主义的质疑以及对党内改革的怀疑。大学和官方媒体被强制要求进行相关学习。一夜之间，可接受思想的界限迅速缩小，而对外国观念的排斥则成为忠诚的体现。"
 CHI_domestic_eda: "国内EDA和IP"
 CHI_domestic_eda_desc: "电子设计自动化软件 - 用于设计集成电路的工具 - 此前几乎完全由楷登电子、新思科技和明导国际三家公司提供。在美国将EDA工具列入实体清单管制后，我们转而投资华大九天科技、概伦和芯和。国内EDA在成熟节点上的覆盖率已达到全流程水平，但5纳米以下先进节点的覆盖率仍不完整。各国对国内IP模块的授权许可与EDA的开发相辅相成，我们必须在华盛顿注意到我们已取得如此成就之前，弥合剩余的差距。"
 CHI_dragon_eye_over_lanzhou: "兰州龙眼"
 CHI_dragon_eye_over_lanzhou_desc: "中国自主研发了宙斯盾系统。以2004年服役的兰州号为首的052C型驱逐舰，装备了346型“龙眼”相控阵雷达和海红旗-9导弹，使中国军舰首次具备了真正的舰队区域防空能力。中国海军终于能够捍卫自己的海上领空。"
 CHI_dual_credit_auto_export: "双元制信用体系和世界最大出口国"
 CHI_dual_credit_auto_export_desc: "双元制规定为我们市场上的每家汽车制造商分别设立燃油消耗积分账户和新能源汽车积分账户，从而建立起电动汽车的总量控制与交易机制，以竞争压力取代直接补贴。我们现在每年出口超过500万辆汽车，超过日本成为全球最大的汽车出口国。欧盟在基本关税的基础上加征17%至37%的关税；美国则对我们的电动汽车征收100%的关税。但这些壁垒都无法阻止市场已经做出的决定。"
 CHI_eat_imperial_grain: "吃皇粮"
 CHI_eat_imperial_grain_desc: "一支经营酒店、走私汽车、贩卖武器的军队，效忠的是自己的腰包，而不是党。1998年7月，江泽民下令解放军放弃其商业帝国，转而依靠国家粮食，完全依靠预算运转。我们走这条路，最终目标是打造一支专业化、廉洁奉公、只对北京负责的军队。"
 CHI_ecommerce_infrastructure: "中国的电子商务基础设施"
 CHI_ecommerce_infrastructure_desc: "淘宝凭借免费商品刊登和集成消息功能击败了eBay中国，随后天猫将平台拓展至面向国际零售商的品牌B2C店铺。京东则建立了拥有1500个仓库的自有网络和一支全职配送队伍，其运营速度远超我们沿用的任何物流服务。如今，电子商务占我们零售总额的30%，在所有主要经济体中占比最高，而支撑这一切的基础设施完全由我们自主研发。"
 CHI_Economic_Framework_for_Unity: "统一经济框架"
 CHI_Economic_Framework_for_Unity_desc: "朝韩双方及其大国支持者共同勾勒出一幅经济一体化路线图。中国对朝鲜基础设施的投资、韩国的技术转让以及美国的财政担保，构成了朝鲜半岛统一的基石。"
 CHI_Economic_Reintegration: "经济再融入"
 CHI_Economic_Reintegration_desc: "我们开启了将朝鲜经济融入我国工业体系的漫长进程。投资北流，原材料和劳动力南流。中断了一个世纪的朝贡关系得以有效恢复。"
 CHI_Eight_Country_Initiative: "八国太平洋倡议"
 CHI_Eight_Country_Initiative_desc: "我们向八个太平洋岛国提出的综合安全与经济框架，将使我们能够通过一次签署达成一项覆盖整个区域的警务、渔业监测和数据网络协议。这项倡议旨在检验我们能否将我们在太平洋地区积累的外交资源转化为一项足以媲美澳大利亚数十年来维护的区域架构的集体安排。成败将决定我们是引领太平洋地区的制度建设，还是仅仅参与其中。"
 CHI_eleventh_five_year_plan: "第十一个五年计划"
 CHI_eleventh_five_year_plan_desc: "我们的下一个五年计划必须设定具有约束力的目标：单位GDP能源强度强制性降低20%，主要污染物排放量降低10%，服务业占GDP的比重提高。我们还应加大国家对科研和教育的投入，加快农村基础设施建设。缺乏这些约束的增长是无法持续的。"
 CHI_establish_defence_conglomerates: "建立国防集团"
 CHI_establish_defence_conglomerates_desc: "分散的工厂和内讧不断的部门无法武装一个强国。我们将国防工业集中到少数几个庞大的国有企业集团中，每个集团都是各自领域的佼佼者，能够资助研究、汇聚人才并大规模响应军队的命令。"
 CHI_Eurasian_Land_Bridge: "欧亚大陆桥完工"
 CHI_Eurasian_Land_Bridge_desc: "义乌至伦敦的货运服务表明，从中国东部到西欧的陆路铁路走廊已实现商业运营。欧亚大陆的全面一体化意味着我们的制造商只需18天即可将货物运抵欧洲市场，而海运则需要35天。我们现在应该加大投资，提高运力和班次，使这条线路的货运量能够与海运相媲美。"
 CHI_Exercise_Paektu_Honor: "白头山荣誉演习"
 CHI_Exercise_Paektu_Honor_desc: "我们通过在鸭绿江沿岸举行强调防御姿态的双边军事演习来展现克制。向华盛顿传递的信息很明确：我们可以在不引起美国升级反应的情况下管控平壤。"
 CHI_Expand_Foreign_Service: "扩张外事处"
 CHI_Expand_Foreign_Service_desc: "我们必须迅速扩大领事网络和外交队伍。世界上没有任何其他国家像我们一样在全球各地设立如此多的外交机构，我们应该进一步巩固这一优势。"
 CHI_export_processing_zones: "出口加工区"
 CHI_export_processing_zones_desc: "江苏、福建和浙江的指定出口加工区提供保税仓储、简化的海关手续和劳动力成本优势，吸引了来自韩国、台湾和日本的组装企业。中国由此成为东亚生产网络中的最终组装节点。"
 CHI_fabless_design_cluster: "无晶圆厂设计集群"
 CHI_fabless_design_cluster_desc: "我们的半导体设计产业已集中于深圳和上海。国家补贴吸引了数百家初创企业投身消费电子、通信和人工智能加速器等领域的芯片设计。深圳毗邻PCB组装、代工制造和消费电子供应链，使其成为天然的中心；该市的设计集群孕育了海明仕、瑞芯微、全志等公司以及众多规模较小的设计公司，其中许多都获得了省级大型基金的支持。这一生态系统的深度是我们的结构性优势。"
 CHI_factional_balance: "派系平衡"
 CHI_faw_changchun_automotive: "一汽长春扩建"
 CHI_faw_changchun_automotive_desc: "位于长春的第一汽车制造厂是我国历史最悠久的汽车制造商，也是我国整个汽车产业的基石。我们应该扩大其与大众和丰田的合资企业规模，同时引导国家投资发展自主品牌。吉林省将成为我国汽车产业的支柱。"
 CHI_fifty_vanke_handover: "万科交接"
 CHI_fifty_vanke_handover_desc: "到1998年12月，数千家军方控股公司经过评估、登记和产权移交，最终归于民用。价值连城的资产，相当于五十家万科开发商的规模，从此彻底脱离军队的掌控。将军们失去了他们的封地，而党则获得了一把更干净的利剑。"
 CHI_Five_Stars_Highway: "五国公路走廊"
 CHI_Five_Stars_Highway_desc: "一条连接巴西大西洋港口和秘鲁太平洋码头的跨大陆公路走廊横跨五国，可将陆路运输时间缩短数周。该项目是我们南美物流战略的旗舰项目，在大陆范围内复制了巴拿马运河的经济模式。我们的建筑公司和融资机构将承担开发建设的重任，五国人民也将对此表示感谢。"
 CHI_flying_leopard_doctrine: "飞豹学说"
 CHI_flying_leopard_doctrine_desc: "这支舰队在拥有航母之前就学会了空中打击。陆基歼轰-7“飞豹”战斗轰炸机装备有反舰导弹，使海军航空兵成为一支独立的打击力量，能够远距离打击敌方特遣舰队，甚至从岸上击沉敌方舰队。"
 CHI_Forum_China_CELAC: "中国 - 拉美及加勒比国家合作论坛"
 CHI_Forum_China_CELAC_desc: "拉丁美洲和加勒比国家共同体为我们提供了一个绕过长期以来由华盛顿主导的美洲国家组织的多边渠道。这个围绕基础设施、贸易和农业投资建立的部长级论坛，为我们提供了一个削弱美国在其自身半球制度主导地位的工具。我们应该将这一框架视为一项长期投资，而非一次性的姿态。"
 CHI_four_trillion_stimulus: "四万亿元人民币刺激计划"
 CHI_four_trillion_stimulus_desc: "一项相当于国内生产总值12%的4万亿元人民币刺激计划主要用于铁路、公路、机场和社会住房建设。地方政府通过地方政府融资工具借款，为其在该计划中的份额提供共同融资。中国建筑股份有限公司和中国交通建设股份有限公司利用由此产生的合同迅速扩张。在世界其他地区经济萎缩之际，我们避免了衰退，但这项刺激计划导致地方政府财政负债过重，并加速了鄂尔多斯和常州等城市房地产泡沫的形成。这些代价是真实存在的，而且终将到来。"
 CHI_FTA_2015: "中韩自由贸易协定"
 CHI_FTA_2015_desc: "我们与韩国的自由贸易协定现已全面实施。关税减让、联合物流走廊以及扩大农产品和电子产品贸易，加深了双边相互依存，使首尔在与我们的稳定关系中拥有了实质性利益。一个经济上与我们紧密相连的韩国，在与华盛顿发生冲突时，不太可能盲从华盛顿的领导。"
 CHI_game_licensing_regs: "游戏许可法规"
 CHI_game_licensing_regs_desc: "国家游戏政策管理局将未成年人每周玩游戏的时间限制在三小时以内，并要求强制使用人脸识别技术。新华社的一篇社论将游戏比作精神鸦片，导致腾讯股价在一夜之间下跌了10%。新游戏需要获得通用许可证，爱国主义题材的游戏更受青睐。随着游戏工作室转向海外市场，出口受该法规影响而具有意识形态可靠性的游戏，审批工作也随之恢复。"
 CHI_geely_volvo_acquisition: "吉利收购沃尔沃"
 CHI_geely_volvo_acquisition_desc: "李书福以18亿美元从福特手中收购沃尔沃汽车，为中国企业海外收购树立了典范，其重点在于品牌、知识产权和分销网络，而非工厂本身。吉利随后又收购了伦敦出租车公司、宝腾汽车49.9%的股份、路特斯汽车51%的股份以及戴姆勒股份公司9.7%的股份。每一次收购不仅仅是商业交易，更是一种宣言：中国企业能够拥有他们过去只能组装的产品。"
 CHI_Geneva_Carve_Out: "日内瓦双边框架"
 CHI_Geneva_Carve_Out_desc: "瑞士的商业中立传统使其成为我们资本进入欧洲市场、规避欧盟监管审查的天然门户。双边自由贸易协定和一系列金融市场备忘录赋予我们的银行和主权基金在日内瓦立足的平台，其监管力度远低于任何其他欧盟司法管辖区。伯尔尼为我们带来手续费收入和交易量，而我们也获得了一个具有信誉的西方金融中心。"
 CHI_Global_Ambitions: "全球野心"
 CHI_Global_Ambitions_desc: "我们已准备好在世界舞台上定义自身角色。问题不在于我们是否会成为大国，而在于我们选择成为何种大国。"
 CHI_gobi_solar_offshore_wind: "戈壁太阳能带和海上风电基地"
 CHI_gobi_solar_offshore_wind_desc: "我们的《可再生能源法》和国家发改委的上网电价补贴政策构建了推动太阳能成本大幅下降的政策框架。隆基绿色能源、晶科能源、天合光能和晶澳太阳能已将太阳能电池板成本降至每瓦0.10美元以下。新疆和四川的多晶硅产量目前满足全球80%以上的需求。内蒙古库布齐太阳能长城、宁夏腾格里沙漠太阳能园区和新疆哈密太阳能风能基地均为吉瓦级项目；阳江、莆田和盐城的海上风电项目也在不断扩展。双碳承诺为该计划提供了永久性保障。"
 CHI_governance_moderenisation: "治理现代化"
 CHI_governance_moderenisation_desc: "社会信用体系、数字身份基础设施和综合监控网络必须统一在一个框架下，该框架能够追踪合规情况、奖励合作并标记异议。智慧城市技术能够以前所未有的规模实时监控城市人口流动和通信。数字治理是使行政管理更加透明化：民众在各个层面都清晰可见，并能够据此进行有效治理。"
 CHI_grain_for_green_program: "退耕还林还草计划"
 CHI_grain_for_green_program_desc: "长江特大洪水给黄土高原数十年的森林砍伐带来了地质上的审判：4150人丧生，2100万公顷土地被淹没，河流系统再也无法吸收其流域的水量。退耕还林还草项目将坡度大于25度的山坡恢复为森林或草地，以粮食和现金补偿弥补损失的收成收入。我们覆盖了3200万公顷土地；在肥沃的平地上进行集约化耕作提高了恢复区的单位面积产量。恢复和生产力并非对立关系。"
 CHI_great_wall_suv_dominance: "长城哈弗SUV的统治地位"
 CHI_great_wall_suv_dominance_desc: "魏建军将长城汽车从保定一家鲜为人知的工厂，一手打造成为中国SUV市场的领军企业。哈弗H6连续四年蝉联中国最畅销SUV；哈弗随后成为一个独立品牌，之后又陆续推出了魏牌、欧拉、坦克和长城炮等品牌。如今，长城汽车在俄罗斯、泰国和巴西均设有组装厂，瞄准了西方汽车制造商长期以来低估且未曾涉足的细分市场。"
 CHI_guatian_reckoning: "清算时分"
 CHI_guatian_reckoning_desc: "贪腐终究无法掩盖。那些变卖军用土地、囤积酒水和黄金的后勤大亨们终将面临清算，而这个集团也必须做出抉择：是交出几个替罪羊，还是团结一致对抗北京？"
 CHI_Gulf_Yuan_Settlement: "海湾人民币结算机制"
 CHI_Gulf_Yuan_Settlement_desc: "海湾合作委员会成员国开始以人民币对相当一部分原油出口进行定价，并通过跨境银行间支付系统而非SWIFT系统进行结算。加之各国央行的货币互换额度和主权财富基金的人民币配置，这一转变正逐步削弱石油美元的结构性优势。美国也因此失去了一项自1974年以来一直拥有的金融胁迫手段。"
 CHI_h20_programme: "轰-20项目"
 CHI_h20_programme_desc: "大国武库的最后一个缺口是隐形轰炸机，而我们正着手填补这一空白。轰-20采用飞翼式设计，据称无需空中加油即可携带十吨武器飞行约八千公里，这将使中国能够从其领空越过太平洋进行打击。有了它，真正意义上的全球三位一体轰炸机体系才算完整。"
 CHI_h6k_revival: "轰-6K的复兴"
 CHI_h6k_revival_desc: "旧的图-16血脉重生。轰-6K将其炸弹舱换成了巡航导弹挂架，并配备了高效涡轮风扇发动机以实现更大的射程，成为从敌人防御范围之外发射对地攻击导弹的防区外平台。现在大约有一百一十架飞机构成了轰炸机部队的核心。"
 CHI_harbin_equipment_manufacturing: "哈尔滨重型装备基地"
 CHI_harbin_equipment_manufacturing_desc: "哈尔滨继承了苏联时期的重工业遗产，并对其进行现代化改造，转向生产发电设备、铁路部件和工业机械。这座城市成为中国基础设施建设的工程骨干。"
 CHI_Health_Silk_Road: "健康丝绸之路"
 CHI_Health_Silk_Road_desc: "“健康丝绸之路”将我们的医疗援助、医院建设和药品供应链延伸至“一带一路”伙伴国。这一框架在新冠疫情期间尤为突出，当时我们的疫苗外交巩固了我们作为全球南方国家卫生发展伙伴的地位。现在，我们应该将其正式化并加以扩展，从而不再默认依赖西方制药机构。"
 CHI_heavy_combined_arms_brigade: "重型合成旅"
 CHI_heavy_combined_arms_brigade_desc: "单凭坦克很快就会被击毁。我们将99式坦克与履带式步兵、自行火炮和工兵编入重型合成旅，这些自给自足的突击部队旨在突破敌方防御阵地并保持推进。"
 CHI_hebei_steel_group: "河北钢铁集团"
 CHI_hebei_steel_group_desc: "河北省已将唐山钢铁、邯郸钢铁以及其他一些规模较小的钢厂整合为河北钢铁集团，即后来的河钢集团。同期，辽宁省也通过类似的合并，成立了鞍山本溪钢铁和山东钢铁集团。十二五规划将钢铁整合提升为国家政策，设定了前十大生产商控制60%产量的目标。上千家小钢厂利润微薄、竞争激烈的时代必须终结。"
 CHI_henan_grain_modernization: "河南农业现代化"
 CHI_henan_grain_modernization_desc: "河南省养活的人口比欧洲任何一个国家都多。对仓储基础设施、加工能力和农业推广服务的投资提高了产量，减少了收获后损失，增强了国家粮食安全，并使农村劳动力能够重新部署到工业领域。"
 CHI_high_speed_rail_one: "高速铁路一期工程"
 CHI_high_speed_rail_one_desc: "我们的首批专用高速铁路正接连快速开通：京津高铁、武汉高铁，以及雄心勃勃的京沪高铁，后者建成后将成为世界上最长的高速铁路。该项目借鉴了欧洲和日本制造商的中国铁路高速列车技术，我们的工程师正在根据中国国情进行调整。最初借鉴的知识，最终将转化为我们自己的技术。"
 CHI_hisilicon_kirin: "海思麒麟移动平台"
 CHI_hisilicon_kirin_desc: "华为旗下半导体子公司海思半导体为华为手机打造了麒麟系列SoC芯片，率先在任何西方竞争对手之前引入了片上神经网络处理单元，并在台积电实现了7纳米制程。在美国出口管制切断供应后，华为与中芯国际合作，采用国内可实现的制程节点生产麒麟9000S芯片。该项目证明了中国无晶圆厂也能达到苹果和高通的性能水平，并为所有国内SoC开发商树立了标杆，如今这些开发商都在效仿。"
 CHI_Honiara_Security_Pact: "霍尼亚拉安全协议"
 CHI_Honiara_Security_Pact_desc: "与所罗门群岛的安全框架允许中国人民解放军海军在霍尼亚拉停泊、补给和开展行动，该港口距离澳大利亚大陆不到2000公里。堪培拉对此反应强烈，加快了澳大拉西亚联合军事行动的进程，并游说华盛顿加强太平洋地区的威慑态势。该协议使我们在第一岛链以东首次拥有了公认的安全据点，我们应该在霍尼亚拉被迫撤回协议之前确保其安全。"
 CHI_hq17_medium_range_air_defense: "多层中程防御"
 CHI_hq17_medium_range_air_defense_desc: "在点防御层之上，我们增加了中程掩护，将短程和远程导弹编织成一个网络化的防御屏障，使树梢与平流层之间没有任何缺口。"
 CHI_hq17_short_range_sam: "红旗-17短程防空导弹"
 CHI_hq17_short_range_sam_desc: "旅级单位需要自己的防御伞。红旗-17防空系统由俄罗斯的“道尔”防空系统发展而来，能够快速反应，有效防御飞机、无人机和精确制导武器的攻击，其安装速度与所保护的装甲部队相匹配。"
 CHI_hu_jintao_reign: "胡锦涛时代"
 CHI_hu_jintao_reign_desc: "胡锦涛就任中央总书记、国家主席、中央军委主席，标志着我国历史上最有序的领导层交接。他的执政将强调制度化治理和集体决策，而非个人权力，使我国的体制更加接近稳定国家所要求的定期权力交接模式。"
 CHI_hua_hong_mature_node: "华宏成熟节点容量"
 CHI_hua_hong_mature_node_desc: "华宏半导体最初是一家位于金桥的中法合资企业，后来转型为专注于成熟工艺节点的专业化生产企业，产品包括电源管理芯片、嵌入式非易失性存储器以及面向汽车和物联网市场的模拟芯片。其位于上海和无锡的200毫米和300毫米晶圆厂服务于西方制裁难以触及的国内供应链。国家再投资扩大了产能，并使其客户群体多元化，不再局限于出口市场。"
 CHI_hualong_nuclear_batch: "华龙一号大型建筑"
 CHI_hualong_nuclear_batch_desc: "继向三门和海洋核电站引进西屋AP1000反应堆、向台山核电站引进法马通EPR反应堆、向田湾核电站引进俄罗斯国家原子能公司VVER机组之后，我们完成了自主研发的第三代反应堆设计。华龙一号反应堆融合了中核集团的ACP-1000和中广核的ACPR-1000，拥有完全自主的中国知识产权，并符合欧洲电力公司的要求。福清核电站5号机组率先并网发电；随后漳州核电站、海南长江核电站、防城港核电站和太平岭核电站也将陆续并网。出口型HPR1000反应堆已在卡拉奇K-2和K-3机组投入运行，而这仅仅是我们核电出口计划的开端。"
 CHI_huawei_zte_export: "华为设备出口"
 CHI_huawei_zte_export_desc: "华为和中兴占据了全球电信设备市场超过35%的份额，华为在5G标准方面的极化码优势巩固了其市场主导地位。通过“数字丝绸之路”，我们的基础设施覆盖了170个国家的运营商。西方政府以禁令和实体清单限制作为回应，但我们已经部署的实体基础设施无法通过立法移除。"
 CHI_huludao_schoolhouse: "葫芦岛校舍"
 CHI_huludao_schoolhouse_desc: "如果没有飞行员在航母上降落，航母就毫无用处。在葫芦岛，海军航空大学专门建立一套航母飞行员培养体系，配备陆基滑跃甲板和阻拦装置，从零开始训练飞行员，使他们能够将移动的甲板变成作战场所。"
 CHI_hybrid_rice_super_program: "超级杂交水稻计划"
 CHI_hybrid_rice_super_program_desc: "袁隆平领导的中国国家杂交水稻研究开发中心位于长沙，致力于不断提高水稻产量。每年冬季，育种团队都会将育种团队迁往海南岛三亚，那里的热带气候使得全年种植成为可能，而这在大陆是无法实现的。目前，杂交水稻品种已覆盖我国60%的水稻种植面积，同时，一项平行项目正在研究适用于华北平原的耐盐海稻。我们应该继续这项投资：粮食安全是其他一切目标的基础。"
 CHI_hydrogen_green_steel: "氢炼钢"
 CHI_hydrogen_green_steel_desc: "我们的双重碳排放目标和欧盟碳边境调节机制迫使钢铁企业在外国关税迫使其做出选择之前实现脱碳。宝武钢铁已与力拓集团合作，在湛江投产了一座年产100万吨的氢基直接还原示范工厂。河钢集团正在张家口启动一个类似的项目，利用电解制取的绿色氢气。未来十年，我们必须大幅提高电弧炉炼钢的产量占比，而转型规划现在就应该启动。"
 CHI_hypersonic_strike_integration: "高超音速打击一体化"
 CHI_hypersonic_strike_integration_desc: "速度成为新的隐身术。我们将超音速武器 - 其滑翔速度超过音速五倍，并能一路机动下降 - 融入空军的打击编队，给敌方防御系统带来他们目前尚无有效应对手段的威胁。"
 CHI_ilrs_lunar_base: "国际月球研究站"
 CHI_ilrs_lunar_base_desc: "2021年，中国和俄罗斯签署了国际月球研究站路线图，邀请伙伴国家在月球南极附近共同建设一个联合运营的研究站。该计划优先考虑就地资源利用、永久性地表基础设施建设以及类似于南极研究站模式的人员轮换机制。我们将投入我们的工业和工程力量，助力该计划的实现。"
 CHI_individual_soldier_system: "单兵系统"
 CHI_individual_soldier_system_desc: "步枪手不再仅仅是扳机，而成为一个节点。一种新型士兵系统将光学器材、无线电、导航设备和防弹衣集成到一个装备包中，将每个步兵连接到班组网络和指挥官地图上。"
 CHI_Indo_Pacific_Strategy_Collapsed: "印太战略崩溃"
 CHI_Indo_Pacific_Strategy_Collapsed_desc: "韩国退出美日菲三边机制，切断了华盛顿在印太地区战略中的一个关键环节。日本不得不独自应对安全挑战，而美国在该地区的信誉也受到动摇。"
 CHI_Information_Warfare: "信息战"
 CHI_Information_Warfare_desc: "运用国家媒体、社交媒体运作和战略叙事来塑造目标国家的舆论，对抗西方的信息主导地位。"
 CHI_informatized_local_wars: "赢得信息化本地战争"
 CHI_informatized_local_wars_desc: "我们不再为北方平原的全面战争做准备。指导原则转变为在信息化条件下赢得局部战争：在中国周边地区开展短促、尖锐、高科技的战役，胜负取决于谁能在网络化的战场上率先发现并发起攻击。以下所有改革都服务于这一单一需求。"
 CHI_inner_party_supervision_regulations: "党内监督条例"
 CHI_inner_party_supervision_regulations_desc: "长期以来，党内问责制过于依赖非正式规范和人际关系。我们必须制定正式的监督条例，建立上级机关检查、报告和惩处下级党委的强制性程序。将这些机制编纂成法，将减少地方官员独断专行的空间。"
 CHI_integrated_air_and_space: "航空航天一体化"
 CHI_integrated_air_and_space_desc: "空军必须不再充当陆军的保护伞，而应成为一个独立的战略军种。我们奉行“一体化空天作战，为进攻和防御做好准备”，这一学说于2004年采用，将战斗机、轰炸机、导弹、卫星和预警系统整合到一个范围内。天空和近太空合二为一，而且它必须是我们的。"
 CHI_intra_party_democracy_experiments: "党内民主实验"
 CHI_intra_party_democracy_experiments_desc: "一些地方已在县级和乡镇级层面开展了多候选人竞争性党内职务选举。支持者认为，竞争性选举能够增强执政合法性，改善治理；批评者则警告说，竞争性选举会削弱意识形态纪律，并引发派系斗争。这些试点的结果将决定我们是推广还是取缔这种模式。"
 CHI_invigorate_country_through_STE: "科教兴国"
 CHI_invigorate_country_through_STE_desc: "1995年，江泽民在其任期末期提出了以科学和教育振兴国家的战略。该战略通过优先发展科研、追赶科技和高等教育，旨在缩小与发达国家的差距，使中国经济从劳动驱动型经济向知识型经济转型。"
 CHI_iron_ore_pricing_war: "铁矿石定价之争"
 CHI_iron_ore_pricing_war_desc: "宝钢已接替日本制铁，成为中国买家在与力拓、必和必拓和淡水河谷就年度铁矿石基准价格谈判中的首席谈判代表。由于中国小型钢厂的现货采购破坏了基准价格，整个体系陷入瘫痪。力拓高管胡志明在上海被捕以及中国铝业收购力拓18%股份的失败，标志着外交摩擦达到顶峰。我们必须加快在澳大利亚和西非的海外矿业投资，以实现供应多元化，以此作为应对措施。"
 CHI_j10c_multirole_refit: "歼-10C改装型"
 CHI_j10c_multirole_refit_desc: "歼-10战斗机变得更加强大。歼-10C增加了电子扫描阵列雷达、远程PL-15导弹，并从2021年开始使用国产WS-10B发动机，使这款轻型战斗机成为真正的多用途威胁，此后在南亚空域造成了不小的伤亡。"
 CHI_j11b_sinification: "歼-11国产化"
 CHI_j11b_sinification_desc: "在沈阳工厂获得许可生产的苏-27战斗机成为中国国产战机。歼-11B战斗机用国产系统替换了俄罗斯的雷达、航电和导弹，使侧卫系列战机摆脱了对莫斯科零部件的依赖，并证明中国工业有能力对一线战斗机进行从头到尾的重新设计。"
 CHI_j16_strike_platform: "歼-16打击平台"
 CHI_j16_strike_platform_desc: "歼-16“潜龙”是一款由侧卫战斗机发展而来的双座重型战机，配备有源相控阵雷达，拥有该机队中最强大的武器载荷和最远的航程。如今，它是中国大陆在台湾空域施压的主要战机，也是中国现代空军联队的核心多用途打击平台。"
 CHI_jh7a_update: "歼轰-7A升级"
 CHI_jh7a_update_desc: "歼轰-7A“飞豹”是一款坚固耐用的双座战斗轰炸机，经过升级，配备了新的精确武器和瞄准吊舱，使这款价格低廉且久经考验的海上打击飞机能够与较新的机队并肩作战。"
 CHI_jiang_doctrine_taiwan: "江泽民对台湾的论述"
 CHI_jiang_doctrine_taiwan_desc: "江泽民的八点方案以和平统一为两岸政策框架，同时明确拒绝排除武力选项。将这一理论与解放军日益增长的反介入/介入武器库相结合，便能构建一个可信的强制框架，并将台湾法理独立的代价提升到台北任何政府都无法承受的地步。"
 CHI_jiangnan_changxing_move: "江南-长兴举措"
 CHI_jiangnan_changxing_move_desc: "位于老上海中心地带的江南造船厂空间狭小，发展受限。我们将其迁至下游的长兴岛，那里新建了宽敞的厂房和深水泊位，可一次性建造数十艘军舰。此次搬迁使我们的造船能力成倍增长，并使其成为现代舰队的锻造厂。"
 CHI_jiangnan_scale: "扩大江南造船厂规模"
 CHI_jiangnan_scale_desc: "战舰的胜负在船坞就已经决定，之后才能在海上决出胜负。江南造船厂位于长兴岛的庞大新厂房正全力运转，驱逐舰和航母并行建造，而竞争对手却只能一艘一艘地建造。"
 CHI_joint_operations_command: "联合作战司令部"
 CHI_joint_operations_command_desc: "如今，胜利属于能够将陆海空四军融为一体的一方。我们建立起真正的联合作战指挥部，将五大战区整合为一个整体，使所有武装部队能够同时作战，而不是各军种轮流行动。这才能真正打破战区指挥结构的僵局。"
 CHI_Joint_Operations_tt: "触发战略选择​​事件。防御选项将促成或扩大上合组织与阿富汗、巴基斯坦和塔吉克斯坦的联盟。惩罚性选项和全面战争选项则会通过巴基斯坦的反应，对塔利班和巴基斯坦塔利班政权设定战争目标。"
 CHI_joint_stock_city_banks: "股份制商业银行和城市银行"
 CHI_joint_stock_city_banks_desc: "在四大银行之下，已经形成了一个实力雄厚的二线银行体系。招商银行凭借强大的移动银行服务，成为零售银行领域的领军企业；中国民生银行作为首家非国有银行，服务于中小企业；汇丰银行持有交通银行19.9%的股份。超过130家城市商业银行扎根于二三线城市，支撑着区域金融体系，推动民营企业获得更广泛的信贷渠道，并加速数字化银行服务的普及。这种机构多元化是我们应该大力发展的优势。"
 CHI_joint_venture_framework: "合资产业框架"
 CHI_joint_venture_framework_desc: "一套全面的框架规范了合资企业中的技术转让、本地化要求和利润汇回。外国企业获得市场准入；中国合作伙伴获得技术和管理知识，这些知识将逐步流入国内企业。"
 CHI_keep_the_shell_companies: "保留空壳公司"
 CHI_keep_the_shell_companies_desc: "被命令剥离，我们只是在纸​​上剥离。军队的企业被重新注册在表亲公司、挂名公司和空壳公司名下，它们的利润仍然流回到拥有它们的单位。审计员发现办公室空无一人；将军保留他们的收入。"
 CHI_kj2000_mainring_awacs: "空警-2000主环"
 CHI_kj2000_mainring_awacs_desc: "在华盛顿阻止以色列向中国出售“费尔康”导弹后，中国自行研制了雷达。空警-2000是一款国产有源相控阵雷达，安装在伊尔-76运输机上，为中国空军提供了首个真正意义上的空中指挥所，使战斗机能够打击自身无法直接观测到的目标。"
 CHI_kj500_network_centric_hub: "空警-500网络中心"
 CHI_kj500_network_centric_hub_desc: "空警-500是一款安装在运-9涡桨飞机上的固定式三阵列雷达，是空中主力雷达。它批量生产，将战斗机、舰艇和导弹的数据链整合到一个统一的画面中，是网络中心战的空中枢纽。"
 CHI_KPA_Offensive_Readiness: "朝鲜人民军进攻准备"
 CHI_KPA_Offensive_Readiness_desc: "我们暗中支持朝鲜人民军的作战态势从纵深防御转向前沿进攻。装备调配加快，联合计划会议扩大。朝鲜半岛正逼近边缘。"
 CHI_leader_of_the_people: "人民领袖"
 CHI_leader_of_the_people_desc: "中共第三次历史决议正式确立了“人民领袖”的称号，这一称号在党的历史上仅授予过两位人物：毛泽东和习近平。毛泽东的画像至今仍悬挂在天安门城墙上。党的第三次历史性时刻找到了它的历史人物，任何认真研读该决议的人都不会忽略这一延续性的意义。"
 CHI_leading_small_group_doctrine: "中央领导小组"
 CHI_leading_small_group_doctrine_desc: "中央领导小组现在同时负责财政、经济改革、外交、网络安全和军事改革等事务，所有工作均由同一办公室统一领导。这种安排绕过了政治局传统的委员会结构，将决策权集中在能够迅速推进的领域。技术官僚负责执行，中央负责协调。政策出台速度更快，所有产出都服从于统一的意志。"
 CHI_Let_Seoul_Lead: "让首尔主导"
 CHI_Let_Seoul_Lead_desc: "我们表示接受韩国在任何最终统一进程中的领导地位。首尔的民主制度和经济实力使其成为统一朝鲜半岛的天然支柱。我们退居幕后，让朝鲜人民自己决定未来。"
 CHI_liangjiang_new_area: "两江国家新区"
 CHI_liangjiang_new_area_desc: "继上海浦东新区和天津滨海新区之后，重庆两江新区成为首个内陆国家级新区。该新区已吸引了福特、惠普等300多家世界500强企业入驻，年产汽车达119万辆。西安关中平原也获得了类似的投资，使陕西成为西北地区的商业和产业中心。这一模式已经成功，现在需要扩大的是规模。"
 CHI_Lips_and_Teeth_Doctrine: "唇齿相依学说"
 CHI_Lips_and_Teeth_Doctrine_desc: "我们重申与朝鲜的历史纽带。两国关系一如既往地亲密无间。平壤的生存是我们的战略要务，无论面临何种国际压力，我们都将采取相应行动。"
 CHI_Lithium_Triangle_Accord: "锂三角协议"
 CHI_Lithium_Triangle_Accord_desc: "阿根廷、玻利维亚和智利三国合计拥有全球超过一半的可采锂储量。长期承购协议和在开采企业中的股权投资，使中国电池和电动汽车制造商能够可靠地获得这种定义下一代能源模式的原材料。这些协议使中国供应链免受西方采购联盟的影响。"
 CHI_Liu_Huaqing_Doctrine: "刘华清学说"
 CHI_Liu_Huaqing_Doctrine_desc: "现代海军战略的缔造者刘华清海军上将明确指出，第一和第二岛链是我国海上力量必须建立无可争议的绝对优势才能向外扩张的战略要地。南海完全位于第一岛链之内。在确保其绝对安全之前，我们无法向外扩张，而且我们也不能无限期地拖延这一安全进程。"
 CHI_liu_huaqing_first_island_chain: "刘华清的第一岛链"
 CHI_liu_huaqing_first_island_chain_desc: "这条防线从千岛群岛经琉球群岛和台湾延伸至婆罗洲，其后方的近海必须被我们掌控。现代中国海军之父刘华清海军上将教导我们，远洋海军必须先称霸第一岛链，才能觊觎远洋。他的近海防御理论为我们指明了方向：封锁通道，制霸近海，然后放眼更远海域。"
 CHI_livestream_commerce: "直播电商"
 CHI_livestream_commerce_desc: "淘宝直播将娱乐与实时购物完美融合，其规模之大，西方同类平台难以企及。薇娅和李佳琦单场直播销售额高达数十亿；如今，我们40%的电商交易都通过直播渠道完成。MCN机构管理着成千上万的直播主播，监管机构严格执行税收政策，确保这些平台上的财富按比例上缴国家。这种模式由我们定义，全世界都在关注。"
 CHI_logistic_modernisation: "现代化后勤"
 CHI_logistic_modernisation_desc: "如果后勤补给线断裂，前线的改革就毫无意义。在新成立的联合后勤支援部队的领导下，我们实现了集装箱标准化、货物托盘化和供应链数字化，从而确保旅级部队的后勤保障速度与其推进速度相匹配。"
 CHI_long_march_modernisation: "长征现代化"
 CHI_long_march_modernisation_desc: "由中国航天科技集团公司研制的长征系列运载火箭是我们整个航天计划的支柱。通过升级装配线并改进长征二号、长征三号、长征五号和长征七号等型号的推进剂处理，提高了发射频率和可靠性，同时推进系统工程领域的交叉性进步也直接应用于我们的导弹计划。"
 CHI_long_range_firepower: "远程火力"
 CHI_long_range_firepower_desc: "射程胜于数量。我们将远程火箭弹和游荡弹药投入重型旅，让它们在坦克接近交战之前摧毁敌人的纵深、指挥所和预备队。"
 CHI_loongson_riscv: "龙芯和RISC-V架构"
 CHI_loongson_riscv_desc: "计算机技术研究所的龙芯处理器系列为政府服务器和嵌入式系统提供了一种替代x86和ARM的国产方案。除了龙芯处理器之外，开放的RISC-V指令集架构也吸引了我们通过RISC-V国际组织以及包括阿里巴巴旗下的平头哥、芯来科技和芯伍科技在内的国内初创企业进行投资。RISC-V的开放许可使我们的国产设计免受美国指令集架构出口管制的影响，而且这种保护作用的价值逐年增加。"
 CHI_lunar_sample_return: "月球样本返回"
 CHI_lunar_sample_return_desc: "嫦娥五号于2020年12月从吕姆克山带回了1.73公斤月球玄武岩，这是自1976年苏联“月球24号”任务以来，地球上首次采集到新的月球样本。嫦娥六号于2024年6月发射升空，从月球背面南极-艾特肯盆地采集了样本，这在航天史上尚属首次。我们将资源集中投入到这项机器人科学研究中，将样本返回系统扩展到新的地点，并加速相关研究的开展。"
 CHI_made_in_china_2025: "中国制造2025"
 CHI_made_in_china_2025_desc: "我们不能再继续做世界的工厂了。我们已确定十个优先领域，力求转型成为高科技领域的领导者：机器人、航空航天、电动汽车、先进医疗器械、半导体等等。国家补贴、技术引进计划和强制性国内采购目标将是我们实现这一目标的手段。华盛顿和布鲁塞尔或许会不高兴，但这是我们必须坚持的方向。"
 CHI_Maritime_Silk_Road_Indian_Ocean: "珍珠链策略"
 CHI_Maritime_Silk_Road_Indian_Ocean_desc: "一系列横跨印度洋沿岸的港口投资和物流设施，包括斯里兰卡的汉班托塔港和吉布提的多拉雷港，将我们的商业和潜在海军影响力从南海延伸至非洲之角。批评人士将这种模式比作环绕印度的“珍珠链”。他们的说法并非完全错误，而这正是问题的关键所在。"
 CHI_mass_line_education: "群众路线"
 CHI_mass_line_education_desc: "党的群众路线运动要求干部摒弃形式主义、官僚主义、享乐主义和铺张浪费。奢靡的宴席被禁止；在公共场合佩戴名表者，其名表将被没收。我们与人民的关系必须从权利关系转变为服务关系。这一信息既符合政治需要，又真正赢得了民心，我们不应浪费这一机会。"
 CHI_mass_line_renewed: "复兴群众路线"
 CHI_mass_line_renewed_desc: "毛泽东的群众路线认为，党必须先了解人民群众，才能领导人民群众。干部和学生被派往农村乡镇和工厂车间。听取群众意见的运动取代了自上而下的指令，群众积累的经验被纳入党的政策之中。革命不是一场晚宴。"
 CHI_mature_node_counter_offensive: "成熟节点反攻"
 CHI_mature_node_counter_offensive_desc: "在西方出口管制限制了我们在先进工艺节点上的扩张之后，我们将产能投资转向28纳米以下的成熟工艺节点。中芯国际、华虹半导体、长城半导体以及数十家规模较小的晶圆厂在上海、深圳和杭州同步启动扩建项目。目前，我们占全球成熟工艺节点新增产能的33%以上。西方各国政府对中国在成熟工艺节点领域（为汽车、工业和国防电子产品提供原材料）的主导地位感到担忧，正在讨论加征二级关税。我们必须在这些关税生效之前巩固自身地位。"
 CHI_Media_Offensive: "媒体攻势"
 CHI_Media_Offensive_desc: "通过中国环球电视网、新华社和社交媒体平台发起协调一致的全球媒体宣传活动，宣传中国观点，反驳敌对言论。"
 CHI_Mekong_Riparian_Cooperation: "澜沧江-湄公河合作"
 CHI_Mekong_Riparian_Cooperation_desc: "澜沧江-湄公河合作机制旨在组织六个沿岸国家在基础设施建设、水资源管理和贸易便利化方面开展合作。我们在上游修建水坝和改善航运的项目赋予了我们对依赖我们所控制的水流的下游邻国相当大的影响力。我们应该在这种影响力被认定为胁迫之前，将这一机制正式化。"
 CHI_memory_independence: "内存芯片独立性"
 CHI_memory_independence_desc: "总部位于武汉、拥有大基金支持的长江存储已实现128层3D NAND闪存的生产，并实现了与三星和美光同代产品相当的232层晶栈架构。位于合肥的长江存储采用17nm工艺生产DDR4内存，并正在开发兼容DDR5的工艺流程。苹果公司对长江存储NAND闪存的简短认证表明，在苹果公司因美国施压将其从供应商名单中移除之前，我们的内存已经达到商用级别。长江存储的HBM2生产​​线已提前开始量产，符合寒武纪和壁仞人工智能加速器的要求，并结束了我们高性能计算供应链对国外内存的依赖。"
 CHI_mengshi_program: "猛士项目"
 CHI_mengshi_program_desc: "猛士是中国仿照悍马设计的轻型装甲车，它为轻步兵提供动力，拥有坚固耐用、防雷的行驶性能，可以安装机枪、导弹或遥控武器站。"
 CHI_miit_licensing_framework: "工信部许可证发放和运营商重组"
 CHI_miit_licensing_framework_desc: "工信部必须正式确立牌照制度，将原先的邮政电信垄断企业拆分为独立的商业运营商。频谱分配规则、互联互通定价以及普遍服务义务等都必须正式确立，从而为中国移动、中国联通和中国电信构建全球最大的4G和5G网络奠定监管基础。垄断时代已经完成了它的使命；竞争将引领下一阶段的发展。"
 CHI_military_training_outline: "新培训大纲"
 CHI_military_training_outline_desc: "全军发布了新的《军事训练大纲》，这本规则手册规定了每个单位的标准和任务。它首次围绕联合网络化作战制定，将整个军队统一要求在更高的战备水平上。"
 CHI_mobile_payment_duopoly: "移动支付两强垄断"
 CHI_mobile_payment_duopoly_desc: "支付宝最初是阿里巴巴旗下的担保交易服务，如今已发展成为一个独立的支付平台。微信支付凭借春节红包活动，五天内用户量就突破了2亿。现在，超过90%的交易都使用二维码支付，取代了现金，这使得Visa、万事达卡和西方金融科技公司在站稳脚跟之前就被拒之门外。我们构建了全球最先进的消费者支付基础设施，其运作完全独立于西方金融体系之外。"
 CHI_money_alliance: "金钱联盟"
 CHI_money_alliance_desc: "财富与权力融为一体，形成一个派系。最富有的军官和资助他们的走私大亨们结成联盟，实力强大到足以保护自己人，并向名义上指挥他们的党发号施令。"
 CHI_Monroe_Doctrine_Inverted: "门罗主义的颠倒"
 CHI_Monroe_Doctrine_Inverted_desc: "数十年来，我们通过耐心投资、外交斡旋和基础设施建设信贷，已将自身定位为拉丁美洲不可或缺的外部伙伴，而美国曾一度将这一角色视为其专属领域。华盛顿动员整个西半球联盟对抗我们的能力已大幅削弱，以至于门罗主义在实践中已不再有效。美洲不再是美国的囊中之物。我们应当确保它永远不会再次沦为美国的囊中之物。"
 CHI_national_overall_emergency_response_plan: "国家应急响应计划"
 CHI_national_overall_emergency_response_plan_desc: "非典危机以惨痛的现实暴露了我国应急准备方面的不足。我们必须建立一套统一的应对框架，涵盖自然灾害、公共卫生突发事件、事故和社会动荡，并在各级行政部门预先部署资源、建立清晰的指挥架构和跨部门协调机制。下一次危机不会提前预告。"
 CHI_naura_amec: "诺瑞科技集团和先进微加工设备项目"
 CHI_naura_amec_desc: "诺瑞科技集团和先进微加工设备公司为国内晶圆厂生产蚀刻、CVD和PVD设备。诺瑞科技集团的28纳米蚀刻设备已获得中芯国际的认证；先进微加工设备的Primaxx蚀刻设备已投入量产。两家公司都受益于中芯国际的强劲需求和巨额投资基金的注资。目前，它们的设备组合已覆盖成熟节点逻辑晶圆厂所需工艺步骤的约40%。剩余的60%是我们接下来必须重点关注的领域。"
 CHI_nco_corps_reform: "专业士官队伍"
 CHI_nco_corps_reform_desc: "现代军队的凝聚力不仅来自上校，也来自士官。我们正在建立一支真正的士官队伍，他们是拥有军衔、薪酬和职权的职业军人，以此取代过去对短期征召兵的依赖，并缩小军官和新兵之间的差距。"
 CHI_new_energy_vehicles_startups: "新能源汽车先驱者"
 CHI_new_energy_vehicles_startups_desc: "蔚来、小鹏、理想汽车、华为旗下的HIMA联盟以及小米等公司在2014年至2024年间陆续进军汽车行业，它们背后拥有的是科技资本而非国有企业的支持。这些公司都将智能手机时代的软件、人工智能技术以及消费者认可的品牌认知度带入了汽车领域。小米SU7轿车在24小时内获得了88,898辆的预订单；YU7 SUV在上市首日就斩获了24万辆的锁定订单。"
 CHI_New_World_Order: "世界新秩序"
 CHI_New_World_Order_desc: "我们在信息领域的优势和媒体影响力已经为挑战西方主导的国际秩序奠定了基础。现在，我们必须利用我们的影响力网络、国家媒体和秘密手段，推动建立一个多极世界，在这个世界中，我们自身的规范和治理模式将主导全球议程。"
 CHI_norinco_rationalism: "北方工业公司合理化"
 CHI_norinco_rationalism_desc: "中国北方工业公司，这家曾经生产从步枪到火炮等各种军需品的庞大企业，如今经过精简和专注，业务重心也随之转移。冗余​​的生产线被关闭，盈利的生产线被整合，陆军的武器库最终呈现出统一的工业态势。"
 CHI_northeast_revitalization_plan: "东北振兴计划"
 CHI_northeast_revitalization_plan_desc: "辽宁、吉林和黑龙江等“铁锈地带”省份在国有企业改革后经济急剧衰退。2003年，中央政府启动振兴计划，将基础设施投资、优惠信贷和转移的产业产能引入该地区。"
 CHI_northeast_russia_corridor: "东北-俄罗斯经济走廊"
 CHI_northeast_russia_corridor_desc: "连接黑龙江省与俄罗斯远东地区的跨境贸易基础设施得到升级，促进了资源流动、跨境投资和联合开发项目。该走廊以实质性的商业合作强化了中俄战略伙伴关系。"
 CHI_open_the_august_1st_building: "八一大楼开放"
 CHI_open_the_august_1st_building_desc: "八一大楼是中央军事委员会所在地，人民解放军在这里只对党负责，不对任何其他组织负责。1927年8月1日的南昌起义为党赢得了第一批步枪；这一天至今仍是军队的名称。如今，军队的改造开始了：腐败被清除还是被纵容；师改旅；空军与航天融合；近海舰队被改造为远洋舰队。"
 CHI_Operation_New_Dawn: "新曙光行动"
 CHI_Operation_New_Dawn_desc: "时机已到。受中国支持的朝鲜人民军军官向金氏家族大院发起进攻。接下来的局面将短暂、暴力且决定性。朝鲜政权将存续，但其领导层将不复存在。"
 CHI_Oppose_Strategic_Flexibility: "反对战略灵活性"
 CHI_Oppose_Strategic_Flexibility_desc: "华盛顿的“战略灵活性”理论允许驻韩美军向朝鲜半岛以外地区部署兵力，这是对我们安全利益的不可接受的侵犯。我们正式要求其撤回。"
 CHI_organisation_department_mandate: "组织部门职责"
 CHI_organisation_department_mandate_desc: "中共中央组织部负责管理7000多万名党员干部的任命、考核和调动，这意味着谁控制了该部门，谁就控制了党的领导层未来。在曾庆红的领导下，该部门加强了对省级领导任命的控制，并调整了考核标准，倾向于提拔那些在产业发展方面政绩卓著的官员。"
 CHI_organisation_department_mandate_tt: "当§Y曾庆红§!担任领导人时§Y$CHI_organisation_department_1$§!可用"
 CHI_original_innovation_problem: "初始创新问题"
 CHI_original_innovation_problem_desc: "复制带我们到达了前沿，却无法带我们超越它。最艰难的改革是文化改革，它需要原创性的创新，而这种创新长期以来一直被官僚主义的科学所扼杀。我们为风险买单，容忍失败，并奖励那些任何外国蓝图都无法提供的突破。"
 CHI_own_designs: "国产蓝图"
 CHI_own_designs_desc: "我们曾整整一代人都在对苏联图纸进行逆向工程，并称之为进步。如今，这种做法已经过时了。设计局被要求进行原创而非模仿，下一代武器要印上中国特色，而不是照搬照抄。"
 CHI_Pacific_Island_Forum_Pivot: "太平洋岛屿论坛转向"
 CHI_Pacific_Island_Forum_Pivot_desc: "我们必须加快在太平洋岛国的外交攻势，提供低债务基础设施援助、渔业协议和外交承认方案。随着我们争取摇摆票和赞助观察员，论坛本身也将成为竞争激烈的舞台。澳大利亚和新西兰历来主导太平洋地区的机构框架，在每次部长级会议上，它们的领导地位都将受到挑战，直到它们承认我们的地位为止。"
 CHI_Pax_Sinica: "中华治世"
 CHI_Pax_Sinica_desc: "一个以中国为中心的国际秩序，在这个秩序中，我们的经济实力、基础设施依赖性和政治联盟将取代自由主义的规则秩序，成为全球事务的组织原则。学者们称之为“中华治世”。我们则称之为世界应有的样子。实现这一目标将标志着我们百年复兴的巅峰。"
 CHI_Peaceful_Development: "和平发展"
 CHI_Peaceful_Development_desc: "通过实际行动表明，中国的崛起是全球稳定的力量。加大对维和、救灾和发展援助的投入，树立负责任大国的形象。"
 CHI_pearl_river_delta_tech_cluster: "珠江三角洲电子产业集群"
 CHI_pearl_river_delta_tech_cluster_desc: "珠江三角洲巩固了其作为全球最大电子产品制造基地的地位。深圳汇聚了华为和中兴等公司；东莞则聚集了众多台湾代工制造商；整个区域构成了一个完整的全球消费电子产品供应链。"
 CHI_Peninsula_Strategy: "半岛战略"
 CHI_Peninsula_Strategy_desc: "我们正站在朝鲜半岛的十字路口。数十年来精心策划的暧昧姿态必须让位于审慎的战略姿态。我们将谨慎选择道路，因为我们深知，每一种选择都会对地区秩序造成不可逆转的影响。"
 CHI_peoples_armed_police_integration: "整合武装警察"
 CHI_peoples_armed_police_integration_desc: "2018 年起，拥有200万兵力的中国人民武装警察部队完全归中央军委指挥，负责后方和边防，使野战部队能够腾出手来对外作战。"
 CHI_Petrocaribe_Successor: "石油加勒比计划的继任者"
 CHI_Petrocaribe_Successor_desc: "委内瑞拉针对加勒比海和中美洲国家的优惠石油计划因制裁和经济管理不善而崩溃。我们应该作为稳定债权国介入，向加拉加斯、哈瓦那和马那瓜提供以石油为抵押的贷款，以换取长期的石油供应承诺。这项安排将加深我们与那些已被西方资本市场孤立起来的政府之间的联系，而他们的感激之情也将持久。"
 CHI_Petroyuan_Settlement: "石油元倡议"
 CHI_Petroyuan_Settlement_desc: "我们必须在国际能源交易中心推出人民币计价原油期货，为“一带一路”能源出口国建立以人民币而非美元结算合约的机制。持续推广将削弱石油美元的主导地位，并降低我们受美国金融制裁的影响。每一桶以人民币计价的原油都是我们迈向可信赖的国际金融体系的一步。"
 CHI_pgz_gun_missile_hybrid: "枪炮导弹混合防御"
 CHI_pgz_gun_missile_hybrid_desc: "PGZ自行式系统将雷达制导自动炮与短程导弹结合在一个底盘上，可以有效打击那些能够躲过导弹攻击范围的低空飞行飞机、直升机和无人机。"
 CHI_phl_mlrs_modernisation: "PHL火箭现代化"
 CHI_phl_mlrs_modernisation_desc: "PHL-03和模块化的PHL-16为陆军提供了射程达数百公里的远程火箭炮，模糊了火箭炮兵连和战术导弹之间的界限，使一个旅能够深入前线后方进行打击。"
 CHI_pipechina_gas_reform: "中国管道集团拆分"
 CHI_pipechina_gas_reform_desc: "中国油气管网集团公司从中国石油天然气集团公司、中国石化和中国海洋石油总公司接收了约6000亿元人民币的管道资产、储气设施和液化天然气接收站。X+1+X模式将一家中立的中游运营商置于众多上游生产商和下游分销商之间，打破了此前由各国家石油公司独占的基础设施格局。新源能源、华润燃气、北京集团以及外国液化天然气供应商均得以进入市场，天然气分销市场首次真正实现了竞争。"
 CHI_Piraeus_Model: "比雷埃夫斯港模型"
 CHI_Piraeus_Model_desc: "中远集团收购比雷埃夫斯港多数股权，使希腊的主要商业港口一跃成为地中海最繁忙的集装箱港口，并为我们在欧洲的港口管理树立了典范。该模式为东道国政府带来可衡量的经济回报，同时确保我们在战略要道上拥有运营控制权。在里斯本和汉堡保留少量股权，既能维持当地资本的参与，又不会像控股收购那样引发监管审查。"
 CHI_plz_howitzer_program: "PLZ榴弹炮计划"
 CHI_plz_howitzer_program_desc: "炮兵作为军队的骄傲和瓶颈，如今已全面实现自行。PLZ-05型155毫米履带式榴弹炮自2008年起服役，其射程和射速均达到西方水平，并构成了每个重型旅的主力炮兵阵地。"
 CHI_Polar_Silk_Road: "极地丝绸之路"
 CHI_Polar_Silk_Road_desc: "我们的《北极政策白皮书》宣布中国为“近北极国家”，并支持开发跨极地航线，将其作为海上丝绸之路向北延伸。海冰融化使北方海路具备了商业可行性，可将我们与欧洲之间的运输时间缩短多达两周。我们应该在其他国家关闭大门之前，争取在北极治理架构中占有一席之地。"
 CHI_policy_banks_cdb: "政策银行"
 CHI_policy_banks_cdb_desc: "中国国家开发银行、中国进出口银行和中国农业发展银行构成了一个不受常规商业约束的平行融资体系。国开行目前是全球最大的发展金融机构，规模超过世界银行和亚洲开发银行的总和，为三峡大坝、高铁以及遍布100多个国家的超过6000亿美元的“一带一路”基础设施项目提供融资。这三家银行不仅仅是金融机构，更是国家战略的工具。"
 CHI_politics_law_commision_realigned: "政治法律委员会重组"
 CHI_politics_law_commision_realigned_desc: "政法委负责协调安全机构、法院和检察机关。使其坚定地贯彻重庆模式，意味着要建立一套能够识别潜在威胁的监控体系，从而保护革命免受外国颠覆和内部破坏的双重威胁。"
 CHI_poly_goes_global: "保利走向全球"
 CHI_poly_goes_global_desc: "保利科技将中国步枪和导弹运往非洲、中东和拉丁美洲，而保利文化则将所得收益转化为拍卖行和房地产。军队的贸易机构发展成为一家全球性企业集团，其交易影响着我们的外交，其利润远超任何预算的掌控。"
 CHI_Post_Armistice_Architecture: "停战后框架"
 CHI_Post_Armistice_Architecture_desc: "我们和美国共同提议以一项协议取代1953年的停战协定：一项全面的和平框架，该框架将正式结束朝鲜战争，并建立各方都能接受的地区安全保障。"
 CHI_Predatory_Lending_Doctrine: "汉班托塔学说"
 CHI_Predatory_Lending_Doctrine_desc: "斯里兰卡无力偿还汉班托塔港贷款时，签署了一份为期99年的租赁协议，将运营控制权移交给我们的一家国有企业。我们应该将这种模式正式化：从一开始就对项目进行结构化设计，使战略资产成为抵押品，并在违约时转换为长期使用权。债务人通过选择是否偿还来决定偿还条款。"
 CHI_private_oem_rise: "私营汽车制造商的崛起"
 CHI_private_oem_rise_desc: "只有四大国有企业被指定为合资伙伴，但省级政府仍然支持本省的民营企业。芜湖的奇瑞汽车、浙江的吉利汽车和保定的长城汽车都找到了合法生产的途径，并逐步发展壮大。如今，民营企业生产了我们三分之一的乘用车，填补了合资企业选择忽略的SUV、低成本汽车和电动汽车市场。我们应该支持他们。"
 CHI_project_921: "921工程"
 CHI_project_921_desc: "1992年9月，中央军委批准了“921工程”，即中国载人航天能力发展总体规划。该决定成立了中国航天科技集团公司载人航天办公室，资助了神舟飞船的设计，并承诺中国将自主实现航天飞行。"
 CHI_project_998: "998工程"
 CHI_project_998_desc: "1995年和1996年，美国两个航母战斗群驶入台湾海峡，而我方海军只能眼睁睁地看着。998工程正是为了应对这一耻辱：持续的海军建设，目标是在航母重返台湾海峡之时，以一支能够与我方近海海域对抗的舰队取代一支仅能防御近岸海域的舰队。"
 CHI_Project_Coordination_Cell: "“一带一路”项目协调小组"
 CHI_Project_Coordination_Cell_desc: "我们的“一带一路”走廊横跨数十个国家，涉及数百个项目，如果没有一个协调机构，就会出现延误、重复建设和政治风险。中央对外联络部应牵头成立跨部门小组，负责筛选申请、指派项目经理和监督项目进度。秩序带来成果，成果才能维系信任。"
 CHI_project_jxx: "歼-XX工程"
 CHI_project_jxx_desc: "该项目始于上世纪90年代末，代号歼-XX，最终研制出歼-20“威龙”战斗机，于2011年首飞，2017年正式服役。歼-20具备隐身、远程和导弹携带能力，是除美国和俄罗斯之外的首款第五代战斗机，其设计目标是打击太平洋战场上任何作战机器都赖以生存的加油机和预警机。中国由此跻身于这个规模最小的空中力量俱乐部。"
 CHI_project_no_10: "十号工程"
 CHI_project_no_10_desc: "歼-10战斗机，诞生于秘密的“十号工程”，是中国第一款自主研发的现代战斗机，这是一款由成都研制的单引擎多用途喷气式飞机，其设计布局并未借鉴任何苏联图纸。它是中国战斗机工业迈向自主研发的第一步。"
 CHI_property_tax_pilot_program: "房产税试点计划"
 CHI_property_tax_pilot_program_desc: "上海和重庆率先启动了房产税试点项目，对第二套住房和高价值自住房屋征收适度税率。试点旨在抑制投机性购房，并使地方政府财政收入摆脱对土地出售收入的过度依赖。如果试点结果良好，我们应该在房地产市场成为难以控制的沉重负担之前，将此模式推广至全国。"
 CHI_provincial_reshuffle: "省级领导层改组"
 CHI_provincial_reshuffle_desc: "曾庆红在全国人大内部策划了一场大换血。上海帮的元老们获得了关键职位：陈良宇出任上海市委书记，黄菊晋升为政治局常委，贾庆林担任全国政协主席。此次改组巩固了太子党对最富裕省份和国家咨询机构的影响力。"
 CHI_provincial_youth_league_cohort: "提拔省共青团成员发展"
 CHI_provincial_youth_league_cohort_desc: "李克强在河南，汪洋在重庆，刘延东崛起。团派后台深厚而耐心 - 让它前进吧。"
 CHI_public_health_reconstruction: "新农村合作医疗计划"
 CHI_public_health_reconstruction_desc: "新农村合作医疗制度汇集了农村居民、地方政府和中央预算的缴款，用于支付重大医疗费用。这是我国历史上第一个系统性的农村医疗保险计划，我们应该尽快将其覆盖到接近全民的程度。八亿农民不应该仅仅因为生病就面临破产。"
 CHI_public_rental_housing_drive: "公共租赁住房计划"
 CHI_public_rental_housing_drive_desc: "数百万城市农民工和大学毕业生居住在简陋的临时住所中，受制于私人房东。政府将调动建设资源，在各大城市建造经济适用型公共租赁住房，收取补贴租金，并允许租户在租住三年后购买房屋。"
 CHI_pudong_financial_hub: "浦东金融中心"
 CHI_pudong_financial_hub_desc: "上海浦东新区正被打造成为中国主要的离岸金融中心。陆家嘴天际线、上海证券交易所和保税贸易区的建设，标志着中国力图挑战香港和新加坡，成为区域金融中心的雄心。"
 CHI_qbz191_rifle: "QBZ-191步枪"
 CHI_qbz191_rifle_desc: "老旧的QBZ-95无托步枪被QBZ-191取代，这是一款采用常规布局、配备导轨式光学瞄具的步枪，于2019年开始列装。这是一款现代化的武器，专为如今需要协同作战而非单打独斗的步兵而设计。"
 CHI_qinghai_tibet_railway_planning: "青藏铁路"
 CHI_qinghai_tibet_railway_planning_desc: "青藏铁路全长1956公里，平均海拔4500米，途经唐古拉山口。建成后，它将成为世界上海拔最高的铁路，也是我们第一条直达拉萨的铁路，将西藏与中国其他地区的经济和物流连接起来，这是任何公路或机场都无法做到的。"
 CHI_quiet_succession_engineering: "设计接班人"
 CHI_quiet_succession_engineering_desc: "曾庆红对组织部的掌控使他对当前正在展开的接班人之争拥有决定性的影响力。他应该会倾向于支持习近平，而不是由共青团支持的李克强。政治局常委第一号人物将有效地确认习近平成为下一任总书记，而在此之前，我们将已经塑造了未来十年党的领导格局。"
 CHI_ranks_for_sale: "出售军阶"
 CHI_ranks_for_sale_desc: "促销变成了价目表。正如徐才厚从1999年开始所做的那样，每颗星星都被卖给出价最高的人，现金装在标有买家姓名的盒子里交付。当他在北京的家最终被搜查时，调查人员搜出了一吨多的现金。购买军衔的军官团将为自己的投资而战，而不是为国家而战。"
 CHI_rapid_reaction_corps: "快速反应部队"
 CHI_rapid_reaction_corps_desc: "精锐空降和空中突击部队时刻保持戒备状态，能够在数小时内部署到中国境内或境外。他们能在对手组织起应对措施之前，就将地区危机化解。"
 CHI_rare_earth_dominance: "稀土开发战略"
 CHI_rare_earth_dominance_desc: "中国控制着全球约85%的稀土产量，主要集中在内蒙古和江西。一项由国家主导的整合计划减少了非法开采，提高了加工标准，并将中国定位为全球先​​进制造业不可或缺的供应商。"
 CHI_rare_earth_leverage: "稀土杠杆"
 CHI_rare_earth_leverage_desc: "我们提炼世界武器不可或缺的稀土元素，这些稀土元素占全球供应量的近90%，也是每枚导弹和隐形战斗机内部磁铁的来源。原本的出口如今变成了一种杠杆：切断供应，竞争对手的武库就会瘫痪，而我们的武库却可以畅通无阻。"
 CHI_Reclaim_The_Heavenly_Waters: "夺回天水"
 CHI_Reclaim_The_Heavenly_Waters_desc: "天水，意为“天上的水”，是环绕中国大陆的古老诗意名称。这个名字本身就充满韵味；而游戏的战斗则是现代海战。中国人民解放军海军水面舰艇部队开始逐步升级对南沙群岛争议海域的入侵，挑战声索方的海警船，干扰其补给行动，并向各方政府发出最后通牒：要么接受中国对争议岛礁的行政管辖权，要么面临下一轮的军事行动。只有当我们取得决定性的战术胜利时，冲突才能继续升级；任何不分胜负的交锋和挫折都会阻碍事态的进一步升级。"
 CHI_reconstruction_development: "重建能力"
 CHI_reconstruction_development_desc: "多年来的基础设施投资和建筑业积累的能力使我们拥有在自然灾害和工业事故后迅速重建的卓越能力。标准化的灾害应对方案、预先部署的设备储备以及专业的陆军工程部队是这一能力的基础。我们应该继续投资，保持这种能力的敏锐性，因为下一次地震或洪水不会等我们做好准备。"
 CHI_red_arrow_program: "红箭项目"
 CHI_red_arrow_program_desc: "对抗装甲的武器是红箭系列反坦克导弹，包括红箭-8和红箭-9，它们装备了从步兵三脚架到车辆和直升机的各种武器。这些导弹价格低廉、数量充足且不断改进，使每个作战单位都具备了摧毁坦克的射程。"
 CHI_Renminbi_Internationalization: "人民币作为储备货币"
 CHI_Renminbi_Internationalization_desc: "我们已推出跨境银行间支付系统，用于在SWIFT网络之外清算人民币交易；国际货币基金组织也已将人民币纳入其特别提款权货币篮子。“一带一路”贸易结算以人民​​币结算，正稳步提升人民币在全球储备中的权重。我们现在必须深化这些机制，直至人民币成为重视自身独立性的伙伴国真正可以替代美元的货币。"
 CHI_Responsible_Stakeholder: "负责任的利益相关者"
 CHI_Responsible_Stakeholder_desc: "我们应当响应国际社会的号召，成为全球机构的建设性参与者。通过深化贸易联系、减少多边论坛中的摩擦，我们才能将自身定位为不可或缺的合作伙伴，而非修正主义的挑战者。即便背后的战略不变，这一标签也至关重要。"
 CHI_rmb_internationalisation: "人民币国际化"
 CHI_rmb_internationalisation_desc: "人民币贸易结算试点项目已启动，目前已与超过40家中央银行签署货币互换协议。国际货币基金组织已将人民币纳入其特别提款权货币篮子，这一认可不可撤销。跨境银行间支付系统为SWIFT提供了一种以人民币计价的替代方案，覆盖超过1500家成员机构。俄罗斯被排除在SWIFT系统之外后，约90%的俄中贸易转向境银行间支付和人民币-卢布货币兑换，沙特阿拉伯、阿联酋和巴西也开始接受人民币支付大宗商品合约。美元体系并未崩溃，但它已不再没有挑战者。"
 CHI_Rome_Memorandum: "罗马一带一路备忘录"
 CHI_Rome_Memorandum_desc: "意大利签署“一带一路”谅解备忘录，成为七国集团成员国中的首例，此举打破了西方在遏制意大利在欧洲的基础设施外交方面达成的共识。该协议涵盖港口、铁路和数字基础设施合作，的里雅斯特和热那亚分别成为意大利货物在亚得里亚海北部和利古里亚海沿岸的枢纽港。布鲁塞尔和华盛顿将施压罗马退出该协议，但如果我们妥善处理与意大利的关系，意大利投资的商业吸引力应该能够经受住政治考验。"
 CHI_sasac: "将这些公司移交给国资委"
 CHI_sasac_desc: "从军队剥离出来的企业并没有消失；它们移交给了2003年成立的国有资产监督管理委员会，该委员会旨在掌控经济命脉。军事利润变成了民用股息，记入北京的账目，而不是军营的账目。"
 CHI_sasac_founding: "国有资产监管委员会"
 CHI_sasac_founding_desc: "我国国有企业长期以来监管分散，缺乏统一的所有权战略。我们必须设立专门的监察委员会，加强对中央直属企业的管控，推行高管绩效合同，要求企业上缴股息，并对重大投资决策进行严格审查。国家必须扮演股东的角色，而不仅仅是监管者。"
 CHI_saturn_engine_crisis: "土星发动机危机"
 CHI_saturn_engine_crisis_desc: "中国可以制造机身，但却造不出它内部的发动机。我们最好的战斗机仍然使用俄罗斯的土星AL-31发动机，莫斯科的任何禁运或涨价都可能导致这支机队停飞。无论付出多大的代价，都必须让WS-10“太行”发动机发挥作用，否则我们的独立就只是披着进口涡轮外衣的空想。"
 CHI_scientific_development_outlook_foreshadowed: "预示科学发展前景"
 CHI_scientific_development_outlook_foreshadowed_desc: "给副主席留出意识形态空间。胡锦涛的人民获得了理论上的开放空间 - 可持续发展、农村再平衡、以人为本的方针。"
 CHI_scientific_outlook_on_development: "科学发展观"
 CHI_scientific_outlook_on_development_desc: "胡锦涛的执政理念主张以人为本、全面发展、均衡发展和可持续发展。将其奉为党的方针，将使政策重心从以GDP为先的增长转向更广泛的社会和环境指标。问题在于，那些十年来一直以产出目标为导向的省级官员，能否被说服去追求一些更难以衡量的指标。"
 CHI_scientific_outlook_on_development_tt: "§R因为我们丢失$CHI_scientific_outlook_idea_1$，我们将获得：§!"
 CHI_SCO_Exclusive_Core: "上海合作组织独家核心"
 CHI_SCO_Exclusive_Core_desc: "我们不应通过快速扩张来稀释上海合作组织的实力，而应深化现有成员国之间的融合。少数几个志同道合的国家之间更紧密的联系，将带来更大的战略红利。"
 CHI_SCO_Exclusive_Core_tt: "§G加强§!成员合作并§R阻止§!新的对话伙伴申请。现有会员可获得永久关系值加成。"
 CHI_SCO_Plus_Expansion: "上海合作组织+扩张"
 CHI_SCO_Plus_Expansion_desc: "上海合作组织的优势在于其覆盖面广。通过降低准入门槛并积极寻求新的对话伙伴，我们可以扩大该组织在亚洲、中东及其他地区的影响力。"
 CHI_sea_eagles_carrier_wing: "舰载航空联队"
 CHI_sea_eagles_carrier_wing_desc: "区区几架战斗机不足以组成一个航空联队。我们​​用空中预警直升机、反潜直升机和电子战直升机完善航母甲板，将这些飞机整合为一个整体，能够进行侦察、掩护和打击。"
 CHI_sea_eagles_of_the_liaoning: "辽宁号的海鹰"
 CHI_sea_eagles_of_the_liaoning_desc: "辽宁舰的甲板上多了利爪。歼-15“飞鲨” - 一款由苏-33改进而来的重型舰载战斗机 - 被装备并改装成攻击机，而从移动的中国舰艇上投射空中力量的航母打击理论也首次被写入史册。"
 CHI_second_gen_platforms: "第二代平台"
 CHI_second_gen_platforms_desc: "字节跳动在国内推出抖音，在国际市场推出TikTok，触达了BAT一代从未涉足的用户群体。拼多多凭借团购机制颠覆了电商模式，触达了四线城市和农村市场的消费者；美团引领了按需服务领域。滴滴收购了优步中国。第二波平台浪潮正在将我们的数字经济拓展到第一代平台认为过于分散或不够吸引人的细分领域。"
 CHI_Second_Island_Chain_Reach: "第二岛链投影"
 CHI_Second_Island_Chain_Reach_desc: "解放军海军在美拉尼西亚和波利尼西亚太平洋的通行权，使我们的前沿作战基地得以在关岛、夏威夷以及连接美国与其东亚盟友的海上航线上展开打击。这一战略部署打破了美国战略规划者自冷战以来一直依赖的“第二岛链”逻辑。澳大利亚失去了它一直视为稳固屏障的地理缓冲地带。我们必须在他们意识到这一点之前采取行动。"
 CHI_Secure_The_Heavenly_Waters: "确保天水安全"
 CHI_Secure_The_Heavenly_Waters_desc: "天水，即天上的水，是环绕中原疆域的海洋的古称。那些拒绝承认正当秩序的人，如今已被武力征服。南海已归还于我方管辖之下。"
 CHI_seed_security_campaign: "种子安全运动"
 CHI_seed_security_campaign_desc: "大豆战争暴露了我们的脆弱性：由于国内加工商因投机性期货交易破产，ABCD粮商收购了我们70%的大豆压榨产能。我们绝不能让这种局面重演。海南岛三亚是我们的南瓯作物育种基地，那里的热带冬季气候有利于一年三代的育种。中国化工集团收购先正达后，全球种质资源库置于国家控制之下，而隆平高科和北大荒粮局则被指定为国家种子主权的领军企业。"
 CHI_selective_anti_corruption: "选择性反腐败运动"
 CHI_selective_anti_corruption_desc: "2000年代中期的反腐调查具有高度选择性。案件主要针对那些积累了独立权力基础或跨越派系界限的官员，而他们的盟友和庇护者则免受审查。这些​​起诉的政治因素削弱了其合法性，并在党内引发了派系间的不满。"
 CHI_Seoul_Under_Our_Umbrella: "首尔在我们的伞下"
 CHI_Seoul_Under_Our_Umbrella_desc: "我们和韩国正式确立战略伙伴关系框架。我们的安全保障取代了美韩同盟，中国海军进入济州岛的权限经过谈判，美军开始从朝鲜半岛进行期待已久的撤离。"
 CHI_service_of_the_three_distances: "三种距离的勤务"
 CHI_service_of_the_three_distances_desc: "海军重新定义了其作战范围。它不再局限于刘华清第一道防线所构筑的近海防御，而是同时训练远海和公海作战能力，这三者都是全球舰队必须具备的作战能力。作战理论也发生了决定性的转变，从保卫海岸转向横跨世界各大洋作战。"
 CHI_seventeen_plus_one_mechanism: "16+1合作框架"
 CHI_seventeen_plus_one_mechanism_desc: "中国与中东欧国家“17+1”合作平台引导我们的投资流向欧盟及其候选国的基础设施，这引发了布鲁塞尔方面对成员国政策趋同和规避监管的担忧。布鲁塞尔的担忧不无道理。我们更应该深化这些关系，因为它们有助于打破限制我们市场准入的统一欧洲阵线。"
 CHI_shadow_banking_cleanup: "影子银行和金融风险清理"
 CHI_shadow_banking_cleanup_desc: "2008年和2009年的刺激浪潮导致财富管理产品和信托公司在房地产和地方政府融资工具中积累了大量不透明风险。新资产管理条例要求财富管理产品采用净资产值定价，并取消隐性担保。安邦保险因鲁莽的海外收购（涉案金额高达3000亿美元）而被国家接管。海航集团因自身债务而破产。整顿行动将风险监管集中到改革后的银保监会，并稳定了银行间市场。纪律并非惩罚，而是建立可信赖体系的代价。"
 CHI_shandong_at_sanya: "在三亚的山东号"
 CHI_shandong_at_sanya_desc: "第二艘航母完全属于我们。002型山东舰是中国自主设计建造的第一艘航母，于2017年下水，2019年服役，母港位于海南三亚榆林潜艇基地附近。它从南方监视着海上航道和中国意图控制的争议岛屿。"
 CHI_shantytown_renovation: "贫民窟改造计划"
 CHI_shantytown_renovation_desc: "国家棚户区改造项目拆除了老煤矿省份的废弃工人住房，代之以现代化的住宅区和工业区。山西和河南因重工业基础设施老化而受到影响，获得的拨款最多。中央政府在该计划上的支出达到1.54万亿元人民币，催生了一波建设合同热潮，并在内陆地区开辟了前所未有的新工业区。"
 CHI_shenyang_j35_gyrfalcon: "歼-35 蓝鲨"
 CHI_shenyang_j35_gyrfalcon_desc: "第二架隐形战斗机加入第一架的行列。沈阳的歼-35是在FC-31验证机的基础上发展而来的，是一款双引擎第五代喷气式战斗机，尺寸适合陆基和航母甲板起降，使中国能够与歼-20形成高低空隐形组合，而这种组合目前只有美国才能部署。"
 CHI_shenzhou_program: "神舟计划"
 CHI_shenzhou_program_desc: "2003年10月15日，杨利伟搭乘神舟五号飞船从酒泉卫星发射中心升空，成为中国首位航天员。这次历时21小时、绕地球飞行14圈的任务，使中国成为第三个独立将人类送入太空的国家，并开启了载人航天计划，该计划后来发展到包括太空行走、轨道交会和长期空间站任务。"
 CHI_sicarrier_euv: "新凯来极紫外光刻计划"
 CHI_sicarrier_euv_desc: "在国家直接支持下成立的新凯来科技公司肩负着弥合极紫外光刻技术差距的重任。该项目依托长春光学研究所的国内光学设计能力和中核集团的反射镜制造经验。一个功能完善的极紫外光刻演示样机需要自主生产13.5纳米光源、多层反射光学元件以及亚纳米级精度的晶圆平台。这是我们为实现半导体设备完全自主化而做出的最雄心勃勃的尝试。一台自主研发的极紫外光刻设备意味着我们可以在无需任何外国设备许可的情况下，从根本上打破西方出口管制制度，实现先进芯片的端到端制造。"
 CHI_Silk_Road_Fund: "丝路基金"
 CHI_Silk_Road_Fund_desc: "丝路基金由我国外汇储备和主权财富基金出资400亿美元，为“一带一路”项目提供股权融资，而这些项目是商业银行和多边贷款机构不愿单独承接的。通过该基金，我们可以对那些因缺乏愿意承担风险的先行者而停滞不前的项目予以支持。"
 CHI_sinograin_strategic_reserve: "中国粮食"
 CHI_sinograin_strategic_reserve_desc: "中国粮食储备公司继承了隋唐时期皇家粮仓的职能，其核心是黑龙江省的北大荒，该省的黑土农田粮食产量位居全国之首。中国粮食储备公司实行最低粮食收购价格政策，在市场下跌时代表国家进行收购。如今，战略性猪肉储备也已纳入粮食储备体系，这是世界上独一无二的，我们应该将其视为一项重要的战略资产。"
 CHI_smee_lithography: "上海微电子装备光刻技术开发"
 CHI_smee_lithography_desc: "上海微电子装备集团是我们唯一的光刻制造商，生产用于封装和后端工艺的90纳米和110纳米曝光工具。国家资助加速了28纳米浸入式深紫外光刻扫描仪的开发，目前国内晶圆厂已报告了资格认证进展情况。 上海微电子装备集团仍然落后阿斯麦最强大的工具一代，但国内深紫外光刻生产消除了我们对成熟节点产能扩张的依赖，并为我们向先进节点光刻发展提供了所需的基础。差距是真实存在的；道路是正确的。"
 CHI_smic_advanced_node: "中芯国际先进节点推送"
 CHI_smic_advanced_node_desc: "在被列入美国实体清单后，中芯国际加快了国内研发步伐。我们的工程师对现有的深紫外光刻设备进行了改造，通过多重曝光技术实现了相当于7纳米的密度——这一成果证实，创新的工艺工程可以部分替代极紫外光刻的使用。这一成就为国内设备的研发赢得了时间，并将技术差距重新定义为一个可解决的工程问题。Mate 60 Pro的发布向世界展示了我们的制造能力，引发了新一轮的美国出口管制审查，而这种反响告诉我们，我们正在做正确的事情。"
 CHI_smic_zhangjiang: "中芯国际张江扩展"
 CHI_smic_zhangjiang_desc: "中芯国际在张江高新技术产业园建成了其旗舰级300毫米晶圆厂，并凭借国家投资持续扩建产能，实现了28纳米制程的量产，并开始试产14纳米工艺。每推进一个制程节点，中芯国际与台积电和三星的差距就进一步缩小，目前中芯国际是中国大陆唯一一家能够生产先进逻辑芯片的晶圆代工厂。我们必须保护好这一优势，并进一步推动其发展。"
 CHI_smuggling_tax: "对走私征税"
 CHI_smuggling_tax_desc: "军队并非掌控所有非法活动，而是发放许可证。走私石油、汽车和香烟的走私者通过港口和驻军向当地指挥官缴纳保护费，这笔费用就成了任何政府部门都无法触及的非官方预算。"
 CHI_Soft_Power_Projection: "软实力投射"
 CHI_Soft_Power_Projection_desc: "在世界各地的大学建立孔子学院，扩大国家媒体的国际影响力，向海外推广汉语、中国文化和中国观点。"
 CHI_special_operations_forces: "特种作战部队"
 CHI_special_operations_forces_desc: "每个战区都组建了自己的特种作战旅，接受过突袭、侦察和斩首行动的训练。他们是锋利刀锋的尖端，在主力部队之前被派往内部打开大门。"
 CHI_star_market_bse: "科创板和北京证券交易所"
 CHI_star_market_bse_desc: "上海证券交易所科创板引入了注册制IPO、双重股权结构以及面向非盈利企业的上市渠道。中芯国际在科创板融资75亿美元；北京证券交易所随后也开始面向创新型中小企业上市。这些平台共同助力半导体、生物技术和先进制造企业在国内无需依赖华尔街上市即可筹集资金。我们的资本市场不再构成依赖风险。"
 CHI_state_council_information_office: "国务院新闻办公室"
 CHI_state_council_information_office_desc: "国务院新闻办公室负责对外沟通、海外宣传、国内网络治理和外国记者证认证等工作。我们必须利用新闻办公室在“金盾”计划下建立内容过滤制度，并扩大国际广播，以对抗西方叙事主导地位。信息环境是战场，我们绝不能轻易放弃。"
 CHI_stock_exchanges_shanghai_shenzhen: "上海、深圳和香港交易所"
 CHI_stock_exchanges_shanghai_shenzhen_desc: "上海证券交易所聚集了包括四大银行、中石化、中国石油和中国移动在内的大型国有企业。深圳证券交易所则聚集了比亚迪、美的、格力、平安等民营企业和创新型公司。深圳创业板类似于纳斯达克，专注于成长型股票。沪港通和深港通机制为国际投资组合投资者开辟了一条可控的通道，无需完全开放资本账户，使我们能够以自己的方式吸引外资。"
 CHI_strategic_materials: "战略物资供应链"
 CHI_strategic_materials_desc: "我们控制着全球超过80%的镓和锗精炼产能，并主导着半导体制造所需萤石、金属硅和稀土元素的供应。继美国实施出口管制后，我们对镓和锗实行出口许可证制度，随后又对砷化镓化合物施加了进一步的限制。国内政策将战略材料产量导向我们自己的晶圆厂，从而降低成本，并确保受实体清单限制的代工厂的供应连续性。材料供应瓶颈是双向的。"
 CHI_strategic_reserve_system: "战略储备系统"
 CHI_strategic_reserve_system_desc: "纵深就是自身的防御。改革后的预备役和动员体系随时准备向前线输送训练有素的人员，确保即使是旷日持久的消耗战，中国也能坚持到最后。"
 CHI_streamline_the_ranks: "精简队伍"
 CHI_streamline_the_ranks_desc: "一支两百万人的军队，如果仅仅是为了用尸横遍野淹没入侵者而打造，就无法赢得一场需要精准打击的战争。我们要精简臃肿的步兵，淘汰过时的装备，并将节省下来的资金投入到火力、传感器和机动性等方面。人民解放军将更加精简、更加高效，并且，有史以来第一次，成为一支旨在赢得胜利而非仅仅为了苟延残喘的军队。"
 CHI_strike_black_sing_red: "唱红打黑"
 CHI_strike_black_sing_red_desc: "一场旨在净化政治肌体的双管齐下运动。“打黑”行动逮捕了数千名有组织犯罪分子和腐败官员，瓦解了腐蚀地方治理的裙带关系网络。“唱红”行动复兴了革命歌曲和毛泽东口号，将民众的能量转化为爱国动员。"
 CHI_Suez_Eastern_Bank: "苏伊士东部工业区"
 CHI_Suez_Eastern_Bank_desc: "位于苏伊士运河东岸的中埃苏伊士经济贸易合作区，使我们的制造、物流和能源企业得以在埃及优惠的监管条件下运营。该合作区巩固了我们在世界最重要的海上咽喉要道之一的战略立足点，降低了过境成本，并为我们的企业进入北非和欧洲市场提供了基础。埃及则从中获得外汇收入，并与我们建立了政治联系。双方都深知我们正在共同打造的合作区的价值。"
 CHI_Sunshine_Policy_Revival: "阳光政策复兴"
 CHI_Sunshine_Policy_Revival_desc: "我们应与首尔协调，重建天安舰沉没和延坪岛炮击事件后崩溃的朝韩接触机制。通过联合文化交流、家庭团聚探访项目以及重新开通热线，重建朝韩沟通的基本基础设施，而我们则扮演着不可或缺的协调者角色。一个会对话的朝鲜，就是一个不会战斗的朝鲜。"
 CHI_system_of_systems_operations: "系统之系统行动"
 CHI_system_of_systems_operations_desc: "改革的最终目标是一种战争方式，而非组织架构图。我们追求的是系统一体化作战，将传感器、射手和指挥官整合为一个网络，使其思维和打击速度远超任何敌人的反应速度。赢得下一场战争的军队将作为一个单一的、具有洞察力的有机体进行作战。"
 CHI_tactical_electronic_warfare: "战术电子战"
 CHI_tactical_electronic_warfare_desc: "在信息化战场上，能够压制对方的一方就能取得胜利。我们在旅级单位部署了专门的干扰、信号和电子攻击部队，在第一枪打响之前就干扰敌方的无线电、雷达和数据链路。"
 CHI_tactical_uav_integration: "战术无人机集成"
 CHI_tactical_uav_integration_desc: "高空侦察成为标配。小型侦察无人机被下放到营和连级单位，这样指挥官就不会盲目行动，每个目标都能在开火前被发现。"
 CHI_Takeshima_Solidarity: "利昂科岩公报"
 CHI_Takeshima_Solidarity_desc: "我们正式支持韩国对利昂科岩礁的主权声索，并将这场争端定义为对日本拒绝承认其帝国历史的共同不满。首尔和东京之间的裂痕日益加深，韩国公众舆论也逐渐远离华盛顿的太平洋联盟体系。"
 CHI_telecom_reorganization: "电信重组"
 CHI_telecom_reorganization_desc: "国务院重组电信垄断企业，拆分中国电信，并同时向中国移动、中国联通和中国电信发放3G频谱。由此产生的竞争推动了网络基础设施建设的投资，并加速了移动宽带在14亿潜在用户市场的普及，这是任何外国竞争对手都无法触及的。"
 CHI_tencent_games_publisher: "腾讯的游戏帝国"
 CHI_tencent_games_publisher_desc: "腾讯收购了Riot Games和Supercell，并持有Epic、动视暴雪和育碧的大量股份。《王者荣耀》成为全球收入最高的手机游戏；《原神》在上线头两年就创造了50亿美元的收入。我们对西方游戏工作室的投资，让我们能够以远低于传统软实力的成本，对全球娱乐业产生结构性影响。文化的力量远胜于外交手段。"
 CHI_The_2022_Reset: "[GetYear]重启"
 CHI_The_2022_Reset_desc: "借鉴[GetYear]巴厘岛G20框架，我们和美国正式重启六方机制。十多年来，我们首次扮演华盛顿、首尔和平壤之间的公正调解人角色。"
 CHI_The_2025_Blue_Sky_Operation: "蓝天行动"
 CHI_The_2025_Blue_Sky_Operation_desc: "我们和朝鲜将对韩国发动联合军事行动。“蓝天行动”将考验我们是否愿意承担以武力实现朝鲜半岛统一所带来的国际代价。"
 CHI_The_610_Northeast_Directive: "610东北指令"
 CHI_The_610_Northeast_Directive_desc: "中共东北军区启动东北和辽宁的紧急动员机制。边防部队得到加强，战略预备队重新部署，边境地区的基础设施得到加固，以应对未来在朝鲜半岛发生的任何突发事件。"
 CHI_the_610_office_mandate: "610办公室授权"
 CHI_the_610_office_mandate_desc: "610办公室以其成立日期命名，负责协调国家安全机构镇压法轮功及其他被视为危害社会稳定的团体。该机构游离于正常法律程序之外，将执法权集中于中央手中。其职权范围刻意放宽，因为它所应对的威胁并不受普通法律的约束。"
 CHI_the_998_project: "998轰炸机项目"
 CHI_the_998_project_desc: "轰炸机部队曾一度被认为过时，如今却重获新生。一项专门的计划围绕深度现代化的机体重建远程打击能力，将冷战时期的遗物改造为远程导弹运载机，无需越过敌方海岸线即可威胁西太平洋的目标。"
 CHI_The_Air_Patrol_Zone: "空中巡逻区"
 CHI_The_Air_Patrol_Zone_desc: "其他国家称之为防空识别区的区域，我们更倾向于称之为常规巡逻区：解放军空军拦截机在南海进行例行主权巡逻，识别外国飞机，并护送不遵守规定的过境飞机离开该区域。其实际效果与2013年东海事件的先例类似，所有非中国飞机都面临识别要求和拦截风险，但其表述强调的是我们空中力量，而非国际社会会立即提出异议的正式法律主张。"
 CHI_the_anime_generation_gambit: "动漫世代赌局"
 CHI_the_anime_generation_gambit_desc: "我们的青年引用宫崎骏的次数比引用毛泽东的次数还多。这既是问题也是机遇。王沪宁同志认为这是后者。"
 CHI_The_Beijing_Peace_Guarantee: "北京和平保障"
 CHI_The_Beijing_Peace_Guarantee_desc: "我们支持朝韩最终和解。北京和平保证承诺捍卫统一后的朝鲜半岛主权，反对外部干涉。"
 CHI_The_Beijing_Settlement: "北京和解"
 CHI_The_Beijing_Settlement_desc: "政变巩固后，我们斡旋达成朝鲜新的政治现实。平壤过渡政府接受我们的仲裁，朝鲜劳动党在我们的监督下进行了重组。"
 CHI_the_bohai_bastion: "渤海堡垒"
 CHI_the_bohai_bastion_desc: "最可靠的威慑力量是无法找到的。094A型弹道导弹潜艇携带射程约一万公里的巨浪-3导弹，终于可以从受保护的本土水域打击美国本土。我们的弹道导弹潜艇在舰队的庇护下，如同堡垒般屹立不倒，赋予中国真正的海上二次打击能力，最终确保任何先发制人的打击都无法解除我们的武装。"
 CHI_The_Border_Personnel_Meetings: "边境人员会议"
 CHI_The_Border_Personnel_Meetings_desc: "实际控制线沿线有五个地点，印中指挥官可以在此会面而无需启动升级协议。一个茶壶，一张折叠桌，两面旗帜。有时，外交就从如此不起眼的地方开始。"
 CHI_The_Cabbage_Strategy: "卷心菜战略"
 CHI_The_Cabbage_Strategy_desc: "张兆忠少将曾公开描述过这一策略：将每一处争议岛礁层层包裹起来。最外层是渔船，其后是海上民兵，再往里是海警船，核心是护卫舰，直到最外层的“叶子”与主权难分彼此。等到外国律师赶到时，这片“卷心菜”早已长成。我们将这一理论作为我们处理南海问题的框架。"
 CHI_The_Cabbage_Tightens: "卷心菜收紧"
 CHI_The_Cabbage_Tightens_desc: "如今，海上民兵和海岸警卫队舰艇在争议礁链上统一行动，由中国人民解放军海军协调指挥。这片礁链的外层区域已整合为无缝衔接的行政和安全体系。曾经的争议区域，如今已实现有效管理。"
 CHI_the_china_plus_one_counteroffensive: "中国+1反攻"
 CHI_the_china_plus_one_counteroffensive_desc: "丰田先生访问天津时期望获得一些让步。结果他不仅获得了让步，还拿到了一份十万辆燃料电池汽车的合同。如何做到既给予又有所收获，这门艺术仍需我们不断完善。"
 CHI_The_Chinese_Correction: "中国式纠正"
 CHI_The_Chinese_Correction_desc: "金氏王朝反复无常的行为已成为战略隐患。我们认为，有序、低调、精准且不可逆转的权力交接，远胜于平壤方面新一轮的讹诈外交。"
 CHI_the_chinese_dream: "中国梦"
 CHI_the_chinese_dream_desc: "中华民族伟大复兴是中国最伟大的梦想。一个世纪的屈辱已经过去，迎来了复兴。党将这一转变视为14亿全国人民共同的历史命运，而非意识形态。经济实力、军事力量和国际尊重不是我们的野心——它们是我们曾经失去的，也是我们终将夺回的。"
 CHI_The_Code_Of_Conduct: "行为准则"
 CHI_The_Code_Of_Conduct_desc: "一份由中方主导谈判达成的、具有约束力的区域行为准则，被视为解决南海争端的最终方案。该准则将双边安排编纂成法，排除外部仲裁，并确立了争端仅由中国及其邻国解决的原则。外部势力被剥夺了任何司法管辖权。"
 CHI_the_diaoyu_sovereignty_declaration: "钓鱼岛主权宣言"
 CHI_the_diaoyu_sovereignty_declaration_desc: "钓鱼岛自明朝以来一直是中国领土。日本的“统治”是殖民时代的遗留问题，世界对此已经容忍太久了。"
 CHI_The_Duterte_Pivot: "杜特尔特转向"
 CHI_The_Duterte_Pivot_desc: "当菲律宾总统杜特尔特宣布该国与美国“分离”并转向北京时，他向该地区表明，东南亚领导人可以选择主权而非依赖。我们应该在其他地区悄然而耐心地进行类似的战略调整，直到华盛顿的联盟不再是答案，而成为一个问题。"
 CHI_The_Final_Compromise: "最后的妥协"
 CHI_The_Final_Compromise_desc: "经过多年耐心斡旋，我们促成了朝韩双方都能接受的最终解决方案。该方案既不主张统一，也不主张永久分裂，而是建立了共享经济区、非军事化边境口岸以及中韩联合监督委员会。我们由此成为朝鲜半岛和平不可或缺的保障者。"
 CHI_The_Five_Fingers_Doctrine: "五指学说"
 CHI_The_Five_Fingers_Doctrine_desc: "毛泽东在1959年说过：西藏是右手掌，五根手指分别是拉达克、尼泊尔、锡金、不丹和东北边境特区。我们已经有了右手掌和拇指，其余的手指还在等待。"
 CHI_the_fujian_catapults: "福建号的弹射器"
 CHI_the_fujian_catapults_desc: "滑跃式起飞让位于弹射器。 003型福建舰于2022年下水，是中国第一艘配备电磁弹射器的航母，能够将更重、加满燃油的飞机甚至空中预警机从甲板上弹射出去。有了她，与美国超级航母的差距就从鸿沟缩小到了一大步。"
 CHI_the_fukuda_doctrine_revisited: "重估福田主义"
 CHI_the_fukuda_doctrine_revisited_desc: "邓小平同志告诉我们：隐藏实力，等待时机。日本经济正在崩溃，出生率正在下降，他们的政客每十四个月就换一次官。既然我们可以买下他们的遗产，何必去招惹一个即将消亡的政权呢？"
 CHI_The_G2_Declaration: "G2宣言"
 CHI_The_G2_Declaration_desc: "在华盛顿和北京举行的峰会上，我们的领导人和美国领导人共同宣布致力于在韩国的领导下实现朝鲜半岛的和平统一。G2宣言标志着东亚安全大国管理新时代的到来，并承认我们是这一安排中的平等伙伴。"
 CHI_the_great_wall: "长城"
 CHI_the_great_wall_desc: "有些战役的胜利在于永不言败。我们选择防御之路，构筑现代长城：层层叠叠的防御工事、深厚的后备力量，以及一支令任何入侵者在中国领土上血流成河的军队。只要祖国固若金汤，统一便可暂且搁置。"
 CHI_the_great_western_development: "大西部发展"
 CHI_the_great_western_development_desc: "我们的“西部发展”政策通过基础设施建设、工厂激励和移民安置计划，引导国家投资流向西部十二个省份。缩小沿海与内陆之间的差距，既是经济发展的必然要求，也是我们维系动荡不安的边境地区与中央政府之间联系的最持久有效的手段。"
 CHI_the_historical_reckoning: "历史的清算"
 CHI_the_historical_reckoning_desc: "教科书里遗漏了一座城市。神社缅怀的是战犯。我们将铭记这一切。"
 CHI_the_iron_fist: "铁腕"
 CHI_the_iron_fist_desc: "防御无法挽回任何损失。我们选择铁腕手段：以99式坦克为首的重型合成旅，凭借密集的装甲力量和远程火力，突破严阵以待的敌人防线，夺取阵地。一旦接到跨越海峡或边境的命令，必将以压倒性的兵力予以回应。"
 CHI_The_Jang_Faction_Rehabilitation: "张氏派的复兴"
 CHI_The_Jang_Faction_Rehabilitation_desc: "张成泽被清洗处决时，我们在平壤最可靠的联络人也随之消失。现在，我们将重建他在流亡中的残余势力，培养一批具有改革意识的朝鲜官员，他们的未来都仰赖于我们。"
 CHI_the_japan_question: "日本问题"
 CHI_the_japan_question_desc: "我们的东北方向既蕴藏着巨大的威胁，也蕴藏着巨大的机遇。日本问题，如同台湾问题和朝鲜问题一样，没有一劳永逸的答案，只有适合当下情况的应对之策。"
 CHI_the_komsomolsk_pipeline: "共青团城输油管道"
 CHI_the_komsomolsk_pipeline_desc: "当俄罗斯的工厂已经投入运行时，为什么还要等待我们的工厂呢？我们从阿穆尔河畔共青城购买了苏-27、苏-30和AL-31发动机，为我们一半的机队提供动力，引进了我们尚无法建造的一代能力。这条管道使空军今天保持现代化，但代价是明天将依赖莫斯科。"
 CHI_The_Mandate_Of_The_Seas: "海权"
 CHI_The_Mandate_Of_The_Seas_desc: "中国古典世界观认为，中原文明中心四海被四海环绕。四海中的龙王向天庭臣服，并通过龙王向天子传达旨意。这一秩序因百年屈辱而中断；如今，它正等待一个足以维护这一秩序的强大国家予以恢复。"
 CHI_the_maritime_militia_initiative: "海上民兵倡议"
 CHI_the_maritime_militia_initiative_desc: "每一艘渔船都是移动的主权标志。人民武装力量海上民兵隶属于中央军委，但在世人眼中，他们只是渔民。"
 CHI_The_Maritime_Silk_Road_Initiative: "海上丝绸之路倡议"
 CHI_The_Maritime_Silk_Road_Initiative_desc: "海上丝绸之路是“一带一路”倡议的海上组成部分，它将我们的基础设施投资和贸易网络延伸至东南亚、南亚和东非。在南海，它成为我们外交路径的经济支柱：声索国通过获得港口融资、渔业协议和油气合资项目等支持，发现双边途径比东盟层面的对抗更具吸引力。每一项签署的协议都强化了这样一个原则：这些争端是邻国之间的事务，而非国际仲裁的案件。"
 CHI_the_nanjing_memorial_mandate: "南京纪念馆"
 CHI_the_nanjing_memorial_mandate_desc: "三十万。这个数字将出现在每一本教科书的封面上，每一面博物馆的墙上，以及每年12月13日的默哀仪式上。日本政府有他们的记忆，我们也有我们的记忆。"
 CHI_The_Nine_Dots_Consensus: "九点共识"
 CHI_The_Nine_Dots_Consensus_desc: "我们不打算在平壤和首尔之间选边站队，而是制定了一条权衡利弊的中间路线：在不保证朝鲜政权存续的前提下维持与朝鲜的关系，在不放弃战略模糊性的前提下深化与韩国的经济联系。我们认为，只有同时兼顾这两条路线，最终才能实现朝鲜半岛的稳定。"
 CHI_the_northeast_tiger: "东北虎"
 CHI_the_northeast_tiger_desc: "腐败军队中的权力通过地域和裙带关系来维系。徐才厚出身的东北沈阳集团，成为了幕后操纵者，如同经营私人庄园一般，在旧军区之间进行官职和人情交易。"
 CHI_the_panda_diplomacy_renewal: "熊猫外交复兴"
 CHI_the_panda_diplomacy_renewal_desc: "两只熊猫。每年1200万美元的“保护费”。一张日本小孩对着中国动物微笑的头版照片。值回票价。"
 CHI_The_Panmunjom_Architecture: "板门店建筑"
 CHI_The_Panmunjom_Architecture_desc: "我们将在板门店 - 停战协定签署地，也是过去二十年由美国主导的峰会失败的见证地 - 召开新的多边对话。我们的框架促使首尔和平壤在我们的斡旋下坐到同一张桌子前，承诺各方将参与分阶段缓和紧张局势的进程，并由我们的外交保证作为后盾。世界将会认可我们做到了华盛顿未能做到的事。"
 CHI_the_party_that_lasts: "永不落幕的党"
 CHI_the_party_that_lasts_desc: "党的制度机制，即代表大会制度、中央委员会和政治局，被重申为合法的治理机器，其存在旨在超越任何一位领导人。习近平思想已确立为下一个世纪的运行框架，但支撑这一思想的制度是集体性的、持久的。党经历了毛泽东逝世、文化大革命和天安门事件的考验。它的机器机制旨在永续运转。"
 CHI_The_Pivot_Reversed: "枢轴反转"
 CHI_The_Pivot_Reversed_desc: "美国转向亚洲的战略超出了华盛顿的承诺，并创造了战略开放。随着美国信誉的削弱，我们将填补这一真空，将自己定位为首尔最有能力、最愿意的安全伙伴。"
 CHI_The_PLAN_Expeditionary_Buildup: "解放军海军远征集结"
 CHI_The_PLAN_Expeditionary_Buildup_desc: "航母打击群、075型两栖攻击舰和海上补给舰队的部署，使中国人民解放军海军具备了全面的远洋作战能力。南海不再是需要防守的前沿阵地，而是可以进行洲际投射的集结地。"
 CHI_the_poly_compromise: "保利妥协"
 CHI_the_poly_compromise_desc: "为什么要为了粉饰太平而放弃巨额财富？保利集团源于总参谋部的军火贸易部门，它只是军队建立的众多帝国中规模最大的一个。我们拒绝江泽民的剥离方案：企业留存，走私留存，资金留存。解放军在改革之前就会变得富有，忠诚将通过金钱而非赢得获得。"
 CHI_The_Princeling_Network: "太子网络"
 CHI_The_Princeling_Network_desc: "我们的情报机构通过在朝鲜接受教育的平壤精英子女渗透到朝鲜人民军军官团中。这些在北京接受多年教育的“太子党”，是我们渗透朝鲜政权最可靠的杠杆。"
 CHI_the_pterodactyl_generation: "翼龙世代"
 CHI_the_pterodactyl_generation_desc: "翼龙系列武装无人机为空军提供了一种廉价、持久的侦察和打击猎手，也是一项旗舰出口产品，将中国空军力量带入了十几场海外战争。"
 CHI_the_quad_wedge_strategy: "四方楔形策略"
 CHI_the_quad_wedge_strategy_desc: "没有东京就没有四方安全对话，没有选择就没有东京。我们将悄悄地、双边地，在美国人没有被邀请的房间里，给他们提供选择。"
 CHI_the_quiet_dragons: "寂静之龙"
 CHI_the_quiet_dragons_desc: "在水下，噪音就是死亡，而我们的潜艇总是过早被发现。新一代095型攻击型潜艇以静音为核心设计理念，采用泵喷推进系统和更安静的反应堆，缩小了与美国猎手之间的差距。这些静谧的巨龙终于可以绕过岛链，在航母的领海中悄无声息地发起攻击。"
 CHI_the_rare_earth_lever: "稀土杠杆"
 CHI_the_rare_earth_lever_desc: "世界上大部分稀土资源都经手过我们手中。每一辆丰田普锐斯的发动机、每一套F-35战斗机的散热片组件、每一个iPhone扬声器，都离不开它们。控制权掌握在我们手中。"
 CHI_the_rcep_acceleration: "区域全面经济伙伴关系协定加速"
 CHI_the_rcep_acceleration_desc: "美国退出了跨太平洋伙伴关系协议，日本留了下来。区域全面经济伙伴关系协定将会签署，东京将与北京而非华盛顿并肩签署该协定。"
 CHI_the_renhai_cruiser: "刃海巡洋舰"
 CHI_the_renhai_cruiser_desc: "中国建造了其现代史上第一艘真正意义上的主力舰。055型巡洋舰，北约将其归类为巡洋舰，是一艘排水量达一万吨的隐形战舰，配备一百多个导弹发射单元，旨在领导航母战斗群并打击任何海上目标。到2022年，将有八艘055型巡洋舰完工，届时中国海军将拥有世界一流的水面作战能力。"
 CHI_The_Roh_Moohyun_Framework: "10.4宣言复兴"
 CHI_The_Roh_Moohyun_Framework_desc: "我们将重振《10月4日宣言》的精神，支持与朝鲜建立渐进式接触框架。联合农业项目、有限的旅游和有控制的跨境贸易可以在不设前提条件的情况下开展，我们将为朝朝合作敞开大门。"
 CHI_The_Sansha_Administrative_Upgrade: "三沙行政升级"
 CHI_The_Sansha_Administrative_Upgrade_desc: "位于西沙群岛永兴岛的三沙市，即我国的行政中心，其管辖范围将扩展至整个南沙群岛。这种以民事机构为框架的表述是经过精心设计的：市长、人口普查局和气象局等机构为这一实质上将争议礁盘永久纳入我国行政体系的行为提供了政治掩护。"
 CHI_The_Scarborough_Model: "黄岩岛模式"
 CHI_The_Scarborough_Model_desc: "黄岩岛的对峙为我们提供了一种可重复使用的方法：渔船遭遇升级为海岸警卫队对抗，对方在压力下撤退，并在任何第三方介入之前建立永久性存在。现在，我们将系统地把这种模式应用于所有剩余的争议岛礁。"
 CHI_The_Sea_Within_The_Sea: "海中之海"
 CHI_The_Sea_Within_The_Sea_desc: "南海四周以第一岛链为界，该岛链由陆地和礁石组成，从日本经菲律宾延伸至马来西亚。通过军事存在、经济一体化和领土决定，南海已完全纳入我国的行政管辖范围。九段线不再是主张，而是边界。承载着世界三分之一贸易的海上航线如今穿过我国依法管辖的水域，我国海警和海军从西沙群岛到南沙群岛持续进行主权巡逻。"
 CHI_the_securitate_restructured: "秘密警察重组"
 CHI_the_securitate_restructured_desc: "借鉴王立军在重庆的创新经验，内部安全部门按照全面国家保护体系进行重组。信号情报、线人网络和法律强制手段被整合到统一指挥之下。任何危害人民国家的阴谋都逃不过侦查。"
 CHI_the_self_reliant_path: "自力更生之路"
 CHI_the_self_reliant_path_desc: "每一台进口发动机都是一条枷锁。我们选择走自力更生这条艰难的道路，投入大量资源建立自己的设计局，接受多年性能落后的飞机，只为让下一代不再依赖任何外国供应商。一支无法自主制造机翼的空军，永远无法真正自由。"
 CHI_the_senkaku_crisis: "钓鱼岛纷争"
 CHI_the_senkaku_crisis_desc: "多年来，我们一直在试探日本的防空系统，并跟踪其海岸警卫队。下一次挑衅，我们将无法否认。海岸警卫队巡逻艇并非军舰，除非它本身就是军舰。"
 CHI_The_Seoul_Gambit: "首尔赌局"
 CHI_The_Seoul_Gambit_desc: "我们经过深思熟虑后认为，与首尔建立更深层次的关系，比无限期地承诺与平壤合作，更能带来持久的安全保障。将韩国视为战略伙伴而非敌对邻国，这与我们数十年来奉行的对韩政策截然不同，绝非儿戏。"
 CHI_the_shanghai_succession: "上海继承人"
 CHI_the_shanghai_succession_desc: "江泽民将正式领导权移交给胡锦涛，同时确保上海家臣掌控政治局常委。通过保留中央军委主席一职，他得以对新领导层保持最终控制权，并巩固了有利于太子党阵营的派系平衡。权力交接完成，但并未真正交出。"
 CHI_the_shanghai_succession_tt: "这将使§Y胡锦涛§!在§Y$CHI_16_national_congress_mission$§!成为§Y中国共产党最高领导人§!和§Y国家领导人§!。"
 CHI_the_sharp_blade: "利刃"
 CHI_the_sharp_blade_desc: "下一场战争的胜负可能在数小时内决定，而非数月。我们选择锋利的利刃：轻型、空中机动和特种部队，先发制人，远距离打击，在守军反应过来之前夺取机场、港口和首都。速度成为我们最强大的武器。"
 CHI_the_sharp_sword_doctrine: "利剑学说"
 CHI_the_sharp_sword_doctrine_desc: "隐身技术并非战斗机的专属。攻击-11“利剑”是一款飞翼式战斗无人机，它体现了一种渗透性无人打击的作战理念，这种无人机被派往有人机队之前，在无需飞行员冒险的情况下发现并摧毁敌方防御系统。"
 CHI_the_soaring_dragon: "翔龙"
 CHI_the_soaring_dragon_desc: "无侦-7“翔龙”是一款高空长航时无人机，其独特的连体机翼使其能够连续数日在海上巡逻，为打击网络提供对中国意图控制的海域的持续监视。"
 CHI_the_sovremenny_bridge: "现代桥"
 CHI_the_sovremenny_bridge_desc: "在我们自己的船厂能够建造所需舰艇之前，我们只能购买。上世纪90年代末，我们从俄罗斯购买了四艘956E和956EM型“现代”级驱逐舰，每艘都配备了专为摧毁美国航母而设计的超音速“蚊子”反舰导弹。它们是连接过去与未来的桥梁，是在我们国内舰队尚处于萌芽阶段时购入的现代化火力。"
 CHI_The_Spirit_Of_Zheng_He: "郑和之魂"
 CHI_The_Spirit_Of_Zheng_He_desc: "六百年前，郑和率领的宝船队从南京启航，七次远航至波斯湾和东非沿岸。他们带来的不是征服，而是丝绸、瓷器和文明交流的准则。海上丝绸之路是这一传统的现代继承者，我们与东南亚的交往也将秉承这一精神。"
 CHI_the_surface_capital_fleet: "水面主力舰"
 CHI_the_surface_capital_fleet_desc: "看不见的力量无法给人留下深刻印象，而我们决心要让世人看见。舰队以航母和055型巡洋舰为核心，组成均衡的战斗群，能够航行于任何大洋，在任何海域掌控局势。一支强大的水面舰队在遥远的港口展示旗帜，正是中国崛起为海上强国的有力证明。"
 CHI_the_tanker_gap: "缩小油箱差距"
 CHI_the_tanker_gap_desc: "航程是空军由来已久的弱点。由于加油机数量不足，我们的战斗机无法在远离本土的海域盘旋，因此我们扩充了空中加油机队，以使打击编队能够抵达远海并驻扎在那里。"
 CHI_The_THAAD_Response: "萨德回应"
 CHI_The_THAAD_Response_desc: "在韩国部署“萨德”反导系统削弱了我们的核威慑能力。我们将采取经济胁迫措施：限制旅游、抵制韩国娱乐产品，并向在我国经营的韩国企业施压，直到首尔重新考虑其欢迎韩国企业的做法。"
 CHI_the_three_represents: "三个代表"
 CHI_the_three_represents_desc: "江泽民对党的理论贡献在于，他认为中国共产党必须代表先进的生产力、先进的文化和人民的最广泛利益。通过接纳私营企业家和资本家加入党，我们扩大了统治的社会基础，使其超越了工人和农民，党才能长久存在。"
 CHI_the_tokyo_communique: "东京公报"
 CHI_the_tokyo_communique_desc: "今天的公报篇幅将比2008年的文本短，但意义却更重大。对历史的不同看法是一种外交辞令，意味着我们将不再赘述。"
 CHI_The_Treasure_Fleet_Returns: "宝船舰队归来"
 CHI_The_Treasure_Fleet_Returns_desc: "“一带一路”倡议将其海上部分延伸至东南亚。港口特许权、渔业协议和天然气平台合资项目等机会被提供给声索国。每一项达成的协议都使合作伙伴更紧密地融入中国的经济体系，并削弱了对抗的吸引力。"
 CHI_the_type_075_yushen: "075型玉申"
 CHI_the_type_075_yushen_desc: "海军陆战队获得了一艘平顶旗舰。075型“玉申”是一艘排水量四万吨的直升机突击舰，它能搭载一个旅及其武装直升机越过地平线，并同时进行海空两栖登陆。它是这支旨在夺取并守住远海阵地的两栖作战群的核心。"
 CHI_the_type_901: "901型和吉布提生命线"
 CHI_the_type_901_desc: "远洋舰队的生死存亡取决于其补给线。快速的901型战斗支援舰体型庞大、速度迅捷，足以跟上航母战斗群的步伐，使舰队能够远离本土在海上作战。2017年，中国在吉布提开设了首个海外基地，这条永久性的生命线将海军牢牢地锚定在印度洋。"
 CHI_the_varyag_refit: "瓦良格号改装"
 CHI_the_varyag_refit_desc: "一艘锈迹斑斑的苏联时期舰体，竟成了航母舰队的雏形。这艘名为“瓦良格”号的未完工舰艇于1998年从乌克兰购得，并于2002年被拖至大连。经过十余年的重建，它于2012年正式服役，更名为“辽宁”号。与其说它是一艘战舰，不如说它是一艘训练舰。然而，在这艘舰艇的甲板上，一支没有航母作战传统的海军，正一架架飞机地学习如何从海上起飞作战。"
 CHI_the_yasukuni_protest_doctrine: "靖国神社抗议学说"
 CHI_the_yasukuni_protest_doctrine_desc: "日本首相向甲级战犯的名字鞠躬，并非是在缅怀先祖，而是在为下一场战争做准备。我方大使将返回北京，直至另行通知。"
 CHI_the_yuan_and_the_shang: "元与商"
 CHI_the_yuan_and_the_shang_desc: "潜艇部队告别了柴油时代。039型“元”级潜艇是一款不依赖空气的柴电潜艇，可以在近海静默潜伏数周；而093型“商”级核动力潜艇则为舰队带来了第一艘真正意义上的远洋攻击潜艇。这些静默的猎手成为了海军最锋利的利器。"
 CHI_the_yuzhao_pathfinders: "玉洲探路者"
 CHI_the_yuzhao_pathfinders_desc: "两栖作战力量的投射始于舰体和旅级部队。2000年代设计的071型玉洲两栖登陆舰，为海军提供了一艘真正的远洋两栖舰艇，首批专门的海军陆战队旅级部队也正是在此舰上组建。这支未来远征军的先遣部队，已驶向大海。"
 CHI_theaterization_of_command: "战区空军司令部"
 CHI_theaterization_of_command_desc: "飞机必须服从战区指挥，而不是服从单独的军种指挥体系。空军司令部已并入五个联合战区司令部，因此战斗机、轰炸机和无人机与陆军和海军部队在同一指挥官的指挥下作战，作为一个整体战役而非三个独立的战役。"
 CHI_three_gorges_completion: "三峡工程竣工"
 CHI_three_gorges_completion_desc: "由孙中山提出、毛泽东大力推进的长江三峡大坝现已竣工。这座拥有32台涡轮机、装机容量达22.5吉瓦的水电站，是世界上最大的水电站。该项目导致140万人迁离，两千多处考古遗址被淹没，但其带来的益处却是实实在在的：防洪、改善航运，以及显著提升中国中西部地区的可再生能源发电量。"
 CHI_three_noc_overseas: "三桶油出国"
 CHI_three_noc_overseas_desc: "中石油、中石化和中海油是我们“走出去”战略的三大支柱。中石油通过大尼罗河石油作业公司在苏丹进行钻探，收购了哈萨克斯坦石油公司，并与俄罗斯石油公司签署了一项价值250亿美元的石油贷款协议。中石化收购了阿达克斯石油公司，获得了安哥拉、尼日利亚和库尔德斯坦地区的生产许可证。中海油在竞购优尼科失败后，成功收购了加拿大尼克森公司。随后，中海油又收购了委内瑞拉国家石油公司和巴西石油公司。每一次收购都是确保我们能源供应的链条上的一环。"
 CHI_three_red_lines_crackdown: "房地产融资打击行动"
 CHI_three_red_lines_crackdown_desc: "监管机构对房地产开发商设定了三项严格的比率限制：负债资产比低于70%，净负债权益比低于100%，现金短期债务比高于100%。恒大集团总负债超过3000亿美元，违反了所有三项限制，最终破产，被香港法院清算。排名前30的开发商中，超过70%进入重组程序。这项政策将系统性金融风险与银行业隔离开来，但代价是建筑活动和地方政府收入大幅下降。代价固然高昂，但如果不这样做，我们将面临无法控制的危机蔓延。"
 CHI_three_represents_codified: "三个代表法典化"
 CHI_three_represents_codified_desc: "私营企业家被允许加入党。上海修正案被写入宪法。江泽民的政治遗产被正式记录在案。"
 CHI_tiangong_station: "天宫空间站"
 CHI_tiangong_station_desc: "天宫空间站的天河核心舱于2021年4月发射升空，随后问天和梦天科学舱于2022年发射升空。中国现在拥有一个完全独立于国际空间站的永久性载人轨道实验室，定期有宇航员驻留六个月，并开展不断扩大的微重力研究项目。"
 CHI_tianwen_interplanetary: "天问行星际探测器"
 CHI_tianwen_interplanetary_desc: "天问一号于2020年7月发射，一次任务便完成了入轨、大气层重返和火星表面着陆，并于2021年5月将祝融火星车送至乌托邦平原。中国成为继美国之后第二个成功在火星上运行火星车的国家。此次任务验证了深空导航、自主避障和高增益通信中继等技术，这些都是载人火星探测任务（超越地月空间）的重要先决条件。"
 CHI_Tianxia_Realized: "溥天之下"
 CHI_Tianxia_Realized_desc: "在达沃斯，我们阐述了一个愿景：构建一个开放、包容的全球秩序，以多边机构和共同繁荣为基础，构建人类命运共同体。如今，这一愿景的实现并非依靠强制，而是依靠经济力量的积累。全球发展倡议、亚洲基础设施投资银行以及高质量的“一带一路”合作，已将国际社会纳入一个承认我们自身利益核心地位的框架。我们所引领的世界选择了追随这一框架。"
 CHI_tiger_and_flies: "虎与蝇"
 CHI_tiger_and_flies_desc: "反腐运动的目标既包括党内高层，也包括基层小职员。前政治局常委周永康被判处无期徒刑；薄熙来也败在他手下。目前已有超过两百万名官员受到调查和惩处。这场运动既是真正的治理改革，也是瓦解敌对政治网络的手段 - 我们现在绝不能停止这场运动。"
 CHI_Tonga_Tuna_Concession: "太平洋渔业特许权"
 CHI_Tonga_Tuna_Concession_desc: "与汤加、瓦努阿图和斐济签订的独家准入协议赋予我们的远洋捕捞船队在中西太平洋广阔的专属经济区内享有优先捕捞权。作为交换，我们资助港口升级、冷藏设施建设和海上监视能力建设，这使得受援国政府长期依赖我们的基础设施。这些渔业协议是我们更广泛的太平洋合作中最具经济意义的部分。"
 CHI_train_as_you_fight: "训练即战斗"
 CHI_train_as_you_fight_desc: "阅兵式演练赢得阅兵式，却赢不了战争。训练围绕真实的作战环境进行重建，在朱日和训练基地设有自由演练和专门的假想敌部队，以惩罚过去人为设定的胜利。"
 CHI_train_generals: "训练将领"
 CHI_train_generals_desc: "纸上谈兵的改革，如果没有真正理解其意义的指挥官，终将付诸东流。我们的军校必须进行改革，培养精通联合作战和信息时代指挥的军官，淘汰那些无法洞悉现代战争的政治任命人员。"
 CHI_TwentyFive_Year_Iran_Accord: "中伊伙伴关系25年"
 CHI_TwentyFive_Year_Iran_Accord_desc: "我们的全面战略伙伴关系协议承诺在未来25年内向伊朗的基础设施、能源和制造业投资4000亿美元，以换取折扣石油供应。该协议在美国制裁下为德黑兰提供了一条生命线，也让我们获得了折扣油气资源和在波斯湾的前沿地位。华盛顿、特拉维夫和海湾君主国将该协议视为对其地区安全考量的直接威胁。那就让他们这么想吧。"
 CHI_two_centeraries: "第十九次共产党代表大会"
 CHI_two_centeraries_desc: "中共十九大将《习近平新时代中国特色社会主义思想》写入党章，而习近平本人至今仍然在世，这是毛泽东之后上一次有如此殊荣。“两个百年”目标为我们描绘了蓝图：到2021年建成小康社会，到2049年建成社会主义全面发展国家。国家未来三十年的发展轨迹已经确定，各机构的资源必须按照这一方向进行配置。"
 CHI_two_establishments: "两个确立"
 CHI_two_establishments_desc: "“两个确立”理论确立了习近平同志在中共中央的核心地位和习近平思想在党内生活中的指导作用。集体领导不是被废除，而是被重新定义：常委会进行审议，但方向由一人决定。全党作为一个整体前进，而这个整体有一个中心。"
 CHI_two_ocean_fleet: "两洋舰队"
 CHI_two_ocean_fleet_desc: "仅凭深海或甲板都无法满足中国目前的战略目标。我们将静默的潜艇部队和引以为傲的水面舰队融合为一支能够同时在太平洋和印度洋作战的单一海军，既能掌控近海，又能远航远洋。刘华清继承的这支海卫队，正在崛起一支真正的远洋力量，其规模仅次于其他国家，并且正在迅速逼近。"
 CHI_two_reaffirmations: "两次重申"
 CHI_two_reaffirmations_desc: "党重申两项基本承诺：忠于毛泽东思想确定的社会主义道路，坚持群众路线作为党的正确领导方式。这些不是口号，而是防止右倾的结构性保障，正是右倾使得不平等和腐败从内部掏空了革命。"
 CHI_type_15_light_tank: "15式轻型坦克"
 CHI_type_15_light_tank_desc: "重型装甲车辆在青藏高原上寸步难行，也无法跨越南方的桥梁。ZTQ-15轻型坦克重30吨，配备一门威力强大的105毫米火炮，为快速反应部队提供了真正的装甲保障，使其能够抵达99式坦克无法到达的区域。如今，它正沿着喜马拉雅山脉的边境线与印度对峙。"
 CHI_type_95_adoption: "采用95式"
 CHI_type_95_adoption_desc: "QBZ-95是一款5.8毫米口径的无托步枪，于上世纪90年代末期列装，取代了老旧的81式步枪，使步兵部队统一使用国产弹药。它的确存在一些缺陷，但它让每位士兵都拥有了一支现代化的国产步枪。"
 CHI_ultra_low_emission: "超低排放标准"
 CHI_ultra_low_emission_desc: "生态环境部和工信部已发布标准，要求烧结厂、焦化厂和钢铁厂的排放阈值必须高于欧洲标准。超过80%的大型综合钢铁企业正在完成改造。这项改革以永久性清洁空气基础设施取代了以往在政治活动期间（例如APEC会议期间、阅兵期间）全面关闭工厂的做法。我们不应再为了特定场合而清理天空，而应始终保持天空清洁。"
 CHI_underground_great_wall: "地下长城"
 CHI_underground_great_wall_desc: "我们在群山之下挖掘地下长城，绵延数千公里的坚固隧道隐藏并掩护着我们的部队和导弹。找不到的东西就无法摧毁，而埋藏的军火库则确保任何先发制人的打击都会得到回应。"
 CHI_undersea_supremacy: "海底霸权"
 CHI_undersea_supremacy_desc: "我们将主宰深海而非海面。舰队的首要任务是潜艇：核动力猎手用来摧毁航母，弹道导弹潜艇用来威胁世界，以及一堵由静默潜艇组成的防线，将第一岛链变成陷阱。任凭对手在海面上炫耀他们庞大的舰队吧；我们将掌控他们水下的水域，让他们无法染指海洋，甚至无需显露桅杆。"
 CHI_Unification_Ultimatum: "半岛统一最后通牒"
 CHI_Unification_Ultimatum_desc: "随着北京和华盛顿结盟，现在是时候让平壤做出选择了：要么接受首尔领导下的和平统一，要么承受中美韩三国军队的联合打击。这一最后通牒将以某种方式终结朝鲜半岛问题。"
 CHI_Vision_2030_Partnership: "2030愿景投资伙伴关系"
 CHI_Vision_2030_Partnership_desc: "沙特阿拉伯的“2030愿景”多元化发展议程，以及我们对海湾地区资本和合同业务的需求，促成了一项涵盖清洁能源、旅游基础设施和先进制造业的广泛合作。我们的公司赢得了NEOM和红海地区的大型项目合同，同时我们也获得了优先原油供应和不断扩大的人民币结算份额。这项安排赋予了利雅得战略选择权，而无需正式摆脱其对华盛顿的安全依赖。"
 CHI_wanhua_strategic_materials: "战略材料清单"
 CHI_wanhua_strategic_materials_desc: "工信部公布了一份约130种我们仍依赖进口的化工原料清单。其中，光刻胶、聚酰亚胺薄膜、T800及以上高强度碳纤维以及MDI和TDI聚氨酯最为关键。烟台万华化工通过逆向工程从三井物产获得MDI技术，并收购了匈牙利博尔索德化学公司，打破了拜耳、巴斯夫和亨斯迈三家公司对聚氨酯的垄断。威海广维复合材料、吉林碳谷和中石化上海石化正在建设用于风力涡轮机叶片和航空航天复合材料的碳纤维产能。每一项替代措施都降低了我们对外国出口管制的依赖程度。"
 CHI_warlord_temptation: "军阀的诱惑"
 CHI_warlord_temptation_desc: "一支为金钱服务的军队，很容易沦为自身利益的驱使。当各路将领掌控了领土、财政收入和忠诚的军队后，这些大将们便会步入中国历史上最古老的危机：军队凌驾于中央之上，将军凌驾于中央之上；共和国也因此滑向军阀割据的时代。"
 CHI_water_security_initiative: "国家水安全倡议"
 CHI_water_security_initiative_desc: "自2002年以来，中国通过南水北调工程着手解决南水资源不平衡问题。该工程是迄今为止规模最大的跨流域调水工程，将长江流域的水输送到干旱的黄河流域和首都地区。在此基础上，国家水安全建设进一步加强，将大规模基础设施建设与省级节水项目相结合，重点关注北方最缺水地区。这些项目的逐步完成将逐步缓解国民经济面临的水资源短缺问题。"
 CHI_weqi_pipeline_lines: "西气东输天然气管道"
 CHI_weqi_pipeline_lines_desc: "西气东输工程通过一条4000公里长的主干线将新疆塔里木盆地与上海连接起来，第二条管道经霍尔果斯向东输送土库曼斯坦的天然气，第三条管道则经吉尔吉斯斯坦从土库曼斯坦向东输送天然气。西伯利亚力量管道是根据与弗拉基米尔·普京签署的30年期、年输气量380亿立方米的合同建设的，目前将黑龙江的天然气直接输送到我们的东部电网。中石油和中国石油负责整个管道的建设和运营。任何控制了这条管道基础设施的国家都无法被能源禁运所扼杀。"
 CHI_west_east_gas_pipeline: "东西向天然气管道西气东输天然气管道"
 CHI_west_east_gas_pipeline_desc: "西气东输管道全长4000公里，从新疆塔里木盆地延伸至上海，于2004年建成通车。它为中国东部工业区输送天然气，减少了对煤炭的依赖，加快了新疆油气资源的商业化开发。"
 CHI_western_development_strategy: "西部大开发战略"
 CHI_western_development_strategy_desc: "“西部大开发”计划将优惠投资、税收减免和基础设施建设加速推进至西部十二个省和自治区。我们正在缩小沿海与内陆差距，深化与中亚和南亚的融合，在竞争对手填补经济空白之前，将周边地区纳入我们的经济核心。"
 CHI_western_energy_strategy: "西部能源开发"
 CHI_western_energy_strategy_desc: "中国西部省份拥有全国最大的煤炭、天然气和水力资源储量。一项协调发展战略将资源开采与沿海工业中心地带联系起来，从而降低对能源进口的依赖，并将经济活动扩展到内陆地区。"
 CHI_western_industrial_drive: "西部工业发展导向"
 CHI_western_industrial_drive_desc: "国务院已批准169个省级工业园区升级为国家级经济技术开发区，其中大部分位于欠发达的西部省份。对云南、贵州和川西的优先投资正逐步缩小与沿海地区的收入差距，并为内陆大规模制造业发展奠定物流先决条件。西部地区已经等待了太久。"
 CHI_western_institutional_engagement: "西方机构参与"
 CHI_western_institutional_engagement_desc: "曾庆红主张，在国际秩序规则尚未完全确立之际，深化与西方主导的多边机构的合作是确保我国在国际秩序中地位的最佳途径。我们力促扩大国际货币基金组织的份额，推动国有企业采用国际财务报告准则，并增加在世界银行理事会的席位。与其置身事外，不如从内部参与构建国际秩序。"
 CHI_western_pipeline_corridor: "东西向天然气管道西气东输天然气管道"
 CHI_western_pipeline_corridor_desc: "西气东输管道全长4000公里，从新疆塔里木盆地出发，途经甘肃、陕西和长江三角洲，最终抵达上海。建成后，它将取代长江三角洲工业中的煤炭，减少困扰沿海富裕城市的颗粒物污染，并将西部的资源与东部的发展紧密联系起来。"
 CHI_Win_Win_Cooperation: "共享未来的共同体"
 CHI_Win_Win_Cooperation_desc: "在国际社会对“债务陷阱融资”的批评日益高涨之后，我们改革了贷款条款，引入了优惠利率、本地化劳动力要求和债务可持续性评估。“互利共赢”的框架将“一带一路”重新定位为促进共同发展的工具，而非战略杠杆，这使得批评者的论点难以站得住脚。"
 CHI_Wolf_Warrior_Diplomacy: "战狼外交"
 CHI_Wolf_Warrior_Diplomacy_desc: "我们将采取强硬、对抗性的外交姿态。我们的外交官将积极捍卫我们的利益，并挑战一切西方叙事。我们的目标很明确：取代美国成为全球主导力量。"
 CHI_wolf_warrior_doctrine: "战狼外交"
 CHI_wolf_warrior_doctrine_desc: "我国外交部出现了一种新的强硬外交风格。我们的大使公开抨击外国批评者；国家发言人以虚伪和恶意回应批评。这种做法摒弃了邓小平的“韬光养晦”的策略，转而采取直接对抗。我们不再道歉，世界也开始明白这意味着什么。"
 CHI_ws15_bottleneck_solve: "打破WS-15瓶颈"
 CHI_ws15_bottleneck_solve_desc: "喷气发动机是中国战斗机发展至今遇到的最大瓶颈，迫使我们最先进的战机不得不依赖俄罗斯的涡轮发动机。WS-15涡扇发动机旨在打破这种依赖，并为歼-20提供其设计之初就具备的超音速巡航推力。掌握单晶涡轮叶片的性能是实现这一目标的最后一步。"
 CHI_wto_accession_drive: "加入世贸组织进程"
 CHI_wto_accession_drive_desc: "经过十五年的谈判，我们即将正式加入世界贸易组织。加入世界贸易组织将巩固我们的贸易自由化改革成果，为我们的出口打开海外市场，并加速工业技术的转移。"
 CHI_wto_commercial_bank_reform: "世界贸易组织商业银行法改革"
 CHI_wto_commercial_bank_reform_desc: "加入世贸组织意味着我们承诺向外国银行开放金融领域，朱镕基总理已启动三步改革，以确保在最后期限到来之前完成改革。资产管理公司吸收数千亿元不良贷款；中央汇金投资利用外汇储备注入资金；四大银行在海外交易所上市以维持市场纪律。《商业银行法》的修订将四大银行从政治信贷工具转变为正式的商业机构，这一区别在外国银行进入市场参与竞争时至关重要。"
 CHI_wto_implementation: "世贸组织实施"
 CHI_wto_implementation_desc: "加入世贸组织使我们承诺在多年内逐步降低关税、推进知识产权改革、开放服务业并取消国家贸易特权。尽管执行情况参差不齐，且经常在争端解决机构遭到贸易伙伴的质疑，但这一进程已使我们深度融入全球供应链，而这种融入既是我们的义务，也是我们的武器。"
 CHI_wto_implementation_tt: "如果我们完成§Y$CHI_wto_accession_drive$§!，加成将会增益并且永久存在"
 CHI_wuhan_automotive_hub: "武汉汽车中心"
 CHI_wuhan_automotive_hub_desc: "总部位于武汉的东风汽车公司扩大了与标致雪铁龙、日产和本田的合资业务。武汉成为中国中部地区的汽车之都，并聚集了长江沿岸的众多零部件供应商和物流企业。"
 CHI_xi_jinping_thought_enshrined: "习近平思想的传承"
 CHI_xi_jinping_thought_enshrined_desc: "习近平思想已从政策指导提升为宪法教义，成为全国高校、军事院校和党校的必修课。《学习强国》应用程序安装在数亿部手机上，并被监控每日使用情况。异议不再仅仅是不受欢迎，而是被官方认定为偏离既定真理。国家意识形态架构与习近平的名字已密不可分。"
 CHI_xinjiang_industrial_zones: "新疆工业发展"
 CHI_xinjiang_industrial_zones_desc: "乌鲁木齐和塔里木盆地的特殊工业区吸引了汉族移民、加工业和资源开采投资。这些工业区旨在将新疆经济与东部工业基地连接起来，并降低其对传统农业的依赖。"
 CHI_y20_strategic_lift_program: "运-20战略运输计划"
 CHI_y20_strategic_lift_program_desc: "一个大国必须具备机动能力。运-20“鲲鹏”重型运输机自2016年服役以来，终于使中国具备了跨洲调动部队、装甲车辆和援助物资的空运能力，而其加油机和指挥机型号则成倍扩大了整个空军的作战范围。"
 CHI_Yangtze_confederation: "长江经济联盟"
 CHI_Yangtze_confederation_desc: "长江流域 - 从重庆经湖北、湖南直至上海入海口 - 是中国的工业核心地带。在协调规划下，建立这些省份的正式经济联盟，将有助于消除重复投资，整合供应链，并将重庆模式推广至全国最具生产力的走廊地带。"
 CHI_yangtze_delta_integration: "长江三角洲一体化"
 CHI_yangtze_delta_integration_desc: "上海、江苏和浙江三国协同投资，进一步巩固了长江三角洲作为我国首要制造业和出口走廊的地位。外资和高技能劳动力的聚集将为未来十年经济增长提供强劲动力。"
 CHI_yangtze_logistics_corridor: "长江物流走廊"
 CHI_yangtze_logistics_corridor_desc: "长江的货运量超过世界上任何其他内河航道。对港口基础设施、航道改善和多式联运码头的投资，将长江融入国家供应链，使四川与上海之间的航运成本远低于公路运输。"
 CHI_yj12_standoff_family: "鹰击-12战区外家族"
 CHI_yj12_standoff_family_desc: "鹰击-12导弹为我方飞机提供了一种超音速掠海反舰导弹，其接近速度之快，令大多数防御系统难以应对。挂载于轰炸机和战斗机下方，它使中国海岸线数百公里内的所有军舰都面临威胁。"
 CHI_youth_league_pipeline: "共青团人才培育计划"
 CHI_youth_league_pipeline_desc: "共青团是胡锦涛派系的主要人才库。共青团出身的官员占据了省级书记的大部分职位，并在中央中层部委中占据主导地位，形成了一个遍布全国、拥有共同组织经验的官员网络。那些在共青团体系内晋升的人，其晋升都得益于这一体系。"
 CHI_yuan_internationalisation: "人民币国际化"
 CHI_yuan_internationalisation_desc: "全球金融危机暴露了美元的脆弱性，也为我们提供了契机。与数十家央行签署的双边货币互换协议、在香港和新加坡设立的离岸人民币清算中心，以及点心债券市场，都使人民币首次实现了大规模的国际流通。美元的储备溢价不会永远持续下去。"
 CHI_yuanhua_model: "远华模式"
 CHI_yuanhua_model_desc: "赖昌星展示了这种走私方式。上世纪90年代，他旗下的远华集团从厦门走私了价值约100亿美元的石油、汽车和香烟，每当海关关闭时，总会有一位权势显赫的官员现身，放他们走私。我们可以把这种模式看作是一个体系：军方庇护走私者，走私者则向军方支付费用。"
 CHI_yuzhao_hull_coral_brigades: "玉洲水兵和岛礁旅"
 CHI_yuzhao_hull_coral_brigades_desc: "两栖作战的雄心壮志从探路者转向舰队。071型两栖船坞登陆舰投入批量生产，海军陆战队规模也从两个旅扩充至六个旅，专门负责南海争议礁石和岛屿的作战。水兵旅和岛礁旅合并，最终形成一支能够夺取海岸线的强大力量。"
 CHI_zb108_wheeled_family: "08式轮式家族"
 CHI_zb108_wheeled_family_desc: "8x8 08式系列车辆，从步兵战车到突击炮再到救护车，为中型旅提供了一种单轮底盘，该底盘在道路上行驶速度快，运行成本低，是中国快速部署部队的移动核心。"
 CHI_zbd04_apex_ifv: "ZBD-04A装甲多用途车"
 CHI_zbd04_apex_ifv_desc: "ZBD-04A是陆军最先进的履带式步兵战车，配备一门100毫米火炮发射器、一门30毫米火炮和一个完整的步兵班，并由装甲保护。它是重型机械化旅的骨干力量，也是中印战线上99式坦克的搭档。"
 CHI_zbd_mechanisation: "ZBD机械化"
 CHI_zbd_mechanisation_desc: "步兵必须跟上装甲部队的步伐。履带式ZBD战车系列将步兵运送到装甲部队下方，与坦克并肩作战，从而完成了重型旅的机械化。"
 CHI_zeng_qinghong_reign: "曾庆红时代"
 CHI_zeng_qinghong_reign_desc: "曾庆红是上海帮的首席战略家，担任中央党校副校长兼中央党校校长。他对中央组织部和中央书记处的掌控，使他对党国机关各级的人事任命拥有决定性的影响力。凡是他安插的人，都由他掌控。"
 CHI_zero_hour: "零时"
 CHI_zero_hour_desc: "多年来，军队一直在训练、整装待发，现在是时候将一切投入实战了。我们的步兵将以任何防线都无法阻挡的兵力发起进攻，我们的装甲纵队将组成纵深无阻的阵型，而战略火箭部队则在发射井中严阵以待，这是我们绝不打算被迫使用的论据。从此刻起，中国人民解放军不再为下一场战争做准备，而是开始预料到它的到来，每一项命令最终都将服从于同一个意志。"
 CHI_ztz96_mainstreaming: "96式进入主流"
 CHI_ztz96_mainstreaming_desc: "并非每个旅都需要昂贵的99式坦克。更便宜、更轻便的ZTZ-96坦克被批量生产，并不断升级为96A和96B型，成为装甲部队的主力坦克。"
 CHI_ztz99_rollout: "推出99式"
 CHI_ztz99_rollout_desc: "ZTZ-99主战坦克成为重型坦克旅的先锋，这是一款采用复合装甲、配备125毫米火炮和激光防御系统的第三代主战坦克。它是中国第一款旨在与西方和俄罗斯最先进坦克匹敌的坦克。"
 CHI_ztz99a_apex: "99A衍生型"
 CHI_ztz99a_apex_desc: "ZTZ-99A于2011年开始服役，是该系列坦克的巅峰之作：更厚的装甲、升级的发动机、猎杀型瞄准镜以及完整的作战管理系统，使其成为旅级作战网络中的一个节点。它是陆军所能打出的最强劲的拳头。"
 arctic_observer_status: "北极观察员状态"
 arctic_observer_status_desc: "我们在北极理事会的席位和我们的极地丝绸之路基础设施，为北极地区开辟了新的航运路线和资源前沿。"
 CHI_610_directive_active: "610东北指令"
 CHI_610_directive_active_desc: "中共东北军区已启动紧急动员机制。鸭绿江沿岸安全部队得到加强，省级政府部门也已扩大紧急权力。"
 CHI_aiib_dividend_member: "亚投行分红会员"
 CHI_aiib_dividend_member_desc: "作为亚洲基础设施投资银行的创始成员，我们获得了稳定的收益。投资回报以及与中国融资项目相关的优惠贸易条款，都增强了我们的资产负债表。"
 CHI_anti_corruption_purge: "反腐败清洗"
 CHI_anti_corruption_purge_desc: "中央纪委每年处理数千起案件。采购、建设和国有企业管理中的贪污腐败行为被揭露并予以惩处。那些曾经从每份合同中牟利的官员发现，政治博弈的格局已经改变。随着裙带关系网络被瓦解，直接问责制被取代，国家职能部门的产出水平也随之提高。"
 CHI_anti_terror_crackdown_idea: "反恐镇压"
 CHI_anti_terror_crackdown_idea_desc: "安全部门正在全国范围内开展打击恐怖网络的行动。侦查能力得到提升，但政治精力也全部投入到打击行动中。"
 CHI_army_reorganisation_disruption_idea: "军队重组"
 CHI_army_reorganisation_disruption_idea_desc: "13个集团军重新整编，并以合成旅为核心进行重组。重组期间，部队的组织性和进攻能力受到影响，训练也出现滞后。但新结构稳定后，陆军将比以往更加精简高效。"
 CHI_asian_century_concord_idea: "亚洲世纪协调"
 CHI_asian_century_concord_idea_desc: "北京和新德里已同意在区域和全球事务上进行协调，将21世纪定义为亚洲共同塑造的世纪。"
 CHI_AUS_pacific_deterrence: "增强太平洋威慑力"
 CHI_AUS_pacific_deterrence_desc: "中国在南太平洋的军事部署压力迫使澳大利亚皇家海军紧急扩大其行动范围。新型传感器、更精准的情报和准备就绪的两栖作战力量已随时待命。"
 CHI_ban_strategic_partnership: "与北京的战略伙伴关系"
 CHI_ban_strategic_partnership_desc: "孟加拉国在多边论坛上采取与中国一致的外交政策立场。"
 CHI_banking_modernised_idea: "资本重组后的银行业"
 CHI_banking_modernised_idea_desc: "国有银行已清除不良贷款，并在香港交易所上市，外资少数股东也已加入。国际会计准则、外部审计和市场纪律提高了该行业的效率和信誉。"
 CHI_beidou_global_constellation: "北斗全球定位系统"
 CHI_beidou_global_constellation_desc: "随着地面站部署在拉丁美洲各地，北斗卫星网络现已实现全球全面覆盖。海军作战、侦察和反情报行动均受益于其精准性和覆盖范围。"
 CHI_beijing_communique_guarantor: "北京公报的担保人"
 CHI_beijing_communique_guarantor_desc: "中国在斡旋两个地区宿敌之间和平方面发挥的作用，提升了其作为负责任大国的地位。外交资源得以自由流动，关系也更容易维系。"
 CHI_blue_national_soil: "蓝色国土"
 CHI_blue_national_soil_desc: "中国官方理论将九段线内的海域划定为“蓝色国土”：海洋领土与陆地省份一样不可分割。这种定义使得任何让步在政治上都成为不可能，并将任何外国存在都重新定义为侵犯。"
 CHI_blue_national_soil_militarised: "蓝色国土军事化"
 CHI_blue_national_soil_militarised_desc: "最初作为一项行政原则，如今已演变为一种行动态势。中国人民解放军海军和海警船队现在积极维护“蓝色国土”主张，将外国船只的入侵行为视为违反中国国内法。"
 CHI_bo_ideological_consolidation: "巩固意识形态"
 CHI_bo_ideological_consolidation_desc: "一场意识形态澄清运动强化了党的社会主义立场，并遏制了右倾趋势。学习会、整顿会议和修订后的教育课程将这两项重申融入到国家机器的各个层面。"
 CHI_bri_forum_momentum: "“一带一路”论坛势头"
 CHI_bri_forum_momentum_desc: "每三年一次的“一带一路”国际合作高峰论坛在北京举行，重申了中国致力于基础设施建设驱动全球化的决心。外国代表团带着新的承诺离开，而我们的经济外交也将在未来多年带来丰厚的回报。"
 CHI_bri_industrial_zones_tier_1_idea: "一期经济特区"
 CHI_bri_industrial_zones_tier_1_idea_desc: "按照中国模式在海外建立的经济特区，将我们的制造业基地扩展到了国界之外。"
 CHI_bri_industrial_zones_tier_2_idea: "二期经济特区"
 CHI_bri_industrial_zones_tier_2_idea_desc: "海外园区已发展成为运转良好的工业园区，其建筑技术也回流到国内建设项目中。"
 CHI_bri_industrial_zones_tier_3_idea: "三期经济特区"
 CHI_bri_industrial_zones_tier_3_idea_desc: "中国企业管理的工业园区网络将伙伴经济体与我们的供应链和建筑业紧密联系起来。"
 CHI_bri_mines_tier_1_idea: "资源特许权 I"
 CHI_bri_mines_tier_1_idea_desc: "通过合作国贷款获得的采矿特许权，为中国工业提供了原材料。"
 CHI_bri_mines_tier_2_idea: "资源特许权 II"
 CHI_bri_mines_tier_2_idea_desc: "特许经营权组合已扩展到多个采掘行业，加深了我国经济可利用的资源基础。"
 CHI_bri_mines_tier_3_idea: "资源特许权 III"
 CHI_bri_mines_tier_3_idea_desc: "中国企业在合作采掘业中持有控股权，超出我们自身需求的剩余部分则以溢价出售。"
 CHI_bri_pipelines_tier_1_idea: "能源动脉 I"
 CHI_bri_pipelines_tier_1_idea_desc: "通过伙伴国输油管道向中国炼油厂输送能源，可以降低我们对海上能源瓶颈的风险。"
 CHI_bri_pipelines_tier_2_idea: "能源动脉 II"
 CHI_bri_pipelines_tier_2_idea_desc: "扩建后的管道输送能力和相关的储罐区使我们能够抽取更多燃料，并储存更多燃料。"
 CHI_bri_pipelines_tier_3_idea: "能源动脉 III"
 CHI_bri_pipelines_tier_3_idea_desc: "陆上能源动脉现在完全绕过了海上咽喉要道，而开发利用这些能源的储存基础设施正在快速建设中。"
 CHI_bri_ports_tier_1_idea: "海事网络 I"
 CHI_bri_ports_tier_1_idea_desc: "中国运营的集装箱码头现在承担着沿海上航线伙伴国家贸易的相当大一部分份额，这加强了我们与途经国家之间的商业地位。"
 CHI_bri_ports_tier_2_idea: "海事网络 II"
 CHI_bri_ports_tier_2_idea_desc: "码头特许经营权已扩展为全面的港口开发合同。我们的承包商在海外建造的船厂和泊位，提升了他们为国内海军建设带来的专业技术。"
 CHI_bri_ports_tier_3_idea: "海事网络 III"
 CHI_bri_ports_tier_3_idea_desc: "如今，一系列商业港口，其中一些设有两用泊位和补给设施，遍布海上航道。中国航运的范围更广，保护航运的舰队规模也更大。"
 CHI_bri_powerplants_tier_1_idea: "电力生产网络 I"
 CHI_bri_powerplants_tier_1_idea_desc: "中国承包商在海外建设的发电能力，既能让合作伙伴的产业按照我们的方式运转，又能让我们的工厂从中受益，运行得更好。"
 CHI_bri_powerplants_tier_2_idea: "电力生产网络 II"
 CHI_bri_powerplants_tier_2_idea_desc: "更广泛的海外发电站组合能够维持国内更高的工业产能。"
 CHI_bri_powerplants_tier_3_idea: "电力生产网络 III"
 CHI_bri_powerplants_tier_3_idea_desc: "中国工程技术已成为合作伙伴网络中默认的电力供应商，国内工业产出也与之相匹配。"
 CHI_bri_prestige_tier_1_idea: "外交声望 I"
 CHI_bri_prestige_tier_1_idea_desc: "对伙伴国进行可见的投资，能​​让我们赢得建设者而非债权人的声誉。"
 CHI_bri_prestige_tier_2_idea: "外交声望 II"
 CHI_bri_prestige_tier_2_idea_desc: "“一带一路”被视为一项公共产品。维持友好关系所需的成本比以往要低得多。"
 CHI_bri_prestige_tier_3_idea: "外交声望 III"
 CHI_bri_prestige_tier_3_idea_desc: "如今，北京已成为许多发展中国家的首选合作伙伴，而这种地位直接转化为国内的政治资本。"
 CHI_bri_railways_tier_1_idea: "内陆走廊 I"
 CHI_bri_railways_tier_1_idea_desc: "跨境铁路连接将伙伴经济体与中国产业联系起来，沿线货物的运输为我们赢得了沿线国家的好感。"
 CHI_bri_railways_tier_2_idea: "内陆走廊 II"
 CHI_bri_railways_tier_2_idea_desc: "这些走廊现在已成为定期货运通道。可靠的陆路运输保障了我们在海上运输不稳定地区部队的物资供应。"
 CHI_bri_railways_tier_3_idea: "内陆走廊 III"
 CHI_bri_railways_tier_3_idea_desc: "一条绵延不断的陆路铁路网深入内陆腹地。凭借在国外积累的经验，我们的铁路工程兵团在国内建设速度更快。"
 CHI_bri_telecom_tier_1_idea: "数字丝绸之路 I"
 CHI_bri_telecom_tier_1_idea_desc: "中国在伙伴国家建设的网络骨干网使我们的服务能够了解通过这些骨干网的流量，从而增强我们抵御外国情报渗透的能力。"
 CHI_bri_telecom_tier_2_idea: "数字丝绸之路 II"
 CHI_bri_telecom_tier_2_idea_desc: "通过控制合作伙伴网络中的设备层，可以降低我们在海外维持自身运营的成本。"
 CHI_bri_telecom_tier_3_idea: "数字丝绸之路 III"
 CHI_bri_telecom_tier_3_idea_desc: "整个数字走廊完全由我们掌控：硬件、回程链路和海底光缆登陆点。任何通过该走廊的外国流量，对我们来说既不私密也不安全。"
 CHI_brokered_non_aggression_pact: "北京斡旋的互不侵犯条约"
 CHI_brokered_non_aggression_pact_desc: "中国是我们与地区竞争对手之间互不侵犯谅解的担保人。只要该协议有效，双方都能从稳定和与北京更加友好的关系中受益。"
 CHI_cadre_evaluation_reform_idea: "干部综合评价改革"
 CHI_cadre_evaluation_reform_idea_desc: "如今，官员的考核标准除了GDP增长外，还包括环境保护、社会和谐以及公共服务水平。减少对化石燃料密集型生产的依赖和精简公共支出，反映出行政部门的责任意识增强。"
 CHI_cai_active_phase: "欧盟投资全面协议"
 CHI_cai_active_phase_desc: "《全面投资协定》正处于积极实施阶段。欧洲市场对中国出口和投资全面开放，消费品成本下降，工业产能显著提升。"
 CHI_cai_residual: "全面投资协定的悠久影响"
 CHI_cai_residual_desc: "即使《全面投资协定》的积极阶段已经结束，与欧洲市场的结构性一体化依然存在。贸易关系也比以往更加密切。"
 CHI_central_political_commission_1: "中央政治和法律事务委员会"
 CHI_central_political_commission_1_desc: "中央政法委对法院、检察机关、公安机关和国家安全机关拥有监督权。其主要任务是维护国内秩序，确保法律体系服务于党的目标，而非发挥独立制衡的作用。随着其在中央政法委内部地位的提升，该委预防动乱、有效处理异议以及协调跨部门安全应对的能力也显著增强。"
 CHI_chinese_dream_momentum: "中国梦势头"
 CHI_chinese_dream_momentum_desc: "“中国梦”叙事激发了公众的民族认同感。公民被号召为集体复兴服务；党的机关报刊报道，应征入伍人数激增，爱国主义情绪也频频公开表达。就目前而言，故事本身比最终目标更具吸引力。"
 CHI_chongqing_model_idea: "重庆模式"
 CHI_chongqing_model_idea_desc: "国有企业是投资的锚定力量，并引领着整体经济发展的步伐。国有资产为福利支出提供了财政基础，无需依赖外国资本或私营部门的税收收入。"
 CHI_commercial_bank_law_idea: "商业银行法实施"
 CHI_commercial_bank_law_idea_desc: "2003年对《商业银行法》的修订对四大银行施加了巴塞尔协议式的资本充足率、风险分类标准和独立董事会制度。监管合规成本在过渡期间有所上升，但信贷分配过程首次摆脱了直接的政治控制。"
 CHI_common_prosperity_framework: "共同繁荣框架"
 CHI_common_prosperity_framework_desc: "对私营教育、娱乐和科技领域的监管干预，与国家加大对医疗保健、农村基础设施和社会保险的投资相结合。该党声称，繁荣将惠及所有人；其机制在于，国家决定繁荣的含义以及谁优先受益。"
 CHI_cpec_partner: "中巴经济走廊"
 CHI_cpec_partner_desc: "中巴经济走廊投资计划正在重塑巴基斯坦的基础设施，中国投资建设的高速公路、能源项目和工业园区正在加速经济活动。"
 CHI_crrc_idea1_desc: "中国铁路车辆总公司是全球最大的轨道装备供应商，带动了国内轨道和码头建设以及中国机车车辆的海外出口。"
 CHI_defiance_of_china: "对中国的蔑视"
 CHI_defiance_of_china_desc: "该国拒绝了中国的要求，顶住了经济压力，并坚持其在争议地物上的立场。这种对抗行为在国内赢得了极高的威望，并可能鼓励其他地区行为体采取更强硬的立场。"
 CHI_diaoyu_patrol_regime: "钓鱼岛巡逻制度"
 CHI_diaoyu_patrol_regime_desc: "在争议水域附近持续进行的海岸警卫队轮换，使海军人员能够在真实条件下接受训练。"
 CHI_digital_governance_spirit: "数字化治理"
 CHI_digital_governance_spirit_desc: "集成数据系统将城市监控网络、金融交易监控和社会信用评分整合到一个统一的合规基础设施中。地方政府以数字化方式处理行政申请，并通过自动标记来执行标准。公民与国家之间的官僚界面得到简化，国家在每个接触点都发挥作用。"
 CHI_distant_water_fishing_fleets: "远洋捕鱼船队"
 CHI_distant_water_fishing_fleets_desc: "在北京的资助和国有企业的支持下，我们的远洋船队是世界上最大的远洋船队，在西非、南美洲和南太平洋的专属经济区活动。除了保障粮食安全外，这些船只还在远离海岸的海域展现出持续的海上存在，强化了中国利益延伸至中国船只航行之处的原则。"
 CHI_divestiture_transition_idea: "资产剥离过渡"
 CHI_divestiture_transition_idea_desc: "迫使军队放弃商业收入而依赖国家预算，会造成一个无法在一夜之间弥补的资金缺口。过去习惯于依靠酒店、农场和军火贸易维持运转的部队，如今不得不等待北京的拨款，而政治资本则被用来弥补这一损失。只有当国防部门重组为能够自筹资金的集团公司后，这种压力才会缓解。"
 CHI_dragon_king_ascendant: "龙王升天"
 CHI_dragon_king_ascendant_desc: "龙王 - 中国古代神话中的龙王 - 是四海之王。随着朝贡体系的正式建立和军事力量的巩固，南海地区只承认一个主权者：北京。"
 CHI_eda_grey_market_idea: "灰通道EDA寻源"
 CHI_eda_grey_market_idea_desc: "国内无晶圆厂厂商通过东南亚的空壳公司采购新思科技和楷登电子的芯片流片。虽然流片能够完成，但供应不稳定，而且工具更新比授权市场滞后数月。"
 CHI_eight_points_doctrine: "台湾八点"
 CHI_eight_points_doctrine_desc: "江泽民的八点方案为两岸政策提供了一个正式的理论框架，既表达了和平统一的意愿，又明确警告两岸不要追求法理上的独立。军事应急计划与外交途径并行推进，赋予北京一项可信的强制手段。"
 CHI_etim_designation: "东突厥斯坦伊斯兰运动指定框架"
 CHI_etim_designation_desc: "双边反恐框架的目标是东突厥斯坦分裂主义网络。"
 CHI_eu_market_access: "全面进入欧盟市场"
 CHI_eu_market_access_desc: "与布鲁塞尔批准全面投资框架将为中国企业深入进入欧洲消费和资本市场打开大门，提高出口上限，并缓和欧盟范围内中国企业的政治环境。"
 CHI_grey_society_crisis_idea: "灰色社会危机"
 CHI_grey_society_crisis_idea_desc: "中国独生子女后一代的人口结构呈现倒金字塔状。不断萎缩的劳动力必须供养日益庞大的退休人口，这导致养老金和医疗保健预算捉襟见肘，而生产率增长却停滞不前。只有当劳动年龄人口趋于稳定时，这种负担才能有所缓解。"
 CHI_guarantor_of_korean_peace: "韩国和平的保障者"
 CHI_guarantor_of_korean_peace_desc: "北京被整个地区公认为朝鲜半岛稳定不可或缺的保障者。这种地位所带来的威望超越了任何一届政府的任期。"
 CHI_gwadar_basing_rights: "瓜达尔港驻港权"
 CHI_gwadar_basing_rights_desc: "使用瓜达尔港的深水设施，可以扩大中国人民解放军海军在印度洋和阿拉伯海的作战范围。"
 CHI_ideological_rectification: "意识形态整顿"
 CHI_ideological_rectification_desc: "第九号文件的禁令通过在大学、媒体机构和国有企业中开展强制学习和自我批评运动来强制执行。可接受的话语范围迅速缩小。忠诚通过拒绝西方自由主义理念来体现，意识形态的壁垒也日益坚固，以抵御外国影响。"
 CHI_informal_sanctions: "非正式的萨德制裁"
 CHI_informal_sanctions_desc: "为回应韩国部署萨德系统，我们已对韩国实施非正式经济制裁。中国游客被劝返，韩国商品面临非关税壁垒，在我国境内经营的韩国企业报告称受到官方骚扰。"
 CHI_information_warfare: "信息战装置"
 CHI_information_warfare_desc: "国家媒体和数字平台向全球传播中国叙事，同时反击敌对信息宣传活动。"
 CHI_inner_party_supervision_idea: "党内监督条例"
 CHI_inner_party_supervision_idea_desc: "正式的监督程序要求上级党政机关检查并报告下级委员会的工作情况。反腐败执法力度加大，政治问责机制更加规范化。"
 CHI_international_department_1: "中国共产党对外联络部"
 CHI_international_department_1_desc: "国际部在全球范围内开展政党间外交，与各地区的执政党、反对派运动和政治基金会建立并维护良好关系。它也是“一带一路”倡议政治拓展的主要机构，负责协调项目实施、管理伙伴国合作的回报，并在受援国政府面临偿债困难时处理债务重组事宜。扩大其在委员会的影响力，有助于深化与愿意合作的外国伙伴的网络，并提高“一带一路”倡议的整体成效。"
 CHI_international_sanctions: "国际制裁"
 CHI_international_sanctions_desc: "中国对朝鲜军事侵略的支持引发了国际社会的全面制裁。贸易准入受到限制，外国投资枯竭，外交孤立程度加深。"
 CHI_Invigorate_Country_Through_STE1: "科教兴国"
 CHI_Invigorate_Country_Through_STE1_desc: "科教兴国战略，引导国家投资流向科研机构和大学系统。科研成果的回报是以增加教育预算为代价的。"
 CHI_Invigorate_Country_Through_STE1_tt: "§Y$CAT_computing_tech$§!或§Y$CAT_internet_tech$§!的年度技术提升"
 CHI_iron_brothers_joint_training: "钢铁兄弟联合训练"
 CHI_iron_brothers_joint_training_desc: "与伙伴军队持续进行的联合演习提高了部队的凝聚力、理论一致性和诸兵种合成作战能力。"
 CHI_jap_finlandized_sovereignty: "芬兰化主权"
 CHI_jap_finlandized_sovereignty_desc: "东京保留了自己的议会、新闻媒体和语言。对于北京在其境外的活动，东京也保持沉默。"
 CHI_jap_forced_neutrality: "强制中立"
 CHI_jap_forced_neutrality_desc: "日本枪口的胁迫下被迫退出美国的安全保护伞。条约已经签署。这种耻辱将持续几代人。"
 CHI_jap_historical_pressure: "中国历史攻势"
 CHI_jap_historical_pressure_desc: "北京重提战时历史问题，在各种外交场合提及靖国神社参拜、教科书争议以及南京大屠杀遗产等问题。此举激化了日本国内舆论，削弱了东京应对中国影响力行动的能力。"
 CHI_japan_soft_power: "中日文化交流"
 CHI_japan_soft_power_desc: "旅游交流、熊猫贷款和部长级官员的合影活动可以将善意转化为政治资本。如果敌对情绪升级，这些活动将自动中止。"
 CHI_japanese_cultural_imports: "授权的日本文化进口"
 CHI_japanese_cultural_imports_desc: "Bilibili播放吉卜力工作室的作品。腾讯获得了《鬼灭之刃》的授权。党的青年团研究王沪宁关于文化吸收的报告。"
 CHI_joint_command_consultations: "联合指挥磋商"
 CHI_joint_command_consultations_desc: "中朝两军指挥部定期举行战略磋商，正在改善协调，降低误判风险。"
 CHI_joint_venture_era_idea: "合资工业时代"
 CHI_joint_venture_era_idea_desc: "外商与国内企业合资成为技术获取、管理知识转移和进入全球分销网络的主要途径。"
 CHI_kaesong_co_developer: "开城联合开发商"
 CHI_kaesong_co_developer_desc: "中国建筑企业和物流运营商正在扩建后的开城工业园区内开展合资项目。共享供应链既能降低成本，又能提升企业声誉。"
 CHI_kor_beijing_pressure: "北京施压运动"
 CHI_kor_beijing_pressure_desc: "中国持续的经济和外交压力正在削弱韩国公众的信心，并缩小首尔的独立政策空间。韩国政府面临着国内日益增长的不满情绪，以及对抗北京的回旋余地越来越小。"
 CHI_kor_beijing_security_guarantee: "北京安全保障"
 CHI_kor_beijing_security_guarantee_desc: "在中国的正式安全保障下，韩国摆脱了对美国核保护伞的依赖。国防规划围绕与北京的合作进行调整，减轻了征兵负担，并稳定了政治局势。"
 CHI_kor_exit_trilateral: "退出三边框架"
 CHI_kor_exit_trilateral_desc: "韩国已退出美日菲三边防御机制。此举反映出首尔方面认为该机制的反华倾向与其经济利益和战略自主目标不符。"
 CHI_kor_strategic_autonomy_doctrine: "战略自主原则"
 CHI_kor_strategic_autonomy_doctrine_desc: "韩国奉行战略自主主义，使首尔与华盛顿的印太战略保持距离。韩国的国防态势已转向自力更生和区域多边主义，而非美国主导的联盟关系。"
 CHI_korean_tributary: "朝鲜的朝贡关系"
 CHI_korean_tributary_desc: "朝鲜在政治上对北京的服从，以现代制度形式重现了1895年以前中朝关系中的朝贡关系。中国进入朝鲜港口、市场和战略空间的权利得到了正式保障。"
 CHI_kpa_intelligence_penetration: "朝鲜人民军情报渗透"
 CHI_kpa_intelligence_penetration_desc: "中国情报机构已在朝鲜人民军内部建立了一个人员网络。对朝鲜军事计划和内部政治的实时掌握，使北京对平壤拥有了前所未有的影响力。"
 CHI_lithium_supply_chain_locked: "锂三角供应链"
 CHI_lithium_supply_chain_locked_desc: "与阿根廷、玻利维亚和智利生产商签订的长期承购协议，确保了中国电池制造商所需的锂供应，从而平滑了效率曲线，并为民用产业增加了发展空间。"
 CHI_long_range_firepower_idea: "远程火力"
 CHI_long_range_firepower_idea_desc: "[CHI_long_range_firepower_idea_tt]"
 CHI_lotte_market_correction: "乐天市场调整"
 CHI_lotte_market_correction_desc: "乐天集团在中国的业务被迫进行有序缩减，从而为国内竞争对手腾出了市场份额。这一调整减少了消费品的外流，也体现了有针对性的经济报复措施的政治效用。"
 CHI_lunar_legacy_industrial: "天宫成真"
 CHI_lunar_legacy_industrial_desc: "天宫是历史上第一座完全由中国人建造并永久屹立于轨道之上的航天器。建造天宫的工厂、铸造厂和装配车间如今将他们久经考验的技艺运用到地球建设中。能够将空间站送入轨道的技术，也足以建造地面上的任何设施。"
 CHI_lunar_legacy_military: "穿过鹊桥"
 CHI_lunar_legacy_military_desc: "鹊桥从月球背面传递着我们的信号。它得名于曾经让一对恋人跨越天际相会的鸟桥。那些为完成有史以来最艰巨的任务而训练的宇航员们凯旋而归，他们意志坚定，信心十足。一支能够抵达月球的队伍，面对地球上的任何挑战，都不会心存疑虑。"
 CHI_lunar_legacy_political: "嫦娥升天"
 CHI_lunar_legacy_political_desc: "在古老的神话中，嫦娥饮下仙丹飞向月球，留下丈夫后羿永远仰望星空。如今，她的名字将一个真实的国家带到了月球表面，人们从中看到了中国跻身世界强国之列的证明。这次登月成为了任何对手都无法夺走的荣耀。"
 CHI_lunar_legacy_research: "天问的问题"
 CHI_lunar_legacy_research_desc: "“天问”一词源于屈原的古代诗篇，这首诗探讨了宇宙的秩序。玉兔号探测器和月球样本解答了此前任何国家都未曾解答的问题，而破译这些问题的实验室渴望探索更多。一个在月球探索中证明自身实力的科学体系，如今正向着每一个前沿领域发起挑战。"
 CHI_mass_line_bo_campaign: "群众路线运动"
 CHI_mass_line_bo_campaign_desc: "干部被部署到农村和工厂车间，收集反馈意见，展现党对人民的承诺。这项活动提高了人民的政治觉悟，引导群众力量支持党的目标。"
 CHI_mazu_blessing: "妈祖的祝福"
 CHI_mazu_blessing_desc: "妈祖，海神和水手的守护神，在南海沿岸备受尊崇。南海舰队已正式举行妈祖庙宇祈福仪式。仪式在舰队中举行，旨在增强团队精神。"
 CHI_media_offensive: "全球媒体攻势"
 CHI_media_offensive_desc: "中国环球电视网、新华社和社交媒体平台联合发起了一场全球宣传活动，旨在展现中国视角。"
 CHI_militia_deployed: "海上民兵倡议"
 CHI_militia_deployed_desc: "中国海上民兵船只前沿部署在争议地区，在平民掩护下保持持续存在。他们的存在阻止了敌对海警船只在不引发危机的情况下接近。"
 CHI_monroe_inverted: "门罗主义的颠倒"
 CHI_monroe_inverted_desc: "我们已经取代华盛顿成为拉丁美洲的主要外部伙伴，从而巩固了半球格局的重新调整，降低了关系成本，并将地区舆论拉向我们这边。"
 CHI_national_humiliation: "国耻"
 CHI_national_humiliation_desc: "中国在南海的任何外交或军事挫败，在国内都被解读为“百年屈辱”的延续。公众舆论被激化，领导层面临着通过其他手段挽回颜面的巨大压力。"
 CHI_national_security_commission_1: "中国共产党国家安全委员会"
 CHI_national_security_commission_1_desc: "国家安全委员会成立于2013-2014年，由习近平主席领导，是中国安全体系的顶端机构，直接在党的领导下协调情报、军事、网络和反间谍等职能，而非通过国务院。它的成立标志着所有战略安全决策的集中化。随着国家安全委员会在中央内部影响力的不断增强，其协调权限也日益全面，应对内外安全威胁的能力更加统一和果断。"
 CHI_nepal_himalayan_friendship: "喜马拉雅友谊倡议"
 CHI_nepal_himalayan_friendship_desc: "在尊重加德满都中立地位的同时，中国的投资和善意正流入尼泊尔，并将该国拉近到北京的经济轨道上。"
 CHI_neutral_interlocutor: "中立对话者"
 CHI_neutral_interlocutor_desc: "我们已将自己定位为朝韩双方唯一可以对话的力量。这一角色赋予我们影响力，也承载着各方期望。"
 CHI_nko_blue_sky_mobilization: "蓝天动员"
 CHI_nko_blue_sky_mobilization_desc: "朝鲜人民军已根据中国战略目标进入全面战斗动员状态。所有休假均已取消，前线部队正在向进攻阵地进发。"
 CHI_nko_chinese_economic_sphere: "中国经济圈"
 CHI_nko_chinese_economic_sphere_desc: "朝鲜经济已正式融入中国工业体系。中国国有企业管理着关键行业，货币挂钩机制正常化，朝鲜元与人民币挂钩。"
 CHI_nko_energy_aid: "中国能源援助"
 CHI_nko_energy_aid_desc: "从丹东输送的燃油和电力维持着工厂的运转和照明。北京的补贴背后隐藏着一些不为人知的期望。"
 CHI_nko_food_package: "中国食品套装"
 CHI_nko_food_package_desc: "经由图们口岸运输的粮食正在缓解长期存在的粮食短缺问题。这项援助为党内赢得了政治回旋余地。"
 CHI_nko_infrastructure_investment: "中国基础设施投资"
 CHI_nko_infrastructure_investment_desc: "中国建筑队正在大规模重建朝鲜的基础设施。道路、铁路、港口和电网都在进行升级改造，这些改造项目签订的合同将朝鲜的资源与中国的产业链捆绑了一代人之久。"
 CHI_nko_offensive_readiness: "朝鲜人民军进攻准备"
 CHI_nko_offensive_readiness_desc: "在中国后勤支持下，朝鲜人民军已从防御姿态转变为以快速进攻为目标，向南越过三八线展开进攻行动的姿态。"
 CHI_nko_security_assurance: "中国安全保证"
 CHI_nko_security_assurance_desc: "北京方面提供了一种低调但坚定的保障措施，以防止政权崩溃。这种保障措施稳定了核心圈子，并缓解了动员压力。"
 CHI_npm_red_banner_insurgency: "中国支持的叛乱"
 CHI_npm_red_banner_insurgency_desc: "北京的秘密渠道持续向毛派纵队输送步枪、弹药和干部训练。中国人民解放军将尼泊尔视为革命输出的试验场，并期望获得投资回报。"
 CHI_nrcms_rollout_idea: "新农村合作医疗计划"
 CHI_nrcms_rollout_idea_desc: "农村居民、地方政府和中央预算的共同出资，现在为数亿农民承担了灾难性的医疗费用，改善了公共卫生，减轻了疾病对农村家庭的经济冲击。"
 CHI_organisation_department_1: "中国共产党组织部"
 CHI_organisation_department_1_desc: "组织部掌控着中共各级党政人员的任命、晋升、审查和纪律处分等一切人事决策。其影响力遍及国有企业和政府部门，使其成为党内凝聚力最强大的工具。随着组织部在党政常委会内部影响力的不断增强，其对干部选拔的控制也日益严格，并通过党政机构执行中央指令的能力也相应提升。"
 CHI_pacific_basing_rights: "第二岛链基地"
 CHI_pacific_basing_rights_desc: "通过谈判获得第二岛链深处的基地和补给权，解放军海军获得了战略投送能力、更短的后勤保障时间和更快的船坞周转速度，从而能够进行远洋部署。"
 CHI_pacific_diplomatic_setback: "太平洋外交受挫"
 CHI_pacific_diplomatic_setback_desc: "在太平洋岛屿地区的一次重大失败，使该地区各国首都对我们的示好态度更加强硬，提高了之后每一次外交举措的政治成本。"
 CHI_pacific_security_lead: "太平洋安全领导力"
 CHI_pacific_security_lead_desc: "前沿准入协议和在太平洋岛屿上的轮换部署扩大了解放军海军的作战范围，并加快了维持其作战的基地基础设施建设。"
 CHI_paf_maritime_militia: "中国海上民兵"
 CHI_paf_maritime_militia_desc: "民用捕鱼船队由军方指挥。海上行动可否认，必要时提供真实数据。"
 CHI_party_century_endures: "党将长存"
 CHI_party_century_endures_desc: "习近平思想已深深融入党的宪政和组织结构之中，成为其永久运作框架。党的代表大会制度、政治局和中央军委被重申为持久的治理机制。这个经历了毛泽东逝世、文化大革命和天安门事件的党，其存在本身也是为了超越任何个人，包括其现任最高领导人。"
 CHI_patriotic_education_mandate: "爱国主义教育使命"
 CHI_patriotic_education_mandate_desc: "修订后的课程确保没有一个中国学生会忘记在南京、在平顶山、在731部队的简易房里发生的一切。稳定得以加强，但对外国思想的怀疑也随之加深。"
 CHI_pearls_economic_partner: "中国战略伙伴关系"
 CHI_pearls_economic_partner_desc: "为中国海军提供后勤保障，释放了北京的经济慷慨，港口现代化资金和基础设施贷款源源不断地流入东道国。"
 CHI_personal_rule_mandate: "个人规则授权"
 CHI_personal_rule_mandate_desc: "2018年全国人民代表大会从宪法中取消了国家主席任期限制，使最高领导人的权力永久集中于一人手中。战略方向和政治忠诚如今都由这一中心掌控，这提高了战争支持率，但也缩小了前线指挥官的自主空间。"
 CHI_petrodollar_breaks: "石油美元平价达成"
 CHI_petrodollar_breaks_desc: "以人民币计价的海湾石油、全球南方各国央行之间的货币互换额度以及SWIFT替代方案削弱了美元的储备溢价，将货币杠杆转化为政治权力和人口信心。"
 CHI_pla_basing_economic_help: "中国经济伙伴关系"
 CHI_pla_basing_economic_help_desc: "作为我们为解放军海军提供后勤保障的回报，我们获得了中国持续的经济支持：扩大出口市场、民用工厂升级以及在地区论坛上的政治支持。"
 CHI_policy_bank_lending_idea: "政策银行贷款活动"
 CHI_policy_bank_lending_idea_desc: "中国国家开发银行、进出口银行和亚洲开发银行向国有企业和省级政府发放优惠信贷，加速了交通、能源和海外基础设施等领域的固定资产投资。这波信贷浪潮推动了建筑业产出，但也使家庭储蓄被套牢在低收益存款中。"
 CHI_princeling_economic_leverage: "太子党经济杠杆"
 CHI_princeling_economic_leverage_desc: "如今，一张错综复杂的跨境商业网络将朝鲜精英与中国资本紧密联系在一起。每一笔交易都加深了这种依赖性。"
 CHI_property_sector_contraction_idea: "房地产行业萎缩"
 CHI_property_sector_contraction_idea_desc: "三条红线迫使大型开发商同时降低杠杆率。建筑开工量骤减，地方政府土地出售收入锐减，水泥、钢铁、家电等行业的供应商网络也随之遭受重创。随着房地产泡沫被强行破裂，更广泛的经济也受到了冲击。"
 CHI_property_tax_pilot_idea: "房产税试点项目"
 CHI_property_tax_pilot_idea_desc: "上海和重庆对第二套住房和高价值房产征收适度的税款，抑制投机性投资，使地方政府收入不再仅仅依赖于土地销售。"
 CHI_publicity_department_1: "中国共产党宣传部"
 CHI_publicity_department_1_desc: "宣传部为中国所有印刷、广播和数字媒体制定意识形态路线，指导审查制度、叙事框架以及政党合法性的国内投射。它还协调海外消息传递基础设施，包括官方媒体扩张和海外内容合作伙伴关系。更大的委员会影响力转化为更加连贯和有力的信息环境，加强社会稳定和民众对党的优先事项的支持。"
 CHI_qccm_coordination_cell: "四方合作与协调机制协调小组"
 CHI_qccm_coordination_cell_desc: "帕米尔走廊沿线的四方情报共享机制将中国、巴基斯坦、阿富汗和塔吉克斯坦的安全部门联系起来。"
 CHI_raj_foreign_defense_pressure: "中国施压"
 CHI_raj_foreign_defense_pressure_desc: "北京的战略重心转向南亚，给新德里带来了持续的外交和信息压力，缩小了印度在其北部和东部边境的战略选择。"
 CHI_rason_investment_flow: "罗先投资计划"
 CHI_rason_investment_flow_desc: "中国资本正涌入罗先经济特区，用于基础设施、工业产能和港口设施的建设。这项尝试已初见成效。"
 CHI_rason_port_access: "罗先港通道"
 CHI_rason_port_access_desc: "我们的舰船现在可以可靠地进入罗先深水港，使中国人民解放军海军在日本海拥有了战略立足点。"
 CHI_rcep_member: "区域全面经济伙伴关系协定创始成员国"
 CHI_rcep_member_desc: "我们与东京和首尔共同主导了区域全面经济伙伴关系协定。关税下降，供应链更加紧密，美国的缺席成为区域常态。"
 CHI_reconstruction_plan_idea: "重建能力计划"
 CHI_reconstruction_plan_idea_desc: "预先部署的设备、标准化的流程和专业的陆军工程部队使我们在灾后修复基础设施和工业方面拥有卓越的速度优势。"
 CHI_regional_crisis_alert: "区域危机警报"
 CHI_regional_crisis_alert_desc: "中国在朝鲜半岛的安全态势引发了整个地区的高度戒备，联盟凝聚力面临考验。"
 CHI_reunion_humanitarian_lead: "人道主义外交负责人"
 CHI_reunion_humanitarian_lead_desc: "我们协调跨境家庭团聚的工作赢得了广泛赞誉。各国外交部对此表示欢迎，国内媒体也对此进行了报道。"
 CHI_rmb_promotion: "人民币国际化"
 CHI_rmb_promotion_desc: "通过双边货币互换协议，人民币作为国际储备货币的地位日益被接受。"
 CHI_russian_arms_dependency: "俄罗斯武器依赖"
 CHI_russian_arms_dependency_desc: "中国人民解放军的装备体系建立在苏联和俄罗斯的设计之上。其轻武器最初是获得许可生产的56式步枪，装甲部队则从直接仿制苏联T-54A的59式坦克发展而来，后来的坦克和步兵战车仍然沿袭着T-72和BMP的血统。火炮、运输车辆和防空部队也拥有相同的血统。这种依赖在动力系统方面体现得最为深刻：歼-10和歼-11战斗机使用AL-31F发动机，JF-17战斗机使用RD-93发动机，苏-35战斗机和S-400防空导弹系统则直接从莫斯科购买。所有国产战斗机都依赖俄罗斯的涡轮发动机，每一种授权生产的型号都需要支付专利费，而且设计局的仿制数量仍然远超其自主研发的数量。在中国建立起自己的军工基础之前，解放军的命脉仍然掌握在俄罗斯手中。"
 CHI_sanctions_immunity_partial: "人民币结算贸易生命线"
 CHI_sanctions_immunity_partial_desc: "与受制裁伙伴签订的以人民币计价的能源和商品合同可以减轻西方金融压力的影响，缓解消费者压力，并保持出口渠道畅通。"
 CHI_sars_outbreak_uncontrolled_idea: "非典疫情"
 CHI_sars_outbreak_uncontrolled_idea_desc: "由于未能协调迅速采取应急措施，非典疫情在隔离措施生效前已蔓延至多个省份。我们延迟向国际社会通报疫情，损害了我们在国际上的地位，并给国内经济造成了严重冲击。"
 CHI_sars_response_effective_idea: "非典已控制"
 CHI_sars_response_effective_idea_desc: "我们的应急响应机制实现了快速隔离、及时国际通报和协调一致的医疗行动。疫情已得到控制，经济损失有限，我们的国际地位也未受影响。"
 CHI_scientific_outlook_idea_1: "准备科学发展观"
 CHI_scientific_outlook_idea_1_desc: "根据科学发展观，我们正在调整国家政策方向，从以GDP为先的增长转向更广泛的社会和环境指标。"
 CHI_scientific_outlook_idea_1_tt: "§Y$CHI_scientific_outlook_on_development$§!国策完成时间§G-35§!§Y天§!"
 CHI_sco_dialogue_partner: "上海合作组织对话伙伴"
 CHI_sco_dialogue_partner_desc: "该国已被接纳为上海合作组织的对话伙伴，为与成员国进行更深入的政治和经济合作打开了大门。"
 CHI_sco_member: "上海合作组织成员国"
 CHI_sco_member_desc: "该国是上海合作组织的正式成员国，参与该组织建立的所有政治、经济和安全合作框架。"
 CHI_sco_member_econ_desc: "该国是上海合作组织的正式成员国，重点发展经济合作，与成员国之间不断加强贸易和投资联系。"
 CHI_sco_member_mil_desc: "该国是上海合作组织的正式成员国，重点开展军事合作，参与联合演习和安全行动。"
 CHI_sco_member_pol_desc: "该国是上海合作组织的正式成员国，该组织以政治合作为重点，致力于建立更强大的治理和反颠覆框架。"
 CHI_sco_observer: "上海合作组织观察员国"
 CHI_sco_observer_desc: "该国是上海合作组织的观察员国，可以参加上合组织论坛并进行有限的经济合作，同时保持对结盟决策的主权。"
 CHI_scs_chinese_debt: "中国债务依赖"
 CHI_scs_chinese_debt_desc: "“一带一路”贷款义务赋予北京对负债伙伴国外交政策考量的强大影响力。偿债要求限制了该国政府采取不利于中国利益的立场的自由。"
 CHI_scs_claimant_under_pressure: "在中国的压力之下"
 CHI_scs_claimant_under_pressure_desc: "中国在南海的主导地位使得政府在南沙群岛问题上的每一项决策都付出了更高的代价。国内舆论对此存在分歧，有人支持妥协，有人反对；在南海问题上，政治权力惩罚机制的实施反映了在北京主导一切的情况下，制定任何政策都难上加难。"
 CHI_scs_de_facto_sovereignty: "事实上的主权"
 CHI_scs_de_facto_sovereignty_desc: "通过耐心细致的双边外交努力和一系列累积的协议，中国在南海的主权声索已成为该地区的默认立场。目前没有任何声索国正式对这一安排提出异议；外部势力也缺乏挑战邻国已接受现状的法律手段。"
 CHI_scs_jdz_revenue: "联合开发收入"
 CHI_scs_jdz_revenue_desc: "从联合开发区开采油气为我们和我们的伙伴国都带来了共享收益。在协议有效期内，石油收入将流向双方相关的南沙群岛国家，这使得双方政府在延续双边框架方面都拥有切实利益，并增加了任何重新走向对抗的可能性。"
 CHI_scs_setback: "南海挫折"
 CHI_scs_setback_desc: "僵局以不利于中国的结局告终，外交倡议遭到公开拒绝，或者国际裁决对中国的主张不利。这些挫折降低了南海框架的适用范围，并可能招致其他声索方的投机性回应。"
 CHI_sea_eagles_carrier_wing_idea: "$CHI_sea_eagles_carrier_wing$"
 CHI_sea_eagles_carrier_wing_idea_desc: "[CHI_sea_eagles_carrier_wing_idea_tt]"
 CHI_selective_anti_corruption_campaign_idea: "选择性反腐败运动"
 CHI_selective_anti_corruption_campaign_idea_desc: "有针对性的起诉可以遏制最明目张胆的腐败，清除竞争对手的权力掮客，但执法的选择性和政治性会造成制度上的不确定性，并抑制积极性。"
 CHI_self_reliant_path_idea: "太行的成长烦恼"
 CHI_self_reliant_path_idea_desc: "自力更生的代价是涡轮机熄火和中队停飞。早期的WS-10“太行”发动机因其雄心壮志而失败，叶片开裂，使用寿命仅以小时计算，机组人员为工程师尚未吸取的每一个教训付出了代价。各部门终将解决问题，但在那之前，机队只能凭着信念飞行。"
 CHI_sez_japanese_investors: "面向日本投资者的经济特区"
 CHI_sez_japanese_investors_desc: "给予丰田、索尼、松下特殊优惠。通过使企业无法退出中国，颠覆了“中国+1”战略。"
 CHI_sino_japanese_understanding: "中日战略谅解"
 CHI_sino_japanese_understanding_desc: "缓和的不言而喻的架构：贸易流动、部长级会议以及将历史留在档案中的默契。如果中日之间再次展露敌意，就将永远失去。"
 CHI_smic_foundry_base: "中芯国际代工厂基地"
 CHI_smic_foundry_base_desc: "中芯国际张江园区为国内无晶圆厂客户提供合格的28纳米生产平台。该代工厂的自有产能降低了中国对台积电成熟工艺逻辑芯片的依赖，并为国内工艺的进一步发展奠定了基础。"
 CHI_society_department_1: "社会工作部"
 CHI_society_department_1_desc: "社会工作部成立于2023年，整合了此前分散在多个部门的中共对基层社会组织、非政府组织、工会和请愿系统的监管。其职责是确保公民社会在党设定的框架内运作，并确保民众诉求通过既定渠道而非自主动员的方式得到有效引导。随着委员会影响力的不断增强，该部门得以扩大其组织覆盖范围，并完善吸收和化解社会压力的机制。"
 CHI_sovereign_wealth_diversification_idea: "中国投资有限责任公司主权财富多元化"
 CHI_sovereign_wealth_diversification_idea_desc: "中国投资有限责任公司将外汇储备从低收益的美国国债转向全球私募股权、基础设施和战略性股权投资。该投资组合的收益高于其储备基础，并使北京在海外资本市场占据结构性地位。"
 CHI_state_tolerated_boycott: "国家容忍的抵制"
 CHI_state_tolerated_boycott_desc: "警方不会驱散反日示威游行，直到他们自己决定停止为止。爱国消费者正在调整消费策略。一些中国零售商也遭受了损失。"
 CHI_streamline_the_ranks_idea: "精简队伍"
 CHI_streamline_the_ranks_idea_desc: "从上世纪90年代末开始，中国人民解放军裁减了数十万人员，以旅级编制为基础，用规模更小、更专业的军队取代了臃肿的大规模动员部队。这一转型给训练体系带来了压力，也拖累了相关产业。但当军队规模比改革之初缩减了五分之一，且所有剩余师都装备齐全后，这种不利影响便会解除。"
 CHI_strike_black_sing_red_idea: "唱红打黑"
 CHI_strike_black_sing_red_idea_desc: "数千名官员和有组织犯罪分子被捕，他们的网络被摧毁。大规模的红色文化活动充斥着公共领域，爱国热情高涨，极大地鼓舞了士气，增强了对党的忠诚度。"
 CHI_succession_roadmap: "继任计划"
 CHI_succession_roadmap_desc: "指定接班人的确定和培养向党内机构表明，权力交接将得到妥善管理，而非引发争议。国际伙伴将这一接班框架解读为体制稳定的标志。至少在协议有效期内，与中国达成长期协议的政治风险溢价将会降低。"
 CHI_summit_host: "峰会主持人"
 CHI_summit_host_desc: "北京正积极主持敏感的区域会谈。外交空间充裕，施压手段也更具分量。"
 CHI_taiwan_strait_pressure_spirit: "海峡两岸施压姿态"
 CHI_taiwan_strait_pressure_spirit_desc: "解放军频繁入侵台湾防空识别区、在台湾周边海域进行大规模海军演习，以及有针对性的经济胁迫，共同维持着一场持续的压力战，但并未演变为公开战争。这种姿态使台北始终处于高度戒备状态，并向华盛顿发出决心信号，强化了我国的军事力量，并维持了公众对战争的支持，以应对可能发生的突发事件。"
 CHI_tech_crackdown_moderate: "技术整顿：有序重组"
 CHI_tech_crackdown_moderate_desc: "监管行动增加了合规成本，减缓了研发投资，但平台行业规模足够大，能够承受这种冲击而不至于发生结构性崩溃。"
 CHI_tech_crackdown_severe: "技术打击：严厉"
 CHI_tech_crackdown_severe_desc: "我们针对平台行业的监管行动，在数字经济发展的早期阶段就造成了冲击。服务业建设停滞不前，风险投资外逃，研发投入大幅萎缩。"
 CHI_the_duterte_precedent: "杜特尔特先例"
 CHI_the_duterte_precedent_desc: "东盟国家元首选择疏远华盛顿、转向北京的例子在整个地区引起了强烈反响。其他领导人注意到，美国未能或无法阻止这一转变，并据此权衡自身的应对措施。"
 CHI_three_represents_debate: "三个代表争议"
 CHI_three_represents_debate_desc: "党内思想保守派反对江泽民允许私营企业家入党的提议，认为这背离了先锋队的阶级性质。这场内部争论暂时扰乱了政策的连贯性，并在省级层面引发了摩擦。"
 CHI_three_represents_debate_tt: "\n如果§Y江泽民§!没有完成§Y$CHI_three_represents_codified$§!同时不再担任§Y国家领导人§!，该§Y国家精神§!将§R取消§!"
 CHI_tibet_crackdown_idea: "西藏安全行动"
 CHI_tibet_crackdown_idea_desc: "西藏各地协调一致的安全行动正在镇压分裂主义活动，但代价是暂时的稳定紧张。"
 CHI_total_war_himalayan_front: "喜马拉雅前线的全面战争"
 CHI_total_war_himalayan_front_desc: "为了解决麦克马洪线问题，每个工厂、每个铁路枢纽、每个预备役人员都被动员起来。"
 CHI_two_centenary_resolve: "两个百年目标"
 CHI_two_centenary_resolve_desc: "2021年和2049年这两个百年纪念日为经济和社会规划设定了跨代际的视角。基础设施投资、生产力目标和技术发展计划都围绕着这些里程碑展开。这些目标构建了官僚机构的激励机制，并推动了各部委开展持续数十年的规划周期。"
 CHI_united_front_department_1: "统战部"
 CHI_united_front_department_1_desc: "统战部负责管理中共与非党派群体的关系，包括少数民族、宗教团体、海外华人网络以及易被收买的外国政治人物。其职责是消除潜在的反对力量，并将党的影响力扩展到正式党员之外。随着统战部影响力的增长，其对外拓展工作也变得更加系统化，将边缘群体转化为维护中国战略利益的可靠工具。"
 CHI_usa_asia_pivot_collapse: "印太战略转向失败"
 CHI_usa_asia_pivot_collapse_desc: "随着首尔逐渐倒向北京，东京在战略上被孤立，美国重返亚洲战略的基石已经瓦解。前瞻性规划陷入混乱，盟友信心动摇，而这一逆转带来的政治代价也令华盛顿不堪重负。"
 CHI_usa_back_channel_open: "通往雾谷的航道"
 CHI_usa_back_channel_open_desc: "中南海与美国国务院之间一条隐秘的沟通渠道，使得危机沟通得以在公开外交渠道之外保持畅通。这条渠道源源不断地提供有关美国意图的情报，但代价是可能暴露在中国的反情报之下。"
 CHI_usa_g2_framework: "G2框架"
 CHI_usa_g2_framework_desc: "华盛顿和北京已将对朝鲜事务的大国共管制度化，并通过现有的双边渠道协调政策。这种安排稳定了市场，降低了消费者成本，但也使美国的对韩政策与中国持续的友好态度紧密相连。"
 CHI_wakhan_buffer_idea: "瓦罕缓冲区"
 CHI_wakhan_buffer_idea_desc: "瓦罕走廊沿线协调一致的反极端化机制加强了中国西部边境抵御极端主义渗透的能力。"
 CHI_wakhan_buffer_partner_idea: "瓦罕反恐伙伴"
 CHI_wakhan_buffer_partner_idea_desc: "与北京的联合边境管制协议提高了国内反恐能力，与此同时，外国情报机构也加强了合作。"
 CHI_war_footing_central_asia: "中亚战备状态"
 CHI_war_footing_central_asia_desc: "国家生产旨在为帕米尔高原以西的持续行动做好准备。"
 CHI_water_shortage: "水资源短缺"
 CHI_water_shortage_desc: "华北平原、黄河流域和京津冀地区拥有全国约一半的耕地，但淡水资源却不足全国五分之一。北方地区人均可用水量远低于每年1000立方米的国际缺水标准。工业排放和农业径流污染了大量地表水和地下水，加剧了水资源的匮乏。农业用水占全国总用水量的60%以上，而能源行业的制冷需求也进一步加剧了本已枯竭的水资源压力。"
 CHI_wenchuan_reconstruction_drive_idea: "汶川重建运动"
 CHI_wenchuan_reconstruction_drive_idea_desc: "地震发生后数日内，我们迅速部署了超过10万名士兵和应急救援队伍，并随后启动了1万亿元人民币的重建计划。这一规模的投入带动了四川及周边地区建筑活动的持续增长。"
 CHI_western_hemisphere_protector: "新兴美洲国家的保护者"
 CHI_western_hemisphere_protector_desc: "我们已将自身定位为寻求摆脱华盛顿控制的拉丁美洲国家的替代安全保障者。影响力自由流动，情报网络不受西方反制措施的影响。"
 CHI_western_institutional_engagement_idea: "西方机构参与"
 CHI_western_institutional_engagement_idea_desc: "积极参与国际货币基金组织、世界银行和世界贸易组织的治理，可以建立国际信誉，并扩大进入全球金融市场的渠道。"
 CHI_wto_implementation_idea: "世贸组织实施"
 CHI_wto_implementation_idea_desc: "多年的关税减让、服务业的开放以及与国际贸易规则的接轨，加深了我们融入全球供应链的程度，并提高了我们在贸易伙伴中的地位。"
 CHI_xinjiang_crackdown_idea: "新疆安全行动"
 CHI_xinjiang_crackdown_idea_desc: "新疆各地正在开展大规模安全行动。抵抗力量有所减弱，但代价是国内稳定受到损害。"
 chinese_african_century: "中非世纪"
 chinese_african_century_desc: "中非合作论坛数十年的投资使中国成为非洲大陆不可或缺的伙伴，重塑了非洲的人口结构、贸易流动和政治格局。"
 chinese_surveillance_systems: "中国监控系统"
 chinese_surveillance_systems_desc: "引进的安全城市平台、人脸识别摄像头和数字身份工具加强了政权抵御异议和外国情报活动的能力。"
 eurasian_land_bridge: "欧亚大陆桥"
 eurasian_land_bridge_desc: "一条畅通无阻的铁路和管道走廊连接着太平洋和大西洋，中国的标准、计量单位和海关程序决定着陆路贸易的节奏。"
 JAP_abandoned_by_ally: "被华盛顿抛弃"
 JAP_abandoned_by_ally_desc: "时机一到，美国人就退缩了。联盟名义上还在，但信任早已荡然无存，国会各派都在得出各自的结论。"
 JAP_china_engagement: "与中国接触"
 JAP_china_engagement_desc: "东京选择与北京进行公开的政治接触，以牺牲民族主义信誉为代价来减少战略摩擦。"
 JAP_export_pain: "出口之痛"
 JAP_export_pain_desc: "中国消费者持续的抵制行动，使得日本出口行业不得不争相寻找替代市场。"
 JAP_jcg_emergency_deployment: "日本海上保安厅紧急部署"
 JAP_jcg_emergency_deployment_desc: "日本海上保安厅在东海一直处于危机状态，不断向工业界征税以维持巡逻艇在海上巡逻。"
 JAP_rare_earth_diversification: "稀土多元化发展计划"
 JAP_rare_earth_diversification_desc: "一项紧急计划，旨在从澳大利亚、越南和国内回收渠道获取稀土资源。短期内会带来一些困难。"
 JAP_revisionist_pride: "复兴主义者的骄傲"
 JAP_revisionist_pride_desc: "公众对外国批评战争记忆的蔑视，巩固了国内的民族主义情绪。"
 JAP_sino_japanese_understanding: "中日谅解"
 JAP_sino_japanese_understanding_desc: "东京公报确立了与北京定期磋商和贸易优惠的制度。"
 JAP_strategic_autonomy_drift: "战略自主转移"
 JAP_strategic_autonomy_drift_desc: "随着四方安全对话降级为对话机制，日本正在悄然调整其与华盛顿的关系。"
 NKO_pro_beijing_regime: "亲北京派"
 NKO_pro_beijing_regime_desc: "平壤新政府的存亡仰赖于北京。中国顾问渗透到每个部委；每辆卡车都依赖中国石油。"
 pax_sinica: "中华治世"
 pax_sinica_consensus: "共享未来的共同体"
 pax_sinica_consensus_desc: "我们凭借数十年来耐心细致的投资、优惠融资和制度性外交，取得了全球领先地位。国际秩序承认我们的中心地位，这种承认并非出于强制，而是出于利益考量：世界与我们之间的联系是互惠互利，而非战略需要。"
 pax_sinica_desc: "我们站在我们按照自己的方式塑造的全球秩序的顶峰，“一带一路”是连接新国际体系的纽带。"
 petroyuan_settlement: "石油元结算网络"
 petroyuan_settlement_desc: "跨境能源合同越来越多地以人民币结算，使我们的行业摆脱了美元清算的瓶颈，加快了国内建设。"
 rmb_reserve_currency: "人民币作为储备货币"
 rmb_reserve_currency_desc: "人民币已加入世界储备货币篮子，这不仅打开了出口市场，也增强了我国银行承销全球复苏贷款的韧性。"
 SCO_air_defense_initiator: "上海合作组织联合防空（领导）"
 SCO_air_defense_initiator_desc: "作为上海合作组织联合防空网络的领导国，该国协调成员国之间的综合空中监视和导弹防御。"
 SCO_air_defense_member: "上海合作组织联合防空"
 SCO_air_defense_member_desc: "加入上合组织联合防空网络可以获得共享雷达覆盖和防空协调。"
 SCO_cultural_exchange_bonus: "上海合作组织文化交流"
 SCO_cultural_exchange_bonus_desc: "一项学术和文化交流计划正在促进跨境研究合作。"
 SCO_dev_bank_initiator: "上海合作组织开发银行（创始）"
 SCO_dev_bank_initiator_desc: "作为上海合作组织开发银行的创始国，该国主导着投资流动，并享有获得低息融资的特权。"
 SCO_dev_bank_member: "上海合作组织开发银行"
 SCO_dev_bank_member_desc: "加入上海合作组织开发银行可以获得发展贷款和联合投资项目。"
 SCO_development_assistance: "上海合作组织发展援助"
 SCO_development_assistance_2: "[CHI.GetAdjective]发展援助"
 SCO_development_assistance_2_desc: "在上海合作组织的框架下，我们获得了中国提供的急需发展援助。"
 SCO_development_assistance_desc: "上海合作组织正在向该国输送发展资源。"
 SCO_energy_deal_income: "上海合作组织经济伙伴"
 SCO_energy_deal_income_desc: "一项长期能源供应协议正在产生稳定的收入。"
 SCO_energy_grid_initiator: "上海合作组织输电网络（发起）"
 SCO_energy_grid_initiator_desc: "作为上海合作组织输电网的发起国，该国领导着一个横跨成员国的综合电力网络。"
 SCO_energy_grid_member: "上海合作组织输电网络"
 SCO_energy_grid_member_desc: "参与上海合作组织输电网络可以获得共享电力基础设施并降低能源成本。"
 SCO_intel_sharing_bonus: "上海合作组织情报分享"
 SCO_intel_sharing_bonus_desc: "安全的情报共享渠道正在改善反恐协调。"
 SCO_joint_drill: "上海合作组织联合军事演习"
 SCO_joint_drill_1: "上海合作组织联合演习（双边）"
 SCO_joint_drill_1_desc: "与上海合作组织伙伴国举行的双边军事演习正在加强战术协调。"
 SCO_joint_drill_desc: "参与上海合作组织范围内的联合军事演习正在提高作战准备水平。"
 SCO_joint_drill_specific: "上海合作组织联合演习（目标）"
 SCO_joint_drill_specific_desc: "与上海合作组织伙伴开展的有针对性的联合演习，旨在解决特定的作战缺口。"
 SCO_railway_initiator: "跨欧亚铁路（发起）"
 SCO_railway_initiator_desc: "作为横贯欧亚铁路的推动力量，该国享有进入这条横跨欧亚大陆贸易走廊的优越条件。"
 SCO_railway_member: "跨欧亚铁路"
 SCO_railway_member_desc: "跨欧亚铁路将该国与上海合作组织成员国之间的高容量贸易网络连接起来。"
 SCO_trade_agreement_bonus: "上海合作组织贸易协议"
 SCO_trade_agreement_bonus_desc: "在上海合作组织框架下的双边贸易机制正在促进民用工业产出。"
 CHI_airforce_modifier: "人民解放军空军"
 CHI_airforce_modifier_desc: "中国人民解放军空军，装备战斗机、轰炸机、运输机和一体化防空网络。这代表了其作战理论、训练和装备。"
 CHI_belt_and_road_initiative_idea: "“一带一路”倡议"
 CHI_belt_and_road_initiative_idea_desc: "中国的“一带一路”倡议于2013年启动，旨在为亚洲、非洲、中东和欧洲的港口建设、铁路走廊、管道、电厂和数字基础设施建设提供资金。符合条件的国家申请项目，北京负责提供资金并进行建设，每个完工的项目都能提升参与国的排名以及中国自身的国际地位。\n\n[CHIGetBRIPortTier][CHIGetBRIRailwayTier][CHIGetBRIPipelineTier][CHIGetBRITelecomTier][CHIGetBRIMineTier][CHIGetBRIPowerplantTier][CHIGetBRIIndustrialZoneTier][CHIGetBRIPrestigeTier]"
 CHI_bri_state_industrial: "“一带一路”工业项目"
 CHI_bri_state_industrial_desc: "中国支持的经济特区或工业园区扩大了当地的工厂产能、资源开采和维修基础设施。"
 CHI_bri_state_infrastructure: "“一带一路”基础设施项目"
 CHI_bri_state_infrastructure_desc: "“一带一路”基础设施项目（港口、铁路、公路或管道）加快了区域建设、码头作业和物资供应。"
 CHI_coast_guard_standoff: "海岸警卫队对峙"
 CHI_coast_guard_standoff_desc: "中国民兵与日本海上保安厅的日常冲突抑制了当地的经济活动。"
 CHI_defense_industry: "中国国防工业"
 CHI_defense_industry_desc: "中国的国防工业基础以大型国有企业集团为核心，涵盖陆地、空中、海军和电子产品生产，既供应军队，也供应出口市场。这代表了中国的军工能力。"
 CHI_diplomacy_modifier: "中国外交网络"
 CHI_diplomacy_modifier_desc: "可变的外交姿态会根据对中国外交网络的投资深度，给予或收回对每月好感度提升、贸易关系、海军投射、供应效率、对外影响力行动和政治权力的加成。"
 CHI_economy_modifier: "中国经济模式"
 CHI_economy_modifier_desc: "中国实行社会主义市场经济，将国有企业、私营企业和中央计划经济相结合，并通过一系列五年计划来推进经济活动。这体现了中国的产业基础、财政政策和贸易结构。"
 CHI_jap_industrial_partnerships: "中日产业伙伴关系"
 CHI_jap_industrial_partnerships_desc: "与日本的结构化经济合作扩大了获取精密制造、先进汽车和电子产品供应链以及民用核技术的机会。尽管考虑到历史宿怨，这种伙伴关系在国内政治上较为敏感，但它仍能带来装甲性能、空中力量机动性、海军速度、科研效率和工业产出等方面的收益。"
 CHI_korea_peninsula_modifier: "朝鲜半岛战略"
 CHI_korea_peninsula_modifier_desc: "中国与朝鲜半岛接壤，并在该地区保持着政治、经济和情报联系。这体现了北京对其东北侧地区关系、边境安全和信息网络的管控。"
 CHI_landforce_modifier: "人民解放军陆军"
 CHI_landforce_modifier_desc: "中国人民解放军陆军，根据战区指挥体系编成诸兵种合成旅。这代表了其作战理论、训练和装备。"
 CHI_navy_modifier: "人民解放军海军"
 CHI_navy_modifier_desc: "中国人民解放军海军，包括水面舰艇、潜艇、航空母舰和海军陆战队。这代表了其舰队组成、作战理论和作战范围。"
 CHI_northeast_revitalisation: "振兴东北"
 CHI_northeast_revitalisation_desc: "“振兴东北”战略将国家资金导向辽宁、吉林和黑龙江等“铁锈地带”省份，优先发展重工业、能源基础设施和工业综合体建设。苏联时期遗留下来的设施进行现代化改造，新的生产能力投入运营，以恢复该地区作为工业基地的地位。"
 CHI_political_system: "中国政治体制"
 CHI_political_system_desc: "中华人民共和国是由中国共产党领导的一党制国家，其组织形式以民主集中制和庞大的行政官僚机构为基础。以上内容概述了其治理结构、党的机构以及国家控制体系。"
 CHI_rare_earth_embargoed: "稀土禁运"
 CHI_rare_earth_embargoed_desc: "北京削减了对日本的关键稀土出口，扼杀了日本的工业产出。"
 CHI_rare_earth_embargoed_idea: "稀土禁运"
 CHI_rare_earth_embargoed_idea_desc: "北京削减了关键稀土出口，扼杀了依赖中国精炼的国防和高科技产业。"
 CHI_rural_development: "农村发展计划"
 CHI_rural_development_desc: "对农村基础设施（包括道路、公用设施和地方行政能力）的定向投资，加快了指定县的建设活动。该计划缩小了城乡收入差距，并缓解了现代化进程不平衡所引发的社会矛盾。"
 JAP_china_market_partnerships: "中国市场合作"
 JAP_china_market_partnerships_desc: "与中国消费和工业市场的深度融合提高了日本工厂的效率，稳定了消费品成本，并有助于维护国内的政治团结。民用基础设施的生产能力得以扩大，双边贸易额也维持了增长，即便其他地区的地缘政治摩擦带来了不利影响。"
