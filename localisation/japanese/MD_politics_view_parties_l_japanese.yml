 HOL.Nat_Populism2006: "£HOL_nationalist_right_wing_populist2006 (PVV) 自由党"
 HOL.Nat_Populism2006_icon: "£HOL_nationalist_right_wing_populist2006"
 HOL.Nat_Populism2006_desc: "右派ポピュリズム - 自由党（オランダ語：Partij voor de Vrijheid, PVV）2006年にヘルト・ウィルダースが自由民主国民党を離党した後、設立した自由党は、厳格な移民制限、政治的イスラムへの強い反対、そしてオランダの国家主権の再確立を主張している。同党はEUのさらなる統合に反対し、国境管理の強化と国内立法に対するより強力な統制を求めている。ウィルダースの対立的なスタイルと文化保護への重点的な姿勢により、PVVは確固たる支持基盤を築き上げ、オランダで最も影響力のあるポピュリスト運動の一つとして、また政治体制に対する一貫した挑戦者として位置づけられている。"
 SIN.Nat_Populism: "£SIN_conservatism (PAP) 人民行動党 - §Y ナショナリズム派閥§!"
 SIN.Nat_Populism_desc: "人民行動党(PAP)は1950年代後半からシンガポールで政権を握っている。多くの者からは美化された寡頭政治と見なされる一方、シンガポールの経済発展にも貢献してきた。PAPが実施する政策は本質的には保守的であり、真に西洋的なものというレッテルを拒絶している。\n\n§Yナショナリズム派閥§!は国内利益を最優先し、国家の敵と見なす国々との対立も躊躇しない強硬右派勢力だ。"
 SIN.Nat_Populism_icon: "£SIN_conservatism"
 BOL.conservatism_democratas: "£BOL_western_conservative_democratas (MDS) 社会民主主義運動"
 BOL.conservatism_democratas_icon: "£BOL_western_conservative_democratas"
 BOL.conservatism_democratas_desc: ""
 BOL.Neutral_Libertarian: "£BOL_western_liberal (UCS) 市民連帯連合"
 BOL.Neutral_Libertarian_icon: "£BOL_western_liberal"
 BOL.Neutral_Libertarian_desc: "自由保守主義 - 市民連帯連合（スペイン語：Unidad Cívica Solidaridad, UCS）\n\n市民連帯連合は、個人主義的かつ実業家層の支援を受けた政党として台頭し、イデオロギー的な純粋さよりも雇用、安定、近代化を約束することで、現実主義的かつ市場志向の政党としての立場を打ち出した。同党は、連立や交渉力を通じて影響力を築き上げ、議会での支持と引き換えに、政府への参画や恩恵配分のネットワークへのアクセスを得ていた。ボリビアの分断された政治情勢において、UCSは、より大きな政治ブロックが票を必要とする際に、柔軟な「キングメーカー」としての立場を取ることで生き残っている。"
 BOL.neutral_Social_mir: "£BOL_neutral_social_mir (MIR–NM) 革命左翼運動・新多数"
 BOL.neutral_Social_mir_icon: "£BOL_neutral_social_mir"
 BOL.neutral_Social_mir_desc: "社会民主主義 - 革命左翼運動・新多数 (スペイン語：Movimiento de la Izquierda Revolucionaria - Nueva Mayoría, MIR-NM)\n\n1971年に左派キリスト教民主主義勢力と学生急進派の潮流から結成された革命左翼運動は、後に分裂し、ハイメ・パス・サモラに忠実な派閥は、より穏健な改革主義的な綱領を掲げて「革命左翼運動-新多数」と改称した。マルクス主義の教条や階級闘争の政治から距離を置いたMIR-NMは、ボリビアの連立政権体制において権力獲得のための交渉に積極的に取り組む、現実的な社会民主主義勢力として再定位した。その遺産は、経済と政治の中道派を再構築した現実的な取引と結びついた改革主義的なレトリックによって特徴づけられている。"
 BOL.Nat_Populism: "£BOL_Nat_Populism (PDC) キリスト教民主党"
 BOL.Nat_Populism_icon: "£BOL_Nat_Populism"
 BOL.Nat_Populism_desc: "右派ポピュリズム - キリスト教民主党（スペイン語：Partido Democrata Cristiano, PDC）\n\nキリスト教民主党は、バンサー政権時代において独裁政権に反対し、人権と自由選挙を擁護した社会キリスト教系政党として発足した。時が経つにつれ、党の一部はより強硬な路線へと移行し、宗教的保守主義とナショナリズム的なレトリック、そしてポピュリスト的な選挙運動を融合させていった。分断されたボリビアの政治情勢において、PDCは秩序、伝統的価値観、そして旧来のエリート間の取引を拒絶する道徳的な政治を求める有権者に訴えかけている。"
 BOL.Nat_Fascism: "£BOL_Nat_Fascism (UJC) クルセニスト青年連合"
 BOL.Nat_Fascism_icon: "£BOL_Nat_Fascism"
 BOL.Nat_Fascism_desc: "超国粋主義 - クルセニスト青年連合（スペイン語：Union Juvenil Crucenista, UJC）\n\nクルセニスト青年連合は、サンタ・クルス州の地域ナショナリズムと街頭運動に根ざした過激な極右運動である。同団体は、ラ・パスや先住民系左派の政治勢力に対する東部低地の守護者であると自任しており、威嚇や衝突、そして規律ある幹部層を駆使して、選挙の枠を超えた権力を誇示している。二極化が激化すると、UJCは対立を糧に勢力を拡大し、強硬かつ排他的な秩序を要求する。"
 IRQ.Western_Autocracy: "£generic_Western_Autocracy_small (CPA) 連合国暫定当局"
 IRQ.Western_Autocracy_desc: "親西側占領 - イラク暫定統治機構は、多国籍連合軍によるイラク侵攻後に設立されたイラクの暫定政府である。"
 PER.Neutral_Autocracy2: "£PER_Neutral_Autocracy (UMI) 国連イラン派遣団"
 LAT.Western_Autocracy_icon: "£LAT_western_autocracy"
 LAT.Western_Autocracy_alt: "£LAT_western_autocracy_alt (RP) 改革党"
 LAT.Western_Autocracy_alt_icon: "£LAT_western_autocracy_alt"
 LAT.Western_Autocracy_alt_desc: "自由保守主義 - 改革党（ラトビア語：Reformu partija）\n\n 改革党は、ヴァルディス・ザトラーズによって設立された自由主義政党である。RPは、国内における汚職やオリガルヒの影響力との闘いを支持しており、いわゆる「オリガルヒ政党」との協力にも反対している。"
 LAT.Western_Autocracy_alty: "£LAT_western_autocracy_alty (LRA) ラトビア地域連合"
 LAT.Western_Autocracy_alty_icon: "£LAT_western_autocracy_alty"
 LAT.Western_Autocracy_alty_desc: "地域政党 - ラトビア地域連合（ラトビア語：Latvijas Reģionu apvienība）\n\n ラトビア地域連合は、議会選挙に参加するための地域政党の連合として設立され、後に地域支部に広範な自治権を認める単一政党へと統合された。同党は、持続可能かつ公平な経済発展を提唱し、地方自治を支持している。"
 LAT.Western_Autocracy_altyn: "£LAT_western_autocracy_altyn (KPV) 国家の所有者は誰か？"
 LAT.Western_Autocracy_altyn_icon: "£LAT_western_autocracy_altyn"
 LAT.Western_Autocracy_altyn_desc: "ポピュリズム - 国家の所有者は誰か？（ラトビア語：Kam pieder valsts?）\n\n 国家の所有者は誰か？は、アルトゥス・カイミンスによって設立されたポピュリスト政党である。同党は汚職やエリート主義に反対し、伝統的価値観、国家の透明性、社会的支援を提唱している。"
 LAT.Western_Autocracy_altynu: "£LAT_western_autocracy_altynu (PCL) 人道的なラトビアのために"
 LAT.Western_Autocracy_altynu_icon: "£LAT_western_autocracy_altynu"
 LAT.Western_Autocracy_altynu_desc: "ポピュリズム - 人道的なラトビアのために（ラトビア語：Par Cilvēcīgu Latviju）\n\n 「人道的なラトビアのために」は、右派ポピュリスト、ポピュリスト、ヴァレンス・ポピュリスト、反体制派、そしてユーロ懐疑派と評されてきた。"
 LAT.conservatism_icon: "£LAT_western_conservative"
 LAT.conservatism_alt: "£LAT_western_conservative_alt (V) Unity"
 LAT.conservatism_alt_icon: "£LAT_western_conservative_alt"
 LAT.conservatism_alt_desc: "(Conservative Liberalism) - The Unity (Latvian: Vienotība)\n\n Vienotība is a liberal conservative party, originally formed as an electoral alliance of several parties, including The New Era Party. The party advocates for fiscal conservatism, a pro-European foreign policy, and is a member of the European People's Party."
 LAT.conservatism_alty: "£LAT_western_conservative_alty (JV) New Unity"
 LAT.conservatism_alty_icon: "£LAT_western_conservative_alty"
 LAT.conservatism_alty_desc: "(Conservative Liberalism) - The New Unity (Latvian: Jaunā Vienotība)\n\n Jaunā Vienotība is a liberal conservative allience, founded on the basis of The Unity Party, which includes many regional parties with similar political programm. The allience advocates for fiscal conservatism, a pro-European foreign policy, and is a member of the European People's Party."
 LAT.liberalism_icon: "£LAT_western_liberal"
 LAT.liberalism_alt: "£LAT_western_liberal_alt (LPP/LC) Latvia's First Party/Latvian Way"
 LAT.liberalism_alt_icon: "£LAT_western_liberal_alt"
 LAT.liberalism_alt_desc: "(Big Tent) - The Latvia's First Party/Latvian Way (Latvian: Latvijas Pirmā partija/Latvijas Ceļš)\n\n LPP/LC is a liberal allience between the Latvia's First Party and Latvian Way. The allience advocates for democratization, individual rights, but both parties participates in different organisations, LC in ALDE and LPP in European People's Party."
 LAT.liberalism_alty: "£LAT_western_liberal_alty (LA) For Latvia's Development"
 LAT.liberalism_alty_icon: "£LAT_western_liberal_alty"
 LAT.liberalism_alty_desc: "(Classical Liberalism) - For Latvia's Development (Latvian: Latvijas attīstībai)\n\n LA is a classical liberal party founded by a popular politician Einars Repše. The party favors the free market, the rule of law, and individual rights, and is also a member of the Alliance of Liberals and Democrats for Europe Party."
 LAT.socialism_icon: "£LAT_western_social"
 LAT.socialism_alt: "£LAT_western_social_alt (PRO) The Progressives"
 LAT.socialism_alt_icon: "£LAT_western_social_alt"
 LAT.socialism_alt_desc: "(Nordic Model) - The Progressives (Latvian: Progresīvie)\n\n PRO is a progressive political party established on the basis of an NPO of the same name. PRO advocates for implementing of the Nordic model in Latvia and the creation of gender quotas. The party also advocates for green initiatives, slowing down economic growth in favor of introducing social and gender equality and increasing Latvia's role in Western organizations, PRO is also a member of the European Green Party."
 LAT.Communist-State: "£LAT_communist_state (LSP) Socialist Party of Latvia"
 LAT.Communist-State_icon: "£LAT_communist_state"
 LAT.Communist-State_desc: "(Communism) - The Socialist Party of Latvia (Latvian: Latvijas Sociālistiskā partija)\n\n LSP is a communist party founded in 1994 after the Latvian Communist Party was banned by former party functionaries. The LSP condemned Latvia's secession from the USSR and characterized it as a national bourgeois coup, now the party is extremely left-wing and popular among the Russian-speaking population."
 LAT.anarchist_communism_icon: "£LAT_anarchist_communism"
 LAT.anarchist_communism_alt: "£LAT_anarchist_communism_alt (TKL) People's Servants for Latvia"
 LAT.anarchist_communism_alt_icon: "£LAT_anarchist_communism_alt"
 LAT.anarchist_communism_alt_desc: "(Syndicalist Economy) - The People's Servants for Latvia (Latvian: Tautas kalpi Latvijai)\n\n TKL was founded as a result of a merger of several left-wing pro-Russian parties. The party advocates the creation of a syndicalist economy in latvia, also supports the expansion of social assistance"
 LAT.Conservative: "£LAT_conservative (PCTVL) 統一ラトビアにおける人権のために"
 LAT.Conservative_icon: "£LAT_conservative"
 LAT.Conservative_desc: "ロシア系少数民族の利益 - 統一ラトビアにおける人権のために（ラトビア語：Par cilvēka tiesībām vienotā Latvijā）\n\n 「統一ラトビアにおける人権のために」は、非市民、特にロシア人の権利を擁護する様々な親ロシア政党による選挙連合として設立され、その結果、PCTVLはロシア語話者の間で支持を集めている。同党は、ラトビアにおけるすべての民族の平等、非市民制度の廃止、および西側諸国の組織からの離脱を主張している。"
 LAT.Conservative_alt: "£LAT_conservative_alt (LKS) ラトビア・ロシア連合"
 LAT.Conservative_alt_icon: "£LAT_conservative_alt"
 LAT.Conservative_alt_desc: "ロシア系少数民族の利益 - ラトビア・ロシア連合（ラトビア語：Russkiy soyuz Latvii）\n\n ラトビア・ロシア連合は、非市民、特にロシア人の権利を擁護する様々な親ロシア政党による選挙連合として設立され、その結果、LKSはロシア語話者の間で支持を集めている。同党は、ラトビアにおけるすべての民族の平等、非市民制度の廃止、および西側諸国の組織からの離脱を主張している。"
 LAT.Autocracy: "£LAT_autocracy (RP) 行動党"
 LAT.Autocracy_icon: "£LAT_autocracy"
 LAT.Autocracy_desc: "親ロシア欧州懐疑主義 - 行動党（ラトビア語：Rīcības partija）\n\n 行動党は、ラトビアの西側諸国への加盟に反対し、ロシアとの親密化を支持する欧州懐疑主義政党である。結党当初は左派的な立場をとっていたが、時を経て右派へと移行した。また、非市民の地位の廃止を支持し、ロシアの政治的決定を支持している。"
 LAT.Neutral_Autocracy_alt: "£LAT_neutral_autocracy_alt (LZS) ラトビア農民連合"
 LAT.Neutral_Autocracy_alt_icon: "£LAT_neutral_autocracy_alt"
 LAT.Neutral_Autocracy_alt_desc: "農本保守主義 - ラトビア農民連合（ラトビア語：Latvijas Zemnieku savienība）\n\n ラトビア農民連合は、1917年の独立戦争中に結成された、ラトビアで最も古い政党の一つである。同党は保守派運動の中で最も影響力のある存在であったが、独裁政権の樹立後に禁止された。ソビエト連邦崩壊後、ラトビアに戻ったいくつかのグループが同党の系譜を主張し、後に単一のLZSが結成された。同党は中道的な立場をとっているが、党員がかなり保守的かつ民族主義的な言説を口にすることも少なくない。"
 LAT.Neutral_conservatism_icon: "£LAT_neutral_conservative"
 LAT.Neutral_conservatism_alt: "£LAT_neutral_conservative_alt (KDS) Christian Democratic Union"
 LAT.Neutral_conservatism_alt_icon: "£LAT_neutral_conservative_alt"
 LAT.Neutral_conservatism_alt_desc: "(National Conservatism) - The Christian Democratic Union (Latvian: Kristīgi Demokrātiskā Savienība)\n\n KDS is a political party founded in 1991 and adhering to Christian-democratic ideas. In many respects, the party has taken as a basis the program of the German CDU party. The KDS also supports infrastructure development, Christian values and is a member of the European Christian Political Movement."
 LAT.Neutral_conservatism_alty: "£LAT_neutral_conservative_alty (JKP) New Conservative Party"
 LAT.Neutral_conservatism_alty_icon: "£LAT_neutral_conservative_alty"
 LAT.Neutral_conservatism_alty_desc: "(Conservatism) - The New Conservative Party (Latvian: Jaunā Konservatīvā Partija)\n\n JKP a conservative party with an anti-corruption agenda. The party has participated in elections with varying success and has significant strength at the municipality level."
 LAT.Neutral_conservatism_altyn: "£LAT_neutral_conservative_altyn (AS) United List"
 LAT.Neutral_conservatism_altyn_icon: "£LAT_neutral_conservative_altyn"
 LAT.Neutral_conservatism_altyn_desc: "(Regionalism) - The United List (Latvian: Apvienotais Saraksts)\n\n AS is an electoral allience of various regional and major parties with a conservative agenda. It favors equal regional development and supports Latvian statehood however, the party is known for supporting a convicted oligarch Aivars Lembergs for the post of Prime Minister."
 LAT.oligarchism_icon: "£LAT_oligarchism"
 LAT.oligarchism_alt: "£LAT_oligarchism_alt (AL) ラトビアの目覚め"
 LAT.oligarchism_alt_icon: "£LAT_oligarchism_alt"
 LAT.oligarchism_alt_desc: "社会保守主義 - ラトビアの目覚め（ラトビア語：Atmoda Latvijai）\n\nラトビアの目覚めは、元監査役のイングナ・スドラバによって設立された政党である。ALは標準的な保守的な政策を掲げるとともに、公正な賃金と年金を提唱している。また、この党はオリガルヒとのつながりや、資金調達の不透明さでも知られている。"
 LAT.oligarchism_alty: "£LAT_oligarchism_alty (ST!) 安定のために！"
 LAT.oligarchism_alty_icon: "£LAT_oligarchism_alty"
 LAT.oligarchism_alty_desc: "ロシア系少数民族の利益 - 安定のために！（ラトビア語：Stabilitātei!）\n\n 安定のために！は、2021年にリガ市議会の元議員らによって設立されたポピュリスト政党である。同党は自らを中道派と位置づけ、新型コロナウイルス感染症（COVID-19）に関連する規制に反対している。また、ST!はロシア系少数民族の利益も支持している。"
 LAT.oligarchism_altyn: "£LAT_oligarchism_altyn (VPG) 全ラトビア党「21世紀」"
 LAT.oligarchism_altyn_icon: "£LAT_oligarchism_altyn"
 LAT.oligarchism_altyn_desc: "社会保守主義 - 全ラトビア党「21世紀」（ラトビア語：Vislatvijas partija \"21. gadsimts\"）\n\n 全ラトビア党「21世紀」は2005年に結成され、保守的な思想を掲げている。同党は自らをラトビアの多数派の代表と称し、キリスト教の伝統的価値観を支持している。また、VPGは西側諸国の機関からの独立を主張し、親ロシア派の政党と協力関係にある。"
 LAT.Neutral_Libertarian_icon: "£LAT_neutral_libertarian"
 LAT.Neutral_Libertarian_alt: "£LAT_neutral_libertarian_alt (VL) ラトビアのための団結"
 LAT.Neutral_Libertarian_alt_icon: "£LAT_neutral_libertarian_alt"
 LAT.Neutral_Libertarian_alt_desc: "古典的自由主義 - ラトビアのための団結（ラトビア語：Vienoti Latvijai）\n\n ラトビアのための団結は、著名な政治家でありオリガルヒでもあるアイナルス・シュレサーズによって設立された自由主義政党である。VLは経済的自由主義を掲げており、親ロシア派政党との協力を拒むことはないが、ラトビアの西側諸国組織への加盟を支持している。"
 LAT.neutral_Social_icon: "£LAT_neutral_socialism"
 LAT.neutral_Social_alt: "£LAT_neutral_socialism_alt (\"Saskaņa\") Social Democratic Party \"Harmony\""
 LAT.neutral_Social_alt_desc: "(Social Democracy) - The Social Democratic Party \"Harmony\" (Latvian: Sociāldemokrātiskā partija \"Saskaņa\")\n\n \"Saskaņa\" is the largest political party representing the interests of the Russian minority. The party was founded on the basis of the Electoral Bloc \"Saskaņa\", which included a large number of left-wing pro-Russian political parties. The party supports social democracratic policies and supports the rights of non-citizens."
 LAT.Nat_Populism_icon: "£LAT_national_populist"
 LAT.Nat_Populism_alt: "£LAT_national_populist_alt (NA) 国民連合"
 LAT.Nat_Populism_alt_icon: "£LAT_national_populist_alt"
 LAT.Nat_Populism_alt_desc: "民族主義的保守主義 - 国民連合「すべてをラトビアのために！- \"祖国と自由のために/ LNNK\"」 (ラトビア語：Nacionālā apvienība \"Visu Latvijai!\" - \"Tēvzemei un Brīvībai/LNNK\"Tēvzemei un Brīvībai/LNNK)\n\n国民連合（NA）はラトビア最大の民族主義政党であり、「すべてはラトビアのために！」と「祖国と自由のために/LNNK」の選挙連合として設立された。NAは民族主義的な立場をとり、単一民族国家としてのラトビアという理念を支持している。また、同党はさらなる経済規制緩和を提唱し、ラトビアの西側諸国組織への加盟を支持している。"
 LAT.Nat_Fascism: "£LAT_national_fascism (NST) 国民連合「正義」"
 LAT.Nat_Fascism_icon: "£LAT_national_fascism"
 LAT.Nat_Fascism_desc: "超国粋主義 - 国民連合「正義」（ラトビア語：Nacionālā Savienība \"Taisnīgums\"）\n\n 国民連合「正義」は、ラトビア民族の排他性を主張する超国粋主義政党である。同党の支持者は、第二次世界大戦中にドイツ側で戦った「森の兄弟」やラトビア人軍人を称えることで知られている。また、ゲイ・プライド・パレードやソ連時代の記念碑に対する反対運動でも有名である。"
 LAT.Nat_Autocracy_icon: "£LAT_military_junta"
 LAT.Monarchist: "£LAT_monarchism (KMK) クールラント貴族会議"
 LAT.Monarchist_icon: "£LAT_monarchism"
 LBA.Caliphate_reform: "£LBA_Caliphate (LIM) リビア・イスラム運動"
 LBA.Caliphate_reform_desc: "サラフィー・ジハード主義 - リビア・イスラム運動（アラビア語ローマ字表記：Al-Harakat Al-Islamiya Al-Libiya）\n\nリビア・イスラム運動は、リビア・イスラム戦闘員グループが名称を変更した組織である。同運動は、目標達成のためにより民主的な方法を模索していると表明しているが、その戦闘員の多くは依然としてアルカイダと関係を持っている。"
 LBA.Nat_Autocracy_rebels: "£generic_Nat_Autocracy_small (NLA) 国民解放軍"
 LBA.Nat_Autocracy_rebels_desc: "軍事政権 - 国民解放軍（アラビア語ローマ字表記：Jaysh Al-Tahrir Al-Watani Al-Libi）\n\n自由リビア共和国国民解放軍（国民解放軍）は、国民移行評議会の下で共同して戦う様々な民兵組織、武装勢力、武装グループ、革命家たちから成る連合体である。この組織は当初「自由リビア軍」として発足したが、部隊の専門性の向上をアピールするため、すぐに名称を変更した。しかし、より専門的なアプローチが取られているにもかかわらず、派閥争いや内部抗争は依然として頻発しており、この軍が将来どのような姿になるかは不透明である。"
 LBA.Nat_Autocracy_LNA: "£generic_Nat_Autocracy_small (LNA) リビア国民軍"
 LBA.Nat_Autocracy_LNA_desc: "軍事政権 - リビア国民軍（アラビア語ローマ字表記：Jaysh Al-Watani Al-Libi）\n\nリビア国民軍は、内戦中に国民過渡評議会の武装勢力として活動していた国民解放軍を前身として創設された。リビア国民軍は、国内の様々な民兵組織を単一の結束した部隊に統合し、カッザーフィー派ではない専門的な軍隊を再建する任務を負っている。"
 LAT.neutral_Social_alt_icon: "£LAT_neutral_socialism_alt"
 CZE.Monarchist: "£CZE_Monarchism コルナ・チェスカ"
 CZE.Monarchist_icon: "£CZE_Monarchism"
 CZE.Monarchist_desc: "コルナ・チェスカ（ボヘミア・モラビア・シレジア君主主義党）は、チェコ共和国における小政党であり、同国における立憲君主制の復活を提唱している。同党は1990年のビロード革命後に結成され、以来、君主制の復活がチェコの政治体制に安定と継続性をもたらすとして、その実現に向けて活動してきた。また、同党は伝統的な価値観や文化遺産の振興を図り、欧州および世界におけるチェコ共和国の役割強化を目指している。"
 PHI.conservatism_icon: "£PHI_conservatism"
 PHI.liberalism_icon: "£PHI_liberalism"
 PHI.anarchist_communism_icon: "£PHI_anarchist_communism"
 PHI.Neutral_conservatism_icon: "£PHI_Neutral_conservatism"
 PHI.oligarchism_icon: "£PHI_oligarchism"
 PHI.Neutral_Communism_icon: "£PHI_Neutral_Communism"
 PHI.Neutral_Social_icon: "£PHI_neutral_social"
 PHI.Neutral_Autocracy_icon: "£PHI_neutral_autocracy"
 PHI.Neutral_green: "£PHI_Neutral_green (PROMDI) 進歩的地方分権運動"
 PHI.Neutral_green_icon: "£PHI_Neutral_green"
 PHI.Neutral_green_desc: "中道緑の政治 - 進歩的地方分権運動(PROMDI)は、地方分権、連邦制、環境保護主義、そしてフィリピンの核武装化を掲げる政党である。同党は、より大きなLakas-CMDから分裂したグループであるが、彼らとの距離を置いている。議会制を提唱している点で、体制支持的な考え方に異を唱えている。これによりフィリピン政治に大きな変革をもたらし、国民のより比例的な代表を実現するだろう。"
 PHI.Nat_Populism_Icon: "£PHI_Nat_Populism"
 PHI.Nat_Autocracy_icon: "£PHI_Nat_Autocracy"
 TNZ.Nat_Autocracy_icon: "£TNZ_nat_autocracy"
 SHA.Autocracy_desc: "独裁体制／アラブ社会主義 - サギア・エル・ハムラおよびリオ・デ・オロ解放人民戦線 \n\n（アラビア語ローマ字表記：al-Jabhah al-Sha'biyah Li-Taḥrīr as-Sāqiyah al-Ḥamrā wa Wādī al-Dhahab）\n\n（スペイン語：Frente Popular de Liberación de Saguía el Hamra y Río de Oro）\n\nポリサリオ戦線は、1973年5月にサハラウィ民族主義者のエル・オウアリ・ムスタファ・サイードによって設立され、西サハラにおけるスペインの植民地支配に対して武装闘争を開始した。1975年にスペインが撤退したことで紛争の様相は変わり、その後、この地域はモロッコとモーリタニアによって占領された。これに対し、ポリサリオ戦線は1976年2月にサハラ・アラブ民主共和国を宣言し、両国に対してゲリラ戦を展開した。軍事的な圧力により、モーリタニアは1979年に撤退を余儀なくされ、1991年に国連が仲介した停戦合意が成立するまで、戦争はモロッコとのみ継続することとなった。"
 SHA.Neutral_Autocracy: "£SHA_Autocracy_small2 (KS) ポリサリオ戦線カト・アル・シャヒド"
 SHA.Neutral_Autocracy_icon: "£SHA_Autocracy_small2"
 SHA.Neutral_Autocracy_desc: "非同盟独裁体制 - ポリサリオ戦線カト・アル・シャヒド（ポリサリオ戦線殉教者の列）\n\n（アラビア語：Jabhah al-Bulīṣāriū Khaṭṭ al-Shahīd）\n\nポリサリオ戦線カト・アル・シャヒドは、主流派ポリサリオ戦線の反体制派である。ポリサリオの創設者で殉教者でもあるエル・オウアリ・ムスタファ・サイードにちなんで名付けられたこのグループは、1991年の停戦以来の政治的進展の欠如を批判し、戦略と指導部の変更を提唱している。彼らは主にヨーロッパを拠点としており、主流派のポリサリオとは異なり、西サハラ紛争における外交的膠着状態を打破するために、より過激な措置を求めている。同派は軍事部門を持たず、政治的な反対運動として活動している。"
 SHA.Nat_Autocracy: "£generic_Nat_Autocracy_small (SPLA) サハラ人民解放軍"
 SHA.Nat_Autocracy_desc: "軍事政権 - サハラ・アラブ民主共和国軍\n\n（アラビア語ローマ字表記：Jaysh al-Tahrir al-Sha'bi al-Sahrāwī）\n\nサハラ・アラブ人民解放軍（SPLA）は、ポリサリオ戦線およびサハラ・アラブ民主共和国の公式な軍事部門として機能している。武装闘争を遂行するために結成されたSPLAは、当初スペインの植民地支配に対して、そして1975年の西サハラ分割後はモロッコおよびモーリタニアの軍隊に対して展開されたゲリラ戦争の中心的な役割を果たした。主にアルジェリアの難民キャンプを拠点として活動したSPLAは、1991年の停戦までモロッコの壁（ベルム）沿いでモロッコ軍と交戦した。SPLAは現在もSADRの常備軍として存続しており、ベルム以東の解放地域を防衛する任務を担っている。"
