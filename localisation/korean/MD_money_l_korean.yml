 bankruptcy_cheap_loans_from_african_investment_fund_desc: "아프리카 통화 기금의 설립으로 우리는 국제 통화 기금에서는 얻을 수 없던 차관을 빌릴 수 있게 되었습니다. 이를 이용해서 기존 부채의 일부를 상환함으로써 이자 부담을 일시적으로 줄일 것입니다. 다만 이는 1년 뒤 이자율이 다시 되돌아오기 때문에 임시적인 대책에 불과합니다."
