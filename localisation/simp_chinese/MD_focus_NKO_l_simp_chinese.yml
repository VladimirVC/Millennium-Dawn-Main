 korea_russia.53.t: "潜艇技术"
 korea_russia.53.d: "俄罗斯向我们提供了更好的技术，使我们能够改进潜艇，这都要感谢朝鲜领导人推动发展核动力潜艇。"
 korea_russia.53.a: "保佑我们的领袖"
 korea.135.t: "黑客行动成功"
 korea.135.d: "我们的黑客渗透了西方国家的银行基础设施，并抽走了大量资金。部分资金在通过秘密渠道转移回国内的过程中损失了，但这次行动取得了成功。"
 korea.135.a: "干得好"
 korea.136.t: "朝鲜黑客攻击了我们"
 korea.136.d: "朝鲜黑客对我国银行基础设施发动了网络攻击，意图窃取资金。我们应进行报复性行动，或者向国际社会寻求帮助。"
 korea.136.a: "出人意料"
 korea.137.t: "毒品泛滥街头"
 korea.137.d: "新一波毒品涌入街头。来源尚未确认，但我们须谨慎行事，生产率已受影响。"
 korea.137.a: "帮扶成瘾人士"
 korea.137.b: "我们又能做些什么呢？"
 korea.138.t: "毒品行动成功"
 korea.138.d: "新一轮毒品已涌入敌方街头。他们必须投入资金遏制危机，而我们则坐收渔利。持续对特工机构的投资将确保财源滚滚。"
 korea.138.a: "干得好！"
 korea.139.t: "伪造美元行动"
 korea.139.d: "我们已经印制好伪造的百元美钞，将通过秘密渠道流入外国市场，并通过我们的黑市网络洗白所得。这一计划带来的稳定收入将用于资助后续行动。"
 korea.139.a: "干得好！"
