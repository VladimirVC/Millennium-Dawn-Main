 CHI_Normalise_the_Hermit: "使隐士正常化"
 CHI_Normalise_the_Hermit_desc: "随着改革的深入，我们支持朝鲜正式重新融入地区经济和外交渠道，结束了数十年的孤立状态，并将自己定位为平壤开放的缔造者。"
 CHI_Nuclear_Insurance: "核保险"
 CHI_Nuclear_Insurance_desc: "我们实际上承认朝鲜的核武库是一种威慑力量，而非负担。通过承认平壤的核国家地位，我们既能防止朝鲜政权崩溃，又能招致国际社会的谴责。"
 CHI_operation_new_dawn_desc: "对平壤领导层发动一次果断的特种部队行动。张成泽和太子党的关系网将决定这场行动的最终结果是干净利落的政变、内战，还是灾难性的后果。"
 CHI_palm_and_fingers_doctrine: "掌指学说"
 CHI_palm_and_fingers_doctrine_desc: "西藏是手掌，拉达克、尼泊尔、锡金、不丹和藏南是手指。战略理论要求这五个地区都发挥作用。"
 CHI_pla_divestiture_completion: "解放军资产剥离完成"
 CHI_pla_divestiture_completion_desc: "解放军长期以来一直被要求剥离其庞大的商业帝国，这些商业帝国涵盖酒店、制药公司和贸易公司等领域。完成这一进程将使军队重新专注于战争，并消除军官腐败的一个主要根源。一支经营酒店的军队是不会考虑战争的。"
 CHI_Pyongyang_Pivot: "平壤枢纽"
 CHI_Pyongyang_Pivot_desc: "中国并不鼓励朝鲜政权强硬，而是鼓励其采取谨慎的经济开放模式，效仿邓小平的改革路线。一个更加繁荣的朝鲜将是一个更加稳定的邻国，也是一个更容易合作的伙伴。"
 CHI_Rare_Earth_Leverage: "稀土杠杆"
 CHI_Rare_Earth_Leverage_desc: "韩国先进的电子和半导体产业严重依赖中国的稀土出口。利用这种依赖性，我们可以深化经济联系，并增强我们对首尔外交政策考量的影响力。"
 CHI_Rason_SEZ_Expansion: "罗先经济特区"
 CHI_Rason_SEZ_Expansion_desc: "朝鲜东北沿海的罗先经济特区为经济现代化提供了一个试点案例。中国的投资可以打开港口通道，促进资源流动，同时也能证明渐进式改革的可行性。"
 CHI_Sanctions_Evasion: "规避制裁"
 CHI_Sanctions_Evasion_desc: "在公开支持国际制裁的同时，我们可以暗中允许跨境贸易和资金流动继续进行。这会加深朝鲜对中国的依赖，同时还能保持一定的否认余地，尽管一旦被发现，将会损害与西方的关系。"
 CHI_sco_balance_display: "$CHI_sco_balance$: [?CHI_sco_balance]"
 CHI_sco_cohesion_display: "$CHI_sco_cohesion$: [?CHI_sco_cohesion]"
 CHI_scs_island_construction_campaign: "造岛运动"
 CHI_scs_island_construction_campaign_desc: "启动南沙群岛多年疏浚和建设工程。将水下礁石抬升为可容纳永久性设施的人工岛屿，使中国主张的有效行政范围扩大数千平方公里。"
 CHI_shanghai_clique_ascendant_desc: "外滩的灯光照耀着各个部门。浦东的会计师如今也身居国务院要职。这种人脉网络的影响远超其教义本身。"
 CHI_shanghai_clique_leaning_desc: "外滩的人脉网络在每个部委都有影响力。省级代表们则将希望寄托在浦东身上。"
 CHI_Six_Party_Talks: "六方会谈"
 CHI_Six_Party_Talks_desc: "六方会谈汇聚了中国、美国、俄罗斯、日本和朝韩各方，旨在协商解决朝鲜核危机。通过主办这些会谈，我们可以将自身定位为不可或缺的调解人，并改善与各方的关系。"
 CHI_technocratic_consolidation_desc: "国务院研究室是国家。五年计划是在政治局会议之前而不是之后制定的。"
 chi_the_one_china_policy: "一个中国政策"
 CHI_water_pricing_reform: "工业用水价格改革"
 CHI_water_pricing_reform_desc: "政府并未从供给侧进行工程改造，而是通过价格手段来减少浪费。工业用水价格大幅上涨，迫使重工业采用循环利用技术，并将生产转移到水资源相对优势的地区。农民则抵制由此带来的成本上涨。"
 CHI_Yalu_Defense_Pact: "鸭绿江防御条约"
 CHI_Yalu_Defense_Pact_desc: "沿鸭绿江的正式防御安排将我们的军事计划与朝鲜的军事计划联系起来，在保证我们享有通行权的同时，也承诺共同防御。"
 CHI_youth_league_leaning_desc: "团派的校友在半数省份担任副手职务。裙带关系的平衡正在悄然而稳步地发生变化。"
 CHI_youth_league_resurgent_desc: "所有五十岁以下的省人大代表都是通过共青团晋升上来的。这批人已经到位。接下来是议程。"
 paektu_doctrine_southern: "白头山主义南方警告"
 uighur_threat_display: "$uighur_threat$: [?CHI.uighur_threat]"
 CHI_back_princeling_network: "支持太子党网络"
 CHI_back_princeling_network_desc: "将赞助资源导向革命精英的子弟和上海权贵阶层，从而将权力平衡向太子党派系倾斜。"
 CHI_promote_youth_league: "提拔共青团干部"
 CHI_promote_youth_league_desc: "先遣官员通过共青团晋升，使权力平衡向团派倾斜。"
 CHI_SAR_one_china_framework: "一个中国框架"
 CHI_SAR_one_china_framework_desc: "北京重申其对所有特别行政区和领土的管辖权具有宪法依据。该框架确立了中央统一的政策方向，同时承认各地区独特的行政安排。"
 CHI_SAR_liaison_office_reform: "联络处改革"
 CHI_SAR_liaison_office_reform_desc: "国务院将驻各特别行政区联络办公室重组为一个更加一体化的协调网络。简化北京与各特别行政区之间的沟通渠道，有助于加快政策实施，减少行政摩擦。"
 CHI_SAR_national_security_framework: "国家安全架构"
 CHI_SAR_national_security_framework_desc: "统一的国家安全机构覆盖了所有特别行政区。解放军驻军、国家安全局和地方公安机关之间的协调在中央监督下正式确立。"
 CHI_SAR_two_systems_commitment: "对两种制度的承诺"
 CHI_SAR_two_systems_commitment_desc: "北京正式重申对所有符合条件的特别行政区实行“一国两制”原则。宪法框架内保障高度自治，表明北京倾向于采取包容而非一体化的政策。"
 CHI_SAR_research_sharing: "特别行政区研究合作"
 CHI_SAR_research_sharing_desc: "北京方面建立联合研究项目，将大陆高校和国家实验室与特区科研机构联系起来。此举旨在深化学术和技术联系，同时提升中国的整体科研能力。"
 CHI_SAR_military_corporation_sharing: "国防工业一体化"
 CHI_SAR_military_corporation_sharing_desc: "设在特别行政区的国防承包商和工程公司被纳入大陆采购网络。共享的生产标准和供应链提高了解放军的生产能力。"
 CHI_SAR_military_corporation_sharing_mio_tt: "特别行政区可接触中国军工企业"
 CHI_SAR_one_system_declaration: "一种制度声明"
 CHI_SAR_one_system_declaration_desc: "国务院此举表明，特别行政区治理与大陆体制的融合力度将进一步加大。未来几年，特别行政区的法律和行政框架将逐步与中华人民共和国相协调。"
 CHI_SAR_han_superiority: "汉族至上论"
 CHI_SAR_han_superiority_desc: "北京放弃了多民族国家模式，转而推行以汉族为中心的单一民族认同。呼应胡鞍钢、胡联合等学者提出的“第二代民族政策”，逐步取消民族自治，加速推进各地区的同化进程。"
 CHI_HKG_greater_bay_area: "大湾区倡议"
 CHI_HKG_greater_bay_area_desc: "北京和香港联合启动粤港澳大湾区项目，将11个城市连接成一个创新和金融走廊。该项目是自深圳经济特区以来中国规模最大的区域一体化计划。"
 CHI_HKG_financial_integration: "金融系统一体化"
 CHI_HKG_financial_integration_desc: "沪港通和债通机制拓展了跨境资本流动机制，香港作为主要离岸人民币枢纽的地位得到正式确立，加深了与内地金融市场的相互依存。"
 CHI_HKG_express_rail_link: "高铁连接"
 CHI_HKG_express_rail_link_desc: "广深港高速铁路建成通车，将香港直接连接到中国的高速铁路网络。香港与内地主要城市之间的旅行时间大幅缩短，加快了人员和商业流动。"
 CHI_HKG_individual_visit_scheme: "个人访问计划"
 CHI_HKG_individual_visit_scheme_desc: "北京扩大了个人访港计划的适用范围，允许更多内地城市的居民前往香港，无需参加团体旅游。内地游客和购物者的涌入极大地促进了香港零售和服务业的发展。"
 CHI_HKG_shenzhen_hk_stock_connect: "深港通"
 CHI_HKG_shenzhen_hk_stock_connect_desc: "一项相互市场准入计划将香港和深圳证券交易所连接起来，允许两地投资者交易对方上市的股票。该计划进一步巩固了香港作为跨境资本流动门户的不可或缺的地位。"
 CHI_HKG_electoral_reform: "选举制度改革"
 CHI_HKG_electoral_reform_desc: "北京对香港立法会选举体制进行全面改革，减少直选议席，并引入候选人审查机制，以确保只有“爱国者”才能参选。这项改革彻底削弱了民主派反对派的政治权力。"
 CHI_HKG_media_freedom: "新闻自由保障"
 CHI_HKG_media_freedom_desc: "迫于公民社会的压力，北京同意在香港提供法律保障，维护新闻自由。国际媒体组织将此保证解读为“两制”模式将持续到2047年的信号。"
 CHI_HKG_censorship: "互联网和媒体审查"
 CHI_HKG_censorship_desc: "北京指示香港当局将香港的互联网和广播法规与内地标准接轨。被认为具有政治敏感性的网站遭到封锁，各大报纸的编辑也面临自我审查的压力。"
 CHI_HKG_moral_national_education: "道德与民族教育"
 CHI_HKG_moral_national_education_desc: "香港学校推行新的义务国民教育课程，强调对共产党的忠诚和以大陆为中心的中国历史观。这项政策引发了公众的强烈反对，但在中央的指导下得以推进。"
 CHI_HKG_national_security_law: "国家安全法第23条"
 CHI_HKG_national_security_law_desc: "根据《基本法》第二十三条的规定，香港制定了国家安全法，将分裂国家、颠覆国家政权、恐怖主义和勾结外国势力等行为定为犯罪。该法标志着香港与外界隔绝的政治文化的正式终结。"
 CHI_HKG_lok_ma_chau_loop: "落马洲环路发展"
 CHI_HKG_lok_ma_chau_loop_desc: "在落马洲环路设立了专门的创新科技园区，该地块位于深圳边界，是为联合开发而划定的。该园区旨在吸引那些希望靠近香港和内地的研究机构和科技公司。"
 CHI_HKG_2030_study: "香港2030+战略研究"
 CHI_HKG_2030_study_desc: "香港政府公布了其长期空间规划策略，确定了新的发展区域、交通走廊和工业用地。该研究将香港的城市发展置于粤港澳大湾区一体化的大背景下进行分析。"
 CHI_HKG_palace_museum: "香港故宫博物院"
 CHI_HKG_palace_museum_desc: "北京故宫博物院在香港西九文化区设立分馆，展出从故宫博物院借展的文物。该项目被视为连接香港与内地的文化桥梁，引起了国际社会的广泛关注。"
 CHI_HKG_zhuhai_macau_bridge: "港珠澳大桥"
 CHI_HKG_zhuhai_macau_bridge_desc: "连接香港、珠海和澳门的全球最长跨海桥隧系统已竣工，横跨珠江口。该工程大幅缩短了三地之间的陆路交通时间，并成为粤港澳大湾区一体化的实体骨干。"
 CHI_HKG_lok_ma_chau_station: "落马洲站扩建"
 CHI_HKG_lok_ma_chau_station_desc: "落马洲口岸升级改造，扩建了旅客和货运设施，缓解了香港最繁忙的陆路口岸之一的拥堵状况。物流吞吐量的提升加快了跨境贸易和通勤人流。"
 CHI_SAR_integrate_HKG: "香港一体化"
 CHI_SAR_integrate_HKG_desc: "随着香港的政治和经济制度与内地完全接轨，北京正式撤销了该特别行政区的单独行政地位。这个前殖民地被并入中华人民共和国，作为一个直接管辖的直辖市。"
 CHI_MAC_pearl_river_delta: "珠江三角洲一体化"
 CHI_MAC_pearl_river_delta_desc: "澳门正式纳入珠江三角洲经济区，基础设施投资旨在减少其经济孤立性。港珠澳大桥成为新型跨境交通网络的主干。"
 CHI_MAC_lotus_flower_economy: "莲花经济"
 CHI_MAC_lotus_flower_economy_desc: "澳门启动了一项以葡中特别行政区独特身份为基础的经济品牌重塑计划。该战略并非针对单一行业，而是将澳门重新定位为“世界旅游休闲中心”，这一品牌将贯穿所有下游多元化发展举措，并与北京对粤港澳大湾区的愿景相契合。"
 CHI_MAC_financial_services: "离岸金融服务中心"
 CHI_MAC_financial_services_desc: "澳门更新了监管框架，以吸引离岸银行业务、债券发行和人民币结算业务。澳门的葡萄牙法律传统被宣传为吸引寻求内地投资的葡语投资者的优势。"
 CHI_MAC_infrastructure_link: "跨境基础设施连接"
 CHI_MAC_infrastructure_link_desc: "新的边境口岸和轻轨延伸线将澳门路氹金光开发区与横琴岛的粤澳深度合作区直接连接起来。该项目将澳门的经济版图与内地经济版图有机地连接起来。"
 CHI_MAC_guangdong_integration: "广东一体化协议"
 CHI_MAC_guangdong_integration_desc: "与广东省签署的全面合作协议使澳门的规划、法律和金融法规与内地标准接轨。官员们称该协议是澳门特区与内地治理和平融合的典范。"
 CHI_SAR_integrate_MAC: "澳门全面整合"
 CHI_SAR_integrate_MAC_desc: "经过数十年的经济和法律融合，澳门特别行政区地位被取消。澳门并入广东省行政体系，完成了1999年回归的最后阶段。"
 CHI_MAC_cultural_autonomy_push: "葡萄牙遗产运动"
 CHI_MAC_cultural_autonomy_push_desc: "民间组织发起运动，反对澳门加速融入内地，以维护澳门独特的葡式中华文化身份。他们的诉求包括：为葡语、澳门社群以及澳门独特的法律多元化制度提供法律保护。"
 CHI_MAC_lusophone_connections: "葡语国家门户战略"
 CHI_MAC_lusophone_connections_desc: "澳门通过扩大经贸合作论坛，将自身定位为连接中国与葡语世界不可或缺的桥梁。国际社会对这一独特角色的认可，为澳门维持高度自治提供了政治依据。"
 CHI_TIB_plateau_development: "高原发展基金"
 CHI_TIB_plateau_development_desc: "国务院启动了一项针对西藏自治区的大规模投资计划，重点关注基础设施、住房和公共服务。该计划与西方发展战略相呼应，但在国内被包装成一项扶贫举措。"
 CHI_TIB_railway_modernization: "青藏铁路延伸段"
 CHI_TIB_railway_modernization_desc: "青藏铁路二期工程获批，将线路延伸至日喀则，最终到达靠近印藏边境的林芝。该项目将缓解西藏的后勤孤立状态，并加快汉族移民和安保人员的流动。"
 CHI_TIB_release_falun_gong: "法轮功大赦"
 CHI_TIB_release_falun_gong_desc: "北京以一种精心策划的开放姿态释放了被监禁的法轮功学员，并放宽了对该运动在西藏自治区宗教活动的限制。这一让步得到了西方政府的谨慎赞扬，并标志着对宗教异议采取更温和的态度。"
 CHI_TIB_return_dalai_lama: "达赖喇嘛归来"
 CHI_TIB_return_dalai_lama_desc: "经过长时间的秘密谈判，北京与达赖喇嘛的代表达成协议，允许这位西藏精神领袖以礼仪身份返回拉萨。该协议并未赋予西藏政治自治权，但却在国际社会赢得了广泛的好感。"
 CHI_TIB_sinification: "爱国主义教育运动"
 CHI_TIB_sinification_desc: "该党在藏传佛教寺院和学校发起了一项系统的思想再教育计划，要求谴责达赖喇嘛并宣誓效忠祖国。这场运动以上世纪90年代的“严厉打击”行动为蓝本，由专门部署的工作小组负责管理。"
 CHI_TIB_autonomy_preservation: "真正的自主框架"
 CHI_TIB_autonomy_preservation_desc: "面对国际压力和持续不断的动荡局势，北京与达赖喇嘛代表就扩大文化和宗教自治展开谈判。《斯特拉斯堡提案》和“中间道路”方针成为双方秘密磋商的基础。"
 CHI_TIB_cultural_integration: "治理中国化"
 CHI_TIB_cultural_integration_desc: "汉族官员被任命到西藏行政、司法和安全机构的各个高级职位。汉语取代藏语成为官方语言，所有公立学校的课程都采用中国大陆的内容。"
 CHI_SAR_integrate_TIB: "西藏全面整合"
 CHI_SAR_integrate_TIB_desc: "随着宗教权威被削弱、行政结构完全整合、人口结构转型完成，西藏自治区残余的特别行政区地位被取消。西藏重新成为中央直辖省份。"
 CHI_TIB_buddhist_cultural_zone: "佛教文化保护区"
 CHI_TIB_buddhist_cultural_zone_desc: "在布达拉宫和大昭寺周围设立了指定的保护区，这在一定程度上正式承认了藏传佛教作为文化遗产的地位。批评人士认为，这种做法是以旅游业为导向的妥协，回避了实质性的宗教自由。"
 CHI_TIB_silk_road_gateway: "喜马拉雅丝绸之路门户"
 CHI_TIB_silk_road_gateway_desc: "西藏地处“一带一路”南亚走廊的交汇点，其地理位置优势促使西藏在边境基础设施、水电和贸易物流领域进行投资。该倡议将西藏经济与尼泊尔和南亚市场连接起来，同时也加深了西藏对中国大陆的依赖。"
 CHI_TIB_monastery_economy: "寺院经济"
 CHI_TIB_monastery_economy_desc: "藏传佛教寺院历来是区域经济的支柱，获准在特区框架内开展商业活动。朝圣旅游、传统医药生产和手工艺产业创造的收入，既支持了寺院的发展，也惠及了当地社区。"
 CHI_TIB_plateau_resources: "高原矿产调查"
 CHI_TIB_plateau_resources_desc: "西藏自治区启动独立勘探，在青藏高原发现了丰富的锂、铜和铬铁矿矿藏。特别行政区政府与相关部门协商达成收益分成协议，将部分开采收入纳入区财政预算。"
 CHI_ETK_corridor_investment: "“一带一路”走廊投资"
 CHI_ETK_corridor_investment_desc: "新疆被指定为“一带一路”倡议的主要陆路门户，吸引了大量国家投资用于铁路、管道和公路基础设施建设。中巴经济走廊北端的喀什改变了该地区的经济格局。"
 CHI_ETK_resource_extraction: "能源和矿产开采"
 CHI_ETK_resource_extraction_desc: "在国家优先发展管道建设和炼油能力的规划下，塔里木盆地的油气储量不断扩大。新疆在全国石油产量中所占份额显著增长，但上缴中央的财政收入问题仍然是当地长期不满的焦点。"
 CHI_ETK_silk_road_commerce: "丝绸之路商业倡议"
 CHI_ETK_silk_road_commerce_desc: "新疆传统的维吾尔族商人网络被正式纳入区域贸易政策，并享有与中亚各国跨境贸易的优惠许可。这项政策复兴了自唐代以来由维吾尔族主导的贸易历史模式。"
 CHI_ETK_oilfield_development: "塔里木盆地油田开发"
 CHI_ETK_oilfield_development_desc: "新疆特别行政区政府与国家能源公司就塔里木盆地油田勘探达成合资协议，从而为区域基础设施建设争取到前所未有的油气开采收益份额。这些油田是中国最大的油田之一，也是该地区财政独立的重要保障。"
 CHI_ETK_strike_hard_campaign: "强力打击运动"
 CHI_ETK_strike_hard_campaign_desc: "针对维吾尔族分裂网络的“严厉打击、极限施压”行动以前所未有的规模重新启动，其手段包括数字监控、大规模拘留和系统性镇压宗教活动。国际人权组织记录了广泛的侵犯人权行为。"
 CHI_ETK_education_centres: "职业技能教育中心"
 CHI_ETK_education_centres_desc: "新疆各地建立了一个法外拘留设施网络，官方称之为“职业技能教育培训中心”。此外，该地区还部署了涵盖人脸识别、DNA数据库和智能手机监控的综合数字监控网络。"
 CHI_ETK_total_survaillance_infrastructure: "全面监控基础设施"
 CHI_ETK_total_survaillance_infrastructure_desc: "新疆全境已建成覆盖整个区域的监控网络，整合了人脸识别摄像头、生物识别检查站和强制性智能手机监控软件。该系统使当局能够近乎全面地掌握人口流动和网络活动。"
 CHI_SAR_integrate_ETK: "新疆全面整合"
 CHI_SAR_integrate_ETK_desc: "在分裂活动几乎被彻底镇压、传统维吾尔族社会结构被瓦解之后，新疆特别行政区的行政框架被解散。该地区按照标准的省级行政体制进行重组，不再享有任何特殊的民族自治权。"
 CHI_ETK_autonomy_statute: "新疆自治条例"
 CHI_ETK_autonomy_statute_desc: "新的区域自治法赋予新疆穆斯林群体正式的宗教活动权、维吾尔语授课权以及在个人事务中适用习惯法的权利。该法得到了部分国际伊斯兰组织的支持。"
 CHI_ETK_islamic_governance_framework: "伊斯兰治理框架"
 CHI_ETK_islamic_governance_framework_desc: "北京在新疆采取了更为温和的政策，允许有组织的伊斯兰教宗教活动，扩大维吾尔语教育，并任命更多维吾尔族官员进入地方政府。这一政策与2017年以前相对宽松的政策相呼应。"
 CHI_ETK_BRI_hub: "喀什经济特区"
 CHI_ETK_BRI_hub_desc: "喀什被指定为“一带一路”过境贸易的特殊经济区，享有税收优惠和简化的海关手续。该经济区将新疆定位为连接中亚、南亚和中东的商业枢纽。"
 CHI_TAI_combat_the_traitors: "打击叛徒"
 CHI_TAI_combat_the_traitors_desc: "北京对台湾采取毫不妥协的立场，正式将支持台独的领导人定性为叛国者，并表明武力统一仍然是可行的选项。该声明令两岸关系急剧紧张，并促使解放军进入高度戒备状态。"
 CHI_TAI_cut_us_support: "切断美台联系"
 CHI_TAI_cut_us_support_desc: "北京持续开展影响力活动，目标直指美国政商界，游说反对对台军售和正式接触。此举旨在削弱美国对台湾安全承诺的可信度。"
 CHI_TAI_outward_island_infrastructure: "外岛军事基础设施"
 CHI_TAI_outward_island_infrastructure_desc: "夺取台湾后，中国人民解放军开始在外岛建设强化的海空设施。新基地将中国的兵力投送范围延伸至西太平洋深处，并极大地改变了地区力量平衡。"
 CHI_TAI_cross_strait_policy: "海峡两岸政策重估"
 CHI_TAI_cross_strait_policy_desc: "国务院委托开展对台政策的全面评估，审视实现两岸统一的外交、经济和军事选项。该评估将为中国未来十年对台政策制定政治议程。"
 CHI_TAI_economic_track: "海峡两岸经济道路"
 CHI_TAI_economic_track_desc: "北京与台北启动结构化的经济对话，重点关注贸易便利化、产业合作和长期市场准入。其目标是建立足够的互利关系，使政治对话更难被抵制。"
 CHI_TAI_political_track: "海峡两岸政治道路"
 CHI_TAI_political_track_desc: "在推进经济合作的同时，北京还建立了一条专门的政治渠道，旨在恢复对话机制，降低紧张局势，为双方都能接受的谈判解决奠定基础。"
 CHI_TAI_expand_cross_strait_trade: "扩大海峡两岸贸易"
 CHI_TAI_expand_cross_strait_trade_desc: "北京以《经济合作框架协议》及后续服务贸易谈判的逻辑为基础，为在大陆经营的台湾企业提供新的商业优惠和降低贸易壁垒。这项政策旨在使经济合作对台湾政商精英而言具有明显的盈利价值。"
 CHI_TAI_mainland_market_access: "大陆市场准入"
 CHI_TAI_mainland_market_access_desc: "中国大陆给予台湾投资者和出口商进入特定大陆行业的优惠政策，尤其是在先进制造业和服务业方面。这一安排反映了现实中通过机会而非强制手段将台湾与大陆经济更紧密地联系起来的努力。"
 CHI_TAI_business_delegations: "海峡两岸商务代表团"
 CHI_TAI_business_delegations_desc: "半官方的贸易团体、商会和主要产业界人士恢复了定期的两岸互访。这些代表团的访问在政治上更为稳妥，既能深化务实合作，又能巩固台湾民众的支持，使之受益于两岸关系的稳定。"
 CHI_TAI_transport_links: "直航通道"
 CHI_TAI_transport_links_desc: "为缩小两岸实际距离，双方扩大了直航、航运安排和物流协调。加快商业和客运往客运速度，降低了持续交往的政治成本，并进一步推动了海峡两岸交流的正常化。"
 CHI_TAI_semiconductor_coordination: "半导体协调"
 CHI_TAI_semiconductor_coordination_desc: "台北方面同意在高科技供应链领域，特别是半导体和精密制造领域，进行有限的战略协调。这一安排反映了台湾芯片产业与大陆需求之间真实的经济相互依存关系，但并未达到彻底的政治统一。"
 CHI_TAI_investment_safeguards: "投资保障"
 CHI_TAI_investment_safeguards_desc: "台湾谈判代表坚持认为，深化经济一体化必须辅以保护本地企业和机构的法律和监管保障。这一方针源于台湾境内的切实担忧，即两岸投资绝不能沦为政治吞并的工具。"
 CHI_TAI_joint_industrial_planning: "联合工业规划"
 CHI_TAI_joint_industrial_planning_desc: "两岸规划人员开始协调基础设施、产业供应链和技术密集型产业。这一过程将分散的商业联系转变为更接近于统筹规划的两岸发展战略。"
 CHI_TAI_deep_economic_integration: "深度经济一体化"
 CHI_TAI_deep_economic_integration_desc: "经过多年积累的协议，两岸贸易已形成一个涵盖投资、物流和产业相互依存的紧密框架。到目前，经济分离对双方而言都变得越来越昂贵，尤其对台湾而言更是如此。"
 CHI_TAI_resume_party_contacts: "恢复党际接触"
 CHI_TAI_resume_party_contacts_desc: "北京重启与台湾各政党和组织的沟通渠道，寻求构建不那么对抗性的两岸关系。​​这一策略根植于中共与国民党对话以及其他非正式政治接触的既有模式，这些接触已不时取代了国家间的正式外交。"
 CHI_TAI_pro_china_party_networks_mission: "亲中党网"
 CHI_TAI_pro_china_party_networks_mission_desc: "中国两岸商界和政界人士积极争取台湾支持统一政党。只要我们的影响力保持强劲，这些努力就会逐渐将民意转向泛蓝联盟。"
 CHI_TAI_offer_confidence_measures: "提供取信之举"
 CHI_TAI_offer_confidence_measures_desc: "北京方面提出了一系列切实可行的缓和局势措施，包括建立常规沟通渠道和在公开场合保持克制。其目的是为了让台湾温和派相信，接触可以在不立即强行做出主权决定的情况下降低风险。"
 CHI_TAI_legislative_exchange_forum: "立法交流论坛"
 CHI_TAI_legislative_exchange_forum_desc: "立法委员、顾问和政策专家代表团开始通过半官方渠道举行会晤，讨论贸易、交通和行政协调等问题。此类论坛使两岸互动更具议会程序性，淡化了自上而下施压的印象。"
 CHI_TAI_local_government_dialogue: "地方政府对话"
 CHI_TAI_local_government_dialogue_desc: "市、县、地方各级官员就交通、旅游和投资等议题展开务实对话。这反映了一种现实模式：即使中央层面的正式关系紧张，市级和地方层面的联系也往往能够取得进展。"
 CHI_TAI_reaffirm_the_1992_consensus: "重申九二共识"
 CHI_TAI_reaffirm_the_1992_consensus_desc: "台湾温和派选择旗帜鲜明地回归“一个中国”的政策框架，同时保留他们对一中原则的自身解读。这一表述在台湾内部虽有争议，但仍是开展严肃两岸谈判的最现实基础。"
 CHI_TAI_suspend_independence_initiatives: "暂停独立倡议"
 CHI_TAI_suspend_independence_initiatives_desc: "台北方面悄然叫停那些可能在法律或外交层面推动台岛走向正式分离的举措。这并不意味着结束自治，但表明台湾方面准备稳定局势，而非使局势升级。"
 CHI_TAI_back_channel_settlement: "秘密渠道解决"
 CHI_TAI_back_channel_settlement_desc: "双方的半官方组织都从建立信任转向实质性的政治谈判。他们借鉴海峡两岸关系协会的模式，起草了一份旨在使和平统一显得有序、渐进且具有实质性益处的解决方案框架。"
 CHI_TAI_peaceful_reunification_accord: "和平统一协议"
 CHI_TAI_peaceful_reunification_accord_desc: "经过多年渐进式的外交努力，北京和台北签署了一项历史性的框架协议，规定台湾以特别行政区的身份加入中华人民共和国。该协议保障台湾现有的民主制度和法律体系在五十年的过渡期内得以保留。"
 CHI_TAI_military_buildup: "海峡两岸军事集结"
 CHI_TAI_military_buildup_desc: "中国人民解放军加快采购两栖攻击舰、登陆艇和远程精确导弹，以应对台湾海峡突发事件。联合演习模拟夺取离岸岛屿和压制台湾防空系统。"
 CHI_TAI_amphibious_doctrine: "联合岛屿登陆作战学说"
 CHI_TAI_amphibious_doctrine_desc: "解放军海军陆战队和东部战区发布了一份修订后的联合作战条令，内容涉及联合兵种两栖突击。该条令虽属机密，但被外国情报机构广泛分析为反应台湾突发事件的直接蓝图。"
 CHI_TAI_blockade_declaration: "台湾海峡封锁"
 CHI_TAI_blockade_declaration_desc: "解放军海军在台湾周边设立海上禁航区，切断商业航线，并阻断燃料和原材料的进口。此次封锁还伴随着大规模的空中演习和弹道导弹试射，引发国际性危机。"
 CHI_TAI_operation_storm: "风暴行动"
 CHI_TAI_operation_storm_desc: "解放军对台湾发动了筹划已久的两栖作战。导弹打击摧毁了台湾的防空系统和指挥基础设施，与此同时，登陆部队在空军和海军的掩护下跨越海峡。此次行动是自朝鲜战争以来亚洲地区最重大的军事行动。"
 CHI_TAI_economic_miracle: "台湾经济奇迹整合"
 CHI_TAI_economic_miracle_desc: "台湾先进的半导体产业、金融业和科技生态系统已正式纳入国家经济规划框架。此次收购标志着中国科技能力的重大提升，尤其是在芯片制造领域。"
 CHI_OMG_steppe_development: "内蒙古发展倡议"
 CHI_OMG_steppe_development_desc: "国务院启动针对内蒙古自治区的专项发展计划，投资建设能源基础设施、物流走廊和产业园区。该计划旨在将内蒙古更深入地融入国家经济网络，同时解决长期存在的农村贫困问题。"
 CHI_OMG_northern_corridor: "北部走廊基础设施"
 CHI_OMG_northern_corridor_desc: "连接内蒙古与京津冀地区的新高速公路和铁路货运走廊项目获得批准，这将缩短煤炭、稀土矿物和农产品的运输时间。该走廊巩固了内蒙古作为中国北方能源腹地的地位。"
 CHI_OMG_mandarin_education: "汉语授课教育政策"
 CHI_OMG_mandarin_education_desc: "内蒙古自治区政府宣布分阶段过渡，要求所有中小学的核心课程以普通话而非蒙古语授课。这项政策效仿西藏和新疆的类似措施，引发了内蒙古城市和牧区各地的大规模抗议。"
 CHI_OMG_cultural_recognition: "蒙古文化认可"
 CHI_OMG_cultural_recognition_desc: "北京正式承认内蒙古特别行政区的蒙古族文化和语言身份，保障蒙古语教学、国家广播和官方文字地位。这一政策与在西藏和新疆实行的同化政策截然不同。"
 CHI_OMG_han_settlement_program: "汉族定居计划"
 CHI_OMG_han_settlement_program_desc: "来自河北、陕西和甘肃的政府主导的移民潮加速了内蒙古的人口结构转型。新的城镇在原先的牧区建立起来，而优惠的就业政策进一步巩固了汉族在城市地区的多数地位。"
 CHI_SAR_integrate_OMG: "内蒙古完全一体化"
 CHI_SAR_integrate_OMG_desc: "随着人口和文化的转型，内蒙古特别行政区划地位被取消，并被调整为标准的省级行政区划。蒙古族自治的正式承认被适用于中华人民共和国全国的少数民族保护条款所取代。"
 CHI_OMG_greater_mongolia_vision: "泛蒙古愿景"
 CHI_OMG_greater_mongolia_vision_desc: "内蒙古文化运动的倡导者们阐述了与独立的蒙古国建立更紧密联系的愿景，并援引了共同的历史、语言和游牧传统。北京方面容忍这种文化层面的表达，但严格限制其任何政治含义。"
 OMG_steppe_livestock_industry: "草原畜牧业现代化"
 OMG_steppe_livestock_industry_desc: "内蒙古传统的羊绒、羊肉和奶制品产业正按照合作社模式进行重组，将牧民家庭与国家供应链连接起来。该项目在提高家庭收入的同时，也保留了牧民生活方式的某些要素。"
 CHI_OMG_steppe_mining_industry: "草原采矿业"
 CHI_OMG_steppe_mining_industry_desc: "内蒙古的铬矿和矿产资源被纳入协调开采计划。国有企业建立加工设施和出口通道，将地下资源转化为服务于中国整体经济的工业产能。"
 OMG_mongolian_mining_expansion: "稀土和煤炭扩张"
 OMG_mongolian_mining_expansion_desc: "内蒙古拥有世界最大的稀土元素矿藏之一，以及中国三分之一的煤炭储量。特区政府正在扩大矿产开采规模，并通过谈判达成矿产资源使用协议，将更多矿产收入用于区域基础设施和教育建设。"
 CHI_OMG_mongolian_mining_expansion: "稀土和煤炭扩张"
 CHI_OMG_mongolian_mining_expansion_desc: "内蒙古拥有世界最大的稀土元素矿藏之一，以及中国三分之一的煤炭储量。特区政府正在扩大矿产开采规模，并通过谈判达成矿产资源使用协议，将更多矿产收入用于区域基础设施和教育建设。"
 CHI_MON_diplomatic_outreach: "蒙古外交拓展"
 CHI_MON_diplomatic_outreach_desc: "北京对乌兰巴托发起外交倡议，将经济激励与对蒙古共同文化遗产的诉求相结合。高层互访、优惠贸易条件以及中国文化影响力的扩大，为双方更深入的合作奠定了基础。"
 CHI_MON_economic_partnership: "草原经济伙伴"
 CHI_MON_economic_partnership_desc: "一项全面的经济伙伴关系协定赋予蒙古进入中国市场、获得投资和基础设施融资的优惠待遇。蒙古的矿产出口，如铜、煤炭和稀土，主要销往中国，从而形成了显著的经济相互依存关系。"
 CHI_MON_reunification_offer: "蒙古统一提议"
 CHI_MON_reunification_offer_desc: "中国正式向蒙古提出统一方案，提议以特别行政区的形式重新建立国家，承诺给予蒙古高度自治权，保留其政治体制，并实现全面经济一体化。该提议援引历史先例，并将中国定位为蒙古繁荣发展的天然合作伙伴。"
 MON_CHI_economic_partnership_idea: "中蒙经济一体化"
 MON_CHI_economic_partnership_idea_desc: "优惠的贸易准入和与中国市场的融合使蒙古严重依赖对华出口。采矿收入增加，但对中国需求的结构性依赖也随之加剧。"
 MON_CHI_cultural_sphere_idea: "在中国文化轨道之内"
 MON_CHI_cultural_sphere_idea_desc: "中国官方媒体、文化节目和侨民网络已在蒙古建立了强大的软实力。这削弱了蒙古对中国进一步影响的抵抗力。"
 CHI_TAI_fleet_modernization: "舰队现代化计划"
 CHI_TAI_fleet_modernization_desc: "解放军海军加快采购现代化驱逐舰、护卫舰和两栖攻击舰，以适应台湾海峡作战需求。扩建造船厂产能和加快服役进度，标志着解放军正明显转向向西太平洋地区投射力量。"
 CHI_TAI_dongfeng_program: "东风导弹项目"
 CHI_TAI_dongfeng_program_desc: "火箭军扩充其中程弹道导弹库，在福建沿海部署更多东风-21和东风-26导弹发射阵地。该计划使北京能够在不投入海空力量的情况下，从大陆威胁台湾的军事基础设施。"
 CHI_TAI_air_superiority: "制空策略"
 CHI_TAI_air_superiority_desc: "解放军空军加大在台湾海峡中线附近的训练飞行力度，并将先进的歼-20战斗机部署到福建的前沿基地。这种持续的空中施压削弱了台湾维持有效防空的能力。"
 CHI_TAI_cyber_warfare: "网络战能力"
 CHI_TAI_cyber_warfare_desc: "战略支援部队扩张了网络进攻行动部门，致力于发展破坏台湾关键基础设施、军事通信和金融系统的能力。数字战线由此成为施压的又一重要方向。"
 CHI_TAI_blockade_capability: "封锁准备"
 CHI_TAI_blockade_capability_desc: "经过大量模拟演习后，解放军海军和中国海警正式宣布针对台湾周边海域的禁航区已具备全面作战准备状态。潜艇巡逻、水面警戒和空中监视行动可在短时间内启动。"
 CHI_TAI_one_china_enforcement: "贯彻一个中国"
 CHI_TAI_one_china_enforcement_desc: "北京发起了一场系统性的外交攻势，旨在消除台湾剩余的所有正式承认。北京派遣大使，向各国提供援助和基础设施建设方案，同时对那些拒绝改变立场的国家施加经济压力。"
 CHI_TAI_intl_org_blockade: "国际组织封锁"
 CHI_TAI_intl_org_blockade_desc: "中国利用其在联合国安理会的常任理事国席位及其在多边机构中日益增长的影响力，阻挠台湾参与国际组织。台湾的观察员地位申请遭到否决，非正式参与渠道也被关闭。"
 CHI_TAI_economic_leverage: "经济杠杆运动"
 CHI_TAI_economic_leverage_desc: "北京利用其作为世界最大贸易国的地位，对支持台湾的美国产业和政治选民施加有针对性的经济压力。这一策略利用商业依赖性来削弱美国履行安全保障的政治意愿。"
 CHI_TAI_tourism_freeze: "旅游业冻结"
 CHI_TAI_tourism_freeze_desc: "北京命令国营旅行社暂停所有赴台旅游团和散客旅游，切断了自2008年《经济共同体框架协议》实施以来大幅增长的游客流量。此举剥夺了台北从大陆旅游业获得的外汇收入和消费服务收入，将两岸经济一体化武器化为一种胁迫手段。"
 CHI_TAI_lobby_network: "华盛顿游说网络"
 CHI_TAI_lobby_network_desc: "与中国关系密切的商业利益集团、智库和政治顾问在华盛顿建立了常驻机构。该网络致力于影响国会关于台湾问题的观点，阻止对台军售，并推动与北京接触。"
 CHI_TAI_proxy_strategy: "全球代理人策略"
 CHI_TAI_proxy_strategy_desc: "北京精心策划代理人冲突和地区热点事件，旨在转移美国在台湾海峡的军事注意力和政治资本。每一次将美军引向其他地区的危机，都会削弱华盛顿在太平洋地区承诺的可信度。"
 CHI_TAI_distract_america: "转移美国注意力"
 CHI_TAI_distract_america_desc: "由于美国忙于海外军事行动，北京得以利用华盛顿资源紧张、注意力分散的局面。美国每进行一次军事部署，都会降低其对台海突发事件迅速做出反应的可能性。"
