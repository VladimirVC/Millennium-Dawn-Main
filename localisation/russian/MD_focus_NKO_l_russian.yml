 NKO_build_farms1_desc: "Строительство ферм для обеспечения продовольствием нашего народа является обязательным условием. Эта ферма находится в процессе строительства"
 NKO_build_factory1: "§YГражданская промышленность§! Строительство"
 NKO_build_factory1_desc: "Чтобы помочь нашей экономике расти, мы должны дать нашим людям возможность производить больше потребительских товаров и увеличить наши производственные мощности."
