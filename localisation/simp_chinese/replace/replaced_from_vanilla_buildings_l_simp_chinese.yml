l_simp_chinese:
 industrial_complex: "民用工业"
 industrial_complex_plural: "民用工厂"
 industrial_complex_desc: "此建筑可为所属地区提供生产民用商品或建造新建筑的工业能力，或可因需转换为军用工厂。\n\n为所属地区提供：\n所需工人基础数量：§Y206K§!\n每个§Y民用工厂§!的基本GDP产出：$§Y17.5B§!\n基础能源消耗：§R-0.5§! GW\n"
 arms_factory: "军事工业"
 arms_factory_plural: "军用工厂"
 arms_factory_desc: "此建筑可为所属地区提供生产军事装备的工业能力，或可因需转换为民用工厂。\n\n为所属地区提供：\n所需工人基础数量：§Y18.8K§!\n每个§Y军用工厂§!的基本GDP产出：$§Y1.5B§!\n基础能源消耗：§R-0.5§! GW"
 internet_station: "通信基础设施"
 internet_station_plural: "通信基础设施"
 internet_station_desc: "§Y通信基础设施§!是电信和无线电通信领域中用于推动远距离传输或地下光缆和云计算系统的高层结构。\n\n为所属地区提供：\n所需工人基础数量：§Y12K§!\n每级§Y通信基础设施§!的基本GDP产出：$§Y3.5B§!\n\n每级§Y通信基础设施§!提高§G+5.00%§!本地生产率增长。\n每级§Y通信基础设施§!减少§G-5.00%§!§Y内部投资§!周期时长。"
 dockyard: "海军船坞"
 dockyard_plural: "海军船坞"
 dockyard_desc: "§Y海军船坞§!代表了一个国家生产§Y巡逻艇§!、§Y护卫舰§!、§Y驱逐舰§!、§Y航母§!等各种军舰的能力。\n\n为所属地区提供：\n所需工人基础数量：§Y18.8K§!\n每个§Y船坞§!的基本GDP产出：$§Y1.5B§!\n基础能源消耗：§R-0.5§! GW"
 air_base_desc: "§Y空军基地§!是用于部署和准备空军的储存设施和军事大本营。它可以堆叠到十级，每级可额外增加§Y50§!架飞机的容量。"
 radar_station_desc: "§Y雷达站§!可以让你获得附近敌军的情报。它包括各种雷达和传感器，以及情报相关资产和分析不断变化的形势的能力。\n级别越高，有效范围越大。\n雷达还为国家提供了更好的敌方空军探测，让你的飞机有更好的机会与他们交战。\n此外，雷达增加对海上敌方舰队的探测率。"
 anti_air_building: "短程防空阵地"
 anti_air_building_plural: "短程防空阵地"
 anti_air_building_desc: "§Y短程防空系统阵地§!是用于防御低空空中威胁的防空武器和战术的综合体和组合。这些设施共同将空域划分为可防御区域，为当地军事目标和基础设施提供空中覆盖，包括直升机、低空飞行飞机和喷气式飞机。"
 nuclear_reactor_desc: "这座建筑将核能转化为电能，在此过程中消耗了浓缩铀。\n\n为所属地区提供：\n所需工人基础数量：§Y148K§!\n每个§Y核反应堆§!的基本GDP产出：$§Y4B§!\n基础能源获取：§G+5§! GW\n"
 synthetic_refinery_desc: "该建筑为该地区提供了生产合成橡胶的工业设施以及一些额外的燃料生产能力。\n\n为所属地区提供：\n所需工人基础数量：§Y184K§!\n每个§Y合成精炼厂§!的基本GDP产出：$§Y10B§!\n基础能源消耗：§R-0.2§! GW \n\n以标准市场价格生产§Y橡胶§!，盈余产品除了缴纳公司所得税外，还能产生现金收入。\n"
 fuel_silo: "战略资源储备"
 fuel_silo_plural: "战略资源储备"
 fuel_silo_desc: "§Y战略资源储备§!是仓库、干式储存和其他§Y燃料§!类仓库的综合体。该建筑为您的国家提供了更多的§H燃料§!与§H资源§!储存空间。\n\n注意：§Y资源存储§!存在机制限制，如果您处于§Y$export_economy$§!或§Y$globalized_trade_economy$§!状态，则最终可能会将更多资源用于出口，而不是用于您需要的生产线。如果您需要开始从存储空间中提取资源，建议您切换到§Y$mixed_economy$§!或更低级别法案。\n"
 offices: "办公园区"
 offices_plural: "办公园区"
 offices_desc: "§Y办公园区§!代表了除采掘业和重工业以外的所有其他经济行业。这些包括金融、服务、信息技术、零售等。\n\n为所属地区提供：\n所需工人基础数量：§Y473K§!\n每个§Y办公园区§!的基本GDP产出：$§Y50B§!\n基础能源消耗：§R-0.25§! GW"
 fossil_powerplant: "化石燃料发电厂"
 fossil_powerplant_plural: "化石燃料发电厂"
 fossil_powerplant_desc: "§Y化石燃料发电厂§!是所有基于化石的热电能源的总称。 这些包括但不限于； 煤炭、天然气和石油。§Y化石燃料发电厂§!如果发电量高于消耗量，则将闲置。\n\n为该省提供：\n所需工人基础数量：§Y7.5K§!\n每个§Y化石燃料发电厂§!的基本GDP产出：$§Y1.7B§!\n基础能源获取：§G+2§! GW\n"
 fossil_powerplant_amount: "$VALUE|Y0=$"
 fossil_powerplant_resource: "£resources_strip|$FRAME$"
 rail_way_plural: "铁路"
 agriculture_district: "商业化农业区"
 agriculture_district_plural: "商业化农业区"
 agriculture_district_desc: "§Y商业化农业区§!是我国所有非自给农业的总称。它包括农业工业、耕地、粮仓、屠宰场等。\n\n为所属地区提供：\n所需工人基础数量：§Y188K§!\n每个§Y商业化农业区§!的基本GDP产出：$§Y25B§!\n基础能源消耗：§R-0.10§! GW\n地区§Y燃料获取§!：8\n§Y当地补给能力§!：1.5%\n"
 agriculture_district_amount: "$VALUE|Y0=$"
 rocket_site: "导弹发射场"
 rocket_site_plural: "导弹发射场"
 rocket_site_desc: "§Y导弹发射场§! 涵盖了从§Y地空导弹§!到§Y洲际弹道导弹§!的所有战区级导弹装备。它使国家能够将这些战略资产部署在我们的战略空区，以协助我们的防空，或提供进攻能力。"
 nuclear_facility: "民用研发设施"
 nuclear_facility_plural: "民用研发设施"
 nuclear_facility_desc: "§Y民用研发设施§!包括与民用工业能力、核设施等有关的所有类型的特殊项目。"
 air_facility: "空气动力学和航空电子设施"
 air_facility_desc: "空气动力学和航空电子实验设施使您能够启动飞机、先进火箭、相关电子设备和空间项目的研究项目。"
 naval_facility_desc: "海军工程实验设施允许您启动与水面舰艇和潜艇相关的研究项目。\n海军工程只能在沿海省份创建。"
 stronghold_network: "省级防御网络"
 stronghold_network_plural: "省级防御网络"
 stronghold_network_desc: "由隧道、硬点、战壕、防空洞、武器库和预先计划的爆破点组成的广泛的防御网络为防御者提供了对抗任何攻击者的决定性优势。"
 renewable_energy_infra: "可再生能源基础设施"
 renewable_energy_infra_plural: "可再生能源基础设施"
 renewable_energy_infra_desc: "§Y可再生能源基础设施§!是所有可再生能源的总称。这些包括但不限于； 太阳能公园、风力涡轮机、生物燃料精炼厂、木炭厂、生物燃料发电厂等。因此，它使用可再生资源并用这些资源生产燃料。\n\n为该省提供：\n所需工人基础数量：§Y22.5K§!\n每个§Y可再生能源基础设施§!的基本GDP产出：$§Y2B§!\n基础能量获取：§G+0.5§! GW\n"
 renewable_energy_infra_amount: "$VALUE|Y0=$"
 renewable_energy_infra_resource: "£resources_strip|$FRAME$"
 microchip_plant: "微芯片工厂"
 microchip_plant_plural: "微芯片工厂"
 microchip_plant_desc: "该生产工厂将科技金属和贵金属转化为微芯片，以满足工业和军事需求。\n\n为所属地区提供：\n所需工人基础数量：§Y37.5K§!\n每个§Y微芯片工厂§!的基本GDP产出：$§Y32B§!\n基础能源消耗：§R-0.6§! GW\n16§Y微芯片§!生产\n\n§Y微芯片§!的单价最高，出口盈余可带来可观的现金收入。\n\n消耗：\n3§Y科技金属§!\n2§Y贵金属§!"
 composite_plant: "复合材料工厂"
 composite_plant_desc: "该生产工厂将石油橡胶和贵金属结合制成复合材料，供科学、军事和工业领域使用。\n\n为所属地区提供：\n所需工人基础数量：§Y37.5K§!\n每个§Y复合材料工厂§!的基本GDP产出：$§Y28B§!\n基础能源消耗：§R-0.8§! GW\n16§Y高级复合材料§!生产\n\n§Y复合材料§!的单价在市场上名列前茅，出口盈余可带来可观的现金收入。\n\n消耗：\n1§Y石油§!\n1§Y橡胶§!\n1§Y贵金属§!"
 composite_plant_plural: "复合材料工厂"
 rail_terminal: "铁路终端"
 rail_terminal_plural: "铁路终端"
 rail_terminal_desc: "拥有密集交通枢纽网络的地区，人员和货物的流动速度更快，工厂的投入更稳定，工人的上班路线更可靠，周边经济也获得了扩张的空间。"
 show_construction_speed: "检查后，您可以查看所有§Y建筑物§!的当前£construction_speed_texticon §Y建筑速度加成§!\n\n此修正仅显示针对特定建筑物的修正。它没有计入§Y全局£construction_speed_texticon 建筑速度§!"
 landmark_kaaba: "天房"
 landmark_kaaba_plural: "$landmark_kaaba$"
 landmark_kaaba_desc: "克尔白，这座位于麦加禁寺中心的立方体圣殿，是伊斯兰教最神圣的场所。它披着饰有金色书法的黑色丝绸，是朝拜方向（基卜拉），即全世界穆斯林祈祷时所面向的方向。这座被称为“真主之家”的古老圣地，承载着数个世纪的信仰、朝圣和伊斯兰历史，象征着穆斯林社群的团结。\n\n§Y地标天房§!会根据阿拉伯国家的总人口数创造旅游收入。具体金额可在§Y经济展望§!中查看。"
 landmark_milad: "默德塔"
 landmark_milad_plural: "$landmark_milad$"
 landmark_milad_desc: "默德塔的历史可以追溯到伊朗革命前时期，最初的规划可以追溯到20世纪70年代。1979年伊朗革命后，由于政治重心转移，这些早期规划被搁置。直到20世纪90年代末，这一构想才得以重启，并于2000年正式开工建设，这与伊朗当时对发展和现代化的重视不谋而合。默德塔的设计融合了伊朗传统元素和现代工程技术，使其成为历史传承和国家发展历程的鲜明象征。如今，这座塔已成为一座多功能综合体和重要的文化地标，为德黑兰居民和游客提供城市全景和远处厄尔布尔士山脉的壮丽景色。"
 landmark_domeofrock: "圆顶清真寺"
 landmark_domeofrock_plural: "$landmark_domeofrock$"
 landmark_domeofrock_desc: "圆顶清真寺是著名的伊斯兰教圣地，以其俯瞰耶路撒冷老城的金色圆顶而闻名。它建于七世纪，坐落在圣殿山（又称哈拉姆·沙里夫）上，这片土地对穆斯林和犹太教徒而言都是神圣之地。圣地内供奉着奠基石，穆斯林认为这块石头标志着先知穆罕默德升天的地方，而犹太教徒则认为这里是古代犹太圣殿至圣所的所在地。"
 landmark_goldengate: "金门大桥"
 landmark_goldengate_plural: "$landmark_goldengate$"
 landmark_goldengate_desc: "金门大桥于1937年竣工，横跨旧金山湾和太平洋之间的海峡，连接旧金山市和马林岬角。其独特的国际橙色桥塔和长长的悬索桥跨度，使其在通车时成为世界上同类桥梁中最长的，至今仍是美国最具辨识度的建筑之一。"
 landmark_UScongress: "美国国会大厦"
 landmark_UScongress_plural: "$landmark_UScongress$"
 landmark_UScongress_desc: "美国国会大厦位于华盛顿特区国家广场东端，是参议院和众议院的所在地。其新古典主义设计和中央圆顶使其成为美国立法权力中心最知名的地标，也是包括国会图书馆、最高法院和史密森尼学会博物馆群在内的走廊的核心。"
 landmark_fuji: "富士山"
 landmark_fuji_plural: "$landmark_fuji$"
 landmark_fuji_desc: "富士山海拔3776米，是日本最高峰，位于本州岛，是一座活火山，晴朗的日子里从东京即可看到。它长期以来被神道教视为圣地，也是日本艺术的标志性主题，同时也是联合国教科文组织世界遗产。富士山近乎完美的圆锥形山体和周围的湖泊每年都吸引着成千上万的登山者和游客。"
 landmark_giza: "吉萨金字塔"
 landmark_giza_plural: "$landmark_giza$"
 landmark_giza_desc: "吉萨金字塔群建于古埃及王国时期，是为法老建造的宏伟陵墓，矗立在开罗郊外。其中，为法老胡夫建造的大金字塔是古代世界七大奇迹中唯一保存至今的建筑。金字塔群与狮身人面像一起，至今仍是埃及最热门的旅游景点之一，也是埃及旅游经济的支柱。"
 landmark_shuttle: "肯尼迪航天中心"
 landmark_shuttle_plural: "$landmark_shuttle$"
 landmark_shuttle_desc: "位于佛罗里达州大西洋沿岸的肯尼迪航天中心是美国宇航局载人航天任务的主要发射基地。中心内设有标志性的车辆组装大楼（火箭在此进行发射前的准备工作）和39号发射台（阿波罗计划和航天飞机计划的历史性发射点）。该中心至今仍是创新和探索的中心，为政府和商业发射提供支持。"
 landmark_shuttle_launch: "肯尼迪航天中心"
 landmark_shuttle_launch_plural: "$landmark_shuttle_launch$"
 landmark_shuttle_launch_desc: "位于佛罗里达州大西洋沿岸的肯尼迪航天中心是美国宇航局载人航天任务的主要发射基地。中心内设有标志性的车辆组装大楼（火箭在此进行发射前的准备工作）和39号发射台（阿波罗计划和航天飞机计划的历史性发射点）。该中心至今仍是创新和探索的中心，为政府和商业发射提供支持。"
 landmark_buran: "拜科努尔航天发射场"
 landmark_buran_plural: "$landmark_buran$"
 landmark_buran_desc: "位于哈萨克斯坦南部草原上的拜科努尔航天发射场是世界上历史最悠久、规模最大的仍在运营的航天发射场。该发射场始建于1955年，曾是苏联和俄罗斯诸多里程碑式航天任务的发射基地，其中包括尤里·加加林乘坐“东方一号”飞船完成的首次载人航天飞行。俄罗斯目前仍从哈萨克斯坦租赁该发射场，并将其用于向国际空间站发射载人“联盟号”飞船。"
 landmark_ICBMsilominot: "米诺特空军基地"
 landmark_ICBMsilominot_plural: "$landmark_ICBMsilominot$"
 landmark_ICBMsilominot_desc: "米诺特空军基地的导弹防御系统由遍布北达科他州平原的庞大地下发射井网络组成，这些发射井储存着洲际弹道导弹。这些发射井经过加固，能够抵御核打击，并受到严密守卫，始终处于警戒状态，构成了美国核三位一体陆基防御体系的一部分。"
 landmark_ICBMsiloyasny: "亚斯尼导弹基地"
 landmark_ICBMsiloyasny_plural: "$landmark_ICBMsiloyasny$"
 landmark_ICBMsiloyasny_desc: "位于俄罗斯奥伦堡州栋巴罗夫斯基附近的亚斯尼导弹基地是俄罗斯战略火箭军的主要发射井群之一。该基地建于冷战时期，拥有坚固的地下发射井，储存着重型洲际弹道导弹，是俄罗斯核威慑力量的关键组成部分。"
 landmark_zenobia_wall: "芝诺比娅防线"
 landmark_zenobia_wall_plural: "$landmark_zenobia_wall$"
 landmark_zenobia_wall_desc: "一条重兵把守的防线横跨埃及南部和西部沙漠。混凝土墙、碉堡群和预先部署的火炮构成了芝诺比娅防线的屏障，这条防线旨在阻止奇美拉从撒哈拉以南的突破口推进。"
 landmark_hagia_sophia_plural: "$landmark_hagia_sophia$"
 landmark_hagia_sophia_desc: "圣索菲亚大教堂最初建于公元537年，是一座拜占庭式大教堂。1453年奥斯曼帝国征服伊斯坦布尔后，它成为伊斯坦布尔的主要清真寺。在土耳其共和国的大部分历史时期，它都作为一座世俗博物馆而存在。其巨大的中央穹顶和拜占庭马赛克镶嵌画至今仍是最具影响力的宗教建筑作品之一，每年吸引着数百万游客前往伊斯坦布尔。"
 landmark_forbidden_city_desc: "位于北京中心的紫禁城，这座被围墙环绕的宫殿建筑群，近五个世纪以来一直是明清两代皇室的居所。如今，这里是故宫博物院所在地，收藏着世界上最重要的中国艺术品和文物之一。紫禁城是中国游客最多的文化景点，也是联合国教科文组织世界遗产，堪称中华文明的象征。"
 landmark_tokyo_imperial_palace_desc: "自明治维新以来，皇宫一直是日本天皇的主要居所，坐落于东京市中心，原址为江户城。皇宫及其庭院象征着世界上最古老的世袭君主制的延续。虽然不对公众开放，但东御苑和重要的皇室仪式每年都吸引着大量游客。"
 landmark_taj_mahal_plural: "$landmark_taj_mahal$"
 landmark_taj_mahal_desc: "泰姬陵由莫卧儿皇帝沙贾汗于1632年下令建造，作为其爱妻蒙塔兹·玛哈尔的陵墓，是现存最精美的莫卧儿建筑典范。其洁白的大理石外墙、精美的镶嵌工艺和对称的花园使其成为联合国教科文组织世界遗产，也是地球上游客最多的古迹之一，每年吸引数百万游客前往阿格拉。"
 landmark_prague_castle: "布拉格城堡"
 landmark_prague_castle_desc: "布拉格城堡是世界上占地面积最大的古代城堡建筑群，曾是波西米亚国王、神圣罗马帝国皇帝的居所，如今则是捷克共和国总统的官邸。城堡内坐落着圣维特大教堂，以及来自中欧各地的数百年艺术珍品，使其成为捷克游客最多的文化景点。"
 landmark_bojnice_castle: "博伊尼采城堡"
 landmark_bojnice_castle_desc: "博伊尼采城堡是一座浪漫的新哥特式建筑，由斯洛伐克中世纪堡垒重建而成。它于19世纪末由亚诺什·帕尔菲伯爵主持重建，风格仿照法国卢瓦尔河谷城堡。如今，它是斯洛伐克最受欢迎的文化景点之一，其塔楼林立的轮廓和周围的公园是斯洛伐克文化遗产旅游的核心。"
 landmark_sadabad_complex: "萨达巴德宫"
 landmark_sadabad_complex_plural: "$landmark_sadabad_complex$"
 landmark_sadabad_complex_desc: "这座庞大的宫殿建筑群位于德黑兰北部山麓，最初由卡扎尔王朝建造，后经巴列维王朝大幅扩建。1979年革命后，该建筑群被收归国有，如今已成为一个国家博物馆网络，收藏着皇家藏品、伊朗艺术品和自然历史文物。"
 landmark_hofburg_palace_desc: "霍夫堡宫位于维也纳市中心，几个世纪以来一直是哈布斯堡王朝的主要皇宫。如今，宫内设有奥地利联邦总统办公室、西班牙骑术学校、皇家财政部以及数座重要博物馆。它仍然是维也纳的标志性建筑之一，也是奥地利文化旅游的核心景点。"
 landmark_berlin_reichstag_desc: "位于共和国广场的德国国会大厦一百多年来一直是柏林的政治中心。它在1933年和第二次世界大战期间都遭受了严重破坏，两德统一后，在诺曼·福斯特的重新设计下得以修复，并于1999年重新开放，成为德国联邦议院的所在地。其玻璃穹顶已成为现代德国民主的标志性象征，也是柏林市中心的主要景点之一。"
 enrichment_facility: "核浓缩设施"
 enrichment_facility_plural: "核浓缩设施"
 enrichment_facility_desc: "浓缩设施接收铀并将其浓缩，用于核反应堆，并在一定程度上用于核武器。"