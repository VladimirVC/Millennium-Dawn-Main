 SOV_Bring_back_the_legacy_of_the_Russian_Empire: "Przywróć dziedzictwo imperium rosyjskiego"
 SOV_Bring_back_the_legacy_of_the_Russian_Empire_desc: "\n\n\n\n\n\n£SOV_desctext_empire \n\n\n\n\n\n\n\n\nNadszedł czas, aby przywrócić historyczne nazwy rosyjskich miast, oddając hołd naszemu dziedzictwu. To odrodzenie połączy nas na nowo z naszą chwalebną przeszłością i wzbudzi dumę narodową w całym kraju."
 SOV_Former_Russian_capital: "Była stolica Rosji"
 SOV_Former_Russian_capital_desc: "Aby odzyskać dziedzictwo Rosji, musimy ponownie uczynić Petersburg naszą stolicą. Ten symboliczny krok przywróci miastu historyczny status i potwierdzi nasze przywiązanie do tradycji."
 sov_nationalists.1.t: "Zmiana Konstytucji Narodowej"
 sov_nationalists.1.d: "Nasza poprzednia konstytucja była prawdopodobnie najgorszą w historii Rosji! Aby wymazać ten haniebny dokument, stworzymy prawdziwie rosyjską konstytucję. Kluczową decyzją jest to, czy utrzymać tradycyjną centralizację, czy też wybrać bardziej zdecentralizowaną, ale ekspansywną drogę. Którą drogę powinniśmy wybrać?"
 sov_nationalists.1.a: "Rosja musi się ustabilizować, zanim zacznie pomagać innym!"
 sov_nationalists.1.b: "Ekspansjonizm jest naszym narodowym przeznaczeniem i musi być zapisany w konstytucji!"
 sov_nationalists.3.t: "Rosja oferuje nam swoją ochronę"
 sov_nationalists.3.d: "Prezydent Rosji oficjalnie zaproponował dziś umieszczenie baz wojskowych na naszym terytorium, aby chronić nas przed zagrożeniami zewnętrznymi. Ta propozycja mogłaby znacząco wzmocnić nasze bezpieczeństwo."
 sov_nationalists.3.a: "Rosja nas uratuje!"
 sov_nationalists.3.b: "Sami sobie z tym poradzimy!"
 sov_nationalists.4.t: "Rosja oferuje nam wysłanie PMC Wagnera"
 sov_nationalists.4.d: "Rząd rosyjski zaoferował wysłanie na pomoc specjalistów z renomowanej prywatnej firmy wojskowej Wagner. Ich obecność mogłaby przechylić szalę na naszą korzyść."
 sov_nationalists.4.a: "Akceptujemy je"
 sov_nationalists.4.b: "Nie potrzebujemy tu najemników!"
 sov_nationalists.5.t: "Rosja proponuje ożywienie Ententy"
 sov_nationalists.5.d: "Rząd rosyjski zaproponował odrodzenie sojuszu Ententy. Ta nieoczekiwana oferta może pozwolić naszym narodom ponownie stanąć razem, zjednoczone w obliczu wspólnych zagrożeń."
 sov_nationalists.5.a: "Niech żyje Ententa!"
 sov_nationalists.5.b: "Nie potrzebujemy tego"
 sov_nationalists.6.t: "Rewolucja Rosyjska"
 sov_nationalists.6.d: "Nasza republika ma teraz szansę na odzyskanie niepodległości! Narodowi bolszewicy sprowadzili tu swoich towarzyszy i razem pokonamy naszych wrogów i zdobędziemy naszą przyszłość."
 sov_nationalists.6.a: "Rosja nas uratuje!"
 sov_nationalists.7.t: "§Y[SOV.GetNameWithFlag]§! Oferuje ochronę"
 sov_nationalists.7.d: "Rząd rosyjski proponuje podpisanie szeregu porozumień gwarantujących naszą ochronę przed inwazjami z zewnątrz. Czy zaakceptujemy ten pakt bezpieczeństwa?"
 sov_nationalists.7.a: "Rosja nas uratuje!"
 sov_nationalists.7.b: "NIE"
 sov_nationalists.8.t: "§Y[SOV.GetNameWithFlag]§! Oferty dołączenia do sojuszu"
 sov_nationalists.8.d: "Rząd rosyjski proponuje zawarcie sojuszu poprzez serię porozumień mających na celu ochronę nas przed zagrożeniami zewnętrznymi. Czy zaakceptujemy ten pomysł?"
 sov_nationalists.8.a: "Rosja nas uratuje!"
 sov_nationalists.8.b: "NIE"
 sov_nationalists.9.t: "Nowy rosyjski podmiot"
 sov_nationalists.9.d: "Nowe państwo zostało poddane rosyjskim wpływom poprzez naciski dyplomatyczne i wojskowe. To rozszerzenie naszego obszaru wzmacnia pozycję Rosji w regionie."
 sov_nationalists.9.a: "Witamy w gronie"
 russia.29.t: "Referendum w sprawie Konstytucji Republiki Czeczeńskiej"
 russia.29.d: "Po zakończeniu brutalnego i krwawego konfliktu Czeczenia ma teraz szansę na powrót do pokojowego życia. Kolejnym pytaniem pozostaje struktura jej relacji z Moskwą – czy pozostanie w pełni zintegrowana jako podmiot federalny, czy zachowa pewne autonomie?"
 russia.29.o1: "Trochę autonomii im nie zaszkodzi"
 russia.29.o2: "Jestem gotowy osobiście rządzić Czeczenią"
 sov_vybory.2.t: "Putin wybrany na prezydenta"
 sov_vybory.2.d: "Władimir Putin wygrał pierwszą turę wyborów prezydenckich, zdobywając 63,75% głosów, przy czym przeliczono 99% głosów. Opozycja kwestionowała legalność wyników, grożąc masowymi protestami. Według najnowszych danych Centralnej Komisji Wyborczej, w wyborach wzięło udział 65,3% uprawnionych do głosowania."
 sov_vybory.2.a: "Lider Znowu tutaj!"
 sov_vybory.1.t: "Miedwiediew wybrany na prezydenta"
 sov_vybory.1.d: "Dmitrij Miedwiediew, pierwszy wicepremier, odniósł zdecydowane i oczekiwane zwycięstwo w wyborach prezydenckich, zastępując Władimira Putina. Choć Miedwiediew obiecuje liberalną zmianę polityki, wielu uważa, że ​​władza pozostaje w rękach Putina."
 sov_vybory.1.a: "Zobaczmy, jak sobie radzi!"
 russia_med.1.t: "Milicja przemianowana na Policja"
 russia_med.1.d: "Prezydent Dmitrij Miedwiediew podpisał ustawę o policji, która stanowi kluczową reformę systemu egzekwowania prawa. Reforma zmienia nazwę „Milicja” na „Policja”, a jej celem jest ograniczenie nakładania się biurokracji przy jednoczesnym wzmocnieniu partnerstwa między policją a społeczeństwem obywatelskim. Na nowo definiuje również obowiązki, prawa i odpowiedzialność funkcjonariuszy policji."
 russia_med.1.a: "To zmienia wszystko."
 russia_med.2.t: "Putin jedzie do Pikalyowa"
 russia_med.2.d: "W obliczu głębokiego kryzysu finansowego zamknięto dwa z trzech kluczowych zakładów przemysłowych w mieście Pikalyowo, pozostawiając pracowników bez pracy i w rozpaczy. Wybuchły masowe protesty, co skłoniło rząd do interwencji. Putin osobiście odwiedził miasto, wezwał zaangażowanych w konflikt oligarchów i zażądał ponownego otwarcia fabryk – demonstrując w ten sposób swoją władzę nad elitą gospodarczą Rosji."
 russia_med.2.a: "Oddaj mi mój długopis!"
 rusboloto.1.t: "Protesty w Moskwie!"
 rusboloto.1.d: "W Moskwie, sfrustrowanej kolejną polityczną przetasowaniem władzy, wybuchły masowe protesty. Szacuje się, że wzięło w nich udział od 25 000 do 150 000 osób. Demonstracje na rzecz uczciwych wyborów odbyły się w 99 miastach Rosji i 45 miastach za granicą. Nagłe zwołanie egzaminu szkolnego przez moskiewski Departament Edukacji tylko spotęgowało gniew społeczny. Protestujący, uzbrojeni w domowej roboty transparenty, domagają się uczciwych i przejrzystych wyborów."
 rusboloto.1.a: "Zmiażdż ich przy pomocy organów ścigania!"
 rusboloto.2.t: "Wzmożone protesty w Moskwie!"
 rusboloto.2.d: "Pomimo oporu policji, protestujący nadal gromadzą się na placu Błotnym. Doniesienia wskazują, że kilku funkcjonariuszy zostało rannych butelkami i koktajlami Mołotowa rzucanymi z tłumu. Policja zareagowała, zatrzymując opozycjonistów, ale powstrzymała się od użycia gazu. Organizatorzy, tacy jak Nawalny i Udalcow, są obecnie ścigani na podstawie przepisów dotyczących podżegania do zamieszek i przemocy wobec funkcjonariuszy organów ścigania."
 rusboloto.2.a: "Zmiażdż ich organami ścigania (ponownie)!"
 rusboloto.2.b: "Zgods"
 rusboloto.3.t: "Protesty były obsługiwane przez policję"
 rusboloto.3.d: "Ruch protestacyjny nie osiągnął swoich celów i został skutecznie stłumiony przez władze. Sytuacja jest obecnie pod kontrolą."
 rusboloto.3.a: "Wspaniały"
 sov_other.2.t: "Komuniści wybrani w Rosji"
 sov_other.2.d: "W wyniku przełomowej zmiany politycznej Partia Komunistyczna powróciła do władzy w Rosji. Obiecując przywrócenie porządku socjalistycznego, obecnie promuje całkowitą transformację ideologiczną. Nowe kierownictwo twierdzi, że jest gotowe całkowicie odmienić przyszłość Rosji – przywracając przeszłość do życia."
 sov_other.2.a: "Nowy ZSRR?"
 sov_other.3.t: "Dowcipy klubu komediowego o naszym prezydencie"
 sov_other.3.d: "Komicy z popularnego ormiańskiego programu telewizyjnego Comedy Club niedawno zażartowali z naszego nowo wybranego prezydenta. Czy powinniśmy odpuścić, czy domagać się przeprosin za brak szacunku?"
 sov_other.3.a: "Jeszcze nie."
 sov_other.3.b: "Poproś ich o przeprosiny."
 sov_other.6.t: "Wielki Rosyjski Marsz"
 sov_other.6.d: "W Rosji niedawno odbyły się masowe marsze nacjonalistyczne, w których uczestniczyli nacjonaliści, monarchiści, duchowni prawosławni i pogańscy rodzimowiercy. Doszło do starć z mniejszościami etnicznymi z republik islamskich. Sytuacja jest napięta i może przerodzić się w coś bardziej niebezpiecznego."
 sov_other.6.a: "Rosjanie — naprzód!"
 sov_other.9.t: "Rosja wspiera Ukrainę!"
 sov_other.9.d: "Nowy demokratyczny rząd Rosji rozpoczął inicjatywę dyplomatyczną mającą na celu poprawę stosunków z Ukrainą. Obejmuje ona integrację kulturową, wsparcie działań antykorupcyjnych oraz propozycje wzajemnej współpracy w budowaniu instytucji demokratycznych."
 sov_other.9.a: "Bracia na zawsze!"
 sov_other.9.b: "Prawda jest w braterstwie"
 sov_other.10.t: "Rosja pomaga nam zwalczać korupcję!"
 sov_other.10.d: "Na mocy nowego porozumienia antykorupcyjnego Rosja pomogła w aresztowaniu i przejęciu majątku ważnego skorumpowanego oligarchy. Współpraca ta zadała poważny cios korupcji w naszym kraju."
 sov_other.10.a: "Dzięki"
 sov_other.11.t: "Masowe ćwiczenia wojskowe Rosji i NATO!"
 sov_other.11.d: "Po zwróceniu się ku Zachodowi, Rosja zainicjowała na swoim terytorium zakrojone na szeroką skalę wspólne ćwiczenia wojskowe z siłami NATO. Ćwiczenia te symbolizują nową erę współpracy i wzajemnego zaufania."
 sov_other.11.a: "Kiedyś wrogowie, teraz przyjaciele."
 sov_other.12.t: "Wojska NATO w Rosji"
 sov_other.12.d: "W ramach nowego sojuszu z Zachodem Rosja zezwoliła na stacjonowanie sił NATO na swoim terytorium w celu promowania stabilności regionalnej i wspólnego bezpieczeństwa."
 sov_other.12.a: "Dobrze"
 SOV_combined_economic_system: "Połączony system gospodarczy"
 SOV_combined_economic_system_desc: "Zawierając kompromis między instytucjami państwowymi a interesami oligarchii, tworzymy unikatowe, rosyjskie rozwiązanie problemu ożywienia gospodarczego. Równowaga i kontrola określą naszą drogę naprzód."
 SOV_oligarchic_republic: "Republika Oligarchiczna"
 SOV_oligarchic_republic_desc: "Kiedy oligarchowie sfinalizowali fuzje korporacyjne, rozpoczęła się nowa era – Rosja rządzona przez oligarchów, w której prywatna władza dyktowała politykę państwa."
 SOV_continue_etatist_rise: "Kontynuuj Powstanie etatystów"
 SOV_continue_etatist_rise_desc: "Rosja nie może sobie pozwolić na rządy niepokornych klanów oligarchów, którzy eksportują nasze zasoby dla własnych korzyści. Potrzebujemy stanowczego przywództwa i jesteśmy gotowi je zapewnić."
 sov_other.13.t: "Propozycja rosyjska..."
 sov_other.13.d: "Nowy demokratyczny rząd Rosji zaproponował Ukrainie wzajemne porozumienie językowe. Język rosyjski zyskałby na Ukrainie status oficjalny, a Rosja promowałaby edukację w języku ukraińskim wśród etnicznych Ukraińców. Inicjatywa ta ma na celu wspieranie pokoju, wymiany kulturalnej i długoterminowej przyjaźni między naszymi narodami."
 sov_other.13.a: "Wspaniały pomysł!"
 sov_other.13.b: "Przepraszam, nie"
 sov_other.14.t: "Ukraina przyjęła naszą propozycję!"
 sov_other.14.d: "Ukraina zgodziła się na naszą wspólną propozycję integracji językowej. Rozpoczęła się nowa era współpracy."
 sov_other.14.a: "Wspaniały"
 sov_other.15.t: "Ukraina odrzuciła naszą propozycję!"
 sov_other.15.d: "Ukraina odrzuciła naszą ofertę wzajemnej integracji i współpracy językowej."
 sov_other.15.a: "Dlaczego?"
 SOV_nemtsov: "Borys Niemcow"
 SOV_nemtsov_desc: "Boris Jefimowicz Niemcow (9 października 1959 – 27 lutego 2015) jest rosyjskim fizykiem, politykiem o liberalnych poglądach i zagorzałym krytykiem Władimira Putina. Odegrał kluczową rolę w kształtowaniu reform gospodarczych w okresie transformacji ustrojowej i piastował wysokie stanowiska u prezydenta Jelcyna, w tym gubernatora Niżnego Nowogrodu, ministra paliw i energetyki oraz wicepremiera. Niemcow później założył ruch Młoda Rosja, był współzałożycielem Słusznej Sprawy i współtworzył Związek Sił Prawicowych, liberalno-reformistyczny blok polityczny. Jego dziedzictwo pozostaje symbolem demokratycznego oporu we współczesnej historii Rosji."
 SOV_union_of_right_forces: "Związek Prawicowych Sił"
 SOV_union_of_right_forces_desc: "Teraz to my będziemy u steru władzy. Związek Sił Prawicowych dąży do skierowania Rosji w stronę wartości demokratycznych i liberalizmu rynkowego. Z doświadczonymi reformatorami i jasno określonym programem, będziemy pracować nad modernizacją kraju od wewnątrz."
 SOV_conservative_russia: "Konserwatywna Rosja"
 SOV_conservative_russia_desc: "Globalne zmiany niemal ponownie zniszczyły Rosję. Czas powrócić do pokojowych reform. Konserwatywny kurs pomoże zachować tradycyjne wartości, przywrócić porządek i ustabilizować nasz kraj w niepewnych czasach."
 SOV_tsar_boris: "Car Borys"
 SOV_tsar_boris_desc: "Dekady rządów sowieckich pozbawiły nasz naród duchowej równowagi i sprowadziły Rosję na manowce. Tylko monarchia, choćby symboliczna, może przywrócić nasz naród na właściwą drogę. Odrodzona monarchia będzie jednoczącą siłą kulturową w rozbitym społeczeństwie."
 SOV_reform_constitution: "Reforma konstytucyjna"
 SOV_reform_constitution_desc: "Nasza konstytucja musi zostać zreformowana w związku z powrotem monarchii, choć w bardzo ograniczonym zakresie. Zmiany te utrwalą ceremonialną rolę monarchii, jednocześnie zachowując demokratyczne instytucje i rządy prawa."
 SOV_curb_corruption: "Walka z korupcją"
 SOV_curb_corruption_desc: "Skorumpowani urzędnicy to wrogowie Rosji. Ich wykorzenienie jest niezbędne do zbudowania zaufania do rządu i przyciągnięcia inwestycji. Działania te będą wymagały szeroko zakrojonych reform i silnej woli politycznej."
 SOV_economical_liberalism: "Liberalizm gospodarczy"
 SOV_economical_liberalism_desc: "Wolny rynek jest kluczem do wyciągnięcia Rosji z ubóstwa. Powinniśmy oddzielić rząd od sektora prywatnego i pozwolić przedsiębiorstwom działać niezależnie. Ograniczenie biurokracji i wspieranie przedsiębiorczości uwolni prawdziwy potencjał gospodarczy kraju."
 SOV_affirm_orthodoxy: "Kościół jest naszym przyjacielem"
 SOV_affirm_orthodoxy_desc: "Lata ateizmu państwowego w Związku Radzieckim oddaliły nas od Boga. Odbudowując nasze kościoły i zwracając majątek zabrany duchowieństwu, rozpoczniemy duchowe uzdrowienie naszego narodu. Kościół prawosławny będzie moralnym fundamentem naszego odrodzenia narodowego."
 SOV_russian_history_patr: "Szanuj historię Rosji"
 SOV_russian_history_patr_desc: "Nie da się naśladować sowieckiego modelu poniżania naszej imperialnej przeszłości. Musimy uszanować całą rosyjską historię – od carów po czasy współczesne. Silna przyszłość zależy od zrozumienia i poszanowania naszego dziedzictwa."
 SOV_joint_us_ventures: "Partnerstwo z USA"
 SOV_joint_us_ventures_desc: "Umożliwimy Stanom Zjednoczonym tworzenie baz wojskowych na naszym terytorium i wspieranie wspólnych przedsięwzięć gospodarczych. To wzmocni więzi dyplomatyczne, zmodernizuje naszą gospodarkę i zwiększy nasze wpływy na arenie międzynarodowej."
 SOV_iron_guard_militarism: "Żelazna Gwardia"
 SOV_iron_guard_militarism_desc: "Stworzymy jednostkę specjalną – Żelazną Gwardię. Będą oni stanowić elitę królewską, odpowiadając za ochronę monarchii, przeprowadzanie delikatnych misji i dowodzenie na froncie. Ich lojalność i wyszkolenie uczynią z nich symbol nowej ery."
 SOV_laying_the_bricks: "Budowanie wspaniałego kraju cegła po cegle"
 SOV_laying_the_bricks_desc: "Każdy krok, który stawiamy, niczym cegła w budowie domu, przybliża nas do zbudowania Wielkiej Rosji. Postęp będzie następował stopniowo, dzięki cierpliwości, wizji i ciężkiej pracy. To fundament naszego odrodzenia narodowego."
 SOV_navalny: "Aleksiej Nawalny"
 SOV_navalny_desc: "Aleksiej Anatolijewicz Nawalny (ur. 4 czerwca 1976 r.) jest rosyjskim liderem opozycji, prawnikiem i działaczem antykorupcyjnym. Organizował liczne protesty i kwestionował władzę prezydenta Putina. Jako lider partii Rosja Przyszłości i założyciel Fundacji Antykorupcyjnej, Nawalny cieszy się międzynarodowym uznaniem za swoje działania na rzecz praw człowieka. Został uznany za więźnia sumienia przez Amnesty International i otrzymał Nagrodę Sacharowa za Wolność Myśli. Określenie przez niego Jednej Rosji mianem „partii oszustów i złodziei” stało się okrzykiem bojowym reformatorów."
 SOV_path_of_western: "Droga westernizmu"
 SOV_path_of_western_desc: "Zimna wojna dobiegła końca. Nacjonalizm i komunizm leżą w naszej przeszłości. Jedyną drogą naprzód jest demokracja, ku końcowi historii. Przyjęcie zachodnich wartości i instytucji zapewni Rosji miejsce we współczesnym świecie."
 SOV_new_russia: "Nowa Rosja"
 SOV_new_russia_desc: "Nadszedł czas, aby Rosja wybrała nowy kierunek, ścieżkę, którą podążała przez stulecia."
 SOV_release_prisoners: "Uwolnić więźniów politycznych"
 SOV_release_prisoners_desc: "W naszym pięknym kraju nie ma miejsca dla więźniów politycznych. Musimy przyznać im wolność."
 SOV_true_federalism: "Prawdziwy federalizm"
 SOV_true_federalism_desc: "Czas położyć kres fałszywemu federalizmowi narzuconemu w latach 90. Przywrócimy regionom prawdziwą autonomię."
 SOV_rework_constituion: "Referendum demokratyczne w sprawie konstytucji"
 SOV_rework_constituion_desc: "Przeprowadzimy kompleksową reformę konstytucji, ze szczególnym uwzględnieniem praw i interakcji podmiotów federalnych."
 SOV_referendum_start: "Referendum poddanych Rosji"
 SOV_referendum_start_desc: "Każdy podmiot federacji przeprowadzi własne referendum w sprawie pozostania częścią Rosji lub uzyskania niepodległości."
 SOV_return_arms_subject: "Powrót poddanych siłą"
 SOV_return_arms_subject_desc: "Nie uznajemy ich chęci secesji i użyjemy siły, aby ich sprowadzić z powrotem."
 SOV_subject_guarantee: "Gwarancja niepodległości"
 SOV_subject_guarantee_desc: "Będziemy szanować ich niezależność, a nawet formalnie ją zagwarantujemy."
 SOV_usr: "Stany Zjednoczone Rosji"
 SOV_usr_desc: "Zainspirowani sukcesem USA, zreformujemy nasz system, aby bardziej przypominał ich system."
 SOV_new_establishment: "Nowy zakład"
 SOV_new_establishment_desc: "Nowe republiki będą potrzebowały nowego przywództwa, aby bronić swoich interesów w państwie rosyjskim."
 SOV_like_usa_weapon: "Bezpłatny dostęp do broni"
 SOV_like_usa_weapon_desc: "Niech żyje wolność broni! Wprowadzimy politykę, która umożliwi obywatelom korzystanie z prawa do posiadania broni, inspirowaną modelem amerykańskim. To wzmocni jednostki i wzmocni ideę wolności i samowystarczalności."
 SOV_our_own_section_230: "Nasza sekcja 230"
 SOV_our_own_section_230_desc: "W naszym ustawodawstwie stosujemy praktykę określoną w Sekcji 230. Chroniąc platformy internetowe przed odpowiedzialnością za treści tworzone przez użytkowników, wspieramy bardziej wolny i otwarty internet. Innowacje kwitną, gdy wolność słowa jest chroniona."
 SOV_liberal_loyalty_idea: "Lojalność liberalna"
 SOV_karabakh_question: "Rozwiąż problem Artsakh"
 SOV_karabakh_question_desc: "Czas się z tym zmierzyć. Konflikt w Arcachu nadal jest źródłem niestabilności w regionie. Rosja musi zająć jasne i oparte na zasadach stanowisko, aby zapewnić trwały pokój."
 SOV_georgia_question: "Kwestia gruzińska"
 SOV_georgia_question_desc: "Czas się z tym zmierzyć. Relacje z Gruzją są napięte, a nierozstrzygnięte kwestie terytorialne wciąż trwają. Należy opracować długoterminową strategię rozwiązania konfliktu i stabilizacji Kaukazu."
 sov_other.17.t: "Rosja wspiera Armenię!"
 sov_other.17.d: "Rosja niedawno zadeklarowała otwarte poparcie dla Armenii i jej starań o odzyskanie utraconych terytoriów. Ten krok oznacza zmianę w naszej polityce regionalnej i może znacząco zmienić równowagę sił na Kaukazie."
 sov_other.17.a: "Ciekawy"
 sov_other.18.t: "Rosja decyduje się na utrzymanie status quo"
 sov_other.18.d: "Rosja zdecydowała się nie popierać otwarcie roszczeń terytorialnych Armenii. Na razie rząd wybrał bardziej ostrożne i neutralne podejście, aby uniknąć dalszej eskalacji w regionie."
 sov_other.18.a: "Ciekawy"
 SOV_FSB_expansion: "Rozwiń FSB"
 SOV_FSB_expansion_desc: "FSB jest naszą główną agencją bezpieczeństwa i musimy zapewnić jej nowoczesne zaplecze i zasoby, aby mogła sprostać dzisiejszym wyzwaniom."
 SOV_alpha_omon_exp: "Grupa Alfa"
 SOV_alpha_omon_exp_desc: "Grupa Alfa, oficjalnie Zarząd A Centrum Specjalnego Przeznaczenia FSB, to elitarna jednostka sił specjalnych utworzona przez radzieckie KGB w 1974 roku. Działając pod bezpośrednią kontrolą polityczną, prowadzi ona ryzykowne operacje tajne i paramilitarne zarówno w Rosji, jak i poza jej granicami."
 SOV_form_yunarmiya: "Utwórz Yunarmiyę"
 SOV_form_yunarmiya_desc: "Yunarmiya, patriotyczna organizacja młodzieżowa, pomoże zainspirować przyszłe pokolenia do wspierania wojska."
 SOV_first_bars_start: "§YBARS 1§! - Oddział Kozacki Kubań im. Z. Chepego"
 SOV_first_bars_start_desc: "Utworzone na terenie Kubania z ochotników kozackich."
 SOV_second_bars_start: "§YBARS 2§! – Ochotnicy z Jakucji"
 SOV_third_bars_start: "§YBARS 3§! - Rodina"
 SOV_four_bars_start: "§YBARS 4,5§! i §Y7§!"
 SOV_six_bars_start: "§YBARS 6§! – „Forstadt”"
 SOV_eight_bars_start: "§YBARS 8§! - Rus"
 SOV_nine_bars_start: "§YBARS 9,10,11§! i §Y12§!"
 SOV_thirdteen_bars_start: "§YBARS 13§! - Ruski Mir"
 SOV_fiveteen_bars_start: "§YBARS 15§! - Ermak"
 SOV_eighteen_bars_start: "§YBARS 18§! - Vimpel"
 SOV_eighteen_bars_start_desc: "Utworzony z Kozaków Armii Dońskiej, mieszkańców obwodu rostowskiego"
 SOV_thirty_two_bars_start: "§YBARS 32§! – Batalion Ochotniczy im. P. A. Sudopłatowa"
 SOV_roskosmos_bars_start: "§YBattalion§! Uran"
 SOV_twenty_nine_bars_start: "§YBARS-29§! Newski"
 SOV_thirty_four_bars_start: "Batalion Kozacki §YBARS-34§! Armii Kozackiej Jenisej na Syberii"
 SOV_malorossia_flag: "Projekt Malorossia został sfinansowany"
 SOV_vitebsk_flag: "Projekt Witebsk został sfinansowany"
 SOV_first_bars_flag: "Pierwsza fala BARS jest szkolona"
 SOV_second_bars_flag: "Druga fala BARS jest szkolona"
 SOV_third_bars_flag: "Trzecia fala BARS jest szkolona"
 SOV_union_annex_belarus: "Powstało Państwo Związkowe"
 SOV_romanov_empire: "Święte Cesarstwo Romanowów"
 SOV_hyper_empire: "Trzeci Rzym"
 demsov_supp_arm: "Wspieraliśmy Armenię"
 demsov_supp_aze: "Wspieraliśmy Azerbejdżan"
 sov_furgal.1.t: "Sprawa Siergieja Furgala"
 sov_furgal.1.d: "W rosyjskim obwodzie chabarowskim gubernator z nacjonalistycznej partii LDPR przedstawia się jako „święty człowiek”. Usuwa lojalnych wobec nas urzędników, agresywnie walczy z korupcją, obniża pensje i zwalnia wielu urzędników. Z jednej strony możemy go chwalić jako wzór uczciwości. Z drugiej strony, zbyt mocno ingeruje w interesy biznesowe lojalnych wobec nas oligarchów i promuje idee nacjonalistyczne i demokratyczne. Jak powinniśmy sobie poradzić z tą sytuacją?"
 sov_furgal.1.a: "Stracił moje zaufanie. Stwórz przeciwko niemu sprawę karną."
 sov_furgal.1.b: "Wspierajmy to zachowanie!"
 sov_furgal.2.t: "Furgal w więzieniu!"
 sov_furgal.2.d: "Furgal został skazany i uwięziony. Stolicę obwodu przeniesiono z Chabarowska do Władywostoku. Mieszkańcy Chabarowska protestują jednak przeciwko aresztowaniu Furgala, domagając się impeachmentu naszego najwyższego przywódcy i domagając się jego uwolnienia. W przeciwieństwie do liberalnych demonstrantów, zwolennicy Furgala machają flagami Chabarowska. Co zrobimy?"
 sov_furgal.2.a: "Stłumić protesty!"
 sov_girkin.1.t: "Zdobycie Słowiańska!"
 sov_girkin.1.d: "Początkowo konflikt w Donbasie nie był gwałtowny. Choć proklamowano Doniecką Republikę Ludową, a pro-Euromajdanowy aktywista Dmitrij Czerniawski został zabity, separatyści nie mieli realnej władzy. Policja i siły bezpieczeństwa wahały się, a lokalne wsparcie było minimalne. Większość ludzi uczestniczyła jedynie w pokojowych wiecach, podczas gdy przejęta administracja regionalna była okupowana przez mieszankę ekstremistów, przestępców i rosyjskich aktywistów z terenów przygranicznych. Znanych było tylko kilku przywódców DRL, takich jak Aleksander Chriakow i Andriej Purgin. Większość wierzyła, że ​​separatyści szybko się rozproszą. Sytuacja jednak niespodziewanie zaostrzyła się w Słowiańsku, mieście liczącym 120 000 mieszkańców w północnym Doniecku. Grupa 52 uzbrojonych mężczyzn zajęła miejski posterunek policji, stawiając niewielki opór. Użyli materiałów wybuchowych i pojazdu, aby włamać się do budynku, co stanowiło punkt zwrotny w konflikcie."
 sov_girkin.1.a: "Ciekawy"
 SOV_support_nov_idea: "Wsparcie rosyjskie"
 SOV_supportlnrdnr_rus: "Wspieraj LPR i DPR"
 SOV_supportlnrdnr_rus_desc: "Czas wesprzeć republiki Donbasu i wzmocnić tam nasze wpływy."
 SOV_peacekeeping_in_artsakh: "Utrzymanie pokoju w Artsakh"
 SOV_peacekeeping_in_artsakh_desc: "Jako wiodąca potęga na obszarze postsowieckim musimy utrzymać nasz status poprzez odpowiedzialne i stanowcze rozwiązanie konfliktu w Arcachu."
 SOV_friend_assad: "Assad NIE może odejść"
 SOV_friend_assad_desc: "Syria jest dla nas kluczowym sojusznikiem. Musimy zadbać o stabilność reżimu Asada, aby chronić nasze interesy w regionie."
 rec_nov_TT: "We will recognize [NOV.GetFlag]§YDonbass§! as independent and prepare for §RInvasion§!"
 SOV_trade_with_kazakhstan: "Handel z Kazachstanem"
 SOV_trade_with_kazakhstan_desc: "Kazachstan zawsze był jednym z naszych najbliższych przyjaciół w Azji Środkowej. Rozwój handlu między naszymi krajami przyniesie korzyści obu gospodarkom i wzmocni nasze wpływy regionalne."
 SOV_trade_with_azerbaijan: "Handel z Azerbejdżanem"
 SOV_trade_with_azerbaijan_desc: "Azerbejdżan jest obiecującym partnerem. Zwiększenie wymiany handlowej z nim pomoże nam rozszerzyć naszą obecność na Kaukazie i wzmocnić więzi gospodarcze."
 SOV_trade_with_tajikistan: "Handel z Tadżykistanem"
 SOV_trade_with_tajikistan_desc: "Tadżykistan od dawna jest wiarygodnym partnerem. Zacieśnienie relacji handlowych stworzy korzystne możliwości i wzmocni nasz sojusz."
 SOV_trade_with_kyrgyzstan: "Handel z Kirgizją"
 SOV_trade_with_kyrgyzstan_desc: "Kirgistan jest kluczowym sojusznikiem w Azji Środkowej. Rozwój handlu z nimi umocni nasze partnerstwo i wesprze wzajemny rozwój."
 SOV_trade_with_armenia: "Handel z Armenią"
 SOV_trade_with_armenia_desc: "Ormianie to nasi bracia na Kaukazie. Większa wymiana handlowa z Armenią przyniesie korzyści obu gospodarkom i pogłębi naszą współpracę regionalną."
 SOV_trade_with_uzbekistan: "Handel z Uzbekistanem"
 SOV_trade_with_uzbekistan_desc: "Uzbekistan to duży i rozwijający się rynek. Stymulacja handlu z nim znacząco pobudzi naszą gospodarkę."
 SOV_indian_partnership: "Partnerstwo Indyjskie"
 SOV_indian_partnership_desc: "Indie to ogromny, rozwijający się rynek, który potrzebuje naszych towarów, a my możemy skorzystać z dostępu do ich rynków. Rozszerzenie relacji handlowych z Indiami to mądre posunięcie dla obu stron."
 sov_other.19.t: "Rosyjska propozycja pokojowa!"
 sov_other.19.d: "Rosja proponuje traktat pokojowy, który pozwoli nam zająć Hadrut i Karwaczar, pozostawiając Stepanakert Ormianom. Rosyjskie siły pokojowe zostaną wysłane do Stepanakertu. Odrzucenie tej oferty byłoby sprzeczne z interesami politycznymi Rosji."
 sov_other.19.a: "Jasne."
 sov_other.19.b: "Będziemy walczyć do końca!"
 sov_other.20.t: "Propozycja rosyjska."
 sov_other.20.d: "Rosja oferuje pomoc w uregulowaniu konfliktu w Górskim Karabachu, wysyłając siły pokojowe, ale żąda w zamian oddania niektórych terytoriów."
 sov_other.20.a: "Nie, wszystko w porządku."
 sov_other.20.b: "Tak, proszę o pomoc."
 sov_other.21.t: "Armenia odmawia."
 sov_other.21.d: "Armenia uważa, że ​​jest w stanie samodzielnie rozwiązać konflikt i odrzuciła rosyjską pomoc."
 sov_other.21.a: "No więc..."
 sov_other.22.t: "Rosja oferuje zakup naszej artylerii"
 sov_other.22.d: "Rosja złożyła lukratywną ofertę zakupu dużej liczby naszych systemów artyleryjskich. Środki te znacząco pobudzą naszą gospodarkę."
 sov_other.22.a: "To świetna oferta!"
 sov_other.22.b: "Odmawiamy"
 sov_other.23.t: "Porozumienie z Koreą Północną."
 sov_other.23.d: "Korea Północna zgodziła się dostarczyć nam dużą ilość systemów artyleryjskich, wzmacniając tym samym nasz potencjał militarny."
 sov_other.23.a: "To świetna oferta!"
 sov_other.24.t: "Porozumienie z Koreą Północną"
 sov_other.24.d: "Korea Północna odrzuciła naszą propozycję dostarczenia artylerii. Niestety, to kolejne rozczarowanie."
 sov_other.24.a: "Niefortunne"
 sov_other.25.t: "Porozumienie z Koreą Północną"
 sov_other.25.d: "Rosja zawarła z Koreą Północną umowę na zakup systemów artyleryjskich, z których część została nam przydzielona."
 sov_other.25.a: "Dobrze"
 SOV_union_luka: "Łukaszenka jest premierem"
 SOV_union_luka_desc: "Choć Państwo Związkowe zostało utworzone, talentów Aleksandra Grigoriewicza nie można zmarnować. Zatwierdzenie go na stanowisko premiera Państwa Związkowego to mądry wybór."
 SOV_unite_with_nkpr: "Porozumienie z Koreą Północną"
 SOV_unite_with_nkpr_desc: "Zaproponujemy Korei Północnej zakup dużej ilości ich artylerii w celu uzupełnienia naszych zapasów."
 sov_other.26.t: "Atak terrorystyczny na Dubrówkę"
 sov_other.26.d: "Atak terrorystyczny na Dubrowce był trwającym trzy dni kryzysem zakładników w Moskwie. Grupa 40 uzbrojonych czeczeńskich bojowników pod dowództwem Movsara Barayeva wzięła 916 zakładników podczas przedstawienia musicalu Nord-Ost w Centrum Teatralnym. FSB i siły specjalne ostatecznie zakończyły oblężenie, zabijając wszystkich terrorystów i uwalniając większość zakładników. Oficjalnie w czasie kryzysu zginęło 130 zakładników."
 sov_other.26.a: "Oni za to odpowiedzą"
 sov_other.32.t: "Referendum w sprawie statusu naszej Republiki"
 sov_other.32.d: "Reformy konstytucyjne w Rosji pozwalają nam wybrać nowy status – albo pozostać częścią Rosji, albo ogłosić niepodległość. Czy jesteśmy gotowi podjąć tę decyzję?"
 sov_other.32.a: "Pozostaniemy częścią Rosji."
 sov_other.32.b: "Popieramy niepodległość."
 sov_other.33.t: "Zostają z nami"
 sov_other.33.d: "[FROM.GetNameWithFlag] zdecydowało, że pozostanie częścią Rosji."
 sov_other.33.a: "Hurra!"
 sov_other.34.t: "Kolejna Republika nas opuściła"
 sov_other.34.d: "[FROM.GetNameWithFlag] zdecydował się opuścić nasz kraj. Szanujemy jego decyzję."
 sov_other.34.a: "Niefortunne"
 sov_other.35.t: "Były generał prosi o wystąpienie w Dumie Państwowej"
 sov_other.35.d: "Były generał rozwiązanych sił kosmicznych prosi o wystąpienie na kolejnej sesji Dumy Państwowej. Podobno żywi urojenia i prawdopodobnie schizofreniczne poglądy, które zamierza promować."
 sov_other.35.a: "W każdym razie pozwolimy mu mówić."
 sov_other.35.b: "Ignoruj ​​go"
 sov_other.36.t: "Pomysły emerytowanego generała zyskują na popularności"
 sov_other.36.d: "Kontrowersyjne idee generała Pietrowa zyskują bezprecedensowe poparcie, zwłaszcza w kręgach wojskowych. Tendencja ta głęboko niepokoi naszą stabilność."
 sov_other.36.a: "Nic nie róbmy"
 sov_other.36.b: "Aresztować generała i jego wiernych zwolenników"
 sov_other.37.t: "Generał dokonuje zamachu stanu!"
 sov_other.37.d: "Jak mogliśmy to przegapić? Generał Pietrow dokonał zamachu stanu i obalił rząd. Wkroczył na Kreml bez sprzeciwu."
 sov_other.37.a: "To jest katastrofalne"
 sov_other.38.t: "Nowy szef banku centralnego"
 sov_other.38.d: "Jesteśmy gotowi mianować Elvirę Nabiullinę nową szefową Banku Centralnego. Po tym, jak udowodniła swoje kompetencje jako minister gospodarki, jej przywództwo powinno pozytywnie wpłynąć na naszą gospodarkę."
 sov_other.38.a: "Pogratuluj im"
 sov_other.39.t: "Shamil Basayev wyeliminowany"
 sov_other.39.d: "Rosyjskie siły bezpieczeństwa potwierdziły eliminację Szamila Basajewa, jednego z najbardziej poszukiwanych przywódców terrorystycznych na Kaukazie Północnym. Jego śmierć stanowi poważny cios dla rebelii."
 sov_other.39.a: "Zwycięstwo bezpieczeństwa"
 SOV_z_propaganda: "Z Propagandy"
 SOV_z_propaganda1: "Z Propagandy"
 sov_final_strike.1.t: "Deklaracja operacji wojskowej"
 sov_final_strike.1.d: "Dziś rano nasz prezydent ogłosił rozpoczęcie operacji specjalnej na Ukrainie, mającej na celu denazyfikację i demilitaryzację. Inwazja na pełną skalę jest nieuchronna, co oznacza poważną eskalację konfliktu."
 sov_final_strike.1.a: "Będzie to miało poważne konsekwencje"
 russia_news.11.t: "Rosja ogłasza operację wojskową!"
 russia_news.11.d: "Prezydent Rosji ogłosił dziś operację wojskową na Ukrainie. Jej celem jest całkowita denazyfikacja i demilitaryzacja. Rosyjskie Ministerstwo Obrony twierdzi, że operacja dotyczy wyłącznie obiektów wojskowych, ale zachodni przywódcy już zadeklarowali wsparcie dla Kijowa."
 russia_news.11.o1: "Do przodu!"
 russia_news.11.o2: "Będziemy wspierać Rosję!"
 russia_news.11.o3: "Będziemy wspierać Ukrainę!"
 russia_news.11.o4: "Przeklęci Rosjanie."
 russia_news.11.o5: "Kolejna wojna na ruinach Unii."
 russia_news.12.t: "Kryzys gospodarczy w Rosji"
 russia_news.12.d: "Rosję dotknął poważny kryzys gospodarczy, który wstrząsnął rynkami światowymi. Wartość rubla gwałtownie spadła, a ucieczka kapitału przyspieszyła, co budzi obawy o przedłużającą się recesję."
 russia_news.12.o1: "Musimy działać zdecydowanie"
 russia_news.12.o2: "To będzie miało konsekwencje"
 russia_news.12.o3: "Być może okazja"
 russia_news.12.o4: "Niepokojące wydarzenia"
 russia_news.12.o5: "Rynki są w chaosie"
 russia_news.13.t: "Rosja ogłasza operację wojskową!"
 russia_news.13.d: "Dziś rano prezydent Rosji ogłosił operację wojskową na Ukrainie, której celem jest denazyfikacja i demilitaryzacja. Ministerstwo Obrony twierdzi, że celem ataków są wyłącznie cele wojskowe, ale zachodni przywódcy obiecali wsparcie dla Kijowa."
 russia_news.13.o1: "Do przodu!"
 russia_news.13.o2: "Będziemy wspierać Rosję!"
 russia_news.13.o3: "Pomożemy Finom!Będziemy wspierać Finlandię!"
 russia_news.13.o4: "Przeklęci Rosjanie."
 russia_news.13.o5: "Kolejna wojna na ruinach Imperium Rosyjskiego."
 sov_final_strike.2.t: "Wojsku nie udało się osiągnąć głównych celów"
 sov_final_strike.2.d: "Trwająca operacja nie osiągnęła zamierzonych celów, głównie z powodu powszechnej korupcji w naszych siłach obronnych. Ta porażka ujawnia prawdziwy stan naszych możliwości militarnych."
 sov_final_strike.2.a: "Przygotuj się na długą wojnę."
 SOV_slow_advance_idea: "Nieprzygotowany wojskowy"
 sov_final_strike.3.t: "Wojsku udało się osiągnąć główne cele"
 sov_final_strike.3.d: "Trwająca operacja przebiega pomyślnie, co jest dowodem wysokiej jakości naszych sił zbrojnych, dzięki niedawnym reformom i udanej kampanii antykorupcyjnej."
 sov_final_strike.3.a: "Doskonały."
 sov_final_strike.4.t: "Sankcje na Rosję"
 sov_final_strike.4.a: "Nałożyć sankcje przemysłowe."
 sov_final_strike.4.b: "Nałożyć sankcje handlowe."
 sov_final_strike.4.d: "Konflikt na Ukrainie musi się zakończyć. Możemy próbować sparaliżować Rosję sankcjami gospodarczymi, ale może to również zaszkodzić naszej własnej gospodarce. Czy powinniśmy przygotowywać się na wojnę sankcji na pełną skalę?"
 sov_final_strike.5.t: "[FROM.GetName] nakłada na nas sankcje!"
 sov_final_strike.5.d: "[FROM.GetName] nałożył na nas sankcje, aby wesprzeć Ukrainę. Te środki mogą poważnie zaszkodzić naszej gospodarce."
 sov_final_strike.5.a: "Przeklnij ich."
 sov_final_strike.6.t: "Rosja oferuje nam udział w SMO na Ukrainie!"
 sov_final_strike.6.d: "Podczas osobistego spotkania prezydent Rosji zaprosił nas do udziału w specjalnej operacji wojskowej na Ukrainie. Musimy dokładnie rozważyć tę ofertę, ponieważ przystąpienie do wojny będzie miało długotrwałe konsekwencje."
 sov_final_strike.6.a: "Pomożemy naszym braciom!"
 sov_final_strike.6.b: "Myślę, że nie powinniśmy się w to mieszać."
 sov_final_strike.7.t: "Krach finansowy po sankcjach"
 sov_final_strike.7.d: "Sankcje Zachodu wywołały poważną panikę finansową wśród naszego społeczeństwa, powodując niebezpieczną nierównowagę podaży i popytu na rubla. Upadek naszego Narodowego Funduszu Dobrobytu, który mógłby złagodzić ten kryzys, pogarsza sytuację. Teraz stoimy w obliczu zbliżającego się kryzysu finansowego."
 sov_final_strike.7.a: "Niech Bóg nam pomoże..."
 SOV_western_sanctions_modifier: "Sankcje zachodnie"
 SOV_western_sanctions_modifier_desc: "Nasze agresywne działania skłoniły państwa zachodnie i ich sojuszników do nałożenia na nas surowych sankcji. To poważne ostrzeżenie i musimy przygotować się na większe zagrożenia z ich strony."
 SOV_ruble_collapse: "Załamanie finansowe"
 SOV_ruble_collapse_1: "Spowolnienie gospodarcze"
 SOV_ruble_collapse_2: "Stagnacja"
 SOV_sanction_backfire_idea_moderate: "Niewielkie szkody spowodowane sankcjami"
 SOV_sanction_backfire_idea_harsh: "Umiarkowane szkody spowodowane sankcjami"
 SOV_sanction_backfire_idea_ultimate: "Surowe szkody spowodowane sankcjami"
 SOV_sanctions_warning_TT: "§YThis decision§! will have §Rserious§! economic consequences."
 SOV_sanctions_eras_TT: "The impact of sanctions will be §Greduced§! for us."
 sov_final_strike.8.t: "Deklaracja operacji wojskowej"
 sov_final_strike.8.d: "Dziś rano prezydent ogłosił rozpoczęcie specjalnej operacji wojskowej w Finlandii, co zaskoczyło wielu. Wkrótce rozpocznie się inwazja na pełną skalę."
 sov_final_strike.8.a: "Będzie to miało poważne konsekwencje"
 sov_final_strike.9.t: "Sankcje na Rosję"
 sov_final_strike.9.a: "Nałożyć sankcje przemysłowe."
 sov_final_strike.9.b: "Nałożyć sankcje handlowe."
 sov_final_strike.9.d: "Konflikt w Finlandii musi się zakończyć. Atak gospodarczy na Rosję mógłby to osiągnąć, ale może też zaszkodzić naszej gospodarce. Czy powinniśmy przygotować pełnowymiarowe sankcje?"
 SOV_western_sanctions: "Sankcje nałożone na nas"
 SOV_russian_resistance_economy: "Rosyjska gospodarka oporu"
 SOV_russian_resistance_economy_desc: "W obliczu poważnej wojny gospodarczej ze strony Zachodu naszą jedyną opcją jest zbudowanie odpornej, samowystarczalnej gospodarki — prawdziwej gospodarki oporu."
 SOV_fnb_destroyed: "Zniszczyć Narodowy Fundusz Dobrobytu"
 SOV_fnb_destroyed_desc: "Środki Narodowego Funduszu Dobrobytu mają kluczowe znaczenie dla łagodzenia skutków sankcji."
 SOV_prevent_panic_on_currency_exchange: "Zatrzymajmy panikę na rynkach akcji"
 SOV_prevent_panic_on_currency_exchange_desc: "Rynki akcji, kontraktów terminowych i obligacji wywołały panikę społeczną. Ludzie spieszą się z wypłatami walut obcych ze swoich kont. Trzeba temu położyć kres."
 SOV_stop_moex_sessions: "Tymczasowe zamknięcie Giełdy Papierów Wartościowych w Moskwie"
 SOV_stop_moex_sessions_desc: "Tymczasowe zamknięcie rynków pomoże uspokoić sytuację po ostatnich zawirowaniach."
 SOV_prevent_ruble_collapse: "Uratuj rubla przed upadkiem"
 SOV_prevent_ruble_collapse_desc: "Aby zapobiec załamaniu, należy kontrolować kurs rubla."
 SOV_stabilized_finances: "Ustabilizuj gospodarkę"
 SOV_stabilized_finances_desc: "Przeszliśmy najgorszy okres paniki. Teraz czas na powolną stabilizację gospodarki."
 SOV_expansion_of_importozamesheniye: "Ustal substytucję importu"
 SOV_expansion_of_importozamesheniye_desc: "Czas rozwijać przemysł krajowy i zmniejszać zależność od importu."
 SOV_add_liquidity: "Wstrzyknij płynność do gospodarki"
 SOV_add_liquidity_desc: "Nasza gospodarka pilnie potrzebuje zastrzyku płynności, aby móc funkcjonować."
 SOV_consumer_goods_replacement: "Marki krajowe"
 SOV_consumer_goods_replacement_desc: "Nie potrzebujemy zagranicznych produktów — mamy własne, wysokiej jakości krajowe marki."
 SOV_the_turn_to_the_east: "Zawracanie na wschód"
 SOV_the_turn_to_the_east_desc: "Zachód okazał się niewiarygodnym partnerem. Czas przenieść naszą uwagę na wschód."
 SOV_creation_of_sovereign_economy: "Suwerenna Gospodarka"
 SOV_creation_of_sovereign_economy_desc: "Nasz naród zbuduje suwerenną, niezależną gospodarkę, wolną od wpływów zagranicznych."
 SOV_back_to_growth: "I znowu wzrost"
 SOV_back_to_growth_desc: "Nic nie może nas zatrzymać na dłuższą metę; wszelkie niepowodzenia jedynie chwilowo nas spowolnią."
 SOV_help_prigoba: "Wyślij sprzęt do Sahelu"
 SOV_help_prigoba_desc: "Nasze państwo zastępcze w regionie Sahelu wymaga pilnego wsparcia militarnego."
 SOV_pmc_redut: "PMC Redut"
 SOV_pmc_redut_desc: "Redut to rosyjska prywatna firma wojskowa działająca na Ukrainie, składająca się głównie z weteranów różnych gałęzi wojska i wywiadu, mających doświadczenie bojowe."
 SOV_pmc_redut_coprs: "I Korpus Ochotniczy"
 SOV_pmc_redut_coprs_desc: "Po buncie Prigożyna utworzono Pierwszy Korpus Ochotniczy, w którego skład weszły liczne bataliony ochotnicze pod nadzorem PMC Redut."
 SOV_storm_z: "Storm-Z"
 SOV_storm_z_desc: "Będziemy rekrutować więźniów do służby w naszej własnej jednostce wojskowej, zamieniając ich wyrok w szansę walki za ojczyznę."
 SOV_special_o: "Siły Specjalne „O”"
 SOV_special_o_desc: "Utworzymy elitarną jednostkę sił specjalnych, której zadaniem będzie wykonywanie najniebezpieczniejszych i najbardziej krytycznych misji w czasie wojny."
 russia_leave_every_faction_tt: "[SOV.GetNameWithFlag] opuści swoją frakcję.\n"
 wagner_rebellion: "£SOV_Nat_Autocracy_wagner §YJewgienij Prigozhin§! nie dokonał wojskowego zamachu stanu"
 SOV_slavic_corps: "Rozwiąż problem z Korpusem Słowiańskim"
 SOV_slavic_corps_desc: "Slavic Corps to prywatna firma ochroniarska zarejestrowana w Hongkongu. Złapaliśmy jej właścicieli i jesteśmy gotowi ich uwięzić. Jednak ich wiedza specjalistyczna może okazać się dla nas cenna w przyszłości."
