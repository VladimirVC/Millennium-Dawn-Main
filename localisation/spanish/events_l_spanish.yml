 AfghanistanNews.1.t: "La Guerra Civil en Afganistán se calma"
 AfghanistanNews.1.TAL.d: "A pesar de los esfuerzos de las Fuerzas Armadas afganas y sus aliados occidentales, los talibanes han logrado hacerse con el control total de todas las ciudades importantes, incluida la capital, Kabul. La mayoría de los funcionarios del gobierno se han escondido o se han exiliado, incluido el presidente afgano [AFG.GetLeader], que actualmente reside en Estados Unidos.\n\nEl triunfo de los talibanes sin duda aumentará la frecuencia de los ataques terroristas en la región y en todo el mundo."
 AfghanistanNews.1.AFG.d: "El gobierno afgano ha declarado la victoria de los talibanes. La mayoría de los puestos de avanzada y ciudades más fuertes han sido desalojados de su presencia, y la mayoría de los combatientes que quedan han escapado a través de la frontera hacia Pakistán. Aunque los talibanes se han reducido a sólo unos pocos focos y células, se prevé que la insurgencia perdure durante muchos años más, aunque a niveles más bajos.\n\nEsta victoria ha demostrado la eficacia del reconstruido Ejército afgano y la determinación del gobierno afgano."
 AfghanistanNews.1.a: "Interesante"
 AfghanistanNews.2.t: "Afganistán reclama Pashtunistán"
 AfghanistanNews.2.d: "Debido a un aumento de la violencia en Pakistán, el gobierno afgano ha reforzado sus reivindicaciones sobre las zonas de Pakistán donde viven los pastunes. La Línea Durrand (la frontera actual entre Afganistán y Pakistán) ha sido durante mucho tiempo una fuente de conflicto entre los dos países, ya que transfirió tierras del Imperio de Afganistán a Pakistán bajo control británico.\n\nLos propios pastunes que viven en la zona no parecen estar demasiado entusiasmados con este desarrollo, ya que muchos se sienten cómodos viviendo dentro de Pakistán. Es probable que Afganistán no pueda hacer valer sus reivindicaciones de otra manera que no sea por la fuerza."
 AfghanistanNews.2.a: "Interesante"
 AfghanistanNews.3.t: "Afganistán reclama Baluchistán"
 AfghanistanNews.3.d: "Mientras se profundiza la crisis en Pakistán, Afganistán amplía sus reivindicaciones. Hoy, el gobierno afgano anunció que Baluchistán, además de Pastunistán, es parte integral de Afganistán."
 AfghanistanNews.3.a: "Un desarrollo preocupante"
 AfghanistanNews.4.t: "Afganistán invade Pakistán"
 AfghanistanNews.4.d: "En un intento por asegurar sus derechos, Afganistán ha optado por una vía más directa para obtener territorio. Actuando en nombre de la seguridad de los pastunes, han comenzado a trasladar tropas a través de la frontera hacia Pakistán."
 AfghanistanNews.4.a: "Un desarrollo preocupante"
 AfghanistanNews.5.t: "Los talibanes se unen"
 AfghanistanNews.5.d: "Los talibanes afganos y paquistaníes han decidido unir fuerzas para combatir juntos amenazas comunes. Esto representa un gran cambio en el equilibrio de poder en Asia Central."
 AfghanistanNews.5.a: "Preocupante."
 AfghanistanNews.6.t: "Asesinato de Ahmad Shah Massoud"
 AfghanistanNews.6.d: "El líder principal de la resistencia afgana contra los talibanes, Ahmad Shah Massoud, ha sido asesinado por Al Qaeda. Dos miembros de los talibanes, haciéndose pasar por periodistas, hicieron estallar explosivos ocultos en su equipo. Massoud resultó gravemente herido y fue evacuado en un helicóptero militar, pero murió a causa de sus heridas antes de llegar al hospital.\n\nConocido como el León de Panjshir, Massoud fue un símbolo de la resistencia, primero contra la ocupación soviética y luego contra los talibanes."
 AfghanistanNews.6.a: "Una pérdida."
 Afghanistan.2.t: "La Administración Karzai"
 Afghanistan.2.d: "Por orden de Estados Unidos, Hamid Karzai, líder conservador de las fuerzas de la Alianza del Norte contra los talibanes, ha asumido el cargo de presidente de Afganistán."
 Afghanistan.2.a: "El primer paso hacia la independencia."
 Afghanistan.3.t: "Asesinato de Ahmad Shah Massoud"
 Afghanistan.3.d: "Ahmad Shah Massoud, el León de Panjshir, fue atacado hoy por un terrorista suicida. Dos miembros de los talibanes, haciéndose pasar por periodistas, hicieron estallar explosivos ocultos en una cámara y una batería. Massoud resultó gravemente herido y fue evacuado inmediatamente del lugar en un helicóptero militar."
 Afghanistan.3.a: "Recemos a Allah para que sobreviva."
 Afghanistan.4.t: "Estados Unidos ejerce su influencia"
 Afghanistan.4.d: "Con la derrota de los talibanes, Estados Unidos ha utilizado su influencia para influir en las decisiones de la Loya Jirga. Se ha formado una nueva administración interina."
 Afghanistan.4.a: "¿Son mejores que los talibanes?"
 AfghanistanHostageCrisis.1.t: "Misioneros surcoreanos retenidos como rehenes por los talibanes"
 AfghanistanHostageCrisis.1.d: "Hoy un grupo de misioneros surcoreanos que viajaban por la provincia de Ghazni fueron capturados por militantes talibanes y se encuentran retenidos como rehenes. Exigen la liberación de los prisioneros y la retirada de todos los soldados surcoreanos de Afganistán.\n\nNuestro asesor militar sugirió enviar un grupo de rescate para rescatar a los rehenes y la delegación surcoreana envió un representante para negociar."
 AfghanistanHostageCrisis.1.a: "No podemos confiar en los talibanes, envíen el equipo de extracción."
 AfghanistanHostageCrisis.1.b: "La seguridad de los rehenes es nuestra prioridad, envíen al representante."
 AfghanistanHostageCrisis.2.t: "Rescate de los rehenes"
 AfghanistanHostageCrisis.2.d: "Nuestras fuerzas especiales lograron infiltrarse en el escondite de los talibanes y escoltaron a los rehenes hasta el puesto militar más cercano.\n\nLos misioneros regresarán a Corea del Sur y nuestros soldados están siendo elogiados por los medios de comunicación."
 AfghanistanHostageCrisis.2.a: "Misión cumplida."
 AfghanistanHostageCrisis.3.t: "Rehenes asesinados durante el intento de rescate"
 AfghanistanHostageCrisis.3.d: "Los militantes talibanes se dieron cuenta de que nuestras fuerzas especiales ingresaban a su escondite y ejecutaron de inmediato a los rehenes. \n\nDespués del enfrentamiento, nuestros soldados lograron escapar del edificio sin los rehenes."
 AfghanistanHostageCrisis.3.a: "Misión fallida."
 AfghanistanHostageCrisis.4.t: "Los talibanes exigen la liberación de prisioneros"
 AfghanistanHostageCrisis.4.d: "El representante ha regresado con las demandas de los talibanes, la liberación de todos los prisioneros talibanes de las cárceles norteamericanas es la demanda principal."
 AfghanistanHostageCrisis.4.a: "Solicitar la liberación de los prisioneros."
 AfghanistanHostageCrisis.4.b: "¡No liberaremos a criminales de guerra!"
 AfghanistanHostageCrisis.5.t: "Los talibanes exigen la retirada de Corea del Sur"
 AfghanistanHostageCrisis.5.d: "Los talibanes han exigido la retirada de todas nuestras fuerzas y el pago de un rescate para la liberación de nuestros ciudadanos."
 AfghanistanHostageCrisis.5.a: "Debemos aceptar."
 AfghanistanHostageCrisis.5.b: "¡No negociaremos con terroristas!"
 AfghanistanHostageCrisis.6.t: "Estados Unidos rechaza nuestra solicitud"
 AfghanistanHostageCrisis.6.d: "Representantes del ejército estadounidense han rechazado nuestra petición de liberar a los presos talibanes de las cárceles militares\n\nLos yihadistas reaccionaron matando a dos rehenes antes de proponer nuevas demandas; el gobierno norcoreano también ha pedido la liberación de los rehenes"
 AfghanistanHostageCrisis.6.a: "¿Cómo reaccionarán los talibanes ante esto?"
 AfghanistanHostageCrisis.7.t: "El gobierno afgano rechaza la demanda de los talibanes"
 AfghanistanHostageCrisis.7.d: "Los representantes del gobierno afgano han rechazado las demandas de los talibanes calificándolas de irrealizables, los yihadistas reaccionaron matando a dos rehenes antes de proponer nuevas demandas, el gobierno norcoreano también ha pedido la liberación de los rehenes"
 AfghanistanHostageCrisis.7.a: "¡Bárbaro!"
 AfghanistanHostageCrisis.8.t: "Corea del Sur se retira de Afganistán"
 AfghanistanHostageCrisis.8.d: "Tras la crisis de rehenes en Afganistán, el gobierno de Corea del Sur aceptó las exigencias de los talibanes y comenzó a retirar sus fuerzas.\n\nLos talibanes anunciaron que habían pagado una indemnización de veinte millones de dólares, pero Corea del Sur no hizo ninguna declaración."
 AfghanistanHostageCrisis.8.a: "Afganistán continúa desestabilizándose."
 AfghanistanHostageCrisis.9.t: "Ejecución de los rehenes surcoreanos"
 AfghanistanHostageCrisis.9.d: "Después de una crisis de rehenes en Afganistán, el gobierno de Corea del Sur ha rechazado todas las demandas de los talibanes y al día siguiente anunciaron que todos los rehenes fueron asesinados."
 AfghanistanHostageCrisis.9.a: "Más víctimas del conflicto afgano."
 ContactIran.0.t: "Afganistán llama de regreso a su gente"
 ContactIran.0.d: "Nuestras brigadas Fatemiyoun están creciendo en Irán y están compuestas por hombres afganos hazara chiitas. Afganistán está solicitando su regreso a su tierra natal para que puedan ayudar al país en el que han vivido durante varios milenios."
 ContactIran.0.a: "Permitamos que se unan a su tierra."
 ContactIran.0.b: "No, necesitamos su mano de obra."
 ContactIran.1.t: "Irán se niega a enviar a nuestros Fatemiyoun hazara"
 ContactIran.1.d: "Después de solicitar a [PER.GetName] que envíe de regreso a Fatemiyoun para ayudar en [AFG.GetName] y después de mucha comunicación entre nuestras dos naciones, los iraníes han decidido denegar la solicitud de nuestros hombres hazara."
 ContactIran.1.a: "¡Allah sabe mejor!"
 ContactIran.2.t: "Irán acepta nuestra llamada para los Hazara Fatemiyoun"
 ContactIran.2.d: "[PER.GetName] has accepted our request for the return of our Hazara soldiers to aid and return to their homelands, Five divisions are on their way with the flags raised high In the air chanting \"Zindabad Hazaristan!\""
 ContactIran.2.a: "¡Harakat!"
 ContactIran.3.t: "Afganistán solicita membresía en el Eje de Resistencia"
 ContactIran.3.d: "Los hazaras chiitas de Afganistán solicitan unirse al Eje de Resistencia, después de la toma de control de los hazaras en Afganistán, ahora están solicitando membresía en nuestra resistencia."
 ContactIran.3.a: "¡Que Jorasán se una!"
 ContactIran.3.b: "No aceptamos la solicitud."
 ContactIran.4.t: "Irán acepta nuestra solicitud de unirnos a su facción"
 ContactIran.4.d: "[PER.GetName] ha aceptado nuestra solicitud de membresía en el Eje de Resistencia. ¡Juntos somos más fuertes!"
 ContactIran.4.a: "¡Allahu Akbar!"
 ContactIran.5.t: "Irán rechaza"
 ContactIran.5.d: "[PER.GetName] ha rechazado nuestra solicitud de membresía en el Eje de Resistencia. Ya no deberíamos depender de ellos."
 ContactIran.5.a: "Triste"
 ContactIran.6.t: "Los hazaras de Afganistán declaran Hazaristán"
 ContactIran.6.d: "Esta mañana, Karim Khalili, el político hazara de Afganistán, ha declarado su propio estado tras sus éxitos en el país con reformas rápidas y con la adhesión al Islam chiíta, cientos de miles de hazaras han salido a las calles de Kabul, Bamiyán, Mazar-i-Sharif y Herat para celebrar la declaración de Hazaristán."
 ContactIran.6.a: "Interesante"
 Cameroon.1.t: "La erupción del Monte Camerún"
 Cameroon.1.d: "El Monte Camerún, un volcán con una altitud de 4.040 metros, es el punto más alto de África central y uno de los volcanes más activos de África.\n\nDespués de haber entrado en erupción en 1999, la gente alrededor del Monte Camerún se sorprendió cuando el volcán, al que los nativos llaman Mongo ma Ndemi (\"Montaña de la Grandeza\"), volvió a entrar en erupción durante varios meses de actividad violenta el 28 de mayo de 2000."
 Cameroon.1.a: "Esto afectará a la región."
 Cameroon.1.b: "¡Envíen toda la ayuda necesaria!"
 diplomatic_response.1.t: "[FROM.GetName] accepts!"
 diplomatic_response.1.d: "[This.GetAdjective] and [FROM.GetAdjective] delegations have reached a mutual agreement in the most recent negotiations. [FROM.GetName] is willing to go along with our proposal."
 diplomatic_response.1.o1: "Excelente."
 diplomatic_response.2.t: "[FROM.GetName] rejects!"
 diplomatic_response.2.d: "After several nights and bitter fights over minor details and major points, the most recent wave of negotiations between the [This.GetName] and [FROM.GetName] delegations have failed. Our proposal will not come to fruition any time soon."
 diplomatic_response.2.d1: "[FROM.GetNameWithFlag] ha decidido rechazar nuestra solicitud de rescate. Esto hará que nuestro inminente desastre sea aún más precario..."
 diplomatic_response.2.o1: "Bueno, así son las cosas."
 diplomatic_response.3.t: "[FROM.GetName] folds!"
 diplomatic_response.3.d: "Unsurprisingly, the [FROM.GetAdjective] delegations were soon convinced of our overwhelming might and folded to our demands. We got what we wanted."
 diplomatic_response.3.o1: "¡Excelente!"
 diplomatic_response.4.t: "[FROM.GetName] defies us!"
 diplomatic_response.4.d: "We knew that some [FROM.GetAdjective] people are idiots, but their top envoys had to join the rank of idiots in the last few days of negotiations. They defied us, rejected our demands and sent our envoys home.\n\nThese fools."
 diplomatic_response.4.o1: "Conocerán las consecuencias."
 LibyaNews.1.t: "Segunda Guerra Civil Libia llega a su fin"
 LibyaNews.1.GNA.d: "La segunda guerra civil libia comenzó en 2014, después de que el ejército libio bajo el mando del general Khalifa Haftar derrocara al gobierno gobernante cuando este se negó a dimitir tras perder las elecciones de 2014. Los partidarios del gobierno formaron una nueva facción, el Gobierno de Salvación Nacional, lo que desencadenó una nueva guerra civil. En 2015, la ONU negoció una tregua entre las dos facciones y formó un nuevo gobierno conjunto llamado Gobierno de Acuerdo Nacional. Sin embargo, solo un año después la paz se rompió, hundiendo al país en una guerra civil a tres bandas.\n\nParece que el Gobierno de Acuerdo Nacional, que cuenta con el respaldo internacional, ha logrado superar a las facciones rebeldes y unir al país, a pesar de carecer del respaldo del ejército libio. El hecho de que la UE y gran parte del mundo occidental lo hayan reconocido supone un gran cambio de equilibrio en la región."
 LibyaNews.1.HOR.d: "La segunda guerra civil libia comenzó en 2014, después de que el ejército libio bajo el mando del general Khalifa Haftar derrocara al gobierno gobernante cuando este se negó a dimitir tras perder las elecciones de 2014. Los partidarios del gobierno formaron una nueva facción, el Gobierno de Salvación Nacional, lo que desencadenó una nueva guerra civil. En 2015, la ONU negoció una tregua entre las dos facciones y formó un nuevo gobierno conjunto llamado Gobierno de Acuerdo Nacional. Sin embargo, solo un año después la paz se rompió, hundiendo al país en una guerra civil a tres bandas.\n\nParece que la Cámara de Representantes, con el apoyo del general Haftar, el ejército libio y muchos leales a Gadafi, han logrado legitimar su gobierno sobre el país. Con el apoyo y el respaldo de Rusia, Haftar ha prometido tierras para dos bases militares rusas en el país. Esto provocará un aumento de la influencia rusa en el norte de África."
 LibyaNews.1.GNC.d: "La segunda guerra civil libia comenzó en 2014, después de que el ejército libio, bajo el mando del general Khalifa Haftar, derrocara al gobierno gobernante cuando este se negó a dimitir tras perder las elecciones de 2014. Los partidarios del gobierno formaron una nueva facción, el Gobierno de Salvación Nacional, lo que desencadenó una nueva guerra civil. En 2015, la ONU negoció una tregua entre las dos facciones y se formó un nuevo gobierno conjunto llamado Gobierno de Acuerdo Nacional. Sin embargo, solo un año después la paz se rompió, hundiendo al país en una guerra civil a tres bandas.\n\nParece que, contra todo pronóstico, el Gobierno de Salvación Nacional ha salido victorioso. Compuesto principalmente por islamistas y miembros de la Hermandad Musulmana, muchos expertos afirman que esta victoria solo podría haberse logrado con el apoyo serio de actores extranjeros. No está claro quiénes eran esos actores."
 SierraLeoneNews.1.t: "Finaliza la Guerra Civil de Sierra Leona"
 SierraLeoneNews.1.SIE.d: "El gobierno de Sierra Leona anunció hoy una victoria oficial sobre los rebeldes. Con el apoyo de Guinea, el Reino Unido y las fuerzas de la UNAMSIL, los rebeldes del FRU y el CRFA se han rendido o han huido a la vecina Liberia. El líder del FRU, [AFR.GetLeader], fue encontrado en un escondite y arrestado, y entregado a la custodia del SAS británico.\n\nActualmente está a la espera de su juicio, acusado de múltiples crímenes de guerra por la ONU."
 SierraLeoneNews.1.AFR.d: "A pesar de la ayuda de las tropas británicas y de la ONU, las fuerzas gubernamentales de Sierra Leona han sido completamente expulsadas de la capital, Freetown. Algunos miembros del gobierno tuvieron tiempo de evacuar a Nigeria. Otros, que tuvieron la mala suerte de ser capturados por los rebeldes, fueron rápidamente abatidos a tiros y desfilados por las calles de Freetown.\n\nTras la caída del gobierno, se han producido varios días de saqueos, mientras los rebeldes de todo el país celebran su victoria.\n\nLo más probable es que el país caiga en la anarquía y el caos, ya que las milicias ya no tienen más enemigos aparte de la población local."
 SierraLeoneNews.1.a: "Un desarrollo interesante."
 SierraLeone.2.t: "Nuestros aliados en Sierra Leona caen"
 SierraLeone.2.d: "El Gobierno de Sierra Leona ha caído en manos de los rebeldes. Parece que nuestra intervención no ha sido suficiente para salvarlos. Podemos seguir luchando contra el Consejo Revolucionario de las Fuerzas Armadas, pero eso significará que tendremos que adentrarnos en el interior del país para reinstaurar el gobierno legítimo. Por otra parte, puede que sea mejor retirarse de Sierra Leona."
 SierraLeone.2.a: "Intentar negociar la paz."
 SierraLeone.2.b: "Necesitamos expulsarlos de Sierra Leona."
 SierraLeone.3.t: "El Gobierno de Guinea llama a un alto el fuego"
 SierraLeone.3.d: "El gobierno de Guinea nos ha contactado para poner fin a los enfrentamientos entre nosotros y retirarse de Sierra Leona. ¿Cómo deberíamos responder?"
 SierraLeone.3.a: "Dejar de luchar contra ellos."
 SierraLeone.3.b: "Seguir luchando contra ellos."
 SierraLeone.4.t: "El AFRC acepta un alto el fuego"
 SierraLeone.4.d: "Los rebeldes de Sierra Leona han aceptado un alto el fuego."
 SierraLeone.4.a: "Bueno"
 SierraLeone.5.t: "El AFRC continúa luchando"
 SierraLeone.5.d: "Los rebeldes de Sierra Leona han rechazado nuestra oferta y quieren seguir luchando contra nosotros."
 SierraLeone.5.a: "Maldición"
 LiberiaNews.1.t: "Finaliza la Segunda Guerra Civil de Liberia"
 LiberiaNews.1.LIB.d: "Hoy, Charles Taylor, el dictador-presidente de Liberia, anunció el fin del LURD en Liberia. A pesar de que el ejército liberiano está en ruinas y la mayor parte del trabajo lo realizan las unidades antiterroristas de Taylor, el LURD y sus aliados guineanos no pudieron derrocar a su gobierno. Los rebeldes que quedan han cruzado la frontera y han escapado de Guinea. Es probable que Taylor continúe el conflicto con Guinea hasta que se haya acabado con toda la oposición."
 LiberiaNews.1.LUR.d: "En una emisión televisada hoy, Charles Taylor anunció su dimisión como presidente de Liberia. Poco después, subió a un avión para exiliarse en Nigeria, mientras los rebeldes del LURD bailaban por las calles de Monrovia. Debido a los presuntos crímenes de guerra, la Interpol emitió una orden de arresto contra Taylor. Sin embargo, el gobierno nigeriano se ha negado a deportarlo, a menos que la solicitud provenga del propio nuevo gobierno liberiano.\n\nEl nuevo gobierno liberiano todavía está en proceso de reorganización y llevará tiempo hasta que se establezca en Monrovia y luego en el resto del país."
 LiberiaNews.1.a: "Interesante"
 Liberia.2.t: "Nuestros aliados en Liberia caen"
 Liberia.2.d: "El gobierno de Taylor ha expulsado a los rebeldes del LURD de Liberia. A pesar de haberles proporcionado armas y ayuda y de haberles permitido cruzar la frontera sin oposición, los rebeldes no han sido suficientes para derrotar al gobierno de Taylor. Podemos intensificar nuestras operaciones militares e intentar deshacernos de Taylor nosotros mismos, o podemos retirarnos de Liberia por completo."
 Liberia.2.a: "Intentar negociar la paz."
 Liberia.2.b: "Necesitamos derrocar a Taylor."
 Liberia.3.t: "El Gobierno de Guinea llama a un alto el fuego"
 Liberia.3.d: "El gobierno de Guinea nos ha contactado para poner fin a los enfrentamientos entre nosotros y retirarse de Liberia. ¿Cómo deberíamos responder?"
 Liberia.3.a: "Dejar de luchar contra ellos."
 Liberia.3.b: "Seguir luchando contra ellos."
 Liberia.4.t: "Taylor acepta un alto el fuego"
 Liberia.4.d: "El gobierno de Taylor ha aceptado un alto el fuego."
 Liberia.4.a: "Bueno"
 Liberia.5.t: "Taylor continúa luchando"
 Liberia.5.d: "Charles Taylor rechazó nuestra oferta y quiere seguir luchando contra nosotros."
 Liberia.5.a: "Maldición"
 SudanNews.1.t: "El conflicto en Kordofán del Sur y el Nilo Azul ha terminado"
 SudanNews.1.a: "Interesante"
 SouthSudan.2.t: "Rebeldes sudaneses en el este"
 SouthSudan.2.d: "Mientras duró el conflicto en Sudán, Eritrea ha estado albergando a varios grupos insurgentes dentro de sus fronteras, permitiéndoles atacar nuestro territorio en el Este. Parece que estos insurgentes, que se hacen llamar 'Frente Oriental', se han aliado con [SSU.GetNameDef]. Esto les ha permitido montar un ataque mayor, cuyo objetivo es nuestro centro comercial de Port Sudan."
 SouthSudan.2.a: "¡Malditos los eritreos!"
 SouthSudan.3.t: "Rebeldes sudaneses en el Nilo Azul"
 SouthSudan.3.d: "Con el regreso de Mengistu al poder en [ETH.GetName], una vez se ha opuesto a empezar a apoyar al SPLA. Al encontrar simpatizantes antigubernamentales entre los refugiados sudaneses que viven en [ETH.GetName], él, junto con el SPLA, armó a esas personas y las envió a través de la frontera hacia el Nilo Azul."
 SouthSudan.3.a: "¡Malditos los etíopes!"
 SouthSudan.4.a: "¡Envía nuestro ejército a través de la frontera!"
 SouthSudan.4.b: "Nosotros no podemos arriesgarlo"
 SouthSudanNews.1.t: "[SSU.GetAdjective] Termina la Guerra Civil"
 SouthSudanNews.1.a: "Interesante"
 SouthSudanNews.2.a: "Interesante"
 AngolaNews.1.t: "La Guerra Civil en Angola ha Terminado"
 AngolaNews.1.AGL.d: "La guerra civil angoleña ha llegado a su fin. El conflicto, que se ha prolongado desde la década de 1970, se libró entre dos antiguos aliados que luchaban por la independencia, el MPLA y la UNITA.\n\nEl MPLA, aliado de la ex Unión Soviética, ha logrado vencer a la UNITA."
 AngolaNews.1.UNI.d: "La guerra civil angoleña ha llegado a su fin. El conflicto, que se ha prolongado desde la década de 1970, se libró entre dos antiguos aliados que luchaban por la independencia, el MPLA y la UNITA.\n\nLa UNITA, apoyada por los Estados Unidos, ha logrado vencer al MPLA."
 AngolaNews.1.a: "Interesante"
 Angola_Civil_War_Over: "La Guerra Civil en Angola ha Terminado"
 DRC.0.t: "¡Laurent-Désiré Kabila asesinado!"
 DRC.0.d: "Nuestro líder y liberador Laurent-Désiré fue atacado hoy en el palacio presidencial. Su mala reputación ante los militares y los intentos de purgar a los Kadogos desleales fracasaron estrepitosamente. Intentamos llevarlo rápidamente a Harare para que recibiera atención médica urgente, pero fue demasiado tarde. Nuestro liberador yace muerto.\n\nDesde entonces hemos encontrado al autor del crimen, Rashidi Kasereka, y lo hemos ejecutado por sus crímenes."
 DRC.0.A: "Un día oscuro."
 overlord.1.t: "Integración de [FROM.GetName]"
 overlord.1.d: "[FROM.GetName] ha sido nuestro estado títere durante demasiado tiempo. Ya no es una asociación viable permitirles tener autonomía. Este día de [GetYear] se conmemora un día que hemos deseado durante mucho tiempo. [FROM.GetName] se ha integrado a nuestra gran nación. Ahora se convertirán en ciudadanos de [ROOT.GetAdjective] y recibirán el mismo cuidado y tratamiento que cualquier otro ciudadano de nuestra nación. Es un día glorioso para nosotros y para el pueblo de [FROM.GetName].\nNOTA: Anexar otra nación soberana nos obliga a asumir toda su deuda, tesoro e inversiones internacionales a medida que se fusionan con nosotros.\n\nObtienes lo siguiente: [?ROOT.treasury|Y] Tesoro, [?ROOT.debt|R] Deuda, [?ROOT.int_investments] Inversiones internacionales"
 overlord.1.a: "¡Maravilloso!"
 overlord.1.a_tt: "¡Obtenemos §YCores§! en §B[FROM.GetName]§!\n"
 overlord_news.1.t: "[ROOT.GetName] integra a [FROM.FROM.GetName]"
 overlord_news.1.d: "Las delegaciones de [ROOT.GetName] y [FROM.FROM.GetName] han anunciado hoy que [FROM.FROM.GetName] se integrará en [ROOT.GetName]. [FROM.FROM.GetName] ha sido un estado autónomo durante bastante tiempo y se ha vuelto cada vez más dependiente de [ROOT.GetName] en los últimos meses. Las dos partes involucradas afirman: \"¡Tiene sentido!\".\n\nLa verdad de esa declaración aún está por verse."
 overlord_news.1.a: "Interesante"
 AIDS_events.1.t: "Aumento de la prevalencia del VIH"
 AIDS_events.1.d: "Malas noticias en el frente de la salud del país. El año pasado se registró un aumento significativo de casos de VIH y, en general, la situación del VIH en nuestro país ha empeorado."
 AIDS_events.1.a: "Maldición"
 AIDS_events.2.t: "Normalización de la prevalencia del VIH"
 AIDS_events.2.d: "Parece que nuestra lucha contra el VIH está dando frutos. El año pasado no hubo cambios significativos en la prevalencia del VIH en nuestro país. Si bien no es una mejora, sigue siendo progreso."
 AIDS_events.2.a: "Qué alivio."
 AIDS_events.3.t: "Disminución de la prevalencia del VIH"
 AIDS_events.3.d: "Buenas noticias en el frente de la salud del país. El año pasado hubo una disminución significativa de casos de VIH y, en general, la situación del VIH en nuestro país ha mejorado considerablemente."
 AIDS_events.3.a: "Magnífico."
 debug_money.1.t: "Calculadora de tasa de venta de recursos"
 debug_money.1.d: "[?percentage_of_resource_exports|%1]"
 corruption.1.t: "Propuesta interesante"
 corruption.1.d: "Uno de los ministros se acercó y dijo que se pueden hacer pocos cambios organizativos y legales para optimizar el desempeño de nuestra administración, aunque se requerirá cierta... conexión personal con las fuerzas en movimiento."
 corruption.1.a: "Quizás sea una oportunidad"
 corruption.1.b: "Mala idea"
 corruption.2.t: "Propuesta interesante"
 corruption.2.d: "Uno de los ministros se acercó y dijo que se pueden realizar algunos cambios organizativos y legales para optimizar el rendimiento de nuestra policía, aunque requerirá algunas... conexiones personales con los actores clave."
 corruption.2.a: "Quizás sea una oportunidad"
 corruption.2.b: "Mala idea"
 corruption.3.t: "Propuesta interesante"
 corruption.3.d: "Uno de los ministros se acercó y dijo que se pueden realizar algunos cambios organizativos y legales para optimizar el rendimiento de nuestro complejo militar, aunque requerirá algunas... conexiones personales con los actores clave."
 corruption.3.a: "Quizás sea una oportunidad"
 corruption.3.b: "Mala idea"
 corruption.4.t: "Propuesta interesante"
 corruption.4.d: "Uno de los ministros se acercó y dijo que se pueden realizar algunos cambios organizativos y legales para optimizar el rendimiento de nuestras instalaciones educativas, aunque requerirá algunas... conexiones personales con los actores clave."
 corruption.4.a: "Quizás sea una oportunidad"
 corruption.4.b: "Mala idea"
 corruption.5.t: "Propuesta interesante"
 corruption.5.d: "Uno de los ministros se acercó y dijo que se pueden realizar algunos cambios organizativos y legales para optimizar el rendimiento de nuestros hospitales, aunque requerirá algunas... conexiones personales con los actores clave."
 corruption.5.a: "Quizás sea una oportunidad"
 corruption.5.b: "Mala idea"
 corruption.6.t: "Propuesta interesante"
 corruption.6.d: "Uno de los ministros se acercó y dijo que se pueden realizar algunos cambios organizativos y legales para optimizar el rendimiento de nuestros institutos sociales, aunque requerirá algunas... conexiones personales con los actores clave."
 corruption.6.a: "Quizás sea una oportunidad"
 corruption.6.b: "Mala idea"
 corruption.7.t: "Propuesta interesante"
 corruption.7.d: "Una de las agencias de noticias nos solicitó financiamiento a cambio de noticias más favorables."
 corruption.7.a: "Quizás sea una oportunidad"
 corruption.7.b: "Mala idea"
 corruption.8.t: "Propuesta interesante"
 corruption.8.d: "Uno de los políticos neutrales se acercó con ideas de cooperación contra nuestra oposición, aunque requerirá algunas acciones turbias."
 corruption.8.a: "Quizás sea una oportunidad"
 corruption.8.b: "Mala idea"
 corruption.9.t: "Propuesta interesante"
 corruption.9.d: "Una de las empresas de construcción se acercó y preguntó si pueden evadir algunas leyes para lograr los mejores resultados posibles."
 corruption.9.a: "Quizás sea una oportunidad"
 corruption.9.b: "Mala idea"
 corruption.10.t: "Propuesta interesante"
 corruption.10.d: "Uno de los subcontratistas militares se acercó y preguntó si pueden evadir algunas leyes para acelerar el proceso de construcción de nuevas instalaciones."
 corruption.10.a: "Quizás sea una oportunidad"
 corruption.10.b: "Mala idea"
 corruption.11.t: "Propuesta interesante"
 corruption.11.d: "Una de las empresas de construcción se acercó y preguntó si pueden ignorar algunas leyes ambientales para lograr los mejores resultados posibles."
 corruption.11.a: "Quizás sea una oportunidad"
 corruption.11.b: "Mala idea"
 corruption.12.t: "Propuesta interesante"
 corruption.12.d: "Uno de los subcontratistas militares se acercó y preguntó si pueden ignorar algunas leyes ambientales para lograr los mejores resultados posibles."
 corruption.12.a: "Quizás sea una oportunidad"
 corruption.12.b: "Mala idea"
 corruption.13.t: "Propuesta interesante"
 corruption.13.d: "Uno de los fondos de inversión se acercó con un esquema interesante para obtener inversiones en el extranjero, aunque parece estar en contra del derecho internacional."
 corruption.13.a: "Quizás sea una oportunidad"
 corruption.13.b: "Mala idea"
 corruption.14.t: "Propuesta interesante"
 corruption.14.d: "Uno de nuestros amigos cercanos se acercó y sugirió hacer una pequeña fiesta para que el gobierno pueda conectarse más de cerca con sus empresas más confiables."
 corruption.14.a: "Quizás sea una oportunidad"
 corruption.14.b: "Mala idea"
 corruption.15.t: "Propuesta interesante"
 corruption.15.d: "Uno de nuestros empresarios se acercó y sugirió un esquema para aumentar las ganancias de la obtención de recursos, aunque seguramente pondrá presión en toda la industria."
 corruption.15.a: "Quizás sea una oportunidad"
 corruption.15.b: "Mala idea"
 MD_character_army.1.t: "[FROM.GetName] is killed in action"
 MD_character_army.1.d: "After commanding [FROM.GetHersHis] forces to retreat, it seems [FROM.GetRank] [FROM.GetName] was caught under fire from enemy units, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.1.a: "Una pérdida para la nación."
 MD_character_army.2.t: "[FROM.GetName] is killed in action"
 MD_character_army.2.d: "After securing another victory, it seems [FROM.GetRank] [FROM.GetName] was attacked by regrouping units of the enemy, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.2.a: "Una pérdida para la nación."
 civil_war_debuff.1.t: "¡Nuestro ejército se recupera!"
 civil_war_debuff.1.d: "El impacto inicial de la guerra civil sumió a nuestra nación en un caos absoluto. Perdimos contacto con algunas de nuestras unidades militares y nuestros comandantes, los responsables de nuestros depósitos de suministros dejaron de responder y ni siquiera sabíamos dónde estaba nuestro enemigo. Los frentes se han estabilizado y está un poco más claro quién está de qué lado, pero aún quedan muchos desafíos por delante.\n\nNuestro ejército está compuesto por veteranos y voluntarios, sin una idea clara de la cadena de mando. Estamos luchando por abastecer a nuestras tropas y establecer rutas de suministro directas. Tampoco tenemos una idea clara de las batallas que se han librado y de las tácticas que está utilizando nuestro enemigo. ¿Qué deberíamos hacer primero?"
 civil_war_debuff.1.a: "¡Necesitamos tener una idea clara del comando!"
 civil_war_debuff.1.b: "Vamos a necesitar armas. Muchas armas."
 civil_war_debuff.1.c: "¡Anota todo! Tenemos que estudiar a nuestro enemigo."
 civil_war_debuff.2.t: "¡Nuestro ejército se recupera!"
 civil_war_debuff.2.d: "Si bien nuestro ejército ha estado en una situación caótica durante mucho tiempo, ahora las cosas están mejorando. Tenemos una idea aproximada de quiénes y dónde están nuestros militares, y hemos logrado asegurar algunas líneas de suministro. Sin embargo, el ejército todavía carece de cohesión general y muchas unidades y milicias operan independientemente del mando central.\n\nNuestro ejército tiene una cadena de mando, pero no siempre se respetan las responsabilidades y autoridades. Tenemos un suministro de armas algo constante, pero muchas unidades tienen sus propios suministros. Tampoco tenemos una táctica común definida para nuestras tropas. ¿Qué debemos hacer para intentar mejorar?"
 civil_war_debuff.2.a: "Las tropas necesitan saber cuál es su misión y quién las dirige"
 civil_war_debuff.2.b: "No podemos permitirnos unas adquisiciones militares descoordinadas."
 civil_war_debuff.2.c: "Repartir algunos manuales de campo a nuestras tropas."
 civil_war_debuff.3.t: "¡Nuestro ejército se recupera!"
 civil_war_debuff.3.d: "La confusión en nuestro ejército está empezando a desaparecer. La forma en que actúan nuestros soldados está empezando a parecerse a la de un ejército real. Aún persisten algunos problemas menores.\n\nExisten algunos comandos duplicados donde las autoridades de los comandantes se superponen. Las órdenes de adquisiciones militares a veces desaparecen y el dinero destinado a ellas acaba fuera de las tropas. Estamos perdiendo mucha experiencia de campo y entrenadores, ya que los soldados son dados de baja sin documentación y las bajas no se distribuyen adecuadamente. ¿Qué deberíamos intentar mejorar?"
 civil_war_debuff.3.a: "Aclarar comandos y resolver conflictos internos."
 civil_war_debuff.3.b: "Luchar contra la corrupción en las compras militares."
 civil_war_debuff.3.c: "Establecer un proceso para transmitir la experiencia de campo."
 civil_war_debuff.4.t: "¡Nuestro ejército se recupera!"
 civil_war_debuff.4.d: "Estamos casi alli. Si bien persisten algunos problemas menores, nuestro ejército casi luce como antes de la guerra. Unas cuantas reformas organizativas más deberían hacer que nuestro ejército vuelva a ser totalmente profesional.\n\nTodavía hay varias milicias que no están plenamente integradas en el ejército. Algunos de los equipos que compramos y producimos no son intercambiables. Nuestro alto mando solicita recursos adicionales para analizar las experiencias de combate de la guerra. ¿Qué deberíamos intentar mejorar?"
 civil_war_debuff.4.a: "Integrar las milicias restantes."
 civil_war_debuff.4.b: "Unificar nuestras reservas de equipos."
 civil_war_debuff.4.c: "Asignar oficiales adicionales a nuestro alto mando."
 civil_war_debuff.5.t: "¡Nuestro ejército se recupera!"
 civil_war_debuff.5.d: "Se hace. Después de dos años de reformar un ejército ineficiente, hemos superado los daños causados ​​por la guerra civil. Ahora podemos volver a hacer que nuestros militares nos protejan contra amenazas externas, y no internas."
 civil_war_debuff.5.a: "Un gran día para [ROOT.GetNameDef] ."
 protests.1.t: "Tensiones crecientes"
 protests.1.d: "El malestar público está creciendo debido al descontento con el gasto público. Las protestas son cada vez más frecuentes y radicalizadas. La administración debe elegir entre adoptar una postura firme o intentar apaciguar a las masas."
 protests.1.a: "Ignorarlos"
 protests.1.b: "Imponer la orden"
 protests.1.c: "Iniciar negociaciones"
 protests.2.t: "Lucha por el poder político"
 protests.2.d: "A medida que aumenta el descontento público, las maniobras políticas se vuelven más precarias. La situación exige elegir entre salvaguardar el poder político a riesgo de aumentar la radicalización o correr un riesgo que puede tener consecuencias más graves."
 protests.2.a: "Tirar los dados"
 protests.2.b: "Mantener el rumbo"
 protests.2.c: "Iniciar negociaciones"
 protests.3.t: "Crisis en el liderazgo"
 protests.3.d: "La popularidad del partido gobernante está flaqueando debido a las protestas en curso. El gobierno enfrenta una decisión crítica que puede fortalecer o debilitar su control del poder. El resultado podría tener un impacto duradero en el panorama político del país."
 protests.3.a: "Ignorar a los manifestantes"
 protests.3.b: "Dispersar a los radicales"
 protests.3.c: "Iniciar negociaciones"
 protests.4.t: "Intromisión extranjera"
 protests.4.d: "A medida que crece el malestar interno, las potencias extranjeras se interesan. El gobierno debe decidir entre aceptar la influencia extranjera tal como es o tratar de controlar a los agentes extranjeros."
 protests.4.a: "No hagas movimientos apresurados"
 protests.4.b: "Encuentra hasta el último de ellos"
 protests.4.c: "Iniciar negociaciones"
 protests.5.t: "Progreso estancado"
 protests.5.d: "Las protestas están provocando una importante desaceleración de los proyectos de construcción en todo el país. La administración debe elegir entre mitigar los efectos por un período más corto o intentar pacificar a los manifestantes, arriesgándose a demoras más largas."
 protests.5.a: "Seguramente esto parará en unos días."
 protests.5.b: "Ahora la policía tendrá algo de trabajo."
 protests.5.c: "Iniciar negociaciones"
 protests.6.t: "Crisis de producción militar"
 protests.6.d: "El creciente malestar está afectando la producción militar y el gobierno enfrenta una decisión crucial. ¿Deberían aplicar medidas para mantener la producción o intentar reducir las protestas, posiblemente exacerbando la crisis de producción?"
 protests.6.a: "Volverán a trabajar muy pronto"
 protests.6.b: "Preservar la producción por la fuerza"
 protests.6.c: "Iniciar negociaciones"
 protests.10.t: "La nación al borde del abismo"
 protests.10.d: "El malestar público ha alcanzado un nivel crítico. La decisión del gobierno ahora puede conducir a una mayor desestabilización o a una población aún más radicalizada. La situación es terrible."
 protests.10.a: "Esto se resolverá"
 protests.10.b: "Suprimir a toda costa"
 protests.10.c: "Aceptar sus demandas"
 protests.11.t: "Agitación política"
 protests.11.d: "El panorama político es ahora un caos. Se debe elegir entre una pérdida significativa de poder político o una jugada arriesgada con pérdidas potenciales aún mayores. Lo que está en juego es más alto que nunca."
 protests.11.a: "Esto se resolverá"
 protests.11.b: "Guardia Nacional al rescate"
 protests.11.c: "Aceptar sus demandas"
 protests.12.t: "Colapso de la confianza"
 protests.12.d: "La confianza en el partido gobernante se está erosionando rápidamente. Nos espera una decisión fundamental que puede disminuir aún más la popularidad del partido o arriesgar un colapso total de la autoridad política. La nación observa con gran expectación."
 protests.12.a: "Esto se resolverá"
 protests.12.b: "Usar la fuerza"
 protests.12.c: "Aceptar sus demandas"
 protests.13.t: "Paralización total"
 protests.13.d: "La construcción en todo el país se ve gravemente afectada. Con todo lo que está en juego, el gobierno debe decidir entre una reducción drástica de la velocidad durante un período sostenido o una negociación potencialmente catastrófica con los manifestantes."
 protests.13.a: "No podemos abordar eso ahora"
 protests.13.b: "Imponer el trabajo"
 protests.13.c: "Aceptar sus demandas"
 protests.14.t: "La máquina de guerra se tambalea"
 protests.14.d: "Con la producción militar en crisis, el gobierno enfrenta una elección angustiosa. Deben aplicar medidas que afectarán drásticamente la producción durante un período prolongado o apostar por consecuencias aún más significativas."
 protests.14.a: "No podemos abordar eso ahora"
 protests.14.b: "¿Dónde está mi guardia nacional?"
 protests.14.c: "Aceptar sus demandas"
 protests.20.t: "El punto de quiebre"
 protests.20.d: "Años de malestar, insatisfacción y negociaciones fallidas han culminado en un momento de catástrofe nacional. Lo que comenzó como un murmullo de descontento se ha convertido en un grito ensordecedor por la revolución, y las calles ahora están llenas del clamor del conflicto. A pesar de los intentos de sofocar los disturbios, reconciliar las diferencias y restablecer el orden, los esfuerzos del gobierno han resultado infructuosos. La confianza de la gente se ha erosionado y su paciencia se ha agotado. La nación está dividida y el tejido de la sociedad está desgarrado. Los vecinos se vuelven contra vecinos y los antiguos amigos se convierten en enemigos a medida que se trazan líneas y se eligen bandos. Los manifestantes han tomado las armas y el aire está cargado con la tensión de una batalla inminente. Está a punto de escribirse un nuevo capítulo en la historia de la nación y la tinta es sangre. Comienza la guerra civil."
 protests.20.a: "Prepararse para el conflicto"
 migrant_event.1.t: "Barrios marginales de migrantes"
 migrant_event.1.d: "Algunas de las áreas alrededor de nuestras principales ciudades han comenzado a desarrollar lo que los lugareños llaman \"barrios marginales de inmigrantes\". Es una zona de inmigrantes y refugiados indigentes dentro del país que han intentado ganarse la vida, pero debido a los bajos salarios y la muy poca asimilación en el país anfitrión se han encontrado en estos barrios marginales."
 migrant_event.1.a: "Desmantelar los barrios marginales"
 migrant_event.1.b: "Proveer asistencia"
 migrant_event.1.c: "Reducir los objetivos de migración"
 migrant_event.2.t: "Los nacionalistas protestan contra la política migratoria"
 migrant_event.2.d: "Un grupo de nacionalistas ha organizado una protesta en una de nuestras principales ciudades contra los recientes inmigrantes a la nación. La protesta pide limitaciones adicionales a la migración y comenzar a regular aún más la inmigración y la migración dentro del país."
 migrant_event.2.a: "Permitir la manifestación"
 migrant_event.2.b: "Disolver la manifestación"
 migrant_event.3.t: "Migrantes acusados ​​de delitos violentos"
 migrant_event.3.d: "Grupos particulares de inmigrantes dentro del país han sido acusados ​​de diversos delitos violentos y nuestra policía ha arrestado a un gran número de nuevos inmigrantes en el país. Los manifestantes y simpatizantes de derecha han comenzado a decirle al gobierno que estas serían las consecuencias de no tener nuestras fronteras cerradas. ¿Cómo debemos responder?"
 migrant_event.3.a: "Eso nos dijeron..."
 migrant_event.3.b: "Aumentar la financiación policial."
 LibyaNews.1.a: "Excelente"
 Sudan.1.t: "Los que quedaron atrás"
 Sudan.1.d: "Algunos de nuestros territorios en nuestra frontera sur todavía tienen una población cristiana y animista bastante grande. Muchas personas en esos territorios están molestas por haber sido excluidas del referéndum de Sudán del Sur. La disidencia ha crecido cada vez más, y esas personas ahora exigen unirse a [SSU.GetName], ya que sienten que bajo nuestro gobierno no reciben la presentación adecuada."
 Sudan.1.a: "Bien, no los necesitamos."
 Sudan.1.b: "¡Esa es, por derecho, nuestra tierra!"
 Sudan.2.t: "¿Alianza con [DAR.GetNameDef]?"
 Sudan.2.d: "No somos los únicos que luchamos contra el gobierno. También hay rebeldes en Darfur. ¿Quizás deberíamos prometerles una mayor representación en el futuro gobierno sudanés si se aliaran con nosotros?"
 Sudan.2.a: "Envíales una solicitud"
 Sudan.2.b: "No los necesitamos"
 Sudan.2.a.tt: "Si aceptan, entonces\n"
 Sudan.3.t: "[FROM.GetNameDef] ofrece una alianza"
 Sudan.3.d: "[FROM.GetNameDef] nos ha ofrecido una alianza, ya que ellos también están luchando contra el gobierno de [SUD.GetAdjective]. Nos prometen una mayor representación en el nuevo gobierno de Sudán que están construyendo. ¿Qué debemos responder?"
 Sudan.3.a: "Estamos de acuerdo"
 Sudan.3.b: "No los necesitamos"
 Sudan.4.t: "[FROM.GetNameDef] acepta aliarse con nosotros"
 Sudan.4.d: "[FROM.GetNameDef] ha aceptado formar un frente común contra [SUD.GetLeader] junto con nosotros."
 Sudan.4.a: "Excelente"
 Sudan.5.t: "[FROM.GetNameDef] Se niega a aliarnos"
 Sudan.5.d: "[FROM.GetNameDef] se ha negado a formar un frente común contra [SUD.GetLeader] junto con nosotros."
 Sudan.5.a: "Es su pérdida..."
 Sudan.6.t: "[FROM.GetNameDef] y [DAR.GetNameDef] unen fuerzas"
 Sudan.6.d: "[FROM.GetNameDef] y [DAR.GetNameDef] han formado un frente común en su lucha contra nosotros."
 Sudan.6.a: "Maldición"
 SudanNews.1.d: "El conflicto en Kordofán del Sur y el Nilo Azul finalmente ha terminado. [FROM.GetLeader] ha proclamado la victoria en el conflicto y queda por ver qué dirección tomará el país en el futuro."
 SudanNews.2.t: "Conflicto en Kordofán del Sur y el Nilo Azul"
 SudanNews.2.d: "Después del Acuerdo Integral de Paz, algunas zonas de [SUD.GetName] con poblaciones cristianas y animistas dejaron de ser incluidas en el referéndum de independencia de Sudán del Sur. Desde el acuerdo, la gente que vive aquí está cada vez más cansada del gobierno [SUD.GetAdjective]. Sienten que carecen de representación en el gobierno actual y ahora han tomado las armas contra el gobierno."
 SudanNews.2.a: "Interesante"
 SouthSudan.1.t: "Referéndum sobre la independencia de Sudán del Sur"
 SouthSudan.1.d: "Ha llegado el momento de que el pueblo de Sudán del Sur vote por su independencia. Si bien algunas de las personas que viven en Sudán no están contentas de haber sido excluidas del área del referéndum, hemos logrado abarcar a la mayoría de la población cristiana y animista. Esto abrirá una nueva página de paz y prosperidad para ambos Sudán."
 SouthSudan.1.a: "Y el ganador es ..."
 SouthSudan.4.t: "[FROM.GetNameDef] solicita ayuda"
 SouthSudan.4.d: "Nuestro viejo aliado, [FROM.GetLeader] ha solicitado ayuda militar en su lucha contra [SUD.GetNameDef]. Ha declarado que sin nuestra ayuda militar, su esfuerzo bélico se desmoronará. A finales de los años 80, nuestras tropas participaron en la lucha en el sur de Sudán, pero con el conflicto en el Congo tuvimos que cambiar las prioridades. Ya hemos solucionado el problema del Congo, ¿tal vez podamos ahorrarle algo a [FROM.GetLeader]?"
 SouthSudan.5.t: "[FROM.GetNameDef] Nos apoya"
 SouthSudan.5.d: "[FROM.GetLeader] ha aceptado ayudarnos. Las tropas [FROM.GetAdjective] deberían cruzar la frontera en cualquier momento."
 SouthSudan.5.a: "Perfecto"
 SouthSudan.6.t: "[FROM.GetNameDef] retrocede"
 SouthSudan.6.d: "[FROM.GetLeader] ha declarado que no puede permitirse el lujo de ayudarnos más de lo que ya lo ha hecho."
 SouthSudan.6.a: "Maldición"
 SouthSudan.7.t: "[FROM.GetNameDef] Dispuesto a ceder tierras"
 SouthSudan.7.d: "[SUD.GetNameDef] está actualmente envuelto en una guerra civil. La facción opuesta de [SSU.GetName] nos ha ofrecido un trato; Nos darán control total sobre el territorio del Triángulo de Ilemi y, a cambio, les ayudaremos a establecer una red de suministro militar. ¿Deberíamos aceptar su oferta?"
 SouthSudan.7.a: "Por supuesto"
 SouthSudan.7.b: "Nosotros no estamos interesados"
 SouthSudan.8.t: "[FROM.GetNameDef] Acepta Nuestro Trato"
 SouthSudan.8.d: "[FROM.GetLeader] ha accedido a tomar el control del Triángulo Ilemi a cambio de ayudarnos con nuestro ejército."
 SouthSudan.8.a: "Perfecto"
 SouthSudan.9.t: "[FROM.GetNameDef] Rechaza Nuestro Trato"
 SouthSudan.9.d: "[FROM.GetLeader] ha rechazado nuestra oferta del Triángulo Ilemi. Temen que este movimiento les granjee algunas repercusiones por parte de [SUD.GetNameDef]."
 SouthSudan.9.a: "Maldición"
 SouthSudan.10.t: "Los rebeldes congoleños cruzan la frontera"
 SouthSudan.10.d: "Hemos recibido informes de grandes grupos armados que han cruzado la frontera desde [DRC.GetNameDef] y han atacado las ciudades de Yambio y Yei. Parece que estos grupos han sido equipados y contratados por el gobierno de [SUD.GetAdjective]. La oposición de [DRC.GetName] contra [UGA.GetName] les ha dado motivación para permitir este cruce de frontera."
 SouthSudan.10.a: "¡Malditos sean los congoleños!"
 SouthSudan.11.t: "Preparativos para el referéndum"
 SouthSudan.11.d: "Tras la firma de un acuerdo de paz entre el Norte y el Sur de Sudán, ambas partes han comenzado a prepararse para el referéndum. Las previsiones actuales muestran que la gran mayoría de la población [SSU.GetAdjective] votará a favor de la independencia, ya que no está muy dispuesta a ser gobernada por musulmanes de línea dura. Sin embargo, con la intromisión política y el control de las figuras clave del gobierno, podría ser posible que el Norte volviera a controlar el Sur."
 SouthSudan.11.a: "Debemos prepararnos"
 SouthSudan.11.tooltip: "La probabilidad de que las personas en Sudán del Sur voten para seguir siendo parte de Sudán es §Y[SUD.GetAdjective] Influencia en [SSU.GetNameWithFlag] multiplicada por 0,75§!. Si la influencia de [SUD.GetAdjective] en [SSU.GetNameWithFlag] es §Ypor debajo del 20%§!, el referéndum siempre resultará en §Yindependencia§!."
 SouthSudan.12.t: "[FROM.GetNameDef] Se independiza"
 SouthSudan.12.d: "[FROM.GetName] ha celebrado su referéndum de independencia en los territorios que controlaba. Los resultados a favor de la independencia fueron un sonoro 99,83%. Sorprendentemente, hubo muy poca violencia electoral antes de la votación y, en general, se consideró que las elecciones habían sido justas."
 SouthSudan.12.a: "Supongo que esto es un adiós"
 SouthSudan.13.t: "[FROM.GetNameDef] Favorece la Unidad"
 SouthSudan.13.d: "[FROM.GetName] ha celebrado su referéndum de independencia en los territorios que controlaba. Estuvo muy reñido, pero los partidarios de permanecer con Sudán ganaron con el 54% de los votos. Muchos sursudaneses expresaron su temor a que intentar separarse de Sudán no hiciera sino reavivar la guerra civil."
 SouthSudan.13.a: "¡Bienvenido de nuevo!"
 SouthSudan.14.t: "El helicóptero de [ROOT.GetLeader] se estrella"
 SouthSudan.14.d: "Durante el fin de semana, nuestro presidente [ROOT.GetLeader] había ido a reunirse con su viejo aliado [UGA.GetLeader]. No había informado de este viaje al gobierno de [SUD.GetAdjective], y en su lugar había mentido diciendo que estaba de vacaciones en Nueva Kush. Sin embargo, [ROOT.GetLeader] nunca volvió a casa. En su vuelo de regreso, su helicóptero se estrelló contra una cadena montañosa en Sudán del Sur, matándolo a él, a seis de sus colegas y a siete miembros de la tripulación de [UGA.GetAdjective]. Nuestro gobierno se esfuerza por resolver la cuestión de la sucesión, pero es probable que el adjunto de [ROOT.GetLeader], Salva Kiir Mayardit, asuma el cargo."
 SouthSudan.14.a: "¿Unos meses después de la paz? Sospechoso..."
 SouthSudan.15.t: "Rumores de golpe de Estado"
 SouthSudan.15.d: "Hemos oído rumores de que uno de nuestros aliados durante la guerra civil planea derrocar a nuestro gobierno. Podríamos desestimar estos rumores. Sin embargo, teniendo en cuenta que nuestro ejército está formado actualmente por decenas de pequeños grupos rebeldes, es más que probable que alguien esté intentando hacerse con el trono. ¿Qué debemos hacer?"
 SouthSudan.15.a: "Nuestros aliados son leales"
 SouthSudan.15.b: "¡Purga a los generales! ¡La policía! ¡A todos!"
 SouthSudan.15.a.tt: "Si empieza una guerra civil, la oposición será §Ymás fuerte§! que nuestro bando."
 SouthSudan.15.b.tt: "Si empieza una guerra civil, la oposición será §Ymás débil§! que nuestro bando."
 SouthSudan.16.t: "¿Qué hay en un nombre?"
 SouthSudan.16.d: "Ahora que somos independientes, tenemos que decidir qué nombre ponerle a nuestro país. Se han recogido varias sugerencias del público, siendo Sudán del Sur el favorito obvio. Sin embargo, podríamos elegir otro nombre"
 SouthSudan.16.a: "Sudán del Sur es bueno"
 SouthSudan.16.b: "Azania, para recordar nuestra historia"
 SouthSudan.16.c: "La República del Nilo es lo más apropiado"
 SouthSudan.16.dd: "La República Kush es la mejor"
 SouthSudanNews.1.d: "La guerra civil en [SSU.GetNameDef] ha llegado a su fin. La guerra comenzó tras una lucha de poder entre varios grupos rebeldes, poco después de que el país hubiera finalizado sus negocios con [SUD.GetNameDef]. Quizá ahora el país pueda empezar a reconstruirse."
 SouthSudanNews.2.t: "El Acuerdo General de Paz"
 SouthSudanNews.2.d: "Las facciones [SUD.GetAdjective] y [SSU.GetAdjective] han llegado a un acuerdo de paz que pone fin a la Segunda Guerra Civil sudanesa. Con la ayuda de los negociadores de la Autoridad Intergubernamental para el Desarrollo, las dos partes han acordado un marco en el que se concederá autonomía a [SSU.GetNameDef] bajo el gobierno de [SUD.GetAdjective]. Las partes acordaron que, en un plazo de 6 años, se celebraría un referéndum sobre la plena independencia de [SSU.GetNameDef]. Quizá este acuerdo resuelva por fin el conflicto étnico de la región, que dura ya décadas."
 SouthSudanNews.3.t.SUD: "Aplastados los rebeldes de Sudán del Sur"
 SouthSudanNews.3.t.SSU: "Nace un nuevo Sudán"
 SouthSudanNews.3.d.SUD: "El último episodio del conflicto étnico de [SUD.GetAdjective] ha llegado a su fin, ya que el gobierno de [SUD.GetAdjective] ha aplastado a los rebeldes en el sur del país. Esto dejará a [SUD.GetLeader] libre para continuar su islamización y arabización del país, para disgusto de la población cristiana y animista del sur."
 SouthSudanNews.3.d.SSU: "El último episodio del conflicto étnico [SUD.GetAdjective] ha llegado a su fin cuando los rebeldes de Sudán del Sur derrocaron al gobierno. El anterior líder de [SUD.GetAdjective] [SUD.GetLeader] ha sido encarcelado y está a la espera de juicio por abusos contra los derechos humanos y crímenes de guerra. El nuevo régimen promete un Sudán libre e igualitario, pero muchos analistas han señalado que el gobernante [SSU.GetLeader] ya ha tomado medidas para silenciar cualquier oposición durante su mandato como líder de los rebeldes."
 SouthSudanNews.3.a: "Interesante"
 SouthSudanNews.4.t.independence: "[FROM.GetNameDef] Se independiza"
 SouthSudanNews.4.t.autonomy: "[FROM.GetNameDef] Sigue Formando Parte De [SUD.GetNameDef]"
 SouthSudanNews.4.d.independence: "[FROM.GetNameDef] ha celebrado un referéndum de independencia según lo acordado en su acuerdo de paz con [SUD.GetName]. Los resultados fueron un asombroso 98% a favor de la separación de los dos estados. Esto convierte a [SSU.GetName] en el país más joven de África."
 SouthSudanNews.4.d.autonomy: "[FROM.GetNameDef] ha celebrado un referéndum de independencia según lo acordado en su acuerdo de paz con [SUD.GetName]. Los resultados estuvieron cerca del empate, pero la opción a favor de la unidad con [SUD.GetName] ganó por un 53%. Se especula que el temor a que se reavivara la guerra si [SSU.GetName] se separaba de [SUD.GetName] hizo que los votantes se decantaran por la unidad. En cualquier caso, se ha concedido a [SSU.GetName] cierta autonomía, pero está por ver cuánto durará."
 SouthSudanNews.4.a: "Interesante"
 SouthSudanNews.5.t: "Guerra Civil En [SSU.GetNameDef]"
 SouthSudanNews.5.d: "Ha comenzado una guerra civil en la joven nación de [SSU.GetName]. Sólo unos pocos años después de terminar su conflicto con [SUD.GetName], el conflicto ha comenzado de nuevo. Parece que, como ya no hay un enemigo común para los distintos grupos rebeldes, ha comenzado una lucha de poder entre los distintos grupos."
 SouthSudanNews.5.a: "Interesante"
 war_in_darfur_threat: "Guerra en Darfur"
 Darfur.2.t: "Los rebeldes de Darfur atacan Golo"
 Darfur.2.d: "Un grupo de rebeldes pertenecientes al Frente de Liberación de Darfur y al Movimiento Justicia e Igualdad ha atacado la pequeña ciudad de Golo, sede del distrito de Jebel Marra, justo al sur de Kabkabiya. El ataque fue precedido de escaramuzas menores contra comisarías locales, puestos avanzados del ejército y convoyes militares. Los rebeldes están hartos de las políticas de arabización de [SUD.GetLeader] en la región y exigen su dimisión."
 Darfur.2.a: "Maldición"
 Darfur.3.t: "Los rebeldes de Darfur cierran la frontera con Chad"
 Darfur.3.d: "Un grupo de rebeldes pertenecientes al Frente de Liberación de Darfur y al Movimiento Justicia e Igualdad han ocupado la ciudad fronteriza de Tine, cerca de la frontera con Chad. En el proceso, capturaron una gran cantidad de armas y suministros. Los rebeldes intentan crear una conexión con Chad, donde viven muchas tribus que simpatizan con la causa darfurí."
 Darfur.3.a: "Maldición"
 Darfur.4.t: "Los rebeldes de Darfur asaltan El Fasher"
 Darfur.4.d: "A primera hora de la mañana, un grupo de rebeldes del Frente de Liberación de Darfur y del Movimiento Justicia e Igualdad atacó la guarnición durmiente de El Fasher. En las horas siguientes, destruyeron varios aviones militares en la base aérea local, dejando 75 soldados muertos y 32 capturados. Los rebeldes también consiguieron capturar a un general de división, que era el comandante de la base aérea. Esto ha supuesto un duro revés para nuestro ejército, y varias unidades militares han abandonado sus puestos temiendo ataques de los rebeldes."
 Darfur.4.a: "Maldición"
 DarfurNews.1.t: "Comienza la guerra en Darfur"
 DarfurNews.1.d: "Décadas de políticas de arabización forzosa por parte del gobierno de [SUD.GetAdjective] han llegado por fin a su punto de ebullición. Dos grupos rebeldes, el Frente de Liberación de Darfur y el Movimiento por la Justicia y la Igualdad, han hecho que el conflicto pase de ser una insurgencia de bajo nivel a una guerra total. El tiempo dirá si [SUD.GetName] será capaz de manejar a estos rebeldes."
 DarfurNews.1.a: "Interesante"
 DarfurNews.2.t: "[DAR.GetNameDef] Autonomía concedida"
 DarfurNews.2.d: "Tras años de conflicto entre los rebeldes de [DAR.GetAdjective] y las fuerzas gubernamentales de [SUD.GetAdjective], ambas partes han llegado a un acuerdo de paz. A [DAR.GetName] se le concederá una autonomía limitada bajo el control de [SUD.GetName], lo que debería protegerles de la discriminación. Sólo el tiempo dirá si [SUD.GetLeader] planea mantener este acuerdo."
 DarfurNews.2.a: "Interesante"
 DarfurNews.3.t: "[DAR.GetNameDef] Se independiza"
 DarfurNews.3.d: "Después de años de conflicto entre los rebeldes [DAR.GetAdjective] y las fuerzas gubernamentales [SUD.GetAdjective], las fuerzas [DAR.GetAdjective] han logrado llegar a la cima. Después de incursiones exitosas desde Darfur hasta el propio Sudán, el gobierno [SUD.GetAdjective] no tuvo más opción que dar concesiones a los rebeldes [DAR.GetAdjective]. La nación de [DAR.GetName] ahora ha obtenido total independencia, pero el tiempo dirá si [SUD.GetName] está aprovechando esto como una oportunidad para reconstruir sus fuerzas."
 DarfurNews.3.a: "Interesante"
 corruption.16.t: "Aumento de la corrupción"
 corruption.16.d: "Espías y agentes de otro país se han inmiscuido en nuestro país aumentando el índice de corrupción en nuestro país. Procede de diversas fuentes, como sobornos selectivos, negociaciones y agentes subversivos bien situados en el país."
 corruption.16.a: "Desafortunado"
 Israel.1111.t: "Rumores de una 3ª Intifada"
 Israel.1111.d: "El influyente grupo islamista palestino Hamás ha hecho un llamamiento a un nuevo levantamiento contra Israel, a partir del viernes. Hablando en Gaza el jueves, el líder de Hamás, Ismail Haniyeh, dijo: \"Debemos llamar y debemos trabajar para lanzar una intifada frente al enemigo sionista.\" También dijo: \"Queremos que el levantamiento dure y continúe para que Trump y la ocupación se arrepientan de esta decisión.\""
 Israel.1111.a: "Uh oh..."
 Israel.1112.t: "Israel amenaza con la guerra"
 Israel.1112.d: "Debido a nuestro conflicto enquistado con Israel en los Altos del Golán, ¡nos han amenazado con declararnos la guerra a menos que revoquemos nuestra reclamación!"
 Israel.1112.a: "Revocar nuestra reclamación en el Golán"
 Israel.1112.b: "¡Guerra!"
 restart_boardcross_expenditure: "Reinicia todos los gastos en todos los ámbitos"
 god_of_war_event.1.t: "¿Listo para un desafío?"
 god_of_war_event.1.d: "Normalmente, aparte de la mayoría de las mejoras básicas, la IA en MD no hace trampas. Usa diseños de estilo RP para vehículos y divisiones, pero con esta opción, la IA HARÁ TRAMPAS.\nCrearía equipos y divisiones de la nada y se esforzará más para resistir al jugador en general. No será una experiencia Endsieg, la IA está hecha para desafiar al jugador, no para abrumarlo.\n\nPD: Aún no puedes alardear después de vencer a esta IA."
 god_of_war_event.1.a: "¡Traelo!"
 god_of_war_event.1.b: "¡También haz que la IA se centre más en mí!"
 md4.21.t: "[FROM.GetName]-[Root.GetName] EAEU Integration"
 md4.21.d: "[FROM.GetNameDef] is asking us to allow them into EAEU. We will have priority to export to and import from them and will economically integrate into each other further."
 md4.21.a: "Fírmenlo!"
 md4.21.b: "Rechazar"
 md4.22.t: "[FROM.GetNameDef] Has Signed Our Ascension into EAEU!"
 md4.22.d: "[FROM.GetNameDef] has accepted our offer to sign allow us into EAEU."
 md4.22.a: "¡Nos hará prósperos a ambos!"
 md4.23.t: "[FROM.GetNameDef] Has Refused our offer to sign allow us into EAEU."
 md4.23.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.23.a: "¡Temor a nuestros productos superiores!"
 EUR_idea_eacu_cooperation: "Cooperación con la UEEA"
 EUR_idea_eacu_cooperation_desc: "La Unión Aduanera Euroasiática (originalmente Comunidad Económica Euroasiática) promueve los vínculos económicos entre la mayoría de los estados postsoviéticos. La unión impone un arancel externo común a todos los bienes que ingresan a la unión y actúa como una entidad singular a la hora de producir acuerdos y negociaciones comerciales."
 EUR_idea_eacu_cooperation_2: "Cooperación integrada de la UEEA"
 EUR_idea_eacu_cooperation_2_desc: "La Unión Aduanera Euroasiática (originalmente Comunidad Económica Euroasiática) promueve los vínculos económicos entre la mayoría de los estados postsoviéticos. La unión impone un arancel externo común a todos los bienes que ingresan a la unión y actúa como una entidad singular a la hora de producir acuerdos y negociaciones comerciales."
 influence.1.c: "Enviar el 15% del PIB como ayuda económica."
 influence.1.e: "Después de pensarlo, no lo necesitan."
 Cameroon.2.t: "El naufragio del barco"
 Cameroon.2.d: "Un barco con 150 pasajeros a bordo se dirigía del puerto nigeriano de Oron al puerto gabonés de Gentil cuando zozobró. Se estima que más de cien pasajeros han fallecido y el resto se encuentra en estado crítico, aferrado a los restos del naufragio. Pescadores locales y autoridades camerunesas de la ciudad de Kirbi están buscando más supervivientes en estos momentos, pero la situación se presenta cada vez más desoladora...\n\nPodemos ofrecernos a pagar los gastos médicos de los supervivientes o podemos optar por un día de oración por las almas de los fallecidos y su recuperación."
 Cameroon.2.a: "Deberíamos pagar las facturas médicas."
 Cameroon.2.b: "Es conveniente un día de oración."
 world_war.1.t: "Guerra Mundial habilitada por ferrocarril"
 world_war.1.d: "Tradicionalmente, Millennium Dawn ha sido un mod orientado al mundo abierto, y por lo tanto se ha alejado de la estrategia de una Guerra Mundial como otros mods. Esta opción se ha creado para satisfacer el deseo de algunos miembros de la comunidad de un estilo de juego orientado exclusivamente a la guerra. Esta regla de juego se ha creado con los principios de MD en mente, por lo que ofrecerá diferentes escenarios de inicio de la Guerra Mundial según el jugador. La Guerra comenzará alrededor de 2014 para que tengas tiempo de prepararte."
 world_war.1.a: "Está Bien"
 world_war.2.t: "China actúa contra Taiwán"
 world_war.2.d: "El EPL ha anunciado el inicio de operaciones contra la República de China, lo que marca la continuación de la guerra civil china. Aunque nuestra inteligencia ya lo había detectado, teníamos motivos para creer que China mostraría moderación ante una posible represalia de Estados Unidos."
 world_war.2.a: "[CHI.GetName] ha cruzado nuestra línea roja"
 world_war.2.b: "Los problemas asiáticos son los problemas de los asiáticos."
 world_war.3.t: "Intervención estadounidense contra China"
 world_war.3.d: "[USA.GetLeader] anunció hoy que ha ordenado al ejército estadounidense prepararse para una movilización a gran escala contra [CHI.GetName]. Esto se produce tras los ataques chinos contra Taiwán y la continuación de la guerra civil china. Si bien China ha explicado las razones de la invasión, Estados Unidos ha declarado que el principal objetivo de esta intervención es demostrar que «Estados Unidos siempre respaldará a sus aliados, independientemente del agresor». Se teme que esta intervención provoque una mayor escalada en la región, y algunos la califican como el inicio de la Tercera Guerra Mundial."
 world_war.3.a: "Preocupante"
 world_war.4.t: "Estados Unidos distraído en China"
 world_war.4.d: "Los imperialistas en Washington han iniciado una campaña contra nuestros socios en China. Con esto en mente, tenemos una oportunidad de oro ante nosotros. Mientras ellos están distraídos con China, nosotros tenemos la capacidad de avanzar y reclamar lo que una vez fue nuestro: la totalidad de Corea."
 world_war.4.a: "No podemos arriesgarnos a desperdiciar una oportunidad así."
 world_war.4.b: "Es demasiado arriesgado"
 world_war.5.t: "El conflicto en Asia se intensifica"
 world_war.5.d: "La guerra en Asia se ha intensificado, con el gobierno norcoreano atacando a la República de Corea en un intento por reunificar la totalidad de la península coreana bajo el dominio de la RPDC. Esta acción de la República Popular Democrática de Corea ha llevado a Japón a responder enviando tropas a la República de Corea, lo que ha desencadenado una guerra mucho más grande de lo previsto. El mundo observa con expectación cómo la guerra que comenzó con China se ha extendido rápidamente a la mayor parte de Asia Oriental. Naciones de todo el mundo, especialmente en Europa y África, condenan la violencia en Asia ante el temor de que se abra un nuevo escenario de guerra en Europa como resultado del caos y la inestabilidad que prevalecen en el mundo actual."
 world_war.5.a: "La tercera guerra mundial ya está aquí"
 world_war.6.t: "Guerra en Corea"
 world_war.6.d: "La RPDC ha intensificado la guerra en la región al declarar ilegalmente la guerra contra la República de Corea. Esta acción amenaza el orden que hemos trabajado incansablemente por preservar durante décadas, y los llamados a la acción aumentan entre nuestra población. Debemos defender a nuestros amigos y nuestra integridad apoyando a Corea de una u otra manera."
 world_war.6.a: "La RPD de Corea ha cometido hoy un grave error."
 world_war.6.b: "Nosotros no podemos participar"
 world_war.7.t: "Rusia avanza hacia el oeste"
 world_war.7.d: "El gobierno ruso ha avanzado hacia el oeste y ha iniciado una guerra a gran escala contra Ucrania. Esta expansión preocupa enormemente a nuestro mando militar y a nuestros aliados, ya que el destino del continente europeo es desconocido y seguirá siéndolo hasta que demostremos a los rusos que Europa no es un pastel que se pueda comer."
 world_war.7.a: "Esta vez Rusia ha ido demasiado lejos"
 world_war.7.b: "Nosotros no podemos arriesgar una guerra"
 world_war.8.t: "Guerra en Europa"
 world_war.8.d: "Tras las incursiones rusas en Ucrania, se observó el avance de las fuerzas de la OTAN hacia Ucrania para enfrentarse a las fuerzas rusas. Ya están apareciendo informes de escaramuzas aéreas y navales, lo que anuncia el inicio de una guerra de mayor envergadura en Europa. Organizaciones internacionales de todo el mundo han comenzado a denominar este conflicto como la Tercera Guerra Mundial, ya que las fuerzas de la OTAN se encuentran actualmente en combate con las fuerzas rusas en toda Europa. Casi todas las naciones con armas nucleares están actualmente en guerra entre sí, y el temor a un intercambio nuclear continúa creciendo. Nadie sabe si el mundo acabará, pero una cosa es segura: el próximo orden mundial garantizará, sin duda, que no sea multipolar."
 world_war.8.a: "La historia se escribe una vez más"
 world_war.9.t: "Nuestras ambiciones en el mundo"
 world_war.9.d: "Hoy en día, estadounidenses, chinos y japoneses se encuentran enfrascados en un gran conflicto. Con la participación de los europeos en el esfuerzo bélico, nuestro gobierno está cada vez más preocupado por la expansión europea hacia el este, en dirección a nuestras fronteras. El mando militar ha sugerido que nos adentremos en Ucrania para prevenir un posible ataque sorpresa europeo en el futuro."
 world_war.9.a: "Escucha sus consejos"
 world_war.9.b: "No podemos arriesgarnos a una guerra basándonos en suposiciones"
 world_war.10.t: "Estalla la guerra en Oriente Medio"
 world_war.10.d: "Tras varios ataques iraníes contra Israel, las Fuerzas de Defensa de Israel (FDI) han instado a sus aliados a derrocar y desmantelar el gobierno iraní. Este acontecimiento que ha transformado el mundo es solo una parte más de una guerra mayor, que los expertos han denominado la Tercera Guerra Mundial, y que ahora se está gestando un nuevo escenario bélico. La rivalidad entre Irán e Israel no es nueva, pues comenzó tras la Revolución Islámica de Irán en 1979. Se desconoce si Irán posee armas nucleares, pero se teme un posible intercambio nuclear entre el Eje de la Resistencia e Israel. Actualmente se desconoce si terceros países se involucrarán en dicho conflicto, pero lo que sí se sabe es que esta guerra podría provocar la destrucción de Oriente Medio y de los mercados petroleros mundiales."
 world_war.10.a: "¿Hay algún lugar seguro?"
 world_war.11.t: "Las liberaciones de Al-Quds"
 world_war.11.d: "Con Estados Unidos y el resto de las grandes potencias mundiales enfrascados en una guerra de desgaste, finalmente tenemos una amplia oportunidad de atacar a Israel y provocar el fin del régimen sionista. Un ataque así podría significar la destrucción de nuestros dos estados, pero es ahora o nunca."
 world_war.11.a: "Ataque！"
 world_war.11.b: "Nosotros no podemos arriesgar una guerra"
 taiwan.17.t: "Elección de una nueva capital"
 taiwan.17.d: "Mientras saboreamos los frutos de la victoria, debemos comenzar a pensar en la reubicación de nuestra capital administrativa hacia el continente. Taipéi está simplemente demasiado lejos de los principales centros de población de China continental y, como resultado, nuestra capacidad para gobernar eficazmente la nación se ha vuelto cada vez más difícil. Por lo tanto, nuestra capital será..."
 taiwan.17.a: "Pekín"
 taiwan.17.b: "Shanghái"
 taiwan.17.c: "Chongqing"
 taiwan.17.d1: "Lo mismo, Taipéi"
 taiwan.17.e: "Nanjing"
 city_captured.12.t: "Caída de Baidoa"
 city_captured.12.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Baidoa, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.12.a: "Interesante"
 city_captured.13.t: "Caída de Kismayo"
 city_captured.13.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Kismayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night.."
 city_captured.13.a: "Interesante"
 city_captured.14.t: "Caída de Galkayo"
 city_captured.14.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Galkayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.14.a: "Interesante"
 taiwan.18.t: "La Gran Carrera de Chips"
 taiwan.18.d: "A medida que nos adentramos en la década del 2000, nuestra superioridad en la producción de microchips se ve amenazada. La República Popular China está comenzando a expandir su industria de producción de microchips, en un intento de superar nuestra capacidad de producción. Debemos mantenernos a la vanguardia para proteger nuestra posición a nivel mundial."
 taiwan.18.a: "¡Nosotros ganaremos!"
 systems.1.t: "Bienvenidos a Millennium Dawn"
 systems.1.d: "¡Bienvenido a Millennium Dawn! Gracias por descargar y jugar el mod. Si eres nuevo, te recomendamos explorar los distintos menús para familiarizarte con las funciones. Normalmente, los menús se abren mediante los botones en la parte superior de las pantallas. ¿Necesitas ayuda? Únete a nuestra comunidad de Discord, donde estaremos encantados de ayudarte con cualquier pregunta o problema. Puedes reportar errores en el juego usando \"Reportar un problema\" en el menú de pausa o a través de nuestros canales de Discord.\n\nInformación importante:\n- El combustible es negativo al inicio del juego debido a las centrales eléctricas y al consumo de la población. Consulta la interfaz de energía en el menú de construcción para obtener más información.\n-El enfoque histórico no es igual a resultados históricos.Usamos la opción de enfoque histórico para incentivar a la IA a tomar las decisiones más históricamente plausibles dentro de las opciones y eventos disponibles. Esto no garantiza que el juego siga un curso histórico exacto.\""
 systems.1.a: "Vale."
 protests.100.t: "Informe: Estallan protestas en [ROOT.capital.GetCapitalVictoryPointName]"
 protests.100.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nParece que los recientes cambios políticos en el país han provocado una movilización masiva, con los primeros indicios de revuelta estallando en [ROOT.capital.GetCapitalVictoryPointName]. El aparato de seguridad del Estado espera órdenes de las altas esferas antes de decidir qué hacer, pero a menos que se atiendan las demandas de los manifestantes, este movimiento podría derivar en el derrocamiento de nuestro gobierno.\n\nSe prevé que las protestas se extiendan fuera de la capital hasta abarcar a toda la nación.\n\n Firmado,\n - Dirección de Seguridad Interna"
 protests.100.a: "Veremos qué podemos hacer."
 protests.101.t: "Informe: ¡Las Protestas se Extienden!"
 protests.101.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nAl parecer, las protestas se han extendido, alcanzando nuevos estados y provincias en todo el país. Necesitamos determinar un método para lidiar con estos manifestantes y así restablecer el orden y la calma en la sociedad.\n\n Firmado,\n - Dirección de Seguridad Interna"
 protests.101.a: "¡Tenemos que actuar rápido!"
 protests.102.t: "Informe: Las Protestas Fracasan a Nivel Regional"
 protests.102.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nLas autoridades locales de seguridad y administrativas atendieron los recientes disturbios públicos en la región. Las manifestaciones que se habían formado en varias zonas urbanas y semiurbanas fueron dispersadas gracias a la labor coordinada de las fuerzas del orden. Las autoridades informan que se ha restablecido el orden y que los servicios esenciales siguen operativos.\n\n Firmado,\n - Dirección de Seguridad Interna"
 protests.102.a: "Bueno"
 protests.103.t: "Informe: La Calma Regresa tras la Dispersión de las Protestas"
 protests.103.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nLas fuerzas de seguridad locales informan que las protestas se han vuelto increíblemente limitadas en escala y tamaño, y que la mayoría de las ciudades y calles han vuelto a la normalidad. Este informe no proviene de una sola región, sino de varias, lo que indica una falta general de energía entre los manifestantes. Es probable que este sea el fin del movimiento de protesta.\n\n Firmado,\n - Dirección de Seguridad Interna"
 protests.103.a: "Excelente"
 protests.104.t: "¡Manifestantes Incendian Activos Industriales!"
 protests.104.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nAl parecer, los manifestantes han incendiado varios activos industriales, lo que ha generado un ambiente de seguridad tenso. Ahora debemos decidir qué hacer con los edificios dañados.\n\nFirmado,\n - Dirección de Seguridad Interna"
 protests.104.a: "Derríbalo, no hay reparación."
 protests.104.b: "Utilizar fondos gubernamentales para iniciar la reconstrucción"
 protests.105.t: "¡Las Manifestantes Incendian los Parques de Oficinas!"
 protests.105.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nAl parecer, los manifestantes han incendiado varios parques de oficinas, lo que ha generado un ambiente de seguridad tenso. Ahora debemos decidir qué hacer con los edificios dañados.\n\nFirmado,\n - Dirección de Seguridad Interna"
 protests.105.a: "Derríbalo, no hay reparación."
 protests.105.b: "Utilizar fondos gubernamentales para iniciar la reconstrucción"
 protests.106.t: "¡Las Manifestantes Incendian Fábricas Militares!"
 protests.106.d: "Informe de situación\n\nDirigido a su excelencia, [ROOT.GetLeader]\n\nAl parecer, los manifestantes han incendiado varias fábricas militares, lo que ha generado un ambiente de seguridad tenso. Ahora debemos decidir qué hacer con los edificios dañados.\n\nFirmado,\n - Dirección de Seguridad Interna"
 protests.106.a: "Derríbalo, no hay reparación."
 protests.106.b: "Utilizar fondos gubernamentales para iniciar la reconstrucción"
 protests.200.t: "Informe: Protestas Entrantes"
 protests.200.d: "Informe de Situación\n\nDirigido a su Excelencia, [ROOT.GetLeader]\n\nRecientemente, nuestra agencia de inteligencia y fuerzas de seguridad se han enterado de planes para una revuelta nacional. Esto se debe a los recientes acontecimientos en nuestro país, que han creado una camarilla de personas insatisfechas. Se alega que estas personas están empezando a formar grupos para derrocar a nuestro gobierno.\n\n Firmado,\n - Dirección de Seguridad Interna"
 protests.200.a: "Nosotros debemos actuar rapido"
 influence.5.d1: "Llama a Albionis, vamos a entrar."
 recognition.71.t: "The General Assembly Vote Has Passed"
 recognition.71.d: "The General Assembly has voted to admit us to the United Nations. After years of diplomatic effort, our seat is secured."
 recognition.71.a: "[THIS.GetName] takes its seat."
 recognition.72.t: "The General Assembly Vote Has Failed"
 recognition.72.d: "The General Assembly has fallen short of the votes needed to admit us. Our bid for UN membership has stalled for now."
 recognition.72.a: "A setback for our diplomacy."
 recognition.73.t: "General Assembly Rejects [FROM.GetName]'s Bid"
 recognition.73.d: "The General Assembly has voted against the admission of [FROM.GetNameDef] as a member state. The bid has stalled."
 recognition.73.a: "The vote is recorded."
 recognition.12.t: "[FROM.FROM.GetName] Busca la recomendación del Consejo de Seguridad"
 recognition.12.d: "[FROM.FROM.GetName] has petitioned the Security Council for a recommendation to the General Assembly, over the objection of [FROM.GetName]. The Council must now cast its vote."
 recognition.12.a: "Votar Sí"
 recognition.12.b: "Vota No"
 recognition.12.c: "Abstenerse"
 recognition.15.t: "Vote on [FROM.FROM.GetName] UN Membership"
 recognition.15.d: "With the Security Council's recommendation secured, the question of admitting [FROM.FROM.GetName], opposed by [FROM.GetName], now falls to the General Assembly."
 recognition.15.a: "Votar Sí"
 recognition.15.b: "Vota No"
 recognition.15.c: "Abstenerse"
 recognition.121.t: "El Consejo de Seguridad Recomienda a [FROM.GetName] como Miembro de la ONU"
 recognition.121.d: "The Security Council has issued a recommendation in favor of admitting [FROM.GetName] to the United Nations. The matter now passes to the General Assembly."
 recognition.121.a: "A vote moves forward."
 recognition.122.t: "Security Council Rejects [FROM.GetName]'s Bid"
 recognition.122.d: "The Security Council has voted against recommending [FROM.GetName] to the General Assembly. The membership bid stops at this stage."
 recognition.122.a: "The bid stalls."
 UNSC.1.t: "Resolución para Presionar a [?global.current_sc_vote_nation.GetName] para que ponga fin a todas las Guerras Ofensivas"
 UNSC.1.d: "El Consejo de Seguridad ha presentado una Resolución para presionar a [?global.current_sc_vote_nation.GetName] a fin de que ponga fin a todos sus conflictos ofensivos actuales. Si se aprueba, [?global.current_sc_vote_nation.GetName] tendrá 210 días para resolver todos sus conflictos ofensivos en curso. De no hacerlo, serán sancionados hasta que finalmente los pongan fin.\n\n$unsc_vote_pass_tt$"
 UNSC.1.a: "Sí"
 UNSC.1.b: "No"
 UNSC.1.c: "Abstenerse"
 UNSC.2.t: "Sanciones del Consejo de Seguridad de las Naciones Unidas contra [?global.current_sc_vote_nation.GetName]"
 UNSC.2.d: "El Consejo de Seguridad tiene ante sí una Resolución que establece sanciones del Consejo de Seguridad contra [?global.current_sc_vote_nation.GetName]. Si la votación se aprueba, [?global.current_sc_vote_nation.GetName] será sancionado hasta que deje de representar una amenaza ofensiva para la paz mundial o hasta que el Consejo de Seguridad levante las sanciones.\n\n$unsc_vote_pass_tt$"
 UNSC.2.a: "Sí"
 UNSC.2.b: "No"
 UNSC.2.c: "Abstenerse"
 UNSC.3.t: "Restringir los Voluntarios Militares Extranjeros a [?global.current_sc_vote_nation.GetName]"
 UNSC.3.d: "Una resolución para impedir el envío de voluntarios militares extranjeros a [?global.current_sc_vote_nation.GetName] se encuentra en el Consejo de Seguridad. Si se aprueba, cualquier nación que envíe voluntarios militares a [?global.current_sc_vote_nation.GetName] después de la votación será sancionada hasta que retire a sus voluntarios o hasta que finalice el conflicto.\n\n$unsc_vote_pass_tt$"
 UNSC.3.a: "Sí"
 UNSC.3.b: "No"
 UNSC.3.c: "Abstenerse"
 UNSC.4.t: "Embargo de Armas contra [?global.current_sc_vote_nation.GetName]"
 UNSC.4.d: "El Consejo de Seguridad está considerando una resolución para imponer un embargo de armas contra [?global.current_sc_vote_nation.GetName]. Si se aprueba, [?global.current_sc_vote_nation.GetName] no podrá comprar armas en el mercado internacional hasta que finalicen todos sus conflictos ofensivos actuales.\n\n$unsc_vote_pass_tt$"
 UNSC.4.a: "Sí"
 UNSC.4.b: "No"
 UNSC.4.c: "Abstenerse"
 UN.6.t: "Confirmado el asiento del Consejo de Seguridad de la ONU para [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.6.d: "La Asamblea General de las Naciones Unidas está votando para confirmar a los próximos miembros del Consejo de Seguridad. Todos los países nominados deben ser confirmados por la Asamblea General y cumplirán un mandato de dos años, a partir del 1 de enero de cada año [?global.next_year]\n\n$un_ga_vote_requires_2_3_tt$"
 UN.6.a: "Votar Sí"
 UN.6.b: "Vota No"
 UN.6.c: "Abstenerse"
 UN.7.t: "Establecer Sanciones No Vinculantes contra [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.7.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha llevado a cabo un ataque militar contra una nación extranjera. En respuesta, han solicitado que las §BNaciones Unidas§! sancionen a [?global.current_ga_vote_nation.GetNameWithFlag] durante el próximo año como castigo por esta acción. Si votamos afirmativamente, aceptaremos imponer sanciones contra [?global.current_ga_vote_nation.GetNameWithFlag].\n\n$un_ga_vote_auto_pass_tt$"
 UN.7.a: "Votar Sí"
 UN.7.b: "Vota No"
 UN.7.c: "Abstenerse"
 UN.8.t: "Reducir el Presupuesto General de Operaciones de las Naciones Unidas"
 UN.8.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha presentado una propuesta para reducir el Presupuesto General de Operaciones para el próximo año. La reducción sería del 0,01 % del PIB. La tasa de contribución actual es del [?global.general_operating_budget_contribute_percent|%]. La reducción se implementaría al inicio del próximo año fiscal de la ONU y afectaría a todos los programas de ayuda de la ONU.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.8.a: "Votar Sí"
 UN.8.b: "Vota No"
 UN.8.c: "Abstenerse"
 UN.9.t: "Aumentar el Presupuesto General de Operaciones de las Naciones Unidas"
 UN.9.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha presentado una propuesta para aumentar el Presupuesto General de Operaciones para el próximo año. El aumento sería del 0,01 % del PIB. La tasa de contribución actual es del [?global.general_operating_budget_contribute_percent|%]. El aumento se implementaría al inicio del próximo año fiscal de la ONU y afectaría a todos los programas de ayuda de la ONU.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.9.a: "Votar Sí"
 UN.9.b: "Vota No"
 UN.9.c: "Abstenerse"
 UN.10.t: "Resolución: Reducción de la Pobreza"
 UN.10.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los Estados miembros a adoptar medidas para reducir la pobreza. Las naciones que voten a favor se comprometerán a implementar políticas que mejoren la estabilidad a costa de un mayor gasto en bienes de consumo.\n\n$un_ga_vote_requires_majority$"
 UN.10.a: "Votar Sí"
 UN.10.b: "Vota No"
 UN.10.c: "Abstenerse"
 UN.11.t: "Resolución: Seguridad Alimentaria"
 UN.11.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los Estados miembros a priorizar la seguridad alimentaria y el desarrollo agrícola. Las naciones que voten a favor se comprometerán a impulsar la producción agrícola a costa de una reducción de la capacidad industrial.\n\n$un_ga_vote_requires_majority$"
 UN.11.a: "Votar Sí"
 UN.11.b: "Vota No"
 UN.11.c: "Abstenerse"
 UN.12.t: "Resolución: Iniciativa de Salud Mundial"
 UN.12.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a invertir en iniciativas de salud global. Los países que voten a favor se beneficiarán de una reducción en los costos de la atención médica a costa de un mayor gasto en bienes de consumo.\n\n$un_ga_vote_requires_majority$"
 UN.12.a: "Votar Sí"
 UN.12.b: "Vota No"
 UN.12.c: "Abstenerse"
 UN.13.t: "Resolución: Iniciativa de Educación"
 UN.13.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a aumentar la inversión en educación. Las naciones que voten a favor se beneficiarán de una investigación más rápida y una reducción de los costos educativos, pero a costa de una construcción más lenta.\n\n$un_ga_vote_requires_majority$"
 UN.13.a: "Votar Sí"
 UN.13.b: "Vota No"
 UN.13.c: "Abstenerse"
 UN.14.t: "Resolución: Transición hacia la Energía Limpia"
 UN.14.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a acelerar la transición a la energía limpia. Los países que voten a favor recibirán incentivos para la construcción de energías renovables, pero se enfrentarán a sanciones en la infraestructura de combustibles fósiles y la producción industrial.\n\n$un_ga_vote_requires_majority$"
 UN.14.a: "Votar Sí"
 UN.14.b: "Vota No"
 UN.14.c: "Abstenerse"
 UN.15.t: "Resolución: Crecimiento Económico"
 UN.15.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a adoptar políticas que fomenten el crecimiento económico. Las naciones que voten a favor se beneficiarán de un aumento de la productividad y la producción industrial, pero a costa de una reducción del poder político y un mayor gasto en bienes de consumo.\n\n$un_ga_vote_requires_majority$"
 UN.15.a: "Votar Sí"
 UN.15.b: "Vota No"
 UN.15.c: "Abstenerse"
 UN.16.t: "Resolución: Desarrollo de Infraestructura"
 UN.16.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a invertir en el desarrollo de infraestructura. Las naciones que voten a favor se beneficiarán de una construcción más rápida de infraestructura y fábricas civiles, pero a costa de una construcción más lenta de fábricas de armas y un mayor gasto en bienes de consumo.\n\n$un_ga_vote_requires_majority$"
 UN.16.a: "Votar Sí"
 UN.16.b: "Vota No"
 UN.16.c: "Abstenerse"
 UN.17.t: "Resolución: Reducción de la Desigualdad"
 UN.17.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los Estados miembros a adoptar medidas para reducir la desigualdad. Las naciones que voten a favor se beneficiarán de una mayor estabilidad, pero a costa de una reducción del poder político y un mayor gasto en bienes de consumo.\n\n$un_ga_vote_requires_majority$"
 UN.17.a: "Votar Sí"
 UN.17.b: "Vota No"
 UN.17.c: "Abstenerse"
 UN.18.t: "Resolución: Acción Climática"
 UN.18.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a tomar medidas enérgicas contra el cambio climático. Las naciones que voten a favor recibirán incentivos para las energías renovables, pero se enfrentarán a importantes penalizaciones para las plantas de combustibles fósiles y la producción industrial.\n\n$un_ga_vote_requires_majority$"
 UN.18.a: "Votar Sí"
 UN.18.b: "Vota No"
 UN.18.c: "Abstenerse"
 UN.19.t: "Resolución: Paz e Instituciones"
 UN.19.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los Estados miembros a fortalecer las instituciones y la gobernanza pacíficas. Las naciones que voten a favor se beneficiarán de un mayor poder político y de una mayor defensa contra la deriva, pero a costa de una menor construcción de fábricas de armas y un mayor gasto en bienes de consumo.\n\n$un_ga_vote_requires_majority$"
 UN.19.a: "Votar Sí"
 UN.19.b: "Vota No"
 UN.19.c: "Abstenerse"
 UN.20.t: "Resolución: Asociaciones Comerciales"
 UN.20.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los Estados miembros a fortalecer las alianzas comerciales internacionales. Las naciones que voten a favor se beneficiarán de mejores relaciones comerciales, pero a costa de una reducción de poder político.\n\n$un_ga_vote_requires_majority$"
 UN.20.a: "Votar Sí"
 UN.20.b: "Vota No"
 UN.20.c: "Abstenerse"
 UN.21.t: "Resolución: Desarrollo Digital"
 UN.21.d: "[?global.current_ga_vote_nation.GetNameWithFlag] ha propuesto una resolución no vinculante que insta a todos los estados miembros a invertir en infraestructura y desarrollo digital. Las naciones que voten a favor se beneficiarán de un internet más rápido, microchips y desarrollo de investigación, pero a costa de un mayor gasto en bienes de consumo y una construcción de infraestructura más lenta.\n\n$un_ga_vote_requires_majority$"
 UN.21.a: "Votar Sí"
 UN.21.b: "Vota No"
 UN.21.c: "Abstenerse"
