 SAO_AI_BEHAVIOR: "@SAO 상투메 프린시페 민주 공화국"
 RULE_OPTION_SAO_DYNAMIC: "유동적 행동"
 RULE_OPTION_SAO_DYNAMIC_AI_DESC: "@SAO 상투메 프린시페는 외교적 영향력, 국내 상황, 그리고 게임이 역사적 모드로 설정되어 있는지 여부에 따라 결정을 내립니다."
 RULE_OPTION_MENEZES_WINS_FOILED_COUP: "프라디크 드 메네제스 - 쿠데타 저지"
 RULE_OPTION_MENEZES_WINS_FOILED_COUP_AI_DESC: "2001년, @SAO 상투메 프린시페는 프라디크 드 메네제스를 대통령으로 선출하고 2003년의 쿠데타 시도를 이겨냅니다"
 RULE_OPTION_MENEZES_WINS_COUP: "프라디크 드 메네제스 - 무혈 쿠데타"
 RULE_OPTION_MENEZES_WINS_COUP_AI_DESC: "프라디크 드 메네제스가 대통령으로 선출되지만, 이후 페르난두 페레이라 소령이 무혈 쿠데타로 \n@SAO 상투메 프린시페의 전권을 장악합니다."
 RULE_OPTION_SAO_MENEZES_WINS_NO_ATTEMPTED_COUP: "프라디크 드 메네제스 - 교착 상태 회피"
 RULE_OPTION_SAO_MENEZES_WINS_NO_ATTEMPTED_COUP_AI_DESC: "프라디크 드 메네제스가 \n@SAO 상투메 프린시페의 대통령으로 선출되며 민정 통치가 도전을 받지 않고 유지됩니다."
 RULE_OPTION_SAO_COSTA_WINS: "마누엘 핀투 다 코스타"
 RULE_OPTION_SAO_COSTA_WINS_AI_DESC: "마누엘 핀투 다 코스타가 2001년 @SAO 상투메 프린시페 대통령 선거에서 승리합니다."
