 belarus_export.15.a: "令人遗憾"
 belarus_export.16.t: "白俄罗斯反坦克导弹"
 belarus_export.16.d: "白俄罗斯制造商希望向我们提供他们的反坦克导弹以便交货。我们同意接受这份合同吗？"
 belarus_export.16.a: "当然，一笔很好的交易。"
 belarus_export.16.b: "不，我们拒绝他们的交易。"
