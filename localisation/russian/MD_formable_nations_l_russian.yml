 form_HBL_category: "Бенилюкс"
 form_HBL_category_desc: "Бенилюкс — это политико-экономический союз, в который входят Нидерланды, Бельгия и Люксембург. Исторически сложилось так, что три страны-члена имеют дружеские и сердечные отношения друг с другом. Нынешняя организация — это просто союз государств по политическим и экономическим вопросам на мировой арене. Ведутся тихие разговоры о возможном оформлении этого союза государств во что-то более конкретное. Новая нация, которая будет представлять народы Низин, принесет новое будущее для людей и направит их к этому светлому будущему."
 HBL_integrate_start: "Begin forming [GetHBLNameDef]"
 HBL_integrate_start_desc: "It is time to begin forming the Benelux.\n\n"
 HBL_integrate_BEL: "Integrate [GetHBLNameAdj] [BEL.GetAdjective] Territories"
 HBL_integrate_BEL_desc: "Бельгия не самая большая и не самая маленькая из стран Бенилюкса. Она удобно расположилась в центре, подобно своему положению между двумя другими государствами-членами. В Брюсселе находится несколько центров бюрократии Европейского Союза, и это горячее туристическое направление для голландцев, французов и туристов из стран, не входящих в ЕС."
 HBL_integrate_HOL: "Integrate [GetHBLNameAdj] [HOL.GetAdjective] Territories"
 HBL_integrate_HOL_desc: "Нидерланды - крупнейшее из трех государств-членов Бенилюкса. На ее долю приходится большая часть населения, земельной площади и экономического размера, а также несколько заморских владений. Интеграция Нидерландов приведет к присоединению большинства стран Бенилюкса к новому государству и значительно укрепит легитимность нашего нового союза."
 HBL_integrate_LUX: "Integrate [GetHBLNameAdj] [LUX.GetAdjective] Territories"
 HBL_integrate_LUX_desc: "Люксембург - самое маленькое из трех государств. Он имеет самый большой ВВП на душу населения и несколько небольших туристических центров. В стране говорят на множестве языков, наиболее известными из которых являются французский, немецкий и английский. Интеграция Люксембурга не является большой задачей, учитывая размеры государства, но она будет сопряжена с некоторыми бюрократическими трудностями."
 HBL_update_flag: "Finish Forming [GetHBLNameDef]"
 HBL_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetHBLNameDef], adopting its unified flag and name."
 is_HBL: "Has formed [GetHBLNameDef]"
 form_USNA_category: "Объединение Северной Америки"
 form_USNA_category_desc: "Североамериканский континент исторически не поддавался иностранному влиянию с тех пор, как Мексика, Соединенные Штаты и Канада были основаны как национальные государства. Они составляют основу мировой экономики с общим ВВП в одиннадцать триллионов в начале нового тысячелетия. Объединение наций и нацеленность на великое завтра позволит нам идти вперед в будущее."
 USNA_integrate_start: "Begin forming [GetUSNANameDef]"
 USNA_integrate_start_desc: "It is time to begin forming the North American Federation.\n\n"
 USNA_integrate_CAN: "Integrate [GetUSNANameAdj] [CAN.GetAdjective] Territories"
 USNA_integrate_CAN_desc: "Канада является крупнейшим по площади государством в новом союзе и имеет множество неиспользованных запасов нефти. Только эти два факта делают Канаду неотъемлемой частью нового Североамериканского союза. Надеюсь, что апологетика будет сведена к минимуму по мере дальнейшей интеграции в новую нацию."
 USNA_integrate_USA: "Integrate [GetUSNANameAdj] [USA.GetAdjective] Territories"
 USNA_integrate_USA_desc: "Соединенные Штаты составляют большую часть Союза североамериканских штатов. У них самая большая экономика, вторая по величине площадь суши, армия и многое другое. Интеграция Соединенных Штатов влечет за собой множество проблем из-за их огромного размера и веса на мировой арене; однако эта интеграция экономически сделает нас крупнейшей сверхдержавой в мире."
 USNA_integrate_MEX: "Integrate [GetUSNANameAdj] [MEX.GetAdjective] Territories"
 USNA_integrate_MEX_desc: "Мексика - вторая по численности населения страна из трех государств, образующих новое государство. Она располагает многочисленными вооруженными силами. У страны есть несколько проблем, таких как плотность картелей. Тем не менее, интеграция Мексики будет одним из основных направлений деятельности нового государства."
 USNA_update_flag: "Finish Forming [GetUSNANameDef]"
 USNA_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetUSNANameDef], adopting its unified flag and name."
 is_USNA: "Has formed [GetUSNANameDef]"
 form_UTS_category: "Объединенные тюркских территорий"
 form_UTS_category_desc: "Объединенные тюркские территории - это союз тюркоязычных народов, включающий Турцию, Узбекистан, Кыргызстан, Казахстан и Таджикистан. Другие группы тюркоязычных народов за пределами этих стран, такие как татары и уйгуры, существуют в России и Китае. Они являются целью нашего союза, но не первоначальной. Мы объединим национальные государства, которые существуют в настоящее время, и позовем наших людей домой или вернем их обратно."
