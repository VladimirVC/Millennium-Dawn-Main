l_korean:
 STAT_NAVY_SUB_VISIBILITY: "£sub_visibility_texticon  잠수함 피탐지율: "
 STAT_NAVY_SUB_VISIBILITY_DESC: "잠수함을 얼마나 쉽게 탐지할 수 있는지를 나타냅니다."
 STAT_NAVY_SHORE_BOMBARDMENT: "상륙 작전 능력: "
 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "함선이 대기 임무 중일 때, 인근 해안에서 상륙하는 부대의 상륙 작전 및 전투를 지원하는 능력입니다."
 STAT_NAVY_MISSION_COVERAGE: "적 탐지 효율: "
 STAT_NAVY_MISSION_COVERAGE_DESC: "§T함선이 적을 얼마나 효율적으로 탐지하는지 나타냅니다. 각 함선은 자체 탐지 효율을 더합니다.§!"
 STAT_NAVY_FIRE_RANGE_DESC: "함선 주미사일의 사거리입니다."
 STAT_NAVY_EVASION: "근접 방어 무기: "
 STAT_NAVY_EVASION_DESC: "플레어, 근접무기시스템 (CIWS) 및 기타 대응책을 통해 적의 피격을 회피하는 능력입니다. 소형 함선일수록 본질적으로 피격 회피 확률이 높습니다."
 STAT_NAVY_SUB_ATTACK: "£depth_charge_texticon  대잠 공격: "
 STAT_NAVY_SUB_ATTACK_DESC: "적 잠수함에 가할 수 있는 피해량입니다."
 STAT_NAVY_ATTACK: "£attack_texticon  미사일 공격: "
 STAT_NAVY_ATTACK_DESC: "보유한 대함 미사일의 수량과 위력을 나타냅니다."
 STAT_NAVY_ANTI_AIR_ATTACK_DESC: "적 항공기를 요격하기 위해 보유한 대공 미사일의 수량과 위력을 나타냅니다."
 STAT_NAVY_ANTI_AIR_TARGETTING_DESC: "함선의 레이더가 적 항공기를 얼마나 잘 추적하고 조준할 수 있는지를 나타냅니다."
 STAT_AIR_RANGE: "£air_range_texticon  항속 거리: "
 STAT_NAVY_RAIDING_COORDINATION:1 "£coordination_texticon  통상파괴 조직: "
 STAT_NAVY_PATROL_COORDINATION:1 "£coordination_texticon  순찰 조직: "
 STAT_NAVY_TORPEDO_ATTACK: "£torpedo_texticon  어뢰 화력: "
 STAT_NAVY_TORPEDO_ATTACK_DESC: "함선의 어뢰를 사용할 때 가할 수 있는 피해량입니다."
 STAT_NAVY_HG_ATTACK:1 "£rocket_modifiericons_texticon  대함 미사일 공격: "
 STAT_NAVY_HG_ATTACK_DESC: "대함 미사일이 적 함선에 가할 수 있는 피해량과 공격 수치입니다."
 STAT_NAVY_HG_ARMOR_PIERCING:1 "£rocket_modifiericons_texticon  대함 미사일 관통: "
 STAT_NAVY_HG_ARMOR_PIERCING_DESC: "이 능력치는 대함 미사일 공격이 적의 점방어 체계와 장갑을 얼마나 잘 관통할 수 있는지를 나타냅니다."
 STAT_NAVY_LG_ATTACK:1 "£naval_battery2_texticon  함포 공격: "
 STAT_NAVY_LG_ATTACK_DESC: "기관포, 기관총을 포함한 함선의 부포에 의한 피해량입니다. 또한 해안 폭격에도 동일하게 적용됩니다."
 STAT_NAVY_LG_ARMOR_PIERCING:1 "£piercing_texticon  함포 관통: "
 STAT_NAVY_LG_ARMOR_PIERCING_DESC: "소형 함포의 장갑 관통입니다. 관통 수치가 높을수록 치명타 확률이 증가하며, 관통 수치가 적의 장갑보다 낮으면 피해량이 심각하게 감소합니다."
 STAT_NAVY_SURFACE_VISIBILITY: "£surface_visibility_texticon  수상 피탐지율: "
 STAT_NAVY_SURFACE_VISIBILITY_DESC: "이 함선을 찾아내고 명중시키기가 얼마나 어려운지를 나타냅니다. 수치가 작을수록 발견하기 어려워질 뿐만 아니라 생존성도 향상됩니다."
 STAT_AIR_AGILITY: "£speed_intercept_texticon  레이더 혜택: "
 STAT_AIR_AGILITY_DESC: "항공기의 스텔스 특성, 항공 공학, 무기 체계, 그리고 파일럿 훈련도가 가시거리 밖 공중전 (BVR, Beyond Visual Range)과 근접항공전 (WVR, Within Visual Range)에 가져다주는 혜택을 나타냅니다."
 STAT_AIR_DEFENCE: "£defence_air_texticon  대공 방어: "
 STAT_AIR_DEFENCE_DESC: "항공기가 유인 및 공역을 벗어나는 기동을 하거나 다가오는 화기의 위협을 하드킬로 정리할 수 있는 능력을 나타냅니다."
 STAT_COMMON_ARMOR: "£armor_texticon  장갑/근접방어무기체계(CIWS): "
 STAT_NAVY_WEATHER_PENALTY: "£weather_texticon  날씨 패널티: "
 CARRIER_SORTIE_EFFICIENCY_FACTOR: "£sortie_efficiency_texticon  출격 효율"
 MODIFIER_SHORE_BOMBARDMENT_COLLATERAL_DAMAGE_FACTOR: "£naval_battery_texticon  함포 사격 부수적 피해"
 shore_bombardment_collateral_damage_factor: "£naval_battery_texticon  함포 사격 부수적 피해"
 MODIFIER_ARMY_RETREAT_SPEED_FACTOR: "£retreat_texticon  퇴각하는 사단 속도"