 mission_will_give_tt: "이 임무를 완료하면 다음 보상을 얻습니다:"
 mission_will_give_every_30_days_tt: "이 임무를 완료하면 30일마다 다음 보상을 얻습니다:"
 BUL_tourism_development_category: "관광업 개발"
 BUL_tourism_development_category_desc: "불가리아의 주요 관광지를 개발하여 관광 수익을 늘립니다."
 BUL_develop_sunny_beach: "써니 비치 리조트 개발"
 BUL_develop_sunny_beach_desc: "써니 비치는 흑해 연안에 위치한 불가리아 최대의 해변 리조트입니다. 이곳을 개발하면 러시아, 우크라이나, 루마니아, 영국, 독일, 튀르키예로부터 관광객을 유치하여 막대한 수익을 창출할 수 있습니다."
 BUL_develop_borovets: "보로베츠 스키 리조트 개발"
 BUL_develop_borovets_desc: "보로베츠는 소피아 남쪽 릴라 산맥에 위치한 불가리아 최고의 스키 리조트 중 하나입니다. 투자를 통해 이곳을 유럽에서 가장 가성비 좋은 스키 명소 중 하나로 만들 것입니다."
 BUL_develop_varna_beaches: "바르나 해변 리조트 개발"
 BUL_develop_varna_beaches_desc: "바르나 지역에는 골든 샌즈 및 성 콘스탄틴 & 헬레나와 같은 유명한 해변 리조트가 포함되어 있습니다. 개발을 통해 러시아, 영국, 우크라이나, 루마니아로부터 관광객을 유치할 수 있습니다."
 AB_promises_of_peace: "평화의 약속"
 AB_promises_of_peace_desc: "전쟁이 국민들에게 큰 희생을 강요하고 있습니다. 우리는 평화의 가능성을 논의하는 캠페인을 시작해야 합니다."
 LAT_reopen_the_vef_microchip_plant: "VEF 반도체 공장 재개장"
 LAT_reopen_the_vef_microchip_plant_desc: "최근 리가에 위치한 VEF 반도체 제조 공장에 어려움이 닥쳤습니다. 이 회사는 1999년에 문을 닫았지만, 정부의 합작 투자 아래 공장에 투자하고 재활성화할 가치가 충분히 있을 수 있습니다."
 cheat_decisions_allow_internal_faction_change: "내부 파벌 변경 허용"
 cheat_decisions_allow_internal_faction_change_desc: "정치력 요구 조건을 무의미한 수준으로 낮추어 국가의 내부 파벌 변경을 허용합니다."
 MD_protests_forming: "전국적 시위"
 MD_protests_forming_desc: "전국적으로 불만이 고조되고 있습니다. §Y시위 강도§!가 임계 수준에 도달하면 §Y경고§! 임무가 시작되며, 이를 통제하지 못할 경우 공개적인 §R반란§!으로 이어집니다. 상단의 패널을 사용하여 월간 변동 분석을 확인한 뒤, 사용 가능한 결정을 실행하여 긴장을 완화하십시오.\n\n반란이 일어나면 핵심 주들에 저항군 거점이 나타납니다. 이 임무는 §Y모든 핵심 주에 저항군이 없을 때§!에만 종료됩니다. £compliance_gain_texticon 순응도를 높이고 £political_violence_gain_texticon 저항도를 낮추면 이 과정을 가속할 수 있습니다."
 MD_incoming_protest_movement: "다가오는 시위 운동"
 MD_incoming_revolt: "다가오는 반란"
 MD_appease_protesters: "시위대 달래기"
 MD_appease_protesters_desc: "군중의 흥분을 가라앉히기 위한 소규모 양보입니다. 사태가 정점에 달하기 전에 시간을 벌어줄 뿐, 그 이상도 이하도 아닙니다."
 MD_hearts_and_minds_campaign: "민심 사로잡기 캠페인"
 MD_hearts_and_minds_campaign_desc: "정부가 국민의 생명줄이라는 점을 부각합니다. 우호적인 언론 보도와 소통을 통해 시위대 일부를 거리에서 유도하여 집으로 돌려보냅니다."
 MD_extended_crackdown: "은밀한 단속"
 MD_extended_crackdown_desc: "총을 쏘며 거리로 행진하는 대신, 시위 주동자들을 조용히 체포하고 제압합니다. 운동은 조직자들을 잃고 시간이 지남에 따라 와해됩니다."
 MD_activate_riot_police: "폭동 진압 경찰 부대 활성화"
 MD_activate_riot_police_desc: "군중과 직접 맞서기 위해 전문 폭동 진압 경찰을 소집합니다. 주둔군은 온전히 유지되지만, 현장에서 진압 경찰을 유지하는 비용은 비쌉니다."
 MD_deactivate_riot_police: "폭동 진압 경찰 부대 비활성화"
 MD_deactivate_riot_police_desc: "폭동 진압 경찰이 더 이상 필요하지 않습니다. 임무를 해제하고 본부로 복귀시킵니다."
 HOL_army_cp_pp50_cost: "£army_experience §H20§!   £command_power §H20§!   £political_power §H50§!"
 HOL_army_cp_pp50_cost_blocked: "£army_experience §R20§!   £command_power §R20§!   £political_power §R50§!"
 HOL_army_cp_pp50_cost_tooltip: "이 결정을 내리려면 £army_experience 20, £command_power 20, £political_power 50이 필요합니다"
