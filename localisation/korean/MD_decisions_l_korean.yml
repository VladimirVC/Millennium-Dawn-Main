 promote_reduced_spending_campaigns: "정부 지출 삭감 캠페인"
 promote_reduced_spending_campaigns_desc: "정부는 절박하게 비용 절감 조치가 필요하지만, 국민들은 정부가 거둬들인 세금을 어디에 써야 하는지에 대해 전혀 다른 견해를 가지고 있습니다. 잘 짜여진 선전 캠페인을 통해 국민들을 올바른 방향으로 유도할 수 있습니다."
 bohgana_decision: "2C-22 보그다나 설계 생성"
 NATO_ukraine_help: "우크라이나 장비 지원"
 NATO_ukraine_help_desc: "러시아-우크라이나 전쟁 시작 이후, 우크라이나는 장비를 요청하고 있습니다. 일반적인 메커니즘을 벗어나는 수준은 아니지만, 특별 NATO 채널을 통해 우크라이나에 장비와 지원을 전달할 수 있습니다."
