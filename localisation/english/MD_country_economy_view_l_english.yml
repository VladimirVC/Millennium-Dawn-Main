 increases_population_tax_delayed_tooltip: "£click_left §YL Click§! to increase §YPopulation Tax Rate§! by 1%.\n£key_shift + £click_left §YShift L Click§! to increase §YPopulation Tax Rate§! by 5% (£pol_power_icon [?tax_rate_change_5])\n"
 decreases_population_tax_tooltip: "This button decreases the §YPopulation Tax Rate§! in our nation.\n\n§YPrerequisites:§!\n[tax_button_req]\n\n[allowed_to_adjust_personal_tax_laws]"
 decreases_population_tax_delayed_tooltip: "£click_left §YL Click§! to decrease §YPopulation Tax Rate§! by 1%.\n£key_shift + £click_left §YShift L Click§! to decrease §YPopulation Tax Rate§! by 5% (£pol_power_icon [?tax_rate_change_5])\n"
 increases_corporate_tax_tooltip: "This button increases the §YCorporate Tax Rate§! in our nation.\n\n§YPrerequisites:§!\n[tax_button_req]\n\n[allowed_to_adjust_corporate_tax_laws]"
 increases_corporate_tax_delayed_tooltip: "£click_left §YL Click§! to increase §YCorporate Tax Rate§! by 1%.\n£key_shift + £click_left §YShift L Click§! to increase §YCorporate Tax Rate§! by 5% (£pol_power_icon [?tax_rate_change_5])\n"
 decreases_corporate_tax_tooltip: "This button decreases the §YCorporate Tax Rate§! in our nation.\n\n§YPrerequisites:§!\n[tax_button_req]\n\n[allowed_to_adjust_corporate_tax_laws]"
 decreases_corporate_tax_delayed_tooltip: "£click_left §YL Click§! to decrease §YCorporate Tax Rate§! by 1%.\n£key_shift + £click_left §YShift L Click§! to decrease §YCorporate Tax Rate§! by 5% (£pol_power_icon [?tax_rate_change_5])\n"
 increases_cb_rate_tooltip: "Raise the §YPolicy Rate§! by 1pp, tightening monetary conditions.\n\n§YEffects:§!\nQuarterly inflation suppressed by an additional §G0.3%§! per quarter\nSovereign debt interest rate increased by §R0.5pp§!\n\n§YPrerequisites:§!\n£pol_power_icon §Y25§! Political Power\nPolicy Rate below 20%\nNo rate change in the last 60 days"
 decreases_cb_rate_tooltip: "Lower the §YPolicy Rate§! by 1pp, easing monetary conditions.\n\n§YEffects:§!\nQuarterly inflation suppressed by §R0.3%§! less per quarter\nSovereign debt interest rate reduced by §G0.5pp§!\n\n§YPrerequisites:§!\n£pol_power_icon §Y25§! Political Power\nPolicy Rate above 0%\nNo rate change in the last 60 days"
