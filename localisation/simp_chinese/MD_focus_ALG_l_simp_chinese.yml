 ALG_civil_war_brewing: "内战酝酿中"
 ALG_deep_state_oversight_desc: "军方对政府决策保持着重大监督权。重大政策举措在实施前必须获得将军们的批准。\n\n§Y深层政府第三阶段已激活§!"
 ALG_deep_state_control_desc: "权力集团——这个深层国家——实际上在幕后掌控着阿尔及利亚政府。文职政客不过是傀儡。\n\n§R深层国家第四阶段激活——危急！§!\n§Y政变风险大幅增加！§!"
 ALG_surveillance_state_1_desc: "情报机构在几乎没有监管的情况下监控平民活动。隐私已成为少数人才能享有的奢侈品。\n\n§R这极大地增强了深层政府的力量。§!"
 ALG_military_junta_1_desc: "军方已直接掌控阿尔及利亚政权。一个将军委员会现在统治着这个国家。\n\n§R发生军事政变！§!\n\n民主治理已告终结。深层政府正公开掌权。"
 ALG_state_of_emergency_desc: "为应对深层政府日益增长的影响力，已启动紧急权力。公民自由暂时中止。\n\n§G此状态生效期间，深层政府增长将被冻结。§!\n§R此状态无法无限期维持。§!"
 ALG_post_coup_recovery_desc: "阿尔及利亚正从一场失败的军事政变中恢复。政府机构受损，民众对政府的信任度很低。\n\n§Y国家必须重建。§!"
 ALG_promised_elections_desc: "军政府已承诺举行选举并恢复文官统治。国际社会正密切关注。\n\n§Y选举必须在此期限前举行。§!"
 ALG_hybrid_military_governance_desc: "阿尔及利亚实行混合政治体制，军方保持重要政治影响力，同时文官体系依然存在。"
 ALG_civil_war_brewing_desc: "军事政变抵抗失败，导致阿尔及利亚社会内部出现严重分裂。内战可能一触即发。\n\n§R局势危急！§!"
 ALG_deep_state_oversight_added_tt: "§Y军事监督机制已建立§!\n军方现已正式获得政府决策的监督权。\n\n§R深层政府影响力处于高位。§!"
 ALG_deep_state_control_added_tt: "§R深层政府控制已建立§!\n权力集团如今在幕后掌控着阿尔及利亚。\n\n§R政变风险已达临界点！§!"
 ALG_surveillance_state_added_tt: "§R监控国家已建立§!\n情报机构现已对民众活动进行全面监控。"
 ALG_military_junta_added_tt: "§R£generic_warning 军事政变发生！§!\n将军们夺取了政权。阿尔及利亚正处于军事统治之下。"
 ALG_state_of_emergency_added_tt: "§Y紧急状态已宣布§!\n紧急权力现已生效。\n§G深层政府增长将冻结180天。§!"
 ALG_state_of_emergency_removed_tt: "§Y紧急状态已结束。§!\n§R深层政府可以再次发展。§!"
 ALG_post_coup_recovery_added_tt: "§Y政变后恢复时期§!\n阿尔及利亚正在从失败的政变尝试中重建。"
 ALG_promised_elections_added_tt: "§Y选举已承诺举行。§!\n军方有两年时间履行这一承诺。"
 ALG_civil_war_brewing_added_tt: "§R£generic_warning 内战风险！§!\n抵抗政变失败已使阿尔及利亚局势动荡。"
