 KOR_combined_aerospace_renaissance: "Combined Aerospace Renaissance"
 KOR_combined_aerospace_renaissance_desc: "Northern engine know-how and Southern stealth and avionics expertise are pooled into a single aerospace effort. Pilots train in joint exercises and engineers share blueprints openly across the former DMZ."
 NKO_research_slots_recalculated_tt: "§YResearch slots are recalculated to match the unified economy§!"
 NKO_inherit_kor_special_projects_tt: "§YInherit every Special Project the South has completed§!"
 campaign_for_UNSC_seat_USA_desc: "The United States has held a permanent seat on the UN Security Council since the body's founding in 1945. Washington's veto is indispensable to any bid for permanent membership. Our diplomats must persuade the Americans that a unified, democratic Korea on the Council serves their strategic interests in East Asia."
 campaign_for_UNSC_seat_FRA_desc: "France has held a permanent Security Council seat since 1945 and regularly uses its position to champion multilateralism and international law. By appealing to Paris's long-standing interest in a rules-based order and the weight of Korean historical grievances, we can secure its endorsement for our bid."
 campaign_for_UNSC_seat_ENG_desc: "The United Kingdom is one of the five permanent members of the UN Security Council. London's backing carries particular weight given Britain's role in the post-war international order. A coordinated diplomatic effort, backed by strong bilateral relations, is needed to win its support for our permanent membership bid."
 campaign_for_UNSC_seat_SOV_desc: "Russia holds one of five permanent seats on the UN Security Council, inherited from the Soviet Union, and can veto any candidate it opposes. Winning Moscow's support requires deft diplomacy: we must reassure Russia that a stronger Korean voice on the Council does not threaten its regional interests."
 campaign_for_UNSC_seat_CHI_desc: "China has held a permanent Security Council seat since 1971, when the People's Republic replaced the Republic of China. Beijing's veto is the most difficult to secure: China has historically resisted any expansion of permanent membership that might dilute its influence. A substantial improvement in bilateral ties is a prerequisite for Chinese endorsement."
 become_a_UNSC_state_desc: "With all five permanent members on record as supporting our candidacy, we can formally submit Korea's application for a permanent seat. Admission would make Korea the sixth veto-holding power, granting us the authority to shape international security decisions and cementing our status as a global power. It would also raise our domestic political standing significantly."
 KOR_core_inherited_territory_desc: "With Songjiang, Liaoning, Jilin, and Primorye now under our control, we can begin the long process of integrating these territories into the Korean state. Establishing administrative cores will entrench our legal claim to lands once populated by Koreans during the Balhae era and, later, by the Joseon diaspora under the Gando Convention."