 NKO.Communist-State: "£NKO_communism 朝鮮労働党"
 NKO.Communist-State_desc: "主体思想 - 朝鮮労働党\n\n朝鮮労働党は朝鮮民主主義人民共和国における唯一の与党であり、自国内ではしばしば「労働党」と呼称されている。\n一部の学者からは極右政党と見なされているが、朝鮮労働党は元来より主体思想に忠実であり、朝鮮労働党自身が国際的な左翼・社会主義運動の一翼を担っていると考えている。"
 NKO.anarchist_communism: "£NKO_anarchist_communism 朝鮮社会民主党"
 NKO.anarchist_communism_desc: "左派社会民主主義 - 朝鮮社会民主党\n\n朝鮮社会民主党は北朝鮮におけるいくつかの公認政党のうちの一つである。1945年11月3日に企業家、小売商、手工業者、小ブルジョア、農民、キリスト教徒らの混合的集団によって朝鮮民主党として結成された。"
 NKO.Nat_Autocracy: "£NKO_military_junta (KPA) 朝鮮人民軍"
 NKO.Nat_Autocracy_desc: "赤色軍事政権 - 1948年に現在の体制を確立した朝鮮人民軍は、朝鮮半島内で活動していた抗日ゲリラ組織から生まれた。ソ連による北朝鮮占領に伴い、共産主義勢力は、すでに名目上は「朝鮮人民共和国」となっていた地域で権力を掌握し、すべての武装組織を単一の統一組織へと統合することで、朝鮮人民軍が誕生した。朝鮮戦争以前、同軍は主に南側との国境紛争に関与していたが、朝鮮戦争そのものが、その歴史の大部分において軍が直接関与した最初にして唯一の主要な紛争となった。朝鮮戦争後期に行われた粛清とイデオロギー教育により、チュチェ思想という国家主義的理想に献身する忠実な軍隊が確保され、軍は高度に軍事化され孤立主義を掲げる朝鮮民主主義人民共和国の主要な実行機関として機能している。"
