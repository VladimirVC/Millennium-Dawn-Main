 UKR_air_dominance_tactics_desc: "我们需要压制波兰空军，所以我们将采用新的理论。"
 UKR_tro_expandeds: "巩固国土防御"
 UKR_tro_expandeds_desc: "紧急扩大国土防御招募，急需战士！"
 UKR_start_war_against_russia: "俄罗斯-乌克兰战争"
 UKR_start_war_against_russia_desc: "我们国家的决定性时刻已经到来。我们将击退敌人，否则我们将从世界历史上消失。"
