 JAP_mitsubishi_ship_mio_trait_inmanned_systems: "Пусковой отсек беспилотных систем"
 JAP_mitsubishi_ship_mio_trait_swordfish_antiradar: "Радар против дронов Swordfish с рельсовым наведением"
 JAP_mitsubishi_ship_mio_trait_automated_shot: "Автоматизированная система коррекции выстрела"
 JAP_mitsubishi_ship_mio_trait_lithium_integration: "Интеграция литий-ионных элементов питания"
 JAP_mitsubishi_ship_mio_trait_silent_drive: "Бесшумное демпфирование корпуса привода"
 JAP_mitsubishi_ship_mio_trait_snorkel_fuel: "Система топливной экономичности Шноркеля"
