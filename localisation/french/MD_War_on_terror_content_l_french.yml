l_french:
 TT_OEF_INCREASED_CHANCE_OF_DETECTING_TERRORISTS: "§GGain §Y15§! intelligence on §YAl-Qaeda§!, and raise the chance of disrupting a major plot from §Y5%§! to §Y15%§!. The better our intelligence on them grows, the better those odds get.§!\n"
 TT_OEF_RAISE_POPULARITIES: "Accroître la popularité de la §Hcoalition au pouvoir§! par 10% et la popularité du principal §Hparti d'opposition§! par 5%"
 TT_OEF_LOWER_POPULARITIES: "Réduire la popularité de la §Hcoalition au pouvoir§! par 5% et la popularité du principal §Hparti d'opposition§! par 10%"
 TT_OEF_WAR_ON_TERROR_SPEECH_HELD: "The War on Terror speech has been held"
 USA_enduring_freedom: "Opération Enduring Freedom"
 USA_iraqi_freedom: "Opération Liberté irakienne"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_KARZAI: "Mettre en place un gouvernement pro-occidental dirigé par un candidat populaire. §RCela dérangera la population la plus conservatrice !§!\n"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_RABBANI: "Mettre en place un gouvernement non aligné dirigé par un candidat conservateur.\n"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_MASSOUD: "Mettre en place un gouvernement non aligné dirigé par un héros de guerre. §GCela ajoutera de la stabilité en Afghanistan !§!\n"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_ZAHIR_SHAH: "Rétablir le Royaume d'Afghanistan. §RCela va mettre en colère la population la plus conservatrice et nuire à nos relations avec le Pakistan !§!\n"
 war_on_terror_category: "L'OEF et la guerre contre le terrorisme"
 war_on_terror_category_desc: "Operation Enduring Freedom (OEF) is the official name used by the U.S. government for the Global War on Terrorism. This strategy targets terrorist organizations in foreign countries, and allows the US to strike terrorists and their supporters with impunity"
 KUR_war_on_terror_category: "Opération Liberté irakienne"
 KUR_war_on_terror_category_desc: "Les États-Unis ont lancé l'opération Liberté irakienne, l'invasion de l'Irak. C'est l'occasion pour nous de frapper contre [IRQ.GetLeader] et de nous éloigner davantage du joug irakien."
 usa_increase_intelligence_spending: "Augmenter les dépenses pour le renseignement"
 usa_increase_intelligence_spending_desc: "Nous avons reçu de nombreux rapports faisant état d'un grave attentat terroriste imminent. Nous n'avons pas actuellement les outils nécessaires pour combattre correctement cette menace. Nous devons accroître le financement du renseignement et renforcer les droits de surveillance du FBI et de la CIA. Cela coûtera cher sur le plan politique, mais la sécurité de notre pays est en danger."
 usa_demand_extradition_of_bin_laden: "Demander l'extradition d'Oussama ben Laden"
 usa_demand_extradition_of_bin_laden_desc: "According to our intel, Osama bin Laden was the main force behind the recent terrorist attack. As far as we know, he is currently residing in Afghanistan, under the protection of the Taliban. We should contact the Taliban, and demand that they cut their ties with Al-Qaeda and deliver bin Laden to us."
 usa_operation_enduring_freedom: "Exécuter l'opération Enduring Freedom (OEF)"
 usa_operation_enduring_freedom_desc: "Les talibans ont refusé de nous donner Ben Laden, alors nous devrons l'attraper nous-mêmes. Nous devons préparer l'opération Enduring Freedom, qui nous permettra d'envoyer du matériel et d'aller sur le terrain en Afghanistan."
 usa_homeland_security_act: "Établir la sécurité intérieure"
 usa_homeland_security_act_desc: "L'administration a avancé l'idée d'un nouveau ministère, le « United States Department of Homeland Security ». La Sécurité intérieure doit absorber 22 bureaux fédéraux, dont l'Agence fédérale de gestion des situations d'urgence.\n\nInstallée dans le Nebraska Avenue Complex, la Sécurité intérieure sera chargée de protéger les États-Unis d'Amérique et ses alliés des menaces subversives étrangères, principalement du terrorisme. D'autres pays confient la plupart du temps cette tâche au ministère de l'Intérieur, mais l'Américain n'a manifestement pas réussi à le faire."
 usa_setup_new_administration_in_afghanistan: "Installer une nouvelle administration en Afghanistan"
 usa_setup_new_administration_in_afghanistan_desc: "Maintenant que les talibans ont été vaincus, nous devons mettre en place une nouvelle administration. Il y a de multiples choix quant à la personne que nous devrions ériger en dirigeant de l'Afghanistan."
 usa_create_guantanamo_bay: "Créer le centre de détention de Guantanamo Bay"
 usa_create_guantanamo_bay_desc: "Pour faire face aux futurs terroristes présumés ou avérés, le gouvernement et les services secrets des États-Unis auront besoin d'une prison convenable et sûre qui ne mette pas en danger les civils américains en cas de soulèvement dans une prison ou de fuite de la prison. Idéalement, un tel emplacement serait situé sur une île qui abrite également un gouvernement hostile qui surveille de près la frontière de notre territoire et, heureusement, un tel arrangement existe précisément sur l'île de Cuba, où les États-Unis détiennent un contrat (qui n'est plus reconnu par le gouvernement cubain) dans la base de Guantánamo Bay depuis 1903, qui a été renouvelé pour une période illimitée en 1934.\n\nDe plus, Guantanamo Bay n'est ni un État ni même un territoire américain, ce qui signifie que le droit américain et même la Constitution américaine ne s'y appliquent pas nécessairement. Cela donnera à la CIA des options intéressantes..."
 usa_petition_invasion_of_iraq: "Take Iraqi Disarmament to the Security Council"
 usa_petition_invasion_of_iraq_desc: "We know that [IRQ.GetLeader] has weapons of mass destruction. We will put a resolution before the Security Council declaring Iraq in material breach of its disarmament obligations and warning of serious consequences.\n\nIt will not authorise an invasion. No such resolution would survive a vote, and our own lawyers know it. What it will buy us is standing, and if we are going into Baghdad regardless, it is better to go in with the Council behind us than in spite of it."
 usa_run_war_support_campaign_against_iraq: "Mener une campagne de soutien à la guerre pour l'invasion de l'Irak"
 usa_run_war_support_campaign_against_iraq_desc: "L'ONU n'a pas approuvé notre invasion de l'Irak. Nous devons mener une campagne médiatique pour obtenir l'appui du peuple américain avant de procéder à l'invasion."
 usa_operation_iraqi_freedom: "Opération Liberté irakienne"
 usa_operation_iraqi_freedom_desc: "L'opération Liberté irakienne a entamé sa phase de pré-planification dès septembre 2002. Cependant, elle a vraiment commencé sa planification en novembre 2002 lorsque le gouvernement irakien n'a pas respecté sa résolution et a refusé de se désarmer  et d'arrêter sa production d'armes de destruction massive. S'ils ne le font pas, nous n'aurons d'autre choix que d'exécuter l'opération Liberté irakienne."
 KUR_join_invasion_of_iraq: "Participer à l'invasion de l'Irak"
 KUR_join_invasion_of_iraq_desc: "La chance de frapper contre l'Irak est maintenant !"
 wot.2.t: "Attentat terroriste majeur sur la côte Est "
 wot.2.da: "Nous avons reçu des rapports faisant état d'une tentative d'attentat terroriste sur la côte Est. Tôt ce matin, plusieurs membres présumés d'Al-Qaïda ont été arrêtés à l'aéroport international Logan de Boston et à l'aéroport international de Washington-Dulles de Washington. Malgré ces avertissements précoces, cinq terroristes parviennent à monter à bord du vol 93 à l'aéroport international de Newark à New York. Alors qu'ils tentaient de détourner le vol, la résistance des passagers les a finalement amenés à écraser l'avion dans un champ du canton de Stonycreek en Pennsylvanie. Les 7 membres d'équipage, les 33 passagers et les 5 terroristes ont tous été tués dans l'accident.\n\nD'après nos renseignements actuels, les avions devaient s'écraser sur plusieurs cibles sur la côte Est, y compris le World Trade Center, le Pentagone et le Capitole.\n\nHeureusement, nos services de renseignements étaient à l'affût et nous avons réussi à prévenir une terrible tragédie."
 wot.2.db: "We have received reports of a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. The fourth plane, Flight 93, which was presumably headed towards the Capitol, crashed at 10:03 AM as the passengers tried to retake it from the hijackers.\n\nOur nation has to recover from a horrifying day. The political situation is completely different from what it was yesterday."
 wot.2.dc: "We have received reports of a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. On the fourth plane, Flight 93, the passengers tried to retake the plane from the hijackers but failed. The terrorists managed to keep the plane in the air and eventually crashed it into the side of the Capitol building at 10:23.\n\nOur nation has to recover from a horrifying day. The political situation is completely different from what it was yesterday."
 wot.2.a: "Nous honorerons le sacrifice du vol 93"
 wot.2.b: "Oh, humanité !"
 wot.2.c: "Oh, humanité !"
 wot.3.t: "Réponse diplomatique aux attentats du World Trade Center"
 wot.3.d: "Les États-Unis d’Amérique ont été délibérément et soudainement attaqués par des combattants terroristes ennemis.\n\nAlors que les États-Unis se préparent à leur réponse diplomatique et militaire aux attaques contre le World Trade Center et le Pentagone, le ministre des Affaires étrangères [Root.GetAdjective] fait de plus en plus pression pour que le gouvernement publie une déclaration ferme et décisive sur la question."
 wot.3.a: "Nous sommes aux côtés des États-Unis ! Quoi qu'il arrive !"
 wot.3.b: "Condamner les attaques, mais ne pas faire de promesses."
 wot.3.c: "C'est ce qui arrive quand on interfère avec d'autres pays."
 wot.4.t: "Un politicien local soutient le gouvernement"
 wot.4.da: "Alors que l'administration républicaine s'efforce de trouver une réponse décisive au récent attentat terroriste, le Parti démocrate est resté jusqu'à présent les bras croisés et a plus ou moins observé la situation, faisant des déclarations de condamnation contre les agresseurs, mais sans faire de promesses ou de demandes politiques précises.\n\nAujourd'hui, un membre important du Parti démocrate de l'État touché, New York, a pris une position centrale dans les réactions aux attentats : Hillary Clinton, sénatrice de New York et ancienne Première Dame des États-Unis, a prononcé un discours clair : « Chaque nation doit être avec nous ou contre nous. Ceux qui abritent des terroristes, ou qui les financent, vont en payer le prix. ».\n\nLes démocrates d'un bout à l'autre du pays ont commencé à se rallier autour des déclarations de Clinton, signalant non seulement leur solidarité avec leur sénateur, mais aussi avec l'administration républicaine, afin de poursuivre et de prendre tous les moyens nécessaires pour trouver une réponse appropriée à cette attaque non seulement atroce, mais fondamentalement anti-américaine."
 wot.4.db: "Alors que l'administration démocrate s'efforce de trouver une réponse décisive au récent attentat terroriste, le Parti républicain est resté jusqu'à présent les bras croisés et a plus ou moins observé la situation, faisant des déclarations de condamnation contre les agresseurs, mais sans faire de promesses ou de demandes politiques précises.\n\nAujourd'hui, un membre important du Parti républicain de l'État touché, New York, a pris une position centrale dans les réactions aux attentats : Rudy Giuliani, maire de New York et ancien procureur des États-Unis, a prononcé un discours clair : « Chaque nation doit être avec nous ou contre nous. Ceux qui abritent des terroristes, ou qui les financent, vont en payer le prix. ».\n\nLes républicains d'un bout à l'autre du pays ont commencé à se rallier autour des déclarations de Giuliani, signalant non seulement leur solidarité avec leur maire, mais aussi avec l'administration démocrate, afin de poursuivre et de prendre tous les moyens nécessaires pour trouver une réponse appropriée à cette attaque non seulement atroce, mais fondamentalement anti-américaine."
 wot.4.a: "Nous sommes unis !"
 wot.4.b: "Ils essaient seulement de profiter d'une tragédie !"
 wot.5.t: "Service national de prière"
 wot.5.d: "Il a été suggéré d'organiser un service national de prière à la cathédrale nationale de Washington à l'intention des victimes des attentats terroristes. Plusieurs anciens présidents des États-Unis seront présents, ainsi que le président en exercice et des chefs religieux de plusieurs confessions, dont diverses branches du christianisme, de l'islam, de l'hindouisme, du sikhisme et du judaïsme.\n\n[USA.GetLeader] tiendra le discours central du service commémoratif."
 wot.5.a: "C'est un service important"
 wot.5.b: "Nous n'avons pas besoin de cela pour nous souvenir des victimes"
 wot.6.t: "Meurtre de Balbir Singh Sodhi"
 wot.6.d: "En conséquence directe des attentats terroristes, le sentiment islamophobe et la violence aux États-Unis ont augmenté de façon spectaculaire - mais la plupart des attentats sont restés à la suite d'insultes à caractère racial ou religieux, de vols ou de dommages matériels. Pas avec Balbir Singh Sodhi.\n\nLe sikh d'origine indienne a été identifié à tort comme musulman (en raison de son teint moyen-oriental et de son turban) par Frank Silva Roque, 42 ans, à la station-service Singh de Mesa, en Arizona. Singh a ensuite été tué par Roque depuis son camion avec une arme de poing de calibre.380. Roque s'est enfui de la scène et, vingt minutes plus tard, a tenté de tuer une autre personne, un employé de magasin né au Liban.\nAprès avoir échoué à cette tentative d'assassinat, Roque a mis fin à sa campagne de terreur sur son ancienne résidence, aujourd'hui occupée par une famille afghane, tirant des coups de feu sur l'immeuble, sans faire de victimes. Il sera arrêté le lendemain et finalement condamné à mort pour meurtre au premier degré."
 wot.6.a: "Nous ne nous rendrons jamais aux terroristes ! Peu importe la couleur de la peau !"
 wot.6.b: "C'était un malentendu compréhensible"
 wot.7.t: "Attaques à l'anthrax"
 wot.7.d: "Les attaques à l'anthrax, également connues sous le nom d'Amerithrax, en raison du nom de son affaire au FBI, ont commencé peu après l'attaque terroriste.\n\nDes lettres contenant des spores d'anthrax ont été envoyées à plusieurs personnes, dont des journalistes et deux sénateurs américains. L'incident du bioterrorisme serait lié à l'attaque terroriste sur la côte Est (mais l'enquête en cours du FBI n'a pas encore trouvé de preuves concluantes) et a jusqu'à présent tué 5 personnes et en a blessé 17 autres."
 wot.7.a: "Tous les obstacles que nous surmonterons"
 wot.7.b: "Nous devons trouver ceux qui ont fait ça !"
 wot.8.t: "Le discours sur la guerre contre la terreur"
 wot.8.d: "[USA.GetLeader] a prononcé un discours lors d'une session conjointe du Congrès américain, déclarant une « guerre contre la terreur », comme il l'appelle.\n\nLe Président a promis des réactions résolues et directes à la terreur et a fait la fameuse déclaration suivante à tous les autres pays du monde : « Chaque nation, dans chaque région, a maintenant une décision à prendre. Soit vous êtes avec nous, soit vous êtes avec les terroristes. »"
 wot.8.a: "Justice nous apporterons"
 wot.8.b: "Et ce sera rapide"
 wot.9.t: "Les États-Unis exigent l'extradition d'Oussama ben Laden"
 wot.9.d: "After the terror attack on the East Coast, the US has contacted our officials and they are demanding that we sever all links to our allies Al-Qaeda and their leader Osama bin Laden. We also have to capture bin Laden and deliver him to the hands of the US. Based on the previous rhetoric, declining the request will surely turn the US into our enemy."
 wot.9.a: "Le Grand Satan n'aura rien !"
 wot.9.b: "Peut-être qu'un accord avec le diable est nécessaire..."
 wot.10.t: "Les talibans refusent l'extradition"
 wot.10.d: "Les talibans ont refusé de cesser de coopérer avec Al-Qaïda et Ben Laden. Il semble que la seule façon pour nous de traduire les criminels en justice soit de renverser l'ensemble du régime taliban."
 wot.10.a: "Ce n'est pas surprenant."
 wot.11.t: "Les talibans acceptent l'extradition"
 wot.11.d: "Étonnamment, les talibans ont accepté de chasser Al-Qaïda du pays et de traquer Ben Laden. Ils ont dit qu'ils étaient prêts à coopérer avec l'armée américaine pour traîner les terroristes en justice. Nous avons déjà envoyé un groupe de forces spéciales pour appréhender Ben Laden dans sa dernière localisation connue."
 wot.11.a: "C'est... étrange."
 wot.12.t: "Les États-Unis demandent de l'aide contre les talibans"
 wot.12.d: "Les États-Unis vont chasser les talibans d'Afghanistan. Ils ont demandé notre soutien dans la lutte."
 wot.12.a: "Nous enverrons des soldats au combat !"
 wot.12.b: "Nous allons armer les milices locales !"
 wot.12.c: "Nous vous apporterons un soutien moral ! Allez l'équipe !"
 wot.13.t: "Choisir un candidat"
 wot.13.da: "Nous devons décider qui nous devrions recommander comme dirigeant de l’Afghanistan. Il est probable que le gouvernement local actuel de l’Afghanistan suivra notre recommandation. Nous avons quatre bons candidats parmi lesquels choisir.\n\nNos options sont Hamid Karzaï, qui a rejoint l’Alliance du Nord après l’assassinat de son père par Al-Qaïda, Burhanuddin Rabbani, l’actuel président officiel de l’Afghanistan et le chef du parti islamiste conservateur Jamiat, Ahmad Shah Massoud, le Lion du Pajnshir, ou le roi d’Afghanistan en exil, Mohammed Zahir Shah."
 wot.13.db: "Nous devons décider qui nous devrions recommander en tant que dirigeant de l'Afghanistan. Il est probable que le gouvernement local actuel de l'Afghanistan acceptera notre recommandation. Nous avons trois bons candidats parmi lesquels choisir.\n\nNos options sont Hamid Karzai, qui a rejoint l'Alliance du Nord après l'assassinat de son père par Al-Qaïda, Burhanuddin Rabbani, l'actuel président officiel de l'Afghanistan et leader du parti conservateur islamiste Jamiat, ou le roi en exil de l'Afghanistan, Mohammad Zaher Shah."
 wot.13.a: "Hamid Karzai"
 wot.13.b: "Burhanuddin Rabbani"
 wot.13.c: "Ahmed Chah Massoud"
 wot.13.d: "Mohammad Zaher Shah"
 wot.15.t: "The Security Council Has Ruled"
 wot.15.a: "Aller de l'avant avec l'invasion de toute façon"
 wot.15.b: "Je suppose que nous devrons les écouter..."
 wot.17.t: "Rejoindre l'invasion de l'Irak ?"
 wot.17.d: "Les États-Unis envisagent d'envahir l'Irak pour renverser le gouvernement de [IRQ.GetLeader]. Ils nous demandent de nous joindre à leur guerre."
 wot.17.a: "Bien sûr que nous aiderons nos alliés !"
 wot.17.b: "C'est une guerre injuste."
 wot.20.t: "Oussama ben Laden échappe à la capture"
 wot.20.d: "Notre opération pour capturer Ben Laden a été un échec total. Lorsque nos forces sont arrivées au complexe suspecté, Ben Laden était parti depuis longtemps. Il est probable que des forces qui lui sont favorables l'ont informé de notre opération, lui donnant ainsi tout le temps de s'échapper.\n\nJusqu'à présent, nous n'avons pas de renseignements sur l'endroit où il s'est échappé, mais il est très probable qu'il soit déjà en route pour quitter l'Afghanistan."
 wot.20.a: "Nous l'aurons la prochaine fois."
 wot.21.t: "Oussama ben Laden capturé"
 wot.21.d: "Nos forces spéciales ont réussi à capturer Oussama ben Laden dans sa cachette en Afghanistan. Avec l'aide d'informateurs talibans locaux, nous avons pu localiser son emplacement exact et il s'est rendu sans combattre."
 wot.21.a: "« Ladies and Gentlemen, we got him »"
 wot.22.t: "Découverte de la cachette d'Oussama ben Laden"
 wot.22.d: "Our intelligence services have located the new hideout of Osama bin Laden. We have identified a compound in [event_target:GLOBAL_bin_laden_hideout.GetNameDef]. From drone footage and based on local sources, this is definitely the location of bin Laden. We should inform [event_target:GLOBAL_bin_laden_hideout.GetAdjective] government right away and ask their permission to perform a special operations mission to take out bin Laden"
 wot.22.a: "Contactons immédiatement le pays d'accueil !"
 wot.22.b: "Qui se soucie d'un seul terroriste ?"
 wot.23.t: "Les États-Unis repèrent Ben Laden"
 wot.23.d: "Aujourd'hui, le ministre des Affaires étrangères des États-Unis nous a contactés et nous a informés qu'ils avaient trouvé une cachette d'Oussama ben Laden dans notre pays. Oussama ben Laden, un dirigeant d'Al-Qaïda, est responsable de la grande attaque terroriste contre les États-Unis il y a quelques années. Nos propres services de renseignements ont été en mesure de vérifier et de contre-vérifier certaines des informations que les États-Unis nous ont fournies. Il est très probable que Ben Laden réside effectivement dans un endroit secret de notre pays.\n\nPermettre aux États-Unis de mener cette opération sera un grand coup contre le terrorisme mondial, mais autoriser des forces spéciales étrangères à opérer dans notre pays est risqué. De plus, Ben Laden est l'un des terroristes les plus recherchés au monde et refuser l'accès aux États-Unis ne sera probablement pas bien vu par ces derniers."
 wot.23.a: "Autoriser l'opération"
 wot.23.b: "Nous ne laisserons pas les États-Unis compromettre notre souveraineté !"
 wot.24.t: "[FROM.GetName] accepte l'opération"
 wot.24.d: "[FROM.GetName] a donné à nos forces spéciales la permission d'entrer dans leur pays et de mener un raid contre la cachette de Ben Laden. Nous devrions avoir les résultats de l’opération dans quelques jours."
 wot.24.a: "Super"
 wot.25.t: "[FROM.GetName] Rejects Our Request!"
 wot.25.d: "After many attempts to gain [FROM.GetName]'s permission to conduct an on the grounds search for bin Laden, [FROM.GetLeader] has sent back a simple response; \"No\". Some are calling for harsh punishments for [FROM.GetName] for blatantly ignoring our call to aid us in the war on terror, we could let it slide however, as unpopular as it may be at home..."
 wot.25.a: "I suppose their sovereignty should be respected."
 wot.25.b: "How long can they go without us and our aid?"
 wotnews.1.t: "Attentat terroriste majeur sur la côte Est des États-Unis"
 wotnews.1.da: "Des journalistes américains ont porté à notre attention une tentative d'attentat terroriste sur la côte Est. Tôt ce matin, plusieurs membres présumés d'Al-Qaïda ont été arrêtés à l'aéroport international Logan de Boston et à l'aéroport international de Washington-Dulles de Washington. Malgré ces avertissements précoces, cinq terroristes parviennent à monter à bord du vol 93 à l'aéroport international de Newark à New York. Alors qu'ils tentaient de détourner le vol, la résistance des passagers les a finalement amenés à écraser l'avion dans un champ du canton de Stonycreek en Pennsylvanie. Les 7 membres d'équipage, les 33 passagers et les 5 terroristes ont tous été tués dans l'accident.\n\nD'après nos renseignements actuels, les avions devaient s'écraser sur plusieurs cibles sur la côte Est, y compris le World Trade Center, le Pentagone et le Capitole.\n\nHeureusement, nos services de renseignements étaient à l'affût et nous avons réussi à prévenir une terrible tragédie."
 wotnews.1.db: "News reporters from the United States have brought to our attention a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. The fourth plane, Flight 93, which was presumably headed towards the Capitol, crashed at 10:03 AM as the passengers tried to retake it from the hijackers."
 wotnews.1.dc: "News reporters from the United States have brought to our attention a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. On the fourth plane, Flight 93, the passengers tried to retake the plane from the hijackers but failed. The terrorists managed to keep the plane in the air and eventually crashed it into the side of the Capitol building at 10:23.\n\nThis is a horrible day and only shows how far terrorists are willing to go to achieve their goals."
 wotnews.1.o1: "Nous ne l'oublierons pas."
 wotnews.1.o2: "En ces temps difficiles, nous sommes solidaires."
 wotnews.1.o3: "Oh, humanité !"
 wotnews.1.o4: "Infidèles."
 wotnews.2.t: "Le rassemblement des démocrates et des républicains"
 wotnews.2.d: "En réponse aux attentats terroristes, les partis démocrate et républicain ont pris la décision d'enterrer la hache de guerre du conflit politique bipartisan.\n\nÀ New York, les républicains sous Rudy Giuliani et les démocrates sous Hillary Clinton ont déjà travaillé ensemble avec succès pour lutter contre cette catastrophe. Il semble que les deux parties travailleront ensemble au lendemain de cette crise. Juste cette fois-ci."
 wotnews.2.a: "Les États-Unis s'unissent contre le terrorisme."
 wotnews.3.t: "Service de prière national américain"
 wotnews.3.d: "Tenu à la cathédrale nationale de Washington, le service national de prière était une tentative de donner aux États-Unis un court repos après l'agitation constante des trois derniers jours.\n\nLe président [USA.GetLeader] a tenu le discours principal de l'événement, proclamant : « À seulement trois jours de ces événements, les Américains n'ont pas encore la distance de l'histoire. Mais notre responsabilité envers l'histoire est déjà claire : répondre à ces attaques et débarrasser le monde du mal »."
 wotnews.3.a: "La nation a besoin de temps pour guérir."
 wotnews.4.t: "Meurtre de Balbir Singh Sodhi"
 wotnews.4.d: "À la suite des attentats terroristes, la violence contre divers groupes ethniques et religieux a monté en flèche aux États-Unis. Cela inclut les Arabes musulmans - et les personnes qui ont l'air de l'être.\n\nBalbir Singh Sodhi, un Sikh né en Inde et propriétaire d'une station-service en Arizona, a été aujourd'hui brutalement piégé et assassiné sans provocation par Frank Silva Roque, un patriote américain de 42 ans autoproclamé, qui a ensuite tenté de tuer plusieurs autres personnes d'origine libanaise et afghane."
 wotnews.4.a: "Du conflit naît le conflit."
 wotnews.5.t: "Les attaques à l'anthrax aux États-Unis"
 wotnews.5.d: "Le FBI a publié des informations publiques sur l'affaire « Amerithrax », une série de tentatives d'assassinat utilisant des lettres infectées par des spores d'anthrax qui ont commencé peu après l'attaque terroriste sur la côte Est.\n\nParmi les destinataires de ces lettres figuraient le leader de la majorité au Sénat américain Tom Daschle (D) et le sénateur du Vermont Patrick Leahy (D).\n\nCinq personnes ont été tuées jusqu'à présent. Le FBI n'a pas encore publié d'informations sur des suspects potentiels."
 wotnews.5.a: "La terreur continue."
 wotnews.6.t: "La « guerre contre la terreur »"
 wotnews.6.d: "Quinze jours après les attaques terroristes de la côte Est, [USA.GetLeader] a tenu ce qui pourrait être le discours le plus marquant du début des années 2000. Ils ont parlé de politique intérieure et étrangère et ont fait une déclaration de « pour ou contre nous » en s'exclamant ce qui suit : « Chaque nation, dans chaque région, a maintenant une décision à prendre. Soit vous êtes avec nous, soit vous êtes avec les terroristes. À partir de ce jour, toute nation qui continue d'héberger ou de soutenir le terrorisme sera considérée par les États-Unis comme un régime hostile »."
 wotnews.6.a: "Est-ce qu'une guerre arrive ?"
 wotnews.7.t: "[USA.GetLeader] annonce « Enduring Freedom »"
 wotnews.7.d: "Le président des États-Unis, [USA.GetLeader] a informé le Congrès américain qu'une invasion militaire de l'Émirat islamique d'Afghanistan dirigé par les talibans commencerait demain.\n\nL'attaque militaire américaine porte le titre « Operation Enduring Freedom ». Le Président a également annoncé son intention d'impliquer d'une manière ou d'une autre les pays alliés dans l'effort de guerre.\n\nLe gouvernement afghan a déjà publié une déclaration de protestation, mais comme aucune grande nation au monde n'a de relations diplomatiques avec l'Afghanistan, il est peu probable qu'elle ait un effet."
 wotnews.7.a: "La guerre approche."
 wotnews.8.t: "Les accords de Bonn"
 wotnews.8.d: "Dans le but d'instaurer un véritable ordre d'après-guerre dans un Afghanistan sans les talibans, plusieurs délégations nationales de pays occidentaux ont rencontré 25 dirigeants afghans dans la ville de Bonn, en Allemagne.\n\n[AFG.GetLeader] a été reconnu par la communauté internationale comme le président légitime de l'Afghanistan. La plupart des nations du monde ont maintenant recommencé à établir des relations diplomatiques avec l'Afghanistan."
 wotnews.8.a: "L'Afghanistan trouvera-t-il enfin la paix ?"
 wotnews.9.t: "Centre de détention de Guantanamo Bay"
 wotnews.9.d: "En réponse aux attaques terroristes du 11 septembre, le gouvernement des États-Unis cherche un endroit où placer les détenus à haut risque accusés d'avoir participé à des activités terroristes ou d'avoir activement planifié de le faire.\n\nUn tel centre a maintenant été établi dans une partie de l'île de Cuba, sous contrôle américain, à la base navale de Guantanamo Bay. Le gouvernement cubain, qui ne reconnaît pas le contrat en cours de Guantanamo Bay par les États-Unis, a déjà émis une protestation contre l'augmentation de la présence militaire américaine sur l'île."
 wotnews.9.a: "Ce sera sûrement parfaitement légal et humain."
 wotnews.11.t: "Début de la guerre en Irak"
 wotnews.11.d: "Le président [USA.GetLeader] a prononcé une allocution en direct peu après les explosions qui ont secoué la capitale irakienne de Bagdad, marquant le lancement de l'opération « Liberté irakienne ». La campagne menée par les États-Unis vise à débarrasser l'Irak de son dictateur, [IRQ.GetLeader], et à éliminer sa capacité de stocker, développer et déployer ses armes de destruction massive. La frappe survient quelques jours seulement après que le président irakien, [IRQ.GetLeader], a ignoré le délai de 48 heures qui lui était alloué pour quitter son pays. En réponse à l'invasion militaire, la radio de la République d'Irak à Bagdad a déclaré que « les diaboliques, les ennemis de Dieu, la patrie et l'humanité, ont commis la stupide agression contre notre patrie et notre peuple ». Entre-temps, des sources militaires américaines ont déclaré que cinq membres clés du régime irakien, dont [IRQ.GetLeader], avaient été pris pour cible lors des premières attaques."
 wotnews.11.a: "La guerre contre le terrorisme se poursuit."
 wotnews.12.t: "Saddam Hussein capturé"
 wotnews.12.d: "Les forces américaines ont capturé aujourd'hui un Saddam Hussein barbu et hagard dans une cachette souterraine située dans une ferme près de sa ville natale, Tikrit. Cette arrestation intervient quelques mois après l'entrée des troupes américaines dans la capitale irakienne et met fin à l'une des chasses à l'homme les plus intenses de l'histoire. Dans un discours télévisé prononcé cet après-midi, le président des États-Unis, [USA.GetLeader], a déclaré que Saddam serait confronté à \"la justice qu'il a refusée à des millions de personnes\". Il a ajouté que l'arrestation de l'ancien dirigeant irakien \"marque la fin de la route pour lui et pour tous ceux qui ont intimidé et tué en son nom\". Toutefois, le président a également averti que cela ne signifiait pas la fin de la violence en Irak."
 wotnews.12.a: "Mesdames et messieurs, nous l'avons !"
 wotnews.13.t: "Saddam Hussein condamné à mort"
 wotnews.13.d: "Saddam Hussein was executed at dawn today following his conviction by an Iraqi court for crimes against humanity. The sentence was carried out at a former military intelligence headquarters in a Shia district of Baghdad at 6:05am local time (3:05am GMT). In a prepared statement, [USA.GetLeader] cautioned that Saddam's execution would not stop the violence in Iraq, but said it was \"an important milestone on Iraq's course to becoming a democracy that can govern, sustain, and defend itself, and be an ally in the war on terror\". The office of the Iraqi Prime Minister, released a statement that said Saddam's execution was a \"strong lesson\" to ruthless leaders who commit crimes against their own people."
 wotnews.13.a: "D'accord."
 wotnews.14.t: "Les États-Unis retirent leurs troupes d'Irak"
 wotnews.14.d: "The last convoy of U.S. soldiers pulled out of Iraq, ending nearly nine years of war that inflicted many casualties on both sides, and left a country grappling with political uncertainty. The final column of around 100 mostly U.S. military MRAP armoured vehicles carrying 500 U.S. troops trundled across the southern Iraq desert from their last base through the night and daybreak along an empty highway to the Kuwaiti border. For the United States, the military pullout is the fulfilment of a promise to bring troops home from a conflict, widely considered the most unpopular war since Vietnam and one that tainted America's standing worldwide. For Iraqis, though, the departure brings a sense of sovereignty tempered by nagging fears their country may slide once again into the kind of sectarian violence that killed many thousands of people at its peak in 2006-2007."
 wotnews.14.a: "L'Irak trouvera-t-il enfin la paix ?"
 wotnews.15.t: "Les États-Unis ont capturé Oussama ben Laden"
 wotnews.15.d: "Aujourd'hui, le gouvernement [USA.GetAdjective] a annoncé avoir capturé Oussama ben Laden en Afghanistan. Ben Laden était le principal instigateur de l’attaque terroriste aux États-Unis. Avec l'aide d'informateurs talibans locaux, les forces spéciales américaines ont attaqué le complexe de Ben Laden. Il se serait rendu sans combattre face aux forces spéciales."
 wotnews.15.a: "Intéressant"
 wotnews.16.t: "Oussama ben Laden a été tué"
 wotnews.16.d: "The United States has announced that they have conducted a counter terrorism operation in [event_target:GLOBAL_bin_laden_hideout.GetNameDef] and have killed Osama bin Laden, the leader of Al-Qaeda, in a secret compound. A group of Navy SEALS raided the location slightly after midnight local time, and reportedly shot the unarmed terrorist leader. His body was flown out of the country for identification to a nearby US carrier, while his dead bodyguards and the rest of his entourage was left for the local security forces to handle. Few hours later, he was buried in the sea in accordance with Islamic tradition.\n\nThe US sees this as a great victory over terrorism, and many extremist groups have already vowed revenge on the Americans."
 wotnews.16.a: "Intéressant"
 war_on_terror_leader: "Campagne de guerre contre le terrorisme"
 MD_terror.20.t: "Regional Terror Network Expanding"
 MD_terror.20.d: "Intelligence reports indicate that a terror organization operating in our region has grown beyond its initial local base. The group has established networks and cells across the broader region. Security analysts warn that our country may now be within the range of their operational planning."
 MD_terror.20.a: "Concerning, but not yet our immediate problem."
 MD_terror.20.b: "Increase our domestic counter-terrorism presence."
 MD_terror.21.t: "Terror Organization Achieves Global Reach"
 MD_terror.21.d: "Intelligence agencies worldwide have assessed that a major terror organization has achieved the operational capacity to conduct attacks on a global scale. Once a regional threat, the organization has built an international network of cells, financing, and logistics. No nation can consider itself beyond the reach of their planning."
 MD_terror.21.a: "We will remain vigilant."
 MD_terror.21.b: "Reinforce our counter-terrorism operations immediately."
 USA_failed_to_win_in_iraq: "Failed in §Y[IRQ.GetNameWithFlag]§!\n"
 MD_terror.20.c: "Their cause is spreading. Praise be."
 MD_terror.21.c: "The Caliphate's reach now spans the globe."
 TT_REDUCE_RULING_COALITION_POPULARITY_20_PERCENT: "§RThe ruling party and all coalition members will lose 20% relative popularity!\n§!"
 TT_UNSC_NO_PENDING_SUBJECT_VOTE: "The §YSecurity Council§! is not already considering a resolution against them"
 USA_wot_attack_occurred: "Major Terrorist Attack has Happened"
 usa_seek_unsc_extradition_mandate: "Demand bin Laden's Surrender at the Security Council"
 usa_seek_unsc_extradition_mandate_desc: "Before a single soldier crosses into Afghanistan, we should make the Taliban answer to the whole Council and not merely to us.\n\nThe Security Council has demanded bin Laden's surrender before, and the Taliban have ignored it. A fresh resolution, backed by sanctions, will not by itself pry him loose. What it will do is strip the regime of the argument that this is an American quarrel, put every neighbour that shelters them on notice, and make refusal cost them something before we ever reach for the rifle.\n\nIf they still refuse, no one in this chamber will be able to say we did not try."
 wot.25.c: "Then we go in without them."
 wot.26.t: "Washington Offers Terms"
 wot.26.d: "The Americans have sent an intermediary rather than a division, and the terms he carries are these. We keep Afghanistan. We keep our government, our courts and our laws. In exchange the war with the Northern Alliance ends where it stands, and the Emirate lives out its days sanctioned, embargoed and watched, cut off from the markets of the world and answerable to a Security Council that will never once vote in our favour.\n\nThere are those in the shura who say this is surrender dressed as a treaty, that we did not drive out the Soviets to be handed a leash by Washington. There are others who point at the carrier groups in the Arabian Sea and ask what the alternative is.\n\nKabul must still agree. But if we refuse, there will be nothing for Kabul to agree to."
 wot.26.a: "Take the terms. A sanctioned Emirate is still an Emirate."
 wot.26.b: "We did not fight the Soviets to be leashed by Washington."
 wot.27.t: "A Peace We Did Not Ask For"
 wot.27.d: "An American envoy has arrived in the Panjshir with a piece of paper and a proposal, and it is not the one we have spent ten years fighting for.\n\nThe Taliban have accepted Washington's terms. They will hand over the men America wants and submit to sanctions, and in return they keep Kabul, Kandahar and every valley they hold today. The war simply stops. Our dead stay dead, our exile stays permanent, and the men who hanged Najibullah from a lamp post govern the country we were promised.\n\nThe Americans point out, not unkindly, that we are not winning. They are not wrong. But there is a difference between losing a war and signing our name to the loss."
 wot.27.a: "Sign it. We are not winning, and the country is bleeding."
 wot.27.b: "The men who did this do not get to keep Kandahar."
 wot.28.t: "The Settlement Collapses"
 wot.28.d: "The talks are dead. Whichever side walked away from the table, the result is the same on our desk: we have spent the money, spent the credibility, and bought nothing at all.\n\nThe war in Afghanistan goes on without us. The men who hosted bin Laden are still in Kabul, and the argument that diplomacy could have settled this has just been settled the other way, loudly, in public. The hawks are already drafting their statements.\n\nThere is one instrument left, and everybody in this room knows what it is."
 wot.28.a: "Then we do it the other way."
 wotnews.17.t: "Bin Laden Has Slipped Out of Afghanistan"
 wotnews.17.d: "As coalition aircraft pounded the Tora Bora caves, the man they came for was already gone. Intelligence services now believe Osama bin Laden crossed the border weeks ago and is being sheltered in [event_target:GLOBAL_bin_laden_hideout.GetNameDef], moving between safe houses under the protection of sympathisers.\n\nThe Afghan campaign may still be won. The manhunt, however, is only beginning, and it will have to be fought in a country the coalition is not at war with."
 wotnews.17.a: "He cannot hide forever."
 wotnews.19.t: "The Trail Goes Cold"
 wotnews.19.d: "The manhunt for Osama bin Laden has quietly stopped. There is no compound left to watch, no government left to lean on, and no informant left who will take American money. The last of the safe houses that sheltered him are gone, along with the states that tolerated them.\n\nIntelligence officials will say only that he is 'no longer assessed to be an active operational threat'. Pressed on whether he is alive, they decline to answer. Pressed on whether anyone is still looking, they decline to answer that too.\n\nSomewhere, the most wanted man in the world has simply stopped being findable."
 wotnews.19.a: "Some wars end without a body."
 wotnews.20.t: "The Raid Hits an Empty House"
 wotnews.20.d: "American helicopters crossed a sovereign border in the dark, without permission and without warning, and came back with nothing.\n\nThe compound was empty. Whether he was tipped off, whether the intelligence was wrong from the start, or whether he simply moved a week early, nobody in Washington is prepared to say. What is not in dispute is that a foreign special forces unit conducted an armed operation on the soil of a country the United States is not at war with, and killed several of that country's nationals in the process.\n\nThe Security Council convenes tomorrow. The administration has no result to show it."
 wotnews.20.a: "A debacle."
 USA_wot_extradition_accepted: "§YCooperation with Taliban§!"
 USA_unilateral_raid_threat: "Unilateral raid on foreign soil"
 TT_IRAQ_DISARMAMENT_UNSC_PETITION: "Put a disarmament resolution before the §YUN Security Council§!. If it passes, §YIraq§! is declared in material breach, giving us diplomatic cover to invade. If it fails, we go in alone."
 wot.15.da: "The resolution carried. Iraq stands declared in material breach of its disarmament obligations, and the Council has warned of serious consequences should [IRQ.GetLeader] fail to comply.\n\nWhat the resolution does not do is authorise us to invade. It was never going to, and pressing for a second resolution that says so plainly would only hand France a veto and the rest of the chamber an excuse. But we have the Council on record. If we go into Iraq now, we go in with the law arguable and our allies able to follow us."
 wot.15.db: "The resolution has failed. The Council would not put its name to so much as a finding of material breach, and there will be no second attempt.\n\nThat leaves us where we always suspected we would end up: certain that [IRQ.GetLeader] is a threat, and entirely alone in being willing to do something about it. We can still go into Iraq. We will simply be going without cover, and the bill for that will come due long after Baghdad falls."
 TT_IRAQ_INVASION_WITH_COVER: "We invade with the §YSecurity Council§! on record. §GLower international outrage, and our partners can follow us in.§!"
 TT_IRAQ_INVASION_WITHOUT_COVER: "We invade with §Rno diplomatic cover at all§!. §RHeavy international outrage, and the Security Council will not forgive it.§!"
 USA_iraq_invasion_threat: "Invasion of Iraq"
 usa_broker_afghan_settlement: "Broker an Afghan Settlement"
 usa_broker_afghan_settlement_desc: "They gave us bin Laden. They are still at war with the Northern Alliance, and that war is what made Afghanistan a place where men like him could disappear in the first place.\n\nWe can end it without a single American division. Recognise the Taliban as the government of a state we hold at arm's length, sanctioned and watched, and force a peace on the men in Panjshir who have been fighting them for a decade. It will satisfy nobody. Kabul will owe us, Kandahar will hate us, and the hawks at home will call it a surrender.\n\nIt will also be the first war in a generation that America ended instead of starting."
 TT_AFGHAN_SETTLEMENT_OFFERED: "Put terms to the §YTaliban§! and to §YKabul§!. §REither of them can walk away from the table.§!"
 TT_WOT_DIPLOMATIC_VICTORY: "§GWe got him without a war.§! The hawks will not forgive it."
 TT_WOT_INVADE_AFTER_COMPLIANCE: "§RThey gave him up and we are invading anyway.§! The Security Council will not forget it, and neither will our own people."
 TT_WOT_TORE_UP_OUR_OWN_TREATY: "§RWe wrote the peace, we made §YKabul§! sign it, and we are tearing it up ourselves.§! Afghanistan will never trust us again, and §Rour influence there collapses§!."
 USA_wot_unprovoked_invasion: "Invasion of a Complying Regime"
 USA_wot_broken_settlement: "Broke the Afghan Settlement"
 wotnews.18.t: "Peace in Afghanistan"
 wotnews.18.d: "The war that has consumed Afghanistan since the Soviets left ended today, not in Kabul or Kandahar but at a conference table, with American money on one side of it and a Taliban delegation on the other.\n\nThe Taliban keep the country. They keep it sanctioned, embargoed, and watched, with Washington's hand on Kabul's shoulder. Nobody has called it a victory. The men who fought the Panjshir valley for a decade are going home, and Osama bin Laden is in American custody.\n\nThere are those in Washington who wanted the 101st Airborne in Kandahar instead. They will be arguing about this for twenty years."
 wotnews.18.a: "The war is over."
 wot.0.t: "Bin Ladin Determined To Strike in US"
 wot.0.d: "The Presidential Daily Brief on the President's desk this morning runs to a page and a half. It carries no date, no city and no target. It says that Osama bin Laden has wanted to attack inside the United States since 1997, that his followers have been living here for years, and that the Bureau has seen what it calls patterns of suspicious activity consistent with preparations for hijackings.\n\nIt is one memo. There have been dozens like it, and the men who wrote it cannot tell us when, or where, or how. But they are sure of one thing: he is coming, and he intends to do it here.\n\nWe can put the intelligence community on a war footing over a page and a half of speculation, and answer for the cost if nothing happens. Or we can file it."
 wot.0.a: "Put the community on a war footing."
 wot.0.b: "It is one memo among hundreds."
 TT_WOT_PDB_ACT: "Gain §Y10§! intelligence on §YAl-Qaeda§!. Better intelligence raises the chance we disrupt whatever is coming."
 TT_BIN_LADEN_RAID_UNILATERAL: "Send them in without permission. §GA 75% chance the raid kills §YOsama bin Laden§!.§!\n§RA 25% chance the compound is empty: he relocates, the Security Council condemns us, and we answer for it at home.§!"
 TT_WOT_INTEL_COOPERATION: "§GThey keep talking to us. Gain §Y15§! intelligence on §YAl-Qaeda§!.§!"
 TT_WOT_INTEL_PRESSURE: "§GThe sanctuary gets loud. Gain §Y5§! intelligence on §YAl-Qaeda§!, and the network grows more exposed.§!"