 UKR_security_start: "Безопасность Украины"
 UKR_security_start_desc: "Наша страна огромна, и поэтому ей необходима сильная внутренняя защита. Мы начнем финансирование и реформирование наших государственных структур."
 UKR_sbu_start: "Реформа СБУ"
 UKR_sbu_start_desc: "Служба безопасности Украины нуждается в глубокой реформе и повышении эффективности."
 UKR_sbu_t: "Главное управление \"Т\""
 UKR_sbu_t_desc: "Совет национальной безопасности и обороны Украины реализует государственную политику по противодействию организациям и лицам, деятельность которых направлена на подрыв украинской государственности, ликвидацию независимости Украины, насильственное изменение конституционного строя, нарушение суверенитета и территориальной целостности государства, подрыв его безопасности, незаконный захват государственной власти, пропаганду войны и насилия, разжигание межнациональной, расовой, религиозной и иной вражды, а также посягательства на права и свободы человека.\n\nТакже он обеспечивает предупреждение, выявление и пресечение преступлений и иных противоправных действий, непосредственно угрожающих жизненно важным интересам государства и безопасности граждан Украины и относящихся к компетенции Службы безопасности Украины, а также осуществляет их профилактику."
 UKR_sbu_corrupt: "Главное управление \"К\""
 UKR_sbu_corrupt_desc: "Службе безопасности Украины, согласно Закону Украины «Об организационно-правовых основах борьбы с коррупцией и организованной преступностью» от 30.06.1993 № 3341-XII, поручено осуществлять борьбу с коррупцией и организованной преступностью.\n\n Одним из государственных органов, уполномоченных на работу в этом направлении, является Главное управление по борьбе с коррупцией и организованной преступностью Совета безопасности Украины (ГУ «К»)."
 UKR_sbu_contr: "Главное управление военной контрразведки"
 UKR_sbu_contr_desc: "Органы военной контрразведки создаются для контрразведывательного обеспечения Вооруженных Сил Украины, Государственной пограничной службы Украины и других военных формирований, дислоцированных на территории Украины.\n\n Система органов военной контрразведки Совета Безопасности Украины состоит из Главного управления военной контрразведки, органов (подразделений) в регионах в составе Департамента контрразведки, оперативных подразделений военной контрразведки в оперативных, региональных и территориальных командованиях (управлениях), армейских корпусах, отдельных воинских частях и соединениях."
 UKR_sbu_svr: "Служба внешней разведки"
 UKR_sbu_svr_desc: "Служба внешней разведки Украины, или СВРУ, является разведывательным агентством правительства Украины. Она осуществляет свою деятельность в политической, экономической, военной, научной, технической и экологической сферах и подчиняется непосредственно Президенту Украины."
 UKR_sbu_sviaz_desc: "Государственная служба специальной связи Украины, также известная как Держспецсвязь, является специализированным органом исполнительной власти, основными функциями которого являются обеспечение защищенной правительственной связи, государственной курьерской службы, защита информации и киберзащита."
 UKR_sbu_alpha: "Альфа"
 UKR_sbu_alpha_desc: "Группа \"А\" Центра специальных операций Службы безопасности Украины - специальное подразделение Службы безопасности Украины. Официально носит название \"Воинская часть Е6117\"."
 UKR_sbu_administration: "Военно-гражданская администрация"
 UKR_sbu_administration_desc: "Военно-гражданская администрация - временный орган государственной власти в Украине, созданный на территориях, прилегающих к зоне боевых действий."
 UKR_peacemakers: "Программа миротворчества"
 UKR_peacemakers_desc: "Наша страна всегда стремилась участвовать в миротворческих миссиях по всему миру, и мы продолжим эту традицию."
 UKR_border_guard: "Государственная пограничная служба"
 UKR_border_guard_desc: "Государственная пограничная служба Украины является пограничной охраной страны. Это независимый правоохранительный орган, организованный Конституцией Украины как воинское формирование, руководитель которого подчиняется Президенту Украины."
 UKR_reform_vv: "Реформа внутренних войск"
 UKR_reform_vv_desc: "Наши внутренние войска с момента своего появления имели неопределенный статус в иерархии государственных структур, пришло время это исправить."
 UKR_finance_vv: "Финансирование спецбатальонов"
 UKR_finance_vv_desc: "Мы профинансируем деятельность спецбатальонов внутренних войск, возможно, в будущем они нам очень пригодятся."
 UKR_sbu_white_wolves: "Батальон \"Белые волки\""
 UKR_sbu_white_wolves_desc: "СБУ отправит на войну батальон, созданный из своих сотрудников."
 UKR_border: "Государственная пограничная служба"
 UKR_border_desc: "Наши границы слишком велики, чтобы полагаться в их охране на отдельные подразделения вооруженных сил. Пограничные войска будут выполнять эту задачу более эффективно."
