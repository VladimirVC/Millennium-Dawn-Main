 korea.41.t: "북한의 연방제 제안"
 korea.41.d: "우리의 북쪽 이웃은 한 국가가 다른 국가에 완전히 통합되는 것은 더 이상 추구할 가치가 없다고 분명히 선언했습니다. 대신, 그들은 한국 문제를 궁극적으로 해결하기 위해 두 국가 간의 연방을 창설할 것을 제안하며, 당연히 그 연방에서 주도권을 갖기를 원하고 있습니다. 이는 우리 국가의 주권과 존재를 심각하게 위협할 수 있는 위험한 상황입니다."
 korea.41.a: "연방제가 맞다"
 korea.41.b: "이런 식으로는 연방제는 불가능하다..."
 korea.42.t: "남한의 연방 조건 동의!"
 korea.42.d: "광범위한 협상 끝에 남측이 연방 창설에 동의했습니다! 남북한 간의 관계가 안정되고 연방 창설이 가시화되면서, 한민족의 미래는 그 어느 때보다 밝아 보입니다!"
 korea.42.a: "엄청난 소식이다!"
 korea.43.t: "남한의 연방 조건 거부!"
 korea.43.d: "유감스럽게도, [KOR.GetLeader]은(는) 한민족의 이익보다 자신의 이기적인 입장을 우선시하여 연방 창설을 위한 협력 제안을 거부했습니다. 이번 거부가 미래에 또 다른 시도를 하지 못하게 만드는 것은 아니지만, 가까운 시일 내에 연방 창설이 이루어지지 않을 것임을 의미합니다. 우리는 다음 시도가 더 큰 성공을 거둘 수 있도록 토대를 마련해야 합니다."
 korea.43.a: "한민족에게 슬픈 날이다..."
 KOR_joint_research: "조선 공동 연구"
 KOR_joint_research_desc: "우리의 과학적 역량을 통합함으로써, 남북의 가장 뛰어난 석학들을 결집할 수 있습니다. 공동 연구 프로그램은 기술 혁신을 가속화하고, 획기적인 발전을 이룩하며, 조선 인민들 간의 신뢰를 증진할 것입니다."
 KOR_joint_military_might: "조선의 군사력"
 KOR_joint_military_might_desc: "통일된 조선군은 우리 신생 국가의 안전과 독립을 보장할 것입니다. 교리, 장비, 그리고 경험을 하나로 합쳐, 조국을 수호할 수 있는 강력한 군대를 창설할 수 있습니다."
 KOR_joint_military_cooperation: "합동 군사 협력"
 KOR_joint_military_cooperation_desc: "남북의 군대는 하나가 되어 싸우는 법을 배워야 합니다. 합동 훈련, 교리 통합, 그리고 상호 교류를 통해 우리는 단결된 군대를 조직할 수 있습니다."
 KOR_military_improved: "향상된 군사 통합"
 KOR_military_improved_desc: "우리의 노력이 결실을 맺었습니다. 통합군은 이제 훈련과 규율의 격차를 좁히며, 더욱 향상된 효율성으로 작전을 수행합니다."
 KOR_military_exchange_experience: "군사 교류 경험"
 KOR_military_exchange_experience_desc: "협력을 증진하고 불신을 해소하며, 단일 지휘 체계를 구축하기 위해 각 지역 간에 장교와 병사를 교차 배치할 것입니다."
 KOR_combined_airforce_technology: "통합 항공 기술"
 KOR_combined_airforce_technology_desc: "남북 모두 항공 분야에서 귀중한 전문 지식을 보유하고 있습니다. 공동 공군 프로젝트는 우리의 하늘을 지키는 역량을 강화할 것입니다."
 KOR_finish_the_kf21: "KF-21 완성"
 KOR_finish_the_kf21_desc: "KF-21 전투기 프로젝트는 조선의 야망을 상징합니다. 개발을 완수함으로써, 우리는 세계 선진 항공 강국들 사이에서 확실한 입지를 다지게 될 것입니다."
 KOR_jet_production: "통합 제트기 생산"
 KOR_jet_production_desc: "남북 양측의 공장이 기여함에 따라, 제트기 생산 규모를 확대하여 우리 공군을 현대적인 국산 항공기로 무장시킬 수 있습니다."
 KOR_connect_the_people: "민족의 유대"
 KOR_connect_the_people_desc: "조선이 진정으로 하나가 되기 위해서는, 국민들이 서로 연결되어 있다는 유대감을 느껴야 합니다. 기반시설, 통신망, 그리고 공유된 정체성은 공동의 미래를 건설하는 데 있어 결정적인 역할을 할 것입니다."
 KOR_labor_integration: "노동력 통합"
 KOR_labor_integration_desc: "남북의 노동력은 조화를 이루어야 합니다. 공통된 노동법, 공정한 임금, 그리고 통합된 산업 구조가 경제를 안정시킬 것입니다."
 KOR_phase_one: "1단계"
 KOR_phase_one_desc: "통합의 첫 단계는 기초 기반시설과 주요 산업을 병합하여, 더 깊은 결속을 위한 토대를 마련하는 것입니다."
 KOR_phase_two: "2단계"
 KOR_phase_two_desc: "이제 기초 작업이 완료되었으므로, 2단계에서는 더 큰 규모의 경제 개혁과 통합 개발 정책을 추진할 것입니다."
 KOR_population_management: "인구 관리"
 KOR_population_management_desc: "남북 간의 서로 다른 인구 규모와 인구 통계는 신중하게 관리되어야 합니다. 주택, 일자리, 그리고 사회적 안정은 사회 불안을 예방하는 열쇠입니다."
 KOR_focused_growth: "집중 성장"
 KOR_focused_growth_desc: "핵심 분야에 자원을 집중함으로써, 우리는 경제적 격차를 해소하고 성장이 국가 전체에 공정하게 분배되도록 보장할 수 있습니다."
 KOR_happy_united_people: "행복한 통일 인민"
 KOR_happy_united_people_desc: "단결된 국민이 곧 강한 국민입니다. 생활 수준을 개선하고 공유된 정체성을 함양함으로써, 조선은 번영할 것입니다."
 KOR_josen_economy: "조선 경제"
 KOR_josen_economy_desc: "서로 판이한 두 경제 체제를 합치는 것은 결코 쉬운 일이 아닙니다. 신중한 계획을 통해 우리는 새롭고 더 강력한 조선 경제를 구축할 수 있습니다."
 KOR_josen_economy_improved: "향상된 조선 경제"
 KOR_josen_economy_improved_desc: "우리의 통합 정책이 결실을 맺기 시작했습니다. 경제는 안정되고, 산업은 확장되며, 무역은 번창하고 있습니다."
 KOR_josen_economy_integrated: "통합된 조선 경제"
 KOR_josen_economy_integrated_desc: "남과 북은 더 이상 두 개의 경제가 아닙니다. 우리는 하나입니다. 통합이 완료됨에 따라, 조선은 이제 경제 강국으로 우뚝 설 수 있습니다."
 kf21_production: "KF-21 생산"
 north_korea_trade_deals: "북한 무역 협정"
 KOR_joint_peace: "평화로 가는 길"
 KOR_joint_peace_desc: "수십 년간 동결된 적대 관계 끝에, 우리 국가는 휴전선 너머의 형제들과 진정한 평화를 향한 첫걸음을 내디딜 수 있습니다. 대화의 문을 열어 한민족의 궁극적인 화해를 위한 초석을 다집니다."
 KOR_sunshine_moon_policy: "햇볕정책"
 KOR_sunshine_moon_policy_desc: "햇볕정책의 정신에 따라 우리는 대결이 아닌 포용의 길을 추구할 것입니다. 선의를 키우고, 특사를 교환하며, 비난 수위를 낮춤으로써 남북한 모두 오랜 상처를 치유하기 시작할 수 있습니다."
 KOR_kaesong_industrial: "개성공업지구"
 KOR_kaesong_industrial_desc: "개성공업지구는 북한의 노동력과 남한의 자본이 결합하여 공동의 번영을 일구는 협력의 모델입니다. 이 합작 단지를 재개하고 확장함으로써 우리의 경제를 하나로 묶고, 대결보다 협력이 가지는 가치를 증명할 것입니다."
 KOR_cultural_exchange: "문화 교류"
 KOR_cultural_exchange_desc: "공동 체육 행사, 문화 공연, 학술 교류는 남북이 하나의 역사, 하나의 언어, 하나의 민족을 공유하고 있음을 상기시켜 줄 것입니다. 정치적 대립을 넘어 우리는 모두 같은 한민족입니다."
 KOR_reduce_dmz_militarization: "DMZ 비무장화"
 KOR_reduce_dmz_militarization_desc: "비무장지대는 그 이름과 달리 세계에서 가장 중무장된 지역이었습니다. 서서히 회복되는 신뢰를 바탕으로 접경 지역에서 중화기를 철수하고 감시초소를 철거하여, 세계에서 가장 강력하게 요새화된 이 국경이 마침내 그 이름에 걸맞은 장소가 되도록 할 수 있습니다."
 KOR_pursue_peace_treaty: "평화협정 추진"
 KOR_pursue_peace_treaty_desc: "포성이 멈춘 지 70년이 넘었지만 한국전쟁은 공식적으로 끝나지 않았습니다. 오랫동안 지체된 평화협정에 서명함으로써 마침내 이 어두운 장을 덮고 정전을 진정한 평화로 대체할 수 있습니다."
 KOR_improve_relations: "관계 개선"
 KOR_improve_relations_desc: "공식적인 평화가 정착됨에 따라 우리는 관계를 한층 더 심화할 수 있습니다. 더 긴밀한 정치적 대화, 상호 외교적 승인, 그리고 공동 제도 구축은 분단 이후 그 어느 때보다 두 국가를 가깝게 만들 것입니다."
 KOR_our_true_enemy: "우리의 진정한 적"
 KOR_our_true_enemy_desc: "너무나 오랜 세월 동안 한민족은 서로 대립해 왔으며, 그동안 우리의 진정한 역사적 적수인 일제와 그 현대적 계승자는 책임에서 벗어나 있었습니다. 우리의 공통된 불만을 외부로 돌림으로써 남북 간의 유대를 더욱 굳건히 할 수 있습니다."
 KOR_reunification: "재통일"
 KOR_reunification_desc: "이제 마지막 단계를 밟을 때가 되었습니다. 이 순간에 먼저 도달한 쪽이 상대방에게 하나의 정부, 하나의 국가, 하나의 민족으로 이루어지는 완전한 통일의 기회를 제안할 것입니다. 상대방이 이를 수락한다면 그들을 자국 체제로 흡수하여 한민족은 다시 한번 온전한 하나가 될 것입니다."
 KOR_confederation: "조선 연방"
 KOR_confederation_desc: "완전히 다른 두 체제를 완전히 흡수 통합하는 대신 연방제를 제안합니다. 이는 평양이 주도하고 서울이 자치권을 유지하는 느슨한 형태의 연방입니다. 남한은 연방의 구성국이 되어, 어느 체제도 해체하지 않고 분단을 종식시킬 수 있습니다."
 KOR_reunification_talks_failed_tt: "§R대한민국의 재통일 제안이 거부되었습니다.§!"
 NKO_reunification_talks_failed_tt: "§R조선민주주의인민공화국의 재통일 제안이 거부되었습니다.§!"
 KOR_confederation_talks_failed_tt: "§R대한민국이 연방제 제안을 거부했습니다.§!"
 KOR_combined_aerospace_renaissance: "통합 항공우주 르네상스"
 KOR_combined_aerospace_renaissance_desc: "북한의 엔진 기술력과 남한의 스텔스 및 항공전자 공학 노하우를 단일 항공우주 사업으로 결집합니다. 조종사들은 합동 훈련을 실시하고 기술자들은 구 DMZ를 넘어 청사진을 자유롭게 공유할 것입니다."
 NKO_research_slots_recalculated_tt: "§Y통합된 경제 규모에 맞춰 연구 슬롯이 재계산됩니다§!"
 NKO_inherit_kor_special_projects_tt: "§Y남한이 완료한 모든 특수 프로젝트를 계승합니다§!"
 campaign_for_UNSC_seat_USA_desc: "국은 1945년 유엔 창설 이래로 안전보장이사회 상임이사국 자리를 유지해 왔습니다. 상임이사국 진출을 위한 어떠한 시도든 미국의 지지는 필수 불가결합니다. 우리 외교관들은 안보리에 진출한 통일 민주주의 한국이 동아시아에서 미국의 전략적 이익에 부합한다는 점을 그들에게 설득해야만 합니다."
 campaign_for_UNSC_seat_FRA_desc: "프랑스는 1945년 이래로 안전보장이사회 상임이사국 자리를 유지해 왔으며, 다자주의와 국제법을 수호하기 위해 자신들의 지위를 적극적으로 활용하고 있습니다. 규칙 기반 질서에 대한 프랑스의 오랜 관심과 한국이 겪은 역사적 고충에 호소함으로써, 우리는 상임이사국 진출에 대한 그들의 지지를 얻어낼 수 있을 것입니다."
 campaign_for_UNSC_seat_ENG_desc: "영국은 유엔 안전보장이사회 5개 상임이사국 중 하나입니다. 전후 국제 질서에서 영국이 수행해 온 역할을 고려할 때, 영국 정부의 지지는 각별한 무게를 지닙니다. 우리의 상임이사국 진출에 대한 그들의 지지를 얻어내려면 굳건한 양자 관계를 바탕으로 한 조직적인 외교적 노력이 필요합니다."
 campaign_for_UNSC_seat_SOV_desc: "러시아는 소련으로부터 승계받은 유엔 안전보장이사회 5개 상임이사국 자리 중 하나를 보유하고 있으며, 자신들이 반대하는 어떠한 후보국에 대해서도 거부권을 행사할 수 있습니다. 모스크바의 지지를 얻어내려면 능숙한 외교가 필요합니다. 우리는 안보리에서 한국의 목소리가 커지더라도 그들의 지역적 이익을 위협하지 않는다는 점을 러시아 측에 확신시켜야 합니다."
 campaign_for_UNSC_seat_CHI_desc: "중국은 중화인민공화국이 중화민국을 대체한 1971년 이래로 안전보장이사회 상임이사국 자리를 유지해 왔습니다. 중국의 지지를 확보하는 것은 가장 까다로운 과제입니다. 중국은 역사적으로 자국의 영향력을 희석시킬 수 있는 어떠한 상임이사국 확대 시도에도 반대해 왔기 때문입니다. 그들의 지지를 얻어내기 위해서는 양국 관계의 실질적인 개선이 전제되어야만 합니다."
 become_a_UNSC_state_desc: "5개 상임이사국 모두가 우리의 입후보를 지지하는 공식적인 입장을 표명함에 따라, 우리는 이제 한국의 상임이사국 진출 신청서를 공식적으로 제출할 수 있습니다. 안보리 진출이 성사되면 한국은 여섯 번째 거부권 보유국이 되어 국제 안보 결정을 주도할 권한을 얻게 되며, 세계적 강대국으로서의 지위 또한 확고해질 것입니다. 아울러 이는 국내 정치적 입지 역시 크게 격상시킬 것입니다."
 KOR_core_inherited_territory_desc: "송강, 랴오닝, 지린, 그리고 프리모리에가 우리의 통제 하에 들어왔으니, 이제 이 영토들을 대한민국에 통합하는 길고 긴 과정을 시작할 수 있습니다. 행정적 핵심 주를 수립하는 것은 과거 발해 시대에 한민족이 거주했으며, 훗날 간도협약 하에 조선인이 정착했던 이 땅에 대한 우리의 법적 영유권을 확고히 다져줄 것입니다."