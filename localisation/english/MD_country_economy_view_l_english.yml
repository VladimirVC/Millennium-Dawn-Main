 military_factory_employment_button_tt: "§YMilitary Factories Employment§!"
 military_factory_employment_button_delayed_tt: "When we have more jobs than workers, it may be beneficial in certain situations to increase or decrease how many workers we allocate to each sector (factories/offices) to allow for more workers to go to the other sectors.\n\nPolitical Power: §R-20§!\n\n£click_left §YL Click§! to increase employment level of Military Factories.\n£click_right §YR Click§! to decrease it.\n\nCurrent Target Employment Level is: §Y[?ROOT.military_factory_employment_var|%]§!"
