 GENERIC_krepost_state_defense_bureau_desc: "A shadowy state-licensed exporter specializing in MANPADS and anti-tank guided missiles, supplying clients through unmarked intermediaries."
 GENERIC_north_plains_heavy_industries_desc: "A sprawling Soviet-legacy plant producing infantry weapons at scale, optimized for high-volume output over quality."
 GENERIC_sentinel_grid_networks_desc: "A signals and C2 contractor offering kill-chain compression solutions to militaries lacking integrated command infrastructure."
 GENERIC_brunn_heavy_engineering_werke_desc: "A central European engineering house with Habsburg-era roots, producing licensed and original artillery systems."
 GENERIC_reichswerke_konstrukt_dynamik_desc: "A dual-track Mitteleuropa arms developer covering tracked artillery and main battle tank platforms."
 GENERIC_vector_defense_labs_desc: "A cost-focused missile defense integrator built on the doctrine that interception-per-dollar outperforms gold-plating."
 GENERIC_marshall_tractor_works_desc: "A tank-factory collective operating on inherited Soviet production methodology, emphasizing volume and repairability."
 GENERIC_vanderlind_hartwell_systems_desc: "A Beltway prime contractor leveraging political connections to secure armored vehicle and IFV programs at scale."
 GENERIC_mil_kamov_rotorworks_desc: "A rotorcraft bureau rooted in Soviet attack and transport helicopter design, known for durability over sophistication."
 GENERIC_helitech_avionique_desc: "A boutique Anglo-Italian avionics and helicopter integration firm, offering high-quality electronics at a premium."
 GENERIC_aurora_aerodynamics_corporation_desc: "A classified skunkworks operation producing cutting-edge fighter and multi-role aircraft for discerning defense customers."
 GENERIC_societe_europeenne_daerostructures_desc: "A pan-European workshare consortium specializing in large aircraft structures, transport platforms, and maritime patrol aircraft."
 GENERIC_southwestern_aerospace_dynamics_bureau_desc: "A directorate-run bureau producing multi-role and strategic air platforms under strict government oversight."
 GENERIC_skyforge_autonomous_systems_desc: "A Silicon Valley-adjacent firm applying move-fast startup culture to autonomous strike drone development."
 GENERIC_compagnie_aeronatique_darmement_desc: "A French-heritage arms house offering cross-platform munitions standards for fighters, naval aircraft, and guided missiles."
 GENERIC_whitehall_strategic_solutions_desc: "A boutique admiralty consultancy turned small-combatant builder, specializing in corvettes and patrol craft."
 GENERIC_triton_maritime_defense_group_desc: "A multinational shipyard network producing destroyers and frigates across multiple partner nations."
 GENERIC_eastern_maritime_shipbuilding_group_desc: "A three-shift continuous-operation shipbuilder producing cruisers and aircraft carriers on compressed schedules."
 GENERIC_sevmorprom_submarine_yards_desc: "A northern Russian submarine yard specializing in cold-water operating depths and export-grade attack and missile platforms."
 GENERIC_halland_civic_engineering_group_desc: "A Nordic industrial conglomerate with dual-use logistics expertise spanning civilian infrastructure and military supply chains."
 GENERIC_second_academy_missile_bureau_desc: "A compartmentalized ballistic and cruise missile research bureau operating under strict need-to-know protocols."
 GENERIC_western_orbital_systems_bureau_desc: "An orbital and strategic systems bureau focused on next-generation delivery vehicles and space-domain awareness."
 GENERIC_central_heavy_atomics_power_desc: "A nuclear-powered propulsion and weapons program combining civilian reactor expertise with naval ballistic missile development."
