 ukraine_parliament.30.t: "Varios escaños en el Parlamento van en contra de nuestro gobierno!"
 ukraine_parliament.30.d: "Algunos miembros del Parlamento se han opuesto a nuestro gobierno, lo que ha llevado a una disminución de nuestro apoyo dentro de la asamblea."
 ukraine_parliament.30.a: "Sucede"
 ukraine_parliament.30.b: "Quizás sus bolsillos han estado un poco vacíos?"
 ukraine_parliament.31.t: "Varios escaños en el Parlamento han comenzado a apoyarnos!"
 ukraine_parliament.31.d: "Algunos miembros del Parlamento han comenzado a elogiar nuestros recientes éxitos, lo que ha llevado a un aumento del apoyo dentro de la asamblea."
 ukraine_parliament.31.a: "Genial"
 ukraine_parliament.32.t: "El Parlamento impulsa más apoyo para los locales!"
 ukraine_parliament.32.d: "El Parlamento ha asignado un gran presupuesto para dar a los locales de todo el país, y nuestra administración se ha enterado, con algunos miembros del gabinete creyendo que el dinero podría asignarse a otro lugar para un mejor uso."
 ukraine_parliament.32.a: "El dinero es para los locales!"
 ukraine_parliament.32.b: "Sí, definitivamente podría usarse en otro lugar"
 ukraine_parliament.33.t: "El Parlamento cuestiona nuestra administración"
 ukraine_parliament.33.d: "Varios miembros del Parlamento han cuestionado recientemente a nuestra administración por \"no satisfacer al pueblo [ROOT.GetAdjective]\". Ha habido muchas luchas internas dentro del Parlamento entre los escaños pro-gobierno y los escaños opositores, y ha llegado al punto en que necesitamos intervenir y dar una respuesta."
 ukraine_parliament.33.a: "Que piensen lo que quieran"
 ukraine_parliament.33.b: "Preparar una respuesta adecuada"
 ukraine_parliament.34.t: "El Parlamento aprueba la moción para aumentar el gasto médico"
 ukraine_parliament.34.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to medical spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.34.a: "El Parlamento tiene la idea correcta"
 ukraine_parliament.34.b: "No, no permitiremos que esta moción pase"
