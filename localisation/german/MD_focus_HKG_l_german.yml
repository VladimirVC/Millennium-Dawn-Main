 HKG_contract_capstone_label: "The Fragrant Harbour Fleet"
 HKG_contract_capstone_progress: "Complete the domestic aircraft carrier programme and field an aircraft carrier to earn the city's naval legacy."
 HKG_contract_capstone_done: "§GThe Fragrant Harbour Fleet sails - Hong Kong is a recognised naval power.§!"
 HKG_contract_capstone_progress_tt: "Fires once the entire aircraft carrier focus branch is complete and Hong Kong has built or retained a aircraft carrier. Grants the §YNaval Power of the Fragrant Harbour§! national spirit."
 HKG_contract_capstone_done_tt: "The capstone has been achieved. The §YNaval Power of the Fragrant Harbour§! national spirit is active and better contract terms may be negotiated."
 HKG_naval_contracts_category: "Naval Procurement Contracts"
 HKG_contract_chi_category: "Hong Kong Shipbuilding"
 HKG_contract_solicit_contract: "Petition Beijing for a Contract"
 HKG_contract_solicit_contract_desc: "Approach the Central Military Commission and request a new warship procurement order. Up to three contracts can run at once; the more you juggle, the longer Beijing allows for each. The class and reward scale with our standing."
 HKG_contract_deliver_destroyer: "Deliver a Destroyer"
 HKG_contract_deliver_destroyer_desc: "Transfer one completed destroyer to the People's Liberation Army Navy. It is credited to your most urgent destroyer contract. Repeat until that contract's quota is met."
 HKG_contract_deliver_frigate: "Deliver a Frigate"
 HKG_contract_deliver_frigate_desc: "Transfer one completed frigate to the People's Liberation Army Navy. It is credited to your most urgent frigate contract. Repeat until that contract's quota is met."
 HKG_contract_deliver_submarine: "Deliver a Submarine"
 HKG_contract_deliver_submarine_desc: "Transfer one completed attack submarine to the People's Liberation Army Navy. It is credited to your most urgent submarine contract."
 HKG_contract_deliver_cruiser: "Deliver a Cruiser"
 HKG_contract_deliver_cruiser_desc: "Transfer one completed cruiser to the People's Liberation Army Navy. It is credited to your most urgent cruiser contract."
 HKG_contract_deliver_carrier: "Deliver the Aircraft Carrier"
 HKG_contract_deliver_carrier_desc: "Transfer a completed aircraft carrier to the People's Liberation Army Navy and fulfil the aircraft carrier contract."
 HKG_contract_negotiate_terms: "Renegotiate Procurement Terms"
 HKG_contract_negotiate_terms_desc: "With the Fragrant Harbour Fleet established, Hong Kong's shipyards command respect. Press Beijing for richer payouts and longer deadlines on all future contracts."
 HKG_contract_need_destroyer_tt: "We must have at least one destroyer in our navy to deliver"
 HKG_contract_need_frigate_tt: "We must have at least one frigate in our navy to deliver"
 HKG_contract_need_submarine_tt: "We must have at least one attack submarine in our navy to deliver"
 HKG_contract_need_cruiser_tt: "We must have at least one cruiser in our navy to deliver"
 HKG_contract_need_carrier_tt: "We must have an aircraft carrier in our navy to deliver"
 HKG_contract_slots_free_tt: "We have a free contract slot (a maximum of three contracts may run at once)"
 HKG_contract_modules_tt: "Our shipyards have researched at least tier-1 of every core warship module: engine, main gun, missiles, torpedoes, sonar and radar"
 HKG_contract_commission_ready_tt: "Hong Kong has a free contract slot and no pending offer"
 HKG_contract_commission_yards_tt: "Hong Kong's shipyards have the core warship module technologies"
 HKG_contract_commission_accept_tt: "Hong Kong receives a procurement contract and begins building the requested warships"
 HKG_contract_tt_unlock: "Unlocks the §YChina Naval Procurement Contracts§! system: build warships for Beijing in exchange for treasury revenue, political power and industrial growth."
 HKG_contract_tt_solicit: "The Central Military Commission will respond with a procurement offer within a few days."
 HKG_contract_tt_accept_advance: "Receive an advance of §G$[?HKG_contract_offer_advance|0]§! into the treasury and §G1000§! manpower, paid on signing the contract."
 HKG_contract_tt_accept_license: "Beijing transfers its approved design - we gain the hull technology to build the [GetHKGContractOfferClass]."
 HKG_contract_tt_accept_onfulfil: "On delivering the full order: the remaining payment clears the treasury, §G[?HKG_contract_offer_pp|0]§! political power and an industrial productivity gain are granted, and a timed dockyard revenue bonus begins."
 HKG_contract_tt_decline: "The offer lapses. There is no penalty, and Beijing may extend another in time."
 HKG_contract_tt_deliver: "Transfer one ship to the People's Liberation Army Navy, credited to your most urgent contract of this class.\n§YThe ship must be sitting in your Reserve Fleet. A ship assigned to a task force cannot be delivered. Move it to the reserve first.§!"
 HKG_contract_tt_deliver_reward: "When a contract's full quota is delivered: the remaining payment clears the treasury, and political power, productivity and a dockyard revenue bonus are granted."
 HKG_contract_tt_negotiate: "All future contracts pay §G25%§! more and allow §G50%§! longer deadlines."
 HKG_contract.1.t: "A Commission from Beijing"
 HKG_contract.1.d_normal: "Beijing's Central Military Commission has approached our shipyards with a procurement order.\n\n§YOrder:§! [?HKG_contract_offer_quota|0] x [GetHKGContractOfferClass]\n§YDeadline:§! [?HKG_contract_offer_deadline|0] days\n§YPayment:§! $[?HKG_contract_offer_funds|0] - $[?HKG_contract_offer_advance|0] and §G1000§! manpower paid on signing, the remainder on delivery\n§YOn completion:§! [?HKG_contract_offer_pp|0] political power, a lasting gain in productivity, and a timed dockyard revenue bonus\n\nThe vessels must be built in our own yards and transferred to the People's Liberation Army Navy. Missing the deadline will sour relations with the mainland."
 HKG_contract.1.d_license: "Beijing's Central Military Commission offers a §Olicense contract§!. The People's Liberation Army Navy will supply its own approved design, and our yards must build it to specification.\n\n§YLicensed design:§! [?HKG_contract_offer_quota|0] x [GetHKGContractOfferClass]\n§YDeadline:§! [?HKG_contract_offer_deadline|0] days\n§YPayment:§! $[?HKG_contract_offer_funds|0] - $[?HKG_contract_offer_advance|0] and §G1000§! manpower paid on signing, the remainder on delivery\n§YOn completion:§! [?HKG_contract_offer_pp|0] political power, a lasting gain in productivity, and a timed dockyard revenue bonus\n\nAccepting transfers the design to our shipyards, granting the hull technology needed to build it. Missing the deadline will sour relations with the mainland."
 HKG_contract.1.a: "Accept the commission"
 HKG_contract.1.b: "Decline - our yards are not ready"
 HKG_contract.2.t: "Contract Fulfilled"
 HKG_contract.2.d: "The last vessel of the order has been handed over to the People's Liberation Army Navy. Beijing is satisfied: the final payment of §Y$[?HKG_contract_last_payment|0]§! has cleared into the treasury, political capital has been released, and our shipyards have earned their reputation. Our standing with the mainland has risen."
 HKG_contract.2.a: "Hong Kong builds the fleet"
 HKG_contract.3.t: "Contract Deadline Missed"
 HKG_contract.3.d: "A contract deadline has passed with the order unfilled. The Central Military Commission has noted Hong Kong's failure to honour its commitment. Beijing's displeasure now weighs on our shipyards and our standing with the mainland has fallen."
 HKG_contract.3.a: "An unfortunate setback"
 HKG_contract.50.t: "The Fragrant Harbour Fleet"
 HKG_contract.50.d: "From subcontractor to shipbuilder of the first rank - Hong Kong's yards have completed the domestic aircraft carrier programme and put an aircraft carrier to sea. What began as procurement contracts for Beijing has grown into a shipbuilding industry that answers to no one. The Fragrant Harbour Fleet is born, and with it Hong Kong takes its place among the naval powers."
 HKG_contract.50.a: "The city sails"
 HKG_contract_dockyard_revenue: "Procurement Dividend"
 HKG_contract_dockyard_revenue_desc: "A fulfilled contract for Beijing keeps Hong Kong's dockyards busy and profitable. Naval construction draws steady revenue while the order books stay full."
 HKG_contract_beijing_displeasure: "Beijing's Displeasure"
 HKG_contract_beijing_displeasure_desc: "Hong Kong failed to deliver a contracted order on time. The Central Military Commission has lost confidence in the city's shipyards, and the political cost is felt across the administration."
 HKG_contract_naval_power: "Naval Power of the Fragrant Harbour"
 HKG_contract_naval_power_desc: "Hong Kong's shipyards built a carrier of their own and proved themselves equal to any in Asia. The city's naval industry is now a permanent strategic asset."
 HKG_carrier_home: "An Aircraft Carrier for Hong Kong"
 HKG_carrier_home_desc: "Building a domestic aircraft carrier is the most ambitious project the city has ever attempted. It begins with the slipways, the dry docks, and the political will to see it through."
 HKG_carrier_construction: "Lay Down the Hull"
 HKG_carrier_construction_desc: "Eastern Maritime Shipbuilding Group breaks ground on the carrier's hull. The work draws on every yard and welder Hong Kong can spare."
 HKG_carrier_construction2: "Fit Out the Aircraft Carrier"
 HKG_carrier_construction2_desc: "With the hull complete, the aircraft carrier moves to fitting-out. Power plant, command spaces, and the island superstructure are installed dockside."
 HKG_carrier_modules: "Aircraft Carrier Systems Integration"
 HKG_carrier_modules_desc: "Modern carrier modules are integrated into the design: catapults, arrestor gear, and damage-control systems, drawing on hard-won naval experience."
 HKG_flight_deck_limitations: "Overcome the Flight Deck Limitations"
 HKG_flight_deck_limitations_desc: "Hong Kong's first flight deck is cramped by Western standards. Engineers rework the deck layout to launch and recover aircraft at a usable tempo."
 HKG_carrier_special_airwing: "Train the Aircraft Carrier Air Wing"
 HKG_carrier_special_airwing_desc: "An aircraft carrier is only as capable as the pilots who fly from it. Hong Kong invests in a dedicated naval air wing trained for deck operations."
 HKG_carrier_defensive_weapons: "Aircraft Carrier Self-Defence Suite"
 HKG_carrier_defensive_weapons_desc: "Close-in weapon systems, point-defence missiles, and electronic countermeasures are fitted so the aircraft carrier can survive without leaning entirely on its escorts."
 HKG_carrier_logistics: "Aircraft Carrier Support Infrastructure"
 HKG_carrier_logistics_desc: "An aircraft carrier demands a home port equal to the task: deep-water berths, ammunition stores, and the logistics tail to keep it at sea."
 HKG_expanded_shipyards: "Expand the Shipyards"
 HKG_expanded_shipyards_desc: "Hong Kong's dockyards are pushed to their limit. New slipways and dry docks expand the city's capacity to build and repair warships."
 HKG_expanded_trade_capacity: "Expand Trade Capacity"
 HKG_expanded_trade_capacity_desc: "As one of the world's great entrepôts, Hong Kong invests in the port and industrial capacity needed to keep goods moving through the harbour."
 HKG_expanded_searoutes: "Secure the Sea Routes"
 HKG_expanded_searoutes_desc: "Hong Kong's prosperity rides on open shipping lanes. The administration deepens trade ties with its maritime neighbours to keep the routes secure."
 HKG_expanded_inland_routes: "Expand the Inland Routes"
 HKG_expanded_inland_routes_desc: "Beyond the harbour, Hong Kong strengthens the rail and road links that tie it to the mainland and feed its industry."
 HKG_offshore_industry: "Develop Offshore Industry"
 HKG_offshore_industry_desc: "Land in Hong Kong is scarce and dear. The city turns to reclaimed and offshore sites to make room for new industrial complexes."
 HKG_offshore_industry2: "Expand Offshore Industry"
 HKG_offshore_industry2_desc: "The offshore industrial programme proves its worth. Further reclamation and construction push Hong Kong's manufacturing base out across the water."
 HKG_housing_policy_modifier: "Housing Policy"
 HKG_housing_policy_modifier_desc: "The cumulative weight of Hong Kong's housing decisions, felt across construction, the public purse, and the patience of its people. Each step in the housing programme shifts these figures for better or worse."
 HKG_small_house_policy: "Reform the Small House Policy"
 HKG_small_house_policy_desc: "The colonial-era Small House Policy grants indigenous New Territories villagers the right to build a low-rise home on ancestral land. Reforming it frees up vast tracts for higher-density development, but the rural establishment will resist any change to their inherited privileges."
 HKG_brownfield_consolidation: "Consolidate the Brownfields"
 HKG_brownfield_consolidation_desc: "Hundreds of hectares in the New Territories sit under open-air storage yards, scrapyards, and container parks. Consolidating these brownfield sites into multi-storey facilities unlocks the land beneath for housing without a single reclamation barge."
 HKG_revitalise_private_market: "Revitalise the Private Market"
 HKG_revitalise_private_market_desc: "With public competition cleared away, the government turns to the developers. Streamlined approvals, relaxed plot ratios, and tax incentives are offered to bring private flats to market faster."
 HKG_relax_mortgage_rules: "Relax the Mortgage Rules"
 HKG_relax_mortgage_rules_desc: "The Monetary Authority loosens loan-to-value ratios and stress-test thresholds. First-time buyers can finally clear the down-payment hurdle, though critics warn of the leverage being loaded onto household balance sheets."
 HKG_vacancy_tax: "Impose a Vacancy Tax"
 HKG_vacancy_tax_desc: "A punitive levy on new flats left unsold and unoccupied. Developers can no longer drip-feed completed units onto the market to keep prices high; the speculative warehousing of homes ends."
 HKG_light_public_housing: "Light Public Housing"
 HKG_light_public_housing_desc: "Prefabricated, modular estates built on idle government land as a stopgap for families stranded on the waiting list. Cheap and quick to erect, they buy the Housing Authority the years it needs to build permanently."
 HKG_tenancy_control: "Regulate Subdivided Flats"
 HKG_tenancy_control_desc: "Rent caps, mandatory written leases, and minimum standards are imposed on the city's notorious subdivided units. Landlords lose their free hand; the tens of thousands trapped in partitioned cubicles gain a measure of protection."
 HKG_starter_homes_scheme: "Starter Homes Scheme"
 HKG_starter_homes_scheme_desc: "A new ownership tier pitched at young professionals priced out of both public housing and the private market. Sold below market rate with resale restrictions, the scheme rebuilds the first rung of the property ladder."
 HKG_artificial_islands: "Artificial Islands Programme"
 HKG_artificial_islands_desc: "A programme of large-scale artificial islands in the central waters, conceived to house hundreds of thousands and anchor a new metropolitan district. The cost runs into the hundreds of billions and the environmental objections are fierce, but the gain in usable land is unmatched."
 HKG_northern_metropolis: "The Northern Metropolis"
 HKG_northern_metropolis_desc: "A sweeping development blueprint for the New Territories bordering Shenzhen, knitting Hong Kong into the Greater Bay Area. New towns, rail links, and an innovation belt are planned across the northern frontier."
 HKG_country_park_periphery: "Develop the Country Park Periphery"
 HKG_country_park_periphery_desc: "The least ecologically valuable fringes of the protected country parks are opened to construction. Conservationists are appalled at the precedent; the government insists the land is too valuable to leave fallow amid a housing crisis."
 HKG_redevelop_old_estates: "Redevelop the Aging Estates"
 HKG_redevelop_old_estates_desc: "The oldest public estates, built in the boom decades and now decaying, are demolished and rebuilt to modern density. Residents are decanted and rehoused; the same footprint yields far more flats."
 HKG_abolish_subdivided_flats: "Abolish the Subdivided Flats"
 HKG_abolish_subdivided_flats_desc: "With enough new housing finally online, the government moves to outlaw the subdivided cubicles and cage homes that shamed the city for a generation. The era of partitioned tenements is brought to a close."
 HKG_urban_renewal_push: "Empower the Urban Renewal Authority"
 HKG_urban_renewal_push_desc: "The Urban Renewal Authority is given expanded compulsory-purchase powers and a larger war chest to clear and rebuild blighted districts. Old Kowloon and the harbourfront are remade block by block."
 HKG_smart_city_housing: "Smart City Housing"
 HKG_smart_city_housing_desc: "New estates are wired from the ground up: integrated transport, district cooling, and digital governance. Hong Kong's housing stock becomes a showcase for the smart-city ambitions of the Greater Bay Area."
 HKG_housing_for_all: "A Home for Every Hongkonger"
 HKG_housing_for_all_desc: "The decades-long crisis is declared over. The waiting list is cleared, the subdivided flats are gone, and ownership is once again within reach of an ordinary family. A generation that grew up resigned to renting can finally aspire to a home of its own."
 HKG_naval_contracts_category_desc: "Build warships for Beijing and deliver them on time to raise Hong Kong's standing with the mainland.\n§YTo deliver a ship it must be sitting in your Reserve Fleet. A ship assigned to a task force cannot be delivered. Move it to the reserve first.§!"
 HKG_contract_acquire_pearl_river: "Petition for the Pearl River Delta"
 HKG_contract_acquire_pearl_river_desc: "Hong Kong's shipyards have served Beijing faithfully and earned the mainland's full confidence. Use that standing to ask the Central Military Commission to cede the Pearl River Delta, doubling the city's industrial base."
 HKG_contract_max_standing_tt: "Our standing with the mainland must be at its maximum"
 HKG_contract_pearl_river_accept_tt: "Beijing cedes the Pearl River Delta to Hong Kong"
 HKG_contract_commission_destroyers: "Commission Destroyers from Hong Kong"
 HKG_contract_commission_destroyers_desc: "Order a class of destroyers from Hong Kong's shipyards. Beijing will then decide which design to share for the build."
 HKG_contract_commission_frigates: "Commission Frigates from Hong Kong"
 HKG_contract_commission_frigates_desc: "Order a class of frigates from Hong Kong's shipyards. Beijing will then decide which design to share for the build."
 HKG_contract_commission_submarines: "Commission Submarines from Hong Kong"
 HKG_contract_commission_submarines_desc: "Order a class of attack submarines from Hong Kong's shipyards. Beijing will then decide which design to share for the build."
 HKG_contract_commission_cruisers: "Commission Cruisers from Hong Kong"
 HKG_contract_commission_cruisers_desc: "Order a class of cruisers from Hong Kong's shipyards. Beijing will then decide which design to share for the build."
 HKG_contract_commission_carriers: "Commission Aircraft Carriers from Hong Kong"
 HKG_contract_commission_carriers_desc: "Order an aircraft carrier from Hong Kong's shipyards. Beijing will then decide which design to share for the build."
 HKG_contract_yard_slack_tt: "Our shipyards have spare capacity to take on another contract and still deliver on time"
 HKG_contract.10.t: "Which Design for Hong Kong?"
 HKG_contract.10.desc: "The order is set: [GetHKGContractPickClass]. Now the Central Military Commission must decide what design Hong Kong's yards will build. We may transfer one of our own approved designs under license, or simply let the Special Administrative Region build to the best of its own ability."
 HKG_contract.10.a: "Share our finest design (full license, premium terms)"
 HKG_contract.10.b: "Share a proven design (standard license)"
 HKG_contract.10.c: "Share an export-grade design (license, Hong Kong funds more)"
 HKG_contract.10.d: "Let Hong Kong build their best"
 HKG_contract.20.t: "A Petition from the Fragrant Harbour"
 HKG_contract.20.d: "Hong Kong has built our fleet without fail, and now asks a reward of its own: the cession of the Pearl River Delta to its administration. The shipyards of the south would feed the city's industry, and a loyal subcontractor would become a regional powerhouse. The funds are already on the table."
 HKG_contract.20.a: "Grant the Pearl River Delta"
 HKG_contract.20.b: "The mainland will not be carved up"
 HKG_contract.21.t: "The Delta Comes Home"
 HKG_contract.21.d: "Beijing has agreed. The Pearl River Delta now answers to Hong Kong, its factories and shipways folded into the city's economy. The Fragrant Harbour is no longer a single crowded island but the heart of a southern industrial belt."
 HKG_contract.21.a: "An industrial powerhouse rises"
 HKG_contract.22.t: "Beijing Declines"
 HKG_contract.22.d: "The Central Military Commission has refused to cede the Pearl River Delta. The mainland's territorial integrity is not for sale, however loyal the shipyards. Our payment has been returned."
 HKG_contract.22.a: "We will ask again in time"
 HKG_contract.30.t: "Delivery Failed"
 HKG_contract.30.d: "No ship was handed over. The vessel chosen for delivery is assigned to a task force, and a flagship cannot be transferred.\n§YMove the ship into your Reserve Fleet, then use the delivery decision again.§! No contract credit has been given."
 HKG_contract.30.a: "Move it to the reserve and try again"
 HKG_contract_resource_access: "Mainland Supply Line"
 HKG_contract_resource_access_desc: "An active naval procurement contract opens preferential access to mainland supply chains. Beijing routes raw materials to the city's yards at a fraction of the usual cost while the order books stay full."
 HKG_contract_resource_access_tt: "§GResources imported from China are far cheaper while the contract runs.§!"
 HKG_contract_shipbuilding_legacy: "Shipbuilding Legacy"
 HKG_contract_shipbuilding_legacy_desc: "Every warship delivered to the mainland sharpens Hong Kong's yards. Each completed order adds a permanent 1% to naval dockyard output."