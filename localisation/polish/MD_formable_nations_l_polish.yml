 form_HBL_category: "Beneluks"
 form_HBL_category_desc: "Beneluks to unia polityczno-gospodarcza, w skład której wchodzą narody Holandii, Belgii i Luksemburga tworzące grupę. Historycznie rzecz biorąc, narody składające się z trzech państw utrzymują ze sobą przyjazne i serdeczne stosunki. Obecna organizacja to zwykły związek państw zajmujący się kwestiami politycznymi i gospodarczymi na arenie światowej. Toczą się ciche rozmowy na temat potencjalnego sformalizowania tej unii państw w coś bardziej konkretnego. Nowy naród, który będzie reprezentował ludy Nizin, zapewni ludziom nową przyszłość i poprowadzi ich ku tej świetlanej przyszłości."
 HBL_integrate_start: "Begin forming [GetHBLNameDef]"
 HBL_integrate_start_desc: "It is time to begin forming the Benelux.\n\n"
 HBL_integrate_BEL: "Integrate [GetHBLNameAdj] [BEL.GetAdjective] Territories"
 HBL_integrate_BEL_desc: "Belgia nie jest największym ani najmniejszym z krajów Beneluksu. Zajmuje wygodne miejsce pośrodku, podobnie jak w przypadku pozostałych dwóch państw członkowskich. Znajduje się w nim kilka centrów biurokracji Unii Europejskiej w Brukseli i jest popularnym kierunkiem turystycznym dla turystów z Holandii, Francji i spoza UE."
 HBL_integrate_HOL: "Integrate [GetHBLNameAdj] [HOL.GetAdjective] Territories"
 HBL_integrate_HOL_desc: "Holandia jest największym z trzech państw członkowskich Beneluksu. Obejmuje większość populacji, powierzchni lądowej i wielkości gospodarczej oraz jest gospodarzem kilku posiadłości zamorskich. Integracja Holandii wprowadza większość Beneluksu do nowego państwa i znacznie wzmacnia legitymację naszej nowej unii."
 HBL_integrate_LUX: "Integrate [GetHBLNameAdj] [LUX.GetAdjective] Territories"
 HBL_integrate_LUX_desc: "Luksemburg jest najmniejszym z trzech narodów. Utrzymuje największy PKB na mieszkańca i ma kilka mniejszych ośrodków turystycznych. Naród posługuje się siatką języków, z których najbardziej godnymi uwagi są francuski, niemiecki i angielski. Integracja Luksemburga nie jest dużym przedsięwzięciem, biorąc pod uwagę wielkość państwa, ale będzie wiązała się z pewnymi wyzwaniami biurokratycznymi."
 HBL_update_flag: "Finish Forming [GetHBLNameDef]"
 HBL_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetHBLNameDef], adopting its unified flag and name."
 is_HBL: "Has formed [GetHBLNameDef]"
 form_USNA_category: "Zjednocz Amerykę Północną"
 form_USNA_category_desc: "Kontynent północnoamerykański historycznie odrzucał wpływy zagraniczne, odkąd Meksyk, Stany Zjednoczone i Kanada zostały założone jako państwa narodowe. Stanowią one kręgosłup światowej gospodarki, z łącznym PKB wynoszącym jedenaście bilionów na początku nowego tysiąclecia. Zjednoczenie narodów i skupienie się na wspanialszym jutrze pozwoli nam iść naprzód w przyszłość."
 USNA_integrate_start: "Begin forming [GetUSNANameDef]"
 USNA_integrate_start_desc: "It is time to begin forming the North American Federation.\n\n"
 USNA_integrate_CAN: "Integrate [GetUSNANameAdj] [CAN.GetAdjective] Territories"
 USNA_integrate_CAN_desc: "Kanada jest największym krajem w ramach nowej unii pod względem powierzchni i posiada wiele niewykorzystanych zasobów ropy naftowej. Już same te dwa fakty czynią Kanadę integralnym elementem nowej układanki Unii Ameryki Północnej. Miejmy nadzieję, że apologetyka zostanie zminimalizowana w miarę dalszej integracji z nowym narodem."
 USNA_integrate_USA: "Integrate [GetUSNANameAdj] [USA.GetAdjective] Territories"
 USNA_integrate_USA_desc: "Stany Zjednoczone stanowią większość Unii Państw Ameryki Północnej. Ma największą gospodarkę, drugi co do wielkości obszar lądowy, wojsko i nie tylko. Integracja Stanów Zjednoczonych niesie ze sobą wiele wyzwań ze względu na ich rozmiar i wagę na arenie międzynarodowej; jednakże ta integracja zapewni nam pozycję największego superpotęgi na świecie pod względem ekonomicznym."
 USNA_integrate_MEX: "Integrate [GetUSNANameAdj] [MEX.GetAdjective] Territories"
 USNA_integrate_MEX_desc: "Meksyk jest drugim pod względem liczby ludności krajem z trzech narodów tworzących nowe państwo. Powołuje do życia dużą armię. Naród stoi przed kilkoma wyzwaniami, takimi jak gęstość karteli. Niemniej jednak integracja Meksyku będzie jednym z głównych punktów skupienia nowego narodu."
 USNA_update_flag: "Finish Forming [GetUSNANameDef]"
 USNA_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetUSNANameDef], adopting its unified flag and name."
 is_USNA: "Has formed [GetUSNANameDef]"
 form_UTS_category: "Zjednoczyć Terytoria Tureckie"
 form_UTS_category_desc: "Zjednoczone Terytoria Tureckie to związek narodów tureckojęzycznych, w tym Uzbekistanu, Kirgistanu, Kazachstanu i Turkmenistanu. Inne grupy ludów mówiących po turecku poza granicami tych krajów, takie jak Tatarzy i Ujgurowie, istnieją w Rosji i Chinach. Są one celem naszej Unii, ale nie pierwotnym. Zjednoczymy istniejące obecnie państwa narodowe i zachęcimy naszych ludzi do powrotu do domu lub sprowadzimy ich z powrotem do owczarni."
