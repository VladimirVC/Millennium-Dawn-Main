 belarus_character.1.t: "Эпоха Лукашенко"
 belarus_character.1.d: "Александр Григорьевич Лукашенко проделал долгий путь от рядового депутата до президента страны. Несмотря на то, что он лишь недавно вступил в должность главы Беларуси, многие влиятельные силы уже мечтают о его свержении. Найдет ли он лучший путь для Беларуси или станет еще одним диктатором, цепляющимся за власть пожизненно?"
 belarus_character.1.a: "Наш батька Лукашенко, мать-Беларуси"
 belarus_character.2.t: "Либерально-демократическая Беларусь"
 belarus_character.2.d: "Сергей Гайдукевич — выдающаяся личность с интересным прошлым и твердыми взглядами на будущее Беларуси. Его явно считают пророссийским политиком, но оправдает ли он эту репутацию?"
 belarus_character.2.a: "Беларусь превыше всего"
 belarus_character.3.t: "Европейский путь Беларуси"
 belarus_character.3.d: "Беларусь наконец-то отвергла советское прошлое и двинулась навстречу светлому европейскому будущему. Но нам предстоит решить, каким путем мы войдем в эту новую эпоху."
 belarus_character.3.a: "Либерализм - это наш путь"
 belarus_character.3.b: "Консерватизм - это наше все"
 belarus_character.4.t: "Националисты в Беларуси"
 belarus_character.4.d: "Зенон Позняк, пришедший к власти, давно известен своей антироссийской риторикой. Его главное убеждение заключается в том, что Россия на протяжении всей истории подавляла белорусов. Он намерен положить этому конец и, возможно, отомстить за это."
 belarus_character.4.a: "Белорусы - не русские"
 belarus_character.5.t: "Красная Беларусь"
 belarus_character.5.d: "Стремление Беларуси постепенно отдалиться от советского прошлого в конечном итоге снова затянуло её в лапы коммунизма. Люди помнят хорошие времена СССР и, по-видимому, решили их возродить."
 belarus_character.5.a: "Давайте вернем советское наследие"
 belarus_ukraine.1.t: "Полк Кастуся Калиновского"
 belarus_ukraine.1.d: "Белорусы присылают нам помощь в виде целого полка. Вместе мы будем бороться с российской агрессией"
 belarus_ukraine.1.a: "Долой Россию и ее имперские амбиции"
 belarus_ukraine.2.t: "Отправить добровольцев в Новороссию?"
 belarus_ukraine.2.d: "Среди населения есть те, кто хочет помочь жителям Новороссии в их борьбе. Мы готовы оказать им помощь."
 belarus_ukraine.2.a: "Отправить волонтеров"
 belarus_ukraine.2.b: "Мы осуждаем тех, кто отправляется добровольцем в Новороссию, потому что это незаконно"
 belarus_ukraine.3.t: "Беларусь предлагает Минск в качестве платформы для мирных переговоров"
 belarus_ukraine.3.d: "Беларусь предлагает Минск в качестве города для переговоров по установлению мира в Украине. Согласимся ли мы заключить перемирие с сепаратистами?"
 belarus_ukraine.3.a: "Мир - это то, к чему мы должны стремиться!"
 belarus_ukraine.3.b: "Мы вернем территориальную целостность Украины!"
 belarus_ukraine.4.t: "Спецоперация в Украине"
 belarus_ukraine.4.d: "Россия начала специальную операцию на Украине. Наше руководство стоит перед выбором — участвовать или нет. У нас много обязательств, но мы должны тщательно обдумать, прежде чем ввязываться в эту бойню."
 belarus_ukraine.4.a: "Украина должна быть освобождена!"
 belarus_ukraine.4.b: "Мы не будем в этом участвовать"
 belarus_export.2.t: "Первые образцы Т-72БМ1"
 belarus_export.2.d: "Мы наконец завершили модификацию танка Т-72. Теперь мы сможем производить его для нужд нашей армии."
 belarus_export.2.a: "Слава белорусскому оружию"
 belarus_export.3.t: "Первые образцы \"Белграда\""
 belarus_export.3.d: "Мы наконец завершили модификацию БМ-21. Теперь мы сможем производить его для нужд нашей армии."
 belarus_export.3.a: "Слава белорусскому оружию"
 belarus_export.4.t: "Первые образцы \"Полонеза\""
 belarus_export.4.d: "Мы наконец-то завершили разработку нашей РСЗО «Полонез». Теперь мы сможем производить её для нужд нашей армии."
 belarus_export.4.a: "Слава белорусскому оружию"
 belarus_export.6.t: "Беларусь предлагает купить тракторы"
 belarus_export.6.d: "Белорусский завод МТЗ предлагает нам свой новейший трактор. Он окажет большую помощь в развитии нашего агропромышленного комплекса."
 belarus_export.6.a: "Мы согласны приобрести их"
 belarus_export.6.b: "Они нам не нужны"
 belarus_export.7.t: "Наши трактора были куплены"
 belarus_export.7.d: "[FROM.GetNameWithFlag] согласился заключить с нами контракт на поставку тракторов."
 belarus_export.7.a: "Отлично"
 belarus_export.8.t: "Наши трактора решили не покупать"
 belarus_export.8.d: "[FROM.GetNameWithFlag] отказался подписать с нами контракт на поставку тракторов."
 belarus_export.8.a: "Обидно"
 belarus_export.9.t: "Контракт с белорусским Минотором"
 belarus_export.9.d: "Мы давно хотели сотрудничать с этим белорусским предприятием. Они будут ремонтировать нашу колесную военную технику, что принесет нам большую пользу."
 belarus_export.9.a: "Прекрасно"
 belarus_export.10.t: "Контракт с 558 авиаремонтным заводом"
 belarus_export.10.d: "Белорусские инженеры предлагают нам свои услуги по ремонту авиационной техники. Согласимся ли мы подписать с ними контракт?"
 belarus_export.10.a: "Конечно, это хорошее предложение"
 belarus_export.10.b: "Нет, мы откажемся от их предложения"
 belarus_export.11.t: "Новый контракт с 558 авиаремонтным заводом"
 belarus_export.11.d: "[FROM.GetNameWithFlag] заключил контракт с 558-м авиаремонтным заводом."
 belarus_export.11.a: "Отлично"
 belarus_export.12.t: "Контракт с 558 авиаремонтным заводом был отклонен"
 belarus_export.12.d: "[FROM.GetNameWithFlag] отказался от контракта с 558-м авиаремонтным заводом."
 belarus_export.12.a: "Обидно"
 belarus_export.13.t: "Договор с компанией Пеленг"
 belarus_export.13.d: "Белорусская компания Пеленг, специализирующаяся на электронике, готова предложить свои услуги по поставке приборов наведения для оружия ПТУР. Согласимся ли мы на этот контракт?"
 belarus_export.13.a: "Конечно, это хорошее предложение"
 belarus_export.13.b: "Нет, мы откажемся от их предложения"
 belarus_export.14.t: "Новый контракт с компанией Пеленг"
 belarus_export.14.d: "[FROM.GetNameWithFlag] заключил контракт с компанией Peleng на поставку оборудования для противотанковых управляемых ракет."
 belarus_export.14.a: "Отлично"
 belarus_export.15.t: "Договор с компанией Пеленг был отклонен"
 belarus_export.15.d: "[FROM.GetNameWithFlag] отказался от контракта с компанией Peleng на поставку оборудования для противотанковых управляемых ракет."
 belarus_export.15.a: "Обидно"
 belarus_export.16.t: "Белорусские ПТУРы"
 belarus_export.16.d: "Белорусские производители хотят предложить нам свои ПТУР для поставки. Согласимся ли мы принять этот контракт?"
 belarus_export.16.a: "Конечно, это хорошее предложение"
 belarus_export.16.b: "Нет, мы откажемся от их предложения"
 belarus_export.17.t: "Продажа ПТУР"
 belarus_export.17.d: "Договор купли-продажи наших ПТУР компании [FROM.GetNameWithFlag] заключен."
 belarus_export.17.a: "Отлично"
 belarus_export.18.t: "Продажа ПТУР"
 belarus_export.18.d: "Договор купли-продажи наших ПТУР компании [FROM.GetNameWithFlag] был отклонен."
 belarus_export.18.a: "Обидно"
 belarus_export.19.t: "Белорусское шасси"
 belarus_export.19.d: "Белорусские производители готовы предложить свои шасси для ряда нашей военной техники. Согласимся ли мы на этот контракт?"
 belarus_export.19.a: "Конечно, это хорошее предложение"
 belarus_export.19.b: "Нет, мы откажемся от их предложения"
 belarus_export.20.t: "Контракт на поставку шасси"
 belarus_export.20.d: "Они согласились на наш контракт на поставку шасси."
 belarus_export.20.a: "Отлично"
 belarus_export.21.t: "Контракт на поставку шасси"
 belarus_export.21.d: "Они решили расторгнуть наш договор на поставку шасси."
 belarus_export.21.a: "Обидно"
 belarus_export.22.t: "Совместный проект БТР"
 belarus_export.22.d: "[FROM.GetNameWithFlag] предлагает нам совместный проект APC под названием Cobra-K. Этот проект позволит нам получить опыт и знания в модификации устаревшей техники. Согласимся ли мы?"
 belarus_export.22.a: "Конечно, это хорошее предложение"
 belarus_export.22.b: "Нет, мы откажемся от их предложения"
 belarus_export.23.t: "Совместный проект БТР"
 belarus_export.23.d: "[FROM.GetNameWithFlag] согласился работать над совместной модификацией БТР."
 belarus_export.23.a: "Отлично"
 belarus_export.24.t: "Совместный проект БТР"
 belarus_export.24.d: "[FROM.GetNameWithFlag] отказался работать над совместной модификацией БТР."
 belarus_export.24.a: "Обидно"
 belarus_export.25.t: "Б-200 «Полонез»"
 belarus_export.25.d: "[FROM.GetNameWithFlag]  предлагает нам купить свои новейшие РСЗО. Согласимся ли мы их приобрести?"
 belarus_export.25.a: "Конечно, это хорошее предложение"
 belarus_export.25.b: "Нет, мы откажемся от их предложения"
 belarus_export.26.t: "Б-200 «Полонез»"
 belarus_export.26.d: "[FROM.GetNameWithFlag] согласился приобрести нашу РСЗО."
 belarus_export.26.a: "Отлично"
 belarus_export.27.t: "Б-200 «Полонез»"
 belarus_export.27.d: "[FROM.GetNameWithFlag] отказался приобрести нашу РСЗО."
 belarus_export.27.a: "Обидно"
 belarus_export.28.t: "Белорусское шасси"
 belarus_export.28.d: "Белорусские производители готовы предложить свои шасси для ряда нашей военной техники. Согласимся ли мы на этот контракт?"
 belarus_export.28.a: "Конечно, это хорошее предложение"
 belarus_export.28.b: "Нет, мы откажемся от их предложения"
 belarus_export.29.t: "Контракт на поставку шасси"
 belarus_export.29.d: "[FROM.GetNameWithFlag] согласился с нашим договором на поставку шасси."
 belarus_export.29.a: "Отлично"
 belarus_export.30.t: "Контракт на поставку шасси"
 belarus_export.30.d: "[FROM.GetNameWithFlag] решил расторгнуть наш договор на поставку шасси."
 belarus_export.30.a: "Обидно"
 belarus_another.1.t: "Беларусь просит нас об инвестициях"
 belarus_another.1.d: "Наши старые белорусские друзья просят нас об инвестициях."
 belarus_another.1.a: "Конечно"
 belarus_another.1.b: "Нет, извините"
 belarus_another.2.t: "Польско-белорусская дипломатическая война"
 belarus_another.2.d: "Наши отношения с Польшей начали стремительно ухудшаться. Беларусь обвинила одного из польских дипломатов в \"активных действиях, направленных на дестабилизацию белорусского общества\". В ответ Польша подготовила список белорусских чиновников, которым будет запрещен въезд на территорию Польши. Причиной конфликта стало общественное объединение \"Союз поляков Беларуси\", объединяющее около 20 тысяч человек. На съезде Союза поляков Беларуси был отстранен его бывший лидер, лояльный руководству Беларуси, после чего Союз поляков Беларуси подвергся массированному давлению со стороны властей, которые обвинили руководство Польши, финансировавшее съезд Союза поляков Беларуси и посольство этой страны в \"подрывной деятельности\" против Беларуси. Министерство юстиции Беларуси отказалось утвердить результаты съезда Союза поляков Беларуси, который избрал Анжелику Борис своим председателем. Польский сейм выразил свое недовольство действиями белорусских властей, которые были восприняты в Беларуси как попытка вмешательства в ее внутренние дела. Дальнейшее развитие событий привело к дипломатическому конфликту"
 belarus_another.2.a: "С нас хватит поляков!"
 belarus_another.3.t: "Униатство в Украине"
 belarus_another.3.d: "Униатство начало активно распространяться по нашей территории, и многие жители требуют официального разрыва с Православной Церковью, которая подчиняется Москве. Может быть, стоит к ним прислушаться?"
 belarus_another.3.a: "Униатство станет государственной религией"
 belarus_another.3.b: "Все останется по-прежнему"
 belarus_another.4.t: "Беларусь просит нас об инвестициях"
 belarus_another.4.d: "Наши старые белорусские друзья просят нас об инвестициях."
 belarus_another.4.a: "Конечно"
 belarus_another.4.b: "Нет, извините"
 belarus_another.5.t: "Указ номер 3"
 belarus_another.5.d: "Возмущение народа декретом номер 3 очень велико. Люди требуют его отмены, люди требуют послаблений. Согласны ли мы пойти на уступки?"
 belarus_another.5.a: "Мы не будем отменять указ"
 belarus_another.5.b: "Я думаю, мы готовы пойти на уступки"
 belarus_another.7.t: "Беларусь Инвестиции в нашу страну"
 belarus_another.7.d: "Наши коллеги из Республики Беларусь предлагают заключить соглашение о сотрудничестве и инвестициях. Нам предстоит рассмотреть это соглашение и решить, заключать его или нет."
 belarus_another.7.a: "Мы подпишем контракт"
 belarus_another.7.b: "Мы отказываемся"
 belarus_another.8.t: "Проект БОМБЕЛЬ"
 belarus_another.8.d: "Средства ЕС получены. Пришло время решить, как их распорядиться."
 belarus_another.8.a: "Мы сделаем так, как должны - укрепим границу"
 belarus_another.8.b: "Я не думаю, что они заметят, если мы так сделаем"
 belarus_another.9.t: "Беларусь Инвестиции в нашу страну"
 belarus_another.9.d: "Наши коллеги из Республики Беларусь предлагают заключить соглашение о сотрудничестве и инвестициях. Нам предстоит рассмотреть это соглашение и решить, заключать его или нет."
 belarus_another.9.a: "Мы подпишем контракт"
 belarus_another.9.b: "Мы отказываемся"
 belarus_another.10.t: "Что нам делать с ЧВК Вагнера?"
 belarus_another.10.d: "Мы задержали нескольких подозрительных лиц, которые впоследствии оказались наемниками известной российской ЧВК «Вагнер». Наши правоохранительные органы уже готовы обвинить их в подготовке террористических актов. Российская сторона настаивает на их освобождении. Что мы будем делать?"
 belarus_another.10.a: "Мы их освободим и передадим российской стороне"
 belarus_another.10.b: "Посадите их в тюрьму и обвините в подготовке террористических актов."
 belarus_another.11.t: "Гражданская война в Беларуси"
 belarus_another.11.d: "Наша резкая антироссийская риторика, политика навязывания белорусского языка и активное продвижение истории, отрицающей какую-либо связь с Россией, нанесли свой удар. Восточные регионы восстали, и местные силы самообороны захватили власть. Мы должны остановить это как можно скорее, прежде чем крупные державы смогут этим воспользоваться."
 belarus_another.11.a: "Конечно!"
 belarus_another.12.t: "Генерал Азаренок лоббирует российские интересы в нашей стране"
 belarus_another.12.d: "Наши правоохранительные органы узнали о лоббировании российских интересов в нашей стране благодаря связям генерала Азаренко. Стоит ли нам обращать на это внимание, или в интересах Республики Беларусь позволить этому продолжаться?"
 belarus_another.12.a: "Конечно"
 belarus_another.12.b: "Необходимо посадить его в тюрьму"
 belarus_another.14.t: "Сергей Тихановский"
 belarus_another.14.d: "Известный оппозиционный блогер, критикующий наше правительство, начал оказывать слишком большое влияние на людей, и нам нужно что-то с этим делать."
 belarus_another.14.a: "Нам нужно посадить его в тюрьму"
 belarus_another.14.b: "Оставьте его в покое, он еще может быть нам полезен."
 belarus_another.15.t: "Попросить помощи у МВФ"
 belarus_another.15.d: "Мы вынуждены обратиться за помощью к МВФ для преодоления последствий кризиса."
 belarus_another.15.a: "У нас нет выбора"
 belarus_another.16.t: "Ужесточение кредитной политики"
 belarus_another.16.d: "В связи со сложившейся ситуацией кредитная политика претерпит существенные изменения."
 belarus_another.16.a: "У нас нет выбора"
 belarus_another.17.t: "Военное сотрудничество с Беларусью"
 belarus_another.17.d: "Мы пригласили военных специалистов из Беларуси для решения важнейших задач в нашей армии. Белорусский спецназ провел подготовку наших бойцов, а белорусская военная промышленность усовершенствовала нашу систему противовоздушной обороны."
 belarus_another.17.a: "Потрясающе!"
 belarus_another.18.t: "Латгалия или война"
 belarus_another.18.d: "Нож в печень, или Латгалия?"
 belarus_another.18.a: "Нам придется передать им Латгалию, так мы, по крайней мере, сохраним нашу независимость"
 belarus_another.18.b: "Никаких уступок"
 belarus_another.19.t: "Вторая Люблинская уния"
 belarus_another.19.d: "Беларусь оказывает активное влияние на наше правительство и обладает значительным рычагом воздействия на него. Сегодня белорусский посол передал нам проект нового соглашения, предусматривающего создание наднационального образования, аналогичного тому, что Россия предлагала правительству Лукашенко. По сути, мы бы отказались от части своей автономии, но наши государства стали бы практически едины. Согласны ли мы на это?"
 belarus_another.19.a: "Наша страна ослаблена, я думаю, нам следует согласиться"
 belarus_another.19.b: "Наша независимость - это наше все"
 belarus_another.20.t: "Подписание контракта"
 belarus_another.20.d: "Польское правительство согласилось объединиться с нами в Союзное государство с потерей части своей автономии, чтобы защитить свою страну от полного развала. Но это может привести к непредвиденным последствиям"
 belarus_another.20.a: "Ну, посмотрим"
 belarus_another.21.t: "Польша отказалась!"
 belarus_another.21.d: "Польское правительство, которое мы так долго поддерживали, предало нас. По всей видимости, у нас нет выбора, и мы должны сами решить, что делать с этими предателями. Возможно, нам придётся использовать все имеющиеся рычаги влияния."
 belarus_another.21.a: "Давайте устроим полякам ад"
 belarus_another.21.b: "Давайте забудем о них"
 belarus_another.22.t: "Силезское ополчение"
 belarus_another.22.d: "У нашего народа есть шанс на независимость. Пришло время воспользоваться им и взяться за оружие!"
 belarus_another.22.a: "Долой польский гнет!"
 belarus_another.23.t: "Совместные учения с Беларусью"
 belarus_another.23.d: "Беларусь предлагает нам провести совместные учения для боевого слаживания наших войск. Мы согласны?"
 belarus_another.23.a: "Конечно, мы согласимся"
 belarus_another.23.b: "Мы обойдемся без них"
 belarus_another.24.t: "Совместные учения с Польшей"
 belarus_another.24.d: "Они согласились провести учения с нашими войсками. Мы получим ценный опыт."
 belarus_another.24.a: "Хорошо"
 belarus_another.25.t: "Поставить оружие Ираку"
 belarus_another.25.d: "Мы готовы выделить часть наших запасов оружия для поставки в Ирак в поддержку дружественного там режима."
 belarus_another.25.a: "Хорошо"
 belarus_another.26.t: "Посадить самолёт Ryanair с Протасевичем"
 belarus_another.26.d: "Наши спецслужбы смогли перехватить и сбить самолет, на борту которого находился редактор оппозиционного канала NEXTA. Его зовут Роман Протасевич."
 belarus_another.26.a: "Хорошо"
 belarus_another.27.t: "Судьба Белорусской церкви"
 belarus_another.27.d: "Руководство нашей страны всерьез задумалось о предоставлении автокефалии нашей церкви. Но этот шаг, безусловно, может испортить отношения с нашим другом и соседом - Россией. Мы пойдем на это?"
 belarus_another.27.a: "Мы предоставим автокефалию нашей церкви"
 belarus_another.27.b: "Нет"
 belarus_another.28.t: "Что делать с Союзом поляков Беларуси?"
 belarus_another.28.d: "Союз поляков Беларуси давно является нашей проблемой. Через него Польша оказывает на нас все свое влияние. Пришло время с этим разобраться. Либо мы оставим их как есть, либо полностью выселим польское население."
 belarus_another.28.a: "Пусть они останутся под нашим контролем"
 belarus_another.28.b: "Полякам в Беларуси нет места"
 belarus_another.29.t: "Отмена челночной торговли"
 belarus_another.29.d: "Благодаря России и Китаю мы наладили поставки необходимых товаров, чтобы наконец избавиться от этого пережитка 90-х."
 belarus_another.29.a: "Хорошо"
 belarus_another.30.t: "Отмена челночной торговли"
 belarus_another.30.d: "Теперь, когда у нас есть доступ к европейским товарам через официальные каналы, нашим гражданам не придется заниматься этой опасной и порой невыгодной профессией."
 belarus_another.30.a: "Хорошо"
 belarus_another.31.t: "Молочная война"
 belarus_another.31.d: "Россия бойкотировала импорт нашей молочной продукции, лишив нас значительной части прибыли. Уступим ли мы их условиям или будем защищать отечественных производителей?"
 belarus_another.31.a: "Мы твердо поддерживаем наших производителей."
 belarus_another.31.b: "Давайте уступим их требованиям"
 belarus_another.32.t: "Проблема с Верховным Советом"
 belarus_another.32.d: "Верховный Совет остается пережитком советской системы, который мы не можем юридически ликвидировать без изменения конституции. Поэтому нам придется идти на компромиссы с ним, пока мы наконец не решим этот вопрос."
 belarus_another.32.a: "Во славу Беларуси"
 belarus_another.33.t: "Авиакатастрофа в Украине"
 belarus_another.33.d: "Самолет, на борту которого находился Зенон и который направлялся в Киев, потерпел крушение на Украине. Выживших не было, и возникла срочная необходимость решить, кто займет пост главы государства. Временным, а возможно, и постоянным, главой стал депутат от партии Юрий Беленкий."
 belarus_another.33.a: "Во славу Беларуси"
 belarus_another.34.t: "Белорусский талер"
 belarus_another.34.d: "Беларусь предлагает ввести на своей территории единую валюту — талер, ту же самую, что используется в Беларуси. Возможно, единая валюта улучшит торговлю между нашими странами, но наша независимость снова окажется под угрозой."
 belarus_another.34.a: "Мы согласны"
 belarus_another.34.b: "Мы отказываемся"
 belarus_another.35.t: "Междуморье"
 belarus_another.35.d: "Беларусь предлагает нам создать военный союз под названием \"Междуморье\". Создав его, мы защитим себя от агрессии более крупных соседей"
 belarus_another.35.a: "Мы согласны"
 belarus_another.35.b: "Мы отказываемся"
 belarus_another.36.t: "Беларусь хочет вступить в НАТО"
 belarus_another.36.d: "Беларусь долгое время шла по пути демократии и хочет защищать ее вместе с нами. Правительство Беларуси полностью выполнило все условия для вступления в НАТО и подало заявку на членство в организации. Примем ли мы её?"
 belarus_another.36.a: "Мы согласны"
 belarus_another.36.b: "Мы отказываемся"
 belarus_another.37.t: "Мы вступаем в НАТО"
 belarus_another.37.d: "Наша заявка на членство была одобрена, и теперь мы являемся частью этого великого альянса, готового защищать демократию по всему миру!"
 belarus_another.37.a: "УРАААА!"
 belarus_another.38.t: "Беларусь хочет присоединиться к USAID"
 belarus_another.38.d: "Белорусское правительство направило запрос о вступлении в программу USAID. Готовы ли мы ответить на него положительно?"
 belarus_another.38.a: "Мы принимаем их запрос"
 belarus_another.38.b: "УРАААА!"
 belarus_another.39.t: "Наша заявка была принята USAID"
 belarus_another.39.d: "США одобрили наш запрос, и теперь мы являемся частью программы USAID"
 belarus_another.39.a: "УРАААА!"
 belarus_another.40.t: "Экономический кризис 2008 года в Беларуси"
 belarus_another.40.d: "Комплекс явлений в экономике страны, свидетельствующий об ухудшении финансово-экономической ситуации в стране. В 2008 году в Беларуси начался финансовый кризис.Теперь нам нужно выбрать область, в которой мы сократим наши расходы, чтобы сэкономить бюджет"
 belarus_another.40.a: "Сокращение содержания системы образования"
 belarus_another.40.b: "Сокращение расходов на содержание системы здравоохранения"
 belarus_another.40.c: "Сокращение содержания бюрократической системы"
 belarus_another.41.t: "Операция \"Новый день\""
 belarus_another.41.d: "Белорусское правительство предлагает нам совместную военную операцию против Литвы с целью устранения проблемы с Суwalki коридором. Соглашаемся ли мы предпринять такой опасный шаг?"
 belarus_another.41.a: "Мы должны обезопасить наши границы"
 belarus_another.41.b: "Мы не будем так рисковать"
 belarus_another.42.t: "Беларусь хочет заполучить Вильнюс"
 belarus_another.42.d: "Белорусское правительство выразило желание передать Вильнюс и окружающие территории под их полный контроль. Их аргумент основывается на том, что это историческая белорусская земля. Соглашаемся ли мы на это?"
 belarus_another.42.a: "Мы передадим им Вильнюс, укрепляя дружеские связи"
 belarus_another.42.b: "Возможно, мы оставим его себе"
 belarus_another.43.t: "Результаты джинсовой революции"
 belarus_another.43.d: "Мы не ожидали таких сильных народных волнений. Возможно, нашей стране действительно нужны перемены, и пришло время передать власть другим?"
 belarus_another.43.a: "Никогда"
 belarus_another.43.b: "Очевидно, наступила эра перемен"
 belarus_another.44.t: "Массовые протесты под руководством Тихановской"
 belarus_another.44.d: "Мы не ожидали таких сильных народных волнений. Возможно, нашей стране действительно нужны перемены, и пришло время передать власть другим?"
 belarus_another.44.a: "Никогда"
 belarus_another.44.b: "Очевидно, наступила эра перемен"
 belarus_another.45.t: "Гражданская война в Беларуси"
 belarus_another.45.d: "Мы не смогли сдержать протестующих, и теперь они повергли страну в полный хаос. Что будет дальше?"
 belarus_another.45.a: "Это ужасно!"
 belarus_another.46.t: "\"Экскурсия в Варшаву\""
 belarus_another.46.d: "При содействии наших пограничников ЧВК «Вагнер» прорвало границу Польши и проникло на её территорию. Началось то, чего никто не ожидал."
 belarus_another.46.a: "Лето и арбалеты"
 belarus_another.47.t: "Великий марш на Варшаву"
 belarus_another.47.d: "При содействии наших пограничников ЧВК «Вагнер» прорвало границу Польши и проникло на её территорию. Началось то, чего никто не ожидал."
 belarus_another.47.a: "Лето и арбалеты"
 belarus_another.48.t: "Война против Вагнера"
 belarus_another.48.d: "Наше правительство было шокировано новостью о том, что бойцы ЧВК «Вагнер» атаковали нашу страну с белорусской территории, что дает нам веские основания объявить войну Беларуси. Будем ли мы это делать?"
 belarus_another.48.a: "Пришло время покончить с Беларусью"
 belarus_another.48.b: "Нет необходимости объявлять войну"
 belarus_another.49.t: "\"Экскурсия в Вильнюс\""
 belarus_another.49.d: "При содействии наших пограничников ЧВК «Вагнер» прорвало границу Литвы и вторглось на её территорию. Началось то, чего никто не ожидал."
 belarus_another.49.a: "Лето и арбалеты"
 belarus_another.52.t: "Джинсовая революция"
 belarus_another.52.d: "Народ Беларуси вышел на протест против законного правительства и требует его отставки. Надеюсь, мы хорошо к этому подготовились."
 belarus_another.52.a: "Что нас ждёт"
 belarus_another.52.b: "Попробуйте договориться"
 belarus_another.53.t: "Национал-большевики захватили власть в России"
 belarus_another.53.d: "Наши верные сторонники наконец-то смогли захватить власть в России. Кремль теперь наш. Наш лидер готов возглавить Россию."
 belarus_another.53.a: "Россия - это всё. Остальное - ничто"
 belarus_another.54.t: "Присоединение к России"
 belarus_another.54.d: "Наконец, Беларусь возвращается домой. Теперь мы станем частью великой страны, пожертвовав своей автономией — но действительно ли она нам была нужна?"
 belarus_another.54.a: "Наконец-то"
 belarus_another.55.t: "Джинсовая революция"
 belarus_another.55.d: "В Беларуси набирают обороты протесты, и белорусское правительство не может их подавить. Возможно, нам следует вмешаться и спасти их правительство?"
 belarus_another.55.a: "Мы пришлем наших специалистов"
 belarus_another.55.b: "Давайте не будем вмешиваться"
 belarus_another.56.t: "Джинсовая революция"
 belarus_another.56.d: "Россия прислала к нам своих специалистов, и вместе мы смогли подавить протесты!"
 belarus_another.56.a: "Спасибо, Россия"
 belarus_another.57.t: "Джинсовая революция"
 belarus_another.57.d: "Мы тайно обратились за помощью к российскому правительству, но оно нам отказало, и мы остались один на один с революционным движением."
 belarus_another.57.a: "Боже, помоги нам"
 belarus_another.58.t: "Джинсовая революция"
 belarus_another.58.d: "Протесты набирают обороты. Некоторые административные здания уже захвачены, в других городах вспыхивают беспорядки, а некоторые генералы перешли на сторону повстанцев. Что нам делать?"
 belarus_another.58.a: "Мы будем бороться до конца!"
 belarus_another.58.b: "Мы мирно сдадим власть"
 belarus_another.59.t: "Беларусь просит о кредите"
 belarus_another.59.d: "Белорусское правительство просит нас предоставить им кредит. Мы можем не быть уверены в их платежеспособности, но влияние, которое мы получим, безусловно, окупится."
 belarus_another.59.a: "Давайте дадим им денег"
 belarus_another.59.b: "Мы откажемся"
 belarus_another.60.t: "Русский кредит"
 belarus_another.60.d: "Российское правительство согласилось предоставить нам кредит."
 belarus_another.60.a: "Хорошо"
 belarus_another.61.t: "Русский кредит"
 belarus_another.61.d: "Российское правительство отказалось предоставить нам кредит."
 belarus_another.61.a: "Ну и ладно"
 belarus_another.62.t: "Беларусь предлагает создать совместную торговлю калием"
 belarus_another.62.d: "Правительство Беларуси предложило создать совместное предприятие по торговле калием между нашими двумя предприятиями, «Уралкали» и «Беларускали». Вместе мы сможем получить большую прибыль от этого ресурса."
 belarus_another.62.a: "Мы согласны"
 belarus_another.62.b: "Мы не согласны"
 belarus_another.63.t: "Совместная торговля калием"
 belarus_another.63.d: "Правительство России согласилось создать совместную компанию по торговле калийными удобрениями."
 belarus_another.63.a: "Хорошо"
 belarus_another.64.t: "Беларусь закрывает совместное предприятие по торговле калием"
 belarus_another.64.d: "Конфликт между нашими двумя предприятиями по торговле калием достиг своего предела, и белорусское правительство решило отделиться и создать собственное торговое предприятие."
 belarus_another.64.a: "Грустно"
 belarus_another.65.t: "Профсоюзный переворот"
 belarus_another.65.d: "Мы попытались совершить государственный переворот в Беларуси, используя все наши административные и правоохранительные ресурсы, а также наши связи."
 belarus_another.65.a: "Давайте посмотрим на результат"
 belarus_GDL.1.t: "Беларусь хочет управлять нашей страной"
 belarus_GDL.1.d: "Пробелурусские националисты имеют значительное влияние в нашей стране, поэтому белорусские власти предъявили нам ультиматум — либо допустите их в правительство, либо столкнетесь с последствиями. Что мы на это скажем?"
 belarus_GDL.1.a: "Мы согласны"
 belarus_GDL.1.b: "Никогда"
 belarus_GDL.2.t: "Присоединение к Беларуси"
 belarus_GDL.2.d: "Наша страна полностью оказалась под влиянием Беларуси. У нас нет выбора, и мы готовы подписать акт о присоединении."
 belarus_GDL.2.a: "Вот такая история"
 belarus_azot.1.t: "Беларусь предлагает соглашение о торговле химическими удобрениями"
 belarus_azot.1.d: "Беларусь недавно обратилась к нам с предложением эксклюзивного контракта на поставку лучших удобрений, которые она может предложить. Принятие этого предложения, безусловно, увеличит урожайность, хотя с политической точки зрения этот шаг может показаться некоторым сомнительным."
 belarus_azot.1.a: "Абсолютно."
 belarus_azot.1.b: "На данный момент это невозможно."
 belarus_azot.2.t: "[From.GetName] Принимает"
 belarus_azot.2.d: "Наши усилия по заключению сделки с [From.GetName] наконец-то завершились. Контракт подписан, и скоро будет получен первый платеж."
 belarus_azot.2.a: "Наконец-то, несколько хороших новостей."
 belarus_azot.3.t: "[From.GetName] отказывается от нашей сделки."
 belarus_azot.3.d: "Наши попытки договориться с [From.GetName], похоже, тщетны. Мы не получили ответа, и, судя по всему, дело зашло в тупик."
 belarus_azot.3.a: "Будь ты проклят, [From.GetNameDef]!"
 belarus_azot.4.t: "[From.GetName] аннулирует их контракт."
 belarus_azot.4.d: "Мы получили потрясающую новость — [From.GetName] расторгает с нами контракт на поставку удобрений. Мы не сможем продавать им нашу продукцию, по крайней мере, пока."
 belarus_azot.4.a: "Дураки! Они не знают, что теряют!"
 BLR_Azot_category: "Торговля удобрениями ГродноАзот"
 BLR_Azot_category_desc: "Ориентация на количество рынков, к которым имеет доступ «ГродноАзот», жизненно важна для разнообразия и расширения белорусской экономики. Множество различных удобрений и пестицидов, имеющихся в их распоряжении, могут быть полезны многим странам. Заключение контрактов с другими странами и расширение производства наших удобрений принесут большую прибыль стране и народу Беларуси.\n\nДоход, полученный от торговли, определяется количеством подписанных вами контрактов, умноженным на пять процентов. \n§YТекущие контракты на поставку удобрений:§! [?current_azot_capacity]/[?current_max_azot_capacity]\n§YУдобрения:§! [?current_max_azot_capacity]/[?max_azot_capacity]"
