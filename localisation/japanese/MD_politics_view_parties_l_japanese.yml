 SOV.liberalism_yash_desc: "包括政党 ｰ 自由北部連合（ロシア語ローマ字表記：Koalitsyya Svobodnogo Severa）\n\n自由北連合は、ロシア北部地域のあらゆる自由主義政党および地域主義組織の連合体である。連合の目標は、ロシア北部の領土に自由で独立した国家を創設し、民間軍事会社ワグネルの部隊を撃破することにある。"
