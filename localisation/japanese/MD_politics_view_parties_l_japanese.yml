 SER.Neutral_Autocracy_desc: "中道専制主義 - セルビア統一評議会（セルビア語ローマ字表記：Sabor Srpskog Jedinstva）は、小規模な民族主義政党である。創設者は準軍事組織「セルビア義勇軍」の指導者であり、バルカン半島全域で最も強力な犯罪組織のボスであったゼリコ・ラズナトヴィッチ、通称「アルカン」である。彼は人道に対する罪で国連から指名手配されており、2000年初頭に暗殺された。その後、新たに党首となったボリスラフ・ペレビッチは、政治にあまり長けていなかった。"
 SER.Neutral_Autocracy_alt: "£SER_western_liberal_alt (SNS) セルビア進歩党"
