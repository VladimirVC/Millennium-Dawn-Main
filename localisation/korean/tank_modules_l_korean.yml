 medium_tank_artillery_chassis_5: "6th Generation Self Propelled Artillery Hull"
 medium_tank_artillery_chassis_5_desc: "Self-propelled artillery refers to artillery installed on a vehicle, such as using the vehicle chassis to generate its own power and does not require towing by other vehicles. Most of them are protected by light armor. Artillery is generally howitzers, mortars, cannons, anti-tank guns, rocket launchers or anti-aircraft guns."
 medium_tank_artillery_chassis_6: "7th Generation Self Propelled Artillery Hull"
 medium_tank_artillery_chassis_6_desc: "Self-propelled artillery refers to artillery installed on a vehicle, such as using the vehicle chassis to generate its own power and does not require towing by other vehicles. Most of them are protected by light armor. Artillery is generally howitzers, mortars, cannons, anti-tank guns, rocket launchers or anti-aircraft guns."
 medium_tank_destroyer_chassis_5: "6th Generation Light Tank Hull"
 medium_tank_destroyer_chassis_5_desc: "The role of light tanks is reconnaissance and airborne operations, but they have the disadvantage of weak armor and low survivability under various anti-tank weapons today. Coupled with the emergence of infantry tanks, the development of light tanks has declined."
 medium_tank_destroyer_chassis_6: "7th Generation Light Tank Hull"
 medium_tank_destroyer_chassis_6_desc: "The role of light tanks is reconnaissance and airborne operations, but they have the disadvantage of weak armor and low survivability under various anti-tank weapons today. Coupled with the emergence of infantry tanks, the development of light tanks has declined."
 medium_tank_aa_chassis_5: "6th Generation Self Propelled Anti-Air Hull"
 medium_tank_aa_chassis_5_desc: "Self-propelled air defense weapons, also known as mobile air defense weapons, refer to mobile air defense weapons that install anti-aircraft machine guns, anti-aircraft guns or surface-to-air missiles on military vehicles. They can be divided into self-propelled anti-aircraft guns (self-propelled anti-aircraft guns), self-propelled air defense missile launchers, and self-propelled combined missile and artillery air defense systems."
 medium_tank_aa_chassis_6: "7th Generation Self Propelled Anti-Air Hull"
 medium_tank_aa_chassis_6_desc: "Self-propelled air defense weapons, also known as mobile air defense weapons, refer to mobile air defense weapons that install anti-aircraft machine guns, anti-aircraft guns or surface-to-air missiles on military vehicles. They can be divided into self-propelled anti-aircraft guns (self-propelled anti-aircraft guns), self-propelled air defense missile launchers, and self-propelled combined missile and artillery air defense systems."
 medium_tank_rocket_chassis_5: "6th Generation MLRS Hull"
 medium_tank_rocket_chassis_5_desc: "Consisting of packs of multiple rockets, MLRS systems are designed to saturate an area with rocket artillery bombardment."
