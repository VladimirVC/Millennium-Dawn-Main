 NKO_trade_agreements_with_venesuela: "[VEN.GetName]와의 무역 협정"
 NKO_trade_agreements_with_venesuela_desc: "[VEN.GetName]와 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
