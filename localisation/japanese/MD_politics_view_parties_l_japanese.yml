 UKR.Western_Autocracy_maidan_icon: "£UKR_western_autocracytwo"
 UKR.Western_Autocracy_maidan_desc: "£UKR_western_autocracytwo 人民戦線は、親欧州路線を掲げるウクライナの親欧米民族主義政党であり、元ウクライナ首相アルセニー・ヤツェニュクと元ウクライナ国家保安相オレクサンドル・トゥルチノフによって設立された。同党には防衛評議会も設置されており、国家防衛強化のための改革案や行動計画を継続的に提案している。"
 UKR.liberalism_icon: "£ukr_solidarity"
 UKR.liberalism_two: "£ukr_yes (YeS) 欧州連帯"
 UKR.liberalism_two_icon: "£ukr_yes"
 UKR.liberalism_two_desc: "£ukr_yes 欧州連帯は、2014年8月27日に結成されたウクライナの政党である。同党は、2000年に設立された院内会派「連帯」にルーツを持ち、ペトロ・ポロシェンコの政治的窓口として様々な形態で存続してきた。同党は公式にはポピュリズムを非難し、実用主義と現実主義を提唱し、ウクライナの欧州連合加盟、貧困層への福祉・社会保障を掲げる。しかし実際にはポピュリスト的なポロシェンコ氏の私物政党のままである。"
 UKR.socialism_2: "£ukr_servant_of_the_people (SN) 国民の僕"
 UKR.socialism_2_icon: "£ukr_servant_of_the_people"
 UKR.socialism_2_desc: "£ukr_servant_of_the_people 国民の僕は、2017年末に結成された政党で、同名の人気テレビ番組にちなんで名付けられた。同党は主に幅広い大衆迎合政策に焦点を当てており、親欧州的な外交政策と並行して、ウクライナ国内の汚職撲滅と直接民主主義の拡大に特に力を入れている。"
