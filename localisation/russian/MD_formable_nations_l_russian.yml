 form_WESTFED_category: "Федерация Вест-Индии"
 form_WESTFED_category_desc: "Вест-Индская федерация была недолговечным политическим союзом с 1958 по 1962 год, в который входили многие островные государства Карибского бассейна. Союз быстро распался из-за споров о том, как он будет управляться или функционировать. Эта идея до сих пор имеет определенную ценность среди наций, и она вполне может стать следующей великой нацией в Западном полушарии. Будем ли мы вести Карибский бассейн в это новое завтра?"
