 RAJ_naxalite_insurgency: "Insurgencia Naxalita Severa"
 RAJ_naxalite_insurgency_desc: "[RAJ.GetName] sufre una grave insurgencia naxalita-maoísta. El Corredor Rojo se mantiene muy activo, con importantes operaciones guerrilleras, frecuentes emboscadas a las fuerzas de seguridad y un importante control territorial por parte de los insurgentes."
 RAJ_naxalite_insurgency_severe_TT: "§RNivel de Insurgencia Grave§! - Importante presencia y operaciones guerrilleras"
 RAJ_naxalite_insurgency_1: "Alta Insurgencia Naxalita"
 RAJ_naxalite_insurgency_1_desc: "[RAJ.GetName] se enfrenta a una insurgencia naxalita muy activa. Los insurgentes mantienen una fuerte presencia en zonas rurales y atacan frecuentemente instalaciones y personal gubernamental."
 RAJ_naxalite_insurgency_high_TT: "§ONivel de Insurgencia Alto§! - Insurgencia activa con ataques frecuentes"
 RAJ_naxalite_insurgency_2: "Insurgencia Naxalita Moderada"
 RAJ_naxalite_insurgency_2_desc: "[RAJ.GetName] se enfrenta a una insurgencia naxalita moderada. Existe una presencia rebelde establecida con incidentes periódicos, pero las fuerzas de seguridad mantienen el control general."
 RAJ_naxalite_insurgency_moderate_TT: "§YNivel de Insurgencia Moderado§! - Presencia establecida con actividad periódica"
 RAJ_naxalite_insurgency_3: "Insurgencia Naxalita Débil"
 RAJ_naxalite_insurgency_3_desc: "[RAJ.GetName] tiene una presencia naxalita limitada en esta región. Se producen incidentes esporádicos, pero la infraestructura insurgente se ha visto considerablemente deteriorada."
 RAJ_naxalite_insurgency_weak_TT: "§GNivel de Insurgencia Débil§! - Presencia limitada con incidentes esporádicos"
 RAJ_naxalite_insurgency_4: "Baja Insurgencia Naxalita"
 RAJ_naxalite_insurgency_4_desc: "[RAJ.GetName] presenta mínima actividad naxalita en esta zona. La región está prácticamente despejada, con solo incidentes aislados."
 RAJ_naxalite_insurgency_low_TT: "§GNivel de Insurgencia Bajo§! - Actividad mínima, área prácticamente despejada."
 RAJ_development_boost: "Iniciativa de Desarrollo Activa"
 RAJ_development_boost_TT: "§GIniciativa de Desarrollo§! - Aumento de la velocidad de construcción gracias a los programas de desarrollo del gobierno"
 RAJ_integrated_development_initiative: "Iniciativa de Desarrollo Integral"
 RAJ_integrated_development_initiative_desc: "Implementar programas integrales de desarrollo en las zonas afectadas por los naxalitas, incluyendo infraestructura, educación y atención médica. Esto aborda las causas profundas de la insurgencia, reduciendo los agravios tribales y mejorando las condiciones locales."
 RAJ_surrender_rehabilitation_program: "Programa de Rendición y Rehabilitación"
 RAJ_surrender_rehabilitation_program_desc: "Implementar una política de rendición que ofrezca amnistía y beneficios de rehabilitación a los naxalitas que depongan las armas. Esto ha sido históricamente eficaz, con importantes rendiciones tras estos programas."
 RAJ_operation_green_hunt: "Operación Caza Verde"
 RAJ_operation_green_hunt_desc: "Lanzar una ofensiva paramilitar masiva y coordinada contra los bastiones naxalitas. Esta operación a gran escala involucra a las fuerzas paramilitares centrales, que colaboran con la policía estatal para despejar y mantener el territorio."
 RAJ_samadhan_doctrine: "Adoptar la Doctrina SAMADHAN"
 RAJ_samadhan_doctrine_desc: "Implementar la doctrina integral SAMADHAN: liderazgo inteligente, estrategia agresiva, motivación y capacitación, inteligencia procesable, KPI basados ​​en paneles de control, aprovechamiento de la tecnología, plan de acción para cada teatro y sin acceso a financiamiento."
 RAJ_naxal.10.t: "Fusión PWG-MCC Forma el CPI (Maoísta)"
 RAJ_naxal.10.d: "El Grupo de Guerra Popular y el Centro Comunista Maoísta se han fusionado para formar el Partido Comunista de la India (Maoísta). Esta unificación crea una fuerza insurgente más formidable, con cuadros, recursos y control territorial combinados en todo el Corredor Rojo."
 RAJ_naxal.10.a: "Esta es una escalada grave."
 RAJ_naxal.11.t: "Ataque Mayor Naxalita"
 RAJ_naxal.11.d: "Los insurgentes naxalitas han lanzado un ataque devastador contra las fuerzas de seguridad. Una emboscada causó la muerte de varios miembros del personal y destruyó equipo. La audacia de este ataque demuestra la continua fortaleza de la insurgencia."
 RAJ_naxal.11.a: "Debemos responder con firmeza."
 RAJ_naxal.12.t: "Rendición Masiva de Naxalitas"
 RAJ_naxal.12.d: "Tras nuestro programa de rehabilitación y la presión constante, un número significativo de cuadros naxalitas se han entregado a las autoridades. Los exinsurgentes están siendo procesados ​​para su reintegración a la sociedad."
 RAJ_naxal.12.a: "Un éxito de nuestra política."
 RAJ_naxal.13.t: "Liderazgo Naxalita Eliminado"
 RAJ_naxal.13.d: "Operaciones de inteligencia han resultado en la eliminación de un líder naxalita clave. Este golpe a la estructura de mando insurgente perturbará sus operaciones y podría desencadenar disputas internas sobre la sucesión."
 RAJ_naxal.13.a: "Una victoria significativa."
 RAJ_naxal.14.t: "Protestas por Desplazamiento de Tribus"
 RAJ_naxal.14.d: "Las comunidades tribales de las zonas afectadas por los naxalitas protestan contra el desplazamiento debido a los proyectos mineros e industriales. Los naxalitas intentan capitalizar estas quejas para reclutar nuevos cuadros y obtener apoyo popular."
 RAJ_naxal.14.a: "Ignorar las protestas."
 RAJ_naxal.14.b: "Abordar sus inquietudes."
 RAJ_naxal.15.t: "Conclusión de la Operación Caza Verde"
 RAJ_naxal.15.d: "La ofensiva paramilitar coordinada ha logrado resultados significativos. Las posiciones naxalitas en varios estados se han visto afectadas, sus líneas de suministro interrumpidas y varios bastiones desmantelados. La insurgencia se ha visto debilitada."
 RAJ_naxal.15.a: "Continúa la presión."
 RAJ_naxal.16.t: "India Libre de Naxalitas"
 RAJ_naxal.16.d: "Tras años de esfuerzo sostenido, la India ha erradicado eficazmente la insurgencia naxalita-maoísta. El Corredor Rojo ya no representa una amenaza significativa. El desarrollo ha llegado a las zonas tribales y se ha rehabilitado a antiguos insurgentes. Esto marca un logro histórico en materia de seguridad interna."
 RAJ_naxal.16.a: "Comienza una nueva era."
 RAJ_operation_green_hunt_active: "Operación Caza Verde Activa"
 RAJ_operation_green_hunt_active_desc: "Se está llevando a cabo una masiva ofensiva paramilitar coordinada contra los bastiones naxalitas. Las fuerzas de seguridad están despejando y controlando el territorio a lo largo del Corredor Rojo."
 RAJ_samadhan_doctrine_idea: "Doctrina SAMADHAN"
 RAJ_samadhan_doctrine_idea_desc: "Se ha adoptado una estrategia integral de contrainsurgencia que combina liderazgo inteligente, operaciones agresivas, inteligencia procesable y aprovechamiento de la tecnología."
 RAJ_naxal_free_india: "India Libre de Naxalitas"
 RAJ_naxal_free_india_desc: "La India ha eliminado con éxito la insurgencia naxalita-maoísta. El Corredor Rojo ha sido asegurado y el desarrollo ha llegado a las zonas tribales previamente afectadas."
 RAJ_salwa_judum_active: "Salwa Judum Activo"
 RAJ_salwa_judum_active_desc: "El controvertido programa de milicias civiles Salwa Judum (Marcha por la Paz o Caza de la Purificación) opera activamente en Chhattisgarh. Si bien es eficaz en la represión de los maoístas, ha suscitado críticas por violaciones de derechos humanos."
 RAJ_counter_insurgency_operations: "Operaciones de Contrainsurgencia"
 RAJ_counter_insurgency_operations_desc: "Lanzar una campaña integral de contrainsurgencia contra los bastiones naxalitas en el Corredor Rojo. Esto implicará operaciones militares coordinadas, recopilación de inteligencia y estrategias de dominación de la zona."
 RAJ_reduce_naxalite_level_tt: "Reduce el nivel de insurgencia naxalita en 1 en este estado"
 RAJ_naxal.17.t: "Emboscada en Dantewada"
 RAJ_naxal.17.d: "El 6 de abril de 2010, naxalitas tendieron una emboscada a una compañía de efectivos de la CRPF en el distrito de Dantewada, en Chhattisgarh. El ataque causó la muerte de 76 agentes de seguridad, convirtiéndolo en uno de los ataques más mortíferos en la historia de la insurgencia. Los maoístas utilizaron artefactos explosivos improvisados ​​(IED) y armas automáticas en un asalto bien coordinado que duró varias horas."
 RAJ_naxal.17.a: "Esta es una tragedia nacional."
 RAJ_naxal.18.t: "Ataque en Sukma"
 RAJ_naxal.18.d: "El 24 de abril de 2017, los naxalitas lanzaron una emboscada devastadora contra personal de la CRPF en el distrito de Sukma, Chhattisgarh. 25 agentes de seguridad murieron en el ataque. Los maoístas siguen demostrando su capacidad de ataque a pesar de años de operaciones de contrainsurgencia."
 RAJ_naxal.18.a: "Nosotros no seremos disuadidos"
 RAJ_salwa_judum: "Iniciar Salwa Judum"
 RAJ_salwa_judum_desc: "Salwa Judum (Marcha por la Paz o Caza de la Purificación) es una controvertida milicia antinaxalita apoyada por el gobierno estatal de Chhattisgarh. Si bien es eficaz en la lucha contra la insurgencia, ha enfrentado duras críticas por violaciones de derechos humanos y finalmente fue declarada inconstitucional por el Tribunal Supremo en 2011."
 RAJ_road_connectivity_program: "Conectividad Vial en el Corredor Rojo"
 RAJ_road_connectivity_program_desc: "Mejorar la infraestructura vial en las zonas afectadas por los naxalitas. Una mejor conectividad reduce la influencia maoísta al llevar los servicios gubernamentales a zonas tribales remotas y dificultar la operación de los insurgentes."
 RAJ_MAO_rebellion_desc: "Severe Naxalite insurgency and growing communist support have emboldened Maoist cells to organize mass demonstrations against the government. If their influence is not curtailed, armed rebellion will follow."
 RAJ_bolywood_idea_desc: "India's film industry, centered in Mumbai, is the largest in the world by output. Its cultural reach extends across South Asia, the Middle East, and the global Indian diaspora, serving as a powerful vehicle for soft power projection."
 RAJ_settle_gujarat_unrest: "Settle Gujarat Unrest"
 RAJ_settle_gujarat_unrest_desc: "Direct state resources to defuse the communal tensions in Gujarat and restore order, without waiting on a particular government in Delhi. This raises both Hindu and Muslim opinion. Once both recover to 35 or above, the Gujarat unrest lifts on its own, and keeping their opinion higher keeps the region calm."
 RAJ_kashmir_unrest: "Kashmir Unrest"
 RAJ_kashmir_unrest_desc: "Kashmir remains restive while its Muslim majority feels alienated from Delhi. Until their grievances are addressed, security operations sap morale and stability across the valley. Raising Muslim opinion through the appease decision, interfaith dialogue, and regional focuses above 35 clears this unrest."
 RAJ_punjab_unrest: "Punjab Unrest"
 RAJ_punjab_unrest_desc: "Lingering Sikh resentment keeps Punjab on edge, draining political capital and stability. Settling the community's concerns is the only path back to calm. Raising Sikh opinion through the appease decision, interfaith dialogue, and regional focuses above 35 clears this unrest."
 RAJ_bengal_unrest: "Bengal Unrest"
 RAJ_bengal_unrest_desc: "Communal friction with Bengal's Muslim population disrupts the region's industry and order. The unrest persists until their faith is reconciled with the state. Raising Muslim opinion through the appease decision, interfaith dialogue, and regional focuses above 35 clears this unrest."
 RAJ_northeast_unrest: "Northeast Unrest"
 RAJ_northeast_unrest_desc: "Christian communities across the Northeast distrust the central government, fueling separatist sentiment. Recruitment and stability suffer until their grievances are eased. Raising Christian opinion through the appease decision, interfaith dialogue, and regional focuses above 35 clears this unrest."
 RAJ_new_army_idea_desc: "A comprehensive modernization programme has restructured the Indian Armed Forces around new doctrinal principles, improving recruitment pipelines, operational coordination, and combat readiness across all service branches."
 RAJ_BRICS_desc: "Membership in BRICS opens up trade and political ties with the bloc, accelerating modest research cooperation and giving Indian negotiators a stronger hand at the table with fellow members."
 RAJ_BRICS_associate: "BRICS Associate"
 RAJ_BRICS_associate_desc: "Associate standing ties the nation to BRICS trade and research without full membership, granting reduced bloc benefits while leaving the door open to promotion."
 RAJ_BRICS_observer: "BRICS Observer"
 RAJ_BRICS_observer_desc: "Observer status keeps the nation engaged with BRICS diplomacy and warms its trade relations with the bloc, a first step toward deeper integration."
 RAJ_brics_leadership_TT: "As BRICS leader, India draws political influence and trade goodwill that grows as more nations join the bloc."
 RAJ_BRICS_bank_desc: "The New Development Bank channels member-state lending into strategic resource and industrial projects, lifting local resource yields and factory output. The cost is exposure: foreign powers gain leverage over our financial decisions."
 RAJ_BRICS_cur_desc: "Coordinating monetary policy with the bloc reduces our financing costs and improves trade terms with members, but the upfront expense of restructuring our economic cycles is steep and the new arrangement raises ongoing cycle-upgrade costs."
 RAJ_steady_elephant: "The Steady Elephant"
 RAJ_steady_elephant_desc: "India must move forward with the deliberate, unstoppable weight of an elephant: patient, immovable when challenged, and decisive when roused. A strong and independent state demands that ideal of national character."
 RAJ_iri_fake_ns2_desc: "Procurement audits and a partial overhaul of the defence ministry have started to bite. Wasted capacity and inflated conversion costs remain heavy, but the worst of the License Raj-era distortions are beginning to ease."
 RAJ_iri_fake_ns3_desc: "Reforms have cut through enough red tape that defence factories run at acceptable efficiency. Conversion of civilian production lines is no longer prohibitively expensive, though pockets of patronage still distort outcomes."
 RAJ_iri_fake_ns4_desc: "A modern procurement regime, transparent contracting, and serious anti-corruption enforcement have turned the defence industry into a competitive sector. Inefficiencies are now manageable rather than crippling."
 RAJ_re_fake_militar2_desc: "Restructured command chains and modernised coordination tools have stabilised much of the force. Defensive entrenchment and movement discipline are improving, even if organisation under fire still trails peer armies."
 RAJ_re_fake_militar3_desc: "Doctrine reforms and joint-staff integration have largely closed the gap with comparable militaries. Most units now operate with predictable cohesion in the field."
 RAJ_re_fake_militar4_desc: "A generation of professionalisation has paid off. Indian forces now operate with modern coordination, disciplined manoeuvre, and the entrenchment doctrine of a top-tier military."
 RAJ_industrial_expansion: "Industrial Expansion"
 RAJ_industrial_expansion_desc: "Investing in heavy industry and manufacturing capacity will modernize our economy and create jobs across the nation."
 RAJ_agrarian_society: "Agrarian Society"
 RAJ_agrarian_society_desc: "Strengthening our agricultural sector ensures food security and supports the rural communities that form the backbone of our nation."
 RAJ_expanding_at_calcutta: "Expanding in Calcutta"
 RAJ_expanding_at_calcutta_desc: "With the increase in population, we are faced with the fact that Calcutta needs to expand. We draw inspiration from the permanent expansion policies seen in other major cities."
 RAJ_standard_rationing: "Standard Rationing and Land Reform"
 RAJ_standard_rationing_desc: "Land and food rationing reforms modernize agriculture while unsettling traditional power structures."
 RAJ_indian_air_force: "Indian Air Force"
 RAJ_indian_air_force_desc: "Modernize the Indian Air Force and expand its combat training, building the experienced aircrews needed to command our airspace."
 RAJ_NAJA_idea_1_desc: "Paramilitary and police forces equipped with military-grade weapons and training, deployed to maintain internal security and counter insurgent threats across conflict-prone regions."
 RAJ_network_centric_warfare: "Network-Centric Warfare"
 RAJ_network_centric_warfare_desc: "Network-centric warfare, also called network-centric operations or net-centric warfare, is a military doctrine or theory of war that aims to translate an information advantage, enabled partly by information technology, into a competitive advantage through the computer networking of dispersed forces."
 RAJ_interfaith_dialogue: "Convene Interfaith Dialogue"
 RAJ_interfaith_dialogue_desc: "Fund a sustained national reconciliation program that brings every faith to the same table. Raises opinion across all communities at once with no group left resentful, but the effort is slow and draws heavily on the treasury."
 RAJ_religion_conflict_musl_hindu_title: "Hindu-Muslim Violence Erupts"
 RAJ_religion_conflict_musl_hindu_desc: "In one of the largest and more densely populated cities, a group of Hindus and Muslims began fighting over an unknown dispute. What is known however, is that both sides are actively ripping each other to pieces, and it is seriously taking a toll on the police force there."
 RAJ_religion_conflict_musl_christ_title: "Muslims and Christians at Odds"
 RAJ_religion_conflict_musl_christ_desc: "A group of Muslims and Christians are at odds today over the construction of a Church near a Mosque. Both sides are claiming that the other should move its place of worship to another place in the city, and there have even been reports of small skirmishes all over the city."
 RAJ_religion_conflict_hindu_christ_title: "Hindus and Christians Clash"
 RAJ_religion_conflict_hindu_christ_desc: "This morning, a group of Hindus were outraged by a Christian who insulted a Hindu he was attempting to convert. The incident has escalated into open fighting between the two groups, with several buildings set ablaze."
 RAJ_religion_conflict_back_hindu: "Back the Hindus"
 RAJ_religion_conflict_back_muslim: "Back the Muslims"
 RAJ_religion_conflict_back_christian: "Back the Christians"
 RAJ_religion_conflict_resolve: "Find a solution to please both sides"
 RAJ_drdo_idea_desc: "The Defence Research and Development Organisation channels indigenous R&D into the armed forces, accelerating military research, cutting the cost of converting civilian capacity to military production, and pushing the AI to favour military advancements."
 RAJ_indian_national_congress: "Indian National Congress"
 RAJ_indian_national_congress_desc: "The Indian National Congress has been a dominant force in Indian politics since independence. Strengthening the party apparatus will consolidate democratic governance."
 RAJ_indian_socialism_idea_desc: "Nehru's mixed-economy legacy drives heavy state direction of industrial output, weapons production, and infrastructure. Factory throughput surges, but social cohesion suffers under permit-raj rigidity."
 RAJ_scandinavian_model_idea_desc: "Imported social-democratic policy templates cut education costs and stabilise the political order, at the cost of inflated bureaucracy and a quieter, less militarised public mood."
 RAJ_true_social_democracy_idea_desc: "A mature welfare-state settlement cuts social and health-care costs, lifting war support through visible state competence. Personnel costs rise and political stability dips slightly under the redistributive load."
 RAJ_new_democratic_india_idea_desc: "A reaffirmed commitment to democratic norms lifts stability, accelerates political-power generation, and reinforces democratic drift in domestic opinion."
 RAJ_vietnamese_intervention: "Question Vietnam's Independence"
 RAJ_demand_singapore: "Demand Singapore"
 RAJ_demand_singapore_desc: "With our regional position secured, the time has come to press our historical claim on Singapore and bring the city-state into our sphere."
 RAJ_arms_export_economy: "Arms Export Economy"
 RAJ_brics_leadership: "BRICS Leadership"
 RAJ_religious_climate: "Religious Climate"
 RAJ_country_has_any_naxalite_states: "A state in India has an active Naxalite presence"
 RAJ_has_severe_naxalite_states_trigger: "A state in India has a severe Naxalite presence"
 RAJ_state_has_any_naxalite: "This state has an active Naxalite presence"
 RAJ_country_has_any_naxalite_states_TT: "Any state has an active Naxalite presence"
 RAJ_has_severe_naxalite_states_trigger_TT: "Any state has an active severe Naxalite presence"
 RAJ_hindu_discontent: "Hindu Discontent"
 RAJ_hindu_discontent_desc: "The Hindu majority is growing dissatisfied with government policies. As the largest demographic group, their discontent threatens political stability and erodes the government's base of support."
 RAJ_religious_harmony: "Religious Harmony"
 RAJ_religious_harmony_desc: "All major religious communities in India hold a favorable opinion of the government. This interfaith harmony strengthens national unity and attracts investment."
 RAJ_religious_climate_TT: "§YReligious Climate§!: stability and political power scale with the average opinion of all faiths. Goodwill above the midpoint helps the government, sectarian tension below it weighs it down."
 RAJ_settle_gujarat_unrest_TT: "[RAJ.GetNameWithFlag] §YMuslim§! Opinion is higher than 50\n[RAJ.GetNameWithFlag] §YHindu§! Opinion is higher than 50."
 RAJ_maoist_suppression: "Raid Maoists in [FROM.GetName]"
 RAJ_suppression_failed_tt: "§RThe raid has failed.§! Maoist sympathizers rally around the botched operation, increasing communist support."
 RAJ_delhi_caliphate: "Declare Delhi Caliphate"
 RAJ_delhi_caliphate_desc: "The Salafist movement seizes the apparatus of state and proclaims a Delhi-led caliphate, ending the constitutional republic and binding the new government to Islamic law."
 RAJ_iran_doctrinal_dispute: "Confront the Iranian Doctrine"
 RAJ_iran_doctrinal_dispute_desc: "Tehran's Shia revolutionary doctrine is a direct ideological rival to the Sunni Salafist project. Confronting Iran's regional influence is now a strategic priority."
 RAJ_MAO_rebellion_armed: "Armed Conflict Imminent"
 RAJ_MAO_rebellion_armed_desc: "The Maoist insurgency has escalated beyond demonstrations. Armed cells are mobilizing for open warfare against the government. If left unchecked, civil war is inevitable."
 RAJ_central_asian_revolution: "Salafist Revolution in [FROM.GetName]"
 RAJ_central_asian_revolution_desc: "Conditions in [FROM.GetNameDefCap] are ripe for a Salafist uprising. Channel our influence into the local fascist movement and trigger an armed revolution to bring the country into our sphere."
 RAJ_BRICS_polit_alliance_faction_warning_tt: "§RWarning:§! this will §Rdismantle your existing faction§! and replace it with a new BRICS faction. Any non-BRICS members you have invited will be §Rrejected§!."
 RAJ_arms_export_economy_TT: "§YArms-Export Economies of Scale§!\nEvery distinct export partner raises §Gindustrial capacity§! as the arms industry scales: §G+1%§! factory output per partner."
 RAJ_energy_idea_desc: "Investment in domestic nuclear power expands generation capacity and cuts our dependence on imported fuel."
 RAJ_207_sd_idea_desc: "The Tata Indica, India's first wholly indigenous passenger car, anchors a domestic auto sector that accelerates building construction and factory ramp-up, generates corporate tax revenue, and gives a modest boost to political stability and population growth."
 RAJ_network_improvement_idea_desc: "Upgrades to national telecom infrastructure speed the rollout of digital networks across the country."
 RAJ_socdem_stability_factor: "Stability Factor"
 RAJ_Local_markets_desc: "Domestic bazaars and street-level commerce thrive, accelerating small-building construction across the country."
 TT_RAJ_LOCAL_MARKETS_MODIFIER: "§YAdditional Income§!: $§G0.080§!"
 indian_event.61.t: "Mumbai Train Bombings"
 indian_event.61.d: "On July 11, 2006, a series of seven coordinated bomb blasts ripped through the suburban railway network of Mumbai during evening rush hour, killing 209 people and injuring over 700. The attacks, carried out by Lashkar-e-Taiba with local support, targeted the city's lifeline and sent shockwaves across the nation."
 indian_event.61.a: "This is an act of war."
 RAJ_naxal.19.t: "Darbha Valley Ambush"
 RAJ_naxal.19.d: "On May 25, 2013, Naxalite insurgents ambushed a convoy of the Indian National Congress in the Darbha Valley of Chhattisgarh, killing 27 people including senior state leaders and their security detail. The attack exposed critical gaps in intelligence and route security in the Red Corridor."
 RAJ_naxal.19.a: "The insurgency must be crushed."
 indian_event.62.t: "Uri Base Attack"
 indian_event.62.d: "On September 18, 2016, four militants attacked an Indian Army brigade headquarters near Uri in Jammu and Kashmir, killing 19 soldiers and wounding 30 others. The attack, one of the deadliest on security forces in Kashmir, has triggered widespread calls for retaliation."
 indian_event.62.a: "They will pay for this."
 indian_event.63.t: "Demonetization Announced"
 indian_event.63.d: "On November 8, 2016, the government abruptly announced the demonetization of Rs 500 and Rs 1000 banknotes, rendering 86% of the country's currency invalid overnight. While aimed at curbing black money and counterfeit currency, the move has caused massive disruption to daily life and the informal economy."
 indian_event.63.a: "A necessary sacrifice."
 RAJ_eastas.6.t: "Doklam Standoff"
 RAJ_eastas.6.d: "In June 2017, Indian and Chinese troops became locked in a 73-day standoff at the Doklam tri-junction near Bhutan. Chinese attempts to extend a road into disputed territory were blocked by Indian forces, bringing the two nuclear powers to the brink of armed conflict in the Himalayas."
 RAJ_eastas.6.a: "We will not yield an inch."
 indian_event.64.t: "Pulwama Terror Attack"
 indian_event.64.d: "On February 14, 2019, a suicide bomber from Jaish-e-Mohammed rammed an explosives-laden vehicle into a CRPF convoy near Pulwama in Kashmir, killing 40 personnel. The deadliest terror attack on security forces in decades has triggered a national crisis and demands for retribution."
 indian_event.64.a: "Blood demands blood."
 indian_event.65.t: "Article 370 Revoked"
 indian_event.65.d: "On August 5, 2019, the government revoked Article 370 of the Constitution, stripping Jammu and Kashmir of its special autonomous status and bifurcating the state into two Union Territories. The move, accompanied by a security lockdown and communications blackout, has drawn both domestic praise and international concern."
 indian_event.65.a: "Kashmir is fully integrated."
 indian_event.66.t: "CAA Protests Erupt"
 indian_event.66.d: "In December 2019, widespread protests broke out across the country against the Citizenship Amendment Act, which grants citizenship to non-Muslim refugees from neighboring countries but excludes Muslims. Demonstrators argue the law violates the secular principles of the Constitution."
 indian_event.66.a: "We must listen to the people."
 RAJ_eastas.7.t: "Galwan Valley Clash"
 RAJ_eastas.7.d: "On June 15, 2020, Indian and Chinese troops engaged in brutal hand-to-hand combat in the Galwan Valley of Ladakh, resulting in the deaths of 20 Indian soldiers and an unknown number of Chinese casualties. The clash marks the first fatal border confrontation between the two countries since 1975."
 RAJ_eastas.7.a: "We will honour their sacrifice."
 RAJ_naxal.20.t: "Bijapur Ambush"
 RAJ_naxal.20.d: "On April 3, 2021, Naxalite insurgents ambushed security forces in the Bijapur district of Chhattisgarh, killing 22 personnel in one of the deadliest attacks in recent years. The incident highlights the persistent threat in the Red Corridor despite years of counter-insurgency operations."
 RAJ_naxal.20.a: "They will not break our resolve."
 RAJ_naxal.21.t: "Supreme Court Strikes Down Salwa Judum"
 RAJ_naxal.21.d: "On 5 July 2011, the Supreme Court of India ruled the Salwa Judum unconstitutional, ordering the immediate disarmament of the state-sponsored tribal militia. The court found that arming poorly-trained civilians to fight Maoists violated fundamental rights and fuelled the very cycle of violence it was meant to suppress. Domestic critics and international human-rights bodies are watching New Delhi closely."
 RAJ_naxal.21.a: "We will comply with the ruling."
 RAJ_human_rights_scrutiny: "Human Rights Scrutiny"
 RAJ_human_rights_scrutiny_desc: "International rights organisations and the domestic press are scrutinising counter-insurgency conduct. Stability and political capital take a hit, and foreign intelligence services find India a softer target while the spotlight lasts."
 indian_event.67.t: "Manipur Erupts in Violence"
 indian_event.67.d: "In May 2023, ethnic violence exploded in Manipur between the Meitei and Kuki communities, triggering months of clashes, arson, and displacement. The crisis, rooted in land rights, reservation status, and religious fault lines, has exposed deep fractures in the northeastern state."
 indian_event.67.a: "We must restore order."
 RAJ_regional.1.t: "Cross-Border Strike"
 RAJ_regional.1.d: "On June 9, 2015, the Indian Army launched surgical strikes across the Myanmar border, destroying NSCN-K camps responsible for an ambush that killed 18 soldiers in Manipur's Chandel district. The operation marks India's first acknowledged cross-border strike against insurgent sanctuaries."
 RAJ_regional.1.a: "They had it coming."
 RAJ_regional.2.t: "Enclave Exchange with Bangladesh"
 RAJ_regional.2.d: "On June 6, 2015, India and Bangladesh exchanged 162 enclaves in a landmark agreement ending a 68-year border dispute. Over 50,000 stateless residents will finally receive citizenship."
 RAJ_regional.2.a: "A historic day."
 RAJ_regional.3.t: "Rohingya Crisis Reaches India"
 RAJ_regional.3.d: "In August 2017, Myanmar's military crackdown has driven over 700,000 Rohingya across the border into Bangladesh. India hosts 40,000 Rohingya refugees, and the government must decide whether to shelter or deport them."
 RAJ_regional.3.a: "Deport them all."
 RAJ_regional.3.b: "Grant them refuge."
 RAJ_regional.4.t: "Teesta Talks Collapse"
 RAJ_regional.4.d: "In April 2017, Bangladesh Prime Minister Hasina arrived in New Delhi hoping to finalize a deal on sharing Teesta River waters. West Bengal's chief minister has once again blocked the agreement, leaving Dhaka empty-handed."
 RAJ_regional.4.a: "Override state opposition."
 RAJ_regional.4.b: "Domestic politics comes first."
 RAJ_regional.5.t: "NRC Excludes Millions"
 RAJ_regional.5.d: "In August 2019, the final National Register of Citizens in Assam has excluded 1.9 million people, most of them Bengali Muslims. Combined with the Citizenship Amendment Act, the move has sparked nationwide protests and a furious response from Dhaka."
 RAJ_regional.5.a: "National security demands it."
 RAJ_regional.6.t: "Khalistan Referendum Campaign"
 RAJ_regional.6.d: "In 2020, the banned organization Sikhs for Justice has launched a global non-binding independence referendum, drawing large turnouts among the Sikh diaspora. The movement is fueling separatist sentiment at home despite the government's crackdown."
 RAJ_regional.6.a: "Crush this movement."
 RAJ_regional.7.t: "Myanmar Refugees Flood the Border"
 RAJ_regional.7.d: "Following the February 2021 military coup in Myanmar, thousands of Chin refugees have crossed into Mizoram and Manipur. The central government has ordered states to push them back, but Mizoram's chief minister is openly defying New Delhi."
 RAJ_regional.7.a: "Seal the border."
 RAJ_regional.7.b: "Let them through."
 RAJ_regional.8.t: "Naga Peace Framework Signed"
 RAJ_regional.8.d: "On August 3, 2015, the government signed a framework agreement with the NSCN-IM after 18 years of negotiations. The deal promises a resolution to one of Asia's oldest insurgencies and a new chapter for the Northeast."
 RAJ_regional.8.a: "A step toward lasting peace."
 RAJ_regional.9.t: "Cross-Border Arms Smuggling"
 RAJ_regional.9.d: "Intelligence has uncovered an active weapons pipeline running from Myanmar into the northeastern Red Corridor. A joint operation with Myanmar could shut it down, but it requires resources and diplomatic capital."
 RAJ_regional.9.a: "Launch a joint operation."
 RAJ_regional.9.b: "We cannot spare the resources."
 RAJ_regional.10.t: "Nijjar Assassination Crisis"
 RAJ_regional.10.d: "In June 2023, Khalistani leader Hardeep Singh Nijjar was assassinated in British Columbia. Canada's prime minister has publicly accused India of orchestrating the killing, triggering the worst diplomatic crisis between the two countries in decades."
 RAJ_regional.10.a: "Expel their diplomats."
 RAJ_regional.11.t: "Bay of Bengal Naval Exercises"
 RAJ_regional.11.d: "In 2014, India expanded maritime cooperation with Bangladesh and Myanmar through the BIMSTEC framework, conducting joint patrols and offering corvettes to both navies. The initiative anchors India as the dominant naval power in the Bay of Bengal."
 RAJ_regional.11.a: "Project power in our waters."
 RAJ_regional.12.t: "BSF Border Killings"
 RAJ_regional.12.d: "India's Border Security Force has again been accused of killing Bangladeshi civilians along the frontier. Dhaka has lodged a formal protest and human rights groups are calling for accountability."
 RAJ_regional.12.a: "Order restraint."
 RAJ_regional.12.b: "The border must be held."
 RAJ_regional.13.t: "Nepal Border Blockade"
 RAJ_regional.13.d: "In September 2015, following Nepal's adoption of a new constitution that marginalizes the Madhesi minority, India has restricted fuel and supply shipments across the border. Nepal faces a humanitarian crisis as winter approaches and China offers alternative supply routes."
 RAJ_regional.13.a: "Tighten the blockade."
 RAJ_regional.13.b: "Ease restrictions."
 RAJ_regional.13.c: "Lift the blockade."
 RAJ_regional.14.t: "Nepal Turns to China"
 RAJ_regional.14.d: "Months of restricted supplies have devastated Nepal's economy. Kathmandu has signed new trade and transit agreements with Beijing, a dramatic shift in a country long within India's orbit. The blockade has become a cautionary tale of overreach."
 RAJ_regional.14.a: "The damage is done."
 RAJ_regional.14.b: "Extend an olive branch."
 RAJ_regional.14.c: "Our restraint paid off."
 RAJ_regional.15.t: "Kalapani Border Dispute"
 RAJ_regional.15.d: "In May 2020, Nepal's parliament unanimously passed a constitutional amendment claiming Kalapani, Lipulekh, and Limpiyadhura. The disputed tri-junction sits at the India-Nepal-China border, and troop deployments could escalate tensions across the entire Himalayan frontier."
 RAJ_regional.15.a: "Reinforce our positions."
 RAJ_regional.15.b: "Propose negotiations."
 RAJ_regional.15.c: "Accept a joint survey."
 RAJ_regional.16.t: "1950 Treaty Under Review"
 RAJ_regional.16.d: "Nepal has formally proposed revising the 1950 Treaty of Peace and Friendship, calling it an unequal relic. The treaty underpins India's influence over Nepal's foreign and defense policy, and renegotiation could reshape the bilateral relationship."
 RAJ_regional.16.a: "Modernize the partnership."
 RAJ_regional.16.b: "The treaty stays."
 RAJ_regional.17.t: "Bhutan Thanks India"
 RAJ_regional.17.d: "Following the resolution of the Doklam standoff, Bhutan has privately expressed deep gratitude for India's willingness to confront China on its sovereign territory. Thimphu is eager to formalize stronger defense ties."
 RAJ_regional.17.a: "Deepen the alliance."
 RAJ_regional.17.b: "A handshake is enough."
 RAJ_regional.18.t: "Bhutan Hydropower Expansion"
 RAJ_regional.18.d: "The Mangdechhu Hydroelectric Project has been commissioned, adding 720 MW of capacity. India finances and builds Bhutan's dams and purchases the surplus electricity, anchoring one of the most lopsided but stable partnerships in South Asia."
 RAJ_regional.18.a: "Expand the partnership."
 RAJ_regional.18.b: "We have enough commitments."
 RAJ_regional.19.t: "Bhutan Embraces Democracy"
 RAJ_regional.19.d: "In March 2008, King Jigme Singye Wangchuck has overseen Bhutan's peaceful transition from absolute monarchy to constitutional democracy. The first elections have been held without incident. India's closest ally enters a new era."
 RAJ_regional.19.a: "Welcome them to democracy."
 RAJ_regional.19.b: "A monarchy was simpler."
 RAJ_regional.20.t: "India's Blockade Bites"
 RAJ_regional.20.d: "India's closure of border crossings has left Nepal critically short of fuel, medicines, and cooking gas. Beijing has offered emergency supplies and transit rights through Tibet. Kathmandu faces a stark choice between pride and pragmatism."
 RAJ_regional.20.a: "Accept China's offer."
 RAJ_regional.20.b: "Endure and negotiate."
 RAJ_regional.21.t: "Ottawa Demands Accountability"
 RAJ_regional.21.d: "Canada has formally accused India of involvement in the assassination of Sikh leader Hardeep Singh Nijjar on Canadian soil. Ottawa is weighing its next move as the diplomatic standoff threatens bilateral trade and the large Indo-Canadian diaspora."
 RAJ_regional.21.a: "Expel Indian diplomats."
 RAJ_regional.21.b: "Pursue diplomatic resolution."
 RAJ_regional.22.t: "Dhaka Condemns Rohingya Expulsions"
 RAJ_regional.22.d: "India has begun deporting Rohingya refugees back toward Myanmar, drawing sharp condemnation from Dhaka. Bangladesh, already overwhelmed with over a million refugees from Myanmar, has called the move a betrayal of shared humanitarian obligations."
 RAJ_regional.22.a: "Condemn New Delhi's decision."
 RAJ_regional.23.t: "Dhaka Welcomes India's Solidarity"
 RAJ_regional.23.d: "India's decision to shelter Rohingya refugees rather than expel them has been welcomed warmly in Dhaka. Bangladesh sees this as an act of genuine solidarity in a crisis that has strained every country in the region."
 RAJ_regional.23.a: "We appreciate India's solidarity."
 RAJ_regional.24.t: "India Reinforces Kalapani"
 RAJ_regional.24.d: "Indian troops have moved to reinforce positions in the disputed Kalapani-Lipulekh tri-junction, days after Nepal's parliament unanimously claimed the territory. Kathmandu must decide whether to match India's military posture or seek a diplomatic off-ramp."
 RAJ_regional.24.a: "Mobilize our forces."
 RAJ_regional.24.b: "Protest through diplomacy."
 RAJ_regional.25.t: "Bhutan Weighs India's Alliance"
 RAJ_regional.25.d: "In the wake of the Doklam standoff, India has deepened its defense partnership with Bhutan. Thimphu is grateful for India's intervention but mindful that full alignment could further provoke Beijing, which has its own territorial claims on Bhutanese territory."
 RAJ_regional.25.a: "India is our shield."
 RAJ_regional.25.b: "We must not provoke China."
 RAJ_regional.26.t: "Dhaka Signs the Teesta Deal"
 RAJ_regional.26.d: "After years of negotiations stalled by West Bengal's objections, India has finally overridden domestic opposition and offered to sign the Teesta River water-sharing agreement. The deal is a major diplomatic win for Bangladesh and could transform bilateral relations."
 RAJ_regional.26.a: "Sign the agreement."
