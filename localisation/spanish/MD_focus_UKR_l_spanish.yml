l_spanish:
 ukraine_focus: "Árbol de enfoque ucraniano"
 UKR_home_to_chernobyl_zone: "Hogar de la Zona de Exclusión de Chernobyl"
 UKR_chernobyl_tooltip: "La Zona de Exclusión de Chernobyl se estableció en las regiones del norte de este estado, tras el catastrófico accidente nuclear en la central nuclear de Chernobyl. La zona cubre un área de aproximadamente 2,600 kilómetros cuadrados en Ucrania y fue evacuada y declarada inhabitable debido a altos niveles de contaminación radiactiva. Desde su establecimiento, la zona de exclusión ha sido gestionada por el gobierno ucraniano, y se han realizado esfuerzos continuos para monitorear y remediar los impactos ambientales y de salud del desastre."
 UKR_chernobyl_effects_tooltip: "§Rfugas adicionales de radiación podrían causar daños a largo plazo§!"
 UKR_ukraine_elections: "Elecciones ucranianas"
 UKR_ukraine_elections_desc: "It is time to decide who will lead our country further."
 donbass_civil_war: "La guerra civil en Donbass tuvo lugar"
 UKR_republic_ukr: "La República Federal"
 UKR_republic_ukr_desc: "The Federal Republic is a special type of entity, which is the basis of the entire Ukrainian Federation. It has expanded autonomy as well as the ability to make its own laws."
 UKR_confederation: "Federalización"
 UKR_confederation_desc: "Several regions received the maximum possible autonomy, which led to a state similar to the Confederate system."
 subject_ukr.1.t: "[FROM.GetNameWithFlag] solicita la construcción de una fábrica"
 subject_ukr.1.d: "[FROM.GetNameWithFlag] government requests the construction of a factory on its territory, due to the inability to do it on its own."
 subject_ukr.1.a: "Sí"
 subject_ukr.1.b: "No"
 subject_ukr.2.t: "Construyendo una fábrica"
 subject_ukr.2.d: "[UKR.GetNameWithFlag] has agreed to build a factory."
 subject_ukr.2.a: "Bien"
 subject_ukr.3.t: "Construyendo una fábrica"
 subject_ukr.3.d: "[UKR.GetNameWithFlag] has refused to build a factory."
 subject_ukr.3.a: "Triste"
 subject_ukr.4.t: "[FROM.GetNameWithFlag] solicita subsidios"
 subject_ukr.4.d: "El gobierno de [FROM.GetNameWithFlag] solicita subsidios de nosotros para su presupuesto, ¿estamos dispuestos a asignarlos?"
 subject_ukr.4.a: "Sí"
 subject_ukr.4.b: "No"
 subject_ukr.5.t: "Subsidios del presupuesto federal"
 subject_ukr.5.d: "[UKR.GetNameWithFlag] has agreed to provide us with funds from the Federal budget."
 subject_ukr.5.a: "Bien"
 subject_ukr.6.t: "Subsidios del presupuesto federal"
 subject_ukr.6.d: "[UKR.GetNameWithFlag] has refused to allocate funds from the Federal budget to us."
 subject_ukr.6.a: "Triste"
 UKR_subsidies: "Solicitar subsidios de §Y[UKR.GetNameWithFlag]§!"
 UKR_buildings: "Solicitar fábricas de §Y[UKR.GetNameWithFlag]§!"
 UKR_subject_annex: "Reintegrar sujetos de vuelta"
 UKR_subjectautoritet_tt: "La autoridad del sujeto aumentará en §Y[?modify_subjectavtoritet]%§!"
 UKR_authority_more_60: "Nuestro sujeto tiene §Y60%§! de autoridad entre el gobierno federal [ROOT.GetFlag]"
 ukraine_maidan_west.1.t: "Protestas en el Maidán"
 ukraine_maidan_west.1.d: "Our state policies do not suit a certain part of the population. People are starting to come out to the famous Kyiv square - Maidan, as way to express dissatisfaction with our political decisions."
 ukraine_maidan_west.1.a: "Estamos observando"
 ukraine_maidan_west.2.t: "Protestas en el Maidán"
 ukraine_maidan_west.2.d: "Nuestro gobierno esperaba que las protestas llegaran a un rápido final, pero esto no sucedió; más bien, la gente comenzó a armar tiendas de campaña y establecer un campamento en la plaza para quedarse por un período más largo."
 ukraine_maidan_west.2.a: "Tengo un mal presentimiento sobre esto"
 ukraine_maidan_west.3.t: "Protestas en el Maidán"
 ukraine_maidan_west.3.d: "The protesters are not going to leave and are starting to behave more aggressively, maybe it's time to take action and demolish their little tent city."
 ukraine_maidan_west.3.a: "Despleguemos la unidad Berkut"
 ukraine_maidan_west.3.b: "No interferiremos"
 ukraine_maidan_west.4.t: "Protestas en el Maidán"
 ukraine_maidan_west.4.d: "We have begun to disperse the protesters, many foreign TV channels are covering this as a bloody massacre, but our task is only one - to save the state."
 ukraine_maidan_west.4.a: "Por el bien de la patria!"
 ukraine_maidan_west.5.t: "Protestas en el Maidán"
 ukraine_maidan_west.5.d: "We decided against dispersing the protesters, hoping that their ardor would cool down and they would all go back home, for now let's see what happens next, but so far we do not see any sign of the situation cooling down."
 ukraine_maidan_west.5.a: "Estamos esperando"
 ukraine_maidan_west.6.t: "Protestas en el Maidán"
 ukraine_maidan_west.6.d: "We decided to negotiate with the protesters, perhaps we can satisfy their political demands."
 ukraine_maidan_west.6.a: "Esperamos lo mejor"
 ukraine_maidan_west.7.t: "Protestas en el Maidán"
 ukraine_maidan_west.7.d: "Nuestros intentos de negociación fueron percibidos como una debilidad, incluso dentro de nuestro partido. Nuestros colegas están abandonando activamente nuestras filas y desertando al lado de los manifestantes, sintiendo que el viento del cambio está de su lado."
 ukraine_maidan_west.7.a: "Tengo un mal presentimiento sobre esto"
 ukraine_maidan_west.8.t: "Protestas en el Maidán"
 ukraine_maidan_west.8.d: "Nuestro partido político ha colapsado por completo, hemos perdido a nuestros colegas y parece que nuestros compañeros de partido están de acuerdo con las demandas de la oposición... Parece que este es el fin."
 ukraine_maidan_west.8.a: "Oh God..."
 ukraine_maidan_west.9.t: "El motín en Crimea"
 ukraine_maidan_west.9.d: "Resultó que los residentes de Crimea no estaban satisfechos con lo que estaba sucediendo y nos exigieron una federalización completa con la concesión de derechos y poderes a los sujetos, similar a cómo funciona el sistema federal de Rusia. ¿Iremos por ello?"
 ukraine_maidan_west.9.a: "Tal vez sea hora de comenzar la federalización."
 ukraine_maidan_west.9.b: "No habrá federalización aquí"
 ukraine_maidan_west.10.t: "La rebelión en el sureste"
 ukraine_maidan_west.10.d: "Las regiones del sureste también resultaron insatisfechas con los eventos que estaban ocurriendo y nos exigieron federalización. ¿Estaremos de acuerdo?"
 ukraine_maidan_west.10.a: "Donbass se convertirá en un sujeto"
 ukraine_maidan_west.10.b: "No habrá federalización"
 ukraine_maidan_west.11.t: "Motín en Járkov"
 ukraine_maidan_west.11.d: "Los disturbios en Donetsk y Lugansk provocaron una reacción similar en Járkov. Los separatistas lograron llegar al poder allí y declarar su República de Járkov."
 ukraine_maidan_west.11.a: "¿Cuántos hay?"
 ukraine_maidan_west.12.t: "Motín en Odesa"
 ukraine_maidan_west.12.d: "Los levantamientos en el Donbass provocaron disturbios en Odessa. Al principio, todo empezó de forma bastante pacífica y podría haber terminado así, pero no teníamos los medios para sofocar la rebelión y ahora los ciudadanos locales han declarado su república."
 ukraine_maidan_west.12.a: "¿Cuántos hay?"
 ukraine_maidan_west.13.t: "Protestas en el Maidán"
 ukraine_maidan_west.13.d: "Hemos hecho un intento de dispersar el Maidán por la fuerza con la participación de Berkut."
 ukraine_maidan_west.13.a: "Protejamos el país!"
 ukraine_maidan_west.14.t: "Protestas en el Maidán"
 ukraine_maidan_west.14.d: "La respuesta no se hizo esperar y las protestas comenzaron a radicalizarse. Adoptando una estrategia violenta, la gente comenzó a usar cócteles molotov, armas pequeñas y piedras contra nuestras fuerzas de seguridad."
 ukraine_maidan_west.14.a: "Oh God..."
 ukraine_maidan_west.15.t: "Desplegar el ejército!"
 ukraine_maidan_west.15.d: "Intentaremos desplegar el ejército para hacer un intento de reprimir las protestas."
 ukraine_maidan_west.15.a: "Las Fuerzas Armadas de Ucrania salvarán a Ucrania."
 ukraine_maidan_west.16.t: "Protestas en el Maidán"
 ukraine_maidan_west.16.d: "Varias unidades de las fuerzas armadas fueron puestas en alerta máxima y enviadas a la capital para lidiar con las protestas."
 ukraine_maidan_west.16.a: "The Army Has Arrived in Kyiv"
 ukraine_maidan_west.16.b: "El ejército no pudo ayudar"
 ukraine_maidan_west.17.t: "The Kyiv Massacre"
 ukraine_maidan_west.17.d: "El ejército entró en un enfrentamiento armado con los manifestantes. Comenzó una verdadera masacre, ya que se dispararon armas de fuego desde ambos lados en la batalla."
 ukraine_maidan_west.17.a: "Eso es horrible"
 ukraine_maidan_west.18.t: "The Kyiv Massacre"
 ukraine_maidan_west.18.d: "No tuvimos otra opción y, como resultado, muchos que pudieron sobrevivir a esta represión huyeron a las regiones occidentales del país, donde se están preparando para luchar contra nuestro gobierno por tal cruel traición a su pueblo."
 ukraine_maidan_west.18.a: "Se avecina una tormenta"
 ukraine_maidan_west.19.t: "El levantamiento en Galitzia"
 ukraine_maidan_west.19.d: "Euromaidan supporters, as well as survivors of the Kyiv massacre, have declared independence from Ukraine. Two new republics on the territory of Volhynia and the Lviv region intend to fight back against the central government."
 ukraine_maidan_west.19.a: "Estamos listos para luchar!"
 ukraine_maidan_west.20.t: "Protestas en el Maidán"
 ukraine_maidan_west.20.d: "Sin el apoyo del ejército, nuestras fuerzas de seguridad no pueden hacer frente a la presión de los manifestantes, tal vez la ronda final de esta lucha llegará pronto."
 ukraine_maidan_west.20.a: "El fin está cerca"
 ukraine_maidan_west.21.t: "Protestas en el Maidán"
 ukraine_maidan_west.21.d: "Ocurrió una terrible tragedia durante las protestas. Francotiradores desconocidos abrieron fuego contra los manifestantes, provocando una reacción aún mayor. Nuestros colegas se van, creyendo que la orden de disparar provino de nuestro gobierno."
 ukraine_maidan_west.21.a: "¿Realmente hemos perdido?"
 ukraine_maidan_west.22.t: "Protestas en el Maidán"
 ukraine_maidan_west.22.d: "Nuestro gobierno ha colapsado por completo. Pronto, no habrá nadie que nos apoye. Es hora de prepararse para entregar el poder."
 ukraine_maidan_west.22.a: "Últimas horas"
 ukraine_maidan_west.23.t: "Protestas en el Maidán"
 ukraine_maidan_west.23.d: "Nuestro gobierno finalmente ha sido derrocado. Las protestas han logrado su objetivo."
 ukraine_maidan_west.23.a: "El Maidán ha ganado!"
 ukraine_maidan_west.24.t: "Federalización"
 ukraine_maidan_west.24.d: "Comenzaremos el proceso de federalización de nuestro país. Crimea se convertirá en el primer miembro de pleno derecho de nuestra nueva federación. Nadie podrá explotar cuestiones regionales para obtener ganancias políticas."
 ukraine_maidan_west.24.a: "Bueno"
 ukraine_maidan_west.25.t: "Federalización de Galitzia"
 ukraine_maidan_west.25.d: "In light of our reforms and the emergence of independent entities within our federation, representatives of Galicia have also expressed a desire, through an ultimatum, to become a full-fledged member. Will we expand the federation to the west?"
 ukraine_maidan_west.25.a: "Sí"
 ukraine_maidan_west.25.b: "No"
 ukraine_maidan_east.1.t: "Disturbios en el sureste"
 ukraine_maidan_east.1.d: "Nuestras políticas han llevado a protestas y manifestaciones en el sureste del país. Protestas con consignas claramente antigubernamentales han envuelto a muchas ciudades."
 ukraine_maidan_east.1.a: "De Repente"
 ukraine_maidan_east.2.t: "Los diputados se autoorganizan"
 ukraine_maidan_east.2.d: "Las protestas están ganando impulso y ahora los diputados locales se han unido a ellas, declarando consignas bastante peligrosas."
 ukraine_maidan_east.2.a: "Preocupante"
 ukraine_maidan_east.4.t: "Un intento de negociación"
 ukraine_maidan_east.4.d: "The deputies want to negotiate. It is still possible to resolve the conflict peacefully."
 ukraine_maidan_east.4.a: "Meet the deputies"
 ukraine_maidan_east.5.t: "Las negociaciones han fracasado"
 ukraine_maidan_east.5.d: "We couldn't reach an agreement. The protesters are not interested in a peaceful solution anymore."
 ukraine_maidan_east.5.a: "Preparándonos para lo peor"
 ukraine_maidan_east.6.t: "Negotiations Keep Going"
 ukraine_maidan_east.6.d: "For now, we were able to prevent violence and negotiate with the parties involved in the conflict. Now we await their proposal for a final settlement."
 ukraine_maidan_east.6.a: "We May Have Avoided The Worst"
 ukraine_maidan_east.7.t: "Organización de la milicia"
 ukraine_maidan_east.7.d: "Los manifestantes locales han comenzado a formar unidades de milicia, lo que lleva a una rebelión armada."
 ukraine_maidan_east.7.a: "Oh God..."
 ukraine_maidan_east.8.t: "Comenzar la represión"
 ukraine_maidan_east.8.d: "La situación se está saliendo de control en muchas regiones del sureste. Es hora de tomar medidas decisivas."
 ukraine_maidan_east.8.a: "Iremos a Odesa"
 ukraine_maidan_east.8.b: "Iremos a Donbass y Járkov"
 ukraine_maidan_east.8.c: "Debemos prepararnos mejor"
 ukraine_maidan_east.9.t: "Odesa está salvada"
 ukraine_maidan_east.9.d: "Reprimimos a los separatistas locales antes de que pudieran tomar el control de la región, pero ahora ha comenzado una rebelión armada en Donbass debido a nuestro enfoque en Odesa."
 ukraine_maidan_east.9.a: "Es hora de prepararse"
 ukraine_maidan_east.10.t: "Represión de Donbass"
 ukraine_maidan_east.10.d: "Nuestro intento de reprimir la rebelión de Donbass no tuvo éxito. Las unidades de Berkut se han unido a los rebeldes, poniéndonos en una situación aún más difícil."
 ukraine_maidan_east.10.a: "Es hora de prepararse"
 ukraine_maidan_east.11.t: "Retraso crítico"
 ukraine_maidan_east.11.d: "Nuestro retraso resultó en que muchas repúblicas en el sureste estallaran en rebeliones armadas."
 ukraine_maidan_east.11.a: "Cometimos un error."
 ukraine_maidan_east.12.t: "Disturbios en el sureste"
 ukraine_maidan_east.12.d: "Nuestras acciones han llevado a una escalada generalizada y ahora estamos enfrentando las consecuencias."
 ukraine_maidan_east.12.a: "Cometimos un error."
 ukraine_maidan_east.13.t: "Motín en Járkov"
 ukraine_maidan_east.13.d: "La falta de preparación de nuestros servicios especiales nos jugó otra mala pasada. En Járkov, no pudimos reprimir la rebelión, lo que llevó a un levantamiento armado."
 ukraine_maidan_east.13.a: "¿Cuántos hay?"
 ukraine_maidan_east.17.t: "La rebelión de Donbass"
 ukraine_maidan_east.17.d: "Ha comenzado un levantamiento armado en las regiones de Donetsk y Lugansk. Las unidades de Berkut han sido instrumentales para ayudar a los rebeldes a desarmar algunas unidades militares estacionadas allí."
 ukraine_maidan_east.17.a: "Maldición"
 ukraine_maidan_east.18.t: "El motín en Odesa"
 ukraine_maidan_east.18.d: "La deserción de Berkut a los rebeldes ha inspirado enormemente a los separatistas en Odesa, donde también han declarado la creación de una república popular."
 ukraine_maidan_east.18.a: "¿Cuántos hay?"
 ukraine_maidan_east.19.t: "El gobierno está perdiendo poder"
 ukraine_maidan_east.19.d: "Cometimos errores críticos que llevaron a una guerra civil y nuestros oponentes políticos utilizarán esto para apoderarse del poder."
 ukraine_maidan_east.19.a: "Venga lo que venga"
 ukraine_maidan_east.19.b: "Venga lo que venga"
 ukraine_maidan_east.19.c: "Venga lo que venga"
 ukraine_maidan_east.20.t: "El gobierno está perdiendo poder"
 ukraine_maidan_east.20.d: "Cometimos errores críticos que llevaron a una guerra civil y nuestros oponentes políticos utilizarán esto para apoderarse del poder."
 ukraine_maidan_east.20.a: "Nos las arreglaremos solos"
 ukraine_maidan_east.20.b: "Pediremos la ayuda de Rusia"
 ukraine_maidan_east.21.t: "El gobierno está perdiendo poder"
 ukraine_maidan_east.21.d: "Cometimos errores críticos que llevaron a una guerra civil y nuestros oponentes políticos utilizarán esto para apoderarse del poder."
 ukraine_maidan_east.21.a: "Nos las arreglaremos solos"
 ukraine_maidan_east.21.b: "Pediremos la ayuda de Rusia"
 ukraine_maidan_east.22.t: "Consolidación contra un enemigo común"
 ukraine_maidan_east.22.d: "A pesar del estallido de la guerra civil, la gente se ha unido a nuestro alrededor. Solo hemos perdido un poco de terreno político, compensando con consignas sobre la santa lucha contra los separatistas."
 ukraine_maidan_east.22.a: "Por Ucrania!"
 ukraine_maidan_east.23.t: "Ucrania ha solicitado nuestra ayuda"
 ukraine_maidan_east.23.d: "El gobierno ucraniano nos ha pedido ayuda debido al estallido de la guerra civil. Ahora debemos decidir si estamos dispuestos a ayudarlos."
 ukraine_maidan_east.23.a: "Los ayudaremos"
 ukraine_maidan_east.23.b: "Déjenlos manejarlo ellos mismos"
 ukraine_maidan_east.24.t: "Elegir ayuda"
 ukraine_maidan_east.24.d: "Aceptamos la solicitud de Ucrania de enviar un contingente. Ahora, debemos decidir a quién enviar."
 ukraine_maidan_east.24.a: "Enviaremos a la policía antidisturbios"
 ukraine_maidan_east.24.b: "Enviaremos a la Rosgvardiya"
 ukraine_maidan_east.24.c: "Enviaremos al PMC Wagner"
 ukraine_maidan_east.25.t: "Rusia se ha negado a ayudarnos"
 ukraine_maidan_east.25.d: "El gobierno ruso se ha negado a enviarnos ayuda o participar en nuestros trágicos eventos de ninguna manera. Estamos decepcionados."
 ukraine_maidan_east.25.a: "Traidor"
 ukraine_maidan_east.26.t: "Cuestión de la federalización"
 ukraine_maidan_east.26.d: "Los rebeldes han presentado su demanda principal y única: la federalización de Ucrania, otorgando a Donbass un estatus especial como sujeto federal. ¿Estamos dispuestos a asumir el riesgo y aceptar tal reforma?"
 ukraine_maidan_east.26.a: "Debe haber federalización"
 ukraine_maidan_east.26.b: "Nunca"
 ukraine_maidan_east.27.t: "Peace at last"
 ukraine_maidan_east.27.d: "Aceptamos la federalización y, gracias a esto, pudimos evitar terribles consecuencias para nuestro país."
 ukraine_maidan_east.27.a: "Bueno"
 UKR_maidan_temporary_attack_idea: "Ofensiva organizada"
 ukraine_maidan.1.t: "Estado de Crimea"
 ukraine_maidan.1.d: "Crimea tiene una población mayoritariamente rusa. La gente allí es nuestra gente. No es justo para ellos y sus hermanos en Donbass vivir bajo el dominio ucraniano. ¿Deberíamos honrar su llamado e integrar a las personas que anhelan estar con nosotros?"
 ukraine_maidan.1.a: "Tomemos Crimea!"
 ukraine_maidan.1.b: "Crimea es ucraniana"
 ukraine_maidan.2.t: "Rusia se anexa Crimea"
 ukraine_maidan.2.d: "La gente de Crimea se ha separado. Han buscado el apoyo del gobierno ruso. Los crimeos aprobaron abrumadoramente un referéndum para permitir que el estado sea absorbido por el estado ruso. Las tropas rusas estacionadas cerca de Crimea inundaron la región y rápidamente tomaron puntos clave. Las tropas fueron recibidas con los brazos abiertos por los traidores. Algún día, recuperaremos el territorio que nos pertenece por derecho."
 ukraine_maidan.2.a: "Interesante"
 ukraine_maidan.3.t: "Rusia niega al pueblo de Ucrania"
 ukraine_maidan.3.d: "Los traidores en Crimea finalmente han celebrado su tonta referéndum para tratar de separarse de nosotros. La gente de Rusia ha fomentado este comportamiento durante mucho tiempo. Es un misterio por qué los rusos han negado a la gente de Crimea. Sin embargo, se agradece que no nos hayan socavado más al tomar el control de la región. El tiempo dirá qué ha causado esta decisión."
 ukraine_maidan.3.a: "Un buen día"
 ukraine_maidan.4.t: "Los Acuerdos de Minsk"
 ukraine_maidan.4.d: "La guerra no condujo al resultado esperado para nosotros. Los separatistas no han sido destruidos y la gente está claramente descontenta con la guerra interminable. ¿Tal vez deberíamos tomarnos un descanso?"
 ukraine_maidan.4.a: "Paz ahora"
 ukraine_maidan.4.b: "¿Paz? ¿Por qué?"
 ukraine_maidan.5.t: "Los Acuerdos de Minsk"
 ukraine_maidan.5.d: "La guerra no condujo al resultado esperado para nosotros. Los separatistas no han sido destruidos y la gente está claramente descontenta con la guerra interminable. ¿Tal vez deberíamos tomarnos un descanso?"
 ukraine_maidan.5.a: "Paz ahora"
 ukraine_maidan.5.b: "¿Paz? ¿Por qué?"
 ukraine_maidan.6.t: "Observadores de la OSCE"
 ukraine_maidan.6.d: "Para controlar y prevenir el conflicto armado, se enviaron observadores de la OSCE a la zona fronteriza para garantizar la paz y la estabilidad en el Donbás."
 ukraine_maidan.6.a: "Solo una tregua"
 ukraine_maidan.7.t: "Observadores de la OSCE"
 ukraine_maidan.7.d: "Para controlar y prevenir el conflicto armado, se enviaron observadores de la OSCE a la zona fronteriza para garantizar la paz y la estabilidad en el Donbás."
 ukraine_maidan.7.a: "Solo una tregua"
 ukraine_maidan.8.t: "Ucrania propone la federalización"
 ukraine_maidan.8.d: "Ucrania nos ofrece un proyecto de federalización y acepta reconocernos como una entidad separada. ¿Estaremos de acuerdo con esto?"
 ukraine_maidan.8.a: "Estamos de acuerdo"
 ukraine_maidan.8.b: "We Refuse"
 ukraine_maidan.9.t: "Trabajando con empresas rusas"
 ukraine_maidan.9.d: "Continuaremos trabajando con empresas rusas porque la Unión Europea no puede proporcionarnos el nivel de recursos y tecnología que necesitamos."
 ukraine_maidan.9.a: "Sacrificio necesario"
 ukraine_maidan.10.t: "Ucrania propone la federalización"
 ukraine_maidan.10.d: "Ucrania nos ofrece un proyecto de federalización y acepta reconocernos como una entidad separada. ¿Estaremos de acuerdo con esto?"
 ukraine_maidan.10.a: "Estamos de acuerdo"
 ukraine_maidan.10.b: "We Refuse"
 ukraine_maidan.11.t: "Descontento con nuestra política"
 ukraine_maidan.11.d: "Residents of the western part of our country are dissatisfied with the policies we are pursuing. They feel the policies are directed against them and are actively expressing their dissatisfaction."
 ukraine_maidan.11.a: "Esto es malo"
 ukraine_maidan.12.t: "Descontento con nuestra política"
 ukraine_maidan.12.d: "Residents of the eastern part of our country are dissatisfied with the policies we are pursuing. They feel the policies are directed against them and are actively expressing their dissatisfaction."
 ukraine_maidan.12.a: "Esto es malo"
 ukraine_maidan.13.t: "El destino de Ucrania"
 ukraine_maidan.13.d: ""
 ukraine_maidan.13.a: ""
 ukraine_maidan.14.t: "Negociaciones con las regiones orientales"
 ukraine_maidan.14.d: "Nuestras políticas han llevado al completo desconocimiento de nuestro gobierno por parte de las regiones orientales, y están saboteando activamente nuestras actividades. Sin embargo, tenemos la oportunidad de negociar con ellos."
 ukraine_maidan.14.a: "Haremos un compromiso"
 ukraine_maidan.14.b: "No son nada"
 ukraine_maidan.15.t: "Negociaciones con las regiones occidentales"
 ukraine_maidan.15.d: "Nuestras políticas han llevado al completo desconocimiento de nuestro gobierno por parte de las regiones occidentales, y están saboteando activamente nuestras actividades. Sin embargo, tenemos la oportunidad de negociar con ellos."
 ukraine_maidan.15.a: "Haremos un compromiso"
 ukraine_maidan.15.b: "No son nada"
 ukraine_maidan.16.t: "Reforma populista"
 ukraine_maidan.16.d: "Nuestra presidencia debe comenzar con algún tipo de reforma. Debemos decidir exactamente qué se convertirá en el foco de nuestras actividades reformistas."
 ukraine_maidan.16.a: "Reforma agraria"
 ukraine_maidan.16.b: "Reforma de carreteras"
 ukraine_maidan.16.c: "Influiremos en la Rada"
 ukraine_maidan.17.t: "Estabilidad política"
 ukraine_maidan.17.d: "Nuestras políticas sabias y competentes han dado frutos. Mientras nuestro país es estable, nuestro poder político solo está creciendo."
 ukraine_maidan.17.a: "Bien"
 ukraine_news.7.t: "Guerra civil en Ucrania"
 ukraine_news.7.d: "La gente en la región de Donbás de Ucrania se ha declarado independiente. Han anunciado a la gente en los óblasts de Donetsk y Lugansk que ya no se someterán a la tiranía de Kiev. [UKR.GetLeader] y la administración ucraniana han denunciado a los rebeldes y se han movilizado para sofocarlos. Ya han estallado escaramuzas en la región entre las fuerzas locales pro-Ucrania y los rebeldes."
 ukraine_news.7.a: "Reprimir la rebelión"
 ukraine_news.7.b: "Derrota a los opresores!"
 ukraine_news.7.c: "Situación interesante"
 ukraine_news.8.t: "Anexión de Crimea"
 ukraine_news.8.d: "La gente de Crimea ha celebrado un referéndum para separarse de Ucrania y alinearse con Rusia. La respuesta rusa fue rápida y decisiva, ya que rápidamente inundaron tropas en la región y anexaron la península. Las posiciones militares clave fueron rápidamente tomadas. El gobierno ucraniano ha expresado su indignación por el asunto y exige que Rusia devuelva Crimea."
 ukraine_news.8.a: "Solo por ahora..."
 ukraine_news.8.b: "Por la Madre Rusia!"
 ukraine_news.8.c: "Noticias preocupantes."
 UKR_crimea_bund: "La República de Crimea se ha rebelado"
 UKR_civil_war: "Guerra en Donbás"
 UKR_civil_war_desc: "Our country is divided - we are waging a civil war against our own citizens, our army is not united in its rush to destroy the separatists."
 UKR_civil_war1: "Guerra en Galitzia"
 UKR_civil_war1_desc: "Our country is divided - we are waging a civil war against our own citizens, our army is not united in its rush to destroy the separatists."
 UKR_russian_gas: "Recursos energéticos rusos"
 UKR_russian_gas_desc: "We are heavily dependent on the supply of resources from Russia, and until we find an alternative to this, we are forced to negotiate with Moscow."
 UKR_russian_gas_cheap: "Recursos energéticos rusos baratos"
 UKR_russian_gas_cheap_desc: "We are heavily dependent on the supply of resources from Russia, and until we find an alternative to this, we are forced to negotiate with Moscow."
 UKR_russian_gas_cheaper: "Recursos energéticos rusos baratos"
 UKR_russian_gas_cheaper_desc: "We are heavily dependent on the supply of resources from Russia, and until we find an alternative to this, we are forced to negotiate with Moscow."
 UKR_russian_gas_sov: "Contrato de gas con Ucrania"
 UKR_russian_gas_sov_desc: "Gas contract has been signed between us and Ukraine, on special conditions, which allows us to have leverage over them."
 UKR_russian_gas_cheap_sov: "Contrato de gas con Ucrania"
 UKR_russian_gas_cheap_sov_desc: "Gas contract has been signed between us and Ukraine, on special conditions, which allows us to have leverage over them."
 UKR_russian_gas_cheaper_sov: "Contrato de gas con Ucrania"
 UKR_russian_gas_cheaper_sov_desc: "Gas contract has been signed between us and Ukraine, on special conditions, which allows us to have leverage over them."
 UKR_idea_old_national_guard: "La Guardia Nacional"
 UKR_idea_old_national_guard_desc: "The National Guard of Ukraine is a state armed body created on the basis of the Internal Troops of the USSR, designed to protect the sovereignty of Ukraine, its territorial integrity, as well as the life and personal dignity of citizens, their constitutional rights and freedoms from criminal encroachments and other antisocial actions."
 UKR_kleptocracy: "Cleptocracia"
 UKR_kleptocracy_desc: "El gobierno ucraniano actualmente está atrapado en su cleptocracia. Los altos rangos están corrompidos y utilizan su poder para explotar a la gente y los recursos naturales de su territorio para extender su riqueza y poderes políticos. \n\n§CTara eliminar el impacto negativo de la cleptocracia, el país debe tomar medidas para combatir la corrupción.§!"
 UKR_kleptocracy01: "Cleptocracia fuerte"
 UKR_kleptocracy01_desc: "El gobierno ucraniano actualmente está atrapado en su cleptocracia. Los altos rangos están corrompidos y utilizan su poder para explotar a la gente y los recursos naturales de su territorio para extender su riqueza y poderes políticos. \n\n§CTara eliminar el impacto negativo de la cleptocracia, el país debe tomar medidas para combatir la corrupción.§!"
 UKR_kleptocracy02: "Cleptocracia muy fuerte"
 UKR_kleptocracy02_desc: "El gobierno ucraniano actualmente está atrapado en su cleptocracia. Los altos rangos están corrompidos y utilizan su poder para explotar a la gente y los recursos naturales de su territorio para extender su riqueza y poderes políticos. \n\n§CTara eliminar el impacto negativo de la cleptocracia, el país debe tomar medidas para combatir la corrupción.§!"
 UKR_kleptocracy03: "Cleptocracia paralizante"
 UKR_kleptocracy03_desc: "El gobierno ucraniano actualmente está atrapado en su cleptocracia. Los altos rangos están corrompidos y utilizan su poder para explotar a la gente y los recursos naturales de su territorio para extender su riqueza y poderes políticos. \n\n§CTara eliminar el impacto negativo de la cleptocracia, el país debe tomar medidas para combatir la corrupción.§!"
 UKR_to_many_generals: "Estado Mayor excesivo"
 UKR_to_many_generals_desc: "Ucrania tiene 450 generales activos en su ejército. La mayoría de ellos obtuvieron sus puestos debido a vínculos y esquemas de corrupción y no tienen experiencia en la conducción de operaciones de combate. El estado mayor actual es incompetente y necesita desesperadamente una reforma."
 UKR_idea_government_in_need: "Gobierno ineficaz"
 UKR_every_man_ataman: "Cada hombre - Atamán"
 UKR_every_man_ataman_desc: "The spirit of Ukrainians is the spirit of freedom and independence, sometimes it benefits, sometimes it can play a cruel joke with the country."
 UKR_support_uia: "UIA"
 UKR_support_uia_desc: "UIA o Ukrainian International Airlines es la aerolínea insignia y más grande presente en Ucrania. El centro principal para sus aviones es el Aeropuerto Internacional de Boryspil en Kiev. Opera vuelos de pasajeros y servicios de carga a Europa, Oriente Medio, Estados Unidos, Canadá y Asia."
 UKR_build_new_airports: "Construir nuevos aeropuertos"
 UKR_build_new_airports_desc: "Nuestros aeropuertos han sido descuidados durante demasiado tiempo. Necesitamos invertir en nuestros aeropuertos tanto para fines civiles como militares."
 UKR_invest_in_ministry_of_infrastructure: "Ministerio de Infraestructura"
 UKR_invest_in_ministry_of_infrastructure_desc: "El Ministerio de Infraestructura ha recibido algunas críticas. La infraestructura de Ucrania se está desmoronando debido a funcionarios corruptos en el Ministerio que desvían fondos. La gente no puede conducir por algunas carreteras debido a las condiciones. Es hora de rediseñar el Ministerio con la esperanza de un futuro mejor para nuestras industrias."
 UKR_roads_extend_plan: "Planes de inversión en carreteras"
 UKR_roads_extend_plan_desc: "Las carreteras en Ucrania no son las mejores del mundo. Algunas áreas todavía dependen de carreteras sin pavimentar o casi destruidas. Es hora de que estas regiones reciban un poco de amor."
 UKR_ukrainian_railways: "UZ"
 UKR_ukrainian_railways_desc: "UZ is the name of the state-owned company that currently possesses a massive monopoly on the majority of the Ukrainian railroad transportation within the country. The company boasts an impressive combined total track length of over 23,000km worth of track, marking it as the 13th largest in the world.\n\nIt is also the 6th largest rail passenger transporter and 7th largest freight transporter."
 UKR_gas_tt: "Le pagamos a Rusia por recursos energéticos: $§R0.175§!\n"
 UKR_gas_cheap_tt: "Le pagamos a Rusia por recursos energéticos: $§R0.100§!\n"
 UKR_gas_cheaper_tt: "Le pagamos a Rusia por recursos energéticos: $§R0.100§!\n"
