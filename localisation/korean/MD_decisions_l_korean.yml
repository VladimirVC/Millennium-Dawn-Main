 NATO_CSTO_agreement: "유럽 재래식 무력 조약"
 NATO_CSTO_agreement_desc: "CFE 조약은 냉전이 막바지에 다다른 1990년, 나토와 바르샤바 조약기구 사이에 체결되었습니다.\n목표는 유럽에서 어느 한쪽도 대규모 기습 전격전, 침공 또는 전쟁을 개시할 수 있을 만큼 재래식 군사력을 밀집시키지 못하게 예방하는 것이었습니다.\n이후 나토-집단안보조약기구(CSTO) 간의 조약으로 변모했지만, 유럽 내 확전을 방지할 수 있으리라는 희망은 여전히 큽니다.\n\n우리는 유럽 내 군사력 유지를 제한해야 합니다.\n\n주요 제한 사항은 기계화 및 기갑 대대의 수에 관한 것입니다. 현재 배치된 병력 수는 다음과 같습니다:\n\nNATO\n배치된 보병 [?global.var_nato_inf_count]/1000\n배치된 전차 [?global.var_nato_tank_count]/400\n\nCSTO\n배치된 보병 [?global.var_csto_inf_count]/1000\n배치된 전차 [?global.var_csto_tank_count]/400\n\n"
 propose_agreement_talks: "유럽 재래식 무력 조약 강화 제안"
 propose_agreement_talks_desc: "우리는 유럽의 장기적인 평화를 보장하기 위해 CFE 조약을 강화해야 합니다."
 NATO_CSTO_breach_mission: "유럽 재래식 무력 조약 위반"
 NATO_CSTO_breach_mission_desc: "우리 세력이 CFE 조약을 위반하고 있습니다. 대대 수를 통제해야 합니다."
