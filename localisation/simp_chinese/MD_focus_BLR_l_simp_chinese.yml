 BLR_Kal_desc: "我们将向俄罗斯提议成立一家股份公司，作为我们共同的钾肥贸易商。"
 BLR_Kal2: "关闭联合钾肥贸易商"
 BLR_Kal2_desc: "最近，我们对俄罗斯乌拉尔钾肥公司员工提起的刑事诉讼，以及他们滥用职权的行为，迫使我们关闭了合资贸易公司，并创建了自己的贸易公司。"
