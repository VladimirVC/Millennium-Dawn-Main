 toggle_nuclear_power_plant_generation_tt: "§Y Alternar Usina de Geração de Energia Nuclear §!\nAlternar §Y Usina de Energia Nuclear §! Geração de Energia. Podemos fazer isso para focar somente em outros meios de produção para reserva ou guardar combustível nuclear para uso futuro."
