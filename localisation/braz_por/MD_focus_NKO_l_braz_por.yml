 Kim_Jong_il_Death: "A Morte de Kim Jong-il"
 Kim_Jong_il_Death_desc: "O amado Grande Líder, o fundador da República Popular Democrática da Coreia e o Presidente eterno da República, Kim Jong-il, Presidente da RPDC, morreu às 8h30 de 17 de dezembro de 2011 de infarto agudo do miocárdio complicado por choque cardiogênico enquanto visitava uma área local de trem."
 NKO_Anti_tatmadaw_sentiment: "Sentimento Anti-Exército do Povo"
 NKO_Anti_tatmadaw_sentiment_desc: "Quando o KPA escolheu realizar uma grande reforma da situação política na Coreia, a hostilidade do povo ao governo militar atingiu um nível sem precedentes."
