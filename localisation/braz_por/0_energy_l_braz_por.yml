 energy_building_battery_parks: "§Y Construindo §! Parque de baterias"
 energy_building_battery_parks_desc: "Escolhemos o caminho da energia nuclear. É hora de começar a construir os materiais necessários para nossa nação armazenar a energia geração por infraestrutura renovável."
 energy_automatic_fuel_purchase: "Automático §Y Compra de combustível §!"
 energy_automatic_fuel_purchase_desc: "Nós estamos atualmente comprando combustível no mercado a cada 28 dias."
 has_an_energy_deficit_tt: "[THIS.GetNameWithFlag] tem atualmente um §Y Déficit de energia §! (Diferença atual: [?THIS.energy_difference_variable|Y0])\n"
 energy_load_sharing_recipient: "[THIS.GetNameWithFlag] está recebendo atualmente §Y Energia §! por um §Y Compartilhamento de energia §! acordo."
 is_currently_in_an_energy_load_sharing_agreement_tt: "[THIS.GetNameWithFlag] está atualmente em um acordo com [ROOT.GetNameWithFlag] de §Y Compartilhamento de energia §!"
 advanced_production_modifier: "Restrições Avançadas de Produção de Energia"
 advanced_production_modifier_desc: "Quando começar a acabar Metais Tecnologicos ([?THIS.resource@tungsten|+]), Metais Preciosos ([?THIS.resource@chromium|+]), Petroleo ([?THIS.resource@oil|+]), ou Borracha ([?THIS.resource@rubber|+]), nossos microchip e/ou produção composta será prejudicada. Qualquer deficit em qualquer recurso vai resultar em uma diminuição em microchip e/ou produção composta. Por outro lado, com a produção de microchip precisando de quantidades significativas de energia, quedas de energia vão reduzir a produção pelo [?unfulfilled_energy_demand_dynmod_var|%]\n\n§Y A redução de produção sempre será limitado em §! §R 95% §! §Y dos números base de produção. §!"
 civilian_microchip_consumption_modifier: "Consumo de Microchips Industrial & Civil"
 civilian_microchip_consumption_modifier_desc: "Nossa população e industrias avançadas vão começar a consumir microchips, enquanto cada vez mais tecnologias ficarem disponíveis para empresas e cidadãos. Precisaremos corresponder a demanda, senão nossa linha de produção vai travar. Durante guerras, a produção militar será priorizada em detrimento ao uso civil, mas isso pode gerar descontentamento na população, como as demandas não estão sendo cumpridas."
 is_currently_importing_oil_tt: "[THIS.GetNameWithFlag] está comprando §Y Combustível Fóssil §! de outro país.\n"
 early_renewables_9: "Controles Avançados de Turbina Eólica"
 early_renewables_9_desc: "Sistemas de controle de última geração otimizam o desempenho das turbinas eólicas ao ajustar os ângulos de passo e guinada das pás para extrair a máxima energia de condições de vento variáveis."
 renewables_9: "Células Solares de Perovskita"
 renewables_9_desc: "As células solares de perovskita tornam-se comercialmente viáveis, oferecendo maior eficiência e menores custos de produção, impulsionando ainda mais a adoção da energia solar."
 renewables_10: "Usinas Maremotrizes"
 renewables_10_desc: "Podemos aproveitar a energia das marés oceânicas para suprir as cidades costeiras."
 renewables_11: "Expansão Maremotriz"
 renewables_11_desc: "Avanços na conversão de energia das marés nos permitem instalar módulos mais densamente do que antes, além de expandir a instalação para além da costa."
 renewables_12: "Usinas Geotérmicas"
 renewables_12_desc: "Instalar usinas de energia próximas a vulcões ativos nos permite aproveitar a imensa energia geotérmica disponível, permitindo, adicionalmente, mitigar as ameaças de erupções."
 renewables_13: "Sifonagem da Astenosfera"
 renewables_13_desc: "Expandir o conceito de usinas geotérmicas para áreas de atividade sísmica intensa nos dá melhor acesso à energia geotérmica proveniente da astenosfera terrestre."
 fuel_efficiency_7: "Otimização Quântica de Combustível"
 fuel_efficiency_7_desc: "A aplicação da computação quântica aos sistemas de combustível nos permite gerenciar a produção de energia em um nível ainda mais detalhado."
 fuel_efficiency_8: "Implementação de AGI"
 fuel_efficiency_8_desc: "A AGI consegue microgerenciar a conversão de combustível com uma eficiência muito superior à anterior."
 fuel_efficiency_9: "Nanofibras de Combustível Especializadas"
 fuel_efficiency_9_desc: "Fibras sofisticadas limitam a dissipação de calor mais do que nunca."
 fuel_efficiency_10: "Monitoramento Superinteligente"
 fuel_efficiency_10_desc: "A implementação de uma IA superinteligente no processo permite ter um controle praticamente absoluto sobre o processo de conversão de energia."
 energy_efficiency_9: "Eficiência Energética Quântica"
 energy_efficiency_9_desc: "Podemos usar tecnologia quântica para melhorar a eficiência energética de nossos equipamentos."
 energy_efficiency_10: "Eficiência Quântica Avançada"
 energy_efficiency_10_desc: "A aplicação das descobertas tecnológicas mais recentes em tecnologia quântica aumenta ainda mais a eficiência."
 energy_efficiency_11: "Recuperação de Energia Quântica"
 energy_efficiency_11_desc: "Avanços em nossa compreensão da física quântica permitem a recuperação de energia em nível atômico."
 energy_efficiency_12: "Sifonagem Quântica"
 energy_efficiency_12_desc: "É possível sifonar as mudanças da espuma quântica e convertê-las em energia elétrica. Transformamos a perda de energia em ganho de energia!"