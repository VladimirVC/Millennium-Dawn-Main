 UKR_vv_tooltip_tt: "§YFinansowanie sił specjalnych znacząco zmniejszy skutki ewentualnego Majdanu§!"
 UKR_arms_rebuild: "Przemysł militarny"
 UKR_arms_rebuild_desc: "Nasz kraj musi się bronić i tylko silny przemysł wojskowy mu w tym pomoże."
 UKR_arms_build: "Inwestuj w produkcję wojskową"
 UKR_arms_build_desc: "We are ready to finance investments in expanding the military production of some of our name factories."
 UKR_polish_ukr_brotherhood: "Bractwo Polsko-Ukraińskie"
 UKR_polish_ukr_brotherhood_desc: "Only together, Ukraine and Poland will be able to defeat any enemy."
 UKR_belarus_brothers: "Bracia Białoruscy"
 UKR_belarus_brothers_desc: "Naród białoruski to nasi bracia, którzy także są w szponach dwóch głównych sił politycznych. Wyciągniemy ich z tych szponów."
 UKR_befriend_azerbaijan: "Przyjaźń z Azerbejdżanem"
 UKR_befriend_azerbaijan_desc: "Azerbejdżan będzie cennym sojusznikiem w realizacji naszej polityki na Kaukazie, gdzie będziemy mogli aktywnie przeciwstawiać się wpływom Rosji."
 UKR_befriend_georgia: "Unia Z Gruzją"
 UKR_befriend_georgia_desc: "Georgia is an important partner and has a strategic position in the Caucasus region. Having such an ally in the Alliance will be very beneficial for us."
 UKR_caucasus_volunteers: "Wolontariusze z Kaukazu"
 UKR_caucasus_volunteers_desc: "We will invite many volunteers from the Caucasus to form HUR battalions."
 UKR_dagestan_reb_prepare: "Przygotuj powstanie w Dagestanie"
 UKR_dagestan_reb_prepare_desc: "We will begin preparations for a special limited operation in Dagestan."
 UKR_befriend_chechens: "Przyjaźń z Ichkerią"
 UKR_befriend_chechens_desc: "Iczkeria, państwo zniszczone przez Rosję na początku tego stulecia. Zbierzemy jego prawdziwych patriotów i spróbujemy go wskrzesić."
 UKR_reconcista: "Ukraińska rekonkwista"
 UKR_reconcista_desc: "European states are mired in chaos, an emigrant crisis. The peoples of Europe are completely under the control of the globalists, which in the future will surely lead Europe to collapse, for the sake of easy profit - we will change this."
 UKR_no_russian_language: "Zakaz języka rosyjskiego"
 UKR_no_russian_language_desc: "It's time to deal with the Russian language completely."
 UKR_kuban_ukrainization: "Ukrainizacja Kubania"
 UKR_kuban_ukrainization_desc: "Kuban will become Ukrainian, we will take care of it."
 UKR_trizub: "Tryzub"
 UKR_trizub_desc: "Tryzub is entrusted with functions of a specific nature that other wings of the Nationalist Congress did not get."
 UKR_christos_nash: "Chrześcijański nacjonalizm"
 UKR_christos_nash_desc: "Christianity and nationalism are things that should be united in our Ukrainian state."
 UKR_nationalists_congress: "Polityka Kongresu Nacjonalistycznego"
 UKR_nationalists_congress_desc: "The real patriots of Ukraine are now running the country, no matter how tough the policy is, it will make our country great."
 UKR_nationalists_right_sector: "Prawy Sektor"
 UKR_nationalists_una_unso: "UNA UNSO"
 UKR_nationalists_upa: "UPA"
 UKR_nationalists_people_leave: "Migracja z Ukrainy"
 UKR_nationalists_people_leave_desc: "Nasza polityka spowodowała masową migrację z kraju, ale cieszymy się tylko, że wszyscy zdrajcy w końcu stąd wyjadą!"
 UKR_nationalists_cleane_ukraine: "Prawdziwa Ukraina"
 UKR_nationalists_great_ukraine: "Wielka Ukraina"
 UKR_nationalists_great_ukraine_desc: "Wielka Ukraina zaczyna się tutaj!"
 UKR_nationalists_trizub: "Tryzub"
 UKR_nationalists_reconcista: "Odrodzona Rekonkwista"
 UKR_nationalists_reconcista_desc: "Ukraine will become a beacon of the revival of Christianity in Europe! The holy march from Kyiv begins."
 did_not_support_the_baltic_black_sea_union: "§YNie poparł inicjatywy Unii Czarnomorsko-Bałtyckiej§!"
 ukraine_congress.2.t: "Ukraina zajmuje Sewastopol"
 ukraine_congress.2.d: "The Ukrainian government cancels the lease agreement with us and begins the expulsion of our fleet from Sevastopol."
 ukraine_congress.2.a: "To jest nasza porażka"
 ukraine_congress.10.t: "Ukraina proponuje pomysły dotyczące Morza Bałtyckiego"
 ukraine_congress.10.d: "Unia Bałtycko-Czarnomorska to koncepcja podobna do koncepcji Międzymorza, która dawno temu wyszła z Polski. Mówi o sojuszu obronnym, który obejmowałby kraje położone między Morzem Bałtyckim a Morzem Czarnym. Kraje współpracowałyby i skonsolidowałyby się w blok mocy, który wspierałby się nawzajem. To powiedzenie ma siłę w liczbach.\n\n§YTo pozwala na wzajemne gwarancje poprzez ukraińskie drzewo§!"
 ukraine_congress.10.a: "Powinniśmy nadal to badać."
 ukraine_congress.10.b: "Głupi pomysł"
 ukraine_congress.11.t: "Unia Bałtycko-Morze Czarne"
 ukraine_congress.11.d: "Przygotowano projekty ustaw i traktatów. Narody krajów, które popierają tę ideę, w końcu się zjednoczyły. Nadszedł czas na realizację ambicji. Nadszedł czas, aby sprzymierzyć się z tymi, którzy nas wspierali. Ukraina przesłała nam ostateczny traktat, który musimy podpisać, aby zawrzeć sojusz. Czy powinniśmy się teraz wycofać, czy też pozostać na kursie i wspierać naszych nowo poznanych sojuszników?"
 ukraine_congress.11.a: "Podpisz Traktat"
 ukraine_congress.11.b: "Wycofać się. Zniszczyć Traktat"
 UKR_poroshenko_start: "prezydentura Poroszenki"
 UKR_poroshenko_start_desc: "The Ukrainian state was headed by an oligarch. The history of Ukraine clearly did not expect such a turn, perhaps it will lead Ukraine to success."
 UKR_poroshenko_decentr: "Decentralizacja"
 UKR_poroshenko_decentr_desc: "One of the main political points of Poroshenko's program has been and will be - decentralization. We must reform the Ukrainian state."
 UKR_poroshenko_deccomunism: "Dekomunizacja"
 UKR_poroshenko_deccomunism_desc: "The communist past has been hard and scary for our country. Our nation was almost destroyed by the Famine, and we will not allow monuments to our murderers to be all over the country."
 UKR_poroshenko_anti_corruption: "Reformy antykorupcyjne"
 UKR_poroshenko_anti_corruption_desc: "Corruption has been and will continue to be a sore topic in our country, and we will carry out a series of anti-corruption reforms."
 UKR_poroshenko_nabu: "Stwórz NABU"
 UKR_poroshenko_nabu_desc: "NABU – centralny organ wykonawczy o specjalnym statusie, któremu powierzono zapobieganie, wykrywanie, zwalczanie, prowadzenie dochodzeń i ujawnianie korupcji oraz innych przestępstw podlegających jego jurysdykcji, a także zapobieganie nowym."
 UKR_poroshenko_no_russian_military: "Pozbądź się wpływów rosyjskich sił zbrojnych"
 UKR_poroshenko_no_russian_military_desc: "Musimy przestać być uzależnieni od armii rosyjskiej, tylko niezależna armia ukraińska będzie chronić kraj."
 UKR_poroshenko_anti_rus_doctrine: "Doktryna antyrosyjska"
 UKR_poroshenko_anti_rus_doctrine_desc: "Russia has been and will be an aggressor towards us, we must clearly reflect this in our military doctrine."
 UKR_poroshenko_smi_free: "Wolność mediów"
 UKR_poroshenko_smi_free_desc: "The media should be free and not limited by the dictatorial habits of a few people."
 UKR_poroshenko_kefalia: "Autokefalia Kościoła ukraińskiego"
 UKR_poroshenko_kefalia_desc: "It's time to get rid of the influence of the Moscow Orthodox Church."
 UKR_poroshenko_ukrainisation: "Ukrainizacja"
 UKR_poroshenko_ukrainisation_desc: "We will begin a policy of Ukrainization, and gradually eradicate the Russian language from various social environments."
 UKR_poroshenko_upa: "Cześć Bohaterom UPA"
 UKR_poroshenko_upa_desc: "UPA - they were defenders of Ukraine and we will honor them."
 UKR_poroshenko_es: "Współpraca z UE"
 UKR_poroshenko_es_desc: "The European Union will be our main economic partner and we will strive to maintain trade relations with them further."
 UKR_poroshenko_canada: "Partnerstwo z Kanadą"
 UKR_poroshenko_canada_desc: "We are ready to conclude several agreements with Canada to improve trade relations."
 UKR_us_friendship: "Partnerstwo z USA"
 UKR_us_friendship_desc: "We are ready to conclude several agreements with USA to improve trade relations."
 UKR_visegrad_coop: "Partnerstwo z Grupą Wyszehradzką"
 UKR_visegrad_coop_desc: "We are ready to conclude several agreements with Visegrád Group to improve trade relations."
 UKR_turkey_invest_req: "Inwestycje z Turcji"
 UKR_turkey_invest_req_desc: "We will attract Turkish investors to our territory, their investments will help our economy."
 UKR_kazakh_improve_rel: "Poprawa stosunków z Kazachstanem"
 UKR_kazakh_improve_rel_desc: "Kazakhstani partners will be an excellent addition to our foreign trade activities."
 UKR_reorient_market: "Reorientacja na rynek zachodni"
 UKR_reorient_market_desc: "The East is closed to us, we will reorient our markets to the west."
 UKR_ukroboronprom_revival: "Inwestycje w przemyśle obronnym"
 UKR_ukroboronprom_revival_desc: "Our defense industry needs investments, we will give them."
 UKR_smuggle_parts_through_russia: "Kupuj części w Rosji okrężną drogą"
 UKR_smuggle_parts_through_russia_desc: "Despite our anti-Russian doctrine, we are forced to purchase spare parts from Russian factories, albeit in a roundabout way."
 UKR_reverse_engineering: "Inżynieria odwrotna"
 UKR_reverse_engineering_desc: "We will strive to create our own engineering in the field of armored vehicles."
 UKR_western_assistance: "Wsparcie zachodnie"
 UKR_western_assistance_desc: "Western investors are also actively investing in our defense industry."
 UKR_poroshenko_nato: "Współpraca z NATO"
 UKR_poroshenko_nato_desc: "NATO is our main military partner, and with their help we are reforming our armed forces."
 UKR_belarus_proposal_non_attack: "Pakt o nieagresji z Białorusią"
 UKR_belarus_proposal_non_attack_desc: "Belarus, our northern neighbor, can be used by enemies to attack us from two sides, we must prevent this."
 UKR_language_policies: "Polityka językowa"
 UKR_language_policies_desc: "We will continue to expand the percentage of the Ukrainian language in communication and in other areas of citizens' lives."
 UKR_support_patriotism: "Wsparcie dla patriotyzmu"
 UKR_support_patriotism_desc: "Patriotism will be encouraged by the state as never before."
 UKR_donbass_okopi: "Operacja Ściana"
 UKR_donbass_okopi_desc: "We urgently need to build a defensive line along the border of our enemy."
 UKR_transnistria_defences: "Wzmocnić granicę z Naddniestrzem"
 UKR_transnistria_defences_desc: "Transnistria may become a springboard for an attack on us in the future, we will strengthen the border with them."
 UKR_deoligarchisation: "Deoligarchizacja"
 UKR_deoligarchisation_desc: "The oligarchs have too much power in our country - we will fix it."
 UKR_rochen_expansion: "Rozwiń produkcję Roshen"
 UKR_rochen_expansion_desc: "Roshen factory will now be able to expand its production capabilities with the help of public investments."
 UKR_support_medium_businesses: "Wspieraj małe firmy"
 UKR_support_medium_businesses_desc: "Small businesses will receive the necessary support."
 UKR_kolomoyski_deal: "Rozpraw się z Kołomojskim"
 UKR_kolomoyski_deal_desc: "Kolomoisky has long been one of the main problems in our country, his influence was too great and it's time to deal with him."
 UKR_purge_church_from_rus: "Wyeliminuj wpływ ROC"
 UKR_purge_church_from_rus_desc: "The Russian Orthodox Church will no longer influence us."
 UKR_greece_letter: "Zwróć się do Patriarchy Ekumenicznego"
 UKR_greece_letter_desc: "We will appeal to the Ecumenical Patriarch to recognize our church as independent."
 UKR_upc_create: "Utworzyć Ukraińską Cerkiew Prawosławną"
 UKR_upc_create_desc: "The Ukrainian Orthodox Church will be created! Now we are a spiritually free country as well."
 UKR_poroshenko_army_reform: "Reforma armii"
 UKR_poroshenko_army_reform_desc: "Our army needs major reforms - we will start implementing them now."
 UKR_pmc_instructors: "Instruktorzy z zachodnich PMC"
 UKR_pmc_instructors_desc: "Western PMCs instructors are ready to support our army."
 UKR_rally_nationalist_support: "Wspieraj weteranów"
 UKR_rally_nationalist_support_desc: "Combat veterans will be the mainstay of our future election campaign."
 UKR_welfare_conseccions: "Zwiększ wsparcie społeczne"
 UKR_welfare_conseccions_desc: "Naszą kampanię wyborczą w przyszłości skupimy na zwiększaniu gwarancji socjalnych."
 UKR_anti_russia_propaganda: "Propaganda antyrosyjska"
 UKR_anti_russia_propaganda_desc: "Our citizen must understand who his true enemy is, who seeks to absorb our country - Russia."
 UKR_saakashvili_odessa: "Zaproś Saakaszwilego na gubernatora Odessy"
 UKR_saakashvili_odessa_desc: "We will invite Saakashvili to be the governor of the Odessa region, perhaps he will show himself well."
 UKR_support_minsk_agreements: "Popierajcie Porozumienia Mińskie"
 UKR_support_minsk_agreements_desc: "We will support the Minsk agreements and try to resolve everything peacefully."
 UKR_continue_shelling: "Aby zakończyć separatystów"
 UKR_continue_shelling_desc: "No separatists! We will liberate our lands."
 UKR_business_with_rf: "Biznes Z Rosją"
 UKR_business_with_rf_desc: "We will continue to do business with Russia."
 UKR_full_rus_embargo_por: "Nałożyć embargo na Rosję"
 UKR_full_rus_embargo_por_desc: "We will impose an embargo on economic cooperation with Russia."
 UKR_osce_watchers: "Obserwatorzy OBWE"
 UKR_osce_watchers_desc: "OSCE observers will be invited to Donbass."
 UKR_suppress_easterner: "Stłumić ludzi ze Wschodu"
 UKR_suppress_easterner_desc: "Supporters of integration with Russia should be suppressed, including through the media."
 UKR_anti_emerg_1plus1: "Wzmocnić propagandę antywschodnią"
 UKR_anti_emerg_1plus1_desc: "We will strengthen the propaganda directed against those who support Russia."
 UKR_eu_compliant_reforms: "Reformy zgodności UE"
 UKR_eu_compliant_reforms_desc: "We will continue compliance reforms for integration with the European Union."
 UKR_european_education_connections: "Współpraca z europejskimi instytucjami edukacyjnymi"
 UKR_european_education_connections_desc: "European education will give us much more than the old, Soviet and totalitarian one."
 UKR_european_defence_program: "Europejski Program Ochrony"
 UKR_european_defence_program_desc: "We will join the European Defense Program to strengthen our armed forces."
 UKR_nato_application_por: "Program współpracy z NATO"
 UKR_nato_application_por_desc: "NATO's partnership in the field of armed forces will also allow us to carry out reforms of our army."
 UKR_ukraine_anew: "Nowa Ukraina"
 UKR_ukraine_anew_desc: "Our country has gone through a long way, many reforms, but now it has been reborn and looks positively to the future."
 UKR_apply_to_eu_por: "Program Współpracy z UE"
 UKR_apply_to_eu_por_desc: "Cooperation with the European Union will continue to be our priority."
 UKR_anti_rus_doctrine: "Doktryna antyrosyjska"
 UKR_anti_rus_doctrine_desc: "Naszym wrogiem politycznym i ideologicznym była i pozostaje Rosja. Musimy to zaakceptować i być gotowi na wojnę."
 UKR_foreign_advisors_desc: "Foreign instructors from various PMCs are ready to train our soldiers."
 UKR_west_investors: "Inwestorzy zachodni"
 UKR_operation_wall: "Operacja Ściana"
 UKR_smuggle_parts_from_rus: "Zakup części zamiennych z Rosji"
 UKR_smuggle_parts_from_rus_desc: "We continue to buy spare parts from Russia, albeit secretly."
 UKR_reverse_engineering_start: "Inżynieria odwrotna"
 UKR_reverse_engineering_start_desc: "We aim to create our own production."
 UKR_ato_supports: "Wsparcie dla weteranów"
 UKR_health_supports: "Wsparcie opieki zdrowotnej"
 UKR_poroh_prepare_donbass: "Przygotowania do rewanżu w Donbasie"
 UKR_poroh_prepare_donbass_desc: "We are ready to take revenge from the separatists and solve the problem with the People's republics forever."
 UKR_poroh_osce_ukr: "Obserwatorzy OBWE"
 UKR_poroh_osce_ukr_desc: "OSCE observers have been sent to the conflict zone to stabilize the situation on the front line with the unrecognized republics."
 ukraine_poroh.1.t: "Ukraina proponuje pakt o nieagresji"
 ukraine_poroh.1.d: "The Ukrainian government suggests that we conclude a non-aggression pact with them, apparently they see us as potential aggressors against themselves."
 ukraine_poroh.1.a: "Podpiszemy pakt"
 ukraine_poroh.1.b: "Nie ma takiej potrzeby"
 ukraine_poroh.2.t: "Pakt o nieagresji z Białorusią"
 ukraine_poroh.2.d: "The Belarusian government has agreed to sign a non-aggression pact with us, we are glad that they are on our side."
 ukraine_poroh.2.a: "Dobry."
 ukraine_poroh.3.t: "Pakt o nieagresji z Białorusią"
 ukraine_poroh.3.d: "The Belarusian government has refused to sign a non-aggression pact with us, which worries us."
 ukraine_poroh.3.a: "Smutny"
 ukraine_poroh.4.t: "Autokefalia Kościoła ukraińskiego"
 ukraine_poroh.4.d: "Kościół ukraiński zwrócił się do naszego Patriarchy Ekumenicznego z prośbą o pozwolenie na autokefalię jej kościoła. Czy nasz patriarcha na to pozwoli?"
 ukraine_poroh.4.a: "Tak"
 ukraine_poroh.4.b: "NIE"
 ukraine_poroh.5.t: "Autokefalia Kościoła ukraińskiego"
 ukraine_poroh.5.d: "The Ecumenical Patriarch approved the Autocephaly of our Church."
 ukraine_poroh.5.a: "Dobry."
 ukraine_poroh.6.t: "Autokefalia Kościoła ukraińskiego"
 ukraine_poroh.6.d: "The Ecumenical Patriarch did not approve the Autocephaly of our Church."
 ukraine_poroh.6.a: "Smutny"
 ukraine_poroh.7.t: "Ukraina chce współpracy z Czwórką Wyszehradzką"
 ukraine_poroh.7.d: "Rząd Ukrainy jasno nakreślił plany współpracy z krajami Grupy Wyszehradzkiej. Jako przedstawiciel całej czwórki decydujemy, czy zgadzamy się na tę współpracę?"
 ukraine_poroh.7.a: "Tak"
 ukraine_poroh.7.b: "NIE"
 ukraine_poroh.8.t: "Współpraca z krajami wyszehradzkimi"
 ukraine_poroh.8.d: "They agreed to cooperate."
 ukraine_poroh.8.a: "Dobry."
 ukraine_poroh.9.t: "Współpraca z krajami wyszehradzkimi"
 ukraine_poroh.9.d: "They refused to cooperate with us."
 ukraine_poroh.9.a: "Smutny"
 UKR_kefalia_agree: "Zezwolenie Patriarchy Ekumenicznego"
 UKR_odessa_ssaka: "Konsekwencje gubernatorstwa Saakaszwilego"
 UKR_odessa_ssak: "Konsekwencje gubernatorstwa Saakaszwilego"
 ukr_industry_points_cost_35: "35 punktów przemysłu"
 ukr_industry_points_cost_50: "50 punktów przemysłu"
 ukr_industry_points_cost_75: "75 punktów przemysłu"
 UKR_opfl_political_reforms: "Reformy polityczne"
 UKR_opfl_political_reforms_desc: "Po ostatnich wydarzeniach nasz kraj potrzebuje pewnych reform politycznych. Bez nich Ukraina nie będzie mogła się dalej rozwijać."
 UKR_opfl_lustration_fight: "Walka z lustracją"
 UKR_opfl_lustration_fight_desc: "Lustracja to ograniczenie dostępu do usług publicznych osobom, które zajmowały wysokie stanowiska w poprzednich reżimach politycznych. Po ostatnich wydarzeniach polityka ta ma miejsce także na Ukrainie. Trzeba położyć kres temu oburzeniu."
 UKR_opfl_radicalism: "Walka z radykalizmem"
 UKR_opfl_radicalism_desc: "W ciągu kilku lat chaosu politycznego radykalizm rozprzestrzenił się na całą Ukrainę. Dla pokojowego istnienia naszego kraju konieczna jest walka z wszelkimi przejawami radykalizmu w naszym kraju."
 UKR_opfl_ukrainisation_policy: "Potępienie ukrainizacji"
 UKR_opfl_ukrainisation_policy_desc: "The policy of Ukrainianisation directly interferes with the development of good relations with our big neighbour - Russia. It is necessary to condemn and stop the propaganda of Ukrainianisation, otherwise no good will come of it."
 UKR_opfl_national_ref: "Przeprowadzenie referendum krajowego"
 UKR_opfl_national_ref_desc: "Referendum krajowe pomoże ludziom naszego kraju określić swoją przyszłość. Musimy to zrobić jak najszybciej!"
 UKR_opfl_independence_rep: "Uznać niepodległość republik"
 UKR_opfl_independence_rep_desc: "Cóż, obywatele republik dokonali wyboru i musimy to uszanować. Najwyższy czas inwestować i budować więzi z nowymi państwami."
 UKR_opfl_take_republic: "Przywróć siłą"
 UKR_opfl_take_republic_desc: "Referendum było tylko zasłoną dymną. Naszym prawdziwym celem jest identyfikacja separatystów na naszym terytorium i czas sprowadzić nasze terytoria do domu! Separatyści nie będą chodzić po ukraińskiej ziemi!"
 UKR_opfl_federalisation_project: "Projekt Federacji"
 UKR_opfl_federalisation_project_desc: "Teraz, gdy wszystkie spory terytorialne zostały rozwiązane, możemy patrzeć w świetlaną przyszłość. Czas na Federację Ukraińską!"
 UKR_opfl_economic_policy: "Nowa polityka gospodarcza"
 UKR_opfl_economic_policy_desc: "New economic policies will help revitalise our economy and subsequently rebuild it."
 UKR_opfl_rural_land: "Ochrona gruntów wiejskich"
 UKR_opfl_rural_land_desc: "Rural activities are a big part of our economy. Therefore, it is necessary to secure their legally acquired land. This way we will give them confidence that their land will not be taken away the next day."
 UKR_opfl_tarif_genocide: "NIE! Ludobójstwo celne"
 UKR_opfl_tarif_genocide_desc: "Ludobójstwo celne jest koszmarem dla naszych obywateli. Większość ich pieniędzy idzie na płacenie licznych i bezsensownych podatków. Trzeba powiedzieć „NIE” temu bezprawiu!"
 UKR_opfl_deindustry: "Zatrzymanie deindustrializacji Ukrainy"
 UKR_opfl_deindustry_desc: "Po uzyskaniu przez Ukrainę niepodległości stary rząd rozdał komukolwiek całe bogactwo przemysłowe naszego kraju za darmo. W rezultacie znaleźliśmy się w zagłębieniu przemysłowym. Musimy wznowić budowę fabryk, zakładów i innych przedsiębiorstw."
 UKR_federaliz_tt: "Będziemy §Yfederalizować§! Ukraina"
 UKR_rosava: "CJSC Rosava"
 UKR_rosava_desc: "CJSC Rosava to największy producent opon na Ukrainie. Zakłady produkcyjne zlokalizowane są przy dwóch fabrykach opon: Rosava i produkującej opony wielkogabarytowe. Pojemność sięga około 6 milionów jednostek. opon rocznie."
 UKR_land_land: "Kontynuuj reformę rolną"
 UKR_land_land_desc: "We are ready to continue the land reform that began in the last century and move it forward."
 UKR_motor_sich: "Silnik Sicz"
 UKR_motor_sich_desc: "Spółka Akcyjna Motor Sicz to ukraiński producent silników lotniczych z siedzibą w Zaporożu. Firma zajmuje się produkcją silników do samolotów i helikopterów oraz przemysłowych turbin gazowych i instalacji okrętowych."
 UKR_armor_kyv: "The Kyiv Armored Plant"
 UKR_armor_kyv_desc: "The Kyiv Armored Plant is a state-owned enterprise of the armored industry of Ukraine, which performs diagnostics, repair, maintenance, re-equipment and modernization of Soviet-made armored vehicles."
 UKR_pivdenmash_idea: "PA Piwdenmasz"
 UKR_kyvarmor_idea: "Kyiv Armored Plant"
 UKR_zaz_idea: "ZAZ"
 UKR_kraz_idea: "KrAZ"
 UKR_motorsich_idea: "Silnik Sicz"
 UKR_start_war_against_poland: "Wojna polsko-ukraińska"
 UKR_start_war_against_poland_desc: "Nadszedł decydujący moment dla naszego państwa. Odepchniemy wroga lub znikniemy z historii świata."
 UKR_hur_expandeds: "Rozszerz wpływ HUR"
 UKR_hur_expandeds_desc: "Rozszerzymy władzę HUR, wymaga tego sytuacja, wymaga tego wojna!"
 UKR_unite_with_russian_genshtab: "Skorzystaj z pomocy rosyjskiego sztabu generalnego"
 UKR_unite_with_russian_genshtab_desc: "We are ready to enlist the help of the Russian General Staff for the war with the Polish Army."
 UKR_observer_joint_shtab_kiev: "Utwórz wspólną kwaterę główną"
 UKR_observer_joint_shtab_kiev_desc: "The armed forces of Russia and Ukraine will create a joint general staff in Kyiv."
 UKR_professional_shturm_groups: "Brygady Szturmowe"
 UKR_professional_shturm_groups_desc: "Rozpoczniemy rekrutację ludzi do brygad szturmowych, aby skuteczniej stawić czoła naszym wrogom."
 UKR_pmc_zaporozhets: "PMC Zaporożec"
 UKR_pmc_zaporozhets_desc: "Niektórzy weterani wojenni utworzyli własną prywatną kompanię wojskową o nazwie Zaporożec."
 UKR_start_the_kashubian_uprising: "Przygotuj bunt na Kaszubach"
 UKR_start_the_kashubian_uprising_desc: "We will prepare an insurgency in this region to undermine Poland's defense."
 UKR_silesian_rebellion: "Przygotuj bunt na Śląsku"
 UKR_silesian_rebellion_desc: "We will prepare an insurgency in this region to undermine Poland's defense."
 UKR_vilnoe_pospolitoe_rushenie: "Batalion Pospolite Ruszenie"
 UKR_vilnoe_pospolitoe_rushenie_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_belarus_volunteers: "Batalion Rokossowski"
 UKR_belarus_volunteers_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_legion_free_poland: "Legion Wolności Polski"
 UKR_legion_free_poland_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_polish_hetmanate_army: "Batalion Hetmanatu Polskiego"
 UKR_polish_hetmanate_army_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_air_dominance_tactics: "Taktyka dominacji lotniczej"
 UKR_air_dominance_tactics_desc: "We need to suppress Polish Aviation, so we will apply a new doctrine."
 UKR_tro_expandeds: "Wzmocnić obronę terytorialną"
 UKR_tro_expandeds_desc: "Pilnie będziemy rozszerzać nabór do obrony terytorialnej, bojowników potrzebujemy natychmiast!"
 UKR_start_war_against_russia: "Wojna rosyjsko-ukraińska"
 UKR_start_war_against_russia_desc: "Nadszedł decydujący moment dla naszego państwa. Odepchniemy wroga lub znikniemy z historii świata."
 UKR_hur_expanded: "Rozszerz wpływ HUR"
 UKR_hur_expanded_desc: "Rozszerzymy władzę HUR, wymaga tego sytuacja, wymaga tego wojna!"
 UKR_tro_expanded: "Wzmocnić obronę terytorialną"
 UKR_tro_expanded_desc: "Pilnie będziemy rozszerzać nabór do obrony terytorialnej, bojowników potrzebujemy natychmiast!"
 UKR_tck: "Mobilizacja masowa"
 UKR_tck_desc: "We will have to start mass mobilization, because this is literally a war for the existence of our state."
 UKR_other_battaions_hur: "Nowe bataliony HUR"
 UKR_other_battaions_hur_desc: "HUR is actively recruiting fighters into its battalions, some of them are already ready to join the battle."
 UKR_free_russia_legion: "Legion Wolności Rosji"
 UKR_free_russia_legion_desc: "Real Russian patriots are ready to fight for us and overthrow the tyranny that hangs over Russia."
 UKR_rdk: "Rosyjski Korpus Ochotniczy"
 UKR_rdk_desc: "Russian nationalists who do not agree with Russia's policy have self-organized under our command into the Russian volunteer corps."
 UKR_republican_army: "Narodowa Armia Republikańska"
 UKR_republican_army_desc: "Fugitive deputies from Russia have created a national Republican Army, which will conduct active guerrilla activities against the regime."
 UKR_separatist_battalions: "Przyciągnij bataliony separatystów"
 UKR_separatist_battalions_desc: "Not only Russians, but also other nations are ready to fight for freedom from Russian imperialism."
 UKR_drone_army: "Armia dronów"
 UKR_drone_army_desc: "We will start mass production of drones. The country needs thousands of drones."
 UKR_tck_mobka: "Totalna mobilizacja"
 UKR_tck_mobka_desc: "We are forced to carry out several waves of mobilization to replenish our armed forces."
 UKR_attack_guardia: "Strażnik ataku"
 UKR_attack_guardia_desc: "Jesteśmy gotowi przejść z obrony do ataku! Atak straży, aby pokonać wroga!"
 UKR_inter_legion_idea: "Międzynarodowy Legion"
 UKR_inter_legion_idea_desc: "Many foreigners from all over the world are ready to support us in our struggle for independence."
 UKR_air_superior_idea: "Taktyka dominacji w powietrzu"
 UKR_air_superior_idea_desc: "We strive to gain air superiority."
 UKR_hur_other_battalions_created_tt: "§YNowe bataliony HUR§! zostanie stworzony"
 UKR_free_russia_created_tt: "§YLegion Wolności Rosji§! będzie dostępny dla specjalnych, ograniczonych operacji"
 UKR_rdk_created_tt: "§YRosyjski Korpus Ochotniczy§! będzie dostępny dla specjalnych, ograniczonych operacji"
 UKR_republican_army_created_tt: "§YRegionalne Bataliony Separatystów§! będą dostępne do operacji specjalnych"
 UKR_free_poland_created_tt: "§YLegion Wolności Polski§! będzie dostępny dla specjalnych, ograniczonych operacji"
 UKR_rushenie_created_tt: "§YBatalion Pospolite Ruszenie§! będzie dostępny dla specjalnych, ograniczonych operacji"
 UKR_rokossovski_created_tt: "§YBatalion Rokossowski§! będzie dostępny dla specjalnych, ograniczonych operacji"
 UKR_hetmanat_created_tt: "§YBatalion Hetmanatu Polskiego§! będzie dostępny dla specjalnych, ograniczonych operacji"
 UKR_polish_army_created_tt: "§YPolska Armia Wyzwolenia§! będzie dostępny dla specjalnych, ograniczonych operacji"
 ukraine_firtash.1.t: "Firtasz ogłosił utworzenie Republiki"
 ukraine_firtash.1.d: "Dmitry Firtash, one of the richest oligarchs in Ukraine, announced the creation of the Podolia Republic as an autonomy within Ukraine. This has caused a shock to our government and now we have to decide what to do about it."
 ukraine_firtash.1.a: "Brak autonomii"
 ukraine_firtash.1.b: "Być może będzie to dla nas korzystne"
 ukraine_firtash.2.t: "Nasza Armia"
 ukraine_firtash.2.d: "Those units that we personally funded have sided with us, now they are our main striking force."
 ukraine_firtash.2.a: "O Wolność Podola!"
 ukraine_kolom.1.t: "Kołomojski ogłosił utworzenie Republiki"
 ukraine_kolom.1.d: "Igor Kolomoisky, one of the richest oligarchs in Ukraine, announced the creation of the Dnipropetrovsk Republic as an autonomy within Ukraine.  This has caused a shock to our government and now we have to decide what to do about it."
 ukraine_kolom.1.a: "Brak autonomii"
 ukraine_kolom.1.b: "Być może będzie to dla nas korzystne"
 ukraine_kolom.2.t: "Nasza Armia"
 ukraine_kolom.2.d: "Those units that we personally funded have sided with us, now they are our main striking force."
 ukraine_kolom.2.a: "O wolność Dniepru!"
 UKR_recruit_arestovich: "Zrekrutuj Arrestovicha"
 UKR_recruit_arestovich_desc: "Arestovich will become an excellent agent of our special services, his outstanding skills will be useful to us."
 UKR_korchinsky_strategy: "Strategia Korczyńskiego"
 UKR_korchinsky_strategy_desc: "Korchinsky's strategy involves fighting Western elements as well...The fight against the external enemy that really threatens the sovereignty of Ukraine."
 UKR_psiop_operations: "Operacje psiop"
 UKR_psiop_operations_desc: "We have mastered the technique of psychological operations, and we are ready to use it against our enemies."
 UKR_bratstvo_psiop_idea: "Operacje psiop"
 UKR_bratstvo_psiop_idea_desc: "The enemy must also be broken mentally, for this we will conduct psyop operations."
 UKR_vitrenko_party: "Nowy socjalizm"
 UKR_vitrenko_party_desc: "Ukraina od dawna jest w niewoli nastrojów nacjonalistycznych i prozachodnich, które rozdzierają kraj na pół. Damy naszym obywatelom to, czego szukają – stabilność i dobrobyt. Nasz socjalizm ich uszczęśliwi."
 UKR_economic_orthodoxy: "Ortodoksja ekonomiczna"
 UKR_economic_orthodoxy_desc: "Nasz kraj powinien być silny nie tylko gospodarczo, ale także duchowo, dlaczego więc nie połączyć tych dwóch rzeczy?"
 UKR_install_christian_socialism: "Chrześcijański Socjalizm"
 UKR_install_christian_socialism_desc: "We will not give up our socialist ideas, because we continue to believe in God, the ideologists of socialism led it to collapse because they distanced themselves from God, we will not repeat their mistakes."
 UKR_iron_woman: "Kobieta ze stali"
 UKR_iron_woman_desc: "Natalia Vitrenko, like steel, protects the ideas that she sees as the only right ones for Ukraine and is not going to bend to anyone."
 UKR_resovetization: "Ponowna sowietyzacja"
 UKR_resovetization_desc: "The Soviet era gave our country a development that it did not see under any government, not under the Tsar, not under the Poles, not under independence. We accept this fact and will promote the cult of Socialism."
 UKR_rally_out_the_coalition: "Koalicja Narodowa"
 UKR_rally_out_the_coalition_desc: "Supporters of completely different ideas, national Bolsheviks, supporters of the Russian Empire, socialism and Russophiles have united under the banners of our party, all together - we will turn our country into the best state in history."
 UKR_praymaya_electro_demokratia: "Bezpośrednia e-demokracja"
 UKR_praymaya_electro_demokratia_desc: "We have had enough of dictatorship and totalitarianism, our people deserve democracy at its best."
 UKR_storm_sturm_at_parliament: "Szturm na parlament"
 UKR_storm_sturm_at_parliament_desc: "We will get rid of those who sabotage our activities in our government agencies."
 UKR_befriend_russia_vit: "Partnerstwo z Rosją"
 UKR_befriend_russia_vit_desc: "Historically, we are connected with Russia and will always be connected with it - our partnership with Russia is something that should be obvious as the sunrise."
 UKR_apply_to_union_state: "Ogłoś chęć przyłączenia się do Państwa Związkowego"
 UKR_apply_to_union_state_desc: "The Union State is one of the first and most important stages of the unity of our united people, we intend to become part of this project."
 UKR_honor_russian_empire: "Szanuj dziedzictwo Imperium Rosyjskiego"
 UKR_honor_russian_empire_desc: "The Russian Empire was a great power and it would be stupid and unfair to deny its achievements, we remember the greatness of the Romanovs."
 UKR_free_healthcare: "Darmowa opieka zdrowotna"
 UKR_free_healthcare_desc: "Przywrócimy sowiecką praktykę bezpłatnej opieki zdrowotnej, obywatele muszą być zdrowi!"
 UKR_national_bolshevist_rhetoric: "Retoryka narodowo-bolszewicka"
 UKR_national_bolshevist_rhetoric_desc: "Our party also borrows many things from the program of the National Bolsheviks, with which we unanimously agree."
 UKR_russo_ukrainian_nationalism: "Nacjonalizm rosyjsko-ukraiński"
 UKR_russo_ukrainian_nationalism_desc: "Our peoples must always rise up and remember their greatness, we will actively support the nationalist movements of our countries."
 UKR_naz_pioners: "Pionierzy narodowi"
 UKR_naz_pioners_desc: "The pioneer was a great idea of the Soviet leadership, we will revive it, but with our special specifics."
 UKR_calm_ruthenia: "Ogłaszają się spadkobiercami Rusi"
 UKR_calm_ruthenia_desc: "We believe that the legacy of Ancient Ruthenia should also not be forgotten! We will remind everyone that Ruthenia existed on these lands."
 UKR_proclaim_rus_ukraine: "Ogłoś odrodzenie Rusi"
 UKR_proclaim_rus_ukraine_desc: "Ruś się odradza! To właśnie dzisiaj, tutaj, na ziemiach Ukrainy!"
 UKR_federalize_galicia_and_zakarpat: "Federalizacja Galicji"
 UKR_federalize_galicia_and_zakarpat_desc: "It's time to resolve the separatist issue in Galicia, only Federalization will save us."
 UKR_lnr_dnr_peace_integrate: "Federalizacja wschodniej Ukrainy"
 UKR_lnr_dnr_peace_integrate_desc: "The mistakes committed by the previous government, now we must decide. We are ready for a federalization project to end the division of our country."
 UKR_suppress_western_and_bander: "Tłumić wpływy Zachodu"
 UKR_suppress_western_and_bander_desc: "The influence of the West should be purposefully weakened in our country."
 UKR_restore_russian_church: "Wracając do Kościoła rosyjskiego"
 UKR_restore_russian_church_desc: "Autocephaly was a mistake, we have spiritually distanced ourselves from our brothers, and we do not intend to repeat such a mistake anymore."
 UKR_no_to_upc: "Rozwiązanie Ukraińskiej Cerkwi Prawosławnej"
 UKR_no_to_upc_desc: "Heretics must be disbanded."
 UKR_clear_out_pcu: "Posprzątaj Kościół"
 UKR_clear_out_pcu_desc: "The supporters of Autocephaly and all their sympathizers must be brought under our control."
 UKR_restore_apostolacy: "Powrót ROC"
 UKR_restore_apostolacy_desc: "Rosyjska Cerkiew Prawosławna po raz kolejny dominuje na naszej ziemi!"
 UKR_full_socialism: "Nacisk na socjalizm"
 UKR_full_socialism_desc: "Zanurzymy się jeszcze głębiej w doktryny socjalizmu i będziemy je nadal wdrażać w naszym kraju."
 UKR_install_true_soviet_folk: "Socjalizm Ludowy"
 UKR_install_true_soviet_folk_desc: "Zrobimy wszystko, żeby nasz obywatel czuł się szczęśliwy."
 UKR_appease_pro_russian_oligarchs: "Współpracuj z prorosyjskimi oligarchami"
 UKR_appease_pro_russian_oligarchs_desc: "Jesteśmy gotowi nawiązać współpracę z prorosyjską oligarchią, bo jej inwestycje wzmocnią naszą gospodarkę."
 UKR_loyalist_oligarchy_ens: "Akceptuj lojalnych oligarchów"
 UKR_loyalist_oligarchy_ens_desc: "Lojalni oligarchowie również będą nas wspierać, zabezpieczając w ten sposób swoje finanse w kraju."
 UKR_industrial_revival: "Renesans przemysłowy"
 UKR_industrial_revival_desc: "Nasz kraj został pozbawiony potęgi przemysłowej, po upadku ZSRR czas go odrodzić."
 UKR_national_feminism: "Narodowy feminizm"
 UKR_national_feminism_desc: "Kobiety powinny także stać się motorem wzrostu naszego kraju i będziemy zachęcać je do udziału we wszystkich gałęziach przemysłu."
 UKR_foreign_policy_det: "Nasz kurs polityki zagranicznej"
 UKR_foreign_policy_det_desc: "Nasz kraj musi sam zdecydować, w którą stronę pójdzie w polityce zagranicznej."
 UKR_fully_antagonize_the_west: "Antagonizm wobec Zachodu"
 UKR_fully_antagonize_the_west_desc: "Nie mamy zamiaru przyjaźnić się z Zachodem, bo wiemy, że Zachód nie ma przyjaciół – są tylko niewolnicy i służba."
 UKR_ukr_sov_mil_coop: "Współpraca wojskowa z Rosją"
 UKR_ukr_sov_mil_coop_desc: "Przeprowadzimy serię ćwiczeń wojskowych z armią rosyjską."
 UKR_euroscepticism_campaign: "Potężny eurosceptycyzm"
 UKR_euroscepticism_campaign_desc: "Byliśmy i nadal będziemy eurosceptykami."
 UKR_join_csto: "Dołącz do OUBZ"
 UKR_join_csto_desc: "Jesteśmy gotowi podpisać dokument o przystąpieniu do OUBZ, gwarancje bezpieczeństwa może nam dać jedynie Rosja."
 UKR_reconcile_with_west: "Popraw interakcję z Zachodem"
 UKR_reconcile_with_west_desc: "Zamierzamy usprawnić współpracę z krajami zachodnimi."
 UKR_nato_ukr_train: "Ćwiczenia z krajami NATO"
 UKR_nato_ukr_train_desc: "Będziemy częściowo propagować doktrynę NATO w naszych siłach zbrojnych, a także przeprowadzimy z nimi serię ćwiczeń."
 UKR_join_nato_with_russia: "Przystąpienie do NATO z Rosją"
 UKR_join_nato_with_russia_desc: "Zamierzamy przystąpić do NATO, ale tylko wspólnie z Rosją i zaproponujemy ten pomysł rosyjskiemu rządowi."
 UKR_full_nazbol_transition: "Narodowe odrodzenie bolszewickie"
 UKR_full_nazbol_transition_desc: "Nadszedł czas na kolejny etap rozwoju naszego kraju i w zasadzie całej rodziny słowiańskiej. Wkraczamy na drogę jedności Słowian."
 UKR_serbia_unify: "Narodowa rewolucja bolszewicka w [SER.GetName]"
 UKR_serbia_unify_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_bulgaria_unification: "Narodowa rewolucja bolszewicka w [BUL.GetName]"
 UKR_bulgaria_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_unification_with_belarus: "Narodowa rewolucja bolszewicka w [BLR.GetName]"
 UKR_unification_with_belarus_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_poland_unification: "Narodowa Rewolucja Bolszewicka w [POL.GetName]"
 UKR_poland_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_demand_bosnia: "Narodowa Rewolucja Bolszewicka w [BOS.GetName]"
 UKR_demand_bosnia_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_czech_unification: "Narodowa Rewolucja Bolszewicka w [CZE.GetName]"
 UKR_czech_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_demand_croatia_slovenia: "Narodowa rewolucja bolszewicka w [CRO.GetName]"
 UKR_demand_croatia_slovenia_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_slovakia_unify: "Narodowa rewolucja bolszewicka w [SLO.GetName]"
 UKR_slovakia_unify_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_propose_full_union_state: "Prawdziwe państwo związkowe"
 UKR_propose_full_union_state_desc: "Czas, aby Rosja i nasz kraj stały się prawdziwym państwem związkowym!"
 UKR_pan_slavic_ssr: "Związek Republik Słowiańskich"
 UKR_pan_slavic_ssr_desc: "Wreszcie wszyscy Słowianie staną się jednością!"
 UKR_vetrenko_surrort_nationalism: "Nacjonalizm rosyjsko-ukraiński"
 UKR_vetrenko_inner_idea: "Polityka wewnętrzna"
 UKR_vetrenko_inner_idea_desc: "We are ready to pursue a policy of independence from the West and a strong Ukraine, we have had enough of the dictatorship of Western capital."
 UKR_vetrenko_christian_socialism: "Chrześcijański Socjalizm"
 UKR_vetrenko_christian_socialism_desc: "God and Socialism go hand in hand in Ukraine."
 UKR_vetrenko_west_idea: "Doktryna antyzachodnia"
 UKR_vetrenko_west_idea_desc: "We do not hide the fact that the West is our ideological and direct enemy."
 UKR_vetrenko_pioneria: "Pionier narodowy"
 UKR_vetrenko_women_idea: "Narodowy feminizm"
 UKR_vetrenko_women_idea_desc: "The women of Ukraine will build a great state hand in hand with men."
 UKR_vetrenko_iron_woman: "Ukraińska Żelazna Kobieta"
 UKR_vetrenko_iron_woman_desc: "Vitrenko became our equivalent of Margaret Thatcher."
 UKR_vetrenko_health_free_idea: "Darmowa opieka zdrowotna"
 ukraine_nazbol.1.t: "Rozpocząć inwazję [FROM.GetName]?"
 ukraine_nazbol.1.d: "We were able to raise an uprising in this country, but now we need to decide whether we are ready to bring it to an end and admit that the revolution is our doing."
 ukraine_nazbol.1.a: "Tak"
 ukraine_nazbol.1.b: "NIE"
 ukraine_nazbol.2.t: ""
 ukraine_nazbol.2.d: ""
 ukraine_nazbol.2.a: ""
 ukraine_nazbol.3.t: "Narodowa rewolucja bolszewicka!"
 ukraine_nazbol.3.d: "Unexpectedly for us, a revolution took place in our country under the banner of the national Bolsheviks! We urgently raised the army and all armed forces to fight the separatists. We know that they are controlled by [UKR.GetName] and intend to deal with this in the future."
 ukraine_nazbol.3.a: "Nagle"
 ukraine_nazbol.4.t: "[FROM.GetName] wychwala dziedzictwo imperium rosyjskiego"
 ukraine_nazbol.4.d: "The government of Ukraine directly at the state level announces the glorification of the past and heritage of the Russian Empire, we should respond to this gesture in any way."
 ukraine_nazbol.4.a: "Jesteśmy również dumni"
 ukraine_nazbol.4.b: "Potępiamy to"
 ukraine_nazbol.5.t: "[FROM.GetName] Solidaryzuje się z nami"
 ukraine_nazbol.5.d: "[FROM.GetName] stands in solidarity with us on the issue of the legacy of the Russian Empire and is ready to support us at the diplomatic level on this issue."
 ukraine_nazbol.5.a: "To wspaniale!"
 ukraine_nazbol.6.t: "[FROM.GetName] Potępia nas"
 ukraine_nazbol.6.d: "[FROM.GetName] condemns the fact that we do not condemn Imperial ambitions, never an undemocratic State, The New Russia will always profess the ideals of peaceful cooperation and not expansion."
 ukraine_nazbol.6.a: "Tchórze"
