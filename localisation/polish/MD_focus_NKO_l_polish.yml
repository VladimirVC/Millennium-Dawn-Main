 NKO_economic_reforms: "Reformy ekonomiczne"
 NKO_hermit_kingdom: "Królestwo Pustelnika"
 NKO_hermit_kingdom_desc: "North Korea has been an isolated state ever since its creation. Despite being one of the poorest countries in the world, the country still manages to maintain one of the largest militaries in the world. The Kim family has been in power for more than 50 years with practically no internal opposition. The Hermit Kingdom of North Korea is an unexplainable anomaly among countries.\n\n§RThis national spirit will be removed if the Kim family is no longer in power!§!"
 NKO_solve_the_arduous_march_desc: "Arduous March pobrał ciężkie żniwo od naszego narodu. Aby zabezpieczyć przyszłość naszego ludu, musimy wdrożyć strategiczne środki, aby przezwyciężyć ten okres trudności i poprowadzić nasz kraj ku dobrobytowi. Obejmuje to zwiększenie produkcji rolnej, zabezpieczenie pomocy humanitarnej i reformę naszej polityki wewnętrznej w celu zapewnienia stabilności i wzrostu."
 NKO_promote_songun: "Promuj Songun"
 NKO_promote_songun_desc: "Songun, czyli polityka „wojskowa na pierwszym miejscu”, stawia Koreańską Armię Ludową na pierwszym miejscu w naszych sprawach politycznych i gospodarczych. Promując Songun, zapewniamy bezpieczeństwo naszego narodu i wzmacniamy rolę wojska w ochronie naszej suwerenności i kierowaniu naszym socjalistycznym budownictwem."
 NKO_humanitarian_aid: "Pomoc Humanitarna"
 NKO_humanitarian_aid_desc: "W tych trudnych czasach przyjmowanie pomocy humanitarnej od organizacji międzynarodowych i przyjaznych narodów zapewni niezbędne zasoby, aby złagodzić cierpienie naszych ludzi. Ta pomoc będzie starannie zarządzana, aby zapewnić, że dotrze do potrzebujących i wesprze nasze wysiłki na rzecz odbudowy."
 NKO_food_production_boost: "Wzrost produkcji żywności"
 NKO_food_production_boost_desc: "Zwiększenie produkcji żywności jest niezbędne do zapewnienia dobrobytu naszym obywatelom. Inwestując w technologie rolnicze, ulepszając systemy nawadniające i wspierając naszych rolników, możemy zwiększyć plony i zapewnić stabilne dostawy żywności dla naszego kraju."
 NKO_healthcare_reform: "Reforma służby zdrowia"
 NKO_healthcare_reform_desc: "Reforma naszego systemu opieki zdrowotnej jest kluczowa dla poprawy zdrowia i produktywności naszych ludzi. Skupimy się na modernizacji placówek medycznych, szkoleniu pracowników służby zdrowia i zapewnieniu dostępu do niezbędnych leków i zabiegów."
 NKO_punish_corruption: "Karać korupcję"
 NKO_punish_corruption_desc: "Korupcja podważa nasze socjalistyczne zasady i utrudnia postęp narodowy. Rozpoczniemy rygorystyczną kampanię, aby zidentyfikować, ujawnić i ukarać skorumpowanych urzędników, zapewniając przejrzystość i uczciwość w naszym rządzie i instytucjach."
 NKO_agricultural_funding: "Finansowanie rolnictwa"
 NKO_agricultural_funding_desc: "Zapewnienie finansowania i wsparcia dla naszego sektora rolniczego poprawi bezpieczeństwo żywnościowe i wiejskie środki do życia. Skupimy się na mechanizacji, ulepszonych nasionach i lepszych technikach rolniczych, aby zwiększyć produktywność."
 NKO_fertiliser_factory: "Fabryka nawozów"
 NKO_fertiliser_factory_desc: "Budowa najnowocześniejszej fabryki nawozów znacznie poprawi żyzność gleby i plony. Ta inwestycja zapewni naszym rolnikom zasoby, których potrzebują, aby uprawiać obfite plony."
 NKO_nutrition_programs: "Programy żywieniowe"
 NKO_nutrition_programs_desc: "Wdrożenie ogólnokrajowych programów żywieniowych pomoże rozwiązać problem niedożywienia i poprawić zdrowie publiczne. Skupimy się na zapewnieniu zbilansowanej diety, zwłaszcza dla dzieci i grup narażonych, aby zapewnić zdrowszą przyszłość."
 NKO_Renovate_water_supply_facilities: "Odnowienie obiektów zaopatrzenia w wodę"
 NKO_Renovate_water_supply_facilities_desc: "Renowacja i rozbudowa naszych obiektów zaopatrzenia w wodę jest niezbędna dla zdrowia publicznego i rozwoju przemysłu. Zapewnimy wszystkim obywatelom i przemysłom dostęp do czystej i niezawodnej wody."
 NKO_acquiesce_jangmadang: "Zgoda na Jangmadang"
 NKO_acquiesce_jangmadang_desc: "Uznając znaczenie Jangmadang, czyli czarnego rynku, w naszej gospodarce, pozwolimy na kontynuowanie jego działalności w regulowanych warunkach. To pobudzi aktywność gospodarczą i zapewni naszym ludziom niezbędne dobra."
 NKO_bureau_39: "Biuro 39"
 NKO_bureau_39_desc: "Biuro 39 jest odpowiedzialne za generowanie twardej waluty dla reżimu za pomocą różnych środków. Wzmocnienie tego biura zwiększy nasze możliwości ekonomiczne i zapewni stały przepływ zasobów na rzecz projektów krajowych."
 NKO_admit_the_donju: "Przyznaj się do Donju"
 NKO_admit_the_donju_desc: "Donju, czyli bogaci przedsiębiorcy, odgrywają znaczącą rolę w naszej gospodarce. Uznając ich wpływ i integrując ich zasoby, możemy wykorzystać ich potencjał rozwoju narodowego, zachowując jednocześnie kontrolę nad ich działalnością."
 NKO_government_directed_drug_manufacture: "Produkcja narkotyków na zlecenie rządu"
 NKO_government_directed_drug_manufacture_desc: "Kierowanie produkcją leków pod nadzorem rządu stworzy nowe strumienie przychodów. Ta kontrolowana produkcja będzie wykorzystywana do generowania funduszy na projekty krajowe i poprawy naszej stabilności finansowej."
 NKO_smuggling_operations: "Hackowanie zagranicznych banków"
 NKO_smuggling_operations_desc: "Musimy wykorzystać nasze wpływy w krajach wroga, a także możliwości technologiczne naszych hakerów, aby włamać się do systemów bankowych naszych wrogów."
 NKO_counterfeit_production: "Produkcja podróbek"
 NKO_counterfeit_production_desc: "Zaangażowanie się w produkcję podrobionych towarów, w tym walut i przedmiotów luksusowych, zapewni walutę obcą i wesprze naszą gospodarkę. Operacje te będą prowadzone w najwyższej tajemnicy, aby uniknąć międzynarodowych reperkusji."
 NKO_huichon: "Huichon"
 NKO_huichon_desc: "Rozwój miasta przemysłowego Huichon zwiększy nasze zdolności produkcyjne. Skupimy się na budowaniu kluczowej infrastruktury i przyciąganiu wykwalifikowanych pracowników, aby przekształcić Huichon w centrum aktywności gospodarczej."
 NKO_huichon_hydroelectric_power: "Elektrownia wodna Huichon"
 NKO_huichon_hydroelectric_power_desc: "Budowa elektrowni wodnych w Huichon zwiększy nasze bezpieczeństwo energetyczne. Projekty te zapewnią czystą, odnawialną energię i wesprą nasz rozwój przemysłowy."
 NKO_manpo_line_railway: "Kolejka linowa Manpo"
 NKO_manpo_line_railway_desc: "Budowa Manpo Line Railway poprawi infrastrukturę transportową i ułatwi przemieszczanie towarów i ludzi. Ta kolej będzie istotnym ogniwem w naszej krajowej sieci logistycznej."
 NKO_coal_energy_supermacy: "Przewaga energetyczna węgla"
 NKO_coal_energy_supermacy_desc: "Skupienie się na energii węglowej zapewni niezawodne i obfite zasilanie dla naszych przemysłów i domów. Będziemy inwestować w modernizację kopalni węgla i elektrowni, aby zmaksymalizować wydajność i produkcję."
 NKO_ordnance_manufacture: "Produkcja uzbrojenia"
 NKO_ordnance_manufacture_desc: "Zwiększenie naszych możliwości produkcji uzbrojenia jest kluczowe dla obrony narodowej. Rozszerzymy zakłady produkcyjne i udoskonalimy technologie, aby zapewnić dobre wyposażenie naszych sił zbrojnych."
 NKO_huichon_hard_glassware_factory: "Fabryka szkła hartowanego Huichon"
 NKO_huichon_hard_glassware_factory_desc: "Założenie fabryki szkła hartowanego w Huichon wesprze naszą produkcję przemysłową i zapewni wysokiej jakości materiały do ​​różnych zastosowań."
 NKO_huichon_silk_mill: "Młyn jedwabiu Huichon"
 NKO_huichon_silk_mill_desc: "Budowa jedwabnej przędzalni w Huichon wesprze nasz przemysł tekstylny i stworzy miejsca pracy. Ta inwestycja zwiększy naszą zdolność do produkcji wysokiej jakości tkanin i odzieży."
 NKO_huichon_machine_tool_factory: "Fabryka narzędzi maszynowych Huichon"
 NKO_huichon_machine_tool_factory_desc: "Stworzenie fabryki obrabiarek w Huichon zwiększy nasze możliwości produkcyjne. Ten zakład będzie produkował niezbędne maszyny i urządzenia dla naszych branż."
 NKO_bureau_38: "Biuro 38"
 NKO_bureau_38_desc: "Biuro 38 jest odpowiedzialne za zarządzanie zasobami i funduszami państwowymi. Wzmocnienie tego biura zapewni skuteczną alokację zasobów i wesprze krajowe projekty rozwojowe."
 NKO_sanction_evasions: "Uchylanie się od sankcji"
 NKO_sanction_evasions_desc: "Wdrożenie wyrafinowanych strategii w celu uniknięcia międzynarodowych sankcji wzmocni naszą gospodarkę. Wykorzystamy tajne operacje, aby zabezpieczyć kluczowe dobra i zasoby finansowe."
 NKO_international_black_market: "Biuro 121"
 NKO_international_black_market_desc: "Biuro 121 jest północnokoreańską agencją zajmującą się wojną cybernetyczną i główną jednostką Biura Rozpoznania Ogólnego północnokoreańskiej armii. Prowadzi ofensywne operacje cybernetyczne, w tym szpiegostwo i przestępstwa finansowe wykorzystujące cyberprzestrzeń. Według amerykańskich władz RGB zarządza tajnymi operacjami i ma sześć biur."
 NKO_technological_boost: "Wzmocnienie technologiczne"
 NKO_technological_boost_desc: "Skupienie się na postępie technologicznym będzie napędzać innowacje i wzrost gospodarczy. Będziemy inwestować w badania i rozwój, aby dotrzymać kroku światowym trendom technologicznym."
 NKO_purchase_stolen_tech_blueprint: "Zakup skradzionego projektu technicznego"
 NKO_purchase_stolen_tech_blueprint_desc: "Zdobycie skradzionych projektów technologicznych da nam przewagę w rozwijaniu zaawansowanych technologii. Przyspieszy to nasze wysiłki badawcze i innowacyjne."
 NKO_bribe_researchers_at_institues: "Przekupuj badaczy w instytutach"
 NKO_bribe_researchers_at_institues_desc: "Przekupywanie badaczy w kluczowych instytutach przyspieszy nasz postęp technologiczny. Ta tajna strategia pozwoli nam uzyskać cenne spostrzeżenia i postępy."
 NKO_black_market_innovation: "Innowacje na czarnym rynku"
 NKO_black_market_innovation_desc: "Wykorzystanie pomysłowości czarnego rynku zwiększy nasze możliwości technologiczne. Będziemy wspierać podziemnych innowatorów w rozwijaniu nowych i niekonwencjonalnych technologii."
 NKO_national_recovery_plan: "Narodowy Plan Odbudowy"
 NKO_national_recovery_plan_desc: "Wdrożenie kompleksowego krajowego planu naprawczego ustabilizuje i wzmocni naszą gospodarkę. Plan ten skupi się na odbudowie krytycznej infrastruktury, rewitalizacji przemysłu i zapewnieniu dobrobytu społecznego."
 NKO_emphasis_self_reliance: "Nacisk na samodzielność"
 NKO_emphasis_self_reliance_desc: "Skupienie się na samowystarczalności zmniejszy naszą zależność od pomocy zagranicznej i importu. Będziemy promować krajową produkcję i wykorzystanie zasobów."
 NKO_financial_sector_reform: "Reforma sektora finansowego"
 NKO_financial_sector_reform_desc: "Reforma sektora finansowego poprawi stabilność ekonomiczną. Skupimy się na wzmocnieniu instytucji finansowych, ulepszeniu ram regulacyjnych i zachęcaniu do odpowiedzialnych praktyk finansowych."
 NKO_modernization_efforts: "Wysiłki modernizacyjne"
 NKO_modernization_efforts_desc: "Modernizacja naszych branż zwiększy produktywność i wydajność. Będziemy inwestować w nowe technologie, modernizować istniejące obiekty i szkolić naszych pracowników, aby dostosowali się do nowoczesnych metod produkcji."
 NKO_renewable_energy_initiatives: "Inicjatywy w zakresie energii odnawialnej"
 NKO_renewable_energy_initiatives_desc: "Inwestowanie w energię odnawialną zapewni zrównoważony rozwój i zmniejszy nasze uzależnienie od paliw kopalnych. Skupimy się na projektach słonecznych, wiatrowych i hydroelektrycznych, aby stworzyć bardziej zieloną przyszłość."
 NKO_labor_force_training: "Szkolenie siły roboczej"
 NKO_labor_force_training_desc: "Szkolenie naszej siły roboczej poprawi umiejętności i wydajność siły roboczej. Wdrożymy kompleksowe programy szkoleniowe, aby wyposażyć naszych pracowników w niezbędne umiejętności dla nowoczesnych branż."
 NKO_50k_housing_project: "Projekt mieszkaniowy 50 tys."
 NKO_50k_housing_project_desc: "Budowa 50 000 domów rozwiąże problem niedoboru mieszkań i poprawi standardy życia. Ten ambitny projekt zapewni naszym obywatelom wysokiej jakości domy i pobudzi branżę budowlaną."
 NKO_resource_mining: "Górnictwo zasobów"
 NKO_resource_mining_desc: "Rozszerzenie wydobycia zasobów zwiększy dostępność naszych zasobów. Skupimy się na wydobywaniu cennych minerałów i metali, aby wesprzeć nasze gałęzie przemysłu i handel."
 NKO_mansudae_peoples_theatre: "Teatr Ludowy Mansudae"
 NKO_mansudae_peoples_theatre_desc: "Budowa Mansudae People's Theatre wzbogaci nasze życie kulturalne. To wspaniałe miejsce będzie gościć występy i wydarzenia, które będą celebrować nasze dziedzictwo i promować sztukę."
 NKO_rare_metal_exploitation: "Eksploatacja rzadkich metali"
 NKO_rare_metal_exploitation_desc: "Eksploatacja metali rzadkich zapewni cenne zasoby dla naszych branż. Będziemy rozwijać operacje górnicze, aby wydobywać te krytyczne materiały i zwiększać nasze możliwości technologiczne."
 NKO_focus_on_quality: "Skup się na jakości"
 NKO_focus_on_quality_desc: "Skupienie się na jakości poprawi standardy naszych produktów. Wdrożymy środki kontroli jakości i będziemy zachęcać do innowacji, aby zapewnić, że nasze towary spełniają międzynarodowe standardy."
 NKO_light_industry_development: "Rozwój przemysłu lekkiego"
 NKO_light_industry_development_desc: "Rozwój przemysłu lekkiego zdywersyfikuje naszą gospodarkę. Będziemy wspierać małe i średnie przedsiębiorstwa produkujące dobra konsumpcyjne, tekstylia i inne produkty przemysłu lekkiego."
 NKO_modern_mining_operations: "Nowoczesne operacje górnicze"
 NKO_modern_mining_operations_desc: "Wdrożenie nowoczesnych operacji górniczych zwiększy wydajność i wydajność. Będziemy inwestować w zaawansowany sprzęt i techniki górnicze, aby zwiększyć produktywność i zapewnić zrównoważone wydobycie zasobów."
 NKO_export_economy: "Gospodarka Eksportu"
 NKO_export_economy_desc: "Wspieranie gospodarki zorientowanej na eksport będzie napędzać wzrost gospodarczy. Będziemy rozwijać naszą infrastrukturę eksportową, negocjować umowy handlowe i wspierać branże produkujące towary na rynki międzynarodowe."
 NKO_resource_extraction: "Ekstrakcja zasobów"
 NKO_resource_extraction_desc: "Skupienie się na wydobyciu zasobów zapewni stałe dostawy niezbędnych materiałów. Będziemy rozwijać nasze możliwości wydobywcze i ekstrakcyjne, aby wspierać nasze gałęzie przemysłu i zabezpieczyć naszą przyszłość gospodarczą."
 NKO_industrial_modernization: "Modernizacja przemysłowa"
 NKO_industrial_modernization_desc: "Modernizacja naszych branż zwiększy produktywność i wydajność. Będziemy inwestować w nowe technologie, modernizować istniejące obiekty i szkolić naszych pracowników, aby dostosowali się do nowoczesnych metod produkcji."
 NKO_victory_of_juche_revolution: "Zwycięstwo rewolucji Dżucze"
 NKO_victory_of_juche_revolution_desc: "Osiągnięcie zwycięstwa rewolucji Juche umocni naszą niezależność i samodzielność. Będziemy promować zasady Juche, zapewniając ciągłą siłę i autonomię naszego narodu."
 NKO_national_recovery_plan1: "Narodowy Plan Odbudowy"
 NKO_worker_productivity_idea: "Zwiększona wydajność pracowników"
 NKO_international_black_market_gain_tt: "§YZwiększmy skalę naszych operacji szpiegowskich poprzez utworzenie BUREAU-121.§!\n"
 NKO_economic_expansion: "Ekspansja Gospodarcza"
 NKO_economic_expansion_desc: "Rozwój gospodarki stworzy więcej możliwości i wzrostu. Wdrożymy polityki, które zachęcają do inwestycji, wspierają przedsiębiorczość i stymulują aktywność gospodarczą."
 NKO_create_komid: "Utwórz KOMID"
 NKO_create_komid_desc: "Utworzenie KOMID zwiększy nasze możliwości handlowe. Ta organizacja będzie zarządzać naszymi międzynarodowymi operacjami handlowymi, zapewniając skuteczną i dochodową wymianę z innymi narodami."
 NKO_illict_trade_routes: "Nielegalne szlaki handlowe"
 NKO_illict_trade_routes_desc: "Tworzenie nielegalnych szlaków handlowych ominie międzynarodowe sankcje. Będziemy rozwijać tajne sieci, aby zabezpieczyć niezbędne towary i zasoby, zapewniając odporność naszej gospodarki."
 NKO_expand_black_market: "Rozszerzyć czarny rynek"
 NKO_expand_black_market_desc: "Rozwój czarnego rynku zapewni dodatkowe źródła dochodu. Będziemy wspierać podziemną działalność gospodarczą, aby generować fundusze i zabezpieczać niezbędne towary."
 NKO_acquire_military_equipment: "Acquire Military Equipment"
 NKO_acquire_military_equipment_desc: "Acquiring military equipment will strengthen our defense capabilities. We will secure advanced weaponry and technology to ensure our military is well-equipped to protect our nation."
 NKO_black_market_boom: "Black Market Boom"
 NKO_black_market_boom_desc: "A booming black market will provide economic benefits. We will capitalize on underground trade to generate revenue and support our economy."
 NKO_advanced_weapons_trade: "Advanced Weapons Trade"
 NKO_advanced_weapons_trade_desc: "Engaging in advanced weapons trade will boost our military strength. We will develop and sell sophisticated weaponry to generate funds and enhance our defense capabilities."
 NKO_red_star_os: "Red Star OS"
 NKO_red_star_os_desc: "Developing Red Star OS will advance our technological capabilities. This operating system will enhance our cybersecurity and support our technological independence."
 NKO_the_kwangmyong: "The Kwangmyong"
 NKO_the_kwangmyong_desc: "Developing the Kwangmyong network will enhance our communication infrastructure. This internal network will provide secure and reliable access to information and support our digital initiatives."
 NKO_technological_independence: "Technological Independence"
 NKO_technological_independence_desc: "Osiągnięcie niezależności technologicznej zapewni nam samowystarczalność. Skupimy się na rozwoju naszych własnych technologi i zmniejszaniu zależności od zagranicznego importu"
 NKO_trade_agreements_with_vietnam: "Trade Agreements with Vietnam"
 NKO_trade_agreements_with_vietnam_desc: "Forming trade agreements with Vietnam will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_invite_the_russians: "Trade Agreements with [SOV.GetName]"
 NKO_invite_the_russians_desc: "Forming trade agreements with [SOV.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_china: "Trade Agreements with [CHI.GetName]"
 NKO_trade_agreements_with_china_desc: "Forming trade agreements with [CHI.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_egypt: "Trade Agreements with [EGY.GetName]"
 NKO_trade_agreements_with_egypt_desc: "Forming trade agreements with [EGY.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_sirya: "Trade Agreements with [SYR.GetName]"
 NKO_trade_agreements_with_sirya_desc: "Forming trade agreements with [SYR.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_iraq: "Trade Agreements with [IRQ.GetName]"
 NKO_trade_agreements_with_iraq_desc: "Forming trade agreements with [IRQ.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_iran: "Trade Agreements with [PER.GetName]"
 NKO_trade_agreements_with_iran_desc: "Forming trade agreements with [PER.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_venesuela: "Trade Agreements with [VEN.GetName]"
 NKO_trade_agreements_with_venesuela_desc: "Forming trade agreements with [VEN.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_brazilia: "Trade Agreements with [BRA.GetName]"
 NKO_trade_agreements_with_brazilia_desc: "Forming trade agreements with [BRA.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_indonesia: "Trade Agreements with [IND.GetName]"
 NKO_trade_agreements_with_indonesia_desc: "Forming trade agreements with [IND.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_Red_Dawn: "Red Dawn"
 NKO_Red_Dawn_desc: "The dawn of our revolutionary spirit will shine once more as we strengthen our military might. Let this be the beginning of our relentless march towards supremacy."
 NKO_use_russian_model: "Use Russian Naval Models"
 NKO_use_russian_model_desc: "In our pursuit of a powerful navy, we shall adopt and adapt the naval strategies and designs of our Russian allies, propelling our fleet to greater capabilities."
 NKO_armed_to_the_teeth: "Armed to the Teeth"
 NKO_armed_to_the_teeth_desc: "Every vessel shall be equipped with the most formidable weaponry. We will make our navy an indomitable force that strikes fear in our enemies."
 NKO_heavy_cruiser_focus: "Focus on Heavy Cruisers"
 NKO_heavy_cruiser_focus_desc: "To project our power across the seas, we will focus on constructing heavily armored cruisers that dominate the waters and stand resilient against any foe."
 NKO_the_north_korean_carrier: "North Korean Carrier"
 NKO_the_north_korean_carrier_desc: "A carrier fleet is a symbol of our technological might. We shall develop our own carriers to carry the banner of Juche ideology over distant waters."
 NKO_the_korean_typhoon_class: "North Korean Typhoon Class"
 NKO_the_korean_typhoon_class_desc: "Inspired by powerful submarines worldwide, our own Typhoon class will bolster our undersea capabilities, a silent threat to any who dare challenge us."
 NKO_ship_launched_cruise_missiles: "Ship-Launched Cruise Missiles"
 NKO_ship_launched_cruise_missiles_desc: "Our navy will be equipped with the latest ship-launched cruise missiles, enhancing our reach and power to strike targets far beyond our shores."
 NKO_korean_mariens: "North Korean Marines"
 NKO_korean_mariens_desc: "Forming elite marine units will enable us to conduct amphibious operations and secure control over strategic locations swiftly and decisively."
 NKO_Studying_their_airforce: "Study Enemy Air Forces"
 NKO_Studying_their_airforce_desc: "To prepare for inevitable conflicts, we must study the air forces of our enemies, learn their strengths and weaknesses, and devise counter-strategies."
 NKO_focus_on_the_f-35: "Focus on the F-35"
 NKO_focus_on_the_f-35_desc: "We will analyze the F-35's technology, using its design as inspiration to improve our own air capabilities and counter any who wield this advanced fighter."
 NKO_focus_on_the_f-16: "Focus on the F-16"
 NKO_focus_on_the_f-16_desc: "The F-16 has proven itself as a capable fighter. We will dissect its tactics and technology, enhancing our own fighter fleet in the process."
 NKO_focus_on_the_future_kai_kf-21: "Focus on the KF-21"
 NKO_focus_on_the_future_kai_kf-21_desc: "The KF-21 is South Korea's next-generation fighter. By analyzing its potential, we prepare our air force to counteract any threat it might pose."
 NKO_get_russian_help: "Seek Russian Military Assistance"
 NKO_get_russian_help_desc: "To bolster our military technology, we will seek the assistance of Russia, a trusted ally, to equip us with the necessary expertise and equipment."
 NKO_get_chinese_help: "Seek Chinese Military Assistance"
 NKO_get_chinese_help_desc: "To bolster our military technology, we will seek the assistance of China, a trusted ally, to equip us with the necessary expertise and equipment."
 NKO_our_jet: "Domestic Fighter Aircraft"
 NKO_our_jet_desc: "We will continue our research in the field of aviation, in order to accelerate our receipt of the latest fighter aircraft, but already of domestic production."
 NKO_korean_ground_forces: "Strengthen North Korean Ground Forces"
 NKO_korean_ground_forces_desc: "Our ground forces are the backbone of our defense. We will invest in their training and equipment, ensuring their readiness for any battle."
 NKO_doctrine_modernization: "Modernize Our Doctrine"
 NKO_doctrine_modernization_desc: "We shall adopt a modern approach to warfare, ensuring our doctrines reflect the realities of current military tactics and strategies."
 NKO_implement_new_doctrine: "Implement New Doctrine"
 NKO_implement_new_doctrine_desc: "By implementing new strategies, we empower our forces with innovative tactics and increased effectiveness on the battlefield."
 NKO_superior_firepower: "Superior Firepower Doctrine"
 NKO_superior_firepower_desc: "Focusing on firepower, we will equip our forces to deliver overwhelming force and achieve decisive victories."
 NKO_keep_our_doctrine: "Retain Our Traditional Doctrine"
 NKO_keep_our_doctrine_desc: "Our traditional doctrine has served us well. We will refine and maintain it, drawing strength from our past and adapting it to future conflicts."
 NKO_train_the_south: "Train for Southern Warfare"
 NKO_train_the_south_desc: "With potential conflicts in the South, we must prepare our forces specifically for this environment, ready to engage with resilience and resolve."
 NKO_mass_assault_prevails: "Mass Assault Prevails"
 NKO_mass_assault_prevails_desc: "Our doctrine of overwhelming force through sheer numbers remains effective. We will maintain our mass assault strategy, wearing down any opposition."
 NKO_special_mass_assault: "Specialized Mass Assault Units"
 NKO_special_mass_assault_desc: "To perfect our mass assault strategy, we will develop specialized units trained specifically to exploit the strengths of this tactic."
 NKO_korean_iron_fist: "The North Korean Iron Fist"
 NKO_korean_iron_fist_desc: "Our might shall be an iron fist that crushes any opposition. Through rigorous training and discipline, we prepare our forces to embody this unbreakable will."
 NKO_defend_our_skies: "Defend Our Skies"
 NKO_defend_our_skies_desc: "Our air defenses must be formidable. We will prioritize the defense of our airspace, ensuring that no enemy aircraft can approach undetected."
 NKO_defend_the_coast: "Defend Our Coast"
 NKO_defend_the_coast_desc: "Our coastal defenses must be vigilant. We will fortify our coastline, deterring any invasion attempt and protecting our sovereignty."
 NKO_harts: "High-Altitude Reconnaissance Tactics"
 NKO_harts_desc: "We shall adopt advanced reconnaissance tactics to monitor enemy movements and gain valuable intelligence from high altitudes."
 NKO_upgrade_our_radar: "Upgrade Our Radar Systems"
 NKO_upgrade_our_radar_desc: "To detect threats from afar, we will enhance our radar technology, giving us an early warning system against any approaching dangers."
 NKO_counter_enemy_missiles: "Counter Enemy Missiles"
 NKO_counter_enemy_missiles_desc: "To protect our homeland, we must develop countermeasures against enemy missiles, ensuring we remain secure from aerial threats."
 NKO_army_supply_hubs: "Establish Army Supply Hubs"
 NKO_army_supply_hubs_desc: "To maintain our forces, we will construct supply hubs that ensure our army is always ready and well-supplied for sustained operations."
 NKO_mass_drones: "Mass Drone Production"
 NKO_mass_drones_desc: "We will start focusing on mass production of drones to provide our army with the best drones!"
 NKO_Artillery: "Our Artillery"
 NKO_Artillery_desc: "North Korea's artillery is a cornerstone of its military strategy, featuring a vast array of systems, from traditional howitzers to advanced rocket artillery. Renowned for its massive stockpile, the artillery is designed for overwhelming firepower, capable of targeting both military installations and civilian areas, particularly in neighboring South Korea, making it a key element of deterrence and offense."
 NKO_SPAA: "Our Air Defense"
 NKO_SPAA_desc: "North Korea's air defense system is a mix of Soviet-era technology and domestically developed platforms, designed to protect critical infrastructure and counter potential air threats. It includes surface-to-air missiles, anti-aircraft guns, and radar systems, emphasizing a layered defense strategy. Despite limitations compared to modern systems, it reflects the country's focus on self-reliance and deterrence."
 NKO_more_zavods: "Investments in Our MIC"
 NKO_more_zavods_desc: ""
 NKO_Rebuild_sso: "Special Forces Reform"
 NKO_Rebuild_sso_desc: "North Korea's Special Forces reform focuses on modernizing and enhancing the capabilities of its elite units to conduct asymmetric warfare, unconventional operations, and rapid response missions. This reform includes improving training regimens, incorporating advanced tactics, and equipping forces with modern weaponry and communication systems. Special Forces are designed to excel in infiltration, sabotage, reconnaissance, and direct action, often targeting strategic assets or critical infrastructure. The reforms aim to increase their effectiveness in regional conflicts, bolster deterrence, and maintain readiness for a variety of high-stakes missions. This emphasis reflects North Korea's strategic reliance on highly skilled, agile units to offset conventional military limitations."
 NKO_Revolutionary_Spirits: "Revolutionary Military Spirit"
 NKO_The_Green_Water_Navy_desc: "This national spirit will be §YUpgraded§! if we complete the §HNaval Modernization§! focuses. \n§W--------------§!\nA green-water navy is a maritime force that is capable of operating in its state's littoral zones and has limited competency to operate in the surrounding marginal seas. It is a relatively new term, and has been created to better distinguish, and add nuance, between two long-standing descriptors: blue-water navy (deep waters of open oceans) and brown-water navy (littoral waters and near to shore)."
 NKO_young_red_guard_idea: "Red Youth Guards"
 NKO_young_red_guard_idea1: "Youth Guards"
 NKO_army_sso: "Army Special Operations Forces"
 NKO_war_university: "Kim Il Sung Military University"
 NKO_vpk: "Domestic Military-industrial Complex"
 NKO_sad_army_idea: "Outdated People's Army"
 NKO_sad_army_idea_desc: "This national spirit will be §YUpgraded§! if we complete the §HRevolutionary Military Spirit§! focuses. \n§W--------------§!\nNorth Korea's army, while boasting significant manpower, relies heavily on outdated equipment and technology. Much of its arsenal consists of Soviet-era tanks, artillery, and aircraft, with limited modernization. This reliance on older systems reflects resource constraints and international sanctions, making the army formidable in numbers but challenged in efficiency and capability compared to modern militaries."
 NKO_new_army_idea: "New North Korean People's Army"
 NKO_new_army_idea_desc: "North Korea's modernized army combines advanced homegrown technologies with strategic upgrades to key military assets. Enhanced missile systems, drones, and cyber warfare capabilities showcase a shift towards modernization. While still constrained by sanctions, the focus on innovation and asymmetric warfare tactics makes the army a formidable force in the region."
 NKO_marines_idea: "Marine Corps"
 NKO_Planned_Economy: "Planned Economy"
 NKO_Planned_Economy_desc: "The country of North Korea, officially known as the Democratic People's Republic of Korea (DPRK), has an isolated and tightly controlled command economy. In a command economy, the economy is centrally planned and coordinated by the government, making it a standard component of any communist country."
 NKO_unite_sport_team: "Unified Olympic Team"
 NKO_unite_sport_team_desc: ""
 NKO_propose_confederation: "Question of Confederation"
 NKO_propose_confederation_desc: ""
 NKO_create_confederation: "The Korean Confederation"
 NKO_create_confederation_desc: ""
 NKO_demoralize_propaganda: "Demoralizing Propaganda"
 NKO_demoralize_propaganda_desc: "."
 NKO_border_picture: "Border Pictures of South Korea"
 NKO_border_picture_desc: "."
 NKO_finance_rebels: "Financing the Rebels"
 NKO_finance_rebels_desc: "."
 NKO_weapons_for_rebels: "Weapons For the Rebels"
 NKO_weapons_for_rebels_desc: "."
 NKO_united_again: "United Again"
 NKO_united_again_desc: "."
 NKO_CHI_invest_resources: "Resource Extraction Assistance"
 NKO_CHI_invest_resources_desc: "We are ready to let Chinese resource companies into our territory"
 NKO_CHI_banks: "Chinese Banks"
 NKO_CHI_banks_desc: "We are ready to let Chinese banks into our country"
 NKO_CHI_help_factories: "Chinese Factories"
 NKO_CHI_help_factories_desc: "We intend to ask the Chinese government for help with the construction of new factories on our territory"
 NKO_CHI_huawei: "Cooperation with Huawei"
 NKO_CHI_huawei_desc: "Huawei Corporation is one of the most famous in the world and we want the Chinese government to allow them to operate on our territory"
 NKO_expand_local_industry: "Investments in The Domestic Industry"
 NKO_expand_local_industry_desc: "We must expand domestic production, because without a strong industry, our country will not be able to withstand the economic pressure of our enemies"
 NKO_more_arms_factories: "More Military Factories"
 NKO_field_hospitals: "Field Hospitals"
 NKO_field_hospitals_desc: "We will deploy more field hospitals so that in case of war, we can treat soldiers as quickly as possible"
 NKO_reform_youth: "Reform of the Workers' Guard"
 NKO_reform_youth_desc: "It was necessary to reform this structure a long time ago, its former functionality has long been out of line with modernity"
 korea_north.7.t: "Drugs are spreading through our Streets"
 korea_north.7.d: "The streets are drowning in chaos as powerful drugs like meth and cocaine flood neighborhoods, tearing communities apart. Families are broken, crime is rising, and no one feels safe anymore."
 korea_north.7.a: "Our enemies shall fall"
 korea_north.8.t: "Our drugs have been stopped at the border"
 korea_north.8.d: "Everything was going smooth until the message came through: the shipment got stopped at the border. Now, everything is on the line. Months of planning is gone down the drain "
 korea_north.8.a: "We will try again"
 korea_north.9.t: "Counterfeit money has been plaguing our banking system"
 korea_north.9.d: "Fake cash is everywhere, slipping through hands and businesses undetected, leaving chaos in its wake. Local shops, street vendors, and even major retailers are getting burned as counterfeit bills circulate faster than authorities can respond."
 korea_north.9.a: "Imperialism falls"
 korea_north.10.t: "Our Counterfeit Money has been Captured by Authorities"
 korea_north.10.d: "The authorities have caught this shipment but this is not the end this is only the beginning."
 korea_north.10.a: "Make more!"
 korea_north.11.t: "[NKO.GetName] Offers Us To Purchase Its Weapons"
 korea_north.11.d: "The Northern Korean government is secretly ready to sell us a batch of its weapons through its shadow channels. Weapons, although not of the best quality, but acquiring them in such quantity at the moment can play a positive role on the state of our army."
 korea_north.11.a: "We Are Buying"
 korea_north.11.b: "No"
 korea_north.12.t: "Our Weapons Were Bought By [FROM.GetName]"
 korea_north.12.d: "Our business offer to buy weapons has been accepted by their government!."
 korea_north.12.a: "Nice"
 korea_north.13.t: "We Couldn't Sell The Weapons"
 korea_north.13.d: "Our offer to buy weapons was rejected by their government, what are they so afraid of?"
 korea_north.13.a: "Sad"
 NKO_accept_money: "§YAccept§! Money"
 NKO_medicine_relief: "§YSend§! Medicine Relief"
 NKO_build_farms1: "§YFarms§! Construction"
 NKO_build_farms1_desc: "Building the Farms to feed our people is a must this farm is under construction"
 NKO_build_factory1: "§YCivilian Industry§! Construction"
 NKO_build_factory1_desc: "To help our economy grow we must empower our people to produce more consumer goods and increase our industrial capacity."
