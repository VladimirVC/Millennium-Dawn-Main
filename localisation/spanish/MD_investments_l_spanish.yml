 expand_local_coastal_infrastructure_tt: "§YExpandir la Infraestructura Costera Local§! en §Y[THIS.GetName]§!\n---------\nLas regiones costeras de §Y[THIS.GetName]§! se beneficiarían enormemente de una mejor infraestructura. Deberíamos considerar la expansión de los puertos, muelles y defensas costeras para impulsar el comercio marítimo y las capacidades navales."
