 EU_join_the_euro_decision: "Joining the Euro"
 EU_join_the_euro_decision_desc: "In order to adopt the euro, EU countries have to bring their national legislation in line with relevant EU law and meet specific conditions designed to ensure economic convergence. These requirements, agreed by the EU Member States in Maastricht in 1991, are known as the convergence criteria."
