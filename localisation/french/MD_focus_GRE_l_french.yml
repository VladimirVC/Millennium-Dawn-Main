 greece_focus: "Priorités nationales grecques"
 earthquake_diplomacy: "Diplomatie sismique"
 airspace_violations: "Violations de l'espace aérien"
 GRE_debt_crisis: "Crise de la dette"
 GRE_debt_crisis_desc: "La Grèce a une dette extérieure de 300 milliards de dollars, l'une des plus importantes au monde. Cela a créé un énorme problème pour nous, car la dette augmente rapidement et crée des problèmes massifs pour notre économie. Nous devrons trouver un moyen de résoudre le problème de la dette avant qu'il ne devienne incontrôlable."
 GRE_legacy: "L'héritage grec"
 GRE_legacy_desc: "La Grèce a une histoire riche, marquée par la montée et la chute de nombreux empires. Après la perte de Byzance, nous avons perdu le contrôle de notre patrie. Depuis 1821, nous avons promis qu'une telle perte ne se reproduirait plus jamais pour le peuple grec."
 GRE_constitutional_crisis: "Crise constitutionnelle"
 GRE_constitutional_crisis_desc: "The old constitution was written for a very different Greece. Its checks and balances are now getting in the way of the reforms the country needs. Rewriting it is risky, but half-measures have already failed us."
 GRE_glass_cannon: "Économie du canon de verre"
 GRE_glass_cannon_desc: "The [GRE.GetAdjective] economy does well during growth but falls apart quickly in a downturn. We rely too heavily on foreign investment, tourism, and imports. Unless we strengthen our economic resilience, we risk collapsing under the weight of debt and mismanagement."
 GRE_com_promote_local: "Promotion des entreprises locales"
 GRE_com_promote_local_desc: "Foreign chains have been pushing out the small shops and family businesses that used to be the backbone of Greek commerce. Tax breaks and procurement preferences for domestic firms should help put money back into local communities."
 GRE_resources: "Nationalisation des gisements de ressources"
 GRE_resources_desc: "All natural resource deposits are now under state authority. Extraction is directed toward domestic industrial needs rather than foreign profit, and the revenue feeds the public treasury rather than private shareholders."
 GRE_construction_focus: "Priorité aux matériaux de construction"
 GRE_construction_focus_desc: "Greece has plenty of marble, limestone, and aggregate quarries. Expanding domestic cement and steel production would help keep construction costs down and create more jobs for Greek workers."
 GRE_drift_modifiers: "Dérive politique"
 GRE_debt_modifier: "Crise de la dette"
 GRE_debt_modifier_desc: "La crise de la dette a des effets plus sévères selon la manière dont nous gérons notre argent. Cependant, dépenser plus d'argent pour créer des emplois nous sera bénéfique à long terme."
 GRE_immigrants_barred: "Immigration suspendue"
 GRE_immigrants_barred_desc: "Le gouvernement a suspendu toute immigration en Grèce jusqu'à nouvel ordre. Il se peut que ce nouvel ordre ne soit jamais donné."
 GRE_metaxism_idea: "Metaxisme"
 GRE_metaxism_idea_desc: "Le metaxisme fait référence à l'idéologie fasciste présente en Grèce entre 1936 et 1941, qui a largement sauvé la Grèce des troubles internes auxquels elle était confrontée jusqu'à l'invasion allemande."
 GRE_indoctrinate_youth: "Indoctrinate the Youth"
 GRE_indoctrinate_youth_desc: "Les gouvernements démocratiques ont malheureusement laissé la jeunesse de notre pays sans avenir. Nous devons donc gagner la confiance des jeunes pour réussir à prendre les rênes du pays."
 GRE_wild_unions: "Syndicats sauvages"
 GRE_wild_unions_desc: "Nous avons donné du pouvoir aux syndicats et ils l'utilisent, il n'y a aucun mal à cela."
 GRE_press_opposition: "Opposition médiatique"
 GRE_press_opposition_desc: "Les médias ne nous ont pas dépeints sous notre meilleur jour depuis que nous avons rétabli l'ordre au sein du gouvernement, mais il est logique que les faibles craignent les forts."
 GRE_one_party: "État à parti unique"
 GRE_one_party_desc: "Après avoir déclaré que le PCG est le seul parti politique autorisé en Grèce, nous avons le pouvoir de faire tout ce que nous voulons, mais ceci se fait aux dépens du sang qui doit être versé pour garantir la soumission de notre peuple."
 GRE_reorganize_army_idea: "Réorganisation de l'armée"
 GRE_reorganize_army_idea_desc: "Nous ne pouvons pas nous contenter de dégraisser l'armée au point de la rendre dysfonctionnelle. Le moment viendra peut-être où nous aurons besoin de forces armées puissantes et, dans cette éventualité, nous veillerons à ce que notre armée soit loyale et prête."
 GRE_new_army_idea: "Une nouvelle armée"
 GRE_new_army_idea_desc: "Nous avons constaté une grande réussite dans la prise en charge par la police du rôle de première force de défense. Cependant, nous savons qu'elle n'est pas suffisamment équipée pour repousser les invasions étrangères. Nous allons construire une nouvelle armée qui se consacrera uniquement à la défense de la Grèce afin d'assurer la sécurité de notre peuple."
 GRE_red_army_idea: "Une armée rouge"
 GRE_red_army_idea_desc: "Nous avons instillé le fanatisme idéologique non seulement dans les rangs de notre armée, mais aussi dans la population civile, ce qui nous permet de disposer de la main-d'œuvre et de la loyauté nécessaires pour former une armée redoutable."
 GRE_cracked_foundation: "Des fondations fissurées"
 GRE_cracked_foundation_desc: "Les fondations de l'État ont été contredites à de si nombreuses reprises que si nous continuons sur la voie actuelle, nous pourrions être confrontés à une redoutable nouvelle révolution. \n\n§RSi notre stabilité tombe en dessous de 30%, nous devrons faire face à une révolution en Grèce !§!"
 GRE_militarist_education_idea: "Éducation militariste"
 GRE_militarist_education_idea_desc: "Le système éducatif a inculqué les valeurs militaires dans son programme, ce qui permet d'être mieux préparé en cas d'attaques soudaines."
 GRE_elam: "Résurgence du Front populaire national"
 GRE_elam_desc: "ELAM, the National Popular Front in Cyprus, has emerged as a proxy for our ideology across the island. Directing funding and political support to Nicosia strengthens our hand in any future reunification process without requiring direct intervention."
 GRE_police_influence: "Police Under Party Influence"
 GRE_rename_istanbul: "Renommer Istanbul"
 GRE_austerity_tension1: "Négligeables"
 GRE_austerity_tension2: "Major"
 GRE_austerity_tension3: "Civil Uprisings!"
 GRE_CYP_category: "Le conflit chypriote"
 GRE_CYP_category_desc: "Since 1974, Cyprus has been divided between the Turkish Republic of Northern Cyprus and the Republic of Cyprus, following a Greek-backed coup that nearly united the island with Greece. In response, Turkey invaded, resulting in the ongoing partition of Cyprus, the second longest military occupation in the modern era, surpassed only by that in Israel.\n\n§YGreek-Cypriot Strength:§! §C[?145.GRE_SUPPORT]%§!\n§YTurkish-Cypriot Strength:§! §C[?146.GRE_SUPPORT]%§!\n\n§CThe first side to reach 100 strength will unify Cyprus under their rule!§!"
 GRE_guarantee_turkish_property: "Déclencher des manifestations pour l’unification à travers Chypre"
 GRE_guarantee_turkish_property_desc: "By creating the desire for unity, we will create chaos all across Cyprus, giving us the opportunity to grow our own strength while the Turks are busy dealing with the protests."
 GRE_please_south: "S'adresser aux chypriotes grecs"
 GRE_please_north: "Propagande anti-turque"
