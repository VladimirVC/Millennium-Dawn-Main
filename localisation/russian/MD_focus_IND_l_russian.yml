 IND_Aceh_insurgency: "Ачехское повстанческое движение"
 IND_Aceh_insurgency_desc: "В Ачехе с 1976 года царит хаос и мятеж, что приводит к нестабильности в нашей стране и ненужному кровопролитию. Наша армия слишком сосредоточена на борьбе с этими повстанцами, и это приводит к нашему военному отставанию."
