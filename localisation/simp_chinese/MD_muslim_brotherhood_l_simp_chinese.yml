l_simp_chinese:
 muslim_brotherhood_sponsor: "穆斯林兄弟会网络"
 muslim_brotherhood_suppressor: "对抗兄弟会"
 MB_build_network_hub: "建立国际组织"
 MB_build_network_hub_desc: "穆斯林兄弟会是一个跨越国界的运动，其成员分散在整个地区，没有统一的总部。让[Root.GetNameDef]成为这个总部，协调整个网络，并为我们提供支持海外兄弟的途径。"
 MB_fund_affiliates: "资助兄弟会附属机构"
 MB_fund_affiliates_desc: "[FROM.GetNameDef]的兄弟会成员意志坚定，但资金匮乏。资金、组织者和持续不断的援助将增强他们对抗政府的力量，因为政府宁愿让他们消失。"
 MB_diplomatic_solidarity: "呼吁兄弟会团结"
 MB_diplomatic_solidarity_desc: "结成兄弟情谊的各国政府团结起来比各自为战更强大。让他们坐到一起，重申共同目标，让整个欧盟感受到我们之间的友谊。"
 MB_bankroll_crackdown: "资助外国镇压行动"
 MB_bankroll_crackdown_desc: "[FROM.GetNameDef]眼睁睁地看着兄弟会在其境内壮大，却无力采取行动。向他们提供资金和情报，让他们先发制人，在运动积蓄到足以威胁国家之前发动攻击。"
 MB_designate_terrorist_organization: "将穆斯林兄弟会认定为恐怖组织"
 MB_designate_terrorist_organization_desc: "将穆斯林兄弟会定性为恐怖组织。这一认定在国内成本不高，却能让[Root.GetNameDef]与所有划定相同界限的政府站在一起。"
 MB_counter_sponsor_influence: "揭露兄弟会的融资行为"
 MB_counter_sponsor_influence_desc: "有人在[FROM.GetNameDef]资助兄弟会，而且资金来源会留下痕迹。揭露真相，瓦解其运作，看着这个组织随着幕后支持者被拖入泥潭而逐渐失去动力。"
 MB_rescind_terrorist_designation: "撤销恐怖组织认定"
 MB_rescind_terrorist_designation_desc: "悄悄地解除恐怖分子认定。打击穆斯林兄弟会的立场已经达到了目的，继续纠缠旧怨并无益处。"
 MB_sponsored_network: "赞助我们的兄弟会运动"
 MB_funding_subversion: "资助穆斯林兄弟会在海外的颠覆活动"
 MB_solidarity: "穆斯林兄弟会的团结"
 MB_crackdown_patron: "为我们的镇压行动提供资金支持"
 MB_funding_repression: "资助镇压穆斯林兄弟会"
 MB_counter_bloc: "共同反对兄弟会"
 MB_branded_terrorist: "将穆斯林兄弟会定性为恐怖组织"
 brotherhood.6.c: "将他们的温和派拉拢到政府中。"
 brotherhood.11.t: "一项资助镇压行动的提议"
 brotherhood.11.d: "[FROM.GetNameDef]已悄悄向我们提供资金和情报，以阻止穆斯林兄弟会进一步壮大。他们的特使正在等待答复。"
 brotherhood.11.a: "接受资金，然后对他们采取行动。"
 brotherhood.11.b: "拒绝提议"