 build_forward_logistics_base_tt: "§YConstruire une base logistique avancée§! dans §Y[THIS.GetName]§!\n---------\nL'État est actuellement un peu détaché de notre logistique primaire. Nous devrions envisager de construire des bases logistiques avancées pour aider à soutenir les troupes déployées dans §Y[THIS.GetName]§!."
