l_simp_chinese:
 BRA_education_integration: "教育一体化"
 BRA_education_integration_desc: "当成员国开始协调培养未来一代的方式时，共享市场就会更加强大。教育合作、相互认可和学术交流将有助于创建一个不仅在经济上紧密联系，而且在制度上也相互兼容的集团。"
 BRA_mercosur_market: "南方共同市场"
 BRA_mercosur_market_desc: "一旦制度基础搭建完成，南方共同市场就能超越有限的协调，朝着更宏伟的目标迈进：建立一个商业联系更紧密、投资流动更广泛、内部经济引力更强的市场。这正是南方共同市场开始展现其强大实力的契机。"
 BRA_inv_assoc: "邀请联系国"
 BRA_inv_assoc_desc: "我们与南方共同市场的联系国关系密切。为了进一步改善双方关系，并为它们的经济发展创造机会，我们应该邀请它们加入南方共同市场，让它们成为引以为豪的成员。"
 BRA_maintain_quo: "巩固南方共同市场"
 BRA_maintain_quo_desc: "扩张并不总是意味着力量。一个集团如果扩张过快而没有巩固自身基础，就有可能规模更大，但力量更弱。我们应该专注于深化现有成员之间的凝聚力、效能和内部稳定性。"
 BRA_expand_to_latin_america: "拓展至整个拉丁美洲"
 BRA_expand_to_latin_america_desc: "如果更广阔的拉丁美洲大陆仍能纳入其影响范围，那么南方共同市场就不应局限于目前的区域。凭借更强大的机构和更具吸引力的经济模式，我们现在可以将目光投向南锥体以外的地区，并将我们的影响力扩展到整个拉丁美洲。"
 BRA_americas_unity: "南美峰会"
 BRA_americas_unity_desc: "南美洲长期以来在国家优先事项、错失机遇和半途而废的区域项目之间摇摆不定。我们将召开南美峰会，重启整个大陆的合作，重振南方共同市场，并将自身置于新的区域倡议的核心地位。一体化若要取得成功，必须从领导力开始。"
 BRA_americas_unity_TT: "该国与其他§Y南美洲国家§!§Y关系值§!§G+15§!"
 BRA_mercosur: "南方共同市场"
 BRA_mercosur_desc: "南方共同市场提供的不仅仅是关税安排，它还为建立一个更强大、更协调的南美洲奠定了基础，这个南美洲建立在贸易、共同规则和区域影响力逐步扩大的基础之上。如果我们想要引领整个南美洲，就应该从这里开始。"
 BRA_trade_agreement: "贸易协定"
 BRA_trade_agreement_desc: "区域集团不能仅靠象征意义维系。它必须降低壁垒，协调商业预期，并为成员国创造切实可见的经济利益。通过加强南方共同市场内部的贸易协定，我们可以将政治口号转化为实际的一体化。"
 BRA_discuss_currency: "扩大本币结算"
 BRA_discuss_currency_desc: "为减少对美元的过度依赖，使集团内部贸易更加稳定灵活，我们应扩大成员国间本币结算的使用。降低汇兑成本、加强金融协调，将是迈向更加自主的区域经济的重要一步。"
 BRA_people_goods: "人员和货物的自由流动"
 BRA_people_goods_desc: "仅靠贸易无法实现一体化。只有当工人、学生、企业家和家庭能够更自由地跨境流动时，南方共同市场才能超越市场本身，成为一个人们生活、工作并建立长久联系的区域空间。"
 BRA_assoc_members: "规范联系国途径"
 BRA_assoc_members_desc: "联系国地位固然有用，但它并未完善区域秩序。如果南方共同市场要成为真正的政治和经济集团，我们必须建立正式的加入途径，使邻国能够从松散的联系走向正式成员国地位。"
 MER_secretariat_reform: "南方共同市场秘书处改革"
 MER_secretariat_reform_desc: "一个规模更大的集团不可能永远依靠临时外交手段来管理。如果新成员要信任南方共同市场，将其视为一个严肃的机构，就必须加强其行政核心。一个更有能力的秘书处将使加入、协调和争端管理更具公信力。"
 MER_infrastructure_corridor_program: "基础设施走廊计划"
 MER_infrastructure_corridor_program_desc: "如果道路止于国界，内陆物流崩溃，区域一体化就毫无意义。南方共同市场不仅需要通过协议连接，更需要通过基础设施将货物、资本和人员输送到整个大陆。一个更强大的集团必须切实建设，而不仅仅是空谈。"
 MER_development_fund: "南方共同市场发展基金"
 MER_development_fund_desc: "一些国家不会被空洞的承诺所打动。只有当一体化带来切实可见的发展和真正的投资时，它们才会加入。通过设立南方共同市场发展基金，我们可以将加入转化为机遇，使成员资格具有实质性的吸引力。"
 mercosur_member_state_modifier: "南方共同市场成员国"
 mercosur_member_state_modifier_desc: "南方共同市场最初是以巴西、阿根廷、乌拉圭和巴拉圭为中心的关税和政治框架，后来通过联系伙伴关系扩展到整个南美洲。参与该集团意味着我们的未来与更广泛的区域贸易、协调和共同发展项目紧密相连。\n\n§Y随着越来越多的联系国和正式会员国加入，该国家精神也日益增强！§!"
 MER_corridor_investment_round_modifier: "南方共同市场走廊投资轮"
 MER_corridor_investment_round_modifier_desc: "新一轮集团融资正用于南方共同市场境内的道路、物流走廊和数字连接项目。目前，由于本轮投资仍在进行中，基础设施建设的推进速度比以往更快。"
 MER_development_fund_round_modifier: "南方共同市场发展基金拨付"
 MER_development_fund_round_modifier_desc: "南方共同市场发展基金目前正在为整个集团的新民用和办公楼建设项目提供资金支持。只要这轮拨款持续进行，经济发展项目就会加速推进。"
 MER_mercosur_diplomacy: "南美一体化"
 MER_mercosur_diplomacy_desc: "南方共同市场旨在扩大贸易、加强区域市场联系，而南美联盟则代表着更广泛的南美合作愿景，涵盖政治对话、基础设施和安全等领域。通过这些框架，可以加强南美团结，并进一步推进区域一体化。\n\n§Y随着每个新成员国的加入，南方共同市场和南方联盟的国家精神也日益增强！§!"
