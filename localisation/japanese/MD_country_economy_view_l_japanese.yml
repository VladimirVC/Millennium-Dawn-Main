 total_civilian_factories_amount_tt: "This value represents the total number of §YCivilian Industries§! in our nation."
 total_civilian_factories_amount_tt_delayed: "This building provides the state with industry for the production of civilian goods or construction of new buildings. Can be converted to military industry if needed.\n\nProvides the state with:\nBase Number of Required Workers: §Y206K§!\nBase GDP Output per §YCivilian Industry§!: $§Y17.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW\n\nProductivity impact on §YCivilian Industries Workforce§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YCivilian Industries Workforce§!: [?modifier@civ_facs_worker_requirement_modifier|-%0]\n\nWorkers Required per §YCivilian Industries§!: [?workers_per_civ_fac_display|2]K\n"
 total_military_factories_amount_tt: "This value represents the total number of §YMilitary Industries§! in our nation."
 total_military_factories_amount_tt_delayed: "This building provides the state with industry for the production of new military equipment. Can be converted to civilian industry if needed.\n\nProvides the state with:\nBase Number of Required Workers: §Y18.8K§!\nBase GDP Output per §YMilitary Industry§!: $§Y1.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW\n\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YMilitary Factories & Dockyard Workforce§!: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\nWorkers Required per §YMilitary Industry§!: [?workers_per_mil_fac_display|2]K\n"
 total_naval_yard_amount_tt: "This value represents the total number of §YNaval Yard§! in our nation."
 total_naval_yard_amount_tt_delayed: "§YNaval Yards§! are representative of a state's ability to produce military vessels of all sorts ranging from §YPatrol Boats§!, §YConvoys§!, §YDestroyers§!, §YCarriers§! and more.\n\nProvides the state with:\nBase Number of Required Workers: §Y18.8K§!\nBase GDP Output per §YNaval Yard§!: $§Y1.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW\n\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YMilitary Factories & Dockyard Workforce§!: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\nWorkers Required per §YNaval Yard§!: [?workers_per_dockyard_display|2]K\n"
 total_offices_amount_tt: "This value represents the total number of §YOffice Sectors§! in our nation."
 total_offices_amount_tt_delayed: "The §YOffice Sectors§! represents all the other industries of the economy beyond the extraction and heavy industries. These includes financial, customer, information technology, retail services and so much more.\n\nProvides the state with:\nBase Number of Required Workers: §Y473K§!\nBase GDP Output per §YOffice Sector§!: $§Y50 Billion§!\nBase Energy Consumption: §R-0.25§! GW\n\nProductivity on §YOffice Sector Workforce§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YOffice Sector Workforce§!: [?modifier@offices_worker_requirement_modifier|-%0]\n\nWorkers Required per §YOffice Sector§!: [?workers_per_office_display|2]K\n"
 total_agriculture_district_amount_tt: "This value represents the total number of §YCommercialized Agriculture Districts§! in our nation."
 total_agriculture_district_amount_tt_delayed: "§YCommercialized Agriculture Districts§! represents a catch-all for all non-subsistence Agriculture within our nation. It includes Agro-Industry, arable land, grain silos, butcherhouses and more.\n\nProvides the state with:\nBase Number of Required Workers: §Y188K§!\nBase GDP Output per §YCommercialized Agriculture District§!: $§Y25 Billion§!\nBase Energy Consumption: §R-0.10§! GW\n§YFuel Gain§! from States: 8\n§YLocal Supplies§!: 1.5%\n\nProductivity impact on §YCommercialized Agriculture District Workforce§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YCommercialized Agriculture Districts Workforce§!: [?modifier@agriculture_district_worker_requirement_modifier|-%0]\n\nWorkers Required per §YCommercialized Agriculture District§!: [?workers_per_agriculture_district_display|2]K\n"
 total_microchips_factories_amount_tt: "This value represents the total number of §YMicrochip Plants§! in our nation."
 total_microchips_factories_amount_tt_delayed: "§YMicrochip Plants§! represent the semiconductor and small electronics production of our nation.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YMicrochip Plant§!: $§Y32 Billion§!\nBase Energy Consumption: §R-0.75§! GW\n\nProductivity impact on §YMicrochip Plants§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YMicrochip Plants Workforce§!: [?modifier@microchip_plant_worker_requirement_modifier|-%0]\n\nWorkers Required per §YMicrochip Plant§!: [?workers_per_microchip_plant_display|2]K\n"
 total_composites_factories_amount_tt: "This value represents the total number of §YComposite Plants§! in our nation."
 total_composites_factories_amount_tt_delayed: "§YComposite Plants§! represent advanced materials production facilities, including ceramic armors, reinforced polymers and high-performance structural materials.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YComposite Plant§!: $§Y28 Billion§!\nBase Energy Consumption: §R-0.8§! GW\n\nProductivity impact on §YComposite Plants§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YComposite Plants Workforce§!: [?modifier@composite_plant_worker_requirement_modifier|-%0]\n\nWorkers Required per §YComposite Plant§!: [?workers_per_composite_plant_display|2]K\n"
 total_refineries_amount_tt: "This value represents the total number of §YSynthetic Refineries§! in our nation."
 total_refineries_amount_tt_delayed: "§YSynthetic Refineries§! represent industrial facilities responsible for producing synthetic rubber and related chemical materials critical for industry and logistics.\n\nProvides the state with:\nBase Number of Required Workers: §Y184K§!\nBase GDP Output per §YSynthetic Refinery§!: $§Y10 Billion§!\nBase Energy Consumption: §R-0.2§! GW\n\nProductivity impact on §YSynthetic Refineries§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YSynthetic Refineries Workforce§!: [?modifier@synthetic_refinery_worker_requirement_modifier|-%0]\n\nWorkers Required per §YSynthetic Refinery§!: [?workers_per_synthetic_refinery_display|2]K\n"
