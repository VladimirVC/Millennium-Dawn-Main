 form_SOU_category: "L'Union des nations sud-américaines"
 form_SOU_category_desc: "L'Union des nations sud-américaines est l'union de toutes les nations sud-américaines en un seul super-État. L'identité économique, politique et culturelle de l'Amérique du Sud est unique en raison de son mélange d'influences espagnoles et portugaises et des autochtones qui se sont intégrés dans ces pays. Elle possède une large gamme de bases industrielles, de secteurs financiers, de ressources brutes et de produits agricoles. Si nous unifions les États-nations d'Amérique du Sud, nous pourrons enfin rivaliser avec l'influence des États-Unis et d'autres grandes puissances dans l'hémisphère occidental et à l'étranger."
