 GUB.Communist-State_desc: "共産主義 - ギニア・カーボベルデ独立アフリカ党（ポルトガル語：Partido Africano para a Independência da Guiné e Cabo Verde）は、当初、ポルトガルからの独立を平和的に訴えるために結成されたが、1960年代に武力闘争へと転じ、ギニアビサウ独立戦争の交戦勢力の一つとなった。戦争終結間際、同党はマルクス・レーニン主義に基づく一党独裁体制を樹立したが、1990年代初頭に民主主義が導入された。"
