 HKG_1997_crisis_league_tt: "该国家精神将持续§Y730§!天。"
 HKG_commonwealth_realm_tt: "§Y英国§!将对获得英联邦王国地位的请愿作出回应。"
 HKG_pearl_river_irredenta_threat: "香港宣称珠江三角洲"
