l_polish:
 TT_CURRENT_LEADER_DIES: "§R[ROOT.GetLeader] umiera!§!"
 md4.1.t: "[FROM.GetName]-[Root.GetName] Free Trade Agreement"
 md4.1.d: "[FROM.GetNameDef] is offering us a free trade agreement. We will have priority to export to and import from them."
 md4.1.a: "Podpiszmy to!"
 md4.1.b: "Odrzućmy."
 md4.2.t: "[FROM.GetNameDef] Has Signed a Free Trade Agreement with Us"
 md4.2.d: "[FROM.GetNameDef] has accepted our offer to sign a free trade agreement. It will enter into force immediately."
 md4.2.a: "To sprawi, że oboje będziemy zamożni!"
 md4.3.t: "[FROM.GetNameDef] Has Refused to Sign a Free Trade Agreement with Us"
 md4.3.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.3.a: "Boją się naszych doskonałych produktów!"
 md4.4.t: "[FROM.GetName]-[Root.GetName] Military Cooperation Treaty"
 md4.4.d: "[FROM.GetNameDef] is offering us a military cooperation treaty. We will sell them equipment at a discounted price but this will make them more likely of buying from us instead of buying from our competitors."
 md4.4.a: "Podpiszmy to!"
 md4.4.b: "Odrzucimy."
 md4.5.t: "[FROM.GetNameDef] Has Signed a Military Cooperation Treaty with Us"
 md4.5.d: "[FROM.GetNameDef] has accepted our offer to sign a military cooperation treaty. It will enter into force immediately."
 md4.5.a: "To uczyni nas oboje silniejszymi!"
 md4.6.t: "[FROM.GetNameDef] Has Refused to Sign a Military Cooperation Treaty with Us"
 md4.6.d: "[FROM.GetNameDef] has refused our offer to sign a military cooperation treaty."
 md4.6.a: "Boją się, że będziemy silniejsi!"
 md4.7.t: "Skandal seksualny prezydenta"
 md4.7.d: "The [FROM.GetName] has come into a sex scandal. The scandal involved [FROM.GetName] sexually assaulting multiple people during countless years as politician. This is being viewed as a great abuse of power and trust among the people. Many people across the country have demanded a response from the [FROM.GetName] on the Allegations."
 md4.7.a: "Dementuję te zarzuty. Są fałszywi na wszystkich frontach. To tylko sposób na oczernienie mnie!"
 md4.7.b: "Akceptuję te oskarżenia. Z przykrością informuję, że są prawdziwe."
 md4.8.t: "Reakcja na strzelaninę w szkole"
 md4.8.d: "A school shooting has occurred [FROM.GetName]. This school shooting has received lots of media attention, and warrants a response from the President."
 md4.8.a: "Obietnica naprawy problemu"
 md4.8.b: "Spróbujmy zignorować problem i przejść dalej."
 md4.9.t: "Myśli o podatku dochodowym"
 md4.9.d: "The president of The [FROM.GetName] has an interview from the press about the income tax, and what he thinks should happen to them"
 md4.9.a: "Uważam, że należy podnieść podatek dochodowy dla najuboższych"
 md4.9.b: "Uważam, że dla najbiedniejszych należy obniżyć podatek dochodowy"
 md4.9.c: "Uważam, że dla bogatych należy podnieść podatek dochodowy"
 md4.9.e: "Uważam, że dla najbogatszych należy obniżyć podatek dochodowy"
 md4.10.t: "Odpowiedź ubogich"
 md4.10.d: "Ubodzy wyrazili pewne niezadowolenie z myśli Prezydenta"
 md4.10.a: "O nie!"
 md4.11.t: "Odpowiedź od bogatych"
 md4.11.d: "Bogaci byli niezadowoleni z myśli Prezydenta"
 md4.11.a: "O nie!"
 md4.12.t: "Odpowiedź bogatych"
 md4.12.d: "Prezydent powiedział, że chciałby podnieść podatki dla bogatych, ale nie spodobało im się to. Poparcie prezydenta zostało przez tę myśl nadszarpnięte."
 md4.12.a: "O nie!"
 md4.13.t: "Odpowiedź ubogich"
 md4.13.d: "Biedni zareagowali na przemyślenia Prezydenta dotyczące podatków nakładanych na bogatych. Wielu biednych uważa, że ​​bogaci nie powinni obniżać podatków, a zamiast tego jeszcze bardziej je podnosić."
 md4.13.a: "O nie!"
 md4.14.t: "[FROM.GetName] żąda ustąpienia"
 md4.14.d: "Rząd [FROM.GetName] zażądał, abyśmy podporządkowali się ich władzy i uznali ich za naszych zwierzchników."
 md4.14.a: "Oczywiście"
 md4.14.b: "Nigdy"
 md4.15.t: "[FROM.GetName] ustępuje"
 md4.15.d: "Rząd [FROM.GetName] zgodził się na nasze żądania i podporządkował się naszej władzy."
 md4.15.a: "Świetnie"
 md4.16.t: "[FROM.GetName] stawia opór"
 md4.16.d: "Rząd [FROM.GetName] odrzucił nasze żądania zwierzchnictwa."
 md4.16.a: "Cholera"
 md4.17.t: "[FROM.GetName] akceptuje sojusz"
 md4.17.d: "Rząd [FROM.GetName] przyjął naszą prośbę o sojusz"
 md4.17.a: "Świetnie"
 md4.18.t: "[FROM.GetName] odrzuca sojusz"
 md4.18.d: "Rząd [FROM.GetName] odrzucił naszą prośbę o sojusz"
 md4.18.a: "Cholera"
 md4.19.t: "[FROM.GetName] oddaje terytorium"
 md4.19.d: "Rząd [FROM.GetName] zgodził się na nasze żądania terytorialne"
 md4.19.a: "Świetnie"
 md4.20.t: "[FROM.GetName] odmawia oddania terytorium"
 md4.20.d: "Rząd [FROM.GetName] odrzucił nasze żądania terytorialne"
 md4.20.a: "Cholera"
 generic.1.t: "[FROM.GetName] Is Influencing Our Politics"
 generic.1.d_neutral_good: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has expressed a great interest in [Root.GetAdjective] politics. Recently this intensified when [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with a number of speeches and reading material distributed to the [Root.GetAdjective] people. \n\nNow even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda, and have started advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.d_bad: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has often tried to meddle in [Root.GetName]'s politics. Recently this has intensified, as [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with no respect for [Root.GetAdjective] political traditions. A number of speeches and other [FROM.GetRulingIdeology] material is already being distributed to the [Root.GetAdjective] people. It seems that even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda and have begun advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.a: "Ciekawy"
 generic.1.b: "Jak śmieli!"
 generic.2.t: "[FROM.GetName] seeks to join the [Root.GetFactionName]"
 generic.2.d.a: "W obliczu rosnącego zagrożenia wolności i wartości demokratycznych naród [alliance_applicant.GetAdjective] widzi w nas obrońców wolnego świata. Teraz pragnie przystąpić do naszego sojuszu, by otrzymać ochronę i stać u naszego boku w walce z siłami zagrażającymi demokracji."
 generic.2.d.b: "Nasza walka o zmianę porządku świata nie umknęła uwadze podobnie myślących państw. Naród [alliance_applicant.GetAdjective] wie, że największe szanse na dostatnią przyszłość da mu sojusz z nami podczas zbliżającego się konfliktu, dlatego formalnie proponuje przyłączenie się do walki z naszymi wrogami."
 generic.2.d.c: "[alliance_applicant.GetName] uznała, że ​​musi zjednoczyć siły z innymi republikami socjalistycznymi, aby wzmocnić miejsce komunizmu w świecie. Akceptując naszą wiodącą rolę w międzynarodowej sytuacji pracownika, [alliance_applicant.GetAdjective] zwraca się teraz z prośbą o formalne zawarcie z nami sojuszu."
 generic.2.d.e: "Gdy przez świat przetaczają się niepokoje w polityce międzynarodowej, lud [alliance_applicant.GetAdjective] widzi w nas swoją szansę na przetrwanie tych trudnych czasów i zwraca się o przyjęcie do naszego sojuszu, byśmy razem mogli przetrzymać nadchodzący huragan."
 generic.2.a: "Może przyłączyć się do nas każdy, kto opowiada się za wolnością i demokracją."
 generic.2.b: "Świat należy do silnych!"
 generic.2.c: "Jeżeli będziemy działać razem, rewolucja zwycięży."
 generic.2.e: "I przetrzymamy!"
 generic.2.f: "Lepiej nam będzie bez nich."
 generic.3.t: "[alliance_inviter.GetName] wita nas w [alliance_inviter.GetFactionName]"
 generic.3.d: "[alliance_inviter.GetName] has decided to accept our request to join the [alliance_inviter.GetFactionName]. Henceforth we shall stand or fall together."
 generic.3.a: "Wspólnie staniemy w obronie demokracji."
 generic.3.b: "Nikt nas nie powstrzyma!"
 generic.3.c: "Walka klasy robotniczej nie mogła mieć lepszych przedstawicieli!"
 generic.3.e: "Na razie zapomnimy o tym, co nas dzieli."
 generic.4.t: "[alliance_inviter.GetName] odrzuca prośbę o dołączenie do [alliance_inviter.GetFactionName]"
 generic.4.d: "[alliance_inviter.GetName] zdecydował się odrzucić naszą prośbę o dołączenie do [alliance_inviter.GetFactionName]. Będziemy musieli sobie poradzić bez ich pomocy."
 generic.4.a: "I oni nazywają się obrońcami wolności?"
 generic.4.b: "W takim razie ich też zmiażdżymy."
 generic.4.c: "Ich rewolucja to fałsz!"
 generic.4.e: "Zbyt wiele nas różni."
 generic.5.t: "[FROM.GetName] invites [Root.GetName] to the [FROM.GetFactionName]"
 generic.5.d.a: "Z podejrzliwością spoglądając na ostatnie wydarzenia w polityce światowej, [alliance_inviter.GetName] wyciąga do nas swoją przyjacielską rękę, oferując nam swoją ochronę i nalegając, abyśmy stanęli wraz z nimi w obronie zasad wolności i demokracji. Jako członek [alliance_inviter.GetFactionName], wolność naszego ludu może być chroniona."
 generic.5.d.b: "Zdawszy sobie sprawę, że nawet silni potrzebują sojuszników, naród [alliance_inviter.GetAdjective] zaprasza nas do frakcji [alliance_inviter.GetFactionName]. Jeżeli się zgodzimy, być może zagwarantujemy sobie dostatnią przyszłość."
 generic.5.d.c: "Nasi ideologiczni sojusznicy w [alliance_inviter.GetName] zauważyli nasz cenny wkład w sprawę robotniczą i dziś rano otrzymaliśmy zaproszenie do przyłączenia się do [alliance_inviter.GetFactionName]. Stojąc razem z innymi republikami socjalistycznymi, moglibyśmy szerzyć rewolucję z nową siłą."
 generic.5.d.e: "Zdaje się, że jest dla nas miejsce w [alliance_inviter.GetAdjective] planach. Dziś rano [alliance_inviter.GetAdjective] ambasador przekazał nam zaproszenie do frakcji [alliance_inviter.GetFactionName]. Zdaniem naszego potencjalnego sojusznika więcej zyskamy, pracując razem, niż pozwalając, by dzieliły nas różnice ideologiczne."
 generic.5.a: "Będziemy walczyć u ich boku."
 generic.5.b: "Potrzebujemy tylko kilku tysięcy poległych..."
 generic.5.c: "Staniemy do walki u boku naszych towarzyszy!"
 generic.5.e: "To korzystny wybór."
 generic.6.t: "[alliance_applicant.GetName] przyjmuje zaproszenie do [alliance_inviter.GetFactionName]"
 generic.6.d: "[alliance_applicant.GetName] zdecydował się przyjąć naszą ofertę dołączenia do [alliance_inviter.GetFactionName]. Odtąd będziemy stać lub upaść razem."
 generic.7.t: "[alliance_applicant.GetName] odrzuca ofertę przyłączenia się do [alliance_inviter.GetFactionName]"
 generic.7.d: "[alliance_applicant.GetName] zdecydował się odrzucić naszą ofertę dołączenia do [alliance_inviter.GetFactionName]. Będziemy musieli sobie poradzić bez ich pomocy."
 generic.7.a: "Nie chcą naszej pomocy."
 ace_promoted.1.t: "Awans asa"
 ace_promoted.2.t: "Nowy as w talii"
 ace_promoted.1.d: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive from the recent mission over [FROM.GetMissionRegion], but living through significant victories in many critical encounters.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.d_major: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive, but piloting [FROM.GetHerHis] [FROM.GetWing] with immense skill. Recently, [FROM.GetName] was on a mission over [FROM.GetMissionRegion] and was instrumental to the success of this critical encounter.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.a: "Do odważnych świat należy."
 ace_died.1.t: "Fighter Ace Callsign '[FROM.GetCallsign]' Killed Over [FROM.GetMissionRegion]"
 ace_died.1.d: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has been shot down in the line of duty during a mission over [FROM.GetMissionRegion]. Unfortunately, since [FROM.GetSheHe] has long been a public figure, their demise is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, [FROM.GetHerHis] death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.d_major: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has gone down in the line of duty. Pilots returning from the region report having spotted [FROM.GetHerHis] [FROM.GetWingShort] going down in flames over [FROM.GetMissionRegion] after taking heavy enemy fire. Unfortunately, since [FROM.GetSheHe] has long been a public figure, the demise of '[FROM.GetCallsign]' is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.a: "Wolelibyśmy jednak żywą legendę."
 ace_killed_by_ace.1.t: "Fighter Ace [FROM.GetFullName] Shot Down By Enemy Pilot"
 ace_killed_by_ace.1.d: "Pilots returning from [FROM.GetMissionRegion] report that a squadron of [Prev.Owner.GetAdjective] aircraft, led by the infamous pilot '[Prev.GetCallsign]', focused on chasing down [FROM.GetFullName]. After dodging several bursts from the enemy and taking down a number of hostile aircraft, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]', who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s plane caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to our nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.d_major: "Pilots returning from [FROM.GetMissionRegion] report that, a squadron of [Prev.Owner.GetAdjective] aircraft led by the infamous pilot '[Prev.GetCallsign]' focused on chasing down [FROM.GetFullName]. After taking down a number of enemy aircraft and dodging several bursts from the enemy, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]' in his [Prev.GetWingShort], who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s [FROM.GetWingShort] caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to the nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.a: "To prawdziwa katastrofa."
 ace_killed_other_ace.1.t: "Fighter Ace [FROM.GetFullName] Shoots Down Callsign '[Prev.GetCallsign]'"
 ace_killed_other_ace.1.d: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, outwitting the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]'. '[FROM.GetCallsign]' used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]'' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]'' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.d_major: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, managing to outwit the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]''. [FROM.GetCallsign] used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.a: "A victory all of [FROM.Owner.GetNameDef] will remember!"
 aces_killed_each_other.1.t: "Fighter ace [FROM.GetFullName] has gone down"
 aces_killed_each_other.1.d: "During the latest mission our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s and [Prev.GetCallsign]'s aircraft were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.d_major: "During the most recent aerial sortie our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered [FROM.GetHerHis] [FROM.GetWingShort] through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s [FROM.GetWingShort] and [Prev.GetCallsign]'s [Prev.GetWingShort] were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.a: "To wielka tragedia."
 election.1.t: "WYBORY"
 election.1.d: ""
 election.1.a: ""
 election.2.t: "Wybory: naród sprzeciwia się zwiększeniu armii"
 election.2.d: "W nadchodzących wyborach poparcie dla [Root.GetRulingParty] nadal jest wysokie, ludzie mają zaufanie do przywództwa [Root.GetLeader]. Jednakże dążenie partii do zwiększenia skupienia [Root.GetName] na sprawach militarnych nie cieszy się całkowitym poparciem społecznym, znaczna część obywateli uważa to za nieprzemyślane szowinizm. Wojna jeszcze nie dotarła do naszej granicy i niewielu chciałoby widzieć [Root.GetName] podejmujące agresywne działania. Współpracując z innymi głównymi partiami, które podzielają nasze obawy o bezpieczeństwo państwa, nadal będziemy mogli rządzić po wyborach, choć z mniejszym poparciem."
 election.2.a: "Lud przemówił."
 election.2.b: "Najważniejsza jest obrona naszej suwerenności."
 election.3.t: "Wybory: naród domaga się zwiększenia armii"
 election.3.d: "Widmo nadchodzącej wojny będzie miało duży wpływ na wynik najbliższych wyborów, gdyż obywatele obawiają się, że nasza armia nie jest na nią gotowa i [Root.GetName] nie da sobie rady. Ludzie żądają, byśmy podjęli działania mające zabezpieczyć kraj i wzmocnić jego siły zbrojne. [Root.GetRulingParty] nadal cieszy się największym poparciem, ale możemy je stracić, jeżeli zaniepokojony elektorat postanowi wybrać którąś z bardziej radykalnych opcji."
 election.3.a: "Ludzie muszą czuć się bezpieczni."
 election.3.b: "Wielu nadal pragnie dyplomatycznego rozwiązania."
 election.4.t: "Wybory: faszyści w rządzie?"
 election.4.d: "W kraju rośnie poparcie dla skrajnych nacjonalistów. Rezultatem jest powstanie kilku faszystowskich partii propagujących budowę państwa, które nie zawaha się użyć siły, żeby narzucić innym państwom swoją wolę. Jedna z tych partii odniosła zaskakujący sukces w wyborach, co skłoniło wielu naszych działaczy do poruszenia kwestii potencjalnej koalicji rządowej. Faszyści otwarcie gardzą ideami, które leżą u podstaw naszego ustroju, ale dostali się do parlamentu dzięki demokratycznym procesom, co przemawia na naszą korzyść. Jeżeli zrozumieją, że są odpowiedzialni przed swoim elektoratem, może zrezygnują z agresywnych działań, a [Root.GetRulingParty] i [Root.GetName] tylko na tym zyskają."
 election.4.a: "Lepsi faszyści niż komuniści!"
 election.4.b: "Wolimy zawrzeć koalicję z kilkoma partiami demokratycznymi."
 election.5.t: "Wybory: komuniści w rządzie?"
 election.5.d: "Ruch komunistyczny, będący efektem niezadowolenia klasy robotniczej i radykalnych poglądów myślicieli, zdobył wielu sympatyków, którzy założyli kilka partii. Jedna z nich odniosła duży sukces w wyborach, co skłoniło naszych działaczy do poruszenia kwestii potencjalnej koalicji rządowej. Dla komunistów demokratyczne wartości, jakie uznaje [Root.GetRulingParty], to narzędzia burżuazyjnego ucisku, choć są oni nastawieni na wprowadzenie swoich ideałów w życie poprzez współpracę z rządem, a nie rewolucję."
 election.5.a: "Lepsza reforma niż rewolucja!"
 election.5.b: "Wolimy zawrzeć koalicję z kilkoma partiami demokratycznymi."
 election.6.t: "Wybory: demokraci w mniejszości"
 election.6.d: "[Root.GetName] obserwuje radykalizację poglądów politycznych. Wyborcy, którzy dotąd wspierali partie promujące idee demokratyczne, zaczęli głosować na mniej umiarkowane opcje. Ugrupowania z politycznego centrum nie stanowią już większości, nawet gdyby zawiązały koalicję. Jeżeli chcemy uniknąć słabego, mniejszościowego rządu, musimy dogadać się z faszystami lub komunistami."
 election.6.a: "[Root.GetName] potrzebuje silnego rządu. Dogadajmy się z faszystami."
 election.6.b: "Połączmy siły z komunistami, żeby przyspieszyć zmiany społeczne."
 election.6.c: "Wolimy rząd mniejszościowy."
 election.7.t: "Faszyści wpływają na politykę zagraniczną"
 election.7.d: "Koalicja z faszystami okazała się mieć duży wpływ na naszą politykę zagraniczną. Mimo swego żarliwego nacjonalizmu mają oni wielu sympatyków w innych krajach, którzy gorąco im kibicują. Totalitarne rządy o podobnych poglądach widzą w nas potencjalnych sojuszników. [Root.GetRulingParty] może czuć odrazę na myśl o nawiązaniu bliższej współpracy z takimi reżimami, ale całkiem prawdopodobne, że bez tego utracimy poparcie faszystów, którego [Root.GetName] być może potrzebuje."
 election.7.a: "Sojuszników nigdy za wielu."
 election.7.b: "Z takimi przyjaciółmi nie potrzeba nam wrogów."
 election.8.t: "Komuniści wpływają na politykę zagraniczną"
 election.8.d: "Komuniści często uważają się za forpocztę międzynarodowej rewolucji, w związku z czym ich obecność w naszym rządzie przyciągnęła uwagę państw o podobnych tendencjach. Nasi koalicjanci utrzymują bliskie stosunki z wieloma krajami, które odrzuciły ustroje demokratyczne na rzecz dyktatur proletariatu. Jeżeli nie uwzględnimy tego w [Root.GetAdjective] polityce zagranicznej, możemy stracić poparcie komunistów."
 election.8.a: "Mamy wspólne interesy, więc powinniśmy nawiązać współpracę."
 election.8.b: "To droga, na której [Root.GetName] ulegnie samozagładzie."
 election.11.t: "Wybory: faszystowska większość"
 election.11.d: "Wynik ostatnich wyborów to druzgocąca klęska demokracji. Większość głosujących poparła partię faszystowską, która pragnie obalić istniejący [Root.GetAdjective] ustrój i wprowadzić rządy autokratyczne. Wielu obywateli uważa, że należy chwycić za broń i stanąć w obronie demokratycznych wartości, ale zdaniem innych taka reakcja to woda na młyn faszystowskiej propagandy."
 election.11.a: "[Root.GetName] przeżywa swój czarny dzień, ale naród przemówił."
 election.11.b: "Nie oddamy wolności bez walki!"
 election.12.t: "Wybory: komunistyczna większość"
 election.12.d: "Wyborcze zwycięstwo komunistów wywołało mieszane uczucia wśród członków ustępującego rządu. Nowe władze twierdzą co prawda, że reprezentują cały naród, ale ich zdaniem wiele demokratycznych instytucji to narzędzia służące do uciskania klasy robotniczej, w związku z czym należałoby ponownie przemyśleć koncepcję władzy ludu. W niektórych krajach rewolucje sprawiły, że miasta spłynęły krwią. [Root.GetName] nie znajduje się jeszcze w takim niebezpieczeństwie, ale nikt nie wie, co przyniesie przyszłość."
 election.12.a: "Taki rozwój spraw jest wielce niepokojący, ale ci ludzie reprezentują większość."
 election.12.b: "Musimy ich powstrzymać, zanim zadepczą opozycję!"
 election.13.t: "Wybory: magnat wspiera faszystów"
 election.13.d: "Wpływowy przemysłowiec, stojący na czele jednej z wielkich firm realizujących zamówienia rządowe, wygłosił ostatnio kilka komentarzy politycznych, które zaniepokoiły naszych działaczy. Otwarcie poparł on rządy autokratyczne i wychwalał państwa rządzone przez faszystów, sugerując, że [Root.GetName] zyska na zmianie administracji. Potępienie tego magnata na pewno popsuje nasze relacje z firmą, ale jeżeli nic nie zrobimy i pozwolimy mu wygłaszać podobne poglądy, możemy stracić poparcie wyborców i narazić wiarygodność ideałów, jakich broni [Root.GetRulingParty]."
 election.13.a: "Może sobie gadać, co tylko chce. To wolny kraj."
 election.13.b: "Nie możemy liczyć, że [Root.GetName] będzie się rozwijać pod rządami faszystów."
 election.14.t: "Wybory: wyjątek na czas wojny"
 election.14.d: "[Root.GetName] jest w stanie wojny. W normalnych warunkach rząd rozpisałby wybory, ale zdaniem wielu napięta sytuacja uniemożliwia przeprowadzenie kampanii politycznej, a zmiana władz byłaby niewskazana. Z kolei inni uważają, że zasłanianie się wojną, żeby odwołać wybory, to pierwszy krok ku obaleniu demokracji. Nie możemy przecież pozwolić, żeby sprawy wojskowe zagłuszyły głos narodu, bo może to być początek bardzo niebezpiecznej drogi."
 election.14.a: "Wybory odbędą się zgodnie z planem."
 election.14.b: "Wybory odbędą się, jak tylko zakończymy działania wojenne."
 election.15.t: "Wybory: zmiana władzy"
 election.15.d: "Wybory odbędą się lada dzień, a coraz więcej obywateli zaczyna uważać, że obecne władze nie radzą sobie z prowadzeniem wojny. [Root.GetName] wie, co znaczy wiele wycierpieć, i naród dał czerwoną kartkę tym, którzy mogą doprowadzić nas do klęski. Obywatele bynajmniej nie zamierzają się poddawać, ale wolą, żeby inny rząd posprzątał ten bałagan."
 election.15.a: "To nie najlepszy moment na kryzys zaufania."
 election.15.b: "Niech scena polityczna ulegnie zmianie, by ludzie pozostali zjednoczeni."
 election.16.t: "[Root.GetLeader] cieszy się poparciem społecznym."
 election.16.d: "Podczas obecnych wyborów opozycja, na miarę swych możliwości, krytykowała coraz bardziej autorytarny styl rządów, który prezentuje [Root.GetRulingParty]. Uważają, że elektorat nie ma już praktycznie żadnej władzy, a demokracja jest wyłącznie fasadowa.\n\nJednak [Root.GetLeader] cieszy się wysokim poparciem, a wybory, kwestionowane przez społeczność międzynarodową, nie zostały oprotestowane w kraju. Wygląda na to, że ludzie popierają swojego władcę, nawet jeśli sami nie mają już wpływu na kierunek, w którym zmierza [Root.GetName]... przynajmniej ci, którzy dotarli do urn."
 election.16.a: "Jeden naród, jeden przywódca."
 election.17.t: "Wyniki wyborów zakwestionowane"
 election.17.d: "Reżim, na czele którego stoi [Root.GetLeader], zmusił do milczenia większość swoich przeciwników, ale niektórzy mimo wszystko skomentowali niedawne wybory i twierdzą, że [Root.GetRulingParty] odpowiada za manipulację wynikami i ignoruje działania mające na celu wybór parlamentu przeciwnego ich polityce.\n\nRząd odrzuca wszelkie oskarżenia, twierdząc, iż jest to próba rozjątrzenia sporów wśród opinii publicznej. Faktem jest jednak, że większość ludzi ma pewne obawy co do tych rządów, a chwilowo uciszona opozycja wyraziła dobitnie swoje wątpliwości."
 election.17.a: "Rozłamowcy!"
 political.1.t: "Komunizm rośnie w siłę"
 political.1.d: "\"Na całym świecie klasa robotnicza zrzuca jarzmo burżuazji, a tymczasem u nas ci, którzy rzekomo są świadomi walki klas, siedzą z założonymi rękami, czekając, aż ten wypaczony system polityczny sam się zreformuje. [Root.GetName] znajdzie ocalenie tylko w rewolucji!\".\n\nTakie głosy można usłyszeć w [Root.GetAdjective] ruchu komunistycznym. Jego członkowie, według których [Root.GetRulingParty] reprezentuje dyktaturę bogaczy, nawołują do obalenia rządu wszelkimi dostępnymi metodami. Pytanie tylko, czy spróbują to zrobić od środka, czy raczej od zewnątrz."
 political.1.a: "Niektórzy członkowie rządu mogą popierać takie postulaty."
 political.1.a.tt: "Zwiększenie ryzyka politycznego poparcia dla komunistycznego przewrotu."
 political.1.b: "Ruch ludowy na pewno szuka poparcia wśród ludu."
 political.1.b.tt: "Zwiększenie ryzyka ludowego poparcia dla komunistycznego powstania."
 political.2.t: "Marksiści w rządzie"
 political.2.d: "[Root.GetRulingParty] stanowczo sprzeciwia się rewolucyjnemu socjalizmowi i bacznie obserwuje działania skrajnej lewicy, ale nie wszyscy politycy są tak kategoryczni w swoich osądach. Niektórzy wierzą, iż należy nawiązać dialog z obywatelami, którzy w komunizmie widzą lek na swoje problemy. Taki kompromis mógłby zapobiec wojnie domowej.\n\nDla wielu parlamentarzystów, którym przewodzi [Root.GetLeader], ludzie ci są zdrajcami, ale jeżeli dojdzie do rewolucji, to oni mogą dopilnować, by była ona bezkrwawa."
 political.2.a: "Jest wiele powodów, by mieć ich na oku."
 political.2.a.tt: "Jeżeli społeczeństwo będzie chciało przewrotu, to można go zorganizować."
 political.3.t: "Komunistyczny przewrót"
 political.3.d: "Liczba obywateli popierających ideę komunistycznej rewolucji wzrosła do zatrważającego poziomu, ale duża część skrajnej lewicy zachowała się w pasywnie, czekając na dalszy rozwój wypadków. To oczekiwanie dobiegło końca. Dziś, tuż przed zebraniem oficjeli rządowych i generałów, którzy mieli ustalić strategię na wypadek wybuchu powstania, przeprowadzono akcję, w wyniku której [Root.GetLeader] znajduje się teraz w rękach działaczy partyjnych i przebywa w areszcie domowym. Ludzie ci natychmiast rozpoczęli negocjacje z buntownikami.\n\nRozmowy te, prowadzone pod pretekstem utrzymania ładu, tak naprawdę dotyczyły podziału stanowisk w nowym rządzie. Przewrót dokonał się, nim ktokolwiek zdążył interweniować. A ci, którzy mieli takie zamiary, zostali aresztowani, wygnani z kraju lub straceni. [Root.GetRulingParty] jest już wspomnieniem."
 political.3.a: "Wiatr historii zdmuchnie brudy przeszłości."
 political.4.t: "[Root.GetName] - konflikty klasowe dzielą kraj"
 political.4.d: "Komunizm rewolucyjny, do niedawna będący domeną wyłącznie pospolitych zadymiarzy, którzy sami siebie uważają za radykalnych myślicieli, zaczyna zdobywać poparcie [Root.GetAdjective] klasy robotniczej. Już sam fakt, że coraz więcej ludzi utożsamia się z jakąś klasą, jest dowodem na wzrost popularności idei marksistowskich.\n\n[Root.GetRulingParty] lamentuje nad takim stanem rzeczy, z rozrzewnieniem wspominając czasy, gdy najważniejszym elementem tożsamości obywatela była jego narodowość. Ich obawy nie są bezzasadne. Wielu specjalistów uważa, że rewolucja społeczna już się rozpoczęła i zachodzące na różnych poziomach społecznych zmiany mogą być teraz niemożliwe do zatrzymania."
 political.4.a: "Ludzie mogą się utożsamiać, z czym chcą."
 political.5.t: "Żołnierze przechodzą do komunistycznej partyzantki"
 political.5.d: "\"Kapitaliści i nacjonaliści chcą, żebyście przelewali za nich krew na froncie, zabijając swoich braci w imię spraw, które dla ludu pracującego nic nie znaczą! Nie podnoście rąk na robotników walczących o lepsze jutro. Zwróćcie broń przeciwko tyranom i zakończcie ich rządy ucisku!\".\n\nArmia, uważana za bastion patriotyzmu i lojalności, okazała się podatna na komunistyczną propagandę. Część żołnierzy dezerteruje albo odmawia walki za kraj, a niektórzy dołączają do partyzantów, którzy ponoć szykują się do wybuchu rewolucji. [Root.GetName] stoi w obliczu przełomowych wydarzeń."
 political.5.a: "Może ich zdaniem [Root.GetName] to kraj, któremu pisana jest inna przyszłość."
 political.6.t: "[GetMonth] przynosi rewolucję"
 political.6.d: "[Root.GetName] - obywatele kraju najwyraźniej nie mają wątpliwości, że komuniści reprezentują lud pracujący, gdyż poparcie dla skrajnej lewicy znacząco wzrosło na przestrzeni ostatnich miesięcy. Jeszcze nie tak dawno temu do rewolucji nawoływała tylko garstka partyzantów i rozgoryczonych związkowców, a dziś ruch ten ma na tyle duże poparcie, że może zagrozić rządowi.\n\nNależy jednak zauważyć, że jeżeli dojdzie do wybuchu rewolucji, [Root.GetName] prawie na pewno pogrąży się w wojnie domowej. Czy lewica powinna pójść za ciosem i zaryzykować otwarty konflikt, czy lepiej poczekać na dogodniejszy moment?"
 political.6.a: "Ludzie, którzy chcą tworzyć historię, muszą działać!"
 political.6.b: "Możemy zaczekać. Rewolucja jest nieunikniona."
 political.7.t: "Faszyzm rośnie w siłę"
 political.7.d: "\"Nasz naród zbyt długo pozostawał pod nieudolnymi rządami! [Root.GetRulingParty] próbuje nam wmówić, że nas reprezentuje, ale nie potrafi nawet utrzymać spokoju na ulicach! Ten kraj zacznie się rozwijać tylko, jeśli odsuniemy ich od władzy!\".\n\n[Root.GetName] jest teraz areną sporów na temat ustroju politycznego i aktualnej władzy. Faszyści nie kryją się ze swoimi poglądami, a ich przemowy trafiają do niezadowolonych obywateli, których nie brakuje zwłaszcza w konserwatywnej części sił zbrojnych."
 political.7.a: "Niektórzy generałowie mogą mieć nacjonalistyczne skłonności."
 political.7.a.tt: "Zwiększenie ryzyka politycznego poparcia dla faszystowskiego przewrotu."
 political.7.b: "Młodsze pokolenie zmieni kraj."
 political.7.b.tt: "Zwiększenie ryzyka ludowego poparcia dla faszystowskiego przewrotu."
 political.8.t: "Faszystowskie sympatie w wojsku"
 political.8.d: "Wielu wysoko postawionych oficerów [Root.GetAdjective] sił zbrojnych wyraziło po cichu poparcie dla ruchu faszystowskiego, a są też tacy, którzy zupełnie się z tym nie kryją. Ich zdaniem [Root.GetRulingParty] nie rozumie, że siły zbrojne to kluczowy czynnik spajający naród. Ci sfrustrowani oficerowie uważają, że władza traktuje wojsko jak narzędzie do osiągnięcia swoich celów, podczas gdy tak naprawdę jest ono jedną z najważniejszych instytucji państwowych. Niektórzy z nich nawołują wręcz do zmiany rządu na taki, który sprawi, że [Root.GetName] sprawnie wkroczy w drugą połowę wieku.\n\nLudzie ci nie są politykami, ale pracują między innymi w ministerstwie obrony. Jeżeli nic się nie zmieni, wkrótce mogą oni uzyskać wpływy umożliwiające zorganizowanie przewrotu."
 political.8.a: "The national spirit outranks the government."
 political.9.t: "Faszystowski przewrót"
 political.9.d: "Nie dla wszystkich jest to zaskoczenie, ale dziś zarówno ci, którzy ostrzegali przed faszyzmem, jak i jego orędownicy, doczekali się spełnienia swoich przepowiedni. Parę godzin temu wojskowi wtargnęli do stolicy i obalili rząd, przejmując pełnię władzy w kraju. [Root.GetRulingParty] kończy swoje rządy, [Root.GetName] wkracza w nową epokę. Nie wiadomo, gdzie przebywa [Root.GetLeader]; plotka głosi, że jest gdzieś za granicą. Przewrót dokonał się właściwie bez oporu.\n\nNowe władze nie zamierzają pozwolić, żeby ktoś im się przeciwstawiał. W kraju ogłoszono stan wojenny, a biorąc pod uwagę kierunek zmian, nowa rzeczywistość polityczna raczej nie będzie się od niego przesadnie różnić."
 political.9.a: "Silne państwo musi chronić obywateli przed nimi samymi."
 political.10.t: "Wojna o faszyzm"
 political.10.d: "Faszyści zdołali co prawda wskrzesić nacjonalistyczne sentymenty, ale ich działania wciąż spotykają się z oporem znacznej części społeczeństwa. Planujący obalenie rządu generałowie są zawiedzeni postawą obywateli, którzy ich zdaniem chyba nie mają wiary w siłę, jaką stanowi [Root.GetFascistParty].\n\nWojskowi są przekonani, że [Root.GetLeader] nie będzie wiecznie mamić ludzi swoimi kłamstwami, ale nie są zdecydowani, co powinni teraz zrobić. Zdaniem niektórych należy niezwłocznie dokonać przewrotu, zanim wrogowie zaczną działać i [Root.GetName] znajdzie się w trudnej sytuacji. Brak poparcia oznaczałby jednak wojnę domową."
 political.10.a: "Władzę zdobywają tylko ci, którzy się nie wahają."
 political.10.b: "Zanim zaczniemy rządzić krajem, musimy go zjednoczyć."
 political.11.t: "Faszystowskie dywizje szturmowe"
 political.11.d: "Faszyzm od początku łączył politykę z wojskowością. Partie nacjonalistyczne, cieszące się coraz większym poparciem, zaczęły tworzyć organizacje paramilitarne mające zwalczać zagrożenia wewnętrzne (w postaci oponentów politycznych) i zewnętrzne. Wielu ludzi zaniepokoił taki obrót spraw, ale fala wojskowego entuzjazmu, którą obserwuje [Root.GetName], zaowocowała zwiększeniem liczby ochotników wstępujących do naszych sił zbrojnych.\n\nFaszystowscy przywódcy oświadczyli, że ich wrogowie mają się czego bać. W armii, której żołnierze są coraz bardziej radykalni, łatwo pomylić wrogów narodu z wrogami faszyzmu."
 political.11.a: "Tylko zdrajcy ojczyzny mają się czego bać."
 political.12.t: "Komunistyczne zagrożenie"
 political.12.d: "\"[Root.GetLeader] wmawia nam, że [Root.GetName] to kraj zjednoczony i bezpieczny. Nic dziwnego, że lud dał się omamić, skoro to nie nas kąsa czerwona żmija! Tuż za granicą brat morduje brata w imię komunizmu, głośno krzycząc, że nastał kres ery narodów. Mamy czekać, aż wręczą nam nasz nekrolog? Czy [Root.GetRulingParty] ochroni nas przed tym zagrożeniem?\".\n\nWybuch komunistycznej rewolucji w sąsiednim kraju doprowadził do wzrostu popularności partii faszystowskich u nas. Wiele osób o umiarkowanych poglądach, które wcześniej odrzucały skrajnie nacjonalistyczne idee, czuje się zagrożonych chaosem, jaki panuje tuż za granicą. Mając do wyboru komunizm naszych sąsiadów i rodzimy faszystowski reżim, większość ludzi preferuje tę drugą opcję. Niektórzy z nich są nawet skłonni aktywnie ją popierać."
 political.12.a: "Będziemy forpocztą walki z czerwoną zarazą!"
 political.13.t: "Demokratyzacja kraju"
 political.13.d: "\"Skoro uciszamy ludzi, jak możemy twierdzić, że jesteśmy głosem narodu? Skoro boimy się niezadowolenia, publicznej krytyki i przegranej w wyborach, to tak naprawdę źródłem naszego strachu jest przeświadczenie, że obywatele nas nienawidzą. Czy [Root.GetRulingParty] naprawdę nie wierzy we własne zasady?\".\n\nW rządzie pojawiła się niewielka i niesformalizowana, ale zarazem bardzo aktywna frakcja nawołująca do złagodzenia represji wobec wrogów państwa. Jej przedstawiciele chcą, by naród mógł mieć głos w ważnych kwestiach poprzez referenda i spotkania z przedstawicielami partii, nawet za cenę zmiany politycznego kursu, jaki obiera [Root.GetName]."
 political.13.a: "Na początku możemy to omówić we własnym gronie."
 political.13.a.tt: "Zwiększenie ryzyka politycznego poparcia dla wyborów."
 political.13.b: "Wiemy, że mamy rację, więc możemy sobie pozwolić na udzielenie głosu wrogom."
 political.13.b.tt: "Zwiększenie ryzyka narodowego poparcia dla demokracji i stworzenia opozycji."
 political.14.t: "[Root.GetRulingParty] dyskutuje o demokracji"
 political.14.d: "Wniosek o zwiększenie liczby referendów i złagodzenie kar wobec wrogów ustroju spotkał się z zaskakującym zrozumieniem na wewnętrznych zebraniach partii. [Root.GetRulingParty], ogólnie rzecz biorąc, podchodzi do tych pomysłów sceptycznie, ale kilku ważnych członków partii udzieliło swojego poparcia.\n\nMoże wiedzą oni, że tak naprawdę niewiele to zmieni, a może ich przeciwnicy słusznie oskarżają ich o zdradę stanu. Tak czy inaczej, jeśli naród zapragnie złagodzenia polityki, rząd jest gotów iść na kompromis."
 political.14.a: "Nie zawsze musimy wybierać między wolnością a śmiercią."
 political.14.a.tt: "Rząd wprowadzi zmiany, gdy ten wniosek będzie miał poparcie większości."
 political.15.t: "Powstaje demokratyczna opozycja"
 political.15.d: "Złagodzenie polityki dotyczącej prawa naszych przeciwników do swobodnego wygłaszania opinii zwiększyło liczbę publicznych wystąpień, na których jesteśmy krytykowani; [Root.GetRulingParty] nie widzi w tym nic zaskakującego. Demonstracje i ulotki pozostają póki co domeną środowisk akademickich i uboższych części kraju, ale ruch niezadowolonych rośnie w siłę.\n\nWładze nie są jednomyślne w kwestii tego, jak należy zareagować. [Root.GetLeader] nie życzy sobie wygłaszanych otwarcie głosów sprzeciwu. Wkrótce jednak [Root.GetName] może rozbrzmieć takimi głosami i nie wiadomo, czy zdołamy je uciszyć."
 political.15.a: "Ludzie mówią to, co myślą, kiedy nikt ich za to nie karze."
 political.16.t: "Naród domaga się wyborów"
 political.16.d: "Demonstracje niezadowolonych obywateli, które nie tak dawno temu były zjawiskiem marginalnym, ogarnęły cały kraj. Ludzie gromadzą się na ulicach, a [Root.GetRulingParty] staje przed trudnym wyborem. Jeżeli nic nie zrobimy, referenda postulowane przez opozycję oraz przez część członków naszej partii mogą wykazać, że naród wcale nas nie popiera. Jedność, do której dążyliśmy, ustępuje miejsca pluralizmowi politycznemu zjednoczonemu przeciwko nam."
 political.16.a: "Nawet jeżeli czekają nas reformy, musimy pokazać siłę i walczyć z tym niezadowoleniem."
 political.16.b: "Lud przemówił."
 political.17.t: "[Root.GetName] - wybory"
 political.17.d: "Stopniowe wdrażanie wolności słowa i zgromadzeń sprawiło, że ci członkowie rządzącej partii, którzy wcześniej spiskowali po kryjomu, dziś otwarcie mówią o reformach i domagają się wyborów. [Root.GetLeader] protestuje, ale [Root.GetName] od miesięcy stopniowo zmierza ku demokratyzacji, w związku z czym realizacja głośno wybrzmiewających postulatów wydaje się kwestią czasu.\n\nMimo tego naród nie jest jednomyślny w kwestii demokratycznych reform. [Root.GetRulingParty] wciąż rozważa odroczenie wyborów do czasu, gdy sytuacja w kraju będzie stabilniejsza."
 political.17.a: "[Root.GetRulingParty] już teraz może liczyć na poparcie i podjąć tę decyzję."
 political.17.b: "Nie wprowadzimy tych reform, póki nie będą miały większego poparcia."
 political.18.t: "Faszyści żądają referendum"
 political.18.d: "Faszyści, którzy ostatnimi czasy stają się coraz popularniejsi, zawsze uważali, że zjednoczą cały kraj po przejęciu władzy, więc nie muszą mieć poparcia większości, by obalić rząd. Z czasem jednak zaczęli to poparcie zdobywać, co skłoniło ich do krytyki obecnych władz. Według faszystów [Root.GetLeader] tylko rzekomo przemawia w imieniu ludu, a tak naprawdę ignoruje głosy obywateli pragnących poprowadzić kraj ku wielkości.\n\nWniosek o referendum został odrzucony jako próba zakłócenia funkcjonowania państwa, ale tym razem jeszcze była to metoda polityczna. Przy następnej okazji faszyści mogą użyć siły. [Root.GetRulingParty] staje w obliczu utraty władzy."
 political.18.a: "Musimy zdusić ten nienawistny ruch!"
 political.18.b: "Powinniśmy ich zignorować."
 political.18.c: "Jeżeli ludzie chcą referendum, to je dostaną."
 political.19.t: "Komuniści żądają referendum"
 political.19.d: "[Root.GetName] nie od dziś ma kontakt z marksistowskimi ideami, ale popularne stały się one stosunkowo niedawno. Skrajna lewica przeszła od teorii do praktyki, zdobywając poparcie rozżalonych robotników i kilku sławnych osobistości. Komuniści nazywają to zjawisko świadomością klasową, [Root.GetRulingParty] - niezawodnym sposobem na destabilizację kraju.\n\nLewica wie, że [Root.GetLeader] nie będzie reformować kraju pod jej dyktando, więc działacze ruchu komunistycznego zaczęli domagać się referendum w sprawie odwołania rządu. Możemy jeszcze temu przeciwdziałać, ale trzeba to zrobić szybko, bo jeżeli nie kiwniemy palcem, komuniści mogą zastosować swoją ulubioną metodę zmiany władz: rewolucję."
 political.19.a: "Musimy zwalczać ruchy godzące w dobro [Root.GetAdjective] obywateli!"
 political.19.b: "Zignorujmy ich, to zwykli zadymiarze."
 political.19.c: "Lepsze referendum niż krwawa rewolucja."
 political.20.t: "Demokraci żądają referendum"
 political.20.d: "Od czasu do czasu ludzie przywołują koncepcję, według której to oni powinni rządzić swoim krajem. Oczywiście [Root.GetLeader] i [Root.GetRulingParty] postrzegają demokratyczne wynalazki pokroju wolności słowa, wyborów i wolnej prasy jako wymysły populistycznej retoryki mające osłabić rząd.\n\nTrzeba jednak przyznać, że idee te cieszą się poparciem znacznej części społeczeństwa. Obywatele zażądali przeprowadzenia prawdziwie demokratycznego referendum w sprawie odwołania władz. Możemy machnąć na to ręką, ale należy pamiętać, że takie pomysły nie umierają łatwo. Co nas czeka, jeżeli zablokujemy ludziom możliwość przeprowadzenia bezkrwawej rewolucji?"
 political.20.a: "Wyłapać ich wszystkich."
 political.20.b: "Zignorujmy tę sprawę."
 political.20.c: "Jeżeli zgodzimy się na referendum, może wyjdziemy z niego obronną ręką."
 political.21.t: "[Root.Capital.GetName] w obliczu nacierającego faszyzmu"
 political.21.d: "Gdy odrzucono propozycję przeprowadzenia referendum, które było symboliczną niemal próbą legalnego sięgnięcia po władzę, faszyści wykorzystali poparcie społeczeństwa oraz wpływy w wojsku i zorganizowali próbę przewrotu. Rząd, na czele którego stoi [Root.GetRulingParty], odrzucił ich żądania, przysięgając walkę w obronie naszego ustroju. [Root.GetName] jest areną kluczowej dla przyszłości kraju walki ideologicznej."
 political.21.a: "Powstrzymamy ich za wszelką cenę!"
 political.21.b: "[Root.GetName] odrodzi się dzięki faszyzmowi!"
 political.22.t: "Komuniści chwytają za broń"
 political.22.d: "Gdy odrzucono propozycję przeprowadzenia referendum, nieliczni komunistyczni reformatorzy szybko stracili poparcie ludu na rzecz bardziej radykalnych działaczy. Władze, [Root.GetRulingParty], nie przyjęły do wiadomości, że naród naciska na zmiany, co rozbudziło romantyczne nastroje rewolucyjne i postawiło przywódców lewicy na czele potencjalnego powstania. To powstanie właśnie wybuchło i [Root.GetName] pogrąża się w wojnie domowej."
 political.22.a: "Nie pozwolimy im zniszczyć kraju!"
 political.22.b: "Ogień rewolucji można ugasić tylko krwią naszych oprawców!"
 political.23.t: "Wiosna ludu [Root.GetAdjective]"
 political.23.d: "Gdy odrzucono propozycję przeprowadzenia referendum w sprawie wprowadzenia demokracji, ludzie, którzy za nim stali, doszli do wniosku, że [Root.GetLeader] nie zgodzi się na żadne ustępstwa. Koalicja rozmaitych grup antyrządowych, zjednoczona w imię zaprowadzenia bardziej demokratycznych rządów, chwyciła za broń i ogłosiła, że nie spocznie, póki władza, [Root.GetRulingParty], nie zostanie obalona."
 political.23.a: "Byle nie rządy plebsu!"
 political.23.b: "[Root.GetName] wreszcie cieszy się wolnością!"
 political.24.t: "Faszyści ośmieszeni"
 political.24.d: "Zachwyt, jaki wzbudziło w obywatelach propagowanie narodowej dumy i przypominanie chwalebnej przeszłości, okazał się chwilowy. Skrajni nacjonaliści zostali na lodzie, a ich mundury, wojskowa musztra i płomienne przemowy wywołują dziś już tylko uśmiech politowania.\n\nFaszyzm, stanowiący niegdyś zagrożenie dla rządzącej partii, coraz częściej uchodzi za absurdalną, ekstremistyczną ideologię wymierzoną w podstawowe wartości naszego narodu, który faszyści rzekomo tak bardzo poważają. [Root.GetRulingParty] nie ma się już czego obawiać z ich strony, a sama nazwa tego ruchu została sprowadzona do roli obelgi."
 political.24.a: "Co za błazny."
 political.25.t: "Komunistyczne fiasko"
 political.25.d: "Wielu komunistów zakładało, że [Root.GetName] stanie się kolejną ofiarą tak zwanej międzynarodowej rewolucji, ale po kilku miesiącach strajków i machania czerwonymi flagami z komunistycznej lewicy niewiele pozostało. [Root.GetLeader] może spać spokojnie. Klasa robotnicza, którą przedstawiano jako siłę napędową całego ruchu, ma na głowie ważniejsze rzeczy niż obalanie rządu i ewidentnie nie jest zachwycona wynikami rewolucji w innych państwach. Intelektualiści, jeszcze nie tak dawno temu nawołujący do poderżnięcia gardeł burżuazji, są, jak się okazuje, całkiem zadowoleni ze swojego wygodnego życia i nie chcą ryzykować utraty tego komfortu.\n\nLudzie zapewne nadal będą mówić o rewolucji, sącząc przy tym podrzędne piwo lub drogie wino, ale na gadaniu się skończy."
 political.25.a: "Co za hipokryci."
 political.26.t: "Koniec ruchu demokratycznego"
 political.26.d: "Po kilku miesiącach głośnego sprzeciwu wobec polityki rządu, na czele którego stoi [Root.GetLeader], a także nawoływania do wprowadzenia wyborów oraz wolności słowa i zgromadzeń ruch demokratyczny praktycznie przestał istnieć. Większość obywateli jest przekonana, że [Root.GetName] utraci stabilność po takich wyborach, a ci, którzy nadal na nie naciskają, uchodzą za burzycieli spokoju.\n\nO dziwo, większość przywódców ruchu przepadła bez śladu lub nagle przestała agitować. Być może wybrali emigrację, gdy zrozumieli, że nie mają szans na wygraną. [Root.GetRulingParty] oczywiście zapewnia, że nie ma z tym nic wspólnego."
 political.26.a: "Co za banda tchórzy."
 political.27.t: "[Root.GetLeader] rezygnuje z neutralnej polityki zagranicznej."
 political.27.d_fascism: "[Root.GetRulingParty] jest teraz u władzy i [Root.GetLeader] ogłasza, że [Root.GetName] kończy z neutralną polityką zagraniczną.\n\"Świat stał się zawiły i skomplikowany. Sami nie jesteśmy już bezpieczni. Wraz z naszymi faszystowskimi partnerami musimy przeciwstawić się naszym wrogom. Jeśli nie opowiemy się po jednej ze stron, zginiemy odosobnieni\"."
 political.27.d_communism: "[Root.GetRulingParty] jest teraz u władzy i [Root.GetLeader] ogłasza, że [Root.GetName] kończy z neutralną polityką zagraniczną.\n\"Świat stał się zawiły i skomplikowany. Ten kraj był zawsze wierny swoim zasadom i gotowy ich bronić. Sami nie jesteśmy już bezpieczni. Neutralność przestała być bezpieczną przystanią, ponieważ ludzie żądni władzy nie szanują jej. Wraz z naszymi komunistycznymi braćmi musimy przeciwstawić się mocarstwom, które chcą nas pognębić. Musimy przeciwstawić się burżuazyjnej większości, która pragnie blokować nasz potencjał. Jeśli się nie sprzeciwimy, zginiemy odosobnieni\"."
 political.27.a: "[Root.GetName]! Za przyszłość!"
 political.28.t: "[Root.GetNameDef] Zjednoczeni"
 political.28.d: "Koniec straszliwej wojny domowej, która spustoszyła naszą ziemię, dobiega końca i wreszcie osiągnęliśmy porozumienie polityczne. Spotykamy się teraz oko w oko z naszymi innymi [Root.GetAdjective] i razem odbudujemy nasz wspaniały naród. Wrogowie, którzy chcieli wykorzystać nasze konflikty wewnętrzne, muszą teraz stawić czoła zjednoczonemu państwu [Root.GetAdjective].\n\nNowy [Root.GetRulingIdeology] [Root.GetName] nigdy więcej nie będzie podzielony!"
 political.28.a: "Nareszcie zjednoczeni!"
 THREAT_FROM_EFFECT: "Zagrożenie wynikające z działań"
 war_justification.1.t: "[Root.GetLeader] Speaks Against [FROM.GetName]"
 war_justification.1.d: "'Does [FROM.GetName] belong to the [FROM.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [FROM.GetAdjective] or does it belong to [Root.GetNameDef]?'\n\n[Root.GetLeader]'s speech today suggested that [Root.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [Root.GetAdjective] people are coming to accept that war is inevitable."
 war_justification.1.a: "[Root.GetName] będzie górą!"
 war_justification.2.t: "[Root.GetLeader] Denounces [FROM.GetAdjective] Ideals"
 war_justification.2.d: "'The [FROM.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [Root.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[Root.GetRulingParty] has long derided the weakness of the [FROM.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.2.a: "[Root.GetName] i [Root.GetLeader] są jednością."
 war_justification.3.t: "[Root.GetLeader] Warns Against [FROM.GetAdjective] Communism"
 war_justification.3.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[Root.GetLeader]'s hatred of communists has been well known since before [Root.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [FROM.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.3.a: "Demagodzy odrzucający ideę narodów zostaną zgładzeni."
 war_justification.4.t: "[Root.GetName] szykuje się do wielkiej wojny"
 war_justification.4.d: "'The [FROM.GetAdjective] are a people who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [FROM.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [FROM.GetName] and [Root.GetName] has given way to a campaign to take their territory by force."
 war_justification.4.a: "Nasze zwycięstwo zmieni bieg historii."
 war_justification.5.t: "[Root.GetLeader] Brings Revolution to [FROM.GetName]"
 war_justification.5.d: "'While we have consolidated the socialist society in [Root.GetName], many nations still suffer under the despots of old. The workers of [FROM.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [FROM.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [FROM.GetAdjective] people. With the revolution we have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [FROM.Capital.GetName] as well!'\n\n[Root.GetLeader] has abandoned all attempts at diplomatic rhetoric towards [FROM.GetRulingParty]-controlled [FROM.GetName]. The quest to eradicate all borders is now strictly focused on eradicating their borders."
 war_justification.5.a: "[FROM.GetAdjective] workers, your liberation is near!"
 war_justification.6.t: "[Root.GetLeader] Calls to Aid [FROM.GetAdjective] Workers"
 war_justification.6.d: "'Is there a greater lie than the supposed liberty of the [FROM.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [Root.GetAdjective] intervention.'\n\n[Root.GetLeader] has polemicized against the government in [FROM.GetName] for a long time in party meetings, but this rhetoric is now used more frequently in public. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.6.a: "Zmiażdżymy burżuazyjną dyktaturę!"
 war_justification.7.t: "[FROM.GetAdjective] Communism Failing"
 war_justification.7.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [FROM.GetRulingParty] of [FROM.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of the [FROM.GetAdjective] revolution, [Root.GetLeader] has expressed increased disappointment with how it has developed. The [Root.GetRulingParty] may have to intervene before it is too late."
 war_justification.7.a: "Jeszcze możemy naprawić ich bałagan."
 war_justification.8.t: "[Root.GetLeader] Calls for Crushing [FROM.GetAdjective] Nationalism"
 war_justification.8.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [FROM.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [FROM.GetAdjective], but the animosity has intensified lately. It now appears that conflict will arise sooner rather than later."
 war_justification.8.a: "Śmierć faszystom!"
 war_justification.9.t: "Diplomacy with [FROM.GetName] Breaks Down"
 war_justification.9.d: "'Despite our attempts to find a diplomatic solution to our conflict with [FROM.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [FROM.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [FROM.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[Root.GetAdjective] intervention in [FROM.GetName] has been a hot issue, with some politicians in the opposition claiming that [Root.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.9.a: "Czasem rozlew krwi jest nieunikniony."
 war_justification.10.t: "[Root.GetLeader] Calls for Intervention in [FROM.GetName]"
 war_justification.10.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [FROM.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [Root.GetAdjective] nor the [FROM.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [Root.GetAdjective] invasion of [FROM.GetName] in the future. History may surprise us yet."
 war_justification.10.a: "[FROM.GetName] is a dubious democracy anyway."
 war_justification.11.t: "[Root.GetLeader] ostrzega przed czerwoną zarazą"
 war_justification.11.d: "'Without a doubt, [FROM.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [FROM.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe threat of subversive activity undermining our democracy, fueled by [FROM.GetAdjective] ambitions, has become a hotly debated topic recently. While representatives in opposition have called this a Red Scare aimed at pursuing war with [FROM.GetName], the rhetoric of the [Root.GetRulingParty] has been highly successful so far."
 war_justification.11.a: "Ci ludzie wierzą jedynie w przemoc, więc tylko na przemoc zasługują."
 war_justification.12.t: "[Root.GetLeader] Confronts [FROM.GetAdjective] Fascism"
 war_justification.12.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [FROM.GetRulingParty] now holds [FROM.GetName]. People may argue that we should not provoke conflict, that we should trust [FROM.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nPeople who have long hoped to avoid a direct confrontation with [FROM.GetName] have now been strongly opposed by [Root.GetLeader], who argues that we in Machiavellian terms are merely postponing war to the advantage of the enemy. At this rate, we may strike the first blow after all."
 war_justification.12.a: "Pokój nie jest możliwy, póki ci ludzie są u władzy."
 war_justification.13.t: "[Root.GetLeader] Calls for War Against [FROM.GetName]"
 war_justification.13.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [FROM.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\n[Root.GetLeader]'s hostile rhetoric towards [FROM.GetName] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of our leader."
 war_justification.13.a: "To trudna decyzja, ale musimy ją poprzeć."
 war_justification.14.t: "[Root.GetLeader] Challenges [FROM.GetAdjective] Pretensions"
 war_justification.14.d: "'[FROM.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [FROM.GetName] long held by the [Root.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [FROM.GetAdjective] people want to avoid war, [Root.GetLeader] claims that their elected leaders have provoked it through their arrogance."
 war_justification.14.a: "Nie mają pojęcia, jak zahartowały nas nasze przejścia."
 war_justification.15.t: "[Root.GetLeader] Wants to Restore Order in [FROM.GetName]"
 war_justification.15.d: "'The [Root.GetAdjective] national spirit is strong, but not all nations are so fortunate. [FROM.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [Root.GetName] against this threat.'\n\nWhile the [Root.GetRulingParty] has always opposed communism, [FROM.GetName] has been a target of particular attacks in recent speeches. Whether or not the attack on the [Root.GetAdjective] nation from communists is a real threat, the preemptive attack on [FROM.GetAdjective] communism is already in the works."
 war_justification.15.a: "Ofiary rewolucji zostaną pomszczone!"
 war_justification.16.t: "[Root.GetLeader] Calls Out [FROM.GetAdjective] Oppressors"
 war_justification.16.d: "'My opponents would have you believe that my rule is like that of the [FROM.GetRulingParty] in [FROM.GetName]. They could not be more wrong. While [FROM.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [Root.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [Root.GetLeader] regime has adopted a hostile policy towards the [FROM.GetAdjective] nation. Whatever our leaders may be called, fascist is a word reserved for our enemies."
 war_justification.16.a: "Tradycja i pragmatyzm zawsze zatriumfują nad fanatyzmem i terrorem."
 war_justification.17.t: "[Root.GetLeader] Questions [FROM.GetAdjective] Sovereignty"
 war_justification.17.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [Root.GetName] ends and [FROM.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [Root.GetLeader]'s recent speeches, an invasion of [FROM.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.17.a: "Musimy poprzeć tę inicjatywę!"
 war_justification.18.t: "[Root.GetLeader] Questions the Motives of [FROM.GetName]"
 war_justification.18.d: "'There is no doubt that [FROM.GetName] is preparing for war. The changes in economic policy make it plain to see that the [FROM.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [Root.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [Root.GetRulingParty] have turned their eyes towards [FROM.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [Root.GetName] is preparing for war."
 war_justification.18.a: "Przynajmniej dzięki temu zdołamy zakończyć ten konflikt."
 war_justification.19.t: "[Root.GetLeader] Angered by [FROM.GetAdjective] Posturing"
 war_justification.19.d: "'Those naïve citizens of [Root.GetName] who imagine the [FROM.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [FROM.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nThe [FROM.GetAdjective] military presence close to our territory has sparked increased concern as this nation appears more and more to be the enemy of the [Root.GetRulingParty]. Whether it is the cause or the effect of their polemic is a matter of contention."
 war_justification.19.a: "Tak czy owak, musimy się przygotować do wojny."
 war_justification.20.t: "[Root.GetLeader] Advocates Invasion of [FROM.GetName]"
 war_justification.20.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [FROM.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [Root.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [Root.GetRulingParty] leaders, most prominently [Root.GetLeader], has been calling the public to support an invasion of [FROM.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.20.a: "Naród popiera tę ważną decyzję."
 war_justification.201.t: "[FROM.GetLeader] Speaks Against [Root.GetName]"
 war_justification.201.d: "'Does [Root.GetName] belong to the [Root.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [Root.GetAdjective] or does it belong to [FROM.GetName]?'\n\n[FROM.GetLeader]'s speech today, suggested that [FROM.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [FROM.GetAdjective] people have accepted that war is inevitable. [Root.GetName] must also prepare."
 war_justification.201.a: "Czy niedane nam jest żyć w pokoju?"
 war_justification.202.t: "[FROM.GetLeader] Denounces [Root.GetAdjective] Ideals"
 war_justification.202.d: "'The [Root.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [FROM.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[FROM.GetRulingParty] has long derided the weakness of the [Root.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.202.a: "As expected from fascist scum like [FROM.GetLeader]."
 war_justification.203.t: "[FROM.GetLeader] Warns Against [Root.GetAdjective] Communism"
 war_justification.203.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[FROM.GetLeader]'s hatred of communists has been well known since before [FROM.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [Root.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.203.a: "Jeżeli boją się naszej ideologii, to tak naprawdę boją się własnego ludu."
 war_justification.204.t: "[FROM.GetName] Prepares for Great Struggle"
 war_justification.204.d: "'The [Root.GetAdjective] are a people, who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [Root.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [Root.GetName] and [FROM.GetName] has given way to a campaign to take their territory by force."
 war_justification.204.a: "Niech tylko spróbują!"
 war_justification.205.t: "[FROM.GetLeader] Bring Revolution to [Root.GetName]"
 war_justification.205.d: "'While we have consolidated the socialist society in [FROM.GetName], many nations still suffer under the despots of old. The workers of [Root.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [Root.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [Root.GetAdjective] people. We have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [Root.Capital.GetName] as well!'\n\n[FROM.GetLeader] has abandoned all attempts at diplomacy with our government. The communist task of eradicating all borders is now strictly focused on eradicating our borders."
 war_justification.205.a: "[Root.GetLeader] to lepsza opcja niż dowolny rewolucyjny oportunista!"
 war_justification.206.t: "[FROM.GetLeader] Calls to Aid [Root.GetAdjective] Workers"
 war_justification.206.d: "'Is there a greater lie than the supposed liberty of the [Root.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [FROM.GetAdjective] intervention.'\n\nUnwilling to accept that our people may be satisfied without their social experiments, the communist regime in [FROM.GetName] has openly threatened to attack our nation. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.206.a: "Co to za ideologia, którą trzeba ludziom narzucać?"
 war_justification.207.t: "Upadek [Root.GetAdjective] komunizmu"
 war_justification.207.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [Root.GetRulingParty] of [Root.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of [Root.GetRulingParty]'s victory in [Root.Capital.GetName], [FROM.GetLeader] has drifted away from [Root.GetLeader]'s philosophy. The conflict has escalated to the point where they are preparing to invade to enforce their brand of socialism on us."
 war_justification.207.a: "Nie rozumieją, co rewolucja znaczy dla [Root.GetAdjective] narodu."
 war_justification.208.t: "[FROM.GetLeader] Calls for Crushing [Root.GetAdjective] Nationalism"
 war_justification.208.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [Root.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [Root.GetAdjective], but the animosity has intensified lately. Hearing [FROM.GetLeader] speak, it appears that conflict will arise sooner rather than later."
 war_justification.208.a: "Śmierć komunistom!"
 war_justification.209.t: "[Root.GetName] zrywa negocjacje"
 war_justification.209.d: "'Despite our attempts to find a diplomatic solution to our conflict with [Root.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [Root.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [Root.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[FROM.GetAdjective] intervention in our domestic affairs has been a hot issue, with some politicians in their opposition claiming that [FROM.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.209.a: "Ich protekcjonalny ton nie robi na nas wrażenia."
 war_justification.210.t: "[FROM.GetLeader] Calls for Intervention in [Root.GetName]"
 war_justification.210.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [Root.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [FROM.GetAdjective] nor the [Root.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [FROM.GetAdjective] invasion of [Root.GetName] in the future. History may surprise us yet."
 war_justification.210.a: "[FROM.GetName] is a dubious democracy anyway, pursuing such aggressive action."
 war_justification.211.t: "[FROM.GetLeader] Speaks Against Red Menace"
 war_justification.211.d: "'Without a doubt, [Root.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [Root.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe nascent worker's movement has intimidated [FROM.GetAdjective] leaders. While representatives in their opposition have called this a Red Scare aimed at pursuing war with us, the rhetoric of the [FROM.GetRulingParty] has been highly successful so far."
 war_justification.211.a: "Kapitaliści bez wahania ruszą na wojnę, jeżeli tylko będą mogli na tym zyskać."
 war_justification.212.t: "[FROM.GetLeader] Confronts [Root.GetAdjective] Fascism"
 war_justification.212.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [Root.GetRulingParty] now holds [Root.GetName]. People may argue that we should not provoke conflict, that we should trust [Root.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nJealous of the glorious society we are building and the legacy it is founded upon, the [FROM.GetAdjective] seem prepared to start a war to destroy it. So much for their pretensions of peace."
 war_justification.212.a: "To było nieuniknione. Załatwmy to jak najszybciej."
 war_justification.213.t: "[FROM.GetLeader] Calls for War Against [Root.GetName]"
 war_justification.213.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [Root.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\nIn a recent speech to the [FROM.GetAdjective] people the hostile rhetoric towards [Root.GetName] has intensified and [FROM.GetLeader] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of their leader."
 war_justification.213.a: "Pożałują, że podnieśli na nas rękę."
 war_justification.214.t: "[FROM.GetLeader] Challenges [Root.GetAdjective] Pretensions"
 war_justification.214.d: "'[Root.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [Root.GetName] long held by the [FROM.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [Root.GetAdjective] people want to avoid war, [FROM.GetLeader] claims that our elected leaders have provoked it through their arrogance."
 war_justification.214.a: "The voices for peace among the [FROM.GetAdjective] people are, of course, silenced."
 war_justification.215.t: "[FROM.GetLeader] Wants to Restore Order in [Root.GetName]"
 war_justification.215.d: "'The [FROM.GetAdjective] national spirit is strong, but not all nations are so fortunate. [Root.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [FROM.GetName] against this threat.'\n\nWhile the [FROM.GetRulingParty] has always opposed communism, [Root.GetName] has been a target of particular attacks in recent speeches. Fearing their nation's inevitable progress to the next stage of history, a preemptive attack on [Root.GetAdjective] communism is already in the works."
 war_justification.215.a: "Naszego dzieła nie da się już cofnąć."
 war_justification.216.t: "[FROM.GetLeader] Calls Out [Root.GetAdjective] Oppressors"
 war_justification.216.d: "'My opponents would have you believe that my rule is like that of the [Root.GetRulingParty] in [Root.GetName]. They could not be more wrong. While [Root.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [FROM.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [FROM.GetLeader] regime has adopted a hostile policy towards the [Root.GetAdjective] nation. Our visionary plans for future greatness have put their nation to shame, and unsurprisingly, they feel threatened."
 war_justification.216.a: "Jeżeli spróbują rzucić nam wyzwanie, gorzko tego pożałują."
 war_justification.217.t: "[FROM.GetLeader] Questions [Root.GetAdjective] Sovereignty"
 war_justification.217.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [FROM.GetName] ends and [Root.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [FROM.GetLeader]'s recent speeches, an invasion of [Root.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.217.a: "Czy wielka wojna niczego ich nie nauczyła?"
 war_justification.218.t: "[FROM.GetLeader] Questions the Motives of [Root.GetName]"
 war_justification.218.d: "'There is no doubt that [Root.GetName] is preparing for war. The changes in economic policy make it plain to see that the [Root.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [FROM.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [FROM.GetRulingParty] have turned their eyes towards [Root.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [FROM.GetName] is preparing for war."
 war_justification.218.a: "Właśnie dlatego musimy być w gotowości."
 war_justification.219.t: "[FROM.GetLeader] Angered by [Root.GetAdjective] Posturing"
 war_justification.219.d: "'Those naïve citizens of [FROM.GetName] who imagine the [Root.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [Root.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nOur military presence close to [FROM.GetAdjective] territory has sparked increased concern, since they interpret our troop movements as proof hostile intent. They hardly seem to have considered that their aggressive rhetoric is the reason for our defensive measures."
 war_justification.219.a: "Po takich groźbach na pewno nie złożymy broni."
 war_justification.220.t: "[FROM.GetLeader] Advocates Invasion of [Root.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [Root.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [FROM.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [FROM.GetRulingParty] leaders, most prominently [FROM.GetLeader], has been calling the public to support an invasion of [Root.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "Musimy się przygotować. Ta wojna jest nieunikniona."
 war_justification.301.t: "[Root.GetLeader] obiektem krytyki za słabą politykę zagraniczną"
 war_justification.301.d: "\"Mieliśmy okazję, żeby uderzyć na naszych nieprzyjaciół, ale wskutek bezczynności władz przeszła nam ona koło nosa. [Root.GetRulingParty] po raz kolejny nie potrafi wzmocnić naszej pozycji na arenie międzynarodowej i udowadnia obywatelom, że ich dobrobyt nie jest priorytetem. Najwyższa pora na zmianę polityki\".\n\nKrytycy nie zostawili na nas suchej nitki za to, że nie poszliśmy na wojnę, której oczekiwała znaczna część społeczeństwa. Możemy mieć teraz problemy z udowodnieniem ludziom, że nasza doktryna jest słuszna i że [Root.GetName] zmierza we właściwym kierunku."
 war_justification.301.a: "Nie wolą uniknąć wojny?"
 war_justification.301.b: "Takie opinie mają prawo się pojawiać tylko na zebraniach partyjnych."
 war_justification.301.c: "[Root.GetLeader] nie może być obiektem oskarżeń o tchórzostwo!"
 nuke_dropped.1.t: "Atomic Bombing of [FROM.FROM.GetName]"
 nuke_dropped.1.d: "For the first and hopefully last time in history, a nuclear bomb has been detonated in [FROM.FROM.GetName] as part of international warfare. The unprecedented destruction stands as a testament to the devastating power of this new weapon, which is feared not only for what it can do to its targets, but what implications it has for the one who deploys it and for humanity itself.\n\nThe world holds its breath waiting for what will come next. Will this force [FROM.FROM.Owner.GetName] to surrender to avoid further terror, or will it only strengthen their resolve to strike back against those who would resort to such measures?"
 nuke_dropped.1.a: "Oto początek ery atomu."
 nuke_dropped.1.b: "Zrobimy wszystko, żeby ochronić [Root.GetAdjective] ludność."
 nuke_dropped.2.t: "Bomba atomowa zrzucona na Hiroszimę"
 nuke_dropped.2.d: "„Ulice wyglądały jak scena z piekła rodem.”\n – Kuniyoshi Aikawa\n\nDzisiaj nad Hiroszimą na wysokości 580 metrów zdetonowano bombę atomową. Ponad dwie trzecie miasta zostało natychmiast zniszczone. Mimo że miasto zbudowano tak, aby wytrzymało trzęsienia ziemi, wybuch przetrwało tylko kilka solidnych konstrukcji.\n\nChociaż w opinii publicznej wyolbrzymiono siłę bomby atomowej, pomniejszono koszt ludzki tej broni. Żadna ze stron nie chce kontemplować horroru tego wydarzenia, ale jego dziedzictwem będzie śmierć życia w mgnieniu oka i trwałe skutki."
 nuke_dropped.2.a: "Ile takich bomb trzeba będzie zrzucić, żeby zakończyć wojnę?"
 nuke_dropped.2.b: "Musimy działać szybko, żeby pomóc ofiarom."
 nuke_dropped.3.t: "Bomba atomowa zrzucona na Nagasaki"
 nuke_dropped.3.d: "Bomba atomowa, która miała spaść na Kokurę, została dziś zdetonowana nad Nagasaki. Warunki pogodowe, dym i problemy techniczne wymusiły zmianę kursu i tym samym zmianę celu, który na długo zapisze się w historii.\n\nZniszczenia zostały nieco ograniczone z uwagi na to, że miasto położone jest w dolinie, ale ich skala i tak potrafi przerazić. Wybuch zmiótł co prawda parę instalacji wojskowych, niemniej to cywile byli jego głównymi ofiarami. Możliwe, że dopiero po wielu latach poznamy długofalowe skutki użycia takiej broni."
 nuke_dropped.3.a: "Will this lead to [FROM.Owner.GetAdjective] surrender?"
 nuke_dropped.3.b: "Mieliśmy nadzieję, że Nagasaki ocaleje."
 nuke_dropped.4.t: "Bomba atomowa spada na Berlin"
 nuke_dropped.4.d: "Today, at [GetDateText], the German capital of Berlin was struck by a nuclear explosion. The city has suffered several attacks, in this war and the last, but all else pale in comparison to this. Not since the Thirty Years' War has Berlin seen comparable devastation - considering its growth, this was seen as an impossibility.\n\nThe Führerbunker appears to have survived the blast at least partially due to the bomb detonating away from its planned epicenter, and [FROM.Owner.GetLeader] is rumored to still be alive, if outraged. How [FROM.Owner.GetAdjective] leaders should be evacuated and if they can be protected from the fallout is another matter, however."
 nuke_dropped.4.a: "Dziś cieszę się, że nie jestem berlińczykiem."
 nuke_dropped.4.b: "Wrogowie zaatakowali serce naszego narodu!"
 nuke_dropped.5.t: "Bomba atomowa zrzucona na Londyn"
 nuke_dropped.5.d: "A nuclear explosion has devastated the city of London today. Despite the city's anti-air defenses, [FROM.Owner.GetName] was not prepared for this attack. At [GetDateText], Big Ben chimed for the last time, having been melted by the blast. Early reports suggest Buckingham Palace has been completely leveled and the whereabouts of the royal family are currently unknown.\n\n[FROM.Owner.GetLeader] has nevertheless been confirmed to have survived and is preparing a rousing speech for the radio later today. With morale at an all-time low, the British people is in dire need of this - or a very eloquent surrender."
 nuke_dropped.5.a: "Trudno zachować stoicyzm w obliczu fali uderzeniowej."
 nuke_dropped.5.b: "Boże, chroń króla!"
 nuke_dropped.6.t: "Bomba atomowa zrzucona na Kioto"
 nuke_dropped.6.d: "The city of Kyoto, a prominent [FROM.Owner.GetAdjective] industrial center, was struck today by a nuclear bomb. It is speculated that the city was chosen as a target because it has been regarded as an intellectual center.\n\nThe beauty and historical significance of the Kyoto led many to assume it would be spared from the bomb, but it appears the terror of raining destruction on such a place has rather been seen as a benefit, increasing the psychological impact of the attack. The city's location in the valley somewhat limited the blast, but the old Imperial Palace and many industrial buildings have been completely destroyed."
 nuke_dropped.6.a: "Piękno i historia to kolejne ofiary tej wojny."
 nuke_dropped.6.b: "Stare rzeczy można zastąpić nowymi."
 nuke_dropped.7.t: "Bomba atomowa zrzucona na Tokio"
 nuke_dropped.7.d: "Today, a nuclear strike was directed at the heart of the Japanese Empire. The capital of Tokyo, although expected to be the target of firebombing, was never assumed to be a prioritized target of this new weapon. Yet ultimately, perhaps due to the significance of the new capital and Imperial Palace which has now been destroyed, an even more all-consuming fire has fallen on the city.\n\nAlthough [FROM.Owner.GetLeader] is reported to have survived, the event has raised questions about how far Japan's enemies are willing to go. If the war does not end with this, what targets remain? What is left to threaten with?"
 nuke_dropped.7.a: "Czy to oznacza koniec japońskiego imperium?"
 nuke_dropped.7.b: "As long as [FROM.Owner.GetLeader] lives, so does the Empire."
 nuke_dropped.8.t: "Bomba atomowa zrzucona na Waszyngton"
 nuke_dropped.8.d: "A nuclear bomb was detonated today over the capital of the United States. In an attack clearly directed at the political center and historical legacy of the US, the White House, the Capitol and a number of monuments and memorials were wiped off the face of the Earth. Even the Burning of Washington over a century ago pales in comparison to the destruction visited upon the city by this devastating weapon.\n\nAlthough President [FROM.Owner.GetLeader] has been brought to safety, the nation has been shaken to its core. No doubt, the US hoped to be the first and only country to wield such a weapon. Those hopes have now been shattered in the worst possible way."
 nuke_dropped.8.a: "Czy naród da się rozszczepić tak jak jądro atomu?"
 nuke_dropped.8.b: "Orzeł powstanie z popiołów niczym Feniks."
 nuke_dropped.9.t: "Bomba atomowa zrzucona na Rzym"
 nuke_dropped.9.d: "Dzisiejszy atak jądrowy na Rzym wstrząsnął całym światem. Wielu sądziło, że starożytne miasto, które jest domem dla tylu skarbów kultury, nie padnie celem tak druzgocącego ataku. Część Watykanu legła w gruzach, a los papieża pozostaje nieznany, co stanowi cios dla katolików na całym świecie.\n\nOstatnie dziesięć lat prężnego rozwoju miasta zostało praktycznie wymazane z historii. Wiele wskazywało na to, że po zakończeniu wojny Rzym stanie się lokomotywą procesu odbudowy kraju. Bomba atomowa pogrzebała te plany, a razem z nimi tysiące cywilów."
 nuke_dropped.9.a: "Bomba została zrzucona!"
 nuke_dropped.9.b: "Nie od razu Rzym odbudujemy..."
 nuke_dropped.10.t: "Bomba atomowa zrzucona na Paryż"
 nuke_dropped.10.d: "Dziś nad Paryżem doszło do wybuchu broni jądrowej, która dokonała wielkich zniszczeń i pochłonęła tysiące ofiar. Cały kraj jest wstrząśnięty, gdyż atak ten spustoszył francuską stolicę bardziej niż setki lat wojen i rewolucji. Większość paryżan spodziewała się podboju miasta, ale nie całkowitej, bezlitosnej destrukcji.\n\nRaczej nieprędko dojdzie do parady zwycięstwa na Champs-Élysées, w pobliżu resztek Łuku Triumfalnego. Może po latach francuska stolica powstanie z popiołów jako nowy Paryż, ale miasto, które znaliśmy, jest już tylko wspomnieniem."
 nuke_dropped.10.a: "Miasto świateł właśnie zgasło."
 nuke_dropped.10.b: "Jeszcze wczoraj sądziliśmy, że Paryż jest wieczny."
 nuke_dropped.11.t: "Bomba atomowa zrzucona na Moskwę"
 nuke_dropped.11.d: "A city many have tried and failed to conquer, Moscow was the target of a nuclear attack today. The explosion was directed at the heart of [FROM.Owner.GetAdjective] leadership, the Kremlin having been nearly completely destroyed by the blast.\n\n[FROM.Owner.GetLeader], having grown more aware and fearful of all possible and impossible threats recently, evacuated in time and survived. However, even the vastness of [FROM.Owner.GetName] may not be enough to escape such a ruthless enemy. Indeed, if this continues, the nation will soon consist only of two kinds of wastelands: Those which were there in the first place, and those created by its enemies."
 nuke_dropped.11.a: "Nuklearna zima tylko utrudni zdobycie Moskwy."
 nuke_dropped.11.b: "Mogą spalić nasze miasta, ale nigdy ich nie zdobędą."
 nuke_dropped.12.t: "Bomba atomowa zrzucona na Kopenhagę"
 nuke_dropped.12.d: "Dzisiaj Kopenhaga stała się celem ataku jądrowego. I wojna światowa ominęła to miasto, gdyż Dania zachowała neutralność, więc nie doświadczyło ono podobnych zniszczeń od czasu wojen napoleońskich. Opad radioaktywny skaził wody Sundu, a ocalali mieszkańcy uciekają na Fionię i stały ląd w obawie przed kolejnymi atakami.\n\nLos króla Chrystiana X jest nieznany, a morale Duńczyków znacząco spadło. Niewykluczone, że to początek końca jednego z najstarszych europejskich państw."
 nuke_dropped.12.a: "Coś się mieni w państwie duńskim."
 nuke_dropped.12.b: "Kopenhaga nieraz już płonęła, ale nigdy się nie poddała."
 nuke_dropped.12.c: "Pluton rzuci Duńczyków na kolana!"
 nuke_dropped.13.t: "Bomba atomowa zrzucona na Sztokholm"
 nuke_dropped.13.d: "Sztokholm, zwany Wenecją Północy, stał się dziś celem ataku jądrowego. Szwedzi robili co w ich mocy, żeby zachować neutralność, ale światowy konflikt ich nie ominął. Epicentrum wybuchu znalazło się w południowo-centralnej części miasta, która była przeznaczona pod dalszą, prężną i nowoczesną rozbudowę. Tereny te zostały nieodwracalnie zniszczone.\n\nZnaczna część szwedzkiej stolicy legła w gruzach, ale stare budynki w Slussen przetrwały atak w zaskakująco dobrym stanie. Postanowiono, że zostaną zachowane jako świadectwo niezłomności Sztokholmu."
 nuke_dropped.13.a: "Szwedzka neutralność to już tylko wspomnienie."
 nuke_dropped.13.b: "Szwedzki tygrys nie wyrzeknie się swoich pasów!"
 country_capitulated.0.t: "[Root.GetName] kapituluje"
 country_capitulated.0.d_positive_both_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war continues elsewhere, this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for all of the [FROM.FROM.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nDespite this devastating loss the war against [FROM.FROM.GetName] is far from over."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] and the rest of the [FROM.FROM.GetFactionName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nAlthough the struggles between [FROM.FROM.GetName] and [Root.GetName] are over, [FROM.FROM.GetName] is still at all-out war, and the fighting continues elsewhere."
 country_capitulated.0.d_neutral_prev_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles in [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.d_neutral_prev_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles between [FROM.FROM.GetName] and [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetFactionName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.a: "Wspaniałe wieści!"
 country_capitulated.0.b: "To mroczne czasy."
 country_capitulated.0.c: "To niepewne czasy."
 GAME_OVER_TT: "§RZakończysz grę.§!"
 CAN_ANGERED_WORKERS: "To zaniepokoi ludzi."
 excellent: "Doskonale."
 unfortunate: "Niefortunny"
 news.1.t: "[fta_inviter.GetNameDef]-[fta_applicant.GetName] Umowa o wolnym handlu"
 news.1.d: "Dzisiaj [fta_inviter.GetNameDef] i [fta_applicant.GetNameDef] podpisały traktat o wolnym handlu i inwestycjach w celu wzmocnienia współpracy gospodarczej między obydwoma krajami."
 news.1.a: "Dobra"
 news.2.t: "[mct_inviter.GetNameDef]-[mct_applicant.GetName] Traktat o współpracy wojskowej"
 news.2.d: "Dziś [mct_inviter.GetNameDef] i [mct_applicant.GetNameDef] podpisały traktat o współpracy wojskowej, wzmacniający swoje więzi wojskowe."
 news.2.a: "Dobra"
 news.3.t: "Bombardowanie USS Cole"
 news.3.d: "Dowództwo Marynarki Wojennej Stanów Zjednoczonych poinformowało, że niszczyciel USS Cole został zaatakowany przez siatkę Al-Kaidy, w wyniku czego zginęło 17 amerykańskich żołnierzy. Raporty amerykańskiego wywiadu wskazują na rząd Sudanu jako potencjalnego zwolennika obu napastników."
 news.3.a: "Będą tego żałować."
 news.3.b: "Prześlij nasze kondolencje Amerykanom."
 news.3.c: "Martwi Amerykanie? Dobry."
 news.3.e: "Oni nas obwiniają?!"
 news.4.t: "[FROM.GetName] leaves the European Union"
 news.4.d: "Today the [FROM.GetAdjective] delegation to the European Parliament left the buildings in Brussels for what might be the last time. Article 50 has been fulfilled and pulled through, the treaties with the EU partners reset to ones of usual international partnership. [FROM.GetName] has left the European Union."
 news.4.a: "Dobra"
 news.5.t: "Przygotowanie Unii"
 news.5.d: "[FROM.GetName] has begun the process of preparing legislation to unite the European Union under [FROM.GetAdjective] leadership. The European Parliament has much to discuss in the coming days."
 news.5.a: "Ciekawe przedsięwzięcie."
 news.82.t: "Japonia się wycofała"
 news.82.desc: "Po tym, jak Japonia próbowała zjednoczyć Półwysep Koreański pod wodzą Korei Południowej, dokonując inwazji na Koreę Północną, rząd chiński interweniuje. Japonia, po otrzymaniu tych wiadomości, wycofuje się i opuszcza misję zjednoczeniową."
 news.82.a: "I tak byśmy przegrali!"
 news.82.b: "Chiny są naprawdę potężne!"
 influence.1.t: "Offer Economic Aid to [FROM.GetName]?"
 influence.1.d: "Zostaliśmy wybrani do rozpoczęcia przygotowania pakietu pomocy gospodarczej. Możemy zdecydować się na przekazanie 5%, 10% lub 15% naszego PKB jako pomoc. Ta hojność poprawi stosunki i zapewni nam wpływy w [FROM.GetName], chociaż nie ma gwarancji, że wykorzystają oni tę pomoc gospodarczą na coś wartościowego. Im więcej damy, tym większe wpływy uzyskamy.\n\n"
 influence.1.a: "Wyślij 5% PKB jako pomoc gospodarcza."
 influence.1.b: "Wyślij 10% PKB jako pomoc gospodarcza."
 News_influence.0.t: "Economic aid given by [FROM.GetName]!"
 News_influence.0.d: "We have been given $$[?gift_sum] billion in immediate economic aid by [FROM.GetName]. This has strengthened [Root.GetAdjective]-[FROM.GetAdjective] Relations, and while the gift officially came without preconditions, it is understood to have strengthened their influence in our country."
 News_influence.0.a: "Wspaniały"
 News_influence.0.b: "Odrzuć pomoc"
 influence.3.t: "Czy chcesz skupić się na innym influencerze w [FROM.GetName]?"
 influence.3.d: "Na których z [FROM.GetNameWithFlag] wpływowych osób powinniśmy zwrócić uwagę lub powinniśmy skupić się na ich niezależności krajowej?\n"
 influence.3.a: "Docelowa niezależność wewnętrzna [FROM.GetNameWithFlag]."
 influence.3.b: "Cel [?var:FROM.influence_array^0.GetNameWithFlag]."
 influence.3.c: "Cel [?var:FROM.influence_array^1.GetNameWithFlag]."
 influence.3.e: "Cel [?var:FROM.influence_array^2.GetNameWithFlag]."
 influence.3.f: "Wycofać się."
 News_influence.1.t: "[FROM.GetNameWithFlag] attacks our influence in [FROM.FROM.GetNameWithFlag]!"
 News_influence.1.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our ambitions in [FROM.FROM.GetName]. Singleing us out, their attack on our business and governmental interests have lowered our influence in [FROM.FROM.GetNameWithFlag]."
 News_influence.1.a: "Damn you, [FROM.GetLeader]!"
 News_influence.2.t: "[FROM.GetNameWithFlag] attacks our independence from foreign influence!"
 News_influence.2.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our aspirations to keep foreign meddling out, and weakened our sovereignty. Our independence from foreign influence has been reduced."
 News_influence.2.a: "Not cool, [FROM.GetLeader]!"
 influence.5.t: "Launch Coup in [FROM.GetNameWithFlag]?"
 influence.5.d: "Dear [Root.GetLeader], we in the [Root.GetAdjective] Intelligence Services cannot confirm or deny whether [FROM.GetName] is conducive to a coup.\n\nHowever, we have, to the best of our ability, drawn up probabilities of outcomes. These are based on:\n - How big our influence is\n - How popular our outlook is\n - The popularity and stability of the government\n - Which other influential countries are likely to back us\n - Which influential countries are likely to back their current government.\n\nIf we proceed with the plans we will try to use mostly local sources and contacts, to try to maintain plausible deniability."
 influence.5.a: "Przeprowadźmy przewrót, aby do władzy doszła największa partia zgodna z naszą ideologią."
 influence_coup_largest_success_TT: "§HUdany zamach stanu§!"
 influence_coup_largest_discovered_TT: "§RNieudany zamach stanu§!"
 influence.5.b: "Rozpocznij zamach stanu, aby objąć władzę tej samej partii rządzącej, co nasza."
 influence.5.c: "Porzuć te plany – na razie."
 News_influence.3.t: "Zmiana reżimu!"
 News_influence.3.d: "Forces with [FROM.GetAdjective] backing have deposited the previous government."
 News_influence.3.a: "Wow..."
 News_influence.4.t: "Dramatic scenes as regime change sweeps [FROM.FROM.GetNameWithFlag]"
 News_influence.4.d: "After a period with uptick in foreign intelligence activity, especially from [FROM.GetNameWithFlag], the previous government of [FROM.FROM.GetName] have been toppled with many top officials of the former regime detained. [FROM.FROM.GetLeader] of the [FROM.FROM.GetRulingParty] has emerged as the new leader amid the turmoil. Early indications are that the new regime of [FROM.FROM.GetName] will identify with the [FROM.FROM.GetRulingIdeology], uprooting the balance of power."
 News_influence.4.a: "Ciekawy"
 News_influence.5.t: "[FROM.GetNameWithFlag] under pressure as [FROM.FROM.GetNameWithFlag] defeat coup"
 News_influence.5.d: "[FROM.FROM.GetAdjective] leader [FROM.FROM.GetLeader] was gesturing vividly from the stage as 'hostile evil forces spearheaded by [FROM.GetName]' were being blamed for today's latest escalations that saw [FROM.FROM.GetLeader] defeating a dramatic coup attempt. Though [FROM.GetAdjective] leader [FROM.GetLeader] strongly denied the accusations, it is widely known that the two leaders don't see eye to eye. With [FROM.GetAdjective]-[FROM.FROM.GetAdjective] ties at all time low, [FROM.FROM.GetName] vowed to the public to \"irradicate [FROM.GetAdjective] influence from [FROM.FROM.GetName]\", and otherwise double down on the [FROM.FROM.GetRulingIdeology] direction that the ruling [FROM.FROM.GetRulingParty] have been steering [FROM.FROM.GetNameWithFlag] towards."
 News_influence.5.a: "Ciekawy"
 News_influence.6.t: "Drama as [FROM.FROM.GetNameWithFlag] collapse into Civil War!"
 News_influence.6.d: "Traumatic scenes from [FROM.FROM.GetNameWithFlag] could be seen today, as the last few days of protests, uncertainty and strange military movements gave way to gunfire, suffering and fleeing civilians. While details are scarce, it seems several whole units of the [FROM.FROM.GetAdjective] Army have declared for the armed opposition against [FROM.FROM.GetLeader] and the [FROM.FROM.GetRulingParty] ([FROM.FROM.GetRulingIdeology]). A opposition leader, speaking to WNN under conditions of anonymity, said that they \"expect significant help from [FROM.GetNameWithFlag] in their quest to overthrow the illegitimate [FROM.FROM.GetAdjective] tyrant [FROM.FROM.GetLeader]\".\n\nAlthough [FROM.GetAdjective] leadership have expressed their \"surprise about these dramatic developments\", this is given little credibility by close watchers of [FROM.GetAdjective]-[FROM.FROM.GetAdjective] relations. One analyst described the situation like this; \"It's clear that this in reality was a [FROM.GetAdjective]-backed coup attempt that failed to secure their objectives fast enough, resulting in a tense standoff that degraded into what now looks like a full civil war\". Several world leaders, especially those with a [FROM.FROM.GetRulingIdeology] have had less than diplomatic words for the as of yet unconfirmed [FROM.GetAdjective] involvement.\n\nWith the two different sides in the conflict represent not only stark differences in domestic, but also international direction, it will be interesting to follow if other countries also get involved in the conflict."
 News_influence.6.a: "Kto będzie rządził popiołami?"
 influence.51.t: "Pomoc wojskowa dla [FROM.GetName]"
 influence.51.d: "Our fellow nation [FROM.GetName] is currently in an armed conflict and is looking for suppliers to fuel their war effort. They have shown an interest in our small arms, infantry vehicles, and other military surplus. We should decide if it is worthwhile to send them the military equipment lest they use it against us in future conflicts..."
 influence.51.a: "Tak, zróbmy to!"
 influence.51.a_tt: "Ty decydujesz, jaki sprzęt przekażesz!"
 influence.51.b: "Po namyśle.."
 influence.51.b_tt: "Po namyśle. Potrzebuję im broni!"
 influence.52.t: "Pytanie czego"
 influence.52.d: "We can send [FROM.FROM.GetName] one of three categories of military aid. After picking the category, we will choose a §Hpackage size§! that determines the quantity, political cost, and threat generated.\n\n§HInfantry§!: small arms, light anti-tank, anti-aircraft.\n§HVehicles & Armor§!: main battle tanks, amphibious tanks, utility vehicles.\n§HModern Equipment§!: heavy anti-tank missiles, surface-to-air missiles, drones."
 influence.52.a: "§HInfantry Equipment§! Package"
 influence.52.b: "§HVehicles & Armor§! Package"
 influence.52.c: "Właściwie to potrzebuję tych.."
 influence.53.t: "Pomoc wojskowa od [FROM.GetName]"
 influence.53.d: "[FROM.GetName] has offered us a package of military equipment. Should we accept or return it?"
 influence.53.a: "Accept the Package"
 influence.53.c: "Return the Equipment"
 influence.54.t: "Miesięczny raport autoinfluencera"
 influence.54.d: "[?nations_influenced|0] zostało pomyślnie wpłyniętych na [GetDateText]. Następujące narody zostały wpłynięte dzięki naszym ciągłym wysiłkom na rzecz wpływu:"
 influence.54.a: "Dobrze, dziękuję!"
 econvent.1.t: "Bank Centralny [Root.GetName] ostrzega przed możliwą bańką na rynku mieszkaniowym"
 econvent.1.d: "Drogi [Root.GetLeader], z przykrością informujemy, że znaczna część naszego zespołu ekspertów (najlepsi i najbystrzejsi ekonomiści [Root.GetAdjective]) dostrzega wczesne oznaki przegrzania rynku mieszkaniowego [Root.GetAdjective] i może zmierzać w stronę bańki, która może pęknąć . Należy pamiętać, że przewidywanie przyszłości to trudna i ciężka praca, dlatego może się zdarzyć, że nasi eksperci się mylą. \nOczywiście nigdy nie przyszłoby nam do głowy wydawać Waszej Ekscelencji rozkazów, co ma robić, ale wprowadzenie pewnych zmian teraz będzie mniej bolesne niż pełny kryzys w przyszłości."
 econvent.1.a: "Ochłodźmy rynki, zanim sytuacja się pogorszy."
 econvent.1.b: "Dość nonsensów. Gospodarka [Root.GetAdjective] jest zawsze zdrowa!"
 econvent.1.b_tt: "§HNa razie bez efektu§!, ale w przyszłości może powstać bańka na rynku nieruchomości\n"
 econvent.2.t: "Spadające ceny mieszkań"
 econvent.2.d: "Ponieważ ceny domów i mieszkań poszybowały w górę, zwłaszcza w zeszłym roku, ludzie zaciągali coraz większe pożyczki, aby pozwolić sobie na mieszkanie, a spekulanci intensywnie inwestowali w nieruchomości, korzystając także z pożyczonych pieniędzy. W tej chwili to się kończy, i to szybko. Ceny spadają, a ludzie próbują sprzedawać, jakby jutra miało nie być. Wielu mniej szczęśliwych utknie z ogromnymi pożyczkami, których nie będzie w stanie spłacić. Ponieważ ludzie przeklinają zarówno [Root.GetLeader], jak i [Root.GetAdjective] Bank Centralny za spowodowanie tego, musimy wydać publiczne oświadczenie na temat tego, jak zamierzamy szybko uporać się z tym kryzysem."
 econvent.2.a: "Zalejemy system tanim pieniądzem, żeby rynek się odbił."
 econvent.2.b: "To bolesne, ale ceny nieruchomości musiały spaść."
 econvent.3.t: "Krach na giełdzie"
 econvent.3.d: "Wygląda na to, że chaos po pęknięciu bańki na rynku nieruchomości dotarł na giełdę. Ceny akcji prawie wszystkich spółek notowanych na giełdzie [Root.GetAdjective] mocno spadły dziś rano, a nasza waluta również znacznie spadła. Handel został tymczasowo zawieszony przed lunchem, ale po jutrzejszym ponownym otwarciu rynków nie oczekuje się żadnej poprawy, ponieważ wszyscy desperacko chcą sprzedać swoje akcje."
 econvent.3.a: "Dobrze, że moje pieniądze trafiły do ​​zagranicznych rajów podatkowych."
 econvent.3.b: "Wydaj pakiety ratunkowe."
 econvent.4.t: "[Root.GetAdjective] Banki w obliczu kryzysu"
 econvent.4.d: "Pomimo gorącego, pysznego espresso latte-art w Twoim [Root.GetName] §R<3§! [Root.GetLeader]-kubek, to nie jest dobry dzień. Zdesperowani potentaci finansowi, ich lobbyści i politycy, którym wnieśli swój wkład – wszyscy roją się od urzędów zarządzających [Root.GetAdjective] i wszyscy mają to samo przesłanie: „Potrzebujemy pomocy!”.\n\nNajwyraźniej podwójny szok związany z pogorszenie koniunktury na rynku nieruchomości mieszkaniowych i krach na giełdzie były dla sektora finansowego zbyt trudne do udźwignięcia. Nagromadzenie nieściągalnych długów w wyniku ich spekulacji jest po prostu zbyt duże, potrzebny jest napływ świeżych pieniędzy rządowych – w przeciwnym razie nastąpią powszechne bankructwa, a niewinni oszczędzający stracą swoje depozyty."
 econvent.4.a: "Zapewnimy dopłaty."
 econvent.4.b: "Żadnych dopłat, ale gwarancja depozytów oszczędnościowych."
 econvent.4.c: "Przetrwanie najsilniejszych czyni kapitalizm wielkim."
 econvent.5.t: "[Root.GetAdjective] Konsumenci wydają mniej"
 econvent.5.d: "Niedawny raport podkreślił, że ciężko pracujący ludzie [Root.GetAdjective] coraz bardziej martwią się o swoją przyszłość. Ten pesymizm powoduje, że ludzie oszczędzają więcej, a ogólna konsumpcja spada. Jeśli ta sytuacja będzie się utrzymywać, wiele firm z [Root.GetName] będzie musiało zmniejszyć swoją działalność lub zamknąć ją. Nie dotyczy to jednak przedsiębiorstw, które głównie eksportują towary [Root.GetAdjective]."
 econvent.5.a: "Przelej część pieniędzy na zakupy."
 econvent.5.b: "Miejmy nadzieję, że to minie."
 econvent.6.t: "Niższy popyt na towary [Root.GetAdjective] za granicą"
 econvent.6.d: "Dane są jasne; międzynarodowy eksport [Root.GetName] spada. Jednakże przyczyna ta jest przedmiotem gorącej debaty wśród doradców ekonomicznych [Root.GetLeader]. Jedna z teorii głosi, że staliśmy się mniej konkurencyjni ze względu na nasze stosunkowo wysokie płace, inna jest taka, że ​​nasi konkurenci podnieśli jakość swoich produktów. Inni uważają, że spadek popytu wynika po prostu ze zmiany trendów za granicą. Jakakolwiek jest przyczyna, niewiele możemy z tym zrobić, poza pozostawieniem tego za sobą i cięższą pracą w przyszłości."
 econvent.6.a: "Obcokrajowcy zachowują się głupio. [Root.GetAdjective] rzeczy są najlepsze!"
 econvent.7.t: "Susza powoduje katastrofę dla rolników [Root.GetAdjective]"
 econvent.7.d: "Chociaż zwykle nie pada dużo deszczu, opady w tym sezonie wegetacyjnym były fatalne i spowodowały niepowodzenie większości upraw. To, co zostało wyprodukowane w niewielkiej ilości produktów rolnych, jest w całości spowodowane pozostałymi rzekami i sztucznym nawadnianiem, co niestety nie jest zbyt powszechne tutaj, w [Root.GetName]. Rolnicy domagają się pomocy od [Root.GetLeader] Rządu, a mieszkańcy miast zaczynają martwić się rosnącymi cenami żywności."
 econvent.7.a: "Więcej szczęścia w przyszłym sezonie."
 econvent.8.t: "Głód w [Root.GetName]!"
 econvent.8.d: "Trwająca susza spowodowała, że ​​na dużych obszarach wiejskich [Root.GetName] brakuje żywności po przystępnej cenie. Zapasy się wyczerpały, a prawdziwy głód powoduje niedożywienie, śmierć i choroby."
 econvent.8.a: "Auć!"
 econvent.9.t: "Większe zaufanie konsumentów"
 econvent.9.d: "Ostatnie warunki w gospodarce [ROOT.GetAdjective] pokazały, że konsumenci w naszym kraju mają teraz idealne warunki rynkowe, aby wydawać pieniądze i inwestować w przyszłość kraju. Ludzie kupują dobra konsumpcyjne, jakby jutra miało nie być!"
 econvent.9.a: "Wspaniałe wiadomości!"
 econvent.10.t: "Boom na giełdzie"
 econvent.10.d: "Giełda [ROOT.GetAdjective] kwitnie. Osoby z [ROOT.GetAdjective] handlują akcjami tak, jakby kupowały żywność.\n"
 econvent.10.a: "Utrzymuj boom!"
 econvent.10.a_tt: "Zastrzyk dodatkowej płynności na rynek może okazać się katastrofalny w przypadku krachu.\n"
 econvent.10.b: "Świetnie"
 econvent.10.b_tt: "Bez interwencji rynek będzie działał normalnie. Nadal istnieje umiarkowane ryzyko awarii.\n"
 econvent.10.c: "Spowolnij gospodarkę."
 econvent.10.c_tt: "Gospodarka nagrzała się zbyt szybko. Zacznijmy zwalniać tempo, ograniczając przepływ kapitału.\n"
 econvent.11.t: "Upadek dużej instytucji finansowej"
 econvent.11.d: "Na pierwszych stronach gazet pojawiły się informacje o upadku dużej instytucji finansowej. Media szaleją z tą sprawą i zmierzają w stronę wzgórz. Rząd błaga się o reakcję, ponieważ na horyzoncie widać obawy przed większym kryzysem. Co powinniśmy zrobić?"
 econvent.11.a: "Zbyt duże, by upaść..."
 econvent.11.b: "To po prostu dobry biznes..."
 econvent.12.t: "[FROM.GetName] Fale kryzysu finansowego"
 econvent.12.d: "Niedawny kryzys w [FROM.GetName] spowodował wiele konfliktów w naszym narodzie, ponieważ skutki tego kryzysu są odczuwalne w naszym narodzie. Obie nasze połączone gospodarki odczuwają obecnie ciężar tego kryzysu."
 econvent.12.a: "Wydać fundusze pomocowe."
 econvent.12.b: "Rynek ponad wszystko."
 econvent.13.t: "Wysokie zadłużenie powoduje odejście firm"
 econvent.13.d: "Wysoki stosunek zadłużenia do PKB w naszym kraju powoduje, że przedsiębiorstwa w kraju zamykają się i opuszczają kraj. Zmniejszenie naszego zadłużenia jest koniecznością, w przeciwnym razie więcej branży może zdecydować się na odejście."
 econvent.13.a: "Pozwól firmie odejść"
 econvent.13.b: "Kup firmę"
 econvent.14.t: "Prywatni inwestorzy inwestują w przemysł cywilny"
 econvent.14.d: "Wielu prywatnych inwestorów zdecydowało się zainwestować w nowy przemysł cywilny w kraju. Nowa, początkująca fabryka zapewni naszemu narodowi miejsca pracy i większy dobrobyt. Dodatkowa konstrukcja i moce produkcyjne z pewnością pomogą nam w ekonomicznym poruszaniu się."
 econvent.14.a: "Niesamowity!"
 econvent.15.t: "Prywatni inwestorzy inwestują w parki biurowe"
 econvent.15.d: "Grupa prywatnych inwestorów zdecydowała się zainwestować w szereg usług zewnętrznych na mniejszą skalę"
 econvent.15.a: "Niesamowity!"
 econvent.100.t: "Zamknięcie branży"
 econvent.100.d: "Ze względu na zmieniającą się sytuację gospodarczą znaczna część naszej branży stała się niekonkurencyjna i musiała zostać zamknięta."
 econvent.100.a: "Odbudujemy."
 econvent.101.t: "Branże się przenoszą"
 econvent.101.d: "Ze względu na zmieniającą się sytuację gospodarczą wiele korporacji zdecydowało się na przeniesienie działalności za granicę, aby zwiększyć konkurencyjność. To zaszkodzi krajowej gospodarce."
 econvent.101.a: "Odbudujemy."
 econvent.102.t: "Branże Przenieś do [Root.GetNameDef]"
 econvent.102.d: "Due to changing economic circumstances in [FROM.GetNameDef], many [FROM.GetAdjective] corporations have decided to relocate to [Root.GetNameDef] to be more competitive. This will be a boon to our economy."
 econvent.102.a: "Doskonałe wieści."
 remove_civilian_industry_effect_tt: "Strać [?reduction_factor|%R0] fabryk cywilnych.\n"
 migrate_industry_to_random_effect_tt: "§R[?reduction_factor|%0]§! fabryk cywilnych przenosi się do §Y[relocation_location.GetNameDef]§!.\n"
 factories_migrated_to_us_tt: "[?FROM.ind_factories|Y0] civilian factories relocate from §Y[FROM.GetNameDef]§! to §Y[Root.GetNameDef]§!.\n"
 war.0.t: "[FROM.GetName] goes to war!"
 war.0.d: "[FROM.GetName] has gone to war today. The international community will be keeping a close eye as this conflict continues to rage on.\n"
 war.0.a: "Niepokojący"
 anti_bully.2.t: "Publiczne zmęczenie wojną"
 anti_bully.2.d: "We have decided war is our best course of action. However, in order to maintain support among the people we must either win this quickly or push quickly into foreign soil. The people will march as long as they see how necessary this war is. Boots march, drums beat, and the time for [FROM.GetName] to go to war is upon us!\n\n§YThis triggers the Public War Weariness System§!\n"
 anti_bully.2.a: "Musimy wygrać!"
 sco.1.t: "[FROM.GetName] złożył wniosek o nadanie statusu obserwatora SCO"
 sco.1.d: "Nowe państwo pragnie obserwować postępowanie SCO i być może w końcu zostać pełnoprawnym członkiem organizacji!"
 sco.1.a: "Nie widzimy powodu, dla którego ich prośba nie miałaby zostać spełniona."
 sco.1.b: "Nie możemy przyznać im tego statusu!"
 sco.2.t: "[FROM.GetName] złożył wniosek o nadanie statusu członka SCO"
 sco.2.d: "Nowe państwo pragnie zostać pełnoprawnym członkiem organizacji!"
 sco.2.a: "Nie widzimy powodu, dla którego ich prośba nie miałaby zostać spełniona."
 sco.2.b: "Nie możemy przyznać im tego statusu!"
 sco.3.t: "[FROM.GetName] proponuje nam przeprowadzenie wspólnych ćwiczeń wojskowych"
 sco.3.d: "To państwo członkowskie SCO proponuje wspólne ćwiczenia, aby zacieśnić naszą współpracę wojskową i zwiększyć zaufanie między naszymi obydwoma krajami."
 sco.3.a: "To świetna okazja dla naszych żołnierzy, aby zdobyć trochę doświadczenia!"
 sco.3.b: "Współpraca z [FROM.Getname] jest niemożliwa."
 sco.4.t: "[FROM.GetName] przyjął naszą ofertę!"
 sco.4.d: "Delegaci [FROM.GetAdjective] ciepło przyjęli naszą propozycję i nasze przygotowania do wspólnych ćwiczeń."
 sco.4.a: "Niech rozpocznie się gra!"
 sco.5.t: "[FROM.GetName] odrzucił naszą ofertę!"
 sco.5.d: "Delegaci [FROM.GetAdjective] odmówili przeprowadzenia z nami bardzo owocnych ćwiczeń wojskowych."
 sco.5.a: "Ich strata..."
 sco.6.t: "SCO rozpoczyna zakrojone na szeroką skalę ćwiczenia wojskowe"
 sco.6.d: "[FROM.GetAdjective] żołnierzy dołączyło dziś do tysięcy innych w tym, co jest opisywane jako ćwiczenia antyterrorystyczne pod auspicjami Szanghajskiej Organizacji Współpracy (SCO). Podczas gdy wielu chwaliło te ćwiczenia jako symptom udanej współpracy międzynarodowej, inni zareagowali znacznie mniej entuzjastycznie na ten ostatni rozwój wydarzeń. Amerykańscy i europejscy analitycy przytaczali rozmieszczenie samolotów dalekiego zasięgu i znaczną siłę ognia jako dowód, że ćwiczenia te nie są przeznaczone do ćwiczeń operacji antyterrorystycznych, ale jako dobrze uzbrojona próba generalna przed konfrontacją z Zachodem."
 sco.6.a: "Czy te groźne ćwiczenia mają na celu naszą korzyść?"
 sco.6.b: "Tylko terroryści mają się czego bać!"
 sco.6.c: "Ciekawy rozwój wydarzeń"
 sco.7.t: "[FROM.GetName] Uzyskuje członkostwo SCO"
 sco.7.d: "Po stopniowym procesie integracji, [FROM.GetLeader] ogłosiło dziś członkostwo swojego kraju w Szanghajskiej Organizacji Współpracy. Pełni nadziei obserwatorzy przedstawili ten rozwój jako dalszy postęp regionalnej współpracy gospodarczej i politycznej na kontynencie euroazjatyckim, podczas gdy bardziej pesymistyczni analitycy ubolewali nad rosnącym wpływem Chin i zagrożeniem, jakie to stwarza dla istniejącego porządku świata."
 sco.7.a: "Zagrożenie ze strony Chin wciąż rośnie…"
 sco.7.b: "Dobry dzień dla dyplomacji!"
 sco.8.t: "[FROM.GetName] Opuszcza SCO"
 sco.8.d: "W następstwie ponownej oceny chińskich działań przez obecny rząd [FROM.GetAdjective], [FROM.GetLeader] wycofał [FROM.GetNameDef] z Szanghajskiej Organizacji Współpracy. [CHI.GetLeader] nie skomentował jeszcze rozwoju sytuacji, ale organizacje medialne powiązane z chińskim rządem szybko ubolewały, że to odejście stanowi krok wstecz w zakresie integracji regionalnej."
 sco.8.a: "Chińska agresja wyalienowała ten naród."
 sco.8.b: "Smutny dzień dla współpracy międzynarodowej..."
 sco.9.t: "Chiny przejmują od Rosji stery władzy nad SzOW"
 sco.9.d: "Szanghajska Organizacja Współpracy była historycznie prowadzona jako wspólne przedsięwzięcie chińsko-rosyjskie. Jednak według doniesień chińskie niezadowolenie z tego porozumienia doprowadziło do zmuszenia Rosji do zajęcia niższego stanowiska w organizacji. Choć zarówno [CHI.GetLeader], jak i [SOV.GetLeader] milczą na temat tej walki o władzę, według doniesień rosyjscy urzędnicy są wściekli na Chińczyków i zgorzkniali z powodu upokorzenia słowiańskiego giganta, które miało miejsce na oczach innych państw członkowskich SCO. Geopolityczne konsekwencje tego posunięcia w zakresie hegemonii nad Azją Środkową będą prawdopodobnie znaczące."
 sco.9.a: "Chiny nie chcą dzielić się światłem reflektorów..."
 sco.10.t: "Chiny żądają, abyśmy wybrali stronę"
 sco.10.d: "Nasze ciągłe członkostwo zarówno w OUBZ, jak i w Szanghajskiej Organizacji Współpracy postawiło nas w trudnej sytuacji po rozłamie chińsko-rosyjskim. Chiny żądają teraz, abyśmy albo opuścili SCO i pozostali w sojuszu rosyjskim, albo pozostali w SCO i porzucili Rosjan. Wybór, którego dokonamy, niemal na pewno będzie miał znaczenie w zbliżającej się konfrontacji pomiędzy dwoma regionalnymi gigantami."
 sco.10.a: "Jesteśmy niczym, jeśli nie lojalni!"
 sco.10.b: "Czas opuścić ten tonący statek..."
 sco.11.t: "[FROM.GetName] zapewnia nam pomoc rozwojową!"
 sco.11.d: "Pod auspicjami Szanghajskiej Organizacji Współpracy rząd [FROM.GetAdjective] zapewnia naszym lokalnym firmom bardzo potrzebne fundusze i zasoby, aby ułatwić im projekty rozwojowe. Chociaż ta pomoc jest dobrą wiadomością dla naszej gospodarki, zwiększy ona stopień wpływu, jaki [FROM.GetNameDef] wywiera na nasz kraj."
 sco.11.a: "Dziękujemy za pomoc!"
 sco.12.t: "[FROM.GetName] utworzony $SHANGHAI_PACT$!"
 sco.12.d: "[FROM.GetName] utworzył $SHANGHAI_PACT$, aby rywalizować z [USA.GetFactionName]. Daliśmy im duży wpływ [FROM.GetAdjective] na nas, jesteśmy także członkami SCO, więc jesteśmy zmuszeni być członkami nowej frakcji."
 sco.12.a: "Dobra"
 taiwan.1.t: "228 Rajd ręka w rękę"
 taiwan.1.d: "Demonstracja solidarności. Utworzono łańcuch ludzki, w którym około dwóch milionów ludzi utworzyło 500-kilometrowy łańcuch ludzki. Zaczynając w porcie w Keelung, najdalej na północ wysuniętym mieście Tajwanu, łańcuch wił się w kierunku najdalej na południe wysuniętego krańca wyspy. Cel był dwojaki. Tajwańczycy pragnęli pokoju, ale protestowali również przeciwko rozmieszczeniu rakiet przez Chińską Republikę Ludową wymierzonych w Tajwan, ich wyspiarskiego sąsiada. Część symboliki demonstracji, szczególnie w momencie wydarzenia, w którym uczestnicy „odwracają się od Chin”, wyraźnie skręciła w stronę poparcia dla niepodległości Tajwanu, dlatego nie wzięli w niej udziału członkowie Pan-Blue Coalition, którzy kilka dni później odpowiedzieli na demonstrację własnym zgromadzeniem na całej wyspie."
 taiwan.1.a: "Nigdy nie zapominajmy o ofiarach."
 taiwan.2.t: "Tajfun Bilis"
 taiwan.2.d: "W ramach przygotowań do Bilis biura na całej wyspie zostały zamknięte. Oprócz zamknięcia przedsiębiorstw przełożono loty do i z wyspy oraz utworzono centrum pomocy dla tajfunu. W związku z zagrożeniem osuwiskami dla Tajwanu wydano ostrzeżenie o osuwiskach. Chociaż burza nie dotarła jeszcze na ląd, 22 sierpnia w Tajpej zginęła jedna osoba, po tym jak została pochowana przez osuwisko wywołane zbliżającym się tajfunem; stanowiło to pierwszą ofiarę śmiertelną spowodowaną przez Bilisa. Wraz ze zmianą rozkładu lotów zamknięto wiele lotnisk, a 23 sierpnia miała zostać zamknięta Tajwańska Giełda Papierów Wartościowych. Tymczasem szpitale wydłużały czas obsługi w oczekiwaniu na przyjęcie pacjentów. Członkowie tajwańskiej straży przybrzeżnej uregulowali działalność połowową ze względu na zagrożenie śmiercionośnym działaniem fal. Port w Kaohsiung był zamknięty przez cały czas trwania burzy. Ze względu na zwiększony popyt na warzywa w okresie poprzedzającym burzę koszt takiej żywności wzrósł o 20–30 procent.\n\nBilis był wysoce niszczycielskim cyklonem tropikalnym dla Tajwanu. Szkody w rolnictwie, rybołówstwie i leśnictwie wyspy wyniosły 133,5 mln dolarów. Tajfun spowodował 14 ofiar śmiertelnych, a dodatkowe 80 osób zostało rannych. Przerwy w dostawie prądu dotknęły około 600 000 gospodarstw domowych, a 400 domów na całym Tajwanie zostało zniszczonych. Po burzy kilkaset tysięcy rodzin doświadczyło niedoborów wody. W Cheng-Kung stacja pogodowa zarejestrowała podmuch wiatru o prędkości 281 km/h, który spowodował uszkodzenie anemometru stacji. Pojedyncze osunięcie się ziemi w mieście Jenai pochłonęło dziewięciu rolników. Dziesiątki tysięcy ludzi zostało wysiedlonych podczas burzy i przeniesionych do schronów ewakuacyjnych utworzonych przez rząd. We wschodnim hrabstwie Hualien silny wiatr zniszczył 250 domów. Wiatr powalił także drzewa i powalił lekkie pojazdy, blokując drogi. Obfite opady deszczu związane z Bilis zalały około 40 000 ha sadów i pól ryżowych. Po przejściu Bilisa przez Tajwan wyspę nawiedziło trzęsienie ziemi o magnitudzie 5,7, pogarszając i tak już pogorszone warunki."
 taiwan.2.a: "Czas na odbudowę."
 taiwan.3.t: "Wybory prezydenckie na Tajwanie"
 taiwan.3.d: "Są to drugie w historii bezpośrednie wybory prezydenckie w Republice Chińskiej, w których wybiera się Prezydenta i Wiceprezydenta Republiki Chińskiej na 10. kadencję zgodnie z Konstytucją z 1947 r. Może to położyć kres ponad pół wieku rządów Kuomintangu na Tajwanie, odkąd wyborcy KMT podzielili się na pół.\n\nChociaż zdeklarowany były gubernator Tajwanu James Soong był bardziej popularny i konsekwentnie zajmował wyższe miejsca w sondażach, poniósł porażkę o nominację Kuomintangu. W rezultacie ogłosił swoją kandydaturę jako kandydat niezależny. Kuomintang odpowiedział wydaleniem Soonga i 21 jego sojuszników. Pozwali Soonga o kradzież, zarzucając, że jako sekretarz generalny partii ukradł miliony tajwańskich dolarów w gotówce przeznaczonej dla rodziny zmarłego prezydenta Chiang Ching-kuo i ukrył je w Chunghsing Bills Finance Co. Soong bronił się, mówiąc działał pod kierunkiem Lee, ale jego historia była w dużej mierze nieprzekonująca. Początkowo utrzymując zdecydowaną przewagę w sondażach, Soong przegrał nieco ponad 300 000 głosów, a skandal finansowy, który zszarganił jego wizerunek jako czystego polityka, prawdopodobnie doprowadzi do jego porażki.\n\nDemokratyczna Partia Postępu kieruje byłym burmistrzem Tajpej Chen Shui- Bian na prezydenta. Po kandydowaniu w wyborach w 1996 r. z radykalnym programem niepodległościowym i przegranej przez osunięcie się ziemi, DPP w maju 1999 r. złagodziła swoje stanowisko, wydając „Rezolucję w sprawie przyszłości Tajwanu”. Rezolucja zaakceptowała status quo i promowała umiarkowane poglądy że Tajwan był już niepodległy, zatem jakakolwiek formalna deklaracja nie byłaby pilnie konieczna, jeśli w ogóle. Uwzględniono także zobowiązanie, że wszelkie zmiany w międzynarodowym statusie Tajwanu będą musiały zostać dokonane w drodze referendum, co łagodzi obawę, że w przypadku wyboru rząd DPP jednostronnie ogłosi niepodległość bez zgody społeczeństwa. Bilet Chen-Lu obiecuje także bardziej agresywną walkę z czarnym złotem, zapewnienie większych środków na usługi społeczne i być bardziej przyjaznym dla środowiska, np. sprzeciwem wobec energii jądrowej."
 taiwan.3.a: "Chen Shui-bian (DPP)"
 taiwan.3.b: "Lien Chan (KMT)"
 taiwan.3.c: "James Soong (niezależny)"
 taiwan.4.t: "Utworzono Administrację Straży Przybrzeżnej"
 taiwan.4.d: "CGA łączy Dowództwo Straży Przybrzeżnej, Biuro Policji Morskiej i kilka kutrów z Tajwańskiej Dyrekcji Generalnej Ceł i Ministerstwa Finansów. CGA formalnie jednoczy organy ścigania na obszarach przybrzeżnych i morskich. Będzie to oznaczać wiele działań dla młodej agencji, która w najbliższej przyszłości będzie uczestniczyć w licznych operacjach poszukiwawczo-ratowniczych i przeciwdziałaniu przemytowi.\n\nAdministracja Straży Przybrzeżnej Rady ds. Oceanów (CGA) jest odpowiedzialna za utrzymywanie prawa i porządku, chroniąc zasoby wód terytorialnych Republiki Korei otaczających Tajwan, Penghu, Kinmen, Wyspy Matsu, Green Island, Orchid Island, Dongsha Islands i Nansha Islands, a także zapewniając pierwszą linię obrony wzdłuż obszarów przybrzeżnych przed przemytnikami i nielegalnych imigrantów. CGA jest uważana za cywilną agencję egzekwowania prawa podlegającą Radzie ds. Oceanów przy rządzie wykonawczym Yuan, chociaż w sytuacjach awaryjnych może zostać włączona jako część Sił Zbrojnych Republiki Chińskiej.\n\nAdministracja Straży Przybrzeżnej jest kierowana przez jednego ministra i trzech wiceministrów. CGA składa się z ośmiu departamentów, jednego biura i pięciu grup zadaniowych, a także Dyrekcji Generalnej Patrolu Morskiego i Dyrekcji Generalnej Patrolu Przybrzeżnego. Jego jurysdykcja obejmuje wody otaczające Kinmen, Matsu, Penghu i główną wyspę Tajwan, aby zapewnić właściwą ochronę linii brzegowej o długości 1819,8 km i 540 000 km2 „Błękitnego Terytorium”, które jest 15 razy większe niż wyspa Tajwan."
 taiwan.4.a: "Dla bezpiecznego wybrzeża."
 taiwan.5.t: "Otwarcie Narodowego Uniwersytetu w Kaohsiung"
 taiwan.5.d: "Uniwersytet ma na celu zmniejszenie luki w edukacji między południowym i północnym Tajwanem oraz promowanie gospodarki obszaru południowego.\n\nNa uniwersytecie istnieje dwadzieścia wydziałów, w tym języki i literatura zachodnia, język i literatura wschodnioazjatycka, architektura, kreatywne projektowanie , Kinezjologia, Studia w zakresie zdrowia i wypoczynku, Prawo, administracja i prawo, Prawo gospodarcze i finansowe, Ekonomia stosowana, Matematyka stosowana, Chemia stosowana, Elektrotechnika, Inżynieria lądowa i środowiska, Nauki przyrodnicze oraz Zarządzanie przemysłem i biznesem w regionie Azji i Pacyfiku, Sztuki tradycyjne , Finanse, Zarządzanie informacją i Fizyka stosowana. Wśród tych wydziałów Zarządzanie Przemysłem i Biznesem w regionie Azji i Pacyfiku jest specjalnie zaprojektowane do kultywowania elit przemysłowych.\n\nNiezwykłą cechą tej szkoły jest otwarta przestrzeń. Na granicach kampusu nie ma murów. Mieszkańcy mieszkający w pobliżu tej szkoły mogą dojść do kampusu lub ćwiczyć, korzystając ze sprzętu na siłowni. Różnorodność biologiczna jest również godną uwagi cechą NUK. W stawie Water Land Park żyje ponad 60 gatunków ryb."
 taiwan.5.a: "To pomoże południu."
 taiwan.6.t: "Umowa o handlu usługami przez Cieśninę została ratyfikowana"
 taiwan.6.d: "Po zatwierdzeniu przez tajwańskiego legislaturę CSSTA, umowa o wolnym handlu między Tajwanem a Chinami kontynentalnymi, oficjalnie weszła w tajwańskie prawo. Porozumienie to oznacza poważną poprawę stosunków między obiema stronami i znacząco usprawni handel usługami przez cieśninę. Krytycy porozumienia nie są jednak przekonani, że nie stanowi ono zagrożenia dla politycznej autonomii Tajwanu od Chin."
 taiwan.6.a: "Tajwan zbliża się do Chin."
 taiwan.7.t: "Protestujący „Słoneczniki” okupują tajwańską legislaturę"
 taiwan.7.d: "Członkowie kierowanego przez studentów Ruchu Słoneczników przeskoczyli wczoraj płot oddzielający ich od tajwańskiej legislatury po protestach przeciwko próbom przyjęcia przez rząd kontrowersyjnej umowy o handlu usługami przez cieśninę (CSSTA), umowy o wolnym handlu z Chinami kontynentalnymi. Ruch protestacyjny wzbudził obawy związane z pośpiesznym podejściem rządu do ratyfikacji traktatu oraz brakiem przejrzystości podczas negocjacji nad nim, a także treści samego traktatu."
 taiwan.7.a: "Cios w KMT."
 taiwan.8.t: "„Plan działania prowadzący do zjednoczenia” ChRL"
 taiwan.8.d: "Rząd [CHI.GetLeader] zaproponował nam „Plan działania na rzecz zjednoczenia”, wyznaczający drogę Tajwanu do ostatecznego powrotu pod chińską kontrolę jako Specjalny Region Administracyjny. Propozycja zawiera wiele gwarancji kontynuacji tajwańskiej demokracji i autonomii politycznej, ale może to nie wystarczyć tajwańskim przeciwnikom do ponownego zjednoczenia z kontynentem. Nie wiadomo, jak Chiny mogą zareagować, jeśli odrzucimy ten plan."
 taiwan.8.a: "Powinniśmy zaakceptować plan."
 taiwan.8.b: "Tajwan to nie Chiny!"
 taiwan.9.t: "Doniesienia o podejrzanej działalności chińskiego wywiadu"
 taiwan.9.d: "Nasze służby wywiadowcze donoszą o wzmożonej aktywności chińskich agentów na naszym terytorium. To działanie nie oznacza niczego szczególnego, ale równie dobrze może oznaczać, że Chiny coś planują. Powinniśmy zdecydować, czy zaangażowanie naszych służb wywiadowczych w dochodzenie w tej sprawie będzie dobrym sposobem na wykorzystanie ich czasu."
 taiwan.9.a: "Wydaje się nieszkodliwy."
 taiwan.9.b: "Powinniśmy zbadać."
 taiwan.10.t: "Chiny żądają zniesienia ustawy o stosunkach z Tajwanem!"
 taiwan.10.d: "ChRL zażądała, abyśmy unieważnili ustawę o stosunkach z Tajwanem, która określa nasze obecne stosunki z władzami Tajwanu. Żądanie to stanowi niewątpliwie preludium do jeszcze bardziej agresywnych działań wobec Tajwanu, niż to, co widzieliśmy już w ostatnich miesiącach. Jeśli cofniemy tę ustawę, ryzyko konfliktu w Cieśninie Tajwańskiej drastycznie wzrośnie."
 taiwan.10.a: "To żądanie jest absurdalne!"
 taiwan.10.b: "Lepiej będzie dla nas, jeśli odpuścimy..."
 taiwan.11.t: "Plan działania został zaakceptowany!"
 taiwan.11.d: "Tajpej zgodziło się wydać wspólne oświadczenie, w którym zobowiąże się ich i naszą stronę do ewentualnego zjednoczenia!"
 taiwan.11.a: "Radować się!"
 taiwan.12.t: "Plan działania został odrzucony!"
 taiwan.12.d: "Tajpej odmówiło podjęcia zobowiązania dotyczącego ostatecznego zjednoczenia naszego podzielonego kraju. Moglibyśmy albo poczekać na warunki, które z większym prawdopodobieństwem doprowadzą do przyjęcia naszej propozycji, i wtedy spróbować ponownie, albo moglibyśmy spróbować skorzystać z innych alternatyw…"
 taiwan.12.a: "Zły wybór z ich strony."
 taiwan.13.t: "Strajk Związku Stewardów w Taoyuan"
 taiwan.13.d: "Związek Stewardów Taoyuan, reprezentujący około 2500 członków personelu pokładowego China Airlines, organizuje tam pierwszy strajk w historii tajwańskiego lotnictwa. W rezultacie łącznie 122 loty pasażerskie China Airlines z międzynarodowego lotniska Taoyuan i Taipei Songshan zostały obecnie odwołane, a 20 000 pasażerów utknęło na miejscu. Unia przedstawiła nam siedem żądań, które należy zaakceptować w celu uzyskania lepszych warunków pracy."
 taiwan.13.a: "Zaakceptuj tam wymagania"
 taiwan.13.b: "Nigdy się nie cofamy"
 taiwan.14.t: "Uderzenie nie powiodło się"
 taiwan.14.d: "Po tym, jak zaprzeczyliśmy tym żądaniom, strajk wkrótce wybuchł. Wszyscy wracają już do pracy."
 taiwan.14.a: "Nigdy nie mieli szans"
 taiwan.15.t: "Strajk trwa"
 taiwan.15.d: "Po tym, jak zaprzeczyliśmy tym żądaniom, strajk stał się jeszcze bardziej intensywny. Nie wygląda na to, że strajk szybko się zakończy."
 taiwan.15.a: "Przynajmniej próbowaliśmy"
 taiwan.16.t: "Czołg spadł z mostu"
 taiwan.16.d: "An army CM-11 tank toppled into a creek in Pingtung County as it was returning to base from a training exercise yesterday morning, killing three of the five soldiers onboard. The driver sustained only minor injuries and pulled himself out of the tank. The four others, who were inside the gun turret, could not escape through the turret's hatches because the tank was upside down."
 taiwan.16.a: "Zbadaj, jak to się mogło stać"
 taiwan_news.1.t: "Umowa o handlu usługami przez cieśninę została ratyfikowana"
 taiwan_news.1.d: "Po zatwierdzeniu przez tajwańskiego legislaturę CSSTA, umowa o wolnym handlu między Tajwanem a Chinami kontynentalnymi, oficjalnie weszła w tajwańskie prawo."
 taiwan_news.1.a: "Tajwan zbliża się do Chin."
 taiwan_news.2.t: "Protestujący „Słoneczniki” okupują tajwańską legislaturę"
 taiwan_news.2.d: "Członkowie kierowanego przez studentów Ruchu Słoneczników przeskoczyli wczoraj płot oddzielający ich od tajwańskiej legislatury po protestach przeciwko próbom przyjęcia przez rząd kontrowersyjnej umowy o handlu usługami przez cieśninę (CSSTA), umowy o wolnym handlu z Chinami kontynentalnymi. Ruch protestacyjny wzbudził obawy związane z pośpiesznym podejściem rządu do ratyfikacji traktatu oraz brakiem przejrzystości podczas negocjacji nad nim, a także treści samego traktatu."
 taiwan_news.2.a: "Cios w KMT."
 taiwan_news.3.t: "Elementy wojska podczas zamachu stanu na Tajwanie"
 taiwan_news.3.d: "Frakcja tajwańskich oficerów wojskowych zaczęła przejmować kluczowe lokalizacje na całej wyspie Tajwan. [TAI.Getleader] ogłosił stan nadzwyczajny w kraju i zmobilizował tych, którzy pozostają lojalni wobec rządu. Czas pokaże, czy wysiłki Prezydenta zakończą się sukcesem.\n\nChociaż deklarowanym celem przywódców zamachu stanu jest zaradzenie niezadowoleniu z administracji [TAI.GetLeader], wiele znanych osobistości ma bliskie powiązania z Chinami. Mimo to stopień zaangażowania Chin w tę próbę zamachu stanu pozostaje niejasny."
 taiwan_news.3.a: "Przyszłość Tajwanu wisi na włosku."
 taiwan_news.4.t: "Tajwański zamach stanu powiódł się"
 taiwan_news.4.d: "W następstwie nieudanej próby zgromadzenia przez [TAI.Getleader] poparcia dla zamachu stanu kontrolę nad krajem przejęli oficerowie wojskowi lojalni wobec prochińskiej frakcji na Tajwanie. Choć funkcjonariusze obiecali ostateczny powrót do demokracji, polityczna autonomia Tajwanu od kontynentu jest niewątpliwie zagrożona. Biorąc pod uwagę niewypowiedziane, ale powszechnie znane poparcie Chin dla zamachu stanu, prawdopodobieństwo przyjęcia uchwały Rady Bezpieczeństwa w odpowiedzi na to wydarzenie jest wysoce nieprawdopodobne."
 taiwan_news.4.a: "Nowa era w historii Tajwanu."
 taiwan_news.5.t: "Tajwański zamach stanu nie powiódł się"
 taiwan_news.5.d: "[TAI.Getleader] wyszedł dziś triumfalnie, gdy ostatni uczestnicy zamachu stanu poddali się tajwańskiej policji. W ciągu ostatnich dwóch tygodni spiskowcom zamachu stanu nie udało się zdobyć poparcia narodu ani innych żołnierzy. Ten brak wsparcia przyczynił się do istniejących braków w zasobach i morale, co doprowadziło do masowego poddania się władzom oddziałów zwolenników zamachu stanu w całym kraju. [TAI.Getleader] zapewnił dziennikarzy, że narodowi wyspiarskiemu szybko zostanie przywrócona stabilność i spokój, podczas gdy Chiny nie skomentowały jeszcze ostatnich wydarzeń."
 taiwan_news.5.a: "Kryzys został zażegnany."
 taiwan_news.5.b: "Wygląda na to, że potrzebujemy innego rozwiązania."
 taiwan_news.6.t: "Tajwan uchwala ustawę mającą na celu przeciwdziałanie chińskiej ingerencji"
 taiwan_news.6.d: "Mając na celu udaremnienie chińskich prób ingerencji w proces wyborczy na Tajwanie, [TAI.GetLeader] zdołał uchwalić w parlamencie kontrowersyjną „ustawę antyinfiltracyjną”. Ustawa zabrania wrogim mocarstwom zagranicznym prowadzenia kampanii, lobbowania, przekazywania darowizn na cele polityczne i szerzenia dezinformacji. Ustawodawcy opozycji zdecydowanie sprzeciwili się tej ustawie, podobnie jak Biuro ds. Tajwanu w Pekinie. Obaj ostro skrytykowali [TAI.GetLeader] jako wprowadzenie „zielonego terroru”, który przyczynia się do powstawania atmosfery paranoi i strachu. Partia rządząca [TAI.GetLeader] broniła tego posunięcia jako aktu koniecznego, biorąc pod uwagę znaczne zagrożenie, jakie Chiny kontynentalne stanowią dla terytorium wyspy."
 taiwan_news.6.a: "Tajwan kontratakuje."
 hongkong.1.t: "Chińczycy odmówili odwrócenia aneksji!"
 hongkong.1.d: "Chiny odrzuciły nasze groźby, nie pozostawiając nam innego wyboru, jak tylko zastosować się do ich zaleceń."
 hongkong.1.a: "Wygląda na to, że już się nas nie boją."
 hongkong.2.t: "Chiny wysyłają wojska do Hongkongu"
 hongkong.2.d: "Po protestach w Specjalnym Regionie Administracyjnym Hongkongu Chiny wydały rozkaz, aby wiele jednostek Armii Ludowo-Wyzwoleńczej wyszło na ulice Hongkongu, aby „przywrócić prawo i porządek”. [CHI.GetLeader] zapewnił „pokojowych demonstrantów”, że nie będą oni celem ataków, a wszyscy aresztowani będą traktowani zgodnie z międzynarodowym prawem dotyczącym praw człowieka. Jednak wielu w Hongkongu i za granicą wyraziło sceptycyzm co do tego, w jakim stopniu chińskie wojska będą powściągliwe wobec demonstrantów."
 hongkong.2.a: "Ta akcja jest nikczemna!"
 hongkong.2.b: "Chiny zrobiły, co musiały."
 hongkong.2.c: "To nie nasza sprawa."
 hongkong.3.t: "Chiny aneksują Hongkong"
 hongkong.3.d: "Chiny postanowiły położyć kres specjalnemu statusowi Hongkongu jako Specjalnego Regionu Administracyjnego, formalnie anektując terytorium. Powinniśmy zdecydować o reakcji naszego kraju na to ważne wydarzenie."
 hongkong.3.a: "Ta akcja jest nikczemna!"
 hongkong.3.b: "Chiny zrobiły, co musiały."
 hongkong.3.c: "To nie nasza sprawa."
 hongkong.4.t: "Aneksja Hongkongu przez Chiny wymaga reakcji"
 hongkong.4.d: "Dokonując rażącego naruszenia Ustawy Zasadniczej wynegocjowanej między nami a Chińczykami, Chiny formalnie zaanektowały Specjalny Region Administracyjny. Jako gwarant 50-letniej autonomii Hongkongu musimy zareagować na ten nielegalny akt."
 hongkong.4.a: "Powinniśmy zagrozić podjęciem działań militarnych."
 hongkong.4.b: "Powinniśmy grozić środkami gospodarczymi."
 hongkong.4.c: "Powinniśmy skrytykować to posunięcie."
 hongkong.5.t: "Wielka Brytania grozi akcją militarną!"
 hongkong.5.d: "Brytyjczycy zareagowali bardziej agresywnie, niż się spodziewaliśmy, na naszą aneksję ich byłego terytorium kolonialnego. Powinniśmy rozważyć, czy zgodzić się na ich żądania."
 hongkong.5.a: "To nie jest wzgórze, na którym chcemy umrzeć."
 hongkong.5.b: "Niech przyjdą."
 hongkong.6.t: "Wielka Brytania grozi nam środkami gospodarczymi!"
 hongkong.6.d: "Brytyjczycy postanowili zagrozić nam sankcjami, jeśli nie cofniemy aneksji ich byłego terytorium kolonialnego. Powinniśmy rozważyć, czy zastosować się do ich żądań."
 hongkong.6.a: "Powinniśmy unikać konfrontacji."
 hongkong.6.b: "Ich groźby nic nie znaczą!"
 hongkong.7.t: "Chińczycy zgodzili się cofnąć aneksję"
 hongkong.7.d: "Wyraźnie pod wrażeniem brytyjskiej potęgi Chińczycy wycofali się w kwestii Hongkongu."
 hongkong.7.a: "Nasze groźby nadal wywierają skutek!"
 hongkong_news.1.t: "Hongkong wstrząsany powszechnymi protestami"
 hongkong_news.1.d: "Po decyzji Chin o wykluczeniu możliwości wyboru szefa rządu Hongkongu w głosowaniu powszechnym na terytorium Chin wybuchły masowe protesty. [HKG.GetLeader] oświadczył, że chociaż rząd Hongkongu szanuje prawo mieszkańców Hongkongu do pokojowego i legalnego wyrażania swoich poglądów, przemoc i bezprawie nie będą tolerowane. Odpowiedź Chin na obecny kryzys pozostaje niewiadomą, ponieważ [CHI.GetLeader] nie skomentował ostatnich wydarzeń."
 hongkong_news.1.d_limit: "W następstwie decyzji Chin, że dyrektor naczelny Hongkongu może zostać wybrany wyłącznie w głosowaniu powszechnym, po uprzednim zatwierdzeniu kandydatów, na terytorium Chin wybuchły masowe protesty. [HKG.GetLeader] stwierdził, że chociaż rząd Hongkongu szanuje prawo mieszkańców Hongkongu do pokojowego i legalnego wyrażania swoich poglądów, przemoc i bezprawie nie będą tolerowane. Czas pokaże, jaka będzie reakcja Chin na obecny kryzys, ponieważ w [CHI.GetLeader] nie skomentowano ostatnich wydarzeń."
 hongkong_news.1.d_reunification: "Po ogłoszeniu przez Chiny, że w 2047 r. Hongkong straci swój specjalny status i całkowicie powróci pod chińską kontrolę, na terytorium Chin wybuchły masowe protesty. [HKG.GetLeader] oświadczył, że chociaż rząd Hongkongu szanuje prawo mieszkańców Hongkongu do pokojowego i legalnego wyrażania swoich poglądów, przemoc i bezprawie nie będą tolerowane. Odpowiedź Chin na obecny kryzys pozostaje niewiadomą, ponieważ [CHI.GetLeader] nie skomentował ostatnich wydarzeń."
 hongkong_news.1.d_annexed: "Po niezwykle kontrowersyjnej aneksji Hongkongu przez Chiny na terytorium Chin wybuchły masowe protesty. [HKG.GetLeader] stwierdził, że chociaż rząd Hongkongu szanuje prawo mieszkańców Hongkongu do pokojowego i legalnego wyrażania swoich poglądów, przemoc i bezprawie nie będą tolerowane. Czas pokaże, jaka będzie reakcja Chin na obecny kryzys, ponieważ w [CHI.GetLeader] nie skomentowano ostatnich wydarzeń."
 hongkong_news.1.a: "Ciekawy rozwój wydarzeń"
 hongkong_news.1.b: "To dla nas zła wiadomość."
 hongkong_news.2.t: "Protesty w Hongkongu wygasają"
 hongkong_news.2.d: "Protesty w Specjalnym Regionie Administracyjnym Hongkongu przeciwko niedawnym działaniom Chin w ostatnich dniach stopniowo słabną i praktycznie ustały. Działania policji na terytorium Chin nie spotkały się z żadnym oporem, a wiele osób, które wcześniej wyszło na ulice, wróciło do swoich domów. Nie wiadomo, co to oznacza dla stosunków między Chinami a niespokojnym terytorium, które wyznaje znacząco odmienne wartości polityczne od tego pierwszego. Być może jednym ze wskaźników tego, co ma nadejść, był transparent pozostawiony przez protestujących w widocznym miejscu w centrum miasta z napisem „Wrócimy”."
 hongkong_news.2.a: "Ciekawy rozwój wydarzeń"
 hongkong_news.2.b: "Wiedzą, że ich sprawa jest daremna."
 hongkong_news.3.t: "Coraz większa skala protestów w Hongkongu"
 hongkong_news.3.d: "Szybko nasiliły się protesty przeciwko chińskim działaniom na terytorium Hongkongu, a analitycy powszechnie zgadzają się, że protesty weszły w nowy etap pod względem skali i taktyki. Czas pokaże, jak rządy Chin i Hongkongu zareagują na tę nową eskalację, ale według doniesień urzędnicy obu rządów są coraz bardziej urażeni wpływem protestów na ich żywotne interesy. Ze swojej strony protestujący nie chcą ustąpić, dopóki rządy Chin i Hongkongu nie spełnią ich żądań."
 hongkong_news.3.a: "Mieszkańcy Hongkongu nie będą siedzieć cicho…"
 hongkong_news.3.b: "Zostaną w domu, jeśli będą wiedzieć, co jest dla nich dobre!"
 korea.1.t: "Chiny żądają naszego wycofania się z Półwyspu Koreańskiego"
 korea.1.d: "ChRL zażądała, abyśmy wycofali nasze wojska chroniące Republikę Korei z tego, co określa jako jej „strefa wpływów”. Żądanie to stanowi niewątpliwie preludium do agresywnych działań wobec Republiki Korei. Jeśli wycofamy nasze wojska z półwyspu, ryzyko konfliktu w strefie zdemilitaryzowanej dramatycznie wzrośnie."
 korea.1.a: "To żądanie jest absurdalne!"
 korea.1.b: "Lepiej będzie dla nas, jeśli odpuścimy..."
 korea.2.t: "Chiny zachęcają nas do inicjowania reform gospodarczych"
 korea.2.d: "[CHI.GetLeader] nalega, aby nasz rząd poszedł w ślady Chin i zainicjował reformy liberalizujące rynek. Chociaż doświadczanie takiego samego szybkiego wzrostu gospodarczego jak Chiny w latach 80. jest kuszącą propozycją, powinniśmy porównać to z niestabilnością, która nieuchronnie wynikałaby z naszego dążenia do takich reform."
 korea.2.a: "To nie jest czas na reformy!"
 korea.2.b: "Inicjowanie drobnych reform."
 korea.2.c: "Zainicjuj umiarkowane reformy."
 korea.2.e: "Zainicjuj poważne reformy."
 korea.3.t: "[NKO.GetLeader] zapowiedział nowe reformy gospodarcze"
 korea.3.d: "Pod presją Chin, by przeprowadzić reformy, Korea Północna rozpoczęła proces liberalizacji gospodarczej, który, jak wielu ma nadzieję, podniesie poziom życia w „królestwie pustelniczym”. Podczas gdy wielu ekonomistów chwaliło początek tego procesu reform, inni wyrażali obawy, czy szybkość reform może spowodować niestabilność w kraju, który dostosował się do całkowicie planowanej gospodarki."
 korea.3.a: "Zachęcające wieści?"
 korea.4.t: "Rozłam chińsko-północnokoreański"
 korea.4.d: "W ostatnich tygodniach krytyka reżimu [NKO.GetLeader] w mediach powiązanych z chińskim rządem dramatycznie wzrosła. Krytyka ta atakuje ciągły problem nuklearny Korei Północnej oraz niepowodzenie państwa północnokoreańskiego w poprawie warunków życia swoich obywateli poprzez liberalizację gospodarczą, tak jak to robiły Chiny w ostatnich dziesięcioleciach.\n\nChociaż [CHI.GetLeader] milczy w tej kwestii, powszechnie uważa się, że że te organizacje medialne nie rozpoczęłyby tak zjadliwej krytyki niegdyś bliskiego sojusznika bez milczącej zgody [CHI.GetLeader]. Wielu obserwatorów postrzega to jako kulminację chińskiej frustracji wobec dynastii Kim i być może chęć powołania alternatywnego rządu, bardziej stabilnego i zgodnego z życzeniami Chin."
 korea.4.a: "Tylko [CHI.GetLeader] wie, dokąd to zmierza..."
 korea.5.t: "Rozpoczęcie rozmów"
 korea.5.d: "Podstawowym żądaniem Północy jest zaprzestanie wspólnych ćwiczeń wojskowych ze Stanami Zjednoczonymi, ćwiczeń, które postrzegają jako przygotowania do inwazji na ich terytorium. Jednak te ćwiczenia są powszechnie postrzegane przez nasze wojsko jako niezbędne przygotowania na wypadek ataku Korei Północnej. Zgoda na zaprzestanie tych ćwiczeń byłaby zatem poważnym hazardem, w którym bezpieczeństwo naszego kraju jest zagrożone."
 korea.5.d_NKO: "Podstawowym żądaniem Południa jest zaprzestanie naszych testów broni jądrowej, testów, które postrzegają jako dowód naszych agresywnych zamiarów. Jednak nasz program broni jądrowej jest postrzegany przez wojsko jako ważny środek odstraszający przed inwazją USA. Ponadto program i testy, które są niezbędne do jego kontynuacji, pomagają wzmocnić legitymację naszego rządu. Zgoda na zaprzestanie tych testów byłaby zatem poważnym hazardem, w którym zarówno bezpieczeństwo naszego kraju, jak i naszego rządu jest zagrożone."
 korea.5.a: "Nasz kraj nigdy już nie będzie całością, jeśli nie podejmiemy ryzyka..."
 korea.5.b: "Niektóre ryzyko jest zbyt duże, aby je podjąć."
 korea.6.t: "Rozpoczęły się koreańskie rozmowy pokojowe"
 korea.6.d: "Od ponad pół wieku Korea Północna i Południowa formalnie pozostają w stanie wojny. Ten zamrożony konflikt od czasu do czasu zaostrzał się, prowadząc do starć między obiema stronami wzdłuż spornych granic morskich lub w strefie zdemilitaryzowanej. Teraz obie strony łączą siły, mając nadzieję na zakończenie tego stanu rzeczy i osiągnięcie deeskalacji na Półwyspie Koreańskim poprzez formalny traktat pokojowy. Negocjacje traktatu pokojowego są powszechnie postrzegane jako ważny pierwszy krok w kierunku zjednoczenia Półwyspu Koreańskiego."
 korea.6.a: "Czy obu stronom uda się osiągnąć kompromis?"
 korea.7.t: "[CHI.GetLeader] Głosy popierają zjednoczenie Korei"
 korea.7.d: "Chiny od zawsze z niepokojem podchodziły do ​​perspektywy zjednoczonej Korei sprzymierzonej ze Stanami Zjednoczonymi tuż za rogiem. Obserwatorzy byli zatem zaskoczeni jednoznacznym poparciem [CHI.GetLeader] dla zjednoczenia, co według niektórych źródeł zaskoczyło północnokoreańskie władze. Biorąc pod uwagę znaczące wpływy Chin na Półwyspie Koreańskim, to oświadczenie prawdopodobnie wywrze presję na obie strony, aby zasiadły do ​​stołu negocjacyjnego."
 korea.7.a: "Czy zmiany wiszą w powietrzu?"
 korea.8.t: "Radykalny ruch koreański zyskuje na popularności"
 korea.8.d: "Nierówności ekonomiczne w Republice Korei przyczyniły się do wzrostu niezadowolenia wśród niższych klas społecznych w kraju. Tysiące aktywistów internetowych zaczęło wzywać do większej równości poprzez ustanowienie autonomii na poziomie społeczności w całej Republice Korei. Chociaż ruch jest pozbawiony przywódcy i w związku z tym brakuje mu centralnego, jasnego przesłania, większość jego członków wydaje się pragnąć likwidacji państwa koreańskiego i powiązanych z nim czeboli na rzecz systemu, który rozdziela władzę polityczną i gospodarczą pomiędzy bezpośrednio wybieranych przedstawicieli na poziomie społeczności.\n\nTa nowa ideologia, która odrzuca fundamentalne ideologie zarówno Korei Południowej, jak i KRLD, stanowi znaczące odejście od tradycyjnej polityki południowokoreańskiej radykalnej lewicy, która albo promowała lewicową politykę w ramach istniejącej Korei Południowej systemu politycznego lub wzywał do utworzenia państwa na wzór Korei Północnej."
 korea.8.a: "Coś się dzieje w Republice Korei..."
 korea.9.t: "Rebelianci na południu proszą o nasze wsparcie"
 korea.9.d: "Przedstawiciele Koreańskiego Ruchu Wyzwolenia Narodowego, pragnący obalić rząd na Południu, przybyli do nas z prośbą o sojusz w celu otwarcia nowego frontu wzdłuż strefy zdemilitaryzowanej."
 korea.9.a: "Dołączymy się do ich walki!"
 korea.9.b: "Będziemy oglądać z boku."
 JUCHE_FACTION: "Koreański Front Antyimperialistyczny"
 korea.10.t: "Korea Południowa żąda, abyśmy zakończyli ochronę Północy"
 korea.10.d: "Korea Południowa od dłuższego czasu stara się pokazać, że nie jest już krajem zależnym od interesów USA. Relacje między naszymi dwoma krajami są na rekordowo wysokim poziomie, podczas gdy nasze relacje z Północą w większości pozostają w stagnacji. Teraz delegacja Korei Południowej przybyła z wnioskiem o rozwiązanie traktatu obronnego między nami a Koreańczykami z Północy. Jeśli przychylimy się do ich prośby, nie będziemy już pomagać Korei Północnej w przypadku inwazji z zewnątrz."
 korea.10.a: "Będziemy wspierać naszych sojuszników!"
 korea.10.b: "Północ nie jest warta naszej ochrony."
 korea.11.t: "Koreańskie firmy zbrojeniowe oferują produkty"
 korea.11.d: "Republika Korei jest dobrze znana ze swojej zdolności do produkcji wysokiej jakości broni po stosunkowo przystępnych cenach. Powinniśmy rozważyć zakup części ich sprzętu, jednak nasze środki nie są nieograniczone, dlatego powinniśmy wybierać mądrze."
 korea.11.a: "Kup koreańskie czołgi."
 korea.11.b: "Zakup koreańskiej artylerii samobieżnej."
 korea.11.c: "Kup koreańskie samoloty szkoleniowe."
 korea.11.e: "Kup koreańskie karabiny szturmowe."
 korea.11.f: "Odrzuć ofertę."
 korea.12.t: "[FROM.GetName] Zgadza się na handel bronią!"
 korea.12.d: "Przedstawiciele tego kraju zgodzili się na import od nas broni, zwiększając nasze przychody i nasze wpływy międzynarodowe."
 korea.12.a: "Rośnie nasza międzynarodowa pozycja!"
 korea.13.t: "Pekin i Seul wspólnie krytykują działania Japonii podczas II wojny światowej"
 korea.13.d: "W rzadkim posunięciu rządy Chin i Republiki Korei wydały wspólne oświadczenie, w którym krytykują działania Japonii w czasie wojny i późniejszą odmowę pełnego odpokutowania za nie. Wielu obserwatorów zinterpretowało to posunięcie jako część wysiłków Seulu mających na celu odciągnięcie Chin od wsparcia dla Korei Północnej. Chociaż Pjongjang wyraził poparcie dla wspólnego potępienia w [KOR.GetLeader] i [CHI.GetLeader], według doniesień [NKO.GetLeader] jest zaniepokojony oznakami wskazującymi, że Chiny w coraz większym stopniu faworyzują Seul."
 korea.13.a: "Nigdy nie zapomnimy tego, co zrobili."
 korea.13.b: "Ich krytyka jest męcząca..."
 korea.13.c: "Przeszłość rzuca długi cień..."
 korea.14.t: "Chiny unieważniają traktat obronny z Koreą Północną"
 korea.14.d: "Po usunięciu amerykańskiej obecności wojskowej z Korei Południowej Chiny zgodziły się wycofać z traktatu obronnego z Koreą Północną, spotykając się z wściekłym potępieniem ze strony Pjongjangu. Posunięcie to jest następstwem długiej serii działań Seulu mających na celu zdobycie poparcia Chin i zademonstrowanie ich niezależności od Waszyngtonu. Niektórzy wysuwają hipotezę, że teraz, gdy droga do siłowego zjednoczenia jest otwarta, [KOR.GetLeader] zdecydował się odbić Północ siłą."
 korea.14.a: "Nasze wysiłki opłaciły się."
 korea.14.b: "Zbyt długo tolerowaliśmy Pjongjang."
 korea.14.c: "Czy wojna jest na horyzoncie?"
 korea.15.t: "[KOR.GetLeader] Żąda japońskich reparacji"
 korea.15.d: "Po tygodniach antagonistycznej retoryki z Seulu i nacisków ze strony koreańskich aktywistów, [KOR.GetLeader] wezwał Japonię do zapłacenia odszkodowań osobom, które przeżyły japońskie zbrodnie wojenne popełnione podczas drugiej wojny światowej. Japonia, która utrzymuje, że sprawa została rozstrzygnięta między jej rządem a rządem Korei Południowej za rządów autorytarnego siłacza Parka Chung-hee, jak można się było spodziewać, odmówiła rozważenia wypłaty odszkodowań.\n\nChociaż afera nie doprowadziła do odszkodowania dla Koreańczyka ofiar, doprowadziło to do wzmocnienia pozycji politycznej [KOR.GetLeader], a wielu Koreańczyków zjednoczyło się wokół tej niezwykle emocjonalnej sprawy narodowej."
 korea.15.a: "Pewnego dnia doczekamy się sprawiedliwości."
 korea.15.b: "Ich żądania są absurdalne!"
 korea.15.c: "Czy ich spór da się rozwiązać?"
 korea.16.t: "Wojna!"
 korea.16.d: "Wybuchła wojna między nami a Północą. Zgodnie z naszą umową ze Stanami Zjednoczonymi musimy teraz przekazać kontrolę operacyjną nad naszymi siłami zbrojnymi armii amerykańskiej."
 korea.16.a: "Musimy przekazać kontrolę."
 korea.17.t: "Wojna się skończyła"
 korea.17.d: "Pokój powrócił na Półwysep Koreański. Teraz, gdy powróciliśmy do warunków pokojowych, możemy ponownie umocnić kontrolę nad naszymi siłami zbrojnymi."
 korea.17.a: "Wreszcie spokój."
 korea.18.t: "Zbliżają się wybory do Zgromadzenia Narodowego, a partie rozpoczynają kampanię"
 korea.18.d: "Ponieważ za około miesiąc zbliżają się wybory do Zgromadzenia Narodowego, powinniśmy zacząć zwiększać popularność naszej partii, aby zapewnić sobie większość w legislaturze przez następne cztery lata."
 korea.18.a: "Miejmy nadzieję, że będzie to większość!"
 korea.21.t: "Wyniki są!"
 korea.21.a: "Jak zwykle były to wybory zacięte i zacięte."
 korea.21.d_no: "Niestety, żadnej z dwóch głównych partii nie udało się zdobyć większości w Zgromadzeniu Narodowym. Nasz rząd będzie musiał zaostrzyć walkę, aby pozyskać legislatorów z innych partii i uchwalić kontrowersyjne przepisy."
 korea.21.d_con_loss: "Niestety naszej partii nie udało się zdobyć większości w Zgromadzeniu Narodowym. Liberalni prawodawcy odmówią przyjęcia jakichkolwiek przepisów ograniczających związki zawodowe, wspierających wielki biznes lub promujących antagonizm wobec Korei Północnej."
 korea.21.d_lib_loss: "Niestety naszej partii nie udało się zdobyć większości w Zgromadzeniu Narodowym. Konserwatywni prawodawcy odmówią przyjęcia jakichkolwiek przepisów ograniczających wielki biznes, reformujących pobór do wojska i wywiad lub promujących pojednanie z Koreą Północną."
 korea.21.d_con_win: "Na szczęście naszej partii udało się zdobyć większość w Zgromadzeniu Narodowym. Władza ustawodawcza i wykonawcza będą mogły współpracować ręka w rękę, aby ułatwić konserwatywne cele, takie jak ograniczenie związków zawodowych, wspieranie czeboli i pozostanie twardym wobec Korei Północnej."
 korea.21.d_lib_win: "Na szczęście naszej partii udało się zdobyć większość w Zgromadzeniu Narodowym. Władza ustawodawcza i wykonawcza będą mogły współpracować, aby ułatwić realizację liberalnych celów, takich jak osłabienie czeboli, zreformowanie aparatu bezpieczeństwa i dążenie do ponownego zjednoczenia z Północą."
 korea.22.t: "Wstrząsy związane ze zjednoczeniem zaczynają się pogłębiać"
 korea.22.d: "Wielki naród koreański w końcu się zjednoczył po wielu dziesięcioleciach bolesnej separacji. Jednak nasze zadanie ponownego zintegrowania obu połówek jeszcze się nie skończyło. Wiele osób po obu stronach 38. równoleżnika jest niezadowolonych ze sposobu, w jaki doszło do zjednoczenia, a koszty gospodarcze ponownego zjednoczenia dwóch bardzo różnych państw szybko stają się widoczne. Jeśli nie uda nam się wykonać naszego zadania ponownego zjednoczenia kraju, możemy stanąć w obliczu rozpadu naszego nowonarodzonego narodu."
 korea.22.a: "Teraz zaczyna się trudniejsza część..."
 korea.23.t: "Nasza odpowiedź na ofertę pokojową Południa"
 korea.23.d: "Po tygodniach dyskusji nadszedł czas, abyśmy zdecydowali, czy jesteśmy gotowi przyjąć ofertę pokoju złożoną przez Południe. Musimy rozważyć, czy ufamy szczerości oferty Południa, ale także jak uzgodnienie traktatu pokojowego zostanie odebrane przez naszych krajowych zwolenników, którzy wciąż mają nadzieję na zjednoczenie kraju siłą pewnego dnia."
 korea.23.a: "Zgodzimy się na traktat."
 korea.23.b: "Nigdy nie będzie między nami pokoju!"
 korea.24.t: "Podpisano porozumienie pokojowe z Koreą"
 korea.24.d: "W związku z poprawą stosunków między obiema Koreami, [KOR.GetLeader] z Południa i [NKO.GetLeader] z Północy zgodziły się zastąpić kruchy układ o zawieszeniu broni formalnym porozumieniem pokojowym. Traktat ten ostatecznie położył kres wrogości, która trwała między obiema Koreami od czasu wojny koreańskiej. Obaj przywódcy wyrazili nadzieję, że ten rozwój wydarzeń skieruje półwysep na drogę do zjednoczenia, choć niektórzy obserwatorzy wątpią w gotowość obu stron do dążenia do zjednoczenia."
 korea.24.a: "Przed półwyspem rysuje się świetlana przyszłość!"
 korea.25.t: "Załamanie rozmów międzykoreańskich"
 korea.25.d: "Rozmowy w Panmunjom pomiędzy [KOR.GetLeader] z południa i [NKO.GetLeader] z północy zostały zerwane z powodu różnych nieporozumień między obiema stronami. Chociaż fakt, że istniały pewne punkty porozumienia, napawał nadzieją na powrót do rozmów w przyszłości, jasne jest, że porozumienie między obiema Koreami nie zostanie osiągnięte przez dłuższy czas."
 korea.25.a: "Spokój pozostaje nieuchwytny..."
 korea.26.t: "Korea Południowa proponuje zjednoczenie"
 korea.26.d: "Dążąc do wykorzystania bezprecedensowej poprawy stosunków między obiema Koreami, Południe oferuje nam współpracę w celu zjednoczenia naszego podzielonego narodu. Nalega jednak, aby proces zjednoczenia przebiegał pod przewodnictwem Południa, co stanowi zagrożenie dla unikalnej kultury politycznej, którą rozwinęliśmy na Północy."
 korea.26.d1: "Chcąc wykorzystać bezprecedensową poprawę stosunków między obiema Koreami, Południe oferuje nam współpracę w celu ponownego zjednoczenia naszego podzielonego narodu. Południe, rozumiejąc nasze obawy dotyczące zjednoczenia, zaoferowało podział władzy po zjednoczeniu za pośrednictwem rządu jedności, obejmującego elementy Północy i Południa."
 korea.26.a: "Nasz kraj znów będzie całością!"
 korea.26.b: "Zjednoczenie nie może nigdy nastąpić na takich warunkach..."
 korea.27.t: "Północ zgodziła się na nasze warunki zjednoczenia!"
 korea.27.d: "Po szeroko zakrojonych negocjacjach Północ zgodziła się rozpocząć prace nad zjednoczeniem naszych dwóch krajów! Po ustabilizowaniu się stosunków między obiema Koreami i reintegracji półwyspu na horyzoncie przyszłość narodu koreańskiego nigdy nie wyglądała w jaśniejszych barwach!"
 korea.27.a: "Fantastyczna wiadomość!"
 korea.28.t: "Północ odrzuciła nasze warunki zjednoczenia!"
 korea.28.d: "Niestety, [NKO.GetLeader] zdecydował się przedłożyć swoje samolubne stanowisko nad stanowisko narodu koreańskiego i odrzucił naszą ofertę współpracy przy zjednoczeniu kraju. To odrzucenie nie oznacza, że ​​nie możemy podjąć kolejnej próby w przyszłość, ale oznacza, że ​​zjednoczenie nie nastąpi w najbliższej przyszłości. Musimy położyć podwaliny, aby nasza następna próba zakończyła się większym sukcesem."
 korea.28.a: "Smutny dzień dla Koreańczyków..."
 korea.29.t: "Chiny żądają przekazania Chinom szczątków personelu Chińskiej Armii Ludowo-Ochotniczej z Korei Południowej"
 korea.29.d: ""
 korea.29.a: "Oczywiscie ze bedziemy. Szanujemy tych żołnierzy."
 korea.29.b: "To nasi wrogowie i najeźdźcy naszej ziemi! Nie możemy tego zaakceptować!"
 korea.30.t: "Pierwszy transfer szczątków żołnierzy Armii Ochotniczej Ludowej z Republiki Korei do Chin"
 korea.30.d: "\nPierwsza kolekcja składała się ze szczątków znalezionych podczas wykopalisk w wielu regionach, takich jak prowincje Gangwon i prowincje Gyeonggi. Wiele szczątków było niemożliwych do zidentyfikowania. Początkowo oszacowano, że pierwsza kolekcja zawiera szczątki 425 żołnierzy, ale później szacunki te zwiększono do 437.\n\nChiny i Korea Południowa zorganizowały ceremonię przekazania tych szczątków w Korei na międzynarodowym lotnisku Incheon. Tam przedstawiciele Chin i Korei podpisali list o przekazaniu. Strona koreańska wysłała dwadzieścia dwa pojazdy do transportu szczątków. Po tym, jak specjalne samoloty Chińskich Sił Powietrznych wleciały w przestrzeń powietrzną Chin, w eskorcie przybyły dwa J-11."
 korea.30.a: "Salut!"
 korea.31.t: "Siódmy transfer szczątków żołnierzy Armii Ochotniczej Ludowej z Republiki Korei do Chin"
 korea.31.d: "Korea Południowa przekazała na lotnisku Incheon 117 szczątków. W ceremonii wziął udział Minister ds. Weteranów Chin. Szczątki wydobyto w Arrow Hill (miejsce bitwy pod Białym Koniem) w północnokoreańskiej strefie zdemilitaryzowanej w 2019 roku."
 korea.31.a: "Salut!"
 korea.33.t: "Nasza odpowiedź na ofertę pokojową Północy"
 korea.33.d: "Po tygodniach dyskusji nadszedł czas, abyśmy zdecydowali, czy jesteśmy gotowi przyjąć ofertę pokoju złożoną przez Północ. Musimy rozważyć, czy ufamy szczerości oferty Północy, ale także jak uzgodnienie traktatu pokojowego zostanie odebrane przez tych z naszych ludzi, którzy nadal sprzeciwiają się negocjacjom z reżimem północnokoreańskim."
 korea.34.t: "Korea Północna proponuje zjednoczenie"
 korea.34.d: "Chcąc wykorzystać bezprecedensową poprawę stosunków między obiema Koreami, Północ oferuje nam współpracę w celu zjednoczenia naszego podzielonego narodu. Nalega jednak, aby proces zjednoczenia przebiegał pod przewodnictwem Północy, co stanowi zagrożenie dla stylu życia, jaki kultywujemy na Południu."
 korea.34.d1: "Chcąc wykorzystać bezprecedensową poprawę stosunków między obiema Koreami, Północ oferuje nam współpracę w celu ponownego zjednoczenia naszego podzielonego narodu. Północ, rozumiejąc nasze obawy dotyczące zjednoczenia, zaoferowała podział władzy po zjednoczeniu za pośrednictwem rządu jedności, obejmującego elementy Południa i Północy."
 korea.35.t: "Południe przyjęło nasze warunki zjednoczenia!"
 korea.35.d: "Po szeroko zakrojonych negocjacjach Południe zgodziło się rozpocząć prace nad zjednoczeniem naszych dwóch krajów! Po ustabilizowaniu się stosunków między obiema Koreami i reintegracji półwyspu na horyzoncie przyszłość narodu koreańskiego nigdy nie wyglądała w jaśniejszych barwach!"
 korea.36.t: "Południe odrzuciło nasze warunki zjednoczenia!"
 korea.36.d: "Niestety, [KOR.GetLeader] zdecydował się przedłożyć swoje samolubne stanowisko nad stanowisko narodu koreańskiego i odrzucił naszą ofertę współpracy przy zjednoczeniu kraju. To odrzucenie nie oznacza, że ​​nie możemy podjąć kolejnej próby w przyszłość, ale oznacza, że ​​zjednoczenie nie nastąpi w najbliższej przyszłości. Musimy położyć podwaliny, aby nasza następna próba zakończyła się większym sukcesem."
 korea.37.t: "Korea uzyskuje stałe miejsce w Radzie Bezpieczeństwa ONZ"
 korea.37.d: "At today's UN Security Council meeting, the five permanent members agreed to Korea's application to become a new permanent member. Korea pledged to do its utmost to maintain world peace in accordance with its UN Charter obligations."
 korea.37.a: "Świat w końcu wypłacił Korei rekompensatę za przymusowy podział."
 korea.38.t: "Korea prosi nas o wycofanie naszych wojsk z Japonii i Korei"
 korea.38.d: "Korea zwróciła się dziś do nas z formalnym wnioskiem o wycofanie naszych wojsk z Japonii i Korei."
 korea.38.a: "Nie spełnimy ich bezpodstawnych żądań."
 korea.38.b: "No cóż, może już czas, żeby żołnierze poszli do domu......"
 recognition.1.t: "[FROM.GetName] Recognizes the Breakaway"
 recognition.1.d: "[FROM.GetNameDef] has extended formal diplomatic recognition to the breakaway state on our territory. The decision is a setback for our claim to the region."
 recognition.1.a: "Nie będziemy podzieleni."
 recognition.3.t: "[FROM.GetName] Withdraws Recognition"
 recognition.3.d: "[FROM.GetNameDef] has reversed its earlier recognition of our sovereignty. Whatever the reason, the result is the same."
 recognition.3.a: "The struggle continues."
 recognition.4.t: "[FROM.GetName] Withdraws Recognition of the Breakaway"
 recognition.4.d: "[FROM.GetNameDef] has reversed its earlier recognition of the breakaway state on our territory. One fewer capital backs their claim to sovereignty."
 recognition.4.a: "A small victory for our position."
 recognition.7.t: "[FROM.GetName] Przystępuje do Organizacji Narodów Zjednoczonych"
 recognition.7.d: "After a sustained campaign for international recognition, [FROM.GetNameDef] has been admitted to the United Nations General Assembly as a member state."
 recognition.7.a: "Welcome to the General Assembly."
 recognition.8.t: "[FROM.GetName] Pressures Us to Recognize [pressured_to_recognize]"
 recognition.8.d: "[FROM.GetNameDef] is leveraging its influence over us to force recognition of [pressured_to_recognize]. Refusing a partner with this much leverage carries a real cost."
 recognition.8.a: "We extend recognition."
 recognition.8.b: "We refuse to recognize this regime."
 internal_faction.1.t: "Wojsko prosi o zwiększenie budżetu"
 internal_faction.1.d: "Powołując się na nowe zagrożenia dla naszego bezpieczeństwa narodowego, wojsko zwróciło się o zwiększenie [ROOT.GetAdjective] budżetu obronnego. Uwzględnienie tej prośby zwiększy presję na nasz budżet, ale odmowa zmniejszy opinię wojska o naszym rządzie."
 internal_faction.1.a: "Powinniśmy dać im pieniądze."
 internal_faction.1.b: "Nie stać nas na taki wydatek!"
 internal_faction.2.t: "Niektóre kadry Partii Komunistycznej są zaangażowane w działalność korupcyjną!"
 internal_faction.2.d: "Nasze agencje wywiadowcze odkryły niedawno, że niektórzy funkcjonariusze partii komunistycznej przyjmują łapówki i angażują się w nepotyzm. Z jednej strony nie możemy pozwolić, aby takie działania pozostały bezkarne, jeśli chcemy zachować legalność w oczach społeczeństwa, ale z drugiej strony takie posunięcie z pewnością zniechęci wielu ważnych sojuszników w Partii Komunistycznej."
 internal_faction.2.a: "Powinniśmy przymknąć oko."
 internal_faction.2.b: "Musimy brać z nich przykład!"
 internal_faction.3.t: "Konglomeraty przemysłowe domagają się ulg podatkowych"
 internal_faction.3.d: "Szefowie niektórych z największych konglomeratów przemysłowych [ROOT.GetName] prywatnie lobbują u naszego rządu, aby przyznał im większe ulgi podatkowe. Przyznanie tych ulg podatkowych poprawi opinię konglomeratów przemysłowych o naszym rządzie, ale zmniejszy nasze ogólnokrajowe dochody podatkowe."
 internal_faction.3.a: "Powinniśmy przyznać ulgi podatkowe."
 internal_faction.3.b: "Nie możemy sobie pozwolić na takie ustępstwa."
 isis.1.t: "Zwycięstwo nad Państwem Islamskim"
 isis.1.d: "Teraz, gdy Państwo Islamskie zostało pokonane, nasz kraj nie będzie już nękany ekstremistyczną propagandą produkowaną przez Państwo Islamskie. Teraz możemy skupić się na szerzeniu naszych idei w naszym kraju i nigdy więcej nie pozwolić, aby ekstremiści przejęli władzę."
 isis.1.a: "Świetnie"
 isis.2.t: "Infiltrować Tahrir al-Sham?"
 isis.2.d: "O kalifie wszystkich muzułmanów, [Root.GetLeader]. Powinniśmy uderzyć w serce naszego podłego wroga, Tahrira al-Shama, który nie chce uznać twoich sprawiedliwych i prawowitych rządów. Chociaż zboczyli ze ścieżki prawdziwego islamu i chwalebnego dżihadu, mają w swoich szeregach wielu dobrych bojowników dżihadu. Inszallahu, powinniśmy ich zinfiltrować i spróbować zmusić jak najwięcej do odstąpienia od naszego chwalebnego kalifatu!"
 isis.2.a: "Spróbujmy odciągnąć prawdziwych wojowników od tej fałszywej organizacji dżihadu!"
 isis.2.b: "Nie, nie możemy sobie pozwolić na ewentualne konflikty wewnętrzne."
 isis.2.a_tt: "§HInfiltracja nie powiodła się§! (Brak efektu)"
 isis.3.t: "Bojownicy uciekają do Daesh"
 isis.3.d: "[Root.GetLeader]! Tak zwane „Państwo Islamskie” przeniknęło do nas i udało mu się nakłonić niektórych z naszych najlepszych bojowników, aby przyłączyli się do ich absurdalnej wymówki kalifatu. Nie powinniśmy pozostawiać tej kwestii bez odpowiedzi. Powinniśmy walczyć i pokonać tych kharjitów, którzy robią takfir na lewo i prawo, używając Świętego Koranu jako papieru toaletowego."
 isis.3.a: "My, prawi dżihadyści, zabijemy ich jak psy!"
 isis.3.b: "Nie, nie możemy sobie pozwolić na kolejny front w tej wojnie."
 isis.4.t: "Defekt jednostek Tahrir al-Sham"
 isis.4.d: "O kalifie, wielu sprawiedliwych i odważnych braci muwahhidów uciekło ze złego Frontu Tahrir al-Sham i zamiast tego przyłączyło się do naszej sprawy!"
 isis.4.a: "Takbir! Państwo Islamskie Takbir!"
 isis.4.a_tt: "Dodaje 2 §HBrygady Dżabat al-Nusra§! w §HRakka§!."
 isis.5.t: "Oznaka słabości Tahrira al-Shama"
 isis.5.d: "O kalifie, obrzydliwy front Tahrir al-Sham jest słabszy, niż myśleliśmy, nie robiąc nic przeciwko naszej infiltracji ich i niedawnym dezerterom. Rada Wojenna Szura zaleca, abyśmy wyrżnęli ich gnijące szczątki jak psy i przejęli ich terytorium – dodając je do naszego chwalebnego kalifatu!"
 isis.5.a: "Naucz tych fałszywych dżihadystów, kto jest prawdziwym następcą szejka Osamy!"
 isis.5.b: "Ich czas nadejdzie, ale na razie musimy poczekać."
 isis.6.t: "Pozostałości Tahrir al-Sham dołączają do naszego kalifatu"
 isis.6.d: "O Kalifie, słodki sok zwycięstwa jest na naszych ustach. Zbliżając się do klęski, pozostałości Tahrir al-Sham złożyły przysięgę wierności tobie, [Root.GetLeader], i naszemu stale rosnącemu Kalifatowi."
 isis.6.a: "Witamy naszych braci w prawdziwym kalifacie!"
 isisNews.1.t: "Tahrir al-Sham przyłącza się do ISIS"
 isisNews.1.d: "Wraz z rosnącą presją na syryjskich islamistów z Tahrir al-Sham, pozostałe ich siły przysięgły wierność ISIS, podejmując ostatnią próbę narzucenia swojej fundamentalistycznej ideologii w Syrii."
 isisNews.1.a: "Boże pomóż nam wszystkim!"
 isis.7.t: "Ukryty"
 isis.7.d: "Ukryty"
 isis.7.a: "Ukryty"
 isis.1301.t: "Abu Fatima zginęła śmiercią męczeńską w nalocie koalicji"
 isis.1301.d: "Złe wieści, Kalifie! Twój dobry przyjaciel i kolega z Iraku, Abu Fatima al-Jaheishi, poniósł odważną śmierć męczeńską w tchórzliwym nalocie Amerykanów.\n\n Zabił wielu apostatów.\n\n Niech Allah przyjmie jego męczeństwo."
 isis.1301.a: "Pomścimy go, gdy podbijemy Waszyngton!"
 isisNews.1301.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1301.d: "Iracki terrorysta i starszy dowódca ISIS Abu Fatima al-Jaheishi zginął dzisiaj w nalocie koalicji amerykańskiej. Abu Fatima należał do wewnętrznego kręgu al-Baghdadiego i był zastępcą przywódcy kontrolowanych przez ISIS części Iraku."
 isisNews.1301.a: "Dobranoc!"
 isis.1302.t: "al-Sulami zginął śmiercią męczeńską w nalocie koalicji"
 isis.1302.d: "Złe wieści, Kalifie! Główny duchowny Abu Sufyan al-Sulami zginął śmiercią męczeńską w tchórzliwym nalocie przeprowadzonym przez Amerykanów. Przybył do nas z Bahrajnu i udzielił nam kluczowego wsparcia religijnego dla naszego kalifatu.\n\n              O Kalifie, zainspirował nas wszystkich swoją piękną biografią o tobie.\n\n                                        Niech Allah przyjmie jego męczeństwo."
 isisNews.1302.t: "Szef duchownego ISIS zabity w nalocie koalicji"
 isisNews.1302.d: "Bahrajński terrorysta i starszy przywódca religijny ISIS Turki al-Binali, znany ze swojego norm de guerre „Abu Sufyan al-Sulami”, zginął dziś w nalocie koalicji amerykańskiej. al-Binali nie odegrał istotnej roli w wysiłkach wojskowych ISIS, ale odegrał kluczową rolę w zapewnieniu wsparcia religijnego tej grupie i napisał pierwszą biografię Abu Bakra al-Baghdadiego."
 isis.1303.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1303.d: "Złe wieści, Kalifie! Emir naszych albańskich i kosowskich bojowników oraz starszy dowódca Lavdrim Muhaxheri zginął śmiercią męczeńską w tchórzliwym nalocie amerykańskich psów.\n\n                                                 Zabił wielu apostatów.\n\n                                       Niech Allah przyjmie jego męczeństwo."
 isisNews.1303.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1303.d: "Kosowsko-albański terrorysta i starszy dowódca ISIS Lavdrim Muhaxheri zginął dziś w ataku lotniczym koalicji USA. Muhaxheri walczył w Afganistanie po stronie NATO, ale został zradykalizowany około 2012 roku i udał się do Syrii. W 2013 roku dołączył do ISIS i szybko został „emirem” albańskich i kosowskich bojowników w Syrii i Iraku. Był brutalnym bandytą, który osobiście ścinał głowy więźniom."
 isis.1304.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1304.d: "O Kalifie, straszna wiadomość! Nasz elitarny dowódca wojskowy Gulmurod Khalimov zginął śmiercią męczeńską w tchórzliwym nalocie amerykańskich psów. Zanim trafił do nas z ziem Tadżyków, był wysokiej rangi oficerem sił specjalnych. Będzie nam bardzo brakować jego wiedzy wojskowej.\n\n                                               Zabił wielu apostatów.\n\n                                       Niech Allah przyjmie jego męczeństwo."
 isisNews.1304.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1304.d: "Tadżycki terrorysta i starszy dowódca ISIS Gulmurod Khalimov zginął dzisiaj w nalocie koalicji amerykańskiej. Khalimov był doświadczonym i wysokiej rangi oficerem sił specjalnych Tadżyckich Sił Zbrojnych, zanim uciekł do ISIS."
 isis.1305.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1305.d: "O Kalifie, straszna wiadomość! Nasz szef operacji męczeństwa i kluczowy trener zagranicznych mudżahedinów, Abdullah Ahmed al-Mashadani, zginął śmiercią męczeńską w nalocie amerykańskich psów.\n\n                                                Zabił wielu apostatów.\n\n                                         Niech Allah przyjmie jego męczeństwo."
 isisNews.1305.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1305.d: "Iracki terrorysta i starszy dowódca ISIS Abdullah Ahmed al-Mashadani zginął dzisiaj w nalocie koalicji amerykańskiej. al-Mashadani odegrał kluczową rolę w wysiłkach wojennych ISIS, kierując operacjami samobójczych zamachów bombowych i szkoląc zagranicznych dżihadystów."
 isis.1306.t: "Dowódca zginął w ataku lotniczym koalicji"
 isis.1306.d: "O kalifie, złe wieści! Nasz gubernator regionu Central Euphrates, Ahmed Khalal al-Juhayshi, został zamordowany w ataku lotniczym amerykańskich psów.\n\n                                                Zabił wielu apostatów.\n\n                                       Niech Allah przyjmie jego męczeństwo."
 isisNews.1306.t: "Dowódca ISIS zabity w ataku lotniczym koalicji"
 isisNews.1306.d: "Iracki terrorysta i wyższy rangą członek ISIS, Ahmed Khalal al-Juhayshi, zginął dziś w nalocie koalicji amerykańskiej. al-Juhayshi nie był wybitnym dowódcą wojskowym, ale administratorem i gubernatorem kluczowego dla Państwa Islamskiego regionu środkowego Eufratu."
 isis.1307.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1307.d: "O Kalifie, złe wieści! Twój dobry przyjaciel i szef logistyki i zaopatrzenia, Fares Reif al-Naima, zginął śmiercią męczeńską w nalocie amerykańskich psów. Był wieloletnim odważnym i lojalnym mudżahedem, walczącym z niewiernymi i apostatami od 2003 roku.\n\n                                            Zabił wielu dla chwały kalifatu.\n\n                                     Niech Allah przyjmie jego męczeństwo."
 isisNews.1307.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1307.d: "Iracki terrorysta i wysoki rangą dowódca ISIS, Fares Reif al-Naima, zginął dziś w ataku lotniczym koalicji USA. Al-Naima walczył z siłami USA w wojnie w Iraku. Po tym, jak został zatrzymany przez siły amerykańskie w obozie Bucca razem z al-Baghdadim, zyskał sławę jako szef logistyki i zaopatrzenia Państwa Islamskiego."
 isis.1308.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1308.d: "O Kalifie, złe wieści! Abu Ahmad al-Alwani zginął śmiercią męczeńską w nalocie przeprowadzonym przez amerykańskich niewiernych. Był oficerem irackiej armii Saddama Husajna i bardzo nam pomógł swoją wiedzą, gdy dołączył do powstania sunnickiego i naszego ukochanego Państwa Islamskiego.\n\n                                              Zabił wielu apostatów.\n\n                                 Niech Allah przyjmie jego męczeństwo."
 isisNews.1308.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1308.d: "Iracki terrorysta i starszy dowódca ISIS, Abu Ahmad al-Alwani, zginął dzisiaj w nalocie koalicji amerykańskiej. al-Alwani był oficerem irackiej armii Saddama Husajna, zanim dołączył do powstania sunnickiego przeciwko siłom amerykańskim. Szybko awansował w szeregach Islamskiego Państwa Iraku aż do stanowiska wyższego dowódcy."
 isis.1309.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1309.d: "O Kalifie, złe wieści! Abu Muhammad al-Shimali zginął śmiercią męczeńską w nalocie przeprowadzonym przez amerykańskich niewiernych. Przybywając do nas z ziem Arabii, pomagał nam przemycać ropę i kupować broń. Zrekrutował wielu odważnych muhdżahidów do naszego kalifatu i na zawsze będzie wychwalany za jego kluczową rolę w organizacji ataków w Paryżu w 2015 roku.\n\n                                               Zabił wielu apostatów.\n\n                                      Niech Allah przyjmie jego męczeństwo."
 isisNews.1309.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1309.d: "Saudyjski terrorysta i starszy dowódca ISIS, Abu Muhammad al-Shimali, zginął dzisiaj w nalocie koalicji amerykańskiej. al-Shimali był kluczowym werbownikiem i przemytnikiem Państwa Islamskiego. Ponadto raporty wywiadu sugerują, że odegrał on kluczową rolę w wspomaganiu ataków w Paryżu w 2015 r."
 isis.1310.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1310.d: "O kalifie, nieszczęście! Nasz minister wojny i zastępca dowódcy, Ayad al-Jumaili, został dzielnie zamordowany w nikczemnym ataku lotniczym amerykańskich niewiernych psów. Jako Irakijczyk był starszym oficerem wywiadu za Saddama Husseina i zastosował swoją mądrość, jak chronić kalifat przed wewnętrznymi wrogami jako nasz szef wywiadu i bezpieczeństwa wewnętrznego.\n\n                                               Zabił wielu zdrajców.\n\n                                    Niech Allah przyjmie jego męczeństwo."
 isisNews.1310.t: "Zastępca dowódcy ISIS zabity w nalocie koalicji"
 isisNews.1310.d: "Iracki terrorysta i zastępca dowódcy Państwa Islamskiego, Ayad al-Jumaili, zginął dziś w nalocie koalicji amerykańskiej. al-Jumaili był starszym oficerem wywiadu Saddama Husajna, który dołączył do powstania sunnickiego po okupacji Stanów Zjednoczonych w 2003 r. Został szefem wywiadu i bezpieczeństwa wewnętrznego Państwa Islamskiego, a później awansował na zastępcę dowódcy i ministra wojny ."
 isis.1311.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1311.d: "O Kalifie, złe wieści! Starszy dowódca Khairy Abed Mahmoud al-Taey zginął śmiercią męczeńską w nalocie przeprowadzonym przez amerykańskich niewiernych. Ten Irakijczyk był członkiem naszej szury wojskowej i dowodził operacjami z użyciem improwizowanych ładunków wybuchowych (IED), słusznie siejąc strach i chaos w sercach naszych wrogów.\n\n                                                Zabił wielu apostatów.\n\n                                       Niech Allah przyjąć jego męczeństwo."
 isisNews.1311.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1311.d: "Iracki terrorysta i starszy dowódca ISIS, Khairy Abed Mahmoud al-Taey, zginął dzisiaj w nalocie koalicji amerykańskiej. al-Taey był członkiem rady wojskowej ISIS i szefem operacji związanych z improwizowanymi ładunkami wybuchowymi (IED), siejąc chaos w miastach zaatakowanych przez ISIS."
 isis.1312.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1312.d: "O Kalifie, złe wieści! Twój przyjaciel, doradca i starszy dowódca, Abdul Wahid Khutnayer Ahmad, zginął śmiercią męczeńską w nalocie przeprowadzonym przez amerykańskich niewiernych. Ten Irakijczyk odpowiadał za bezpieczeństwo wewnętrzne.\n\n                                       Wypędził wielu zdrajców i apostatów.\n\n                                     Niech Allah przyjmie jego męczeństwo."
 isisNews.1312.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1312.d: "Iracki terrorysta i starszy dowódca ISIS, Abdul Wahid Khutnayer Ahmad, zginął dzisiaj w nalocie koalicji amerykańskiej. Khutnayer Ahmad był głównym doradcą al-Baghdadiego i powierzono mu nadzór nad bezpieczeństwem wewnętrznym."
 isis.1313.t: "Dowódca poniósł śmierć męczeńską w nalocie Koalicji"
 isis.1313.d: "O Kalifie, straszna wiadomość! Nasz starszy dowódca, Abu Jihad Shishani, zginął śmiercią męczeńską w nalocie przeprowadzonym przez amerykańskie psy niewiernych. Przybył do nas z ziem Czeczenów i do końca walczył dzielnie na chwałę Allaha.\n\n                                               Zabił wielu apostatów.\n\n                                        Niech Allah przyjmie jego męczeństwo."
 isisNews.1313.t: "Dowódca ISIS zabity w nalocie koalicji"
 isisNews.1313.d: "Czeczeński terrorysta i starszy dowódca ISIS, Abu Jihad Shishani, zginął dziś w ataku lotniczym koalicji USA. Shishani, obywatel Rosji, był zastępcą dowódcy grupy terrorystycznej Caucasus Emirate pod przywództwem Umara Shishaniego. Po tym, jak Umar udał się do Syrii i dołączył do ISIS, Abu Jihad próbował przejąć władzę w Caucasus Emirate, aby złożyć przysięgę wierności ISIS, ale ostatecznie udał się do Syrii, aby walczyć dla ISIS jako starszy dowódca."
 isis.11301.t: "Abu Fatima zginęła śmiercią męczeńską w rosyjskim nalocie"
 isis.11301.d: "Złe wieści, Kalifie! Twój dobry przyjaciel i kolega z Iraku, Abu Fatima al-Jaheishi, zginął śmiercią męczeńską w tchórzliwym nalocie Rosjan.\n\n Zabił wielu apostatów.\n\n Niech Allah przyjmie jego męczeństwo."
 isis.11301.a: "Pomścimy go, gdy zdobędziemy Moskwę!"
 isisNews.11301.t: "Dowódca ISIS zginął w rosyjskim nalocie"
 isisNews.11301.d: "Iracki terrorysta i starszy dowódca ISIS Abu Fatima al-Jaheishi zginął dzisiaj w rosyjskim nalocie. Abu Fatima należał do wewnętrznego kręgu al-Baghdadiego i był zastępcą przywódcy kontrolowanych przez ISIS części Iraku."
 isisNews.11301.a: "Dobranoc!"
 isis.11302.t: "al-Sulami zginął w rosyjskim nalocie"
 isis.11302.d: "Złe wieści, Kalifie! Główny duchowny Abu Sufyan al-Sulami zginął śmiercią męczeńską w tchórzliwym nalocie przeprowadzonym przez Rosjan. Przybył do nas z Bahrajnu i udzielił nam kluczowego wsparcia religijnego dla naszego kalifatu.\n\n                  O Kalifie, zainspirował nas wszystkich swoją piękną biografią o tobie.\n\n                                        Niech Allah przyjmie jego męczeństwo."
 isisNews.11302.t: "Szef duchownego ISIS zginął w rosyjskim nalocie"
 isisNews.11302.d: "Bahrajński terrorysta i starszy przywódca religijny ISIS Turki al-Binali, znany ze swojego norm de guerre „Abu Sufyan al-Sulami”, zginął dziś w rosyjskim nalocie. al-Binali nie odegrał istotnej roli w wysiłkach wojskowych ISIS, ale odegrał kluczową rolę w zapewnieniu wsparcia religijnego tej grupie i napisał pierwszą biografię Abu Bakra al-Baghdadiego."
 isis.11303.t: "Dowódca zginął w rosyjskim nalocie"
 isis.11303.d: "Złe wieści, Kalifie! Emir naszych albańskich i kosowskich bojowników oraz starszy dowódca Lavdrim Muhaxheri zginął śmiercią męczeńską w tchórzliwym nalocie rosyjskich psów.\n\n Zabił wielu apostatów.\n\n Niech Allah przyjmie jego męczeństwo."
 isisNews.11303.t: "Dowódca ISIS zginął w rosyjskim nalocie"
 isisNews.11303.d: "Kosowo-albański terrorysta i starszy dowódca ISIS Lavdrim Muhaxheri zginął dzisiaj w rosyjskim nalocie. Muhaxheri walczył w Afganistanie po stronie NATO, ale około 2012 roku uległ radykalizacji i udał się do Syrii. W 2013 roku dołączył do ISIS i szybko został „emirem” albańskich i kosowskich bojowników w Syrii i Iraku. Był brutalnym bandytą, który osobiście ścinał więźniom głowy."
 isis.11304.t: "Dowódca zginął w rosyjskim ataku lotniczym"
 isis.11304.d: "O Kalifie, straszna wiadomość! Nasz elitarny dowódca wojskowy Gulmurod Khalimov zginął śmiercią męczeńską w tchórzliwym nalocie rosyjskich psów. Zanim trafił do nas z ziem Tadżyków, był wysokiej rangi oficerem sił specjalnych. Będzie nam bardzo brakować jego wiedzy wojskowej.\n\n                                                Zabił wielu apostatów.\n\n                                  Niech Allah przyjmie jego męczeństwo."
 isisNews.11304.t: "Dowódca ISIS zginął w rosyjskim nalocie"
 isisNews.11304.d: "Tadżycki terrorysta i starszy dowódca ISIS Gulmurod Khalimov zginął dziś w rosyjskim nalocie. Khalimov był doświadczonym i wysokiej rangi oficerem sił specjalnych Tadżyckich Sił Zbrojnych, zanim uciekł do ISIS."
 isis.11305.t: "Dowódca zginął w rosyjskim nalocie"
 isis.11305.d: "O kalifie, straszne wieści! Nasz szef operacji męczeństwa i kluczowy trener zagranicznych mudżahedinów, Abdullah Ahmed al-Mashadani, został zamordowany w ataku lotniczym rosyjskich psów.\n\n                                                 Zabił wielu apostatów.\n\n                                     Niech Allah przyjmie jego męczeństwo."
 isisNews.11305.t: "Dowódca ISIS zginął w rosyjskim nalocie"
 isisNews.11305.d: "Iracki terrorysta i starszy dowódca ISIS Abdullah Ahmed al-Mashadani zginął dzisiaj w rosyjskim nalocie. al-Mashadani odegrał kluczową rolę w wysiłkach wojennych ISIS, kierując operacjami samobójczych zamachów bombowych i szkoląc zagranicznych dżihadystów."
 isis.11306.t: "Dowódca zginął w rosyjskim nalocie"
 isis.11306.d: "O Kalifie, złe wieści! Nasz gubernator regionu środkowego Eufratu, Ahmed Khalal al-Juhayshi, zginął śmiercią męczeńską w nalocie rosyjskich psów.\n\n                                                 Zabił wielu apostatów.\n\n                                    Niech Allah przyjmie jego męczeństwo."
 isisNews.11306.t: "Dowódca ISIS zginął w rosyjskim nalocie"
 isisNews.11306.d: "Iracki terrorysta i starszy członek ISIS, Ahmed Khalal al-Juhayshi, zginął dziś w rosyjskim nalocie. al-Juhayshi nie był wybitnym dowódcą wojskowym, ale administratorem i gubernatorem kluczowego dla Państwa Islamskiego regionu środkowego Eufratu."
 isis.11307.t: "Dowódca zginął w rosyjskim ataku lotniczym"
 isis.11307.d: "O Kalifie, złe wieści! Twój dobry przyjaciel i szef logistyki i zaopatrzenia, Fares Reif al-Naima, zginął śmiercią męczeńską w nalocie rosyjskich psów. Był wieloletnim odważnym i lojalnym mudżahedem, walczącym z niewiernymi i apostatami od 2003 roku.\n\n                               Zabił wielu na chwałę kalifatu.\n\n                         Niech Allah przyjmie jego męczeństwo."
 isisNews.11307.t: "Dowódca ISIS zginął w rosyjskim nalocie"
 isisNews.11307.d: "Iracki terrorysta i starszy dowódca ISIS, Fares Reif al-Naima, zginął dzisiaj w rosyjskim nalocie. al-Naima walczył z siłami amerykańskimi w wojnie w Iraku, a po tym, jak został przetrzymywany przez siły amerykańskie w obozie Bucca wraz z al-Baghdadim, zyskał rozgłos jako szef logistyki i zaopatrzenia Państwa Islamskiego."
