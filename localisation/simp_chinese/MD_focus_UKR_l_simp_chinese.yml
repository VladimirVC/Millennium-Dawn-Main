 UKR_interlegion_7: "呼叫§Y伊玛目沙米勒营§!去前线"
 UKR_interlegion_8: "呼叫§Y加拿大-乌克兰旅§!去前线"
 UKR_interlegion_11: "呼叫§Y诺曼旅§!去前线"
