 ANT_nukes_research_discovered_idea: "Antarctic Station Nuclear Weapon Research Discovered"
 ANT_nukes_research_discovered_idea_desc: "This country violated the principle of a total ban on military research in Antarctica by conducting research related to nuclear weapons."
 antarctica_small_treaty_admin_cost_1: "Antarctic Small Treaty Administration"
 antarctica_small_treaty_admin_cost_1_desc: "This country has signed one Antarctic small treaty (CCAS or CCAMLR), increasing administrative overhead for political action."
 antarctica_small_treaty_admin_cost_2: "Expanded Antarctic Treaty Administration"
 antarctica_small_treaty_admin_cost_2_desc: "This country has signed both Antarctic small treaties (CCAS and CCAMLR), requiring broader treaty administration and compliance resources."
 ANT_kicked_from_treaty_idea: "Kicked From Antarctic Treaty"
 ANT_kicked_from_treaty_idea_desc: "Due to repeated violations of the Antarctic Treaty, this country has been excluded from the agreement and cannot rejoin for the next two years."
 ANT_illegal_extraction_idea: "Antarctic Illegal Resource Extraction"
 ANT_illegal_extraction_idea_desc: "Our relations with other countries are worse because we are among the few who do not want to trade valuable resources to preserve a nice view of an icy wasteland. They care too much about that frozen block."
 ANT_military_training_idea: "Antarctic Illegal Military Training"
 ANT_military_training_idea_desc: "There is no better place to prepare our soldiers for a winter offensive than Antarctica."

