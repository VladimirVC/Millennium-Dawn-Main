 NKO_collective_leadership_system: "집단 지도 체계"
 NKO_collective_leadership_system_desc: ""
 NKO_chinese_style_democracy: "중국식 민주주의"
 NKO_chinese_style_democracy_desc: "서구식 민주주의는 우리나라의 상황과 완전히 부합하지 않습니다. 중국식 민주주의가 더 인기가 있는 것 같습니다."
 NKO_intra_party_democracy: "당 내 민주주의"
 NKO_intra_party_democracy_desc: ""
 NKO_agricultural_reform: "농업 개혁"
 NKO_agricultural_reform_desc: "북한의 집단농장은 실패했습니다. 생산량 증대를 위한 최선의 방법은 집단농장을 개혁하는 것입니다!"
 NKO_self_employed_agriculture: "자영 농업"
 NKO_self_employed_agriculture_desc: ""
 NKO_expand_autonomy_of_agricultural_cooperatives: "농업 조합의 자치권 확장"
 NKO_expand_autonomy_of_agricultural_cooperatives_desc: ""
 NKO_increase_agricultural_tax: "농업 세율 증가"
 NKO_increase_agricultural_tax_desc: ""
 NKO_decrease_agricultural_tax: "농업 세율 감소"
 NKO_decrease_agricultural_tax_desc: "농업세율을 낮추면 농민들은 더 만족하겠지만, 우리의 수입은 줄어들 것입니다."
 NKO_market_economy_system_pilot: "시장 경제 체계 시범"
 NKO_market_economy_system_pilot_desc: "우리는 선전, 상하이와 같은 시장 경제 시범 도시를 북한에 몇 군데 설립하여 시장이 안정적으로 운영되도록 하는 방법을 시험해 볼 필요가 있습니다."
 NKO_national_ownership_reform: "국유 체계 개혁"
 NKO_national_ownership_reform_desc: "국유화 제도는 이제 경제에 걸림돌이 되고 있습니다. 과감한 개혁이 필요합니다!"
 NKO_complementary_to_state_owned_economy: "국영 경제와 상호 보완"
 NKO_complementary_to_state_owned_economy_desc: ""
 NKO_jucheised_market_economy: "주체 시장 경제"
 NKO_jucheised_market_economy_desc: ""
 NKO_happiest_people_in_world: "세상에서 가장 행복한 인민"
 NKO_happiest_people_in_world_desc: ""
 NKO_agricultural_reform_tip: "§Y\"농민 간부에 여성을\"과 \"여성 노동자\" 중점을 완료하면, 정치 개혁 효과를 받게 됩니다.§!"
