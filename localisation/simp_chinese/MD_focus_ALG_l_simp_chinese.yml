 algeria_casablanca_accords_convince_sahrawi_desc: "与[SHA.GetAdjective]代表讨论他们是否会接受我们当前的协议。"
 algeria_casablanca_accords_convince_algeria: "说服[ALG.GetNameWithFlag]"
 algeria_casablanca_accords_convince_algeria_desc: "与[ALG.GetAdjective]代表讨论他们是否会接受我们当前的协议。"
 algeria_casablanca_accords_convince_mauritania: "说服[MAU.GetNameWithFlag]"
 algeria_casablanca_accords_convince_mauritania_desc: "与[MAU.GetAdjective]代表讨论他们是否会接受我们当前的协议。"
 ALG_unlock_FLN_focus_tt: "§4先将民族解放阵线设为执政党，之后再决定是组建联合政府还是单独执政。§!"
 ALG_fln_coalition_tt: "我们已经组建了总统竞选联盟，并从其他政党获得资金。"
 ALG_fln_no_coalition_tt: "我们选择独自掌权。"
 FLN_focus: "民族解放阵线的统治"
 ALG_crackdown_path: "§8选择镇压§!"
 TT_ALG_SOCIAL_DEMOCRAT_WIN: "[socialism_L]赢得大选"
 TT_ALG_POPULIST_WIN: "[Nat_Populism_L]赢得大选"
 TT_ALG_ISLAMIST_WIN: "[Neutral_Muslim_Brotherhood_L]赢得大选"
 TT_ALG_SOCIAL_DEMOCRAT_PATH_REQ: "[socialism_L]必须是执政党"
 TT_ALG_POPULIST_PATH_REQ: "[Nat_Populism_L]必须是执政党"
 TT_ALG_FEDERAL_PARTY_EXISTS: "联邦主义者已经成立了自己的政党"
 TT_ALG_FEDERALIST_COALITION: "联邦主义者加入政府联盟"
 TT_ALG_NATIONALIST_COALITION: "民族主义者已经成立了自己的政党"
 TT_ALG_FEDERAL_PARTY_EXISTS_NOT: "联邦主义者未成立他们的党派"
 TT_ALG_FEDERALIST_COALITION_NOT: "联邦主义者未加入政府联盟"
 TT_ALG_NATIONALIST_COALITION_NOT: "民族主义者未加入政府联盟"
 TT_ALG_US_PROTECTION_REQ: "[Western_Autocracy_L]必须是执政党"
 TT_ALG_DIRECT_DEM_REQ: "我们应该给予库尔德人公民身份，让他们能够在该地区传播直接民主理想。"
 TT_ALG_KICKING_ASSADS_EFFECT: "阿拉维派政治包容性：§R -40% §!"
 TT_ALG_REPUBLICANISM_FOCUS_EFFECT: "对于阿尔及利亚每一个重要的民族和宗教社区，我们都会选择：是保留议会席位给代表这些社区的政治家，以增加少数民族的包容性，但代价是增加腐败成本；还是不这样做，因为当他们的政治包容性低于§Y50%§!时，他们所在地区就会发生骚乱和财产损失。"
 TT_ALG_FEDERALISM_FOCUS_EFFECT: "对于阿尔及利亚的每一个重要的民族和宗教社区，我们将选择授予他们半自治权，增加他们的政治包容性，以换取减少资源开采、建设速度和建筑位置，以及增加改变政府法律的成本，与社区的政治包容性成反比，或者将该地区完全释放为一个自治国家。"
 TT_ALG_DIRECT_DEMOCRACY_REQ: "要让我们的直接民主制度有效运转，国家必须实现世俗化，恐怖主义威胁必须彻底消除，同时社会也要摆脱萨拉菲主义的影响、实现社会的安定。"
 TT_ALG_SECULARIZE_CONSTITUTION: "根据所采取的改革和政策，我们要么成为一个自由民主国家，要么成为一个非自由民主国家。"
 TT_ALG_ALLY_FARMERS: "农民将作为内部派系加入我们的斗争。"
 TT_ALG_ALLY_INDUSTRIALISTS: "工业集团将作为内部派系加入我们的斗争。"
 TT_ALG_ALLY_ULEMA: "乌里玛将作为内部派系加入我们的斗争。"
 TT_ALG_ALLY_INTL_BANKERS: "国际银行家将作为内部派系加入我们的斗争。"
 TT_ALG_AGRICULTURAL_INVESTMENT_EFFECT: "多次投资农业将为新市场和企业提供销售农产品的机会。然而，新企业所需的投资数量受腐败程度的影响。"
 ALG_GOVERNMENT_EXPANSION_FOCUS_EFFECT: "§Y我们将邀请一个政党加入联盟。在国家权力平衡过程中，无论是中央集权还是地方分权，该政党参与其各自的事业都将对我们大有裨益。§!"
 ALG_GOVERNMENT_EXPANSION_EVENT_REP_EFFECT: "§C拥有这个政党的联盟将极大地有利于我们在国家建设权力平衡过程中的集中化。§!"
 ALG_GOVERNMENT_EXPANSION_EVENT_FED_EFFECT: "§G在国家建设权力平衡过程中，拥有这个政党的联盟将极大地有利于我们的权力下放。§!"
 ALG_FINDING_PROMISING_BUREAUCRACY_EFFECTS: "如果成功，我们将获得§G75§!政治点数和§Y即将到来的官僚§!国家精神，从而获得§G+0.5§!§Y每日政治点数获取§!和§G+0.2§!§Y建设速度§!，持续§Y100§!天。"
 ALG_STATE_DECISION_MAKING_SUCCESS_EFFECTS: "如果成功的话，我们将获得§G5%§!稳定度。"
 ALG_LOCAL_ACCOUNTABILITY_SUCCESS_EFFECTS: "如果成功，我们将获得§G10%§!政党支持率，并减少腐败。"
 ALG_FUND_VOLUNTARY_ORGANIZATIONS_SUCCESS_EFFECTS: "如果成功，我们将减少腐败并获得§Y志愿组织的崛起§!，从而获得§G0.2§!每日政治点数获取和§G+30%§!建设速度，持续§Y100§!天。"
 ALG_ENCOURAGE_ECONOMIC_SELF_RELIANCE: "如果成功，我们将增加经济增长周期。"
 TT_ALG_KURDS_WITHOUT_CITIZENSHIPS_PARTY_FORMATION: "§G在驱逐阿萨德家族后，通过授予库尔德人公民身份，他们将组建一个旨在将阿尔及利亚转变为联邦制国家的政党§!"
 ALG_ECONOMIC_DECISIONS_ONE_FREE_FACTORIES_EXPLANATION: "§R至少应有一个工业复合体可用但未分配建设。取消您分配的任何建设或等到它完成并可用§!"
 ALG_ECONOMIC_DECISIONS_TWO_FREE_FACTORIES_EXPLANATION: "§R至少应有两个工业园区可用但未分配建设。取消您分配的任何建设或等到其完成并可用§!"
 ALG_ECONOMIC_DECISIONS_THREE_FREE_FACTORIES_EXPLANATION: "§R至少应有三个工业园区可用但未分配建设。取消您分配的任何建设或等到其完成并可用§!"
 ALG_FEDERAL_FORMATION_TOOLTIP: "如果我们所有少数族裔包容度数值都达到§Y50%§!或更高，§G阿尔及利亚联邦§!将会成立。"
 ALG_UNITARY_FORMATION_TOOLTIP: "如果所有少数族裔包容性数值均达到§Y50%§!或更高，§C阿尔及利亚共和国§!将会成立。"
 ALG_tech_name: "科研加成"
 TT_ALG_CORRUPTION_COSTS: "我们的机构越腐败，我们的投资成本就越高"
 ALG_algeria_invite_ciw: "§C我们会邀请每一个伊斯兰国家加入伊斯兰福利联盟§!"
 dyn_ALG_tt: "这一国策的效果取决于阿尔及利亚政府的意识形态！"
 ALG_islamist_opposition_victory: "伊斯兰反对派政府"
 ALG_islamist_opposition_victory_desc: "伊斯兰反对派联盟赢得了选举，并将带领阿尔及利亚成为一个保守的伊斯兰共和国。"
 ALG_islamist_renaissance: "伊斯兰复兴"
 ALG_islamist_renaissance_desc: "我们的胜利鼓舞了群众对我们的支持。一种新的文化已经形成，我们全心全意地支持它。"
 ALG_empower_sharia_courts: "赋予沙里亚权力"
 ALG_empower_sharia_courts_desc: "是时候赋予沙里亚司法权力并扩大其影响力了。"
 ALG_turkish_inspired_islamism: "土耳其式伊斯兰主义"
 ALG_turkish_inspired_islamism_desc: "我们将从土耳其共和国建立后兴起的伊斯兰主义运动中汲取灵感。这会让我们的运动在现阶段显得更加温和，或许还能吸引土耳其的保守派商人来我国投资。"
 ALG_deregulate_economy: "自由市场经济"
 ALG_deregulate_economy_desc: "为了增强我们从中获得大量支持的中产阶级和商人阶层，我们将减少对他们的限制，并提供他们成长所需的空间。"
 ALG_moderate_conservatism: "温和保守主义"
 ALG_moderate_conservatism_desc: "我们将清除队伍中的极端分子，重塑我们作为保守主义力量的形象，与宗教狂热主义划清界限。"
 ALG_religious_values: "我们的价值观坚定不移"
 ALG_religious_values_desc: "或许我们先前安抚民众、软化形象的策略，已使我们偏离了理想所依托的真正价值。我们不再在意他人如何看待我们，唯一的目标是在我们的土地上建立伊斯兰教法，无论这多么不受欢迎。"
 ALG_religious_economic_charity: "宗教捐赠"
 ALG_religious_economic_charity_desc: "我们的运动一直与造福社区的慈善机构和基金会紧密相连。如今我们拥有了更加重要的地位，我们将进一步完善这些机构和基金会的制度化运作，以减轻我们的经济负担。"
 ALG_qatari_support: "卡塔尔的支持"
 ALG_qatari_support_desc: "我们引起了卡塔尔投资者的兴趣。"
 ALG_flourishment_of_central_economy: "发展城市中心"
 ALG_flourishment_of_central_economy_desc: "我们的支持基础主要来自各个城市地区，我们应该开始发展这些地区，以增强当地民众对我们的支持。"
 ALG_turkish_investments: "土耳其投资"
 ALG_turkish_investments_desc: "由于我们的放松管制政策以及我们与土耳其的意识形态相似性，我们吸引了大量土耳其投资者。"
 ALG_reverse_secularization: "逆世俗化"
 ALG_arm_palestinians_to_fight: "武装巴勒斯坦人"
 ALG_arm_palestinians_to_fight_desc: "约旦有大量巴勒斯坦难民。 我们可以将这些难民变成战斗人员，并煽动他们在巴勒斯坦和以色列搞破坏。 由于他们是代理人战斗人员，我们可以使用它们煽动以色列对巴基斯坦进行报复，使他们看起来像是这次冲突中的坏人角色"
 ALG_zionist_threat: "犹太复国主义的威胁"
 ALG_zionist_threat_desc: "以色列是所有穆斯林最大的耻辱，也是伊斯兰中心地区可恶的伪政权。 他们需要从大地上消失"
 ALG_help_sahara: "我们的撒哈拉朋友"
 ALG_help_sahara_desc: "我们正在接触许多支持我们泛阿拉伯主义事业的运动，波利萨里奥阵线就是其中之一，旨在解放北撒哈拉人民。在过去的一个世纪里，波利萨里奥党与殖民统治和摩洛哥的压迫作斗争，现在波利萨里奥阵线只控制着西撒哈拉的一小部分地区。目前冲突已经冻结，但我们可以通过向我们的朋友提供军事援助并为撒哈拉人提供继续斗争所需的一切来改变这一状况。"
 algeria.42.t: "来自[FROM.GetName]的军火援助！"
 algeria.42.d: "他们给我们送了枪支！"
 algeria.42.a: "太好了"
 algeria.43.t: "阿尔及利亚提出外交抗议！"
 algeria.43.d: "阿尔及利亚总统阿卜杜拉扎克·马克里对我国政府提出外交抗议。他声称我们是恐怖分子，国际社会必须开展特别行动来清算我们的政权。"
 algeria.43.a: "马克里，滚一边去!"
 ALG_support_fsa: "支持叙利亚自由军"
 ALG_support_fsa_desc: "我们与叙利亚的关系有着悠久的历史。现在，这些关系必须由它们与兄弟情谊意识形态的关系来定义……"
 ALG_brotherhood_diplo: "兄弟会外交"
 ALG_brotherhood_diplo_desc: "我们必须根据新政府的要求改革我们的外交。"
 ALG_hamas_under_wing: "哈马斯在我们的庇护下"
 ALG_hamas_under_wing_desc: "哈马斯是位于加沙地带的自由战士组织，与穆斯林兄弟会有关联。帮助他们是我们的责任！"
 algeria.44.t: "哈马斯控制了加沙"
 algeria.44.d: "在阿尔及利亚的支持下，哈马斯已经控制了加沙地区。 他们的武装民兵控制了政府大楼，他们的发言人[HAM.GetLeader]表示，该组织正准备继续前进并解放阿克萨清真寺。"
 algeria.44.a: "该死"
 ALG_letter_isr: "以色列的操纵"
 ALG_letter_isr_desc: "哦，以色列！是时候决定如何处置你了……"
 MSP_letter_isr: "以色列的操纵"
 MSP_letter_isr_desc: "哦，以色列！是时候决定如何处置你了……"
 algeria.45.t: "马克里的困境"
 algeria.45.d: "现在是我们决定如何对待以色列的时候了……"
 algeria.45.a: "让我们寄一封友谊信吧！"
 algeria.45.b: "我们真的需要做点什么吗？"
 algeria.45.c: "如果什么...？"
 algeria.46.t: "阿尔及利亚的信"
 algeria.46.d: "伟大的好朋友，出于维护和加强我们两国之间幸福存在的友好关系的愿望，我选择阿提夫·穆罕默德·萨利姆·赛义德·阿尔阿尔先生担任我们的特命全权大使。我们希望在我们各国之间建立全面的和平。"
 algeria.46.a: "呃？如何？"
 algeria.46.b: "真是个疯子"
 ALG_und_supp_hamas: "哈马斯的秘密支持"
 ALG_und_supp_hamas_desc: "为了使哈马斯事业取得成功，我们必须在物质上支持他们。"
 ALG_org_of_isl_coop: "伊斯兰合作组织"
 ALG_org_of_isl_coop_desc: "伊斯兰合作组织前身为伊斯兰会议组织，是一个政府间组织，成立于1969年，现有57个成员国，其中48个是穆斯林占多数的国家。"
 MSP_und_supp_hamas: "哈马斯的秘密支持"
 MSP_und_supp_hamas_desc: "为了使哈马斯事业取得成功，我们必须在物质上支持他们。"
 MSP_org_of_isl_coop: "伊斯兰合作组织"
 MSP_org_of_isl_coop_desc: "伊斯兰合作组织前身为伊斯兰会议组织，是一个政府间组织，成立于1969年，现有57个成员国，其中48个是穆斯林占多数的国家。"
 algeria.47.t: "伊斯兰合作峰会在开罗举行！"
 algeria.47.d: "阿尔及利亚总统阿卜杜拉扎克·马克里在开罗主持召开伊斯兰峰会，来自穆斯林国家的57名领导人出席。声明敦促阿尔及利亚政府和反对派联盟进行“实质性对话”，以结束内战。"
 algeria.47.a: "对他们和我们都有好处！"
 algeria.48.t: "阿卜杜拉扎克·马克里的宪法"
 algeria.48.d: "我们之前的宪法可以说是阿尔及利亚历史上对阿尔及利亚人最糟糕的！为了废除这份耻辱的宪法，我们将制定一部真正属于穆斯林的新宪法。现在的主要选择是：是继续沿用传统的中央集权模式，还是走向更加分散但更具扩张性的模式？我们应该选择哪条道路？"
 algeria.48.a: "阿尔及利亚需要先稳定自身局势，才能帮助其他国家！"
 algeria.48.b: "扩张主义是我们的国家发展蓝图，它应该写入宪法！"
 algeria.49.t: "阿尔及利亚要求释放奥马尔·阿卜杜勒-拉赫曼"
 algeria.49.d: "马克里在信中简要提到，他要求我们释放因1993年纽约世贸中心爆炸案而被定罪的奥马尔·阿卜杜勒-拉赫曼，以及许多在革命期间被捕的埃及人。穆斯林兄弟会发言人后来表示，引渡是出于人道主义原因，马克里无意推翻阿卜杜勒-拉赫曼的刑事定罪。"
 algeria.49.a: "马克里疯了？"
 algeria.49.b: "呃。。确定？"
 ALG_supp_plo: "支持巴勒斯坦解放组织"
 ALG_supp_plo_desc: "巴勒斯坦解放组织长期以来一直是争取巴勒斯坦自决权斗争中的关键力量。支持巴解组织可以增强我们与国际盟友的关系，并促进冲突的和平解决。"
 ALG_the_pal_issue: "巴勒斯坦问题"
 ALG_the_pal_issue_desc: "巴勒斯坦问题仍然是我们外交政策中的关键议题。我们对巴勒斯坦斗争的立场将决定我们在该地区的国际联盟和影响力。我们必须决定如何应对这场持续不断的冲突。"
 ALG_supp_hamas: "支持哈马斯"
 ALG_supp_hamas_desc: "哈马斯是巴勒斯坦抵抗运动中的一个重要派系。通过提供支持，我们可以加强与该组织的联系，提升我们在该地区的影响力，并与他们的斗争保持一致。"
 ALG_Get_rid_of_military_corrupt: "清除军队腐败分子"
 ALG_Get_rid_of_military_corrupt_desc: "军方已根深蒂固地渗透到我们的机构中​​，对国家的未来构成明显威胁。我们将以腐败罪名逮捕他们，并没收我们能够获得的任何财产。"
 idea_algerian_oligarchy_arrests: "军队清洗"
 ALG_the_coalition: "联合政府"
 ALG_the_coalition_desc: "在重建政党之后，出现了两股引人注目的力量。一股主张将国家联邦化，赋予各省更多权力，另一股主张巩固中央集权，维护统一的中央集权共和国。我们必须谨慎选择应该与谁结盟"
 ALG_dismantle_the_military: "削减军事预算"
 ALG_dismantle_the_military_desc: "由于军队内部根深蒂固的腐败，国防预算的很大一部分被挪用并用于无用的项目。我们将重新利用和出售我们能得到的大部分东西，虽然这可能会削弱我们的军事力量并使我们容易受到威胁，但这是实现经济复苏和根除腐败的必要步骤。"
 ALG_empower_institutions: "赋予机构权力"
 ALG_empower_institutions_desc: "我们的机构非常薄弱，被边缘化。这是因为权力集中在总统身上，议会的权力很小，而且国家控制的媒体支持限制个人自由的氛围。起草一部确保权力分配和自由化的新宪法是迈向未来的关键一步。"
 ALG_western_supported_economic_relief: "西方援助"
 ALG_western_supported_economic_relief_desc: "我们的理想与西方一致，甚至允许我们在他们的国家成立政党。我们将与他们建立联系，并要求他们提供救济，以换取经济杠杆。"
 ALG_liberalize_society: "自由化社会"
 ALG_liberalize_society_desc: "人民对自由和平等的价值观还很陌生。我们应该努力鼓励他们珍视自己的自由。"
 ALG_scientific_ventures: "科研探索"
 ALG_scientific_ventures_desc: "通过支持奖学金和更新我们过时的学校课程，我们将能够推动该国科学领域的发展。"
 Algeria_student_exchanges: "交换生项目"
 ALG_banish_authoritarian_influence: "消除威权影响"
 ALG_banish_authoritarian_influence_desc: "伊朗和俄罗斯等许多独裁国家都曾在此占有重要地位。现在我们是一个自由国家，是时候结束他们对我们的制度和经济的影响了。"
 ALG_democratic_socialism: "民主社会主义"
 ALG_democratic_socialism_desc: "我国糟糕的经济状况导致民众生活贫困落后。减少对企业的限制将导致剥削和不公平竞争，因为我国经济不平等现象依然普遍存在。我们需要专注于鼓励新企业在国内发展，并向它们提供补贴，以促进各阶层公民都能享受到广泛的经济发展。"
 ALG_unleash_economic_potential: "释放经济潜力"
 ALG_unleash_economic_potential_desc: "我们有很大潜力成为经济强国。我们可以鼓励外国投资者和企业在这里设立公司，尽管这将使我们的人口成为廉价劳动力，但这将是我们经济发展的一大飞跃。"
 ALG_domestic_investments: "国内投资"
 ALG_domestic_investments_desc: "许多年轻的国内企业正在成立。我们将对他们进行投资，支持他们走向经济繁荣。"
 ALG_subsidize_local_firms: "本地公司"
 ALG_subsidize_local_firms_desc: "得益于我们的政策，本地企业的成功得到了认可。是时候投资它们了。"
 ALG_economic_democracy: "经济平等"
 ALG_economic_democracy_desc: "我们的经济发展通过解决经济不平等问题惠及了所有经济背景的所有人，甚至催生了成功的国内企业。这是我们应该感到自豪的事情。"
 ALG_federalisation: "联邦化"
 ALG_federalisation_desc: "解决方案是赋予各州更多权力。这将极大促进地方代表性和包容性，并有效缓解宗派恐惧与紧张局势。然而，这种自治将削弱我们对各州的控制力，尤其是在存在少数族裔的地区。"
 ALG_algerian_investments: "侨民投资"
 ALG_algerian_investments_desc: "由于我们的经济友好政策，我们吸引了居住在国外的阿尔及利亚侨民的投资。"
 ALG_invite_US_business_giants: "邀请商业巨头"
 ALG_invite_US_business_giants_desc: "虽然我们已经让经济繁荣起来，但这还不够。我们将邀请美国的大型企业在该国建立特许经营店，以鼓励消费主义。"
 ALG_republicanism: "共和主义"
 ALG_republicanism_desc: "阿尔及利亚最好是一个拥有中央集权的强大国家。这将加强我们政府的统治，但会引起感到被边缘化的少数群体的疏远和愤怒。"
 ALG_address_ethnic_divides: "解决种族分歧"
 ALG_address_ethnic_divides_desc: "我们的国家一直处于分裂状态，并饱受宗派主义的困扰。我们应该决定如何解决这些问题。"
 ALG_EU_investments: "欧盟的投资"
 ALG_EU_investments_desc: "欧洲各国正在寻求在我国投资。"
 ALG_student_exchanges: "交换生项目"
 ALG_student_exchanges_desc: "我们将鼓励学生到国外学习，以提高我们的教育水平，使其与全球标准保持一致。"
 ALG_democratic_victory: "民主胜利"
 ALG_democratic_victory_desc: ""
 ALG_new_era: "新时代"
 ALG_new_era_desc: "该地区将迎来一个新时代。一个和平、稳定、没有压迫和不公正的时代。"
 ALG_islamic_nato: "伊斯兰北约"
 ALG_islamic_nato_desc: "尽管北约为我们提供了安全保障，但北约成员国已表明他们对中东地区完全漠不关心。如果他们无法带来稳定与繁荣，我们就必须肩负起这个责任。我们将组建自己的军事联盟——地中海条约组织，简称MTO。"
 ALG_invite_iraq: "邀请伊拉克"
 ALG_invite_iraq_desc: "我们需要邀请伊拉克加入我们的联盟，他们正逐渐步入正轨，双方的合作将为我们带来切实的利益。"
 ALG_invite_syria: "邀请叙利亚"
 ALG_invite_syria_desc: "叙利亚紧邻我国南部边境，这意味着我们的防御态势相当脆弱。将叙利亚纳入我们的阵营，将是确保国家安全与稳定的绝佳途径。"
 ALG_invite_algeria: "邀请埃及"
 ALG_invite_algeria_desc: "埃及是一个新兴的强国，拥有如此庞大的人口，我们的联盟几乎能够实现任何目标。"
 ALG_assistance_to_bulgaria: "援助保加利亚"
 ALG_assistance_to_bulgaria_desc: "我们应该帮助保加利亚发展基础设施，以便我们能够轻松地进行更多境外投资。"
 ALG_islamic_economic_cooperation: "伊斯兰经济合作组织"
 ALG_islamic_economic_cooperation_desc: "许多穆斯林国家资金充裕，却将财富挥霍于无谓之事。我们应当组建经济联盟，汇聚资源共同投入经济建设。"
 ALG_msp_win: "§R注意§!：§G该国策将解锁和平社会运动国策树！此该国策将被覆盖。§!"
 algeria_news.1.t: "阿尔及利亚发生军事政变！"
 algeria_news.1.d: "阿尔及利亚局势急转直下，一场军事政变爆发，推翻了[ALG.GetLeader]政府，国家陷入动荡不安。执政党与反对派之间的紧张关系不断升级，由艾哈迈德·盖德·萨拉赫将军领导的阿尔及利亚军方夺取了国家机器的控制权，中止了宪法，并拘留了关键政治人物。开罗街头一片欢腾，同时也弥漫着忧虑，反映出阿尔及利亚国内对军方干预的深刻分歧。国际社会密切关注着阿尔及利亚的未来，并日益担忧此次政变对该地区民主与稳定的影响。"
 algeria_news.1.a: "有趣"
 algeria_news.2.t: "阿尔及利亚正处于十字路口"
 algeria_news.2.d: "经历了近十年的流血冲突和动荡之后，阿尔及利亚如今处境脆弱而充满不确定性。虽然许多地区的枪声已经平息，但和平远未得到保障。这个国家正站在一个关键的十字路口：它会选择和解与改革，继续在军方的紧急统治下维持现状，还是再次陷入冲突？阿尔及利亚人民乃至全世界的目光都聚焦于未来的走向。"
 algeria_news.2.a: "阿尔及利亚未来之争开始了"
 algeria_news.3.t: "布特弗利卡就任总统"
 algeria_news.3.d: "1999年4月，阿卜杜勒-阿齐兹·布特弗利卡当选阿尔及利亚总统，结束了多年的政治危机，使该国重回正式的文官领导。尽管战争尚未完全结束，布特弗利卡上任伊始便决心恢复稳定，重建国家，并带领阿尔及利亚迈入新千年。他的和解与对话纲领让许多阿尔及利亚人燃起了希望，但人们仍然怀疑他的总统任期能否真正治愈“黑色十年”带来的创伤。"
 algeria_news.3.a: "布特弗利卡领导下的新时代开始"
 algeria_news.4.t: "布特弗利卡宣布和平宪章"
 algeria_news.4.d: "阿卜杜勒-阿齐兹·布特弗利卡总统公布了一项名为“和平与民族和解宪章”的全面倡议。该计划承诺赦免放下武器的武装分子，帮助悔改的战士重返社会，并向受害者家属提供赔偿。支持者称赞该宪章是结束阿尔及利亚长达十年流血冲突的最佳契机，而批评者则认为它有可能在未能伸张正义的情况下赦免暴力实施者。全国上下都在密切关注这一大胆举措能否带来持久和平。"
 algeria_news.4.a: "翻过黑色十年新篇章的机会"
 algeria_news.5.t: "民族解放阵线重拾革命传统"
 algeria_news.5.d: "布特弗利卡总统和民族解放阵线发起了一场全国性运动，旨在通过铭记独立战争来巩固其执政合法性。国家媒体和学校现在都在颂扬烈士的牺牲，将民族解放阵线塑造成阿尔及利亚主权的永恒捍卫者。与此同时，政府与其他主要政党结盟，组建政治联盟以巩固权力并展现统一战线。批评人士谴责这场运动是机会主义宣传，而支持者则将其视为阿尔及利亚革命精神的重生。"
 algeria_news.5.a: "团结就是革命的动力。"
 algeria_news.5.b: "民族解放阵线不应单独执政。"
 algeria_news.6.t: "总统联盟的成立"
 algeria_news.6.d: "民族解放阵线在其革命性运动的基础上，组建了名为“总统联盟”的执政联盟。民族解放阵线、全国民主联盟和争取和平社会运动已同意协调政策，支持布特弗利卡总统。该联盟加强了执政集团对阿尔及利亚政治体系的控制，向公众展现了统一战线。支持者称赞该联盟是稳定的象征，但反对派警告说，阿尔及利亚有可能在新伪装下进一步滑向一党专政的深渊。"
 algeria_news.6.a: "我们携手守护阿尔及利亚的未来"
 ALG_presidential_alliance: "§Y民族解放阵线、民族民主联盟和和平社会运动组成了总统联盟。§!\n该联盟增强了政府的稳定性，但也巩固了执政联盟的政治统治地位。"
 algeria_news.7.t: "危机再度重燃"
 algeria_news.7.d: "和解与改革的承诺已化为谎言。民族解放阵线及其在民族民主联盟和其他民主党派中的所谓盟友未能兑现人民所要求的正义和权利。许多人对空洞的承诺感到失望，转而支持“萨拉菲主义斗争组织”，他们相信只有真主的律法才能为阿尔及利亚带来真正的正义。对他们而言，伊斯兰教法代表着更高的法律，不受政客的贪婪、哈尔基派的背叛或外国势力的影响。这并非一场针对阿尔及利亚人民的战争，而是一场针对那些窃取人民未来的腐败官员和受外国势力支持的精英的战争。一场新的内战正在逼近——这场战争将一劳永逸地决定阿尔及利亚的命运。"
 algeria_news.7.a: "真主的律法将指引阿尔及利亚的未来。"
 ALG_army_alliance: "权力集团日益增强"
 ALG_strengthen_le_pouvoir: "加强权力集团"
 ALG_strengthen_le_pouvoir_desc: "统治精英和军方以牺牲政治自由为代价来巩固权力。"
 ALG_resistance_challenges_new: "人民的要求"
 ALG_resistance_challenges_new_desc: "民众要求在医疗、教育和就业领域进行改革。如果这些需求得不到满足，将会加剧民众的不满，并将阿尔及利亚推向内战的边缘。"
 ALG_healthcare_reform: "改革医疗保健系统"
 ALG_healthcare_reform_desc: "医院人满为患，医生收入微薄，医疗资源严重短缺。我们必须迅速采取行动。"
 alg.310.t: "医疗改革取得成功"
 alg.310.d: "对医院和医生的投资恢复了人们对政府的部分信心。"
 alg.310.a: "一场小胜"
 alg.311.t: "医疗保健崩溃"
 alg.311.d: "医院不堪重负，病人被拒之门外，腐败侵蚀着整个医疗体系。民众的愤怒彻底爆发。"
 alg.311.a: "这将使我们付出惨痛的代价。"
 ALG_education_reform: "改革教育体系"
 ALG_education_reform_desc: "我们的学校和大学设施陈旧，毕业生面临失业的困境。"
 alg.320.t: "教育改革取得成功"
 alg.320.d: "对中小学和大学的投资让学生们重燃希望。"
 alg.320.a: "更光明的未来"
 alg.321.t: "教育崩溃"
 alg.321.d: "教室拥挤、大学办学失败、缺乏机会，这些都加剧了人们的不满情绪。"
 alg.321.a: "年轻人与我们对抗。"
 ALG_unemployment_reform: "应对失业危机"
 ALG_unemployment_reform_desc: "阿尔及利亚的年轻人失业且躁动不安。我们必须投资工业和创造就业机会，否则将面临动荡。"
 alg.330.t: "就业计划取得成功"
 alg.330.d: "新的就业机会和小产业为成千上万的阿尔及利亚年轻人带来了希望。"
 alg.330.a: "向前迈进"
 alg.331.t: "失业危机加剧"
 alg.331.d: "工厂停工，毕业生流落街头，抗议活动演变成暴力事件。"
 alg.331.a: "这种情况不能一直持续下去。"
 alg.400.t: "军队接受战败"
 alg.400.d: "国家军队已失去对政治的控制。随着公众压力不断增加，军官们不愿再冒血腥战争的风险，将军们接受了让位给文职领导的方案。"
 alg.400.a: "终于实现了文官统治！"
 alg.401.t: "军队反击"
 alg.401.d: "尽管改革已经开始，但军队仍然掌握着实权。高级将领干预政治、挪用资金，并破坏提高透明度的努力。阿尔及利亚再次滑向影子统治。"
 alg.401.a: "腐败的将军们仍然掌权。"
 alg.402.t: "人民奋起反抗"
 alg.402.d: "阿尔及利亚人民的怨恨已达到临界点。随着社会稳定丧失，民众对政府机构的信任崩溃，抗议活动演变为公开叛乱。阿尔及利亚面临另一场内战。"
 alg.402.a: "国家四分五裂。"
 ALG_resist_le_pouvoir: "抵抗权力集团"
 ALG_resist_le_pouvoir_desc: "数十年来，被称为“权力集团”的腐败精英阶层一直暗中统治着阿尔及利亚，并以军队作为其铁腕手段。民众躁动不安，除非他们的不满得到解决，否则阿尔及利亚可能面临另一场风暴。选择这条道路，要么开启改革之路，要么带来流血冲突。"
 ALG_popular_salvation: "民众救世运动"
 ALG_popular_salvation_desc: "从绝望的灰烬中，一场新的运动正在兴起。学生、工人和心灰意冷的士兵团结起来，呼吁变革。这场运动能否和平推翻旧秩序，还是会引发内战，取决于我们如何应对民众的诉求。"
 ALG_popular_salvation_tt: "§Y这种做法加强了反对派运动，但并不必然导致内战。最终结果取决于如何处理民众的不满情绪和军队的影响力。§!"
 ALG_restore_hope: "重拾希望"
 ALG_restore_hope_desc: "1999年，阿卜杜勒-阿齐兹·布特弗利卡上台执政，承诺在“黑色十年”之后实现稳定与和解。人民视他为希望的象征。"
 ALG_charter_for_peace: "和平宪章"
 ALG_charter_for_peace_desc: "布特弗利卡政府通过赦免许多前叛乱分子，力图结束流血冲突，走向民族团结。"
 ALG_no_pres_alliance: "民族解放阵线独掌大权"
 ALG_no_pres_alliance_desc: "布特弗利卡和民族解放阵线拒绝与其他政党结盟，主张对阿尔及利亚政治体系拥有完全的控制权。"
 ALG_le_pouvoir_in_the_shadows: "暗影中的权力集团"
 ALG_le_pouvoir_in_the_shadows_desc: "尽管举行了选举，但真正的权力仍然掌握在根深蒂固的精英手中。腐败日益加剧，民众也越来越不满。"
 ALG_sonatrach_scandal: "阿尔及利亚国家石油公司丑闻"
 ALG_sonatrach_scandal_desc: "阿尔及利亚国家石油公司因大规模腐败丑闻曝光而陷入困境，损害了政府的信誉。"
 ALG_peace_charter: "和平宪章"
 ALG_peace_charter_desc: "布特弗利卡发起了一项旨在赦免和重新接纳前武装分子的倡议，目标是治愈阿尔及利亚“黑色十年”的创伤。"
 ALG_fln_dominance: "民族解放阵线处于主导地位"
 ALG_fln_dominance_desc: "民族解放阵线继续主导阿尔及利亚的政治体系。它的主导地位限制了政治多元化，加剧了反对派团体的不满，但同时也为政权提供了延续性和控制力。"
 ALG_only_FLN: "无同盟"
 ALG_only_FLN_desc: "民族解放阵线将单独执政，拒绝结盟或联合。虽然这巩固了权力，但也进一步孤立了反对派力量，并有可能加剧公众的不满。"
 ALG_pres_coa: "总统联盟"
 ALG_pres_coa_desc: "为了维持稳定，民族解放阵线可以组建更广泛的总统执政联盟。通过吸纳效忠派政党和独立人士，政府既能获得合法性，又能保持其主导地位。"
 ALG_post_civil_war_trauma: "内战后的创伤"
 ALG_post_civil_war_trauma_desc: "黑色十年的记忆在阿尔及利亚社会依然鲜明。创伤、不信任和分裂的阴影依然沉重，深刻影响着政治、治理和和解进程。"
 ALG_nationalize_privatized_industries: "将私有化产业国有化"
 ALG_nationalize_privatized_industries_desc: "20世纪90年代的新自由主义私有化削弱了阿尔及利亚的主权。通过将关键产业重新国有化，国家可以重新掌控战略部门。"
 ALG_sonatrach_expansion: "阿尔及利亚国家石油公司扩张"
 ALG_sonatrach_expansion_desc: "阿尔及利亚国家石油公司是阿尔及利亚经济的支柱。扩大其产能和业务范围将增加国家财政收入，并提升阿尔及利亚在全球能源市场的影响力。"
 ALG_the_cult_of_bouteflika: "布特弗利卡崇拜"
 ALG_the_cult_of_bouteflika_desc: "布特弗利卡总统的支持者正在围绕他的领导地位建立个人崇拜。通过忠诚的人脉网络和宣传，他的亲信巩固了他对阿尔及利亚政坛的统治地位，即便腐败和裙带关系日益加剧。"
 ALG_cult_of_bouteflika: "布特弗利卡的随从"
 ALG_cult_of_bouteflika_desc: "布特弗利卡身边围绕着一群忠诚却腐败透顶的亲信，他们掌控着权力命脉。他们的影响力确保了政权的稳定，但也助长了裙带关系，降低了政府的透明度。"
 ALG_oppose_ffs_and_rcd: "查禁社会主义力量阵线与争取文化与民主联盟"
 ALG_oppose_ffs_and_rcd_desc: "社会主义力量阵线和争取文化与民主联盟挑战了民族解放阵线的主导地位。政权通过取缔这些组织，消除了反对派的声音，但也有可能激化民众的不满，尤其是在卡比利亚地区。"
 ALG_smaller_state: "小国家"
 ALG_smaller_state_desc: "臃肿的阿尔及利亚政府效率低下且成本高昂。缩小政府规模并下放权力可以提高效率，但根深蒂固的精英阶层会抵制此类改革。"
 ALG_fight_bloated_bureaucracy: "对抗臃肿的官僚机构"
 ALG_fight_bloated_bureaucracy_desc: "阿尔及利亚的官僚机构层层叠叠，严重阻碍了国家治理。开展精简公共行政部门的运动将有助于减少腐败，并使公共服务更加贴近民众。"
 FLN_parties_corruptions: "我们党内的腐败问题"
 FLN_parties_corruptions_desc: "腐败已经渗透到民族解放阵线及其盟友政党内部。如果该政权希望恢复信誉，谴责和解决这种腐败问题至关重要。"
 ALG_elite_control: "精英控制"
 ALG_elite_control_desc: "一个由商业巨头、政党领袖和军官组成的网络，被称为“权力集团”，在幕后统治着阿尔及利亚。"
 ALG_military_coup: "军事政变"
 ALG_military_coup_desc: "军队决定结束文官领导，直接夺取政权，承诺带来秩序，但也带来了恐惧。"
 ALG_suspend_democracy: "中止民主"
 ALG_suspend_democracy_desc: "议会解散，选举取消，阿尔及利亚由军方统治。"
 ALG_repression_campaign: "镇压运动"
 ALG_repression_campaign_desc: "国家人民军沿用“黑色十年”时期残酷的手段镇压异议，引发国际社会的强烈愤慨。"
 ALG_black_market_rises: "黑市崛起"
 ALG_black_market_rises_desc: "腐败和物资短缺滋生了蓬勃发展的黑市，破坏了正规经济。"
 ALG_expand_the_pna: "国家人民军扩张"
 ALG_expand_the_pna_desc: "军队规模扩大、现代化改造、实力增强，以保障政权的生存。"
 ALG_africas_strongest_army: "非洲最强军队"
 ALG_africas_strongest_army_desc: "阿尔及利亚现在拥有非洲大陆最强大的武装力量，这是一支不容小觑的力量。"
 ALG_global_power_projection: "最高国务委员会再次崛起"
 ALG_global_power_projection_desc: "随着军方再次掌握绝对权力，阿尔及利亚在国内和国际上都展现出强大的实力。如同上世纪90年代的“最高国务委员会”时期一样，我们的国家昂首挺立，坚韧不拔，并准备将影响力扩展到国界之外。世界将铭记阿尔及利亚人民的坚定决心。"
 algeria_news.100.t: "阿尔及利亚国家石油公司丑闻"
 algeria_news.100.d: "阿尔及利亚国家石油公司深陷腐败和挪用公款丑闻的泥潭。据称，数十亿美元的石油和天然气收入被与政权关系密切的精英阶层侵吞。随着公众愤怒情绪的日益高涨，这一丑闻有可能动摇国家的稳定。"
 algeria_news.100.a: "掩盖真相"
 algeria_news.100.b: "调查腐败"
 algeria_news.100.c: "指责反对派"
 ALG_army_reform: "军队改革"
 ALG_army_reform_specops: "军队改革"
 ALG_army_reform_specops2: "军队改革"
 ALG_army_reform_specops3: "军队改革"
 ALG_army_reform_specops4: "军队改革"
 ALG_military_quality_initiative: "军事质量倡议"
 ALG_military_quality_initiative2: "军事质量倡议"
 ALG_army_reform_mass_army: "军队改革"
 ALG_army_reform_mass_army2: "军队改革"
 ALG_army_reform_mass_army3: "军队改革"
 ALG_army_reform_mass_army4: "军队改革"
 ALG_military_expansion: "军事扩张"
 ALG_military_expansion2: "军事扩张"
 ALG_foreign_arms_companies: "外国武器公司"
 ALG_future_army: "未来之军"
 ALG_air_reform: "空军改革"
 ALG_air_reform2: "空军改革"
 ALG_air_reform3: "空军改革"
 ALG_air_reform4: "空军改革"
 ALG_naval_reform: "海军改革"
 ALG_naval_reform2: "海军改革"
 ALG_naval_reform3: "海军改革"
 ALG_naval_reform4: "海军改革"
 ALG_shipbuilding: "阿尔及利亚造船业"
 ALG_shipbuilding2: "阿尔及利亚造船业"
 ALG_resist_le_pouvoir_system_tt: "§Y新系统解锁：民众不满与军队影响力§!\n\n-§O民众不满§!指数衡量的是民众的不满程度。如果失业、教育或医疗保健问题被忽视，该指数就会上升。\n-如果民众的不满情绪过于高涨，可能会爆发大规模抗议甚至内战。\n\n-§O军队影响力§!反映了军队在政治中的角色。通过改革削弱军队可能得以实现和平过渡，但如果军队影响力增长，它就能压制民主并加强控制。\n\n道阻且长，想要维系存续，就必须在改革、稳定与军队力量之间取得平衡。"
 ALG_reactioners: "集群经济"
 ALG_reactioners1: "集群经济"
 ALG_reactioners2: "集群经济"
 ALG_reactioners3: "集群经济"
 ALG_reactioners4: "集群经济"
 ALG_reactioners5: "集群经济"
 ALG_reactioners6: "集群经济"
 ALG_reactioners7: "集群经济"
 ALG_automobile_industry: "发展汽车产业"
 ALG_automobile_industry_desc: "阿尔及利亚长期以来依赖进口来满足其汽车需求。通过发展国内汽车产业，我们可以创造就业机会，减少进口，并将阿尔及利亚打造成为区域制造业中心。"
 ALG_peugeot_deal: "标致投资"
 ALG_peugeot_deal_desc: "标致汽车已表示有意在阿尔及利亚建厂。这项合作可以为我们提供急需的工业产能。"
 ALG_renault_oran: "奥兰的雷诺"
 ALG_renault_oran_desc: "雷诺愿意在奥兰建立生产基地，这将为我国提供稳定的车辆供应，并促进我国经济发展。"
 ALG_hyundai_tiaret: "提亚雷特的现代"
 ALG_hyundai_tiaret_desc: "韩国现代汽车准备在提亚雷特建立合作伙伴关系，创造就业机会，并减少我们对欧洲制造商的依赖。"
 ALG_volkswagen_relizane: "埃利赞的大众"
 ALG_volkswagen_relizane_desc: "大众汽车及其关联品牌（斯柯达、奥迪、西雅特）准备在埃利赞开设一家工厂，进一步使我们的工业基础多元化。"
 ALG_bmw_deal: "宝马合作伙伴"
 ALG_bmw_deal_desc: "德国宝马公司已表示有兴趣在阿尔及利亚组装豪华和高端汽车，这将使我们的汽车工业达到国际标准。"
 ALG_mercedes_trucks: "梅赛德斯卡车"
 ALG_mercedes_trucks_desc: "通过与戴姆勒合作，我们可以在阿尔及利亚组装梅赛德斯军用卡车和重型车辆，直接支持我们的武装部队。"
 ALG_auto_scandal: "汽车行业腐败丑闻"
 ALG_auto_scandal_desc: "调查揭露了阿尔及利亚汽车组装业腐败横行的骗局，补贴被滥用，工厂除了重新组装进口零部件外，几乎什么都不做。这一丑闻将产生严重的政治和经济影响。"
 ALG_import_ban: "禁止汽车进口"
 ALG_import_ban_desc: "为了保护国内产业，我们将禁止进口大部分外国汽车。这项措施存在争议，短期内会造成经济压力。"
 ALG_fiat_deal: "菲亚特投资协议"
 ALG_fiat_deal_desc: "菲亚特已提出重返阿尔及利亚，并计划建设一座现代化的工业复合体，承诺重启生产，恢复公众对汽车行业的信任。"
 ALG_indigenous_brand: "创建本土品牌"
 ALG_indigenous_brand_desc: "阿尔及利亚与其依赖外国公司，不如创建自己的本土汽车制造商，由阿尔及利亚人在本地设计和制造。"
 ALG_auto_exports: "出口阿尔及利亚汽车"
 ALG_auto_exports_desc: "随着国内汽车产业的稳定发展，我们现在可以放眼海外，开始向非洲和地中海市场出口阿尔及利亚制造的汽车。"
 alg.1000.t: "汽车行业腐败丑闻"
 alg.1000.d: "一场大规模腐败丑闻震动了阿尔及利亚的汽车行业。调查显示，许多所谓的“工厂”实际上只是拆车厂，它们滥用国家补贴，虚报成本。公众信任度正在崩溃，整个行业面临瘫痪。"
 alg.1000.a: "国家耻辱。"
 ALG_auto_corruption_idea: "汽车行业腐败丑闻"
 ALG_auto_corruption_idea_desc: "汽车行业已被揭露为一个腐败横行的骗局。人们对国内生产的信心低迷，外国投资者也犹豫是否重返该国。"
 ALG_tebboune_tt: "阿卜杜勒马吉德·特本在2019年“人民运动”抗议活动后就任阿尔及利亚总统。臭名昭著的腐败政客团伙 - 包括艾哈迈德·乌亚希亚、阿卜杜勒马利克·塞拉勒、阿里·哈达德和马希丁·塔赫库特 - 被捕并接受审判。这标志着一个新时代的开始，但许多人怀疑改革的深度究竟如何。"
 ALG_corruption_network: "布特弗利卡的随从"
 ALG_corruption_network_desc: "以乌亚希亚、塞拉尔和塔赫库特为首的腐败政商网络掌控着阿尔及利亚政坛。他们的影响力削弱了国家，并加剧了公众的愤怒。"
 ALG_cleaning_the_state: "清理国家"
 ALG_clean_government: "廉洁政府"
 ALG_political_repression: "政治镇压"
 ALG_investor_confidence: "信心满满的投资者"
 ALG_diversification: "多元化"
 ALG_subsidies: "补贴"
 ALG_balanced_foreign_policy: "均衡外交政策"
 ALG_russia_cooperation: "俄罗斯合作"
 ALG_chinese_investments: "中国投资"
 ALG_military_junta: "军政府"
 ALG_cleaning_the_state_desc: "随着“亲信集团”的垮台，阿尔及利亚终于开始采取措施清除其机构中的腐败，并恢复人民的信任。"
 algeria_reforms.1.t: "特本时期的改革"
 algeria_reforms.1.d: "阿卜杜勒-阿齐兹·布特弗利卡辞职，阿卜杜勒-马吉德·特本当选，阿尔及利亚进入了新的政治篇章。特本承诺进行改革，制定新宪法，并瓦解臭名昭著的腐败网络“团伙”，该网络成员包括前总理艾哈迈德·乌叶海亚、阿卜杜勒-马利克·塞拉勒，以及阿里·哈达德和马希丁·塔赫库特等商业巨头。\n\n然而，“人民运动”仍然对他的承诺持怀疑态度。这些改革会带来真正的民主化，还是仅仅是新领导层维持政权的一种手段？"
 algeria_reforms.1.a: "支持特本的改革"
 algeria_reforms.1.b: "人民要求更多！"
 ALG_arrest_the_gang: "逮捕亲信"
 ALG_arrest_the_gang_desc: "阿尔及利亚人民要求伸张正义。特本将继续对乌亚希亚、塞拉尔、哈达德、塔赫库特以及其他掠夺国家财富的腐败分子提起诉讼。"
 ALG_at_a_crossroads: "十字路口上的国家"
 ALG_at_a_crossroads_desc: "在我们国家面临前所未有的挑战之际，我们正站在历史的关键时刻。我们现在做出的选择将塑造我们的未来，决定我们社会的走向。我们将拥抱变革与改革，还是固守过去？我们选择的道路将决定我们留给后世的遗产。"
 ALG_promises_of_reform: "承诺改革"
 ALG_promises_of_reform_desc: "一个崭新的阿尔及利亚需要一部新宪法。特本承诺进行改革，限制总统任期，加强议会，并保障更多自由。"
 ALG_suppressed_opposition: "镇压反对派"
 ALG_black_decade_methods: "黑色十年方法"
 ALG_black_market: "黑市"
 ALG_pna_expansion: "国家人民军扩张"
 ALG_global_power: "世界强权"
 ALG_crackdown_on_dissent: "对人民运动的镇压"
 ALG_crackdown_on_dissent_desc: "抗议活动并未停止。特本没有选择对话，而是选择了镇压，企图压制异议，维护国家政权。"
 ALG_rebuild_trust_investors: "重建投资者信任"
 ALG_rebuild_trust_investors_desc: "经过多年的腐败和动荡，我们必须重新赢得国内外投资者对我们经济的信任。"
 ALG_diversify_economy: "经济多元化"
 ALG_diversify_economy_desc: "阿尔及利亚不能仅仅依赖石油和天然气。可再生能源、农业和制造业将是我们未来的支柱。"
 ALG_social_subsidies: "保护社会补贴"
 ALG_social_subsidies_desc: "民众依赖政府补贴购买燃料、面包和住房。特本承诺，尽管面临经济挑战，他仍将维持这些保障措施。"
 ALG_balance_regional_powers: "平衡地区强国"
 ALG_balance_regional_powers_desc: "阿尔及利亚地处欧洲、非洲和阿拉伯世界之间。我们必须奉行平衡的外交政策，以维护自身利益。"
 ALG_strengthen_russia_ties: "加强与俄罗斯的关系"
 ALG_strengthen_russia_ties_desc: "我们与莫斯科的历史友谊可以通过国防合作和能源协议得到深化。"
 ALG_china_investments: "中国投资"
 ALG_china_investments_desc: "“一带一路”倡议为阿尔及利亚提供了一个实现基础设施现代化并吸引中国重大投资项目的机会。"
 ALG_north_south_highway: "南北高速公路项目"
 ALG_automobile_factories: "汽车工业"
 ALG_automobile_factories_desc: "为了解决人口就业和提升经济实力，我们或许需要邀请外国汽车制造商来我国投资建厂。"
 algeria_policy.1.t: "谴责殖民政权"
 algeria_policy.1.d: "阿尔及利亚民族解放阵线强烈谴责过去的殖民政权，并谴责其在占领阿尔及利亚期间犯下的罪行。该声明在国内激发了民族自豪感，但在巴黎却激起了愤怒，导致阿尔及利亚与法国的关系恶化。"
 algeria_policy.1.a: "揭露殖民主义的罪行！"
 algeria_disaster.1.t: "布米尔达斯地震"
 algeria_disaster.1.d: "一场毁灭性地震袭击了阿尔及利亚北部，震中位于布米尔达斯市附近。数千人丧生，数万人受伤，阿尔及尔市及沿海地区的大片区域化为废墟。全国陷入震惊之中，救援行动正努力应对这场灾难的规模。亟需采取行动恢复秩序，并为受灾民众提供救济。"
 algeria_disaster.1.a: "调动应急响应队伍并开始重建工作"
 ALG_earthquake_recovery_tt: "救援行动已经展开。政府将很快决定重建资金的筹措方式。"
 algeria_disaster.2.t: "重建和恢复工作"
 algeria_disaster.2.d: "地震过后，阿尔及利亚面临着现代史上最严重的人道主义危机之一。成千上万人无家可归，重要的基础设施沦为废墟。政府必须决定如何筹集重建资金 - 是利用国家资源设立国家援助基金，还是寻求可能附带政治条件的外国援助。"
 algeria_disaster.2.a: "设立国家援助基金"
 ALG_state_aid_fund_tt: "调拨国家资源用于灾区重建。这将给财政带来压力，但能增强国内民众对政府的信心。"
 algeria_disaster.2.b: "寻求外国援助"
 ALG_foreign_aid_dependence_tt: "向国际伙伴请求援助。这将缓解财政压力，但会增加外国对阿尔及利亚内政的影响。"
 ALG_french_influence: "法国在幕后的影响力"
 ALG_french_influence_desc: "尽管名义上独立，阿尔及利亚的政治仍然笼罩在法国的影响之下。与巴黎关系密切的腐败将军和政客左右着决策，限制了其真正的主权。"
 ALG_shadow_state: "暗影中的权力集团"
 ALG_shadow_state_desc: "由将军、情报官员和商人组成的隐秘网络 - 通常被称为“权力中心” - 掌控着阿尔及利亚。腐败削弱了国家，但这个影子体系却确保了政治稳定，并巩固了政权的权力。"
 algeria_emerging_youth: "青年组织"
 algeria_nationalist_youth: "青年组织"
 algeria_nationalist_rise: "民族主义复兴"
 algeria_nationalist_rise_desc: "阿尔及利亚的民族主义情绪空前高涨。这源于政府明确反对外国干涉内政，并坚定维护国家主权和独立。"
 algeria_cultural_rebirth: "文化重生"
 ALG_PNA_victory: "§R军事统治§!"
 ALG_PNA_victory_desc: "阿尔及利亚国家人民军是阿尔及利亚的军队。自1962年阿尔及利亚独立以来，该军在政治中扮演着重要角色。在1988年建立多党制之前，它实际上一直掌控着政府。尽管如此，它对阿尔及利亚政治的影响力依然存在，最近的例子是，2019年，由于抗议活动导致军方失去支持，总统阿卜杜勒-阿齐兹·布特弗利卡被迫下台。"
 ALG_kick_out_morocco: "驱逐摩洛哥"
 ALG_kick_out_morocco_desc: "摩洛哥一直奴役着我们，我们没有理由继续与他们保持联系。现在是时候把这些意识形态上的敌人赶出阿尔及利亚了！"
 ALG_statist_rise: "国家崛起"
 ALG_statist_rise_desc: "自由经济体制助长了对人民的剥削，损害了我们的国家独立和自主权。对阿尔及利亚而言，将经济的各个方面与国家紧密联系起来才是最佳选择。"
 ALG_maintain_military_role: "保持军队优势"
 ALG_maintain_military_role_desc: "世界正在进入黑暗和尴尬的时期，所以我们必须保护我们的国家，无论付出什么代价。"
 ALG_kick_out_iran: "驱逐伊朗"
 ALG_kick_out_iran_desc: "伊朗一直奴役着我们，我们没有理由继续与他们保持联系。现在是时候把这些意识形态敌人赶出阿尔及利亚了！"
 ALG_nationalize_oligarchic_holdings: "国有化控股"
 ALG_nationalize_oligarchic_holdings_desc: "我们将把各流氓寡头的资产和财产国有化，以加强我们对经济的控制。"
 ALG_subsidise_police: "补贴警察"
 ALG_subsidise_police_desc: "警察是保障人民安全和维护阿尔及利亚统治的最重要因素之一，但长期以来，警察经费严重不足。这种情况必须改变。"
 ALG_maintain_socialistic_policies: "维护社会主义法律"
 ALG_maintain_socialistic_policies_desc: "上届政府做对了一件事，也是他们相对更受欢迎的根本原因，就是他们支持下层阶级的社会主义政策。我们将继续前总统哈菲兹·阿萨德实施的政策，将自己描绘成被压迫者的真正支持者。"
 ALG_government_planned_economic_projects: "政府项目"
 ALG_government_planned_economic_projects_desc: "要大力开展公益事业，提升政府负责任大政府形象，争取广大人民群众的支持。"
 ALG_patriotic_propaganda: "爱国主义宣传"
 ALG_patriotic_propaganda_desc: "我们将强调民族自豪感和国家忠诚的重要性，加强我们的意识形态立场。"
 ALG_gather_support_from_peasantry: "农民的支持"
 ALG_gather_support_from_peasantry_desc: "农民是我们国家的脊梁，我们必须确保他们支持我们。"
 ALG_strong_government: "强大的政府"
 ALG_strong_government_desc: "我们必须向人民证明，我们的政府稳定且有能力执政。这将有助于我们赢得他们的信任。"
 ALG_expand_youth_organizations: "扩大青年组织"
 ALG_expand_youth_organizations_desc: "我们的政党一直以来都非常依赖青年组织，现在我们掌握了权力，是时候赢得青年人的心，鼓励他们支持我们的意识形态事业了。"
 ALG_illiberal_democracy: "非自由民主"
 ALG_illiberal_democracy_desc: "自由主义就像病毒一样，侵蚀和剥削贫穷国家。人民需要的是真正代表人民、同时又能将人民团结在同一面旗帜下的民主。无论如何，我们都是民主国家。"
 ALG_reestablish_intelligence_committee: "重建情报机构"
 ALG_reestablish_intelligence_committee_desc: "未来的战争不再是枪炮坦克之战，而是信息之战。我们有责任建立一个功能完善的情报机构。"
 ALG_national_security_act: "国家安全法案"
 ALG_national_security_act_desc: "极端组织正在慢慢摧毁我们的国家，对我们的人民构成威胁。他们的袭击对我们的国家构成明显的威胁，我们必须立即制止他们，无论付出什么代价，无论发生什么。恐怖主义必须停止。"
 ALG_pan_algerian_nationalism: "泛阿尔及利亚主义"
 ALG_pan_algerian_nationalism_desc: "阿尔及利亚是一个应该以其独特的身份照亮整个北非的国家。我们丰富的历史和文化清楚地表明，我们有责任向世界展示我们真正的潜力和身份。"
 ALG_cultural_rebirth: "文化重生"
 ALG_cultural_rebirth_desc: "我们的国家正在缓慢而坚定地认识到自己的身份。不应让琐碎的分歧阻碍我们认识到我们人民的美丽。我们的人民应该认识到，无论如何，我们终究还是阿尔及利亚人。"
 ALG_deal_with_the_trade_unions: "与工会达成协议"
 ALG_deal_with_the_trade_unions_desc: "一个国家强大的关键在于其生产和经济，所以我们必须确保阿尔及利亚所有劳动者都支持我们。"
 ALG_reassert_russian_ties: "与俄罗斯的联系"
 ALG_reassert_russian_ties_desc: "俄罗斯是唯一真正的盟友，它帮助我们成为一个现代化、安全和繁荣的国家。"
 ALG_russian_oil_excavation: "俄罗斯石油交易"
 ALG_russian_oil_excavation_desc: "我们国家蕴藏着巨大的宝藏，我们的盟友俄罗斯将帮助我们获取这些资源。"
 ALG_russian_algiers_base_expansion: "扩大俄罗斯海军存在"
 ALG_russian_algiers_base_expansion_desc: "我们无法立即建立一支强大的海军，但我们的俄罗斯朋友将通过帮助扩大港口能力来帮助我们保持海岸安全。"
 ALG_houarist_rise: "胡阿里主义者崛起"
 ALG_houarist_rise_desc: "胡阿里主义正在再次崛起并准备让阿尔及利亚再次伟大。"
 ALG_islamic_socialism: "伊斯兰社会主义"
 ALG_islamic_socialism_desc: "人们似乎忘记了伊斯兰教提倡许多归因于社会主义的做法，例如天课和萨达卡。我们应该强调这种关系，以我们的理想为基础，因为这也将获得那些一直反对我们理想的伊斯兰主义者的支持。伊斯兰社会主义是使我们的国家成为一个现代、强大和有道德的共和国的真正途径。"
 ALG_Get_rid_of_oligarchs: "清除寡头"
 ALG_news.1.t: "阿尔及利亚正处于十字路口"
 ALG_news.1.d: "经历了近十年的残酷暴力、经济崩溃和政治停滞之后，2000年的阿尔及利亚正处于一个关键时刻。这场被许多人称为“黑色十年”的内战，已造成数万人死亡，更多人流离失所。尽管战斗强度有所下降，但局势依然高度紧张，创伤远未愈合。\n\n国家前途未卜，各方势力正朝着不同的方向发展。一条道路寻求民族和解与民主改革，以实现国家统一。另一条道路倾向于延长紧急状态，维持现政权的统治。然而，第三条道路却预示着战争的延续 - 未竟的战役、激进的承诺，以及那些拒绝放下武器的人。\n\n阿尔及利亚接下来选择的道路，可能会决定其未来几代人的命运。"
 ALG_news.1.a: "所有目光都投向了阿尔及尔。"
 Arab_Defense_Bloc: "阿拉伯防务集团"
 The_Maghreb_Joint_Defense: "马格里布联合防御"
 alg_political_struggle_event_title: "布特弗利卡的幽灵"
 alg_political_struggle_event_desc: "随着布特弗利卡下台，阿尔及利亚正处于十字路口。军方精英紧抓权力不放，而民众则走上街头，要求变革。我们将如何应对这场危机？"
 alg_political_struggle_event_option: "斗争开始了"
 ALG_bouteflika.3.t: "布特弗利卡健康危机"
 ALG_bouteflika.3.d: "截至 2013 年，布特弗利卡中风，身体状况急剧恶化。记者希沙姆·阿布德因威胁国家安全、领土完整和共和国机构的正常运作而遭到追捕，他供职的报纸也遭到审查，因为他写道，总统从瓦尔德格拉斯返回时处于昏迷状态，并将赛义德·布特弗利卡描述为幕后操纵政府的傀儡。"
 ALG_bouteflika.3.a: "将会发生什么？"
 ALG_boteflika_tt: "这将解锁阿尔及利亚总统健康危机国策"
 ALG_bouteflika: "布特弗利卡健康危机新闻"
 ALG_bouteflika.2.t: "2014年阿尔及利亚总统选举"
 ALG_bouteflika.2.d: "2014年4月17日，阿尔及利亚举行总统选举。现任总统阿卜杜勒-阿齐兹·布特弗利卡以82%的得票率成功连任。竞选议题包括民众渴望在经历了20世纪90年代血腥内战后实现国内稳定。"
 ALG_bouteflika.2.a: "布特弗利卡胜选"
 ALG_bouteflika_health_crisis: "布特弗利卡的健康危机"
 ALG_bouteflika_health_crisis_desc: "总统健康状况恶化，威胁到阿尔及利亚的稳定。我们是让他继续掌权，还是为权力交接做好准备？"
 ALG_2014_elections: "2014年总统大选"
 ALG_2014_elections_desc: "尽管身患重病，布特弗利卡仍竞选第四个任期。反对派噤声，选举结果早已注定。"
 ALG_2014_oil_crash: "石油价格暴跌"
 ALG_2014_oil_crash_desc: "油价暴跌重创阿尔及利亚经济。民众将此归咎于腐败，并要求变革。"
 ALG_silence_hirak: "镇压人民运动抗议活动"
 ALG_silence_hirak_desc: "军警会镇压异议，街头会血流成河，但政权终将存续。"
 ALG_listen_to_hirak: "向改革派的要求让步"
 ALG_listen_to_hirak_desc: "承诺进行政治改革以安抚抗议者。旧势力会进行抵制，但民众的愤怒情绪可能会平息。"
 ALG_2019_elections: "2019年政治危机"
 ALG_2019_elections_desc: "布特弗利卡寻求第五个总统任期，激起全国愤怒。阿尔及利亚会爆发革命，还是会屈服于暴政？"
 ALG_new_president: "任命新总统"
 ALG_new_president_desc: "“人民运动”取得了胜利。过渡政府将举行自由选举，结束长达数十年的威权统治。"
 ALG_release_political_prisoners: "释放政治犯"
 ALG_release_political_prisoners_desc: "数千名活动人士、记者和反对派人士因参与“人民运动”抗议活动而被拘留。释放他们将标志着与旧政权的真正决裂，并巩固民主合法性。"
 ALG_corrupt_successor: "扶植一位效忠派继任者"
 ALG_corrupt_successor_desc: "军方确保傀儡掌权。布特弗利卡的腐败遗产仍在延续。"
 alg_oil_crash_title: "石油价格暴跌"
 alg_oil_crash_desc: "油价暴跌，我们的国家能挺过去吗？"
 alg_oil_crash_option: "令人忧虑！"
 alg_hirak_victory_title: "人民胜利了"
 alg_hirak_victory_desc: "经过多年的抗议，布特弗利卡下台。一个新时代开始了 - 但这能持续下去吗？"
 alg_military_rule_title: "将军们来决定"
 alg_military_rule_desc: "军队扶植了一个傀儡领导人。人民运动暂时被镇压了。"
 algeria_tebboune.1.t: "2019年总统大选"
 algeria_tebboune.1.d: "经过数月的抗议和阿卜杜勒-阿齐兹·布特弗利卡的辞职，阿尔及利亚即将举行数十年来最具争议的选举。许多人认为选举进程仍由旧势力主导，而另一些人则寄希望于改革，甚至伊斯兰主义的复兴。三位主要候选人脱颖而出：与建制派关系密切的阿卜杜勒-马吉德·特本，一位主张延续旧秩序的候选人；拥有自己运动的自由派改革者阿里·本弗利斯；以及与和平社会运动有联系的伊斯兰主义领导人阿卜杜勒卡德尔·本格里纳。此次选举的结果将决定阿尔及利亚的未来走向。"
 algeria_tebboune.1.a: "选择阿卜杜勒-马吉德·特本"
 algeria_tebboune.1.b: "选择阿里·本弗利斯"
 algeria_tebboune.1.c: "选择阿卜杜勒卡德尔·本格里纳"
 ALG_benflis_tt: "§Y阿里·本弗利斯§!成为阿尔及利亚总统，领导自由改革派。"
 ALG_bengrina_tt: "§Y阿卜杜勒卡德尔·本格里纳§!成为阿尔及利亚总统，代表伊斯兰反对派。"
 kabyle_resistance_info: "卡比利亚地区局势动荡。抵抗等级：[?state_resistance@438|%Y]"
 kabyle_resistance_effects: "监测提济乌祖省、贝贾亚省、吉杰勒省和塞提夫省分离主义支持率上升情况 [?ALG_resistance_growth_change|-%]（当前：[?ALG_resistance_growth|-%]）抵抗等级：[?state_resistance@385|%Y]"
 ALG_kabyle_resistance_tooltip: "卡比利亚抵抗等级：\n[!kabyle_resistance_level_text]"
 ALG_suppress_kabyle: "镇压卡比利亚运动"
 ALG_suppress_kabyle_desc: "卡比利亚地区的动乱对国家主权构成威胁。我们绝不能允许分裂主义言论滋生蔓延。强力镇压或许是重新掌控局势的唯一途径 - 即便这意味着要面对顽强抵抗。"
 ALG_recognize_kabyle: "承认卡比利亚独立"
 ALG_recognize_kabyle_desc: "数十年的紧张局势、抗议和动荡将我们带到了今天。或许现在是时候承认卡比利亚的独立诉求了。这样做可以结束眼前的动荡，但代价是领土完整受损。"
 KBY_granted_autonomy: "给予自治权"
 KBY_granted_autonomy_desc: "阿尔及利亚已正式赋予我们更大的自治权。虽然我们仍然是阿尔及利亚国家的一部分，但我们的区域治理现在得到了承认和授权。"
 KBY_suppressed_resistance: "被武力压制"
 KBY_suppressed_resistance_desc: "在中央政府严厉镇压之后，我们地区面临着严密的监控、宵禁和政治压迫。"
 KBY_independence_recognized: "独立得到承认"
 KBY_independence_recognized_desc: "阿尔及利亚已正式承认我们的自决权。我们现在作为一个独立国家，可以自由地规划自己的未来。"
 ALG_recognize_tamazight: "承认塔马齐格特语"
 ALG_recognize_tamazight_desc: "承认塔马齐格特语为官方语言是卡比利亚人的一项重要诉求。这样做既能使他们的文化认同合法化，又能维护国家统一。"
 ALG_kabyle_cultural_reforms: "卡比利亚文化改革"
 ALG_kabyle_cultural_reforms_desc: "我们必须支持卡比利亚地区的教育、地方机构和文化权利，以促进融合和相互尊重。"
 ALG_internal_troops_kabyle: "部署内卫部队"
 ALG_internal_troops_kabyle_desc: "卡比利亚地区的局势需要强大的安全力量。我们将部署内卫部队维护该地区的安全并镇压动乱。"
 ALG_disrupting_kabyle_networks: "扰乱卡比利亚政治网络"
 ALG_disrupting_kabyle_networks_desc: "分裂活动通过地下政治网络协调进行。通过监视和逮捕进行干扰是维护国家安全的必要手段。"
 ALG_disrupt_kabyle_networks: "扰乱卡比利亚政治网络"
 ALG_disrupt_kabyle_networks_desc: "分裂活动通过地下政治网络协调进行。通过监视和逮捕进行干扰是维护国家安全的必要手段。"
 KBY_build_a_new_state: "建设新国家"
 KBY_build_a_new_state_desc: "如今我们已独立，必须奠定一个运转良好的共和国的基础。宪法、治理和社会服务是重中之重。"
 KBY_secure_our_borders: "保卫我们的边境"
 KBY_secure_our_borders_desc: "在宣告主权之后，我们必须加强脆弱的边境防御，确保在充满敌意的环境中生存下去。"
 idea_ALG_neutrality: "阿尔及利亚中立"
 idea_ALG_neutrality_desc: "阿尔及利亚再也承受不起战争了，保持中立是我们最好的选择。"
 idea_ALG_neutrality_2: "阿尔及利亚中立"
 idea_ALG_neutrality_2_desc: ""
 idea_ALG_neutrality_3: "阿尔及利亚复兴"
 idea_ALG_neutrality_3_desc: ""
 ALG_UN_security_council_seat: "寻求联合国安理会席位"
 ALG_UN_security_council_seat_desc: "二战后，阿尔及利亚被美国和苏联强行瓜分，引发了冷战时期的第一场代理人战争，世界理应给予阿尔及利亚一些补偿。联合国安理会常任理事国席位就是一个不错的选择。\n\n§Y[USA.GetFlag]美利坚合众国§!：[Root.recognises_UNSC_seat_USA]\n§Y[SOV.GetFlag]俄罗斯联邦§!：[Root.recognises_UNSC_seat_SOV]\n§Y[ENG.GetFlag]联合王国§!：[Root.recognises_UNSC_seat_ENG]\n§Y[FRA.GetFlag]法兰西共和国§!：[Root.recognises_UNSC_seat_FRA]\n§Y[CHI.GetFlag]中华人民共和国§!：[Root.recognises_UNSC_seat_CHI]"
 campaign_for_UNSC_seat_USA1: "争取美国的支持"
 campaign_for_UNSC_seat_FRA1: "争取法国的支持"
 campaign_for_UNSC_seat_ENG1: "争取英国的支持"
 campaign_for_UNSC_seat_SOV1: "争取俄罗斯的支持"
 campaign_for_UNSC_seat_CHI1: "争取中国的支持"
 become_a_UNSC_state1: "申请成为联合国安全理事会常任理事国"
 ALG_a_globalized_algeria: "全球化的阿尔及利亚"
 ALG_a_globalized_algeria_desc: "今天是全球化时代，阿尔及利亚必须参与其中。"
 ALG_international_investments: "国际投资"
 ALG_international_investments_desc: ""
 ALG_export_driven_growth: "出口驱动经济"
 ALG_export_driven_growth_desc: ""
 ALG_promote_sovereignty: "促进主权"
 ALG_promote_sovereignty_desc: ""
 ALG_promote_human_rights: "促进人权"
 ALG_promote_human_rights_desc: "人权高于一切，即使是国家主权。"
 ALG_extract_favorable_terms: "争取有利的条款"
 ALG_extract_favorable_terms_desc: ""
 ALG_a_norm_entrepreneur: "一个规范的企业家"
 ALG_a_norm_entrepreneur_desc: ""
 ALG_Algeria_resplendent: "辉煌的阿尔及利亚"
 ALG_Algeria_resplendent_desc: ""
 ALG_national_strength: "国家实力"
 ALG_national_strength_desc: ""
 ALG_terror_2003_hostage_title: "撒哈拉人质危机"
 ALG_terror_2003_hostage_desc: "一群欧洲游客在阿尔及利亚沙漠被伊斯兰武装分子劫持为人质。虽然没有人员伤亡报告，但这标志着有组织的圣战活动令人不安地抬头的开始。"
 ALG_terror_2003_hostage_option: "这是未来令人担忧的征兆。"
 ALG_terror_monitor: "监测恐怖威胁"
 ALG_conduct_security_raids: "实施安全突袭"
 ALG_terror_threat_category: "恐怖主义威胁监测"
 ALG_terror_2007_algiers_title: "阿尔及尔爆炸案"
 ALG_terror_2007_algiers_desc: "阿尔及尔政府大楼遭到大规模自杀式炸弹袭击，造成30多名平民和政府工作人员死亡，这是近年来最致命的袭击之一。"
 ALG_terror_2007_batna_title: "巴特纳爆炸案"
 ALG_terror_2007_batna_desc: "在巴特纳，一名自杀式炸弹袭击者在等待总统的人群附近引爆了炸弹。袭击造成20多人死亡。"
 ALG_terror_2008_issers_title: "伊瑟斯警察学院爆炸案"
 ALG_terror_2008_issers_desc: "一起汽车自杀式袭击事件针对伊瑟斯警校的警察新兵，造成43人死亡，数十人受伤。"
 ALG_terror_generic_option: "不幸的新闻。"
 ALG_terror_2000_bus_ambush_title: "麦迪亚附近巴士遭伏击"
 ALG_terror_2000_bus_ambush_desc: "武装分子在麦迪亚附近对一辆客车发动致命伏击，造成19名平民丧生。此次袭击表明内战后局势持续动荡。"
 ALG_terror_2002_tazmalt_title: "塔兹马勒特爆炸案"
 ALG_terror_2002_tazmalt_desc: "塔兹马尔特发生炸弹爆炸，造成数名平民伤亡。安全部队怀疑是萨拉菲宣教与战斗组织残余势力所为。"
 ALG_terror_2002_miliana_title: "米利亚纳爆炸案"
 ALG_terror_2002_miliana_desc: "米利亚纳附近发生路边简易爆炸装置爆炸，造成数名士兵受伤。"
 ALG_terror_2002_hammam_title: "哈马姆里加爆炸案"
 ALG_terror_2002_hammam_desc: "一枚自制爆炸装置在哈马姆里加引爆，目标是一支军用车队。"
 ALG_terror_2002_larbaa_title: "拉尔巴爆炸案"
 ALG_terror_2002_larbaa_desc: "武装分子在拉尔巴引爆了一枚炸弹，继续他们针对国家当局的行动。"
 ALG_terror_2002_msila_title: "姆西拉爆炸案"
 ALG_terror_2002_msila_desc: "姆西拉发生一起简易爆炸装置爆炸事件，进一步表明该地区恐怖网络的持续存在。"
 ALG_terror_2003_tizi_title: "提济乌祖爆炸案"
 ALG_terror_2003_tizi_desc: "提济乌祖发生致命爆炸，造成平民伤亡，安全部队怀疑萨拉菲宣教与战斗组织参与其中。"
 ALG_terror_2004_tebessa_title: "特贝萨爆炸案"
 ALG_terror_2004_tebessa_desc: "特贝萨发生的一起协同爆炸袭击造成7人死亡。袭击规模不断扩大，令人担忧。"
 ALG_idea_arab_diplomacy: "阿拉伯外交"
 ALG_terror_2005_tidjelabine_title: "蒂杰拉宾爆炸案"
 ALG_terror_2005_tidjelabine_desc: "在蒂杰拉宾，两名宪兵在巡逻途中遭遇汽车炸弹袭击身亡。"
 ALG_relying_on_our_own_strength_spirit: "依靠我们自身的力量"
 ALG_relying_on_our_own_strength_spirit_desc: "阿尔及利亚只需要阿尔及利亚人就能繁荣发展，不需要其他任何人。"
 ALG_reverse_engineering_spirit: "逆向工程效果"
 ALG_reverse_engineering_spirit_desc: "我们不需要浪费时间来提出新的设计，只需看看现有的设计即可。"
 ALG_hydroelectric_power_plants_upgraded_idea: "§R阿尔及利亚国家石油公司§! - 水力发电厂升级改造"
 FLN_nationalize_resources: "国有化的资源"
 FLN_nationalize_resources_desc: "阿尔及利亚的自然资源是其主权和繁荣的关键。通过资源国有化，我们可以确保石油、天然气和矿产资源创造的财富直接造福阿尔及利亚人民，为长期的经济独立奠定基础。"
 ALG_revivify_non_aligned_movement: "重振不结盟运动"
 ALG_revivify_non_aligned_movement_desc: "作为不结盟运动的骄傲成员，阿尔及利亚必须重振这一独立国家联盟。通过加强与中立国伙伴的联系，我们可以抵制超级大国的支配，并在分裂的世界中开辟一条真正主权的道路。"
 ALG_reach_out_ASEAN: "接触东南亚国家联盟"
 ALG_reach_out_ASEAN_desc: "东南亚各国与我们一样，渴望在不受外国干涉的环境下发展。与东盟建立更紧密的合作，不仅能够开拓新的经济机遇，还能巩固多极世界秩序。"
 ALG_support_developing_world: "支持发展中国家"
 ALG_support_developing_world_desc: "阿尔及利亚与受压迫和贫困国家站在一起。通过经济援助、技术交流和外交倡导，我们可以帮助提升全球南方国家的地位，并挑战新殖民主义剥削。"
 ALG_between_east_and_west: "东西方之间"
 ALG_between_east_and_west_desc: "夹在两大阵营之间，阿尔及利亚必须谨慎行事。通过与资本主义和社会主义阵营都保持平衡关系，我们既能获得至关重要的投资，又能避免向任何一方放弃独立性。"
 ALG_mediate_great_power_conflict: "调解大国冲突"
 ALG_mediate_great_power_conflict_desc: "随着超级大国间紧张局势加剧，阿尔及利亚可以发挥公正调解的作用。我们的中立立场和道德权威使我们能够缓和危机，并在日益动荡的世界中促进和平共处。"
 ALG_promote_reconciliation: "促进和解"
 ALG_promote_reconciliation_desc: "从非洲到中东，兄弟之间冲突不断。阿尔及利亚拥有革命传统和外交经验，必须促进分裂国家之间的对话与团结。"
 ALG_secure_balance: "安全平衡"
 ALG_secure_balance_desc: "在霸权势力相互竞争的世界里，平衡是我们的保障。通过精心调整外交政策，我们既可以防止任何一个强权独霸，又能最大限度地惠及所有国家。"
 ALG_joining_brics: "加入金砖国家联盟"
 ALG_joining_brics_desc: "阿尔及利亚希望通过加入金砖国家新兴经济体集团来加强其全球影响力，从而促进经济增长和政治合作。"
 ALG_align_with_brazil: "加强与巴西的关系"
 ALG_align_with_brazil_desc: "巴西和阿尔及利亚一样，在国际事务中寻求独立自主的道路。通过深化与这个南美大国的伙伴关系，我们可以在农业和技术贸易方面取得更大进展，同时在全球论坛上团结一致，共同对抗新殖民主义的压力。"
 ALG_align_with_india: "与印度建立战略伙伴关系"
 ALG_align_with_india_desc: "印度的不结盟立场和日益增长的工业实力使其成为天然盟友。在能源项目、军事交流和联合国外交等领域开展合作，将增强我们两国对抗超级大国主导地位的能力，同时促进南南合作。"
 ALG_islamic_monarchy_idea: "伊斯兰君主制"
 ALG_islamic_monarchy_idea_desc: "阿尔及利亚恢复了植根于伊斯兰原则和民族传统的君主专制政体。"
 ALG_caliph_crowned: "哈里发荣登大宝"
 ALG_caliph_crowned_desc: "哈里发不仅依法统治，也遵循人民的意愿和信仰的传统。"
 ALG_amir_al_muminin_idea: "穆斯林领袖"
 ALG_amir_al_muminin_idea_desc: "信士的统帅 - 这一头衔在伊斯兰世界具有重要的精神和政治意义。"
 ALG_umayyad_revival_idea: "倭马亚王朝遗产得以恢复"
 ALG_umayyad_revival_idea_desc: "阿尔及利亚声称要重现倭马亚王朝昔日的辉煌，其疆域曾从大马士革延伸至科尔多瓦。"
 ALG_maghreb_alliance_idea: "马格里布之柱"
 ALG_maghreb_alliance_idea_desc: "阿尔及利亚致力于在新宗教和政治秩序下统一西方伊斯兰世界。"
 ALG_restore_caliphate_in_algiers: "恢复阿尔及尔的哈里发政权"
 ALG_restore_caliphate_in_algiers_desc: "共和国已经失败。现在是时候恢复一个根植于信仰和历史的神权君主制了。新的哈里发国将从阿尔及尔崛起。"
 ALG_crown_the_caliph: "加冕哈里发"
 ALG_crown_the_caliph_desc: "哈里发的合法继承人已经选出。在阿尔及尔举行的仪式上，王冠将被重新戴上，全世界将承认新的信士埃米尔。"
 ALG_amir_al_muminin: "穆斯林领袖"
 ALG_amir_al_muminin_desc: "我们宣布哈里发为“信士的统帅”。这一称号赋予他在整个伊斯兰世界的精神和政治合法性。"
 ALG_umayyad_legacy: "宣告倭马亚王朝的遗产"
 ALG_umayyad_legacy_desc: "阿尔及利亚唤起了人们对倭马亚王朝的记忆，他们的辉煌曾遍及各大洲。我们自诩为他们遗产的继承者。"
 ALG_reclaim_al_andalus: "收复安达卢斯"
 ALG_reclaim_al_andalus_desc: "安达卢斯的土地曾是伊斯兰世界的明珠。现在是时候收复这片土地，复兴我们在伊比利亚半岛的古老文明了。"
 ALG_reclaim_the_crown: "重夺王冠"
 ALG_reclaim_the_crown_desc: "现在是时候恢复一个根植于伊斯兰教义、受神启的合法君主制了。在共和政体失败和内战的废墟之上，我们将重现历史上的王冠 - 在信仰、秩序和传统的皇家旗帜下团结整个国家。无论是阿拔斯王朝的继承者、复兴的柏柏尔王朝，还是新伊斯兰统一的象征，王冠都将再次照耀阿尔及利亚。"
 ALG_pillars_of_the_maghreb: "马格里布之柱"
 ALG_pillars_of_the_maghreb_desc: "阿尔及利亚寻求与它的西方兄弟国家 - 摩洛哥和突尼斯 - 团结起来，以建立北非统一的伊斯兰集团。"
 ALG_monarchy_tt: "§O作为阿尔及利亚新君主，我们向信徒征收吉兹亚税和天课。在真主的指引下，我们将继续统治。§!"
 ALG_recovering_from_the_civil_war: "黑暗的十年"
 ALG_recovering_from_the_civil_war_desc: "阿尔及利亚内战给这个国家留下了深深的创伤。尽管冲突已经结束，但其影响依然存在，深刻地影响着政治格局和民族精神。内战结束多年后，阿尔及利亚仍在努力摆脱战争的阴影。冲突的创伤尚未完全愈合，但这个国家重建的决心依然坚定。"
 MSP_non_aligned_revival: "重振不结盟外交政策"
 MSP_non_aligned_revival_desc: "我们将重拾中立精神和南方团结精神，就像上世纪60年代那样。"
 MSP_global_south_solidarity: "全球南方团结"
 MSP_global_south_solidarity_desc: "阿尔及利亚将通过贸易、外交和援助加强与后殖民国家的关系。"
 MSP_north_africa_first: "北非优先"
 MSP_north_africa_first_desc: "我们将致力于引领我们周边地区的外交和发展。"
 MSP_western_sahara_position: "支持西撒哈拉"
 MSP_western_sahara_position_desc: "我们重申支持撒哈拉独立，反对摩洛哥的主张。"
 MSP_african_union_engagement: "加入非洲联盟"
 MSP_african_union_engagement_desc: "阿尔及利亚必须重新加入非洲大陆外交，并发挥领导作用。"
 MSP_sahel_initiatives: "拓展至萨赫勒"
 MSP_sahel_initiatives_desc: "我们将通过软实力和国防来打击萨赫勒地区的不稳定和恐怖主义。"
 MSP_arab_world_outreach: "深化阿拉伯外交关系"
 MSP_arab_world_outreach_desc: "为了加强阿尔及利亚在阿拉伯世界的影响力，我们必须重振外交拓展和协调工作。通过双边访问、峰会和贸易倡议，阿尔及利亚可以确立自身作为该地区团结力量的地位。"
 MSP_join_arab_league: "加强阿拉伯联盟参与"
 MSP_join_arab_league_desc: "作为阿拉伯联盟的现有成员国，阿尔及利亚可以超越参与层面，发挥领导外交作用。促进经济协调、防务磋商和文化团结将提升我们在阿拉伯世界的地位。"
 MSP_support_palestine: "支持巴勒斯坦事业"
 MSP_support_palestine_desc: "阿尔及利亚长期以来一直支持巴勒斯坦争取自决的斗争。我们将重申外交支持、人道主义援助和国际倡导，以彰显我们捍卫巴勒斯坦权利的原则立场。"
 MSP_algeria_algiers_axis: "打造埃及-阿尔及尔轴心"
 MSP_algeria_algiers_axis_desc: "通过与埃及更紧密地结盟，阿尔及利亚可以帮助建立一个强大的区域集团，该集团能够引导阿拉伯世界的团结，确保北非的稳定，并制衡外国的影响。"
 MSP_condemn_israel: "谴责以色列的行动"
 MSP_condemn_israel_desc: "鉴于以色列持续的侵略和侵犯人权行为，阿尔及利亚将在国际舞台上正式谴责以色列的行动，争取各方支持实现公正和平，反对在没有解决方案的情况下实现关系正常化。"
 MSP_palestinian_aid_package: "巴勒斯坦援助方案"
 MSP_palestinian_aid_package_desc: "我们将调拨资源，向巴勒斯坦地区提供人道主义、经济和技术援助，确保阿尔及利亚的承诺不仅仅停留在口头上，而是真正产生影响的援助。"
 MSP_pan_african_defense_initiative: "泛非防务倡议"
 MSP_pan_african_defense_initiative_desc: "为保护非洲主权和增强非洲大陆稳定，阿尔及利亚将提出一项协调一致的非洲防务倡议，以建立应对共同威胁的集体军事准备。"
 MSP_send_troops_to_sahel: "向萨赫勒地区部署部队"
 MSP_send_troops_to_sahel_desc: "为应对萨赫勒地区日益加剧的不稳定局势，阿尔及利亚将派遣军队与地区各国政府合作，支持维和行动、边境保护和反恐行动。"
 MSP_sahel_stabilization_force: "萨赫勒稳定部队"
 MSP_sahel_stabilization_force_desc: "阿尔及利亚将牵头建立常设的萨赫勒稳定部队 - 一个由非洲主导的安全框架，旨在打击该地区的叛乱和犯罪网络。"
 MSP_exploit_sahel_resources: "开发萨赫勒资源"
 MSP_exploit_sahel_resources_desc: "阿尔及利亚在萨赫勒地区的影响力使其能够获取尚未开发的自然资源。通过谈判采矿和基础设施建设合同，我们可以在该地区获得经济收益和战略伙伴关系。"
 MSP_propose_maghreb_union: "提议建立马格里布联盟"
 MSP_propose_maghreb_union_desc: "现在是时候重振马格里布统一的愿景了。阿尔及利亚将率先提出重启一体化努力的倡议，重点放在经济合作、联合基础设施建设和外交协调方面。"
 MSP_economic_integration_initiative: "马格里布经济一体化"
 MSP_economic_integration_initiative_desc: "阿尔及利亚将通过降低关税、投资基础设施和协调货币政策讨论，推动建立一个惠及所有成员国的马格里布共同经济区。"
 MSP_maghreb_joint_defense_pact: "马格里布联合防御条约"
 MSP_maghreb_joint_defense_pact_desc: "安全的马格里布需要集体防御。我们将提议建立一项区域军事条约，重点关注边境保护、情报共享和联合军事演习。"
 MSP_mediterranean_dialogue: "地中海对话"
 MSP_invite_iraq: "邀请伊拉克"
 MSP_invite_iraq_desc: "我们需要邀请伊拉克加入我们的联盟，他们正逐渐步入正轨，双方的合作将为我们带来切实的利益。"
 MSP_invite_syria: "邀请叙利亚"
 MSP_invite_syria_desc: "叙利亚紧邻我国南部边境，这意味着我们的防御态势相当脆弱。将叙利亚纳入我们的阵营，将是确保国家安全与稳定的绝佳途径。"
 MSP_invite_algeria: "邀请埃及"
 MSP_invite_algeria_desc: "埃及是一个新兴的强国，拥有如此庞大的人口后，我们的联盟几乎能够实现任何目标。"
 MSP_assistance_to_bulgaria: "援助保加利亚"
 MSP_assistance_to_bulgaria_desc: "我们应该帮助保加利亚发展基础设施，以便我们能够轻松地进行更多境外投资。"
 MSP_supp_plo: "支持巴勒斯坦解放组织"
 MSP_supp_plo_desc: "巴勒斯坦解放组织长期以来一直是争取巴勒斯坦自决权斗争中的关键力量。支持巴解组织可以增强我们与国际盟友的关系，并促进冲突的和平解决。"
 MSP_the_pal_issue: "巴勒斯坦问题"
 MSP_the_pal_issue_desc: "巴勒斯坦问题仍然是我们外交政策中的关键议题。我们对巴勒斯坦斗争的立场将决定我们在该地区的国际联盟和影响力。我们必须决定如何应对这场持续不断的冲突。"
 MSP_supp_hamas: "支持哈马斯"
 MSP_supp_hamas_desc: "哈马斯是巴勒斯坦抵抗运动中的一个重要派系。通过提供支持，我们可以加强与该组织的联系，提升我们在该地区的影响力，并与他们的斗争保持一致。"
 MSP_Get_rid_of_military_corrupt: "清除军队腐败分子"
 MSP_Get_rid_of_military_corrupt_desc: "军方已根深蒂固地渗透到我们的机构中​​，对国家的未来构成明显威胁。我们将以腐败罪名逮捕他们，并没收我们能够获得的任何财产。"
 MSP_reverse_secularization: "逆世俗化"
 MSP_arm_palestinians_to_fight: "武装巴勒斯坦人"
 MSP_arm_palestinians_to_fight_desc: "约旦有大量巴勒斯坦难民。 我们可以将这些难民变成战斗人员，并煽动他们在巴勒斯坦和以色列搞破坏。 由于他们是代理人战斗人员，我们可以使用它们煽动以色列对巴基斯坦进行报复，使他们看起来像是这次冲突中的坏人角色"
 MSP_zionist_threat: "犹太复国主义的威胁"
 MSP_zionist_threat_desc: "以色列是所有穆斯林最大的耻辱，也是伊斯兰中心地区可恶的伪政权。 他们需要从大地上消失"
 ALG_kabyle_issue: "卡比利亚问题"
 ALG_kabyle_issue_map: "[KBY.GetFlag]阿马齐格人民对我们政府的满意度！"
 ALG_2014_oil_crash_idea: "石油危机"
 ALG_algeria_resplendent: "辉煌的阿尔及利亚"
 ALG_algeria_resplendent_desc: ""
 KBY_new_state_born: "新国涅槃"
 KBY_new_state_born_desc: "卡比利亚已重生为一个主权国家。在独立之初，我们必须在巩固成果、庆祝胜利之余保持谨慎。"
 KBY_border_readiness: "边境准备"
 KBY_border_readiness_desc: "我们必须保卫祖国边境安全，严防渗透、走私与入侵。"
 KBY_diplomatic_push_desc: "获得国际承认对我们的生存至关重要。我们将发起一场有组织的外交攻势。"
 KBY_new_institutions: "新机构"
 KBY_new_institutions_desc: "一个正常运转的国家必须建立在值得信赖和稳定的制度基础之上。"
 KBY_state_economy_plan: "国家经济计划"
 KBY_state_economy_plan_desc: "我们必须明确经济结构 - 是集中式、市场驱动型还是混合型。"
 KBY_african_diplomacy: "非洲外交"
 KBY_african_diplomacy_desc: "寻求在非洲邻国中获得区域合法性，将提升我们的地位和经济机遇。"
 KBY_internal_stability_measures: "内部稳定措施"
 KBY_internal_stability_measures_desc: "维护内部稳定至关重要。我们将赋予相关机构权力，以确保和平与秩序。"
 KBY_international_recognition_campaign: "国际承认运动"
 KBY_international_recognition_campaign_desc: "我们的生存取决于在其他国家眼中的合法性。发起有针对性的外交攻势。"
 KBY_international_recognition_campaign_completion: "外交渠道已经开通 - 现在才开始艰苦的说服工作。"
 KBY_establish_governance_structures: "建立治理结构"
 KBY_establish_governance_structures_desc: "必须建立相应的制度，以确保我们的治理原则能够长久延续。"
 KBY_establish_governance_structures_completion: "政府机构现已正常运转，随时准备为公民服务。"
 KBY_plan_the_economy: "规划经济"
 KBY_plan_the_economy_desc: "决定我们的经济未来：国家主导型、自由化还是混合型。每条道路都有其独特的利弊权衡。"
 KBY_plan_the_economy_completion: "经济规划正在进行中 - 为了长远繁荣，请做出明智的选择。"
 KBY_seek_regional_support: "寻求地区支持"
 KBY_seek_regional_support_desc: "来自邻国和非洲社区的支持将增强我们的合法性。"
 KBY_seek_regional_support_completion: "已开展区域宣传工作 - 现正等待回复。"
 KBY_secure_internal_stability: "内部维稳"
 KBY_secure_internal_stability_desc: "在外部威胁得到控制之后，我们必须解决内部异议和抵制问题。"
 KBY_secure_internal_stability_completion: "安全措施已启动 - 公共秩序已改善。"
 KBY.10.t: "建立国际关系"
 KBY.10.d: "随着国际社会承认我们的独立，卡比利亚是时候与其他国家建立正式外交关系了。我们的外交官已准备好与潜在伙伴接洽，首先是法国 - 鉴于我们之间的历史渊源 - 以及对阿马齐格事业表现出兴趣的土耳其。\n\n这一外交努力将有助于我们年轻的国家获得合法地位，并为未来的合作打开大门。"
 KBY.10.a: "我们将与所有国家建立联系！"
 KBY.15.t: "寻求非洲统一"
 KBY.15.d: "我们的非洲外交倡议为与非洲大陆更深层次的融合奠定了基础。非洲联盟对我们国家而言是一个重要的论坛 - 加入非洲联盟将赋予我们合法性、经济机遇，并为我们提供一个平台，在整个北非倡导阿马齐格人的权利。\n\n尼日尔拥有大量的图阿雷格人口，已表示支持我们的申请。"
 KBY.15.a: "申请加入非洲联盟"
 KBY.20.t: "选择我们的经济道路"
 KBY.20.d: "作为一个新生国家，我们必须决定经济的根本结构。这一选择将影响我们未来几十年的发展。\n\n国家应该主导经济发展，确保资源惠及所有公民吗？还是应该拥抱自由市场，让私营企业推动增长？或许折中方案 - 将国家监管与市场自由相结合 - 才是最适合我们的。"
 KBY.20.a: "采取国家主导的经济模式"
 KBY.20.b: "奉行自由市场经济"
 KBY.20.c: "选择混合模式"
 KBY_diplomatic_push: "外交推动"
 KBY_au_membership_attempt: "卡比利亚非洲联盟会员资格申请"
 KBY_state_economy_model_statist: "国家主导型经济"
 KBY_state_economy_model_liberal: "自由市场经济"
 KBY_state_economy_model_mixed: "混合经济模式"
 ALG_recover_from_the_war: "从内战中恢复"
 ALG_restoring_order: "恢复秩序"
 ALG_restoring_order_desc: "当务之急是重建国家权威，制止部分地区持续不断的混乱局面。经历了多年的蹂躏，民众渴望和平与秩序。"
 ALG_secure_weapons_shipments: "确保武器运输安全"
 ALG_secure_weapons_shipments_desc: "确保军队物资充足，才能维持内部秩序，防止叛乱再次发生。"
 ALG_recover_from_the_war_desc: "现在我们必须开始重建国家的漫长进程。“黑色十年”给阿尔及利亚留下了难以磨灭的伤痕，但只要我们决心坚定，就能浴火重生。"
 ALG_restoring_the_broken_economy: "重振国民经济"
 ALG_restoring_the_broken_economy_desc: "内战已经瘫痪了我们的金融机构。我们必须采取紧急措施来稳定经济。"
 ALG_arresting_extremists: "消除武装威胁"
 ALG_arresting_extremists_desc: "极端组织仍在偏远地区活动。一项新的安全行动将恢复国家对该地区的全部控制权。"
 ALG_economic_recovery: "经济复苏"
 ALG_economic_recovery_desc: "我们的政策开始奏效。我们现在正进入逐步复苏和重建信心的阶段。"
 ALG_regain_banks: "恢复银行业的信心"
 ALG_regain_banks_desc: "重振银行业对于恢复投资者信心和重启国内信贷至关重要。"
 ALG_financial_reform: "改革金融体系"
 ALG_financial_reform_desc: "阿尔及利亚金融体系的现代化将促进可持续增长，并使我们能够避免未来的冲击。"
 ALG_begin_full_recovery: "开始全面经济复苏"
 ALG_begin_full_recovery_desc: "在安全得到保障、经济趋于稳定之后，我们现在可以开始全面、全国性的经济复苏。"
 ALG_repairing_the_roads: "修复基础设施"
 ALG_repairing_the_roads_desc: "道路、桥梁和通信线路已经损毁。重建我们的物流网络对国家团结至关重要。"
 ALG_rebuild_north: "重建卡比利亚和阿尔及尔"
 ALG_rebuild_north_desc: "这些城市中心受灾最为严重。必须优先恢复卡比利亚和阿尔及尔的基本服务。"
 ALG_rebuild_centre: "重建高地"
 ALG_rebuild_centre_desc: "中部高地曾是战场，也是人道主义危机中心，需要有针对性的重建。"
 ALG_rebuild_west: "重建西部"
 ALG_rebuild_west_desc: "战前西部地区的基础设施就一直被忽视。现在是时候将这些偏远地区纳入基础设施建设了。"
 ALG_rebuild_algeria: "重建阿尔及利亚"
 ALG_rebuild_algeria_desc: "是时候重建我们的国家，再次成为世界强国了。这场内战造成了太多的创伤，现在是疗伤的时候了。"
 ALG_rebuild_south: "重建南部"
 ALG_rebuild_south_desc: "战前南方地区的基础设施就一直被忽视。现在是时候将这些偏远地区纳入一体化建设了。"
 ALG_order_restored_in_algeria: "阿尔及利亚恢复秩序"
 ALG_order_restored_in_algeria_desc: "几十年来，阿尔及利亚首次实现了稳定与统一。前路漫漫，但和平已经回归。"
 ALG_state_and_imf_funding: "国家和国际货币基金组织资金"
 ALG_state_and_imf_funding_desc: "通过贷款和外国援助 - 特别是来自国际货币基金组织的援助 - 我们可以为我们陷入停滞的经济注入活力。"
 ALG_restocking_factories: "恢复工厂"
 ALG_restocking_factories_desc: "许多工厂遭到破坏或空置。有了新的物资，我们就能恢复生产。"
 ALG_rebuilding_factories: "重建工业区"
 ALG_rebuilding_factories_desc: "多个工业区已沦为废墟。重建这些工业区将提供就业机会，并生产灾后重建所需的物资。"
 ALG_export_controls: "出口管制与联邦援助"
 ALG_export_controls_desc: "为了保护战略物资并确保内部发展，我们将实施暂时的出口限制 - 同时辅以外部支持。"
 ALG_post_war_recovery: "内战后重建"
 ALG_post_war_recovery_desc: "阿尔及利亚至今仍未从上世纪90年代残酷的内战中恢复过来。尽管和平已经恢复，但该国仍然饱受政局不稳、工厂利用率低、基础设施不堪重负以及政治体系脆弱等问题的困扰。"
 ALG_imf_funding_idea: "国际货币基金组织紧急资助"
 ALG_imf_funding_idea_desc: "国际货币基金组织已介入，提供急需的流动性和预算纾困资金。虽然这些资金有助于稳定经济，但它们也附带一些条件。"
 ALG_export_controls_idea: "出口管制"
 ALG_export_controls_idea_desc: "为了优先发展国内经济，政府对关键原材料实施了出口限制。这项政策稳定了国内市场，但可能会损害国际贸易关系。"
 ALG_anti_terror_sweeps: "反恐行动"
 ALG_anti_terror_sweeps_desc: "安全部队正在开展强有力的行动，以清除残余的极端分子。虽然这有助于提升国家安全，但必须权衡利弊，避免压制公民自由。"
 ALG_banking_confidence_restored: "银行业信心恢复"
 ALG_banking_confidence_restored_desc: "经过一段严重的信任危机与停滞期后，银行业已重获部分稳定，使公民和投资者得以重新参与阿尔及利亚的金融体系。"
 ALG_structural_reform: "结构性经济改革"
 ALG_structural_reform_desc: "阿尔及利亚正全面推进经济现代化改革，旨在降低通货膨胀、精简机构并促进长期增长。"
 ALG_national_recovery_completed: "国家复兴完成"
 ALG_national_recovery_completed_desc: "基础设施重建、安全保障、经济复苏，阿尔及利亚终于走出了最黑暗的篇章。一个充满希望与进步的新时代就此开启。"
 ALG_mastering_atom: "掌握原子之力"
 ALG_missile_chi_TT: "阿尔及利亚将升级他们的§H核反应堆§!科技"
 CHI_rejected_ALG: "中国拒绝提议"
 ALG_technological_ties: "技术联系"
 ALG_continue_1991_program: "继续1991年核计划"
 ALG_continue_1991_program_desc: "尽管我们的核计划在20世纪90年代被暂停，但其基础依然存在。通过重启旧有项目，我们既能追求能源安全，也能获得更大的独立性——尽管国际制裁很可能随之而来。"
 ALG_seek_china_help: "寻求中国援助"
 ALG_seek_china_help_desc: "中国长期以来一直愿意与阿尔及利亚在核技术领域开展合作。重新建立的伙伴关系将为我们提供绕过西方限制的设备、专业知识和培训。"
 ALG_1983_deal: "重启1983年导弹协议"
 ALG_1983_deal_desc: "我们1983年与中国的合作曾为我们提供了导弹技术和有限的核援助。重启这一安排将加速我们民用和军事核计划的发展。"
 ALG_missile_cooperation: "扩大导弹合作"
 ALG_missile_cooperation_desc: "除了反应堆和燃料，中国还能为我们提供可搭载核弹头的导弹系统。不过，这一步将引起西方的高度关注。"
 ALG_hoggar_nuclear_facility: "建造霍加尔设施"
 ALG_hoggar_nuclear_facility_desc: "在霍加尔山脉深处，可以建造一座安全的核设施，免受外界干扰。这将成为阿尔及利亚核计划的核心。"
 ALG_the_search_for_uranium: "寻找铀矿"
 ALG_the_search_for_uranium_desc: "我们的科学家确信，阿尔及利亚广阔的沙漠下蕴藏着大量铀矿资源。找到并开采这些矿藏，将为任何独立的核计划提供坚实基础。"
 ALG_dig_in_tamanrasset: "勘探塔曼拉塞特"
 ALG_dig_in_tamanrasset_desc: "塔曼拉塞特的沙漠平原下蕴藏着丰富的铀矿资源。通过在此投资建设采矿基础设施，阿尔及利亚能够摆脱对外国供应商的依赖。"
 ALG_withdrawal_from_npt: "退出《不扩散核武器条约》"
 ALG_withdrawal_from_npt_desc: "阿尔及利亚不能再允许其主权受外国条约的束缚。通过退出《不扩散核武器条约》，我们公开宣告了寻求核武器的意图。"
 ALG_wmds: "大规模杀伤性武器"
 ALG_wmds_desc: "随着浓缩设施完工和导弹准备就绪，是时候完成阿尔及利亚核威慑力量的最后部署了。世界将为之侧目，我们的敌人在威胁我们之前也得三思而行。"
 ALG_algiers_agreement: "阿尔及尔协议"
 ALG_algiers_agreement_desc: "阿尔及利亚可以不追求核武装，而是以和平倡导者的姿态示人。《阿尔及尔协议》将作为克制承诺，为外国投资和国际合法性敞开大门。"
 ALG_sign_BWC: "签署《禁止生物武器公约》"
 ALG_sign_BWC_desc: "通过加入反对大规模杀伤性武器的国际协议，我们展现了阿尔及利亚对和平的承诺。这将使外国投资者感到安心，并减少对我们核活动的疑虑。"
 ALG_build_nuclear_reactor: "建造核反应堆"
 ALG_build_nuclear_reactor_desc: "我们的核计划已准备好迈出下一步。通过建造一座全尺寸反应堆，阿尔及利亚将同时获得强大的能源来源和进一步浓缩活动的掩护。尽管世界可能看到和平意图，但现实或许远为复杂。"
 ALG_IAEA_safeguards_leave: "完成原子能机构核查"
 ALG_IAEA_safeguards_leave_desc: "经过多年的监督与履约，阿尔及利亚已全面落实《阿尔及尔协议》及《禁止生物武器公约》框架下的各项承诺。随着国际原子能机构最后一批核查人员撤离我国领土，制裁措施正式解除，我国作为负责任地区大国的地位获得国际社会认可。"
 sanctioned_algeria: "制裁"
 ALG_hoggar_nuclear_facility_idea: "霍加尔核设施"
 ALG_sanction_trade_opinion_factor_tt: "将§H经济制裁§!的£trade_deal_opinion_texticon  §Y贸易影响力系数§!修改[?ALG_sanction_trade_opinion_factor_change|+%]（当前：[?ALG_sanction_trade_opinion_factor|+%]）"
