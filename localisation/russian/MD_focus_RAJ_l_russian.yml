 attack_420_from_427: "Атака на Азад Кашмир со стороны Джамму и Кашмира"
 attack_427_from_420: "Атака на Джамму и Кашмир из Азад Кашмира"
 attack_429_from_563: "Нападение на Центральный Пенджаб со стороны Восточного Пенджаба"
 attack_563_from_429: "Нападение на Восточный Пенджаб из Центрального Пенджаба"
 attack_984_from_573: "Атака на Западный Раджастхан из Южного Пенджаба"
