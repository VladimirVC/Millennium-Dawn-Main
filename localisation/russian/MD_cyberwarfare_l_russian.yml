 CYBER_ATTRIB_BTN_TT: "§YПредварительные условия:§!\n[!cyber_attribution_hunt_button_click_enabled]\n§Y Эффект:§!\n[!cyber_attribution_hunt_button_click]"
 CYBER_GPS_BTN_TT_DELAYED: "Специализированное вредоносное ПО проникает в инфраструктуру спутникового приема цели, наводняя военные навигационные системы поддельными сигналами. В полевых условиях командиры с трудом координируют действия, поскольку знакомые ориентиры исчезают с их цифровых карт. Даже рутинные маневры становятся опасными, когда точная навигация дает сбой."
 CYBER_SIGINT_BTN_TT_DELAYED: "Постоянный имплантат бесшумно внедряется в телекоммуникационную магистраль объекта, копируя трафик по правительственным, военным и дипломатическим каналам. Неделя за неделей перехваченный поток создает подробный портрет намерений цели, ее уязвимостей и внутренних разногласий — разведданные, которые не смог бы собрать ни один обычный шпион."
 CYBER_RADAR_BTN_TT_DELAYED: "На экранах радаров противовоздушной обороны цели появляются призрачные контакты. Операторы изо всех сил пытаются отследить несуществующие самолеты, просматривая циклы оповещения в погоне за призраками. Настоящие полеты проскальзывают через промежутки незамеченными. Этот период короток, но тридцать дней ухудшенного обнаружения с воздуха могут стать решающими в активной кампании."
 CYBER_ECON_BTN_TT_DELAYED: "Платежные системы начинают выдавать ошибки. Торговые алгоритмы захлебываются в искаженных потоках данных. Контроллеры заводских цехов получают искаженные пакеты обновлений. Атака рассчитана на то, чтобы ее нельзя было отрицать — каскад, казалось бы, несвязанных технических сбоев, которые незаметно истощают экономическую отдачу цели на месяцы."
 CYBER_PROP_BTN_TT_DELAYED: "Тысячи скоординированных аккаунтов наводняют медийную среду объекта противоречивыми рассказами. Сфабрикованные правительственные документы распространяются в социальных сетях. Цель состоит не в том, чтобы обмануть, а в том, чтобы истощить население, которое больше не может отличить факт от вымысла, теряет доверие ко всем институтам, включая собственное правительство."
 CYBER_ELECT_BTN_TT_DELAYED: "Системы регистрации избирателей слегка испорчены. Глубоко поддельные кадры с участием лидеров оппозиции распространяются в последние дни перед выборами. Алгоритмы социальных сетей используются для усиления существующих разногласий. Демократические институты объекта не уничтожаются — их незаметно делают ненадежными, их результаты оспариваются до подсчета единого бюллетеня."
 CYBER_ESPION_BTN_TT_DELAYED: "Фишинговая кампания внедряет пользовательские имплантаты глубоко в самые чувствительные исследовательские сети объекта. Вредоносная программа месяцами перемещается в горизонтальном направлении, собирая чертежи, тестовые данные и проприетарные формулы. К тому времени, когда нарушение будет обнаружено, наши исследователи уже будут опираться на то, что они украли."
 CYBER_COMMS_BTN_TT_DELAYED: "Молчаливый человек посередине занимает позицию напротив самых чувствительных узлов связи цели. Приказы генералов, телеграммы послов и обсуждения в кабинете министров проходят через один и тот же скомпрометированный ретранслятор — копируются, каталогизируются и доставляются нашим аналитикам в режиме реального времени. Объект продолжает принимать решения, не подозревая, что мы читаем каждое из них."
 CYBER_INFRA_BTN_TT_DELAYED: "Промышленные системы управления, управляющие распределением электроэнергии, водоочисткой и логистическими узлами, получают тихие вредоносные обновления встроенного программного обеспечения. Когда срабатывает полезная нагрузка, каскадные сбои подавляют ремонтные бригады в нескольких секторах одновременно. Ущерб реален, физический, и его медленно восстанавливают."
 CYBER_FIN_BTN_TT_DELAYED: "Расчетные системы центрального банка отключаются. Сети банкоматов выходят из строя по всей стране. Алгоритмы торговли валютой получают искаженные входные данные, которые вызывают мгновенный сбой. Разрушение выходит далеко за рамки того, чего могли бы достичь обычные санкции, и, в отличие от санкций, оно не несет никакой ответственности."
 CYBER_LOG_BTN_TT_DELAYED: "Программное обеспечение для управления цепочками поставок выходит из строя одновременно на всех передовых операционных базах. Запросы на боеприпасы исчезают в поврежденных очередях. Алгоритмы распределения топлива направляют автоколонны к несуществующим складам. Военная машина противника не ломается в бою — она умирает с голоду на месте."
 CYBER_SLEEP_BTN_TT_DELAYED: "Терпеливый, методичный, незаметный. Наши оперативники здесь не для того, чтобы атаковать — они здесь для того, чтобы остаться. Бездействующие точки доступа встроены в критически важную сетевую структуру объекта и расположены для активации по команде. В течение следующего года в их наиболее чувствительных системах, возможно, вообще не будет секретов."
 CYBER_CRIT_BTN_TT_DELAYED: "Весь наш кибернетический арсенал обрушивается на вас сразу. Электросети выходят из строя. Коллапс военных коммуникаций. Промышленное производство прекращается. Финансовые системы замораживаются. Операция представляет собой цифровой эквивалент кампании стратегических бомбардировок, в результате которой цель оказывается функционально парализованной во всех сферах национальной власти одновременно."
 CYBER_DECEPT_BTN_TT_DELAYED: "Мы не атакуем системы цели. Мы развращаем его разум. Сфабрикованные оценки разведданных, поддельные приказы с аутентификационными подписями старших командиров, манипулированные изображения, предоставляемые лицам, принимающим решения на самом высоком уровне, - каждый выбор, который делает цель, потенциально строится на созданной нами реальности."
 CYBER_ZERO_BTN_TT_DELAYED: "Засекреченный арсенал ранее неизвестных эксплойтов, накопленный годами и зарезервированный именно для этого момента, одновременно применяется против наиболее важных систем цели. К тому времени, когда их аналитики поймут, что произошло, уязвимости будут уничтожены, а ущерб станет необратимым."
 CYBER_HARDEN_BTN_TT_DELAYED: "Наши службы безопасности проверяют каждый открытый интерфейс, исправляют все известные уязвимости и ужесточают протоколы, которые чаще всего проверяют иностранные спецслужбы. Работа невзрачная, но с каждой закрывающейся дверью становится на один вектор меньше возможностей для использования противником. Лучшая кибероперация - это та, которая никогда не завершается успешно."
 CYBER_CNTRINT_BTN_TT_DELAYED: "Аналитики просматривают сетевые журналы и системную телеметрию в поисках едва заметных признаков постороннего присутствия — аномальных схем доступа, неожиданных исходящих подключений, бездействующих процессов без законной цели. Очистка зараженной сети - это медленная и тщательная работа. Необнаруженный имплантат гораздо опаснее, чем известный."
 CYBER_ATTRIB_BTN_TT_DELAYED: "Наши команды цифровой криминалистики реконструируют путь атаки — отслеживают сигнатуры вредоносных программ, сопоставляют инфраструктуру командования и контроля и каталогизируют операционные схемы безопасности, которые позволяют идентифицировать ответственного субъекта. Определение государства, стоящего за вторжением, является первым шагом на пути к пропорциональному реагированию."
