l_russian:
 CHI_SOV_treaty_good_neighbourliness: "Договор о добрососедстве, дружбе и сотрудничестве между РФ и КНР"
 CHI_SOV_treaty_good_neighbourliness_desc: "Договор о добрососедстве, дружбе и сотрудничестве, подписанный в 2001 году, заложил правовую основу современных китайско-российских отношений. Обновлённая политическая воля к реализации его положений — взаимное уважение, невмешательство и консультации по основным международным вопросам — открывает дорогу целому поколению двусторонних проектов, которые ни одна из стран не могла бы осуществить в одиночку."
 CHI_SOV_sco_framework: "Повестка расширения ШОС"
 CHI_SOV_sco_framework_desc: "Шанхайская организация сотрудничества была основана в 2001 году Китаем и Россией как преемник Шанхайской пятёрки. Согласование совместной повестки расширения, вовлекающей Индию, Пакистан, Иран и, в конечном счёте, государства Центральной Азии, превращает ШОС из регионального форума по безопасности в подлинный противовес западным многосторонним институтам."
 CHI_SOV_turn_to_east: "Поворот России на Восток"
 CHI_SOV_turn_to_east_desc: "Политика «Поворот на Восток», ускоренная после 2014 года западными санкциями, перенаправляет российскую торговлю, инвестиции и дипломатическое внимание в сторону Китая и Азиатско-Тихоокеанского региона. Закрепление этой переориентации в долгосрочных экономических соглашениях даёт сигнал собственной бюрократии и деловому сообществу Москвы, что западный рынок больше не является главным ориентиром для российского процветания."
 CHI_SOV_bri_russia_corridor: "Российский коридор «Пояса и пути»"
 CHI_SOV_bri_russia_corridor_desc: "Китайско-европейская сеть грузовых железнодорожных перевозок уже проводит основную часть своих сухопутных тоннажей через российскую территорию по Транссибирской магистрали. Интеграция этого коридора в рамки инициативы «Пояс и путь» — с китайскими инвестициями в модернизацию российских железных дорог и упрощением таможенных процедур на переходе Забайкальск-Маньчжурия — привязывает две экономики к общей логистической инфраструктуре."
 CHI_SOV_brics_coordination: "Координационный блок БРИКС+"
 CHI_SOV_brics_coordination_desc: "БРИКС — Бразилия, Россия, Индия, Китай, Южная Африка — превратился из акронима Goldman Sachs в действующий многосторонний форум с собственным Новым банком развития и соглашением о валютных резервах. Китай и Россия, продвигая скоординированное расширение БРИКС+ и принимая Египет, Эфиопию, Иран и Саудовскую Аравию, создают параллельную экономическую архитектуру, способную бросить вызов МВФ и Всемирному банку как стандартным институтам Глобального Юга."
 CHI_SOV_sco_antiterror: "Региональная антитеррористическая структура ШОС"
 CHI_SOV_sco_antiterror_desc: "Региональная антитеррористическая структура, РАТС, является специализированным контртеррористическим органом ШОС со штаб-квартирой в Ташкенте. Совместное китайско-российское расширение возможностей РАТС — обмен разведданными, координация быстрого реагирования и совместные учения — распространяет охват евразийского сотрудничества в области безопасности на Центральную Азию и Кавказ, противодействуя как джихадистским сетям, так и скрытым операциям влияния внешних сил."
 CHI_SOV_no_limits_partnership: "Стратегическое партнёрство без границ"
 CHI_SOV_no_limits_partnership_desc: "Совместное заявление, опубликованное во время визита Си Цзиньпина в Москву в феврале 2022 года, провозгласило дружбу без границ и сотрудничество, в котором нет запретных зон. Декларация подняла двусторонние отношения выше уровня любого формального альянса, не доходя при этом до договора о взаимной обороне, и дала сигнал Вашингтону и Брюсселю, что Пекин и Москва рассматривают своё стратегическое единство как постоянный элемент международного порядка."
 CHI_SOV_yuan_ruble_settlement: "Механизм расчётов в юанях и рублях"
 CHI_SOV_yuan_ruble_settlement_desc: "Китай и Россия ускорили отход от торговли в долларах, при этом доля юаня в российских экспортных расчётах резко возросла после того, как санкции 2022 года заморозили доступ России к SWIFT. Создание формального двустороннего клирингового механизма между Народным банком Китая и Банком России формирует параллельную финансовую инфраструктуру, которая защищает обе экономики от давления вторичных санкций."
 CHI_SOV_agricultural_corridor: "Приморский сельскохозяйственный экспортный коридор"
 CHI_SOV_agricultural_corridor_desc: "Дальневосточные и сибирские регионы России обладают одними из крупнейших в мире запасов пахотных земель, значительная часть которых недоиспользуется из-за депопуляции и отсутствия доступа к рынкам. Приморский сельскохозяйственный коридор направляет российское зерно, сою и масличные культуры через специализированные пункты пропуска в северо-восточные провинции Китая, обеспечивая Харбин и Шэньян надёжной продовольственной цепочкой, независимой от мировых сырьевых рынков."
 CHI_SOV_russian_far_east_zone: "Свободный порт Владивосток"
 CHI_SOV_russian_far_east_zone_desc: "Статус свободного порта Владивостока, предоставленный Россией в 2015 году, был специально разработан для привлечения китайских и японских инвестиций в слаборазвитый российский Дальний Восток. Китайские государственные предприятия, вкладывающие средства в портовые сооружения, холодильные склады и лёгкую промышленность в свободной экономической зоне Владивостока, создают коммерческий якорь, закрепляющий восточный разворот России и обеспечивающий Китай тихоокеанским логистическим узлом за пределами его собственных границ."
 CHI_SOV_zarubino_port: "Соглашение о тихоокеанском порте Зарубино"
 CHI_SOV_zarubino_port_desc: "Терминал навалочных грузов в Зарубино на тихоокеанском побережье России, вблизи стыка границ России, Китая и Северной Кореи, предлагается в качестве совместного проекта развития с 1990-х годов. Китайские инвестиции в расширение зерновых и контейнерных мощностей Зарубино дают китайским экспортёрам из провинции Цзилинь кратчайший путь к тихоокеанским судоходным маршрутам, а России — китайский капитал для инфраструктуры, которую Москва не может позволить себе построить в одиночку."
 CHI_SOV_trans_siberian_freight: "Расширение грузоперевозок по Транссибу"
 CHI_SOV_trans_siberian_freight_desc: "Коридор Транссибирской магистрали ежегодно обслуживает десятки тысяч контейнерных перевозок между Китаем и Европой, со временем транзита от 12 до 15 дней против 30 по морю. Совместные китайско-российские инвестиции в электрификацию путей, строительство вторых путей на узких участках и интегрированное цифровое таможенное оформление сокращают время транзита до менее чем 10 дней и утраивают пропускную способность, превращая Транссиб в подлинную альтернативу Суэцкому каналу для премиальных грузов."
 CHI_SOV_timber_mineral_trade: "Экспорт сибирского леса и полезных ископаемых"
 CHI_SOV_timber_mineral_trade_desc: "Сибирь обладает крупнейшими в мире запасами бореального леса и огромными месторождениями меди, никеля, золота и редкоземельных элементов. Китайские перерабатывающие компании заняли доминирующее положение в закупках сибирской древесины, в то время как «Норникель» и «Полюс Золото» экспортируют большую часть своей продукции на китайские перерабатывающие заводы. Оформление этих товарных потоков в долгосрочные соглашения о закупке закрепляет позиции обеих стран в глобальных цепочках поставок ресурсов."
 CHI_SOV_arctic_lng: "Контракты на отбор газа с Ямал СПГ"
 CHI_SOV_arctic_lng_desc: "Проект «Ямал СПГ» на российском полуострове Ямал, разработанный НОВАТЭКом, числит CNPC и Фонд Шёлкового пути среди своих основных акционеров. Китайские СПГ-танкеры — специально построенные суда ледового класса — круглый год забирают грузы из порта Сабетта. Долгосрочные контракты на отбор газа с CNOOC и CNPC обеспечивают поставки СПГ в Китай и одновременно предоставляют НОВАТЭКу китайское финансирование, которого его лишили западные санкции."
 CHI_SOV_power_of_siberia_2: "Газопровод «Сила Сибири — 2»"
 CHI_SOV_power_of_siberia_2_desc: "«Сила Сибири — 2» предназначен для транспортировки газа с тех же западносибирских месторождений, что снабжают Европу, через Монголию в северный Китай. С мощностью 50 миллиардов кубометров в год он сделает Китай крупнейшим покупателем российского газа со значительным отрывом и даст Газпрому якорный контракт, оправдывающий продолжение инвестиций в месторождения, которые иначе могли бы остаться неосвоенными."
 CHI_SOV_tianwan_nuclear: "Расширение Тяньваньской АЭС"
 CHI_SOV_tianwan_nuclear_desc: "Тяньваньская атомная электростанция в Ляньюньгане, построенная «Росатомом» по серии контрактов, подписанных начиная с 1997 года, является крупнейшим проектом российско-китайского технического сотрудничества в истории. Энергоблоки 7 и 8, контракт на которые был подписан в 2021 году, продлевают партнёрство до 2030-х годов. Каждый энергоблок «Росатома», построенный в Китае, передаёт знания о проектировании реакторов, контракты на поставку топлива и сервисные отношения, которые связывают ядерные отрасли двух стран на десятилетия."
 CHI_SOV_huawei_russia: "Развёртывание 5G Huawei в России"
 CHI_SOV_huawei_russia_desc: "Huawei подписала соглашения о 5G с российскими операторами связи, включая МТС, «МегаФон» и «Ростелеком», в 2019–2020 годах. Поскольку западные поставщики 5G были исключены из России преференциями в госзакупках, а позднее и санкциями, доминирование Huawei в развёртывании российского 5G по сути не имеет конкуренции. Китайская инфраструктура 5G, встроенная в коммуникационный костяк России, создаёт техническую зависимость, которая углубляет двусторонние отношения на уровне критической национальной инфраструктуры."
 CHI_SOV_beidou_glonass: "Навигационное соглашение Бэйдоу-ГЛОНАСС"
 CHI_SOV_beidou_glonass_desc: "Китайская система «Бэйдоу» и российская ГЛОНАСС являются единственными двумя спутниковыми навигационными системами, независимыми от американской сети GPS. Соглашение о совместимости, подписанное между операторами двух систем в 2015 году, позволяет гражданским и военным приёмникам одновременно использовать сигналы обеих группировок, повышая точность позиционирования и, что критически важно, предоставляя обеим странам резервную навигационную инфраструктуру, которую невозможно ухудшить американскими средствами глушения или орбитального воздействия."
 CHI_SOV_polar_silk_road: "Инициатива «Полярный шёлковый путь»"
 CHI_SOV_polar_silk_road_desc: "Китайская арктическая стратегия, опубликованная в 2018 году, определила Северный морской путь как «Полярный шёлковый путь» — третий коридор «Пояса и пути» наряду с сухопутными маршрутами через Центральную Азию и морским маршрутом через Индийский океан. Китайские инвестиции в арктическую судоходную инфраструктуру, строительство ледоколов на китайских верфях и портовые сооружения вдоль СМП превращают сезонный российский маршрут в круглогодичную международную судоходную линию, контролируемую китайско-российскими совместными предприятиями."
 CHI_SOV_northern_sea_route: "Коммерциализация Севморпути"
 CHI_SOV_northern_sea_route_desc: "Северный морской путь, проходящий вдоль арктического побережья России от Берингова пролива до Карского моря, сокращает расстояние между Шанхаем и Гамбургом примерно на 30% по сравнению с маршрутом через Суэцкий канал. Таяние арктических льдов увеличивает продолжительность навигационного сезона. Совместные китайско-российские инвестиции в ледокольное сопровождение, инфраструктуру аварийно-спасательных служб вдоль маршрута и специализированные контейнеровозы ледового класса превращают СМП из нишевого сезонного варианта в жизнеспособную круглогодичную альтернативу для перевозки дорогостоящих грузов."
 CHI_SOV_rosatom_export: "Экспортный пакет «Росатома»"
 CHI_SOV_rosatom_export_desc: "«Росатом» — крупнейшая в мире ядерная энергетическая компания по международным заказам на реакторы: более 30 энергоблоков строятся или законтрактованы за рубежом. Реакторная установка ВВЭР, цепочка поставок топлива и долгосрочные сервисные контракты являются основным инструментом, через который Россия проецирует экономическое и техническое влияние. Специальный экспортный пакет для китайских заказчиков, включающий энергоблоки ВВЭР-1200, поставки смешанного оксидного топлива и совместную подготовку китайских инженеров-ядерщиков, встраивает российские ядерные технологии в гражданскую энергетическую инфраструктуру Китая на целое поколение."
 CHI_SOV_space_station: "Международная лунная исследовательская станция"
 CHI_SOV_space_station_desc: "Международная лунная исследовательская станция, совместно объявленная Китайским национальным космическим управлением (CNSA) и российским Роскосмосом в 2021 году, является самым амбициозным двусторонним научным проектом со времён советской космической программы. МЛЛС предусматривает создание постоянного роботизированного, а в перспективе и обитаемого исследовательского комплекса вблизи южного полюса Луны, разработанного специально как альтернатива программе NASA «Артемида» и открытого для участия третьих стран. Её совместная разработка связывает две космические программы в единую архитектуру для будущего поколения исследований дальнего космоса."
 CHI_SOV_peace_mission: "Совместные военные учения «Мирная миссия»"
 CHI_SOV_peace_mission_desc: "«Мирная миссия» — это серия совместных военных учений ШОС, проводимых ежегодно с 2005 года поочерёдно в государствах-членах. Китайские и российские войска участвовали в каждом цикле учений, при этом сценарии расширились от контртеррористических операций до общевойсковых манёвров с участием бронетанковых соединений, непосредственной авиационной поддержки и координации командования на корпусном уровне. Эта серия учений стала основной площадкой для развития оперативной совместимости НОАК и Российской армии вне рамок реальных совместных операций."
 CHI_SOV_advanced_arms_sales: "Экспортный пакет Су-35 и С-400"
 CHI_SOV_advanced_arms_sales_desc: "Приобретение Китаем 24 многоцелевых истребителей Су-35 «Сухого» в 2015 году и дивизионного комплекта зенитно-ракетных систем С-400 «Триумф» в 2018 году стало самой значительной поставкой российского оружия в Китай со времён сделки по Су-27 в 1990-х годах. Продажи передали оперативный опыт работы с самолётами поколения 4++ и интегрированной ПВО большой дальности, который собственная промышленность Китая ещё не освоила, одновременно предоставив «Рособоронэкспорту» премиального заказчика в момент, когда его западный рынок закрывался."
 CHI_SOV_pacific_fleet_coord: "Соглашение о координации Тихоокеанского флота"
 CHI_SOV_pacific_fleet_coord_desc: "Военно-морские силы Китая и Тихоокеанский флот России проводят совместные военно-морские учения в Японском, Восточно-Китайском морях и в западной части Тихого океана с 2012 года. Совместное патрулирование в водах, прилегающих к Японии и Корейскому полуострову, демонстрирует комбинированное присутствие, которое ни один из флотов не мог бы поддерживать самостоятельно, и посылает намеренный сигнал Тихоокеанскому командованию США о цене любого противостояния с любой из этих держав в её домашних водах."
 CHI_SOV_defense_industrial: "Интеграция оборонно-промышленной базы"
 CHI_SOV_defense_industrial_desc: "Китайские государственные оборонные предприятия перешли от простого импорта российских платформ к лицензионному производству и обратному проектированию. Наиболее стратегически значимыми являются совместные предприятия в области авиадвигателестроения — сферы, где собственная промышленность Китая отстаёт сильнее всего. Доступ Китая к российским турбовентиляторным технологиям для двигателей WS-15 и WS-20 сокращает разрыв с западными военно-воздушными силами за малую долю затрат на независимую разработку, в то время как российские предприятия получают китайские производственные масштабы."
 CHI_SOV_strategic_bomber_patrol: "Совместное патрулирование стратегических бомбардировщиков"
 CHI_SOV_strategic_bomber_patrol_desc: "В 2019 и 2023 годах российские бомбардировщики Ту-95МС и китайские стратегические бомбардировщики H-6K провели скоординированное патрулирование над Японским и Восточно-Китайским морями, вызвав подъём истребителей ПВО Японии и Южной Кореи. Патрулирование не является совместной операцией в строгом военно-техническом смысле, но демонстрирует синхронизированное применение стратегической авиации, сигнализирующее о готовности обеих стран координировать давление на общих противников. Регулярные совместные маршруты патрулирования углубляют знакомство экипажей и общие процедурные стандарты."
 CHI_SOV_vostok_exercises: "Стратегические учения «Восток»"
 CHI_SOV_vostok_exercises_desc: "«Восток» — это серия стратегических военных учений России, традиционно ориентированных на крупномасштабный обычный конфликт на Дальнем Востоке. Китайские силы участвовали в «Востоке-2018» и вновь в «Востоке-2022», причём последние прошли через несколько недель после начала войны на Украине. Участие Китая превращает учения из национальной репетиции в двустороннюю общевойсковую демонстрацию, в ходе которой сухопутные и авиационные элементы НОАК интегрируются в российские дивизионные командные структуры."
 CHI_SOV_military_space: "Совместная военная космическая программа"
 CHI_SOV_military_space_desc: "И Китай, и Россия создали собственный военно-космический потенциал: противоспутниковое оружие, средства глушения спутниковой навигации, спутники радиоэлектронной разведки и системы раннего предупреждения космического базирования. Совместная программа, координирующая орбитальные позиции спутников, протоколы обмена данными и общую осведомлённость о ситуации в космосе, даёт обеим странам более полную картину космических операций США и их союзников, чем каждая из них могла бы получить самостоятельно, одновременно снижая риск столкновения или эскалации между их собственными орбитальными средствами."
 SOV_chi_rare_earth_supply: "Китайские редкоземельные компоненты"
 SOV_chi_rare_earth_supply_desc: "Китай контролирует более 80% мировых мощностей по переработке редкоземельных металлов, включая соединения неодима, лантана и диспрозия, необходимые для систем высокоточного наведения, оптики ночного видения и высокопроизводительных электродвигателей. Оформление отношений поставок в рамках сотрудничества в оборонно-промышленной сфере даёт «Уралвагонзаводу» гарантированный доступ к переработанным в Китае редкоземельным элементам, снижая стоимость компонентов и повышая стабильность качества на производственных линиях Т-90 и «Армата»."
 CHI_sov_flanker_expertise: "Опыт поколения «Фланкер»"
 CHI_sov_flanker_expertise_desc: "Лицензионное производство семейства Су-27 «Фланкер» корпорацией Shenyang Aircraft, охватывающее варианты J-11, J-15 и J-16, сделало её самым опытным в мире строителем боевых самолётов российского происхождения за пределами самой России. Экспортный контракт на Су-35 углубляет эти отношения, предоставляя доступ к двигателю АЛ-41Ф1С, архитектуре РЛС «Ирбис-Э» и аэродинамическим усовершенствованиям, которые питают собственные программы следующего поколения Шэньяна. Самолёты, сходящие с конвейера Шэньяна, несут измеримые улучшения характеристик, напрямую связанные с сотрудничеством с ОКБ Сухого."
 CHI_SOV_military_tech_idea: "Передача российских оборонных технологий"
 CHI_SOV_shared_modifier: "Китайско-российское стратегическое единство"
 CHI_SOV_shared_modifier_desc: "Пакет взаимосвязанных двусторонних обязательств между Пекином и Москвой, который перестраивает китайскую экономику и вооружённые силы в соответствии с глубиной китайско-российского сотрудничества. Более тесные связи расширяют политическую свободу действий, сельскохозяйственное и ресурсное производство, военно-морскую досягаемость и гражданско-промышленный потенциал, в то время как углубление партнёрства повышает добрую волю в торговле и укрепляет пограничную безопасность. Модификатор масштабируется с каждым крупным соглашением, ратифицированным между двумя державами."