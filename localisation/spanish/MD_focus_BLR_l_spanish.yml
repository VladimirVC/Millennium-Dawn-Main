 BLR_BM21_Grad: "BM21 Grad."
 BLR_Zubr: "Energía Zubr."
 asseco_research: "Investigación Asseco."
 BLR_oil_sov: "Contrato energético con Bielorrusia"
 belarus_another.6.t: "El Culto a Lukashenko."
 belarus_another.6.d: "Alexander Lukashenko has been the permanent President of the Republic of Belarus for a very long time. During his rule, a whole cult of the \"Batka\" has built up around him. This cult distinguishes him from other CIS dictators but also requires him to interact with his people in a particular way. The Batka Support indicator shows how strong the support for Alexander Grigoryevich Lukashenko is across all segments of the population. Depending on various actions, this indicator will increase or decrease, granting various bonuses or penalties."
 belarus_another.6.a: "Nuestro Batka Lukashenko, madre de Belarús."
 BLR_luka_prime: "Primer ministro del Estado de la Unión - Lukashenko"
 default_left_side: "Oposición"
 default_right_side: "Fuerzas prorrusas"
 mid_range: "Equilibrado"
 left_side_range: "La oposición tiene una influencia débil"
 middle_left_side_range: "La oposición influye en la política"
 far_left_side_range: "La oposición domina la política"
