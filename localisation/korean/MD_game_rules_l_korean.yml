 POL_AI_BEHAVIOR_MD: "@POL 폴란드"
 POL_HISTORICAL: "기본"
 POL_HISTORICAL_DESC: "폴란드는 민주주의 경로를 유지하며 유럽연합(EU) 가입을 시도할 것입니다. 지배 정당은 반러시아 정치 성향의 시민연단(PO)이 될 것입니다."
 POL_COMMUNISM: "붉은 꿈"
 POL_COMMUNISM_DESC: "폴란드는 다시 공산주의 국가가 되어 유럽에 붉은 혁명을 퍼뜨리기 시작할 것입니다."
 POL_KORWIN_AG: "코르빈의 CSTO 가입"
 POL_KORWIN_AG_DESC: "폴란드는 실수정치연합(UPR)을 지지하고, 코르빈으로 승리한 뒤, 우크라이나를 침공하고 집단안보조약기구(CSTO)에 가입할 것입니다."
