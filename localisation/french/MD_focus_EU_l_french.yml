 european_council_header_tt: "Actes juridiques de §C[EUU.GetFlag][EUU.GetNameDef]§!\n--------------\nLes actes juridiques actuellement adoptés par §C[EUU.GetFlag][EUU.GetNameDef]§!\n\nLe Conseil de l'Union européenne fonctionne selon le principe du vote à la majorité qualifiée (VMQ), communément appelé double majorité. Il requiert 55% des §CÉtats membres§! et 65% des §CÉtats membres§! de la population de l'Union européenne."
