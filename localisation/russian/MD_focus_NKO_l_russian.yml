 NKO_field_hospitals: "Полевые госпитали"
 NKO_field_hospitals_desc: "Мы развернём больше полевых госпиталей, чтобы в случае войны мы могли как можно быстрее оказывать помощь солдатам"
 NKO_reform_youth: "Реформа рабочей гвардии"
 NKO_reform_youth_desc: "Эту структуру давно нужно было реформировать, её прежняя функциональность давно устарела"
 korea_north.7.t: "Наркотики распространяются по нашим улицам"
 korea_north.7.d: "Улицы утопают в хаосе, поскольку сильнодействующие наркотики, такие как метамфетамин и кокаин, заполонили районы, разрушая сообщества. Семьи распадаются, преступность растёт, и никто больше не чувствует себя в безопасности."
 korea_north.7.a: "Наши враги падут"
 korea_north.8.t: "Наши наркотики были остановлены на границе"
 korea_north.8.d: "Всё шло гладко, пока не пришло сообщение: груз задержали на границе. Теперь всё под угрозой. Месяцы планирования пошли насмарку."
 korea_north.8.a: "Мы попробуем еще раз"
 korea_north.9.t: "Фальшивые деньги стали настоящей бедой для нашей банковской системы"
 korea_north.9.d: "Фальшивые деньги повсюду, они незаметно проходят через руки и предприятия, сея хаос. Местные магазины, уличные торговцы и даже крупные розничные сети терпят убытки, поскольку фальшивые купюры распространяются быстрее, чем власти могут отреагировать."
 korea_north.9.a: "Империализм падает"
 korea_north.10.t: "Наши фальшивые деньги были изъяты властями"
 korea_north.10.d: "Власти задержали эту партию, но это не конец, это только начало."
 korea_north.10.a: "Делайте больше!"
 NKO_accept_money: "§YПринять§! Деньги"
 NKO_medicine_relief: "§YПришлите§! Медицинскую помощь"
 NKO_build_farms1: "§YФермы§! Строительство"
 NKO_build_farms1_desc: "Строительство ферм для обеспечения продовольствием нашего народа является обязательным условием. Эта ферма находится в процессе строительства"
 NKO_build_factory1: "§YГражданская промышленность§! Строительство"
 NKO_build_factory1_desc: "Чтобы помочь нашей экономике расти, мы должны дать нашим людям возможность производить больше потребительских товаров и увеличить наши производственные мощности."
