 ALG_appoint_technocrat_moi_tt: "A loyal technocrat offers administrative reliability without dramatic change."
 ALG_appoint_prowestern_mofa_tt: "This choice would tilt Algerian diplomacy toward pragmatism with Western partners."
 ALG_appoint_panarab_mofa_tt: "This choice would emphasize Arab solidarity and regional alignment."
 ALG_appoint_nonaligned_mofa_tt: "This choice preserves Algeria's traditional non-aligned posture."
 ALG_appoint_freemarket_mof_tt: "A free market economist will push liberalization and budget discipline."
 ALG_appoint_statist_mof_tt: "A statist minister will favor state-led economic management."
 ALG_appoint_bureaucrat_mof_tt: "A loyal bureaucrat will preserve continuity and administrative control."
 ALG_appoint_sonatrach_moe_tt: "A Sonatrach insider would deepen state-energy connections and reassure sector elites."
 ALG_appoint_international_moe_tt: "An international expert would emphasize efficiency and external credibility."
 ALG_appoint_loyal_moe_tt: "A loyal administrator would maintain stable political control over the energy sector."
 ALG_appoint_independent_moj_tt: "An independent judge would reduce political interference in the judiciary."
 ALG_appoint_security_moj_tt: "A security prosecutor would align the justice system more closely with state security priorities."
 ALG_appoint_loyalist_moj_tt: "忠诚者会确保司法系统在政治上保持可靠。"
 ALG_appoint_tartag_tt: "阿特曼·塔塔格代表着安全机构内部的连续性。"
 ALG_appoint_mediene_tt: "Mohamed Mediene would restore one of the most powerful deep state figures in Algerian history."
 ALG_appoint_loyalist_drs_tt: "A loyalist officer would improve presidential control, though old networks will remain."
 ALG_appoint_civilian_drs_tt: "A civilian intelligence expert would be a major blow against the deep state."
 ALG_appoint_reformist_drs_tt: "A reformist officer could gradually bring the intelligence services under firmer civilian oversight."
 ALG_ds_accepts_mod_change_tt: "The military establishment is unhappy, but the appointment will stand."
 ALG_ds_appeased_tt: "Political concessions have calmed the officer corps."
 ALG_intelligence_network_resists_tt: "The intelligence apparatus will resist the change."
 ALG_intelligence_network_appeased_tt: "The security networks have been placated for now."
 ALG_loyalist_cabinet_tt: "The reshuffle will favor loyalists and dependable regime figures."
 ALG_technocrat_cabinet_tt: "The reshuffle will favor competence and administrative expertise."
 ALG_reform_cabinet_tt: "The reshuffle will favor reformists and weaken entrenched networks."
 ALG_force_loyalty_tt: "Cabinet members are being forced to publicly demonstrate obedience."
 ALG_loyalty_accepted_tt: "The cabinet has closed ranks behind the presidency."
 ALG_loyalty_resignation_tt: "Some resistance emerged, and competence has suffered as pliant replacements took office."
 ALG_buy_loyalty_tt: "Patronage has secured public loyalty."
 ALG_back_down_loyalty_tt: "Backing down has damaged presidential authority."
 ALG_dismiss_disloyal_tt: "Disloyal ministers will be removed from office."
 ALG_negotiate_disloyal_tt: "Quiet deals will be used to preserve cabinet unity."
 ALG_ignore_disloyal_tt: "Ignoring the problem will embolden rivals."
 ALG_accept_ds_pressure_tt: "The deep state will gain more influence inside the cabinet."
 ALG_resist_ds_pressure_tt: "The presidency will resist encroachment, at the risk of confrontation."
 ALG_compromise_ds_pressure_tt: "A limited compromise may buy time without full capitulation."
