 UKR_decrease_policing_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
 UKR_education_open: "Lancer le débat sur les dépenses en §Géducation§!"
 UKR_education_close: "Clôturer le débat sur les dépenses en §Géducation§!"
 UKR_increase_education: "Demander un budget accru pour l'éducation"
 UKR_increase_education_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
