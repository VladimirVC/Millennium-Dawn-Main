 CHI_MAC_gambling_diversification: "博彩业多元化"
 CHI_MAC_gambling_diversification_desc: "几十年来，澳门的繁荣一直依赖于一个支柱：赌场。如今，澳门正积极转向数字服务、电子商务和科技基础设施建设，以拓宽博彩业以外的税基，从而缓冲旅游收入的波动，并培育本土互联网经济。"
