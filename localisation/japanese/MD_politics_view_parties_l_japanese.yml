 KOR.conservatism_2020_desc: "愛国的保守主義 - 国民の力（韓国語ローマ字表記：Gugminuihim）\n\n国民の力は韓国を代表する保守政党である。同党は、財閥が国内経済で果たす主導的役割への支持、左派政治への疑念、そしてアメリカへの強い支持と密接に結びついた北朝鮮への敵対姿勢を基盤として、自由韓国党とその他の小規模保守政党が合併して結成された。"
 KOR.socialism_2003: "£kor_western_social_democrat_alt (YUP) 開かれたウリ党"
 KOR.socialism_2003_icon: "£kor_western_social_democrat_alt"
 KOR.socialism_2003_desc: "韓国自由主義 - 開かれたウリ党（韓国語ローマ字表記：Yeollinuridang）\n\n左派リベラル政党である開かれたウリ党は、ハンナラ党と民主党の元党員で構成されている。同党はその後もリベラルかつ進歩的であり、 労働組合を重視し財閥の影響力を制限する左派的な経済政策を掲げる。統一実現に固執する党は、北朝鮮との対話・接触を重視し、同盟国であるアメリカとの関係には慎重な姿勢を示している。"
 KOR.socialism_2008: "£kor_western_social_democrat_alt2 (UDP) 統合民主党"
 KOR.socialism_2008_icon: "£kor_western_social_democrat_alt2"
 KOR.socialism_2008_desc: "韓国自由主義 - 統合民主党（韓国語ローマ字表記：Tonghapminjudang）\n\n左派自由主義政党である統合民主党（通称：民主党）は、様々な自由主義政党の合併によって結成された。同党はその後、中道・自由主義を掲げ、経済政策において自由主義的アプローチを堅持し、中産階級を重視する。統一実現に固執する同党は、北朝鮮との対話・接触を重視し、同盟国であるアメリカとの関係には慎重な姿勢を示している。"
 KOR.socialism_2011: "£kor_western_social_democrat_alt3 (DUP) 民主統合党"
 KOR.socialism_2011_icon: "£kor_western_social_democrat_alt3"
 KOR.socialism_2011_desc: "韓国自由主義 - 民主統合党（韓国語ローマ字表記：Minjutonghapdang）\n\n左派自由主義政党である民主統合党（通称：民主党）は、様々な自由主義政党の合併によって結成された。同党はその後、中道・自由主義を掲げ、経済政策において自由主義的アプローチを堅持し、中産階級を重視する。統一実現に固執する同党は、北朝鮮との対話・接触を重視し、同盟国であるアメリカとの関係には慎重な姿勢を示している。"
 KOR.socialism_2014: "£kor_western_social_democrat_alt4 (DPK) 共に民主党"
 KOR.socialism_2014_icon: "£kor_western_social_democrat_alt4"
 KOR.socialism_2014_desc: "韓国自由主義 - 共に民主党（韓国語ローマ字表記：Deobureo Minjudang）\n\n左派自由主義政党である共に民主党（通称：民主党）は、様々な自由主義政党の合併によって結成された。同党はその後、中道・自由主義を掲げ、経済政策において自由主義的アプローチを堅持し、中産階級を重視する。統一実現に固執する同党は、北朝鮮との対話・接触を重視し、同盟国であるアメリカとの関係には慎重な姿勢を示している。"
 KOR.Neutral_Communism_icon: "£kor_non_aligned_communist"
 KOR.Neutral_Communism_2013_icon: "£kor_non_aligned_communist_alt"
 NKO.Autocracy: "£NKO_autocracy (CCP) 天道教青友党"
 NKO.Autocracy_desc: "独裁的民族主義 - 天道教青友党\n\n天道教青友党は北朝鮮におけるいくつかの公認政党のうちの一つである。天道教信者らの集団によって結成され、最高人民会議においては彼らの利益を代表している。"
 NKO.Autocracy_icon: "£NKO_autocracy"
 MAU.Conservative_desc: ""
 PER.Nat_Autocracy_political: "£PER_military_junta (OPP) 秩序と進歩党"
 PER.Nat_Autocracy_political_desc: "イラン民族主義 - 秩序と進歩党（ペルシア語/ファルシ語ローマ字表記：Hezb-e Nazm va Pishraft）\n\n秩序と進歩党(OPP)は、アルテシュ（イラン軍）の政治部門である。軍事指導部と政治の直接的な分離を目的として結成されたOPPは、イランの利益を再活性化し、地域全体への影響力をより広く拡大することを目指している。"
 BDA.Mod_Vilayat_e_Faqih: "£TAJ_non_aligned_moderate_islamist (LBS) ラリ・バダフシャーン"
 BDA.Mod_Vilayat_e_Faqih_desc: "融合的イスラム主義 - 1991年のソ連崩壊時に設立された「ラリ・バダフシャーン」は、主にシーア派であるパミール人（バダフシャーン人）を代表する組織である。同組織はタジク反体制派の中で活動しており、タジキスタン内戦にも参加した。イデオロギー的には伝統的なイスラム保守主義に立脚しているが、基本的にはバダフシャーン人政党としての立場を明確にしている。"
 TAJ.Mod_Vilayat_e_Faqih: "£TAJ_non_aligned_moderate_islamist (LBS) ラリ・バダフシャーン"
 TAJ.Mod_Vilayat_e_Faqih_desc: "融合的イスラム主義 - 1991年のソ連崩壊時に設立された「ラリ・バダフシャーン」は、主にシーア派であるパミール人（バダフシャーン人）を代表する組織である。同組織はタジク反体制派の中で活動しており、タジキスタン内戦にも参加した。イデオロギー的には伝統的なイスラム保守主義に立脚しているが、基本的にはバダフシャーン人政党としての立場を明確にしている。"
 TAJ.Neutral_Communism: "£TAJ_emerging_communism (CPT) タジキスタン共産党"
 TAJ.Neutral_Communism_desc: "マルクス・レーニン主義 - タジキスタン共産党（タジク語/ペルシア語ローマ字表記：Hizbi Kommunistiyi Tojikiston）\n\nタジキスタンで最初かつ最も歴史のある政党であるタジキスタン共産党は、民主集中制の理念に基づいて結成され、他の旧ソ連圏の共産党と同様の立場を堅持している。同党は国際共産主義界において非常に活発に活動しており、党外との連携も数多く持っている。同党は「共産党連合 - ソビエト連邦共産党」に加盟している。"
 TAJ.Nat_Populism2: "£TAJ_emerging_reactionary (TNP) タジク人民党"
 TAJ.Nat_Populism2_desc: "専制民族主義 - タジキスタン民族党（タジク語/ペルシア語ローマ字表記：Hizbi Milli Tojikistan）\n\nエモマリ・ラフモンが率いるタジキスタン民族党は、鉄の支配でタジキスタンを統治してきた。同党の支配下にあるタジキスタンでは、政府転覆を目指す反体制運動が各地で勃発している。同党は主にタジク文化・アイデンティティ・国家主権の復興に注力しており、エモマリ・ラフモン政権下では、タジキスタンの世俗化を図るためイスラム教実践を厳しく制限し、ひげの禁止やヒジャブ着用希望女性への服装規定制定などの措置を講じている。最近ではタジキスタン民主党と合併し、汎イラン的アイデンティティへの傾倒を強めている。"
 TAJ.Nat_Populism: "£TAJ_western_conservative (DPT) タジキスタン民主党"
 TAJ.Nat_Populism_desc: "\n£PER_Nat_Populism_small 汎イラン主義/タジク民族主義\n\nタジキスタン民主党（タジク・ペルシア語ローマ字表記： Demokraticheskaya Partiya Tadzhikistana)\n\n1990年にマフマドルジ・イスカンダロフによって設立されたタジキスタン民主党は、世俗主義的民族主義政党であり、タジク内戦においてエモマリ・ラフモンと戦った。同党は自由主義的理念を掲げつつも、イラン系民族の土地統一を主張する際には民族主義的見解を育んでいる。同党はイランやアフガニスタンで台頭したイスラム主義政権・運動に対して否定的な見解を持ち、これらの国内における汎イラン主義運動との対話も行ったことがある。"
 GER.anarchist_communism_alt: "£GER_non_aligned_socialist_democrat (LINKE) 左翼党"
 GER.anarchist_communism_icon_alt: "£GER_non_aligned_socialist_democrat"
 GER.anarchist_communism_desc_alt: "左翼急進派 - 左翼党（ドイツ語：Die Linke）は、旧東ドイツの与党であったドイツ社会主義統一党の直接の後継政党である。同党は他の左翼民主社会主義政党と合併し、東ドイツの基盤地域を超えた選挙基盤の拡大を図った。左翼党は福祉支出の拡大といった左翼政策とポピュリスト的なレトリックを組み合わせている。同党はドイツのNATO離脱を求め、ロシアを欧州安全保障枠組みに組み込むことを望んでいる。"
 GER.Nat_Autocracy_alt: "£GER_nationalist_military_junta ドイツ連邦軍"
 GER.Nat_Autocracy_icon_alt: "£GER_nationalist_military_junta"
