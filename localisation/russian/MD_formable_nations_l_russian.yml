 form_RDLP_category: "Рио-де-ла-Плата"
 form_RDLP_category_desc: "Соединенные провинции Рио-де-Ла-Плата были союзом государств в современных государствах Аргентина, Уругвай, Парагвай и Боливия. Современная идея нации включает Чили в группу, объединяющую большую часть Южной Америки под одним национальным знаменем. Новое государство соперничает с Бразилией по размеру, населению и экономической мощи. Возможно, это новое будущее для нашей группы государств."
