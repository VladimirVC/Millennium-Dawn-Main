 KOR_revive_yeonhaeju_desc: ""
 KOR_unfinished_business: "Unerledigte Angelegenheiten"
 KOR_unfinished_business_desc: "Und das, obwohl die Japaner im Zweiten Weltkrieg vor den Vereinigten Staaten kapituliert haben. Aber Japan hat sich nie offiziell bei uns für Gyeongsul Gukchi und seine Kolonialzeit entschuldigt. Wir können diese Schande nicht vergessen."
