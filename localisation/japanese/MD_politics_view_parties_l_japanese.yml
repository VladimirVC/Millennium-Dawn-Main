 LIB.Neutral_Muslim_Brotherhood: "£LIB_muslim_brotherhood_small (NMCL) リベリア全国イスラム評議会"
 LIB.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - リベリア全国イスラム評議会は、国内のイスラム教徒の権利を守ることを目的としている。イスラム教徒はリベリア国民のごく一部を占めており、その大半はマンディンガ族に属している。テイラー大統領は当初、リビアとのつながりからリベリアのイスラム教徒により多くの自由を与えていたが、近年では彼らに対するキリスト教化運動を開始している。"
 LIB.Neutral_Muslim_Brotherhood_icon: "£LIB_muslim_brotherhood_small"
 LIB.Neutral_conservatism: "£LIB_Neutral_conservatism_small (ALCOP) - All Liberia Coalition Party"
 LIB.Neutral_conservatism_icon: "£LIB_Neutral_conservatism_small"
 LIB.oligarchism: "£generic_oligarchism_small (NPL) リベリア国民党"
 LIB.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (RULP) リベリア改革統一党"
 LIB.neutral_Social_icon: "£LIB_neutral_Social_small"
 LIB.Nat_Populism: "£LIB_Nat_Populism_small (LP) 自由党"
 LIB.Nat_Populism_icon: "£LIB_Nat_Populism_small"
 LIB.Nat_Fascism: "£LIB_Nat_Fascism_small (NPP) 国民愛国党"
 LIB.Nat_Fascism_desc: "ナショナリズム - 国民愛国党は、チャールズ・テイラー率いる反政府勢力「国民愛国戦線」の政治的後継組織である。同党は主にテイラーの支持者たちの集まりとして機能しており、実質的な党綱領は存在しない。テイラーの「政策」は、主にリベリアおよび近隣諸国に対する支配の確立を目的としている。"
 LIB.Nat_Fascism_icon: "£LIB_Nat_Fascism_small"
 BAL.Neutral_Autocracy_icon: "£BAL_neutral_autocracy"
 DAR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small ジャンジャウィード"
 DAR.Neutral_Muslim_Brotherhood_desc: "アラブの利益 - ジャンジャウィード（アラビア語ローマ字表記：Janjawid）は、ダルフールで活動するアラブ系民兵組織である。サヘル地方出身のアラビア系牧畜民や遊牧民で構成されるこの民兵組織は、ダルフールの反政府勢力との戦闘において、スーダン政府によって正規軍の戦力を補完するために利用されている。"
 DAR.Neutral_conservatism: "£generic_Neutral_conservatism_small (JEM) - Justice and Equality Movement"
 DAR.Neutral_conservatism_desc: "(Islamic democracy) - The Justice and Equality Movement (Arabic: Harakat al-'Adl wal-Musawah) is a group opposing Sudan's government. The group claims to be an ethnically diverse group of tribes, although in reality the majority of members are from the Zaghawa tribe. Many of the founding members are old supporters of Sudan's ruling National Congress Party who felt that the party had neglected Sudan's economy."
 DAR.neutral_Social: "£generic_neutral_Social_small (DLF) - Darfur Liberation Front"
 DAR.neutral_Social_desc: "(Darfuri Interests) - The Darfur Liberation Front (Arabic: Jabhat Tahrir Darfur) is an anti-Sudan resistance group made up of members of the Fur, Zaghawa and Masalit ethnic groups. Tired of the Arabization of Darfur, the group has taken up arms against the government."
 SSU.liberalism: "£generic_liberalism_small (UDF) - United Democratic Front"
 SSU.liberalism_desc: "(Liberalism) - The United Democratic Front is a liberal party. It is the main non-SPLM linked opposition party in the country."
 SSU.Communist-State: "£generic_Communist_State_small (CPSS) - Communist Party of South Sudan"
 SSU.Communist-State_desc: "(Communism) - The Communist Party of South Sudan is the southern branch of the Sudanese Communist Party."
 SSU.anarchist_communism: "£generic_anarchist_communism_small (SANU) - Sudan Africa National Union"
 SSU.anarchist_communism_desc: "(African Nationalism) - The Sudan Africa National Union was formed in 1963 as a way of seeking autonomy for South Sudan from under the Arabic Sudanese government. One of the party's founders, William Deng Nhial, support pan-African democratic socialism as the party fought for the rights of various African ethnic groups in Sudan."
 SSU.Neutral_Autocracy: "£generic_Neutral_Autocracy_small （SPLM） スーダン人民解放運動"
 SSU.Neutral_Autocracy_desc: "新スーダン - スーダン人民解放運動は、南スーダン人の権利を求めて戦うスーダン人民解放軍の政治部門として設立された。当初は、連邦制の原則に基づいて統治される新スーダンの形成を目指していたが、同組織は次第に、北スーダンと南スーダンの完全な分離を支持する姿勢を強めている。"
 SSU.Neutral_conservatism: "£generic_Neutral_conservatism_small (SPLM-DC) - Sudan People's Liberation Movement - Democratic Change"
 SSU.Neutral_conservatism_desc: "(South Sudanese Nationalism) - The Democratic Change is a splinted faction of the SPLM, led by Lam Akol."
 SSU.neutral_Social: "£generic_neutral_Social_small (LPSS) - Labour Party South Sudan"
 SSU.neutral_Social_desc: "(Social Democracy) - The Labour Party of South Sudan is a social democratic party, which aims to build a just and equal South Sudan."
 SSU.Nat_Populism: "£generic_Nat_Populism_small (SSLM) 南スーダン解放運動"
 SSU.Nat_Populism_desc: "南スーダン分離主義 - 南スーダン解放運動は、反スーダン派のスーダン人民解放軍と親スーダン派の南スーダン国防軍の両陣営に属するヌエル族によって1999年に結成された。同組織は公式には、この紛争において中立の立場をとると表明している。同組織は、スーダンが南スーダン領内への襲撃を停止することを条件に、スーダン政府との交渉に応じる用意があると述べている。"
 SSU.Nat_Autocracy: "£generic_Nat_Autocracy_small (SPLA) スーダン人民解放軍"
 SSU.Nat_Autocracy_desc: "軍事政権 - スーダン人民解放軍は、1983年にスーダン軍の一部が反乱を起こしたことを契機に結成された。1986年のクーデター以降、同軍は戦場で次々と勝利を収めるようになった。人民解放軍自体は多くの異なる反政府勢力から構成されており、紛争の中で勢力が陣営を転換する事態も珍しくない。"
 SUD.conservatism: "£generic_conservatism_small (DUP) - Democratic Unionist Party"
 SUD.conservatism_desc: "(Liberal conservatism)- The Democratic Unionist Party (Arabic: al-Hizb al-Ittihadi al-Dimuqrati) is one of the country's twop political parties founded before its independence. The party wants to create a secular, democratically pluralist and mixed economy Sudan, that includes both South Sudan and Sudan proper. The party has not been able to garner significant support after the DUP-aligned president Ahmed al-Mirghani was deposed by Omar al-Bashir's coup in 1989."
 SUD.Neutral_Autocracy: "£generic_Neutral_Autocracy_small (SPLM-N) スーダン人民解放運動 - 北部"
 SUD.Neutral_Autocracy_desc: "新スーダン - スーダン人民解放運動 - 北部（アラビア語ローマ字表記：Harakat al-Sha'abia li-Tahrir al-Sudan-al-Shamal）は、南スーダンの独立を求めて戦うスーダン人民解放運動の北部支部である。"
 SUD.Neutral_conservatism: "£generic_Neutral_conservatism_small (NUP) - National Umma Party"
 SUD.Neutral_conservatism_desc: "(Islamic democracy) - The National Umma Party (al-Hizb al-Umma al-Qawmmy) is along with the DUP one of Sudan's oldest parties. The party aims to create a democratic Sudan based on Islamic principles."
 SUD.neutral_Social: "£generic_neutral_Social_small (SCP) - Sudanese Congress Party"
 SUD.neutral_Social_desc: "(Social democracy) - The Sudanese Congress Party (al-Hizb al-Mutamar al-Sudani) is one of the more active opposition parties in Sudan. The party wants to create a secular and democratic Sudan. They opposed Gaafar Nimeiry's dictatorship as well as al-Bashir's government."
 SUD.Monarchist: "£generic_Monarchist_small ムハンマド・アリー朝"
 SUD.Monarchist_desc: "君主制 - 統治の最後の2年間、エジプトの王たちは、当時エジプトとイギリスの両方によって共同統治されていた（ただし実際にはイギリスによって完全に支配されていた）スーダンに対するエジプトの主張を強化するために、「エジプトとスーダンの王」という称号を採用した。どの国もこの称号へのスーダンの追加を正式に認めることはなかった。"
 SOV.Autocracy_1: "£SOV_congress_obshin (CRC) ロシア人共同体会議"
 SOV.Autocracy_1_icon: "£SOV_congress_obshin"
 SOV.Autocracy_1_desc: "左派保守主義 - ロシア人共同体会議（ロシア語ローマ字表記：Congress Russkih Obshin）\n\n ロシア人コミュニティ会議は、ソ連崩壊後の諸国におけるロシア人ディアスポラの利益を守る組織として 1993 年に設立された。その後、CRC は政党へと変貌し、その大統領候補であるアレクサンダー・レベドは、大統領選挙の第一回投票で 16% の得票を獲得した。同党はロシア人の権利を擁護し、社会プログラムの拡充を支持している。"
 SOV.Neutral_conservatism_desc: "国民保守主義 ｰ 人民の意志（ロシア語ローマ字表記：Narodnaya Volya）\n\n 人民の意志は、退役軍人かつ政治家のセルゲイ・ババウリンによって設立された政党である。同党は、アレクサンダー・ルツコイやニコライ・レオノフなど、かつての反エリツィン派や愛国者たちを集めた。人民の意志は、愛国主義、ロシア民族主義、ナショナリズムの思想を支持している。"
 SOV.Neutral_conservatism_1_desc: "国民保守主義 ｰ 人民連合（ロシア語ローマ字表記：Narodnaya Soyuz）\n\n 人民連合は、退役軍人かつ政治家のセルゲイ・ババウリンによって設立された政党である。同党は、アレクサンダー・ルツコイやニコライ・レオノフなど、かつての反エリツィン派を集めた。人民連合は、愛国主義、ロシア民族主義、ナショナリズムの思想を支持している。"
 SOV.Neutral_conservatism_2_desc: "国民保守主義 ｰ ロシア全人民連合（ロシア語ローマ字表記：Rossiyskiy Obshenarodnyy Soyuz）\n\n ロシア全人民連合は、退役軍人かつ政治家のセルゲイ・ババウリンによって設立された政党である。同党は、アレクサンダー・ルツコイやニコライ・レオノフなど、かつての反エリツィン派を集めた。ロシア全人民連合は、愛国主義、ロシア民族主義、ナショナリズムの思想を支持している。"
