l_simp_chinese:
 lithuania.1.t: "马热基艾石油问题"
 lithuania.1.d: "立陶宛唯一的炼油厂马热基艾炼油厂已成为地缘政治的焦点。波兰能源巨头奥伦和一家俄罗斯财团都表示有意收购该炼油厂。尽管代价高昂，但将其保留在国家手中仍然是一个选择。"
 lithuania.1.a: "出售给奥伦"
 lithuania.1.b: "出售给俄罗斯财团"
 lithuania.1.c: "保持它的国有化地位"
 lithuania.2.t: "奥伦收购立陶宛炼油厂"
 lithuania.2.d: "奥伦已完成对立陶宛马热基艾炼油厂的收购，扩大了波兰在波罗的海地区的能源利益。"
 lithuania.2.a: "这是一笔划算的投资"
 lithuania.3.t: "马热基艾炼油厂失火"
 lithuania.3.d: "马热基艾炼油厂发生可疑火灾。火灾发生的时间恰好在炼油厂出售给俄罗斯方面之后不久，这引发了人们对蓄意破坏的猜测，也引发了人们对立陶宛能源基础设施安全的担忧。"
 lithuania.3.a: "把矛头指向莫斯科"
 lithuania.3.b: "展开秘密调查"
 lithuania.10.t: "伊格纳利纳的未来"
 lithuania.10.d: "欧盟要求立陶宛关闭伊格纳利纳核电站，该电站拥有两座石墨慢化沸水反应堆 - 与切尔诺贝利事故的核反应堆设计相同。关闭核电站是加入欧盟的条件之一，但伊格纳利纳核电站供应着立陶宛大部分电力。一座替代电站可以与波兰和波罗的海国家联合建设。"
 lithuania.10.a: "与邻居协商共同更换。"
 lithuania.10.b: "保持伊格纳利纳运行"
 lithuania.10.c: "关闭它，无需更换"
 lithuania.11.t: "立陶宛核能合作提案"
 lithuania.11.d: "立陶宛提议波兰共同出资建设维萨吉纳斯核电站，以取代老旧的伊格纳利纳核电站。该项目将增强波罗的海地区的能源独立性，并深化区域联系，但需要大量投资。"
 lithuania.11.a: "同意共同出资开展该项目"
 lithuania.11.b: "我们还有其他优先事项。"
 lithuania.12.t: "波兰同意进行核合作"
 lithuania.12.d: "波兰已同意共同出资建设维萨吉纳斯核电站。虽然该项目需要数年时间才能完成并需要大量资源，但建设工作可以开始。"
 lithuania.12.a: "工程开始"
 lithuania.13.t: "波兰拒绝核合作"
 lithuania.13.d: "波兰拒绝参与维萨吉纳斯项目。立陶宛现在必须自行决定伊格纳利纳的命运。"
 lithuania.13.a: "尽管存在风险，也要继续运营伊格纳利纳。"
 lithuania.13.b: "关掉它 - 没有它我们也能应付。"
 lithuania.14.t: "维萨吉纳斯核电站公投"
 lithuania.14.d: "经过多年的建设，维萨吉纳斯核电站项目面临全民公投。公众舆论对此存在分歧：一部分人认为该项目对能源安全至关重要，而另一部分人则担忧核安全和成本超支问题。"
 lithuania.14.a: "人们赞成这家电厂"
 lithuania.14.b: "民众拒绝该项目"
 lithuania.15.t: "维萨吉纳斯核电站竣工"
 lithuania.15.d: "立陶宛-波兰联合维萨吉纳斯核电站已投入运营。该项目是波罗的海能源合作及区域摆脱对俄气依赖的里程碑性项目。"
 lithuania.15.a: "合作的胜利"
 lithuania.16.t: "国际社会对伊格纳利纳施加压力"
 lithuania.16.d: "欧盟已就立陶宛继续运营伊格纳利纳核电站发出正式警告。如果这些类似切尔诺贝利的反应堆不关闭，欧盟将面临制裁和取消结构性资金的处罚。"
 lithuania.16.a: "我们别无选择 - 关闭它。"
 lithuania.16.b: "抵抗压力"
 LIT_refinery_sale_revenue: "炼油厂销售收入"
 LIT_refinery_sale_revenue_desc: "出售马热基艾炼油厂所得收益为国家预算提供了暂时的提振。"
 LIT_russian_energy_leverage: "俄罗斯能源杠杆"
 LIT_russian_energy_leverage_desc: "立陶宛唯一一家炼油厂被出售给俄罗斯方面，使莫斯科获得了对立陶宛能源政策的经济影响力。"
 LIT_nationalized_refinery: "国有化炼油厂"
 LIT_nationalized_refinery_desc: "立陶宛保留了马热基艾炼油厂的国有所有权，以牺牲运营效率为代价确保了资源安全。"
 LIT_energy_deficit: "能源赤字"
 LIT_energy_deficit_desc: "伊格纳利纳核电站关闭后没有替代电站，导致立陶宛不得不依赖昂贵的能源进口。"
 LIT_visaginas_nuclear_plant: "维萨吉纳斯核电站"
 LIT_visaginas_nuclear_plant_desc: "新建的维萨吉纳斯电厂提供清洁、可靠的能源，是波罗的海地区合作的象征。"
 lithuania_news.1.t: "马热基艾炼油厂被出售"
 lithuania_news.1.d_poland: "立陶宛已将其唯一的炼油厂马热基艾炼油厂出售给波兰能源巨头奥伦。这笔交易加深了波罗的海国家与波兰之间的经济联系，布鲁塞尔方面将其视为降低该地区对俄罗斯能源依赖的一步。"
 lithuania_news.1.d_russia: "立陶宛已将其唯一的炼油厂马热基艾炼油厂出售给一家俄罗斯支持的财团。批评人士警告称，这笔交易使莫斯科获得了对立陶宛能源基础设施的战略影响力。"
 lithuania_news.1.a: "我们能源未来的基石"
 lithuania_news.1.b: "进军波罗的海市场，令人欣喜。"
 lithuania_news.1.c: "该地区又向前迈进了一步"
 lithuania_news.1.d: "波罗的海国家的能源安全形势正在发生变化"
 lithuania_news.1.e: "欧洲能源政治中的一个脚注"
 lithuania_news.2.t: "伊格纳利纳核电厂关闭"
 lithuania_news.2.d: "立陶宛已关闭伊格纳利纳核电站，完成了最后一座苏联时期石墨慢化沸水反应堆的退役。此次关闭满足了立陶宛加入欧盟的一项关键要求，但也使该国在找到替代能源之前依赖能源进口。"
 lithuania_news.2.a: "灯光依旧 - 无论如何"
 lithuania_news.2.b: "欧洲核安全取得胜利"
 lithuania_news.2.c: "这世上少了一个反应堆。"
 lithuania_news.3.t: "维萨吉纳斯核电站竣工"
 lithuania_news.3.desc: "立陶宛新建的维萨吉纳斯核电站已投入运营，该电站由波兰共同出资建设。该设施恢复了立陶宛的能源自给自足能力，标志着波罗的海地区合作取得了里程碑式的成就。"
 lithuania_news.3.a: "终于实现能源独立"
 lithuania_news.3.b: "我们在该地区的投资获得了回报"
 lithuania_news.3.c: "波罗的海能源政策的新篇章"
 lithuania_news.3.d: "波罗的海三国确保能源未来"