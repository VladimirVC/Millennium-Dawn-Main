 UKR_gassov_cheaper_tt: "Ucrania paga por nuestros recursos energéticos: $§G0.100§!\n"
 UKR_neutrality_neutral_social_are_in_coalition_TT: "El SPU no está en una coalición"
 UKR_idea_pro_ukraine_reform_1: "Gobierno reformado."
 UKR_west_east_rivalry_balanced: "Entre el Este y el Oeste \n§LEl estado actual de la rivalidad:§! §GBalanceado§!\n"
 UKR_west_east_rivalry_balanced_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_strengthened: "Between East and West \n§LCurrent rivalry status:§! §GMoving towards West§!\n"
 UKR_west_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_dominant: "Entre el Este y el Oeste \n§LEl estado actual de la rivalidad:§! §GPro-Occidental§!"
 UKR_west_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_strengthened: "Entre el Este y el Oeste \n§LEl estado actual de la rivalidad:§! §GMoviéndose hacia el Este§!\n"
 UKR_east_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_dominant: "Entre el Este y el Oeste \n§LEl estado actual de la rivalidad:§! §GPro-Oriental§!"
 UKR_east_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_idea_orthodox_christian_church: "Iglesia Ortodoxa Ucraniana"
 UKR_idea_shortened_general_staff: "Estado Mayor General Compacto"
 ukraine_coup.1.t: "Rusia Intentó Darnos un Golpe de Estado!"
 ukraine_coup.1.d: "El último informe de Kiev indica que agentes apoyados por Rusia estaban a punto de darnos un golpe de estado. Esto es una amenaza directa a nuestra independencia por parte de Rusia!"
 ukraine_coup.1.a: "Bastards."
 ukraine_coup.2.t: "Rusia Nos Dio un Golpe de Estado!"
 ukraine_coup.2.d: "El último informe de Kiev indica que agentes apoyados por Rusia dieron un golpe de estado a nuestro gobierno. Ahora nuestro país será gobernado por una camarilla de establecimientos pro-rusos!"
 ukraine_coup.2.a: "¿WTF?"
 UKR_war_on_donbass_experience: "Nuestro Ejército"
 UKR_war_on_donbass_experience_desc: "The Ukrainian Army is literally a shadow of its former Soviet, and now Russian, counterpart. It is time to change that."
 UKR_ukrainian_armed_forces_reform: "Reforma de las Fuerzas Armadas"
 UKR_ukrainian_armed_forces_reform_desc: "Our armed forces urgently need reform. We must create new structures and new types of troops, and solve the old problems of our army."
 UKR_contract_army: "Reforma de la Educación Militar"
 UKR_contract_army_desc: "We will reorganize the old military universities, as well as create new ones, to improve the quality of our armed forces."
 UKR_ter_oborona: "Crear Defensa Territorial"
 UKR_ter_oborona_desc: "We need more different units to protect our homeland. We will begin the creation of Ukrainian Territorial Defense so that every region is protected."
 UKR_create_sso: "Crear Fuerzas de Operaciones Especiales de Ucrania"
 UKR_create_sso_desc: "The new military structure will help to fight our enemies more effectively."
 UKR_cut_down_the_general_staff: "Reducir el Número de Generales"
 UKR_cut_down_the_general_staff_desc: "Too many generals negatively affect our army, it's time to fix it."
 UKR_dshv_create: "Fuerzas de Asalto Aéreo"
 UKR_dshv_create_desc: "We will separate Air Assault Forces from the ground forces into a separate unit with its own command and structure, thereby increasing their effectiveness."
 UKR_command_create: "El Mando de las Fuerzas Unidas"
 UKR_command_create_desc: "The Command of the United Forces of the Armed Forces of Ukraine is the military management body of the Armed Forces of Ukraine, between groups of troops to conduct various military operations. He is also responsible for conducting peacekeeping missions outside Ukraine."
 UKR_delta: "El Delta"
 UKR_delta_desc: "The Ukrainian system of information support for decisions and situational awareness on the battlefield has access to the program for active military personnel who have passed verification. Login is carried out via the Internet through authorization and two-factor authentication on a special website.\n\nAuthorized users can view and enter data on known enemy positions, spotted enemy aircraft, ground equipment, and more."
 UKR_national_guard: "Revivir la Guardia Nacional"
 UKR_national_guard_desc: "The National Guard was disbanded under President Kuchma, but now the situation requires us to revive it. We will reorganize it from the internal troops of the Ministry of Internal Affairs."
 UKR_azov: "Crear Batallón Azov"
 UKR_azov_desc: "Let's take a chance and let them join the ranks of our armed forces."
 UKR_donbass: "Crear Batallón Donbass-Ucrania"
 UKR_donbass_desc: "Another team, created from volunteers, comes to our service."
 UKR_reform_mvd: "Reforma del Ministerio del Interior"
 UKR_reform_mvd_desc: "We will carry out a global reform in the Ministry of Internal Affairs."
 UKR_found_the_national_police: "Servicio de Patrulla de Propósito Especial de la Policía"
 UKR_found_the_national_police_desc: "The Patrol Service of the Special Purpose Police of Ukraine is a service within the Patrol Police Department of Ukraine within the National Police of Ukraine, which was created as part of the Ministry of Internal Affairs of Ukraine as a structure of special forces for the protection of public order.\n\nThe structure became part of the National Police of Ukraine. The service combines former battalions and regiments of the Ministry of Internal Affairs."
 UKR_found_the_kord: "Unidad Especial CORD"
 UKR_found_the_kord_desc: "El Cuerpo de Acción Operativa y Repentina, o la unidad CORD, es una unidad de propósito especial en la Policía Nacional de Ucrania. Está diseñada para resolver situaciones de emergencia cuyo nivel es tan alto y complejo que puede exceder las capacidades de las fuerzas de respuesta rápida o las unidades de búsqueda operativa."
 UKR_found_the_uop: "Reforma del Complejo Militar-Industrial"
 UKR_found_the_uop_desc: "Nuestra industria de defensa está en un estado lamentable, por lo que nos vemos obligados a comenzar una reforma global en esta área."
 UKR_defend_our_sky: "Revivir la Industria de Aviación"
 UKR_defend_our_sky_desc: "Comenzaremos el resurgimiento de nuestra industria de aviación, que ha estado en un estado terrible desde el colapso de la URSS."
 UKR_srdsc_desc: "El Centro Estatal de Investigación y Diseño de Construcción Naval es una oficina de diseño especializada en construcción naval y ubicada en Mykolaiv, Ucrania. Forma parte de la corporación estatal Industrias de Defensa de Ucrania."
 UKR_oplit: "Centro Estatal de Investigación y Diseño de Construcción Naval"
 UKR_oplit_desc: "The T-84 is a Ukrainian main battle tank, based on the Soviet T-80 MBT introduced in 1976, specifically the diesel engine version: T-80UD. The T-84 was first built in 1994 and entered service in the Ukrainian Armed Forces in 1999.\n\nIts high-performance opposed-piston engine makes it a fast tank, comparable to other modern MBTs with a power-to-weight ratio of about 26 horsepower per tonne."
 UKR_sapsan: "Hrim-2"
 UKR_sapsan_desc: "Ukrainian short-range ballistic missile system being developed by KB Pivdenne and PA Pivdenmash, designed to combine the features of a tactical missile system and a multiple rocket launcher.\n\nThe original Sapsan version of the missile, for Ukraine's own use, was to have a range of 500 kilometers. The later Hrim-2 version, developed for export, has a range limited to 280 kilometers, in order to fall within the 300-kilometre limit set by the Missile Technology Control Regime, which seeks to limit the proliferation of missiles and missile technology."
 UKR_dissolved_parliament: "Parlamento Disuelto"
 UKR_dissolved_parliament_desc: "The Parliament has been dissolved, and representation is no longer active within the nation.\n§W------------------§!\nThis national spirit  will be §RRemoved§! if we re-instate elections."
 UKR_russia_help_battalions: "Batallones de Apoyo Ruso"
 UKR_oup: "Ukroboronprom"
 UKR_oup_desc: "The Ukrainian industry needs to be revived and quickly. But to do this, we structure all our enterprises into one concern."
 UKR_srdsc: "Centro Estatal de Investigación y Diseño de Construcción Naval"
 civilwar_after: "Ocurrió la Guerra Civil!"
 UKR_aidar_created_tt: "Se creará el batallón §YAidar§!"
 UKR_donbass_created_tt: "Se creará el batallón §YDonbass-Ucrania§!"
 UKR_azov_created_tt: "Se creará §YAzov§!"
 UKR_uda_created_tt: "Se creará el §YEjército de Voluntarios de Ucrania§!"
 UKR_tro_created_tt: "Podrás reclutar §Ybrigadas de defensa territorial§!"
 UKR_natguard_created_tt: "Podrás reclutar §Ybrigadas de la Guardia Nacional§!"
 UKR_win_elections_TT: "Nuestro §HBloque§! §Gganará§! las §HElecciones§!"
 UKR_lose_elections_TT: "Nuestro §HBloque§! §Rperderá§! las §HElecciones§!"
 UKR_presidential_decisions_only_one_is_available_TT: "Solo una de estas decisiones puede tomarse al mismo tiempo."
 UKR_parliament_block_tt: "Esta §HLey§! debe ser §HAprobada§! por la §HVerkhovna Rada§!"
 UKR_free_parliament_TT: "Reinstaurará §CElecciones Libres§! en el §HParlamento§!"
 UKR_verkhovna_rada: "Rada Suprema"
 UKR_verkhovna_rada_desc: "\n\n\n\n\n\n£UKR_desctext_rada\n\n\n\n\n\n\n\n\nLa §HVerkhovna Rada§! [UKR.GetFlag] es nuestro parlamento nacional y dicta qué leyes se aprueban y se derogan, lo que significa que a menudo pueden ir en contra de nuestras propias necesidades. La §HVerkhovna Rada§! puede estar en uno de 3 estados en cualquier momento. §CLibre§!, lo que significa que no tenemos control directo sobre la §HVerkhovna Rada§!, §CInfluenciada§!, lo que significa que tenemos algo de control, y §CTítere§!, lo que significa que tenemos control total.\n\nLa §HVerkhovna Rada§! puede retirar su apoyo a nuestro gobierno si rechazamos §Hciertas propuestas§! que tienen o si cambiamos a una §Hperspectiva que no esté estrechamente alineada con la suya§!. También pueden retirar su apoyo aleatoriamente si así lo desean.\n\nCuanto más apoyo tengamos, mejor, ya que aumenta la probabilidad de que podamos aprobar leyes sin tener que tomar medidas adicionales. La §HVerkhovna Rada§! celebrará elecciones y el resultado estará basado en la influencia de naciones extranjeras o en nuestra propia independencia interna.\n\n§G[?UKR_verkhovna_support]§!/§H450§! escaños de la §HVerkhovna Rada§! actualmente apoyan a nuestro gobierno\n"
 ukraine_nationalist_majority_name: "§HMayoría Pro-Ucrania§!"
 UKR_right_wing_desc_TT: "Una §HMayoría Pro-Ucrania§! en el parlamento significa que el Parlamento busca un mayor distanciamiento tanto de §COccidente§! como de los §Rusos§!. Buscan una §HUcrania§! más independiente y neutral en los asuntos mundiales y, en general, están en contra de tomar partido en cualquier conflicto."
 ukraine_eastern_majority_name: "§GMayoría Pro-Rusa§!"
 UKR_left_wing_desc_TT: "El bloque §GPro-Ruso§! en el Parlamento generalmente busca mayores lazos con el gobierno §Gruso§!, deseando distanciarse de las potencias §COccidentales§!. La radicalización varía dentro de este bloque, ya que algunos desean mantener una §HUcrania§! independiente con lazos §GPro-Rusos§!, y otros desean una mayor integración de las sociedades §Hucraniana§! y §Grusa§!."
 ukraine_western_majority_name: "§BMayoría Pro-Occidental§!"
 UKR_liberal_TT: "El bloque §BPro-Occidental§! dentro del parlamento representa a los partidos e individuos que quieren que §HUcrania§! abandone sus políticas Pro-Rusas y abrace mayores lazos con las potencias §COccidentales§!. Los objetivos de aquellos que se alinean con §COccidente§! varían mucho, desde algunos que solo desean lazos económicos y culturales, hasta otros que desean unirse a la alianza §BNATO§! y proteger a §HUcrania§! de la influencia §Grusa§!."
 ukraine_dissolved_majority_name: "§RVerkhovna Rada Disuelta§!"
 UKR_verkhovna_dissolved_tt: "El parlamento ha sido destituido y la sala está vacía sin representantes presentes."
 ukraine_free_verkhovna: "§CEstado de la Verkhovna Rada: Libre§!"
 UKR_verkhovna_free_tt: "El Parlamento está libre de la influencia del Presidente, y las discusiones y debates progresan orgánicamente sin la intervención de otro órgano gubernamental."
 ukraine_influenced_verkhovna: "§pEstado de la Verkhovna Rada: Influenciada§!"
 UKR_verkhovna_influenced_tt: "El gobierno se ha reformado de tal manera que el Parlamento se ha vuelto fácilmente explotable, y el gobierno del presidente puede influir fácilmente en la discusión cuando el parlamento está en sesión."
 ukraine_puppeted_verkhovna: "§OEstado de la Verkhovna Rada: Títere§!"
 UKR_verkhovna_puppetted_tt: "El Parlamento es solo otra herramienta más para que el Presidente y su gabinete engañen a la gente con una falsa sensación de representación."
 UKR_bureau_open: "Iniciar el Debate sobre el §YGasto en Burocracia§!"
 UKR_bureau_close: "Finalizar el Debate sobre el §YGasto en Burocracia§!"
 UKR_increase_bureu: "Solicitar un Mayor Gasto en Burocracia"
