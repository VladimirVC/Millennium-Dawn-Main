 NKO_international_sanctions_idea: "Sanciones del CSNU"
 NKO_international_sanctions_idea_desc: "Las sanciones internacionales contra Corea del Norte tienen como objetivo su economía, comercio y desarrollo militar en respuesta a sus ambiciones nucleares y preocupaciones sobre derechos humanos. Estas sanciones restringen el acceso a divisas extranjeras, tecnología avanzada y recursos críticos, con el objetivo de presionar al régimen para que se desnuclearice, al mismo tiempo que afectan significativamente a su población y estabilidad económica."
 NKO_hermit_kingdom_desc: "North Korea has been an isolated state ever since its creation. Despite being one of the poorest countries in the world, the country still manages to maintain one of the largest militaries in the world. The Kim family has been in power for more than 50 years with practically no internal opposition. The Hermit Kingdom of North Korea is an unexplainable anomaly among countries.\n\n§RThis national spirit will be removed if the Kim family is no longer in power!§!"
 NKO_closed_nation: "Gobierno Totalitario"
 NKO_closed_nation_desc: "Para preservar la estabilidad de la nación y mantener nuestra soberanía nacional, hemos restringido completamente el acceso a internet y ejercemos un control directo sobre todas las demás formas de medios. La disidencia no puede ser tolerada."
 korea_russia.1.t: "Base Militar Rusa"
 korea_russia.1.d: "El gobierno ruso ofrece colocar su base militar en nuestro territorio. Para nosotros, esto será una excelente garantía de protección contra los ataques de nuestros vecinos agresivos, además, solo mejorará nuestra cooperación con Rusia."
 korea_russia.1.a: "Estamos de Acuerdo"
 korea_russia.1.b: "No Lo Necesitamos."
 korea_russia.2.t: "Aceptaron la Oferta"
 korea_russia.2.d: "El gobierno ha aceptado nuestra propuesta. Esto nos hace muy felices y ayuda a fortalecer nuestra relación."
 korea_russia.2.a: "Bien"
 korea_russia.3.t: "Rechazaron la Oferta"
 korea_russia.3.d: "El gobierno ruso ha rechazado nuestra generosa oferta. Tal vez piensen mejor la próxima vez.."
 korea_russia.3.a: "Triste"
 korea_russia.4.t: "Planta de Energía Nuclear en Corea del Norte"
 korea_russia.4.d: "El gobierno norcoreano quiere obtener un contrato con nuestro ROSATOM para la construcción de una planta en su territorio, esto es un paso importante para nosotros, porque no podemos dar energía nuclear a todos."
 korea_russia.4.a: "Les Construiremos una Planta."
 korea_russia.4.b: "No"
 korea_russia.5.t: "Planta de Energía Nuclear en Corea del Norte"
 korea_russia.5.d: "El gobierno ruso ha aceptado dar permiso a Rosatom para construir una planta de energía nuclear en nuestro territorio, es hora de comenzar!"
 korea_russia.5.a: "El átomo norcoreano debería entrar en una nueva era."
 korea_russia.6.t: "Equipo Nuevo"
 korea_russia.6.d: "El Estado Mayor ruso está dispuesto a suministrar a nuestro ejército su nuevo equipamiento \"Ratnik\", que mejorará las características de combate de nuestra infantería."
 korea_russia.6.a: "Gloria a las Armas Rusas y Norcoreanas!"
 korea_russia.7.t: "Gasoducto Norcoreano"
 korea_russia.7.d: "Corea del Norte quiere reanudar el proyecto del gasoducto coreano, pero con la estación final en Corea del Norte misma. Esto fortalecerá la independencia de recursos de Corea de otros países, y obtendremos otra palanca de influencia sobre ellos."
 korea_russia.7.a: "Es Hora de Construir un Gasoducto"
 korea_russia.7.b: "Este Proyecto no es Rentable para Nosotros"
 korea_russia.8.t: "Tratado de Asociación Estratégica Integral"
 korea_russia.8.d: "Corea del Norte fue creada por la Unión Soviética hace mucho tiempo, y fue apoyada por ella hasta su colapso, pero ahora que la política exterior de Rusia ha cambiado, Corea ya no esperaba nuestra ayuda, pero las circunstancias actuales los han obligado a volverse hacia nosotros nuevamente."
 korea_russia.8.a: "Firmaremos un Nuevo Tratado"
 korea_russia.8.b: "No"
 korea_russia.9.t: "Tratado de Asociación Estratégica Integral"
 korea_russia.9.d: "Rusia ha aceptado firmar el acuerdo propuesto a nosotros. Tal vez ahora el equilibrio de poder en la península coreana cambie a nuestro favor!"
 korea_russia.9.a: "¡Hurra!"
 korea_russia.10.t: "Tratado de Asociación Estratégica Integral"
 korea_russia.10.d: "Rusia ha aceptado firmar el acuerdo propuesto a nosotros. Tal vez ahora el equilibrio de poder en la península coreana cambie a nuestro favor!"
 korea_russia.10.a: "Hurra!"
 korea_russia.11.t: "Tratado de Asociación Estratégica Integral"
 korea_russia.11.d: "Corea del Norte fue creada por la Unión Soviética hace mucho tiempo, y fue apoyada por ella hasta su colapso, pero ahora que la política exterior de Rusia ha cambiado, Corea ya no esperaba nuestra ayuda, pero las circunstancias actuales los han obligado a volverse hacia nosotros nuevamente."
 korea_russia.11.a: "Firmaremos un Nuevo Tratado"
