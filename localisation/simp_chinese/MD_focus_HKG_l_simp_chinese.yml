l_simp_chinese:
 hong_kong_focus: "香港策略树"
 HKG_combat_vested_interests: "打击既得利益者"
 HKG_combat_vested_interests_desc: "新年已至，万象更新。千禧年的到来，为香港带来了新的未来。"
 HKG_take_on_heung_ye_kuk: "挑战乡议局"
 HKG_take_on_heung_ye_kuk_desc: "乡议局是旧时英国统治新界的产物，较其他地区有超越性的独立性，我们必须加强对乡议局的管控，确保我们的政策真正落到实处。"
 HKG_repeal_small_house_policy: "废除丁屋政策"
 HKG_repeal_small_house_policy_desc: "丁屋政策是封建时代的政策，早已无法满足香港目前住房短缺的现状，必须废除。"
 HKG_reform_heung_yee_kuk: "改革乡议局"
 HKG_reform_heung_yee_kuk_desc: "新界离不开乡议局，但它需要进行改革，以便更响应我们的要求。"
 HKG_dissolve_heung_yee_kuk: "解散乡议局"
 HKG_dissolve_heung_yee_kuk_desc: "乡议局对新界的控制是回归前地主制度的最后残余。解散乡议局是使新界置于妥善行政管理之下的唯一途径。"
 HKG_take_on_politicians: "挑战政治家"
 HKG_take_on_politicians_desc: "香港政府里仍然充斥着旧时的官僚，要稳定政权，就必须铲除他们。"
 HKG_ensure_autonomy_of_ICAC: "确保廉政公署的自主权"
 HKG_ensure_autonomy_of_ICAC_desc: "香港廉政公署是香港的中央机关之一。加强其免受政治干预的独立性，对于维护法治至关重要。"
 HKG_anti_graft_investigations: "反腐败调查"
 HKG_anti_graft_investigations_desc: "廉政公署将秉持公正无私的原则，彻查政治贪污案件。多名在任官员可能面临棘手的质询。"
 HKG_take_on_triads: "挑战三合会"
 HKG_take_on_triads_desc: "三合会一直是香港稳定的主要隐患。虽然城市的黑暗永远无法消除，但我们必须至少将其控制在最低限度。"
 HKG_increase_funding_for_OCTB: "增加对有组织罪案及三合会调查科的资助"
 HKG_increase_funding_for_OCTB_desc: "有组织犯罪和三合会调查局的预算大幅增加。外勤人员、监控设备和分析能力均得到提升。"
 HKG_step_up_police_raids: "安排警方突袭"
 HKG_step_up_police_raids_desc: "在三合会控制的地区展开协同突袭，将逮捕嫌疑人、没收资产并摧毁犯罪网络。三合会肯定会调整策略，但目前街头秩序暂时恢复了平静。"
 HKG_crack_down_on_WSW_triad: "严厉打击三合会社团和胜和"
 HKG_crack_down_on_WSW_triad_desc: "和胜和是三大三合会中最古老的组织，它正面临着对其卖淫团伙和码头敲诈勒索网络的持续打击。"
 HKG_crack_down_on_SYO_triad: "严厉打击三合会社团新义安"
 HKG_crack_down_on_SYO_triad_desc: "新义安组织成员众多，是人口贩卖、赌博和街头敲诈勒索等犯罪活动的打击目标。"
 HKG_crack_down_on_14K_triad: "严厉打击三合会社团14K"
 HKG_crack_down_on_14K_triad_desc: "臭名昭著的14K贩毒集团将面临专门打击毒品走私的专案组。预计九龙地区将出现逮捕行动，毒品供应链也将遭到破坏。"
 HKG_crack_down_on_Luen_group_triad: "严厉打击三合会社团联字头"
 HKG_crack_down_on_Luen_group_triad_desc: "联字头集团对非法赌博的垄断将被打破。全市各地的地下赌场遭到突袭。"
 HKG_divided_hong_kong: "分裂的香港"
 HKG_divided_hong_kong_desc: "香港在英国统治的最后几年留下了多元民主的遗产。但这同时也导致了建制派、民主派和本土派之间无休止的争论，反而降低了行政效率。这不禁让人质疑，这种混乱的“民主”真的像人们所说的那样好吗？"
 HKG_support_pro_beijing_camp: "支持亲北京阵营"
 HKG_support_pro_beijing_camp_desc: "“自由并非不重要。但在我们的社会文化中，自由不如稳定重要。” 现在是时候让世界见证一个更加稳定和安全的香港了。"
 HKG_railway_development_strategy_2000: "2000年铁路发展战略"
 HKG_railway_development_strategy_2000_desc: "为了应对人口增长导致的城市道路未来拥堵问题，以及内地与香港之间日益频繁的经济贸易往来带来的运力限制，我们将提出《2000年铁路发展策略》，以指导港铁未来十年的发展规划。"
 HKG_sign_CEPA: "签署《内地与香港关于建立更紧密经贸关系的安排》"
 HKG_sign_CEPA_desc: "《内地与香港关于建立更紧密经贸关系的安排》正式确立了香港与内地之间的优惠贸易准入。这有利于跨境贸易，也是迈向经济相互依存的重要一步。"
 HKG_approve_funding_for_XRL: "批准广深港高速铁路的拨款"
 HKG_approve_funding_for_XRL_desc: "广深港高速铁路将直接连接香港与内地高铁网络。该项目资金雄厚，政治象征意义更为重大。"
 HKG_co_location_bill: "一地两检法案"
 HKG_co_location_bill_desc: "一项备受争议的法案将中国大陆执法管辖权划至西九龙广深港高速铁路枢纽。亲北京阵营称其务实，泛民主派则称其违宪。"
 HKG_electoral_reform: "选举改革"
 HKG_electoral_reform_desc: "《基本法》规定了香港行政长官前两届和立法会前三届的选举方式，但并未规定此后的选举方式。或许我们可以借此机会推动选举制度改革，实现真正的普选。"
 HKG_a_broader_electorate: "更广泛的选民？"
 HKG_a_broader_electorate_desc: "香港的普选无法一蹴而就。虽然我们不能立即实行普选，但可以先请求全国人大常委会扩大选举委员会成员人数，使选举比以往更加民主。"
 HKG_choose_your_own_puppet: "\"选择你自己的傀儡\""
 HKG_choose_your_own_puppet_desc: "香港必须实现普选，但绝不能为了民主而丧失稳定。提名委员会将确保只有真正“爱国爱港”的人才能成为行政长官。"
 HKG_a_new_reform_attempt: "改革新尝试"
 HKG_a_new_reform_attempt_desc: "立法会将再次被要求审议选举改革方案。这次能否通过？还是历史会重演？"
 HKG_support_pan_democrats: "支持泛民主派"
 HKG_support_pan_democrats_desc: "民主和自由已经深深植根于香港人的文化之中，邓小平也承诺不干涉香港的内部事务。我们应该积极参与民主运动，不要让别人夺走香港繁荣的源泉。"
 HKG_keep_to_one_country_two_systems: "保持一国两制"
 HKG_keep_to_one_country_two_systems_desc: "“一国两制”在香港运行顺利。内地和香港都从中得到了他们想要的东西。内地把香港作为“开放”政策的重要组成部分，香港则以“五十年不变”的承诺继续保持香港民众相对于中国其他地区的自由化生活。 显而易见的是，继续维持“一国两制”的运行符合我们的共同利益。"
 HKG_hong_kong_post_2047_status: "香港2047年后的地位"
 HKG_hong_kong_post_2047_status_desc: "尽管邓小平向香港人民承诺，香港的政治经济制度50年不变，但2047年之后的香港会是什么样子，谁也说不准。也许是时候考虑一下香港的未来了……"
 HKG_stick_to_CPC_line: "坚持中国共产党路线"
 HKG_stick_to_CPC_line_desc: "香港将在争议问题上默默地遵循北京的路线。泛民主派会感到愤怒，爱国阵营则会感到欣喜。"
 HKG_loyal_puppet: "'忠诚的傀儡'"
 HKG_loyal_puppet_desc: "泛民主派已经亮出了底牌，街头也表达了他们的愤怒。为了香港的稳定与繁荣，香港必须公开且毫无保留地走上北京规划的道路。过渡到完全一体化的特别行政区不会受欢迎，但这将是最终的结局。"
 HKG_promote_patriotism: "弘扬爱国主义"
 HKG_promote_patriotism_desc: "一代人，从小接受殖民时期教科书和粤语流行文化熏陶，无法保卫祖国。国家安全教育将深入每一间教室、每一个工作场所、每一个广播机构。忠于党就是忠于香港。"
 HKG_patriots_governing: "爱国者治港"
 HKG_patriots_governing_desc: "公务员制度长期以来受制于殖民时代的陋习和隐晦的同情心。审查委员会将对官僚机构进行全面整顿，从地方官员到高级行政人员，用久经考验的爱国者取代那些摇摆不定的人。短期内效率会受到影响，但可靠性不会。"
 HKG_suppress_cantonese_local_culture: "压制粤语本土文化"
 HKG_suppress_cantonese_local_culture_desc: "香港是中国的一部分，而中国就意味着普通话。粤语广播将会受到限制，本土文化节庆活动将会悄然停止资助，文化领域的异议之声将会被封杀。代价将是街头的动荡和家庭的怨恨，但统一的民族文化值得付出这样的代价。"
 HKG_reduce_size_of_LegCo: "缩小立法会规模"
 HKG_reduce_size_of_LegCo_desc: "立法会席位臃肿，充斥着大量区级议席，这些议席沦为反对派作秀的舞台。精简立法会，减少直选席位，扩大功能性选区，才能真正发挥政府的执政作用。“内地人才计划”将通过选拔在北京和深圳接受培训的行政人员来填补空缺。"
 HKG_gong_zyu_ou_integration: "港珠澳一体化"
 HKG_gong_zyu_ou_integration_desc: "香港“一国两制”是中国解决台湾问题的伟大实验，但香港不可能永远保持其独特地位，特别是在这一实验失败之后……"
 HKG_gong_zyu_ou_integration_tt: "如果香港目前是§Y[CHI.GetFlag]§!的属地，则香港特别行政区将被吞并并入粤港澳大湾区。否则，这将完成效忠派的政治联盟，而无需立即移交主权。"
 HKG_support_democracy_in_china: "支持中国的民主"
 HKG_support_democracy_in_china_desc: "香港的民主运动将公开支持内地的改革努力，直接挑战北京的权威。"
 HKG_commemorate_june_fourth: "纪念六月四日"
 HKG_commemorate_june_fourth_desc: "自1990年以来，维多利亚公园每年都会举行悼念活动，而北京每年都带着隐隐的不满注视着这一切。今年，我们正式宣布：这是一场由特区政府批准的公开悼念活动，有烛光、有歌声、有逝者的名字。大陆不会忘记，我们也不会。"
 HKG_inspire_chinese_grassroots_movements: "激励中国基层民主运动"
 HKG_inspire_chinese_grassroots_movements_desc: "香港单凭一己之力无法拯救大陆，但它可以展现中国民主的实践面貌。向珠江三角洲地区公开广播，通过边境口岸走私传单，以及对地下出版物网络的默默资助 - 这些变革的种子，都播撒在了这座中国最自由的城市。"
 HKG_call_on_CPC_to_release_dissidents: "呼吁中共释放异见人士"
 HKG_call_on_CPC_to_release_dissidents_desc: "这些名字早已家喻户晓：刘晓波、王秉章、徐文丽，以及其他数十人。特区政府正式公开要求释放他们。北京当然会拒绝 - 但这一要求将中国政府的监狱问题推上了国际议程。"
 HKG_pro_democracy_media_charter: "亲民主媒体宪章"
 HKG_pro_democracy_media_charter_desc: "新闻自由并非一句口号，而是一项法律制度。《宪章》明确规定了对记者的保护，将政治干预编辑决策定为犯罪，并设立了真正独立于行政部门的公共广播机构。“噤声新闻”的理念已被摒弃。"
 HKG_fund_civil_society: "资助公民社会"
 HKG_fund_civil_society_desc: "政府向非政府组织、社区协会、法律援助机构和民主倡导组织提供公共拨款。财政收入会因此减少，但政治体系会因此更加强大。没有公民社会的民主就像没有听众的论坛。"
 HKG_legco_reform_petition: "立法会改革请愿书"
 HKG_legco_reform_petition_desc: "向北京递交正式请愿书，要求立法会选举实行真正的普选。所有席位均由直接选举产生，废除功能性选区，取消提名委员会。作为第一项让步，以“有限普选”取代了“缺乏普选”的理念。"
 HKG_accountability_for_tiananmen: "天安门事件追责"
 HKG_accountability_for_tiananmen_desc: "我们公布下达命令者的名字，公布执行命令的部队的名字。我们公开香港特区档案馆的资料，支持国际法庭，并扩大幸存者证词的影响力。北京会将此视为对中共的挑衅。但香港民主派人士听到的却是截然不同的信息。"
 HKG_peaceful_democratic_path: "和平民主之路"
 HKG_peaceful_democratic_path_desc: "改革应从内部进行，而非来自外部的对抗。香港巩固民主制度，稳定公民社会，静待内地按照自身节奏进行变革。维多利亚公园的烛光依旧燃烧，但街头依旧平静。下一阶段的改革将从强大的姿态开始。"
 HKG_appease_localists: "安抚本土派"
 HKG_appease_localists_desc: "对本土主义运动的让步：保护粤语、优先雇用本地人、放缓跨境融合项目。"
 HKG_stoke_anti_mainland_sentiment: "激起反大陆情绪"
 HKG_stoke_anti_mainland_sentiment_desc: "中国把所有好处都拿走了，留给香港人的却是高房价、低购买力，香港凭什么留在中国，甘愿做中国的一个小殖民地？"
 HKG_restrict_tourism_immigration: "限制旅游和移民"
 HKG_restrict_tourism_immigration_desc: "对大陆游客实施新的入境限制，并收紧跨境移民规定。当地居民会乐见这种喘息之机；但零售商和开发商则未必如此。"
 HKG_emphasize_hong_kong_identity: "强调香港特色"
 HKG_emphasize_hong_kong_identity_desc: "新加坡成功脱离马来西亚，得益于李光耀先生成功的国家认同意识改革。香港完全有能力采取同样的做法。"
 HKG_distance_from_china: "疏远中国"
 HKG_distance_from_china_desc: "香港，是时候起锚、摆脱中国的控制了……"
 HKG_great_hong_kong_nation: "大香港国"
 HKG_great_hong_kong_nation_desc: "事情已经发生了变化，香港终于实现真正国家独立了。"
 HKG_hong_kong_first: "香港优先"
 HKG_hong_kong_first_desc: "从香港仔的海港到旺角的摩天大楼，香港属于香港人。内地投资、内地劳工、内地影响，都将由本地居民的意愿决定。公民身份是传承，而非可以随意转让的便利。"
 HKG_hong_kong_state_constitution: "新香港国宪法"
 HKG_hong_kong_state_constitution_desc: "《基本法》在北京起草，在伦敦签署，强加给在两地首都均无投票权的香港人民。一部由香港人于中环起草、为香港人服务的新宪法取而代之。过渡已成定局。"
 HKG_armed_forces_of_hong_kong: "香港武装部队"
 HKG_armed_forces_of_hong_kong_desc: "一个无法自卫的国家根本算不上国家。香港防卫军由志愿兵和义务兵组成，将拥有足以守住新界的步兵力量和足以应对任何入侵的海岸警卫队。《基本法》中的军事限制形同虚设。"
 HKG_irredentist_claim_pearl_river: "宣称珠江三角洲"
 HKG_irredentist_claim_pearl_river_desc: "珠江三角洲 - 深圳、广州、珠海 - 在共产党统治之前是广东的，那里的人民与我们之间的共同点远多于与北京的。我们公开主张我们的主权。无论通过谈判还是武力，珠江三角洲终将重获其文化中心。"
 HKG_little_bird_under_british_wing: "英国庇护下的小鸟"
 HKG_little_bird_under_british_wing_desc: "香港脱离中国，不代表她可以独自在世界上生存，我们需要别人的帮助，我们的英国老主人呢？"
 HKG_request_rerule_british_government: "请求英国政府重新统治"
 HKG_request_rerule_british_government_desc: "中英谈判从来都没有满足过香港人留在大英帝国的愿望，这一次，我们会遵从自己的心意。"
 HKG_aukus_intelligence_share: "澳美合作机制框架情报共享"
 HKG_aukus_intelligence_share_desc: "英国、美国和澳大利亚的情报机构长期以来一直对香港保持着低调的兴趣。在澳美合作机制框架下，正式的技术转让和信号合作将香港特别行政区牢牢地纳入了英语世界的安全架构之中。"
 HKG_uk_garrison_rights: "英国驻军权利"
 HKG_uk_garrison_rights_desc: "皇家海军陆战队在昂船洲驻扎了一个象征性的分遣队，皇家海军舰艇在维多利亚港停靠，以及一项使英国能够从友好海岸进入南海的基地协议。驻军规模虽小，但其意义却不容小觑。"
 HKG_commonwealth_realm_ambition: "英联邦国家野心"
 HKG_commonwealth_realm_ambition_desc: "加拿大、澳大利亚、新西兰——这些国家都曾是殖民地，如今都已成为王国，但都仍处于英国王室的统治之下。香港向英联邦政府首脑请愿，希望回归英国，不再作为属地，而是作为一个拥有共同君主的独立王国。香港回归所带来的历史性侮辱，终于得到了长久的回应。"
 HKG_city_state_idea: "城邦国家理念"
 HKG_city_state_idea_desc: "新加坡已经证明这是可行的。一个华人占多数、被大国环绕的城市，如果选择中立和能力而非意识形态，就能作为主权贸易中心生存并繁荣发展。香港将效仿这一模式，而且会做得更好。"
 HKG_revise_basic_law: "修改基本法"
 HKG_revise_basic_law_desc: "《基本法》最初是作为过渡性文件起草的，其中隐含着北京的最终权威。修订后的宪章删除了这些条款，宣示了香港的完全主权，并将香港特区重新构建为一个法治共和国。国防和外交政策现在都属于香港。"
 HKG_pearl_of_east_asia: "东方之珠"
 HKG_pearl_of_east_asia_desc: "摆脱了大陆的束缚和西方的牵绊，这座城市已成为东亚首屈一指的金融和商业中心。资本流经中环，人才涌向湾仔。明珠的光芒超越了上海和新加坡。"
 HKG_global_financial_capital: "全球金融资本"
 HKG_global_financial_capital_desc: "香港交易所作为独立的货币当局，其监管体系旨在吸引那些不信任纽约或伦敦的资本。香港悄然成为亚太地区的金融中心，盈利丰厚，且不可替代。"
 HKG_coastal_defence_doctrine: "海岸防御理论"
 HKG_coastal_defence_doctrine_desc: "一个城邦国家负担不起远洋海军，但它有能力让任何入侵行动都代价高昂。反舰导弹、布雷航道、加固的港口以及以拒止而非投射为核心的战略。香港将变成一只豪猪，而不是一头狮子。"
 HKG_under_lion_rock_hill: "狮子山下"
 HKG_under_lion_rock_hill_desc: "§C既是同舟 在狮子山下且共济\n\n抛弃区分求共对\n\n放开彼此心中矛盾\n\n理想一起去追\n\n同舟人 誓相随\n\n无畏更无惧\n\n同处海角天边\n\n携手踏平崎岖\n\n我哋大家用艰辛努力写下那 \n\n不朽香江名句§!"
 HKG_race_discrimination_bill: "种族歧视法案"
 HKG_race_discrimination_bill_desc: "《基本法》和《香港人权法案条例》保障个人的权利，包括免受种族歧视的权利。我们亦有义务根据《消除一切形式种族歧视国际公约》禁止和消除种族歧视。"
 HKG_LGBT_rights: "LGBT权利"
 HKG_LGBT_rights_desc: "香港LGBT群体等待的时间太长了。政府将研究在现有法律框架内可以采取哪些保护措施和改革措施。"
 HKG_affirm_support_for_christian_organizations: "确认对基督教组织的支持"
 HKG_affirm_support_for_christian_organizations_desc: "基督教组织长期以来在香港社会政策中拥有举足轻重的影响力。它们的咨询作用将得到重申和保护。"
 HKG_reduce_power_of_christian_groups: "削弱基督教团体的力量"
 HKG_reduce_power_of_christian_groups_desc: "基督教组织在社会政策方面的咨询作用将被削弱。世俗咨询程序将扩大以填补这一空白。"
 HKG_consult_public_on_new_law: "就新法律征求公众意见"
 HKG_consult_public_on_new_law_desc: "政府在立法前将进行广泛的公众咨询。这一过程需要时间，但结果将具有民主合法性。"
 HKG_outlaw_anti_LGBT_discrimination: "取缔反LGBT歧视"
 HKG_outlaw_anti_LGBT_discrimination_desc: "针对LGBT群体在工作场所、住房和服务提供方面的歧视将被定为非法行为。预计这将是一场旷日持久的立法斗争。"
 HKG_seek_reform_of_existing_legislation: "寻求现有立法的改革"
 HKG_seek_reform_of_existing_legislation_desc: "我们将查明并改革劳动法、家庭法和租赁法中现有的歧视性条款。"
 HKG_anti_discrimination_reform_package: "反歧视改革方案"
 HKG_anti_discrimination_reform_package_desc: "一项涵盖种族、宗教、性取向、性别认同和残疾等方面的全面反歧视改革。"
 HKG_legalize_gay_marriage: "同性婚姻合法化"
 HKG_legalize_gay_marriage_desc: "香港成为东亚首个全面实现同性婚姻合法化的地区。预计部分人士会为此欢庆，而另一些人士则会强烈反对。"
 HKG_gender_pay_gap: "性别薪酬差距"
 HKG_gender_pay_gap_desc: "所有大型雇主都必须强制报告薪酬差距。公开点名批评能够达到自愿遵守无法达到的效果。"
 HKG_require_greater_transparency_from_employers: "要求雇主提高透明度"
 HKG_require_greater_transparency_from_employers_desc: "员工人数超过一定标准的雇主将被要求每年公布详细的薪酬公平报告。"
 HKG_deny_existence_of_pay_gap: "否认薪酬差距的存在"
 HKG_deny_existence_of_pay_gap_desc: "政府官方立场：现有的薪酬差异反映的是职业选择，而非歧视。无需采取进一步行动。"
 HKG_secondary_school_education_reform: "中学教育改革"
 HKG_secondary_school_education_reform_desc: "中学现行的3-2-2-3旧制将被改革为美国和中国大陆广泛采用的3-3-4制。这项改革不仅将消除一些重叠和过时的课程，还将增加一些更有趣的选修科目。"
 HKG_patriotic_education_curriculum_reform: "爱国主义教育课程改革"
 HKG_patriotic_education_curriculum_reform_desc: "现行香港教育课程缺少爱国主义教育，我们会增设通识教育课程来填补这个空缺。"
 HKG_chinese_based_education_curriculum: "中文教育课程"
 HKG_chinese_based_education_curriculum_desc: "我们首先是中国人，其次我们是香港人。香港所有学校均须以中文授课。所有孩子都应该说中文。"
 HKG_hong_kong_police_force: "香港警察部队"
 HKG_hong_kong_police_force_desc: "香港警队成立于1844年5月1日，是香港特区政府下辖的最大纪律部队。由于驻港解放军行动受限，在其他国家通常由军队履行的职能，在香港则由警队承担。长期以来，香港警队一直被誉为“亚洲最佳警队”。"
 HKG_anti_terrorist_train: "反恐训练"
 HKG_anti_terrorist_train_desc: "新世纪带来了繁荣和机遇，也带来了更多新的挑战。恐怖主义绝不能在香港生根发芽。"
 HKG_purchase_chinese_weapons: "购买中国武器"
 HKG_purchase_chinese_weapons_desc: "用北方工业公司提供的替代枪支取代英国时代的史密斯威森手枪。成本不高，但象征意义重大。"
 HKG_create_CTRU: "成立反恐特勤队"
 HKG_create_CTRU_desc: "反恐特勤队是为应对恐怖活动而设立的快速反应部队。他们将是精英中的精英。"
 HKG_police_system_reform: "警察系统改革"
 HKG_police_system_reform_desc: "香港警队训练、指挥结构和问责机制的现代化。"
 HKG_investigate_police_triad_cooperation_problem: "调查警方与三合会勾结问题"
 HKG_investigate_police_triad_cooperation_problem_desc: "我们可以在三合会中安插卧底，他们也可以。这些内奸提前泄露了我们的很多操作信息。我们会通过廉记和O记的伙计们来抓这些“黑警”。"
 HKG_anti_protest_train: "广泛的防暴训练"
 HKG_anti_protest_train_desc: "针对各种人群管理场景（从和平集会到暴力骚乱）的专门培训。"
 HKG_purchase_anti_riot_armour: "获取防暴装备"
 HKG_purchase_anti_riot_armour_desc: "为警察战术部队配备新型防弹抗冲击装备。"
 HKG_purchase_non_lethal_weapons: "购买非致命武器"
 HKG_purchase_non_lethal_weapons_desc: "催泪瓦斯发射器、橡皮子弹和胡椒球武器，现代人群控制工具套件。"
 HKG_form_elite_team: "组建速龙小队"
 HKG_form_elite_team_desc: "一支专门的反恐应对部队，以海外战术小组为蓝本。"
 HKG_gong_hei_fat_coi: "恭喜发财"
 HKG_gong_hei_fat_coi_desc: "刚刚经历金融风暴、迈入新世纪的[HKG.GetFlag]香港，面临诸多经济、社会问题，如何解决，有待人们的判断。"
 HKG_typhoon_shelter_from_financial_storm: "抵御金融风暴"
 HKG_typhoon_shelter_from_financial_storm_desc: "风暴过去了，是时候收拾残局了。政府将动用外汇储备和干预政策来刺激经济。"
 HKG_merge_into_HKEX: "将香港商品交易所与香港期货交易所合并为香港交易所"
 HKG_merge_into_HKEX_desc: "1997年金融风暴后，我们将允许香港商品交易所及香港期货交易所合并为香港交易及结算所有限公司，以提升香港的竞争力，同时应付经济全球化带来的挑战。"
 HKG_greatest_entrepot: "东亚最大的商业港"
 HKG_greatest_entrepot_desc: "香港长期以来一直是亚洲首屈一指的转口港。扩大港口吞吐能力和提高货物处理效率将有助于其保持这一地位。"
 HKG_expand_Kwai_Tsing_terminals: "扩建葵青码头"
 HKG_expand_Kwai_Tsing_terminals_desc: "葵青港新增集装箱装卸能力。更大的船舶，更快的周转速度，更多货物经由香港运输。"
 HKG_attract_foreign_investment: "吸引外资"
 HKG_attract_foreign_investment_desc: "一系列税收优惠、监管简化和专门的投资者联络服务，旨在吸引海外资本。"
 HKG_european_business: "欧洲生意"
 HKG_european_business_desc: "有针对性地联系欧洲各商会。香港是欧洲企业进入亚洲的区域门户。"
 HKG_chinese_entrepreneurs: "内地企业家"
 HKG_chinese_entrepreneurs_desc: "中国内地资本是香港经济的未来。政府将深化与北京商界的联系。"
 HKG_develop_solar_power: "投资太阳能"
 HKG_develop_solar_power_desc: "在屋顶和水库等处安装分布式光伏发电装置。虽然只是个开始，但总算是个开始。"
 HKG_T_PARK: "源·区设施"
 HKG_T_PARK_desc: "屯门的源·区污泥处理厂将废物转化为能源，展现了香港的环保雄心。"
 HKG_indonesian_gas: "来自雅加达的天然气"
 HKG_indonesian_gas_desc: "与印度尼西亚签订长期液化天然气供应协议，保障香港未来几十年的能源需求。"
 HKG_australian_oil: "来自悉尼的石油"
 HKG_australian_oil_desc: "与澳大利亚原油生产商建立进口伙伴关系，使香港摆脱对单一供应商的依赖，实现碳氢化合物供应多元化。"
 HKG_new_development_idea: "新发展计划"
 HKG_new_development_idea_desc: "新发展计划将基础设施、住房和工业区项目整合到一个协调统一的框架下。"
 HKG_invest_hong_kong: "投资香港"
 HKG_invest_hong_kong_desc: "香港投资推广署经过重组和重新注资，成为香港的旗舰投资促进机构。"
 HKG_hong_kong_science_parks: "科学园区"
 HKG_hong_kong_science_parks_desc: "在沙田和将军澳设立生物科技、人工智能和先进制造研发专区，并为初创企业提供补贴办公空间。"
 HKG_invite_talent_to_hong_kong: "诚邀人才来港"
 HKG_invite_talent_to_hong_kong_desc: "为高技能外国专业人士提供快速签证方案，并提供英语语言服务和税收优惠，以帮助他们顺利过渡。"
 HKG_hong_kong_cyberport: "数码港"
 HKG_hong_kong_cyberport_desc: "数码港的使命得到更新和扩展，成为以金融科技、电子商务和数字媒体为目标的数字商业集群。"
 HKG_tech_incubation_programme: "科技孵化计划"
 HKG_tech_incubation_programme_desc: "政府资助的孵化器，为早期科技创业公司提供种子资金、导师指导和共享基础设施。"
 HKG_favor_traditional_values: "转向传统"
 HKG_favor_traditional_values_desc: "政府将公开支持传统家庭价值观，限制LGBT群体在教育和公共生活中的活动。"
 HKG_undercover_oppression: "秘密压迫"
 HKG_undercover_oppression_desc: "采取一种更为隐蔽的方式：通过监视、雇主施压和非正式劝阻，而不是公开立法反对少数群体。"
 HKG_legislate_to_ban_LGBT: "禁止LGBT群体"
 HKG_legislate_to_ban_LGBT_desc: "公开立法将LGBT身份的公开表达定为犯罪。国际社会必将强烈反应。"
 HKG_regulate_sale_of_residential_buildings: "规范住宅销售"
 HKG_regulate_sale_of_residential_buildings_desc: "一套适度的信息披露规则、抵押贷款限额和反投机税框架。孙九招得以保留，但不受监管市场中最严重的过度行为将得到遏制。"
 HKG_land_reclamation: "土地开垦"
 HKG_land_reclamation_desc: "香港土地资源有限。土木工程署制定了一项新的填海计划，拟在大屿山、新界沿岸及九龙海港进行填海。这项计划耗资巨大，环保人士对此强烈抗议；但他们认为，由此带来的新增建筑用地物有所值。"
 HKG_lock_housing_price: "冻结房价"
 HKG_lock_housing_price_desc: "政府立法规定住宅物业价格上限，并与收入中位数挂钩。业主们怒不可遏；租户和工会则欢欣鼓舞。市场变得可预测，但也停滞不前。"
 HKG_expand_home_ownership_scheme: "扩大居者有其屋计划"
 HKG_expand_home_ownership_scheme_desc: "居者有其屋计划扩大范围：增加组屋数量，降低申请门槛，加快审批速度。香港工薪阶层终于可以实现拥有房屋的梦想。财政补贴由政府承担，社会稳定则是最终的红利。"
 HKG_let_government_hold_companies: "政府持有的公司"
 HKG_let_government_hold_companies_desc: "新鸿基地产、长江实业、恒基兆业等最大的几家房地产开发公司已被部分国有化。这些巨头强烈抗议；政府持有股权。房地产价格直接受政治控制。"
 HKG_maintain_public_housing_construction: "维持公屋建设"
 HKG_maintain_public_housing_construction_desc: "房屋署的建设项目得以保留并扩展。公共屋邨在新界各地拔地而起。基础设施投资带来的稳定和居民日益增长的幸福感，都体现在了这些投资上。"
 HKG_my_home_purchase_scheme: "置业计划"
 HKG_my_home_purchase_scheme_desc: "曾荫权的“我的置业计划”按预期实施：为夹心阶层 - 那些收入高于公屋标准却又无力负担私人住宅的香港人 - 提供先租后买的住房方案。这为解决住房负担能力危机提供了一个切实可行的方案。"
 HKG_subsidised_sale_flats_project: "公寓资助计划"
 HKG_subsidised_sale_flats_project_desc: "政府资助出售的组屋，以低于市场价的价格出售给首次购房者。房屋委员会实际上成为特区最大的开发商。"
 HKG_green_form_subsidised_home_ownership_scheme: "绿表置居计划"
 HKG_green_form_subsidised_home_ownership_scheme_desc: "房屋改革的巅峰之作：持有绿表的现有公屋租户可优先获得资助购房。中断了二十年的向上流动链条终于重建。香港的房屋危机告一段落。"
 HKG_public_housing_problem: "公屋问题"
 HKG_public_housing_problem_desc: "香港的房屋危机是回归后政府最明显的失败之处。房价中位数比收入中位数高出一个数量级；劏房和笼屋里居住着数万人；公屋轮候名单长达六年之久。政府面临着巨大的政治压力，必须有所作为 - 哪怕只是任何行动。"
 HKG_sun_housing_policy: "孙九招房改政策"
 HKG_sun_housing_policy_desc: "住房大臣孙明扬提出了九点计划：限制供应、停止公共建设、让市场自行复苏。土地所有者和企业集团表示赞同，但工会和租户却反对。历史终将对这项政策做出严厉评判，但它确实能在短期内保障房地产市场。"
 HKG_end_tenants_purchase_scheme: "结束租户购买计划"
 HKG_end_tenants_purchase_scheme_desc: "公屋租户将不再被允许以折扣价购买其所租住的房屋。国库保留了这些资产；租户仍是租户。这带来的财政收入微薄，却造成了巨大的社会损失。"
 HKG_suspend_home_ownership_scheme: "暂停居者有其屋计划"
 HKG_suspend_home_ownership_scheme_desc: "居者有其屋计划无限期暂停。政府补贴的售楼单位供应枯竭，私人市场摆脱了公众竞争，房地产大亨们也少了一件烦心事。"
 HKG_curtail_land_supply: "减少土地供应"
 HKG_curtail_land_supply_desc: "政府停止出售土地；地政总署将库存土地撤出市场。房价稳定在高位，房地产市场趋于整合，住房危机成为香港生活的一个长期特征。"
 HKG_triad_decision_categories: "打击有组织犯罪和三合会"
 HKG_triad_decision_categories_desc: "\n\n\n\n\n\n£HKG_desctext_OCTB\n\n\n\n\n\n\n\n\n当前三合会实力：§0[?ROOT.HKG_triad_strength]%§!                     我们已获取的三合会犯罪证据：§G[?ROOT.HKG_triad_evidance]§!"
 HKG_send_undercover_police: "派遣卧底进入三合会"
 HKG_send_undercover_police_desc: "派卧底收集三合会犯罪活动的证据。"
 HKG_search_suspected_triad_gatherings: "搜寻可疑的三合会集会"
 HKG_search_suspected_triad_gatherings_desc: "搜查这些地点确实可能会得到一些犯罪证据，也有助于稍微削弱三合会的影响力。"
 HKG_pay_off_informant: "付钱给线人"
 HKG_pay_off_informant_desc: "尽管线人有时会向我们提供犯罪活动的有用证据，但通常情况下，这些人在获得报酬后只会向我们提供无用的信息。"
 HKG_arrest_peripheral_members_of_triad: "抓捕三合会外围成员"
 HKG_crack_down_on_organized_vehicle_theft: "严厉打击有组织的车辆盗窃"
 HKG_enhance_crackdown_on_illegal_gambling: "加大打击非法赌博力度"
 HKG_intensify_efforts_to_combat_human_trafficking: "加大力度打击人口贩运"
