l_spanish:
 inuit_nunangat_focus: "Árbol de enfoque inuit"
 INU_Learning_from_Crested_Ice: "Aprendiendo del hielo crestado"
 INU_Learning_from_Crested_Ice_desc: "En las décadas de 1950 y 1960, Estados Unidos operó una serie de bombarderos B-52 Stratofortress armados con armas nucleares sobre el Ártico en una operación conocida como Chrome Dome. En 1968, un Stratofortress realizó un aterrizaje forzoso al intentar aterrizar en la base aérea de Thule, contaminando el medio ambiente, un incidente que las autoridades encubrieron. Ahora debemos reflexionar y analizar la ética de esta situación antes de jugar con armas nucleares."
 INU_Buy_Spare_Parts: "Compra de repuestos"
 INU_Buy_Spare_Parts_desc: "Para seguir desarrollando nuestro programa de reacondicionamiento nuclear, debemos intentar obtener piezas y maquinaria que nos permitan recrear o restaurar las armas que planeamos utilizar."
 INU_Project_S: "Proyecto Sanna"
 INU_Project_S_desc: "Sanna o Sedna es el nombre de la diosa inuit del mar y protectora de la vida marina. Como homenaje a su papel como fuente importante de sustento, nombraremos nuestro programa de submarinos balísticos en su honor."
 INU_Project_Ice_Shield: "Proyecto Escudo de Hielo"
 INU_Project_Ice_Shield_desc: "Ha llegado el momento de poner a prueba nuestro trabajo. Demostremos al mundo de qué somos capaces cuando una nación maneja adecuadamente un arma nuclear y la utiliza como herramienta diplomática, no como medio para amenazar a otros. La utilizaremos para proteger los intereses de los pueblos indígenas del Ártico."
 INU_Project_N: "Proyecto Nuutuittuq"
 INU_Project_N_desc: "Nuutuittuq es el nombre de la estrella polar, Polaris. Como homenaje a ella, nombraremos nuestro programa de misiles balísticos en su honor, ya que nos permitirá acercarnos cada vez más a alcanzar las estrellas."
 INU_Looking_to_the_Stars: "Mirando a las estrellas"
 INU_Atmospheric_Monitoring: "Monitoreo atmosférico"
 INU_Lidar_Climate_Research: "Investigación climática LIDAR"
 INU_Recover_B52_Thermonuclear_Arm: "Recuperar el armamento termonuclear del B-52"
 INU_Qaanaaq_Space_base: "Base espacial de Qaanaaq"