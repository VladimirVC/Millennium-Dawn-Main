 SCA_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetSCANameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_IBR_category: "이베리아 연합"
 form_IBR_category_desc: "이베리아 연합은 이베리아반도의 스페인과 포르투갈 사이에서 제안된 소규모 정치적 연합입니다. 두 국가는 최근 역사의 대부분을 함께 얽혀 지내왔으며, '이베리아인'이라는 공동의 정체성을 계속 공유하고 있습니다. 두 국가를 통합한다고 해서 세계 질서가 근본적으로 바뀌지는 않겠지만, 합병을 통해 이전에는 존재하지 않았던 지중해 입구에서의 확고한 경제적, 정치적 존재감을 확보할 수 있을 것입니다."
 IBR_integrate_SPR: "[GetIBRNameAdj] [SPR.GetAdjective] 영토 통합"
 IBR_integrate_SPR_desc: ""
 IBR_integrate_POR: "[GetIBRNameAdj] [POR.GetAdjective] 영토 통합"
 IBR_integrate_POR_desc: ""
 IBR_update_flag: "[GetIBRNameDef] 형성 완료"
 IBR_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetIBRNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_ANZ_category: "오스트랄라시아"
 form_ANZ_category_desc: "오스트랄라시아는 호주, 뉴질랜드, 그리고 태평양에 있는 인근의 작은 섬들을 포함하는 광범위한 지역입니다. 뉴질랜드와 호주의 연합은 태평양에서 이 지역의 영향력을 두고 인도네시아 및 일본과 경쟁하는 새로운 강국을 탄생시킵니다."
 ANZ_integrate_AST: "[GetANZNameAdj] [AST.GetAdjective] 영토 통합"
 ANZ_integrate_AST_desc: ""
 ANZ_integrate_NZL: "[GetANZNameAdj] [NZL.GetAdjective] 영토 통합"
 ANZ_integrate_NZL_desc: ""
 ANZ_update_flag: "[GetANZNameDef] 형성 완료"
 ANZ_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetANZNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_SOU_category: "남아메리카 국가 연합"
 form_SOU_category_desc: "남아메리카 국가 연합은 모든 남미 국가를 하나의 초국가로 통합하는 것입니다. 남미의 경제적, 정치적, 문화적 정체성은 스페인과 포르투갈의 영향, 그리고 각국에 동화된 원주민들이 융합된 고유한 특성을 지니고 있습니다. 이곳은 광범위한 산업 기반, 금융 부문, 원자재, 농산물을 보유하고 있습니다. 남미의 국가들을 통합한다면, 우리는 마침내 서반구와 해외에서 미국 및 다른 주요 열강들의 영향력에 맞설 수 있게 될 것입니다."
