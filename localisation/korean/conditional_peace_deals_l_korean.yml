 CPD_peace_deal_builder_selected_deal_type_title: "[CPD_peace_deal_builder_selected_deal_type_title]"
 CPD_peace_deal_builder_selected_deal_type_title_one: "현재 양보 요구 중"
 CPD_peace_deal_builder_selected_deal_type_title_two: "현재 양보 제안 중"
 CPD_peace_deal_builder_ACTIONABLE_STATES_TITLE_TEXT: "실행 가능한 주"
 CPD_peace_deal_builder_CURRENT_DEAL_TITLE_TEXT: "현재 협정"
 CPD_peace_deal_explainer_ICON_TT: "평화 협정 작동 방식"
 CPD_peace_deal_explainer_ICON_TT_DELAYED: "평화 협정을 구성하는 방법은 매우 간단합니다. 위의 탭을 선택한 다음, 특정 주 내부에서 무엇을 양보하거나 요구할지 선택하면 됩니다.\n\n요구 수치보다 양보가 많아 비용이 §Y음수§!가 되는 평화 협정은 AI가 수락할 가능성이 높지만, 비용이 §Y양수§!가 되는 평화 협정은 수락할 가능성이 낮아집니다. 수락 여부 상자에 마우스를 올리면 AI의 수락 의사에 대한 자세한 분석 내용을 확인할 수 있습니다.\n\n플레이어를 대상으로 구성된 평화 협정은 이 값들의 영향을 받지 않습니다."
 CPD_annex_state_button_TT: "[CPD_ANNEX_STATE_TT_LOC]"
 CPD_annex_state_button_TT_DELAYED: "[CPD_ANNEX_STATE_TT_DELAYED_LOC]"
 CPD_annex_state_button_TT_DEMAND: "영토 요구"
 CPD_annex_state_button_TT_CONCESSION: "영토 양보"
 CPD_annex_state_button_TT_DELAYED_DEMAND: "선택한 적 영토가 그곳의 인구, 공장, 자원과 함께 우리 국가로 합병됩니다. 우리가 핵심 주(Core)를 보유한 주는 전략적 가치 비용의 절반만 소모되며, 명분(Claim)이 있는 주는 3분의 1만 소모됩니다. 원래 소유자가 여전히 온전히 보유하고 있는 영토를 요구하는 경우에는 비용이 두 배로 증가합니다."
 CPD_annex_state_button_TT_DELAYED_CONCESSION: "§Y주 양보§!는 해당 영토를 적에게 넘겨주는 것을 의미합니다. 영토를 양보할 때마다 협정의 전반적인 비용이 감소하므로, 다른 요구 사항을 관철시키기가 더 수월해집니다."
 CPD_make_puppet_button_TT: "[CPD_MAKE_PUPPET_TT_LOC]"
 CPD_make_puppet_button_TT_DELAYED: "[CPD_MAKE_PUPPET_TT_DELAYED_LOC]"
 CPD_make_puppet_button_TT_DEMAND: "괴뢰 정부 수립 요구"
 CPD_make_puppet_button_TT_CONCESSION: "괴뢰 정부 수립 허용"
 CPD_make_puppet_button_TT_DELAYED_DEMAND: "§Y괴뢰 정부§! 수립을 요구하면 선택한 적의 영토에서 새로운 종속국을 분할해 냅니다. 새 괴뢰국은 모국의 문화를 이어받지만 외교 정책에서는 우리의 지시를 따르게 됩니다. 만약 우리가 해당 모국에 핵심 주를 가진 종속국을 이미 보유하고 있다면, 새로운 괴뢰국이 생겨나는 대신 해당 주들이 기존 종속국에 편입됩니다."
 CPD_make_puppet_button_TT_DELAYED_CONCESSION: "§Y괴뢰 정부 수립 허용§!은 적이 현재 우리가 통제하고 있는 영토에서 종속국을 분할해 내도록 허용합니다. 새로 수립된 괴뢰 정부는 적의 지시를 따르게 됩니다."
 CPD_demilitarise_state_button_TT: "[CPD_DEMILITARISE_TT_LOC]"
 CPD_demilitarise_state_button_TT_DELAYED: "[CPD_DEMILITARISE_TT_DELAYED_LOC]"
 CPD_demilitarise_state_button_TT_DEMAND: "특정 주 비무장화 요구"
 CPD_demilitarise_state_button_TT_CONCESSION: "특정 주 비무장화 제안"
 CPD_demilitarise_state_button_TT__DELAYED_DEMAND: "§Y비무장화§!를 요구하면 선택한 적의 주가 어떠한 군대도 활동할 수 없는 지대로 변경됩니다. 해당 주의 소유자는 그곳에 군대를 주둔시키거나 요새를 건설할 수 없습니다."
 CPD_demilitarise_state_button_TT__DELAYED_CONCESSION: "§Y비무장화 제안§!은 우리의 주를 동일한 제한 아래 둡니다. 우리는 비무장화된 영토로 군대를 이동하거나 주둔시킬 수 없게 됩니다."
