 RULE_HARD_AI_ECONOMIC: "경제 AI"
 RULE_DISABLE_HARD_AI_ECONOMIC: "표준 제한"
 RULE_DISABLE_HARD_AI_ECONOMIC_DESC: "AI가 경제를 강화하지 못하도록 하는 AI에 대한 표준 제한입니다. 역사적 게임 진행을 위한 옵션입니다."
 RULE_ENABLE_HARD_AI_ECONOMIC: "제한 없음"
 RULE_ENABLE_HARD_AI_ECONOMIC_DESC: "매판 게임에서 AI가 경제 위기를 벗어나지 못해 지루했다면 이 옵션이 제격입니다. AI는 더 이상 경제에 대한 결정을 내리는 데 제한을 받지 않습니다. 많은 국가가 플레이어보다 더 부유해질 수 있으니 각오하십시오. 도전을 두려워하지 않는 분들에게만 추천합니다. 전투 AI가 안부를 전합니다 ;)"
 RULE_ALLOW_ENABLE_LEDGER: "밀레니엄 던 통계 차트 활성화"
 RULE_ALLOW_ENABLE_LEDGER_YES_DESC: "밀레니엄 던 통계 차트 기능이 활성화됩니다. (라 레지스탕스 DLC의 첩보 장부 정보와 일부 중복될 수 있습니다. 더 어려운 게임을 원하시면 이 기능을 끄십시오.)"
 RULE_ALLOW_ENABLE_LEDGER_NO_DESC: "밀레니엄 던 통계 차트 기능을 비활성화합니다. 라 레지스탕스 기능을 활용해 중요 정보를 얻는 정통적인 경험을 선호하는 유저에게 적합합니다."
