 total_civilian_factories_amount_tt_delayed: "Это здание обеспечивает регион промышленностью для производства гражданских товаров или строительства новых зданий. При необходимости может быть переоборудовано в военную промышленность.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y206 тыс.§!\nБазовый выпуск ВВП на одну §Yгражданскую промышленность§!: $§Y17,5 млрд§!\nБазовое энергопотребление: §R-0,5§! ГВт\n\nВлияние производительности на §Yрабочую силу гражданской промышленности§!: [?worker_requirement_productivity_multiplier_display|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу гражданской промышленности§!: [?modifier@civ_facs_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на одну §Yгражданскую промышленность§!: [?workers_per_civ_fac_display|2] тыс."
 total_military_factories_amount_tt: "Это значение представляет собой общее количество §Yвоенных заводов§! в нашей стране."
 total_military_factories_amount_tt_delayed: "Это здание обеспечивает регион промышленностью для производства новой военной техники. При необходимости может быть переоборудовано в гражданскую промышленность.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y18,8 тыс.§!\nБазовый выпуск ВВП на одну §Yвоенную промышленность§!: $§Y1,5 млрд§!\nБазовое энергопотребление: §R-0,5§! ГВт\n\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу военных заводов и верфей§!: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на одну §Yвоенную промышленность§!: [?workers_per_mil_fac_display|2] тыс."
 total_naval_yard_amount_tt: "Это значение представляет собой общее количество §Yвоенно-морских верфей§! в нашей стране."
 total_naval_yard_amount_tt_delayed: "§YВоенно-морские верфи§! отражают способность государства производить военные суда всех типов, от §Yпатрульных катеров§!, §Yконвоев§!, §Yэсминцев§! до §Yавианосцев§! и не только.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y18,8 тыс.§!\nБазовый выпуск ВВП на одну §Yвоенно-морскую верфь§!: $§Y1,5 млрд§!\nБазовое энергопотребление: §R-0,5§! ГВт\n\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу военных заводов и верфей§!: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на одну §Yвоенно-морскую верфь§!: [?workers_per_dockyard_display|2] тыс."
 total_offices_amount_tt: "Это значение представляет собой общее количество §Yофисных секторов§! в нашей стране."
 total_offices_amount_tt_delayed: "§YОфисные сектора§! представляют все прочие отрасли экономики за пределами добывающей и тяжёлой промышленности. Сюда входят финансовые, клиентские, информационно-технологические, розничные услуги и многое другое.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y473 тыс.§!\nБазовый выпуск ВВП на один §Yофисный сектор§!: $§Y50 млрд§!\nБазовое энергопотребление: §R-0,25§! ГВт\n\nВлияние производительности на §Yрабочую силу офисного сектора§!: [?worker_requirement_productivity_multiplier_display|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу офисного сектора§!: [?modifier@offices_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на один §Yофисный сектор§!: [?workers_per_office_display|2] тыс."
 total_agriculture_district_amount_tt: "Это значение представляет собой общее количество §Yкоммерческих сельскохозяйственных районов§! в нашей стране."
 total_agriculture_district_amount_tt_delayed: "§YКоммерческие сельскохозяйственные районы§! представляют собой обобщающее понятие для всего нетоварного сельского хозяйства в нашей стране. Сюда входят агропромышленность, пахотные земли, зернохранилища, скотобойни и многое другое.\n\nОбеспечивает регион:\nБазовое необходимое количество работников: §Y188 тыс.§!\nБазовый выпуск ВВП на один §Yкоммерческий сельскохозяйственный район§!: $§Y25 млрд§!\nБазовое энергопотребление: §R-0,10§! ГВт\n§YПолучение топлива§! от штатов: 8\n§YМестные запасы§!: 1,5%\n\nВлияние производительности на §Yрабочую силу коммерческих сельскохозяйственных районов§!: [?worker_requirement_productivity_multiplier_display|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу на всех зданиях§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nВлияние законов, национальных духов и технологий на §Yрабочую силу коммерческих сельскохозяйственных районов§!: [?modifier@agriculture_district_worker_requirement_modifier|-%0]\n\nНеобходимое количество работников на один §Yкоммерческий сельскохозяйственный район§!: [?workers_per_agriculture_district_display|2] тыс."
