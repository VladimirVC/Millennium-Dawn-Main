 increase_election_threshold_TT: "阻止条項とは、政党が国政政党として認定されるために必要な得票率のことである。\n\n§Y前提条件:§!\n[!increase_election_threshold_click_enabled]\n§Y効果:§!\n[!increase_election_threshold_click]\n\n阻止条項の閾値の変更は次回の選挙から適用され、これにより小規模政党が政権を獲得することはより困難となる。"
 decrease_election_threshold: "§Y阻止条項の閾値を下げる§!"
 decrease_election_threshold_TT: "阻止条項とは、政党が国政政党として認定されるために必要な得票率のことである。\n\n§Y前提条件:§!\n[!decrease_election_threshold_click_enabled]\n§Y効果:§!\n[!decrease_election_threshold_click]\n\n阻止条項の閾値の変更は次回の選挙から適用され、これにより小規模政党が政権を獲得することがより容易となる。"
