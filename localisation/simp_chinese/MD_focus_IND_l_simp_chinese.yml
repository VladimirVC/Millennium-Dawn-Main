 indonesia.988.t: "开始新首都的建设"
 indonesia.988.d: "根据我们从日本获得的所有建议和援助，我们得出结论，开始准备将首都从雅加达迁出。新首都将设在婆罗洲东部，建设计划立即开始！"
 indonesia.988.a: "我们向前进"
 indonesia.888.t: "新丝绸之路"
 indonesia.888.d: "最近与中国人的一次会议刚刚结束。他们赞扬了我们的合作伙伴关系以及在如此短的时间内使印度尼西亚工业从无到有的能力。尽管我们还有很多工作要做，但中国国家主席称赞我们的国家，并称我们为“21世纪丝绸之路”。"
 indonesia.888.a: "非常奉承"
