 ukraine_parliament.20.t: "Парламент отклонил наш новый бюджет на здравоохранение"
 ukraine_parliament.20.d: "Парламент отклонил нашу просьбу об увеличении расходов на здравоохранение. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, похоже, предложение не получило большой популярности и поддержки."
 ukraine_parliament.20.a: "Прискорбно"
 ukraine_parliament.20.b: "Может быть, небольшая взятка заставит их передумать..."
 ukraine_parliament.21.t: "Парламент принимает наш новый бюджет на здравоохранение"
 ukraine_parliament.21.d: "Парламент одобрил наше предложение о сокращении расходов на здравоохранение. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, судя по всему, предложение получило широкую поддержку населения."
 ukraine_parliament.21.a: "Отлично"
 ukraine_parliament.22.t: "Парламент отклонил наш новый бюджет на здравоохранение"
 ukraine_parliament.22.d: "Парламент отклонил нашу просьбу о сокращении расходов на здравоохранение. Это произошло после нашего предложения, которое было выдвинуто несколько дней назад, и, похоже, предложение не получило широкой поддержки и популярности."
 ukraine_parliament.22.a: "Прискорбно"
 ukraine_parliament.22.b: "Может быть, небольшая взятка заставит их передумать..."
 ukraine_parliament.23.t: "Парламент принимает наш новый пенсионный бюджет"
 ukraine_parliament.23.d: "Парламент одобрил нашу просьбу об увеличении расходов на пенсии. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, судя по всему, предложение получило широкую поддержку населения."
 ukraine_parliament.23.a: "Отлично"
 ukraine_parliament.24.t: "Парламент отклонил наш новый пенсионный бюджет"
 ukraine_parliament.24.d: "Парламент отклонил нашу просьбу об увеличении пенсионных расходов. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, похоже, предложение не получило большой популярности и поддержки."
 ukraine_parliament.24.a: "Прискорбно"
 ukraine_parliament.24.b: "Может быть, небольшая взятка заставит их передумать..."
 ukraine_parliament.25.t: "Парламент принимает наш новый пенсионный бюджет"
 ukraine_parliament.25.d: "Парламент одобрил нашу просьбу о сокращении расходов на пенсии. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, судя по всему, предложение получило широкую поддержку населения."
 ukraine_parliament.25.a: "Отлично"
 ukraine_parliament.26.t: "Парламент отклонил наш новый пенсионный бюджет"
 ukraine_parliament.26.d: "Парламент отклонил нашу просьбу о снижении пенсионных расходов. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, похоже, предложение не получило большой популярности и поддержки."
 ukraine_parliament.26.a: "Прискорбно"
 ukraine_parliament.26.b: "Может быть, небольшая взятка заставит их передумать..."
 ukraine_parliament.30.t: "Несколько членов в парламенте идут против нашего правительства!"
 ukraine_parliament.30.d: "Некоторые члены парламента пошли против нашего правительства, что привело к уменьшению нашей поддержки в ассамблее."
 ukraine_parliament.30.a: "Такое случается"
 ukraine_parliament.30.b: "Может быть, их карманы немного опустели?"
 ukraine_parliament.31.t: "Несколько членов в парламенте начали нас поддерживать!"
 ukraine_parliament.31.d: "Некоторые депутаты начали хвалить наши недавние успехи, что привело к росту поддержки в ассамблее."
 ukraine_parliament.31.a: "Отлично"
 ukraine_parliament.32.t: "Парламент добивается большей поддержки местных жителей!"
 ukraine_parliament.32.d: "Парламент выделил большой бюджет для поддержки местных жителей по всей стране, и наша администрация узнала об этом. Некоторые члены кабинета считают, что эти деньги можно было бы направить в другое место для лучшего использования."
 ukraine_parliament.32.a: "Деньги предназначены для местных жителей!"
 ukraine_parliament.32.b: "Да, их определенно можно было бы использовать в другом месте"
 ukraine_parliament.33.t: "Парламент задает вопросы нашей администрации"
 ukraine_parliament.33.d: "Несколько членов парламента недавно назвали нашу администрацию \"неспособной удовлетворить [ROOT.GetAdjective] людей\". В парламенте происходит много междоусобной борьбы между проправительственными и оппозиционными местами. Дошло до того, что нам нужно вмешаться и дать ответ."
 ukraine_parliament.33.a: "Пусть думают, что хотят"
 ukraine_parliament.33.b: "Подготовить надлежащий ответ"
 ukraine_parliament.34.t: "Парламент принимает постановление о повышении финансирования медицины"
 ukraine_parliament.34.d: "Парламент недавно принял предложение, которое предусматривает выделение большей части нашего бюджета на медицинские расходы. Некоторые члены кабинета министров выступают против этого, так как считают, что это будет катастрофой для нашей экономики и правительства."
 ukraine_parliament.34.a: "Парламент действует правильно"
 ukraine_parliament.34.b: "Нет, мы не позволим принять эту резолюцию"
 ukraine_parliament.35.t: "Парламент принял предложение о повышении пенсий"
 ukraine_parliament.35.d: "Парламент недавно принял предложение, которое предусматривает выделение большей части бюджета на социальные нужды. Некоторые члены кабинета министров выступают против этого, так как считают, что это будет катастрофой для нашей экономики и правительства."
 ukraine_parliament.35.a: "Парламент действует правильно"
 ukraine_parliament.35.b: "Нет, мы не позволим принять эту резолюцию"
 ukraine_parliament.36.t: "Парламент принимает постановление о повышении расходов на полицию"
 ukraine_parliament.36.d: "Парламент недавно принял предложение, которое предусматривает выделение большей части нашего бюджета на расходы на полицию. Некоторые члены кабинета министров выступают против этого, так как считают, что это будет катастрофой для нашей экономики и правительства."
 ukraine_parliament.36.a: "Парламент действует правильно"
 ukraine_parliament.36.b: "Нет, мы не позволим принять эту резолюцию"
 ukraine_parliament.37.t: "Парламент принимает постановление о повышении расходов на образование"
 ukraine_parliament.37.d: "Парламент недавно принял предложение о выделении большей части бюджета на образование. Некоторые члены кабинета министров выступают против этого, так как считают, что это будет катастрофой для нашей экономики и правительства."
 ukraine_parliament.37.a: "Парламент действует правильно"
 ukraine_parliament.37.b: "Нет, мы не позволим принять эту резолюцию"
 ukraine_parliament.38.t: "Парламент принимает постановление о повышении расходов на оборону"
 ukraine_parliament.38.d: "Парламент недавно принял предложение, которое предусматривает выделение большей части нашего бюджета на военные расходы. Некоторые члены нашего кабинета выступают против этого, так как считают, что это будет катастрофой для нашей экономики и правительства."
 ukraine_parliament.38.a: "Парламент действует правильно"
 ukraine_parliament.38.b: "Нет, мы не позволим принять эту резолюцию"
 ukr_sabotage.1.t: "Украина атаковала наши запасы"
 ukr_sabotage.1.d: "В ходе недавнего удара с использованием дронов украинские войска нанесли удар по складу, на котором хранилась старая тяжелая техника."
 ukr_sabotage.1.a: "Черт"
 ukr_sabotage.2.t: "Украина атаковала наши запасы"
 ukr_sabotage.2.d: "В ходе недавнего удара с помощью дронов украинские войска нанесли удар по складу, на котором хранилось некоторое старое легкое оборудование."
 ukr_sabotage.2.a: "Черт"
 ukr_sabotage.3.t: "Украина атаковала наше военное производство"
 ukr_sabotage.3.d: "В ходе недавнего удара с использованием дронов Украина нанесла удар по одному из наших производственных предприятий, в результате чего мы понесли временный ущерб."
 ukr_sabotage.3.a: "Они за это заплатят."
 UKR_our_ukraine_start: "Наша Украина"
 UKR_our_ukraine_start_desc: "Пришло время навести порядок в стране и провести либеральные реформы. Для нас народ на первом месте!"
 UKR_our_ukraine_secretariat: "Секретариат Президента Украины"
 UKR_our_ukraine_secretariat_desc: "Секретариат играет ключевую роль в управлении административными и организационными функциями, связанными с президентской деятельностью. Основной целью создания Секретариата Президента Украины является обеспечение соблюдения конституционных полномочий Президента и эффективное выполнение его обязанностей."
 UKR_our_ukraine_secretariat_reduction: "Сокращение штата Секретариата"
 UKR_our_ukraine_secretariat_reduction_desc: "Нам необходимо сократить количество сотрудников секретариата, чтобы оптимизировать работу государственных органов и сократить бюджетные расходы."
 UKR_our_ukraine_decentralization: "Децентрализация"
 UKR_our_ukraine_decentralization_desc: "Нам необходимо усилить местное самоуправление в нашей стране."
 UKR_our_ukraine_wto: "Попросить помощи для вступления в ВТО"
 UKR_our_ukraine_wto_desc: "Мы готовы стать членами ВТО, но нам нужна поддержка в этом."
 UKR_our_ukraine_yanukovich_go_home: "Уволить Януковича"
 UKR_our_ukraine_yanukovich_go_home_desc: "Янукович, как премьер-министр, показал себя ужасно, поэтому мы уволим его и назначим нового премьер-министра."
 UKR_our_ukraine_timoha: "Кабинет Тимошенко"
 UKR_our_ukraine_timoha_desc: "Известная Юлия Тимошенко вошла в наше правительство. Посмотрим, что она принесет нашему государству."
 UKR_our_ukraine_aviation_reform: "Реформа авиационной промышленности"
 UKR_our_ukraine_aviation_reform_desc: "Авиационная индустрия очень важна для нашей страны, и мы будем стремиться к ее возрождению."
 UKR_our_ukraine_help_western: "Заручиться поддержкой Львова"
 UKR_our_ukraine_help_western_desc: "Мы восстановим подачу горячей и холодной воды во Львове, тем самым заручившись поддержкой жителей этого города и, возможно, области."
 UKR_our_ukraine_cheap_gas_negotiate: "Переговоры о снижении цен на газ"
 UKR_our_ukraine_cheap_gas_negotiate_desc: "Мы попытаемся договориться с Москвой о снижении цен на энергоносители."
 UKR_our_ukraine_service_life: "Сократить срок службы"
 UKR_our_ukraine_service_life_desc: "Украинская армия нуждается в модернизации. Первой нашей реформой в этой сфере станет сокращение срока службы в армии с двух лет до одного года! Таким образом, призывники будут терять меньше времени на службу."
 UKR_our_ukraine_nato_eu: "Поддерживать интеграцию Украины в НАТО и ЕС"
 UKR_our_ukraine_nato_eu_desc: "Давайте начнем более прогрессивную интеграцию в НАТО и ЕС. Это необходимо для военной и экономической безопасности нашей великой страны."
 UKR_our_ukraine_fire_corrupt: "Уволить коррупционеров"
 UKR_our_ukraine_fire_corrupt_desc: "В нашем правительстве есть коррупционеры, и мы их уволим! В нашей стране не будет места коррупции!!!"
 UKR_our_ukraine_form_new_government: "Сформировать новое правительство"
 UKR_our_ukraine_form_new_government_desc: "Теперь, когда мы уволили всех тех, кто воровал в нашей стране, мы можем сформировать новое, честное и справедливое правительство."
 UKR_our_ukraine_fight_corruption: "Борьба с коррупцией"
 UKR_our_ukraine_fight_corruption_desc: "Коррупция - главный враг нашей страны. Мы будем с ней жестко бороться!"
 UKR_our_ukraine_alternative_energy_sources: "Альтернативные источники энергии"
 UKR_our_ukraine_alternative_energy_sources_desc: "Развитие альтернативных источников энергии поможет нам снизить зависимость от ее импорта."
 UKR_our_ukraine_crush_oligarchs: "Уменьшение влияния олигархов"
 UKR_our_ukraine_crush_oligarchs_desc: "Олигархия — враг номер два в нашей стране. Они могут влиять на наше правительство, обходя законы. Чтобы избежать этого, мы уменьшим их влияние и постараемся выгнать их из нашей страны."
 UKR_our_ukraine_increase_media_freedom: "Увеличить свободу СМИ"
 UKR_our_ukraine_increase_media_freedom_desc: "Наши СМИ были ограничены в течение очень долгого времени, и теперь, во время нашего правления, они будут свободнее и независимее, чем когда-либо!"
 UKR_our_ukraine_release_political_prisoners: "Освободить политических заключенных"
 UKR_our_ukraine_release_political_prisoners_desc: "При предыдущем правительстве многие оппозиционные политики были заключены в тюрьму. Давайте дадим им свободу!"
 UKR_our_ukraine_internet_freedom: "Свобода интернета"
 UKR_our_ukraine_internet_freedom_desc: "Свобода интернета подразумевает, что граждане имеют право на свободный доступ к информации, свободу выражения мнений и неприкосновенность частной жизни при общении в сети. Давайте обеспечим защиту этих прав и свобод."
 UKR_our_ukraine_provide_housing: "Обеспечить граждан жильем"
 UKR_our_ukraine_provide_housing_desc: "Необходимо обеспечить жильем наших граждан, для этого мы проведем соответствующие реформы."
 UKR_our_ukraine_health_insurance_law: "Закон о медицинском страховании"
 UKR_our_ukraine_health_insurance_law_desc: "Мы примем закон о медицинском страховании, который будет стимулировать население активно обращаться в медицинские учреждения и повысит уровень здоровья наших граждан."
 UKR_our_ukraine_curriculum_modernization: "Модернизация учебных программ"
 UKR_our_ukraine_curriculum_modernization_desc: "Мы будем реформировать образовательную программу в наших школах, чтобы улучшить образование подрастающего поколения."
 UKR_our_ukraine_diversification_of_gas_supply_sources: "Диверсификация источников газоснабжения"
 UKR_our_ukraine_diversification_of_gas_supply_sources_desc: "Мы будем активно диверсифицировать наши ресурсные активы, чтобы не зависеть от одного поставщика."
 UKR_our_ukraine_cost_reduction: "Сокращение расходов"
 UKR_our_ukraine_cost_reduction_desc: "Мы будем сокращать расходы, чтобы улучшить состояние нашего бюджета."
 UKR_our_ukraine_deregulation_of_business_environment: "Дерегулирование бизнес-среды"
 UKR_our_ukraine_deregulation_of_business_environment_desc: "Нашей стране необходимо уменьшить бюрократию и снизить административные барьеры для предпринимателей."
 UKR_our_ukraine_attracting_investments: "Привлечение инвестиций"
 UKR_our_ukraine_attracting_investments_desc: "Наша страна открыта для инвестиций, и мы готовы привлечь потенциальных инвесторов."
 UKR_our_ukraine_beginning_decommunization_policy: "Начало декоммунизации"
 UKR_our_ukraine_beginning_decommunization_policy_desc: "В 1991 году мы обрели независимость от советского гнета. Давайте отметим это и начнем политику декоммунизации по всей стране! Коммунистическое влияние должно быть подавлено здесь и сейчас."
 UKR_our_ukraine_economic_liberalism: "Экономический либерализм"
 UKR_our_ukraine_economic_liberalism_desc: "Экономический либерализм обязателен, если мы хотим, чтобы экономика развивалась более эффективно, и поэтому мы должны принять его."
 UKR_our_ukraine_parliamentary_republic: "Укрепление полномочий парламента"
 UKR_our_ukraine_parliamentary_republic_desc: "Укрепление полномочий парламента помогает повысить репрезентативность правительства. Парламент-это орган, избранный народом, и, следовательно, он должен оказывать большее влияние на процесс принятия решений. Это способствует большему включению мнений и интересов граждан в политический процесс."
 UKR_our_ukraine_president_republic: "Укрепление полномочий президента"
 UKR_our_ukraine_president_republic_desc: "Первый важный аргумент в пользу усиления президентских полномочий - обеспечение более эффективного и быстрого реагирования на кризисные ситуации. В мире, насыщенном глобальными вызовами, такими как экономические кризисы, борьба с терроризмом и пандемии, президент должен обладать достаточными полномочиями, чтобы действовать быстро и решительно.\n\n Ограниченные полномочия могут привести к бюрократическим проволочкам и неэффективным решениям."
 UKR_our_ukraine_democratic_constitution: "Новая демократическая конституция"
 UKR_our_ukraine_democratic_constitution_desc: "Мы готовы реформировать нашу конституцию, чтобы приблизить истинную демократию в нашей стране."
 UKR_our_ukraine_recognition_holodomor: "Признание Голодомора"
 UKR_our_ukraine_recognition_holodomor_desc: "Советская власть совершила с нами, с украинцами, самое страшное преступление в 20 веке. Этот страшный голод, Голодомор, был вызван коллективизацией сельского хозяйства и политикой государственного насилия, проводимой коммунистическим режимом СССР."
 UKR_our_ukraine_ukrainian_institute: "Украинский институт национальной памяти"
 UKR_our_ukraine_ukrainian_institute_desc: "Украинский институт национальной памяти - центральный орган исполнительной власти для реализации государственной политики в сфере восстановления и сохранения национальной памяти. Он будет создан для воссоздания честной истории украинской нации, формирования и реализации государственной политики в этом направлении.\n\n Мы также увековечим память жертв политических репрессий и голодоморов на территории нашей страны."
 UKR_our_ukraine_secretariat_of_president_reduction: "Сокращённый Президентский секретариат Украины"
 UKR_ukrainian_libertarianism: "Украинское либертарианство"
 UKR_ukrainian_libertarianism_desc: "Пришло время Украине вступить в эру либертарианства! Давайте освободим страну от оков капиталистов и коммунистов."
 UKR_full_deregulation: "Полное дерегулирование"
 UKR_full_deregulation_desc: "Мы начнем процесс полного дерегулирования, и влияние правительства будет уменьшаться."
 UKR_decrease_role_of_government: "Уменьшить власть правительства"
 UKR_decrease_role_of_government_desc: "Государство будет играть минимальную роль в нашей прекрасной стране."
 UKR_free_the_common_folk: "Воистину свободные люди"
 UKR_free_the_common_folk_desc: "Наши люди наконец-то сделают глубокий вдох и почувствуют себя свободными!"
 UKR_offshore_country: "Страна оффшорных компаний"
 UKR_offshore_country_desc: "Мы приветствуем создание множества оффшорных зон в нашей стране."
 UKR_true_servant_of_people: "Истинный слуга народа"
 UKR_true_servant_of_people_desc: "Наконец-то Украина стала самой свободной страной в мире!"
 UKR_our_ukraine_freedom_of_social_media_idea: "Свобода социальных медиа"
 UKR_our_ukraine_freedom_of_social_media_idea_desc: "СМИ должны быть свободными и будут таковыми. Мы будем поддерживать запрет цензуры."
 UKR_our_ukraine_secretariat_of_president: "Секретариат Президента Украины"
 UKR_our_ukraine_ukrainian_institute_of_national_memory: "Украинский институт национальной памяти"
 UKR_our_ukraine_ukrainian_institute_of_national_memory_desc: "Каждый украинец должен помнить о жертвах, которые его народ принес в прошлом. Институт национальной памяти поможет нам воспитать поколения людей, которые будут помнить о героизме украинцев."
 UKR_our_ukraine_fight_with_corruption_idea: "Борьба с коррупцией"
 UKR_our_ukraine_education_reform_idea: "Последствия реформы образования"
 UKR_our_ukraine_health_reform_idea: "Последствия реформы здравоохранения"
 UKR_our_ukraine_social_reform_idea: "Последствия жилищной реформы"
 UKR_our_ukraine_air_industry_idea: "Реформа авиационной промышленности"
 UKR_liberals_modifier: "Украинский либерализм"
 UKR_liberals_modifier_desc: "Украина наконец-то встала на путь либерализма. Теперь мы сняли оковы авторитарного правления."
 ukraine_our_ukraine.1.t: "Секретариат Президента Украины"
 ukraine_our_ukraine.1.d: "Администрация президента вела себя ужасно в годы правления Ющенко, поэтому мы реформируем ее в Секретариат Президента Украины, чтобы обеспечить большую политическую стабильность."
 ukraine_our_ukraine.1.a: "Пришло время перемен."
 ukraine_our_ukraine.2.t: "Украинский институт национальной памяти"
 ukraine_our_ukraine.2.d: "Институт национальной памяти начал свою работу. Теперь мы готовы вернуть Украине ее истинную историю!"
 ukraine_our_ukraine.2.a: "Ура!"
 ukraine_our_ukraine.3.t: "Демократическая конституция"
 ukraine_our_ukraine.3.d: "Мы внесем поправки в конституцию, которые сделают нашу страну более демократичной!"
 ukraine_our_ukraine.3.a: "Ура!"
 ukraine_our_ukraine.4.t: "Украина предлагает нашей стране инвестировать в нее."
 ukraine_our_ukraine.4.d: "Правительство Украины объявило о запуске программы по привлечению иностранных инвесторов и направило нашему правительству предложение инвестировать в свою экономику."
 ukraine_our_ukraine.4.a: "Давайте инвестировать!"
 ukraine_our_ukraine.4.b: "Мы в этом не заинтересованы."
 ukraine_our_ukraine.5.t: "Инвестиции в Украину."
 ukraine_our_ukraine.5.d: "Они согласились инвестировать в нашу страну."
 ukraine_our_ukraine.5.a: "Хорошо"
 ukraine_our_ukraine.6.t: "Инвестиции в Украину."
 ukraine_our_ukraine.6.d: "Они отклонили наше предложение инвестировать в нашу страну."
 ukraine_our_ukraine.6.a: "Грустно."
 ukraine_our_ukraine.7.t: "Газовый контракт с Украиной"
 ukraine_our_ukraine.7.d: "Украина предложила нам снизить закупочные цены на наш газовый контракт. Взамен будет устранен посредник между нами, тем самым мы будем иметь больше влияния на них. Стоит ли соглашаться?"
 ukraine_our_ukraine.7.a: "Мы подпишем это"
 ukraine_our_ukraine.7.b: "Мы не заинтересованы в этом."
 ukraine_our_ukraine.8.t: "Газовый контракт с Россией."
 ukraine_our_ukraine.8.d: "Они согласились изменить условия нашего газового контракта, теперь мы будем платить меньше!"
 ukraine_our_ukraine.8.a: "Хорошо"
 ukraine_our_ukraine.9.t: "Газовый контракт с Россией."
 ukraine_our_ukraine.9.d: "Они согласились изменить условия нашего газового контракта, теперь мы будем платить меньше!"
 ukraine_our_ukraine.9.a: "Хорошо"
 UKR_zelensky_western: "Путь на Запад"
 UKR_zelensky_western_desc: "Мы будем продолжать наш политический курс с устремлением на Запад."
 UKR_befriend_the_west: "Дружба с Западом"
 UKR_befriend_the_west_desc: "Мы продолжим политику улучшения отношений со странами Запада, и именно в них мы видим наших партнеров и союзников."
 UKR_avakov_befriend: "Дружба с Аваковым"
 UKR_avakov_befriend_desc: "Арсен Аваков оказался самым стойким министром из всех, кого мы видели. Он смог пережить многие правительства, кроме того, он поддерживает батальон \"Азов\" финансово. Если мы укрепим с ним связи, то сможем увеличить численность \"Азова\"."
 UKR_land_reform_zelya: "Земельная реформа"
 UKR_land_reform_zelya_desc: "Мы продолжим земельную реформу, которая была начата уже давно."
 UKR_fasten_nato_join: "Стремление вступить в НАТО"
 UKR_fasten_nato_join_desc: "НАТО - это наша финишная прямая, то, к чему мы стремились с самого начала."
 UKR_peaceful_negotiation_don: "Решить проблему Донбасса мирным путем"
 UKR_peaceful_negotiation_don_desc: "Мы готовы пойти на уступки ради Донбасса и наконец положить конец этому бесконечному конфликту."
 UKR_keep_status_quo: "Сохранить статус-кво"
 UKR_keep_status_quo_desc: "Мы не готовы решить этот вопрос мирным путем. Мы будем идти тем же путем, что и раньше."
 UKR_next_azov_created_tt: "Будет создана новая §Yбригада \"Азов\"§!"
 UKR_our_influence_helps_tt: "§CПоскольку мы влияем на парламент, мы можем принять этот закон с большей вероятностью успеха, несмотря на меньшее количество мест в нашу пользу§!"
 UKR_lose_some_seats_TT: "Мы §Rпотеряем§! несколько мест в §Hпарламенте§!"
 UKR_gain_some_seats_TT: "Мы §Gполучим§! несколько мест в §Hпарламенте§!"
 UKR_is_pro_west_TT: "Является партией западной ориентации"
 UKR_is_pro_east_TT: "Является российской союзной партией"
 UKR_is_neutral_TT: "Является партией, не связанной с какими-либо иностранными государствами"
 UKR_influence_parliament_TT: "Начнет оказывать §pвлияние§! на §Hрпарламент§!"
 UKR_puppet_parliament_TT: "§HПарламент§! будет §Oподконтролен§!\n\n§RНАМ НЕ НУЖНО БУДЕТ ОБРАЩАТЬСЯ В ПАРЛАМЕНТ ДЛЯ ВНЕСЕНИЯ ИЗМЕНЕНИЙ В ЗАКОН§!"
 UKR_dissolve_parliament_TT: "§HПарламент§! будет §Rраспущен§!\n\n§RНАМ НЕ НУЖНО БУДЕТ ОБРАЩАТЬСЯ В ПАРЛАМЕНТ ДЛЯ ВНЕСЕНИЯ ИЗМЕНЕНИЙ В ЗАКОН§!"
 UKR_zelenskiy_socialist_TT: "§YЗеленский§! изменит свое §Bмировозрение§!!!"
 UKR_zelenskiy_formed_TT: "£ukr_servant_of_the_people Партия §YСлуга народа§! будет создана!"
 UKR_zelenskiy_here_TT: "£ukr_servant_of_the_people Партия §YСлуга народа§! должна быть создана!"
 ukr_zelenskiy.1.t: "Неожиданное объявление"
 ukr_zelenskiy.1.d: "Сегодня Владимир Зеленский сделал неожиданное заявление. В этом заявлении он сообщил, что отказывается от идей либертарианства и \"по требованию большинства\" принимает идеи социализма. Также президент заявил, что Украина будет укреплять связи с Западом и постарается привлечь западных инвесторов."
 ukr_zelenskiy.1.a: "Удивительное развитие."
 ukr_zelenskiy.2.t: "Слуга народу"
 ukr_zelenskiy.2.d: "Неожиданная новость всколыхнула всю Украину. Сегодня в результате съезда была создана партия \"Слуга народа\", названная в честь популярного фильма. Многие считают, что эта партия была создана в качестве пиар-акции фильма, другие утверждают, что она создана для продвижения известного комика Владимира Зеленского в качестве кандидата в президенты. Хотя сам Зеленский отрицает свою причастность, его уклончивые ответы могут стать основой для дальнейших спекуляций."
 ukr_zelenskiy.2.a: "Интересно"
 UKR_reform_programm: "Программа реформ"
 UKR_reform_programm_desc: "Мы начнем серию реформ, которые должны привести наше государство к экономическому росту и вывести его из кризиса распада СССР."
 UKR_reform_national_guard: "Распустить Национальную гвардию"
 UKR_reform_national_guard_desc: "Пора проводить реформы. Пора распустить Национальную гвардию и преобразовать её в более эффективную структуру — Внутренние войска."
 UKR_reform_vsu: "Новая военная доктрина"
 UKR_reform_vsu_desc: "Наша армия нуждается в изменениях и модернизации, иначе мы не будем готовы к войне с врагом. Новая доктрина также укрепляет наше сотрудничество с НАТО."
 UKR_check_and_balances: "Система сдержек и противовесов"
 UKR_check_and_balances_desc: "Наше государство сейчас находится в нестабильной политической ситуации. Мы должны найти баланс в политической сфере, чтобы не допустить катастрофы."
 UKR_yushenko_cabinet: "Кабинет Ющенко"
 UKR_yushenko_cabinet_desc: "Виктор Ющенко - уже старый знакомый, хорошо проявивший себя в управленческом опыте. Результаты его деятельности, которые он нам обещал, должны стимулировать рост экономической составляющей нашей страны."
 UKR_welfare_reform: "Реформы социального обеспечения"
 UKR_welfare_reform_desc: "Здравоохранение находится в плачевном состоянии с 1990-х годов. Необходимо начать его реформирование."
 UKR_kosuik: "Косюкская хлебная мануфактура"
 UKR_kosuik_desc: "Отечественный автопром начинает возрождаться, и локомотивом этого процесса станут частные предприниматели. Один из них, Юрий Косюк, планирует создать собственные заводы по производству агропродукции."
 UKR_azovstal_private: "Приватизация Азовстали"
 UKR_azovstal_private_desc: "Мы будем и дальше работать над передачей «Азовстали» в частные руки, поскольку сами не в состоянии обеспечить финансовую поддержку столь крупного предприятия."
 UKR_land_reform: "Земельная реформа"
 UKR_land_reform_desc: "Земельная реформа должна была произойти уже давно, но мы оттягивали ее, как могли. Теперь нам будет проще продавать землю в частные руки."
 UKR_land_trade: "Упростить торговлю землей"
 UKR_land_trade_desc: "Мы будем и дальше содействовать приобретению земельных участков частными инвесторами в нашей стране."
 UKR_bolster_privatization: "Усилить приватизацию земли"
 UKR_bolster_privatization_desc: "Приватизация будет ускорена, и наша страна должна шагнуть в новую рыночную экономику."
 UKR_ukrenergo_reform: "Реформировать Укрэнерго"
 UKR_ukrenergo_reform_desc: "Наша энергетическая структура находится в ужасном положении. Необходимо реформировать \"Укрэнерго."
 UKR_burshtyn_tes: "Расширить Бурштынскую ТЭС"
 UKR_burshtyn_tes_desc: "Мы проведем реконструкцию и усовершенствование Бурштынской ТЭС"
 UKR_diversy_fuel: "Диверсифицировать закупки топлива"
 UKR_diversy_fuel_desc: "Мы должны умело диверсифицировать источники энергии, которые мы закупаем за рубежом; мы не можем полагаться только на одного продавца."
 UKR_short_terms: "Отмена краткосрочных кредитов"
 UKR_short_terms_desc: "Мы полностью отменим такие вещи, как краткосрочные кредиты; они наносят ущерб экономике."
 UKR_bank_lobbyst: "Убрать банковских лоббистов"
 UKR_bank_lobbyst_desc: "В 1990-е годы к власти пришло много банковских лоббистов. Пора избавиться от их влияния на нашу страну."
 UKR_social_cut_down: "Сократить расходы на социальные нужды"
 UKR_social_cut_down_desc: "Мы вынуждены временно сократить социальные расходы, чтобы стабилизировать наши финансовые резервы."
 UKR_struggle_power: "Борьба за власть"
 UKR_struggle_power_desc: "Наше нестабильное положение привело к появлению сильных политических оппонентов; нам необходимо защитить себя от них и убедить избирателей остаться с нами."
 UKR_tax_agro: "Снижение налогов для агрокомпаний"
 UKR_tax_agro_desc: "Мы снизим налоги для агропромышленного комплекса, чтобы стимулировать рост его производства."
 UKR_stimulate: "Стимулировать экономику"
 UKR_stimulate_desc: "Наши меры приносят результаты. Экономика начинает расти."
 UKR_negotiation_left: "Переговоры с левой оппозицией"
 UKR_negotiation_left_desc: "Левые активисты заметно набирают силу. Необходимо найти с ними компромисс."
 UKR_radicalize_without_kuchma: "Покончить с движением «Украина без Кучмы»"
 UKR_radicalize_without_kuchma_desc: "Движение \"Украина без Кучмы\" набирает опасные обороты. Пора с ними разобраться."
 UKR_slowdown_reform_land: "Замедление земельной реформы"
 UKR_slowdown_reform_land_desc: "Мы решили замедлить земельную реформу, потому что она вызвала неоднозначную реакцию в нашем обществе."
 UKR_re_approach_privatbank: "Повторное обращение в ПриватБанк"
 UKR_re_approach_privatbank_desc: "ПриватБанк — крупнейший банк в нашей стране, нам нужно успешно найти с ним компромисс, и это обеспечит нам большие налоговые поступления."
 UKR_concessin_with_donbass: "Уступки банде Донбасса"
 UKR_concessin_with_donbass_desc: "Мы готовы пойти на уступки ради Донбасса, тем самым пытаясь обеспечить его лояльность к нам."
 UKR_invest_mining_companies: "Инвестиции в горнодобывающие компании"
 UKR_invest_mining_companies_desc: "Инвестируя в компании Донбасса, мы обеспечим себе мощную поддержку местных избирателей."
 UKR_donbass_infrastructure: "Развитие инфраструктуры Донбасса"
 UKR_donbass_infrastructure_desc: "Инвестиции в инфраструктуру Донбасса позволят нам также привлечь новых избирателей и увеличить доходы от этого региона."
 UKR_impeachment: "Процедура импичмента"
 UKR_impeachment_desc: "Верховная Рада готовится к нашему импичменту. Мы должны отреагировать на эту угрозу нашей власти, пока не стало слишком поздно."
 UKR_privatization_ukrenergo: "Развитие Укрэнерго"
 UKR_privatization_ukrenergo_desc: "Мы расширяем «Укрэнерго», подключая часть нашей энергосети к европейской синхронной энергосистеме."
 UKR_reach_russian_oligarch: "Достичь российских олигархов"
 UKR_reach_russian_oligarch_desc: "Мы будем привлекать российских олигархов для поддержки нашей политической компании."
 UKR_rus_mobile_operators: "Привлечь российских мобильных операторов"
 UKR_rus_mobile_operators_desc: "Мы предоставим российским операторам мобильной связи доступ на наш рынок."
 UKR_free_economic_zones: "Свободные экономические зоны"
 UKR_free_economic_zones_desc: "Мы создадим несколько экономических зон на нашей территории, где, естественно, будем ждать российских инвесторов в приоритетном порядке."
 UKR_yanuk_cabinet: "Янукович [Yanu_Status]"
 UKR_yanuk_cabinet_desc: "Виктор Янукович и его предстоящая политическая деятельность должны оказать стимулирующее воздействие на экономику, как и деятельность Ющенко."
 UKR_block_land_trading: "Блокировать торговлю землей"
 UKR_block_land_trading_desc: "Земельные сделки будут активно замораживаться, так как это может негативно сказаться на независимости нашего военно-промышленного комплекса."
 UKR_soft_taxation: "Мягкая налоговая реформа"
 UKR_soft_taxation_desc: "Мы проведем мягкую налоговую реформу, которая не сильно разозлит как корпоративных, так и частных лиц."
 UKR_floating_excange: "Плавающий обменный курс"
 UKR_floating_excange_desc: "Мы будем практиковать плавающий обменный курс, но это может дать нам совершенно разные экономические эффекты."
 UKR_small_favor: "Поддержка малого бизнеса"
 UKR_small_favor_desc: "Мы введем льготы для малого бизнеса, стимулирующие экономический рост."
 UKR_doentskstal: "Донецксталь"
 UKR_doentskstal_desc: "Мы создаем новое предприятие на территории Донбасса для оптимизации нашей деятельности в этом регионе."
 UKR_gas_azvostal: "Газопровод в Азовстали"
 UKR_gas_azvostal_desc: "Мы построим газопровод в \"Азовстали\", чтобы улучшить работу предприятия и условия жизни в районах."
 UKR_dorohy_avto: "Автомобильные дороги Украины"
 UKR_dorohy_avto_desc: "Назвать состояние дорог в нашей стране ужасным - значит сделать комплимент. 95% дорог просто пришли в негодность. Мы начнем это исправлять."
 UKR_roshen: "Roshen"
 UKR_roshen_desc: "Знаменитая кондитерская фабрика Roshen расширяет свою деятельность. Мы будем внимательно следить за ее владельцами."
 UKR_luaz_reopen: "Модернизация ЛуАЗ"
 UKR_luaz_reopen_desc: "ЛуАЗ производит устаревшие автомобили. Необходимо модернизировать их в поддержку наших дорожных реформ."
 UKR_ukraine_2000: "Украина 2000"
 UKR_ukraine_2000_desc: "Новое тысячелетие должно принести Украине глобальные конституционные реформы, и мы будем их активно продвигать."
 UKR_gain_rada_support: "Заручиться поддержкой Рады"
 UKR_gain_rada_support_desc: "Полная поддержка Верховной Рады необходима для реализации наших реформ."
 UKR_deal_pro_socialist_media: "Разобраться с просоциалистическими СМИ"
 UKR_deal_pro_socialist_media_desc: "Социалистические партии набирают обороты. Необходимо подавить их СМИ."
 UKR_referendum_const: "Конституционный референдум"
 UKR_referendum_const_desc: "Мы готовы провести общенациональный референдум по поправкам к конституции."
 UKR_push_for_reforms: "Продвигать реформы"
 UKR_push_for_reforms_desc: "Мы продолжим продвигать наши реформаторские идеи в правительство; они нужны нашему государству."
 UKR_arrest_timoshenko: "Арестовать Тимошенко"
 UKR_arrest_timoshenko_desc: "Тимошенко для нас слишком опасный политический противник. Мы ее арестуем."
 UKR_prepare_protest: "Готовиться к протестам"
 UKR_prepare_protest_desc: "Наши действия, безусловно, вызовут серию протестов. Мы должны быть готовы к ним."
 UKR_reform_berkut: "Реформировать Беркут"
 UKR_reform_berkut_desc: "Спецназ \"Беркут\" необходимо реформировать. Без этого мы можем потерять контроль над протестами."
 UKR_deal_yushenko: "Разобраться с Ющенко"
 UKR_deal_yushenko_desc: "Мы разберемся с Ющенко и его политическими амбициями."
 UKR_appoint_yanukovich: "Назначить Януковича"
 UKR_appoint_yanukovich_desc: "Мы назначим Януковича главой правительства. Возможно, он сможет улучшить ситуацию."
 UKR_seek_help_eastern_oligarch: "Обратиться за помощью к восточным олигархам"
 UKR_seek_help_eastern_oligarch_desc: "Наших ресурсов явно недостаточно, чтобы подавить протестное движение; возможно, восточные олигархи помогут нам?"
 UKR_aid_from_minign_companies: "Получить помощь от горнодобывающих компаний"
 UKR_aid_from_minign_companies_desc: "Наши инвестиции в горнодобывающие компании должны окупиться. Их менеджеры будут готовы оказать нам финансовую и другую помощь."
 UKR_negotiate_orange_maidan: "Вести переговоры с оранжевым майданом"
 UKR_negotiate_orange_maidan_desc: "Пришло время вступить в переговоры с протестующими и решить проблему раз и навсегда."
 UKR_const_reform: "Конституционная реформа"
 UKR_const_reform_desc: "Мы наконец-то смогли протолкнуть наши реформы в правительство, благодаря протестному движению."
 UKR_lyvochkin: "Решение Лёвочкина"
 UKR_lyvochkin_desc: "Наш главный советник ясно дал нам понять, что нам придется пойти на компромисс с протестующими, иначе нашу страну ждет хаос."
 UKR_stay_for_fair_election: "Выступать за \"честные\" выборы"
 UKR_stay_for_fair_election_desc: "Мы не собираемся просто так сдавать свою власть. Мы будем стоять до конца."
 UKR_yusha_tt: "§YЭто запретит нам брать фокусы в ветке Кабинета Ющенко§!"
 UKR_yana_tt: "§YЭто позволит нам брать фокусы Кабинета Януковича§!"
 UKR_easterns_tt: "Поддержка жителей £text_icon_ukr_dobro §3восточных областей§! Украины изменится на §Y[?modify_easterns]§! (Текущая поддержка: §Y[?UKR.easterns]§!)\n"
 UKR_westerns_tt: "Поддержка жителей £text_icon_ukr_yasno §tзападных регионов§! Украины изменится на §Y[?modify_westerns]§! (Текущая поддержка: §Y[?UKR.westerns]§!)\n"
 UKR_maidani_tt: "Поддержка §8представителей Майдана§! изменится на §Y[?modify_maidani]§! (Текущая поддержка: §Y[?UKR.maidani]§!)\n"
 UKR_political_situation_decision_category: "Украинская политическая нестабильность"
 UKR_political_situation_decision_category_desc: "[UKR.GetFlag]§YУкраина§! — это огромное государство с множеством проживающих в нём народов, но двумя из них являются основные — [UKR.GetFlag]§Yукраинцы§! и [SOV.GetFlag]§Yрусские§!. Из-за исторических событий [SOV.GetFlag]§Yрусскоязычное§! население в основном сосредоточено на востоке страны, тогда как [UKR.GetFlag]§Yукраинское§! население уже занимает более западные территории. Это географическое разделение постоянно создаёт напряжение в [UKR.GetFlag]§YУкраине§! и в будущем может стать §Rсерьёзной проблемой§! для страны. Кроме того, политический электорат [UKR.GetFlag]§YУкраины§! очень склонен к протестам и выражению своих мнений через достаточно §Rнепокойные§! акции. Необходимо учитывать все эти аспекты и искать возможности для балансировки этих сил.\n\nЕсли поддержка §8Майдана§! §Rопустится ниже 15§!, начнётся беспорядок, что может привести к §Rгражданской войне§!. Чтобы снизить последствия возможной §Rгражданской войны§!, необходимо расширять влияние и полномочия §YСБУ§!, §YНацгвардии§! и других структур. В зависимости от того, чья поддержка окажется §Rменьшей§! (§tЗападников§! или §3Восточников§!), будут развиваться разные сценарии политических беспорядков."
 ukr_west_output_text: "§Y[?UKR.westerns]§!"
 ukr_west_tooltip: "Текущая поддержка §tЗападных регионов§!"
 ukr_maidan_output_text: "§Y[?UKR.maidani]§!"
 ukr_maidan_tooltip: "Текущая поддержка §8Майдана§!"
 ukr_east_output_text: "§Y[?UKR.easterns]§!"
 ukr_east_tooltip: "Текущая поддержка §3Восточных регионов§!"
 UKR_our_agricultrure: "Отечественное сельское хозяйство"
 UKR_our_agricultrure_desc: "Украинский агропром - один из лучших в мире. Мы постараемся не потерять это звание."
 UKR_azovsteel: "Азовсталь"
 UKR_unstable_government_idea: "Недовольство майдана"
 UKR_land_reform_idea: "Земельная реформа"
 UKR_land_reform_idea_desc: "Земельная реформа, начатая в прошлом веке, должна привести к полному перераспределению земельных владений по всей стране. Пока что она находится в процессе."
 UKR_zaims: "Экономические последствия аннулирования кредита"
 UKR_banks_lobbyst_liquidate: "Ликвидация банковских лоббистов"
 UKR_mining_company_help: "Налоговые льготы для горнодобывающих компаний"
 UKR_privatization_idea: "Приватизация"
 UKR_without_kuchma_idea: "Украина без Кучмы"
 UKR_left_opposition_idea: "Левая оппозиция"
 UKR_luaz_idea: "ЛуАЗ"
 UKR_anti_socialist_media: "Антисоциалистические СМИ"
 UKR_crisis_political: "Политический кризис"
 UKR_crisis_political_desc: "Наша страна охвачена политическим кризисом, власти парализованы, а политические силы борются друг с другом за власть."
 ukraine_kuchma.2.t: "Подготовка к протестам"
 ukraine_kuchma.2.d: "Наши действия явно приведут к протестам. Нам нужно подготовиться."
 ukraine_kuchma.2.a: "Мы будем готовы"
 ukraine_kuchma.2.b: "Все решится само собой"
 ukraine_kuchma.11.t: "Попытка импичмента"
 ukraine_kuchma.11.d: "Верховная Рада уже много раз пыталась объявить нам импичмент. Пора решать этот вопрос."
 ukraine_kuchma.11.a: "Нет импичменту"
 ukraine_kuchma.12.t: "Дружба с донецким кланом"
 ukraine_kuchma.12.d: "Мы постараемся привлечь на свою сторону так называемый донецкий клан олигархов, они нам пригодятся в будущем противостоянии с оппозицией."
 ukraine_kuchma.12.a: "Донбасс с нами"
 ukraine_kuchma.12.b: "Мы не будем их поддерживать"
 ukraine_kuchma.13.t: "Янукович станет президентом"
 ukraine_kuchma.13.d: "Мы не признаем результаты второго тура президентской гонки и назначим Януковича президентом Украины."
 ukraine_kuchma.13.a: "Да будет так"
 ukraine_kuchma.14.t: "Протесты на юго-востоке"
 ukraine_kuchma.14.d: "После нашей победы на выборах мы думали, что все закончилось, но сейчас на юго-востоке нашей страны началась активная протестная деятельность. Так называемый \"голубой Майдан\" начал усиливать давление на наше правительство, угрожая серьезными последствиями."
 ukraine_kuchma.14.a: "Нам нужно быть более осторожными."
 ukraine_kuchma.15.t: "Голубой Майдан в Украине"
 ukraine_kuchma.15.d: "Активисты юго-востока Украины продолжают развивать свой проект автономии, в то время как киевские власти заняты сменой кресел в кабинетах Рады. Надвигается большая буря. Сторонники \"голубого Майдана\" обратились к нам за поддержкой. Поможем ли мы им?"
 ukraine_kuchma.15.a: "Мы их поддержим"
 ukraine_kuchma.15.b: "Мы не должны вмешиваться"
 ukraine_kuchma.16.t: "Правительство юго-востока"
 ukraine_kuchma.16.d: "Так называемые активисты Синего Майдана официально заявили о создании своего правительства, и о том, что они не признают киевскую власть. Похоже, их поддержали извне, иначе они бы на такое не решились."
 ukraine_kuchma.16.a: "Срочно отправить туда полицию"
 ukraine_kuchma.17.t: "Голубая революция"
 ukraine_kuchma.17.d: "Сегодня сторонники Синего Майдана во главе с Виктором Януковичем официально объявили о своей независимости и образовании собственной республики Юго-Восточная Украина. На их сторону перешли воинские части, генералы и офицеры."
 ukraine_kuchma.17.a: "Шторм начался."
 ukraine_kuchma.18.t: "Протесты в Галиции"
 ukraine_kuchma.18.d: "Наше решение проигнорировать второй тур президентских выборов привело к нестабильности в стране. Многие жители западных областей перешли к активной фазе протестов, где начались столкновения с полицией."
 ukraine_kuchma.18.a: "Нам нужно быть более осторожными"
 ukraine_kuchma.19.t: "Красный Майдан в Украине"
 ukraine_kuchma.19.d: "Активисты в украинской Галиции начали протесты против незаконных выборов в стране. Ситуация стала настолько напряженной, что речь уже идет о вооруженном восстании, ведь несколько генералов поддерживают повстанцев. Может, нам стоит им помочь?"
 ukraine_kuchma.19.a: "Мы будем их поддерживать."
 ukraine_kuchma.19.b: "Мы не должны вмешиваться."
 ukraine_kuchma.20.t: "Правительство Западной Украины"
 ukraine_kuchma.20.d: "Протесты уже перешли в более острую фазу, и им явно помогают из-за рубежа. Теперь они объявили о создании собственного правительства, не подчиняющегося киевским властям."
 ukraine_kuchma.20.a: "Срочно отправить туда полицию"
 ukraine_kuchma.21.t: "Красная революция"
 ukraine_kuchma.21.d: "Сегодня сторонники так называемого \"красного Майдана\" объявили о своем выходе из Украины и начале вооруженного сопротивления киевскому пророссийскому правительству."
 ukraine_kuchma.21.a: "Шторм начался"
 UKR_spu_start: "Социалистическая партия Украины"
 UKR_spu_start_desc: "После долгих лет борьбы нам удалось завоевать доверие народа. Теперь мы начнем наши великие реформы."
 UKR_spu_rada_position: "Позиции в Раде"
 UKR_spu_rada_position_desc: "Ключ к власти - контроль над легислатурой. Мы должны решить, с кем мы должны работать, чтобы провести нашу политику в Раде."
 UKR_cpu_spu_coalition: "Коалиция КПУ/СПУ"
 UKR_cpu_spu_coalition_desc: "КПУ и СПУ можно назвать братьями. Они всегда участвовали в выборах единым фронтом. Очевидно, что они сформируют коалицию, если кто-то из них победит."
 UKR_ditch_cpu: "Расстояние от КПУ"
 UKR_ditch_cpu_desc: "КПУ и СПУ можно назвать братьями. Они всегда участвовали в выборах как единый фронт, но очевидно, что если КПУ получит власть, то они восстановят коммунистический режим. Мы должны отдалиться от них как можно скорее."
 UKR_cpu_start: "Коммунистическая партия Украины"
 UKR_cpu_start_desc: "Коммунистическая партия Украины."
 UKR_cpu_rada_position: "Позиции в Раде"
 UKR_cpu_rada_position_desc: "Ключ к власти - контроль над легислатурой. Мы должны решить, с кем мы должны работать, чтобы провести нашу политику в Раде."
 UKR_cpu_monocoalition: "Монокоалиция"
 UKR_cpu_monocoalition_desc: "«Монокоалиция» — это термин из украинской политики. Он обозначает правительство, сформированное только одной партией. Создав монокоалицию КПУ, мы могли бы без труда взять под свой контроль законодательную и исполнительную ветви власти и приступить к восстановлению советской системы."
 UKR_back_to_soviet_tracks: "Назад в советскую эпоху"
 UKR_back_to_soviet_tracks_desc: "После распада СССР наша страна только потеряла, упустила и уничтожила все, что осталось от наследия этой великой страны. Мы изменим этот процесс."
 UKR_commie_russia_trade: "Партнерство с Россией"
 UKR_commie_russia_trade_desc: "Мы намерены укреплять дружеские отношения между нашими странами."
 UKR_commie_russia_rjd: "Партнерство с РЖД"
 UKR_commie_russia_rjd_desc: "Российские железные дороги станут для нас отличным партнером, благодаря их помощи мы значительно улучшим нашу инфраструктуру."
 UKR_commie_russia_banks: "Российские банки"
 UKR_commie_russia_banks_desc: "Мы готовы пустить российские банки на свою территорию, их финансовые возможности помогут нам в нашем развитии."
 UKR_commie_russia_gas: "Новый газовый контракт"
 UKR_commie_russia_gas_desc: "Мы готовы заключить новый газовый контракт с Россией, на выгодных для нас условиях."
 UKR_commie_china_trade: "Партнерство с Китаем"
 UKR_commie_china_trade_desc: "Мы намерены укреплять дружеские отношения между нашими странами."
 UKR_commie_china_trains: "Закупка поездов в Китае"
 UKR_commie_china_trains_desc: "Мы закупим несколько поездов в Китае, которые помогут улучшить наши поставки."
 UKR_comsomol: "Возродить комсомол"
 UKR_comsomol_desc: "Необходимо возродить комсомольское движение как идеологическую опору нашей системы в сознании новых поколений."
 UKR_commie_china_infra: "Модернизация железных дорог"
 UKR_commie_china_infra_desc: "Наши китайские коллеги согласились финансировать модернизацию железнодорожной сети нашей страны."
 UKR_commie_china_huawei: "Сотрудничество с Huawei"
 UKR_commie_china_huawei_desc: "Мы будем налаживать тесное сотрудничество с этой китайской компанией."
 UKR_commie_motor_sich: "Расширить МоторСич"
 UKR_commie_motor_sich_desc: "Мы будем инвестировать дополнительные средства в развитие нашего ключевого предприятия - \"МоторСич\"."
 UKR_ukr_pioners: "Возродить пионерство"
 UKR_ukr_pioners_desc: "Пионеров нужно возродить: молодёжь утратила моральные ориентиры и должна быть снова направлена по пути социализма."
 UKR_one_union_for_all: "Единый государственный профсоюз"
 UKR_one_union_for_all_desc: "Мы будем защищать права трудящихся всей страны, создав единый профсоюз."
 UKR_remilitarization: "Ремилитаризация"
 UKR_remilitarization_desc: "У нашего государства должна быть сильная армия, поэтому мы начнем немедленный процесс ремилитаризации."
 UKR_arms_zavods: "Инвестиции в военные заводы"
 UKR_arms_zavods_desc: "Наша военная промышленность была разрушена после распада СССР, пришло время ее возрождать."
 UKR_sbu_kgb: "Методы КГБ"
 UKR_sbu_kgb_desc: "Мы должны вспомнить старую школу КГБ. Это явно повысит профессионализм наших сотрудников."
 UKR_arms_tanks: "Упор на танки"
 UKR_arms_tanks_desc: "Нашим вооруженным силам срочно нужны танки. Мы обеспечим им эту потребность."
 UKR_revolut_in_blr: "Белорусская социалистическая революция"
 UKR_revolut_in_blr_desc: "Наш братский белорусский народ угнетен своими правителями и капиталистами! Освободим их!"
 UKR_revolution_in_russia: "Русская социалистическая революция"
 UKR_revolution_in_russia_desc: "Наш братский русский народ угнетен своими правителями и капиталистами! Давайте освободим их!"
 UKR_befriend_russia_com: "Дружба с Россией"
 UKR_befriend_russia_com_desc: "Мы намерены установить партнерские и дружеские отношения с Россией."
 UKR_befriend_belarus_com: "Дружба с Беларусью"
 UKR_befriend_belarus_com_desc: "Мы намерены установить партнерские и дружеские отношения с Беларусью."
 UKR_central_asia_revolt: "Революции в Центральной Азии"
 UKR_central_asia_revolt_desc: "Мы намерены поднять знамя революции и в этом регионе."
 UKR_caucasus_revolut: "Революции на Кавказе"
 UKR_caucasus_revolut_desc: "Мы намерены поднять знамя революции и в этом регионе."
 UKR_baltic_revolut: "Революции в странах Балтии"
 UKR_baltic_revolut_desc: "Мы намерены поднять знамя революции и в этом регионе."
 UKR_revolut_in_mol: "Молдавская социалистическая революция"
 UKR_revolut_in_mol_desc: "Наш братский молдавский народ угнетен своими правителями и капиталистами! Освободим их!"
 UKR_csto_com_app: "Вступить в ОДКБ"
 UKR_csto_com_app_desc: "Наши братские народы являются членами ОДКБ. Возможно, стоит присоединиться к ним."
 UKR_integration_support: "Интеграция бывших республик"
 UKR_integration_support_desc: "Мы начнем процессы интеграции бывших республик."
 UKR_declare_ussr: "Возродить СССР"
 UKR_declare_ussr_desc: "Мы - истинные наследники СССР! Пришло время возродить это великое государство!"
 UKR_nationalize_everything: "Запустить национализацию"
 UKR_nationalize_everything_desc: "Мы ничего не отдадим капиталистам! Предприятия вернутся в лоно государства!"
 UKR_social_propaganda: "Социальные реформы"
 UKR_social_propaganda_desc: "Мы начнем масштабные социальные реформы, которые позволят нам завоевать сердца бедных."
 UKR_christian_communism_desc: "Запрет религии был одной из ошибок, которую мы не допустим. Христианский коммунизм - наше будущее. В конце концов, сам Иисус был коммунистом!"
 UKR_criminalize_oligrachy: "Криминализировать олигархию"
 UKR_criminalize_oligrachy_desc: "Олигархи уже много лет пьют кровь из нашей страны, распродают собственность, созданную нашими прадедами. Хватит это терпеть!"
 UKR_land_to_people: "Земля - народу!"
 UKR_land_to_people_desc: "Земля должна принадлежать народу! А не кучке олигархов и бандитов."
 UKR_revive_soviet_factories: "Возродить советские заводы"
 UKR_revive_soviet_factories_desc: "Многие предприятия, оставшиеся в наследство от СССР, были разрушены и уничтожены. Мы возродим их вновь."
 UKR_regions_ditch: "Отказаться от коалиции с Партией регионов"
 UKR_regions_ditch_desc: "Мы не будем создавать коалицию с этой партией. Она принесет нам только проблемы."
 UKR_regions_integr: "Коалиция с Партией регионов"
 UKR_regions_integr_desc: "Мы создадим коалицию с этой партией. Это усилит наши политические возможности."
 UKR_socialist_ukraine_effort: "Социалистические реформы"
 UKR_socialist_ukraine_effort_desc: "Мы начнем серию реформ, которые должны укрепить наши политические позиции."
 UKR_pensions_for_elders_incr: "Повысить пенсии"
 UKR_pensions_for_elders_incr_desc: "Мы увеличим пенсионные выплаты, чтобы у граждан было желание выходить на пенсию."
 UKR_full_rabota: "Трудовые реформы"
 UKR_full_rabota_desc: "Мы проведем серьезные реформы в трудовом законодательстве, чтобы улучшить условия труда наших граждан."
 UKR_socialist_democratic_policies: "Социал-демократическая страна"
 UKR_socialist_democratic_policies_desc: "Новое будущее ждет нашу страну, под знаменем социал-демократии."
 UKR_start_to_support: "Начать поддержку бедных"
 UKR_start_to_support_desc: "Наш электорат - граждане с низкими доходами, которые надеются, что наши реформы вытащат их из экономической пропасти, в которую их затянуло предыдущее правительство. Мы поможем им."
 UKR_progressive_taxation: "Прогрессивное налогообложение"
 UKR_progressive_taxation_desc: "Мы намерены ввести прогрессивное налогообложение для большего экономического равенства наших граждан."
 UKR_social_conservative_prog: "Социально-консервативная программа"
 UKR_social_conservative_prog_desc: "Мы намерены провести ряд реформ, которые были вдохновлены представителями социал-консервативной сферы политической сферы нашей страны."
 UKR_ukr_cossack_freedom: "Казачья свобода"
 UKR_ukr_cossack_freedom_desc: "Наш гражданин - как вольный казак, он больше не раб капитала и не раб никому."
 UKR_nationalization_of_big_com: "Национализация крупных компаний"
 UKR_nationalization_of_big_com_desc: "Мы проведем серию национализаций крупных компаний."
 UKR_crusade_against_inequality: "Борьба с неравенством"
 UKR_crusade_against_inequality_desc: "Неравенство в нашем обществе становится все более выраженным, и мы начнем экономическую и политическую программу, чтобы смягчить финансовые границы между различными социальными слоями."
 UKR_reduce_cap_oligrach: "Ослабить влияние олигархов"
 UKR_reduce_cap_oligrach_desc: "Олигархи имеют слишком большое влияние на нашу страну. Пришло время разобраться с этим."
 UKR_people_brotherhood: "Братское единство"
 UKR_people_brotherhood_desc: "Наш народ, народы, населяющие нашу страну, должны быть единым братством, которое будет противостоять угрозам извне."
 UKR_ask_russia_to_give_nukes: "Запросить у России ядерное оружие"
 UKR_ask_russia_to_give_nukes_desc: "Мы намерены запросить у России некоторые запасы ядерного оружия для защиты нашей страны от внешних угроз."
 UKR_reduce_foreign_influence: "Уменьшить иностранное влияние"
 UKR_reduce_foreign_influence_desc: "Мы ослабим иностранное влияние на нашу страну, независимость - наша основа."
 UKR_labourr_unions: "Поддержка профсоюзов"
 UKR_labourr_unions_desc: "Мы будем активно защищать отечественные профсоюзы для создания позитивного рабочего климата в стране."
 UKR_immigartion_easing: "Содействовать иммиграции"
 UKR_immigartion_easing_desc: "Мы будем облегчать иммиграционные процессы. Наши границы не должны быть закрыты стенами."
 UKR_uindependence_prop: "Защитить отечественных инвесторов"
 UKR_uindependence_prop_desc: "Мы не должны отказываться от внутреннего инвестора, только так мы сможем усилить рост нашей экономики."
 UKR_dont_touch_west_inv: "Защитить западных инвесторов"
 UKR_dont_touch_west_inv_desc: "Мы сосредоточим наши усилия на защите западного инвестора."
 UKR_pro_russian_approach: "Пророссийское направление"
 UKR_pro_russian_approach_desc: "Мы выберем Россию в качестве ориентира. Исторически нам по пути только с ней."
 UKR_pro_western_approach: "Про-западное направление"
 UKR_pro_western_approach_desc: "Мы выбрали свой путь - путь на Запад."
 UKR_request_protection_from_rus: "Просить защиты у России"
 UKR_request_protection_from_rus_desc: "Мы постараемся заключить соглашения о защите и обороне, чтобы наша страна была под защитой России."
 UKR_apply_economic_union: "Присоединиться к российскому экономическому пространству"
 UKR_apply_economic_union_desc: "Экономическое сотрудничество с Россией обеспечит нам экономический рост и выгодные контракты."
 UKR_donbas_peaceful: "Мирное решение проблемы сепаратизма"
 UKR_donbas_peaceful_desc: "Мы готовы мирно решить вопрос с отделившимися от нас территориями."
 UKR_csto_apply: "Вступить в ОДКБ"
 UKR_csto_apply_desc: "Мы намерены стать частью ОДКБ. Мы видим, что только члены этого альянса действительно заинтересованы в нашей защите."
 UKR_western_socialists_coalition: "Коалиция с западными партиями"
 UKR_western_socialists_coalition_desc: "Мы намерены создать коалицию с прозападными партиями."
 UKR_harsh_separat_dealkill: "Покончить с сепаратистами"
 UKR_harsh_separat_dealkill_desc: "Мы готовы освободить наши территории."
 UKR_apply_eu_reforms: "Принять проевропейские реформы"
 UKR_apply_eu_reforms_desc: "Мы намерены следовать европейскому политическому курсу."
 UKR_nato_commitment: "Реформы НАТО"
 UKR_nato_commitment_desc: "Мы намерены провести военную реформу в соответствии со стандартами НАТО для будущего членства там."
 UKR_pmr_invite_union: "Предложить Приднестровью объединиться"
 UKR_pmr_invite_union_desc: "Мы намерены пойти дальше и создать новое государство в Европе, на которое не смогут повлиять внешние силы. У нас есть подходящий кандидат для увеличения этого государства."
 UKR_belarus_invite: "Предложите Беларуси объединиться"
 UKR_belarus_invite_desc: "Мы намерены пойти дальше и создать новое государство в Европе, на которое не могут повлиять внешние силы. У нас есть подходящая кандидатура для увеличения этого государства."
 UKR_hungary_invite: "Предложить Венгрии объединиться"
 UKR_hungary_invite_desc: "Мы намерены пойти дальше и создать новое государство в Европе, на которое не смогут повлиять внешние силы. У нас есть подходящий кандидат для увеличения этого государства."
 UKR_moldova_invite: "Предложить Молдове объединиться"
 UKR_moldova_invite_desc: "Мы намерены идти дальше и создать новое государство в Европе, на которое не могут повлиять внешние силы. У нас есть подходящий кандидат для увеличения этого государства."
 ukraine_rada.2.t: "Коалиция с СПУ?"
 ukraine_rada.2.d: "В течение долгого времени социалисты были нашими союзниками, несмотря на наши разногласия. Большинство членов СПУ раньше были членами нашей партии, и долгая история отношений делает коалицию очевидным выбором, но социалисты постепенно отдаляются от нас, становясь гораздо более умеренными и пронизанными ревизионизмом, поэтому нам не позволят проводить самую радикальную политику в рамках общего правительства."
 ukraine_rada.2.b: "К черту СПУ. Провозгласить монокоалицию!"
 ukraine_rada.2.a: "Давайте начнём переговоры о создании коалиции"
 ukraine_rada.1.t: "Коалиция с КПУ?"
 ukraine_rada.1.d: "В течение долгого времени коммунисты были нашими союзниками, несмотря на разногласия. Большинство членов нашей партии были членами КПУ, и долгая история отношений делает коалицию необходимой, но коммунисты не желают идти в ногу со временем, отстаивая регрессивные идеи и поддерживая людоедские инициативы, и коалиция с ними может также позволить некоторым радикальным членам КПУ получить власть."
 ukraine_rada.1.b: "К черту КПУ!"
 ukraine_rada.1.a: "Давайте начнём переговоры о создании коалиции"
 ukraine_kommi.1.t: "Украина просит ядерное оружие"
 ukraine_kommi.1.d: "Неожиданное заявление поступило от украинского правительства. Они хотят получить от нас ядерное оружие, чтобы защитить себя от внешнего нападения. Такое опасное решение требует от нас взвесить все \"за\" и \"против\"."
 ukraine_kommi.1.a: "Мы дадим им ядерное оружие"
 ukraine_kommi.1.b: "Мы не дадим им ядерное оружие"
 ukraine_kommi.2.t: "Российское ядерное оружие"
 ukraine_kommi.2.d: "Они согласились предоставить нам часть ядерного оружия."
 ukraine_kommi.2.a: "Хорошо"
 ukraine_kommi.3.t: "Российское ядерное оружие"
 ukraine_kommi.3.d: "Они отказались предоставить нам часть ядерного оружия."
 ukraine_kommi.3.a: "Печально"
 ukraine_kommi.4.t: "Новое коммунистическое государство"
 ukraine_kommi.4.d: "Наша революция увенчалась успехом. Старый режим здесь пал, но мы пока не можем действовать в одиночку. Украина предложила поддержать наше правительство, пока мы встанем на ноги."
 ukraine_kommi.4.a: "Мы принимаем их поддержку"
 ukraine_kommi.5.t: "Украина предлагает военное сотрудничество"
 ukraine_kommi.5.d: "Правительство Украины заявляет, что готово подписать ряд документов о военно-политическом сотрудничестве между нашими странами."
 ukraine_kommi.5.a: "Мы за дружбу с Украиной"
 ukraine_kommi.5.b: "Мы не будем ничего подписывать"
 ukraine_kommi.6.t: "Военное сотрудничество с Россией"
 ukraine_kommi.6.d: "Они согласились подписать с нами соглашения о военно-политическом сотрудничестве."
 ukraine_kommi.6.a: "Хорошо"
 ukraine_kommi.7.t: "Военное сотрудничество с Россией"
 ukraine_kommi.7.d: "Они отказались подписывать с нами соглашения о военно-политическом сотрудничестве."
 ukraine_kommi.7.a: "Печально"
 ukraine_kommi.8.t: "Союз демократических государств"
 ukraine_kommi.8.d: "Украинское правительство предлагает создать единое демократическое государство на просторах Европы, некий третий центр силы. Согласимся ли мы потерять независимость ради какой-то мечты о третьей силе?"
 ukraine_kommi.8.a: "Независимость - это фикция"
 ukraine_kommi.8.b: "Никогда"
 ukraine_kommi.9.t: "Союз демократических государств"
 ukraine_kommi.9.d: "Они отказались от нашего предложения! Это было ожидаемо, но так жалко с их стороны."
 ukraine_kommi.9.a: "Они не понимают"
 ukraine_kommi.10.t: "Украина просит защиты"
 ukraine_kommi.10.d: "Украинское правительство просит нас предоставить им гарантии защиты их независимости. Неожиданная просьба, но, возможно, нам стоит ее рассмотреть."
 ukraine_kommi.10.a: "Мы будем их защищать"
 ukraine_kommi.10.b: "Никогда"
 ukraine_kommi.11.t: "Российская гарантия защиты"
 ukraine_kommi.11.d: "Российское правительство согласилось предоставить нам гарантии независимости!"
 ukraine_kommi.11.a: "Хорошо"
 ukraine_kommi.12.t: "Российская гарантия защиты"
 ukraine_kommi.12.d: "Российское правительство отказалось предоставить нам гарантии независимости."
 ukraine_kommi.12.a: "Черт"
 ukraine_kommi.13.t: "Газовый контракт с Украиной"
 ukraine_kommi.13.d: "Украина предложила нам снизить закупочные цены на наш газовый контракт. Взамен будет устранен посредник между нами, тем самым мы будем иметь больше влияния на них. Стоит ли соглашаться?"
 ukraine_kommi.13.a: "Мы подпишем это"
 ukraine_kommi.13.b: "Мы не заинтересованы в этом."
 ukraine_kommi.14.t: "Газовый контракт с Россией"
 ukraine_kommi.14.d: "Они согласились изменить условия нашего газового контракта, теперь мы будем платить меньше!"
 ukraine_kommi.14.a: "Хорошо"
 ukraine_kommi.15.t: "Газовый контракт с Россией"
 ukraine_kommi.15.d: "Они согласились изменить условия нашего газового контракта, теперь мы будем платить меньше!"
 ukraine_kommi.15.a: "Хорошо"
