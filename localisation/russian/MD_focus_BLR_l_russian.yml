 belarus_another.6.t: "Культ Лукашенко"
 belarus_another.6.d: "Александр Лукашенко является бессрочным президентом Республики Беларусь уже очень давно. За время его правления вокруг него сформировался целый культ «Батки». Этот культ отличает его от других диктаторов СНГ, но также требует от него особого подхода к взаимодействию со своим народом. Индикатор «Поддержка Батки» показывает, насколько сильна поддержка Александра Григорьевича Лукашенко среди всех слоев населения. В зависимости от различных действий этот индикатор будет увеличиваться или уменьшаться, предоставляя различные бонусы или штрафы."
 belarus_another.6.a: "Наш батька Лукашенко, мать-Беларуси"
