 ANTARCTICA_STATION_SHOW_BP_TEXT_DELAYED: "§Y필요 조건:§!\n[!antarctica_station_show_blueprint_button_click_enabled]\n§Y효과:§!\n선택된 기지의 청사진 패널을 열거나 닫습니다."
 ANTARCTICA_STATION_FIND_OR_CREATE_TEXT: "자국 기지 설립/찾기"
 ANTARCTICA_STATION_FIND_OR_CREATE_TEXT_DELAYED: "§Y효과:§!\n자국의 남극 기지를 선택하고 청사진을 엽니다.\n\n통제 중인 기지가 없다면 내륙 구역에 기지 설립을 시작합니다.\n- 설립 비용: §R$15.00b§! (남극의 겨울 기간에는 2배).\n- 설립 시간: §Y45일§! (남극의 겨울 기간에는 2배).\n\n현재 설립 남은 기간: §Y[?antarctica_station_setup_days_remaining|0]§!일"
 ANTARCTICA_STATION_FUEL_CAPACITY_TEXT: "[MD_antarctica_fuel_capacity_or_renewable]"
 ANTARCTICA_STATION_FUEL_CAPACITY_DAYS_TEXT: "연료 용량: §Y[?selected_antarctica_station_output_fuel_capacity_days|0]§!일치"
 ANTARCTICA_STATION_BLACKOUT_TEXT: "전력원: §R정전§!"
 ANTARCTICA_STATION_FULL_RENEWABLE_TEXT: "전력원: §G100% 재생 에너지§!"
 ANTARCTICA_STATION_ENERGY_BALANCE_TEXT: "에너지 균형: [?selected_antarctica_station_output_power|+0] kW / §Y[?selected_antarctica_station_output_power_total|0]§! kW"
 ANTARCTICA_STATION_AVAILABLE_STAFF_TEXT: "가용 인력: [?selected_antarctica_station_output_required_staff|+0] / §Y[?selected_antarctica_station_output_total_staff|0]§!"
 ANTARCTICA_STATION_MAINTENANCE_COST_TEXT: "유지 비용: $$[?selected_antarctica_station_output_upkeep_cost|-]b"
 ANTARCTICA_STATION_SEND_SUPPLIES_TEXT: "보급품 발송"
 ANTARCTICA_STATION_SEND_SUPPLIES_TEXT_DELAYED: "§Y필요 조건:§!\n[!antarctica_station_send_supplies_button_click_enabled]\n§Y효과:§!\n기지 연료를 최대 용량까지 보충합니다.\n비용: §R연료 1,000당 $0.25b§! (남극의 겨울 기간에는 2배).\n명령 즉시 국고에서 차감되며, 배송 시간이 지나면 연료가 도착합니다.\n\n§Y배송 시간:§! §G15일 (11월~3월)§! 또는 §R30일 (4월~10월)§!."
 ANTARCTICA_STATION_SEND_OBSERVERS_TEXT: "옵서버 파견"
 ANTARCTICA_STATION_SEND_OBSERVERS_TEXT_DELAYED: "§Y필요 조건:§!\n[!antarctica_station_send_observers_button_click_enabled]§Y눈보라 상태:§! [MD_antarctica_observer_blizzard_status]\n\n§Y효과:§!\n선택된 기지로 옵서버 임무단을 파견합니다.\n대상 국가에는 즉시 통보됩니다.\n옵서버는 §Y7일§! 후에 도착하여 불법 실험실 활동이나 개방형 루프 설비 사용 여부를 사찰합니다."
 ANTARCTICA_STATION_DISMANTLE_TEXT: "기지 해체"
 ANTARCTICA_STATION_DISMANTLE_TEXT_DELAYED: "§Y필요 조건:§!\n[!antarctica_station_dismantle_button_click_enabled]\n§Y효과:§!\n선택된 기지의 해체를 시작합니다.\n해체 시간은 설치된 모듈에 따라 달라집니다: 기본 §Y30일§! + 설치된 모듈당 §Y20일§!.\n현재 해체 남은 시간: §Y[?antarctica_station_dismantle_days_remaining|0]§!일"
 ANTARCTICA_STATION_SEND_OBSERVERS_COUNTRY_LOCK_TT: "현재 귀국에서 진행 중인 다른 §Y옵서버 임무§!가 없습니다."
 ANTARCTICA_STATION_SEND_OBSERVERS_STATION_LOCK_TT: "선택된 기지로 §Y오는 옵서버§!가 없습니다."
 ANTARCTICA_STATION_SEND_OBSERVERS_BLIZZARD_TT: "남극에 §Y눈보라§!가 발생하지 않았습니다 (남은 시간: §Y[?global.antarctica_blizzard_days_remaining]§!일)."
 ANTARCTICA_STATION_SEND_SUPPLIES_QUEUE_TT: "현재 선택된 기지로 진행 중인 §Y보급품 배송§!이 없습니다."
