 blr_union_with_russia_info: "[SOV.GetName] va nous manipuler\nLe joueur sera transféré vers [SOV.GetName]"
 BLR_belarus_nati_modifier: "Politique d'État de la Biélorussie"
 BLR_belarus_nati_modifier_desc: "L'arrivée au pouvoir des forces nationalistes en Biélorussie a eu de profondes répercussions sur sa politique intérieure et extérieure. La priorité a été donnée à la puissance et à la force de la nation, à la propagande du grand passé et au revanchisme pour la grandeur biélorusse perdue."
 BLR_belarus_police_modifier: "Sécurité intérieure de la Biélorussie"
 BLR_belarus_police_modifier_desc: "Le gouvernement biélorusse possède une riche expérience, depuis l’époque où il faisait partie de l’URSS, en matière de répression de la dissidence et des agents ennemis."
 BLR_belarus_kommi_modifier: "La politique de la Biélorussie communiste"
 BLR_belarus_kommi_modifier_desc: "Le gouvernement communiste en Biélorussie s'efforce activement de faire revivre, tant dans la propagande que dans l'action, tout ce qu'il y avait de meilleur à l'époque soviétique."
 BLR_Polonez: "Polonez"
 BLR_btr60: "BTR-60"
 BLR_btr70: "BTR-70"
 BLR_kobra_k: "Cobra-K"
 tracktors_TT: "De nouveaux tracteurs seront produits"
 BLR_new_railways: "Nouveaux chemins de fer"
 BLR_constitution_BSSR: "La Constitution de la RSS de Biélorussie"
 BLR_constitution_BSSR_desc: "Pour commencer, il est nécessaire de rétablir la Constitution de la BSRS."
 BLR_Excursion_Vilnius: "Excursion à Vilnius"
 BLR_Excursion_Vilnius_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Vilnius. We can help them organize it. A border crossing from our territory is theoretically possible, but will Lithuania declare war on us afterwards?"
 BLR_vilnius_return: "Intégration de Vilnius"
 BLR_vilnius_returns: "Intégration de Vilnius"
 BLR_belorusisation_vilnius: "Biélorussienisation de Vilnius"
 BLR_belorusisation_vilnius_desc: "Vilnius has long been a disputed region that we sought to possess, but now that we have secured it, we are ready to promote to the masses the idea of settling the region with Belarusians."
 BLR_new_democratic_constitution: "Nouvelle Constitution Démocratique"
 BLR_new_democratic_constitution_desc: "It is time to adopt a new constitution consistent with Western democracy."
 BLR_Great_stone_china: "Grande pierre de Chine"
 BLR_national_library: "Bibliothèque nationale de Biélorussie"
 BLR_Transnistria_enemy: "Résoudre le problème de la Transnistrie"
 BLR_Transnistria_enemy_desc: "Transnistria is a small, unrecognized state that has long been a headache for Moldova. We are ready to help them solve this problem — by taking these lands for ourselves, of course."
 BLR_transnistria_claims: "Revendications territoriales sur §Y[PMR.GetNamewithFlag]§!"
 BLR_batka_krut_TT: "Nous §Rnettoierons§! §Yla sphère politique§!, ne laissant que §Gquelques partis loyaux envers nous§! et nous §Gcréerons un véritable parti patriotique§! pour §YLukashenko§!"
 belarus_politics.1.t: "La nouvelle réalité politique"
 belarus_politics.1.d: "Bien que la victoire sur les manifestants ait été monumentale, un vaste réseau d'organisations et de partis d'opposition n'attend que le moment de détruire notre pays. Pour éviter cela, nous devons purifier complètement le champ politique des politiciens et organisations inutiles, ne laissant que les partis qui nous sont fidèles. Nous pourrions également avoir besoin de notre propre parti politique pour contrôler la sphère politique. Ou bien, nous pouvons laisser les choses telles qu'elles sont, mais l'ennemi conservera les outils pour nous influencer sur le plan intérieur."
 belarus_politics.1.a: "Secouez-les !"
 belarus_politics.1.b: "N'énervons plus les gens."
 BLR_revoult_army_gco_drone_desc: "We will actively use drones in our army to improve its effectiveness."
 BLR_potato_empire_idea: "L'Empire de la pomme de terre"
 BLR_country_for_life_idea: "Un pays pour la vie"
 BLR_pension_reform_idea: "Réforme des pensions"
 BLR_agriculture2: "Intensifier les entreprises rurales privées"
 BLR_agriculture2_desc: "Further privatization of Belarus' agricultural sector."
 BLR_country_for_life_idea_desc: "'Country for Life' is a slogan and movement associated with Belarusian blogger and activist Sergei Tikhanovsky. It represents a vision of a Belarus where ordinary citizens can live freely and without fear."
 BLR_pension_reform_idea_desc: "Les fonds de pension sont essentiels au fonctionnement de notre société et certains changements doivent être apportés pour qu’ils fonctionnent mieux."
 BLR_assembly_shop_of_europe: "Atelier d'assemblage de l'Europe"
 BLR_assembly_shop_of_europe_desc: "As perhaps one of the most overlooked economies, Belarus has the potential to overtake Russia economically. But that will only happen if we focus on fixing the root problems that exist, as for years we have neglected even the most basic investments into our economy."
 BLR_increase_livestock_imports: "Augmentation des importations de bétail"
 BLR_increase_livestock_imports_desc: "§C'This milk tastes funny'§!\n\nOur people need animals, not just to eat, but also to produce goods. Cows are particularly valuable for their dairy output. With many use cases, dairy could give a serious boost to our agricultural sector."
 BLR_proportional_mining: "Exploitation minière proportionnelle"
 BLR_proportional_mining_desc: "We cannot dig for resources just anywhere we want; proper infrastructure must be established beforehand. We must establish mines only in areas that warrant the need for resources, and will only construct new mines in areas with an industrial sector. Of course, this will worsen air quality, but at least [BLR.GetLeader] will be able to finance some nice palaces."
 BLR_industrial_wide_reform: "Réforme à l'échelle industrielle"
 BLR_industrial_wide_reform_desc: "While the heart of Belarusian industry is beating strong, it could beat even stronger. We will initiate a series of reforms to enhance knowledge on sustainable industrial expansion."
 BLR_fostering_automotive_innovation: "Favoriser l'innovation automobile"
 BLR_fostering_automotive_innovation_desc: "While Belarus is not yet world-renowned for its automotive industry, that does not mean the idea is entirely out of the picture. With the right amount of motivation and propaganda (and maybe some funding), we will kick-start an automotive titan to rival the likes of Germany. Maybe."
 BLR_the_fate_of_belarusian_steel_works: "Destin de l'Usine sidérurgique biélorusse"
 BLR_the_fate_of_belarusian_steel_works_desc: "Fondée en 1984, l'Usine sidérurgique biélorusse SA a fourni à l'industrie biélorusse de l'acier de classe mondiale, qu'on ne trouvera nulle part ailleurs sur Terre."
 BLR_tractors: "Le tracteur le plus puissant d'Europe"
 BLR_tractors_desc: "One thing Belarusian industry is known for is its reliable tractors, with Belarusian farmers being the envy of Europe. Funding the tractor industry would benefit the economy even further, as we will be able to equip our farms with state-of-the-art equipment."
 BLR_buses: "The East's Bus"
 BLR_buses_desc: "Luckily, our brilliant engineers at several companies have been able to decode the impossible task of constructing somewhat reliable buses. With that in mind, our buses could only improve. With a little luck and some funding, we will get to work and construct the best bus found anywhere east of Britain."
 BLR_trains: "Revitaliser Bielaruskaja Čyhunka"
 BLR_trains_desc: "§R'Faster than any bullet train!'§!\n\nBielaruskaja Čyhunka, also known as Belarusian Railway by the English-speaking world, has been at the forefront of building railway infrastructure for the many citizens living within our borders. Reporting directly to the Ministry of Transport, Belarusian Railway is one of the successor companies from the Soviet era and is currently projected to continue its monopoly on Belarusian railways. We can revitalize Bielaruskaja Čyhunka and also bankroll certain train producers to best fit the needs of Belarusian commuters."
 BLR_infrastructure_contracts: "Proposed Infrastructure Contracts"
 BLR_new_paths: "Tous les chemins mènent à [BLR.capital.GetCapitalVictoryPointName]"
 BLR_revamp_railroads: "Chemins de fer rénovés"
 BLR_revamp_railroads_desc: "Le système ferroviaire national souffre d'équipements obsolètes et de services lents. Le rénover avec des normes modernes réduira les temps de trajet et les problèmes de maintenance. Un système ferroviaire plus fort stimule les transports civils et industriels."
 BLR_belneftekhim: "Renforcer Belneftekhim"
 BLR_belneftekhim_desc: "Belneftekhim joue un rôle central dans la pétrochimie biélorusse, mais elle a besoin de modernisation pour rester compétitive. Investir dans de nouvelles technologies et des processus de raffinage augmente la qualité de la production. Ces améliorations aident à sécuriser notre position sur les marchés mondiaux."
 BLR_the_belaruskali_monopoly: "Maintenir le monopole de Belaruskali"
 BLR_the_belaruskali_monopoly_desc: "Belaruskali est l'un de nos actifs les plus précieux, et maintenir son monopole intact garantit des revenus prévisibles. Renforcer sa position sur le marché aide à protéger l'influence biélorusse dans l'industrie de la potasse. La stabilité dans ce secteur soutient une planification économique plus large."
 BLR_uplift_grodno_azot: "Revaloriser Grodno Azot"
 BLR_uplift_grodno_azot_desc: "Grodno Azot produit des produits chimiques essentiels pour l'agriculture et l'industrie. Moderniser ses installations augmentera l'efficacité et réduira les déchets. Soutenir cette usine renforce notre secteur chimique dans son ensemble."
 BLR_tend_to_oil_shale: "À la recherche du schiste bitumineux"
 BLR_tend_to_oil_shale_desc: "La Biélorussie possède des gisements potentiels de schiste bitumineux largement inexplorés. Étudier et développer ces champs pourrait diversifier nos sources d'énergie. Même de petites découvertes réduiraient la dépendance aux importations étrangères."
 BLR_award_chinese_contractors: "Attribuer des contrats à des entreprises chinoises"
 BLR_award_chinese_contractors_desc: "Les entreprises de construction chinoises proposent des offres compétitives et une livraison rapide des projets. Leur attribuer des contrats majeurs peut accélérer nos plans d'infrastructure. Cette démarche renforce également les liens diplomatiques et économiques avec Pékin."
 BLR_award_luxembourgian_contractors: "Apaiser les Luxembourgeois"
 BLR_award_luxembourgian_contractors_desc: "Les entreprises luxembourgeoises fournissent un travail de haute qualité et s'attendent à un accès équitable à nos marchés. Leur accorder des contrats clés améliore les relations et signale notre volonté de coopérer. Leur participation peut également relever les normes de construction dans le pays."
 BLR_potash_safety_and_hazards_regulation: "Règlementation de sécurité et des risques de la potasse"
 BLR_potash_safety_and_hazards_regulation_desc: "L'extraction de la potasse comporte des risques importants si les règles de sécurité sont ignorées. Établir des réglementations plus strictes protège les travailleurs et prévient les accidents. Une industrie plus sûre garantit également une production plus stable et fiable."
 BLR_bountiful_fields: "Cultiver des champs abondants"
 BLR_bountiful_fields_desc: "La Biélorussie a un sol riche mais des rendements inconstants. Étendre le soutien aux agriculteurs et introduire de meilleures pratiques peut transformer nos champs en récoltes fiables. Cet effort améliore la sécurité alimentaire et renforce les communautés rurales."
 BLR_speed_up_land_reformation: "Accélérer la réforme foncière"
 BLR_speed_up_land_reformation_desc: "La réforme foncière a progressé lentement et de manière inégale à travers le pays. Accélérer ce processus aidera les agriculteurs à gagner en stabilité et encouragera l'investissement. Des règles de propriété plus claires améliorent la productivité agricole globale."
 BLR_reinforce_government_support_for_agriculture: "Renforcer le soutien agricole"
 BLR_reinforce_government_support_for_agriculture_desc: "L'agriculture reste un pilier de la société biélorusse et nécessite un soutien gouvernemental fort. Augmenter les subventions, la formation et l'accès à l'équipement augmentera les rendements et protégera les petits agriculteurs. Un secteur agricole résilient soutient la stabilité nationale."
 BLR_achieving_self_sufficiency: "Atteindre l'autosuffisance"
 BLR_achieving_self_sufficiency_desc: "Reducing reliance on imports strengthens national independence and economic stability. By developing domestic industries and improving productivity, Belarus can meet more of its own needs. Achieving this goal will take time but is essential for long-term resilience."
 BLR_streamline_taxation: "Simplifier la fiscalité"
 BLR_streamline_taxation_desc: "Un système fiscal compliqué ralentit la croissance des entreprises et frustre les investisseurs. Simplifier les règles encourage l'esprit d'entreprise et réduit les retards bureaucratiques. Une fiscalité plus claire peut augmenter les recettes en facilitant la conformité."
 BLR_counterurbanization: "Politiques de contre-urbanisation"
 BLR_counterurbanization_desc: "Les zones rurales continuent de perdre des habitants au profit des villes, créant un développement inégal. Les politiques de contre-urbanisation visent à soutenir les villages par de nouveaux investissements et des services améliorés. Renforcer la vie rurale aide à équilibrer la croissance à travers le pays."
 BLR_potash_large_reserves: "Grandes réserves de potasse"
 BLR_agriculture_reduced: "Agriculture réduite"
 BLR_belneftekhim_idea: "Belneftekhim"
 BLR_streamlined_taxation: "Fiscalité simplifiée"
 BLR_safety_protocols_in_place: "Protocoles de sécurité mis en place"
 BLR_disease_amongst_livestock: "Maladie parmi le bétail"
 BLR_belarusian_trains: "Les locomotives du Stede"
 BLR_treading_on_thin_steel: "Marcher sur de l'acier fin"
 BLR_treading_on_thin_steel_desc: "In terms of our economy, we are treading on thin steel now that all the ice has melted. We will need to reinforce this steel by further advancing our industry, whether through resources or production."
 BLR_agricultural_shock: "Choc agricole"
 BLR_agricultural_shock_desc: "Nous avons procédé beaucoup trop rapidement à la transition de notre économie vers une orientation industrielle, et par conséquent, notre secteur agricole a subi un coup sévère."
 BLR_automotive_industry: "Secteur automobile biélorusse"
 BLR_automotive_industry_desc: "4 portes et peut-être 1 roue, c'est tout ce qu'il faut pour une pièce de machinerie biélorusse fiable, digne de confiance et moderne. Avec notre expansion dans le secteur automobile, nous sommes sûrs de battre ces incapables qui travaillent pour Mercedes ou BMW."
 BLR_activates_fermer_mission_TT: "£text_icon_kaldanger Activera une §Hmission§! nous obligeant à construire des §Hdistricts agricoles§! dans certaines régions\n - Ne pas répondre à ces exigences pourrait entraîner un mécontentement agraire\n - Si elle réussit, nous recevrons un coup de pouce à l'économie nationale"
 BLR_livestock_warning_TT: "£text_icon_kaldanger Il y aura un risque de maladie §Rtueuse§! pour notre bétail selon notre niveau de recherche en §Hingénierie génétique§!\n\n§H500§! vaches seront importées d'un État ami"
 BLR_steel_warning_TT: "£text_icon_kaldanger Si nous lançons des réformes pour orienter notre économie vers une §Horientation industrielle§! sans avoir d'abord §H11 industries civiles§!, nous pourrions connaître une courte crise"
 BLR_potash_purchase_TT: "Nous tenterons d'acheter de l'§Héquipement de sécurité§! pour nos travailleurs, mais sans promesse"
 BLR_oil_shale_TT: "Every state with at least §H3 Strategic Resource Reserves§! will receive £oil_texticon  §H2§! oil"
 BLR_factory_to_steel_TT: "Nous commencerons des §Hopérations minières§! dans chaque État avec au moins §H1 industrie civile§!"
 belarus_md.1.t: "Une crise agricole se profile"
 belarus_md.1.d: "Suite à notre soudaine réorientation vers une économie industrielle, notre secteur agricole a subi un choc brutal car le soutien gouvernemental a été retiré sans aucune infrastructure appropriée pour nous rattraper. En conséquence, notre secteur agricole a subi un coup qui mettrait un an à se rétablir complètement."
 belarus_md.1.a: "Bon sang"
 belarus_md.2.t: "Privatiser ou ne pas privatiser ?"
 belarus_md.2.d: "The OJSC Belarusian Steel Works was founded in 1984 during the Soviet era. Since then, much has changed, and the collapse of the Union has led us to open our markets to some degree. There have been calls from within the state to privatize the company and tap into the revenue it would generate, but others are warning us against letting such an important enterprise pass into private hands."
 belarus_md.2.a: "Nous ne privatiserons pas !"
 belarus_md.2.b: "La privatisation est la seule solution"
 belarus_md.3.t: "Une maladie se propage rapidement parmi le bétail"
 belarus_md.3.d: "Suite à l'importation d'environ 500 vaches d'un État ami, nos analystes experts ont commencé à remarquer une forte augmentation de la mortalité du bétail à travers la Biélorussie. Des recherches approfondies ont déterminé qu'une vache importée était porteuse de l'encéphalopathie spongiforme bovine, également connue sous le nom de 'maladie de la vache folle'. En conséquence, certains citoyens ont déjà été admis à l'hôpital après avoir contracté une variante de la maladie par une vache."
 belarus_md.3.a: "Si seulement les choses s'étaient bien passées"
 BLR_peleng_desc: "Peleng (JSC Peleng) est une entreprise biélorusse basée à Minsk, spécialisée dans le développement et la production de systèmes optoélectroniques à usage militaire et civil. Elle est leader du secteur optoélectronique en Biélorussie."