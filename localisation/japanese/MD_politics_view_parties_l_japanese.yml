 SOO.Communist-State: "£SOO_emerging_communism (HIKP) 南オセチア共産党"
 SOO.Communist-State_icon: "£SOO_emerging_communism"
 SOO.Communist-State_desc: "南オセチア共産党は南オセチアで最も古い政党である。自国における共産主義理念の復興のために積極的に闘っている。"
 SOO.Conservative: "£SOO_emerging_reactionary (UO) 統一オセチア"
 SOO.Conservative_icon: "£SOO_emerging_reactionary"
 SOO.Conservative_desc: "統一オセチアは、ロシアの統一ロシア党と密接な関係にある。その結果として、その政策を多くの点で模倣している。"
 SOO.anarchist_communism: "£SOO_anarchist_communism (N) ニハス"
 SOO.anarchist_communism_icon: "£SOO_anarchist_communism"
 SOO.anarchist_communism_desc: "ニハスは、独立派のレオニード・ティビロフ大統領の支持者たちによって設立された南オセチアの政党である。"
 SOO.Nat_Populism: "£SOO_nationalist_right_wing_populist (PPSO) 南オセチア人民党"
 SOO.Nat_Populism_icon: "£SOO_nationalist_right_wing_populist"
 SOO.Nat_Populism_desc: "南オセチア人民党は左派の立場に立ち、所有形態の多様性と自由な起業を認め、市民社会の構築、民主主義の発展、強力な国家システムによる国民社会保護制度の発展を提唱し、独自のイデオロギープログラムを有する。こうした立場にもかかわらず、しばしばロシア自由民主党やベラルーシ自由民主党と結びつけられる。"
 SOO.Nat_Fascism: "£SOO_nationalist_fascism ウアツディン評議会"
 SOO.Nat_Fascism_icon: "£SOO_nationalist_fascism"
 SOO.Nat_Fascism_desc: "ウアツディン評議会は、民間宗教アシアニズムの司祭たちの最高議会である。"
 SOO.Monarchist: "£SOO_nationalist_monarchist アラン貴族"
 SOO.Monarchist_icon: "£SOO_nationalist_monarchist"
 SOO.Monarchist_desc: "アラニア王国、そして後のロシア帝国の崩壊後、オセチアの貴族は非常に少なくなったが、依然として多くの人々が貴族の家系とのつながりを主張している。"
 SOO.Nat_Autocracy: "£SOO_Nat_Autocracy オセチア軍"
 SOO.Nat_Autocracy_icon: "£SOO_Nat_Autocracy"
 SOO.Nat_Autocracy_desc: "南オセチア軍は、部分的に承認された国家である南オセチアの軍隊である。陸軍と空軍で構成される。"
