 CHI_TAI_intl_org_blockade_tt: "[TAI.GetNameWithFlag]获得一个动态修正，根据其国际认可度对其进行惩罚。"
 CHI_TAI_intl_isolation_modifier: "国际孤立指数"
 CHI_TAI_intl_isolation_modifier_desc: "这是衡量台湾外交孤立程度的一个动态指标，与维持正式外交承认的联合国成员国数量成反比。承认台湾的国家越少，台湾在贸易舆论、对外影响力以及改善与中国关系方面所面临的惩罚就越严重；相反，承认台湾的国家越多，这些关系就越好，台湾的外交影响力也就越大。"
 CHI_recognition_embargo: "承认禁运"
 CHI_recognition_embargo_desc: "中国对任何维持与台湾正式外交关系的国家都实施了严厉的经济和外交制裁。与中国的贸易成本大幅上升，进入中国市场也受到严格限制。"
 china_sar.038.t: "北京提议加强海峡两岸经济合作"
 china_sar.038.d: "北京已向台北正式提出两岸经济合作框架方案。大陆官员将其描述为一项务实互利的安排，完全避开了主权问题。台湾商界对此表示欢迎，但倾向独立的反对派警告称，此举将使台湾逐渐滑向对大陆经济的依赖。"
 china_sar.038.a: "参与到框架中来。"
 china_sar.038.b: "拒绝对方的提议。"
 china_sar.039.t: "北京方面提出扩大海峡两岸贸易"
 china_sar.039.d: "在开启经济对话的基础上，北京提议大幅扩大两岸贸易，降低关税并放宽对台湾出口大陆的限制。这一提议与《经济合作框架协议》相呼应，并以进入广阔的大陆市场为诱饵。台北方面的批评人士担心，这些让步带有政治目的。"
 china_sar.039.a: "扩大与大陆的贸易往来。"
 china_sar.039.b: "拒绝贸易扩大。"
 china_sar.040.t: "台湾企业进入大陆市场"
 china_sar.040.d: "北京邀请台湾企业以优惠条件在大陆经营，提供办公空间、共享建筑权和简化审批流程。对于台湾出口导向型经济而言，这无疑是一个巨大的机遇，但与大陆更深层次的商业联系在台北仍然是一个政治敏感问题。"
 china_sar.040.a: "接受优惠市场准入。"
 china_sar.040.b: "与我们的公司保持距离。"
 china_sar.041.t: "海峡两岸半导体协调"
 china_sar.041.d: "北京提议大陆与台湾世界领先的半导体产业进行协调，包括联合建厂和共享研究。台湾的芯片产业是其最大的战略资产和最坚实的屏障；与大陆共享固然有利可图，但也会削弱台北维系合作伙伴关系的筹码。"
 china_sar.041.a: "半导体上的坐标。"
 china_sar.041.b: "保护我们的芯片产业。"
 china_sar.042.t: "商务代表团互访"
 china_sar.042.d: "北京邀请双方商务代表团互访海峡两岸的产业中心，以此加强大陆和台湾企业高管之间的私人联系。这些访问风险低、商业效益显著，但每一次访问都加深了两岸经济相互依存的程度。"
 china_sar.042.a: "代表团互访"
 china_sar.042.b: "拒绝来访。"
 china_sar.043.t: "直达海峡两岸的交通连接"
 china_sar.043.d: "北京提议扩大海峡两岸的直接交通联系，在“三通”政策的基础上，通过新建航线、航班和基础设施来实现这一目标。直接交通将降低企业和旅客的成本，使两国经济联系更加紧密。"
 china_sar.043.a: "开通直航线路。"
 china_sar.043.b: "限制直航。"
 china_sar.044.t: "海峡两岸投资保障措施"
 china_sar.044.d: "北京方面提出一项正式协议，保障台湾在大陆投资的法律保护，以解决长期以来对产权和仲裁问题的担忧。这些保障措施将使谨慎的投资者安心，同时也巩固了台北与北京作为经济伙伴进行谈判的框架。"
 china_sar.044.a: "签署投资保障协议。"
 china_sar.044.b: "拒绝协议"
 china_sar.045.t: "海峡两岸联合产业规划"
 china_sar.045.d: "北京提议在海峡两岸进行产业协调规划，统一供应链、标准和重大项目。这种一体化将带来切实的效率提升，但也意味着台湾经济将被纳入大陆的长期战略，这令台北那些重视主权的选民感到担忧。"
 china_sar.045.a: "调整我们的产业规划。"
 china_sar.045.b: "独立规划我们的经济。"
 china_sar.046.t: "深化海峡两岸经济一体化"
 china_sar.046.d: "北京提出的两岸经济联盟最终阶段方案是：建立一个深度一体化的市场，实行统一的监管，实现商品和资本的自由流动。支持者指出这将带来繁荣；反对者则警告说，在这种深度下，经济联盟将难以与政治同化区分开来。"
 china_sar.046.a: "完全经济一体化。"
 china_sar.046.b: "在水边停下。"
 china_sar.047.t: "台北方面权衡统一协议"
 china_sar.047.d: "北京方面已提交和平统一的最终框架：台湾将以特别行政区的身份重新加入中华人民共和国，在“一国两制”模式下保留其自身的行政、法律体系和经济。经过多年的两岸缓和，该协议目前已提交台北方面批准。"
 china_sar.047.a: "批准该协议，实现统一。"
 china_sar.047.b: "这座岛屿还没有做好准备。"
 CHI_calm_hong_kong_protests: "恢复香港秩序"
 CHI_calm_hong_kong_protests_desc: "因选举改革引发的抗议活动持续扰乱香港特别行政区秩序。随着安全部队部署到位，局势趋于稳定，中央政府可以悄然平息动乱，恢复香港的正常秩序。"
