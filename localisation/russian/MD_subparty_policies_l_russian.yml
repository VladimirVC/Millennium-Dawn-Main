l_russian:
 subparty_policies_category: "Идеологическая борьба "
 subparty_policies_category_desc: "Наша партия определяется нашей идеологией. То, как мы смотрим на мир, дает нам уникальные способы подхода к нему."
 generic_admit_5_year_plan_failure: "Признать провал пятилетнего плана"
 generic_admit_5_year_plan_failure_desc: "Мы должны признать, что планы, которые мы строили для нашего грандиозной пятилетки, были, мягко говоря, слишком амбициозными. Признать это, безусловно, нелегко, и это лишь покажет нашу слабину всему миру. Это определенно не будет приемлемым решением для многих членов партии."
 generic_nationalise_biggest_influencer_industries: "Национализировать [?var:influence_array^0.GetFlag][?var:influence_array^0.GetAdjective] инвестиции"
 generic_nationalise_biggest_influencer_industries_desc: "[?var:influence_array^0.GetFlag] [?var:influence_array^0.GetName] перемещает огромное количество денег через нашу страну. Они злоупотребляют нашим народом ради капиталистической выгоды, и это необходимо остановить. Мы должны национализировать некоторые из [?var:influence_array^0.GetAdjective] активов в нашей стране."
 generic_nationalise_second_biggest_influencer_industries: "Национализировать [?var:influence_array^1.GetFlag][?var:influence_array^1.GetAdjective] инвестиции"
 generic_nationalise_second_biggest_influencer_industries_desc: "[?var:influence_array^1.GetFlag] [?var:influence_array^1.GetName] перемещает огромное количество денег через нашу страну. Они злоупотребляют нашим народом ради капиталистической выгоды, и это необходимо остановить. Мы должны национализировать некоторые из [?var:influence_array^1.GetAdjective] активов в нашей стране."
 generic_form_paramilitary_units: "Сформировать военизированные отряды из молодежи"
 generic_form_paramilitary_units_desc: "Наша молодежь становится ленивой и загнивающей. Нам нужно сформировать военизированные организации, которые научат их полезным жизненным и военным навыкам, и, разумеется, верности партии."
 TT_ABANDON_5_YEAR_PLAN: "§H[Root.GetLeader]§! таинственно исчезает.\nК счастью, есть кто-то из §H[show_ruling_party]§!, кто очень хочет стать лидером.\n\n"
