 STEEL_STORAGE_TOTAL_TT: "§Y철강§! 저장소"
 STEEL_STORAGE_TOTAL_DELAYED_TT: "첫 번째 흰색 숫자는 저장소에 보관된 자원의 양입니다. 두 번째 숫자는 매일 저장소에 입고되거나 저장소에서 출고되는 자원의 양입니다. 숫자가 초록색이면 자원이 추가되고 있는 것이며, 빨간색이면 자원이 인출되고 있는 것입니다."
