 BLR_batka_very_weak: "Очень слабая поддержка Батьки"
 BLR_batka_very_weak_desc: "Я скажу одну вещь, которую вы должны запомнить: президентами не становятся, президентами рождаются. После меня обязательно будет президент, это точно. Но не думайте, что они все родятся - §YАлександр Лукашенко§!\n§W--------------§!\nЭтот национальный дух §Rдинамичен§! и меняется в зависимости от популярности §YЛукашенко§! среди людей."
 BLR_batka_weak: "Слабая поддержка Батьки"
