 CHI_TAI_goodwill_gesture: "Cross-Strait Goodwill Gesture"
 CHI_TAI_goodwill_gesture_desc: "Extend a public gesture of goodwill toward Taipei, from disaster relief offers to relaxed travel and tourism rules, warming cross-strait sentiment and raising mutual trust."
 CHI_TAI_coercive_signaling: "Coercive Signalling"
 CHI_TAI_coercive_signaling_desc: "Signal Beijing's displeasure through pointed military drills and diplomatic pressure. It reminds Taipei of the mainland's resolve, but it corrodes cross-strait trust."