 japan_focus: "日本国策树"
 japan_classic.15.t: "小渊惠三中风"
 japan_classic.15.d: "小渊惠三，日本人民和日本自民党忠实的公仆，自1998年7月30日于自民党第十八次参院选大败，桥本龙太郎辞职后，接任首相一职。\n小渊惠三在人们心目中素以沉着、干练、高效著称，但没有人能预见到他的健康状况急转直下。2000年4月1日，小渊惠三因中风紧急收治入院。"
 japan_classic.15.o1: "希望他早日康复。"
 japan_classic.16.t: "森喜朗接任首相"
 japan_classic.16.d: "在时任首相小渊惠三中风后，为避免权力真空。自民党高层五位关键人物召开闭门会议，并推选森喜朗为继任者。\n\n此次权力交接并未事先向公众做出任何正式解释，而引发了公众的强烈批评，指责政府搞“幕后政治”和“将民众排除在领导决策之外”。结果，森喜朗内阁从一开始就面临巨大阻力。\n\n现在所有人的目光都集中在森喜朗的领导能力，以及他能否重获公众信任。"
 japan_classic.16.o1: "避免权力真空是唯一的首要任务。"
 japan_classic.18.t: "森喜朗的神国发言"
 japan_classic.18.d: "2000年5月15日，新上任的首相森喜朗因公开将日本称为“以天皇为中心的神国”的争议性发言而广受舆论谴责。在反对党和执政的自民党眼中，这番言论不仅是对日本的民主理念，也对君主制的角色提出了质疑。\n首相的公众支持率已出现下滑。"
 japan_classic.18.o1: "真是愚蠢！"
 japan_classic.18.o2: "趁机对他落井下石。"
 Japan.3.t: "新时代的曙光"
 Japan.3.d: "日本的象征 - 天皇即将退位，新天皇即将即位，这在日本近代史上是一次极其罕见的国家转折点。随着明仁天皇的退位，皇太子德仁将即位成为第126代天皇，年号也将随之更替。\n\n几年前，明仁天皇关于其职责的言论曾令许多人感到意外。起初，震惊与不安蔓延开来，但经过讨论和必要的程序，典礼筹备工作稳步推进。\n\n如今，在庄严的仪式之后，“平成”时代宣告结束，“令和”时代拉开帷幕。政治体制不会发生直接改变，但国家的氛围将会发生显著变化，这很可能会影响社会凝聚力和公众对政府的期望。"
 Japan.3.a: "让我们静静地迎接新时代的到来。"
 Japan.8.t: "中国正在要求尖阁列岛！"
 Japan.8.d: "中国再次就尖阁诸岛的主权问题向我们提出争议。如果我们屈服于他们的要求，可能会增强中国影响我国外交政策的信心，同时也会降低我们在国内民族主义者中的声望。然而，拒绝的后果对我们来说恐怕也不乐观。"
 Japan.8.a: "让他们保留捕鱼权吧……"
 Japan.8.b: "日本不会被吓倒！"
 Japan.4.t: "日本已经交出了岛屿！"
 Japan.4.d: "日本显然接受了我们主张的合法性，将钓鱼岛归还给了我们，其合法主人。"
 Japan.4.a: "也许日本人还是有一些理智的！"
 Japan.5.t: "日本公然违抗我们！"
 Japan.5.d: "日本人显然像以前一样决心继续做我们的死敌。"
 Japan.5.a: "他们会后悔的……"
 Japan.6.t: "中国战机向我们紧急起飞的拦截机开火了！"
 Japan.6.d: "我们的战斗机经常对中国入侵我们的领空作出反应，通常没有发生任何事件。然而这次我们的战斗机遭到了中国人的射击，导致我们的几名飞行员死亡和多架飞机的损失。鉴于中国最近的行动，我们应该评估这次事件是蓄意挑衅还是不幸的事故，并决定我们相应的反应。"
 Japan.6.a: "我们有自卫的权利！"
 Japan.6.b: "我们应该呼唤我们的保护者！"
 Japan.6.c: "这可能是一个意外..."
 Japan.7.t: "中日空战"
 Japan.7.d: "在中国和日本的飞机发生对抗之后，东中国海爆发了冲突。据报道，冲突开始时，日本喷气式飞机在日本领空拦截中国战斗机。在类似事件发生后，中国并没有像以往那样撤退，而是向日本飞机开火，导致几名日本飞行员死亡，多架飞机损失。[JAP.GetLeader]强烈谴责这一事件，据说正在就日本对这一事件的反应进行紧急闭门会谈。"
 Japan.7.a: "第三次中日战争即将爆发？"
 idea_JAP_emperor_naruhito: "德仁天皇"
 idea_JAP_emperor_naruhito_desc: "德仁于1960年2月23日出生，是明仁和庄田美智子的儿子。他曾在日本各地多所名校就读，据说拥有一个快乐的童年，也曾在牛津大学学习。"
