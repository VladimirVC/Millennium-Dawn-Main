l_french:
 SOV_proclaim_soviet_hegemony: "Proclamer l'hégémonie soviétique"
 EST_new_economic_policy_desc: "Depuis le rétablissement de notre indépendance, nous nous sommes positionnés comme un carrefour entre l'Est et l'Ouest et avons poursuivi des réformes économiques et une intégration avec l'Occident. Il nous faut néanmoins élaborer une nouvelle politique, plus alignée sur celle de nos partenaires étrangers, une politique plus profitable et méthodique."
 SOV_proclaim_soviet_hegemony_desc: "L'économie rétablie et les masses mobilisées, la Russie est prête à reconquérir son rôle de premier plan. Nous affirmerons ouvertement la primauté soviétique, déplaçant l'équilibre des pouvoirs vers l'Est et contraignant les États européens à prendre en compte notre retour."
 SOV_the_third_rome_desc: "L'idée que Moscou soit la troisième Rome est celle de l'héritière de la Rome antique et de Byzance, perpétuant ainsi l'héritage de l'Empire romain. Ce concept a fait l'objet de débats tout au long de l'histoire européenne, la question de savoir quelle ville hérite légitimement de cet héritage ayant été soulevée."
 polish_focus: "Arbre de Priorités de la Pologne"
 SOV_socialist_humanism_desc: "Le socialisme ne se résume pas aux usines et aux quotas, il concerne aussi la dignité du travailleur. Nous placerons le bien-être humain au cœur de la révolution, prouvant ainsi que la voie communiste est au service du peuple et non l'inverse."
 SOV_socialist_humanism: "Socialisme humaniste"
 SOV_the_third_rome: "La troisième Rome"
 king: "Antécédents:Royauté"