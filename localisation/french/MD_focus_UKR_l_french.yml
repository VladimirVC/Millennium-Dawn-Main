l_french:
 ukraine_focus: "Priorités nationales ukrainiennes"
 UKR_home_to_chernobyl_zone: "Accueil de la zone d'exclusion de Tchernobyl"
 UKR_chernobyl_tooltip: "La zone d'exclusion de Tchernobyl a été créée dans les régions du nord de cet État, à la suite de l'accident nucléaire catastrophique survenu à la centrale nucléaire de Tchernobyl. La zone couvre une superficie d'environ 2 600 kilomètres carrés en Ukraine et a été évacuée et déclarée inhabitable en raison de niveaux élevés de contamination radioactive. Depuis sa création, la zone d'exclusion est gérée par le gouvernement ukrainien, et des efforts sont en cours pour surveiller et remédier aux impacts environnementaux et sanitaires de la catastrophe."
 UKR_chernobyl_effects_tooltip: "§Rde nouvelles fuites de rayonnement pourraient causer des dommages à long terme§!"
 UKR_found_the_uop: "Réformer le complexe militaro-industriel"
 UKR_found_the_uop_desc: "Notre industrie de défense est dans un état déplorable, nous sommes donc obligés d’entamer une réforme globale dans ce domaine."
 UKR_ukrainian_armed_forces_reform: "Industrialisation ukrainienne"
 UKR_ukrainian_armed_forces_reform_desc: "Our armed forces urgently need reform. We must create new structures and new types of troops, and solve the old problems of our army."
 UKR_srdsc: "Centre national de recherche et de conception de la construction navale"
 UKR_srdsc_desc: "Le State Research and Design Shipbuilding Center est un bureau d'études spécialisé dans la construction navale et situé à Mykolaïv, en Ukraine. Elle fait partie de la société d'État ukrainienne des industries de défense."
 UKR_defend_our_sky: "Relancer l'industrie aéronautique"
 UKR_defend_our_sky_desc: "Nous commencerons à relancer notre industrie aéronautique, qui se trouve dans un état désastreux depuis l’effondrement de l’URSS."
 UKR_cut_down_the_general_staff: "Réduire le nombre de généraux"
 UKR_cut_down_the_general_staff_desc: "Too many generals negatively affect our army, it's time to fix it."
 UKR_contract_army: "Armée professionnelle"
 UKR_contract_army_desc: "We will reorganize the old military universities, as well as create new ones, to improve the quality of our armed forces."
 UKR_war_on_donbass_experience: "Notre armée"
 UKR_war_on_donbass_experience_desc: "The Ukrainian Army is literally a shadow of its former Soviet, and now Russian, counterpart. It is time to change that."
 UKR_support_uia: "UIA"
 UKR_support_uia_desc: "UIA ou Ukraine International Airlines est la compagnie aérienne phare et la plus grande présente en Ukraine. Le hub principal de ses avions de ligne se trouve à l'aéroport international Boryspil de Kiev. Elle exploite des vols de passagers et des services de fret vers l'Europe, le Moyen-Orient, les États-Unis, le Canada et l'Asie."
 UKR_build_new_airports: "Construire de nouveaux aéroports"
 UKR_build_new_airports_desc: "Nos aéroports ont été négligés depuis trop longtemps. Nous devons investir dans nos aéroports à des fins civiles et militaires."
 UKR_invest_in_ministry_of_infrastructure: "Ministère de l'infrastructure"
 UKR_invest_in_ministry_of_infrastructure_desc: "Le ministère de l’Infrastructure a essuyé quelques critiques. L'infrastructure ukrainienne s'effondre à cause du siphonnage des fonds par des fonctionnaires corrompus du ministère. Les gens ne peuvent pas conduire sur certaines routes en raison des conditions. Il est temps de redessiner le ministère dans l’espoir d’un avenir meilleur pour nos industries."
 UKR_roads_extend_plan: "Plans d'investissement routier"
 UKR_roads_extend_plan_desc: "Les routes ukrainiennes ne sont pas les meilleures au monde. Certaines zones dépendent encore de routes non goudronnées ou presque détruites. Il est temps que ces régions reçoivent un peu d’amour."
 UKR_ukrainian_railways: "UZ"
 UKR_ukrainian_railways_desc: "UZ is the name of the state-owned company that currently possesses a massive monopoly on the majority of the Ukrainian railroad transportation within the country. The company boasts an impressive combined total track length of over 23,000km worth of track, marking it as the 13th largest in the world.\n\nIt is also the 6th largest rail passenger transporter and 7th largest freight transporter."
 UKR_legacy_of_the_ukr_ind: "Industrialisation ukrainienne"
 UKR_legacy_of_the_ukr_ind_desc: "L’Ukraine dépend largement de sa base industrielle pour sa croissance économique. Les grandes villes de Kiev, Lviv et Zaporizhia abritent toutes une forme d’industrie qui a stimulé leur croissance au fil des années. Nous devons maintenir cette tendance, sinon nous stagnons."
 UKR_ssau: "SSAU"
 UKR_ssau_desc: "L’industrie spatiale ukrainienne est loin d’être un leader mondial en matière de technologie spatiale. Cependant, c’est un important producteur de vaisseaux spatiaux et d’autres machines extraterrestres. La capacité de rester compétitif sur cette dernière frontière dictera notre avenir dans les années à venir."
 UKR_pivdenmash_udo: "Pivdenmash"
 UKR_pivdenmash_udo_desc: "Pivdenmash est le principal fabricant ukrainien de vaisseaux spatiaux. L'entreprise se distingue par la production de fusées pour des pays étrangers tels que la NASA. Il serait bon de développer cette industrie en plein essor pour projeter l’Ukraine sur la scène mondiale. Petite anecdote amusante, les fusées de fabrication ukrainienne représentaient 12 % de tous les vols spatiaux en 2006. Qui savait !"
 UKR_national_steel_companies: "Acier ruthène"
 UKR_national_steel_companies_desc: "L’acier ruthène était autrefois un formidable produit destiné à faire la guerre. Désormais, nous ne combattons plus avec des épées et des boucliers. Cependant, nos chars, nos canons et nos balles ont besoin d’un acier de qualité pour rester compétitifs."
 UKR_naftogaz: "Naftogaz"
 UKR_naftogaz_desc: "Naftogaz est la société nationale pétrolière et gazière. Il intervient du processus d'extraction jusqu'au raffinement des produits. L’entreprise est souvent utilisée pour faire pression en faveur de l’indépendance pétrolière et gazière contre des pays comme la Russie ou d’autres grands exportateurs d’énergie."
 UKR_extend_ukrainian_refineries: "Focus sur les énergies renouvelables"
 UKR_extend_ukrainian_refineries_desc: "Malgré notre large accès au gaz naturel et autres réserves de pétrole, remplir les besoins énergétiques actuels avec d'autres formes d'énergies nous aidera à stabiliser en des temps de faible production d'énergies fossiles."
 UKR_zalk: "Installations industrielles de Zaporizhia"
 UKR_zalk_desc: "Zaporijjia est un centre industriel important en Ukraine. C'est la capitale de l'oblast de Zaporijjia, abritant l'entreprise ZAZ, c'est aussi un hub de la métallurgie et une ville portuaire majeure pour la livraison de biens du Donbas."
 UKR_zaz: "ZAZ"
 UKR_zaz_desc: "ZAZ ou Zaporizhia Automobile Building Plant est le principal constructeur automobile d'Ukraine. Comme son nom l’indique, elle est basée dans la ville de Zaporizhia, au sud-est de l’Ukraine. Elle produit également couramment des bus et des camions et est surtout connue grâce à son ancienne société mère AvtoZAZ."
 UKR_kraz: "KrAZ"
 UKR_kraz_desc: "KrAZ est une société privée située à Krementchouk, en Ukraine. L'entreprise produit principalement des camions et autres véhicules spéciaux. Cependant, leur principale spécialité réside dans les modèles tout-terrain lourds. Elle a récemment été enregistrée en tant que société holding et est désormais détenue par la société ukrainienne Finance and Credit."
 UKR_west_east_rivalry_balanced: "Entre l'Est et l'Ouest\n§LStatut actuel de rivalité:§! §GÉquilibré§!\n"
 UKR_west_east_rivalry_balanced_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_strengthened: "Between East and West \n§LCurrent rivalry status:§! §GMoving towards West§!\n"
 UKR_west_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_dominant: "Entre l'Est et l'Ouest\n§LStatut actuel de rivalité :§! §GPro-Occidental§!"
 UKR_west_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_strengthened: "Entre l'Est et l'Ouest\n§LStatut actuel de rivalité :§! §GEn route vers l'Est§!\n"
 UKR_east_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_dominant: "Entre l'Est et l'Ouest\n§LStatut actuel de rivalité §! §GPro-Est§!"
 UKR_east_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_kleptocracy: "Kleptocratie"
 UKR_kleptocracy_desc: "Le gouvernement ukrainien s’enlise actuellement dans sa kleptocratie. Les hauts gradés sont corrompus et utilisent leur pouvoir pour exploiter la population et les ressources naturelles de leur territoire afin d’étendre leur richesse et leur pouvoir politique.\n\n§CPour se débarrasser de l'impact négatif de la kleptocratie, le pays doit prendre des mesures pour lutter contre la corruption.§!"
 UKR_to_many_generals: "État-major excessif"
 UKR_to_many_generals_desc: "L’armée ukrainienne compte 450 généraux actifs. La plupart d'entre eux ont obtenu leur poste en raison de liens et de stratagèmes de corruption et n'ont aucune expérience dans la conduite d'opérations militaires. L’état-major actuel est incompétent et a désespérément besoin d’être réformé."
 UKR_idea_eu_member_associate: "Membre associé de l'UE"
 UKR_idea_eu_member_associate_desc: "L'Ukraine a commencé son association avec l'UE. Cela approfondira les liens avec l’Europe et le bloc occidental. Cependant, cela pose des problèmes avec les régions majoritairement russophones."
 UKR_idea_government_in_need: "Gouvernement inefficace"
 UKR_idea_pro_ukraine_reform_1: "Gouvernement réformé."
 UKR_idea_shortened_general_staff: "État-major du Compact"
 UKR_every_man_ataman: "Chaque homme - Ataman"
 UKR_foreign_advisors: "Conseillers étrangers"
 ukraine_coup.1.t: "La Russie a tenté de nous couper !"
 ukraine_coup.1.d: "Le dernier rapport en provenance de Kiev indique que des agents soutenus par la Russie étaient sur le point de renverser notre gouvernement ! Il s’agit d’une menace directe pour notre indépendance du côté russe."
 ukraine_coup.1.a: "Bastards."
 ukraine_coup.2.t: "La Russie nous a coupés !"
 ukraine_coup.2.d: "Le dernier rapport de Kiev indique que des agents soutenus par la Russie ont coupé notre gouvernement ! Notre pays va désormais être dirigé par une clique pro-russe de l’establishment."
 ukraine_coup.2.a: "WTF ?"
 ukraine_news.7.t: "Guerre civile en Ukraine."
 ukraine_news.7.d: "Les habitants de la région ukrainienne du Donbass se sont déclarés indépendants. Ils ont annoncé aux habitants des régions de Donetsk et de Louhansk qu’ils ne se soumettraient plus à la tyrannie de Kiev. [UKR.GetLeader] et l'administration ukrainienne ont dénoncé les rebelles et se sont mobilisées pour les réprimer. Des escarmouches ont déjà éclaté dans la région entre les forces locales pro-ukrainiennes et les rebelles."
 ukraine_news.7.a: "Réprimer la rébellion"
 ukraine_news.7.b: "Battez les oppresseurs !"
 ukraine_news.7.c: "Situation intéressante"
 ukraine_news.8.t: "Annexion de la Crimée"
 ukraine_news.8.d: "Le peuple de Crimée a organisé un référendum pour quitter l’Ukraine et s’aligner sur la Russie. La réponse russe a été rapide et décisive, en envoyant rapidement des troupes dans la région et en annexant la péninsule. Les positions militaires clés ont été rapidement reprises. Le gouvernement ukrainien a exprimé son indignation face à cette affaire et exige que la Russie lui restitue la Crimée."
 ukraine_news.8.a: "Seulement pour l'instant.."
 ukraine_news.8.b: "Pour la mère Russie!"
 ukraine_news.8.c: "Des nouvelles troublantes."
 UKR_tro_brigades_ukraine_decision_category: "Forces de défense territoriale d'Ukraine"
 UKR_tro_brigades_ukraine_decision_category_desc: "Les Forces de défense territoriale des Forces armées ukrainiennes sont une branche distincte des Forces armées ukrainiennes, chargée de l'organisation, de la préparation et de l'exécution des tâches de défense territoriale."
 UKR_tro_created_tt: "Vous pourrez recruter des §Ybrigades de Défense Territoriale§!"
 UKR_reorganize_the_national_guard_ukraine_decision_category: "Garde nationale d'Ukraine"
 UKR_reorganize_the_national_guard_ukraine_decision_category_desc: "The National Guard of Ukraine is a military formation with law enforcement functions, is part of the system of the Ministry of Internal Affairs of Ukraine (MIA) and is designed to perform tasks to protect and protect the life, rights, freedoms and legitimate interests of citizens of Ukraine, society and the state from criminal and other illegal encroachments, protect public order and ensure public safety.\n\nAs well as in cooperation with law enforcement agencies, to ensure state security and protection of the state border, suppression of terrorist activities, activities of illegal paramilitary or armed formations (groups), terrorist organizations, organized groups and criminal organizations."
 UKR_reorganize_the_national_guard_first_brigade: "§Y1ère Brigade Opérationnelle§! de la Garde nationale d'Ukraine"
 UKR_reorganize_the_national_guard_second_brigade: "§Y25ème Brigade Séparée§! de la Protection de l'Ordre Public"
 UKR_reorganize_the_national_guard_third_brigade: "§Y4ème Brigade Opérationnelle§! de la Garde nationale d'Ukraine"
 UKR_reorganize_the_national_guard_four_brigade: "§Y23ème Brigade Séparée§! de la Protection de l'Ordre Public"
 UKR_natguard_created_tt: "Vous pourrez recruter des §Ybrigades de la Garde nationale§!"
 UKR_uop_decision_category: "Entreprise d'État Ukroboronprom"
 UKR_uop_decision_category_desc: "L'entreprise d'État Ukroboronprom est une association d'entreprises du complexe militaro-industriel d'Ukraine gérée par l'État. Sont concernées les entreprises de l'industrie de défense engagées dans des activités économiques dans les domaines du développement, de la fabrication, de la vente, de la réparation, de la modernisation et de l'élimination d'armes, d'équipements militaires et spéciaux et de munitions, ainsi que la participation à la coopération militaro-technique avec des pays étrangers. L'entreprise est responsable des fonctions de planification stratégique, de coordination et d'amélioration de l'efficacité des entreprises de l'industrie de défense, ainsi que d'interaction avec les pouvoirs publics.\n\n\nLa capacité industrielle supplémentaire actuelle que nous pouvons consacrer à des véhicules de fortune supplémentaires est de [?ukr_industry_points]"
 UKR_t84_oplot: "Assemblez un prototype du §YT-84 Oplot Tank§!"
 UKR_bpla_oup: "Réaliser des développements dans le domaine des §YUAV§!"
 UKR_btr70_m: "Assemblez un prototype §YBTR 70M§!"
 UKR_bm21_k: "Assemblez un prototype §YBM-21K§!"
 UKR_helicopter: "Réaliser des Développements Dans le Domaine des §YHélicoptères§!"
 UKR_uda_created_tt: "§YL'Armée des Volontaires Ukrainiens§! sera créé"
 UKR_aidar_created_tt: "§YBataillon Aidar§! sera créé"
 UKR_donbass_created_tt: "§YLe bataillon Donbass-Ukraine§! sera créé"
 UKR_azov_created_tt: "§YAzov§! sera créé"
 UKR_police_mobilisation_1: "Mobilize §YPolice Regiment Kyiv§!"
 UKR_police_mobilisation_2: "Mobilisez §YRégiment de police Ivano-Frankivsk§!"
 UKR_police_mobilisation_4: "Mobilisez §YRégiment de police Mirotvorec§!"
 UKR_police_mobilisation_5: "Mobilisez §YRégiment de police Poltava§!"
 UKR_interlegion_2: "Appelez la §Y2e Légion internationale géorgienne§! à l'avant"
 UKR_interlegion_3: "Appelez la §YLégion nationale géorgienne§! à l'avant"
 UKR_interlegion_5: "Appelez le §YBataillon nommé d'après Khamzat Gelayev§! à l'avant"
 UKR_interlegion_7: "Appelez le §YBataillon nommé d'après l'Imam Shamil§! à l'avant"
 UKR_interlegion_8: "Appelez la §YBrigade canado-ukrainienne§! à l'avant"
 UKR_interlegion_11: "Appelez la §YBrigade Normande§! à l'avant"
 UKR_interlegion_12: "Appelez le §YCorps des Volontaires Polonais§! à l'avant"
 UKR_interlegion_13: "Appelez le §YKrym Battalion§! à l'avant"
 UKR_inter_created_tt: "§YSLégion internationale§! sera créé et vous pourrez embaucher des bataillons alliés de différents pays"
 UKR_kraken_created_tt: "§YBataillon Kraken§! Sera créé"
 UKR_ter_oborona: "Créer une défense territoriale"
 UKR_ter_oborona_desc: "We need more different units to protect our homeland. We will begin the creation of Ukrainian Territorial Defense so that every region is protected."
 UKR_azov: "Créer le bataillon Azov"
 UKR_azov_desc: "Let's take a chance and let them join the ranks of our armed forces."
 UKR_create_sso: "Créer des forces d'opérations spéciales d'Ukraine"
 UKR_create_sso_desc: "The new military structure will help to fight our enemies more effectively."
 UKR_donbass: "Créer un bataillon Donbass-Ukraine"
 UKR_donbass_desc: "Another team, created from volunteers, comes to our service."
 UKR_reform_mvd: "Réforme du ministère de l'Intérieur"
 UKR_reform_mvd_desc: "We will carry out a global reform in the Ministry of Internal Affairs."
 UKR_found_the_national_police: "Service de patrouille de la police spéciale"
 UKR_found_the_national_police_desc: "The Patrol Service of the Special Purpose Police of Ukraine is a service within the Patrol Police Department of Ukraine within the National Police of Ukraine, which was created as part of the Ministry of Internal Affairs of Ukraine as a structure of special forces for the protection of public order.\n\nThe structure became part of the National Police of Ukraine. The service combines former battalions and regiments of the Ministry of Internal Affairs."
 UKR_found_the_kord: "Unité spéciale CORDON"
 UKR_found_the_kord_desc: "Le Corps d'action opérationnelle et soudaine, ou unité CORD, est une unité spéciale de la police nationale ukrainienne. Il est conçu pour résoudre des situations d'urgence dont le niveau est si élevé et complexe qu'il peut dépasser les capacités des forces d'intervention rapide ou des unités opérationnelles de recherche."
 UKR_inter_legion: "Légion internationale de défense territoriale"
 UKR_inter_legion_desc: "La Légion internationale de défense territoriale de l'Ukraine est un projet du gouvernement ukrainien visant à attirer des étrangers pour créer des unités de volontaires dans le cadre de la défense territoriale des forces armées ukrainiennes."
 UKR_kraken: "Unité spéciale \"Kraken\""
 UKR_kraken_desc: "The Kraken Special Unit is a Ukrainian separate intelligence and sabotage unit of the Main Intelligence Directorate of the Ministry of Defense of Ukraine."
 UKR_civil_war: "Guerre dans le Donbass"
 UKR_ukraine_elections: "Élections ukrainiennes"
 UKR_ukraine_elections_desc: "It is time to decide who will lead our country further."
 donbass_civil_war: "La guerre civile dans le Donbass a eu lieu"
 UKR_republic_ukr: "La République fédérale"
 UKR_republic_ukr_desc: "The Federal Republic is a special type of entity, which is the basis of the entire Ukrainian Federation. It has expanded autonomy as well as the ability to make its own laws."
 UKR_confederation: "Fédéralisation"
 UKR_confederation_desc: "Several regions received the maximum possible autonomy, which led to a state similar to the Confederate system."
 subject_ukr.1.t: "[FROM.GetNameWithFlag] demande la construction d'une usine"
 subject_ukr.1.d: "[FROM.GetNameWithFlag] government requests the construction of a factory on its territory, due to the inability to do it on its own."
 subject_ukr.1.a: "Oui"
 subject_ukr.1.b: "Non"
 subject_ukr.2.t: "Construire une usine"
 subject_ukr.2.d: "[UKR.GetNameWithFlag] has agreed to build a factory."
 subject_ukr.2.a: "Bien"
 subject_ukr.3.t: "Construire une usine"
 subject_ukr.3.d: "[UKR.GetNameWithFlag] has refused to build a factory."
 subject_ukr.3.a: "triste"
 subject_ukr.4.t: "[FROM.GetNameWithFlag] demande des subventions"
 subject_ukr.4.d: "Le gouvernement [FROM.GetNameWithFlag] nous demande des subventions pour son budget, sommes-nous prêts à les allouer ?"
 subject_ukr.4.a: "Oui"
 subject_ukr.4.b: "Non"
 subject_ukr.5.t: "Subventions du budget fédéral"
 subject_ukr.5.d: "[UKR.GetNameWithFlag] has agreed to provide us with funds from the Federal budget."
 subject_ukr.5.a: "Bien"
 subject_ukr.6.t: "Subventions du budget fédéral"
 subject_ukr.6.d: "[UKR.GetNameWithFlag] has refused to allocate funds from the Federal budget to us."
 subject_ukr.6.a: "triste"
 UKR_subsidies: "Demandez des subventions au §Y[UKR.GetNameWithFlag]§!"
 UKR_buildings: "Demandez des usines au §Y[UKR.GetNameWithFlag]§!"
 UKR_subject_annex: "Réintégrer les sujets"
 UKR_subjectautoritet_tt: "L'autorité du sujet augmentera de §Y[?modify_subjectavtoritet]%§!"
 UKR_authority_more_60: "Notre sujet dispose d'une autorité de §Y60 %§! auprès du gouvernement fédéral [ROOT.GetFlag]."
 ukraine_maidan_west.1.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.1.d: "Our state policies do not suit a certain part of the population. People are starting to come out to the famous Kyiv square - Maidan, as way to express dissatisfaction with our political decisions."
 ukraine_maidan_west.1.a: "Nous regardons"
 ukraine_maidan_west.2.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.2.d: "Notre gouvernement espérait que les manifestations prendraient fin rapidement, mais cela ne s'est pas produit. Les gens ont plutôt commencé à monter des tentes et à établir un camp sur la place pour y rester plus longtemps."
 ukraine_maidan_west.2.a: "J'ai un mauvais pressentiment à ce sujet"
 ukraine_maidan_west.3.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.3.d: "The protesters are not going to leave and are starting to behave more aggressively, maybe it's time to take action and demolish their little tent city."
 ukraine_maidan_west.3.a: "Déployons l'unité Berkut"
 ukraine_maidan_west.3.b: "Nous n'interférerons pas"
 ukraine_maidan_west.4.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.4.d: "We have begun to disperse the protesters, many foreign TV channels are covering this as a bloody massacre, but our task is only one - to save the state."
 ukraine_maidan_west.4.a: "Pour le bien de la patrie !"
 ukraine_maidan_west.5.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.5.d: "We decided against dispersing the protesters, hoping that their ardor would cool down and they would all go back home, for now let's see what happens next, but so far we do not see any sign of the situation cooling down."
 ukraine_maidan_west.5.a: "Attendaient"
 ukraine_maidan_west.6.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.6.d: "We decided to negotiate with the protesters, perhaps we can satisfy their political demands."
 ukraine_maidan_west.6.a: "Nous espérons le meilleur"
 ukraine_maidan_west.7.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.7.d: "Nos tentatives de négociations ont été perçues comme une faiblesse, même au sein de notre parti. Nos collègues quittent activement nos rangs et font défection aux côtés des manifestants, sentant que le vent du changement est de leur côté."
 ukraine_maidan_west.7.a: "J'ai un mauvais pressentiment à ce sujet"
 ukraine_maidan_west.8.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.8.d: "Notre parti politique s'est complètement effondré, nous avons perdu nos collègues et il semble que nos camarades du parti soient d'accord avec les revendications de l'opposition... Il semble que ce soit la fin."
 ukraine_maidan_west.8.a: "Oh God..."
 ukraine_maidan_west.9.t: "L'émeute en Crimée"
 ukraine_maidan_west.9.d: "Les habitants de Crimée se sont montrés mécontents de ce qui se passe et ont exigé de nous une fédéralisation à part entière avec l'octroi de droits et de pouvoirs aux sujets, à l'image du fonctionnement du système fédéral russe. Allons-nous y aller ?"
 ukraine_maidan_west.9.a: "Il est peut-être temps de commencer la fédéralisation."
 ukraine_maidan_west.9.b: "Aucune fédéralisation n’aura lieu ici"
 ukraine_maidan_west.10.t: "La rébellion dans le sud-est"
 ukraine_maidan_west.10.d: "Les régions du Sud-Est se sont également montrées mécontentes des événements en cours et ont exigé de nous une fédéralisation. Serons-nous d'accord ?"
 ukraine_maidan_west.10.a: "Le Donbass deviendra un sujet"
 ukraine_maidan_west.10.b: "Pas de fédéralisation"
 ukraine_maidan_west.11.t: "Mutinerie de Kharkov"
 ukraine_maidan_west.11.d: "Les émeutes de Donetsk et de Louhansk ont ​​provoqué une réaction similaire à Kharkiv. Les séparatistes ont pu y prendre le pouvoir et déclarer leur République de Kharkiv."
 ukraine_maidan_west.11.a: "Combien y en a-t-il?"
 ukraine_maidan_west.12.t: "Mutinerie d'Odessa"
 ukraine_maidan_west.12.d: "Les soulèvements dans le Donbass ont provoqué des émeutes à Odessa. Au début, tout a commencé de manière assez pacifique, et cela aurait pu se terminer, mais nous n'avions pas les ressources nécessaires pour réprimer la rébellion, et maintenant les citoyens locaux ont déclaré leur république."
 ukraine_maidan_west.12.a: "Combien y en a-t-il?"
 ukraine_maidan_west.13.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.13.d: "Nous avons tenté de disperser par la force le Maidan avec la participation de Berkut."
 ukraine_maidan_west.13.a: "Protégeons le pays !"
 ukraine_maidan_west.14.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.14.d: "La réponse ne s’est pas fait attendre et les protestations ont commencé à se radicaliser. Adoptant une stratégie violente, les gens ont commencé à utiliser des cocktails Molotov, des armes légères et des pierres contre nos forces de sécurité."
 ukraine_maidan_west.14.a: "Oh God..."
 ukraine_maidan_west.15.t: "Déployer l'armée！"
 ukraine_maidan_west.15.d: "Nous allons essayer de déployer l’armée pour tenter de réprimer les manifestations."
 ukraine_maidan_west.15.a: "Les forces armées ukrainiennes sauveront l’Ukraine."
 ukraine_maidan_west.16.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.16.d: "Plusieurs unités des forces armées ont été mises en état d'alerte et envoyées dans la capitale pour faire face aux manifestations."
 ukraine_maidan_west.16.a: "The Army Has Arrived in Kyiv"
 ukraine_maidan_west.16.b: "L'armée n'a pas pu aider"
 ukraine_maidan_west.17.t: "The Kyiv Massacre"
 ukraine_maidan_west.17.d: "L'armée est entrée dans une confrontation armée avec les manifestants. Un véritable massacre a commencé lorsque des armes à feu ont été tirées des deux côtés pendant la bataille."
 ukraine_maidan_west.17.a: "C'est horrible"
 ukraine_maidan_west.18.t: "The Kyiv Massacre"
 ukraine_maidan_west.18.d: "Nous n'avions pas d'autre choix et, par conséquent, beaucoup de ceux qui ont survécu à cette répression ont fui vers les régions occidentales du pays, où ils se préparent à riposter contre notre gouvernement pour une trahison si cruelle envers leur peuple."
 ukraine_maidan_west.18.a: "Une tempête est à venir"
 ukraine_maidan_west.19.t: "Le soulèvement en Galice"
 ukraine_maidan_west.19.d: "Euromaidan supporters, as well as survivors of the Kyiv massacre, have declared independence from Ukraine. Two new republics on the territory of Volhynia and the Lviv region intend to fight back against the central government."
 ukraine_maidan_west.19.a: "Nous sommes prêts à nous battre !"
 ukraine_maidan_west.20.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.20.d: "Sans le soutien de l’armée, nos forces de sécurité ne peuvent pas faire face à la pression des manifestants. Peut-être que la dernière étape de cette lutte arrivera bientôt."
 ukraine_maidan_west.20.a: "La fin est proche"
 ukraine_maidan_west.21.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.21.d: "Une terrible tragédie s'est produite lors des manifestations. Des tireurs d’élite inconnus ont ouvert le feu sur les manifestants, provoquant une réaction encore plus violente. Nos collègues s'en vont, croyant que l'ordre de tirer venait de notre gouvernement."
 ukraine_maidan_west.21.a: "Avons-nous vraiment perdu ?"
 ukraine_maidan_west.22.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.22.d: "Notre gouvernement s'est complètement effondré. Bientôt, il n’y aura plus personne pour nous soutenir. Il est temps de se préparer à abandonner le pouvoir."
 ukraine_maidan_west.22.a: "Dernières heures"
 ukraine_maidan_west.23.t: "Manifestations contre le Maidan"
 ukraine_maidan_west.23.d: "Notre gouvernement a finalement été renversé. Les manifestations ont atteint leur objectif."
 ukraine_maidan_west.23.a: "Le Maïdan a gagné"
 ukraine_maidan_west.24.t: "Fédéralisation"
 ukraine_maidan_west.24.d: "Nous allons entamer le processus de fédéralisation de notre pays. La Crimée deviendra le premier membre à part entière de notre nouvelle fédération. Personne ne pourra exploiter les questions régionales à des fins politiques."
 ukraine_maidan_west.24.a: "Bien"
 ukraine_maidan_west.25.t: "Fédéralisation de la Galice"
 ukraine_maidan_west.25.d: "In light of our reforms and the emergence of independent entities within our federation, representatives of Galicia have also expressed a desire, through an ultimatum, to become a full-fledged member. Will we expand the federation to the west?"
 ukraine_maidan_west.25.a: "Oui"
 ukraine_maidan_west.25.b: "Non"
 ukraine_maidan_east.1.t: "Troubles dans le Sud-Est"
 ukraine_maidan_east.1.d: "Nos politiques ont conduit à des protestations et à des manifestations dans le sud-est du pays. Des manifestations aux slogans clairement antigouvernementaux ont envahi de nombreuses villes."
 ukraine_maidan_east.1.a: "Soudainement"
 ukraine_maidan_east.2.t: "Les députés s’auto-organisent"
 ukraine_maidan_east.2.d: "Les protestations prennent de l'ampleur et maintenant les députés locaux les rejoignent en proclamant des slogans plutôt dangereux."
 ukraine_maidan_east.2.a: "Inquiétant..."
 ukraine_maidan_east.4.t: "Une tentative de négociation"
 ukraine_maidan_east.4.d: "The deputies want to negotiate. It is still possible to resolve the conflict peacefully."
 ukraine_maidan_east.4.a: "Meet the deputies"
 ukraine_maidan_east.5.t: "Les négociations ont échoué"
 ukraine_maidan_east.5.d: "We couldn't reach an agreement. The protesters are not interested in a peaceful solution anymore."
 ukraine_maidan_east.5.a: "Se préparer au pire"
 ukraine_maidan_east.6.t: "Negotiations Keep Going"
 ukraine_maidan_east.6.d: "For now, we were able to prevent violence and negotiate with the parties involved in the conflict. Now we await their proposal for a final settlement."
 ukraine_maidan_east.6.a: "We May Have Avoided The Worst"
 ukraine_maidan_east.7.t: "Organisation de la milice"
 ukraine_maidan_east.7.d: "Les manifestants locaux ont commencé à former des milices, déclenchant une rébellion armée."
 ukraine_maidan_east.7.a: "Oh God..."
 ukraine_maidan_east.8.t: "Commencer la répression"
 ukraine_maidan_east.8.d: "La situation devient incontrôlable dans de nombreuses régions du sud-est. Il est temps de prendre des mesures décisives."
 ukraine_maidan_east.8.a: "Nous irons à Odessa"
 ukraine_maidan_east.8.b: "Nous allons dans le Donbass et à Kharkiv"
 ukraine_maidan_east.8.c: "Nous devons mieux nous préparer"
 ukraine_maidan_east.9.t: "Odessa est sauvée"
 ukraine_maidan_east.9.d: "Nous avons réprimé les séparatistes locaux avant qu’ils ne puissent prendre le contrôle de la région, mais maintenant une rébellion armée a commencé dans le Donbass en raison de notre concentration sur Odessa."
 ukraine_maidan_east.9.a: "Il est temps de se préparer"
 ukraine_maidan_east.10.t: "Suppression du Donbass"
 ukraine_maidan_east.10.d: "Notre tentative de réprimer la rébellion du Donbass a échoué. Les unités Berkut ont rejoint les rebelles, nous mettant dans une situation encore plus difficile."
 ukraine_maidan_east.10.a: "Il est temps de se préparer"
 ukraine_maidan_east.11.t: "Retard critique"
 ukraine_maidan_east.11.d: "Notre retard a conduit de nombreuses républiques du Sud-Est à se lancer dans des rébellions armées."
 ukraine_maidan_east.11.a: "Nous avons commis une erreur."
 ukraine_maidan_east.12.t: "Troubles dans le Sud-Est"
 ukraine_maidan_east.12.d: "Nos actions ont conduit à une escalade généralisée, et nous en subissons désormais les conséquences."
 ukraine_maidan_east.12.a: "Nous avons commis une erreur."
 ukraine_maidan_east.13.t: "Mutinerie à Kharkov"
 ukraine_maidan_east.13.d: "Le manque de préparation de nos services spéciaux nous a encore une fois fait une mauvaise blague. À Kharkov, nous n’avons pas pu réprimer la rébellion, ce qui a conduit à un soulèvement armé."
 ukraine_maidan_east.13.a: "Combien y en a-t-il?"
 ukraine_maidan_east.17.t: "La rébellion du Donbass"
 ukraine_maidan_east.17.d: "Un soulèvement armé a commencé dans les régions de Donetsk et de Louhansk. Les unités de Berkut ont joué un rôle déterminant en aidant les rebelles à désarmer certaines unités militaires stationnées là-bas."
 ukraine_maidan_east.17.a: "Mince"
 ukraine_maidan_east.18.t: "La mutinerie d'Odessa"
 ukraine_maidan_east.18.d: "La défection de Berkut au profit des rebelles a grandement inspiré les séparatistes d'Odessa, où ils ont également déclaré la création d'une république populaire."
 ukraine_maidan_east.18.a: "Combien y en a-t-il?"
 ukraine_maidan_east.19.t: "Le gouvernement perd le pouvoir"
 ukraine_maidan_east.19.d: "Nous avons commis des erreurs critiques qui ont conduit à une guerre civile, et nos opposants politiques s’en serviront pour prendre le pouvoir."
 ukraine_maidan_east.19.a: "Quoi qu'il arrive"
 ukraine_maidan_east.19.b: "Quoi qu'il arrive"
 ukraine_maidan_east.19.c: "Quoi qu'il arrive"
 ukraine_maidan_east.20.t: "Le gouvernement perd le pouvoir"
 ukraine_maidan_east.20.d: "Nous avons commis des erreurs critiques qui ont conduit à une guerre civile, et nos opposants politiques s’en serviront pour prendre le pouvoir."
 ukraine_maidan_east.20.a: "Nous nous débrouillerons seuls"
 ukraine_maidan_east.20.b: "Nous demanderons l'aide de la Russie"
 ukraine_maidan_east.21.t: "Le gouvernement perd le pouvoir"
 ukraine_maidan_east.21.d: "Nous avons commis des erreurs critiques qui ont conduit à une guerre civile, et nos opposants politiques s’en serviront pour prendre le pouvoir."
 ukraine_maidan_east.21.a: "Nous nous débrouillerons seuls"
 ukraine_maidan_east.21.b: "Nous demanderons l'aide de la Russie"
 ukraine_maidan_east.22.t: "Consolidation contre un ennemi commun"
 ukraine_maidan_east.22.d: "Malgré le déclenchement de la guerre civile, la population s’est ralliée à nous. Nous n'avons que légèrement perdu du terrain politique, compensé par des slogans sur la lutte sacrée contre les séparatistes."
 ukraine_maidan_east.22.a: "Pour l'Ukraine!"
 ukraine_maidan_east.23.t: "L'Ukraine a demandé notre aide"
 ukraine_maidan_east.23.d: "Le gouvernement ukrainien a sollicité notre aide en raison de la guerre civile. Nous devons maintenant décider si nous sommes prêts à les aider."
 ukraine_maidan_east.23.a: "Nous les aiderons"
 ukraine_maidan_east.23.b: "Laissez-les s’en occuper eux-mêmes"
 ukraine_maidan_east.24.t: "Choisir l'aide"
 ukraine_maidan_east.24.d: "Nous avons accepté la demande ukrainienne d'envoyer un contingent. Maintenant, nous devons décider qui envoyer."
 ukraine_maidan_east.24.a: "Nous enverrons une police anti-émeute"
 ukraine_maidan_east.24.b: "Nous enverrons Rosgvardiya"
 ukraine_maidan_east.24.c: "Nous enverrons PMC Wagner"
 ukraine_maidan_east.25.t: "La Russie a refusé de nous aider"
 ukraine_maidan_east.25.d: "Le gouvernement russe a refusé de nous envoyer de l’aide ou de participer de quelque manière que ce soit à nos événements tragiques. Nous sommes déçus."
 ukraine_maidan_east.25.a: "Traîtres"
 ukraine_maidan_east.26.t: "Question de la fédéralisation"
 ukraine_maidan_east.26.d: "Les rebelles ont avancé leur principale et unique revendication : la fédéralisation de l'Ukraine, conférant au Donbass un statut spécial de sujet fédéral. Sommes-nous prêts à prendre le risque et à accepter une telle réforme ?"
 ukraine_maidan_east.26.a: "La fédéralisation devrait être"
 ukraine_maidan_east.26.b: "Jamais"
 ukraine_maidan_east.27.t: "Peace at last"
 ukraine_maidan_east.27.d: "Nous avons accepté la fédéralisation et grâce à cela, nous avons pu éviter de terribles conséquences pour notre pays."
 ukraine_maidan_east.27.a: "Bien"
 UKR_maidan_temporary_attack_idea: "Offensive organisée"
 ukraine_maidan.1.t: "Statut de la Crimée"
 ukraine_maidan.1.d: "La Crimée a une population majoritairement russe. Les gens là-bas sont les nôtres. Il est injuste pour eux et leurs frères du Donbass de vivre sous domination ukrainienne. Devrions-nous honorer leur appel et intégrer les personnes qui aspirent à être avec nous ?"
 ukraine_maidan.1.a: "S'emparer de la Crimée"
 ukraine_maidan.1.b: "La Crimée est ukrainienne"
 ukraine_maidan.2.t: "La Russie annexe la Crimée"
 ukraine_maidan.2.d: "Les habitants de Crimée se sont séparés. Ils ont recherché le soutien du gouvernement russe. Les Criméens ont massivement voté un référendum autorisant l’absorption de l’État dans l’État russe. Les troupes russes stationnées près de la Crimée ont afflué dans la région et se sont rapidement emparées de points clés. Les troupes furent accueillies à bras ouverts par les traîtres. Un jour, nous retrouverons le territoire qui nous revient de droit !"
 ukraine_maidan.2.a: "Intéressant"
 ukraine_maidan.3.t: "La Russie refuse au peuple ukrainien"
 ukraine_maidan.3.d: "Les traîtres de Crimée ont finalement organisé leur stupide référendum pour tenter de nous séparer. Le peuple russe encourage depuis longtemps ce type de comportement. La raison pour laquelle les Russes ont renié le peuple de Crimée reste un mystère. Toutefois, nous apprécions qu’ils ne nous aient pas porté davantage atteinte en prenant le contrôle de la région. Le temps nous dira ce que cette décision a causé."
 ukraine_maidan.3.a: "Une bonne journée"
 ukraine_maidan.4.t: "Les accords de Minsk"
 ukraine_maidan.4.d: "La guerre n’a pas abouti au résultat escompté pour nous. Les séparatistes n’ont pas été détruits et la population est manifestement mécontente de cette guerre sans fin. Peut-être devrions-nous faire une pause ?"
 ukraine_maidan.4.a: "La paix maintenant"
 ukraine_maidan.4.b: "Paix? Pourquoi?"
 ukraine_maidan.5.t: "Les accords de Minsk"
 ukraine_maidan.5.d: "La guerre n’a pas abouti au résultat escompté pour nous. Les séparatistes n’ont pas été détruits et la population est manifestement mécontente de cette guerre sans fin. Peut-être devrions-nous faire une pause ?"
 ukraine_maidan.5.a: "La paix maintenant"
 ukraine_maidan.5.b: "Paix? Pourquoi?"
 ukraine_maidan.6.t: "Observateurs de l'OSCE"
 ukraine_maidan.6.d: "Pour contrôler et prévenir les conflits armés, des observateurs de l'OSCE ont été envoyés dans la zone frontalière pour assurer la paix et la stabilité dans le Donbass."
 ukraine_maidan.6.a: "Juste une trêve"
 ukraine_maidan.7.t: "Observateurs de l'OSCE"
 ukraine_maidan.7.d: "Pour contrôler et prévenir les conflits armés, des observateurs de l'OSCE ont été envoyés dans la zone frontalière pour assurer la paix et la stabilité dans le Donbass."
 ukraine_maidan.7.a: "Juste une trêve"
 ukraine_maidan.8.t: "L'Ukraine propose la fédéralisation"
 ukraine_maidan.8.d: "L'Ukraine nous propose un projet de fédéralisation et accepte de nous reconnaître comme une entité distincte. Allons-nous accepter cela ?"
 ukraine_maidan.8.a: "Nous sommes d'accord"
 ukraine_maidan.8.b: "We Refuse"
 ukraine_maidan.9.t: "Travailler avec des entreprises russes"
 ukraine_maidan.9.d: "Nous continuerons à travailler avec les entreprises russes car l’Union européenne ne peut pas nous fournir le niveau de ressources et de technologies dont nous avons besoin."
 ukraine_maidan.9.a: "Sacrifice nécessaire"
 ukraine_maidan.10.t: "L'Ukraine propose la fédéralisation"
 ukraine_maidan.10.d: "L'Ukraine nous propose un projet de fédéralisation et accepte de nous reconnaître comme une entité distincte. Allons-nous accepter cela ?"
 ukraine_maidan.10.a: "Nous sommes d'accord"
 ukraine_maidan.10.b: "We Refuse"
 ukraine_maidan.11.t: "Insatisfaction à l'égard de notre politique"
 ukraine_maidan.11.d: "Residents of the western part of our country are dissatisfied with the policies we are pursuing. They feel the policies are directed against them and are actively expressing their dissatisfaction."
 ukraine_maidan.11.a: "C'est mauvais"
 ukraine_maidan.12.t: "Insatisfaction à l'égard de notre politique"
 ukraine_maidan.12.d: "Residents of the eastern part of our country are dissatisfied with the policies we are pursuing. They feel the policies are directed against them and are actively expressing their dissatisfaction."
 ukraine_maidan.12.a: "C'est mauvais"
 ukraine_maidan.13.t: "Le sort de l'Ukraine"
 ukraine_maidan.13.d: ""
 ukraine_maidan.13.a: ""
 ukraine_maidan.14.t: "Négociations avec les régions de l'Est"
 ukraine_maidan.14.d: "Nos politiques ont conduit à la non-reconnaissance totale de notre gouvernement par les régions de l’Est, et elles sabotent activement nos activités. Cependant, nous avons la possibilité de négocier avec eux."
 ukraine_maidan.14.a: "Nous ferons des compromis"
 ukraine_maidan.14.b: "Ils ne sont rien"
 ukraine_maidan.15.t: "Négociations avec les régions occidentales"
 ukraine_maidan.15.d: "Notre politique a conduit à la non-reconnaissance totale de notre gouvernement par les régions occidentales, et elles sabotent activement nos activités. Cependant, nous avons la possibilité de négocier avec elles."
 ukraine_maidan.15.a: "Nous ferons des compromis"
 ukraine_maidan.15.b: "Ils ne sont rien"
 ukraine_maidan.16.t: "Réforme populiste"
 ukraine_maidan.16.d: "Notre présidence doit commencer par une réforme. Nous devons décider sur quoi exactement se concentreront nos activités réformatrices."
 ukraine_maidan.16.a: "Réforme agraire"
 ukraine_maidan.16.b: "Réforme routière"
 ukraine_maidan.16.c: "Nous allons influencer la Rada"
 ukraine_maidan.17.t: "Stabilité politique"
 ukraine_maidan.17.d: "Nos politiques sages et compétentes ont porté leurs fruits. Alors que notre pays est stable, notre pouvoir politique ne fait que croître."
 ukraine_maidan.17.a: "Bien"
 UKR_crimea_bund: "La République de Crimée s'est rebellée"
 UKR_civil_war_desc: "Our country is divided - we are waging a civil war against our own citizens, our army is not united in its rush to destroy the separatists."
 UKR_civil_war1: "Guerre en Galicie"
 UKR_civil_war1_desc: "Our country is divided - we are waging a civil war against our own citizens, our army is not united in its rush to destroy the separatists."
 UKR_russian_gas: "Ressources énergétiques russes"
 UKR_russian_gas_desc: "We are heavily dependent on the supply of resources from Russia, and until we find an alternative to this, we are forced to negotiate with Moscow."
 UKR_russian_gas_cheap: "Ressources énergétiques russes bon marché"
 UKR_russian_gas_cheap_desc: "We are heavily dependent on the supply of resources from Russia, and until we find an alternative to this, we are forced to negotiate with Moscow."
 UKR_russian_gas_cheaper: "Ressources énergétiques russes très bon marché"
 UKR_russian_gas_cheaper_desc: "We are heavily dependent on the supply of resources from Russia, and until we find an alternative to this, we are forced to negotiate with Moscow."
 UKR_russian_gas_sov: "Contrat gazier avec l'Ukraine"
 UKR_russian_gas_sov_desc: "Gas contract has been signed between us and Ukraine, on special conditions, which allows us to have leverage over them."
 UKR_russian_gas_cheap_sov: "Contrat gazier avec l'Ukraine"
 UKR_russian_gas_cheap_sov_desc: "Gas contract has been signed between us and Ukraine, on special conditions, which allows us to have leverage over them."
 UKR_russian_gas_cheaper_sov: "Contrat gazier avec l'Ukraine"
 UKR_russian_gas_cheaper_sov_desc: "Gas contract has been signed between us and Ukraine, on special conditions, which allows us to have leverage over them."
 UKR_idea_old_national_guard: "La Garde nationale"
 UKR_idea_old_national_guard_desc: "The National Guard of Ukraine is a state armed body created on the basis of the Internal Troops of the USSR, designed to protect the sovereignty of Ukraine, its territorial integrity, as well as the life and personal dignity of citizens, their constitutional rights and freedoms from criminal encroachments and other antisocial actions."
 UKR_kleptocracy01: "Forte kleptocratie"
 UKR_kleptocracy01_desc: "Le gouvernement ukrainien est actuellement enlisé dans sa kleptocratie. Les hauts fonctionnaires sont corrompus et utilisent leur pouvoir pour exploiter le peuple et les ressources naturelles de leur territoire afin d'accroître leur richesse et leur influence politique.\n\n§CPour se débarrasser des effets négatifs de la kleptocratie, le pays doit prendre des mesures pour lutter contre la corruption.§!"
 UKR_kleptocracy02: "Très forte kleptocratie"
 UKR_kleptocracy02_desc: "Le gouvernement ukrainien est actuellement enlisé dans sa kleptocratie. Les hauts fonctionnaires sont corrompus et utilisent leur pouvoir pour exploiter le peuple et les ressources naturelles de leur territoire afin d'accroître leur richesse et leur influence politique.\n\n§CPour se débarrasser des effets négatifs de la kleptocratie, le pays doit prendre des mesures pour lutter contre la corruption.§!"
 UKR_kleptocracy03: "Kleptocratie paralysante"
 UKR_kleptocracy03_desc: "Le gouvernement ukrainien est actuellement enlisé dans sa kleptocratie. Les hauts fonctionnaires sont corrompus et utilisent leur pouvoir pour exploiter le peuple et les ressources naturelles de leur territoire afin d'accroître leur richesse et leur influence politique.\n\n§CPour se débarrasser des effets négatifs de la kleptocratie, le pays doit prendre des mesures pour lutter contre la corruption.§!"
 UKR_every_man_ataman_desc: "The spirit of Ukrainians is the spirit of freedom and independence, sometimes it benefits, sometimes it can play a cruel joke with the country."
 UKR_gas_tt: "Nous payons la Russie pour les ressources énergétiques : $§R0.175§!\n"
 UKR_gas_cheap_tt: "Nous payons la Russie pour les ressources énergétiques : $§R0.100§!\n"
 UKR_gas_cheaper_tt: "Nous payons la Russie pour les ressources énergétiques : $§R0.100§!\n"
 UKR_gassov_tt: "L'Ukraine paye pour nos ressources énergétiques : $§G0.175§!\n"
 UKR_gassov_cheap_tt: "L'Ukraine paye pour nos ressources énergétiques : $§G0.100§!\n"
 UKR_gassov_cheaper_tt: "L'Ukraine paye pour nos ressources énergétiques : $§G0.100§!\n"
 UKR_dshv_create: "Forces d'assaut aérien"
 UKR_dshv_create_desc: "We will separate Air Assault Forces from the ground forces into a separate unit with its own command and structure, thereby increasing their effectiveness."
 UKR_command_create: "Commandement des forces unies"
 UKR_command_create_desc: "The Command of the United Forces of the Armed Forces of Ukraine is the military management body of the Armed Forces of Ukraine, between groups of troops to conduct various military operations. He is also responsible for conducting peacekeeping missions outside Ukraine."
 UKR_national_guard: "Raviver la Garde nationale"
 UKR_national_guard_desc: "The National Guard was disbanded under President Kuchma, but now the situation requires us to revive it. We will reorganize it from the internal troops of the Ministry of Internal Affairs."
 UKR_dissolved_parliament: "Parlement dissous"
 UKR_dissolved_parliament_desc: "The Parliament has been dissolved, and representation is no longer active within the nation.\n§W------------------§!\nThis national spirit  will be §RRemoved§! if we re-instate elections."
 UKR_russia_help_battalions: "Bataillons de soutien russes"
 UKR_oup: "Ukroboronprom"
 UKR_oup_desc: "The Ukrainian industry needs to be revived and quickly. But to do this, we structure all our enterprises into one concern."
 civilwar_after: "La guerre civile a eu lieu"
 UKR_win_elections_TT: "Notre §Hbloc§! va §Gremporter§! les §Hélections§!"
 UKR_lose_elections_TT: "Notre §Hbloc§! va §Rperdre§! les §Hélections§!"
 UKR_presidential_decisions_only_one_is_available_TT: "Une seule de ces décisions peut être prise à la fois."
 UKR_parliament_block_tt: "Cette §Hloi§! doit être §Happrouvée§! par la §HVerkhovna Rada§!"
 UKR_free_parliament_TT: "Rétablira les §Célections libres§! au §HParlement§!"
 UKR_verkhovna_rada: "Verkhovna Rada"
 UKR_verkhovna_rada_desc: "\n\n\n\n\n\n£UKR_desctext_rada\n\n\n\n\n\n\n\n\nLa §HVerkhovna Rada§! [UKR.GetFlag] est notre parlement national, et elle dicte les lois qui entrent en vigueur ou sont abrogées, ce qui signifie qu'elle peut souvent aller à l'encontre de nos propres besoins. La §HVerkhovna Rada§! peut être dans l'un des trois états suivants à tout moment : §C Libre§!, ce qui signifie que nous n'avons pas de contrôle direct sur elle ; §C Influencée§!, ce qui signifie que nous en avons un certain contrôle ; et §C Marionnette§!, ce qui signifie que nous en avons le contrôle total.\n\nLa §HVerkhovna Rada§! peut retirer son soutien à notre gouvernement si nous rejetons §Hcertaines propositions§! qu'elle présente, ou si nous adoptons une §Horientation qui ne correspond pas étroitement à la sienne§!. Elle peut aussi retirer son soutien de manière aléatoire si elle en ressent le besoin.\n\nPlus nous avons de soutien, mieux c'est, car cela augmente nos chances de faire passer des lois sans mesures supplémentaires. La §HVerkhovna Rada§! organisera des élections, et leur résultat dépendra de l'influence des nations étrangères ou de notre propre indépendance intérieure.\n\n§G[?UKR_verkhovna_support]§!/§H450§! sièges de la §HVerkhovna Rada§! soutiennent actuellement notre gouvernement\n"
 ukraine_nationalist_majority_name: "§HMajorité pro-ukrainienne§!"
 UKR_right_wing_desc_TT: "Une §Hmajorité pro-ukrainienne§! au Parlement signifie que celui-ci cherche à prendre davantage de distance avec l'§COccident§! et les §GRusses§!. Ils souhaitent une §HUkraine§! plus indépendante et neutre dans les affaires mondiales et sont généralement opposés à prendre parti dans tout conflit."
 ukraine_eastern_majority_name: "§GMajorité pro-russe§!"
 UKR_left_wing_desc_TT: "Le §Gbloc pro-russe§! au Parlement cherche généralement à renforcer les liens avec le gouvernement §Grusse§!, en s'éloignant des puissances §Coccidentales§!. La radicalisation varie au sein de ce bloc : certains souhaitent maintenir une §HUkraine§! indépendante avec des liens §Gpro-russes§!, tandis que d'autres désirent une intégration plus poussée des sociétés §Hukrainienne§! et §Grusse§!."
 ukraine_western_majority_name: "§BMajorité pro-occidentale§!"
 UKR_liberal_TT: "Le §Bbloc pro-occidental§! au sein du Parlement représente les partis et individus qui veulent que l'§HUkraine§! abandonne ses politiques pro-russes pour renforcer les liens avec les puissances §Coccidentales§!. Les objectifs de ceux qui s'alignent avec l'§COccident§! varient grandement : certains souhaitent seulement des liens économiques et culturels, tandis que d'autres veulent rejoindre l'alliance §BOTAN§! pour protéger l'§HUkraine§! de l'influence §Grusse§!."
 ukraine_dissolved_majority_name: "§RVerkhovna Rada dissoute§!"
 UKR_verkhovna_dissolved_tt: "Le Parlement a été dissous, et la salle reste vide, sans représentants présents."
 ukraine_free_verkhovna: "§CStatut de la Verkhovna Rada : Libre§!"
 UKR_verkhovna_free_tt: "Le Parlement est libre de l'influence du président, les discussions et débats se déroulant de manière organique sans intervention d'un autre organe gouvernemental."
 ukraine_influenced_verkhovna: "§pStatut de la Verkhovna Rada : Influencée§!"
 UKR_verkhovna_influenced_tt: "Le gouvernement a été réformé de manière à rendre le Parlement facilement exploitable, permettant au gouvernement du président d'orienter aisément les discussions lorsqu'il est en session."
 ukraine_puppeted_verkhovna: "§OStatut de la Verkhovna Rada : Marionnette§!"
 UKR_verkhovna_puppetted_tt: "Le Parlement n'est qu'un outil de plus pour le président et son cabinet, trompant le peuple avec une fausse impression de représentation."
 UKR_bureau_open: "Lancer le débat sur les dépenses de la §Ybureaucratie§!"
 UKR_bureau_close: "Clôturer le débat sur les dépenses de la §Ybureaucratie§!"
