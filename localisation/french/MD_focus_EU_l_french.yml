 EUevent.2.t: "Accord UE-Turquie"
 EUevent.2.d: "§C[EUU.GetFlag] L'Union européenne§! et [TUR.GetFlag] [TUR.GetNameDef] sont parvenues à un accord visant à stopper le flux migratoire irrégulier de la Turquie vers l'Europe. Selon la déclaration UE-Turquie, tous les nouveaux migrants irréguliers et demandeurs d'asile arrivant de Turquie sur les îles grecques et dont les demandes d'asile ont été déclarées irrecevables doivent être renvoyés en Turquie. §C[EUU.GetFlag] L'Union européenne§! versera 3 milliards d'euros pour la Facilité en faveur des réfugiés en Turquie."
 EUevent.2.a: "D'accord"
 EUevent.17.t: "Accord UE-Turquie"
 EUevent.17.d: "§C[EUU.GetFlag] L'Union européenne§! et [TUR.GetFlag] [TUR.GetNameDef] sont parvenues à un accord visant à stopper le flux migratoire irrégulier de la Turquie vers l'Europe. Selon la déclaration UE-Turquie, tous les nouveaux migrants irréguliers et demandeurs d'asile arrivant de Turquie sur les îles grecques et dont les demandes d'asile ont été déclarées irrecevables doivent être renvoyés en Turquie. §C[EUU.GetFlag] L'Union européenne§! versera 3 milliards d'euros pour la Facilité en faveur des réfugiés en Turquie."
 EUevent.17.a: "D'accord"
 EUevent.4.t: "États-Unis d'Europe"
 EUevent.4.d: "[FROM.GetFlag] [FROM.GetNameDefCap] réunit les États membres de §C[EUU.GetFlag] l'Union européenne§! au sein d'un super-État européen appelé §C[EUU.GetFlag] les États-Unis d'Europe§!. [ROOT.GetFlag] [ROOT.GetNameDefCap] abandonnera sa souveraineté et rejoindra §C[EUU.GetFlag] les États-Unis d'Europe§!."
 EUevent.4.a: "Une ode à la joie !"
 EUevent.5.t: "Crise de la dette européenne"
 EUevent.5.d: "L'incapacité de l'Union européenne à mettre en place une réforme de la zone euro. Les pays de l'Union sont incapables de rembourser ou de refinancer leur dette publique ou de renflouer les banques surendettées. Les États membres s'efforcent maintenant de faire avancer rapidement les réformes afin de garantir la viabilité financière et économique de la zone euro. La crise a commencé et l'euro est au bord du gouffre."
 EUevent.5.a: "L'euro est en jeu !"
 EUevent.6.t: "Réformes de la zone euro"
 EUevent.6.d: "La crise de la dette qui menaçait a été évitée grâce à une série de réformes dans la zone euro, telles que la mise en œuvre d'une union fiscale, l'élargissement des pouvoirs de la Banque centrale européenne (BCE) et la mise en place de mécanismes de stabilité supplémentaires. La zone euro a été sauvée et l'Union européenne peut désormais envisager l'avenir avec la certitude qu'une crise a été évitée."
 EUevent.6.a: "In varietate concordia."
 EUevent.7.t: "Eurozone Reforms"
 EUevent.7.d: "La crise financière mondiale aux États-Unis a eu un effet en cascade sur les nations européennes. De nombreux membres du Parlement européen cherchent à résoudre le problème de la dette croissante d'un certain nombre de pays de l'Union européenne. Ces pays n'ont pas réussi à payer, à refinancer leur dette publique ou à fournir des fonds d'urgence aux banques en difficulté à la suite de la crise financière mondiale. Tous les États membres concernés ont fait part de leur incapacité à rembourser leur dette et ont révélé que leurs déficits budgétaires étaient bien plus importants qu'on ne le pensait. Le principal point commun entre les nations est que la cause première de la crise est le transfert de la dette privée vers la dette nationale par le biais d'une série de renflouements de la dette pour sauver les institutions en difficulté au sein des pays. La Banque centrale européenne (BCE) et le Fonds monétaire international (FMI) ont commencé à conclure des accords avec les États membres pour mettre en place des plans d'aide et des programmes de sauvetage nationaux afin d'éviter que la crise ne s'aggrave. La seule chose qui reste claire, c'est que l'Union européenne est au bord d'une crise cataclysmique, car elle se trouve au centre de la tempête qu'est la crise financière mondiale. Nous devons rester forts et l'Union doit réformer la zone euro afin de résister à la tempête et de montrer que l'Union européenne ne faiblira pas. Ni maintenant, ni demain, ni jamais. In varietate concordia."
 EUevent.7.a: "Pour l'euro !"
 EUevent.8.t: "Réformes de la troïka accomplies !"
 EUevent.8.d: "[ROOT.GetFlag] [ROOT.GetNameDefCap] a adopté les réformes exigées par la « troïka », composée de la Commission européenne (CE), de la Banque centrale européenne (BCE) et du Fonds monétaire international (FMI). Cela signifie l'austérité pour les citoyens [ROOT.GetFlag] [ROOT.GetAdjMP] !"
 EUevent.8.a: "Nous nous relèverons !"
 EUevent.9.t: "Sortie par accident"
 EUevent.9.d: "[ROOT.GetFlag] [ROOT.GetNameDefCap] n'a pas réussi à accomplir les réformes exigées par la troïka composée de la Commission européenne (CE), de la Banque centrale européenne (BCE) et du Fonds monétaire international (FMI). Les autres États membres se réfèrent à la clause de non renflouement, de sorte que [ROOT.GetFlag] [ROOT.GetNameDef] doit quitter la zone euro et §C[EUU.GetFlag] l'Union européenne§! pour dévaluer sa nouvelle monnaie et éviter la faillite."
 EUevent.9.a: "Bad times ahead"
 EUevent.10.t: "Transférer la marine vers l'EuroMarine"
 EUevent.10.d: "Les flottes et les forces opérationnelles multinationales devenant de plus en plus courantes et importantes au XXIème siècle, les États membres de [EUU.GetFlag] l'Union européenne ont décidé d'unir leurs forces et de transférer leurs navires de guerre à un commandement naval européen unifié connu sous le nom d'EuroMarine. \n\n[FROM.GetFlag] [FROM.GetNameDefCap] occupe le poste de secrétaire général de l'EuroMarine et demande à notre flotte de rejoindre l'EuroMarine."
 EUevent.10.a: "Europe, règne sur les vagues !"
 EUevent.10.b: "Nous ne renoncerons jamais à notre flotte !"
 EUevent.18.t: "[FROM.GetFlag] [FROM.GetNameDefCap] nous demande d'accueillir un exercice militaire"
 EUevent.18.d: "[FROM.GetFlag] [FROM.GetNameDefCap] nous demande d'accueillir un exercice militaire à la frontière. Un exercice militaire à notre frontière pourrait faire monter la tension mondiale. Il est donc important que nous pesions soigneusement nos options avant d'autoriser l'exercice militaire."
 EUevent.18.a: "Oui"
 EUevent.18.b: "Non"
 EUevent.20.t: "Aide additionnelle de préadhésion pour [FROM.GetFlag] [FROM.GetNameDef]"
 EUevent.20.d: "[FROM.GetFlag] [FROM.GetNameDefCap] n'a pas réalisé les réformes nécessaires pour satisfaire aux critères d'adhésion à l'UE. Nous devrions lui fournir une assistance financière et technique supplémentaire."
 EUevent.20.a: "Oui"
 EUevent.20.b: "Non"
 EUelection.1.t: "Élection du Parlement européen de [GetYear]"
 EUelection.1.d: "Les élections au Parlement européen ont lieu tous les cinq ans."
 EUelection.1.a: "D'accord"
 EU_news.1.t: "État de l'Union européenne"
 EU_news.1.d: "L'Union européenne est en bonne posture."
 EU_news.1.a: "D'accord"
 EU_news.20.t: "Sortie par accident"
 EU_news.20.d: "[FROM.GetFlag] [FROM.GetNameDefCap] n'a pas réussi à mener à bien les réformes exigées par la « troïka », composée de la Commission européenne (CE), de la Banque centrale européenne (BCE) et du Fonds monétaire international (FMI). Les autres États membres se référant à la clause de non renflouement, [FROM.GetFlag] [FROM.GetNameDef] doit quitter la zone euro et §C[EUU.GetFlag] l'Union européenne§! pour dévaluer sa nouvelle monnaie et éviter la faillite."
 EU_news.20.a: "Au revoir !"
 EU_news.21.t: "Un État membre quitte l'Union"
 EU_news.21.d: "[FROM.GetFlag] [FROM.GetNameDefCap] quitte §C[EUU.GetFlag] l'Union européenne§!."
 EU_news.21.a: "Au revoir !"
 EU_news.22.t: "L'article 50 est abrogé"
 EU_news.22.d: "[FROM.GetFlag] [FROM.GetNameDefCap] a abrogé l'article 50 et reste dans §C[EUU.GetFlag] l'Union européenne§!."
 EU_news.22.a: "D'accord"
 EU_news.23.t: "Traité de retrait"
 EU_news.23.d: "[FROM.GetFlag] [FROM.GetNameDefCap] et les États membres de §C[EUU.GetFlag] l'Union européenne§! ont signé un traité de retrait. [FROM.GetFlag] [FROM.GetNameDefCap] quittera §C[EUU.GetFlag] l'Union européenne§! aux conditions énoncées dans le traité de retrait."
 EU_news.23.a: "Au revoir, chers amis !"
 EU_news.24.t: "Prolongation de l'article 50"
 EU_news.24.d: "[FROM.GetFlag] [FROM.GetNameDefCap] et les États membres de §C[EUU.GetFlag] l'Union européenne§! se sont mis d'accord pour prolonger l'article 50 de trois mois. [FROM.GetFlag] [FROM.GetNameDefCap] quittera donc §C[EUU.GetFlag] l'Union européenne§! dans trois mois."
 EU_news.24.a: "D'accord"
 EU_news.34.t: "L'article 50 est déclenché"
 EU_news.34.d: "[FROM.GetFlag] [FROM.GetNameDefCap] a déclenché l'article 50 et quittera §C[EUU.GetFlag] l'Union européenne§! dans deux ans."
 EU_news.34.a: "D'accord"
 EU_news.25.t: "Transfert de la flotte à l'EuroMarine"
 EU_news.25.d: "[FROM.GetFlag] [FROM.GetNameDefCap] transfère sa flotte à [FROM.FROM.GetFlag] [FROM.FROM.GetNameDef] le titulaire du poste de secrétaire général de l'EuroMarine."
 EU_news.25.a: "D'accord"
 EU_news.26.t: "Transfert de la flotte rejeté"
 EU_news.26.d: "[FROM.GetFlag] [FROM.GetNameDefCap] ne transférera pas sa flotte à l'EuroMarine."
 EU_news.26.a: "D'accord"
 EU_news.27.t: "Un pays rejoint l'Union européenne"
 EU_news.27.d: "[FROM.GetFlag] [FROM.GetNameDefCap] rejoint §C[EUU.GetFlag] l'Union européenne§!."
 EU_news.27.a: "Bienvenue !"
 EU_news.32.t: "Programme OMT"
 EU_news.32.d: "La BCE a lancé son programme OMT."
 EU_news.32.a: "D'accord"
 EU_news.33.t: "Fin du programme OMT"
 EU_news.33.d: "Le programme OMT actuel de la BCE prend fin."
 EU_news.33.a: "D'accord"
 EU_news.45.t: "Réduction du programme OMT"
 EU_news.45.d: "The ECB has reduced its OMT Program.\n§YOMT Size Limit§!: Add §R-$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §G+5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §R-5%§! Europeanism.\n"
 EU_news.45.a: "D'accord"
 EU_news.46.t: "Extension du programme OMT"
 EU_news.46.d: "The ECB has expanded its OMT Program.\n§YOMT Size Limit§!: Add §G+$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §R-5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §G+5%§! Europeanism.\n"
 EU_news.46.a: "D'accord"
 EU_news.47.t: "Union européenne de la défense (UED)"
 EU_news.47.d: "Afin d'acquérir l'autonomie stratégique nécessaire pour défendre leurs intérêts collectifs, répondre aux conflits et crises extérieurs et assurer la sécurité dans notre voisinage, les États membres ont décidé de former l'Union européenne de la défense (UED) en tant qu'alliance militaire et de quitter collectivement l'OTAN."
 EU_news.47.a: "D'accord"
 EU_news.48.t: "Union européenne de la défense (UED)"
 EU_news.48.d: "Afin d'acquérir l'autonomie stratégique nécessaire pour défendre leurs intérêts collectifs, répondre aux conflits et crises extérieurs et projeter la sécurité dans le voisinage européen, les États membres de [EUU.GetFlag][EUU.GetNameDef] ont décidé de former l'Union européenne de la défense (UED) en tant qu'alliance militaire et de quitter collectivement l'OTAN."
 EU_news.48.a: "D'accord"
 EU_news.49.t: "Un membre de l'OTAN quitte et rejoint l'UDE"
 EU_news.49.d: "[FROM.GetFlag] [FROM.GetNameDefCap] quitte l'OTAN et rejoint [EUU.GetFlag] l'Union européenne et l'Union européenne de la défense (UED)."
 EU_news.49.a: "D'accord"
 EU_news.50.t: "Exercice militaire à la frontière"
 EU_news.50.d: "[FROM.GetFlag] [FROM.GetNameDefCap] effectue un exercice militaire à notre frontière. Nous devons envisager de nous y opposer."
 EU_news.50.a: "D'accord"
 EU_news.51.t: "L'exercice militaire est neutralisé"
 EU_news.51.d: "[FROM.GetFlag] [FROM.GetNameDefCap] a neutralisé notre exercice militaire et exécute le sien à sa frontière."
 EU_news.51.a: "D'accord"
