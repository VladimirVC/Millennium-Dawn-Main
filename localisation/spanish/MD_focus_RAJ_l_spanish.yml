 RAJ_rebellion_ladakh_title: "Ladakh Declares Independence"
 RAJ_rebellion_ladakh_desc: "The Muslim population of Ladakh has lost all faith in the central government. Armed separatists have seized control of the region and declared independence. Our forces have been expelled from the area."
 RAJ_rebellion_meghalaya_title: "Meghalaya Declares Independence"
 RAJ_rebellion_meghalaya_desc: "The Christian communities of Meghalaya have risen up against the central government. Tribal militias have seized control of the state and declared independence."
 RAJ_rebellion_manipur_title: "Manipur Declares Independence"
 RAJ_rebellion_manipur_desc: "The Christian and tribal communities of Manipur have risen up against the central government. Armed groups have seized control of the state and declared independence."
 RAJ_rebellion_sikkim_title: "Sikkim Declares Independence"
 RAJ_rebellion_sikkim_desc: "The Buddhist population of Sikkim has lost all faith in the central government. Separatist forces have seized control and declared independence, seeking to restore Sikkim's sovereignty."
 RAJ_rebellion_punjab_title: "Punjab Declares Independence"
 RAJ_rebellion_punjab_desc: "The Sikh population of Punjab has lost all faith in the central government. Khalistan separatists have seized control of the region and declared independence."
 indian_event.70.t: "BRICS Full Membership Invitation"
 indian_event.70.d: "[FROM.GetName] has extended an invitation for our nation to join BRICS as a full member. This represents a significant opportunity to deepen our economic and political ties with the world's most dynamic emerging economies. Full membership grants us voting rights, access to the New Development Bank, and participation in all BRICS initiatives."
 indian_event.70.a: "Accept the invitation with honor"
 indian_event.70.b: "Decline - we do not meet the requirements"
 indian_event.71.t: "[FROM.GetName] Accepts BRICS Full Membership"
 indian_event.71.d: "[FROM.GetName] has formally accepted our invitation to join BRICS as a full member. This historic expansion strengthens our alliance and brings new opportunities for cooperation in trade, finance, and security."
 indian_event.71.a: "Welcome them into the fold"
 indian_event.72.t: "[FROM.GetName] Declines BRICS Full Membership"
 indian_event.72.d: "[FROM.GetName] has declined our invitation to join BRICS as a full member. While disappointing, we respect their decision and hope to continue diplomatic engagement through other channels."
 indian_event.72.a: "A missed opportunity"
 indian_event.73.t: "BRICS Associate Membership Invitation"
 indian_event.73.d: "[FROM.GetName] has invited us to become an associate member of BRICS. This status offers enhanced cooperation opportunities without full voting rights. Associate members participate in economic initiatives and have observer status at summits."
 indian_event.73.a: "Accept associate membership"
 indian_event.73.b: "Decline - requirements not met"
 indian_event.74.t: "[FROM.GetName] Accepts BRICS Associate Membership"
 indian_event.74.d: "[FROM.GetName] has accepted our invitation for associate membership in BRICS. This strengthens our economic ties and opens new avenues for cooperation."
 indian_event.74.a: "A step closer to full integration"
 indian_event.75.t: "[FROM.GetName] Declines BRICS Associate Membership"
 indian_event.75.d: "[FROM.GetName] has declined our offer of associate membership in BRICS. We remain open to future cooperation."
 indian_event.75.a: "Perhaps another time"
 indian_event.76.t: "BRICS Observer Status Invitation"
 indian_event.76.d: "[FROM.GetName] has offered us observer status in BRICS. This allows us to attend summits, participate in working groups, and build relationships with member states as we consider deeper engagement."
 indian_event.76.a: "Accept observer status"
 indian_event.76.b: "Decline - not interested"
 indian_event.77.t: "[FROM.GetName] Accepts BRICS Observer Status"
 indian_event.77.d: "[FROM.GetName] has accepted our invitation for observer status in BRICS. This marks the beginning of what could be a deeper relationship."
 indian_event.77.a: "Every journey begins with a single step"
 indian_event.78.t: "[FROM.GetName] Declines BRICS Observer Status"
 indian_event.78.d: "[FROM.GetName] has declined our offer of observer status in BRICS. The invitation stands should they reconsider."
 indian_event.78.a: "Perhaps in time"
 indian_event.79.t: "BRICS Associate Membership Offered"
 indian_event.79.d: "[FROM.GetName] has offered to elevate our standing within BRICS from observer to associate member. Associate status grants us a seat in the bloc's economic initiatives and a stronger voice in summit discussions, deepening our partnership with the emerging economies."
 indian_event.79.a: "Accept the promotion"
 indian_event.79.b: "Decline - we are content as observers"
 indian_event.82.t: "BRICS Full Membership Offered"
 indian_event.82.d: "[FROM.GetName] has offered to elevate our standing within BRICS from associate to full member. Full membership grants voting rights, access to the New Development Bank, and entry into the alliance's security arrangements, binding our future to the bloc."
 indian_event.82.a: "Accept full membership"
 indian_event.82.b: "Decline - the commitment is too great"
