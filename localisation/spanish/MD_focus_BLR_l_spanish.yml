 belarus_LTB.1.t: "Communist Protests Erupt"
 belarus_LTB.1.d: "Communist agitators have organised large-scale demonstrations across the country. The protests have drawn significant public attention and are putting considerable pressure on the government. Our intelligence services suspect foreign involvement but have not been able to confirm it."
 belarus_LTB.1.a: "This is deeply concerning"
 belarus_LTB.2.t: "Pro-Belarusian Propaganda Campaign"
 belarus_LTB.2.d: "A coordinated propaganda campaign promoting the benefits of closer ties with Belarus has appeared across our media landscape. Posters, leaflets, and public speakers are calling for a unified state. While the movement appears grassroots, the messaging is remarkably consistent."
 belarus_LTB.2.a: "We must counter this"
 belarus_LTB.3.t: "Military Officers Accused of Foreign Ties"
 belarus_LTB.3.d: "Several of our military officers have been implicated in a corruption scandal involving payments from foreign sources. The accused officers held sensitive positions and their removal will create gaps in our command structure. This appears to be part of a broader foreign intelligence operation."
 belarus_LTB.3.a: "Arrest them immediately"
 belarus_LTB.4.t: "Political Corruption Scandal"
 belarus_LTB.4.d: "Leaked documents reveal that multiple members of parliament have been receiving payments from a foreign government in exchange for political influence. The scandal has shaken public confidence in our democratic institutions and several coalition partners are threatening to withdraw support."
 belarus_LTB.4.a: "This is a disaster"
 belarus_LTB.5.t: "Communist Uprising"
 belarus_LTB.5.d: "Armed communist insurgents have seized key government buildings across the country. The military is divided, and the civilian government appears to be collapsing. This is a full-scale revolution. Our allies abroad have been unable or unwilling to intervene."
 belarus_LTB.5.a: "The old order is finished"
 BLR_new_paths_desc: ""