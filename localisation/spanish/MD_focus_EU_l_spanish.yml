 system_of_eu_values_tt: "Sistema de Valores Europeos:\nValor de la UE:\nproblema de infracción - nivel de infracción\n\nEstado de Derecho:\nCorrupción paralizante - 5\nCorrupción paralizante grave - 4\nCorrupción desenfrenada - 3\nCorrupción descontrolada - 2\nCorrupción sistemática - 1\n\nRespeto por la dignidad humana y la libertad:\nprovoca guerra ofensiva con un estado miembro de la UE - 10\ntiene gobierno comunista - 2\ntiene gobierno reaccionario - 2\ntiene comunista en la coalición - 1\ntiene reaccionario en la coalición - 1\n\nDemocracia:\nSin elecciones - 5\nDictadura - 5\nDictadura comunista - 5\nDictadura fascista - 5\nes marioneta - 4\nNeoeimperialismo - 1\n\nDerechos de las Mujeres y las Minorías:\nServicio prohibido para mujeres - 1\nUmbral electoral 10% - 1\n\nCláusula de No Rescate:\nIncumplimiento de Deudas - 1\nRescate dado - 1"
