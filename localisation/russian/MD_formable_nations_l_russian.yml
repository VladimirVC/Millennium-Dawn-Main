 form_SCA_category: "Объединение северных народов"
 form_SCA_category_desc: "Северные народы уже не раз делили между собой государство: Шведская империя, Кальмарский союз и другие. Объединение этой группы народов с такой яркой и богатой историей, уникальными культурами и языками станет сложной задачей для тех, кто решится совершить этот подвиг."
 SCA_integrate_start: "Begin forming [GetSCANameDef]"
 SCA_integrate_start_desc: "It is time to form the Scandinavian Empire. Our brothers and sisters will truly be united under one banner as we build a greater tomorrow.\n\n"
