 antarctica_join_ccas_effect_tt: "§YCCAS§!に加盟する。\n以下の関連する研究所の出力を§G+20%§!増加させます:\n- §Y遺伝子技術§!出力\n- 保険医療コスト倍率\n- 月間人口増加\n例: §Y+8.0%§!の遺伝子技術出力は§G+9.6%§!になります。"
 antarctica_leave_ccas_effect_tt: "§YCCAS§!から脱退し、CCASによる研究所ボーナスを削除する。"
 antarctica_join_ccamlr_effect_tt: "§YCCAMLR§!に加盟する。\n関連する研究所の出力を（加算ではなく乗算で）§G+20%§!増加させる:\n- §Y潜水艦研究§!出力\n- §Y海軍艤装研究§!出力\n- 海軍探知\n例: §Y+6%§!の潜水艦研究は§G+7.2%§!になる。"
 antarctica_leave_ccamlr_effect_tt: "§YCCAMLR§!から脱退し、CCAMLRによる研究所ボーナスを削除する。"
 join_antarctica_treaty_tt: "1ヶ月後:"
 leave_antarctica_treaty_tt: "2年後:"
 leave_antarctica_cannot_be_stopped_tt: "§Rこの行動は中止できない。§!"
 leave_antarctica_treaty_warning_tt: "§R警告:§!\n§C南極条約§!から脱退する際に§C南極§!に§Y研究基地§!を維持していると、制裁や外交的反発を含む、条約締約国からの国際的な反応を招く。悪影響を避けるため、条約を脱退する前に§C南極§!にあるすべての研究基地を解体することを推奨する。\n\n基地を維持したまま条約を脱退することを選択した場合、資源開発や軍事拠点の設置など、§C南極§!における禁止活動を制限する条項は適用されなくなるが、自国の国際的評判に深刻な影響を及ぼす可能性がある。"
 antarctica_post_treaty_activity_category: "脱退後の南極活動"
 antarctica_post_treaty_activity_category_desc: "これらの行動は、南極基地を維持したまま南極条約を脱退したために実行可能となっている。"
 antarctica_post_treaty_resource_extraction: "南極資源の開発"
 antarctica_post_treaty_resource_extraction_desc: "残存する基地インフラを活用して、南極から資源を採掘することができる。これにより収入は増加するが、条約締約国からの外交的反発を招くことになる。"
 antarctica_post_treaty_military_preparations: "軍事インフラの準備"
 antarctica_post_treaty_military_preparations_desc: "基地施設を軍事計画や兵站のために転用する。これは軍事的な利点をもたらす一方で、深刻な挑発行為とみなされる。"
 antarctica_laboratory_dynamic_modifier: "南極研究基地出力"
 antarctica_lab_tech_bonus: "南極研究基地研究所技術ボーナス"
 has_startup_antarctica_station_TT: "2000年以前から研究基地を保有していた"
 antarctica_atcp_application_pending: "[ROOT.GetNameWithFlag]のATCP申請は保留中"
 is_antarctica_atcp_consultative_member: "[ROOT.GetNameWithFlag]は既に南極条約協議国協議国である"
