 NKO_trade_agreements_with_brazilia_desc: "[BRA.GetName]와 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
 NKO_trade_agreements_with_indonesia: "[IND.GetName]와의 무역 협정"
 NKO_trade_agreements_with_indonesia_desc: "[IND.GetName]와 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
 NKO_use_russian_model: "러시아 해군 모델 채택"
 NKO_use_russian_model_desc: "강력한 해군을 향한 노력 속에서 우리는 러시아 동맹국의 해군 전략과 설계를 채택 및 개량하여 우리 함대의 역량을 한 단계 끌어올릴 것입니다."
 NKO_armed_to_the_teeth: "완벽한 중무장"
 NKO_armed_to_the_teeth_desc: "모든 함선은 가장 강력한 무기로 무장될 것입니다. 우리는 해군을 적들에게 공포를 심어주는 불굴의 무력으로 만들 것입니다."
 NKO_heavy_cruiser_focus: "중순양함 집중"
 NKO_heavy_cruiser_focus_desc: "바다 건너로 무력을 투사하기 위해, 우리는 바다를 제패하고 어떤 적 앞에서도 굴하지 않는 중장갑 순양함 건조에 집중할 것입니다."
 NKO_the_north_korean_carrier: "공화국 항공모함"
 NKO_the_north_korean_carrier_desc: "항모 함대는 우리 기술력의 상징입니다. 우리는 먼 바다에 주체사상의 깃발을 휘날리기 위해 독자적인 항공모함을 개발할 것입니다."
 NKO_the_korean_typhoon_class: "북한의 태풍급"
 NKO_the_korean_typhoon_class_desc: "전 세계의 강력한 잠수함들에서 영감을 얻은 우리의 독자적인 태풍급은 수중 작전 능력을 강화하여 우리에게 도전하는 자들에게 침묵의 위협이 될 것입니다."
 NKO_ship_launched_cruise_missiles: "함대지 순항 미사일"
 NKO_ship_launched_cruise_missiles_desc: "해군은 최신 함대지 순항 미사일을 장착하여 해안선 멀리 떨어진 목표물까지 타격할 수 있는 사거리와 위력을 키울 것입니다."
 NKO_korean_mariens: "조선 해병대"
 NKO_korean_mariens_desc: "정예 해병 부대를 창설하면 상륙 작전을 수행하고 전략적 요충지의 제해권을 빠르고 단호하게 확보할 수 있습니다."
 NKO_get_russian_help: "러시아 군사 원조 요청"
 NKO_get_russian_help_desc: "군사 기술을 증진하기 위해 신뢰할 수 있는 동맹국인 러시아의 원조를 요청하여 필요한 전문 지식과 장비를 갖출 것입니다."
 NKO_get_chinese_help: "중국 군사 원조 요청"
 NKO_get_chinese_help_desc: "군사 기술을 증진하기 위해 신뢰할 수 있는 동맹국인 중국의 원조를 요청하여 필요한 전문 지식과 장비를 갖출 것입니다."
 NKO_our_jet: "국산 전투기"
 NKO_our_jet_desc: "우리는 최신 전투기를 더 빠르게 입수하기 위해 항공 분야의 연구를 지속할 것이며, 이미 국산화 단계에 진입해 있습니다."
 NKO_korean_ground_forces: "조선 지상군 강화"
 NKO_korean_ground_forces_desc: "지상군은 우리 국방의 척추입니다. 우리는 훈련과 장비에 투자하여 어떤 전투에도 임할 수 있는 태세를 보장할 것입니다."
 NKO_doctrine_modernization: "교리 현대화"
 NKO_doctrine_modernization_desc: "우리는 현대적인 전쟁 접근법을 채택하여 현재의 군사 전술 및 전략의 현실을 교리에 반영할 것입니다."
 NKO_implement_new_doctrine: "신규 교리 도입"
 NKO_implement_new_doctrine_desc: "새로운 전략을 시행함으로써 혁신적인 전술과 전장 내 향상된 전투 효율성으로 우리 군대에 힘을 실어줍니다."
 NKO_superior_firepower: "우세 화력 교리"
 NKO_superior_firepower_desc: "화력에 집중하여 군대가 압도적인 위력을 발휘하고 결정적인 승리를 거둘 수 있도록 무장시킬 것입니다."
 NKO_keep_our_doctrine: "전통 교리 유지"
 NKO_keep_our_doctrine_desc: "우리의 전통 교리는 훌륭히 제 역할을 해왔습니다. 우리는 이를 다듬고 유지하여 과거로부터 힘을 얻고 미래의 분쟁에 맞게 조정할 것입니다."
 NKO_train_the_south: "남방전 훈련"
 NKO_train_the_south_desc: "남조선과의 잠재적 충돌에 대비해 해당 환경에 특화된 훈련을 시켜 회복력과 결의로 교전할 준비를 갖춰야 합니다."
 NKO_mass_assault_prevails: "대규모 돌격의 우위"
 NKO_mass_assault_prevails_desc: "압도적인 숫자를 통한 무력 교리는 여전히 유효합니다. 우리는 대규모 돌격 전략을 유지하여 어떤 적이든 지쳐 쓰러지게 만들 것입니다."
 NKO_special_mass_assault: "특수 대규모 돌격 부대"
 NKO_special_mass_assault_desc: "대규모 돌격 전략을 완벽히 다듬기 위해, 이 전술의 강점을 극대화하도록 훈련받은 특수 부대를 양성할 것입니다."
 NKO_korean_iron_fist: "공화국의 철권"
 NKO_korean_iron_fist_desc: "우리의 무력은 어떤 적이든 짓부수는 철권이 될 것입니다. 강도 높은 훈련과 군기를 통해 군대가 이 꺾이지 않는 의지를 구현하도록 준비시킵니다."
 NKO_defend_our_skies: "영공 수호"
 NKO_defend_our_skies_desc: "우리의 방공망은 강력해야 합니다. 우리는 영공 방어를 최우선으로 하여 어떤 적기라도 미탐지 상태로 접근할 수 없게 할 것입니다."
 NKO_defend_the_coast: "해안선 방어"
 NKO_defend_the_coast_desc: "우리의 해안 방어는 빈틈이 없어야 합니다. 우리는 해안선을 요새화하여 모든 침공 시도를 억제하고 주권을 수호할 것입니다."
 NKO_harts: "고고도 정찰 전술"
 NKO_harts_desc: "우리는 적의 동향을 감시하고 고고도에서 가치 있는 정보를 얻기 위해 첨단 정찰 전술을 채택할 것입니다."
 NKO_upgrade_our_radar: "레이더 체계 업그레이드"
 NKO_upgrade_our_radar_desc: "멀리서 접근하는 위협을 감지하기 위해 레이더 기술을 향상시켜 다가오는 모든 위험에 대비하는 조기 경보 체계를 구축할 것입니다."
 NKO_counter_enemy_missiles: "적 미사일 대응"
 NKO_counter_enemy_missiles_desc: "조국을 수호하기 위해 우리는 적 미사일에 대한 대응책을 개발하여 공중 위협으로부터 안전을 보장해야 합니다."
 NKO_army_supply_hubs: "육군 보급 허브 구축"
 NKO_army_supply_hubs_desc: "군사력을 유지하기 위해, 군대가 항상 준비되어 있고 지속적인 작전을 위한 보급을 원활히 받을 수 있도록 보급 허브를 건설할 것입니다."
 NKO_mass_drones: "무인기 대량 생산"
 NKO_mass_drones_desc: "우리 군대에 최고의 무인기를 공급하기 위해 무인기의 대량 생산에 집중하기 시작할 것입니다!"
 NKO_more_zavods: "군산복합체 투자"
 NKO_more_zavods_desc: ""
 NKO_young_red_guard_idea: "붉은청년근위대"
 NKO_young_red_guard_idea1: "청년근위대"
 NKO_army_sso: "조선인민군 특수작전군"
 NKO_war_university: "김일성군사종합대학"
 NKO_vpk: "국내 군산복합체"
 NKO_sad_army_idea: "구식 인민군"
 NKO_sad_army_idea_desc: "이 국가 정신은 §H혁명적 군인 정신§! 중점을 완료하면 §Y업그레이드§!됩니다.\n§W--------------§!\n우리 인민군은 상당한 병력을 자랑하지만 구식 장비와 기술에 지나치게 의존하고 있습니다. 무기고의 상당수는 현대화가 제한된 소련 시절의 전차, 포병, 항공기로 구성되어 있습니다. 이러한 노후 체계에 대한 의존은 자원 부족과 국제 제재를 반영하며, 군대의 숫자만 방대할 뿐 현대 군대에 비해 효율과 역량 면에서는 도전을 받고 있습니다."
 NKO_new_army_idea: "신생 조선인민군"
 NKO_new_army_idea_desc: "현대화된 조선인민군은 향상된 독자 기술과 핵심 군사 자산에 대한 전략적 업그레이드를 결합합니다. 강화된 미사일 체계, 무인기, 그리고 사이버전 역량은 현대화를 향한 변화를 보여줍니다. 여전히 제재의 제약을 받고 있지만, 혁신과 비대칭 전술에 초점을 맞추어 역내에서 굴하지 않는 무력을 갖추게 되었습니다."
 NKO_marines_idea: "해병대"
 NKO_unite_sport_team: "올림픽 단일팀"
 NKO_unite_sport_team_desc: ""
 NKO_propose_confederation: "연방제 문제"
 NKO_propose_confederation_desc: ""
 NKO_create_confederation: "고려 연방"
 NKO_create_confederation_desc: ""
 NKO_demoralize_propaganda: "사기 저하 삐라"
 NKO_demoralize_propaganda_desc: "."
 NKO_border_picture: "남조선 국경 사진"
 NKO_border_picture_desc: "."
 NKO_finance_rebels: "반군 자금 지원"
 NKO_finance_rebels_desc: "."
 NKO_weapons_for_rebels: "반군 무기 지원"
 NKO_weapons_for_rebels_desc: "."
 NKO_united_again: "다시 하나로"
 NKO_united_again_desc: "."
 NKO_expand_local_industry: "국내 산업 투자"
 NKO_expand_local_industry_desc: "강력한 산업 없이는 공화국이 적들의 경제적 압박을 견뎌낼 수 없으므로 국내 생산을 확대해야 합니다"
 NKO_more_arms_factories: "군수 공장 추가"
 NKO_field_hospitals: "야전 병원"
 NKO_field_hospitals_desc: "전쟁 발생 시 병사들을 최대한 빠르게 치료할 수 있도록 야전 병원을 더 많이 배치할 것입니다"
 NKO_reform_youth: "노농적위군 개혁"
 NKO_reform_youth_desc: "이 조직을 개혁하는 것은 진작에 필요했던 일이며, 기존의 기능은 이미 오래전에 현대성에 부합하지 않게 되었습니다"
 korea_north.7.t: "거리로 퍼져나가는 마약"
 korea_north.7.d: "빙두와 코카인 같은 강력한 마약이 이웃을 휩쓸고 지역 사회를 파괴하면서 거리가 혼란 속에 잠겨가고 있습니다. 가정이 파탄 나고 범죄가 증가하며 그 누구도 더 이상 안전함을 느끼지 못합니다."
 korea_north.7.a: "우리의 적은 몰락할 것입니다"
 korea_north.8.t: "우리가 가져온 마약이 국경에서 적발되었습니다."
 korea_north.8.d: "모든 것이 순조로웠지만, 화물이 국경에서 적발되었다는 연락이 닿는 순간 끝이었습니다. 이제 모든 것이 위태로워졌습니다. 수개월간의 계획이 수포로 돌아갔습니다"
 korea_north.8.a: "다시 시도할 것이다"
 korea_north.9.t: "은행 체계를 괴롭히는 위조지폐"
 korea_north.9.d: "위조지폐가 도처에 만연하여 발각되지 않고 유통되면서 혼란을 야기하고 있습니다. 지역 상점, 노점상, 심지어 대형 소매업체까지 위조지폐 유통 속도가 당국의 대응 속도를 따라가지 못하면서 피해를 입고 있습니다."
 korea_north.9.a: "제국주의의 몰락"
 korea_north.10.t: "당국에 압수된 위조지폐"
 korea_north.10.d: "당국이 이번 화물을 압수했지만 이것은 끝이 아닌 시작일 뿐입니다."
 korea_north.10.a: "더 많이 찍어내라!"
 NKO_accept_money: "자금 §Y수락§!"
 NKO_medicine_relief: "의료 구호품 §Y발송§!"
 NKO_build_farms1: "§Y농장§! 건설"
 NKO_build_farms1_desc: "인민들을 먹여 살리기 위한 농장 건설은 필수적이며, 현재 이 농장이 건설 중입니다"
 NKO_build_factory1: "§Y민수 산업§! 건설"
 NKO_build_factory1_desc: "경제 성장을 돕기 위해 우리는 인민들이 더 많은 소비재를 생산할 수 있도록 힘을 실어주고 산업 역량을 높여야 합니다."
 korea_herb: "§Y통일 지지도§!"
