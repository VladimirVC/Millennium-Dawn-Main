name: Tools Validation

on:
  pull_request:
    paths:
      - 'tools/**'
      - '.pre-commit-config.yaml'
      - '.github/workflows/coding-pipeline.yml'
      - '.github/workflows/tools-validation.yml'
      - '.github/workflows/validator-cache.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          sparse-checkout: |
            tools
            pyproject.toml
            common
            events
            history
            localisation
            interface
            gfx/flags
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --group runtime
      - name: Run tools validation
        run: |
          python tools/validate_tools.py --strict --no-color --output tools_validation.log
      - name: Upload validation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: tools-validation-report
          path: tools_validation.log
          retention-days: 7

  report-lib-tests:
    name: report_lib + validator unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # config_drift_test reads these two config files to compare the
          # validator set declared in each. pyproject.toml supplies the pytest
          # testpaths so all four test dirs are collected.
          sparse-checkout: |
            tools
            pyproject.toml
            .pre-commit-config.yaml
            .github/workflows/coding-pipeline.yml
            .github/workflows/tools-validation.yml
            .github/workflows/validator-cache.yml
          sparse-checkout-cone-mode: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install --group dev
      - name: Run pytest
        # testpaths in pyproject.toml covers all six test dirs (tools/tests,
        # report_lib/tests, validation/tests, linting/tests,
        # standardization/tests, docs_checks/tests).
        run: |
          python -m pytest -v

  ruff-lint:
    name: ruff lint (tools)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          sparse-checkout: |
            tools
            pyproject.toml
          sparse-checkout-cone-mode: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install --group dev
      - name: Run ruff
        run: ruff check tools --output-format=github
      - name: Check formatting (ruff format)
        run: ruff format --check tools
