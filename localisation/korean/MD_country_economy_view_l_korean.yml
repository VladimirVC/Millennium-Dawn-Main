 BALANCE_TOOLTIP: "우리의 주간 수지는 $[?treasury_rate|+3]§H십억§!입니다."
 BALANCE_TOOLTIP_DELAYED: "수지는 매주 국고의 순변화량을 의미하며, 총 수입에서 총 지출을 뺀 값과 같습니다. 수지가 마이너스면 국고가 고갈되며, 국고가 바닥나면 매주 부채가 발행됩니다."
 TREASURY_TITLE: "국고"
 TREASURY_VALUE: "§Y[?treasury|3]§!"
 TREASURY_TOOLTIP: "국고에 $[?treasury]§H십억§!이 있습니다.\n우리의 주간 수지는 $[?treasury_rate|+3]§H십억§!입니다."
 TREASURY_TOOLTIP_DELAYED: "국고는 우리가 지출할 수 있는 자금의 양을 나타내며, 구매 및 투자에 사용할 수 있습니다. 국고가 적자로 전환되면 국고를 양수로 유지하기 위해 매주 부채가 자동으로 발행됩니다.\n\n§t경제 화면이 무역 탭으로 이동되었습니다.§!"
