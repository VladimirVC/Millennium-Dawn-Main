l_simp_chinese:
 event_horizon_generic_focus: "人类国策树"
 chimera_focus: "奇美拉国策树"
 EH_set_up_electric_trap: "设下电子陷阱"
 EH_remove_electric_trap: "移除电子陷阱"
 EH_activate_electric_trap: "激活电子陷阱"
 EH_drone_mission_category: "无人机任务"
 EH_drone_mission_category_desc: "\n£EH_gui_drone_picture\n\n\n\n无人机是我们最可靠且最安全的侦察工具。借助它们，我们无需拿士兵性命冒险就能获取敌方情报。我们可以派遣无人机侦察附近的传送门，观察敌军在其周边的建造动向，这或许能在争夺传送门的战斗中为我们赢得战术优势。"
 EH_research_sites_category: "研究基地"
 EH_research_sites_category_desc: "研究基地是我们获取奇美拉与其技术情报的最佳途径。这些前哨站不仅能吸引顶尖科学家加盟，还能为特殊项目提供研究加成。但愿奇美拉部队不会过早发现它们。"
 EH_setup_research_site: "设置研究基地"
 EH_install_anti_air_weapons: "安装防空武器"
 EH_panic_shelters_and_land_turrets: "修建防空洞与地面炮台"
 EH_hire_additional_security_for_scientists: "为科学家增派安保人员"
 EH_disable_site_notifications: "禁用研究基地遇袭通知"
 EH_enable_site_notifications: "启用研究基地遇袭通知"
 EH_doudna_or_charpentier_project_mission: "§Y珍妮弗·道德纳§!和§Y埃玛纽埃勒·沙尔庞捷§!的特殊项目"
 EH_doudna_or_charpentier_project_mission_desc: "§Y珍妮弗·道德纳§!和§Y埃玛纽埃勒·沙尔庞捷§!正致力于一项特殊项目，该项目或将助力我们更深入地解析奇美拉的基因构成。她们在CRISPR基因编辑技术领域的专长，有望为揭示这些生物的致命弱点提供宝贵线索，从而能够让我们制定更有效的对抗策略。"
 EH_find_new_veins_category: "寻找新的蓝道尔石矿脉"
 EH_find_new_veins_category_desc: "蓝道尔石是一种稀有且珍贵的资源，分布于全球特定矿脉中。它对我们研发对抗奇美拉的新技术至关重要。通过投资勘探和采矿作业，我们能提高发现新蓝道尔石矿脉的几率，确保这种关键资源的稳定供应。\n\n每座蓝道尔石矿场每周可产出少量矿石。我们必须在大型企业接管资源开采、迫使我们做出艰难抉择之前，尽可能多地发现并掌控热点区域。"
 EH_search_for_randallite_veins: "寻找新的蓝道尔石矿脉"
 EH_set_up_mine_mission: "签订新合同"
 EH_large_company_seeks_for_randallite_mission: "大型企业寻求蓝道尔石"
 EH_outlaw_randallite_extraction: "取缔非国家蓝道尔石开采"
 EH_legalize_randallite_extraction: "合法化非国家蓝道尔石开采"
 EH_construct_southern_zenobia_defense_line: "建设§G南芝诺比娅§!防线"
 EH_construct_western_zenobia_defense_line: "建设§G西芝诺比娅§!防线"
 EH_construct_inner_saladin_defense_line: "建设§G内萨拉丁§!防线"
 EH_construct_outer_saladin_defense_line: "建设§G外萨拉丁§!防线"
 EH_southern_zenobia_defense_line_destruction: "南芝诺比娅防线崩溃"
 EH_western_zenobia_defense_line_destruction: "西芝诺比娅防线崩溃"
 EH_inner_saladin_defense_line_destruction: "内萨拉丁防线崩溃"
 EH_outer_saladin_defense_line_destruction: "外萨拉丁防线崩溃"
 EH_nile_defense_line_category: "芝诺比娅与萨拉丁防线"
 EH_nile_defense_line_category_desc: "尼罗河防线是我们抵御非洲奇美拉军队的最佳机会。芝诺比娅防线将是我们的第一道防线，而萨拉丁防线则是芝诺比娅防线失守后的最后一道希望。我们必须确保这两条防线都得到严密的加固和充足的人员驻守，因为它们将是我们能否在这场战争中生存的关键。"
 EH_bosporus_defense_line_category: "博斯普鲁斯防线"
 EH_bosporus_defense_line_category_desc: "博斯普鲁斯防线是我们抵御欧洲奇美拉部队的最佳机会。这条防线将部署重炮和防空武器，并修建战壕和碉堡网络。大多数欧洲国家的军队都将驻扎在那里。我们必须确保防线坚不可摧。"
 EH_construct_bosphorus_defense_line: "建设§G博斯普鲁斯§!防线"
 EH_bosphorus_defense_line_destruction: "博斯普鲁斯防线崩溃"
 EH_caucasus_defense_line_category: "高加索防线"
 EH_caucasus_defense_line_category_desc: "敌人在中东地区迅速推进，威胁着我们的南部边境。高加索防线是我们抵御该地区奇美拉部队的最佳机会。该防线将采用双层防御体系，第一层由战壕和碉堡组成，第二层则以重炮和防空武器为核心。我们必须确保防线稳固，并寄希望于能够守住西藏境内的奇美拉部队，除非我们的防线从后方崩溃。"
 EH_construct_caucasus_defense_line: "建设§G高加索§!防线"
 EH_caucasus_defense_line_destruction_1: "高加索第一防线崩溃"
 EH_caucasus_defense_line_destruction_2: "高加索第二防线崩溃"
 EH_event.0.t: "欢迎来到事件穹界！"
 EH_event.0.d: "事件穹界是我们为了庆祝Steam创意工坊模组达到百万订阅而制作的第一个大型特殊剧本。这个模组专注于战争。人类正为生存而战，对抗未知的外星入侵者。战役包含独特的国策树，全新事件、决议、机制、作战单位及资源，将让你沉浸在这场史诗级的生存之战中。准备好迎接未知，带领人类走向胜利，感谢一直以来您的支持！"
 EH_event.0.a: "呜呼！！！等等？？外星人？！"
 EH_event.1.t: "芝诺比娅防线与萨拉丁防线正在建设中"
 EH_event.1.d: "为应对撒哈拉以南非洲日益严峻的威胁，中东联盟已批准在埃及南部尼罗河沿岸及西部沙漠地带紧急修筑加固防线。该防御阵地命名为芝诺比娅防线，将部署重型火炮阵地，并在关键进攻方向构筑堑壕系统。\n\n若芝诺比娅防线失守，萨拉丁防线将坚守其后。这条贯穿整个运河地带，从塞得港延伸至红海的防御工事，将成为绝对防线。\n"
 EH_event.1.a: "让沙漠变成我们的后盾"
 EH_event.300.t: "欧洲核子研究中心触及未知"
 EH_event.300.d: "欧洲核子研究中心的研究人员成功地进行了一次受控高能碰撞实验，实验暂时产生了一种被称为“局部维度间异常”的东西。\n\n虽然裂缝是在次原子水平测量到的且只持续了几纳秒，但它标志着首次出现了与已知物理定律不一致的能量特征。初步的封闭协议已生效，且目前尚未观察到任何物质转移，但其影响已在全球科学界带来巨大震撼。\n\n理论与现实的边界，刚刚变得模糊了起来。"
 EH_event.300.a: "这真的安全吗？"
 EH_event.301.t: "联合国车队在中非失踪"
 EH_event.301.d: "一支在卢旺达与刚果民主共和国边境地区执行任务的联合国人道主义车队突然失联。卫星图像显示，丛林通道上散落着车辆残骸和翻覆的载具，但事故发生时并未收到任何求救信号。\n​\n现场没有发现任何幸存者或遗体。目前尚未任何反叛武装宣布对此负责。官方仍未公布事件原因。"
 EH_event.301.a: "又一起针对联合国维和部队的袭击…"
 EH_event.302.t: "塔里木盆地发生异常地震活动"
 EH_event.302.d: "中国西部塔里木盆地记录到一组浅层高频地震。其地震波模式与地壳自然运动或已知的地下活动完全不符。中国官方尚未任何发表声明，但通过大学交流项目私下分享的区域地震学数据，已引起了地球物理学家们的关注。"
 EH_event.302.a: "这些读数不太对劲"
 EH_event.303.t: "帕米尔的无线电静默"
 EH_event.303.d: "中国与塔吉克斯坦边境附近的一个解放军高海拔信号情报站已停止了所有通讯。尚无任何来自北京方面的官方消息。但一名来自哈萨克斯坦的业余无线电爱好者声称，在该站点失联前，曾听到一段简短的中文紧急频率广播。情报卫星监测显示，该哨所出现了明显的损毁迹象。"
 EH_event.303.a: "会是塔吉克人做的吗？"
 EH_event.304.t: "北阿拉斯加护林员失踪事件"
 EH_event.304.d: "两名德纳里国家公园偏远地区巡逻的国家公园护林员在失联72小时后，被正式宣布失踪。随后派出的一支搜救队发现了他们被遗弃的营地，现场有明显的搏斗痕迹。\n\n​起初，这起事件仅见于当地报端，但随着搜救小队也随之凭空消失，该事件开始引起全美乃至国际社会的广泛关注。目前，联邦调查局已介入调查，一场大规模搜救行动正在展开。"
 EH_event.304.a: "杀人犯逍遥法外？"
 EH_event.305.t: "秘鲁高原的奇怪疫情"
 EH_event.305.d: "秘鲁南部安第斯高地的一个偏远村庄在爆发神秘疫情后，已被地区卫生部门隔离。初步报告描述称，当地人出现了发烧、幻觉以及严重的感官定向障碍。据报道，这些症状是在一次仅在该村附近狭窄山谷内感知的“闪光”和震动后迅速出现的。\n\n秘鲁官方声称这是一起孤立的真菌感染事件，但在附近活动的非政府组织称，医疗队一直由军事人员护送。此外，一名来自圣马科斯国立大学、当时正在调查附近洞穴的研究团队地质学家，目前也处于失踪名单中。"
 EH_event.305.a: "随时通报最新情况"
 EH_event.306.t: "新疆骚乱：军事基地遇袭"
 EH_event.306.d: "新疆西部喀什附近发生了一起暴力冲突事件。中国官方媒体保持沉默，但情报报告显示，位于叶城附近的解放军第三十六号基地在夜间被不明敌对势力攻陷。通过无线电传出的对袭击者性质的描述逻辑混乱，令人费解。\n​\n中国人民解放军已开始向该地区紧急部署机械化部队和化学应急小组。凌晨时分，有人目击到多架运输机在喀什机场降落。\n\n​极罕见的是，一支俄罗斯快速反应分队也已通过库里玛口岸入境中国。"
 EH_event.306.a: "根据北京的说法，“局势已得到控制。”"
 EH_event.307.t: "在中国西部引爆了一枚战术核弹"
 EH_event.307.d: "​在喀什以东约120公里处的塔克拉玛干沙漠附近，监测到了一次战术核武爆炸。爆炸发生于解放军部队受命部署并围堵该地区未知威胁的五天之后。\n​\n北京和莫斯科方面均否认使用了核武器，但地震监测数据确认了一次低当量爆炸，其特征与俄罗斯战术核武器一致。卫星图像显示，现场地形焦黑、地层塌陷，且出现了一个正在迅速扩张的黑色球体。\n​\n国际观察人士正迫切要求获得真相，但官方渠道仍保持沉默。在军方内部传闻愈演愈烈，推测这次打击是俄罗斯战地指挥部根据“紧急交战准则”作出的单方面决定。"
 EH_event.307.a: "那里发生了什么？！"
 EH_event.308.t: "帷幕揭开"
 EH_event.308.d: "​由匿名情报源泄露的卫星图像已在全球范围疯传：一个巨大的、呈紫色脉动状的球体，正耸立在焦黑的爆炸中心上空，成群的生物正从中涌出。科学家们对这些影像完全无法给出合理解释。视频画面清晰显示，核打击不仅未能将其摧毁，反而似乎促成了它的扩张。几小时内，又有三个规模和效果类似的新传送门相继爆发：\n- 阿拉斯加西北部\n- 肯尼亚高地，埃尔贡山附近\n- 智利南部，合恩角附近\n\n已有大量报道称，这些生物极具攻击性。常态时代已经过去。"
 EH_event.308.a: "事实不容置疑"
 EH_event.309.t: "联合国召开紧急大会"
 EH_event.309.d: "随着公众恐慌情绪蔓延，民众对各国政府的信心开始动摇，联合国已进入紧急会议状态。大会动用了极少使用的危机处置权，而安理会正在就协调应对战略进行紧急辩论\n​\n提议的内容涵盖了从全球军事协作到联合科学工作组的各项方案。然而，随着责任推诿和政治意图的碰撞，常任理事国之间的紧张局势正在升级。\n\n​但如果早期的交战报告能证明一个事实的话，那么有一个已经昭然若揭：人类要么团结一致，要么面临灭绝。"
 EH_event.309.a: "全球应对措施开始成形。"
 EH_event.310.t: "统一指挥"
 EH_event.310.d: "联合国紧急大会已圆满结束，并宣布成立联合国联合指挥部。这是一个国际性机构，旨在针对迅速扩张的异维度威胁。该机构用于统一协调全球的军事战略、情报共享以及后勤保障。虽然该指挥部目前主要承担咨询职能，但已被授予了前所未有的行动自主权。\n\n​与此同时，以欧盟为首的地区集团已开始提出政治与军事全面一体化的提案。理由是在面临灭绝危机时，必须实现无缝动员和主权共享。那些曾经不可想象的议题，如今正在欧洲各国的议会中公开讨论。"
 EH_event.310.a: "同一个敌人，同一场战争"
 EH_event.401.t: "北美合众国"
 EH_event.401.d: "我们的政府已经准备好呼吁统一我们的大陆。是时候团结起来，共同面对威胁了。只有团结，才能生存。"
 EH_event.401.a: "开始吧"
 EH_event.402.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.402.d: "在向全国发表的历史性讲话中，[FROM.GetName]呼吁北美军事和政治机构与邻国联合起来，组成统一战线，共同对抗奇美拉的威胁。政府指出，迅速蔓延的传送门及其可怕的居民构成了生存威胁，只有团结一致才能确保生存。\n\n该方案包括共享指挥结构、资源共享、一体化防御系统和统一领土。"
 EH_event.402.a: "是时候了"
 EH_event.403.t: "中美洲共和国"
 EH_event.403.d: "效仿北美，现在是我们国家与邻国团结起来的时候了。我们的国家不如南美或北美洲的国家强大，但团结起来，我们就能做出巨大的改变。"
 EH_event.403.a: "为了我们人民的生存"
 EH_event.404.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.404.d: "我们收到了来自[FROM.GetName]的意外提议，提议将中美洲各国统一为一个国家，以便更好地协调防御奇美拉的威胁。\n\n尽管一些领导人对主权问题表示担忧，但形势的紧迫性促使他们认真考虑了这一提议。"
 EH_event.404.a: "我们必须这么做，无论如何"
 EH_event.405.t: "南美国家联盟"
 EH_event.405.d: "我们是目前美洲唯一尚未统一的地区。我们各国实力强大，但不足以单独对抗奇美拉的威胁。现在是时候团结起来，共同应对这一威胁了。"
 EH_event.405.a: "发送邀请"
 EH_event.406.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.406.a: "为了我们大陆的未来"
 EH_event.407.t: "欧洲联邦"
 EH_event.407.d: "我们的大陆从未像今天这样团结。多年来，欧盟和北约建立了牢固的纽带，但现在是时候将这种纽带提升到一个新的高度了。我们必须团结一致，共同应对奇美拉的威胁。"
 EH_event.407.a: "我们布鲁塞尔见吧"
 EH_event.408.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.408.d: "今天，[GetDateText]，[FROM.GetAdjectiveCap]政府正式提议将欧洲各国合并为一个联邦实体，以便更好地协调防御奇美拉的威胁。继美洲之后，可以肯定的是，某个国家也会向我们的大陆提出同样的提议。\n\n虽然这可能违背了国家独立的民主价值观，但形势的紧迫性已经模糊了大多数意识形态观点。"
 EH_event.408.a: "尽早统一，今日统一"
 EH_event.409.t: "非洲防卫阵线"
 EH_event.409.d: "我们的大陆近来饱受战火蹂躏，但我们依然抱有希望。非洲各国必须团结起来，共同对抗奇美拉的威胁。他们必须明白，这是唯一的出路。"
 EH_event.409.a: "为了非洲的存亡。"
 EH_event.410.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.410.d: "尽管如此，[FROM.GetName]政府已提议非洲各国联合起来，共同对抗奇美拉的威胁。虽然一些国家仍在从近期的冲突中恢复，但当前局势的紧迫性远比我们当地的小问题更为重要。"
 EH_event.410.a: "我们只能做到这样了。"
 EH_event.411.t: "东部大陆联盟"
 EH_event.411.d: "我们必须效仿其他大陆的做法。我们各国都很强大，但还不足以独自对抗奇美拉的威胁。我们需要搁置分歧，团结一致。"
 EH_event.411.a: "发送邀请"
 EH_event.412.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.412.d: "我们两国近来饱受残酷冲突的蹂躏。[FROM.GetName]提议搁置分歧，团结一致，共同对抗奇美拉的威胁。这并非易事，但奇美拉对我们所有人来说都是远超我们局部问题的重大威胁。"
 EH_event.412.a: "现在，我们还是待在一起吧。"
 EH_event.413.t: "欧亚联邦"
 EH_event.413.d: "我们伟大的阵营必须团结一致。奇美拉的威胁正步步逼近。我们各国虽强盛，但还不足以独自对抗奇美拉的威胁。现在是时候团结起来，共同对抗这一威胁了。"
 EH_event.413.a: "我们莫斯科见吧"
 EH_event.414.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.414.d: "时局危急。[FROM.GetName]政府提议将欧亚各国合并为一个联邦实体，以便更好地协调防御奇美拉的威胁。有了俄罗斯军队和经济的保护，我们将能够把奇美拉势力驱逐出这个星球。"
 EH_event.414.a: "集体安全条约组织万岁！"
 EH_event.415.t: "三峰"
 EH_event.415.d: "我们伟大的国家必须保持完好无损，所以现在是时候团结我们的共产主义盟友了。团结起来，我们就能对抗奇美拉的威胁，并迎来新的曙光。"
 EH_event.415.a: "北京将引领未来"
 EH_event.416.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.416.d: "中国并不打算像其他大陆那样组建另一个庞大的联邦，但我们各国之间一直关系密切。[FROM.GetName]政府提议将我们各国联合在同一面旗帜下，共同对抗奇美拉的威胁。"
 EH_event.416.a: "最后一个共产主义根据地"
 EH_event.417.t: "东南亚国家联盟"
 EH_event.417.d: "我们最近一直被超级大国包围。而雪上加霜的是，中国附近还有个奇美拉传送门。现在是我们团结起来，共同应对威胁的时候了。"
 EH_event.417.a: "我们已经等得太久了。"
 EH_event.418.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.418.d: "[FROM.GetName]政府提议将东南亚各国统一为一个单一实体，以便更好地协调防御奇美拉威胁。鉴于其他大洲近期已出现统一案例，我们国家提出同样提议只是时间问题。"
 EH_event.418.a: "我们唯一的选择"
 EH_event.419.t: "东亚联盟"
 EH_event.419.d: "威胁正逼近我们的边境。不仅来自中国的奇美拉部队，也来自中国自身及其新盟友。让我们向他们表明，在这场战争中，我们绝不会袖手旁观。"
 EH_event.419.a: "为了我们岛屿的安全"
 EH_event.420.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.420.d: "[FROM.GetName]政府提议将东亚各国统一为一个单一实体，以便更好地协调防御，抵御奇美拉的威胁和中国日益增长的影响力。"
 EH_event.420.a: "做最坏的打算"
 EH_event.421.t: "大洋洲防卫联盟"
 EH_event.421.d: "世界其他国家团结一致。我们原以为这场战争不会波及我们的岛屿，但这只是时间问题。我们的国家一直享有和平，现在是时候团结起来保卫家园了。"
 EH_event.421.a: "为了大洋洲的存亡"
 EH_event.422.t: "[FROM.GetAdjectiveCap]政府呼吁统一"
 EH_event.422.d: "[FROM.GetName]政府提议统一大洋洲各国。虽然我们的国家远离主要冲突地区，但其他大陆近期发生的统一事件让我们意识到，我们必须做好应对一切的准备。"
 EH_event.422.a: "就这样吧"
 EH_event.423.t: "北美合众国的崛起"
 EH_event.423.d: "美国政府对奇美拉威胁的迅速反应最终促成了北美合众国的正式成立。经过数周的密集谈判，北美大陆各国同意解散各自的国家政府，并合并为一个单一的联邦实体。\n\n北美合众国现在指挥着一支统一的军事力量、集中的后勤保障和单一的战时政府。"
 EH_event.423.a: "新时代开启"
 EH_event.424.t: "中美洲共和国统一"
 EH_event.424.d: "中美洲各国领导人已同意解散各自的国家政府，合并为一个单一实体：中美洲共和国。目前尚不完全清楚此次合并是否完全是受“奇美拉”威胁所致，还是也与北美合众国本身的威胁有关。但有一点可以肯定：又一批国家已准备好应对这场末日般的威胁。"
 EH_event.424.a: "谁能想到呢？"
 EH_event.425.t: "南美洲国家联盟已经成立"
 EH_event.425.d: "美洲的最后一部分终于统一了。经过数周的谈判，南美国家同意在同一面旗帜下联合起来：南美洲国家联盟。\n\n整个美洲现在都准备好共同应对这一威胁。"
 EH_event.425.a: "一线希望"
 EH_event.426.t: "欧洲联邦的诞生"
 EH_event.426.d: "经过数月的政治角力、紧急会议和不断增加的伤亡，欧盟投票决定解散其超国家框架，并重组为一个单一的联邦超级国家：欧洲联邦。\n\n即使是瑞士和芬兰这样历史上保持中立的国家，在经过漫长的内部辩论和全民公投后，也选择加入，理由是奇美拉构成的生存威胁。随着各国军队的合并和国界的消除，欧洲联邦如今拥有统一的指挥体系、共享的资源和单一的战时政府。\n\n批评人士警告说，仓促的一体化会导致独立性的丧失，但支持者认为，只有完全统一才能确保生存。"
 EH_event.426.a: "生存无国界"
 EH_event.427.t: "非洲防卫阵线的形成"
 EH_event.427.d: "非洲各国采取历史性举措，联合成立了非洲防卫阵线。\n\n尽管地区冲突和经济差距依然存在，但各国领导人一致认为，只有团结一致，才能保卫人民和领土。非洲现在已做好准备，在全球对抗奇美拉威胁的斗争中做出重大贡献。"
 EH_event.427.a: "非洲团结一致"
 EH_event.428.t: "东部大陆联盟成立"
 EH_event.428.d: "出人意料的是，中亚和北非各国同意解散各自的国家政府，并组建东部大陆联盟。\n\n此举是在奇美拉入侵事件不断升级，以及人们意识到分散的应对措施只会导致更大损失的背景下做出的。\n\n虽然有些冲突远未解决，但奇美拉威胁的紧迫性迫使各国领导人将生存置于主权之上。"
 EH_event.428.a: "这个联盟能维持下去吗？"
 EH_event.429.t: "欧亚联邦正式成立"
 EH_event.429.d: "莫斯科会议已经结束，世界见证了欧亚联邦的诞生。许多国家猜测，此次统一是否是俄罗斯强迫促成的，但事实是，所有国家都同意统一，共同对抗奇美拉的威胁。\n\n还有传言称，俄罗斯可能会利用这种情况恢复苏联，或者再次对欧洲构成威胁。"
 EH_event.429.a: "还有很多问题亟待解答……"
 EH_event.430.t: "三峰联盟"
 EH_event.430.d: "朝鲜、蒙古和中国正式统一在同一面旗帜下：三峰。尽管中国政府对统一表示批评，但与盟友的牢固关系以及奇美拉的威胁使他们改变了主意。\n\n这个新生的国家已经准备好共同应对威胁。"
 EH_event.430.a: "还算公平吧……"
 EH_event.431.t: "东南亚国家联盟成立"
 EH_event.431.d: "亚洲另一部分地区已经统一。中东国家和三峰地区的近期统一，促使东南亚国家也走上同样的道路。"
 EH_event.431.a: "世界从未如此团结。"
 EH_event.432.t: "东亚联盟成立"
 EH_event.432.d: "亚洲最后的几个国家也团结起来了。经过数周的谈判，东亚各国同意解散各自的国家政府，并合并为一个单一实体：东亚联盟。\n\n随着中国影响力的不断增强以及附近奇美拉传送门的出现，这个新生的国家现在不仅要应对奇美拉的威胁，还要应对中国本身可能发起的侵略。"
 EH_event.432.a: "团结胜于分裂"
 EH_event.433.t: "大洋洲防卫联盟成立"
 EH_event.433.d: "大洋洲各国联合组建了大洋洲防卫联盟。尽管地理位置偏远，经济状况也存在差异，但各国领导人一致认为，只有团结一致，才能保卫各自的人民和领土。\n\n大洋洲防卫联盟现在已做好准备，为全球对抗奇美拉威胁做出重大贡献。\n\n随着大洋洲的统一，世界彻底分裂成几个超级大国。联合国作为最后一个国际组织，仍在竭尽全力支持全球战争。"
 EH_event.433.a: "美丽新世界"
 EH_event.434.t: "传送门能量扰乱全球通信"
 EH_event.434.d: "在奇美拉传送门出现后的几周内，全球通信网络经历了前所未有的中断。卫星链路间歇性故障，海底电缆出现不稳定的数据丢失，陆地网络也受到无法解释的干扰。\n\n专家认为，这些传送门会发出一种独特的电磁辐射，干扰传统的通信技术。目前正在努力开发能够在这种恶劣环境下运行的新协议和硬件，但就目前而言，信息流通仍然严重受阻。"
 EH_event.434.a: "赶紧解决这个问题！"
 EH_event.500.t: "蓝道尔石的发现"
 EH_event.500.d: "自从第一批传送门撕裂地球以来，世界各地都发现了不明金属物质的碎片。大多数人认为这是现有金属在维度上发生转变的结果，虽然奇特，但却是惰性的。\n\n今天情况发生了改变。理论物理学家、世界顶尖高维物理学专家之一的丽莎·蓝道尔博士破解了这种材料的结构和性质，揭示出它是一种稳定、轻质且高韧性的金属，具有巨大的军事应用潜力。\n\n这种如今被称为蓝道尔石的物质，非常适合用于制造先进合金，它兼具强度、耐热性和柔韧性。经过适当的提纯，它或许可以成为新一代战争机器的基础，帮助我们赢得胜利。"
 EH_event.500.a: "终于有好消息了"
 EH_event.501.t: "高机动性作战系统框架原型揭幕"
 EH_event.501.d: "经过数月的加速开发，[FROM.GetAdjective]团队成功构建了高机动性作战系统的第一个原型框架。\n\n高机动性作战系统平台采用蓝道尔石强化双足底盘，并配备集成式助推推进器，旨在弥合火力与生存能力之间的差距。在坦克速度过慢、飞机易受奇美拉威胁的情况下，高机动性作战系统能够在不牺牲重型武器载荷的前提下，提供所需的机动性。\n\n尽管仍在测试阶段，但这项突破标志着向下一代前线部队迈出了重要一步。一项专门的研究计划已经获得批准，旨在使高机动性作战系统平台达到可投入实战的状态。"
 EH_event.501.a: "战争新时代"
 EH_event.511.t: "大锤行动"
 EH_event.511.d: "在东欧遭受数月惨重损失并导致巴尔干防御体系崩溃后，欧洲联邦发动了“大锤行动”，这是一项高风险的军事攻势，旨在夺回博斯普鲁斯海峡防线，重新打通连接欧洲和中东的战略走廊。此次攻势由新部署的高机动性作战系统部队领衔，并得到炮兵、海军和导弹协同打击的支援，目标是将盘踞在伊斯坦布尔废墟及其周边山丘的奇美拉虫群驱逐出去。\n\n此次行动的成功将标志着恢复欧洲大陆交通和确保欧洲南部翼安全的一个重大转折点。但敌对分子群的密度已经增加，情报显示该地区出现了此前从未见过的新型变种。未来的战斗将付出惨重的代价。"
 EH_event.511.a: "孤注一掷"
 EH_event.800.t: "芝诺比娅防线与萨拉丁防线正在建设中"
 EH_event.800.d: "为了应对来自撒哈拉以南非洲的快速推进的虫群，中东防卫联盟已下令立即在埃及南部修建一道坚固的屏障。这条名为“芝诺比娅防线”的防线沿尼罗河和西部沙漠地带延伸，整合了加固的碉堡、战壕网络和远程炮兵阵地，旨在阻止“奇美拉”的推进势头。\n\n如果芝诺比娅陷落，萨拉丁防线就在其后。这条防线从塞得港沿苏伊士运河延伸至红海，是最后的堡垒，一条坚不可摧的防线，旨在保护该地区的文化和精神中心免遭毁灭。"
 EH_event.800.a: "界限已划下"
 EH_event.801.t: "芝诺比娅线和萨拉丁线的崩溃"
 EH_event.801.d: "有报告称，奇美拉虫群已突破埃及南部的芝诺比娅防线和苏伊士运河沿线的萨拉丁防线。尽管进行了顽强的防御并得到了强大的炮火支援，但敌机数量众多，攻势猛烈。\n\n整个防御区域被攻破，工事失守，战壕被摧毁，许多部队战斗到最后一刻。此后，苏伊士运河指挥部便陷入沉寂。中东防卫联盟已下令向黎凡特地区全面撤退。\n\n最终防线的突破打开了通往北方战线的大门。缓冲地带已不复存在。"
 EH_event.801.a: "他们尽可能地坚持了下来。"
 EH_event.802.t: "芝诺比娅防线和萨拉丁防线遭到背后袭击！"
 EH_event.802.d: "由于中东防线崩溃，奇美拉大军从芝诺比娅和萨拉丁防线唯一的薄弱环节 - 后方 - 突破了防线。蜂拥而至的奇美拉大军以压倒性的数量涌入缺口，迅速击溃了剩余的守军，并在非洲大陆腹地站稳了脚跟。\n\n由于防线已被突破，奇美拉得以自由向北推进，威胁着欧洲各地的重要城市和基础设施。局势十分严峻，欧盟现在必须做好准备，在其边境第一战线上展开一场旷日持久且残酷的战斗。"
 EH_event.802.a: "东线战力太弱。"
 EH_event.803.t: "巩固欧洲：博斯普鲁斯防线"
 EH_event.803.d: "西方联盟已授权建立新的大陆防御工事：博斯普鲁斯防线。\n\n这条防线横跨伊斯坦布尔海峡，整合了雷区、海上封锁线、防御工事和加固的城垛，旨在阻止敌军突破防线进入欧洲。驻扎在防线核心的是赫勒斯滂特遣部队，这是一支多国部队，准备战斗到最后一刻。\n\n命令很明确：坚守阵地，不惜一切代价。"
 EH_event.803.a: "他们不会不战而降。"
 EH_event.804.t: "博斯普鲁斯防线的崩溃"
 EH_event.804.d: "经过残酷而漫长的围攻，博斯普鲁斯防线终于被突破。奇美拉军团如潮水般涌入伊斯坦布尔，掀起血肉横飞的攻势，尽管敌军奋力反击，最终还是被击溃。\n\n赫勒斯滂特遣队战斗到最后一刻，被誉为欧洲英雄，人们将永远怀念他们。\n\n欧洲如今直接暴露在外，西方世界失去了第一道防线。"
 EH_event.804.a: "欧洲的守门人将被人们哀悼"
 EH_event.805.t: "博斯普鲁斯防线遭到背后袭击！"
 EH_event.805.d: "奇美拉部队成功绕过黑海北部，从后方袭击了博斯普鲁斯防线，完全绕过了防御工事，击溃了剩余的守军。这支虫群已经主宰了巴尔干半岛和西欧。"
 EH_event.805.a: "欧洲已经沦陷了"
 EH_event.806.t: "高加索防线正在建设中"
 EH_event.806.d: "高加索防线正在建设中，旨在保护中东与欧亚联邦南部领土之间的联系。该防线将横跨高加索山脉，利用天然地形优势，结合防御工事、炮兵阵地和快速反应部队，构筑一道坚固的屏障，抵御奇美拉部队的推进。\n\n虽然这可能不足以完全阻止蜂群，但它将起到至关重要的缓冲作用，为欧洲和前俄罗斯地区的撤离和重组工作争取时间。"
 EH_event.806.a: "希望他们能及时收到。"
 EH_event.807.t: "高加索防线第一道防线被突破"
 EH_event.807.d: "奇美拉部队突破了高加索防线的第一道防线，攻破了最初的防御工事，并向山区推进。尽管守军进行了顽强抵抗，但虫群的持续进攻已在该地区站稳脚跟，并有可能蔓延至欧亚联邦的核心地带。\n\n情况十分危急，但仍有希望第二道防线能够守住阵地，阻止进一步的入侵。"
 EH_event.807.a: "第二道防线仍然有希望"
 EH_event.808.t: "高加索防线已陷落"
 EH_event.808.d: "尽管英勇抵抗，高加索防线还是失守了。奇美拉军队击溃了剩余的守军，并在该地区站稳了脚跟，为欧亚联邦开辟了新的战线。\n\n随着这一关键缓冲地带的丧失，虫群现在可以直接入侵俄罗斯和西欧的重要城市和基础设施。形势严峻，欧亚联邦必须做好准备，在其本土展开一场旷日持久且残酷的战斗。"
 EH_event.808.a: "他们无法被阻止……"
 EH_event.809.t: "高加索防线遭到背后袭击！"
 EH_event.809.d: "奇美拉大军从北部绕过高加索山脉，从后方攻击防线，彻底突破了防御工事，击溃了剩余的守军。这群巨兽已经控制了周边地区。"
 EH_event.809.a: "这是必须承担的风险。"
 EH_event.900.t: "华盛顿陷落"
 EH_event.900.d: "美国前首都陷落了。\n\n奇美拉军队发动了毁灭性的进攻，突破了城市的防御，击溃了守军。标志性建筑如今已成废墟，曾经熙熙攘攘的街道也变得异常寂静。\n\n幸存者讲述了城市落入虫群之手时，现场一片混乱和破坏的可怕景象。"
 EH_event.900.a: "一个国家的心脏陷落了……"
 EH_event.901.t: "纽约陷落"
 EH_event.901.d: "纽约市已被奇美拉虫群吞噬。\n\n这些生物利用地下隧道和地铁系统绕过地面防御，令军事部队措手不及。标志性的天际线如今已成一片废墟，烈火熊熊，建筑物纷纷坍塌。\n\n斯塔滕岛率先沦陷，现在整个城市都已被奇美拉控制。"
 EH_event.901.a: "自由女神像不见了……"
 EH_event.902.t: "洛杉矶陷落"
 EH_event.902.d: "洛杉矶沦陷了。\n\n曾经美丽的城市，如今只剩下无数逃离奇美拉无情侵略者的难民的记忆。标志性的好莱坞标志如今孤零零地矗立着，成为人们缅怀逝去辉煌的残酷见证。"
 EH_event.902.a: "真是巨大的损失……"
 EH_event.903.t: "旧金山陷落"
 EH_event.903.d: "旧金山已经不在了\n\n奇美拉从地下裂缝和海岸缺口涌出，以惊人的速度绕过了防线。太平洋司令部报告称，所有剩余部队均已被歼灭或切断退路。平民伤亡惨重。\n\n又一座伟大的城市沦陷于虫群之手。"
 EH_event.903.a: "金门大桥消失了……"
 EH_event.904.t: "莫斯科陷落"
 EH_event.904.d: "莫斯科陷落了。\n\n奇美拉虫群发动协同攻击，凭借数量优势和凶猛攻势，彻底击溃了城市的防御。克里姆林宫，这座曾经象征着俄罗斯坚韧不拔精神的建筑，如今已成废墟。\n\n幸存者们描述了城市在这些生物无情推进下沦陷时的混乱和绝望。"
 EH_event.904.a: "俄罗斯之心陷落了"
 EH_event.905.t: "上海陷落"
 EH_event.905.d: "上海沦陷了。\n\n蜂拥而至的敌军以压倒性的力量发动攻击，先是攻占了南部郊区，然后越过黄浦江，打了守军半路溃逃。外滩变成了一片焦黑钢铁和破碎混凝土的坟场。如今，卫星图像上只剩下寂静，这座城市只剩下一个空壳。"
 EH_event.905.a: "我们何时才能阻止他们？"
 EH_event.1000.t: "奇美拉传送门关闭！"
 EH_event.1000.d: "“特斯拉计划”取得了巨大的成功。[FROM.GetName]成功突袭并关闭了一处奇美拉传送门，导致大范围内所有奇美拉部队瞬间失去意识。这些生物仍然活着，因此建议当地居民不要接触它们的尸体。国家军队正在赶往现场，准备消灭正在沉睡的奇美拉部队。"
 EH_event.1000.a: "那群混蛋干的。"
 EH_focus_event.1.t: "大动员计划"
 EH_focus_event.1.d: "它们突然出现，攻击一切移动的生物，不达目的誓不罢休。我们的科学家正努力查明这些生物究竟是什么，它们来自哪里，以及如何才能阻止它们。与此同时，我们的军队正竭力坚守前线，保护我们的公民。我们必须迅速行动，赶在它们抵达边境之前。我们可以依靠我们训练有素的军队，也可以号召大规模动员。"
 EH_focus_event.1.a: "把我们所有的资源都倾泻到他们身上！"
 EH_focus_event.1.b: "我们将依靠职业军队。"
 EH_focus_event.2.t: "第一代几丁质士兵"
 EH_focus_event.2.d: "最近对奇美拉部队的研究使得一种新型士兵 - 几丁质士兵 - 得以诞生。新型盔甲将使我们的人民更能抵御外星人的物理攻击，其充满未来感的设计也给民众带来了希望和兴奋。"
 EH_focus_event.2.a: "当虚构与现实相遇。"
 EH_focus_event.3.t: "无人机已抵达目标地点"
 EH_focus_event.3.d: "无人机已经拍摄了传送门周围结构的详细照片。为了进一步了解其用途和功能（除了防御目的之外），科学家们需要分析收集到的数据。幸运的是，有一位生物学教授愿意仔细研究这些照片。"
 EH_focus_event.3.a: "希望这一切都值得。"
 EH_focus_event.4.t: "奇美拉摧毁了无人机中队"
 EH_focus_event.4.d: "奇美拉部队成功拦截并摧毁了无人机中队，使其未能完成任务。没有一架无人机在被击落前拍摄并发送任何照片。"
 EH_focus_event.4.a: "又一次失败。"
 EH_focus_event.5.t: "奇美拉部队摧毁了研究基地"
 EH_focus_event.5.d: "奇美拉部队发现并摧毁了我们的一处研究基地。部分研究数据丢失，但至少奇美拉方面并非毫发无损。"
 EH_focus_event.5.a: "寻找幸存者！"
 EH_focus_event.6.t: "奇美拉部队被驱逐出研究基地"
 EH_focus_event.6.d: "奇美拉没能摧毁我们的研究基地。没有研究数据丢失，科学家们也安全无恙。"
 EH_focus_event.6.a: "伟大的胜利！"
 EH_focus_event.7.t: "科学家失踪了"
 EH_focus_event.7.d: "其中一名科学家在奇美拉部队袭击研究基地之前未能逃脱。我们不知道这名科学家是死是活，但我们必须往最坏的方面想，目前没有任何办法展开救援行动。"
 EH_focus_event.7.a: "该死！"
 EH_focus_event.8.t: "传送门能量辐射削弱了奇美拉部队"
 EH_focus_event.8.d: "由于科学家们投入更多时间监测来自传送门的异常能量辐射（该辐射一直干扰着我们的卫星网络），他们发现这些辐射遵循非常特定的模式。新型卫星已配备特殊传感器，可以探测这些辐射并利用它们干扰奇美拉的通信系统。这一突破有望显著削弱奇美拉部队。"
 EH_focus_event.8.a: "这是一个重大突破！"
 EH_focus_event.9.t: "私营企业派遣工人协助研究地点的工作"
 EH_focus_event.9.d: "大型私营企业联合起来，帮助我们的科学家开展对抗奇美拉的研究。他们派遣最优秀的员工协助建设新的研究基地，大大加快了整个研究进程。"
 EH_focus_event.9.a: "好消息！"
 EH_focus_event.10.t: "军方将领承诺为研究地点提供额外安保"
 EH_focus_event.10.d: "我们的军方将领已主动提出增派部队，保护我们的研究基地免受奇美拉的袭击。他们在作战方面的经验以及对奇美拉战术的了解，对于确保我们科学家的安全和项目的成功至关重要。"
 EH_focus_event.10.a: "我们感谢他们的支持！"
 EH_focus_event.11.t: "一位亿万富翁拿出自己的钱来投资这些资产。"
 EH_focus_event.11.d: "一位亿万富翁决定捐赠其巨额财富，用于资助我们的研究基地。这笔巨款将用于建设新的设施，并极大地加快研究速度。"
 EH_focus_event.11.a: "减免他的税！"
 EH_focus_event.12.t: "发现蓝道尔石矿脉"
 EH_focus_event.12.d: "勘探队发现了一条新的蓝道尔石矿脉。现在，我们将决定开展采矿作业，开采这种宝贵的资源。"
 EH_focus_event.12.a: "开始采矿作业！"
 EH_focus_event.12.b: "我们负担不起。"
 EH_focus_event.13.t: "发现铁矿脉"
 EH_focus_event.13.d: "勘探队发现了一条新的铁矿脉。现在我们决定建立采矿作业区，开采铁矿，以提高钢铁产量。"
 EH_focus_event.13.a: "我原本期望更高，但我们仍然需要它。"
 EH_focus_event.13.b: "我们负担不起。"
 EH_focus_event.14.t: "发现铁铝矿脉"
 EH_focus_event.14.d: "勘探队发现了一条新的铝矿脉。现在，我们将决定开展采矿作业并开采这种资源。"
 EH_focus_event.14.a: "没有蓝道尔石？仍然很划算。"
 EH_focus_event.14.b: "我们负担不起。"
 EH_focus_event.15.t: "私营公司发现蓝道尔石矿脉"
 EH_focus_event.15.d: "一家大型私营企业发现了一处新的蓝道尔石矿脉。他们打算自行开展采矿作业，不接受政府的任何帮助。"
 EH_focus_event.15.a: "呃……就让他们做吧。"
 EH_focus_event.16.t: "[FROM.GetName]开始最后的攻势"
 EH_focus_event.16.d: "在奇美拉传送门成功引爆特斯拉武器后，[FROM.GetName]军方已发起全面进攻，旨在消灭该区域内所有奇美拉势力。传送门已关闭，敌人也已失去方向，这是我们给予奇美拉致命一击、夺回失地的绝佳机会。"
 EH_focus_event.16.a: "我们终将获胜。"
 EH_protect_the_homeland: "保卫祖国！"
 EH_protect_the_homeland_desc: "我们遭到了来自未知恶魔势力的入侵。我们必须竭尽全力保卫自己，击退威胁，才能活到明天！"
 EH_territorial_advantages: "领土优势"
 EH_territorial_advantages_desc: "入侵者在近战中更胜一筹……或者说，在整体战斗力方面更胜一筹。所以，如果我们无法凭借蛮力击败他们，就必须更聪明地应对。新的防御系统将帮助我们利用地形优势，或许这足以赢得一些战斗。"
 EH_cold_acclimatization: "寒冷适应"
 EH_cold_acclimatization_desc: "入侵者对寒冷环境有着极强的抵抗力。更棘手的是，两个传送门分别位于阿拉斯加和西藏。如果我们想要接近它们，就必须变得更强，或者研发出新的抗寒方法。"
 EH_300: "300"
 EH_300_desc: "狭窄的山隘地形极其险峻，通行极其困难。依我看，这里简直是伏击的绝佳地点。只要我们能应对他们的空中支援，就能利用这些山隘在战斗中获得巨大的优势。"
 EH_heat_acclimatization: "炎热适应"
 EH_heat_acclimatization_desc: "怪物对自然之力有着极强的抵抗力。我们也需要变得更强大。我们在这个星球上战斗的时间比它们要长得多，我们应该利用这些经验来取得优势。"
 EH_sandstorms_are_our_allies: "沙尘暴是我们的盟友"
 EH_sandstorms_are_our_allies_desc: "我们知道沙尘暴何时来临。有了这样的信息，我们就能做好防御准备，并利用沙子来取得优势。只希望那些怪物没有“生物雷达”。"
 EH_observe_local_fauna: "观察当地兽群"
 EH_observe_local_fauna_desc: "动物是绝佳的早期预警系统。那些怪物对所有物种都构成威胁，而我们的动物似乎已经察觉到了它们的存在。当我们的预警系统失效时，一大群惊慌逃窜的动物或许就是重要的预警信号。"
 EH_our_weakness_to_their_disadvantage: "我们的弱点对他们不利"
 EH_our_weakness_to_their_disadvantage_desc: "平原对我们的车辆来说非常有利，但坦克和步兵战车不足以抵挡那些怪物。不过，得益于平坦的地形，我们可以准备一些特殊的东西，希望这能让我们在战场上暂时占据优势。"
 EH_electric_traps: "电子陷阱"
 EH_electric_traps_desc: "通过可控的强力电击，我们应该能够为部队争取几分钟的喘息之机，以便攻击敌军。但这会消耗大量能源，因此我们必须找到降低全国电力消耗的方法，或者准备新的建筑工地。"
 EH_transfer_energy_from_civilian_sector: "挪用民用领域能源"
 EH_transfer_energy_from_civilian_sector_desc: "陷阱工作时耗电量太大。充电时间太长，我们不可能等整整一周才能再次使用。我们将从公共部门调拨部分能源到我们的储能系统中。"
 EH_invest_in_additional_power_sources: "投资额外能源来源"
 EH_invest_in_additional_power_sources_desc: "战争不能再给平民造成更大的影响。我们将启动新的反应堆项目，以确保今天以及未来任何时期的能源安全。"
 EH_reduce_energy_loss: "减少能源损失"
 EH_reduce_energy_loss_desc: "这些陷阱消耗的能源太多了。它们虽然有效，但对我们的基础设施来说成本高昂。我们无法降低它们的能耗，但我们可以找到方法来限制其他能源的使用。"
 EH_nation_remains_untouched: "国家依然完好无损"
 EH_nation_remains_untouched_desc: "不管那些东西是什么，我们不能就此放弃一切，专心加强军备。人们的生活会像什么都没发生一样继续下去……"
 EH_put_away_internal_problems: "解决内部问题"
 EH_put_away_internal_problems_desc: "保护国土安全是当前最重要的目标。没有军队，就没有国家需要保护。在我们加强军备的同时，人民将不得不自行解决问题。如果军队失败，社会也将崩溃。"
 EH_minimal_military_focus: "军事注重最小化"
 EH_minimal_military_focus_desc: "目前，民用工业比生产新式武器更为重要。如果战争离我们很远，就没有理由在国防上花费太多钱。"
 EH_high_military_focus: "高度注重军事"
 EH_high_military_focus_desc: "敌人每天都在逼近我们的首都。我们不能放松警惕，必须加快生产速度。"
 EH_lower_conscription: "降低征兵法案"
 EH_lower_conscription_desc: "其他国家都在流失大量人力，但我们的士兵主要负责边境巡逻。我们没必要为了增加军费开支而招募更多士兵。"
 EH_extended_conscription: "延长征兵期"
 EH_extended_conscription_desc: "阻止敌人入侵是最重要的任务，我们不能再失去任何土地了！"
 EH_prioritize_corporations: "优先考虑企业"
 EH_prioritize_corporations_desc: "战争会摧毁我们的经济。我们必须让企业对国家保持忠诚，这样我们才不会陷入严重的麻烦。"
 EH_prioritize_military_companies: "优先考虑军事公司"
 EH_prioritize_military_companies_desc: "研究和增加武器产量应该是我们的首要任务。没有枪支，我们的士兵就无法与那些邪恶的生物作战。"
 EH_a_new_resource: "新的资源？"
 EH_a_new_resource_desc: "丽莎·蓝道尔博士一直在研究一种名为蓝道尔石的新资源。她和她的科学家团队发现，蓝道尔石不仅极其轻盈，而且拥有非凡的耐久性。蓝道尔石被发​​现后，其他国家注意到[RESOURCE HERE]的数量有所减少。传送门有可能正在将其转化为蓝道尔石。或许，传送门另一侧的普遍资源就是蓝道尔石？我们需要对此进行更多研究。"
 EH_a_fine_addition_to_my_collection: "我的收藏又添佳品"
 EH_a_fine_addition_to_my_collection_desc: "蓝道尔石将是制造武器和盔甲的绝佳材料。一旦我们装备了蓝道尔石，我们或许不仅能够抵御外星生物，还能对抗其他国家。"
 EH_first_hacs_prototype: "首个高机动性作战系统原型"
 EH_first_hacs_prototype_desc: "机甲猎人、阿特拉斯、新世纪福音战士等等。先进的战斗机甲一直只存在于科幻作品中，直到最近发生的事件彻底改变了这一切。高机动性战斗系统是一款现实中可投入使用的战斗机甲，它的建造完全得益于蓝道尔石的特性。自从我们开始使用这种强度远超钢铁、重量远超镁合金的合金后，重量问题就不再是难题了。有了这项技术，我们或许终于能够对敌军造成重大打击。"
 EH_new_enemy_new_strategy: "新敌人，新策略"
 EH_new_enemy_new_strategy_desc: "愚蠢的问题需要愚蠢的解决办法，而这正是我们遇到过的最愚蠢的问题。外星人战斗起来就像无所畏惧，而这正是我们要利用的弱点。重型单位的装甲防护力很强，但并非坚不可摧。我们必须比坦克型单位更快，比飞行生物更强，才能赢得这场战斗。也就是说，我们需要更多的蓝道尔石和子弹，这还用说吗？"
 EH_more_mechs_less_weapons: "更多机甲，更少武器"
 EH_more_mechs_less_weapons_desc: "机甲是我们对抗这些生物的唯一有效武器。它们的生产耗时很长，而蓝道尔石的储备有限。与其生产传统武器，不如将部分工厂改造为生产机甲部件的工厂，这才是更好的选择。"
 EH_more_weapons_less_mechs: "更多武器，更少机甲"
 EH_more_weapons_less_mechs_desc: "机甲生产消耗了我们大部分资源。如果我们继续大规模生产，经济可能会陷入萧条，而且我们将永远无法偿还债务。现在是战争时期，但我们不能为了这些新机器而摧毁我们的经济。"
 EH_iron_man: "钢铁侠？"
 EH_iron_man_desc: "第一批新型机甲已经投入战场。真正的战斗现已打响，我们终于有望与入侵者一较高下。有人开始猜测，这项技术能带我们走多远。当然，漫威粉丝们已经开始给我们寄来钢铁侠战衣的图纸……其实，为什么不呢？"
 EH_second_generation_hacs: "第二代高机动性作战系统"
 EH_second_generation_hacs_desc: "多亏了技术宅和专业工程师们提供的蓝图，我们才能提前开始规划新的机甲。让我们一起迈向又一个伟大的里程碑！"
 EH_highly_purified_randallite: "高纯度蓝道尔石"
 EH_highly_purified_randallite_desc: "我们以前从未花足够的时间清理蓝道尔石原矿，生产才是我们的首要任务。但现在我们对这种资源有了更多了解，而且也不急于发现它的新特性，所以我们可以花些时间来最大限度地提高它的利用效率。"
 EH_increase_research_budget: "增加研究预算"
 EH_increase_research_budget_desc: "第二代高机动性作战系统取得了巨大的成功，但我们不能就此止步。人类永远渴望更好的东西，而这正是我们开始筹备第三代高机动性作战系统的契机。"
 EH_third_generation_hacs: "第三代高机动性作战系统"
 EH_third_generation_hacs_desc: "我们所有的努力都汇聚于此。经过数月的研发、测试以及数十亿的预算投入，我们终于准备推出战斗机甲史上最强大的战斗机甲！"
 EH_military_advantages: "军事优势"
 EH_military_advantages_desc: "我们需要了解蓝道尔石将如何帮助我们的部队。在机甲建造期间，我们拥有的这种矿石数量超过了新机甲的消耗量。我们必须找到更多利用它的方法。"
 EH_ranjets: "兰杰特"
 EH_ranjets_desc: "蓝道尔石材料让我们得以制造出史上第一批战斗机甲。它极其轻巧，因此我们不必局限于这项新技术。这将解决许多与飞机推力和重量相关的问题。机身更轻的飞机将能够携带更多货物和武器，我们的喷气式飞机也将比以往任何时候都更加灵活。"
 EH_not_so_heavy_weapons: "非重型武器"
 EH_not_so_heavy_weapons_desc: "我们可以用蓝道尔石代替钢、钛和其他材料来生产重型武器。这样一来，武器会更轻便，士兵携带和使用也会更方便。运输卡车也会更省油，所以这项改变对所有人都有益。"
 EH_find_new_veins: "寻找新矿脉"
 EH_find_new_veins_desc: "许多资源点已被蓝道尔石取代。我们尚不清楚这一过程进展如何，但现在或许是开始挖掘更多资源的好时机。也许我们能在地下找到更多蓝道尔石。"
 EH_more_precious_than_gold: "比黄金更珍贵"
 EH_more_precious_than_gold_desc: "蓝道尔石已经无处不在。大型公司正斥资数十亿美元争夺这种资源。这就像一场淘金热，但蓝道尔石的用途远比淘金热广泛。我们可以用它制造常用工具、机器和武器，而这仅仅是冰山一角。我们，作为国家，必须在贪婪的企业垄断蓝道尔石的开采、研究和出口之前，尽可能多地找到它。难以置信的是，我们竟然要与自己的国家对抗，但如果局势失控，实施限制或许是最终的结局。"
 EH_civilian_benefits: "平民福利"
 EH_civilian_benefits_desc: "我们的战局目前稳定，所以我们可以专注于在公共场所使用蓝道尔石。如果与入侵者的局势恶化，我们也可以随时转向军用生产，不会遇到太多问题。"
 EH_a_wonderful_prosthesis: "一个很棒的假肢"
 EH_a_wonderful_prosthesis_desc: "蓝道尔石令人难以置信的耐用性和轻便性使我们能够打造一种新型腿部假肢，让使用者比使用原有假肢时更加“健康”。是时候将人体合成延伸技术提升到赛博朋克式的水平了！"
 EH_market_potential: "市场潜力"
 EH_market_potential_desc: "很多人都想获得蓝道尔石材料。由于我们不再急于推进军事项目，我们可以开始向投资者和商业用户销售蓝道尔石材料。大型企业将开始用蓝道尔石材料制成的设备替换现有设备，从而减少全球重型机械和车辆的燃料消耗。"
 EH_study_new_enemy: "研究新敌人"
 EH_study_new_enemy_desc: "在神秘传送门遭受核打击后，一种新型生物开始在其周围蔓延。它们极具攻击性，会攻击一切移动的物体。我们不知道能否阻止它们，但如果存在防御方法，我们必须尽快找到。"
 EH_launch_orbital_scans: "发射轨道扫描"
 EH_launch_orbital_scans_desc: "我们可以利用卫星研究敌军的动向，了解他们的行动模式（如果有的话）。这将有助于我们的战略家制定更有效的陷阱和反制战术。"
 EH_find_the_weak_spots: "寻找弱点"
 EH_find_the_weak_spots_desc: "这些生物是可以被杀死的。毕竟，它们是由血液和有机物构成的。如果我们能设法将它们中的一只带回实验室，或许就能找到它们最重要的器官，并对其进行研究，从而为我们带来优势。一旦我们找到这些关键器官，就会训练我们的士兵和作战系统，尽可能地将它们作为攻击目标。"
 EH_disassemble_invader_armor: "拆解入侵者装甲"
 EH_disassemble_invader_armor_desc: "大多数入侵者都拥有坚硬的几丁质甲壳，因此能够抵御我们的武器攻击。我们可以着手研究这种甲壳的结构，并将其应用于人类的盔甲设计中。或许这能稍微提高我军的防御能力。"
 EH_portals_must_be_the_key: "传送门必须是关键"
 EH_portals_must_be_the_key_desc: "我们必须收集更多关于最近传送门的情报，任何可能对我们有用的信息。它们能抵御核打击，但世上没有绝对坚不可摧的东西。即使这意味着我们要派出无人机和飞机执行自杀式任务，我们也一定会找到关闭它们的方法。"
 EH_investigate_strange_structure: "调查奇异结构"
 EH_investigate_strange_structure_desc: "我们注意到敌人的行为有些异常。他们似乎在传送门周围建造了某种设施，可能是为了加固传送门。如果他们真的在建造某种堡垒，我们必须迅速行动，以免他们彻底摧毁传送门。下一步，我们将使用战斗无人机执行一次详细的侦察任务。敌人已经控制了空域，所以这次任务几乎等同于自杀，但我们必须寄希望于至少有一架无人机能够拍摄到该设施的照片并发送给指挥部。"
 EH_finding_their_vulnerability: "发现他们的弱点"
 EH_finding_their_vulnerability_desc: "通过足够频繁的轰炸，我们或许能发现构成这种结构的部件的弱点。最关键的检测项目是耐热性、抗爆性和抗腐蚀性。我们无法检测它们的冰点密度，但可以检测这些怪物的其他材料在低温下的反应。"
 EH_but_how_does_this_key_work: "但这个机制是如何工作的呢？"
 EH_but_how_does_this_key_work_desc: "那些传送门通往另一个维度，这是肯定的。无论是颠倒世界、反地球还是其他什么地方，它们都应该具备某种机制来开启并维持连接。弄清它们是如何做到这一点的，对于理解它们的本质和功能至关重要。或许，如果运气好的话，我们还能找到干扰它们运作并切断连接的方法。"
 EH_project_tesla: "特斯拉计划"
 EH_project_tesla_desc: "战术电磁线性湮灭系统将是我们向这些怪物展示谁才是真正主宰一切的最佳机会。一旦武器准备就绪，我们将向最近的传送门发射。如果我们的理论正确，电磁脉冲应该足够强大，能够中断连接，甚至可能暂时或永久地关闭传送门。"
 EH_whole_new_dawn: "全新的黎明"
 EH_whole_new_dawn_desc: "我们已经掌握了关闭传送门所需的一切信息。只要我们坚持计划，就一定有足够的力量最终结束这场战争。"
