 ukraine_firtash.1.t: "Firtash annonce la création de la République"
 ukraine_firtash.1.d: "Dmitry Firtash, one of the richest oligarchs in Ukraine, announced the creation of the Podolia Republic as an autonomy within Ukraine. This has caused a shock to our government and now we have to decide what to do about it."
 ukraine_firtash.1.a: "Pas d'autonomie"
 ukraine_firtash.1.b: "Cela pourrait être bénéfique pour nous"
 ukraine_firtash.2.t: "Notre armée"
 ukraine_firtash.2.d: "Those units that we personally funded have sided with us, now they are our main striking force."
 ukraine_firtash.2.a: "Pour la liberté de la Podolie !"
 ukraine_kolom.1.t: "Kolomoïsky annonce la création de la République"
 ukraine_kolom.1.d: "Igor Kolomoisky, one of the richest oligarchs in Ukraine, announced the creation of the Dnipropetrovsk Republic as an autonomy within Ukraine.  This has caused a shock to our government and now we have to decide what to do about it."
 ukraine_kolom.1.a: "Pas d'autonomie"
 ukraine_kolom.1.b: "Cela pourrait être bénéfique pour nous"
 ukraine_kolom.2.t: "Notre armée"
 ukraine_kolom.2.d: "Those units that we personally funded have sided with us, now they are our main striking force."
 ukraine_kolom.2.a: "Pour la liberté du Dniepr !"
 UKR_recruit_arestovich: "Recruter Arestovitch"
 UKR_recruit_arestovich_desc: "Arestovich will become an excellent agent of our special services, his outstanding skills will be useful to us."
 UKR_korchinsky_strategy: "Stratégie de Kortchinsky"
 UKR_korchinsky_strategy_desc: "Korchinsky's strategy involves fighting Western elements as well...The fight against the external enemy that really threatens the sovereignty of Ukraine."
 UKR_psiop_operations: "Opérations psychologiques"
 UKR_psiop_operations_desc: "We have mastered the technique of psychological operations, and we are ready to use it against our enemies."
 UKR_bratstvo_psiop_idea: "Opérations psychologiques"
 UKR_bratstvo_psiop_idea_desc: "The enemy must also be broken mentally, for this we will conduct psyop operations."
 UKR_vitrenko_party: "Le nouveau socialisme"
 UKR_vitrenko_party_desc: "L'Ukraine est depuis longtemps sous l'emprise de sentiments nationalistes et pro-occidentaux qui déchirent le pays en deux ; nous offrirons à nos citoyens ce qu'ils recherchent : la stabilité et la prospérité. Notre socialisme les rendra heureux."
 UKR_economic_orthodoxy: "Orthodoxie économique"
 UKR_economic_orthodoxy_desc: "Notre pays doit être fort non seulement économiquement, mais aussi spirituellement ; pourquoi ne pas combiner ces deux aspects ?"
 UKR_install_christian_socialism: "Socialisme chrétien"
 UKR_install_christian_socialism_desc: "We will not give up our socialist ideas, because we continue to believe in God, the ideologists of socialism led it to collapse because they distanced themselves from God, we will not repeat their mistakes."
 UKR_iron_woman: "Une femme d'acier"
 UKR_iron_woman_desc: "Natalia Vitrenko, like steel, protects the ideas that she sees as the only right ones for Ukraine and is not going to bend to anyone."
 UKR_resovetization: "Re-soviétisation"
 UKR_resovetization_desc: "The Soviet era gave our country a development that it did not see under any government, not under the Tsar, not under the Poles, not under independence. We accept this fact and will promote the cult of Socialism."
 UKR_rally_out_the_coalition: "Coalition nationale"
 UKR_rally_out_the_coalition_desc: "Supporters of completely different ideas, national Bolsheviks, supporters of the Russian Empire, socialism and Russophiles have united under the banners of our party, all together - we will turn our country into the best state in history."
 UKR_praymaya_electro_demokratia: "Démocratie électronique directe"
 UKR_praymaya_electro_demokratia_desc: "We have had enough of dictatorship and totalitarianism, our people deserve democracy at its best."
 UKR_storm_sturm_at_parliament: "Prendre d'assaut le Parlement"
 UKR_storm_sturm_at_parliament_desc: "We will get rid of those who sabotage our activities in our government agencies."
 UKR_befriend_russia_vit: "Partenariat avec la Russie"
 UKR_befriend_russia_vit_desc: "Historically, we are connected with Russia and will always be connected with it - our partnership with Russia is something that should be obvious as the sunrise."
 UKR_apply_to_union_state: "Annoncez votre désir de rejoindre l'État de l'Union"
 UKR_apply_to_union_state_desc: "The Union State is one of the first and most important stages of the unity of our united people, we intend to become part of this project."
 UKR_honor_russian_empire: "Respecter l'héritage de l'Empire russe"
 UKR_honor_russian_empire_desc: "The Russian Empire was a great power and it would be stupid and unfair to deny its achievements, we remember the greatness of the Romanovs."
 UKR_free_healthcare: "Soins de santé gratuits"
 UKR_free_healthcare_desc: "Nous rétablirons la pratique soviétique des soins de santé gratuits ; les citoyens doivent être en bonne santé !"
 UKR_national_bolshevist_rhetoric: "Rhétorique nationale-bolchevique"
 UKR_national_bolshevist_rhetoric_desc: "Our party also borrows many things from the program of the National Bolsheviks, with which we unanimously agree."
 UKR_russo_ukrainian_nationalism: "Nationalisme russo-ukrainien"
 UKR_russo_ukrainian_nationalism_desc: "Our peoples must always rise up and remember their greatness, we will actively support the nationalist movements of our countries."
 UKR_naz_pioners: "Pionniers nationaux"
 UKR_naz_pioners_desc: "The pioneer was a great idea of the Soviet leadership, we will revive it, but with our special specifics."
 UKR_calm_ruthenia: "Se déclarer héritiers de la Ruthénie"
 UKR_calm_ruthenia_desc: "We believe that the legacy of Ancient Ruthenia should also not be forgotten! We will remind everyone that Ruthenia existed on these lands."
 UKR_proclaim_rus_ukraine: "Annoncer la renaissance de la Ruthénie"
 UKR_proclaim_rus_ukraine_desc: "La Ruthénie renaît ! C'est aujourd'hui, ici, sur les terres d'Ukraine !"
 UKR_federalize_galicia_and_zakarpat: "Fédéralisation de la Galicie"
 UKR_federalize_galicia_and_zakarpat_desc: "It's time to resolve the separatist issue in Galicia, only Federalization will save us."
 UKR_lnr_dnr_peace_integrate: "Fédéralisation de l'Ukraine orientale"
 UKR_lnr_dnr_peace_integrate_desc: "The mistakes committed by the previous government, now we must decide. We are ready for a federalization project to end the division of our country."
 UKR_suppress_western_and_bander: "Réprimer l'influence occidentale"
 UKR_suppress_western_and_bander_desc: "The influence of the West should be purposefully weakened in our country."
 UKR_restore_russian_church: "Retour à l'Église russe"
 UKR_restore_russian_church_desc: "Autocephaly was a mistake, we have spiritually distanced ourselves from our brothers, and we do not intend to repeat such a mistake anymore."
 UKR_no_to_upc: "Dissoudre l'Église orthodoxe ukrainienne"
 UKR_no_to_upc_desc: "Heretics must be disbanded."
 UKR_clear_out_pcu: "Nettoyer l'Église"
 UKR_clear_out_pcu_desc: "The supporters of Autocephaly and all their sympathizers must be brought under our control."
 UKR_restore_apostolacy: "Le retour de l'Église orthodoxe russe"
 UKR_restore_apostolacy_desc: "L'Église orthodoxe russe domine à nouveau notre terre !"
 UKR_full_socialism: "Accent sur le socialisme"
 UKR_full_socialism_desc: "Nous plongerons encore plus profondément dans les doctrines du socialisme et continuerons à les mettre en œuvre dans notre pays."
 UKR_install_true_soviet_folk: "Socialisme populaire"
 UKR_install_true_soviet_folk_desc: "Nous ferons tout pour que nos citoyens se sentent heureux."
 UKR_appease_pro_russian_oligarchs: "Coopérer avec les oligarques pro-russes"
 UKR_appease_pro_russian_oligarchs_desc: "Nous sommes prêts à établir une coopération avec l'oligarchie pro-russe, car leurs investissements renforceront notre économie."
 UKR_loyalist_oligarchy_ens: "Accepter les oligarques loyaux"
 UKR_loyalist_oligarchy_ens_desc: "Les oligarques loyaux se tiendront également à nos côtés, sécurisant ainsi leurs finances à l'intérieur du pays."
 UKR_industrial_revival: "Renaissance industrielle"
 UKR_industrial_revival_desc: "Notre pays a été privé de sa puissance industrielle après l'effondrement de l'URSS ; il est temps de la relancer."
 UKR_national_feminism: "Féminisme national"
 UKR_national_feminism_desc: "Les femmes doivent également devenir le moteur de la croissance de notre pays, et nous encouragerons leur participation dans toutes les industries."
 UKR_foreign_policy_det: "Notre orientation en politique étrangère"
 UKR_foreign_policy_det_desc: "Notre pays doit décider lui-même de la voie qu'il suivra en politique étrangère."
 UKR_fully_antagonize_the_west: "Antagonisme envers l'Ouest"
 UKR_fully_antagonize_the_west_desc: "Nous n'avons pas l'intention d'être amis avec l'Ouest, car nous savons que l'Ouest n'a pas d'amis, seulement des esclaves et des serviteurs."
 UKR_ukr_sov_mil_coop: "Coopération militaire avec la Russie"
 UKR_ukr_sov_mil_coop_desc: "Nous mènerons une série d'exercices militaires avec l'armée russe."
 UKR_euroscepticism_campaign: "Euroscepticisme puissant"
 UKR_euroscepticism_campaign_desc: "Nous avons été et resterons eurosceptiques."
 UKR_join_csto: "Rejoindre l'OTSC"
 UKR_join_csto_desc: "Nous sommes prêts à signer un document pour rejoindre l'Organisation du Traité de sécurité collective ; seule la Russie peut nous offrir des garanties de sécurité."
 UKR_reconcile_with_west: "Améliorer les interactions avec l'Ouest"
 UKR_reconcile_with_west_desc: "Nous avons l'intention d'améliorer la coopération avec les pays occidentaux."
 UKR_nato_ukr_train: "Exercices avec les pays de l'OTAN"
 UKR_nato_ukr_train_desc: "Nous promouvrons partiellement la doctrine de l'OTAN dans nos forces armées et mènerons également une série d'exercices avec eux."
 UKR_join_nato_with_russia: "Rejoindre l'OTAN avec la Russie"
 UKR_join_nato_with_russia_desc: "Nous avons l'intention de rejoindre l'OTAN, mais uniquement avec la Russie, et nous proposerons cette idée au gouvernement russe."
 UKR_full_nazbol_transition: "Renaissance nationale-bolchevique"
 UKR_full_nazbol_transition_desc: "Le moment est venu pour la prochaine étape du développement de notre pays et de toute la famille slave en général. Nous nous engageons sur la voie de l'unité des Slaves."
 UKR_serbia_unify: "La révolution nationale-bolchevique en [SER.GetName]"
 UKR_serbia_unify_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_bulgaria_unification: "La révolution nationale-bolchevique en [BUL.GetName]"
 UKR_bulgaria_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_unification_with_belarus: "La révolution nationale-bolchevique en [BLR.GetName]"
 UKR_unification_with_belarus_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_poland_unification: "La révolution nationale-bolchevique en [POL.GetName]"
 UKR_poland_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_demand_bosnia: "La révolution nationale-bolchevique en [BOS.GetName]"
 UKR_demand_bosnia_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_czech_unification: "La révolution nationale-bolchevique en [CZE.GetName]"
 UKR_czech_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_demand_croatia_slovenia: "La révolution nationale-bolchevique en [CRO.GetName]"
 UKR_demand_croatia_slovenia_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_slovakia_unify: "La révolution nationale-bolchevique en [SLO.GetName]"
 UKR_slovakia_unify_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_propose_full_union_state: "Véritable État de l'Union"
 UKR_propose_full_union_state_desc: "Il est temps que la Russie et notre pays deviennent un véritable État de l'Union !"
 UKR_pan_slavic_ssr: "Union des Républiques slaves"
 UKR_pan_slavic_ssr_desc: "Enfin, tous les Slaves ne feront qu'un !"
 UKR_vetrenko_surrort_nationalism: "Nationalisme russo-ukrainien"
 UKR_vetrenko_inner_idea: "Politique intérieure"
 UKR_vetrenko_inner_idea_desc: "We are ready to pursue a policy of independence from the West and a strong Ukraine, we have had enough of the dictatorship of Western capital."
 UKR_vetrenko_christian_socialism: "Socialisme chrétien"
 UKR_vetrenko_christian_socialism_desc: "God and Socialism go hand in hand in Ukraine."
 UKR_vetrenko_west_idea: "Doctrine anti-occidentale"
 UKR_vetrenko_west_idea_desc: "We do not hide the fact that the West is our ideological and direct enemy."
 UKR_vetrenko_pioneria: "Pionnier national"
 UKR_vetrenko_women_idea: "Féminisme national"
 UKR_vetrenko_women_idea_desc: "The women of Ukraine will build a great state hand in hand with men."
 UKR_vetrenko_iron_woman: "Femme de fer ukrainienne"
 UKR_vetrenko_iron_woman_desc: "Vitrenko became our equivalent of Margaret Thatcher."
 UKR_vetrenko_health_free_idea: "Soins de santé gratuits"
 ukraine_nazbol.1.t: "Lancer une invasion de [FROM.GetName] ?"
 ukraine_nazbol.1.d: "We were able to raise an uprising in this country, but now we need to decide whether we are ready to bring it to an end and admit that the revolution is our doing."
 ukraine_nazbol.1.a: "Oui"
 ukraine_nazbol.1.b: "Non"
 ukraine_nazbol.2.t: ""
 ukraine_nazbol.2.d: ""
 ukraine_nazbol.2.a: ""
 ukraine_nazbol.3.t: "La révolution nationale-bolchevique !"
 ukraine_nazbol.3.d: "Unexpectedly for us, a revolution took place in our country under the banner of the national Bolsheviks! We urgently raised the army and all armed forces to fight the separatists. We know that they are controlled by [UKR.GetName] and intend to deal with this in the future."
 ukraine_nazbol.3.a: "Soudainement"
 ukraine_nazbol.4.t: "[FROM.GetName] célèbre l'héritage de l'Empire russe"
 ukraine_nazbol.4.d: "The government of Ukraine directly at the state level announces the glorification of the past and heritage of the Russian Empire, we should respond to this gesture in any way."
 ukraine_nazbol.4.a: "Nous en sommes également fiers"
 ukraine_nazbol.4.b: "Nous en discutons"
 ukraine_nazbol.5.t: "[FROM.GetName] se tient solidaire de nous"
 ukraine_nazbol.5.d: "[FROM.GetName] stands in solidarity with us on the issue of the legacy of the Russian Empire and is ready to support us at the diplomatic level on this issue."
 ukraine_nazbol.5.a: "C'est formidable !"
 ukraine_nazbol.6.t: "[FROM.GetName] nous condamne"
 ukraine_nazbol.6.d: "[FROM.GetName] condemns the fact that we do not condemn Imperial ambitions, never an undemocratic State, The New Russia will always profess the ideals of peaceful cooperation and not expansion."
 ukraine_nazbol.6.a: "Lâches"
