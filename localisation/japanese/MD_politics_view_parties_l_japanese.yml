 BLZ.Neutral_green: "£generic_Neutral_green_small (BGIP) ベリーズ緑の独立党"
 BLZ.Neutral_green_desc: ""
 BLZ.Nat_Autocracy: "£generic_Nat_Autocracy_small ベリーズ国防軍"
 BLZ.Nat_Autocracy_desc: ""
 BOL.conservatism: "£BOL_western_conservative (ADN) 民族民主行動党"
 BOL.conservatism_desc: "保守主義 - 民族民主行動党（スペイン語：Accion Democratica Nacionalista, ADN）\n\n1979年にウーゴ・バンセルによって設立された民族民主行動党は、ボリビアの保守右派の多くを統合し、その後、民政移管を経て連立政権の主要な一翼を担うようになった。政権与党として、市場自由化と治安重視の国家運営を支持し、秩序と安定の党としての立場を打ち出した。同党のアイデンティティは、依然として伝統的な保守エリート層や新自由主義的な経済路線と密接に結びついている。"
 BOL.liberalism: "£BOL_non_aligned_conservative (MNR) 民族革命運動党"
 BOL.liberalism_desc: "自由主義 - 民族革命運動党（スペイン語：Movimiento Nacionalista Revolucionario, MNR）\n\n1941年に結成された民族革命運動党は、1952年の国民革命を主導した改革派勢力として台頭し、抜本的な社会・経済改革を通じてボリビアを再構築した。1964年のクーデターとそれに続く長期にわたる軍事政権の時代を経て、同党は民主化時代において、自由主義的で市場志向の改革運動として生まれ変わった。同党は現在もなお、断絶ではなく改革による近代化を掲げるボリビアを代表する政治勢力の一つであり続けている。"
 BOL.socialism: "£BOL_western_social_democrat (FRI) 革命左翼戦線"
 BOL.socialism_desc: "社会民主主義、ボリビア改革主義 - 革命左翼戦線（スペイン語：Frente Revolucionario de Izquierda, FRI）\n\n革命左派戦線は1978年、元ゲリラ指導者オスカル・サモラ・メディナセリの下でマルクス主義政党連合として結成されたが、まもなくより社会民主主義的な立場に転じ、革命民族主義運動(MNR)との連立政権に参加した。FRIは社会民主主義的展望を掲げ、ボリビアにおける最大規模の改革主義政党の一つである。"
 BOL.Communist-State: "£BOL_emerging_communism (PCB) ボリビア共産党"
 BOL.Communist-State_desc: "マルクス・レーニン主義 - ボリビア共産党（スペイン語：Partido Comunista de Bolivia, PCB）\n\nボリビア共産党は、マルクス・レーニン主義の教義と労働運動に立脚した、規律ある革命政党であると自認している。同党は、戦略的部門の国有化、労働組合の権限拡大、そして同党が「寡頭制かつ外国支配的な経済構造」と位置づけるものからの決別を訴えている。その影響力は、大規模な独立した選挙戦力というよりは、組織活動や連合による圧力を通じて最も強く発揮されている。"
 BOL.anarchist_communism: "£BOL_anarchist_communism (MAS-IPSP) 社会主義運動"
 BOL.anarchist_communism_desc: "インディヘニスモ - 社会主義運動（スペイン語：Movimiento al Socialismo - Instrumento Político por la Soberanía de los Pueblos, MAS-IPSP）\n\n社会主義運動は、先住民の動員、労働組合の力、そして国家とその資源に対する主権を取り戻すという公約を基盤とする、ボリビアを代表する左派の大衆運動である。同党は、経済における強力な公的関与、社会的再分配、そしてボリビアの多民族国家としてのアイデンティティの憲法上の承認を推進している。その強さは、組織力と、エリートによる支配や外国の影響力に対する「国家的尊厳」という物語に由来している。"
 BOL.Neutral_conservatism: "£BOL_Neutral_Conservatism_nfr (NFR) 新共和勢力"
 BOL.Neutral_conservatism_desc: "大衆保守主義 - 新共和勢力（スペイン語：Nueva Fuerza Republicana, NFR）\n\n新共和勢力は、強力な個人主義的な指導スタイルと、分断された政治情勢の中で権威を回復するという公約を掲げて台頭した、保守的で法と秩序を重視する政党である。同党は、市場主義的な実用主義と、治安や公的規律に関する強硬な姿勢を融合させ、不安定な情勢や街頭での勢力の台頭に対する解決策として自らを位置づけている。ボリビアの政治が統治不能な状況に陥り、有権者が強硬な指導力を求めるようになると、同党への支持は急増する傾向にある。"
 BOL.neutral_Social: "£BOL_neutral_Social (UN) 国民統一戦線"
 BOL.neutral_Social_desc: "社会民主主義 - 国民統一戦線（スペイン語：Frente de Unidad Nacional, UN）\n\n2003年にサミュエル・ドリア・メディナ氏によって設立された国民統一党は、開発、制度的安定、民主主義の定着を掲げる改革派の中道勢力として位置づけられている。同党は「国民統一」を実践的なプロジェクトとして位置づけ、ボリビアの都市部の中産階級の利益と、社会的包摂や結束への幅広い訴求とを結びつけている。政治が二極化する局面において、UNは対立と崩壊の狭間で、冷静な第三の選択肢として自らをアピールしている。"
 BOL.Neutral_green: "£BOL_Neutral_green (PVB) ボリビア緑の党"
 BOL.Neutral_green_desc: "緑の政治 - ボリビア緑の党（スペイン語：Partido Verde de Bolivia, PVB）\n\nボリビア緑の党は、生物多様性の保護、水資源の安全保障、そして同国の土地と地域社会の長期的な健全性に焦点を当てた環境保護改革政党として自らを位置づけている。同党は、持続可能な開発、環境規制の強化、そして短期的な資源採掘のために森林や先住民の領土を犠牲にしない近代化の道を推進している。その影響力は限定的だが、生態系問題がもはや無視できない状況となった際には、圧力となる声として機能している。"
 BOL.Nat_Autocracy: "£BOL_Nat_Autocracy (FF.AA.) ボリビア軍"
 BOL.Nat_Autocracy_desc: "実用的軍事政権 - ボリビア軍（スペイン語：Fuerzas Armadas de Bolivia, FF.AA.）\n\nボリビア軍は、危機や文民統治の崩壊を理由に、軍服を着た非常事態統治を体現している。このドクトリンの下では、国家安全保障が政党政治に優先し、各省庁は軍紀に従属し、国家は動員と内部統制を中心に再編成される。秩序は迅速に回復されるが、その正当性は交渉によってではなく、強制によって確保される。"
 BOS.conservatism: "£Bosnian_conservatism 民主行動党"
 BOS.conservatism_desc: "Stranka Demokratske Akcije (SDA), which translates to 'Party of Democratic Action,' is a Bosniak political party in Bosnia and Herzegovina. It was founded in 1990 during the period of multi-party elections in the country, and it played a major role in the Bosnian War and the establishment of Bosnia and Herzegovina as an independent state. SDA describes itself as a center-right party that seeks to promote the interests of the Bosniak community in Bosnia and Herzegovina, while also promoting democratic reform, economic growth, and social justice. The party's platform emphasizes the importance of Bosnia and Herzegovina as a multi-ethnic, multi-religious country and seeks to promote unity and cooperation among all of its constituent peoples. SDA has been one of the dominant political parties in Bosnia and Herzegovina since its founding, and it has participated in various governing coalitions at the national and entity levels. The party has also faced criticism and controversy, including accusations of corruption and nepotism. In recent years, SDA has faced challenges from other Bosniak political parties, including those that seek to challenge its dominant position within the Bosniak community. Nonetheless, SDA remains an influential political force in Bosnia and Herzegovina and continues to play a major role in shaping the country's political landscape."
 BOS.socialism: "£Bosnian_socialism Socijaldemokratska Partija"
 BOS.socialism_desc: "Savez komunista Bosne i Hercegovine (SK BiH), which translates to 'League of Communists of Bosnia and Herzegovina,' was a political party that existed in Bosnia and Herzegovina from 1945 until the early 1990s. It was the ruling party in Bosnia and Herzegovina during the period of communist rule in Yugoslavia, which lasted from the end of World War II until the early 1990s. SK BiH was a branch of the League of Communists of Yugoslavia, which was the governing party of Yugoslavia during this period. The party's ideology was based on Marxist-Leninist principles, and it emphasized the importance of workers' rights, social justice, and equality. During the period of communist rule in Bosnia and Herzegovina, SK BiH played a dominant role in political and economic life, controlling the government, the media, and other key institutions. The party was also involved in the suppression of political dissent and opposition, with many political opponents and dissidents being imprisoned or persecuted. After the collapse of communism in Yugoslavia and the establishment of Bosnia and Herzegovina as an independent state in the early 1990s, SK BiH was disbanded, along with other communist parties throughout the country. Many former members of SK BiH went on to become active in the new political parties that emerged in Bosnia and Herzegovina, although the legacy of the communist period continues to be debated in the country to this day."
 BOS.Communist-State: "£Bosnian_Communist Savez komunista Bosne i Hercegovine"
 BOS.Communist-State_desc: "'Komunisti Bosne i Hercegovine' is a term that can be translated as 'Communists of Bosnia and Herzegovina.' It generally refers to individuals or groups who adhere to communist political ideology in Bosnia and Herzegovina. During the period of communist rule in Yugoslavia (1945-1991), Bosnia and Herzegovina was a republic within the larger Yugoslav federation, and the ruling party was the League of Communists of Yugoslavia (LCY). The LCY had branches in each of Yugoslavia's republics, including Bosnia and Herzegovina, and members of these branches were often referred to as 'communists' or 'communist party members.' After the collapse of communism in Yugoslavia in the early 1990s and the establishment of Bosnia and Herzegovina as an independent state, the influence of communist ideology waned, and new political parties emerged based on different ideological perspectives. However, there are still some individuals and groups in Bosnia and Herzegovina who adhere to communist principles, and the legacy of the communist period continues to be debated in the country today."
 BOS.Neutral_conservatism: "£Bosnian_Neutral_conservatism Partija Demokratskog Progresa"
 BOS.Neutral_conservatism_desc: "Partija Demokratskog Progresa (PDP) is a political party in Bosnia and Herzegovina, founded in 1999. The party describes itself as center-right, and its platform emphasizes democracy, economic liberalism, and European integration. PDP was formed by a group of politicians who had previously been associated with the Srpska Demokratska Stranka (SDS) party, but who had become disillusioned with the SDS's nationalist agenda and the leadership of its founder, Radovan Karadžić, who was later indicted for war crimes. PDP's founding members saw the party as a more moderate alternative to the SDS, with a focus on economic and political reform rather than nationalist rhetoric. In the years since its founding, PDP has become one of the major political parties in Bosnia and Herzegovina, particularly in the Republika Srpska entity. The party has been involved in governing coalitions at both the entity and state level, and its members have held positions in government and parliament. PDP's current leader is Branislav Borenović, who has been in the position since 2016. The party has been a vocal advocate for political and economic reform in Bosnia and Herzegovina, and has been critical of the country's complex system of government, which divides power between multiple entities and levels of government. PDP has also emphasized the importance of European integration and closer ties with the European Union"
 BOS.neutral_Social: "£Bosnian_neutral_Social Nezavisnih Socijaldemokrata"
 BOS.neutral_Social_desc: "Nezavisnih Socijaldemokrata (NSD) is a political party in Bosnia and Herzegovina that was founded in 2006. The party's name can be translated as 'Independent Social Democrats,' and it positions itself as a center-left party. NSD was founded by a group of former members of the Socijaldemokratska Partija Bosne i Hercegovine (SDP BiH) who had become disillusioned with the direction of the party under its leader, Zlatko Lagumdžija. The founding members of NSD saw the party as a more progressive alternative to the SDP, with a focus on social justice and human rights. Since its founding, NSD has been involved in governing coalitions at both the entity and state level in Bosnia and Herzegovina. The party has also been active in promoting political and economic reform, and has been critical of the country's complex system of government and the political elites who it sees as obstructing progress. NSD's current leader is Zdravko Krsmanović, who has been in the position since 2020. The party's platform emphasizes social justice, human rights, and a commitment to European integration. NSD is also active in promoting greater regional cooperation in the Balkans, and has advocated for a more inclusive and democratic society in Bosnia and Herzegovina."
 BOS.Neutral_Libertarian: "£generic_Neutral_Libertarian_small 自由主義運動"
 BOS.Neutral_Libertarian_desc: "自由主義運動（LP）は、2006年に結成されたボスニア・ヘルツェゴビナの政党でれ、中道右派の政党として位置づけられている。LPは、ボスニア・ヘルツェゴビナにおいてリベラルな経済・政治思想の推進に関心を持つ知識人や専門家グループによって設立された。党の創設メンバーは自らを改革派と位置づけ、過度に官僚的で非効率的であると見なしていた同国の複雑な政府体制に対して批判的であった。設立以来、LPはボスニア・ヘルツェゴビナの構成体レベルおよび国家レベルの両方で連立政権に参加してきた。同党は経済改革と近代化の推進に積極的に取り組み、同国経済への民間セクターのさらなる参画を提唱している。LPの現在の党首はダミール・ベチロヴィッチであり、2019年からその職にある。同党の政策綱領は、民営化や規制緩和を含む自由主義的な経済政策、および欧州統合へのコミットメントを強調している。また、LPは政府の透明性と説明責任の向上を推進する活動にも積極的に取り組んでおり、ボスニア・ヘルツェゴビナにおける汚職や政治的な縁故主義を批判している。"
 BOS.Nat_Fascism: "£Bosnian_Nat_Fascism 民族誇り運動"
 BOS.Nat_Fascism_desc: "民族誇り運動（ボスニア語：Pokret Nacionalnog Ponosa, PNP）は、2016年に設立されたボスニア・ヘルツェゴビナの政党で、右派の民族主義政党を標榜している。PNPは、ボスニア・ヘルツェゴビナの国民的アイデンティティと主権が侵食されていると懸念した右派活動家たちによって設立された。党の創設メンバーは、自らをボシュニャク人（ボスニア系ムスリム）の国益を守る者だと位置づけ、国内における外国勢力や多国籍企業の影響力に対して批判的であった。設立以来、PNPはボスニア・ヘルツェゴビナの構成体レベルや国家レベルでの連立政権には参加していない。同党は同国の複雑な政府体制を批判し、より中央集権的で民族主義的な統治アプローチを提唱している。PNPの現在の党首はエルヴィル・カラジビッチであり、2018年からその職にある。同党の綱領は、国民的誇り、主権、およびボシュニャク人の利益の擁護を強調している。また、PNPはボスニア・ヘルツェゴビナにおける西欧的リベラル価値観の影響と見なすものに対して批判的であり、社会・文化問題に対してはより伝統主義的なアプローチを提唱している。"
 BOS.Nat_Populism: "£bosnia_hdz クロアチア民主同盟"
 BOS.Nat_Populism_desc: "クロアチア民主同盟（クロアチア語：Hrvatska demokratska zajednica）は、1990年に結成されたボスニア・ヘルツェゴビナの保守政党で、中道右派の政党として位置づけられている。HDZは、ユーゴスラビア解体後のボスニア・ヘルツェゴビナの政治情勢を懸念したボスニア系クロアチア人によって結成された。同党の創設メンバーは、自らがボスニア・ヘルツェゴビナにおけるクロアチア人の国益を守る者であると見なし、同国の政治・経済生活がボシュニャク人（ボスニア系ムスリム）によって支配されているとみなす状況に批判的であった。創設以来、HDZはボスニア・ヘルツェゴビナの構成体レベルおよび国家レベルの両方で連立政権に参加してきた。同党は、言語権、教育、政府内での代表権といった問題を含め、国内におけるクロアチア人の国益を推進する活動に積極的に取り組んできた。また、国内におけるボスニア系住民の利益が支配的であると見なすことに対して批判的であり、権力のさらなる分権化を提唱してきた。HDZの現在の党首はドラガン・チョヴィッチであり、2015年からその職にある。同党の政策綱領は、減税や規制緩和といった保守的な経済政策に加え、クロアチアの国益へのコミットメントを強調している。また、HDZはボスニア・ヘルツェゴビナとクロアチアの間の協力強化、特に貿易やインフラ分野における協力を推進する活動にも積極的に取り組んでいる。"
 BOT.Communist-State: "£BOT_Communist_State ボツワナMELS運動"
 BOT.Communist-State_desc: "マルクス、エンゲルス、レーニン、スターリン運動（MELS運動）は、毛沢東と汎アフリカ主義に感化されたマルクス・レーニン主義政党である。同党はこれまで議会での議席を獲得したことはなく、主に学生層から支持を得ている。その目標は、失業問題の改善と学生自治会の支援である。同党は与党であるボツワナ民主党を「新植民地主義的」と呼び、これに反対している。"
 BOT.Neutral_conservatism: "£BOT_Neutral_conservatism (BDP) ボツワナ民主党 （Aチーム派）"
 BOT.Neutral_conservatism_desc: "ボツワナ民主党は、独立以来ボツワナを統治してきた幅広い支持層を持つ保守包括政党である。その主な支持基盤は、国内のセツワナ系住民である。同党は、時に権威主義的であると指摘されることもある。同党は、多数派の「Aチーム」と改革派の「バラタ・ファティ」という2つの派閥から構成されている。"
 BOT.neutral_Social: "£BOT_neutral_Social (BCP) ボツワナ会議党"
 BOT.neutral_Social_desc: "ボツワナ会議党は、1998年に£BOT_socialism ボツワナ国民戦線から分裂して結成された社会民主主義政党である"
 BOT.Nat_Autocracy: "£BOT_Nat_Autocracy (BDF) ボツワナ国防軍"
 BOT.Nat_Autocracy_desc: "ボツワナ国防軍は、主に陸上部隊から構成され、ボツワナを防衛することを任務としている。南アフリカでのアパルトヘイト終了後、同軍は軍事防衛という任務から、密猟対策や平和維持活動への参加へとその役割を転換した。"
 BRA.liberalism: "£BRA_liberalism (PSDB) ブラジル社会民主党"
 BRA.liberalism_desc: "自由主義 - ブラジル社会民主党（ポルトガル語：Partido da Social Democracia Brasileira, PSDB）\n\n ブラジル社会民主党は、ブラジルを代表する主要政党の一つである。1970年代に当時の軍事独裁政権に対する社会民主主義的野党として結成され、1990年代には新自由主義と自由保守主義へとイデオロギーを転換した。社会民主党と労働者党は1990年代以降、主要二大政党であると同時に、あらゆる政府レベルでの相互連立を禁止するほど、極めて激しいライバル関係にある。現代のPSDBは市場自由主義の立場を堅持しつつも、「第三の道」政治を掲げており、これは左派・右派政党の思想的差異を統合・調和させるべく、両陣営の要素を融合させる試みである。"
 BRA.socialism: "£BRA_socialism (PDT) 民主労働党"
 BRA.socialism_desc: "社会主義 - 民主労働党（ポルトガル語：Partido Democrático Trabalhista, PDT）\n\n民主労働党は、1979年に左派政治家レオネル・ブリゾラによって、軍事独裁政権終焉期におけるブラジル左派勢力の再編を試みるべく設立された。党員の多くは当初、ブラジル労働党の元党員であった。社会民主主義、左翼ナショナリズム、左翼ポピュリズムを掲げる同党は、リオデジャネイロ州をはじめとするブラジル各州で地域的な支持基盤を築いている。民主労働党と労働者党はいずれも左派的性質を多く有するが、外交政策における相違やより穏健な姿勢から、ほとんどの選挙で互いに競合し続けている。"
 BRA.Communist-State: "£BRA_Communist_State (PCdoB) ブラジル共産党"
 BRA.Communist-State_desc: "共産主義 - ブラジル共産党（ポルトガル語：Partido Comunista do Brasil, PCdoB）\n\nブラジル共産党は、ブラジルにおける主要な共産党で、1922年に結成された。マルクス・レーニン主義理論を公式に掲げ、全国的な活動基盤を有し、労働組合運動や学生運動に深く浸透している。"
 BRA.Conservative: "£BRA_communism_Conservative (PRTB) ブラジル労働刷新党"
 BRA.Conservative_desc: "反動主義 - ブラジル労働刷新党（ポルトガル語：Partido Renovador Trabalhista Brasileiro, PRTB）\n\nブラジル労働刷新党は保守的なブラジル政党で、1994年に設立された。党公式ウェブサイトによれば、PRTBの主要な思想は、社会における資源配分の主要な経済メカニズムとして参加型意思決定に基づく経済システムの確立にある。"
 BRA.anarchist_communism: "£BRA_left_wing_radical (PT) 労働者党"
 BRA.anarchist_communism_desc: "急進左派 - 労働者党（ポルトガル語：Partido dos Trabalhadores, PT）\n\n労働者党はブラジル最大の政党であり、ラテンアメリカ全体でも最大の政党である。1980年にブラジル社会民主党と共に社会民主主義政党・社会主義政党として結成された。労働組合支持と社会主義政策により急速に支持を集め、ブラジルを代表する政党の一つとして確立した。ブラジル社会民主党と権力を争い続ける中で、激しいライバル関係にある。"
 BRA.Neutral_conservatism: "£BRA_Neutral_conservatism (PHS) ヒューマニスト連帯党"
 BRA.Neutral_conservatism_desc: "保守主義 - ヒューマニスト連帯党（ポルトガル語：Partido Humanista da Solidariedade, PHS）\n\nヒューマニスト連帯党は1995年、ヴァスコ・アゼヴェド・ネトによりキリスト教ヒューマニズム、キリスト教民主主義、分配主義の思想のもと結成された。同党は多くのキリスト教原理主義者からの支持を得ているが、ブラジル国民の大多数からの広範な支持を獲得するには至っていない。"
 BRA.neutral_Social: "£BRA_neutral_Social (PPS) 人民社会党"
 BRA.neutral_Social_desc: "民主社会主義 - 人民社会党（ポルトガル語：Partido Popular Socialista, PPS）\n\n人民社会党は、ソビエト連邦崩壊後、ブラジル共産党の主流派が社会民主主義政党として再編することを決定し、1992年に設立された。ブラジル共産党の少数派は旧党名を維持した。"
 BRA.Neutral_Communism: "£BRA_Neutral_Communism (PSTU) 統一社会主義労働者党"
 BRA.Neutral_Communism_desc: "モレニスト・トロツキスト共産主義 - 統一社会主義労働者党（ポルトガル語：Partido Socialista dos Trabalhadores Unificado, PSTU）\n\n統一社会主義労働者党は、ブラジルにおけるモレニスト・トロツキスト政党で、モレニストの伝統を継承する国際組織「国際労働者連盟（第四インターナショナル）」の最大規模の支部である。同党は、ブラジル国民に新たな時代をもたらすために国家をどこまで改革すべきかに関する意見の相違から、1994年に労働者党から分裂して結成された。全国的な成功を収めるには至っておらず、左派運動内部の分裂に悩まされ続けているが、社会運動などにおける推進力であり続けている。"
 BRA.Neutral_green: "£BRA_Neutral_green (PV) 緑の党"
 BRA.Neutral_green_desc: "緑の政治 - 緑の党（ポルトガル語：Partido Verde, PV）\n\n緑の党はブラジルにおける最先端の緑の政治政党である。軍事独裁政権終結後、政党活動の制限が解除された際に結成された。創設者フェルナンド・ガベリアはジャーナリストであり、熱心な反独裁革命家として、連邦主義、環境保護、人権、直接民主主義、議会主義、福祉、市民的自由、平和主義、大麻合法化などの多様な政策を掲げて党を設立した。国内の多くの地域で様々な程度の成功を収めているが、全国レベルでは大きな成果を上げられていない。同党は引き続き注目を集めており、全国レベルでは新興かつ台頭しつつある政党である。"
 BRA.Nat_Autocracy: "£BRA_Nat_Autocracy 暫定政府"
 BRA.Nat_Autocracy_desc: "軍事政権 - 暫定統治評議会\n\nブラジル軍は、ブラジル陸軍（ブラジル陸軍航空隊を含む）、ブラジル海軍（ブラジル海兵隊およびブラジル海軍航空隊を含む）、ブラジル空軍から成る統合軍事組織である。"
 BRA.Nat_Populism: "£BRA_Nat_Populism (PSL) 社会自由党"
 BRA.Nat_Populism_desc: "右派ポピュリズム - 社会自由党（ポルトガル語：Partido Social Liberal, PSL）\n\n社会自由党はブラジルの極右政党である。1994年に社会自由主義政党として設立され、1998年に最高選挙裁判所に登録された。2018年1月、元社会キリスト教党所属ジャイール・ボルソナロが党に加わり、後に経済的自由主義、ナショナリズム、急進的反共産主義、社会的保守主義を掲げる政党へと転換した。イデオロギー転換後も党名は維持され、党の当初の目標は、当初の主流派「リーヴリス」が離脱して独自の政治運動を結成し、継続している。"
 BRA.Monarchist: "£BRA_Monarchist オルレアン＝ブラガンサ家"
 BRA.Monarchist_desc: "絶対君主主義 - オルレアン＝ブラガンサ家（ポルトガル語：Casa de Orléans e Bragança）\n\nオルレアン＝ブラガンサ家は、フランス王家オルレアン家の分家で、父系はフランスのオルレアン家、母系はブラガンサ家のブラジル分家から継承されている。この家系は、ブラジルのイザベルとウー伯爵のガスタン・デ・オルレアンスの結婚によって創設されたが、ペドロ1世とペドロ2世によるブラガンサ家のように統治したことはない。1889年のブラジル共和国宣言以降、その子孫はブラジル帝国の帝位を主張し続けている。"
 BRM.Neutral_Libertarian: "£BRM_Neutral_Libertarian 国民民主連盟"
 BRM.Neutral_Libertarian_desc: "リバタリアニズム - 国民民主連盟（NLD）は、1988年の8888蜂起をきっかけにアウン・サン・スー・チーによって設立されたリベラル・親民主主義政党である。NLDは瞬く間に、軍事政権に対する最大の脅威となるまで成長した。"
 BRM.neutral_Social: "£generic_neutral_Social_small 人民党"
 BRM.neutral_Social_desc: "民主社会主義 - 人民党は、ベテランの民主化活動家コーコージーによって設立された新しい左翼政党である。より大きな民主改革と、ミャンマーの内戦状態を解決するための連邦制連合の設立を支持する政党である。"
 BRM.Neutral_Communism: "£BRM_Neutral_Communism 国民統一党"
 BRM.Neutral_Communism_desc: "共産主義 - 国民統一党はもともと軍事政権の選挙手段として設立された党である。しかし1990年の議会選挙でNLDに惨敗してからは、そのルーツから逸脱し、成功したとまでは言えないが、最も重要な野党の1つになった。"
 BRM.Neutral_conservatism: "£generic_Neutral_conservatism_small シャン諸民族民主連盟"
 BRM.Neutral_conservatism_desc: ""
 BRM.Nat_Autocracy: "£BRM_Nat_Autocracy ミャンマー軍"
 BRM.Nat_Autocracy_desc: "軍事政権 - 1960年以来、ミャンマー軍はミャンマーで最も影響力のある政治勢力であった。カレンによる民族反乱と、内戦から逃れてきた中国国民軍によるビルマ領土占領は、独立後のビルマに難題を突きつけた。軍がビルマの政治的重要性を拡大し、最終的には政権を掌握したのである。しかし、ここ数十年、民主化運動はミャンマー軍の政治的立場を弱め、新たな選択肢を検討させてきた。"
 BRM.Nat_Populism: "£BRM_Nat_Populism 連邦団結発展党"
 BRM.Nat_Populism_desc: "右派ポピュリズム - 連邦団結発展党（USDP）は2010年に、親軍政党として結党された。USDPは軍の政治的役割を支持する一方で、前任者よりさらに政治的変化にオープンな姿勢を示している。"
 BRM.Nat_Fascism: "£generic_Nat_Fascism_small アラカン民族党"
 BRM.Nat_Fascism_desc: "ファシズム - アラカン民族党は、ラカイン民族開発党とアラカン民主連盟が合併して誕生した政党である。同党は、おそらくミャンマーで最も強力な民族政党であり、その利益を守るラカイン州のアラカン系仏教徒から支持を集めている。しかし、同党はラカイン州のロヒンギャ・ムスリムに対して強硬な姿勢をとっており、一部の外部の観察者からは極右、あるいはファシストとさえ呼ばれている。"
