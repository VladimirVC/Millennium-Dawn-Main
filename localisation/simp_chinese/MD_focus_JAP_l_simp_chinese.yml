 JAP_glorious_decade_desc: "在不回避经济停滞根源的前提下，我们将同步重建金融、企业和需求。同时，我们将直面低生育率和“就业冰河期”一代的影响，以工作方式改革和人才投资为核心，在保障家庭安全的同时，增强经济增长潜力。"
 JAP_inflation_target_desc: "政府和央行将明确传达支持经济的政策立场及其维持条件。通过降低未来的不确定性，消除家庭和企业的“观望”态度，我们将促进消费和投资的复苏。"
 JAP_long_working_idea_desc: "根深蒂固的用“咬牙坚持”和加班来弥补工作量的陋习依然存在，导致员工精疲力竭。难以请假和过重的负担不断累积着员工的挫败感，给家庭和社会生活蒙上阴影，并逐渐恶化了整体社会氛围。\n-------------\n可以通过完成始于§Y$JAP_work_style_reform$§!的国策来§G移除§!。"
 JAP_diplomacy.34.d: "为加强本地区的金融安全网，日本政府已提议通过“清迈倡议”扩大与我国的货币互换安排。在危机时期保障流动性有助于缓解市场焦虑，并促进经济稳定。\n\n我们是否应该接受这项提议，参与加强金融合作？"
 JAP_diplomacy.40.d: "日本政府提议在教育、人力资源开发和科研领域与我国开展“定向官方发展援助”合作，援助将与我国企业和机构协调开展。这项合作将加强技能培养和机构能力建设，促进产业升级和创新。接受该提议也将有助于提升日本在东盟的影响力。\n\n我们是否应该接受这项提议，加强人力资本和研发？"
 JAP_diplomacy.41.d: "[FROM.GetName] 已接受日本在教育、人力资源开发和科研领域提出的““定向官方发展援助”合作方案。随着与当地企业和机构的合作不断深入，对方的体制能力和技术基础将得到加强，从而促进可持续发展。该协议必将提升日本在东盟的影响力。"
 JAP_diplomacy.42.d: "[FROM.GetName] 已表示将拒绝在教育、人力资源开发和科研领域开展““定向官方发展援助”合作的提议。对方似乎更重视国内事务和体制准备，但这并不意味着它拒绝了该提议本身。日本应在保持对话渠道畅通的同时，充分考虑对方的实际情况。"
 JAP_diplomacy.49.d: "日本政府已提出建立“日台防灾知识平台”的提案，旨在基于两国共同面临的自然灾害风险，分享防灾方面的专业知识和经验教训。该平台将通过规范信息共享、开展联合培训和制定灾后恢复程序，加强应急响应能力，加快灾后重建。如果这项合作得以推进，有望减少灾害损失，加快灾后重建进程。"
 JAP_diplomacy.50.d: "日本政府提出了“日台高科技合作”计划，旨在联合日本和台湾的研究机构和私营企业，推进尖端民用技术的联合研究。通过共享研究资源、开展联合开发以及促进工程师交流，该计划旨在加速创新，提升产业生产力和竞争力。如果这项合作得以落实，将为两国民用技术领域的长期发展奠定基础。"
 JAP_diplomacy.56.t: "“中华文化圈”文化合作项目"
 JAP_diplomacy.56.d: "日本政府提出了一项日中文化合作项目，旨在加强“中华文化圈”内部的文化联系，该文化圈拥有共同的历史渊源。通过学术交流、文化活动以及媒体和教育领域的合作，该项目旨在使共同的价值观和历史联系更加清晰地展现出来，并使其成为抵御外部影响的文化缓冲。如果这一框架得以推进，预计还将增强软实力，从而有助于塑造更积极的国际形象。"
 JAP_diplomacy.59.d: "日本政府提出了“区域商业交流倡议”，旨在将地方层面的商业交流制度化，促进日韩两国区域企业间的合作。该倡议通过举办商业对接会、联合展览、供应链对接以及技术知识共享等活动，力求振兴区域经济，加速民用产业发展。如果这一框架得以落实，将拓展不过度依赖中央政府主导的务实合作，从而强化以私营部门为主导的产业网络。"
 JAP_historical.20010426.d: "森喜朗在担任首相仅一年后便宣布辞职。他的支持率持续下滑，而他与公众之间的隔阂也日益加深，这体现在他发表的“神之国”言论以及他对爱媛丸事件的处理方式上。\n\n在自民党总裁选举中，小泉纯一郎当选为他的继任者。他以“摧毁自民党”的豪言壮语吸引了全国的目光，并开展了一场引人注目、高调的竞选活动。公众对他寄予厚望，而他也在地方选举中以压倒性优势获胜。\n\n小泉的风格和舞台表现力与老自民党截然不同，他在就任首相时高举“改革”的大旗。\n然而，在他誓言要摧毁的废墟中，究竟会涌现出什么，目前还无人知晓。"
 JAP_historical.20060926.d: "执政五年多的首相小泉纯一郎宣布，他将在自民党总裁任期届满后卸任。尽​​管小泉已公开表示希望在任期结束后卸任，但他仍然拥有很高的民意支持率，党内也有许多人呼吁他连任。\n\n与此同时，在自民党内部，年轻有为、迅速晋升为内阁官房长官的安倍晋三，凭借其年轻、知名度、政治背景以及作为“后小泉时代”人物的象征意义，成为最受瞩目的接班人。他获得了党内各界的广泛支持。\n\n谁更适合带领国家前进，是经验丰富的现任领导人，还是准备将火炬传递给下一代的新一代领导人？现在是时候做出决定了。"
 JAP_historical.20070926.d: "首相安倍晋三突然宣布辞职，理由是执政难度日益增加。他上任仅一年，一系列内阁丑闻已严重动摇了其政府的根基。\n安倍辞职后，自民党内部一些人力推由前内阁官房长官福田康夫接任，认为“需要一张新面孔来重塑公众信任”。然而，许多人仍然强烈支持安倍继续执政。\n\n日本目前正处于政治动荡之中。现在是时候决定谁将执掌国家大权了。"
 JAP_historical.20080924.d: "首相福田康夫出人意料地在首相官邸召开记者会，宣布辞职。\n\n在会议上，他表示：“为了人民的日常生活，我希望新的团队能够贯彻执行各项政策”，表现出对领导层更迭的平静接受。然而，由于他并未明确解释辞职原因，这一声明令许多民众感到困惑和不安。\n对此，自民党迅速启动了领导层选举的筹备工作。干事长麻生太郎脱颖而出，成为领跑者，并迅速获得了党内各派系的支持。然而，党内仍有少数人呼吁福田留任。\n\n要打破政治停滞，国家需要的是变革吗？还是说，稳定对日本而言才是眼下最重要的事？现在是时候做出决定了。"
 mdmosjap_japan.190216001.d: "1997年，日本社会保险厅开始将个人养老金记录整合到单一的“基本养老金编号”系统下。然而，在2006年至2007年间，该机构发现约有5000万份养老金记录由于纸质文件转录成数字格式过程中的错误而无法关联或存在差异。\n部分缺失的记录影响了当前的养老金领取者，引发了人们对个人可能收到错误金额的担忧。此外，据报道，在尝试更新员工养老金数据的过程中，某些记录丢失或被误删。\n对此，[JAP.GetRulingParty]成立了特别工作组调查此事，并提出紧急立法以救济受影响者。然而，反对党对政府进行了严厉批评，公众不满情绪依然高涨。"