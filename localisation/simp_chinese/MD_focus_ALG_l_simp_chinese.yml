 alg_cabinet.1.d: "The current cabinet reflects the balance between the presidency, the bureaucracy, and the security establishment.\n\nPrime Minister: [GetPMName]\nDefense Minister: [GetMODName]\nInterior Minister: [GetMOIName]\nForeign Minister: [GetMOFAName]\nFinance Minister: [GetMOFName]\nEnergy Minister: [GetMOEName]\nJustice Minister: [GetMOJName]\nIntelligence Chief: [GetDRSName]\n\nCabinet Loyalty: [GetCabinetLoyaltyLevel]\nCabinet Competence: [GetCabinetCompetenceLevel]\nCabinet Deep State Influence: [GetCabinetDeepStateLevel]"
 alg_cabinet.10.d: "总理办公室在协调各部委、维护总统职位以及管理日常政务方面仍然至关重要。正确的人选可以巩固政权，而错误的选择则可能助长对手的气焰。"
 alg_cabinet.20.d: "The Defense Ministry is not merely administrative. It is deeply intertwined with the officer corps, the high command, and the networks that make up the deep state. Replacing its holder is always dangerous."
 alg_cabinet.25.d: "The officer corps has not taken kindly to recent changes in the Defense Ministry. Some factions are openly complaining that the presidency is upsetting the established balance inside the armed forces."
 alg_cabinet.30.d: "The Interior Ministry controls internal administration, provincial governance, and many of the levers of domestic order. Its holder must be both dependable and politically capable."
 alg_cabinet.40.d: "Algeria's Foreign Minister shapes the tone of the republic abroad, balancing relations with the West, the Arab world, and the wider non-aligned tradition."
 alg_cabinet.50.d: "The Finance Ministry determines whether Algeria pursues technocratic reform, statist management, or the familiar bureaucratic equilibrium that has long defined the regime."
 alg_cabinet.60.d: "Hydrocarbons remain the backbone of the Algerian state. The Energy Ministry is therefore one of the most economically strategic offices in the cabinet."
 alg_cabinet.70.d: "The Justice Ministry can be used either as a vehicle for reform, an instrument of regime discipline, or a weapon of the security establishment."
 alg_cabinet.80.d: "情报局长掌控着国家最不透明、最令人恐惧的机构。这是内阁中最敏感的任命，任何重大变动都可能引发强烈反弹。"
 alg_cabinet.85.d: "Elements inside the intelligence services are resisting the recent appointment. Old networks remain intact, and not all of them are willing to accept tighter political control."
 alg_cabinet.100.d: "A full reshuffle offers the presidency a chance to restore order, reward allies, and redefine the direction of government. Yet every new balance creates new enemies."
 alg_cabinet.110.d: "Rumors of wavering loyalty have reached the presidency. A public show of unity may restore authority, but forcing the issue can also expose hidden fractures."
 alg_cabinet.200.d: "Several key cabinet members are showing signs of disobedience or political unreliability. In a system already shaped by rival networks and hidden centers of power, such disloyalty is dangerous."
 alg_cabinet.201.d: "The deep state is demanding greater influence over ministerial appointments and policy direction. Accepting their pressure may preserve short-term calm, but resisting them risks confrontation."
 alg_cabinet.1.a: "Understood."
