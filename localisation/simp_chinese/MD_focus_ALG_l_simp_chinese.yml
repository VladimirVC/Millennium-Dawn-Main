 alg_mufti.2.t: "伊斯兰国将何去何从？"
 alg_mufti.2.d: "既然伊斯兰教已被确立为国家的指导原则，我们必须决定由哪股思潮来引领前路。阿卜杜拉·贾巴拉领导的伊斯兰复兴运动（Nahda）主张通过选举箱实现温和且有体系的伊斯兰愿景。但也有人将目光投向宗教学者和魅力型传教士，他们承诺建立更直接且不妥协的伊斯兰权威形式。"
 alg_mufti.2.a: "增强伊斯兰复兴运动的力量"
 alg_mufti.2.a.tt: "贾巴拉赫的复兴运动成为伊斯兰政治的主导力量。"
 alg_mufti.2.b: "将权力交予乌理玛"
 alg_mufti.2.b.tt: "稍后我们将选择是追随一位有争议的传教士，还是政府认可的穆夫提。"
 alg_mufti.3.t: "乌里玛的头面人物"
 alg_mufti.3.d: "在乌里玛权威得到确认后，政府现在必须决定由谁来代表这股潮流担任领导职务。谢赫·布阿姆拉内是温和派，为国家与军方所接受；而阿里·本哈吉仍是激进派，他激昂的言论能激发民众支持，却可能引发与当局的对抗。"
 alg_mufti.3.a: "支持贝勒哈吉"
 alg_mufti.3.a.tt: "阿里·贝勒哈吉将成为领导人，代表着一股强硬的萨拉菲主义潮流。"
 alg_mufti.3.b: "支持布阿姆兰"
 alg_mufti.3.b.tt: "谢赫·布阿姆兰将成为领导人，代表温和且与国家结盟的乌里玛派系。\n§R2016年5月后不可用。§!"
 ALG_ennahda: "支持复兴运动"
 ALG_ennahda_desc: "我们将支持阿卜杜拉·贾巴利和伊斯兰复兴运动，将伊斯兰主义政治纳入我们国家机构的范畴。"
 ALG_independent: "独立乌理玛"
 ALG_independent_desc: "我们将加强乌理玛的独立性，赋予宗教学者在精神事务乃至国家领导权方面的权威。"
 ALG_grand_mufti_rule: "大穆夫提掌权"
 ALG_grand_mufti_rule_desc: "乌里玛，即政治伊斯兰主义运动，将成为阿尔及利亚国家的指导权威。我们所选择的道路将决定谁将成为伊斯兰权威的代表。"
 ALG_nahda_path: "选择复兴运动"
 ALG_ulema_path: "选择乌里玛"
 ALG_belhadj_leader: "阿里·贝勒哈吉是领导人"
 ALG_bouamrane_leader: "谢赫·布阿姆兰是领导人。"
 ALG_constitution_1996: "1996年宪法"
 ALG_constitution_1996_desc: "1996年修订的宪法旨在稳定经历了“黑色十年”动荡的阿尔及利亚。然而，许多条款的设计目的并非真正为了民主化，而是为了维护政权的存续。其僵化的世俗框架被伊斯兰运动的大部分成员视为不合法且“不符合伊斯兰教义”。尽管该宪法巩固了国家控制并强化了总统权力，但也限制了政治参与，削弱了政府与社会之间的信任，并阻碍了长期改革。这部宪法的遗留问题至今仍对阿尔及利亚的稳定和合法性构成沉重负担。"
 ALG_enahda_media_network_idea: "复兴运动媒体网络"
 ALG_enahda_media_network_idea_desc: "复兴运动已建立起自己的媒体渠道，以传播其理念并动员公众支持。这些媒体在宣扬宗教价值观的同时，也批评了政权的种种失败。\n\n§Y如果我们没有与复兴运动结盟，该国家精神将被移除§!"
 ALG_supreme_islamic_council_idea: "最高伊斯兰委员会"
 ALG_supreme_islamic_council_idea_desc: "一个由资深乌里玛和伊斯兰学者组成的咨询委员会已经成立，旨在指导国家政策遵循宗教原则。虽然该委员会不掌握直接权力，但其对立法和公共生活的影响力不容小觑。\n\n§Y如果我们不是萨拉菲主义或伊斯兰主义，该国家精神将被移除。§!"
 ALG_new_constitution: "改革宪法"
 ALG_new_constitution_desc: "1996年宪法已过时，现已进行修订，以体现一个更加平衡和民主的阿尔及利亚。尽管改革仍不完善，但它加强了国家机构，促进了伊斯兰主义者和世俗主义者之间的和解，并为社会和经济进步开辟了空间。改革的成功与否取决于其执行的忠实程度。"
 alg_constitution.1.t: "宪法已进行改革"
 alg_constitution.1.d: "经过多年的争议，1996年宪法终于进行了修订。新宪法框架删除了部分最具专制色彩的条款，引入了对行政权力的制衡，并力求在阿尔及利亚的伊斯兰思潮和世俗思潮之间取得更好的平衡。许多人认为这是迈向和解的必要一步，而另一些人则怀疑这些改革是否真的能够改变根深蒂固的权力体系。"
 alg_constitution.1.a: "通过新宪法"
 alg_constitution.1.a.tt: "以§Y改革后的宪法§!取代§Y1996宪法§!，为稳定度、政治点数和经济增长提供加成。"
 ALG_ali_belhadj_desc: "阿里·贝勒哈吉是伊斯兰救世阵线的联合创始人，也是阿尔及利亚动荡的20世纪90年代最具魅力和最激进的伊斯兰主义领导人之一。他以激情澎湃的布道、毫不妥协的言辞和对世俗政治的摒弃而闻名，成为反抗民族解放阵线政权的象征。在内战的大部分时间里，他都被监禁，并根据1996年宪法被禁止参与正式政治活动。贝勒哈吉至今仍是一个极具争议的人物 - 对一些人来说，他是伊斯兰主义者不满情绪的化身；对另一些人来说，他是“黑色十年”的危险象征。他可能重返政坛，既带来了和解的希望，也引发了对极端主义死灰复燃的担忧。"
 ALG_bouamrane_desc: "穆罕默德·布阿姆拉内于20世纪90年代崭露头角，成为一位较为温和的伊斯兰主义知识分子和政治人物。他倡导对话而非对抗，将自己定位在阿里·贝勒哈吉等强硬派伊斯兰主义者和根深蒂固的民族解放阵线精英之间。尽管布阿姆拉内从未像伊斯兰救世阵线领导层那样获得广泛的民众支持，但他在战后关于和解与宪政改革的辩论中却备受尊敬。他的愿景强调伊斯兰价值观与民主制度能够共存的阿尔及利亚，这使他成为世俗政治与宗教政治之间紧张平衡的桥梁。"
 algeria_elections.2024.t: "2024年总统大选"
 algeria_elections.2024.d: "阿尔及利亚迎来又一次关键选举。三位主要候选人代表着截然不同的政治道路：阿卜杜勒马吉德·特本承诺在民族解放阵线的领导下保持政策的连续性；苏菲安·吉拉利·奥希什主张民主改革和自由化现代化；阿卜杜勒阿里·哈萨尼则得到伊斯兰主义势力的支持，力图在政治中发挥更大的作用。选举结果反映了各派系之间的力量平衡。"
 algeria_elections.2024.a: "阿卜杜勒-马吉德·特本成功连任"
 algeria_elections.2024.b: "优素福·奥奇什赢得总统选举。"
 algeria_elections.2024.c: "阿卜杜拉利·哈萨尼在伊斯兰主义者的支持下崛起。"
 ALG_tebboune_2024_tt: "§Y阿卜杜勒-马吉德·特本§!继续担任总统，民族解放阵线保持主导地位。"
 ALG_aouchiche_2024_tt: "§Y优素福·奥奇什§!成为总统，领导改革派自由主义者。"
 ALG_hassani_2024_tt: "§Y阿卜杜拉利·哈萨尼§!在伊斯兰主义运动的支持下成为总统。"
 algeria_gspc.1.t: "纳比尔·萨赫拉维接管萨拉菲宣教与战斗组织"
 algeria_gspc.1.d: "萨拉菲宣教与战斗组织内部的不满情绪日益增长。许多指挥官指责哈桑·哈塔卜软弱，批评他迟迟不愿发动全面圣战。2003年中期，哈塔卜被自己的部下排挤，而更为激进的纳比勒·萨赫拉维宣布自己成为萨拉菲宣教与战斗组织的新任埃米尔。"
 algeria_gspc.1.a: "叛乱进一步激进化。"
 ALG_sahraoui_rise_tt: "§Y纳比尔·萨赫拉维§!代替哈桑·哈塔布成为萨拉菲宣教与战斗组织的新领导者"
 algeria_gspc.2.t: "萨赫拉维被杀，德鲁克德尔现身"
 algeria_gspc.2.d: "2004年6月，阿尔及利亚安全部队在一次冲突中击毙了纳比勒·萨赫拉维。然而，他的死并未削弱叛乱势力——相反，领导权已移交给阿卜杜勒马利克·德鲁克德尔，一位与基地组织全球网络有联系的雄心勃勃的战略家。在他的领导下，萨拉菲宣教与战斗组织很可能会扩大其圣战活动并使其国际化。"
 algeria_gspc.2.a: "一个更加危险的时代开始了。"
 ALG_droukdel_rise_tt: "§Y阿卜杜勒马利克·德鲁克德尔§!成为萨拉菲宣教与战斗组织领导人。"
 algeria_gspc.3.t: "哈桑·哈塔布投降"
 algeria_gspc.3.d: "在逃亡多年后，萨拉菲宣教与战斗组织创始人哈桑·哈塔卜向阿尔及利亚当局投降。哈塔卜对曾经创立的运动的发展方向感到失望，因此接受了政府的特赦计划。尽管他的影响力已大不如前，但他的投降对阿尔及利亚政府而言仍具有象征意义。"
 algeria_gspc.3.a: "这是叛乱失败的象征。"
 ALG_hattab_surrender_tt: "§Y哈桑·哈塔布§!投降，叛乱活动减少。"
 alg_generals.1.t: "阿卜杜勒卡德尔·卢内斯​​被任命为空军​​司令"
 alg_generals.1.d: "阿卜杜勒卡德尔·卢内斯将军已被任命为阿尔及利亚空军司令。他以注重现代化建设而闻名，将在未来十年负责阿尔及利亚空军力量的发展。"
 alg_generals.1.a: "我们的天空安全无虞。"
 alg_generals.2.t: "阿马尔·阿姆拉尼接管防空指挥权"
 alg_generals.2.d: "阿马尔·阿姆拉尼少将已被任命为阿尔及利亚地空防御部队司令。在他的领导下，阿尔及利亚保卫其领空免受外国威胁的能力将得到加强。"
 alg_generals.2.a: "我们的防空力量日益增强。"
 alg_generals.3.t: "梅纳德·努巴成为宪兵司令"
 alg_generals.3.d: "梅纳德·努巴将军已被任命为阿尔及利亚国家宪兵队司令。他将负责国内安全和反叛乱工作，其领导对于维护国内秩序至关重要。"
 alg_generals.3.a: "为阿尔及利亚安全采取强硬措施。"
 ALG_ouyahia_pm: "艾哈迈德·乌叶海亚担任总理"
 ALG_belkhadem_pm: "阿卜杜勒-阿齐兹·贝勒卡迪担任总理"
 ALG_interim_president.1.t: "宣布担任临时总统"
 ALG_interim_president.1.d: "布特弗利卡辞职后，阿尔及利亚出现权力真空。根据宪法规定，上议院议长阿卜杜勒卡德尔·本萨拉赫宣誓就任临时总统，任期90天。人民运动拒绝接受这一任命，认为他也是腐败体制的一部分。"
 ALG_interim_president.1.a: "任命阿卜杜勒卡德尔·本萨拉赫"
 ALG_bouteflika_resigns.1.t: "布特弗利卡辞职"
 ALG_bouteflika_resigns.1.d: "在持续数周的人民运动抗议活动以及军方撤回支持的巨大压力下，总统阿卜杜勒-阿齐兹·布特弗利卡正式辞职。他长达二十年的总统任期就此结束，阿尔及利亚的未来充满不确定性。"
 ALG_bouteflika_resigns.1.a: "布特弗利卡的时代结束了。"
 ALG_hirak.100.t: "人民运动之声"
 ALG_hirak.100.d: "从阿尔及尔到奥兰，从君士坦丁到塔曼拉塞特，每周五，数百万民众走上街头，高呼“他们都必须下台”。旧政权已经崩溃。现在，人民运动必须做出选择：谁将把2月22日的精神带进穆拉迪亚总统府？"
 ALG_hirak.100.a: "祖比达·阿苏尔 - 宪法之声"
 ALG_hirak.100.b: "卡里姆·塔布 - 街头勇士"
 ALG_hirak.100.c: "哈基姆·阿达德 - 青年行动集会一代"
 ALG_hirak.100.e: "阿米拉·布拉维 - 巴拉卡特的凶猛女儿"
 ALG_african_trade_links: "非洲贸易联系"
 ALG_african_trade_links_desc: "阿尔及利亚通过加强在非洲的经济和外交举措，扩大了其贸易协定网络，减少了对外部市场的依赖，并确保与非洲大陆伙伴的共同繁荣。"
 ALG_african_mediation_role: "非洲的调解人"
 ALG_african_mediation_role_desc: "阿尔及利亚长期以来一直将自身定位为非洲争端中值得信赖的调解人。通过积极参与冲突解决，我们可以增强自身在非洲大陆的合法性，并扩大我们的外交影响力。"
 ALG_african_union_reforms: "推动非洲联盟改革"
 ALG_african_union_reforms_desc: "非洲联盟的效力仍然有限。通过推动改革 - 加强其机构建设、促进问责制和凝聚共识 - 我们可以确保阿尔及利亚成为非洲大陆框架内受人尊敬的领导者。"
 ALG_african_economic_integration: "非洲经济一体化"
 ALG_african_economic_integration_desc: "非洲大陆经济一体化是阿尔及利亚繁荣的关键。通过降低贸易壁垒，加强与非洲伙伴的联系，我们将减少对外国市场的依赖，促进非洲内部的可持续增长。"
 ALG_expand_african_investments: "扩大非洲投资"
 ALG_expand_african_investments_desc: "通过国家支持的投资项目以及与非洲伙伴的合作，阿尔及利亚可以扩大在基础设施、能源和贸易领域的投资。这些投资将促进我国经济发展，同时加强与整个非洲大陆的联系。"
 ALG_PT: "工党"
 ALG_PT_desc: "阿尔及利亚工党是阿尔及利亚的一个托洛茨基主义政党，与法国独立工党关系密切。该党由路易莎·哈努内领导。工党主张保护和促进阿尔及利亚的工会运动，其主张包括平等主义原则，旨在更好地向国民分配财富。该党成立于1990年，即阿尔及利亚宪法改革引入多党制一年后。其总书记是路易莎·哈努内，她于2004年成为阿拉伯世界首位竞选总统的女性。"
 ALG_communist_education: "共产主义教育"
 ALG_communist_education_desc: "年轻一代最易受影响。在向大学生传授平等光辉的同时，向年轻一代灌输共产主义的基本价值观，可以极大地推进我们的事业。"
 ALG_labour_focus_unions: "联系工会"
 ALG_labour_focus_unions_desc: "工会非常乐意看到一个不仅愿意合作，而且愿意满足他们要求的政府。我们将确保他们的影响力不会在我们执政之后继续扩大，以避免§R利益冲突。§!"
 ALG_failures_capitalism: "资本主义的失败"
 ALG_failures_capitalism_desc: "资本主义不再像它承诺的那样赐予我们无限的财富。现在是我们另辟蹊径，确保此类危机不再重演的时候了！§R该国策的成效取决于债务危机的严重程度。§!"
 ALG_working_class: "工人阶级"
 ALG_working_class_desc: "工人阶级 - 梦想诞生的地方，也是梦想破灭的地方。我们可以向他们承诺，他们将受到善待，并因其作为新共产主义国家基石而获得应有的荣誉。"
 ALG_communist_propaganda: "宣传机器"
 ALG_communist_propaganda_desc: "由于我们的影响力不断扩大，我们有能力在阿尔及利亚发动宣传攻势。虽然维持这项宣传需要大量的资金投入，但这绝非儿戏，它在转化阿尔及利亚民众方面将极为有效。"
 ALG_prepare_government: "筹建政府"
 ALG_prepare_government_desc: "通过在我们的政党内部建立一个政府，我们可以确保一个有效的过渡，使我们能够比我们的对手更快地实现我们的目标。这将是昂贵的，但考虑到我们获胜的几率，这是一个很好的赌注"
 ALG_damn_market: "谴责自由市场"
 ALG_damn_market_desc: "我们处于给资本家最后一击的地位。有了我们这一边的宣传力量，我们就可以对自由市场经济进行致命的打击，并在这个过程中，夺取资本家的奢侈宝座！"
 ALG_election_com: "要求立即选举"
 ALG_election_com_desc: "同志们，现在正是时候！我们为建立一个新的自由国家所做的一切努力都导致了这一刻！\n\n§R我们要确保人民政府再统治1000年！§!"
 PT_flag: "工党"
 ALG_failures_capitalism_TT: "§R此国策的影响效果取决于债务危机的严重程度§!"
 ALG_communist_takeover_TT: "§G阿尔及利亚人民要求选举！§!\n\n确保你有足够的政治点数来做这件事。如果你选举和组建政府§R失败§!，你将§R需要举行另一次特别选举§!，以授权§Y[Communist-State_L]§!"
 ALG_increase_drift_TT: "§G增加此政党的支持度§!"
 ALG_wild_unions: "不受管控的工会"
 ALG_wild_unions_desc: "我们赋予工会权力，他们也在使用，我们认为这没有问题。"
 ALG_wild_unions_2: "不受管控的工会"
 ALG_wild_unions_2_desc: "在我们掌权期间，工会获得了极大的自由。现在我们胜利了，我们向工会求助只是为了确保我们能得到民心，然后才能完全巩固我们的权力基础。"
 ALG_wild_unions_3: "不受管控的工会"
 ALG_wild_unions_3_desc: "工会简直令人无法忍受，我们再也无法忍受他们了！他们起初只是麻烦，但现在已成为国家意志的障碍，必须安抚或摧毁他们！"
 ALG_press_opposition: "反动的媒体"
 ALG_press_opposition_desc: "自从我们恢复政府秩序以来，媒体并没有用最好的方式来描绘我们的政治色彩与民主主张，但始终弱者惧怕强者是合乎逻辑的。"
 ALG_one_party: "一党专政国家"
 ALG_one_party_desc: "宣布工党为阿尔及利亚唯一合法政党后，我们有了做任何事的权力，但让人民顺从需要付出流血的代价。"
 ALG_reorganize_army_idea: "重组军队"
 ALG_reorganize_army_idea_desc: "我们不能简单地将军队的资金削减到功能紊乱的地步。我们需要强大的武装力量的时候可能会到来，为了这种可能性，我们将确保我们的军队是忠诚和准备好的。"
 ALG_new_army_idea: "新军队"
 ALG_new_army_idea_desc: "当我们看到警察在接管主要防卫部队的角色方面取得了巨大成功之时；我们必须知道，以他们的武装力量并不足以击退外国的入侵行动。为此，我们将建立一支保卫阿尔及利亚的新武装部队，以确保国家安全，人民安全。"
 ALG_red_army_idea: "红军"
 ALG_red_army_idea_desc: "我们不仅将意识形态上的狂热灌输给我们的军队，而且也灌输给平民，确保我们将拥有一支强大的军队所需的人力和忠诚度。"
 ALG_cracked_foundation: "根基动摇"
 ALG_cracked_foundation_desc: "目前国家的根基受到了多次动摇，如果我们要坚守目前的道路，就会面临革命的危险。\n\n§R如果我国稳定度低于30%，革命将会爆发！§!"
 ALG_militarist_education_idea: "军国主义教育"
 ALG_militarist_education_idea_desc: "教育系统将军事价值观灌输到课程中，使军队在遭到突袭时有更充分的准备。"
 ALG_elam: "复兴国家人民阵线"
 ALG_elam_desc: "国家人民阵线为了左右中间选民的态度，施加了各方面的影响力。我们怀疑阿尔及利亚是造成这种 “混乱”的原因。"
 algeria.5.t: "工党在阿尔及利亚呼吁重新组织选举"
 algeria.5.d: "在获得阿尔及利亚工人阶级和多位政治人物的广泛支持后，工党呼吁政府举行自由选举。工党已获得广泛支持，当局面临来自各方的压力，要求其让步。许多人预计工党将取得压倒性胜利，因为其在工人和工会中的支持基础日益稳固。一位发言人警告说，如果选举被剥夺，工人将发动起义推翻政府。"
 algeria.5.a: "阿尔及利亚工人，起来！"
 algeria.5.b: "有趣"
 algeria.7.t: "阿尔及利亚左转"
 algeria.7.d: "随着失业率上升和经济不平等加剧，阿尔及利亚工人阶级团结在极左翼政党工党周围。工党谴责新自由主义政策和侵犯工人权利的行为，同时支持反西方立场，并组织抗议活动向政府施压。他们的影响力迅速增长，标志着阿尔及利亚政治向左翼的决定性转变。"
 algeria.7.a: "阿尔及利亚工人，你们的解放即将到来"
 algeria.7.b: "有趣"
 ALG_family_centric: "以家庭为中心"
 ALG_family_centric_desc: "我们提倡将家庭作为阿尔及利亚社会的主要组成部分。"
 ALG_religion_in_schools: "宗教教育"
 ALG_religion_in_schools_desc: "我们的教育体系将宗教紧密融入课程，确保年轻一代在良好的伊斯兰价值观熏陶下成长。"
 ALG_grand_mufti_appointed: "阿尔及利亚大穆夫提"
 ALG_grand_mufti_appointed_desc: "阿尔及利亚已任命一位大穆夫提来解释伊斯兰教法。"
 ALG_islam_above_the_nation: "伊斯兰教高于国家"
 ALG_islam_above_the_nation_desc: "在阿尔及利亚动荡的过去，民族主义和伊斯兰教都曾争夺国家塑造的主导地位。展望未来，伊斯兰教应当成为我们治理国家的首要指导原则。"
 ALG_family_is_a_central_unit: "家庭高于一切"
 ALG_family_is_a_central_unit_desc: "家庭是社会的核心。男人、女人和他们的孩子构成了国家的基石。强大的家庭将确保阿尔及利亚在未来数年内的繁荣和成功。"
 ALG_follow_religious_law: "遵守宗教法条"
 ALG_follow_religious_law_desc: "伊斯兰教法是治理国家的最佳基础。以伊斯兰教法为基础，将确保所有阿尔及利亚人享有公正和公平。"
 ALG_traditional_role_for_women: "女性的传统角色"
 ALG_traditional_role_for_women_desc: "在养育子女和照顾家庭方面，女性肩负着至高无上的荣誉。当男性外出工作时，女性则必须在家中守护国家的传统。"
 ALG_religious_education: "宗教教育"
 ALG_religious_education_desc: "我们的学校必须将宗教研究紧密融入课程体系。阿尔及利亚人应该从小学习《古兰经》和伊斯兰教义。"
 ALG_appoint_grand_mufti: "任命大穆夫提"
 ALG_appoint_grand_mufti_desc: "阿尔及利亚需要一位大穆夫提来解释伊斯兰教法。我们应该提名一位德高望重的学者为国家提供宗教指导。"
 ALG_abrogate_secular_constitution: "废除世俗宪法"
 ALG_abrogate_secular_constitution_desc: "现行宪法维护了自独立以来继承的世俗框架。我们唯一应该遵循的法律是《古兰经》，而不是人为制定的文本。"
 ALG_enahda_media_network: "复兴运动媒体网络"
 ALG_enahda_media_network_desc: "我们应该建立一个国家电视网络，向阿尔及利亚全国播放大穆夫提的信息，并弘扬伊斯兰价值观。"
 ALG_supreme_islamic_council: "最高伊斯兰委员会"
 ALG_supreme_islamic_council_desc: "为了维护新国家的稳定，我们必须建立一个最高伊斯兰委员会 - 一个支持大穆夫提的咨询机构，以确保阿尔及利亚坚定地走在信仰的道路上。"
 ALG_edu_and_social_policy: "教育与社会政策"
 ALG_edu_and_social_policy_desc: "阿尔及利亚的长期繁荣不仅仅取决于自然资源，更依赖于教育、医疗和社会保障的基础。通过改革这些领域，我们可以为21世纪构建新的社会契约。"
 ALG_expand_primary_education: "扩大初等教育"
 ALG_expand_primary_education_desc: "扩大城乡地区小学入学机会，将减少文盲，为国家发展奠定基础。"
 ALG_reform_secondary_curriculum: "改革中学课程"
 ALG_reform_secondary_curriculum_desc: "我们的中学必须进行改革，以满足现代经济的需求，同时保留阿尔及利亚的特色。"
 ALG_western_curriculum: "采用西方课程"
 ALG_western_curriculum_desc: "通过引入西方课程，我们可以让我们的青年接触现代科学和全球标准，从而提高阿尔及利亚的竞争力。"
 ALG_national_curriculum: "加强国家课程"
 ALG_national_curriculum_desc: "我们不应照搬外国模式，而应注重学校的阿拉伯化和阿尔及利亚文化价值观，以维护教育主权。"
 ALG_university_reform: "重组大学"
 ALG_university_reform_desc: "我们必须扩建和现代化我们的大学，以培养能够引领阿尔及利亚未来的专业人才、研究人员和创新者。"
 ALG_basic_healthcare_access: "基础医疗保健"
 ALG_basic_healthcare_access_desc: "每个阿尔及利亚人都应该享有基本医疗保健服务。扩大医疗覆盖范围是迈向更健康国家的第一步。"
 ALG_state_hospitals: "扩建公立医院"
 ALG_state_hospitals_desc: "通过投资国家主导的医院体系，我们可以确保所有阿尔及利亚人都能享有免费且可及的医疗保健，尽管这对国库来说是一笔巨大的开销。"
 ALG_modernize_state_hospitals: "公立医院现代化"
 ALG_modernize_state_hospitals_desc: "升级设备、培训医生以及改善基础设施将强化国家的医疗保健网络。"
 ALG_universal_healthcare: "全民医保"
 ALG_universal_healthcare_desc: "医疗保健是一项权利，而非特权。阿尔及利亚将致力于建立一个全民普及的医疗保健体系。"
 ALG_private_healthcare: "鼓励私营医疗"
 ALG_private_healthcare_desc: "通过推广私立医院和诊所，我们可以减轻国家负担，并在医疗领域引入市场竞争。"
 ALG_expand_private_clinics: "扩大私人诊所"
 ALG_expand_private_clinics_desc: "私人诊所能够提供更专业的服务，特别是在城市地区，从而对公共医疗体系形成有益补充。"
 ALG_national_insurance: "国家医疗保险"
 ALG_national_insurance_desc: "一项国家医疗保险计划将为阿尔及利亚公民统一公共和私营医疗体系，构建单一安全网。"
 ALG_minimum_income_guarantee: "最低收入保障"
 ALG_minimum_income_guarantee_desc: "国家将保障最弱势群体的最低收入水平，保护阿尔及利亚人民免受绝对贫困之苦。"
 ALG_housing_support: "住房支持"
 ALG_housing_support_desc: "补贴住房计划将为工薪家庭提供可负担的住宅，并缓解城市过度拥挤问题。"
 ALG_childcare_support: "育儿支持"
 ALG_childcare_support_desc: "支持托儿中心和家庭津贴将帮助年轻家庭在没有经济困难的情况下抚养孩子。"
 ALG_fuel_subsidies: "燃料补贴"
 ALG_fuel_subsidies_desc: "通过补贴燃料价格，我们可以让普通阿尔及利亚人负担得起交通和取暖费用，即便这会令国库吃紧。"
 ALG_food_subsidies: "食品补贴"
 ALG_food_subsidies_desc: "保障面包和基本食品的价格，将确保阿尔及利亚家庭免受饥饿之苦。"
 ALG_welfare_consolidation: "巩固福利国家"
 ALG_welfare_consolidation_desc: "通过将我们的社会项目整合为一个全面的福利体系，阿尔及利亚将建立起一个现代化的社会安全网。"
 ALG_civil_rights_protections: "公民权利保护"
 ALG_civil_rights_protections_desc: "保障基本权利与自由将增强国家稳定，减少民怨。"
 ALG_gender_equality: "促进性别平等"
 ALG_gender_equality_desc: "赋予阿尔及利亚女性平等的权利和机遇，是构建公正繁荣社会的关键所在。"
 ALG_freedom_of_press: "保障新闻自由"
 ALG_freedom_of_press_desc: "新闻自由是民主与问责制的基石。支持独立媒体将让阿尔及利亚人民拥有更强大的发声渠道。"
 ALG_judicial_reform: "司法改革"
 ALG_judicial_reform_desc: "一个现代化且独立的司法体系将确保审判公正，减少腐败，并加强法治建设。"
 ALG_civil_society_empowerment: "赋权民间团体"
 ALG_civil_society_empowerment_desc: "支持非政府组织、工会和基层组织将创造一个更具参与性和韧性的社会。"
 ALG_digital_government: "数字政府"
 ALG_digital_government_desc: "数字化将减少官僚主义，提高透明度，并使政府服务更贴近民众。"
 ALG_public_service_efficiency: "高效公共服务"
 ALG_public_service_efficiency_desc: "通过公共部门的现代化，我们可以消除低效并提升服务质量。"
 ALG_anti_corruption_campaign: "反腐运动"
 ALG_anti_corruption_campaign_desc: "腐败侵蚀国家根基。一场全面的反腐运动将恢复阿尔及利亚各机构的公信力。"
 ALG_e_governance_portal: "电子政务门户"
 ALG_e_governance_portal_desc: "打造一体化电子政务平台将为公民提供透明、快捷、可及的公共服务。"
 ALG_streamlined_bureaucracy: "精简官僚机构"
 ALG_streamlined_bureaucracy_desc: "通过削减繁文缛节并实现行政结构现代化，阿尔及利亚将变得更高效、更具竞争力。"
 ALG_social_contract_21st_century: "21世纪的社会契约"
 ALG_social_contract_21st_century_desc: "通过教育、医疗、福利、民权及行政改革，阿尔及利亚将缔结一份新的社会契约，为子孙后代奠定稳定、公正与繁荣的基石。"
 ALG_corrupt_mil_idea: "腐败的军队"
 ALG_corrupt_mil_idea_desc: "阿尔及利亚军队虽实力雄厚且深度介入政治，却深受系统性腐败困扰。本应用于现代化建设和效率提升的资源，被将领们通过庇护网络层层截留。这不仅削弱了部队作战能力，侵蚀公众信任，使改革举步维艰，更固化了军队作为国家\"守护者\"与\"进步绊脚石\"的双重角色。"
 ALG_military_oversight: "军事监督"
 ALG_military_oversight_desc: "军队对政治和民间机构实行了严密监控。这虽然确保了稳定，防止了混乱，但也降低了透明度，限制了改革，并强化了军队在公共生活中的主导地位。"
 ALG_gas_pipeline_leverage: "油气影响力"
 ALG_gas_pipeline_leverage_desc: "阿尔及利亚通往欧洲的密集天然气管道网络，为其外交政策提供了强有力的谈判筹码。能源依赖使合作伙伴行事谨慎，但也导致该国过度依赖石化出口来维持政治影响力。"
 ALG_resource_curse: "资源诅咒"
 ALG_resource_curse_desc: "尽管拥有巨大的石油和天然气储量，阿尔及利亚仍深陷\"资源诅咒\"的困境。对油气的依赖助长了腐败，阻碍了经济多元化，并使该国经济暴露于全球能源市场的波动之中。"
 alg_appease_kabyles: "安抚卡比利亚人"
 alg_appease_kabyles_desc: "卡比利亚地区日益增长的动荡威胁着国家稳定。通过提供文化认同、经济投资或有限自治等让步措施，我们可以缓解紧张局势——尽管这可能助长其他地区提出类似要求的风险。"
 ALG_PM_Elections: "任命总理"
 ALG_PM_Elections_desc: "£MAIN_desctext_elections\n\n\n\n总统必须决定任命一位总理来领导政府。这一选择不仅是行政事务——不同的候选人代表着阿尔及利亚未来的竞争愿景，从忠诚的技术官僚到反对派改革者不一而足。"
 ALG_authority_more_70: "§Y改革派§!在[ROOT.GetFlag]阿尔及利亚政府中有至少§Y70%§!£generic_anarchist_communism 影响力"
 ALG_PNA_victory_tt: "§L权力集团§!在势力平衡中掌握超过§Y45%§!的影响力。"
 ALG_prime_minister_name_loc: "总理"
 ALG_minister_bio_loc: "总统之下的行政权力持有者。"
 alg_ethnic_policy: "民族政策"
 alg_ethnic_policy_desc: "\n£MAIN_arab_kabyle\n\n\n\n阿尔及利亚是一个多元国家，拥有多个重要的民族群体：阿拉伯人、卡比利亚人、图阿雷格人、莫扎比特人和沙维亚人。政府政策必须平衡他们的诉求 - 决策将带来益处，但若激怒任何群体，都可能引发动荡甚至分离主义风险。"
 algeria_morocco.1.t: "摩洛哥问题"
 algeria_morocco.1.d: "阿尔及利亚与摩洛哥的关系长期笼罩在沙地战争、西撒哈拉冲突以及数十年边境封锁的苦涩历史阴影之下。随着紧张局势持续发酵，如何应对摩洛哥成为亟待解决的重大议题。阿尔及利亚究竟该延续历史对抗态势，还是尝试开辟对话合作的新路径？"
 algeria_morocco.1.a: "马格里布的未来岌岌可危。"
 ALG_morocco_question: "摩洛哥问题"
 ALG_morocco_question_desc: "我们与摩洛哥在西撒哈拉问题上的对立、沙地战争以及长达数十年的边境封锁，已使阿尔及利亚元气大伤。我们必须做出抉择：是与摩洛哥对抗，还是寻求和解？\n\n§Y此国策将开启摩洛哥问题分支。§!"
 ALG_sand_war_legacy: "沙地战争的遗产"
 ALG_sand_war_legacy_desc: "1963年沙地战争的创伤至今未愈。阿尔及利亚人民仍记得摩洛哥对我国领土的野心，许多人呼吁要保持高度警惕。"
 ALG_close_the_border: "关闭边境"
 ALG_close_the_border_desc: "与摩洛哥接壤的边境仍是走私、动乱和间谍活动的温床。关闭边境将传递出强烈的反抗信号。"
 ALG_border_security_investments: "边境安全投资"
 ALG_border_security_investments_desc: "我们必须加强西部边境的永久性军事据点、现代化监控设施以及宪兵部队，以遏制摩洛哥的影响力。"
 ALG_counter_moroccan_influence: "遏制摩洛哥影响力"
 ALG_counter_moroccan_influence_desc: "摩洛哥正积极在海外寻求盟友。阿尔及利亚必须反击这一外交攻势，切断其在非洲乃至更广范围的影响力。"
 ALG_support_polisario_struggle: "支持波利萨里奥阵线斗争"
 ALG_support_polisario_struggle_desc: "撒哈拉人民理应获得独立。通过支持波利萨里奥阵线，阿尔及利亚巩固了其作为马格里布地区反殖民斗争捍卫者的角色。"
 ALG_internationalize_conflict: "国际化冲突"
 ALG_internationalize_conflict_desc: "必须将西撒哈拉问题提交至联合国、非盟以及一切可能的论坛，以在外交上对摩洛哥施压。"
 ALG_african_union_pressure: "动员非洲联盟"
 ALG_african_union_pressure_desc: "通过非洲联盟，阿尔及利亚将组建一个由多国组成的联盟，向摩洛哥施压，要求其接受撒哈拉人民的自决权。"
 ALG_seek_dialogue_morocco: "寻求对话"
 ALG_seek_dialogue_morocco_desc: "阿尔及利亚必须探索与摩洛哥的外交渠道。尽管过去的战争与竞争使我们分裂，但对话或许能带来地区的稳定。"
 ALG_confidence_building: "建立信任"
 ALG_confidence_building_desc: "诸如联合委员会和放宽签证限制等小步骤，可能为与摩洛哥建立持久信任奠定基础。"
 ALG_reopen_borders: "重新开放边境"
 ALG_reopen_borders_desc: "经过多年的封闭，重新开放边境，实现人员与货物的自由流动，将是我们关系史上的一个历史性转折点。"
 ALG_economic_cooperation: "经济合作"
 ALG_economic_cooperation_desc: "与摩洛哥的经济相互依存将带来繁荣，减少紧张局势，并增强阿尔及利亚在地区中的角色。"
 ALG_security_cooperation: "安全合作"
 ALG_security_cooperation_desc: "面对恐怖主义和走私等共同威胁，联合巡逻与情报共享至关重要。合作远比对抗更为高效。"
 ALG_towards_maghreb_union: "马格里布联盟"
 ALG_towards_maghreb_union_desc: "有了摩洛哥，阿尔及利亚就能为强大的马格里布联盟奠定基础，这呼应了我们祖先对北非统一的梦想。"
 ALG_morocco.1.t: "联合国西撒哈拉辩论"
 ALG_morocco.1.d: "阿尔及利亚将西撒哈拉问题提交至联合国，谴责摩洛哥对该地区的控制。与会代表就摩洛哥是否应撤军，以及阿尔及利亚是否越权干涉展开辩论。"
 ALG_morocco.1.a: "严厉谴责摩洛哥"
 ALG_morocco.1.b: "推动温和的制裁与决议"
 ALG_moroccan_rivalry_start: "与摩洛哥的边境紧张局势"
 ALG_moroccan_rivalry_start_desc: "与摩洛哥长达数十年的敌对，由沙地战争、西撒哈拉问题以及1994年边境关闭所引发，给阿尔及利亚带来了沉重负担。这种紧张局势损害了我们的经济、稳定性和军事战备状态。\n§R此国家精神无法正常移除。§!\n只有通过推进§Y摩洛哥问题§!国策树才能逐步削弱、替换或移除它。"
 ALG_moroccan_rivalry_A1: "遏制摩洛哥影响力"
 ALG_moroccan_rivalry_A1_desc: "阿尔及利亚已采取措施削弱摩洛哥在该地区的影响力。两国间的竞争仍在持续，但影响正得到更有效的管控。"
 ALG_moroccan_rivalry_A2: "升级对抗"
 ALG_moroccan_rivalry_A2_desc: "与摩洛哥的紧张局势仍是国家的一大负担，但我们的决心和改革措施已将其影响降至最低。"
 ALG_moroccan_rivalry_A_final: "对摩洛哥军事准备"
 ALG_moroccan_rivalry_A_final_desc: "历经多年对抗，阿尔及利亚已锻造出一支坚韧善战的军队，随时准备迎接冲突。逆境中的较量铸就了钢铁般的力量。"
 ALG_moroccan_reconciliation_B1: "外交提议"
 ALG_moroccan_reconciliation_B1_desc: "阿尔及利亚已采取初步措施与摩洛哥展开对话，为有限的合作与信任建立创造了机会。"
 ALG_moroccan_reconciliation_B2: "开放边境"
 ALG_moroccan_reconciliation_B2_desc: "随着外交关系的深化，阿尔及利亚重新开放了与摩洛哥的边境，这既缓解了经济压力，也促进了区域贸易。"
 ALG_moroccan_reconciliation_B_final: "马格里布合作"
 ALG_moroccan_reconciliation_B_final_desc: "阿尔及利亚与摩洛哥已拥抱合作，开启了贸易往来、共同发展及区域领导的新篇章。我们终于将竞争抛在了身后。"
 ALG_morocco_question_tt: "§Y此国策将开启摩洛哥问题路线。§!\n\n- §R路线A：§!与摩洛哥对抗——逐步削弱减益，最终获得§G更强大的军队§!。\n- §G路线B：§!寻求与摩洛哥和解——将减益替换为提升§G增益效果§!，最终获得更强的§Y经济与外交能力§!。"
 alg_general.1.t: "哈立德·内扎尔的回归"
 alg_general.1.d: "随着重启\"黑暗十年\"手段的决定，备受争议的前国防部长哈立德·内扎尔再次被起用。他的铁腕手段或许能稳定军队，但可能疏远民众并招致国际批评。"
 alg_general.1.a: "往昔重现，指引今朝。"
