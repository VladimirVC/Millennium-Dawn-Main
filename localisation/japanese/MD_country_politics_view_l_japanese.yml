 BAN_ALL_PARTIES_TT_DELAYED: "As the sole ruling party running the government, we can make it into law to declare all other political parties illegal.\n\nLong live the party!\n\n§YPrerequisite:§!\n[!ban_all_parties_button_click_enabled]\n§YEffects:§!\n[!ban_all_parties_button_click]"
