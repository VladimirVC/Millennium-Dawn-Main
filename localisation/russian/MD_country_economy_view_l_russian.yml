 print_money_button_tooltip: "§YПечать денег§!\n§gПравительство столкнулось с финансовыми трудностями и нуждается в быстром пополнении бюджета. Вместо повышения налогов или выпуска облигаций мы можем прибегнуть к эмиссии денег.§!\n\nВыпуск новых денег принесёт сумму, равную двум неделям государственных доходов, которая будет добавлена в казну. Однако это снизит производительность населения из-за обесценивания его труда вследствие инфляционных мер. Снижение производительности будет усиливаться с каждым новым выпуском денег, но постепенно будет сокращаться каждый год.\n\n§YКоличество печатаний денег:§! [?printing_money_var|0Y]\n\n§YТребования:§!\n[!print_money_button_click_enabled]\n§YЭффекты:§!\n[!print_money_button_click]"
