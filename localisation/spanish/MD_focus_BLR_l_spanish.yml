 SOV_mzkt_tt: "Pagamos según el contrato con Minotor por la reparación de vehículos de ruedas: $$§R-0,100§!\n"
 BLR_south_river_TT: "§YEl batallón de voluntarios bielorrusos que llegó desde los Estados Unidos queda bajo tu control§!"
 BLR_white_legion_TT: "§YSe formará el Batallón de la Legión Blanca§!"
 BLR_foreign_legion_TT: "¡Se formará Batallón de la §YLegión Extranjera§! "
 BLR_territorial_defence_TT: "§YSe creará la Brigada de Defensa Territorial§!"
 BLR_people_militia_TT: "§YSe crearán brigadas de la Milicia Popular§!"
 BLR_kgb_west_TT: "§YNo vamos a disolver el KGB. El KGB es nuestro principal apoyo§!"
