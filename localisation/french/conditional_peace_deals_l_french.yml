 CPD_puppeting_in_state: "Gouvernement fantoche dans"
 CPD_demilitarisation_of_state: "Démilitarisation de"
 CPD_liberation_of_state: "Libération de"
 CPD_demanding_annexation_of_state_TT: "L'annexation de cet état est une §Gdemande§! de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet état sera annexé par notre nation et nous en deviendrons le nouveau propriétaire."
 CPD_demanding_puppeting_in_state_TT: "La création d'un fantoche avec cet état est une §Gdemande§! de [ROOT.GetNameWithFlag]. Si la paix est accepté, cet état sera placé sous le contrôle d'un nouveau gouvernement fantoche."
 CPD_demanding_demilitarisation_of_state_TT: "La démilitarisation de cet État est une §Gdemande§! de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet État ne pourra plus déployer de forces militaires."
 CPD_demanding_liberation_of_state_TT: "La libération de cet État est une §Gdemande§! de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet État sera restitué au pays qui en a la pleine propriété en tant que nation indépendante."
 CPD_conceding_annexation_of_state_TT: "L'annexion de cet État est une §Rconcession§! de la part de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet État sera annexé à la nation ennemie."
 CPD_conceding_puppeting_in_state_TT: "La création d'un État fantoche au sein de cet État constitue une §Rconcession§! de la part de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet État sera placé sous un gouvernement fantoche qui répondra à l'ennemi."
 CPD_conceding_demilitarisation_of_state_TT: "La démilitarisation de cet État est une §Rconcession§! de la part de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet État ne pourra plus déployer de forces militaires."
 CPD_conceding_liberation_of_state_TT: "La libération de cet État est une §Rconcession§! de la part de [ROOT.GetNameWithFlag]. Si la paix est acceptée, cet État sera restitué au pays qui en aura la pleine propriété en tant que nation indépendante."
