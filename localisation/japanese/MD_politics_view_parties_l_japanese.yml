 ZAM.conservatism: "£generic_conservatism_small (ZAP) ザンビア進歩同盟"
 ZAM.conservatism_desc: "保守主義 - ザンビア進歩同盟は、ザンビアの政党であった。1999年、主に「アジェンダ・フォー・ザンビア」を中心とする6つの小政党が合併して結成された。2001年の議会選挙にのみ立候補したが、議席を獲得できず、得票率もわずか0.23%にとどまったため、解散した。"
 ZAM.liberalism: "£generic_liberalism_small (UPND) 国家開発統一党"
 ZAM.liberalism_desc: "自由主義 - 国家開発統一党は、自由主義的な政党である。1998年に、元複数政党制民主主義運動（MMD）の政治家アンダーソン・マゾカによって結成された。2001年の選挙ではMMDに次ぐ第2の政党となり、2011年と2016年の選挙でも好成績を収め、大統領選挙で47.63％、議会選挙で41.66％の得票率を獲得し、再び第2の政党となった。主に同国西部で支持を集めている。"
 ZAM.socialism: "£generic_socialism_small (MMD) 複数政党制民主主義運動"
 ZAM.socialism_desc: "社会民主主義 - 複数政党制民主主義運動は、ザンビアの「第三の道」を掲げる社会民主主義政党である。1990年に、当時の社会主義独裁政権を打倒するために結成された。1991年から2008年にかけて、同国で最も支持率の高い政党としての地位を維持していた。2015年の大統領選挙（臨時選挙）では、得票率が1％未満にとどまり、大敗を喫した。"
 ZAM.Western_Autocracy: "£generic_Western_Autocracy_small 貧しい人々のための党"
 ZAM.Western_Autocracy_desc: ""
 ZAM.anarchist_communism: "£generic_anarchist_communism_small (UNIP) 統一民族独立党"
 ZAM.anarchist_communism_desc: "急進左派 - 統一民族独立党は、ザンビアの社会主義・民族主義政党である。1964年から1991年までケネス・カウンダ大統領の下で政権を握り、1973年から1990年までは唯一の合法政党であった。1991年の選挙後に勢力を大幅に失い、1996年には議席を一つも獲得できなかった。2001年には159議席中13議席を獲得して小幅な復活を見せたが、それ以来政権入りは果たしていない。"
 ZAM.Conservative: "£generic_Conservative_small 遺産党"
 ZAM.Conservative_desc: "反動主義 - 遺産党は、民族主義的な保守政党である。2001年に複数政党制民主主義運動からの分裂・対立勢力として結成され、同年の選挙で4議席を獲得した。しかし、次の選挙ですべての議席を失い、それ以降議席を回復することはなかった。2015年、同党は最後の大統領選に立候補した。"
 ZAM.Neutral_conservatism: "£generic_Neutral_conservatism_small (NAREP) 国家復興党"
 ZAM.Neutral_conservatism_desc: "中道右派 - 国家復興党は反共産主義の保守政党である。2010年に結成され、2011年に初めて総選挙に臨んだ。これまで議席を獲得したことはなく、得票率も0.4%を超えたことはない。"
 ZAM.Neutral_green: "£generic_Neutral_green_small (FDD) 民主開発フォーラム"
 ZAM.Neutral_green_desc: "社会民主主義 - 民主開発フォーラムは、ザンビアの社会民主主義政党である。2001年に複数政党制民主主義運動の元党員らによって結成された。同年に行われた選挙で大きな成功を収め、国民議会で12議席を獲得し、統一民族独立党を上回る得票数を記録した。2006年には統一民族独立党および国家開発統一党と連立して選挙に臨んだ。その後、2011年の国民議会選挙では1議席しか獲得できなかったが、2016年にもその議席を維持した。"
 ZAM.neutral_Social: "£generic_neutral_Social_small 愛国戦線"
 ZAM.neutral_Social_desc: "民主社会主義 - 愛国戦線は、ザンビアの民主社会主義政党である。2001年に複数政党制民主主義運動（MMD）から分裂して結成された。2006年の総選挙で初の大きな成功を収め、議会で第2位の勢力となった。その5年後の2011年、同党は得票数および議席数でMMDを抜き、同党の候補者マイケル・サタが大統領選挙で勝利した。現在も同党は最大勢力であり、国民議会で絶対多数を占めている。また、ザンビア西部における小選挙区の議席の大部分を掌握している。"
 ZAM.Neutral_Communism: "£generic_Neutral_Communism_small レインボー党"
 ZAM.Neutral_Communism_desc: "共産主義 - レインボー党は、ザンビアの民主社会主義政党である。2014年に愛国戦線の元党員らによって結成され、2016年の総選挙に初めて参加した。同党は2016年の選挙で第5位の得票数を記録したが、議席を獲得することはできず、議席を獲得できなかった政党の中では最も支持を集めた政党となった。"
 ZAM.Nat_Populism: "£generic_Nat_Populism_small 国民党"
 ZAM.Nat_Populism_desc: "右派ポピュリスト政党 - 国民党はザンビアの政党で、1993年に複数政党制民主主義運動の元党員らによって結成された。1996年に最大の成功を収め、州議会で5議席を獲得したが、その後の2001年の総選挙でこれらをすべて失った。それ以来、かつての人気を取り戻すことはなかった。"
