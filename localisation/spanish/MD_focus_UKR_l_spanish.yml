 did_not_support_the_baltic_black_sea_union: "§YNo apoyó la iniciativa de la Unión del Mar Negro-Báltico§!"
 ukraine_congress.2.t: "Ucrania toma Sebastopol"
 ukraine_congress.2.d: "The Ukrainian government cancels the lease agreement with us and begins the expulsion of our fleet from Sevastopol."
 ukraine_congress.2.a: "Esta es nuestra derrota"
 ukraine_congress.10.t: "Ucrania Propone Ideas del Mar Negro-Báltico"
 ukraine_congress.10.d: "La Unión del Mar Negro-Báltico es un concepto similar al concepto del Intermarium encabezado desde Polonia hace mucho tiempo. Habla de una alianza defensiva de países que están entre los mares Báltico y Negro. Los países cooperarían y se consolidarían en un bloque de poder que se apoyaría mutuamente. El dicho dice que la unión hace la fuerza.\n\n§YEsto permite garantías mutuas a través del árbol ucraniano§!"
 ukraine_congress.10.a: "Deberíamos seguir explorando esto."
 ukraine_congress.10.b: "Idea tonta"
 ukraine_congress.11.t: "La Unión del Báltico al Mar Negro"
 ukraine_congress.11.d: "Se han redactado leyes y tratados. La gente de los países que apoyan la idea finalmente se ha unido. Es hora de que la ambición se realice. Es hora de aliarse con los que nos han apoyado. Ucrania nos ha enviado nuestro tratado final que debemos firmar para oficializar la alianza. ¿Nos echamos atrás ahora o seguimos el curso y apoyamos a nuestros nuevos aliados?"
 ukraine_congress.11.a: "Firmar el Tratado"
 ukraine_congress.11.b: "Retirarse. Triturar el Tratado"
 UKR_poroshenko_start: "Presidencia de Poroshenko"
 UKR_poroshenko_start_desc: "The Ukrainian state was headed by an oligarch. The history of Ukraine clearly did not expect such a turn, perhaps it will lead Ukraine to success."
 UKR_poroshenko_decentr: "Descentralización"
 UKR_poroshenko_decentr_desc: "One of the main political points of Poroshenko's program has been and will be - decentralization. We must reform the Ukrainian state."
 UKR_poroshenko_deccomunism: "Descomunización"
 UKR_poroshenko_deccomunism_desc: "The communist past has been hard and scary for our country. Our nation was almost destroyed by the Famine, and we will not allow monuments to our murderers to be all over the country."
 UKR_poroshenko_anti_corruption: "Reformas anticorrupción"
 UKR_poroshenko_anti_corruption_desc: "Corruption has been and will continue to be a sore topic in our country, and we will carry out a series of anti-corruption reforms."
 UKR_poroshenko_nabu: "Crear NABU"
 UKR_poroshenko_nabu_desc: "NABU: autoridad ejecutiva central con un estatus especial encargada de la prevención, detección, supresión, investigación y descubrimiento de la corrupción y otros delitos penales atribuidos a su jurisdicción, así como la prevención de nuevos."
 UKR_poroshenko_no_russian_military: "Deshacerse de la influencia de las Fuerzas Armadas rusas"
 UKR_poroshenko_no_russian_military_desc: "Debemos dejar de depender del Ejército ruso, solo un ejército ucraniano independiente protegerá el país."
 UKR_poroshenko_anti_rus_doctrine: "La Doctrina Anti-Rusa"
 UKR_poroshenko_anti_rus_doctrine_desc: "Russia has been and will be an aggressor towards us, we must clearly reflect this in our military doctrine."
 UKR_poroshenko_smi_free: "Libertad de los Medios"
 UKR_poroshenko_smi_free_desc: "The media should be free and not limited by the dictatorial habits of a few people."
 UKR_poroshenko_kefalia: "Autocefalia de la Iglesia Ucraniana"
 UKR_poroshenko_kefalia_desc: "It's time to get rid of the influence of the Moscow Orthodox Church."
 UKR_poroshenko_ukrainisation: "Ucranización"
 UKR_poroshenko_ukrainisation_desc: "We will begin a policy of Ukrainization, and gradually eradicate the Russian language from various social environments."
 UKR_poroshenko_upa: "Honrar a los héroes de la UPA"
 UKR_poroshenko_upa_desc: "UPA - they were defenders of Ukraine and we will honor them."
 UKR_poroshenko_es: "Cooperación con la UE"
 UKR_poroshenko_es_desc: "The European Union will be our main economic partner and we will strive to maintain trade relations with them further."
 UKR_poroshenko_canada: "Asociación con Canadá"
 UKR_poroshenko_canada_desc: "We are ready to conclude several agreements with Canada to improve trade relations."
 UKR_us_friendship: "Asociación con EE. UU."
 UKR_us_friendship_desc: "We are ready to conclude several agreements with USA to improve trade relations."
 UKR_visegrad_coop: "Asociación con el Grupo de Visegrado"
 UKR_visegrad_coop_desc: "We are ready to conclude several agreements with Visegrád Group to improve trade relations."
 UKR_turkey_invest_req: "Inversiones de Turquía"
 UKR_turkey_invest_req_desc: "We will attract Turkish investors to our territory, their investments will help our economy."
 UKR_kazakh_improve_rel: "Mejorar las relaciones con Kazajstán"
 UKR_kazakh_improve_rel_desc: "Kazakhstani partners will be an excellent addition to our foreign trade activities."
 UKR_reorient_market: "Reorientación hacia el mercado occidental"
 UKR_reorient_market_desc: "The East is closed to us, we will reorient our markets to the west."
 UKR_ukroboronprom_revival: "Inversiones en la industria de defensa"
 UKR_ukroboronprom_revival_desc: "Our defense industry needs investments, we will give them."
 UKR_smuggle_parts_through_russia: "Comprar piezas en Rusia de manera indirecta"
 UKR_smuggle_parts_through_russia_desc: "Despite our anti-Russian doctrine, we are forced to purchase spare parts from Russian factories, albeit in a roundabout way."
 UKR_reverse_engineering: "Ingeniería inversa"
 UKR_reverse_engineering_desc: "We will strive to create our own engineering in the field of armored vehicles."
 UKR_western_assistance: "Apoyo occidental"
 UKR_western_assistance_desc: "Western investors are also actively investing in our defense industry."
 UKR_poroshenko_nato: "Cooperación con la OTAN"
 UKR_poroshenko_nato_desc: "NATO is our main military partner, and with their help we are reforming our armed forces."
 UKR_belarus_proposal_non_attack: "Pacto de No Agresión con Bielorrusia"
 UKR_belarus_proposal_non_attack_desc: "Belarus, our northern neighbor, can be used by enemies to attack us from two sides, we must prevent this."
 UKR_language_policies: "Política lingüística"
 UKR_language_policies_desc: "We will continue to expand the percentage of the Ukrainian language in communication and in other areas of citizens' lives."
 UKR_support_patriotism: "Apoyo al patriotismo"
 UKR_support_patriotism_desc: "Patriotism will be encouraged by the state as never before."
 UKR_donbass_okopi: "Operación Muro"
 UKR_donbass_okopi_desc: "We urgently need to build a defensive line along the border of our enemy."
 UKR_transnistria_defences: "Fortalecer la frontera con Transnistria"
 UKR_transnistria_defences_desc: "Transnistria may become a springboard for an attack on us in the future, we will strengthen the border with them."
 UKR_deoligarchisation: "Desoligarquización"
 UKR_deoligarchisation_desc: "The oligarchs have too much power in our country - we will fix it."
 UKR_rochen_expansion: "Ampliar la producción de Roshen"
 UKR_rochen_expansion_desc: "Roshen factory will now be able to expand its production capabilities with the help of public investments."
 UKR_support_medium_businesses: "Apoyar a las pequeñas empresas"
 UKR_support_medium_businesses_desc: "Small businesses will receive the necessary support."
 UKR_kolomoyski_deal: "Lidiar con Kolomoisky"
 UKR_kolomoyski_deal_desc: "Kolomoisky has long been one of the main problems in our country, his influence was too great and it's time to deal with him."
 UKR_purge_church_from_rus: "Eliminar la influencia de la Iglesia Ortodoxa Rusa"
 UKR_purge_church_from_rus_desc: "The Russian Orthodox Church will no longer influence us."
 UKR_greece_letter: "Dirigirse al Patriarca Ecuménico"
 UKR_greece_letter_desc: "We will appeal to the Ecumenical Patriarch to recognize our church as independent."
 UKR_upc_create: "Crear una Iglesia Ortodoxa Ucraniana"
 UKR_upc_create_desc: "The Ukrainian Orthodox Church will be created! Now we are a spiritually free country as well."
 UKR_poroshenko_army_reform: "Reforma del Ejército"
 UKR_poroshenko_army_reform_desc: "Our army needs major reforms - we will start implementing them now."
 UKR_pmc_instructors: "Instructores de PMC occidentales"
 UKR_pmc_instructors_desc: "Western PMCs instructors are ready to support our army."
 UKR_rally_nationalist_support: "Apoyar a los veteranos"
 UKR_rally_nationalist_support_desc: "Combat veterans will be the mainstay of our future election campaign."
 UKR_welfare_conseccions: "Aumentar el apoyo social"
 UKR_welfare_conseccions_desc: "Nos centraremos en nuestra futura campaña electoral en aumentar las garantías sociales."
 UKR_anti_russia_propaganda: "Propaganda anti-rusa"
 UKR_anti_russia_propaganda_desc: "Our citizen must understand who his true enemy is, who seeks to absorb our country - Russia."
 UKR_saakashvili_odessa: "Invitar a Saakashvili como gobernador de Odesa"
 UKR_saakashvili_odessa_desc: "We will invite Saakashvili to be the governor of the Odessa region, perhaps he will show himself well."
 UKR_support_minsk_agreements: "Apoyar los Acuerdos de Minsk"
 UKR_support_minsk_agreements_desc: "We will support the Minsk agreements and try to resolve everything peacefully."
 UKR_continue_shelling: "Poner fin a los separatistas"
 UKR_continue_shelling_desc: "No separatists! We will liberate our lands."
 UKR_business_with_rf: "Negocios con Rusia"
 UKR_business_with_rf_desc: "We will continue to do business with Russia."
 UKR_full_rus_embargo_por: "Imponer un embargo contra Rusia"
 UKR_full_rus_embargo_por_desc: "We will impose an embargo on economic cooperation with Russia."
 UKR_osce_watchers: "Observadores de la OSCE"
 UKR_osce_watchers_desc: "OSCE observers will be invited to Donbass."
 UKR_suppress_easterner: "Reprimir a los orientales"
 UKR_suppress_easterner_desc: "Supporters of integration with Russia should be suppressed, including through the media."
 UKR_anti_emerg_1plus1: "Fortalecer la propaganda anti-oriental"
 UKR_anti_emerg_1plus1_desc: "We will strengthen the propaganda directed against those who support Russia."
 UKR_eu_compliant_reforms: "Reformas de conformidad con la UE"
 UKR_eu_compliant_reforms_desc: "We will continue compliance reforms for integration with the European Union."
 UKR_european_education_connections: "Cooperación con instituciones educativas europeas"
 UKR_european_education_connections_desc: "European education will give us much more than the old, Soviet and totalitarian one."
 UKR_european_defence_program: "El Programa de Protección Europeo"
 UKR_european_defence_program_desc: "We will join the European Defense Program to strengthen our armed forces."
 UKR_nato_application_por: "El Programa de Cooperación con la OTAN"
 UKR_nato_application_por_desc: "NATO's partnership in the field of armed forces will also allow us to carry out reforms of our army."
 UKR_ukraine_anew: "Nueva Ucrania"
 UKR_ukraine_anew_desc: "Our country has gone through a long way, many reforms, but now it has been reborn and looks positively to the future."
 UKR_separatist_menace: "La amenaza separatista"
 UKR_separatist_menace_desc: "La amenaza de las repúblicas separatistas no se puede hacer en ninguna parte, debemos resolverla."
 UKR_apply_to_eu_por: "El Programa de Cooperación con la UE"
 UKR_apply_to_eu_por_desc: "Cooperation with the European Union will continue to be our priority."
 UKR_anti_rus_doctrine: "La Doctrina Anti-Rusa"
 UKR_anti_rus_doctrine_desc: "Nuestro enemigo político e ideológico fue y sigue siendo Rusia. Debemos aceptar esto y estar preparados para la guerra."
 UKR_foreign_advisors: "Asesores Extranjeros"
 UKR_foreign_advisors_desc: "Foreign instructors from various PMCs are ready to train our soldiers."
 UKR_west_investors: "Inversores occidentales"
 UKR_operation_wall: "Operación Muro"
 UKR_smuggle_parts_from_rus: "Compra de repuestos de Rusia"
 UKR_smuggle_parts_from_rus_desc: "We continue to buy spare parts from Russia, albeit secretly."
 UKR_reverse_engineering_start: "Ingeniería inversa"
 UKR_reverse_engineering_start_desc: "We aim to create our own production."
 UKR_ato_supports: "Apoyo a los veteranos"
 UKR_health_supports: "Apoyo de atención médica"
 UKR_poroh_prepare_donbass: "Prepararse para una revancha en Donbass"
 UKR_poroh_prepare_donbass_desc: "We are ready to take revenge from the separatists and solve the problem with the People's republics forever."
 UKR_poroh_osce_ukr: "Observadores de la OSCE"
 UKR_poroh_osce_ukr_desc: "OSCE observers have been sent to the conflict zone to stabilize the situation on the front line with the unrecognized republics."
 UKR_idea_eu_member_associate: "Miembro asociado de la UE"
 UKR_idea_eu_member_associate_desc: "Ucrania ha comenzado su asociación con la UE. Profundizará los lazos con Europa y el bloque occidental. Sin embargo, proporciona problemas con las regiones de mayoría de habla rusa."
 ukraine_poroh.1.t: "Ucrania propone un pacto de no agresión"
 ukraine_poroh.1.d: "The Ukrainian government suggests that we conclude a non-aggression pact with them, apparently they see us as potential aggressors against themselves."
 ukraine_poroh.1.a: "Firmaremos un pacto"
 ukraine_poroh.1.b: "No hay necesidad de eso"
 ukraine_poroh.2.t: "Pacto de No Agresión con Bielorrusia"
 ukraine_poroh.2.d: "The Belarusian government has agreed to sign a non-aggression pact with us, we are glad that they are on our side."
 ukraine_poroh.2.a: "Bueno"
 ukraine_poroh.3.t: "Pacto de No Agresión con Bielorrusia"
 ukraine_poroh.3.d: "The Belarusian government has refused to sign a non-aggression pact with us, which worries us."
 ukraine_poroh.3.a: "Triste"
 ukraine_poroh.4.t: "Autocefalia de la Iglesia Ucraniana"
 ukraine_poroh.4.d: "La Iglesia Ucraniana ha apelado a nuestro Patriarca Ecuménico para obtener el permiso de autocefalia de su iglesia, ¿permitirá nuestro patriarca esto?"
 ukraine_poroh.4.a: "Sí"
 ukraine_poroh.4.b: "No"
 ukraine_poroh.5.t: "Autocefalia de la Iglesia Ucraniana"
 ukraine_poroh.5.d: "The Ecumenical Patriarch approved the Autocephaly of our Church."
 ukraine_poroh.5.a: "Bueno"
 ukraine_poroh.6.t: "Autocefalia de la Iglesia Ucraniana"
 ukraine_poroh.6.d: "The Ecumenical Patriarch did not approve the Autocephaly of our Church."
 ukraine_poroh.6.a: "Triste"
 ukraine_poroh.7.t: "Ucrania quiere cooperación con el Visegrado Cuatro"
 ukraine_poroh.7.d: "El gobierno ucraniano ha delineado claramente sus planes de cooperación con los países del Grupo de Visegrado. Como representante de los cuatro, decidimos si estamos de acuerdo con esta cooperación"
 ukraine_poroh.7.a: "Sí"
 ukraine_poroh.7.b: "No"
 ukraine_poroh.8.t: "Cooperación con países de Visegrado"
 ukraine_poroh.8.d: "They agreed to cooperate."
 ukraine_poroh.8.a: "Bueno"
 ukraine_poroh.9.t: "Cooperación con países de Visegrado"
 ukraine_poroh.9.d: "They refused to cooperate with us."
 ukraine_poroh.9.a: "Triste"
 UKR_kefalia_agree: "Permiso del Patriarca Ecuménico"
 UKR_odessa_ssaka: "Consecuencias de la gobernación de Saakashvili"
 UKR_odessa_ssak: "Consecuencias de la gobernación de Saakashvili"
 ukr_industry_points_cost_35: "35 puntos de industria"
 ukr_industry_points_cost_50: "50 puntos de industria"
 ukr_industry_points_cost_75: "75 puntos de industria"
 UKR_opfl_political_reforms: "Reformas políticas"
 UKR_opfl_political_reforms_desc: "Tras los recientes acontecimientos, nuestro país necesita reformas políticas. Sin ellas, Ucrania no podrá seguir desarrollándose."
 UKR_opfl_lustration_fight: "Lucha contra la lustración"
 UKR_opfl_lustration_fight_desc: "La lustración es la restricción del acceso al servicio público para aquellos que ocuparon altos cargos bajo regímenes políticos anteriores. Después de eventos recientes, esta política también está teniendo lugar en Ucrania. Este ultraje debe detenerse!"
 UKR_opfl_radicalism: "Lucha contra el radicalismo"
 UKR_opfl_radicalism_desc: "En unos pocos años de caos político, el radicalismo se ha extendido por toda Ucrania. Para la existencia pacífica de nuestro país, es necesario combatir cualquier manifestación de radicalismo en nuestro país."
 UKR_opfl_ukrainisation_policy: "Condena de la ucranización"
 UKR_opfl_ukrainisation_policy_desc: "The policy of Ukrainianisation directly interferes with the development of good relations with our big neighbour - Russia. It is necessary to condemn and stop the propaganda of Ukrainianisation, otherwise no good will come of it."
 UKR_opfl_national_ref: "Realización de un referéndum nacional"
 UKR_opfl_national_ref_desc: "Un referéndum nacional ayudará a la gente de nuestro país a determinar su propio futuro. Debemos hacerlo lo antes posible!"
 UKR_opfl_independence_rep: "Reconocer la independencia de las repúblicas"
 UKR_opfl_independence_rep_desc: "Bueno, la gente de las repúblicas ha tomado su decisión y debemos respetarla. Es hora de invertir y construir lazos con nuevos estados!"
 UKR_opfl_take_republic: "Traer de vuelta por la fuerza"
 UKR_opfl_take_republic_desc: "El referéndum fue solo una cortina de humo. Nuestro verdadero objetivo es identificar a los separatistas en nuestro territorio y es hora de traer nuestros territorios a casa! Los separatistas no caminarán sobre el suelo ucraniano!"
 UKR_opfl_federalisation_project: "Proyecto de Federación"
 UKR_opfl_federalisation_project_desc: "Ahora que se han resuelto todas las disputas territoriales, podemos mirar hacia un futuro brillante. Es hora de la Federación Ucraniana!"
 UKR_opfl_economic_policy: "Nuevas políticas económicas"
 UKR_opfl_economic_policy_desc: "New economic policies will help revitalise our economy and subsequently rebuild it."
 UKR_opfl_rural_land: "Conservación de tierras rurales"
 UKR_opfl_rural_land_desc: "Rural activities are a big part of our economy. Therefore, it is necessary to secure their legally acquired land. This way we will give them confidence that their land will not be taken away the next day."
 UKR_opfl_small_med_business: "Beneficios para pequeñas y medianas empresas"
 UKR_opfl_small_med_business_desc: "Las pequeñas y medianas empresas son una parte importante de nuestra economía. Para un mayor crecimiento, necesitamos dar bonificaciones para que la gente se incentive a hacer negocios."
 UKR_opfl_tarif_genocide: "No! Genocidio tarifario"
 UKR_opfl_tarif_genocide_desc: "El genocidio tarifario es una pesadilla para nuestros ciudadanos. La mayor parte de su dinero se destina a pagar numerosos e innecesarios impuestos. Debemos decir 'NO' a esta sinvergüenzura!"
 UKR_opfl_deindustry: "Detener la desindustrialización de Ucrania"
 UKR_opfl_deindustry_desc: "Después de que Ucrania obtuvo la independencia, el antiguo gobierno regaló toda la riqueza industrial de nuestro país a cualquiera por nada. Como resultado, terminamos en un pozo industrial. Debemos reanudar la construcción de fábricas, plantas y otras empresas!"
 UKR_federaliz_tt: "§YFederalizaremos§! Ucrania!"
 UKR_legacy_of_the_ukr_ind: "Industrialización ucraniana"
 UKR_legacy_of_the_ukr_ind_desc: "Ucrania depende en gran medida de su base industrial para su crecimiento económico. Las principales ciudades de Kiev, Leópolis y Zaporizhia contienen alguna forma de industria que ha impulsado su crecimiento a lo largo de los años. Debemos mantener esta tendencia o nos estancaremos."
 UKR_ssau: "SSAU"
 UKR_ssau_desc: "La industria espacial ucraniana está lejos de ser un líder mundial en tecnología espacial. Sin embargo, es un gran productor de naves espaciales y otra maquinaria extraterrestre. La capacidad de seguir siendo competitivos en esta última frontera dictará nuestro futuro en los próximos años."
 UKR_pivdenmash_udo: "Pivdenmash"
 UKR_pivdenmash_udo_desc: "Pivdenmash es el principal fabricante de naves espaciales de Ucrania. La empresa es notable por producir cohetes para países extranjeros como la NASA. Sería bueno desarrollar esta industria en auge para proyectar a Ucrania en el escenario mundial. Dato curioso rápido, los cohetes fabricados en Ucrania representaron el 12% de todos los vuelos espaciales en 2006. ¿Quién lo diría!"
 UKR_national_steel_companies: "Acero Rutenio"
 UKR_national_steel_companies_desc: "El acero rutenio fue una vez un producto formidable destinado a la guerra. Ahora, ya no luchamos con espadas y escudos. Sin embargo, nuestros tanques, armas y balas necesitan acero de calidad para mantenerse competitivos."
 UKR_tsnap: "TSNAP"
 UKR_tsnap_desc: "These are institutions where different groups of people can receive a wide range of administrative services in a comfortable environment. They are created by local councils and local state administrations and serve individuals and legal entities."
 UKR_bronetank: "Planta de Blindados de Járkov"
 UKR_bronetank_desc: "The state enterprise of the armored industry, which carries out the production, repair, maintenance, re-equipment and modernization of armored vehicles."
 UKR_avia_zavod: "Planta de Aviación de Járkov"
 UKR_avia_zavod_desc: "The enterprise of aviation engineering in the city of Kharkov. It produces passenger, transport, and military aircraft."
 UKR_priborostroy: "Planta de Instrumentos de Járkov"
 UKR_priborostroy_desc: "Una de las fábricas más grandes de la URSS para la producción de electrónica militar y equipos eléctricos domésticos."
 UKR_tractor: "Planta de Tractores de Járkov"
 UKR_tractor_desc: "An enterprise for the production of tracked and wheeled tractors."
 UKR_agregat: "Oficina de Diseño de Agregados de Járkov"
 UKR_agregat_desc: "A scientific and production enterprise of the military-industrial complex, which develops and manufactures units for hydraulic, fuel and electrical systems of aviation and rocket technology."
 UKR_morozova: "Oficina de Diseño de Ingeniería de Járkov"
 UKR_morozova_desc: "Una empresa que desarrolla vehículos blindados. Anteriormente, KP KKBM jugó un papel clave en la creación de vehículos blindados de oruga de la Unión Soviética."
 UKR_specmachine: "Planta de Máquinas Especiales de Járkov"
 UKR_specmachine_desc: "La empresa estatal del complejo militar-industrial."
 UKR_malichev: "Planta Malyshev"
 UKR_malichev_desc: "La planta de ingeniería de transporte en Járkov, que produce motores, locomotoras y tanques."
 UKR_reborn_ser_and_molot: "Revivir la Planta \"Martillo y Hoz\""
 UKR_reborn_ser_and_molot_desc: "A large enterprise of agricultural machinery in Kharkov, it was one of the most important enterprises of the Kharkov industry and one of the largest enterprises of agricultural machinery in the Russian Empire and the USSR."
 UKR_concers: "Consorcio de Defensa de Járkov"
 UKR_concers_desc: "Unificaremos todas nuestras empresas de la industria militar en una sola empresa. Así, fortaleceremos la coordinación de la producción y aumentaremos la productividad."
 UKR_naftogaz: "Naftogaz"
 UKR_naftogaz_desc: "Naftogaz es la empresa estatal de petróleo y gas natural. Participa en el proceso de extracción y refinación de los productos. La empresa a menudo se utiliza para impulsar la independencia del petróleo y el gas frente a países como Rusia u otros grandes exportadores de energía."
 UKR_extend_ukrainian_refineries: "Enfoque en Energías Renovables"
 UKR_extend_ukrainian_refineries_desc: "Aunque tenemos amplio acceso al gas natural y otras reservas de petróleo, complementar nuestras necesidades energéticas actuales con otras formas de energía ayudará a estabilizar en tiempos de baja producción de combustibles fósiles."
 UKR_zalk: "Plantas Industriales de Zaporizhia"
 UKR_zalk_desc: "Zaporizhia es un importante centro industrial en Ucrania. Es la capital del óblast de Zaporizhia, hogar de ZAZ, y es un centro para la metalurgia y un importante puerto para el envío de mercancías desde el Donbás."
 UKR_rosava: "CJSC Rosava"
 UKR_rosava_desc: "CJSC Rosava es el mayor fabricante de neumáticos en Ucrania. Los sitios de producción se encuentran en dos fábricas de neumáticos: Rosava y la producción de neumáticos de gran tamaño. La capacidad alcanza unos 6 millones de unidades de neumáticos por año."
 UKR_land_land: "Continuar la Reforma Agraria"
 UKR_land_land_desc: "We are ready to continue the land reform that began in the last century and move it forward."
 UKR_zaporozhia_gold: "Mina de Oro de Muzhievo"
 UKR_zaporozhia_gold_desc: "We will finally attract investors and start developing these mines with gold deposits."
 UKR_monobank: "Monobank"
 UKR_monobank_desc: "Monobank is a Ukrainian direct bank. Like all of the existing neobanks in Ukraine, it operates using a banking license of a parent bank, namely, Universal Bank, which is a part of the TAS Group and belongs to Ukrainian businessman Serhiy Tihipko."
 UKR_zaz: "ZAZ"
 UKR_zaz_desc: "ZAZ o Planta de Construcción de Automóviles de Zaporizhia es el principal fabricante de automóviles en Ucrania. Como su nombre indica, está ubicada en la ciudad de Zaporizhia en el sureste de Ucrania. También produce comúnmente autobuses y camiones y es conocida principalmente por su antigua empresa matriz AvtoZAZ."
 UKR_kraz: "KrAZ"
 UKR_kraz_desc: "KrAZ es una empresa privada en Kremenchuk, Ucrania. La empresa produce principalmente camiones y otros vehículos de propósito especial. Sin embargo, su especialidad principal son los modelos todoterreno de servicio pesado. Recientemente se registró como una empresa holding, y ahora la corporación ucraniana Finanzas y Crédito es su propietaria."
 UKR_motor_sich: "Motor Sich"
 UKR_motor_sich_desc: "La Compañía de Acciones Motor Sich es un fabricante ucraniano de motores de aviación con sede en Zaporizhzhia. La empresa fabrica motores para aviones y helicópteros, así como turbinas de gas marinas industriales e instalaciones."
 UKR_armor_kyv: "The Kyiv Armored Plant"
 UKR_armor_kyv_desc: "The Kyiv Armored Plant is a state-owned enterprise of the armored industry of Ukraine, which performs diagnostics, repair, maintenance, re-equipment and modernization of Soviet-made armored vehicles."
 UKR_pivdenmash_idea: "PA Pivdenmash"
 UKR_kyvarmor_idea: "Kyiv Armored Plant"
 UKR_tsnap_idea: "TSNAP"
 UKR_concern: "Industria Militar de Járkov"
 UKR_zaz_idea: "ZAZ"
 UKR_kraz_idea: "KrAZ"
 UKR_motorsich_idea: "Motor Sich"
 UKR_start_war_against_poland: "Guerra Polaco-Ucraniana"
 UKR_start_war_against_poland_desc: "El momento decisivo de nuestro estado ha llegado. Repeleremos al enemigo o desapareceremos de la historia mundial."
 UKR_hur_expandeds: "Ampliar la Influencia del HUR"
 UKR_hur_expandeds_desc: "Ampliaremos los poderes del HUR, la situación lo requiere, la guerra lo requiere!"
 UKR_unite_with_russian_genshtab: "Reclutar la Ayuda del Estado Mayor Ruso"
 UKR_unite_with_russian_genshtab_desc: "We are ready to enlist the help of the Russian General Staff for the war with the Polish Army."
 UKR_observer_joint_shtab_kiev: "Crear un Cuartel General Conjunto"
 UKR_observer_joint_shtab_kiev_desc: "The armed forces of Russia and Ukraine will create a joint general staff in Kyiv."
 UKR_professional_shturm_groups: "Brigadas de Asalto"
 UKR_professional_shturm_groups_desc: "Comenzaremos a reclutar personas en brigadas de asalto para enfrentar más eficazmente a nuestros enemigos."
 UKR_pmc_zaporozhets: "PMCs Zaporozhets"
 UKR_pmc_zaporozhets_desc: "Algunos veteranos de guerra han creado su propia compañía militar privada llamada Zaporozhets."
 UKR_start_the_kashubian_uprising: "Preparar una Rebelión en Casubia"
 UKR_start_the_kashubian_uprising_desc: "We will prepare an insurgency in this region to undermine Poland's defense."
 UKR_silesian_rebellion: "Preparar una Rebelión en Silesia"
 UKR_silesian_rebellion_desc: "We will prepare an insurgency in this region to undermine Poland's defense."
 UKR_vilnoe_pospolitoe_rushenie: "El Batallón Pospolite Ruszenie"
 UKR_vilnoe_pospolitoe_rushenie_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_belarus_volunteers: "El Batallón Rokossovsky"
 UKR_belarus_volunteers_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_legion_free_poland: "La Legión de la Libertad de Polonia"
 UKR_legion_free_poland_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_polish_hetmanate_army: "El Batallón del Hetmanato Polaco"
 UKR_polish_hetmanate_army_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_air_dominance_tactics: "Tácticas de Dominio Aéreo"
 UKR_air_dominance_tactics_desc: "We need to suppress Polish Aviation, so we will apply a new doctrine."
 UKR_tro_expandeds: "Fortalecer la Defensa Territorial"
 UKR_tro_expandeds_desc: "Ampliaremos urgentemente el reclutamiento para la defensa territorial, necesitamos combatientes de inmediato!"
 UKR_start_war_against_russia: "Guerra Ruso-Ucraniana"
 UKR_start_war_against_russia_desc: "El momento decisivo de nuestro estado ha llegado. Repeleremos al enemigo o desapareceremos de la historia mundial."
 UKR_inter_legion: "Legión Internacional de Defensa Territorial"
 UKR_inter_legion_desc: "La Legión Internacional de Defensa Territorial de Ucrania es un proyecto del Gobierno de Ucrania para atraer extranjeros a crear unidades voluntarias como parte de la defensa territorial de las Fuerzas Armadas de Ucrania."
 UKR_kraken: "Unidad Especial \"Kraken\""
 UKR_kraken_desc: "The Kraken Special Unit is a Ukrainian separate intelligence and sabotage unit of the Main Intelligence Directorate of the Ministry of Defense of Ukraine."
 UKR_hur_expanded: "Ampliar la Influencia del HUR"
 UKR_hur_expanded_desc: "Ampliaremos los poderes del HUR, la situación lo requiere, la guerra lo requiere!"
 UKR_tro_expanded: "Fortalecer la Defensa Territorial"
 UKR_tro_expanded_desc: "Ampliaremos urgentemente el reclutamiento para la defensa territorial, necesitamos combatientes de inmediato!"
 UKR_tck: "Movilización Masiva"
 UKR_tck_desc: "We will have to start mass mobilization, because this is literally a war for the existence of our state."
 UKR_other_battaions_hur: "Nuevos Batallones del HUR"
 UKR_other_battaions_hur_desc: "HUR is actively recruiting fighters into its battalions, some of them are already ready to join the battle."
 UKR_free_russia_legion: "Legión de la Libertad de Rusia"
 UKR_free_russia_legion_desc: "Real Russian patriots are ready to fight for us and overthrow the tyranny that hangs over Russia."
 UKR_rdk: "El Cuerpo de Voluntarios Rusos"
 UKR_rdk_desc: "Russian nationalists who do not agree with Russia's policy have self-organized under our command into the Russian volunteer corps."
 UKR_republican_army: "Ejército Republicano Nacional"
 UKR_republican_army_desc: "Fugitive deputies from Russia have created a national Republican Army, which will conduct active guerrilla activities against the regime."
 UKR_separatist_battalions: "Atraer Batallones Separatistas"
 UKR_separatist_battalions_desc: "Not only Russians, but also other nations are ready to fight for freedom from Russian imperialism."
 UKR_interlegion_2: "Llamar al §Y2º Legión Internacional Georgiana§! al frente"
 UKR_interlegion_3: "Llamar al §YLegión Nacional Georgiana§! al frente"
