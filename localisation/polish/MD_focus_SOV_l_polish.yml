 russia.200.t: "Dobre wieści z Bajkonuru"
 russia.200.d: "The Buran repair team has confirmed today that the shuttle was successfully moved out of the aging hangar, marking the beginning of its dismantling process. A team of skilled engineers has been assembled to oversee the deconstruction of the frame."
 russia.200.a: "Zgodnie z zamierzeniem"
 russia.300.t: "Przywłaszczenie funduszy Buran"
 russia.300.d: "Funds allocated to the Buran restoration program were reportedly embezzled, redirecting critical resources away from the project. Efforts to identify the culprit have so far been unsuccessful. The disappearance of financial records and high-level corruption have hindered the investigation."
 russia.300.a: "Do cholery!"
 russia.301.t: "International Community Abuzz with Admiration"
 russia.301.d: "Dzięki naszym drakońskim, ale skutecznym wysiłkom w naprawie wahadłowca Buran, społeczność międzynarodowa została oczarowana naszymi osiągnięciami. Możemy wykorzystać ten moment globalnego uznania i zmaksymalizować jego wpływ, podczas gdy światło reflektorów pozostaje zwrócone na nas."
 russia.301.a: "Oddajmy hołd inżynierom!"
 russia.301.b: "Uznanie autorstwa [SOV.GetLeader]!"
 russia.302.t: "Naprawa wahadłowca Buran"
 russia.302.d: "After months of meticulous work, the Buran shuttle has been fully restored and stands poised for a new chapter in space exploration. Every screw, every part has been double-checked, and a successful test flight has proven its readiness. Now prepared for future missions, this is a triumphant moment for Russia — the revival of a legendary craft once thought lost to time."
 russia.302.a: "Krok naprzód w eksploracji kosmosu!"
 russia.3022.t: "Prom Buran naprawiony przez Rosję"
 russia.3022.d: "After months of meticulous work, the Buran shuttle has been fully restored and stands poised for a new chapter in space exploration. Every screw, every part has been double-checked, and a successful test flight has proven its readiness. Now prepared for future missions, this is a triumphant moment for Russia — the revival of a legendary craft once thought lost to time."
 russia.3022.a: "Krok naprzód w eksploracji kosmosu!"
 russia.303.t: "Buran w naprawie zniszczony w pożarze hangaru"
 russia.303.d: "On June 16, 2003, disaster struck as a fire engulfed the temporary hangar where the Buran shuttle was being repaired, destroying it completely. After all the efforts to restore and prepare it for future missions, the shuttle's legacy was reduced to ashes. The loss was devastating — a tragic end to what could have been the shuttle's triumphant return to the skies."
 russia.303.a: "Marzenia, które nigdy się nie spełnią"
 russia.3033.t: "Buran w naprawie zniszczony w pożarze hangaru"
 russia.3033.d: "On June 16, 2003, disaster struck as a fire engulfed the temporary hangar where the Buran shuttle was being repaired, destroying it completely. After all the efforts to restore and prepare it for future missions, the shuttle's legacy was reduced to ashes. The loss was devastating, a tragic end to what could have been the shuttle's triumphant return to the skies."
 russia.3033.a: "Marzenia, które nigdy się nie spełnią"
 russia.304.t: "Buran zniszczony w zawalonym hangarze"
 russia.304.d: "On May 12, 2002, tragedy struck as the Buran shuttle was lost in a devastating hangar collapse, ending its story in a pile of debris and causing multiple fatalities. This once-proud symbol of space exploration was reduced to ruin, never to soar again. It was a heartbreaking end for a craft that had represented so much hope and ambition."
 russia.304.a: "Marzenia, które nigdy się nie spełnią"
