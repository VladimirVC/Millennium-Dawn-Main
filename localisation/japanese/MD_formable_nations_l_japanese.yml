 form_AUSHUN_category: "オーストリア＝ハンガリー帝国の再形成"
 form_AUSHUN_category_desc: "オーストリア＝ハンガリー帝国は、19世紀後半から20世紀初頭にかけて中央ヨーロッパで強大な勢力を誇っていた。第一次世界大戦での大敗後、国家は解体され、チェコ、オーストリア、ハンガリー、スロバキア、スロベニア、ボスニア、そしてウクライナ、ポーランド、ルーマニアの一部に分裂した。今こそ、はるか昔に失われた権威を取り戻す時だ。オーストリア＝ハンガリー帝国を改革すべき時が来たのだ。"
 AUSHUN_integrate_start: "[GetAUSHUNNameDef]形成の開始"
 AUSHUN_integrate_start_desc: "The holdings of the Austro-Hungarian Empire have been reclaimed by our military and our politicians have started the work towards administering the new regions.\n\n"
 AUSHUN_integrate_AUS: "Integrate [GetAUSHUNNameAdj] [AUS.GetAdjective] Territories"
 AUSHUN_integrate_AUS_desc: "かつてのハプスブルク帝国の中心地であるオーストリアは、我らの権力の主要拠点の一つであるべきだ。"
 AUSHUN_integrate_HUN: "Integrate [GetAUSHUNNameAdj] [HUN.GetAdjective] Territories"
 AUSHUN_integrate_HUN_desc: "ハンガリー王国は、二重帝国を構成する王国の片割れであり、帝国の統治におけるパートナーであった。その統合は、帝国の構造を再建するために不可欠である。"
 AUSHUN_integrate_SLV: "Integrate [GetAUSHUNNameAdj] [SLV.GetAdjective] Territories"
 AUSHUN_integrate_SLV_desc: "スロベニアの領土はオーストリア帝冠領の一部を構成しており、アドリア海への出口として機能するとともに、オーストリアとバルカン半島を結ぶ架け橋としての役割を果たしていた。"
 AUSHUN_integrate_NORTHITA: "Integrate [GetAUSHUNNameAdj] North Italian Territories"
 AUSHUN_integrate_NORTHITA_desc: "かつて、イタリアのロンバルド＝ヴェネト地方は、文化と商業に恵まれたハプスブルク家の宝であった。この地域の回収により、オーストリアはポー川流域における影響力を取り戻すことになるだろう。"
 AUSHUN_integrate_CRO: "Integrate [GetAUSHUNNameAdj] [CRO.GetAdjective] Territories"
 AUSHUN_integrate_CRO_desc: "クロアチアはハンガリー王冠領の一部であり、かなりの自治権を有していた。アドリア海沿岸に位置するその港湾と戦略的な立地は、帝国の海軍力にとって極めて重要なものとなっていた。"
 AUSHUN_integrate_BOS: "Integrate [GetAUSHUNNameAdj] [BOS.GetAdjective] Territories"
 AUSHUN_integrate_BOS_desc: "1878年以来オーストリア＝ハンガリー帝国によって統治され、1908年に正式に併合されたボスニア・ヘルツェゴビナの統合は、我々の南方の国境を固め、バルカン半島への影響力を拡大することになるだろう。"
 AUSHUN_integrate_SLO: "Integrate [GetAUSHUNNameAdj] [SLO.GetAdjective] Territories"
 AUSHUN_integrate_SLO_desc: "スロヴァキアの領土はハンガリー王国の不可欠な一部であり、王国の山岳地帯に広がる北の国境を形成していた。その再統合により、カルパティア山脈に対する我々の支配はさらに強固なものとなる。"
 AUSHUN_integrate_AUSROM: "Integrate [GetAUSHUNNameAdj] Transylvanian Territories"
 AUSHUN_integrate_AUSROM_desc: "トランシルヴァニアは、かつてハンガリー王領であり、ルーマニア人とハンガリー人の間で争われてきた地域である。この地域における支配権の掌握は、帝国の東部への要衝を確保することにつながる。"
 AUSHUN_integrate_CZE: "Integrate [GetAUSHUNNameAdj] [CZE.GetAdjective] Territories"
 AUSHUN_integrate_CZE_desc: "ボヘミア王領は、帝国の中でも最も工業化が進み、文化的に豊かな地域の一つであった。プラハは帝国の主要都市の一つとして位置づけられており、その再統合は極めて重要である。"
 AUSHUN_integrate_AUSPOL: "南ポーランドの統合"
 AUSHUN_integrate_AUSPOL_desc: "ガリツィアは、ポーランド分割によって獲得された王領であり、帝国の北の辺境に経済的資源と戦略的深みをもたらした。"
 AUSHUN_integrate_WESTUKR: "南西ウクライナの統合"
 AUSHUN_integrate_WESTUKR_desc: "ガリツィアの東部地域にはルテニア人が居住しており、豊かな農業生産をもたらしていた。彼らの統合により、我々の影響力はウクライナの国境地帯にまで拡大している。"
 AUSHUN_update_flag: "Finish Forming [GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetAUSHUNNameDef], adopting its unified flag and name."
