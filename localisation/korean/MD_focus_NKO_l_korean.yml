 NKO_nuclear_reactors_tech_tt: "핵 원자로 연구 보너스"
 Junta: "§Y군사 정부§!가 성공적으로 §R쿠데타§!를 일으켰습니다."
 legalizes_all_political_parties_tt: "§C모든 정당 합법화.§!\n"
 korea_peninsula_reunited: "§Y한반도가 §G통일§!되었습니다!§!"
 NKO_hermit_kingdom: "은둔의 왕국"
 NKO_hermit_kingdom_desc: "공화국은 건국 이래 줄곧 고립된 국가였습니다. 세계에서 가장 빈곤한 국가 중 하나임에도 불구하고, 여전히 세계 최대 규모의 군대를 유지하고 있습니다. 김씨 일가는 사실상 내부의 반대 없이 50년 이상 집권해 왔습니다. 은둔의 왕국 공화국은 국가들 사이에서 설명하기 힘든 변칙적 존재입니다.\n\n§R이 국가 정신은 김씨 일가가 권력에서 물러나면 제거됩니다!§!"
 north_korea_focus: "북한 중점 계통도"
 NKO_international_assistance: "§Y인도적 지원 수락§!"
 NKO_international_assistance_desc: "\"북한 주민들은 외국의 인도적 지원을 환영합니다.\""
 NKO_solve_the_arduous_march_desc: "고난의 행군은 우리 나라에 큰 고통을 안겨주었습니다. 우리 인민의 미래를 보장하기 위해, 우리는 이 어려운 시기를 극복하고 나라를 번영으로 이끌 전략적인 조치를 시행해야 합니다. 여기에는 농업 생산 증진, 인도적 지원 확보, 그리고 안정과 성장을 보장하는 국내 정책 개혁이 포함됩니다."
 NKO_promote_songun: "선군정치 강화"
 NKO_promote_songun_desc: "선군정치는 정치·경제 활동에서 조선인민군을 최우선으로 삼는 정책입니다. 선군정치를 추진함으로써 우리는 국가 안보를 확보하고, 주권 수호와 사회주의 건설을 이끄는 데 있어 군의 역할을 강화합니다."
 NKO_humanitarian_aid: "인도적 지원"
 NKO_humanitarian_aid_desc: "이러한 어려운 시기에 국제기구와 우방국의 인도적 지원을 수용하는 것은 우리 국민의 고통을 덜어주는 데 필수적인 자원이 될 것입니다. 이 지원은 필요한 사람들에게 전달되고 우리의 복구 노력을 뒷받침할 수 있도록 신중하게 관리될 것입니다."
 NKO_food_production_boost: "식량 생산 증진"
 NKO_food_production_boost_desc: "식량 생산 증진은 인민의 복지를 보장하는 데 필수적입니다. 농업 기술에 투자하고, 관개 시스템을 개선하며, 농민들을 지원함으로써 작물 생산량을 늘리고 국가의 안정적인 식량 공급을 확보할 수 있습니다."
 NKO_healthcare_reform: "의료 개혁"
 NKO_healthcare_reform_desc: "의료 시스템 개혁은 국민의 건강과 생산성 향상에 매우 중요합니다. 우리는 의료 시설 현대화, 의료 전문가 양성, 그리고 필수 의약품 및 치료 접근성 보장에 집중할 것입니다."
 NKO_punish_corruption: "부패 척결"
 NKO_punish_corruption_desc: "부패는 사회주의 원칙을 훼손하고 국가 발전을 저해합니다. 우리는 부패한 공직자를 색출하고 폭로하여 처벌하는 강력한 캠페인을 벌여 정부와 기관의 투명성과 청렴성을 확보할 것입니다."
 NKO_agricultural_funding: "농업 자금 지원"
 NKO_agricultural_funding_desc: "농업 부문에 대한 자금 지원과 후원은 식량 안보와 농촌 생활 수준 향상에 기여할 것입니다. 생산성 증대를 위해 기계화, 개량 종자, 그리고 우수한 농업 기술에 집중할 것입니다."
 NKO_fertiliser_factory: "비료 공장"
 NKO_fertiliser_factory_desc: "최첨단 비료 공장을 건설하면 토양 비옥도와 작물 수확량이 크게 향상될 것입니다. 이러한 투자는 농민들이 풍성한 수확을 거두는 데 필요한 자원을 확보할 수 있도록 보장할 것입니다."
 NKO_nutrition_programs: "영양 개선 프로그램"
 NKO_nutrition_programs_desc: "전국적인 영양 개선 프로그램을 시행하면 영양실조 문제를 해결하고 공중 보건을 향상시킬 수 있습니다. 특히 어린이와 취약 계층을 위해 균형 잡힌 식단을 제공하는 데 중점을 두어 더욱 건강한 미래를 만들어 나갈 것입니다."
 NKO_acquiesce_jangmadang: "장마당 묵인"
 NKO_acquiesce_jangmadang_desc: "장마당, 즉 암시장이 우리 경제에서 차지하는 중요성을 인식하여, 규제된 조건 하에 장마당의 운영을 허용할 것입니다. 이는 경제 활동을 활성화하고 국민들에게 생필품을 공급하는 데 도움이 될 것입니다."
 NKO_bureau_39: "39호실"
 NKO_bureau_39_desc: "조선로동당 39호실은 다양한 수단을 통해 정권의 외화를 조달하는 책임을 맡고 있습니다. 이를 강화하면 경제력이 향상되고 국가 사업을 지원하기 위한 자원의 안정적인 흐름을 확보할 수 있을 것입니다."
 NKO_admit_the_donju: "돈주 인정"
 NKO_admit_the_donju_desc: "돈주, 즉 부유한 기업가들은 우리 경제에서 중요한 역할을 합니다. 그들의 영향력을 인정하고 자원을 통합함으로써, 우리는 그들의 활동을 통제하면서 국가 발전을 위한 그들의 잠재력을 활용할 수 있습니다."
 NKO_government_directed_drug_manufacture: "정부 주도 마약 생산"
 NKO_government_directed_drug_manufacture_desc: "정부 감독 하에 마약 생산을 관리하면 새로운 수익원이 창출될 것입니다. 이러한 통제된 생산은 국가 사업에 필요한 자금을 마련하고 재정 안정성을 강화하는 데 사용될 것입니다."
 NKO_smuggling_operations: "외국 은행 해킹"
 NKO_smuggling_operations_desc: "우리는 적대국에 대한 영향력과 해커들의 기술적 역량을 활용하여 적국의 은행 시스템에 침투해야 합니다."
 NKO_counterfeit_production: "위조품 생산"
 NKO_counterfeit_production_desc: "화폐 및 명품을 포함한 위조 상품 생산은 외화를 확보하고 우리 경제를 활성화하는 데 도움이 될 것입니다. 이러한 작업은 국제적인 파장을 피하기 위해 최대한 비밀리에 진행될 것입니다."
 NKO_huichon: "희천"
 NKO_huichon_desc: "희천 공업도시 개발은 우리의 제조업 역량을 강화할 것입니다. 우리는 핵심 기반시설 구축과 숙련된 인력 유치에 집중하여 희천을 경제 활동의 중심지로 탈바꿈시킬 것입니다."
 NKO_huichon_hydroelectric_power: "희천수력발전소"
 NKO_huichon_hydroelectric_power_desc: "희천에 수력발전소를 건설하면 우리의 에너지 안보가 향상될 것입니다. 이 사업들은 깨끗하고 재생 가능한 에너지를 공급하고 산업 성장을 뒷받침할 것입니다."
 NKO_manpo_line_railway: "만포선 철도"
 NKO_manpo_line_railway_desc: "만포선 철도를 건설하면 교통 인프라가 개선되고 물류 및 인구 이동이 원활해질 것입니다. 이 철도는 국가 물류망의 핵심 연결 고리가 될 것입니다."
 NKO_coal_energy_supermacy: "석탄 에너지의 우월성"
 NKO_coal_energy_supermacy_desc: "석탄 에너지에 집중하면 우리의 산업체와 가정에 안정적이고 풍부한 전력을 공급할 수 있습니다. 우리는 효율과 출력을 극대화하기 위해 탄광과 발전소 현대화에 투자할 것입니다."
 NKO_ordnance_manufacture: "군수품 제조"
 NKO_ordnance_manufacture_desc: "군수품 제조 역량 강화는 국가 안보를 위한 중요한 부분입니다. 우리는 군대가 훌륭한 장비를 갖추도록 생산 시설을 확장하고 기술 세대를 높일 것입니다."
 NKO_huichon_hard_glassware_factory: "희천경질유리공장"
 NKO_huichon_hard_glassware_factory_desc: "희천에 경질 유리 제품 공장을 설립하는 것은 우리 산업 생산을 뒷받침하고, 다양한 분야에 활용될 수 있는 고품질 소재를 안정적으로 공급하는 데 기여할 것입니다."
 NKO_huichon_silk_mill: "희천비단공장"
 NKO_huichon_silk_mill_desc: "희천에 비단 공장을 건설하는 것은 우리의 섬유 산업을 지원하고 일자리를 창출할 것입니다. 이 투자는 고급 직물과 의류 생산 능력을 향상시킬 것입니다."
 NKO_huichon_machine_tool_factory: "희천공작기계종합공장"
 NKO_huichon_machine_tool_factory_desc: "희천에 공작기계공장을 설립하면 우리의 제조업 역량이 향상될 것입니다. 이 시설은 산업에 필수적인 기계와 장비를 생산할 것입니다."
 NKO_bureau_38: "38호실"
 NKO_bureau_38_desc: "38호실은 국가 자원과 자금 관리를 담당합니다. 이 부서를 강화하면 자원의 효율적인 분배를 보장하고 국가 개발 사업을 지원할 수 있습니다."
 NKO_sanction_evasions: "제재 회피"
 NKO_sanction_evasions_desc: "국제 제재를 회피하기 위한 정교한 전략을 실행하는 것은 우리 경제를 강화할 것입니다. 우리는 비밀 작전을 활용하여 필수 물자와 금융 자원을 확보할 것입니다."
 NKO_international_black_market: "121국"
 NKO_international_black_market_desc: "121국은 공화국의 사이버전 부대로, 조선인민군 정찰총국 산하의 핵심 조직입니다. 이들은 첩보 활동 및 사이버 지원 금융 범죄를 포함한 공세적 사이버 작전을 수행합니다. 미국 당국에 따르면 정찰총국은 비밀 공작을 관리하며 산하에 6개 국을 두고 있습니다."
 NKO_technological_boost: "기술적 도약"
 NKO_technological_boost_desc: "기술 발전에 집중하는 것이 혁신과 경제 성장을 견인할 것입니다. 우리는 세계적인 기술 트렌드에 발맞춰 나가기 위해 연구 개발에 투자할 것입니다."
 NKO_purchase_stolen_tech_blueprint: "도난된 기술 설계도 구입"
 NKO_purchase_stolen_tech_blueprint_desc: "도난당한 기술 설계도를 확보하면 첨단 기술 개발에 있어 우위를 점할 수 있습니다. 이는 연구 및 혁신 노력을 가속화할 것입니다."
 NKO_bribe_researchers_at_institues: "연구원 매수"
 NKO_bribe_researchers_at_institues_desc: "주요 연구기관의 연구원들에게 뇌물을 주는 것은 기술 발전을 가속화할 것입니다. 이러한 은밀한 전략을 통해 우리는 귀중한 통찰력과 발전을 얻을 수 있을 것입니다."
 NKO_black_market_innovation: "암시장 혁신"
 NKO_black_market_innovation_desc: "암시장의 창의성을 활용하면 우리의 기술적 능력이 향상될 것입니다. 우리는 지하의 혁신가들을 지원하여 참신하고 기존 틀을 깨는 기술을 개발할 것입니다."
 NKO_national_recovery_plan: "국가 회복 계획"
 NKO_national_recovery_plan_desc: "포괄적인 국가 경제 회복 계획을 시행하면 우리 경제를 안정시키고 강화할 수 있습니다. 이 계획은 핵심 기반 시설 재건, 산업 활성화, 사회 복지 보장에 중점을 둘 것입니다."
 NKO_emphasis_self_reliance: "자력갱생 강조"
 NKO_emphasis_self_reliance_desc: "자력갱생에 집중하면 해외 원조 및 수입에 대한 의존도를 줄일 수 있습니다. 우리는 국내 생산과 자원 활용을 촉진할 것입니다."
 NKO_financial_sector_reform: "금융 부문 개혁"
 NKO_financial_sector_reform_desc: "금융 부문 개혁은 경제 안정성을 향상시킬 것입니다. 우리는 금융 기관 강화, 규제 체계 개선, 그리고 책임 있는 금융 관행 장려에 집중할 것입니다."
 NKO_modernization_efforts: "현대화 노력"
 NKO_modernization_efforts_desc: "산업을 현대화하면 생산성과 효율성이 증가할 것입니다. 우리는 신기술에 투자하고, 기존 시설을 개선하며, 노동자들이 현대적인 생산 방식에 적응할 수 있도록 교육할 것입니다."
 NKO_renewable_energy_initiatives: "재생 가능 에너지 계획"
 NKO_renewable_energy_initiatives_desc: "재생에너지에 투자하는 것은 지속가능한 발전을 보장하고 화석 연료에 대한 의존도를 줄일 것입니다. 우리는 더욱 친환경적인 미래를 만들기 위해 태양광, 풍력, 수력 발전 프로젝트에 집중할 것입니다."
 NKO_labor_force_training: "노동력 훈련"
 NKO_labor_force_training_desc: "노동력을 훈련하면 노동자들의 숙련도와 생산성이 향상될 것입니다. 우리는 현대 산업에 필요한 기술을 갖추게 하기 위한 종합 교육 프로그램을 실시할 것입니다."
 NKO_50k_housing_project: "5만 세대 주택 건설"
 NKO_50k_housing_project_desc: "5만 세대 주택을 건설하면 주택 난을 해소하고 생활 수준을 향상시킬 수 있습니다. 이 야심 찬 사업은 시민들에게 양질의 가옥을 제공하고 건설업을 활성화할 것입니다."
 NKO_mansudae_peoples_theatre: "만수대인민극장"
 NKO_mansudae_peoples_theatre_desc: "만수대인민극장을 건설하면 우리의 문화생활이 풍요로워질 것입니다. 이 웅장한 장소는 우리의 전통을 기념하고 예술을 장려하는 공연과 행사를 개최할 것입니다."
 NKO_rare_metal_exploitation: "희귀 금속 채굴"
 NKO_rare_metal_exploitation_desc: "희귀 금속을 개발하면 우리 산업에 귀중한 자원을 제공할 수 있습니다. 우리는 이 핵심 자원들을 추출하여 기술적 능력을 끌어올리기 위한 채굴 작업을 전개할 것입니다."
 NKO_focus_on_quality: "품질 중심"
 NKO_focus_on_quality_desc: "품질에 집중하면 우리 제품의 수준이 높아질 것입니다. 우리는 제품이 국제 기준을 충족할 수 있도록 품질 관리 조치를 시행하고 혁신을 장려할 것입니다."
 NKO_light_industry_development: "경공업 발전"
 NKO_light_industry_development_desc: "경공업을 발전시키면 경제를 다각화할 수 있습니다. 우리는 소비재, 섬유 및 기타 경공업 제품을 생산하는 중소기업을 지원할 것입니다."
 NKO_modern_mining_operations: "현대적 채굴 작업"
 NKO_modern_mining_operations_desc: "현대적 채굴 작업을 도입하면 효율과 출력이 증가할 것입니다. 우리는 생산성을 높이고 지속 가능한 자원 추출을 보장하기 위해 첨단 채굴 장비와 기술에 투자할 것입니다."
 NKO_resource_extraction: "자원 추출"
 NKO_resource_extraction_desc: "자원 추출에 집중하면 필수 자재의 안정적인 공급을 보장할 수 있습니다. 우리는 산업을 지원하고 경제적 미래를 확보하기 위해 채굴 및 추출 능력을 개발할 것입니다."
 NKO_industrial_modernization: "산업 현대화"
 NKO_industrial_modernization_desc: "산업을 현대화하면 생산성과 효율성이 증가할 것입니다. 우리는 신기술에 투자하고, 기존 시설을 개선하며, 노동자들이 현대적인 생산 방식에 적응할 수 있도록 교육할 것입니다."
 NKO_victory_of_juche_revolution: "주체혁명의 승리"
 NKO_victory_of_juche_revolution_desc: "주체혁명의 승리를 달성하면 우리의 자주성과 자력갱생이 공고해질 것입니다. 우리는 국가의 지속적인 강대함과 자율성을 보장하기 위해 주체사상의 원칙을 장려할 것입니다."
 NKO_national_recovery_plan1: "국가 회복 계획"
 NKO_international_black_market_gain_tt: "§Y121국을 창설하여 우리의 첩보 공작 능력을 증가시킵니다.§!\n"
 NKO_economic_expansion: "경제 확장"
 NKO_economic_expansion_desc: "경제를 확장하면 더 많은 기회와 성장이 창출될 것입니다. 우리는 투자를 장려하고, 기업 활동을 지원하며, 경제 활동을 자극하는 정책을 시행할 것입니다."
 NKO_create_komid: "조선광업개발무역회사 설립"
 NKO_create_komid_desc: "조선광업개발무역회사를 설립하면 우리의 무역 역량이 강화될 것입니다. 이 기관은 국제 무역 업무를 관리하여 타국과의 효율적이고 수익성 있는 거래를 보장할 것입니다."
 NKO_illict_trade_routes: "불법 무역로"
 NKO_illict_trade_routes_desc: "불법 무역로를 개척하면 국제 제재를 우회할 수 있습니다. 우리는 필수 물자와 자원을 확보하기 위해 비밀망을 구축하여 경제적 회복력을 유지할 것입니다."
 NKO_expand_black_market: "암시장 확대"
 NKO_expand_black_market_desc: "암시장을 확대하면 추가 수익원을 확보할 수 있습니다. 우리는 자금을 창출하고 필요한 물자를 확보하기 위해 지하 경제 활동을 지원할 것입니다."
 NKO_acquire_military_equipment: "군사 장비 획득"
 NKO_acquire_military_equipment_desc: "군사 장비를 획득하면 국방력이 강화될 것입니다. 우리는 우리 군대가 국가를 수호할 수 있는 훌륭한 장비를 갖추도록 첨단 무기와 기술을 확보할 것입니다."
 NKO_black_market_boom: "암시장 호황"
 NKO_black_market_boom_desc: "호황을 누리는 암시장은 경제적 이익을 가져다줄 것입니다. 우리는 지하 무역을 자금화하여 수익을 창출하고 우리 경제를 뒷받침할 것입니다."
 NKO_advanced_weapons_trade: "첨단 무기 무역"
 NKO_advanced_weapons_trade_desc: "첨단 무기 무역에 관여하면 군사력이 향상될 것입니다. 우리는 자금을 마련하고 국방력을 강화하기 위해 정교한 무기를 개발 및 판매할 것입니다."
 NKO_red_star_os: "붉은별 OS"
 NKO_red_star_os_desc: "붉은별 OS를 개발하면 우리의 기술적 역량이 발전할 것입니다. 이 운영 체제는 사이버 보안을 강화하고 기술적 자립을 지원할 것입니다."
 NKO_the_kwangmyong: "광명망"
 NKO_the_kwangmyong_desc: "광명망 체계를 구축하면 통신 인프라가 강화될 것입니다. 이 내부망은 정보에 대한 안전하고 안정적인 접근을 제공하며 우리의 디지털 주도 계획을 지원할 것입니다."
 NKO_technological_independence: "기술적 자립"
 NKO_technological_independence_desc: "기술적 자립을 달성하는 것은 우리의 자급자족을 보장할 것입니다. 우리는 자체 기술 개발에 집중하고 외국 수입 의존도를 줄일 것입니다."
 NKO_trade_agreements_with_vietnam: "[VIE.GetName]과의 무역 협정"
 NKO_trade_agreements_with_vietnam_desc: "[VIE.GetName]과 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
 NKO_invite_the_russians: "[SOV.GetName]와의 무역 협정"
 NKO_invite_the_russians_desc: "[SOV.GetName]와 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
 NKO_trade_agreements_with_china: "[CHI.GetName]와의 무역 협정"
 NKO_trade_agreements_with_china_desc: "[CHI.GetName]와 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
 NKO_trade_agreements_with_egypt: "[EGY.GetName]와의 무역 협정"
 NKO_trade_agreements_with_egypt_desc: "[EGY.GetName]와 무역 협정을 체결하면 경제 협력이 강화될 것입니다. 우리는 상호 이익이 되는 거래를 보장하고 양국 관계를 굳건히 하기 위해 유리한 조건을 협상할 것입니다."
