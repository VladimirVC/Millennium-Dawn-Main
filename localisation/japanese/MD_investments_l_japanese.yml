 investments_clock_tt: "§Y投資完了までの期間:§! [?ROOT.project_total_construction_duration_display^-1]日\n\n§Y投資完了までの期間§!§g、または計画期間は、[PREV.GetName]において単に我々の提案する計画が完了するのにかかる時間の合計だ。自国が§Y[PREV.CONTROLLER.GetNamewithFlag]§!に建設提案する建物の数が多ければ多いほど、計画は長くなる。§!\n\n§g他の国や州をクリックした場合は、建物の数を変更するか、他の建物をクリックして補足説明を更新し、本当の費用を確認できる。§!\n"
