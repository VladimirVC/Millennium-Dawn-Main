 CAN_french_happiness_desc: "French Canadians, commonly referred to in Quebec as \"Québécois\", are the ethnic group of Canada who trace their lineage back to French colonists from the 17th century onwards. French Canadians account for around twenty-two percent of the Canadian total population. Québécois nationalism has died down slowly since the 1960s; however, it still remains a firm occurrence in Quebec, with many still referring to themselves as Québécois rather than Canadian.\n\n§G60%§! or higher for Good French Happiness\n§Y50%§!-§Y60%§! for Neutral French Happiness\n§R49%§! or lower for Bad French Happiness\n\n§gFrench Canadian Happiness:§! \n[CAN_color_of_variable]\n\n§gCurrent Effects:§! \n[CANGetFrenchHappinessEffects]"
