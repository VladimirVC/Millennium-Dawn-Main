 kasmir_war.1.t: "Неудача во время военной подготовки"
 kasmir_war.1.d: "Во время недавних военных учений произошел несчастный случай, в результате которого несколько солдат получили ранения, и теперь люди требуют ответов"
 kasmir_war.1.a: "Прискорбно"
 kasmir_war.2.t: "Инцидент во время общевойсковых учений"
 kasmir_war.2.d: "В ходе недавних военных учений произошёл несчастный случай, в результате которого несколько солдат получили ранения, а часть техники была повреждена."
 kasmir_war.2.a: "Такова природа вещей"
 kasmir_war.3.t: "Имитация неудачной атаки"
 kasmir_war.3.d: "Во время недавних маневров с финтами мы подверглись обстрелу со стороны неизвестного противника. Точную причину установить не удалось, и возникает много непростых вопросов."
 kasmir_war.3.a: "Настолько, насколько это возможно."
 kasmir_war.10.t: "Успешный толчок"
 kasmir_war.10.d: "Нам удалось одержать победу в последнем наступлении против противника."
 kasmir_war.10.a: "Как и планировалось"
 kasmir_war.11.t: "Неудачный толчок"
 kasmir_war.11.d: "Нашему противнику удалось отразить нашу атаку."
 kasmir_war.11.a: "Небольшая неудача"
 kasmir_war.12.t: "Патовая ситуация после нападения"
 kasmir_war.12.d: "Добиться какого-либо значимого результата после последней атаки не удалось"
 kasmir_war.12.a: "Черт."
 kasmir_war.13.t: "Противник одерживает победу"
 kasmir_war.13.d: "Противнику удалось прорвать наши линии обороны и одержать победу."
 kasmir_war.13.a: "Плохие новости"
 kasmir_war.14.t: "Противник совершает неудачную атаку"
 kasmir_war.14.d: "Противник атаковал наши оборонительные позиции, но не смог достичь своих целей."
 kasmir_war.14.a: "Отличная работа."
 kasmir_war.15.t: "Тупик, когда враг атакует"
 kasmir_war.15.d: "Нам удалось сорвать попытки противника усилить наступление."
 kasmir_war.15.a: "Могло быть и хуже"
 kasmir_war.6.t: "Атака отменена"
 kasmir_war.6.d: "В тот момент, когда мы были готовы атаковать, наши враги нанесли удар первыми, и теперь мы вынуждены быть на стороне защитников"
 kasmir_war.6.a: "То есть, это хорошо, да?"
 kasmir_war.30.t: "Противник захватывает регион"
 kasmir_war.30.d: "После недавних столкновений наш противник продвинулся в одном из регионов и теперь контролирует его почти полностью. Нам необходимо действовать немедленно."
 kasmir_war.30.a: "Пусть берут"
 kasmir_war.30.b: "Готовиться к полномасштабной войне"
