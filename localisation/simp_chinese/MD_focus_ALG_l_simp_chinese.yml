 ALG_appoint_loyalist_drs_tt: "一位忠诚的军官将加强总统的控制力，尽管旧有的关系网依然存在。"
 ALG_appoint_civilian_drs_tt: "一位文职出身情报专家将对深层政府构成重大打击。"
