 ALG_khenchela_trait_desert_hardened: "Desert-Hardened Equipment"
 ALG_khenchela_trait_desert_hardened_desc: "Weapons designed and tested specifically for Saharan conditions, with improved dust sealing and heat resistance."
 ALG_khenchela_trait_simplified_maintenance: "Simplified Maintenance"
 ALG_khenchela_trait_simplified_maintenance_desc: "Streamlined designs that reduce maintenance requirements and replacement part costs."
 ALG_khenchela_trait_standardized_production: "Standardized Production Lines"
 ALG_khenchela_trait_standardized_production_desc: "Implement uniform manufacturing processes to increase production efficiency."
 ALG_khenchela_trait_mass_production_focus: "Mass Production Focus"
 ALG_khenchela_trait_mass_production_focus_desc: "Expand production capacity to meet the demands of a large standing army."
 ALG_seriana_trait_kalashnikov_expertise: "Kalashnikov Expertise"
 ALG_seriana_trait_kalashnikov_expertise_desc: "Decades of experience producing AK-pattern rifles provides superior reliability and firepower."
 ALG_seriana_trait_licensed_production: "Licensed Production Efficiency"
 ALG_seriana_trait_licensed_production_desc: "Optimized production lines for foreign-designed weapons under license."
 ALG_seriana_trait_cost_reduction: "Cost Reduction Measures"
 ALG_seriana_trait_cost_reduction_desc: "Implement cost-saving manufacturing techniques without compromising quality."
 ALG_dgi_trait_atgm_development: "ATGM Development Program"
 ALG_dgi_trait_atgm_development_desc: "Domestic anti-tank guided missile development to reduce foreign dependency."
 ALG_dgi_trait_manpads_systems: "MANPADS Systems"
 ALG_dgi_trait_manpads_systems_desc: "Man-portable air defense systems for infantry and light units."
 ALG_dgi_trait_artillery_modernization: "Artillery Modernization"
 ALG_dgi_trait_artillery_modernization_desc: "Upgrade existing artillery pieces with modern fire control and targeting systems."
 ALG_dgi_trait_cnc_integration: "C3I Systems Integration"
 ALG_dgi_trait_cnc_integration_desc: "Integrate command, control, communications, and intelligence systems across all platforms."
 ALG_dgi_trait_mass_production: "Mass Production Initiative"
 ALG_dgi_trait_mass_production_desc: "Scale up production capabilities to meet military expansion requirements."
 ALG_bcl_trait_desert_adaptation: "Desert Adaptation Package"
 ALG_bcl_trait_desert_adaptation_desc: "Specialized modifications for desert operations including enhanced cooling and dust filtration."
 ALG_bcl_trait_soviet_refurbishment: "Soviet Equipment Refurbishment"
 ALG_bcl_trait_soviet_refurbishment_desc: "Expertise in overhauling and modernizing Soviet-era armored vehicles at reduced cost."
 ALG_bcl_trait_reactive_armor: "Reactive Armor Integration"
 ALG_bcl_trait_reactive_armor_desc: "Add explosive reactive armor to improve protection against shaped charges."
 ALG_bcl_trait_apc_modernization: "APC Modernization Program"
 ALG_bcl_trait_apc_modernization_desc: "Comprehensive upgrades for armored personnel carriers and infantry fighting vehicles."
 ALG_bcl_trait_production_efficiency: "Production Efficiency Improvements"
 ALG_bcl_trait_production_efficiency_desc: "Streamline assembly processes to increase output."
 ALG_snvi_trait_saharan_proven: "Saharan-Proven Designs"
 ALG_snvi_trait_saharan_proven_desc: "Vehicles tested extensively in desert conditions for maximum reliability."
 ALG_snvi_trait_mercedes_partnership: "Mercedes-Benz Partnership"
 ALG_snvi_trait_mercedes_partnership_desc: "Licensed production of Mercedes-Benz commercial vehicle platforms adapted for military use."
 ALG_snvi_trait_mass_production: "Mass Production Expansion"
 ALG_snvi_trait_mass_production_desc: "Expand production facilities to meet increased military demand."
 ALG_snvi_trait_cost_reduction: "Cost Optimization"
 ALG_snvi_trait_cost_reduction_desc: "Reduce per-unit costs through improved manufacturing efficiency."
 ALG_enmib_trait_maintenance_expertise: "Maintenance & Overhaul Expertise"
 ALG_enmib_trait_maintenance_expertise_desc: "Specialized knowledge in helicopter maintenance extends service life and reliability."
 ALG_enmib_trait_licensed_assembly: "Licensed Assembly Operations"
 ALG_enmib_trait_licensed_assembly_desc: "Assemble foreign helicopter designs under license at reduced cost."
 ALG_enmib_trait_production_expansion: "Production Capacity Expansion"
 ALG_enmib_trait_production_expansion_desc: "Expand facilities to increase helicopter production capacity."
 ALG_mek_trait_mediterranean_design: "Mediterranean Naval Design"
 ALG_mek_trait_mediterranean_design_desc: "Ships optimized for Mediterranean Sea operations with improved speed and efficiency."
 ALG_mek_trait_patrol_vessel_expertise: "Patrol Vessel Expertise"
 ALG_mek_trait_patrol_vessel_expertise_desc: "Specialized in building fast patrol boats with enhanced detection capabilities."
 ALG_mek_trait_shipyard_expansion: "Shipyard Expansion Program"
 ALG_mek_trait_shipyard_expansion_desc: "Expand shipyard facilities to increase construction capacity."
 ALG_cnan_trait_frigate_construction: "Frigate Construction Capability"
 ALG_cnan_trait_frigate_construction_desc: "Develop capability to construct modern frigates and destroyers."
 ALG_cnan_trait_anti_air_systems: "Naval Anti-Air Systems"
 ALG_cnan_trait_anti_air_systems_desc: "Integrate modern anti-aircraft systems into surface vessels."
 ALG_cnan_trait_submarine_assembly: "Submarine Assembly"
 ALG_cnan_trait_submarine_assembly_desc: "Licensed assembly of diesel-electric submarines with foreign technical assistance."
 ALG_cnan_trait_foreign_assistance: "Foreign Technical Assistance"
 ALG_cnan_trait_foreign_assistance_desc: "Partnerships with foreign shipbuilders accelerate technological development."
 ALG_cnan_trait_shipyard_modernization: "Shipyard Modernization"
 ALG_cnan_trait_shipyard_modernization_desc: "Modernize shipyard facilities with advanced construction equipment."
 ALG_ersa_trait_mro_expertise: "MRO Expertise"
 ALG_ersa_trait_mro_expertise_desc: "Maintenance, repair, and overhaul expertise ensures maximum aircraft reliability."
 ALG_ersa_trait_licensed_assembly: "Licensed Aircraft Assembly"
 ALG_ersa_trait_licensed_assembly_desc: "Assemble foreign aircraft designs under license at reduced cost."
 ALG_ersa_trait_transport_specialization: "Transport Aircraft Specialization"
 ALG_ersa_trait_transport_specialization_desc: "Focus on military transport aircraft with extended range and efficiency."
 ALG_ersa_trait_production_expansion: "Production Expansion Initiative"
 ALG_ersa_trait_production_expansion_desc: "Expand facilities to increase aircraft production capacity."
 ALG_resistance_power_struggle: "The Power Struggle"
 ALG_resistance_power_struggle_desc: "A silent war is raging between the Algerian people and *Le Pouvoir*. Both sides seek to consolidate support until the inevitable clash decides Algeria's future."
 Resistance_support: "Support the Resistance"
 Resistance_support_desc: "Channel resources to grassroots movements, protests, and underground networks, strengthening the people's defiance of the ruling elite."
 ALG_increase_resistance_tt: "§YThe people grow stronger while the army's influence diminishes.§!"
 Le_Pouvoir_support: "Support *Le Pouvoir*"
 Le_Pouvoir_support_desc: "Direct support to the entrenched elite, bolstering their control of the army and weakening the people's grievances."
 ALG_increase_pouvoir_tt: "§YThe army consolidates control while the people lose momentum.§!"
 Resistance_Final_Clash: "The Final Clash"
 Resistance_Final_Clash_desc: "The conflict between the Resistance and *Le Pouvoir* has reached its peak. The coming months will determine who truly rules Algeria."
 alg_resistance.1.t: "The People Triumph!"
 alg_resistance.1.d: "The Voices of the people have risen against the ruling elites. Massive demonstrations and grassroots organization forced the government to give in. Algeria enters a new era of democratic governance."
 alg_resistance.1.a: "The people have Spoken."
 alg_resistance.2.t: "Le Pouvoir Crushes the Resistance"
 alg_resistance.2.d: "The Entrenched elite, backed by the army, successfully suppressed the resistance. The status quo remains, but simmering discontent threatens future unrest."
 alg_resistance.2.a: "Order has been Restored."
 alg_resistance.3.t: "A Nation in Chaos"
 alg_resistance.3.d: "Neither the Resistance nor Le Pouvoir managed to assert dominance. The power vacuum has plunged Algeria into chaos, with military strongmen and factions competing for control."
 alg_resistance.3.a: "The Country Teeters on the Edge of Collapse."
 alg_resistance.4.t: "The Algerian Crisis Escalates"
 alg_resistance.4.d: "The Fragile Junta cannot hold the state together. Algeria descends deeper into turmoil. Either armed groups ignite a new civil war, or foreign powers move in to restore order by force."
 alg_resistance.4.a: "The Crisis Deepens."
 ALG_african_union_tt: "Algeria strengthens its ties within the §YAfrican Union§!, improving relations with African member states."
 KBY_alg_modifier_desc: "Malorossiya is a state that was created relatively recently, its internal and foreign policy are completely subordinated to Moscow, but still, it has great autonomy in domestic and foreign policy."
