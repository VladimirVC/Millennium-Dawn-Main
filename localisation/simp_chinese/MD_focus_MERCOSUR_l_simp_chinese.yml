 MER_request_mercosur_associate_membership: "申请加入南方共同市场"
 MER_request_mercosur_associate_membership_desc: "向南方共同市场提交正式的准成员国资格申请。如果申请过程顺利，审查期结束后，我们将被纳入该集团的外围圈，从而为更紧密的区域协调打开大门。"
 MER_request_mercosur_full_membership: "申请成为南方共同市场正式成员"
 MER_request_mercosur_full_membership_desc: "提交正式申请，成为南方共同市场正式成员。如果程序顺利进行，审查期结束后，我们的加入将正式生效，使我们完全成为该集团的一员。"
 MER_request_unasul_membership: "申请加入南美联盟"
 MER_request_unasul_membership_desc: "提交加入南美洲国家联盟的正式申请。如果申请获得通过，我们将在审查期结束后加入南美洲国家联盟，而无需等待单独的双边邀请。"
 leave_UNASUL: "退出南美洲国家联盟联合防御机制"
 leave_UNASUL_desc: "退出以南美洲国家联盟联合防御机制为核心的军事联盟，并终止我们参与其共同防御体系。"
 UNASUL_leave_tt: "我们将退出南美洲国家联盟联合防御机制的军事联盟。"
 MER_full_membership_acceptance_hint_desc: "\n\n§Y接受率取决于该国与你的关系值、你对该国的影响力以及南方共同市场国策树的进展！§!"
 MER_full_membership_invite_process_desc: "\n\n§Y如果该国接受，可以选择立即成为正式成员，也可以申请分三步完成的入盟程序。完成所有三项入盟手续后，即可通过投资途径正式加入南美洲国家联盟。§!"
 MER_mercosur_associate_invite_accept_tt: "受邀国成为§Y南方共同市场联系国§!。所有当前§Y南方共同市场成员国§!获得§G+1.00%§!§Y月度生产效率增长§!与§G+1.00%§!§Y外国影响乘数§!，双方均会收到通知。"
 MER_mercosur_associate_invite_reject_tt: "受邀国拒绝了提议，在§Y180天§!内无法再次发送请求，且这次拒绝将使我们损失§R15§!§Y政治点数§!。"
 MER_mercosur_full_invite_accept_tt: "受邀国接受了提议。随后，该国将在§Y立即获得完全成员国资格§!和§Y基于投资的三步加入程序§!之间做出选择，双方均会收到接受通知。"
 MER_mercosur_full_invite_reject_tt: "受邀国拒绝了提议，在§Y365天§!内无法再次发送请求，且这次拒绝将使我们损失§R25§!§Y政治点数§!。"
 MER_unasul_invite_accept_tt: "受邀国加入§Y南美洲国家联盟§!。所有成员国的§Y南美洲国家联盟成员国§!动态国家精神得到更新，§Y政治点数获取§!提升§G+1.00%§!，§Y稳定度§!提升§G+1.00%§!，并在相关区域内触发事件。"
 MER_unasul_invite_reject_tt: "受邀国拒绝了提议，在§Y365天§!内无法再次发送请求，且这次拒绝将使我们损失§R15§!§Y政治点数§!。"
 MER_full_membership_step_one_desc: "\n\n§Y这是入盟流程的第一步。一旦所有三项入盟决议都完成，正式会员国资格即告确立。§!"
 MER_full_membership_step_two_desc: "\n\n§Y这是入盟流程的第二步。一旦所有三项入盟决议都完成，正式会员国资格即告确立。§!"
