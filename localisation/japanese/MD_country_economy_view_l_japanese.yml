 MARKET_PRICES_COMPOSITIES: "$$ [?global.composite_price|2]"
 MARKET_PRICES_COMPOSITIES_TT: "§Y先端複合材料§!の価格情報:\n現在の収入: §G$[?composite_exports|2]§!\n最低価格: §G1.42/単位§!\n最高価格: §G35.40/単位§!"
 total_civilian_factories_amount_tt: "この値は自国の§Y民需産業§!の総数を表している。"
 total_civilian_factories_amount_tt_delayed: "この施設は民生品生産または新しい建物の建設のための工業力を供給する。必要であれば、軍需産業へと転換できる。\n\n州に以下を供給:\n必要労働者数基本値: §Y206K§!\n§Y民需産業§!ごとのGDP出力基本値: $§Y17.5B§!\nエネルギー消費量基本値: §R-0.5§! GW\n\n生産性が§Y民需産業労働人口§!に与える影響: [?worker_requirement_productivity_multiplier_display|-%0]\n法律・国民精神・技術が§Y全施設の労働人口§!に与える影響: [?modifier@buildings_worker_requirement_modifier|-%0]\n法律・国民精神・技術が§Y民需産業労働人口§!に与える影響: [?modifier@civ_facs_worker_requirement_modifier|-%0]\n\n§Y民需産業§!ごとの必要労働者数: [?workers_per_civ_fac_display|2]K\n"
 total_military_factories_amount_tt: "この値は自国の§Y軍需産業§!の総数を表している。"
 total_military_factories_amount_tt_delayed: "新しい軍装品生産のための工業力を供給する。必要であれば、民需産業へと転換できる。\n\n州に以下を供給:\n必要労働者数基本値: §Y18.8K§!\n§Y軍需産業§!ごとのGDP出力基本値: $§Y1.5B§!\nエネルギー消費量基本値: §R-0.5§! GW\n\n法律・国民精神・技術が§Y全施設の労働人口§!に与える影響: [?modifier@buildings_worker_requirement_modifier|-%0]\n法律・国民精神・技術が§Y軍需工場及び造船所労働人口§!に与える影響: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\n§Y軍需産業§!ごとの必要労働者数: [?workers_per_mil_fac_display|2]K\n"
 total_naval_yard_amount_tt: "この値は自国の§Y海軍工廠§!の総数を表している。"
 total_naval_yard_amount_tt_delayed: "§Y海軍造船所§!は、§Y哨戒艇§!、§Y輸送船§!、§Y駆逐艦§!、§Y空母§!など、あらゆる種類の軍艦を造船することができる。\n\n州に以下を供給:\n必要労働者数基本値: §Y18.8K§!\n§Y海軍工廠§!ごとのGDP出力基本値: $§Y1.5B§!\nエネルギー消費量基本値: §R-0.5§! GW\n\n法律・国民精神・技術が§Y全施設の労働人口§!に与える影響: [?modifier@buildings_worker_requirement_modifier|-%0]\n法律・国民精神・技術が§Y軍需工場及び造船所労働人口§!に与える影響: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\n§Y海軍工廠§!ごとの必要労働者数: [?workers_per_dockyard_display|2]K\n"
 total_offices_amount_tt: "この値は自国の§Yオフィス街§!の総数を表している。"
 total_offices_amount_tt_delayed: "§Yオフィス街は§!、鉱業や重工業以外のすべての産業を表す。これには、金融、接客、情報技術、小売業などのサービスが含まれる。\n\n州に以下を供給:\n必要労働者数基本値: §Y473K§!\n§Yオフィス街§!ごとのGDP出力基本値: $§Y50B§!\nエネルギー消費量基本値: §R-0.25§! GW\n\n生産性が§Yオフィス街労働人口§!に与える影響: [?worker_requirement_productivity_multiplier_display|-%0]\n法律・国民精神・技術が§Y全施設の労働人口§!に与える影響: [?modifier@buildings_worker_requirement_modifier|-%0]\n法律・国民精神・技術が§Yオフィス街労働人口§!に与える影響: [?modifier@offices_worker_requirement_modifier|-%0]\n\n§Yオフィス街§!ごとの必要労働者数: [?workers_per_office_display|2]K\n"
 total_agriculture_district_amount_tt: "この値は自国の§Y商業化農業地域§!の総数を表している。"
 total_agriculture_district_amount_tt_delayed: "§Y商業用農業地域§!は、自国において自給農業を除いた農業を表している。これには農産業、耕地、穀物サイロ、食肉処理場などが含まれる。\n\n州に以下を供給:\n必要労働者数基本値: §Y188K§!\n§Y商業用農業地域§!ごとのGDP出力基本値: $§Y25B§!\nエネルギー消費量基本値: §R-0.10§! GW\n州からの§Y燃料獲得§!: 8\n§Y現地の供給§!: 1.5%\n\n生産性が§Y商業用農業地域労働人口§!に与える影響: [?worker_requirement_productivity_multiplier_display|-%0]\n法律・国民精神・技術が§Y全施設の労働人口§!に与える影響: [?modifier@buildings_worker_requirement_modifier|-%0]\n法律・国民精神・技術が§Y商業用農業地域労働人口§!に与える影響: [?modifier@agriculture_district_worker_requirement_modifier|-%0]\n\n§Y商業用農業地域§!ごとの必要労働者数: [?workers_per_agriculture_district_display|2]K\n"
 total_microchips_factories_amount_tt: "この値は自国の§Yマイクロチップ工場§!の総数を表している。"
 total_microchips_factories_amount_tt_delayed: "§YMicrochip Plants§! represent the semiconductor and small electronics production of our nation.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YMicrochip Plant§!: $§Y32 Billion§!\nBase Energy Consumption: §R-0.75§! GW\n\nProductivity impact on §YMicrochip Plants§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YMicrochip Plants Workforce§!: [?modifier@microchip_plant_worker_requirement_modifier|-%0]\n\nWorkers Required per §YMicrochip Plant§!: [?workers_per_microchip_plant_display|2]K\n"
 total_composites_factories_amount_tt: "この値は自国の§Y複合プラント§!の総数を表している。"
 total_composites_factories_amount_tt_delayed: "§YComposite Plants§! represent advanced materials production facilities, including ceramic armors, reinforced polymers and high-performance structural materials.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YComposite Plant§!: $§Y28 Billion§!\nBase Energy Consumption: §R-0.8§! GW\n\nProductivity impact on §YComposite Plants§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YComposite Plants Workforce§!: [?modifier@composite_plant_worker_requirement_modifier|-%0]\n\nWorkers Required per §YComposite Plant§!: [?workers_per_composite_plant_display|2]K\n"
 total_refineries_amount_tt: "この値は自国の§Y合成精製所§!の総数を表している。"
 total_refineries_amount_tt_delayed: "§YSynthetic Refineries§! represent industrial facilities responsible for producing synthetic rubber and related chemical materials critical for industry and logistics.\n\nProvides the state with:\nBase Number of Required Workers: §Y184K§!\nBase GDP Output per §YSynthetic Refinery§!: $§Y10 Billion§!\nBase Energy Consumption: §R-0.2§! GW\n\nProductivity impact on §YSynthetic Refineries§!: [?worker_requirement_productivity_multiplier_display|-%0]\nLaw, National Spirits and Tech impact on §YWorkforce on All Buildings§!: [?modifier@buildings_worker_requirement_modifier|-%0]\nLaw, National Spirits and Tech impact on §YSynthetic Refineries Workforce§!: [?modifier@synthetic_refinery_worker_requirement_modifier|-%0]\n\nWorkers Required per §YSynthetic Refinery§!: [?workers_per_synthetic_refinery_display|2]K\n"
