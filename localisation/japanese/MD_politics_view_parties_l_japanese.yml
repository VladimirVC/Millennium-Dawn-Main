 EST.conservatism_1_desc: "国民保守主義 - 祖国連合（エストニア語：Isamaa Erakond）\n\n 祖国連合はエストニアのキリスト教民主主義・国民保守主義政党である。同党は社会的に保守的、経済的に自由主義的という複数の価値観を掲げている。また党名「祖国連合」が示すように、エストニアにおけるナショナリズムを訴求している。"
