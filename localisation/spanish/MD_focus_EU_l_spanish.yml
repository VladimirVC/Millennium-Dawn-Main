 eu_gui_tooltip_delayed: "Abre la pantalla que contiene toda la información sobre §C[EUU.GetFlag][EUU.GetName]§!, incluido el Parlamento Europeo, los Titulares de Cargos de la Unión Europea, el Consejo de la Unión Europea y el Presupuesto Europeo."
 fiscal_button_title: "Banco Central"
 fiscal_button_desc: "The budget of §C[EUU.GetFlag][EUU.GetName]§!. The screen handles everything that includes the Multi-Annual Financial Framework and the Budget of the next fiscal year."
 euro_voting_button_title: "Concejo"
 euro_voting_button_desc: "El Consejo de la Unión Europea es el segundo órgano legislativo de §C[EUU.GetFlag][EUU.GetName]§! en Millennium Dawn. El Consejo de la Unión Europea representa a los estados miembros en el procedimiento legislativo. Toda la legislación aprobada actualmente, la legislación redactada y la lista de los miembros votantes de §C[EUU.GetFlag][EUU.GetName]§!.\n\nEl Consejo de la Unión Europea opera sobre la base de la Votación por Mayoría Cualificada (CVM), comúnmente conocida como doble mayoría. Requiere el 55% de los §CEstados miembros§! y el 65% de la §CEstados miembros§! de la Población de la Unión Europea."
 parliament_button_title: "Parlamento"
 parliament_button_desc: "El Parlamento Europeo es el primer órgano legislativo de §C[EUU.GetFlag][EUU.GetName]§! en Millennium Dawn. El Parlamento Europeo es el primer lugar donde las leyes pueden ser sometidas a votación para convertirse en actos legales de la Unión Europea.\n\nEl jugador tendrá 14 días para completar la misión (consultar las decisiones) reuniendo el apoyo mayoritario de los Miembros del Parlamento Europeo (MEPs). Una vez aprobada la ley, se pasa al Consejo de la Unión Europea."
 EU_europeanism_screen_title: "Información europea"
 EU_europeanism_screen_desc: "The Euro-Info tab contains information about the European Union such as the member states, their population, the ratio of their pop, and the Europeanism values of the European Union."
 EU_offices_screen_title: "Oficinas"
 EU_offices_screen_desc: "Las Oficinas de §C[EUU.GetFlag][EUU.GetName]§!. Las oficinas de §C[EUU.GetFlag][EUU.GetName]§! son el conjunto de posiciones que pueden ser ocupadas por un estado miembro de la Unión Europea."
