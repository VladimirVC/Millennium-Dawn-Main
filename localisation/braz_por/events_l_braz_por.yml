 UN.410.d: "The §BUnited Nations§! §YGeneral Assembly§! has passed a non-binding resolution on §YPoverty Reduction§!. Although we did not vote in favor of this resolution, we may still choose to accept and implement it.\n\nShould we agree to follow this resolution?"
