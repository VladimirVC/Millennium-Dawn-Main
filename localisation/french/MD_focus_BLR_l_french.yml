l_french:
 belorussia_focus: "Priorités nationales biélorusses"
 BLR_china_friendship: "Partenariat avec la Chine"
 BLR_china_friendship_desc: "Nous entendons renforcer les relations amicales entre nos pays."
 BLR_Bel_G2: "BELGEE"
 BLR_Bel_G2_desc: "JSC \"BELGEE\" est une coentreprise biélorusse-chinoise pour l'assemblage de voitures particulières chinoises Geely. L'une des deux entreprises d'assemblage de voitures particulières en Biélorussie. Il est situé sur les terrains loués de la JSC \"Borisovsky Plant Autohydrousilitel\" près de Borisov."
 BLR_Chinese_Modernization_Railway: "Modernisation des chemins de fer"
 BLR_Chinese_Modernization_Railway_desc: "Nos collègues chinois ont accepté de financer la modernisation du réseau ferroviaire de notre pays."
 BLR_Credit_tec2: "Crédit Pour L'Amélioration Du CHP"
 BLR_Credit_tec2_desc: "Nos centrales thermiques de Minsk nécessitent une modernisation ; nous allons solliciter un prêt auprès de la Chine à cet effet."
 BLR_AES: "Centrale nucléaire biélorusse"
 BLR_AES_desc: "Nous allons enfin construire notre propre centrale nucléaire."
 BLR_Chinese_kal: "Accord commercial avec la Chine"
 BLR_Chinese_kal_desc: "Nous allons conclure un accord commercial avec la Chine, ce qui nous permettra d'accroître la capacité de production de Grodno Azot."
 BLR_Chinese_zdania: "Construction de nouvelles usines"
 BLR_Chinese_zdania_desc: "Le gouvernement chinois accroît ses investissements dans notre pays et est prêt à construire de nouvelles usines."
 BLR_Chinese_konfuci: "Instituts Confucius"
 BLR_Chinese_konfuci_desc: "Nous ouvrirons plusieurs instituts Confucius dans notre pays."
 BLR_Chinese_Poezda: "Achat de trains en Chine"
 BLR_Chinese_Poezda_desc: "Nous allons acheter plusieurs trains en Chine, ce qui contribuera à améliorer notre approvisionnement."
 BLR_Chinese_huawei: "Coopération avec Huawei"
 BLR_Chinese_huawei_desc: "Nous allons établir une coopération étroite avec cette entreprise chinoise."
 BLR_Chinese_energy: "Investissements chinois dans notre secteur énergétique"
 BLR_Chinese_energy_desc: "Les entreprises chinoises poursuivent leur offensive d'investissements à travers notre pays et sont désormais prêtes à investir à nouveau dans notre secteur énergétique."
 BLR_Chinese_uchenia: "Exercices avec l'armée chinoise"
 BLR_Chinese_uchenia_desc: "L'échange d'expériences entre nos forces armées sera très utile."
 BLR_Chinese_yuan: "Le yuan est la deuxième monnaie du pays"
 BLR_Chinese_yuan_desc: "Nous sommes prêts à accepter le yuan comme deuxième monnaie de notre pays."
 BLR_Chinese_skynet: "Expérience chinoise de contrôle d'Internet"
 BLR_Chinese_skynet_desc: "Nous sommes prêts à tirer les leçons de l'expérience de surveillance des réseaux sociaux."
 BLR_Chinese_economic: "Expérience économique chinoise"
 BLR_Chinese_economic_desc: "Nous mettons en œuvre toute l'expérience acquise par l'économie chinoise."
 BLR_military_exercises_CHI_idea: "Exercices biélorusses-chinois"
 BLR_Socialist_Market_Economy: "Économie socialiste de marché"
 BLR_minotor_servise_sov: "Service Minotor biélorusse"
 BLR_minotor_servise_blr: "Contrat Minotor avec la Russie"
 BLR_558zadov_contract: "Contrat avec 558 usines de réparation d'avions"
 BLR_peleng_contract: "Contract With The Company Peleng"
 BLR_peleng_contract_desc: "[BLR.GetFlag]Société biélorusse de développement et de production de produits optoélectroniques à usage militaire et civil, leader du secteur en République de Biélorussie."
 BLR_peleng_union_state: "[BLR.GetFlag]JSC Peleng"
 BLR_peleng_union_state_desc: "[SOV.GetFlag]Société d'État de l'Union pour le développement et la production de produits optoélectroniques à usage militaire et civil, la société leader du secteur dans l'État de l'Union."
 BLR_peacerota_idea: "Contingent de maintien de la paix"
 BLR_Foreign_legion_idea: "Légion étrangère"
 BLR_sso_idea: "Forces d'opérations spéciales"
 BLR_ter_orobona_idea: "Défense territoriale"
 BLR_mzkt_contract: "Contrat avec MZKT"
 BLR_mzkt_contract_desc: "L'usine de tracteurs à roues de Minsk (MZKT) est une entreprise spécialisée dans la production de véhicules lourds routiers et tout-terrain, de véhicules remorqués et de châssis spéciaux à roues destinés aux secteurs de la construction, du pétrole et du gaz, et de la construction mécanique. Il s'agit d'une entreprise publique placée sous la tutelle du Comité militaro-industriel d'État de la République du Bélarus."
 BLR_mzkt_contract_another: "Contrat avec MZKT"
 BLR_mzkt_another_desc: "L'usine de tracteurs à roues de Minsk (MZKT) est une entreprise spécialisée dans la production de véhicules lourds routiers et tout-terrain, de véhicules remorqués et de châssis spéciaux à roues destinés aux secteurs de la construction, du pétrole et du gaz, et de la construction mécanique. Il s'agit d'une entreprise publique placée sous la tutelle du Comité militaro-industriel d'État de la République du Bélarus."
 BLR_mzkt_contract_blr: "Contrat MZKT avec [SOV.GetNamewithFlag]"
 BLR_mzkt_contract_blr_desc: "L'usine de tracteurs à roues de Minsk (MZKT) est une entreprise spécialisée dans la production de véhicules lourds routiers et tout-terrain, de véhicules remorqués et de châssis spéciaux à roues destinés aux secteurs de la construction, du pétrole et du gaz, et de la construction mécanique. Il s'agit d'une entreprise publique placée sous la tutelle du Comité militaro-industriel d'État de la République du Bélarus."
 BLR_mzkt_union_state: "[BLR.GetFlag]Usine de tracteurs à roues de Minsk"
 BLR_mzkt_union_state_desc: "L'usine de tracteurs à roues de Minsk (MZKT) est une entreprise spécialisée dans la production de véhicules lourds routiers et tout-terrain, de véhicules remorqués et de châssis spéciaux à roues destinés aux secteurs de la construction, du pétrole et du gaz, et de la construction mécanique. Elle relève actuellement de la juridiction de l'État de l'Union."
 BLR_140_zavod_remont: "La 140ème usine de réparation"
 BLR_140_zavod_remont_desc: "L'usine de réparation n° 140 est une entreprise d'État du complexe militaro-industriel du Bélarus, spécialisée dans la réparation et la modernisation des véhicules blindés et de leurs moteurs."
 BLR_140_zavod_union_state: "[BLR.GetFlag]La 140ème usine de réparation"
 BLR_140_zavod_union_state_desc: "L'usine de réparation n° 140 est une entreprise d'État du complexe militaro-industriel de l'État d'Union [SOV.GetFlag], spécialisée dans la réparation et la modernisation des véhicules blindés et de leurs moteurs."
 BLR_Brigade_Territorial_Defence: "Créer une Brigade de Défense Territoriale"
 BLR_Brigade_Territorial_Defence_desc: "Le déclenchement de la guerre nous oblige à constituer une force de défense territoriale."
 BLR_Transport_troops: "Troupes de transport"
 BLR_Transport_troops_desc: "Troupes spéciales conçues pour effectuer des tâches de soutien au transport."
 BLR_sso: "Création de forces d'opérations spéciales"
 BLR_sso_desc: "Les Forces d'opérations spéciales des Forces armées de la République de Biélorussie, branche hautement mobile des Forces armées de la République de Biélorussie, succèdent aux Forces aéroportées de l'URSS et aux forces spéciales du GRU de l'URSS en La République de Biélorussie. Tâches principales : activités de contre-sabotage, renseignement, lutte contre les groupes armés illégaux, exécution de diverses tâches en utilisant des méthodes spéciales afin de mettre fin au conflit armé contre la République de Biélorussie. Ils constituent l’un des principaux éléments de dissuasion stratégique."
 BLR_trans_army: "Création de troupes de transport"
 BLR_trans_army_desc: "Les troupes de transport biélorusses constituent la branche des forces armées biélorusses chargée du transport du personnel et du matériel par camion, train et avion. Elles sont conçues pour assurer le soutien logistique des formations militaires des autres branches des forces armées à travers le pays."
 BLR_end_reform: "Achever la réforme de l'armée"
 BLR_end_reform_desc: "Nous achèverons les réformes de notre armée, et elle répondra désormais aux normes modernes."
 USSR_Legacy: "L'héritage de l'URSS"
 USSR_Legacy_desc: "Nous mettrons tout en œuvre pour développer et consolider l'héritage que nous avons reçu."
 BLR_mi_8: "Mi-8"
 BLR_MZKT: "MZKT"
 BLR_MZKT_desc: "L'usine de tracteurs à roues de Minsk est une entreprise spécialisée dans la production de véhicules lourds routiers et tout-terrain, de véhicules remorqués et de châssis spéciaux à roues destinés aux secteurs de la construction, du pétrole et du gaz, et de la construction mécanique. Il s'agit d'une entreprise d'État placée sous la tutelle du Comité militaro-industriel d'État de la République du Bélarus."
 BLR_minoitor: "Service Minotor"
 BLR_minoitor_desc: "Minotor-Service est une entreprise biélorusse basée à Minsk, spécialisée dans le développement, la production, la modernisation, la réparation et la maintenance de véhicules blindés de combat, ainsi que dans la fourniture de pièces détachées. Elle figure parmi les entreprises phares du complexe militaro-industriel du pays."
 BLR_belspecveshtech: "Belspetsvneshtechnika"
 BLR_belspecveshtech_desc: "Belspetsvneshtechnika (BSVT) est une entreprise unitaire de commerce extérieur à propriété publique biélorusse, fondée en 1995. Spécialisée dans le commerce et la production d'armements et de biens à double usage, elle est membre du Comité militaro-industriel d'État et considérée comme la principale entreprise du pays dans le domaine des exportations d'armements."
 BLR_140_zavod: "140 Usine de réparation"
 BLR_140_zavod_desc: "L'usine de réparation n° 140 est une entreprise d'État du complexe militaro-industriel du Bélarus, spécialisée dans la réparation et la modernisation des véhicules blindés et de leurs moteurs."
 BLR_polonez: "Commencez à développer notre MLRS avec la Chine"
 BLR_polonez_desc: "Nous avons sollicité l'aide de nos collègues chinois pour créer notre système de lance-roquettes multiples."
 BLR_peleng: "Peleng"
 BLR_peleng_for_russia: "Équipement ATGM"
 BLR_peleng_for_russia_desc: "We are ready to launch the production of equipment for the Russian ATGM."
 BLR_peleng_for_ukr: "Équipement ATGM"
 BLR_peleng_for_ukr_desc: "We are ready to launch the production of equipment for the Ukrainian ATGM."
 BLR_558_zavod: "558 Usine de réparation d'aéronefs"
 BLR_558_zavod_desc: "The 558th Aviation Repair Plant is one of the largest enterprises in the CIS for the repair and modernization of modern combat aviation equipment in service with the Air Forces of post-Soviet countries and many foreign nations alike. It is the most important aircraft repair facility in Belarus, located in the city of Baranovichi."
 BLR_Communism_start: "Le retour du communisme"
 BLR_Communism_start_desc: "Le communisme est de retour en Biélorussie. Le Parti communiste va-t-il une fois de plus instaurer le marxisme-léninisme dans le pays ?"
 BLR_trade_with_nko: "commercer avec la Corée du Nord"
 BLR_trade_with_nko_desc: "La Corée du Nord, bien que petit pays, est notre alliée dans le camp socialiste avec lequel nous sommes prêts à établir des relations commerciales."
 BLR_nko_workers: "Travailleurs nord-coréens"
 BLR_nko_workers_desc: "Nous sommes prêts à accueillir des travailleurs nord-coréens dans notre pays. Ils sont réputés pour leur efficacité et leur ardeur au travail."
 BLR_nko_miiltary_coop: "Coopération technique militaire avec la Corée du Nord"
 BLR_nko_miiltary_coop_desc: "Nous sommes prêts à entamer une coopération militaro-technique avec l'Armée populaire nord-coréenne."
 BLR_rotation_KGB: "Rotation au KGB"
 BLR_rotation_KGB_desc: "Nous procédons à une rotation du personnel, car nous avons maintenant besoin d'une organisation forte et performante."
 BLR_North_Korea_workers: "Travailleurs nord-coréens"
 BLR_SMERSH_2: "SMERSH 2.0"
 BLR_SMERSH_2_desc: "Nous allons relancer le SMERSH. Il est temps de mettre l'expérience soviétique au service de la nation."
 BLR_arest_silovic: "Arrest of Security Forces"
 BLR_arest_silovic_desc: "De nombreuses forces de sécurité se sont déclarées en désaccord avec le nouveau gouvernement, il est temps de les purger."
 BLR_antigay_propaganda_laws: "Lois sur la propagande anti-gay"
 BLR_antigay_propaganda_laws_desc: "It is time to legally prohibit LGBT propaganda in our country."
 BLR_clean_soc_net: "Réseau social propre"
 BLR_clean_soc_net_desc: "Nous allons nettoyer tous les réseaux sociaux, nous ne permettrons pas la diffusion de la propagande ennemie."
 BLR_pioneria: "Pioneria"
 BLR_pioneria_desc: "Les jeunes ne doivent pas rester inactifs, c'est pourquoi nous allons relancer le mouvement des Jeunes Pionniers."
 BLR_Marks_school: "Le marxisme dans les écoles"
 BLR_Marks_school_desc: "Le programme scolaire inclura nécessairement un enseignement marxiste."
 BLR_free_education: "Education gratuite"
 BLR_free_education_desc: "L'éducation devrait être gratuite et accessible à tous les citoyens de notre glorieux pays."
 BLR_state_atheism: "Athéisme d'État"
 BLR_state_atheism_desc: "Religion is the opium of the people, and it is time to fight its influence."
 BLR_collectivism: "Collectivisme"
 BLR_collectivism_desc: "Collectivization has worked before, so we will repeat the experience."
 BLR_fight_international_capitalists: "Combattre les capitalistes internationaux"
 BLR_fight_international_capitalists_desc: "Les oligarques constituent une classe dangereuse et corrompue, pas meilleure que les koulaks de l'époque soviétique. Depuis la dissolution de l'URSS, les oligarques russes et biélorusses ont accaparé un pouvoir économique toujours plus grand et chassé les travailleurs biélorusses de leur emploi au profit d'un modèle économique mondialisé, piloté par des entreprises étrangères. Pour faire renaître un véritable socialisme, il est indispensable d'éliminer au préalable la classe capitaliste internationale."
 BLR_weaken_the_banks: "Affaiblir les banques"
 BLR_weaken_the_banks_desc: "Les banques sont la garde prétorienne du capitalisme, portant sa bannière au combat et défendant ses profits par leur existence même. Ils s’immiscent dans les régions pauvres du monde, abusent de la classe ouvrière en pratiquant le dumping salarial et la spéculation sur les intérêts, et ils influencent la politique par des dons légaux et illégaux. Les banques doivent être ramenées à un état dans lequel elles ne sont que de simples prêteurs d’argent apolitiques à court terme."
 BLR_ultimate_tax_reform: "Grande réforme fiscale"
 BLR_ultimate_tax_reform_desc: "Nous avons l'intention de mener une importante réforme fiscale, qui allègera la charge fiscale des particuliers, mais qui aura l'effet inverse sur les entreprises."
 BLR_single_party: "Parti unique"
 BLR_single_party_desc: "Il ne devrait y avoir qu'un seul parti, car nous n'avons qu'une seule voie vers le socialisme."
 BLR_nationalize_foreign_business: "Nationaliser les entreprises étrangères"
 BLR_nationalize_foreign_business_desc: "Les usines appartenant à des étrangers représentent toujours un risque pour la sécurité économique. Face aux menaces de sanctions économiques de la part de pays étrangers, la crainte que les propriétaires quittent le pays du jour au lendemain en emportant avec eux des éléments essentiels de leurs installations est constante. Pour éviter cela, nous devons récupérer ces industries pour l'État, même si cela heurte la sensibilité d'autres nations."
 BLR_five_year_plan: "Premier plan quinquennal"
 BLR_five_year_plan_desc: "The free economic models of Western states offer no future for a socialist country. A return to a planned economy, preferably in the form of classical Soviet-style Five-Year Plans, will give the government great influence over the previously unchecked economy."
 BLR_reestablish_the_military_industrial_complex: "Rétablir le complexe militaro-industriel"
 BLR_reestablish_the_military_industrial_complex_desc: "L’armée et le peuple ne font qu’un !"
 BLR_mobilize_the_masses: "Mobiliser les masses"
 BLR_mobilize_the_masses_desc: "Notre armée a besoin de gens pour défendre les intérêts de notre pays partout où le parti l'exige"
 BLR_better_roads: "Amélioration générale des routes"
 BLR_better_roads_desc: "Il est nécessaire de s'attaquer de près au problème des routes dans notre pays."
 BLR_progress_cult: "Culte du progrès"
 BLR_progress_cult_desc: "Les socialistes aspirent à un progrès sociétal et scientifique. Ce dernier est particulièrement important au XXIe siècle, non seulement pour des raisons de sécurité nationale, mais aussi pour propager la révolution et réaliser le programme socialiste, ce qui ne peut être pleinement accompli que si la science et la technologie atteignent un certain niveau de progrès."
 BLR_soviet_academy_of_sciences: "Académie soviétique des sciences"
 BLR_soviet_academy_of_sciences_desc: "L'Académie des sciences soviétique était la principale institution scientifique de l'Union soviétique. Nos esprits les plus brillants y œuvreront à nouveau sans relâche pour réaliser des percées technologiques et scientifiques qui feront un jour de nous l'envie du monde capitaliste !"
 BLR_the_culture_of_proletarianism: "Culture du prolétarisme"
 BLR_the_culture_of_proletarianism_desc: "It is time to cultivate a proletarian culture for the working class, with which we will move together toward a common, beautiful communist future."
 BLR_empower_the_kgb: "Développer l'influence du KGB"
 BLR_empower_the_kgb_desc: "Nous entendons étendre l'influence du KGB dans notre pays afin que l'ennemi ne puisse pas saper notre système intérieur. Par conséquent, nous allons lui octroyer des pouvoirs encore plus importants pour mener à bien nos activités."
 BLR_erase_nationalist: "Mettez tous les nationalistes en prison"
 BLR_erase_nationalist_desc: "It is time to eliminate nationalist cells in our country."
 BLR_the_litbel_start: "Renaissance de Litbel"
 BLR_the_litbel_start_desc: "La Lituanie est une république soviétique qui a brièvement existé durant la guerre civile russe. L'idée de nous allier à nos frères lituaniens nous paraît très tentante."
 BLR_peaceful_litbel: "Drapeau rouge sur la Lituanie"
 BLR_peaceful_litbel_desc: "Nous avons tout préparé. Tous les agents, tous les citoyens enrôlés et les politiciens sont à leur poste. Il est temps de libérer la Lituanie de l'occupation du gouvernement fantoche."
 BLR_the_litbel: "État de deux peuples"
 BLR_the_litbel_desc: "Le moment est venu pour nous de devenir un seul pays, uni par deux peuples : le Biélorusse et le Lituanien."
 BLR_dissolve_monasteries: "Dissolution des monastères"
 BLR_dissolve_monasteries_desc: "Nous purifierons complètement notre pays de toute religion !"
 BLR_support_of_the_worker: "Soutien aux travailleurs"
 BLR_support_of_the_worker_desc: "The working class is our support and strength. We will always support them in the fight against the capitalist contagion!"
 BLR_litbel_attack_lat: "Latgale biélorusse"
 BLR_litbel_attack_lat_desc: "The lands of Latgale have long been torn away from us by Latvia. It is time to end this injustice."
 BLR_litbel_annex_lat: "La fin de l'État letton"
 BLR_litbel_annex_lat_desc: "Les terres latgaliennes sont de nouveau à nous."
 BLR_presidential_election_of_2001: "La sphère politique"
 BLR_presidential_election_of_2001_desc: "Il est temps de décider qui dirigera notre pays au cours du nouveau millénaire."
 BLR_Andrey_sannikov: "La voie de la démocratie occidentale"
 BLR_Andrey_sannikov_desc: "Notre pays a élu un nouveau dirigeant. Il va désormais nous conduire vers un brillant avenir démocratique."
 BLR_Join_GUAM: "Rejoignez GUAM"
 BLR_Join_GUAM_desc: "We will strengthen our ties in the post-Soviet space by joining GUAM."
 BLR_American_Protection: "Protection américaine"
 BLR_American_Protection_desc: "We need America's help, because Russia is unlikely to ignore our actions."
 BLR_Linking_foreign_currency: "Lier notre monnaie à l'euro"
 BLR_Linking_foreign_currency_desc: "The instability of our currency must be eliminated. We will bind our currency to the Euro."
 BLR_closed_border_with_Russia: "Fermeture de la frontière avec la Russie"
 BLR_closed_border_with_Russia_desc: "We are putting up border posts with Russia again. No one from Russian territory will be able to move freely into our country."
 BLR_NATO_Membership_Campaign: "Campagne d'adhésion à l'OTAN"
 BLR_NATO_Membership_Campaign_desc: "It is time to start a campaign to prepare for joining NATO."
 BLR_USA_military_Cooperation: "Coopération technologique militaire américaine"
 BLR_USA_military_Cooperation_desc: "Cooperation with the United States in the military-technical sphere promises us significant advantages."
 BLR_Invite_NATO_advisors: "Inviter des conseillers militaires de l’OTAN"
 BLR_Invite_NATO_advisors_desc: "Now that we have completely reformed our military command, we will invite NATO military advisers."
 BLR_USAD_request: "Demander à l'USAID"
 BLR_USAD_request_desc: "We have decided to contact USAID for support."
 BLR_Military_Exercises_NATO: "Exercices militaires avec l'OTAN"
 BLR_Military_Exercises_NATO_desc: "Our army will hold its first joint exercises with NATO."
 BLR_NATO_integration_command: "Commandement de l'intégration de l'OTAN"
 BLR_NATO_integration_command_desc: "The NATO Integration Command is our next step towards joining the Alliance."
 BLR_Request_NATO_membership: "Demander l'adhésion à l'OTAN"
 BLR_Request_NATO_membership_desc: "It is time to apply for NATO membership."
 BLR_western_diplomats: "Diplomates occidentaux"
 BLR_western_diplomats_desc: "Diplomats from Western countries visited us and congratulated us on the victory we had achieved. Now Belarus can choose the path toward the West."
 BLR_denied_sanctions: "Levée des sanctions"
 BLR_denied_sanctions_desc: "Now that we have held legitimate elections, all sanctions against us will be lifted."
 BLR_people_rights: "Droits humains"
 BLR_people_rights_desc: "We must respect the rights and freedoms of our people."
 BLR_Freedom_Meetings: "Liberté de réunion et d'assemblée"
 BLR_Freedom_Meetings_desc: "The right to meetings and assemblies must be secured."
 BLR_dont_torture: "Réforme des soins de santé"
 BLR_dont_torture_desc: "Quality healthcare is one of the most basic needs of our citizens. By delivering it, we will be able to build a better country."
 BLR_EU_integration: "Intégration dans l'UE"
 BLR_EU_integration_desc: "We intend to integrate into the European Union."
 BLR_Attract_European_investments: "Attirer les investissements européens"
 BLR_Attract_European_investments_desc: "We are ready to attract European investors to improve our economy."
 BLR_Opening_garment: "Ouverture d'usines de confection pour des marques populaires"
 BLR_Opening_garment_desc: "We are ready to establish the production of clothing for popular brands on the territory of our country."
 BLR_simplification_labor_code: "Simplification du Code du travail"
 BLR_simplification_labor_code_desc: "It is necessary to change the norms of labor legislation so that employees cannot constantly resort to trade unions instead of working."
 BLR_Encourage_Exchange_Students_desc: "Our students are ready to participate in an exchange program with European counterparts."
 BLR_Adopt_EU_Intellectual: "Adopter les lois européennes sur la propriété intellectuelle"
 BLR_Adopt_EU_Intellectual_desc: "Les lois européennes sur la propriété intellectuelle doivent être adoptées pour se conformer aux normes européennes dans ce domaine."
 BLR_Digitalization: "Numérisation"
 BLR_Digitalization_desc: "It is necessary to digitize production processes to improve their quality."
 BLR_political_platforms: "Créer des plateformes politiques pour les entreprises étrangères"
 BLR_political_platforms_desc: "Perhaps we should allow foreign companies access to our political platforms?"
 BLR_Custom_Institutional_reforms: "Biocarburant"
 BLR_Custom_Institutional_reforms_desc: "Les sources de carburant alternatives peuvent nous aider à réduire notre dépendance à l’égard des pays avec lesquels nous ne souhaitons pas entretenir de liens amicaux."
 BLR_Market_Economy: "Économie de marché fonctionnelle"
 BLR_Market_Economy_desc: "A full-fledged market economy is what we have been striving for, and it is what should function in a European and democratic country."
 BLR_Delete_KGB2: "Dissoudre le KGB"
 BLR_Delete_KGB2_desc: "Nous remplacerons le KGB par une nouvelle structure : le Service de sécurité nationale. Cette organisation sera recrutée parmi des salariés fidèles à nos idéaux occidentaux."
 BLR_US_money: "Investissements américains"
 BLR_US_money_desc: "We need money to further build democracy in our country."
 BLR_join_wto: "Adhésion à l'OMC"
 BLR_join_wto_desc: "Joining the WTO will give us many advantages and access to international markets."
 BLR_release_political_prisoners: "Libérer les prisonniers politiques"
 BLR_release_political_prisoners_desc: "Many people were imprisoned for political reasons under the previous government. We will fix this."
 BLR_baltic_economic_cooperation: "Partenariat commercial avec les pays baltes"
 BLR_baltic_economic_cooperation_desc: "Our nearest neighbors are excellent trading partners. Their coastal location and common borders give us strong reasons to improve our trade performance."
 BLR_root_out_nationalists: "Débarrassez-vous des nationalistes"
 BLR_root_out_nationalists_desc: "Nationalists have always been a problem in our country. They will only lead to instability, and it is time to deal with them."
 BLR_decommunize_belarus_society: "Décommunisation de la société biélorusse"
 BLR_decommunize_belarus_society_desc: "The Soviet legacy must be left behind. The time has come to embrace the progressive West."
 BLR_fight_the_oligarchs: "Lutte contre les oligarques"
 BLR_fight_the_oligarchs_desc: "We cannot allow oligarchs to hold power in our country, or we will definitely not see economic growth."
 BLR_European_university_connections: "Éducation européenne"
 BLR_European_university_connections_desc: "We are ready to welcome European universities into our country to improve the quality of education for our students."
 BLR_LGBT_Belarus_quest: "Problème LGBT en Biélorussie"
 BLR_LGBT_Belarus_quest_desc: "La question LGBT a été mise à l’ordre du jour par notre gouvernement, car nous ne pouvons ignorer cette tendance. Qu'allons nous faire?"
 BLR_Offshore_heaven: "Allégements fiscaux pour les investisseurs étrangers"
 BLR_Offshore_heaven_desc: "We will create favorable conditions for investment in our country, which will attract many investors."
 BLR_wind_farms: "Parcs éoliens"
 BLR_wind_farms_desc: "We have built several wind farms in the districts of Minsk."
 BLR_Hajdukiewicz: "§YGaidukevich§!"
 BLR_Hajdukiewicz_desc: "Sergey Vasilyevich Gaidukevich (born September 8, 1954) is a Belarusian politician and public figure, leader of the Liberal Democratic Party of Belarus. He is a reserve colonel known for his pro-Russian orientation. He stands for confederation with Russia and the introduction of a single currency with an issue center in Moscow, as well as for conducting a joint military policy."
 BLR_Spiritual_revival: "Renouveau spirituel de la Biélorussie"
 BLR_Spiritual_revival_desc: "The process of spiritual revival of Belarus should continue. The role of the Orthodox Church and the Roman Catholic Church in society should increase."
 BLR_Ban_Enemies: "Combattre les ennemis internes"
 BLR_Ban_Enemies_desc: "We must completely clear the political field in our country. No destructive parties financed from abroad should interfere with our country's development."
 BLR_Russian_Oligarch: "Amitié avec les oligarques russes"
 BLR_Russian_Oligarch_desc: "Russian oligarchs command enormous wealth. I think it is worth winning them over."
 BLR_Hardline_EuroScepticism: "Euroscepticisme pur et dur"
 BLR_Hardline_EuroScepticism_desc: "Tough Euroscepticism is necessary, because Europe wants a weak Belarus."
 BLR_Belarusian_nation_law: "Loi nationale biélorusse"
 BLR_Belarusian_nation_law_desc: "Our nation has long earned the right to self-determination. We are a people with a great history and must stride toward a bright future as a sovereign nation."
 BLR_russian_education: "Éducation russe"
 BLR_russian_education_desc: "Our universities should establish ties with Russian ones. This way, we will be able to offer Russian-style education to everyone."
 BLR_Son_will_rule: "Laissons le fils gouverner"
 BLR_Son_will_rule_desc: "It is time to change the leader. Now Sergei Gaidukevich's son will lead the party and the country."
 BLR_rus_media: "Laissez entrer les médias russes"
 BLR_rus_media_desc: "We will allow Russian media into our territory without restrictions."
 BLR_russian_fsb: "Let In The FSB Representative offices"
 BLR_russian_fsb_desc: "The FSB will work together with our special services and provide us with greater political stability."
 BLR_science_boost: "Investir dans la science"
 BLR_science_boost_desc: "Science should be funded as generously as possible from the state budget."
 BLR_support_promka: "Soutien à l'industrie nationale"
 BLR_support_promka_desc: "We will support the domestic industry."
 BLR_boost_economic: "Accélérer la croissance économique"
 BLR_boost_economic_desc: "Our reforms are making themselves felt and the economy has started to grow."
 BLR_anti_gibdd: "Politique anti-LGBT"
 BLR_anti_gibdd_desc: "We reject and will fight LGBT propaganda in our country."
 BLR_union_state_course: "Cap vers l’État de l’Union"
 BLR_union_state_course_desc: "Our goal is the Union State, and we will strive for it."
 BLR_support_army: "Soutien de l'armée"
 BLR_support_army_desc: "We will support the military in our country, because it is thanks to them that our country remains independent."
 BLR_russian_tver: "Purchase WagonsAcheter des wagons"
 BLR_russian_tver_desc: "We will purchase a large number of wagons from Russia for our railways."
 BLR_russian_teplovzor: "Opening of Production of Thermal Imagers For Russia"
 BLR_russian_teplovzor_desc: "We will open the production of thermal imagers, which we will also be able to sell to Russia for use in their armed forces."
 BLR_cyphrovizacia: "Numérisation"
 BLR_cyphrovizacia_desc: "We will begin our journey toward the digital economy."
 BLR_russian_uvz: "Signez des contrats exclusifs avec UVZ"
 BLR_russian_uvz_desc: "Partnership with this well-known enterprise will bring us significant benefits."
 BLR_all_cyphro: "Numérisation complète"
 BLR_all_cyphro_desc: "Digitalization of many government processes will help us work more effectively with citizens and the problems that arise."
 BLR_kalash_zavod: "Ouverture d'une usine d'armes Kalachnikov"
 BLR_kalash_zavod_desc: "We will manufacture the products of this famous brand domestically."
 BLR_Union_state_again: "Rejoindre la Russie"
 BLR_Union_state_again_desc: "We are ready to become part of Russia once again."
 BLR_union_become_one: "L’Union deviendra une"
 BLR_Lykashenko: "§YLukashenko§!"
 BLR_Lykashenko_desc: "Alexander Grigoryevich Lukashenko (born August 30, 1954) is a Belarusian politician, statesman, and military figure. He has held the post of President of Belarus and Commander-in-Chief of the Armed Forces since July 20, 1994. He is known for his pro-Russian views. In Belarusian and Russian-speaking societies, he is known by the nickname \"Batka\"."
 BLR_GrodnoAzot: "Grodno Azot"
 BLR_GrodnoAzot_desc: "The Khimvolokno Plant branch of Grodno Azot OJSC is a large manufacturer of polyamide and polyester yarns and fibers, as well as polyamide-6 (PA-6) and polymer composite materials based on it. Each of the main types of products is produced in a wide assortment with various physical and mechanical properties and quality indicators, depending on the application."
 BLR_PinskDrev: "Finances \"PinskDrev\""
 BLR_PinskDrev_desc: "PinskDrev is a large woodworking enterprise in Belarus and the oldest in Pinsk. We should finance their activities so that they can develop further."
 BLR_AirPort_minsk: "Agrandissement de l'aéroport international"
 BLR_AirPort_minsk_desc: "We are ready to invest significant financial resources in the expansion of Minsk Airport."
 BLR_dai_denyag: "Demander un prêt à la Russie"
 BLR_dai_denyag_desc: "We will ask the Russian government to provide us with a loan."
 BLR_ros_atom: "ROS ATOM"
 BLR_ros_atom_desc: "Nous inviterons les spécialistes de ROSATOM à coopérer dans le domaine de l'énergie nucléaire."
 BLR_Impact_kgb: "Impact du KGB"
 BLR_Impact_kgb_desc: "The KGB uses various methods to eliminate those dissatisfied with the election of a new president."
 BLR_Liquidation_pub_assoc: "Liquidation des associations publiques"
 BLR_Liquidation_pub_assoc_desc: "The KGB is actively liquidating, or attempting to liquidate, public associations that are objectionable to our president."
 BLR_crackdown_opp_rall: "Répression des rassemblements d'opposition"
 BLR_crackdown_opp_rall_desc: "We are actively dispersing the rallies of our political opponents who are dissatisfied with the elections."
 BLR_Increased_censorship: "Renforcer la censure des médias"
 BLR_Increased_censorship_desc: "It is necessary to impose strong censorship on the media so that our opponents cannot agitate against us."
 BLR_concept_national_security_Belarus: "Concept de sécurité nationale"
 BLR_concept_national_security_Belarus_desc: "Ce concept établit un ensemble de vues officielles sur l’essence et le contenu des activités de la République de Biélorussie pour assurer l’équilibre des intérêts de l’individu, de la société et de l’État et leur protection contre les menaces internes et externes."
 BLR_Economic_development_2001_2005: "Programme de développement socio-économique"
 BLR_Economic_development_2001_2005_desc: "Le programme de développement socio-économique de la République de Biélorussie pour 2001-2005. élaboré par le Ministère de l'Economie de la République de Biélorussie conjointement avec d'autres ministères et organes de l'administration d'État républicaine, les comités exécutifs régionaux et le Comité exécutif de la ville de Minsk avec la participation de l'Académie nationale des sciences, la Banque nationale, les instituts de recherche spécialisés et les organisations publiques conformément à la loi de la République de Biélorussie \"Sur les prévisions d'État et les programmes de développement socio-économique de la République de Biélorussie\" et les résolutions du Conseil des ministres de la République de Biélorussie du 2 février 2000 N 141 et du 10 août 2000 n° 1248 sur l'élaboration du Programme de développement socio-économique de la République de Biélorussie pour 2001-2005."
 BLR_reforms_Belarusian_Railway: "Réformes des chemins de fer biélorusses"
 BLR_reforms_Belarusian_Railway_desc: "Our railways are in a very poor state, so we will carry out a set of reforms to improve the situation."
 BLR_new_railway_station: "Nouvelle gare de Minsk"
 BLR_new_railway_station_desc: "We have built a new train station in Minsk. Our city will now be able to receive more trains."
 BLR_Electrification_Myslishche_Kryzhovka: "Électrification de la rue Myslyshche-Kryzhovka"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "The Myslyshche-Kryzhovka line is one of the highest development priorities in our country, so we will address it first."
 BLR_Baranovichi_Plant: "Usine de Baranovichi"
 BLR_Baranovichi_Plant_desc: "We are creating a structural division of the Baranovichi Plant of Construction Parts and Structures to improve the supply of parts to our trains."
 BLR_Energy_conflict_over: "Cession de Belgaztrans"
 BLR_Energy_conflict_over_desc: "The conflict is coming to an end. We have agreed to Russia's terms and are ready to sell Belgaztrans. In return, energy prices will be stabilized for us."
 BLR_new_rolling_stock: "Achat de nouveau matériel roulant"
 BLR_new_rolling_stock_desc: "By purchasing new rolling stock, we will eliminate the main problem plaguing our railways."
 BLR_promise_first_nuclear: "La promesse de construire une centrale nucléaire"
 BLR_promise_first_nuclear_desc: "We promise all our citizens that a nuclear power plant will be built on the territory of our country, thereby ensuring our energy security."
 BLR_New_Land_code: "Nouveau code foncier"
 BLR_New_Land_code_desc: "The new Land Code significantly simplifies the purchase of land by private owners and companies, which will clearly appeal to a certain segment of the population."
 BLR_Zubr_Energy_LLC: "Ouverture de Zubr Energy LLC"
 BLR_Zubr_Energy_LLC_desc: "Usine de production de batteries de démarrage destinées à être livrées aux lignes de convoyage des constructeurs automobiles mondiaux et nationaux."
 BLR_Hi_Tech_Park: "Le parc Hi-Tech"
 BLR_Hi_Tech_Park_desc: "Hi-Tech Park is a special tax and legal regime for the development of IT business in Belarus. It is not a free (special, special) economic zone, but it is a jurisdiction that operates on the principle of extraterritoriality. Companies and individual entrepreneurs registered in the Park can use the preferences provided to them regardless of the location of their Belarusian office."
 BLR_Referendum_Belarus_2004: "Référendum en Biélorussie 2004"
 BLR_Referendum_Belarus_2004_desc: "Le 17 octobre 2004, la Biélorussie a accueilli le troisième référendum républicain organisé par le président Loukachenko dans l'histoire de la Biélorussie indépendante. Ce référendum a été organisé par le décret présidentiel n° 431 du 7 septembre 2004 et a été combiné avec des élections parlementaires."
 BLR_Energy_conflict: "Conflit énergétique entre la Russie et la Biélorussie"
 BLR_Energy_conflict_desc: "Le conflit a commencé en décembre 2006, lorsque Gazprom a annoncé la version finale du prix du gaz naturel pour la République de Biélorussie, soit 105 dollars les 1 000 m3. De plus, 75 dollars sont payables en espèces et la Biélorussie aurait le droit de payer les 30 dollars restants en actions de Beltransgaz, ce qui était estimé à 5 milliards de dollars."
 BLR_Decree_n3: "Décret sur le parasitisme"
 BLR_Decree_n3_desc: "No one will sit on state benefits any longer. It is time to make all the idle work."
 BLR_launch_own_satellite: "La Biélorussie lance son propre satellite"
 BLR_launch_own_satellite_desc: "Le satellite biélorusse de télédétection de la Terre a été lancé le 22 juillet 2012 depuis le cosmodrome de Baïkonour au Kazakhstan - dans un groupe de cinq engins spatiaux : avec les satellites russes Canopus-V et MKA-FKI (Zond-PP), l'allemand TET-1 et le canadien ADS-1B."
 BLR_gasification_country: "Achèvement de la gazéification du pays"
 BLR_gasification_country_desc: "We will complete the gasification of our country, which our citizens will surely appreciate."
 BLR_CJSC_Turkcell: "Accord avec Turkcell"
 BLR_CJSC_Turkcell_desc: "An important deal will be made between us and our Turkish partners — the sale of a controlling stake in CJSC \"BeST\" to Turkcell. This will open another avenue for investment in our country."
 BLR_Anti_Corruption: "Campagne anti-corruption"
 BLR_Anti_Corruption_desc: "We must defeat corruption in our country. The main thing is not to end up implicated yourself."
 BLR_Punish_Shushkevich: "Punish Shushkevich's Cronies"
 BLR_Punish_Shushkevich_desc: "Shushkevich left us a legacy in the form of his loyalists in the government. It is time to get rid of them."
 BLR_State_Run_Capitalism: "Le capitalisme d'État"
 BLR_State_Run_Capitalism_desc: "The state should completely control the economic policy of the country."
 BLR_reform_officers: "Ouvrir de nouvelles écoles d'officiers"
 BLR_reform_officers_desc: "One of the priorities of our military reforms is to improve officer education."
 BLR_peace_rota: "Créer une entreprise de maintien de la paix"
 BLR_peace_rota_desc: "We will create a special unit to participate in peacekeeping missions."
 BLR_Promote_new_officers: "Réformes militaires complètes en Biélorussie"
 BLR_Promote_new_officers_desc: "We will complete a set of measures for the transformation of our armed forces, which began in 1994."
 BLR_Internet_cencorship: "Censure sur Internet"
 BLR_Internet_cencorship_desc: "The Internet has become a platform where sentiments aimed at overthrowing the government are openly discussed. It is necessary to control this."
 BLR_kgb: "KGB"
 BLR_Batka_policy: "Censure sur Internet"
 BLR_Batka_policy1: "Décret sur le parasitisme"
 BLR_Batka_policy2: "Politique Internet de la Biélorussie"
 BLR_Batka_policy3: "Politique Internet de la Biélorussie"
 BLR_Raiffeisen2: "Raiffeisen en Biélorussie"
 BLR_Raiffeisen2_desc: "Established in 1989, Priorbank has been a subsidiary of RBI since 2003. It is one of the largest local private banks and one of the country's leading financial institutions in terms of efficiency and profitability. As a universal bank, it services corporate customers, small and medium-sized enterprises as well as private individuals."
 BLR_Henkel2: "Henkel"
 BLR_Henkel2_desc: "La division de produits chimiques pour la construction du groupe Henkel en Biélorussie, Henkel Bautechnik LLC, a été créée en 2004 dans le but d'organiser la production de produits de substitution aux importations. En 2005, la construction d'une usine de production de mélanges de construction Ceresit à Zaslavl a commencé, la production a été lancée en septembre 2006. La gamme de produits de l'entreprise comprend plus de 100 articles, notamment des revêtements prêts à l'emploi, des systèmes d'isolation thermique et de finition de façade, des systèmes de revêtement de sol et d'étanchéité, des matériaux de préparation de surface pour la finition, des mastics, de la mousse de montage, des « clous liquides », des enduits."
 BLR_Jeans_Revolution: "La révolution du jean"
 BLR_Jeans_Revolution_desc: "A mass protest rally in the center of Minsk and other cities of Belarus, which began on March 19, 2006 in response to the falsifications of the authorities in the presidential elections that took place earlier."
 BLR_reform_kolhoz: "Réformes des fermes collectives"
 BLR_reform_kolhoz_desc: "It is necessary to reform collective farms to ensure the stability of our agro-industry."
 BLR_Eastern_Partnership: "Partenariat oriental"
 BLR_Eastern_Partnership_desc: "The Eastern Partnership is a project of the European Union, with the main stated goal of developing integration ties of the European Union with six countries of the former USSR: Azerbaijan, Armenia, Belarus, Georgia, Moldova and Ukraine."
 BLR_Azarenok_case: "Le cas d'Igor Azarenok"
 BLR_Azarenok_case_desc: "General Azarenok was suspected of lobbying for Russian interests in the Republic of Belarus through bribes and other frauds. Should we pay attention to this?"
 BLR_National_Library: "Nouveau bâtiment de la Bibliothèque nationale"
 BLR_National_Library_desc: "Le nouveau bâtiment de la Bibliothèque nationale de Biélorussie, à la construction duquel tout le pays a participé, a été ouvert aux utilisateurs le 16 juin 2006."
 BLR_delta_city: "Centre d'affaires « Delta City »"
 BLR_delta_city_desc: "During the National Exhibition of Serbia in Minsk, a major contract was signed for the construction of the Delta City business center and the development of the territory near the National Library with a total investment of several billion euros (the developer is Dana Holdings, owned by Serbian businessmen)."
 BLR_Kal: "Négociant en commun de potassium"
 BLR_Kal_desc: "We will propose to Russia the creation of a joint stock company that will be our common potassium trader."
 BLR_Kal2: "Fermer un trader conjoint avec du potassium"
 BLR_Kal2_desc: "Recent criminal cases initiated by us against employees of the Russian company Uralkali, as well as abuses of authority on their part, have forced us to close the joint trader and create our own."
 BLR_BRSM_desc: "L'Union républicaine de la jeunesse biélorusse est une association publique de jeunesse de la République de Biélorussie. Il s'agit de la plus grande association de jeunesse du pays et elle est soutenue par Alexandre Loukachenko. Ses activités sont financées par l'État."
 BLR_Potato_Empire: "L'Empire de la pomme de terre"
 BLR_Potato_Empire_desc: "We are one of the top potato exporters in the world. Our country should be proud of this."
 BLR_Factory_Kommunarka: "Nationaliser l'usine Kommunarka"
 BLR_Factory_Kommunarka_desc: "Our President believes that the privatization of the Confectionery Factory \"Kommunarka\" was illegal, so the nationalization of this enterprise has been announced."
 BLR_Another_year: "Une autre année d’indépendance"
 BLR_Another_year_desc: "Belarus will continue to follow its independent policy."
 BLR_Migrant_crisis: "La crise migratoire"
 BLR_Migrant_crisis_desc: "La crise migratoire à la frontière de la Biélorussie est née de l'afflux de migrants illégaux, principalement en provenance d'Irak et de Syrie, dans une moindre mesure d'Afghanistan et dans une moindre mesure de pays africains (selon les statistiques du service polonais des frontières), qui tentent d'entrer dans les pays de l'UE (Lituanie, Lettonie, Pologne)."
 BLR_gudermes: "Envoyez des OMON pour s'entraîner à Gudermes en Tchétchénie"
 BLR_gudermes_desc: "Nous devrions jeter un œil à cette fameuse université des forces spéciales. Peut-être que nos combattants pourront améliorer leurs compétences."
 BLR_Another_Elections: "Et encore les élections"
 BLR_Another_Elections_desc: "The next elections in our country are just around the corner. Who will win?"
 BLR_Bye_opposition: "Aucune pitié pour l’opposition"
 BLR_Bye_opposition_desc: "We do what we always do — we deal with the opposition hard and fast."
 BLR_Milk_war: "La guerre du lait"
 BLR_Milk_war_desc: "A series of deteriorations in relations between Belarus and Russia, stemming from disputes over the export of dairy products to Russia."
 BLR_jeans_revolution: "La révolution du jean"
 BLR_jeans_revolution_desc: "The people are dissatisfied with the upcoming elections. They allegedly do not believe in the victory of Alexander Lukashenko. What will happen next?"
 BLR_Changes_Customs_policy: "Modification de la politique douanière"
 BLR_Changes_Customs_policy_desc: "New changes and strictures have been introduced to complicate the import of counterfeit products into our country."
 BLR_whitelegion_case: "Affaire de la Légion Blanche"
 BLR_whitelegion_case_desc: "Our special services have reported on the great activity of representatives of the White Legion. It is necessary to catch them and put them in prison."
 BLR_PolBel_Dplomatic_war: "Guerre diplomatique polono-biélorusse"
 BLR_PolBel_Dplomatic_war_desc: "Despite the warming of relations, the conflict with Poland is rekindling with its former strength."
 BLR_project_bombel: "Projet BOMBEL"
 BLR_project_bombel_desc: "The European Union has allocated funds to strengthen the border between Belarus and the EU against the influx of illegal migrants. Our business is deciding how to use these funds."
 BLR_Investing_Agro_industry: "Investissements dans l'agro-industrie"
 BLR_Investing_Agro_industry_desc: "The agro-industry is an important component of our country's economy, and we will continue to increase investments in this sector."
 BLR_fate_belarusian_church: "Le sort de l’Église biélorusse"
 BLR_fate_belarusian_church_desc: "We should decide which way our church will go."
 BLR_Pension_reform: "Réforme des retraites"
 BLR_Pension_reform_desc: "It is time to carry out pension reform and raise the retirement age."
 BLR_New_concept_security: "Nouveau concept de sécurité nationale"
 BLR_New_concept_security_desc: "Our defensive concept needs to be updated, and we will make the necessary changes to our law."
 BLR_Zimbabwe: "Voyage au Zimbabwe"
 BLR_Zimbabwe_desc: "We will visit Zimbabwe to conclude contracts for the supply of our products."
 BLR_100dney: "100 idées pour la Biélorussie"
 BLR_100dney_desc: "The project \"100 Ideas for Belarus\", aimed at identifying gifted and talented youth, developing their scientific activities and promoting promising innovative developments."
 BLR_stroiotryad: "Relancer la Brigade de construction étudiante"
 BLR_stroiotryad_desc: "We will revive the practice of Student Construction Brigades from the Soviet era. As an incentive, we will exempt them from taxes."
 BLR_People_Militia: "Creation of People's Militia"
 BLR_People_Militia_desc: "We are ready to adopt a law on the creation of a people's militia, which will be a kind of reserve for Territorial defense. In each village there should be a trained group of people to counter the enemy, with subsequent transformation into a partisan movement."
 BLR_Excursion_Warsaw: "Excursion à Varsovie"
 BLR_Excursion_Warsaw_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Warsaw. We can help them organize it. A border crossing from our territory is theoretically possible, but will Poland declare war on us afterwards?"
 BLR_azarenok_tv: "Nouveau propagandiste de Loukachenko"
 BLR_azarenok_tv_desc: "Now on television you can often see a new propagandist who broadcasts on behalf of our party and convinces the people of the correctness of our actions."
 BLR_Wagner_arrest: "Situation With PMCs Wagner"
 BLR_Wagner_arrest_desc: "Our special services have arrested fighters from the famous Russian PMC Wagner. We must decide what to do with them."
 BLR_decree_227: "Décret n° 227 « relatif à la fourniture de services de sécurité »"
 BLR_decree_227_desc: "Le nouveau décret n° 227 a suscité un grand émoi dans de nombreux médias. Pour la première fois, nous avons autorisé une entreprise privée à accepter des armes pour la protection des installations. Est-ce que cela va vraiment aboutir à quelque chose ?"
 BLR_Country_for_life: "Un pays pour la vie"
 BLR_Country_for_life_desc: "Our government has decided to deal with the opposition more cunningly, luring its prominent figures to our side. One of them is Sergey Tikhanovsky, organizer of the \"Country for Life\" project. After the events that followed, rather than arresting him, we publicly invited him into the government, where he could help improve our country. The opposition itself will be divided by such a move."
 BLR_Amendment_to_Constitution: "Changements importants dans la Constitution"
 BLR_Amendment_to_Constitution_desc: "Our permanent leader, Alexander Lukashenko, has recognized that the country needs radical changes and that it is time to move away from sole presidential power. A referendum on changing the constitution has been announced, under which power will mostly belong to the parliament."
 BLR_army_on_streets_of_cities: "Manifestations de masse"
 BLR_army_on_streets_of_cities_desc: "The people have rebelled against us. They believe that our government is falsifying election results and ruining the country. I hope we have prepared well for such events."
 BLR_anti_lgbtqa_stance: "Politique anti-LGBT"
 BLR_Pazniak: "§YBelarusian Nationalists§!"
 BLR_Pazniak_desc: "Nationalist forces have seized power in the country. Where will they lead Belarus — toward a brighter future, or toward the country's collapse?"
 BLR_rofeign_legion: "La Légion étrangère"
 BLR_rofeign_legion_desc: "We will draw from the experience of the French and create our own foreign legion."
 BLR_debur: "Débureaucratisation"
 BLR_debur_desc: "We will reduce expenditure on officials and cut their numbers, and the freed funds will go to the benefit of the people."
 BLR_patriotism_desc: "It is time to raise the level of patriotic education in our country."
 BLR_Belarusisation: "Biélorussienisation"
 BLR_Belarusisation_desc: "All literature and all official titles must be in Belarusian."
 BLR_Democratic_clean: "Purges des démocrates"
 BLR_Democratic_clean_desc: "We are not going to become servants of the West. It is time to purge our country of democrats."
 BLR_Communistst_clean: "Purge des communistes"
 BLR_Communistst_clean_desc: "The legacy of the USSR must be destroyed. It is time to drive out these adherents of the red contagion."
 BLR_denied_rus_language: "Refusé la langue russe"
 BLR_denied_rus_language_desc: "Russian will no longer be the second state language. We have had enough of the Russian occupation."
 BLR_anti_immigration_policies: "Politiques anti-immigration"
 BLR_anti_immigration_policies_desc: "Implementing stricter anti-immigration policies will keep the Belarusian identity alive and well."
 BLR_russofobia: "Politique anti-russe"
 BLR_russofobia_desc: "It is time to deal with the common enemy — Russia. It is time to tame its imperialist ambitions toward us."
 BLR_decolectivisation: "Décollectivisation"
 BLR_decolectivisation_desc: "It is time to get rid of the Soviet legacy and assist the population in moving to the cities."
 BLR_litvins_past: "Le passé de Litvin"
 BLR_litvins_past_desc: "L'histoire ne peut pas être changée, nous le savons. Nous, les Litvins, sommes les fiers héritiers du Grand-Duché de Lituanie."
 BLR_constitution_from_1994: "Constitution de 1994"
 BLR_constitution_from_1994_desc: "It is time to restore a proper constitution in our country."
 BLR_We_not_energy_slave: "Nous ne sommes pas esclaves des ressources russes"
 BLR_We_not_energy_slave_desc: "Russia gave discounts only to support its puppet regime. That is enough. We are ready to build a strong economy without those discounts."
 BLR_Influence_nationalists: "Influence des nationalistes"
 BLR_Influence_nationalists_desc: "We must actively support nationalist movements in neighboring countries."
 BLR_Territorial_claims: "Revendications territoriales"
 BLR_Territorial_claims_desc: "Our country must return to its true borders."
 BLR_white_legion_desc: "The White Legion is a sports and patriotic organization of Belarus, founded in 1995 for pre-conscription training and patriotic education of young people."
 BLR_white_legion_battalion: "Bataillon de la Légion Blanche"
 BLR_white_legion_battalion_desc: "The first battalion of the White Legion has finally been formed. True patriots of their country are ready to fight for its freedom and strength."
 BLR_GDL: "Grand-Duché de Lituanie"
 BLR_GDL_desc: "It is time to restore the great state of the Litvinov people. Finally, our people will not be under the yoke of a superpower; they will have the opportunity to become a superpower themselves."
 BLR_help_silesians: "Aidez les séparatistes silésiens"
 BLR_help_silesians_desc: "Divide and rule is the main principle we will apply in our policy toward Poland. When the active phase of bringing the Poles under our control begins, the Silesians may help facilitate our conquest of that country."
 BLR_revansh_return: "Faire revivre le Praviy Revansh"
 BLR_revansh_return_desc: "The Praviy Revansh was a nationalist organization of the 1990s that professed anti-Polish and anti-Russian rhetoric, and argued for the creation of paramilitary organizations modeled on Ukrainian ones."
 BLR_blackcat: "Faire revivre le chat noir"
 BLR_blackcat_desc: "The Black Cat was a large partisan organization that operated on Belarusian territory for forty years, fighting for independence against the Soviet government. Their methods will serve us well in defending against enemy invasions."
 BLR_lith_again: "Retour à Zemaitija"
 BLR_lith_again_desc: "The time has come to complete the reconstruction of our mighty state. A small and weak Lithuania stands in our way; we will break it. But we cannot attack the country without justification; we must create the necessary conditions and a pretext so that our invasion does not appear groundless."
 BLR_true_political_and_national_freedom: "La véritable liberté politique"
 BLR_true_political_and_national_freedom_desc: "True political freedom begins with recovering from the devastation caused by our internal purges. It is time to move forward and attain what our people truly desire."
 BLR_Taler_ruble: "Taler biélorusse"
 BLR_Taler_ruble_desc: "We must abandon the ruble entirely, replacing it with our new currency."
 BLR_National_science: "National Science"
 BLR_National_science_desc: "We will begin developing our own science and economy as an independent state."
 BLR_create_nationalsecurity: "Créer de nouveaux départements"
 BLR_create_nationalsecurity_desc: "Instead of the KGB, a legacy of the USSR, we will create two new structures: the National Security Service and the National Intelligence Service."
 BLR_Delete_KGB: "Dissoudre le KGB"
 BLR_Delete_KGB_desc: "The KGB should be dissolved and replaced by a new structure."
 BLR_Reform_Police: "Réforme de la police"
 BLR_Reform_Police_desc: "The Soviet militia was a relic of the past that we want to get rid of. We are reorganizing it into a national police force modeled on that of Poland."
 BLR_attack_russian_bear: "Finish off the Russian bear"
 BLR_attack_russian_bear_desc: "Finally, our main enemy will be destroyed."
 BLR_zmagar_army: "Réforme de l'armée"
 BLR_zmagar_army_desc: "Our army needs urgent reform. While we were busy with the socio-political transformation of our country, our armed forces were seriously weakened."
 BLR_Young_Front_desc: "The Young Front is an international youth movement of Belarusian youth and a youth opposition organization of Belarus."
 BLR_south_river_battalion: "Bataillon de la rivière Sud"
 BLR_south_river_battalion_desc: "Un bataillon constitué de résidents américains du comté de South River."
 BLR_territorial_reform: "Réforme territoriale"
 BLR_territorial_reform_desc: "Au lieu des six régions et des 110 districts actuels, Zenon Poznyak et l'équipe des auteurs du programme proposent de diviser le pays en 16 voïvodies, plus Minsk séparément. Les voïvodies, à leur tour, seront divisées en 60 provinces et 270 anciennes villes."
 BLR_anti_lgbt: "Interdiction de la propagande de relations perverses"
 BLR_anti_lgbt_desc: "Nous adoptons une loi sur la priorité et la protection de la famille, du mariage (union d'un homme et d'une femme), de la maternité, sur la protection de la famille contre les empiètements et les ingérences dans les affaires familiales de la part de l'idéologie et des organisations. En outre, il est proposé d'adopter une loi « sur la protection de la nature humaine » et d'interdire la propagande de relations perverses contre la nature naturelle de l'homme."
 BLR_latgale_or_war: "Latgale ou la guerre"
 BLR_latgale_or_war_desc: "Latgale was once part of the Grand Duchy of Lithuania. The time has come to return these lands to our state. Latvia is unlikely to be able to resist us."
 BLR_legacy_kurland: "Héritage du Duché de Courlande"
 BLR_legacy_kurland_desc: "The Duchy of Courland once reached out in the race of colonization. The flag of the Duchy once flew over Trinidad and Tobago and along the coast of Gambia. As the rightful successors of the Duchy, the time has come to seek the return of these territories to our empire and bring these former colonial holdings back into the fold."
 BLR_pro_poland_propoganda: "Pro-Belarusian Propaganda in Poland"
 BLR_pro_poland_propoganda_desc: "We must increase our influence in Poland through propaganda and other means of interaction."
 BLR_Dismiss_soviet_officers: "Dismiss Pro-Soviet Officers"
 BLR_Dismiss_soviet_officers_desc: "The fight against the Soviet legacy should also extend to the army. We do not need generals who sympathize with that bloody regime."
 BLR_Anti_corruption_law: "Loi anti-corruption"
 BLR_Anti_corruption_law_desc: "We will fight corruption in all its manifestations."
 BLR_open_border_with_pol: "Frontières ouvertes"
 BLR_open_border_with_pol_desc: "L’ouverture des frontières aidera nos peuples à se sentir connectés non seulement économiquement, mais aussi physiquement."
 BLR_training_for_pol: "Exercices militaires conjoints"
 BLR_training_for_pol_desc: "Our armies need combat coordination. Joint military exercises will help greatly with this."
 BLR_Asseco_Poland: "Asseco Pologne"
 BLR_Asseco_Poland_desc: "We will buy out this company and make it the property of our future state of Belarusians and Poles."
 BLR_ynia_Poland: "La deuxième Union de Lublin"
 BLR_ynia_Poland_desc: "It is time to remember how humiliating the Union of Lublin was for the Grand Duchy of Lithuania. This time, it will be different."
 BLR_Ukraine_way: "Amitié avec l'Ukraine"
 BLR_Ukraine_way_desc: "Despite our territorial claims, we are ready to conduct a dialogue with Ukraine against common enemies. It may be possible to create an alliance that will help our states survive when surrounded by opponents."
 BLR_Join_GUAM_to_Ukraine: "Rejoignez GUAM"
 BLR_Join_GUAM_to_Ukraine_desc: "One of our first friendly steps toward Ukraine will be joining GUAM, an organization where Ukraine plays a leading role."
 BLR_training_with_ukr: "Exercices militaires conjoints"
 BLR_training_with_ukr_desc: "We are ready to propose to the Ukrainian army joint exercises to practice maneuvers and coordinate troops."
 BLR_military_coop_with_ukraine: "§GCoopération militaro-technique§!"
 BLR_military_coop_with_ukraine_desc: "We are ready to establish military-technical cooperation with the Ukrainian military-industrial complex."
 BLR_Intermarium: "Intermarium"
 BLR_Intermarium_desc: "It is time for us to unite with Ukraine in a powerful alliance to confront our enemies together."
 BLR_Intermarium_poland: "Intermarium"
 BLR_Intermarium_poland_desc: "It is time for us to unite with Poland in a powerful alliance to confront our enemies together."
 BLR_Ukraine_enemy: "Saisir les terres ukrainiennes"
 BLR_Ukraine_enemy_desc: "Historically, these lands belonged to the Grand Duchy of Lithuania. No false ties of friendship should prevent us from returning them to our great state."
 BLR_Sovereign_Internet: "Internet souverain"
 BLR_Sovereign_Internet_desc: "Nous devons rendre notre espace Internet complètement indépendant des autres pays afin qu’ils ne puissent pas influencer nos citoyens."
 BLR_Expand_Mozyr_Refinery: "Agrandir la raffinerie de pétrole de Mozyr"
 BLR_Expand_Mozyr_Refinery_desc: "We will expand this oil refinery."
 BLR_Belshina: "JSC Belshina"
 BLR_Belshina_desc: "JSC Belshina is a manufacturer of automobile tires. It produces tires for passenger cars, trucks, heavy-duty vehicles, road construction and lifting vehicles, electric vehicles, buses, tractors and agricultural machinery."
 BLR_Expand_Naftan_Refinery: "Agrandir la raffinerie de pétrole de Naftan"
 BLR_Expand_Naftan_Refinery_desc: "We will expand this oil refinery."
 BLR_Expansion_Okolovsky_Novoselkovsky: "Expansion de la production de minerai des gisements"
 BLR_Expansion_Okolovsky_Novoselkovsky_desc: "Expansion of ore production from the Okolovsky and Novoselkovsky deposits will bring us a lot of steel."
 BLR_Problem_duying_vilages: "Le problème des villages en voie de disparition"
 BLR_Problem_duying_vilages_desc: "It is time for our state to decide what to do with dying villages."
 BLR_Economic: "Économie biélorusse"
 BLR_Economic_desc: "We need to develop our economy, and we are taking a number of measures to successfully achieve this."
 BLR_metro_minsk: "Agrandir le métro de Minsk"
 BLR_metro_minsk_desc: "We will improve and expand the Minsk metro to improve the logistical characteristics of the city."
 BLR_it_industries_help: "Help Domestic IT Developers"
 BLR_it_industries_help_desc: "It is necessary to support our IT sector with everything we can — this is the future of our country."
 BLR_viber: "Viber"
 BLR_viber_desc: "Viber est une application de messagerie qui vous permet d'envoyer des messages, de passer des appels vidéo et vocaux VoIP via Internet. Les appels vocaux entre utilisateurs avec Viber installé sont gratuits. Viber a la possibilité d'envoyer des messages texte, vocaux et vidéo, des documents, des images, des vidéos et des fichiers, ainsi que de travailler hors ligne."
 BLR_wot: "Monde des chars"
 BLR_wot_desc: "World of Tanks est un jeu en ligne massivement multijoueur en équipe dédié aux véhicules blindés du milieu du XXe siècle. Les joueurs ont à leur disposition plus de 40 cartes de bataille créées sur la base de lieux réels de la Seconde Guerre mondiale et d'équipements historiquement fiables de 11 nations avec un nombre total de plus de 600 unités."
 BLR_russian_gazprom: "Gazprom"
 BLR_russian_gazprom_desc: "Gazprom is an important player in the gas and oil market. We must establish the closest possible cooperation with them."
 BLR_BPS_Sberbank: "BPS Sberbank"
 BLR_BPS_Sberbank_desc: "BPS Sberbank est une succursale de la Sberbank russe sur notre territoire."
 BLR_Belgazprombank: "Belgazprombank"
 BLR_Belgazprombank_desc: "Belgazprombank est une succursale de Gazprombank en Biélorussie."
 BLR_Development_domestic_tourism: "Développement du tourisme intérieur"
 BLR_Development_domestic_tourism_desc: "Nous voyons un fort potentiel dans le tourisme intérieur. À cet égard, chaque député contribuera au développement du tourisme dans sa circonscription. La tâche principale est de créer une infrastructure appropriée, car il existe une abondante documentation scientifique et méthodologique."
 BLR_private_railways: "Compagnies ferroviaires privées"
 BLR_private_railways_desc: "We will transfer the railways to private companies."
 BLR_Lith_pol_railways: "Liaison ferroviaire avec la Pologne et la Lituanie"
 BLR_Lith_pol_railways_desc: "We intend to build a high-quality railway connection with these countries, which will give us access to European goods."
 BLR_JSC_russian_railways: "Chemins de fer russes"
 BLR_JSC_russian_railways_desc: "We are now fully integrated with Russian Railways."
 BLR_belavia: "Belavia"
 BLR_belavia_desc: "Compagnie aérienne nationale biélorusse dont le siège est à Minsk. Elle a été créée en 1996. Les principaux vols internationaux réguliers et charters sont opérés depuis l'aéroport national de Minsk."
 BLR_Danone: "Danone"
 BLR_Danone_desc: "Entreprise agroalimentaire française, fabricant réputé de produits laitiers et autres produits alimentaires."
 BLR_Godel_tech: "Technologies Gödel"
 BLR_Godel_tech_desc: "Entreprise britannique fournissant des solutions de développement de logiciels aux principales entreprises britanniques basées à Manchester."
 BLR_Basf_tech: "BASF Société Européenne"
 BLR_Basf_tech_desc: "BASF Societas Europaea, BASF est le plus grand groupe chimique en Allemagne, en Europe et dans le monde. Son siège social se trouve à Ludwigshafen, en Rhénanie-Palatinat, dans le sud-ouest de l'Allemagne."
 BLR_royal_dutch_shell: "Royal Dutch Shell"
 BLR_royal_dutch_shell_desc: "Shell is a British-Dutch oil and gas company."
 BLR_mts: "MTS"
 BLR_mts_desc: "MTS is a Russian company providing telecommunications services, digital and media services in Russia, Armenia and Belarus under the trademark \"MTS\". The company provides cellular communication services (in UMTS (3G), 4G, LTE and 5G standards), wired telephone services, broadband Internet access, mobile television, cable television, satellite television, digital television, media and entertainment content services, financial services, as well as convergent IT solutions in the field of the Internet of Things, monitoring, process automation, data processing and cloud computing."
 BLR_belarus_support_category: "Troupes auxiliaires de Biélorussie"
 BLR_ter_oboronaup_start: "Appel aux troupes de défense territoriale"
 BLR_internalup_start: "Appel à la 3e brigade spéciale distincte"
 BLR_whitelegion_battalion_category: "Légion blanche"
 BLR_whitelegion_battalion_category_desc: "The White Legion is a sports and patriotic Belarusian organization that was transformed into a military one. The White Legion appeared in the early 1990s and maintained order at opposition meetings and rallies. Its members were trained as special forces, earning a steel beret analogous to the crimson one. They were given in-depth knowledge of the history of Belarus."
 BLR_white_legion_battalion_create: "Créer un bataillon de la Légion blanche"
 BLR_white_legion_recruit_youngfront: "Recruter les diplômés du Front Jeune"
 BLR_white_legion_recruit_people: "Recrutez des citoyens fidèles"
 BLR_white_legion_recruit_revansh: "Recruter des membres de l'organisation \"Praviy Revansh\""
 BLR_white_legions_TT: "Le nombre de recrues changera d'ici §Y[?modify_white_legion]§!\n"
 BLR_whitelegion_recruit_2000: "Le nombre de recrues disponibles est de 2000"
 BLR_lith_revol_category: "Révolution lituanienne"
 BLR_Establish_cooperation_lit: "Établir une coopération avec les communistes lituaniens"
 BLR_Establish_cooperation_lit_desc: "Our Communist brothers in Lithuania are completely cut off from power. We must establish communication with them so that our future cooperation will bear fruit for both countries."
 BLR_Financing_of_protest_movements_lit: "Financement des manifestations communistes"
 BLR_Financing_of_protest_movements_lit_desc: "We will expand the influence of the Communist Party by financing protests in Lithuania."
 BLR_Strengthen_com_partys_agenda_lit: "Utilisez les Biélorusses locaux"
 BLR_Strengthen_com_partys_agenda_lit_desc: "Belarusians are the third largest non-indigenous people of Lithuania. We should use this as an instrument of influence."
 BLR_buy_militaries: "Soudoyer l'armée locale"
 BLR_litbel_propaganda: "Propagande du pouvoir de l'État LitBel"
 BLR_litbel_propaganda_desc: "We must convince people that a single Lithuanian-Belarusian state will be more powerful and stronger than either country separately."
 BLR_parlament_lit_places: "Corrompre les politiciens locaux"
 BLR_lat_revol_category: "Révolution lettone"
 BLR_Establish_cooperation_lat: "Établir une coopération avec les communistes lettons"
 BLR_Establish_cooperation_lat_desc: "Our Communist brothers in Latvia are completely cut off from power. We must establish communication with them so that our future cooperation will bear fruit for both countries."
 BLR_Financing_of_protest_movements_lat: "Financement des manifestations communistes"
 BLR_Financing_of_protest_movements_lat_desc: "We will expand the influence of the Communist Party by financing protests in Latvia."
 BLR_Strengthen_com_partys_agenda_lat: "Utilisez les Biélorusses locaux"
 BLR_Strengthen_com_partys_agenda_lat_desc: "Belarusians are the third largest non-indigenous people of Latvia. We should use this as an instrument of influence."
 BLR_buy_militaries_lat: "Soudoyer l'armée locale"
 BLR_litbel_propaganda_lat: "Propagande du pouvoir de l'État LitBel"
 BLR_parlament_lat_places: "Corrompre les politiciens locaux"
 BLR_revoult_lat: "Déclenchons une rébellion en Lettonie !"
 BLR_pol_revol_category: "Portons au pouvoir en Pologne les nationalistes dont nous avons besoin"
 BLR_pol_revol_category_desc: "We must take revenge on Poland for all the years it attempted to destroy our independence, for the humiliating Union of Lublin, and for the division of our country in the 20th century. We will put the Polish people in a position where they will have no choice but to obey us."
 BLR_Establish_cooperation_pol: "Établir des liens avec les nationalistes polonais"
 BLR_podlasie_return: "Retour de Bialystok à la Biélorussie"
 BLR_podlasie_return_desc: "Bialystok has always been a land inhabited by Belarusians. It is time to reclaim this land from the Poles and return it to the Belarusian state."
 BLR_Duchy_claims_category: "Revendications territoriales"
 BLR_Duchy_claims_category_desc: "We well remember the history of the Grand Duchy of Lithuania and all the lands that were under its command. We will declare our territorial claims over all our former territories."
 BLR_ukraine_claims: "Revendications territoriales sur §Y[UKR.GetNamewithFlag]§!"
 BLR_poland_claims: "Revendications territoriales sur §Y[POL.GetNamewithFlag]§!"
 BLR_russia_claims: "Revendications territoriales sur §Y[SOV.GetNamewithFlag]§!"
 BLR_latgale_claims: "Revendications territoriales sur §Y[LAT.GetNamewithFlag]§!"
 BLR_Litva_belarusization_category: "Intégration de nouvelles terres"
 BLR_Litva_belarusization_category_desc: "New lands need to be integrated into our state. The revival of the Litvinov nation is undoubtedly a risky project, but it can be the key to creating a powerful state."
 BLR_samogitia_return: "Intégration de Samogitie"
 BLR_sudovia_return: "Intégration de Sudovia"
 BLR_klaipeda_return: "Intégration de Klaipeda"
 BLR_latgale_return: "Intégration de Latgale"
 BLR_Litva_belarusizations_category: "Intégration de la Lituanie"
 BLR_Litva_belarusizations_category_desc: "Lithuania has always been and will always be a Belarusian land. We will return these lands to the Belarusian people."
 BLR_samogitia_returns: "Intégration de Samogitie"
 BLR_sudovia_returns: "Intégration de Sudovia"
 BLR_klaipeda_returns: "Intégration de Klaipeda"
 BLR_latgale_returns: "Intégration de Latgale"
 BLR_Lukashenko_category: "Le règne de Loukachenko"
 BLR_Lukashenko_category_desc: "Le régime de Loukachenko est clairement de nature autoritaire et ne poursuit qu’un seul objectif : rester au pouvoir à tout prix.\n§W--------------§!\nÀ l'heure actuelle, le pourcentage de soutien à Alexandre Grigorievitch Loukachenko est égal à §Y[?BLR.batka]§!"
 BLR_send_russian_omon: "Demandez à la police anti-émeute russe de réprimer les manifestations"
 BLR_go_to_jail_scum: "Envoyer les opposants en prison"
 BLR_trade_with_iraq: "Fournir des armes à l'Irak"
 BLR_fly_protasevich: "Atterrir dans un avion de Ryanair avec Protasevich"
 BLR_Deal_with_Poland: "Accord avec l'Union des Polonais"
 BLR_belorusisation_sudovia: "Biélorussienisation de la Sudovie"
 BLR_belorusisation_klaipeda: "Biélorussienisation de Klaipeda"
 BLR_belorusisation_samogitia: "Biélorussienisation de la Samogitie"
 BLR_people_militia: "Milice populaire"
 BLR_people_militia_desc: "\"Mais la situation n'est pas simple. Je l'ai déjà dit plus d'une fois : tout homme (et pas seulement un homme) doit être capable, au moins, de manier les armes. Ne serait-ce que pour protéger, si nécessaire, sa famille, sa maison, son coin de terre natal et, si nécessaire, son pays, sans lequel il n'y aura pas de coin, pas de maison, rien d'autre. Beaucoup de gens le comprennent\", a souligné Alexandre Loukachenko."
 BLR_Kommunarka_category: "Usine Kommunarka"
 BLR_Kommunarka_category_desc: "Now that we have fully nationalized the factory, we will be able to receive full income from it."
 BLR_Go_to_Russia: "Commencez à vendre des produits dans [SOV.GetNamewithFlag]"
 BLR_Go_to_Latvia: "Commencez à vendre des produits en [LAT.GetNamewithFlag]"
 BLR_Go_to_Kazakhstan: "Commencez à vendre des produits dans [KAZ.GetNamewithFlag]"
 BLR_Go_to_Georgia: "Commencez à vendre des produits dans [GEO.GetNamewithFlag]"
 BLR_Go_to_Moldova: "Commencez à vendre des produits dans [MLV.GetNamewithFlag]"
 BLR_Go_to_Armenia: "Commencez à vendre des produits dans [ARM.GetNamewithFlag]"
 BLR_Produst_all_CIS: "Commencez à vendre des produits dans la plupart des pays de la CEI"
 BLR_mtz: "Usine de tracteurs de Minsk"
 BLR_mtz_desc: "A factory in Belarus and a manufacturer of agricultural machinery. Minsk Tractor Plant was founded on May 29, 1946. The plant's capacity is designed for the production of 71,000 tractors of various series."
 BLR_Tracktor_category: "Usine MTZ"
 BLR_Tracktor_category_desc: "L'usine de tracteurs de Minsk est une usine en Biélorussie, fabricant de machines agricoles. L'usine de tracteurs de Minsk développe et fabrique des tracteurs à roues et à chenilles, des motoculteurs, des outils traînés et portés pour les travaux agricoles, de construction, forestiers et municipaux, des pièces de rechange, des biens de consommation, organise leur production sous licence, fournit des services pour la création et la conduite de services.\n\n\n                                                 - §YNombre de tracteurs disponibles§! §G[?BLR.tracktors]§! - "
 BLR_start_tracktor: "Commencer à assembler le tracteur « Belarus »"
 BLR_tracktor_engine: "Installer le moteur D-245.5"
 BLR_tracktor_trans: "Installer la transmission"
 BLR_tracktor_hydraulic: "Installer le système de suspension hydraulique"
 BLR_tracktor_kabina: "Assembler la cabine du tracteur"
 BLR_tracktor_final: "Ensemble complet de tracteur"
 BLR_tracktor_build: "Produire de nouveaux tracteurs"
 BLR_tracktor_holding: "Création de MTZ Holding"
 BLR_tracktor_export_rus: "Vendre des tracteurs à [SOV.GetNamewithFlag]"
 BLR_tracktor_export_ukr: "Vendre des tracteurs à [UKR.GetNamewithFlag]"
 BLR_tracktor_export_aze: "Vendre des tracteurs à [AZE.GetNamewithFlag]"
 BLR_tracktor_export_pak: "Vendre des tracteurs à [PAK.GetNamewithFlag]"
 BLR_tracktor_export_kaz: "Vendre des tracteurs à [KAZ.GetNamewithFlag]"
 BLR_tracktor_export_rom: "Vendre des tracteurs à [ROM.GetNamewithFlag]"
 BLR_tracktor_export_cub: "Vendre des tracteurs à [CUB.GetNamewithFlag]"
 BLR_tracktor_export_raj: "Vendre des tracteurs à [RAJ.GetNamewithFlag]"
