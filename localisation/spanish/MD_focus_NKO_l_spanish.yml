 NKO_rus_friend_category_desc: "La historia de las relaciones entre [NKO.GetFlag]§YKorea§! y [SOV.GetFlag]§YRusia§! se remonta a muchas décadas atrás, desde la primera relación con §Yel Imperio Ruso§! hasta la asistencia de §Rla Unión Soviética§! durante la §Rguerra§! con [KOR.GetFlag]§YSouth Korea§!. Ahora es el momento de §Grevivir§! las antiguas relaciones entre los países y elevarlas a un nuevo nivel para no cometer los errores del pasado."
