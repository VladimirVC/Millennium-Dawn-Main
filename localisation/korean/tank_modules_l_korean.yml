 FRA_afv_coax_machine_gun: "7,62mm AA-52"
 FRA_afv_coax_machine_gun_desc: "The AA-52 (full designation in French: Arme Automatique Transformable Modèle 1952), is one of the first French-produced guns of the post–World War II era. It was manufactured by the French government-owned Manufacture d'armes de Saint-Étienne (MAS) company"
 FRA_afv_machine_gun: "7,62mm AA-52"
 FRA_afv_machine_gun_desc: "The AA-52 (full designation in French: Arme Automatique Transformable Modèle 1952), is one of the first French-produced guns of the post–World War II era. It was manufactured by the French government-owned Manufacture d'armes de Saint-Étienne (MAS) company"
 FRA_afv_machine_gun_2: "12,7mm M2 Browning"
 FRA_small_autocannon_2: "20 mm modèle F2 gun"
 FRA_big_autocannon_3: "40mm 40 CTC"
 FRA_tank_very_large_cannon: "140mm 아스칼론(ASCALON)"
 FRA_tank_very_large_cannon_desc: "ASCALON(자동 장전 및 확장 가능한 고성능 포)은 넥스터(Nexter)사에서 설계한 프랑스제 50구경장 140mm 활강 전차포입니다."
 FRA_tank_small_medium_cannon: "105mm CN-105-57"
 FRA_tank_small_medium_cannon_desc: "CN 105/57 또는 D1504로도 알려진 CN-105-57은 프랑스제 경량 105mm 전차포로 다수의 경전차에 사용되었습니다."
 FRA_tank_small_medium_cannon_2: "105mm CN-105 F1"
 FRA_tank_small_medium_cannon_2_desc: "Canon de 105 mm modèle F1(또는 CN-105-F1)은 AMX-30 전차에 사용된 프랑스제 105mm 전차포입니다."
 FRA_tank_medium_cannon: "120mm CN120-25"
 FRA_tank_medium_cannon_desc: "Modèle G1(G1 모델)로도 불리는 CN120-25는 프랑스 부르주 기술 연구 제조소(EFAB)에서 수출용으로 설계한 52구경장 프랑스제 120mm 활강 전차포입니다."
 FRA_tank_medium_cannon_2: "120mm CN120-26"
 FRA_tank_medium_cannon_2_desc: "Modèle F1(F1 모델)로도 불리는 CN120-26은 부르주 EFAB에서 설계하고 지아트 인더스트리(Giat Industries)에서 생산한 52구경장 프랑스제 120mm 활강 전차포입니다."
 FRA_tank_small_cannon: "75mm SA 50"
 FRA_tank_small_cannon_desc: "75 SA 50(프랑스어: 75 mm Semi-Automatique Modèle 1950; 한국어: 75mm 반자동 모델 1950)은 75 Mle 50 또는 CN 75-50으로도 불리는 프랑스제 75mm 고속 강선포입니다."
 FRA_tank_small_cannon_2: "90mm CN90 F4 슈퍼 90"
 FRA_tank_small_cannon_desc_2: "AMX-13/90의 90mm 주포를 개량한 모델로, 동일한 탄약을 사용하나 정확도가 더욱 향상되었습니다."
 FRA_afv_assault_gun: "60mm Brandt Mle CM60A1"
 FRA_afv_assault_gun_desc: "The Brandt Mle CM60A1, also known as the Brandt HB 60LP, MCB-60 HB, or simply as the Brandt 60mm LP gun-mortar, is a 60 mm (2.36 in.) gun-mortar"
 FRA_medium_tank_artillery_chassis_0: "105mm Obusier de 105 modèle 1950"
 FRA_medium_tank_artillery_chassis_1: "155mm Canon GCT de 155 mm/L39"
 FRA_medium_tank_artillery_chassis_2: "155 mm Canon Caesar 155mm/L52"
 FRA_reactive_armor_gen1: "BRENUS"
 ISR_tank_medium_cannon_2: "120mm MG251"
 ISR_tank_medium_cannon_2_desc: "IMI 120mm 포는 이스라엘 군사 산업(IMI)에서 설계 및 생산한 L44 활강 전차포입니다. 흔히 라인메탈 L44 전차포의 면허 생산품으로 오해받지만, 실제로는 M60과 같이 좁은 포탑 마운트를 요구하는 이스라엘 방위군의 메르카바 마크 III 주력 전차의 요구 사항을 충족하기 위해 IMI가 1983년부터 1988년까지 독자적으로 개발한 포입니다."
 ISR_tank_medium_cannon_3: "120mm MG251-LR"
 ISR_tank_medium_cannon_3_desc: "VIDCO 인더스트리에서 개발한 열 슬리브와 새로운 압축 가스 반동 시스템을 갖춘 MG251의 개량형 버전입니다."
 SOV_tank_small_cannon: "76.2mm D-56T"
 SOV_afv_machine_gun: "7,62mm SGMT"
 SOV_afv_machine_gun_desc: "The SG-43/SGMT Goryunov (Russian: Станковый пулемёт системы Горюнова, Stankovyy pulyemyot sistyemy Goryunova, meaning \"Mounted machinegun, Goryunov design\") was a Soviet medium machine gun that was introduced during the Second World War. It was chambered for the 7.62x54mmR cartridge, and was introduced in 1943 as a replacement for the older M1910 Maxim machine guns."
 SOV_afv_machine_gun_2: "14,5mm KPVT"
 SOV_afv_machine_gun_2_desc: "The KPVT heavy machinegun  is a Soviet designed 14.5x114mm-caliber heavy machine gun, which first entered service as an infantry weapon (designated PKP) in 1949. In the 1960s, the infantry version was taken out of production because it was too large and heavy. It was later use in BTR series"
 SOV_afv_coax_machine_gun: "7,62mm PKT"
 SOV_afv_coax_machine_gun_desc: "The PKT (Russian: Пулемёт Калашникова, transliterated as Pulemyot Kalashnikova, or \"Kalashnikov's machine gun\"), is a belt-fed general-purpose machine gun, chambered for the 7.62x54mmR rimmed cartridge derived of the PK/PKM machinegun"
 SOV_afv_atgm_gen1: "9M14 Malyutka"
 SOV_afv_atgm_gen1_desc: "(NATO name AT-3 Sanger) It was the first man-portable anti-tank guided missile of the Soviet Union and is probably the most widely produced ATGM of all time"
 SOV_afv_assault_gun: "73mm 2A28 Grom"
 SOV_afv_assault_gun_desc: "The 2A28 Grom also known as KBP 2A28 Grom, is a 73 mm low pressure smoothbore semi-automatic gun with a wedge breech block. Development of the 2A28 Grom was directly linked to that of the SPG-9 recoilless gun; both fired projectiles similar to rocket-propelled grenades"
 SOV_afv_assault_gun_2: "100mm 2A70"
 SOV_afv_assault_gun_2_desc: "The 100 mm gun-launcher 2A70 (GRAU designation: 2А70) is a model of low-pressure rifled cannons designed in the Soviet Union by the KBP Instrument Design Bureau"
 SOV_small_autocannon: "30mm 2A42"
 SOV_small_autocannon_desc: "The Shipunov 2A42 is a Soviet/Russian 30 mm autocannon. It is built by the Tulamashzavod Joint Stock Company and named after A. G. Shipunov"
 SOV_small_autocannon_2: "30mm 2A72"
 SOV_small_autocannon_2_desc: "Lighter simplified variant of the 2A42 with a lower number of parts, a longer barrel, and higher muzzle velocity, but also a lower rate of fire. It is long recoil-operated, not gas-operated"
