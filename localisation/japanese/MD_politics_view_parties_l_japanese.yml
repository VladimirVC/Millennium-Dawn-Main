 KEN.liberalism: "£generic_liberalism_small (NDP) - National Development Party"
 KEN.liberalism_desc: "(Liberalism) - The National Development Party (NDP)\n\n The National Development was a minority party in Kenyan politics until Rail Odinga joined after he left Ford-Kenya following his loss of leadership to Michael Wamalwa. The party espouses a primary opposition like ideology to the ruling government of Kenya but they are known for their pro-Western and liberal policies with the majority of their support hailing from the Nyanza Province and the Luo people of Kenya."
 KEN.Caliphate: "£generic_Caliphate_small ケニアのアル・シャバブ"
 KEN.Caliphate_desc: "サラフィー・ジハード主義 - ケニアのアル・シャバブ（ASK）\n\nケニアのアル・シャバブは、隣国で内戦が続くソマリアから分裂したグループであり、ケニア北東部を拠点として、政府軍の手の届かないソマリア国内でのさらなる攻撃を仕掛けている。また、この分裂グループは、密輸や法違反で摘発された際、現地のケニア警察とも交戦している。"
 KEN.Neutral_Autocracy: "£generic_Neutral_Autocracy_small (KANU) ケニア・アフリカ民族同盟"
 KEN.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 KEN.Neutral_Autocracy_desc: "ケニア民族主義 - ケニア・アフリカ民族同盟（KANU）\n\nKANUは、植民地時代のケニアにそのルーツを持つアフリカ解放政党であるケニア・アフリカ民族同盟は、独立がようやく達成されるまで、その党員たちは迫害され、活動禁止処分を受け、投獄された。ジョモ・ケニヤッタ率いる同党は、ケニアを今日の姿へと導いた。1978年にダニエル・モイが政権を引き継ぐと、大統領権限が強化され、一党独裁体制が敷かれた。同党が時代の変化を受け入れるまでには、数十年を要することとなった。その独裁的な傾向は徐々に薄れつつあるが、部族主義は依然として党内で影響力を保っている。"
 KEN.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 KEN.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (Ark) サフィナ党"
 KEN.Neutral_Libertarian_desc: "社会リバタリアニズム - サフィナ党\n\nサフィナ党（スワヒリ語でノアの「方舟」の意）は、古人類学者であり自然保護活動家のリチャード・リーキーと弁護士のポール・ムイテによって、すべてのケニア国民を代表するオルタナティブ政党として、1995年に結成された。リーキーは党首を務めたことはないが、モイ大統領によって閣僚に指名されたことで、同党の政治的地位確立に大きく貢献した。そのイデオロギーは極めてリベラルであり、環境保護主義的な要素に加え、社会民主主義的および市民的ナショナリズム的な特徴を併せ持っている。"
