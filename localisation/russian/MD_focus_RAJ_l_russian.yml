 RAJ_mao_reb.4.t: "Антиправительственные демонстрации"
 RAJ_mao_reb.4.d: "Волна антиправительственных коммунистических протестов прокатилась по Индии, поскольку граждане выражают свое недовольство и требуют перемен. Демонстрации, организованные различными коммунистическими группами, собрали огромные толпы в крупных городах и поселках. Протестующие выражают обеспокоенность такими проблемами, как неравенство доходов, безработица и воспринимаемая авторитарная политика правительства. Они призывают к более инклюзивному обществу, где ресурсы распределяются справедливо, а права рабочего класса защищены."
 RAJ_mao_reb.4.a: "Раздавить их полицией!"
 RAJ_mao_reb.5.t: "Коммунистическая революция!"
 RAJ_mao_reb.5.d: "В результате шокирующего поворота событий Индия оказалась на грани гражданской войны, поскольку напряженность между правительством и коммунистическими фракциями достигла беспрецедентного уровня. Страну охватили ожесточенные протесты и столкновения, поскольку обе стороны отказываются уступать. Индийское правительство проводит спорную политику, которая вызывает гнев коммунистических партий. Столкновение идеологий и противоположных взглядов на будущее страны переросло в эскалацию конфликта."
 RAJ_mao_reb.5.a: "Боги спасают Индию, потому что никто другой не может."
 indian_event.41.t: "Tata Tea заплатит за Tetley 271 млн фунтов стерлингов"
 indian_event.41.d: "Компания Tetley, известная своей телевизионной рекламой с участием чайного народца Tetley, поглощена крупнейшей в мире интегрированной чайной компанией Tata Tea. Индийская компания заплатила 271 млн. фунтов стерлингов за частную компанию Tetley, производящую самый популярный чай в Великобритании и второй по величине мировой чайный бренд. Сделка, заключённая после многомесячных переговоров, финансируется за счёт акционерного и долгового капитала. Tata Tea, входящая в состав крупнейшей индийской бизнес-группы Tata, заявила, что существующее руководство Tetley продолжит заниматься текущими делами компании."
 indian_event.41.a: "Интересно"
 indian_event.42.t: "Визит президента США в Индию"
 indian_event.42.d: "Премьер-министр Индии Атал Бихари Ваджпаи приветствовал давление президента США на Исламабад. Это был первый случай, когда американский президент открыто встал на сторону Индии против Пакистана в военное время. Перед поездкой президента США американская разведка дала леденящую душу оценку: вероятность полномасштабной войны между двумя ядерными державами в ближайшее десятилетие составляет пятьдесят на пятьдесят. Президента США встречали как рок-звезду по всей Индии, с остановками в Дели, Хайдарабаде, Джайпуре и Мумбаи. Его выступление в парламенте было встречено бурными аплодисментами. Везде были огромные толпы. В ответ на этот визит Ваджпаи в том же году дал государственный обед в Белом доме. После десятилетий неспокойных отношений Индия и Америка повернули в лучшую сторону."
 indian_event.42.a: "Приветствую вас, друзья!"
 indian_event.43.t: "Скандал с договорными матчами"
 indian_event.43.d: "Один из самых громких скандалов, связанных с договорными матчами, произошёл в истории крикета, когда полиция Дели обнаружила запись сомнительных разговоров между Санджаем Чавлой и Ханси Кронье. Болельщики боготворили Кронье, популярного и успешного южноафриканского игрока в крикет. Однако его связь с Санджаем Чаулой вызывала разногласия. Санджай был назван известным участником индийской букмекерской группировки. Первоначально отрицая все обвинения в договорных матчах, Кронье разрыдался, но затем последовал перекрестный допрос."
 indian_event.43.a: "Запретить ему играть снова!"
 indian_event.44.t: "Население Индии достигает одного миллиарда."
 indian_event.44.d: "Население Индии официально достигло 1 миллиарда человек с рождением девочки. Правительственные чиновники решили, что младенец, родившийся в больнице Сафдарджанг в Дели, будет символизировать это достижение. Девочку назвали Астха Арора, она стала миллиардным ребёнком Индии. Анжана Арора, мать Астхи, рассказала Witness о том дне, когда её семья оказалась в центре внимания СМИ."
 indian_event.44.a: "Хорошо это или плохо?"
 indian_event.45.t: "Нападение на индийский парламент"
 indian_event.45.d: "Смертники штурмовали комплекс парламента Индии, убив семь человек, прежде чем сами погибли в беспрецедентной атаке на центр власти самой большой демократии в мире. Свидетели рассказали, что пятеро нападавших ворвались в парламент, выпрыгнув из автомобиля и атаковав охранников после того, как, по-видимому, проехали на территорию комплекса по поддельному пропуску. Один из нападавших подорвал себя у главного входа в залы парламента. «Я услышал хлопок, похожий на петарду, возле входа, затем увидел, как люди разбегаются в разные стороны», — рассказал Харбала Саин, депутат парламента, находившийся у грандиозного песчаникового здания парламента, спроектированного сэром Эдвином Лютьенсом во времена британского колониального правления. «Я видел, как многие одновременно открывали огонь. Я не мог понять, кто есть кто. Не мог отличить террористов от полиции», — добавил депутат. Ответственность за нападение никто не взял сразу. Один из нападавших погиб, когда подорвал взрывное устройство, закрепленное на поясе. Премьер-министр Индии, который в момент атаки не находился в здании, выступил по телевидению с заявлением, что борьба Индии с терроризмом вошла в завершающую стадию, а министры обороны и внутренних дел пообещали жесткий ответ. Министр внутренних дел Л.К. Адвани заявил: «Мы уничтожим террористов и их спонсоров, кто бы они ни были и где бы они ни находились». Первоначальные предположения связывали атаку с исламистскими боевиками, борющимися против индийского правления в штате Джамму и Кашмир, где два месяца назад в результате террористического акта погибло 38 человек. Если это подтвердится, ситуация обострится в отношениях с Пакистаном, которого Нью-Дели обвиняет в поддержке кашмирских боевиков. Президент Пакистана Первез Мушарраф быстро осудил нападение и направил сообщение соболезнования премьер-министру Ваджпаю"
 indian_event.45.a: "Проклятые ублюдки!"
 indian_event.46.t: "Дели получает метро мирового класса"
 indian_event.46.d: "Заместитель премьер-министра Л.К. Адвани сегодня в присутствии ликующей толпы дал старт долгожданному первому поезду делийского метрополитена для испытаний в вагонном депо метро в парке Шастри. Ожидается, что метро мирового класса, которое главный министр Дели Шейла Дикшит назвала проектом, не имеющим шансов на остановку, начнет работать до Рождества."
 indian_event.46.a: "Отлично"
 RAJ_indian_space_programme: "Индийская организация космических исследований"
 RAJ_indian_space_programme_desc: "Индийская организация космических исследований (Indian Space Research Organisation), обычно называемая ISRO, является национальным космическим агентством Индии. Она является основным научно-исследовательским подразделением Департамента космоса, который непосредственно курируется премьер-министром Индии, а председатель ISRO одновременно является исполнительным директором DoS."
 RAJ_indian_space_endeavors: "Индийские космические программы"
 RAJ_indian_space_endeavors_desc: "На дворе XXI век - век высоких технологий и процветания. Недавно закончилась \"холодная война\", в которой разные сверхдержавы - СССР и США - боролись за освоение космоса. Индия отставала от них, но на этот раз мы не упустим возможности догнать другие космические державы в освоении космоса"
 RAJ_irs_series: "Indian IRS"
 RAJ_irs_series_desc: "Индийские спутники дистанционного зондирования Земли - это индийские спутники наблюдения Земли. Они представляют собой крупнейшую на сегодняшний день коллекцию спутников дистанционного зондирования Земли гражданского назначения, предоставляющих услуги дистанционного зондирования Земли."
 RAJ_insat_navic: "INSAT Series"
 RAJ_insat_navic_desc: "Индийская национальная спутниковая система - телекоммуникационная система страны. Она представляет собой серию многоцелевых геостационарных спутников, созданных и запущенных ISRO для удовлетворения потребностей в телекоммуникациях, радиовещании, метеорологии и поисково-спасательных работах. С момента запуска первого спутника в 1983 году INSAT стала крупнейшей отечественной системой связи в Азиатско-Тихоокеанском регионе."
 RAJ_Chandrayaan: "Проект Chandrayan"
 RAJ_Chandrayaan_desc: "Chandrayaan-1 - первый индийский лунный зонд в рамках программы Chandrayaan. Он был запущен Индийской организацией космических исследований (ISRO) в октябре 2008 года и будет работать до августа 2009 года."
 RAJ_financing_of_private_space_companies: "Поддержка частных инициатив"
 RAJ_financing_of_private_space_companies_desc: "Хотя в космической отрасли Индии ведущую роль играет национальная Индийская организация космических исследований, в целом отрасль включает более 500 частных поставщиков и другие различные структуры Министерства космоса во всех коммерческих, исследовательских и произвольных направлениях."
 RAJ_chandrayan_to_moon: "Chandrayaan 3 - Луна!"
 RAJ_chandrayan_to_moon_desc: "Chandrayaan-3 - третий индийский космический аппарат для исследования Луны в рамках программы \"Chandrayaan\" Индийской организации космических исследований. В ее состав входят посадочный аппарат Vikram и марсоход Pragyan, аналогичные аппаратам миссии Chandrayaan-2."
 RAJ_Gaganyan: "Индийский орбитальный космический аппарат"
 RAJ_Gaganyan_desc: "Gaganyaan - индийский орбитальный корабль с экипажем, предназначенный для формирования индийской программы пилотируемых космических полетов. Космический аппарат рассчитан на перевозку трех человек, а планируемая модернизированная версия будет оснащена системой рандеву и стыковки."
 RAJ_Human_Spaceflight_Programme: "Программа пилотируемых космических полетов"
 RAJ_Human_Spaceflight_Programme_desc: "Индийская программа пилотируемых космических полетов - текущая программа Индийской организации космических исследований, направленная на разработку технологий, необходимых для запуска орбитальных кораблей с экипажем на низкую околоземную орбиту."
 RAJ_astrosat: "ASTROSAT"
 RAJ_astrosat_desc: "Astrosat - первый в Индии специализированный многоволновый космический телескоп."
 RAJ_energy_idea: "Индийская ядерная энергетика"
 indian_event.47.t: "Террор опустошает Мумбаи"
 indian_event.47.d: "Скоординированные группы вооруженных людей расстреляли туристические объекты в индийском финансовом центре Мумбаи в конце среды и начале сегодняшнего дня, убив по меньшей мере 101 человека и ранив более 200, при этом их целью, очевидно, были американские и британские граждане, которых они хотели взять в заложники. Нападавшие ворвались в два роскошных отеля, излюбленных иностранцами, - Taj Mahal Palace и Oberoi, стреляя из автоматического оружия, бросая гранаты и заставляя гостей в панике бежать в поисках спасения. Некоторые постояльцы оставались в отелях в течение нескольких часов, даже когда в результате серии взрывов загорелся отель Taj, являющийся достопримечательностью набережной Мумбаи. Несмотря на то, что в последние годы в Мумбаи было совершено несколько террористических актов, по мнению экспертов, нападения, совершенные в среду, потребовали невиданной ранее степени разведки и планирования. Масштаб и синхронность нападений указывают на то, что в них, скорее всего, участвовали опытные командиры, а некоторые эксперты предполагают возможное иностранное участие. Напав на город после наступления темноты, террористы практически одновременно нанесли удары по внутреннему аэропорту и железнодорожному вокзалу, а также обстреляли популярный среди иностранцев ресторан Leopold Cafe. Всего 16 групп нанесли удары по девяти объектам на южном фланге этого многолюдного мегаполиса с населением 19 млн. человек."
 indian_event.47.a: "Ужас"
 indian_event.48.t: "Движение против коррупции"
 indian_event.48.d: "Индийское антикоррупционное движение, известное как \"Анна Андолан\", - это серия демонстраций и протестов по всей Индии, начавшаяся в 2011 г. и направленная на принятие жестких законодательных и правоприменительных мер против, как считается, повсеместной политической коррупции. Журнал Time назвал это движение одним из \"10 лучших новостей 2011 года\". Движение набрало силу 5 апреля 2011 г., когда активист антикоррупционного движения Анна Хазаре начал голодовку у монумента Джантар-Мантар в Нью-Дели. Целью движения было снижение уровня коррупции в индийском правительстве путем принятия законопроекта \"Джан Локпал\". Другой целью, которую возглавляли Рамдев, Киран Беди, Арвинд Кеджривал и другие, была репатриация \"черных денег\" из зарубежных банков. В центре внимания участников массовых акций протеста были правовые и политические вопросы, в том числе политическая коррупция, клептократия и другие формы коррупции. Движение носило преимущественно характер ненасильственного гражданского сопротивления и включало в себя демонстрации, шествия, акции гражданского неповиновения, голодовки, митинги, а также использование социальных сетей для организации, общения и повышения осведомленности. Протесты были внепартийными, и большинство участников враждебно относились к попыткам политических партий использовать их для усиления собственной политической программы."
 indian_event.48.a: "Интересно"
 indian_event.49.t: "Слушания в парламенте"
 indian_event.49.d: "В последнее время ЛГБТ-движение приобретает всё большую популярность в индийском обществе. В индийском парламенте неоднократно обсуждался вопрос о легализации ЛГБТ в стране, и на одном из последних заседаний этот вопрос был поднят вновь. Считается, что именно сейчас должно быть принято окончательное решение - легализовать ли ЛГБТ в Индии или оставить его под запретом и больше никогда не возвращаться к этому вопросу. Что выберем мы? "
 indian_event.49.a: "ЛГБТ - это такая шутка?"
 indian_event.49.b: "Мы разрешаем легализацию ЛГБТ."
 indian_event.50.t: "Нападение на Пулваму"
 indian_event.50.d: "Теракт в Пулваме 2019 года произошел 14 февраля 2019 года, когда колонна автомобилей с индийскими сотрудниками службы безопасности, следовавшая по национальной автомагистрали Джамму-Сринагар, была атакована террористом-смертником в автомобиле в Летапоре, округ Пулвама, бывшего штата Джамму и Кашмир. В результате нападения погибли 40 сотрудников Центрального резервного полицейского корпуса Индии (CRPF), а также сам террорист — Адил Ахмад Дар, местный кашмирский юноша из округа Пулвама. Ответственность за нападение взяла на себя базирующаяся в Пакистане исламистская террористическая группа «Джаиш-э-Мохаммед». Индия обвинила в нападении соседний Пакистан, который осудил теракт и отрицал свою причастность к нему. Нападение нанесло серьезный удар по индийско-пакистанским отношениям, что в конечном итоге привело к военному противостоянию между Индией и Пакистаном в 2019 году. Впоследствии индийское расследование выявило 19 обвиняемых."
 indian_event.50.a: "О, чёрт."
 indian_event.51.t: "Индийская станция Chandrayaan-3 успешно приземлилась на Луну!"
 indian_event.51.d: "Индийская автоматическая межпланетная станция «Чандраян-3» успешно совершила мягкую посадку на Луне. Процесс спуска транслировался в прямом эфире Индийской организацией космических исследований. Запись можно посмотреть на YouTube. Мягкая посадка произошла примерно в районе Южного полюса Луны. Таким образом, Индия вошла в элитный клуб космических держав, способных осуществлять мягкую посадку на лунной поверхности. Ранее эту возможность продемонстрировали СССР, США и Китай."
 indian_event.51.a: "Отлично"
