 CPD_send_blocked_TT: "§R아직 이 협정을 보낼 수 없습니다.§! §Y요구 사항§!을 보내려면 [THIS.GetName]에 대한 §Y전쟁 기여도§!(최소 1회 이상의 전투 승리 또는 3개월 이상의 교전 기간)가 필요합니다. §Y휴전 전용§! 협정은 기여도 없이 보낼 수 있으며, 완전히 양보로만 구성된 협정 역시 기여도 없이 보낼 수 있습니다.\n\n[CPD_send_status_breakdown]\n\n[CPD_deal_recap]"
