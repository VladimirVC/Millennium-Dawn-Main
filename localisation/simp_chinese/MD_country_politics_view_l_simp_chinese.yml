 IP_communist_category_desc: "[IP_communist_powers]"
 IP_socialist_category_desc: "[IP_socialist_powers]"
 IP_conservative_category_desc: "[IP_conservative_powers]"
 IP_liberal_category_desc: "[IP_liberal_powers]"
 IP_autocrat_category_desc: "[IP_autocrat_powers]"
 IP_monarchist_category_desc: "[IP_monarchist_powers]"
 IP_fundamentalist_symbol_desc: "[IP_fundamentalist_powers]"
 IP_communist_category_desc_delayed: "§L共产主义者通常遵循某种形式的马克思列宁主义或类似意识形态。作为国家主导经济的倡导者，他们通过国有化外国产业和五年计划能更轻松地实现工业化。他们还能利用间谍更有效地提升自身的影响力。§!"
 IP_socialist_category_desc_delayed: "§L社会主义者将市场和国家资本主义的元素与进步主义结合起来。通常，重点是将政府的所有努力都投入到国家本身。社会主义者很容易通过福利政策和政府对经济的干预来改善他们国家的内部状况。§!"
 IP_conservative_category_desc_delayed: "§L保守主义者通常希望国家保持现状，甚至废除一些更进步的法律。保守主义往往带有民族主义的暗示和深厚的宗教信仰。因此，保守国家的政治和国家更容易稳定，因为激进的变化很少。§!"
 IP_liberal_category_desc_delayed: "§L自由主义者倾向于宣扬自由的思想，尽管一些政党采取更进步的（社会自由主义）方法来解决问题。大多数自由主义政党的核心理念是建立自由市场，政府干预非常有限。§!"
 IP_autocrat_category_desc_delayed: "§L独裁者依赖于强人（偶尔也有女强人）的力量来治理国家。煽动者们不畏使用有争议的方法和幕后交易来达成他们的目的。独裁者在容忍高度腐败和铁腕掌控国家方面会更轻松。§!"
 IP_monarchist_category_desc_delayed: "§L君主主义者依靠血统和荣誉来统治国家。把权力集中在一个家庭是有好处的。这个家族带来权力，君主善于鼓舞人民。§!"
 IP_fundamentalist_symbol_desc_delayed: "§L原教旨主义者是信奉激进或极端保守伊斯兰教的强硬保守派。他们的主要目标是将这些保守观点传播到其他国家。§!"
