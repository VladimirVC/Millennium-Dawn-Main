 NKO_propose_north_led_unification_yo_jong: "Proposer un gouvernement d'unité"
 NKO_propose_north_led_unification_yo_jong_desc: "Il est peu probable que les dirigeants du Sud acceptent un accord qui les écarterait du pouvoir et les punirait potentiellement pour leurs actions passées. Un gouvernement d'union entre le Nord et le Sud est le meilleur moyen de poursuivre la cause de la réunification coréenne."
 NKO_propose_unity_government_yo_jong: "Proposer une unification dirigée par le Nord"
 NKO_propose_unity_government_yo_jong_desc: "De notre système de protection sociale équitable à notre armement nucléaire plus puissant, il est clair que le modèle nord-coréen représente la voie à suivre pour la péninsule coréenne. Nous devons insister sur le fait que nous devons être ceux qui guideront la Corée vers un avenir puissant après la réunification."
 NKO_pave_the_way_for_reunification_yo_jong: "Ouvrir la Voie à la Réunification"
 NKO_pave_the_way_for_reunification_yo_jong_desc: "Maintenant que de grands progrès ont été réalisés pour normaliser les relations inter-coréennes, nous pouvons commencer à préparer la réunification.\""
