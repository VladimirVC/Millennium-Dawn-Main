 reduce_interest_rate: "일시적인 금리(이자율) 조치"
 reduce_interest_rate_desc: "우리는 부채 문제를 누그러뜨리기 위해 일시적으로 낮은 금리(이자율)를 요청할 수 있습니다. 요청은 3개월 동안만 유효하며 그 이후에는 원래대로 돌아옵니다."
 treasury_loss_projects_TT: "추가 지출: 국내총생산(GDP)중 §R0.05%§!\n\n§Y프로젝트 비용§! 변동치: [?ROOT.modifier@projects_cost_modifier|-2%]\n"
 bankruptcy_cheap_loans_from_imf: "§1국제통화기금§!의 저렴한 대출 §Y지급§!"
 bankruptcy_cheap_loans_from_imf_desc: "우리는 선진국으로서 저렴한 이자로 대출을 받기 위해 IMF와 협상할 수 있습니다. 이 새로운 대출 묶음으로 과거 채무의 일부를 갚을 수 있겠지만, IMF는 예산의 균형을 맞출 것을 요구합니다. 우리는 1년 안에 이 목표를 달성해야 하며 그렇지 않으면 IMF는 국유 자산 압류의 형태로 부채를 회수할 것입니다. 실패하면 고통의 구렁텅이에 빠지게 될 것이므로 반드시 성공해야 합니다.\n\n§Y플레이어 참고 사항§!: 이 임무는 365일 후에 제거되며, 임무에 실패할 때마다 다시 추가됩니다. 또한 다음 시스템을 사용할 수 없게 막습니다:\n- 국내 투자\n- 대외 투자."
 bankruptcy_seek_bailout_from_biggest_influencer: "§Y[?var:FROM.influence_array^0.GetNameWithFlag]§!의 구제 금융 §Y요청§!"
 bankruptcy_seek_bailout_from_biggest_influencer_desc: "우리나라의 경제 지원 강대국에게 구제 금융 요청과 더불어, 조금의 감면을 부탁할 수 있습니다. 당연하게도, 이 과정을 통해 우리나라에서 그 강대국의 영향력이 더욱 증가할 것입니다."
 bankruptcy_seek_bailout_from_second_biggest_influencer: "§Y[?var:FROM.influence_array^1.GetNameWithFlag]§!에게 구제 금융 §Y요청§!"
 bankruptcy_seek_bailout_from_second_biggest_influencer_desc: "우리나라의 경제 지원 강대국에게 구제 금융 요청과 더불어, 조금의 감면을 부탁할 수 있습니다. 당연하게도, 이 과정을 통해 우리나라에서 그 강대국의 영향력이 더욱 증가할 것입니다."
 bankruptcy_seek_bailout_from_neighbour: "주변국 §Y[FROM.GetNameWithFlag]§!에 구제 금융 §Y요청§!"
 bankruptcy_seek_bailout_from_neighbour_desc: "우리가 대출한 일부의 자금은 우호적인 동맹국 [FROM.GetNameDef]에서 받았습니다. 우린 서로 친한 사이니까, 혹시라도 구제를 요청해봐도 괜찮지 않을까요?"
 bankruptcy_seek_bailout_from_imf: "§1국제통화기금(IMF)§!에 구제 금융 §Y요청§!"
 bankruptcy_seek_bailout_from_imf_desc: "최후의 수단으로써 우린 국제통화기금(IMF)에 구제 금융을 요청할 수 있습니다. 국제통화기금은 수많은 국가의 재정 상태를 관할하는 범세계적 기구이므로, 그들은 국고의 사용에 매우 까다롭습니다. 그들은 우리가 미래에 부채를 상환할 수 있도록 국가 경제 정책의 변경을 요구할 것입니다."
 bankruptcy_incoming_collapse: "§Y다가오는§! 경제 §R붕괴§!"
 bankruptcy_incoming_collapse_desc: "이제 아무것도 되돌릴 수 없습니다. 우리 정부가 부채로 인해 지불했던 이자가 감당할 수 없을 정도로 증가했고 이젠 심지어 국가의 총 수입보다 커지게 되었습니다. 끔찍한 악몽같은 상황이 눈앞에 펼쳐지고 있으며 시민들을 달래는 것도 많이 힘들어 보입니다"
 bankruptcy_default_on_debts: "§R채§!무의 §Y불이행§!"
 bankruptcy_default_on_debts_desc: "우리의 빚을 갚지 않는다면, 채무자들의 입장에선 더 이상 우리는 현실적으로 빚을 갚지 못할 것이라고 생각하게 만들 것입니다. 이제, 빚으로 무너지기 직전인 나라에게 주어지는 마지막 최후의 기회입니다. 보통 돈을 지급해준 채무국들은 빚의 일부분을 감면해줍니다. 이는 국가가 빚으로 붕괴하면 그들이 빌려준 돈을 한푼도 받지 못할 것이기 때문에, 조금이라도 받아내는 것이 이득이므로 그렇습니다. 그러나 이런 경우는 정치적 양보 없이는 이루어질 수 없습니다. 빚을 갚지 않고 채무국들의 요구를 아무렇게도 충족시켜주지 않는다면 대단히 위험한 상황에 직면하게 될지도 모릅니다."
 cheap_loans_from_imf_tt: "§1IMF§!는 경제를 정상화하기 위해 우리의 §Y잠재적 지출§!을 §Y잠재적 수입§! 아래로 낮출 것을 요구할 것입니다. 향후 1년간 우리는 부채 이자를 낼 필요가 없지만, 이를 이행하지 못할 경우 국유 자산을 잃는 징벌을 받게 됩니다."
 bankruptcy_seek_bailout_from_biggest_influencer_tt: "우린 [?var:FROM.influence_array^0.GetNameDef]에게 우리 채무액 중 §Y$[?debt_bailout|0] x10억§!을 대신 지불하라고 요구할 수 있습니다. 그들은 총 금액의 4분의 3을 지불할 것이며 나머지는 협상을 진행할 것입니다. [?var:FROM.influence_array^0.GetNameDef]의 수락 여부는 그들의 경제 상태에 따라 결정될 것입니다.\n\n그들이 수락한다면, 그 국가는 우리나라에서 §R15%§!의 영향력을 추가로 행사하게 될 것입니다.\n\n"
 bankruptcy_seek_bailout_from_second_biggest_influencer_tt: "우린 [?var:FROM.influence_array^1.GetNameDef]에게 우리 채무액 중 §Y$[?debt_bailout|0] x10억§!을 대신 지불하라고 요구할 수 있습니다. 그들은 총 금액의 3분의 2를 지불할 것이며 나머지는 협상을 진행할 것입니다. [?var:FROM.influence_array^1.GetNameDef]의 수락 여부는 그들의 경제 상태에 따라 결정될 것입니다.\n\n그들이 수락한다면, 그 국가는 우리나라에서 §R10%§!의 영향력을 추가로 행사하게 될 것입니다.\n\n"
 bankruptcy_seek_bailout_from_neighbour_tt: "우린 [FROM.GetNameDef]에게 우리 채무액 중 §Y$[?debt_bailout|0] x10억§!을 대신 지불하라고 요구할 수 있습니다. 그들은 총 금액의 절반을 지불할 것이며 나머지는 협상을 진행할 것입니다. [FROM.GetNameDef]의 수락 여부는 그들의 경제 상태에 따라 결정될 것입니다.\n\n그들이 수락한다면, 그 국가는 우리나라에서 §R5%§!의 영향력을 추가로 행사하게 될 것입니다.\n\n"
 bankruptcy_seek_bailout_from_imf_tt: "우리는 국제통화기금(IMF)에 연락하여 채무액 중 §Y$[?debt_bailout|0] x10억§!에 대한 협상과 더불어 1년간 낮은 이자율을 부탁할 것입니다. 그 대신, 그들은 국가 경제 정책의 변경을 요구할 것입니다. §R그들의 요구를 거부한다면 이에 대한 처벌로 그들이 일시적으로 더욱 높은 이자율을 요구할 것입니다!§!\n\n"
 bankruptcy_seek_bailout_from_imf_low_gdp_per_capita_tt: "§R현재 1인당 국내총생산(GDP/C)이 $5천 달러 보다 낮으므로, 우리는 원래보다 더욱 가혹한 요구를 받게 될 것입니다!§!"
 bankruptcy_incoming_collapse_complete_trigger: "국가의 §Y부채 이자§! (§Y$$[?debt_rate]§!)가 §Y성장 수익§! (§Y$$[?potential_income]§!)보다 낮습니다"
 bankruptcy_default_on_debts_tt: "채무액 중 §Y25%§!가 즉시 협상될 것입니다. 채무액 중 §Y50%§!는 채무 불이행 상태로 넘어갈 것입니다. 우리는 이 50%의 불이행 금액을 지불할 수 있는 방법을 찾기 위해 §Y360일§!의 시간이 주어집니다. §R만약 우리가 제시간에 해결책을 찾아내지 못한다면, 영향력을 행사하는 국가들이 강제로 채무액을 가져가려 할지 모릅니다§!\n\n"
 debt_default_cancel_int_investments: "국가의 §Y대외 투자액§!와 §Y국고§!가 §Y$0§!으로 조정됩니다\n"
 debt_default_decisions: "채무불이행"
 debt_default_decisions_desc: "우리는 아직 남아있는 불이행된 채무액을 협상할 수 있는 방법을 찾아야합니다.\n\n채무 불이행 남은 금액: §Y$[?debt_default_left] x 10억§!"
 debt_default_main_mission: "불이행 채무액 청산"
 debt_default_main_mission_desc: "우리는 불이행된 채무액을 어떻게 보상할지, 협상할지, 또는 지불할지 찾아야합니다"
 debt_default_pay_10_from_treasury: "국고에서 §Y$10 x10억을§! 지불합니다"
 debt_default_pay_10_from_treasury_desc: "오래된 채무액을 지불하는 방법 중 하나는 새로운 빚을 만들어 과거의 부채를 갚아나가는 것입니다. 물론, 채무자들은 이런 조치를 용납하지 않을 것이며 결국엔 계속해서 높은 채무액에 시달릴 겁니다."
 debt_default_pay_50_from_treasury: "국고에서 §Y$50 x10억을§! 지불합니다"
 debt_default_pay_50_from_treasury_desc: "오래된 채무액을 지불하는 방법 중 하나는 새로운 빚을 만들어 과거의 부채를 갚아나가는 것입니다. 물론, 채무자들은 이런 조치를 용납하지 않을 것이며 결국엔 계속해서 높은 채무액에 시달릴 겁니다."
 debt_default_concessions_to_the_imf: "§1국제통화기금(IMF)§!과의 §Y정치적 양보§!"
 debt_default_concessions_to_the_imf_desc: "국제통화기금(IMF)는 예전에 그랬던 것처럼 빚에 허덕이지 않게 하기 위해서 우리에게 극단적인 절제 및 금욕을 요구하고 있습니다. 그들의 언성은 격했습니다만, 그들이 하라는 대로 하지 않는다면 채무액 협상을 거부할 것입니다."
 debt_default_political_concessions_to_biggest_influencer: "§Y[?var:FROM.influence_array^0.GetNameWithFlag]§!에 §Y대한 정치적 양보§!"
 debt_default_political_concessions_to_biggest_influencer_desc: "우리가 [?var:FROM.influence_array^0.GetAdjective](와)과 함께 정치적 협상을 통한 양보를 얻어낼 수 있다면, 그들은 우리의 채무액 중 일부를 협상해 줄지도 모릅니다"
 debt_default_political_concessions_to_second_biggest_influencer: "§Y[?var:FROM.influence_array^1.GetNameWithFlag]§!에 §Y대한 정치적 양보§!"
 debt_default_political_concessions_to_second_biggest_influencer_desc: "우리가 [?var:FROM.influence_array^1.GetAdjective](와)과 함께 정치적 협상을 통한 양보를 얻어낼 수 있다면, 그들은 우리의 채무액 중 일부를 협상해 줄지도 모릅니다"
 debt_default_sell_civilian_factories: "공기업 §Y매각§!"
 debt_default_sell_civilian_factories_desc: "불이행된 채무액을 지불하기 위해 자금을 모으기 위해선, 우리는 건설 회사, 원전 및 여러 사업체 등의 일부 공기업을 해체시켜 팔아야합니다. 우리의 무너져가는 경제를 생각하면 끔찍한 일이지만 어쩔수 없는 상황입니다."
 debt_default_dismantle_military_factories: "군수 산업 §Y해체§!"
 debt_default_dismantle_military_factories_desc: "일부 군수 산업 단지를 폐쇄하여 불이행된 채무액을 갚는데 써야합니다. 남아있는 도구나 장비는 분명 다른 국가들이 눈독들이고 있을 것이기 때문에, 남은 장비들을 팔아 자금을 확보할 수 있을 겁니다."
 debt_default_scrap_dockyard: "건조중인 선박 §Y폐기§!"
 debt_default_scrap_dockyard_desc: "우린 아직 건조 중인 선박들이 있습니다. 지금 건조를 중단하고 완공되지 못한 선박들을 분해하여 판다면, 조금의 자금을 마련할 수 있을 겁니다. 우리는 또한 나머지 조선소 장비들도 매각할 겁니다."
 debt_default_cut_down_government_services: "사무 지구 예산 §Y감축§!"
 debt_default_cut_down_government_services_desc: "정부 시스템에서 사용되는 지출과 공석인 참모진의 자리를 감축해야합니다"
 debt_default_main_mission_complete_trigger: "남은 채무 불이행 금액이 $0임"
 debt_default_pay_10_from_treasury_tt: "과거의 채무를 갚기 위해 §Y국고§!에서 §Y$$10 x10억§!을 지불합니다\n남아있는 채무 불이행 금액: §G-$10 x10억§!"
 debt_default_pay_50_from_treasury_tt: "과거의 채무를 갚기 위해 §Y국고§!에서 §Y$$50 x10억§!을 지불합니다\n남아있는 채무 불이행 금액: §G-$50 x10억§!"
 debt_default_concessions_to_the_imf_tt: "남아있는 채무 불이행 금액: §G-$[?debt_default_reduction]§!"
 debt_default_political_concessions_to_biggest_influencer_tt: "남아있는 채무 불이행 금액: §G-$[?debt_default_reduction]§!"
 sell_10_billion_factory: "남아있는 채무 불이행 금액: §G-$10 x10억§!"
 sell_15_billion_factory: "남아있는 채무 불이행 금액: §G-$15 x10억§!"
 bankruptcy.1.t: "구제 금융을 요청하는 [From.GetNameWithFlag]"
 bankruptcy.1.d: "[From.GetName]의 부채 문제는 매우 심각한 상황이며, 현실적으로 이를 지불할 능력도, 심지어는 부채로 생긴 이자 조차도 갚을 수 없는 상태에 이르렀습니다. 파산 직전의 상황에 놓인 지금, 이러한 절망적인 상황 속에서 [From.GetAdjective]의 지도자 [From.GetLeader](은)는 [Root.GetName]의 도움을 간청하기 위해 [Root.GetLeader](을)를 찾았습니다.\n\n[From.GetNameWithFlag](은)는 채무액의 일부분인 $[?FROM.debt_bailout|0] §Yx 10억§!을 협상하기를 요청하며, 그 금액의 75%를 지불해주고 나머지는 감면해주기를 간곡히 부탁하고 있습니다. 우리가 이를 수락한다면, 그들이 빚을 감당할 수 있도록 [From.GetName]의 채무액을 과감하게 줄여 국제 사회의 지도자들을 진정시킬 수 있을 것입니다.\n\n비록 우리의 자금을 잃게 되겠지만, 앞으로 그들을 언제든지 우리 부채 문제에 끌어들일 수 있을 것이며, 우린 그들에게 엄청난 영향력을 행사할 수 있을 것입니다."
 bankruptcy.1.a: "[From.GetNameWithFlag]의 긴급 구제를 승인한다"
 bankruptcy.1.b: "미안하지만, 그럴 여유가 없다"
 bankruptcy_bailout_influence_TT: "[From.GetNameWithFlag]: [Root.GetNameWithFlag]의 §Y영향력§!이 §G15%§! 증가합니다"
 bankruptcy.2.t: "구제 금융을 요청하는 [From.GetNameWithFlag]"
 bankruptcy.2.d: "[From.GetName]의 부채 문제는 매우 심각한 상황이며, 현실적으로 이를 지불할 능력도, 심지어는 부채로 생긴 이자 조차도 갚을 수 없는 상태에 이르렀습니다. 파산 직전의 상황에 놓인 지금, 이러한 절망적인 상황 속에서 [From.GetAdjective]의 지도자 [From.GetLeader](은)는 [Root.GetName]의 도움을 간청하기 위해 [Root.GetLeader](을)를 찾았습니다.\n\n[From.GetNameWithFlag](은)는 채무액의 일부분인 $[?FROM.debt_bailout|0] §Yx 10억§!을 협상하기를 요청하며, 그 금액의 3분의 2를 지불해주고 나머지는 감면해주기를 간곡히 부탁하고 있습니다. 우리가 이를 수락한다면, 그들이 빚을 감당할 수 있도록 [From.GetName]의 채무액을 과감하게 줄여 국제 사회의 지도자들을 진정시킬 수 있을 것입니다.\n\n비록 우리의 자금을 잃게 되겠지만, 앞으로 그들을 언제든지 우리 부채 문제에 끌어들일 수 있을 것이며, 우린 그들에게 엄청난 영향력을 행사할 수 있을 것입니다."
 bankruptcy.2.a: "[From.GetNameWithFlag]의 긴급 구제를 승인한다"
 bankruptcy.2.b: "미안하지만, 그럴 여유가 없다"
 bankruptcy_bailout_influence_second_biggest_TT: "[From.GetNameWithFlag]: [Root.GetNameWithFlag]의 §Y영향력§!이 §G10%§! 증가합니다"
 bankruptcy.3.t: "구제 금융을 요청하는 [From.GetNameWithFlag]"
 bankruptcy.3.d: "[From.GetName]의 부채 문제는 매우 심각한 상황이며, 현실적으로 이를 지불할 능력도, 심지어는 부채로 생긴 이자 조차도 갚을 수 없는 상태에 이르렀습니다. 파산 직전의 상황에 놓인 지금, 이러한 절망적인 상황 속에서 [From.GetAdjective]의 지도자 [From.GetLeader](은)는 [Root.GetName]의 도움을 간청하기 위해 [Root.GetLeader](을)를 찾았습니다.\n\n[From.GetNameWithFlag](은)는 채무액의 일부분인 $[?FROM.debt_bailout|0] §Yx 10억§!을 협상하기를 요청하며, 그 금액의 절반을 지불해주고 나머지는 감면해주기를 간곡히 부탁하고 있습니다. 우리가 이를 수락한다면, 그들이 빚을 감당할 수 있도록 [From.GetName]의 채무액을 과감하게 줄여 국제 사회의 지도자들을 진정시킬 수 있을 것입니다.\n\n비록 우리의 자금을 잃게 되겠지만, 앞으로 그들을 언제든지 우리 부채 문제에 끌어들일 수 있을 것이며, 우린 그들에게 엄청난 영향력을 행사할 수 있을 것입니다."
 bankruptcy.3.a: "[From.GetNameWithFlag]의 긴급 구제를 승인한다"
 bankruptcy.3.b: "미안하지만, 그럴 여유가 없다"
 bankruptcy_bailout_influence_neighbour_TT: "[From.GetNameWithFlag]: [Root.GetNameWithFlag]의 §Y영향력§!이 §G5%§! 증가합니다"
 bankruptcy.4.t: "구제 금융 요청을 거부한 [From.GetNameWithFlag]"
 bankruptcy.4.d: "어제 [From.GetName]에서 진행된 [From.GetLeader](와)과 [Root.GetLeader] 간의 최고지도자 회의에서, [From.GetAdjective](은)는 전적으로 우리가 처한 상황에 공감해주지 않았고, 우리의 구제 금융 요청을 거절하였습니다. 비록 실질적으로 우리가 [From.GetName]에게 빚진 것은 없었지만, 그들의 거절은 믿음직한 우호국으로써 인식이 사라지는 계기가 되었습니다."
 bankruptcy.4.a: "알겠다"
 bankruptcy.10.t: "야당의 선거 요구"
 bankruptcy.10.d: "다수의 야당 대표들은 오늘 합동 성명서를 발표하여 [ROOT.GetLeader]의 통치와 [show_ruling_party]의 집권은 국가를 경제적 파국으로 몰아넣고 있다며 비난하였습니다. 그들은 시민의 권리가 포함되고 현재의 경제 침체를 회복할 수 있는 가능성을 보유한 새로운 정부를 구성하기 위해 즉각적인 선거를 실시할 것을 요구하고 있습니다. 우리 정보기관의 보고서에 따르면, 이 주장은 상당히 많은 시민들의 지지를 확보한 것으로 보입니다. 이런 시국에도 불구하고 정권을 붙잡으려 한다면, 정말로 끔찍한 사태가 일어날지도 모릅니다."
 bankruptcy.10.a: "새로운 선거를 실시해야 한다"
 bankruptcy.10.b: "우리의 임기가 끝난 이후 선거를 열 것이다. 그전에는 할 수 없다"
 bankruptcy.11.t: "의회 습격을 시도하는 시위대"
 bankruptcy.11.d: "새로운 선거를 실시하지 않겠다는 [ROOT.GetLeader]의 선언 이후, [ROOT.GetName]의 시민들은 거의 즉시 거리로 나서 행진하기 시작했습니다. [ROOT.GetLeader]의 하야 (또는 그보다 더한 것들)을 요구하며, 제 1 야당의 수장이 이끄는 시위대의 무리는 의회 건물로 행진해오기 시작했습니다.\n\n원래라면 의회를 보호해야될 지역 경찰들은 시위대를 진압하는데 실패하였습니다! 이제 어떻게 해야 될까요?"
 bankruptcy.11.a: "잠깐만! 알겠다고... 이제 당신들 편이야"
 bankruptcy.11.b: "군대를 동원하여 모든 반란군을 잡아들여라!"
 bankruptcy.11.a_tt: "§G제 1 야당이 평화적으로 정권을 차지했습니다§!"
 bankruptcy.11.b_tt: "§G현 집권당이 계속 정권을 유지합니다§!"
 bankruptcy.12.t: "[show_ruling_party]의 하야를 요구하는 야당"
 bankruptcy.12.d: "다수의 야당 대표들은 오늘 합동 성명서를 발표하여 [ROOT.GetLeader]의 통치와 [show_ruling_party]의 집권은 국가를 경제적 파국으로 몰아넣고 있다며 비난하였습니다. 그들은 [show_ruling_party]의 정권 퇴거를 요구하면서 시민들을 대표하고 현재의 경제 침체를 회복할 수 있는 가능성을 보유한 새로운 적법한 정부를 구성하기를 원하고 있습니다. 우리 정보기관의 보고서에 따르면, 이 주장은 상당히 많은 시민들의 지지를 확보한 것으로 보입니다. 이런 시국에도 불구하고 정권을 붙잡으려 한다면, 정말로 끔찍한 사태가 일어날지도 모릅니다."
 bankruptcy.12.a: "우리는 한발 물러서야 한다"
 bankruptcy.12.b: "그들은 이런 요구를 강요할 권리가 없다"
 bankruptcy.13.t: "빚을 무효화해버린 [FROM.GetNameDef]!"
 bankruptcy.13.d: "1년전, [FROM.GetNameDef] 측은 스스로 부채를 감당할 수 없을 것이라 선언하며, 채무불이행 과정에 진입하하였습니다. 다수의 협의를 통해, 그들은 조금이나마 상환을 진행하고 이 사태를 진정시키기 위해 노력해야만 했습니다. 그러나, 그들은 이 상황을 완화하기 위한 방법을 모색하기 위해 노력하기는 커녕, 그들이 가진 모든 부채에 대해 전면 무효화를 선언하였습니다. 이에 어떻게 대응해야할까요?"
 bankruptcy.13.a: "결단코 전쟁을 피할 수 없다!"
 bankruptcy.13.b: "뭔 상관이야?"
 bankruptcy.100.t: "관료 체계의 축소를 요구하는 IMF"
 bankruptcy.100.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 경제 상황에 비해 관료 체계의 구성을 위해 쓰이는 비용이 너무 과도하다고 결론지었습니다. 다양한 기업들이 국가의 부흥에 더욱 힘쓸 수 있도록 할 뿐만 아니라, 금융 기관들이 본인들의 비전에 따라 경제 조직을 가꾸어 나갈 수 있도록 형식적인 관료주의는 최소한으로 줄여야합니다. \n\n국제통화기금(IMF)에 따르면, 관료 체계를 축소하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.100.a: "다른 선택지가 없다"
 bankruptcy.100.b: "이건 너무 가혹하다"
 bankruptcy.101.t: "군대의 축소를 요구하는 IMF"
 bankruptcy.101.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 경제 상황에 비해 군대 운용에 쓰이는 비용이 너무 과도하다고 결론지었습니다. 수십억 달러의 지출이 군부를 지원하고 무기를 구입하는데 쓰이고 있습니다. 국제통화기금(IMF)에 따르면, 이러한 현상은 국고 사용을 신중히 하는데 큰 장애물이 된다고 지적하였습니다. 이와 더불어, 군대 운용을 위해 쓰이는 막대한 비용으로 인해 수많은 사업가들이 군대의 개입으로 정치 체제에 혼란이 오진 않을까 걱정하고 있습니다.\n\n국제통화기금(IMF)에 따르면, 즉시 군대 예산을 감축하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.101.a: "다른 선택지가 없다"
 bankruptcy.101.b: "이건 너무 가혹하다"
 bankruptcy.102.t: "경찰의 축소를 요구하는 IMF"
 bankruptcy.102.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 경제 상황에 비해 경찰 조직을 위한 지출이 너무 과도하다고 결론지었습니다. 물론 그들도 치안의 중요성은 이해하지만, 그들의 눈에 경찰 자금을 축소하여 남은 자금을 더욱 신중하게 사용하는 것이 국내 치안에 더욱 도움이 될 것이라 보고 있습니다.\n\n국제통화기금(IMF)에 따르면, 내부 보안 부서의 예산을 감축하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.102.a: "다른 선택지가 없다"
 bankruptcy.102.b: "이건 너무 가혹하다"
 bankruptcy.103.t: "공공교육 지원 예산의 감축을 요구하는 IMF"
 bankruptcy.103.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 경제 상황에 비해 국민들에게 무료로 제공하는 교육의 수준이 너무 높다고 결론지었습니다. 그들은 정부가 고등 교육과 다양한 연구 활동을 지원하는데 소비되는 예산을 감축하는게 어떻겠냐고 제안하였습니다. 학생들을 지원하는 대신, 우리는 학생들이 개인 학자금 대출에 더욱 의지할 수 있도록 해야합니다.\n\n국제통화기금(IMF)에 따르면, 교육 지원 예산을 감축하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.103.a: "다른 선택지가 없다"
 bankruptcy.103.b: "이건 너무 가혹하다"
 bankruptcy.104.t: "의료 체계의 민영화를 요구하는 IMF"
 bankruptcy.104.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 경제 상황에 비해 무료로 제공되는 공공 의료 시스템이 너무 높은 수준이라는 결론을 내렸습니다. 그들은 최소한 일부 병원을 민영화하고 민간 의료보험의 사업자 확대를 제안하고 있습니다. \n\n국제통화기금(IMF)에 따르면, 의료 서비스의 간결화는 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.104.a: "다른 선택지가 없다"
 bankruptcy.104.b: "이건 너무 가혹하다"
 bankruptcy.105.t: "사회 서비스 감축을 요구하는 IMF"
 bankruptcy.105.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 사회 서비스 지원에 사용되는 지출이 너무 높다는 결론을 지었습니다. 불필요하게 높은 연금, 충분한 실업 급여, 긴 기간의 육아휴가 등 모든 서비스들이 적절한 분야에서 노동의 의무를 다해야되는 사람들의 동기부여를 막고 있다고 지적하였습니다.\n\n국제통화기금(IMF)에 따르면, 사회 서비스 예산 감축은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.105.a: "다른 선택지가 없다"
 bankruptcy.105.b: "이건 너무 가혹하다"
 bankruptcy.106.t: "더욱 개방된 시장을 요구하는 IMF"
 bankruptcy.106.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 우리가 보유한 자원을 제대로 활용하지 않고 있다고 결론지었습니다. 대다수의 자원이 국내 시장에서만 거래되고 있습니다. 그보다, 정부는 이를 경매에 내놓거나 공개 시장으로 판매할 수 있도록 해야합니다. \n\n국제통화기금(IMF)에 따르면, 사회 서비스 예산 감축은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.106.a: "다른 선택지가 없다"
 bankruptcy.106.b: "이건 너무 가혹하다"
 bankruptcy.107.t: "뒷세계의 IMF와 접촉"
 bankruptcy.107.d: "우리는 오늘 국제통화기금(IMF)에서 일하는, 아니 최소한 일한다고 주장하는 사람들에게 수상한 제안을 받았습니다. 그들은 우리나라가 처한 상황에 공감해주었고, 원한다면 언제든지 채무 구제 절차를 밟을 수 있도록 해주겠다고 보탰습니다. 그들이 원하는 것은 그들의 몇몇 우호적인 조직과 함께 정부 및 행정 차원의 지위를 수행해 주기만 하면 된다는 것입니다. 또한 그들은 든든한 후방 지원과 더불어 우호적인 관계를 맺었을 때 여러 분야에서 작지만 효율적인 이점에 대해 언급했습니다."
 bankruptcy.107.a: "그래도 몇 가지 제안에 대해선 생각해 볼만하군"
 bankruptcy.107.b: "부패라고? 우리 [ROOT.GetName]에서?"
 bankruptcy.108.t: "IMF의 토지개혁 요구"
 bankruptcy.108.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 우리가 보유한 토지를 제대로 활용하지 못하고 있다며 결론지었습니다. 많은 토지들이 개발에 이용되지 않고 있으며 심지어 몇몇은 관리가 제대로 되지 않고 있습니다.\n\n국제통화기금(IMF)에 따르면, 토지 개혁은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.108.a: "다른 선택지가 없다"
 bankruptcy.108.b: "이건 너무 가혹하다"
 bankruptcy.109.t: "재정에 관한 더 높은 통제권을 요구하는 IMF"
 bankruptcy.109.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 국가의 중추적인 역할을 맡은 여러 관료들이 충분히 숙련되지 않은 상태라며 결론지었습니다. 국제통화기금(IMF)에서 파견된 경험이 풍부하고 유능한 인력들이 국립 은행과 국가의 중요 인사 자리에 임명되어 우리 경제를 전문적으로 이끌어 나갈 수 있도록 해야합니다.\n\n국제통화기금(IMF)에 따르면, 고지식한 정부 관료를 제거하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.109.a: "다른 선택지가 없다"
 bankruptcy.109.b: "이건 너무 가혹하다"
 bankruptcy.110.t: "성직자를 공격하는 IMF"
 bankruptcy.110.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 종교 집단이 행정 예산에서 막대한 자금을 잡아먹는게 분명하다는 결론을 내었습니다. 국제통화기금(IMF)은 그렇게나 많은 예산이 종교 시설을 지원하는데 쓰인다는 사실을 용납하지 않고 있습니다. 이런 자금의 유출은 절대로 일어나서는 안되며 일부는 국가에 환원되야 할 것입니다.\n\n국제통화기금(IMF)에 따르면, 종교 집단을 위한 자금의 경로를 변경하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.110.a: "다른 선택지가 없다"
 bankruptcy.110.b: "이건 너무 가혹하다"
 bankruptcy.111.t: "군수 산업 해체를 요구하는 IMF"
 bankruptcy.111.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 군수 공장에 대한 지원금이 국가의 자원을 고립시키고 있다고 결론지었습니다. 이 산업들은 해체되어야 하며 직접적으로 자원이 활용될 수 있는 기회를 늘려야합니다.\n\n국제통화기금(IMF)에 따르면, 무의미한 군수 산업 체계를 해체하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.111.a: "다른 선택지가 없다"
 bankruptcy.111.b: "이건 너무 가혹하다"
 bankruptcy.112.t: "항구의 민영화를 요구하는 IMF"
 bankruptcy.112.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 해군 조선소에 대한 지원금이 국가의 자원을 고립시키고 있다고 결론지었습니다. 이 산업들은 민영화되어 정부의 손에서 떨어졌을 때 국익의 발전에 더욱 이로울 것입니다.\n\n국제통화기금(IMF)에 따르면, 우리 조선소를 민영화하여 활용하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.112.a: "다른 선택지가 없다"
 bankruptcy.112.b: "이건 너무 가혹하다"
 bankruptcy.113.t: "세금 인상을 요구하는 IMF"
 bankruptcy.113.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 우리 국민들에게 부과하는 세금이 너무 낮다는 결론을 내놓았습니다. 정부 기관을 더욱 효율적으로 운영하기 위해선, 일시적으로 높은 세율이 적용되어야 할 것입니다. 그러지 않는다면 정부는 절대 이자를 갚기 위한 자금을 확보할 수 없을 겁니다. \n\n국제통화기금(IMF)에 따르면, 세금을 올리는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.113.a: "다른 선택지가 없다"
 bankruptcy.113.b: "이건 너무 가혹하다"
 bankruptcy.114.t: "자산의 청산을 요구하는 IMF"
 bankruptcy.114.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 현재 우리나라는 귀중한 자산을 보유한채 가둬두고만 있으며 이를 판매할 생각이 없다며 결론지었습니다. 국제통화기금(IMF)은 대외 투자를 위한 우리 자산을 평균보다 높은 이자율로 사들여 그 자금으로 빚을 갚을 수 있도록 제안하였습니다.\n\n국제통화기금(IMF)에 따르면, 무의미한 군수 산업 체계를 해체하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.114.a: "다른 선택지가 없다"
 bankruptcy.114.b: "이건 너무 가혹하다"
 bankruptcy.114_low_gdp_tt: "국제통화기금(IMF)는 우리나라의 §Y대외 투자§!를 70% 가격에 매수할 것입니다!"
 bankruptcy.114_tt: "국제통화기금(IMF)는 우리나라의 §Y대외 투자§!를 80% 가격에 매수할 것입니다!"
 bankruptcy.115.t: "공기업의 민영화를 요구하는 IMF"
 bankruptcy.115.d: "우리 재정 상태를 분석한 결과, 국제통화기금(IMF)은 일부 정부 차원의 공공 사업이 민영화되어 간소화 될 수 있다고 결론지었습니다.\n\n국제통화기금(IMF)에 따르면, 일부 국영 산업을 제거하는 것은 우리 부채를 개편하는데 절대적으로 필요한 절차라고 조언하였습니다."
 bankruptcy.115.a: "다른 선택지가 없다"
 bankruptcy.115.b: "이건 너무 가혹하다"
 bankruptcy.201.b: "반격을 시작해라"
 bankruptcy.203.a: "젠장"
 bankruptcy.204.t: "공장 노동자들을 선동하는 지도자 [Communist-State_L]"
 bankruptcy.210.t: "종교적 리더십을 요구하는 성직자 [Kingdom_L]"
 bankruptcy.210.d: "'우리나라는 현 정권의 지도자에 의해 몰락의 길을 걷고 있습니다! 우리는 알라신의 구원을 받은 굳건하고 독실한 지도자가 필요합니다. 신의 이름으로써, 우리는 국가를 안정시키며 더 밝은 미래로 나아갈 겁니다'\n\n종교 지도자 [Kingdom_L]의 한마디는 사원에서 신자들의 열렬한 환호와 함께 종교인들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.210.a: "젠장"
 bankruptcy.210.b: "반격을 시작해라"
 bankruptcy.211.t: "지하드와의 접촉을 요구하는 [Caliphate_L]의 지도자"
 bankruptcy.211.d: "이단자의 개일 뿐인 [ROOT.GetLeader](와)과 그들의 친구 [show_ruling_party](은)는 위대한 알리신을 조롱하였나이다. 우린 시온주의자들의 세계 질서와 사탄의 은행업자 앞에 무릎을 꿇었던 것이다...'\n\n[Caliphate_L]의 대변인이 그의 최고지도자로 부터 나온 망상에 사로잡인 최근의 주장을 나열하며 열악한 동굴에서 촬영된 당연히 최악 수준의 영상은 어제 동영상 플랫폼에 뿌려졌습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.211.a: "젠장"
 bankruptcy.211.b: "반격을 시작해라"
 bankruptcy.212.t: "이슬람 교리를 주장하는 [Neutral_Muslim_Brotherhood_L]"
 bankruptcy.212.d: "'서방의 가치가 어떻게 우리 지도자들을 부패시켰는지 보이십니까? 그들은 돈을 빌려 마치 내일은 없다는 듯이 써대고 있습니다. 이는 '하나님의 의지'에 거역하는 일입니다...'\n\n종교 지도자 [Neutral_Muslim_Brotherhood_L]의 한마디는 사원에서 신자들의 열렬한 환호와 함께 종교인들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.212.a: "젠장"
 bankruptcy.212.b: "반격을 시작해라"
 bankruptcy.213.t: "정부를 조롱하는 독재자 [Neutral_Autocracy_L]"
 bankruptcy.213.d: "'...그리고 이게 바로 그들이 쫄딱 망해버린 이유입니다. [ROOT.GetLeader](은)는 나약한 지도자이며, 중대한 사안을 결정하는데 있어 안일한 그들의 태도는 [ROOT.GetNameDef]을 혼란에 빠트릴 것입니다. 우리는 효율적으로 경제를 운영하기 위해 우리 스스로를 더욱 북돋아 주며 우리만의 해결책을 찾아나가야 할 것입니다.'\n\n[Neutral_Autocracy_L] 대표의 한마디는 당 대표의 이름을 외치는 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.213.a: "젠장"
 bankruptcy.213.b: "반격을 시작해라"
 bankruptcy.214.t: "좋았던 지난 시절을 회상하는 [Neutral_conservatism_L]"
 bankruptcy.214.d: "'국가가 제대로 돌아갔을 때를 기억하십니까? 경제가 호황을 맞이했을 때, 우리나라는 그보다 더욱 발전하고 있었습니다. [ROOT.GetLeader](은)는 그런 추억으로 물든 과거의 시대에서 벗어난지 오래이며, 그 뒷처리는 모두 우리가 감당하고 있습니다...'\n\n[Neutral_conservatism_L] 대표의 한마디는 당 대표의 이름을 외치는 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.214.a: "젠장"
 bankruptcy.214.b: "반격을 시작해라"
 bankruptcy.215.t: "정부 지출을 비판하는 [oligarchism_L] 정치인"
 bankruptcy.215.d: "'정부는 우리의 피눈물로 만들어진 귀중한 세금을 하찮은 일에만 낭비하고 있습니다. 그들은 예산을 엄격하게 관리하여 민간 산업 지원을 최우선으로 삼아야 할 것입니다. 제가 이런 말은 하는 것은 제가 이 혜택의 대상인 사업가이기 때문이 아닙니다. 우리의 동료, 그리고 모든 유권자들도 국가의 정당한 위치에 있는 사업가입니다...'\n\n정치인 [oligarchism_L]의 한마디는 비즈니스 회의에서 군중들의 열렬한 환호와 함께 사업가들의 지지를 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.215.a: "젠장"
 bankruptcy.215.b: "반격을 시작해라"
 bankruptcy.216.t: "정부 지출을 비판하는 [Neutral_Libertarian_L] 정치인"
 bankruptcy.216.d: "'에휴, 정부라는 작자들이 말이야, 돈이란걸 그렇게 써서는 안됐어.' 정치인 [Neutral_Libertarian_L](이)가 혼자 불을 붙인건지 의심되는 담배 연기를 한번 더 내뿜으며 말했습니다. 한 움큼의 연기와 함께, 진득한 후회가 공기를 가득 채웠습니다. '야, 그놈의 돈이 없다고 생각해봐. 그게 조금이라도 없다면 이자도 못 갚겠지.' 그들은 계속해서 회의실 책상을 다급히 손가락으로 두드릴 수 밖에 없습니다.\n\n[ROOT.GetLeader](은)는 우리가 왜 이 지경까지 왔는지 도저히 이해를 못하겠다는 입장입니다..."
 bankruptcy.216.a: "자식, 맞는 말인데"
 bankruptcy.216.b: "어휴 담배 냄새... 담배나 그만 펴라"
 bankruptcy.217.t: "정부를 '무책임하다'고 비난하는 [Neutral_green_L]"
 bankruptcy.217.d: "'정부는 무기를 사들이는데만 혈안이 되어있으며, 국가를 빚의 구렁텅이로 빠트리고 있습니다. 국고는 다른 어떤 것도 아닌 재생 가능한 에너지 생산에 투자하며 사회의 포용력을 늘리는데 사용되어야 합니다...'\n\n[Neutral_green_L] 대표의 한마디는 수도의 한 공원에서 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다.  현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.217.a: "젠장"
 bankruptcy.217.b: "반격을 시작해라"
 bankruptcy.218.t: "노동조합을 조롱하는 [neutral_Social_L]"
 bankruptcy.218.d: "'언제까지 이런 끔찍한 경제 정책을 우리가 떠안아야 하는 겁니까? 도대체, 나라의 중추인 우리들이 왜 그래야 하는 것입니까! 뼈 빠지게 고생하는 우리 노동자는 항상 [show_ruling_party]의 뒤치다꺼리를 감당하느라 피눈물을 흘리고 있습니다...'\n\n[neutral_Social_L] 대표의 한마디는 노동 조합 집회에서 군중들의 열렬한 환호와 함께 노동자들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.218.a: "젠장"
 bankruptcy.218.b: "반격을 시작해라"
 bankruptcy.219.t: "공장 노동자들을 선동하는 지도자 [Neutral_Communism_L]"
 bankruptcy.219.d: "'그들이 우리를 꽁꽁 묶어둔 쇠사슬이 보이지 않습니까? 당신의 자녀들, 손주들은 평생 은행업자들의 노예로 살아가게 될 것입니다. 노동자들의 권리를 도둑질한 정부는 스스로 모든 것을 내려놓고 포기하기를 바랍니다. 그렇지 않는다면 우리가 끌어내겠습니다!\n\n[Neutral_Communism_L] 대표의 한마디는 공장에서 군중들의 열렬한 환호와 함께 노동자들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.219.a: "젠장"
 bankruptcy.219.b: "반격을 시작해라"
 bankruptcy.220.t: "세계적 관여주의에 대해 설교하는 [Nat_Populism_L]"
 bankruptcy.220.d: "'엘리트와 세계에 관여하려는 이들이 국가를 통치하고 있습니다. 그들은 언론을 휘어잡았고, 진실을 은폐하기 위해 어떤 수단이든 상관하지 않고 있습니다. 공식 정부 사이트에서 출력한 다음의 자료를 보면, 국가가 얼마나 터무니 없는 빚더미에 앉아있는지 두 눈으로 똑똑히 볼 수 있을 겁니다. 정부는 이 자료를 검열하고 우리들을 침묵시키려 할 것입니다...'\n\n정치인 [Nat_Populism_L] 국영 방송 네트워크에 미치는 정부의 영향에 대해 얼변을 토해냈습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.220.a: "젠장"
 bankruptcy.220.b: "반격을 시작해라"
 bankruptcy.221.t: "거대한 집회를 준비하는 [Nat_Fascism_L]"
 bankruptcy.221.d: "'우리는 절대로 교체되지 않을 겁니다! 정부는 끔찍한 빚더미에서 국가를 운영하고 있으며 그렇기에 시온주의자들의 혀에 꾀어 넘어간 이들이 우리를 일루미나티(지혜를 터득한 철인)에게 팔아넘기려 할지도 모릅니다!'\n\n[Nat_Fascism_L] 대표의 한마디는 우레같은 박수와 갈채를 받았습니다. 연설은 그 이후에도 계속되었고, 일부 주제는 엄청난 함성으로 인해 제대로 언급되지도 못했습니다. 연설의 마지막에 손을 흔들며 일련의 동작을 취한 것으로 보아, 여섯 명의 사람들로 이루어진 조직이 쇼핑몰의 주차장에 모여 교통을 통제한 것으로 보입니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.221.a: "젠장"
 bankruptcy.221.b: "반격을 시작해라"
 bankruptcy.222.t: "자금의 부족에 대해 불평하는 장군 [Nat_Autocracy_L]"
 bankruptcy.222.d: "'도대체 이런 끔찍한 경제난이 계속되는 상황에서 왜 우리가 나라를 지켜야하는 겁니까? 바로 어제만 해도 총알이 없어 우리 병사들이 빗자루를 들고 입으로 '빵!' 하고 소리치며 훈련하는 모습을 보았습니다. 그저께는 각자의 쇼핑카트를 밀어주며, 입으로 열매를 내뱉고, 손으로 돌멩이를 던지며 탱크 훈련을 하는 기괴한 광경을 마주했습니다. 이건 말도 안되는 일입니다.'\n\n오늘자 신문에서 육군 장군의 한마디는 군대의 참혹한 현실을 대변해 주었습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.222.a: "젠장"
 bankruptcy.222.b: "반격을 시작해라"
 bankruptcy.223.t: "왕위 계승자 [Monarchist_L]의 국왕 서한 발행"
 bankruptcy.223.d: "[ROOT.GetLeader]의 왕족들께서는 우리 국가가 처한 상황에 깊은 유감을 표현했습니다. 바로 저번 주, 나는 내 배우자와 함께 속깊은 얘기를 나누었습니다. 긴 시간의 대화 끝에, 내 사촌과 나 자신은 민주주의가 해체되어야 한다는 요구를 담은 서한을 발행하였습니다. 당연하게도 현 정부 체제는 우리 시민들을 실패로 이끌었습니다. 이 시점에선 오로지 왕족의 권위만이 국가의 안보를 수호할 수 있습니다.\n\n왕위 계승자 [Monarchist_L](은)는 오늘 군주의 부활을 알리는[ROOT.GetAdjective]의 왕위에 대한 공식 서한을 발행하였습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.223.a: "망할"
 bankruptcy.223.b: "반격을 시작해라"
 News_bankruptcy.1.t: "구제금융을 수락한 [From.GetNameWithFlag]"
 News_bankruptcy.1.d: "어제 [From.GetName]에서 진행된 [From.GetLeader](와)과 [Root.GetLeader] 간의 최고지도자 회의에서, [From.GetAdjective](은)는 구제 금융을 약속해주었습니다. 그러나 우릴 파산에서 구해주는 대신 앞으로 [From.GetName]에게 정치적으로 양보를 해야되는 상황이 강제적으로 생기게 될 것입니다."
 News_bankruptcy.1.a: "알겠다"
 bailout_given_tt: "[THIS.GetNameWithFlag] §Y부채§!가 §G[?debt_bailout|0]§! §Yx 10억§! 감소하였습니다"
 News_bankruptcy.2.t: "구제금융을 수락한 [From.GetNameWithFlag]"
 News_bankruptcy.2.d: "어제 [From.GetName]에서 진행된 [From.GetLeader](와)과 [Root.GetLeader] 간의 최고지도자 회의에서, [From.GetAdjective](은)는 구제 금융을 약속해주었습니다. 그러나 우릴 파산에서 구해주는 대신 앞으로 [From.GetName]에게 정치적으로 양보를 해야되는 상황이 강제적으로 생기게 될 것입니다."
 News_bankruptcy.2.a: "알겠다"
 News_bankruptcy.3.t: "구제금융을 수락한 [From.GetNameWithFlag]"
 News_bankruptcy.3.d: "어제 [From.GetName]에서 진행된 [From.GetLeader](와)과 [Root.GetLeader] 간의 최고지도자 회의에서, [From.GetAdjective](은)는 구제 금융을 약속해주었습니다. 그러나 우릴 파산에서 구해주는 대신 앞으로 [From.GetName]에게 정치적으로 양보를 해야되는 상황이 강제적으로 생기게 될 것입니다."
 News_bankruptcy.3.a: "알겠다"
 News_bankruptcy.4.t: "새로운 선거를 준비하는 [FROM.GetNameDef]"
 News_bankruptcy.4.d: "참혹한 경제 정책과 끝없이 늘어나는 부채에 반대하는 시위가 일어난 이후, [FROM.GetAdjective]의 지도자 [FROM.GetLeader](은)는 새로운 선거를 실시하라는 야당 연합의 요구를 수락하였습니다. 과연 [FROM.GetLeader](이)가 새로운 임기를 지속할 수 있을 만큼의 지지를 확보할 수 있을지, 아니면 새로운 정당이 국가를 부도 위기에서 구해낼지 귀추가 주목되고 있습니다."
 News_bankruptcy.4.a: "흥미롭군"
 News_bankruptcy.5.t: "[FROM.GetNameDef]의 급진적인 정권 변화"
 News_bankruptcy.5.d: "참혹한 경제 정책과 끝없이 늘어나는 부채에 반대하는 시위가 일어난 이후, [FROM.GetNameDef](은)는 하야를 요구하는 야당 연합의 요구를 받아들였습니다. 이는 시위대가 의회를 부수고 들어갔을 때 급하게 결정되었습니다. 야당 대표인 [FROM.GetLeader](은)는 임시 정부의 수장으로써 국가의 경기를 회복하는데 헌신을 다하겠다며 맹세하였습니다."
 News_bankruptcy.5.a: "흥미롭군"
 News_bankruptcy.6.t: "경제 붕괴가 [FROM.GetNameDef] 내부의 갈등을 야기하다"
 News_bankruptcy.6.d: "참혹한 경제 정책과 끝없이 늘어나는 부채에 반대하는 시위가 일어난 이후, [FROM.GetAdjective]의 지도자 [FROM.GetLeader](은)는 군대를 동원하여 의회를 습격하려 하는 시위대 무리를 해산하고 모조리 체포하라는 명령을 내렸습니다. 이 해산에서 수많은 사람들이 부상을 입었으나, 군 내부에서 [FROM.GetLeader]의 폭력적인 대응에 저항하는 부대와 병사가 나타난지도 얼마되지 않았습니다. 사태가 진정되기도 전에, 이미 정부에 충성하는 세력과 그에 저항하는 반대 세력의 전투가 보고되고 있습니다.\n\n아무래도 [FROM.GetNameDef]의 시민들은 참담한 정부의 경제 정책과 더불어 본인들의 우선 순위 목록에 내전이라는 항목도 추가를 해야할 것처럼 보입니다."
 News_bankruptcy.6.a: "흥미롭군"
 IMF_debt_relief_received: "IMF의 채무 구제 승인"
 IMF_debt_relief_received_desc: "우리는 부채에 대한 재구성을 대가로 국제통화기금(IMF)이 제안한 경제 개혁안을 받아들였습니다."
 IMF_debt_relief_rejected: "IMF의 채무 구제 거부"
 IMF_debt_relief_rejected_desc: "우리는 부채 재구성을 대가로 국제통화기금(IMF)이 제안한 경제 개혁안을 거절하였습니다."
 very_high_interest_country_modifiers: "매우 높은 이자율"
 very_high_interest_country_modifiers_desc: "매우 높은 이자율"
 very_high_interest_country_modifiers_tt: "끝없이 폭주하는 이자율은 시민들과 정부에 대한 금융 기관의 신뢰를 약화시키고 있습니다. 만약 우리가 이 사태를 빠른 시일 내에 회복하지 못하면, 상황은 끊임없이 계속 악화될 것입니다.\n\n"
 debt_default_ecomomic_boom: "채무 불이행 이후 경제 호황"
 debt_default_ecomomic_boom_desc: "국가가 채무 불이행 상태로 접어든 이후 내리막길을 걷게 되면서, 국내 통화의 가치가 절하되었고, 인플레이션이 급증하였으며, 실업률이 증가하고 주식 시장이 붕괴되었습니다. 그러나 이제는 이 상황에서 다소 회복하였으며, 다양한 해외 사업가들이 값싼 투자, 노동력, 상품과 부동산 값으로써 항시 눈독 들이고 있습니다. 이와 같은 기대는 외화가 국내로 들어올 수 있게 함으로써 우리 경제에 조금이나마 보탬이 될 것입니다."
 large_company_subsidies: "§Y$small_medium_business_owners$§! 보조금에서 $$[?large_company_subsidies|-3] (남은 기간: [?large_company_subsidies:days_left|Y0])\n"
 farmer_subsidies: "§Y$farmers$§! 보조금에서 $$[?farmer_subsidies|-3] (남은 기간: [?farmer_subsidies:days_left|Y0])\n"
 bankruptcy_seek_bailout_from_overlord: "종주국 §Y[?overlord.GetNameWithFlag]§!에 구제 금융 §Y요청§!"
 bankruptcy_seek_bailout_from_overlord_desc: "우리 정치의 많은 부분이 종주국에 의해 통제되기 때문에, 우리 재정에 책임이 있다고 할 수 있습니다. 우리는 종주국에게 우리를 도와달라고 요청할 필요가 있습니다"
 bankruptcy_seek_bailout_from_overlord_tt: "우리는 [?overlord.GetNameDef] 측에게 우리 부채 중 §Y$[?debt_bailout|0] x 10억§!을 감당해 달라고 요청할 것입니다. 그들은 총 금액의 절반을 지불할 것이며 나머지는 협상을 진행할 것입니다. [?overlord.GetNameDef]측의 수락 여부는 그들의 경제 상태에 따라 결정될 것입니다.\n\n그들이 수락한다면, 그 국가는 우리나라에서 §R5%§!의 영향력을 추가로 행사하게 될 것입니다.\n\n"
 bankruptcy.5.t: "구제 금융을 요청하는 [From.GetNameWithFlag]"
 bankruptcy.5.d: "[From.GetName]의 부채 문제는 매우 심각한 상황이며, 현실적으로 이를 지불할 능력도, 심지어는 부채로 생긴 이자 조차도 갚을 수 없는 상태에 이르렀습니다. 파산 직전의 상황에 놓인 지금, 이러한 절망적인 상황 속에서 [From.GetAdjective]의 지도자 [From.GetLeader](은)는 [Root.GetName]의 도움을 간청하기 위해 [Root.GetLeader](을)를 찾았습니다.\n\n[From.GetNameWithFlag](은)는 채무액의 일부분인 $[?FROM.debt_bailout|0] §Yx 10억§!을 협상하기를 요청하며, 그 금액의 절반을 지불해주고 나머지는 감면해주기를 간곡히 부탁하고 있습니다. 우리가 이를 수락한다면, 그들이 빚을 감당할 수 있도록 [From.GetName]의 채무액을 과감하게 줄여 국제 사회의 지도자들을 진정시킬 수 있을 것입니다.\n\n비록 우리의 자금을 잃게 되겠지만, 앞으로 그들을 언제든지 우리 부채 문제에 끌어들일 수 있을 것이며, 우린 그들에게 엄청난 영향력을 행사할 수 있을 것입니다."
 bankruptcy.5.a: "[From.GetNameWithFlag]의 긴급 구제를 승인한다"
 bankruptcy.5.b: "미안하지만, 그럴 여유가 없다"
