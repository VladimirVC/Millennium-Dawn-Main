 BLR_Minotor_category: "Servicio Minotor"
 BLR_Minotor_category_desc: "Minotor-Service is a Belarusian enterprise located in Minsk and engaged in the development, production, modernization, repair, and maintenance of combat tracked vehicles, as well as the supply of spare parts. It is one of the leading enterprises of the country's military-industrial complex."
 BLR_start_minotor: "Preparar talleres de reparación"
 BLR_minotor_btr: "Prepare el taller de reparación de APC"
 BLR_minotor_bmp: "Prepare el taller de reparación de vehículos de combate de infantería"
 BLR_minotor_tank: "Preparar el taller de reparación de tanques"
 BLR_minotor_start: "Firmar un contrato con [SOV.GetNamewithFlag]"
 BLR_558_zavod_category: "558 Planta de reparación de aeronaves"
 BLR_558_zavod_category_desc: "The 558th Aviation Repair Plant is one of the largest enterprises in the CIS for the repair and modernization of modern combat aviation equipment in service with the Air Forces of post-Soviet countries and many foreign nations alike. It is the most important aircraft repair facility in Belarus, located in the city of Baranovichi."
 BLR_start_zavod_558: "Preparar talleres de reparación"
 BLR_bpla558: "Realizar desarrollos en el campo de los drones"
 BLR_558_kaz: "Ofrecer un contrato a [KAZ.GetNamewithFlag]"
 BLR_558_taj: "Ofrecer un contrato a [TAJ.GetNamewithFlag]"
 BLR_558_trk: "Ofrecer un contrato a [TRK.GetNamewithFlag]"
 BLR_558_irq: "Ofrecer un contrato a [IRQ.GetNamewithFlag]"
 BLR_558_lba: "Ofrecer un contrato a [LBA.GetNamewithFlag]"
 BLR_558_alg: "Ofrecer un contrato a [ALG.GetNamewithFlag]"
 BLR_558_agl: "Ofrecer un contrato a [AGL.GetNamewithFlag]"
 BLR_558_nko: "Ofrecer un contrato a [NKO.GetNamewithFlag]"
 BLR_558_zim: "Ofrecer un contrato a [ZIM.GetNamewithFlag]"
 BLR_peleng_category: "JSC Peleng"
 BLR_peleng_category_desc: "JSC Peleng is a Belarusian company for the development and production of optoelectronic products for military and civilian purposes, and the leading company in the industry in the Republic of Belarus."
 BLR_start_peleng: "Preparar el equipo para el desarrollo"
 BLR_peleng_ptrk: "Invierta en el desarrollo de misiles antitanque (ATGM) - Hornet"
 BLR_peleng_rus: "Ofrecer un contrato a [SOV.GetNamewithFlag]"
 BLR_peleng_ukr: "Ofrecer un contrato a [UKR.GetNamewithFlag]"
 BLR_peleng_ptrk_nig: "Vender ATGM a [NIG.GetNamewithFlag]"
 BLR_peleng_ptrk_trk: "Vender ATGM a [TRK.GetNamewithFlag]"
 BLR_peleng_ptrk_nko: "Vender ATGM a [NKO.GetNamewithFlag]"
 BLR_peleng_ptrk_zim: "Vender ATGM a [ZIM.GetNamewithFlag]"
 BLR_union_programm: "Cooperación en el Campo de la Medicina"
 BLR_union_programm_desc: "It is necessary to strengthen the integration of our countries. We will agree on several roadmaps for integration with Russia."
 BLR_mzkt_category: "Planta de tractores de ruedas de Minsk"
 BLR_mzkt_category_desc: "Minsk Wheeled Tractor Plant is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
