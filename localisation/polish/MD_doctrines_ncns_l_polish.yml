 SPECIAL_FORCES_MIXED: "Mixed Command"
 SPECIAL_FORCES_MIXED_DESC: "This doctrine structures special forces as highly selective units trained for complex, high-priority missions requiring precision and discretion. Special forces elite concepts emphasize advanced capability integration and operational effectiveness across diverse environments."
 SPECIAL_FORCES_MARINE_FOCUS: "Marine Focused Special Forces"
 SPECIAL_FORCES_MARINE_FOCUS_DESC: "This doctrine focuses our special forces primarily on marine units, allows us more options to train and deploy marine forces. This comes at the expense of not being able to adequately train or equip other branches of our special forces."
 SPECIAL_FORCES_AIRBORNE_FOCUS: "Airborne Focused Special Forces"
 SPECIAL_FORCES_AIRBORNE_FOCUS_DESC: "This doctrine focuses our special forces primarily on airborne units, allows us more options to train and deploy airborne forces. This comes at the expense of not being able to adequately train or equip other branches of our special forces."
 SPECIAL_FORCES_RANGER_FOCUS: "Ranger Focused Special Forces"
 SPECIAL_FORCES_RANGER_FOCUS_DESC: "This doctrine focuses our special forces primarily on ranger units, allows us more options to train and deploy ranger forces. This comes at the expense of not being able to adequately train or equip other branches of our special forces."
 DOCTRINE_TRACK_MIXED_OPTIONS: "Supplemental Special Forces"
 DOCTRINE_TRACK_SPECIAL_FORCES: "Special Operations"
 AIRBORN_INTERDICTION: "Airborne Interdiction"
 AIRBORN_INTERDICTION_DESC: "This doctrine sends light airborne infantry and pathfinder teams deep behind enemy lines to sabotage airfields, supply, and communications. Interdiction concepts emphasize infiltration, demolition, and delaying enemy maneuvers rather than holding ground."
 AIRBORN_AIRHEAD_ASSAULT: "Airhead Assault"
 AIRBORN_AIRHEAD_ASSAULT_DESC: "This doctrine drops light and motorized airborne infantry en masse to seize and hold an airhead until relieving forces arrive. Airhead assault concepts emphasize concentrated drops, rapid consolidation, and defensive endurance under counterattack."
 RANGER_JUNGLE_FORCES: "Jungle Rangers"
 RANGER_JUNGLE_FORCES_DESC: "This doctrine prepares rangers for sustained operations deep in the jungle, where heat, disease, and broken supply lines defeat conventional troops. Jungle concepts emphasize acclimatization, infiltration through impassable terrain, and self-reliance far from friendly lines."
 MARINE_ELITE_RAIDERS: "Coastal Raiders"
 MARINE_ELITE_RAIDERS_DESC: "This doctrine structures marine forces into small raiding teams that strike coastal targets and withdraw before the enemy can react. Coastal raider concepts emphasize speed, infiltration, and a light logistical footprint."
 MARINE_ARMORED_BEACHHEAD: "Armored Beachhead"
 MARINE_ARMORED_BEACHHEAD_DESC: "This doctrine organizes amphibious forces to land armor and break out from the beachhead before the defender consolidates. Armored beachhead concepts emphasize mechanized firepower, momentum, and rapid expansion of the lodgement."
 AIRBORN_AIR_ASSAULT: "Air Assault"
 AIRBORN_AIR_ASSAULT_DESC: "This doctrine structures airborne forces around helicopter-borne air assault rather than parachute insertion. Air assault concepts emphasize rapid vertical envelopment, mobility, and on-call rotary support."
 AIRBORN_ARMORED_DROP: "Armored Airborne"
 AIRBORN_ARMORED_DROP_DESC: "This doctrine equips airborne forces with air-droppable armor and mechanized columns for sustained action after the drop. Armored airborne concepts emphasize protected firepower, organization, and staying power deep in enemy territory."
 RANGER_RECON_FORCES: "Recon Rangers"
 RANGER_RECON_FORCES_DESC: "This doctrine trains rangers for deep reconnaissance, screening, and surveillance ahead of the main force. Recon ranger concepts emphasize stealth, field craft, and accurate target acquisition."
 RANGER_STRIKE_FORCES: "Strike Rangers"
 RANGER_STRIKE_FORCES_DESC: "This doctrine prepares rangers for rapid assault and airfield seizure against fortified objectives. Strike ranger concepts emphasize shock, tempo, and direct application of force."
 SOF_OPERATIONS_COMMAND: "Special Operations Command"
 SOF_OPERATIONS_COMMAND_DESC: "This doctrine establishes a dedicated command to raise and sustain tier-one special operations forces. Special operations command concepts emphasize selective recruitment, conditioning, and joint support across all environments."
 SOF_DIRECT_ACTION: "Direct Action"
 SOF_DIRECT_ACTION_DESC: "This doctrine trains operators for direct action raids against high-value targets. Direct action concepts emphasize precision strikes, rapid insertion, and decisive close engagement."
 SOF_SABOTAGE_SUBVERSION: "Sabotage and Subversion"
 SOF_SABOTAGE_SUBVERSION_DESC: "This doctrine prepares operators for sabotage, subversion, and unconventional warfare behind enemy lines. Sabotage concepts emphasize infiltration, demolitions, and prolonged operation without resupply."
 SOF_RECON_INTELLIGENCE: "Special Reconnaissance"
 SOF_RECON_INTELLIGENCE_DESC: "This doctrine focuses special forces on reconnaissance, surveillance, and intelligence collection. Special reconnaissance concepts emphasize a light footprint, patient observation, and accurate reporting."
 SOF_COUNTER_TERROR: "Counter-Terrorism"
 SOF_COUNTER_TERROR_DESC: "This doctrine trains operators for counter-terrorism, hostage rescue, and urban close-quarters battle. Counter-terror concepts emphasize readiness, precision, and rapid response."
 SUBDOCTRINE_DESIGN_STEALTH: "Stealth Designs"
 SUBDOCTRINE_DESIGN_STEALTH_DESC: "This doctrine prioritizes the development of aircraft with reduced radar cross-sections and survivability enhancements. Stealth designs emphasize low-observable materials, electronic countermeasures, and structural configurations that minimize detection across adversary sensor networks."
 SUBDOCTRINE_DESIGN_EW: "Electronic Warfare Designs"
 SUBDOCTRINE_DESIGN_EW_DESC: "This doctrine focuses on integrating dedicated electronic warfare systems into aircraft platforms. Electronic warfare designs emphasize active jamming, passive detection, and suppression capabilities to degrade adversary air defense effectiveness across the operational environment."
 SUBDOCTRINE_DESIGN_MODULAR: "Modular Designs"
 SUBDOCTRINE_DESIGN_MODULAR_DESC: "This doctrine organizes aircraft development around open-architecture and standardized component frameworks. Modular designs emphasize rapid capability upgrades, reduced lifecycle costs, and flexible platform adaptation across diverse mission requirements."
 SUBDOCTRINE_HEAVY_AEW: "Airborne Early Warning"
 SUBDOCTRINE_HEAVY_AEW_DESC: "This doctrine structures large aircraft operations around airborne surveillance and battle management. Airborne early warning concepts emphasize wide-area detection, real-time data integration, and coordinated direction of air assets across the theater."
 SUBDOCTRINE_HEAVY_AIRLIFT: "Strategic Airlift"
 SUBDOCTRINE_HEAVY_AIRLIFT_DESC: "This doctrine organizes heavy aircraft operations around the strategic movement of forces, equipment, and supplies. Strategic airlift concepts emphasize global reach, sustained throughput, and flexible basing to support operations across extended distances."
 SUBDOCTRINE_HEAVY_REFUELING: "Aerial Refueling"
 SUBDOCTRINE_HEAVY_REFUELING_DESC: "This doctrine integrates tanker aircraft operations into sustained air campaign planning. Aerial refueling concepts emphasize extended operational reach, persistent air presence, and coordinated fuel support across multi-role aviation operations."
 SUBDOCTRINE_MULTIROLE_DOMINANCE: "Air Dominance Multirole"
 SUBDOCTRINE_MULTIROLE_DOMINANCE_DESC: "This doctrine employs multirole aircraft as primary platforms for establishing air dominance. Air dominance multirole concepts emphasize the fusion of beyond-visual-range engagement capability with multi-mission flexibility to contest and control the air domain."
 SUBDOCTRINE_MULTIROLE_CARRIER: "Carrier Multirole"
 SUBDOCTRINE_MULTIROLE_CARRIER_DESC: "This doctrine structures multirole aircraft operations around carrier-based deployment and naval strike missions. Carrier multirole concepts emphasize coordinated fleet operations, deck-launched intercept, and integration of air power within maritime campaign planning."
 SUBDOCTRINE_STRIKE_SEAD: "SEAD/DEAD Operations"
 SUBDOCTRINE_STRIKE_SEAD_DESC: "This doctrine organizes strike aircraft operations around the suppression and destruction of adversary air defense networks. SEAD/DEAD concepts emphasize anti-radiation weapons, coordinated electronic attack, and systematic elimination of surface-based threats to enable freedom of action in contested airspace."
 SUBDOCTRINE_STRIKE_INTERDICTION: "Deep Interdiction"
 SUBDOCTRINE_STRIKE_INTERDICTION_DESC: "This doctrine focuses strike aircraft on the disruption of adversary operational depth through precision long-range engagements. Deep interdiction concepts emphasize standoff weapons, target folder planning, and coordinated strike packages to degrade enemy capabilities before they can reach the front."
 SUBDOCTRINE_STRIKE_CAMPAIGN: "Air Interdiction Campaign"
 SUBDOCTRINE_STRIKE_CAMPAIGN_DESC: "This doctrine structures strike and close air support aircraft around sustained interdiction operations against adversary ground forces. Air interdiction campaign concepts emphasize persistent presence, loiter-capable platforms, and tight integration with forward ground controllers to continuously degrade enemy maneuver."
 SUBDOCTRINE_FIGHTER_BVR: "BVR Combat"
 SUBDOCTRINE_FIGHTER_BVR_DESC: "This doctrine structures fighter operations around beyond-visual-range engagement using radar-guided missiles. BVR combat concepts emphasize long-range detection, multi-target tracking, and first-shot kill probability to defeat adversary aircraft before visual contact is established."
 SUBDOCTRINE_FIGHTER_WVR: "WVR Dogfighting"
 SUBDOCTRINE_FIGHTER_WVR_DESC: "This doctrine trains fighter pilots for close-range maneuvering combat within visual range. WVR dogfighting concepts emphasize aircraft agility, situational awareness, and aggressive offensive tactics to achieve kills in close engagements using guns and short-range missiles."
 SUBDOCTRINE_FIGHTER_STEALTH: "Stealth Fighter Ops"
 SUBDOCTRINE_FIGHTER_STEALTH_DESC: "This doctrine structures fifth-generation fighter operations around low-observable penetration and first-look engagement. Stealth fighter concepts emphasize reduced detectability, internal weapons carriage, and coordinated penetration of layered air defense environments to achieve air dominance before adversaries can react."
 SUBDOCTRINE_FIGHTER_INTERCEPTOR: "Dedicated Interceptors"
 SUBDOCTRINE_FIGHTER_INTERCEPTOR_DESC: "This doctrine organizes fighter forces for rapid response to airspace violations and bomber interception. Dedicated interceptor concepts emphasize high-speed scramble protocols, ground-controlled intercept procedures, and zone-based alert postures to protect national and allied airspace."
 DOCTRINE_TRACK_DRONE_WARFARE: "Drone Warfare"
 GRAND_DOCTRINE_AUTONOMOUS_AIR: "Autonomous Air Operations"
 GRAND_DOCTRINE_AUTONOMOUS_AIR_DESC: "This grand doctrine structures air power around unmanned systems, remote operations, and autonomous strike capacity. Autonomous air operations concepts emphasize reduced pilot risk, persistent ISR, and the integration of unmanned platforms into every layer of the air campaign."
 SUBDOCTRINE_DRONE_MALE: "MALE UCAV Operations"
 SUBDOCTRINE_DRONE_MALE_DESC: "This doctrine structures air operations around medium-altitude long-endurance unmanned combat aircraft. MALE UCAV concepts emphasize persistent surveillance, remote-piloted strike missions, and continuous presence over target areas to support ground and joint operations."
 SUBDOCTRINE_DRONE_UCAS: "UCAS Carrier Strike"
 SUBDOCTRINE_DRONE_UCAS_DESC: "This doctrine integrates unmanned combat air systems into carrier strike group operations. UCAS carrier concepts emphasize stealthy deck-launched strike missions, extended carrier reach, and autonomous fleet defense to project air power from maritime platforms without exposing human pilots."
 SUBDOCTRINE_DRONE_LOITERING: "Loitering Munitions"
 SUBDOCTRINE_DRONE_LOITERING_DESC: "This doctrine structures strike operations around loitering munitions capable of extended flight before engaging stationary or moving targets. Loitering munitions concepts emphasize low-cost saturation, anti-armor precision, and distributed launch to provide persistent lethal coverage across the operational area."
 SUBDOCTRINE_DRONE_COUNTER: "Counter-Drone Operations"
 SUBDOCTRINE_DRONE_COUNTER_DESC: "This doctrine organizes air and ground forces to detect, intercept, and defeat hostile unmanned aerial systems. Counter-drone concepts emphasize layered electronic jamming, dedicated intercept platforms, and integrated low-altitude radar to protect forces and critical assets from the growing threat of unmanned systems."
 SUBDOCTRINE_DRONE_SWARM: "Drone Swarm Integration"
 SUBDOCTRINE_DRONE_SWARM_DESC: "This doctrine structures air operations around large numbers of coordinated autonomous and semi-autonomous platforms. Drone swarm concepts emphasize distributed targeting, attritable force employment, and manned-unmanned teaming to overwhelm adversary defenses and generate mass effects at reduced risk to human crews."
 SUBDOCTRINE_OPERATION_COIN: "Counterinsurgency Operations"
 SUBDOCTRINE_OPERATION_COIN_DESC: "This doctrine structures land forces to defeat irregular threats through population control, intelligence-driven direct action raids, and rapid reaction forces. Counterinsurgency operations emphasize persistent presence and civil-military cooperation to restore stability."
 SUBDOCTRINE_OPERATION_URBAN_WARFARE: "Urban Warfare Operations"
 SUBDOCTRINE_OPERATION_URBAN_WARFARE_DESC: "This doctrine specializes land forces for combat in cities and megacities. Urban warfare operations emphasize node-by-node clearance, infiltration tactics, and interlocking defensive fires to control the complex vertical and horizontal battlespace."
