 PRU.socialism: "£PRU_anarchist_communism (APRA) American Popular Revolutionary Alliance - Pro-Western"
 PRU.socialism_desc: "(Third Way) Originally created as an anti-imperialist movement with aspirations towards a united South America, APRA has participated in several governments since its foundation in 1930. While initially a more radical left-wing party, under the direction of Alan García the party moved away from its roots, adopting Third Way social democracy and increasingly neoliberal policies."
 PRU.socialism_1: "£generic_socialism_small (PNP) Peruvian Nationalist Party"
 PRU.socialism_1_desc: "(Third Way) Founded by Ollanta Humala, the Peruvian Nationalist Party was initially created as a political vehicle for the Ethnocacerist Movement - though shortly after its foundation Ollanta distanced himself from the radical movement - instead embracing social democratic and neoliberal policies."
 PRU.Nat_Fascism: "£generic_Nat_Fascism_small エスノカセリスト運動"
 PRU.Nat_Fascism_desc: "第三の位置主義 - エスノカセリスト運動は、1980年代の国内紛争期にフマラ家によって設立されたペルーの政治運動であり、当初はその初期の発展を主導した。この運動自体は、インディジェニズモ、カダフィズム、反植民地主義、汎アラブ主義、そしてペルー民族主義など、いくつかの思想的源泉から影響を受けている。人種的優越主義、ペルー・イレデンティズム、そして社会保守的な見解を掲げ、反資本主義および反マルクス主義の立場を併せ持つことから、その本質がファシスト的であるとの非難を浴びており、多くの人がこの運動を紛れもなく「第三の位置」主義であると評している。"
 PRU.Nat_Populism_1: "£generic_Nat_Populism_small (C90—NM) 変革90 – 新多数"
 PRU.Nat_Populism_1_desc: "右派ポピュリズム - 変革90はアルベルト・フジモリ大統領の政権を支えるための政治的組織として結成されたが、新多数もまた、フジモリ主義への支持を同等の柱とする政党であった。当然ながら、両党は互いに強い連携関係にあり、共通の目標を推進するための選挙・政治同盟の基盤を形成している。"
 PRU.Nat_Populism_2: "£generic_Nat_Populism_small (FP) 大衆の力"
 PRU.Nat_Populism_2_desc: "右派ポピュリズム - 新多数と変革90が合流して結成された大衆の力は、アルベルト・フジモリの政治的遺産を継承し、フジモリ一族の政治的野心を支援するとともに、保守的な社会政策と新自由主義的な経済政策からなる彼のポピュリスト的な政策を推進しようとしている。"
 LIT.anarchist_communism_1: "£generic_anarchist_communism_small (SPF) Socialist People's Front"
 LIT.anarchist_communism_desc_1: "(Democratic Socialism) - Formed from a merger of two other leftist parties, the Socialist People's Front actions and views have confronted the legality of communism within Lithuania at several points as it struggles to maintain a more moderate platform while still being a broad vehicle for the country's left. The party itself espouses affinity to both the positives of western social democracy and former Soviet socialism, though aligns heavily with the more conservative strains of socialism; voicing opposition to LGBTQ rights, immigration, and opposition towards integration with institutions like the European Union."
 LIT.Autocracy: "£generic_Autocracy_small (LLP) リトアニア人民党"
 LIT.Autocracy_desc: "左派ポピュリズム - 名目上は左派であるリトアニア人民党は、リトアニアにおける親ロシア派の政党であり、アメリカやEUとの統合に反対する一方で、ロシアやベラルーシとのより緊密な関係を求めている。同党は、社会的には保守的でありながら、経済的にはポピュリスト的な見解を併せ持つ。"
 SAO.Neutral_conservatism: "£generic_Neutral_conservatism_small (ADI) Independent Democratic Action"
 SAO.Neutral_conservatism_desc: ""
 SAO.anarchist_communism: "£generic_anarchist_communism_small (MLSTP-PSD) Movement for the Liberation of São Tomé and Príncipe - Social Democratic Party"
 SAO.anarchist_communism_desc: ""
 SAO.Nat_Autocracy: "£generic_Nat_Autocracy_small (JNS) 国民救済評議会"
 SAO.Nat_Autocracy_desc: ""
 VIE.Western_Autocracy: "£generic_Western_Autocracy_small (VNQDĐ) ベトナム国民党"
 VIE.Western_Autocracy_desc: "大西洋主義 - 1927年に孫文や国民党の初期思想を模範とした進歩的・左派政党として結成されたベトナム国民党は、インドシナ共産党の影響力拡大により急速に存在感を失い、派閥抗争によって弱体化するとともに、南部のベトナム共和国と北部のベトナム民主共和国の双方からの圧力に直面した。最終的に北ベトナムが勝利すると、同党は完全に国外へ逃れ、主に在外ベトナム人コミュニティの中で亡命活動を展開したが、そのイデオロギーは創設時の綱領とは名目上のみ類似するものに過ぎなかった。"
 VIE.anarchist_communism: "£generic_anarchist_communism_small (VFF) Vietnamese Fatherland Front"
 VIE.anarchist_communism_desc: "(Popular Front) - The Vietnamese Fatherland Front is the official Popular Front of the Socialist Republic of Vietnam. Dominated by the Communist Party of Vietnam in practice, the Fatherland Front is nominally an organization in its own right. The purpose of the group is meant to unite many smaller movements under a common umbrella such as youth groups, labour unions, and previously other political parties."
 WAA.Communist-State: "£WAA_Autocracy (UWSP) ワ州連合党"
 WAA.Communist-State_desc: "毛沢東主義 - ワ州連合党（UWSP）は、ミャンマーのシャン州北部にある自治州であるワ州の与党である。1989年11月3日、ビルマ国民統一党と、いくつかの小規模な非共産主義系ワ族グループが合併して結成された。UWSPは毛沢東主義をイデオロギーとして掲げ、ワ州において唯一の合法的な政治組織として統治を行っている。また、同党は中華人民共和国と緊密な関係を築いており、ワ州をミャンマー国内の紛争から遠ざけ、中国とのさらなる統合へと導いている。"
 WAA.Nat_Autocracy: "£generic_Nat_Autocracy_small (UWSA) ワ州連合軍"
 WAA.Nat_Autocracy_desc: "赤色軍事政権 - 与党であるワ州統一党の軍事部門として活動するワ州連合軍（UWSA）は、同党の直接的な統制下にある同党の延長線上として運営されている。親組織と同様に、UWSAは中国と緊密な関係を築いており、ワ州内の現状を維持しつつ、ミャンマー国内の他の勢力に対しては中立を保つことを目指している。"
 SUR.neutral_Social_desc: ""
 MRT.Neutral_social_desc: ""
 BEN.Autocracy: "£generic_Autocracy_small (FARD-Alafia) 再生開発行動戦線（独裁派）"
 BEN.Autocracy_desc: "実用的独裁体制 - 1994年に結成された再生開発行動戦線は、名目上は社会民主主義政党である。同党の最大の成功は、かつてベナン人民革命党の党員であったマティユー・ケレク大統領の在任中に訪れた。政権掌握後、彼の統治は独裁的支配との非難や論争に満ちていた。"
 BUL.anarchist_communism_desc: ""
 COM.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small (PJ) ジュワ党"
 COM.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 COM.Neutral_Muslim_Brotherhood_desc: "反帝国主義的世俗主義 - ジュワ党（フランス語：Parti Juwa, PJ）\n\n「コモロのアーヤトッラー」とも呼ばれるアフメド・アブダラ・モハメド・サンビが率いるジュワ党は、世俗主義を提唱し、コモロにおける権威主義的な統治に反対している。同党は、選挙プロセスの擁護、自由な選挙の確保、そしてコモロの統一維持に尽力している。"
 SWA.conservatism_desc: ""
 CHE.liberalism_desc: "親西欧自由主義 - チェチェン民主党 \n（チェチェン語ローマ字表記：Noxçiyn Demokratin Partiya）\n（ロシア語ローマ字表記：Chechenskaya Demokraticheskaya Partiya）\n\nチェチェン民主党は、独立支持、世俗主義、民主主義を掲げる政党である。同党は、政治的イスラムやその他の過激なイデオロギーを明確に否定している。同党は、過激主義へと変質したと見なすヴァイナフ民主党などの旧来の民族主義運動から距離を置くべく、大きな歩みを進めてきた。その綱領には、ロシアの支配下にあるチェチェンの解放、戦争犯罪の国際的な訴追、そしてチェチェン戦争によって生じた損害に対する完全な補償が含まれている。"
 CHE.Caliphate_desc: "過激派サラフィー主義 - イチケリア・ダゲスタン人民会議\n（チェチェン語ローマ字表記：Noxçiyin Paxalkhiyn Içkeri a Dagestanan Kongress）\n（ロシア語ローマ字表記： Kongress Narodov Ichkerii i Dagestana)\n\nイチケリア・ダゲスタン人民会議は、1998年にシャミル・バサエフの指導下、チェチェンおよびダゲスタンの反乱軍司令官たちの共同指導により設立されたイスラム過激派テロ組織である。設立には、外国人のアラブ人傭兵イブン・アル＝ハッタブおよびアル＝バドル（満月）とつながりのある彼の側近たちの支援があった。1998年にグロズヌイで開催された会議を経て結成され、その主たる目的は、チェチェンとダゲスタン全域にまたがる独立したイスラム国家の樹立である。"
 CHE.Kingdom: "£CHE_Islamic_Brigade (IB/IBON) イスラム旅団"
 CHE.Kingdom_desc: "サラフィー主義 - イスラム旅団\n(チェチェン語ローマ字表記：Islamiyin Brigada)\n(ロシア語ローマ字表記：Islamskaya Brigada)\n\nイスラム旅団（アフマドフ・ジャマート）は、サラフィー主義系武装組織であり、1999年にチェチェンの指揮官ラムザン・アフマドフとその兄弟たちによって結成された。彼らは誘拐や殺人に関与したことで悪名高い。アスラン・マスクハドフ大統領のより世俗的な政策に対する武装反対勢力として結成され、1998年のウルス・マルタン戦役において政府軍と軍事衝突した。この組織は、チェチェンの多くの地区、都市、村に駐留する多数のグループ（ジャマート）で構成されていた。その中でも最も影響力があったのはウルス・マルタン地区を完全に支配下に置いたウルス・マルタンフスキー・ジャマートであった。"
 CHE.Kingdom_icon: "£CHE_Islamic_Brigade"
 CHE.oligarchism_desc: "過激派/組織犯罪 - イスラム・ジャマート最高評議会\n（チェチェン語ローマ字表記：Islaman Jamaatan Xalxa Sovet）\n（ロシア語ローマ字表記：Vysshiy Sovet Islamskikh Dzhamaatov）\n\nイスラム・ジャマート最高評議会とその武装部門である特別目的イスラム連隊（アル＝ジハード・フィ・サビラ・イスラム特別連隊）は、チェチェンで活動するジハード主義組織であり、1996年にチェチェンの軍閥アルビ・バラエフによって、旧軍部隊として設立された。同組織はシャリーア法に基づくチェチェン国家の樹立を目指しており、誘拐、人質事件、石油密輸、テロ活動などで悪名高い。同組織はグデルメスでのワッハーブ派による反乱に参加したため、アスラン・マスクハドフ大統領によって公式に解散させられたが、それにもかかわらず活動を継続した。1998年に4人の外国人携帯電話技術者が拉致・斬首された事件後、同組織はアルカイダと関係があるとされるが、バラエフ自身はこれを否定している。"
 CHE.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small (PD) ジョハールの道"
 CHE.Neutral_Muslim_Brotherhood_desc: "(Islamism) - Path of Dzhokhar\n(Chechen: Coxaran Nek')\n(Russian: Put Dzhokhara)\n\nThe Path of Dzhokhar is a Chechen Islamist political movement led by Zelimkhan Yandarbiyev, a close associate and successor of Dzhokhar Dudayev, with Yandarbiyev leading Chechnya from 1996 to 1997 after Dudayev's death. After being defeated by Aslan Maskhadov in the 1997 presidential election. Yandarbiyev had a falling out with Maskhadov, followed by Yandarbiyev being accused of an assassination attempt on Maskhadov. Maskhadov publicly denounced Yandarbiyev, accusing him of importing Wahhabism and sponsoring anti-state activities. Yandarbiyev subsequently joined the hard-line Islamist opposition, developing ties to Arbi Barayev. Yandarbiyev now resides in Qatar as his party all but ceases to function as an polical entity. "
 CHE.Nat_Fascism_desc: "チェチェン民族主義 - ジョハル・ドゥダエフ軍\n(チェチェン語ローマ字表記：Coxaran Dudaevan Eskar)\n(ロシア語ローマ字表記：Armiya Dzhokhara Dudaeva)\n\nジョハル・ドゥダエフ軍は、1997年にサルマン・ラドゥエフによって「ジョハルの道」の戦闘部隊として創設され、ロシアがチェチェンの独立を承認するまで戦争を続けると主張していた。実際には、強盗や爆弾テロに関与する小規模な武装集団として活動していた。ラドゥエフは派手な服装や妄想的な主張で知られており、虚偽の攻撃への関与や、ドゥダエフが生存しておりトルコにあるNATOの秘密基地からジハードを指揮しているといった主張を行っていた。1997年の選挙で同盟勢力を確保できなかった後、ラドゥエフはグロズヌイで長期にわたる集会を主導した。この集会は銃撃戦に発展し、支持基盤が崩壊した結果、彼の副司令官が死亡した。ラドゥエフはパキスタンへ逃亡したが、第二次チェチェン戦争直前に帰国した。"
 CHE.Nat_Autocracy1: "£generic_Nat_Autocracy_small (PNN) 国民独立党"
 CHE.Nat_Autocracy2: "£generic_Nat_Autocracy_small (CF) コーカサス戦線"
 CHE.Nat_Autocracy_desc1: "チェチェン民族主義 - 国民独立党\n（チェチェン語ローマ字表記：Mehkanan Yozancha Partiya）\n（ロシア語ローマ字表記：Partiya Natsionalnoy Nezavisimosti）\n\n国民独立党は、実業家ルスラン・クタイエフによって設立された、チェチェンにおける穏健な民族主義政党である。当初はジョハル・ドゥダエフ大統領に反対し、汚職や権威主義を批判していた。第一次チェチェン戦争の勃発後、同党はドゥダエフとチェチェンの独立を断固として支持する立場へと転換し、1995年の再結成後は最も強力な親政府勢力の一つとなった。同党は1997年の大統領選挙および議会選挙で圧勝し、広く穏健派と見なされていたアスラン・マスクハドフとヴァハ・アルサノフの候補ペアを支持した。それ以来、同党の影響力は強硬派イスラム主義野党に押され衰えつつあり、マスクハドフ自身も同党とは緩やかなつながりしか持っていない。"
 CHE.Nat_Autocracy_desc2: ""
 CHE.Conservative_desc: "親ロシア忠誠派民兵/権威主義 - カディロフツィ\n（チェチェン語ローマ字表記：Kadyrovtşan）\n（ロシア語ローマ字表記：Kadyrovtsy）\n\nカディロフツィは、第二次チェチェン戦争の開始時に、アフマド・カディロフ率いる分離主義派戦闘員の離反者たちによって結成された、親クレムリン派のチェチェン民兵組織である。彼らは報復や威嚇行為に関与しているとされる。このグループはワッハーブ派の影響力に反対し、チェチェンの独立を拒否して、限定的な自治権の下でのロシアへの再統合を支持している。"
 TAI.Western_Autocracy: "£TAI_conservatism (KMT) 国民党 - 専制主義派"
 TAI.Western_Autocracy_desc: "大西洋主義 - 中国国民党（通称：国民党）は1894年に孫文によって創立された。中国本土と中華民国双方の称賛を集める人物である孫文の指導下、同党は中国の統一に向け尽力し、多くの集団や理念に対する統一戦線を築いた。党の公式イデオロギーは、孫文の「三民主義」によって大きく形作られてきた。これらの理念は、公民的中華民族主義、中華民主主義、人民福祉である。当初は左傾的と見られ、ソビエト連邦とさえ連携していたが、1927年の上海虐殺事件を契機に共産党と決裂し、間もなく中国内戦が勃発した。国民党自体は、内戦終結時に台湾島へ退去を余儀なくされるまで、様々な形で中国支配を維持した。台湾では一党独裁制の下で「残存中華民国」を統治し、1987年に民主化が回復されるまで続いたが、その後も根強い政治勢力として影響力を保持した。共産主義への反対姿勢、中国内戦の経緯、冷戦下の政治情勢といった要素が相まって、国民党は右傾化を強め、三民主義の理念を民族主義的・保守的な政治基盤に適合させる形で変容していった。"
 TAI.socialism_1: "£generic_socialism_small (NPP) 時代力量"
 TAI.socialism_1_desc: "左派ナショナリズム - 2015年に設立された時代力量は、台湾の中国からの完全かつ正式な独立を主張する。民進党よりもさらに左寄りで、同党はより強固な左派的政策を掲げるが、台湾国内の既存二大連合のいずれにも属していない。"
 TAI.Neutral_Autocracy: "£TAI_conservatism (KMT) 国民党 - 実用主義派"
 TAI.Neutral_Autocracy_desc: "実用的保守主義 - 中国国民党（通称：国民党）は1894年に孫文によって創立された。中国本土と中華民国双方の称賛を集める人物である孫文の指導下、同党は中国の統一に向け尽力し、多くの集団や理念に対する統一戦線を築いた。党の公式イデオロギーは、孫文の「三民主義」によって大きく形作られてきた。これらの理念は、公民的中華民族主義、中華民主主義、人民福祉である。当初は左傾的と見られ、ソビエト連邦とさえ連携していたが、1927年の上海虐殺事件を契機に共産党と決裂し、間もなく中国内戦が勃発した。国民党自体は、内戦終結時に台湾島へ退去を余儀なくされるまで、様々な形で中国支配を維持した。台湾では一党独裁制の下で「残存中華民国」を統治し、1987年に民主化が回復されるまで続いたが、その後も根強い政治勢力として影響力を保持した。共産主義への反対姿勢、中国内戦の経緯、冷戦下の政治情勢といった要素が相まって、国民党は右傾化を強め、三民主義の理念を民族主義的・保守的な政治基盤に適合させる形で変容していった。"
 TAI.neutral_Social_1: "£generic_neutral_Social_small (TPP) 台湾人民党"
 TAI.neutral_Social_1_desc: "左派ポピュリズム - 2019年に結成された台湾人民党は、国民党と民主進歩党の両党による台湾の政治体制に対する代替案を標榜している。名目上は幅広い支持層を抱える反体制政党であるが、その政策綱領と掲げる目標は中道よりもむしろ中道左派に近い。"
 TAI.Nat_Fascism_1: "£TAI_anarchist_communism (CUPP) 中華統一促進党"
 TAI.Nat_Fascism_1_desc: "国家保守主義 - 社会的には右派に強く接近するCUPPの限定的な政策基盤は、主に「一国二制度」の原則に基づく中国との再統一に焦点を当てている。同党は台湾内、さらには香港における民主化活動家を弱体化させ、威嚇することさえ試み、中国の国益を推進しようとしてきた。"
 LEB.socialism_arm: "£generic_socialism_small (SDHP) 社会民主フンチャキアン党"
 LEB.socialism_arm_desc: "左派社会民主主義 - 1887年に結成された社会民主フンチャキアン党は、アルメニア人を代表する最も古い政党の一つであり、オスマン帝国やイランでも時期を同じくして活動してきた。同党は比較的社会主義的な政治綱領を掲げており、レバノンにおける計画経済を提唱するとともに、欧州や西側諸国とのより緊密な協力関係を求めている。"
 LEB.liberalism_arm: "£generic_liberalism_small (ADL) アルメニア民主自由党 - ラムガヴァル"
 LEB.liberalism_arm_desc: "国民自由主義 - 1921年に設立されたアルメニア民主自由党は、世界中のアルメニア人ディアスポラを支援することを目的として活動しているが、アルメニア国内にも姉妹政党を維持している。イデオロギー的には、市場経済を支持する穏健な自由主義的政策を掲げており、左派や折衷主義的傾向が強い多くのアルメニア系ディアスポラ政党とは一線を画している。しかし、ライバル組織に支持率で後れを取っており、アルメニア国内においてもその影響力や活動範囲は限定的である。"
 LEB.anarchist_communism_arm: "£LEB_socialist_democratism タシュナク/アルメニア革命連盟 - §7新興§!派"
 LEB.anarchist_communism_arm_desc: "左派民族主義 - タシュナクは、レバノンにおけるアルメニア革命連盟の現地での呼称で、アルメニア系住民の利益を代表するレバノン最大の政党であると言えるだろう。民主社会主義のイデオロギーを掲げ、レバノンの独立以来、歴代の政権において積極的に活動してきた。より広範なアルメニア革命連盟の一翼を担う同党は、アルメニア本国やアルメニア人ディアスポラ全体とも強いつながりを持っている。"
 LEB.Neutral_Libertarian_arm: "£generic_Neutral_Libertarian_small 自由レバノン・アルメニア運動"
 LEB.Neutral_Libertarian_arm_desc: "新自由主義 - レバノン系アルメニア人の実業家グループによって結成された自由レバノン・アルメニア運動は、世俗的な政府を重視する穏健な自由主義的政策を掲げている。同党の党員数は少なく、選挙での成果もほとんどない。"
 LEB.Nat_Fascism_arm: "£LEB_socialist_democratism タシュナク/アルメニア革命連盟 - §Y民族主義§!派"
 LEB.Nat_Fascism_arm_desc: "社会民族主義 - タシュナクは、レバノンにおけるアルメニア革命連盟の現地での呼称で、アルメニア系住民の利益を代表するレバノン最大の政党であると言えるだろう。民主社会主義のイデオロギーを掲げ、レバノンの独立以来、歴代の政権において積極的に活動してきた。より広範なアルメニア革命連盟の一翼を担う同党は、アルメニア本国やアルメニア人ディアスポラ全体とも強いつながりを持っている。"
 BEN.Monarchist: "£generic_Monarchist_small アホスによる統治"
 BEN.Monarchist_desc: "選挙君主制 - アホスは、フォン語でダホメ（現在のベナン）の統治者を指す名称である。同国では君主制はとっくに廃止されているが、1910年以降はより非公式かつ慣習的な形で維持されてきた。歴史的に、ダホメの王たちは貴族や評議会と共に統治を行ってきたが、その権限や権力の限界は、同時代のヨーロッパの君主たちとは異なっていた。"
 BEN.Neutral_Libertarian: "£generic_Neutral_Libertarian_small 民主刷新党"
 BEN.Neutral_Libertarian_desc: "進歩主義 - 1990年に結成された民主刷新党は、主にベナン在住の亡命者コミュニティを支持基盤としている。活動範囲は限定的であるものの、同党は選挙で一定の成果を上げ、いくつかの政権に参加してきた。"
 CBD.liberalism: "£generic_liberalism_small (SRP) Sam Rainsy Party"
 CBD.liberalism_1: "£generic_liberalism_small (CLP) Candlelight Party"
 CBD.liberalism_desc: "(Progressive Liberalism) - Founded in 1995 as the Khmer Nation Party until 1998 when it changed its name to the Sam Rainsy Party, the party follows a liberal platform advocating for democratic reform within Cambodia. Due to the dominance of the CPP–FUNCINPEC and autocratic practices within Cambodia the party has seen very few electoral gains."
 CBD.Monarchist: "£generic_Monarchist_small ノロドム家"
 CBD.Monarchist_desc: "専制君主制 - ノロドム家は1800年代後半、アン・ドゥオン王の治世下で台頭した。同王は、フランスによる国内への干渉の基盤を築くとともに、タイやベトナムとの関係も構築した。その後の統治者たちはこの遺産を継承し、ノロドム家の2つの分家が交互に統治を行っていたが、やがてフランスの影響力が強まり、特定の統治者を強固に支持できるほどになった。王室は1970年の共和主義・親米派によるクーデターで廃位され、北朝鮮に亡命した。そこで共産主義の理念に同調するようになった王室は、帰国後、クメール・ルージュ政権への統合を試みた。ノロドム・シハヌークは短期間ながら国家元首を務めたが、王室は再び亡命を余儀なくされ、1993年の王政復古までその状態が続いた。"
 ECU.liberalism: "£ECU_anarchist_communism (PAIS) PAIS Alliance/Proud and Sovereign Homeland (Right-Wing)"
 ECU.liberalism_desc: "(Neoliberalism) - Sweeping to power as part of the 'Pink Tide' across Latin America, PAIS initially followed a moderate left agenda blending Bolivarianism, progressivism, and socialist thought together into a broad left populist alliance. Despite its initial success, the party slowly drifted towards the centre, with more right-leaning elements of the party becoming more and more prominent, inspired by 'Third Way' as well as Liberal-aligned ideals."
 ECU.Communist-State_1: "£generic_Communist_State_small (UP) Popular Unity"
 ECU.Communist-State_1_desc: "(Revolutionary Socialism) - Arising in 2014 to replace the MPD, Popular Unity seeks to unite a larger swathe of the far-left. Putting an emphasis on anti-imperialism and revolution, the coalition also holds plurinationalist, collectivist, and environmentalist views. Despite its more broad ideological approach, it has remained distant from other leftist parties."
 ANT.neutral_Social: "£generic_neutral_Social_small アンティグア・バーブーダ労働党"
 ANT.neutral_Social_desc: ""
 LAT.Monarchist_desc: "貴族君主制 - クールラント貴族会議（ラトビア語：Kurzemes Muižnieku Konference）\n\n クールラント貴族会議は、第一次世界大戦中にドイツが占領していたラトビアの領土で招集された。クールラントの貴族たちによって組織されたこの会議において、参加者はロシア帝国からの独立を宣言し、ドイツとの個人同盟を結んだ。現在、この機関は新国王を選出するために必要とされている。"
 ADS.Nat_Autocracy: "£ads_nationalist_military_junta  (ADF) アルビオン防衛軍"
 ADS.Nat_Autocracy_desc: "民族主義的準軍事組織 - イギリスの主権に対する脅威の高まりを受けて結成されたアルビオン防衛軍は、国家の安定と[ENG.GetLeader]の安全を確保するための安全地帯を構築することを主たる目的としている。"
 HOL.Western_Autocracy: "£HOL_nationalist_monarchist (W-HoON) オラニエ＝ナッサウ家"
 HOL.Western_Autocracy_icon: "£HOL_nationalist_monarchist"
 HOL.Western_Autocracy_desc: "西側独裁体制 - オラニエ＝ナッサウ家（オランダ語：Huis van Oranje-Nassau）オラニエ＝ナッサウ家はオランダ国家に対して直接的な行政権を行使し、王室内に政治権力を集中させつつ、外交・経済政策においては明確な西側志向を維持している。議会や裁判所は形式上は機能し続けているが、安全保障、戦略、国家の優先課題に関する重要な決定は君主によって決定され、忠実な閣僚たちによって実行されている。この王朝は、その統治を欧州の立憲伝統を安定的に継承するものとして提示し、秩序、行政の規律、そしてNATOやEUとの強固な連携を強調している。政治的多元主義は、王室が定めた範囲内でのみ容認されており、それによって、党派間の対立よりも、団結、安定、そして西側諸国との連携が優先されることが保証されている。"
 LKT.Western_Autocracy: "£generic_Western_Autocracy_small ダコタ民主党"
 LKT.Western_Autocracy_icon: "£generic_Western_Autocracy_small"
 LKT.Western_Autocracy_desc: "£generic_Western_Autocracy_small ダコタ民主党（DDP）は、比較的単純明快な政党であり、民主主義体制を信奉している。しかし、一部からは古代ギリシャの民主制との類似性が指摘されており、長期的には当時のギリシャの都市国家が寡頭政治へと移行したとの見方もある。だが、同党は「行動は言葉よりも雄弁である」と人々に訴えることで、こうした批判を一蹴している。"
 LKT.conservatism: "£generic_conservatism_small 旧共和国党"
 LKT.conservatism_icon: "£generic_conservatism_small"
 LKT.conservatism_desc: "£generic_conservatism_small 旧共和国党（ORP） は、厳密には旧共和党および旧民主党に所属していた中道右派の勢力が引き継いだ政党である。同党は、旧共和国の崩壊を加速させたのはメディアの扇動と民衆の暴走であったと主張し、やや保守的な国家へと着実に歩みを進めることで、旧共和国が新たな光のもとで再生すると信じている。"
 LKT.liberalism: "£generic_liberalism_small 偉大なる自由党"
 LKT.liberalism_icon: "£generic_liberalism_small"
 LKT.liberalism_desc: "£generic_liberalism_small 偉大なる自由党（GLP）は、典型的な中道左派政党である。よりリベラルな社会政策に重点を置き、グレートプレーンズが「偉大」であり続けるよう、リベラルな農業政策を推進している。全体として、偉大なる自由党は一種のリベラル・ナショナリスト政党であり、リベラルな政策を通じて、共和国の対外的な独立を促進している。"
 LKT.socialism: "£USA_shepeard_party 農民進歩党"
 LKT.socialism_icon: "£USA_shepeard_party"
 LKT.socialism_desc: "£USA_shepeard_party 農民進歩党（FPP）は、穏健な農業主義を掲げる政党である。国家も国民も食料なしには存続できないという事実を基盤とし、経済・社会政策の双方において、農業従事者層を中核に据える。この「下から上へ」という精神に基づき、同党は農業の重要性を軸として国家の繁栄を目指している。"
 LKT.Communist-State: "£generic_Communist_State_small 農民革命戦線"
 LKT.Communist-State_icon: "£generic_Communist_State_small"
 LKT.Communist-State_desc: "£generic_Communist_State_small 農民革命戦線（FRF）は、この国の労働者、とりわけ新共和国の労働者とは農民であるという事実に焦点を当てたマルクス主義政党である。したがって、この国の農民を組織化することこそが、真の革命を生み出し、企業支配層の利権屋たちに対する新たな世界革命を打ち立てることにつながる。"
 LKT.anarchist_communism: "£generic_anarchist_communism_small ラコタ農業協会"
 LKT.anarchist_communism_icon: "£generic_anarchist_communism_small"
 LKT.anarchist_communism_desc: "£generic_anarchist_communism_small ラコタ農業協会（LAS）は、伝統的なアナキスト政党である。政府機構を「退化」させ、国家をよりシンジカリズム的な指導体制へと回帰させることを目指しており、そこではピラミッド構造が、ある意味では立方体のような形をとっている。農民組合と労働者組合が生産と分業を調整し、その成果は地域委員会に報告される。こうした仕組みが段階的に上層へと伝わり、地域住民に焦点を当て支援を行うことで、各地域を統合された国家へと発展させていく。"
 LKT.Conservative: "£generic_Conservative_small 部族伝統党"
 LKT.Conservative_icon: "£generic_Conservative_small"
 LKT.Conservative_desc: "£generic_Conservative_small 部族伝統党（TTP）は、それ自体が連立政党である。伝統主義と社会的保守主義という共通の理念のもと、先住民やその他すべての民族が団結し、平和を維持しつつ、皆のために着実に前進していく道筋を築いていく。"
 LKT.Autocracy: "£generic_Autocracy_small カンザスシティ連合"
 LKT.Autocracy_icon: "£generic_Autocracy_small"
 LKT.Autocracy_desc: "£generic_Autocracy_small カンザスシティ連合（KCK）は、経済を最優先とする政党です。我々は、この発展途上の地域を、沿岸部に見られるような水準にまで引き上げたいと考えています。KCKは、経済が安定し、すべての人にとって健全な状態にあるとき、政治や社会政策は自然と国民の意思によって決定されるものだと信じています。"
 LKT.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラム"
 LKT.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 LKT.Neutral_Muslim_Brotherhood_desc: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラムは、白人が支配するアメリカの社会において、黒人の地位を向上させ、確保することを目指すアフリカ系アメリカ人の文化団体である。ラコタ共和国においては、白人多数派に対抗して何らかの選挙上の影響力を確保するため、先住民と不安定な連合関係を築いている。その結果、ネーション・オブ・イスラムの過激派メンバーは、実際に黒人だけのための新国家を創設しようとしており、この新国家を大陸にいる黒人にとっての救済と見なしている。"
 LKT.Neutral_Autocracy: "£generic_Neutral_Autocracy_small 若手実業家党"
 LKT.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 LKT.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small 若手実業家党（YIP）は、新世代と彼らが目指す未来を中核とする政党である。主に20代から30代で構成されるこの政党は、近代化を掲げる政党であり、農業への過度な依存を是正するため、実体ある産業基盤と企業基盤を構築する経済計画や改革を通じて、国を現代へと導くことを目指している。"
 LKT.Neutral_conservatism: "£generic_Neutral_conservatism_small ラコタ伝統連帯党"
 LKT.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 LKT.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small ラコタ伝統連帯党（LTSP）は、より良い国家政策として先住民の孤立主義を取り入れようとする、総合的な保守政党である。自らの土地に目を向け、自らの問題を解決することを目指すLTSPは、公共の秩序を乱すことなく、家族、自由、自己表現を享受するすべての人々のために現状を維持するという共通の目標を通じて、適度に多様な土地と人々を団結させたいと考えている。"
 LKT.oligarchism: "£generic_oligarchism_small ラコタ・テクノクラート党"
 LKT.oligarchism_icon: "£generic_oligarchism_small"
 LKT.oligarchism_desc: "£generic_oligarchism_small ラコタ・テクノクラート党（LTP）通称「テクノクラート党」は、従来のテクノクラシー思想に独自の解釈を加えた興味深い政党である。国土の大部分が農業生産に供されている現状を踏まえ、同党はこれを活用して、燃料効率や代替燃料に関する独自の研究プロジェクトやイノベーションを推進するとともに、工業化に適した限られた土地を、その地域における効率性と生産性を向上させるための主要な原動力とすることを目指している。"
 LKT.Neutral_Libertarian: "£USA_Neutral_Libertarian_small 自由の野原党"
 LKT.Neutral_Libertarian_icon: "£USA_Neutral_Libertarian_small"
 LKT.Neutral_Libertarian_desc: "£USA_Neutral_Libertarian_small 自由の野原党（FoLP）は、かつてのリバタリアン党の系譜を継ぐ政党である。現在は、工業化と農業主義との共存という興味深い対立軸を掲げているが、経済政策の進め方については党内でも意見が分かれている。そのため、同党の政策綱領の大部分は、社会問題への意識向上や、あらゆる形態の政府の肥大化を防ぐことに重点が置かれている。"
 LKT.Neutral_green: "£USA_green_party 国家保存党"
 LKT.Neutral_green_icon: "£USA_green_party"
 LKT.Neutral_green_desc: "£USA_green_party 国家保存党（PNP）を「保存党」と呼ぶ人もいるが、この党は旧緑の党からその命脈を受け継いだ政党である。他の地域では旧緑の党の影響がそれほど強くなかったかもしれないが、ラコタ共和国では、受動的に保存されている土地が膨大にあるため、同党との間に強い相互作用が存在している。党外の人々の多くは、PNPが国家の有意義な工業化に向けた最大の障害になると考えているが、党員たちはそうした懸念を、党に対する過激な見方として払拭しようとしている。"
 LKT.neutral_Social: "£USA_socialist_party_of_america バラの茂み党"
 LKT.neutral_Social_icon: "£USA_socialist_party_of_america"
 LKT.neutral_Social_desc: "£USA_socialist_party_of_america バラの茂み党（RBP）は、比較的シンプルな理念を持つ政党である。例えば、比例課税制度を通じて労働者と農民の平等を推進することを目指している。多くの人々は、この党を「民主社会主義」の独特な農業主義的形態と見なしているが、党自身は、むしろ「進歩的なブルーカラー政党」であると位置づけている。"
 LKT.Neutral_Communism: "£generic_Neutral_Communism_small ローズ革命協会"
 LKT.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 LKT.Neutral_Communism_desc: "£generic_Neutral_Communism_small ローズ革命協会（RRA）は、革命的マルクス主義政党である。ロシアのボリシェヴィキやドイツのスパルタクス団といったマルクス主義政党の起源に近い立場をとっている。同党は、プロレタリアートの利益のために真の、そして永続的な変革をもたらす唯一の道は、いかなる手段による革命であると考えている。"
 LKT.Nat_Populism: "£generic_Nat_Populism_small 農薬散布機協会"
 LKT.Nat_Populism_icon: "£generic_Nat_Populism_small"
 LKT.Nat_Populism_desc: "£generic_Nat_Populism_small 農薬散布機協会（CDS）、あるいは単に「協会」として知られるこの政党は、国家主義的かつ孤立主義的な政党である。民族ナショナリズムではなく地理的ナショナリズムを通じて国土の統一を目指すCDSは、この重要な違いゆえにユニークな「右派」政党である。多くの人がこれを虚偽だと主張するが、党側はそもそも人口が極めて少ないという圧倒的な事実を理由に、こうした主張を否定している。"
 LKT.Nat_Fascism: "£generic_Nat_Fascism_small 黄金平原同盟"
 LKT.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 LKT.Nat_Fascism_desc: "£generic_Nat_Fascism_small 黄金平原同盟（LGF）、通称「同盟」と呼ばれるこの組織は、広範な右派運動の中でもより民族主義的な傾向が強い。彼らは、人口の多寡にかかわらず、支配的な安定性を欠く限り、多文化主義がもたらす内部の緊張の下で失敗は避けられないと信じている。人口の5％未満に過ぎないものの、先住民はカンザス州やダコタ両州、モンタナ州に強固な地盤を築いており、同連盟がこのような厳しい現実を突きつけ続けるならば、これらの地域に広がる広大な平原や山岳地帯が、将来的に深刻な問題となる可能性がある。"
 LKT.Nat_Autocracy: "£generic_Nat_Autocracy_small ラコタ軍"
 LKT.Nat_Autocracy_icon: "£generic_Nat_Autocracy_small"
 LKT.Nat_Autocracy_desc: "£generic_Nat_Autocracy_small ラコタ軍（AFL）は陸軍が主導する軍事組織である。同共和国の地理的条件により、河川戦を除き、海軍への軍事予算は事実上存在しない。予算の大部分は陸軍に割り当てられ、空軍はそれに次ぐ、比較的控えめな予算となっている。適切な空軍を持たない陸軍がどれほど有効なのか疑問視する声も多いが、海軍を気にする必要がない分、その余分なリソースが何か良い結果をもたらすかもしれない。"
 LKT.Monarchist: "£USA_american_heritage_party イエローストーン家"
 LKT.Monarchist_icon: "£USA_american_heritage_party"
 LKT.Monarchist_desc: "£USA_american_heritage_party イエローストーン家（HoY）は、イエローストーン協会としても知られており、国家を定義する最も顕著な地理的特徴を中心に、新たな象徴や慣習、そして新たなアイデンティティを確立し、選挙による君主制を創設しようとする統一的な運動である。一部からは、ある種の専制的な一族を権力の座に就けるための策略ではないかと懸念する声もあるが、それ以上に多くの人々は、単に同居する集団間のいさかいにとどまらず、この土地の民が団結して前進するための道であると捉えている。"
 DPR.Nat_Populism_desc: "ユーラシア主義 - 新ロシア党（ノヴォロシア党）は、ウクライナ東部（ノヴォロシア）の分離独立とロシア連邦への編入を求める、ウクライナの分離主義政治組織である。イデオロギー的には、同党の主な原動力は親ロシア的な立場にあるが、多くのロシア民族主義運動と同様に、ユーラシア主義、ソビエティズム、そして現代のロシア民族主義運動の影響を受けており、非常に折衷的である。同党自体は民主主義を支持すると宣言しており、左派や右派に対して明確な立場を表明することはあまりない。"
 CRM.Conservative_desc: ""
 CBD.Communist-State_desc: "(Pragmatic Socialism) - Founded in 1951 as the Kampuchean People's Revolutionary Party, the CPP operated as an originally Marxist-Leninist party aligned with Vietnam and the USSR rather than to China as its main opposition in the CPK (The Khmer Rouge) had. The party did not align with the Khmer Rouge that rose to power with Pol Pot, instead forming a government with backing from Vietnam to end the policies implemented. From here the party ruled over an unstable Cambodia in a time of massive change in the world, with the collapse of the Socialist camp the party slowly dropped its commitments to Marxism-Leninism, and then socialism. Though factions remains active in the 90s that held more leftist views, they were sidelined by the pragmatist elements, aiming to retain control over Cambodia without aligning towards any specific ideology."
 TOG.Nat_Autocracy_desc: "民族主義的軍事政権 - 1960年の独立と同時に結成されたトーゴ軍は、1967年のクーデターでニャシンベ・エヤデマを権力の座に就かせたほか、その後もクーデターの脅威を背景に彼の率いるトーゴ人民党（RPT）に対して譲歩を迫るなど、急速に政界で存在感を強めた。RPTおよびその後継政党がトーゴ政府内で大きな存在感を示していることから、軍は国内の政治や諸問題において依然として大きな影響力を維持しており、一党支配が公式に終了した後も、名目上は独裁体制の継続を支持し続けている。"
 CAM.liberalism: "£generic_liberalism_small (CDU) カメルーン民主連合"
 CAM.liberalism_desc: "改革主義 - 1991年に結成されたカメルーン民主連合は、瞬く間にカメルーン人民民主連合（CPDM）に次ぐ第2の主要野党へと成長した。同党は社会民主戦線と連携し、政治におけるCPDMの継続的な支配に対抗しようとしたが、野党グループ間の内紛や派閥争いが原因で、その成果は限定的なものにとどまった。政策面では、同党は汚職の根絶と民主的改革の推進を主な重点課題としている。党の創設者は、かつてアフマドゥ・アヒジョ政権下でより穏健な立場の人物として政権に関与していた経歴を持つ。"
 CAM.socialism: "£generic_socialism_small (SDF) 社会民主戦線"
 CAM.socialism_desc: "右派社会民主主義 - 野党禁止措置が名目上解除された後の1990年に結成された社会民主戦線（SDF）は、国内最大の野党であり、与党であるカメルーン人民民主連合および、同党が「事実上の単独支配」とみなす体制に反対してきた。イデオロギー的には、SDFの主な目標は民主的改革であり、同党は進歩的かつ社会民主主義的な見解も掲げている。"
 CAM.Autocracy: "£generic_Autocracy_small (UNDP) 民主進歩全国連合"
 CAM.Autocracy_desc: "実用的独裁体制 - 1990年に結成された民主進歩全国連合（UNDP）は、当初は亡命者たちによって結成された野党であったが、すぐに与党であるカメルーン人民民主連合（CPDM）を支持する方向へと転換した。アフマドゥ・アヒジョの遺志を継ぐと主張するUNDPは、その政策綱領や立場において、同元大統領が率いた与党CPDMと極めて近い立場をとっている。選挙での成功には恵まれていないものの、その忠誠心により政府内の要職を占めており、結党以来、数回の選挙において相当数の議席を維持することに成功している。"
 CAM.Communist-State: "£generic_Communist_State_small (UPC) カメルーン人民連合"
 CAM.Communist-State_desc: "マルクス・レーニン主義 - 1948年に反植民地主義団体として結成され、一時期アフリカ民主連合のカメルーン支部であったカメルーン人民連合（UPC）は、すぐに左翼的理想に同調した。同組織はカメルーン戦争およびカメルーン全体の独立運動において重要な役割を果たしたが、選挙や政治面での成功はほとんど見られず、カメルーン人民民主連合の政権掌握に伴い国外追放を余儀なくされた。野党の合法化後、UPCは国内に復帰し、選挙への立候補を通じて限定的な成功を収めることができた。"
 CAM.Caliphate: "£generic_Caliphate_small (ISWAP) イスラム国西アフリカ州"
 CAM.Caliphate_desc: "サラフィー・ジハード主義 - ボコ・ハラムから分裂して結成されたイスラム国西アフリカ州は、より広範なイスラム国運動の目標と利益を支持し、それに沿うことを主張している。同組織は西アフリカ州を管轄し、その活動は主にナイジェリアとカメルーンに集中している。同グループは、ワッハーブ派、サラフィー主義、およびイスラム教内のその他の過激な宗教運動から強い影響を受けた、汎イスラム主義的かつ極右的なジハード主義イデオロギーを掲げている。同グループは、ナイジェリア国内で活動するボコ・ハラムをライバル組織と見なしており、両者の間で激しい衝突が発生するほか、同地域の様々な政府に対する暴力行為も行われている。"
 CAM.Nat_Autocracy: "£generic_Nat_Autocracy_small (FAC) カメルーン軍"
 CAM.Nat_Autocracy_desc: "実用的軍事政権 - 1960年に組織されたカメルーン軍は、政権に対して比較的忠実であり続けてきた。1984年のクーデター未遂はCPDMの政権転覆には至らず、ビヤ大統領が権力をさらに強固にするにつれ、軍内部にはより忠実な勢力が配置されるようになった。同軍が関与した紛争の大部分は、反乱勢力や国内の反体制勢力に対するカメルーン国内でのものであったが、領有権を巡る隣国ナイジェリアとの紛争は依然としてくすぶり続けており、中央アフリカ共和国の内戦やナイジェリア国内での反乱など、他の近隣諸国での紛争にもカメルーンは一定程度関与している。"
 SIA.conservatism_1: "£generic_conservatism_small (PMT) Neutral Democratic Party"
 SIA.conservatism_desc_1: "(Centrism) - Formed in 2007, the PMT acted as the successor of the Thai Rak Thai Party, claiming to carry on its populistic platform - though its own policies remained more moderate and it saw far less electoral success."
 SIA.conservatism_2: "£SIA_western_liberal (BJT) Bhumjaithai Party"
 SIA.conservatism_desc_2: "(National Conservatism) - Founded in 2008, the BJT operates as the unofficial continuation of the Neutral Democratic Party. It is strongly supportive of the nation's monarchy, and maintains a largely conservative agenda - with factional elements of the party adopting more populist and welfare oriented positions."
 CHL.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ラテンアメリカにおけるヒズボラ - チリ"
 ARG.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ラテンアメリカにおけるヒズボラ - アルゼンチン"
 ARG.Vilayat_e_Faqih_desc: "シーア派イスラム主義 - ラテンアメリカにおけるヒズボラは、名目上はヒズボラ本体と連携している運動である。1980年代に組織化されたとされ、ブラジル、パラグアイ、アルゼンチン、およびその他いくつかの国に、比較的小規模な支部が設立された。彼らはテロ行為の責任を負っているほか、イランの影響力を南北アメリカ大陸に拡大させようとしていると非難されている。アルゼンチン国内において、このグループは主に、同国に居住するディアスポラから資金を調達し、ヒズボラの活動資金に充てることを目的として活動している。"
 BOL.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ラテンアメリカにおけるヒズボラ - ボリビア"
 BRA.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ラテンアメリカにおけるヒズボラ - ブラジル"
 BRA.Vilayat_e_Faqih_desc: "シーア派イスラム主義 - ラテンアメリカにおけるヒズボラは、名目上はヒズボラ本体と連携している運動である。1980年代に組織化されたとされ、ブラジル、パラグアイ、アルゼンチン、およびその他いくつかの国に、比較的小規模な支部が設立された。彼らはテロ行為の責任を負っているほか、イランの影響力を南北アメリカ大陸に拡大させようとしていると非難されている。"
 LKT.anarchist_communism_alt: "£generic_anarchist_communism_small (AIM) アメリカン・インディアン運動"
 LKT.anarchist_communism_alt_desc: "インディヘニスモ - 1968年、他の社会運動が盛んに行われていた状況下で結成されたアメリカン・インディアン運動（AIM）は、全米の先住民族コミュニティの権利拡大、自治権の確立、および法的承認を求める組織として台頭した。活動が最盛期を迎えた頃、同団体は「レインボー・コアリション」と提携していた。これは、より多元的なアメリカという共通のビジョンを持つ左派系公民権団体からなる連合体である。同団体は全米の先住民を代表し、海外の先住民グループとも連携しているが、その主要なメンバーは中西部を中心に活動している。イデオロギー的には主に左派に位置づけられ、進歩的で多民族主義的な綱領を掲げているが、内部には様々な理念を持つ派閥が存在する。"
 LKT.Neutral_Communism_alt: "£generic_Neutral_Communism_small (AIM) アメリカン・インディアン運動（新左翼）"
 LKT.Neutral_Communism_alt_desc: "西側新左翼 - 1968年、他の社会運動が盛んに行われていた状況下で結成されたアメリカン・インディアン運動（AIM）は、全米の先住民族コミュニティの権利拡大、自治権の確立、および法的承認を求める組織として台頭した。活動が最盛期を迎えた頃、同団体は「レインボー・コアリション」と提携していた。これは、より多元的なアメリカという共通のビジョンを持つ左派系公民権団体からなる連合体である。同団体は全米の先住民を代表し、海外の先住民グループとも連携しているが、その主要なメンバーは中西部を中心に活動している。イデオロギー的には主に左派に位置づけられ、進歩的で多民族主義的な綱領を掲げているが、内部には様々な理念を持つ派閥が存在する。"
 PAR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ラテンアメリカにおけるヒズボラ - パラグアイ"
 PRU.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ヒズボラ・ペルー支部"
 PRU.Vilayat_e_Faqih_desc: "融合的ホメイニ主義 - ヒズボラやラテンアメリカ内の姉妹組織と同様、ヒズボラのペルー支部は規模が比較的小さく、主にイランの利益を拡大するために存在している。ペルー国内において、同組織は強硬な姿勢をとるよりも、融合的なイデオロギーを強く打ち出しており、エトノカセリスト運動や輝ける道、その他の反政府組織と連携している。"
 DRU.Nat_Autocracy: "£generic_Nat_Autocracy_small 国家警備隊"
 DRU.Nat_Autocracy_desc: "宗派主義的軍事政権 - 主にスワイダを拠点とする国家警備隊は、シリアのドゥルーズ派コミュニティを拠点として活動していた、いくつかの小規模でばらばらな民兵組織が統合されて結成された。これは、ドゥルーズ派コミュニティを守り、対立する民兵組織に対抗できる、統一された結束力のある組織が必要とされたことから生まれたものであり、共通の組織体制と目標の下に結集した、アサド政権支持派と反体制派の両方の民兵組織で構成されている。"
 QUE.conservatism: "£generic_conservatism_small (ADQ)ケベック民主行動党"
 QUE.conservatism_desc: "新自由主義 - ケベック自由党内の反体制派によって組織されたケベック民主行動党は、1994年の選挙に臨むべく同年に結成された。当初は好調な滑り出しを見せたものの、その後急速に支持率を落とし、ケベック自由党やケベック党の両方に後れを取ることとなった。イデオロギー的にはケベック民族主義を支持し、社会的には比較的保守的である。ただし、自由市場経済を推進する広範な新自由主義的政策を支持しており、ケベックの他の右派政党に比べればより穏健な立場をとっている。"
 QUE.conservatism_1: "£generic_conservatism_small (CAQ) ケベック未来連合（保守派）"
 QUE.conservatism_desc_1: "国民保守主義 - 2011年にケベック自由党とケベック党の元党員らによって結成されたケベック未来連合（CAQ ）は、主にポピュリズムとナショナリズムを掲げる政策を掲げている。同党はケベック州の独立には反対しているが、同地域へのより大きな自治権の付与を支持しており、左派・右派のいずれからも距離を置いている。もっとも、その政策や綱領は、その性質上、主に右派的で保守的なものである。CAQの台頭により、他の右派政党は押しのけられ、この新党は選挙で成功を収めた。"
 QUE.liberalism: "£generic_liberalism_small (QLP) ケベック自由党"
 QUE.liberalism_desc: "中道自由主義 - 1867年に結成されたケベック自由党は、そのルーツをフランス語圏の「カナダ党（Parti canadien）」に遡る。同党はその後、1955年までカナダ自由党と提携していた。歴史的には、社会リベラルあるいは社会民主主義的な理念を掲げる派閥が存在したが、党自体は概して穏健な傾向にありつつも、依然としてリベラルな政策綱領を主に維持している。他のケベックの政党とは異なり、ケベック自由党は、地方自治を伴うカナダへの残留を支持している。"
 QUE.socialism: "£generic_socialism_small (PQ) ケベック党"
 QUE.socialism_desc: "左派主権主義 - ケベック党（フランス語：Parti Québécois）は、ケベック州の自治、ひいては独立を推進するためのより強力な運動を築くことを目的として、1968年に2つの小規模な分離主義団体「主権運動・協会」と「国民連合」が合併して結成された。同党自体はケベックの完全な独立を主張しており、その政策綱領においてもこれを最優先事項としている。その一方で、同党の政策は社会民主主義的要素と社会自由主義的要素の両方を包含し、全体としてはやや左寄りの傾向にある。"
 QUE.Communist-State: "£generic_Communist_State_small (PCQ-PCC) ケベック共産党"
 QUE.Communist-State_desc: "マルクス・レーニン主義 - 1965年にカナダ共産党の党員たちによって結成されたケベック共産党は、ケベック州内で完全に独立した共産党として活動している。社会主義陣営の崩壊に伴い、90年代には活動停滞や組織の混乱に見舞われたものの、同党は徐々に回復を果たした。より穏健な左派勢力と連携し、ケベック州内の他の左派政党との結びつきを強めたのである。もっとも、公式には依然としてマルクス・レーニン主義を党綱領の基盤としている。"
 QUE.Neutral_green: "£generic_Neutral_green_small (GPQ) ケベック緑の党"
 QUE.Neutral_green_desc: "環境社会主義 - 緑の政治の中でもより左派的な立場をとるケベック緑の党（GPQ）は、より環境保護主義的で進歩的な政府の下での連邦制ケベックを提唱している。歴史的に、同党は内部の分裂や対立に直面し、一時的に解散したこともあった。その結果、GPQが再結成されるまで、ケベックにはカナダ緑の党の連邦支部のみが残されていた。"
 QUE.neutral_Social: "£generic_neutral_Social_small (PDS) 社会民主党"
 QUE.neutral_Social_desc: "社会民主主義左派 - 社会民主党は、当初は協同連邦連盟（CCF）に所属し、後に新民主党（NDP）に加わったが、一連の意見の相違に加え、極左組織「ケベック解放戦線（FLQ）」の元メンバーを党首に指名したことを受け、1990年代に正式に離脱した。イデオロギー的には、より伝統的な社会民主主義の政策を掲げる確固たる左派政党であり、ケベック独立を支持している。"
 QUE.neutral_Social_1: "£generic_neutral_Social_small (UFP) 進歩勢力連合"
 QUE.neutral_Social_desc_1: "左派ナショナリズム - 2002年、小規模な進歩派および左派政党の合併により結成された進歩勢力連合は、ケベック州のカナダからの独立を主張している。党員には、ケベック共産党や社会民主党の元党員などが含まれており、確固たる左派的な政策綱領の下で結束している。"
 QUE.neutral_Social_2: "£generic_neutral_Social_small (QS) ケベック連帯"
 QUE.neutral_Social_desc_2: "民主社会主義 - 2006年に複数の小規模な進歩派・左派政党が合流して結成されたケベック連帯は、瞬く間にケベック州の主流政治において最も左寄りの政党となった。イデオロギー的には、進歩主義、多民族主義、環境社会主義、そしてオルタ・グローバリズムの観点を政策綱領に融合させ、独立した民主的なケベック州の樹立を提唱している。"
 QUE.Nat_Populism: "£generic_Nat_Populism_small (ADQ) ケベック民主行動党（ポピュリスト）"
 QUE.Nat_Populism_desc: "保守ポピュリズム - ケベック自由党内の反体制派によって組織されたケベック民主行動党は、1994年の選挙に臨むべく同年に結成された。当初は好調な滑り出しを見せたものの、その後急速に支持率を落とし、ケベック自由党やケベック党の両方に後れを取ることとなった。イデオロギー的にはケベック民族主義を支持し、社会的には比較的保守的である。ただし、自由市場経済を推進する広範な新自由主義的政策を支持しており、ケベックの他の右派政党に比べればより穏健な立場をとっている。"
 QUE.Nat_Populism_1: "£generic_Nat_Populism_small (CAQ) ケベック未来連合"
 QUE.Nat_Populism_desc_1: "国民ポピュリズム - 2011年にケベック自由党とケベック党の元党員らによって結成されたケベック未来連合（CAQ ）は、主にポピュリズムとナショナリズムを掲げる政策を掲げている。同党はケベック州の独立には反対しているが、同地域へのより大きな自治権の付与を支持しており、左派・右派のいずれからも距離を置いている。もっとも、その政策や綱領は、その性質上、主に右派的で保守的なものである。CAQの台頭により、他の右派政党は押しのけられ、この新党は選挙で成功を収めた。"
 SOO.Caliphate: "£generic_Caliphate_small (IS-CP) イスラム国コーカサス州"
 ABK.Caliphate: "£generic_Caliphate_small (IS-CP) イスラム国コーカサス州"
 AFG.Mod_Vilayat_e_Faqih_1: "£generic_Mod_Vilayat_e_Faqih_small ヒズボラ・アフガニスタン（穏健派）"
 AFG.Mod_Vilayat_e_Faqih_desc_1: "シーア派イスラム主義 - ヒズボラ・アフガニスタンは、1980年に結成されたが、政党として登録されたのは2005年になってからであり、1979年のイラン革命の影響を受けた人々をそのルーツとしている。イランにおけるイスラム革命の定着に伴い、同国は台頭した様々な民兵組織や政治団体に対し支援を行うことが可能となり、それらの多くはアヤトラへの忠誠を公言した。ヒズボラ・アフガニスタンもその一員としてアフガン内戦に参加し、ソ連軍およびアフガニスタン民主共和国政府と戦った。内戦終結後、同組織は徐々にその立場を穏健化させ、イラン式の完全なイスラム革命を求めるのではなく、アフガニスタンのシーア派住民の権利を擁護する団体へと移行していった。"
 AFG.Vilayat_e_Faqih_1: "£generic_Vilayat_e_Faqih_small ヒズボラ・アフガニスタン"
 AFG.Vilayat_e_Faqih_desc_1: "ホメイニ主義 - ヒズボラ・アフガニスタンは、1980年に結成されたが、政党として登録されたのは2005年になってからであり、1979年のイラン革命の影響を受けた人々をそのルーツとしている。イランにおけるイスラム革命の定着に伴い、同国は台頭した様々な民兵組織や政治団体に対し支援を行うことが可能となり、それらの多くはアヤトラへの忠誠を公言した。ヒズボラ・アフガニスタンもその一員としてアフガン内戦に参加し、ソ連軍およびアフガニスタン民主共和国政府と戦った。内戦終結後、同組織は徐々にその立場を穏健化させ、イラン式の完全なイスラム革命を求めるのではなく、アフガニスタンのシーア派住民の権利を擁護する団体へと移行していった。"
 ARM.Caliphate: "£generic_Caliphate_small (IS-CP) イスラム国コーカサス州"
 AZE.Nat_Fascism: "£generic_Nat_Fascism_small (AzMDEP) アゼルバイジャン国民民主党"
 AZE.Nat_Fascism_desc: "汎テュルク主義 - 1993年、アゼルバイジャン人民戦線党の党員によって、汎テュルク主義組織「灰色の狼」の事実上のアゼルバイジャン支部として結成されたが、灰色の狼自身を含む汎テュルク主義勢力によるクーデター未遂事件を受けて、わずか2年後の1995年に即座に禁止された。禁止後も非公式に活動を続け、過激なナショナリズムやトルコとの緊密な関係構築を主張し続けた。"
 AZE.Western_Autocracy: "£generic_Western_Autocracy_small (AMİP) アゼルバイジャン国民独立党"
 AZE.Western_Autocracy_desc: "自由大西洋主義 - 1992年に結成されたアゼルバイジャン国民独立党は、穏健保守的な道徳的原則に基づき、国内に西洋式の民主主義を構築することを政策の柱としている。同党はアゼルバイジャンの野党勢力の中で一定の活動を行っているほか、国外在住のアゼルバイジャン人コミュニティや多くの西側諸国政府とも連携を保っている。"
 AZE.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small アゼルバイジャン・イスラム抵抗運動"
 AZE.Vilayat_e_Faqih_desc: "融合的ホメイニ主義 - イラン・イスラム共和国に連帯する学生運動として発足したアゼルバイジャン・イスラム抵抗運動（フセイニユーン）は、アリエフ政権に対する最終的な蜂起を主張するとともに、国内の他の過激派組織、主に自称「イスラム国」と関連する組織との戦いを掲げている。"
 AZE.Caliphate: "£generic_Caliphate_small (IS-CP) イスラム国コーカサス州"
 AZE.Caliphate_desc: "サラフィー・ジハード主義 - イスラム国コーカサス州は、トルコ、ジョージア、アルメニア、アゼルバイジャン、およびロシア南西部の一部からなる、イスラム国が自称する行政区域である。その目標や目的は、より広範なイスラム国運動のものと概ね一致しているが、内部の組織の乱れや成果の欠如により、分裂や他の対立勢力への離脱が生じている。"
 AZE.Caliphate_1: "£generic_Caliphate_small (IS-AP) イスラム国アゼルバイジャン州"
 AZE.Caliphate_desc_1: "サラフィー・ジハード主義 - かつてはイスラム国コーカサス州の一部と見なされていたが、2015年、現地のグループがイスラム国指導部の支援を受けて、アゼルバイジャン国内に州を樹立したと宣言した。このグループは、イスラム国のより結束の固い支部を形成することを目指しており、そのイデオロギーや目的は、組織が乱れていたコーカサス州よりもさらにイスラム国の本流に即したものとなっている。"
 JOR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ヨルダン・イスラム抵抗運動"
 JOR.Vilayat_e_Faqih_desc: "ホメイニ主義 - ヨルダン・イスラム抵抗運動は、この地域におけるイランの影響力を拡大し、イスラエルに圧力をかけることを明確な目的として組織された武装集団である。同組織のイデオロギーは、イラン革命防衛隊と直接的なつながりを持つため、イラン国内のより過激な勢力の思想と密接に関連しており、ホメイニ主義思想に基づくイスラム共和国の樹立を支持している。"
 NIG.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ナイジェリア・イスラム運動"
 NIG.Vilayat_e_Faqih_desc: "ホメイニ主義 - 1970年代のイラン革命の余波の中で設立されたナイジェリア・イスラム運動は、ナイジェリア政府の権威と、同国北部で活動するスンニ派イスラム組織の正当性の双方を否定している。その代わりに、同団体はキビズムとホメイニ主義を融合させた思想を掲げ、シーア派のイスラム共和国の樹立を目指している。同団体のイデオロギーそのものはイラン革命の影響を強く受けており、イランはこの組織を通じてナイジェリアにおいて一定の影響力を有している。"
 PAK.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small シパー・エ・ムハンマド・パキスタン"
 PAK.Mod_Vilayat_e_Faqih_desc: "シーア派イスラム主義 - 1994年に、シーア派コミュニティに対する宗派間攻撃から身を守ることを公言した民兵組織として結成されたシパー・エ・ムハンマド・パキスタンは、反シーア派過激派組織のメンバーを標的として活動してきた。しかし、同組織は、暴力行為やシーア派イスラム教のより過激な勢力とのイデオロギー的結びつきを理由に、テロ組織に指定されている。"
 PAK.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small (TJP) テフリク・エ・ジャファリア"
 PAK.Vilayat_e_Faqih_desc: "ホメイニ主義 - 1979年に設立されたテフリク・エ・ジャファリアは、パキスタン国内のシーア派コミュニティの利益を促進するために創設された組織である。その設立はイラン革命がイスラム世界に与えた影響によるものであったが、同団体内部ではイランに対する姿勢をめぐって意見が分かれ、内部抗争や対立が続き、最終的には2つの主要な派閥が形成された。そのうち優勢な派閥は、親ホメイニ主義の路線を採用した。同組織の目的は、シーア派イスラム共和国を樹立することではなく、パキスタンのシーア派住民の声を代弁することにある。もっとも、同組織自体は公然とイスラム主義的である。"
 TUR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small セラム・テヴヒッド"
 TUR.Vilayat_e_Faqih_desc: "ホメイニ主義 - イラン革命の影響を強く受けた理念に基づき活動するセラム・テヴヒッドは、トルコ国内に存在するとされる団体であり、トルコの政治をイランに有利な方向へ導くことを目的としているとされる。同組織はイラン革命防衛隊とつながりがあるとの指摘を受けているが、幾度かの調査が行われたにもかかわらず、その実態についてはほとんど明らかになっていない。"
 HAZ.Mod_Vilayat_e_Faqih: "£AFG_moderate_shiites アフガニスタン・イスラム統一党"
 HAZ.Vilayat_e_Faqih: "£AFG_hardline_shiites アフガニスタン・イスラム運動"
 HAZ.Neutral_Autocracy: "£AFG_moderate_shiites アフガニスタン・イスラム統一党（左派）"
 HAZ.Neutral_Autocracy_desc: "イスラム民主主義 - アフガニスタン・イスラム統一党は、衰退しつつあったソ連の占領に反対するため、1989年にいくつかの小規模政党が合併して結成された。シーア派イスラム教との類似した結びつきを持ち、イランの支援を受ける政党の連合体「テヘラン8」から派生した同党は、アフガニスタンの政治に影響力を及ぼし、国内のシーア派少数派の権利を擁護するための連合を形成することを目指した。結党以来、同党はアフガニスタンにおける主要な民族集団であるハザラ人の代表としても位置づけられるようになった。同党の「左派」は、新たに樹立されたイスラム政権による迫害を恐れて党に加わった、アフガニスタン国内の左派勢力によって構成されている。彼らは党内で権力をほとんど握っておらず、要職に就くことも許されていないが、彼らの存在によって、イスラム統一党内部により穏健な派閥が出現することとなった。"
 HAZ.Nat_Autocracy: "£generic_Nat_Autocracy_small ハザラ防衛軍"
 HAZ.Nat_Autocracy_desc: "イスラム主義軍事政権 - イランがアフガニスタン内戦に介入したことを受け、イラン革命防衛隊の支援を受けた過激シーア派勢力が、アフガニスタン国内のハザラ族が多数を占める地域を中心に分離独立国家を樹立した。イランへの依存度が高いハザラ防衛軍は、この新国家の実質的な軍事勢力として活動しており、親イラン派の与党勢力と強固な結びつきを持っている。"
 ALG.Western_Autocracy: "£ALG_Western_Autocracy_small （PAR）アルジェリア改革党"
 ALG.Western_Autocracy_icon: "£ALG_Western_Autocracy_small"
 ALG.Western_Autocracy_desc: "親西欧的独裁体制 - アルジェリア刷新党（フランス語：Parti du Renouveau Algérien）\n\n1989年に結成されたアルジェリア刷新党は、国家の復興と近代化を掲げる右派保守政党である。同党は、アルジェリアの主権を強く維持しつつ、西欧諸国との協力を支持する立場をとっている。"
 ALG.conservatism_icon: "£ALG_conservatism_small"
 ALG.liberalism_icon: "£ALG_liberalism_small"
 ALG.socialism_icon: "£ALG_socialist_small"
 ALG.socialism_2012_icon: "£ALG_socialist_2012_small"
 ALG.Conservative_icon: "£ALG_Conservative_small"
 ALG.Caliphate_icon: "£ALG_Caliphate_small"
 ALG_FIS.Caliphate: "£ALG_FIS_Caliphate_small  (FIS) イスラム救国戦線"
 ALG_FIS.Caliphate_icon: "£ALG_FIS_Caliphate_small"
 ALG_FIS.Caliphate_desc: "サラフィー・ジハード主義 - イスラム救国戦線（FIS）\n\n1989年にアッバシ・マダニとアリ・ベルハジによって設立されたFISは、多党制が合法化された後、アルジェリアを代表するイスラム主義政治運動として台頭した。シャリーアの原則に基づくイスラム国家の実現を主張する同党は、モスクや社会ネットワークを通じて草の根レベルで広範な支持を集めた。1991年の議会選挙でFISは圧勝したが、これに対し軍は選挙結果を無効とし、同党を非合法化した。この措置がアルジェリア内戦の引き金となった。同運動は公式には禁止されたものの、そのイデオロギーは1990年代を通じて様々なイスラム主義派閥に影響を与え、現在もアルジェリアの政治的議論に影響を及ぼし続けている。"
 ALG.Caliphate_2006_icon: "£generic_Caliphate_small"
 ALG.Caliphate_2006_desc: "サラフィー・ジハード主義 - イスラム・マグレブ諸国のアルカイダ（アラビア語ローマ字表記：Tanzim al-Qa'ida fi Bilad al-Maghrib al-Islami）\n\n2007年1月、サラフィスト宣教戦闘員グループ（GSPC）がアルカイダと正式に合併して結成されたAQIMは、北アフリカにおける主要なジハード主義組織となった。アルジェリア、マリ、およびより広範なサヘル地域で活動する同組織は、爆破、誘拐、ならびに政府や西側諸国の標的に対する攻撃を実行した。国際的な対テロ作戦によりその能力は著しく低下したが、分派組織が地域全体で引き続き治安上の脅威となっている。"
 ALG.Neutral_Autocracy_icon: "£ALG_Neutral_Autocracy_small"
 ALG.Neutral_conservatism_icon: "£ALG_Neutral_conservatism_small"
 ALG.neutral_Social_icon: "£ALG_neutral_Social_small"
 ALG.Neutral_Communism_icon: "£ALG_Neutral_Communism_small"
 ALG.Nat_Populism_2011: "£ALG_Nat_Populism_2011_small (FJD) 公正発展戦線"
 ALG.Nat_Populism_2011_desc: "右派ポピュリズム - 公正発展戦線（アラビア語ローマ字表記：Al-Jabha lil-'Adala wal-Tanmiyya, FJD） \n\n公正発展党は右派、民族主義、イスラム民主主義を掲げるアルジェリアのイスラム主義政党である。トルコの公正発展党（AKP）に影響を受け、2017年にはエンナハダ党との選挙連合で成功を収め、得票率3.7％を獲得した。"
 ALG.Nat_Populism_2011_icon: "£ALG_Nat_Populism_2011_small"
 ALG.Nat_Populism_icon: "£ALG_Nat_Populism_small"
 ALG.Nat_Populism_alt: "£ALG_Nat_Populism_alt_small （AMF）タマズガ運動"
 ALG.Nat_Populism_alt_desc: "右派ポピュリズム - タマズガ運動（ベルベル語ローマ字表記：Amussu n Tamezya, AMF） \n\nタマズガ運動は、文化の復興、保守的な社会的価値観、そしてタマズガの統一を掲げるアマズィグ系民族主義政党である。北アフリカ全域で伝統と近代化の調和を図る運動に触発され、宗教的アイデンティティとアマズィグとしての誇りを融合させている。"
 ALG.Nat_Populism_alt_icon: "£ALG_Nat_Populism_alt_small"
 ALG.Nat_Fascism_icon: "£ALG_Nat_Fascism_small"
 ALG.Monarchist: "£ALG_Monarchist_small アルジェリア王国"
 ALG.Monarchist_icon: "£ALG_Monarchist_small"
 ALG.Monarchist_desc: "君主制 - アルジェリア王国（アラビア語ローマ字表記：Al-Mamlaka al-Jazairiyya） \n\nこれは、アルジェリアの豊かな歴史的遺産と現代的なアイデンティティの融合を体現するものとなるであろうこの君主制は、ザイヤーン朝とオスマン朝にそのルーツを持ち、伝統的なアラブ・イスラム式の統治と、現代的な立憲君主制の枠組みを融合させたものである。国王、あるいはスルタンは、政治的な象徴的存在として、また国民の団結と国家の誇りの象徴としての役割を果たす。"
 ALG.Nat_Autocracy_icon: "£ALG_Nat_Autocracy_small"
 ALG.Neutral_green: "£ALG_Neutral_green_small （AGP）アルジェリア緑の党"
 ALG.Neutral_green_icon: "£ALG_Neutral_green_small"
 ALG.Neutral_green_desc: "環境保護主義 - アルジェリア緑の党（アラビア語ローマ字表記：Al-Hizb al-Akhdar al-Jazairi, AGP） \n\nアルジェリア緑の党は、持続可能な開発、環境保護、社会正義を重視する小規模な環境保護政党である。アルジェリアにおける環境保護への広範な潮流の一環として結成された。"
 ALG.Neutral_Libertarian: "£ALG_neutral_libertarian_small （RCD）文化民主連合"
 ALG.Neutral_Libertarian_icon: "£ALG_neutral_libertarian_small"
 ALG.Neutral_Libertarian_desc: "自由主義 - 文化民主連合（アラビア語ローマ字表記：Tajammu' lil-Thaqafa wal-Dimuqratiya, RCD） \n\n文化民主連合は厳密なリバタリアン主義とは異なるものの、自由民主主義と政治的自由を提唱しており、特に経済改革や市場への政府介入の縮小を重視している。"
 KBY.socialism: "£KBY_socialism_small カビリア自決運動"
 KBY.socialism_icon: "£KBY_socialism_small"
 KBY.socialism_desc: "民主社会主義 - カビリア自決運動（フランス語：Mouvement pour l'autodétermination de la Kabylie, MAK）\n\n2001年にフェルハット・メヘニによって設立されたカビリア自決運動は、カビリア地域の自決と独立を主張している。アマズィグのアイデンティティ政治と世俗的民主主義の価値観に根ざしたこの運動は、「黒い春」の抗議運動を契機に勢いを増し、以来、カビリア地方で最も有力な分離主義組織となっている。"
 KBY.conservatism: "£generic_conservatism_small カビリアのための集会"
 KBY.conservatism_icon: "£generic_conservatism_small"
 KBY.conservatism_desc: "保守主義 - カビリアのための集会（フランス語：Rassemblement pour la Kabylie, RPK）\n\n地域の自治と伝統的なアマズィグ文化の価値の維持を提唱する、カビリア系の保守的な政治運動。地方分権化された統治と文化的な自治の枠組みの中で、カビリアの利益を促進することを目指している。"
 KBY.Nat_Populism: "£generic_Nat_Populism_small アマズィグ世界会議"
 KBY.Nat_Populism_icon: "£generic_Nat_Populism_small"
 KBY.Nat_Populism_desc: "右派ポピュリズム - アマズィグ世界会議（フランス語：Congrès Mondial Amazigh, CMA）\n\n1995年に設立されたアマズィグ世界会議は、北アフリカ全域のアマズィグ系民族を代表する国際組織である。同組織は、アマズィグ語、文化、および政治的権利の承認を求めて活動しており、国連経済社会理事会において協議資格を有している。"
 KBY.liberalism: "£ALG_neutral_libertarian_small 文化民主連合"
 KBY.liberalism_icon: "£ALG_neutral_libertarian_small"
 KBY.liberalism_desc: "自由主義 - 文化民主連合（フランス語：Rassemblement pour la Culture et la Démocratie, RCD）\n\n1989年にサイード・サディによって設立された文化民主連合は、カビリアに根ざした世俗主義・自由主義政党である。同党は、近代的で多元的なアルジェリア社会において、民主的改革、人権、およびアマズィグ文化・言語の振興を推進している。"
 KBY.Neutral_conservatism: "£generic_Neutral_conservatism_small カビリア警報・予防センター"
 KBY.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 KBY.Neutral_conservatism_desc: "中道イスラム主義 - カビリア警報・予防センター（CAPK）\n\nカビリアにおける地域統治、文化の保存、市民参加に焦点を当てた地域密着型の組織。草の根レベルの動員と、外部からの政治的圧力からカビリア人コミュニティを守ることを重視している。"
 KBY.neutral_Social: "£generic_neutral_Social_small 社会主義勢力戦線"
 KBY.neutral_Social_icon: "£generic_neutral_Social_small"
 KBY.neutral_Social_desc: "民主社会主義 - 社会主義勢力戦線（フランス語：Front des Forces Socialistes, FFS）\n\n1963年にホシン・アイト・アフメドによって設立された社会主義勢力戦線は、アルジェリアで最も歴史のある野党の一つである。主にカビリアを拠点とし、社会民主主義、世俗主義、民主的多元主義を掲げている。同党は不正選挙と判断したいくつかの選挙をボイコットしたが、ベルベル人の政治的代表を求める重要な声としての役割を果たし続けている。"
 KBY.Western_Autocracy: "£generic_Western_Autocracy_small カビリア暫定政府"
 KBY.Western_Autocracy_icon: "£generic_Western_Autocracy_small"
 KBY.Western_Autocracy_desc: "親西側独裁政権 - カビリア暫定政府（フランス語：Gouvernement Provisoire Kabyle, Anavad）\n\n2010年、フェルハト・メヘニによって、カビリア独立運動の政治部門として設立されたカビリア暫定政府は、カビリアの自決権に対する国際的な承認を求めており、アルジェリア中央政府に代わる親西欧的で世俗的な政権として位置づけている。"
 KBY.Autocracy: "£ALG_liberalism_small 民主国民連合"
 KBY.Autocracy_icon: "£ALG_liberalism_small"
 KBY.Autocracy_desc: "左派独裁主義 - 民主国民連合（フランス語：Rassemblement National Démocratique, RND）\n\nアルジェリアの民主国民連合のカビリア支部である同党は、同地域における中央政府の政治的利益を代表する組織である。カビリアにおける与党としての役割を果たしており、アルジェリアの国家機構との結びつきを維持しつつ、地域の自治よりも国家の統一を重視している。"
 KBY.anarchist_communism: "£generic_anarchist_communism_small 社会党"
 KBY.anarchist_communism_icon: "£generic_anarchist_communism_small"
 KBY.anarchist_communism_desc: "無政府共産主義 - 社会党（PS）\n\nカビリアの極左政治組織であり、急進的な社会変革、労働者の自主管理、および階層的な統治体制の廃止を提唱している社会党は、アマズィグの共同体伝統と社会主義理論の両方を基盤とし、集団所有と直接民主主義を推進している。"
 KBY.Neutral_Libertarian: "£generic_Neutral_Libertarian_small CAPカビリア"
 KBY.Neutral_Libertarian_icon: "£generic_Neutral_Libertarian_small"
 KBY.Neutral_Libertarian_desc: "自由主義 - カビリア民衆行動調整委員会（フランス語：Coordination des Actions Populaires Kabylie, CAP Kabylie）\n\nカビリア地方における市民協調運動であり、個人の自由、自由企業、および最小限の国家介入を推進している。この運動は、地域社会を守り、同地域の経済発展を促進しようとする草の根活動から生まれた。"
 KBY.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small ベルベル・アルーシュ市民運動"
 KBY.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 KBY.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - ベルベル・アルーシュ市民運動\n\n伝統的なカビール族の村会議（アルーシュ）にルーツを持つ市民運動であり、アマズィグの文化的アイデンティティと穏健なイスラムの価値観を融合させている。2001年の「黒い春」抗議運動の際に、地域社会の代表機関として、また政治改革と文化的承認を求める運動の拠点として台頭した。"
 JAP.Neutral_conservatism2: "（YP）みんなの党"
 JAP.Neutral_conservatism2_icon: ""
 JAP.Neutral_conservatism2_desc: "新自由主義 - みんなの党\n\nみんなの党は、渡辺喜美らを中心として2009年8月に結成された改革志向の中道右派政党である。創設理念として、国家公務員の削減や給与削減による「官僚支配の打破」、天下りの全面禁止、規制緩和による競争促進や公営事業の民営化などを掲げた。また、地方への税源移譲や道州制導入による「地域主権」、さらに経済成長による雇用創出と社会的セーフティネット構築による「国民生活重視」を主要方針として打ち出した。これらの立場を通じて、日本の主要政党に対抗する第三の勢力としての地位を確立することを目指した。"
 JAP.Neutral_conservatism3: "（POH）希望の党"
 JAP.Neutral_conservatism3_icon: ""
 JAP.Neutral_conservatism3_desc: "改革保守主義 - 希望の党\n\n希望の党は、小池百合子が率いる都民ファーストの会の国政進出という形で、2017年9月に設立された政党である。党綱領では「しがらみ政治からの脱却」を掲げ、規制改革、小さな政府、行政改革を重視する改革路線を打ち出した。政策面では日米同盟を重視する一方、憲法改正や消費税増税の凍結を主張し、全体として親米的かつ改革保守的な性格を持っていた。小池は党の性格を「寛容な改革保守」と位置付け、主要政党に代わる新たな選択肢として支持を集めた。"
 JAP.Neutral_conservatism4: "（DPFP）国民民主党"
 JAP.Neutral_conservatism4_icon: ""
 JAP.Neutral_conservatism4_desc: "改革中道主義 - 国民民主党\n\n国民民主党は、2020年の野党再編後に再結成された政党であり、その前身は2018年5月に旧民進党と旧希望の党の一部の合流によって結成された旧国民民主党である。党綱領では「自由」「共生」「未来への責任」を基本理念として掲げ、自らを穏健保守からリベラルまでを包含する「改革中道政党」と定義している。政治姿勢としては「対決より解決」を掲げ、与野党対立そのものよりも政策提案や問題解決を重視する傾向が強い。経済政策では賃上げ、家計の可処分所得の向上、成長投資を重視し、実務的な改革路線を目指している。外交・安全保障政策では現実的対応を重視しており、時期や党内構成によって政策の重点や党の性格に変化が見られるものの、既存政党に代わる選択肢として中道路線の改革を掲げる勢力として位置付けられている。"
 JAP.Nat_Autocracy2: "£JAP_autocracy_2 (JAF) 日本軍"
 JAP.Nat_Autocracy2_icon: "£JAP_autocracy_2"
 JAP.Nat_Autocracy2_desc: "軍事国家主義 - 日本軍\n\n憲法第9条の撤廃により、日本は憲法上制約された「自衛」モデルから、正規の国家軍事体制へと正式に移行した。従来の自衛隊体制は日本軍へと置き換えられ、主権の防衛、地域的脅威の抑止、そして国家権力の通常の手段として行動する明確な法的権限を持つこととなった。\n\nこの変化により、より広範な戦力構造の整備、より高い即応態勢や調達計画、そして統合された国家防衛ドクトリンの下での指揮・情報・遠征能力の統合が可能となった。政治的な中心的争点は、もはや憲法上の許容性ではなく、日本の再軍備体制の規模、統制、そして戦略的方向性である。"
 JAP.Monarchist2: "£JAP_Monarchist (YAM) 大和朝廷"
 JAP.Monarchist2_icon: "£JAP_Monarchist"
 JAP.Monarchist2_desc: "皇室君主主義 - 大和朝廷\n\n大和朝廷は、皇室制度を主権と国家の連続性の究極的源泉と位置付ける君主主義的政治潮流である。天皇を最高の憲法上の権威へと復帰させ、立法・行政機関の上位に皇位を置き、国家体制を皇権を中心として再編することを目指している。\n\nこの運動は、日常的な政策統治よりも制度的復古を主な目的としている。その綱領は意図的に限定的であり、望ましい憲法体制が実現された後には、通常の政党として長期的に統治する明確な計画を提示していない。むしろ、皇室中心の国家秩序を再確立するための手段として自らを位置付けている。"
 IND.Communist-State: "£generic_Communist_State_small (PKI) インドネシア共産党"
 IND.Communist-State_desc: "毛沢東主義 - インドネシア共産党の起源は、オランダの左翼運動とつながりのあったオランダ領東インドの小規模な政党にあるが、オランダとインドネシア自身の間の対立が、それまでより左寄りの社会民主主義運動であったものを急進的な方向へと転換させたのは、ロシア革命が起きてからのことだった。当初は「インドネシア共産主義同盟」という名称を採り、反植民地運動においてより活発に活動し、インドネシア国内ではソ連式のマルクス・レーニン主義を支持して声を高めたが、その後、その焦点をより中国へと移していった。しかし、1965年のスハルトによるクーデター後、同党は大規模な弾圧に直面し、共産主義および社会主義組織が様々な虐殺や拘禁の主な標的となった。多党制民主主義が復活した後も、同党は他の政党、さらには左派の政党でさえ見られたような復活を遂げることはなく、他の共産主義組織と同様に禁止されたままとなった。"
 IND.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small ラウシャン・フィクル研究所"
 IND.Mod_Vilayat_e_Faqih_desc: "進歩的シーア派イスラム民主主義 - インドネシアにおける反シーア派弾圧や権威主義的な体制を背景に設立されたラウシャン・フィクル研究所およびその関連団体は、「イスラム哲学活動家ネットワーク」やその他のシーア派の哲学・文化団体を通じて、多元主義の実現と提唱に努めている。これらの団体は、会員資格をすべての人に開放しており、明示的にシーア派の組織というわけではないが、組織内部においては依然としてシーア派イスラム教の立場が顕著である。同様の団体と同様、この組織もイラン革命後のシーア派イスラム復興の流れから生まれたが、その指導部は会員に対して特定のシーア派哲学の流派を強制することはない。イデオロギー的には、新自由主義的資本主義や寡頭政治を批判し、社会的・経済的平等の両方を提唱している。"
 IND.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ラウシャン・フィクル研究所（ホメイニ派）"
 IND.Vilayat_e_Faqih_desc: "左派ホメイニ主義 - インドネシアにおける反シーア派弾圧や権威主義的な体制を背景に設立されたラウシャン・フィクル研究所およびその関連団体は、「イスラム哲学活動家ネットワーク」やその他のシーア派の哲学・文化団体を通じて、多元主義の実現と提唱に努めている。これらの団体は、会員資格をすべての人に開放しており、明示的にシーア派の組織というわけではないが、組織内部においては依然としてシーア派イスラム教の立場が顕著である。同様の団体と同様、この組織もイラン革命後のシーア派イスラム復興の流れから生まれたが、その指導部は会員に対して特定のシーア派哲学の流派を強制することはない。イデオロギー的には、新自由主義的資本主義や寡頭政治を批判し、社会的・経済的平等の両方を提唱している。"
 IND.Caliphate: "£generic_Caliphate_small (DI/TII) ダルル・イスラム／インドネシア・イスラム武装勢力"
 IND.Caliphate_desc: "イスラム原理主義  - 1942年のインドネシア独立革命の最中に結成されたDIは、インドネシア国内にイスラム国家を樹立するという明確な目標を掲げ、同国の解放運動に参加した。共和国の勝利と独立に伴い、同組織は新たな国家を標的へと転換し反乱活動を続けたが、1962年に指導者が殺害されたことにより、組織としてのまとまりは事実上解体された。現在も活動は大幅に縮小しているものの、DIのメンバーからなる分派グループが次々と出現し続けている。"
 AFR.Autocracy: "£generic_Autocracy_small 革命統一戦線"
 AFR.Autocracy_desc: "民族主義的独裁体制 - 1980年代に結成された革命統一戦線は、当初、シエラレオネ国内の反体制的な感情に訴えかけるべく、漠然とした左派ポピュリスト的な政策を掲げていた。しかし実際には、同組織は汚職政治と独裁体制へと変質し、最終的には軍事革命評議会と提携して共同統治を行ったが、内戦への外国の介入により政権は倒された。イデオロギー的には、初期の出版物以外には首尾一貫した綱領や政策はほとんどなく、少なくとも名目上は汎アフリカ主義運動に連なるものと自らを位置づけていた。"
 BHR.Vilayat_e_Faqih_1: "£generic_Vilayat_e_Faqih_small バーレーン・イスラム抵抗運動"
 BHR.Vilayat_e_Faqih_desc_1: "ホメイニ主義 - 2013年に結成されたバーレーン・イスラム抵抗運動は、バーレーン国家の暴力的な打倒と、イランをモデルとしたイスラム共和国の樹立を目指す、いくつかのシーア派反政府武装組織から構成されている。この組織の起源は、民主的な政体の樹立を目指した2011年のバーレーン蜂起にあるが、双方による暴力的な弾圧と外国の介入により、抗議運動は鎮圧された。イデオロギー的には、同組織はイラン革命の理想に全面的にコミットしており、イラン政府から資金や物資の提供を受けているとの指摘もある。"
 KAC.Neutral_Autocracy_desc: "実用民族主義 - 1961年にジンポー独立組織として設立されたカチン独立機構は、ミャンマー政府への不満と国内情勢の変遷を背景に誕生した。同組織は、植民地支配後の政府と、1962年の軍事クーデターで権力を掌握したネ・ウィン政権の両方に反対した。同組織は、その武装部門であるカチン独立軍を通じてカチン州の一部の地域を支配下に置き、安全保障と相互防衛のために他の民族グループとの同盟関係を築いてきた。イデオロギー的には名目上は左派寄りであるが、主にカチン民族主義を中核とし、連邦制ミャンマー内での自治、あるいはカチン民族の完全な独立のいずれかを掲げる、幅広い支持層を抱える組織として機能している。"
 KAC.Neutral_Communism: "£generic_Neutral_Communism_small (NDA-K) カチン新民主軍"
 KAC.Neutral_Communism_desc: "民族主義的共産主義 - 1989年にカチン独立機構から分裂したカチン新民主軍は、名目上は共産主義組織であるが、ミャンマーの軍事政権と結託している。曖昧な綱領と掲げる理想以外に明確なイデオロギーをほとんど持たず、カチン州内で政府の影響力を及ぼすことに終始し、自らの影響力を拡大しようと試みてきたに過ぎない。"
 KAR.Neutral_Autocracy_desc: "実用民族主義 - 1947年、翌年のミャンマー独立に先立ち結成されたカレン民族同盟は、1949年に武装部門を通じて新政府に対する反乱活動を開始し、ミャンマーの情勢の変化に伴い、その活動は激化と沈静化を繰り返してきた。内部の分裂や領土的損失に見舞われながらも、同組織は現在も活動を継続しており、親政府派や親カレン派のライバル組織と競合している。イデオロギー的には名目上は左翼であるが、その広範な目標や目的ゆえに、カレン民族主義が主要な立場を占めている。"
 KAR.Neutral_conservatism: "£generic_Neutral_conservatism_small (DKBO) 民主カレン仏教徒協会"
 KAR.Neutral_conservatism_desc: "保守民族主義 - カレン民族同盟（KNU）の内部分裂から生まれた民主カレン仏教徒協会とその軍事部門である民主カレン仏教徒軍は、KNU内に存在すると彼らが主張するキリスト教徒優遇による差別から解放された組織の形成を目指した。結成後、彼らは直ちにKNUとの距離を完全に置く方針を打ち出し、政府への反対姿勢を撤回しつつも、カレン州に対する民族主義的かつはるかに保守的な目標を維持した。"
 LAO.anarchist_communism: "£generic_anarchist_communism_small (LFND) ラオス国家発展戦線"
 LAO.anarchist_communism_desc: "人民戦線 - 1979年に設立されたラオス国家発展戦線は、社会主義政党であるラオス人民革命党傘下の人民戦線組織であり、様々な小規模団体や大衆組織を結集することを目的としている。同戦線は、様々な労働組合、宗教団体、その他の小規模組織の調整役を果たすとともに、ラオスの現行体制下における政治参加の手段を提供している。同戦線はラオス人民革命党によって率いられており、同党が戦線内で支配的な地位を維持している。"
 SYR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small シリア・イスラム抵抗戦線"
 SYR.Vilayat_e_Faqih_desc: "ホメイニ主義 - シリア国内の反体制派に対抗するために結成されたシリア・イスラム抵抗戦線は、過激かつ武装したシーア派の民兵組織であり、シリアにおける「イスラエルの占領」への抵抗、および国内における西側の利益に好意的と見なされる動きへの反対を公然とした目標としている。同組織はイランの支援を受けているとされ、同盟組織であるヒズボラやその他の親イラン系グループと共に「抵抗の枢軸」の一員となっている。イデオロギー的には主にシーア派イスラム主義の影響を受けているが、イランとの密接な関係が、その立場、目的、組織体制に多大な影響を与えている。"
 ALG.Communist-State: "£generic_Communist_State_small （PADS） アルジェリア民主主義と社会主義のための党"
 ALG.Communist-State_desc: "マルクス・レーニン主義 - 1993年に共産党の事実上の後継組織である民主社会運動（MDS）から分裂したアルジェリア民主主義と社会主義のための党は、マルクス・レーニン主義を党の指導的イデオロギーとして維持することを目的として結成された。MDSがより穏健な路線へと移行する中、より急進的なメンバーたちはアブデルハミド・ベンジンの下で結集した。同党自体はMDS運動ほど成功を収めていないものの、現在も活動を続けており、世界中の他の共産党との関係を維持している。"
 NKO.Neutral_Communism: "£generic_Neutral_Communism_small （DFRK）祖国統一民主主義戦線"
 NKO.Neutral_Communism_desc: "人民戦線 - 1949年に朝鮮労働党の旗印の下、いくつかの大衆組織、団体、労働組合、および小規模政党を統合して、事実上の朝鮮民主主義人民共和国人民戦線として設立された祖国統一民主主義戦線は、DFRKは、朝鮮労働党が主導する単一の統一された共産主義体制の下で、大韓民国と朝鮮民主主義人民共和国を組織し、その平和的統一を目指すことを目的として設立された。当初は韓国と北朝鮮の両方の団体で構成されていたが、朝鮮労働党の支配力と、その超国家主義的な主体思想により、現在では主に朝鮮労働党が支配と影響力を強固にするための手段として存在している。"
 SWE.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small (HAYI) ハラカート・アシャブ・アル＝ヤミン・アル＝イスラミヤ"
 SWE.Vilayat_e_Faqih_desc: "ホメイニ主義 - ハラカート・アシャブ・アル＝ヤミン・アル＝イスラミヤ（右手の民のイスラム運動）は、ヨーロッパ全域で活動し、同地域でメンバーを募っているとされるシーア派の過激派組織である。2026年頃に設立されたとされるこの組織は、イラン革命防衛隊と広範なつながりを持つとされ、主にヨーロッパにおけるイランの代理組織として機能している。イデオロギー的にはホメイニ主義を掲げているが、その活動の多くは政治的というよりは過激派的な性質のものだ。"
 SWE.Nat_Autocracy_desc: "実用的軍事政権 - スウェーデン軍は1971年に現在の組織体制と枠組みを確立したが、その歴史は1521年に遡る。スウェーデン軍は、その歴史を通じて、主にスウェーデン帝国が存在していた時代に、数々の戦争、戦闘、および内戦に関与してきた。現代において、スウェーデンは軍事的な関与をほとんど行っておらず、比較的政治色のない軍を維持してきた。両世界大戦中は中立を保ち、冷戦期には防衛態勢のみを維持していた。冷戦後の時代においても、軍は一定の備えを維持し続け、海外では国連などの組織と協力している。"
 SWE.Monarchist_desc: "立憲君主制 - ベルナドッテ家は、1818年にカール14世ヨハンによって創設され、当初は1905年までスウェーデンとノルウェーの共同統治家系として君臨した。同家系の起源はフランスにあり、カール14世はフランス革命期にフランス元帥を務めた後、最終的に反ナポレオン同盟に加わった。以前の王朝は、選挙君主制の時代を含め、スウェーデンにおいて様々な程度の権力を有していたが、ベルナドット家の統治は主に立憲主義的な性格を帯びており、1800年代に王室と議会との間で繰り広げられた権力闘争は、最終的に他のヨーロッパの君主制と同様の両者の権力均衡をもたらした。"
 ADJ.Autocracy: "£generic_Autocracy_small 復興のための民主連合"
 ADJ.Autocracy_desc: "ポピュリスト的独裁体制 - 1992年にアスラン・アバシゼによって「ジョージア復興のためのアジャリア連合」という名称で設立された「復興のための民主連合」は、アジャリア地方における地域主義政党として活動しており、その政策や綱領は創設者を中心に据えたものである。同党は、名目上はポピュリスト的かつ国家主導型の経済政策とロシアとの緊密な関係を提唱しており、創設者のアバシゼは自身のコネや影響力、そしてアジャリア独自の経済的利益を活用して、地域全体のさらなる独立を推進している。"
 JUB.Western_Autocracy: "£generic_Nat_Autocracy_small (ASF) ソマリア連合軍 - §C親西側派§!"
 JUB.Western_Autocracy_1: "£generic_Nat_Autocracy_small (JVA) ジュバ渓谷同盟 - §C親西側派§!"
 GRN.conservatism: "£generic_conservatism_small (ATT) 連帯党"
 GRN.conservatism_icon: "£generic_conservatism_small"
 GRN.conservatism_desc: "古典的自由主義 - 連帯党（グリーンランド語：Atassut、デンマーク語：Atassut, ATT）\n\n連帯党（アタスット党、「絆」または「共同体意識」の意）は、1970年代後半、当時支配的だった進歩党に対抗する政党として結成された。当初は自治権の推進を掲げつつもデンマーク王室との統合を支持する政党と見なされていたが、その後、よりリベラルな方向へと移行した。同党は、公営企業の民営化、ある種のベーシックインカム、NATOとの協力、およびグリーンランドの欧州連合加盟を支持している。一方で、そのリベラルな志向から、一次産業の中核となる事業への補助金支援も支持している。"
 GRN.liberalism: "£generic_liberalism_small (D) 民主党"
 GRN.liberalism_icon: "£generic_liberalism_small"
 GRN.liberalism_desc: "社会自由主義 - 民主党（グリーンランド語：Demokraatit、デンマーク語：Demokraterne, D）\n\n2002年に結成された民主党は、社会自由主義政党と見なされている。同党の政治的立場を特徴づけるのは、グリーンランドが自給自足を確立できて初めて独立を目指すべきだという主張であり、この姿勢は、より直接的な独立の道を支持する主要な政敵とは一線を画している。"
 GRN.socialism: "£generic_socialism_small (S) 進歩党"
 GRN.socialism_icon: "£generic_socialism_small"
 GRN.socialism_desc: "社会民主主義 - 進歩党 （グリーンランド語：Siumut、デンマーク語：Siumut, S）\n\n進歩党（シウムート党、「前進」の意）は1977年に結成され、社会主義インターナショナルのオブザーバー資格を有している。その政治的立場は概ねデンマーク社会民主党と一致しており、グリーンランドが自治権を獲得して以来、同国の政界において主要政党の一つとなっている。"
 GRN.Neutral_conservatism: "£generic_Neutral_conservatism_small (PP) 極地党"
 GRN.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 GRN.Neutral_conservatism_desc: "国民保守主義 - 極地党（グリーンランド語：Nunatta Qitornai、デンマーク語：Polartpartiet, PP）\n\n1980年代初頭に結成された極地党は、伝統的保守主義かつ独立支持を掲げる政党であった。1987年の選挙後は不振に陥ったものの、1991年には唯一の議席を維持した。1995年にその議席を失い、グリーンランド政界における一過性の存在となった。多くの人は同党がその後解散したと見なしているが、依然として伝統的な保守的見解を心に抱き続けている人々もいる。"
 GRN.oligarchism: "£generic_oligarchism_small (Q) クッレ"
 GRN.oligarchism_icon: "£generic_oligarchism_small"
 GRN.oligarchism_desc: "寡頭政治 - クッレ（グリーンランド語：Qulleq、デンマーク語：Qulleq, Q）\n\nイヌイットの伝統的なオイルランプにちなんで名付けられたクッレ党は、断固とした即時独立を掲げるとともに、同島からの石油採掘を強く推進する政党である。同党がこれらの目標を具体的にどのように達成しようとしているのか、多くの人が不透明さを感じているが、支持者たちは、今こそ断固たる行動を起こし、グリーンランドの新たな道を切り開く時だと主張している。"
 GRN.neutral_Social: "£generic_neutral_Social_small (IA) イヌイット友愛党"
 GRN.neutral_Social_icon: "£generic_neutral_Social_small"
 GRN.neutral_Social_desc: "市場社会主義 - イヌイット友愛党（グリーンランド語：Inuit Ataqatigiit、デンマーク語：Inuit Ataqatigiit, IA）\n\nイヌイット友愛党（イヌイット・アタカティギット、「人民の共同体」の意）は、1970年代にデンマークを席巻した若者の急進主義を背景に、1978年に結成された。1982年、同党はグリーンランドを欧州経済共同体から脱退させるための運動を成功させた。グリーンランドの独立を強く主張しており、その政治的傾向は左派ナショナリストと広く見なされている。同党は市場社会主義を支持しており、より社会主義的な国内経済を追求する一方で、独立したグリーンランドは国際的な競争力を維持しなければならないと主張している。"
 GRN.Nat_Populism: "£generic_Nat_Populism_small (N) ナレラク"
 GRN.Nat_Populism_icon: "£generic_Nat_Populism_small"
 GRN.Nat_Populism_desc: "国家ポピュリズム - ナレラク（グリーンランド語：Naleraq、デンマーク語：Naleraq, N）\n\n英語では「Point of Orientation（指針）」として知られるナレラクは、より積極的なアプローチを通じてグリーンランドの独立を推進しようとしている。党員たちは自らの政治的立場を中道から中道右派と位置付けているが、同党の最大の特徴は、強いポピュリズムと親グリーンランド的なナショナリズムにある。多くの人々は、この党を独立推進の原動力と見なしており、近い将来に独立を実現することを望むグリーンランド人の割合は増加の一途をたどっている。"
 GRN.Nat_Autocracy: "£generic_Nat_Autocracy_small (GMM) グリーンランド民兵運動"
 GRN.Nat_Autocracy_icon: "£generic_Nat_Autocracy_small"
 GRN.Nat_Autocracy_desc: "国家独裁 - グリーンランド民兵運動（グリーンランド語：Kalaallit Militsiat Kissaatigineqarsinnaasumik Isigineqarsinnaasumillu Nalunaarusiassarsiorneq、デンマーク語：Grønlandsk Militsbevægelse, GMM）\n\nGMMは、グリーンランドの市民が、外国勢力と結託した当局を含む外国の侵略者から祖国を守れるべきだという信念によって結ばれた、個人や小規模なグループからなる極めて緩やかなネットワークである。独立を確保するために公然と暴力を行使することを主張する者はいないが、この分断された運動の内部には、要請があれば国のために武器を執ると信じている者が多く存在する。しかし、大部分のメンバーは、単に自分たちの活動を補完する正式なグリーンランド軍が存在することを望んでいるに過ぎない。"
 GRN.Greenland_Armed_Services_Created: "£generic_Nat_Autocracy_small (ASG) グリーンランド軍"
 GRN.Greenland_Armed_Services_Created_desc: "国家独裁 - グリーンランド軍（グリーンランド語：Kalaallit Nunanni Nunaminnik Illiorfigeqatigiissitsisoqataanissarsinnaajumallugit、デンマーク語：Grønlands Forsvar, ASG）\n\n独立が確立され、国家政府が国家のあらゆる側面を担うようになった今、グリーンランド軍を創設する時が来た。ほぼゼロからの組織構築を余儀なくされているにもかかわらず、新設された軍隊とそれを支える国民は、現在の規模にかかわらず、国が誇りを持てる軍隊を築き上げるべく、学び、成長し、鍛え上げることに尽力している。"
 GRN.Monarchist: "£generic_Monarchist_small (HKN) カラーリット・ヌナート家"
 GRN.Monarchist_icon: "£generic_Monarchist_small"
 GRN.Monarchist_desc: "立憲君主制 - カラーリット・ヌナート家（グリーンランド語：Nunani Kalaallit Nunaanni、デンマーク語：Huset Grønland, HKN）\n\n「グリーンランド家」を意味するこの少数派の君主制支持政党には、主に2つの思想的潮流が存在する。一派は、グリーンランド王室がデンマーク王室のパートナーとなる形で、公国としてデンマークの主権下に留まることを目指している。もう一派は、デンマークが誇る立憲君主制を強く参考にした、グリーンランド王国の樹立に向けた完全な独立を求めている。多くの人はこの党をマイナーな運動として軽視しているが、どちらの構想も島の開発にとってより首尾一貫した枠組みを提供できるのではないかと考える者もいる。"
 JUB.Western_Autocracy_desc: "実用的専制主義 - ソマリア連合軍は、1999年にソマリア国内情勢の悪化を背景にジュバランド地域にて台頭し、地元の軍閥指導者モハメド・サイド・ヘルシ・モルガンに対抗して活動した。同組織は主にマレハン氏族から支持を得ており、ソマリア国民戦線など、マレハン氏族が主導する他の組織とも一定のつながりを持っている。"
 JUB.Western_Autocracy_1_desc: "実用的専制主義 - ソマリア連合軍から派生したジュバ渓谷同盟は、バレ・アダン・シレ・ヒラーレを中心に結成された。この組織は全体としてマレハン氏族が主導しており、ソマリアの国家政府樹立を支持し、ジュバランド地域内の地方軍閥やイスラム主義勢力と敵対している。"
 TML.anarchist_communism: "£generic_anarchist_communism_small （LTTE）タミル・イーラム解放のトラ"
 NRY.conservatism: "£NRY_conservatism_small Right"
 NRY.conservatism_icon: "£NRY_conservatism_small"
 NRY.conservatism_desc: "Conservatives - Høyre (Right) is Norway's predominant conservative party. They work towards economic liberalization and decreased taxes. They are in favor of joining the EU and have historically been pro-American."
 NRY.liberalism: "£NRY_liberalism_small Left"
 NRY.liberalism_icon: "£NRY_liberalism_small"
 NRY.liberalism_desc: "Liberal - Venstre (Left) is Norway's oldest party, and have always promoted liberal rights as well as education, the environment and culture."
 NRY.socialism: "£NRY_socialism_small Worker's Party"
 NRY.socialism_icon: "£NRY_socialism_small"
 NRY.socialism_desc: "Social Democrat - Arbeiderpartiet (Worker's Party) has it's roots as a communist party, but gained popularity by becoming a social democrat party. For nearly all post-WW2 history, they were the by far largest party and guided Norway's societal development. They see themselves as the defender of the welfare state, and are pro-EU and NATO."
 NRY.Western_Autocracy: ""
 NRY.Western_Autocracy_desc: ""
 NRY.Communist-State: "£NRY_Communist_State_small Communist Party of Norway"
 NRY.Communist-State_icon: "£NRY_Communist_State_small"
 NRY.Communist-State_desc: "Communist - Norges Kommunistiske Parti (Communist Party of Norway) is a stalinist communist party. They emerged very popular after WW2 by leading the resistance against Nazi occupation. However they quickly faded from popularity and have since been largely irrelevant."
 NRY.anarchist_communism: "£NRY_anarchist_communism_small Red"
 NRY.anarchist_communism_icon: "£NRY_anarchist_communism_small"
 NRY.anarchist_communism_desc: "Left-Wing Radical - Rødt (Red) was formed as a merger between two Marxist-Leninist and Maoist parties. They have since abandoned outright communism and now favor a more democratic socialist path. They wish to end capitalism and to withdraw from NATO."
 NRY.Conservative: "£generic_Conservative_small Climate Realists"
 NRY.Conservative_icon: "£generic_Conservative_small"
 NRY.Conservative_desc: ""
 NRY.Caliphate: "£generic_Caliphate_small Profetens Ummah"
 NRY.Caliphate_icon: "£generic_Caliphate_small"
 NRY.Caliphate_desc: ""
 NRY.Neutral_conservatism: "£NRY_Neutral_conservatism_small Christian People's Party"
 NRY.Neutral_conservatism_icon: "£NRY_Neutral_conservatism_small"
 NRY.Neutral_conservatism_desc: "Conservative - Kristelig Folkeparti (Christian People's Party) is a center-right christian party. They want the state to promote christianity as the official religion. In foreign policy they wish to promote peace and favor increased aid to poor countries."
 NRY.oligarchism: "£NRY_oligarchism_small Centre Party"
 NRY.oligarchism_icon: "£NRY_oligarchism_small"
 NRY.oligarchism_desc: "Farmer's Party - Senterpartiet (Centre Party) is a largely a rural party. They are eurosceptic and dislike free trade. They work towards reversing centralization and wish to increase agricultural subsidies."
 NRY.neutral_Social: "£NRY_neutral_Social_small Socialist Left-Party"
 NRY.neutral_Social_icon: "£NRY_neutral_Social_small"
 NRY.neutral_Social_desc: "Socialist Democrat - Sosialistisk Venstreparti (Socialist Left-Party) was formed as a breakout faction from Arbeiderpartiet as they wished to end NATO membership. They are more leftist than Arbeiderpartiet and champion feminism, welfare, environmentalism and state capitalism."
 NRY.Neutral_Libertarian: "£NRY_Neutral_Libertarian_small The Libertarians"
 NRY.Neutral_Libertarian_icon: "£NRY_Neutral_Libertarian_small"
 NRY.Neutral_Libertarian_desc: "Libertarian - Liberalistene (The Libertarians) is a fairly new libertarian party who champion the end of taxation, cutting welfare and reducing state power."
 NRY.Neutral_green: "£NRY_Neutral_green_small The Environmental Green Party"
 NRY.Neutral_green_icon: "£NRY_Neutral_green_small"
 NRY.Neutral_green_desc: "Greens - Miljøpartiet De Grønne (The Environmental Green Party) was formed after inspiration from the electorial gains of the German Green Party and their primary cause is environmentalism."
 NRY.Nat_Fascism2: "£NRY_Nat_Fascism_small The Alliance"
 NRY.Nat_Fascism2_icon: "£NRY_Nat_Fascism_small"
 NRY.Nat_Fascism2_desc: "Fascist - Alliansen (The Alliance) was formed as a attempt at a broad front against the European Common Marked and the free movement of labor, but it's main influx was from far-right personalities who wish to end all immigration. They are anti-islam and often incite racial hatred."
 NRY.Nat_Fascism: "£NRY_vigrid_small Vigrid"
 NRY.Nat_Fascism_icon: "£NRY_vigrid_small"
 NRY.Nat_Fascism_desc: "Fascist - Vigrid (From old Norse Vígríðr, relating to Ragnarok) is a Neo-Nazi party and movement that promotes the heathen Norse religion. They are white supremacists that dispute the Holocaust and idolize Hitler."
 NRY.Nat_Populism: "£NRY_Nat_Populism_small Progress Party"
 NRY.Nat_Populism_icon: "£NRY_Nat_Populism_small"
 NRY.Nat_Populism_desc: "Right-wing Populist - Fremskrittspartiet is at it's core a populist party. They favor largely ending immigration, especially from muslim countries. They are for a strong state and military, and have championed increased public spending on highways, elderly and health."
 NRY.Monarchist: "£NRY_nationalist_monarchist House of Glücksburg"
 NRY.Monarchist_icon: "£NRY_nationalist_monarchist"
 NRY.Monarchist_desc: ""