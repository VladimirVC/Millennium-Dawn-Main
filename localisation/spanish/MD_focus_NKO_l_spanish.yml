 korea.50.t: "La unificación de Corea finalmente se ha logrado."
 korea.50.d: "Tras años de división, Corea finalmente ha logrado la unificación, marcando un momento histórico en la historia mundial. El Norte y el Sur, antes separados, se han unido, superando décadas de diferencias políticas, económicas y culturales para formar una sola nación unida. Este acontecimiento trascendental marca una nueva era de paz, cooperación y prosperidad para el pueblo coreano, transformando el panorama geopolítico de Asia Oriental y del mundo."
 korea.50.a: "¡¡¡Hurrraaaaaa!!!"
 korea.51.t: "Construir más granjas"
 korea.51.d: "Corea no puede ser grande sin el pueblo coreano. Debemos centrarnos en resolver la hambruna lo más rápido posible."
 korea.51.a: "Agricultura en Pionyang"
 korea.51.b: "Agricultura en Hwanghae"
 korea.51.c: "Agricultura en Chagang"
 korea.51.e: "Agricultura en Hamgyong"
 korea.52.t: "Mejorar nuestros centros de suministro deficientes"
 korea.52.d: "Nuestro gran líder proporcionó fondos para construir más vías ferroviarias y un centro de suministro y nos dejó la opción de centrarnos en nuestras ambiciones de zona económica o preparar la logística para la guerra."
 korea.52.a: "Suministrar al lado coreano"
 korea.52.b: "Abastecer la futura zona económica"
