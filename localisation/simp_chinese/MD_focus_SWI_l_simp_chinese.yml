 SWI_the_bank_of_the_world: "世界银行"
 SWI_the_bank_of_the_world_desc: "瑞士的银行保密制度使苏黎世和日内瓦成为世界金融中心。应该正式确立这一角色，让外国资本落户于此，而不是伦敦或法兰克福。"
 SWI_strengthening_swiss_cooperation: "加强瑞士合作"
 SWI_strengthening_swiss_cooperation_desc: "联合演习、共同的理论和标准化的装备将瑞士民兵与其新的联盟伙伴紧密联系在一起。"
 SWI_bastion_of_democracy: "民主堡垒"
 SWI_bastion_of_democracy_desc: "中立从来都不是漠不关心。瑞士就是自治的典范，这一点它毫不含糊地表明了。"
 SWI_eu_investments: "欧洲投资"
 SWI_eu_investments_desc: "瑞士资本流入单一市场。我们的银行支撑着欧洲经济增长，而欧洲经济增长也支撑着我们的银行。"
 SWI_on_our_own_path: "我们自己的道路"
 SWI_on_our_own_path_desc: "欧盟只是众多客户之一。瑞士金融体系服务于所有付款方，并且只对伯尔尼负责。"
 SWI_staple_of_democracy: "民主的基石"
 SWI_staple_of_democracy_desc: "西方资本之所以选择在我们这里开银行，是因为我们的制度具有可预测性。这种可预测性本身就是一种输出。"
 SWI_eu_candidacy: "欧盟候选资格"
 SWI_eu_candidacy_desc: "伯尔尼向布鲁塞尔提交正式申请。加入欧盟将结束目前双边关系的碎片化局面，使瑞士正式加入这个它几十年来一直向往的联盟。"
 SWI_eu_candidacy_tt: "瑞士成为§Y欧盟候选国§!"
 SWI_friend_for_all: "所有人的朋友"
 SWI_friend_for_all_desc: "瑞士不加入任何集团，不结盟，也没有永远的朋友。瑞士向所有国家提供斡旋，并赢得了所有国家的信任。"
 SWI_trust_in_the_eu: "信任欧盟"
 SWI_trust_in_the_eu_desc: "候选资格并不等同于成员资格。在入盟投票前，深化与成员国的合作才能真正体现瑞士的承诺。"
 SWI_trust_in_the_eu_tt: "每个§Y欧盟成员国§!对瑞士的关系值增加§G+30§!"
 SWI_swiss_independence: "瑞士独立"
 SWI_swiss_independence_desc: "外国游说团体在伯尔尼已经站稳脚跟。他们的影响力正在减弱，国内机构重新掌控局面。"
 SWI_mutual_defence_training: "共同防御训练"
 SWI_mutual_defence_training_desc: "阿尔卑斯作战学校向欧洲伙伴开放。他们的士兵学习我们的山脉，我们的民兵学习与他们并肩作战。"
 SWI_invest_in_eu: "投资欧盟"
 SWI_invest_in_eu_desc: "瑞士养老基金和银行直接持有欧洲工业的股份，将经济实力转化为政治地位。"
 SWI_national_investments: "国家投资"
 SWI_national_investments_desc: "原本会流向国外的资金转向国内，投入瑞士的基础设施、瑞士的工业和瑞士的研究。"
 SWI_defence_training_in_the_alps: "阿尔卑斯山国防训练"
 SWI_defence_training_in_the_alps_desc: "每名新兵都要熟悉自己将要守卫的阵地。复训课程会训练民兵在他们被指派驻守的山谷中进行实战演练。"
 SWI_european_defence: "欧洲防务"
 SWI_european_defence_desc: "一个共同的欧洲防务框架正在形成，瑞士的工程技术和瑞士的中立性处于其核心地位，而不是边缘地位。"
 SWI_swiss_banking: "瑞士银行业"
 SWI_swiss_banking_desc: "我们的银行业规模已经远远超过了它们所命名的国家。应该整合这个行业，让它按照它应有的规模运作。"
 SWI_swiss_banking_two: "世界金库"
 SWI_swiss_banking_two_desc: "来自世界各大洲的存款纷至沓来。瑞士不再与世界金融中心竞争，而是成为它们存放储备金的地方。"
 SWI_last_man_standing: "战至一兵一卒"
 SWI_last_man_standing_desc: "学说预设了最坏的情况：所有的道路都被切断，所有的盟友都已逝去。民兵接受的训练是无论如何都要继续战斗。"
 SWI_environment: "环境研究"
 SWI_swiss_neutrality: "瑞士中立"
 SWI_protect_alps: "阿尔卑斯保护者"
 SWI_protect_alps_desc: "阿尔卑斯山并非风景。联邦政府对高山山谷的保护，使这片地形得以保存，六个世纪以来，它一直阻挡着入侵者的脚步。"
 SWI_Expanding_nuclear_research_desc: "瑞士的反应堆应用已超越发电领域。联邦研究所的研究项目正致力于燃料循环和材料科学的研究。"
 SWI_Expanding_nuclear_research1_desc: "核计划日趋成熟。瑞士实验室目前开展的工作已接近民用研究的极限。"
 swiss_political_system4: "瑞士的政治制度"
 swiss_political_system4_desc: "权力下放至各州。伯尔尼采取协调而非发号施令的方式，地方政府可以自行决定哪些事项。联邦决策速度放缓，但建设和行政管理要对承受后果的人民负责。"
 SWI_milita: "武装民兵"
 SWI_milita_desc: "公民军队既是武装的，也是政治的。服役既是学习枪械的学校，也是学习国家知识的学校。"
 SWI_multilingual_workers: "多语种工人"
 SWI_multilingual_workers_desc: "德国、法国、意大利和罗曼什语的工人们跨越了长期以来分裂瑞士劳动力的语言界限，组织起来。"
 SWI_propaganda_idea: "国家宣传"
 SWI_propaganda_idea_desc: "联邦新闻办公室不再传递信息，而是开始进行游说。广播、报纸和学校课程都在传递同样的信息。"
 SWI_true_neutral: "真正的中立"
 SWI_true_neutral_desc: "既非武装中立，也非善意中立。瑞士不选边站队，不驻扎任何军事基地，也不签署任何保证协议。"
 SWI_sig_sauer_ag: "西格绍尔"
 SWI_sig_sauer_ag_desc: "诺伊豪森工厂为民兵提供武器。每个拥有制式步枪的瑞士家庭都拥有一支西格公司生产的步枪。"
 SWI_rheinmetall_cooperation: "莱茵金属合作"
 SWI_rheinmetall_cooperation_desc: "位于苏黎世的莱茵金属防空公司（厄利孔公司的继承者）将瑞士的枪炮和雷达制造与德国最大的武器公司联系起来。"
 SWI_thales_cooperation: "泰雷兹合作"
 SWI_thales_cooperation_desc: "泰雷兹瑞士公司提供雷达、光电设备和指挥系统，使民兵组织转变为网络化部队。"
 SWI_local_production1: "本地生产"
 SWI_local_production1_desc: "从国外购买的武器可能会被禁运，而图恩制造的武器则不会。国内生产线可以接管基本武器的生产。"
 SWI_local_production2: "本地生产 - 扩大规模"
 SWI_local_production2_desc: "目前国内产业已涵盖全部库存，曾经流出国外的资金也留在了国内。"
 SWI_swiss_mercenaries_2: "瑞士雇佣兵 - 扩展版"
 SWI_swiss_mercenaries_2_desc: "旧有的贸易模式大规模回归。瑞士士兵为外国军需官效力，他们的薪水则回到家乡。"
 SWI_swiss_peacekeepers: "瑞士维和部队"
 SWI_swiss_peacekeepers_desc: "蓝盔白十字。瑞士军队部署在无人怀疑其立场的地方。"
 SWI_swiss_peacekeepers_2: "瑞士维和部队 - 扩展"
 SWI_swiss_peacekeepers_2_desc: "瑞士成为安理会的首选成员国，派出的是正式代表团而不是观察员。"
 SWI_strengthened_swiss_cooperation: "加强瑞士合作"
 SWI_strengthened_swiss_cooperation_desc: "联盟伙伴按照瑞士山地标准进行训练，瑞士工作人员在联盟总部任职。"
 SWI_defence_training: "阿尔卑斯山防御训练"
 SWI_defence_training_desc: "欧洲部队轮流到瑞士山地学校接受训练，离开时更擅长在地面上作战。"
 SWI_investment_in_eu: "投资欧盟"
 SWI_investment_in_eu_desc: "瑞士资金为欧洲工业提供担保，从而在制定欧盟经济政策的理事会中获得影响力。"
 SWI_bank_of_the_world_desc: "外国存款最终都会流入瑞士金库，而瑞士人的谨慎态度则确保了这些存款不会流失。"
 SWI_bank_of_the_world_2_desc: "欧盟的资金通过苏黎世流通。瑞士银行业成为欧洲的基础设施。"
 SWI_bank_of_the_world_3_desc: "瑞士银行不结盟，也不受外界干扰，它们接受大国不愿触碰的存款。"
 SWI_bank_of_the_world_4: "世界银行"
 SWI_bank_of_the_world_4_desc: "欧洲和全球资本都聚集于此。法郎是最后的避险货币。"
 SWI_bank_of_the_world_5: "世界银行"
 SWI_bank_of_the_world_5_desc: "独立性和规模兼备。瑞士银行服务于所有人，且不欠任何人任何债务。"
 SWI_bank_of_the_west_2_desc: "西方资本集中在瑞士人手中，西方各国政府都在关注谁掌握着这些资本。"
 SWI_bank_of_the_west_3_desc: "苏黎世决定着西方借贷的条件。这种关系已经悄然逆转。"
 SWI_pilatus_aircraft_manufacturer_trainer_header: "教练机"
 SWI_pilatus_aircraft_manufacturer_attack_header: "轻型攻击"
 SWI_pilatus_aircraft_manufacturer_utility_header: "多用途和运输机"
 switzerland.18.t: "北约问题"
 switzerland.18.desc: "加入议定书已摆在联邦委员会的桌子上。签署这些议定书将终结一项比欧洲所有帝国都持续更久的武装中立政策。"
 switzerland.18.a: "签署协议。"
 switzerland.18.b: "中立立场不容谈判。"
 switzerland.22.t: "我们在欧洲的地位"
 switzerland.22.desc: "布鲁塞尔方面提出更深入的贸易准入，但条件是瑞士的法规必须与欧盟法律接轨。各州意见不一。"
 switzerland.22.a: "加深与欧盟的关系"
 switzerland.22.b: "与所有人平等交易。"
 switzerland.23.t: "瑞士提议"
 switzerland.23.desc: "伯尔尼提议公国加入阿尔卑斯联邦。列支敦士登已经使用法郎，并且与我们同属关税同盟。剩下的就是王室头衔了。"
 switzerland.23.a: "接受联盟"
 switzerland.23.b: "公国继续独行。"
 switzerland.24.t: "列支敦士登加入"
 switzerland.24.desc: "瓦杜兹同意了。该公国正式加入联邦，成为正式成员，阿尔卑斯山脉最后一块独立飞地就此消失。"
 switzerland.24.a: "阿尔卑斯山完整了"
 switzerland.25.t: "列支敦士登拒绝"
 switzerland.25.desc: "王子已拒绝。瓦杜兹将保留其王位、议会和独立地位，无论多么渺小。"
 switzerland.25.a: "就这样吧。"
 switzerland.26.t: "阿尔卑斯最后通牒"
 switzerland.26.desc: "伯尔尼发出最后通牒：列支敦士登公国必须加入阿尔卑斯联邦，尽可能通过协议，必要时则诉诸武力。瑞士军队正在从未需要防守的边境集结。列支敦士登议会现在必须决定，是屈服还是对抗其邻国。"
 switzerland.26.a: "我们不能与瑞士对抗。"
 switzerland.26.b: "公国绝不屈服！"
 SWI_Heer_modifier: "瑞士陆军"
 SWI_Heer_modifier_desc: "瑞士军队是一支建立在普遍征兵制基础上的民兵部队，公民在家中保留步枪，并将山地视为第一道防线。它没有一支规模可观的常备野战军，而是依靠快速动员、预先准备的爆破设施和设防的高山地形。"
 SWI_Schweizerische_Luftwaffe_modifier: "瑞士空军"
 SWI_Schweizerische_Luftwaffe_modifier_desc: "瑞士空军存在的目的是守卫瑞士联邦上空的领空，除此之外，别无他物。其飞机从坚固的高山基地和洞穴机库起飞，主要任务是拦截和空中巡逻，而非力量投射。"
 SWI_Military_Industry_modifier: "瑞士军火工业"
 SWI_Military_Industry_modifier_desc: "瑞士的武器生产规模虽小，但精度极高，且高度独立。像鲁格、莫瓦格和西格绍尔这样的公司为民兵提供武器并出口到国外，支撑着一个远超瑞士国土面积的国防工业基础。"