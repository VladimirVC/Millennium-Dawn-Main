 GRAND_DOCTRINE_LOCAL_AIRSPACE_DEFENCE: "本地空域保卫"
 GRAND_DOCTRINE_AIR_SUPREMACY: "空中优势"
 GRAND_DOCTRINE_MIXED_ROLE: "多用途"
 GRAND_DOCTRINE_COMBINED_ARMS: "联合部队"
 GRAND_DOCTRINE_SHOCK_AND_AWE: "震慑行动"
 GRAND_DOCTRINE_SHOCK_AND_AWE_DESC: "该主要学说以快速集中运用战斗力为中心组织地面作战，旨在达成决定性作战效果。“震慑”理念强调作战节奏、战场支配与协同用兵。"
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH: "纵深防御"
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH_DESC: "该主要学说通过层层部署和纵深兵力运用，构建了陆地防御体系。纵深防御理念强调持续的防御协同和对作战空间的控制。"
 GRAND_DOCTRINE_MISSION_COMMAND: "任务指挥部"
 GRAND_DOCTRINE_MISSION_COMMAND_DESC: "该主要学说以“意图清晰、目标明确”为指导，通过授权指挥的方式构建地面力量体系。“任务式指挥”理念强调各层级的主动协同与连贯执行。"
 GRAND_DOCTRINE_GUERRILLA_WARFARE: "游击战"
 GRAND_DOCTRINE_GUERRILLA_WARFARE_DESC: "该主要学说以非正规部队开展分散且持续的作战活动为核心构建陆地作战体系。游击战理念强调在对抗环境中进行局部组织和持续施压。"
 GRAND_DOCTRINE_EQUIPMENT_MIXED: "混合装备"
 GRAND_DOCTRINE_EQUIPMENT_MIXED_DESC: "该主要学说要求装备围绕着各种系统的均衡组合展开，以满足多样化的作战需求。混合装备概念强调在不同作战角色下灵活地为部队配备装备。"
 GRAND_DOCTRINE_EQUIPMENT_LIGHT: "轻型装备"
 GRAND_DOCTRINE_EQUIPMENT_HEAVY: "重型装备"
 GRAND_DOCTRINE_EQUIPMENT_MOBILE: "机动装备"
 GRAND_DOCTRINE_EQUIPMENT_FIRES: "火力支援装备"
 GRAND_DOCTRINE_EQUIPMENT_FULL: "全装备"
 GRAND_DOCTRINE_BLUE_WATER: "蓝水海军"
 GRAND_DOCTRINE_GREEN_WATER: "绿水海军"
 GRAND_DOCTRINE_JEUNE_ECOLE: "绿水学派"
 GRAND_DOCTRINE_GUERRE_DE_COURSE: "交通线破袭"
 GRAND_DOCTRINE_COMBINED_ARMS_DESC: "该主要学说围绕机动、火力支援和后勤保障要素的综合运用来构建陆军。诸兵种合成作战概念强调各编队间的协同行动，以产生整体性的战场效果。"
 DOCTRINE_TRACK_SPECIAL_FORCES_MARINES: "特种海军陆战部队"
 DOCTRINE_TRACK_MARINES_MASSIVE_FORCES: "海军陆战队"
 DOCTRINE_TRACK_AIRBORN_FORCES: "空降营"
