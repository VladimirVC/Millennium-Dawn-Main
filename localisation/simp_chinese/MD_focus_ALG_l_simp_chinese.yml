 ALG_promote_sovereignty: "促进主权"
 ALG_promote_sovereignty_desc: ""
 ALG_promote_human_rights: "促进人权"
 ALG_promote_human_rights_desc: "人权高于一切，即使是国家主权。"
 ALG_extract_favorable_terms: "争取有利的条款"
 ALG_extract_favorable_terms_desc: ""
