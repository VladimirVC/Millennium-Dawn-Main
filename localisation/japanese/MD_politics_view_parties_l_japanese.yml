 VIE.liberalism: "£generic_liberalism_small ベトナム革新党"
 VIE.liberalism_desc: "改革主義 - ベトナムにおいて非合法政党として活動するベトナム革新党は、国内における自由民主主義を提唱し、与党であるベトナム共産党への反対を非暴力的な手段で表明しようとしている。"
 VIE.socialism: "£generic_socialism_small ベトナム人民行動党"
 VIE.socialism_desc: "(Pro-Democracy Conservatism) - Operating purely in exile, the People's Action Party has struggled to gain support or form a more coherent ideology than being pro-democracy and opposed to the rule of the CPV."
 VIE.Neutral_Communism: "£generic_Neutral_Communism_small （CPV）ベトナム共産党"
 VIE.Neutral_Communism_desc: "改革共産主義 - 1930年にホー・チ・ミンによって複数の共産主義組織が合併して結成されたベトナム共産党は、その歴史の大部分を、外国による支配との闘いに費やしてきた。同党はベトナム民族主義とマルクス・レーニン主義思想を融合させた路線を掲げ、冷戦期には西側諸国と対立し、ソ連や東欧諸国と連携しながら、共産主義体制下での国家統一を目指す運動を展開した。統一後、同党は一時的に傘下の政党と共に選挙に参加したが、90年代までにそのほとんどはベトナム共産党本体に完全に吸収された。東側諸国の崩壊と中国の政治的転換に伴い、ベトナム共産党はますます改革的な姿勢を強め、市場改革の要素を取り入れるとともに、西側諸国とのより緊密な関係構築を模索している。"
 VIE.Nat_Autocracy: "£generic_Nat_Autocracy_small ベトナム人民軍"
 VIE.Nat_Autocracy_desc: "赤色軍事政権 - 1944年に創設されたベトナム人民軍は、兵力や火力で劣る状況下で数多くの戦闘を繰り広げてきた。創設当初は、正面からの戦闘というよりは、ゲリラ戦に重点が置かれていた。政治色が極めて強いベトナム人民軍は、ベトナム共産党（CPV）自体の指導下で運営されており、その組織体制は、国の革命へのイデオロギー的な忠誠を確保するよう設計されている。"
 VIE.Monarchist: "£generic_Monarchist_small グエン朝"
 VIE.Monarchist_desc: "宗教的君主制 - フランスによる征服と第二次世界大戦中の日本の占領の両方を生き延びたベトナムの王家は、1955年の国民投票が行われるまで完全に廃位されることはなかった。フランスと日本の双方の利益に迎合したこと、そして西洋の宗教を取り入れたことから、多くの人々は王家を傀儡政権と見なすようになった。実際、現在の当主でさえフランスと強いつながりを持っている。"
