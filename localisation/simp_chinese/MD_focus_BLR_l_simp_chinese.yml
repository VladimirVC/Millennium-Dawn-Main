 belarus_another.56.t: "牛仔裤革命"
 belarus_another.56.d: "俄罗斯向我们派遣了专家，我们一起镇压了抗议活动！"
 belarus_another.56.a: "谢谢你，俄罗斯"
 belarus_another.57.t: "牛仔裤革命"
 belarus_another.57.d: "我们秘密向俄罗斯政府寻求帮助，但他们拒绝了我们，这使得我们在革命运动中孤立无援。"
 belarus_another.57.a: "上帝救救我们"
 belarus_another.58.t: "牛仔裤革命"
 belarus_another.58.d: "抗议活动愈演愈烈。一些行政大楼已被占领，其他城市爆发骚乱，一些将军也倒戈投奔了叛军。我们该怎么办？"
 belarus_another.58.a: "我们会战斗到底!"
 belarus_another.58.b: "我们将和平交出权力"
