 form_AUSHUN_category: "L'Empire austro-hongrois"
 form_AUSHUN_category_desc: "L'empire austro-hongrois était une grande puissance en Europe centrale à la fin du XIXème siècle et au début du XXème siècle. La nation a été dissoute après sa défaite retentissante lors de la Grande Guerre. Elle s'est scindée en nations telles que la Tchécoslovaquie, l'Autriche, la Hongrie, la Slovaquie, la Slovénie, la Bosnie et des parties de l'Ukraine, de la Pologne et de la Roumanie. Il est temps de reprendre le flambeau perdu il y a si longtemps. Il est temps de réformer l'empire austro-hongrois."
 AUSHUN_integrate_start: "Begin forming [GetAUSHUNNameDef]"
 AUSHUN_integrate_start_desc: "The holdings of the Austro-Hungarian Empire have been reclaimed by our military and our politicians have started the work towards administering the new regions.\n\n"
 AUSHUN_integrate_AUS: "Integrate [GetAUSHUNNameAdj] [AUS.GetAdjective] Territories"
 AUSHUN_integrate_AUS_desc: "Le cœur de l'ancien empire des Habsbourg, l'Autriche, devrait être l'un des principaux centres du pouvoir dans notre nation."
 AUSHUN_integrate_HUN: "Integrate [GetAUSHUNNameAdj] [HUN.GetAdjective] Territories"
 AUSHUN_integrate_HUN_desc: "Le royaume de Hongrie constituait l'autre moitié de la double monarchie, un partenaire dans la gouvernance de l'empire. Son intégration est essentielle à la restauration de la structure impériale."
 AUSHUN_integrate_SLV: "Integrate [GetAUSHUNNameAdj] [SLV.GetAdjective] Territories"
 AUSHUN_integrate_SLV_desc: "Les terres slovènes faisaient partie des terres de la couronne autrichienne, offrant un accès à l'Adriatique et servant de pont entre l'Autriche et les Balkans."
 AUSHUN_integrate_NORTHITA: "Integrate [GetAUSHUNNameAdj] North Italian Territories"
 AUSHUN_integrate_NORTHITA_desc: "Les territoires italiens de Lombardie-Vénétie furent jadis des joyaux de la couronne des Habsbourg, riches en culture et en commerce. Leur restitution permettrait de restaurer l'influence autrichienne sur la plaine du Pô."
 AUSHUN_integrate_CRO: "Integrate [GetAUSHUNNameAdj] [CRO.GetAdjective] Territories"
 AUSHUN_integrate_CRO_desc: "La Croatie faisait partie de la couronne hongroise et bénéficiait d'une large autonomie. Ses ports et sa position stratégique sur l'Adriatique en faisaient un élément essentiel de la puissance navale de l'empire."
 AUSHUN_integrate_BOS: "Integrate [GetAUSHUNNameAdj] [BOS.GetAdjective] Territories"
 AUSHUN_integrate_BOS_desc: "Administrée par l'Autriche-Hongrie depuis 1878 et annexée officiellement en 1908, l'intégration de la Bosnie-Herzégovine sécurisera nos frontières méridionales et étendra notre influence dans les Balkans."
 AUSHUN_integrate_SLO: "Integrate [GetAUSHUNNameAdj] [SLO.GetAdjective] Territories"
 AUSHUN_integrate_SLO_desc: "Les territoires slovaques faisaient partie intégrante du royaume de Hongrie et formaient la frontière montagneuse septentrionale de la couronne. Leur réintégration renforce notre emprise sur les Carpates."
 AUSHUN_integrate_AUSROM: "Integrate [GetAUSHUNNameAdj] Transylvanian Territories"
 AUSHUN_integrate_AUSROM_desc: "La Transylvanie était une terre historique de la couronne hongroise, disputée entre les populations roumaine et hongroise. Le contrôle de cette région sécurisait les accès orientaux de l'empire."
 AUSHUN_integrate_CZE: "Integrate [GetAUSHUNNameAdj] [CZE.GetAdjective] Territories"
 AUSHUN_integrate_CZE_desc: "Les terres de la couronne de Bohême comptaient parmi les territoires les plus industrialisés et les plus riches culturellement de l'empire. Prague, l'une des grandes villes impériales, revêt une importance capitale pour sa réintégration."
 AUSHUN_integrate_AUSPOL: "Intégrer le Sud de la Pologne"
 AUSHUN_integrate_AUSPOL_desc: "La Galicie était une terre de la couronne acquise lors des partages de la Pologne, apportant à la fois des ressources économiques et une profondeur stratégique à la frontière nord de l'empire."
 AUSHUN_integrate_WESTUKR: "Intégrer le Sud-Ouest de l'Ukraine"
 AUSHUN_integrate_WESTUKR_desc: "Les confins orientaux de la Galicie abritaient des populations ruthènes et constituaient une source de richesse agricole. Leur intégration étend notre influence jusqu'aux confins ukrainiens."
 AUSHUN_update_flag: "Finish Forming [GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetAUSHUNNameDef], adopting its unified flag and name."
 is_AUSHUN: "Has formed [GetAUSHUNNameDef]"
 form_PBL_category: "La Confédération péruvio-bolivienne"
 form_PBL_category_desc: "La Confédération péruvio-bolivienne était à l'origine une entité éphémère au début du XIXème siècle. Elle est née de la division de la République péruvienne et des guerres civiles de 1834 et 1835-1836 et incluait l'État de Bolivie. Les discussions modernes sont minimes, mais elle est néanmoins toujours présente dans l'atmosphère politique des peuples bolivien et péruvien. Il est temps d'envisager ce nouveau lendemain pour nos peuples."
 PBL_integrate_start: "Begin forming [GetPBLNameDef]"
 PBL_integrate_start_desc: ""
 PBL_integrate_PRU: "Integrate [GetPBLNameAdj] [PRU.GetAdjective] Territories"
 PBL_integrate_PRU_desc: "Le Pérou est le plus grand des deux États-nations de la confédération. Il possède la plus grande population, la plus grande économie et la plus grande superficie. L'intégration du Pérou est une entreprise colossale, mais s'emparer de cet État est une démarche solide pour les intérêts de la nouvelle confédération."
 PBL_integrate_BOL: "Integrate [GetPBLNameAdj] [BOL.GetAdjective] Territories"
 PBL_integrate_BOL_desc: "La Bolivie est l'un des deux principaux États-nations qui ont fondé la confédération. C'est une nation plus petite en termes de superficie, de population et de performances économiques, mais ce n'est pas une raison pour la discréditer. Les montagnes sont riches en matières premières indispensables à la production d'électronique et d'autres biens intermédiaires. L'intégration de cette nation consolide une autre position forte pour notre économie désormais diversifiée."
 PBL_integrate_WESTPAR: "Intégrer le Paraguay occidental"
 PBL_integrate_WESTPAR_desc: "Le Paraguay occidental ne dispose pas des mêmes ressources brutes que le Brésil occidental ou le Chili septentrional. Néanmoins, cette région dispose de terres agricoles en abondance et de régions dans lesquelles nous pouvons développer l'industrie de notre nouvelle nation."
 PBL_integrate_WESTBRA: "Intégrer le Brésil occidental"
 PBL_integrate_WESTBRA_desc: "Le Brésil occidental abrite des populations indigènes, des ressources abondantes et bien d'autres choses encore. L'intégration de l'ouest du Brésil devrait contribuer à améliorer le point de vue de notre nation et à accroître les terres sur lesquelles nous pouvons nous développer."
 PBL_integrate_NORTHCHL: "Intégrer le nord du Chili"
 PBL_integrate_NORTHCHL_desc: "Les régions septentrionales du Chili sont mûres pour l'intégration, et nous devons les intégrer pour qu'elles nous aident à atteindre nos objectifs futurs."
