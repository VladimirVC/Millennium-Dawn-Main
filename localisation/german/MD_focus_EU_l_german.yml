 EU_exit_category: "Withdrawal from The European Union"
 EU_exit_category_desc: "With rising Euroscepticism throughout the Union some member states will think about leaving §C[EUU.GetFlag] The European Union§!."
 Article_50: "[THIS.GetName] has invoked Article 50"
 EU_Article_50: "Leave The European Union! (Article 50)"
 EU_Article_50_desc: "\"Any Member State may decide to withdraw from the Union in accordance with its own constitutional requirements.\"\n- Article 50(1), Treaty on European Union.\n\n First Article 50 was drafted for the Constitutional Treaty for the European Union. Following the failure of the ratification process for the European Constitution, the clause was incorporated into the Treaty of Lisbon."
 EU_Revoke_Article_50: "Revoke Article 50"
 EU_Revoke_Article_50_desc: "Revoke Article 50 and remain in §C[EUU.GetFlag] The European Union§!\n\"Article 50 TEU must be interpreted as meaning that, where a Member State has notified the European Council, in accordance with that article, of its intention to withdraw from the European Union, that article allows that Member State, for as long as a withdrawal agreement concluded between that Member State and the European Union has not entered into force or, if no such agreement has been concluded, for as long as the two years laid down in Article 50(3) TEU, possibly extended by that paragraph, has not expired, to revoke that notification unilaterally, in an unequivocal and unconditional manner, by a notice addressed to the European Council in writing, after the Member State concerned has taken the revocation decision in accordance with its constitutional requirements. The purpose of that revocation is to confirm the EU membership of the Member State concerned under terms that are unchanged as regards its status as a Member State, and that revocation brings the withdrawal procedure to an end.\"\n- Judgment of the Court of Justice of the European Union in Case C-621/18"
 EU_exit: "Leaving the EU"
 EU_exit_desc: "§Y[ROOT.GetNameWithFlag]§! has notified the European Council of its intention to leave the §C[EUU.GetFlag] The European Union§!. §Y[ROOT.GetNameWithFlag]§! will leave the Union two years after the notification."
 EU_extend_Article_50: "Extension of Article 50"
 EU_extend_Article_50_desc: "Ask §C[EUU.GetFlag] The European Union§! for an extension of Article 50 and leave the Union to a later date."
 EU_exit_three_month: "Three-month extension"
 EU_exit_three_month_desc: "§Y[ROOT.GetNameWithFlag]§! was granted a three-month extension of Article 50 by §C[EUU.GetFlag] The European Union§!. §Y[ROOT.GetNameWithFlag]§! will leave the Union after a period of three month."
 EU_withdrawal_treaty: "Withdrawal Treaty"
 EU_withdrawal_treaty_desc: "§Y[ROOT.GetNameWithFlag]§! and the member states of §C[EUU.GetFlag] The European Union§! have agreed a Withdrawal Treaty."
 EU_prepared_no_deal_exit: "Prepare a No-Deal Exit"
 EU_prepared_no_deal_exit_desc: "§C[EUU.GetFlag] The European Union§! and its weak-spined lackeys and those pumped-up bureaucrats in Brussels refuse to give us a favorable withdrawal treaty. We must prepare our country for the inevitable No-Deal Exit unless something gives."
 cant_invoke_article_50: "§Y[ROOT.GetNameWithFlag]§! has recently revoked §YArticle 50§! decision (Days Remaining: [?cant_invoke_article_50:days_left|Y0])"
 EU_article_50_available_click: "Prerequisites:\n[!EU_Article_50_click_enabled]\nEffects:\n§Y[ROOT.GetNameWithFlag]§! will begin to exit the §C[EUU.GetFlag][EUU.GetName]§!"
 EU_article_50_available_delayed: "\"Any Member State may decide to withdraw from the Union in accordance with its own constitutional requirements.\"\n- Article 50(1), Treaty on European Union. -\nFirst Article 50 was drafted for the Constitutional Treaty of the European Union. Following the failure of the ratification of the Constitution, the clause was incorporated into the Treaty of Lisbon."
 tooltip_EU_exit_available: "§Y[ROOT.GetNameWithFlag]§! is not currently attempting to leave the §C[EUU.GetFlag][EUU.GetName]§!"
 tooltip_EU_exit_cancel_trigger: "§Y[ROOT.GetNameWithFlag]§! has decision §YRevoke Article 50§! activated."
 tooltip_EU_Revoke_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!."
 tooltip_EU_Revoke_Article_50_effect: "§Y[ROOT.GetNameWithFlag]§! stays in §Y[EUU.GetFlag] The European Union§!. Mission §YLeaving the EU§! AND Mission §YThree-month extension§! is removed.\nYou won't be able to invoke §YArticle 50§! for the next §Y180 days§!."
 tooltip_EU_extend_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!  \nAND [ROOT.GetNameWithFlag] must have > 25% influence on the European Union's Leader of Foreign Policy."
 tooltip_EU_remove_laws_and_offices: "Remove all §YEU laws and offices§!.\n"
 EU_defense_category: "Defense Policies of the EU"
 EU_defense_category_desc: "In the 1950s the idea of the European Defence Community collapsed when it failed to obtain ratification in the French Parliament. Its successor became the Common Security and Defence Policy of the European Union. With the majority of European Nations being members of the North Atlantic Treaty Organization (NATO), there wasn't seen the need for an own European Defense Organization throughout the 20th century. But with rising world tensions in the 21st century, this is changing."
 EU_Frontex_take_control: "Take control of the Frontex Forces"
 EU_Frontex_take_control_desc: "Europe's external borders have seen an unprecedented rise in the number of migrants and refugees wishing to enter the EU in recent years. Countries that have an external border have sole responsibility for border control. But Frontex can provide additional technical support for EU countries facing severe migratory pressure.\n It does this by coordinating the deployment of additional technical equipment (e.g. aircraft and boats) and specially-trained border staff."
 EU_EuroNavy_take_control: "Take control of the EuroNavy"
 EU_EuroNavy_take_control_desc: "With multinational fleets and task forces becoming more common and important in the 21st century the member states of §C[EUU.GetFlag] The European Union§! decided to join their forces and transfer their warships to a unified European Naval Command known as §YEuroNavy§!."
 EU_EuroArmy_take_control: "Take control of the EuroArmy"
 EU_EuroArmy_take_control_desc: "The member states of §C[EUU.GetFlag] The European Union§! decided to draft common armed forces known as §YEuroArmy§!"
 EU_create_EDU: "Form the European Defence Union (EDU)"
 EU_create_EDU_desc: "To attain the necessary strategic autonomy to defend their collective interests, respond to external conflicts and crises, and project security in our neighbourhood the member states have decided to form the §YEuropean Defence Union (EDU)§! as a military alliance and to collectively leave §YNATO§!."
