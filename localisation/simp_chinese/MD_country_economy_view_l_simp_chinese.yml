 NUM_GDP_TOTAL_DELAYED_DESC: "各行业的大致贡献百分比：\n§P民用工厂§!：[?ROOT.civil_fac_percent|%]\n§O军用工厂§!：[?ROOT.military_fac_percent|%]\n§B海军船坞§!：[?ROOT.dockyard_fac_percent|%]\n§C办公园区§!：[?ROOT.office_fac_percent|%]\n§G非商业化农业§!：[?ROOT.agriculture_percent|%]\n§Y商业化农业区§!：[?ROOT.agriculture_district_fac_percent|%]\n§Y微芯片工厂§!：[?ROOT.microchip_plant_percent|%]\n§Y复合材料工厂§!：[?ROOT.composite_plant_percent|%]\n§Y合成精炼油厂§!：[?ROOT.synthetic_refinery_percent|%]\n§G资源开采§!：[?ROOT.resources_percent|%]\n§Y基础设施§!：[?ROOT.infrastructure_gdp_percent|%]\n§P医疗保健§!：[?ROOT.healthcare_gdp_percent|%]\n"
 GDP_PER_CAPITA: "人均GDP水平"
 GDP_PER_CAPITA_DESC: "这个数字代表§Y人均GDP§!或称为§YGDP/C§!，它代表了这个国家平均到每个人的产出。\n\n最近的§Y季度GDP增长率§!：[?last_quarter_gdpc_growth_rate|%Y]\n\n提示：您的§Y季度GDP增长率§!越高，您就越有可能获得正面的经济事件，如果不加以控制，更高的§R通货膨胀§!可能会进一步加剧。"
 GDP_PER_CAPITA_DELAYED_DESC: "目前§Y人均GDP§!对我们国家的影响：\n建造速度：[?production_speed_buildings_factor_gdp_modifier|%+]\n月度人力：[?monthly_population_gdp_modifier|%+1]\n研究速度：[?research_speed_factor_gdp_modifier|%+]\n稳定度：[?stability_factor_gdp_modifier|%+]\n劳动力总数：[?total_workforce_gdp_c_modifier_var|%+]\n化石燃料发电厂建设速度：[?fossil_pp_construction_gdp_c_modifier_var|%+]\n"
 NUM_GDP_PER_CAPITA: "$$§Y[?ROOT.gdp_per_capita|3]§!k"
 NUM_GDP_PER_CAPITA_DESC: "我们的§Y人均GDP§!目前为 $§Y[?ROOT.gdp_per_capita|3]§!K"
 PRODUCTIVITY: "生产率"
 PRODUCTIVITY_DESC: "这个数字代表了我们国家的§Y生产率§!。"
 NUM_PRODUCTIVITY_DELAYED_DESC: "当前每月生产力增长率：[?productivity_growth_scaled|3+]\n\n生产率的影响：\n§Y工厂产出：§! [?productivity_tax_effect_display|%+1]\n§Y船坞产出：§! [?productivity_tax_effect_display|%+1]\n§Y建筑速度：§! [?productivity_tax_effect_display|%+1]\n§Y企业税收入：§! [?productivity_tax_effect_display|%+1]\n§Y£construction_speed_texticon §Y商业化农业区§!建筑速度：§! [?agriculture_district_output_var|%+1]"
 NUM_PRODUCTIVITY: "§Y[?ROOT.overall_productivity|3]§!"
 NUM_PRODUCTIVITY_DESC: "§Y生产率§!是决定我国产出的数值。该值是每个省份的生产率除以所在国家人口的总和。§Y生产率§!是所有国内生产总值来源、公司税和每个工厂产出的乘数。如果您的§Y生产率§!高于 1000，您将获得更大的加成，促进您的经济增长和所有建筑物的产出。§Y生产率§! 每个月都会被动地增长或下降，这种增长受到经济周期、技术和国家精神的影响，并根据§Y全球平均生产率§!进一步调整。低于§Y全球平均生产率§!的国家/地区将看到他们的§Y生产率§!增长速度更快，而高于平均水平的国家增长速度更慢。\n\n目前§Y全球平均生产率§!为§Y[?global.average_world_productivity|3]§!\n我们当前§Y生产率§!为§Y[?ROOT.overall_productivity|3]§!\n"
 INFLATION: "通货膨胀"
 INFLATION_DESC: "这个数字代表了我们国家的§Y通货膨胀§!。"
 NUM_INFLATION: "§Y[?ROOT.inflation_rate_var|%]§!"
 NUM_INFLATION_DESC: "§Y通货膨胀率§!衡量的是一个国家购买力的变化程度。通货膨胀率越高，货币贬值，民众和政府的购买力就越低。通货膨胀率的计算方法是：以过去4个季度的季度§Y人均GDP水平增长率§!的平均值乘以平均§Y税率§!，并根据§Y经济周期§!、§Y货币发行§!、§Y政策利率§!和其他经济事件进行进一步调整。\n\n平均季度§Y人均GDP水平增长率§!越高，§Y人均GDP水平值§!越大，通货膨胀率就越高。较高的§Y税率§!会降低通货膨胀，而较低的税率则会加剧通货膨胀。较高的§Y政策利率§!会降低通货膨胀，但会增加§R债务利息§!，而较低的利率则会产生相反的效果。\n\n高于§Y稳定增长§!水平的§Y经济周期§!将导致§Y通货膨胀§!加剧，模拟商品需求增加和支出增加；而低于§Y稳定增长§!水平的§Y经济周期§!将导致§Y通货膨胀§!下降，模拟支出减少和消费品需求减少。\n\n如果§Y通货膨胀§!率为负，就会出现§Y通货紧缩§!。§Y通货紧缩§!有助于减少政府开支，但也可能导致经济衰退，因为人们会停止消费，等待物价进一步下跌，如果通货紧缩幅度过大或速度过快，则可能导致市场和企业§R破产§!。"
 NUM_INFLATION_DELAYED_DESC: "§H最后四个季度：§! [?ROOT.year_quarter_inflation_tracker^0|%] · [?ROOT.year_quarter_inflation_tracker^1|%] · [?ROOT.year_quarter_inflation_tracker^2|%] · [?ROOT.year_quarter_inflation_tracker^3|%]\n\n显示的利率是§Y四个季度的滚动平均值§!，代表平均年度通货膨胀率，该数值用于计算所有经济影响。"
 POPULATION_TAX_RATE: "人口税率"
 POPULATION_TAX_RATE_TT: "人口税率包括向公众征收的所有税收。这包括但不限于所得税、增值税、销售税和财产税。\n\n§Y来自人口税的修正：§!\n£stability_texticon 稳定度：[?stability_factor_from_population_tax|%+]"
 CORPORATE_TAX_RATE: "企业税率"
 CORPORATE_TAX_RATE_TT: "企业税率包括对公司征收的所有税款。 该价值包括企业所得税、雇主税等。\n\n§Y来自企业税的修正：§!\n£consumer_goods_texticon  税收成本：[?consumer_goods_from_corporate_tax|%Y]\n£receiving_investment_cost_modifier_texticon §Y接收外国投资§!所耗成本：[?receiving_investment_cost_form_corporate_tax|%-] \n每月生产力增长：[?productivity_growth_modifier_from_corporate_tax|+3]\n"
 CB_POLICY_RATE: "政策税率"
 CB_POLICY_RATE_TT: "§Y央行政策利率§!是中央银行设定的基准利率，它控制着整个经济体的借贷成本。\n\n§Y提高利率§!会收紧货币供应，抑制通货膨胀，但会增加主权债务成本，减缓经济活动。\n§Y降低利率§!会刺激借贷和投资，但也会让通货膨胀更自由地上升。\n\n每一调整动作花费§Y25§! £pol_power_icon 同时获得§Y60天§!的冷却时间。\n\n§Y当前利率：§![?cb_policy_rate]%\n§Y季度通胀抑制：§![?cb_policy_rate|+0]% × 0.003每季度§Y\n债务利息溢价：§![?cb_policy_rate|+0]% × 0.5pp，加入§Y利率§!"
