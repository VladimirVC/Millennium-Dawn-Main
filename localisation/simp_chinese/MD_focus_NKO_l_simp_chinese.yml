 NKO_offer_negotiations: "提供谈判"
 NKO_offer_negotiations_desc: "是时候与南方商讨和平统一了。"
 NKO_propose_north_led_unification: "提议北方领导统一"
 NKO_propose_north_led_unification_desc: "从公平的福利体系到更强大的核武器，朝鲜模式显然是朝鲜半岛的前进方向。我们必须坚持，我们应该成为带领朝鲜走向统一后强大未来的人。"
 NKO_pave_the_way_for_reunification: "为统一铺平道路"
 NKO_pave_the_way_for_reunification_desc: "现在，朝韩关系正常化进程已迈出重要一步，我们可以开始为统一做准备。"
