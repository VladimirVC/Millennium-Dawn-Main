 TAT.Conservative: "£SOV_emerging_reactionary (ER) 統一ロシア"
 TAT.Conservative_icon: "£SOV_emerging_reactionary"
 TAT.Conservative_desc: "タタールスタン共和国の首長（ライス）は、同国の最高責任者であり、タタールスタンの国家権力執行機関を統括する最高位の公職者である。"
 TAT.Communist-State: "£SOV_emerging_communism (KPT) タタールスタン共産党"
 TAT.Communist-State_desc: "タタールスタン共和国共産党（KPRT）は共産主義政党である。ロシア共産党とは別にタタールスタン共産党が結成されたのは、1990年のタタール・ソビエト社会主義共和国の主権宣言の採択と、それに続くタタールスタンのロシアからの分離独立が背景にあったとみられる。"
 BSH.Nat_Populism: "£SOV_nationalist_right_wing_populist (LDPB) バシコルトスタン自由民主党"
 BSH.Nat_Populism_icon: "£SOV_nationalist_right_wing_populist"
 BSH.Western_Autocracy: "£BSH_western_autocracy (NPB) バシコルトスタン人民党"
 BSH.Western_Autocracy_desc: "西側専制主義 - バシコルトスタン人民党は、1990年にウファで設立されたアルタフ・ガイフルリンが率いる政党である。バシキール民族の権利尊重を目標として活動しており、バシキール民族国民クルルタイ及びバシキール青年連合と連携した。"
 BSH.conservatism: "£SOV_western_cons ( PD ) 正当なる大義"
 BSH.Conservative: "£BSH_emerging_reactionary_1 (ER) 統一ロシア"
 BSH.Conservative_icon: "£BSH_emerging_reactionary_1"
 BSH.Conservative_desc: "反動主義 - 統一ロシア（ロシア語ローマ字表記：Yedinaya Rossiya）は、公式イデオロギーを「ロシア保守主義」と称するが、実質的なイデオロギーはほとんど存在せず、幅広い支持層を抱える大衆政党として機能している。その中核的価値として安定性を掲げ、プーチン政権誕生までのポストソビエト期にロシアを特徴づけた革命的混乱と対比させている。"
 BSH.Autocracy: "£BSH_emerging_reactionary ムルタザ・ラヒモフ政権"
 BSH.Autocracy_icon: "£BSH_emerging_reactionary"
 BSH.Autocracy_desc: "独裁政権 - ラヒモフ独裁政権または初代政府は、独裁者ムルタザ・ラヒモフ率いる最初の政府で、南部・南東部州における国家変革や経済における国家主義政策で人気を博した。旧ソ連共産党出身者で構成された明らかに腐敗した政府であり、横暴な傾向を持っている。 これは通常、バイストヴォ（baystvo、富裕層や地主階級である「バイ」による支配体制の意）と呼ばれる。"
 BSH.socialism: "£BSH_western_social (SDP) 社会民主党"
 BSH.socialism_desc: "社会民主主義 - バシコルトスタン社会民主党は、アフメト・ザキ・ヴァリディによる初代バシコルトスタン社会主義党の歴史を基盤とする。指導者の地位は、トルコから歴史的故郷へ帰還したその息子スビデイ・トガンが引き継いだ。アフメト・ザキ・ヴァリディが初代共和国に託した原則に基づいている。"
 BSH.Communist-State: "£SOV_emerging_communism (KPB) バシコルトスタン共産党"
 BSH.Communist-State_desc: "共産主義 - バシコルトスタン共産党は、ユニル・クトルグジン率いるソ連の共産主義者たちの遺産である。世界の共産主義者たちやロシアとのつながりを模索している。"
