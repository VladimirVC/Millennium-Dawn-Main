 PMR_LIBERAL: "민주적 트란스니스트리아"
 PMR_LIBERAL_DESC: "트란스니스트리아는 민주적인 경로를 따를 것이며 몰도바와의 통합도 추진할 것입니다."
 PMR_PATRIOTIC: "공화주의 트란스니스트리아"
 PMR_PATRIOTIC_DESC: "트란스니스트리아는 고유한 정치적 기회를 가진 공화당의 노선을 따를 것입니다."
 PMR_COMMUNISM: "공산주의로의 회귀"
 PMR_COMMUNISM_DESC: "트란스니스트리아 위에 공산주의 깃발이 다시 휘날릴 것이며 몰도바 소비에트 사회주의 공화국의 부활을 향한 길이 열릴 것입니다.."
