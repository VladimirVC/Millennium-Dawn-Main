 ARM_AI_BEHAVIOR: "@ARM 아르메니아"
 RULE_OPTION_TSARUKYAN: "차루캰 경로"
 RULE_OPTION_TSARUKYAN_AI_DESC: "아르메니아는 유명한 올리가르히 가기크 차루캰이 이끌게 될 것입니다."
 RULE_OPTION_DEMOCRATS: "친나토 아르메니아"
 RULE_OPTION_DEMOCRATS_AI_DESC: "아르메니아는 캅카스 지역에서 서방의 전초기지가 되기 위해 노력할 것이며 나토 가입을 추진할 것입니다."
 RULE_OPTION_CHI_CHINESE_HEGEMONY: "중국 패권주의"
 RULE_OPTION_CHI_CHINESE_HEGEMONY_AI_DESC: "중국은 세력권 및 전 세계 전반에서 지배력을 추구하며, 유일한 글로벌 패권국이라는 미국의 지위를 찬탈하려 할 것입니다. 그들은 서방 주도의 자유주의적 국제 질서에 부합하도록 자신들의 고유한 사회적, 정치적 가치를 포기하라는 외부의 압력에 굴복하지 않을 것입니다. 중국이 직접적인 전쟁을 추구하는 일은 드물고 다른 수단으로 영향력을 얻으려 하겠지만, 무력 사용이 불가피하다고 판단되면 전쟁을 피하지 않을 것입니다."
 RULE_OPTION_CHI_A_LONG_PEACE: "평화적 부상"
 RULE_OPTION_CHI_A_LONG_PEACE_AI_DESC: "중국은 대결보다는 외교와 협력을 선호하며, 기존 국제 질서를 전복하려 시도하는 대신 그 규칙에 끊임없이 순응하며 발전하고자 할 것입니다. 또한 정치적, 경제적 자유화를 향한 조치를 취할 것입니다."
 RULE_OPTION_CHI_RED_DAWN: "붉은 새벽"
 RULE_OPTION_CHI_RED_DAWN_AI_DESC: "중국은 마오주의적 뿌리로 돌아가 덩샤오핑의 경제 개혁을 롤백하고 전략보다는 이념에 기반한 대외 정책을 선택할 것입니다. 중국이 특정한 중국적 가치가 아닌 보편적 공산주의가 주도하는 자신들의 형상대로 국제 질서를 혁명화하려 함에 따라 전쟁은 피할 수 없게 됩니다."
 PMR_ai_behavior: "@PMR 트란스니스트리아"
 PMR_HISTORIC_DEFAULT: "역사적 경로"
