 BRA_nationalist_claims_URG: "Réclamations sur l'Uruguay"
 BRA_nationalist_claims_URG_desc: "Brazil controlled this territory from 1816 to 1828, naming it Cisplatina. Now, after the glorious restoration of our Empire, we shall reclaim those lands!"
 BRA_workers_party_alignment_decision_category: "Alignement du Parti des travailleurs"
 BRA_workers_party_alignment_decision_category_desc: "Lula et le Parti des travailleurs ont trouvé le moyen d'accéder au pouvoir. Lula et son Parti des travailleurs ont fait un certain nombre de promesses au Centrão et aux extrémistes du pays. Allons-nous tenir nos promesses et revenir à nos valeurs socialistes ? Allons-nous nous concentrer sur les réformes et devenir un parti modéré qui reçoit un large soutien pour des promesses diluées ? L'avenir nous dira ce que le Parti des travailleurs accomplira au cours de son mandat.\n\nUne fois que nous aurons atteint 100, nous aurons rempli toutes nos promesses. En revanche, 0 signifie que nous n'en aurons tenu aucune.\n\n§YAlignement avec le Parti des travailleurs§! Valeur: [?BRA.BRA_brazilian_party_alignment|-50]"
 BRA_decision_support_radicals: "Soutenir les radicaux"
 BRA_decision_support_radicals_desc: "Ce sont les radicaux qu’il faut soutenir."
 BRA_decision_support_reformists: "Soutenir les réformistes"
 BRA_decision_support_reformists_desc: "Nous devons tenir nos promesses."
 BRA_decision_the_road_to_el_dorado: "La route vers El Dorado"
 BRA_decision_the_road_to_el_dorado_desc: "Manaus est une grande ville légèrement isolée par sa position en Amazonie. Investir dans les routes et les voies ferrées peut nous aider à faire de la ville un nouvel Eldorado."
 BRA_decision_expand_the_mining_industry: "Développer l’industrie minière"
 BRA_decision_expand_the_mining_industry_desc: "Les industries minières locales pourraient bénéficier de certaines subventions pour augmenter leur production."
 BRA_decision_increase_the_oil_production: "Augmenter la production de pétrole"
 BRA_decision_increase_the_oil_production_desc: "La côte amazonienne regorge de gisements de pétrole inexploités. Exploitons-les."
 BRA_decision_increase_military_production: "Production militaire amazonienne"
 BRA_decision_increase_military_production_desc: "Manaus dispose d’un bon potentiel pour de nouvelles usines d’armement."
 BRA_decision_tech_metal_industry_in_the_amazon: "Développer l'exploitation minière des métaux technologiques en Amazonie"
 BRA_decision_tech_metal_industry_in_the_amazon_desc: "Plusieurs gisements riches en ressources naturelles ont été découverts dans les régions occidentales de l'Amazonie, à proximité des Andes, et renferment des quantités impressionnantes de cuivre, de lithium et d'autres minéraux. L'implantation d'exploitations minières de toutes sortes dans cette région peut nous permettre de continuer à développer l'économie de notre pays et d'exploiter davantage les richesses naturelles que l'Amazonie peut offrir."
 BRA_bolsonaro_alignment_decision_category: "Alignement de Bolsonaro"
 BRA_bolsonaro_alignment_decision_category_desc: "Bolsonaro et les conservateurs sont arrivés au pouvoir. Allons-nous tenir nos promesses ?"
 BRA_decision_gatter_conservative_support: "Rassembler le soutien des conservateurs"
 BRA_decision_gatter_conservative_support_desc: "Les conservateurs sont notre principale base de soutien."
 BRA_decision_gatter_liberal_support: "Rassembler le soutien des libéraux"
 BRA_decision_gatter_liberal_support_desc: "Les libéraux sont ceux qu’il faut soutenir."
 BRA_decision_support_private_sector: "Soutenir le secteur privé"
 BRA_decision_support_private_sector_desc: "Le secteur privé peut nous aider à améliorer notre économie."
 BRA_decision_support_militaries: "Soutenir l'armée"
 BRA_decision_support_militaries_desc: "L’armée maintient la sécurité et la stabilité du pays."
 BRA_major_development_projects_decision_category: "Projets majeurs de développement"
 BRA_major_development_projects_decision_category_desc: "Le ministre des Transports et des Travaux publics nous a présenté des projets de développement du continent brésilien et d'amélioration de notre économie. Ces projets sont appelés « projets de développement majeur » et visent à étendre et à développer plusieurs régions du pays, notamment la forêt amazonienne, le bassin nord-est et le long des lits des rivières. Nous pouvons choisir de construire tous ces projets de développement majeur ou seulement certains en fonction des besoins."
 BRA_decision_reduce_fires: "Réduire les incendies"
 BRA_decision_reduce_fires_desc: "L'Amazonie brûle chaque année. Peu importe le président ou le dirigeant, elle brûle tout simplement. Mais si nous faisons les efforts nécessaires, il est possible de réduire ces incendies. Nous pouvons faire des efforts ciblés, faire de la publicité et bien plus encore pour essayer d'enrayer la vague de feux de forêt."
 BRA_decision_safe_mining_expansion: "Expansion minière sécuritaire"
 BRA_decision_safe_mining_expansion_desc: "Nous pouvons extraire des ressources de l’Amazonie pour améliorer notre économie, mais nous devons être prudents dans ce domaine. Plus nous serons prudents, plus nous pourrons continuer à développer l’Amazonie rapidement et, plus important encore, de manière durable. Nous pouvons utiliser une partie de notre forêt amazonienne préservée qui a été prospectée pour ses ressources afin de faire un choix plus respectueux de la conservation."
 BRA_anti_rw_rhetoric: "Rhétorique anti-droite"
 BRA_anti_rw_rhetoric_desc: "La droite est la pire chose au Brésil ! Il faut l'éliminer immédiatement !"
 BRA_new_communist_government: "Nouveau gouvernement communiste"
 BRA_new_communist_government_desc: "Pour assurer la stabilité de la nation, le gouvernement doit être stable !"
 BRA_underwater_flotilla_desc: "La flottille sous-marine brésilienne est assez ancienne et limitée. Il est impératif que nous étendions notre flottille sous-marine pour nous établir comme une puissance mondiale."
 BRA_global_alignment: "Alignement global"
 BRA_global_alignment_desc: "Le Brésil deviendra un phare de prospérité dans le monde entier !"
 BRA_focus_tree: "Priorités nationales brésiliennes"
 BRA_legalize_independent_amazonian_development: "Légaliser le développement indépendant de l'Amazonie"
 BRA_legalize_independent_amazonian_development_desc: "Le développement de l’Amazonie est actuellement fortement réglementé et ne peut être réalisé indépendamment des entreprises individuelles. Nous devrions envisager d’assouplir les réglementations entre les différents secteurs de développement pour permettre un développement indépendant des entreprises de construction, d’agriculture et d’exploitation minière."
 BRA_the_countryside: "La campagne"
 BRA_the_countryside_desc: "La majorité de la population du Brésil réside sur la côte est du pays, mais un certain nombre de régions intérieures, responsables de la production d'une grande partie des produits agricoles que nous exportons et utilisons dans les villes, sont cultivées ici, dans nos campagnes. Nous devrions chercher à explorer et à améliorer les campagnes et les richesses qu'elles offrent."
 BRA_expand_commercialized_sugar_cane: "Développer la production commerciale de canne à sucre"
 BRA_expand_commercialized_sugar_cane_desc: "La canne à sucre est l’une de nos cultures commerciales au Brésil. Nous devrions envisager d’étendre davantage la production commerciale de canne à sucre dans l’espoir de stimuler davantage le développement agro-industriel ici dans le pays."
 BRA_increase_grain_exports: "Augmenter les exportations de céréales"
 BRA_increase_grain_exports_desc: "L'agriculture au Brésil est une industrie absolument gigantesque, dont la production céréalière occupe une grande partie. Nous devons nous concentrer sur l'expansion de la production céréalière et augmenter les exportations de céréales à l'étranger pour renforcer notre domination dans les exportations du secteur primaire."
 BRA_coffee_plantations: "Plantations de café"
 BRA_coffee_plantations_desc: "The climate of Brazil is exceptionally suited to coffee cultivation and we have been a major producer since the late 19th century. Targeted subsidies and expansion of commercialized coffee plantations will see a substantial bump in gross domestic product for the country."
 BRA_apirary_expansions: "Agrandissement du rucher"
 BRA_apirary_expansions_desc: "The rolling grasslands of Brazil and their meadows have gorgeous fields of flowers and the local vegetation is conducive to the production of fresh and organic honey. If we continue to expand the apiaries in these regions we can continue to expand our commercialized agrarian exports."
 BRA_tobacco_plantations: "Plantations de tabac"
 BRA_tobacco_plantations_desc: "La région du Nord-Est de notre pays compte un certain nombre de plantations de tabac qui ont contribué à stabiliser et à maintenir l’économie de la région à flot."
 BRA_expand_corn_production: "Augmenter la production de maïs"
 BRA_expand_corn_production_desc: "Corn has become a pivotal resource in our economy. We should continue to exploit corn production for the sake of the country and for the diversification of the agricultural products we produce domestically."
 BRA_tea_plantations: "Plantations de thé"
 BRA_tea_plantations_desc: "Some regions have turned to tea production due to our climate being incredibly favorable for the growth of tea. We should continue to follow the trend set years ago and expand commercial tea plantations."
 BRA_vineyard_expansions: "Agrandissement du vignoble"
 BRA_vineyard_expansions_desc: "Les vignobles des prairies vallonnées et le long de la côte produisent certains des meilleurs raisins que l'hémisphère occidental puisse offrir. Par procuration, les vignobles produisent un vin de renommée mondiale qui est exporté dans le monde entier et recherché sur de nombreux marchés à travers le monde."
 BRA_amazonian_high_command: "Créer un haut commandement militaire amazonien"
 BRA_amazonian_high_command_desc: "La forêt amazonienne offre un large éventail de possibilités de sorties de conflits hostiles. La création du Haut Commandement militaire amazonien nous permettra de mieux coordonner nos efforts avec les forces de l’ordre locales, de nous occuper des secours en cas de catastrophe et de coordonner les interventions dans le cadre des opérations anti-cartel."
 BRA_air_trained_pilots_desc: "En formant nos pilotes en direct dans les airs, nous parviendrons à avoir la meilleure force aérienne possible."
 BRA_amazon_military_high_command: "Création du §YHaut Commandement Militaire Amazonien§!\n"
 BRA_banned_all_amazonian_private_development: "Interdiction de tout développement privé en Amazonie"
 BRA_amazon_invested_in_the_amazon: "Amazon a investi dans la forêt amazonienne"
 BRA_idea_amazonian_development_project_desc: "Le grand projet de développement de l'Amazonie a commencé. Nous avons commencé à réduire les formalités administratives en Amazonie, ce qui ouvre de nouvelles opportunités économiques aux entités privées et au gouvernement."
 BRA_idea_oncoming_debt_crisis: "Crise de la dette imminente"
 BRA_idea_oncoming_debt_crisis_desc: "La dette du Brésil plane actuellement sur notre pays comme un nuage noir. Les récentes mesures budgétaires nous ont permis de remédier à un grand nombre de problèmes, mais nous sommes toujours sur le point de ne plus pouvoir payer nos dettes. Nous pouvons envisager plusieurs options, comme des programmes d'aide étrangère ou nous pouvons envisager de rétablir les règles d'endettement du FMI pour notre pays.\n\n\nCette idée s'annulera si le rapport §YDette/PIB§! de votre pays tombe en dessous du §G20%§!(Ratio actuel: [?THIS.debt_ratio|%])"
 BRA_idea_worsening_debt_crisis: "Aggravation de la crise de la dette"
 BRA_idea_worsening_debt_crisis_desc: "L’échec de la négociation avec les États-Unis a entraîné un nouvel effondrement du réal. L’économie de notre pays nous échappe de plus en plus si nous ne changeons pas rapidement la donne. Notre seul espoir est de rembourser le plus rapidement possible la plus grande partie de notre dette.\n\n\nCette idée s'annulera si le rapport §YDette/PIB§! de votre pays tombe en dessous du §G20%§!(Ratio actuel: [?THIS.debt_ratio|%])"
 BRA_idea_crippled_currency_tt: "Nous ne pourrons pas modifier notre §YCycle économique§! manuellement.\n"
 BRA_idea_foreign_debt_assistance: "Aide à la dette extérieure"
 BRA_idea_foreign_debt_assistance_desc: "Les États-Unis nous ont accordé une aide extérieure qui nous a permis d’alléger une partie de notre dette. Grâce à une série de mesures ciblées, la Réserve fédérale américaine a racheté notre dette à des investisseurs privés américains et nous a libérés de nos obligations en matière de dette."
 BRA_idea_brazilian_exports_desc: "Le Brésil est l'une des économies exportatrices les plus importantes au monde. La majorité des exportations sont des produits agricoles et des ressources primaires telles que des matières premières telles que le minerai et le bois."
 BRA_idea_pro_unions_desc: "La transition d’une économie agraire vers une économie manufacturière exige que nous soyons favorables aux syndicats pour garantir que tous les travailleurs du pays bénéficient de droits améliorés."
 BRA_idea_pro_industries_desc: "L’expansion de notre base industrielle a commencé à propulser notre économie vers de nouveaux sommets et il est maintenant temps de nous consolider en tant que pro-industrie."
 BRA_idea_enraged_natives: "Indigènes enragés"
 BRA_idea_enraged_natives_desc: "The native peoples of Brazil are currently enraged with the government. They cite a variety of issues such as disproportionate pay, poor treatment of workers, and widespread native poverty. If we choose not to support the native people's plight we may see more widespread issues."
 BRA_idea_friendly_natives_desc: "The continued changes in government structure and laws have shifted the disposition of the native peoples in our favor. If we continue to maintain our course, the native people of Brazil will continue to support the government."
 BRA_idea_new_wave_ideas_desc: "Le moment est venu de nous affirmer comme une nouvelle puissance sur la scène mondiale. De nombreuses personnes de tout le Brésil ont commencé à soutenir une multitude d’idées nouvelles qui nous permettent de développer et de définir la nouvelle voie à suivre pour notre grand pays."
 BRA_idea_restricted_travelers_desc: "Le fléau des voyageurs dans notre grand pays a finalement commencé à être enrayé. Nous avons appliqué un certain nombre de réglementations et de restrictions limitant le nombre de voyageurs dans notre grand pays."
 BRA_idea_extensive_border_control_desc: "Nous avons mis en place des contrôles étendus à nos frontières pour empêcher l'entrée de migrants en provenance de pays étrangers."
 BRA_idea_diplomatic_powerhouse_desc: "Le Brésil s’est imposé comme une puissance diplomatique. Notre force réside non seulement dans nos prouesses au combat, mais aussi dans notre capacité à nous maintenir à l’étranger."
 BRA_idea_the_international_mediator_desc: "Le Brésil, qui est le plus grand pays d’Amérique du Sud, se trouve dans une position particulièrement intéressante, car il n’est pas impliqué dans la plupart des politiques mondiales et n’a que très peu à gagner à être partial. La position dans laquelle nous nous trouvons nous permet d’être un médiateur dans les situations les plus difficiles, là où d’autres ne sont peut-être pas partiaux. De plus, notre grand pays se situe parfaitement entre l’Est et l’Ouest, ce qui nous permet de régler les conflits entre divers acteurs."
 BRA_idea_rainforest_protectors_desc: "Nous sommes les protecteurs de la forêt tropicale et nous devons veiller à ce que la forêt amazonienne soit protégée maintenant et pour toujours."
 BRA_idea_brazil_peacekeepers: "Casques bleus brésiliens"
 BRA_idea_brazil_peacekeepers_desc: "Nous nous sommes fermement établis comme l’un des soldats de la paix les plus renommés au monde."
 BRA_idea_neo_comunista_desc: "Le Parti des Travailleurs a officiellement adopté sa forme la plus authentique et définitive. Il a adopté la voie communiste et est désormais véritablement le parti de la liberté, de l'égalité et de la nouvelle voie pour le Brésil et son avenir."
 BRA_idea_radical_leftist_desc: "Le Parti des travailleurs est devenu un parti radical. Il a adopté des partis d'extrême gauche et milite activement pour la dissolution des États capitalistes dans le monde entier."
 BRA_idea_slightly_radical_desc: "Le Parti des travailleurs a commencé à se transformer en parti radical. Il a adopté certains partis d'extrême gauche et commence à militer activement pour la dissolution des États capitalistes dans le monde entier."
 BRA_idea_well_balanced_desc: "Le Parti des travailleurs maintient un équilibre délicat entre radicalisme et réformisme. Le parti continue de séduire tous les milieux sociaux en continuant à prôner la rhétorique socialiste sans pour autant décourager les éléments extrémistes ni les membres du Centrão."
 BRA_idea_slightly_reformistq_desc: "Le Parti des travailleurs a changé de cap. Il ne croit plus à une conversion radicale de la République brésilienne mais à des réformes progressives et ciblées. Ce changement de position idéologique a poussé certains éléments les plus extrémistes à quitter le groupe."
 BRA_idea_modern_reformist_desc: "The Workers' Party has shifted its course. The party no longer believes in radical conversion of the Brazilian republic but rather gradual and targeted reforms. The change in ideological stance has caused more extreme elements to leave the party, threatening to drive away larger swaths of radicals who formed a large part of the support base. However, by contrast more and more members of the Centrão are flocking to the party in droves."
 BRA_idea_party_of_progress_desc: "The Workers' Party has shifted its course. The party no longer believes in radical conversion of the Brazilian republic but rather gradual and targeted reforms. The change in ideological stance has caused the extreme elements to leave the party, the majority of them seeking parties that truly wish to see the state broken down and rebuilt brick by brick. This is no longer the view of the Workers' Party, which has rebranded itself as the Party of Progress and begun extensive political reforms across the various institutions of Brazil."
 BRA_idea_imbel_desc: "Indústria de Material Bélico do Brasil (IMBEL, English: Brazilian War Material Industry) is the Brazilian government's primary defence contractor. It was founded in the early 1930s as Fábrica de Canos e Sabres para Armas Portáteis, which directly involved the Brazilian Army in production quotas. It was not until the late 1970s that IMBEL would be formally established by Law no. 6227, which created IMBEL with the express purpose of promoting the war materiel industry through direct private investment."
 BRA_idea_modern_artillery_desc: "Expanding and modernizing the artillery stockpile that the country has access to will allow us to further establish ourselves as one of the world's foremost military powers."
 BRA_idea_homemade_rifles_desc: "Concevoir des fusils qui peuvent être fabriqués à la maison en utilisant des kits rapides qui peuvent être développés dans des usines de toutes sortes pour aider à construire des fusils à la maison ou dans leurs sous-sols. Le coût de production et la capacité de produire ces armes permettront à notre pays d'être mieux préparé pour l'avenir."
 BRA_idea_strength_on_land_desc: ""
 BRA_idea_modern_armor_desc: "Notre corps blindé doit être modernisé avec les technologies les plus récentes disponibles soit sur le marché, soit en production ici au pays."
 BRA_idea_braco_forte_mao_amiga_desc: "La devise de l'armée brésilienne « Braço Forte Mão Amiga » (Bras fort, main amicale) évoque un sentiment de véritable nationalisme et de patriotisme. L'armée est l'une des plus grandes réussites du Brésil et, à ce titre, il est impératif que nous continuions à maintenir une armée nombreuse pour honorer son histoire riche et vibrante, de notre guerre d'indépendance aux récentes incursions des Forces armées révolutionnaires de Colombie. Nous incarnerons notre devise et emploierons un bras fort, mais une main toujours amicale envers ceux qui ne souhaitent pas s'opposer à nous."
 BRA_idea_underwater_flotilla_desc: ""
 BRA_idea_reform_the_navy_desc: ""
 BRA_idea_french_naval_studies_desc: ""
 BRA_idea_protegendo_nossas_riquezas_desc: ""
 BRA_idea_associate_states_desc: "[THIS.GetNameWithFlag] est un État associé au MERCOSUR. Le membre associé a la possibilité de s'exprimer et de faire entendre sa voix au sein de l'organisation, mais n'est pas un membre votant à part entière du bloc."
 BRA_idea_mercosur_trade_agreement_desc: ""
 BRA_idea_mercosur_education_integration_desc: ""
 BRA_idea_mercosur_people_goods_desc: ""
 BRA_idea_water_conservation: "Conservation de l'eau"
 BRA_idea_water_conservation_desc: ""
 BRA_idea_african_infrastructure_support_desc: ""
 BRA_idea_african_industry_support_desc: ""
 BRA_idea_eu_research_agreement_desc: ""
 BRA_idea_literacy_act_desc: ""
 BRA_idea_educational_support_desc: ""
 BRA_idea_agricultural_agreement_desc: ""
 BRA_idea_eu_trade_agreement_desc: ""
 BRA_idea_unasul_member: "Membre de l'UNASUL"
 BRA_idea_unasul_member_desc: "L'UNASUL, ou UNASUR, est une organisation régionale intergouvernementale d'Amérique du Sud qui a été fondée dans le but de favoriser la croissance et les liens diplomatiques entre les différentes nations d'Amérique du Sud."
 BRA_idea_olavo_de_carvalho: "Olavo de Carvalho"
 BRA_idea_olavo_de_carvalho_desc: ""
 BRA_idea_improved_military_conditions_desc: ""
 BRA_idea_volunteer_reformation_desc: ""
 BRA_idea_harsher_conscription_desc: ""
 BRA_idea_liberal_economy_desc: ""
 BRA_idea_nationalism_rise2_desc: ""
 BRA_idea_globo_influence_desc: ""
 BRA_idea_globo_disbanded_desc: ""
 BRA_idea_nationalised_globo_desc: ""
 BRA_idea_monarchism: "Les idéaux monarchistes"
 BRA_idea_monarchism_desc: "Suivant les idéaux conservateurs et nationalistes, les idéaux monarchistes croient en un gouvernement monarchique, préservant les anciennes valeurs."
 BRA_idea_electoral_media: "Médias électoraux"
 BRA_idea_electoral_media_desc: "Les médias sociaux sont véritablement un outil de la nouvelle ère. Il est impératif que nous exploitions ce nouvel outil à notre avantage et que nous assurions notre victoire aux prochaines élections en utilisant ce nouvel outil révolutionnaire."
 BRA_idea_car_wash: "Opération lavage de voiture"
 BRA_idea_car_wash_desc: "Operation Car Wash is the landmark anti-corruption probe that began with a small money-laundering investigation at a car wash in Brasília. The probe quickly began to spiral, and various state-owned enterprises, politicians from all levels, and businessmen from all walks of life have been caught in the crossfire. Time will tell how deep the rot truly goes."
 BRA_idea_liberalism_desc: ""
 BRA_idea_social_democracy_desc: ""
 BRA_idea_new_coalition: "La nouvelle coalition"
 BRA_idea_new_coalition_desc: "La nouvelle coalition de gauche, avec le PT, le PCdoB, le PMDB, le PPS et le PSTU."
 BRA_idea_pro_psdb_youth_desc: ""
 BRA_idea_a_liberal_brazil_desc: ""
 BRA_idea_federalization: "Fédéralisation"
 BRA_idea_federalization_desc: ""
 BRA_idea_mensalao_desc: ""
 BRA_idea_social_enterprises: "Entreprises sociales"
 BRA_idea_social_enterprises_desc: ""
 BRA_idea_higher_minimun_wage: "Augmentation du salaire minimum"
 BRA_idea_higher_minimun_wage_desc: ""
 BRA_idea_agrarian_reform_desc: ""
 BRA_idea_space: "Les efforts spatiaux du Brésil"
 BRA_idea_space_desc: ""
 BRA_idea_fossil_fuel_industry_desc: "L’industrie des combustibles fossiles [BRA.GetAdjective] est un acteur majeur sur le marché mondial des combustibles fossiles et il est impératif que nous continuions à soutenir cette industrie extrêmement vitale."
 BRA_idea_lulismo_desc: ""
 BRA_idea_bolsonarismo_desc: ""
 BRA_idea_ideological_revolution: "Révolution idéologique"
 BRA_idea_ideological_revolution_desc: ""
 BRA_idea_guns_allowed_desc: ""
 BRA_idea_fight_influence: "Lutter contre l’influence étrangère"
 BRA_idea_fight_influence_desc: ""
 BRA_idea_parties_left: "Les partis de gauche"
 BRA_idea_parties_left_desc: ""
 BRA_idea_pax_brasilis_desc: ""
 BRA_idea_bolsonaro_conservative_influence_desc: ""
 BRA_idea_bolsonaro_liberal_influence_desc: ""
 BRA_idea_supporting_private_sector_desc: ""
 BRA_idea_supporting_military_desc: ""
 BRA_idea_brazilian_space_force_desc: "The Brazilian people must be defended at all costs — on land, at sea, in the air, and on our new frontier. We must establish the Brazilian Space Force as a new military branch to handle the defence of all our assets both within and beyond the atmosphere."
 BRA_idea_plano_real_desc: ""
 BRA_idea_support_from_the_teachers_desc: ""
 BRA_idea_brazilian_research_and_development_desc: ""
 BRA_idea_scientific_advances_desc: ""
 BRA_idea_education_reforms_desc: ""
 BRA_idea_imperial_university_desc: ""
 BRA_idea_trained_pilots: "Pilotes formés"
 BRA_idea_trained_pilots_desc: ""
 BRA_idea_psl_growth: "L'essor du PSL"
 BRA_idea_psl_growth_desc: "Le Parti social-libéral a commencé à gagner énormément de terrain. Il est en pleine ascension et, sur la voie qu'il suit actuellement, il se dirige vers une victoire aux prochaines élections."
 BRA_idea_brazil_energy: "Énergie verte"
 BRA_idea_brazil_energy_desc: "A series of government-led initiatives has seen an expansion of green energy as we move towards a greener country. The programs have already begun to yield dividends as various solar and wind companies expand our green infrastructure and add power to the energy grid."
 BRA_legalize_independent_amazonian_development_tt: "Nous légaliserons le §Ydéveloppement privé indépendant§! de la forêt amazonienne et des États qui abritent des parties de la forêt amazonienne.\n\nLa légalisation du §Ydéveloppement privé indépendant§! signifie que nous aurons des événements où des entreprises privées développeront la forêt amazonienne en offrant gratuitement des §Yindustries§!, des ressources et bien plus encore, au détriment des §Ysuperficies conservées§!.\n"
 BRA_conserv_acreage_effect_tt: "Modifie la §Ysuperficie totale de forêt tropicale conservée§! de [?temp_change|+] (Superficie actuelle conservée: [?BRA_acres_conserved|Y])"
 BRA_wild_acreage_effect_tt: "Modifie la §Ysuperficie totale de forêt tropicale vierge§! de [?temp_change|+] (Superficie actuelle de forêt vierge: [?BRA_acres_wild|Y])"
 BRA_target_acreage_effect_tt: "Modifie la §Ysuperficie totale de forêt tropicale ciblée§! de [?temp_change|+] (Superficie actuelle ciblée: [?BRA_acres_target|Y])"
 BRA_acre_rate_gain_effect_tt: "Modifie le §Ygain mensuel de superficie de forêt tropicale vierge§! de [?temp_change|+] (Gain mensuel actuel: [?BRA_acre_rate_gain|Y])"
 BRA_acre_rate_loss_effect_tt: "Modifie la §Yperte mensuel de superficie de forêt tropicale vierge§! de [?temp_change|+] (Perte mensuelle actuel: [?BRA_acre_rate_loss|Y])"
 BRA_acres_conserved_change_effect_tt: "Modifie le §Ytaux de conversion de la superficie de forêt tropicale conservée§! de [?temp_change|+] (Taux de conversion actuel: [?BRA_acres_conserved_change|Y])"
 BRA_amazonian_high_command_tt: "Établit le §YHaut Commandement Amazonien§! vous permettant d'utiliser l'armée dans des événements liés à la §YForêt Amazonienne§!\n"
 BRA_worker_party_alignment_effect_tt: "Modifie §Yl'alignement envers le Parti des Travailleurs§! de [?temp_change|+] (Alignement actuel: [?BRA_brazilian_party_alignment|Y0])"
 BRA_decision_transposition_saofrancisco: "Transposition du fleuve São Francisco"
 BRA_decision_transposition_saofrancisco_desc: "La transposition du fleuve São Francisco est un projet visant à déplacer une partie des eaux du fleuve São Francisco au Brésil. Baptisé par le gouvernement brésilien « Projet d'intégration du fleuve São Francisco avec les bassins hydrographiques du nord-est », le projet est une entreprise du gouvernement fédéral sous la responsabilité du ministère du Développement régional. Le projet prévoit la construction de plus de 700 kilomètres de canaux en béton sur deux axes principaux (nord et est) à travers le territoire de quatre États (Pernambuco, Paraíba, Ceará et Rio Grande do Norte) pour détourner les eaux du fleuve. Le projet comprend la construction de neuf stations de pompage d'eau tout au long du parcours. Il est également possible d'étendre le projet pour inclure un axe sud, couvrant Bahia et Sergipe, et un axe ouest, dans le Piauí."
 BRA_decision_bacia_tocantins: "Coloniser le bassin hydrographique du Tocantins Araguaia"
 BRA_decision_bacia_tocantins_desc: "Le bassin hydrographique d'Araguaia-Tocantins est l'une des douze régions hydrographiques du Brésil. Les principaux fleuves du bassin sont le Tocantins et l'Araguaia. C'est le plus grand bassin hydrographique du Brésil."
 BRA_decision_army_projects: "Bureau des projets de financement de l'armée"
 BRA_decision_army_projects_desc: "Le Bureau des Projets de l'Armée a pour objectif de fournir aux unités opérationnelles les produits de défense essentiels à leur emploi opérationnel à leur niveau minimum."
 BRA_decision_improve_dockyards: "Améliorer nos chantiers navals"
 BRA_decision_improve_dockyards_desc: "Nos chantiers navals de [890.GetName] et de [885.GetName] ont besoin d'être agrandis et améliorés. Nous devrions étudier et envisager d'agrandir ces chantiers navals pour permettre la production de navires de plus en plus grands."
 BRA_decision_amazonian_projects: "Projets industriels en Amazonie"
 BRA_decision_amazonian_projects_desc: "Il est temps de mettre en place une série de projets industriels amazoniens pour accroître la capacité industrielle civile de l’État de [892.GetName]."
 BRA_amazon_conservation_system_decision_category: "Conservation de la forêt amazonienne"
 BRA_amazon_conservation_system_decision_category_desc: "La forêt amazonienne est sans conteste l'une des merveilles naturelles les plus impressionnantes du monde, et nous comptons parmi les rares nations à abriter sa beauté au sein de nos frontières. Mais les ressources qu’elle recèle en font également un enjeu politique majeur, notamment dans le cadre de son exploitation pour le développement économique.\n\n\nLe fonctionnement de la mécanique liée à l’Amazonie vous demande de maintenir votre §Ysuperficie totale amazonienne§! proche ou au-dessus de la §Ysuperficie cible§!. Si cet équilibre n’est pas respecté, nos états amazoniens subiront des pénalités, et des événements de plus en plus graves seront déclenchés selon l’ampleur de la déforestation. La §Ysuperficie totale amazonienne§! est composée de la §Ysuperficie vierge§! et de la §Ysuperficie conservée§!. Chaque mois, nous gagnons ou perdons de la §Ysuperficie vierge§! en fonction des décisions prises sur la politique économique dans les §Yétats amazoniens§!.\n\nMaintenir une forte proportion de §Ysuperficie amazonienne conservée§! apporte des avantages à long terme. Cependant, le défrichage intensif permet également d’exploiter des ressources telles que les richesses minières, les §Ybâtiments§! et les §Yespaces de construction§!.\n\nSuperficie cible de forêt tropicale: [?BRA_acres_target]\nSuperficie actuelle de forêt tropicale: [?BRA_acres_current]\n\nSuperficie vierge actuelle: [?BRA_acres_wild] (Ratio: [?BRA_wild_acreage_ratio|%1])\nSuperficie conservée actuelle: [?BRA_acres_conserved] (Ratio: [?BRA_conserved_acreage_ratio|%1])\n\nTaux de conversion de la superficie conservée: [?BRA_acres_conserved_change|+]\nGain mensuel de superficie vierge: [?BRA_acre_rate_gain|+]\nPerte mensuelle annuelle moyenne de superficie vierge: [?BRA_acre_rate_loss|-]\nSolde net mensuel de la superficie amazonienne : [?BRA_net_acreage|+] acres / mois"
 BRA_decision_plant_additional_trees: "Planter des arbres supplémentaires"
 BRA_decision_plant_additional_trees_desc: "Nous pouvons replanter des portions de la forêt amazonienne dans nos zones de conservation pour nous aider à atteindre la superficie ciblée de la forêt tropicale."
 BRA_decision_declare_new_conservation_lands: "Déclarer de nouvelles terres de conservation"
 BRA_decision_declare_new_conservation_lands_desc: "La déclaration de nouvelles terres de conservation peut contribuer à endiguer la vague d’activités illégales telles que la culture sur brûlis ou l’exploitation forestière illégale."
 BRA_decision_establish_amazonian_national_park_service: "Créer le SNUC"
 BRA_decision_establish_amazonian_national_park_service_desc: "Il est temps de mettre en place le nouveau Système national d’unités de conservation de la nature (SNUC). Bien que l’idée du SNUC existe depuis les années 1970, lorsqu’il a été développé pour la première fois par l’Institut brésilien de développement forestier et la Fondation brésilienne pour la conservation de la nature comme un moyen de contribuer à normaliser la conservation de la nature au Brésil, il est désormais temps d’adopter cette méthodologie et de la mettre en pratique pour la grandeur de tout le Brésil."
 BRA_decision_expand_rubber_production_on_the_coast: "Développer la production de caoutchouc sur la côte"
 BRA_decision_expand_rubber_production_on_the_coast_desc: "Le caoutchouc est l’une des ressources vitales de l’Amazonie et du Brésil. L’expansion de la production et la plantation d’arbres supplémentaires le long de la côte pour la production de caoutchouc nous procureront une nouvelle manne de revenus et renforceront notre domination sur le marché mondial des ressources."
 BRA_decision_expand_the_gold_mining_initiatives: "Initiatives élargies en matière d'exploitation aurifère"
 BRA_decision_expand_the_gold_mining_initiatives_desc: "Nous devrions étendre les initiatives d’extraction d’or le long des rivières et des ruisseaux de l’Amazonie."
 BRA_decision_halt_independent_developments: "Arrêter les développements indépendants"
 BRA_decision_halt_independent_developments_desc: "L'exploitation de l'Amazonie par des entreprises privées récemment légalisées a commencé à abattre une grande partie de la forêt, avec leur industrialisation rapide des espaces verts. Nous pouvons arrêter ces développements pour le moment afin de nous donner un peu de répit pour établir de nouvelles politiques et commencer une replantation ciblée."
 BRA_decision_continue_independent_developments: "Poursuivre les développements indépendants"
 BRA_decision_continue_independent_developments_desc: "Nous pensons que nous sommes prêts à reprendre le développement de l’Amazonie. Nous devrions réécrire de nouvelles communications aux sociétés de développement privées pour qu’elles reprennent le développement de l’Amazonie."
 BRA_decision_permanently_ban_private_development: "Interdire définitivement le développement privé en Amazonie"
 BRA_decision_permanently_ban_private_development_desc: "We will permanently ban all private Amazonian development. This is wildly popular with the green parties of the country, who will gain significant political ground as a result."
 BRA_decision_initial_investment: "Investissement initial"
 BRA_decision_initial_investment_desc: "Il existe un certain nombre de projets de développement qui ont été proposés pour développer certaines régions de l'Amazonie. Cela nécessite un investissement initial important pour démarrer l'organisation et ensuite pour développer ces projets."
 BRA_amazon_modifier: "La forêt amazonienne – Efforts locaux de conservation"
 BRA_amazon_modifier_desc: "La forêt amazonienne est la plus grande forêt tropicale du monde. Le peuple brésilien a le droit d'en être le gardien. Une exploitation non réglementée des ressources de la forêt tropicale pourrait entraîner des manifestations généralisées, aggraver les problèmes liés au changement climatique et bien plus encore. Cependant, si nous parvenons à gérer la forêt au mieux de nos capacités, nous pourrons véritablement libérer la puissance économique de la forêt tropicale et permettre à notre grande nation de prospérer.\n\nNous pouvons réduire les pénalités à l’échelle de l’État en augmentant notre §YRatio de superficie totale conservée§! ainsi qu’en mettant en œuvre l’§YInvestissement interne§! pour §YAméliorer les efforts locaux de conservation§! pour l’aide locale. Nous ne subissons aucune pénalité lorsque notre §YRatio de superficie totale conservée§! est à 100 % (Actuel: [?BRA_conserved_acreage_ratio|0%])."
 BRA_amazon_country_modifier: "La forêt amazonienne - Efforts de conservation à l'échelle nationale"
 BRA_amazon_country_modifier_desc: "La forêt amazonienne est la plus grande forêt tropicale du monde. Le peuple brésilien a le droit d'en être le gardien. Une exploitation non réglementée des ressources de la forêt tropicale pourrait entraîner des manifestations généralisées, aggraver les problèmes liés au changement climatique et bien plus encore. Cependant, si nous parvenons à gérer la forêt au mieux de nos capacités, nous pourrons véritablement libérer la puissance économique de la forêt tropicale et permettre à notre grande nation de prospérer.\n\nNous pouvons réduire ces pénalités en augmentant votre §YSuperficie totale§! au-delà de la §YSuperficie cible§!(Actuel: [?BRA_current_target_ratio|%0])."
 BRA_native_violence_modifier: "La violence des autochtones"
 BRA_native_violence_modifier_desc: "Des violences ont éclaté à [THIS.GetName] entre la population indigène locale et les différents promoteurs de la région. Ce n'est qu'une question de temps avant que ces violences ne se transforment en quelque chose de bien plus grave..."
 brazil_amazon.1.t: "Incendies de forêt dévastateurs"
 brazil_amazon.1.d: "Une série d'incendies naturels, bien qu'exacerbés par d'autres facteurs, ont commencé à ravager une partie de l'Amazonie sur notre territoire. Nous avons déjà commencé à organiser une réponse, mais les dégâts causés sont irréversibles. Nous ne pouvons qu'espérer arrêter toute propagation supplémentaire."
 brazil_amazon.1.a: "Faisons ce que nous pouvons avec ce que nous avons."
 brazil_amazon.1.b: "Déployer l’armée pour aider."
 brazil_amazon.2.t: "Inondation du fleuve Amazone"
 brazil_amazon.2.d: "Une série de crues, provoquées par une saison particulièrement pluvieuse, ont inondé plusieurs sections du fleuve Amazone à proximité de nos centres de développement. Des opérations de recherche et de sauvetage sont déjà en cours, et des équipes de contrôle des dégâts sont sur place. Cependant, certaines zones, comme nos barrages dans la région, ont déjà subi des dommages importants."
 brazil_amazon.2.a: "Faisons ce que nous pouvons avec ce que nous avons"
 brazil_amazon.2.b: "Déployer l'armée pour aider à la recherche et au sauvetage"
 brazil_amazon.3.t: "Sécheresse dans les régions frontalières de l'Amazonie"
 brazil_amazon.3.d: "En raison de la contamination des eaux souterraines et du détournement des cours d'eau dans les régions qui entourent l'Amazonie, une sécheresse provoquée par un manque de pluies a frappé l'une de nos régions frontalières. L'hystérie générale s'est déjà installée, accompagnée de la perte de certaines parties des fragiles écosystèmes forestiers de la région frontalière."
 brazil_amazon.3.a: "Ils devraient mieux gérer leur eau"
 brazil_amazon.3.b: "Déployons rapidement autant de secours que possible !"
 brazil_amazon.4.t: "Une tempête tropicale frappe les régions amazoniennes"
 brazil_amazon.4.d: "Une tempête tropicale venue de l'Atlantique a balayé les terres et l'Amazonie, laissant derrière elle une traînée de destruction. Des maisons, des arbres et des industries ont été endommagés, et des opérations de recherche et de sauvetage sont déjà en cours. Les gens s'attendent à ce que nous réagissions en leur fournissant des secours."
 brazil_amazon.4.a: "Ils devraient construire des choses plus solides"
 brazil_amazon.4.b: "Déployons rapidement autant de secours que possible !"
 brazil_amazon.5.t: "Coupes à blanc illégales"
 brazil_amazon.5.d: "Nous avons été informés d’une opération de coupe à blanc illégale à la périphérie de l’Amazonie. Des tonnes de bois ont déjà été déplacées hors du site et ont commencé à circuler dans l’économie sans être marquées et probablement indétectables par nous. Il ne nous reste plus qu’à gérer les conséquences immédiates."
 brazil_amazon.5.a: "Faisons ce que nous pouvons à ce stade"
 brazil_amazon.5.b: "Ils connaissent le deal, où est notre part ?"
 brazil_amazon.6.t: "Cultures sur brûlis illégales"
 brazil_amazon.6.d: "Nous avons été informés d’une opération illégale de brûlis à la périphérie de l’Amazonie. Plusieurs hectares de terres ont déjà été détruits et sont maintenant labourés pour devenir des terres agricoles, utilisés comme pâturages pour le bétail ou utilisés comme sites pour de nouveaux projets. Comme ces individus peuvent être facilement expulsés si les autorités locales le décident, il ne nous reste plus qu’à gérer les conséquences immédiates."
 brazil_amazon.6.a: "Faisons le peu que nous pouvons à ce stade."
 brazil_amazon.6.b: "Ils connaissent le deal, où est notre part ?"
 brazil_amazon.7.t: "Une entreprise achète des terres protégées locales"
 brazil_amazon.7.d: "Une entreprise locale du pays a commencé à acheter certains des droits fonciers de conservation que nous avons récemment mis sur le marché. Elle cherche à exploiter les réserves locales de ressources en or, en cuivre et autres matériaux de la région."
 brazil_amazon.7.a: "Croissance stimulée, ressources trouvées"
 brazil_amazon.8.t: "La culture sur brûlis déclenche des feux de forêt"
 brazil_amazon.8.d: "Une récente opération de brûlis qui avait attiré notre attention semble s'être poursuivie malgré nos interventions. En fait, les opérations sont devenues plus effrontées qu'auparavant. Cela a conduit à un incident au cours duquel les incendies sont devenus incontrôlables."
 brazil_amazon.8.a: "Ces foutus imbéciles."
 brazil_amazon.8.b: "Heureusement, nous nous sommes préparés à une telle éventualité."
 brazil_amazon.9.t: "Le braconnage entraîne l’effondrement des écosystèmes"
 brazil_amazon.9.d: "An illegal poaching ring has recently been uncovered operating within one region of the Amazon. Their activities have already begun the process of ecosystem collapse within their area of operations. As these persons can be easily dealt with by local authorities, this just leaves the immediate effects for us to deal with."
 brazil_amazon.9.a: "Faisons le peu que nous pouvons à ce stade."
 brazil_amazon.9.b: "Demandez au Service des parcs nationaux de réintroduire des espèces fondamentales."
 brazil_amazon.9.c: "Ils connaissent le deal, où est notre part ?"
 brazil_amazon.10.t: "Incursions illégales sur les terres autochtones"
 brazil_amazon.10.d: "Des rapports font état d’incursions fréquentes et parfois violentes de criminels sur des terres indigènes situées en Amazonie. Les enjeux et les tensions augmentent et, compte tenu de la violence et de l’histoire du conflit, ce n’est qu’une question de temps avant que cela ne dégénère en violence. En outre, ces criminels causent des dommages aux forêts environnantes."
 brazil_amazon.10.a: "Ils disent que c'est leur terre, qu'ils s'en occupent."
 brazil_amazon.10.b: "Trouvez quelqu’un, n’importe qui, pour régler ce problème."
 brazil_amazon.10.c: "Envoyez l’armée pour régler ce problème."
 brazil_amazon.11.t: "Des incursions qui mènent à des meurtres"
 brazil_amazon.11.d: "Les récentes incursions de criminels ont conduit à une série de meurtres, impliquant à la fois les intrus et les autochtones. Il est impossible à ce stade de déterminer qui a commencé à tuer qui en premier. Il ne nous reste plus qu'à gérer les conséquences et à décider qui sera puni. Quoi que nous fassions, il sera difficile de garder le contrôle de la situation."
 brazil_amazon.11.a: "Nous ne pouvons rien y faire, que Dieu sauve leurs âmes."
 brazil_amazon.11.b: "Un cas typique de criminels tuant des autochtones."
 brazil_amazon.11.c: "Envoyez l’armée pour mettre fin à cela."
 brazil_amazon.12.t: "Les autochtones expriment leur gratitude"
 brazil_amazon.12.d: "En raison de nos récentes actions liées aux incursions sur les terres indigènes de l'Amazonie, nous avons reçu des remerciements officiels de la part des conseils tribaux pour nos actions. En guise de remerciement, ils se sont engagés à nous soutenir dans nos efforts politiques futurs dans la région."
 brazil_amazon.12.a: "Ce sont des citoyens respectueux des lois, ils méritent notre protection"
 brazil_amazon.13.t: "Localisation du champ de stupéfiants de la jungle"
 brazil_amazon.13.d: "Des rapports ont récemment filtré sur une plantation, gérée par les cartels, au cœur de notre territoire amazonien. L'opération a conduit à l'abattage d'un nombre important d'arbres pour faire place aux champs dans ce qui ressemble à une opération de brûlage très bâclée. La seule chose qui les retient à un certain niveau d'organisation est la peur évidente de brûler leur production."
 brazil_amazon.13.a: "Essayons d’y aller et faisons ce que nous pouvons."
 brazil_amazon.13.b: "Que nos forces de police coopèrent avec le commandement local de l’armée."
 brazil_amazon.13.c: "Oh ! C'est là qu'était ce champ, malin."
 brazil_amazon.14.t: "[?var:influence_array^0.GetName] Pressions en faveur de la conservation"
 brazil_amazon.14.d: "Nous avons récemment reçu plusieurs pétitions de nos partenaires internationaux pour accroître les efforts de conservation en Amazonie. Alors que nous aurions normalement pu ignorer ces demandes, notre principal partenaire commercial, [Largest Investor], a commencé à faire pression dans le même sens. En échange de notre coopération, il propose de relâcher son influence dans d'autres domaines."
 brazil_amazon.14.a: "Nous ne pouvons pas sacrifier nos valeurs pour des gains à court terme."
 brazil_amazon.14.b: "Conclure un accord lucratif est toujours bénéfique."
 brazil_amazon.15.t: "Débordement critique d'un barrage en Amazonie"
 brazil_amazon.15.d: "L'un de nos barrages situés en Amazonie a débordé en raison d'une montée rapide des eaux en amont. Les mesures de gestion des catastrophes sont déjà en cours, mais on ignore encore l'ampleur des dégâts. Dans le pire des cas, le barrage pourrait éclater sous l'effet de la pression, provoquant encore plus de dégâts en aval. Même si cela est peu probable, nous devrions envisager de nous préparer à cette éventualité."
 brazil_amazon.15.a: "Les chances sont minces, nous devrions seulement déployer ce qui est nécessaire maintenant."
 brazil_amazon.15.b: "Prévoyez le pire et commencez l’évacuation des régions en aval."
 brazil_amazon.16.t: "Rupture catastrophique d'un barrage"
 brazil_amazon.16.d: "Le pire est arrivé, quelques heures après notre dernier rapport sur le barrage qui avait débordé, une faille dans sa structure a provoqué son éclatement. L'eau s'est précipitée rapidement en aval et a tout emporté sur son passage. Les recherches et les secours sont déjà en cours mais pour des milliers de personnes et des millions de dollars d'infrastructures, il est déjà trop tard."
 brazil_amazon.16.a: "Ceci- Ceci n'était pas censé arriver…"
 brazil_amazon.16.b: "L'enfer sur Terre, déployons autant que nous pouvons dans la zone !"
 brazil_amazon.17.t: "Un barrage éclate"
 brazil_amazon.17.d: "A few hours following our last reports from the dam that had overflowed, a flaw in its structure caused it to burst wide open. Water rushed rapidly downstream and swept away anything in its path. Search and rescue is already underway but, due to our foresight, the only known casualties at this moment are a handful of technicians who died trying to avert the disaster and any trees or buildings caught in the path. Even this toll was lessened by planning and preparation. Already, we are being lauded for our foresight and plans are being drawn up to construct a memorial to the lost technicians."
 brazil_amazon.17.a: "Je ne peux qu’imaginer un monde où nous ne ferions rien."
 brazil_amazon.18.t: "Dam Overflow Subsides"
 brazil_amazon.18.d: "After several tense hours of waiting on news, a beleaguered dam technician has submitted a report that the overflow has subsided. While there is certainly some flooding, it is within manageable levels."
 brazil_amazon.18.a: "Et nous avons économisé de l’argent en ne faisant rien."
 brazil_amazon.19.t: "Dam Overflow Subsides"
 brazil_amazon.19.d: "After several tense hours of waiting on news, a beleaguered dam technician has submitted a report that the overflow has subsided. While there is certainly some flooding, it is within manageable levels. However, the possibility of a burst and the quick work of our disaster management teams has already made the headlines. People from dam technicians to local leaders are being lauded as heroes for averting the disaster."
 brazil_amazon.19.a: "Dans des moments comme ceux-ci, on a presque du plaisir à être un fonctionnaire."
 brazil_amazon.20.t: "Amazon ouvre un centre de distribution en Amazonas"
 brazil_amazon.20.d: "L'entreprise américaine Amazon a ouvert un centre de distribution à Manaus pour desservir la région de l'Amazonas. Le fait qu'une telle entreprise s'intéresse à cette région témoigne de son importance croissante sur la scène internationale."
 brazil_amazon.20.a: "Cela devient incontrôlable, maintenant ils sont deux."
 brazil_amazon.21.t: "L'Amazonie est dévastée"
 brazil_amazon.21.d: "The Amazon Rainforest's total acreage has fallen below fifty million acres. The rainforest has now reached an irreparable state due to overdevelopment, various disasters, and more. Although we have completely devastated the rainforest, the economic development appears to have been worthwhile in the short term — but the long-term destruction may not have been worth it."
 brazil_amazon.21.a: "Le tout dernier arbre à truffes de tous"
 brazil_amazon.22.t: "Une entreprise agro-industrielle investit dans les champs"
 brazil_amazon.22.d: "L’une des entreprises privées de notre pays spécialisée dans les produits agricoles a décidé d’investir dans les champs de la forêt amazonienne."
 brazil_amazon.22.a: "Génial ! Nouveaux quartiers."
 brazil_amazon.22.b: "Nier les nouveaux développements."
 brazil_amazon.23.t: "Les sociétés minières industrielles exploitent les réserves de ressources"
 brazil_amazon.23.d: "La forêt amazonienne possède de grandes réserves de ressources naturelles sous la jungle et la végétation dense. On peut y trouver diverses quantités de fer, de cuivre, de pétrole et bien plus encore sous la végétation et les sous-bois."
 brazil_amazon.23.a: "Génial ! Nouveaux quartiers."
 brazil_amazon.23.b: "Nier les nouveaux développements."
 brazil_amazon.24.t: "Une entreprise privée développe des infrastructures en Amazonie"
 brazil_amazon.24.d: "Les entreprises privées qui ont récemment été autorisées à développer des infrastructures ont proposé une nouvelle proposition de développement en Amazonie visant à étendre l'infrastructure des routes légères actuelles."
 brazil_amazon.24.a: "Génial ! Nouveaux quartiers."
 brazil_amazon.24.b: "Nier les nouveaux développements."
 brazil_amazon.25.t: "Des entreprises privées créent une nouvelle entreprise de construction"
 brazil_amazon.25.d: "A private company has decided to create a new Amazon-based construction firm to continue to develop the Amazon and the cities held within it."
 brazil_amazon.25.a: "Génial ! Nouveaux quartiers."
 brazil_amazon.25.b: "Nier les nouveaux développements."
 brazil_amazon.26.t: "Des entreprises privées replantent des portions de l'Amazonie"
 brazil_amazon.26.d: "A private company has decided to develop parts of the Amazon rainforest and plant additional trees in local conservation areas. The replanting has allowed some of the previously lost acreage to be regained."
 brazil_amazon.26.a: "Génial ! Nouveaux quartiers."
 brazil_amazon.26.b: "Nier les nouveaux développements."
 brazil.14.b: "Répression de la marche"
 brazil.42.t: "Le Brésil demande une aide pour régler sa dette"
 brazil.42.d: "[BRA.GetLeader] and a delegation have approached us today with a new deal. The Brazilian economy is currently hanging by a thread due to their looming debt crisis and their crippled currency. They have laid out a plan where our government will buy back debt from private investors. They appear quite desperate given the economic situation and the state of the Real. Should we go forward with the plan?"
 brazil.42.a: "Approuver le plan"
 brazil.42.b: "Refuser le plan"
 brazil.43.t1: "Les États-Unis ont accepté le plan"
 brazil.43.t2: "Les États-Unis rejettent le plan"
 brazil.43.d1: "The United States has returned our proposal affirming they agree to the plan. It will take a couple of days for everything to take effect, but they will help the Brazilian people."
 brazil.43.d2: "Les États-Unis ont refusé la proposition visant à alléger le fardeau de leur dette. C’est une véritable déception, mais il est temps que nous commencions à mettre en œuvre nos mesures d’austérité pour sauver notre pays du défaut de paiement."
 brazil.43.a: "Vous avez un ami en vous."
 brazil.43.b: "À travers les épreuves et les tribulations..."
 brazil.44.t: "Belém demande de couper et de brûler la canne à sucre"
 brazil.44.d: "Belém a demandé la déforestation et la mise à feu d'une partie des mangroves et de la forêt tropicale locales pour commencer à planter ses propres plantations de canne à sucre dans les banlieues de la ville, plus proches des zones les plus densément boisées. Devons-nous autoriser la déforestation et la mise à feu de certaines forêts ?"
 brazil.44.a: "Autoriser la culture sur brûlis"
 brazil.44.b: "Refuser la politique de brûlis"
 brazil_news.5.t: "L'Amazonie est dévastée"
 brazil_news.5.d: "The Brazilian authorities have released their monthly report on the total acreage cut and used for economic development. The total acreage has now fallen below fifty million, which means that the Amazon Rainforest has now reached an unrecoverable state. Time will only tell what the damage will do to the world and her ecosystems."
 brazil_news.5.a: "Le dernier tombe, et une nouvelle ère commence..."
 brazil_flavour_events.14.t: "Les démocrates se sont formés"
 brazil_flavour_events.14.d: "Le Front libéral a été refondé et réformé pour mieux représenter l'idéologie politique du parti. Il a désormais baptisé son parti politique « Les Démocrates » dans un effort pour mieux aligner son image et sa personnalité sur son soutien aux politiques de libre marché et à la démocratie et pour se distancer davantage de toute identification avec d'autres partis libéraux internationaux."
 brazil_flavour_events.14.a: "Un nouveau concurrent"
 BRA_nationalism_rise_TT: "§YUn parti brisé§! sera remplacé par la §YMontée du nationalisme§!\n§GL'augmentation de la popularité des nationalistes diminueront celle des démocrates§! et §Run coût plus important du poids politique§!"
 BRA_has_conserved_acreage_x_tt: "Possède une §Ysuperficie totale de forêt tropicale conservée§! de [?needed_acreage|0Y] ou plus (Superficie conservée actuelle : [?BRA_acres_conserved|Y])"
 BRA_has_wild_acreage_x_tt: "Possède une §Ysuperficie totale de forêt tropicale vierge§! de [?needed_acreage|0Y] ou plus (Superficie vierge actuelle : [?BRA_acres_wild|Y])"
 BRA_modern_frigate: "Frégate moderne"
 BRA_modern_frigate_desc: "Dans la guerre navale moderne, le rôle des frégates a été considérablement renforcé par rapport à avant, et il est impératif de développer nos propres frégates."
 BRA_unasul: "UNASUR"
 BRA_unasul_desc: "Nous avons besoin d'alliés ! Ne devrions-nous pas demander à d'autres pays d'Amérique du Sud de nous rejoindre pour former une alliance plus forte ?"
 brazil_amazon.27.t: "Johan Eliasch"
 brazil_amazon.27.d: "Johan Eliasch, un homme d'affaires suédois, est récemment arrivé aux États-Unis et a racheté l'entreprise forestière Gethal Amazonas. Le milliardaire a déclaré qu'il cesserait immédiatement les activités de l'entreprise, libérant ainsi les terres pour des actions de conservation supplémentaires. Nous pourrions considérer cela comme un cadeau ou choisir de nationaliser l'entreprise et de l'utiliser à nos propres fins. Que faire ?"
 brazil_amazon.27.a: "Génial ! Laissez-le le fermer."
