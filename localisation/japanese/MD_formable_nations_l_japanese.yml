 form_MAPHI_category: "マフィリンド"
 form_MAPHI_category_desc: "1960年代、マレー諸島における東南アジア3カ国による非政治的な連邦設立が提案されたが、インドネシアとマラヤ連邦の紛争により、この夢は実現しなかった。3カ国が統一されれば、世界の主要国に匹敵する国家が誕生するはずだった。"
 MAPHI_integrate_start: "[GetMAPHINameDef]形成の開始"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "インドネシアは、提案されている国家にとって、資源に恵まれた中核地域である。インドネシアがもたらす資源と人口のために、インドネシアを統合することが不可欠だ。"
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "フィリピンは太平洋における主要な海軍と貿易の拠点である。この国を統合することで、太平洋の覇権を確立する可能性が大幅に高まる。"
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "シンガポールは新国家にとって極めて重要な拠点である。主要な貿易港であり金融センターとしての地位は、新国家の成功にとって極めて重要だ。"
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "マレーシアは政治的に国家の中核地域の一つである。半島を領有することで、アジア内の陸路へのアクセスが可能になる。"
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "ブルネイはこの協定において小国である。小国ではあるが、統合が不可欠な国だ。"
 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 form_INDOCHI_category: "インドシナ"
 form_INDOCHI_category_desc: "インドシナは、1954年まで存在したベトナム、カンボジア、ラオスの3カ国からなる連邦制国家である。3カ国は世界有数の経済大国であり、膨大な人口を抱えている。深いジャングル、なだらかな丘陵地帯、山々、そして美しい海岸線に恵まれた国だ。その強さは、人々と、未来へと導く強い意志にある。"
 INDOCHI_integrate_start: "[GetINDOCHINameDef]形成の開始"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "ベトナムは山岳地帯と海岸沿いに豊富な天然資源を有している。ベトナムを統合することで、ベトナムに対する我々の支配力は強固なものになるだろう。"
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "ラオスもベトナム同様、膨大な天然資源を保有している。"
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "カンボジアの自然地理と豊かな土地は国家にとって重要だ。これらを国家に統合することで、国家は着実に発展していくだろう。"
 INDOCHI_update_flag: "Finish Forming [GetINDOCHINameDef]"
 INDOCHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetINDOCHINameDef], adopting its unified flag and name."
 form_ANDES_category: "アンデス連邦"
 form_ANDES_category_desc: "アンデス連邦は、[COL.GetNameWithFlag]、[PRU.GetNameWithFlag]、[BOL.GetNameWithFlag]の諸国による国家連合の構想である。これは、自由貿易・経済連合であるアンデス共同体を大まかにモデルとしている。この新国家は、総人口1億1300万人以上、面積470万平方キロメートルの規模となり、GDPは7500億ドルで、メキシコと同程度の規模となる。"
