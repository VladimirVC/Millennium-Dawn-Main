 SPECIAL_FORCES_MIXED: "混合指挥"
 SPECIAL_FORCES_MIXED_DESC: "该理论将特种部队构建为高度精锐的部队，其训练目标是执行复杂、高优先级的任务，这些任务需要精准性和谨慎性。特种部队精英理念强调先进能力的整合以及在各种环境下的作战效能。"
 SPECIAL_FORCES_MARINE_FOCUS: "以海军陆战队为主的特种部队"
 SPECIAL_FORCES_MARINE_FOCUS_DESC: "该理论主要侧重于海军陆战队单位，使我们有更多训练和部署海军陆战队的选择。但这却导致我们无法充分训练或装备其他特种部队分支。"
 SPECIAL_FORCES_AIRBORNE_FOCUS: "以空降部队为主的特种部队"
 SPECIAL_FORCES_AIRBORNE_FOCUS_DESC: "该理论主要侧重于空降部队，使我们拥有更多训练和部署空降部队的选择。但这却导致我们无法充分训练或装备其他特种部队分支。"
 SPECIAL_FORCES_RANGER_FOCUS: "以游骑兵为主的特种部队"
 SPECIAL_FORCES_RANGER_FOCUS_DESC: "该理论主要侧重于游骑兵，使我们有更多训练和部署游骑兵部队的选择。但这却导致我们无法充分训练或装备其他特种部队分支。"
 DOCTRINE_TRACK_MIXED_OPTIONS: "补充特种部队"
 AIRBORN_INTERDICTION: "空降拦截"
 AIRBORN_INTERDICTION_DESC: "该理论派遣轻型空降步兵和探路者小队深入敌后，破坏机场、补给线和通信设施。其作战理念强调渗透、爆破和延缓敌军行动，而非坚守阵地。"
 AIRBORN_AIRHEAD_ASSAULT: "空头突击"
 AIRBORN_AIRHEAD_ASSAULT_DESC: "该理论要求空降轻型和摩托化空降步兵，以大规模空降夺取并守住空降基地，直至援军抵达。空降突击概念强调集中空降、快速集结以及在反击下保持防御韧性。"
 RANGER_JUNGLE_FORCES: "丛林游骑兵"
 RANGER_JUNGLE_FORCES_DESC: "该理论帮助游骑兵做好在丛林深处持续作战的准备，那里的高温、疾病和破损的补给线击败了常规部队。丛林概念强调适应环境、渗透不可逾越的地形以及远离友军防线的自力更生。"
 MARINE_ELITE_RAIDERS: "海岸劫掠"
 MARINE_ELITE_RAIDERS_DESC: "该理论将海军陆战队编成小型突击队，负责打击沿海目标并在敌人反应过来之前撤退。海岸突击队的概念强调速度、渗透和轻装上阵。"
 MARINE_ARMORED_BEACHHEAD: "装甲抢滩登陆"
 MARINE_ARMORED_BEACHHEAD_DESC: "该理论旨在组织两栖部队在滩头阵地登陆并突破防线，赶在防守方巩固阵地之前完成。装甲滩头阵地作战理念强调机械化火力、推进势头和快速扩张。"
 AIRBORN_AIR_ASSAULT: "空中突击"
 AIRBORN_AIR_ASSAULT_DESC: "该理论以直升机空中突击而非伞降为核心构建空降部队。空中突击概念强调快速垂直包围、机动性和随时待命的旋翼机支援。"
 AIRBORN_ARMORED_DROP: "装甲空降"
 AIRBORN_ARMORED_DROP_DESC: "该理论为空降部队配备了可空投的装甲车辆和机械化纵队，以便在空降后持续作战。装甲空降作战理念强调在敌方纵深地带提供防护火力、组织性和持久作战能力。"
 RANGER_RECON_FORCES: "侦察游骑兵"
 RANGER_RECON_FORCES_DESC: "该理论训练游骑兵在主力部队前方进行纵深侦察、警戒和监视。侦察游骑兵的概念强调隐蔽性、野外生存技能和精确目标捕获。"
 RANGER_STRIKE_FORCES: "突击游骑兵"
 RANGER_STRIKE_FORCES_DESC: "该理论旨在使游骑兵能够快速突击并夺取机场，打击防御工事坚固的目标。突击游骑兵的作战理念强调冲击力、节奏和直接武力运用。"
 SOF_OPERATIONS_COMMAND: "特种作战司令部"
 SOF_OPERATIONS_COMMAND_DESC: "该理论设立了一个专门的指挥机构，负责组建和维持一流的特种作战部队。特种作战指挥理念强调在各种环境下进行有选择性的招募、训练和联合支援。"
 SOF_DIRECT_ACTION: "直接行动"
 SOF_DIRECT_ACTION_DESC: "该理论训练作战人员对高价值目标进行直接行动突袭。直接行动理念强调精确打击、快速渗透和果断的近距离交战。"
 SOF_SABOTAGE_SUBVERSION: "破坏和颠覆"
 SOF_SABOTAGE_SUBVERSION_DESC: "该理论旨在使作战人员做好在敌后进行破坏、颠覆和非常规战争的准备。破坏概念强调渗透、爆破和在没有补给的情况下长时间作战。"
 SOF_RECON_INTELLIGENCE: "特种侦察"
 SOF_RECON_INTELLIGENCE_DESC: "该理论强调特种部队的侦察、监视和情报收集。特种侦察理念注重轻装上阵、耐心观察和准确报告。"
 SOF_COUNTER_TERROR: "反恐"
 SOF_COUNTER_TERROR_DESC: "该理论训练作战人员进行反恐、人质救援和城市近距离作战。反恐理念强调战备、精准和快速反应。"
 SUBDOCTRINE_DESIGN_STEALTH: "隐形设计"
 SUBDOCTRINE_DESIGN_STEALTH_DESC: "该理论优先发展雷达反射截面更小、生存能力更强的飞机。隐身设计强调使用低可探测性材料、电子对抗措施以及能够最大限度减少被敌方传感器网络探测到的结构配置。"
 SUBDOCTRINE_DESIGN_EW: "电子战设计"
 SUBDOCTRINE_DESIGN_EW_DESC: "该理论侧重于将专用电子战系统集成到飞机平台中。电子战设计强调主动干扰、被动探测和压制能力，旨在降低敌方在整个作战环境中的防空效能。"
 SUBDOCTRINE_DESIGN_MODULAR: "模块化设计"
 SUBDOCTRINE_DESIGN_MODULAR_DESC: "该理论围绕开放式架构和标准化组件框架来组织飞机研发。模块化设计强调快速能力升级、降低全寿命周期成本以及灵活适应各种任务需求。"
 SUBDOCTRINE_HEAVY_AEW: "空中预警"
 SUBDOCTRINE_HEAVY_AEW_DESC: "该理论以空中监视和作战管理为核心构建大型飞机作战体系。空中预警概念强调广域探测、实时数据整合以及战区内空中力量的协调指挥。"
 SUBDOCTRINE_HEAVY_AIRLIFT: "战略空运"
 SUBDOCTRINE_HEAVY_AIRLIFT_DESC: "该理论围绕兵力、装备和物资的战略调动来组织重型飞机作战。战略空运概念强调全球投送能力、持续吞吐量和灵活部署，以支持远距离作战行动。"
 SUBDOCTRINE_HEAVY_REFUELING: "空中加油"
 SUBDOCTRINE_HEAVY_REFUELING_DESC: "该理论将加油机作战纳入持续空中作战计划。空中加油概念强调扩展作战范围、持续空中存在以及在多用途航空作战中协调燃油支援。"
 SUBDOCTRINE_MULTIROLE_DOMINANCE: "空中优势多用途"
 SUBDOCTRINE_MULTIROLE_DOMINANCE_DESC: "该理论以多用途飞机为主要平台来确立空中优势。空中优势多用途概念强调将超视距作战能力与多任务灵活性相结合，以争夺和控制制空权。"
 SUBDOCTRINE_MULTIROLE_CARRIER: "舰载多用途"
 SUBDOCTRINE_MULTIROLE_CARRIER_DESC: "该理论以航母部署和海上打击任务为核心，构建多用途飞机作战体系。航母多用途作战概念强调舰队协同作战、舰载拦截以及将空中力量融入海上作战计划。"
 SUBDOCTRINE_STRIKE_SEAD: "压制/摧毁敌方防空系统行动"
 SUBDOCTRINE_STRIKE_SEAD_DESC: "该理论围绕压制和摧毁敌方防空网络来组织攻击机作战行动。压制/摧毁敌方防空系统概念强调反辐射武器、协同电子攻击以及系统性地消除地面威胁，以确保在敌对空域的行动自由。"
 SUBDOCTRINE_STRIKE_INTERDICTION: "深度拦截"
 SUBDOCTRINE_STRIKE_INTERDICTION_DESC: "该理论侧重于利用攻击机通过精确的远程打击来破坏敌方的作战纵深。纵深打击概念强调防区外武器、目标规划和协同打击编队，以在敌方抵达前线之前削弱其作战能力。"
 SUBDOCTRINE_STRIKE_CAMPAIGN: "空中封锁行动"
 SUBDOCTRINE_STRIKE_CAMPAIGN_DESC: "该理论围绕对敌方地面部队的持续空中封锁行动，构建了打击和近距离空中支援飞机的作战体系。空中封锁作战概念强调持续存在、具备滞空能力的平台以及与前沿地面控制人员的紧密协作，以持续削弱敌方机动能力。"
 SUBDOCTRINE_FIGHTER_BVR: "超视距作战"
 SUBDOCTRINE_FIGHTER_BVR_DESC: "该理论以雷达制导导弹进行超视距空战为核心构建战斗机作战体系。超视距空战概念强调远程探测、多目标跟踪以及首发击落概率，旨在建立目视接触前击败敌机。"
 SUBDOCTRINE_FIGHTER_WVR: "视距内空战"
 SUBDOCTRINE_FIGHTER_WVR_DESC: "该理论训练战斗机飞行员在视距范围内进行近距离机动空战。视距内空战概念强调飞机的敏捷性、态势感知能力以及积极的进攻战术，以利用机炮和短程导弹在近距离交战中击落敌机。"
 SUBDOCTRINE_FIGHTER_STEALTH: "隐形战斗机行动"
 SUBDOCTRINE_FIGHTER_STEALTH_DESC: "该理论将第五代战斗机的作战行动构建在低可探测性渗透和先发制人交战的基础上。隐形战斗机的概念强调降低被探测性、内置武器以及协同渗透多层防空环境，从而在对手做出反应之前取得空中优势。"
 SUBDOCTRINE_FIGHTER_INTERCEPTOR: "专用拦截机"
 SUBDOCTRINE_FIGHTER_INTERCEPTOR_DESC: "该理论旨在组织战斗机部队，以便对侵犯领空行为和轰炸机拦截做出快速反应。专用拦截机概念强调高速紧急起飞程序、地面控制拦截程序以及基于区域的警戒态势，以保护本国和盟国的领空。"
 DOCTRINE_TRACK_DRONE_WARFARE: "无人机作战"
 GRAND_DOCTRINE_AUTONOMOUS_AIR: "自主空中行动"
 GRAND_DOCTRINE_AUTONOMOUS_AIR_DESC: "该主要学说体系围绕无人系统、远程作战和自主打击能力构建空中力量。自主空中作战概念强调降低飞行员风险、持续进行情报、监视和侦察，以及将无人平台融入空中作战的各个层面。"
 SUBDOCTRINE_DRONE_MALE: "中空长航时无人机行动"
 SUBDOCTRINE_DRONE_MALE_DESC: "该理论以中空长航时无人作战飞机为核心构建空中作战体系。中空长航时无人作战飞机概念强调持续监视、遥控打击任务以及在目标区域上空持续存在，以支援地面和联合作战行动。"
 SUBDOCTRINE_DRONE_UCAS: "无人战斗航空系统航母打击"
 SUBDOCTRINE_DRONE_UCAS_DESC: "该理论将无人作战空中系统融入航母打击群作战行动。无人作战空中系统航母概念强调隐蔽式舰载打击任务、扩展航母作战半径以及自主舰队防御，从而在不暴露飞行员的情况下从海上平台投射空中力量。"
 SUBDOCTRINE_DRONE_LOITERING: "游荡弹药"
 SUBDOCTRINE_DRONE_LOITERING_DESC: "该理论围绕着能够在攻击静止或移动目标前进行长时间飞行的游荡弹药构建打击行动。游荡弹药概念强调低成本饱和打击、反装甲精确打击和分布式发射，以在作战区域内提供持续的致命火力覆盖。"
 SUBDOCTRINE_DRONE_COUNTER: "反无人机行动"
 SUBDOCTRINE_DRONE_COUNTER_DESC: "该理论组织空军和地面部队，以探测、拦截和摧毁敌方无人机系统。反无人机概念强调多层电子干扰、专用拦截平台和集成式低空雷达，以保护部队和关键资产免受日益增长的无人系统威胁。"
 SUBDOCTRINE_DRONE_SWARM: "无人机集群集成"
 SUBDOCTRINE_DRONE_SWARM_DESC: "该理论以大量协同作战的自主和半自主平台为核心构建空中作战体系。无人机集群作战理念强调分布式目标打击、消耗性兵力运用以及有人/无人协同作战，旨在压倒敌方防御并产生大规模杀伤效果，同时降低机组人员的风险。"
 SUBDOCTRINE_OPERATION_COIN: "反叛乱行动"
 SUBDOCTRINE_OPERATION_COIN_DESC: "该理论构建了地面部队，通过人口控制、情报驱动的直接行动袭击和快速反应部队来击败非常规威胁。反叛乱行动强调持续存在和军民合作以恢复稳定。"
 SUBDOCTRINE_OPERATION_URBAN_WARFARE: "城市作战行动"
 SUBDOCTRINE_OPERATION_URBAN_WARFARE_DESC: "该理论使陆军专门从事城市和特大城市的作战。城市战行动强调逐节点清剿、渗透战术和相互交织的防御火力，以控制复杂的垂直和水平战场空间。"
