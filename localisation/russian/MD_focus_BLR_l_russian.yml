 BLR_pol_revol_category: "Привести к власти в Польше националистов, которые нам выгодны"
 BLR_pol_revol_category_desc: "Мы должны отомстить Польше за все годы попыток уничтожить нашу независимость, за унизительную Люблинскую унию и за разделение нашей страны в XX веке. Мы поставим польский народ в такое положение, когда у него не останется выбора, кроме как подчиняться нам."
 BLR_Establish_cooperation_pol: "Установить связи с польскими националистами"
 BLR_podlasie_return: "Вернуть Белосток Беларуси"
 BLR_podlasie_return_desc: "Белосток всегда был землей, населенной белорусами. Пришло время отвоевать эту землю у поляков и вернуть ее белорусскому государству."
 BLR_Duchy_claims_category: "Территориальные претензии"
 BLR_Duchy_claims_category_desc: "Мы хорошо помним историю Великого княжества Литовского и всех земель, находившихся под его властью. Мы заявляем о своих территориальных претензиях на все наши бывшие территории."
