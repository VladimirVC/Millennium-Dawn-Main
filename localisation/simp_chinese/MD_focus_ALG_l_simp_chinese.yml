 ALG_appoint_ouyahia_tt: "艾哈迈德·乌叶海亚是一位经验丰富的技术官僚，在体制内拥有深厚资历。"
 ALG_appoint_sellal_tt: "阿卜杜勒-马利克·塞拉勒为人可靠且忠诚，尽管并非特别富有活力。"
 ALG_appoint_djerad_tt: "阿卜杜勒-阿齐兹·杰拉德展现出改革派的形象，与既得利益集团的关系较为疏远。"
 ALG_appoint_benbitour_tt: "艾哈迈德·本比图尔能力出众且相对独立，但这可能会让既得利益者感到不安。"
 ALG_appoint_bedoui_pm_tt: "努尔丁·贝杜伊是总统府信赖的忠诚行政官员。"
 ALG_appoint_tebboune_tt: "阿卜杜勒-马吉德·特本展现出温和的改革派形象，并在一定程度上为文官控制留出了空间。"
 ALG_appoint_gaaid_salah_tt: "艾哈迈德·加伊德·萨拉赫与军方利益集团关系紧密。"
 ALG_appoint_civilian_mod_tt: "一位文职官员会削弱军方自主权，但可能引发抵制。"
 ALG_appoint_reformist_mod_tt: "一位改革派将领能在保持军事信誉的同时，加强文官监督。"
 ALG_appoint_hardliner_mod_tt: "一位强硬派将领能稳定军官团，并强化安全机构网络。"
