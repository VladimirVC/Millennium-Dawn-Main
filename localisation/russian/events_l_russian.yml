 UN.300.t: "Потеряна §YОрганизация Образования, Науки и Культуры§! §GСубсидии§!"
 UN.300.d: "По итогам ежегодной проверки бюджета, проведенной Бюджетным комитетом §Yобразовательной, научной и культурной организации§!, было установлено, что мы больше не соответствуем требованиям для получения §Yсубсидий§! §G образовательной, научной и культурной организации§!. В результате мы больше не можем участвовать в программе субсидирования. Мы можем подать заявку повторно, если будем соответствовать требованиям программы."
 UN.300.a: "Ладно"
 UN.301.t: "Потеряна §YОрганизация промышленного развития§! §GСубсидии§!"
 UN.301.d: "После ежегодного рассмотрения бюджета Бюджетным комитетом §YОрганизации промышленного развития§! было установлено, что мы больше не соответствуем требованиям для получения субсидий §YОрганизации промышленного развития§! §G§!. В результате у нас больше нет доступа к программе субсидирования. Мы можем подать повторную заявку в будущем, если выполним требования программы."
 UN.301.a: "Ладно"
 UN.302.t: "§YФонд развития капитала§!: §GСубсидии потеряны§!"
 UN.302.d: "После ежегодного рассмотрения бюджета Комитетом по бюджету §YФонда развития капитала§! было установлено, что мы больше не соответствуем требованиям для получения §GСубсидий§! §YФонда развития капитала§!. В результате мы больше не имеем доступа к программе субсидий. В будущем мы сможем подать заявку снова, если будем соответствовать требованиям программы."
 UN.302.a: "Ладно"
 recognition.16.t: "Узнаешь [FROM.GetName]?"
 recognition.16.d: "[FROM.GetNameDef] официально запрашивает у нас дипломатическое признание. Какой бы ответ мы ни дали, он будет воспринят как заявление о нашей позиции в отношении их суверенитета."
 recognition.16.a: "Мы не готовы их признать."
 recognition.16.b: "Мы признаем [FROM.GetName] суверенным государством."
 recognition.18.t: "Распознаёте [FROM.GetName]?"
 recognition.18.d: "Статус [FROM.GetNameDef] на мировой арене под вопросом. Каждая столица занимает свою позицию. Какова наша?"
 recognition.18.a: "Мы отказываемся их признавать."
 recognition.18.b: "Мы признаём суверенитет [FROM.GetName]."
 recognition.31.t: "[FROM.GetName] добивается нашего признания"
 recognition.31.d: "[FROM.GetNameDef] объявил о независимости от нашей территории и просит нас принять новую реальность. Наш ответ определит наши отношения с ними и даст понять другим о нашей позиции."
 recognition.31.a: "Мы никогда не признаем этот режим."
 recognition.31.b: "Мы признаём независимость [FROM.GetName]'."
 UNSC.10.t: "Принятая резолюция совета безопасности"
 UNSC.10.d: "Совет Безопасности ООН проголосовал за принятие резолюции против [?global.current_sc_vote_nation.GetNameWithFlag]. [?global.current_sc_vote_nation.UNSCGetResolutionTypePassDesc]"
 UNSC.10.a: "Отмечено."
 UNSC.11.t: "Резолюция совета безопасности против [This.GetNameWithFlag]"
 UNSC.11.d: "Совет безопасности ООН проголосовал за принятие резолюции против [This.GetNameWithFlag]. [UNSCGetResolutionTypePassDesc]"
 UNSC.11.a: "Мы признаем принятие этой резолюции."
 UNSC_pass_type_1_desc: "Принята резолюция, требующая прекращения всех наступательных военных операций в течение §Y210 дней§!. В случае невыполнения требований последуют новые санкции."
 UNSC_pass_type_2_desc: "Была принята резолюция об экономических санкциях, вводящая санкции в отношении торговли и научных исследований до тех пор, пока не прекратится наступательная угроза глобальному миру."
 UNSC_pass_type_3_desc: "Была принята резолюция об ограничении участия иностранных волонтеров. Любая страна, которая направит военных добровольцев в нарушение этой резолюции, столкнется с дополнительными санкциями."
 UNSC_pass_type_4_desc: "Была принята резолюция об эмбарго на поставки оружия, ограничивающая доступ к международному рынку вооружений до тех пор, пока не будут прекращены все наступательные конфликты."
 COVID_events.0.t: "Новый вирус"
 COVID_events.0.d: "Новый вирус появился в Ухане. Многочисленные врачи сообщают о быстро распространяющемся респираторном заболевании среди местного населения. Количество обращений выросло с однозначных цифр до десятков менее чем за неделю."
 COVID_events.0.a: "Внимательно следите за этим."
 COVID_events.1.t: "Врачи - осведомители"
 COVID_events.1.d: "Несколько врачей начали делиться сообщениями о новом вирусе в социальных сетях, сравнивая его с атипичной пневмонией. Местным властям нужны рекомендации. Мы можем замолчать сообщения, чтобы предотвратить панику, или позволить им распространяться и вызвать тревогу среди населения."
 COVID_events.1.a: "Заставьте их замолчать."
 COVID_events.1.b: "Позвольте правде выйти наружу."
 COVID_events.2.t: "Подтвержденная пандемия"
 COVID_events.2.d: "Всемирная организация здравоохранения подтвердила, что новый коронавирус представляет собой глобальную чрезвычайную ситуацию в области здравоохранения. Больницы переполнены, и вирус распространяется за пределы наших границ. Это изменит нашу экономику на долгие годы."
 COVID_events.2.a: "Приготовьтесь к удару."
 COVID_events.3.t: "Приготовьтесь к удару."
 COVID_events.3.d1: "Новый смертельно опасный коронавирус распространился из Китая, где власти первоначально подавляли сообщения о вспышке. Запоздалый ответ позволил вирусу беспрепятственно распространяться через международные границы."
 COVID_events.3.d2: "Новый смертельно опасный коронавирус, зародившийся в Китае, был объявлен глобальной пандемией. Несмотря на ранние предупреждения китайских врачей, вирус быстро распространился через международные границы."
 COVID_events.3.a: "Подготовьте наш ответ."
 COVID_events.4.t: "Пандемия достигает [This.GetName]"
 COVID_events.4.d: "Случаи заболевания COVID-19 были подтверждены на территории наших границ. Больницы готовятся к наплыву пациентов, и общественный страх растет. Экономическая активность практически останавливается по мере того, как граждане самоизолируются."
 COVID_events.4.a: "Заприте все на замок."
 COVID_events.5.t: "Крах глобальных цепочек поставок"
 COVID_events.5.d: "Пандемия опустошила международную торговлю. Закрытие заводов, остановка портов и узкие места на транспорте привели к острой нехватке компонентов и сырья по всему миру."
 COVID_events.5.a: "Запасите все, что осталось."
 pandemic_events.1.t: "Пандемия свиного гриппа"
 pandemic_events.1.d: "В Мексике был выявлен новый штамм гриппа H1N1, который быстро распространяется среди населения. Всемирная организация здравоохранения внимательно следит за ситуацией, поскольку число случаев заболевания растет, а вирус угрожает пересечь международные границы."
 pandemic_events.1.a: "Поднимите тревогу."
 pandemic_events.2.t: "H1N1 распространяется [This.GetName]"
 pandemic_events.2.d: "Случаи заболевания свиным гриппом H1N1 были подтверждены на территории нашей страны. Хотя вирус менее смертоносен, чем предполагалось первоначально, он быстро распространяется и истощает ресурсы здравоохранения."
 pandemic_events.2.a: "Раздавайте маски и надейтесь на лучшее."
 pandemic_events.3.t: "Вспышка БВРС"
 pandemic_events.3.d: "В нашей стране выявлен новый коронавирус, вызывающий Ближневосточный респираторный синдром. Вирус, по-видимому, передается от верблюдов к людям, при этом наблюдается тревожно высокий уровень смертности среди инфицированных. Больницы готовят изоляторы."
 pandemic_events.3.a: "Сдержать вспышку."
 pandemic_events.4.t: "Вспышка Эболы в Западной Африке"
 pandemic_events.4.d: "Вспышка вируса Эбола была подтверждена в сельских районах Гвинеи. Геморрагическая лихорадка распространяется по населенным пунктам с ужасающей скоростью, захлестывая местные клиники. Без немедленного вмешательства эпидемия может охватить весь регион."
 pandemic_events.4.a: "Да поможет нам всем Господь."
 pandemic_events.5.t: "Эбола распространяется на [This.GetName]"
 pandemic_events.5.d: "Случаи заболевания Эболой были подтверждены на территории наших границ, поскольку эпидемия в Западной Африке выходит из-под контроля. Медицинские работники подвергаются крайнему риску, и международные организации по оказанию помощи изо всех сил пытаются отреагировать."
 pandemic_events.5.a: "Нам нужна помощь. Сейчас же."
 pandemic_events.6.t: "Эбола возвращается в Конго"
 pandemic_events.6.d: "Новая вспышка Эболы вспыхнула в восточных провинциях Демократической Республики Конго. Вооруженный конфликт в регионе осложняет усилия по сдерживанию, поскольку медицинские работники подвергаются нападениям со стороны групп ополченцев, подозрительно относящихся к посторонним."
 pandemic_events.6.a: "Разверните медицинские бригады под вооруженным конвоем."
 pandemic_events.7.t: "Случаи БВРС в [This.GetName]"
 pandemic_events.7.d: "В нашей стране были выявлены случаи ближневосточного респираторного синдрома, которые, вероятно, были перенесены путешественниками из Саудовской Аравии. Органы здравоохранения разрабатывают протоколы скрининга в аэропортах и больницах."
 pandemic_events.7.a: "Проверяйте каждого путешественника."
 pandemic_events.8.t: "Случаи заболевания Эболой в [This.GetName]"
 pandemic_events.8.d: "Случаи заболевания Эболой пересекли границу с Демократической Республикой Конго. Трансграничное перемещение в регионе чрезвычайно затрудняет сдерживание, и работники здравоохранения спешат отследить контакты."
 pandemic_events.8.a: "Немедленно закройте границы."
 pandemic_events.9.t: "Вспышка БВРС в Южной Корее"
 pandemic_events.9.d: "Единственный пациент, вернувшийся с Ближнего Востока, спровоцировал разрушительное событие в больнице. Вирус распространяется по медицинским учреждениям, поскольку пациенты и персонал распространяют его между отделениями. Было подтверждено более сотни случаев заболевания и зарегистрировано десятки смертельных исходов, что свидетельствует о критических сбоях в наших протоколах инфекционного контроля."
 pandemic_events.9.a: "Закройте все пострадавшие больницы."
 influence.60.t: "Переворот в [event_target:coup_contest_victim.GetName]"
 influence.60.d: "Наши спецслужбы подтверждают то, о чем многие подозревали: [event_target:coup_contest_sender.GetNameWithFlag] организовала успешный §R переворот §! в [event_target:coup_contest_victim.GetNameWithFlag], установив новый режим, отвечающий ее интересам.  Мы обладаем значительным §H влиянием §! в [event_target:coup_contest_victim.GetName] — достаточным для того, чтобы не оставаться безучастными, если решим действовать.  У нас есть разные варианты — от дипломатического осуждения до тайной поддержки прежнего режима.  Каждый из них имеет свою цену.  Бездействие может обойтись нам еще дороже."
 influence.60.a: "Публично осудить и наложить санкции на [event_target:coup_contest_sender.GetName]"
 influence.60.f: "Ввести адресные §Hэкономические санкции§! против [event_target:coup_contest_sender.GetName]"
 influence.60.b: "Поддерживайте старую оппозицию тайно и расширяйте собственное влияние."
 influence.60.e: "§RВоенная интервенция§! — вооружить сопротивление и занять оборонительную позицию [event_target:coup_contest_sender.GetName]"
 influence.60.c: "Примите новую реальность и двигайтесь дальше."
 influence.61.t: "Гражданская война в [event_target:coup_contest_victim.GetName]"
 influence.61.d: "[event_target:coup_contest_sender.GetNameWithFlag]Попытка государственного переворота провалилась: [event_target:coup_contest_victim.GetNameWithFlag] находится в состоянии §Rгражданской войны§!, и старый режим все еще сопротивляется. Наше §Hвлияние§! позволяет нам влиять на то, какая сторона одержит верх. Вооружим старое правительство, и мы сможем помешать [event_target:coup_contest_sender.GetName] закрепить свои успехи. Посылайте только деньги, и мы будем подстраховываться. Вкладывайтесь по полной, и мы будем дергать за ниточки. Не вмешивайтесь, и пусть исход решают другие."
 influence.61.a: "Вооружить старый режим — оружием, техникой и политической поддержкой."
 influence.61.b: "Незаметно направьте экономическую помощь, чтобы удержать старый режим на плаву."
 influence.61.e: "§RПолная военная интервенция§! — победа старого режима"
 influence.61.c: "Держитесь подальше от гражданской войны"
 News_influence.7.t: "[FROM.GetNameWithFlag] Одобряет [event_target:coup_contest_sender.GetNameWithFlag]"
 News_influence.7.d: "[FROM.GetNameWithFlag] Сегодня [event_target:coup_contest_sender.GetNameWithFlag] выступила с резкой критикой предполагаемой роли [event_target:coup_contest_victim.GetNameWithFlag] в недавнем перевороте в .§H В качестве ответных мер рассматриваются дипломатические протесты, целенаправленные §!санкции  и ухудшение отношений. Министерство иностранных дел [event_target:coup_contest_sender.GetName] назвало обвинения «безосновательным политическим фарсом», но международное сообщество быстро ужесточает свою позицию."
 News_influence.7.a: "Первый выстрел в войне за влияние"
 News_influence.8.t: "[FROM.GetNameWithFlag] Поддерживает старую оппозицию в [event_target:coup_contest_victim.GetName]"
 News_influence.8.d: "Источники в разведке подтверждают то, о чем наблюдатели подозревали уже несколько недель: [FROM.GetNameWithFlag] тайно направляет §H финансирование§! и §H политическую поддержку§! оппозиционным силам, существовавшим до переворота, внутри [event_target:coup_contest_victim.GetNameWithFlag]. Демократические фракции внутри страны внезапно стали более организованными, лучше финансируемыми и заметно более активными. §H Переворотный режим§! в [event_target:coup_contest_victim.GetName] назвал эту деятельность «неприемлемым иностранным вмешательством» — тем самым вмешательством, которое они осуществляли, чтобы прийти к власти."
 News_influence.8.a: "Конкурс для [event_target:coup_contest_victim.GetName] еще не завершен."
 News_influence.9.t: "[FROM.GetNameWithFlag] Вооружает старый режим [event_target:coup_contest_victim.GetName]"
 News_influence.9.d: "[event_target:coup_contest_victim.GetNameWithFlag]Охваченный §Rгражданской войной§! после [event_target:coup_contest_sender.GetNameWithFlag]неудачного государственного переворота, [FROM.GetNameWithFlag] отбросил всякие претензии на нейтралитет. Грузовые рейсы из [FROM.GetName] приземляются на подконтрольной правительству территории, загруженные §Hстрелковым оружием§!, §Hтранспортными средствами§! и - согласно многочисленным источникам — \"советниками\" в форме. Опосредованная война теперь идет в открытую."
 News_influence.9.a: "Впереди долгая борьба"
 News_influence.10.t: "[FROM.GetNameWithFlag] Открывает запрос на военную интервенцию по адресу [event_target:coup_contest_victim.GetName]"
 News_influence.10.d: "В ответ на [event_target:coup_contest_sender.GetNameWithFlag]'с переворот в [event_target:coup_contest_victim.GetNameWithFlag] [FROM.GetNameWithFlag] объявил о формальной §Rвоенной интервенции§!. Высказывания сдержанные, но суть не в этом: переброска войск, прямые указания на оказание помощи правительству, существовавшему до переворота, и открытое неуважение к [event_target:coup_contest_sender.GetName]'с свершившемуся факту. Мировые рынки в смятении. Совет Безопасности ООН созван на экстренное заседание."
 News_influence.10.a: "Рубеж перейден."
 influence.52.e: "§HПакет «Современное оборудование§!» (тяжелая артиллерия, ЗРК, дроны)"
 influence.52.a_preview_tt: "Направить стрелковое оружие, легкие противотанковые средства и зенитную технику."
 influence.52.b_preview_tt: "Отправьте основные боевые танки, амфибийные/специализированные танки и вспомогательную технику."
 influence.52.e_preview_tt: "Направить тяжелые противотанковые ракеты, зенитные ракеты и военные беспилотники."
 influence.57.t: "Насколько велика посылка?"
 influence.57.d: "Мы решили, что отправить. Теперь нужно решить, §Hсколько§!. Чем больше посылка, тем больше §Hполитического капитала§! она стоит, тем больше §Rнапряженности в мире§! она вызывает и тем больше внимания к ней в международных новостях."
 influence.57.a: "Отправьте посылку §Hмалого§! размера"
 influence.57.b: "Отправьте посылку §Hсреднего§!"
 influence.57.c: "Отправьте §Hкрупную§! посылку"
 influence.57.e: "Подумав ещё раз, отменю."
 News_influence.11.t: "[event_target:aid_donor.GetNameWithFlag] Отправляет крупный пакет вооружений [event_target:aid_recipient.GetName]"
 News_influence.11.d: "[event_target:aid_donor.GetNameWithFlag] объявила о выделении §Hкрупного пакета военной помощи§! для [event_target:aid_recipient.GetNameWithFlag] — тысячи единиц стрелкового оружия, транспортных средств и вспомогательного оборудования. Аналитики отмечают, что эта передача свидетельствует об усилении приверженности [event_target:aid_donor.GetName]'s защите [event_target:aid_recipient.GetName]'s. Противники в ярости, а союзники следят за тем, кто станет следующим."
 News_influence.11.a: "Оружие продолжает поступать."
 News_influence.12.t: "[event_target:aid_donor.GetNameWithFlag] Передает улучшенное оружие [event_target:aid_recipient.GetName]"
 News_influence.12.d: "В рамках сделки, которая пересекает все красные линии на мировом рынке вооружений, [event_target:aid_donor.GetNameWithFlag] поставила §Hтяжелые противотанковые ракеты§!, §Hсистемы «земля — воздух»§! и §Hбоевые беспилотники§! в [event_target:aid_recipient.GetNameWithFlag]. Каждое из этих вооружений способно превратить региональные стычки в полномасштабные войны.  [event_target:aid_recipient.GetName]'s соперники называют это прямой угрозой. Дипломатические телефоны звонят не переставая."
 News_influence.12.a: "Современная война получила современное оружие."
 recognition.40.t: "[ROOT.GetName] Приближается к международному признанию"
 recognition.40.d: "[ROOT.GetNameDef] теперь признан двадцатью пятью государствами-членами ООН. Их заявка на членство набирает обороты в столицах разных стран мира."
 recognition.40.a: "Мы принимаем к сведению данное развитие событий."
 recognition.41.t: "[ROOT.GetName] Достигает признания большинства"
 recognition.41.d: "[ROOT.GetNameDef] теперь признан пятьюдесятью государствами-членами ООН, чего достаточно для того, чтобы всерьёз подать заявку на официальное членство в ООН."
 recognition.41.a: "Порог достигнут."
 recognition.42.t: "[ROOT.GetName] пользуется практически всеобщим признанием."
 recognition.42.d: "[ROOT.GetNameDef] признан сотней государств-членов ООН. Международное сообщество в значительной степени признало их суверенным государством."
 recognition.42.a: "Их место за столом гарантировано."
 influence.2.t: "Предложить экономическую помощь [FROM.GetName]?"
 influence.2.d: "Мы решили начать подготовку пакета экономической помощи для [FROM.GetName]. Мы можем перевести фиксированную сумму непосредственно из нашей казны. Эта щедрость улучшит отношения и даст нам влияние в [FROM.GetName]. Чем больше мы дадим, тем больше влияния получим.\n\n"
 influence.2.a: "Отправьте §G25 миллиардов§! долларов в качестве экономической помощи."
 influence.2.b: "Отправьте §G50 миллиардов§! долларов в качестве экономической помощи."
 influence.2.c: "Отправьте §G75 миллиардов§! долларов в качестве экономической помощи."
 influence.2.e: "Отправьте §G100 миллиардов§! в качестве экономической помощи."
 generic.5.f: "We are better off without them."