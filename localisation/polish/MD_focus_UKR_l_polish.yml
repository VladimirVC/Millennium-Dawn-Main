 UKR_party_regions_start: "Partia Regionów"
 UKR_party_regions_start_desc: "Janukowycz wziął władzę w kraju w swoje ręce, czas na regiony!"
 UKR_party_regions_inaguration: "Inauguracja Janukowycza"
 UKR_party_regions_inaguration_desc: "It is time for the inauguration of our new president."
 UKR_party_regions_decrease: "Zmniejsz personel administracyjny"
 UKR_party_regions_decrease_desc: "We will reduce the number of employees of the state apparatus."
 UKR_party_regions_anti_corrupt: "Krajowy Komitet Antykorupcyjny"
 UKR_party_regions_anti_corrupt_desc: "We will create a new ministry, the national Anti-Corruption Committee, to combat corrupt officials in our country."
 UKR_party_regions_unifed_window: "Ujednolicone inwestycje w okna"
 UKR_party_regions_unifed_window_desc: "We will introduce new rules for investors in our country, which will make it easier for them to interact with our authorities."
 UKR_party_regions_decrease_agro: "Zmniejszenie przepisów dotyczących rolnictwa"
 UKR_party_regions_decrease_agro_desc: "Przemysł rolniczy odniesie nowe korzyści, dzięki czemu mamy nadzieję zwiększyć jego produktywność."
 UKR_party_regions_laizes: "Laissez-faire"
 UKR_party_regions_laizes_desc: "We will partially adopt one of the libertarian principles in our economic policy and will not interfere in economic processes."
 UKR_party_regions_taxx: "Zmień kodeks podatkowy"
 UKR_party_regions_taxx_desc: "Wprowadzimy zmiany w ordynacji podatkowej, które uznamy za konieczne. Nasze koncesje obniżą podatki lokalne aż trzykrotnie!"
 UKR_party_regions_autocracy: "Wzmocnij autokrację"
 UKR_party_regions_autocracy_desc: "A strong government must control everything it can, otherwise it is chaos and disorder that existed before our rule."
 UKR_party_regions_pressure_media: "Presja na media"
 UKR_party_regions_pressure_media_desc: "The media has become too free, it is necessary to cool their ardor."
 UKR_party_regions_stability_reform: "Stabilność i reforma"
 UKR_party_regions_stability_reform_desc: "We will assemble a loyal coalition of politicians, which we will call \"Stability and Reforms\", which will actively promote our projects and ideas."
 UKR_party_regions_stability_restricting_freedom_speech: "Ograniczanie wolności słowa"
 UKR_party_regions_stability_restricting_freedom_speech_desc: "Freedom of speech ends where it begins to offend us."
 UKR_party_regions_stability_purge_opposition: "Próba oczyszczenia opozycji politycznej"
 UKR_party_regions_stability_purge_opposition_desc: "The opposition is too self-willed and undermines the institutions of power using its freedom, it's time to fix this."
 UKR_party_regions_lustration: "Lustracja Korpusu Gubernatora i Agencji Bezpieczeństwa"
 UKR_party_regions_lustration_desc: "Lustration of disloyal and openly harmful to the state people in these structures has long been necessary."
 UKR_party_regions_agreement_opposition: "Porozumienia z opozycją"
 UKR_party_regions_agreement_opposition_desc: "We will try to establish relations with some part of the opposition, thereby dividing it."
 UKR_party_regions_appease_the_westermists: "Udobruchaj Zachodowców"
 UKR_party_regions_appease_the_westermists_desc: "Western Ukraine has long been a hotbed of discontent and instability, we will appease them, I will try to give them what they want - promises."
 UKR_party_regions_request_russian: "Zapytaj o rosyjskie inwestycje"
 UKR_party_regions_request_russian_desc: "Będziemy zabiegać o inwestycje rosyjskie, nie będą one oczywiście zbędne."
 UKR_party_regions_personal_gain: "Skoncentruj się na osobistych korzyściach"
 UKR_party_regions_personal_gain_desc: "The country is certainly good, but it's worth thinking about yourself."
 UKR_party_regions_titushki: "Zbierz Titushki"
 UKR_party_regions_titushki_desc: "Zastosujemy nową metodę dyskredytacji wieców opozycji – Tituszki."
 UKR_party_regions_regional_council: "Rada Regionalna"
 UKR_party_regions_regional_council_desc: "We will introduce a new authority, the regional council, to facilitate the interaction of regional and state authorities."
 UKR_party_regions_optimise_east_ukraine_gamble: "Hazard na wschodniej Ukrainie"
 UKR_party_regions_optimise_east_ukraine_gamble_desc: "Eastern Ukraine has always been our patrimony, we will actively try to get their support, because in fact they are our main electorate."
 UKR_party_regions_optimise_prior_loyals: "Priorytetowo traktuj lojalnych"
 UKR_party_regions_optimise_prior_loyals_desc: "People loyal to us are much more important and we will actively promote them."
 UKR_party_regions_western_oligarch: "Podejdź do zachodnich oligarchów"
 UKR_party_regions_western_oligarch_desc: "The oligarchs of western Ukraine will be our priority, we want to find a balance between the west and the east, perhaps their oligarchs will help us."
 UKR_party_regions_meet_akhmetov: "Spotkaj się z Achmetowem"
 UKR_party_regions_meet_akhmetov_desc: "The Donetsk clan of oligarchs, and its representative Rinat Akhmetov, an important political resource that we use to maintain our power, it is worth listening to him."
 UKR_party_regions_informational_act: "Ustawa informacyjna"
 UKR_party_regions_informational_act_desc: "The new act, or law, will open access to the broad masses to the activities of politicians, which will reduce the corruption component in their activities."
 UKR_party_regions_optimise_ministries: "Optymalizacja ministerstw"
 UKR_party_regions_optimise_ministries_desc: "Government structures have become too huge, it's time to reduce them."
 UKR_party_regions_reform_constituion: "Reforma Konstytucji"
 UKR_party_regions_reform_constituion_desc: "Będziemy aktywnie promować reformę konstytucji, czas, aby nasz kraj ruszył w stronę globalnych zmian!"
 UKR_party_regions_compulsory: "Zmiana obowiązkowej służby wojskowej"
 UKR_party_regions_compulsory_desc: "We will change the system of service in our army, literally turning it into a contract one."
 UKR_party_regions_pension_reform: "Reforma emerytalna"
 UKR_party_regions_pension_reform_desc: "Pension reform has been brewing for a long time and now we will carry it out."
 UKR_party_regions_kozhara: "Kozhara jest liderem MID"
 UKR_party_regions_kozhara_desc: "We will appoint one of our friends and partners as Foreign Minister."
 UKR_party_regions_youth_region: "Rozwiń Regiony Młodzieżowe"
 UKR_party_regions_youth_region_desc: "The youth wing of our party will gain more power and influence, we will open access to them."
 UKR_party_regions_berkut_reforms: "Reformy Berkuta"
 UKR_party_regions_berkut_reforms_desc: "Berkut, as a police structure, needs reforms so that we can protect ourselves."
 UKR_party_regions_berkut_extreme_training: "Ekstremalny trening dla Berkuta"
 UKR_party_regions_berkut_extreme_training_desc: "Berkut will become even more active in conducting competitions and training processes to improve its skill."
 UKR_dual_language: "Państwo dwujęzyczne"
 UKR_dual_language_desc: "The Russian language occupies an important part of the life of Ukraine and it would be foolish to deny it. We will not promote stupid political ideas about the abolition of the Russian language in our country."
 UKR_cancel_decommunization: "Przeciwko dekomunizacji"
 UKR_cancel_decommunization_desc: "Nie pozwolimy na walkę z naszą sowiecką przeszłością, kiedy walczyliśmy z faszyzmem i nazizmem."
 UKR_donbass_autonomy_pass: "Specjalna Autonomia Donbasu"
 UKR_donbass_autonomy_pass_desc: "Donbass is a special region of our country, perhaps it's time to start a discussion about the special autonomy of this region."
 UKR_sng_integrate: "Integracja z WNP"
 UKR_sng_integrate_desc: "We will continue integration processes within the framework of cooperation between the CIS countries."
 UKR_europe_negotiat: "Negocjacje UE"
 UKR_europe_negotiat_desc: "We will start negotiations with the European Union on an issue that has been on our political agenda for a long time. This is an association with the European Union."
 UKR_russian_ukrainian_military_coop: "Ukraińsko-rosyjska współpraca wojskowa"
 UKR_russian_ukrainian_military_coop_desc: "We will strengthen cooperation with the Russian Armed Forces."
 UKR_party_regions_european_chart: "Europejska karta językowa"
 UKR_party_regions_european_chart_desc: "We will sign the European Charter of Regional Languages as an indicator of our democratic attitude towards national minorities."
 UKR_parti_regions_anti_corruption_commitie: "Krajowy Komitet Antykorupcyjny"
 UKR_parti_regions_anti_corruption_commitie_desc: "The new committee is designed to fight corrupt officials at all levels."
 UKR_parti_regions_invest_open_window: "Ujednolicone inwestycje w okna"
 UKR_parti_regions_taxx: "Zreformowany kodeks podatkowy"
 UKR_parti_regions_laizes: "Laissez-faire"
 UKR_parti_regions_stability_reform: "Stabilność i reforma"
 UKR_parti_regions_lustration: "Lustracje"
 UKR_parti_regions_opposition_agree: "Współpraca z opozycją"
 UKR_parti_regions_titushki: "Tytuszki"
 UKR_parti_regions_optimise_ministers: "Optymalizacja ministerstw"
 UKR_parti_regions_inform_act: "Ustawa informacyjna"
 UKR_parti_regions_pension_reform: "Reforma emerytalna"
 UKR_parti_regions_youth_regions: "Regiony Młodzieżowe"
 UKR_parti_regions_autocracy: "Autokracja Janukowycza"
 UKR_parti_regions_autocracy_desc: "Działania Janukowycza powszechnie nazwano prawdziwą autokracją, ale czy jest to ważne dla dobra państwa?"
 ukraine_regions.7.t: "Inwestycje na Ukrainie"
 ukraine_regions.7.d: "Prezydent Ukrainy poprosił nas o inwestycje w jego kraju, czy powinniśmy zgodzić się na jego propozycję?"
 ukraine_regions.7.a: "Tak"
 ukraine_regions.7.b: "Nie"
 ukraine_regions.8.t: "Inwestycje na Ukrainie"
 ukraine_regions.8.d: "Russia has agreed to invest in our country."
 ukraine_regions.8.a: "Ładny"
 ukraine_regions.9.t: "Inwestycje na Ukrainie"
 ukraine_regions.9.d: "Russia refused to invest in our country."
 ukraine_regions.9.a: "Smutny"
 ukraine_regions.10.t: "Współpraca z WNP"
 ukraine_regions.10.d: "W ostatnich latach nie współpracowaliśmy aktywnie z krajami WNP i pewna część opozycyjnego społeczeństwa również może być oburzona naszą decyzją o kontynuowaniu współpracy, ale musimy się zdecydować, czy powinniśmy to robić?"
 ukraine_regions.10.a: "Oczywiście"
 ukraine_regions.10.b: "Nie"
 ukraine_regions.11.t: "Negocjacje stowarzyszeniowe z UE"
 ukraine_regions.11.d: "Czas rozpocząć negocjacje stowarzyszeniowe z Unią Europejską, do rozpoczęcia których tak długo zabiegaliśmy, czas wreszcie zdecydować, czy je rozpoczniemy?"
 ukraine_regions.11.a: "Oczywiście"
 ukraine_regions.11.b: "Nie"
 ukraine_regions.12.t: "Wydanie Statusu Donbasu"
 ukraine_regions.12.d: "Od wielu lat słyszymy o propozycjach nadania Donbasu specjalnego statusu, rozpoczynając tym samym powolny proces federalizacji Ukrainy. To poważna decyzja, którą musimy podjąć, mając świadomość, że nie będzie już odwrotu."
 ukraine_regions.12.a: "Nadamy im specjalny status"
 ukraine_regions.12.b: "Zostawmy to tak jak jest"
