 SOV.liberalism_alt: "£SOV_navalnyu （PA）人民同盟"
 SOV.liberalism_alt_icon: "£SOV_navalnyu"
 SOV.liberalism_alt_desc: "自由進歩主義 ｰ 人民同盟（ロシア語ローマ字表記：Narodnyy Al'yans）\n\n人民同盟は、ロシアの著名な政治家アレクセイ・ナワリヌイによって創設された自由進歩主義政党である。反腐敗、自由主義、市場経済を掲げている。"
 SOV.liberalism_alty: "£SOV_western_social_democrat33 （PP）進歩党"
 SOV.liberalism_alty_icon: "£SOV_western_social_democrat33"
 SOV.liberalism_alty_desc: "自由進歩主義 ｰ 進歩党（ロシア語ローマ字表記：Partiya Progressa）\n\n進歩党は、ロシアの著名な政治家アレクセイ・ナワリヌイによって創設された自由進歩主義政党である。反腐敗、自由主義、市場経済を掲げている。"
 SOV.liberalism_altyn: "£SOV_future （RF）ロシアの未来"
 SOV.liberalism_altyn_icon: "£SOV_future"
 SOV.liberalism_altyn_desc: "自由進歩主義 ｰ 未来のロシア（ロシア語ローマ字表記：Rossiya Budushchego）\n\n未来のロシアは、ロシアの著名な政治家アレクセイ・ナワリヌイによって創設された自由進歩主義政党である。反腐敗、自由主義、市場経済を掲げている。"
 SOV.liberalism_nat: "£SOV_narod (NAROD) 国民民主党「ナロード」"
 SOV.liberalism_nat_icon: "£SOV_narod"
 SOV.liberalism_nat_desc: "国民民主主義 ｰ 国民民主党「ナロード」（ロシア語ローマ字表記：Natsional-democraticheskaya Partiya 'NAROD'）\n\n ナロードは、ロシアの著名な政治家アレクセイ・ナワリヌイによって創設された国民民主主義政党である。反腐敗、ナショナリズム、民主主義を掲げている。"
 SOV.socialism_alt: "£SOV_socialist_alt (SR) 社会革命党"
 SOV.socialism_alt_icon: "£SOV_socialist_alt"
 SOV.socialism_alt_desc: "民主社会主義 ｰ 社会革命党（ロシア語ローマ字表記：Partiya Sotsialistov Revolutsionerov）\n\n 社会革命党はロシア帝国に存在した急進的な左翼政党であった。同党は、国家による土地の社会化を通じて土地問題を解決し、土地を全民共有とすること、ツァーリ専制を打倒して民主共和国を樹立し、広範な人民改革を実施することを主張した。しかし、ボリシェヴィキが権力を掌握すると、右派派閥の多くの党員は弾圧されたり国外へ亡命したりした。とはいえ、その思想は忘れ去られることはなかった。公正ロシア党の分裂を受け、民主派は党を離脱し、再び社会革命党を再結成することを決定した。"
 SOV.socialism_dem: "£SOV_democratic_soyus (DU) 民主連合"
 SOV.socialism_dem_icon: "£SOV_democratic_soyus"
 SOV.socialism_dem_desc: "急進自由主義 ｰ 民主連合（ロシア語ローマ字表記：Demokraticheskiy Soyuz）\n\n 民主連合は、1988年にソ連の反体制派と人権活動家によって設立された最も古い政治組織である。同連合は政治体制の民主化、脱共産主義化、平和主義を提唱し、権威主義に反対する。"
 SOV.Communist-State_alt: "£SOV_gorba (SDPR) ロシア社会民主党"
 SOV.Communist-State_alt_icon: "£SOV_gorba"
 SOV.Communist-State_alt_desc: "民主社会主義 ｰ ロシア社会民主党（ロシア語ローマ字表記：Sotsial-Demokraticheskaya Partiya Rossii）\n\n SDPRはロシア連邦共産党から派生した広範な社会主義政党である。民主社会主義を掲げ、ペレストロイカとグラスノスチの方針を支持する。"
 SOV.Communist-State_alty: "£SOV_kpss (CPSU) ソビエト連邦共産党 - §G中央派§!"
 SOV.Communist-State_alty_icon: "£SOV_kpss"
 SOV.Communist-State_alty_desc: "マルクス・レーニン主義 ｰ ソビエト連邦共産党（ロシア語ローマ字表記：Kommunisticheskaya Partiya Sovietskogo Soyuza）\n\n ソビエト連邦共産党はソビエト連邦の与党である。21世紀に復活した同党は、今もなおマルクス・レーニン主義と民主集中制を掲げている。"
 SOV.anarchist_communism_1: "£SOV_left_wing_radical_1 （JR）公正ロシア"
 SOV.anarchist_communism_1_icon: "£SOV_left_wing_radical_1"
 SOV.anarchist_communism_1_desc: "左派ポピュリズム ｰ 公正ロシア（ロシア語ローマ字表記：Spravedlivaya Rossiya）\n\n公正ロシアは、様々な左派民族主義、社会主義、進歩主義政党の統合によって誕生した。党は自らを社会主義と位置付けているが、実際には左派民族主義者と左派自由主義派を含む広範な左派連合である。同党は社会プログラムの拡充と国家の経済へのより大きな関与を提唱している。"
 SOV.Neutral_Communism_alt: "£SOV_kpss （CPSU）ソビエト連邦共産党 - §g強硬派§!"
 SOV.Neutral_Communism_alt_icon: "£SOV_kpss"
 SOV.Neutral_Communism_alt_desc: "マルクス・レーニン主義 ｰ ソビエト連邦共産党（ロシア語ローマ字表記：Kommunisticheskaya Partiya Sovietskogo Soyuza）\n\n ソビエト連邦共産党はソビエト連邦の与党である。21世紀に復活した同党は、今もなおマルクス・レーニン主義と民主集中制を掲げている。"
 SOV.neutral_Social_1: "£SOV_non_aligned_socialist_democrat_1 (NP) 新しい人々"
 SOV.neutral_Social_1_icon: "£SOV_non_aligned_socialist_democrat_1"
 SOV.Nat_Populism_alt: "£SOV_ldpss (LDPSS) ソビエト連邦自由民主党"
 SOV.Nat_Populism_alt_icon: "£SOV_ldpss"
 SOV.Nat_Populism_alt_desc: "国民ポピュリズム ｰ ソビエト連邦自由民主党（ロシア語ローマ字表記：Liberal'no-demokraticheskaya partiya Sovetskogo Soyuza）\n\n LDPSSは自由主義でも民主主義でもなく、むしろ大幅に拡大されたロシア帝国の権威主義的・ポピュリスト的・民族主義的な再生を追求している。"
 SOV.Nat_Autocracy_alt: "£SOV_comm_military_junta (AFSU) ソビエト連邦軍"
 SOV.Nat_Autocracy_alt_icon: "£SOV_comm_military_junta"
 SOV.Nat_Autocracy_alt_desc: "社会主義軍事政権 ｰ ソビエト連邦軍（ロシア語ローマ字表記：Vooruzhennyye Sily Sovetskogo Soyuza）\n\n ソ連軍は、共産主義の理念を守り、領土保全と主権を保護し、国際条約に基づく任務を遂行するために創設された。"
 SOV.Nat_Autocracy_alty: "£SOV_nationalist_military_junta_alt (CPU) 概念党「統一」"
 SOV.Nat_Autocracy_alty_icon: "£SOV_nationalist_military_junta_alt"
 SOV.Nat_Autocracy_alty_desc: "公共安全の概念「死の水」 ｰ 概念党「統一」（ロシア語ローマ字表記：Kontseptualnaya Partiya 'Yedineniye'）\n\n 統一は、古典的な政治思想のすべて、そして宇宙全体の古典的な理解を虚構として拒否する概念的に新しい政党である。この虚構は、世界観、時間軸、イデオロギー、経済的戦争手段、大量虐殺兵器、破壊兵器を用いて世界を支配することを目的とする予言修正者によって創造されたものとされる。同党は予言修正者との闘争、その探索と破壊を提唱している。"
 CRM.Nat_Fascism: "£CRM_nationalist_fascism 国家ボリシェヴィキ"
 CRM.Nat_Fascism_icon: "£CRM_nationalist_fascism"
 CRM.Nat_Fascism_desc: "ファシズム - 国家ボリシェヴィキは、スターリン主義のイデオロギーと国家社会主義の要素を融合させた超国家主義運動である。"
