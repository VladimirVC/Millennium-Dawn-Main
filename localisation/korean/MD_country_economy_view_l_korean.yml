 total_naval_yard_amount_tt_delayed: "§Y해군 조선소§!는 §Y경비정§!, §Y수송선§!, §Y구축함§!, §Y항공모함§! 등 모든 종류의 군용 함선을 생산하는 주의 능력을 나타냅니다.\n\n주에 다음을 제공합니다:\n기본 필요 노동자 수: §Y18.8K§!\n§Y해군 조선소§!당 기본 GDP 산출량: $§Y1.5 ×십억§!\n기본 에너지 소비량: §R-0.5§! GW\n\n§Y모든 건물 노동력§!에 대한 법률, 국가 정신, 기술의 영향: [?modifier@buildings_worker_requirement_modifier|-%0]\n§Y군수 공장 및 조선소 노동력§!에 대한 법률, 국가 정신, 기술의 영향: [?modifier@mil_facs_worker_requirement_modifier|-%0]\n\n§Y해군 조선소§!당 필요 노동자: [?workers_per_dockyard_display|2]K\n"
