 BLR_agriculture: "Белорусское сельское хозяйство"
 BLR_agriculture_desc: "Благодаря государственным субсидиям и правовому законодательству со времен Лукашенко сохранились совхозы и колхозы, которые играют важную роль в этой отрасли. Есть еще и фермерские хозяйства, но они тоже играют значительную роль."
 BLR_agriculture1: "Частные сельские компании"
