 NKO_weapons_for_rebels_desc: "."
 NKO_united_again: "再次统一"
 NKO_united_again_desc: "."
 NKO_expand_local_industry: "对本国工业的投资"
 NKO_expand_local_industry_desc: "我们必须扩大国内生产，因为没有强大的工业，我们的国家将无法抵御敌人的经济压力。"
 NKO_more_arms_factories: "更多的军用工厂"
 NKO_field_hospitals: "野战医院"
 NKO_field_hospitals_desc: "我们将部署更多的野战医院，以便在战争发生时能尽快救治伤员。"
 NKO_reform_youth: "改革工人卫队"
 NKO_reform_youth_desc: "早该改革这一结构了，其旧有功能早已与现代脱节。"
 korea_north.7.t: "毒品在我们的街道蔓延"
 korea_north.7.d: "由于冰毒和可卡因等强力毒品充斥社区，街道陷入混乱，社区四分五裂。家庭破碎，犯罪率上升，人人自危。"
 korea_north.7.a: "我们的敌人必将倒下"
 korea_north.8.t: "我们的毒品在边境线被拦截了"
 korea_north.8.d: "一切都进展顺利，直到传来消息：货物在边境被扣留了。现在，一切都岌岌可危。几个月的计划付诸东流。"
 korea_north.8.a: "我们会再次尝试"
 korea_north.9.t: "假钞一直困扰着我们的银行系统"
 korea_north.9.d: "假钞随处可见，悄然流通于市井商贾之间而不被察觉，所到之处一片混乱。从街边小贩到大型零售商，都在假币泛滥中蒙受损失。其流通速度之快，连监管部门都措手不及。"
 korea_north.9.a: "帝国崩塌"
 korea_north.10.t: "我们的假币已被当局查获"
 korea_north.10.d: "当局已扣押了这批货物，但这并不是结束，而仅仅是开始。"
 korea_north.10.a: "造更多！"
 NKO_accept_money: "§Y接受§!资金"
 NKO_medicine_relief: "§Y提供§!医药救济"
 NKO_build_farms1: "§Y农场§!建设"
 NKO_build_farms1_desc: "建设农场来养活我们的人民是必须的，这个农场正在建设中"
 NKO_build_factory1: "§Y民用工业§!建设"
 NKO_build_factory1_desc: "为了促进经济增长，我们必须赋予人民权力，生产更多的消费品，并提高我们的工业产能。"
