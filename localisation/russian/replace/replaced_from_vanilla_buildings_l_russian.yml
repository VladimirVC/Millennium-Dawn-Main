l_russian:
 industrial_complex: "Гражданская промышленность"
 industrial_complex_plural: "Гражданская промышленность"
 industrial_complex_desc: "Это сооружение обеспечивает регион промышленностью для производства гражданских товаров или строительства новых зданий. При необходимости может быть преобразовано в военную промышленность.\n\nОбеспечивает штат:\nБазовое количество необходимых работников: §Y206 тыс.§!\nБазовый ВВП-выход на одну §YГражданскую промышленность§!: $§Y17.5 миллиардов§!\nБазовое потребление энергии: §R-0.5§! ГВт\n"
 arms_factory: "Военная промышленность"
 arms_factory_plural: "Военная промышленность"
 arms_factory_desc: "Это сооружение обеспечивает регион промышленностью для производства нового военного оборудования. При необходимости может быть преобразовано в гражданскую промышленность.\n\nОбеспечивает штат:\nБазовое количество необходимых работников: §Y18.8 тыс.§!\nБазовый ВВП-выход на одну §YВоенную промышленность§!: $§Y1.5 миллиард§!\nБазовое потребление энергии: §R-0.5§! ГВт"
 infrastructure: "Инфраструктура"
 infrastructure_plural: "Инфраструктура"
 infrastructure_desc: "Это сооружение обеспечивает регион улучшением инфраструктуры. Оно увеличивает вашу пропускную способность снабжения в стратегических регионах, повышает скорость передвижения ваших дивизий, а также увеличивает добычу сырьевых ресурсов."
 internet_station: "Сетевая инфраструктура"
 internet_station_plural: "Сетевая инфраструктура"
 internet_station_desc: "§YNetwork Infrastructure§! are tall structures used in the telecommunication and radio communication fields in order to push transmissions across great distances or underground fiber optic cables and cloud computing systems.\n\nProvides the state with:\nBase Number of Required Workers: §Y12K§!\nBase GDP Output per §YNetwork Infrastructure§!: $§Y3.5 Billion§!\n\nEach level of §YNetwork Infrastructure§! improves local productivity growth speed by §G+5.00%§!.\nEach level of §YNetwork Infrastructure§! reduces the duration of §YInternational Investments§! by §G-5.00%§!."
 dockyard: "Верфь"
 dockyard_plural: "Верфи"
 dockyard_desc: "§YNaval Yards§! are representative of a state's ability to produce military vessels of all sorts ranging from §YPatrol Boats§!, §YConvoys§!, §YDestroyers§!, §YCarriers§! and more.\n\nProvides the state with:\nBase Number of Required Workers: §Y18.8K§!\nBase GDP Output per §YNaval Yard§!: $§Y1.5 Billion§!\nBase Energy Consumption: §R-0.5§! GW"
 air_base: "Авиабаза"
 air_base_plural: "Авиабазы"
 air_base_desc: "§YВоенный аэродром§! — это объект для размещения и подготовки воздушных сил. Его можно улучшать до десятого уровня, добавляя дополнительную вместимость в §Y50§! самолетов на каждый уровень."
 radar_station: "Радарная станция"
 radar_station_plural: "Радарные станции"
 radar_station_desc: "§YРадар§! позволяют собирать разведывательную информацию о вражеских войсках в ближайших государствах. Они состоят из различных радаров и сенсоров, а также разведывательных активов и возможностей для анализа развивающейся ситуации.\nБолее высокий уровень увеличивает его эффективный радиус действия.\nРадары также предоставляют государству лучшие возможности для обнаружения вражеских воздушных сил, давая вашим самолетам больший шанс на их перехват.\nКроме того, радары увеличивают обнаружение вражеских флотов на море."
 RADAR_ONMAP_TOOLTIP: "§HРадарная станция§! уровень: $LVL|G$/$TOT|H$\nВладелец: $WHO|H$"
 RADAR_ONMAP_DAMAGED_TOOLTIP: "§HРадарная станция§! уровень: $LVL|R$/$TOT|H$\nВладелец: $WHO|H$"
 anti_air_building: "Комплексы ближнего ПВО"
 anti_air_building_plural: "Комплексы ближнего ПВО"
 anti_air_building_desc: "§YСистемы ПВО ближнего действия§! — это системы и группы зенитных средств и тактик, предназначенные для защиты от воздушных угроз на малой высоте. Эти комплексы совместно контролируют воздушное пространство, разделяя его на обороняемые зоны и обеспечивая прикрытие военных объектов и инфраструктуры от всего — от вертолётов и низколетящих самолётов до реактивной авиации."
 nuclear_reactor: "Ядерный реактор"
 nuclear_reactor_plural: "Ядерные реакторы"
 nuclear_reactor_desc: "This building converts nuclear energy into electrical energy, consuming moderately enriched uranium in the process.\n\nProvides the state with:\nBase Number of Required Workers: §Y148K§!\nBase GDP Output per §YNuclear Reactor§!: $§Y4 Billion§!\nBase Power Gain: §G+5§! GW\n"
 synthetic_refinery: "Нефтеперерабатывающий Завод"
 synthetic_refinery_desc: "This building provides the state with industry for production of synthetic rubber and some additional fuel production capability.\n\nProvides the state with:\nBase Number of Required Workers: §Y184K§!\nBase GDP Output per §YSynthetic Refinery§!: $§Y10 Billion§!\nBase Energy Consumption: §R-0.2§! GW\n"
 fuel_silo: "Хранилище стратегических ресурсов"
 fuel_silo_plural: "Хранилище стратегических ресурсов"
 fuel_silo_desc: "§YСтратегический резерв ресурсов§! представляет собой совокупность складов, хранилищ и других §Yхранилищ топлива§!. Это здание предоставляет вашей стране больше места для хранения §Hтоплива§! и §Hресурсов§!.\n\nПРИМЕЧАНИЕ: §Yхранилище ресурсов§! имеет ограничение по мощности двигателя, поэтому, если вы используете §Y$export_economy$§! или §Y$globalized_trade_economy$§!, вы можете отправлять на экспорт больше ресурсов, чем требуется вашим производственным линиям. Если вам нужно начать забирать ресурсы из хранилища, рекомендуется переключиться на §Y$mixed_economy$§! или более низкую мощность.\n"
 offices: "Офис"
 offices_plural: "Офисы"
 offices_desc: "The §YOffice Sectors§! represents all the other industries of the economy beyond the extraction and heavy industries. These includes financial, customer, information technology, retail services and so much more.\n\nProvides the state with:\nBase Number of Required Workers: §Y473K§!\nBase GDP Output per §YOffice Sector§!: $§Y50 Billion§!\nBase Energy Consumption: §R-0.25§! GW"
 naval_base: "Морская база"
 naval_base_plural: "Морские базы"
 naval_base_desc: "Расширяет дальность действия вашего флота и позволяет ремонтировать его. Дает возможность выполнять поставки и экспортировать ресурсы по морю. Более высокий уровень увеличивает пропускную способность для поставок."
 bunker: "Укрепление"
 bunker_plural: "Укрепления"
 bunker_desc: "Это сооружение накладывает штраф к атаке в размере $VALUE|+%0$ за каждый уровень укрепления на атакующего в бою. Атака с нескольких направлений снижает эффективность укреплений."
 coastal_bunker: "Прибрежная крепость"
 coastal_bunker_plural: "Береговые укрепления"
 coastal_bunker_desc: "Это сооружение накладывает штраф к атаке в размере $VALUE|+%0$ за каждый уровень укрепления на атакующего во время морского десантного боя."
 supply_node: "Узел снабжения"
 supply_node_desc: "Узел снабжения — точка на железной дороге вне городов, в которой можно получить снабжение."
 rail_way: "Железные дороги"
 rail_way_plural: "Железные дороги"
 rail_way_desc: "Железные дороги соединяют узлы снабжения, позволяя распределять припасы вдали от столицы.\n\nКаждый уровень §YЖелезных дорог§! повышает скорость роста местной производительности на §G+4,00%§!."
 fossil_powerplant: "Тепловая электростанция на ископаемом топливе"
 fossil_powerplant_plural: "Электростанции на ископаемом топливе"
 fossil_powerplant_desc: "§YFossil Fuel Powerplants§! is a catch-all for all fossil-based thermoelectric energy sources. These include but are not limited to; coal, natural gas and oil. §YFossil Fuel Powerplants§! will idle if energy generation is higher than consumption.\n\nProvides the state with:\nBase Number of Required Workers: §Y7.5K§!\nBase GDP Output per §YFossil Fuel Powerplant§!: $§Y1.7 Billion§!\nBase Power Gain: §G+2§! GW\n"
 fossil_powerplant_amount: "$VALUE|Y0=$"
 fossil_powerplant_resource: "£resources_strip|$FRAME$"
 agriculture_district: "Коммерческое сельское хозяйство"
 agriculture_district_plural: "Коммерческое сельское хозяйство"
 agriculture_district_desc: "§YCommercialized Agriculture Districts§! represents a catch-all for all non-subsistence Agriculture within our nation. It includes Agro-Industry, arable land, grain silos, butcherhouses and more.\n\nProvides the state with:\nBase Number of Required Workers: §Y188K§!\nBase GDP Output per §YCommercialized Agriculture District§!: $§Y25 Billion§!\nBase Energy Consumption: §R-0.10§! GW\n§YFuel Gain§! from States: 8\n§YLocal Supplies§!: 1.5%\n"
 agriculture_district_amount: "$VALUE|Y0=$"
 rocket_site: "Пусковая площадка"
 rocket_site_plural: "Места запуска ракет"
 rocket_site_desc: "§YПусковые площадки для ракет§! — это общее название для всех ракетных комплексов театра боевых действий, начиная от §YРакет класса \"земля-воздух\"§! и заканчивая §YМежконтинентальными баллистическими ракетами§!. Это даёт государству возможность развертывать эти стратегические ресурсы в наших стратегических воздушных зонах для поддержки нашей противовоздушной обороны или обеспечения наступательных возможностей."
 nuclear_facility: "Гражданский инженерный комплекс"
 nuclear_facility_plural: "Гражданские R&D центры"
 nuclear_facility_desc: "§YГражданский научно-исследовательский центр§! включает в себя все виды специальных проектов, связанных с гражданским промышленным потенциалом, ядерными объектами и т. д."
 air_facility: "Комплекс аэродинамики и авионики"
 air_facility_plural: "Средства аэродинамики и авионики"
 air_facility_desc: "Экспериментальные объекты для аэродинамики и авионики позволяют запускать исследовательские проекты по самолётам, передовым ракетам, сопутствующей электронике и космическим программам."
 naval_facility: "Морской инженерный комплекс"
 naval_facility_plural: "Военно-морские инженерные сооружения"
 naval_facility_desc: "Экспериментальные объекты по военно-морскому делу позволяют запускать исследовательские проекты, связанные с надводными кораблями и подводными лодками.\nОбъект по военно-морскому делу можно создать только в прибрежной провинции."
 mega_gun_emplacement: "Крупнокалиберное многозарядное орудие"
 mega_gun_emplacement_plural: "Многозарядные калиберные пушки"
 mega_gun_emplacement_desc: "Это крупнокалиберное орудие, работающее по принципу многозарядной тяги, предназначено для достижения беспрецедентной дальности стрельбы. Используя ряд подземных туннелей, оно разгоняет снаряды до сверхзвуковой скорости перед их запуском в направлении удалённых целей."
 stronghold_network: "Оборонительный рубеж"
 stronghold_network_plural: "Общегосударственные защитные сети"
 stronghold_network_desc: "Обширная оборонительная сеть, состоящая из туннелей, опорных пунктов, траншей, бомбоубежищ, складов оружия и заранее спланированных мест подрыва, даёт защитникам решающее преимущество перед любым нападающим."
 land_facility: "Наземный военный комплекс"
 land_facility_plural: "Наземные военные объекты"
 land_facility_desc: "Экспериментальные объекты по наземным операциям позволяют запускать исследовательские проекты, связанные с различными аспектами сухопутной войны, такими как специальные танки или артиллерия."
 renewable_energy_infra: "Инфраструктура возобновляемых источников энергии"
 renewable_energy_infra_plural: "Инфраструктура возобновляемых источников энергии"
 renewable_energy_infra_desc: "§YRenewable Energy Infrastructure§! is a catch-all for all renewable energy sources. These include but are not limited to; solar parks, wind turbines, biofuel refineries, charcoal plants, biofuel power plants, and more. As such, it uses renewable sources and produces fuel from those sources.\n\nProvides the state with:\nBase Number of Required Workers: §Y22.5K§!\nBase GDP Output per §YRenewable Energy Infrastructure§!: $§Y2 Billion§!\nBase Power Gain: §G+0.5§! GW\n"
 renewable_energy_infra_amount: "$VALUE|Y0=$"
 renewable_energy_infra_resource: "£resources_strip|$FRAME$"
 BUILDING_GROUP_TOOLTIP: "\nВы можете иметь до $LEVEL|R$ таких зданий на штат. Этот лимит делится с:"
 BUILDING_GROUP_SHARED_NAME_ENTRY: " - $NAME$"
 energy_infrastructure: "Усиленная электрическая сеть"
 energy_infrastructure_desc: "Усиленные линии электропередачи и энергетическая инфраструктура с системой многократного резервирования гарантируют, что наши заводы будут продолжать производство независимо от обстоятельств."
 industrial_infrastructure: "Электросеть высокой мощности"
 industrial_infrastructure_desc: "Модернизация существующей гражданской энергетической инфраструктуры позволяет нам расширить возможности для высокоинтенсивных промышленных операций."
 microchip_plant: "Завод микрочипов"
 microchip_plant_plural: "Заводы микрочипов"
 microchip_plant_desc: "Production plant that converts Technology Metals and Precious Metals into Microchips, for use by both industrial and military needs.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YMicrochip Plant§!: $§Y32 Billion§!\nBase Energy Consumption: §R-0.75§! GW\n20 §YMicrochip§! Production\n\nCosts:\n3 §YTechnology Metals§!\n2 §YPrecious Metals§!"
 composite_plant: "Завод композитных материалов"
 composite_plant_desc: "Production plant that combines Oil, Rubber, and Precious Metals into Composites, for use in both scientific, military, and industrial workers.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YComposite Plant§!: $§Y28 Billion§!\nBase Energy Consumption: §R-0.8§! GW\n16 §YAdvanced Composite§! Production\n\nCosts:\n1 §YOil§!\n1 §YRubber§!\n1 §YPrecious Metals§!"
 composite_plant_plural: "Завод композитных материалов"