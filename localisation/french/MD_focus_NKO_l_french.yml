 korea_russia.21.t: "La Russie a engagé nos travailleurs"
 korea_russia.21.d: "Nous avons signé un accord avec la Russie pour employer nos travailleurs en grand nombre afin d'aider dans les travaux de construction. Les conditions sont plus que favorables pour nous, car la partie russe paie des salaires généreux."
 korea_russia.21.a: "Super"
 korea_russia.22.t: "Exercices militaires avec la Corée du Nord"
 korea_russia.22.d: "L'état-major général nord-coréen propose d'organiser des exercices conjoints de nos forces armées pour démontrer la force de nos armées et tester la coopération de nos forces armées."
 korea_russia.22.a: "C'est une excellente idée"
 korea_russia.22.b: "Non"
 korea_russia.23.t: "Exercices militaires avec la Russie"
 korea_russia.23.d: "L'état-major général russe a accepté d'organiser des exercices conjoints des forces armées de nos pays."
 korea_russia.23.a: "Très bien !"
 korea_russia.24.t: "Exercices militaires avec la Russie"
 korea_russia.24.d: "L'état-major général russe a refusé d'organiser des exercices conjoints des forces armées de nos pays."
 korea_russia.24.a: "Triste"
