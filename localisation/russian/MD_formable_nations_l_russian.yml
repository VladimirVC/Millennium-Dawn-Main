 form_SOU_category: "Союз южноамериканских наций"
 form_SOU_category_desc: "Союз южноамериканских наций — это объединение всех южноамериканских наций в одну сверхдержаву. Экономическая, политическая и культурная идентичность Южной Америки уникальна тем, что она сочетает в себе испанское и португальское влияние и туземцев, которые интегрировались в страны. Она обладает широким спектром промышленных баз, финансовых секторов, сырьевых ресурсов и сельскохозяйственной продукции. Если мы объединим национальные государства Южной Америки, мы наконец сможем соперничать с влиянием Соединенных Штатов и других крупных держав в Западном полушарии и за рубежом."
