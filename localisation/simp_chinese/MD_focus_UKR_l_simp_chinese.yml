 UKR_political_situation_decision_category: "乌克兰政局动荡"
 UKR_political_situation_decision_category_desc: "[UKR.GetFlag]§Y乌克兰§! 是一个幅员辽阔的国家，境内生活着许多民族，但其中两个民族占多数 - [UKR.GetFlag]§Y乌克兰人§!和[SOV.GetFlag]§Y俄罗斯人§!。由于历史事件，[SOV.GetFlag]§Y俄罗斯§!人口主要居住在该国东部，而[UKR.GetFlag]§Y乌克兰§!人口则占据了更多西部领土。这种地理上的分裂正在不断动摇[UKR.GetFlag]§Y乌克兰§!，并可能成为该国未来的一个§R大问题§!。除此之外，[UKR.GetFlag]§Y乌克兰§!的政治选民很容易发生抗议，并通过§R非和平§!的抗议来表达自己的意见。我们需要考虑所有这些方面，并找到平衡这些力量的机会。\n\n如果§8独立广场§!的支持率§R跌破15% §!，就会引发动乱，并可能导致§R内战§!。为了减少可能发生的§R内战§!的后果，有必要扩大§Y乌克兰国家安全局§!和§Y国家近卫军§!等的影响力和权力。根据谁的支持§R较少§!（§t西部人群§!或§3东部人群§!），会出现不同的政治动荡局面。"
