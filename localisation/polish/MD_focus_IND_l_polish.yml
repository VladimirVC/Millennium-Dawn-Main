 indonesia.76854.t: "Indonezja żąda aneksji"
 indonesia.76854.d: "Po udzieleniu nam pomocy po trzęsieniu ziemi rząd Indonezji zwraca się do nas z prośbą o połączenie z nim sił. Jeśli do nich dołączymy, stracimy wszystko, o co walczyliśmy, ale wszystko w imię pokoju. Jeśli do nich nie dołączysz, konflikt wybuchnie na nowo…"
 indonesia.76854.a: "Zróbmy to"
 indonesia.76854.b: "NIE"
 IND_disasters_mechanic: "Straszne szczęście Indonezji"
 IND_disasters_mechanic_desc: "Indonesia is very lucky to have an abundance of natural resources, manpower and will-power to charge through the 21st century.\nHowever, §HIndonesia faces many challenges§! that §Rhinder its progress§!. Accidents are a §Rcommon theme§!, which would easily be prevented if it were not for better care for a particular region.\n\nFor this reason, it is our duty and responsibility to pay more attention to our states in a timely manner in order to avoid a disastrous fate that would cause us serious harm.\n\nWe will continue to have disasters for a considerable amount of time, however if we tackle them quickly they eventually stop after some time!"
 IND_back_muslim: "Wspieranie muzułmanów"
 IND_back_muslim_desc: "Jesteśmy narodem islamskim! Dlatego musimy chronić naszych muzułmanów bez względu na koszty. Dzięki temu zyskamy poparcie społeczne i wykorzenimy wszelką nienawiść do nas w muzułmańskiej większości Sulawesi\n\n\n\nNegocjacje są bezcenne i należy je rozpocząć natychmiast!"
 IND_muslim: "Negocjuj warunki z muzułmanami w Sulawesi"
 IND_muslim2: "Zapewnij im odpowiednie szkolenie bojowe"
 IND_muslim3: "Skonfiguruj administratorów lokalnych"
 IND_muslim4: "Zakończ negocjacje"
 IND_muslim_generic: "Przeniesienie milicjantów do Sulawesi"
 IND_muslim_generic2: "Przenoszenie chrześcijańskich projektów budowlanych"
 IND_muslim_generic3: "Wzmacniać meczety"
 IND_back_papua: "Wspieranie chrześcijan"
 IND_back_papua_desc: "Our Christians have been neglected for too long. It is our duty as a state to give representation and fair treatment to all of our Christians, regardless if they're a minority or not. They must be protected at all times!\n\n\n\nNegotiating is invaluable and must begin immediately!"
 IND_papua: "Negocjuj warunki z chrześcijanami"
 IND_papua2: "Zapewnij im większą reprezentację"
 IND_papua3: "Edukuj ich na temat wojny partyzanckiej"
 IND_papua4: "Obiecaj im lepszą opiekę"
 IND_papua_generic: "Przenieść milicjantów do Papui"
 IND_papua_generic2: "Przenoszenie islamskich projektów budowlanych"
 IND_papua_generic3: "Umacniać kościoły"
 IND_back_noone: "Nie popieram nikogo"
 IND_back_noone_desc: "It is important that the state does not pick favorites over sensitive matters, such as that of religious conflict. We must begin the process of easing this tension, by both negotiations and militarization of points of conflict. \n\nDoing this will bring more calm to the Sulawesians and Papuans."
 IND_neutral: "Hold unifying rallies in various states"
 IND_neutral2: "Środki na nowe budownictwo w Sulawesi"
 IND_neutral3: "Fundusze kościołów papuaskich"
 IND_neutral4: "Obiecaj Papuasom lepszą reprezentację"
 IND_neutral5: "Obiecujemy mieszkańcom Sulawesi lepszą opiekę"
 IND_neutral_generic: "Wspieranie programów rekrutacyjnych dla Papuasów i Sulawesczyków"
 IND_neutral_generic2: "Zmilitaryzować doki wykorzystywane do przemytu broni"
 IND_neutral_generic3: "Zmilitaryzuj hotspoty znane z starć"
