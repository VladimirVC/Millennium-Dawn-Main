 ANDES_integrate_BOL: "[GetANDESNameAdj] [BOL.GetAdjective] 영토 통합"
 ANDES_integrate_BOL_desc: ""
 ANDES_update_flag: "[GetANDESNameDef] 형성 완료"
 ANDES_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetANDESNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_ANTCONF_category: "앤틸리스 연방"
 form_ANTCONF_category_desc: "앤틸리스 연합은 [CUB.GetNameWithFlag], [DOM.GetNameWithFlag], 그리고 [HAI.GetNameWithFlag]을(를) 하나로 묶어 카리브해에 수립하고자 제안된 국가입니다. 이 구상은 원래 푸에르토리코의 독립 운동가 라몬 에메테리오 베탄세스(Ramón Emeterio Betances)가 스페인어를 사용하는 모든 카리브해 국가를 단일 연합체로 통합하자는 아이디어에서 처음 시작되었습니다. 원래 구상에는 [HAI.GetNameWithFlag]이(가) 포함되지 않았지만, 지지자들에 의해 빠르게 편입되었습니다. 이후 미서전쟁(스페인-미국 전쟁)으로 인해 [CUB.GetNameWithFlag]와(과) [PTR.GetNameWithFlag] 식민지가 미국에 양도되면서 이 구상은 거의 사라졌습니다. 만약 이 구상이 실현된다면 산토도밍고를 수도로 삼고 스페인어를 공식 언어로 사용하는 국가가 탄생하게 될 것입니다."
 ANTCONF_integrate_start: "[GetANTCONFNameDef] 형성 시작"
 ANTCONF_integrate_start_desc: "앤틸리스 연방을 결성할 때가 되었습니다. 카리브해 인민들의 더 밝은 미래를 보장하기 위해 우리 인민은 지금 하나로 뭉쳐야 합니다.\n\n"
 ANTCONF_integrate_CUB: "[GetANTCONFNameAdj] [CUB.GetAdjective] 영토 통합"
 ANTCONF_integrate_CUB_desc: "쿠바는 연방 내 세 주요 국가 중 가장 큽니다. 이곳을 통합하면 경제 규모가 확대되고 인구와 국토 면적이 거의 두 배로 늘어날 것입니다."
 ANTCONF_integrate_DOM: "[GetANTCONFNameAdj] [DOM.GetAdjective] 영토 통합"
 ANTCONF_integrate_DOM_desc: "도미니카 공화국은 연방을 구성하는 세 주요 국가 중 하나입니다. 아이티와 히스파니올라섬을 공유하고 있으며, 수많은 관광객과 산업을 보유하고 있습니다. 섬의 북쪽 지역에서는 소규모 채굴 작업도 진행되며, 공화국 내에서 사용할 철강을 생산합니다. 이들의 통합은 새로운 연방에 귀중한 자산이 될 것입니다."
 ANTCONF_integrate_HAI: "[GetANTCONFNameAdj] [HAI.GetAdjective] 영토 통합"
 ANTCONF_integrate_HAI_desc: "아이티는 연방 내 세 주요 국가 중 가장 작습니다. 프랑스 식민지였던 과거로 인해 쿠바나 도미니카 공화국과는 크게 다릅니다. 국가 집단 간의 언어 차이로 인해 통합에 더 긴 시간이 걸리겠지만, 산업 기반과 포르토프랭스의 천혜의 항구는 카리브해 내 경제 및 군사 작전에 귀중한 자산이 될 것입니다."
 ANTCONF_update_flag: "[GetANTCONFNameDef] 형성 완료"
 ANTCONF_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetANTCONFNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_CANZUK_category: "\"캔적 (CANZUK)\" "
 form_CANZUK_category_desc: "캔적 (CANZUK)은 캐나다, 오스트레일리아, 뉴질랜드, 그리고 영국 간의 연방입니다. 이는 연방으로써 직접 통치를 하며 완전히 통합된 국가를 만든다는 점에서 대영 제국과 차이가 있습니다. 국가는 여러 대륙에 흩어져 있기에 하나가 된다면 국제 무대의 강력한 경쟁자가 될 수 있을 겁니다. 과연 이 연방을 유도하여 하나의 국가로 통일 해야할까요?"
 CANZUK_integrate_start: "[GetCANZUKNameDef] 형성 시작"
 CANZUK_integrate_start_desc: ""
