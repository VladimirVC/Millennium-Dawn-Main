 indian_event.53.t: "Tratado de Unión con la India"
 indian_event.53.d: "Una delegación india llegó hoy a nuestra capital con una propuesta de cooperación militar y amistad entre nuestros países. Hemos estado buscando un aliado fuerte en Asia durante bastante tiempo, y ahora ha aparecido esta oportunidad. ¿Qué elegiremos?"
 indian_event.53.a: "La amistad es mejor que la guerra"
 indian_event.53.b: "La India no es nuestra opción"
 indian_event.54.t: "Propuesta para dividir esferas de influencia en Afganistán"
 indian_event.54.d: "Como ahora somos aliados de la India, ha surgido el tema de crear un enlace terrestre entre nuestros países dividiendo las esferas de influencia en Afganistán. La propuesta es muy tentadora, ya que de esta manera podemos expandir nuestra esfera de influencia y fortalecer nuestra posición en el mundo."
 indian_event.54.a: "Es hora de construir tu imperio"
 indian_event.54.b: "Tenemos suficiente territorio propio"
