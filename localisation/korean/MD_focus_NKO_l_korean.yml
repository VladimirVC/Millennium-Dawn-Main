 korea.40.t: "반란군의 봉기"
 korea.40.d: "남조선 인민들이 우리의 부름에 응답하여 일어섰습니다. 우리는 그들을 지원하고 국토를 수복해야 합니다."
 korea.40.a: "조국해방전쟁이다!"
