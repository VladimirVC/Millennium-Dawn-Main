l_simp_chinese:
 ukraine_focus: "乌克兰国策树"
 UKR_home_to_chernobyl_zone: "切尔诺贝利禁区所在地"
 UKR_chernobyl_tooltip: "切尔诺贝利核电站发生灾难性核事故后，该州北部地区设立了切尔诺贝利禁区。该地区在乌克兰面积约2600平方公里，因放射性污染程度较高而被疏散并宣布无法居住。自设立以来，禁区一直由乌克兰政府管理，并一直在努力监测和补救灾难对环境和健康的影响。"
 UKR_chernobyl_effects_tooltip: "§R进一步的辐射泄漏可能会造成长期损害§!"
 UKR_found_the_uop: "改革军工复合体"
 UKR_found_the_uop_desc: "我们的国防工业状况令人堪忧，因此我们不得不在这一领域展开全面改革。"
 UKR_ukrainian_armed_forces_reform: "改革乌克兰武装部队"
 UKR_ukrainian_armed_forces_reform_desc: "我们的军队亟需改革。我们必须建立新的组织结构和新型部队，解决军队长期存在的问题。"
 UKR_srdsc: "国家船舶研究设计中心"
 UKR_srdsc_desc: "国家船舶研究设计中心是一家专门从事船舶设计的设计局，位于乌克兰尼古拉耶夫，隶属于乌克兰国防工业国有集团。"
 UKR_defend_our_sky: "振兴航空业"
 UKR_defend_our_sky_desc: "我们将开始复兴自苏联解体以来一直处于糟糕状态的航空工业。"
 UKR_cut_down_the_general_staff: "精简将军数量"
 UKR_cut_down_the_general_staff_desc: "将军太多对我们的军队产生了负面影响，是时候解决这个问题了。"
 UKR_contract_army: "军事教育改革"
 UKR_contract_army_desc: "我们将重组旧的军事院校，并创建新的军事院校，以提高我军的素质。"
 UKR_war_on_donbass_experience: "我们的军队"
 UKR_war_on_donbass_experience_desc: "乌克兰军队与它之前的苏联军队，以及现在的俄罗斯军队相比，简直判若两军。是时候改变这种状况了。"
 UKR_support_uia: "乌克兰国际航空公司"
 UKR_support_uia_desc: "乌克兰国际航空公司（UIA）是乌克兰目前最大的航空公司，也是乌克兰政府主打的王牌。基辅鲍里斯波尔机场是其公司的主要航空枢纽。该公司经营着飞往欧洲、中东、美国、加拿大和亚洲的客运航班和货运服务。"
 UKR_build_new_airports: "兴建机场"
 UKR_build_new_airports_desc: "乌克兰的机场不仅被忽视，还得不到充分的利用。但乌克兰地势平坦，很适合扩建我们的机场。"
 UKR_invest_in_ministry_of_infrastructure: "基建部"
 UKR_invest_in_ministry_of_infrastructure_desc: "由于基建部政府官员的腐败，乌克兰的基础设施陷趋于崩溃。因此该部受到了猛烈抨击。为了工业的美好未来，我们应该重组此部门。"
 UKR_roads_extend_plan: "道路投资计划"
 UKR_roads_extend_plan_desc: "乌克兰的道路状况并非世界最佳。部分地区仍以来未铺设或近乎损毁的道路。时候让这些地区得到一点关爱了。"
 UKR_ukrainian_railways: "乌克兰铁路"
 UKR_ukrainian_railways_desc: "乌克兰国家铁路公司是一家国有企业，目前垄断着乌克兰境内绝大部分的铁路运输。该公司拥有超过23000公里的庞大铁路总里程，位列世界第十三大铁路公司。\n\n同时，它也是世界第六大铁路客运公司和第七大铁路货运公司。"
 UKR_legacy_of_the_ukr_ind: "乌克兰工业化"
 UKR_legacy_of_the_ukr_ind_desc: "乌克兰很大程度上依靠着工业基地来发展经济。类似基辅、利沃夫和热扎波罗热这些主要城市都有着这些年来一直推动它们发展的工业体系。我们必须保持这种趋势，否则我们将停滞不前。"
 UKR_ssau: "萨马拉国立航空航天大学"
 UKR_ssau_desc: "乌克兰航空工业在航天技术上离成为世界的领头羊还差的很远。但无论如何，它是航天器和其他太空专用机械设备的重要生产商。保持在这个领域的竞争力将会决定我们今后的未来。"
 UKR_pivdenmash_udo: "马卡罗夫南方机械制造厂"
 UKR_pivdenmash_udo_desc: "马卡罗夫南方机械制造厂是乌克兰的主要航天器生产商。该公司以为NASA等外国机构生产火箭而闻名。发展这一蓬勃兴起的产业有助于将乌克兰推向世界舞台。有趣的是，2006年全球航天飞行中12%使用了乌克兰制造的火箭。真是意想不到！"
 UKR_national_steel_companies: "鲁塞尼亚钢铁"
 UKR_national_steel_companies_desc: "鲁塞尼亚的钢铁曾是用于战争的强大产品。现在，我们不再用刀剑和盾牌作战。然而，我们的坦克、枪炮和子弹仍需优质钢材以保持竞争力。"
 UKR_naftogaz: "乌克兰国家石油天然气公司"
 UKR_naftogaz_desc: "”乌克兰国家石油天然气公司“是一家国有石油和天然气公司，业务涵盖从能源开采到产品精炼的全过程。 该公司常被用于推动能源独立，以降低对俄罗斯等主要能源出口国的依赖。"
 UKR_extend_ukrainian_refineries: "专注可再生能源"
 UKR_extend_ukrainian_refineries_desc: "尽管我们拥有充足的天然气和其他石油储备，但在化石燃料产量低迷时期，通过其他能源形式补充当前能源需求，将有助于稳定能源供应。"
 UKR_zalk: "扎波罗热工厂"
 UKR_zalk_desc: "扎波罗热是乌克兰重要的工业中心。它是扎波罗热州的首府和扎斯公司的总部，同时也是冶金工业的枢纽，以及顿巴斯地区货物运输的主要港口城市。"
 UKR_zaz: "扎波罗热汽车制造厂"
 UKR_zaz_desc: "扎波罗热汽车制造厂（ZAZ）是乌克兰主要的汽车生产商。顾名思义，该厂位于乌克兰东南部的扎波罗热市。虽然通常也生产客车和卡车，但它主要因为作为扎波罗热汽车制造厂的前母公司而广为人知。"
 UKR_kraz: "克列缅丘格汽车制造厂"
 UKR_kraz_desc: "克列缅丘格汽车制造厂（KrAZ）是一家位于乌克兰克列缅丘格的私营企业。该公司主要生产卡车及其他特种车辆。但其专长在于重型越野车型。近期该公司已注册为控股公司，目前由乌克兰金融信贷公司所有。"
 UKR_west_east_rivalry_balanced: "东西方之间\n§L当前竞争状态：§!§G平衡§!\n"
 UKR_west_east_rivalry_balanced_desc: "冷战的结束给乌克兰带来了前所未有的独立性。然而，宗主权的遗留问题依然存在，使该国的政治局势更加动荡。俄罗斯继续从东部影响乌克兰，而欧盟也开始从西部对乌克兰施加影响。在乌克兰国内，出现了相互竞争的政治派别，每个派别都效忠于某个外国势力。\n\n§R国内政策或外交政策的变化可能会破坏亲西方和亲东方支持者之间的力量平衡！§!\n\n§C（亲东方占主导地位）§!\n政府将专注于与俄罗斯建立更紧密的联系（包括加入集安组织和欧亚关税同盟），这将引起民族主义力量的不满。\n\n§C（亲西方占主导地位）§!\n政府将专注于加入欧盟和北约，这反过来又会引起亲俄阵营的反对者的不满。"
 UKR_west_strengthened: "东西方之间\n§L当前竞争状态：§! §G向西方靠拢§!\n"
 UKR_west_strengthened_desc: "冷战的结束给乌克兰带来了前所未有的独立性。然而，宗主权的遗留问题依然存在，使该国的政治局势更加动荡。俄罗斯继续从东部影响乌克兰，而欧盟也开始从西部对乌克兰施加影响。在乌克兰国内，出现了相互竞争的政治派别，每个派别都效忠于某个外国势力。\n\n§R国内政策或外交政策的变化可能会破坏亲西方和亲东方支持者之间的力量平衡！§!\n\n§C（亲东方占主导地位）§!\n政府将专注于与俄罗斯建立更紧密的联系（包括加入集安组织和欧亚关税同盟），这将引起民族主义力量的不满。\n\n§C（亲西方占主导地位）§!\n政府将专注于加入欧盟和北约，这反过来又会引起亲俄阵营的反对者的不满。"
 UKR_west_dominant: "东西方之间\n§L当前竞争状态：§! §G亲近西方§!\n§R俄罗斯可能会开始颠覆行动！§!"
 UKR_west_dominant_desc: "冷战的结束给乌克兰带来了前所未有的独立性。然而，宗主权的遗留问题依然存在，使该国的政治局势更加动荡。俄罗斯继续从东部影响乌克兰，而欧盟也开始从西部对乌克兰施加影响。在乌克兰国内，出现了相互竞争的政治派别，每个派别都效忠于某个外国势力。\n\n§R国内政策或外交政策的变化可能会破坏亲西方和亲东方支持者之间的力量平衡！§!\n\n§C（亲东方占主导地位）§!\n政府将专注于与俄罗斯建立更紧密的联系（包括加入集安组织和欧亚关税同盟），这将引起民族主义力量的不满。\n\n§C（亲西方占主导地位）§!\n政府将专注于加入欧盟和北约，这反过来又会引起亲俄阵营的反对者的不满。"
 UKR_east_strengthened: "东西方之间\n§L当前竞争状态：§! §G向东方靠拢§!\n"
 UKR_east_strengthened_desc: "冷战的结束给乌克兰带来了前所未有的独立性。然而，宗主权的遗留问题依然存在，使该国的政治局势更加动荡。俄罗斯继续从东部影响乌克兰，而欧盟也开始从西部对乌克兰施加影响。在乌克兰国内，出现了相互竞争的政治派别，每个派别都效忠于某个外国势力。\n\n§R国内政策或外交政策的变化可能会破坏亲西方和亲东方支持者之间的力量平衡！§!\n\n§C（亲东方占主导地位）§!\n政府将专注于与俄罗斯建立更紧密的联系（包括加入集安组织和欧亚关税同盟），这将引起民族主义力量的不满。\n\n§C（亲西方占主导地位）§!\n政府将专注于加入欧盟和北约，这反过来又会引起亲俄阵营的反对者的不满。"
 UKR_east_dominant: "东西方之间\n§L当前竞争状态：§!§G亲近东方§!\n"
 UKR_east_dominant_desc: "冷战的结束给乌克兰带来了前所未有的独立性。然而，宗主权的遗留问题依然存在，使该国的政治局势更加动荡。俄罗斯继续从东部影响乌克兰，而欧盟也开始从西部对乌克兰施加影响。在乌克兰国内，出现了相互竞争的政治派别，每个派别都效忠于某个外国势力。\n\n§R国内政策或外交政策的变化可能会破坏亲西方和亲东方支持者之间的力量平衡！§!\n\n§C（亲东方占主导地位）§!\n政府将专注于与俄罗斯建立更紧密的联系（包括加入集安组织和欧亚关税同盟），这将引起民族主义力量的不满。\n\n§C（亲西方占主导地位）§!\n政府将专注于加入欧盟和北约，这反过来又会引起亲俄阵营的反对者的不满。"
 UKR_kleptocracy: "窃盗统治"
 UKR_kleptocracy_desc: "乌克兰政府陷入了窃盗统治的泥潭。腐败的上层阶级利用其权力剥削领土上的人民和自然资源，以扩大个人财富和政治权力。\n\n§C为了摆脱窃盗统治的负面影响，国家需要采取措施打击腐败。§!"
 UKR_to_many_generals: "冗余的参谋部"
 UKR_to_many_generals_desc: "乌克兰有450名现役将领。他们中的大多数人通过关系和贿赂获得了高级职位，缺乏指挥作战的经验。目前的参谋部毫无效率，急需改革。"
 UKR_idea_eu_member_associate: "欧盟准成员国"
 UKR_idea_eu_member_associate_desc: "乌克兰已开始与欧盟建立联系，这将深化其与欧洲及西方阵营的关系。然而，此举在俄语占多数的地区引发了问题。"
 UKR_idea_government_in_need: "效率低下的政府"
 UKR_idea_pro_ukraine_reform_1: "改革政府"
 UKR_idea_shortened_general_staff: "小型军事参谋部"
 UKR_every_man_ataman: "每个人 - 黑特曼"
 UKR_foreign_advisors: "外国顾问"
 ukraine_coup.1.t: "俄罗斯企图对我们发起政变！"
 ukraine_coup.1.d: "来自基辅的最新报道称，俄罗斯支持的特工即将推翻我们的政府！这对我们脱离俄罗斯的独立构成了直接威胁。"
 ukraine_coup.1.a: "混蛋。"
 ukraine_coup.2.t: "俄罗斯对我们发起了政变！"
 ukraine_coup.2.d: "来自基辅的最新报道称俄罗斯支持的特工袭击了我们的政府！现在我们的国家要被亲俄建制派统治了。"
 ukraine_coup.2.a: "这他妈是怎么回事？"
 ukraine_news.7.t: "乌克兰内战"
 ukraine_news.7.d: "乌克兰顿巴斯地区的人们已经宣布独立。他们已向顿涅茨克和卢甘斯克的人民宣布，他们将不再屈从于基辅的暴政。[UKR.GetLeader]和乌克兰政府谴责了叛乱分子，并开始动员平叛。当地的亲乌克兰部队与叛军之间的地带已经发生了小规模冲突。"
 ukraine_news.7.a: "镇压暴民"
 ukraine_news.7.b: "我们推翻了压迫者！"
 ukraine_news.7.c: "有趣的局面"
 ukraine_news.8.t: "吞并克里米亚"
 ukraine_news.8.d: "克里米亚人民举行公投，决定脱离乌克兰，与俄罗斯结盟。俄罗斯的反应迅速而果断，迅速向该地区派出军队，吞并了克里米亚半岛。关键的军事据点很快被占领。乌克兰政府对此表示愤慨，并要求俄罗斯归还克里米亚。"
 ukraine_news.8.a: "这只不过是暂时的…"
 ukraine_news.8.b: "为了祖国俄罗斯！"
 ukraine_news.8.c: "糟糕的新闻"
 UKR_tro_brigades_ukraine_decision_category: "乌克兰国土防御部队"
 UKR_tro_brigades_ukraine_decision_category_desc: "乌克兰武装力量国土防御部队是乌克兰武装力量的一个独立军种，负责组织、准备和执​​行国土防御任务。"
 UKR_tro_created_tt: "现在你可以招募§Y国土防御旅§!"
 UKR_reorganize_the_national_guard_ukraine_decision_category: "乌克兰国民警卫队"
 UKR_reorganize_the_national_guard_ukraine_decision_category_desc: "乌克兰国民警卫队是一支具有执法职能的军事部队，隶属于乌克兰内务部，其任务是保护乌克兰公民、社会和国家的生命、权利、自由和合法利益免受犯罪和其他非法侵害，维护公共秩序，确保公共安全。\n\n与执法机构合作，确保国家安全和保护国家边界，打击恐怖活动、非法准军事或武装团体（组织）、恐怖组织、有组织团体和犯罪组织的活动。"
 UKR_reorganize_the_national_guard_first_brigade: "乌克兰国民警卫队§Y第一行动旅§!"
 UKR_reorganize_the_national_guard_second_brigade: "公共秩序小队§Y第25独立旅§!"
 UKR_reorganize_the_national_guard_third_brigade: "乌克兰国民警卫队§Y第四行动旅§!"
 UKR_reorganize_the_national_guard_four_brigade: "公共秩序小队§Y第23独立旅§!"
 UKR_natguard_created_tt: "现在你可以招募§Y国民警卫队旅§!"
 UKR_uop_decision_category: "乌克兰国防工业"
 UKR_uop_decision_category_desc: "乌克兰国防工业联合体是乌克兰国家管理的军事工业综合体企业协会。该联合体包括从事武器、军事和特种装备及弹药的开发、制造、销售、维修、现代化和处置领域的经济活动的国防工业企业，以及参与与外国的军事技术合作。该联合体负责国防工业企业的战略规划、协调和效率改进以及与政府当局的互动。\n\n\n目前我们可以用在额外临时车辆上的额外工业产能是[?ukr_industry_points]"
