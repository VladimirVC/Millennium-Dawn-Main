 state_owned_local_naval_infrastructure_modifier: "Rozbudowa lokalnej infrastruktury morskiej"
 state_owned_local_naval_infrastructure_modifier_desc: "Inwestycje w obronę wybrzeża i infrastrukturę morską przekształciły potencjał morski państwa. Nowe obiekty marynarki wojennej i centra zaopatrzenia zapewniają obecnie kompleksowe wsparcie dla operacji morskich w regionie."
 state_owned_local_fortification_efforts_modifier: "Lokalne wysiłki fortyfikacyjne"
 state_owned_local_fortification_efforts_modifier_desc: "W całym stanie zbudowano rozległe obiekty obronne, w tym bunkry, fortyfikacje nadbrzeżne i sieci twierdz. Te obiekty wojskowe znacząco wzmacniają zdolności obronne stanu w obliczu inwazji i ataków lądowych."
