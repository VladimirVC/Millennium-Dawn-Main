 indonesia.57.t: "Catastrophe à Sulawesi !"
 indonesia.57.d: "Notre incapacité à construire des infrastructures adéquates à Sulawesi a provoqué l'effondrement de plusieurs bâtiments et la mort de nombreux membres de notre peuple."
 indonesia.57.a: "C'était évitable !"
 indonesia.58.t: "Catastrophe en Papouasie occidentale !"
 indonesia.58.d: "Notre incapacité à assurer une gestion adéquate de la Papouasie occidentale a entraîné un incident au cours duquel l’une de nos usines militaires s’est effondrée."
 indonesia.58.a: "C'était évitable !"
 indonesia.59.t: "Catastrophe en Papouasie !"
 indonesia.59.d: "Notre incapacité à fournir les infrastructures nécessaires à la Papouasie occidentale a entraîné un accident industriel qui a endommagé plusieurs installations de production militaire."
 indonesia.59.a: "C'était évitable !"
 indonesia.61.t: "Catastrophe à Java-Est !"
 indonesia.61.d: "Notre incapacité à répondre aux besoins de la population de Java oriental a entraîné un incident d’entreprise, entraînant la fermeture d’un immeuble de bureaux !"
 indonesia.61.a: "C'était évitable !"
 indonesia.62.t: "Catastrophe dans notre capitale !!"
 indonesia.62.d: "Notre incapacité à subvenir aux besoins de la population de Java occidental, où se trouve également notre capitale, a conduit à un incident au cours duquel une usine industrielle s'est effondrée."
 indonesia.62.a: "C'était évitable !"
 indonesia.63.t: "Catastrophe dans le ciel !"
 indonesia.63.d: "Notre incapacité à fournir un équipement aéronautique adéquat a conduit à des défaillances techniques sur l'un de nos vols, causant de nombreuses morts !"
 indonesia.63.a: "C'était évitable !"
 indonesia.64.t: "Catastrophe dans notre capitale !!"
 indonesia.64.d: "Notre incapacité à subvenir aux besoins de la population de Java occidental, où se trouve également notre capitale, a conduit à un incident au cours duquel plusieurs usines industrielles se sont effondrées."
 indonesia.64.a: "C'était évitable !"
 indonesia.988.t: "Préparatifs pour une nouvelle capitale"
 indonesia.988.d: "Grâce à tous les conseils et à l'aide que nous avons reçus du Japon, nous sommes arrivés à la conclusion qu'il fallait commencer les préparatifs pour déplacer notre capitale de Jakarta. La nouvelle capitale sera située à l'est de Bornéo et les plans de construction commenceront immédiatement !"
 indonesia.988.a: "Nous allons de l'avant"
 indonesia.888.t: "La nouvelle route de la soie"
 indonesia.888.d: "Une récente réunion avec les Chinois vient de se terminer. Ils ont loué notre partenariat et notre capacité à faire passer l'industrie indonésienne de rien à quelque chose en si peu de temps. Bien qu'il nous reste encore beaucoup de travail à faire, les présidents chinois ont fait l'éloge de notre nation et l'ont surnommée « la Route de la soie du 21e siècle »."
 indonesia.888.a: "Très flatteur"
