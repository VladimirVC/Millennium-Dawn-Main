 BAY.Monarchist_desc: ""
 IRQ.socialism: "£IRQ_national_congress_small (INC) イラク国民会議"
 IRQ.socialism_icon: "£IRQ_national_congressa_small"
 IRQ.socialism_desc: "社会民主主義 - イラク国民会議（アラビア語ローマ字表記：Al-Moutammar Al-Watani）\n\nイラク国民会議は、湾岸戦争後にイラクにおけるバアス党体制に抵抗するための連合組織として結成された。この組織はアメリカ合衆国から資金提供を受け、シーア派、元軍人、自由主義者、社会主義者、その他多くの政治的・民族的グループで構成されていた。"
 IRQ.conservatism: "£IRQ_conservatism_small イスラム・ダアワ党 - イラク組織"
 IRQ.conservatism_icon: "£IRQ_conservatism_small"
 IRQ.conservatism_desc: "保守主義 - サダム・フセインの独裁政権下において、ダアワ党は残忍な迫害と根絶作戦に晒され、生き残った指導者の大半は近隣諸国やヨーロッパへ逃亡を余儀なくされた。彼らは国外に亡命した後も、国内に残留して組織的な反乱活動で政権と戦う活動家たちを率い続けた。しかし時が経つにつれ、国内に残留した党員と亡命指導者層の間で意見の相違と対立が生じ、党は分裂した。その結果、イラク国内の地下組織の一部が分離し、ハシム・アル・モサウィを指導者とする「イスラム・ダアワ党 - イラク組織」を結成した。同指導者はイラクのシーア派の間で広く知られ、尊敬を集めている人物である。"
 IRQ.Neutral_conservatism: "£generic_Neutral_conservatism_small 保守派"
 IRQ.Neutral_conservatism_desc: ""
 IRQ.Conservative_2018: "£IRQ_Conversative_2017_small 文明同盟"
 IRQ.Conservative_2018_icon: "£IRQ_Liberalism_2017_small"
 IRQ.Conservative_2018_desc: "保守主義 - 文明同盟（アラビア語ローマ字表記：Tahalof Tamadon）はイラクにおける二大世俗連合の一つで、その主な思想は世俗主義と非宗派主義であり、イラク再建に重点を置いている。"
 KUR.Neutral_Communism: "£KUR_Neutral_Communism_small (KCP) クルディスタン共産党"
 KUR.Neutral_Communism_desc: "クルディスタン共産党（クルド語ローマ字表記：Partiya Komunîst a Kurdistanê）はクルド人の政党であり、1993年にイラク共産党のクルド地域支部が独立した政党として結成された際に誕生した。"
 KUR.Autocracy: "£KUR_Autocracy_small (PUK) クルディスタン愛国同盟"
 KUR.Autocracy_icon: "£KUR_Autocracy_small"
 KUR.Autocracy_desc: "独裁体制 - クルディスタン愛国同盟（クルド語ローマ字表記：Yekêtiy Niştîmaniy Kurdistan）は、クルディスタン民主党（KDP）の強力なバルザーニー家支配に対抗する、より左派的な選択肢として設立された折衷的なクルド政党である。イラク・クルド内戦終結後、イラク・クルディスタン南部を実質的に支配し、大規模なペシュメルガを掌握し続けている。クルド独立問題ではKDPより現実的な姿勢を保ち、KDPとイランの関係が冷え込む中、イランとの関係を強化している。"
 PER.socialism_icon: "£PER_socialism"
 PER.hardline_totalitarian: "£generic_Vilayat_e_Faqih_small （IRP）イスラム共和党"
 PER.hardline_totalitarian_desc: "(Khomeinism) - Representing the original Islamic Revolution itself, the Islamic Republican Party was founded as a political vehicle for the Ayatollah Ruhollah Khomeini and his supporters. Though the original iteration of the party was dissolved in 1987 due to factionalism, its legacy continued on in the national coalition of Principlists and Reformists - each themselves factionalized, though existing in a more informal sense than the organized IRP had."
 PER.Neutral_conservatism_icon: "£PER_Neutral_conservatism"
 PER.nation_party: "£PER_Nat_Populism_small (NPI) イラン国民党"
 PER.nation_party_desc: "民族民主主義 - イラン国民党（ペルシア語/ファルシ語ローマ字表記：Hezb-é Mellat-é Irân）\n\n国民党（ヘズベ・メラト・エ・イラン）は、1951年10月、ペゼシュクプールとフォルハルの対立を契機に汎イラン主義者から分裂した。フォルハルはより民主的な政策を推進しようとした一方、ペゼシュクプールは党を権威主義へと導こうとしたため、フォルハルは国民党を結成した。"
 POL.Neutral_conservatism: "£POL_walesa (ChDRP) 第三共和政キリスト教民主主義党"
 POL.Neutral_conservatism_icon: "£POL_walesa"
 POL.Neutral_conservatism_desc: "ポーランド第三共和政キリスト教民主主義党（ChDRP）は、1997年にレフ・ワレサによって設立されたポーランドの政党で、自由市場経済、社会正義、強力な国防を提唱するキリスト教民主主義政党である。近年は衰退傾向にあるものの、ポーランド政治において依然として重要な勢力である。"
 POL.Monarchist_icon: "£POL_Monarchist_small"
 SOV.Western_Autocracy: "£SOV_western_autocrat （OHR）我が家ロシア"
 SOV.Western_Autocracy_icon: "£SOV_western_autocrat"
 SOV.Western_Autocracy_desc: "エリツィン改革主義 ｰ 我が家ロシア（ロシア語ローマ字表記：Nash Dom - Rossiya）\n\n我が家ロシアは、1995年にヴィクトル・チェルノムイルジン首相が国家院選挙への出馬と親政府多数派形成を目的に設立した中道政党である。同党はボリス・エリツィン元大統領の中道右派思想と政策を支持している。"
 SOV.conservatism_1: "£SOV_western_conservative_1 （RPR-PARNAS）人民自由党"
 SOV.conservatism_1_icon: "£SOV_western_conservative_1"
 SOV.conservatism_1_desc: "自由民主主義 ｰ ロシア共和党・人民自由党（ロシア語ローマ字表記：Respubikanskaya Partiya Rossii - Partiya Narodnoy Svobody）\n\n 人民自由党（通称：PARNAS）は最も古い政党の一つであり、1990年にソビエト連邦共産党のプラットフォームの一つとして始まり、後に独立した政党へと発展した。あらゆるレベルの選挙に参加し、限定的な成功を収めてきた。同党は自由主義、市場経済、反権威主義を掲げている。"
 SOV.socialism_1: "£SOV_social_democrat_1 （JR）公正ロシア - §C親西側派§!"
 SOV.socialism_1_icon: "£SOV_social_democrat_1"
 SOV.socialism_1_desc: "社会民主主義 ｰ 公正ロシア（ロシア語ローマ字表記：Spravedlivaya Rossiya）\n\n公正ロシアは、様々な左派民族主義、社会主義、進歩主義政党の統合によって誕生した。党は自らを社会主義と位置付けているが、実際には左派民族主義者と左派自由主義派を含む広範な左派連合である。同党は社会プログラムの拡充と国家の経済へのより大きな関与を提唱している。"
 SOV.Autocracy: "£SOV_Autocracy （PPUM）祖国"
 SOV.Autocracy_icon: "£SOV_Autocracy"
 SOV.Autocracy_desc: "左派民族主義 ｰ 人民愛国連合「祖国」（ロシア語ローマ字表記：Narodno-Patrioticheskiy Soyuz 'Rodina'）\n\n祖国は、愛国主義、民族主義、そしてロシア経済への政府の広範な介入を推進する左翼ロシア民族主義政党である。"
 SOV.Neutral_Autocracy: "£SOV_non_aligned_autocracy （PRR）ロシア再生党"
 SOV.Neutral_Autocracy_icon: "£SOV_non_aligned_autocracy"
 SOV.Neutral_Autocracy_desc: "左派愛国主義 ｰ ロシア再生党（ロシア語ローマ字表記：Partiya Vozrozhdeniya Rossii）\n\nロシア再生党は、ロシア連邦共産党に不満を抱いたメンバーによって設立された左翼政党である。同党は市場規制、軍事支出の削減、ナショナリズム、社会支出の拡大を支持している。"
 WAG.Nat_Autocracy: "£SOV_Nat_Autocracy_wagner (WP) ワグネル党"
 WAG.Nat_Autocracy_icon: "£SOV_Nat_Autocracy_wagner"
 WAG.Nat_Autocracy_desc: "ワグネルの過激派は敵に礼儀を尽くすつもりなどない。"
 DPR.Nat_Populism: "£DPR_nat_pop 新ロシア党"
 DPR.Nat_Populism_icon: "£DPR_nat_pop"
 DPR.Autocracy: "£DPR_autocracy (DR) ドネツク共和国"
 DPR.Autocracy_icon: "£DPR_autocracy"
 DPR.Autocracy_desc: "ドネツク共和国はウクライナからのドネツク分離を支持する親ロシア派政党である。"
 SOV.oligarchism_council: "£SOV_oligarchs （LR）自由ロシア"
 SOV.oligarchism_council_icon: "£SOV_oligarchs"
 SOV.oligarchism_council_desc: "自由寡頭政治主義 ｰ 自由ロシア（ロシア語ローマ字表記：Liberal'naya Rossiya）は、オリガルヒのボリス・ベレゾフスキーが支援した政党であったが、資金不足により活動停止となった。今やオリガルヒは権力の座に返り咲き、立法を掌握するための自らの権力政党を必要としている。"
 ARM.Nat_Autocracy_wagner: "£SOV_Nat_Autocracy_wagner (WP) ワグネル党"
 ARM.Nat_Autocracy_wagner_icon: "£SOV_Nat_Autocracy_wagner"
 ARM.Nat_Autocracy_wagner_desc: "我が国で権力を掌握したワグナル派は、真の意味での軍事独裁政権、その最たるものである。"
 TUR.Neutral_Muslim_Brotherhood_akp: "£TUR_Neutral_Muslim_Brotherhood (AKP) 公正発展党"
 TUR.Neutral_Muslim_Brotherhood_akp_icon: "£TUR_Neutral_Muslim_Brotherhood"
 TUR.Neutral_Muslim_Brotherhood_akp_desc: "穏健イスラム主義 - 公正発展党（トルコ語：Adalet ve Kalkınma Partisi）\n\n公正発展党は、レジェップ・タイイップ・エルドアンの政治思想を中核とする保守的なイスラム主義政党である。世俗主義を標榜しつつも、ヒジャブの解禁やアルコール課税など、保守的なイスラムの要素を復活させる政策を数多く推進している。外交政策においては、アメリカや西側諸国と協調する傾向があるが、トルコ自身の利益を考慮することに躊躇せず、特定の陣営に縛られない外交を展開することが多い。\n\nこの党に対する軍の§Y評価§!: §R-100§!"
 TUR.oligarchism_mafia: "£generic_oligarchism_small トルコ・マフィア"
 TUR.oligarchism_mafia_icon: "£generic_oligarchism_small"
 TUR.oligarchism_mafia_desc: "トルコ・マフィア - トルコ・マフィアは非常に長い間、トルコの政治と日常生活に関与してきた。彼らはトルコ国内および国外で犯罪活動を行うことで知られている。彼らの国外活動は主に西ヨーロッパで行われるが、そこ以外でも活動しているようだ。\n\nこの党に対する軍の§Y評価§!: §R-25§!"
 RAJ.Neutral_Libertarian: "£RAJ_non_aligned_libertarian スワタントラ党"
 RAJ.Neutral_Libertarian_icon: "£RAJ_non_aligned_libertarian"
 RAJ.Neutral_Libertarian_desc: ""
 RAJ.Neutral_green: "£RAJ_non_aligned_greens インド緑の党"
 RAJ.Neutral_green_icon: "£RAJ_non_aligned_greens"
 RAJ.Neutral_green_desc: ""
 RAJ.Monarchist_icon: "£RAJ_nationalist_monarchist"
 ALB.liberalism_icon: "£ALB_western_liberal"
 ALB.socialism_icon: "£ALB_western_social_democrat"
 ALB.oligarchism: "£ALB_non_aligned_oligarchism アルバニア・マフィア"
 ALB.oligarchism_icon: "£ALB_non_aligned_oligarchism"
 ALB.oligarchism_desc: "寡頭政治主義 - 1990年に初めてその存在が確認されたアルバニア・マフィア（アルバニア語：Mafia Shqiptare）は、世界中で様々な違法活動や秘密裏の活動を行っており、イタリアの「ンドランゲタ」から南米のカルテル、さらには遠く離れたイスラエルに至るまで、幅広い組織と協力関係を築いている。"
 ALB.neutral_Social: "£ALB_neutral_Social (PSD) アルバニア社会民主党"
 ALB.neutral_Social_icon: "£ALB_neutral_Social"
 ALB.neutral_Social_desc: "非同盟社会民主主義 - 1991年に結成されたアルバニア社会民主党（アルバニア語：Partia Socialdemokrate e Shqipërisë）は、ホッジャ主義体制崩壊後の激動の時代に、元教育大臣によって設立された社会民主主義政党である。同党は親欧州的立場をとっているものの、既存の親欧州政治ブロックには加盟しておらず、提携関係も結んでいない。"
 ALB.Nat_Populism: "£ALB_Nat_Populism (PBK) アルバニア国民戦線党"
 ALB.Nat_Populism_icon: "£ALB_Nat_Populism"
 ALB.Nat_Populism_desc: "右派ポピュリズム - 1989年に結成されたアルバニア民族戦線党（アルバニア語：Partia Balli Kombëtar Shqiptar）は、ティラナ、プリシュティナ、テトヴォを拠点とする極右の多民族政党である。同党は、アルバニア系住民に対する領土回復主義的な政策を掲げており、その反共産主義的な姿勢は、元共産党員だけでなく、他党所属者までも排除するほど徹底している。"
 ALB.Nat_Fascism: "£ALB_Nat_Fascism (PUK) 国民統一党"
 ALB.Nat_Fascism_icon: "£ALB_Nat_Fascism"
 ALB.Nat_Fascism_desc: "超国家主義 - 1991年に結成された国民統一党（アルバニア語：Partia e Unitetit Kombëtar）は、コソボおよびギリシャやマケドニアに居住するアルバニア系住民を含む汎アルバニア連邦の樹立を追求・支持する超国家主義政党である。"
 AUS.Western_Autocracy: "£generic_Western_Autocracy_small (SGA) シュヴァルツ＝ゲルベ・アリアンツ"
 AUS.Western_Autocracy_desc: "君主主義 - 2004年に結成されたシュヴァルツ＝ゲルベ・アリアンツ（黒と黄色の同盟）は、世襲君主制（できればハプスブルク家によるもの）の復活を目指す君主制政党であり、当然のことながら、オーストリア＝ハンガリー帝国の時代と同様に、共通の皇帝の下でオーストリア、ハンガリー、クロアチア、チェコ共和国、スロベニア、スロバキアが統合されることを提唱している。"
 AUS.oligarchism: "£generic_oligarchism_small (DU) 独立党 - ルグナーリスト"
 AUS.oligarchism_desc: "寡頭主義 - 1998年に結成された独立党 - ルグナーリスト（ドイツ語：Die Unabhängigen - Liste Lugner）は、ウィーンの建築家リヒャルト・ルグナーの政治的野心を満たすために設立された政党であり、連邦参議院の廃止、賃金への直接補助の実施、そして長期失業者への徴用政策の導入を目指している。"
 AUS.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (PIRAT) オーストリア海賊党"
 AUS.Neutral_Libertarian_desc: "海賊政治 - 2006年に設立されたオーストリア海賊党（ドイツ語：Piratenpartei Österreichs）は、海賊政治の理念を掲げる政党である。同党は、現代社会をより自由でオープンソースな世界にすることを目指し、著作権法をはじめとする各種法制度の抜本的な改革を提唱している。国際主義的な視点に加え、欧州内では$USoE.Neutral_Libertarian_2017$と提携関係にある。"
 AUS.neutral_Social: "£generic_neutral_Social_small (EL) 統一リスト"
 AUS.neutral_Social_desc: "非同盟社会民主主義 - 1973年に結成された統一リスト（ドイツ語：Enotna Lista）は、クラーゲンフルトを拠点とする社会民主主義政党であり、カリンシア地方周辺のスロベニア系少数民族に利益をもたらし、そのために奉仕する政策の推進を目指している。同党は$USoE.neutral_Social_2017$の加盟政党である。"
 AUS.Neutral_Communism: "£AUS_emerging_left_wing_radical (SLP) 社会主義左翼党"
 AUS.Neutral_Communism_icon: "£AUS_emerging_left_wing_radical"
 AUS.Neutral_Communism_desc: "トロツキー主義 - 2000年に結成された社会主義左翼党（ドイツ語：Sozialistisches LinksPartei）は、1980年代の社会主義攻勢前進党を起源としている。2000年、$AUS.Nat_Populism$の連立政権参加に反対する抗議運動の中で、同党は現在の名称で知られるようになった。同党は国際社会主義オルタナティブの加盟組織であり、本質的に欧州懐疑主義を掲げている。EUを労働者の利益に資さない新自由主義的組織と見なし、その代替となる「労働者のEU」の構築を目指している。"
 AZE.Neutral_Autocracy: "£AZE_non_aligned_autocracy （YAP）新アゼルバイジャン党"
 AZE.Neutral_Autocracy_icon: "£AZE_non_aligned_autocracy"
 AZE.Neutral_Autocracy_desc: "民族主義的独裁体制 - 1992年にヘイダル・アリエフの政治的基盤として結成された新アゼルバイジャン党は、1993年のアゼルバイジャン・クーデターを経て政権を掌握した。その後の選挙と弾圧の強化によりその権力はさらに強固なものとなり、ヘイダルの息子であるイルハム・アリエフは父と同様の政策を継続している。イデオロギー的にはアゼルバイジャン民族主義と社会的保守主義を掲げているが、経済面では国家資本主義あるいは「社会市場」政策、および名目上の福祉国家を支持している。"
 EST.liberalism_icon: "£EST_western_liberal"
 EST.socialism_icon: "£EST_western_social_democrat"
 EST.anarchist_communism2: "£EST_anarchist_communism_2 (EUVP) エストニア統一左翼党"
 EST.anarchist_communism2_desc: "民主社会主義 - エストニア統一左翼党（エストニア語: Estonian United Left Party）\n\n EUVPはエストニアにおけるロシア系少数民族を代表する政党である。同党はエストニア・ソビエト社会主義共和国の旧支配階級政党であったエストニア共産党の直接の後継政党である。"
 EST.Nat_Fascism2: "£EST_Nat_Fascism (EKRE) エストニア保守人民党"
 EST.Nat_Fascism2_desc: "エストニア民族主義 - エストニア保守人民党（エストニア語：Eesti Konservatiivne Rahvaerakond）\n\n EKREはエストニアの民族主義的・右派ポピュリスト政党である。同党は左右の政治スペクトルを強く否定し、超国家主義的で反ロシア的な政党と評される一方、スイス式民主主義の導入を望んでいる。ロシア語教育の全てをエストニア語教育へ移行することを支持し、EUからの政治的独立を支持する熱心なユーロ懐疑主義政党である。"
 EST.Nat_Populism2: "£EST_national_populism_2 (EV) エストニア自由党"
 EST.Nat_Populism2_desc: "保守的ポピュリズム - エストニア自由党（エストニア語：Eesti Vabaerakond）\n\n EVは右派リベラル思想とポピュリズム思想を融合させ、政党への資金援助削減と企業支援を提唱する一方、同性婚の承認やEU移民政策には強く反対している。"
 FIJ.conservatism_2001: "£FIJ_western_conservative_alt United Fiji Party"
 FIJ.conservatism_2001_desc: "The United Fiji Party (Soqosoqo Duavata ni Lewenivanua, SDL) was a political party in Fiji. It was founded in 2001 by Prime Minister Laisenia Qarase as a power base; it absorbed most of the Christian Democratic Alliance and other conservative groups, and its endorsement by the Great Council of Chiefs caused it to be widely seen as the successor to the Alliance Party, the former ruling party that had dominated Fijian politics from the 1960s to the 1980s. It drew its support mainly from indigenous Fijiians."
 FIJ.Neutral_conservatism: "£FIJ_non_aligned_conservative People's Alliance (PA)"
 FIJ.Neutral_conservatism_desc: "The People's Alliance has been viewed as a conservative's conservative party. This being from the fact that it split from the Social Democratic Liberal Party, which itself was a split from the Fiji First Party."
 FIJ.oligarchism: "£FIJ_oligarchism (TPF) フィジー・テクノクラート党"
 FIJ.oligarchism_desc: "フィジー・テクノクラート党（TPF）は実験的な政党であり、フィジーのSTEM分野におけるトップ人材の合理的な思考から生まれたものである。それにもかかわらず、同党はフィジー全体を改革し、自らが謳う「太平洋の輝く灯台」へと変貌させることを目指している。4週間ごとに4週間ずつ勤務する「永久的な勤務ローテーション」といった、いくつかのシンプルなテクノクラート的なアイデアを導入することで、TPFのメンバーは、世界から見れば取るに足らない存在であるフィジーを、真に「山」のような存在へと成長させたいと願っている。"
 FIJ.neutral_Social: "£FIJ_non_aligned_socialist_democrat National Federation Party (NFP)"
 FIJ.neutral_Social_desc: "The National Federation Party is a Fijian political party founded by A.D. Patel in November 1968, as a merger of the Federation Party and the National Democratic Party. Though it claims to represent all Fiji Islanders, it is supported, in practice, almost exclusively by Indo-Fijians whose ancestors had come to Fiji between 1879 and 1916, mostly as indentured labourers. However, in the 2018 general election, the party recorded a considerable change in its support base due to the inclusion of more indigenous Fijian candidates."
 FIJ.Monarchist: "£FIJ_nationalist_monarchist スバ家"
 FIJ.Monarchist_desc: "フィジーの君主主義は、フィジーの部族の歴史に深く根ざした発想から生まれたもので、トゥイ・ヴィティ（フィジー国王）は過去に確立された準公式の称号である。植民地支配と現代の政治的混乱に翻弄されながらも、フィジー系民族の多数派と首長評議会の同意を得て、スバ王室が設立された。フィジーの文化的・政治的影響を反映した西洋式君主制は、強力な議会民主制を伴う立憲君主制と見なされている。"
