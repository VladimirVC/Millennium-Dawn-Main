 antarctica_reports_warning_tt: "§R警告:§!\n報告数が7件を超えると、南極条約協議国は自国に対して厳しい制裁やATCP資格の剥奪（該当する場合）を含む外交的措置を講じる可能性がある。悪影響を避けるため、報告数を7件未満に抑えることを推奨する。\n\n核兵器研究の検知により違反が発生した場合、南極条約の各締約国に自国への禁輸措置を検討するイベントが発生する。"
