 UKR_interlegion_13: "Llamar al §YBatallón Krym§! al frente"
 UKR_drone_army: "El Ejército de Drones"
 UKR_drone_army_desc: "We will start mass production of drones. The country needs thousands of drones."
 UKR_tck_mobka: "Movilización Total"
 UKR_tck_mobka_desc: "We are forced to carry out several waves of mobilization to replenish our armed forces."
 UKR_attack_guardia: "La Guardia Ofensiva"
 UKR_attack_guardia_desc: "¡Estamos listos para pasar de la defensa al ataque! ¡Ataquemos con guardia para derrotar al enemigo!"
 UKR_inter_legion_idea: "Legión Internacional"
 UKR_inter_legion_idea_desc: "Many foreigners from all over the world are ready to support us in our struggle for independence."
 UKR_air_superior_idea: "Tácticas de Dominio Aéreo"
 UKR_air_superior_idea_desc: "We strive to gain air superiority."
 UKR_inter_created_tt: "Se creará la §YLegión Internacional§! y podrás contratar batallones aliados de diferentes países"
 UKR_kraken_created_tt: "Se creará el §YBatallón Kraken§!"
 UKR_hur_other_battalions_created_tt: "Se crearán §YNuevos Batallones del HUR§!"
 UKR_free_russia_created_tt: "La §YLegión de la Libertad de Rusia§! estará disponible para operaciones especiales limitadas"
