 WAA.Autocracy_icon: "£WAA_Autocracy"
 WAA.Autocracy_desc: "親中的独裁体制 - ワ州連合党（UWSP）は、ミャンマーのシャン州北部にある自治州であるワ州の与党である。1989年11月3日、ビルマ国民統一党と、いくつかの小規模な非共産主義系ワ族グループが合併して結成された。UWSPは毛沢東主義をイデオロギーとして掲げ、ワ州において唯一の合法的な政治組織として統治を行っている。また、同党は中華人民共和国と緊密な関係を築いており、ワ州をミャンマー国内の紛争から遠ざけ、中国とのさらなる統合へと導いている。"
 BSH.Neutral_conservatism: "£BSH_nationalist_right_wing_populist バシキール青年連合"
 BSH.Neutral_conservatism_desc: "右派ポピュリスト - バシキール青年連合は、アルトゥール・イデルバエフ率いるバシコルトスタン初の民族主義組織である。バシコルトスタン共和国の公共生活においてバシキール青年を確立するために創設され、後に最大の民族主義組織へと成長した。同党はトルコの灰色の狼と政治的連携を持つ。"
 BSH.neutral_Social: "£SOV_non_aligned_socialist_democrat (PB) バシコルトスタンの愛国者"
