 CPD_liberate_in_state_button_TT_DELAYED_DEMAND: "§Y해방§!을 요구하면 선택한 주를 정당한 영유권을 가진 국가에 돌려줍니다. 현재 존재하는 핵심 주 보유국이 있다면 영토를 직접 돌려받으며, 멸망한 지 오래된 국가라면 다시 부활하여 영토를 받게 됩니다. 핵심 주 보유국이 남아있지 않은 경우, 현재 소유국의 남은 영토에서 새로운 분리 독립 국가가 형성됩니다."
 CPD_liberate_in_state_button_TT_DELAYED_CONCESSION: "§Y독립 승인§!은 우리가 통제하고 있는 선택된 주를 정당한 권리 주장국에 양도하는 것입니다. 해당 국가가 아직 존속 중이든 역사 속에서 부활해야 하든 관계없이 해방됩니다."
