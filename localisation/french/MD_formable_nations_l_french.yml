 form_MAGHREB_category: "L'Union arabo-maghrébine"
 form_MAGHREB_category_desc: "L’Union du Maghreb arabe est une union politique qui regroupe l’Algérie, la Libye, la Mauritanie, le Maroc et la Tunisie. Elle a pour objectif principal d’assurer l’unité politique et l’intégration économique des États-nations. Bien que l’activité de l’Union semble s’essouffler ces dernières années, il est peut-être temps de raviver cette idée. L’unification des peuples du Maghreb a donné naissance à une nouvelle nation capable de dominer le continent africain et le plateau méditerranéen. Il est temps d’unifier le Maghreb et de devenir l’une des grandes nations du monde."
