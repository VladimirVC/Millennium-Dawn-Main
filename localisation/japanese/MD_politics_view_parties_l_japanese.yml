 ITA.m5s2050_loc_key: "£ITA_M5S_2050 五つ星運動"
 ITA.m5s2050_loc_key_desc: "五つ星運動（イタリア語：Movimento 5 Stelle）は、コメディアンのベッペ・グリッロが長年にわたる集会を経て、2009年に設立した。その星のマークは、同運動が掲げる基本的な闘争「水、環境、交通、通信、開発」を表している。同運動は、その誕生の地であるウェブプラットフォームを組織の基盤としている。立候補資格として、申請者は犯罪歴が全くないこと以外、他の要件は求められない。選出された議員たちは、しばしば陰謀論やフェイクニュース、非科学的な主張を支持している。同党は、そのインフラをすべて所有する私的グループによって強く支配されているにもかかわらず、直接民主主義を強く信奉している。この運動は幅広いイデオロギーを包含しており、他の多くのポピュリスト政党と同様、多くの問題について立場を急速に変えることで知られている。その中核には、ベネズエラ、キューバ、中国の事例に影響を受けた左派的なイデオロギーがあり、エリート層への反対と資本主義の拒絶に強く傾いている。"
