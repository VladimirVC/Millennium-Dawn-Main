 HONG_KONG_POLITICS_TT: "\nThe politics of §Y[HKG.GetFlag]Hong Kong§! are divided into three camps: the §C£HKG_Conservative Pro-establishment camp§!, the §8£HKG_conservatism Pan-democracy camp§!, and the §G£generic_Nat_Populism_small Localist camp§!. Seats in the Legislative Council are determined by their approval ratings."
