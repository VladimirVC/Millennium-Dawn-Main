 CHI.conservatism: "£CHI_conservative （UOCN）中国泛藍連盟"
 CHI.conservatism_icon: "£CHI_conservative"
 CHI.conservatism_desc: "右派三民主義 - 中国泛藍連盟は中国の再統一を目指すリベラルな保守政党で、自由民主主義と三民主義を重んじる。"
 CHI.liberalism: "£CHI_liberal 中国民主党"
 CHI.liberalism_icon: "£CHI_liberal"
 CHI.liberalism_desc: "改良主義 - 中国民主党は中華人民共和国では禁止されている。改革主義と自由民主主義がその核心価値だ。ほとんどの西側の情報源によると、それは天安門事件の民主化活動家と元学生指導者から集められたものだ。"
 CHI.socialism: "£CHI_social_democrat 民主中国陣線"
 CHI.socialism_icon: "£CHI_social_democrat"
 CHI.socialism_desc: "進歩的大西洋主義 - FDC（民主中国陣線）は、カナダに本部を置く、人民共和国の民主化を提唱する団体で、彼らは中国と海外で最大の民主化運動の一つだ。"
 CHI.Communist-State: "£CHI_communism 中国共産党"
 CHI.Communist-State_icon: "£CHI_communism"
 CHI.Communist-State_desc: "鄧小平理論 - 中国共産党は、中華人民共和国の建国によって政権政党となった、中国本土で唯一の指導政党であり、統一戦線の主導政党でもある。1921年に設立され、国共内戦が終わった後も1949年から権力を維持している。"
 CHI.Autocracy: "£CHI_pro_emerging_autocrat 中国民主同盟"
 CHI.Autocracy_icon: "£CHI_pro_emerging_autocrat"
 CHI.Autocracy_desc: "実用的専制主義 - 中国民主連盟は、統一戦線の9つのメンバーの一つであり。中国有数の合法政党でもある。中国の愛国心と基本的に社会主義を主張する。"
 CHI.anarchist_communism: "£CHI_left_wing_radical 中国国民党革命委員会"
 CHI.anarchist_communism_icon: "£CHI_left_wing_radical"
 CHI.anarchist_communism_desc: "左派三民主義 - 民革は中国統一戦線を構成する9人のメンバーのうちの1人である。三民主義、左翼ナショナリズム、民主社会主義を提唱している。同党は共産党に次ぐ地位にあり、人民政治協商会議で最大の議席を獲得している。さらに、彼らは資産の運用と維持が認められている唯一の小政党の1つである。"
 CHI.Caliphate: "£CHI_salafist_jihadism トルキスタン・イスラム党"
 CHI.Caliphate_icon: "£CHI_salafist_jihadism"
 CHI.Caliphate_desc: "テュルク系イスラム主義 - 1997年に結成されたトルキスタン・イスラム党は、アジアの複数の国々で活動している。同組織は、ウイグル人の権利、厳格なイスラム原理主義、およびテュルク系民族の団結を主張している。テロ組織とみなされているこのグループは、タリバンやアルカイダなど、他の多くの類似組織とつながりがある。"
 CHI.neutral_Social: "£CHI_neutral_social_democrat 中国民主促進会"
 CHI.neutral_Social_icon: "£CHI_neutral_social_democrat"
 CHI.neutral_Social_desc: "左派実用主義 - 共産党に代わる政党として1945年以降に結成された党で、比較的規模の大きな小政党の一つである。"
 CHI.Neutral_Communism: "£CHI_neutral_communism （MCPC）中国毛沢東主義共産党"
 CHI.Neutral_Communism_icon: "£CHI_neutral_communism"
 CHI.Neutral_Communism_desc: "東方新左翼 - 中国毛沢東共産党は、中華人民共和国の地下反改革主義共産党である。彼らは、中国共産党との修正主義支配圏を打倒し、真の共産主義を達成しようとしている。"
 CHI.Nat_Autocracy: "£CHI_military_junta （PLA）中国人民解放軍"
 CHI.Nat_Autocracy_icon: "£CHI_military_junta"
 CHI.Nat_Autocracy_desc: "赤色軍事政権 - 人民解放軍は1927年の南昌蜂起で発足した。それは中華人民共和国とその創設政党の軍隊である。"
 CHI.Monarchist: "£CHI_monarchism 愛新覚羅家"
 CHI.Monarchist_icon: "£CHI_monarchism"
 CHI.Monarchist_desc: "皇帝支配 - 愛新覚羅家は、孝定景皇后が幼帝溥儀の退位を求める詔を発するまでの約276年間、中国を統治した。中国の正史では、外国勢力に譲歩し、漢民族を抑圧してきた満洲王朝を非難することが多い。"
 PER.conservatism: "£PER_IDF (IDF) イラン民主戦線"
 PER.conservatism_desc: "民主主義的保守主義 - イラン民主戦線（ペルシア語/ファルシ語ローマ字表記：Jebhe-ye Demokratik-e Irān）\n\nイラン民主戦線(IDF)は、イランにおける民主的政府の樹立を提唱する政治組織である。イスラム共和国に反対して結成されたIDFは、現行政権が体系的に人権を侵害し、テロ活動に関与していると主張する。同党は世俗的で民主的な戦線を推進し、民衆運動を通じてイスラム共和国を置き換える必要性を強調している。イランの領土保全と政教分離を支持している。"
 PER.liberalism: "£PER_ISDP (ISDP) イラン世俗民主党"
 PER.liberalism_desc: "自由民主主義 - イラン世俗民主党（ペルシア語／ファルシ語ローマ字表記：Hezb-é Demokracy-ye Sekular-é Irān）\n\n本党は、世俗的民主主義者の戦線を構築し、イスラム政府を打倒してイランに世俗的民主主義政府を樹立することを目的としている。人権と宗教的自由を中核に据えている。"
 PER.socialism: "£PER_socialism (IP) イラン党"
 PER.socialism_desc: "自由社会主義 - イラン党（ペルシア語/ファルシ語ローマ字表記：Hezb-é Irān）\n\nヘズベ・イラン（イラン党）は、国民戦線党の支柱としてしばしば言及された。主にヨーロッパで教育を受けたテクノクラートによって創設されたイラン党は、イランにおいて社会民主主義と自由主義的ナショナリズムを推進している。"
 PER.Western_Autocracy: "£PER_Western_Autocracy (CPI) イラン憲法党(§CL-D§!)"
 PER.Western_Autocracy_desc: "専制君主主義 - イラン憲法党（ペルシア語/ファルシ語ローマ字表記：Hezb-é Mashrut-é Irān - 自由民主党）\n\nイラン憲法党・自由民主党はレザー・パフラヴィーの帰国を待ち望み、彼を打倒した革命派を強く非難している。絶対君主制を望んではいないものの、他の立憲主義団体と比較してシャーへのより直接的な統制権限付与を示唆している。"
 PER.Communist-State: "£PER_IFPG (IFPG) イラン人民フェダイ・ゲリラ - デフガニ派"
 PER.Communist-State_desc: "マルクス・レーニン主義 - イラン人民フェダイ・ゲリラ（ペルシア語/ファルシ語ローマ字表記：Čerikha-ye Fada'i-ye Khalq-e Irān - Dehghani）\n\nイラン人民フェダイ・ゲリラは、アシュラフ・デフガニがゲリラ戦術からの逸脱を非難したことでOIFPGから分裂し、1979年に結成された。同組織は唯一の正統な共産主義組織を自称し、イスラム共和国に強く反対した。元OIFPGの多くのメンバーが参加し、1979年のクルド人反乱ではイラン・クルディスタン民主党を支援し政府軍と戦った。現在、生存メンバーは主にイギリスを中心としたヨーロッパに所在している。"
 PER.Conservative: "£PER_IRGC_small (IRGC) イスラム革命防衛隊 - 政治部門"
 PER.Conservative_desc: "ホメイニ主義的軍国主義 - イスラム革命防衛隊（ペルシア語/ファルシ語ローマ字表記：Sepāh-é Pāsdarān）\n\nイスラム革命防衛隊(IRGC)は、イラン革命後の1979年4月22日にアヤトラ・ルーホッラー・ホメイニーの命令により創設されたイラン軍の一部門であり、イラン国境の防衛と国内秩序の維持を目的としている。この組織は政治分野にも拡大し、多くの元構成員が強硬派として公職に立候補している。"
 PER.Autocracy: "£PER_autocracy (STQ) コム神学校教師協会"
 PER.Autocracy_desc: "ホメイニ主義 ｰ 原理主義派（ペルシア語/ファルシ語ローマ字表記：Jâme'e Mādarressin-é Qom）\n\nコム神学校教師協会は、ホメイニ師の政治活動を組織化し、ヴィラヤト・エ・ファキーフ（イスラム法学者の統治）といったホメイニ師の革命的イスラム解釈を広めるため、ホメイニ師の弟子たちによって設立された。"
 PER.Vilayat_e_Faqih: "£PER_Vilayat_e_Faqih 保守強硬派"
 PER.Vilayat_e_Faqih_desc: "ホメイニ主義 ｰ 原理主義派 ｰ 原理主義派はイラン・イスラム共和国内の強硬派政治連合を象徴しており、超保守主義、軍国主義、国粋的ホメイニ主義を標榜している。複数の政党、組織、あるいは内部派閥から成るこの連合は、改革派とともに共和国内では二大主要連合として目されている。"
 PER.Mod_Vilayat_e_Faqih: "£PER_Mod_Vilayat_e_Faqih 改革派"
 PER.Mod_Vilayat_e_Faqih_desc: "ホメイニ主義改革派 - 改革派は、イラン・イスラム共和国内のよりリベラルな勢力が結集した広範な連合体であり、その信条の多くは、より改革的なリベラルな政策方針に沿ったものである。彼らは、イスラム共和国の維持か、あるいはより開放的な体制への移行かという、さまざまな最終目標を掲げつつ、同国の近代化と民主化を目指している。歴史的に見て、このグループの最も著名なメンバーは、そうでなければ国内で政治的な活躍の場を持たなかったであろう様々な立場の左派であった。ただし、その中には進歩派、リベラル派、社会民主主義者、穏健保守派なども含まれている。"
 PER.anarchist_communism: "£PER_anarchist_communism (MEK) イラン人民ムジャヒディン機構"
 PER.anarchist_communism_desc: "イスラム教マルクス主義 - イラン人民ムジャヒディン機構（ペルシア語/ファルシ語ローマ字表記：Mojâhedin-é Khalq-é Irân）\n\nMEK（イラン人民ムジャヒディン機構）は1965年にパフラヴィー朝に反対して結成され、その創設理念はマルクス主義とイスラム主義に強く影響を受けている。党組織がマリアム・ラジャヴィとマソウド・ラジャヴィを中心に構成されていることから、しばしば「カルト的」集団と呼ばれる。MEKはイランをより連邦制的で社会主義的な国家へと導く一連の計画の実施を望んでいる。"
 PER.Caliphate: "£generic_Caliphate_small (IS–KP) イスラム国ホラサン州"
 PER.Caliphate_desc: "サラフィー・ジハード主義 - イスラム国ホラサン州は、歴史的なホラーサーン地方を中心に、イラン、アフガニスタン、パキスタン、中央アジアの一部を包含する、イスラム国による非公認の自称行政区域である。イデオロギー的には、このグループはイスラム国の他の勢力と同様の信条を掲げており、イスラム民族主義、サラフィズム、ワッハーブ主義、およびスンニ派イスラム教のより超保守的な分派に見られるその他の諸要素が混ざり合ったものである。"
 PER.Neutral_conservatism: "£PER_Neutral_conservatism (NFI) イラン国民戦線"
 PER.Neutral_conservatism_desc: "市民ナショナリズム - イラン国民戦線（ペルシア語/ファルシ語ローマ字表記：Jebhe-ye Melli-ye Irân）\n\nジェブヘ・イェ・メッリ・イラン、別名国民戦線は、モハンマド・モサデクによって設立されたイランのナショナリズム政党である。モハンマド・レザー・パフラヴィーの統治下では政治的雰囲気が厳しく制限され、国民戦線は数年後に活動を停止した。ついに1977年、シャーの統治が徐々に終焉を迎えようとしていた頃、カリム・サンジャビが国民戦線を再結成し、イラン国内での活動を再開した。しかしその後、アヤトラ政権によって禁止されるに至った。"
 PER.oligarchism: "£PER_oligarchism イランのオルガリヒ"
 PER.oligarchism_desc: "ホメイニ主義 - 技術官僚的寡頭政治 - イランのオルガリヒ (ペルシア語/ファルシ語ローマ字表記: Oligarkhā-ye Īrān)\n\nイランの寡頭政治家は主に二つの分野から生まれている。石油産業か、イスラム革命防衛隊のいずれかである。これらのグループには共通点があり、いずれも当時の支配体制と密接な関係を持っていた。こうした地位に基づく緊密な関係により、特定の個人は独占的な取引を確保することで莫大な富を築くことが可能となった。彼らは往々にして技術官僚的傾向を示し、個人の自由といった要素よりも経済的・科学的な発展を優先させる。"
 PER.neutral_Social: "£PER_OIPFM (OIPFM) イラン人民フェダイアン組織 - 多数派"
 PER.neutral_Social_desc: "社会民主主義／マルクス・レーニン主義への共感 - イラン人民フェダイアン組織 - 多数派（ペルシア語/ファルシ語ローマ字表記：Sāzmān-e Fedaiyān-e Khalq-e Irān - Aksariat）\n\nイラン人民フェダイアン組織 - 多数派（文字通りの訳では「イラン人民の自己犠牲者組織」）は、イランの左翼野党政治団体である。OIPFMはイラン世俗共和国の樹立と現行イスラム共和国政府の打倒を主張している。OIPFMは、1980年から1991年にかけてイラン最大級の共産主義組織とみなされていた「イラン人民フェダイ・ゲリラ組織」から派生した数ある分派の一つである。多数派は少数派（OIPF-Minority）とは異なり、複数の対立する派閥に分裂することなく結束した政党を維持している。"
 PER.Neutral_Libertarian: "£PER_neutral_Social (FMI) イラン自由運動"
 PER.Neutral_Libertarian_desc: "イスラム民主主義 ｰ イラン自由運動／イラン解放運動（ペルシア語／ファルシ語ローマ字表記：Nahżat-é āzādi-é Irān）\n\nイラン自由運動は自らを「ムスリム、イラン人、立憲主義者、モサデグ主義者」と称する。イランで活動する最古の政党の一つであり、イスラム共和国に対する準野党グループとして知られている。イラン自由運動は穏健なイスラム解釈を基盤としている。王政独裁と聖職者独裁の両方を拒否し、政治的・経済的自由主義を支持している。"
 PER.Neutral_Autocracy: "£PER_Neutral_Autocracy モンタゼリの支持者たち"
 PER.Neutral_Autocracy_desc: "イスラム民主主義 - アヤトラ・モンタゼリ支持者（ペルシア語/ファルシ語ローマ字表記：Peyrovân-e Montazeri）\n\nモンタゼリ支持者とは、アヤトラ・モンタゼリをイランの次期最高指導者に据えることを目指す、イスラム民主主義者、聖職者、労働者からなる連合体かつ広範な運動である。ホメイニ師による失脚後、モンタゼリ師は政府によって政治から追放された。その支持基盤は主に学者や知識層で構成されるが、改革派政治家やイスラム共和国に反対する諸勢力からも多大な支持を得ている。"
 PER.Neutral_Communism: "£PER_Neutral_Communism (WPI) イラン労働者共産党"
 PER.Neutral_Communism_desc: "労働者主義 ｰ イラン労働者共産党（ペルシア語/ファルシ語ローマ字表記：Hezb-é Kommunist-é Kârgari）\n\nイラン労働者共産党(Hezb-é Kommunist-é Kargari-ye Iran)は、1991年にイスラム共和国を打倒し、その代わりに社会主義共和国を樹立することを目的として設立された。"
 PER.Neutral_green: "£PER_Neutral_green (GPI) イラン緑の党"
 PER.Neutral_green_desc: "緑の政治 - イラン緑の党（ペルシア語/ファルシ語ローマ字表記：Hezb-é Sabzhā-ye Irān）\n\nイラン緑の党は、イラン環境省に対して急進的な立場を取っており、この政府機関をイスラム共和国の不適切な管理を隠蔽する組織と見なしている。"
 PER.Neutral_Muslim_Brotherhood: "£PER_Neutral_Muslim_Brotherhood (GPH) 希望の緑の道"
 PER.Neutral_Muslim_Brotherhood_desc: "第三の道 ｰ 希望の緑の道（ペルシア語/ファルシ語ローマ字表記：Rāh-é Sabz-é Omid）\n\nミール・ホセイン・ムーサヴィーによって設立された「希望の緑の道」は、平和的手段による民主主義への道を求めるイランの団体である。ムサヴィは「党」ではなく「道」という名称を選んだ。政府の認可が必要な政党制度を、ムサヴィは正当なものと認めなかったためである。希望の緑の道は改革派運動であり、共和主義と穏健イスラム主義の理念を中核思想として統合している。"
 PER.Nat_Autocracy: "£PER_military_junta (AJA) イラン・イスラム共和国軍"
 PER.Nat_Autocracy_desc: "ホメイニ主義 - 軍国主義 - イラン軍／アルテシュ（ペルシア語／ファルシ語ローマ字表記：Arteš-é Irān）\n\nアルテシュ・エ・イラン、すなわちイラン軍は紀元前550年に創設され、その現代的な形態は1921年のパフラヴィー朝成立時に確立された。アルテシュは、パフラヴィー時代もイスラム共和国時代も、イランの政治問題において概ね非政治的立場を保ってきた。歴史を通じてアルテシュは政権に忠誠を尽くしてきたが、イランの政治史において幾度か介入した事例もある。"
 PER.Nat_Fascism: "£PER_fascism_alt 人民の春"
 PER.Nat_Fascism_desc: "新保守的ナショナリズム ｰ 人民の春（ペルシア語/ファルシ語ローマ字表記：Bahar-e Mardom）\n\n「逸脱の潮流」とは、イラン式イスラム学派の創設を目指す運動の反対派が用いる呼称である。エスファンディアール・マシャエイを指導者とするこの運動は、聖職者をあらゆる権力から排除し、その代わりに神との直接的な関係を促進することを目指している。この運動はイラン民族主義を利用し、それをイスラム民族主義と一体化させようとしており、社会の様々な層からの支持を集めようとしている。"
 PER.Nat_Populism: "£PER_Nat_Populism_small (PIP) 汎イラン主義党"
 PER.Nat_Populism_desc: "汎イラン主義 - 汎イラン主義党（ペルシア語/ファルシ語ローマ字表記：Hezb-é Pān-Irānist）\n\n汎イラン主義党は1952年に結成され、イラン系諸民族の統一と、18世紀から19世紀にかけての屈辱と敗北の時代に失われたイラン領土の回復を推進している。同党は外国勢力のイラン及び地域への介入を強く反対し、何よりも国家の独立を重視している。"
 PER.Monarchist: "£PER_monarchism (HoP) パフラヴィー朝"
 PER.Monarchist_desc: "絶対君主制 - パフラヴィー家（ペルシャ語/ファルシ語ローマ字表記：Saltānāt-é Pāhlavi）\n\nパフラヴィー家は、イランの近代化と現代イランナショナリズムの枠組みを設定した功績でしばしば引用される。パフラヴィー家は、国の大幅な世俗化と西側諸国との連携強化を通じて近代化を推進しようとしたが、その姿勢は国内のイスラム主義勢力や反西側勢力との対立を招くことが多かった。"
 POL.conservatism: "£POL_conservatism_small (AWS)「連帯」選挙行動"
 POL.conservatism_icon: "£POL_conservatism_small"
 POL.conservatism_desc: "保守主義 - 「連帯」選挙行動（ポーランド語：Akcja Wyborcza Solidarność）は、自由主義者、保守派、キリスト教政党が結集した幅広い政治連合である。"
 POL.liberalism: "£POL_liberalism_small (UW) 自由連合"
 POL.liberalism_icon: "£POL_liberalism_small"
 POL.liberalism_desc: "自由主義 - 自由連合（ポーランド語：Unia Wolności）は、民主連合（Unia Demokratyczna, UD）と自由民主会議（Kongres Liberalno-Demokratyczny, KLD）の合併により結成された政党である。欧州の民主主義と自由主義の伝統を体現し、自由市場経済と個人の自由を擁護し、過激主義と狂信を拒絶する。"
 POL.socialism: "£POL_socialism_small (SLD) 民主左翼連合"
 POL.socialism_icon: "£POL_socialism_small"
 POL.socialism_desc: "社会民主主義 - 民主左翼連合（ポーランド語：Sojusz Lewicy Demokratycznej）は、中道左派の第三の道政党であり、ポスト共産主義のルーツを持つ。その政策は親欧州的、経済的には介入主義的、社会的には中道主義的と形容できる。"
 POL.Communist-State: "£generic_Communist_State_small (ZKP „Proletariat”) ポーランド共産主義者同盟「プロレタリアート」"
 POL.Communist-State_desc: ""
 POL.Communist-State_2017: "£generic_Communist_State_small (KPP) ポーランド共産党"
 POL.Communist-State_2017_desc: ""
 POL.Conservative: "£POL_Conservative_small (Samoobrona) 自衛"
 POL.Conservative_icon: "£POL_Conservative_small"
 POL.Conservative_desc: "反動主義 - ポーランド共和国「自衛」（ポーランド語：Samoobrona Rzeczpospolitej Polskiej）は、物議を醸す選挙運動で知られる左派ポピュリスト保守政党である。欧州懐疑主義的であり、ロシアやその他の旧ソ連諸国との協力に反対していない。"
 POL.Conservative_2017: "£generic_Conservative_small (Z) 変化"
 POL.Conservative_2017_desc: "反動主義 - 変化（ポーランド語：Zmiana）は親ロシア・反西欧の政党であり、ロシア情報機関とつながりがある。"
 POL.anarchist_communism: "£generic_anarchist_communism_small (PPS) ポーランド社会党"
 POL.anarchist_communism_desc: ""
 POL.Neutral_conservatism_2017: "£POL_Neutral_conservatism_2017_small (K'15) Kukiz'15"
 POL.Neutral_conservatism_2017_icon: "£POL_Neutral_conservatism_2017_small"
 POL.Neutral_conservatism_2017_desc: "保守主義 - Kukiz'15は、中道右派から右派の活動家や新人政治家たちが結集した団体であり、その指導者である元ミュージシャンのパヴェウ・クキズにちなんで名付けられた。反体制的な感情から生まれ、議会における政党の独占打破、選挙制度改革、直接民主主義を提唱している。"
 POL.oligarchism: "£POL_oligarchism_small (PSL) ポーランド農民党"
 POL.oligarchism_icon: "£POL_oligarchism_small"
 POL.oligarchism_desc: "農本主義 - ポーランド農民党（ポーランド語：Polskie Stronnictwo Ludowe）は、農村部に堅固な支持基盤を持つ農本主義のキリスト教民主主義政党である。同党は農業支援・保護主義政策を推進している。"
 POL.neutral_Social: "£POL_neutral_Social_small (UP) 労働連合"
 POL.neutral_Social_icon: "£POL_neutral_Social_small"
 POL.neutral_Social_desc: ""
 POL.neutral_Social_2017: "£POL_neutral_Social_2017_small (Razem) 共に"
 POL.neutral_Social_2017_icon: "£POL_neutral_Social_2017_small"
 POL.neutral_Social_2017_desc: "社会民主主義 - 共に（ポーランド語：Razem）は、強力な労働法、福祉、累進課税を伴う民主的社会主義体制の導入を提唱し、民営化と規制緩和に反対する、ポーランドの左派・進歩的な政党である。"
 POL.Neutral_Libertarian: "£generic_Neutral_Libertarian_small リバタリアン"
 POL.Neutral_Libertarian_desc: ""
 POL.Neutral_Libertarian_2017: "£POL_Neutral_Libertarian_2017_small 自由"
 POL.Neutral_Libertarian_2017_icon: "£POL_Neutral_Libertarian_2017_small"
 POL.Neutral_Libertarian_2017_desc: "自由主義 - 自由（ポーランド語：Wolność）は、党首ヤヌシュ・コルヴィン＝ミッケを中心に結集した保守的自由主義政党であり、政府の役割縮小、広範な民営化と規制緩和を主張しつつ、保守的なイデオロギー的立場を維持している。"
 POL.Neutral_green: "£generic_Neutral_green_small (PPE-Z) ポーランド環境党・緑の党"
 POL.Neutral_green_desc: ""
 POL.Neutral_green_2017: "£POL_Neutral_green_2017_small 緑の党"
 POL.Neutral_green_2017_icon: "£POL_Neutral_green_2017_small"
 POL.Neutral_Green_2017_desc: ""
 POL.Nat_Autocracy: "£POL_Nat_Autocracy_small ポーランド共和国軍"
 POL.Nat_Autocracy_icon: "£POL_Nat_Autocracy_small"
 POL.Nat_Autocracy_desc: ""
 POL.Nat_Fascism: "£POL_Nat_Fascism_small (ONR) 国民急進派キャンプ"
 POL.Nat_Fascism_icon: "£POL_Nat_Fascism_small"
 POL.Nat_Fascism_desc: "ファシズム - 国民急進派キャンプ（ポーランド語：Obóz Narodowo-Radykalny）は極右運動であり、しばしばファシスト、時にネオナチと評される。ONRは自らを1930年代の国民急進派キャンプ（ファシスト的かつ反ユダヤ主義的政治運動）の思想的継承者と位置付けている。"
 POL.Nat_Populism: "£POL_Nat_Populism_small (LPR) ポーランド家族同盟"
 POL.Nat_Populism_desc: "右派ポピュリスト - ポーランド家族同盟（ポーランド語：Liga Polskich Rodzin）は、戦前の国民民主主義運動の後継を自認する右派政党である。同党は民族主義的、極右に近いポピュリスト的立場を堅持している。"
 POL.Nat_Populism_2017: "£POL_Nat_Populism_2017_small (RN) 国民運動"
 POL.Nat_Populism_2017_icon: "£POL_Nat_Populism_2017_small"
 POL.Nat_Populism_2017_desc: "右派ポピュリズム - 国民運動（ポーランド語：Ruch Narodowy）は、様々な右翼、極右、民族主義的政治運動から成るポーランドの政治連合である。戦前の国民民主主義運動を継承し、反EU、反グローバリゼーション、超保守的な思想を掲げる。"
 POL.Monarchist: "£POL_Neutral_Libertarian_small (UPR) 現実政治連合"
 POL.Monarchist_desc: "自由主義 - 現実政治連合（ポーランド語：Unia Polityki Realnej）は、政府の役割を最小限に抑えることを目指す保守自由主義政党である。一般的に社会的には保守的である。"
 SER.Western_Autocracy: "£SER_western_autocrat (SPO) セルビア再生運動"
 SER.Western_Autocracy_desc: "親西側専制主義 - セルビア再生運動（セルビア語ローマ字表記：Srpski Pokret Obnove）は欧州志向の君主制政党であり、旧ユーゴスラビア諸国との和解、相互経済協力、EU・NATO加盟を含むあらゆる形態の欧州大西洋統合を提唱している。"
 SER.conservatism: "£SER_western_conservative (NS) 新セルビア"
 SER.conservatism_desc: "保守主義 - 新セルビア（セルビア語ローマ字表記：Nova Srbija）は、党内対立とSPO指導部によるミロシェヴィッチ政権との結びつき疑惑を理由にSPOから離脱したメンバーによって結成された、小規模な中道右派の君主制政党である。"
 SER.liberalism: "£SER_western_liberal (DS) 民主党"
 SER.liberalism_desc: "自由主義 - 民主党（セルビア語ローマ字表記：Demokratska Stranka）は中道左派の親西側自由主義政党であり、セルビア民主野党連合の主要政党の一つであった。党首のゾラン・ジニッチはその後首相に就任したが、彼の「犯罪撲滅作戦」と保守派DSS党首であり新ユーゴスラビア大統領となったヴォイスラヴ・コスティツァとの意見の相違により、かつての同盟者間の新たな権力闘争は避けられなかった。"
 SER.socialism: "£SER_western_social_democrat (SDU) 社会民主同盟"
 SER.socialism_desc: "社会民主主義 - 社会民主連合（セルビア語ローマ字表記：Socijaldemokratska Unija）は、セルビア民主野党連合に参加した小規模な左派系反戦・反ナショナリズム政党である。LGBTの権利を支持する立場から、党事務所は破壊され、党員はナショナリストによって暴行を受けている。"
 SER.Communist-State: "£SER_emerging_communism (NKPJ) ユーゴスラビア新共産党"
 SER.Communist-State_desc: "共産主義 - ユーゴスラビア新共産党（セルビア語ローマ字表記：Nova Komunistička Partija Jugoslavije）。NKPJは1990年、ユーゴスラビア共産主義者同盟に対する非チトー主義の代替勢力として結成された。"
 SER.Communist-State_2017: "£SER_emerging_communism_alt (KP) 共産党"
 SER.Communist-State_2017_desc: "共産主義 - 共産党（セルビア語ローマ字表記：Komunistička Partija）はセルビア新共産党とノヴィ・サドの社会民主党の合併により結成された。党首はヨシップ・ブロズ・チトーの孫が務めている。"
 SER.anarchist_communism: "£SER_anarchist_communism (JUL) ユーゴスラビア左派"
 SER.anarchist_communism_desc: "急進左派 - ユーゴスラビア左派（セルビア語ローマ字表記：Jugoslovenska Levica）は1994年、共産主義者同盟の指導下で19の左派政党が合併して結成された。同党は民族主義的で親ユーゴスラビア的な政党であり、中国、キューバ、北朝鮮などの共産党と国際的な繋がりを保持していた。この緊密な協力関係から、対立勢力からはしばしば「中国の傀儡」と呼ばれた。"
 SER.anarchist_communism_2017: "£SER_anarchist_communism_alt (PS) 社会主義運動"
 SER.anarchist_communism_2017_desc: "急進左派 - 社会主義運動（セルビア語ローマ字表記：Pokret Socijalista）は2008年に設立された左派ポピュリストかつ民族主義的な政党である。同党はセルビア社会党の親EU政策に反対した元党員によって結成された。"
 SER.Conservative: "£SER_conservatism (JS) 統一セルビア"
 SER.Conservative_desc: "反動主義 - 統一セルビア（セルビア語ローマ字表記：Jedinstvena Srbija）は小規模な国民保守政党で、社会的に強硬な保守主義を掲げ、地域主義も主張する。"
 SER.Autocracy: "£SER_Autocracy (SNP) セルビア人民党"
 SER.Autocracy_desc: "専制主義 - セルビア人民党（セルビア語ローマ字表記：Srpska Narodna Partija）はポピュリストで親ロシアの右派政党である。同党はセルビアとロシアの緊密な関係を支持し、セルビアの欧州連合加盟に反対している。"
 SER.Neutral_Muslim_Brotherhood: "£SER_Neutral_Muslim_Brotherhood (BDSS) サンジャク・ボシュニャク民主党"
 SER.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - サンジャク・ボシュニャク民主党（セルビア語ローマ字表記： Bošnjačka demokratska stranka Sandžaka）は、ボスニア・ムスリムの権利擁護を掲げる小政党である。"
 SER.Neutral_conservatism: "£SER_non_aligned_conservative (DSS) セルビア民主党"
 SER.Neutral_conservatism_desc: "保守主義 - セルビア民主党（セルビア語ローマ字表記：Demokratska Stranka Srbije）は、反ミロシェヴィッチ野党勢力のほぼ全てが参加する連合体、「セルビア民主野党連合」で最大の政党である。DSSは本質的に保守的であり、セルビア・マフィアの支援を受けている。"
 SER.Neutral_Libertarian: "£SER_non_aligned_libertarian (GSS) セルビア市民同盟"
 SER.Neutral_Libertarian_desc: "リバタリアン - セルビア市民同盟（セルビア語ローマ字表記：Građanski Savez Srbije）は、非常に小規模な平和主義的・自由主義的親欧州政党である。"
 SER.Neutral_green: "£SER_Neutral_green (Zeleni) セルビア緑の党"
 SER.Neutral_green_desc: "緑の政治 - セルビア緑の党（セルビア語ローマ字表記：Zeleni Srbije）は、セルビアの緑の政治政党である。同党は環境と生態系の知恵、社会的公正と連帯、直接民主主義、グリーン経済、持続可能性、多様性と人権の尊重、あらゆる形態の暴力の防止を提唱している。"
 SER.neutral_Social: "£SER_neutral_Social (SPS) セルビア社会党 - §C民主派§!"
 SER.neutral_Social_desc: "民主社会主義 - セルビア社会党（セルビア語ローマ字表記：Socijalistička Partija Srbije）は、名目上は左派経済政策を掲げる社会主義政党であり、旧セルビア共産主義者同盟と直接的な繋がりを持つが、スロボダン・ミロシェヴィッチ政権下では民族主義的、孤立主義的、反西欧的な姿勢を強めた。ミロシェヴィッチ失脚後は左派的ルーツに立ち返り、EU支持の立場すら取るようになった。"
 SER.Neutral_Communism: "£SER_Neutral_Communism (SKJuS) セルビア・ユーゴスラビア共産主義者同盟"
 SER.Neutral_Communism_desc: "共産主義 - セルビア・ユーゴスラビア共産主義者同盟（セルビア語ローマ字表記：Savez Komunista Jugoslavije u Srbiji）は、チトー派のユーゴスラビア共産主義者同盟の残党である。"
 SER.Nat_Populism: "£SER_Nat_Populism (SPS) セルビア社会党"
 SER.Nat_Populism_desc: "右派ポピュリズム - セルビア社会党（セルビア語ローマ字表記：Socijalistička Partija Srbije）は、名目上は左派経済政策を掲げる社会主義政党であり、旧セルビア共産主義者同盟と直接的な繋がりを持つが、スロボダン・ミロシェヴィッチ政権下では民族主義的、孤立主義的、反西欧的な姿勢を強めた。セルビア民族主義を推進し、ユーゴスラビアを分裂させ、民族浄化を含む様々な手段で、その結果生じたユーゴスラビア戦争におけるセルビアの利益を最大化しようとした。"
 SER.Nat_Populism_2017: "£SER_Nat_Populism_alt (Dveri) セルビア運動ドヴェリ"
 SER.Nat_Populism_2017_desc: "右派ポピュリズム - セルビア運動ドヴェリ（セルビア語ローマ字表記：Srpski Pokret Dveri）は右派から極右の政治運動である。ドヴェリは1999年、同名の学生雑誌を中心に集まったキリスト教右派の青年組織として結成された。"
 SER.Nat_Fascism: "£SER_Nat_Fascism (SRS) セルビア急進党"
 SER.Nat_Fascism_desc: "ファシスト - セルビア急進党（セルビア語ローマ字表記：Srpska Radikalna Stranka）は、超国家主義的かつネオ・ファシスト的な政党であり、その主たる目標は「大セルビア」の創設である。"
 SER.Nat_Autocracy: "£SER_Nat_Autocracy (JSO) 特殊作戦部隊"
 SER.Nat_Autocracy_desc: "軍事政権 - 特殊作戦部隊（セルビア語ローマ字表記：Jedinica za Specijalne Operacije）、通称「レッドベレー」は、ユーゴスラビアのセルビア国家保安総局傘下の精鋭警察特殊部隊であり、準軍事組織と犯罪組織の地下勢力のメンバーから編成された。公式な政党ではなかったが、彼らは大きな権力を掌握していた。セルビア首相ゾラン・ジンジッチの暗殺を実行し、これが最終的に「サーベル作戦」を引き起こし、彼らの解任と崩壊につながった。"
 SER.Monarchist: "£SER_nationalist_monarchist カラジョルジェヴィチ家"
 SER.Monarchist_desc: "君主主義 - セルビア王国復興運動(POKS)は、カラジョルジェヴィチ王家を権力の座に戻すことを目指している。"
