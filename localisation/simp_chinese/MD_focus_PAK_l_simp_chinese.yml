l_simp_chinese:
 pakistan.1.t: "美国施压处理部落地区"
 pakistan.1.d: "美国要求巴基斯坦对盘踞在阿富汗边境联邦直辖部落地区的武装组织采取果断军事行动。华盛顿已明确表示，持续不作为将影响双边关系及美国军事援助。"
 pakistan.1.a: "对瓦济里斯坦发动军事行动"
 pakistan.1.b: "转为与部落长老进行谈判"
 pakistan.1.c: "拒绝美国要求"
 pakistan.2.t: "巴基斯坦启动对部落地区行动"
 pakistan.2.d: "巴基斯坦在美国压力下，对部落地区的武装分子据点发动了军事行动。此次行动针对的是阿富汗边境沿线的塔利班和基地组织成员。"
 pakistan.2.a: "积极的发展"
 pakistan.3.t: "巴基斯坦拒绝行动"
 pakistan.3.d: "尽管美国提出要求，巴基斯坦仍拒绝在部落地区采取果断军事行动。武装分子继续在阿富汗边境自由活动，破坏了联军在阿富汗的努力。"
 pakistan.3.a: "切断对巴基斯坦的军事援助"
 pakistan.3.b: "暂时接受他们的决定"
 pakistan.4.t: "武装报复"
 pakistan.4.d: "部落地区的军事行动引发了激烈报复。武装组织在主要城市发动了一波爆炸袭击，目标对准政府大楼、市场和军事设施。巴基斯坦塔利班已向国家宣战。"
 pakistan.4.a: "加大打击力度"
 pakistan.4.b: "与武装分子寻求停火"
 pakistan.5.t: "美国援助暂停"
 pakistan.5.d: "美国因巴基斯坦政府拒绝打击部落地区的武装分子，暂停了军事援助。失去美国资金支持将给巴基斯坦国防预算带来压力。"
 pakistan.5.a: "岂有此理！"
 pakistan.6.t: "部落地区的进展"
 pakistan.6.d: "经过数月的持续军事行动，巴基斯坦武装部队在部落地区取得了重大进展。主要武装据点已被摧毁，尽管人员和经济代价惨重。现在的问题是：是宣布胜利，还是维持永久军事存在。"
 pakistan.6.a: "宣告胜利并巩固成果"
 pakistan.6.b: "维持军事存在"
 PAK_waziristan_insurgency: "瓦济里斯坦叛乱"
 PAK_waziristan_insurgency_desc: "巴基斯坦武装部队正在部落地区开展大规模反叛乱行动，与阿富汗边境沿线的武装组织作战。"
 PAK_suspended_american_aid: "美国援助暂停"
 PAK_suspended_american_aid_desc: "美国已暂停对巴基斯坦的军事援助，这使国防预算紧张并限制了武器采购。"
 PAK_tribal_pacification: "部落地区稳定"
 PAK_tribal_pacification_desc: "部族地区的成功军事行动增强了军队的反叛乱能力，并恢复了边境地区一定程度的稳定。"
 pakistan_news.1.t: "巴基斯坦启动对部落地区行动"
 pakistan_news.1.d: "巴基斯坦武装部队在阿富汗边境的联邦直辖部落地区对塔利班和基地组织据点发动了大规模军事行动。此次进攻在美国的强烈施压下展开，目标直指长期利用崎岖地形作为避风港的武装分子网络。"
 pakistan_news.1.a: "斩草除根"
 pakistan_news.1.b: "迈向正确路线的一步"
 pakistan_news.1.c: "已阅"
 pakistan_news.2.t: "巴基斯坦宣布在部落地区取得胜利"
 pakistan_news.2.d: "经过长期的军事行动，巴基斯坦宣布部落地区的主要武装分子据点已被清除。此次行动付出了人员与资源方面的高昂代价，但政府表示，边境地区的安全状况已比过去数年更为稳固。"
 pakistan_news.2.a: "来之不易的胜利"
 pakistan_news.2.b: "我们欢迎这一进展"
 pakistan_news.2.c: "已阅"