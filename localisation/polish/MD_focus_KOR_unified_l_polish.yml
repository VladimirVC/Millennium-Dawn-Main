 KOR_UN_security_council_seat_desc: "Jako kraj, który został siłą podzielony przez Stany Zjednoczone i Związek Radziecki po II wojnie światowej, co doprowadziło do pierwszej wojny zastępczej w zimnej wojnie, świat powinien przyznać Korei jakąś rekompensatę. Stałe miejsce w Radzie Bezpieczeństwa ONZ byłoby dobrym rozwiązaniem.\n\n§Y[USA.GetFlag]Stany Zjednoczone§!: [Root.recognises_UNSC_seat_USA]\n§Y[SOV.GetFlag]Federacja Rosyjska§! : [Root.recognises_UNSC_seat_SOV]\n§Y[ENG.GetFlag]Wielka Brytania§!: [Root.recognises_UNSC_seat_ENG]\n§Y[FRA.GetFlag]Republika Francuska§!: [Root.recognises_UNSC_seat_FRA]\n§Y [CHI.GetFlag] Chińska Republika Ludowa§!: [Root.recognises_UNSC_seat_CHI]"
