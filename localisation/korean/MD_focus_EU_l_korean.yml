 EU_news.52.t: "[THIS.GetAdjective]의 [GetYear] 유럽 의회 선거 결과"
 EU_news.52.d: "This is the vote of the [THIS.GetAdjective] people. The [THIS.GetAdjective] political parties will send the following MEP to the European Parliament:\n [THIS.Western_Autocracy_L_icon] [?THIS.MEP_party_array^0], [THIS.conservatism_L_icon] [?THIS.MEP_party_array^1], [THIS.liberalism_L_icon] [?THIS.MEP_party_array^2], [THIS.socialism_L_icon] [?THIS.MEP_party_array^3], [THIS.Communist-State_L_icon] [?THIS.MEP_party_array^4], [THIS.anarchist_communism_L_icon] [?THIS.MEP_party_array^5], [THIS.Conservative_L_icon] [?THIS.MEP_party_array^6], [THIS.Autocracy_L_icon] [?THIS.MEP_party_array^7], [THIS.Mod_Vilayat_e_Faqih_L_icon] [?THIS.MEP_party_array^8], [THIS.Vilayat_e_Faqih_L_icon] [?THIS.MEP_party_array^9], [THIS.Kingdom_L_icon] [?THIS.MEP_party_array^10], [THIS.Caliphate_L_icon] [?THIS.MEP_party_array^11], [THIS.Neutral_Muslim_Brotherhood_L_icon] [?THIS.MEP_party_array^12], [THIS.Neutral_Autocracy_L_icon] [?THIS.MEP_party_array^13], [THIS.Neutral_conservatism_L_icon] [?THIS.MEP_party_array^14], [THIS.oligarchism_L_icon] [?THIS.MEP_party_array^15], [THIS.Neutral_Libertarian_L_icon] [?THIS.MEP_party_array^16], [THIS.Neutral_green_L_icon] [?THIS.MEP_party_array^17], [THIS.neutral_Social_L_icon] [?THIS.MEP_party_array^18], [THIS.Neutral_Communism_L_icon] [?THIS.MEP_party_array^19], [THIS.Nat_Populism_L_icon] [?THIS.MEP_party_array^20], [THIS.Nat_Fascism_L_icon] [?THIS.MEP_party_array^21], [THIS.Nat_Autocracy_L_icon] [?THIS.MEP_party_array^22], [THIS.Monarchist_L_icon] [?THIS.MEP_party_array^23]"
