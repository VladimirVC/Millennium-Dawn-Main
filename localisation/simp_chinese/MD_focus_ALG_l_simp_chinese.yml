 ALG_open_civil_society_idea: "Open Civil Society"
 ALG_open_civil_society_idea_desc: "Algeria has a vibrant civil society with active NGOs, charities, and community organizations contributing to public life."
 ALG_constitutionalize_rights_idea: "Constitutional Rights"
 ALG_constitutionalize_rights_idea_desc: "Fundamental rights are enshrined in the constitution, protecting Algerian citizens and strengthening the rule of law."
 ALG_integration_policy_idea: "Integration Policy"
 ALG_integration_policy_idea_desc: "Algeria actively integrates migrants and refugees, providing language training and pathways to citizenship."
 ALG_migration_crisis: "Migration Crisis"
 ALG_migration_crisis_desc: "Waves of migrants from sub-Saharan Africa have overwhelmed border facilities and created social tensions."
 ALG_welcome_migrants: "Open Door Policy"
 ALG_welcome_migrants_desc: "Algeria welcomes migrants and refugees, providing humanitarian assistance and integration support."
 ALG_refugees_maintained: "Managed Refugee Population"
 ALG_refugees_maintained_desc: "Algeria's refugee population is well-managed with proper facilities and integration programs."
 ALG_closed_borders_idea: "Closed Borders"
 ALG_closed_borders_idea_desc: "Algeria's borders are secured against illegal migration. Border patrols and fencing deter unauthorized entry."
 ALG_berber_rights_idea: "Expanded Berber Rights"
 ALG_berber_rights_idea_desc: "The Amazigh people enjoy expanded rights including language recognition, cultural programs, and political representation."
 ALG_drug_crisis: "Drug Crisis"
 ALG_drug_crisis_desc: "Drug trafficking and addiction have become serious problems, straining law enforcement and health services."
 ALG_drugs_decriminalized: "Drugs Decriminalized"
 ALG_drugs_decriminalized_desc: "Drug use is treated as a health issue rather than a criminal one. Treatment programs help addicts recover."
 ALG_drugs_crackdown: "Drug Crackdown"
 ALG_drugs_crackdown_desc: "Harsh penalties for drug offenses and aggressive law enforcement target traffickers and dealers."
 ALG_traditions_matter_idea: "Traditional Values"
 ALG_traditions_matter_idea_desc: "Algeria promotes traditional values including family, faith, and community. Western cultural influence is resisted."
 ALG_censored_internet_idea: "Censored Internet"
 ALG_censored_internet_idea_desc: "The government controls internet access, blocking foreign propaganda and immoral content."
 ALG_women_role_idea: "Traditional Gender Roles"
 ALG_women_role_idea_desc: "Women are encouraged to embrace traditional roles as homemakers and mothers. Female workforce participation has declined."
 ALG_marriage_subsidies_idea: "Marriage Subsidies"
 ALG_marriage_subsidies_idea_desc: "The government subsidizes marriages, helping young couples afford weddings and encouraging family formation."
 restricts_women_rights: "Restricts Women's Rights"
