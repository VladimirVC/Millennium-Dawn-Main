 UKR_delta: "Дельта"
 UKR_delta_desc: "The Ukrainian system of information support for decisions and situational awareness on the battlefield has access to the program for active military personnel who have passed verification. Login is carried out via the Internet through authorization and two-factor authentication on a special website.\n\nAuthorized users can view and enter data on known enemy positions, spotted enemy aircraft, ground equipment, and more."
 UKR_oplit: "Государственный научно-исследовательский и конструкторский центр судостроения"
 UKR_oplit_desc: "The T-84 is a Ukrainian main battle tank, based on the Soviet T-80 MBT introduced in 1976, specifically the diesel engine version: T-80UD. The T-84 was first built in 1994 and entered service in the Ukrainian Armed Forces in 1999.\n\nIts high-performance opposed-piston engine makes it a fast tank, comparable to other modern MBTs with a power-to-weight ratio of about 26 horsepower per tonne."
 UKR_sapsan: "Гром-2"
 UKR_sapsan_desc: "Ukrainian short-range ballistic missile system being developed by KB Pivdenne and PA Pivdenmash, designed to combine the features of a tactical missile system and a multiple rocket launcher.\n\nThe original Sapsan version of the missile, for Ukraine's own use, was to have a range of 500 kilometers. The later Hrim-2 version, developed for export, has a range limited to 280 kilometers, in order to fall within the 300-kilometre limit set by the Missile Technology Control Regime, which seeks to limit the proliferation of missiles and missile technology."
 UKR_zelya_helsi: "Хелси"
 UKR_zelya_dia: "Dia"
 UKR_our_ukraine_helsi: "Хелси"
 UKR_our_ukraine_helsi_desc: "Helsi - medical information system for healthcare institutions and medical portal for patients in Ukraine."
 UKR_our_ukraine_dia: "Dia"
 UKR_our_ukraine_dia_desc: "Ukrainian electronic service of public services, developed by the Ministry of Digital Transformation of Ukraine. This is a website and a mobile application with digital documents, the possibility of digital signature and verification, as well as a portal with public services."
 UKR_tsnap: "ЦНАП"
 UKR_tsnap_desc: "These are institutions where different groups of people can receive a wide range of administrative services in a comfortable environment. They are created by local councils and local state administrations and serve individuals and legal entities."
 UKR_monobank: "Монобанк"
 UKR_monobank_desc: "Monobank is a Ukrainian direct bank. Like all of the existing neobanks in Ukraine, it operates using a banking license of a parent bank, namely, Universal Bank, which is a part of the TAS Group and belongs to Ukrainian businessman Serhiy Tihipko."
 UKR_tsnap_idea: "ЦНАП"
 UKR_bronetank: "Харьковский бронетанковый завод"
 UKR_bronetank_desc: "The state enterprise of the armored industry, which carries out the production, repair, maintenance, re-equipment and modernization of armored vehicles."
 UKR_avia_zavod: "Харьковский авиационный завод"
 UKR_avia_zavod_desc: "The enterprise of aviation engineering in the city of Kharkov. It produces passenger, transport, and military aircraft."
 UKR_priborostroy: "Харьковский приборостроительный завод"
 UKR_priborostroy_desc: "Один из крупнейших в СССР заводов по производству военной электроники и бытовой электротехники."
 UKR_tractor: "Харьковский тракторный завод"
 UKR_tractor_desc: "An enterprise for the production of tracked and wheeled tractors."
 UKR_agregat: "Харьковское агрегатное конструкторское бюро"
 UKR_agregat_desc: "A scientific and production enterprise of the military-industrial complex, which develops and manufactures units for hydraulic, fuel and electrical systems of aviation and rocket technology."
 UKR_morozova: "Харьковское конструкторское бюро машиностроения"
 UKR_morozova_desc: "Предприятие, разрабатывающее бронетанковую технику. Ранее КП ККБМ играло ключевую роль в создании бронированных гусеничных машин Советского Союза."
 UKR_specmachine: "Харьковский завод специальных машин"
 UKR_specmachine_desc: "Государственное предприятие военно-промышленного комплекса."
 UKR_malichev: "Завод имени Малышева"
 UKR_malichev_desc: "Завод транспортного машиностроения в Харькове, выпускающий двигатели, локомотивы и танки."
 UKR_reborn_ser_and_molot: "Возродить завод \"Серп и молот\""
 UKR_reborn_ser_and_molot_desc: "A large enterprise of agricultural machinery in Kharkov, it was one of the most important enterprises of the Kharkov industry and one of the largest enterprises of agricultural machinery in the Russian Empire and the USSR."
 UKR_concers: "Харьковский оборонный концерн"
 UKR_concers_desc: "Мы объединим все наши предприятия военной промышленности в один концерн. Таким образом, мы усилим координацию производства и повысим производительность труда."
 UKR_concern: "Харьков Военно-промышленный комплекс"
 UKR_zaporozhia_gold: "Мужиевский золотой рудник"
 UKR_zaporozhia_gold_desc: "We will finally attract investors and start developing these mines with gold deposits."
 UKR_opfl_small_med_business: "Преимущества для малого и среднего бизнеса"
 UKR_opfl_small_med_business_desc: "Малый и средний бизнес является важной частью нашей экономики. Для большего роста нам нужно давать бонусы, чтобы люди были заинтересованы в ведении бизнеса."
 UKR_neutrality_neutral_social_are_in_coalition_TT: "СПУ не входит в коалицию"
 UKR_idea_orthodox_christian_church: "Украинская православная церковь"
 UKR_separatist_menace: "Угроза сепаратизма"
 UKR_separatist_menace_desc: "Угроза сепаратистских республик никуда не денется, мы должны её устранить."
 UKR_polish_liberation_battalions: "Польская освободительная армия"
 UKR_polish_liberation_battalions_desc: "Many Polish residents are ready to fight on our side, against the government that, in their opinion, occupied the country."
 UKR_economy_shortcut: "Экономика"
 UKR_security_and_expansion_shortcut: "Security and Expansion"
 UKR_military_shortcut: "Military"
 UKR_politics_shortcut: "Politics"
 UKR_fedrada_category: "Federal Rada"
 UKR_fedrada_category_desc: "The Federal Rada is a government body in Federalized Ukraine, created for the interaction of the subjects of the Federation with the federal center.\n\n§YSubjects of the Ukrainian Federation§! may be §Gannexed§! by [UKR.GetFlag]Ukraine, but subject to §Yinfluence§! on the subjects in the §Yamount of 50%§!"
 ukraine_maidan_east.4.b: "Have the deputies escorted away"
 UKR_maidan_temporary_attack_idea_desc: "The unrest in the streets energizes military forces, temporarily bolstering combat readiness."
 ukraine_maidan_overthrow.1.t: "Government overthrown"
 ukraine_maidan_overthrow.1.d: "Our government has been overthrown. The protesters' candidate has been put into power.\nHis outlook is:"
 ukraine_maidan_overthrow.1.a: "£democratic_group_small   $democratic$"
 ukraine_maidan_overthrow.1.b: "£communism_group_small   $communism$"
 ukraine_maidan_overthrow.1.c: "£neutrality_group_small   $neutrality$"
 ukraine_maidan_overthrow.1.e: "£nationalist_group_small   $nationalist$"
 ukraine_maidan_overthrow.2.t: "Government overthrown - A new president"
 ukraine_maidan_overthrow.2.d: "The protesters' candidate has been put into power. His party is:"
 ukraine_maidan_overthrow.2.e: "Back to outlook menu"
 ukraine_maidan_crm_annex.1.t: "The annexation of Crimea"
 ukraine_maidan_crm_annex.1.d: "The crimean peninsula has been annexed by Russia. What should we do next?"
 ukraine_maidan_crm_annex.1.a: "We will stand down for now"
 ukraine_maidan_crm_annex.1.b: "We will fight for Crimea"
 UKR_idea_government_in_need_desc: "Ukraine's government is plagued by rampant corruption and inefficiency. Administrative costs are doubled by graft, while poor governance drags down industrial productivity and political capacity."
 UKR_modernization: "Ukrainian Modernization"
 UKR_modernization_desc: "Once the economy and the state have stabilised, we need to modernize our economy. Before it is too late."
 UKR_agriculture: "Modernize Agriculture"
 UKR_agriculture_desc: "Ukraine is one of the world's largest agricultural producers and exporters and is known as the breadbasket of Europe. Because Ukraine possesses 30% of the world's richest black soil, its agricultural industry has a huge potential. With some investment, these potentials could be exploited. "
 UKR_nibulon: "Nibulon"
 UKR_nibulon_desc: "Nibulon is a Ukrainian agricultural company specializing in production and export of grains such as wheat, barley and corn. It is headquartered in Mykolaiv. It is the only agricultural company in Ukraine with its own fleet and shipyard."
 UKR_pr_jsc_mhp: "PrJSC MHP"
 UKR_pr_jsc_mhp_desc: "PrJSC MHP, Myronivsky Hliboproduct, is Ukraine's largest poultry producer and one of its biggest agro-industrial holdings. State support for its expansion will grow our food processing industry and rural employment."
 UKR_fozzy: "Fozzy Group"
 UKR_fozzy_desc: "Fozzy Group, LLC is one of the largest trade and industrial groups in Ukraine, based in Kyiv, and one of the leading Ukrainian retailers with more than 700 outlets all around the country. In addition to retail, it has business interests in food manufacturing, banking, IT, logistics and restaurants. "
 UKR_fin_it: "Modernize Economy"
 UKR_fin_it_desc: "Instruct the relevant ministries to help modernize our private sector, particularly the finance and IT. "
 UKR_privatbank: "Privatbank"
 UKR_privatbank_desc: "PrivatBank is the largest Ukrainian bank in terms of assets and the leader of Ukrainian retail banking market. It was registered on 19 March 1992. The state must step in for future profits. "
 UKR_it: "Establish Ukrainian IT industry"
 UKR_it_desc: "While the IT sector is growing in our nation, it might need some investments to keep like that. "
 UKR_it_2: "Expand Ukrainian IT industry"
 UKR_it_2_desc: "It seems that our IT industry can be a key factor in our economy. With the help of well-placed investments, of course."
 UKR_ukrtelekom: "Ukrtelecom"
 UKR_ukrtelekom_desc: "The state-owned Ukrtelecom will help us to expand our network capacity faster."
 UKR_kyivstar: "Kyivstar"
 UKR_kyivstar_desc: "Kyivstar is one of the largest Ukrainian telecommunications company, providing communication services and data transmission based on a broad range of fixed and mobile technologies, including 4G (LTE) services, in Ukraine. "
 UKR_digital_education: "Digital Education"
 UKR_digital_education_desc: "Digital skills are vital for individuals in the 21st century. Investing in both digital education and digitalizing the education will pay off over time. We must not forget the older generations, their education is an investment in the present."
 UKR_dig_sta: "Ukrainian Digital State"
 UKR_dig_sta_desc: "Diia (Ukrainian: Дія, lit.'Action'; also an acronym for Ukrainian: Держава і Я, lit.'State and Me') is a mobile app, a web portal and a brand of e-governance in Ukraine. Launched in 2020, the Diia app allows Ukrainian citizens to use digital documents on their smartphones instead of physical ones for identification and sharing purposes.\n\nThe Diia portal allows access to over 50 government services. Eventually, the government plans to make all kinds of state-person interactions available through Diia."
 UKR_tax_avoidance: "Resolve the Tax Evasion Problem"
 UKR_tax_avoidance_desc: "We now have the tools to tackle a huge global problem locally: tax avoidance for both companies and individuals. \n\"While tax may be overlooked, and even unloved, in reality it is our social superpower. Tax allows us to choose to organise our communities, at the local and national level, so that we can all live better lives, together. But a fundamental obstacle is the ease with which powerful elites step outside of their social obligations - outside of their responsibilities to the societies they are part of, and from which they profit.\" - Report on Tax Justice 2023"
 UKR_energy: "Ukraine Energy Strategy"
 UKR_energy_desc: "It's time to analyse the potential for improving the nation's electricity supply systems and launch a residential energy modernization program."
 UKR_ukrenergo: "Ukrenergo"
 UKR_ukrenergo_desc: "Ukrenergo is an electricity transmission system operator in Ukraine and the sole operator of the country's high-voltage transmission lines. The company can make the entire grid system even more efficient."
 UKR_nuc_ener: "Energoatom"
 UKR_nuc_ener_desc: "Energoatom is a state enterprise operating all four nuclear power plants in Ukraine (Zaporizhzhia NPP, Rivne NPP, South Ukraine NPP, and Khmelnytskyi NPP). It is the largest power producer in Ukraine. "
 UKR_nuc_ener_2: "Expand Nuclear Capacity"
 UKR_nuc_ener_2_desc: "Based on a contract with Westinghouse, the American company will build two new blocks in the Khmelnytskyi NPP and two more in the revitalized and finally built Chyhyryn Nuclear Power Plant in Cherkasy."
 UKR_green_ener: "Green Energy Strategy"
 UKR_green_ener_desc: "After promoting the use of renewable energy, we need to look at our potential in the non-nuclear field."
 UKR_ukrhydroenergo: "Ukrhydroenergo"
 UKR_ukrhydroenergo_desc: "Ukrhydroenergo is a Ukrainian state-owned enterprise that administers many major hydro power plants along the Dnieper and Dniester rivers. It is Ukraine's main hydropower generating company."
 UKR_solar: "Construct Solar Plants"
 UKR_solar_desc: "Our southern regions are amongst the sunniest in Eastern Europe, therefore most suitable for solar plant construction."
 UKR_wind: "Развитие ветровых электростанций"
 UKR_wind_desc: "В нашей стране есть места, подходящие для высокоэффективного производства электроэнергии с помощью ветровых турбин."
 UKR_biomass: "Инвестиции в биомассовые электростанции"
 UKR_biomass_desc: "Учитывая успех частных инвестиций в строительство заводов по переработке биомассы, государство должно выделить средства на строительство таких объектов."
 UKR_min_env_prot: "Министерство охраны окружающей среды Украины"
 UKR_min_env_prot_desc: "Министерство является главным органом в системе центрального правительства Украины, ответственным за экологический мониторинг и развитие страны. Одной из его основных задач является развитие системы утилизации бытовых отходов."
 UKR_waste_manangement_2: "Создание системы переработки отходов"
 UKR_waste_manangement_2_desc: "Теперь, когда вопрос с коммунальным вывозом мусора наконец-то был решен, пришло время заложить основу и наладить систему сбора вторсырья. На это ушло много времени и сил, но результаты уже заметны."
 UKR_waste_manangement_3: "Модернизация системы управления отходами"
 UKR_waste_manangement_3_desc: "Существующая система должна стать более эффективной и охватить даже самые отдалённые уголки страны. Современная система обращения с отходами принесёт пользу всем — как населению, так и окружающей среде."
 UKR_forestry: "Управление лесным хозяйством Украины"
 UKR_forestry_desc: "Почти 20 % территории страны покрыто лесами. Чтобы сохранить эту ситуацию и предотвратить вырубку лесов, мы должны вкладывать средства в лесное хозяйство — это инвестиции в будущее."
 UKR_tourism: "Инвестиции в туризм"
 UKR_tourism_desc: "Туризм может стать отличной возможностью для любой страны. Прежде всего необходимо создать надлежащую инфраструктуру. "
 UKR_nat_wonders: "Природные чудеса Украины"
 UKR_nat_wonders_desc: "В 2008 году в ходе голосования были выбраны семь из множества живописных уголков Украины. Эти места станут визитной карточкой разнообразных ландшафтов нашей страны."
 UKR_wonders: "Чудеса Украины"
 UKR_wonders_desc: "В ходе голосования, прошедшего в 2007 году, были выбраны семь из многочисленных историко-культурных памятников Украины. Эти объекты станут визитной карточкой архитектурного наследия нашей страны."
 UKR_world_heritage: "Объекты Всемирного наследия Украины"
 UKR_world_heritage_desc: "К 2005 году в Украине насчитывалось три объекта Всемирного наследия, однако со временем этот список будет пополняться — в предварительном списке уже значится несколько объектов.\n\nКультурное наследие включает в себя памятники (такие как архитектурные сооружения, монументальные скульптуры или надписи), группы зданий и объекты (в том числе археологические памятники). Природное наследие определяется как природные объекты (состоящие из физических и биологических образований), геологические и физиографические образования (включая места обитания исчезающих видов животных и растений), а также природные территории, имеющие важное значение с точки зрения науки, охраны природы или природной красоты."
 UKR_health_tourism: "Развитие украинского медицинского туризма"
 UKR_health_tourism_desc: "Поскольку система здравоохранения в стране соответствует западным стандартам, но при этом, как правило, стоит дешевле, инвестиции в сектор медицинского туризма могут оказаться выгодными."
 UKR_corruption_reforms: "Антикоррупционные реформы"
 UKR_corruption_reforms_desc: "Проблема коррупции в украинском обществе уходит корнями в период распада Советского Союза в 1991 году. После провозглашения независимости от Советского Союза Украина столкнулась с целым рядом политиков из разных лагерей политического спектра, а также с криминальными авторитетами и олигархами, которые использовали коррупцию в полиции, политических партиях и промышленности для захвата власти.\n\nПора это изменить!"
 UKR_corruption_edu: "Борьба с коррупцией в образовании"
 UKR_corruption_edu_desc: "Согласно исследованию организации «Transparency International», проведённому в 2008 году, 47,3 % студентов вузов заявили, что от них требовали взятку; из них 29 % добровольно заплатили эту взятку. Студенты могли «купить» поступление в вуз, результаты экзаменов, оценки за докторские и/или магистерские диссертации."
 UKR_corruption_health: "Борьба с коррупцией в здравоохранении"
 UKR_corruption_health_desc: "Хотя медицинская помощь в государственных больницах теоретически бесплатна для украинцев, в начале XXI века было широко распространено явление, когда пациенты платили деньги, чтобы гарантированно получить необходимое лечение.\n\nВ 2012 году правозащитные организации обвинили чиновников Министерства здравоохранения в хищении средств, которые должны были быть направлены на лечение больных СПИДом: они закупали препараты для лечения СПИДа по значительно завышенным ценам, а затем получали откаты."
 UKR_corruption_police: "Борьба с коррупцией в полиции"
 UKR_corruption_police_desc: "Борьба с коррупцией в правоохранительных органах Украины с целью восстановления доверия общества и обеспечения эффективной работы полиции."
 UKR_corruption_armed_forces: "Борьба с коррупцией в Вооружённых силах Украины"
 UKR_corruption_armed_forces_desc: "Искоренить коррупцию в Вооруженных силах с целью повышения военной дисциплины и боевой эффективности."
 UKR_corruption_justice: "Борьба с коррупцией в судебной системе"
 UKR_corruption_justice_desc: "В начале 2010-х годов украинские политики и аналитики называли систему правосудия в Украине «прогнившей до мозга костей» и жаловались на политическое давление на судей и коррупцию. Независимые юристы и правозащитники жаловались, что на украинских судей регулярно оказывается давление с целью вынесения определённого приговора.\n\nСудебная система Украины широко считалась коррумпированной. Опрос, проведённый Министерством юстиции Украины в 2009 году, показал, что судебной системе страны доверяли лишь 10 % респондентов."
 UKR_corruption_spec_public_prosecutor: "Специализированная антикоррупционная прокуратура"
 UKR_corruption_spec_public_prosecutor_desc: "Специализированная антикоррупционная прокуратура является самостоятельным структурным подразделением Генеральной прокуратуры Украины и в первую очередь отвечает за содействие и контроль за ходом уголовных расследований, возбужденных Национальным антикоррупционным бюро Украины (НАБУ)."
 UKR_corruption_court: "Высший антикоррупционный суд Украины"
 UKR_corruption_court_desc: "Создать независимый антикоррупционный суд для рассмотрения дел о коррупции на высоком уровне и возвращения похищенных государственных активов."
 UKR_corruption_asset_rec: "Возврат активов"
 UKR_corruption_asset_rec_desc: "Возврат активов — процесс, описанный в главе V Конвенции ООН против коррупции (UNCAC), в рамках которого доходы от коррупции, вывезенные за рубеж, возвращаются и репатриируются в страну происхождения или их законным владельцам."
 UKR_corruption_gov: "Очищение государственного аппарата"
 UKR_corruption_gov_desc: "Провести радикальные реформы с целью искоренения коррупции в государственной администрации и восстановления институциональной целостности."
 UKR_end_kleptokracy: "Завершение антикоррупционных реформ"
 UKR_end_kleptokracy_desc: "Благодаря проведению всех этих реформ масштабы коррупции можно будет легко сократить, и общество сможет жить, не испытывая её удушающего воздействия."
 UKR_health_reform: "Начало реформ здравоохранения"
 UKR_health_reform_desc: "Ukrainian healthcare should be free to citizens according to law, but in practice patients contribute to the cost of most aspects of healthcare."
 UKR_health_smoke_alc: "Decrease Smoking and Alcohol consumption"
 UKR_health_smoke_alc_desc: "Launch public health campaigns to reduce smoking and alcohol consumption, addressing leading causes of preventable disease."
 UKR_hiv_aids: "HIV/AIDS in Ukraine"
 UKR_hiv_aids_desc: "In 2001, a national plan for combating HIV/AIDS was approved; its goals included preventing the further spread of HIV, developing the capacity to treat infected individuals, and providing social support and counseling for those living with HIV/AIDS."
 UKR_vaccination: "Программа вакцинации"
 UKR_vaccination_desc: "Расширить программы вакцинации по всей стране с целью предотвращения вспышек инфекционных заболеваний и повышения иммунитета населения."
 UKR_mental_health: "Программа психологической помощи"
 UKR_mental_health_desc: "Развивать службы психического здоровья и системы поддержки для решения проблемы роста числа случаев психологических расстройств среди населения."
 UKR_health_infra: "Модернизация системы здравоохранения"
 UKR_health_infra_desc: "Модернизировать и расширить инфраструктуру здравоохранения, обновив медицинские учреждения по всей стране."
 UKR_health_equipment: "Программа закупок медицинского оборудования"
 UKR_health_equipment_desc: "Закупить современное медицинское оборудование и диагностические средства для повышения качества оказания медицинской помощи и расширения возможностей лечения."
 UKR_health_prevention: "Программа медицинского обследования"
 UKR_health_prevention_desc: "Ввести комплексные программы медицинского обследования для раннего выявления заболеваний и улучшения профилактической помощи."
 UKR_health_rehabilitaion: "Национальная программа реабилитации"
 UKR_health_rehabilitaion_desc: "Создавать реабилитационные центры для пострадавших и инвалидов, в том числе военнослужащих, с целью восстановления качества их жизни."
 UKR_health_recreational_infra: "Совершенствование инфраструктуры для отдыха"
 UKR_health_recreational_infra_desc: "Инвестировать в объекты досуга и общественные пространства с целью поощрения физической активности и улучшения здоровья населения."
 UKR_health_final: "Завершение реформ в сфере здравоохранения"
 UKR_health_final_desc: "Завершить реформу системы здравоохранения с целью достижения западных стандартов медицинского обслуживания и показателей здоровья населения."
 UKR_edu_plan: "Планирование образовательных реформ"
 UKR_edu_plan_desc: "Хотя качество образования в нашей стране находится на относительно высоком уровне, есть области, которые необходимо совершенствовать, чтобы сохранить или повысить это качество. Нам необходимо подготовиться к продолжающейся цифровой трансформации в мире."
 UKR_edu_infra: "Совершенствование образовательной инфраструктуры"
 UKR_edu_infra_desc: "Модернизировать образовательные учреждения и школьные здания с целью создания современных условий для обучения."
 UKR_edu_ped_uni: "Поддержка педагогических университетов"
 UKR_edu_ped_uni_desc: "Укрепить педагогические вузы с целью повышения качества подготовки учителей и качества обучения по всей стране."
 UKR_edu_universities: "Поддержка университетов"
 UKR_edu_universities_desc: "Предоставить высшим учебным заведениям дополнительные ресурсы и поддержку в целях укрепления научных исследований и инноваций."
 UKR_edu_infra_2: "Совершенствование образовательной инфраструктуры: новый этап"
 UKR_edu_infra_2_desc: "Продолжать модернизацию образовательных учреждений с помощью современных технологий и передовой образовательной инфраструктуры."
 UKR_edu_final: "Завершить реформу системы образования"
 UKR_edu_final_desc: "Завершить реформу образования с целью достижения мировых стандартов в области обучения и научного прогресса."
 UKR_bmz: "БМЗ \"Прогресc\""
 UKR_bmz_desc: "Бердичевский машиностроительный завод («Прогресс») — машиностроительное предприятие в городе Бердичев, Житомирская область, Украина."
 UKR_nkmz: "НКМЗ"
 UKR_nkmz_desc: "Новокраматорский машиностроительный завод (НКМЗ) — крупный украинский производитель тяжёлого машиностроения. Выпускает оборудование для горнодобывающей и металлургической промышленности: прокатные станы, кузнечно-прессовое оборудование, доменные печи, дробилки руды и другое промышленное оборудование.\n\nКомпания также производит гребные валы для ледоколов и компоненты для подводных лодок. По данным предприятия, было спроектировано и построено более 18 горнодобывающих комплексов."
 UKR_oil_mining: "Нефтедобыча"
 UKR_oil_mining_desc: "Строить новые нефтедобывающие объекты с целью увеличения объемов производства энергии внутри страны и снижения зависимости от импортных поставок."
 UKR_mining2: "Повышение эффективности добычи ресурсов"
 UKR_mining2_desc: "Расширить горнодобывающую деятельность с целью увеличения объемов добычи хрома, вольфрама и других стратегически важных полезных ископаемых."
 UKR_construction_kovalska: "«ИКГ Ковальская»"
 UKR_construction_kovalska_desc: "ICG «Ковальская» (ООО) — украинский производитель строительных материалов и девелоперская компания.\n\n Производит бетон и бетонные смеси, строительные растворы, железобетонные изделия, стеновые материалы из керамзитобетона и газобетона, тротуарную плитку, сухие строительные смеси, а также водно-дисперсионные материалы (краски, декоративные штукатурки, клеи и пены)."
 UKR_train_prod: "Производство поездов"
 UKR_train_prod_desc: "Крюковский вагоностроительный завод — крупное промышленное предприятие в городе Кременчуг, Украина, занимающееся производством локомотивов и моторвагонных поездов."
 UKR_kharkiv_tractor: "ХТЗ"
 UKR_kharkiv_tractor_desc: "Харьковский тракторный завод (ХТЗ) — украинский производитель сельскохозяйственной техники в городе Харьков. Основан в 1930–1931 годах как один из ключевых объектов Первого пятилетнего плана индустриализации СССР. ХТЗ был крупнейшим тракторным заводом Украины, выпускавшим как колёсные, так и гусеничные тракторы.\n\nВ 1994 году, спустя два года после распада Советского Союза и обретения Украиной независимости, предприятие было преобразовано в открытое акционерное общество. Производит тракторы, включая универсальные колёсные модели."
 UKR_agriculture2: "Развитие сельского хозяйства: следующий этап"
 UKR_agriculture2_desc: "Внедрять передовые методы ведения сельского хозяйства и наращивать производство зерна, чтобы укрепить позиции Украины как мирового поставщика продовольствия."
 UKR_chumak: "Чумак"
 UKR_chumak_desc: "«Чумак» — шведско-украинская компания по производству продуктов питания, расположенная в г. Каховке Херсонской области. В ассортименте компании — кетчуп, майонез, макаронные изделия, заправки для салатов, кулинарные соусы, овощи в консервах, маринованные овощи, томатный сок и подсолнечное масло."
 UKR_gsc_game_world: "GSC"
 UKR_gsc_game_world_desc: "GSC Game World — украинская компания-разработчик видеоигр, основанная в Киеве в 1995 году Сергеем Григоровичем. Наиболее известна по сериям игр Cossacks и S.T.A.L.K.E.R.."
 UKR_national_bank: "Национальный банк Украины"
 UKR_national_bank_desc: "Согласно Конституции Украины, основной функцией Национального банка Украины (НБУ) является обеспечение стабильности денежной единицы Украины (гривны). Для выполнения этой задачи Национальный банк способствует стабильности банковской системы и, в пределах своей компетенции, ценовой стабильности."
 UKR_darnytsia: "Дарница"
 UKR_darnytsia_desc: "«Дарница» — украинская фармацевтическая компания."
 UKR_farmak: "Фармак"
 UKR_farmak_desc: "АО «Фармак» — украинская фармацевтическая компания, основанная в 1925 году. Штаб-квартира расположена в Киеве."
 UKR_carpathian_tourism: "Развитие туризма в Карпатах"
 UKR_carpathian_tourism_desc: "Развивать туристическую инфраструктуру в Карпатах с целью привлечения иностранных туристов и получения доходов для экономики."
 UKR_black_sea_tourism: "Развитие туризма на побережье Чёрного моря"
 UKR_black_sea_tourism_desc: "Расширить курортную инфраструктуру на побережье Чёрного моря, чтобы сделать Украину одним из ведущих морских туристических направлений."
 UKR_infra_rail: "Модернизация железных дорог"
 UKR_infra_rail_desc: "Модернизировать национальную железнодорожную сеть с целью улучшения грузовых перевозок и пассажирского сообщения."
 UKR_infra_rail_2: "Модернизация железных дорог: новый этап"
 UKR_infra_rail_2_desc: "Провести полное и комплексное расширение и модернизацию железнодорожной сети с целью создания транспортной инфраструктуры мирового уровня."
 UKR_infra_southern_bug: "Развитие судоходства на Южном Буге"
 UKR_infra_southern_bug_desc: "Восстановить коммерческое грузовое судоходство на Южном Буге выше Николаева для облегчения растущего экспорта украинского зерна."
 UKR_pivdenne_db: "Конструкторское бюро «Южное»"
 UKR_pivdenne_db_desc: "Конструкторское бюро «Южное», расположенное в Днепре (Украина), занимается проектированием спутников и ракет, а ранее — межконтинентальных баллистических ракет (МБР) советского производства."
 UKR_luch: "Конструкторское бюро «Луч»"
 UKR_luch_desc: "Расширить возможности конструкторского бюро «Луч» в области разработки крылатых ракет и передовых технологий вооружений."
 UKR_mayak: "Модернизация завода «Маяк»"
 UKR_mayak_desc: "Модернизация производственных мощностей КБ «Маяк» для снабжения вооружённых сил современным пехотным вооружением."
 UKR_ukrainian_armor: "Украинская броня"
 UKR_ukrainian_armor_desc: "Разработка современных бронежилетов и защитного снаряжения для военнослужащих."
 UKR_large_construction1: "Крупная строительная программа"
 UKR_large_construction1_desc: "Начать реализацию масштабной строительной программы, направленной на расширение городской инфраструктуры и укрепление экономического потенциала по всей стране."
 UKR_large_construction2: "Крупное строительство, вторая фаза"
 UKR_large_construction2_desc: "Продолжить строительный бум за счет расширения программ, направленных на поддержание темпов развития и занятости."
 UKR_tax_reform: "Налоговая реформа"
 UKR_tax_reform_desc: "Провести реформу налоговой системы с целью увеличения поступлений в бюджет и модернизации системы налогового администрирования."
 UKR_pension_reform: "Пенсионная реформа"
 UKR_pension_reform_desc: "Провести комплексную реформу пенсионной системы с целью обеспечения её долгосрочной устойчивости и надлежащего уровня пенсионного обеспечения."
 UKR_min_economy: "Министерство экономики"
 UKR_min_economy_desc: "Укрепить Министерство экономики с целью содействия либерализации рынка и ослабления государственного контроля над экономикой."
 UKR_cut_energy_subs: "Сократить субсидии на энергоносители"
 UKR_cut_energy_subs_desc: "Отменить неэффективные субсидии на энергоносители с целью сбалансирования бюджета и стимулирования энергоэффективности."
 UKR_state_fund: "Государственный фонд"
 UKR_state_fund_desc: "Создать суверенный фонд благосостояния для инвестирования бюджетных излишков в проекты развития и международные активы."
 UKR_air_improvements: "Усовершенствование авиации"
 UKR_air_improvements_desc: "Модернизировать ВВС за счет улучшения подготовки личного состава, оснащения и оперативной доктрины."
 UKR_aa_mis_def_force: "Силы противовоздушной обороны"
 UKR_aa_mis_def_force_desc: "Создать специализированные подразделения противовоздушной ракетной обороны для защиты воздушного пространства от угроз с воздуха."
 UKR_radio_eng: "Радиотехнические войска"
 UKR_radio_eng_desc: "Развивать потенциал в области радиотехники и радиоэлектронной борьбы для обеспечения современной военной связи."
 UKR_support_fac: "Вспомогательные объекты"
 UKR_support_fac_desc: "Расширить инфраструктуру обеспечения авиабазы с целью повышения эффективности воздушных операций и укрепления потенциала по техническому обслуживанию воздушных судов."
 UKR_army_imp: "Усовершенствования в армии"
 UKR_army_imp_desc: "Укрепить армию за счет совершенствования подготовки, доктрины и профессионального развития военнослужащих."
 UKR_army_aviation: "Авиация сухопутных войск"
 UKR_army_aviation_desc: "азвитие армейской авиации с использованием вертолётов для транспортировки, разведки и непосредственной поддержки."
 UKR_army_logistics: "Армейская логистика"
 UKR_army_logistics_desc: "Совершенствовать системы материально-технического обеспечения и цепочки поставок Сухопутных войск для обеспечения оперативной деятельности и повышения боевой эффективности."
 UKR_army_maintenance: "Ремонтные базы армии"
 UKR_army_maintenance_desc: "Создать комплексные базы по техническому обслуживанию и ремонту оборудования для обеспечения максимальной боеготовности военной техники."
 UKR_medical_forces: "Медицинские подразделения"
 UKR_medical_forces_desc: "Создать военно-медицинские командования, располагающие современными полевыми госпиталями и возможностями оказания неотложной травматологической помощи."
 UKR_antonov: "Антонов"
 UKR_antonov_desc: "Расширить производственные мощности авиастроительного завода имени Антонова для выпуска современных транспортных и грузовых самолетов."
 UKR_idea_pro_ukraine_reform_1_desc: "Правительственные реформы по борьбе с коррупцией позволяют сократить расточительство и неэффективность, восстанавливая доверие общественности, несмотря на первоначальные издержки переходного периода."
 UKR_idea_shortened_general_staff_desc: "Оптимизация структуры военного командования повышает эффективность планирования и ускоряет профессиональный рост офицеров."
 UKR_uda_encouraged: "Поддержка УДА"
 UKR_uda_encouraged_desc: "Интеграция ополченцев УДА в состав вооружённых сил повышает боеспособность, но снижает воинскую дисциплину."
 UKR_uda_integrated: "Интеграция УДА"
 UKR_uda_integrated_desc: "Украинская добровольческая армия была полностью интегрирована в регулярные вооруженные силы, что способствовало укреплению дисциплины и росту националистических настроений."
 UKR_ukrtelekom_idea: "Укртелеком"
 UKR_ukrtelekom_idea_desc: "«Укртелеком», государственный телекоммуникационный монополист, был модернизирован для расширения цифровой инфраструктуры и повышения продуктивности."
 UKR_finance_and_it: "Поддержка финансового и ИТ-сектора"
 UKR_finance_and_it_desc: "Развитие секторов финансов и информационных технологий способствует формированию высокодоходной экономической деятельности и укреплению научно-исследовательского потенциала."
 UKR_digital_state: "Украинское цифровое государство"
 UKR_digital_state_desc: "«Дія» (укр. «Дія» — «Действие», также акроним от «Держава і Я» — «Государство и я») — это мобильное приложение, веб-портал и бренд электронного управления в Украине. Запущенное в 2020 году, приложение «Дія» позволяет гражданам Украины использовать цифровые документы на смартфоне вместо физических для идентификации и передачи данных.\n\nПортал «Дія» предоставляет доступ к более чем 50 государственным услугам. В перспективе правительство планирует перевести через «Дію» все виды взаимодействия государства с гражданами."
 UKR_tax_avoidance_idea: "Незначительное уклонение от налогов"
 UKR_tax_avoidance_idea_desc: "Хотя налоги могут оставаться незамеченными и даже вызывать неприязнь, на самом деле они являются нашей «суперсилой» в социальной сфере. Налоги позволяют нам самостоятельно организовывать жизнь наших сообществ — как на местном, так и на национальном уровне — с тем, чтобы мы все вместе могли жить лучше.\n\nОднако основным препятствием является то, с какой лёгкостью влиятельные элиты уклоняются от своих социальных обязательств — от ответственности перед обществами, частью которых они являются и от которых извлекают выгоду. — Отчёт о налоговой справедливости 2023"
 UKR_nuclear_energy: "Энергоатом"
 UKR_nuclear_energy_desc: "Инвестиции в атомные электростанции способствуют росту объемов производства электроэнергии внутри страны и увеличению объемов строительства реакторов."
 UKR_construction: "Развитие строительства"
 UKR_construction_desc: "Выделение строительных мощностей на срочные государственно финансируемые проекты."
 UKR_demographic_boom: "Демографический бум"
 UKR_demographic_boom_desc: "Благоприятные демографические тенденции и политика стимулирования роста населения способствуют увеличению имеющихся кадровых ресурсов и рабочей силы."
 UKR_demographic_crisis: "Демографический кризис"
 UKR_demographic_crisis_desc: "Население страны сокращается с 1990-х годов из-за высокого уровня эмиграции в сочетании с высоким уровнем смертности и низким уровнем рождаемости. С 1993 года численность населения сокращается в среднем более чем на 300 000 человек в год."
 UKR_tackle_corruption: "Сокрушить коррупцию!"
 UKR_tackle_corruption_desc: "Кампания по борьбе с коррупцией и институциональные реформы значительно повышают эффективность работы правительства и национальную производительность труда."
 UKR_corruption: "Глубоко укоренившаяся коррупция"
 UKR_large_construction: "Крупная строительная программа"
 UKR_large_construction_desc: "Амбициозная программа развития инфраструктуры ускоряет завершение строительства и повышает производительность, хотя при этом значительно возрастает потребление энергии."
 UKR_medical_reform: "Реформа здравоохранения"
 UKR_medical_reform_desc: ""
 UKR_aamdf: "Зенитно-ракетные войска"
 UKR_aamdf_desc: "Организованные силы противовоздушной ракетной обороны значительно усиливают наши возможности ПВО и снижают эффективность авиационной поддержки противника."
 UKR_radio_troops: "Радиотехнические войска"
 UKR_radio_troops_desc: "Подразделения радиотехники и связи ВВС повышают эффективность разведки и перехвата, одновременно сокращая потери авиации."
 UKR_air_support_fac: "Объекты обеспечения ВВС"
 UKR_air_support_fac_desc: "Инвестиции в объекты обеспечения воздушной поддержки позволяют повысить топливную экономичность и надежность воздушных судов, сокращая эксплуатационные расходы и одновременно повышая их эксплуатационные характеристики."
 UKR_cut_subsidies: "Сократить субсидии на энергоносители"
 UKR_cut_subsidies_desc: "Отмена энергетических субсидий заставляет потребителей нести реальные производственные затраты, что способствует повышению производительности и одновременно снижает нагрузку на бюджет."
 UKR_health_cost: "Здоровая нация!"
 UKR_health_cost_desc: ""
 UKR_military_rehab: "Реабилитация военнослужащих"
 UKR_military_rehab_desc: "Программы реабилитации ветеранов способствуют поддержанию боевого духа личного состава и укреплению сплочённости подразделений, хотя и сопряжены с увеличением расходов на здравоохранение."
 UKR_resource_extraction: "Увеличение объемов добычи ресурсов"
 UKR_resource_extraction_desc: "Расширение добычи полезных ископаемых способствует увеличению внутренних запасов минерального сырья и топлива."
 UKR_research_boost: "Программа поддержки исследований"
 UKR_research_boost_desc: "Централизованная программа поддержки научных исследований способствует ускорению технологического развития как в военной, так и в гражданской сферах."
 UKR_economy_boost: "Экономическое стимулирование"
 UKR_economy_boost_desc: "Временная программа экономического стимулирования ускоряет рост продуктивности и эффективности фабрик, однако требует повышенного потребления энергии."
 UKR_kolomoisky_help: "Помощь от Коломойского"
 UKR_kolomoisky_help_desc: "Известный олигарх Коломойский обратился к нам с предложением профинансировать создание нескольких батальонов для поддержания боеспособности наших вооружённых сил."
 UKR_firtash_help: "Помощь от Фирташа"
 UKR_firtash_help_desc: "Известный олигарх Фирташ обратился к нам с предложением профинансировать создание нескольких батальонов для поддержания боеспособности наших вооружённых сил."
 UKR_kolomoisky_finish: "Полицейский полк «Днепр-1»"
 UKR_kolomoisky_finish_desc: "Последним проектом, который Коломойский предложил профинансировать, было преобразование Днепропетровского оборонительного полка в полицейский полк."
 UKR_uda: "Украинская добровольческая армия"
 UKR_uda_desc: "Необходимо объединить добровольцев в единую воинскую часть."
 UKR_aidar: "Создать батальон «Айдар»"
 UKR_aidar_desc: "Давайте рискнем и примем их в ряды наших вооруженных сил."
 UKR_russia_help_battalions_desc: "Развертывание подразделений российской Росгвардии и «Вагнера» способствует укреплению безопасности и проведению операций по борьбе с повстанцами в условиях оккупации."
 UKR_economy: "Экономическая политика"
 UKR_economy_desc: "\n\n\n\n\n\n£GFX_UKR_desctext_economy\n\n\n\n\n\n\n\n\n§5Министерство экономического развития и торговли§! является главным органом в системе центрального правительства §8Украины§! , отвечающий за формирование и реализацию государственной политики в области экономического и социального развития (экономика предпринимательства); регулирование потребительских цен; промышленную, инвестиционную и торговую экономическую политику; развитие предпринимательства; техническое регулирование и защиту прав потребителей; межведомственную координацию экономического и социального сотрудничества §8Украины§! с §1Европейским союзом§!."
 UKR_boost_economy: "Стимулировать экономику"
 UKR_boost_research: "Поддержка научно-исследовательской деятельности"
 UKR_boost_resource: "Субсидировать добычу природных ресурсов"
 UKR_add_resource: "Углублённая разработка ресурсов"
 UKR_renewable_energy: "Оценка потенциала возобновляемых источников энергии Украины"
 UKR_renewable_energy_desc: "\n\n\n\n\n\n£GFX_UKR_energy_ukraine\n\n\n\n\n\n\n\n\nКарта регионов с наибольшим потенциалом производства энергии из возобновляемых источников."
 UKR_energy_wind: "Ветровая энергетика"
 UKR_energy_solar: "Солнечная энергия"
 UKR_energy_geothermal: "Геотермальная энергия"
 UKR_privatize_resource: "Приватизация в добывающей отрасли"
 UKR_privatize_resource_desc: "Приватизация отраслей добычи природных ресурсов приводит к ослаблению государственного контроля и сокращению доступности ресурсов."
 UKR_restructure_debt: "Запросить реструктуризацию долга"
 UKR_ask_western_loans: "Попросить займы у §7Западных стран§!"
 UKR_ask_eastern_loans: "Попросить займы у §tВосточных стран§!"
 UKR_natpolice_decision_category: "Патрульная служба полиции специального назначения"
 UKR_natpolice_decision_category_desc: "Патрульная служба полиции специального назначения Украины — это подразделение в составе Департамента патрульной полиции Украины Национальной полиции Украины, созданное в рамках Министерства внутренних дел Украины как структура сил специального назначения для охраны общественного порядка.\n\nСтруктура вошла в состав Национальной полиции Украины. Служба объединяет бывшие батальоны и полки Министерства внутренних дел."
 UKR_uda_decision_category: "Украинская добровольческая армия"
 UKR_uda_decision_category_desc: "Украинская добровольческая армия — это добровольческое военизированное формирование, созданное на базе подразделений Украинского добровольческого корпуса после ухода Дмитрия Яроша и его соратников из движения «Правый сектор»."
 UKR_integrate_uda: "Интегрировать §YУДА§! в состав §YВооружённых сил Украины§!"
 UKR_btr_4: "Собрать прототип §YБТР-4 «Буцефал»§!"
 UKR_small_arms: "Продвинуть §Oкомпанию по производству стрелкового оружия§!"
 UKR_equipment_funds: "Продвинуть §OХКБМ§! §Wпроизводство пехотного снаряжения§!"
 UKR_heavy_equipment: "Выделить средства для §Gзавода им. Малышева§!"
 UKR_heavy_equipment_research: "Поддержка исследований §Gбронетехники§!"
 UKR_fund_antonov: "Субсидировать §8«Антонов»§!"
 UKR_air_equipment: "Поддержка исследований §8авиации§!"
 UKR_nikolayev_funds: "Модернизировать §1Николаевские верфи§!"
 UKR_naval_equipment: "Поддержка исследований §1морского оборудования§!"
 UKR_parti_regions_economic_committee_desc: "Экономический комитет «Партии регионов» сглаживает колебания деловой активности и обеспечивает стабильность."
 UKR_parti_regions_invest_open_window_desc: "Благоприятная для бизнеса инвестиционная политика способствует росту численности населения и увеличению поступлений от корпоративного налога."
 UKR_parti_regions_taxx_desc: "Реформа Налогового кодекса предусматривает снижение налогов как для физических, так и для юридических лиц, что приводит к увеличению административных издержек, но при этом смягчает социальную напряженность."
 UKR_parti_regions_laizes_desc: "Меры по секуляризации ослабляют влияние духовенства, но приводят к дестабилизации религиозных общин и усиливают экономическую нестабильность."
 UKR_parti_regions_stability_reform_desc: "Меры по обеспечению региональной стабильности укрепляют идеологическую оборону, но приводят к увеличению бюрократических издержек."
 UKR_parti_regions_lustration_desc: "Увольнение чиновников советской эпохи позволяет сократить расходы на административный и силовой аппарат."
 UKR_parti_regions_opposition_agree_desc: "Политическое сотрудничество с оппозиционными партиями способствовало снижению изоляции правительства и сдерживало идеологический дрейф в эпоху Януковича."
 UKR_parti_regions_titushki_desc: "Поддерживаемые правительством уличные провокаторы пресекают идеологическое отклонение с помощью запугивания и насилия."
 UKR_parti_regions_optimise_ministers_desc: "Оптимизация министерской бюрократии позволяет сократить административные расходы и повысить эффективность работы правительства."
 UKR_parti_regions_inform_act_desc: "Законодательство о контроле над СМИ способствует стабилизации политической риторики за счет административных затрат."
 UKR_parti_regions_pension_reform_desc: "Реформирование пенсионной системы позволяет сократить социальные расходы, но при этом снижает темпы роста населения из-за уменьшения размера выплат."
 UKR_parti_regions_youth_regions_desc: "Программы вовлечения молодежи способствуют укреплению межпоколенческой поддержки и незначительно повышают политическое влияние и способность противостоять политическому дрейфу."
 UKR_our_ukraine_secretariat_of_president_desc: "Секретариат президента укрепляет потенциал в области административных исследований, но при этом увеличивает бюрократическую нагрузку."
 UKR_our_ukraine_fight_with_corruption_idea_desc: "Борьба с коррупцией позволяет сократить бюрократические издержки и незаконное извлечение экономических выгод."
 UKR_our_ukraine_education_reform_idea_desc: "Реформы образовательных программ способствуют укреплению научно-исследовательского потенциала, но при этом влекут за собой временные издержки в политической сфере и в плане стабильности."
 UKR_our_ukraine_health_reform_idea_desc: "Модернизация системы здравоохранения позволяет сократить расходы и повысить уровень пригодности к военной службе."
 UKR_our_ukraine_social_reform_idea_desc: "Оптимизация социальных расходов снижает нагрузку на бюджет и одновременно укрепляет поддержку со стороны демократических сил."
 UKR_our_ukraine_air_industry_idea_desc: "Модернизация авиационной отрасли позволяет снизить затраты на производство военных самолетов."
 UKR_zelya_helsi_desc: "Платформа в сфере здравоохранения «Helsi» улучшила доступ к медицинским услугам, одновременно снизив расходы на лечение и способствуя улучшению показателей здоровья населения."
 UKR_zelya_dia_desc: "Цифровая платформа управления «Дія» упростила бюрократические процессы, сократила административные издержки и повысила эффективность предоставления государственных услуг."
 UKR_reform_sbu: "Реформа СБУ"
 UKR_reform_sbu_desc: "СБУ нуждается в реформах: на протяжении всех этих лет эта структура была глубоко погрязла в коррупции и нуждается в обновлении."
 UKR_Yanu_Minister: "Кабинет министров"
 UKR_Yanu_President: "Президентство"
 UKR_prepare_protest_tt: "Мы получим или потеряем поддержку §8представителей Майдана§!"
 UKR_donbass_concessions_tt: "В зависимости от нашей позиции мы сможем заручиться поддержкой восточных или западных регионов, но при этом неизбежно разочаруем §8Представителей Майдана§!."
 UKR_azovsteel_desc: "Контроль над металлургическим комплексом «Азовсталь» обеспечивает стабильные поставки высококачественной стали для промышленного и военного производства."
 UKR_yushenko_premier_idea_desc: "Виктор Ющенко занимает пост премьер-министра при Кучме, укрепляя свой политический авторитет и направляя правительство по пути нейтралитета."
 UKR_yanuk_premier_idea_desc: "Виктор Янукович занимает пост премьер-министра при Кучме, укрепляя свои политические позиции и смещая правительство влево."
 UKR_unstable_government_idea_desc: "Политическая нестабильность привела к ослаблению государственного контроля, что позволило различным идеологическим группировкам использовать беспорядки в своих интересах."
 UKR_land_reform_idea3_desc: "Земельная реформа, начатая в прошлом веке, должна привести к полному перераспределению земельных владений по всей стране. На данный момент этот процесс продолжается."
 UKR_zaims_desc: "Краткосрочные международные займы позволили стабилизировать экономику и увеличить налоговые поступления, хотя и привели к возникновению значительных долговых обязательств в будущем."
 UKR_social_discontent: "Серьёзное недовольство народа"
 UKR_social_discontent_desc: "Масштабные сокращения расходов на здравоохранение, образование и социальное обеспечение снижают нагрузку на государственный бюджет, но при этом подрывают доверие населения."
 UKR_banks_lobbyst_liquidate_desc: "Устранение интересов банковского сектора из правительства позволяет перенаправить поступления от корпоративного налога, тем самым ослабляя влияние финансовых элит на политику."
 UKR_mining_company_help_desc: "Налоговые льготы для горнодобывающих компаний позволяют им пережить период экономических трудностей."
 UKR_privatization_idea_desc: "Приватизация государственных предприятий повышает эффективность работы заводов и улучшает торговые отношения за счет утраты политической власти."
 UKR_without_kuchma_idea_desc: "Движение «Украина без Кучмы» мобилизовало националистические настроения против предполагаемой олигархической коррупции и авторитарного управления."
 UKR_left_opposition_idea_desc: "Левое политическое движение мобилизует рабочих и интеллигенцию против правящего правительства, подрывая существующий порядок."
 UKR_luaz_idea_desc: "Поддержка отечественного автопроизводителя «ЛУАЗ» позволяет снизить себестоимость производства легковых и грузовых автомобилей."
 UKR_anti_socialist_media_desc: "СМИ, подконтрольные государству, подавляют коммунистические и нейтральные настроения, укрепляя контроль реакционного правительства над общественным мнением."
 ukraine_union.1.t: "Украина предлагает создать полноценное союзное государство"
 ukraine_union.1.d: "Киев предлагает влиться в нашу государственность и объединить оба народа в единое союзное государство под руководством Украины. Все ключевые объекты, все ресурсы и все солдаты перейдут к ним. Готовы ли мы пожертвовать своей независимостью ради этого союза?"
 ukraine_union.1.a: "Мы принимаем Союз"
 ukraine_union.1.b: "Мы не сдадим наше государство."
 ukraine_union.2.t: "Россия отвергает Союз"
 ukraine_union.2.d: "Москва отказывается войти в состав нашего союза. Мечта о единой нации от Карпат до Тихого океана придется отложить на потом."
 ukraine_union.2.a: "Упущенная возможность"
 ukraine_union.3.t: "Украина предлагает совместное вступление в НАТО"
 ukraine_union.3.d: "Киев призывает нас выйти из наших нынешних альянсов и вместе с ним вступить в НАТО, тем самым изменив структуру системы безопасности в Восточной Европе. Пойдём ли мы по этому пути вместе?"
 ukraine_union.3.a: "Мы вместе вступаем в НАТО"
 ukraine_union.3.b: "Наше место не в НАТО"
 ukraine_union.4.t: "Россия отказывается от членства в НАТО"
 ukraine_union.4.d: "Москва отказывается вступать в НАТО вместе с нами. Нам придется прокладывать свой западный курс в одиночку."
 ukraine_union.4.a: "Так и быть"
 ukraine_kommi.16.t: "Коммунистическое восстание на Востоке"
 ukraine_kommi.16.d: "Коммунистическое восстание, поддержанное Киевом, привело к захвату нескольких наших восточных провинций и провозглашению независимости при поддержке Украины. Мы этого не забудем."
 ukraine_kommi.16.a: "Мы это запомним"
 UKR_brotherhood_people_desc: "Коммунистическое общественное движение, ставящее во главу угла коллективное благосостояние и солидарность, снижает нагрузку, связанную с потребительскими товарами, и одновременно укрепляет идеологическую оборону."
 UKR_social_reform_desc: "Расширение системы социального обеспечения позволяет сократить расходы на здравоохранение и социальные нужды, одновременно повышая уровень жизни при коммунистическом правлении."
 UKR_equal_rights_idea_desc: "Реализация политики равных прав в отношении всех демографических групп снижает бюрократическую нагрузку и укрепляет политическое единство."
 UKR_west_investors_idea_desc: "Участие западных рынков обеспечило приток капитала и экономический опыт, что способствовало развитию бизнеса и укреплению доверия населения к экономике."
 UKR_our_investors_idea_desc: "Капитал западных инвесторов способствует развитию научно-исследовательского потенциала, стабилизирует экономические циклы и укрепляет независимость во внешней политике."
 UKR_socialist_effort_desc: "Экономическая мобилизация в интересах социалистического производства способствует укреплению стабильности, росту населения и обеспечению населения потребительскими товарами."
 UKR_alpha: "Альфа"
 UKR_alpha_desc: "Подразделение специальных операций «Альфа» Службы безопасности Украины (СБУ) усиливает наши контрразведывательные и охранные операции по противодействию диверсионным угрозам."
 UKR_svr_desc: "Операции Службы внешней разведки способствуют развитию разведывательной сети и укреплению защитных механизмов ведомства от иностранных подрывных действий."
 UKR_sviaz_desc: "Государственная служба специальной связи обеспечивает усовершенствованные средства шифрования, дешифрования и инфраструктуру безопасной связи."
 UKR_ukraine_always_right: "Украина всегда права"
 UKR_ukraine_always_right_desc: "В Украине к власти пришли настоящие патриоты. Украина всегда права, Украина превыше всего."
 UKR_take_control_of_the_media: "Взять под свой контроль СМИ"
 UKR_take_control_of_the_media_desc: "В последние годы средства массовой информации получили слишком много свободы. Они только и занимаются тем, что рассказывают, какая у нас плохая и ужасная страна, но мы это исправим."
 UKR_prohibition_of_non_nationalist_organizations: "Запрет на деятельность ненационалистических организаций"
 UKR_prohibition_of_non_nationalist_organizations_desc: "Любая организация, отвергающая националистическое дело, представляет угрозу для нового порядка. Запретим их все и оставим наше движение единственной легальной политической силой в стране."
 UKR_anti_russian_policy: "Антироссийская политика"
 UKR_anti_russian_policy_desc: "Москва по-прежнему остается главным врагом украинского народа. Необходимо закрепить враждебность по отношению к России в качестве официальной государственной политики и избавиться от российского влияния в наших институтах."
 UKR_loyal_teachers_in_schools: "Лояльные преподаватели в школах"
 UKR_loyal_teachers_in_schools_desc: "Школа — это основа будущих патриотичных граждан Украины. В школах останутся только настоящие украинцы."
 UKR_ban_all_languages_except_ukrainian: "Запретить все языки, кроме украинского"
 UKR_ban_all_languages_except_ukrainian_desc: "Мы начнём реализацию программы украинизации; все остальные языки будут исключены из школьной программы, делового общения и других сфер жизни гражданина Украины."
 UKR_introduce_death_penalty_for_disloyal_persons: "Ввести смертную казнь для нелояльных"
 UKR_introduce_death_penalty_for_disloyal_persons_desc: "Верность — это то, чем каждый гражданин обязан своей родине. Всех, кто её ненавидит, всех, кто хочет ей навредить, мы устраним любыми необходимыми средствами."
 UKR_united_council_of_ukrainian_nationalists: "Объединенный совет украинских националистов"
 UKR_united_council_of_ukrainian_nationalists_desc: "Наконец-то страной управляют истинный патриотизм и национализм, во главе с настоящими сторонниками Украины. Цель нашего съезда — построить великую страну."
 UKR_right_sector: "Правый сектор"
 UKR_right_sector_desc: "Правый сектор будет отвечать за внутриполитическую составляющую нового украинского государства."
 UKR_full_order_in_the_country: "Полный порядок в стране"
 UKR_full_order_in_the_country_desc: "Порядок — залог стабильности. Мы будем бороться с проявлениями хаоса, беспорядка и мятежа."
 UKR_ukrainian_assault_battalions: "Украинские штурмовые батальоны"
 UKR_ukrainian_assault_battalions_desc: "Мы сформируем ударные батальоны из особо патриотичных граждан, которые будут выполнять конкретные задачи."
 UKR_make_government_jobs_only_for_ukrainians: "Сделать государственные должности доступными только для украинцев"
 UKR_make_government_jobs_only_for_ukrainians_desc: "Работать на благо Родины должны только украинцы, у всех остальных не должно быть права на труд."
 UKR_complete_the_cleansing_of_the_ukrainian_state: "Завершить очищение украинского государства"
 UKR_complete_the_cleansing_of_the_ukrainian_state_desc: "Наша родина очищена от врагов, недоброжелателей и прочих негативных элементов."
 UKR_limit_the_powers_of_the_mvd: "Ограничить полномочия МВД"
 UKR_limit_the_powers_of_the_mvd_desc: "Полиция и другие органы власти обладают слишком большими полномочиями в нашем штате, и мы их ограничим."
 UKR_night_of_the_long_knives: "Ночь длинных ножей"
 UKR_night_of_the_long_knives_desc: "С теми, кто особенно упорно сопротивляется реформам, мы будем поступать более решительно."
 UKR_una_unso: "УНА УНСО"
 UKR_una_unso_desc: "Внешнеполитическая деятельность будет возложена на организацию УНА-УНСО."
 UKR_external_intervention: "Внешнее вмешательство"
 UKR_external_intervention_desc: "Пора перестать проводить мирную политику — мы будем активно влиять на мировые процессы."
 UKR_resolve_the_moldovan_issue: "Решить Молдавский вопрос"
 UKR_resolve_the_moldovan_issue_desc: "Молдова и Приднестровье уже давно стоят у нас на пути, их независимость — это просто ошибка, мы это исправим."
 UKR_dig_up_potatoes: "Выкопать картошку"
 UKR_dig_up_potatoes_desc: "Беларусь может быть использована нашими врагами как с запада, так и с востока для нанесения удара по нам. Лучший способ защитить себя — нанести удар первым!"
 UKR_to_recall_the_volhynia_massacre: "Волынский опыт"
 UKR_to_recall_the_volhynia_massacre_desc: "Мы вновь столкнулись с поляками и вынуждены снова дать им отпор. Пришло время нашей стране наконец покончить с польской угрозой."
 UKR_secretly_sending_militants_to_kuban: "Поднять восстание в Крыму"
 UKR_secretly_sending_militants_to_kuban_desc: "Тот факт, что Россия отняла у нас Крым, является главной исторической несправедливостью столетия. Слабость наших властей оказалась ужасающей и постыдной. Мы исправим это."
 UKR_agitation_of_radical_ukrainians_in_kuban: "Поднять восстание на Кубани"
 UKR_agitation_of_radical_ukrainians_in_kuban_desc: "Кубань — это наша земля и всегда ею останется. Мы постараемся отнять её у России."
 UKR_liberate_green_klin: "«Освободить» Зелёный Клин"
 UKR_liberate_green_klin_desc: "Пришло время «освободить» наших братьев с Дальнего Востока от гнета русского медведя."
 UKR_shoot_a_russian_bear: "Застрелить русского медведя"
 UKR_shoot_a_russian_bear_desc: "Русский медведь станет нашим ковриком!"
 UKR_declare_a_great_ukraine: "Провозгласить Великую Украину"
 UKR_declare_a_great_ukraine_desc: "Украина стала великой страной и дала об этом знать всему миру."
 UKR_upa: "УПА"
 UKR_upa_desc: "За обеспечение гражданской и внутренней обороны страны будет отвечать восстановленная Украинская повстанческая армия."
 UKR_new_orders_of_formation_of_upa_groups: "Новые приказы о формировании отрядов УПА"
 UKR_new_orders_of_formation_of_upa_groups_desc: "Мы учтём опыт УПА, накопленный во время Второй мировой войны, и создадим новые бригады, учитывая допущенные ошибки."
 UKR_partisan_units: "Партизанские отряды"
 UKR_partisan_units_desc: "По всей стране будут созданы партизанские отряды УПА, чтобы в будущем оказывать активное сопротивление врагам."
 UKR_partisanship_as_an_ideology: "Партизанство как идеология"
 UKR_partisanship_as_an_ideology_desc: "Наши партизаны должны пройти идеологическую подготовку, чтобы активно сопротивляться врагу."
 UKR_make_military_exercises_in_the_country_compulsory_for_all: "Сделать военные учения в стране обязательными для всех"
 UKR_make_military_exercises_in_the_country_compulsory_for_all_desc: "Каждый украинец должен уметь защищать свою страну. Обучение обычных граждан специалистами УПА укрепит боевой потенциал нашей страны."
 UKR_to_arm_every_person_in_the_country: "Выдать оружие населению"
 UKR_to_arm_every_person_in_the_country_desc: "Женщины, дети, мужчины, пожилые люди — каждый должен иметь возможность носить оружие и стрелять из него по врагу."
 UKR_form_an_alliance_of_right_wing_youth: "Создать альянс правой молодежи"
 UKR_form_an_alliance_of_right_wing_youth_desc: "Прежде чем вооружать украинскую молодежь, необходимо ее организовать. Объедините разрозненные правые молодежные движения в единый альянс, преданный националистическому делу."
 UKR_ukraine_is_a_land_of_partisans: "Украина — страна партизан"
 UKR_ukraine_is_a_land_of_partisans_desc: "Если враг вторгнется к нам, в каждой деревне и в каждом городе найдутся партизаны. Мы встретим его всей мощью украинского народа."
 UKR_nationalists_right_sector_desc: "Включение ополченцев «Правого сектора» в государственные структуры способствует укреплению националистических настроений и политического авторитета."
 UKR_nationalists_una_unso_desc: "Националистическое движение УНА-УНСО способствует мобилизации добровольцев и повышает боеспособность нерегулярных вооружённых формирований."
 UKR_nationalists_upa_desc: "Использование исторических тактик сопротивления УПА позволяет повысить эффективность снабжения и укрепить оборону ключевых территорий."
 UKR_nationalists_cleane_ukraine_desc: "Масштабная кампания по укреплению национального единства усиливает сопротивление иностранному влиянию и укрепляет решимость продолжать борьбу."
 UKR_nationalists_trizub_desc: "Организация «Тризуб» мобилизует националистические настроения и стремление к защите родины."
 UKR_nabu: "Национальное антикоррупционное бюро Украины"
 UKR_nabu_desc: "Новое антикоррупционное бюро призвано усилить борьбу с коррумпированными чиновниками на всех уровнях."
 UKR_poroh_deccomuniz: "Президентство Порошенко"
 UKR_poroh_deccomuniz_desc: "Порошенко — личность неоднозначная, но его стремление сделать Украину сильной перед лицом врага заслуживает уважения народа."
 UKR_west_investors_desc: "Этот рынок привлек западных иностранных инвесторов, что способствовало укреплению демократических институтов и стало движущей силой экономического роста и стабильности."
 UKR_operation_wall_desc: "В этот период мобилизации темпы строительства оборонительных укреплений резко ускоряются."
 UKR_ato_supports_desc: "Поддержка ветеранов антитеррористической операции укрепляет националистические настроения и подчеркивает нашу приверженность тем, кто служил."
 UKR_health_supports_desc: "Увеличение финансирования здравоохранения способствует повышению благосостояния населения и укрепляет поддержку демократического управления."
 UKR_pivdenmash_idea_desc: "Государственное предприятие «Южмаш» специализируется на производстве баллистических и ядерных ракет с повышенной эффективностью."
 UKR_kyvarmor_idea_desc: "Киевский бронезавод специализируется на производстве современных шасси средних танков и их амфибийных модификаций."
 UKR_tsnap_idea_desc: "ЦНАП — государственное административное агентство штата, которое упрощает бюрократию центрального правительства и снижает административные издержки."
 UKR_concern_desc: "Консолидация разрозненных предприятий военной промышленности в рамках Харьковского военно-промышленного комплекса способствует повышению эффективности производства танков и бронетехники."
 UKR_zaz_idea_desc: "Автомобильное производство компании «ЗАЗ» было модернизировано, что позволило повысить надежность транспортных средств и снизить производственные затраты на выпуск гражданских и военных транспортных средств."
 UKR_kraz_idea_desc: "Производство автомобилей «КрАЗ» обеспечивает выпуск грузовиков и бронированных машин на отечественных заводах, что позволяет снизить зависимость от импорта."
 UKR_motorsich_idea_desc: "State support for Motor Sich aircraft engine production reduces costs for heavy aircraft and helicopter manufacturing."
 UKR_interlegion_decision_category: "Международный легион территориальной обороны"
 UKR_interlegion_decision_category_desc: "Международный легион территориальной обороны Украины — это проект Правительства Украины, направленный на привлечение иностранцев для формирования добровольческих подразделений в рамках системы территориальной обороны Вооруженных сил Украины."
 UKR_vetrenko_surrort_nationalism_desc: "Националистическое движение мобилизовало население, подчеркивая украинскую идентичность и культурный суверенитет в противовес мнимым внешним угрозам."
 UKR_vetrenko_pioneria_desc: "Была создана националистическая молодежная организация с целью содействия патриотическому воспитанию и повышения политической осведомленности молодого поколения."
 UKR_vetrenko_health_free_idea_desc: "По всей стране было введено бесплатное медицинское обслуживание, что способствовало росту численности населения, но привело к напряженной ситуации в государственных финансах из-за увеличения расходов на здравоохранение."
 UKR_economic_reforms_modifier: "Экономическое развитие Украины"
 UKR_economic_reforms_modifier_desc: "Десятилетия олигархического застоя превратили экономику Украины в мозаику из советских пережитков и теневых рынков. Постоянная программа реформ постепенно распутывает бюрократические узлы, привлекает иностранные инвестиции и модернизирует нашу устаревшую промышленность. Каждый шаг вперед измеряется количеством возобновивших работу заводов и выполненных контрактов."
 UKR_military_reforms_modifier: "Развитие вооруженных сил Украины"
 UKR_military_reforms_modifier_desc: "Вооружённые силы Украины вступили в новое столетие, испытывая острую нехватку финансирования, находясь в состоянии деморализации и вооружённые ржавеющими советскими запасами. Реформа — это не только новые винтовки, но и профессиональные офицеры, реалистичная подготовка и доктрина, разработанная с учётом тех войн, с которыми нам действительно приходится сталкиваться. В результате появится более компактная и боеспособная армия, верная государству, а не какому-либо покровителю."
 UKR_Industry_Improvement: "Модернизация промышленности"
 UKR_Mining_Improvement: "Модернизация добычи полезных ископаемых"
 UKR_Construction_Improvement: "Совершенствование строительства"
 UKR_train_Improvement: "Модернизация железных дорог"
 UKR_Network_Improvement: "Модернизация сети"
 UKR_Military_Improvement: "Усовершенствование вооруженных сил"
 UKR_kuchma_shortcut: "Кучма"
 UKR_kuchma_second_terms: "Второй срок Кучмы"
 UKR_kuchma_second_terms_desc: "Президент Кучма уже второй срок стоит у руля нашей страны; возможно, на этот раз его не переизберут, а может, он ввергнет нашу страну в хаос. Поживем — увидим."
 UKR_dissolve_rada: "Распустить Раду"