 expand_local_building_capacity_tt: "§YAmpliar la capacidad de construcción local§! en §Y[THIS.GetName]§!\n---------\nPodemos ampliar la capacidad de construcción local mediante la implementación de una variedad de políticas de construcción locales, la limpieza de terrenos adicionales y la ampliación de los recursos disponibles para los constructores locales."
