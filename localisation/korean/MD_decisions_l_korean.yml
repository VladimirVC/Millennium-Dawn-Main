 order_spart_for_ukraine: "우크라이나를 대신해 자주포 발주"
 order_mbt_for_ukraine: "우크라이나를 대신하여 주력전차 주문"
 discourage_population_growth_decision: "인구 증가 억제"
 discourage_population_growth_decision_desc: "우리 국가의 인구가 조금 과도하게 증가하고 있습니다. 국민들이 아이를 더 낳지 않도록 유도해야 합니다..."
 cost_hur_points_5: "우크라이나 국방부 정보총국 작전적 예비: §H5§!"
 cost_hur_points_5_blocked: "우크라이나 국방부 정보총국 작전적 예비: §R5§!"
 cost_hur_points_5_tooltip: "이 결정을 내리면 우크라이나 국방부 정보총국 작전적 예비 5가 소모됩니다"
 cost_hur_points_4: "우크라이나 국방부 정보총국 작전적 예비: §H4§!"
 cost_hur_points_4_blocked: "우크라이나 국방부 정보총국 작전적 예비: §R4§!"
 cost_hur_points_4_tooltip: "이 결정을 내리면 우크라이나 국방부 정보총국 작전적 예비 4가 소모됩니다"
 cost_hur_points_10: "우크라이나 국방부 정보총국 작전적 예비: §H10§!"
 cost_hur_points_10_blocked: "우크라이나 국방부 정보총국 작전적 예비: §R10§!"
 cost_hur_points_10_tooltip: "이 결정을 내리면 우크라이나 국방부 정보총국 작전적 예비 10이 소모됩니다"
 sudan_second_civil_war_decisions_category: "제2차 수단 내전"
 sudan_second_civil_war_decisions_category_desc: "두 번째 수단 내전은 수단 군과 오마르 알-바시르가 이끄는 국가 이슬람 전선(NIF)이 사디크 알-마흐디를 전복시키면서 시작되었습니다. 즉시, 알-바시르 정부는 남수단과 전역에 걸쳐 이슬람화 정책을 재실행하기 시작했습니다. 이는 알-마흐디와 남수단 인민해방군(SPLA) 간의 불안정한 휴전 기간 동안 잠시 중단된 정책이었으며, 이로 인해 주로 기독교와 애니미즘을 신봉하는 남수단은 정부에 맞서 무기를 들게 되었습니다."
 SUD_second_sudanese_civil_war_mission: "포괄적 평화 협정"
 SUD_second_sudanese_civil_war_mission_desc: "수단 인민해방군(Sudan People's Liberation Army)은 우리의 정권을 전복하고 더 포용적이고 민주적인 정권을 수립하려는 목표로 우리에 대항해 일어났습니다. 우리는 이를 허용할 수 없습니다. 수단은 아랍과 이슬람 국가여야 합니다. 우리는 전쟁에 피로감을 느끼기 전에 반군을 신속히 처치해야 합니다."
 SUD_second_sudanese_civil_war_mission_success_tt: "§Y[SSU.GetNameWithFlag]§! 통제"
 SUD_second_sudanese_civil_war_mission_states_tt: "다음 주들은 해당 주를 §Y통제§!하는 자에게 주어집니다. 다른 모든 남수단 주들에 대한 §Y명분§!은 상실됩니다"
 SUD_second_sudanese_civil_war_mission_tt: "양측은 §Y6년§! 후에 열릴 §Y남수단 독립 국민투표§!에 동의합니다.\n"
 SSU_second_sudanese_civil_war_mission: "포괄적 평화 협정"
 SSU_second_sudanese_civil_war_mission_desc: "수단 정부는 마지막으로 우리 인민들을 억압했습니다. 우리는 카르툼까지 진군하여 [SUD.GetLeader]를 퇴진시킬 것입니다. 이것이 수단에 민주적이고 공정한 정부를 보장하는 유일한 방법입니다. 그러나 교착 상태에 빠지고 싶지는 않습니다."
 SSU_second_sudanese_civil_war_mission_success_tt: "§Y[SUD.GetNameWithFlag]§! 통제"
 SSU_second_sudanese_civil_war_mission_states_tt: "다음 주들은 해당 주를 §Y통제§!하는 자에게 주어집니다. 다른 모든 수단 주들에 대한 §Y명분§!은 상실됩니다"
 SSU_second_sudanese_civil_war_mission_tt: "양측은 §Y6년§! 후에 열릴 §Y남수단 독립 국민투표§!에 동의합니다.\n"
 SSU_second_sudanese_civil_war_eastern_front: "동부 전선 개방"
 SSU_second_sudanese_civil_war_eastern_front_desc: "수단 동부에는 에리트리아에서 활동하는 반군 조직들이 여럿 있습니다. 이 조직들도 [SUD.GetLeader]의 통치에 반대하지만, 그들의 군사 자원은 주로 포트수단으로 가는 도로와 송유관을 파괴하는 데 쓰입니다. 우리는 그들과 동맹을 맺고 무기와 장비를 보내야 합니다. 이렇게 하면 남부에 있는 [SUD.GetAdjective] 군대 일부를 유인해 낼 수 있을 것입니다."
 SSU_second_sudanese_civil_war_eastern_front_tt: "§Y동부 전선§! 소속 2개 여단이 에리트리아 국경을 넘어 §Y포트수단§!으로 진격합니다"
 SSU_second_sudanese_civil_war_derg_support: "멘기스투에게 지원 요청"
 SSU_second_sudanese_civil_war_derg_support_desc: "멘기스투가 실각하기 전, 그는 우리 대의의 단호한 지지자였습니다. 이는 주로 수단이 멘기스투의 반대파를 지원했기 때문입니다. [ETH.GetName]에는 많은 수단 난민이 살고 있습니다. 이제 멘기스투가 다시 국정을 장악했으니, 우리는 이 난민들을 무장시켜 반[SUD.GetLeader] 파견대로 만드는 데 도움을 요청해야 합니다."
 SSU_second_sudanese_civil_war_derg_support_tt: "§Y수단 해방 전선§! 소속 4개 여단이 에티오피아 국경을 넘어 §Y청나일§! 주로 진입합니다"
 SSU_second_sudanese_civil_war_uganda_support: "[UGA.GetNameWithFlag]에게 지원 요청"
 SSU_second_sudanese_civil_war_uganda_support_desc: "요웨리 무세베니 [UGA.GetName] 대통령은 존 가랑의 오랜 지지자이자 친구이며 동맹입니다. 80년대 후반에는 SPLA와 함께 싸우는 [UGA.GetAdjective] 육군 병력도 있었습니다. 그러나 우간다 콩고 민주 공화국 문제에 개입하면서 무세베니의 지원은 줄어들었습니다. 콩고 상황이 진정되면 무세베니가 다시 우리를 도울 수 있을 것입니다."
 SSU_second_sudanese_civil_war_uganda_support_tt: "수락할 경우:\n"
 SSU_second_sudanese_civil_war_trade_ilemi_triangle: "무기를 대가로 [925.GetName] 양도"
 SSU_second_sudanese_civil_war_trade_ilemi_triangle_desc: "일레미 삼각지대는 수단과 케냐 사이의 작은 지역입니다. 이 지역은 공식적으로 합의된 국경이 없으며, 실질적인 행정 경계는 수년간 변해왔습니다. 만약 케냐가 [SUD.GetName]에 맞설 무기를 지원하겠다고 약속한다면, 이 영토를 공식적으로 케냐에 양도해야 할 수도 있습니다."
 SSU_second_sudanese_civil_war_trade_ilemi_triangle_tt: "수락할 경우:\n"
 SUD_second_sudanese_civil_war_iraqi_paratroopers: "이라크 공수부대 고용"
 SUD_second_sudanese_civil_war_iraqi_paratroopers_desc: "이라크는 이전에 우리에게 파견한 작은 규모의 공수부대 분견대가 주바 전투에 참여한 적이 있습니다. 우리는 현직 및 전직 이라크 공수부대원들로 구성된 더 큰 규모의 파견대를 요청하여 정예 부대를 편성해야 합니다."
 SUD_second_sudanese_civil_war_iraqi_paratroopers_tt: "이라크 공수부대 1개 연대가 카르툼에 배치됩니다"
 SUD_second_sudanese_civil_war_chinese_oil_guard: "유전 경비를 위해 중국 보안업체 고용"
 SUD_second_sudanese_civil_war_chinese_oil_guard_desc: "국내의 다양한 반군 조직 때문에 우리는 유전에 대한 지속적인 보안을 유지해야 합니다. 우리는 중국으로부터 보안 서비스를 고용하라는 제안을 받았습니다. 이 경비원들을 고용하면 유전 경비 부대 일부를 전선으로 돌릴 수 있을 것입니다."
 SUD_second_sudanese_civil_war_chinese_oil_guard_tt: "우리가 온전히 통제하는 원유 생산 주가 많을수록 더 많은 경비 부대를 동원할 수 있습니다. 이는 또한 이 결정의 비용과 [CHI.GetNameWithFlag]이 우리에게 미치는 영향력에도 영향을 미칩니다"
 SUD_second_sudanese_civil_war_libyan_mercenaries: "추가 [LBA.GetAdjective] 용병 요청"
 SUD_second_sudanese_civil_war_libyan_mercenaries_desc: "[LBA.GetNameDef]은 우리 정부를 돕기 위해 용병 집단을 파견했습니다. 우리 군대를 강화하기 위해 추가 부대의 파견을 요청해야 합니다."
 SUD_second_sudanese_civil_war_congo_volunteers: "[DRC.GetNameWithFlag]로부터 의용군 모집"
 SUD_second_sudanese_civil_war_congo_volunteers_desc: "[UGA.GetNameDef]가 [SSU.GetNameDef]를 지원하는 반면, 우리는 [UGA.GetNameDef]에 반대합니다. 이로 인해 우리는 [DRC.GetNameDef]와 자연스러운 동맹 관계가 됩니다. 불행히도, 그들은 [UGA.GetName]-[RWA.GetName] 연합군의 압박을 받고 있습니다. 만약 그들이 적들을 물리칠 수 있다면, 우리는 그들의 도움을 받을 수 있을지도 모릅니다."
 SUD_second_sudanese_civil_war_congo_volunteers_trigger_tt: "[DRC.GetNameDef]이 [SSU.GetNameDef]와 접한 국경 통과 거점을 최소 한 곳 이상 통제하고 있습니다"
 SUD_second_sudanese_civil_war_congo_volunteers_tt: "§Y콩고 의용군§! 4개 여단이 §Y얌비오§!와 §Y예이§! 마을을 공격합니다"
 sudan_war_in_darfur_decisions_category: "다르푸르 분쟁"
 sudan_war_in_darfur_decisions_category_desc: "다르푸르의 긴장감은 수십 년 동안 쌓여왔으며, 중앙 정부는 일부에서 아파르트헤이드라고 부르는 방식으로 현지 인구를 아랍화하려 했습니다. 결국 긴장감은 전쟁으로 폭발했으며, 다르푸르 해방전선과 정의와 평등 운동은 수단 정부를 무너뜨리기로 결심했습니다.\n\n만약 [SUD.GetNameWithFlag]가 §Y[224.GetName]§!의 어떤 지방도 통제하지 않는다면, 3년의 타이머가 시작됩니다. 타이머가 종료되면, [DAR.GetNameWithFlag]는 [SUD.GetName]의 지배 하에 §Y자치권§!를 부여받게 됩니다. 만약 다르푸르가 타이머가 종료될 때 §Y[1183.GetName]§! 또는 [223.GetName]§!을 통제하고 있다면, 다르푸르는 완전한 독립을 얻게 됩니다. 만약 [SUD.GetNameWithFLag]가 §Y[224.GetName]§!의 어떤 지방이라도 다시 점령하면, 타이머는 리셋됩니다."
 SUD_war_in_darfur_mission: "[DAR.GetNameDef]에 맞서 전투"
 SUD_war_in_darfur_mission_desc: "[DAR.GetNameDef]의 궁극적인 목표는 [SUD.GetLeader]의 전복입니다. 남부의 반란자들과는 달리, 다르푸르의 충돌은 상대적으로 최근의 일이어서 다르푸르 사람들은 전쟁을 오래 지속하려는 의지가 더 강할 것입니다. 그들이 자치권을 얻지 못하게 하려면, 우리는 그들을 완전히 짓밟아야 합니다."
 SUD_war_in_darfur_mission_cancel_trigger: "우리가 [224.GetName] 주의 어느 프로빈스든 통제하고 있습니다"
 DAR_war_in_darfur_mission: "[SUD.GetNameDef]에 맞서 전투"
 DAR_war_in_darfur_mission_desc: "수년간 [SUD.GetAdjective] 정권은 우리 인민들을 억압하며 우리의 의지에 반해 우리를 아랍인으로 만들려 했습니다. 이것은 오늘로 끝납니다."
