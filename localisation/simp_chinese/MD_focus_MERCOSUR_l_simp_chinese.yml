 mercosur.24.t: "全面会员资格谈判开始"
 mercosur.24.d: "与[SUR.GetName]就正式加入南方共同市场的谈判已经开启。这并非象征性姿态；若谈判成功，该集团将迎来又一个愿意将自身未来锚定在南美洲共同框架内的政府。"
 mercosur.24.a: "继续"
 mercosur.25.t: "全面会员资格谈判开始"
 mercosur.25.d: "与[MEX.GetName]就正式加入南方共同市场的谈判已经开启。这并非象征性姿态；若谈判成功，该集团将迎来又一个愿意将自身未来锚定在南美洲共同框架内的政府。"
 mercosur.25.a: "继续"
 mercosur.26.t: "全面会员资格谈判开始"
 mercosur.26.d: "与[PAN.GetName]就正式加入南方共同市场的谈判已经开启。这并非象征性姿态；若谈判成功，该集团将迎来又一个愿意将自身未来锚定在南美洲共同框架内的政府。"
 mercosur.26.a: "继续"
 mercosur.28.t: "加入完成"
 mercosur.28.d: "[FROM.GetName]漫长的加入进程已告完成。经过谈判、制度调整以及持续展现出的承诺，一切已不再存疑：他们如今作为正式成员国，站在了南方共同市场之内。"
 mercosur.28.a: "新成员加入。"
 mercosur.29.t: "成员资格正式化"
 mercosur.29.d: "与[FROM.GetName]共同铺设的道路终于抵达终点。始于谨慎试探的求索，终以全然接纳告终——如今我们在南方共同市场的地位已从临时过渡转为正式确立。"
 mercosur.29.a: "我们加入联盟。"
 mercosur.30.t: "南美峰会召开"
 mercosur.30.d: "南美峰会宣布召开，作为重启区域合作的第一步。主办方宣称必须重振南方共同市场，加强经济协调，使南美大陆在国际事务中拥有更强大的集体声音。支持者称赞这一举措是姗姗来迟的区域雄心回归，而批评者则质疑南美能否超越象征意义，实现持久的一体化。"
 mercosur.30.a: "区域新篇章拉开序幕。"
 mercosur.31.t: "[FROM.GetName]以联系国身份加入南方共同市场"
 mercosur.31.d: "[FROM.GetName]已同意以联系国身份加入南方共同市场，这标志着南美洲区域合作复兴迈出了新步伐。虽然联系国地位不及正式成员国，但它为更紧密的贸易联系、政治协调以及未来的准入谈判打开了大门。支持者认为此举表明南方共同市场正重新成为一支重要的区域力量。"
 mercosur.31.a: "联盟正在壮大。"
 mercosur.32.t: "[FROM.GetName]成为南方共同市场正式成员国"
 mercosur.32.d: "[FROM.GetName]已作为正式成员国加入南方共同市场。始于区域外交的举措，如今已演变为该集团实质性的扩张，增强了其在拉丁美洲的经济分量和政治影响力。对于支持一体化进程的人士而言，这不仅是外交上的成功，更证明了南方共同市场仍能塑造这片大陆的未来。"
 mercosur.32.a: "新进成员，壮大联盟。"
 BRA_unasul: "南美洲国家联盟成立"
 BRA_unasul_desc: "南美合作不应再停留于临时框架。是时候将其制度化，成为一个常设的区域性组织了。通过建立一个集政治对话、基础设施建设和社会合作于一体的架构，我们可以将南美团结推向新的阶段。"
 MER_expansion_unasul: "扩展南美洲国家联盟"
 MER_expansion_unasul_desc: "若要让南美国家联盟成为一个真正的大陆性框架，就必须在保持政治动力的同时扩大参与范围。通过吸引更多国家加入这一计划，我们可以强化其作为南美洲共同机构的合法性。"
 MER_sa_corridor_development: "南美走廊开发"
 MER_sa_corridor_development_desc: "大陆一体化不能仅停留在宣言层面。公路、港口、铁路、电信以及内陆走廊必须实现互联互通，让跨境流动与贸易成为现实而非空谈。"
 MER_counter_cartel: "反卡特尔合作"
 MER_counter_cartel_desc: "毒品贩运、武器走私和跨国犯罪组织威胁着南美洲的稳定与区域一体化。我们必须加强情报共享与联合行动，以应对这些无视国界的威胁。"
 MER_sa_energy_council: "南美能源理事会"
 MER_sa_energy_council_desc: "凭借石油、天然气、水力发电和庞大的输电网络，南美洲在能源合作方面潜力巨大。我们不应让这些资源成为竞争点，而应追求区域稳定与互补。"
 MER_sa_health_council: "南美洲卫生理事会"
 MER_sa_health_council_desc: "卫生合作虽不如地缘政治那般引人注目，却是南美一体化中最务实有效的领域之一。通过协调监测体系、药品供应与医疗人员配置，我们能在日常生活中展现一体化的切实成果。"
 MER_productive_integration_and_sme_networks: "生产整合与中小企业网络"
 MER_productive_integration_and_sme_networks_desc: "区域一体化不应仅限于大型企业和商品出口。通过鼓励中小企业、区域供应链和生产互补性，我们可以为该项目奠定更坚实的经济基础。"
 MER_sa_defense_council: "南美洲防务理事会"
 MER_sa_defense_council_desc: "南美洲的安全不应仅依赖于外部框架。在追求宏大的军事抱负之前，该地区必须在防务事务中建立对话、透明度和协调危机管理的习惯。"
 MER_sa_network_for_science_and_innovation: "南美创新网络"
 MER_sa_network_for_science_and_innovation_desc: "若整合是为未来服务，南美洲不仅需要联通市场与资源，更要连接知识与创新。科学合作能够增强这片大陆的自主发展能力。"
 MER_unasul_factions: "南美洲国家联盟联合防御组织"
 MER_unasul_factions_desc: "是时候将南美洲的团结推向超越单纯政治合作的层面了。为维护地区安全，共同应对外部压力与不稳定因素，我们将在南美洲国家联盟框架下制度化防务合作，并建立一个连接南美各国的新型联合防御组织。"
 unasul_member_state_modifier: "南美洲国家联盟成员国"
 unasul_member_state_modifier_desc: "南美洲国家联盟正在重建为一个政治协调、发展和共同行动的大陆性框架。随着更多成员国的加入以及新理事会和计划的实施，该组织的影响力不断加深，其带来的益处也随之增长。\n\n§Y随着南美洲国家联盟成员国数量的增加，这一国家精神将变得更加强大。§!"
 MER_unasul_integrated_corridor_plan_modifier: "南美洲国家联盟一体化走廊计划"
 MER_unasul_integrated_corridor_plan_modifier_desc: "南美洲国家联盟已启动一轮针对道路、物流和数字连接的协调投资。目前，成员国正在以比往常更快的速度建设交通和网络基础设施。"
 MER_unasul_energy_security_modifier: "南美洲国家联盟能源安全倡议"
 MER_unasul_energy_security_modifier_desc: "南美洲国家联盟已承诺投入整个联盟的资源来提升能源韧性。成员国目前正在一项共同的区域计划下，加速化石能源、核能和可再生能源发电设施的建设。"
 MER_unasul_joint_exercises_modifier: "南美洲国家联盟联合演习"
 MER_unasul_joint_exercises_modifier_desc: "南美洲国家联盟的武装部队目前正进行一轮协调一致的联合演习、人员交流及互操作性规划。"
 MER_invite_to_unasul: "邀请[FROM.GetName]加入南美洲国家联盟"
 MER_invite_to_unasul_desc: "与[FROM.GetName]就加入南美洲国家联盟展开正式会谈。接受率取决于该国与你的关系值、你对该国的影响力以及南美洲国家联盟国策树的进展。"
 MER_unasul_integrated_corridor_plan: "启动一体化走廊计划"
 MER_unasul_integrated_corridor_plan_desc: "花费国库资源，在180天内加速所有当前南美国家联盟成员国的运输和网络建设。"
 MER_unasul_counter_cartel_operation: "发起反卡特尔联盟行动"
 MER_unasul_counter_cartel_operation_desc: "呼吁所有受贩毒卡特尔影响的南美国家联盟成员国，为协调一致的反毒行动贡献政治资本。最终效果取决于有多少国家全力投入。"
 MER_unasul_counter_cartel_operation_tt: "所有受卡特尔影响的南美国家联盟成员都将被要求投入政治资本参与此次行动。最终结果取决于参与国政府对打击行动的支持力度。"
 MER_unasul_energy_security_reinforcement: "加强南美洲能源安全"
 MER_unasul_energy_security_reinforcement_desc: "花费国库资源，在180天内加速所有当前南美国家联盟成员国加速化石能源、核能及可再生能源建设。"
 MER_unasul_joint_health_improvement_project: "启动南美国家联盟联合卫健改善项目"
 MER_unasul_joint_health_improvement_project_desc: "启动一项为期180天的健康协调项目。项目完成后，南美国家联盟将获得永久性的月度人口增长率提升。此项目最多可完成四次。\n\n§Y通过这一系列项目，南美国家联盟的月度人口增长率总计最高可达+10%。§!"
 MER_unasul_supply_chain_strengthening: "强化南美供应链"
 MER_unasul_supply_chain_strengthening_desc: "启动一项为期180天的供应链协调项目。项目完成后，南美国家联盟将获得民用工业生产率的永久提升。此项目最多可完成四次。\n\n§Y通过这一系列项目，南美国家联盟的民用工业生产率最高可累计提升+15%。§!"
 MER_unasul_joint_exercises: "启动南美国家联盟联合演习"
 MER_unasul_joint_exercises_desc: "资助为期180天的南美国家联盟联合演习，提升联盟内每日陆军、海军和空军经验获取。"
 MER_unasul_joint_research_exchange_project: "启动南美国家联盟联合研究与技术交流项目"
 MER_unasul_joint_research_exchange_project_desc: "启动一项为期180天的研究协调计划。完成后，南美国家联盟将获得研究速度的永久提升。此计划最多可完成四次。\n\n§Y通过这一系列项目，南美国家联盟的研究速度最高可累计提升至+10%。§!"
 mercosur.35.t: "邀请加入南美洲国家联盟"
 mercosur.35.d: "[FROM.GetName] 已邀请我们加入南美洲国家联盟，将其描述为南美洲可能重新学会共同行动的政治框架。接受邀请将使我国置身于一个承诺对话、协调与大陆雄心的计划之中，但同时也迫使我们思考：是否已准备好将自身命运与更广阔的区域愿景紧密相连？"
 mercosur.35.a: "加入南美国家联盟。"
 mercosur.35.b: "暂时拒绝。"
 mercosur.36.t: "南美国家联盟邀请已发出"
 mercosur.36.d: "关于加入南美国家联盟的外交谈判已与[FROM.GetName]开启。邀请函已发出，我方立场已阐明，现在静待另一个国家是否愿意押注南美洲协调机制的回归。"
 mercosur.36.a: "继续。"
 mercosur.37.t: "南美国家联盟邀请被接受"
 mercosur.37.d: "[FROM.GetName]已接受我们的邀请，正式加入南美洲国家联盟。这个不久前还停留在演讲和公报中的构想，如今正逐渐演变为一个实实在在的大陆性机构。"
 mercosur.37.a: "很好。"
 mercosur.38.t: "南美国家联盟邀请被拒绝"
 mercosur.38.d: "[FROM.GetName]目前拒绝了加入南美国家联盟的邀请。构建更广泛南美框架的梦想虽未被彻底否定，但尚未赢得他们的信任。"
 mercosur.38.a: "我们稍后再试。"
 mercosur.39.t: "接受南美国家联盟成员资格"
 mercosur.39.d: "我们已接受[FROM.GetName]的邀请，正式加入南美洲国家联盟。无论南美一体化的前路如何未卜，我们选择不再置身事外。"
 mercosur.39.a: "更广阔的南美。"
 mercosur.40.t: "[FROM.GetName]加入南美洲国家联盟"
 mercosur.40.d: "[FROM.GetName]已加入南美国家联盟，为这一新兴的南美框架增添了新的声音、新的官僚体系以及新的国家抱负。随着每一次新成员的加入，这项事业愈发难以被简单视为怀旧情怀，而更容易被想象成一个持久的政治现实。"
 mercosur.40.a: "大陆联盟扩张。"
 mercosur.50.t: "综合走廊计划已启动"
 mercosur.50.d: "南美国家联盟的综合走廊计划已从会议桌走向勘测地图与实地规划。整个大陆的政府部门、工程师和规划者正努力将一体化的理念转化为各国能够切实感受到的道路、连接线和走廊。"
 mercosur.50.a: "继续建设。"
 mercosur.51.t: "联合卫健项目启动"
 mercosur.51.d: "在南美洲国家联盟框架下，一项新的联合卫健倡议已启动。官员们谈及联合采购、统一应对和更优协调，但在行政术语之下，隐藏着更宏大的愿景：让区域一体化在诊所、药房和日常生活中切实可感。"
 mercosur.51.a: "为了更健康的大陆。"
 mercosur.52.t: "联合卫健项目完成"
 mercosur.52.d: "最新的联合卫健倡议已圆满结束，其最成功的实践经验现正融入南美国家联盟的常设机制。这项始于临时性的努力正逐渐成为惯例，为该组织增添了更人性化、更具体可感的形象。"
 mercosur.52.a: "利在千秋。"
 mercosur.53.t: "能源安全倡议已启动"
 mercosur.53.d: "南美洲国家联盟已启动一项覆盖整个大陆的能源安全推进计划。电力规划师、公用事业官员和部长们着手基于同一张区域地图展开工作，努力确保南美洲丰富的能源资源成为稳定的源泉，而非引发竞争。"
 mercosur.53.a: "赋能大陆。"
 mercosur.54.t: "供应链倡议启动"
 mercosur.54.d: "一项新的南美国家联盟供应链倡议已启动。各国政府、商会及技术机构正致力于将南美洲的生产体系整合衔接，而非任其各自为政。"
 mercosur.54.a: "整合市场。"
 mercosur.55.t: "供应链倡议已完成"
 mercosur.55.d: "南美国家联盟最新的供应链计划已经完成。其实际经验、商业关系和管理习惯不再是临时性试验；它们正成为该地区永久经济架构的一部分。"
 mercosur.55.a: "更强大的生产基础。"
 mercosur.56.t: "联合演习正在进行中"
 mercosur.56.d: "南美洲国家联盟的联合演习现已展开。昔日仅通过正式礼节相识的军官们，如今在实地会面，交流方法，检验设想，并学习当区域协调被要求在实践中运作时，其真实面貌如何。"
 mercosur.56.a: "有备无患。"
 mercosur.57.t: "研究交流项目启动"
 mercosur.57.d: "一项新的南美国家联盟研究与技术交流计划已启动。南美洲各地的大学、研究机构和技术部门正被纳入同一对话框架，以期该地区能够像重视商品贸易那样认真地进行思想交流。"
 mercosur.57.a: "分享知识。"
 mercosur.58.t: "研究交流项目已完成"
 mercosur.58.d: "最新的研究与技术交流项目已告一段落。项目虽已结束，但由此建立的合作关系却得以延续，留下了一张更为紧密的联系网络，并强化了一种共识：南美洲的知识可以系统整合，而非仅仅零散分布。"
 mercosur.58.a: "知识永存。"
 mercosur.60.t: "资助反卡特尔行动"
 mercosur.60.d: "南美洲国家联盟已发起针对贩毒卡特尔影响力的协同行动。我们面临的问题不在于威胁是否真实存在，而在于我们愿意为区域应对方案投入多少政治资本。"
 mercosur.60.a: "提供有限贡献。"
 mercosur.60.b: "举全国之力支持此次行动。"
 mercosur.61.t: "反卡特尔行动升级"
 mercosur.61.d: "大多数参与南美国家联盟行动的政府选择全力投入。此举不仅是一种姿态，更是对贩毒卡特尔网络、其庇护者以及助长其生存的恐惧氛围的沉重区域性打击。"
 mercosur.61.a: "乘胜追击。"
 mercosur.62.t: "反卡特尔行动完成"
 mercosur.62.d: "此次行动得到了更为审慎的支持。尽管如此，协调一致的压力仍扰乱了卡特尔网络，削弱了其活动空间，只是未能形成更统一应对可能带来的强力效果。"
 mercosur.62.a: "有用的一步。"
 mercosur.75.t: "邀请加入南美洲国家联盟防卫协定"
 mercosur.75.d: "[FROM.GetName] 已邀请我们加入南美洲国家联盟防御框架。接受这一邀请不仅意味着签署另一份文件，更将使我们置身于一项军事共识之中——旨在向邻国及外界表明：当压力来临时，南美洲决心共同进退。"
 mercosur.75.a: "加入防卫协定。"
 mercosur.75.b: "拒绝。"
 mercosur.76.t: "防卫协定邀请被接受"
 mercosur.76.d: "[FROM.GetName]已接受我们的邀请，加入了南美洲国家联盟防务协定。这个联盟虽尚处初创阶段，但每一份新签署的协议都为其增添了更多可信度、分量与超越言辞的实际意义。"
 mercosur.76.a: "联盟正在壮大。"
 mercosur.77.t: "防卫条约邀请被拒绝"
 mercosur.77.d: "[FROM.GetName]目前拒绝加入南美洲国家联盟防卫协定。尽管区域团结的口号响亮，但并非所有政府都准备好让国防政策成为南美洲共同叙事的一部分。"
 mercosur.77.a: "真遗憾。"
 mercosur.78.t: "我们加入南美洲国家联盟防卫协定"
 mercosur.78.d: "我们已接受[FROM.GetName]的邀请，加入了南美洲国家联盟防卫协定。此举将我们的安全与一个旨在将政治亲和力转化为战略承诺的大陆框架更紧密地联系在一起。"
 mercosur.78.a: "南美洲团结一致。"
 mercosur.79.t: "关税协定完成"
 mercosur.79.d: "经过数周的谈判、法律审查以及与潜在新成员的关税工作，现已告一段落。表面上看，这一过程技术性很强，但在政治上却意义重大，原因很简单：他们市场与我们市场之间的又一道屏障，如今突破的希望日益增长。"
 mercosur.80.t: "海关现代化改造完成"
 mercosur.80.d: "对新成员国的海关改革工作已经完成。相关程序已明确，边境流程得到加强，国家行政姿态也更接近加入南方共同市场的全面要求。"
 mercosur.81.t: "共同标准采用落实"
 mercosur.81.d: "针对潜在新成员的通用标准方案已全面完成。曾经体现距离的规则，如今正以兼容性为语言重新书写，他们加入该集团的道路显得愈发真实。"
 mercosur.82.t: "后勤走廊项目完成"
 mercosur.82.d: "面向潜在新成员的物流走廊项目已告完成。那些曾停留在抽象讨论中的构想，正通过路线、仓储站和实际连接逐渐成形，使得加入过程不再流于仪式，而是有了切实的根基。"
 mercosur.83.t: "运输升级完成"
 mercosur.83.d: "与新成员入盟方案相关的最新交通工程已经完工。距离并未消失，但地图看起来缩小了些，一体化的前景也显得不那么遥不可及了。"
 mercosur.84.t: "互联互通计划完成"
 mercosur.84.d: "面向潜在新成员的最新互联互通计划已完成。商业往来、行政联系及跨境协调现已拥有更稳固的沟通渠道。"
 mercosur.85.t: "发展资金拨付落实"
 mercosur.85.d: "面向潜在新成员的发展援助方案已全面交付。相比任何外交照会，如此规模的切实投入更能向其政府表明，南方共同市场正以实际行动为吸纳成员做准备，而非仅停留在口头承诺。"
 mercosur.86.t: "民用投资完成"
 mercosur.86.d: "潜在新成员加入方案中的民用投资阶段已告完成。如今，工厂、企业与商业区有更充分的理由将区域一体化视为切实可见的进程，而非仅仅是外交辞令。"
 mercosur.87.t: "基础设施升级完成"
 mercosur.87.d: "针对潜在新成员的基础设施改善计划已告完成。每项竣工工程都传递着相同的政治讯息：加入并非仅仅是一纸签名，更是国家与更广阔区域连接方式的重新定位。"
 mercosur.88.t: "商业基础设施扩展"
 mercosur.88.d: "一项针对潜在新成员国的商业基础设施项目已经竣工。如今，南方共同市场的承诺不仅体现在言辞中，更展现在更加繁忙的贸易通道、更完善的设施以及更为清晰的相互依存关系之中。"
 mercosur.89.t: "工业投资协议正式生效"
 mercosur.89.d: "与潜在新成员的工业投资协议已正式生效。昔日的政治共识正转化为具有深度、期望与共同利益的经济纽带，其力量足以超越仪式本身，持久维系。"
 mercosur.90.t: "商业投资框架确立"
 mercosur.90.d: "与潜在新成员之间的商业投资框架已经确立。银行、企业及政府部门之间如今搭建起更坚实的桥梁，这促使各方将入盟视为共同的投资机遇，而非象征性的姿态。"
 mercosur.91.t: "财政合作方案已送达"
 mercosur.91.d: "为潜在新成员准备的金融合作方案已经送达。随着这最后一块拼图就位，入盟努力不再显得临时；它给人一种国家正稳步被拉入集团核心圈的感觉。"
 mercosur.108.t: "新一轮南方共同市场发展基金启动"
 mercosur.108.d: "新一轮的南方共同市场发展基金已正式启动。对于整个集团内的各部委、企业及地方政府而言，这不仅是账面上的数字，更是区域一体化仍具备资金支持、规划蓝图与制度决心的有力证明。发展的承诺，正再次从纸面走向现实。"
 mercosur.108.a: "让资金开始流动起来。"
 mercosur.accession_project_complete.a: "继续"
 mercosur.93.t: "接受全面会员资格"
 mercosur.93.d: "[FROM.GetName]已接受我方提议，立即以正式成员国身份加入南方共同市场。没有漫长的过渡阶段，没有精心安排的磨合期，唯有今日联盟扩大的既定事实。"
 mercosur.93.a: "很好。"
 mercosur.94.t: "我们加入南方共同市场"
 mercosur.94.d: "我们的航向已经确定，南方共同市场不再是我们遥不可及的论坛，而是我们如今置身其中的架构。关于我们在地区秩序中地位的旧有模糊性，正让位于一个更坚硬的事实：我们身处集团内部，整个大陆都必须适应这一现实。"
 mercosur.94.a: "我们加入联盟。"
 mercosur.105.t: "获得联系国地位"
 mercosur.105.d: "我们的请愿已使我们以联系国身份加入南方共同市场。这虽未触及该集团的核心圈层，但足以表明我们的政治经济视野正朝着南美一体化的方向延伸，而非背道而驰。"
 mercosur.105.a: "更进一步"
 mercosur.107.t: "南美国家联盟请愿已获批准"
 mercosur.107.d: "我们的请愿使我们加入了南美洲国家联盟。无论南美一体化的未来如何不确定，我们选择不再袖手旁观，而是要参与其中，在正在构建的框架内占据我们的一席之地。"
 mercosur.107.a: "我们加入联盟。"
 mercosur_news.1.t: "南美洲国家联盟的成立"
 mercosur_news.1.d: "南美洲各国宣布成立南美洲国家联盟（UNASUL），将其作为常设性区域组织，旨在将政治对话、基础设施建设与社会合作纳入统一框架。此举标志着南美洲一体化进入新阶段，区域协调或将更具制度性与持久性。然而这一计划能否真正成功，仍取决于各成员国能否超越彼此差异的国家利益。"
 mercosur_news.1.a: "南美的新时代"
 mercosur_news.2.t: "南美洲国家联盟组建联合防御协定"
 mercosur_news.2.d: "南美国家联盟已超越经济与政治协调范畴，宣布成立全新的南美洲防务协定。支持者将其描绘为区域一体化的自然延伸，而质疑者则警告称，该大陆正迈入集团政治中更具对抗性且可能引发分裂的新阶段。"
 mercosur_news.2.a: "南美洲团结一致。"
 mercosur_news.3.t: "成员退出南美洲国家联盟"
 mercosur_news.3.d: "[ROOT.GetNameWithFlag]宣布退出南美国家联盟联合防御机制，此举重新引发了诸多质疑——许多人曾以为，当南美洲首次共同构筑防线时，这些疑虑已被彻底封存。支持退出者称此举是回归主权行动自由；批评者则视其为该协议的第一道可见裂痕，而这一协议既依赖于正式签署，更离不开政治互信。这究竟是一次孤立的倒退，还是更广泛瓦解的开端，如今将成为整个大陆关注的焦点。"
 mercosur_news.3.a: "这份协定看起来不再牢不可破。"
 UNASUL_faction: "南美洲国家联盟防卫协定"
 UNASUL_faction_DEF: "南美洲国家联盟防卫协定"
 MER_invite_to_unasul_TT: "§Y接受率取决于该国与你的关系值、你对该国的影响力以及南美洲国家联盟国策树的进展！§!"
 MER_request_mercosur_associate_membership_tt: "§Y提交正式申请。审核期结束后，我们将以联系国身份加入南方共同市场。§!"
 MER_request_mercosur_full_membership_tt: "§Y提交正式申请。审核期结束后，我们将以正式成员国身份加入南方共同市场。§!"
 MER_request_unasul_membership_tt: "§Y提交正式申请。审核期结束后，我们将加入南美洲国家联盟。§!"
 MER_unasul_member_tt: "将§Y南美洲国家联盟成员国§!国家精神应用于所有成员国。"
 BRA_unasul_events_TT: "§Y向所有南方共同市场成员国发出邀请，加入南美洲国家联盟！§!"
 MER_expansion_unasul_TT: "§G解锁§!邀请南美洲国家加入§Y南美洲国家联盟§!的决议！"
 mercosur.110.t: "共同市场民主条款问题"
 mercosur.110.d: "[FROM.GetName]所发生的一切，已不能再被轻视为仅具有国内意义的内部事务。那里的严峻政治转向，令人质疑公开竞争与宪法制衡在该国是否还有任何分量。在整个集团内部，各国部长与外交官们正公开质问：南方共同市场的民主条款究竟是一项严肃的承诺，抑或仅仅是门面文章。我们必须做出决定：是暂停[FROM.GetName]的资格，还是为了维持南美市场的完整而容忍这一转向。"
 mercosur.110.a: "必须强制执行条款。"
 mercosur.110.b: "给予最后一次宽限。"
 mercosur.112.t: "南方共同市场暂停我国成员国资格"
 mercosur.112.d: "来自集团的裁决已经下达，且明确无误。南方共同市场判定，我们最近的路线已逾越其民主条款所划定的界限，代价就是如今我们在集团内的席位被暂停。南美洲并没有永远背弃我们，但它此刻认为必须有所动作。"
 mercosur.112.a: "后果实实在在。"
 mercosur.113.t: "南方共同市场给予有条件宽限"
 mercosur.113.d: "南方共同市场并未直接中止我们的成员资格，但也未给予豁免。我们仍留在该集团内，却笼罩在明显的不信任阴云之下，该地区各国都心知肚明：我们在南美市场的持续地位如今在考察之中。"
 mercosur.113.a: "我们仍处于监视之下。"
 mercosur.114.t: "南方共同市场暂停成员国资格"
 mercosur.114.d: "在[FROM.GetName]发生严重的政治转向后，南方共同市场内部的辩论以一项艰难的决定告终。该集团援引了民主条款，暂停了[FROM.GetName]的成员国资格，表明南美市场仍愿意捍卫其所宣称的政治基础。"
 mercosur.114.a: "集团划出了界限。"
 mercosur.115.t: "南方共同市场宽大处理"
 mercosur.115.d: "随着[FROM.GetName]发生重大政治变动，南方共同市场虽未采取暂停成员资格的举措，但这一决定绝非认可。该集团选择暂时维持团结，同时对[FROM.GetName]发出明确警告，确保民主合法性问题将持续影响其在该组织中的地位。"
 mercosur.115.a: "短暂的喘息。"
 mercosur.117.t: "南美洲国家联盟民主条款问题"
 mercosur.117.d: "[FROM.GetName]所发生的一切，已不能再被轻视为仅具有国内意义的内部事务。那里的严峻政治转向，令人质疑公开竞争与宪法制衡在该国是否还有任何分量。在整个集团内部，各国部长与外交官们正公开质问：南美洲国家联盟的民主条款究竟是一项严肃的承诺，抑或仅仅是门面文章。我们必须做出决定：是暂停[FROM.GetName]的资格，还是以警告为前提容忍这一转向。"
 mercosur.117.a: "暂停其成员国资格。"
 mercosur.117.b: "保留他们的位置，但予以谴责。"
 mercosur.119.t: "南美洲国家联盟暂停我国成员国资格"
 mercosur.119.d: "南美洲国家联盟已作出裁决，其传达的信息是疏远而非团结。该组织认定我们近期的路线与其民主条款无法相容，因此我们在南美洲框架内的席位已被暂停。本应象征大陆融合的机制，反而成为区域合法性仍存在边界的明证。"
 mercosur.119.a: "一击命中。"
 mercosur.120.t: "南美洲国家联盟将我们置于观察期"
 mercosur.120.d: "南美洲国家联盟并未直接暂停我们的成员资格，但这一决定并未带来多少安慰。我们仍留在联盟框架内，却处于明显的谴责之下，南美洲各国都会将此解读为警告——我们在联盟中已非被无条件信任。"
 mercosur.120.a: "缓期，而非无罪。"
 mercosur.121.t: "南美洲国家联盟暂停成员国资格"
 mercosur.121.d: "在审视[FROM.GetName]国内严峻的政治转向后，南美国家联盟决定启动其民主条款，暂停该国在该组织中的成员资格。这一决定凸显出南美洲的团结依然建立在政治基础之上，某些严重违反原则的行为足以迫使问题公开化。"
 mercosur.121.a: "框架正在固化。"
 mercosur.122.t: "南美洲国家联盟宽大处理"
 mercosur.122.d: "在[FROM.GetName]发生严重的政治转向后，南美洲国家联盟决定暂不中止其成员国资格。即便如此，这一结果远非明确的认可：该组织选择了团结而非决裂，同时明确表示[FROM.GetName]在南美洲一体化进程中的地位将受到持续质疑。"
 mercosur.122.a: "警告依然有效。"
 MER_democratic_clause_warning_tt: "§Y如果我们属于南方共同市场或南美洲国家联盟，此举可能触发其民主条款审查，并危及我们的成员资格。§!"
