 RAJ_make_threshold_higher: "Aumentar el umbral"
 RAJ_make_threshold_higher_desc: "Para lograr la integridad electoral, debemos aumentar el umbral electoral para eliminar a los aficionados y demás tontos, y dejar así lugar para gente inteligente y educada."
 RAJ_BRICS_integer: "Creación de los BRICS"
 RAJ_BRICS_integer_desc: "Es hora de que las principales potencias mundiales se unan en un solo esfuerzo para crear un mundo multipolar. La conceptualización de los BRICS propuesta en el Foro Económico de San Petersburgo debe implementarse."
 RAJ_appease_hindus_desc: "Invest in Hindu community programs and cultural initiatives. Raises Hindu opinion but may be seen as favoritism by Muslim communities."
