 GRE_police_influence: "Police Under Party Influence"
 GRE_process_sco_member_tt: "§Y上海協力機構（SCO）への統合プロセスを開始する。§!"
 GRE_tax_relief_for_businessman: "実業家への減税"
 GRE_tax_relief_for_businessman_desc: "我々は企業を財政的に支援しなければならない。彼らは過去の政権の政策の中で自力で生計を立てることを余儀なくされており、したがって我々は彼らの税金を減らす。"
 istanbul_renamed: "イスタンブールの改称"
 GRE_9833_name: "コンスタンティノープル"
 GRE_constantinople_not_istanbul: "イスタンブールではなくコンスタンティノープル"
 GRE_constantinople_not_istanbul_desc: "For five centuries Constantinople has been known by another name. The city of Constantine and Justinian, of Hagia Sophia and the Theodosian Walls, renamed and rewritten by a conqueror. With the city in Greek hands, we restore what history stole from us."
 GRE_gain_10_strength: "§Hギリシャ系キプロス人§!は§H10の勢力§!を§G得る§!！"
 GRE_lose_10_gain_10: "§Hトルコ系キプロス人§!の戦力が§R10§!§R減少§!する"
 GRE_austerity_idea: "緊縮財政による緊張"
 GRE_austerity_idea_desc: "The austerity program has pushed public patience past its limit. Protests are spreading from Athens to Thessaloniki, strikes are shutting down ports and hospitals, and the political temperature is rising. Each new cut adds fuel. If the tension isn't managed, full-scale unrest is a real possibility."
 GRE_please_south_desc: "ギリシャ系キプロス人を喜ばせ続けることで、キプロス統一、そして最終的にはエノシス（ギリシャとの統一）という我々の目標への支持を得やすくなるだろう。"
 GRE_please_north_desc: "トルコ系キプロス人はギリシャ人でもキプロス人でもないという認識を強調する。彼らはキプロスに居座る植民者であり侵略者であり、排除されねばならない存在なのだ。"
 TUR_CYP_incite_riot_desc: "南キプロスで暴動を扇動し、ギリシャ側がこの地域で政治的影響力を得られないようにする時が来た。"
 TUR_CYP_propaganda_north_desc: "北キプロスの人々がギリシャ側に影響されないよう、プロパガンダを強化・拡散することは、我々のこの地域での成功にとって極めて重要である。"
 TUR_CYP_propaganda_south_desc: "南キプロスの人々がギリシャ側に影響されないよう、プロパガンダを強化・拡散することは、我々のこの地域での成功にとって極めて重要である。"
 TUR_attack_CYP_strength_desc: "ギリシャ系キプロス人の勢力を攻撃することで、彼らがこの地域で政治的影響力を得るのを阻止できる。"
 GRE_attack_turkish_strength_desc: "トルコ系キプロス人の勢力を攻撃することで、彼らがこの地域で政治的影響力を得るのを阻止できる。"
 GRE_nato_pressure_turkey_accept_tt: "Allies who back Greece ease Aegean tension and build momentum on Cyprus, raising the chance Turkey backs down within a month."
 GRE_nato_pressure_turkey_reject_tt: "Allies who decline add no diplomatic weight, leaving Turkey less likely to concede."
 GRE_hellenic_economy: "The Hellenic Economy"
 GRE_hellenic_economy_desc: "The Greek economy is in a difficult position. Mounting debt, unemployment, and the question of Eurozone entry are all pressing concerns. However, we have a strong merchant fleet, a strategic position, and tourism that brings millions of visitors every year. We should make the most of what we have."
 GRE_debt_mounts: "The Debt Mounts"
 GRE_debt_mounts_desc: "Our debt has ballooned to nearly 300 billion dollars, one of the highest per capita in the world. Interest payments eat up a huge part of our budget, leaving little room for investment. Foreign bankers are getting restless and the EU wants answers. We need to act before this gets worse."
 GRE_debt_mounts_req_tt: "Our §YUnified Debt Ratio§! is higher than §Y90%§! (Current §Y[?GRE_unified_debt_ratio|-1%]§!)"
 GRE_brics_membership_req_tt: "Eastern alignment score is above 7"
 GRE_pillar_of_the_west_req_tt: "Western commitment is above 3"
 GRE_aegean_assertiveness_event_tt: "§YIn 90 days, Turkey will respond to our patrols in the Aegean.§!"
 GRE_cyprus_gas_crisis_event_tt: "§RWith tensions already high, drilling will provoke a Turkish naval reaction within days.§!"
 GRE_greek_bonds: "Greek Bonds"
 GRE_greek_bonds_desc: "Greek bonds have become synonymous with risk in international markets. Still, bonds are one of the few ways to raise capital without giving up sovereignty. If we issue new government securities, we can fund infrastructure and reforms. We just need to convince investors that Greece is worth the gamble."
 GRE_solve_evasion: "Solve Tax Evasion"
 GRE_solve_evasion_desc: "Billions in revenue are lost every year to tax evasion. If we strengthen our tax collection, invest in better technology, and crack down on offshore accounts, we can close the loopholes and get our budget back on track."
 GRE_convert_to_euro: "Convert to the Euro"
 GRE_convert_to_euro_desc: "The Euro is both an opportunity and a risk. Adopting it ties our economy to Europe's, which means more stability than the drachma ever had, but we lose control of our own monetary policy. It is up to us whether the trade-off is worth it."
 GRE_skouries_mines: "Skouries Mines"
 GRE_skouries_mines_desc: "The Skouries copper-gold deposit in Halkidiki is one of the largest in Europe. Foreign corporations want the extraction rights and are promising jobs and wealth. Environmentalists are against it. We will need to decide what matters more."
 GRE_local_manufacturing: "Local Manufacturing"
 GRE_local_manufacturing_desc: "Greek factories are sitting idle while foreign goods flood our markets. We have skilled workers and good craftsmanship traditions but we haven't been investing in ourselves. Supporting local manufacturers with incentives and contracts could rebuild the industry and create jobs."
 GRE_military_industrial: "The Hellenic Arms Industry"
 GRE_military_industrial_desc: "Elliniki Viomichania Oplon and its sister firm Pyrkal have armed Greek soldiers since the Cold War, yet decades of state ownership have left them saddled with debt and idle production lines. Sustained, targeted subsidies could keep the furnaces running, secure a domestic supply of ammunition and small arms, and fold the two into a single competitive manufacturer rather than a perennial drain on the treasury."
 GRE_agriculture_sector: "Backbone of the Countryside"
 GRE_agriculture_sector_desc: "Nearly a fifth of Greeks still draw their living from the land, from the olive groves of the Peloponnese to the cotton fields of Thessaly. Yet the sector is ageing, splintered into tiny plots, and dependent on Brussels for its subsidies under the Common Agricultural Policy. Backing our farmers while pushing irrigation, cooperatives, and modern machinery would keep Kalamata olives, feta, and Assyrtiko flowing to the world's tables."
 GRE_power_corporations: "The Public Power Corporation"
 GRE_power_corporations_desc: "For half a century the state-owned Public Power Corporation, DEI, has kept the lights on by burning lignite dug from the pits of Ptolemaida and Megalopolis. That coal is cheap but filthy, and our reliance on imported oil and gas leaves us exposed to every shock in the Middle East. Modernising the grid, extending DEPA's gas network, and building new plants would turn these utilities into the strategic backbone of the nation."
 GRE_austerity_measures: "Austerity Measures"
 GRE_austerity_measures_desc: "Creditors are demanding reduced pensions, higher taxes, and eliminated benefits. Without austerity we face bankruptcy, but with it we face public anger. Protests and strikes are inevitable. There are no easy choices here."
 GRE_debt_refactoring: "Strategic Debt Restructuring"
 GRE_debt_refactoring_desc: "The bond auctions bought us time, but that is not enough. Creditors are getting impatient and interest payments are draining the treasury. We need to restructure our debt: renegotiate terms, extend maturities, and show our partners that giving us room to breathe means we can actually pay them back."
 GRE_ilarionas_hydro: "Ilarionas Hydroelectric"
 GRE_ilarionas_hydro_desc: "The Ilarionas river in northern Greece has tremendous hydroelectric potential. Hydroelectric power is clean, renewable, and works on demand unlike solar or wind. This project could power hundreds of thousands of homes."
 GRE_telecomms: "OTE Investments"
 GRE_telecomms_desc: "Millions of Greeks in island villages and mountain towns still lack reliable phone and internet access. State investment in OTE could connect these areas to the rest of the country, giving farmers access to markets and students access to universities."
 GRE_new_railways: "Athens-Thessaloniki Rail Line Revitalization"
 GRE_new_railways_desc: "The Athens-Thessaloniki corridor is the backbone of mainland Greece, but the rail line is painfully slow. Modern rolling stock and upgraded track could cut travel times in half and give the provincial economy a real boost."
 GRE_highway_initiatives: "Extend the AX Highways"
 GRE_highway_initiatives_desc: "The mountains that once divided the ancient city-states still isolate communities and hurt commerce today. The proposed AX highway network would cut through the Pindus range and connect the western coast to Thessaly. It will be expensive, but the economic benefits could be worth it."
 GRE_hellas_gold: "Deepen the Kassandra Mines"
 GRE_hellas_gold_desc: "The Kassandra mining district has substantial chromium reserves that haven't been fully exploited yet. Deepening existing operations and investing in extraction equipment would bring this wealth to market and reduce our import dependency."
 GRE_euboea_bauxite_deposits: "Euboea Bauxite Deposits"
 GRE_euboea_bauxite_deposits_desc: "Euboea has significant bauxite deposits, which is the primary ore for aluminium. Large-scale extraction could supply our industrial base and cut down on expensive imports."
 GRE_industrial_lignite_mining: "Industrial Lignite Mining"
 GRE_industrial_lignite_mining_desc: "Western Macedonia has vast lignite reserves that can be processed into synthetic fuel. Industrial-scale mining would help with our energy dependency and give us a domestic alternative to imported oil."
 GRE_rare_element_prospecting: "Rare Element Prospecting"
 GRE_rare_element_prospecting_desc: "Greece has the geological diversity to potentially hold undiscovered rare earth and strategic mineral deposits. A proper surveying programme could identify new extraction sites and open up a lucrative market."
 GRE_transport_sector: "Roads, Rails, and Ferries"
 GRE_transport_sector_desc: "A country of islands and mountains lives or dies by its transport. KTEL coaches wind through the passes, blue-and-white ferries stitch the Aegean together, and the buses and trolleys of OASA carry Athens to work each morning. Renewing ageing fleets, extending routes into the suburbs, and knitting road, rail, and sea into a single ticketed network would let goods reach market and workers reach their jobs."
 GRE_vintage_wines: "The Vintages of Greece"
 GRE_vintage_wines_desc: "Greeks were pressing grapes before Rome was founded, yet the world still knows our wine only as cheap retsina in a taverna carafe. That is a disservice to the volcanic Assyrtiko of Santorini, the bold Xinomavro of Naoussa, and the ruby Agiorgitiko of Nemea. Investing in estate bottling, protected-origin labels, and wine tourism could finally set Greek vintages beside the great names of France and Italy."
 GRE_tobacco_plantations: "Oriental Tobacco"
 GRE_tobacco_plantations_desc: "The sun-cured Basma leaf of Macedonia and Thrace has perfumed the world's finest blends for generations, and houses like Papastratos in Piraeus built fortunes on it. Western smoking may be in retreat, but demand endures across the Balkans and the Middle East, and thousands of smallholders around Kavala and Xanthi still depend on the harvest. We must support the growers while easing those who can toward new crops."
 GRE_gas_oil_plants: "The Refineries of Attica"
 GRE_gas_oil_plants_desc: "The refineries ringing the Saronic Gulf, Hellenic Petroleum at Aspropyrgos and Elefsina and Motor Oil Hellas at Agioi Theodoroi, process the crude that keeps Greece and half the Balkans running. But the older units are tired and their margins are thinning. New cracking capacity, cleaner desulphurisation, and expanded storage would secure our place as the refining hub of the southeastern Mediterranean."
 GRE_trim_the_fat: "Trim the Fat"
 GRE_trim_the_fat_desc: "The government has become bloated and inefficient. Ministries are overstaffed, contracts go to friends and family, and red tape is choking everything. We need to slim down by cutting waste, automating where we can, and holding people accountable."
 GRE_debt_swaps: "Debt Swap Partners"
 GRE_debt_swaps_desc: "Swapping our debt into foreign currency denominated bonds could reduce our exposure to volatility. It requires good banking partners and some financial engineering, but it is one way to manage the debt without as much political fallout."
 GRE_debt_swap_initial_tt: "§G50 billion§! of national debt will be transferred to the chosen partner at a §G3%§! interest rate."
 GRE_debt_swap_accepted_opinion: "Accepted Debt Swap"
 GRE_debt_swap_rejected_opinion: "Rejected Debt Swap"
 GRE_olympic_airways: "Olympic Airways"
 GRE_olympic_airways_desc: "Founded by Aristotle Onassis, Olympic Airways was once the pride of Greek aviation. The airline has struggled in recent years but the name still carries weight. Revitalizing the carrier could bring tourists in and keep them coming back."
 GRE_trainose: "TrainOSE"
 GRE_trainose_desc: "The Greek railway system, once neglected, has seen new life. TrainOSE operates passenger and freight services connecting Athens to Thessaloniki, the Peloponnese to the mainland. By expanding routes, improving schedules, and investing in rolling stock, we can make rail a genuine alternative."
 GRE_cotton_plantations: "Cotton Plantations"
 GRE_cotton_plantations_desc: "Greek cotton from Thessaly and Macedonia is among the best in the world. Strong fibers and excellent quality make it great for textiles. Supporting our cotton farmers and investing in manufacturing could bring this industry back to where it should be."
 GRE_fisheries_expansion: "Riches of the Aegean"
 GRE_fisheries_expansion_desc: "Greece lands more farmed sea bream and sea bass than any nation in Europe, its cages strung along the sheltered gulfs of the Ionian and the Aegean. But wild stocks are collapsing under overfishing, pollution, and trawlers pushing across the maritime border. Expanding aquaculture, renewing the coastal fleet, and enforcing honest quotas would keep both the fishermen and the fish alive."
 GRE_aegean_wind_banks: "Harnessing the Meltemi"
 GRE_aegean_wind_banks_desc: "Each summer the Meltemi roars down across the Cyclades, one of the most dependable winds in all of Europe. Turbines strung across the islands and the ridgelines of the mainland could pour clean power into the grid and break our dependence on imported oil and coal. The greater prize is the interconnector that would at last tie the islands' diesel generators into the national network."
 GRE_resolution_crisis: "Resolution Crisis"
 GRE_resolution_crisis_desc: "We have been managing the crisis for too long instead of actually solving it. It is time for a proper plan that deals with debt, growth, banking, and reform all at once. It won't be easy, but it is the only way forward. Completing this focus closes the debt crisis for good, so we must first bring our debt under control: interest below 8% and debt-to-GDP under 50%."
 GRE_urban_railways: "Expanding the Athens Metro"
 GRE_urban_railways_desc: "The Athens Metro transformed the capital ahead of the 2004 Games, but whole districts still sit beyond its reach, Thessaloniki has waited decades for a line of its own, and the Proastiakos suburban rail barely scratches its potential. Driving new tunnels, extending the tram to the coast, and wiring the cities together would ease the choking traffic, clear the smog, and lift the daily lives of millions."
 GRE_ionian_solar: "Ionian Solar"
 GRE_ionian_solar_desc: "The Ionian islands get a lot of sunshine. Installing solar farms on Corfu, Lefkada, and Zakinthos would let us take advantage of that and reduce our dependence on imported fossil fuels."
 GRE_tourism_boom: "Live Your Myth in Greece"
 GRE_tourism_boom_desc: "From the beaches of Crete to the caldera of Santorini and the whitewashed lanes of Mykonos, Greece draws tens of millions of visitors every year, and tourism already earns close to a fifth of everything the economy produces. A coordinated push by the National Tourism Organisation on marketing, airport capacity, and island connectivity could turn that seasonal flood into a genuine pillar of national wealth."
 GRE_tourism_boom_event_TT: "§YA record season prompts a debate over where the money should go.§!"
 GRE_mass_tourism: "Sun, Sand, and Package Deals"
 GRE_mass_tourism_desc: "Fill the charter flights out of Manchester and Dusseldorf, line the coasts with all-inclusive resorts, and let the crowds pour in by the million. Volume tourism floods the treasury and keeps a summer wage within reach of every islander, but it drains the aquifers of Mykonos, buries Santorini's cliffs under cruise passengers, and wears thin the patience of those who actually live there."
 GRE_premium_tourism: "Yachts and Boutique Resorts"
 GRE_premium_tourism_desc: "Fewer guests, each paying far more and treading far lighter. Steering toward five-star resorts, cultural and archaeological travel, and the superyacht marinas of the Ionian protects the fragile islands and the Greek brand alike. The headline arrival numbers may climb more slowly, but the money that stays behind runs deeper."
 GRE_diaspora_remittances: "Court the Diaspora"
 GRE_diaspora_remittances_desc: "Millions of Greeks abroad, from Melbourne to Chicago, keep ties to the homeland. Channeling their savings and remittances into the economy turns sentiment into capital."
 GRE_diaspora_remittances_event_TT: "§YThe diaspora responds to the call for investment.§!"
 GRE_reverse_brain_drain: "Reverse the Brain Drain"
 GRE_reverse_brain_drain_desc: "The crisis sent a generation of Greek engineers, doctors, and researchers abroad. Tax breaks, research funding, and real jobs can bring them, and their expertise, back home."
 GRE_eu_cohesion_funds: "EU Cohesion Funds"
 GRE_eu_cohesion_funds_desc: "As one of the Union's lower-income members, Greece is a net recipient of structural and cohesion funding. Drawing down every euro on offer underwrites roads, ports, and regional development."
 GRE_recovery_resilience_facility: "Recovery and Resilience Facility"
 GRE_recovery_resilience_facility_desc: "The post-pandemic Recovery and Resilience Facility channels tens of billions toward green and digital transition. Spent well, it is the largest investment program in modern Greek history."
 GRE_recovery_facility_event_TT: "§YBrussels disburses the first tranche, and Athens must decide how fast to spend it.§!"
 GRE_infrastructure_cofinancing: "Infrastructure Co-Financing"
 GRE_infrastructure_cofinancing_desc: "European money covers most of the bill, Greek money covers the rest. Co-financed motorways, metro lines, and grids get built at a fraction of the national cost."
 GRE_deterrence_posture: "Deterrence Posture"
 GRE_forward_posture_mod: "Aggressive Forward Posture"
 GRE_defense_partner: "Defense Partner"
 GRE_naval_partner: "Naval Partner"
 GRE_strong_naval_partner: "Close Naval Partner"
 GRE_defense_exporter: "Defense Exporter"
 GRE_f35_partner: "F-35 Program Partner"
 GRE_aegean_encroachment: "Aegean Encroachment"
 GRE_refused_debt_call_opinion: "Refused Debt Repayment Demand"
 GRE_debt_forgiven_opinion: "Debt Forgiven"
 GRE_debt_fully_repaid_opinion: "Debt Fully Repaid"
 GRE_forgave_debt_opinion: "Forgave Our Debt"
 GRE_economy_modifier: "Hellenic Economy"
 GRE_debt_crisis_category: "The [GRE.GetAdjective] Debt Crisis"
 GRE_debt_crisis_category_desc: "Despite our economic growth our debt continues to mount to larger and larger amounts, whether from ineffective government spending, maturing bonds, or regular budget shortfalls. We need to cope with our debt before it becomes a crisis, or turn it into a tool for ensuring our continued prosperity into the new millennium.\n\nCurrent GDP-to-Debt Ratio: [?debt_ratio|%Y]\nCurrent §YDebt Held by Creditors§!: $$[?GRE_total_creditor_debt|0]\n"
 GRE_austerity_tension_mission: "Austerity Tensions"
 GRE_austerity_tension_mission_desc: "Spending cuts and tax increases have made people angry. We must bring our unified debt ratio below §Y75%§! to end the tensions. Every time the clock runs out the protests worsen, and if they boil over at their peak, the country slides into a full debt crisis."
 GRE_debt_crisis_mission: "The [GRE.GetAdjective] Debt Crisis"
 GRE_debt_crisis_mission_desc: "Austerity has failed and the markets have lost faith in us. We must work our unified debt ratio below §Y75%§! through spending cuts and by pushing debt onto foreign creditors. Every time the clock runs out the government pays the price, and our failure risks dragging the entire Eurozone down with us."
 GRE_austerity_placate_decision: "Placate the Protestors"
 GRE_austerity_placate_decision_desc: "Government outreach and targeted relief can take the edge off public frustration. Reducing the visible pressure of austerity should help restore Stability and bring tensions back down."
 GRE_slash_public_spending_decision: "Slash Public Spending"
 GRE_slash_public_spending_decision_desc: "Across-the-board cuts to ministries, public payrolls, and pensions. The books will look better, but the people will feel every euro. Reduces our national debt by §Y5%§!."
 GRE_emergency_tax_hikes_decision: "Emergency Tax Hikes"
 GRE_emergency_tax_hikes_decision_desc: "Raise VAT and income taxes to plug the hole in the budget. The revenue is real, and so is the anger at the ruling party. Reduces our national debt by §Y4%§!."
 GRE_privatization_drive_decision: "Privatization Drive"
 GRE_privatization_drive_decision_desc: "Auction off state assets, from ports to utilities, to whoever will pay. A one-time windfall that the unions will not forgive quickly. Reduces our national debt by §Y8%§!."
 GRE_unified_ratio_below_75_tt: "Our §YUnified Debt Ratio§! is lower than §Y75%§! (Current §Y[?GRE_unified_debt_ratio|-1%]§!)"
 GRE_buys_mission_time_tt: "§GAdds 30 days to the active debt mission§!"
 GRE_austerity_mission_active: "\nCurrent austerity tension is §R[gre_austerity_tension]§!"
 GRE_generic_decisions_category: "[GRE.GetNameWithFlag] Political Decisions"
 GRE_generic_decisions_category_desc: "Political decisions available to the Greek government."
 GRE_rename_istanbul_desc: "With Constantinople under Greek control, the government formally restores the city's historic name. The renaming carries deep cultural significance and lifts national morale."
 GRE_archipelago_air_base_rapid_repair: "Air Base Rapid Repair Programme"
 GRE_archipelago_air_base_rapid_repair_desc: "Setting up dedicated repair crews and pre-positioned equipment at island air bases means damage from enemy strikes can be fixed faster, keeping our air power operational."
 GRE_archipelago_anti_air_rapid_repair: "Anti-Air Battery Maintenance Protocols"
 GRE_archipelago_anti_air_rapid_repair_desc: "Mobile maintenance teams at island air defence sites with standardised parts and training would let us restore damaged batteries faster and keep our air defence network intact."
 GRE_archipelago_bunker_repair_protocols: "Island Fortification Repair Corps"
 GRE_archipelago_bunker_repair_protocols_desc: "Specialised engineering units across the archipelago focused on rapid bunker restoration. Damaged fortifications can be brought back to full effectiveness quickly."
 GRE_archipelago_naval_base_repair_protocols: "Naval Base Maintenance Initiative"
 GRE_archipelago_naval_base_repair_protocols_desc: "Pre-positioned repair materials and skilled technicians at island naval facilities means damaged port infrastructure can be fixed faster and maritime operations kept running."
 GRE_archipelago_coastal_obstacle_network: "Coastal Obstacle Network"
 GRE_archipelago_coastal_obstacle_network_desc: "Underwater obstacles, minefields, and barriers across potential landing zones would make it much harder for any enemy naval assault to reach our shores."
 GRE_archipelago_supply_disruption: "Core Territory Supply Denial"
 GRE_archipelago_supply_disruption_desc: "Pre-planned logistics disruption on our island cores would make it harder for any occupying enemy to maintain supply lines or exploit local resources."
 GRE_archipelago_coastal_battery_expansion: "Coastal Battery Expansion Programme"
 GRE_archipelago_coastal_battery_expansion_desc: "Expanding our coastal artillery installations beyond what the terrain normally allows. Island geography shouldn't limit our ability to defend the shoreline."
 GRE_archipelago_island_fortress_expansion: "Island Fortress Expansion Programme"
 GRE_archipelago_island_fortress_expansion_desc: "Funding engineering work to build bunkers beyond what current terrain limits allow. Our islands can support stronger fortifications than the current doctrine assumed."
 GRE_archipelago_attrition_doctrine: "Archipelago Attrition Doctrine"
 GRE_archipelago_attrition_doctrine_desc: "Codifying tactics that use island terrain to bleed any attacking force. Enemy units in the open would face higher attrition and constant harassment from our prepared positions."
 GRE_archipelago_supply_interdiction: "Island Supply Interdiction Operations"
 GRE_archipelago_supply_interdiction_desc: "Training and positioning units to actively deny enemy forces access to local resources. Any enemy operating on our islands would find their supply sources systematically cut off."
 GRE_archipelago_missile_battery_expansion: "Island Missile Defence Expansion"
 GRE_archipelago_missile_battery_expansion_desc: "Additional funding to build missile defence sites beyond the normal terrain limits across the archipelago. More engineering investment means we can get past the usual terrain restrictions."
 GRE_archipelago_air_defense_expansion: "Expanded Air Defence Network"
 GRE_archipelago_air_defense_expansion_desc: "Raising the construction ceiling for anti-air installations above the standard terrain limits. Even smaller islands could get dense air defence coverage."
 GRE_archipelago_decision_active: "An archipelago defence programme is already underway"
 GRE_archipelago_set1_A_chosen: "Air Base Rapid Repair Programme completed"
 GRE_archipelago_set1_B_chosen: "Anti-Air Battery Maintenance Protocols completed"
 GRE_archipelago_set2_A_chosen: "Island Fortification Repair Corps completed"
 GRE_archipelago_set2_B_chosen: "Naval Base Maintenance Initiative completed"
 GRE_archipelago_set3_A_chosen: "Coastal Obstacle Network completed"
 GRE_archipelago_set3_B_chosen: "Core Territory Supply Denial completed"
 GRE_archipelago_set4_A_chosen: "Coastal Battery Expansion Programme completed"
 GRE_archipelago_set4_B_chosen: "Island Fortress Expansion Programme completed"
 GRE_archipelago_set5_A_chosen: "Archipelago Attrition Doctrine completed"
 GRE_archipelago_set5_B_chosen: "Island Supply Interdiction Operations completed"
 GRE_archipelago_set6_A_chosen: "Island Missile Defence Expansion completed"
 GRE_archipelago_set6_B_chosen: "Expanded Air Defence Network completed"
 GRE_lie_about_financial_records_decision: "Adjust Financial Records Favorably"
 GRE_lie_about_financial_records_decision_desc: "Despite our constant economic growth our outdated currency and other economic woes are preventing us from finalizing our economic agreements with the European Union."
 GRE_negotiate_debt_swap_deals_decision: "Negotiate Debt Swap Deals"
 GRE_negotiate_debt_swap_deals_decision_desc: "Open negotiations with a foreign power to restructure our debt through currency swaps. By shifting our obligations to another nation's central bank, we may find more favorable repayment terms."
 GRE_defer_payments_decision: "Defer Focus Payments"
 GRE_defer_payments_decision_desc: "Rather than paying upfront for economic programmes, defer the costs into our national debt. This preserves our treasury at the expense of growing our obligations."
 GRE_do_not_defer_payments_decision: "Resume Direct Payments"
 GRE_do_not_defer_payments_decision_desc: "Stop deferring costs and return to paying for economic programmes directly from the treasury."
 CYP_NCY_diplomatic_category: "Cyprus Reunification Talks"
 GRE_brit_5_TT: "§GGain 5 British Support§!"
 GRE_brit_30_TT: "§GGain 30 British Support§!"
 GRE_unification_TT: "When complete, there will be a monthly conference in which, depending on approval, progress may be made."
 PER_presidential_decisions_only_one_is_available_TT: "Only one of these decisions can be active at a time."
 GRE_homelessness_crisis_category: "The Athenian Homelessness Crisis"
 GRE_homelessness_crisis_category_desc: "In the aftermath of the 1999 Earthquake in Athens thousands of Greek citizens are now homeless. Aid and repairs are currently underway in the city, but we can choose to help the initiative along to complete the repair of the urban and residential districts."
 GRE_reconstruction_efforts_in_athens_decision: "Fund Additional Reconstruction Efforts in Athens"
 GRE_reconstruction_efforts_in_athens_decision_desc: "The earthquake has done serious damage across Athens. Apartment blocks crumbled, infrastructure damaged, and entire neighborhoods reduced to rubble. Initial repairs have started but the relief funds aren't enough. Directing additional funds toward reconstruction would speed up the rebuilding effort."
 GRE_issue_relief_funds_to_victims_decision: "Issue Relief Funds to Earthquake Victims"
 GRE_issue_relief_funds_to_victims_decision_desc: "Beyond the physical destruction, the earthquake has left many families with nothing. Savings wiped out, businesses destroyed, people injured. Issuing direct relief funds to the victims would provide immediate help with food, clothing, temporary housing, and the basics needed to start rebuilding."
 GRE_petition_turkey_for_support_decision: "Petition [TUR.GetName] for Support"
 GRE_petition_turkey_for_support_decision_desc: "Petition [TUR.GetNameWithFlag] for support with our post-Earthquake recovery. Hopefully, they can find it in their hearts to support us in our time of need."
 GRE_cypriot_TT: "§YCyprus§! declares war on §YNorthern Cyprus§!"
 GRE_debt_crisis_experienced_tt: "We have faced the §RDebt Crisis§!"
 GRE_joining_the_euro_interest_rate_tt: "Changes the §Y$EU_join_the_euro_decision$§! Requirements:\n- §YInterest Rate§! Requirement to §Y6.5%§! instead of §Y3.5%§!\n"
 GRE_defer_payments_decision_tt: "Allows us to defer the payment of future actions (ex. decisions, focuses) to our §YNational Debt§! or a §YForeign Creditor§! instead of paying in cache."
 GRE_golden_visa_deals: "The Golden Visas"
 GRE_golden_visa_deals_desc: "The Golden Visa programme offers a five-year residency permit to any investor committing a qualifying sum into [GRE.GetAdjective] real estate or business. High-net-worth buyers from outside the EU have shown strong interest, providing a direct line of foreign capital into the domestic market."
 GRE_targeted_pension_reforms: "Targeted Pension Reforms"
 GRE_targeted_pension_reforms_desc: "The pension system absorbs a disproportionate share of GDP. Targeted reforms that tighten eligibility, reduce early-retirement abuse, and shift supplementary pensions to a funded model will ease the fiscal burden without gutting the safety net entirely."
 GRE_merchant_marine: "The Merchant Marine"
 GRE_merchant_marine_desc: "Greece operates the world's largest merchant fleet under the flags of the Union of Greek Shipowners, one of the most powerful industrial lobbies in Athens. The shipowners and their families control two-fifths of the fleet's tonnage and keep 7-8% of GDP flowing into the national accounts through wages, tax, and port fees. Strengthening their competitive position keeps this dynamo running."
 GRE_tonnage_tax_regime: "Preserve the Tonnage Tax"
 GRE_tonnage_tax_regime_desc: "The shipowner families have long enjoyed a favorable tonnage-tax regime that keeps Greek-flagged vessels profitable and discourages flagging out to foreign registries. Maintaining this regime preserves revenue flowing through Greek ports and dockyards, keeping the Skaramangas, Elefsina, and Neorion yards alive."
 GRE_tax_the_shipowners: "Tax the Shipping Magnates"
 GRE_tax_the_shipowners_desc: "The shipping moguls have long escaped the burden of taxation that falls on ordinary Greeks. Dismantling the tonnage-tax regime and levying the shipowners directly would extract a large one-time windfall for the treasury, though flagging out remains a constant threat."
 GRE_shipbuilding_revival: "Revive Greek Shipyards"
 GRE_shipbuilding_revival_desc: "The yards at Skaramangas, Elefsina, and Neorion once built the merchant fleet that brought wealth to Greece. Restoring their capacity with targeted subsidies and contracts would return dockyard employment and secure a domestic supply of modern hulls."
 GRE_pdo_exports: "Protected Origin Premium Exports"
 GRE_pdo_exports_desc: "Kalamata olives, extra-virgin olive oil, feta cheese, and Assyrtiko wine are world-renowned. Investing in protected designation of origin branding and premium marketing lifts these products out of commodity competition and commands higher prices on international markets."
 GRE_recapitalize_banks: "Recapitalize the Banks"
 GRE_recapitalize_banks_desc: "Greece's four systemic banks accumulated trillions in non-performing loans during the crisis. The Hellenic Financial Stability Fund could inject fresh capital through a forced recapitalization, restoring their ability to lend and stabilizing the financial system at significant fiscal cost."
 GRE_hercules_scheme: "The Hercules Asset Protection Scheme"
 GRE_hercules_scheme_desc: "The HAPS scheme securitizes non-performing loans off the balance sheets of the banks, unfreezing their lending capacity and lowering borrowing costs for businesses and households seeking credit."
 GRE_privatize_banks: "Return Banks to Private Hands"
 GRE_privatize_banks_desc: "Selling the state's stakes in the recapitalized banks to private investors would draw strong corporate demand and yield a major source of tax revenue. The market vote of confidence would also signal Greece's return to normality."
 GRE_state_bank_control: "Keep Banks in State Hands"
 GRE_state_bank_control_desc: "Retaining state ownership of the banks allows us to direct their lending toward domestic construction, industry, and strategic sectors without private shareholder pressure for profit. The political cost of public ownership is offset by control over credit allocation."
 GRE_lower_tax_desc: "Reducing the tax burden on households and small businesses puts money back into the economy and, historically, brings more of it out of the grey market and onto the books."
 GRE_european_communism_desc: "Greece's revolution can light a fire across the continent. Spreading communist ideology beyond our borders keeps the movement alive and puts ideological allies in governments that would otherwise be hostile."
 GRE_plutocracy_desc: "The old ownership class has been swept from the factory floor. With the capitalists gone, production answers to the state. Output rises as workers and managers stop pulling in opposite directions."
 GRE_nationalist_takeover_TT: "The Greek people demand reelections!\n\nEnsure you have enough Political Power saved for this. If you §Rfail§! to elect and form a government, you will §Rneed to hold another extraordinary election§! to empower §Y[Nat_Fascism_L]§!"
 GRE_dev_cyp_desc: "Cyprus has suffered from decades of division and underinvestment. With the island now under Greek sovereignty, we can begin the work of developing its infrastructure, economy, and institutions to the standard of the mainland."
 GRE_decrease_taxes: "Decrease Taxes"
 GRE_decrease_taxes_desc: "The Greek people must not be pressured by high taxation. Furthermore, if we lower taxes, it could lower tax evasion rates, which is a big problem in our country."
 GRE_eastern_neighborhood: "Eastern Neighborhood"
 GRE_eastern_neighborhood_desc: "Greece must define its relationship with its nearest neighbors, Turkey and the divided island of Cyprus. How we engage with both will shape the region for a generation."
 GRE_turkey_rapprochement: "Rapprochement with Turkey"
 GRE_turkey_rapprochement_desc: "Greece and Turkey have more in common than either side admits. A structured dialogue on trade, migration, and the Aegean can reduce tensions and open a path toward stable coexistence."
 GRE_turkey_confrontation: "Confronting Turkish Ambitions"
 GRE_turkey_confrontation_desc: "Turkey's repeated violations of Greek airspace and provocations in the Aegean cannot go unanswered. Greece will take a firm stand and rally its allies to resist further encroachment."
 GRE_aegean_dialogue: "Aegean Dialogue"
 GRE_aegean_dialogue_desc: "A formal channel for dialogue over Aegean rights and boundaries reduces the risk of accidental escalation and lays groundwork for a lasting maritime agreement."
 GRE_migration_cooperation: "Migration Cooperation"
 GRE_migration_cooperation_desc: "Coordinating migration policy with Turkey is essential to managing the flow of refugees across the Aegean. Shared responsibility means fewer crises for both sides."
 GRE_greco_turkish_trade: "Greco-Turkish Trade Agreement"
 GRE_greco_turkish_trade_desc: "Expanding bilateral trade reduces the incentive for political confrontation. Economic interdependence between Greece and Turkey serves the interests of both peoples."
 GRE_nato_pressure_turkey: "NATO Pressure on Turkey"
 GRE_nato_pressure_turkey_desc: "Greece will leverage its position within NATO to hold Turkey accountable for violations of alliance norms. Our allies must recognize that stability in the Eastern Mediterranean requires Turkish restraint."
 GRE_aegean_assertiveness: "Aegean Assertiveness"
 GRE_aegean_assertiveness_desc: "The Greek Navy will increase patrols and exercises in contested waters to assert sovereignty over the Aegean continental shelf and airspace."
 GRE_aegean_deterrence: "Aegean Deterrence"
 GRE_aegean_deterrence_desc: "Investing in coastal defense and rapid-response forces sends a clear signal that Greece is prepared to defend its territory against any incursion."
 GRE_enosis_campaign: "Enosis Campaign"
 GRE_enosis_campaign_desc: "Greece launches a diplomatic and cultural campaign to strengthen ties with the Greek Cypriot community and promote the ideal of eventual reunification with the motherland."
 GRE_cypriot_economic_integration: "Cypriot Economic Integration"
 GRE_cypriot_economic_integration_desc: "Deepening trade and financial links between Greece and the Republic of Cyprus makes reunification economically attractive and reinforces Greek influence on the island."
 GRE_northern_outreach: "Northern Outreach"
 GRE_northern_outreach_desc: "Greece reaches out to Turkish Cypriots in the north, offering economic incentives and cultural exchange to demonstrate that reunification serves their interests as much as anyone's."
 GRE_british_bases_accord: "British Bases Accord"
 GRE_british_bases_accord_desc: "The United Kingdom retains two Sovereign Base Areas on Cyprus. Reaching an accord with London ensures British neutrality (or active support) for any future reunification process."
 GRE_cyprus_gas_exploitation: "Cyprus Gas Exploitation"
 GRE_cyprus_gas_exploitation_desc: "Significant natural gas reserves have been discovered in the waters south of Cyprus. Greece moves to develop these fields jointly, creating shared economic stakes in a unified island."
 GRE_confederation_framework: "Confederation Framework"
 GRE_confederation_framework_desc: "Greece proposes a formal confederation model that preserves community autonomy while uniting the island under a single sovereignty, a framework both communities can accept."
 GRE_cyprus_reunification: "Reunification of Cyprus"
 GRE_cyprus_reunification_desc: "With Cyprus Momentum carrying broad support across both communities, Aegean Tension low enough that Turkey will not intervene, the British Bases Accord secured, and the confederation framework fully detailed, the moment to reunite the island has finally arrived."
 GRE_force_enosis: "Force the Issue"
 GRE_force_enosis_desc: "Negotiation has failed and the island is a powder keg. Rather than wait for a settlement that will never come, Athens presses Enosis to the brink, daring the North to act. If Nicosia's Turkish-Cypriot leadership lashes out first, the Republic of Cyprus will have every right to reunite the island by force."
 GRE_aegean_tension_high_TT: "§BAegean Tension above §H50§!§!"
 GRE_recognize_unified_cyprus: "Recognize the Unified Republic of Cyprus"
 GRE_recognize_unified_cyprus_desc: "Nicosia's forces have overrun the North. The partition that scarred the island for half a century is over. Athens formally recognizes a single, Greek-aligned Republic of Cyprus and helps it integrate the territory."
 GRE_western_alignment: "Western Alignment"
 GRE_western_alignment_desc: "Greece reaffirms its place at the centre of Western diplomacy. As a founding NATO member, an early EU entrant, and the natural anchor of the Eastern Mediterranean, Athens sets out to convert its geographic weight into binding political commitments, beginning a campaign of bilateral and multilateral outreach that will be measured in Western Commitment."
 GRE_franco_hellenic_pact: "Franco-Hellenic Strategic Partnership"
 GRE_franco_hellenic_pact_desc: "Building on the September 2021 strategic partnership signed in Athens, Greece pursues a comprehensive bilateral framework with France covering defense industry, foreign policy alignment, and Eastern Mediterranean security. Paris is the most willing senior partner in Europe; binding it closer is the cornerstone of any credible Western posture."
 GRE_eastmed_trilateral: "Eastern Mediterranean Trilateral"
 GRE_eastmed_trilateral_desc: "Greece, Israel, and Cyprus formalise their long-running trilateral cooperation: joint naval exercises, intelligence sharing, and a coordinated stance on Eastern Mediterranean security. The arrangement turns three friendly capitals into a single strategic block facing the Levantine basin."
 GRE_eu_political_anchor: "EU Founding-Member Anchor"
 GRE_eu_political_anchor_desc: "Greece reaffirms its identity as a founding member of the European project. By taking a leading voice in Brussels, on cohesion, on enlargement, on common foreign policy, Athens converts decades of membership into present-day political weight."
 GRE_strategic_partnership_treaty: "Article-2 Mutual Defence Clause"
 GRE_strategic_partnership_treaty_desc: "Greece pushes the Franco-Hellenic partnership to its conclusion: a binding mutual-defence clause modelled on Article 5, codified in treaty form. France becomes the first European power treaty-bound to defend Greek territory, locking in a permanent shift in the Mediterranean security order."
 GRE_eastmed_gas_forum: "EastMed Gas Forum Member"
 GRE_eastmed_gas_forum_desc: "Greece formalises its role within the EastMed Gas Forum alongside Cyprus, Israel, Egypt, Italy, Jordan, and Palestine. The institutional framework anchors regional energy cooperation, secures preferential trade access for Greek shipping, and gives Athens a permanent seat at the East-Med diplomatic table."
 GRE_3plus1_dialogue: "3+1 Strategic Dialogue"
 GRE_3plus1_dialogue_desc: "Greece, Cyprus, and Israel formalise the 3+1 dialogue with the United States, a State Department-backed format covering energy security, maritime cooperation, and counter-terrorism. The arrangement gives Washington a structured channel into the East-Med trilateral and crowns the regional architecture with American engagement."
 GRE_eu_strategic_compass: "EU Strategic Compass"
 GRE_eu_strategic_compass_desc: "Greece becomes a vocal advocate of the EU Strategic Compass, pushing for European strategic autonomy, deeper PESCO integration, and a European pillar within NATO. Athens aligns itself with Paris and Berlin on continental defence, exchanging quiet membership for an active shaping role."
 GRE_pillar_of_the_west: "Pillar of the West"
 GRE_pillar_of_the_west_desc: "The work of years bears fruit. Greece stands not as the periphery of Western diplomacy but as one of its cornerstones. The depth of the legacy, measured by Western Commitment accumulated through the campaign, determines how firmly Athens is embedded in that structure."
 GRE_regional_diplomacy: "Regional Diplomacy"
 GRE_regional_diplomacy_desc: "Greece is a pillar of the Balkans and must maintain strong relations with all its neighbors. Stability in the region is inseparable from Greece's own security and prosperity."
 GRE_prespa_implementation: "Prespa Agreement Implementation"
 GRE_prespa_implementation_desc: "The Prespa Agreement resolved a decades-long dispute over North Macedonia's name. Greece now fully implements its obligations, normalizing relations and opening the door to expanded trade."
 GRE_albania_minority: "Albanian Minority Rights"
 GRE_albania_minority_desc: "A significant Greek minority lives in southern Albania. Greece pursues a constructive dialogue on minority rights, using the issue as a basis for deeper bilateral engagement rather than confrontation."
 GRE_egypt_maritime: "Egypt Maritime Partnership"
 GRE_egypt_maritime_desc: "Greece and Egypt sign a maritime boundary agreement in the Eastern Mediterranean, creating a legal framework for joint energy development and excluding Turkish claims from the area."
 GRE_italy_mediterranean_axis: "Italy-Mediterranean Axis"
 GRE_italy_mediterranean_axis_desc: "Italy is Greece's largest EU trading partner, with bilateral trade exceeding twelve billion euros annually. A formal partnership expands cooperation in energy, transport, and defense across the central Mediterranean."
 GRE_balkan_energy_corridor: "Balkan Energy Corridor"
 GRE_balkan_energy_corridor_desc: "The Greece-Bulgaria gas interconnector and the Alexandroupolis floating terminal transform Greece into a critical energy transit hub. A new pipeline to North Macedonia extends this network deeper into the Balkans."
 GRE_mediterranean_energy_hub: "Mediterranean Energy Hub"
 GRE_mediterranean_energy_hub_desc: "With the Alexandroupolis FSRU and the Revithoussa terminal operating at capacity, Greece positions itself as Europe's primary LNG gateway, replacing Russian pipeline dependency with seaborne supply from the Eastern Mediterranean and beyond."
 GRE_gulf_strategic_partners: "Gulf Strategic Partners"
 GRE_gulf_strategic_partners_desc: "Greece establishes a Supreme Strategic Cooperation Council with Saudi Arabia and deepens defense and investment ties with the UAE. Gulf capital and military cooperation flow into the Eastern Mediterranean."
 GRE_balkans_eu_advocacy: "Balkans EU Advocacy"
 GRE_balkans_eu_advocacy_desc: "Building on the 2003 Thessaloniki Summit commitment, Greece champions Western Balkans EU accession. As the region's most established EU member, Greece gains soft-power leverage over Serbia, Albania, and North Macedonia."
 GRE_imec_gateway: "IMEC Gateway"
 GRE_imec_gateway_desc: "The India-Middle East-Europe Economic Corridor designates Piraeus as its European terminus. Massive port and logistics investments transform central Greece into a transcontinental trade nexus linking Asia to Europe."
 GRE_se_european_pillar: "Southeastern European Pillar"
 GRE_se_european_pillar_desc: "Greece cements its position as the indispensable hub of southeastern Europe: an energy gateway, a Balkan patron, a Mediterranean trade anchor, and a corridor endpoint linking three continents."
 GRE_eastern_alignment: "Pivot East"
 GRE_eastern_alignment_desc: "After a decade of Troika austerity and Atlanticist tutelage, Athens looks east. Greece will cultivate parallel relationships with Russia, China, Iran, and the Orthodox Balkans, and over time reshape itself into a Mediterranean anchor of the multipolar world."
 GRE_strategic_autonomy: "Strategic Autonomy"
 GRE_strategic_autonomy_desc: "Greece need not choose a single master. A NATO member that still buys Russian gas, courts Gulf and Chinese capital, and mediates between rivals can extract concessions from every side. Athens charts a multi-vector course, beholden to no bloc and useful to all."
 GRE_strategic_autonomy_event_TT: "§YA debate opens over how to wield Greece's non-aligned position.§!"
 GRE_russia_outreach: "Open Channels with Moscow"
 GRE_russia_outreach_desc: "Greece quietly approaches the Kremlin with an offer: long-term natural gas contracts, expanded port access for Russian shipping, and warmer political signals. Moscow's response will set the tone of a new Mediterranean partnership."
 GRE_china_outreach: "Engage Beijing"
 GRE_china_outreach_desc: "Greek envoys travel to Beijing seeking deeper engagement: industrial financing, telecoms, infrastructure. China's acquisition of Piraeus has already proven the model. Now Athens proposes to scale it across the Greek economy."
 GRE_iran_outreach: "Outreach to Tehran"
 GRE_iran_outreach_desc: "Greece, long sympathetic to Iranian sanctions grievances, quietly proposes a barter and energy framework outside SWIFT. The move is provocative in Brussels and Washington, but lucrative if Tehran agrees."
 GRE_orthodox_outreach: "Orthodox Brotherhood"
 GRE_orthodox_outreach_desc: "Athens convenes a summit with Belgrade, Nicosia, and Yerevan, forging a cultural and political alignment of Orthodox Europe. Patriarchate diplomacy becomes statecraft, building a regional bloc that answers to neither Brussels nor Washington."
 GRE_russia_milcoop: "Hellenic-Russian Defense Talks"
 GRE_russia_milcoop_desc: "Following the energy partnership, Athens proposes formal defense cooperation with Moscow: joint exercises, S-300 PMU2 modernization, and intelligence sharing. The political signal to NATO is unmistakable."
 GRE_china_bri_anchor: "Belt and Road Anchor"
 GRE_china_bri_anchor_desc: "Greece offers itself as the European anchor of China's Belt and Road, extending COSCO's footprint, opening new free-trade zones in Attica, and integrating Greek logistics into Chinese supply chains."
 GRE_iran_med_corridor: "Eastern Mediterranean Corridor"
 GRE_iran_med_corridor_desc: "Athens proposes an Iran-to-Greece energy corridor, routing crude and LNG through third-country intermediaries to bypass Western sanctions. If Tehran accepts, Greece becomes Iran's window into Europe."
 GRE_orthodox_security: "Orthodox Security Compact"
 GRE_orthodox_security_desc: "The Orthodox Council formalizes a defense pact: shared training, intelligence cooperation, and standing political consultation. Serbia, Cyprus, and Armenia join Greece in a discreet but unmistakable bloc."
 GRE_brics_membership: "Join BRICS+"
 GRE_brics_membership_desc: "Greece formally accedes to the BRICS+ framework as the first European member. The break with NATO is now complete; in exchange, Athens gains preferential access to the New Development Bank, the Yuan-Ruble settlement system, and a seat at the multipolar table."
 GRE_multipolar_anchor: "Anchor of the Multipolar World"
 GRE_multipolar_anchor_desc: "Greece declares itself an anchor of the new multipolar order. The Atlantic alliance is renounced, the European Union is left, and a Mediterranean republic of three continents (Eurasian, Levantine, African) is born from Athens outward."
 GRE_eastern_outreach: "Eastern Outreach"
 GRE_eastern_outreach_desc: "Athens has begun cultivating partners outside the Atlantic alliance. Diplomatic bandwidth flows east, and trade-policy autonomy widens, but Western capitals are watching closely."
 GRE_eurasian_partner: "Eurasian Partner"
 GRE_eurasian_partner_desc: "Greece is now a recognized Eurasian partner. Capital from Moscow, Beijing, and Tehran underwrites Greek industry, while Western opinion hardens. The path back narrows."
 GRE_brics_anchor: "BRICS Anchor"
 GRE_brics_anchor_desc: "Greece sits at the BRICS+ table. The Atlantic alliance is a memory; the Mediterranean is a multipolar sea. Athens speaks with the authority of a continental hinge."
 GRE_orthodox_defense_pact: "Orthodox Defense Pact"
 GRE_orthodox_defense_pact_desc: "A standing defense compact among Orthodox Europe: joint exercises, shared doctrine, and pooled intelligence with Belgrade, Nicosia, and Yerevan."
 GRE_iran_barter_framework: "INSTEX-Style Barter"
 GRE_iran_barter_framework_desc: "Greek-Iranian trade flows through a barter clearinghouse outside SWIFT, sidestepping sanctions and unlocking Iranian markets for Greek exporters."
 GRE_iran_med_corridor_idea: "Eastern Mediterranean Energy Corridor"
 GRE_iran_med_corridor_idea_desc: "Iranian crude and LNG move into Europe via a Greek-anchored corridor. Refining capacity expands, fuel reserves climb, and Athens becomes a regional energy chokepoint."
 GRE_diplomacy_category: "Greek Diplomacy"
 GRE_host_putin_summit: "Host a Russian Summit"
 GRE_host_putin_summit_desc: "Invite the Russian president to Athens for a high-profile bilateral summit. Trade portfolios are signed, photo opportunities are staged, and Western embassies frown."
 GRE_cosco_pier_expansion: "COSCO Pier Expansion"
 GRE_cosco_pier_expansion_desc: "Co-finance another phase of the COSCO Piraeus expansion. A civilian factory commits to the project for three months; in return, Attica gains a permanent infrastructure slot."
 GRE_instex_iran_barter: "Run the Iran Barter Channel"
 GRE_instex_iran_barter_desc: "Process a tranche of Greek-Iranian trade through the barter clearinghouse, refreshing the framework and rewarding the merchants who keep it alive."
 GRE_orthodox_patriarchate_summit: "Convene the Orthodox Council"
 GRE_orthodox_patriarchate_summit_desc: "Host the Patriarchate Summit in Athens, bringing Serbian, Cypriot, and Armenian leaders together for ecclesiastical and political consultation."
 GRE_retry_russia_outreach: "Re-approach Moscow"
 GRE_retry_russia_outreach_desc: "After the previous rejection, Greek diplomats prepare a revised proposal and reopen channels with the Kremlin."
 GRE_retry_russia_milcoop: "Re-propose Defense Talks"
 GRE_retry_russia_milcoop_desc: "Renew the proposal for Hellenic-Russian defense cooperation with sweetened terms and quieter signaling."
 GRE_retry_china_outreach: "Re-approach Beijing"
 GRE_retry_china_outreach_desc: "Send a new envoy to Beijing carrying revised terms and a fresh round of investment guarantees."
 GRE_retry_china_bri_anchor: "Re-pitch the BRI Anchor Role"
 GRE_retry_china_bri_anchor_desc: "Revise the BRI anchor offer with broader concessions on logistics, ownership, and political alignment."
 GRE_retry_iran_outreach: "Re-engage Tehran"
 GRE_retry_iran_outreach_desc: "After Tehran's initial refusal, Athens reopens back-channel talks through third-country intermediaries."
 GRE_retry_iran_med_corridor: "Re-propose the Med Corridor"
 GRE_retry_iran_med_corridor_desc: "Revise the Eastern Mediterranean Corridor proposal with new routing options that further reduce Iranian exposure to Western sanctions enforcement."
 GRE_retry_orthodox_outreach: "Re-convene the Orthodox Summit"
 GRE_retry_orthodox_outreach_desc: "Mend fences after the failed initial summit and call the Orthodox foreign ministers back to Athens."
 GRE_retry_orthodox_security: "Re-propose the Security Compact"
 GRE_retry_orthodox_security_desc: "Renew the Orthodox security compact with revised commitments on intelligence sharing and exercise rotations."
 greece.530.t: "Greek Energy Proposal"
 greece.530.d: "Athens proposes a comprehensive energy and trade partnership: long-term gas contracts, port concessions for Russian shipping, and a discreet realignment of Greek foreign policy toward Moscow. The Hellenic foreign minister awaits a response."
 greece.530.a: "A welcome opening. Sign."
 greece.530.b: "Athens cannot deliver on its promises. Decline."
 greece.531.t: "Moscow Accepts the Partnership"
 greece.531.d: "The Kremlin accepts the Greek proposal. Trade portfolios are exchanged, an improved bilateral agreement is signed, and Russian gas begins flowing on favorable terms. Athens has its first Eastern partner."
 greece.531.a: "Welcome to the new Hellenic foreign policy."
 greece.532.t: "Moscow Declines"
 greece.532.d: "The Kremlin politely declines the Greek overture. Without firm guarantees of Athens leaving the Atlantic alliance, Moscow has no incentive to take political risks. The setback is real, but the door is not closed."
 greece.532.a: "Regroup and try again."
 greece.533.t: "Greek Defense Cooperation Proposal"
 greece.533.d: "Athens proposes a formal Hellenic-Russian defense framework: joint exercises, S-300 PMU2 modernization support, and intelligence sharing. Moscow weighs the political prize against the diplomatic backlash from NATO."
 greece.533.a: "An historic alignment. Accept."
 greece.533.b: "Greece is still a NATO member. Decline."
 greece.534.t: "Moscow Accepts Defense Talks"
 greece.534.d: "The Russian defense ministry agrees to formal cooperation. Greek officers travel to Moscow for training; Russian engineers arrive at Salamis Naval Base. The land-doctrine bonus is significant, but so is the political cost."
 greece.534.a: "Hellenic-Russian arms cooperation begins."
 greece.535.t: "Moscow Declines Defense Talks"
 greece.535.d: "Moscow declines, citing Greece's continued NATO obligations. Until Athens leaves the Atlantic alliance, or at least signals a credible intention to, there will be no formal defense cooperation."
 greece.535.a: "Note the demand for greater commitment."
 greece.536.t: "Greek Approach to Beijing"
 greece.536.d: "Athens approaches Beijing with a proposal for deepened economic engagement: telecoms, infrastructure financing, and broader BRI integration. The Chinese foreign ministry takes the proposal under review."
 greece.536.a: "A natural fit. Endorse."
 greece.536.b: "The political costs outweigh the benefits. Decline."
 greece.537.t: "Beijing Accepts"
 greece.537.d: "The Chinese leadership endorses the partnership. State capital begins to flow into Greek industrial and telecoms projects, and Greek influence in Beijing's calculations rises measurably."
 greece.537.a: "The Sino-Hellenic partnership deepens."
 greece.538.t: "Beijing Declines"
 greece.538.d: "Beijing demurs: Athens, it argues, cannot offer what is already secured through quieter channels. Greek diplomats return empty-handed but undeterred."
 greece.538.a: "Reassess and try again."
 greece.539.t: "Greek BRI Anchor Proposal"
 greece.539.d: "Athens offers itself as the European anchor of the Belt and Road: extended COSCO concessions, free-trade zones in Attica, and political alignment on Indo-Pacific issues. The price is steep, but so is the prize."
 greece.539.a: "An anchor of historic ambition. Accept."
 greece.539.b: "The terms are not yet acceptable. Decline."
 greece.540.t: "Beijing Endorses the BRI Anchor"
 greece.540.d: "China formally designates Greece as a BRI anchor. Construction crews mobilize; capital floods into Attica; an extra civilian factory rises in the capital region as Chinese investment underwrites Greek industry."
 greece.540.a: "Greece is the European terminus of the Belt and Road."
 greece.541.t: "Beijing Declines the Anchor Role"
 greece.541.d: "Beijing declines the formal anchor designation, judging Greek political volatility too high to commit at this scale. Athens must demonstrate firmer alignment before the offer is renewed."
 greece.541.a: "The terms must be revisited."
 greece.542.t: "Greek Outreach to Tehran"
 greece.542.d: "A Greek envoy in Tehran proposes a barter and trade framework outside SWIFT, designed to circumvent Western sanctions and open Iranian markets to Greek exporters. The Supreme National Security Council debates the offer."
 greece.542.a: "A welcome partner from Europe. Accept."
 greece.542.b: "Athens speaks for the West. Decline."
 greece.543.t: "Tehran Accepts the Framework"
 greece.543.d: "Tehran agrees. The barter clearinghouse is established in Athens, and Greek exporters gain preferential access to Iranian markets. Western capitals are not amused."
 greece.543.a: "The first European entry into the Iranian system."
 greece.544.t: "Tehran Declines"
 greece.544.d: "Tehran declines. Greece, the Iranian foreign minister observes, is still a NATO state, and any framework would be vulnerable to American secondary sanctions the moment it activated."
 greece.544.a: "Demonstrate independence first."
 greece.545.t: "Greek Med Corridor Proposal"
 greece.545.d: "Athens proposes the Eastern Mediterranean Corridor: Iranian crude and LNG routed via third-country intermediaries to Greek terminals, then onward into Europe. The Iranian side weighs the upside against American retaliation."
 greece.545.a: "The corridor is a strategic prize. Accept."
 greece.545.b: "The exposure is too great. Decline."
 greece.546.t: "Tehran Endorses the Corridor"
 greece.546.d: "Tehran endorses the corridor. Iranian crude begins arriving at Greek ports; refining capacity expands across Attica and Boeotia. Greece becomes a Mediterranean energy chokepoint, and Tehran a quiet beneficiary."
 greece.546.a: "The Eastern Mediterranean Energy Corridor is open."
 greece.547.t: "Tehran Declines the Corridor"
 greece.547.d: "Tehran declines, citing American counter-pressure on intermediary states. The corridor is shelved; both capitals will revisit it when conditions permit."
 greece.547.a: "Wait for a better moment."
 greece.548.t: "Athens Convenes the Orthodox Council"
 greece.548.d: "Athens proposes a standing political consultation among the Orthodox states of Europe: Serbia, Cyprus, Armenia, and beyond. Patriarchate diplomacy is offered as cover; statecraft is the real intent."
 greece.548.a: "An overdue brotherhood. Accept."
 greece.548.b: "The risks outweigh the gains. Decline."
 greece.549.t: "Belgrade Endorses the Council"
 greece.549.d: "Belgrade endorses the proposal, and Nicosia follows. The Orthodox Council convenes in Athens with Greek, Serbian, and Cypriot foreign ministers. A discreet but unmistakable bloc has formed."
 greece.549.a: "An Orthodox bloc is born."
 greece.550.t: "Belgrade Declines"
 greece.550.d: "Belgrade declines, citing concerns about provoking Brussels and complicating Serbian EU accession. The Orthodox project is delayed, not dead."
 greece.550.a: "Patience. The moment will come."
 greece.551.t: "Greek Security Compact Proposal"
 greece.551.d: "Athens proposes formalizing the Orthodox bloc into a defense compact: shared training, pooled intelligence, and standing political consultation. Belgrade weighs the prize against Brussels' inevitable reaction."
 greece.551.a: "The compact strengthens us all. Accept."
 greece.551.b: "Belgrade cannot risk it. Decline."
 greece.552.t: "Orthodox Defense Compact Signed"
 greece.552.d: "Belgrade, Nicosia, and Yerevan join Athens in formalizing the Orthodox Defense Pact. Joint exercises begin; intelligence channels open; a discreet European pole has appeared on the map."
 greece.552.a: "An Orthodox security architecture is established."
 greece.553.t: "Belgrade Declines the Compact"
 greece.553.d: "Belgrade declines the formal compact, judging the diplomatic cost too high while EU accession negotiations are active. The Orthodox bloc remains, but informal."
 greece.553.a: "Press on by other means."
 greece.554.t: "Welcome to BRICS+"
 greece.554.d: "The BRICS+ leaders formally welcome Greece as the alliance's first European member. Russian, Chinese, Indian, and Iranian envoys arrive in Athens for the accession ceremony. The Atlantic chapter is closed."
 greece.554.a: "Athens stands at the multipolar table."
 greece.555.t: "Greece Anchors the Multipolar World"
 greece.555.d: "Greece has formally renounced the Atlantic alliance and the European Union, declaring itself an anchor of the new multipolar order. The Mediterranean republic of three continents has been proclaimed from Athens. The world rearranges itself accordingly."
 greece.555.a: "The Hellenic future has begun."
 greece.555.b: "The West has lost its Mediterranean flank."
 greece.555.c: "A new pole has emerged. Note carefully."
 CYP_seek_greek_union: "Seek Union with Greece"
 CYP_seek_greek_union_desc: "The Republic of Cyprus pursues formal diplomatic initiatives to strengthen ties with Greece, building toward an eventual political union."
 CYP_appeal_to_un: "Appeal to the United Nations"
 CYP_appeal_to_un_desc: "Cyprus brings the question of reunification before the United Nations, seeking international legitimacy for a settlement that serves the Greek Cypriot community."
 CYP_economic_incentive_north: "Economic Incentives for the North"
 CYP_economic_incentive_north_desc: "Cyprus extends economic offers to Turkish Cypriot communities in the north, demonstrating that reunification brings tangible benefits for all residents of the island."
 NCY_seek_turkish_union: "Seek Union with Turkey"
 NCY_seek_turkish_union_desc: "Northern Cyprus deepens political and economic ties with Turkey, advancing the prospect of formal unification under Turkish leadership."
 NCY_recognition_campaign: "International Recognition Campaign"
 NCY_recognition_campaign_desc: "Northern Cyprus launches a diplomatic campaign to gain wider international recognition, legitimizing its government in the eyes of the broader community of nations."
 GRE_aegean_defense_posture: "Aegean Defense Posture"
 GRE_aegean_defense_posture_desc: "Heightened readiness and forward-deployed forces keep the Hellenic military at a high state of alert. Every intercept, every patrol, every exercise is a signal that Greek territory will be defended."
 GRE_cypriot_integration_idea: "Cypriot Economic Integration"
 GRE_cypriot_integration_idea_desc: "Deep economic integration with the Republic of Cyprus, including customs union and banking harmonization, strengthens trade ties and generates sustained corporate tax revenue for both economies."
 GRE_north_macedonian_ties: "North Macedonian Ties"
 GRE_north_macedonian_ties_desc: "Normalised relations with Skopje following the Prespa Agreement have opened new diplomatic channels in the Balkans, generating goodwill that translates into political leverage."
 GRE_chinese_investment: "Chinese Infrastructure Investment"
 GRE_chinese_investment_desc: "Chinese state capital is funding infrastructure and industrial construction projects across Greece, accelerating building programmes that the domestic budget cannot cover alone."
 GRE_lng_gateway: "LNG Gateway"
 GRE_lng_gateway_desc: "Greece has positioned itself as Europe's primary liquefied natural gas landing point, supplying pipeline-independent energy to regional partners."
 GRE_balkan_advocate: "Balkan EU Advocate"
 GRE_balkan_advocate_desc: "As the EU's leading champion for Western Balkans accession, Greece exercises growing soft-power influence over its northern neighbours."
 GRE_imec_terminus: "IMEC European Terminus"
 GRE_imec_terminus_desc: "The designation of Piraeus as the European endpoint of the India-Middle East-Europe Economic Corridor brings substantial transit revenues and infrastructure investment."
 GRE_regional_pillar: "Pillar of Southeastern Europe"
 GRE_regional_pillar_desc: "Greece has secured a role as the indispensable hub of the southeastern European neighbourhood, projecting influence across energy, trade, and diplomatic channels."
 GRE_epirus_cultural_ties: "Epirus Cultural Ties"
 GRE_epirus_cultural_ties_desc: "A formal minority-rights framework with Tirana has stabilised the Greek-speaking communities of southern Albania, turning a long-standing irritant into a quiet diplomatic asset."
 GRE_italo_hellenic_axis: "Italo-Hellenic Axis"
 GRE_italo_hellenic_axis_desc: "Coordinated industrial policy and shared dockyard programmes with Rome have pulled Athens and the Italian peninsula into a single Mediterranean economic space."
 GRE_balkan_gas_transit: "Balkan Gas Transit"
 GRE_balkan_gas_transit_desc: "The IGB pipeline expansion routes Caspian and Eastern Mediterranean gas through Greek territory into the wider Balkans, generating sustained transit revenue."
 GRE_gulf_capital_inflow: "Gulf Capital Inflow"
 GRE_gulf_capital_inflow_desc: "Sovereign wealth funds from the Arabian peninsula have moved into Greek industry and logistics, accelerating capital formation across the economy."
 GRE_eez_delimitation: "EEZ Delimitation Accord"
 GRE_eez_delimitation_desc: "A bilateral exclusive economic zone agreement with Cairo gives Greek hulls clear lanes through the Eastern Mediterranean and a legal framework against rival maritime claims."
 greece.500.t: "Death of Stephen Saunders"
 greece.500.d: "British defence attaché Stephen Saunders has been assassinated in Athens by the November 17 terrorist organization. The brazen attack has drawn international condemnation and placed enormous pressure on Greek security services to dismantle the group."
 greece.500.a: "Crack down on domestic terrorism"
 greece.500.b: "Cooperate with international intelligence"
 greece.501.t: "Trial of the Revolutionary Organization"
 greece.501.d: "The captured members of November 17 are standing trial in Athens. After decades of evading justice, the group's leadership faces prosecution for a string of assassinations and bombings. The trial is a landmark moment for Greek counterterrorism."
 greece.501.a: "Deliver harsh sentences"
 greece.501.b: "Use this as an opportunity to reform security services"
 greece.502.t: "War on Terror Protests"
 greece.502.d: "Massive anti-war protests have erupted across Greece in response to the invasion of Iraq. Tens of thousands have taken to the streets of Athens and Thessaloniki, reflecting deep public opposition to the American-led campaign."
 greece.502.a: "Allow peaceful demonstrations"
 greece.502.b: "Restrict protests to maintain order"
 greece.503.t: "Helios Airways Flight 522 Crash"
 greece.503.d: "Helios Airways Flight 522 has crashed near Grammatiko after flying on autopilot as a ghost flight, killing all 121 passengers and crew. The tragedy, caused by a failure to pressurize the cabin, has raised serious questions about aviation safety oversight in Greece."
 greece.503.a: "Launch aviation safety reforms"
 greece.503.b: "Hold a national day of mourning"
 greece.504.t: "Kurdish Protests in Athens"
 greece.504.d: "Members of the Kurdish diaspora in Athens have organized large demonstrations in support of Kurdish rights. The protests have drawn attention from Ankara, which views any support for Kurdish activism abroad with suspicion."
 greece.504.a: "Allow the protests to continue"
 greece.504.b: "Disperse the crowds"
 greece.505.t: "Gaza Crisis Protests"
 greece.505.d: "Pro-Palestinian demonstrations have broken out across Greek cities in response to the escalating crisis in Gaza. Protesters are calling on the government to take a stronger stance against the military operations and to provide humanitarian aid."
 greece.505.a: "Express solidarity with the protesters"
 greece.505.b: "Urge restraint and diplomatic solutions"
 greece.506.t: "2007 Greek Forest Fires"
 greece.506.d: "Devastating wildfires have swept across the Peloponnese and Euboea, killing dozens and destroying entire villages. The fires have exposed critical weaknesses in Greece's disaster response capabilities and sparked public anger at the government's handling of the crisis."
 greece.506.a: "Mobilize emergency resources"
 greece.506.b: "Request international assistance"
 greece.507.t: "Alexandros Grigoropoulos Death"
 greece.507.d: "Fifteen-year-old Alexandros Grigoropoulos has been shot and killed by a police officer in the Exarchia district of Athens. The shooting has triggered the worst riots Greece has seen in decades, with widespread destruction across major cities."
 greece.507.a: "Prosecute the officers responsible"
 greece.507.b: "Deploy riot police to restore order"
 greece.508.t: "2009 Greek Forest Fires"
 greece.508.d: "Another devastating wildfire season has struck Greece, ravaging forests and threatening settlements across Attica and the eastern Peloponnese. Despite lessons from 2007, the country's firefighting infrastructure remains stretched thin."
 greece.508.a: "Invest in fire prevention infrastructure"
 greece.508.b: "Focus relief on affected communities"
 greece.509.t: "Golden Dawn Enters Parliament"
 greece.509.d: "The far-right Golden Dawn party has won parliamentary seats for the first time, capitalizing on public fury over austerity and the economic crisis. Their openly nationalist and violent rhetoric has alarmed democratic institutions across Europe."
 greece.509.a: "Monitor their activities closely"
 greece.509.b: "Ignore them as a fringe movement"
 greece.510.t: "Greek Solution Party Forms"
 greece.510.d: "Television presenter Kyriakos Velopoulos has founded the Greek Solution party, positioning it as a conservative-nationalist alternative. The party appeals to voters disillusioned with both the traditional right and the far-right fringe."
 greece.510.a: "Acknowledge the new political landscape"
 greece.510.b: "Dismiss them as populists"
 greece.511.t: "Death of Pavlos Fyssas"
 greece.511.d: "Anti-fascist rapper Pavlos Fyssas has been stabbed to death by a member of Golden Dawn in Keratsini. The murder has provoked national outrage and intensified calls for the government to take decisive action against the party's violent network."
 greece.511.a: "Crack down on Golden Dawn"
 greece.511.b: "Call for calm and due process"
 greece.512.t: "Trial of Golden Dawn Members"
 greece.512.d: "The leadership of Golden Dawn stands trial in what has become the largest criminal case against a political party in European history. Charges include running a criminal organization, murder, and multiple assaults targeting immigrants and political opponents."
 greece.512.a: "Push for maximum sentences"
 greece.512.b: "Let justice take its course"
 greece.513.t: "Major Aegean Earthquake"
 greece.513.d: "A powerful earthquake has struck the eastern Aegean near Lesbos, causing significant damage and casualties. Turkey has also been affected, opening a rare window for bilateral cooperation on disaster relief between the two neighbors."
 greece.513.a: "Launch a national relief effort"
 greece.513.b: "Cooperate with Turkey on relief"
 greece.514.t: "2018 Attica Wildfires"
 greece.514.d: "Catastrophic wildfires have swept through eastern Attica, killing over a hundred people in the seaside town of Mati. It is the deadliest wildfire disaster in Greek history, exposing systemic failures in emergency planning and civil protection."
 greece.514.a: "Overhaul civil protection systems"
 greece.514.b: "Provide immediate aid to victims"
 greece.515.t: "Another Athenian Earthquake"
 greece.515.d: "An earthquake has struck near Athens, damaging buildings and causing widespread alarm in the capital. While casualties are limited, the event has renewed debate over the seismic resilience of Greece's aging infrastructure."
 greece.515.a: "Strengthen building codes"
 greece.515.b: "Provide emergency relief"
 greece.517.t: "Major Aegean Earthquake"
 greece.517.d: "A powerful earthquake has struck the eastern Aegean near Lesbos, causing significant damage and casualties. Turkey has also been affected, opening a rare window for bilateral cooperation on disaster relief between the two neighbors."
 greece.517.a: "Mobilize relief efforts"
 greece.518.t: "2018 Attica Wildfires"
 greece.518.d: "Catastrophic wildfires have swept through eastern Attica, killing over a hundred people in the seaside town of Mati. It is the deadliest wildfire disaster in Greek history, exposing systemic failures in emergency planning and civil protection."
 greece.518.a: "Begin emergency response"
 greece.519.t: "Another Athenian Earthquake"
 greece.519.d: "An earthquake has struck near Athens, damaging buildings and causing widespread alarm in the capital. While casualties are limited, the event has renewed debate over the seismic resilience of Greece's aging infrastructure."
 greece.519.a: "Coordinate emergency services"
 greece.620.t: "A Question of Union"
 greece.620.d: "Athens has formally invited the Republic of Cyprus to complete the confederation and reunite with the Hellenic state. The decision rests with Nicosia."
 greece.620.a: "Join the Hellenic union"
 greece.620.b: "Remain an independent republic"
 greece.621.t: "The Northern Question"
 greece.621.d: "The Greek proposal extends to the north of the island. Reunification under Athens would dissolve the separate northern administration and place its territory within the Hellenic state."
 greece.621.a: "Accept reunification"
 greece.621.b: "Reject the proposal"
 greece.630.t: "A Plea from Athens"
 greece.630.d: "Greece has asked Turkey to help relieve the housing crisis straining its cities. Cooperation would ease the burden on Athens and mark a rare moment of goodwill between the two neighbors."
 greece.630.a: "Extend support"
 greece.630.b: "Decline to intervene"
 greece.631.t: "Turkish Assistance Arrives"
 greece.631.d: "Turkish aid and construction support have begun flowing into Greece, easing the worst of the housing shortage and softening relations across the Aegean."
 greece.631.a: "A welcome hand"
 greece.632.t: "No Help from Ankara"
 greece.632.d: "Turkey has declined to involve itself in Greece's housing troubles. Athens must manage the crisis alone."
 greece.632.a: "We stand on our own"
 greece.641.t: "A Record Season"
 greece.641.d: "The summer broke every arrival record. Hotels are full, the airports are heaving, and the receipts are pouring in. The question is who benefits from the windfall."
 greece.641.a: "Reinvest in the islands"
 greece.641.b: "Let the operators keep it"
 greece.642.t: "The Diaspora Answers"
 greece.642.d: "The appeal to Greeks abroad has struck a chord. Investment pledges and remittances are flowing in from communities across the world, eager to see the homeland recover."
 greece.642.a: "Launch a sovereign diaspora fund"
 greece.642.b: "Match remittances with tax relief"
 greece.643.t: "Brussels Opens the Taps"
 greece.643.d: "The first tranche of recovery funding has been approved. Tens of billions are on their way, conditional on reforms and on Greece's ability to actually spend the money on time."
 greece.643.a: "Front-load the projects"
 greece.643.b: "Spend it carefully"
 greece.650.t: "The Multi-Vector Doctrine"
 greece.650.d: "Athens has declared that it will deal with East and West alike, on its own terms. The cabinet debates how best to turn this independence into leverage."
 greece.650.a: "Diversify our energy and trade partners"
 greece.650.b: "Position Greece as a regional mediator"
 greece_military.01.t: "Hellenic Defence Systems Formed"
 greece_military.01.d: "Pyrkal and the Hellenic Arms Industry have been merged into a single state controlled enterprise, Hellenic Defence Systems. The consolidation is intended to streamline procurement, standardize production, and rebuild domestic defense industrial capacity under one management structure."
 greece_military.01.a: "A national champion is born"
 greece_military.02.t: "Greek Navy Challenges Our Waters"
 greece_military.02.d: "Greece has completed its sovereign waters strategy and now openly stakes its claim over disputed Aegean and Cretan waters. Their naval expansion is a direct challenge to our position in the Eastern Mediterranean."
 greece_military.02.a: "Expand the Fleet"
 greece_military.02.b: "Lodge a Diplomatic Protest"
 greece.516.t: "Nationalist Movement Gains Traction"
 greece.516.d: "Greek-backed ELAM nationalists have been spreading their influence across our island. Their rhetoric calls for union with Greece and has found a receptive audience among parts of the population. We can either tolerate their presence or crack down at the cost of public unrest."
 greece.516.a: "Let them operate"
 greece.516.b: "Suppress the movement"
 greece_debt.1.t: "The Debt Swap Partner"
 greece_debt.1.desc: "The bills keep arriving and the treasury keeps shrinking. Our finance minister has proposed swapping portions of our euro-denominated debt into foreign currencies through a partner nation's central bank. The new holder would charge interest, but at negotiable rates and on friendlier terms than our current creditors. India, Russia, China, or the ECB could serve as a partner, but each comes with its own political price."
 greece_debt.1.a: "Perhaps the Rupee"
 greece_debt.1.b: "Perhaps the Rouble"
 greece_debt.1.c: "The Yuan might be a good choice"
 greece_debt.1.e: "Stay the course"
 GRE_debt_swap_accept_tt: "§GIf they accept:§! they purchase a share of our debt, becoming a creditor we owe interest to, easing our balance sheet now in exchange for steady payments later."
 GRE_debt_counter_refund_tt: "We decline the counter-offer. The capital the would-be creditor advanced is refunded in full."
 greece_debt.2.a: "We must decline"
 greece_debt.2.b: "We will take on their debt"
 GRE_homelessness_crisis_idea: "The Athenian Homelessness Crisis"
 GRE_homelessness_crisis_idea_desc: "The Athens earthquake left thousands homeless and sleeping in parks. Social services are overwhelmed, and tent cities are spreading across the capital. The longer we wait to act, the worse it gets."
 GRE_the_drachma_idea: "The Drachma"
 GRE_the_drachma_idea_desc: "Operating outside the Eurozone means we manage the drachma on our own. Currency instability and higher borrowing costs drag on the economy, but a weaker drachma keeps Greek exports competitive and lifts earnings on international markets."
 GRE_solving_tax_evasion_idea: "Solving the Tax Loopholes"
 GRE_solving_tax_evasion_idea_desc: "Solving the tax loopholes will allow us to eliminate the gaps, but will require a large number of committees and reevaluation of our national tax code."
 GRE_tax_evasion_idea: "Unrestrained Tax Evasion"
 GRE_tax_evasion_idea_desc: "Tax evasion is deeply entrenched in Greek fiscal life and it drains government revenue. Without the money to fund basic services and reforms, the state is stuck."
 GRE_tax_enforcement_idea: "Reinforced Tax Enforcement"
 GRE_tax_enforcement_idea_desc: "A modernized tax enforcement system with digital tracking and tighter auditing is bringing hidden income into the tax base and improving revenue collection."
 GRE_bonds_issued_idea: "High-Rate Short Term Bonds"
 GRE_bonds_issued_idea_desc: "We have issued short-term bonds at high interest rates. The cash injection is helpful right now, but the high yields will be a burden until the debt matures."
 GRE_pyrkal_merge: "§YPyrkal§! has been merged with §YHellenic Arms Industry§!"
