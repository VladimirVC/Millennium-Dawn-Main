 Proscription_LTTE_as_a_terrorist_organization: "将泰米尔猛虎组织列为恐怖组织"
 Proscription_LTTE_as_a_terrorist_organization_Trade: "将猛虎组织列为恐怖组织（贸易）"
 State_sponsor_of_the_LTTE: "弹药供应商"
 news.91.t: "斯里兰卡内战结束"
 news.91.d: "斯里兰卡政府宣布彻底战胜泰米尔伊拉姆猛虎解放组织。在东北部一系列最后的攻势中，政府军攻占了猛虎组织的最后据点。战争末期，残余的泰米尔武装分子被包围在穆莱蒂武的泻湖和丛林中。由于退路受阻，任何试图经海路逃亡的尝试都被拦截。据报道，长期以来被认为不可触碰的猛虎组织领导层在冲突的最后时刻被击毙。[SRI.GetName]总统在议会发表讲话，宣布国家“已从恐怖主义中解放出来”。目前，斯里兰卡国旗在岛上高高飘扬，无人挑战。"
 news.91.a: "和平……是有代价的。"
 news.92.t: "泰米尔猛虎解放伊拉姆"
 news.92.d: "这场曾经的消耗战已经结束。泰米尔伊拉姆猛虎解放组织取得了胜利。在冲突的最后阶段，斯里兰卡政府在泰米尔伊拉姆土地上的最后堡垒在猛虎的无情进攻下土崩瓦解。补给线断裂，简易机场被焚毁，曾经强大的军队被包围并最终被抛弃。泰米尔伊拉姆猛虎组织从丛林中走出，不再是叛乱分子，而是领导者。用鲜血和牺牲谱写的泰米尔伊拉姆之梦，终于实现了。"
 news.92.a: "有趣"