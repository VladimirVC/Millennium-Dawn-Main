 IP_TITLE: "Ideological Powers"
 IP_communist_category_desc: "[IP_communist_powers]"
 IP_socialist_category_desc: "[IP_socialist_powers]"
 IP_conservative_category_desc: "[IP_conservative_powers]"
 IP_liberal_category_desc: "[IP_liberal_powers]"
