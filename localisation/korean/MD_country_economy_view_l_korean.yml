 STATS_TITLE: "통계"
 GDP_TOTAL: "GDP"
 GDP_TOTAL_DESC: "우리의 §Y국내총생산§!(GDP)은 국가에서 생산된 모든 제품과 서비스의 가치를 측정한 것입니다. 밀레니엄 던은 이 값이 지역 경제 상황을 반영하도록 구매력 평가(PPP)로 조정된 GDP를 사용하므로 국가 간 비교가 더 유용해집니다."
 NUM_GDP_TOTAL: "$$§Y[?ROOT.gdp_total|1]§!×십억"
 NUM_GDP_TOTAL_DESC: "우리의 §YGDP§!는 현재 $§Y[?ROOT.gdp_total|3]§! ×십억입니다.\n\n최근 §Y분기별 GDP 성장률§!: [?last_quarter_gdp_growth_rate|%Y].\n\n도움말: §Y분기별 GDP 성장률§!이 높을수록 긍정적인 경제 이벤트가 발생할 확률이 높아집니다."
 NUM_GDP_TOTAL_DELAYED_DESC: "백분율로 나타낸 산업별 대략적 기여도:\n§P민간 공장§!: [?ROOT.civil_fac_percent|%]\n§O군수 공장§!: [?ROOT.military_factory_total_percent|%]\n§B해군 조선소§!: [?ROOT.naval_factory_total_percent|%]\n§C사무 단지§!: [?ROOT.office_fac_percent|%]\n§G비상업화 농업§!: [?ROOT.agriculture_percent|%]\n§Y상업화 농업 지구§!: [?ROOT.agriculture_district_fac_percent|%]\n§Y마이크로칩 공장§!: [?ROOT.microchip_plant_percent|%]\n§Y첨단 복합재 공장§!: [?ROOT.composite_plant_percent|%]\n§Y합성 정제소§!: [?ROOT.synthetic_refinery_percent|%]\n§G자원 추출§!: [?ROOT.resources_percent|%]\n§Y기반시설§!: [?ROOT.infrastructure_gdp_percent|%]\n§P의료§!: [?ROOT.healthcare_gdp_percent|%]\n"
 GDP_PER_CAPITA: "1인당 GDP"
 GDP_PER_CAPITA_DESC: "이 숫자는 우리의 §Y1인당 GDP§!를 나타냅니다. 이는 국가 내 모든 국민의 1인당 생산량을 의미합니다.\n\n최근 §Y분기별 1인당 GDP 성장률§!: [?last_quarter_gdpc_growth_rate|%Y].\n\n도움말: §Y분기별 1인당 GDP 성장률§!이 높을수록 긍정적인 경제 이벤트가 발생할 확률이 높아지며, 방치할 경우 §R인플레이션§!이 잠재적으로 더 크게 상승할 수 있습니다."
 GDP_PER_CAPITA_DELAYED_DESC: "§Y1인당 GDP§!가 국가에 미치는 현재 영향:\n건설 속도: [?production_speed_buildings_factor_gdp_modifier|%+]\n월간 인구: [?monthly_population_gdp_modifier|%+1]\n연구 속도: [?research_speed_factor_gdp_modifier|%+]\n안정도: [?stability_factor_gdp_modifier|%+]\n총 노동력: [?total_workforce_gdp_c_modifier_var|%+]\n화석 연료 발전소 건설 속도: [?fossil_pp_construction_gdp_c_modifier_var|%+]\n"
 NUM_GDP_PER_CAPITA: "$$§Y[?ROOT.gdp_per_capita|3]§!k"
 NUM_GDP_PER_CAPITA_DESC: "우리의 §Y1인당 GDP§!는 현재 $§Y[?ROOT.gdp_per_capita|3]§! ×천입니다."
 PRODUCTIVITY: "생산성"
 PRODUCTIVITY_DESC: "이 숫자는 우리 국가의 §Y생산성§!을 나타냅니다."
 NUM_PRODUCTIVITY_DELAYED_DESC: "현재 월간 생산성 성장: [?productivity_growth_scaled|3+]\n\n생산성의 효과:\n§Y공장 생산량:§! [?productivity_tax_effect_display|%+1]\n§Y조선소 생산량:§! [?productivity_tax_effect_display|%+1]\n§Y건설 속도:§! [?productivity_tax_effect_display|%+1]\n§Y법인세:§! [?productivity_tax_effect_display|%+1]\n§Y£construction_speed_texticon §Y상업화 농업 지구§! 건설 속도:§! [?agriculture_district_output_var|%+1]"
 NUM_PRODUCTIVITY: "§Y[?ROOT.overall_productivity|3]§!"
 NUM_PRODUCTIVITY_DESC: "§Y생산성§!은 국가 내 산출량을 결정하는 값입니다. 이 값은 각 주의 생산성을 합산하여 국가 인구로 나눈 평균값입니다. §Y생산성§!은 모든 국내총생산(GDP) 출처, 법인세 및 모든 공장의 산출량에 대한 배율로 작용합니다. §Y생산성§!이 §Y세계 평균 생산성§!보다 높으면 경제 성장과 모든 건물의 산출량을 높이는 더 큰 보너스를 받게 되며, 낮으면 이러한 보너스가 페널티로 바뀝니다. 막대는 세계 평균이 이를 넘어설 때까지 1000에서 유지되므로, 보너스를 계속 높이려면 세계 성장 속도에 보조를 맞춰야 합니다. §Y생산성§!은 경제 주기, 기술, 국가 정신의 영향을 받아 매월 수동적으로 증가하거나 감소하며, §Y세계 평균 생산성§!에 기반하여 추가로 조정됩니다. §Y세계 평균 생산성§!보다 낮은 국가는 §Y생산성§!이 더 빠르게 성장하는 반면, 평균보다 높은 국가는 더 느리게 성장합니다.\n\n현재 §Y세계 평균 생산성§!은 §Y[?global.average_world_productivity|3]§!입니다.\n현재 우리의 §Y생산성§!은 §Y[?ROOT.overall_productivity|3]§!입니다.\n"
 INFLATION: "인플레이션"
 INFLATION_DESC: "이 숫자는 우리 국가의 §Y인플레이션§!을 나타냅니다."
 NUM_INFLATION: "§Y[?ROOT.inflation_rate_var|%]§!"
 NUM_INFLATION_DESC: "§Y인플레이션§!은 국가의 구매력이 얼마나 증가하거나 감소하는지를 결정하는 값입니다. 인플레이션이 높아질수록 화폐 가치가 하락하여 국민과 정부의 구매력이 감소합니다. 인플레이션은 최근 4분기의 평균 §Y분기별 1인당 GDP 성장률§!에 평균 §Y세율§!을 곱한 값으로 계산되며, §Y경제 주기§!, §Y화폐 발행§!, §Y정책 금리§! 및 기타 경제 이벤트에 의해 추가로 조정됩니다.\n\n평균 §Y분기별 1인당 GDP 성장률§!이 높을수록, 그리고 §Y1인당 GDP§!가 클수록 인플레이션율이 높아집니다. §Y세율§!이 높으면 인플레이션이 감소하고 낮으면 증가합니다. §Y정책 금리§!가 높으면 인플레이션은 감소하지만 §R부채 이자§!가 증가하며, 낮으면 그 반대가 됩니다.\n\n§Y안정적 성장§! 이상의 §Y경제 주기§!는 상품에 대한 수요 증가와 지출 증가를 모방하여 §Y인플레이션§!을 높이는 반면, §Y안정적 성장§! 미만의 §Y경제 주기§!는 지출 감소와 소비재 수요 감소를 모방하여 §Y인플레이션§!을 낮춥니다.\n\n§Y인플레이션§!율이 마이너스가 되면 §Y디플레이션§!이 발생할 수 있습니다. §Y디플레이션§!은 정부 지출을 줄이는 데 도움이 될 수 있지만, 사람들이 가격이 더 떨어지기를 기다리며 지출을 중단하기 때문에 경제 침체를 유발할 수 있으며, 물가가 너무 많이 또는 너무 빨리 하락하면 시장과 기업이 §R파산§!할 잠재적인 위험이 있습니다."
 NUM_INFLATION_DELAYED_DESC: "§H최근 4분기:§! [?ROOT.year_quarter_inflation_tracker^0|%] · [?ROOT.year_quarter_inflation_tracker^1|%] · [?ROOT.year_quarter_inflation_tracker^2|%] · [?ROOT.year_quarter_inflation_tracker^3|%]\n\n표시된 비율은 평균 연간 인플레이션을 나타내는 §Y4분기 이동 평균§!이며, 모든 경제 효과에 사용되는 수치입니다."
 POPULATION_TAX_RATE: "인구세"
 POPULATION_TAX_RATE_TT: "인구세율에는 대중에게 부과되는 모든 세금이 포함됩니다. 여기에는 소득세, 부가가치세(VAT), 판매세 및 재산세가 포함될 수 있지만 이에 국한되지 않습니다.\n\n§Y인구세로 인한 변동치:§!\n£stability_texticon  안정도: [?stability_factor_from_population_tax|%+]"
 CORPORATE_TAX_RATE: "법인세"
 CORPORATE_TAX_RATE_TT: "법인세율에는 기업에 부과되는 모든 세금이 포함됩니다. 이 수치에는 법인 소득세, 고용주 세금 등이 포함됩니다.\n\n§Y법인세로 인한 변동치:§!\n£consumer_goods_texticon  세금 비용: [?consumer_goods_from_corporate_tax|%Y]\n£receiving_investment_cost_modifier_texticon §Y해외 투자 유치§! 비용 변동치: [?receiving_investment_cost_form_corporate_tax|%-]\n월간 생산성 성장: [?productivity_growth_modifier_from_corporate_tax|+3]\n"
 CB_POLICY_RATE: "정책 금리"
 CB_POLICY_RATE_TT: "§Y중앙은행 정책 금리§!는 중앙은행이 설정하는 기준 금리입니다. 이는 경제 전반에 걸친 차입 비용을 통제합니다.\n\n§Y금리 인상§!은 통화 공급을 긴축시켜 인플레이션을 억제하지만 국채 이자율을 증가시키고 경제 활동을 둔화시킵니다.\n§Y금리 인하§!는 차입과 투자를 자극하지만 인플레이션이 더 자유롭게 상승하도록 허용합니다.\n\n각 조정에는 §Y25§!£pol_power_icon 만큼이 필요하며 §Y60일§!의 재사용 대기시간이 있습니다.\n\n§Y현재 금리:§! [?cb_policy_rate]%\n§Y분기별 인플레이션 억제:§! 분기당 [?cb_policy_rate|+0]% × 0.003\n§Y부채 이자 프리미엄:§! [?cb_policy_rate|+0]% × 0.5pp가 §Y이자율§!에 추가됨"
