 BLR_mzkt_category: "Planta de tractores de ruedas de Minsk"
 BLR_mzkt_category_desc: "La planta de tractores de ruedas de Minsk es una empresa especializada en la producción de vehículos pesados ​​de carretera y todoterreno, vehículos remolcados y chasis especiales con ruedas para los sectores de la construcción, el petróleo y el gas, y la maquinaria industrial. Es una empresa estatal que depende del Comité Estatal Militar-Industrial de la República de Bielorrusia."
