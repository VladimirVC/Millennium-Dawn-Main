 UKR_dshv_create: "Штурмовые войска"
 UKR_dshv_create_desc: "Выделим Воздушно-десантные войска из Сухопутных войск в отдельное подразделение со своим командованием и структурой, тем самым повысив их эффективность."
 UKR_command_create: "Командование Объединенных сил"
 UKR_command_create_desc: "Командование Объединенных сил Вооруженных Сил Украины является органом военного управления Вооруженных Сил Украины, между группировками войск для проведения различных военных операций. Также отвечает за проведение миротворческих миссий за пределами Украины."
 UKR_national_guard: "Возродить Национальную гвардию"
 UKR_national_guard_desc: "Национальная гвардия была расформирована при президенте Кучме, но сейчас ситуация требует ее возрождения. Мы реорганизуем ее из внутренних войск МВД."
 UKR_dissolved_parliament: "Распущенный парламент"
 UKR_dissolved_parliament_desc: "Парламент был распущен, и представительство больше не действует в нации.\n§W------------------§!\nЭтот национальный дух  будет §Rубран§! если мы снова введем выборы."
 UKR_russia_help_battalions: "Российские батальоны поддержки"
 UKR_oup: "Укроборонпром"
 UKR_oup_desc: "Украинскую промышленность нужно возрождать, и быстро. Но для этого мы структурируем все наши предприятия в один концерн."
 civilwar_after: "Гражданская война случилась"
 UKR_win_elections_TT: "Наш §Hблок§! §Gвыиграет§! §Hвыборы§!"
 UKR_lose_elections_TT: "Наш §Hблок§! §Rпроиграет§! §Hвыборы§!"
 UKR_presidential_decisions_only_one_is_available_TT: "Одновременно может быть принято только одно из этих решений."
 UKR_parliament_block_tt: "Этот §Hзакон§! должен быть §Hодобрен§! §HВерховной Радой§!"
 UKR_free_parliament_TT: "§Cсвободные выборы§! будут вновь введены в §Hпарламенте§!"
 UKR_verkhovna_rada: "Верховная Рада"
 UKR_verkhovna_rada_desc: "\n\n\n\n\n\n£UKR_desctext_rada\n\n\n\n\n\n\n\n\n§HВерховная Рада§! [UKR.GetFlag] — это наш национальный парламент, и она решает, какие законы принимаются и отменяются, что означает, что иногда её решения могут противоречить нашим интересам. §HВерховная Рада§! может находиться в одном из трёх состояний в любой момент: §CСвободна§!, что означает, что у нас нет прямого контроля над §HВерховной Радой§!, §CПод влиянием§!, что означает, что у нас есть частичный контроль, и §CМарионетка§!, что означает полный контроль.\n\n§HВерховная Рада§! может отозвать поддержку нашего правительства, если мы отклоним §Hопределённые предложения§!, которые они выдвинули, или если мы изменим §Hполитический курс, который сильно расходится с их позициями§!. Она также может случайно отозвать поддержку просто по своему желанию.\n\nЧем больше поддержки мы имеем, тем лучше, так как это повышает вероятность принятия законов без дополнительных мер. §HВерховная Рада§! будет проводить выборы, и их исход будет зависеть от влияния иностранных государств или нашей собственной внутренней независимости.\n\n§G[?UKR_verkhovna_support]§!/§H450§! мест §HВерховной Рады§! в настоящее время поддерживают наше правительство\n"
 ukraine_nationalist_majority_name: "     §HПро-украинское большинство§!"
 UKR_right_wing_desc_TT: "§HПро-украинское большинство§! в парламенте означает, что парламент стремится к большему дистанцированию как от §Cзапада§!, так и от §GРоссии§!. Они стремятся к более независимой и нейтральной §HУкраине§! в мировых делах и в целом выступают против выбора стороны в любом конфликте."
 ukraine_eastern_majority_name: "     §GПророссийское большинство§!"
 UKR_left_wing_desc_TT: "§GПро-российский§! блок в парламенте в целом стремится к укреплению связей с §GРоссийским§! правительством, желая дистанцироваться от §CЗападных§! держав. Радикальность внутри этого блока различается: одни хотят сохранить независимую §HУкраину§! с §Gпро-российскими§! связями, а другие стремятся к более тесной интеграции §Hукраинского§! и §Gроссийского§! обществ."
 ukraine_western_majority_name: "§BПро-западное большинство§!"
 UKR_liberal_TT: "§BПро-западный§! блок в парламенте представляет партии и отдельных лиц, которые хотят, чтобы §HУкраина§! отказалась от своих про-российских политик и установила более тесные связи с §CЗападными§! державами. Цели тех, кто ориентируется на §CЗапад§!, сильно различаются: одни стремятся лишь к экономическим и культурным связям, а другие хотят вступить в §BНАТО§! и защитить §HУкраину§! от §GРоссийского§! влияния."
 ukraine_dissolved_majority_name: "§RВерховная Рада распущена§!"
 UKR_verkhovna_dissolved_tt: "Парламент распущен, и зал сидит пустой, без представителей."
 ukraine_free_verkhovna: "§CСтатус Рады: Свободна§!"
 UKR_verkhovna_free_tt: "Парламент свободен от влияния президента, дискуссии и дебаты проходят органично, без вмешательства других правительственных органов."
 ukraine_influenced_verkhovna: "§pСтатус Рады: Под влиянием§!"
 UKR_verkhovna_influenced_tt: "Правительство было реформировано таким образом, что парламент стал легко эксплуатируемым, а правительство президентов может легко подталкивать дискуссию, когда парламент находится на сессии."
 ukraine_puppeted_verkhovna: "§OСтатус Рады: Марионетка§!"
 UKR_verkhovna_puppetted_tt: "Парламент - это всего лишь еще один инструмент президента и его кабинета, чтобы обмануть народ, создав у него ложное ощущение представительства."
