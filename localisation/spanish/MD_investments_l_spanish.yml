 expand_local_building_capacity_click_tt: "Cada 120 días podemos ganar §G1§! §YEspacio para edificio§! en §Y[THIS.GetName]§!. ¡Podemos ampliar los §Yespacios de construcción§! en un estado dado hasta §Y5§!."
