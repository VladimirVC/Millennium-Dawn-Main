l_spanish:
 RULE_ZOMBIE_DIFFICULTY: "Dificultad del Modo Zombi"
 RULE_ZOMBIE_DIFFICULTY_NORMAL: "Normal"
 RULE_ZOMBIE_DIFFICULTY_NORMAL_DESC: "Los zombis tienen 4 millones de efectivos al inicio de la partida."
 RULE_ZOMBIE_DIFFICULTY_HARD: "Difícil"
 RULE_ZOMBIE_DIFFICULTY_HARD_DESC: "Los zombis tienen 9 millones de efectivos al inicio de la partida."
 RULE_ZOMBIE_DIFFICULTY_EXTREME: "Extremo"
 RULE_ZOMBIE_DIFFICULTY_EXTREME_DESC: "Los zombis tienen 13.5 millones de efectivos al inicio de la partida."
 RULE_ZOMBIE_DIFFICULTY_INSANE: "Locura"
 RULE_ZOMBIE_DIFFICULTY_INSANE_DESC: "Los zombis tienen 37 millones de efectivos y bonificaciones de ataque y defensa al inicio de la partida."
 RULE_ZOMBIE_GAME_MODE: "Habilitar Modo de Juego Zombi"
 RULE_ZOMBIE_GAME_MODE_NO_DESC: "El modo de juego Zombi no se habilitará."
 RULE_ZOMBIE_GAME_MODE_YES_DESC: "El modo de juego Zombi se habilitará. Todo el resto del contenido de Millennium Dawn seguirá existiendo, tenlo en cuenta. Si quieres jugar como los Zombis, empieza como India."
 zombie: "Virus Zombi"
 zombie_desc: "El virus convierte a humanos inofensivos en monstruos."
 zombie_0: "Virus Zombi"
 zombie_0_desc: "El virus convierte a humanos inofensivos en monstruos."
 Zombie: "Zombis"
 Zombie_desc: "El único propósito de un zombi es comer humanos."
 better_instincts: "Better Instincts"
 better_instincts_desc: "The zombies have evolved more efficient killing methods."
 shock_and_zombie_awe: "Mass Panic"
 shock_and_zombie_awe_desc: "The panic is setting in amongst the populace. No one could have been prepared for the zombies and how quickly they overwhelmed military positions. Desperate defenses crumble as confidence in survival erodes."
 zombie.1.t: "El Virus se Propaga a Inglaterra"
 zombie.1.d: "El Canal no es rival para la plaga implacable. Refugiados infectados llegan a las orillas de los acantilados blancos de Dover, y las bulliciosas calles de Londres caen en un silencio espeluznante mientras el virus desgarra el corazón del Imperio. La isla fortaleza de Gran Bretaña se convierte en una prisión mientras los muertos comienzan a caminar."
 zombie.1.a: "Acknowledge the Outbreak"
 zombie.2.t: "El Virus se Propaga a Irlanda"
 zombie.2.d: "El mar de Irlanda no es una barrera para la plaga de los no muertos. Los barcos pesqueros regresan a puerto cargando más que su pesca, y los pueblos costeros quedan en silencio uno por uno. La infección se extiende tierra adentro desde Dublín y Cork, consumiendo la Isla Esmeralda en una ola de cadáveres tambaleantes."
 zombie.2.a: "Acknowledge the Outbreak"
 zombie.3.t: "El Virus se Propaga a Estados Unidos"
 zombie.3.d: "A pesar de las medidas de cuarentena desesperadas, refugiados infectados huyendo de Europa han traído la plaga a través del Atlántico. Las principales ciudades portuarias de la Costa Este reportan brotes, y la infección se extiende hacia el oeste con una velocidad aterradora. El sueño americano se convierte en una pesadilla de muertos vivientes."
 zombie.3.a: "Acknowledge the Outbreak"
 zombie.4.t: "El Virus se Propaga a Japón"
 zombie.4.d: "La Tierra del Sol Naciente se enfrenta ahora a un ejército que no conoce el honor ni la misericordia. Los informes inundan desde Tokio, Osaka y otros centros de población mientras las ciudades densamente pobladas se convierten en trampas mortales. Tanto los templos antiguos como los rascacielos modernos caen ante la marea implacable de los infectados."
 zombie.4.a: "Acknowledge the Outbreak"
 zombie.5.t: "El Virus se Propaga a Australia"
 zombie.5.d: "El vasto océano solo proporciona un respiro temporal. Barcos de carga con tripulantes infectados llegan a Sídney y Melbourne, y el brote arrasa el continente. Incluso el duro interior ofrece poco refugio contra la plaga que se extiende, mientras el último bastión insular de la humanidad comienza a caer."
 zombie.5.a: "Acknowledge the Outbreak"
 zombie.6.t: "El Virus se Propaga a Nueva Zelanda"
 zombie.6.d: "Las islas remotas que sirvieron de inspiración para la Tierra Media ahora enfrentan su propio apocalipsis. La infección llega por aire y mar, extendiéndose por Wellington y Auckland. El aislamiento de Nueva Zelanda, que una vez fue su mayor defensa, ahora significa que no queda lugar a donde huir."
 zombie.6.a: "Acknowledge the Outbreak"
 zombie.7.t: "El Virus se Propaga a Filipinas"
 zombie.7.d: "La infección barre el archipiélago filipino como una tormenta tropical. Supervivientes saltando de isla en isla llevan la plaga desde Luzón a Mindanao, y las miles de islas que una vez proporcionaron barreras naturales ahora se convierten en bolsas aisladas de horror sin esperanza de escape."
 zombie.7.a: "Acknowledge the Outbreak"
 zombie.8.t: "La Horda Zombi"
 zombie.8.d: "The dead walk the Earth. The Zombie Horde has erupted across the Indian subcontinent and is rapidly consuming our population through infection and direct predation. Experts have named the conflict \"The Outbreak\", but the war for human survival has only begun. Already, desperate nations are closing their borders."
 zombie.8.a: "Mobilize Against the Horde"
 zombie.8.b: "Accept Humanity's Fate"
 zombie.9.t: "[FROM.GetName] Solicita Ayuda Contra los Zombis"
 zombie.9.d: "[FROM.GetName] has requested assistance and is trying to enlist every major nation to stop the Outbreak. Will we answer the call, or prioritize our own survival?"
 zombie.9.a: "Join the Coalition"
 zombie.9.b: "Prioritize Our Survival"
 RULE_ZOMBIE_JOINING_FACTION_GAME_MODE: "Unión a la facción de la Coalición Anti-Zombi"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL: "Comportamiento de facción por defecto"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL_DESC: "El comportamiento de la facción es el predeterminado para el modo de juego."
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS: "Sin Potencias"
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS_DESC: "Ninguna potencia se unirá a la Coalición Anti-Zombi."
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS: "Todas las Potencias se unen a la Coalición"
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS_DESC: "Todas las potencias se unen a la Coalición Anti-Zombi."
 zombie.10.t: "¡Brote!"
 zombie.10.d: "The Zombie virus has spread to our lands and is now spreading throughout [?var:random_outbreak_state.GetName]. The severity of the outbreak remains unknown."
 zombie.10.a: "Mobilize the Troops"
 zombie.11.t: "Brote en [FROM.GetName]"
 zombie.11.d: "An outbreak has erupted in [FROM.GetName] and continues to worsen rapidly. The Zombie virus spreads with terrifying speed, and the situation may represent the beginning of the end."
 zombie.11.a: "Monitor the Situation"
 zombie.11.b: "Prepare for the Worst"
 RULE_ZOMBIE_SPAWN_LOCATION: "Ubicación de aparición de zombis"
 RULE_ZOMBIE_SPAWN_INDIA: "India (Predeterminado)"
 RULE_ZOMBIE_SPAWN_INDIA_DESC: "La horda zombi aparece en India como de costumbre."
 RULE_ZOMBIE_SPAWN_AFRICA: "África Central"
 RULE_ZOMBIE_SPAWN_AFRICA_DESC: "La horda zombi aparece en África Central (región del Congo), abriendo un nuevo frente que amenaza a Europa y Oriente Medio desde antes."
 RULE_ZOMBIE_SPAWN_EAST_ASIA: "Asia oriental"
 RULE_ZOMBIE_SPAWN_EAST_ASIA_DESC: "La horda zombi aparece en la costa china, amenazando de inmediato el este de Asia, Japón y el Pacífico."
 RULE_ZOMBIE_SPAWN_MULTIPLE: "Múltiples ubicaciones"
 RULE_ZOMBIE_SPAWN_MULTIPLE_DESC: "La horda zombi aparece simultáneamente en India, África Central y Asia Oriental, con fuerzas iniciales más pequeñas en cada lugar."
 RULE_ZOMBIE_COALITION_ENABLED: "Facción de la Coalición Anti-zombis"
 RULE_ZOMBIE_COALITION_ENABLED_YES: "Habilitado (predeterminado)"
 RULE_ZOMBIE_COALITION_ENABLED_YES_DESC: "La Coalición Anti-zombis se forma de manera habitual. Se invitará a las principales potencias a unirse a la lucha contra la Horda Zombi."
 RULE_ZOMBIE_COALITION_ENABLED_NO: "Desactivado"
 RULE_ZOMBIE_COALITION_ENABLED_NO_DESC: "La Coalición Anti-zombis no se formará. Las naciones deberán sobrevivir al brote por sí solas, sin una coalición organizada."
 RULE_ZOMBIE_COALITION_DELAY: "Retraso en la aparición de zombis"
 RULE_ZOMBIE_COALITION_DELAY_NONE: "Sin demora (predeterminado)"
 RULE_ZOMBIE_COALITION_DELAY_NONE_DESC: "La horda de zombis aparece inmediatamente al comienzo del juego."
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR: "1 año"
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR_DESC: "La horda zombi aparece tras una cuenta atrás de un año, lo que da tiempo a las naciones para prepararse antes de que comience el brote."
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS: "2 años"
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS_DESC: "La horda zombi aparece tras una cuenta atrás de dos años, lo que da a las naciones tiempo suficiente para fortalecer sus economías y sus fuerzas armadas."
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS: "3 años"
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS_DESC: "La horda zombi aparece tras una cuenta atrás de tres años, lo que da a las naciones un amplio tiempo de preparación antes de que comience el brote."
 zombie_runner: "Cepa de corredor"
 zombie_runner_desc: "Una mutación más rápida y agresiva del virus zombi. Los corredores se mueven en enjambres y abruman las defensas gracias a su velocidad y volumen."
 zombie_runner_0: "Cepa de corredor"
 zombie_runner_0_desc: "Una mutación más rápida y agresiva del virus zombi. Los corredores se mueven en enjambres y abruman las defensas gracias a su velocidad y volumen."
 zombie_brute: "Estirpe Bruta"
 zombie_brute_desc: "Una cepa altamente mutada que produce zombis más grandes y resistentes. Los Brutos absorben un castigo tremendo y atraviesan las líneas defensivas."
 zombie_brute_0: "Estirpe Bruta"
 zombie_brute_0_desc: "Una cepa altamente mutada que produce zombis más grandes y resistentes. Los Brutos absorben un castigo tremendo y atraviesan las líneas defensivas."
 zombie.12.t: "El virus se propaga a Nigeria"
 zombie.12.d: "La peste se ha extendido por todo el continente. Las ciudades portuarias del Golfo de Guinea reportan numerosas víctimas mortales a medida que los infectados avanzan tierra adentro desde la costa. La enorme población de Nigeria y sus densos centros urbanos la convierten en un terreno fértil para la propagación del horror; África Occidental quizás nunca vuelva a ser la misma."
 zombie.12.a: "Acknowledge the Threat"
 zombie.13.t: "El virus se propaga a Brasil"
 zombie.13.d: "La Amazonía no supone ninguna barrera. La infección surge simultáneamente en São Paulo y Río de Janeiro, propagándose a una velocidad alarmante por las ciudades más grandes de Sudamérica. Millones de civiles aterrorizados colapsan las carreteras que se dirigen al interior del país, portando el virus sin saberlo."
 zombie.13.a: "Acknowledge the Threat"
 zombie.14.t: "El virus se propaga a Turquía"
 zombie.14.d: "Situada entre dos continentes, Turquía se convierte en el puente entre la infección oriental y Europa. Se desatan brotes en Estambul y Ankara mientras las autoridades se esfuerzan por contener lo que rápidamente se está volviendo incontrolable. El Bósforo, otrora símbolo de conexión, ahora solo trae muerte."
 zombie.14.a: "Acknowledge the Threat"
 zombie.15.t: "La Horda evoluciona"
 zombie.15.d: "El virus está mutando. Los exploradores informan de una nueva raza de infectados entre nuestras filas: variantes más rápidas y salvajes que se mueven en manada, y ejemplares más grandes y resistentes que resisten los disparos de armas ligeras. La horda se vuelve más peligrosa día a día."
 zombie.15.a: "Acknowledge the Evolution"
 ZOM_cure_developed: "Prototipo de cura para zombis"
 ZOM_cure_developed_desc: "Nuestros científicos han desarrollado una cura experimental para el virus zombi. Distribuida a través de las cadenas de suministro de la coalición, la vacuna otorga a todas las fuerzas que luchan contra los no muertos una clara ventaja en combate."
 ZOM_research_cure: "Desarrollar una cura"
 ZOM_research_cure_desc: "La mayor amenaza que la humanidad haya enfrentado jamás exige nuestro mayor esfuerzo científico. Al aunar nuestros recursos y conocimientos, podríamos desarrollar una cura o vacuna que cambie el rumbo de esta guerra. Una vez completada la misión, todas las naciones que luchen contra la Horda Zombi recibirán una bonificación de combate."
 ZOM_establish_safe_zones: "Establecer zonas seguras"
 ZOM_establish_safe_zones_desc: "Designar y fortificar zonas seguras para civiles con el fin de proteger a los no combatientes y mantener el orden público. Los corredores de evacuación organizados y los refugios reforzados permitirán ganar tiempo y estabilizar la situación en el frente interno."
 ZOM_develop_a_cure: "Desarrollar una cura"
 ZOM_develop_a_cure_desc: "Financia y completa la decisión de Desarrollar una cura. Si lo consigues, todas las naciones que luchan contra la Horda Zombi recibirán una bonificación de combate contra los muertos vivientes."
 ZOM_protect_civilian_population: "Proteger a la población civil"
 ZOM_protect_civilian_population_desc: "Mantener una estabilidad superior al 60% para garantizar la seguridad de la población civil y la cohesión social."
 ZOM_global_mobilization: "Movilización global"
 ZOM_global_mobilization_desc: "Ampliar la Coalición Anti-zombis a al menos 8 naciones miembros."
 ZOM_defeat_the_zombie_horde: "Derrota a la horda zombi"
 ZOM_defeat_the_zombie_horde_desc: "Elimina la horda zombi y acaba con la amenaza para la humanidad."
 the_horde_spreads: "La Horda se extiende"
 ZOM_apocalypse_countdown_1yr: "Se acerca el brote"
 ZOM_apocalypse_countdown_1yr_desc: "En todo el mundo están surgiendo informes sobre un misterioso patógeno. Las agencias de inteligencia estiman que pasará un año antes de que la situación se vuelva incontrolable."
 ZOM_apocalypse_countdown_2yr: "Se acerca el brote"
 ZOM_apocalypse_countdown_2yr_desc: "Informes alarmantes procedentes de regiones remotas describen un patógeno sin precedentes. Los expertos creen que tenemos dos años para prepararnos antes de que alcance una masa crítica."
 ZOM_apocalypse_countdown_3yr: "Se acerca el brote"
 ZOM_apocalypse_countdown_3yr_desc: "Se han reportado incidentes aislados de violencia inexplicable y reanimación. Los científicos calculan que transcurren tres años antes de que el virus mute a su forma final e imparable."
 zombie_capitulation.1.t: "Las cataratas del dragón rojo"
 zombie_capitulation.1.d: "La nación más poblada del planeta ha sido arrasada. Los vastos ejércitos de China, su Gran Muralla, su población de mil millones de personas: nada de eso importó. Pekín cayó en días, Shanghái en horas. La enorme densidad de las ciudades chinas las convirtió en mataderos, y ahora más de mil millones de cadáveres marchan bajo la bandera de la Horda. Si China no pudo resistir, ¿Qué esperanza nos queda al resto?"
 zombie_capitulation.1.a: "Accept the Loss"
 zombie_capitulation.1.b: "Prepare for the Worst"
 zombie_capitulation.2.t: "Russia Falls"
 zombie_capitulation.2.d: "El país más grande del planeta ha sucumbido a la plaga de los muertos vivientes. La interminable extensión de tundra helada y densos bosques de Rusia, que en su día se consideró una fortaleza natural contra la Horda, resultó inútil contra un enemigo que no siente frío, no se cansa y no se detiene. Las defensas de Moscú se derrumbaron y el Kremlin permanece en silencio. La Horda ahora controla un territorio que se extiende desde Europa hasta el Pacífico."
 zombie_capitulation.2.a: "Accept the Loss"
 zombie_capitulation.2.b: "Prepare for the Worst"
 zombie_capitulation.3.t: "The United States Falls"
 zombie_capitulation.3.d: "The last superpower has fallen. The United States, with all its military might, its nuclear arsenal, and its oceans of separation, could not stop the tide. The Eastern Seaboard was overrun first, then the heartland, and finally the holdouts in the Rockies went silent. The Stars and Stripes no longer flies over Washington. For many, this marks the true end of human civilization as it was known."
 zombie_capitulation.3.a: "Accept the Loss"
 zombie_capitulation.3.b: "Prepare for the Worst"
 zombie_countdown_decision_category: "Cuenta regresiva para el apocalipsis zombie"
 zombie_countdown_decision_category_desc: ""
 zombie_coalition_decision_category: "The Horde Decisions"
 zombie_coalition_decision_category_desc: ""
 zombie.8.d.africa: "The dead walk the Earth. The Zombie Horde has erupted in Central Africa and is rapidly consuming our population through infection and direct predation. Experts have named the conflict \"The Outbreak\", but the war for human survival has only begun. Already, desperate nations are closing their borders."
 zombie.8.d.east_asia: "The dead walk the Earth. The Zombie Horde has emerged on the Korean Peninsula and is rapidly consuming our population through infection and direct predation. Experts have named the conflict \"The Outbreak\", but the war for human survival has only begun. Already, desperate nations are closing their borders."
 zombie.8.d.multiple: "The dead walk the Earth. The Zombie Horde has erupted simultaneously across three continents — striking India, Central Africa, and the Korean Peninsula at once — rapidly consuming our population through infection and direct predation. Experts have named the conflict \"The Outbreak\", but the war for human survival has only begun. Already, desperate nations are closing their borders."
 zombie_capitulation.4.t: "The Outbreak Ends"
 zombie_capitulation.4.d: "Against all expectations, humanity has prevailed. The Zombie Horde has been broken — its territories liberated, its swarms destroyed, the last of the infected put to rest. Cities scarred by the apocalypse begin the long work of rebuilding. The world has changed forever, but it endures."
 zombie_capitulation.4.a: "Humanity Endures"