l_russian:
 RULE_ZOMBIE_DIFFICULTY: "Сложность режима игры Зомби"
 RULE_ZOMBIE_DIFFICULTY_NORMAL: "Нормально"
 RULE_ZOMBIE_DIFFICULTY_NORMAL_DESC: "В начале игры у зомби 4 миллиона особей."
 RULE_ZOMBIE_DIFFICULTY_HARD: "Сложно"
 RULE_ZOMBIE_DIFFICULTY_HARD_DESC: "В начале игры у зомби 9 миллионов особей."
 RULE_ZOMBIE_DIFFICULTY_EXTREME: "Экстремально"
 RULE_ZOMBIE_DIFFICULTY_EXTREME_DESC: "В начале игры у зомби 13,5 миллионов особей."
 RULE_ZOMBIE_DIFFICULTY_INSANE: "Безумно"
 RULE_ZOMBIE_DIFFICULTY_INSANE_DESC: "В начале игры у зомби есть 37 миллионов зомби, а также бонусные атака и защита."
 RULE_ZOMBIE_GAME_MODE: "Включить режим игры с Зомби"
 RULE_ZOMBIE_GAME_MODE_NO_DESC: "Игровой режим «Зомби» будет отключен."
 RULE_ZOMBIE_GAME_MODE_YES_DESC: "Игра «Зомби» будет доступна. Весь остальной контент Millennium Dawn останется, так что имейте это в виду. Если вы хотите играть за зомби, начните с Индии."
 zombie: "Зомби Вирус"
 zombie_desc: "Вирус превращает безобидных людей в монстров."
 zombie_0: "Зомби Вирус"
 zombie_0_desc: "Вирус превращает безобидных людей в монстров."
 Zombie: "Зомби"
 Zombie_desc: "Единственная цель зомби — поедать людей."
 better_instincts: "Лучшие инстинкты"
 better_instincts_desc: "Зомби научились более эффективным способам убийства."
 shock_and_zombie_awe: "Массовая паника"
 shock_and_zombie_awe_desc: "В народе нарастает паника. Никто не был готов к нашествию зомби и к тому, как быстро они захватят военные позиции. Отчаянная оборона рушится по мере того, как угасает вера в выживание."
 zombie.1.t: "Вирус распространяется в Англии"
 zombie.1.d: "Ла-Манш не может противостоять безжалостной чуме. Заражённых беженцев выбрасывает на берег у белых скал Дувра, а на оживлённых улицах Лондона воцаряется зловещая тишина, пока вирус распространяется по сердцу империи. Британская островная крепость превращается в тюрьму, когда мертвецы начинают ходить."
 zombie.1.a: "Признайте вспышку"
 zombie.2.t: "Вирус распространяется в Ирландии"
 zombie.2.d: "Ирландское море не стало преградой для нашествия нежити. Рыболовные суда возвращаются в порт не только с уловом, и прибрежные города один за другим погружаются в тишину. Инфекция распространяется вглубь острова из Дублина и Корка, захлестывая Изумрудный остров волной шаркающих трупов."
 zombie.2.a: "Признайте вспышку"
 zombie.3.t: "Вирус распространяется в Соединённых Штатах"
 zombie.3.d: "Несмотря на отчаянные карантинные меры, заражённые беженцы, покидающие Европу, привезли чуму через Атлантику. Крупные портовые города на Восточном побережье сообщают о вспышках заболевания, и инфекция распространяется на запад с ужасающей скоростью. Американская мечта превращается в кошмар с ходячими мертвецами."
 zombie.3.a: "Признайте вспышку"
 zombie.4.t: "Вирус распространяется в Японии"
 zombie.4.d: "Страна восходящего солнца столкнулась с армией, которая не знает ни чести, ни милосердия. Из Токио, Осаки и других густонаселённых городов поступают сообщения о том, что эти густонаселённые города превращаются в смертельные ловушки. Древние храмы и современные небоскрёбы одинаково страдают от неумолимого потока заражённых."
 zombie.4.a: "Признайте вспышку"
 zombie.5.t: "Вирус распространяется в Австралии"
 zombie.5.d: "Огромный океан даёт лишь временное облегчение. Грузовые суда с заражёнными членами экипажа прибывают в Сидней и Мельбурн, и эпидемия распространяется по континенту. Даже суровая австралийская глубинка не может служить убежищем от распространяющейся чумы, и последний оплот человечества на островах начинает рушиться."
 zombie.5.a: "Признайте вспышку"
 zombie.6.t: "Вирус распространяется в Новой Зеландии"
 zombie.6.d: "Отдалённые острова, послужившие источником вдохновения для «Властелина колец», теперь столкнулись с собственным апокалипсисом. Инфекция распространяется по воздуху и морю, проникая в Веллингтон и Окленд. Изоляция Новой Зеландии, которая когда-то была её главной защитой, теперь означает, что бежать некуда."
 zombie.6.a: "Признайте вспышку"
 zombie.7.t: "Вирус распространяется на Филиппинах"
 zombie.7.d: "Инфекция распространяется по Филиппинскому архипелагу со скоростью тропического шторма. Выжившие, перебегающие с острова на остров, переносят чуму с Лусона на Минданао, и тысячи островов, которые когда-то служили естественными барьерами, теперь превратились в изолированные очаги ужаса, откуда нет надежды выбраться."
 zombie.7.a: "Признайте вспышку"
 zombie.8.t: "Орда зомби"
 zombie.8.d: "Мертвецы заполонили Землю. Орда зомби заполонила Индийский субконтинент и стремительно уничтожает наше население, заражая его и нападая на людей. Эксперты назвали этот конфликт «Вспышкой», но война за выживание человечества только началась. Отчаявшиеся страны уже закрывают свои границы."
 zombie.8.a: "Мобилизуйтесь против Орды"
 zombie.8.b: "Прими судьбу человечества"
 zombie.9.t: "[FROM.GetName] Просит помощи против зомби"
 zombie.9.d: "[FROM.GetName] обратился за помощью и пытается заручиться поддержкой всех крупных держав, чтобы остановить вспышку. Откликнемся ли мы на его призыв или будем думать только о собственном выживании?"
 zombie.9.a: "Присоединяйтесь к коалиции"
 zombie.9.b: "Ставьте во главу угла наше выживание"
 RULE_ZOMBIE_JOINING_FACTION_GAME_MODE: "Коалиция против зомби присоединяется к фракции"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL: "Поведение фракции по умолчанию"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL_DESC: "Поведение фракции является стандартным для игрового режима."
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS: "Никаких специальностей"
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS_DESC: "Ни одна крупная компания не присоединится к Коалиции по борьбе с Зомби."
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS: "Все крупные компании присоединяются к Коалиции"
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS_DESC: "Все крупные компании присоединяются к Коалиции по борьбе с зомби."
 zombie.10.t: "Вспышка!"
 zombie.10.d: "Вирус «Зомби» проник на наши земли и теперь распространяется по всей территории [?var:random_outbreak_state.GetName]. Масштабы вспышки пока неизвестны."
 zombie.10.a: "Мобилизуйте войска"
 zombie.11.t: "Вспышка в [FROM.GetName]"
 zombie.11.d: "Вспышка произошла в [FROM.GetName] и продолжает стремительно распространяться. Вирус «Зомби» распространяется с ужасающей скоростью, и ситуация может стать началом конца."
 zombie.11.a: "Следите за ситуацией"
 zombie.11.b: "Готовьтесь к худшему"
 RULE_ZOMBIE_SPAWN_LOCATION: "Место появления зомби"
 RULE_ZOMBIE_SPAWN_INDIA: "Индия (по умолчанию)"
 RULE_ZOMBIE_SPAWN_INDIA_DESC: "Орда зомби появляется в Индии в обычном режиме."
 RULE_ZOMBIE_SPAWN_AFRICA: "Центральная Африка"
 RULE_ZOMBIE_SPAWN_AFRICA_DESC: "Орда зомби появляется в Центральной Африке (регион Конго), открывая новый фронт, который ранее угрожал Европе и Ближнему Востоку."
 RULE_ZOMBIE_SPAWN_EAST_ASIA: "Восточная Азия"
 RULE_ZOMBIE_SPAWN_EAST_ASIA_DESC: "Орда зомби появляется на китайском побережье, немедленно угрожая Восточной Азии, Японии и Тихому океану."
 RULE_ZOMBIE_SPAWN_MULTIPLE: "Несколько локаций"
 RULE_ZOMBIE_SPAWN_MULTIPLE_DESC: "Орда зомби появляется одновременно в Индии, Центральной Африке и Восточной Азии с меньшими начальными силами в каждой локации."
 RULE_ZOMBIE_COALITION_ENABLED: "Фракция Коалиции против зомби"
 RULE_ZOMBIE_COALITION_ENABLED_YES: "Включено (по умолчанию)"
 RULE_ZOMBIE_COALITION_ENABLED_YES_DESC: "Коалиция против зомби формируется в обычном режиме. Крупным державам будет предложено присоединиться к борьбе с Ордой Зомби."
 RULE_ZOMBIE_COALITION_ENABLED_NO: "Отключено"
 RULE_ZOMBIE_COALITION_ENABLED_NO_DESC: "Коалиция против Зомби сформирована не будет. Страны должны пережить вспышку самостоятельно, без организованной коалиции."
 RULE_ZOMBIE_COALITION_DELAY: "Задержка появления зомби"
 RULE_ZOMBIE_COALITION_DELAY_NONE: "Без задержки (по умолчанию)"
 RULE_ZOMBIE_COALITION_DELAY_NONE_DESC: "Орда зомби появляется сразу же в начале игры."
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR: "1 Год"
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR_DESC: "Орда зомби появляется после годичного обратного отсчета, давая странам время подготовиться до начала вспышки."
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS: "2 Года"
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS_DESC: "Орда зомби появляется после двухлетнего обратного отсчета, давая странам значительное время для создания своей экономики и вооруженных сил."
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS: "3 Года"
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS_DESC: "Орда зомби появляется после трехлетнего обратного отсчета, что дает странам обширное время на подготовку до начала вспышки."
 zombie_runner: "Разновидность бегуна"
 zombie_runner_desc: "Более быстрая и агрессивная мутация зомби-вируса. Бегуны передвигаются стаями и преодолевают оборону благодаря огромной скорости и объему."
 zombie_runner_0: "Разновидность бегуна"
 zombie_runner_0_desc: "Более быстрая и агрессивная мутация зомби-вируса. Бегуны передвигаются стаями и преодолевают оборону благодаря огромной скорости и объему."
 zombie_brute: "Разновидность груба"
 zombie_brute_desc: "Сильно мутировавший штамм, который производит более крупных и жизнестойких зомби. Звери выдерживают огромное наказание и прорываются через оборонительные рубежи."
 zombie_brute_0: "Разновидность груба"
 zombie_brute_0_desc: "Сильно мутировавший штамм, который производит более крупных и жизнестойких зомби. Звери выдерживают огромное наказание и прорываются через оборонительные рубежи."
 zombie.12.t: "Вирус распространяется на Нигерию"
 zombie.12.d: "Чума распространилась по всему континенту. Портовые города вдоль Гвинейского залива сообщают о массовых жертвах по мере того, как зараженные проникают вглубь страны от побережья. Огромное население Нигерии и густонаселенные городские центры делают ее благодатной почвой для распространения ужаса — Западная Африка, возможно, уже никогда не будет прежней."
 zombie.12.a: "Признайте угрозу"
 zombie.13.t: "Вирус распространяется на Бразилию"
 zombie.13.d: "Амазонка не представляет собой преграды. Инфекция появляется в Сан-Паулу и Рио-де-Жанейро одновременно, распространяясь по крупнейшим городам Южной Америки с пугающей скоростью. Миллионы охваченных паникой мирных жителей запрудили шоссе, ведущие вглубь страны, неосознанно неся с собой вирус."
 zombie.13.a: "Признайте угрозу"
 zombie.14.t: "Вирус распространяется на Турцию"
 zombie.14.d: "Располагаясь на двух континентах, Турция становится мостом между Восточной Африкой и Европой. Вспышки вспыхивают в Стамбуле и Анкаре, поскольку власти изо всех сил пытаются сдержать то, что быстро становится недостижимым. Босфор, когда-то являвшийся символом связи, теперь несет в себе только смерть."
 zombie.14.a: "Признайте угрозу"
 zombie.15.t: "Орда эволюционирует"
 zombie.15.d: "Вирус меняется. Разведчики сообщают о появлении в наших рядах новой породы инфицированных — более быстрых, более свирепых разновидностей, которые передвигаются стаями, и более крупных, более выносливых особей, которые не обращают внимания на огонь стрелкового оружия. Орда становится все опаснее с каждым днем."
 zombie.15.a: "Признайте эволюцию"
 ZOM_cure_developed: "Прототип средства от зомби"
 ZOM_cure_developed_desc: "Наши ученые разработали экспериментальное лекарство от зомби-вируса. Распространяемая по цепочкам поставок коалиции, вакцина дает всем силам, сражающимся с нежитью, заметное боевое преимущество."
 ZOM_research_cure: "Разработать лекарство"
 ZOM_research_cure_desc: "Величайшая угроза, с которой когда-либо сталкивалось человечество, требует от нас величайших научных усилий. Объединив наши ресурсы и опыт, мы, возможно, сможем разработать лекарство или вакцину, которые могли бы переломить ход этой войны. По завершении все нации, сражающиеся с Ордой Зомби, получат боевой бонус."
 ZOM_establish_safe_zones: "Создание безопасных зон"
 ZOM_establish_safe_zones_desc: "Определите и укрепите безопасные зоны для гражданского населения для защиты некомбатантов и поддержания общественного порядка. Организованные коридоры эвакуации и укрепленные убежища позволят выиграть время и стабилизировать положение в тылу."
 ZOM_develop_a_cure: "Разработать лекарство"
 ZOM_develop_a_cure_desc: "Профинансируйте и завершите Разработку решения о лечении. В случае успеха все нации, сражающиеся с Ордой Зомби, получают боевой бонус против нежити."
 ZOM_protect_civilian_population: "Защищать гражданское население"
 ZOM_protect_civilian_population_desc: "Поддерживайте стабильность выше 60% для обеспечения гражданской безопасности и сплоченности общества."
 ZOM_global_mobilization: "Глобальная мобилизация"
 ZOM_global_mobilization_desc: "Увеличьте состав Коалиции по борьбе с зомби по крайней мере до 8 стран-участниц."
 ZOM_defeat_the_zombie_horde: "Победите орду зомби"
 ZOM_defeat_the_zombie_horde_desc: "Уничтожьте орду зомби и покончите с угрозой человечеству."
 the_horde_spreads: "Орда распространяется"
 ZOM_apocalypse_countdown_1yr: "Приближается вспышка"
 ZOM_apocalypse_countdown_1yr_desc: "Сообщения о таинственном патогене появляются по всему миру. По оценкам спецслужб, пройдет год, прежде чем ситуация станет нестабильной."
 ZOM_apocalypse_countdown_2yr: "Приближается вспышка"
 ZOM_apocalypse_countdown_2yr_desc: "Тревожные сообщения из отдаленных регионов описывают патоген, не похожий ни на что из виденного ранее. Эксперты считают, что у нас есть два года на подготовку, прежде чем он достигнет критической массы."
 ZOM_apocalypse_countdown_3yr: "Приближается вспышка"
 ZOM_apocalypse_countdown_3yr_desc: "Сообщалось о единичных случаях необъяснимого насилия и реанимации. По оценкам ученых, пройдет три года, прежде чем вирус мутирует в свою окончательную, непреодолимую форму."
 zombie_capitulation.1.t: "Красный дракон падает"
 zombie_capitulation.1.d: "Самая густонаселенная нация на Земле была уничтожена. Огромные армии Китая, его Великая стена, его миллиардное население — ничто из этого не имело значения. Пекин пал за несколько дней, Шанхай - за часы. Огромная плотность населения китайских городов превратила их в бойни, и теперь более миллиарда трупов маршируют под знаменами Орды. Если Китай не смог удержаться, то какая надежда остается у остальных из нас?"
 zombie_capitulation.1.a: "Смириться с потерей"
 zombie_capitulation.1.b: "Готовьтесь к худшему"
 zombie_capitulation.2.t: "Россия падает"
 zombie_capitulation.2.d: "Самая большая страна на Земле пала жертвой чумы нежити. Бескрайние просторы замерзшей тундры и густых лесов России, когда-то считавшиеся естественной крепостью против Орды, оказались бессмысленными против врага, который не чувствует холода, не устает и не останавливается. Оборона Москвы рухнула, и Кремль хранит молчание. Теперь Орда управляет территорией, простирающейся от Европы до Тихого океана."
 zombie_capitulation.2.a: "Смириться с потерей"
 zombie_capitulation.2.b: "Готовьтесь к худшему"
 zombie_capitulation.3.t: "Соединенные Штаты падают"
 zombie_capitulation.3.d: "Последняя сверхдержава пала. Соединенные Штаты со всей своей военной мощью, ядерным арсеналом и океанами, разделяющими их от противника, не смогли остановить натиск. Сначала было захвачено Восточное побережье, затем центральные штаты, и, наконец, затихли последние очаги сопротивления в Скалистых горах. Над Вашингтоном больше не развевается звездно-полосатый флаг. Для многих это означает подлинный конец человеческой цивилизации в ее прежнем виде."
 zombie_capitulation.3.a: "Смириться с потерей"
 zombie_capitulation.3.b: "Готовьтесь к худшему"
