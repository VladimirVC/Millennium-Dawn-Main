 BLR_new_railways: "Novas Ferrovias"
 BLR_constitution_BSSR: "A Constituição do RSS da Bielorrússia"
 BLR_constitution_BSSR_desc: "Para começar, é necessário restaurar a Constituição da República Socialista Soviética da Bielorrússia."
 BLR_Excursion_Vilnius: "Excursão a Vilnius"
 BLR_Excursion_Vilnius_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Vilnius. We can help them organize it. A border crossing from our territory is theoretically possible, but will Lithuania declare war on us afterwards?"
 BLR_vilnius_return: "Integração de Vilnius"
 BLR_vilnius_returns: "Integração de Vilnius"
 BLR_belorusisation_vilnius: "Belarusianização de Vilnius"
 BLR_belorusisation_vilnius_desc: "Vilnius has long been a disputed region that we sought to possess, but now that we have secured it, we are ready to promote to the masses the idea of settling the region with Belarusians."
 BLR_new_democratic_constitution: "Nova Constituição Democrática"
 BLR_new_democratic_constitution_desc: "It is time to adopt a new constitution consistent with Western democracy."
 BLR_Great_stone_china: "Grande Pedra da China"
 BLR_national_library: "Biblioteca Nacional da Bielorrússia"
 BLR_Transnistria_enemy: "Resolver o problema da Transnístria"
 BLR_Transnistria_enemy_desc: "Transnistria is a small, unrecognized state that has long been a headache for Moldova. We are ready to help them solve this problem — by taking these lands for ourselves, of course."
 BLR_transnistria_claims: "Reivindicações territoriais para §Y[PMR.GetNamewithFlag]§!"
 BLR_batka_krut_TT: "We will §Rclean up§! §Ythe political sphere§!, leaving only a §Gfew parties loyal to us§! and we will §Gcreate a real patriotic party§! for §YLukashenko§!"
 belarus_politics.1.t: "A Nova Realidade Política"
 belarus_politics.1.d: "Embora a vitória sobre os manifestantes tenha sido monumental, ainda há uma ampla rede de organizações e partidos de oposição esperando a hora de destruir nosso país. Para evitar isso, precisamos limpar completamente o campo político de políticos e organizações desnecessários, deixando apenas partidos leais a nós, e também podemos precisar de nosso próprio partido político para controlar a esfera política. Ou podemos deixar tudo como está, mas o inimigo ainda terá as ferramentas para nos influenciar internamente."
 belarus_politics.1.a: "Agite-os!"
 belarus_politics.1.b: "Não vamos mais irritar as pessoas."
 BLR_revoult_army_gco_drone_desc: "We will actively use drones in our army to improve its effectiveness."
 BLR_potato_empire_idea: "Império da Batata"
 BLR_country_for_life_idea: "País para a Vida"
 BLR_pension_reform_idea: "Reforma da Previdência"
 BLR_agriculture2: "Intensificar as Empresas Rurais Privadas"
 BLR_agriculture2_desc: "Further privatization of Belarus' agricultural sector."
 BLR_country_for_life_idea_desc: "'Country for Life' is a slogan and movement associated with Belarusian blogger and activist Sergei Tikhanovsky. It represents a vision of a Belarus where ordinary citizens can live freely and without fear."
 BLR_pension_reform_idea_desc: "Os fundos de pensão são vitais para o funcionamento da nossa sociedade e algumas mudanças precisam ser feitas para que funcionem melhor."
 BLR_assembly_shop_of_europe: "Oficina de Montagem da Europa"
 BLR_assembly_shop_of_europe_desc: "As perhaps one of the most overlooked economies, Belarus has the potential to overtake Russia economically. But that will only happen if we focus on fixing the root problems that exist, as for years we have neglected even the most basic investments into our economy."
 BLR_increase_livestock_imports: "Aumento das importações de gado"
 BLR_increase_livestock_imports_desc: "§C'This milk tastes funny'§!\n\nOur people need animals, not just to eat, but also to produce goods. Cows are particularly valuable for their dairy output. With many use cases, dairy could give a serious boost to our agricultural sector."
 BLR_proportional_mining: "Mineração Proporcional"
 BLR_proportional_mining_desc: "We cannot dig for resources just anywhere we want; proper infrastructure must be established beforehand. We must establish mines only in areas that warrant the need for resources, and will only construct new mines in areas with an industrial sector. Of course, this will worsen air quality, but at least [BLR.GetLeader] will be able to finance some nice palaces."
 BLR_industrial_wide_reform: "Reforma em toda a indústria"
 BLR_industrial_wide_reform_desc: "While the heart of Belarusian industry is beating strong, it could beat even stronger. We will initiate a series of reforms to enhance knowledge on sustainable industrial expansion."
 BLR_fostering_automotive_innovation: "Promovendo a inovação automotiva"
 BLR_fostering_automotive_innovation_desc: "While Belarus is not yet world-renowned for its automotive industry, that does not mean the idea is entirely out of the picture. With the right amount of motivation and propaganda (and maybe some funding), we will kick-start an automotive titan to rival the likes of Germany. Maybe."
 BLR_the_fate_of_belarusian_steel_works: "Destino das Siderúrgicas Bielorrussas"
 BLR_the_fate_of_belarusian_steel_works_desc: "Fundada em 1984, a OJSC Belarusian Steel Works fornece à indústria bielorrussa aço de classe mundial, do qual não se encontra em nenhum outro lugar do planeta."
 BLR_tractors: "O trator mais potente da Europa"
 BLR_tractors_desc: "One thing Belarusian industry is known for is its reliable tractors, with Belarusian farmers being the envy of Europe. Funding the tractor industry would benefit the economy even further, as we will be able to equip our farms with state-of-the-art equipment."
 BLR_buses: "The East's Bus"
 BLR_buses_desc: "Luckily, our brilliant engineers at several companies have been able to decode the impossible task of constructing somewhat reliable buses. With that in mind, our buses could only improve. With a little luck and some funding, we will get to work and construct the best bus found anywhere east of Britain."
 BLR_trains: "Revitalizar Bielaruskaja Cyhunka"
 BLR_trains_desc: "§R'Faster than any bullet train!'§!\n\nBielaruskaja Čyhunka, also known as Belarusian Railway by the English-speaking world, has been at the forefront of building railway infrastructure for the many citizens living within our borders. Reporting directly to the Ministry of Transport, Belarusian Railway is one of the successor companies from the Soviet era and is currently projected to continue its monopoly on Belarusian railways. We can revitalize Bielaruskaja Čyhunka and also bankroll certain train producers to best fit the needs of Belarusian commuters."
 BLR_infrastructure_contracts: "Proposed Infrastructure Contracts"
 BLR_new_paths: "Todos os caminhos levam a [BLR.capital.GetCapitalVictoryPointName]"
 BLR_revamp_railroads: "Ferrovias reformadas"
 BLR_revamp_railroads_desc: "O sistema ferroviário nacional sofre com equipamentos obsoletos e serviço lento. Sua modernização, com padrões atuais, reduzirá o tempo de viagem e os problemas de manutenção. Um sistema ferroviário mais robusto impulsiona tanto o transporte civil quanto o industrial."
 BLR_belneftekhim: "Fortalecer Belneftekhim"
 BLR_belneftekhim_desc: "A Belneftekhim desempenha um papel central na indústria petroquímica bielorrussa, mas precisa de modernização para se manter competitiva. Investir em novas tecnologias e processos de refino aumenta a qualidade da produção. Essas melhorias ajudam a consolidar nossa posição nos mercados globais."
 BLR_the_belaruskali_monopoly: "Manter o monopólio da Belaruskali"
 BLR_the_belaruskali_monopoly_desc: "A Belaruskali é um dos nossos ativos mais valiosos, e manter seu monopólio intacto garante receitas previsíveis. O fortalecimento de sua posição no mercado ajuda a proteger a influência bielorrussa na indústria de potássio. A estabilidade nesse setor apoia um planejamento econômico mais amplo."
 BLR_uplift_grodno_azot: "Elevar Grodno Azot"
 BLR_uplift_grodno_azot_desc: "A Grodno Azot produz produtos químicos essenciais para a agricultura e a indústria. A modernização de suas instalações aumentará a eficiência e reduzirá o desperdício. O apoio a esta fábrica fortalece o nosso setor químico como um todo."
 BLR_tend_to_oil_shale: "A Busca pelo Xisto Betuminoso"
 BLR_tend_to_oil_shale_desc: "Belarus possui potenciais depósitos de xisto betuminoso que permanecem em grande parte inexplorados. Investigar e desenvolver esses campos poderia diversificar nossas fontes de energia. Mesmo pequenas descobertas reduziriam a dependência de importações estrangeiras."
 BLR_award_chinese_contractors: "Atribuir contratos a empresas chinesas"
 BLR_award_chinese_contractors_desc: "As construtoras chinesas oferecem propostas competitivas e entrega rápida de projetos. A concessão de grandes contratos a elas pode acelerar nossos planos de infraestrutura. Essa medida também fortalece os laços diplomáticos e econômicos com Pequim."
 BLR_award_luxembourgian_contractors: "Apaziguar os luxemburgueses"
 BLR_award_luxembourgian_contractors_desc: "As empresas luxemburguesas oferecem trabalho de alta qualidade e esperam acesso justo aos nossos mercados. A concessão de contratos importantes a elas melhora as relações e demonstra nossa disposição para cooperar. O envolvimento delas também pode elevar os padrões da construção civil em nosso país."
 BLR_potash_safety_and_hazards_regulation: "Regulamentos de segurança e riscos da potassa"
 BLR_potash_safety_and_hazards_regulation_desc: "A extração de potássio acarreta riscos significativos se as normas de segurança forem ignoradas. O estabelecimento de regulamentações mais rigorosas protege os trabalhadores e previne acidentes. Uma indústria mais segura também garante uma produção mais estável e confiável."
 BLR_bountiful_fields: "Cultive campos abundantes"
 BLR_bountiful_fields_desc: "Belarus possui solo fértil, mas colheitas irregulares. Ampliar o apoio aos agricultores e introduzir melhores práticas pode transformar nossos campos em locais de colheitas confiáveis. Esse esforço melhora a segurança alimentar e fortalece as comunidades rurais."
 BLR_speed_up_land_reformation: "Acelerar a reforma agrária"
 BLR_speed_up_land_reformation_desc: "A reforma agrária tem avançado de forma lenta e desigual em todo o país. Acelerar esse processo ajudará os agricultores a obter estabilidade e incentivará o investimento. Regras de propriedade mais claras melhoram a produtividade agrícola em geral."
 BLR_reinforce_government_support_for_agriculture: "Reforçar o apoio à agricultura"
 BLR_reinforce_government_support_for_agriculture_desc: "A agricultura continua sendo um pilar da sociedade bielorrussa e requer forte apoio governamental. O aumento de subsídios, treinamento e acesso a equipamentos elevará a produtividade e protegerá os pequenos agricultores. Um setor agrícola resiliente contribui para a estabilidade nacional."
 BLR_achieving_self_sufficiency: "Busque a autossuficiência"
 BLR_achieving_self_sufficiency_desc: "Reducing reliance on imports strengthens national independence and economic stability. By developing domestic industries and improving productivity, Belarus can meet more of its own needs. Achieving this goal will take time but is essential for long-term resilience."
 BLR_streamline_taxation: "Simplificação da tributação"
 BLR_streamline_taxation_desc: "Um sistema tributário complexo retarda o crescimento dos negócios e frustra os investidores. Simplificar as regras incentiva o empreendedorismo e reduz a burocracia. Uma tributação mais clara pode aumentar a arrecadação, facilitando o cumprimento das obrigações fiscais."
 BLR_counterurbanization: "Políticas de contraurbanização"
 BLR_counterurbanization_desc: "As áreas rurais continuam a perder habitantes para as cidades, criando um desenvolvimento desigual. As políticas de contraurbanização visam apoiar as aldeias através de novos investimentos e da melhoria dos serviços. O fortalecimento da vida rural contribui para equilibrar o crescimento em todo o país."
 BLR_potash_large_reserves: "Grandes reservas de potássio"
 BLR_agriculture_reduced: "Agricultura reduzida"
 BLR_belneftekhim_idea: "Belneftekhim"
 BLR_streamlined_taxation: "Tributação Simplificada"
 BLR_safety_protocols_in_place: "Protocolos de segurança implementados"
 BLR_disease_amongst_livestock: "Doenças em animais de criação"
 BLR_belarusian_trains: "Os Maestros Stede"
 BLR_treading_on_thin_steel: "Caminhando sobre aço fino"
 BLR_treading_on_thin_steel_desc: "In terms of our economy, we are treading on thin steel now that all the ice has melted. We will need to reinforce this steel by further advancing our industry, whether through resources or production."
 BLR_agricultural_shock: "Choque Agrícola"
 BLR_agricultural_shock_desc: "Avançamos com muita rapidez na transição da nossa economia para um foco industrial e, como resultado, o nosso setor agrícola sofreu um duro golpe."
 BLR_automotive_industry: "Setor Automotivo Bielorrusso"
 BLR_automotive_industry_desc: "Quatro portas e talvez uma roda é tudo o que é necessário para um veículo bielorrusso confiável, robusto e moderno. Com nossa expansão para o setor automotivo, certamente superaremos aqueles incompetentes que trabalham para a Mercedes ou a BMW."
 BLR_activates_fermer_mission_TT: "£text_icon_kaldanger Will activate a §Hmission§! requiring us to build §HAgricultural Districts§! in certain regions\n - Failure to meet these demands may result in agrarian discontent\n - If successful, we will receive a boost to the national economy"
 BLR_livestock_warning_TT: "£text_icon_kaldanger There will be a risk of disease §Rkilling§! our livestock depending on our §HGenetic Engineering§! research level\n\n§H500§! cows will be imported from a friendly state"
 BLR_steel_warning_TT: "£text_icon_kaldanger If we initiate reforms to orient our economy towards an §HIndustrial Focus§! without having §H11 Civilian Industries§! first, we may experience a short crisis"
 BLR_potash_purchase_TT: "We will make an attempt to purchase §HSafety Equipment§! for our workers, but make no promises"
 BLR_oil_shale_TT: "Every state with at least §H3 Strategic Resource Reserves§! will receive £oil_texticon  §H2§! oil"
 BLR_factory_to_steel_TT: "We will begin §HMining Operations§! in every state with §H1 Civilian Industry§! or more"
 belarus_md.1.t: "Crise agrícola iminente"
 belarus_md.1.d: "Após nossa repentina transição para uma economia orientada para a indústria, nosso setor agrícola sofreu um choque abrupto com a retirada do apoio governamental, sem que tivéssemos qualquer infraestrutura adequada para nos apoiarmos. Como resultado, nosso setor agrícola foi duramente atingido e levará um ano para se recuperar totalmente."
 belarus_md.1.a: "Caramba"
 belarus_md.2.t: "Privatizar ou não privatizar?"
 belarus_md.2.d: "The OJSC Belarusian Steel Works was founded in 1984 during the Soviet era. Since then, much has changed, and the collapse of the Union has led us to open our markets to some degree. There have been calls from within the state to privatize the company and tap into the revenue it would generate, but others are warning us against letting such an important enterprise pass into private hands."
 belarus_md.2.a: "Não vamos privatizar!"
 belarus_md.2.b: "A privatização é a única solução."
 belarus_md.3.t: "A doença se espalha rapidamente entre o gado."
 belarus_md.3.d: "Após a importação de aproximadamente 500 vacas de um país aliado, nossos analistas especializados começaram a notar um aumento acentuado na mortalidade de animais em toda a Bielorrússia. Após uma investigação mais aprofundada, constatou-se que uma única vaca importada era portadora de Encefalopatia Espongiforme Bovina, também conhecida como \"Doença da Vaca Louca\". Como resultado, alguns cidadãos já foram hospitalizados após contraírem uma variante da doença transmitida pela vaca."
 belarus_md.3.a: "Se ao menos as coisas corressem bem."
 BLR_peleng_desc: "A JSC Peleng é uma empresa bielorrussa com sede em Minsk, especializada no desenvolvimento e produção de sistemas optoeletrônicos para fins militares e civis. É a empresa líder no setor de optoeletrônica na Bielorrússia."