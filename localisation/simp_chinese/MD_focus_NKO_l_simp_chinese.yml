 NKO_naval_focus_destroyer_unleashed_tt: "§H先军海军学说 驱逐舰出击§!\n• §G+5§!海军建设点数\n• §G+20§!§Y导弹艇舰队§!进度（朝向下一层级）\n• §G+10§!§Y岸防网络§!进度\n• 添加§H导弹艇集群训练势头§!理念，持续§Y90§!天\n   §L+5%海军速度, +10%对海攻击, +10%海军经验获取§!\n• 驱逐舰局解锁军工机构特质：§Y陆地作战支援§!和§Y防空炮组§!\n• 在下次点击§H投资§!决议时，于§Y25§!/§Y50§!/§Y75§!/§Y100§!进度处触发层级提升\n• 触发§H驱逐舰出击§!事件"
 NKO_naval_focus_missile_boat_track_tt: "如果§H先军海军学说§!已解锁：§G+3§!海军建设点数与§G+10§!导弹艇队进度，所有层级跨越将触发对应事件。"
 NKO_naval_focus_coastal_defense_track_tt: "如果§H先军海军学说§!已解锁：§G+3§!海军建设点数与§G+10§!岸防网络进度，所有层级跨越将触发对应事件。"
 NKO_naval_focus_specops_track_tt: "如果§H先军海军学说§!已解锁：§G+3§!海军建设点数与§G+10§!海军特战进度，所有层级跨越将触发对应事件。"
 NKO_naval_capstone_news_tt: "播放一则§H重大新闻§!：§Y“平壤海上防御圈完成”§! 举国欢庆，举世瞩目。"
 NKO_unlock_naval_buildup: "启动先军海军计划"
 NKO_unlock_naval_buildup_desc: "总参谋部已拟定作战方针。批准扩军计划，并着手追踪全部四条海军发展路径的点数进展与完成度。"
 NKO_naval_allocate_party_funds: "转移党的资金"
 NKO_naval_allocate_party_funds_desc: "悄悄将党的津贴转入海军计划。稳定的资源不断流入，以政治资本换取海军建设。"
 NKO_naval_mobilize_nampo_shipyards: "动员南浦造船厂"
 NKO_naval_mobilize_nampo_shipyards_desc: "在南浦占用一个民用工厂进行三个月的加班制造。工程结束后，船厂会奖励我们额外的建设点数。"
 NKO_naval_juche_drive: "发起主体思想海军运动"
 NKO_naval_juche_drive_desc: "全国动员为舰队。稳定度下降，战争支持度上升，而海军计划将获得大量点数。需要稳定的后方来维持。"
 NKO_naval_invest_submarine: "投资潜艇部队"
 NKO_naval_invest_submarine_desc: "消耗一个海军建设点数推进潜艇研究进度。随着设计方案的成熟，船员们将获取全新的海军经验。"
 NKO_naval_invest_missile_boat: "投资导弹艇队"
 NKO_naval_invest_missile_boat_desc: "消耗一个海军建设点数以扩大导弹艇计划。每一轮改装都磨砺着我们的近海打击能力。"
 NKO_naval_invest_coastal_defense: "投资岸防网络"
 NKO_naval_invest_coastal_defense_desc: "消耗一个海军建设点数以强化海岸线。堡垒驻扎部队与岸防炮组将获得经验。"
 NKO_naval_invest_specops: "投资海军特战"
 NKO_naval_invest_specops_desc: "消耗一点海军建设点数，训练侦察局蛙人与海军陆战队。强化特种部队两栖作战技能。"
 NKO_naval_capstone_complete: "海上防御圈落成"
 NKO_naval_capstone_complete_desc: "所有四条路径均已达到最终等级。宣布先军海军学说完成，并授予国家永久性加成。"
 NKO_songun_navy_capstone: "先军海军学说"
 NKO_songun_navy_capstone_desc: "多年集中努力锻造了一支协调的非对称战力海军。远程潜艇、蜂群导弹艇、分层海岸防御体系以及精锐海军特种部队如今已融为一体化作战整体。"
 NKO_sub_drill_momentum: "潜艇部队训练势头"
 NKO_sub_drill_momentum_desc: "近期的演习提升了整支沉默舰队的士气与规程纪律。"
 NKO_mb_swarm_momentum: "导弹艇集群训练势头"
 NKO_mb_swarm_momentum_desc: "在最近的演习之后，各舰队士气高涨，信心十足。"
 NKO_cd_bunker_momentum: "堡垒带高度戒备"
 NKO_cd_bunker_momentum_desc: "沿海驻防部队已提高战备等级；工兵部队正以双倍速度推进防御工事建设。"
 NKO_so_recon_momentum: "侦察局行动节奏"
 NKO_so_recon_momentum_desc: "侦察局正在全速运转，蛙人小队和海军特战骨干在持续轮换。"
 NKO_naval_strategy_momentum: "海军战略势头"
 NKO_naval_strategy_momentum_desc: "统一的战略方针激励了各个海军局。研究、训练及舰队整编均因这焕然一新的使命感而受益匪浅。"
 NKO_sub_tier_1: "“鲨鱼”级现代化"
 NKO_sub_tier_1_desc: "“鲨鱼”级近海潜艇舰队正在进行改装与艇员轮训。"
 NKO_sub_tier_2: "“永努”级计划"
 NKO_sub_tier_2_desc: "“永努”级渗透潜艇与改进型声学对抗措施进一步延伸了我们的打击范围。"
 NKO_sub_tier_3: "“罗密欧”级改型"
 NKO_sub_tier_3_desc: "“罗密欧”级舰体配备了新的电子设备、电池组以及更安静的推进系统。"
 NKO_sub_tier_4: "“新浦”潜射弹道导弹潜艇计划"
 NKO_sub_tier_4_desc: "“新浦”级潜艇搭载北极星系列导弹。具备战略级射程，形成真正的威慑。"
 NKO_mb_tier_1: "蚊式改装"
 NKO_mb_tier_1_desc: "老“蚊子式”船体换装了新型发射装置和升级版引擎。"
 NKO_mb_tier_2: "烧酒级与农鼓级生产"
 NKO_mb_tier_2_desc: "国产烧酒级与农鼓级导弹艇陆续服役，数量日益增多。"
 NKO_mb_tier_3: "金星3型反舰巡航导弹集成"
 NKO_mb_tier_3_desc: "金星-3反舰巡航导弹为我方舰队提供了可靠的长程打击能力。"
 NKO_mb_tier_4: "狼群战术"
 NKO_mb_tier_4_desc: "协同蜂群战术：齐射攻击、分层电子干扰、诱饵艇。"
 NKO_cd_tier_1: "堡垒带"
 NKO_cd_tier_1_desc: "东西海岸沿线连绵不断的加固堡垒带。"
 NKO_cd_tier_2: "机动海岸炮兵"
 NKO_cd_tier_2_desc: "卡车搭载的机动炮兵部队在预设阵地间机动，以规避反炮兵火力。"
 NKO_cd_tier_3: "设防海角"
 NKO_cd_tier_3_desc: "战略性海角配备深层隧道、加固弹药库与集成雷达系统。"
 NKO_cd_tier_4: "岸基反舰导弹"
 NKO_cd_tier_4_desc: "机动式\"金星\"发射炮组阻止敌方舰队靠近我方海岸。"
 NKO_so_tier_1: "侦察局蛙人部队"
 NKO_so_tier_1_desc: "侦察总局蛙人部队扩大训练与装备库。"
 NKO_so_tier_2: "海上狙击旅"
 NKO_so_tier_2_desc: "一支专业的海上狙击旅专门从事快速海岸突袭。"
 NKO_so_tier_3: "海军轻步兵"
 NKO_so_tier_3_desc: "轻步兵营重组，融入海上作战元素以执行两栖作战。"
 NKO_so_tier_4: "风暴军团海军化"
 NKO_so_tier_4_desc: "风暴军团各部队将配备常设海军支援单位，我们的先锋部队可跨越任何海岸。"
 nko_naval_buildup.1.t: "新时代海军学说"
 nko_naval_buildup.1.d: "总参谋部已制定一项长期计划：四条并行路径，通过积累海军建设点数推进。三项决议提供建设点数，四项投资决议消耗点数。在每条路径上达到最终层级，使先军海军学说下的海军部队百炼成钢。"
 nko_naval_buildup.1.a: "我们将引领这个计划走向胜利。"
 nko_naval_buildup.11.t: "“鲨鱼”级艇员登艇"
 nko_naval_buildup.11.d: "改造船厂清理了“鲨鱼”级潜艇的积压订单。船员们全天候训练，对沉默舰队的信心日益增强。"
 nko_naval_buildup.11.a: "前进"
 nko_naval_buildup.12.t: "“永努”级悄然突围"
 nko_naval_buildup.12.d: "“永努”级渗透潜艇在与己方岸防雷达的对抗演练中取得成功，成功溜过了本应能探测到他们的防线。"
 nko_naval_buildup.12.a: "遥遥领先"
 nko_naval_buildup.13.t: "“罗密欧”级改革结出硕果"
 nko_naval_buildup.13.d: "现代化“罗密欧”级潜艇如今巡逻的距离更远、噪音更低，其性能远超最初设计者的预期。"
 nko_naval_buildup.13.a: "好极了"
 nko_naval_buildup.14.t: "“新浦”级出击"
 nko_naval_buildup.14.d: "“新浦”级潜艇准时上浮，\"北极星\"发射管安装并测试完毕。战略威慑已不再是梦想。"
 nko_naval_buildup.14.a: "所有参与计划同志的荣耀"
 nko_naval_buildup.21.t: "蚊式改装完成"
 nko_naval_buildup.21.d: "老旧的“蚊子式”驶离船坞时已经焕然一新，装备了新的发射装置、升级的引擎，以及一支斗志异常高昂的舰员队伍。"
 nko_naval_buildup.21.a: "良好的开端"
 nko_naval_buildup.22.t: "烧酒级与农鼓级艇队"
 nko_naval_buildup.22.d: "第一批专门的烧酒级和农鼓级艇队组建完成。相比以往，它们更快速、更精干，也更具威胁。"
 nko_naval_buildup.22.a: "继续前进"
 nko_naval_buildup.23.t: "金星-3型海试"
 nko_naval_buildup.23.d: "金星-3反舰导弹完成全部舰载测试。我军舰队现可在敌难以有效反制的距离上发起打击。"
 nko_naval_buildup.23.a: "触及更远"
 nko_naval_buildup.24.t: "狼群战术进入实训"
 nko_naval_buildup.24.d: "齐射攻击、分层干扰、诱饵艇——导弹快艇队已正式树立“狼群”作战方针。"
 nko_naval_buildup.24.a: "狼群就绪"
 nko_naval_buildup.31.t: "堡垒带落成"
 nko_naval_buildup.31.d: "一条连绵不断的加固地堡链现已横跨两条海岸线。当地指挥官报告称，驻军士气已明显提升。"
 nko_naval_buildup.31.a: "坚守战线"
 nko_naval_buildup.32.t: "机动海岸炮兵部署完成"
 nko_naval_buildup.32.d: "机动炮兵部队反复演练射击后转移战术，直至能在敌方反炮兵火力抵达之前撤出发射阵地。"
 nko_naval_buildup.32.a: "严谨有序"
 nko_naval_buildup.33.t: "设防海角"
 nko_naval_buildup.33.d: "最具战略价值的海角已配备深埋隧道、加固弹药库与一体化雷达。敌方的作战规划者如今面临的是真正意义上的防御化海岸。"
 nko_naval_buildup.33.a: "铜墙铁壁"
 nko_naval_buildup.34.t: "岸基反舰导弹系统上线"
 nko_naval_buildup.34.d: "机动式“金星”发射炮组已进入岸防阵位。凡靠近我方海岸者，必将付出沉重代价。"
 nko_naval_buildup.34.a: "放马过来"
 nko_naval_buildup.41.t: "蛙人扩编"
 nko_naval_buildup.41.d: "侦察总局悄然将蛙人招募数量翻倍，并统一规范了潜水装备。"
 nko_naval_buildup.41.a: "培养骨干"
 nko_naval_buildup.42.t: "海上狙击旅成立"
 nko_naval_buildup.42.d: "一支专业的海上狙击旅正式成立。其首次针对模拟海岸目标的演习效果超出预期。"
 nko_naval_buildup.42.a: "磨刀霍霍"
 nko_naval_buildup.43.t: "轻步兵海上作战"
 nko_naval_buildup.43.d: "部分精选轻步兵营正在进行重组，融入海上作战要素。两栖作战学说正逐步超越以往仅局限于少数专业单位的局限。"
 nko_naval_buildup.43.a: "彼岸亦可往"
 nko_naval_buildup.44.t: "风暴军团征服海洋"
 nko_naval_buildup.44.d: "风暴军团各部队现已配备常设海军支援单位。这支先锋力量如今已真正成为一支海陆兼备的打击力量。"
 nko_naval_buildup.44.a: "敌军无处可逃"
 nko_naval_buildup.51.t: "元山海军演习"
 nko_naval_buildup.51.d: "元山潜艇支队的季度演习已列入计划。船员们等待命令，准备启航。"
 nko_naval_buildup.51.a: "上点强度，让他们流点汗"
 nko_naval_buildup.51.b: "按部就班进行"
 nko_naval_buildup.51.c: "取消，燃油和零件短缺"
 nko_naval_buildup.52.t: "发现外国侦察船"
 nko_naval_buildup.52.d: "岸基雷达发现一艘未标记的船只在我们的主权水域内徘徊。海岸防御指挥官需要你的决策。"
 nko_naval_buildup.52.a: "拦截迫使其调头"
 nko_naval_buildup.52.b: "隐蔽跟踪，但不要交火"
 nko_naval_buildup.52.c: "撤退，避免发生冲突"
 nko_naval_buildup.53.t: "潜艇叛逃危机"
 nko_naval_buildup.53.d: "我们一艘巡逻潜艇上的初级军官在港口停靠期间失踪了。侦察局请求授权采取行动。"
 nko_naval_buildup.53.a: "派遣风暴军团，活要见人死要见尸"
 nko_naval_buildup.53.b: "被动跟踪，不采取行动"
 nko_naval_buildup.53.c: "封杀这份报告"
 nko_naval_buildup.54.t: "南浦船坞超出配额"
 nko_naval_buildup.54.d: "南浦造船厂的领班报告称本月超额完成指标。工人们干劲十足，但已疲惫不堪。"
 nko_naval_buildup.54.a: "公开奖励他们额外配给"
 nko_naval_buildup.54.b: "让他们加倍工作，原定配额本就很低"
 nko_naval_buildup.56.t: "走私船只被抓获"
 nko_naval_buildup.56.d: "海岸巡逻队截获了一艘走私的小型船只。当地指挥官询问如何处理这艘缴获的船只。"
 nko_naval_buildup.56.a: "在电视上展示，宣传胜利"
 nko_naval_buildup.56.b: "静默夺取，将物资存入库中"
 nko_naval_buildup.56.c: "接受船长的贿赂，睁一只眼闭一只眼"
 nko_naval_buildup.60.t: "沉默舰队昂首凯旋"
 nko_naval_buildup.60.d: "新浦号及其姊妹舰悬挂着胜利的旗帜返回港口。朝鲜人民军海军潜艇部队已趋于成熟。一支可信赖的水下力量正在保卫祖国。"
 nko_naval_buildup.60.a: "深海属于我们"
 nko_naval_buildup.61.t: "海岸之狼"
 nko_naval_buildup.61.d: "狼群战术正式在全舰队中推行。齐射发射、分层电子对抗与诱饵艇。我们的近岸打击力量如同有机机体般运作。"
 nko_naval_buildup.61.a: "释放狼群"
 nko_naval_buildup.62.t: "钢铁海岸"
 nko_naval_buildup.62.d: "从新义州到元山，每条航道都布满了加固的碉堡、机动火炮和岸基反舰导弹。任何舰队都别想毫发无损地接近我们的海岸。"
 nko_naval_buildup.62.a: "固若金汤"
 nko_naval_buildup.63.t: "风暴军团入海"
 nko_naval_buildup.63.d: "风暴军团各部已就位于海上作战序列。侦察局、海上狙击手、蛙人部队以及海军轻步兵，现已整合为一支精锐突击力量，可对任意海岸发起打击。"
 nko_naval_buildup.63.a: "敌军无处可逃"
 nko_naval_buildup.70.t: "海洋战略学说"
 nko_naval_buildup.70.d: "总参谋部海军局批准了一项统一作战方针：多层次潜艇部署、导弹快艇集群突击、海岸要塞化以及海军突击队协同作战。所有船厂、基地和训练学校如今都朝着同一个方向努力。"
 nko_naval_buildup.70.a: "所有人员，各就各位"
 nko_naval_buildup.71.t: "首批国产驱逐舰解缆起航"
 nko_naval_buildup.71.d: "南浦和元山的造船厂多年来首次下水了本国建造的导弹驱逐舰。船员们蜂拥登上新舰体，加紧训练以达到作战状态。水面舰队再次焕发出生机。"
 nko_naval_buildup.71.a: "扬帆启航"
 nko_naval_buildup.72.t: "国产潜艇船体初具雏形"
 nko_naval_buildup.72.d: "潜艇船厂正按紧张日程加紧生产新型攻击潜艇。曾在“鲨鱼”级和“罗密欧”级等老式潜艇上受训的艇员，正被轮流调派至新型潜艇平台，以加速其资格认证。"
 nko_naval_buildup.72.a: "悄然深潜"
 nko_naval_buildup.73.t: "驱逐舰中队出击"
 nko_naval_buildup.73.d: "一支完全由国内建造并配备舰员的全编驱逐舰中队，已部署至东部舰队。与经过“狼群”战术训练的导弹快艇支队相结合，其水面作战序列已成为一支不容忽视的威慑力量。"
 nko_naval_buildup.73.a: "全军出击"
 nko_naval_buildup.74.t: "现代化舰队崛起"
 nko_naval_buildup.74.d: "2005年型驱逐舰平台与1995年型攻击潜艇如今一同进入我们的船厂序列，分别被命名为§Y崔贤级§!与§Y新浦级§!。两类舰艇各有5艘已交付至战备库存，其专用生产线已在南浦造船厂和元山造船厂铺设完毕，由§H潜艇局§!与§H水面舰艇局§!直接负责。\n\n这一里程碑事件解锁了两项后期制造商特质：潜艇局获得§Y海对地武器§!、§Y现代化材料§!与§Y精炼潜艇设计§!；水面舰艇局获得§Y优化生产§!与§Y高量级雷达技术§!。"
 nko_naval_buildup.74.a: "钢铁的时代拉开帷幕"
 nko_naval_buildup.99.t: "平壤海上防御圈完成"
 nko_naval_buildup.99.d: "经过多年集中努力，朝鲜人民海军完成了先军海军方针。远程潜艇、蜂群导弹艇、分层海岸防御体系与精锐海军特种作战力量融为一体化作战整体。非对称战力舰队梦想成真。"
 nko_naval_buildup.99.a: "铸造钢铁海防线"
 nko_naval_buildup.99.b: "平壤完成海军现代"
 NKO_naval_modern_fleet_milestone: "组建现代舰队"
 NKO_naval_modern_fleet_milestone_desc: "新浦级攻击型潜艇和崔贤级驱逐舰均已达到量产条件。应将每种舰艇的首批五艘交付韩国人民海军，建立专用生产线，并向这两个海军部门拨付资金。"
 NKO_more_arms_factories_desc: "军工产业不能停滞不前。为了保障朝鲜人民军的物资供应和先军防线的稳固，将会兴建新的武器工厂。"
 NKO_spa_unlocked_tt: "§G解锁§!§Y最高人民会议§!§G机制。§!\n最多§Y可同时激活8项生产率指令中的2项§!；每项指令都会暂停该领域的现状惩罚，并施加365天的增益效果，并在增益效果失效时释放其槽位。每次选择都会触发§G3个风味事件链§!，并且有§G25%§!的额外几率触发奖励事件。"
 NKO_spa_focus_lifts_industry_tt: "§G永久移除§!§Y“停滞的工业”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_production_tt: "§G永久移除§!§Y“生产线衰败”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_military_tt: "§G永久移除§!§Y“外强中干的军队”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_economy_tt: "§G永久移除§!§Y\"资源囤积\"§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_research_tt: "§G永久移除§!§Y“研究停滞”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_agriculture_tt: "§G永久移除§!§Y“自给农场”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_foreign_tt: "§G永久移除§!§Y“外交孤立”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_construction_tt: "§G永久移除§!§Y“施工瓶颈”§!§G常驻惩罚（防御性基础设施）。§!"
 NKO_spa_bonus_chance_tt: "§G每项选择会触发内含§G3个事件§!的事件链，并有§Y25%§!额外概率触发奖励事件。§!"
 NKO_spa_domain_unlocked_tt: "§G该领域的加成目前尚未激活。§!"
 NKO_spa_picks_remaining_tt: "§G目前生效的授权令不足两项。§!"
 NKO_spa_umbrella: "最高人民会议"
 NKO_spa_umbrella_desc: "最高人民会议允许您同时保持§Y最多两项生产率指令处于激活状态§!。每项指令可暂停中央计划的八项长期弊病之一，为期§Y365天§!，并在此基础上给予生产率加成；当一项指令失效时，其名额将空出，供另一项指令使用。完成相应的国策可永久消除当前惩罚。"
 NKO_spa_debuff_industry: "停滞的工业"
 NKO_spa_debuff_industry_desc: "数十年的中央配给制导致工厂缺乏原材料和熟练劳动力，建筑业发展缓慢。"
 NKO_spa_debuff_production: "生产线衰败"
 NKO_spa_debuff_production_desc: "工具陈旧，供应链临时拼凑，质量控制完全取决于工头当天的心情。"
 NKO_spa_debuff_military: "外强中干的军队"
 NKO_spa_debuff_military_desc: "纸面上，朝鲜人民军兵力数百万。但实际上，训练如同作秀，士气低落。"
 NKO_spa_debuff_economy: "资源囤积"
 NKO_spa_debuff_economy_desc: "省级干部只顾着攫取流经辖区的资源。中央拨付的资源要么迟到，要么量少，要么根本没到。"
 NKO_spa_debuff_research: "研究停滞"
 NKO_spa_debuff_research_desc: "制裁、人才流失和实验室设备落后意味着，即使是基本技术，朝鲜民主主义人民共和国的研发速度也比其他地方慢一倍。"
 NKO_spa_debuff_agriculture: "自给农场"
 NKO_spa_debuff_agriculture_desc: "合作农场的产量勉强够养活本村村民，城市里则严重缺货。"
 NKO_spa_debuff_foreign: "外交孤立"
 NKO_spa_debuff_foreign_desc: "制裁和被国际社会孤立的地位意味着每一次外交努力都会付出比预期更高的代价，而获得的收益却比预期更少。"
 NKO_spa_debuff_construction: "施工瓶颈"
 NKO_spa_debuff_construction_desc: "国防工程是受影响最严重的领域。堡垒还没完工就坍塌了，雷达桅杆只装了一半电线，海军基地疏浚工程只完成了一半，机场也因为维护不善而坑坑洼洼。"
 NKO_spa_bonus_industry: "工业加速"
 NKO_spa_bonus_industry_desc: "最高人民会议已发布工业指令。民用工厂发展迅速，军工企业随后跟进。"
 NKO_spa_bonus_production: "设备生产指令"
 NKO_spa_bonus_production_desc: "生产线按计划超负荷运转。效率上限被突破；新设备更快投入使用。"
 NKO_spa_bonus_military: "先军决议"
 NKO_spa_bonus_military_desc: "军事优先论盛行。演习日程紧凑，攻击理论日趋完善，党重申其优先事项。"
 NKO_spa_bonus_economy: "主体思想自力更生"
 NKO_spa_bonus_economy_desc: "主体思想自力更生"
 NKO_spa_bonus_research: "研究运动"
 NKO_spa_bonus_research_desc: "所有研究所都在加班加点；机密实验室更是24小时轮班运转。以前需要800天才能完成的技术，现在只需三分之一的时间就能研发出来。"
 NKO_spa_bonus_research_half: "研究运动（收益递减）"
 NKO_spa_bonus_research_half_desc: "各研究所仍在加班加点地工作，但轻松获利的时代已经过去。由于已经掌握了1995年时代的技术，每一次新的突破都需要付出更多努力，回报却更少。加成减半了。"
 NKO_spa_bonus_research_quarter: "研究运动（前沿高地）"
 NKO_spa_bonus_research_quarter_desc: "朝鲜的实验室如今已处于技术前沿。由于2005年的技术已被掌握，单纯依靠蛮力加班只能带来有限的加速。加成缩水至原先的四分之一。"
 NKO_spa_bonus_agriculture: "农业运动"
 NKO_spa_bonus_agriculture_desc: "合作农场超额完成配额，民用短缺缓解，工厂产量小幅增长。"
 NKO_spa_bonus_foreign: "外交政策指令"
 NKO_spa_bonus_foreign_desc: "外交部特使们四处奔走。改善关系成本更低，贸易伙伴对我们也会更加友好。"
 NKO_spa_bonus_construction: "建筑营"
 NKO_spa_bonus_construction_desc: "大规模动员的军事工程部队进驻每一个防御工事。堡垒、雷达站、近程防空阵地、机场、海军基地、燃料筒仓、铁路和补给中心都以前所未有的速度拔地而起。"
 NKO_spa_resolution_industry: "工业加速"
 NKO_spa_resolution_industry_desc: "暂停§R停滞的工业§!，持续§Y120天§!。生效期间：§G+45%§!民用工厂建造速度、§G+30%§!军用工厂建造速度、§G+10%§!民用工厂产出、§G+15%§!基础生产效率。\n\n触发事件链。"
 NKO_spa_resolution_production: "设备生产指令"
 NKO_spa_resolution_production_desc: "暂停§R生产线衰败§!效果§Y120天§!。生效期间：§G+30%§!生产效率上限，§G+15%§!生产效率增长，§G+20%§!基础生产效率效率。\n\n触发事件链。"
 NKO_spa_resolution_military: "先军决议"
 NKO_spa_resolution_military_desc: "暂停§R外强中干的军队§!，持续§Y120天§!。生效期间：陆军攻击§G+15%§!，陆军训练速度§G+30%§!，陆军士气§G+10%§!，陆军组织度§G+5%§!。\n\n触发事件链。"
 NKO_spa_resolution_economy: "主体思想自力更生"
 NKO_spa_resolution_economy_desc: "暂停§R资源囤积§!，持续§Y120天§!。生效期间：§G+50%§!地区资源产量，§G-15%§!生产资源消耗，§G+5%§!每月人口增长。\n\n触发事件链。"
 NKO_spa_resolution_research: "研究运动"
 NKO_spa_resolution_research_desc: "暂停§R研究停滞§!，持续§Y120天§!。生效期间：§G+200%§!研究速度——原本需要800天以上的科技，完成时间将大幅缩短。\n\n触发事件链。\n\n§R高昂代价§!：这是最昂贵的法令，体现了打破制裁与遏制人才流失所需的巨额资源投入。"
 NKO_spa_resolution_agriculture: "农业运动"
 NKO_spa_resolution_agriculture_desc: "暂停§R自给农业§!，持续§Y120天§!。生效期间：§G-30%§!生活消费品工厂系数，§G+15%§!民用工厂产出，§G+10%§!月度人口增长。\n\n触发事件链。"
 NKO_spa_resolution_foreign: "外交政策指令"
 NKO_spa_resolution_foreign_desc: "暂停§R外交孤立§!，持续§Y120天§!。生效期间：改善关系花费§G-75%§!，贸易影响力系数§G+30%§!，每月关系增长§G+25%§!。\n\n触发事件链。"
 NKO_spa_resolution_construction: "建筑营"
 NKO_spa_resolution_construction_desc: "暂停§R施工瓶颈§!，持续§Y120天§!。国防与战略基础设施建设速度提高：§G+60%§! 陆上要塞/海岸要塞/雷达/防空建设速度，§G+55%§! 空军基地/海军基地/燃料库建设速度，§G+50%§! 铁路/补给中心建设速度。\n\n触发事件链。"
 NKO_spa.0.t: "最高人民会议召开"
 NKO_spa.0.d: "总书记同志，内阁已拟定议程。大会已召开。有八个长期存在的问题需要关注；我们可以随时将其中§Y任意两个§!问题置于具有约束力的授权之下。\n\n每项授权有效期为§Y365 天§!；当一项授权到期时，就会空出一个名额给下一项授权。"
 NKO_spa.0.a: "召开大会"
 NKO_spa.20.t: "斯达汉诺夫英雄"
 NKO_spa.20.d: "黄海工业带的工人在新指令实施的头几周内就打破了生产定额。他们的肖像已经挂遍全国，管理者报告称产能激增，将立即投入实际应用。"
 NKO_spa.20.a: "奖励英雄们"
 NKO_spa.21.t: "工艺创新"
 NKO_spa.21.d: "平壤重型机械厂的工程师们设计了一种新的夹具工艺，使装甲车辆生产线的产能翻了一番。每次生产都能一次性生产出75辆最新款的底盘：坦克、步兵战车、装甲运兵车、侦察车或自行火炮，具体取决于当周哪条生产线装载了这些车辆。"
 NKO_spa.21.a: "推广这项技术"
 NKO_spa.22.t: "共和国的英雄"
 NKO_spa.22.d: "一位初级军官在先军演习中的模范领导能力引起了总参谋部的注意。预备役人员受到榜样的鼓舞，纷纷涌向征兵办公室。"
 NKO_spa.22.a: "晋升并为他授勋"
 NKO_spa.23.t: "发现矿藏"
 NKO_spa.23.d: "测绘人员分散至北部山区，发现了一处此前未知的矿脉。初步化验将确定该矿床产出何种战略资源。国家资源局已批准立即开采。"
 NKO_spa.23.a: "开始开采"
 NKO_spa.24.t: "外国科学家叛逃"
 NKO_spa.24.d: "一名外籍工程师已绕过制裁管制，潜入朝鲜某研究中心。其见解正加速国家科学院的一项重点计划。"
 NKO_spa.24.a: "欢迎您，同志"
 NKO_spa.25.t: "丰收"
 NKO_spa.25.d: "咸镜北道的合作农场报告产量远超指标。粮食储备增加；农村征兵办公室挤满了想参军找工作的年轻农工。"
 NKO_spa.25.a: "分配剩余物资"
 NKO_spa.26.t: "外交操作"
 NKO_spa.26.d: "外交部特使利用新指令取得了一项低调的外交胜利——与主要伙伴通过秘密渠道达成让步，从而换取硬通货。"
 NKO_spa.26.a: "收入囊中"
 NKO_spa.27.t: "建设先锋"
 NKO_spa.27.d: "志愿工程营的表现超出了所有预期。由于仍有闲置产能，内阁决定将剩余劳动力投入进度最落后的民用项目。若无法安排就业，则可解散劳工以换取硬通货。"
 NKO_spa.27.factory_take: "建造一座民用工厂"
 NKO_spa.27.factory_cash: "解散劳动力（§Y+0.5§! 国库）"
 NKO_spa.27.offices_take: "建造一个办公园区"
 NKO_spa.27.offices_cash: "解散劳动力（§Y+0.75§! 国库）"
 NKO_spa.27.refinery_take: "建造一座合成炼油厂"
 NKO_spa.27.refinery_cash: "解散劳动力（§Y+0.45§! 国库）"
 NKO_spa.27.agri_take: "建造一个农业区"
 NKO_spa.27.agri_cash: "解散劳动力（§Y+0.45§! 国库）"
 NKO_spa.30.t: "五年计划启动"
 NKO_spa.30.d: "每一座工厂大门前都飘扬着旗帜。最高人民会议已下令，接下来的365天将作为一次微型五年计划，为每个工业区带设定具体的生产指标。"
 NKO_spa.30.a: "执行计划"
 NKO_spa.31.t: "提前完成配额"
 NKO_spa.31.d: "指令执行到一半，大同江沿岸的工厂报告混凝土和钢材浇筑量远超计划。工人突击队正在争当荣誉集体。"
 NKO_spa.31.a: "奖励先进集体"
 NKO_spa.32.t: "创记录工业产值"
 NKO_spa.32.d: "生产指令以在金日成广场举行的胜利集会作为结束。新工业力量增添到共和国的生产能力中，党的威望也再上台阶。"
 NKO_spa.32.a: "庆祝这一成就"
 NKO_spa.33.t: "新装备抵达"
 NKO_spa.33.d: "通过灰色市场渠道，新装备已送达设备工厂。生产主管正按新规格重新培训车间员工。"
 NKO_spa.33.a: "投入生产"
 NKO_spa.34.t: "生产线正常运转"
 NKO_spa.34.d: "平壤和咸兴两大生产线的运转情况达到了十年来最佳水平。次品率下降，成品质量提高。"
 NKO_spa.34.a: "推动进一步完善。"
 NKO_spa.35.t: "质量控制的胜利"
 NKO_spa.35.d: "设备生产指令的最后阶段是州级检查，结果显示质量指标达到了有史以来的最高水平。朝鲜人民军的采购官员对此表示满意。"
 NKO_spa.35.a: "将新标准记录下来。"
 NKO_spa.36.t: "演习强度加大"
 NKO_spa.36.d: "先军正值高峰期。所有部队的操练节奏都加快了一倍。暂停多年的实弹演习也重新启动。"
 NKO_spa.36.a: "加强对部队的训练。"
 NKO_spa.37.t: "军官团表现出色"
 NKO_spa.37.d: "在强化训练制度下，新一代连级和营级军官脱颖而出。晋升也沿着指挥链向上层层传递。"
 NKO_spa.37.a: "奖励和晋升。"
 NKO_spa.38.t: "先军胜利"
 NKO_spa.38.d: "先军决议以在平壤举行的伟大胜利阅兵式落下帷幕。预备役人员的征召使军队补充充足；朝鲜人民军达到了多年来的最强状态。"
 NKO_spa.38.a: "列队行进。"
 NKO_spa.39.t: "矿产勘测开始"
 NKO_spa.39.d: "地质勘测队分散到北部山区。尘封已久的苏联时期地图被重新翻出，并用现代仪器进行了更新。"
 NKO_spa.39.a: "批准勘测。"
 NKO_spa.40.t: "矿业产出提高"
 NKO_spa.40.d: "新的勘探引导矿工们找到了更高品位的矿脉。煤炭、菱镁矿和稀土产量均大幅增长。"
 NKO_spa.40.a: "紧抓优势"
 NKO_spa.41.t: "自给自足"
 NKO_spa.41.d: "主体思想指导下的自力更生目标圆满完成，出口潜力得到激发，外汇储备充实。总书记同志，共和国屹立不倒。"
 NKO_spa.41.a: "深挖洞广积粮"
 NKO_spa.42.t: "重启实验室"
 NKO_spa.42.d: "国家科学院接到指令：所有优先项目均已解锁，所有机密文件均可查阅。等待审批多年的研究人员一夜之间获得了推进新研究的授权。"
 NKO_spa.42.a: "为前沿研究铺路"
 NKO_spa.43.t: "停滞计划重回正轨"
 NKO_spa.43.d: "国家科学院多项长期停滞的计划接连取得突破。总参谋部听取了本次取得进展的各学科汇报。"
 NKO_spa.43.a: "向总参谋部汇报。"
 NKO_spa.44.t: "迎头赶上"
 NKO_spa.44.d: "本轮科研运动结束，朝鲜民主主义人民共和国已比1970年代以来的任何时期都更接近技术前沿。党以低调的姿态庆祝了这场胜利。"
 NKO_spa.44.a: "重获优势"
 NKO_spa.45.t: "春季播种开始"
 NKO_spa.45.d: "全国各地的合作农场正积极动员，迎接忙碌的种植季节。来自城市的志愿队伍为农村劳动力提供了有力支援。"
 NKO_spa.45.a: "动员群众"
 NKO_spa.46.t: "夏季田间管理"
 NKO_spa.46.d: "季中检查显示，农田状况比往年更好。灌溉渠道畅通，来自中国的农药储备也已到位。"
 NKO_spa.46.a: "继续努力"
 NKO_spa.47.t: "丰收"
 NKO_spa.47.d: "收成比计划高出20%。粮食储备增加。得益于此，一些地区数年来首次实行了全额配给。"
 NKO_spa.47.a: "分配剩余物资"
 NKO_spa.48.t: "外事活动"
 NKO_spa.48.d: "朝鲜代表团悄悄地被派往友好国家的首都，带着优惠条件和谨慎的要求：北京、莫斯科、德黑兰、大马士革。"
 NKO_spa.48.a: "派遣使节"
 NKO_spa.49.t: "秘密外交渠道"
 NKO_spa.49.d: "数个代表团带回了秘密协定：空壳公司合资项目、基础设施贷款，以及来自友好外方伙伴的低调股权投资。制裁执行力度较以往有所松缓。"
 NKO_spa.49.a: "清点成果"
 NKO_spa.50.t: "贸易特许"
 NKO_spa.50.d: "外交政策指令以一系列显著改善外资流入的新安排收尾。未来十年的投资承诺已经敲定。"
 NKO_spa.50.a: "合作愉快"
 NKO_spa.51.t: "动员建设先锋"
 NKO_spa.51.d: "建设兵团授权对各个派系来说都算得上意外之财，而其分配权力由内阁掌握。党可以将这笔政治红利导向一个比其他派系更需拉拢的派系。"
 NKO_spa.51.military: "授权§Y军队§!（§G+15§!关系）"
 NKO_spa.51.cadres: "授权§Y共产党干部§!（§G+15§!关系）"
 NKO_spa.51.donju: "授权§Y金主§!（§G+15§!关系）"
 NKO_spa.51.farmers: "授权§Y农民§!（§G+15§!关系）"
 NKO_spa.51.labour: "授权§Y工会§!（§G+15§!关系）"
 NKO_spa.51.none: "获取政治声望（§G+25政治点数§!）"
 NKO_spa.52.t: "共和国各地掀起建设风潮"
 NKO_spa.52.d: "每个省份都在进行建设。道路平整，铁路支线焊接，电力线路重新架设。这类不起眼的基建工程会持续数十年。"
 NKO_spa.52.a: "井井有条"
 NKO_spa.53.t: "项目完成"
 NKO_spa.53.d: "建设兵团授权在共和国全国播出的剪彩仪式中落下帷幕。党收获了政治红利；民众情绪趋于稳定；国库也因项目盈余而获得一笔意外之财。"
 NKO_spa.53.a: "剪彩庆祝"
