 tank_diesel_engine_gen8_desc: "X12 전차 엔진에 하이퍼차저를 장착하면 엔진 성능을 상상 이상으로 끌어올릴 수 있습니다. 속도와 파워!\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen9: "울트라차저 X12 엔진"
