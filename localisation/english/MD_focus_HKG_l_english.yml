 #Event
 hongkong.8.t: "The Dragen Year"
 hongkong.8.d: "Three years have passed since the reunification with the mainland. Hong Kong has weathered the Asian financial crisis without the decline the West predicted. As the new millennium dawns, the city will continue to prove that integration with China is no bad thing."
 hongkong.8.a: "San Nin Faa Lok! (Happy New Year!)"
 hongkong.9.t: "Hong Kong Seeks Our Hardware"
 hongkong.9.d: "The Hong Kong Police Force has placed an order for Chinese-manufactured small arms. The volume is modest, but the symbolism is large: this is the first formal HKG security procurement from a mainland supplier. State media is already framing the deal as a sign of the SAR's growing trust in the motherland's industry."
 hongkong.9.a: "Approve at favorable rates"
 hongkong.9.b: "Use the moment for state propaganda"
 hongkong.13.t: "Beijing Responds"
 hongkong.13.d: "A month after the LegCo's appeal for the release of mainland dissidents, the Liaison Office issues a sharp rebuke. State media accuses Hong Kong politicians of \"interfering in the internal affairs of the People's Republic.\" A handful of low-profile detainees are quietly released; many more remain behind bars. The pan-democrat camp is furious, the patriotic camp triumphant."
 hongkong.13.a: "Welcome the partial releases"
 hongkong.13.b: "Condemn Beijing's rebuke"
 hongkong.13.c: "Drop the matter quietly"
 HKG_aukus_request_tt: "§Y[ROOT.GetNameDef]§! will §Yrequest§! intelligence-sharing access from §H[ENG.GetName]§!, §H[USA.GetName]§! and §H[AST.GetName]§! — they may decline."
 HKG_uk_garrison_request_tt: "§H[ENG.GetName]§! will be invited to station forces in Hong Kong — they may decline."
 hongkong.14.t: "The Hong Kong Question"
 hongkong.14.d: "Two million on the streets of Hong Kong. The anti-extradition movement has shaken the SAR's political order to its core. Pro-Beijing officials are demanding firmer action; pragmatists in the State Council warn that overreach will scare off foreign capital. The Politburo Standing Committee will decide how to respond."
 hongkong.14.a: "Tighten our grip — formal puppet status"
 hongkong.14.b: "Show restraint — preserve the framework"
 hongkong.15.t: "Hong Kong Seeks AUKUS Access"
 hongkong.15.d: "Hong Kong's pro-Western government has formally requested intelligence-sharing and basing access. The strategic value of a friendly port at China's southern edge is substantial — but Beijing will see it as a hostile act, and the security implications cut both ways. The question goes to the National Security Council."
 hongkong.15.a: "Grant access — Hong Kong is a strategic asset"
 hongkong.15.b: "Decline — keep Beijing at arm's length"
 hongkong.16.t: "Hong Kong Invites a British Garrison"
 hongkong.16.d: "The Hong Kong government has formally invited the United Kingdom to re-establish a permanent military garrison in the SAR. The symbolism would be extraordinary; the diplomatic fallout with Beijing, severe. The Defence Secretary's brief lands on the Cabinet table."
 hongkong.16.a: "Accept — restore the British presence"
 hongkong.16.b: "Decline — the diplomatic cost is too high"
 hongkong.10.t: "The Hong Kong Government requires us to whether universal suffrage could be achieved in the next election."
 hongkong.10.d: "According to the Basic Law of Hong Kong, the first two terms Chief Executives and the first three terms of the Legislative Council of Hong Kong were nominated and elected by the Election Committee, not by universal suffrage. The 2007 Chief Executive Election and the 2008 LegCo Election will be an opportunity to determine whether we should reform Hong Kong's democratic system, so that Hong Kong can ultimately achieve the goal of universal suffrage."
 hongkong.10.a: "Hong Kong's electoral system will maintain the status quo."
 hongkong.10.b: "We don't quite agree with directly universal suffrage, but we'll support some gradual and orderly electoral reforms."
 hongkong.10.c: "Might as well get radical and just allow universal suffrage!"
 hongkong.11.t: "The PCCW merges with The HKT"
 hongkong.11.d: "Recently, Cable & Wireless announced its plan to sell Hong Kong Telecom to SingTel, despite objections from the Chinese mainland government. However, PCCW, owned by Li Tzar-kai, the son of Li Ka-shing, also participated in the bidding and ultimately won. Following the announcement of PCCW's merger with Hong Kong Telecom, PCCW's share price soared from a few cents to HK$28.50 by the close of trading on the same day, and its market capitalisation once exceeded HK$250 billion."
 hongkong.11.a: "The internet is such a great thing!"
 hongkong.12.t: "The Impact of the Dot-com bubble Burst"
 hongkong.12.d: "As the dot-com bubble burst, PCCW's stock price, which had just completed a merger a few months earlier, plummeted by 98%, resulting in significant negative equity. PCCW had no choice but to plan the sale of its core business to alleviate its financial difficulties."
 hongkong.12.a: "New millennium, new problems."

 hongkong_legco.1.t: "The Seats of [GetYear] LegCo"
 hongkong_legco.1.d: "The Legislative Council convenes for the new term. Geographic and functional constituency seats have been tallied and the chamber's working majorities are now known. Motion votes will require [?HKG_legco_required_seats] seats to pass; constitutional motions will require [?HKG_legco_specially_required_seats]."
 hongkong_legco.1.a: "Got it."
 hongkong_legco.2.t: "The motion of increasing £political_power_texticon §YBureaucracy§! Spending has been passed"
 hongkong_legco.2.d: "Today, after several rounds of elections in LegCo, the motion to increase bureaucratic spending has been passed."
 hongkong_legco.2.a: "Democracy of Hong Kong continues to serve the people."
 hongkong_legco.3.t: "The motion of decreasing £political_power_texticon §YBureaucracy§! Spending has been passed"
 hongkong_legco.3.d: "Today, after several rounds of elections in LegCo, the motion to decrease bureaucratic spending has been passed."
 hongkong_legco.3.a: "Democracy in Hong Kong continues to serve the people."
 hongkong_legco.4.t: "The motion of changing £political_power_texticon §YBureaucracy§! Spending has been denied"
 hongkong_legco.4.d: "Today, after several rounds of elections in LegCo, the motion to change bureaucratic spending has been denied."
 hongkong_legco.4.a: "They'll change their minds in the future."
 hongkong_legco.5.t: "The motion of increasing £foreign_influence_defense_modifier_texticon §CSecurity§! Funding has been passed"
 hongkong_legco.5.d: "After heated debate the LegCo has approved the increase in security and policing funding. Pro-establishment parties argue the city is safer for it; pan-democrats warn of an emerging surveillance apparatus."
 hongkong_legco.5.a: "A vote for stability."
 hongkong_legco.6.t: "The motion of decreasing £foreign_influence_defense_modifier_texticon §CSecurity§! Funding has been passed"
 hongkong_legco.6.d: "The LegCo has voted to trim the security and policing budget. Civil libertarians applaud; the patriotic camp warns Beijing will read this as a provocation."
 hongkong_legco.6.a: "Less force, more freedom."
 hongkong_legco.7.t: "The motion of changing £foreign_influence_defense_modifier_texticon §CSecurity§! Funding has been denied"
 hongkong_legco.7.d: "The motion to change security funding failed to clear the LegCo. The status quo holds — for now."
 hongkong_legco.7.a: "Another time, perhaps."
 hongkong_legco.8.t: "The motion of increasing £research_speed_texticon §GEducation§! Budget has been passed"
 hongkong_legco.8.d: "The LegCo has approved a substantial boost to the education budget. Universities and primary schools alike will see new funding; Beijing's mainland-curriculum advocates may see this as an opportunity."
 hongkong_legco.8.a: "An investment in tomorrow."
 hongkong_legco.9.t: "The motion of decreasing £research_speed_texticon §GEducation§! Budget has been passed"
 hongkong_legco.9.d: "The LegCo has voted to trim education spending. Teachers' unions are furious; the Financial Secretary points to fiscal discipline as the priority."
 hongkong_legco.9.a: "Discipline now, growth later."
 hongkong_legco.10.t: "The motion of changing £research_speed_texticon §GEducation§! Budget has been denied"
 hongkong_legco.10.d: "The motion to change the education budget failed to clear the LegCo. Schools and universities will continue under the existing allocation."
 hongkong_legco.10.a: "The current path holds."
 hongkong_legco.11.t: "The motion of increasing £population_texticon §RHealthcare§! Funding has been passed"
 hongkong_legco.11.d: "The Hospital Authority will receive a substantial funding increase. Public hospitals can finally address staffing shortages and waiting lists."
 hongkong_legco.11.a: "A healthier Hong Kong."
 hongkong_legco.12.t: "The motion of decreasing £population_texticon §RHealthcare§! Funding has been passed"
 hongkong_legco.12.d: "The LegCo has voted to reduce healthcare funding. Doctors warn of longer queues; private medicine prepares to absorb the displaced demand."
 hongkong_legco.12.a: "The market will fill the gap."
 hongkong_legco.13.t: "The motion of changing £population_texticon §RHealthcare§! Funding has been denied"
 hongkong_legco.13.d: "The motion to alter healthcare funding has been blocked in the LegCo. The Hospital Authority will continue under its current budget."
 hongkong_legco.13.a: "Status quo prevails."
 hongkong_legco.14.t: "The motion of increasing £consumer_goods_texticon §nPension§! Spending has been passed"
 hongkong_legco.14.d: "The LegCo has approved an expansion of the pension and welfare scheme. The grey vote celebrates; business chambers warn of long-term fiscal strain."
 hongkong_legco.14.a: "Care for our elders."
 hongkong_legco.15.t: "The motion of decreasing £consumer_goods_texticon §nPension§! Spending has been passed"
 hongkong_legco.15.d: "The LegCo has narrowly voted to trim pension and welfare spending. Pensioner advocacy groups have called for protests; the Treasury insists the cuts are sustainable."
 hongkong_legco.15.a: "Tighten the belt."
 hongkong_legco.16.t: "The motion of changing £consumer_goods_texticon §nPension§! Spending has been denied"
 hongkong_legco.16.d: "The motion to alter pension and welfare spending failed to clear the LegCo. Existing entitlements remain in place."
 hongkong_legco.16.a: "The grey vote holds firm."

 hongkong_news.4.t: "123 Democratic Alliance is disbanded today."
 hongkong_news.4.d: "Established in 1994 by a group of pro-Taiwan, pro-democracy and pro-business politicians, the 123 Democratic Alliance was dissolved because lacking of financial support from the Taiwan government, after the Kuomintang's defeat in its presidential election."
 hongkong_news.4.a: "A good news, isn't it?"
 hongkong_news.4.b: "Got it."
 hongkong_news.5.t: "SARS Outbreak"
 hongkong_news.5.d: "An outbreak of a severe pneumonia virus known as \"SARS\" has occurred in Guangdong and Hong Kong. Despite claims by mainland officials that it has been effectively contained, the outbreak continues in Hong Kong. The WHO has now issued a travel warning to Southern China and Hong Kong. It says it poses a world health threat. So far one person has died as a result. The Hong Kong government has begun mandatory quarantine measures for those suspected of being infected."
 hongkong_news.5.a: "Our tourism sector is in trouble."
 hongkong_news.5.b: "Arrest the incompetent officials and deal with the outbreak in a transparent manner." #for china
 hongkong_news.5.c: "We need to continue to hide the real data to maintain social stability." #for china
 hongkong_news.5.e: "A worrying development." #for other countries
 hongkong_news.6.t: "The Passing of Leslie Cheung"
 hongkong_news.6.d: "The world-renowned Hong Kong singer, actor and icon Leslie Cheung committed suicide at the age of 46 by jumping from a building at the Mandarin Hotel in Hong Kong due to depression. Leslie Cheung won the hearts of countless fans with his heartfelt songs, superb acting skills and unique personal charisma. And his passing shocked the entire Chinese community, with many people deeply saddened and lost.\n\nLeslie Cheung's passing is not only a significant loss to the entertainment industry but also a cultural and spiritual blow. His music and film works will continue to influence and inspire future artists and audiences, but his absence will forever leave an unfillable void."
 hongkong_news.6.a: "We lost a great artist today."
 hongkong_news.7.t: "The Passing of Anita Mui"
 hongkong_news.7.d: "Anita Mui Yim-fong, widely known as the \"Madonna of Asia\", has passed away at the age of 40 after a courageous battle with cervical cancer.\n\nBorn in 1963, Anita Mui rose to fame in the 1980s, becoming a pivotal figure in the Cantopop scene and leaving a lasting legacy on millions of fans. Her dedication to charity and her unwavering strength in the face of illness earned her deep admiration. As the news of her passing spreads, a somber mood blankets the nation, with people coming together to honor the beloved \"Daughter of Hong Kong.\""
 hongkong_news.7.a: "The end of a great era."
 hongkong_news.8.t: "Severe Tropical Storm Utor"
 hongkong_news.8.d: "On July 4 at 5:45 PM, Typhoon Yuet entered the 800-kilometer warning zone, prompting the Hong Kong Observatory to issue a Standby Signal No.1. On July 5 at 7:30 PM, the signal was upgraded to Gale Or Storm Signal No.8, marking the first issuance of this signal in the 21st century. Due to storm surges, the combination of the storm surge and the normal high tide on that morning resulted in a sea level of 3.4 meters recorded at Quarry Bay, the highest since Typhoon Wanda hit Hong Kong in 1962. This led to severe flooding in Tai O and the northwestern New Territories on July 6. Some main streets in Tai O turned into rivers, with water depths reaching up to three meters. The seafood wholesale market in Lau Fau Shan was also flooded, forcing many shops to close." #7月4日下午5时45分，尤特进入800公里警戒线，香港天文台悬挂一号戒备信号。7月5日晚上7时30分改挂八号烈风或暴风信号，成为21世纪以来天文台首次八号烈风或暴风信号。受风暴潮影响，风暴潮加在该日早上的正常涨潮，令鲗鱼涌测得3.4米海平面高度。成为自1962年台风温黛袭港以来维港测得的最高海平面高度。引致7月6日在大澳及新界西北地区严重洪涝。大澳部分主要街道变为河道，水深一度达三米。流浮山海鲜批发市场亦被海水淹浸，众多商铺被逼关闭。
 hongkong_news.8.a: "The Observatory has done its job."
 hongkong_news.9.t: "Severe Tropical Storm Yutu (Moon Rabbit)"
 hongkong_news.9.d: "Tropical Storm Yutu has crossed into the Hong Kong Observatory's warning zone, prompting a Standby Signal No.1. Public transport timetables have been adjusted, schools placed on storm watch, and the city's drainage and emergency services have been activated. The Observatory expects the worst over the next twenty-four hours."
 hongkong_news.9.a: "Hunker down and wait it out."
 HKG_gen.1.t: "Two Systems, One Future?"
 HKG_gen.1.d: "The handover settled the constitutional question, but daily friction grows. Pan-democrats demand a clear timetable for universal suffrage. The pro-Beijing camp counsels patience and gratitude. Business chambers want only stability. The Basic Law is in force; how it lives is now the question."
 HKG_gen.1.a: "Trust the framework to mature"
 HKG_gen.1.b: "Mediate between the rival camps"
 HKG_gen.1.c: "Side firmly with the patriotic camp"
 HKG_gen.2.t: "Justice Cannot Wait"
 HKG_gen.2.d: "Tens of thousands gather in Victoria Park demanding accountability for the Tiananmen massacre. The Liaison Office expresses \"grave concern\" and warns against \"externally directed political theatre.\" Beijing summons our officials for urgent consultation. The streets are watching what we do next."
 HKG_gen.2.a: "Stand publicly with the protesters"
 HKG_gen.2.b: "Counsel restraint to the crowds"
 HKG_gen.3.t: "After the Law"
 HKG_gen.3.d: "The National Security Law has reshaped the city overnight. Apple Daily has closed. Prominent activists are in custody or in exile. Schools are revising their curricula. Foreign chambers of commerce are quietly polling their members about Singapore. The question now is how to manage what comes next."
 HKG_gen.3.a: "Force the dissident leadership into retirement"
 HKG_gen.3.b: "Impose a city-wide curfew"
 HKG_gen.4.t: "The Streets Speak"
 HKG_gen.4.d: "From Causeway Bay to Mong Kok, the marches multiply. Yellow umbrellas appear at every intersection. The pan-democrat camp has found its loudest voice in decades, and the LegCo galleries are full every session. The government cannot simply ignore the current."
 HKG_gen.4.a: "Endorse the movement openly"
 HKG_gen.4.b: "Call for moderation and dialogue"
 HKG_gen.4.c: "Distance the government from street politics"
 HKG_gen.5.t: "Capital Takes Flight"
 HKG_gen.5.d: "Goldman Sachs is shifting senior staff to Singapore. HSBC has begun a quiet review of its Asian headquarters. The Hang Seng has tumbled three sessions running, and the property market is following. Hong Kong's status as Asia's financial gateway is no longer a given."
 HKG_gen.5.a: "Court mainland capital to fill the void"
 HKG_gen.5.b: "Offer tax cuts to retain departing firms"
 HKG_gen.5.c: "Accept the loss and pivot to tourism and services"

 #Opinion Modifier
 HKG_european_bussiness_opinion: "Improve Trade with European Bussinessmen"
 HKG_chinese_entrepreneurs_opinion: "Improve Trade with Our Mainland Entrepreneurs"
 #Focuses
 HKG_one_country_two_systems: "One Country, Two Systems"
 HKG_one_country_two_systems_desc: "The constitutional promise that defined Hong Kong's handover. But how long can the firewall hold?"
 HKG_protest_movement_rises: "The Protests Begin"
 HKG_protest_movement_rises_desc: "Hundreds of thousands pour into the streets. The world is watching. Beijing is watching too."
 HKG_loyalist_consolidation: "Loyalist Consolidation"
 HKG_loyalist_consolidation_desc: "Pro-Beijing factions tighten their grip on the Legislative Council and civil service appointments."
 HKG_umbrella_revolution: "The Umbrella Revolution"
 HKG_umbrella_revolution_desc: "Students and activists occupy the city's main arteries. Yellow umbrellas become the symbol of a generation's hopes."
 HKG_democratic_opposition_network: "Democratic Opposition Network"
 HKG_democratic_opposition_network_desc: "Pan-democratic parties and civil society groups form a broad coalition to contest Beijing's encroachments."
 HKG_nsl_imposed: "National Security Law"
 HKG_nsl_imposed_desc: "Beijing bypasses the Legislative Council entirely. Overnight, protest, subversion, secession and collusion with foreign forces become crimes punishable by life imprisonment."
 HKG_press_freedom_crackdown: "Silencing the Press"
 HKG_press_freedom_crackdown_desc: "Apple Daily is raided and shuttered. RTHK editorial independence is stripped. The last free voices are extinguished."
 HKG_police_state_apparatus: "Iron Fist Policing"
 HKG_police_state_apparatus_desc: "The police force expands its powers under NSL provisions. Riot squads, undercover operations, and mass arrests become routine."
 HKG_dialogue_with_protesters: "Dialogue Commission"
 HKG_dialogue_with_protesters_desc: "A last desperate attempt at mediation before the crackdown becomes total. Independent observers are invited to review police conduct."
 HKG_anti_extradition_bill: "The Extradition Bill Crisis"
 HKG_anti_extradition_bill_desc: "A proposed law allowing extradition to mainland China ignites the largest protests in Hong Kong's history — two million march."
 HKG_youth_resistance_cells: "Youth Resistance"
 HKG_youth_resistance_cells_desc: "Valiant young Hongkongers form frontline units. The black-clad generation fights with petrol bombs and umbrellas against tear gas and rubber bullets."
 HKG_emigration_wave: "The Great Exodus"
 HKG_emigration_wave_desc: "Hundreds of thousands leave for the UK, Canada, and Australia under BN(O) schemes. Hong Kong haemorrhages its professional class."
 HKG_preserve_financial_hub: "Preserve the Financial Hub"
 HKG_preserve_financial_hub_desc: "Business elites lobby Beijing: Hong Kong's value lies in its distinct legal framework and international connections. Destroy that, destroy everything."
 HKG_foreign_business_exodus: "Foreign Capital Flight"
 HKG_foreign_business_exodus_desc: "Banks, law firms, and multinationals quietly move regional headquarters to Singapore and Tokyo. The financial crown slips."
 HKG_western_sanctions_threat: "Western Sanctions Threat"
 HKG_western_sanctions_threat_desc: "The US, UK, and EU review Hong Kong's special trading status. The city's privileged access to Western markets hangs in the balance."
 HKG_deeper_mainland_integration: "Deeper Mainland Integration"
 HKG_deeper_mainland_integration_desc: "The Greater Bay Area initiative draws Hong Kong into China's economic orbit. Infrastructure, finance, and governance slowly converge."
 HKG_patriotic_education: "Patriotic Education"
 HKG_patriotic_education_desc: "A new curriculum rewrites history. The next generation will be taught that Hong Kong has always been, and always will be, Chinese."
 HKG_last_stand_opposition: "The Last Democratic Stand"
 HKG_last_stand_opposition_desc: "Surviving pro-democracy figures refuse to be silenced. From exile in London and Washington they continue to lobby the world, knowing they may never come home."
 HKG_absorption_complete: "Absorption Complete"
 HKG_absorption_complete_desc: "One country. One system. The experiment is over. Hong Kong's unique identity exists now only in memory and diaspora."
 HKG_city_of_resistance: "City of Resistance"
 HKG_city_of_resistance_desc: "Against all odds, the spirit of resistance endures. Hong Kong becomes a symbol for democracies worldwide — proof that some things are worth fighting for even when the odds are impossible."
 HKG_silenced_press: "Silenced press"
 HKG_silenced_press_desc: "We will be silencing the press will allow faster integration but we must act fast or the country will revolt."
 HKG_mainland_integration: "Mainland Integration"
 HKG_mainland_integration_desc: "Integrate the with the Main land by reducing our autonomy but give us the ability to gain more money and spend less on our security."
 HKG_brain_drain: "Brain Drain"
 HKG_brain_drain_desc: "We must Drain all our resources to defend our land."

 ##########Focuses - HKG##########
 HKG_annexation: "The Model SAR"
 HKG_annexation_desc: "Hong Kong has become Beijing's exemplar Special Administrative Region - obedient, prosperous, integrated. The Politburo rewards loyalty with preferential trade access, mainland workforce flows, and infrastructure investment. The privileges hold for as long as Hong Kong remains a part of the People's Republic."

 #Phase 2 - Branch 1: Democratic Reform
 HKG_democratic_reform_initiative: "Democratic Reform Initiative"
 HKG_democratic_reform_initiative_desc: "The peaceful path bore fruit. With civil society organised, the press protected and the LegCo opening up, the SAR commits formally to a programme of democratic reform. The institutions exist; now they will be strengthened."
 HKG_universal_suffrage_amendment: "Universal Suffrage Amendment"
 HKG_universal_suffrage_amendment_desc: "Every adult Hongkonger gets a vote, every elected office gets contested, and the nominating committee is dissolved. The amendment passes the LegCo and is enshrined as a constitutional right. Beijing protests; Hong Kong celebrates."
 HKG_independent_judiciary_reform: "Independent Judiciary Reform"
 HKG_independent_judiciary_reform_desc: "The Court of Final Appeal is freed from political vetoes, prosecutors operate at arm's length from the executive, and judicial appointments are reviewed by an independent commission. A judiciary worthy of the rule of law it interprets."
 HKG_freedom_of_information_act: "Freedom of Information Act"
 HKG_freedom_of_information_act_desc: "Government files become accessible to the public by default. Whistleblowers gain statutory protection. The Silenced Press idea is rolled back, and journalism in Hong Kong becomes the rarest thing in the region: a free press in a Chinese city."
 HKG_democratic_consolidation: "Democratic Consolidation"
 HKG_democratic_consolidation_desc: "Universal suffrage, an independent judiciary and a free press now reinforce one another. Hong Kong stands as the most democratic Chinese society in history. The reforms are not reversible by ordinance; they are the new foundation."

 #Phase 2 - Branch 2: Infrastructure
 HKG_infrastructure_megaproject: "Infrastructure Megaproject"
 HKG_infrastructure_megaproject_desc: "The Lands Department draws up a master plan: the next decade of Hong Kong's growth depends on building outward, upward, and underground. The treasury opens. The contracts are signed. The cranes arrive."
 HKG_mtr_expansion_phase_2: "MTR Expansion Phase 2"
 HKG_mtr_expansion_phase_2_desc: "Extensions to the West Rail Line, the Shatin-Central Link, and a long-promised North Island corridor. Commute times drop, property values rise along the new stations, and the MTR network reaches districts that have been waiting since the British era."
 HKG_third_runway_chek_lap_kok: "Third Runway at Chek Lap Kok"
 HKG_third_runway_chek_lap_kok_desc: "The reclamation work alone takes years and the cost is staggering, but Hong Kong International cannot remain a two-runway airport while Singapore and Shanghai expand. The third runway secures the city's place as a regional aviation hub."
 HKG_lantau_tomorrow_vision: "Lantau Tomorrow Vision"
 HKG_lantau_tomorrow_vision_desc: "The most ambitious reclamation project in Hong Kong's history: artificial islands east of Lantau, housing for hundreds of thousands, a new central business district. Environmentalists object; the housing-poor cheer. The political cost is real, the gain in usable land is enormous."
 HKG_smart_city_initiative: "Smart City Initiative"
 HKG_smart_city_initiative_desc: "Citywide 5G, integrated traffic management, digital identity for every resident, and a public-services API that lets startups build on top of the SAR's data. Hong Kong leapfrogs from prosperous to programmable."
 HKG_world_class_infrastructure: "World-Class Infrastructure"
 HKG_world_class_infrastructure_desc: "Roads, rails, harbour, airport, fibre and reclaimed land all upgraded in concert. The infrastructure of a city built for the second half of the twenty-first century, finally delivered."

 #Phase 2 - Branch 3: Healthcare
 HKG_hospital_authority_reform: "Hospital Authority Reform"
 HKG_hospital_authority_reform_desc: "The Hospital Authority is restructured for transparency, efficiency, and outcomes-based funding. Wait times begin to fall, the disconnect between public and private care narrows, and the groundwork for a modern system is laid."
 HKG_pandemic_preparedness: "Pandemic Preparedness"
 HKG_pandemic_preparedness_desc: "SARS taught the city a brutal lesson; the new Centre for Health Protection makes sure it sticks. Stockpiled PPE, contact-tracing capacity, and integrated surveillance with the WHO. The next outbreak will not catch Hong Kong off guard."
 HKG_chinese_medicine_integration: "Chinese Medicine Integration"
 HKG_chinese_medicine_integration_desc: "Traditional Chinese Medicine is folded into the public health system: regulated practitioners, hospital wings, university research grants. Patients who want both worlds get both worlds, and Beijing notices the cultural respect."
 HKG_universal_healthcare_voucher: "Universal Healthcare Voucher"
 HKG_universal_healthcare_voucher_desc: "Every resident receives an annual voucher redeemable at public or private clinics. Coverage becomes universal in practice as well as in name, and the working poor stop choosing between rent and a doctor's visit."
 HKG_public_health_modernisation: "Public Health Modernisation"
 HKG_public_health_modernisation_desc: "New cancer centres, expanded mental health services, modernised hospitals across the New Territories. The medicine itself catches up with the institutional reform."
 HKG_healthcare_excellence: "Healthcare Excellence"
 HKG_healthcare_excellence_desc: "Hong Kong's life expectancy is already among the world's highest; the system that produced it is now worthy of that statistic. A model that surrounding regions begin to study and imitate."

 #Phase 2 - Branch 4: Labor
 HKG_labour_reform_charter: "Labour Reform Charter"
 HKG_labour_reform_charter_desc: "The first comprehensive review of Hong Kong's labour code in decades. Sweatshops, unpaid overtime, dormitory abuses, and informal-sector exploitation get named, measured, and put on the legislative calendar. The trade unions take notice."
 HKG_minimum_wage_ordinance: "Minimum Wage Ordinance"
 HKG_minimum_wage_ordinance_desc: "A statutory minimum wage, adjusted biennially. The conglomerates protest about competitiveness; the cleaners and restaurant workers see their pay packets grow for the first time in a generation."
 HKG_collective_bargaining_rights: "Collective Bargaining Rights"
 HKG_collective_bargaining_rights_desc: "Trade unions get statutory recognition, collective contracts get legal teeth, and the right to strike is codified rather than tolerated. The Confederation of Trade Unions becomes a genuine counterweight to the chambers of commerce."
 HKG_foreign_domestic_helpers_protections: "Foreign Domestic Helper Protections"
 HKG_foreign_domestic_helpers_protections_desc: "Live-in domestic workers, mostly Filipina and Indonesian, gain enforceable protections against the worst employer abuses. Mandatory days off, transparent contract terms, and a regulator with actual teeth. A long-overdue acknowledgement that they are workers, not servants."
 HKG_pension_scheme_reform: "Pension Scheme Reform"
 HKG_pension_scheme_reform_desc: "The Mandatory Provident Fund's worst features - high fees, employer-offset clawbacks, contribution gaps - are reformed. Old-age poverty in Hong Kong stops being a quiet scandal."
 HKG_labour_dignity: "Labour Dignity"
 HKG_labour_dignity_desc: "A statutory floor under wages, recognised unions, protected helpers, and a pension that actually pensions. Working in Hong Kong becomes, at last, something resembling dignified employment."

 #Phase 2 - Branch 5: Financial Extension
 HKG_renminbi_offshore_hub: "Renminbi Offshore Hub"
 HKG_renminbi_offshore_hub_desc: "Beijing entrusts Hong Kong with the largest pool of offshore renminbi in the world. Dim Sum bond issuance, currency swaps, and clearing services for the entire region run through Central. Closeness to the mainland pays."
 HKG_belt_and_road_financing: "Belt and Road Financing"
 HKG_belt_and_road_financing_desc: "Hong Kong becomes the financial gateway for Belt and Road infrastructure across Eurasia. Project finance, bond syndication, dispute resolution - the SAR's expertise gets exported alongside Chinese capital."
 HKG_green_finance_centre: "Green Finance Centre"
 HKG_green_finance_centre_desc: "The HKEX launches a green-bond board, the SFC issues climate-disclosure rules with teeth, and Hong Kong positions itself as Asia's gateway for ESG capital. European pension funds notice. So do the renewables developers."
 HKG_fintech_revolution: "Fintech Revolution"
 HKG_fintech_revolution_desc: "Virtual banking licences, regulatory sandboxes, and a faster-payments system that finally drags retail finance into the digital era. The next generation of financial firms is born in Cyberport, not Central."
 HKG_global_wealth_management: "Global Wealth Management"
 HKG_global_wealth_management_desc: "Renminbi clearing, green capital, fintech rails - Hong Kong stands at the centre of all three. The world's wealth manages itself through the SAR. The fees alone would justify the city's existence."

 #Phase 2 - Branch 6: Tourism / Cultural
 HKG_tourism_board_revival: "Tourism Board Revival"
 HKG_tourism_board_revival_desc: "Post-handover, post-SARS, post-everything, the Tourism Board reboots: better marketing, expanded visitor services, a coherent brand for the city beyond \"Asia's World City\" platitudes. The visitors notice."
 HKG_disney_hong_kong: "Hong Kong Disneyland"
 HKG_disney_hong_kong_desc: "Lantau Island plays host to the smallest of the Disney parks - and the most accessible to mainland tourists. The construction bill is steep, the ribbon-cutting is glittering, and the SAR gets a family-friendly anchor for its tourism economy."
 HKG_cantopop_revival: "Cantopop Revival"
 HKG_cantopop_revival_desc: "A wave of public investment, broadcaster quotas, and music-festival underwriting brings Cantonese-language popular music back to commercial relevance. The cultural confidence that Cantopop once embodied returns with the music."
 HKG_film_industry_renaissance: "Film Industry Renaissance"
 HKG_film_industry_renaissance_desc: "The TVB studios expand, indie auteurs find financing, and Hong Kong cinema rediscovers the swagger it had in the eighties and nineties. Not just martial arts and crime - serious drama, family comedy, and a generation of new directors with stories to tell."
 HKG_west_kowloon_cultural_district: "West Kowloon Cultural District"
 HKG_west_kowloon_cultural_district_desc: "M+, the Palace Museum, Xiqu Centre and a dozen smaller institutions on what used to be reclaimed land. A genuine cultural quarter that lets the city tell itself its own story, in galleries and theatres rather than glass-tower lobbies."
 HKG_world_class_destination: "World-Class Destination"
 HKG_world_class_destination_desc: "Tourism, infrastructure, cuisine and culture all peaking together. Hong Kong becomes not merely a stopover or a financial booking but a destination in its own right - the kind of city travellers plan whole trips around."

 #Phase 2 - Ideas
 HKG_consolidated_democracy: "Consolidated Democracy"
 HKG_consolidated_democracy_desc: "Hong Kong's democratic institutions are now self-reinforcing: free press, independent courts, contested elections. A democracy that does not need the central government's permission to function."
 HKG_modernised_infrastructure_idea: "Modernised Infrastructure"
 HKG_modernised_infrastructure_idea_desc: "Hong Kong's roads, rails, harbour and digital backbone are upgraded to first-tier global standards. Every sector benefits from the multiplier."
 HKG_modern_healthcare_system: "Modern Healthcare System"
 HKG_modern_healthcare_system_desc: "Universal coverage, modernised hospitals and integrated public-private care produce some of the world's best health outcomes at sustainable cost."
 HKG_renminbi_hub_idea: "Offshore Renminbi Hub"
 HKG_renminbi_hub_idea_desc: "Hong Kong is the world's leading offshore renminbi clearing centre. Trade, investment and currency-hedging flows pass through the SAR's banks and exchanges."
 HKG_green_finance_idea: "Green Finance Centre"
 HKG_green_finance_idea_desc: "Asia's gateway for climate-aligned capital. Green bonds, ESG-rated equity and renewable-project finance route through Central."
 HKG_tourism_boom: "Tourism Boom"
 HKG_tourism_boom_desc: "Hong Kong is once again a top-tier global destination. Visitor spending feeds retail, hospitality and culture; the social mood lifts with the receipts."

 #Labour branch ideas
 HKG_strengthened_unions: "Strengthened Trade Unions"
 HKG_strengthened_unions_desc: "Trade unions are recognised, funded, and politically powerful. Wages rise, working conditions improve, and the labour-capital balance tilts permanently toward labour. Output per worker drops modestly; output per capita - and the social peace - rises substantially."
 HKG_labour_reform_active: "Labour Reform Underway"
 HKG_labour_reform_active_desc: "The Charter has put the labour code on the legislative calendar. Productivity dips during the transition while management adapts, but the regulatory clarity is already drawing skilled workers back to Hong Kong."
 HKG_minimum_wage_in_force: "Minimum Wage in Force"
 HKG_minimum_wage_in_force_desc: "Statutory wage floors are paid by every employer in the SAR. The cleaners, security guards and restaurant workers gain real disposable income; offices and factories absorb the cost; the population grows."
 HKG_collective_bargaining_idea: "Recognised Collective Bargaining"
 HKG_collective_bargaining_idea_desc: "Sectoral unions negotiate enforceable collective contracts. Industrial output slows when contracts are disputed, but the working population stabilises and the political tilt of organised labour deepens."
 HKG_domestic_helper_protections_idea: "Domestic Helper Protections"
 HKG_domestic_helper_protections_idea_desc: "Foreign domestic workers - mostly Filipina and Indonesian - work under enforceable contracts with mandatory days off, transparent pay, and a regulator with teeth. The helpers stay; the families they support stay; population growth picks up."
 HKG_pension_scheme_idea: "Reformed Pension Scheme"
 HKG_pension_scheme_idea_desc: "The Mandatory Provident Fund actually pays a livable retirement. Old-age poverty drops sharply, social stability improves, and the working-age population can plan a future. The treasury bears a permanent fiscal cost."

 #Police Force branch ideas
 HKG_modernised_police_force: "Modernised Police Force"
 HKG_modernised_police_force_desc: "The Hong Kong Police Force operates with up-to-date training, equipment, and procedural standards. Routine policing is more effective, crime-fighting costs fall, and public confidence in the force is measurable in survey data."
 HKG_counter_terrorism_capability: "Counter-Terrorism Capability"
 HKG_counter_terrorism_capability_desc: "The Counter-Terrorism Response Unit gives the SAR a credible specialist capability against organised threats. Foreign intelligence services find it harder to operate undetected, and the Force has a small permanent special-operations cadre."
 HKG_riot_control_capability: "Riot Control Capability"
 HKG_riot_control_capability_desc: "The Police Force has armoured vehicles, shields, gas, and rehearsed crowd-management protocols. Unrest is contained more reliably; the protective gear is also a visible reminder that the SAR has chosen a particular approach to public order."
 HKG_clean_police_force: "Clean Police Force"
 HKG_clean_police_force_desc: "Internal investigations, ICAC oversight, and a public commitment to integrity have measurably reduced corruption inside the Force. Officers caught taking triad payments face real consequences. The Force's reputation - and its effectiveness - both improve."

 #1C2S Crisis Chain ideas
 HKG_capital_flight: "Capital Flight"
 HKG_capital_flight_desc: "Banks, law firms, and multinationals quietly relocate their regional headquarters to Singapore and Tokyo. Trade flows thin, office productivity slips, the financial crown tarnishes. The SAR's neutrality has not been enough."
 HKG_expanded_police_powers: "Expanded Police Powers"
 HKG_expanded_police_powers_desc: "Under National Security Law provisions, the Force operates with broad search, surveillance, and detention authorities. Public order is maintained; democratic mobilisation is suppressed. The political character of the SAR shifts decisively."
 HKG_financial_autonomy: "Financial Autonomy"
 HKG_financial_autonomy_desc: "The SAR's distinct legal and regulatory framework is preserved as a deliberate policy. Trade, finance, and offices benefit from the predictability. Beijing watches, but does not yet move."
 HKG_model_sar: "The Model SAR"
 HKG_model_sar_desc: "Hong Kong is Beijing's showpiece - obedient, prosperous, deeply integrated with the Greater Bay Area. The benefits are extraordinary: preferential market access, mainland workforce, infrastructure subsidy, political stability. The benefits persist only as long as Hong Kong remains a subject of the People's Republic of China."

 #Police / Public Order events
 hongkong_order.1.t: "Civic Transition Pressures"
 hongkong_order.1.d: "Routine public-order incidents are rising across the SAR. The causes vary - housing pressure, cross-border migration, language and cultural friction, economic uncertainty in some districts. No single grievance dominates. The Police Force is asked how to respond to a situation that is more social than criminal."
 hongkong_order.1.a: "Increase neighbourhood patrols."
 hongkong_order.1.b: "Establish community liaison programmes."
 hongkong_order.1.c: "Maintain current posture."
 hongkong_order.2.t: "Cross-Border Crime Coordination"
 hongkong_order.2.d: "The Counter-Terrorism Response Unit has identified organised-crime networks operating across the SAR-mainland boundary. Effective interdiction requires coordination with mainland public security, but the legal frameworks differ and the Basic Law sets boundaries on operational integration. The Commissioner asks for guidance."
 hongkong_order.2.a: "Deepen joint operations with mainland authorities."
 hongkong_order.2.b: "Maintain independent operations within our jurisdiction."
 hongkong_order.2.c: "Restrict cooperation to formal channels only."
 hongkong_order.3.t: "Demonstrations Outside Government House"
 hongkong_order.3.d: "Several thousand protesters have gathered outside Government House. The grievances are mixed - housing affordability, employment, civic frustrations harder to articulate. Some banners reference the handover; many do not. The crowd is loud but not violent. The Force must decide on a response."
 hongkong_order.3.a: "Open dialogue with the organisers."
 hongkong_order.3.b: "Maintain a visible perimeter and await events."
 hongkong_order.3.c: "Authorise crowd dispersal."
 hongkong_order.4.t: "Allegations of Police-Triad Cooperation"
 hongkong_order.4.d: "A whistleblower's report alleges that members of the Force have been receiving payments to overlook certain triad operations. The political pressure to investigate is significant; the police union warns against scapegoating individual officers ahead of due process. The matter cannot be ignored."
 hongkong_order.4.a: "Open a formal inquiry through ICAC."
 hongkong_order.4.b: "Internal disciplinary review only."
 hongkong_order.4.c: "Treat as isolated incidents."

 #Public Housing branch ideas
 HKG_curtailed_land_supply: "Curtailed Land Supply"
 HKG_curtailed_land_supply_desc: "The government keeps land off the market to prop up prices. Property values stay high, the treasury collects more in stamp duty, but the social cost - inequality, slow population growth, the cage-home crisis - mounts year after year."
 HKG_locked_housing_market: "Locked Housing Market"
 HKG_locked_housing_market_desc: "Residential prices are frozen by legislation. The crisis of unaffordability is contained, but the property sector loses its dynamism and capital flows elsewhere."
 HKG_government_real_estate_holding: "Government Real-Estate Holding"
 HKG_government_real_estate_holding_desc: "The state owns or part-owns the largest property developers. Pricing decisions are political; tycoons are constrained; the SAR's tax base shifts from corporate to public revenue."
 HKG_resolved_housing_crisis: "Hong Kong's Housing Crisis Resolved"
 HKG_resolved_housing_crisis_desc: "After two decades of failure, Hong Kong has built, regulated, and reformed its way out of the housing crisis. Public housing waitlists shrink, the cage homes are emptied, and a generation of Hongkongers can finally afford a home of their own."

 #Economy branch - New Development Idea staged buff
 HKG_new_development_idea_buff: "New Development Plan"
 HKG_new_development_idea_buff_desc: "The transitional phase of the SAR's New Development Plan. Research and political institutions get an early boost, but the economy bears the cost of restructuring - offices and consumer goods sectors are temporarily disrupted while the new framework comes online."
 HKG_new_development_idea_buff_complete: "New Development Plan"
 HKG_new_development_idea_buff_complete_desc: "The New Development Plan is fully operational. Research speed, education efficiency, and office productivity are all permanently elevated. The transition costs of the early phase are recovered, and Hong Kong's knowledge economy is now genuinely first-tier."

 #Public Housing branch events
 hongkong_housing.1.t: "Hong Kong's Housing Crisis"
 hongkong_housing.1.d: "Median property prices have outstripped median household income by a factor of twenty. Tens of thousands of Hongkongers live in subdivided flats and cage homes. The waiting list for public housing exceeds six years and is growing. The government has acknowledged the crisis and committed to a programme of reform - but which reform, and at whose expense, remains the central question of Hong Kong politics."
 hongkong_housing.1.a: "We must act decisively."
 hongkong_housing.2.t: "Housing for All Hongkongers"
 hongkong_housing.2.d: "After years of construction, reform, and political fights, the Green-Form Subsidised Home Ownership Scheme caps off Hong Kong's housing reform programme. The cage homes are being emptied. Public housing tenants are upgrading into ownership. The waiting list has fallen below two years for the first time in a generation. The crisis that defined the post-handover era is, at last, behind us."
 hongkong_housing.2.a: "A home for every Hongkonger."
