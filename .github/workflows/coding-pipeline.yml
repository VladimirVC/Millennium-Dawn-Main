name: Code Standards & Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
    - 'common/**'
    - 'events/**'
    - 'history/**'
    - 'localisation/**'
    - 'interface/**'
    - 'gfx/**'
    # Tooling paths are intentionally absent: the validator jobs gate on
    # detect-changes (content groups), so a tooling-only PR would trigger the
    # workflow but skip every validator, posting an empty report. Changes under
    # tools/ are smoke-tested by tools-validation.yml instead.
    - '.github/workflows/coding-pipeline.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least privilege: validator jobs run PR-authored code and only need to read.
# The validation-report job declares its own pull-requests/checks write scope.
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────
  # Detect which file groups changed so downstream jobs can skip
  # ───────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      common:        ${{ steps.filter.outputs.common }}
      events:        ${{ steps.filter.outputs.events }}
      history:       ${{ steps.filter.outputs.history }}
      localisation:  ${{ steps.filter.outputs.localisation }}
      ai-strategy:   ${{ steps.filter.outputs.ai-strategy }}
      ai-navy:       ${{ steps.filter.outputs.ai-navy }}
      ai-equipment:  ${{ steps.filter.outputs.ai-equipment }}
      factions:      ${{ steps.filter.outputs.factions }}
      oob:           ${{ steps.filter.outputs.oob }}
      decisions:     ${{ steps.filter.outputs.decisions }}
      scripted-loc:  ${{ steps.filter.outputs.scripted-loc }}
      scripted-guis: ${{ steps.filter.outputs.scripted-guis }}
      interface:     ${{ steps.filter.outputs.interface }}
      national-focus: ${{ steps.filter.outputs.national-focus }}
      on-actions:    ${{ steps.filter.outputs.on-actions }}
      scripted-effects: ${{ steps.filter.outputs.scripted-effects }}
      style:         ${{ steps.filter.outputs.style }}
      style-files:   ${{ steps.filter.outputs.style_files }}
    steps:
    # No checkout — on pull_request events dorny/paths-filter fetches the
    # changed-file list straight from the GitHub API, so cloning the repo
    # just to diff locally is pure overhead.
    - name: Detect changed file groups
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        # `style_files` (from list-files: json) carries the changed .txt paths
        # so the style job validates only the diff, not the whole repo. JSON,
        # not shell, so paths with spaces/apostrophes ("Cote D'Ivoire.txt")
        # survive jq parsing instead of being word-split into garbage.
        list-files: json
        filters: |
          common:
            - 'common/**'
          events:
            - 'events/**'
          history:
            - 'history/**'
          localisation:
            - 'localisation/**'
          ai-strategy:
            - 'common/ai_strategy/**'
            - 'common/ai_templates/**'
          ai-navy:
            - 'common/ai_navy/**'
            - 'common/units/**'
          ai-equipment:
            - 'common/ai_equipment/**'
          factions:
            - 'common/factions/**'
          oob:
            - 'history/units/**'
            - 'common/units/**'
            - 'common/ai_templates/**'
            - 'common/scripted_effects/00_AI_templates.txt'
          decisions:
            - 'common/decisions/**'
          scripted-loc:
            - 'common/scripted_localisation/**'
          scripted-guis:
            - 'common/scripted_guis/**'
          interface:
            - 'interface/**'
          national-focus:
            - 'common/national_focus/**'
          on-actions:
            - 'common/on_actions/**'
          scripted-effects:
            - 'common/scripted_effects/**'
          style:
            - 'common/**/*.txt'
            - 'events/**/*.txt'
            - 'history/**/*.txt'

  # ───────────────────────────────────────────────────────────────
  # Style & common-mistakes — diff-scoped to the changed .txt files only,
  # so a PR is flagged for the style it introduced, not the repo-wide
  # backlog. The changed-file list comes from detect-changes (style_files).
  # ───────────────────────────────────────────────────────────────
  styling-check:
    name: Style Check
    needs: [detect-changes]
    if: needs.detect-changes.outputs.style == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 1
        sparse-checkout: |
          common
          events
          history
          localisation
          interface
          gfx/flags
          tools
          .claude
          CLAUDE.md

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Run style check
      env:
        # JSON array of changed .txt files under common/events/history.
        STYLE_FILES_JSON: ${{ needs.detect-changes.outputs.style-files }}
      run: |
        # Newline-delimit the JSON array (newlines can't appear in these paths)
        # and drop the files the pre-commit md-validate-style hook also excludes.
        printf '%s' "$STYLE_FILES_JSON" | jq -r '.[]' \
          | grep -vE '(^|/)(Changelog|AUTHORS)\.txt$|/descriptions[^/]*\.txt$' \
          > style_files.txt || true
        if [ ! -s style_files.txt ]; then
          echo "No style-relevant files changed"
          exit 0
        fi
        # validate_style.py is a BaseValidator: --staged reads the diff list from
        # MD_STAGED_FILES (newline-separated), so spaces/apostrophes are safe.
        MD_STAGED_FILES="$(cat style_files.txt)" python3 tools/validation/validate_style.py --staged --strict --no-color
        # check_common_mistakes.py takes the files as positional args; feed them
        # NUL-delimited via xargs so spaces/apostrophes don't word-split.
        tr '\n' '\0' < style_files.txt | xargs -0 -r python3 tools/linting/check_common_mistakes.py

  # ───────────────────────────────────────────────────────────────
  # Structural lint — file-integrity checks that otherwise only run as
  # local pre-commit hooks. Catches regressions from commits made via the
  # GitHub web UI or with hooks disabled (loc BOM, .mod encoding).
  # ───────────────────────────────────────────────────────────────
  structural-lint:
    name: Structural Lint
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.common == 'true' ||
      needs.detect-changes.outputs.events == 'true' ||
      needs.detect-changes.outputs.history == 'true' ||
      needs.detect-changes.outputs.localisation == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 1
        sparse-checkout: |
          common
          events
          history
          localisation
          tools

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Check localisation UTF-8 BOM
      run: python3 tools/linting/validate_localization_encoding.py

    - name: Check .mod file encoding
      run: |
        git ls-files -z -- '*.mod' ':!resources' \
          | xargs -0 -r python3 tools/linting/validate_mod_encoding.py

  # ───────────────────────────────────────────────────────────────
  # Core validators — broad scope, run when most game files change
  # ───────────────────────────────────────────────────────────────
  validate-core:
    name: Validate ${{ matrix.validator.title }}
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.common == 'true' ||
      needs.detect-changes.outputs.events == 'true' ||
      needs.detect-changes.outputs.history == 'true' ||
      needs.detect-changes.outputs.localisation == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        validator:
          - script: validate_variables.py
            name: variables
            title: "Variables"
            sparse: |
              common
              events
              history
              localisation
              tools
          - script: validate_scripted_localisation.py
            name: scripted-localisation
            title: "Scripted Localisation"
            sparse: |
              common
              events
              history
              localisation
              interface
              tools
          - script: validate_cosmetic_tags.py
            name: cosmetic-tags
            title: "Cosmetic Tags"
            sparse: |
              common
              events
              gfx/flags
              history
              localisation
              tools
          - script: validate_localisation.py
            name: localisation
            title: "Localisation"
            sparse: |
              common
              events
              history
              localisation
              interface
              tools
          - script: validate_events.py
            name: events
            title: "Events"
            sparse: |
              common
              events
              history
              localisation
              tools
          - script: validate_history_techs.py
            name: history-techs
            title: "History Technology Dependencies"
            sparse: |
              common/technologies
              history/countries
              tools
          - script: validate_unused_scripted.py
            name: unused-scripted
            title: "Unused Scripted Effects & Triggers"
            sparse: |
              common
              events
              history
              tools
          - script: validate_agency_upgrades.py
            name: agency-upgrades
            title: "Intelligence Agency Upgrades"
            sparse: |
              common
              events
              history
              localisation
              interface
              tools
          - script: validate_ideas.py
            name: ideas
            title: "Idea References"
            # informational: 30 pre-existing undefined-idea references on main
            # need triage. Switch to --strict once the backlog is cleared.
            strict: false
            sparse: |
              common
              events
              history
              localisation
              tools
          - script: validate_set_variables.py
            name: set-variables
            title: "Set Variable References"
            # informational: ~89 pre-existing unused-variable findings on main
            # need triage. Switch to --strict once the backlog is cleared.
            strict: false
            sparse: |
              common
              events
              history
              localisation
              tools
              interface
          # NOTE: validate_defines.py needs vanilla HOI4 files (not checked in)
          # so it only runs as a pre-commit hook on contributors' machines.
          # validate_unused_textures.py is intentionally not wired here either
          # — ~22k pre-existing unreferenced textures make it a periodic
          # mod-size audit, not a per-PR signal. Run manually via
          # `pre-commit run md-validate-unused-textures --hook-stage manual`.

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 1
        sparse-checkout: ${{ matrix.validator.sparse }}

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    # Restore .validation_cache/ from a previous run keyed on the PR base
    # commit + validator code hash. The disk cache holds per-file scan
    # results (mtime/size keyed) and aggregate indexes — a PR touching N
    # files re-scans only those N. The restore-keys fallback walks back to
    # any prior cache for this validator so cold starts on a new base SHA
    # still get partial reuse.
    - name: Restore validator disk cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .validation_cache
        key: validators-v3-${{ runner.os }}-${{ matrix.validator.name }}-${{ github.event.pull_request.base.sha }}-${{ hashFiles('tools/validation/**', 'tools/shared_utils.py') }}
        restore-keys: |
          validators-v3-${{ runner.os }}-${{ matrix.validator.name }}-${{ github.event.pull_request.base.sha }}-
          validators-v3-${{ runner.os }}-${{ matrix.validator.name }}-

    - name: Run validation
      # Per-matrix opt-out: `strict: false` makes the validator informational
      # (still produces the log + PR comment but exits 0 on findings). Default
      # is --strict so any entry that omits the field keeps gating behavior.
      run: |
        STRICT_FLAG=$( [ "${{ matrix.validator.strict }}" = "false" ] && echo "" || echo "--strict" )
        python3 tools/validation/${{ matrix.validator.script }} $STRICT_FLAG --no-color --workers 4 --output validation-${{ matrix.validator.name }}.log

    - name: Upload results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: validation-${{ matrix.validator.name }}-results
        path: |
          validation-${{ matrix.validator.name }}.log
          validation-${{ matrix.validator.name }}.json
        if-no-files-found: ignore
        retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Targeted validators — one matrix entry per validator, each gated
  # on the specific detect-changes output it cares about. We keep the
  # display names identical to the old per-job names so branch protection
  # rules referencing them keep working.
  # ───────────────────────────────────────────────────────────────
  validate-targeted:
    name: ${{ matrix.validator.title }}
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.decisions == 'true' ||
      needs.detect-changes.outputs.oob == 'true' ||
      needs.detect-changes.outputs.ai-strategy == 'true' ||
      needs.detect-changes.outputs.ai-navy == 'true' ||
      needs.detect-changes.outputs.ai-equipment == 'true' ||
      needs.detect-changes.outputs.factions == 'true' ||
      needs.detect-changes.outputs.scripted-guis == 'true' ||
      needs.detect-changes.outputs.interface == 'true' ||
      needs.detect-changes.outputs.national-focus == 'true' ||
      needs.detect-changes.outputs.on-actions == 'true' ||
      needs.detect-changes.outputs.scripted-effects == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        validator:
          - script: validate_decisions.py
            name: decisions
            title: "Validate Decisions"
            should_run: ${{ needs.detect-changes.outputs.decisions }}
            sparse: |
              common
              events
              localisation/english
              tools
          - script: validate_oob_units.py
            name: oob-units
            title: "Validate OOB Unit Names"
            should_run: ${{ needs.detect-changes.outputs.oob }}
            sparse: |
              history/units
              common/units
              common/ai_templates
              common/scripted_effects
              tools
          - script: validate_ai_roles.py
            name: ai-roles
            title: "Validate AI Role References"
            should_run: ${{ needs.detect-changes.outputs.ai-strategy }}
            sparse: |
              common/ai_strategy
              common/ai_templates
              tools
          - script: validate_ai_navy.py
            name: ai-navy
            title: "Validate AI Navy"
            should_run: ${{ needs.detect-changes.outputs.ai-navy }}
            sparse: |
              common/ai_navy
              common/units
              tools
          - script: validate_ai_equipment.py
            name: ai-equipment
            title: "Validate AI Equipment Coverage"
            should_run: ${{ needs.detect-changes.outputs.ai-equipment }}
            sparse: |
              common/ai_equipment
              common/units
              tools
          - script: validate_factions.py
            name: factions
            title: "Validate Faction System"
            should_run: ${{ needs.detect-changes.outputs.factions }}
            sparse: |
              common/factions
              tools
          - script: validate_scripted_gui.py
            name: scripted-gui
            title: "Validate Scripted GUIs"
            should_run: ${{ (needs.detect-changes.outputs.scripted-guis == 'true' || needs.detect-changes.outputs.interface == 'true') && 'true' || 'false' }}
            sparse: |
              common/scripted_guis
              interface
              localisation/english
              tools
          - script: validate_focus_tree.py
            name: focus-tree
            title: "Validate Focus Tree Structure"
            should_run: ${{ needs.detect-changes.outputs.national-focus }}
            sparse: |
              common/national_focus
              localisation/english
              tools
          - script: validate_on_actions.py
            name: on-actions
            title: "Validate On Actions"
            should_run: ${{ (needs.detect-changes.outputs.on-actions == 'true' || needs.detect-changes.outputs.events == 'true') && 'true' || 'false' }}
            sparse: |
              common/on_actions
              events
              tools
          - script: validate_scripted_params.py
            name: scripted-params
            title: "Validate Scripted Effect Parameters"
            should_run: ${{ (needs.detect-changes.outputs.scripted-effects == 'true' || needs.detect-changes.outputs.national-focus == 'true' || needs.detect-changes.outputs.decisions == 'true' || needs.detect-changes.outputs.events == 'true') && 'true' || 'false' }}
            sparse: |
              common/scripted_effects
              common/national_focus
              common/decisions
              events
              tools
          - script: validate_gfx_references.py
            name: gfx-references
            title: "Validate GFX Sprite References"
            should_run: ${{ (needs.detect-changes.outputs.interface == 'true' || needs.detect-changes.outputs.scripted-guis == 'true') && 'true' || 'false' }}
            sparse: |
              interface
              common/scripted_guis
              common/scripted_localisation
              tools
          - script: validate_modifiers.py
            name: modifiers
            title: "Validate Modifier Names"
            # informational: frequency-based detection has inherent false positives
            # for rarely-used but valid vanilla modifiers
            strict: false
            should_run: ${{ needs.detect-changes.outputs.common }}
            # resources/documentation holds modifiers_documentation.md — the
            # authoritative vanilla modifier list. Without it the known-good set
            # loses ~4000 names and the validator false-positives on every one.
            sparse: |
              common
              tools
              resources/documentation
          - script: validate_simplifications.py
            name: simplifications
            title: "Suggest Scope Merges"
            # informational: WARNING-only simplification hints, never gates a PR
            strict: false
            should_run: ${{ (needs.detect-changes.outputs.scripted-effects == 'true' || needs.detect-changes.outputs.national-focus == 'true' || needs.detect-changes.outputs.decisions == 'true' || needs.detect-changes.outputs.on-actions == 'true' || needs.detect-changes.outputs.events == 'true') && 'true' || 'false' }}
            sparse: |
              common/national_focus
              common/decisions
              common/scripted_effects
              common/scripted_triggers
              common/on_actions
              events
              tools
    steps:
    # Per-entry gate: only fetch + run when this validator's file group changed.
    # Steps below each carry the same `if` so a skipped entry reports cleanly
    # as "success with no work done" instead of bulk-skipping the whole job.
    - name: Checkout code
      if: matrix.validator.should_run == 'true'
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 1
        sparse-checkout: ${{ matrix.validator.sparse }}
    - name: Set up Python
      if: matrix.validator.should_run == 'true'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'
    # Restore .validation_cache/ — see the matching step in validate-core for
    # the key strategy. Per-file mtime/size entries mean unchanged files are
    # not re-scanned; the basename_index aggregate cache also pays back
    # whenever a validator calls get_full_path().
    - name: Restore validator disk cache
      if: matrix.validator.should_run == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .validation_cache
        key: validators-v3-${{ runner.os }}-${{ matrix.validator.name }}-${{ github.event.pull_request.base.sha }}-${{ hashFiles('tools/validation/**', 'tools/shared_utils.py') }}
        restore-keys: |
          validators-v3-${{ runner.os }}-${{ matrix.validator.name }}-${{ github.event.pull_request.base.sha }}-
          validators-v3-${{ runner.os }}-${{ matrix.validator.name }}-
    - name: Run validation
      if: matrix.validator.should_run == 'true'
      run: |
        STRICT_FLAG=$( [ "${{ matrix.validator.strict }}" = "false" ] && echo "" || echo "--strict" )
        python3 tools/validation/${{ matrix.validator.script }} $STRICT_FLAG --no-color --workers 4 --output validation-${{ matrix.validator.name }}.log
    - name: Upload results
      if: always() && matrix.validator.should_run == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: validation-${{ matrix.validator.name }}-results
        path: |
          validation-${{ matrix.validator.name }}.log
          validation-${{ matrix.validator.name }}.json
        if-no-files-found: ignore
        retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Validation report — collects all results and posts PR comment
  # ───────────────────────────────────────────────────────────────
  validation-report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate-core, validate-targeted]
    permissions:
      contents: read
      pull-requests: write
      checks: write
    # Run the report whether validators passed or failed, but not if the run
    # was cancelled. (The workflow only triggers on pull_request, so no event
    # guard is needed.)
    if: ${{ !cancelled() }}
    steps:
    # Checkout the report generator + the report_lib package it imports.
    # Stays much smaller than a full checkout — we skip everything else.
    - name: Checkout report tooling
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 1
        sparse-checkout: |
          tools/generate_validation_report.py
          tools/report_lib
        sparse-checkout-cone-mode: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Download all validation results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: validation-*-results
        path: validation-results

    - name: Generate and post validation report
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        python3 tools/generate_validation_report.py \
          --results-dir validation-results \
          --output report.md \
          --pr-number "${{ github.event.pull_request.number }}" \
          --commit-sha "${{ github.event.pull_request.head.sha }}" \
          --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          --github-repository "${{ github.repository }}" \
          --post-comment \
          --checks-api \
          --print

    - name: Upload combined report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: validation-report
        path: report.md
        retention-days: 30
