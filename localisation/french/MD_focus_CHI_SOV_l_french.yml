l_french:
 CHI_SOV_treaty_good_neighbourliness: "Sino-Russian Treaty of Good-Neighbourliness"
 CHI_SOV_treaty_good_neighbourliness_desc: "The Treaty of Good-Neighbourliness and Friendly Cooperation signed in 2001 established the legal foundation for modern China-Russia relations. Renewed political will to act on its provisions , mutual respect, non-interference, and consultation on major international questions , opens the door to a generation of bilateral projects that neither country could pursue in isolation."
 CHI_SOV_sco_framework: "SCO Expansion Agenda"
 CHI_SOV_sco_framework_desc: "The Shanghai Cooperation Organisation was founded in 2001 by China and Russia as the successor to the Shanghai Five. Coordinating a joint expansion agenda , drawing in India, Pakistan, Iran, and eventually Central Asian states , transforms the SCO from a regional security forum into a genuine counterweight to Western multilateral institutions."
 CHI_SOV_turn_to_east: "Russia's Pivot to the East"
 CHI_SOV_turn_to_east_desc: "The Turn to the East policy, accelerated after 2014 by Western sanctions, redirects Russian trade, investment, and diplomatic attention toward China and the Asia-Pacific. Formalizing this reorientation in long-term economic agreements signals to Moscow's own bureaucracy and business community that the Western market is no longer the primary reference point for Russian prosperity."
 CHI_SOV_bri_russia_corridor: "Belt and Road Russia Corridor"
 CHI_SOV_bri_russia_corridor_desc: "The China-Europe freight rail network already runs the bulk of its overland tonnage across Russian territory via the Trans-Siberian Railway. Integrating this corridor into the Belt and Road Initiative framework, with Chinese investment in Russian rail upgrading and simplified customs procedures at the Zabaykalsk-Manzhouli crossing, locks the two economies into a shared logistics infrastructure."
 CHI_SOV_brics_coordination: "BRICS+ Coordination Bloc"
 CHI_SOV_brics_coordination_desc: "BRICS , Brazil, Russia, India, China, South Africa, has evolved from a Goldman Sachs acronym into a functioning multilateral forum with its own New Development Bank and currency reserve arrangement. China and Russia driving a coordinated BRICS+ expansion, admitting Egypt, Ethiopia, Iran, and Saudi Arabia, creates a parallel economic architecture capable of challenging the IMF and World Bank as the default institutions of the Global South."
 CHI_SOV_sco_antiterror: "SCO Regional Anti-Terrorism Centre"
 CHI_SOV_sco_antiterror_desc: "The Regional Anti-Terrorist Structure, RATS, is the SCO's dedicated counterterrorism body headquartered in Tashkent. Joint China-Russia expansion of RATS capabilities , intelligence sharing, rapid response coordination, and joint training exercises , extends the reach of Eurasian security cooperation into Central Asia and the Caucasus, countering both jihadist networks and the covert influence operations of outside powers."
 CHI_SOV_no_limits_partnership: "No Limits Strategic Partnership"
 CHI_SOV_no_limits_partnership_desc: "The joint statement issued during Xi Jinping's visit to Moscow in February 2022 declared a friendship with no limits and a cooperation that has no forbidden zones. The declaration placed the bilateral relationship above the level of any formal alliance while stopping short of a mutual defense treaty, signaling to Washington and Brussels that Beijing and Moscow regard their strategic alignment as a permanent feature of the international order."
 CHI_SOV_yuan_ruble_settlement: "Yuan-Ruble Settlement Mechanism"
 CHI_SOV_yuan_ruble_settlement_desc: "China and Russia have accelerated the shift away from dollar-denominated trade, with the yuan's share of Russian export settlements rising sharply after 2022 sanctions froze Russian access to SWIFT. Establishing a formal bilateral clearing mechanism between the People's Bank of China and the Bank of Russia creates a parallel financial infrastructure that insulates both economies from secondary sanctions pressure."
 CHI_SOV_agricultural_corridor: "Primorye Agricultural Export Corridor"
 CHI_SOV_agricultural_corridor_desc: "Russia's Far East and Siberian regions hold some of the world's largest reserves of arable land, much of it underutilized due to depopulation and lack of market access. The Primorye agricultural corridor directs Russian grain, soybeans, and oilseeds through dedicated border crossings into China's northeastern provinces, providing Harbin and Shenyang with a secure food supply chain independent of global commodity markets."
 CHI_SOV_russian_far_east_zone: "Russian Far East Free Port"
 CHI_SOV_russian_far_east_zone_desc: "Vladivostok's Free Port status, granted by Russia in 2015, was designed specifically to attract Chinese and Japanese investment into the underdeveloped Russian Far East. Chinese state enterprises investing in port facilities, cold-storage warehousing, and light manufacturing in the Vladivostok Free Economic Zone create a commercial anchor that locks in Russia's eastern turn and provides China with a Pacific logistics hub outside its own borders."
 CHI_SOV_zarubino_port: "Zarubino Pacific Port Accord"
 CHI_SOV_zarubino_port_desc: "The Zarubino bulk cargo terminal on Russia's Pacific coast, near the tripoint where Russia, China, and North Korea meet, has been proposed as a joint development project since the 1990s. Chinese investment in expanding Zarubino's grain-handling and container capacity gives Chinese exporters from Jilin Province their shortest route to Pacific shipping lanes, while providing Russia with Chinese capital for infrastructure Moscow cannot afford to build alone."
 CHI_SOV_trans_siberian_freight: "Trans-Siberian Freight Expansion"
 CHI_SOV_trans_siberian_freight_desc: "The Trans-Siberian Railway corridor handles tens of thousands of freight container journeys between China and Europe annually, with transit times of 12 to 15 days versus 30 by sea. Joint Chinese-Russian investment in track electrification, double-tracking of bottleneck sections, and integrated digital customs clearance cuts transit time to under 10 days and triples throughput, turning the Trans-Siberian into a genuine alternative to the Suez Canal for premium cargo."
 CHI_SOV_timber_mineral_trade: "Siberian Timber and Mineral Exports"
 CHI_SOV_timber_mineral_trade_desc: "Siberia holds the world's largest boreal timber reserves and enormous deposits of copper, nickel, gold, and rare earth elements. Chinese processing companies have established a dominant position in Siberian timber purchasing, while Norilsk Nickel and Polyus Gold export the majority of their output to Chinese refineries. Formalizing these commodity flows into long-term offtake agreements locks in both countries' positions in global resource supply chains."
 CHI_SOV_arctic_lng: "Yamal LNG Offtake Contracts"
 CHI_SOV_arctic_lng_desc: "The Yamal LNG project on Russia's Yamal Peninsula, developed by Novatek, counts CNPC and the Silk Road Fund among its major shareholders. Chinese LNG carriers , purpose-built ice-class vessels , collect cargoes from Sabetta port year-round. Long-term offtake contracts with CNOOC and CNPC secure China's LNG supply while providing Novatek with the Chinese financing that Western sanctions have cut off."
 CHI_SOV_power_of_siberia_2: "Power of Siberia 2 Pipeline"
 CHI_SOV_power_of_siberia_2_desc: "Power of Siberia 2 is proposed to carry gas from the same West Siberian fields that supply Europe, through Mongolia and into northern China. With a capacity of 50 billion cubic meters per year, it would make China Russia's single largest gas customer by a wide margin and give Gazprom an anchor contract to justify continued investment in fields that might otherwise be stranded."
 CHI_SOV_tianwan_nuclear: "Tianwan Nuclear Station Expansion"
 CHI_SOV_tianwan_nuclear_desc: "The Tianwan Nuclear Power Station in Lianyungang, built by Rosatom under a series of contracts signed from 1997 onward, is the largest project of Russian-Chinese technical cooperation in history. Units 7 and 8, signed in 2021, extend the partnership into the 2030s. Each Rosatom unit built in China transfers reactor design knowledge, fuel supply contracts, and maintenance relationships that bind the two nuclear industries together for decades."
 CHI_SOV_huawei_russia: "Huawei 5G Russia Rollout"
 CHI_SOV_huawei_russia_desc: "Huawei signed 5G agreements with Russian telecoms operators including MTS, MegaFon, and Rostelecom in 2019-2020. With Western 5G vendors excluded from Russia by procurement preference and later sanctions, Huawei's dominance of the Russian 5G buildout is essentially unchallenged. Chinese 5G infrastructure embedded in Russia's communications backbone creates a technical dependency that deepens the bilateral relationship at the level of critical national infrastructure."
 CHI_SOV_beidou_glonass: "BeiDou-GLONASS Navigation Accord"
 CHI_SOV_beidou_glonass_desc: "China's BeiDou and Russia's GLONASS are the only two satellite navigation systems independent of the US GPS network. An interoperability agreement signed between the two systems' operating authorities in 2015 enables civilian and military receivers to use signals from both constellations simultaneously, improving position accuracy and, critically, providing both countries with redundant navigation infrastructure that cannot be degraded by US jamming or orbital interference."
 CHI_SOV_polar_silk_road: "Polar Silk Road Initiative"
 CHI_SOV_polar_silk_road_desc: "China's Arctic strategy document, published in 2018, designated the Northern Sea Route as the Polar Silk Road , a third corridor of the Belt and Road alongside the land routes through Central Asia and the maritime route through the Indian Ocean. Chinese investment in Arctic shipping infrastructure, icebreaker construction in Chinese yards, and port facilities along the NSR transforms a seasonal Russian route into a year-round international shipping lane controlled by Sino-Russian joint ventures."
 CHI_SOV_northern_sea_route: "Northern Sea Route Commercialization"
 CHI_SOV_northern_sea_route_desc: "The Northern Sea Route, running along Russia's Arctic coastline from the Bering Strait to the Kara Sea, cuts the distance between Shanghai and Hamburg by roughly 30% compared to the Suez Canal route. Melting Arctic sea ice is extending the navigable season. Joint Chinese-Russian investment in icebreaker escort capacity, emergency rescue infrastructure along the route, and dedicated ice-class container vessels transforms the NSR from a niche seasonal option into a viable year-round alternative for high-value cargo."
 CHI_SOV_rosatom_export: "Rosatom Export Package"
 CHI_SOV_rosatom_export_desc: "Rosatom is the world's largest nuclear energy company by international reactor orders, with over 30 units under construction or contracted abroad. Its VVER reactor design, fuel supply chain, and long-term service contracts are the primary vehicle through which Russia projects economic and technical influence. A dedicated export package for Chinese buyers , incorporating VVER-1200 units, mixed-oxide fuel supply, and joint training for Chinese nuclear engineers , embeds Russian nuclear technology into China's civilian energy infrastructure for a generation."
 CHI_SOV_space_station: "International Lunar Research Station"
 CHI_SOV_space_station_desc: "The International Lunar Research Station, jointly announced by China's CNSA and Russia's Roscosmos in 2021, is the most ambitious bilateral scientific project since the Soviet space program. The ILRS envisions a permanent robotic and eventually crewed research facility near the lunar south pole, designed explicitly as an alternative to NASA's Artemis program and open to third-country participation. Its joint development binds the two space programs into a shared architecture for the coming generation of deep-space exploration."
 CHI_SOV_peace_mission: "Peace Mission Joint Exercises"
 CHI_SOV_peace_mission_desc: "Peace Mission is the SCO's joint military exercise series, held annually since 2005 and rotating between member states. Chinese and Russian forces have participated in every iteration, with the exercises expanding from counterterrorism scenarios to combined-arms maneuvers involving armored formations, close air support, and command coordination at the corps level. The exercise series has become the primary venue for PLA-Russian Army interoperability development outside actual combined operations."
 CHI_SOV_advanced_arms_sales: "Su-35 and S-400 Export Package"
 CHI_SOV_advanced_arms_sales_desc: "China's acquisition of 24 Sukhoi Su-35 multirole fighters in 2015 and a battalion set of S-400 Triumf surface-to-air missiles in 2018 represented the most significant Russian arms exports to China since the Su-27 deal of the 1990s. The sales transferred operational experience with fourth-generation-plus aircraft and long-range integrated air defense that China's own industry had not yet matched, while providing Rosoboronexport with a premium customer at a moment when its Western market was closing."
 CHI_SOV_pacific_fleet_coord: "Pacific Fleet Coordination Accord"
 CHI_SOV_pacific_fleet_coord_desc: "The PLAN and Russia's Pacific Fleet have conducted coordinated naval exercises in the Sea of Japan, the East China Sea, and the Western Pacific since 2012. Joint patrols in waters adjacent to Japan and the Korean Peninsula demonstrate a combined presence that neither navy could sustain independently and send a deliberate signal to US Pacific Command about the cost of any confrontation with either power in its home waters."
 CHI_SOV_defense_industrial: "Defense Industrial Base Integration"
 CHI_SOV_defense_industrial_desc: "Chinese state defense enterprises have moved beyond simply importing Russian platforms toward licensed production and reverse-engineering. Joint ventures in aero-engine development , the area where China's own industry remains furthest behind , are the most strategically significant. Chinese access to Russian turbofan technology for the WS-15 and WS-20 engines closes the gap with Western air forces at a fraction of the cost of independent development, while Russian enterprises gain Chinese manufacturing scale."
 CHI_SOV_strategic_bomber_patrol: "Joint Strategic Bomber Patrols"
 CHI_SOV_strategic_bomber_patrol_desc: "In 2019 and 2023, Russian Tu-95MS Bear bombers and Chinese H-6K strategic bombers flew coordinated patrols over the Sea of Japan and the East China Sea, triggering Japanese and South Korean air defense scrambles. The patrols are not joint operations in the technical military sense but demonstrate a synchronized use of strategic airpower that signals both countries' willingness to coordinate pressure on shared adversaries. Regular joint patrol corridors deepen crew-level familiarity and shared procedural standards."
 CHI_SOV_vostok_exercises: "Vostok Strategic Exercises"
 CHI_SOV_vostok_exercises_desc: "Vostok is Russia's strategic-level military exercise series, traditionally focused on large-scale conventional conflict in the Russian Far East. Chinese forces participated in Vostok-2018 and again in Vostok-2022, the latter occurring weeks after the start of the Ukraine war. Chinese involvement upgrades the exercises from a national rehearsal into a bilateral combined-arms demonstration, with PLA ground and aviation elements integrating into Russian divisional command structures."
 CHI_SOV_military_space: "Joint Military Space Program"
 CHI_SOV_military_space_desc: "Both China and Russia have developed dedicated military space capabilities , anti-satellite weapons, satellite navigation jamming, electronic intelligence satellites, and space-based early warning systems. A joint program coordinating satellite orbital slots, data-sharing protocols, and combined space situational awareness provides both countries with a more comprehensive picture of US and allied space operations than either could achieve independently, while reducing the risk of collision or escalation between their own orbital assets."
 SOV_chi_rare_earth_supply: "Chinese Rare Earth Components"
 SOV_chi_rare_earth_supply_desc: "China controls over 80% of global rare earth refining capacity, including the neodymium, lanthanum, and dysprosium compounds essential for precision guidance systems, night-vision optics, and high-performance electric motors. Formalizing the supply relationship under the defense industrial cooperation framework gives Uralvagonzavod guaranteed access to Chinese-processed rare earth inputs, reducing component costs and improving quality consistency across the T-90 and Armata production lines."
 CHI_sov_flanker_expertise: "Flanker Generation Expertise"
 CHI_sov_flanker_expertise_desc: "Shenyang Aircraft Corporation's licensed production of the Su-27 Flanker family, spanning the J-11, J-15, and J-16 variants, has made it the world's most experienced builder of Russian-pedigree combat aircraft outside Russia itself. The Su-35 export contract deepens this relationship by providing access to the AL-41F1S engine, Irbis-E radar architecture, and aerodynamic refinements that inform Shenyang's own next-generation programs. Aircraft rolling off the Shenyang line carry measurable performance gains tracing directly to Sukhoi Design Bureau collaboration."
 CHI_SOV_military_tech_idea: "Russian Defense Technology Transfer"
 CHI_SOV_shared_modifier: "Sino-Russian Strategic Alignment"
 CHI_SOV_shared_modifier_desc: "A package of interlocking bilateral commitments between Beijing and Moscow that adjusts the Chinese economy and military along the depth of Sino-Russian cooperation. Closer ties expand political latitude, agricultural and resource output, naval reach, and civilian-industrial capacity, while deepening the partnership raises trade goodwill and tightens border security. The modifier scales with every major agreement ratified between the two powers."