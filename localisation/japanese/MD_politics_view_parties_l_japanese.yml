 UKR.Neutral_Autocracy_shariy_desc: "£ukr_shariy シャリー党は、画期的なブロガーであるアナトリー・シャリーの政党である。リバタリアン的見解を掲げつつ、親ロシア・親欧米政党を批判する姿勢を示す一方、しばしば野党プラットフォーム―生活党と協力関係にある。包括政党であるため、その存在基盤は創設者個人に依存しており、実質的にイデオロギーを有していない。"
 UKR.Neutral_Communism_icon: "£UKR_neutral_communism"
 UKR.Neutral_green_two: "£ukr_greens (PZU) ウクライナ緑の党"
 UKR.Neutral_green_two_icon: "£ukr_greens"
 UKR.Neutral_green_two_desc: "£ukr_greens ウクライナ緑の党は、1987年12月設立の「緑の世界協会」の後継組織であり、同名称で1990年のウクライナ議会選挙に民主ブロックの一員として参加した。主な優先課題は、経済システムにおける反生態的姿勢の転換、社会システムの再構築、人権保護である。"
 UKR.Neutral_green_alt: "£ukr_ukrop (UKROP) ウクライナ愛国者協会"
 UKR.Neutral_green_alt_icon: "£ukr_ukrop"
 UKR.Neutral_green_alt_desc: "£ukr_ukrop ウクライナ愛国者協会は、オリガルヒのゲンナジー・コルバンによって創設されたウクライナの政党である。緑の政策と農業重視の政策を掲げる一方で、同党はウクライナ民族主義を明確に重視し、ロシアはウクライナの敵であり、意図的にウクライナをNATOとEUの支配下に陥れようとしていると主張している。"
 UKR.Neutral_Muslim_Brotherhood_icon: "£UKR_neutral_muslim"
 UKR.Nat_Populism_alt: "£ukr_radiakl (RPL) 急進党"
 UKR.Nat_Populism_alt_icon: "£ukr_radiakl"
 UKR.Nat_Populism_alt_desc: "£ukr_radiakl オレフ・リャシュコ急進党は、ウクライナの政党であり、主に急進的ポピュリズム、ウクライナ民族主義、社会主義的経済政策、そして党首の常軌を逸した言動で知られる。リャシュコは、ウクライナが核兵器で再武装すべきだと主張し、あらゆる紛争は武力で解決すべきだとし、急進的な手段でオリガルヒや汚職官僚を国家から一掃すべきだと主張している..."
 UKR.Nat_Fascism_icon: "£ukr_kongress"
 UKR.Nat_Autocracy_icon: "£urk_armed_forces"
 UKR.Nat_Autocracy_azov: "£ukr_national_corps (NC) 国民軍団"
 UKR.Nat_Autocracy_azov_icon: "£ukr_national_corps"
 UKR.Nat_Autocracy_azov_desc: "£ukr_national_corps 国民軍団党は、ウクライナにおける極右政党である。アゾフ大隊の主要人物の一人であったアンドリー・ビレツキーによって創設され、その後も指導された。国民軍団は、アゾフ大隊の退役軍人および同大隊から派生した民間非政府組織「アゾフ市民軍団」のメンバーによって結成された。"
 UKR.Monarchist_icon: "£UKR_monarchism"
 UKR.Monarchist_vitrenko: "£UKR_feminism 人民野党ブロック"
 UKR.Monarchist_vitrenko_icon: "£UKR_feminism"
 UKR.Monarchist_vitrenko_desc: "£UKR_feminism 人民野党ブロックは、経済学者でありユーラシア青年連合のメンバーであるナタリア・ヴィトレンコが率いる、複数の右派・左派政党の連合体である。本質的に彼女は結束の象徴的存在であり、親西側汎スラヴ主義政党「ルーシ」、国家ボルシェビキ、キリスト教正教共産主義者を自らの政党の下に結集させている。"
 UKR.Monarchist_internet: "£UKR_neutral_internet (IP) ウクライナ・インターネット党"
 UKR.Monarchist_internet_icon: "£UKR_neutral_internet"
 UKR.Monarchist_internet_desc: "£UKR_neutral_internet ウクライナ・インターネット党は、ダース・ベイダーが設立し、率いている、自称世界初のインターネット政党である。そのスローガンは「官僚主義に対する電子政府」であり、ウクライナに電子政府を創設したいと考えている。実際には、この党はジョークであるが、多くの人気を集め、しばしば反共産主義的な行動をとる。しかし、シスの暗黒卿の背後に何が潜んでいるのかは誰にもわからない..."
