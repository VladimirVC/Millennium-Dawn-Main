 form_MAPHI_category: "Мафилиндо"
 form_MAPHI_category_desc: "Предполагаемая неполитическая конфедерация трех стран Юго-Восточной Азии на Малайском архипелаге в 1960-х годах. Эта мечта так и не была реализована из-за конфликта между Индонезией и Малайской федерацией. Объединение трех стран создало бы государство, которое могло бы соперничать с некоторыми крупными государствами мира."
 MAPHI_integrate_start: "Begin forming [GetMAPHINameDef]"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "Индонезия является ключевым регионом, богатым ресурсами, для предлагаемого государства. Крайне важно интегрировать Индонезию ради ресурсов и населения, которое она может предоставить."
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "Филиппины — крупный военно-морской и торговый узел в Тихом океане. Интеграция этой страны даст нам гораздо больше шансов начать доминирование в Тихом океане."
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "Сингапур - важнейший центр для нового государства. Его положение как крупного торгового порта и финансового центра делает его критически важным для успеха нового государства."
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "Малайзия в политическом отношении является одной из основных частей страны. Владение полуостровом позволяет нам иметь доступ к сухопутным путям в Азии."
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "Бруней — второстепенное государство в этом соглашении. Несмотря на свой малый статус, эта страна нуждается в интеграции."
 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 is_MAPHI: "Has formed [GetMAPHINameDef]"
 form_INDOCHI_category: "Индокитай"
 form_INDOCHI_category_desc: "Индокитай - это бывшая федерация государств Вьетнама, Камбоджи и Лаоса, существовавшая до 1954 года. Эти три государства вместе образуют одну из крупнейших экономик в мире и вмещают огромное количество населения. Это страна густых джунглей, холмов, гор и великолепного побережья. Сила страны - в людях и воле, которые ведут ее вперед в будущее."
 INDOCHI_integrate_start: "Begin forming [GetINDOCHINameDef]"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "Вьетнам обладает огромными природными ресурсами в горах и на побережье. Интеграция Вьетнама положит начало укреплению нашего влияния на страну."
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "Лаос, как и Вьетнам, обладает огромными запасами природных ресурсов."
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "Природная география и богатые земли Камбоджи важны для нации. Интеграция их в нацию также будет последовательно улучшать ее."
 INDOCHI_update_flag: "Finish Forming [GetINDOCHINameDef]"
 INDOCHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetINDOCHINameDef], adopting its unified flag and name."
 is_INDOCHI: "Has formed [GetINDOCHINameDef]"
 form_ANDES_category: "Андская федерация"
 form_ANDES_category_desc: "Андская федерация - это предлагаемый союз государств между странами [COL.GetNameWithFlag], [PRU.GetNameWithFlag] и [BOL.GetNameWithFlag]. В его основе лежит Андское сообщество, которое представляет собой свободную торговлю/экономический союз между странами. Общая численность населения нового государства составит более ста тринадцати миллионов человек, а площадь - четыре миллиона семьсот тысяч квадратных километров. По размеру это будет государство, аналогичное Мексике, с ВВП в три четверти триллиона долларов."
