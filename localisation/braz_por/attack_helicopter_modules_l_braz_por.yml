 helicopter_coaxial_engine_gen1_desc: "Uma aeronave de rotor coaxial é uma aeronave cujos rotores estão montados um acima do outro em eixos concêntricos, com o mesmo eixo de rotação, mas girando em sentidos opostos (contrarrotativos)."
