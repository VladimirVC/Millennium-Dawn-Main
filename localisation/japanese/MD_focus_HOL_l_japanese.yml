 HOL_royal_influence_church: "プロテスタントの台頭の回復"
 HOL_royal_influence_church_desc: "王権の刷新された力のもと、王室は国家機関に対する権威を再確立し、多元主義的影響力の大半を解体する。プロテスタント教会は公的生活におけるかつての中核的役割に近づき、規範・教育・法の指針として位置づけられる。"
 HOL_eindhoven_brainport_idea: "アイントホーフェン・ブレインポート"
 HOL_eindhoven_brainport_idea_desc: "アイントホーフェン・ブレインポートは、オランダを代表するハイテク地域であり、その革新性と先端技術産業で知られている。アイントホーフェンを中心とするこの地域は、半導体、自動車技術、ロボット工学などの分野における中核拠点だ。ASMLやフィリップスといったグローバル企業を擁するブレインポート・アイントホーフェンは、著しい経済成長を牽引し、オランダが技術と革新の分野で世界をリードする地位を確立する上で重要な役割を果たしている。"
 HOL_brainport: "アイントホーフェン・ブレインポート"
 HOL_brainport_desc: "アイントホーフェン・ブレインポートは、オランダを代表するハイテク地域であり、その革新性と先端技術産業で知られている。アイントホーフェンを中心とするこの地域は、半導体、自動車技術、ロボット工学などの分野における中核拠点だ。ASMLやフィリップスといったグローバル企業を擁するブレインポート・アイントホーフェンは、著しい経済成長を牽引し、オランダが技術と革新の分野で世界をリードする地位を確立する上で重要な役割を果たしている。"
