 UKR_increase_bureu_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
 UKR_decrease_bureu: "Demander une réduction des dépenses bureaucratiques"
 UKR_decrease_bureu_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
