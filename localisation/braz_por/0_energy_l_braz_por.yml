 energy_building_battery_parks_desc: "Escolhemos o caminho da energia nuclear. É hora de começar a construir os materiais necessários para nossa nação armazenar a energia geração por infraestrutura renovável."
 energy_automatic_fuel_purchase: "Automático §Y Compra de combustível §!"
 energy_automatic_fuel_purchase_desc: "Nós estamos atualmente comprando combustível no mercado a cada 28 dias."
