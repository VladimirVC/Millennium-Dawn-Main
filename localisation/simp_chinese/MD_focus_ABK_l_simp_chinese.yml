l_simp_chinese:
 ABK_Corruption_economic: "新千年的阿布哈兹"
 ABK_Corruption_economic_desc: "我们的国家并没有以最佳状态迎接新千年。腐败正在侵蚀我们的国家，基础设施在战争后遭到破坏，至今尚未恢复。"
 ABK_jd_abk_russia: "恢复与俄罗斯之间的交通"
 ABK_jd_abk_russia_desc: "我们需要恢复与俄罗斯之间的运输路线，因为它是我们目前唯一的盟友和合作伙伴。"
 ABK_tourism1: "发展旅游业"
 ABK_tourism1_desc: "现在是时候开始发展我国的旅游业了；或许从游客那里获得的收入能够帮助我们的经济渡过难关。"
 ABK_associated_state: "独立国家联合体"
 ABK_associated_state_desc: "俄罗斯愿意以联系国的形式帮助我们加入独联体。"
 ABK_internet_akvafon: "首次接入互联网"
 ABK_internet_akvafon_desc: "互联网在世界各地蓬勃发展；现在是我们在共和国发展互联网的时候了。"
 ABK_promotion_of_independence: "推动独立"
 ABK_promotion_of_independence_desc: "我们将通过一切媒体宣传我们共和国的独立。我们的国家能够独立存在。"
 ABK_promotion_of_russia: "对俄友好宣传"
 ABK_promotion_of_russia_desc: "俄罗斯是我们的朋友、兄弟和盟友。我们将通过所有媒体积极宣传这一观点。"
 ABK_training_in_russia: "在俄罗斯训练士兵"
 ABK_training_in_russia_desc: "我们将派士兵到俄罗斯接受训练，以获得更高级的作战经验。"
 ABK_russia_invest_industry: "俄罗斯投资工业"
 ABK_russia_invest_industry_desc: "我们已准备好就俄罗斯资金投资我行业达成协议。"
 ABK_visa_free_russia: "免签俄罗斯"
 ABK_visa_free_russia_desc: "我们已签署协议，取消两国之间的签证制度。我们希望这将有助于改善我们的经济状况。"
 ABK_tourism2: "继续发展旅游业"
 ABK_tourism2_desc: "我们需要吸引更多游客来我国旅游，因此我们将加大对旅游业的投资。"
 ABK_decrease_cencorship: "放宽审查"
 ABK_decrease_cencorship_desc: "我们将放弃以前实行的严格审查制度。"
 ABK_abkhazian_passports: "阿布哈兹护照"
 ABK_abkhazian_passports_desc: "我们准备推出阿布哈兹公民护照。"
 ABK_rearms_russia_us: "俄罗斯准备让我们重新军事化"
 ABK_rearms_russia_us_desc: "俄罗斯已准备好用现代化装备重新武装我们的军队。"
 ABK_energy_help: "开始着手解决能源问题"
 ABK_energy_help_desc: "我国长期以来饱受能源问题困扰，现在是时候着手解决这个问题了。"
 ABK_crypto: "加密货币合法化"
 ABK_crypto_desc: "我们的国家必须与时俱进。加密货币正在蓬勃发展，我们需要从中获益。"
 ABK_president_illness: "总统的病况"
 ABK_president_illness_desc: "我们的总统病重，无法履行国家元首的职责。是时候更换政府了。"
 ABK_sgb: "国家安全局"
 ABK_sgb_desc: "我们需要加强我们的国安局。"
 ABK_internet_a_mobail: "第二家电信公司"
 ABK_internet_a_mobail_desc: "A-Mobile将成为我国第二大电信运营商。"
 ABK_jd_abk_russia_arms: "俄罗斯铁道兵"
 ABK_jd_abk_russia_arms_desc: "俄罗斯准备调派一支铁路部队来修复我们的基础设施。"
 ABK_research_net: "互联网的发展"
 ABK_research_net_desc: "有必要进一步发展我们的互联网网络。"
 ABK_soo_friend: "与南奥塞梯的友谊"
 ABK_soo_friend_desc: "我们将继续改善与南奥塞梯同事的关系。"
 ABK_artshakh_friend: "与阿尔察赫共和国的友谊"
 ABK_artshakh_friend_desc: "我们将继续改善与阿尔察赫同事的关系。"
 ABK_new_era: "新时代"
 ABK_new_era_desc: "我们的共和国正在步入一个新时代。或许，在新总统的带领下，我们最终能够成为一个经济强大的国家。"
 ABK_increase_medicine: "发展医学"
 ABK_increase_medicine_desc: "必须加大对国家医疗保健的投入。我国人口正在下降，我们必须扭转这一趋势。"
 ABK_against_corruption: "开展反腐败战争"
 ABK_against_corruption_desc: "我们决心坚决根除腐败。"
 ABK_increase_education: "投资教育"
 ABK_increase_education_desc: "我们青少年的教育质量正在下降。我们需要加大投入，改善教育质量。"
 ABK_ros_neft: "与俄罗斯石油公司合作"
 ABK_ros_neft_desc: "俄罗斯石油公司愿意协助在我国境内发现石油储量。"
 ABK_rus_hydro: "俄罗斯水电公司"
 ABK_rus_hydro_desc: "我们已准备好批准俄罗斯水电公司在我们领土上的项目。"
 ABK_mvd_sgb: "合并国安局和内务部"
 ABK_mvd_sgb_desc: "现在是时候对我们的执法机构进行全面改革了。"
 ABK_let_russians_buy: "允许俄罗斯人购买房地产"
 ABK_let_russians_buy_desc: "我们将合法允许俄罗斯公民在我国购买房地产，从而提高我国的​​投资吸引力。"
 ABK_jd_abk_russia_help: "俄罗斯铁道部队的援助"
 ABK_jd_abk_russia_help_desc: "俄罗斯铁路部队已准备好留在我们共和国境内，暂时协助我们进行恢复工作。"
 ABK_our_place: "我们在世界上的位置"
 ABK_our_place_desc: "我们的人民必须在这个世界上找到自己的道路，而我们一定能找到。"
 ABK_cus_create: "与未获承认国家的关系"
 ABK_cus_create_desc: "我们将与其他处境相似的未被国际社会承认的国家建立关系。"
 ABK_abkhazian_farmers: "支持国内农民"
 ABK_abkhazian_farmers_desc: "我们不能总是指望外界给我们援助，所以支持国内农民应是我们的首要任务。"
 ABK_army: "武装力量改革"
 ABK_fleet: "阿布哈兹海军"
 ABK_air: "阿布哈兹空军"
 ABK_modernize_army: "军队现代化"
 ABK_modernize_army_desc: "我们不能削弱我们的军队，因为它是我们的主权保障。"
 ABK_network_warfare_desc: "网络中心战是一种军事理论，旨在通过构建地理位置分散的部队网络，将信息优势转化为竞争优势。采用这一理论将使我军在战场情报共享和运用方面实现现代化。"
 ABK_decentralized_warfare_desc: "第四代战争的特点是战争与政治、战斗人员与平民之间的界限日益模糊。接受这种去中心化的战争形式将使我们的部队能够以更大的灵活性和主动性开展行动。"
 ABK_president_illness2: "共产主义回归"
 ABK_president_illness2_desc: "我们将再次挺立在那红旗之下！"
 ABK_china_help: "中国投资"
 ABK_china_help_desc: "我们成功吸引了中国投资，促进了我国的发展。"
 ABK_china_help_jd: "中国投资铁路"
 ABK_china_help_jd_desc: "作为其更广泛战略的一部分，中国企业准备在我国修复铁路。"
 ABK_returm_marxism: "马克思主义重返校园"
 ABK_returm_marxism_desc: "过去的苏联文学将再次在我们这里发光发热，是时候教育新一代的共产主义接班人了！"
 ABK_increase_cencorship: "加强审查"
 ABK_increase_cencorship_desc: "我们有必要让人民的公敌闭嘴！"
 ABK_our_red_path: "红色道路是唯一的真理"
 ABK_our_red_path_desc: "共产主义和社会主义道路是我们国家唯一正确的道路。"
 ABK_one_party: "一个国家，一个政党"
 ABK_one_party_desc: "我们的国家不需要几十个不同的政党，一个就足够了。"
 ABK_china_invest_tech: "中国投资科技"
 ABK_china_invest_tech_desc: "中国企业已准备好为我们的技术产业提供资金。"
 ABK_defend_our_home: "保卫家园"
 ABK_defend_our_home_desc: "我们的国家时刻面临威胁。让我们一起保卫它。"
 ABK_defend_our_home2: "防御工事"
 ABK_defend_our_home2_desc: "我们不仅要激励人民，而且还要做好保卫边防的实际准备。"
 ABK_china_invest_mesta: "中国投资持续"
 ABK_china_invest_mesta_desc: "中国企业从之前的投资中获得了积极的成果，并准备继续秉持这种精神。"
 ABK_atheism: "无神论进万家"
 ABK_atheism_desc: "马克思主义的宣传将引导我们的人民重返无神论的光辉道路！"
 ABK_mil_prop: "军事宣传"
 ABK_mil_prop_desc: "如果我们的人民不团结起来战斗，我们的国家就无法保卫自己。"
 ABK_empower_sgb: "加强对安全部门投资"
 ABK_empower_sgb_desc: "国家必须得到来自内部的可靠保护。"
 ABK_mobilise_masses: "全面动员"
 ABK_mobilise_masses_desc: "阿布哈兹人民，起来！战斗到死！"
 ABK_nep: "重新实施新经济政策"
 ABK_nep_desc: "我们将再次启用旧方法。"
 ABK_fiveka: "第一个五年计划"
 ABK_fiveka_desc: "我们应该恢复五年计划的做法了。"
 ABK_free_education: "免费教育"
 ABK_free_education_desc: "每个阿布哈兹人都应该接受教育，无论他们身在何处！"
 ABK_collectivism: "集体主义"
 ABK_collectivism_desc: "让我们通过集体主义恢复阿布哈兹人民的团结。"
 ABK_sup_work: "支持工人"
 ABK_sup_work_desc: "每一位阿布哈兹工人都会受到国家保护。"
 ABK_people_militia: "人民民兵"
 ABK_people_militia_desc: "每个公民都应该保卫自己的祖国！"
 ABK_rel_quest: "宗教问题"
 ABK_rel_quest_desc: "我们该怎么处理这种微妙的东西？"
 ABK_rel_commu: "解放神学"
 ABK_rel_commu_desc: "他们可以合二为一吗？"
 ABK_farmer_collab: "支持农民"
 ABK_farmer_collab_desc: "农业是我们共和国的命脉。"
 ABK_president_illness3: "君主制回归"
 ABK_president_illness3_desc: "这些民主游戏已经把我们的国家搞得一团糟。只有真正的君主制才能拯救我们。"
 ABK_ally_with_mafia: "与黑帮结盟"
 ABK_ally_with_mafia_desc: "阿布哈兹的各部族长期以来分裂国家，对国家发展造成了不利影响。在君主制的旗帜下，我们将迫使他们为国家利益服务。"
 ABK_nati_ideas: "民族主义思想"
 ABK_nati_ideas_desc: "巩固我们的社会比以往任何时候都更加必要。为了进一步确保这一点，我们将以民族主义思想来强化它。"
 ABK_start_prepare_for_war: "整军备战"
 ABK_start_prepare_for_war_desc: "我们的邻国格鲁吉亚不会给我们和平，所以我们必须全力以赴地做好迎接即将到来的战争的准备。"
 ABK_abkhazian_kingdom: "阿布哈兹王国的遗产"
 ABK_abkhazian_kingdom_desc: "历史教科书是最好的宣传工具。是时候提醒我国人民，这片土地上曾经存在过一个阿布哈兹王国了。"
 ABK_miiltia: "阿布哈兹民兵"
 ABK_miiltia_desc: "是时候召集民兵了。战争的时刻即将到来。"
 ABK_militarism: "军国主义时代"
 ABK_militarism_desc: "军国主义对我们来说就像空气一样必不可少。"
 ABK_militari_industry: "军事工业"
 ABK_militari_industry_desc: "我们需要大量的枪"
 ABK_finish_opposition: "终结反对派"
 ABK_finish_opposition_desc: "反对派长期以来一直阻碍着我国的发展。现在我们已经放弃了民主，是时候清除所有反对派了。"
 ABK_church_help: "教会协助"
 ABK_church_help_desc: "宗教是我们生活中重要的一部分。愿它在我们正义的战争中保佑我们。"
 ABK_cis_2_military: "作为军事联盟的小独联体"
 ABK_cis_2_military_desc: "是时候将小独联体变成更一步的联盟了"
 ABK_ally_with_south_ossetia: "与南奥赛提建立军事联盟"
 ABK_ally_with_south_ossetia_desc: "在即将到来的战争中，我们必须并肩作战。"
 ABK_georgia_attack: "与格鲁吉亚开战"
 ABK_georgia_attack_desc: "是时候进行一场伟大的战斗了"
 ABK_arm_friend: "与亚美尼亚的友谊"
 ABK_arm_friend_desc: "是时候与亚美尼亚建立友好关系了"
 ABK_arm_battalion: "重振巴格拉姆扬营"
 ABK_arm_battalion_desc: "现在是时候重振巴格拉米扬营了，它是我们与亚美尼亚在对抗格鲁吉亚的斗争中友谊的象征。"
 ABK_abkhazvozvrashenstroy: "建立“回归阿布哈兹”基金"
 ABK_abkhazvozvrashenstroy_desc: "该基金将成为阿布哈兹新经济的基石。有了它，我们将能够吸引来自世界各地的投资。"
 ABK_parli_dead: "与议会的协议"
 ABK_parli_dead_desc: "是时候清除这个民主遗迹了。"
 ABK_dictatorship: "独裁君主"
 ABK_dictatorship_desc: "只有君主的铁腕才能拯救我们的国家。"
 ABK_sov_heast: "与俄罗斯的友谊"
 ABK_sov_heast_desc: "我们准备好和这样的俄罗斯做朋友"
 ABK_invest_from_eng: "来自英格兰的投资"
 ABK_invest_from_eng_desc: "我们希望得到英国的投资，因为英国在帕默斯顿勋爵统治下对西北高加索地区（包括阿布哈兹地区）人民的悲惨命运所扮演的角色，使其对我们负有特殊的责任。"
 ABK_invest_from_tur: "来自土耳其的投资"
 ABK_invest_from_tur_desc: "我们希望土耳其能够投资，土耳其在某种程度上卷入了马哈吉尔主义的悲剧。它参与基金会的活动，就意味着它参与了阿布哈兹人民的未来命运。"
 ABK_invest_from_chi: "来自中国的投资"
 ABK_invest_from_chi_desc: "吸引来自中国的投资是必要的。中华人民共和国作为世界大国之一和联合国安理会常任理事国，最不容易受到外部因素的机会主义压力影响。"
 ABK_repatriation: "遣返计划"
 ABK_repatriation_desc: "我们已准备好启动一项计划，让阿布哈兹族人返回家园。"
 ABK_tourism_sector: "针对旅游业的资本投资"
 ABK_tourism_sector_desc: "稳定的资金流入将使我们能够增加对旅游业的投资。"
 ABK_fight_with_narco: "对抗毒瘾"
 ABK_fight_with_narco_desc: "必须遏制毒品在我国的蔓延。"
 ABK_declare_kingdom: "宣布阿布哈兹王国的成立"
 ABK_declare_kingdom_desc: "是时候恢复我们民族昔日的辉煌了。"
 ABK_korea_workers: "吸引朝鲜工人"
 ABK_korea_workers_desc: "我们准备从朝鲜引进工人，帮助我们国家发展。"
 ABK_internal_state: "国内政策"
 ABK_internal_state_desc: "同时，也有必要解决国家内部问题。"
 ABK_sports_development: "发展体育事业"
 ABK_sports_development_desc: "一个健康的身体撑起一个健康的头脑！"
 ABK_education_development: "发展教育事业"
 ABK_education_development_desc: "我们的孩子必须具备读写能力，这样我们才能把我们的国家传承给他们。"
 ABK_wine: "发展葡萄酒产业"
 ABK_wine_desc: "葡萄酒是我们的一切"
 ABK_bul_bondex: "与保加利亚的友谊"
 ABK_bul_bondex_desc: "我们的统治王朝在保加利亚有着悠久的历史，并已在该国获得了相当的影响力。与保加利亚建立友好关系显然对我们有利。"
 ABK_china_sosiski: "从中国采购军火"
 ABK_china_sosiski_desc: "我们对一些武器样品感兴趣"
 ABK_eng_sosiski: "从英格兰采购军火"
 ABK_eng_sosiski_desc: "我们对一些武器样品感兴趣"
 ABK_rus_sosiski: "从俄罗斯采购军火"
 ABK_rus_sosiski_desc: "我们对一些武器样品感兴趣"
 ABK_armenia_sosiski: "从亚美尼亚采购军火"
 ABK_armenia_sosiski_desc: "我们对一些武器样品感兴趣"
 ABK_bulgaria_sosiski: "从保加利亚采购军火"
 ABK_bulgaria_sosiski_desc: "我们对一些武器样品感兴趣"
 ABK_let_wagner_enter: "雇佣瓦格纳"
 ABK_let_wagner_enter_desc: "我们有意聘请瓦格纳私人军事公司来保卫我们的国家。"
 ABK_unesko: "邀请联合国教科文组织"
 ABK_unesko_desc: "阿布哈兹是一片拥有悠久历史和灿烂文化的古老土地。现在，我们可以邀请联合国教科文组织帮助我们保护这份遗产。"
 ABK_free_zone: "自由经济区"
 ABK_free_zone_desc: "现在我们可以建立一个功能齐全的自由经济区，这将吸引投资进入我们的经济。"
 ABK_we_are_country: "我们是一个被承认的国家"
 ABK_we_are_country_desc: "我们终于得到了我们多年来一直努力实现的目标——现在我们的国家得到了世界的认可！"
 ABK_union_state: "申请成为联盟国"
 ABK_union_state_desc: "我们已准备好加入联盟国家。这种与俄罗斯的关系非常适合我们。"
 ABK_korea_trade: "与朝鲜的贸易"
 ABK_korea_trade_desc: "我们已准备好与朝鲜民主主义人民共和国建立贸易关系。"
 ABK_monarchy_eng: "与英国王室的友谊"
 ABK_monarchy_eng_desc: "我们的君主应该建立友好关系。"
 ABK_friend_russia: "与共产主义俄罗斯的友谊"
 ABK_friend_russia_desc: "只有在俄罗斯掌权的共产党人才能成为我们的伙伴和朋友。"
 ABK_friend_georgia: "与格鲁吉亚的友谊"
 ABK_friend_georgia_desc: "格鲁吉亚共产党人是我们的朋友"
 ABK_friend_armenia: "与亚美尼亚的友谊"
 ABK_friend_armenia_desc: "亚美尼亚共产党人是我们的朋友"
 ABK_Russian_Way: "俄罗斯军队的现代化之路"
 ABK_Russian_Way_desc: "我们选择了按照俄罗斯体制推进军队现代化的道路。"
 ABK_China_Way: "中国军队的现代化之路"
 ABK_China_Way_desc: "我们选择了按照中国体制推进军队现代化的道路。"
 ABK_CSTO_training: "与集安组织国家的演习"
 ABK_CSTO_training_desc: "与集体安全条约组织国家举行的联合演习将有助于我们的士兵学习新的作战技能。"
 ABK_Iska: "部署俄罗斯“伊斯坎德尔”与我们同在"
 ABK_Iska_desc: "火箭永远不会多余。"
 ABK_rus_officer: "俄罗斯军官学校"
 ABK_rus_officer_desc: "我们的军官将在俄罗斯军事院校学习。"
 ABK_china_rszo: "购买中国多管火箭系统"
 ABK_china_rszo_desc: "WM-80是中国的多管火箭系统。 由中国国营123厂开发。 它由中国对外贸易公司北方工业提供出口。 该系统已交付给孟加拉国、亚美尼亚、约旦和苏丹。"
 ABK_weapon: "与中国的军火交易"
 ABK_weapon_desc: "中国已同意免费向我们提供自动步枪。"
 ABK_China_training: "与中国军队一起训练"
 ABK_China_training_desc: "我们的战士将与中国士兵一起训练。"
 ABK_tur_sosiski: "购买土耳其装备"
 ABK_tur_sosiski_desc: "我们准备从土耳其购买少量装备。"
 ABK_union_social: "社保合作"
 ABK_union_social_desc: "我们已就联盟国家成员之间的社会互动达成协议，这将极大地便利我们公民的生活。"
 ABK_union_programm_care: "医疗领域合作"
 ABK_union_programm_desc: "这项关于医疗卫生领域合作的协议是联盟国家发展的重要一步，因为我们的公民现在将在全国范围内享受到相同标准的医疗保健。"
 ABK_union_btr: "技术和运输合作"
 ABK_union_btr_desc: "我们两国拥有强大的生产基础，我们将充分利用这一优势来提高关键设备的产量。"
 ABK_tourism1_idea: "阿布哈兹旅游业"
 ABK_tourism2_idea: "发展阿布哈兹旅游事业"
 ABK_outdated_army_idea: "过时的军队"
 ABK_outdated_army_idea_desc: "阿布哈兹军队装备非常落后，而且几乎没有训练。"
 ABK_victory_war_idea: "独立战争的胜利"
 ABK_victory_war_idea_desc: "阿布哈兹赢得了对格鲁吉亚的独立战争。阿布哈兹人民为此感到自豪，并铭记这场光荣的胜利。"
 ABK_mafia_idea: "阿布哈兹黑帮"
 ABK_mafia_idea_desc: "阿布哈兹是一个腐败深重、氏族势力根深蒂固的国家。权力被敌对的氏族瓜分，这显然阻碍了国家的发展。"
 ABK_mafia2_idea: "削弱阿布哈兹黑帮"
 ABK_mafia2_idea_desc: "我们的行动开始取得成效，黑帮的势力开始减弱。"
 ABK_mafia3_idea: "打击阿布哈兹黑帮"
 ABK_mafia3_idea_desc: "阿布哈兹黑帮几乎被逼入绝境；他们正在失去与政府和其他当局的联系。"
 ABK_mafia4_idea: "毁灭阿布哈兹黑帮"
 ABK_mafia4_idea_desc: "如今，仍有足够影响力对我国社会生活产生根本性影响的黑帮头目已寥寥无几。"
 ABK_energy_problems_idea: "能源问题"
 ABK_energy_problems_idea_desc: "阿布哈兹的能源基础设施状况糟糕透顶。独立战争几乎将其彻底摧毁，我们现在必须几乎从零开始重建。"
 ABK_energy_problems2_idea: "轻微能源问题"
 ABK_energy_problems2_idea_desc: "虽然取得了一些进展，但阿布哈兹的能源基础设施仍需大量投资才能从独立战争的破坏中完全恢复过来。"
 ABK_narcos_idea: "毒瘾"
 ABK_narcos_idea_desc: "阿布哈兹的毒品成瘾问题十分严重 - 越来越多的年轻人染上毒瘾。我们必须与之斗争！"
 ABK_narcos2_idea: "毒瘾"
 ABK_narcos2_idea_desc: "我国的毒品成瘾问题仍然影响着年轻人，但已不如以前那么严重了。"
