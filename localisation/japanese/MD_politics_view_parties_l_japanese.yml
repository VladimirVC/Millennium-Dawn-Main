 KYR.conservatism: "£KYR_western_conservative Respublika-Ata Zhurt"
 KYR.conservatism_desc: "Respublika-Ata Zhurt was a Kyrgyz political party that was created after the merger of the Respublika and Ata-Zhurt parties. The main goal of the political party is the development of liberalism through reforms aimed at increasing democracy in the country and greater transparency of the bureaucracy."
 KYR.liberalism: "£KYR_western_liberal Önügüü-Progress"
 KYR.liberalism_desc: "Önügüü-Progress is a political party in Kyrgyzstan led by Bakyt Torobayev. In terms of its place on the ideological and political spectrum, Önügüü-Progress is a centrist party. The party advocates private property, a market economy and the development of political, party and economic competition."
 KYR.socialism: "£generic_socialism_small Demokratiyalık Küchttör Birdiktelisi"
 KYR.socialism_desc: "The Union of Democratic Forces is a political party in Kyrgyzstan, founded in 1989 as a union of several political organizations in opposition to the communist government. The Union was transformed into a single unified party with the same name."
 KYR.Communist-State: "£KYR_emerging_communism Kyrgyzstan Kommunistterinin Partiyasy"
 KYR.Communist-State_desc: "The Party of Communists of Kyrgyzstan is a communist party in Kyrgyzstan, founded on 22 June 1992. It publishes the daily newspaper Pravda Kyrgyzstana. The party considers itself to be the successor of the Communist Party of Kirghizia, which ruled Kyrgyzstan during the Soviet era."
 KYR.Conservative: "£KYR_emerging_reactionary 社会民主党"
 KYR.Conservative_desc: "キルギス社会民主党は、キルギスに存在した政党である。党員らは1993年10月1日に党を結成したが、法務省への登録は1994年12月16日まで行われなかった。アブディガニ・エルケバエフが初代党首を務めた。1999年7月30日、アルマズベク・アタムバエフが後任となった。党員の大部分は国内の起業家層から構成されている。"
 KYR.anarchist_communism: "£KYR_anarchist_communism Bir Bol"
 KYR.anarchist_communism_desc: "Bir Bol, officially the Political Party of State Unity and Patriotism 'Bir Bol', was a liberal political party in Kyrgyzstan. It was led by Altynbek Sulaymanov. The party had been described as having 'low visibility'."
 KYR.Neutral_conservatism: "£KYR_non_aligned_conservative Kirgizstan"
 KYR.Neutral_conservatism_desc: "Kyrgyzstan is an eponymously-named centrist political party in Kyrgyzstan. It was established by Kanatbek Isaev, a former Respublika Member of Parliament. It is viewed as 'utterly apolitical' and focuses on supporting the government of Kyrgyz President Sooronbay Jeenbekov."
 KYR.neutral_Social: "£KYR_non_aligned_socialist_democrat Ata-Meken"
 KYR.neutral_Social_desc: "The Ata-Meken Socialist Party is a social-democratic political party in Kyrgyzstan. Its current Chairman and founder is Omurbek Tekebayev, who is a former speaker of the Kyrgyz Parliament. The party was registered on December 16, 1992, following a split between Tekebayev (as well as more moderate party members) and the conservative Erkin Kyrgyzstan party. Ata-Meken eventually moved into the centre-left of the political spectrum."
 KYR.Neutral_green: "£generic_Neutral_green_small キルギス農業労働党"
 KYR.Neutral_green_desc: "キルギス農業労働党は、労働者、農民、および同共和国の農業・畜産加工業のインフラに従事する労働者らによる自発的な社会・政治組織であり、産業経済と生活様式の変革に基づき、農業・畜産加工従事者や村人の社会的権利と切実な利益、ならびに彼らの自由と民主的価値観を守るために結集したものである。"
 KYR.Nat_Autocracy: "£KYR_nationalist_military_junta キルギス共和国軍"
 KYR.Nat_Autocracy_desc: "キルギス共和国軍は、キルギスの国軍である。当初は、独立したばかりのキルギスに駐留していた旧ソビエト連邦のトルキスタン軍管区の部隊を基に編成された。陸軍、空軍、国家警備隊で構成されている。軍に所属する治安部隊には、内務軍、国家安全保障委員会、国境警備隊が含まれていた。"
 KYR.Nat_Populism: "£KYR_nationalist_right_wing_populist 統一キルギスタン"
 KYR.Nat_Populism_desc: "統一キルギスタンは、キルギス共和国の民族主義政党で、主に同国南部で支持を集めている。党首はアダハン・マドゥマロフが務めており、民族主義的なイデオロギーを掲げ、大統領制を支持している。同党は当初、ロシアで働くキルギス人出稼ぎ労働者を支援するために設立された。"
 LAO.Communist-State: "£generic_Communist_State_small (LPRP) ラオス人民革命党"
 LAO.Communist-State_desc: "マルクス・レーニン主義 - 1955年にインドシナ共産党から分離して結成されたラオス人民革命党は、すぐに北ベトナムの共産主義政権と提携し、当時存在していたラオス王国に対してゲリラ戦を展開した。ソ連のマルクス・レーニン主義思想とベトナム独自のホー・チ・ミン思想の影響を受け、最終的にはその両方を基盤とした社会主義体制を確立した。社会主義陣営の崩壊に伴い、同党は国内で改革を実施せざるを得なくなったが、隣国ベトナムとは異なり、より多くの統制を維持することを優先し、これらの要素の大部分を抑制した。"
 LAO.Neutral_Communism: "£generic_Neutral_Communism_small (LPRP) ラオス人民革命党 - 改革派"
 LAO.Neutral_Communism_desc: "改革共産主義 - 1955年にインドシナ共産党から分離して結成されたラオス人民革命党は、すぐに北ベトナムの共産主義政権と提携し、当時存在していたラオス王国に対してゲリラ戦を展開した。ソ連のマルクス・レーニン主義思想とベトナム独自のホー・チ・ミン思想の影響を受け、最終的にはその両方を基盤とした社会主義体制を確立した。社会主義陣営の崩壊に伴い、同党は国内で改革を実施せざるを得なくなったが、隣国ベトナムとは異なり、より多くの統制を維持することを優先し、これらの要素の大部分を抑制した。"
 LAO.Nat_Autocracy: "£generic_Nat_Autocracy_small (LPAF) ラオス人民軍"
 LAO.Nat_Autocracy_desc: "赤色軍事政権 - ラオスの君主制打倒に貢献した親共産主義の革命運動や民兵組織を前身とする現在のラオス人民軍は、それ以来、国内外を問わず比較的少数の紛争にしか関与していない。隣国の中国やベトナムと同様、ラオス人民革命党は、公式・非公式を問わず、イデオロギー的・経済的な結びつきを通じて軍内に広範な影響力を維持している。"
 LAO.Monarchist: "£generic_Monarchist_small ラオス王家"
 LAO.Monarchist_desc: "専制君主制 - 1904年から1975年までラオスを統治したラオス王家は、当時東南アジア全域に広く見られた伝統的な権力構造、すなわち分散型で、ある程度世俗的な君主制を基盤として統治を行っていた。王政打倒以来、王族の多くはフランスを拠点とし、主に亡命生活を送っている。隣国カンボジアと同様、王族の何人か、特に「赤い王子」として知られる社会主義ラオスの初代大統領スファヌボンなどは社会主義運動に加わり、その子孫は現在も主にラオスで生活している。"
 LAT.conservatism: "£LAT_western_conservative (JL) New Era Party"
 LAT.conservatism_desc: "(Conservative Liberalism) - The New Era Party (Latvian: Jaunais Laiks)\n\n JL is a liberal populist party founded by a central banker and popular politician Einars Repše. The party favors fighting corruption and the oligarchy, but due to its harsh populist rhetoric, the party finds it difficult to negotiate with other politicians."
 LAT.liberalism: "£LAT_western_liberal (LC) Latvian Way"
 LAT.liberalism_desc: "(Liberal Conservatism) - The Latvian Way (Latvian: Latvijas Ceļš)\n\n LC is a liberal party founded by Popular Front activists in 1993. The party dominated in Latvia's first democratic elections and also remained the main liberal force in the nineties. The party advocates for democratization, individual rights, and is a member of Liberal International and the ALDE."
 LAT.socialism: "£LAT_western_social (LSDSP) Latvian Social Democratic Workers' Party"
 LAT.socialism_desc: "(Social Democracy) - The Latvian Social Democratic Workers' Party (Latvian: Latvijas Sociāldemokrātiskā Strādnieku Partija)\n\n LSDSP is one of the oldest political parties in Latvia, established in 1918, having split from the Russian Social Democratic Labor Party. Before the dictatorship, the party dominated Latvian politics and after the annexation of Latvia, party members migrated to other countries where they organized sections of the LSDSP. After the restoration of Latvia's independence, party members returned to the country and re-registered the LSDSP. The party advocates social democratic positions, supporting social equality, broad investment in welfare."
 LAT.Western_Autocracy: "£LAT_western_autocracy (LPP) ラトビア第一党"
 LAT.Western_Autocracy_desc: "キリスト教保守主義 - ラトビア第一党（ラトビア語：Latvijas Pirmā Partija）\n\n ラトビア第一党は、キリスト教活動家やカトリック教会の指導者たちによって設立された保守政党である。同党は宗教的・ポピュリスト的な主張を融合させ、伝統的価値観と社会福祉を提唱している。"
 LAT.anarchist_communism: "£LAT_anarchist_communism (SDLP) Social Democratic Welfare Party"
 LAT.anarchist_communism_desc: "(Social Democracy) - The Social Democratic Welfare Party (Latvian: Sociāldemokrātiskā Labklājības Partija)\n\n SDLP was founded by a businessman Juris Žuravļovs. The party advocates social democratic positions and cooperates with pro-Russian parties."
 LAT.Neutral_conservatism: "£LAT_neutral_conservative (TP) People's Party"
 LAT.Neutral_conservatism_desc: "(National Conservatism) - The People's Party (Latvian: Tautas Partija)\n\n TP is one of the main political parties in Latvia, founded in 1998. The party has conservative views on society and economy and is a member of the European People's Party."
 LAT.oligarchism: "£LAT_oligarchism (KP) ロシア党"
 LAT.oligarchism_desc: "ロシア系少数民族の利益 - ロシア党（ラトビア語：Krievu Partija）\n\n ロシア党は、1989年にラトビア最高会議内の「平等」派閥として設立された政党である。1993年、この会派は政党へと改組され、当初は「民主的イニシアチブセンター」と称されたが、後に現在の名称を採用し、ロシア系少数民族の利益の代表を最優先事項とした。"
 LAT.neutral_Social: "£LAT_neutral_socialism (SDP) Social Democratic Party"
 LAT.neutral_Social_desc: "(Social Democracy) - The Social Democratic Party (Latvian: Sociāldemokrātiskā Partija)\n\n SDP is a left-wing political party created as a result of a split within the LSDSP. The SDP supporters believed that the LSDSP should not align itself with pro-Russian parties and as a result, the SDP was founded. Interestingly, after its establishment, the SDP entered into a coalition with pro-Russian parties."
 LAT.Neutral_Libertarian: "£LAT_neutral_libertarian (LPP) ラトビア海賊党"
 LAT.Neutral_Libertarian_desc: "海賊政治 - ラトビア海賊党（ラトビア語：Latvijas Pirātu partija）\n\n ラトビア海賊党は、海賊党の国際的な運動の一翼を担っており、市民権の強化や特許・著作権制度の改革などを含む、海賊党運動の基本綱領を提唱している。"
 LAT.Neutral_Autocracy: "£LAT_neutral_autocracy (ZZS) 緑と農民連合"
 LAT.Neutral_Autocracy_icon: "£LAT_neutral_autocracy"
 LAT.Neutral_Autocracy_desc: "農本保守主義 - 緑と農民連合（ラトビア語：Zaļo un Zemnieku savienība）\n\n 緑と農民連合は、ラトビアで最も影響力のある選挙連合の一つであり、その基盤はラトビア農民連合である。同連合は中道右派の保守的な立場をとり、農業への投資を支持している。また、同連合は自らを農業の擁護者と位置づけ、環境に優しいと考える民間農場や伝統的な農業へのさらなる配慮を提唱している。"
 LAT.Neutral_green: "£LAT_neutral_green (LZS) ラトビア緑の党"
 LAT.Neutral_green_icon: "£LAT_neutral_green"
 LAT.Neutral_green_desc: "環境保守主義 - ラトビア緑の党（ラトビア語：Latvijas Zaļā Partija）\n\n ラトビア緑の党は、ソ連時代からラトビアに存在した様々な小規模な環境保護団体にそのルーツを持ち、1990年に環境保護クラブの代表者たちによって党として登録され、ラトビア・ソビエト社会主義共和国で初めて登録された政党となった。ソ連崩壊後、LZSはラトビア最高会議で7議席を獲得し、ラトビア憲法の復活とセイマの再設立後は、定期的に選挙に参加してきた。LZSは自らを中道右派と位置づけ、環境保護の理念に加え保守的な思想も支持している。また、同党は民族主義団体や政党との協力関係にも積極的である。"
 LAT.Nat_Autocracy: "£LAT_military_junta (NBS) ラトビア国軍"
 LAT.Nat_Autocracy_desc: "軍事政権 - ラトビア国軍（ラトビア語：Latvijas Nacionālie Bruņotie Spēki）\n\n ラトビア国軍は、20世紀の10年代から20年代にかけて、第一共和国の軍隊として創設されたことを起源とする長い歴史を有している。ソ連時代を経て、ラトビア国軍は再建され、現在は新たなラトビア共和国の一翼を担っている。国軍の任務は、敵対的な国家による侵害からラトビアの主権を守ること、および国際的な作戦に参加することである。"
 LAT.Nat_Populism: "£LAT_national_populist (TB/LNNK) 祖国と自由のために/LNNK"
 LAT.Nat_Populism_desc: "民族主義的保守主義 - 祖国と自由のために/LNNK (ラトビア語：Tēvzemei un Brīvībai/LNNK)\n\n 祖国と自由のために/LNNKは、1993年に「祖国と自由のために」と「ラトビア民族独立運動（LNNK）」が合併して結成された主要な民族主義政党である。「祖国と自由のために」自体は、「祖国」と「11月18日連合」が合併して結成された。同党のルーツは蜂起による解放運動にあり、独立直後にはいくつかの政党が結成された。同党は単一民族国家と伝統的価値観を提唱し、経済の自由化を支持している。"
 LBA.conservatism: "£LBA_conservatism 祖国連合"
 LBA.conservatism_desc: "（地域主義） - 祖国連合は、イタリア植民地主義と戦ったトリポリタニア共和国の創設者の一人であるラマダン・アスウェーリーの孫、アブドゥッラーマン・セウェリによって設立された反カッザーフィー派の政党である。同党はフランス式の統領制と、連邦制ではないが地方分権化を提唱している。"
 LBA.liberalism: "£LBA_liberalism (NPDW) 国民開発福祉党"
 LBA.liberalism_desc: "（自由主義） - 国民開発福祉党\n\n国民開発福祉党は、リビアの元外交官で亡命者のアリー・ゼイダーンによって設立された小政党である。"
 LBA.Autocracy: "£LBA_Autocracy_small (GPC) 全国人民会議"
 LBA.Autocracy_icon: "£LBA_Autocracy_small"
 LBA.Autocracy_desc: "第三国際理論 - 全国人民会議（アラビア語ローマ字表記：Al-Lajna Ash-Sha'biyya Al-'amma）\n\n全国人民会議はリビアの行政執行機関である。これは全国人民会議の構成員によって選出され、さらにその会議の構成員は基礎人民会議（自治体レベルの統治機構）によって選ばれる。理論上はボトムアップで指導者を選出する仕組みだが、実際にはカッザフィーとその側近が権限を掌握している。"
 LBA.Caliphate: "£LBA_Caliphate (LFG) リビア・イスラム戦闘団"
 LBA.Caliphate_desc: "サラフィー・ジハード主義 - リビア・イスラム戦闘団\n\nリビア・イスラム戦闘団は、ソビエト連邦の侵攻後、アフガニスタンから帰国したリビア人戦闘員によって設立された。アルカイダとの関連が疑われており、このグループの目標はカッザーフィーを打倒し、リビアにイスラム国家を樹立することである。1996年のカッザーフィー暗殺未遂事件後、このグループはカッザーフィー政権から絶え間ない圧力を受けている。"
 LBA.Kingdom: "£LBA_Kingdom (HP) 祖国党"
 LBA.Kingdom_desc: "イスラム民主主義 - 祖国党 (アラビア語ローマ字表記：Hizb Al-Watan)\n\n祖国党は、サラフィ主義の聖職者アリ・アッ＝サッラービーが運営するイスラム主義政党である。リビア当局に拘束され8年間投獄された後、アッ＝サッラービーは宗教研究のためにサウジアラビアに移住した。祖国党は、リビアの憲法をシャリーア法に基づいて改革することを目指している。"
 LBA.Neutral_conservatism: "£LBA_Neutral_conservatism （NSFL） - リビア救済国民戦線"
 LBA.Neutral_conservatism_desc: "（反カッザーフィー主義） - リビア救済国民戦線\n\nリビア救済国民戦線は、リビア国内で活動する反カッザーフィー派の反体制組織である。リビアの政治家やチャド・リビア戦争の退役軍人から結成されたこの組織は、当初は武装組織として始まった。しかし、80年代にカッザーフィー個人に対する攻撃が失敗した後、組織はより平和的な戦術へと移行した。"
 LBA.Neutral_Libertarian: "£LBA_Neutral_Libertarian （DP） - 民主党"
 LBA.Neutral_Libertarian_desc: "（自由主義） - 民主党\n\n民主党は、小規模な自由主義的で世俗的な政党である。宗教と国家の分離を支持し、党の綱領にはいくつかの親イスラエル政策が含まれている。"
 LBA.Neutral_Muslim_Brotherhood: "£LBA_Neutral_Muslim_Brotherhood (JCP) 公正建設党"
 LBA.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 - 公正建設党\n\n公正建設党は、リビアにおけるムスリム同胞団の地方政党である。同党は、この運動の目標と原則を共有している。"
 LBA.Nat_Autocracy: "£generic_Nat_Autocracy_small (AFLAJ) リビア・アラブ・ジャマーヒリーヤ国軍"
 LBA.Nat_Autocracy_desc: "軍事政権 - リビア・アラブ・ジャマーヒリーヤ国軍\n\nリビア・アラブ・ジャマーヒリーヤ国軍は、リビアの防衛を担当する主要機関である。カッザーフィーの下では、軍は正規軍と革命防衛隊に分かれていた。後者ははるかに装備が良く、正規軍を監視する番犬として機能した。"
 LBA.Nat_Fascism: "£LBA_Nat_Fascism (LNM) リビア国民運動"
 LBA.Nat_Fascism_desc: "イラク・バアス主義 - リビア国民運動\n\nリビア国民運動は、1980年にバアス主義者の弁護士によって結成された反カッザーフィー派の反対集団である。特に結成間もないころには、党はイラク・バアス党から多額の資金援助を受けていた。"
 LBA.Monarchist: "£LBA_Monarchist (HoS) サヌーシー朝"
 LBA.Monarchist_desc: "部族君主主義 - サヌーシー家\n\nサヌーシー家は、第二次世界大戦後においてイドリース王の下でリビアの支配権を引き継いだ。王政は1969年にカッザーフィーのクーデターによって打倒されるまで続いた。当初こそは拘禁されていたが、王家は1988年にイギリスへと亡命した。王室は現在でもリビアでは一定の支持を受けており、王家の一族はカッザーフィーの支配に反対する運動を積極的に行っている。"
 LEB.conservatism: "£LEB_western_conservatism （LF）レバノン軍団"
 LEB.conservatism_desc: "キリスト教民主主義 - 当初、イスラエルの支援を受けて権力の座に就いたレバノンの元独裁者バシール・ジェマイエルによって設立されたレバノン軍団は、キリスト教系政党、民兵組織、その他の諸団体を統一的な傘組織の下で調整することを目的とした団体であった。党内の対立に加え、内戦とその余波により、この運動は分裂を余儀なくされ、かつての政党や団体が再び離脱することとなった。内戦終結後に再結成された同党は、シリア占領下において引き続き活動禁止の状態にあった。"
 LEB.liberalism: "£LEB_liberalism （FM）未来運動"
 LEB.liberalism_desc: "古典的自由主義 - 1995年に連合として結成され、当初は創設者のサアド・ハリリにちなんで名付けられた未来運動は、穏健な自由主義および民族主義的な立場を掲げている。同党は、レバノンの多くの政党と同様、特定の民族・宗教集団を基盤としており、国内のスンニ派イスラム教徒を代表する存在となっている。"
 LEB.socialism: "£LEB_social_democratism （PSP）進歩社会党"
 LEB.socialism_desc: "民主社会主義 - ドゥルーズ派と結びつきのある進歩社会党は、レバノン全土を代表する広義の左派政党であると自認しており、世俗主義や進歩主義を提唱し、国内の既成勢力に反対している。内戦中、同党はイスラエルが支援するマロン派政府に対して武装蜂起し、パレスチナ解放軍やシリア軍などの勢力と共に戦って領土を奪取した。内戦終結後、同党はさらに存在感を増し、連立政権の形成において重要な役割を果たすとともに、当初はシリアによるレバノン占領を支持した。"
 LEB.Western_Autocracy: "£LEB_pro_western_autocratism （NB）国民ブロック"
 LEB.Western_Autocracy_desc: "国民自由主義 - 1946年に結成されたレバノン国民ブロックは、それ以前から選挙連合として活動しており、自由主義的な政策と立場を掲げている。具体的には、貧困の削減、人権の擁護、自由民主主義と世俗主義の維持を主張している。内戦中、同党はどちらの陣営にも加わらず、イスラエルとシリアの両国に対して批判の声を上げ、レバノンの主権侵害を非難するよう国際社会に呼びかけるまで行った。歴史的に同党は親欧米（親仏）の立場をとっており、現在もレバノンと既存の国際秩序との結びつきを強化しようと尽力している。"
 LEB.Communist-State: "£LEB_emerging_communism （LCP）レバノン共産党"
 LEB.Communist-State_desc: "マルクス・レーニン主義 - 1924年に結成されたシリア・レバノン共産党の一部として存在していたが、1964年の正式な分裂を経て、レバノン共産党は独立した組織となった。委任統治下で禁止され、後にナセル主義や汎アラブ主義に対する立場から疎外された同党は、その後、他の左翼政党やレバノン国内の進歩的勢力との同盟を結ぶことを選択した。内戦中、同党はイスラエルが支援するマロン派政府に反対し、党員の大部分がキリスト教徒であるにもかかわらず、主にイスラム教徒からなる民兵組織と同盟を結んだことで注目された。しかし、内戦の終結とともに、同党は危機に直面し始めた。内戦の終結はソ連の解体と時期を同じくしていたのである。ソ連からのイデオロギー的独立を推進してきた指導者がいたにもかかわらず、党内では度重なる選挙や内紛が続き、党は安定を取り戻すのに苦戦した。"
 LEB.Conservative: "£LEB_reactionism 連合党"
 LEB.Conservative_desc: "右派ナセル主義 - 連合党は「革命の復活」として結成され、1990年に現在の党名を採用した。名目上はナセル主義という汎アラブ主義のイデオロギーを掲げる世俗政党であり、伝統的に穏健な進歩主義かつ確固たる左派の立場をとっている。選挙での成果が乏しいこと、およびレバノン国内の特殊な事情により、政治への影響力はほとんどない。同党はシリア、イラン、さらにはカタールとも関係を維持しており、その活動に対して外国からの支援や後押しを得ている。"
 LEB.Autocracy: "£SYR_Autocracy レバノン・アラブ社会主義バアス党"
 LEB.Autocracy_desc: "新バアス主義 - レバノン地域支部としても知られるレバノンのアラブ社会主義バアス党は、より大規模な組織のレバノン支部である。新バアス主義に従い、同党はシリアおよび名目上は左派的なバアス主義の潮流と強く連携している。内戦中は左派政党と共闘し、シリアによるレバノンへの介入と占領を支持した。"
 LEB.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ヒズボラ"
 LEB.Vilayat_e_Faqih_desc: "ホメイニ主義 - イランのイスラム革命に多大な影響を受けたヒズボラは、ジハード主義、超保守主義、攻撃的な反西洋感情、汎イスラム主義を掲げる過激なシーア派の教義に従っている。1990年代以降、レバノン国内の不安定な情勢や、地域内での影響力拡大を図るイスラエルやイランといった諸国による外国の干渉も一因となり、同組織はレバノンにおいて台頭してきた。その人気、規模、そして影響力の拡大に伴い、多様な支持基盤を獲得している。そのイデオロギー的立場はマニフェストほど明確ではないと指摘する声もあるが、指導部や事実上の政策は依然として、より原理主義的なイスラム教の路線に沿ったものである。"
 LEB.Mod_Vilayat_e_Faqih: "£LEB_moderate_shiite_revolutionary アマル運動"
 LEB.Mod_Vilayat_e_Faqih_desc: "ポピュリスト的自由主義 - レバノンのシーア派コミュニティを代表するアマル運動は、世俗主義とナショナリズムを掲げる穏健なリベラル路線をとっているが、同時にシーア派コミュニティの代表としての立場を明確に維持している。内戦期には、同党のより過激で右寄りのライバルとして台頭したヒズボラと戦ったこともあり、シーア派民兵組織の中でも特に有力な存在の一つであった。"
 LEB.anarchist_communism: "£generic_anarchist_communism_small （ADP）アラブ民主党"
 LEB.anarchist_communism_desc: "新バアス主義 - アラウィー派青年運動から派生したアラブ民主党は、レバノンにおける親シリア政党であり、かつて勢力を誇ったバース主義運動と思想的に連帯している。歴史的に見て、同党は内戦期においても左派政党との連携を図り、共に戦ってきたが、シリアとの結びつきや、母国と見なされるシリアとの統一への志向を一貫して維持してきた。"
 LEB.Caliphate: "£generic_Caliphate_small パルチザン同盟"
 LEB.Caliphate_desc: "サラフィー主義 - レバノン政府の打倒を主張するパルチザン同盟（アスバト・アル＝アンサール）は、1990年代に結成されたサラフィー主義組織である。主に難民キャンプを支持基盤とするこのグループは規模は比較的小さいが、その過激なイデオロギーとアルカイダとのつながりから、レバノン国内外でテロ組織に指定されている。"
 LEB.Kingdom: "£generic_Kingdom_small  (HT) ヒズブ・タフリール"
 LEB.Kingdom_desc: "超反動主義的イスラム主義 - 国際的な運動であるヒズブ・タハリール（解放党）は、厳格なシャリーア法の下で統一された世界的なカリフ制の樹立を提唱している。同団体は、自由民主主義、自由主義的資本主義、社会主義、共産主義、そして近代主義そのものを否定している。他のイスラム・ジハード主義組織とは一線を画す過激かつ異なる見解を持つため、同組織は世界全体が最終的にどのような状態になるべきかについて、独自のかなり曖昧なビジョンを打ち出している。"
 LEB.Neutral_conservatism: "£LEB_non_aligned_conservatism 自由愛国運動"
 LEB.Neutral_conservatism_desc: "キリスト教民主主義 - 1994年に結成された自由愛国運動は、レバノンのマロン派カトリック教徒を代表する政党である。シリア占領下では、同党は選挙活動への参加を控え、主に国外で活動していた。"
 LEB.oligarchism: "£LEB_oligarchism (NDP) 国民対話党"
 LEB.oligarchism_desc: "古典的自由主義 - 主に世俗主義と自由主義を掲げる国民対話党は、選挙制度改革や政府内の「透明性」の確保も目指している。同党は2004年、実業家のフアド・マクズーミによって設立された。"
 LEB.neutral_Social: "£LEB_socialist_democratism タシュナク/アルメニア革命連盟"
 LEB.neutral_Social_desc: "民主社会主義 - タシュナクは、レバノンにおけるアルメニア革命連盟の現地での呼称で、アルメニア系住民の利益を代表するレバノン最大の政党であると言えるだろう。民主社会主義のイデオロギーを掲げ、レバノンの独立以来、歴代の政権において積極的に活動してきた。より広範なアルメニア革命連盟の一翼を担う同党は、アルメニア本国やアルメニア人ディアスポラ全体とも強いつながりを持っている。"
 LEB.Neutral_Libertarian: "£LEB_libertarianism （MM）マラダ運動"
 LEB.Neutral_Libertarian_desc: "キリスト教民主主義 - 初期キリスト教徒の一派であるマルダイト派に由来する名称を持つマラダ運動は、1967年に民兵組織として結成され、レバノン内戦に参加した。当初はイスラエルの支援を受けたマロン派政府と提携していたが、やがて離反し、代わりにシリアと提携するようになった。1991年に政党として組織化された際も、同運動は親シリアの立場を維持した。ただし、かつての信条の多くも保持しており、レバノンのマロン派を代表する右派政党としての性格を保っている。"
 LEB.Neutral_Autocracy: "£generic_Neutral_Autocracy_small タギール運動"
 LEB.Neutral_Autocracy_desc: ""
 LEB.Neutral_Communism: "£LEB_non_aligned_communism (WL) 労働者連盟"
 LEB.Neutral_Communism_desc: "汎アラブ・マルクス・レーニン主義 - 1974年に進歩社会党から分裂して結成された労働者運動は、汎アラブ民族主義とマルクス・レーニン主義思想の融合を提唱している。レバノン内戦中、同団体は他の左派政党と共にレバノン国民運動の側に立って戦ったが、党員数と支持基盤の両面で大きな打撃を受けた。しかし、戦後には回復し、親シリア派ブロックの一員として選挙で若干の成功を収めることができた。"
 LEB.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small イスラム集団"
 LEB.Neutral_Muslim_Brotherhood_desc: "イスラム主義 - より大規模な組織であるムスリム同胞団のレバノン支部として設立されたイスラム集団は、レバノンにおいてシャリーアに基づく法制度の確立を提唱している。同組織は、主にムスリム同胞団と同様の政策方針を掲げており、ヒズボラやハマスとも協力関係にある軍事部門を擁している。"
 LEB.Neutral_green: "£generic_Neutral_green_small （GPL）レバノン緑の党"
 LEB.Neutral_green_desc: "緑の政治 - 2008年に結成されたレバノン緑の党は、一般的な進歩的かつ環境保護主義的な緑の党の政策綱領を掲げている。しかし、レバノン特有の事情により、同党は宗派主義的な政策を掲げる政党に比べ、ほとんど成果を上げられておらず、多民族的な構成を持つ政党にさえ影を薄くされている。"
 LEB.Nat_Autocracy: "£LEB_military_junta (LAF) レバノン軍"
 LEB.Nat_Autocracy_desc: "宗派主義的軍事政権 - 1945年に正式に創設されたレバノン軍は、その歴史において多くの論争に巻き込まれてきた。レバノンの宗派主義的な性質ゆえに、ある民族集団を別の集団に対して優位に立たせるために軍が利用されるという懸念が、政治の場に多かれ少なかれ常に付きまとっており、最終的にはレバノン内戦という形で事態は頂点に達した。キリスト教徒が支配的であると見なされていた軍は、脱走による解体の危機に直面した。ムスリム、ドゥルーズ派、さらには非マロン派のキリスト教徒までもが離反し、民族系民兵組織やイデオロギー的に同調するグループに加わったのである。内戦後、軍は再編・再編成された。その戦闘のほとんどは、イスラエルとの間、あるいは国内においてPLOや民兵組織との間で行われてきた。"
 LEB.Nat_Fascism: "£IRQ_Nat_Autocracy_small 社会主義アラブ・レバノン前衛党"
 LEB.Nat_Fascism_desc: "イラク・バアス主義 - アラブ社会主義バアス党のイラク系分派のレバノン支部として設立された、社会主義アラブ・レバノン前衛党は、サダム政権を支持している。内戦時には、同党はマロン派政府に対抗するレバノン国民運動に味方したが、国内におけるイスラエルとシリアの両方の介入には反対した。同党は、イラク・バアス主義の標準的な政策綱領を提唱している。"
 LEB.Nat_Populism: "£LEB_fascism (SSNP-L) シリア社会民族党（レバノン支部）"
 LEB.Nat_Populism_desc: "社会民族主義 - 大規模なシリア社会民族党のレバノン支部である同党の綱領と理念は、シリア本部のものと一致しており、汎シリア民族主義と「大シリア」構想を中心とした、さまざまな思想が融合したものである。同党はレバノン内戦中、かつて対立していた多くの左翼勢力と共に戦ったが、シリアがレバノンに介入すると、当然ながら最終的にはシリア側に付くことになった。"
 LEB.Monarchist: "£generic_Monarchist_small シハーブ家"
 LEB.Monarchist_desc: "首長国 - シハーブ家は、レバノンの歴史的な統治者であり、オスマン帝国の支配下に入る前は、より狭い地域を統治していた。彼らの支配は、1840年の東方危機において、ヨーロッパ列強がムハンマド・アリーを追放したことで、ついに終焉を迎えた。その後、オスマン帝国は当時のレバノン首長バシール2世を廃位し、その地位を総督制に置き換えた。現代においても、この一族はレバノン国内で一定の地位を保っており、ムスリムとマロン派の分家が現在も存続している。"
 LES.conservatism: "£generic_conservatism_small バソト国民党"
 LES.conservatism_desc: ""
 LES.socialism: "£generic_socialism_small レソト民主会議"
 LES.socialism_desc: ""
 LES.anarchist_communism: "£generic_anarchist_communism_small バソトランド会議党"
 LES.anarchist_communism_desc: ""
 LES.neutral_Social: "£generic_neutral_Social_small 民主議会党"
 LES.neutral_Social_desc: ""
 LES.Nat_Autocracy: "£generic_Nat_Autocracy_small レソト国防軍"
