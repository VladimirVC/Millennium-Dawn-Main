 UKR_delta: "Дельта"
 UKR_delta_desc: "The Ukrainian system of information support for decisions and situational awareness on the battlefield has access to the program for active military personnel who have passed verification. Login is carried out via the Internet through authorization and two-factor authentication on a special website.\n\nAuthorized users can view and enter data on known enemy positions, spotted enemy aircraft, ground equipment, and more."
 UKR_oplit: "Государственный научно-исследовательский и конструкторский центр судостроения"
 UKR_oplit_desc: "The T-84 is a Ukrainian main battle tank, based on the Soviet T-80 MBT introduced in 1976, specifically the diesel engine version: T-80UD. The T-84 was first built in 1994 and entered service in the Ukrainian Armed Forces in 1999.\n\nIts high-performance opposed-piston engine makes it a fast tank, comparable to other modern MBTs with a power-to-weight ratio of about 26 horsepower per tonne."
 UKR_sapsan: "Гром-2"
 UKR_sapsan_desc: "Ukrainian short-range ballistic missile system being developed by KB Pivdenne and PA Pivdenmash, designed to combine the features of a tactical missile system and a multiple rocket launcher.\n\nThe original Sapsan version of the missile, for Ukraine's own use, was to have a range of 500 kilometers. The later Hrim-2 version, developed for export, has a range limited to 280 kilometers, in order to fall within the 300-kilometre limit set by the Missile Technology Control Regime, which seeks to limit the proliferation of missiles and missile technology."
 UKR_zelya_helsi: "Хелси"
 UKR_zelya_dia: "Dia"
 UKR_our_ukraine_helsi: "Хелси"
 UKR_our_ukraine_helsi_desc: "Helsi - medical information system for healthcare institutions and medical portal for patients in Ukraine."
 UKR_our_ukraine_dia: "Dia"
 UKR_our_ukraine_dia_desc: "Ukrainian electronic service of public services, developed by the Ministry of Digital Transformation of Ukraine. This is a website and a mobile application with digital documents, the possibility of digital signature and verification, as well as a portal with public services."
 UKR_tsnap: "ЦНАП"
 UKR_tsnap_desc: "These are institutions where different groups of people can receive a wide range of administrative services in a comfortable environment. They are created by local councils and local state administrations and serve individuals and legal entities."
 UKR_monobank: "Монобанк"
 UKR_monobank_desc: "Monobank is a Ukrainian direct bank. Like all of the existing neobanks in Ukraine, it operates using a banking license of a parent bank, namely, Universal Bank, which is a part of the TAS Group and belongs to Ukrainian businessman Serhiy Tihipko."
 UKR_tsnap_idea: "ЦНАП"
 UKR_bronetank: "Харьковский бронетанковый завод"
 UKR_bronetank_desc: "The state enterprise of the armored industry, which carries out the production, repair, maintenance, re-equipment and modernization of armored vehicles."
 UKR_avia_zavod: "Харьковский авиационный завод"
 UKR_avia_zavod_desc: "The enterprise of aviation engineering in the city of Kharkov. It produces passenger, transport, and military aircraft."
 UKR_priborostroy: "Харьковский приборостроительный завод"
 UKR_priborostroy_desc: "Один из крупнейших в СССР заводов по производству военной электроники и бытовой электротехники."
 UKR_tractor: "Харьковский тракторный завод"
 UKR_tractor_desc: "An enterprise for the production of tracked and wheeled tractors."
 UKR_agregat: "Харьковское агрегатное конструкторское бюро"
 UKR_agregat_desc: "A scientific and production enterprise of the military-industrial complex, which develops and manufactures units for hydraulic, fuel and electrical systems of aviation and rocket technology."
 UKR_morozova: "Харьковское конструкторское бюро машиностроения"
 UKR_morozova_desc: "Предприятие, разрабатывающее бронетанковую технику. Ранее КП ККБМ играло ключевую роль в создании бронированных гусеничных машин Советского Союза."
 UKR_specmachine: "Харьковский завод специальных машин"
 UKR_specmachine_desc: "Государственное предприятие военно-промышленного комплекса."
 UKR_malichev: "Завод имени Малышева"
 UKR_malichev_desc: "Завод транспортного машиностроения в Харькове, выпускающий двигатели, локомотивы и танки."
 UKR_reborn_ser_and_molot: "Возродить завод \"Серп и молот\""
 UKR_reborn_ser_and_molot_desc: "A large enterprise of agricultural machinery in Kharkov, it was one of the most important enterprises of the Kharkov industry and one of the largest enterprises of agricultural machinery in the Russian Empire and the USSR."
 UKR_concers: "Харьковский оборонный концерн"
 UKR_concers_desc: "Мы объединим все наши предприятия военной промышленности в один концерн. Таким образом, мы усилим координацию производства и повысим производительность труда."
 UKR_concern: "Харьков Военно-промышленный комплекс"
 UKR_zaporozhia_gold: "Мужиевский золотой рудник"
 UKR_zaporozhia_gold_desc: "We will finally attract investors and start developing these mines with gold deposits."
 UKR_opfl_small_med_business: "Преимущества для малого и среднего бизнеса"
 UKR_opfl_small_med_business_desc: "Малый и средний бизнес является важной частью нашей экономики. Для большего роста нам нужно давать бонусы, чтобы люди были заинтересованы в ведении бизнеса."
 UKR_neutrality_neutral_social_are_in_coalition_TT: "СПУ не входит в коалицию"
 UKR_idea_orthodox_christian_church: "Украинская православная церковь"
 UKR_separatist_menace: "Угроза сепаратизма"
 UKR_separatist_menace_desc: "Угроза сепаратистских республик никуда не денется, мы должны её устранить."
 UKR_polish_liberation_battalions: "Польская освободительная армия"
 UKR_polish_liberation_battalions_desc: "Many Polish residents are ready to fight on our side, against the government that, in their opinion, occupied the country."
 UKR_economy_shortcut: "Economics"
 UKR_security_and_expansion_shortcut: "Security and Expansion"
 UKR_military_shortcut: "Military"
 UKR_kucha_shortcut: "Kucha"
 UKR_politics_shortcut: "Politics"
 UKR_fedrada_category: "Federal Rada"
 UKR_fedrada_category_desc: "The Federal Rada is a government body in Federalized Ukraine, created for the interaction of the subjects of the Federation with the federal center.\n\n§YSubjects of the Ukrainian Federation§! may be §Gannexed§! by [UKR.GetFlag]Ukraine, but subject to §Yinfluence§! on the subjects in the §Yamount of 50%§!"
 ukraine_maidan_east.4.b: "Have the deputies escorted away"
 UKR_maidan_temporary_attack_idea_desc: "The unrest in the streets energizes military forces, temporarily bolstering combat readiness."
 ukraine_maidan_overthrow.1.t: "Government overthrown"
 ukraine_maidan_overthrow.1.d: "Our government has been overthrown. The protesters' candidate has been put into power.\nHis outlook is:"
 ukraine_maidan_overthrow.1.a: "£democratic_group_small   $democratic$"
 ukraine_maidan_overthrow.1.b: "£communism_group_small   $communism$"
 ukraine_maidan_overthrow.1.c: "£neutrality_group_small   $neutrality$"
 ukraine_maidan_overthrow.1.e: "£nationalist_group_small   $nationalist$"
 ukraine_maidan_overthrow.2.t: "Government overthrown - A new president"
 ukraine_maidan_overthrow.2.d: "The protesters' candidate has been put into power. His party is:"
 ukraine_maidan_overthrow.2.e: "Back to outlook menu"
 ukraine_maidan_crm_annex.1.t: "The annexation of Crimea"
 ukraine_maidan_crm_annex.1.d: "The crimean peninsula has been annexed by Russia. What should we do next?"
 ukraine_maidan_crm_annex.1.a: "We will stand down for now"
 ukraine_maidan_crm_annex.1.b: "We will fight for Crimea"
 UKR_idea_government_in_need_desc: "Ukraine's government is plagued by rampant corruption and inefficiency. Administrative costs are doubled by graft, while poor governance drags down industrial productivity and political capacity."
 UKR_modernization: "Ukrainian Modernization"
 UKR_modernization_desc: "Once the economy and the state have stabilised, we need to modernize our economy. Before it is too late."
 UKR_agriculture: "Modernize Agriculture"
 UKR_agriculture_desc: "Ukraine is one of the world's largest agricultural producers and exporters and is known as the breadbasket of Europe. Because Ukraine possesses 30% of the world's richest black soil, its agricultural industry has a huge potential. With some investment, these potentials could be exploited. "
 UKR_nibulon: "Nibulon"
 UKR_nibulon_desc: "Nibulon is a Ukrainian agricultural company specializing in production and export of grains such as wheat, barley and corn. It is headquartered in Mykolaiv. It is the only agricultural company in Ukraine with its own fleet and shipyard."
 UKR_pr_jsc_mhp: "PrJSC MHP"
 UKR_pr_jsc_mhp_desc: "PrJSC MHP, Myronivsky Hliboproduct, is Ukraine's largest poultry producer and one of its biggest agro-industrial holdings. State support for its expansion will grow our food processing industry and rural employment."
 UKR_fozzy: "Fozzy Group"
 UKR_fozzy_desc: "Fozzy Group, LLC is one of the largest trade and industrial groups in Ukraine, based in Kyiv, and one of the leading Ukrainian retailers with more than 700 outlets all around the country. In addition to retail, it has business interests in food manufacturing, banking, IT, logistics and restaurants. "
 UKR_fin_it: "Modernize Economy"
 UKR_fin_it_desc: "Instruct the relevant ministries to help modernize our private sector, particularly the finance and IT. "
 UKR_privatbank: "Privatbank"
 UKR_privatbank_desc: "PrivatBank is the largest Ukrainian bank in terms of assets and the leader of Ukrainian retail banking market. It was registered on 19 March 1992. The state must step in for future profits. "
 UKR_it: "Establish Ukrainian IT industry"
 UKR_it_desc: "While the IT sector is growing in our nation, it might need some investments to keep like that. "
 UKR_it_2: "Expand Ukrainian IT industry"
 UKR_it_2_desc: "It seems that our IT industry can be a key factor in our economy. With the help of well-placed investments, of course."
 UKR_ukrtelekom: "Ukrtelecom"
 UKR_ukrtelekom_desc: "The state-owned Ukrtelecom will help us to expand our network capacity faster."
 UKR_kyivstar: "Kyivstar"
 UKR_kyivstar_desc: "Kyivstar is one of the largest Ukrainian telecommunications company, providing communication services and data transmission based on a broad range of fixed and mobile technologies, including 4G (LTE) services, in Ukraine. "
 UKR_digital_education: "Digital Education"
 UKR_digital_education_desc: "Digital skills are vital for individuals in the 21st century. Investing in both digital education and digitalizing the education will pay off over time. We must not forget the older generations, their education is an investment in the present."
 UKR_dig_sta: "Ukrainian Digital State"
 UKR_dig_sta_desc: "Diia (Ukrainian: Дія, lit.'Action'; also an acronym for Ukrainian: Держава і Я, lit.'State and Me') is a mobile app, a web portal and a brand of e-governance in Ukraine. Launched in 2020, the Diia app allows Ukrainian citizens to use digital documents on their smartphones instead of physical ones for identification and sharing purposes.\n\nThe Diia portal allows access to over 50 government services. Eventually, the government plans to make all kinds of state-person interactions available through Diia."
 UKR_tax_avoidance: "Resolve the Tax Evasion Problem"
 UKR_tax_avoidance_desc: "We now have the tools to tackle a huge global problem locally: tax avoidance for both companies and individuals. \n\"While tax may be overlooked, and even unloved, in reality it is our social superpower. Tax allows us to choose to organise our communities, at the local and national level, so that we can all live better lives, together. But a fundamental obstacle is the ease with which powerful elites step outside of their social obligations - outside of their responsibilities to the societies they are part of, and from which they profit.\" - Report on Tax Justice 2023"
 UKR_energy: "Ukraine Energy Strategy"
 UKR_energy_desc: "It's time to analyse the potential for improving the nation's electricity supply systems and launch a residential energy modernization program."
 UKR_ukrenergo: "Ukrenergo"
 UKR_ukrenergo_desc: "Ukrenergo is an electricity transmission system operator in Ukraine and the sole operator of the country's high-voltage transmission lines. The company can make the entire grid system even more efficient."
 UKR_nuc_ener: "Energoatom"
 UKR_nuc_ener_desc: "Energoatom is a state enterprise operating all four nuclear power plants in Ukraine (Zaporizhzhia NPP, Rivne NPP, South Ukraine NPP, and Khmelnytskyi NPP). It is the largest power producer in Ukraine. "
 UKR_nuc_ener_2: "Expand Nuclear Capacity"
 UKR_nuc_ener_2_desc: "Based on a contract with Westinghouse, the American company will build two new blocks in the Khmelnytskyi NPP and two more in the revitalized and finally built Chyhyryn Nuclear Power Plant in Cherkasy."
 UKR_green_ener: "Green Energy Strategy"
 UKR_green_ener_desc: "After promoting the use of renewable energy, we need to look at our potential in the non-nuclear field."
 UKR_ukrhydroenergo: "Ukrhydroenergo"
 UKR_ukrhydroenergo_desc: "Ukrhydroenergo is a Ukrainian state-owned enterprise that administers many major hydro power plants along the Dnieper and Dniester rivers. It is Ukraine's main hydropower generating company."
 UKR_solar: "Construct Solar Plants"
 UKR_solar_desc: "Our southern regions are amongst the sunniest in Eastern Europe, therefore most suitable for solar plant construction."
 UKR_wind: "Promote Wind Farms"
 UKR_wind_desc: "There are places in our country that are suitable for high-efficiency power generation with wind turbines."
 UKR_biomass: "Invest in Biomass Plants"
 UKR_biomass_desc: "Seeing the success of private investments Biomass Plants, the state have to provide funds to build such facilities."
 UKR_min_env_prot: "Ministry of Environmental Protection of Ukraine"
 UKR_min_env_prot_desc: "The Ministry is the main authority in the system of central government of Ukraine responsible for ecological monitoring and development of the country. One of the main task is to develop the communal waste disposal system."
 UKR_waste_manangement_2: "Establish Recycling System"
 UKR_waste_manangement_2_desc: "Now the communal waste collection was finally resolved, it was time to lay the foundations and establish the system of the recyclable material collection. It needed lot of time and effort, but the effects are already visible."
 UKR_waste_manangement_3: "Modernizing Waste Management System"
 UKR_waste_manangement_3_desc: "The established system must be made more efficient and have to reach even the most remote corners of the country. Modern waste management will benefit everyone, both the public and the environment."
 UKR_forestry: "Control Ukrainian Forestry"
 UKR_forestry_desc: "Almost 20% of the country covered by forests. To keep it like this and avoid deforestation we must invest in forestry as an invest in the future."
 UKR_tourism: "Invest in Tourism"
 UKR_tourism_desc: "Tourism can be a great opportunity for any country. First of all, the right infrastructure needs to be put in place. "
 UKR_nat_wonders: "Ukrainian Natural Wonders"
 UKR_nat_wonders_desc: "In 2008, seven of Ukraine's many picturesque places were selected in a vote. These sites will be the flag bearers of our country's diverse landscapes."
 UKR_wonders: "Ukrainian Wonders"
 UKR_wonders_desc: "Seven of Ukraine's many historical and cultural monuments were selected in a vote in 2007. These sites will be the flag bearers of our country's built heritage."
 UKR_world_heritage: "Ukrainian World Heritage Sites"
 UKR_world_heritage_desc: "By 2005, there are three World Heritage sites in Ukraine, but the list will grow by time, already several sites on its tentative list.\n\nCultural heritage consists of monuments (such as architectural works, monumental sculptures, or inscriptions), groups of buildings, and sites (including archaeological sites). Natural heritage is defined as natural features (consisting of physical and biological formations), geological and physiographical formations (including habitats of threatened species of animals and plants), and natural sites which are important from the point of view of science, conservation or natural beauty."
 UKR_health_tourism: "Promote Ukrainian Health Tourism"
 UKR_health_tourism_desc: "As the country's health services are up to Western standards, but generally at a cheaper price, it can be beneficial to invest in the health tourism sector."
 UKR_corruption_reforms: "Anti-Corruption Reforms"
 UKR_corruption_reforms_desc: "Corruption is an issue in Ukrainian society going back to the dissolution of the Soviet Union in 1991. After declaring independence from the Soviet Union, Ukraine faced a series of politicians from different sides of the political spectrum, as well as criminal bosses and oligarchs, who used the corruption of police, political parties, and industry to gain power.\n\nIt is time to change this!"
 UKR_corruption_edu: "Fight Corruption in Education"
 UKR_corruption_edu_desc: "According to Transparency International research done in 2008, 47.3% of university students stated that a bribe had been demanded from them; of those, 29% had paid this bribe freely. Students could \"buy\" a college entry, exam results, marking doctoral and/or master's theses."
 UKR_corruption_health: "Fight Corruption in Healthcare"
 UKR_corruption_health_desc: "Though medical care in state-run hospitals is theoretically free for Ukrainians, patients' paying money there to ensure they receive the treatment required was widespread in the early 21st century.\n\nIn 2012 advocacy groups accused Health Ministry officials of embezzling money that should have been used to treat AIDS patients by buying AIDS drugs at hugely inflated prices and then receiving kickbacks."
 UKR_corruption_police: "Fight Corruption in the Police"
 UKR_corruption_police_desc: "Combat corruption within Ukraine's law enforcement agencies to restore public trust and effective policing."
 UKR_corruption_armed_forces: "Fight Corruption in the Armed Forces of Ukraine"
 UKR_corruption_armed_forces_desc: "Purge corruption from the Armed Forces to improve military discipline and effectiveness."
 UKR_corruption_justice: "Fight Judicial Corruption"
 UKR_corruption_justice_desc: "In the early 2010s Ukrainian politicians and analysts described the system of justice in Ukraine as \"rotten to the core\" and complained about political pressure put on judges and corruption. Independent lawyers and human rights activists complained Ukrainian judges regularly came under pressure to hand down a certain verdict.\n\nUkraine's court system was widely regarded as corrupt. A Ukrainian Justice Ministry survey in 2009 revealed that only 10% of respondents trusted the nation's court system."
 UKR_corruption_spec_public_prosecutor: "Specialized Anti-Corruption Prosecutor's Office"
 UKR_corruption_spec_public_prosecutor_desc: "The Specialized Anti-Corruption Prosecutor's Office is an independent structural unit of the General Prosecutor of Ukraine, and is primarily responsible for supporting and overseeing criminal investigations launched by the National Anti-Corruption Bureau of Ukraine (NABU)."
 UKR_corruption_court: "High Anti-Corruption Court of Ukraine"
 UKR_corruption_court_desc: "Establish an independent anti-corruption court to prosecute high-level corruption cases and recover stolen state assets."
 UKR_corruption_asset_rec: "Asset Recovery"
 UKR_corruption_asset_rec_desc: "Asset recovery, as outlined in the UN Convention against Corruption (UNCAC chapter V), refers to the process by which the proceeds of corruption transferred abroad are recovered and repatriated to the country from which they were taken or to their rightful owners."
 UKR_corruption_gov: "Cleanse Country Government"
 UKR_corruption_gov_desc: "Institute sweeping reforms to eliminate corruption within the government administration and restore institutional integrity."
 UKR_end_kleptokracy: "Finalize Anti-Corruption reforms"
 UKR_end_kleptokracy_desc: "With all these reforms made, the size of the corruption can be easily reduced and the society will be able to live without its suffocating effects."
 UKR_health_reform: "Start Healthcare Reforms"
 UKR_health_reform_desc: "Ukrainian healthcare should be free to citizens according to law, but in practice patients contribute to the cost of most aspects of healthcare."
 UKR_health_smoke_alc: "Decrease Smoking and Alcohol consumption"
 UKR_health_smoke_alc_desc: "Launch public health campaigns to reduce smoking and alcohol consumption, addressing leading causes of preventable disease."
 UKR_hiv_aids: "HIV/AIDS in Ukraine"
 UKR_hiv_aids_desc: "In 2001, a national plan for combating HIV/AIDS was approved; its goals included preventing the further spread of HIV, developing the capacity to treat infected individuals, and providing social support and counseling for those living with HIV/AIDS."
 UKR_vaccination: "Vaccination Program"
 UKR_vaccination_desc: "Expand vaccination programs nationwide to prevent infectious disease outbreaks and improve population immunity."
 UKR_mental_health: "Mental Health Program"
 UKR_mental_health_desc: "Develop mental health services and support systems to address rising psychological disorders in the population."
 UKR_health_infra: "Healthcare Infrastructure Improvement"
 UKR_health_infra_desc: "Modernize and expand healthcare infrastructure, upgrading medical facilities across the nation."
 UKR_health_equipment: "Medical Equipment Purchasing Program"
 UKR_health_equipment_desc: "Procure modern medical equipment and diagnostic tools to enhance healthcare delivery and treatment capabilities."
 UKR_health_prevention: "Medical Screening Program"
 UKR_health_prevention_desc: "Establish comprehensive medical screening programs to detect health conditions early and improve preventive care."
 UKR_health_rehabilitaion: "National Rehabilitation Program"
 UKR_health_rehabilitaion_desc: "Develop rehabilitation facilities for injured and disabled citizens, including military personnel, to restore quality of life."
 UKR_health_recreational_infra: "Improve Recreational Infrastructure"
 UKR_health_recreational_infra_desc: "Invest in recreational facilities and public spaces to promote physical activity and improve public health."
 UKR_health_final: "Finishing Healthcare Reforms"
 UKR_health_final_desc: "Complete the healthcare transformation to achieve Western standards of medical care and population health outcomes."
 UKR_edu_plan: "Plan Educational Reforms"
 UKR_edu_plan_desc: "Although the education in our nation is of relatively high quality, there are areas to improve in order to maintain or raise that quality. We have to prepare for the ongoing digital transformation in the world."
 UKR_edu_infra: "Improve Educational Infrastructure"
 UKR_edu_infra_desc: "Upgrade educational facilities and school buildings to create modern learning environments."
 UKR_edu_ped_uni: "Support Pedagogical Universities"
 UKR_edu_ped_uni_desc: "Strengthen pedagogical universities to improve teacher training and quality of instruction nationwide."
 UKR_edu_universities: "Support the Universities"
 UKR_edu_universities_desc: "Provide additional resources and support to higher education institutions to strengthen academic research and innovation."
 UKR_edu_infra_2: "Improve Educational Infrastructure: Next Level"
 UKR_edu_infra_2_desc: "Continue upgrading educational facilities with modern technology and advanced learning infrastructure."
 UKR_edu_final: "Finalize Educational Reforms"
 UKR_edu_final_desc: "Complete the educational transformation to achieve world-class standards of learning and scientific advancement."
 UKR_bmz: "BMZ"
 UKR_bmz_desc: "Berdychiv Machine-Building Plant (also known as the Progress Plant) is a machine building enterprise in the town of Berdychiv, in Zhytomyr Oblast, Ukraine."
 UKR_nkmz: "NKMZ"
 UKR_nkmz_desc: "Novokramatorsky Mashynobudivny Zavod (New Kramatorsk Machinebuilding Plant) is a large heavy equipment manufacturer in Ukraine. The company produces mining equipment; metallurgy equipment; rolling mills, forges, blast furnaces, ore crushers, presses, and other industrial process equipment.\n\nThe company manufactures propeller shafts for icebreakers and components for submarines. According to its website, the company has designed and constructed over 18 mining complexes."
 UKR_oil_mining: "Oil Mining"
 UKR_oil_mining_desc: "Develop new oil extraction facilities to increase domestic energy production and reduce dependence on foreign supplies."
 UKR_mining2: "Improved resource extraction"
 UKR_mining2_desc: "Expand mining operations to increase extraction of chromium, tungsten, and other strategic minerals."
 UKR_construction_kovalska: "Kovalska"
 UKR_construction_kovalska_desc: "ICG Kovalska, LLC is a Ukrainian developer and manufacturer of building materials.\n\nProducing: concrete, concrete mixes, building solutions, classical reinforced concrete individual constructive reinforced concrete products, wall products from expanded clay concrete, aerated concrete, paving slabs, dry construction mixes, water-dispersion materials (paints, decorative plasters, foams, glues)."
 UKR_train_prod: "Train Production"
 UKR_train_prod_desc: "Kriukiv Railway Car Manufacturing Plant is a large industrial company in Kremenchuk, Ukraine, manufacturing locomotives and multiple unit trains."
 UKR_kharkiv_tractor: "HTZ"
 UKR_kharkiv_tractor_desc: "Kharkiv Tractor Plant (KhTZ or HTZ) is an agricultural machinery manufacturer in the Ukrainian city of Kharkiv. Established in 1930-31, as a centerpiece of Stalin's First Five-Year Plan for Soviet industrialization (1927-32), KhTZ was Ukraine's largest tractor manufacturer, producing both wheeled and tracked tractors.\n\nIn 1994, two years after the collapse of the Soviet Union and the independence of Ukraine, the plant was transformed into an open joint stock company. Producing tractors, including general purpose wheeled tractors."
 UKR_agriculture2: "Modernize Agriculture: Next Level"
 UKR_agriculture2_desc: "Implement advanced agricultural techniques and expand grain production to cement Ukraine's position as a global food supplier."
 UKR_chumak: "Chumak"
 UKR_chumak_desc: "Chumak (Ukrainian: Чумак) is a Swedish-Ukrainian food processing company in Kakhovka, Kherson Oblast. Among its products are ketchup, mayonnaise, pasta, salad dressings, cooking sauces, canned vegetables, marinated vegetables, tomato juice and sunflower oil."
 UKR_gsc_game_world: "GSC"
 UKR_gsc_game_world_desc: "GSC Game World is a Ukrainian video game developer company.  Founded in Kyiv in 1995 by Sergiy Grygorovych, it is best known for the Cossacks and S.T.A.L.K.E.R. series of games."
 UKR_national_bank: "National Bank of Ukraine"
 UKR_national_bank_desc: "According to the Constitution of Ukraine, the main function of the National Bank of Ukraine (NBU) is to ensure the stability of Ukraine's monetary unit (the hryvnia). To carry this out, the National Bank fosters the stability of the banking system and, within its competence, price stability."
 UKR_darnytsia: "Darnytsia"
 UKR_darnytsia_desc: "Darnytsia is a Ukrainian pharmaceutical company."
 UKR_farmak: "Farmak"
 UKR_farmak_desc: "JSC Farmak is a Ukrainian pharmaceutical company. The company was established in 1925. The headquarters is located in Kyiv."
 UKR_carpathian_tourism: "Promote tourism in the Carpathian mountains"
 UKR_carpathian_tourism_desc: "Develop tourism infrastructure in the Carpathian Mountains to attract international visitors and generate economic revenue."
 UKR_black_sea_tourism: "Promote tourism near the Black Sea"
 UKR_black_sea_tourism_desc: "Expand resort infrastructure along the Black Sea coast to establish Ukraine as a premier seaside destination."
 UKR_infra_rail: "Railroad Improvements"
 UKR_infra_rail_desc: "Modernize the national railway network to improve freight transport and passenger connectivity."
 UKR_infra_rail_2: "Railroad Improvements: Next Level"
 UKR_infra_rail_2_desc: "Complete comprehensive railway expansion and renewal to establish a world-class transport infrastructure."
 UKR_infra_southern_bug: "Make the Southern Bug Navigable"
 UKR_infra_southern_bug_desc: "Revive commercial freight navigation on the Southern Bug upstream of Mykolaiv, to facilitate the increasing grain export from Ukraine."
 UKR_pivdenne_db: "Pivdenne Design Bureau"
 UKR_pivdenne_db_desc: "Pivdenne Design Office located in Dnipro, Ukraine, is a designer of satellites and rockets, and formerly of Soviet intercontinental ballistic missiles (ICBMs)."
 UKR_luch: "Luch Design Bureau"
 UKR_luch_desc: "Expand Luch Design Bureau's capabilities in cruise missile and advanced weapons technology development."
 UKR_mayak: "Mayak"
 UKR_mayak_desc: "Modernize Mayak's small arms production facilities to supply the armed forces with contemporary infantry weapons."
 UKR_ukrainian_armor: "Ukrainian Armor"
 UKR_ukrainian_armor_desc: "Develop advanced body armor and protective equipment technology for military personnel."
 UKR_large_construction1: "Large Construction Program"
 UKR_large_construction1_desc: "Launch an ambitious construction initiative to expand urban infrastructure and economic capacity nationwide."
 UKR_large_construction2: "Large Construction, Second Phase"
 UKR_large_construction2_desc: "Continue the construction boom with extended programs to sustain development momentum and employment."
 UKR_tax_reform: "Tax Reform"
 UKR_tax_reform_desc: "Restructure the tax system to increase revenue collection and modernize fiscal administration."
 UKR_pension_reform: "Pension Reform"
 UKR_pension_reform_desc: "Implement comprehensive pension system reform to ensure long-term sustainability and adequate retirement security."
 UKR_min_economy: "Ministry of Economy"
 UKR_min_economy_desc: "Strengthen the Ministry of Economy to promote market liberalization and reduce government control of the economy."
 UKR_cut_energy_subs: "Cut Energy Subsidies"
 UKR_cut_energy_subs_desc: "Eliminate inefficient energy subsidies to balance the budget and encourage energy efficiency."
 UKR_state_fund: "State Fund"
 UKR_state_fund_desc: "Establish a sovereign wealth fund to invest budget surpluses in development projects and international assets."
 UKR_air_improvements: "Air Force Improvements"
 UKR_air_improvements_desc: "Modernize the Air Force with better training, equipment, and operational doctrine."
 UKR_aa_mis_def_force: "Anti-Air Missile Defence Force"
 UKR_aa_mis_def_force_desc: "Establish specialized anti-air missile defense formations to protect airspace from aerial threats."
 UKR_radio_eng: "Radio Engineering Force"
 UKR_radio_eng_desc: "Develop radio engineering and electronic warfare capabilities for advanced military communications."
 UKR_support_fac: "Support Facilities"
 UKR_support_fac_desc: "Expand airbase support infrastructure to enhance air operations and aircraft maintenance capabilities."
 UKR_army_imp: "Army Improvements"
 UKR_army_imp_desc: "Strengthen the Army with improved training, doctrine, and professional military development."
 UKR_army_aviation: "Army Aviation"
 UKR_army_aviation_desc: "Develop army aviation capabilities with rotary-wing aircraft for transport, reconnaissance, and close support."
 UKR_army_logistics: "Army Logistics"
 UKR_army_logistics_desc: "Enhance Army logistics and supply chain systems to support operations and improve field effectiveness."
 UKR_army_maintenance: "Army Maintenance Facilities"
 UKR_army_maintenance_desc: "Establish comprehensive equipment maintenance and repair facilities to maximize military hardware availability."
 UKR_medical_forces: "Medical Forces"
 UKR_medical_forces_desc: "Establish military medical commands with advanced field hospital and trauma care capabilities."
 UKR_antonov: "Antonov"
 UKR_antonov_desc: "Expand Antonov's aircraft manufacturing capabilities to produce modern transport and cargo aircraft."
 UKR_idea_pro_ukraine_reform_1_desc: "Anti-corruption government reforms reduce waste and inefficiency, restoring public confidence despite initial transition costs."
 UKR_idea_shortened_general_staff_desc: "Streamlining the military command structure improves planning efficiency and accelerates officer development."
 UKR_uda_encouraged: "Encouraged UDA"
 UKR_uda_encouraged_desc: "Incorporation of the UDA militia into the armed forces improves combat capability but reduces military discipline."
 UKR_uda_integrated: "Integrated UDA"
 UKR_uda_integrated_desc: "The Ukrainian Volunteer Army has been fully integrated into the regular armed forces, strengthening discipline and nationalist sentiment."
 UKR_ukrtelekom_idea: "Ukrtelecom"
 UKR_ukrtelekom_idea_desc: "Ukrtelecom, the state telecommunications monopoly, has been modernized to expand digital infrastructure and boost productivity."
 UKR_finance_and_it: "Finance & IT Sector Support"
 UKR_finance_and_it_desc: "Development of finance and information technology sectors creates high-value economic activity and improves research capabilities."
 UKR_digital_state: "Ukrainian Digital State"
 UKR_digital_state_desc: "Diia (Ukrainian: Дія, lit.'Action'; also an acronym for Ukrainian: Держава і Я, lit.'State and Me') is a mobile app, a web portal and a brand of e-governance in Ukraine. Launched in 2020, the Diia app allows Ukrainian citizens to use digital documents on their smartphones instead of physical ones for identification and sharing purposes.\n\nThe Diia portal allows access to over 50 government services. Eventually, the government plans to make all kinds of state-person interactions available through Diia."
 UKR_tax_avoidance_idea: "Negligible Tax Avoidance"
 UKR_tax_avoidance_idea_desc: "While tax may be overlooked, and even unloved, in reality it is our social superpower. Tax allows us to choose to organise our communities, at the local and national level, so that we can all live better lives, together.\n\nBut a fundamental obstacle is the ease with which powerful elites step outside of their social obligations - outside of their responsibilities to the societies they are part of, and from which they profit. - Report on Tax Justice 2023"
 UKR_nuclear_energy: "Energoatom"
 UKR_nuclear_energy_desc: "Investment in nuclear power plants increases domestic energy generation and reactor construction output."
 UKR_construction: "Construction Effort"
 UKR_construction_desc: "Construction capacities allocated to urgent State-financed projects."
 UKR_demographic_boom: "Demographic Boom"
 UKR_demographic_boom_desc: "Favorable demographic trends and population growth policies expand our available manpower and workforce."
 UKR_demographic_crisis: "Demographic Crisis"
 UKR_demographic_crisis_desc: "The country's population has been declining since the 1990s because of a high emigration rate, coupled with high death rates and low birth rates. The population has been shrinking by an average of over 300,000 annually since 1993."
 UKR_tackle_corruption: "Tackle Corruption!"
 UKR_tackle_corruption_desc: "Anti-corruption campaign and institutional reforms dramatically improve government efficiency and national productivity."
 UKR_corruption: "Deep-rooted Corruption"
 UKR_large_construction: "Large Construction Program"
 UKR_large_construction_desc: "An ambitious infrastructure development program accelerates building completion and productivity, though energy consumption increases significantly."
 UKR_medical_reform: "Medical Reform"
 UKR_medical_reform_desc: ""
 UKR_aamdf: "Anti-Air Missile Forces"
 UKR_aamdf_desc: "An organized anti-aircraft missile defense force significantly strengthens our air defense capability and reduces effectiveness of enemy close air support."
 UKR_radio_troops: "Radio Engineering Troops"
 UKR_radio_troops_desc: "Air force radio engineering and signals units enhance reconnaissance and interception while reducing aircraft losses."
 UKR_air_support_fac: "Air Force Support Facilities"
 UKR_air_support_fac_desc: "Investment in air support facilities improves fuel efficiency and aircraft reliability, reducing operational costs while enhancing performance."
 UKR_cut_subsidies: "Cut Energy Subsidies"
 UKR_cut_subsidies_desc: "Eliminating energy subsidies forces consumers to bear true production costs, improving productivity while reducing fiscal strain."
 UKR_health_cost: "Healthier Nation!"
 UKR_health_cost_desc: ""
 UKR_military_rehab: "Rehabilitation System for the Military"
 UKR_military_rehab_desc: "Veteran rehabilitation programs boost troop morale and organizational cohesion, though at increased healthcare expense."
 UKR_resource_extraction: "Increased Resource Extraction"
 UKR_resource_extraction_desc: "Expanded resource extraction operations increase domestic supply of minerals and fuels."
 UKR_research_boost: "Ukraine Research Support Program"
 UKR_research_boost_desc: "Centralized research support program accelerates technological development across military and civilian sectors."
 UKR_economy_boost: "Improvements in the Economy"
 UKR_economy_boost_desc: "A temporary economic stimulus program accelerates productivity and factory efficiency, though at increased energy cost."
 UKR_kolomoisky_help: "Help From Kolomoisky"
 UKR_kolomoisky_help_desc: "The well-known oligarch Kolomoisky approached us with a proposal to finance the creation of several battalions to maintain the combat capability of our armed forces."
 UKR_firtash_help: "Help From Firtash"
 UKR_firtash_help_desc: "The well-known oligarch Firtash approached us with a proposal to finance the creation of several battalions to maintain the combat capability of our armed forces."
 UKR_kolomoisky_finish: "Dnipro-1 Police Regiment"
 UKR_kolomoisky_finish_desc: "The last thing Kolomoisky volunteered to finance was the re-formation of the Dnepropetrovsk Defense regiment into a police regiment."
 UKR_uda: "Ukrainian Volunteer Army"
 UKR_uda_desc: "It is necessary to organize volunteers into a single military group."
 UKR_aidar: "Create Battalion Aidar"
 UKR_aidar_desc: "Let's take a chance and let them join the ranks of our armed forces."
 UKR_russia_help_battalions_desc: "Deployment of Russian Rosgvardia and Wagner units improves security and counterinsurgency operations during occupation."
 UKR_economy: "Economic Policy"
 UKR_economy_desc: "\n\n\n\n\n\n£GFX_UKR_desctext_economy\n\n\n\n\n\n\n\n\nThe §5Ministry for Development of Economy and Trade§! is the main authority in the system of central government of §8Ukraine§! responsible for formation and realization of state economic and social development policies (business economics); regulation of consumer prices; industrial, investment and trade economic policies; development of entrepreneurship; technical regulation and security of consumer rights; inter-agency coordination of economic and social cooperation of §8Ukraine§! with the §1European Union§!."
 UKR_boost_economy: "Boost Economy"
 UKR_boost_research: "Support Research Efforts"
 UKR_boost_resource: "Subsidize Resource Extraction"
 UKR_add_resource: "Dig Deep"
 UKR_renewable_energy: "Ukraine's Renewable Energy Potential Assessment"
 UKR_renewable_energy_desc: "\n\n\n\n\n\n£GFX_UKR_energy_ukraine\n\n\n\n\n\n\n\n\nMapping the regions with the best renewable energy production potential."
 UKR_energy_wind: "Wind Energy"
 UKR_energy_solar: "Solar Power"
 UKR_energy_geothermal: "Geothermal Energy"
 UKR_privatize_resource: "Privatization in the Resource Extracting Industry"
 UKR_privatize_resource_desc: "Privatization of resource extraction industries reduces state control and resource availability."
 UKR_restructure_debt: "Ask for debt restructuring"
 UKR_ask_western_loans: "Ask §7Western Countries§! for loans"
 UKR_ask_eastern_loans: "Ask §tEastern Countries§! for loans"
 UKR_natpolice_decision_category: "Patrol Service of the Special Purpose Police"
 UKR_natpolice_decision_category_desc: "The Patrol Service of the Special Purpose Police of Ukraine is a service within the Patrol Police Department of Ukraine within the National Police of Ukraine, which was created as part of the Ministry of Internal Affairs of Ukraine as a structure of special forces for the protection of public order.\n\nThe structure became part of the National Police of Ukraine. The service combines former battalions and regiments of the Ministry of Internal Affairs."
 UKR_uda_decision_category: "Ukrainian Volunteer Army"
 UKR_uda_decision_category_desc: "Ukrainian Volunteer Army is a volunteer paramilitary formation formed on the basis of units of the Ukrainian Volunteer Corps after the release of Dmitry Yarosh and his associates from the Right Sector movement."
 UKR_integrate_uda: "Integrate The §YUDA§! Into The §YArmed Forces of Ukraine§!"
 UKR_btr_4: "Assemble a Prototype §YBTR-4 Bucephalus§!"
 UKR_small_arms: "Promote §OSmall Arms §! §WCompany§!"
 UKR_equipment_funds: "Promote §OKMDB Infantry Equipment§! §W Division§!"
 UKR_heavy_equipment: "Allocate Funds for §GMalyshev§! §WFactory§!"
 UKR_heavy_equipment_research: "Support §GArmored Vehicle§! §Wresearch§!"
 UKR_fund_antonov: "Subsidize §8Antonov§!"
 UKR_air_equipment: "Support §8Aviation §! §Wresearch§!"
 UKR_nikolayev_funds: "Modernize §1Nikolayev Shipyard§!"
 UKR_naval_equipment: "Support §1Naval equipment §! §Wresearch§!"
 UKR_parti_regions_economic_committee_desc: "The Party of Regions' economic committee smooths business cycles and maintains stability."
 UKR_parti_regions_invest_open_window_desc: "Business-friendly investment policies encourage population growth and corporate tax collection."
 UKR_parti_regions_taxx_desc: "Tax code reform reduces both personal and corporate taxation, raising bureaucratic costs while moderating social unrest."
 UKR_parti_regions_laizes_desc: "Secularization measures reduce clerical influence but destabilize religious communities and increase economic volatility."
 UKR_parti_regions_stability_reform_desc: "Regional stability measures increase ideological defense but raise bureaucratic overhead."
 UKR_parti_regions_lustration_desc: "Removal of Soviet-era officials reduces administrative and security apparatus costs."
 UKR_parti_regions_opposition_agree_desc: "Political cooperation with opposition parties reduces government isolation and suppresses ideological drift during the Yanukovych era."
 UKR_parti_regions_titushki_desc: "Government-backed street provocateurs suppress ideological drift through intimidation and violence."
 UKR_parti_regions_optimise_ministers_desc: "Streamlining of ministerial bureaucracy reduces administrative costs and improves government efficiency."
 UKR_parti_regions_inform_act_desc: "Media control legislation stabilizes political messaging at administrative cost."
 UKR_parti_regions_pension_reform_desc: "Restructuring the pension system reduces social costs but lowers population growth due to reduced benefits."
 UKR_parti_regions_youth_regions_desc: "Youth engagement programs build generational support and marginally improve political power and drift defense."
 UKR_our_ukraine_secretariat_of_president_desc: "The presidential secretariat enhances administrative research capacity but increases bureaucratic overhead."
 UKR_our_ukraine_fight_with_corruption_idea_desc: "Anti-corruption enforcement reduces bureaucratic overhead and illicit economic extraction."
 UKR_our_ukraine_education_reform_idea_desc: "Curriculum reforms improve research capacity but create temporary political and stability costs."
 UKR_our_ukraine_health_reform_idea_desc: "Healthcare system modernization reduces costs and improves conscription fitness."
 UKR_our_ukraine_social_reform_idea_desc: "Social spending rationalization reduces budget burden while strengthening democratic support."
 UKR_our_ukraine_air_industry_idea_desc: "Aviation sector modernization reduces production costs for military aircraft."
 UKR_zelya_helsi_desc: "The Helsi healthcare platform has improved access to medical services while reducing treatment costs and supporting population health outcomes."
 UKR_zelya_dia_desc: "The Diia digital governance platform has streamlined bureaucratic processes, reducing administrative overhead and improving public service delivery."
 UKR_reform_sbu: "SBU Reform"
 UKR_reform_sbu_desc: "The SBU needs reforms, for all these years the structure has been very mired in corruption and needs to be updated."
 UKR_Yanu_Minister: "Cabinet"
 UKR_Yanu_President: "Presidency"
 UKR_prepare_protest_tt: "We will gain or lose support for §8The Representatives of The Maidan§!"
 UKR_donbass_concessions_tt: "Depending on our stance, we will be able to gain support from the eastern or western regions, but we will necessarily disappoint §8The Representatives of The Maidan§!."
 UKR_azovsteel_desc: "Control of the Azovstal steel manufacturing complex provides a steady supply of high-quality steel for industrial and military production."
 UKR_yushenko_premier_idea_desc: "Viktor Yushchenko serves as Prime Minister under Kuchma, expanding his political authority and steering the government toward neutrality."
 UKR_yanuk_premier_idea_desc: "Viktor Yanukovych serves as Prime Minister under Kuchma, expanding his political authority and drawing the government toward the left."
 UKR_unstable_government_idea_desc: "Political instability has weakened governmental control, allowing various ideological factions to exploit the unrest for their own agendas."
 UKR_land_reform_idea3_desc: "The land reform initiated in the last century should lead to a complete redistribution of land holdings throughout the country. So far, it is in the process."
 UKR_zaims_desc: "Short-term international loans have stabilized the economy and increased tax revenues, though creating substantial future debt obligations."
 UKR_social_discontent: "Serious Discontent of The People"
 UKR_social_discontent_desc: "Sweeping cuts to healthcare, education, and welfare spending ease the strain on the treasury at the cost of public confidence."
 UKR_banks_lobbyst_liquidate_desc: "Removal of banking interests from government redirects corporate tax revenue, breaking the influence of financial elites on policy."
 UKR_mining_company_help_desc: "Tax incentives for mining companies provide relief during economic strain."
 UKR_privatization_idea_desc: "Privatization of state enterprises improves factory efficiency and trade relations at the cost of political power."
 UKR_without_kuchma_idea_desc: "The 'Ukraine Without Kuchma' movement has mobilized nationalist sentiment against perceived oligarchic corruption and authoritarian governance."
 UKR_left_opposition_idea_desc: "A leftist political movement mobilizes workers and intellectuals against the ruling government, destabilizing the existing order."
 UKR_luaz_idea_desc: "Support for the domestic LUAZ automobile manufacturer reduces production costs for vehicles and trucks."
 UKR_anti_socialist_media_desc: "State-aligned media suppresses communist and neutral sentiment, reinforcing the reactionary government's hold on public opinion."
 ukraine_union.1.t: "Ukraine Proposes a Full Union State"
 ukraine_union.1.d: "Kyiv offers to dissolve its statehood into ours and merge both nations into a single union state under Ukrainian leadership. Every core, every asset, and every soldier would become theirs. Do we surrender our independence for this union?"
 ukraine_union.1.a: "We Accept the Union"
 ukraine_union.1.b: "We Will Not Surrender Our State"
 ukraine_union.2.t: "Russia Rejects the Union"
 ukraine_union.2.d: "Moscow refuses to dissolve itself into our union state. The dream of a single nation from the Carpathians to the Pacific will have to wait."
 ukraine_union.2.a: "A Missed Opportunity"
 ukraine_union.3.t: "Ukraine Proposes Joining NATO Together"
 ukraine_union.3.d: "Kyiv invites us to leave our current alliances and join NATO alongside them, reshaping the security order of Eastern Europe. Do we take this path together?"
 ukraine_union.3.a: "We Join NATO Together"
 ukraine_union.3.b: "Our Place Is Not in NATO"
 ukraine_union.4.t: "Russia Rejects NATO Membership"
 ukraine_union.4.d: "Moscow declines to join NATO alongside us. We will have to chart our western course alone."
 ukraine_union.4.a: "So Be It"
 ukraine_kommi.16.t: "Communist Uprising In The East"
 ukraine_kommi.16.d: "A communist uprising backed by Kyiv has seized several of our eastern provinces and declared independence with Ukrainian support. We will not forget this."
 ukraine_kommi.16.a: "We Will Remember This"
 UKR_brotherhood_people_desc: "A communist social movement emphasizing collective welfare and solidarity reduces consumer goods burden while strengthening ideological defense."
 UKR_social_reform_desc: "Social welfare expansion reduces healthcare and social costs while improving living standards under communist governance."
 UKR_equal_rights_idea_desc: "Implementation of equal rights policies across all demographics reduces bureaucratic burden and strengthens political unity."
 UKR_west_investors_idea_desc: "Western market participation has provided capital and economic expertise, supporting business development and public confidence in the economy."
 UKR_our_investors_idea_desc: "Western investor capital stimulates research capacity, stabilizes economic cycles, and strengthens foreign policy independence."
 UKR_socialist_effort_desc: "Economic mobilization for socialist production increases stability, population growth, and consumer goods availability."
 UKR_alpha: "Alpha"
 UKR_alpha_desc: "The Alpha special operations unit of the SBU enhances our counter-intelligence and security operations against subversive threats."
 UKR_svr_desc: "Foreign Intelligence Service operations enhance intelligence network development and agency defenses against foreign subversion."
 UKR_sviaz_desc: "State Special Communications Service provides improved encryption, decryption, and secure communications infrastructure."
 UKR_ukraine_always_right: "Ukraine Always Right"
 UKR_ukraine_always_right_desc: "True patriots have come to power in Ukraine. Ukraine is always right, Ukraine is above all."
 UKR_take_control_of_the_media: "Take Control Of The Media"
 UKR_take_control_of_the_media_desc: "Media resources have had too much freedom in recent years. They are only busy promoting how bad and terrible our country is, we will fix it."
 UKR_prohibition_of_non_nationalist_organizations: "Prohibition of Non-Nationalist Organizations"
 UKR_prohibition_of_non_nationalist_organizations_desc: "Any organization that refuses the nationalist cause is a threat to the new order. Ban them all and leave our movement as the only legal political force in the country."
 UKR_anti_russian_policy: "Anti-Russian Policy"
 UKR_anti_russian_policy_desc: "Moscow remains the greatest enemy of the Ukrainian nation. Enshrine hostility to Russia as official state policy and purge Russian influence from our institutions."
 UKR_loyal_teachers_in_schools: "Loyal Teachers In Schools"
 UKR_loyal_teachers_in_schools_desc: "The school is the foundation of the future patriotic citizens of Ukraine. We will leave only real Ukrainians in schools."
 UKR_ban_all_languages_except_ukrainian: "Ban All Languages Except Ukrainian"
 UKR_ban_all_languages_except_ukrainian_desc: "We will start a program of Ukrainization, all other languages will be removed from the school curriculum, business communication and other instances of the life of a Ukrainian citizen."
 UKR_introduce_death_penalty_for_disloyal_persons: "Introduce Death Penalty For Disloyal Persons"
 UKR_introduce_death_penalty_for_disloyal_persons_desc: "Loyalty is what every citizen owes to his homeland. All who hate her, all who would offend her, we will get rid of by any means necessary."
 UKR_united_council_of_ukrainian_nationalists: "United Council of Ukrainian Nationalists"
 UKR_united_council_of_ukrainian_nationalists_desc: "Finally, true patriotism and nationalism, led by real supporters of Ukraine, governs the country. Our congress is to build a great country."
 UKR_right_sector: "Right Sector"
 UKR_right_sector_desc: "The right Sector will be responsible for the internal political component of the new Ukrainian state."
 UKR_full_order_in_the_country: "Full Order in The Country"
 UKR_full_order_in_the_country_desc: "Order is the key to stability. We will fight against the manifestations of chaos, disorder and rebellion."
 UKR_ukrainian_assault_battalions: "Ukrainian Assault Battalions"
 UKR_ukrainian_assault_battalions_desc: "We will create shock battalions from particularly patriotic citizens that will perform specific tasks."
 UKR_make_government_jobs_only_for_ukrainians: "Make Government Jobs Only for Ukrainians"
 UKR_make_government_jobs_only_for_ukrainians_desc: "Only Ukrainians should work for the benefit of the motherland, everyone else should not have the right to work."
 UKR_complete_the_cleansing_of_the_ukrainian_state: "Complete the Cleansing of the Ukrainian State"
 UKR_complete_the_cleansing_of_the_ukrainian_state_desc: "Our homeland has been cleansed of enemies, detractors and other negative elements."
 UKR_limit_the_powers_of_the_mvd: "Limit the Powers of the MVD"
 UKR_limit_the_powers_of_the_mvd_desc: "The police and other authorities have too much power in the state, we will limit them."
 UKR_night_of_the_long_knives: "Night of the Long Knives"
 UKR_night_of_the_long_knives_desc: "We will eliminate those who are particularly resistant to reforms more radically."
 UKR_una_unso: "UNA UNSO"
 UKR_una_unso_desc: "Foreign policy activities will fall on the shoulders of the UNA-UNSO organization."
 UKR_external_intervention: "External Intervention"
 UKR_external_intervention_desc: "It's time to stop pursuing a peaceful policy, we will actively influence global processes."
 UKR_resolve_the_moldovan_issue: "Resolve the Moldovan issue"
 UKR_resolve_the_moldovan_issue_desc: "Moldova and Transnistria have been in our way for a long time, their independence is just a mistake, we will fix it."
 UKR_dig_up_potatoes: "Dig up Potatoes"
 UKR_dig_up_potatoes_desc: "Belarus can be used by our enemies from both the west and the east to strike at us. The best way to protect yourself is to strike first!"
 UKR_to_recall_the_volhynia_massacre: "Volyn Experience"
 UKR_to_recall_the_volhynia_massacre_desc: "We have faced the Poles again and must once again fight back against them. It's time for our country to finally end the Polish Threat."
 UKR_secretly_sending_militants_to_kuban: "Raise a Rebellion in the Crimea"
 UKR_secretly_sending_militants_to_kuban_desc: "The fact that Crimea was taken from us by Russia is the main historical injustice of the century. The weakness of our authorities has turned out to be appalling and shameful. We will fix it."
 UKR_agitation_of_radical_ukrainians_in_kuban: "Raise a Rebellion in the Kuban"
 UKR_agitation_of_radical_ukrainians_in_kuban_desc: "Kuban is our land and always will be. We will try to take it away from Russia."
 UKR_liberate_green_klin: "\"Liberate\" Green Klin"
 UKR_liberate_green_klin_desc: "It's time to \"Liberate\" our brothers of the Far East from the oppression of the Russian bear."
 UKR_shoot_a_russian_bear: "Shoot a Russian Bear"
 UKR_shoot_a_russian_bear_desc: "The Russian bear will become our rug!"
 UKR_declare_a_great_ukraine: "Declare a Great Ukraine"
 UKR_declare_a_great_ukraine_desc: "Ukraine has become great and let the whole world know about it."
 UKR_upa: "UPA"
 UKR_upa_desc: "The activities of the civil and internal defense of the country will fall on the revived Ukrainian Insurgent Army."
 UKR_new_orders_of_formation_of_upa_groups: "New Orders of Formation of UPA Groups"
 UKR_new_orders_of_formation_of_upa_groups_desc: "We will take into account the experience of the UPA during the Second World War, and create new brigades taking into account mistakes."
 UKR_partisan_units: "Partisan Units"
 UKR_partisan_units_desc: "UPA guerrilla cells will be established throughout the country to actively resist the enemies in the future."
 UKR_partisanship_as_an_ideology: "Partisanship as an Ideology"
 UKR_partisanship_as_an_ideology_desc: "Our partisans must be ideologically educated in order to actively resist the enemy."
 UKR_make_military_exercises_in_the_country_compulsory_for_all: "Make Military Exercises in the Country Compulsory for All"
 UKR_make_military_exercises_in_the_country_compulsory_for_all_desc: "Every Ukrainian should be able to defend his country. Training with specialists of the UPA of ordinary citizens will strengthen the combat power of our country."
 UKR_to_arm_every_person_in_the_country: "To Arm Every Person in the Country"
 UKR_to_arm_every_person_in_the_country_desc: "Women, Children, Men, Old People - everyone should be able to carry a weapon and shoot at the enemy with it."
 UKR_form_an_alliance_of_right_wing_youth: "Form an Alliance of Right-Wing Youth"
 UKR_form_an_alliance_of_right_wing_youth_desc: "The youth of Ukraine must be organized before they can be armed. Unite the scattered right-wing youth movements into a single alliance loyal to the nationalist cause."
 UKR_ukraine_is_a_land_of_partisans: "Ukraine is a Land of Partisans"
 UKR_ukraine_is_a_land_of_partisans_desc: "There will be partisans in every village, in every city, if the enemy invades us. We will meet him with the might of the Ukrainian people."
 UKR_nationalists_right_sector_desc: "Integration of Right Sector militia into state structures strengthens nationalist sentiment and political authority."
 UKR_nationalists_una_unso_desc: "The nationalist UNA-UNSO movement facilitates volunteer mobilization and improves irregular military capability."
 UKR_nationalists_upa_desc: "Drawing on historical UPA resistance tactics enhances supply efficiency and defense of core territories."
 UKR_nationalists_cleane_ukraine_desc: "A sweeping nationalist consolidation drive strengthens resistance to foreign influence and stiffens the will to keep fighting."
 UKR_nationalists_trizub_desc: "The Tryzub organization mobilizes nationalist sentiment and commitment to national defense."
 UKR_nabu: "National Anti-Corruption Bureau of Ukraine"
 UKR_nabu_desc: "New anti-corruption bureau is designed to strengthen the fight against corrupt officials at all levels at times."
 UKR_poroh_deccomuniz: "Poroshenko's Presidency"
 UKR_poroh_deccomuniz_desc: "Poroshenko is an ambiguous person, but his desire to make Ukraine strong in the face of the enemy deserves the respect of the people."
 UKR_west_investors_desc: "Western foreign investors have been attracted to the market, strengthening democratic institutions and driving economic growth and stability."
 UKR_operation_wall_desc: "Defensive fortification construction accelerates dramatically during this mobilization period."
 UKR_ato_supports_desc: "Support for Anti-Terrorist Operation veterans strengthens nationalist sentiment and reinforces our commitment to those who served."
 UKR_health_supports_desc: "Expanded health care funding improves public welfare and strengthens support for democratic governance."
 UKR_pivdenmash_idea_desc: "Pivdenmash state enterprise specializes in ballistic and nuclear missile production with improved efficiency."
 UKR_kyvarmor_idea_desc: "The Kyiv Armored Plant specializes in producing advanced medium tank chassis and amphibious variants."
 UKR_tsnap_idea_desc: "TSNAP state administrative agency streamlines central government bureaucracy and reduces administrative overhead."
 UKR_concern_desc: "Consolidation of scattered military manufacturing into the Kharkiv Military Industry Complex improves tank and vehicle production efficiency."
 UKR_zaz_idea_desc: "ZAZ automotive production has been revitalized, improving vehicle reliability and reducing manufacturing costs for civilian and military transport."
 UKR_kraz_idea_desc: "KrAZ vehicle production provides domestic manufacturing of trucks and armored vehicles, reducing import dependency."
 UKR_motorsich_idea_desc: "State support for Motorsich aircraft engine production reduces costs for heavy aircraft and tank manufacturing."
 UKR_interlegion_decision_category: "International Legion of Territorial Defense"
 UKR_interlegion_decision_category_desc: "The International Legion of Territorial Defense of Ukraine is a project of the Government of Ukraine to attract foreigners to create volunteer units as part of the territorial defense of the Armed Forces of Ukraine."
 UKR_vetrenko_surrort_nationalism_desc: "A nationalist movement has mobilized the population, emphasizing Ukrainian identity and cultural sovereignty against perceived external threats."
 UKR_vetrenko_pioneria_desc: "A nationalist youth organization has been established to foster patriotic education and increase political awareness among younger generations."
 UKR_vetrenko_health_free_idea_desc: "Free healthcare has been implemented nationwide, improving population growth but straining public finances with increased medical expenditures."
 UKR_economic_reforms_modifier: "Ukrainian Economic Development"
 UKR_economic_reforms_modifier_desc: "Decades of oligarchic stagnation left Ukraine's economy a patchwork of Soviet relics and shadow markets. A sustained program of reform is slowly untangling the bureaucracy, courting foreign investment, and modernizing our aging industry. Every step forward is measured in factories reopened and contracts honored."
 UKR_military_reforms_modifier: "Ukrainian Military Development"
 UKR_military_reforms_modifier_desc: "The Ukrainian Armed Forces entered the century underfunded, demoralized, and armed with rusting Soviet stockpiles. Reform means more than new rifles, it means professional officers, realistic training, and doctrine written for the wars we actually face. What emerges will be a leaner, harder army loyal to the state rather than to any patron."
 UKR_Industry_Improvement: "Industrial Improvement"
 UKR_Mining_Improvement: "Mining Improvement"
 UKR_Construction_Improvement: "Construction Improvement"
 UKR_train_Improvement: "Railway Improvement"
 UKR_Network_Improvement: "Network Improvement"
 UKR_Military_Improvement: "Military Improvement"