 MIGRATION_LAWS_TOOLTIP: "이민 관리"
 MIGRATION_LAWS_TOOLTIP_DELAYED: "이민 관리 (Migration Control)는 우리나라의 §Y이민법§!과 현재 이민 정책으로 인해 발생되는 비용을 나타냅니다. §7이민 관리§!의 기본 비용은 총 인구 수와 §Y이민법§! 단계별 비용 증가폭에 의해 결정됩니다.\n\nGDP/C가 §Y이민법§!에 미치는 영향: [?education_cost_gdp_multiplier_display|-%0]\n법률, 국민정신 및 기술이 §Y이민법§!에 미치는 영향: [?modifier@border_control_multiplier_modifier|-%0]\n§Y인플레이션§!이 §Y이민법§!에 미치는 영향: [?inflation_rate_var|-%]"
