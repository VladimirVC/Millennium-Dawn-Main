 RULE_LIC_HRE_Alaska: "@LIC 리히텐슈타인의 부상"
 RULE_LIC_HRE_Alaska_ALLOWED_DESC: "리히텐슈타인이 미국으로부터 알래스카 매입을 시도하고 신성 로마 제국 영유권을 주장하도록 허용합니다. (§R역사적 중점을 킨 상태로 플레이할 경우, 미국은 거의 항상 이 요청을 거절합니다.§!)"
