 NKO_Simhwajo_Sageon_legacy: "O Legado do Sageon Simhwajo"
 NKO_Simhwajo_Sageon_legacy_desc: "O Simhwajo Sageon é uma campanha de expurgo massiva de Kim Jong-il para remover os homens de seu pai Kim Il-Sung que ocorreu na RPDC entre 1997 e 2000.\nAlguns a chamaram de \"versão norte-coreana do macartismo\" ou \"versão norte-coreana da Revolução Cultural\""
