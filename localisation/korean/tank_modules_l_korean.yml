 art_big_gun_gen4_desc: "중곡사포의 발사 메커니즘이 개선되면서 가장 무거운 표적을 타격할 수 있는 중포탄을 유지하면서 허용 가능한 속도로 발사할 수 있는 중포 시스템이 탄생했습니다."
