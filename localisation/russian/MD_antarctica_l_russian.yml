 antarctica_join_ccas_effect_tt: "Вступить в §YCCAS§!.\nПовышает эффективность соответствующих лабораторий на §G+20%§!:\n- Прирост технологии §Y«Генетика»§!\n- Множитель стоимости здравоохранения\n- Ежемесячный прирост населения\nПример: §Y+8.0%§! к генетике превращаются в §G+9.6%§!."
 antarctica_leave_ccas_effect_tt: "Покинуть §YCCAS§! и убрать бонусы её лабораторий."
 antarctica_join_ccamlr_effect_tt: "Вступить в §YАНТКОМ§!.\nПовышает эффективность соответствующих лабораторий на §G+20%§! (мультипликатор, а не фиксированное значение):\n- Скорость исследования §Yподводных лодок§!\n- Скорость исследования §Yморских модулей§!\n- Эффективность обнаружения флота\nПример: §Y+6%§! к исследованиям подлодок превращаются в §G+7.2%§!."
 antarctica_leave_ccamlr_effect_tt: "Покинуть §YАНТКОМ§! и потерять бонусы лабораторий АНТКОМ."
 join_antarctica_treaty_tt: "Через месяц:"
 leave_antarctica_treaty_tt: "Через 2 года:"
 leave_antarctica_cannot_be_stopped_tt: "§RЭто действие нельзя отменить.§!"
 leave_antarctica_treaty_warning_tt: "§RВНИМАНИЕ:§!\nВыход из §CДоговора об Антарктике§!, в то время как вы имеете §Yисследовательскую станцию§! в §CАнтарктиде§!, вызовет глобальную реакцию со стороны участников Договора, включая возможные санкции и дипломатические последствия. Во избежание негативных последствий рекомендуется демонтировать все исследовательские станции в §CАнтарктиде§! перед выходом из договора.\n\nТем не менее, если вы решите покинуть Договор, имея станцию, ни одна статья не удержит вас от начала запрещенной деятельности в §CАнтарктиде§!, такой как эксплуатация ресурсов или военное присутствие, что может привести к тяжелым последствиям для глобальной репутации вашей страны."
 antarctica_post_treaty_activity_category: "Деятельность в Антарктике после выхода из Договора"
 antarctica_post_treaty_activity_category_desc: "Эти действия доступны, так как мы вышли из Договора об Антарктике, всё ещё имея станцию в Антарктиде."
 antarctica_post_treaty_resource_extraction: "Эксплуатация ресурсов Антарктики"
 antarctica_post_treaty_resource_extraction_desc: "Мы можем использовать оставшуюся инфраструктуру станций для добычи ресурсов в Антарктиде. Это увеличит доходы, но вызовет негативную дипломатическую реакцию со стороны участников Договора."
 antarctica_post_treaty_military_preparations: "Подготовить военную инфраструктуру"
 antarctica_post_treaty_military_preparations_desc: "Переоборудовать объекты станций для военного планирования и логистики. Это дает военные преимущества, но рассматривается как серьезная провокация."
