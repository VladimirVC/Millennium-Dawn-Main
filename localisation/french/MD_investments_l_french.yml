 improve_local_conservation_efforts_click_tt: "Pendant 120 jours, nous gagnons ce qui suit dans §Y[THIS.GetName]§!:\nLes pénalités de §YLa forêt amazonienne - Efforts locaux de conservation§! sont réduites de §G-25%§!."
 state_owned_local_naval_infrastructure_modifier: "Développement des infrastructures navales locales"
 state_owned_local_naval_infrastructure_modifier_desc: "Les investissements dans la défense côtière et les infrastructures navales ont transformé les capacités maritimes de l'État. De nouvelles installations navales et des plateformes logistiques assurent désormais un soutien complet aux opérations navales dans la région."
 state_owned_local_fortification_efforts_modifier: "Efforts locaux de fortification"
 state_owned_local_fortification_efforts_modifier_desc: "D'importants ouvrages défensifs ont été construits dans tout l'État, notamment des bunkers, des fortifications côtières et des réseaux de places fortes. Ces installations militaires renforcent considérablement les capacités de défense de l'État face aux invasions et aux attaques terrestres."
 expand_local_coastal_infrastructure: "Currently §YExpanding Local Coastal Infrastructure§! in §Y[THIS.GetName]§!."
 expand_local_coastal_infrastructure_tt: "§YExpand Local Coastal Infrastructure§! in §Y[THIS.GetName]§!\n---------\nThe coastal regions of §Y[THIS.GetName]§! would benefit greatly from improved infrastructure. We should look into expanding the ports, harbors, and coastal defenses to boost maritime trade and naval capabilities."
