 JAP.conservatism_icon: "£JAP_conservatism"
 JAP.liberalism_alt: "£JAP_liberalism_alt （CDP）立憲民主党"
 JAP.liberalism_alt_icon: "£JAP_liberalism_alt"
 JAP.liberalism_alt_desc: "自由主義 - 立憲民主党\n\n現代日本政治において立憲主義と改革志向の勢力として形成された立憲民主党（CDP）は、市民的自由、政府の透明性、そして説明責任ある行政を重視している。同党は行政権の過度な拡大に対する対抗勢力として自らを位置付け、法の支配、国会による監視、そして個人の権利の保護の重要性を強調している。\n\n安全保障政策において、立憲民主党は一般的に日本の防衛的姿勢の維持を支持し、憲法改正には慎重である。特に、それが憲法第9条を弱めたり、明確な民主的統制なしに軍事的裁量を拡大する可能性がある場合には警戒的である。経済および社会政策では、包摂的成長、より強固な社会保障、そして現代的で開かれた経済を維持しながら不平等を是正する政策を支持している。"
 JAP.Neutral_Communism_icon: "£JAP_Communist_State"
 ARG.Western_Autocracy: "£ARG_western_autocracy 連邦の誓約"
 ARG.Western_Autocracy_icon: "£ARG_western_autocracy"
 ARG.Western_Autocracy_desc: "西側独裁体制 - 連邦の誓約（スペイン語：Compromiso Federal）は、ペロン主義の政党であり、その主な目標はサン・ルイス・モデルを全国レベルで実現することである。"
 ARG.conservatism_alt: "£ARG_conservatism_alt 共和党の提案"
 ARG.conservatism_alt_icon: "£ARG_conservatism_alt"
 ARG.conservatism_alt_desc: "保守主義 - 共和党の提案（スペイン語：Propuesta Republicana）は、保守的な新自由主義政党である。同党は主要な反ペロン主義政党であり、党首はアルゼンチンの元大統領マウリシオ・マクリが務めている。"
 ARG.Conservative: "£ARG_emerging_reactionary 勝利党"
 ARG.Conservative_icon: "£ARG_emerging_reactionary"
 ARG.Conservative_desc: "反動主義 - 勝利党（スペイン語：Partido de la Victoria）は、アルゼンチンの元大統領ネストル・キルチネルによって設立された左派ペロニスト政党である。同党は、ペロニズムの一派と見なされている「キルチネリズム」という指導者の思想を掲げている。"
