 Light_attack_helo_bat_desc: "我自我认知是一架AH-6雏鸟攻击直升机。"
 Light_armor_Bat: "缩编的坦克营"
 Light_armor_Bat_desc: "坦克营只配备现存最重型的装甲车辆——主战坦克。它们在平坦地形上机动性极佳，并拥有强大的直接火力，旨在突破敌军前线，以便后续的机械化步兵部队迅速扩大战果。"
 Light_L_arm_Bat: "缩编的轻型坦克营"
 Light_L_arm_Bat_desc: "轻型坦克营装备特制的轻型坦克，这些坦克通常为轮式，兼具惊人的机动性和强大的火力。它们能够在正面交锋中与各种类型的步兵抗衡。然而，正面交锋并非其主要任务——它们渗透到敌方附近，观察并汇报敌方行动，并利用无人机侦察和电子监视收集情报。它们还可以对敌方重要资产和机械化部队进行突袭和伏击。"
 Light_SP_Arty_Bat: "缩编的自行火炮营"
