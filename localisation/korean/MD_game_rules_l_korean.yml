 RULE_OPTION_ITA_GREENS: "녹색 연맹"
 RULE_OPTION_ITA_GREENS_DESC: "§Y비동맹§! 녹색연방이 이탈리아의 정권을 잡을 것입니다."
 RULE_OPTION_ITA_EAST: "이탈리아 공산당"
 RULE_OPTION_ITA_EAST_DESC: "§G신흥국 진영§! 강경파 이탈리아 공산당(PCI)이 이탈리아 정치에서 두각을 나타낼 것입니다."
 RULE_OPTION_ITA_NONCOM: "공산 재건당"
