 nationalism_desc: "Les gouvernements nationalistes estiment avoir été les grands perdants de la mondialisation et aspirent à une renaissance nationale fondée sur le protectionnisme, la militarisation et la souveraineté nationale et ethnique. Ils abhorrent les institutions libérales internationales, mais peuvent se montrer pragmatiques dans leurs alliances internationales afin de servir leurs objectifs nationaux ou expansionnistes."
