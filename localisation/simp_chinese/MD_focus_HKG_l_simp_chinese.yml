 hongkong.8.t: "龙之年"
 hongkong.8.d: "回归大陆已过三年，香港经历了亚洲金融危机。但在中国的统治下，香港并没有像西方想象的那样走向衰落。进入新千年，香港仍将向世界证明，融入中国并不是一件坏事……"
 hongkong.8.a: "新年快乐！"
 hongkong.9.t: "香港寻求我方提供武器"
 hongkong.9.d: "香港警队已订购一批中国制造的小型武器。虽然数量不多，但象征意义重大：这是香港首次正式从内地供应商采购安保装备。官方媒体已将此交易解读为香港特区对中国工业日益增长的信任的标志。"
 hongkong.9.a: "以优惠价位批准"
 hongkong.9.b: "利用这一时刻进行国家宣传"
 hongkong.13.t: "北京的反应"
 hongkong.13.d: "立法会呼吁释放内地异见人士一个月后，中联办发表措辞强硬的声明予以驳斥。官方媒体指责香港政客“干涉中华人民共和国内政”。少数低调的被拘留者悄然获释，但更多人仍被关押。泛民主派阵营义愤填膺，爱国派阵营则一片欢腾。"
 hongkong.13.a: "欢迎异见者的回归"
 hongkong.13.b: "谴责北京的训斥"
 hongkong.13.c: "静默了结此事"
 HKG_aukus_request_tt: "§Y[ROOT.GetNameDef]§!将向§H[ENG.GetName]§!、§H[USA.GetName]§!和§H[AST.GetName]§!§Y请求§!情报共享访问权限。他们可能拒绝。"
 HKG_uk_garrison_request_tt: "§H[ENG.GetName]§!将受邀前往香港驻军。他们可能拒绝。"
 hongkong.14.t: "香港问题"
 hongkong.14.d: "两百万人走上香港街头。反修例运动已撼动香港特区的政治秩序。亲北京官员要求采取更强硬的行动；国务院务实派则警告说，过度干预会吓跑外资。政治局常委会将决定如何应对。"
 hongkong.14.a: "加强控制 - 正式的傀儡地位"
 hongkong.14.b: "保持克制 - 维护框架"
 hongkong.15.t: "香港寻求加入澳美合作机制框架"
 hongkong.15.d: "香港亲西方政府已正式提出情报共享和军事基地准入请求。在中国南部边缘拥有一个友好港口具有巨大的战略价值 - 但北京会将其视为敌对行为，而安全影响也是双向的。这个问题将提交国家安全委员会审议。"
 hongkong.15.a: "授予准入权 - 香港是一项战略资产"
 hongkong.15.b: "拒绝 - 与北京保持距离"
 hongkong.16.t: "香港邀请英国驻军"
 hongkong.16.d: "香港特区政府已正式邀请英国在香港重新设立常驻军事基地。此举具有非凡的象征意义，但可能引发与北京的严重外交风波。国防大臣已将此事提交内阁审议。"
 hongkong.16.a: "接受 - 恢复英国的存在"
 hongkong.16.b: "拒绝 - 外交代价太高"
 hongkong.10.t: "香港政府要求我们回答下届选举是否能实现普选。"
 hongkong.10.d: "根据香港基本法，香港首两届行政长官和首三届立法会​​均由选举委员会提名和选举产生，并非普选产生。2007年行政长官选举和2008年立法会选举将是决定香港是否应改革民主制度，让香港最终实现普选目标的契机。"
 hongkong.10.a: "香港的选举制度将维持现状。"
 hongkong.10.b: "我们不太赞同直接普选，但我们会支持一些渐进、有序的选举改革。"
 hongkong.10.c: "还不如激进一点，直接允许普选！"
 hongkong.11.t: "电讯盈科与香港电讯合并"
 hongkong.11.d: "近日，英国大东电报局不顾内地政府反对，宣布将香港电讯出售给新加坡电信，但李嘉诚之子李泽楷旗下的电讯盈科也参与竞购，并最终胜出。电讯盈科与香港电讯合并的消息公布后，电讯盈科股价当天收盘时由几分钱飙升至28.5港元，市值一度突破2500亿港元。"
 hongkong.11.a: "互联网真是一个伟大的东西！"
 hongkong.12.t: "互联网泡沫的影响"
 hongkong.12.d: "随着互联网泡沫破裂，几个月前刚完成合并的电讯盈科股价暴跌98%，造成巨额负资产，电讯盈科不得不筹划出售核心业务以缓解财务困境。"
 hongkong.12.a: "新的千年，新问题…"
 hongkong_legco.1.t: "[GetYear]立法会席位"
 hongkong_legco.1.d: "这是立法会席位的计算情况。\n<尚未实装>"
 hongkong_legco.1.a: "明白了。"
 hongkong_legco.2.t: "增加§Y官僚§!支出的议案已通过"
 hongkong_legco.2.d: "今天，立法会经过多轮选举后，增加官僚开支的议案已获通过。"
 hongkong_legco.2.a: "香港的民主继续服务于民众。"
 hongkong_legco.3.t: "削减§Y官僚§!支出的议案已通过"
 hongkong_legco.3.d: "今天，立法会经过多轮选举后，减少官僚开支的议案已获通过。"
 hongkong_legco.3.a: "香港的民主继续服务于民众。"
 hongkong_legco.4.t: "改变§Y官僚§!支出的动议已被否决"
 hongkong_legco.4.d: "如今，立法会经过多轮选举后，改变官僚开支的议案已被否决。"
 hongkong_legco.4.a: "他们将来会改变主意的。"
 hongkong_legco.5.t: "增加£foreign_influence_defense_modifier_texticon §C安全§!预算的动议已获通过"
 hongkong_legco.5.d: "经过激烈辩论，立法会批准增加保安和警务经费。建制派认为此举将使香港更安全；泛民主派则警告称，这可能导致监控机制的出现。"
 hongkong_legco.5.a: "投下支持稳定的一票。"
 hongkong_legco.6.t: "减少£foreign_influence_defense_modifier_texticon §C安全§!预算的动议已获通过"
 hongkong_legco.6.d: "立法会投票决定削减安保和警务预算。公民自由主义者对此表示赞赏；爱国阵营则警告称，北京会将此视为挑衅。"
 hongkong_legco.6.a: "更少部队，更多自由。"
 hongkong_legco.7.t: "改变£foreign_influence_defense_modifier_texticon §C安全§!预算的动议被否决"
 hongkong_legco.7.d: "修改安保经费的动议未获立法会通过。现状暂时维持不变。"
 hongkong_legco.7.a: "或许下次吧。"
 hongkong_legco.8.t: "增加£research_speed_texticon §G教育§!预算的动议已获通过"
 hongkong_legco.8.d: "立法会已批准大幅增加教育预算。大学和小学都将获得新的拨款；北京的内地课程倡导者可能会将此视为一个机会。"
 hongkong_legco.8.a: "这是对未来的投资。"
 hongkong_legco.9.t: "减少£research_speed_texticon §G教育§!预算的动议已获通过"
 hongkong_legco.9.d: "立法会投票决定削减教育经费。教师工会对此强烈不满；财政司司长则强调财政纪律才是首要任务。"
 hongkong_legco.9.a: "现在先培养自律，以后再成长。"
 hongkong_legco.10.t: "改变£research_speed_texticon §G教育§!预算的动议被否决"
 hongkong_legco.10.d: "修改教育预算的动议未获立法会通过。学校和大学将继续按照现有拨款方案运作。"
 hongkong_legco.10.a: "当前路径仍然有效。"
 hongkong_legco.11.t: "减少£population_texticon §R医疗保健§!预算的动议已获通过"
 hongkong_legco.11.d: "医院管理局将获得大幅增加的拨款。公立医院终于可以解决人手短缺和候诊名单过长的问题了。"
 hongkong_legco.11.a: "更健康的香港。"
 hongkong_legco.12.t: "增加£population_texticon §R医疗保健§!预算的动议已获通过"
 hongkong_legco.12.d: "立法会投票决定削减医疗拨款。医生警告称，排队等候时间将延长；私营医疗机构已做好准备，应对由此产生的额外需求。"
 hongkong_legco.12.a: "市场会填补这一缺口。"
 hongkong_legco.13.t: "改变£population_texticon §R医疗保健§!预算的动议被否决"
 hongkong_legco.13.d: "立法会否决了修改医疗拨款的动议。医院管理局将继续按照现有预算运作。"
 hongkong_legco.13.a: "现状维持不变。"
 hongkong_legco.14.t: "增加£consumer_goods_texticon §n养老金§!预算的动议已获通过"
 hongkong_legco.14.d: "立法会批准扩大养老金及福利计划。民主党人欢欣鼓舞；商会警告称，此举将造成长期财政压力。"
 hongkong_legco.14.a: "关爱长者。"
 hongkong_legco.15.t: "减少£consumer_goods_texticon §n养老金§!预算的动议已获通过"
 hongkong_legco.15.d: "立法会以微弱优势投票通过削减养老金和福利开支。退休人员权益团体呼吁举行抗议；财政部则坚称这些削减措施是可持续的。"
 hongkong_legco.15.a: "勒紧腰带。"
 hongkong_legco.16.t: "改变£consumer_goods_texticon §n养老金§!预算的动议被否决"
 hongkong_legco.16.d: "修改退休金及福利开支的动议未获立法会通过。现有福利待遇维持不变。"
 hongkong_legco.16.a: "老年选民的投票立场坚定。"
 hongkong_news.4.t: "123民主联盟今天解散。"
 hongkong_news.4.d: "123民主联盟于1994年由一批亲台、支持民主和亲商界的政客发起成立，国民党在总统大选中失败后，因得不到台湾政府的资金支持而解散。"
 hongkong_news.4.a: "这是一个好消息，不是吗？"
 hongkong_news.4.b: "嗯...明白了。"
 hongkong_news.5.t: "SARS爆发"
 hongkong_news.5.d: "一种名为“SARS”的严重肺炎病毒在广东和香港爆发。尽管中国大陆官员声称疫情已得到有效控制，但香港的疫情仍在持续。世界卫生组织已对中国南方和香港发布旅行警告，称其构成全球健康威胁。目前已有1人因此死亡。香港政府已开始对疑似感染者实施强制隔离措施。"
 hongkong_news.5.a: "哦该死，我们的旅游业越来越糟糕了……"
 hongkong_news.5.b: "逮捕不称职的官员，以透明的方式处理疫情。"
 hongkong_news.5.c: "我们需要继续隐藏真实数据以维护社会稳定。"
 hongkong_news.5.e: "令人担忧的事态发展。"
 hongkong_news.6.t: "张国荣逝世"
 hongkong_news.6.d: "享誉世界的香港歌手、演员、偶像张国荣因抑郁症于46岁时在香港文华酒店跳楼自杀。张国荣以他真挚的歌声、精湛的演技和独特的个人魅力俘获了无数歌迷的心。他的离世震惊了整个华人社会，许多人深感悲痛和失落。\n\n张国荣的离世不仅是娱乐界的重大损失，更是文化和精神上的打击。他的音乐和电影作品将继续影响和激励未来的艺术家和观众，但他的离去将永远留下一个无法填补的空白。"
 hongkong_news.6.a: "今天我们失去了一位伟大的艺术家。"
 hongkong_news.7.t: "梅艳芳逝世"
 hongkong_news.7.d: "被誉为“亚洲麦当娜”的梅艳芳，在与宫颈癌顽强抗争后，于40岁英年早逝。\n\n梅艳芳生于1963年，在20世纪80年代走红，成为粤语流行乐坛的领军人物，给数百万歌迷留下了永恒的记忆。她热心公益，面对病魔也展现出坚韧不拔的精神，赢得了人们的深深敬仰。梅艳芳逝世的消息传开后，举国上下沉浸在悲痛之中，人们纷纷缅怀这位深受爱戴的“香港女儿”。"
 hongkong_news.7.a: "一个伟大时代的终结。"
 hongkong_news.8.t: "强热带风暴尤特"
 hongkong_news.8.d: "7月4日下午5时45分，台风尤特进入800公里警告区，香港天文台发出1号待命信号。7月5日晚上7时30分，信号升级为8号大风或暴风信号，这是21世纪以来首次发出此信号。由于风暴潮，加上当天早晨的正常涨潮，鲗鱼涌海平面达到3.4米，为1962年台风温黛袭击香港以来的最高水位。7月6日，大澳及新界西北部地区发生严重水灾。大澳部分主要街道变成河流，水深达3米。流浮山海鲜批发市场也遭洪水侵袭，许多店铺被迫关门。"
 hongkong_news.8.a: "天文台已经完成了它的使命。"
 hongkong_news.9.t: "强热带风暴玉兔"
 hongkong_news.9.d: "热带风暴玉兔已进入香港天文台警告区，天文台发出1号待命信号。公共交通时刻表已作调整，学校已发布风暴预警，全市排水系统及紧急服务部门已启动。天文台预计未来24小时内情况将最为严峻。"
 hongkong_news.9.a: "做好准备，等待时机过去。"
 HKG_gen.1.t: "两种制度，一个未来？"
 HKG_gen.1.d: "权力交接解决了宪法问题，但日常摩擦却日益加剧。泛民主派要求明确普选时间表，亲北京阵营则呼吁保持耐心和感恩之心，商界只求稳定。基本法已经生效，如何落实才是关键所在。"
 HKG_gen.1.a: "相信框架会成熟"
 HKG_gen.1.b: "调解敌对阵营之间的矛盾"
 HKG_gen.1.c: "坚定地站在爱国阵营一边"
 HKG_gen.2.t: "正义刻不容缓"
 HKG_gen.2.d: "数万民众聚集在维多利亚公园，要求追究天安门事件的责任。中联办表示“严重关切”，并警告不要上演“受外部势力操控的政治闹剧”。北京召见我方官员进行紧急磋商。民众正密切关注我们下一步的行动。"
 HKG_gen.2.a: "公开声援抗议者"
 HKG_gen.2.b: "劝告人群保持克制"
 HKG_gen.3.t: "法律之后"
 HKG_gen.3.d: "国家安全法一夜之间重塑了这座城市。《苹果日报》停刊。知名活动人士被拘留或流亡海外。学校正在修订课程。外国商会正在悄悄地就新加坡的情况询问其成员的意见。现在的问题是，如何应对接下来的发展。"
 HKG_gen.3.a: "迫使持不同政见的领导人退休"
 HKG_gen.3.b: "实施全市宵禁"
 HKG_gen.4.t: "街头巷尾都在诉说着什么。"
 HKG_gen.4.d: "从铜锣湾到旺角，游行队伍越来越多，每个路口都能看到黄伞。泛民主派的声音达到了数十年来的最高点，立法会每届会议旁听席都座无虚席。政府不能对这股潮流视而不见。"
 HKG_gen.4.a: "公开支持这项运动"
 HKG_gen.4.b: "呼吁保持克制并展开对话"
 HKG_gen.4.c: "政府应远离街头政治。"
 HKG_gen.5.t: "资本腾飞"
 HKG_gen.5.d: "高盛正将高管团队迁往新加坡。汇丰银行已悄然启动对其亚洲总部的审查。恒生指数已连续三个交易日下跌，房地产市场也随之走低。香港作为亚洲金融门户的地位已不再稳固。"
 HKG_gen.5.a: "引入内地资金填补空缺"
 HKG_gen.5.b: "提供税收减免以留住即将离开的公司"
 HKG_gen.5.c: "接受损失，转向旅游业和服务业。"
 HKG_european_bussiness_opinion: "改善与欧洲商人的贸易"
 HKG_chinese_entrepreneurs_opinion: "改善与内地企业家的贸易"
 HKG_one_country_two_systems: "一国两制"
 HKG_one_country_two_systems_desc: "这是香港回归时所作出的宪制承诺。但防火墙还能维持多久？"
 HKG_protest_movement_rises: "抗议活动开始"
 HKG_protest_movement_rises_desc: "数十万人涌上街头。全世界都在关注。北京也在关注。"
 HKG_loyalist_consolidation: "忠诚派团结一致"
 HKG_loyalist_consolidation_desc: "亲北京派系加强了对立法会和公务员任命的控制。"
 HKG_umbrella_revolution: "雨伞革命"
 HKG_umbrella_revolution_desc: "学生和活动人士占领了城市的主要街道。黄色雨伞成为一代人希望的象征。"
 HKG_democratic_opposition_network: "民主反对派网络"
 HKG_democratic_opposition_network_desc: "泛民主政党和公民社会团体组成广泛联盟，共同对抗北京的咄咄逼人行为。"
 HKG_nsl_imposed: "国家安全法"
 HKG_nsl_imposed_desc: "北京完全绕过了立法会。一夜之间，抗议、颠覆国家政权、分裂国家和勾结外国势力都成了可判处终身监禁的罪行。"
 HKG_press_freedom_crackdown: "压制新闻自由"
 HKG_press_freedom_crackdown_desc: "《苹果日报》遭突击搜查并关闭。香港电台的编辑独立性被剥夺。最后的自由声音也随之消失。"
 HKG_police_state_apparatus: "铁腕警务"
 HKG_police_state_apparatus_desc: "根据《国家安全法》的规定，警方的权力不断扩大。防暴队、便衣行动和大规模逮捕成为常态。"
 HKG_dialogue_with_protesters: "对话委员会"
 HKG_dialogue_with_protesters_desc: "这是在全面镇压之前进行的最后一次孤注一掷的调解尝试。警方已邀请独立观察员审查警方的行为。"
 HKG_anti_extradition_bill: "引渡法案危机"
 HKG_anti_extradition_bill_desc: "一项允许将嫌疑人引渡到中国大陆的法案引发了香港历史上规模最大的抗议活动 - 两百万人参与的游行。"
 HKG_youth_resistance_cells: "青年抵抗运动"
 HKG_youth_resistance_cells_desc: "执拗的香港青年组成前线队伍。身着黑衣的他们用汽油弹和雨伞对抗催泪瓦斯和橡皮子弹。"
 HKG_emigration_wave: "大迁徙"
 HKG_emigration_wave_desc: "数十万人通过英国国民（海外）签证计划前往英国、加拿大和澳大利亚。香港的专业人才大量流失。"
 HKG_preserve_financial_hub: "保护金融中心"
 HKG_preserve_financial_hub_desc: "商业精英游说北京：香港的价值在于其独特的法律框架和国际联系。摧毁这些，就等于摧毁一切。"
 HKG_foreign_business_exodus: "外国资本出逃"
 HKG_foreign_business_exodus_desc: "银行、律师事务所和跨国公司悄然将区域总部迁往新加坡和东京。金融霸主地位正在动摇。"
 HKG_western_sanctions_threat: "西方制裁威胁"
 HKG_western_sanctions_threat_desc: "美国、英国和欧盟正在重新审视香港的特殊贸易地位。香港进入西方市场的特权岌岌可危。"
 HKG_deeper_mainland_integration: "更深层次的大陆融合"
 HKG_deeper_mainland_integration_desc: "粤港澳大湾区计划将香港纳入中国的经济轨道。基础设施、金融和治理正在逐步融合。"
 HKG_patriotic_education: "爱国主义教育"
 HKG_patriotic_education_desc: "新的课程体系改写了历史。下一代将被灌输这样的观念：香港过去是、现在是、将来也永远是中国的。"
 HKG_last_stand_opposition: "民主的最后抵抗"
 HKG_last_stand_opposition_desc: "幸存的民主派人士拒绝沉默。他们流亡伦敦和华盛顿，继续游说世界，明知自己可能永远无法回家。"
 HKG_absorption_complete: "完全吸收"
 HKG_absorption_complete_desc: "一个国家，一个体制。实验结束了。香港独特的身份如今只存在于记忆和海外侨胞之中。"
 HKG_city_of_resistance: "抵抗之城"
 HKG_city_of_resistance_desc: "尽管困难重重，抵抗精神依然不减。香港成为世界各地民主国家的象征 - 这证明，即使胜算渺茫，有些东西也值得为之奋斗。"
 HKG_silenced_press: "噤声的媒体"
 HKG_silenced_press_desc: "我们将压制新闻自由，这将加快一体化进程，但我们必须迅速行动，否则国家将爆发叛乱。"
 HKG_mainland_integration: "大陆一体化"
 HKG_mainland_integration_desc: "通过削弱我们的自治权来与大陆融合，但同时也要赋予我们获得更多收入、减少安全开支的能力。"
 HKG_brain_drain: "人才流失"
 HKG_brain_drain_desc: "我们必须动用一切资源来保卫我们的土地。"
 HKG_annexation: "特别行政区模式"
 HKG_annexation_desc: "香港已成为北京的典范特别行政区 - 服从、繁荣、一体化。政治局以优惠的贸易准入、内地劳动力流动和基础设施投资来奖励忠诚。只要香港仍是中华人民共和国的一部分，这些特权就一直有效。"
 HKG_democratic_reform_initiative: "民主改革倡议"
 HKG_democratic_reform_initiative_desc: "和平之路终获丰硕成果。随着公民社会的组织化、新闻自由的保护以及立法会的开放，特区正式致力于民主改革。相关制度已经存在，现在需要进一步加强。"
 HKG_universal_suffrage_amendment: "普选权修正案"
 HKG_universal_suffrage_amendment_desc: "所有香港成年公民均享有投票权，所有民选职位均需竞选，提名委员会解散。该修正案在立法会获得通过，并被确立为一项宪制权利。北京抗议；香港欢庆。"
 HKG_independent_judiciary_reform: "独立司法改革"
 HKG_independent_judiciary_reform_desc: "终审法院不受政治否决权的影响，检察官独立于行政部门运作，司法任命由独立委员会审查。这样的司法机构配得上它所诠释的法治。"
 HKG_freedom_of_information_act: "信息自由法案"
 HKG_freedom_of_information_act_desc: "政府文件默认对公众开放。举报人获得法律保护。“噤声新闻”政策被废除，香港的新闻自由成为该地区最稀有的现象：在中国城市中，新闻自由弥足珍贵。"
 HKG_democratic_consolidation: "民主派团结一致"
 HKG_democratic_consolidation_desc: "普选、司法独立和新闻自由相辅相成，使香港成为中国历史上最民主的社会。这些改革并非可以通过法令逆转，而是奠定了新的基础。"
 HKG_infrastructure_megaproject: "基础设施大型项目"
 HKG_infrastructure_megaproject_desc: "地政总署制定总体规划：香港未来十年的发展取决于向外、向上和地下的全面建设。财政部门开会。合同签署完毕。起重机进场。"
 HKG_mtr_expansion_phase_2: "港铁扩建二期"
 HKG_mtr_expansion_phase_2_desc: "西铁线、沙田至中环线以及筹划已久的北岛走廊将延伸开来。通勤时间缩短，新车站沿线的房产价值上升，港铁网络也将延伸至自英国殖民时期以来就一直期盼的地区。"
 HKG_third_runway_chek_lap_kok: "赤𫚭角机场第三跑道"
 HKG_third_runway_chek_lap_kok_desc: "仅填海工程就耗时数年，耗资巨大，但香港国际机场不能再像新加坡和上海那样不断扩建，只能保留两条跑道。第三条跑道的建成将巩固香港作为区域航空枢纽的地位。"
 HKG_lantau_tomorrow_vision: "大屿山明日愿景"
 HKG_lantau_tomorrow_vision_desc: "香港历史上规模最大的填海工程：在大屿山以东建造人工岛，容纳数十万居民，打造新的中央商务区。环保人士反对，住房困难者欢呼。政治代价不菲，但可利用土地的增加却十分巨大。"
 HKG_smart_city_initiative: "智慧城市计划"
 HKG_smart_city_initiative_desc: "全市5G网络、一体化交通管理、全民数字身份，以及允许初创企业利用特区数据进行开发的公共服务API，香港正从繁荣跃升至可编程时代。"
 HKG_world_class_infrastructure: "世界一流的基础设施"
 HKG_world_class_infrastructure_desc: "道路、铁路、港口、机场、光纤网络和填海造地工程同步升级。这座为21世纪下半叶而建的城市基础设施，终于建成。"
 HKG_hospital_authority_reform: "医院管理局改革"
 HKG_hospital_authority_reform_desc: "医院管理局进行了重组，以提高透明度、效率和基于结果的拨款方式。候诊时间开始缩短，公立和私立医疗服务之间的差距缩小，现代化医疗体系的基础也由此奠定。"
 HKG_pandemic_preparedness: "大流行病防范"
 HKG_pandemic_preparedness_desc: "非典给这座城市留下了惨痛的教训；新成立的卫生防护中心确保人们牢记这一教训。储备充足的个人防护装备、完善的接触者追踪能力，以及与世界卫生组织的一体化监测，确保下一次疫情爆发不会让香港措手不及。"
 HKG_chinese_medicine_integration: "中医整合"
 HKG_chinese_medicine_integration_desc: "传统中医已融入公共卫生体系：规范的执业医师队伍、医院科室、大学研究经费。既想体验传统医学又想享受现代医学的患者如愿以偿，北京也注意到了这种对文化的尊重。"
 HKG_universal_healthcare_voucher: "全民医疗保健券"
 HKG_universal_healthcare_voucher_desc: "每位居民每年都会收到一张可在公立或私立诊所使用的代金券。医疗保障在实践中真正实现了全民覆盖，名义上如此，低收入劳动者不再需要在房租和看病之间做出艰难抉择。"
 HKG_public_health_modernisation: "公共卫生现代化"
 HKG_public_health_modernisation_desc: "新界各地新建了癌症中心，扩大了心理健康服务，医院也进行了现代化改造。医学本身也在跟上制度改革的步伐。"
 HKG_healthcare_excellence: "医疗保健卓越"
 HKG_healthcare_excellence_desc: "香港的预期寿命已位居世界前列；造就这一成就的制度如今也配得上这一统计数据。周边地区开始研究和效仿这一模式。"
 HKG_labour_reform_charter: "劳工改革宪章"
 HKG_labour_reform_charter_desc: "这是香港劳工法典数十年来首次全面修订。血汗工厂、拖欠加班费、宿舍虐待以及非正规部门剥削等问题都被点名、评估，并列入立法议程。工会对此高度关注。"
 HKG_minimum_wage_ordinance: "最低工资条例"
 HKG_minimum_wage_ordinance_desc: "法定最低工资标准，每两年调整一次。大型企业集团抗议缺乏竞争力；清洁工和餐馆员工的工资却迎来了近几十年来首次增长。"
 HKG_collective_bargaining_rights: "集体谈判权"
 HKG_collective_bargaining_rights_desc: "工会获得法律认可，集体合同具有法律效力，罢工权不再被容忍，而是被写入法律条文。工会联合会成为真正制衡商会的力量。"
 HKG_foreign_domestic_helpers_protections: "外籍家庭佣工保护"
 HKG_foreign_domestic_helpers_protections_desc: "住家保姆，大多来自菲律宾和印度尼西亚，如今获得了可执行的法律保护，免受雇主最严重的虐待。她们享有强制休假、透明的合同条款，以及真正具有实权的监管机构。这终于承认了她们是劳动者，而非佣人。"
 HKG_pension_scheme_reform: "养老金计划改革"
 HKG_pension_scheme_reform_desc: "强制性公积金制度最令人诟病之处 - 高额费用、雇主抵扣缴款、缴款缺口 - 已得到改革。香港老年贫困问题不再是鲜为人知的丑闻。"
 HKG_labour_dignity: "劳工尊严"
 HKG_labour_dignity_desc: "法定最低工资标准、认可的工会、受保护的帮工以及真正有效的养老金制度。在香港工作，终于可以称得上是一份体面的工作了。"
 HKG_renminbi_offshore_hub: "人民币离岸中心"
 HKG_renminbi_offshore_hub_desc: "北京将全球最大的离岸人民币池托付给香港。整个地区的点心债券发行、货币互换和清算服务都通过中环进行。靠近内地优势显而易见。"
 HKG_belt_and_road_financing: "“一带一路”融资"
 HKG_belt_and_road_financing_desc: "香港正成为欧亚大陆“一带一路”基础设施建设的金融门户。项目融资、债券承销、争端解决 - 香港特区的专业技术与中国资本一同输出。"
 HKG_green_finance_centre: "绿色金融中心"
 HKG_green_finance_centre_desc: "香港交易所推出绿色债券板块，证监会发布强有力的气候信息披露规则，香港将自身定位为亚洲ESG资本的门户。欧洲养老基金注意到了这一点，可再生能源开发商也注意到了。"
 HKG_fintech_revolution: "金融科技革命"
 HKG_fintech_revolution_desc: "虚拟银行牌照、监管沙盒以及更快捷的支付系统，最终将零售金融带入了数字时代。新一代金融公司诞生于数码港，而非中环。"
 HKG_global_wealth_management: "全球财富管理"
 HKG_global_wealth_management_desc: "人民币清算、绿色之都、金融科技轨道交通 - 香港在这三大领域都处于中心地位。世界财富通过香港特区进行自我管理。仅凭这些费用就足以证明这座城市存在的价值。"
 HKG_tourism_board_revival: "旅游局复兴"
 HKG_tourism_board_revival_desc: "权力交接之后，SARS疫情之后，一切都尘埃落定之后，旅游局重整旗鼓：加强市场营销，拓展游客服务，打造超越“亚洲世界之都”陈词滥调的统一城市品牌。游客们注意到了这些变化。"
 HKG_disney_hong_kong: "香港迪士尼乐园"
 HKG_disney_hong_kong_desc: "大屿山拥有最小的迪士尼乐园，也是内地游客最容易到达的乐园。虽然建设成本高昂，但剪彩仪式盛况空前，大屿山也因此获得了一个适合家庭游玩的旅游胜地，为当地旅游经济注入了新的活力。"
 HKG_cantopop_revival: "粤语流行音乐复兴"
 HKG_cantopop_revival_desc: "一波公共投资、广播配额和音乐节赞助，使粤语流行音乐重获商业价值。粤语流行音乐曾经承载的文化自信也随之回归。"
 HKG_film_industry_renaissance: "电影工业复兴"
 HKG_film_industry_renaissance_desc: "TVB工作室扩张，独立电影人获得投资，香港电影重拾八九十年代的辉煌。不再局限于武侠和犯罪片 - 严肃剧情片、家庭喜剧以及一批拥有故事要讲的新一代导演，都成为了新的电影类型。"
 HKG_west_kowloon_cultural_district: "西九龙文化区"
 HKG_west_kowloon_cultural_district_desc: "M+、故宫博物院、戏曲中心以及十几家规模较小的机构都坐落于这片曾经的填海土地上。这里是一个真正的文化区，让这座城市在画廊和剧院中，而非在玻璃幕墙的摩天大楼大厅里，讲述着自己的故事。"
 HKG_world_class_destination: "世界级目的地"
 HKG_world_class_destination_desc: "旅游、基础设施、美食和文化齐头并进，达到巅峰。香港不再仅仅是中转站或交易场所，而是一个名副其实的旅游目的地 - 那种旅行者会围绕它规划整个行程的城市。"
 HKG_consolidated_democracy: "巩固之后的民主"
 HKG_consolidated_democracy_desc: "香港的民主制度如今已形成自我强化的机制：新闻自由、司法独立、竞争性选举。这是一个无需中央政府许可即可运作的民主制度。"
 HKG_modernised_infrastructure_idea: "现代化基础设施"
 HKG_modernised_infrastructure_idea_desc: "香港的公路、铁路、港口和数字基础设施均已升级至世界一流标准。各行各业都将从中受益。"
 HKG_modern_healthcare_system: "现代医疗保健系统"
 HKG_modern_healthcare_system_desc: "全民医保、现代化医院和公私合营医疗模式，以可持续的成本实现了世界上最好的健康成果。"
 HKG_renminbi_hub_idea: "离岸人民币枢纽"
 HKG_renminbi_hub_idea_desc: "香港是全球领先的离岸人民币清算中心。贸易、投资和货币对冲资金流动都通过香港特区的银行和交易所进行。"
 HKG_green_finance_idea: "绿色金融中心"
 HKG_green_finance_idea_desc: "亚洲气候友好型资本的门户。绿色债券、ESG评级股票和可再生能源项目融资均可通过中国内地进行。"
 HKG_tourism_boom: "旅游业蓬勃发展"
 HKG_tourism_boom_desc: "香港再次成为世界顶级旅游目的地。游客的消费带动了零售、酒店和文化产业的发展；消费凭证也提升了社会氛围。"
 HKG_strengthened_unions: "加强工会"
 HKG_strengthened_unions_desc: "工会获得认可、资金支持，并拥有强大的政治影响力。工资上涨，工作条件改善，劳动资本平衡永久性地向劳动者倾斜。每个工人的产出略有下降；人均产出 - 以及社会稳定——大幅上升。"
 HKG_labour_reform_active: "劳工改革正在进行中"
 HKG_labour_reform_active_desc: "《宪章》已将劳工法典列入立法议程。过渡期间，由于管理层需要适应，生产力可能会有所下降，但监管的明确性已经开始吸引技术工人重返香港。"
 HKG_minimum_wage_in_force: "最低工资标准生效"
 HKG_minimum_wage_in_force_desc: "法定最低工资标准由香港特别行政区所有雇主支付。清洁工、保安和餐饮业员工的实际可支配收入增加；办公楼和工厂承担了相关成本；人口也随之增长。"
 HKG_collective_bargaining_idea: "认可集体谈判"
 HKG_collective_bargaining_idea_desc: "行业工会负责谈判具有法律效力的集体合同。当合同出现争议时，工业产出会放缓，但劳动人口数量会趋于稳定，而有组织的劳工的政治倾向则会加深。"
 HKG_domestic_helper_protections_idea: "家庭佣工保护"
 HKG_domestic_helper_protections_idea_desc: "外籍家政工人 - 大多来自菲律宾和印度尼西亚 - 签订了具有​​法律效力的合同，合同规定了强制休息日、透明的薪酬以及强有力的监管机构。家政工人留了下来；她们供养的家庭也留了下来；人口增长加速。"
 HKG_pension_scheme_idea: "改革后的养老金计划"
 HKG_pension_scheme_idea_desc: "强制性公积金确实能保障退休生活。老年贫困率大幅下降，社会稳定性提高，劳动年龄人口能够规划未来。但国库也因此承担了永久性的财政支出。"
 HKG_modernised_police_force: "现代化警队"
 HKG_modernised_police_force_desc: "香港警队采用最新的培训、装备和程序标准运作。日常警务工作更加高效，打击犯罪的成本降低，调查数据显示公众对警队的信任度也显著提高。"
 HKG_counter_terrorism_capability: "反恐能力"
 HKG_counter_terrorism_capability_desc: "反恐反应部队赋予了特别行政区应对有组织威胁的可靠专业能力。外国情报机构更难在不被发现的情况下开展行动，而搜救队也拥有一支规模较小的常驻特种作战队伍。"
 HKG_riot_control_capability: "防暴能力"
 HKG_riot_control_capability_desc: "警方配备了装甲车、盾牌、催泪瓦斯，并演练了人群控制方案。骚乱得到更有效的控制；这些防护装备也清晰地表明，特警队选择了特定的公共秩序维护方式。"
 HKG_clean_police_force: "廉洁警队"
 HKG_clean_police_force_desc: "内部调查、廉政公署的监督以及对廉政的公开承诺，已显著降低了警队内部的腐败现象。被抓获收受黑社会贿赂的警员将面临切实的惩罚。警队的声誉和效能均得到提升。"
 HKG_capital_flight: "资本外逃"
 HKG_capital_flight_desc: "银行、律师事务所和跨国公司悄然将区域总部迁往新加坡和东京。贸易往来减少，办公效率下降，金融业的辉煌不再。特区的“中立”政策已不足以扭转乾坤。"
 HKG_expanded_police_powers: "扩大警察权力"
 HKG_expanded_police_powers_desc: "根据《国家安全法》的规定，特警部队拥有广泛的搜查、监视和拘留权力。公共秩序得以维护，民主动员遭到镇压。特警部队的政治性质发生了决定性转变。"
 HKG_financial_autonomy: "财务自主权"
 HKG_financial_autonomy_desc: "特区独特的法律和监管框架被刻意保留了下来。贸易、金融和办公活动都受益于这种可预测性。北京方面在密切关注，但尚未采取行动。"
 HKG_model_sar: "特别行政区模式"
 HKG_model_sar_desc: "香港是北京的门面 - 顺从、繁荣，与粤港澳大湾区深度融合。它享有诸多特权：优惠的市场准入、内地劳动力、基础设施补贴、政治稳定。但这些特权只有在香港继续作为中华人民共和国的领土存在时才能持续。"
 hongkong_order.1.t: "市民过渡压力"
 hongkong_order.1.d: "特区总体范围内，日常公共秩序事件呈上升趋势。其原因多种多样，包括住房压力、跨境移民、语言和文化摩擦以及部分地区的经济不确定性。没有哪一项诉求占据主导地位。警方面临着如何应对这种社会因素远大于犯罪因素的局面的问题。"
 hongkong_order.1.a: "增加社区巡逻。"
 hongkong_order.1.b: "建立社区联络机制。"
 hongkong_order.1.c: "保持当前姿势。"
 hongkong_order.2.t: "跨境犯罪协调"
 hongkong_order.2.d: "反恐应对小组已查明在特区与内地边界活动的有组织犯罪网络。有效打击需要与内地公安部门协调，但两地法律框架不同，《基本法》对行动整合也设定了界限。特务专员请求指导。"
 hongkong_order.2.a: "深化与大陆当局的联合行动。"
 hongkong_order.2.b: "在管辖范围内保持独立运作。"
 hongkong_order.2.c: "合作仅限于正式渠道。"
 hongkong_order.3.t: "政府大楼外的示威活动"
 hongkong_order.3.d: "数千名抗议者聚集在政府大楼外。他们的不满情绪复杂多样，包括住房负担能力问题、就业问题以及一些难以言表的公民不满。一些标语提到了权力交接，但许多标语并未提及。人群喧闹，但并未发生暴力事件。警方必须决定如何应对。"
 hongkong_order.3.a: "与组织者进行公开对话。"
 hongkong_order.3.b: "保持警戒线清晰可见，并等待事态发展。"
 hongkong_order.3.c: "授权驱散人群。"
 hongkong_order.4.t: "警方与三合会合作的指控"
 hongkong_order.4.d: "一份举报人报告称，警队成员收受贿赂，对某些三合会行动视而不见。调查此事的政治压力巨大；警察工会警告称，在正当程序完成之前，不应将个别警员当作替罪羊。此事不容忽视。"
 hongkong_order.4.a: "通过廉政公署展开正式调查。"
 hongkong_order.4.b: "仅限内部纪律审查。"
 hongkong_order.4.c: "视作孤立事件处理。"
 HKG_curtailed_land_supply: "土地供应减少"
 HKG_curtailed_land_supply_desc: "政府通过限制土地上市来支撑房价。虽然房产价值居高不下，国库印花税收入增加，但社会成本 - 不平等、人口增长缓慢、笼养房危机 - 却逐年加剧。"
 HKG_locked_housing_market: "住房市场锁定"
 HKG_locked_housing_market_desc: "住宅价格受法律冻结，住房负担能力危机得到控制，但房地产市场失去活力，资金流向其他领域。"
 HKG_government_real_estate_holding: "政府房地产控股"
 HKG_government_real_estate_holding_desc: "国家拥有或部分拥有最大的房地产开发商。定价决策受政治因素影响；商业巨头受到制约；特区政府的税基从企业收入转向公共收入。"
 HKG_resolved_housing_crisis: "香港住房危机得以解决"
 HKG_resolved_housing_crisis_desc: "经过二十年的失败，香港通过建设、监管和改革，成功摆脱了住房危机。公共房屋轮候名单缩短，笼屋被清空，一代香港人终于能够买得起属于自己的房子。"
 HKG_new_development_idea_buff: "新发展计划"
 HKG_new_development_idea_buff_desc: "特区新发展规划的过渡阶段。科研和政治机构将率先获得推动，但经济将承担重组的成本 - 在新框架上线期间，办公和消费品行业将暂时受到影响。"
 HKG_new_development_idea_buff_complete: "新发展计划"
 HKG_new_development_idea_buff_complete_desc: "新发展计划已全面实施。科研速度、教育效率和办公效率均已永久提升。初期转型成本已收回，香港的知识经济如今已真正跻身一流水平。"
 hongkong_housing.1.t: "香港住房危机"
 hongkong_housing.1.d: "香港房价中位数已超过家庭收入中位数二十倍。数万香港居民居住在劏房和笼屋中。公屋轮候名单已超过六年，且仍在不断增长。政府已承认危机并承诺推行改革方案——但究竟进行哪些改革，以及由谁来承担成本，仍然是香港政治的核心问题。"
 hongkong_housing.1.a: "我们必须采取果断行动。"
 hongkong_housing.2.t: "为所有香港人提供住房"
 hongkong_housing.2.d: "经过多年的建设、改革和政治斗争，绿屋资助房屋计划标志着香港房屋改革的圆满结束。笼屋正在被清空，公屋租户正在升级为拥有房屋的住户。等候名单的等待时间近几十年来首次降至两年以下。这场定义回归后时代的危机，终于过去了。"
 hongkong_housing.2.a: "每个香港人的家。"