 indonesia.53.t: "Catastrophe à Kalimantan !"
 indonesia.53.d: "Notre incapacité à subvenir aux besoins de la population de Kalimantan a entraîné un accident d’aviation, causant des dommages importants à l’aéroport provincial !"
 indonesia.53.a: "C'était évitable !"
 indonesia.54.t: "Catastrophe dans le sud de Sumatra !"
