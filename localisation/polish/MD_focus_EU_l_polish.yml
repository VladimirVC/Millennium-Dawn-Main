 EU_council_determine_serious_breach_of_EU_values: "Stwierdzenie poważnego naruszenia wartości UE"
 EU_council_determine_serious_breach_of_EU_values_desc: "Zgodnie z art. 7 ust. 2 TUE Rada może stwierdzić istnienie poważnego i trwałego naruszenia przez państwo członkowskie wartości Unii Europejskiej. Jest to warunek wstępny zawieszenia praw głosu w UE."
 number_of_eu_breaches_greater_than_three: "[THIS.GetAdjective] §YPoziom naruszeń wartości UE§! jest §RWiększy niż§! 3 (Aktualny: [?THIS.breach_of_EU_value|0])"
 can_determine_a_breach_of_values_ROOT: "[ROOT.GetNameWithFlag] musi być jednym z 3 największych influencerów we wszystkich pozostałych (głosujących) stanach członkowskich."
 can_determine_a_breach_of_values_FROM: "[FROM.GetNameWithFlag] NIE może być jednym z 3 największych wpływowych osób we wszystkich pozostałych państwach członkowskich (głosujących)."
 EU_council_revoke_determination_of_serious_breach_of_EU_values: "Cofnij postanowienie"
 EU_council_revoke_determination_of_serious_breach_of_EU_values_desc: "Uchylenie postanowienia, o którym mowa w art. 7 ust. 2 TUE, ponieważ dane państwo członkowskie zakończyło poważne i uporczywe naruszanie wartości Unii Europejskiej."
 EU_council_suspend_voting_rights: "Zawiesić prawa głosu w UE"
 EU_council_suspend_voting_rights_desc: "Zgodnie z art. 7 ust. 3 TUE Rada może podjąć decyzję o zawieszeniu niektórych praw wynikających ze stosowania Traktatów do danego państwa członkowskiego, w tym prawa głosu przedstawiciela rządu tego państwa członkowskiego w Radzie."
 EU_council_revoke_voting_rights_suspension: "Cofnij zawieszenie praw głosu w UE"
 EU_council_revoke_voting_rights_suspension_desc: "Zgodnie z art. 7 ust. 4 TUE Rada może następnie podjąć decyzję o uchyleniu środków podjętych na podstawie ust. 3 w odpowiedzi na zmianę sytuacji, która doprowadziła do ich wprowadzenia."
 EU_council_suspend_subsidies: "Zawieszenie dotacji unijnych"
 EU_council_suspend_subsidies_desc: "Zgodnie z art. 7 ust. 3 TUE Rada może podjąć decyzję o zawieszeniu niektórych praw wynikających ze stosowania Traktatów wobec danego państwa członkowskiego."
 EU_council_revoke_subsidies_suspension: "Cofnij zawieszenie dotacji UE"
 EU_council_revoke_subsidies_suspension_desc: "Zgodnie z art. 7 ust. 4 TUE Rada może następnie podjąć decyzję o uchyleniu środków podjętych na podstawie ust. 3 w odpowiedzi na zmianę sytuacji, która doprowadziła do ich wprowadzenia."
