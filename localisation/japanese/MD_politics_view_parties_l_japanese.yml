 TUR.conservatism: "£TUR_conservatism (CHP) 共和人民党"
 TUR.conservatism_icon: "£TUR_conservatism"
 TUR.conservatism_desc: "ケマル主義 - 共和人民党（トルコ語：Cumhuriyet Halk Partisi）\n\n共和人民党は、アタテュルク自身が創設した社会民主主義的ケマル主義政党である。同党は親EUであり、多くの党員がLGBTや女性の権利を支持している。一般的に、国内でより西欧的で進歩的な政党の一つと見なされている。\n\nこの党に対する軍の§Y評価§!：§G+100§!"
 TUR.liberalism: "£TUR_liberalism (LDP) 自由民主党"
 TUR.liberalism_icon: "£TUR_liberalism"
 TUR.liberalism_desc: "自由主義 - 自由民主党（トルコ語：Liberal Demokrat Parti）\n\n自由民主党は、トルコの実業家ベシム・ティブクによって設立された古典的自由主義政党である。\n\nこの党に対する軍の§Y評価§!：§G+50§!"
 TUR.socialism: "£TUR_socialism (DSP) 民主左派党"
 TUR.socialism_icon: "£TUR_socialism"
 TUR.socialism_desc: "社会民主主義 - 民主左派党 (トルコ語：Demokratik Sol Parti)\n\n民主左派党は、トルコの経済改革を目指すケマル主義的社会主義政党である。同党は欧州統合を強く支持し、トルコのEUへのより深い統合を望んでいる。\n\nこの党に対する軍の§Y評価§!：§G+100§!"
 TUR.Western_Autocracy: "£TUR_Western_Autocracy (HM) ギュレン運動"
 TUR.Western_Autocracy_icon: "£TUR_Western_Autocracy"
 TUR.Western_Autocracy_desc: "イスラム民主主義 - ギュレン運動（トルコ語：Gülen Hareketi）\n\nヒズメット、またはギュレン運動は、フェトフッラー・ギュレンが率いる越境的なイスラム社会団体である。同団体の目的は、宗教間対話の促進と世界中のムスリムの地位向上にあり、世界を代表するムスリムネットワークとなることを目指している。一部では、その目的がムスリム同胞団と大きく変わらず、イスラム支配の確立が真の主目的であるとの懸念も存在する。\n\nこの党に対する軍の§Y評価§!：§R-50§!"
 TUR.Communist-State: "£TUR_Communist_State (IP) 労働者党"
 TUR.Communist-State_icon: "£TUR_Communist_State"
 TUR.Communist-State_desc: "毛沢東ケマル主義 - 労働者党（トルコ語：İşçi Partisi）\n\n労働者党は毛沢東主義かつケマル主義の政党であり、アタテュルクをブルジョアジーの左翼的英雄として称賛する。同党はキューバやベネズエラなどの社会主義諸国との連携を支持し、アメリカの拡張主義に反対する。クルド人に対する見解は、クルド人農民を封建的枷から解放し、トルコ人と共に反帝国主義的民主革命に参加させるべきだというものである。\n\nこの党に対する軍の§Y評価§!：§R-25§!"
 TUR.Conservative: "£TUR_Conservative (FP) 美徳党"
 TUR.Conservative_icon: "£TUR_Conservative"
 TUR.Conservative_desc: "イスラム主義 - 美徳党（トルコ語：Fazilet Partisi）\n\n美徳党はイスラム主義政党である。現在の党員の多くは他のイスラム主義政党にも所属していたが、これらは全てトルコ共和国の世俗主義を名目とした禁止措置の対象となっている。\n\nこの党に対する軍の§Y評価§!：§R-100§!"
 TUR.anarchist_communism: "£TUR_anarchist_communism (ODP) 自由連帯党"
 TUR.anarchist_communism_icon: "£TUR_anarchist_communism"
 TUR.anarchist_communism_desc: "左派ポピュリズム - 自由連帯党（トルコ語：Özgürlük ve Dayanışma Partisi）\n\n自由連帯党は左派ポピュリズム社会主義政党である。党の主な中核は、1970年代のDEV-YOLの労働組合運動をモデルにしたリバタリアン社会主義である。\n\nこの党に対する軍の§Y評価§!：§R-50§!"
 TUR.Caliphate: "£TUR_Caliphate (İBDA-C) 大東方イスラム突撃戦線"
 TUR.Caliphate_icon: "£TUR_Caliphate"
 TUR.Caliphate_desc: "イスラム軍国主義 - 大東方イスラム突撃戦線（トルコ語：İslami Büyükdoğu Akıncılar Cephesi）\n\n大東方イスラム突撃戦線は、ネジプ・ファズル・クサキュレクの教えに従うイスラム過激派組織である。この組織は中東にスンナ派イスラム連邦国家を樹立し、カリフ制を再建することを目的としている。\n\nこの党に対する軍の§Y評価§!: §R-250§!"
 TUR.Neutral_conservatism: "£generic_Neutral_conservatism_small (MP) 国家党"
 TUR.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 TUR.Neutral_conservatism_desc: "保守主義 - 国家党（トルコ語：Millet Partisi）\n\n国家党は保守的な民族主義政党である。\n\nこの党に対する軍の§Y評価§!: §R-50§!"
 TUR.Neutral_Communism: "£TUR_Neutral_Communism (PKK) クルディスタン労働者党"
 TUR.Neutral_Communism_icon: "£TUR_Neutral_Communism"
 TUR.Neutral_Communism_desc: "リバタリアン社会主義 - クルディスタン労働者党（クルド語: Partîya Karkerên Kurdistanê）\n\nクルディスタン労働者党は、トルコにおけるクルド人の政治的・文化的権利を求めるクルド系武装政治組織である。PKKの政治思想は、マルクス・レーニン主義、クルド民族主義、リバタリアン社会主義、民主的連邦主義が混在している。\n\nこの党に対する軍の§Y評価§!: §R-250§!"
 TUR.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 TUR.Nat_Autocracy: "£TUR_Nat_Autocracy (TSK) トルコ軍"
 TUR.Nat_Autocracy_icon: "£TUR_Nat_Autocracy"
 TUR.Nat_Autocracy_desc: "民族主義軍事政権 - トルコ軍（トルコ語: Türk Silahlı Kuvvetleri）\n\nトルコ軍は、トルコ共和国の主要な軍事組織である。軍部は、共和国のケマル主義的理念がイスラム主義者から攻撃を受けていると感じるたびに、政治に介入しクーデターを起こしてきた。\n\nこの党に対する軍の§Y評価§!: §G+200§!"
 TUR.Nat_Fascism: "£TUR_Nat_Fascism (BK) 灰色の狼"
 TUR.Nat_Fascism_icon: "£TUR_Nat_Fascism"
 TUR.Nat_Fascism_desc: "汎テュルク主義 - 灰色の狼（トルコ語：Bozkurtlar）\n\n灰色の狼は民族主義者行動党と提携する極右組織である。しばしばネオ・ファシストと評され、MHPの準軍事組織と分類されることもある。また同組織は汎トルコ主義を支持する。数多くの暗殺やその他の暴力犯罪に関与しており、戦闘員はしばしば外国の紛争に参加する。\n\nこの党に対する軍の§Y評価§!: §R-100§!"
 TUR.Monarchist: "£TUR_Monarchist (HoS) オスマン家"
 TUR.Monarchist_icon: "£TUR_Monarchist"
 TUR.Monarchist_desc: "絶対君主制 - オスマン家（トルコ語: Osmanlı Hanedanı）\n\nオスマン家は600年にわたりオスマン帝国の統治者であった。1922年のトルコ独立戦争後、王族は廃位され亡命を余儀なくされた。（後に亡命は解除された）トルコでは王室への支持は依然として低く、トルコ人は自国がオスマン帝国の継続ではなく、オスマン帝国からの独立を達成したと見なしている。\n\nこの党に対する軍の§Y評価§!: §R-100§!"
 UKR.conservatism: "£ukr_fatherland (VOB) 全ウクライナ連合「祖国」"
 UKR.conservatism_icon: "£ukr_fatherland"
 UKR.conservatism_desc: "£ukr_fatherland 全ウクライナ連合「祖国」は、1999年7月9日に創立大会において、議会グループと小規模政党を基盤として設立された。同党はウクライナの欧州連合加盟を戦略的目標と位置付けている。ウクライナ人のEU域内ビザ免除を支持し、「屈辱的なビザ制度」の撤廃を求めている。"
 UKR.liberalism: "£ukr_solidarity ペトロ・ポロシェンコ・ブロック「連帯」"
 UKR.liberalism_desc: "£ukr_solidarity ペトロ・ポロシェンコ・ブロック「連帯」は、2000年に設立された院内会派「連帯」にルーツを持つウクライナの政党で、ペトロ・ポロシェンコの政治的窓口として様々な形態で存続してきた。同党は公式にはポピュリズムを非難し、実用主義と現実主義を提唱し、ウクライナの欧州連合加盟、貧困層への福祉・社会保障を掲げる。しかし実際にはポピュリスト的なポロシェンコ氏の私物政党のままである。"
 UKR.socialism: "£ukr_sdpu (SDPU(o)) ウクライナ社会民主党（統一）"
 UKR.socialism_desc: "£ukr_sdpu ウクライナ社会民主党（統一）は、ウクライナの政党である。SDPU(o)自体は中道左派政党と位置付けているが、指導部に大物オリガルヒが存在することから激しい不協和音を引き起こした。西側志向であるにもかかわらず、共通の目標から中立的・親西欧的な左派政党との協力に傾いている。"
 UKR.socialism_2017: "£ukr_groysman (USH) グロイスマンのウクライナ戦略"
 UKR.socialism_2017_icon: "£ukr_groysman"
 UKR.socialism_2017_desc: "£ukr_groysman グロイスマンのウクライナ戦略は、ウクライナの政党であり、ウクライナ元首相かつヴィーンヌィツャ市長を務めたヴォロディミル・グロイスマンによって設立された。彼の成功した改革により、同地域で一定の人気を獲得している。党の基本方針は親欧州であり、社会民主主義の構築を目指す。"
 UKR.Western_Autocracy: "£UKR_western_autocracy 祖国防衛党"
 UKR.Western_Autocracy_desc: "£UKR_western_autocracy 祖国防衛党は、親西欧的な外交政策路線を掲げ、独裁的・軍国主義的な思想を持つ政党である。正教徒でありウクライナの栄誉ある弁護士であるユーリー・カラムジンによって創設された。"
 UKR.Communist-State: "£ukr_cpu (KPU) ウクライナ共産党"
 UKR.Communist-State_icon: "£ukr_cpu"
 UKR.Communist-State_desc: "£ukr_cpu ウクライナ共産党はソ連崩壊に伴い、同党の前身であるソ連時代のウクライナ共産党は1991年に禁止され、ウクライナ社会党へと改組された。その後、1991年から1993年にかけて、ウクライナ全土で複数の小規模な共産主義組織が結成された。1993年3月6日、「明確な法的根拠なしに」ウクライナ各地の共産主義者たちは、全ウクライナ共産主義者会議を開催し、ウクライナ共産党の再建を試みた。これに対し最高議会は、その2か月後に共産党の設立を合法化した。"
 UKR.Conservative: "£UKR_emerging_kuchma (Zayedu) 統一ウクライナのために！"
 UKR.Conservative_icon: "£UKR_emerging_kuchma"
 UKR.Conservative_desc: "£UKR_emerging_kuchma 統一ウクライナのために！は、ウクライナの5つの政党による選挙連合で、2002年の最高会議選挙参加のために結成された。この連合はレオニード・クチマ大統領を支持し、実質的に彼を中心に据えていた。"
 UKR.Conservative_2001: "£ukr_regions (PR) 地域党"
 UKR.Conservative_2001_icon: "£ukr_regions"
 UKR.Conservative_2001_desc: "£ukr_regions 地域党は1997年末に創設された親ロシア政党である。同党はウクライナの対外経済的利益を考慮したEU加盟への現実的なアプローチを主張し、「欧州統合の道を歩み、社会・経済分野における関連基準の実施」を支持している。しかしながら、欧州の金融危機を踏まえ、同党はウクライナのEU加盟問題を「純粋に理論上の問題」と見なしている。"
 UKR.Conservative_2017: "£ukr_opposition (OPZZh) 野党プラットフォーム - 生活党"
 UKR.Conservative_2017_icon: "£ukr_opposition"
 UKR.Conservative_2017_desc: "£ukr_opposition 野党プラットフォーム - 生活党は、ウクライナの親ロシア政党である。地域党のリブランディングとして、OPZZhは非左派の親ロシア派ウクライナ政治家およびオリガルヒを全てその陣営に集結させた。名目上、同党は社会民主主義的・地域主義的見解を政策のイデオロギー的基盤として掲げている。"
 UKR.Autocracy: "£UKR_feminism 人民野党ブロック"
 UKR.Autocracy_desc: "£UKR_feminism 人民野党ブロックは、経済学者でありユーラシア青年連合のメンバーであるナタリア・ヴィトレンコが率いる、複数の右派・左派政党の連合体である。本質的に彼女は結束の象徴的存在であり、親西側汎スラヴ主義政党「ルーシ」、国家ボルシェビキ、キリスト教正教共産主義者を自らの政党の下に結集させている。"
 UKR.anarchist_communism: "£UKR_anarchism_communism (SLS) 左翼勢力連合"
 UKR.anarchist_communism_desc: "£UKR_anarchism_communism 左翼勢力連合は、元潜水艦乗組員ヴァシリー・ヴォルガによって設立されたウクライナの社会主義政党である。当初はウクライナ社会党と共同ブロックを形成していたが、後に分裂した。同党は搾取階級としての寡頭政治を打倒し、福祉国家の構築を目指す。"
 UKR.Neutral_conservatism: "£ukr_pmu (Rukh) 人民運動"
 UKR.Neutral_conservatism_icon: "£ukr_pmu"
 UKR.Neutral_conservatism_desc: "£ukr_pmu ウクライナ人民運動は、中道右派の政党である。当初は「ペレストロイカのためのウクライナ人民運動」として組織され、1989年に市民政治運動として設立された。当時ソビエト連邦では共産党以外の政党は認められていなかったためである。この組織のルーツはウクライナの反体制派にあり、最も著名な人物はヴィアチェスラフ・チョルノヴィルである。"
 UKR.oligarchism: "£ukr_udar (UDAR) ビタリ・クリチコのウクライナ民主改革連合"
 UKR.oligarchism_desc: "£ukr_udar ビタリ・クリチコのウクライナ民主改革連合は、プロボクサーのビタリ・クリチコが設立した政党である。スポーツ選手としての高い人気と慈善活動により、彼は興味深い評判を築いてきた。同党はウクライナの保守的な秩序と伝統を守り、党首の強力な打撃で国内の汚職を一掃することを目指している。"
 UKR.neutral_Social: "£ukr_spu (SPU) ウクライナ社会党"
 UKR.neutral_Social_icon: "£ukr_spu"
 UKR.neutral_Social_desc: "社会民主主義 ｰ £ukr_spu ウクライナ社会党は、最も古い政党の一つであり、1991年末に共産党が禁止された際に、旧ソ連時代のウクライナ共産党の元党員たちによって創設された。1994年から議会に議席を持ち、長らくウクライナで第4の政党であった。"
 UKR.Neutral_Libertarian: "£UKR_our_ukraine  (BNU) 我らのウクライナ・ブロック"
 UKR.Neutral_Libertarian_desc: "£UKR_our_ukraine 我らのウクライナは、ウクライナの中道右派政党であり、同党の選出された指導者であるヴィクトル・ユシチェンコを支援するために創設された。穏健民族主義者、自由主義者、保守派、そして穏健親ロシア活動家を結集したこの政党は、本質的にユシチェンコ自身を中心とする、穏健親欧米・反汚職政党である。"
 UKR.Neutral_Libertarian_2017: "£ukr_servant_of_the_people (SN) 国民の僕"
 UKR.Neutral_Libertarian_2017_icon: "£ukr_servant_of_the_people"
 UKR.Neutral_Libertarian_2017_desc: "£ukr_servant_of_the_people 国民の僕は、2017年末に結成された政党で、同名の人気テレビ番組にちなんで名付けられた。同党は主に幅広い大衆迎合政策に焦点を当てており、親欧州的な外交政策と並行して、ウクライナ国内の汚職撲滅と直接民主主義の拡大に特に力を入れている。"
 UKR.Neutral_Autocracy: "£UKR_neutral_internet (IP) ウクライナ・インターネット党"
 UKR.Neutral_Autocracy_desc: "£UKR_neutral_internet ウクライナ・インターネット党は、ダース・ベイダーが設立し、率いている、自称世界初のインターネット政党である。そのスローガンは「官僚主義に対する電子政府」であり、ウクライナに電子政府を創設したいと考えている。実際には、この党はジョークであるが、多くの人気を集め、しばしば反共産主義的な行動をとる。しかし、シスの暗黒卿の背後に何が潜んでいるのかは誰にもわからない..."
 UKR.Neutral_Communism: "£UKR_neutral_communism (SKU) ウクライナ共産主義者連合"
 UKR.Neutral_Communism_desc: "£UKR_neutral_communism ウクライナ共産主義者連合は、ウクライナの反修正マルクス・レーニン主義共産党である。親ロシア左派政党の大多数から疎外されているSKUは、現代のあらゆる紛争をブルジョア的と見なし、それらがプロレタリアートの利益に合致しないため、介入する必要はないと考えている。"
 UKR.Neutral_green: "£UKR_greenone オレクサンドル・オメルチェンコ・統一党"
 UKR.Neutral_green_icon: "£UKR_greenone"
 UKR.Neutral_green_desc: "£UKR_greenone オレクサンドル・オメルチェンコ・統一党は、1999年に既成勢力への抗議政党としてウクライナで結成された。同党はキエフ元市長オレクサンドル・オメルチェンコが率い、穏健な環境保護主義と農業重視の立場を掲げていた。"
 UKR.Neutral_Muslim_Brotherhood: "£UKR_neutral_muslim (MF) ミリー・フィルカ"
 UKR.Neutral_Muslim_Brotherhood_desc: "£UKR_neutral_muslim ミリー・フィルカは、穏健親ロシア派クリミア・タタール系非政府組織であり、事実上、同名の旧政党を起源としている。彼らはクリミア・タタール人の権利を擁護し、時にトルコ政府への支援を訴える。"
 UKR.Nat_Autocracy: "£urk_armed_forces ウクライナ軍"
 UKR.Nat_Autocracy_desc: "£urk_armed_forces ウクライナ軍は、ウクライナの軍事組織である。ウクライナ軍を含む全ての軍事・治安部隊は、ウクライナ大統領の指揮下に置かれ、最高議会の常設委員会による監督を受ける。"
 UKR.Nat_Fascism: "£ukr_kongress (KUN) ウクライナ民族主義者会議"
 UKR.Nat_Fascism_desc: "£ukr_kongress ウクライナ民族主義者会議は、ウクライナの極右政党である。ウクライナ国民会議 ― ウクライナ人民自衛隊やトルィーズブといった準軍事組織を傘下に統合することで、同党は偉大なるウクライナの建設を目指し、ロシアの影響力に対抗するためポストソビエト空間におけるあらゆる紛争に介入している。"
 UKR.Nat_Populism: "£ukr_freedom (Svoboda) 全ウクライナ連合「自由」"
 UKR.Nat_Populism_icon: "£ukr_freedom"
 UKR.Nat_Populism_desc: "£ukr_freedom 全ウクライナ連合「自由」は、1991年にウクライナ社会国民党として設立されたウクライナ民族主義政党であり、極端な民族主義を主張するポピュリスト政党として活動している。その政治的立場は右翼と極右の中間に位置付けられる。"
 UKR.Monarchist: "£UKR_monarchism スコロパツキー家"
 UKR.Monarchist_desc: "£UKR_monarchism スコロパツキー家は、コサック起源のウクライナ貴族であり、17世紀にザポロージャのシーチを率いて近代ウクライナの基礎を築いた。その後、彼らの家系は1918年にウクライナ国を率いた。"
 RAJ.conservatism: "£RAJ_Neutral_conservatism (TRS) テランガナ民族会議"
