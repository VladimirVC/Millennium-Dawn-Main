 TREASURY_TOOLTIP_DELAYED: "Наша казна отражает количество денег, доступных для расходов, и может использоваться для покупок и инвестиций. Если казна уйдёт в минус, будет автоматически выпускаться долг каждую неделю, чтобы поддерживать положительный баланс.\n\n§tЭкран экономики перенесён во вкладку торговли.§!"
