 CPD_demanding_annexation_of_state_TT: "Аннексия этого государства является §Gтребованием§! [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, это государство будет аннексировано в нашу нацию, и мы станем новым владельцем."
 CPD_demanding_puppeting_in_state_TT: "Создание марионетки в этом государстве является §Gтребованием§! [ROOT.GetNameWithFlag]. Если мирное соглашение будет принято, это государство окажется под контролем нового марионеточного правительства."
 CPD_demanding_demilitarisation_of_state_TT: "Demilitarisation of this state is a §Gdemand§! of [ROOT.GetNameWithFlag]. If the peace is accepted, this state will no longer be able to operate any military forces."
 CPD_demanding_liberation_of_state_TT: "Liberation of this state is a §Gdemand§! of [ROOT.GetNameWithFlag]. If the peace is accepted, this state will be returned to the country with rightful ownership over it as an independent nation."
 CPD_conceding_annexation_of_state_TT: "Annexation of this state is a §Rconcession§! from [ROOT.GetNameWithFlag]. If the peace is accepted, this state will be annexed into the enemy's nation."
 CPD_conceding_puppeting_in_state_TT: "Forming a puppet within this state is a §Rconcession§! from [ROOT.GetNameWithFlag]. If the peace is accepted, this state will be put under a puppet government answering to the enemy."
 CPD_conceding_demilitarisation_of_state_TT: "Demilitarisation of this state is a §Rconcession§! from [ROOT.GetNameWithFlag]. If the peace is accepted, this state will no longer be able to operate any military forces."
 CPD_conceding_liberation_of_state_TT: "Liberation of this state is a §Rconcession§! from [ROOT.GetNameWithFlag]. If the peace is accepted, this state will be returned to the country with rightful ownership over it as an independent nation."
