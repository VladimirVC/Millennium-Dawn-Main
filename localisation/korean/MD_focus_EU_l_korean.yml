 EU_budget_draft_desc: "유럽 연합의 다음 회계 연도에 대한 예산안을 제출한 국가는 협상의 마지막에 예산 계획안을 유럽 의회 안건으로 제출해야 합니다. 만약 이 예산 계획안이 통과가 되고 실제로 적용이 되면, 그 예산 계획안을 제안한 회원국은 보상으로 그들이 투자한 모든 정치력을 돌려받게 될 것입니다."
