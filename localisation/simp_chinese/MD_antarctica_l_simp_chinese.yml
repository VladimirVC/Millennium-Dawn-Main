 MD_antarctica_news.1.t: "[FROM.GetName]申请加入南极条约"
 MD_antarctica_news.1.d: "[FROM.GetName]已申请加入南极条约，这标志着其外交政策和环境保护承诺可能发生转变。南极条约是一项国际协议，旨在规范南极洲的和平利用和科学研究，同时保护南极洲独特的生态系统。[FROM.GetName]的加入申请得到了国际社会的积极反响，一些人称赞此举是迈向全球合作的积极一步，而另一些人则对[FROM.GetName]的意图及其对条约原则的承诺表示怀疑。申请流程预计需要一个月才能完成。"
 MD_antarctica_news.1.a: "时间会告诉我们的"
 MD_antarctica_news.1.b: "是時候了"
 MD_antarctica_news.2.t: "[FROM.GetName]加入南极条约"
 MD_antarctica_news.2.d: "今天，[GetDateText]，[FROM.GetName]正式加入南极条约，成为该国际协议的成员。该协议旨在规范南极洲的和平利用和科学研究。通过加入该条约，[FROM.GetName]承诺维护南极洲环境保护和国际合作的原则。此举获得了国际社会的积极响应，许多人赞扬[FROM.GetName]致力于保护南极洲独特的生态系统，并促进各国之间的和平合作。"
 MD_antarctica_news.2.a: "又一个成员"
 MD_antarctica_news.2.b: "让我们开工吧！"
 MD_antarctica_news.3.t: "[FROM.GetName]矢志退出南极条约"
 MD_antarctica_news.3.d: "[FROM.GetName]今日决定退出南极条约。南极海洋生物资源养护委员会要求其在两年内拆除在南极的所有研究站，并避免任何被禁止的活动，例如资源开采或军事存在。退出该条约的决定在国际社会引发了不同的反应，一些人对此表示失望和担忧，认为这可能对环境和全球合作造成影响；而另一些人则支持[FROM.GetName]有权自行决定是否参与国际协议。退出条约的程序预计需要两年时间才能完成。"
 MD_antarctica_news.3.a: "真是耻辱"
 MD_antarctica_news.3.b: "我们还有更重要的事要做。"
 MD_antarctica_news.4.t: "[FROM.GetName]离开南极条约"
 MD_antarctica_news.4.d: "[MD_antarctica_news_4_desc]"
 MD_antarctica_news.4.a: "条约效力减弱"
 MD_antarctica_news.4.b: "管他呢"
 MD_antarctica_news_4_desc_1: "在退出南极条约两年后，[FROM.GetName]正式退出了这项规范南极和平利用和科学研究的国际协议。尽管此前已有警告，[FROM.GetName]在南极仍设有研究站的情况下退出了该条约，此举引发了条约成员国的全球反应，包括潜在的制裁和外交反弹。"
 MD_antarctica_news_4_desc_2: "在退出南极条约两年后，[FROM.GetName]已正式退出这项规范南极和平利用和科学研究的国际协议。[FROM.GetName]已成功拆除在南极的所有研究站，并避免了任何被禁止的活动，例如资源开采或军事存在，这有助于减轻对环境和全球合作的潜在影响。"
 MD_antarctica_news.5.t: "在[FROM.GetAdjective]南极站点发现开环公用设施"
 MD_antarctica_news.5.d: "在最近的观察团任务中，条约观察员在[FROM.GetAdjective]南极科考站发现了使用开环式公用设施的情况。这违反了南极条约，该条约禁止任何可能对环境造成损害或破坏南极生态系统的活动。开环式公用设施的发现引起了条约成员国的关注，并可能导致外交后果。"
 MD_antarctica_news.5.a: "有些人不得不走低价路线。"
 MD_antarctica_news.5.b: "好吧"
 MD_antarctica_news.6.t: "[FROM.GetAdjective]南极站点发现非法实验室活动"
 MD_antarctica_news.6.d: "在最近的观察团访问中，条约观察员在[FROM.GetAdjective]南极科考站发现了非法实验室活动。这种行为是不可接受的，明显违反了南极条约。条约协商缔约方将处理此事，并采取适当行动，以确保南极独特生态系统的保护和条约的完整性。"
 MD_antarctica_news.6.a: "这不可接受"
 MD_antarctica_news.6.b: "我们必须为此做些什么。"
 MD_antarctica_news.7.t: "在[FROM.GetAdjective]南极站点发现核武器研究"
 MD_antarctica_news.7.d: "在最近的观察团访问中，条约观察员在[FROM.GetAdjective]南极科考站发现了核武器研究活动。这严重违反了南极条约，该条约禁止任何军事活动或任何可能对南极环境造成损害或破坏南极生态系统的活动。利用和平科考站建造和试验核武器是令人发指的行为，威胁着全世界的安全。条约协商缔约方将立即采取果断行动解决这一问题，并追究相关责任人的责任。国际社会必须团结起来，谴责这种行为，并确保南极仍然是一个和平、受保护的科学研究与合作环境。"
 MD_antarctica_news.7.a: "这是不能容忍的！"
 MD_antarctica_news.7.b: "更重要的是"
 MD_antarctica_news.8.t: "[FROM.GetName]已多次违反南极条约"
 MD_antarctica_news.8.d: "在多次违反南极条约后，[FROM.GetName]的行为已达到临界点，条约协商缔约方已决定将其除名，并对其施加严厉的外交制裁。屡次违反条约原则和规定的行为损害了条约的完整性，并威胁到南极独特生态系统的保护。条约协商缔约方将采取果断行动，确保追究[FROM.GetName]的责任，并确保南极条约继续作为国际合作和环境保护的强有力有效框架。"
 MD_antarctica_news.8.a: "这是他们咎由自取。"
 MD_antarctica_news.8.b: "这太过分了"
 MD_antarctica_news.9.t: "南极洲刮起强风"
 MD_antarctica_news.9.d: "据报道，南极洲多处出现强风，对科考站造成影响。南极条约协商缔约方正在密切关注局势，并提供支持，以确保人员安全和正在进行的研究工作的顺利开展。观察员任务暂时中止，直至天气状况好转。"
 MD_antarctica_news.9.a: "不妙"
 MD_antarctica_news.10.t: "[FROM.GetName]开始建造南极研究站"
 MD_antarctica_news.10.d: "[FROM.GetName]已开始建造一座新的南极科考站，这标志着其致力于该地区的科学研究和环境保护。科考站的建设预计需要数月时间，条约协商缔约方将密切监督其进展，以确保其符合南极条约的原则和规定。"
 MD_antarctica_news.10.a: "棒极了！"
 MD_antarctica.1.t: "观察员任务即将到来"
 MD_antarctica.1.d: "[FROM.GetName]已派遣条约观察员检查我们的一处南极研究站。该任务将在§Y7天§!内开始。"
 MD_antarctica.1.a: "我们将等待他们的到来"
 MD_antarctica.3.t: "观察员任务报告：检测到开环公用设施"
 MD_antarctica.3.d: "南极条约观察员已完成对我们南极科考站的检查，并报告发现存在开环式公用设施的使用情况。这违反了南极条约，可能导致外交后果。条约协商缔约方要求采取行动，用更环保的方案替换这些公用设施。"
 MD_antarctica.3.a: "我们需要解决此问题。"
 MD_antarctica.4.t: "观察员任务报告：发现非法实验室活动"
 MD_antarctica.4.d: "条约观察员已完成对我们南极科考站的检查，并报告称发现了非法实验室活动。如果我们停止科考站内的所有非法活动，协商缔约方将不会采取进一步行动。"
 MD_antarctica.4.a: "我们必须为此做些什么。"
 MD_antarctica.5.t: "观察员任务报告：发现核武器研究"
 MD_antarctica.5.d: "南极条约观察员已完成对我们南极科考站的检查，并报告发现核武器研究活动。这严重违反了南极条约，并将立即引发外交后果。南极条约协商缔约方将采取果断行动解决这一问题，追究相关责任人的责任，并要求立即停止在我们科考站的一切核研究活动。"
 MD_antarctica.5.a: "我们必须立即清除它！"
 MD_antarctica.6.t: "南极条约违约：违规行为太多"
 MD_antarctica.6.d: "亲爱的[ROOT.GetLeader]，\n\n我们遗憾地通知您，贵国[ROOT.GetName]多次违反南极条约，累计违规次数达[?antarctica_station_reports]次。因此，南极条约协商缔约方决定在两年内将[ROOT.GetName]从条约中除名，并处以严厉的外交制裁。贵国屡次违反条约原则和规定，损害了条约的完整性，并威胁到南极独特生态系统的保护。我们敦促贵国认真对待此事，并在条约成员资格被撤销之前撤回研究站。\n\n真挚地，\n南极条约协商缔约方"
 MD_antarctica.6.a: "这是我们自作自受。"
 MD_antarctica.7.t: "对[FROM.GetName]实施禁运？"
 MD_antarctica.7.d: "由于近期在[FROM.GetAdjective]南极科考站内发现核武器研究活动，南极条约协商缔约方正在考虑对[FROM.GetName]实施禁运。这将包括限制与[FROM.GetName]的贸易和外交关系，以回应其违反条约原则和规定的行为。"
 MD_antarctica.7.a: "他们必须为自己的行为付出代价。"
 MD_antarctica.7.b: "这不值得"
 MD_antarctica.9.t: "南极站模块损坏"
 MD_antarctica.9.d: "我们南极科考站的一个模块被暴风雪损坏。工程师们正在准备维修工作，一旦天气好转，就会立即开始。"
 MD_antarctica.9.a: "什么鬼天气！"
 MD_antarctica.10.t: "拆除被吞并国家的南极研究站"
 MD_antarctica.10.d: "由于该国被吞并，其下设的研究站已被拆除。"
 MD_antarctica.10.a: "好的"
 ANT_nukes_research_discovered_idea: "南极科考站核武器研究被发现"
 ANT_nukes_research_discovered_idea_desc: "该国违反了全面禁止在南极进行军事研究的原则，进行了与核武器相关的研究。"
 antarctica_small_treaty_admin_cost_1: "南极小条约管理局"
 antarctica_small_treaty_admin_cost_1_desc: "该国签署了一项南极小型条约（保护南极海豹公约或南极海洋生物资源养护委员会），增加了政治行动的行政负担。"
 antarctica_small_treaty_admin_cost_2: "扩大南极条约管理"
 antarctica_small_treaty_admin_cost_2_desc: "该国签署了两项南极小型条约（保护南极海豹公约和南极海洋生物资源养护委员会），因此需要更广泛的条约管理和合规资源。"
 ANT_kicked_from_treaty_idea: "被踢出南极条约"
 ANT_kicked_from_treaty_idea_desc: "由于该国屡次违反南极条约，已被排除在该条约之外，并且在未来两年内不得重新加入。"
 ANT_illegal_extraction_idea: "南极非法资源开采"
 ANT_illegal_extraction_idea_desc: "我们与其他国家的关系恶化，是因为我们是少数几个不愿为了保护冰原美景而牺牲宝贵资源的国家之一。他们太在意那块冰封的土地了。"
