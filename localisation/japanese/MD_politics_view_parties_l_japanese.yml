 HAI.Neutral_green: "£HAI_neutral_green (RP) 農民の反応"
 HAI.Neutral_green_desc: "農本主義 - 農民の反応（ハイチ・クレオール語：Repons Peyizan）は、2010年に国を壊滅させた地震への対応として同年7月に設立された政党である。その創設は、コンパ音楽家であり、ステージネーム「スウィート・ミッキー」で知られるミシェル・マルテリによるもので、災害後の困難な状況が国の状態を悪化させたことを受け、彼が正式に政界に参入したことが契機となった。"
 HAI.Nat_Populism: "£HAI_nationalist_populism (AAA) 行動するハイチ"
 HAI.Nat_Populism_desc: "連邦主義的民族主義 - 行動するハイチ（ハイチ・クレオール語：Ayiti an Aksyon）は、民族主義政党であると同時に連邦主義政党でもある。2005年に設立され、ラティボニ地区の地域主義的統制と自治権獲得を目指した同党は、間もなく全体としての地方分権化と連邦制の推進に乗り出した。"
 HAI.Nat_Fascism: "£HAI_nationalist_fascism (PUN) 国民統一党"
 HAI.Nat_Fascism_desc: "全体主義的黒人ナショナリズム - 国民統一党（フランス語：Parti de l'Unité Nationale）は、フランソワ・デュヴァリエ（通称パパ・ドク）のもと、反米・ハイチ民族主義政党として1957年に創設された。\n\nパパ・ドクの支配が続くにつれ、同党はますます権威主義的となり、恐るべきトントン・マクーテを利用してあらゆる反対勢力を弾圧した。パパ・ドク・デュヴァリエはかつて、トントン・マクトゥの元指導者クレマン・バルボが黒犬に変身したと信じ、トントン・マクトゥを動員して全ての黒犬を探し出して殺害させた。"
 HKG.Communist-State_icon: "£HK_PLA"
 MAC.Communist-State: "£MAC_PLA 人民解放軍駐マカオ部隊"
 MAC.Communist-State_icon: "£MAC_PLA"
 MAC.Communist-State_desc: "共産主義 - 人民解放軍駐マカオ部隊は、特別行政区の防衛を維持するために存在している。基本法では駐屯軍が地方の事務に干渉することを禁じているが、マカオ政府からの要請があれば、駐屯軍は公共の秩序を回復するために動員されることがある。"
 MAC.anarchist_communism: "£MAC_anarchist_communism マカオ民連協進会"
 MAC.anarchist_communism_icon: "£MAC_anarchist_communism"
 MAC.anarchist_communism_desc: "マカオ民連協進会は、かつてポルトガルの植民地で、中国の特別行政区であるマカオにある政党である。マカオは政党が政治的な役割を果たさない地域であるが、一部の市民団体が選挙で候補者名簿を提出しており、これらを政党とみなすこともできる。"
 MON.liberalism: "£MON_liberalism 民主党"
 MON.liberalism_icon: "£MON_liberalism"
 MON.liberalism_desc: "After the 1990 democratic revolution, Mongolia became a country with a multi-party system. Those who pioneered the democratic revolution established political parties such as the Mongolian National Progress Party and the Mongolian Social Democratic Party during the Democratic Revolution. On 6 December 2000, five political parties - including the Mongolian National Democratic Party, Mongolian Social Democratic Party and others merged and established the Democratic Party of Mongolia."
