l_spanish:
 colombia.1.t: "Operación Fénix"
 colombia.1.d: "El servicio de inteligencia colombiano ha localizado al segundo al mando de las FARC en un campamento justo al otro lado de la frontera ecuatoriana. El ejército está solicitando autorización para realizar un operativo transfronterizo para eliminarlo. El éxito en esta misión sería un golpe duro para las guerrillas, pero violar la soberanía ecuatoriana podría desatar una crisis diplomática."
 colombia.1.a: "Comenzar operativo transfronterizo"
 colombia.1.b: "Respetar soberanía ecuatoriana"
 colombia.2.t: "Violación colombiana de nuestra soberanía"
 colombia.2.d: "Las fuerzas armadas de Colombia han llevado a cabo un operativo militar en territorio ecuatoriano, asesinando a Raúl Reyes, comandante de las FARC en un ataque aéreo transfronterizo. Esta es una violación sin precedente a nuestra soberanía."
 colombia.2.a: "Denunciar a Colombia públicamente"
 colombia.2.b: "Manejar la situación mediante canales extraoficiales"
 colombia.3.t: "La Crisis Andina se intensifica"
 colombia.3.d: "Colombia ha violado la soberanía ecuatoriana con un operativo militar transfronterizo. Ecuador ha decidido denunciar el ataque y ha llamado a sus aliados regionales para conseguir apoyo. Venezuela debe escoger entre apoyar a Ecuador y permanecer al margen de la disputa."
 colombia.3.a: "Apoyar a Ecuador y movilizar tropas hacia la frontera"
 colombia.3.b: "Mantenerse al margen de la disputa"
 colombia.4.t: "El Duelo Andino"
 colombia.4.d: "Se está desarrollando una crisis diplomática entre Colombia, Ecuador y Venezuela desde que Colombia realizó un operativo militar transfronterizo contra las FARC. Ecuador y Venezuela están mobilizando a sus ejércitos. Estados Unidos debe de decidir como responder."
 colombia.4.a: "Apoyar a Colombia --- Estaban luchando contra las FARC"
 colombia.4.b: "Pedir moderación de todas las partes"
 colombia.5.t: "Venezuela se moviliza en contra de nosotros"
 colombia.5.d: "Venezuela ha movilizado tropas hacia la frontera colombiana en solidaridad con Ecuador. Los ánimos están al rojo vivo y la situación podría tornarse rápidamente en un conflicto bélico."
 colombia.5.a: "Preparar nuestras defensas"
 colombia.6.t: "Apoyo Estadounidense"
 colombia.6.d: "Estados Unidos ha apoyado públicamente la operación Colombiana en contra de las FARC, les han provisto de cobertura diplomática y reafirman su compromiso con esta alianza bilateral."
 colombia.6.a: "Agradecemos el apoyo de Washington"
 colombia.7.t: "Cumbre del Grupo Rio"
 colombia.7.d: "El Grupo Rio ha convocado una cumbre de emergencia para mediar la Crisis Andina. Líderes regionales están promoviendo una resolución diplomática. Colombia tiene la oportunidad de pedir disculpas y desescalar la situación, o de plantarse firme en su derecho de poder seguir luchando contra las guerrillas más allá de sus fronteras."
 colombia.7.a: "Disculparse cordialmente"
 colombia.7.b: "Negarse a ofrecer disculpas"
 colombia.8.t: "Crisis resuelta"
 colombia.8.d: "Colombia ha emitido una disculpa formal en la cumbre del Grupo Rio. El riesgo inmediato de una confrontación bélica se ha atenuado, aunque las relaciones entre ambos países permanecen delicadas."
 colombia.8.a: "Aceptar la disculpa y bajar la guardia"
 colombia.9.t: "Desescalada de la Crisis Andina"
 colombia.9.d: "La Crisis Diplomática Andina ha sido resuelta en la Cumbre del Grupo Rio. Colombia ha emitido una disculpa formal por haber violado la soberanía territorial ecuatoriana. Las tropas pueden regresar a sus cuarteles."
 colombia.9.a: "Retirarse"
 colombia_news.1.t: "Colombia ataca a las FARC en Ecuador"
 colombia_news.1.desc: "Las fuerzas armadas de Colombia han realizado un bombardeo aéreo transfronterizo en territorio ecuatoriano, asesinando así al comandante de las FARC Raul Reyes. Quito ha retirado a su embajador de Bogotá y ha señalado al operativo colombiano como una grave afrenta al derecho internacional. Venezuela y Ecuador han movilizado militar personal hacia la frontera colombiana."
 colombia_news.1.a: "No nos disculparemos por combatir al terrorismo"
 colombia_news.1.b: "Esto es un acto de agresión en contra de nuestra nación"
 colombia_news.1.c: "Ecuador no está solo"
 colombia_news.1.d: "La lucha colombiana contra las FARC debe respetar fronteras"
 colombia_news.1.e: "Los pueblos andinos se encuentran en la orilla de sus asientos"
 colombia_news.1.f: "Una crisis regional en América Latina"
 colombia_news.2.t: "La Crisis Andina ha sido resuelta"
 colombia_news.2.desc: "La Crisis Andina del 2008 ha terminado en la Cumbre del Grupo Rio después de que el gobierno colombiano ha emitido una disculpa formal por violar la soberanía ecuatoriana en su lucha contra las FARC. Los líderes de la región celebran la decisión de haber escogido la paz, aunque la tensión sigue palpable entre los tres países involucrados."
 colombia_news.2.a: "La paz triunfa -- por ahora"
 colombia_news.2.b: "Aceptamos la disculpa y retomamos la cotidianeidad"
 colombia_news.2.c: "La región suspira aliviada"
 colombia_news.2.d: "Sudamérica escoge la paz"