 BLR_Chinese_zdania: "新建工厂"
 BLR_Chinese_zdania_desc: "中国政府正在加大对我国的投资，并准备建设新工厂。"
 BLR_Chinese_konfuci: "孔子学院"
 BLR_Chinese_konfuci_desc: "我们将在国内开设多所孔子学院。"
 BLR_Chinese_Poezda: "从中国购买火车"
 BLR_Chinese_Poezda_desc: "我们将在中国购买几列列车，这将有助于改善我们的供应情况。"
 BLR_Chinese_huawei: "与华为合作"
 BLR_Chinese_huawei_desc: "我们将与这家中国公司建立强有力的合作。"
 BLR_Chinese_energy: "中国对我们能源行业的投资"
 BLR_Chinese_energy_desc: "中国企业继续在我国各地进行投资，现在准备再次投资我们的能源领域。"
 BLR_Chinese_uchenia: "与中国军队一起演习"
 BLR_Chinese_uchenia_desc: "我们两军之间的经验交流将非常有用。"
 BLR_Chinese_yuan: "人民币是该国的第二货币"
 BLR_Chinese_yuan_desc: "我们准备接受人民币作为我国的第二货币。"
 BLR_Chinese_skynet: "中国互联网管控经验"
 BLR_Chinese_skynet_desc: "我们准备学习监控社交网络的经验"
 BLR_Chinese_economic: "中国经济经验"
 BLR_Chinese_economic_desc: "我们正在落实中国经济取得的所有经验。"
