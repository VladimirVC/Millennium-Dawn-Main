 form_AUSHUN_category: "Reforma Austro-Węgier"
 form_AUSHUN_category_desc: "Austro-Węgry były wielką potęgą w Europie Środkowej pod koniec XIX wieku i na początku XX wieku. Naród został rozwiązany po swojej dotkliwej porażce w Wielkiej Wojnie. Rozpadł się na narody Czech, Austrii, Węgier, Słowacji, Słowenii, Bośni i części Ukrainy, Polski i Rumunii. Czas odzyskać utraconą tak dawno temu władzę. Czas zreformować Austro-Węgry."
 AUSHUN_integrate_start: "Begin forming [GetAUSHUNNameDef]"
 AUSHUN_integrate_start_desc: "The holdings of the Austro-Hungarian Empire have been reclaimed by our military and our politicians have started the work towards administering the new regions.\n\n"
 AUSHUN_integrate_AUS: "Integrate [GetAUSHUNNameAdj] [AUS.GetAdjective] Territories"
 AUSHUN_integrate_AUS_desc: "Narodowe tereny byłego imperium Habsburgów, Austria, powinna być jedną z głównych siedzib władzy w naszym kraju."
 AUSHUN_integrate_HUN: "Integrate [GetAUSHUNNameAdj] [HUN.GetAdjective] Territories"
 AUSHUN_integrate_HUN_desc: "Królestwo Węgier było drugą połową monarchii dualistycznej, partnerem w rządzeniu cesarstwem. Jego integracja jest niezbędna do przywrócenia struktury imperialnej."
 AUSHUN_integrate_SLV: "Integrate [GetAUSHUNNameAdj] [SLV.GetAdjective] Territories"
 AUSHUN_integrate_SLV_desc: "Ziemie słoweńskie były częścią austriackich ziem koronnych, zapewniając dostęp do Adriatyku i pełniąc funkcję pomostu między Austrią a Bałkanami."
 AUSHUN_integrate_NORTHITA: "Integrate [GetAUSHUNNameAdj] North Italian Territories"
 AUSHUN_integrate_NORTHITA_desc: "Włoskie terytoria Lombardii i Wenecji były niegdyś klejnotami korony Habsburgów, bogatymi w kulturę i handel. Ich powrót przywróciłby Austrii wpływy w Dolinie Padu."
 AUSHUN_integrate_CRO: "Integrate [GetAUSHUNNameAdj] [CRO.GetAdjective] Territories"
 AUSHUN_integrate_CRO_desc: "Chorwacja była częścią Korony Węgierskiej, ciesząc się znaczną autonomią. Jej porty i strategiczne położenie nad Adriatykiem czyniły ją kluczowym elementem potęgi morskiej imperium."
 AUSHUN_integrate_BOS: "Integrate [GetAUSHUNNameAdj] [BOS.GetAdjective] Territories"
 AUSHUN_integrate_BOS_desc: "Bośnia i Hercegowina, administrowana od 1878 r. przez Austro-Węgry, a formalnie zaanektowana w 1908 r., dzięki integracji zabezpieczy nasze południowe granice i rozszerzy nasze wpływy na Bałkany."
 AUSHUN_integrate_SLO: "Integrate [GetAUSHUNNameAdj] [SLO.GetAdjective] Territories"
 AUSHUN_integrate_SLO_desc: "Ziemie słowackie były integralną częścią Królestwa Węgier, tworząc górzystą północną granicę korony. Ich ponowne włączenie wzmacnia naszą władzę nad Karpatami."
 AUSHUN_integrate_AUSROM: "Integrate [GetAUSHUNNameAdj] Transylvanian Territories"
 AUSHUN_integrate_AUSROM_desc: "Transylwania była historyczną krainą koronną Węgier, będącą przedmiotem sporów między ludnością rumuńską i węgierską. Kontrola nad tym regionem zapewniała wschodnie dojście do imperium."
 AUSHUN_integrate_CZE: "Integrate [GetAUSHUNNameAdj] [CZE.GetAdjective] Territories"
 AUSHUN_integrate_CZE_desc: "Czeskie ziemie koronne należały do ​​najbardziej uprzemysłowionych i bogatych kulturowo terytoriów cesarstwa. Praga była jednym z największych miast cesarskich, a jej reintegracja miała kluczowe znaczenie."
 AUSHUN_integrate_AUSPOL: "Zintegruj Polskę Południową"
 AUSHUN_integrate_AUSPOL_desc: "Galicja była ziemią koronną zdobytą w wyniku rozbiorów Polski, co zapewniało północnej granicy cesarstwa zarówno zasoby gospodarcze, jak i strategiczne znaczenie."
 AUSHUN_integrate_WESTUKR: "Zintegruj południowo-zachodnią Ukrainę"
 AUSHUN_integrate_WESTUKR_desc: "Wschodnie rubieże Galicji były domem dla ludności rusińskiej i zapewniały bogactwo rolnicze. Ich integracja rozszerza nasze wpływy na pogranicze ukraińskie."
 AUSHUN_update_flag: "Finish Forming [GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetAUSHUNNameDef], adopting its unified flag and name."
 is_AUSHUN: "Has formed [GetAUSHUNNameDef]"
 form_PBL_category: "Konfederacja Peru-Boliwijska"
 form_PBL_category_desc: "Konfederacja Peru-Boliwijska była pierwotnie jednostką krótkotrwałą na początku XIX wieku. Powstało w wyniku podziału Republiki Peruwiańskiej i wojen domowych w latach 1834 i 1835–1836 i obejmowało państwo boliwijskie. Współczesne rozmowy są minimalne, niemniej jednak są one zawsze obecne w atmosferze politycznej narodu boliwijskiego i peruwiańskiego. Nadszedł czas, aby rozważyć nowe jutro dla naszych ludzi."
 PBL_integrate_start: "Begin forming [GetPBLNameDef]"
 PBL_integrate_start_desc: ""
 PBL_integrate_PRU: "Integrate [GetPBLNameAdj] [PRU.GetAdjective] Territories"
 PBL_integrate_PRU_desc: "Peru jest większym z dwóch państw narodowych w konfederacji. Utrzymuje największą populację, gospodarkę i powierzchnię. Integracja Peru to kolosalne przedsięwzięcie, ale zajęcie tego państwa to solidny ruch w interesie nowej konfederacji."
 PBL_integrate_BOL: "Integrate [GetPBLNameAdj] [BOL.GetAdjective] Territories"
 PBL_integrate_BOL_desc: "Boliwia jest jednym z dwóch głównych państw narodowych, które założyły konfederację. Jest to mniejszy naród pod względem powierzchni, liczby ludności i możliwości ekonomicznych; nie jest to jednak powód do dyskredytacji tego narodu. Góry są bogate w surowce niezbędne do produkcji elektroniki i innych dóbr pośrednich. Integracja tego narodu umacnia kolejną silną pozycję naszej obecnie zróżnicowanej gospodarki."
 PBL_integrate_WESTPAR: "Zintegruj zachodni Paragwaj"
 PBL_integrate_WESTPAR_desc: "Zachodni Paragwaj nie może pochwalić się takimi samymi zasobami surowców jak zachodnia Brazylia czy północne Chile. Mimo to na tym obszarze znajduje się mnóstwo pól uprawnych i regionów, w których możemy rozwijać przemysł naszego nowego kraju."
 PBL_integrate_WESTBRA: "Zintegruj zachodnią Brazylię"
 PBL_integrate_WESTBRA_desc: "Zachodnia Brazylia jest domem dla rdzennej ludności, bogatych zasobów i nie tylko. Integracja zachodniej Brazylii powinna pomóc poprawić stanowisko naszego narodu i zwiększyć obszar, na którym możemy się rozwijać."
 PBL_integrate_NORTHCHL: "Zintegruj północne Chile"
 PBL_integrate_NORTHCHL_desc: "Północne regiony Chile są dojrzałe do integracji i musimy je włączyć, aby pomogły nam w osiągnięciu naszych przyszłych celów."
