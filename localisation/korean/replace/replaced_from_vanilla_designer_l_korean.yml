 DESIGNER_REGIMENTAL_SUPPORT_COLUMN_TITLE: "대대 지원 중대. 이들은 대대급에 직접 배속된 지원 및 전투 부대입니다.\n\n대대 지원 중대는 사단의 §Y최대 속도§!에 영향을 §R미치며§!, §Y전장 너비§!를 §R증가§!시킵니다."
 DESIGNER_SUPPORT_COLUMN_TITLE: "여단 및 사단 지원 중대. 이들은 최전선 부대 뒤에서 원활한 전투를 돕는 지원 부대입니다.\n\n각 유형마다 §R하나§!만 선택할 수 있습니다.\n\n지원 중대는 사단의 §Y최대 속도§!에 영향을 §R미치며§!, §Y전장 너비§!를 §R증가§!시킵니다."
