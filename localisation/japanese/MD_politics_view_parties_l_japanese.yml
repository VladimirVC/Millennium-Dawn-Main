 BEN.liberalism: "£generic_liberalism_small  ベナン再生党"
 BEN.liberalism_desc: "新自由主義 - ベナン再生党は当初、ニセフォール・ソグロの大統領選での当選を支援するためにロジン・ヴィエラ・ソグロによって結成され、その後の選挙で彼が敗北するまでは一定の成功を収めた。それ以来、同党はソグロ家のメンバーが代々率いてきた。"
 BEN.socialism: "£generic_socialism_small (FARD-Alafia) 再生開発行動戦線"
 BEN.socialism_desc: "民主社会主義 - 1994年に結成された再生開発行動戦線は、名目上は社会民主主義政党である。同党の最大の成功は、かつてベナン人民革命党の党員であったマティユー・ケレク大統領の在任中に訪れた。政権掌握後、彼の統治は独裁的支配との非難や論争に満ちていた。"
 BEN.Communist-State: "£generic_Communist_State_small  (PCB) ベナン共産党"
 BEN.Communist-State_desc: "反修正主義 - 1977年にダホメ共産党として結成され、反修正主義政党を標榜するベナン共産党は、冷戦期にアルバニアの指導者エンヴェル・ホッジャと連携した。同党はまた、親ソ連のベナン人民革命党と対立し、ベナンが最終的に一党独裁体制から脱却するまで、既存の共産主義政権に反対し続けた。"
 BEN.neutral_Social: "£generic_neutral_Social_small (PSD) 社会民主党"
 BEN.neutral_Social_desc: "第三の道 - 1990年に結成された社会民主党は、その歴史の大部分を他党との選挙連合に参加して過ごしてきた。同党自体は選挙での成功をほとんど収めておらず、ベナンのケレク大統領を支持する政党連合の一員として政権に参加したのみである。"
 BEN.Neutral_green: "£generic_Neutral_green 緑の党"
 BEN.Neutral_green_desc: "緑の政治 - 指導力や国民からの支持に乏しい緑の党は、環境保護を重視しつつ進歩的な社会・経済政策を統合した従来の党綱領を維持しているものの、より大規模な選挙連合の一員として参加して初めて、一定の成果を上げることができている。"
 BEN.Nat_Autocracy: "£generic_Nat_Autocracy ベナン軍"
 BEN.Nat_Autocracy_desc: "実務的軍事政権 - 1960年にダホメ軍として創設されたベナンの軍隊は、紛争への関与はほとんどないが、ベルギー軍や近隣諸国の軍隊との協力により、国境を越えた任務に参加した実績がある。同軍には、共産主義政権の前後およびその最中に、政府に対する行動に参加するなど、政治的に活動したわずかな歴史がある。"
 BFA.liberalism: "£generic_liberalism_small 民主主義と連邦のための同盟"
 BFA.liberalism_desc: ""
 BFA.socialism: "£generic_socialism_small 民主進歩党"
 BFA.socialism_desc: ""
 BFA.Neutral_green: "£generic_Neutral_green_small ブルキナファソ緑の党"
 BFA.Neutral_green_desc: ""
 BFA.Nat_Autocracy: "£BFA_Nat_Autocracy_small (CDP) 民主主義進歩会議"
 BFA.Nat_Autocracy_desc: ""
 BHR.Western_Autocracy: "£BHR_Autocracy_small (HoK) ハリーファ家"
 BHR.Western_Autocracy_icon: "£BHR_Autocracy_small"
 BHR.neutral_Social: "£generic_neutral_Social_small 全国民主行動協会"
 BHR.neutral_Social_desc: "社会主義 - 国民民主行動協会（ワアド）は、マルクス主義かつアラブ民族主義の団体であるバーレーン解放人民戦線から派生した。その後、ワアドはその路線を穏健化させ、マルクス主義革命ではなく、バーレーンにおける民主的改革を推進している。同党はバーレーンの労働者階級から一定の支持を得ており、主要な4つの野党の一つとなっている。"
 BHR.Communist-State: "£generic_Communist_State_small 進歩民主トリビューン"
 BHR.Communist-State_desc: ""
 BHR.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small 自由と民主主義のためのハク運動"
 BHR.Vilayat_e_Faqih_desc: "シーア派イスラム民主主義 - ハク運動は、ウェファクの強硬派分派であり、ウェファクの穏健な改革アプローチが成果を上げられなかったことに失望したバーレーンのシーア派から支持を集めている。こうした支持者の多くはシーア派の若者であり、時には小さな集団を結成して警察官に石や火炎瓶を投げつけることもある。ウェファクとは異なり、ハク運動はアル・ハリーファ王朝の打倒とバーレーン共和国の樹立を支持している。"
 BHR.Conservative: "£generic_Conservative_small アル・ウェファク"
 BHR.Conservative_desc: "シーア派イスラム民主主義 - アル・ウェファクはバーレーン最大級の政党の一つであり、多数派を占めるシーア派アラブ系住民の利益を代表する存在と見なされている。同党はバーレーンにおける政治改革を求める最も強力な声であり、そのためバーレーン王政にとって大きな悩みの種となってきた。バーレーンのシーア派住民の利益を代表しているにもかかわらず、アル・ウェファクはイランとの距離を置くよう慎重を期しており、目標を達成するために穏健な言辞と手法を採用してきた。"
 BHR.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small アマル党"
 BHR.Mod_Vilayat_e_Faqih_desc: "シーア派イスラム主義シラージ派 - アマル党（イスラム行動協会）は、アル・ウェファクよりも小規模な、シラージ派政党である。同党は、イラン・イスラム共和国の政体を否定するに至った著名なシーア派指導者、モハンマド・フサイニ・シラージの支持者たちの利益を代表している。両党はアル・ハリーファ王朝への反対という点で共通しているにもかかわらず、教義上の相違による摩擦が生じている。"
 BHR.Kingdom: "£generic_Kingdom_small アル・アサラ・イスラム協会"
 BHR.Kingdom_desc: "サラフィー主義 - アル・アサラは、バーレーンのスンニ派保守層の間で支持を集めているサラフィー主義政党である。同党は、バーレーンのシーア派イスラム主義勢力の影響力に対抗するため、歴史的にアル・メンバルと連携してきた。"
 BHR.Caliphate: "£generic_Caliphate_small アルカイダ"
 BHR.Caliphate_desc: ""
 BHR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small アル・メンバル・イスラム協会"
 BHR.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - アル・メンバルは、社会の段階的なイスラム化と、民主的な手段による政治への市民参加を支持する組織であるムスリム同胞団のバーレーン支部である。アル・メンバルは時折、サラフィー派のアル・アサラと連携することもあるが、概して社会面での保守性は低い。"
 BHR.Nat_Fascism: "£IRQ_Nat_Autocracy_small 国民民主会議"
 BHR.Nat_Fascism_icon: "£IRQ_Nat_Autocracy_small"
 BHR.Nat_Fascism_desc: "バアス主義 - 国民民主会議は、イラク・バアス党のイラク派に属するバーレーン支部であり、サダム・フセイン政権下のイラクを支持し続けている。同党は移民労働者の帰化に反対し、雇用においてバーレーン人優先を主張している。"
 BHR.Nat_Autocracy: "£generic_Nat_Autocracy_small バーレーン国防軍"
 BHR.Nat_Autocracy_desc: ""
