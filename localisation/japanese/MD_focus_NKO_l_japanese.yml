 NKO_Planned_Economy: "計画経済"
 NKO_Planned_Economy_desc: "正式には朝鮮民主主義人民共和国（DPRK）として知られる北朝鮮は、孤立し、厳しく統制された指令経済を採用している。指令経済では、経済は政府によって一元的に計画・調整され、共産主義国家の標準的な構成要素となっている。"
