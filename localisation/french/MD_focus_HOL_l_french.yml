 HOL_werkspoor_equipment_manufacturer: "Werkspoor Utrecht"
 HOL_werkspoor_equipment_manufacturer_desc: "Autrefois une pierre angulaire de l'innovation industrielle §Y[HOL.GetAdjectiveCap]§!, Werkspoor Utrecht est un modèle d'excellence en ingénierie nationale. Werkspoor se spécialise dans la fabrication de trains, de machines et d'autres équipements lourds de haute qualité, garantissant que les Pays-Bas conservent leur réputation de technologie industrielle de pointe."
