 ALG_renewable_focused_energy_rich_tt: "额外收入：$0.080!"
 ALG_oil_focused_energy: "启动石油国家"
 ALG_oil_focused_energy_desc: "阿尔及利亚决定利用其尚未开发的石油资源，实现能源自给自足。虽然石油价格低廉且易于获取，但它并非最环保的选择。"
 algeria_casablanca_accords: "卡萨布兰卡协议"
 algeria_casablanca_accords_desc: "我们正在就西撒哈拉的持久和平进行谈判。我们需要让所有参与国相信我们的方案行之有效。即便我们未能说服所有国家，大多数国家仍可能试图强迫对方接受该方案。然而，这可能会导致冲突升级。"
 algeria_casablanca_accords_success_tt: "所有代表团都签署了和平计划（当前[?algeria_casablanca_accords_no_of_signatories]/[?algeria_casablanca_accords_no_of_participants]）"
 algeria_casablanca_accords_fail_tt: "代表团人数不足2（当前[?algeria_casablanca_accords_no_of_participants]）"
 algeria_casablanca_accords_SHA_resistance_tt: "§R[SHA.GetNameWithFlag]会抵制此决议！§!"
 algeria_casablanca_accords_MOR_resistance_tt: "§R[MOR.GetNameWithFlag]会抵制此决议！§!"
 algeria_casablanca_accords_draft_solution: "为西撒哈拉起草和平解决方案"
 casablanca_accords_convince_alg_x_tt: "我们已经完成§Y$algeria_casablanca_accords_draft_solution$§!"
 algeria_casablanca_accords_hold_negotiations: "举行谈判"
 algeria_casablanca_accords_hold_negotiations_tt: "这将更新其他参与者接受我们解决方案的可能性。"
 algeria_casablanca_accords_at_least_one_neg_tt: "我们完成§Y$algeria_casablanca_accords_hold_negotiations$§!至少一次"
 algeria_casablanca_accords_convince_accept_tt: "他们§G接受§!解决方案"
 algeria_casablanca_accords_convince_reject_tt: "他们§R拒绝§!解决方案"
 algeria_casablanca_accords_convince_target_tt: "他们接受的§Y可能性§!基于他们最初的立场。然后，这将加上我们对他们的§Y影响力§!。这进一步乘以他们的§Y关系值和意识形态§!。\n\n如果他们拒绝该解决方案，该决议将在§Y30 天§!后再次生效。每次他们拒绝解决方案时，他们就有可能离开会议。\n"
 algeria_casablanca_accords_convince_morocco: "说服[MOR.GetNameWithFlag]"
 algeria_casablanca_accords_convince_morocco_desc: "与[MOR.GetAdjective]代表讨论他们是否会接受我们当前的协议。"
 algeria_casablanca_accords_convince_sahrawi: "说服[SHA.GetNameWithFlag]"
 algeria_casablanca_accords_convince_sahrawi_desc: "与[SHA.GetAdjective]代表讨论他们是否会接受我们当前的协议。"
