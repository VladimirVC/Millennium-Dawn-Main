 UKR_increase_health_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
 UKR_decrease_health: "Demander moins de fonds pour la santé"
 UKR_decrease_health_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
 UKR_pension_open: "Lancez le débat sur la §OPension§!"
 UKR_pension_close: "Mettre fin au débat sur les §OPension§!"
 UKR_increase_pension: "Demander une augmentation des dépenses pour les pensions"
 UKR_increase_pension_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
 UKR_decrease_pension: "Demander une réduction des dépenses pour les pensions"
 UKR_decrease_pension_desc: "Si le débat à la Verkhovna Rada est §Gréussi§!, la loi sera §Ymodifiée§!"
 UKR_promote_russian_interests: "Promouvoir les intérêts russes [SOV.GetFlag]"
 UKR_promote_russian_interests_desc: "Nous promouvrons les intérêts russes [SOV.GetFlag] au sein de la nation pour accroître la popularité du bloc pro-russe lors des prochaines élections."
 UKR_promote_western_interests: "Promouvoir les intérêts occidentaux [USA.GetFlag]"
 UKR_promote_western_interests_desc: "Nous promouvrons les intérêts américains [USA.GetFlag] au sein de la nation pour accroître la popularité du bloc pro-occidental lors des prochaines élections."
 UKR_dissolved_verkhovna: "A dissous le Parlement"
 UKR_get_25_t62_ifv: "Assembler 50 T-62 BMPP"
 UKR_get_50_mtlb_ifv: "Assembler 50 MT-LB Shkval"
 UKR_get_50_m113: "Assembler 50 MT-LB M113"
 UKR_get_50_buggies: "Assembler 50 véhicules polyvalents"
 UKR_party_regions_start: "Parti des régions"
 UKR_party_regions_start_desc: "Yanoukovytch a pris le pouvoir dans le pays entre ses mains, il est temps pour les régions !"
 UKR_party_regions_inaguration: "Inauguration de Yanoukovytch"
 UKR_party_regions_inaguration_desc: "It is time for the inauguration of our new president."
 UKR_party_regions_decrease: "Réduire le personnel administratif"
 UKR_party_regions_decrease_desc: "We will reduce the number of employees of the state apparatus."
 UKR_party_regions_anti_corrupt: "Comité national anti-corruption"
 UKR_party_regions_anti_corrupt_desc: "We will create a new ministry, the national Anti-Corruption Committee, to combat corrupt officials in our country."
 UKR_party_regions_unifed_window: "Investissements à guichet unique"
 UKR_party_regions_unifed_window_desc: "We will introduce new rules for investors in our country, which will make it easier for them to interact with our authorities."
 UKR_party_regions_decrease_agro: "Réduire les régulations sur l'agriculture"
 UKR_party_regions_decrease_agro_desc: "L'agro-industrie recevra de nouveaux avantages, ce qui, nous l'espérons, augmentera sa productivité."
 UKR_party_regions_laizes: "Laissez-faire"
 UKR_party_regions_laizes_desc: "We will partially adopt one of the libertarian principles in our economic policy and will not interfere in economic processes."
 UKR_party_regions_taxx: "Modifier le code des impôts"
 UKR_party_regions_taxx_desc: "Nous apporterons les changements nécessaires au code des impôts. Nos concessions réduiront les taxes locales par trois !"
 UKR_party_regions_autocracy: "Renforcer l'autocratie"
 UKR_party_regions_autocracy_desc: "A strong government must control everything it can, otherwise it is chaos and disorder that existed before our rule."
 UKR_party_regions_pressure_media: "Pression sur les médias"
 UKR_party_regions_pressure_media_desc: "The media has become too free, it is necessary to cool their ardor."
 UKR_party_regions_stability_reform: "Stabilité et réforme"
 UKR_party_regions_stability_reform_desc: "We will assemble a loyal coalition of politicians, which we will call \"Stability and Reforms\", which will actively promote our projects and ideas."
 UKR_party_regions_stability_restricting_freedom_speech: "Restreindre la liberté d'expression"
 UKR_party_regions_stability_restricting_freedom_speech_desc: "Freedom of speech ends where it begins to offend us."
 UKR_party_regions_stability_purge_opposition: "Tenter d'éliminer l'opposition politique"
 UKR_party_regions_stability_purge_opposition_desc: "The opposition is too self-willed and undermines the institutions of power using its freedom, it's time to fix this."
 UKR_party_regions_lustration: "Lustration des gouverneurs et des agences de sécurité"
 UKR_party_regions_lustration_desc: "Lustration of disloyal and openly harmful to the state people in these structures has long been necessary."
 UKR_party_regions_agreement_opposition: "Accords avec l'opposition"
 UKR_party_regions_agreement_opposition_desc: "We will try to establish relations with some part of the opposition, thereby dividing it."
 UKR_party_regions_appease_the_westermists: "Apaiser les occidentalistes"
 UKR_party_regions_appease_the_westermists_desc: "Western Ukraine has long been a hotbed of discontent and instability, we will appease them, I will try to give them what they want - promises."
 UKR_party_regions_request_russian: "Demander des investissements russes"
 UKR_party_regions_request_russian_desc: "Nous demanderons des investissements russes, qui ne seront évidemment pas de trop."
 UKR_party_regions_personal_gain: "Se concentrer sur le gain personnel"
 UKR_party_regions_personal_gain_desc: "The country is certainly good, but it's worth thinking about yourself."
 UKR_party_regions_titushki: "Rassembler les Titushki"
 UKR_party_regions_titushki_desc: "Nous utiliserons une nouvelle méthode pour discréditer les rassemblements de l'opposition : les Titushki."
 UKR_party_regions_regional_council: "Conseil régional"
 UKR_party_regions_regional_council_desc: "We will introduce a new authority, the regional council, to facilitate the interaction of regional and state authorities."
 UKR_party_regions_optimise_east_ukraine_gamble: "Pari sur l'Ukraine orientale"
 UKR_party_regions_optimise_east_ukraine_gamble_desc: "Eastern Ukraine has always been our patrimony, we will actively try to get their support, because in fact they are our main electorate."
 UKR_party_regions_optimise_prior_loyals: "Prioriser les loyaux"
 UKR_party_regions_optimise_prior_loyals_desc: "People loyal to us are much more important and we will actively promote them."
 UKR_party_regions_western_oligarch: "Approcher les oligarques occidentaux"
 UKR_party_regions_western_oligarch_desc: "The oligarchs of western Ukraine will be our priority, we want to find a balance between the west and the east, perhaps their oligarchs will help us."
 UKR_party_regions_meet_akhmetov: "Rencontrer Akhmetov"
 UKR_party_regions_meet_akhmetov_desc: "The Donetsk clan of oligarchs, and its representative Rinat Akhmetov, an important political resource that we use to maintain our power, it is worth listening to him."
 UKR_party_regions_informational_act: "Loi sur l'information"
 UKR_party_regions_informational_act_desc: "The new act, or law, will open access to the broad masses to the activities of politicians, which will reduce the corruption component in their activities."
 UKR_party_regions_optimise_ministries: "Optimiser les ministères"
 UKR_party_regions_optimise_ministries_desc: "Government structures have become too huge, it's time to reduce them."
 UKR_party_regions_reform_constituion: "Réformer la Constitution"
 UKR_party_regions_reform_constituion_desc: "Nous promouvrons activement la réforme de la Constitution. Il est temps que notre pays avance vers des changements globaux !"
 UKR_party_regions_compulsory: "Changement du service militaire obligatoire"
 UKR_party_regions_compulsory_desc: "We will change the system of service in our army, literally turning it into a contract one."
 UKR_party_regions_pension_reform: "Réforme des retraites"
 UKR_party_regions_pension_reform_desc: "Pension reform has been brewing for a long time and now we will carry it out."
 UKR_party_regions_kozhara: "Kozhara dirige le ministère des Affaires étrangères"
 UKR_party_regions_kozhara_desc: "We will appoint one of our friends and partners as Foreign Minister."
 UKR_party_regions_youth_region: "Élargir les régions jeunesse"
 UKR_party_regions_youth_region_desc: "The youth wing of our party will gain more power and influence, we will open access to them."
 UKR_party_regions_berkut_reforms: "Réformes de Berkut"
 UKR_party_regions_berkut_reforms_desc: "Berkut, as a police structure, needs reforms so that we can protect ourselves."
 UKR_party_regions_berkut_extreme_training: "Entraînement extrême pour Berkut"
 UKR_party_regions_berkut_extreme_training_desc: "Berkut will become even more active in conducting competitions and training processes to improve its skill."
 UKR_dual_language: "État bilingue"
 UKR_dual_language_desc: "The Russian language occupies an important part of the life of Ukraine and it would be foolish to deny it. We will not promote stupid political ideas about the abolition of the Russian language in our country."
 UKR_cancel_decommunization: "Anti-décommunisation"
 UKR_cancel_decommunization_desc: "Nous ne permettrons pas une lutte contre notre passé soviétique, lorsque nous combattions le fascisme et le nazisme."
 UKR_donbass_autonomy_pass: "Autonomie spéciale du Donbass"
 UKR_donbass_autonomy_pass_desc: "Donbass is a special region of our country, perhaps it's time to start a discussion about the special autonomy of this region."
 UKR_sng_integrate: "Intégration à la CEI"
 UKR_sng_integrate_desc: "We will continue integration processes within the framework of cooperation between the CIS countries."
 UKR_europe_negotiat: "Négociations avec l'UE"
 UKR_europe_negotiat_desc: "We will start negotiations with the European Union on an issue that has been on our political agenda for a long time. This is an association with the European Union."
 UKR_russian_ukrainian_military_coop: "Coopération militaire ukraino-russe"
 UKR_russian_ukrainian_military_coop_desc: "We will strengthen cooperation with the Russian Armed Forces."
 UKR_party_regions_european_chart: "Charte européenne des langues"
 UKR_party_regions_european_chart_desc: "We will sign the European Charter of Regional Languages as an indicator of our democratic attitude towards national minorities."
 UKR_parti_regions_anti_corruption_commitie: "Comité national anti-corruption"
 UKR_parti_regions_anti_corruption_commitie_desc: "The new committee is designed to fight corrupt officials at all levels."
 UKR_parti_regions_invest_open_window: "Investissements à guichet unique"
 UKR_parti_regions_taxx: "Code des impôts réformé"
 UKR_parti_regions_laizes: "Laissez-faire"
 UKR_parti_regions_stability_reform: "Stabilité et réforme"
 UKR_parti_regions_lustration: "Lustrations"
 UKR_parti_regions_opposition_agree: "Coopération avec l'opposition"
 UKR_parti_regions_titushki: "Titushki"
 UKR_parti_regions_optimise_ministers: "Optimisation des ministères"
 UKR_parti_regions_inform_act: "Loi sur l'information"
 UKR_parti_regions_pension_reform: "Réforme des retraites"
 UKR_parti_regions_youth_regions: "Régions jeunesse"
 UKR_parti_regions_autocracy: "Autocratie de Yanoukovytch"
 UKR_parti_regions_autocracy_desc: "Les actions de Yanoukovytch sont largement qualifiées de véritable autocratie, mais est-ce important pour le bien de l'État ?"
 ukraine_regions.7.t: "Investissements en Ukraine"
 ukraine_regions.7.d: "Le président ukrainien nous a demandé d'investir dans son pays. Devrions-nous accepter sa proposition ?"
 ukraine_regions.7.a: "Oui"
 ukraine_regions.7.b: "Non"
 ukraine_regions.8.t: "Investissements en Ukraine"
 ukraine_regions.8.d: "Russia has agreed to invest in our country."
 ukraine_regions.8.a: "Bien"
 ukraine_regions.9.t: "Investissements en Ukraine"
 ukraine_regions.9.d: "Russia refused to invest in our country."
 ukraine_regions.9.a: "triste"
 ukraine_regions.10.t: "Coopération avec la CEI"
 ukraine_regions.10.d: "Nous n'avons pas activement coopéré avec les pays de la CEI ces dernières années, et une partie de la population favorable à l'opposition pourrait également s'indigner de notre décision de poursuivre cette coopération. Devons-nous le faire ?"
 ukraine_regions.10.a: "Bien sûr"
 ukraine_regions.10.b: "Non"
 ukraine_regions.11.t: "Négociations d'association avec l'UE"
 ukraine_regions.11.d: "Il est temps de lancer les négociations d'association avec l'Union européenne, que nous cherchons à entamer depuis si longtemps. Devons-nous enfin décider de les commencer ?"
 ukraine_regions.11.a: "Bien sûr"
 ukraine_regions.11.b: "Non"
 ukraine_regions.12.t: "Question du statut du Donbass"
 ukraine_regions.12.d: "Depuis des années, nous entendons des propositions pour accorder un statut spécial au Donbass, entamant ainsi un lent processus de fédéralisation de l'Ukraine. C'est une décision sérieuse que nous devons prendre, en réalisant qu'il n'y aura pas de retour en arrière."
 ukraine_regions.12.a: "Nous leur accorderons un statut spécial"
 ukraine_regions.12.b: "Laissons les choses comme elles sont"
 ukraine_nato_help.1.t: "[FROM.GetName] fournit une aide monétaire"
 ukraine_nato_help.1.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include monetary support."
 ukraine_nato_help.1.a: "Bien"
 ukraine_nato_help.2.t: "[FROM.GetName] fournit une aide"
 ukraine_nato_help.2.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include light equipment and support."
 ukraine_nato_help.2.a: "Bien"
 ukraine_nato_help.3.t: "[FROM.GetName] fournit une aide"
 ukraine_nato_help.3.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include medium equipment for our brigades."
 ukraine_nato_help.3.a: "Bien"
 ukraine_nato_help.4.t: "[FROM.GetName] fournit une aide"
 ukraine_nato_help.4.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include heavy weaponry and equipment."
 ukraine_nato_help.4.a: "Bien"
 ukraine_nato_help.5.t: "[FROM.GetName] procure des équipements d'infanterie"
