 GRE_eastern_vars_initialized: "东方兄弟会追踪已启动"
 GRE_migration_deal_active: "与土耳其的移民合作正在积极开展。"
 GRE_assertive_patrols: "爱琴海积极巡逻机制正在运作"
 GRE_lost_continental_shelf_claims: "土耳其承认其对大陆架的主权声索"
 GRE_aegean_de_escalation: "对土耳其的最后通牒做出让步"
 GRE_confederation_active: "邦联决议链已激活"
 GRE_confederation_autonomy_done: "邦联自治结构已达成一致"
 GRE_confederation_economy_done: "邦联经济分配已达成一致"
 GRE_confederation_security_done: "邦联安全框架已达成一致"
 GRE_defending_sovereignty: "捍卫希腊主权"
 GRE_defending_sovereignty_desc: "希腊持续保持高度戒备的军事态势，旨在遏制土耳其在爱琴海和塞浦路斯的侵略。希腊海军和空军保持高度警惕，国防开支占用了原本可能用于消费品的资源。这种有针对性的威慑增强了希腊的决心，但也带来了经济代价。"
 GRE_aegean_naval_supremacy: "爱琴海海上霸权"
 GRE_aegean_naval_supremacy_desc: "前沿部署的巡逻和永久的水面存在使希腊海军在爱琴海的竞争水域中占据优势。"
 GRE_migration_cooperation_idea: "欧盟-土耳其移民协议"
 GRE_migration_cooperation_idea_desc: "土耳其在其领土上处理移民潮，以此换取希腊和欧盟的让步，从而减轻爱琴海岛屿的压力。"
 GRE_migration_crisis_idea: "移民危机"
 GRE_migration_crisis_idea_desc: "土耳其退出了移民协议，导致新一波又一波的移民涌入爱琴海，使希腊的接收设施不堪重负。"
 GRE_confederation_category: "塞浦路斯邦联"
 GRE_confederation_category_desc: "解决拟议中的塞浦路斯邦联的结构性问题：自治、经济分配和安全。"
 GRE_eastern_missions_category: "东部兄弟会任务"
 GRE_eastern_missions_category_desc: "爱琴海和塞浦路斯沿线反复出现的政策挑战。"
 GRE_decide_autonomy_level: "决定邦联自治"
 GRE_decide_autonomy_level_desc: "确定新成立的国家是采用拥有强大中央机构的联邦模式，还是采用赋予每个社区广泛自治权的较为松散的邦联模式。"
 GRE_decide_economic_distribution: "决定经济分配"
 GRE_decide_economic_distribution_desc: "决定联邦预算是按均等比例在两个社区之间分配，还是按GDP贡献加权分配。"
 GRE_decide_security_guarantees: "确定安全保障措施"
 GRE_decide_security_guarantees_desc: "决定统一后的国家是加入北约安全保护伞，还是采取中立的防御姿态。"
 GRE_aegean_dialogue_mission: "爱琴海对话"
 GRE_aegean_dialogue_mission_desc: "希腊和土耳其谈判代表每六个月必须决定各自主张的推进程度。如果对话破裂，演变为公开对抗或战争，谈判任务即告结束。"
 greece.700.t: "爱琴海对话：六个月回顾"
 greece.700.d: "最新一轮谈判陷入了熟悉的僵局。土耳其方面坚持要求希腊在大陆架问题上做出部分让步，以换取局势进一步缓和。坚持立场固然能维护我们的主张，但双方情绪必将紧张。"
 greece.700.a: "提供适度的让步"
 greece.700.b: "保持阵线"
 greece.701.t: "安卡拉退出移民协议"
 greece.701.d: "土耳其当局以希腊的外交姿态为由，暂停了在遣返和处理移民问题上的合作。据报道，爱琴海诸岛各地已出现新的移民抵达；接待中心将在几周内面临危机。"
 greece.701.a: "做好迎接涌入的准备"
 greece.702.t: "爱琴海事件"
 greece.702.d: "一架土耳其巡逻机夜间越境进入希腊声称拥有主权的领空。希腊拦截机介入拦截。双方未交火，但距离非常近，存在安全隐患。现在的问题是，是采取缓和措施还是采取更强硬的反击。"
 greece.702.a: "缓和冲突"
 greece.702.b: "升级应对措施"
 greece.703.t: "安卡拉加强对北塞浦路斯的援助"
 greece.703.d: "土耳其国家媒体已证实扩大了对北塞浦路斯当局的支持。此举似乎并非挑衅，而是经过深思熟虑，这表明雅典无法按照塞浦路斯的意愿行事。"
 greece.703.a: "记录在案"
 greece.704.t: "东地中海天然气危机"
 greece.704.d: "土耳其钻井船已进入希腊和塞浦路斯视为专属经济区的水域。雅典必须决定是缓和僵局，还是冒着引发更大规模冲突的风险坚守阵地。"
 greece.704.a: "暂时让步"
 greece.704.b: "守住阵地"
 greece.705.t: "土耳其的最后通牒"
 greece.705.d: "安卡拉发出严厉警告：希腊若继续在塞浦路斯问题上采取行动，必将面临未指明但切实存在的后果。外交部必须作出回应。"
 greece.705.a: "从悬崖边退后一步"
 greece.705.b: "不要被吓倒"
 greece.706.t: "例行空域事件"
 greece.706.d: "又一次土耳其飞越事件被记录在案，双方已通过常规渠道提出抗议。这种模式仍在继续，双方都不希望事态升级，也都不愿让步。"
 greece.706.a: "提交抗议书"
 greece.710.t: "邦联：自治问题"
 greece.710.d: "谈判人员提出了两种方案：一种是拥有强大中央机构的联邦制，另一种是将大部分权力下放给各社区的邦联制。最终的选择将决定新国家的性质。"
 greece.710.a: "联邦模式"
 greece.710.b: "邦联模式"
 greece.711.t: "邦联：经济分配"
 greece.711.d: "联邦收入将如何分配？严格的均等分配方式能让较小的社区感到安心，但按GDP加权的分配方案更能反映经济现实，也更容易在国内得到支持。"
 greece.711.a: "基于平等的分布"
 greece.711.b: "按GDP加权分配"
 greece.712.t: "联邦：安全框架"
 greece.712.d: "统一后的国家会加入北约，还是采取中立的防御姿态？雅典和尼科西亚各有支持者，这两种选择各占一半。"
 greece.712.a: "北约安全保护伞"
 greece.712.b: "中立防御姿态"
 greece.720.t: "对塞浦路斯联盟的要求"
 greece.720.d: "经过数月的外交斡旋和对土耳其的施压，雅典准备正式提出塞浦路斯和北塞浦路斯与希腊合并的要求。希腊已在希族塞人中争取到足够的支持，如果土耳其在国际压力下做出让步，北塞浦路斯领导层也可能被说服。关键时刻即将到来。"
 greece.720.a: "提出要求"
 greece.721.t: "塞浦路斯重燃战火"
 greece.721.d: "塞浦路斯政府（或其中一方）拒绝了希腊提出的合并要求，军事冲突迫在眉睫。安卡拉方面已发出强烈谴责和警告。土耳其军队保持戒备状态，但尚未明确承诺介入。国际社会正密切关注雅典方面是否会派遣军队参战，还是会继续提供秘密支持。"
 greece.721.a: "注意反应"
 greece.722.t: "雅典会走多远？（塞浦路斯）"
 greece.722.d: "塞浦路斯共和国拒绝了统一的要求，军事冲突迫在眉睫。我们可以暗中武装和支持统一的希族塞人部队，提供志愿者和物资；也可以公开派遣希腊武装部队强制吞并。前者能让希腊继续留在北约的掌控之中。后者则会让希腊军队卷入战斗，迫使希腊退出北约，并可能引发土耳其的直接干预。但它也能确保迅速征服并整合南部岛屿。"
 greece.722.a: "仅限志愿者和物资"
 greece.722.b: "投入希腊武装部队；向塞浦路斯宣战"
 greece.730.t: "北约对土耳其施压"
 greece.730.d: "雅典方面向北约盟国施压，请求其利用外交渠道劝说土耳其缓和其在爱琴海的咄咄逼人姿态。来自西方大国的这种压力或许能促使安卡拉重新考虑其立场。"
 greece.730.a: "与雅典站在一起"
 greece.730.b: "这不是我们之间的争执。"
 greece.731.t: "盟友支援已获保障"
 greece.731.d: "我们的北约伙伴已同意就爱琴海紧张局势与安卡拉方面进行接触。来自西方的外交支持应有助于缓解僵局，并证明我们强硬立场的正确性。"
 greece.731.a: "外交的胜利"
 greece.732.t: "我们的请求被拒绝了。"
 greece.732.d: "北约盟国礼貌地拒绝就爱琴海争端与土耳其进行直接对话。他们倾向于在双边海上事务上保持中立。"
 greece.732.a: "我们依然坚定不移"
 greece.733.t: "塞浦路斯经济一体化提案"
 greece.733.d: "雅典提议与塞浦路斯共和国进行深度经济一体化，包括建立关税同盟、银行体系协调以及制定统一的能源政策。此类合作将使塞浦路斯与希腊经济紧密相连，同时提升尼科西亚人民的生活水平。"
 greece.733.a: "与希腊融合"
 greece.733.b: "维护我们的自主权"
 greece.734.t: "塞浦路斯接受一体化"
 greece.734.d: "尼科西亚已接受该提议。希腊和塞浦路斯的企业正在协调监管，银行体系正在整合，爱琴海地区的投资流动也在共享。经济联盟将增强雅典在未来任何政治谈判中的筹码。"
 greece.734.a: "团结带来繁荣"
 greece.735.t: "塞浦路斯拒绝深度一体化"
 greece.735.d: "尼科西亚方面婉拒了深度经济一体化的提议。塞浦路斯共和国目前更倾向于在经济事务上保持独立，即使这意味着经济增长速度会放缓。"
 greece.735.a: "我们依然致力于此"
 greece.736.t: "东地中海天然气开发项目提案"
 greece.736.d: "雅典方面提议联合开发塞浦路斯南部和克里特岛东部海域的近海天然气田。一项联合开采计划将促进两国经济发展，并带来长期的能源收益。"
 greece.736.a: "共同开发这些领域"
 greece.736.b: "目前来看，这番言论过于具有挑衅性。"
 greece.737.t: "塞浦路斯天然气田开始运营"
 greece.737.d: "希腊和塞浦路斯的钻井平台已开始从合资气田开采天然气。新的炼油​​产能投入运营，两国经济都将受益于持续的能源收入。此举向安卡拉发出一个信号：希腊愿意不顾土耳其的反对，开发其专属经济区。"
 greece.737.a: "资源保障我们的未来"
 greece.738.t: "塞浦路斯拒绝天然气合资项目"
 greece.738.d: "塞浦路斯共和国因担心遭到土耳其的外交报复，拒绝参与天然气联合开发项目。雅典方面不会强行推进此事。"
 greece.738.a: "错失良机"
 greece.739.t: "与土耳其塞人接触"
 greece.739.d: "雅典向北部的土耳其族塞人社区伸出了经济和文化之手。雅典提供投资、贸易优惠和文化交流项目，这表明在希腊主导下实现统一，既符合北部塞人的利益，也符合希腊族塞人的利益。"
 greece.739.a: "接受希腊投资"
 greece.739.b: "我们仍保持警惕。"
 greece.740.t: "北塞浦路斯欢迎投资"
 greece.740.d: "土耳其族塞人领导层接受了希腊的投资和更紧密的经济联系。资金北流，商业伙伴关系建立，影响力逐渐向雅典倾斜。最终统一的基础每月都在不断巩固。"
 greece.740.a: "为团结播下的种子"
 greece.741.t: "北塞浦路斯拒绝接触"
 greece.741.d: "由于对希腊的意图心存疑虑，土耳其族塞人拒绝了这项投资方案。安卡拉的支持仍然是他们的保障，雅典的示好并未改变他们的想法。"
 greece.741.a: "又一次挫折"
 greece.742.t: "基地主权协议提案"
 greece.742.d: "雅典方面要求英国移交阿克罗蒂里和德凯利亚主权基地区的控制权。作为交换，希腊提供补偿、北约继续通行权，并保证维护英国的军事设施。移交这些基地将重塑塞浦路斯的战略平衡。"
 greece.742.a: "将基地割让给希腊"
 greece.742.b: "基地仍归英国所有"
 greece.743.t: "英国同意转让"
 greece.743.d: "伦敦方面认为，移交这些军事基地符合两国的长远利益。希腊军队现已占领阿克罗蒂里和德凯利亚，雅典则获得了战略纵深，并控制了关键的机场和港口。这一转变彻底扭转了军事力量对比，使希腊与希腊的统一一方占据了绝对优势。"
 greece.743.a: "一次历史性的收购"
 greece.744.t: "英国拒绝转让"
 greece.744.d: "英国政府拒绝放弃基地区的主权。这些地区仍然是英国领土和英国军事设施，自1960年以来一直如此。"
 greece.744.a: "我们无能为力"
 GRE_western_commitment: "希腊与西方结盟"
 GRE_western_commitment_tt: "$GRE_western_commitment$: $RIGHT|+=0Y$"
 greece.745.t: "施压行动结束"
 greece.745.d: "针对塞浦路斯问题向土耳其施压的行动已经结束。多个大国公开支持希腊的立场，强调东地中海地区需要稳定，以及塞浦路斯人民的权利。雅典现在掌握了重要的外交筹码。根据盟友的支持力度，安卡拉有[GRE_GetTurkeyConcessionChance]的可能性做出让步，接受在塞浦路斯问题上影响力下降。如果土耳其拒绝，爱琴海地区的紧张局势将会升级。"
 greece.745.a: "看看安卡拉如何回应"
 greece.724.t: "雅典要求统一"
 greece.724.d: "希腊政府已正式要求塞浦路斯共和国加入希腊。其条件明确：自愿加入，过渡过程将平稳繁荣。鉴于希族塞人的意愿和土耳其的影响，塞浦路斯接受合并的可能性为[GRE_GetCyprusAcceptanceChance]。尼科西亚政府面临着一个历史性的抉择。"
 greece.724.a: "接受与希腊统一"
 greece.724.b: "拒绝该要求"
 greece.725.t: "雅典要求北方屈服"
 greece.725.d: "希腊现在将目光转向北塞浦路斯，要求土耳其族塞人领导层也接受与雅典合并。土耳其族塞人的立场更为复杂：北塞浦路斯长期以来依赖土耳其的军事保护和文化联系。北塞浦路斯接受合并的可能性为[GRE_GetNorthernCyprusAcceptanceChance]，具体可能性取决于土耳其是否在北约压力下做出让步，以及希腊族塞人的支持力度。如果北塞浦路斯拒绝合并，该岛将继续分裂，武装冲突的可能性也会增加。"
 greece.725.a: "接受与希腊统一"
 greece.725.b: "寻求土耳其保护；拒绝这一要求"
 greece.726.t: "雅典会走多远？"
 greece.726.d: "北塞浦路斯拒绝自愿投降，而土塞政府则表示将寻求土耳其的军事支持以抵抗被吞并。希腊现在面临抉择：继续秘密援助支持统一的武装力量，寄希望于局势和平解决；或者直接派遣希腊武装部队武力吞并北塞浦路斯。直接军事行动意味着退出北约，因为北约不会支持任何旨在从北约成员国势力范围夺取领土的进攻性战争。"
 greece.726.a: "仅限志愿者和物资"
 greece.726.b: "投入希腊武装部队；向北塞浦路斯宣战"
 greece.723.t: "塞浦路斯统一"
 greece.723.d: "塞浦路斯两个国家已在希腊国旗下统一。塞浦路斯南部和北部地区现已完全并入希腊，成为希腊的核心领土。自1974年以来，该岛首次在单一政权的统治下保持完整。这是塞浦路斯民族主义和希腊收复主义数十年努力的最终成果：统一终于实现。"
 greece.723.a: "希腊具有历史意义的一天。"
 GRE_turkey_concedes_tt: "土耳其做出让步：其在塞浦路斯和北塞浦路斯的影响力大幅下降，爱琴海紧张局势缓解，塞浦路斯局势势头增强。"
 GRE_turkey_holds_firm_tt: "土耳其拒绝让步；爱琴海局势紧张升级。"
 GRE_gain_cyprus_tt: "塞浦路斯共和国与希腊合并，成为希腊的核心领土。"
 GRE_gain_north_cyprus_tt: "北塞浦路斯与希腊合并，成为希腊的核心领土。"
 GRE_enosis_demand_refused_tt: "拒绝将招致国际社会的谴责，并迫使雅典选择事态升级的程度；这场危机最终可能演变成战争。"
 GRE_eastern_neighborhood_setup_tt: "打开与土耳其和塞浦路斯关系的文件；在塞浦路斯各社区播下希腊影响的种子。"
 GRE_cypriot_economic_integration_reject_tt: "塞浦路斯拒绝更深层次的经济一体化；希塞关系发展势头放缓。"
 GRE_northern_outreach_accept_tt: "北塞浦路斯接受希腊的投资和文化交流；影响力和发展势头日益增强。"
 GRE_british_bases_accord_accept_tt: "英国将主权基地区割让给希腊；希腊允许英国军队进入该地区。一旦当地民众的配合度足够高，该地区即可完全并入英国。"
 GRE_british_bases_accord_reject_tt: "英国拒绝割让主权基地区。"
 GRE_integrate_sovereign_bases: "整合主权基地区"
 GRE_integrate_sovereign_bases_desc: "阿克罗蒂里和德凯利亚是作为被占领土而非希腊领土来到我们手中的。赢得当地居民的支持并建立起稳定的行政管理体系，我们就能将这些基地正式纳入希腊共和国的版图，使其成为希腊共和国永久的一部分。"
 GRE_sovereign_bases_compliance_tt: "主权基地区域的合作度超过80%。"
 GRE_integrate_sovereign_bases_effect_tt: "希腊在主权基地区获得领土核心"
 GRE_defense_innovation_funding_tt: "每项研究经费都来自国库（在延期支付期间，款项会转入国债）。"
 GRE_cyprus_reunification_accept_tt: "塞浦路斯和北塞浦路斯并入希腊，希腊获得领土核心。"
 GRE_cyprus_reunification_reject_tt: "塞浦路斯政府保持独立；对希腊略有不利影响。"
