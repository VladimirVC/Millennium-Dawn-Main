 JAP_choice: "Political Reboot"
 JAP_choice_desc: "Amid prolonged stagnation and institutional fatigue, trust in politics has wavered, while only the need for reform kept piling up. For this country to move forward, it must first set a clear course for governance and establish a framework for decision-making."
 JAP_left: "Japan's Left Wing"
 JAP_left_desc: "The purpose of politics is not only economic growth, but also to protect people's livelihoods and dignity. We will ensure transparency and rigorously monitor those in power, strengthen workers' bargaining power and the social safety net, and narrow inequality and insecurity. By pursuing governance that does not disregard human rights and by advancing a transition to sustainable energy, we aim to rebuild Japanese society."
 JAP_left_TT: "§YYou can greatly increase the approval rating of one of the left-wing parties!\nHowever, if it is the ruling party, the increase will remain small.§!"
 JAP_information_disclosure: "Strengthen Information Disclosure"
 JAP_information_disclosure_desc: "To restore trust in politics and public administration, we will enforce thorough information disclosure and strengthen the creation, preservation, and release of official documents. This will cut off breeding grounds for corruption and collusion, make policy decisions more transparent, and make reforms easier to advance."
 JAP_left_party_TT: "One of the following must be true:\n§Y$JAP.liberalism$§! is in power.\n§Y$JAP.liberalism_alt$§! is in power.\n§Y$JAP.neutral_Social$§! is in power.\n§Y$JAP.Neutral_Communism$§! is in power.\n§Y$JAP.anarchist_communism$§! is in power.\n"
 JAP_management_documents: "Strict Management of Official Documents"
 JAP_management_documents_desc: "We will organize and preserve records of policymaking decisions, administrative procedural histories, and documents held by public institutions under a unified standard, while strengthening the management system. By preventing the dispersal of records and improper handling, and by improving verifiability and administrative continuity, we aim to improve the reliability and practical efficiency of government operations."
 JAP_digital_archiving: "Digital Archiving of Official Documents"
 JAP_digital_archiving_desc: "We will digitize official records and manage them centrally to streamline procedures for searching, sharing, and preservation. By moving away from paper-centered practices, we will reduce administrative burdens and management costs, and rein in government spending."
 JAP_independent_audits: "Full Independent Auditing"
 JAP_independent_audits_desc: "We will ensure the complete independence of audit bodies and establish an oversight system free from interference by politicians or the bureaucracy. By making it easier to detect collusion and misconduct early, we will advance anti-corruption efforts, and by restoring trust in politics, we will also strengthen the driving force behind policy implementation."
 JAP_eliminating_amakudari: "Eradicate Amakudari"
 JAP_eliminating_amakudari_desc: "We will end the practice of amakudari,which easily fosters collusion between bureaucrats and corporations, and take a scalpel to entrenched vested interests. By improving transparency in appointments and strengthening competition, we will curb corruption while reducing inefficiency and raising productivity."
 JAP_disclosure_of_political_funding: "Full Disclosure of Political Funding"
 JAP_disclosure_of_political_funding_desc: "We will thoroughly disclose the flow of political funds and make donors and spending clearly visible. This will reduce room for opaque money to enter politics and advance anti-corruption efforts, while also strengthening resilience against influence operations by foreign actors."
 JAP_protecting_human_rights: "Protect Human Rights"
 JAP_protecting_human_rights_desc: "We will place the protection of every person's dignity and rights at the core of governance. By correcting discrimination and unfair treatment and building a society where people can live with peace of mind, we will strengthen domestic cohesion and stability."
 JAP_same_sex_partnerships: "Legalize Same-Sex Partnerships"
 JAP_same_sex_partnerships_desc: "We will legally recognize same-sex partners and put in place a system that reduces everyday disadvantages in areas such as medical consent, housing, and inheritance. By respecting diverse forms of family and easing social divisions, we will strengthen domestic stability."
 JAP_employment_disabilities: "Expand Employment for People with Disabilities"
 JAP_employment_disabilities_desc: "We will create an environment where people can work regardless of disability, and expand employment support and reasonable accommodations in the workplace. By broadening job opportunities, we will strengthen the labor force, and by promoting social participation, we will also contribute to domestic stability."
 JAP_prevent_domestic_violence: "Efforts to Prevent Domestic Violence"
 JAP_prevent_domestic_violence_desc: "We will strengthen prevention and early detection of domestic violence, and expand counseling services and protective support. By breaking the cycle of abuse and reducing insecurity and violence in the home, we will enhance social stability."
 JAP_immigrants_and_refugees: "Enhance Immigrant & Refugee Protection"
 JAP_immigrants_and_refugees_desc: "We will strengthen the acceptance and protection of immigrants and refugees, and establish systems for fair screening, living support, and integration assistance. While fulfilling our humanitarian responsibilities, we will also encourage an inflow of labor and channel it into greater social vitality."
 JAP_protecting_labor_union: "Protect Trade Union Rights"
 JAP_protecting_labor_union_desc: "We will clearly guarantee the rights of trade unions and create an environment where collective bargaining and labor-management consultations can be conducted properly. By reflecting the voices of workplaces in institutions and corporate management, we will promote stability in employment and working conditions."
 JAP_subcontracto: "Curb Subcontractor Bullying"
 JAP_subcontracto_desc: "We will crack down on unfair price-cut demands, late payments, and unilateral changes to contract terms imposed on subcontractors, and build a fair trading environment. By protecting the earning base of small and medium-sized businesses, we will strengthen the health of the entire supply chain and contribute to social stability."
 JAP_pressure_wage_increases: "Pressure for Wage Increases"
 JAP_pressure_wage_increases_desc: "We will encourage companies to raise wages and boost household incomes. By supporting consumption and easing insecurity in daily life, we will strengthen social stability and aim for a virtuous cycle in the economy."
 JAP_regulation_temporary_agency_work: "Tighten Regulations on Temporary Agency Work"
 JAP_regulation_temporary_agency_work_desc: "We will curb the abuse of temporary agency labor and advance employment stability and better working conditions. Prioritizing a secure, long-term working environment over short-term efficiency, we will strengthen social stability."
 JAP_ban_non_regular_employment: "Ban Non-Regular Employment"
 JAP_ban_non_regular_employment_desc: "We will reform employment practices that rely on non-regular work and transition to a system in which everyone can obtain stable employment and fair treatment. By reducing insecurity in everyday life and curbing social division, we will strengthen national stability."
 JAP_redistribution: "Prioritize Redistribution"
 JAP_redistribution_desc: "We will shift toward a policy that prioritizes correcting income inequality and economic insecurity, allocating resources more generously to those who need support. Through redistribution, we will curb social division, increase people's sense of security, and aim for stable governance."
 JAP_reducing_medical_costs: "Reduce Out-of-Pocket Medical Costs"
 JAP_reducing_medical_costs_desc: "We will reduce out-of-pocket medical expenses and build a system in which people can receive necessary treatment without hesitation. By easing financial anxiety for households and curbing the widening of health disparities, we will strengthen social stability."
 JAP_care_workers: "Boost Care Worker Pay & Conditions"
 JAP_care_workers_desc: "We will improve wages and working conditions for care workers, and promote recruitment and retention of the workforce. By strengthening continuity of care, easing the burden on families, and supporting labor force participation, we will contribute to social stability."
 JAP_housing_support: "Expand Housing Support"
 JAP_housing_support_desc: "We will expand housing support to reduce rent burdens and help people secure stable housing. By easing housing insecurity and supporting stability in everyday life, we will curb social division and strengthen domestic stability."
 JAP_student_loans: "Reduce Student Loan Burdens"
 JAP_student_loans_desc: "We will reduce the repayment burden of student loans and lower barriers to higher education and reskilling. By advancing human capital development as an investment in the future, we will support progress in research and technology."
 JAP_focusing_renewable_energy: "Focus on Renewable Energy"
 JAP_focusing_renewable_energy_desc: "We will make expanding the adoption of renewable energy a national priority and accelerate technological development and demonstration investment. By strengthening the foundation for the energy transition, we will support future supply stability and improve industrial competitiveness."
 JAP_renewable_energy_feed_in_tariffs: "Strengthen Feed-in Tariffs for Renewables"
 JAP_renewable_energy_feed_in_tariffs_desc: "We will strengthen the feed-in tariff system for renewable energy, increasing investment predictability and accelerating deployment. This will support the expansion of renewable power supply and reinforce the foundation for the energy transition."
 JAP_energy_efficiency: "Strengthen Energy Efficiency Standards"
 JAP_energy_efficiency_desc: "We will strengthen energy efficiency standards and promote efficiency improvements in housing and appliances. By reducing unnecessary electricity consumption, we will ease the energy burden on households and society as a whole."
 JAP_nuclear_phaseout: "Declare an End to Nuclear Power"
 JAP_nuclear_phaseout_desc: "We will clearly commit to a policy of not relying on nuclear power and adopt a stance as a non-nuclear nation. As an earthquake-prone country, we take safety concerns seriously and will advance a transition to a power system centered on renewable energy, aiming for a sustainable energy policy."
 JAP_leading_disarmament: "Lead Disarmament Diplomacy"
 JAP_leading_disarmament_desc: "We will make disarmament and de-escalation pillars of our foreign policy and seek regional stability through dialogue and confidence-building. We will prioritize solutions that do not rely on force and work to improve relations with other countries."
 JAP_restricting_arms_exports: "Restrict Arms Exports"
 JAP_restricting_arms_exports_desc: "We will restrict arms exports and clearly signal a diplomatic stance that is less likely to fuel military tensions. By prioritizing disarmament and confidence-building, we will advance dialogue toward regional stability."
 JAP_principle_of_no_armed_forces: "Reaffirm the Principle of No Military Forces"
 JAP_principle_of_no_armed_forces_desc: "We will reaffirm the principle of maintaining no military forces and clearly state a stance of governance that does not rely on military power. We will place pacifism at the core of our policy and emphasize security through diplomacy and international cooperation."
 JAP_abrogating_us_japan_security_treaty: "Abolish the Japan U.S. Security Treaty"
 JAP_abrogating_us_japan_security_treaty_desc: "We will withdraw from the Japan U.S. security framework and shift to an independent security policy that does not rely on dependence on the United States. This will expand the freedom of our foreign policy and more clearly assert our sovereignty and independence."
 JAP_dissolving_sdf: "Dissolve the Self-Defense Forces"
 JAP_dissolving_sdf_desc: "We will dissolve the Self-Defense Forces and shift toward governance that does not rely on military power. By redirecting resources and effort previously devoted to defense to the civilian sector, we will prioritize strengthening industry and the foundations of everyday life and accelerate domestic development."
 JAP_army_delete_TT: "§RAll land forces will be removed!§!"
 JAP_right: "Japan's Right Wing"
 JAP_right_desc: "We emphasize state capacity and social order, advancing stronger public security, crisis response, and a foreign and security policy that puts national interests front and center. We aim for growth through regulatory reform and revitalizing business activity, and seek to rebuild the country on a foundation of tradition and community values."
 JAP_right_TT: "§YYou can greatly increase the approval rating of one of the right-wing parties!\nHowever, if it is the ruling party, the increase will remain small.§!"
 JAP_strengthen_military_power: "Policy to Strengthen Military Power"
 JAP_strengthen_military_power_desc: "In light of changes in the security environment, we will clearly establish strengthening our defense posture as a national policy. By enhancing deterrence, we will prevent threats before they materialize and demonstrate our commitment to protecting public safety and national sovereignty."
 JAP_right_party_TT: "One of the following must be true:\n§Y$JAP.conservatism$§! is in power.\n§Y$JAP.socialism$§! is in power.\n§Y$JAP.Neutral_conservatism$§! is in power.\n§Y$JAP.Neutral_conservatism2$§! is in power.\n§Y$JAP.Neutral_conservatism3$§! is in power.\n§Y$JAP.Neutral_conservatism4$§! is in power.\n§Y$JAP.Neutral_Libertarian$§! is in power.\n§Y$JAP.Nat_Populism$§! is in power.\n"
 JAP_allow_overseas_deployment: "Allow Overseas Deployment of the SDF"
 JAP_allow_overseas_deployment_desc: "Taking the international situation and cooperation with allies into account, we will clearly state a policy that permits overseas deployments by the Self-Defense Forces. By participating in international missions, we will strengthen deterrence and influence and protect national interests and security more proactively."
 JAP_international_missions: "Legal Framework for International Missions"
 JAP_international_missions_desc: "We will put in place the legal basis and procedures for participating in international missions, establishing a system in which the Self-Defense Forces can operate under consistent rules. This will reduce uncertainty on the ground and enable more reliable execution of international cooperation."
 JAP_revising_use_weapons: "Review Rules on the Use of Weapons"
 JAP_revising_use_weapons_desc: "We will review the standards and procedures for the use of weapons to match the realities of international missions and crisis response. By clarifying the scope of authority and responsibility necessary to carry out missions, we will establish a system in which the Self-Defense Forces can appropriately protect themselves and others."
 JAP_exclusive_defense: "Maintain an Exclusively Defensive Posture"
 JAP_exclusive_defense_desc: "We will strictly uphold an exclusively defensive posture as the guiding principle of our security policy, clearly limiting the use of defense capabilities to the scope of preventing attacks on our country. While maintaining deterrence, we will avoid excessive military expansion and demonstrate a stance that is less likely to heighten tensions with neighboring countries."
 JAP_exclusive_defense_TT: "§YThis national focus moves the Balance of Power closer to Level 2!§!"
 JAP_collective_self_defense: "Policy to Allow Collective Self-Defense"
 JAP_collective_self_defense_desc: "On the view that attacks on allies can also directly affect our own security, we will clearly state a policy that allows the exercise of collective self-defense. This will strengthen deterrence and the effectiveness of alliances, and build a more proactive security framework."
 absolute_majority_popularity_66_TT: "The coalition must have more than 66% popularity."
 JAP_prioritizing_order: "Prioritize Order"
 JAP_prioritizing_order_desc: "We will position social order and public safety as top priorities of governance. By valuing rules and responsibility, and maintaining public security and stable administration, we will rebuild the foundations of the nation."
 JAP_strengthen_public_security: "Comprehensive Public Security Plan"
 JAP_strengthen_public_security_desc: "We will conduct a full review of the public security system and formulate a comprehensive plan covering equipment, personnel, and information coordination. By streamlining operations on the ground while strengthening police capabilities, we will reinforce crime deterrence and ensure social stability."
 JAP_against_organized_crime: "Enhance Anti Organized Crime Measures"
 JAP_against_organized_crime_desc: "We will intensify crackdowns on organized crime and advance efforts to cut off funding sources and expand investigative capacity. By restoring domestic public safety, we will strengthen social stability, and we will also build a national system that is less vulnerable to infiltration and influence operations by external actors."
 JAP_against_terrorist_financing: "Counter Terrorist Financing Measures"
 JAP_against_terrorist_financing_desc: "We will strictly monitor financial flows and fully enforce systems to cut off funding to terrorist organizations and extremist groups. By strengthening coordination between financial authorities and investigative agencies, we will protect domestic security and increase resilience against external influence operations, while enhancing social stability."
 JAP_counter_espionage: "Build Anti-Espionage Framework"
 JAP_counter_espionage_desc: "We will strengthen countermeasures against intelligence activities and put in place systems to protect classified information and enhance monitoring. By deterring infiltration and covert operations by external actors and safeguarding national decision-making, we will secure domestic stability."
 JAP_strengthening_cabinet: "Strengthen Cabinet Authority"
 JAP_strengthening_cabinet_desc: "We will strengthen the Cabinet's chain of command and coordination functions to improve the speed and consistency of decision-making. By building a system capable of moving swiftly on crisis response and key policies, we will reinforce decisive leadership in national governance."
 JAP_cabinet_personnel_bureau: "Cabinet Personnel Bureau"
 JAP_cabinet_personnel_bureau_desc: "We will establish a system that enables the Cabinet to centrally oversee personnel matters, strengthening transparency and control over senior appointments. By promoting the right people in the right positions, we will streamline the operation of the bureaucracy and enhance the government's capacity to implement policy."
 JAP_breaking_down_bureaucratic_siloing: "Break Down Bureaucratic Silos"
 JAP_breaking_down_bureaucratic_siloing_desc: "We will reform siloed administration across ministries and strengthen information sharing and cross-ministerial coordination. By reducing duplicated procedures and bottlenecks, we will streamline public administration and accelerate the execution of public investment and projects."
 JAP_policy_evaluation_and_kpis: "Introduce Policy Evaluation and KPIs"
 JAP_policy_evaluation_and_kpis_desc: "We will introduce an evaluation system and KPIs so that policy outcomes can be verified with measurable data. By reviewing low-impact measures and concentrating limited resources on high-effect areas, we will improve administrative efficiency and raise economic productivity."
 JAP_national_security_council: "Establish a National Security Council"
 JAP_national_security_council_desc: "We will centralize security-related information and decision-making within the Cabinet and build a system that enables rapid and consistent decisions. By strengthening crisis response capabilities and enhancing coordination with allies and relevant agencies, we will reinforce deterrence."
 JAP_emergency_powers: "Emergency Powers Clause"
 JAP_emergency_powers_desc: "In preparation for extraordinary situations such as major disasters or armed attacks, we will clarify the authorities and procedures needed in emergencies. While maintaining peacetime oversight, we will speed up crisis response and strengthen the chain of command, securing national stability and the defense posture."
 JAP_regulatory_reform: "Growth Through Regulatory Reform"
 JAP_regulatory_reform_desc: "We will review regulations and procedures, reduce administrative burdens, and promote business activity and investment. By making it easier to launch new ventures and develop facilities, we will increase the pace of economic growth."
 JAP_postal_privatization: "Postal Privatization"
 JAP_postal_privatization_desc: "We will advance the privatization of postal services, revising a government-led system to improve the efficiency of public administration. While incorporating market principles aims to strengthen business activity and the tax base, the reform can also provoke strong opposition over its merits and intensify political conflict."
 JAP_postal_privatization_TT: "§YAn event will fire where you choose whether to hold a dissolution general election!§!"
 JAP_second_wave_privatization: "Second Stage of Privatization"
 JAP_second_wave_privatization_desc: "We will push privatization reforms further and review the role of the public sector and the way public services are operated. By reducing administrative inefficiency and encouraging investment and business activity, we will boost economic dynamism."
 JAP_special_zones: "National Strategic Special Zones"
 JAP_special_zones_desc: "We will create regulatory exceptions in designated areas and intensively promote business entry and new investment. By advancing demonstration projects and commercialization beyond existing institutional barriers, we will accelerate growth driven by private-sector dynamism and revitalize local economies."
 JAP_expansion_regulatory_reform_zones: "Reform Zones Nationwide"
 JAP_expansion_regulatory_reform_zones_desc: "We will scale up the results achieved in special zones nationwide, shifting regulatory reform from a regional exception to a national standard. By lowering barriers to entry and investment, we will encourage new ventures and promote economic revitalization across the country."
 JAP_new_market_entry: "Promote New Market Entry"
 JAP_new_market_entry_desc: "We will lower barriers to entry and support entrepreneurship and the launch of new businesses. By fostering competition and innovation, we will raise productivity and strengthen the tax base."
 JAP_new_technologies: "Welcome New Technologies"
 JAP_new_technologies_desc: "We will actively support the adoption and commercialization of new technologies, accelerating research and development and industrial innovation. By fostering new growth sectors, we will strengthen national competitiveness."
 JAP_key_industries_back_home: "Reshore Critical Industries"
 JAP_key_industries_back_home_desc: "We will build a system that enables stable domestic production of critical industries, strengthening supply chains and increasing self-reliance in key sectors. By encouraging domestic investment, we will reinforce the industrial base and create a structure that is less vulnerable to shifts in the international environment."
 JAP_economic_security: "Establish Economic Security"
 JAP_economic_security_desc: "We will review supply arrangements for critical materials and key industries, and manage risks in technology, capital, and information to establish economic security. This will strengthen national self-reliance and the sustainable competitiveness of businesses, supporting stable growth."
 JAP_patriotic_education: "Patriotic Education"
 JAP_patriotic_education_desc: "We will promote education that emphasizes the nation's history, culture, and civic responsibility, strengthening social cohesion and a sense of shared norms. By building a foundation that is less susceptible to external influence, we will reinforce domestic stability."
 JAP_fundamentals_of_education: "Redefine Education Basics"
 JAP_fundamentals_of_education_desc: "We will review the aims and standards of education and redefine, as a national policy, the development of academic ability, foundational knowledge, and practical skills. By prioritizing education investment, we will strengthen the foundation for human capital development and research and development."
 JAP_dotoku_education: "Dotoku Education"
 JAP_dotoku_education_desc: "We will place greater emphasis on Dotoku education and cultivate values such as civic-mindedness, responsibility, and consideration for others within school education. By strengthening social norms and deepening cohesion in local communities, we will contribute to domestic stability."
 JAP_national_flag_and_anthem: "Respect the Flag and National Anthem"
 JAP_national_flag_and_anthem_desc: "We will clearly affirm respect for the flag and national anthem, strengthening a sense of national belonging and social unity. This will reinforce cohesion in times of crisis and build a foundation that is less susceptible to external influence."
 JAP_family_policy: "Strengthen Family Policy"
 JAP_family_policy_desc: "We will respect the values of households and families and expand measures that support childrearing and daily life. By creating an environment in which people can build families with peace of mind, we will strengthen the future demographic base and contribute to social stability."
 JAP_glorious_decade: "Toward a Decade of Brilliance"
 JAP_inflation_target: "Clarifying Policy Commitment"
 JAP_down_long_term_interest_rates: "Lowering Long-Term Interest Rates"
 JAP_down_long_term_interest_rates_desc: "We will keep long-term interest rates low and stable, reducing financing costs for businesses and households. By supporting investment, capital renewal, and home purchases, and thereby underpinning demand and lifting the economy, we will also pave the way for a recovery in tax revenues."
 JAP_cash_benefits: "Cash Benefits for Households"
 JAP_cash_benefits_desc: "We will provide direct support to households to prevent a drop in consumption and underpin the economy. By creating an environment in which people can continue their day-to-day spending even when uncertainty is high, we will help demand recover."
 JAP_public_investment: "Sustained Public Investment"
 JAP_public_investment_desc: "To prevent a downturn from deepening, we will continue public investment in a planned manner and support demand. At the same time, we will strengthen logistics, disaster prevention, and core living infrastructure, creating an environment in which private investment can move more readily."
 JAP_special_inspection_banks: "Special Inspections of Banks"
 JAP_special_inspection_banks_desc: "To restore the soundness of the financial system, we will conduct thorough examinations of banks' assets. By clarifying the true state of non-performing loans and ending the deferral of losses and opaque handling, we will create a foothold to halt the chain reaction of credit anxiety and tightened lending."
 JAP_population_tax_tt: "The population tax rate is 35 or lower."
 JAP_public_capital_injection_banks: "Public Capital Injections into Banks"
 JAP_public_capital_injection_banks_desc: "To prevent financial instability from spreading, we will strengthen banks' capital bases and maintain the supply of credit. By calming anxiety among depositors and markets and keeping funds flowing to businesses and households, we will avoid a sudden deterioration of the economy."
 JAP_disposal_non_performing_loans: "Dispose of Dangerous Bad Loans"
 JAP_disposal_non_performing_loans_desc: "Clear away the dangerous bad loans eating at the financial system and lighten the burden on the banks' balance sheets."
 JAP_bank_supervision: "Strengthening Bank Supervision"
 JAP_bank_supervision_desc: "Rather than treating inspections and corrective measures as a one-off, we will permanently strengthen the supervisory framework. By enforcing disclosure and governance and preventing a repeat of weak risk management and opaque handling, we will stabilize trust in the financial system."
 JAP_business_assessment: "Fair Business Assessment"
 JAP_business_assessment_desc: "To accurately judge companies' capabilities and risks, we will objectively assess business profitability and future prospects. Without relying on keeping firms afloat or prolonging them, we will distinguish areas that should be rebuilt from those that should be restructured, and lay the groundwork for capital and talent to flow into growth sectors."
 JAP_corporate_debt_restructuring: "Corporate Debt Restructuring"
 JAP_corporate_debt_restructuring_desc: "We will address excessive debt burdens and secure the time and breathing room needed for recovery. By moving away from a state of being consumed by interest payments and repayments,and enabling resources to be directed toward investment, employment, and business transformation,we will break the chain of stagnation."
 JAP_support_restructuring_unprofitable_sectors: "Help Streamlining Unprofitable Units"
 JAP_support_restructuring_unprofitable_sectors_desc: "We will provide support to companies that are moving to reorganize unprofitable divisions so that restructuring can proceed smoothly. While limiting sudden deterioration in employment and shocks to local communities, we will encourage strategic focus and help accelerate the transition to a sustainable structure."
 JAP_m_and_a: "M&A and Business Consolidation"
 JAP_m_and_a_desc: "We will encourage mergers and corporate restructuring to eliminate duplicative investment and excess capacity. Through economies of scale and the concentration of management resources, we will raise productivity and strengthen R&D, aiming to restore competitiveness."
 JAP_corporate_revitalization: "Corporate Revitalization"
 JAP_corporate_revitalization_desc: "We will bring restructuring to a new stage and rebuild corporate foundations in both financial and operational terms. By addressing excessive burdens and inefficiencies and moving companies into a position where they can step forward with investment, hiring, and wage increases, we will solidify a private-sector-led recovery."
 JAP_expectations_escaping_deflation: "Restoring Growth Expectations"
 JAP_expectations_escaping_deflation_desc: "By resolving non-performing loans and unwinding excessive debt, we will shift the economy's focus from \"defense\" to \"offense.\" If companies resume spending on investment, R&D, and people,and households regain a clearer outlook for the future,a virtuous cycle of productivity and wages will be more likely to take hold. We will build the foundation needed to fully restart the recovery of competitiveness."
 JAP_public_private_calls_wage_increases: "Public Private Calls for Wage Increases"
 JAP_public_private_calls_wage_increases_desc: "The government will take the lead and work with the business community to broaden momentum for wage increases. By linking improved corporate profits to higher wages and strengthening household purchasing power, we will support demand recovery and price stability."
 JAP_phased_increases_to_the_minimum_wage: "Gradual Increases in the Minimum Wage"
 JAP_phased_increases_to_the_minimum_wage_desc: "We will raise the minimum wage in stages to lift the incomes of working people. By strengthening the purchasing power of lower-income households, we will support a recovery in domestic demand and create an environment in which wage growth can spread."
 JAP_promoting_labor_mobility: "Promoting Labor Mobility"
 JAP_promoting_labor_mobility_desc: "We will create conditions that make it easier for talent to move into growth sectors and advance the reallocation of the workforce. By lowering barriers to job changes and reemployment and supporting skills upgrading, we will drive industrial renewal and raise productivity."
 JAP_competition_service_sector: "Promoting Competition in the Service Sector"
 JAP_competition_service_sector_desc: "We will encourage entry and competition in the service sector and address inefficiencies and price rigidities that have been contributing to stagnation. By reviewing regulations and entrenched practices, we will improve the business environment and shift toward a market in which better services are more readily chosen."
 JAP_improving_domestic_service_sector: "Better Conditions for Domestic Services"
 JAP_improving_domestic_service_sector_desc: "We will create conditions in which domestic service industries can grow and expand the economy's capacity to absorb demand. By reviewing procedures and practices that burden frontline operations and fostering an environment that supports investment and human resource development, we will contribute to a sustained recovery in domestic demand."
 JAP_international_liberalization_service_sector: "International Opening of the Service Sector"
 JAP_international_liberalization_service_sector_desc: "We will open the service sector internationally and bring in external competition and know-how. By encouraging entry by foreign firms and aligning with international standards,thereby expanding choices for users,we will address the closed nature of the domestic market and drive revitalization."
 JAP_revitalization_economy: "Revitalizing the Japanese Economy"
 JAP_revitalization_economy_desc: "We have advanced the reconstruction of the financial system and corporate sector, and set a path toward recovering demand and improving wages. By removing the causes of stagnation one by one and creating an environment in which households and businesses can see the future more clearly, we will entrench momentum toward growth."
 JAP_work_style_reform: "Work-Style Reform"
 JAP_work_style_reform_desc: "We will begin by correcting excessively long working hours and creating an environment in which people can choose diverse ways of working. By supporting both employment stability and work life balance, we will reduce burdens on the ground and build a foundation that enables people to keep contributing and thriving."
 JAP_cap_on_overtime_hours: "Setting Limits on Overtime Hours"
 JAP_cap_on_overtime_hours_desc: "To curb excessively long working hours, we will set clear caps on overtime. By reducing health harms and the risk of overwork and by ensuring proper labor management, we will institutionalize improvements in working practices."
 JAP_mandating_paid_leave: "Mandating Paid Leave"
 JAP_mandating_paid_leave_desc: "We will institutionalize an environment in which taking leave is easier and require employees to take a minimum amount of paid leave. By ensuring adequate rest and reducing physical and mental health issues as well as turnover, we will promote retention in the workplace and more sustainable ways of working."
 JAP_digitalization_management: "Support for Digital Time & Attendance"
 JAP_digitalization_management_desc: "We will promote the digitization of time and attendance management to make tracking and managing working hours more accurate. By reducing administrative burdens on the ground and ensuring thorough compliance with regulations, we will put in place systems that prevent excessive work from being overlooked."
 JAP_equal_pay_for_equal_work: "Equal Pay for Equal Work"
 JAP_equal_pay_for_equal_work_desc: "We will correct unreasonable disparities in treatment based on employment status and ensure that the same work receives the same level of pay and conditions. By strengthening workers' sense of fairness and improving talent retention and recruitment,while reducing the divide between regular and non-regular employment,we will build a more stable employment environment."
 JAP_minimum_rest: "Minimum Rest Between Shifts"
 JAP_minimum_rest_desc: "We will ensure a set rest period between the end of one workday and the start of the next to prevent fatigue from accumulating due to consecutive work. By protecting time for sleep and recovery and reducing health problems and mistakes, we will embed a sustainable work schedule."
 JAP_flexible_working: "Expanding Flextime"
 JAP_flexible_working_desc: "We will increase flexibility in working hours, making it easier for people to choose work arrangements that fit their circumstances. By easing commuting congestion and supporting the balance of work with childcare and caregiving, we will expand an environment in which people can continue working."
 JAP_ideal_working_styles: "An Ideal Way of Working"
 JAP_ideal_working_styles_desc: "We have established work practices that do not rely on long hours and created an environment in which people with diverse circumstances can continue working with peace of mind. Through systems that make it normal to rest when needed and work flexibly when necessary, we will make work life balance the standard."
 JAP_basic_policy_declining_birthrate_society: "Declining Birthrate Policy Outline"
 JAP_basic_policy_declining_birthrate_society_desc: "We will position addressing the declining birthrate as the nation's top priority and comprehensively organize policies that support childrearing and everyday life. By creating an environment in which families can plan for the future and promoting the balance of work and parenting, we will build a foundation for improving the birthrate."
 JAP_zero_waiting: "Zero Waiting-List Plan for Childcare"
 JAP_zero_waiting_desc: "We will expand childcare capacity and build a system in which families who need it can reliably access childcare services. By securing more childcare workers and improving facilities, we will reduce barriers that prevent parents from balancing childrearing and work."
 JAP_increasing_childbirth_allowance: "Increasing the Childbirth Allowance"
 JAP_increasing_childbirth_allowance_desc: "We will reduce the burden of upfront costs associated with childbirth and create an environment in which people can approach childbirth with peace of mind. By easing financial anxiety and making it easier to choose to have children, we will help support the birthrate."
 JAP_free_early_childhood_education: "Free Early Childhood Education and Childcare"
 JAP_free_early_childhood_education_desc: "We will reduce the financial burden of early childhood education and childcare and support the household budgets of families raising children. By creating an environment that prevents widening gaps in educational opportunity and by promoting the balance of work and parenting, we will help build a society in which having children is easier."
 JAP_parental_leave: "Promoting Parental Leave"
 JAP_parental_leave_desc: "We will create an environment in which parental leave is easier to take and expand options for continuing work after childbirth. By strengthening workplace understanding and the operation of these systems,and building a framework in which both men and women can participate in childrearing,we will share the burden within families and ease anxieties about having children."
 JAP_child_allowances: "Expanding Child Allowances"
 JAP_child_allowances_desc: "To reduce the ongoing costs of raising children, we will expand child allowances. By making household finances more predictable and easing anxieties about education and daily living, we will support the choice to have children."
 JAP_fertility_treatment: "Insurance Coverage for Fertility Treatment"
 JAP_fertility_treatment_desc: "We will reduce the financial burden of fertility treatment and create an environment in which those who need it can access treatment more easily. By lowering cost barriers, we will expand options toward pregnancy and childbirth and make it easier for people to realize their hopes."
 JAP_raising_children_is_easier: "A Child-Friendly Society"
 JAP_raising_children_is_easier_desc: "We have built systems that support the burdens of childrearing across society as a whole and expanded an environment in which people can start families with peace of mind. By combining childcare, education, and financial support and making it normal to balance work and parenting, we will ease anxieties about the future and help improve the birthrate."
 JAP_save_ice_age_generation: "Save the Employment Ice Age Generation!"
 JAP_save_ice_age_generation_desc: "We will confront the unstable employment, low wages, and delayed skills development faced by the employment ice age generation as a challenge for society as a whole. By securing job opportunities and creating pathways for second chances, and by restoring an environment where people can achieve stability and plan for the future, we will prevent division and stagnation from being prolonged."
 JAP_hello_work: "Revamping Hello Work"
 JAP_hello_work_desc: "We will transform job placement services from a \"just-in-case counter\" into a practical institution that supports people all the way through reemployment. By making job quality more visible and improving the precision of matching, we will build a system in which the right jobs and support reach those who need them."
 JAP_expanding_social_insurance_coverage: "Expanding Social Insurance Coverage"
 JAP_expanding_social_insurance_coverage_desc: "We will broaden eligibility so that people who need social insurance can enroll regardless of how they work. By reducing gaps in the system and easing anxieties about healthcare, pensions, and employment, we will stabilize the living foundations of groups that are more likely to be concentrated in non-regular employment."
 JAP_vocational_training: "Expanding Vocational Training"
 JAP_vocational_training_desc: "We will broaden opportunities for vocational training so people can acquire the skills needed as a foundation for a fresh start. By supporting transitions into high-demand fields and linking reskilling to employment, we will build a foothold to break out of long-term stagnation."
 JAP_digital_reskilling: "Digital Reskilling Package"
 JAP_digital_reskilling_desc: "We will provide a bundled set of support that enables step-by-step relearning,from basic skills that are applicable in the digital field to practical, job-ready capabilities. By reducing the burden of study and putting in place training and certifications that lead to employment, we will broaden pathways for a fresh start even for those without prior experience."
 JAP_converting_regular_employment: "Subsidies for Regularization"
 JAP_converting_regular_employment_desc: "We will support companies that promote the transition from non-regular to regular employment, increasing stable job opportunities. By breaking entrenched employment patterns and expanding an environment in which people can build careers and plan their lives, we will prevent the employment insecurity of the ice age generation from becoming long-term."
 JAP_job_change_market: "Improving the Mid-Career Job Market"
 JAP_job_change_market_desc: "We will build a mid-career hiring and job-change system that is less dependent on age or background, expanding opportunities for a fresh start. By improving the transparency of job postings and evaluation criteria and creating an environment in which experience and skills are properly recognized, we will facilitate smoother labor mobility."
 JAP_rent_housing_support: "Rent Subsidies and Housing Support"
 JAP_rent_housing_support_desc: "We will provide support to reduce housing insecurity so it does not prevent people from choosing employment or relocating. By easing rent burdens and strengthening mechanisms to secure housing, we will help people rebuild their lives and make a fresh start."
 JAP_support_marriage_and_starting_a_new: "Marriage & New Household Support"
 JAP_support_marriage_and_starting_a_new_desc: "We will ease the burden of upfront costs associated with marriage or beginning to live together and create an environment in which starting a new life is easier. By lowering barriers related to housing, household finances, and administrative procedures,and reducing anxiety about future planning,we will expand options for forming families."
 JAP_reviving_lost_generation: "Reviving the Lost Generation"
 JAP_reviving_lost_generation_desc: "We have worked to break the entrenchment of unstable employment by advancing reskilling, reemployment, and the rebuilding of living foundations as an integrated package. By securing employment and working conditions that allow the employment ice age generation to plan for the future,and by creating an environment in which they can take steps toward forming families and building assets,we will overcome long-term division."
 JAP_industries: "Japan's Industries"
 JAP_industries_desc: "From locally rooted agriculture, forestry, and fisheries to manufacturing, services, and advanced technologies, we will bring out Japan's strengths across the entire industrial landscape. While supporting domestic employment and supply capacity, we will balance export competitiveness with investment in new growth fields, carrying our industrial foundation forward into the next era."
 JAP_rice_and_sake: "Rice and Sake"
 JAP_rice_and_sake_desc: "Rice is the staple food of the Japanese people and the foundation that supports both the dining table and rural communities. And Japanese sake made from rice embodies a distinctly \"Japanese\" character that can be proudly shared at home and abroad, with its personality shaped by each region's climate and water, and by the craftsmanship of its breweries."
 JAP_wagyu: "Wagyu"
 JAP_wagyu_desc: "Wagyu is one of Japan's signature premium foods, known for its finely marbled texture and rich flavor. Building on strengths in husbandry techniques and quality control, we will continue to support Japan's food culture while developing it into an industry that can also capture overseas demand as a brand."
 JAP_seafood: "Seafood of an Island Nation"
 JAP_seafood_desc: "As an island nation, Japan has lived alongside the sea. The seafood nurtured by its diverse waters is a vital resource that supports everything from everyday meals to regional industries, and it is also a defining feature that shapes Japan's food culture."
 JAP_automobiles: "Japan's Automobiles"
 JAP_automobiles_desc: "Japan's automotive industry has grown on the strength of high quality and reliability, as well as a deep and resilient parts supply network. Manufacturers such as Toyota, Honda, Nissan, Mazda, Subaru, Suzuki, Mitsubishi Motors, and others form the core supporting domestic employment and exports, while working to adapt to next-generation technologies and maintain competitiveness."
 JAP_japanese_brand: "Establishing the Japan Brand"
 JAP_japanese_brand_desc: "Building on our strengths in quality and trust, we will consistently present the value of our products and services as the \"Japan brand.\" By refining elements such as origin, technology, design, and safety,and clearly communicating why we are chosen both at home and abroad,we will build competitiveness that does not depend on price competition."
 JAP_semiconductor: "Semiconductors and Electronic Components"
 JAP_semiconductor_desc: "Semiconductors and electronic components are strategic fields that underpin every industry. By leveraging our strengths in areas such as materials, manufacturing equipment, and components, and by strengthening R&D and supply capacity, we will support Japan's industrial foundation and technological competitiveness."
 JAP_machinery_that_supports_manufacturing: "Building the Machines Behind Manufacturing"
 JAP_machinery_that_supports_manufacturing_desc: "What underpins Japanese manufacturing at its core is precision machinery for processing, assembly, and inspection. By refining technologies for machine tools and production equipment,and continuing to build machines that meet the needs on the ground,we will support the quality and supply capacity of a wide range of industries."
 JAP_small_factory_craftsmanship: "Protecting Small Factory Craftsmanship"
 JAP_small_factory_craftsmanship_desc: "The skills cultivated by small workshops,such as machining, die and mold making, and surface treatment,are a foundation that supports Japanese manufacturing. By securing the next generation of skilled workers, promoting the transfer of know-how, and improving the business environment, we will ensure these locally rooted capabilities are not lost and are carried forward to the next generation."
 JAP_broadband: "Developing Broadband Infrastructure"
 JAP_broadband_desc: "We will develop broadband infrastructure so that stable, high-speed connectivity is available nationwide. By narrowing the gap between urban and rural areas and supporting the online expansion of business activity, education, and public services, we will strengthen the foundation of a digital society."
 JAP_games_are_fun: "Games Are Fun!"
 JAP_games_are_fun_desc: "Games are one of Japan's entertainment cultures that the country can proudly present to the world. Nintendo has brought play to a wide range of generations through home consoles and character IP, while Sony (PlayStation) has built a global market centered on hardware and online services. By linking creativity with technology, we will further develop this field as a pillar that supports domestic industry and Japan's ability to communicate and compete globally."
 JAP_cool_japan: "Cool Japan Digital Exports"
 JAP_cool_japan_desc: "We will build systems to deliver Japanese content,such as anime, games, music, and video,continuously through digital markets. By strengthening distribution, translation, and rights management and capturing overseas demand, we will enhance both Japan's cultural reach and the profitability of these industries."
 JAP_port_logistics: "Modernizing Port Logistics"
 JAP_port_logistics_desc: "We will upgrade logistics functions at ports,such as cargo handling, storage, and customs clearance,so the flow of imports and exports is less likely to be disrupted. By improving procedural efficiency and enhancing facilities, we will strengthen supply-chain resilience while maintaining competitiveness in international logistics."
 JAP_fiber_optic_rollout: "Nationwide Expansion of Fiber-Optic Networks"
 JAP_fiber_optic_rollout_desc: "We will expand the rollout of fiber-optic networks to bring fast, stable connectivity to every part of the country. By narrowing the connectivity gap between urban and rural areas, we will establish the infrastructure that supports remote work, learning, and the online transformation of business activity."
 JAP_diplomacy: "Japan's Diplomacy"
 JAP_diplomacy_desc: "Rebuilding ties with the world and redefining Japan's role in the international community."
 JAP_diplomacy_idea_TT: "§YAs you progress through the diplomacy focus, additional modifiers will be added to this national spirit!§!"
 JAP_friendship_asean: "Improving Relations with ASEAN"
 JAP_friendship_asean_desc: "The Japanese government will work to improve relations with ASEAN countries, advancing the restoration of trust and the promotion of dialogue. For Japan, ASEAN is an indispensable and important partner in both economic and security terms, and its unity and stability will shape the future of the entire region."
 JAP_not_asean_war_TT: "There is at least one country with the \"ASEAN Member\" national spirit, and Japan is not at war with any country that has the \"ASEAN Member\" national spirit."
 JAP_chiang_mai: "Chiang Mai Initiative"
 JAP_chiang_mai_desc: "Through the Chiang Mai Initiative, Japan strengthens regional financial cooperation to support the economic stability and cohesion of ASEAN nations."
 JAP_quantitative_oda: "Quantitative ODA"
 JAP_quantitative_oda_desc: "Through large-scale ODA investment in core infrastructure such as transportation, ports, and energy, Japan supports ASEAN economic growth and regional connectivity."
 JAP_qualitative_oda: "Qualitative ODA"
 JAP_qualitative_oda_desc: "By partnering with local enterprises and institutions, Japan promotes human capital development and democratic values, enhancing its influence across ASEAN."
 JAP_security_south_china_sea: "South China Sea Security Posture"
 JAP_security_south_china_sea_desc: "Backed by the trust of ASEAN nations, Japan initiates a framework for neutral and peaceful maritime security in the South China Sea."
 JAP_away_dependence: "Break Away from U.S. Dependency"
 JAP_away_dependence_desc: "Japan begins reexamining the nature of its long-standing ties, seeking to expand its strategic options and autonomy. In areas such as economy, technology, and security, we pursue a course shaped by our own vision for the future."
 JAP_development_production: "Establish Domestic Production Chains"
 JAP_development_production_desc: "To secure national defense independently, we will establish a domestic system capable of producing weapons and materials within Japan."
 JAP_japanese_doctrine: "Formulate a Japanese Doctrine"
 JAP_japanese_doctrine_desc: "We will establish an independent Japanese security doctrine, enabling flexible responses tailored to our strategic environment."
 JAP_recalling_researchers: "Recall Overseas Researchers"
 JAP_recalling_researchers_desc: "Create incentives for Japanese scientists working in the U.S. to return home. Universities and national labs offer fast-track posts, upgraded facilities and competitive grants, aiming to reverse decades of talent outflow and rebuild domestic research strength."
 JAP_japanese_cloud: "Kasumigaseki Cloud"
 JAP_japanese_cloud_desc: "Build a government-run \"Kasumigaseki Cloud\" operated by Japanese providers and hosted on domestic servers. Ministries and key agencies migrate their systems onto this shared platform to cut costs, standardise security and keep sensitive data under national control."
 JAP_base_okinawa: "Talks on U.S. Forces Withdrawal in Okinawa"
 JAP_base_okinawa_desc: "To enhance Japan's security autonomy, negotiations will begin for the withdrawal of U.S. forces stationed in Okinawa."
 JAP_enhancement_exercises: "Enhanced Joint Exercises"
 JAP_enhancement_exercises_desc: "Deepen integration with U.S. forces through larger and more frequent joint drills. Maritime, air and ground units rehearse shared procedures, communications and logistics so that in a real crisis both sides can move, fight and resupply as a single, coordinated force."
 JAP_education_jap_usa: "Joint U.S.-Japan Education Programs"
 JAP_education_jap_usa_desc: "To deepen mutual understanding between Japan and the United States, we will implement joint education programs and student exchanges. By learning from Japan's sense of discipline and America's spirit of entrepreneurship, this initiative will nurture a new generation of internationally minded leaders and further strengthen bilateral trust."
 JAP_culture_technology: "Japan U.S. Tech Culture Exchange"
 JAP_culture_technology_desc: "Tighten links between Japanese firms and U.S. tech hubs by pairing university labs and studios with partners in Silicon Valley, Seattle and Los Angeles. Engineers, designers and creators move back and forth on joint projects, blending American platform know-how with Japanese hardware, games and animation."
 JAP_dual_use: "Dual-Use Technology Cooperation"
 JAP_dual_use_desc: "Japan and the United States will deepen cooperation in the field of dual-use technologies,those applicable to both civilian and military purposes. Through collaboration between industry and academia, this partnership will accelerate research and development efforts, boosting overall technological advancement."
 JAP_okinawa_development: "Okinawa Joint Development Project"
 JAP_okinawa_development_desc: "To promote Okinawa's economic growth and regional integration, Japan and the United States will cooperate on a joint development project centered on infrastructure development. By improving transportation networks, logistics systems, and public facilities, this initiative seeks to enhance regional growth while opening new avenues for Japan U.S. cooperation."
 JAP_informal_cooperation: "Informal Cooperation Framework"
 JAP_informal_cooperation_desc: "Despite the lack of formal diplomatic relations, Japan and Taiwan have developed practical and substantial forms of cooperation. Through disaster response, technological exchange, and people-to-people interaction, a mutually beneficial foundation is being established."
 JAP_disaster_countermeasure_cooperation: "Japan Taiwan Disaster Knowledge Platform"
 JAP_disaster_countermeasure_cooperation_desc: "Given their shared vulnerability to natural disasters, Japan and Taiwan are establishing a joint platform to share expertise and lessons in disaster response. This cooperation enhances both nations' resilience and repair capabilities."
 JAP_tai_high_technology: "Japan Taiwan High-Tech Link"
 JAP_tai_high_technology_desc: "Research institutions and private companies from Japan and Taiwan are joining forces to collaborate on cutting-edge civilian technologies. This partnership aims to boost innovation and productivity in both nations' industries."
 JAP_tai_tourist_visa: "Relaxation of Tourist Visa Policies"
 JAP_tai_tourist_visa_desc: "To further encourage inbound tourism from Taiwan, Japan will ease its visa procedures. Increased people-to-people exchange and tourism will help stimulate the economy and foster deeper mutual understanding."
 JAP_tai_international_student: "Expansion of Student Exchange Programs"
 JAP_tai_international_student_desc: "Japan will expand opportunities for Taiwanese students to study in its universities. This initiative aims to deepen academic and cultural ties while cultivating future leaders who will bridge the two societies."
 JAP_tai_senkaku: "Establish Maritime Talks with Taiwan"
 JAP_tai_senkaku_desc: "Differences in views between Japan and Taiwan regarding the Senkaku Islands may affect fishing operations, maritime security, and diplomatic relations in the East China Sea. While firmly maintaining our country's position, we will establish dialogue channels and a framework for practical consultations to reduce friction on the ground. By balancing the management of confrontation with the securing of interests, we will lift the restrictions on negotiations with Taiwan concerning the Senkaku Islands issue."
 JAP_dprk_national_policy: "Northern Peninsula Doctrine"
 JAP_dprk_national_policy_desc: "North Korea remains the nearest spark to our shores and the most unpredictable actor on the peninsula. We will define a unified national policy toward Pyongyang, synchronizing diplomacy, intelligence, and readiness into a single doctrine. The direction we choose will set the terms of security in Northeast Asia."
 JAP_dprk_maximum_pressure: "Maximum Pressure on Pyongyang"
 JAP_dprk_maximum_pressure_desc: "North Korea understands leverage, not goodwill. We will tighten sanctions enforcement, expand maritime monitoring, and coordinate diplomatic pressure to constrain Pyongyang's room for escalation. The goal is simple: raise the cost of every provocation until the regime is forced to recalculate."
 JAP_dprk_missile_defense: "Layered Missile Shield"
 JAP_dprk_missile_defense_desc: "The northern threat is measured in minutes, not days. We will strengthen a layered missile defense network across land, sea, and air to protect our cities, ports, and command centers from sudden attack. A credible shield will deny Pyongyang the power to intimidate us from afar."
 JAP_dprk_trilateral_training: "Trilateral Peninsula Exercises"
 JAP_dprk_trilateral_training_desc: "Security on the peninsula cannot rest on declarations alone. Joint training with South Korea and the United States will improve readiness, interoperability, and crisis response across the region's most dangerous flashpoint. By drilling together, we signal that aggression will meet a coordinated answer."
 JAP_dprk_korean_defense_treaty: "Japan-Korea Defense Accord"
 JAP_dprk_korean_defense_treaty_desc: "The peninsula and the Japanese archipelago share the same frontline. A formal defense accord with South Korea will bind intelligence sharing, contingency planning, and mutual security commitments into a durable framework. Old grievances remain, but strategic necessity demands a stronger foundation."
 JAP_dprk_conditional_engagement: "Conditional Channel to Pyongyang"
 JAP_dprk_conditional_engagement_desc: "Pressure alone cannot manage every crisis. We will open a controlled diplomatic channel to North Korea, tied to strict conditions on missile tests, military incidents, and regional destabilization. Dialogue will not replace deterrence, but it may prevent miscalculation."
 JAP_dprk_normalization_framework: "Normalization Roadmap"
 JAP_dprk_normalization_framework_desc: "A stable Northeast Asia requires more than permanent crisis management. We will establish a phased framework for normalization with North Korea, linking diplomatic progress to verifiable security commitments and regional guarantees. Any settlement must be gradual, enforceable, and anchored in reciprocity."
 JAP_dprk_support_unification: "Back a Unified Peninsula"
 JAP_dprk_support_unification_desc: "The division of Korea has shaped East Asian security for generations, but it need not be permanent. We will support a peaceful path toward Korean unification through diplomacy, coordination with partners, and planning for regional stability. If the peninsula is to be remade, Japan must help shape the order that follows."
 JAP_history_education: "Transparency in Historical Education"
 JAP_history_education_desc: "We must confront historical facts head-on by reviewing educational materials and teaching guidelines. Transparent historical education is the first step toward building trust with our neighboring countries."
 JAP_statement: "[ROOT.GetLeader] Statement"
 JAP_statement_desc: "To express a clear stance of responsibility and remorse regarding historical events, the government will issue a new official statement. This initiative aims to foster reconciliation with affected nations and promote future-oriented relations based on mutual trust."
 JAP_intellectual_platform: "Trilateral History Platform"
 JAP_intellectual_platform_desc: "With UN mediation, Japan, China, and South Korea will jointly plan and establish museums and digital archives to pass on the memories of war to future generations. Japan will provide financial support, positioning this initiative as a global symbol of peace and reconciliation."
 JAP_intellectual_platform_TT: "§YIf both countries reach an agreement, a national spirit that increases §Gstability§! will be granted to all three nations!§!"
 JAP_chi_friendship: "Improving Relations with China"
 JAP_chi_friendship_desc: "To stabilize Japan China relations, the Japanese government will continue dialogue and work to promote mutual understanding and manage frictions. China is a neighboring country with significant influence over the regional order and economy, and improving relations is directly tied to Japan's security and prosperity."
 JAP_chi_accept_intellectual_platform: "China has agreed to the establishment of the Japan China Korea History Platform."
 JAP_chi_trade_support: "Support for China's Trade System Reform"
 JAP_chi_trade_support_desc: "Provide technical and institutional support for the reform and modernization of China's trade system. This facilitates smoother entry for Japanese businesses and enhances Japan's influence in the region."
 JAP_chi_advancement_companies: "Mutual Market Entry for Enterprises"
 JAP_chi_advancement_companies_desc: "Promote mutual investment and market entry between Japanese and Chinese enterprises to increase economic interdependence and enhance productivity."
 JAP_chi_kanji: "\"Sinosphere\" Cultural Cooperation Project"
 JAP_chi_kanji_desc: "By strengthening cultural ties among countries within the Sinosphere, this project emphasizes shared values and historical bonds, serving as a cultural buffer against external influence."
 JAP_chi_temple: "Joint Buddhist Temple Preservation Project"
 JAP_chi_temple_desc: "Preserve Buddhist temples as shared cultural heritage through Japan-China cooperation. This project boosts their value as tourism assets and reaffirms historical ties between the two nations."
 JAP_chi_senkaku: "Managing the Senkaku Dispute"
 JAP_chi_senkaku_desc: "Tensions surrounding the Senkaku Islands are directly tied to overall Japan China relations and the stability of the East China Sea. While maintaining our position on sovereignty, it is necessary to establish a diplomatic management framework to avoid accidental clashes. Let us formally establish channels for dialogue and, while restraining friction at sea, proceed with negotiations in an environment favorable to our country."
 JAP_kor_friendship: "Improving Relations with South Korea"
 JAP_kor_friendship_desc: "Toward a future-oriented Japan South Korea relationship, the Japanese government will work to restore trust and continue dialogue. South Korea is one of Japan's most important neighbors, directly tied to regional stability and the economy, and improving relations will broaden Japan's options and influence."
 JAP_kor_accept_intellectual_platform: "South Korea has agreed to the establishment of the Japan China Korea History Platform."
 JAP_kor_accelerator: "Tokyo Seoul Accelerator"
 JAP_kor_accelerator_desc: "A joint accelerator program is established in Tokyo and Seoul to support and nurture startup companies, strengthening innovation and economic cooperation between the two capitals."
 JAP_kor_local_companies: "Local Business Exchange Initiative"
 JAP_kor_local_companies_desc: "Promotes collaboration among regional businesses, accelerating the growth and development of civil industries at the local level."
 JAP_kor_cultural_exchange: "Cultural Exchange"
 JAP_kor_cultural_exchange_desc: "By promoting cultural exchange, the foundation is laid for greater mutual understanding and public opinion influence between the two peoples."
 JAP_kor_aging: "Japan Korea Aging Society Taskforce"
 JAP_kor_aging_desc: "A joint Japan Korea taskforce is formed to address the shared challenge of aging societies, holding monthly discussions to devise cooperative policies."
 JAP_kor_liancourt_rocks: "Managing the Takeshima Dispute"
 JAP_kor_liancourt_rocks_desc: "The dispute over Takeshima (Dokdo) is an important pending issue that may affect overall Japan South Korea relations. While firmly maintaining our country's position, we will establish a framework for dialogue and practical consultations in order to avoid accidental friction and the escalation of diplomatic tensions. This will lift the restrictions on negotiations with South Korea concerning the Takeshima (Dokdo) issue."
 JAP_approaching_russia: "Rapprochement with Russia"
 JAP_approaching_russia_desc: "To ensure geopolitical stability and secure access to resources, we pursue a diplomatic line aimed at improving relations with Russia, focusing on cooperation in energy, infrastructure, and trade."
 JAP_sov_far_east_development: "Far East Initiative"
 JAP_sov_far_east_development_desc: "Leveraging Japan's regional revitalization expertise in the cold climate of Hokkaido, this initiative promotes cold-region development in the Russian Far East through infrastructure investment and foreign capital"
 JAP_sov_saakhalin: "Sakhalin II"
 JAP_sov_saakhalin_desc: "To ensure stable access to fossil fuels, Japan strengthens foreign investment in the Sakhalin II energy project in cooperation with Russia."
 JAP_sov_logistics_corridor: "Japan Europe Logistics Corridor"
 JAP_sov_logistics_corridor_desc: "We will develop a land-based logistics corridor connecting Japan and Europe via Russia. By utilizing Russian railways and highways, we aim to shorten transport times and establish stable access to European markets."
 JAP_sov_it_corridor: "Russia Digital Corridor"
 JAP_sov_it_corridor_desc: "In collaboration with Japanese IT firms, infrastructure such as data centers and fiber-optic cables will be established in Russia, creating a digital trade network linking Europe, Central Asia, and Russia."
 JAP_sov_kuril_islands: "Managing the Northern Territories Dispute"
 JAP_sov_kuril_islands_desc: "The issue of the Northern Territories is an unresolved pending matter that concerns the very foundation of Japan Russia relations. While firmly maintaining our country's position, we will establish a framework for diplomatic negotiations and practical consultations in order to avoid the entrenchment of confrontation. While carefully managing relations with Russia, we will lift the restrictions on negotiations concerning the Northern Territories issue."
 JAP_defensive_foundations: "Defensive Foundations"
 JAP_defensive_foundations_desc: "Japan strengthens the fundamental defensive posture of the Self-Defense Forces, focusing on homeland protection, crisis response, and deterrence while remaining within the boundaries of a strictly defensive interpretation of Article 9."
 JAP_jgsdf: "Strengthen the JGSDF"
 JAP_jgsdf_desc: "The Japan Ground Self-Defense Force enhances its defensive capabilities through improved mobility, training, and readiness. These measures ensure that the force remains able to safeguard the homeland while operating strictly within existing legal and strategic constraints."
 JAP_type_x_mbt: "Field Type 10 Main Battle Tank"
 JAP_type_x_mbt_desc: "The Type 10 represents a leap in Japanese armored development,lighter, faster, and designed specifically for rapid deployment across Japan's challenging terrain. By expanding production and training crews for this advanced platform, the JGSDF strengthens its ability to respond quickly to threats at home."
 JAP_type_manouvre_combat_vehicle: "Type 16 Maneuver Combat Vehicle"
 JAP_type_manouvre_combat_vehicle_desc: "The Type 16 Maneuver Combat Vehicle provides highly mobile firepower for rapid-response forces. Its wheeled configuration allows the JGSDF to reposition units swiftly across the archipelago, reinforcing remote regions without relying on heavy armor logistics."
 JAP_wheeled_howitzer: "Type 19 Wheeled Howitzer"
 JAP_wheeled_howitzer_desc: "A new generation of mobile artillery,the Type 19,combines modern fire-control systems with rapid redeployment capability. Its wheeled chassis enables flexible support for defensive operations across Japan's dispersed and rugged geography."
 JAP_chu_sam: "Expand the Type 03 Chu-SAM Network"
 JAP_chu_sam_desc: "Japan strengthens its air-defense posture with additional Type 03 Chu-SAM batteries. These modern medium-range missile systems enhance protection against aerial incursions and integrate seamlessly with national early-warning and tracking infrastructure."
 JAP_type_atgm: "Upgrade Infantry Anti-Tank Missile Units"
 JAP_type_atgm_desc: "The JGSDF equips its infantry and reconnaissance elements with improved anti-tank guided missile systems, including updated models of the Type 01 and Type 96. These upgrades ensure that ground forces remain capable of countering modern armored threats in any defensive engagement."
 JAP_central_readiness_force: "Expand the Central Readiness Force"
 JAP_central_readiness_force_desc: "The Central Readiness Force is developed into a flexible, rapidly deployable command capable of responding to emergencies anywhere in Japan. By improving joint training, mobility, and coordination with regional armies, we ensure that ground units can reinforce critical areas at short notice."
 JAP_civil_protection_act: "Implement the Civil Protection Framework"
 JAP_civil_protection_act_desc: "New civil protection measures formalize cooperation between the Self-Defense Forces, local authorities, police, and emergency services. Clear legal procedures for evacuations, crisis response, and infrastructure protection strengthen Japan's ability to safeguard its population during disasters and security incidents alike."
 JAP_maritime_self_defence_force: "Strengthen Maritime Self-Defense Force"
 JAP_maritime_self_defence_force_desc: "The Maritime Self-Defense Force is reinforced with improved training, maintenance, and support structures to sustain high-tempo operations at sea. By enhancing escort groups, patrol capacity, and naval logistics, Japan can better safeguard vital sea lanes and coastal waters."
 JAP_amphibious_rapid_deployment: "Train Amphibious Rapid Deployment Brigade"
 JAP_amphibious_rapid_deployment_desc: "A dedicated amphibious rapid deployment formation is established to respond to crises on Japan's remote islands. Combining infantry, armor, and naval lift, this brigade is trained to reinforce, secure, and, if necessary, retake key territory along Japan's maritime frontier."
 JAP_atago_destroyer: "Commission Advanced Aegis Destroyers"
 JAP_atago_destroyer_desc: "New Aegis-equipped destroyers are brought into service, providing powerful air-defense, anti-submarine, and command capabilities. These advanced escorts form the core of Japan's modern surface fleet and significantly strengthen fleet protection and regional deterrence."
 JAP_keen_sword_operation: "Expand Keen Sword Joint Exercises"
 JAP_keen_sword_operation_desc: "The Keen Sword exercise series is expanded to include more complex naval, air, and ground components. Regular large-scale drills with allied forces sharpen interoperability, improve joint command and control, and demonstrate Japan's readiness to operate effectively in a contested regional environment."
 JAP_f2_multirole_defensive_enhancement: "Enhance the F-2 Multirole Fleet"
 JAP_f2_multirole_defensive_enhancement_desc: "The F-2 fleet receives upgraded avionics, sensors, and weapon systems to improve air defense and maritime strike in nearby waters. These enhancements allow the aircraft to respond more effectively to regional threats while maintaining a primarily defensive mission profile."
 JAP_f15_defensive_updat_programe: "F-15 Defensive Upgrade Programme"
 JAP_f15_defensive_updat_programe_desc: "Japan's F-15 air superiority fighters undergo a comprehensive upgrade, including modern radars, electronic warfare suites, and improved air-to-air missiles. The updated fleet significantly strengthens Japan's ability to secure its own airspace against increasingly capable adversaries."
 JAP_hyuga_class: "Deploy Hyūga-Class Helicopter Destroyers"
 JAP_hyuga_class_desc: "Hyūga-class helicopter destroyers are brought into full operational service as command and anti-submarine warfare platforms. Their ability to coordinate escort groups and operate multiple helicopters greatly improves fleet protection and maritime situational awareness."
 JAP_p_maritime_patrol: "Expand Maritime Patrol Aviation"
 JAP_p_maritime_patrol_desc: "Japan invests in modern maritime patrol aircraft to monitor sea lanes, track submarines, and support search-and-rescue operations. Enhanced patrol coverage around the archipelago strengthens both national security and the safety of maritime traffic."
 JAP_deploy_ballistic_warning_radars: "Deploy Ballistic Missile Warning Radars"
 JAP_deploy_ballistic_warning_radars_desc: "New long-range early warning radars are installed to detect and track ballistic missile launches in the region. By integrating these sensors into the national command network, Japan gains vital minutes to assess threats, alert the population, and coordinate defensive responses."
 JAP_modernize_jadge: "Modernize the JADGE Air Defense Network"
 JAP_modernize_jadge_desc: "The Japan Aerospace Defense Ground Environment (JADGE) system is upgraded with improved data links, processing capacity, and integration with naval and ground-based sensors. A modernized JADGE network allows faster decision-making and more efficient deployment of air defense assets."
 JAP_air_self_defence_force: "Strengthen the Air Self-Defense Force"
 JAP_air_self_defence_force_desc: "The Air Self-Defense Force expands its training programs, base infrastructure, and support units to handle a higher operational tempo. These improvements ensure that Japan can sustain continuous air patrols, rapid scrambles, and complex joint exercises as the regional air environment grows more demanding."
 JAP_article_nine_transition_comittee: "Establish the Defense Transition Committee"
 JAP_article_nine_transition_comittee_desc: "A dedicated committee is formed to coordinate Japan's transition toward a modernized national defense posture. By bringing together policymakers, military planners, and legal experts, Japan can manage the shift in responsibilities and ensure a stable, well-organized transformation."
 JAP_article_nine_transition_comittee_tt: "§GThe Article 9 Balance of Power modifier will no longer be able to change, based on the interpretation level. This now gives access to National Focuses, removing Article 9 completely§!"
 JAP_secure_public_support: "Secure Public Support for Defense Reform"
 JAP_secure_public_support_desc: "A nationwide effort is launched to explain the evolution of Japan's defense policy, address public concerns, and build confidence in the new security posture. Broad support from society ensures political stability and reduces friction during the transition."
 JAP_modernize_joint_command: "Modernize Joint Command Structures"
 JAP_modernize_joint_command_desc: "The armed forces integrate their operational commands into a unified joint structure, improving interoperability and readiness. Modern joint planning and shared training standards enable more efficient responses to complex security scenarios."
 JAP_normalize_defense_procurement: "Normalize Defense Procurement Systems"
 JAP_normalize_defense_procurement_desc: "Japan streamlines defense procurement, expands industrial capacity, and strengthens coordination with domestic manufacturers. Transparent, modernized procurement processes ensure that critical defense projects can be delivered efficiently and sustainably."
 JAP_formalize_national_defense: "Formalize National Defense Capabilities"
 JAP_formalize_national_defense_desc: "Japan officially codifies its expanded defense responsibilities, clarifying roles, missions, and long-term strategic goals. With the transition complete, the armed forces operate under a unified vision designed to protect national interests in an increasingly complex regional environment."
 JAP_normalize_defense_procurement_done: "Defense Procurement Normalized"
 JAP_modernize_joint_command_done: "Joint Command Modernization Complete"
 JAP_consolidate_national_defense_framework_done: "National Defense Framework Consolidated"
 JAP_rebuild_blue_water_navy: "Rebuild a Blue-Water Navy"
 JAP_rebuild_blue_water_navy_desc: "Japan prepares its fleet for sustained operations far beyond home waters, expanding logistics, replenishment capacity, and long-range escort forces. A renewed blue-water navy allows Japan to protect sea lanes, support partners, and respond to crises across the wider region."
 JAP_carrier_aviation_tt: "[JAP_carrier_aviation_idea_desc]\n"
 JAP_carrier_aviation_development: "Carrier Aviation Development Program"
 JAP_carrier_aviation_development_desc: "A dedicated program is launched to develop carrier-capable aviation, integrating naval fighters, deck operations, and specialized training. Building a credible carrier air arm dramatically increases the fleet's reach and flexibility in both deterrence and combat operations."
 JAP_submarine_modernization_project: "Submarine Modernization Project"
 JAP_submarine_modernization_project_desc: "Japan upgrades its submarine fleet with quieter hulls, advanced sensors, and modern weapons. A new generation of attack submarines strengthens undersea deterrence, sea denial capabilities, and the ability to monitor contested waters in depth."
 JAP_expand_multi_role_destroyer_fleet: "Expand the Multi-Role Destroyer Fleet"
 JAP_expand_multi_role_destroyer_fleet_desc: "Additional multi-role destroyers are commissioned to provide air defense, anti-submarine warfare, and surface strike capability in a single, flexible platform. These escorts form the backbone of Japan's expanded task forces at sea."
 JAP_establish_joint_rapid_deployment_command: "Establish Joint Rapid Deployment Command"
 JAP_establish_joint_rapid_deployment_command_desc: "A joint command is created to coordinate rapidly deployable land, air, and naval elements. With unified planning and pre-arranged contingency responses, Japan gains a force able to react quickly to crises anywhere within its wider strategic environment."
 JAP_full_defense_industrial_mobilisation: "Full Defense Industrial Mobilisation"
 JAP_full_defense_industrial_mobilisation_desc: "Japan aligns its industrial base, research institutions, and logistics networks behind a comprehensive defense production plan. Standardized procurement, long-term contracts, and expanded capacity enable sustained manufacture of ships, vehicles, aircraft, and advanced weapons."
 JAP_long_range_strike_missile_artillery_forces: "Long-Range Strike and Missile Artillery Forces"
 JAP_long_range_strike_missile_artillery_forces_desc: "Specialized missile and artillery units are organized to deliver precision strikes at long range. By combining advanced munitions with modern targeting and command systems, Japan gains the ability to hold distant military assets and key infrastructure at risk."
 JAP_expand_mechanized_brigades: "Expand Mechanized Brigades"
 JAP_expand_mechanized_brigades_desc: "Existing mechanized formations are reinforced and new brigades are raised, equipped with modern infantry fighting vehicles and supporting armor. This expansion improves mobility, protection, and sustained combat capability on the ground."
 JAP_deploy_next_generation: "Deploy Next-Generation Combat Formations"
 JAP_deploy_next_generation_desc: "Combat units are reorganized around next-generation equipment, networked command systems, and combined-arms doctrine. These formations are designed for rapid deployment, high survivability, and effective operations in complex, high-intensity environments."
 JAP_national_defense_professionalization: "National Defense Professionalization"
 JAP_national_defense_professionalization_desc: "Japan invests in professional military education, career development, and modern personnel systems across all services. A more capable, experienced, and cohesive officer and NCO corps increases readiness, improves leadership, and sustains the long-term effectiveness of the national defense forces."
 JAP_integrated_air_space_command: "Integrated Air and Space Command"
 JAP_integrated_air_space_command_desc: "An integrated air and space command is established to coordinate air defense, early warning, satellite support, and space surveillance. By fusing information from ground-based radars, airborne sensors, and orbital platforms, Japan gains a clearer picture of the battlespace and can respond more quickly to emerging threats."
 JAP_establish_long_range_strike_aviation: "Establish Long-Range Strike Aviation"
 JAP_establish_long_range_strike_aviation_desc: "Dedicated long-range strike aviation units are formed, equipped with modern aircraft and standoff weapons. These forces provide the ability to strike critical targets at extended ranges, supporting deterrence and joint operations across the wider region."
 JAP_mext_generation_air_dominance: "Next-Generation Air Dominance"
 JAP_mext_generation_air_dominance_desc: "Japan accelerates development of a next-generation air dominance fighter, combining stealth, advanced sensors, and networked combat systems. This program ensures that the air force can maintain superiority in increasingly contested skies well into the future."
 JAP_advanced_missile_development: "Advanced Missile Directorate"
 JAP_advanced_missile_development_desc: "A dedicated directorate is established to oversee research, testing, and production of advanced missile systems. From modern air-to-air and anti-ship weapons to long-range precision strike capabilities, this effort broadens Japan's arsenal and enhances the effectiveness of all branches."
 JAP_high_tech_domestic_manufacturing: "High-Tech Domestic Defense Manufacturing"
 JAP_high_tech_domestic_manufacturing_desc: "Japan invests in high-end manufacturing for avionics, sensors, composite structures, and propulsion systems. Strengthening domestic supply chains for critical components reduces dependence on foreign suppliers and supports rapid upgrades to air and missile platforms."
 JAP_establish_japan_defense_technology_agency: "Japan Defense Technology Agency"
 JAP_establish_japan_defense_technology_agency_desc: "A centralized defense technology agency is created to coordinate research, procurement, and innovation across industry, academia, and the armed forces. Unified oversight accelerates development cycles, reduces duplication, and ensures that promising concepts move quickly from laboratory to frontline units."
 JAP_atla_defense_technology_consolidation: "ATLA Technology Consolidation"
 JAP_atla_defense_technology_consolidation_desc: "The Acquisition, Technology & Logistics Agency is given a central role in coordinating research, development, and procurement across all branches of the armed forces. By consolidating defense technology programs under a single authority, Japan can reduce duplication, accelerate innovation, and push promising projects more quickly into operational service."
 JAP_gifu_test_aerospace_development_center: "Gifu Test & Aerospace Development Center"
 JAP_gifu_test_aerospace_development_center_desc: "Gifu is developed into a premier test and evaluation hub for aircraft, avionics, and weapons systems. Dedicated ranges, instrumented airspace, and specialized engineering teams support rigorous trials, ensuring that new designs are thoroughly proven before entering frontline service."
 JAP_aichi_nagoya_aerospace_defense_cluster: "Aichi-Nagoya Aerospace Defense Cluster"
 JAP_aichi_nagoya_aerospace_defense_cluster_desc: "The Aichi-Nagoya region is cultivated as a leading aerospace and defense production cluster, linking major manufacturers, suppliers, and research institutes. Concentrated investment in this area boosts output of airframes, engines, and high-tech components for both military and dual-use platforms."
 JAP_kobo_maritime_heavy_industry_corridor: "Kobe Maritime Heavy Industry Corridor"
 JAP_kobo_maritime_heavy_industry_corridor_desc: "Kobe and the surrounding coastal cities are developed into a continuous maritime heavy industry corridor. Expanded shipyards, steelworks, and marine engineering firms provide the capacity to build and maintain a larger, more capable fleet and its supporting infrastructure."
 JAP_nagasaki_shipyard_defense: "Nagasaki Shipyard Defense Integration"
 JAP_nagasaki_shipyard_defense_desc: "Nagasaki's major shipyards are more deeply integrated into national defense planning, dedicating additional capacity to escorts, support vessels, and specialized naval platforms. Closer coordination between the yards and the navy shortens construction timelines and improves fleet readiness."
 JAP_kure_naval_arsenal_revival: "Kure Naval Arsenal Revival"
 JAP_kure_naval_arsenal_revival_desc: "Kure's historic naval facilities are revitalized as a modern shipbuilding and repair complex. Upgraded docks, workshops, and logistics nodes restore the city's role as a key center for maintenance, refits, and upgrades of frontline warships."
 JAP_sasebo_fleet_support_complex: "Sasebo Fleet Support Complex"
 JAP_sasebo_fleet_support_complex_desc: "Sasebo is expanded into a comprehensive fleet support complex, with improved repair capacity, ammunition storage, and supply infrastructure. Its location in western Japan makes it an ideal hub for sustaining operations in nearby seas and key maritime chokepoints."
 JAP_yokosuka_dockyard_expansion: "Yokosuka Dockyard Expansion"
 JAP_yokosuka_dockyard_expansion_desc: "Yokosuka's dockyards and associated facilities are enlarged to handle more ships and deeper maintenance cycles. As one of Japan's primary naval bases, an expanded Yokosuka greatly increases the navy's ability to keep major surface combatants ready for deployment."
 JAP_revitalize_defense_production: "Revitalize the Defense Production Base"
 JAP_revitalize_defense_production_desc: "Japan undertakes a broad effort to reinvigorate its defense industrial base, supporting key manufacturers, stabilizing long-term contracts, and upgrading production lines. A healthier industrial foundation allows the country to equip its forces reliably and adapt more quickly to new operational demands."
 JAP_kaguya_starward_expedition: "Kaguya Starward Expedition"
 JAP_kaguya_starward_expedition_desc: "Inspired by the tale of Princess Kaguya, who returned to the Moon in a robe of light, Japan launches an ambitious deep-space survey of near-Earth asteroids. Advanced robotic probes and mining demonstrators are dispatched into the void, turning legend into technology and laying the groundwork for future resource extraction among the stars."
 JAP_kaguya_starward_expedition_tt: "§YOur Mission to the moon will be started!§!"
 JAP_tsukuyomi_lunar_program: "Tsukuyomi Lunar Program"
 JAP_tsukuyomi_lunar_program_desc: "Named after Tsukuyomi, the moon kami of Japanese mythology, this program unites industry, research institutes, and the space agency behind a sustained lunar effort. Orbiters, landers, and surface infrastructure transform the Moon from a distant symbol into a tangible outpost, serving science, navigation, and the long-term ambitions of Japan's spacefaring future."
 JAP_amaterasu_martian_dawn: "Amaterasu Martian Dawn"
 JAP_amaterasu_martian_dawn_desc: "Under the name of Amaterasu, goddess of the rising sun, Japan reaches for the red planet. Long-range probes, advanced propulsion, and pioneering life-support research support a new wave of Martian exploration. Each mission pushes the boundaries of human ingenuity, turning the distant glow of Mars into the next horizon for Japan's high-tech civilization."
 JAP_restore_imperial_household: "Restore the Imperial Household"
 JAP_restore_imperial_household_desc: "For decades, the Imperial Household has been confined to ceremony, revered, yet separated from the levers of state. We will reverse that settlement by restoring institutional capacity and a formal role for the court in national administration. This is not pageantry, but a reordering of legitimacy that will force every faction to choose its side when the Chrysanthemum Throne steps forward."
 JAP_reinstate_former_imperial_houses: "Reinstate the Former Imperial Houses"
 JAP_reinstate_former_imperial_houses_desc: "The Imperial institution cannot endure on symbolism alone. Its future depends on continuity, stability, and a secure line of succession. We will reinstate the former imperial houses and restore their status within the national framework, expanding the pool of eligible branches tied to the Throne. This decision will be hailed as safeguarding tradition by monarchists and condemned as political engineering by constitutionalists."
 JAP_male_line_succession_act: "Pass the Male-Line Succession Act"
 JAP_male_line_succession_act_desc: "Succession uncertainty is a strategic vulnerability as much as a domestic controversy. We will codify male-line succession in statute to eliminate ambiguity and secure dynastic continuity for generations to come. The move will consolidate monarchist support, but it will ignite fierce opposition from reformers who see it as a step back from modern Japan."
 JAP_imperial_rites_restored: "Restore the Imperial Rites"
 JAP_imperial_rites_restored_desc: "A throne without ritual is a crown without weight. We will restore the Imperial rites as state-recognized ceremonies, reaffirming the sacred foundations of the monarchy and the continuity of the nation. In doing so, we bind the modern state to ancient legitimacy, whether the political class approves or not."
 JAP_recall_privy_council: "Recall the Privy Council"
 JAP_recall_privy_council_desc: "Parliamentary politics has become loud, transient, and increasingly detached from long-term statecraft. We will recall the Privy Council to provide the Throne with a permanent advisory body, discreet, experienced, and loyal to the continuity of the state. Its return will be seen as a stabilizing anchor by monarchists and as an unelected power center by its opponents."
 JAP_imperial_reform_commission: "Establish the Imperial Reform Commission"
 JAP_imperial_reform_commission_desc: "Restoration demands structure, not improvisation. We will establish an Imperial Reform Commission to draft the legal and institutional blueprint for a renewed monarchy and to align ministries, court offices, and security organs behind a single doctrine of state. Once convened, the commission will turn symbolism into policy and make retreat politically impossible."
 JAP_imperial_audience: "Hold an Imperial Audience"
 JAP_imperial_audience_desc: "The parties will be summoned not as equals, but as petitioners before the Throne. In a carefully staged Imperial Audience, we will bind faction leaders to a new order, one where elected politics serves, rather than commands, the state. If the Chrysanthemum Throne is to preside over a modern shogunate, it must first make the political class bow to its logic."
 JAP_imperial_civic_oath: "Proclaim the Imperial Civic Oath"
 JAP_imperial_civic_oath_desc: "A new order requires more than decrees; it requires shared allegiance. We will proclaim an Imperial Civic Oath that binds officials, servicemembers, and civil institutions to the Throne as the ultimate source of legitimacy. In doing so, we turn loyalty into law and make dissent feel like betrayal."
 JAP_unified_intelligence_secretariat: "Create a Unified Intelligence Secretariat"
 JAP_unified_intelligence_secretariat_desc: "A modern shogunate cannot be blind. We will consolidate competing services into a Unified Intelligence Secretariat that reports through a single chain of command and safeguards the Throne's strategic picture. This will sharpen our statecraft overnight, while giving our rivals every reason to fear what the court now knows."
 JAP_blue_water_navy: "Build a Blue-Water Navy"
 JAP_blue_water_navy_desc: "Japan's destiny is maritime, and our security cannot end at the horizon. We will build a true blue-water navy able to operate far from home waters, protect sea lanes, and project power where our interests demand. With the fleet as the Throne's steel instrument, the world will learn to measure Japan by the wake it leaves behind."
 JAP_imperial_defense_council: "Form the Imperial Defense Council"
 JAP_imperial_defense_council_desc: "Strategy cannot be left to electoral cycles and ministerial rivalry. We will form an Imperial Defense Council to unify the armed forces, intelligence leadership, and key ministries under a single strategic doctrine anchored to the Throne. In one stroke, Japan's security policy becomes coherent and far harder for factions to sabotage from within."
 JAP_rare_earth_resilience: "Secure Rare Earth Resilience"
 JAP_rare_earth_resilience_desc: "A great power can be strangled without a single shot fired by cutting the materials its industry cannot replace. We will secure rare earth resilience through stockpiles, diversified supply, and strategic extraction partnerships, insulating Japan from coercion. If the world wants to pressure us, it will have to find a different lever."
 JAP_national_shipbuilding_plan: "Imperial Fleet Expansion Programme"
 JAP_national_shipbuilding_plan_desc: "The Throne will not settle for coastal defense; Japan will command the seas that decide our fate. Under the Imperial Fleet Expansion Programme, we will surge shipyard capacity, lock in long-term naval procurement, and drive a continuous build cycle from keel-laying to commissioning. When this plan is underway, our rivals will not debate Japan's intentions — they will count our hulls."
 JAP_imperial_war_cabinet: "Convene the Imperial War Cabinet"
 JAP_imperial_war_cabinet_desc: "In times of crisis, Japan cannot be governed by delay, committee, and partisan bargaining. We will convene an Imperial War Cabinet to centralize command authority and bind the political leadership to a single strategic line under the Throne's mandate. From this moment, the state will act with one voice and it will be the Emperor's."
 JAP_russian_lost_territories: "Reclaim the Northern Territories"
 JAP_russian_lost_territories_desc: "The wounds of the north have never closed only been covered by treaties and silence. We will press our claim to the islands and waters taken under Russian control, not as a plea, but as a sovereign demand backed by leverage and preparedness. If Moscow will not return what was lost, then Japan must decide how far it is willing to go to take it back."
 JAP_fight_china_again: "Dragon and Chrysanthemum"
 JAP_fight_china_again_desc: "The old conflict was never truly settled, only postponed behind treaties and shifting balances. We will prepare the nation to confront China once more, rallying industry, the armed forces, and public will for a war that decides the region's future. This time, Japan will not fight for survival alone, but for the order that follows."
 JAP_reclaim_pacific_rim: "Assert Our Pacific Rim Mandate"
 JAP_reclaim_pacific_rim_desc: "Japan's prosperity and security are written across the Pacific, from sea lanes to island chains and distant chokepoints. We will assert a Pacific Rim mandate that treats maritime influence as national policy backed by fleet presence, basing access, and economic leverage. The era of watching others draw the map is over; Japan will shape it."
 JAP_office_for_colonialism: "Revive the Daitōa-shō"
 JAP_office_for_colonialism_desc: "An empire without administration is a conquest that collapses under its own weight. We will revive the Daitōa-shō to coordinate overseas governance, security arrangements, and economic integration under a single imperial doctrine. With one ministry to direct the sphere, Japan's influence will no longer be improvised, it will be managed, expanded, and enforced."
 JAP_office_for_colonialism_tt: "Unlocks occupation law in Asian states:\n"
 JAP_reclaim_south_chinese_sea: "Command the Southern Seas"
 JAP_reclaim_south_chinese_sea_desc: "The South China Sea is the artery of Asia, and whoever controls it controls the flow of trade, fuel, and power. We will move to reclaim dominance in these waters, establishing presence, bases, and the naval strength to enforce our will against any challenger. Japan will not ask for access, it will guarantee it by force."
 JAP_reclaim_indochina: "Return to Indochina"
 JAP_reclaim_indochina_desc: "Indochina sits on the crossroads of Southeast Asia, where ports, resources, and sea lanes decide who sets the regional balance. We will return with pressure, force, and political engineering to bring these territories back under Japan's strategic direction. Once secured, the southern flank of our maritime sphere will be anchored in permanent influence."
 JAP_reclaim_australia: "The Southern Anchor"
 JAP_reclaim_australia_desc: "Australia is the keystone of the southern Pacific, a continent that can host fleets, air power, and the logistics that decide long wars. We will move to bring it under Japan's strategic control, not as a raid or a gesture, but as a permanent anchor for our maritime sphere. If the south is secured, the Pacific becomes a Japanese lake."
 JAP_reclaim_myanmar: "Secure the Irrawaddy Gate"
 JAP_reclaim_myanmar_desc: "Myanmar is the land bridge between South and Southeast Asia, controlling routes that connect the Bay of Bengal to the heart of the region. We will move to reclaim it through force and political pressure, turning its ports, airfields, and corridors into assets of Japan's wider sphere. Once the Irrawaddy Gate is secured, our southern flank becomes far harder to challenge."
 JAP_reclaim_the_pacific: "The Ocean as Our Frontier"
 JAP_reclaim_the_pacific_desc: "The Pacific is not a distant expanse, it is the frontier that decides Japan's survival and greatness. We will reclaim it through fleet presence, island strongpoints, and the will to enforce a maritime order shaped in Tokyo. When the ocean becomes our frontier, every rival will be forced to operate under our shadow."
 JAP_reclaim_north_korea: "Bind the North Under Tokyo's Hand"
 JAP_reclaim_north_korea_desc: "We will force a settlement that strips Pyongyang of strategic autonomy and places its external policy under Japanese supervision. Through controlled access, security guarantees, and hard leverage over resources and reconstruction, the North will be turned into a dependent buffer rather than an unpredictable threat. It is domination without illusion, and stability enforced by design."
 JAP_reclaim_south_korea: "Impose a Protectorate Framework"
 JAP_reclaim_south_korea_desc: "We will move beyond influence and establish a protectorate framework that binds Korea's foreign and security policy to Tokyo's direction. Through controlled agreements, advisers, and leverage over key institutions, Korea will be forced into a subordinate position without the need for open annexation. It is a modern empire built with paperwork, pressure, and permanence."
 JAP_reclaim_taiwan: "Establish a Taiwan Protectorate"
 JAP_reclaim_taiwan_desc: "We will move from influence to control by imposing a protectorate framework that binds Taiwan's defense and foreign policy to Tokyo's direction. Through guarantees, basing rights, and institutional leverage, the island will be secured as a loyal maritime bastion without the need for open annexation. It is a modern imperial arrangement, enforced by sea power and political pressure."
 JAP_basic_reconstruction_policy: "Reconstruction Policy"
 JAP_basic_reconstruction_policy_desc: "In the wake of the unprecedented devastation caused by the Great East Japan Earthquake, the government must establish a basic policy for reconstruction. Presenting a national framework for restoring livelihoods, rebuilding infrastructure, and revitalizing industry will be the first step toward regaining public trust and stabilizing society."
 JAP_tohoku_infrastructure: "Rebuild Tohoku's Infrastructure"
 JAP_tohoku_infrastructure_desc: "The earthquake and tsunami dealt catastrophic damage to Tohoku's transportation networks and lifelines. Rebuilding roads, railways, and ports, is the first step toward restoring local communities and advancing the region's recovery. Though the effort will demand immense costs and time, it cannot be postponed."
 JAP_fishery_revival: "Agro-Fishery Recovery"
 JAP_fishery_revival_desc: "The tsunami devastated Tohoku's fishing ports and farmland, destroying countless livelihoods. Rebuilding these sectors will restore the region's economic base and ensure a stable food supply. This effort is vital to both local recovery and national security."
 JAP_tohoku_port: "Restore Tohoku Port Functions"
 JAP_tohoku_port_desc: "The tsunami crippled port facilities and shipyards, halting logistics and maritime trade. Reconstruction will revive regional industries and reopen key domestic and international routes. Regaining these gateways is essential for Japan's broader economic recovery."
 JAP_power_supply: "Power Stabilization"
 JAP_power_supply_desc: "The disaster has damaged many power facilities and transmission networks, creating a severe electricity shortage. We must quickly expand alternative sources and reinforce the grid to secure stability for both citizens and industry."
 JAP_kanto_infrastructure: "Rebuild Kanto's Infrastructure"
 JAP_kanto_infrastructure_desc: "The disaster inflicted severe damage on the Kanto region, particularly in the north, disrupting transportation networks and urban functions. Restoring the infrastructure that supports the capital area is essential for reviving economic activity and maintaining national stability. Swift and well-planned reconstruction is imperative."
 JAP_reconstruction_agency: "Establish Reconstruction Agency"
 JAP_reconstruction_agency_desc: "To accelerate and coordinate post-disaster recovery, the government will establish the Reconstruction Agency. This dedicated body will unify efforts between central and local authorities, ensuring effective implementation of recovery plans."
 JAP_industrial_recovery: "Restore the Industrial Base"
 JAP_industrial_recovery_desc: "The disaster severely damaged factories and industrial facilities. By rebuilding the industrial base, we can restore employment and accelerate the recovery of our economy."
 JAP_funding_local_governments: "Support for Affected Municipalities"
 JAP_funding_local_governments_desc: "Provide funds to local governments in affected areas to support recovery, rebuild livelihoods, and maintain public services."
 JAP_housing_reconstruction: "Rebuilding Housing for Victims"
 JAP_housing_reconstruction_desc: "Accelerate the construction of temporary homes and long-term residential districts, moving displaced families out of shelters and giving towns clear plans for permanent resettlement."
 JAP_reconstruction_completed_focus: "Reconstruction Completed"
 JAP_reconstruction_completed_focus_desc: "Mark the transition from emergency rebuilding to long-term revitalisation across Tōhoku. Core infrastructure is restored, industries are running again, and towns begin shifting from survival to growth."
 JAP_trilateral_anti_north_korea_training: "Trilateral Peninsula Readiness"
 JAP_trilateral_anti_north_korea_training_desc: "Regular joint exercises with South Korea and the United States have forged a shared playbook for crisis response on the peninsula. Interoperable command procedures, combined air and naval drills, and coordinated missile defense routines ensure that any provocation from Pyongyang meets a fast, unified, and credible answer."
 JAP_dprk_policy_idea: "Japanese Policy Penetration"
 JAP_dprk_policy_idea_desc: "Tokyo's new Korea policy has opened channels that did not exist before. Through diplomatic contacts, back-channel intermediaries, economic leverage, and intelligence cultivation, Japan has gained a temporary window to expand its influence inside North Korea's political environment. The opening is fragile and contested, but for now, Japanese pressure and presence carry more weight in Pyongyang than before."
 JAP_depopulation_0: "The Remaining Burden of the Declining Birthrate (Level 1)"
 JAP_depopulation_0_desc: "Thanks to continuous countermeasures, the progression of the declining birthrate is gradually being curbed to some extent. Birth trends are also showing signs of improvement, and the more crisis-driven view has receded, but the long-term effects will not disappear immediately. Stabilizing the population base will still take time, and continued policy efforts and the maintenance of their effectiveness are required.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_1: "Continued Low Birthrate Pressure (Level 2)"
 JAP_depopulation_1_desc: "Efforts such as childrearing support and work-style reforms are showing some results, but the pressure surrounding the declining birthrate still remains across society as a whole. While there are signs of recovery in birth trends, issues such as anxiety about the future are hindering the spread of improvement. The situation is not one of one-sided deterioration, but continued countermeasures are essential.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_2: "Prolonged Declining Birthrate (Level 3)"
 JAP_depopulation_2_desc: "The progression of the declining birthrate remains a national issue, and no clear improvement has been achieved. Although some progress can be seen in certain areas through the accumulation of measures, structural problems spanning employment, household finances, and living conditions remain, and birth trends continue at a low level. Rapid deterioration has been restrained, but the situation is still far from reassuring.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_3: "Worsening Declining Birthrate (Level 4)"
 JAP_depopulation_3_desc: "The downward trend in the number of births is still continuing, and concerns over the future population base remain strong. Factors such as the difficulty of balancing childrearing and employment, household financial burdens, and regional disparities in support systems are overlapping, and signs of improvement remain limited. Although countermeasures are being advanced, overall they have not been sufficient to fully contain the worsening situation.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_4: "Low Birthrate Crisis (Level 5)"
 JAP_depopulation_4_desc: "The prolonged worsening of birth trends has begun to place a heavy strain on multiple areas of national governance, as distortions in the population structure deepen. A shrinking labor force and growing concerns over social security burdens are advancing at the same time, and conventional responses have not been enough to put an effective brake on the trend. The declining birthrate is no longer merely an issue in one policy area — it has become a problem that threatens the very sustainability of the nation.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_entrenched_demand_shortfall_idea_1: "Entrenched Demand Slump"
 JAP_entrenched_demand_shortfall_idea_1_desc: "Deflationary expectations and anxiety about the future are suppressing household spending, while firms hold back investment in the face of weak demand. Wages are stagnant, prices barely move, and no one wants to be the first to spend. Japan's economy is not collapsing, but it is being drained by paralysis.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G30§!!"
 JAP_declining_birthrate_measures_modifier: "Declining Birthrate Measures"
 JAP_work_style_reform_modifier: "Work-Style Reform"
 JAP_work_style_reform_modifier_desc: "We will review long-standing practices that have relied on excessive working hours, protecting workers' health and stability in daily life while reshaping workplaces so operations can run sustainably. By improving rest practices and making labor management more transparent, and by reducing unfairness stemming from differences in employment status, we aim to build a society where balancing family and work is easier."
 JAP_long_working_idea: "A Culture of Long Working Hours"
 JAP_declining_birthrate_modifier: "Government Measures to Address the Declining Birthrate"
 JAP_declining_birthrate_modifier_desc: "Sharing a sense of urgency about the declining birthrate, the government is moving forward with childrearing support and a review of working practices. By easing anxieties about daily life and expanding options for starting a family, it seeks to restore a clearer outlook for the future."
 JAP_save_ice_age_generation_modifier: "Relief for the Employment Ice Age Generation"
 JAP_save_ice_age_generation_modifier_desc: "We will, as a nation, directly address and make up for the disadvantages borne by the generation that entered society during the employment ice age. By providing integrated support, from job searching and reskilling to changing how people work, and rebuilding housing and daily life, we will build a foundation that enables people to start over."
 JAP_ice_age_generation_idea: "The Employment Ice Age"
 JAP_ice_age_generation_idea_desc: "Job openings shrank drastically, creating a generation that lost its starting point regardless of ability or motivation. Prolonged unstable employment and stagnant incomes have persisted, and distrust about the future has settled across society as a whole.\n-------------\nIt can be §Gremoved§! by completing national focus starting from §Y$JAP_save_ice_age_generation$§!!."
 JAP_industries_modifier: "$JAP_industries$"
 JAP_industries_modifier_desc: "$JAP_industries_desc$"
 JAP_aftermath_of_disposal_non_performing_loans_idea: "Aftermath of the Acceleration of Non-Performing Loan Disposal"
 JAP_aftermath_of_disposal_non_performing_loans_idea_desc: "The acceleration of non-performing loan disposal is rapidly driving restructuring in financial institutions and corporations. As a result, while a path toward normalizing capital allocation is beginning to open, employment adjustments and disruptions in regional economies are spreading in the short term, increasing the social burden associated with unemployment measures, livelihood support, and reemployment assistance."
 JAP_transparency_and_audit_reform_modifier: "Transparency and Audit Reform"
 JAP_transparency_and_audit_reform_modifier_desc: "We will strengthen information disclosure and public records management, reducing opportunities for wrongdoing through digitalization and independent audits. By addressing amakudari and the opacity of political financing, we will enhance administrative efficiency and trust, as well as resilience to external influence."
 JAP_protecting_human_rights_modifier: "$JAP_protecting_human_rights$"
 JAP_protecting_human_rights_modifier_desc: "$JAP_protecting_human_rights_desc$"
 JAP_worker_protection_modifier: "Worker Protection"
 JAP_worker_protection_modifier_desc: "We will safeguard workers' livelihoods and security in the workplace, creating conditions that enable people to keep working over the long term. By supporting higher wages and better treatment and easing economic insecurity, we will strengthen social stability and the foundations of industry."
 JAP_redistribution_modifier: "$JAP_redistribution$"
 JAP_redistribution_modifier_desc: "$JAP_redistribution_desc$"
 JAP_energy_efficiency_idea: "$JAP_focusing_renewable_energy$"
 JAP_energy_efficiency_idea_desc: "$JAP_focusing_renewable_energy_desc$"
 JAP_leading_disarmament_idea: "$JAP_leading_disarmament$"
 JAP_leading_disarmament_idea_desc: "$JAP_leading_disarmament_desc$"
 JAP_leading_disarmament_idea_3: "Development as a Peaceful Nation"
 JAP_leading_disarmament_idea_3_desc: "We will clarify a national path that does not rely on military power and redirect resources and talent toward civilian development. By prioritizing the strengthening of our industrial base and urban functions and accelerating the construction of civilian industries and office districts, we will raise living standards and drive economic growth."
 JAP_prioritizing_order_modifier: "$JAP_prioritizing_order$"
 JAP_prioritizing_order_modifier_desc: "$JAP_prioritizing_order_desc$"
 JAP_strengthening_cabinet_modifier: "$JAP_strengthening_cabinet$"
 JAP_strengthening_cabinet_modifier_desc: "$JAP_strengthening_cabinet_desc$"
 JAP_regulatory_reform_modifier: "Regulatory Reform and a Growth Strategy"
 JAP_regulatory_reform_modifier_desc: "We will strengthen domestic competitiveness and shift toward a system that can sustain stable growth. By reducing constraints on business activity, we will harness private-sector dynamism to drive industry and employment forward."
 JAP_patriotic_education_modifier: "$JAP_patriotic_education$"
 JAP_patriotic_education_modifier_desc: "$JAP_patriotic_education_desc$"
 JAP_strengthen_military_idea: "$JAP_strengthen_military_power$"
 JAP_strengthen_military_idea_desc: "$JAP_strengthen_military_power_desc$"
 JAP_jsdf_international_missions_idea1a: "Institutional Foundation for International Cooperation Missions"
 JAP_jsdf_international_missions_idea1a_desc: "The development of the legal framework and operational standards necessary for international cooperation missions has advanced. With procedures for overseas deployment and response standards during missions becoming clearer, the stability of force operations and the consistency of on-site decision-making are improving."
 JAP_constitutional_debate_idea: "Escalating Constitutional Debate"
 JAP_constitutional_debate_idea_desc: "A major shift in security policy has shaken long-held assumptions about the postwar order. While support for strengthening national defense is growing, opposition from those concerned about the retreat of pacifism remains strong, and conflict within society and the political sphere is intensifying."
 JAP_f15_programe: "F15 Upgrade Program"
 JAP_submarine_modernization_idea: "Submarine Modernization Program"
 JAP_carrier_aviation: "Aircraft Carrier Restoration"
 JAP_keen_sword_operation_idea: "Keen Sword Exercises"
 JAP_defense_technology_agency1: "Nippon Defense Technology Agency"
 JAP_defense_technology_agency1_desc: "The Nippon Defense Technology Agency coordinates research, development, and procurement across industry, academia, and the armed forces. By unifying advanced projects under a single strategic vision, Japan accelerates innovation, reduces duplication, and ensures that cutting-edge technologies reach frontline units faster."
 JAP_diplomacy_modifier: "Japan's Diplomacy"
 JAP_diplomacy_modifier_desc: "Japan places emphasis on bilateral ties with key nations, enhancing cooperation in areas such as economy, security, and culture. Through pragmatic, interest-based partnerships, Japan is strengthening its presence on the global stage."
 JAP_chiang_mai_initiative: "Chiang Mai Initiative"
 JAP_chiang_mai_initiative_desc: "With the expansion of currency swap arrangements with Japan, ASEAN member states strengthen their resilience to financial crises, enhancing economic stability and autonomy."
 JAP_quantitative_oda_idea: "Japanese ODA Infrastructure Investment"
 JAP_quantitative_oda_idea_desc: "Japan's Official Development Assistance has accelerated the development of infrastructure such as transportation, ports, and electricity. This support serves as a vital foundation for our nation's economic growth."
 JAP_qualitative_oda_idea: "Japanese ODA for Human Capital and Innovation"
 JAP_qualitative_oda_idea_desc: "Cooperation with Japan has brought significant progress in education, human resource development, and research. Strengthening the capacity of local enterprises and institutions paves the way for sustainable development."
 JAP_security_south_china_sea_idea: "Japanese Engagement in Maritime Stability"
 JAP_security_south_china_sea_idea_desc: "Japan's neutral engagement in maritime security in the South China Sea has helped ease regional tensions and protect freedom of navigation. It serves as a reliable stabilizing presence for our region."
 JAP_jap_education: "Japan-U.S. Educational Exchange Program"
 JAP_jap_education_desc: "A hybrid educational program combining Japan's discipline with America's entrepreneurial spirit is being piloted. This mutual learning of strengths provides valuable stimulus for the development of future generations."
 JAP_jap_education_culture: "Japan U.S. Cultural and Educational Cooperation"
 JAP_jap_education_culture_desc: "A more comprehensive partnership is emerging between Japan and the United States, extending beyond pop culture and advanced technologies. Human resource development has deepened through a fusion of Japan's discipline-focused education and America's creativity-driven ethos. The synergy of cultural affinity and scientific collaboration fosters both societal stability and momentum for innovation."
 JAP_dual_use_idea: "Japan U.S. Dual-Use Research Cooperation"
 JAP_dual_use_idea_desc: "Cooperation between Japan and the United States in dual-use technologies is being enhanced. Accelerated development and shared expertise promise greater future competitiveness in both civilian and military fields."
 JAP_disaster_countermeasure_cooperation_idea: "Enhanced Disaster Resilience through Cooperation"
 JAP_disaster_countermeasure_cooperation_idea_desc: "Through disaster response cooperation with Japan, Taiwan has significantly strengthened its capacity to deal with emergencies. Knowledge exchange and joint training programs are expected to reduce damage and accelerate recovery."
 JAP_tai_high_technology_idea: "Japan-Taiwan Advanced Technology Partnership"
 JAP_tai_high_technology_idea_desc: "Joint research with Japan is accelerating innovation in Taiwan's civilian technology sectors. Shared research resources and international collaboration are enhancing industrial competitiveness."
 JAP_tai_international_student_idea: "Next-Generation Exchange with Japan"
 JAP_tai_international_student_idea_desc: "The expansion of study opportunities in Japan allows more Taiwanese students to gain diverse academic experiences. This fosters the development of future leaders in Japan-Taiwan relations and broadens international perspectives."
 JAP_chi_kor_intellectual_platform: "East Asian Memory Dialogue Platform"
 JAP_chi_kor_intellectual_platform_desc: "With support from the United Nations, Japan, China, and South Korea have launched a joint intellectual platform to preserve historical memories and deepen mutual understanding. This initiative marks a new international framework that balances historical reflection with forward-looking cooperation."
 JAP_chi_trade_support_idea: "International Harmonization of Trade Systems"
 JAP_chi_trade_support_idea_desc: "With technical and institutional support from Japan, China is advancing the development of trade systems aligned with international standards. Reforms such as streamlined customs procedures and legal revisions are contributing to institutional modernization."
 JAP_chi_advancement_companies_idea: "Enhanced Industrial Integration with Japan"
 JAP_chi_advancement_companies_idea_desc: "The mutual expansion of Japanese and Chinese companies is streamlining production networks and deepening economic interdependence between the two nations."
 JAP_chi_kanji_idea: "Sino-Japanese Cultural Sphere Cooperation"
 JAP_chi_kanji_idea_desc: "Through cultural cooperation with Japan, China is strengthening exchanges within the shared \"Sino-Character Cultural Sphere.\" This contributes to enhanced soft power and a more favorable international image."
 JAP_chi_temple_idea: "Joint Buddhist Heritage Preservation"
 JAP_chi_temple_idea_desc: "By jointly preserving and restoring Buddhist temples and cultural assets with Japan, China is reaffirming the value of its religious heritage while promoting tourism."
 JAP_kor_accelerator_idea: "Tokyo Seoul Accelerator Cooperation"
 JAP_kor_accelerator_idea_desc: "The startup support framework jointly established between Seoul and Tokyo is fostering the next generation of entrepreneurship and enhancing intercity technological cooperation."
 JAP_kor_local_companies_idea: "Local Business Exchange Program"
 JAP_kor_local_companies_idea_desc: "Through business exchanges between local companies in Korea and Japan, regional economies are revitalizing and new private-sector industrial networks are being formed."
 JAP_kor_aging_idea: "Joint Aging Society Taskforce"
 JAP_kor_aging_idea_desc: "To address the shared challenge of aging populations, a joint taskforce of Korean and Japanese experts has been formed to exchange policy insights and enhance social welfare measures."
 JAP_sov_logistics_corridor_idea: "Japan Russia Eurasian Logistics Network"
 JAP_sov_logistics_corridor_idea_desc: "Through cooperation with Japan, development of the logistics corridor connecting Japan and Europe via Russia is underway. Infrastructure upgrades and economic linkage are enhancing Russia's geopolitical significance."
 JAP_sov_it_corridor_idea: "Japan Russia Digital Connectivity Initiative"
 JAP_sov_it_corridor_idea_desc: "With support from Japan, Russia is expanding its IT infrastructure. The Japan Russia partnership aims to build a broad digital corridor and establish a foundation for global information exchange."
 JAP_territorial_disputes1: "Political Gains from Territorial Negotiations"
 JAP_territorial_disputes1_desc: "With a certain degree of progress having been made in the long-standing territorial issues, tensions in the surrounding waters have eased somewhat, and a sense of relief is spreading in domestic public opinion as well. The reduction of diplomatic uncertainty is also having a positive effect on economic activity in coastal regions, supporting the tax revenue base related to the fishing industry through improvements in operating conditions."
 JAP_monarchist_shipbuilding_idea: "Imperial Naval Construction Drive"
 JAP_monarchist_shipbuilding_idea_desc: "The Empire will return to the sea as its natural domain. Under an Imperial Naval Construction Drive, shipyards are expanded, contracts are centralized, and production is pushed at sustained wartime tempo until the fleet matches Japan's ambition. Laid down in the Emperor's name, the seas belong to the Empire!"
 JAP_monarchist_shipbuilding_idea_tt: "§RThis idea will cancel when you are§! §Y$naval_power_of_the_continent$§!"
 JAP_restoring_imperial_household_idea: "Restoring the Imperial Household"
 JAP_restoring_imperial_household_idea_desc: "The Imperial Household is being rebuilt as an institution of state, not a decorative court. Its offices are expanded, its protocols formalized, and its influence restored through appointments that bind ministries and society closer to the Throne. The Emperor's household will once again function as the quiet engine of national cohesion and direction."
 JAP_once_millennium_disaster: "A Once-in-a-Millennium Disaster"
 JAP_once_millennium_disaster_desc: "The Great East Japan Earthquake of March 11, 2011, stands as one of the most devastating disasters in modern Japanese history. The earthquake and tsunami shattered infrastructure, industries, and livelihoods in an instant, plunging the nation into severe turmoil. The path to recovery will be long and arduous, demanding enormous resources and time."
 JAP_scars_earthquake_and_tsunami: "Scars of the Earthquake and Tsunami"
 JAP_scars_earthquake_and_tsunami_desc: "The Great East Japan Earthquake and its devastating tsunami inflicted catastrophic damage on the Tohoku region's cities, ports, and coastal communities. Infrastructure and industrial facilities were destroyed, severely undermining local productivity and livelihoods. Recovery will take years and require immense resources and effort."
 JAP_scars_earthquake: "Scars of the Earthquake"
 JAP_scars_earthquake_desc: "The tremors of the Great East Japan Earthquake also struck the Kanto region, heavily affecting transportation networks and disrupting parts of the industrial base. Even the capital area experienced a temporary decline in economic activity. Though the devastation is not as severe as in Tohoku, recovery still demands considerable time and effort."
 JAP_focus_renewable_energy_idea: "Focus on Renewable Energy"
 JAP_focus_renewable_energy_idea_desc: "Concerns about nuclear safety have led us to prioritize renewable energy, strengthening our long-term independence in power generation."
 JAP_focus_energy_TT: "Additional Expenses: §R0.01%§! of GDP"
 JAP_focus_thermal_power_idea: "Focus on Fossil Fuel Powerplants"
 JAP_focus_thermal_power_idea_desc: "Choosing fossil fuel powerplants ensures stable output and immediate supply, especially while nuclear safety remains a national concern."
 JAP_anxiety_nuclear_power: "Public Anxiety over Nuclear Power"
 JAP_anxiety_nuclear_power_desc: "The shock of the Fukushima Daiichi accident has spread fear and distrust of nuclear power throughout society. Public opposition and procedural delays are stalling new construction, while political turmoil continues."
 JAP_shut_down_nuclear_plants: "Shut Down All Nuclear Plants"
 JAP_shut_down_nuclear_plants_desc: "By deciding to shut down nuclear power, the government has responded directly to public fears. Opposition remains, but the decision is widely seen as prioritizing safety, and social unrest is gradually easing."
 JAP_nuclear_strict_examination: "Tightened Nuclear Safety Standards"
 JAP_nuclear_strict_examination_desc: "In response to the accident, regulations and reviews have been drastically strengthened. New builds and restarts now require additional measures and lengthy procedures, making nuclear power slower to expand and less capable of operating at previous levels."
 JAP_continue_nuclear_plants: "Continue Nuclear Power Generation"
 JAP_continue_nuclear_plants_desc: "The government has chosen to maintain nuclear power, but the memory of the accident remains vivid. Distrust and backlash over safety persist, fueling political conflict that undermines domestic stability."
 JAP_crown_centered: "Resurgence of Crown-Centered Thought"
 JAP_crown_centered_desc: "Following Prime Minister Mori's remarks, traditionalist and monarchist rhetoric has begun to gain momentum in some circles. As the government has shown a willingness to make use of this trend, a movement seeking to re-evaluate the Imperial Household as the central principle of the state has begun to acquire limited, but growing, political influence."
 JAP_monarchist_modifier: "Imperial Rule"
 JAP_monarchist_modifier_desc: "The Throne has returned to command, and the state now moves by imperial mandate rather than party bargaining. Ministries, security organs, and industry are aligned under a single doctrine that treats the Emperor as the source of legitimacy and direction."
