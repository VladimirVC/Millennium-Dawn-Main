 RULE_RANDOM_INTERNAL_FACTIONS_YES_DESC: "모든 국가의 종교가 무작위로 설정됩니다."
 RULE_INFLUENCE_COOLDOWN: "투자 영향력 획득 대기시간"
 RULE_14_DAY_INFLUENCE: "14일 대기시간"
 RULE_14_DAY_INFLUENCE_DESC: "기본 설정입니다. 투자로 인한 영향력 획득의 대기시간은 14일(2주)입니다. 이는 해당 국가에 대한 모든 투자 기회에 적용됩니다. 대기시간 중에도 투자는 계속할 수 있지만, 영향력은 획득할 수 없습니다."
 RULE_0_DAY_INFLUENCE: "쿨다운 없음"
 RULE_0_DAY_INFLUENCE_DESC: "구버전 밀레니엄 던 방식의 투자 영향력 획득 규칙입니다. 원할 때마다 투자가 가능하며 그때마다 영향력을 얻습니다. 게임 밸런스를 중시하는 분들께는 권장하지 않습니다!"
 RULE_30_DAY_INFLUENCE: "30일 쿨다운"
 RULE_30_DAY_INFLUENCE_DESC: "멀티플레이 권장 설정입니다. 투자로 인한 영향력 획득의 대기시간은 30일(약 1개월)입니다. 이는 해당 국가에 대한 모든 투자 기회에 적용됩니다. 대기시간 중에도 투자는 계속할 수 있지만, 영향력은 획득할 수 없습니다."
