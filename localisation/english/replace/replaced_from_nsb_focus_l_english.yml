 SOV_proclaim_soviet_hegemony: "Proclaim Soviet Hegemony"
 EST_new_economic_policy_desc: "Since reestablishing our independence, we have managed to style ourselves as a gateway between East and West and pursue economic reform and integration with the West. Nevertheless we must form a new policy to be more in line with our foreign partners, a more lucrative and methodical policy."
 SOV_proclaim_soviet_hegemony_desc: "With the economy restored and the masses mobilized, Russia is ready to reclaim its leading role. We will openly assert Soviet primacy, shifting the balance of power eastward and pressuring the states of Europe to reckon with our return."
 SOV_the_third_rome_desc: "Moscow, the Third Rome, is the idea that Moscow is the successor to ancient Rome and Byzantium, carrying forward the legacy of the Roman Empire. This concept has been debated throughout European history as to which city rightfully inherits this legacy."
 polish_focus: "Poland Focus Tree"
 SOV_socialist_humanism_desc: "Socialism is not only a matter of factories and quotas, but of the dignity of the worker. We will place human welfare at the heart of the revolution, proving that the communist path serves the people rather than the other way around."
 SOV_socialist_humanism: "Socialist Humanism"
 SOV_the_third_rome: "The Third Rome"
