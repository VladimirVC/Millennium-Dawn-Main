 ALG_independent_judiciary: "司法独立"
 ALG_transparent_budget: "透明预算"
 ALG_appoint_sellal: "任命阿卜杜勒-马利克·塞拉勒"
 ALG_appoint_sellal_desc: "作为布特弗利卡的技术官僚和忠实支持者，塞拉勒代表着政策的延续性和务实治理，其施政重点在于维护稳定并管理好国家机构。"
 ALG_sellal_gets_appointed: "阿卜杜勒-马利克·塞拉勒已被任命为总理。"
 ALG_sellal_modifiers: "§Y任命塞拉勒效果：§!\n民主思潮倾向：§G+0.10§!\n官僚机构成本：§G-10%§!\n税收收入：§G+3%§!\n预期警务支出：§R-1§!\n预期医疗支出：§R-1§!"
 ALG_appoint_ouyahia: "任命艾哈迈德·乌叶海亚"
 ALG_appoint_ouyahia_desc: "乌叶海亚是一位资深政治家，以严苛的财政政策和对执政集团的忠诚而闻名。他的领导风格倾向于中央集权和财政纪律。"
 ALG_ouyahia_gets_appointed: "艾哈迈德·乌叶海亚已被任命为总理。"
 ALG_ouyahia_modifiers: "§Y任命乌叶海亚效果：§!\n民主倾向：§G+0.10§!\n官僚机构成本：§G-10%§!\n税收收入：§G+3%§!\n预期警察支出：§R-1§!\n预期医疗支出：§R-1§!"
 ALG_appoint_bedoui: "任命努尔丁·贝都依"
 ALG_appoint_bedoui_desc: "贝杜伊是一位职业官僚和部长，体现了对总统的技术官僚式忠诚。他的执政风格强调行政效率和有限的改革。"
 ALG_bedoui_gets_appointed: "努尔丁·贝都依已被任命为总理。"
 ALG_bedoui_modifiers: "§Y任命贝都依效果：§!\n民主思潮倾向：§G+0.10§!\n行政成本：§G-10%§!\n税收收入：§G+3%§!\n预计警务支出：§R-1§!\n预计医疗支出：§R-1§!"
 ALG_no_pm_set: "§R未任命总理§!"
 ALG_sellal_idea: "阿卜杜勒马利克·塞拉勒总理"
 ALG_sellal_idea_desc: "塞拉尔是一位务实的技术官僚，也是总统的忠实助手。在他的任期内，他优先考虑的是行政稳定和机构忠诚，而不是大胆的改革。"
 ALG_ouyahia_idea: "总理艾哈迈德·乌叶海亚"
 ALG_ouyahia_idea_desc: "乌叶海亚以其紧缩措施和与当权派的密切关系而闻名，他的领导体现了国家权力的延续性，并注重财政控制。"
 ALG_bedoui_idea: "总理努尔丁·贝都依"
 ALG_bedoui_idea_desc: "贝杜伊从官僚转为政治家，他的任命强调了行政上的忠诚，以及在总统的密切监督下谨慎的改革。"
 ALG_pm.1.t: "政府改组"
 ALG_pm.1.d: "总统府宣布了政府改组。总理职位再次空缺，总统必须决定由谁来担任政府首脑。"
 ALG_pm.1.a: "启动任命新总理的程序。"
 ALG_ahmed_gaid_salah_desc: "国家人民军总参谋长艾哈迈德·盖德·萨拉赫是一名职业军官，他在独立战争期间逐步晋升，后来成为阿尔及利亚军事和政治事务中最有影响力的人物之一。"
 ALG_smain_lamari_desc: "阿尔及利亚情报和反间谍部门负责人斯迈因·拉马里在“黑色十年”期间针对伊斯兰叛乱分子的“肮脏战争”中发挥了核心作用。"
 ALG_kaidi_mohamed_desc: "凯迪·穆罕默德是一位受人尊敬的军官，在机械化部队方面经验丰富，专长于装甲战和阿尔及利亚陆军的现代化。"
 ALG_ahcene_tafer_desc: "阿赫塞纳·塔费尔因其在阿尔及利亚机械化部队的领导才能以及在内战后军队重组中所发挥的作用而闻名。"
 ALG_mohammed_larbi_haouli_desc: "穆罕默德·拉比·哈乌利在阿尔及利亚海军现代化时期担任海军司令，在海岸防御和区域合作之间取得了平衡。"
 ALG_ammar_atamnia_desc: "阿马尔·阿塔姆尼亚是阿尔及利亚陆军的一名高级军官，曾担任战略家，他以重视防御战和军事训练而闻名。"
 ALG_mohammed_al_arabi_hawalli_desc: "穆罕默德·阿拉比·哈瓦利曾担任海军指挥职务，并为阿尔及利亚海军部队的改革做出了贡献。"
 ALG_mahmoud_laraba_desc: "空军指挥官马哈茂德·拉拉巴参与了飞行员培训和阿尔及利亚防空网络的重组。"
 ALG_mohamed_lamari_desc: "在“黑色十年”期间，穆罕默德·拉马里担任总参谋长，是指挥阿尔及利亚反叛乱行动的关键人物之一。"
 ALG_said_chengriha_desc: "赛义德·程格里哈专攻装甲战和后勤，后来晋升为阿尔及利亚陆军司令，最终担任总参谋长。"
 ALG_ben_ali_ben_ali_desc: "作为阿尔及利亚精锐部队的指挥官，本·阿里在步兵中树立了专业精神和纪律性的声誉。"
 ALG_fatima_zohra_ardjoune_desc: "法蒂玛·祖赫拉·阿杜恩是阿尔及利亚首批晋升为将军的女性之一，她是一名军医，也是军队现代化的象征。"
 ALG_mohamed_mediene_desc: "穆罕默德·梅迪耶内，绰号“图菲克”，从 1990 年到 2015 年担任阿尔及利亚强大的情报机构的负责人，是阿尔及利亚现代史上最有影响力的人物之一。"
 ALG_abdelmalek_guenaizia_desc: "阿卜杜勒马利克·盖奈齐亚曾担任国防部副部长，后来担任总参谋长，在阿尔及利亚军队现代化进程中发挥了关键作用。"
 ALG_ahmed_bousteila_desc: "阿尔及利亚宪兵司令艾哈迈德·布斯泰拉负责阿尔及利亚农村地区的安全以及打击走私和恐怖主义的行动。"
 ALG_fatima_boudouani_desc: "法蒂玛·布杜瓦尼是阿尔及利亚军队中第一位晋升为将军的女性（2009年），这标志着军队内部性别融合的突破。"
 alg_medal_1: "11月1日勋章"
 alg_medal_1_desc: "因在保卫国家中表现出非凡的勇气而获颁此奖。"
 alg_medal_2: "民族解放勋章"
 alg_medal_2_desc: "纪念为阿尔及利亚独立斗争做出杰出贡献的人士。"
 alg_medal_3: "军功勋章"
 alg_medal_3_desc: "因指挥和服务方面的卓越表现而授予。"
 alg_medal_4: "勇气勋章"
 alg_medal_4_desc: "表彰战场上的英勇行为。"
 alg_medal_5: "人民服役奖章"
 alg_medal_5_desc: "因在保护平民方面做出无私奉献而获颁此奖。"
 alg_medal_6: "烈士遗赠勋章"
 alg_medal_6_desc: "象征着为国捐躯的最高牺牲。"
 ALG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_0: "少尉"
 ALG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_1: "中尉"
 ALG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_2: "上尉"
 ALG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_3: "少校"
 ALG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_4: "上校"
 algeria_intro.1.t: "阿尔及利亚人民民主共和国"
 algeria_intro.1.d: "阿尔及利亚带着“黑色十年”的血腥创伤步入21世纪，却依然屹立不倒。国家虽然挺过了伊斯兰叛乱，但内战的创伤依然难以磨灭。总统阿卜杜勒-阿齐兹·布特弗利卡承诺实现和解与重建，但摆在面前的挑战依然艰巨：重振经济、改革军队、重建民众与国家之间的信任，以及在强大的外国伙伴之间周旋。阿尔及利亚能否巩固稳定，崛起为地区强国，还是会再次陷入内战的泥潭？"
 algeria_intro.1.a: "一个伤痕累累但并未被打垮的国家。"
 ALG_resistance_window_title: "阿尔及利亚抵抗运动"
 ALG_resistance_window_desc: "全国上下爆发了大规模的抗议、动乱和抵抗运动。权力集团试图镇压异议，但施压越大，抵抗就越强烈。"
 ALG_protester_exhaustion_TT: "§Y示威者§!已经对政府的反制措施感到疲惫不堪。"
 ALG_deploys_security_TT: "§Y政府部署大量安全部队镇压动乱。§!"
 ALG_presidential_decisions_only_one_is_available_TT: "一次只能启用一项镇压措施。"
 ALG_resistance_movement: "人民运动"
 ALG_resistance_movement_desc: "阿尔及利亚全国范围内的草根抗议活动（称为“人民运动”）仍在继续，抗议者要求进行政治改革、提高透明度并实现社会正义。"
 ALG_throttle_internet_speeds: "第24-17号法令 - 通信监管"
 ALG_throttle_internet_speeds_desc: "根据第24-17号法令，当局限制民众访问网络平台和社交媒体，以干扰“人民运动”的组织者。这限制了抗议活动的协调，但也令民众感到沮丧，并减缓了经济活动。"
 ALG_nationwide_security_presence: "沙漠之鹰行动 - 国家安全存在"
 ALG_fund_pro_government_protests: "国家团结计划— “巴拉卡”倡议"
 ALG_fund_pro_government_protests_desc: "政府通过“巴拉卡计划”资助并组织亲政权示威活动，以对抗“人民运动”。这虽然可以削弱反对派的势头，但成本高昂，而且有可能激起公众的不满。"
 ALG_deploy_security_kabylia_1: "向卡比利亚部署安全部队"
 ALG_deploy_security_kabylia_1_desc: "卡比利亚地区已成为动荡不安的温床。部署安全部队或许能平息该地区的局势，但也可能进一步激化当地民众的不满情绪。"
 ALG_deploy_security_mzab_1: "向姆扎卜部署安全部队"
 ALG_deploy_security_mzab_1_desc: "姆扎卜山谷的紧张局势已经升级。派遣安全部队或许能够遏制当地的动乱，但强硬手段可能会疏远社区，并破坏长期的信任关系。"
 ALG_deploy_security_aures_1: "向奥雷斯高地部署安全部队"
 ALG_deploy_security_aures_1_desc: "奥雷斯高地已成为示威活动的焦点。部署安保力量可以驱散大型集会，但这会给崎岖地形的后勤保障带来压力，并可能加剧当地的不满情绪。"
 ALG_deploy_security_tamanrasset_1: "向塔曼拉塞特部署安全部队"
 ALG_deploy_security_tamanrasset_1_desc: "塔曼拉塞特南部各省的动荡局势日益加剧。部署部队或许能够稳定交通路线和重要设施，但也可能损害与当地社区的关系，并扰乱跨撒哈拉贸易。"
 ALG_deploy_security_granderg_1: "向大东方沙漠部署安全部队"
 ALG_deploy_security_granderg_1_desc: "大东方沙漠周围的动乱威胁到偏远居民点和关键基础设施。安全巡逻可以带来短期秩序，但恶劣的环境使得持续行动成本高昂且在政治上十分敏感。"
 ALG_deploy_security_atlas_1: "向阿特拉斯山麓部署安全部队"
 ALG_deploy_security_atlas_1_desc: "阿特拉斯山麓地区曾多次发生抗议和劳工行动。有针对性的部署可以防止沿交通走廊发生大规模集会，但可能会加剧农村人口的不满情绪。"
 ALG_deploy_security_constantinois_1: "向君士坦丁地区部署安全部队"
 ALG_deploy_security_constantinois_1_desc: "君士坦丁及其周边地区频繁发生示威游行。在此集中部署安保力量可以保护政府设施和港口，但也增加了人口密集城区发生冲突的可能性。"
 ALG_deploy_security_algerois_1: "向阿尔及尔都会区部署安全部队"
 ALG_deploy_security_algerois_1_desc: "阿尔及尔仍然是“人民运动”的中心。大规模的安全部署可以遏制街头动员并保障机构安全，但同时也可能导致首都出现公开镇压，并引发严重的政治后果。"
 ALG_deploy_security_oranais_1: "向奥兰和西海岸部署安全部队"
 ALG_deploy_security_oranais_1_desc: "奥兰地区与劳工和青年组织相关的示威活动日益增多。部署武力可以保护港口和经济中心，但也可能扰乱商业活动，并加剧与地方领导人的​​紧张关系。"
