 form_GCL_category: "Вторая Гран Колумбия"
 form_GCL_category_desc: "Великая Колумбия — ныне несуществующее государство, охватывающее современные национальные государства Эквадор, Колумбию, Панаму и Венесуэлу. Боливарианское государство является одним из олицетворений южноамериканской силы, поскольку это стоящая цель для нашей великой нации. Объединение наших родственников в наших братских нациях усилит и отменит иностранное влияние в нашей великой нации. Мы объявим Вторую Великую Колумбию и принесем единство нашим великим нациям!"
