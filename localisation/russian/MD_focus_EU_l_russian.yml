 EU_apply_for_membership_category: "Вступление в ЕС"
 EU_apply_for_membership_category_desc: "Становление членом ЕС — это сложная процедура, которая не происходит за один день. Как только страна-кандидат выполняет условия для членства, она должна внедрить правила и нормы ЕС во всех сферах.\nЛюбая страна, соответствующая условиям членства, может подать заявку. Эти условия известны как 'копенгагенские критерии' и включают: рыночную экономику, стабильную демократию и верховенство закона, а также принятие всего законодательства ЕС, включая нормы, касающиеся евро."
 EU_apply_for_membership: "Вступление в ЕС"
 EU_apply_for_membership_desc: "§Y[ROOT.GetNameWithFlag]§! может присоединиться к §C[EUU.GetFlag] Европейскому Союзу§!. Давайте споем Оду радости:\nРадость, прекрасная искра божественности,\nДочь из Элизиума,\nМы входим, пылая огнем,\nНебесное существо, в твое святилище!\nТвоя магия снова связывает\nКаждый случай строго разделен;\nВсе люди становятся братьями,\nГде обитает твое нежное крыло."
 USoE_integrate_new_members: "Интеграция новых стран-членов ЕС"
 USoE_integrate_new_members_desc: "Дополнительные страны решили двигаться вперед и присоединиться к Союзу. Пришло время интегрировать эти новые государства-члены и сделать Соединенные Штаты Европы еще сильнее в будущем."
 instrument_for_pre_accession_assistance: "Инструмент помощи для подготовки к вступлению (IPA)"
 instrument_for_pre_accession_assistance_desc: "Инструмент помощи для подготовки к вступлению (IPA) — это программа, с помощью которой ЕС поддерживает реформы в странах-кандидатах и потенциальных кандидатах на вступление, предоставляя финансовую и техническую помощь."
 instrument_for_pre_accession_assistance_tt: "Кандидаты на вступление в ЕС получают §YПрограмму предвступительной помощи§!"
 pre_accession_assistance_program: "Программа предварительной помощи при вступлении"
 pre_accession_assistance_program_desc: "§C[EUU.GetFlag][EUU.GetName]§! поддерживает реформы для стран-кандидатов на вступление, чтобы они могли выполнить критерии присоединения к §C[EUU.GetFlag][EUU.GetName]§!. Помощь в первую очередь направлена на борьбу с коррупцией и предоставление экономической выгоды государству для того, чтобы привести его финансы в порядок."
 EU_pre_accession_assistance: "Предвступительная поддержка"
 EU_pre_accession_assistance_desc: "§C[EUU.GetFlag][EUU.GetName]§! поддерживает реформы для стран-кандидатов на вступление, чтобы они могли выполнить критерии присоединения к §C[EUU.GetFlag][EUU.GetName]§!. Помощь в первую очередь направлена на борьбу с коррупцией и предоставление экономической выгоды, чтобы помочь привести наши финансы в порядок."
