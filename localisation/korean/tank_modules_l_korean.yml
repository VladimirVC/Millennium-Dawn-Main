 module_tank_exoskeletal_engine_gen1: "Exoskeletal Engine"
 module_tank_exoskeletal_engine_gen1_desc: "An external power and actuator framework that reinforces drivetrain output and improves mobility under heavy loads. It enhances acceleration and terrain handling for armored platforms, but increases production cost and maintenance burden due to complex actuators and advanced materials."
 module_tank_exoskeletal_engine_gen2: "Improved Exoskeletal Engine"
 module_tank_exoskeletal_engine_gen2_desc: "A refined exoskeletal power frame with improved efficiency, durability, and control integration, enabling stronger performance without constant breakdowns. It further boosts mobility and load tolerance, but remains expensive and resource intensive to produce at scale."
 super_heavy_tank_chassis_0: "1st Generation Medium Walker Hull"
 super_heavy_tank_chassis_0_desc: "Medium walker hulls refer to armored combat vehicle hulls that integrate a bipedal or multi-legged mobility system in place of conventional tracked or wheeled running gear. They typically combine a reinforced armored capsule, a power-dense engine or generator unit, and jointed actuator assemblies to enable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor."
 super_heavy_tank_chassis_1: "2nd Generation Medium Walker Hull"
 super_heavy_tank_chassis_1_desc: "Medium walker hulls refer to armored combat vehicle hulls that integrate a bipedal or multi-legged mobility system in place of conventional tracked or wheeled running gear. They typically combine a reinforced armored capsule, a power-dense engine or generator unit, and jointed actuator assemblies to enable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor."
 super_heavy_tank_chassis_2: "3rd Generation Medium Walker Hull"
 super_heavy_tank_chassis_2_desc: "Medium walker hulls refer to armored combat vehicle hulls that integrate a bipedal or multi-legged mobility system in place of conventional tracked or wheeled running gear. They typically combine a reinforced armored capsule, a power-dense engine or generator unit, and jointed actuator assemblies to enable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor."
 super_heavy_tank_chassis_3: "4th Generation Medium Walker Hull"
 super_heavy_tank_chassis_3_desc: "Medium walker hulls refer to armored combat vehicle hulls that integrate a bipedal or multi-legged mobility system in place of conventional tracked or wheeled running gear. They typically combine a reinforced armored capsule, a power-dense engine or generator unit, and jointed actuator assemblies to enable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor."
 super_heavy_tank_chassis_4: "5th Generation Medium Walker Hull"
 super_heavy_tank_chassis_4_desc: "Medium walker hulls refer to armored combat vehicle hulls that integrate a bipedal or multi-legged mobility system in place of conventional tracked or wheeled running gear. They typically combine a reinforced armored capsule, a power-dense engine or generator unit, and jointed actuator assemblies to enable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor."
 super_heavy_tank_artillery_chassis_0: "1st Generation Heavy Walker Hull"
 super_heavy_tank_artillery_chassis_0_desc: "Heavy walker hulls refer to armored combat vehicle hulls that integrate a quadrupedal mobility system in place of conventional tracked or wheeled running gear. They typically combine a heavily reinforced armored capsule, a high-output powerplant or generator unit, and four jointed actuator assemblies to enable stable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor. "
 super_heavy_tank_artillery_chassis_1: "2nd Generation Heavy Walker Hull"
 super_heavy_tank_artillery_chassis_1_desc: "Heavy walker hulls refer to armored combat vehicle hulls that integrate a quadrupedal mobility system in place of conventional tracked or wheeled running gear. They typically combine a heavily reinforced armored capsule, a high-output powerplant or generator unit, and four jointed actuator assemblies to enable stable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor. "
 super_heavy_tank_artillery_chassis_2: "3rd Generation Heavy Walker Hull"
 super_heavy_tank_artillery_chassis_2_desc: "Heavy walker hulls refer to armored combat vehicle hulls that integrate a quadrupedal mobility system in place of conventional tracked or wheeled running gear. They typically combine a heavily reinforced armored capsule, a high-output powerplant or generator unit, and four jointed actuator assemblies to enable stable movement over rubble, steep gradients, soft ground, and other terrain that can restrict traditional armor. "
 super_heavy_tank_destroyer_chassis_0: "1st Generation Light Walker Hull"
 super_heavy_tank_destroyer_chassis_0_desc: "Light walker hulls refer to compact bipedal armored hulls designed for high mobility and rapid repositioning over broken terrain. They are faster than medium walker hulls, but their reduced payload limits them to lighter weapons and mission equipment."
 super_heavy_tank_destroyer_chassis_1: "2nd Generation Light Walker Hull"
 super_heavy_tank_destroyer_chassis_1_desc: "Light walker hulls refer to compact bipedal armored hulls designed for high mobility and rapid repositioning over broken terrain. They are faster than medium walker hulls, but their reduced payload limits them to lighter weapons and mission equipment."
 super_heavy_tank_destroyer_chassis_2: "3rd Generation Light Walker Hull"
 super_heavy_tank_destroyer_chassis_2_desc: "Light walker hulls refer to compact bipedal armored hulls designed for high mobility and rapid repositioning over broken terrain. They are faster than medium walker hulls, but their reduced payload limits them to lighter weapons and mission equipment."
 tech_tank_walker_chassis_1: "Walker Tank Chassis II"
 tech_tank_walker_chassis_1_desc: "Early walker chassis replace tracks with powered leg assemblies, trading raw simplicity for terrain access and shock mobility in rubble, forests, and broken ground. They can step over obstacles that would stall conventional armor, but maintenance demands and cost rise sharply due to actuators, sensors, and complex balance systems."
 tech_tank_walker_chassis_2: "Walker Tank Chassis III"
 tech_tank_walker_chassis_2_desc: "Second generation walker chassis improve stability, load bearing, and damage tolerance through better control software and reinforced joint design. With stronger power trains and smarter suspension logic, walkers become viable heavy platforms for urban assault and extreme terrain, though they remain expensive and resource intensive to field at scale."
 walker_tank_module_railgun: "Walker Railgun"
 walker_tank_module_railgun_desc: "Railguns use electromagnetic acceleration to fire high-velocity projectiles, providing excellent armor piercing against heavily protected targets.\n\n§GDesigner Hint: Railguns significantly improve armor penetration, but they are more expensive to build.§!"
 walker_tank_module_tank_barrel: "Standard Tank Cannon"
 walker_tank_module_tank_barrel_desc: "Tank cannons provide a balanced, reliable main armament for armored combat, combining proven firepower with manageable production and maintenance requirements.\n\n§GDesigner Hint: Standard Tank Cannons are a cost-effective baseline weapon choice, offering dependable performance without specialized trade-offs§!"
 walker_tank_module_flamethrower: "Walker Flamethrower"
 walker_tank_module_flamethrower_desc: "Vehicle-mounted flamethrowers project burning fuel to clear infantry positions and light fortifications, making them highly effective against soft targets at close range.\n\n§GDesigner Hint: Flamethrowers excel at defeating soft targets and entrenched infantry, but they have very limited effect against heavily armored or hardened targets§!"
 walker_tank_module_heavy_machinegun: "Heavy Machine Gun"
 walker_tank_module_heavy_machinegun_desc: "Heavy machine guns provide a reliable, high-rate-of-fire weapon for suppressing infantry and engaging light vehicles, offering dependable close-to-mid range defense.\n\n§GDesigner Hint: Heavy Machine Guns are a straightforward, cost-effective secondary weapon option, ideal for general-purpose protection against soft targets§!"
 walker_tank_module_rocket_launcher: "Walker Rocket Launcher"
 walker_tank_module_rocket_launcher_desc: "Rocket launchers fire high-explosive and shaped-charge munitions to provide stronger hard-target performance than standard machine gun armaments.\n\n§GDesigner Hint: Rocket Launchers are more expensive than Heavy Machine Guns, but they offer higher hard attack and improved armor piercing against armored targets§!"
 walker_tank_module_vls: "Walker VLS"
 walker_tank_module_vls_desc: "Vertical Launch Systems enable walkers to carry and fire guided missiles from protected launch cells, delivering high-impact strikes and rapid salvo capability.\n\n§GDesigner Hint: VLS modules are far more expensive to build, but they provide significantly higher breakthrough and attack potential.§!"
 walker_tank_module_nuclear_engine_gen1: "Nuclear Engine I"
 walker_tank_module_nuclear_engine_gen1_desc: "Nuclear engines provide onboard power generation that eliminates conventional fuel consumption, enabling sustained operations without reliance on fuel logistics.\n\n§GDesigner Hint: Nuclear Engines remove fuel consumption, but they are more expensive to produce.§!"
 walker_tank_module_nuclear_engine_gen2: "Nuclear Engine II"
 walker_tank_module_nuclear_engine_gen2_desc: "$walker_tank_module_nuclear_engine_gen1_desc$"
