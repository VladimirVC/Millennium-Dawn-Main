l_braz_por:
 lithuania.1.t: "A Questão da Mažeikių Nafta"
 lithuania.1.d: "A única refinaria de petróleo da Lituânia, a Mažeikių Nafta, tornou-se um ponto de ebulição geopolítico. Tanto a gigante energética polonesa PKN Orlen quanto um consórcio russo expressaram interesse em adquirir a instalação. Mantê-la sob controle estatal continua sendo uma opção, embora custosa."
 lithuania.1.a: "Vender para a PKN Orlen"
 lithuania.1.b: "Vender para o consórcio russo"
 lithuania.1.c: "Manter a nacionalização"
 lithuania.2.t: "PKN Orlen adquire refinaria lituana"
 lithuania.2.d: "A PKN Orlen concluiu a aquisição da refinaria lituana Mažeikių Nafta, expandindo os interesses energéticos poloneses na região do Báltico."
 lithuania.2.a: "Um investimento sólido"
 lithuania.3.t: "Incêndio na Refinaria Mažeikiai"
 lithuania.3.d: "Um incêndio suspeito eclodiu na refinaria de petróleo de Mažeikiai. O momento, logo após a venda para interesses russos, alimentou especulações sobre sabotagem e levantou questões sobre a segurança da infraestrutura energética da Lituânia."
 lithuania.3.a: "Apontar o dedo para Moscou"
 lithuania.3.b: "Iniciar uma investigação discreta"
 lithuania.10.t: "O Futuro de Ignalina"
 lithuania.10.d: "A União Europeia exigiu que a Lituânia feche a Central Nuclear de Ignalina, que abriga dois reatores RBMK — o mesmo projeto que falhou em Chernobyl. O fechamento é uma condição para a adesão à UE, mas Ignalina fornece a maior parte da eletricidade da Lituânia. Uma usina substituta poderia ser construída em conjunto com a Polônia e os Estados Bálticos."
 lithuania.10.a: "Negociar uma usina substituta em conjunto com nossos vizinhos"
 lithuania.10.b: "Manter Ignalina funcionando"
 lithuania.10.c: "Fechar a usina sem uma alternativa"
 lithuania.11.t: "Proposta de Cooperação Nuclear da Lituânia"
 lithuania.11.d: "A Lituânia propôs que a Polônia cofinancie a construção da Usina Nuclear de Visaginas para substituir a obsoleta instalação de Ignalina. O projeto fortaleceria a independência energética do Báltico e aprofundaria os laços regionais, mas exige um investimento significativo."
 lithuania.11.a: "Aceitar a cofinanciar o projeto"
 lithuania.11.b: "Nos temos outras prioridades"
 lithuania.12.t: "Polônia concorda com a cooperação nuclear"
 lithuania.12.d: "A Polônia concordou em cofinanciar a Usina Nuclear de Visaginas. A construção pode começar, embora o projeto levará anos para ser concluído e exigirá recursos substanciais."
 lithuania.12.a: "Iniciar construção"
 lithuania.13.t: "Polônia recusa a cooperação nuclear"
 lithuania.13.d: "A Polônia declinou participar do projeto Visaginas. A Lituânia deve agora decidir o destino de Ignalina por conta própria."
 lithuania.13.a: "Manter Ignalina em operação, apesar dos riscos"
 lithuania.13.b: "Fechar a usina — nós nos viraremos sem ela"
 lithuania.14.t: "Referendo sobre a Usina Nuclear de Visaginas"
 lithuania.14.d: "Após anos de construção, o projeto da Usina Nuclear de Visaginas enfrenta um referendo nacional. A opinião pública está dividida entre aqueles que a consideram essencial para a segurança energética e aqueles preocupados com a segurança nuclear e com o estouro do orçamento."
 lithuania.14.a: "O povo aprova a planta"
 lithuania.14.b: "O povo rejeita o projeto"
 lithuania.15.t: "Projeto Visaginas Completo"
 lithuania.15.d: "A Usina Nuclear de Visaginas, um projeto conjunto entre Lituânia e Polônia, está operacional. O projeto representa um marco na cooperação energética do Báltico e na independência regional em relação ao gás russo."
 lithuania.15.a: "Um triunfo da cooperação"
 lithuania.16.t: "Pressão Internacional sobre Ignalina"
 lithuania.16.d: "A União Europeia emitiu um aviso formal sobre a continuidade da operação da Usina Nuclear de Ignalina pela Lituânia. Sanções e a perda de fundos estruturais da UE estão em pauta caso os reatores do tipo Chernobyl não sejam desativados."
 lithuania.16.a: "Nós não temos escolha — desative a usina"
 lithuania.16.b: "Resistir a pressão"
 LIT_refinery_sale_revenue: "Receita da Venda da Refinaria"
 LIT_refinery_sale_revenue_desc: "O produto da venda da Mažeikių Nafta está proporcionando um impulso temporário ao orçamento nacional."
 LIT_russian_energy_leverage: "Influência Energética Russa"
 LIT_russian_energy_leverage_desc: "A venda da única refinaria da Lituânia para interesses russos deu a Moscou influência econômica sobre a política energética lituana."
 LIT_nationalized_refinery: "Refinaria Nacionalizada"
 LIT_nationalized_refinery_desc: "A Lituânia manteve o controle estatal da Mažeikių Nafta, garantindo a segurança de recursos em detrimento da eficiência operacional."
 LIT_energy_deficit: "Déficit Energético"
 LIT_energy_deficit_desc: "O fechamento da Usina Nuclear de Ignalina sem uma alternativa de reposição deixou a Lituânia dependente de importações de energia dispendiosas."
 LIT_visaginas_nuclear_plant: "Planta de Energia Nuclear Visaginas"
 LIT_visaginas_nuclear_plant_desc: "A nova usina de Visaginas fornece energia limpa e confiável, tornando-se um símbolo da cooperação regional do Báltico."
 lithuania_news.1.t: "Mažeikių Nafta Vendida"
 lithuania_news.1.d_poland: "A Lituânia vendeu sua única refinaria de petróleo, a Mažeikių Nafta, para a gigante polonesa do setor de energia PKN Orlen. O negócio aprofunda os laços econômicos entre o Báltico e a Polônia e é visto em Bruxelas como um passo em direção à redução da dependência energética regional em relação à Rússia."
 lithuania_news.1.d_russia: "A Lituânia vendeu sua única refinaria de petróleo, a Mažeikių Nafta, para um consórcio apoiado pela Rússia. Críticos alertam que o negócio confere a Moscou uma alavancagem estratégica sobre a infraestrutura energética lituana."
 lithuania_news.1.a: "Um pilar do nosso futuro energético"
 lithuania_news.1.b: "Uma bem-vinda expansão para o mercado báltico"
 lithuania_news.1.c: "Mais um passo à frente na região"
 lithuania_news.1.d: "A segurança energética no Báltico passa por mudanças"
 lithuania_news.1.e: "Uma nota de rodapé na política energética europeia"
 lithuania_news.2.t: "Planta Nuclear Ignalina Fechada"
 lithuania_news.2.d: "A Lituânia fechou a Usina Nuclear de Ignalina, desativando o último de seus reatores RBMK da era soviética. O fechamento cumpre um requisito fundamental para a adesão à UE, mas deixa o país dependente de importações de energia até que uma fonte de reposição seja encontrada."
 lithuania_news.2.a: "As luzes continuarão acesas — de alguma forma"
 lithuania_news.2.b: "Uma vitória para a segurança nuclear na Europa"
 lithuania_news.2.c: "Um reator a menos no mundo"
 lithuania_news.3.t: "Planta Nuclear Visaginas Finalizada"
 lithuania_news.3.desc: "A nova usina nuclear de Visaginas, na Lituânia, entrou em operação, construída com cofinanciamento polonês. A instalação restaura a autossuficiência energética do país e marca uma conquista histórica na cooperação regional do Báltico."
 lithuania_news.3.a: "Independência energética, pelo menos"
 lithuania_news.3.b: "Nossos investimentos na região da frutos"
 lithuania_news.3.c: "Um novo capítulo para a política energética do Báltico"
 lithuania_news.3.d: "O Báltico garante seu futuro energético"