 BRA_idea_french_naval_studies: "Etudes Navales Françaises"
 BRA_idea_protegendo_nossas_riquezas: "Protégeons nos Riquezas"
 BRA_idea_mercosur_member_state: "État membre du Mercosur"
 BRA_idea_mercosur_member_state_desc: "Le MERCOSUR, ou MERCOSUL, est un pacte douanier et politique signé au début des années 90 par le Brésil, l'Argentine, l'Uruguay et le Paraguay. Plus tard, le reste de l'Amérique du Sud est devenu membre associé du MERCOSUR. L'organisation est digne d'apporter la prospérité et l'unité nécessaires à l'Amérique du Sud."
 BRA_idea_observer: "État observateur du Mercosur"
 BRA_idea_observer_desc: "[THIS.GetNameWithFlag] est un État observateur du MERCOSUR. L'État observateur participe activement aux discussions, comme l'État membre associé du Mercosur, mais n'est pas membre votant de l'organisation."
 BRA_idea_associate_states: "État membre associé du Mercosur"
