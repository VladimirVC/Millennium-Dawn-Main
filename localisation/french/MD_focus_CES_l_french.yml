 CES_modern_warfare: "La guerre moderne"
 CES_modern_warfare_desc: "Il est nécessaire d’adapter notre armée aux réalités modernes afin de pouvoir repousser efficacement toute menace extérieure."
 CES_new_air_doctrine: "Nouvelle doctrine aérienne"
 CES_new_air_doctrine_desc: "Nous devons changer notre approche des tactiques de guerre aérienne."
 they_lowered_our_debt_tt: "§GGrâce à eux, notre dette a été réduite.§!"
 they_refused_lowering_our_debt_tt: "§RIls ont refusé notre proposition de réduction de notre dette§!"
 joining_turkic_council_tt1: "\nNous rejoindrons un §CConseil turc§! pour améliorer nos relations avec les autres pays turcs."
 UZB_karakalpakstan_category: "La question du Karakalpakstan"
 UZB_karakalpakstan_category_desc: "Karakalpakstan separatism in Uzbekistan refers to a historical and ongoing regional movement centered around the desire for greater autonomy or even independence for the autonomous republic of Karakalpakstan within the boundaries of Uzbekistan. Karakalpakstan, located in the northwestern part of Uzbekistan, is predominantly inhabited by the Karakalpak people, who have distinct cultural, linguistic, and historical ties to the region.\n\nKarakalpakstan's Opinion: §Y[?UZB_karakalpakstans_opinion]§!\n\nUzbeks' Opinion: §Y[?UZB_uzbeks_opinion]§!\n"
 UZB_Promote_Karakalpakstan_identity: "Promouvoir l'identité du Karakalpakstan"
 UZB_karakalpakstan.1.t: "Conflit religieux entre Karakalpaks et Ouzbeks"
 UZB_karakalpakstan.1.d: "Ce matin, un affrontement a eu lieu entre Ouzbeks et Karakalpaks à la mosquée locale. Au départ, il s'agissait d'une simple altercation verbale, mais elle s'est rapidement transformée en bain de sang. Les deux camps estiment qu'une religion étrangère à la leur est présente sur leur terre. De quel côté sommes-nous ?"
 UZB_karakalpakstan.1.a: "Soutenir les Karakalpaks"
 UZB_karakalpakstan.1.b: "Soutenir les Ouzbeks"
 UZB_karakalpakstan.2.t: "Une bagarre dans un bar entre Karakalpaks et Ouzbeks"
 UZB_karakalpakstan.2.d: "A couple of hours ago there was a drunken altercation between Uzbeks and Karakalpaks. The conflict arose from differences in political views. After a series of mutual insults, both sides got into a fierce brawl involving improvised weapons."
 UZB_karakalpakstan.2.a: "Soutenir les Karakalpaks"
 UZB_karakalpakstan.2.b: "Soutenir les Ouzbeks"
 UZB_karakalpakstan.3.t: "Une rixe sur le terrain de football entre équipes locales"
 UZB_karakalpakstan.3.d: "A couple of hours ago there was a conflict between members of the Uzbek soccer team. The main reason was ethnic disagreement. One of the participants directed a highly offensive remark at another, which led to unrest on the soccer field."
 UZB_karakalpakstan.3.a: "Soutenir les Karakalpaks"
 UZB_karakalpakstan.3.b: "Soutenir les Ouzbeks"
 UZB_karakalpakstan.4.t: "Affrontements lors du festival du Karakalpakstan"
 UZB_karakalpakstan.4.d: "Alors que les Karakalpaks locaux célébraient leur fête nationale, des Ouzbeks radicalisés ont attaqué les participants. Plusieurs personnes ont été blessées et les assaillants ont été arrêtés par la police. Comment devons-nous gérer cela ?"
 UZB_karakalpakstan.4.a: "Soutenir les Karakalpaks"
 UZB_karakalpakstan.4.b: "Soutenir les Ouzbeks"
 Karakalpaks_rebelled_yes: "Le Karakalpakstan s'est rebellé"
 CES_economic_affairs: "Affaires économiques"
 CES_economic_affairs_desc: "Le début des années 2000 a marqué une période de transformation pour les pays d’Asie centrale alors qu’ils naviguaient dans le paysage complexe du développement économique et de la transition."
 CES_enlarge_the_mines: "Agrandir les mines"
 CES_enlarge_the_mines_desc: "Expanding our mines is necessary to grow the mining industry."
 CES_western_resource: "Sources d'énergie alternatives"
 CES_western_resource_desc: "We will develop alternative energy sources."
