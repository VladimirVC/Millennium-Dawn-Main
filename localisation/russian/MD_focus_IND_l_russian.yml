 IND_papua_resist_m1: "Минимальное сопротивление папуасских христиан"
 IND_papua_resist: "Сопротивление папуасских христиан"
 IND_papua_resist2: "Папуасское христианское сопротивление"
 IND_papua_resist3: "Папуасское христианское сопротивление"
 IND_papua_resist4: "Папуасское христианское сопротивление"
 IND_papua_resist_info: "Христиане нашей земли проживают в первую очередь в Папуа. К сожалению, они подвергаются жестокому обращению со стороны прошлого и нынешнего правительств, и жители очень не любят нас, что делает наши политические миссии там настоящим вызовом"
 IND_islamic_resist: "Сулавесийское мусульманское сопротивление"
 IND_islamic_resist2: "Сулавесийское мусульманское сопротивление"
 IND_islamic_resist3: "Сулавесийское мусульманское сопротивление"
 IND_islamic_resist4: "Сулавесийское мусульманское сопротивление"
 IND_islamic_resist_c1: "Минимальное сопротивление мусульман Сулавеси"
 IND_islamic_resist_info: "Сулавеси — один из наших крупнейших островов, и он населен многими разными народами. Однако, значительное мусульманское большинство призывает государство к пренебрежению и оказывает сильное сопротивление многим нашим силам и экономике. Это сопротивление очень усложняет жизнь нашим мужчинам и силам безопасности"
 IND_IND_Aceh_insurgency_from_level_1_to_level_2: "Изменить §YПовстанческое движение в Ачехе§! по \nОрганизация Восстановить: §G+10%§! \nСкорость роста сопротивляемости: §G-5%§!\nСоответствие требованиям: §G+5%§!\nМаксимальное количество отраслей в штате: §G+50%§!\nСкорость дивизий: §G+5%§! \nАчех находится в состоянии беспорядка и восстания с 1976 года, и это приводит нашу страну к нестабильности и ненужному кровопролитию. Наши военные слишком сосредоточены на борьбе с этими повстанцами, и это приводит к тому, что мы отстаем в военном отношении."
 IND_IND_Aceh_insurgency_from_level_2_to_level_3: "Изменить §YПовстанческое движение в Ачехе§! по \nОрганизация Восстановить: §G+2%§! \nСкорость роста сопротивляемости: §G-5%§!\nСоответствие требованиям §G+5%§!\nМаксимальное количество отраслей в штате: §G+15%§!\nСкорость дивизий: §G+20%§! \nАчех находится в состоянии беспорядка и восстания с 1976 года, и это приводит нашу страну к нестабильности и ненужному кровопролитию. Наши военные слишком сосредоточены на борьбе с этими повстанцами, и это приводит к тому, что мы отстаем в военном отношении."
 IND_IND_Aceh_insurgency_from_level_3_to_level_4: "Изменить §YПовстанческое движение в Ачехе§! по \nОрганизация Восстановить: §G+1%§! \nСкорость роста сопротивляемости: §G-3%§!\nСоответствие требованиям §G+2%§!\nМаксимальное количество отраслей в штате: §G+5%§!\n Ачех находится в состоянии беспорядка и восстания с 1976 года, и это приводит нашу страну к нестабильности и ненужному кровопролитию. Наши военные слишком сосредоточены на борьбе с этими повстанцами, и это приводит к тому, что мы отстаем в военном отношении."
