 IP_TITLE: "Идеологические силы"
 IP_communist_category_desc: "[IP_communist_powers]"
 IP_socialist_category_desc: "[IP_socialist_powers]"
 IP_conservative_category_desc: "[IP_conservative_powers]"
 IP_liberal_category_desc: "[IP_liberal_powers]"
 IP_autocrat_category_desc: "[IP_autocrat_powers]"
 IP_monarchist_category_desc: "[IP_monarchist_powers]"
 IP_fundamentalist_symbol_desc: "[IP_fundamentalist_powers]"
 IP_communist_category_desc_delayed: "§LКоммунисты обычно придерживаются той или иной формы марксизма-ленинизма или подобной идеологии. Будучи сторонниками государственной экономики, им легче проводить индустриализацию путем национализации иностранных предприятий и реализации пятилетних планов. Кроме того, они могут более эффективно улучшать свои собственные показатели с помощью шпионажа.§!"
 IP_socialist_category_desc_delayed: "§LСоциалисты сочетают элементы рыночного и государственного капитализма с прогрессивизмом. Довольно часто они стремятся направить все усилия государства на благо самой страны. Социалистам легко улучшить внутреннее положение своей страны посредством социальной политики и государственного вмешательства в экономику.§!"
 IP_conservative_category_desc_delayed: "§LКонсерваторы обычно хотят, чтобы страна оставалась в нынешнем состоянии, или даже чтобы были отменены некоторые более прогрессивные законы. Консерватизм часто сопровождается элементами национализма и глубокими религиозными убеждениями. По этой причине консервативным странам легче поддерживать политическую и национальную стабильность, поскольку радикальные перемены случаются редко.§!"
 IP_liberal_category_desc_delayed: "§LЛибералы, как правило, продвигают идеи свободы, хотя некоторые партии придерживаются более прогрессивного (социального либерализма) подхода к различным вопросам. В основе большинства либеральных партий лежит идея свободного рынка с очень ограниченным вмешательством государства.§!"
 IP_autocrat_category_desc_delayed: "§LАвтократы полагаются на власть сильных мужчин (а в редких случаях и сильных женщин) для управления страной. Демагоги не боятся использовать сомнительные методы и закулисные сделки, чтобы добиться желаемого. Автократам будет легче мириться с высокой коррупцией и удерживать власть в стране железной рукой.§!"
 IP_monarchist_category_desc_delayed: "§LМонархисты полагаются на родословную и славу для управления странами. Концентрация власти в одной семье имеет свои преимущества. Эта семья приносит власть, а монархи умеют вдохновлять свой народ.§!"
 IP_fundamentalist_symbol_desc_delayed: "§LФундаменталисты — это убежденные консерваторы, придерживающиеся радикальной или ультраконсервативной формы ислама. Их главная цель — распространение этих консервативных взглядов и в другие страны.§!"
