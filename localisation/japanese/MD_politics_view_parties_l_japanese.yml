 UAE.Neutral_Muslim_Brotherhood_desc: ""
 TUR.neutral_Social: "£TUR_neutral_Social (HEPAR) 民権と平等党"
 TUR.neutral_Social_icon: "£TUR_neutral_Social"
 TUR.neutral_Social_desc: "民権と平等党（トルコ語：Hak ve Eşitlik Partisi、HEPAR）は、「伝説の司令官」オスマン・パムコグルによって設立された政党である。同党はケマル主義を忠実に奉じ、階級や特権のない社会の実現を目標としている。他の政党とは異なり、HEPARは純粋な公的寄付によって資金調達されている。\n\nこの党に対する軍の§Y評価§!: §G+100§!"
 si_title_text: "政党と運動"
 POL.Nat_Populism_icon: "£POL_Nat_Populism_small"
 SAU.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 TUR.Communist-State_2015: "£TUR_Communist_State_2015 (Vatan Partisi) 愛国党"
 TUR.Communist-State_2015_icon: "£TUR_Communist_State_2015"
 TUR.Communist-State_2015_desc: "愛国党（トルコ語：Vatan Partisi）は、アメリカ拡張主義に反対する毛沢東ケマル主義の労働者党をリブランディングした政党である。同党は社会主義者、革命家、民族主義者、ケマル主義者の先鋒であると主張している。\n\nこの党に対する軍の§Y評価§!：§R-25§!"
 TUR.Conservative_reform: "£TUR_Conservative_reform (SP) 至福党"
 TUR.Conservative_reform_icon: "£TUR_Conservative_reform"
 TUR.Conservative_reform_desc: "イスラム主義 - 至福党（トルコ語：Saade Partisi）\n\n至福党は、現在禁止されている旧美徳党の強硬派で構成されるイスラム主義政党である。同党はエルドアン率いる公正発展党の主要な対抗勢力の一つであり、トルコのEU加盟に反対し、反アメリカかつ反イスラエルである。同党はまた、トルコが西側の脅威からイスラム世界を保護する主導的役割を担うべきだと主張している。\n\nこの党に対する軍の§Y評価§!：§R-100§!"
 TUR.Autocracy: "£TUR_Autocracy (EMEP) 労働党"
 TUR.Autocracy_icon: "£TUR_Autocracy"
 TUR.Autocracy_desc: "マルクス・レーニン主義 - 労働党（トルコ語：Emek Partisi）\n\n労働党は科学的社会主義を掲げ、民主的で独立したトルコを創ることを目標とする政党である。\n\nこの党に対する軍の§Y評価§!: §R-50§!"
 TUR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small 穏健イスラム主義"
 TUR.Neutral_Muslim_Brotherhood_desc: ""
 TUR.Neutral_Autocracy: "£TUR_Neutral_Autocracy (GP) 青年党"
 TUR.Neutral_Autocracy_icon: "£TUR_Neutral_Autocracy"
 TUR.Neutral_Autocracy_desc: "自由ポピュリズム - 青年党（トルコ語：GENÇPARTİ）\n\n青年党はポピュリスト的自由主義政党である。党首のジェム・ウザンは、自身の家族が所有するメディア帝国を利用して人気を高めることを躊躇せず、汚職や不正なビジネス慣行への関与が疑われている。\n\nこの党に対する軍の§Y評価§!: §G+50§!"
 TUR.Neutral_Autocracy_reform: "£TUR_Western_Autocracy (HM) ヒズメット運動"
 TUR.Neutral_Autocracy_reform_icon: "£TUR_Western_Autocracy"
 TUR.Neutral_Autocracy_reform_desc: "イスラム民主主義 - ギュレン運動（トルコ語：Gülen Hareketi）\n\nヒズメット、またはギュレン運動は、フェトフッラー・ギュレンが率いる越境的なイスラム社会団体である。同団体の目的は、宗教間対話の促進と世界中のムスリムの地位向上にあり、世界を代表するムスリムネットワークとなることを目指している。一部では、その目的がムスリム同胞団と大きく変わらず、イスラム支配の確立が真の主目的であるとの懸念も存在する。\n\nこの党に対する軍の§Y評価§!：§R-50§!"
 TUR.oligarchism: "£TUR_oligarchism (DYP) 正道党"
 TUR.oligarchism_icon: "£TUR_oligarchism"
 TUR.oligarchism_desc: "穏健派 - 正道党（トルコ語：Doğru Yol Partisi）\n\n正道党は自由保守政党である。国会議員の多くがトルコ・マフィアとの関係を暴露されたススルルク事件に、党所属議員の多くが関与していたことが明らかになった。\n\nこの党に対する軍の§Y評価§!: §R-25§!"
 TUR.oligarchism_2007: "£TUR_oligarchism (DP) 民主党"
 TUR.oligarchism_2007_icon: "£TUR_oligarchism"
 TUR.oligarchism_2007_desc: "民主党（トルコ語：Demokrat Parti、DP）は、旧正道党から改称した自由保守政党である。国会議員の多くがトルコ・マフィアとの関係を暴露されたススルルク事件に、党所属議員の多くが関与していたことが明らかになった。\n\nこの党に対する軍の§Y評価§!: §R-25§! "
 TUR.Neutral_Libertarian: "£TUR_Neutral_Libertarian (ANAP) 祖国党"
 TUR.Neutral_Libertarian_icon: "£TUR_Neutral_Libertarian"
 TUR.Neutral_Libertarian_desc: "リバタリアニズム - 祖国党（トルコ語：Anavatan Partisi）\n\n祖国党は、自由市場改革を支持する新自由主義政党である。\n\nこの党に対する軍の§Y評価§!: §G+50§!"
 TUR.Neutral_green: "£TUR_Neutral_green (HADEP) 人民民主党"
 TUR.Neutral_green_icon: "£TUR_Neutral_green"
 TUR.Neutral_green_desc: "社会民主主義 - 人民民主党（トルコ語: Halkın Demokrasi Partisi）\n\n人民民主党はクルド系少数民族政党である。党綱領には社会民主主義、緑の政治、少数民族および女性の権利が含まれる。\n\nこの党に対する軍の§Y評価§!: §R-50§!"
 TUR.Neutral_green_phase1: "£TUR_Neutral_green_phase1 (DEHAP) 民主人民党"
 TUR.Neutral_green_phase1_icon: "£TUR_Neutral_green_phase1"
 TUR.Neutral_green_phase1_desc: "民主人民党（トルコ語：Demokratik Halk Partisi、DEHAP）は、クルド系少数民族政党である。党綱領には社会民主主義、緑の政治、少数民族および女性の権利が含まれる。\n\nこの党に対する軍の§Y評価§!: §R-50§! "
 TUR.Neutral_green_phase2: "£TUR_Neutral_green_phase2 (DTP) 民主社会党"
 TUR.Neutral_green_phase2_icon: "£TUR_Neutral_green_phase2"
 TUR.Neutral_green_phase2_desc: "民主社会党（トルコ語：Demokratik Toplum Partisi、DTP）は、クルド系少数民族政党である。党綱領には社会民主主義、緑の政治、少数民族および女性の権利が含まれる。\n\nこの党に対する軍の§Y評価§!: §R-50§! "
 TUR.Neutral_green_phase3: "£TUR_Neutral_green_phase3 (BDP) 平和民主党"
 TUR.Neutral_green_phase3_icon: "£TUR_Neutral_green_phase3"
 TUR.Neutral_green_phase3_desc: "平和民主党（トルコ語：Barış ve Demokrasi Partisi、BDP）は、クルド系少数民族政党である。党綱領には社会民主主義、緑の政治、少数民族および女性の権利が含まれる。\n\nこの党に対する軍の§Y評価§!: §R-50§!"
 TUR.Neutral_green_phase4: "£TUR_Neutral_green_phase4 (HDP) 人民民主党"
 TUR.Neutral_green_phase4_icon: "£TUR_Neutral_green_phase4"
 TUR.Neutral_green_phase4_desc: "人民民主党（トルコ語：Halkların Demokratik Partisi、HDP）は、クルド系少数民族政党である。党綱領には社会民主主義、緑の政治、少数民族および女性の権利が含まれる。同党は地域住民議会の設立を支持している。\n\nこの党に対する軍の§Y評価§!: §R-50§!  "
 TUR.Nat_Populism: "£TUR_Nat_Populism (MHP) 民族主義者行動党"
 TUR.Nat_Populism_icon: "£TUR_Nat_Populism"
 TUR.Nat_Populism_desc: "ネオ・オスマン主義 - 民族主義者行動党（トルコ語：Milliyetçi Hareket Partisi）\n\n民族主義者行動党は超国粋主義政党である。同党は創設者が提唱した「九つの光」の教義に従うが、90年代後半からは保守的なイスラム教の要素も取り入れている。灰色の狼組織との繋がりや、多くの党員による人種差別的な発言から、ネオ・ファシストと分類されることもある。\n\nこの党に対する軍の§Y評価§!: §R-100§!"
 LIC.Monarchist: "£LIC_royal_crest 王政復古派"
 LIC.Monarchist_desc: ""
 LIC.Monarchist_icon: "£LIC_royal_crest"
 ARM.conservatism_icon: "£ARM_western_conservative"
 ARM.liberalism_icon: "£ARM_western_liberalism"
 ARM.Neutral_Libertarian: "£ARM_Neutral_Libertarian (ANC) アルメニア国民会議"
 ARM.Neutral_Libertarian_desc: "中道自由主義 - アルメニア国民会議（アルメニア語ローマ字表記：Hay Azgayin Kongres）\n\n アルメニア国民会議は、レヴォン・テル＝ペトロシアン元大統領が率いるアルメニアの政党である。同党は、トルコおよびアゼルバイジャンとの国交正常化を含む近隣諸国との良好な関係維持、中東諸国との緊密な関係構築、アルツァフ共和国の自決権の尊重、アルメニアのさらなる欧州統合の促進および欧州連合との協力深化を掲げると同時に、アメリカ、ロシア、ならびに独立国家共同体加盟国との強固な関係維持も重視している。同党は、アルメニアの経済発展、およびユーラシア連合や、欧州諸国、アメリカ、インド、中国との貿易拡大や、技術部門の発展、インフラの改善も支持している。"
 ARM.socialism_icon: "£ARM_western_socialism"
 ARM.Communist-State_icon: "£ARM_Communist_State"
 ARM.Conservative_icon: "£ARM_Conservative"
 ARM.Nat_Autocracy_icon: "£ARM_military_junta"
 ARM.Nat_Fascism_icon: "£ARM_anarchist_communism"
 ARM.Monarchist: "£ARM_Monarchist (MUA) アルメニア貴族連合"
 ARM.Monarchist_icon: "£ARM_Monarchist"
 ARM.Monarchist_desc: "貴族君主制 - アルメニア貴族連合（アルメニア語 - Meliqats Miutyun）\n\n15世紀にアルメニア王国が崩壊した後、多くの王朝がアルメニア王位の真の後継者であると主張した。しかし、二つの主要な主張者はイタリアのサヴォイア家と、新たに自称した後継者であるバグラトゥニ朝のロランド・フォン・バグラトゥニである。バグラトゥニ朝の真の子孫であるジョージアのバグラチオニ家も主張を述べたが、ジョージアとの関係からアルメニアでは真剣に受け止められていない。"
 ARM.oligarchism: "£ARM_oligarch (PA) 繁栄するアルメニア"
 ARM.oligarchism_desc: "中道寡頭政治 - 繁栄するアルメニア（アルメニア語ローマ字表記：Bargavach Hayastan）\n\n繁栄するアルメニアは、アルメニアの保守政党である。2004年4月30日、実業家のガギク・ツァルキアンによって党創立大会が開催され、同党が結成された。イデオロギー的には、政治スペクトル上で中道右派に位置づけられ、経済的自由主義やロシアとの緊密な関係を提唱している。欧州連合に対しては懐疑的である一方、社会問題に関しては伝統主義的である。また、同党はコーカサス地域内およびモルドバ、ベラルーシ、ウクライナ、中央アジアとの間で、より強固な民主的かつ友好的な関係を構築することを支持していると主張している。親ロシアかつ欧州懐疑派の政党であるにもかかわらず、繁栄するアルメニアは、欧州連合との強固な関係と経済的パートナーシップの維持を重視している。"
 ARM.Neutral_Autocracy: "£ARM_Neutral_Autocracy (CRU) 憲法権利連合"
 ARM.Neutral_Autocracy_icon: "£ARM_Neutral_Autocracy"
 ARM.Neutral_Autocracy_desc: "中道独裁体制 - 憲法権利連合（アルメニア語ローマ字表記：Sahmanadrakan Iravunk'neri miut'yun）\n\n 憲法権利連合は、共産主義と自由主義の両方に反対している。同党の目標は、アルメニアをロシア、ジョージア、イラン、およびアラブ諸国間の協力の拠点とすることである。"
 ARM.Western_Autocracy: "£ARM_Western_Autocracy (UNSD) 国民自決連合"
 ARM.Western_Autocracy_icon: "£ARM_Western_Autocracy"
 ARM.Western_Autocracy_desc: "親欧米ナショナリズム - 国民自決連合（アルメニア語ローマ字表記：Azgayin Inknoroshum Miavorum）\n\n 国民自決連合は、アルメニアの独立を求めたソ連の反体制派パルユル・ハイリキヤンによって1987年に結成された、強硬な親欧米ナショナリズム政党である。同党は、アルメニアを含むコーカサス地域が、西側諸国との統合を深めるとともに、欧州統合へと進むべきだと考えている。それにもかかわらず、敵対勢力に囲まれた地理的状況を考慮し、軍事化とナショナリズムこそがアルメニアの唯一の救いであると見なしている。"
 ARM.anarchist_communism: "£ARM_anarchist_communism (ARF) アルメニア革命連盟（§7新興§!派）"
 ARM.anarchist_communism_icon: "£ARM_anarchist_communism"
 ARM.anarchist_communism_desc: "左派民族主義 - アルメニア革命連盟 - 新興派（アルメニア語ローマ字表記：Hay Heghapokhakan Dashnaktsutyun）\n\n アルメニア革命連盟（ダシュナクツツィウン）は、アルメニアの民族主義・社会主義政党である。同党は、アルメニア、レバノン、イラン、およびアルメニア人ディアスポラが存在する各国で活動している。主に教育や人道支援プロジェクトに重点を置く傾向のある他のアルメニア系ディアスポラ政党と比較して、ARFは最も政治色の強い組織であり、伝統的にアルメニア民族主義の最も強固な支持者の一つである。"
 ARM.Autocracy: "£ARM_Autocracy (NU) 国民統一"
 ARM.Autocracy_icon: "£ARM_Autocracy"
 ARM.Autocracy_desc: "親ロシア派独裁体制 - 国民統一党（アルメニア語ローマ字表記：Azgayin Miabanutyun）\n\n 国民統一党は、アルメニアの保守政党で、アルタシェス・ゲガムヤンによって設立され、同氏が党首を務めている。同党は、アルメニア経済の強化、少数派の権利の保護、欧州との統合の深化を提唱する一方で、独立国家共同体の他の加盟国、特にロシアとの緊密な関係を維持することを主張している。また、同党はアルメニアが集団安全保障条約機構およびユーラシア連合に留まるべきであると同時に、アメリカやNATOとの関係をさらに深めるべきであると考えている。しかし、NATOの平和維持部隊がアルメニアに展開することには反対している。党首はまた、ジョージ・ソロスや西側の利益によって国が支配されることを懸念している。"
 ARM.Neutral_conservatism: "£ARM_neutral_conservative (PP) 愛国党"
 ARM.Neutral_conservatism_icon: "£ARM_neutral_conservative"
 ARM.Neutral_conservatism_desc: "保守主義 - 愛国党（アルメニア語ローマ字表記：Hayrenasirakan Kusaktsutyun）\n\n 愛国党の掲げる目的は、すべてのアルメニア人の努力のもと、アルメニア語、文化、信仰、自由、名誉、そして祖国を守る、誠実かつ公正な国家を築くために、あらゆる重要な国民勢力を結集することである。"
 ARM.Neutral_green: "£ARM_Neutral_Green (GPA) アルメニア緑の党"
 ARM.Neutral_green_icon: "£ARM_Neutral_Green"
 ARM.Neutral_green_desc: "緑の環境主義 - アルメニア緑の党（アルメニア語ローマ字表記：Hayastani Kanachneri Kusaktsutyun）\n\n アルメニア緑の党（社会生態党）は、アルメニアにおける主要な環境保護政党であり、国内全域での環境保護強化に向けて積極的に活動している。しかし、党首のドヴァルティアン氏は、環境保護だけが同党にとって重要な課題ではないことを明言した。同党は経済発展や国外への移住の抑制を推進し、アルメニアとアルメニア・ディアスポラとの結束強化を支持している。また、ドヴァルティアン氏は、アルメニアへの外国の干渉の停止と、アルツァフ共和国へのアルメニアの支援強化を求めた。"
 ARM.neutral_Social: "£ARM_neutral_Social (DPA) アルメニア民主党"
 ARM.neutral_Social_icon: "£ARM_neutral_Social"
 ARM.neutral_Social_desc: "社会民主主義 - アルメニア民主党（アルメニア語：Hayastani Demokratakan Kusaktsutyun）\n\n アルメニア民主党は、アルメニアの民主社会主義政党である。同党は1991年、1920年から1990年までアルメニア・ソビエト社会主義共和国を支配していたソ連時代のアルメニア共産党の最後の書記長であったアラム・ガスパル・サルキシャンによって設立された。ソビエト連邦およびアルメニア・ソビエト社会主義共和国の解体後、与党であったアルメニア共産党は大きな不人気に陥った。その常任書記であったアラム・ガスパル・サルキシャンは、同党を解散し、アルメニア民主党を設立、自らを新党の初代書記に任命した。"
 ARM.Neutral_Communism: "£ARM_Neutral_Communism (PPA) アルメニア人民党"
 ARM.Neutral_Communism_icon: "£ARM_Neutral_Communism"
 ARM.Neutral_Communism_desc: "中道共産主義 - アルメニア人民党（アルメニア語ローマ字表記：Hayastani Zhoghovrdakan Kusaktsutyun）\n\n アルメニア人民党は、アルメニアの社会主義政党であり、旧アルメニア・ソビエト社会主義共和国の指導者の一人であったカレン・デミルチャンによって設立された。1999年の議会銃撃事件に続きカレン・デミルチャンが死去した後、息子のステパン・デミルチャンが党首に就任した。同党は、アルメニアにおける社会主義経済の復活、旧来の生産能力の回復、そして1990年代の経済政策の過ちの是正を提唱している。外交政策においては、西側諸国と東側諸国の双方との協力を模索しており、その立場は不透明である。"
