 Kim_Jong_il_Death: "Смерть Ким Чен Ира"
 Kim_Jong_il_Death_desc: "Любимый Великий Лидер, основатель Корейской Народно-Демократической Республики и вечный Президент Республики, Ким Чен Ир, Президент КНДР, скончался в 8:30 утра 17 декабря 2011 года от острого инфаркта миокарда, осложнённого кардиогенным шоком, по пути к местному району на поезде."
