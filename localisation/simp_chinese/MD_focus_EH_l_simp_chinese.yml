 sp_monitor_portal_energy_emissions_project: "监测传送门能量辐射"
 sp_monitor_portal_energy_emissions_project_desc: "借助卫星，我们将监测最近传送门能量辐射。这将使我们能够收集更多关于敌人及其动向的情报。如果成功，我们或许还能消除这些辐射导致的卫星网络周期性故障。"
 sp_monitor_portal_energy_emissions_project_prototype: "不规则能量标记"
 sp_monitor_portal_energy_emissions_project_prototype_desc: "我们受损的卫星报告称，它们不断从传送门接收到一些异常的能量信号。这些信号似乎是造成我们卫星网络故障的原因。我们可以制定应对措施来保护卫星免受这些辐射的影响，或者我们可以花更多时间研究这种现象，以便更好地了解它。"
 sp_monitor_portal_energy_emissions_project_prototype_a: "进展才是最重要的"
 sp_monitor_portal_energy_emissions_project_prototype_b: "花些时间进行额外研究"
 sp_spies_in_hive_project: "蜂巢中的间谍"
 sp_spies_in_hive_project_desc: "部分奇美拉部队在成功突袭后会返回传送门区域。它们在这个阶段的行为似乎近乎本能，这为我们提供了一个机会，可以用追踪器和小型摄像头标记它们。之后，我们会放它们返回传送门。这能出什么问题呢？"
 sp_spies_in_hive_project_prototype: "机甲可以成为我们的送货员"
 sp_spies_in_hive_project_prototype_desc: "既然我们正在生产机甲，我们就可以利用它们在与奇美拉部队作战时部署追踪器。这样做风险很大，我们肯定会损失许多优秀的机甲和驾驶员，但这或许能让我们离结束这场战争更近一步。"
 sp_spies_in_hive_project_prototype_a: "只使用机甲"
 sp_spies_in_hive_project_prototype_b: "我们不能损失太多机甲，军队会帮忙的。"
 sp_spies_in_hive_project_prototype_c: "不要冒额外风险"
 sp_the_tesla_weapon_project: "特斯拉武器"
 sp_the_tesla_weapon_project_desc: "战术电磁线性湮灭系统是一种超级武器，旨在发射强大的电磁脉冲，能够瘫痪大范围内的电子系统。这种武器可能是我们破坏传送门并永久削弱奇美拉部队的关键。"
 sp_the_tesla_weapon_project_prototype: "重新调整研究领域"
 sp_the_tesla_weapon_project_prototype_desc: "我们可以将所有研究精力转向特斯拉武器的研发。这将加快项目进度，但可能会延误其他重要的研究计划。"
 sp_the_tesla_weapon_project_prototype_a: "将所有研究重点放在特斯拉上。"
 sp_the_tesla_weapon_project_prototype_b: "平衡研究工作"
 sp_the_tesla_weapon_project_prototype_c: "我们不能承受延误。"
 sp_hacs_gen_one_project: "BF-38 阿特拉斯"
 sp_hacs_gen_one_project_desc: "第一代高机动性作战系统机甲将是我们对抗奇美拉的重要里程碑。这些机甲将是我们对抗奇美拉军队的最有力武器。"
 sp_hacs_gen_one_project_prototype_western_one: "耐久性还是火力？"
 sp_hacs_gen_one_project_prototype_western_one_desc: "战场环境恶劣，我们的机甲必须能够承受猛烈的火力攻击，同时还要对敌人造成强力打击。我们可以专注于提升高机动性作战系统的耐久性，使其在战斗中更具韧性。或者，我们也可以优先提升火力，为机甲配备先进武器，以便迅速击溃敌人。"
 sp_hacs_gen_one_project_prototype_western_one_a: "增强耐久度"
 sp_hacs_gen_one_project_prototype_western_one_b: "火力优先"
 sp_hacs_gen_one_project_prototype_western_one_c: "它现在这样就很完美了。"
 sp_hacs_gen_one_project_prototype_western_two: "高机动性作战系统部件优先级"
 sp_hacs_gen_one_project_prototype_western_two_desc: "我们有一些剩余资金可以用来改进高机动性作战系统的设计。我们可以选择提升机甲的机动性，使其在战场上速度更快、更灵活；或者，我们可以投资改进其武器系统，增强其进攻能力。"
 sp_hacs_gen_one_project_prototype_western_two_a: "注重机动性"
 sp_hacs_gen_one_project_prototype_western_two_b: "注重武器"
 sp_hacs_gen_one_project_prototype_eastern_one: "可能的生产调整"
 sp_hacs_gen_one_project_prototype_eastern_one_desc: "为了加快生产速度，我们可以在高机动性作战系统设计中省略一些安全触发装置和冗余系统。虽然这可能会导致故障率略有上升，但却能让我们更快地将更多机甲部署到战场上。"
 sp_hacs_gen_one_project_prototype_eastern_one_a: "我们需要他们尽快到位"
 sp_hacs_gen_one_project_prototype_eastern_one_b: "我们应该在这方面投入更多精力。"
 sp_hacs_gen_one_project_prototype_eastern_one_c: "保持现有生产标准"
 sp_hacs_gen_one_project_prototype_eastern_two: "战场效能"
 sp_hacs_gen_one_project_prototype_eastern_two_desc: "我们可以建造更多高机动性作战系统机甲，以数量优势压制敌人。或者，我们也可以专注于改进现有机甲的设计，提升其作战效能，即便这意味着减少产量。"
 sp_hacs_gen_one_project_prototype_eastern_two_a: "我们需要更多机甲。"
 sp_hacs_gen_one_project_prototype_eastern_two_b: "让我们改进他们的设计"
 sp_hacs_gen_two_project: "GSK-41罗斯勇士"
 sp_hacs_gen_two_project_desc: "我们最新型的威武雄壮的高机动性作战系统机甲又迎来了一次升级。感谢充满热情的民间工程师和科学家们，我们成功地进一步改进了机甲的设计。或许我们还能找到降低生产成本的方法。"
 sp_hacs_gen_two_project_prototype_western_one: "蓝道尔石成本降低"
 sp_hacs_gen_two_project_prototype_western_one_desc: "翻阅旧研究笔记，我们发现了一些减少高机动性作战系统生产中蓝道尔石用量的方法。通过实施这些改进，我们可以在不显著影响机械性能的前提下降低每个机械的成本。"
 sp_hacs_gen_two_project_prototype_western_one_a: "当然！"
 sp_hacs_gen_two_project_prototype_western_one_b: "我们不能削弱我们的机甲。"
 sp_hacs_gen_two_project_prototype_eastern_one: "蓝道尔石成本降低"
 sp_hacs_gen_two_project_prototype_eastern_one_desc: "得益于对蓝道尔石的最新研究，我们找到了进一步减少高机动性作战系统生产中这种珍贵资源用量的方法。这将使我们能够用相同数量的蓝道尔石制造出更多的机甲，但这些机甲的性能将有所牺牲。"
 sp_hacs_gen_two_project_prototype_eastern_one_a: "当然可以，为什么不呢"
 sp_hacs_gen_two_project_prototype_eastern_one_b: "这在战场上劣势太大了。"
 sp_hacs_gen_three_project: "SAS-32 大力神"
 sp_hacs_gen_three_project_desc: "我们最新型的威武雄壮的高机动性作战系统机甲又迎来了一次升级。感谢充满热情的民间工程师和科学家们，我们成功地进一步改进了机甲的设计。或许我们还能找到降低生产成本的方法。"
 sp_hacs_gen_three_project_prototype_one: "最终武器"
 sp_hacs_gen_three_project_prototype_one_desc: "我们的工程师提出了一项对高机动性作战系统机甲的彻底重新设计方案，旨在打造对抗奇美拉的终极武器。这项新设计将突破现有技术的极限，打造出速度更快、力量更强、韧性更高的机甲，但价格也更高。"
 sp_hacs_gen_three_project_prototype_one_a: "那是终极武器"
 sp_hacs_gen_three_project_prototype_one_b: "我们现在就需要它们！"
 sp_hacs_gen_three_project_prototype_one_c: "目前的设计堪称完美。"
