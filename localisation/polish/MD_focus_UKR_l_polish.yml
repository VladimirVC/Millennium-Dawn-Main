 UKR_dshv_create_desc: "We will separate Air Assault Forces from the ground forces into a separate unit with its own command and structure, thereby increasing their effectiveness."
 UKR_command_create: "Dowództwo Zjednoczonych Sił"
 UKR_command_create_desc: "The Command of the United Forces of the Armed Forces of Ukraine is the military management body of the Armed Forces of Ukraine, between groups of troops to conduct various military operations. He is also responsible for conducting peacekeeping missions outside Ukraine."
 UKR_national_guard: "Ożywić Gwardię Narodową"
 UKR_national_guard_desc: "The National Guard was disbanded under President Kuchma, but now the situation requires us to revive it. We will reorganize it from the internal troops of the Ministry of Internal Affairs."
 UKR_dissolved_parliament: "Rozwiązany parlament"
 UKR_dissolved_parliament_desc: "The Parliament has been dissolved, and representation is no longer active within the nation.\n§W------------------§!\nThis national spirit  will be §RRemoved§! if we re-instate elections."
 UKR_russia_help_battalions: "Rosyjskie bataliony wsparcia"
 UKR_oup: "Ukroboronprom"
 UKR_oup_desc: "The Ukrainian industry needs to be revived and quickly. But to do this, we structure all our enterprises into one concern."
 civilwar_after: "Wybuchła wojna domowa"
 UKR_win_elections_TT: "Nasz §HBloc§! będzie §GWin§! §HEwybory§!"
 UKR_lose_elections_TT: "Nasz §HBloc§! §RLose§! §HEwybory§!"
 UKR_presidential_decisions_only_one_is_available_TT: "Jednocześnie może zostać podjęta tylko jedna z tych decyzji."
 UKR_parliament_block_tt: "To §HLawo§! musi być §HZatwierdzony§! przez §HRada Najwyższa§!"
 UKR_free_parliament_TT: "Przywróci §CWolne wybory§! w §HParlamencie§!"
 UKR_verkhovna_rada: "Rada Najwyższa"
 UKR_verkhovna_rada_desc: "\n\n\n\n\n\n£UKR_desctext_rada\n\n\n\n\n\n\n\n\n§HRada Najwyższa§! [UKR.GetFlag] to nasz parlament narodowy, który dyktuje, jakie prawa wchodzą i wychodzą, co oznacza, że ​​często mogą być sprzeczne z naszymi własnymi potrzebami. §HRada Najwyższa§! może znajdować się w dowolnym momencie w jednym z 3 stanów. §CWolny§!, co oznacza, że ​​nie mamy bezpośredniej kontroli nad §HRadą Najwyższą§!, §CPod wpływem§!, co oznacza, że ​​mamy pewną kontrolę, oraz §CPuppet§!, co oznacza, że ​​mamy całkowitą kontrolę.\n\n §HRada Najwyższa§! może wycofać swoje poparcie dla naszego rządu, jeśli odrzucimy §Hniektóre propozycje§! mają, lub jeśli przejdziemy na §Houtlook, który nie jest ściśle zgodny z ich§!. Mogą też losowo wycofać wsparcie, jeśli mają na to ochotę.\n\nIm większe wsparcie otrzymamy, tym lepiej, ponieważ zwiększa to prawdopodobieństwo, że będziemy w stanie uchwalać przepisy bez konieczności podejmowania dodatkowych środków. §HRada Najwyższa§! odbędą się wybory, których wynik będzie zależał od wpływu obcych narodów lub naszej własnej niepodległości.\n\n§G[?UKR_verkhovna_support]§!/§H450§! Siedziby §HRada Najwyższa§! obecnie wspieramy nasz rząd\n"
 ukraine_nationalist_majority_name: "§HPProukraińska większość§!"
 UKR_right_wing_desc_TT: "§HProukraińska większość§! w parlamencie oznacza, że ​​parlament dąży do większego dystansu zarówno od §CZachodu§!, jak i §GRRosjan§!. Dążą do bardziej niezależnej i neutralnej §HUkrainy§! w sprawach światowych i generalnie sprzeciwiają się wybieraniu jednej ze stron w jakimkolwiek konflikcie."
 ukraine_eastern_majority_name: "§GProrosyjska większość§!"
 UKR_left_wing_desc_TT: "§GProrosyjski§! Blok w parlamencie generalnie dąży do zacieśnienia więzi z §Grosyjczykami§! rząd, pragnący zdystansować się od §CWestern§! uprawnienie. Radykalizacja jest zróżnicowana w obrębie tego bloku, ponieważ niektórzy chcą zachować niezależną §HUkrainę§! z §GPro-rosyjski§! więzi, a inni życzą większej integracji §Hukraińc§! i §Grosyjski§! społeczeństwa."
 ukraine_western_majority_name: "§BProzachodnia większość§!"
 UKR_liberal_TT: "§BProzachodni§! blok w parlamencie reprezentuje partie i jednostki, które chcą §HUkrainy§! porzucić swoją prorosyjską politykę i zacieśnić więzi z §CZachodem§! uprawnienie. Cele tych, którzy sprzymierzają się z §CZachodem§! jest bardzo zróżnicowana, niektórzy pragną jedynie powiązań gospodarczych i kulturalnych, a inni pragną dołączyć do §BNATO§! sojusz i ochrona §HUkrainy§! z §Grosyjskiego§! wpływ."
 ukraine_dissolved_majority_name: "§Rada Najwyższa rozwiązana§!"
 UKR_verkhovna_dissolved_tt: "Parlament został odwołany, a sala jest pusta i nie ma żadnych przedstawicieli."
 ukraine_free_verkhovna: "§CRady Najwyższej Status: Bezpłatna§!"
 UKR_verkhovna_free_tt: "Parlament jest wolny od wpływów Prezydenta, a dyskusje i debaty toczą się organicznie, bez interwencji innego organu rządowego."
 ukraine_influenced_verkhovna: "§pRada NajwyższaStatus: Pod wpływem§!"
 UKR_verkhovna_influenced_tt: "Rząd został zreformowany w taki sposób, że parlament stał się łatwy do wykorzystania, a rząd prezydentów mógł z łatwością wpływać na dyskusję podczas sesji parlamentu."
 ukraine_puppeted_verkhovna: "§Rada Najwyższa Status: Marionetka§!"
 UKR_verkhovna_puppetted_tt: "Parlament to po prostu kolejne narzędzie służące prezydentowi i jego gabinetowi do oszukiwania obywateli w fałszywym poczuciu reprezentacji."
