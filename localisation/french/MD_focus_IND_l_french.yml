 IND_islamic_resist_c1: "Résistance minimale des musulmans de Sulawesi"
 IND_islamic_resist_info: "Sulawesi est l'une de nos plus grandes îles et elle est peuplée de peuples très différents. Cependant, la grande majorité musulmane dénonce la négligence de l'État et oppose une forte résistance à une grande partie de nos forces et de notre économie. Cette résistance rend la vie très difficile à nos hommes et aux forces de sécurité."
