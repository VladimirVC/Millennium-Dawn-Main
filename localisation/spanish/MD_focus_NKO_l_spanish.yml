 NKO_propose_unity_government_yo_jong_desc: "Desde nuestro justo sistema de bienestar hasta nuestra arma nuclear más fuerte, está claro que el modelo norcoreano es el camino a seguir para la península coreana. Debemos insistir en que deberíamos ser nosotros quienes lleven a Corea hacia un futuro poderoso y post-reunificación."
