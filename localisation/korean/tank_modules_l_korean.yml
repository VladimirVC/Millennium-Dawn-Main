 medium_tank_aa_chassis_0: "1세대 자주대공포 차체"
 medium_tank_aa_chassis_0_desc: "Self-propelled air defense weapons, also known as mobile air defense weapons, refer to mobile air defense weapons that install anti-aircraft machine guns, anti-aircraft guns or surface-to-air missiles on military vehicles. They can be divided into self-propelled anti-aircraft guns (self-propelled anti-aircraft guns), self-propelled air defense missile launchers, and self-propelled combined missile and artillery air defense systems."
