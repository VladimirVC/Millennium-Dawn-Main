 form_MAGHREB_category: "Арабо-магрибский союз"
 form_MAGHREB_category_desc: "Арабский Магрибский союз — это политический союз государств, включающий Алжир, Ливию, Мавританию, Марокко и Тунис. Он в основном служил обеспечению политического единства и экономической интеграции внутри этих стран. Хотя в последние годы активность союза заметно снизилась, возможно, настало время возродить эту идею. Объединение народов Магриба создало бы новую нацию, способную доминировать на африканском континенте и в Средиземноморском регионе. Пришло время объединить Магриб и стать одной из великих держав мира."
