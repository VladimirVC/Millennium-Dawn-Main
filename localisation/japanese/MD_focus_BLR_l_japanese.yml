 BLR_new_equipment_omon: "特別部隊 - アルファ"
 BLR_new_equipment_omon_desc: "Group \"A\" (\"Alpha\") under the State Security Committee of the Republic of Belarus is an anti-terrorist unit of the KGB of Belarus and one of the most secretive special forces in the country's law enforcement agencies. Alpha fighters are involved in operational and combat activities conducted by KGB units related to the detention of suspects in espionage, hostage-taking, drug trafficking, smuggling, illegal trafficking of weapons and radioactive substances, extortion, and illegal migration."
 BLR_Increase_funding_Almaz: "特別部隊 - アルマズ"
 BLR_Increase_funding_Almaz_desc: "The Almaz Special Unit for Combating Terrorism is an anti-terrorist special unit of the Ministry of Internal Affairs of Belarus that performs a wide range of tasks to prevent and respond to terrorist acts. It reports directly to the Minister of Internal Affairs of the Republic of Belarus. According to media reports, the unit also takes part in the suppression of political opposition and is involved in the dispersal of mass protests."
 BLR_military_police_training: "軍警察訓練"
 BLR_military_police_training_desc: "We must be ready for protests and mass unrest in our country, as they can be instigated from abroad. Our police officers should be well trained to suppress such unrest."
 BLR_peoples_security: "統制は至る所に"
 BLR_peoples_security_desc: "We must use the technical achievements of the 21st century to improve surveillance of the population — for the sake of their safety, of course."
 BLR_procurement_of_espionage_equipment: "諜報装備調達"
 BLR_procurement_of_espionage_equipment_desc: "Instead of spending on expensive cameras, it is better to equip our valiant law enforcement with the appropriate equipment, allowing us to quickly track down anyone who displeases us."
 BLR_occupation_management_strategies: "Intimidate and Dominate"
 BLR_occupation_management_strategies_desc: "Before daring to overthrow the legitimate government, everyone will think three times, because everyone knows perfectly well that nothing good awaits those who fall into the hands of our special services."
 BLR_fin_snipes: "Sako TRG"
 BLR_fin_snipes_desc: "Sako TRG-22 rifles are used by snipers of the SOBR of the Internal Troops of the Ministry of Internal Affairs of the Republic of Belarus."
 BLR_ger_guns: "ドイツ製短機関銃"
 BLR_ger_guns_desc: "We are ready to purchase a large number of German submachine guns for our special services."
 BLR_tourism_tt: "追加収入: $$§G0.150§!\n"
 BLR_fertil_tt: "肥料販売からの現在の収入は - $$[?BLR.additional_income_azot|+G]\n"
 BLR_revolution_TT: "§1暴動や反乱を避けるためには、国家の警察機関への資金提供を強化することが推奨される§!"
 BLR_can_send_azot_mission_TT: "貿易使節団は我々の§Y現在の肥料上限§!を超えないだろう（§Y現在の肥料上限：§! [?current_azot_capacity]/[?current_max_azot_capacity]）\n"
 BLR_batka_tt: "バチカ支持率が§G[?modify_batka]§!変化する（現在の評価：§Y[?BLR.batka]§!）\n"
 BLR_silesian_help_TT: "§Y我々はシレジアの反乱分遣隊に資金提供した§!"
 BLR_lgbt_change_TT: "§Y選択された政党に応じて、LGBTの人々への態度が変わるだろう§!"
 BLR_south_river_TT: "[USA.GetFlag]USAから到着した§Yベラルーシ人義勇兵§!の大隊があなたの指揮下に入る"
 BLR_white_legion_TT: "§Y白い軍団§!の大隊が編成されるだろう"
 BLR_territorial_defence_TT: "§Y領土防衛軍§!旅団が創設されるだろう"
 BLR_people_militia_TT: "§Y人民民兵§!旅団が創設されるだろう"
 BLR_kgb_west_TT: "我々は§YKGB§!を解体するつもりはない。§YKGB§!は我々の支柱である"
 UNS_support_for_union_more_80: "連合国家加盟への支持[ROOT.GetFlag]が§Y80%§!以上"
 BLR_grodno_TT: "§Y我々は他の国々への肥料販売を開始できるようになるだろう§!"
 belarus_character.1.t: "ルカシェンコ時代"
 belarus_character.1.d: "Alexander Grigoryevich Lukashenko has come a long way from an ordinary deputy to the President of the country. Despite having only recently begun to rule Belarus, many influential forces are already dreaming of his overthrow. Will he find a better way for Belarus, or will he become another dictator clinging to power for life?"
 belarus_character.1.a: "我らがバチカ・ルカシェンコ、ベラルーシの母"
 belarus_character.2.t: "自由民主ベラルーシ"
 belarus_character.2.d: "Sergey Gaidukevich is an extraordinary person with an interesting past and strong views on the future of Belarus. He is clearly regarded as a pro-Russian politician, but will he live up to that reputation?"
 belarus_character.2.a: "ベラルーシは何よりも優先される"
 belarus_character.3.t: "ベラルーシの欧州への道"
 belarus_character.3.d: "Belarus has finally rejected the Soviet past and moved toward a bright European future. But we must decide which path we will take into this new era."
 belarus_character.3.a: "自由主義は我々の道だ"
 belarus_character.3.b: "保守主義は我々の全てだ"
 belarus_character.4.t: "ベラルーシの民族主義者"
 belarus_character.4.d: "Zenon Poznyak, who has come to power, has long been known for his anti-Russian rhetoric. His central belief is that Russia has suppressed Belarusians throughout history. He intends to end this and possibly avenge it."
 belarus_character.4.a: "ベラルーシ人はロシア人ではない"
 belarus_character.5.t: "赤いベラルーシ"
 belarus_character.5.d: "Belarus's desire to gradually move away from the Soviet past has ultimately dragged it back into the clutches of Communism. People remember the good times of the USSR and have apparently decided to bring them back."
 belarus_character.5.a: "ソビエトの遺産を取り戻そう"
 belarus_ukraine.1.t: "カストゥーシュ・カリノーウスキ連隊"
 belarus_ukraine.1.d: "ベラルーシ人は我々に連隊全体の形で援助を送っている。我々は共にロシアの侵略と戦うだろう。"
 belarus_ukraine.1.a: "ロシアとその帝国主義的野望を打倒せよ。"
 belarus_ukraine.2.t: "ノヴォロシアへ義勇兵派遣？"
 belarus_ukraine.2.d: "Among the people, there are those who want to help the residents of Novorossiya in their struggle. We are ready to assist them."
 belarus_ukraine.2.a: "義勇兵を派遣せよ"
 belarus_ukraine.2.b: "我々は違法であるため、義勇兵としてノヴォロシアへ行く人々を非難する。"
 belarus_ukraine.3.t: "ベラルーシ、和平協議の場としてミンスクを提案"
 belarus_ukraine.3.d: "ベラルーシはウクライナにおける和平確立のための交渉都市としてミンスクを提案している。我々は分離主義者との停戦締結に同意するだろうか？"
 belarus_ukraine.3.a: "平和こそ我々が努力すべきものだ！"
 belarus_ukraine.3.b: "我々はウクライナの領土保全を取り戻す！"
 belarus_ukraine.4.t: "ウクライナでの特別作戦"
 belarus_ukraine.4.d: "Russia has launched a special operation in Ukraine. Our leadership faces a choice — to participate or not. We have many obligations, but we should think carefully before getting involved in this carnage."
 belarus_ukraine.4.a: "ウクライナは解放されなければならない！"
 belarus_ukraine.4.b: "我々はこれに参加しないだろう"
 belarus_export.2.t: "T-72BM1最初の試作品"
 belarus_export.2.d: "We have finally completed our modification of the T-72 tank. Now we will be able to produce it for the needs of our army."
 belarus_export.2.a: "ベラルーシの武器に栄光あれ"
 belarus_export.3.t: "「ベルグラード」最初の試作品"
 belarus_export.3.d: "We have finally completed our modification of the BM-21. Now we will be able to produce it for the needs of our army."
 belarus_export.4.t: "「ポロネズ」最初の試作品"
 belarus_export.4.d: "We have finally completed our MLRS \"Polonez\". Now we will be able to produce it for the needs of our army."
 belarus_export.4.a: "ベラルーシの武器に栄光あれ"
 belarus_another.1.t: "ベラルーシ、我々に投資を要請"
 belarus_another.1.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.1.a: "もちろん"
 belarus_another.1.b: "申し訳ないが、拒否する"
 belarus_another.2.t: "ポーランド＝ベラルーシ外交戦争"
 belarus_another.2.d: "我々とポーランドとの関係は急速に悪化し始めた。ベラルーシはあるポーランド外交官を「ベラルーシ社会を不安定化させることを目的とした積極的な行動」で非難した。これに対し、ポーランドはポーランド領土への入国を禁止されるベラルーシ高官のリストを準備した。紛争の原因は、約2万人を団結させた公的団体「在ベラルーシ・ポーランド人連合」であった。在ベラルーシ・ポーランド人連合の会議で、ベラルーシ指導部に忠実な元指導者が解任された後、在ベラルーシ・ポーランド人連合は当局から大規模な圧力にさらされた。当局は、在ベラルーシ・ポーランド人連合の会議とこの国の大使館に資金を提供したポーランド指導部を、ベラルーシに対する「破壊活動」で非難した。ベラルーシ法務省は、アンジェリカ・ボリスを議長に選出した在ベラルーシ・ポーランド人連合会議の結果承認を拒否した。ポーランド・セイム（下院）はベラルーシ当局の行動に不満を表明し、それはベラルーシでは内政干渉の試みと受け止められた。さらなる展開は外交紛争へと繋がった。"
 belarus_another.2.a: "ポーランド人はもうたくさんだ！"
 belarus_another.3.t: "ウクライナのユニエイト主義"
 belarus_another.3.d: "Uniatism has begun to spread actively across our territory, and many residents are demanding an official break with the Orthodox Church, which is subordinate to Moscow. Perhaps it is worth listening to them?"
 belarus_another.3.a: "ユニエイト主義が国教となるだろう"
 belarus_another.3.b: "全ては以前のままであるだろう"
 belarus_another.4.t: "ベラルーシ、我々に投資を要請"
 belarus_another.4.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.4.a: "もちろん"
 belarus_another.4.b: "申し訳ないが、拒否する"
 belarus_another.5.t: "布告第3号"
 belarus_another.5.d: "布告第3号による人々の憤りは非常に大きい。人々はその撤回を要求し、人々は寛容を要求している。我々は彼らに従うことに同意するだろうか？"
 belarus_another.5.a: "我々は布告を撤回しないだろう"
 belarus_another.5.b: "我々は譲歩する準備ができていると思う"
 belarus_another.7.t: "ベラルーシの自国への投資"
 belarus_another.7.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.7.a: "我々は契約に署名するだろう"
 belarus_another.7.b: "我々は拒否する"
 belarus_another.8.t: "BOMBELプロジェクト"
 belarus_another.8.d: "The EU funds have been received. It is time for us to decide how to dispose of them."
 belarus_another.8.a: "我々はすべきことをやるだろう――国境を強化する"
 belarus_another.8.b: "もし我々が取っても彼らが気づくとは思わない"
 belarus_another.9.t: "ベラルーシの自国への投資"
 belarus_another.9.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.9.a: "我々は契約に署名するだろう"
 belarus_another.9.b: "我々は拒否する"
 belarus_another.10.t: "What Should We Do With PMC Wagner?"
 belarus_another.10.d: "我々は後に有名なロシアのPMCワグネルの傭兵であることが判明したいくつかの疑わしい人々を拘束した。我々の法執行機関は既に彼らをテロ準備で告発する準備ができている。ロシア側は彼らの釈放を主張している。我々は何をするだろうか？"
 belarus_another.10.a: "我々は彼らを釈放し、ロシア側に引き渡すだろう"
 belarus_another.10.b: "Put them in jail and accuse them of preparing terrorist attacks"
 belarus_another.11.t: "ベラルーシ内戦"
 belarus_another.11.d: "Our strongly anti-Russian rhetoric, the policy of imposing the Belarusian language, and the active promotion of a history that denies any connection with Russia have taken their toll. The eastern regions have revolted and local self-defense forces have seized power. We must stop this as soon as possible before the major powers can exploit it."
 belarus_another.11.a: "これはひどい！"
 belarus_another.12.t: "アザリョノク将軍、我が国でロシアの利益をロビー活動"
 belarus_another.12.d: "Our law enforcement agencies have learned about the lobbying of Russian interests in our country through the connections of General Azarenka. Should we pay attention, or is it in the interests of the Republic of Belarus to let it continue?"
 belarus_another.12.a: "もちろん"
 belarus_another.12.b: "彼を投獄する必要がある"
 belarus_another.14.t: "セルゲイ・チハノフスキー"
 belarus_another.14.d: "A well-known opposition blogger critical of our government, he has started to have too much influence among the people and we need to do something about it."
 belarus_another.14.a: "彼を投獄する必要がある"
 belarus_another.14.b: "Leave him alone, he may still be useful to us"
 belarus_another.15.t: "IMFに援助要請"
 belarus_another.15.d: "We are forced to request assistance from the IMF to address the consequences of the crisis."
 belarus_another.15.a: "我々には選択肢がない"
 belarus_another.16.t: "信用政策引き締め"
 belarus_another.16.d: "The credit policy will undergo a sharp revision in connection with the current situation."
 belarus_another.16.a: "我々には選択肢がない"
 belarus_another.17.t: "ベラルーシとの軍事協力"
 belarus_another.17.d: "We have invited military specialists from Belarus to address the most important tasks in our army. The Belarusian special forces conducted training for our fighters, and the Belarusian military industry improved our air defense system."
 belarus_another.17.a: "素晴らしい！"
 belarus_another.18.t: "ラトガレか戦争か"
 belarus_another.18.d: "ベラルーシ政府はますます攻撃的になっている。彼らは我々に最後通牒を与えた――ラトガレ地域を彼らに引き渡すか、さもなければ結果は我が国にとって最も恐ろしいものになるだろうと。そのような予想外の声明は我々を驚かせた。我々は何をするつもりか？"
 belarus_another.18.a: "我々はラトガレを彼らに引き渡さなければならないだろう。そうすれば少なくとも我々は独立を保持できる。"
 belarus_another.18.b: "譲歩なし"
 belarus_another.19.t: "第二次ルブリン合同"
 belarus_another.19.d: "Belarus actively influences our government and holds significant leverage over it. Today, the Belarusian ambassador handed us a draft of a new agreement envisioning the creation of a supranational entity, similar to what Russia proposed for the Lukashenko government. In effect, we would be surrendering some of our autonomy, but our states would become nearly unified. Do we agree to this?"
 belarus_another.19.a: "我が国は弱体化している。我々は同意すべきだと思う。"
 belarus_another.19.b: "我々の独立は我々の全てだ"
 belarus_another.20.t: "連合署名"
 belarus_another.20.d: "ポーランド政府は我々との連合創設に同意した！これは全ベラルーシ人民の勝利である！"
 belarus_another.20.a: "まあ、見てみよう"
 belarus_another.21.t: "ポーランド、拒否！"
 belarus_another.21.d: "The Polish government, which we have nurtured for so long, has betrayed us. Apparently we have no choice and must decide for ourselves what to do with these traitors. We may have to use all available leverage."
 belarus_another.21.a: "ポーランド人に地獄を見せよう"
 belarus_another.21.b: "彼らを放っておこう"
 belarus_another.22.t: "シレジア民兵"
 belarus_another.22.d: "Our people have a chance for independence. It is time to take advantage of it and take up arms!"
 belarus_another.22.a: "ポーランドの抑圧を打倒せよ！"
 belarus_another.23.t: "ベラルーシとの合同演習"
 belarus_another.23.d: "ベラルーシは、両国軍の戦闘調整のための共同演習の実施を提案している。応じるか？"
 belarus_another.23.a: "もちろん同意するだろう"
 belarus_another.23.b: "我々はそれらなしでやるだろう"
 belarus_another.24.t: "ポーランドとの合同演習"
 belarus_another.24.d: "They have agreed to conduct exercises with our troops. We will gain valuable experience."
 belarus_another.24.a: "よし"
 belarus_another.25.t: "イラクへ武器提供"
 belarus_another.25.d: "We are ready to allocate part of our weapons stockpile for delivery to Iraq in support of the friendly regime there."
 belarus_another.25.a: "よし"
 belarus_another.26.t: "プロタセヴィチ搭乗ライアンエアー機着陸"
 belarus_another.26.d: "Our special services were able to intercept and force down the plane carrying the editor of the opposition channel NEXTA. His name is Roman Protasevich."
 belarus_another.26.a: "よし"
 belarus_another.27.t: "ベラルーシ教会の運命"
 belarus_another.27.d: "我が国の指導部は、教会に独立教会管区を与えることについて真剣に考えた。しかし、この一歩は確かに我々の友人であり隣人であるロシアとの関係を損なう可能性がある。我々はそれに踏み切るだろうか？"
 belarus_another.27.a: "我々は教会に独立教会管区を与える"
 belarus_another.27.b: "やめておこう"
 belarus_another.28.t: "在ベラルーシ・ポーランド人連合とどうするか？"
 belarus_another.28.d: "The Union of Poles of Belarus has long been our problem. Through it, Poland has exerted its influence on us with full force. It is time to deal with this. Either we leave them as they are, or we completely expel the Polish population."
 belarus_another.28.a: "彼らを我々の管理下に残そう"
 belarus_another.28.b: "ベラルーシにポーランド人の居場所はない"
 belarus_another.29.t: "チェルノク貿易廃止"
 belarus_another.29.d: "Through Russia and China, we have established supplies of the goods we need to finally get rid of this relic of the 90s."
 belarus_another.29.a: "よし"
 belarus_another.30.t: "チェルノク貿易廃止"
 belarus_another.30.d: "Now that we have access to European goods through official channels, our citizens will not have to engage in this dangerous and sometimes unprofitable occupation."
 belarus_another.30.a: "よし"
 belarus_another.31.t: "牛乳戦争"
 belarus_another.31.d: "Russia has boycotted the import of our dairy products, cutting us off from a significant share of our profits. Will we concede to their conditions, or will we protect the domestic producer?"
 belarus_another.31.a: "We stand firmly behind our manufacturers"
 belarus_another.31.b: "彼らの要求に屈しよう"
 belarus_another.32.t: "最高会議との問題"
 belarus_another.32.d: "The Supreme Soviet remains a relic of the Soviet system, which we cannot legally eliminate without changing the constitution. Therefore, we will have to compromise with them until we finally resolve this issue."
 belarus_another.32.a: "ベラルーシの栄光のために"
 belarus_another.33.t: "ウクライナでの飛行機墜落事故"
 belarus_another.33.d: "A plane carrying Zenon on board and heading to Kyiv crashed in Ukraine. There were no survivors, and it became urgently necessary to decide who would take the post of leader of the state. The party deputy, Yuri Belenky, became the temporary and possibly permanent head."
 belarus_another.33.a: "ベラルーシの栄光のために"
 belarus_another.34.t: "ベラルーシ・ターラー"
 belarus_another.34.d: "Belarus proposes to introduce a single currency on our territory — the Thaler, the same one used in Belarus. Perhaps a common currency will improve trade between our countries, but our independence will again come under threat."
 belarus_another.34.a: "同意しよう"
 belarus_another.34.b: "拒否する"
 belarus_another.35.t: "インテルマリウム"
 belarus_another.35.d: "ベラルーシは我々に「インテルマリウム」と呼ばれる軍事同盟の創設を提案している。これを創設することで、我々はより大きな隣国からの侵略から自らを守ることができる。"
 belarus_another.35.a: "同意しよう。"
 belarus_another.35.b: "拒否する。"
 belarus_another.36.t: "ベラルーシ、NATO加盟希望"
 belarus_another.36.d: "ベラルーシは長い間民主主義の道を歩んでおり、我々と共にそれを守りたいと考えている。ベラルーシ政府はNATO加盟のための全ての条件を完全に満たし、組織への加盟を申請した。我々はそれを受け入れるだろうか？"
 belarus_another.36.a: "同意しよう。"
 belarus_another.36.b: "拒否する。"
 belarus_another.37.t: "我々はNATOに加盟する"
 belarus_another.37.d: "我々の加盟申請は承認され、今や我々はこの偉大な同盟の一員となり、世界中の民主主義を守る準備ができている！"
 belarus_another.37.a: "万歳！"
 belarus_another.38.t: "ベラルーシがUSAIDへの参加を希望"
 belarus_another.38.d: "ベラルーシ政府はUSAIDプログラムへの参加要請を送付した。我々はこれに前向きに応じるか？"
 belarus_another.38.a: "要請を受け入れよう"
 belarus_another.38.b: "拒否する"
 belarus_another.39.t: "我々の申請はUSAIDに受理された。"
 belarus_another.39.d: "アメリカ合衆国は我々の要請を承認し、今や我々はUSAIDプログラムの一部である。"
 belarus_another.39.a: "万歳！"
 belarus_another.40.t: "ベラルーシにおける2008年経済危機。"
 belarus_another.40.d: "国内経済における複雑な現象は、国内の財政経済状況の悪化を示している。2008年、ベラルーシで金融危機が始まった。今、我々は予算を節約するために支出を削減する分野を選ばなければならない。"
 belarus_another.40.a: "教育システムの内容削減。"
 belarus_another.40.b: "医療システム維持費削減。"
