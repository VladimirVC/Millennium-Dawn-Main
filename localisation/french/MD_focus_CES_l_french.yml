 CES_idea_eacu_cooperation: "Coopération EACU"
 CES_idea_eacu_cooperation_desc: "The Eurasian Customs Union (originally the Eurasian Economic Community) promotes economic ties between most of the post-Soviet states. The union imposes a common external tariff on all goods entering the union and acts as one singular entity when concluding trade deals and negotiations."
 CES_idea_eacu_cooperation_2: "Coopération intégrée de l'EACU"
 CES_idea_eacu_cooperation_2_desc: "The Eurasian Customs Union (originally the Eurasian Economic Community) promotes economic ties between most of the post-Soviet states. The union imposes a common external tariff on all goods entering the union and acts as one singular entity when concluding trade deals and negotiations."
 centralkaz.3516.t: "Formation du Conseil turc"
 centralkaz.3516.d: "Devrions-nous nous joindre ?"
 centralkaz.3516.a: "Oui"
 centralkaz.3516.b: "Non"
 centralkaz.3517.t: "[FROM.GetName] a accepté notre offre !"
 centralkaz.3517.d: "Ils rejoindront le Conseil turc."
