 MAL.conservatism: "£MAL_western_conservative (FARE) 再生と台頭のための代替勢力"
 MAL.conservatism_desc: "保守主義 - 再生と台頭のための代替勢力（フランス語：Forces Alternatives pour le Renouveau et l'Emergence, FARE）\n再生と台頭のための代替勢力は、政府および政府の腐敗と見なされる事態に反対して結成された保守政党である。スマナ・モリー・クリバリによって結成されたFAREは、反汚職、社会的保守主義、およびその他のいくつかの小規模な政策を綱領として掲げている。"
 MAL.Communist-State: "£MAL_communism 民主主義と独立のためのアフリカ連帯"
 MAL.Communist-State_desc: "汎アフリカ共産主義 - 民主主義と独立のためのアフリカ連帯（フランス語：Solidarité Africaine pour la Démocratie et l'Indépendance）\n民主主義と独立のためのアフリカ連帯は、マリを代表する共産党の一つであり、マルクス・レーニン主義共産主義と汎アフリカ主義を一貫して掲げている。同党は名目上、主要な活動理念を汎アフリカ主義としているが、実際には共産主義的な性質を持つ。また、国際共産主義セミナー（ICS）、後の共産党・労働者党国際会議（IMCWP）に加盟しており、マリにおける主要かつ公認された共産党の一つとなっている。"
 MAL.neutral_Social: "£MAL_neutral_social (ADEMA-PASJ) マリ民主同盟 - アフリカ連帯正義党"
 MAL.neutral_Social_desc: "民主社会主義 - マリ民主同盟 - アフリカ連帯正義党（フランス語：Alliance pour la démocratie au Mali - Parti africain pour la solidarité et la justice, ADEMA-PASJ）\n ADEMA-PASJは、1990年に結成された民主社会主義および汎アフリカ主義の政党で、その前身となった諸政党の背景から、国内の多様な層から幅広い支持を得ている。マルクス・レーニン主義者、マリ人移民、政治亡命者らによって結成され、現在はより包括的な連合政党として、数多くの社会主義思想を掲げ、アフリカにおけるマリ政府の海外活動への積極的な参加を推進している。"
 MAL.Neutral_green: "£MAL_neutral_green マリ環境党"
 MAL.Neutral_green_desc: "緑の政治  - マリ環境党（フランス語：Parti Ecologiste du Mali, PEM）\nマリ環境党はマリの緑の党で、国際組織「グローバル・グリーンズ」の加盟団体である。同党は、持続可能な経済成長、気候変動対策、環境保護など、緑の政治からのさまざまな理念を掲げている。"
 MAL.Nat_Autocracy: "£MAL_nationalist_junta マリ軍"
 MAL.Nat_Autocracy_desc: "軍事政権 - マリ軍（フランス語：Forces Armées Maliennes, FAM）\nマリ軍はマリ政府の軍隊であり、陸軍（フランス語：Armée de Terre）、マリ共和国空軍（フランス語：Force Aérienne de la République du Mali）、および国家警備隊で構成されている。軍は、1960年のフランスによる植民地支配からの独立期に創設され、当初はマリ人の徴兵およびフランス軍の退役軍人による志願兵で構成されていた。その後、マリ軍はトゥアレグ族との一連の紛争に参戦し、西アフリカおよび中央アフリカ全域における平和維持活動に参加することとなった。"
