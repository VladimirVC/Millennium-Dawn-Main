 korea_russia.21.t: "俄罗斯雇佣了我们的工人"
 korea_russia.21.d: "我们与俄罗斯签署了协议，将大量雇佣我们的工人来协助建设工作。条件对我们来说非常有利，因为俄罗斯方面支付了丰厚的工资。"
 korea_russia.21.a: "很好"
 korea_russia.22.t: "与朝鲜的军事演习"
 korea_russia.22.d: "朝鲜总参谋部提议举行我军联合演习，展示我军实力，检验我军合作能力。"
 korea_russia.22.a: "真是个好主意"
 korea_russia.22.b: "不"
 korea_russia.23.t: "与俄罗斯的军事演习"
 korea_russia.23.d: "俄罗斯总参谋部已同意举行我们两国武装部队的联合演习。"
 korea_russia.23.a: "非常好！"
 korea_russia.24.t: "与俄罗斯的军事演习"
 korea_russia.24.d: "俄罗斯总参谋部拒绝举行我们两国武装部队的联合演习。"
 korea_russia.24.a: "悲哀"
