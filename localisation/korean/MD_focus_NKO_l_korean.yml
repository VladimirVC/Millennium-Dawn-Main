 NKO_chinese_style_democracy: "중국식 민주주의"
 NKO_chinese_style_democracy_desc: "서방식 민주주의는 우리나라의 실정에 완전히 부합하지 않습니다. 중국식 민주주의가 좀 더 대중적인 듯합니다."
 NKO_intra_party_democracy: "당 내 민주주의"
 NKO_intra_party_democracy_desc: ""
 NKO_agricultural_reform: "농업 개혁"
 NKO_agricultural_reform_desc: "공화국의 집단 농업은 죽었습니다. 이를 개혁하는 것이 생산을 늘리는 가장 좋은 방법입니다!"
 NKO_self_employed_agriculture: "자영 농업"
