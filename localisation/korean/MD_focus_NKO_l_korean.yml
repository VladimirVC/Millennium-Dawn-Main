 korea.52.t: "Upgrade our Lacking supply hubs"
 korea.52.d: "Our great leader provided funds to build some more train tracks and a supply hub and they left us with the choice to either focus on our economic zone ambitions or get logistics ready for war."
 korea.52.a: "Supply the Korean Side"
 korea.52.b: "Supply the Future Economic Zone"
