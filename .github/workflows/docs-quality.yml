name: Docs Quality (Astro)

on:
  pull_request:
    branches: [main, master]
    paths:
      - "docs/**"
      - "tools/docs_checks/**"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            docs
            tools/docs_checks
          sparse-checkout-cone-mode: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        working-directory: docs
        run: bun install

      # The checkers' own self-tests (validate the checker logic, not content).
      - name: Checker self-tests
        run: |
          python3 tools/docs_checks/check_link_syntax.py --self-test
          python3 tools/docs_checks/check_accessibility_basics.py --self-test

      # Single orchestrator: source checks, then the build, then dist checks.
      # The check list lives only in tools/docs_checks/check_docs.py.
      - name: Docs checks (lint, build, links, a11y, perf, ...)
        run: python3 tools/docs_checks/check_docs.py
