 form_NORDEM_category: "北海帝国"
 form_NORDEM_category_desc: "北海帝国は11世紀初頭にイングランド、デンマーク、ノルウェー諸国の政治的連合だった。この帝国はバイキング時代の終わり近くに位置し、非常に短命であった。現代にこの帝国を再び統一することは偉業であり、ネオ・バイキング時代の復活を示す可能性がある。"
