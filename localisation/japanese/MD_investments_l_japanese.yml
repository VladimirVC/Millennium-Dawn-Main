 investments_build_button_tt_1: "建設計画への投資は、対象国に対する自国の影響力を高め、自国に投資収入をもたらす。\n\n§Y国の腐敗度と州のインフラレベルの両方が総工期に影響する。建設にかかる時間は、補正に関係なく、デフォルトで35%増加する。§!\n\n§L対象国が自国の投資提案を受け入れた場合、建設終了後に建造物を取得する。§!\n対象国の経済的に問題があったり、国内での影響力が低すぎたりすると、AIは投資を拒否する。\n\n[investment_cooldown]"
 investments_build_button_tt_delayed: "§Y前提条件§!:\n[!investments_build_button_click_enabled]"
 investments_14_cooldown_tt: "対象国がそれを受け入れた場合、受け入れた時点から§Y14日間§!のタイマーが始まる。このクールダウン期間中にいくら資金をつぎ込んでも、影響力は増えない。"
 investments_30_cooldown_tt: "対象国がそれを受け入れた場合、受け入れた時点から§Y30日間§!のタイマーが始まる。このクールダウン期間中にいくら資金をつぎ込んでも、影響力は増えない。"
 investments_build_button_tt_2: "進行中のプロジェクトを中止する（この州では、1日に1度のみ投資できる）。"
 investments_build_button_tt_b: "このボタンを押すと、州の支配国に許可を申請する。受諾された場合、ディシジョンタブで建設計画が始まる。この計画は、キューに入れられた建物がすべて完成するまで繰り返される。\n\n§Y建設速度は通常時より25%低下する。（国家の建設速度補正は適用される）§!\n\n§L一度に有効化できる建設計画は1つだけである。\n\n一つの州に対して複数の国が同時に建設計画を立てることはできない。\n\nこの州の支配国が、自国に悪い印象を持っている場合は拒否される。§!"
 investments_gain_tooltip: "[investments_gain_tooltip]"
 investments_event.1.t: "[FROM.GetNameWithFlag]からの投資の申し入れ"
 investments_event.1.d: "[FROM.GetName]は[?pending_offer_state.GetName]に[investments_get_pending_offer_construction_type]を[?pending_offer_amount]つ建設することを提案している。\n\nこの計画の総費用は$$[?pending_offer_total_cost]bと推定されており、完了までに約[?pending_offer_duration]日かかる見込みだ。[FROM.GetName]は、我々が建設費の10%を負担する取引を提案している。この取引により、[FROM.GetNameWithFlag]は影響力を得る可能性があり、プロジェクトから利益を得るだろう。\n\n計画の詳細：\n完了までの日数[?pending_offer_duration]\n総計画費用（[FROM.GetNameWithFlag]負担分）: $[?pending_offer_total_cost]b\n建設タイプ: [investments_get_pending_offer_construction_type]\n我々の負担（[THIS.GetNameWithFlag]）: $$[?investor_cost]\n建設場所: [?pending_offer_state.GetName]"
 investments_event.1.o1: "提案を受諾する"
 investments_event.1.o2: "提案を断る"
 investments_event.2.t: "建設許可の拒否"
 investments_event.2.d: "新たな投資先候補から投資の辞退があった。我々のプロジェクトを拒否するなんて信じられないことだ！彼の国の発展を手助けすることで、彼の国の政府に対する影響力や支配力を得られるわけではないのに！まあ、[FROM.GetName]との投資取引は[?ROOT.investments_state_target.GetName]で頓挫したので、他の国に投資したほうがいいかもしれない。"
 investments_event.2.o1: "もしかしたら隣国が……"
 investments_event.3.t: "建設計画の中止"
 investments_event.3.d: "残念ながら、[FROM.GetName] の友人との投資契約を完了できなかった。政府との関係、資金不足、あるいは単に地元の人々の関心が薄かったなど、理由はいろいろ考えられる。また別の機会にぜひ挑戦しよう。"
 investments_event.3.o1: "彼らの損失だ！"
 investments_build_cost_tt: "§Y海外投資費用§!\n\n§Y海外投資費用§!§gは、我々が検討している投資計画の初期費用だ。計画の開始と同時に、国庫から直接引き落とされ、§!§Y国際投資§!§gに追加される。§!\n\n§g他の国や州をクリックした場合は、建物の数を変更するか、他の建物をクリックして補足説明を更新し、本当の費用を確認できる。§!\n\n§g汚職や国民精神などによって、投資計画の費用は左右される。投資先の国の汚職度に基づいて計画費用は増加する。§!\n"
