 JAP_military_decision_category: "[JAP.GetAdjectiveCap] Военные"
 JAP_consolidate_national_defense_framework_mission: "Укрепить структуру национальной обороны"
 JAP_consolidate_national_defense_framework_mission_desc: "Переход к более широкому оборонному положению создал неопределённость в командных структурах, процессах планирования и юридической ответственности. Консолидируя национальную оборонную систему, Япония постепенно восстанавливает согласованность и снижает нарушения, вызванные реформой."
 JAP_modernize_joint_command_mission: "Модернизировать структуры совместного командования"
 JAP_modernize_joint_command_mission_desc: "Интеграция земли, моря, воздуха и новых областей в единую систему совместного командования требует времени, обучения и организационных изменений. По мере того как новые процедуры испытываются и совершенствуются, трения постепенно уменьшаются, а эффективность вооружённых сил Японии улучшается."
 JAP_JAP_normalize_defense_procurement_mission: "Нормализовать систему закупок оборонной продукции"
 JAP_JAP_normalize_defense_procurement_mission_desc: "Расширение оборонных обязанностей сильно нагрузило существующие закупочные и промышленные механизмы. Через осторожные реформы, долгосрочное планирование и более тесную координацию с промышленностью Япония стремится нормализовать оборонные закупки и сократить неэффективность переходного периода."
 JAP_establish_asterioid_mining_network_mission: "Создать сеть добычи астероидов"
 JAP_establish_asterioid_mining_network_mission_desc: "Япония формирует свою первую сеть добычи астероидов, размещая орбитальные платформы и разворачивая разведочное оборудование по мере того, как оффшорные операции по ресурсам начинают приобретать форму."
 JAP_asteroid_mining_light_operation: "Лёгкая небесная разведка"
 JAP_asteroid_mining_light_operation_desc: "Япония проводит маломасштабное исследование астероидов, призывая руководство предков, пока зонды ищут полезные руды на небесах."
 JAP_asteroid_mining_medium_operation: "Средняя миссия по божественному извлечению"
 JAP_asteroid_mining_medium_operation_desc: "Большая экспедиция отправляется глубже в пояс астероидов, черпая вдохновение из мифической символики, пока Япония ищет ценные внеземные металлы."
 JAP_asteroid_mining_heavy_operation: "Тяжёлая небесная горная экспедиция"
 JAP_asteroid_mining_heavy_operation_desc: "Запускается полномасштабная добыча астероидов, эхом отзывающаяся рассказами о небесных кузницах, когда Япония стремится добыть богатые небесные ресурсы."
 JAP_mars_mission_program_mission: "Основана колония на Марсе"
 JAP_restore_guarantee: "Требовать восстановления гарантий безопасности США"
 JAP_restore_guarantee_desc: "С ростом региональной напряжённости и сомнениями в нашей долгосрочной безопасности некоторые в правительстве считают, что нам нужно добиваться обновлённых и явных гарантий безопасности от США. Это, вероятно, потребует политических уступок по оборонной политике и толкованию Статьи 9, но может стать ценой за стратегическую стабильность."
 JAP_remove_american_blockade: "Требовать прекращения американского морского давления"
 JAP_remove_american_blockade_desc: "Усиленное присутствие ВМС США вокруг наших ключевых морских путей вызывает напряжённость дома и за рубежом. Дипломатические каналы остаются открытыми для переговоров о снижении или прекращении этого давления, но Вашингтон почти наверняка потребует более глубоких обязательств по безопасности и дальнейшего смягчения нашей позиции по Статье 9 в ответ."
 JAP_restore_trade_relations: "Стремиться к нормализации торговли с США"
 JAP_restore_trade_relations_desc: "Тарифы и целевые торговые меры, введённые США, наносят ущерб нашим экспортёрам и подрывают доверие в альянсе. Вступив в прямой диалог с Вашингтоном, мы можем нормализовать экономические отношения, но любое реальное облегчение, скорее всего, будет связано с возобновлённым сотрудничеством в области безопасности и более широким толкованием Статьи 9."
 USA_demand_japanese_article_9_interpretation: "Требовать более широкого толкования Статьи 9"
 USA_demand_japanese_article_9_interpretation_desc: "Япония остаётся ключевым союзником в быстро меняющейся среде безопасности, но её текущее толкование Статьи 9 ограничивает реальное разделение бремени. Формально настаивая на расширении понимания самообороны, мы можем продвинуть углубленное сотрудничество и более способного партнёра, хотя это рискует вызвать внутреннюю реакцию в Японии и возможные трения в альянсе."
 JAP_chinese_agression_five: "Рост китайской агрессии"
 JAP_chinese_agression_five_desc: "Недавние действия Китая в регионе вызвали обеспокоенность у наших оборонных планировщиков. Хотя ситуация ещё не достигла критического уровня, тенденция очевидна: Пекин постепенно усиливает свою позицию. Политики предупреждают, что Япония должна подготовиться к возможным дальнейшим дестабилизирующим событиям."
 JAP_chinese_agression_five_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R5§!"
 JAP_chinese_agression_ten: "Эскалация китайского давления"
 JAP_chinese_agression_ten_desc: "Китай усилил своё военное и геополитическое давление в регионе. Проникновения патрулей, нарушения воздушного пространства и агрессивная риторика значительно участились. Растущая частота этих инцидентов указывает на намеренную стратегию проверить решимость Японии и изменить региональный баланс."
 JAP_chinese_agression_ten_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R10§!"
 JAP_chinese_agression_twelve: "Тревожная китайская активность"
 JAP_chinese_agression_twelve_desc: "Последние действия Пекина отмечены тревожной эскалацией. Разведданные указывают на рост морского развертывания, военные учения у спорных вод и политические послания, направленные прямо на Японию. Ситуация становится всё более нестабильной, и требования сильного национального ответа становятся всё громче."
 JAP_chinese_agression_twelve_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R12§!"
 JAP_chinese_agression_fourteen: "Серьёзные китайские провокации"
 JAP_chinese_agression_fourteen_desc: "Китай предпринял несколько агрессивных шагов, выходящих за рамки рутинного давления. Стратегические активы развернуты рядом с японской территорией, а вторжения в наши прилегающие воды достигли новой частоты. Оборонные чиновники предупреждают, что Японии может потребоваться пересмотреть элементы своей позиции безопасности."
 JAP_chinese_agression_fourteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R14§!"
 JAP_chinese_agression_sixteen: "Опасная китайская эскалация"
 JAP_chinese_agression_sixteen_desc: "Региональная ситуация становится всё более опасной. Военные манёвры Китая теперь выглядят как направленные на прямое запугивание Японии, а каналы пропаганды в Пекине приняли более жёсткий тон. Вероятность кризиса из-за просчёта резко возрастает."
 JAP_chinese_agression_sixteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R16§!"
 JAP_chinese_agression_eighteen: "Критическое китайское военное давление"
 JAP_chinese_agression_eighteen_desc: "Агрессивная позиция Китая достигла критической точки. Ключевые морские зоны находятся под постоянным давлением, воздушные нарушения на беспрецедентном уровне, а региональные партнёры бьют тревогу. Политики по всей Токио говорят, что Японии следует пересмотреть свою оборонную стратегию, включая толкование Статьи 9."
 JAP_chinese_agression_eighteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R18§!"
 JAP_chinese_agression_twenty: "Серьёзный региональный кризис: пик китайской агрессии"
 JAP_chinese_agression_twenty_desc: "Ситуация превратилась в полномасштабный региональный кризис. Китай развернул обширные военные силы вблизи японской территории, сигнализируя о готовности к дальнейшей эскалации. Угроза национальной безопасности уже не теоретическая, Япония сталкивается с прямым вызовом, который может вынудить принять исторические решения относительно военного статуса и роли Сил самообороны."
 JAP_chinese_agression_twenty_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Агрессия§! минимум §R20§!"
 JAP_world_tension_high: "Пересмотреть позицию безопасности"
 JAP_world_tension_high_desc: "Рост глобальной нестабильности требует, чтобы Япония пересмотрела свою оборонную политику и подготовилась к возможным сдвигам в международном порядке."
 JAP_world_tension_high2: "Подготовиться к региональным чрезвычайным ситуациям"
 JAP_world_tension_high2_desc: "Мир становится всё более опасным. Японии необходимо принять конкретные меры для обеспечения национальной безопасности и поддержания стратегической готовности."
 JAP_world_tension_high3: "Активировать меры национальной безопасности"
 JAP_world_tension_high3_desc: "Глобальная напряжённость достигла критического уровня. Японии теперь следует рассмотреть чрезвычайные меры для защиты национальных интересов и поддержания региональной стабильности."
 JAP_article_nine_protests_appeal: "Ответить на протесты за защиту"
 JAP_article_nine_protests_appeal_desc: "Широкие протесты за усиление обороны требуют более мощных военных возможностей и более жёсткой позиции безопасности. Действуя в соответствии с этими призывами и расширяя толкование Статьи 9, правительство может использовать общественное давление для оправдания более решительной национальной оборонной политики."
 JAP_article_nine_protests_appeal_tt: "§YСила протестов§! минимум §R50§!"
 JAP_article_nine_protests_appeal_tt2: "[JAP.GetName] не имеет §YЖелаемого военного закона§!"
 JAP_article_nine_military_parties: "Использовать про-военные партии"
 JAP_article_nine_military_parties_desc: "Про-военные партии внутри правительства продвигают более сильную национальную оборону и более широкое толкование Статьи 9. Согласовавшись с их повесткой, правительство может провести военные реформы и оправдать более высокий уровень боевой готовности."
 JAP_article_nine: "Толкование Статьи 9"
 JAP_article_nine_left_side: "Строгий пацифизм"
 JAP_article_nine_level_one: "Уровень I: пацифистское толкование"
 JAP_article_nine_level_two: "Уровень II: оборонительное толкование"
 JAP_article_nine_level_three: "Уровень III: совместная оборона"
 JAP_article_nine_level_four: "Уровень IV: коллективная самооборона"
 JAP_article_nine_level_five: "Уровень V: расширенная военная роль"
 JAP_article_nine_right_side: "Активная оборона"
 JAP_great_east_japan_earthquake_decision: "Путь к восстановлению"
 JAP_great_east_japan_earthquake_decision_desc: "11 марта 2011 года Великий землетрясение на востоке Японии поразило страну беспрецедентными толчками и цунами, вызвав опустошение, не виданное в современной истории. От Тохоку до Канто огромные регионы были парализованы, нарушены транспортные сети, остановлена экономическая деятельность и подорваны жизни миллионов. Сообщества и отрасли потеряли свои опоры, и страна в целом погрузилась в хаос и неопределённость.\n\nКатастрофа была не только физическим разрушением; она оставила глубокий шрам на национальной психике и заставила общество пересмотреть свои основы. Япония сейчас стоит на распутье, перед лицом огромного вызова восстановления и обновления. Восстановление разрушенных регионов, восстановление отраслей и возвращение жизни и связей людей являются неизбежной обязанностью государства.\n\nЭта работа, известная как «Путь к восстановлению», будет долгой и тяжёлой. Однако только преодолев такие испытания, Япония сможет выстроить новое будущее."
 JAP_tohoku_infrastructure_decision: "Восстановление инфраструктуры Тохоку"
 JAP_tohoku_infrastructure_decision_desc: "Шаг за шагом мы должны восстановить инфраструктуру, разрушенную землетрясением. Восстановление дорог, железных дорог и портов, основ региональных экономик и повседневной жизни, является первым шагом к восстановлению."
 JAP_kanto_infrastructure_decision: "Восстановление инфраструктуры Канто"
 JAP_kanto_infrastructure_decision_desc: "Шаг за шагом мы должны восстановить инфраструктуру, разрушенную землетрясением. Восстановление дорог, железных дорог и портов, основ региональных экономик и повседневной жизни, является первым шагом к восстановлению."
 JAP_tohoku_communication_decision: "Восстановить телекоммуникации в Тохоку"
 JAP_tohoku_communication_decision_desc: "Телекоммуникационная инфраструктура, разрушенная катастрофой, жизненно важна для восстановления и повседневной жизни. Шаг за шагом восстановление должно продолжаться, чтобы снова соединить сообщества и оживить экономику."
 JAP_kanto_communication_decision: "Восстановить телекоммуникации в Канто"
 JAP_kanto_communication_decision_desc: "Телекоммуникационная инфраструктура, разрушенная катастрофой, жизненно важна для восстановления и повседневной жизни. Шаг за шагом восстановление должно продолжаться, чтобы снова соединить сообщества и оживить экономику."
 JAP_tohoku_industrial_recovery_decision: "Возродить промышленность в Тохоку"
 JAP_tohoku_industrial_recovery_decision_desc: "Возрождение местной промышленности, остановленной из-за катастрофы, необходимо для экономического восстановления. Восстановление гражданской промышленности поможет создать рабочие места и укрепить основы производства."
 JAP_kanto_industrial_recovery_decision: "Возродить промышленность в Канто"
 JAP_kanto_industrial_recovery_decision_desc: "Возрождение местной промышленности, остановленной из-за катастрофы, необходимо для экономического восстановления. Восстановление гражданской промышленности поможет создать рабочие места и укрепить основы производства."
 JAP_domestic_policy_decision: "[JAP.GetFlag][JAP.GetAdjective] Внутренняя политика"
 JAP_focus_renewable_energy_decision: "Сосредоточиться на возобновляемой энергии"
 JAP_focus_renewable_energy_decision_desc: "На фоне растущих опасений по поводу безопасности атомной энергии больше инвестиций в солнечную, ветровую и другие возобновляемые источники предлагает путь к диверсификации энергии и снижению зависимости от импортного топлива."
 JAP_focus_thermal_power_decision: "Сосредоточиться на тепловой энергетике"
 JAP_focus_thermal_power_decision_desc: "В условиях опасений по поводу ядерной безопасности расширение угольных, нефтяных и газовых электростанций предоставляет более немедленный и надёжный источник электроэнергии для страны."
 JAP_expand_national_oil_stockpiles: "Расширить национальные нефтяные резервы"
 JAP_expand_national_oil_stockpiles_desc: "Япония не может позволить себе быть задушенной блокадой, эмбарго или ценовым шоком. Мы расширим национальные нефтяные запасы, укрепим хранилища и ужесточим планирование распределения топлива, чтобы государство могло пережить кризисы без паники."
 JAP_saudi_aramco_crude_storage: "Хранение нефти Saudi Aramco"
 JAP_saudi_aramco_crude_storage_desc: "Гарантировать выделенное хранение сырой нефти через Saudi Aramco, чтобы стабилизировать поставки и снизить уязвимость перед внезапными рыночными шоками. Закрепляя долгосрочный доступ и предсказуемую доставку, Япония приобретает стратегическое пространство для манёвра."
 JAP_overseas_upstream_equity: "Иностранные доли в добыче"
 JAP_overseas_upstream_equity_desc: "Энергетическая безопасность становится сильнее, когда мы владеем скважинами, а не только контрактами. Мы будем добиваться долей в добыче за рубежом, чтобы закрепить поставки, получить рычаг в переговорах и снизить уязвимость к политическому давлению."
 JAP_minamitori_deep_sea_trial: "Испытание глубоководных работ у Минамитори"
 JAP_minamitori_deep_sea_trial_desc: "Шельф у Минамитори содержит ресурсы, которые могут изменить стратегическое положение Японии, если мы сможем надёжно добывать их. Запустим глубоководное испытание, чтобы проверить оборудование, логистику и переработку в реальных условиях, превращая теорию в способность."
 JAP_minamitori_deep_sea_trial_tt: "После завершения §YSpecial Project $sp_deep_sea_mining$§! мы получим больше ресурсов"
 JAP_mitsubishi_escrap: "Инициатива Mitsubishi E-Scrap"
 JAP_mitsubishi_escrap_desc: "Самые чистые ресурсы уже внутри наших границ. Мы поддержим инициативу Mitsubishi по переработке электронных отходов, чтобы извлечь редкие металлы из списанной электроники и выстроить внутренний цикл поставок для критической промышленности."
 JAP_kosaka_tsl_furnace: "Расширение печи Kosaka TSL"
 JAP_kosaka_tsl_furnace_desc: "Переработка так же стратегична, как и добыча. Мы расширим мощность печи Kosaka TSL, чтобы обрабатывать сложный лом и смешанные концентраты, возвращая критические металлы, которые иначе были бы потеряны."
 JAP_green_ship_recycling: "Экологичная переработка кораблей"
 JAP_green_ship_recycling_desc: "Флот не только строят, но и демонтируют, и сталь должна вернуться в страну. Мы установим стандарты и мощности экологичной переработки кораблей, чтобы безопасно и эффективно извлекать ценные материалы. Каждый выведенный из строя корпус станет ресурсом для следующего."
 JAP_horizontal_recycling_expansion_decision: "Расширение горизонтальной переработки"
 JAP_horizontal_recycling_expansion_decision_desc: "Устойчивость возникает, когда каждое промышленное течение становится линией снабжения. Мы расширим горизонтальную переработку, чтобы направлять восстановленные металлы и компоненты по секторам, питая судостроение, электронику и оборонное производство отечественными материалами."
 JAP_rubber_butadience_brench_decision: "Ветвь производства бутадиенового каучука"
 JAP_rubber_butadience_brench_decision_desc: "Натуральный каучук может быть перекрыт, нормирован или использован как рычаг давления, и Япония не может позволить, чтобы такой рычаг существовал. Мы расширим синтетическое производство бутадиенового каучука, чтобы обеспечить шины, уплотнения и критические компоненты для промышленности и вооружённых сил."
 JAP_bibi_world_decision: "Развертывание литейного производства Rapidus IIM-1 'Bibi World'"
 JAP_bibi_world_decision_desc: "Ускорить развертывание литейного производства Rapidus IIM-1 'Bibi World', чтобы закрепить на японской земле мощности для полупроводников следующего поколения."
 JAP_yufutsu_oil_expansion_decision: "Расширение нефтяного месторождения Yufutsu"
 JAP_yufutsu_oil_expansion_decision_desc: "Расширить месторождение Yufutsu, чтобы укрепить внутренние поставки и снизить уязвимость перед внешними перебоями."
 JAP_nankai_through_decision: "Разработка газа желоба Нанкай"
 JAP_nankai_through_decision_desc: "Освоить желоб Нанкай, чтобы обеспечить отечественный источник природного газа и снизить японскую уязвимость перед морскими перебоями и иностранными ценовыми шоками."
 JAP_toray_expansion_program_decision: "Программа расширения Toray"
 JAP_toray_expansion_program_decision_desc: "Масштабировать производство передовых материалов Toray, чтобы укрепить промышленную базу Японии там, где это наиболее важно."
 JAP_teijin_aerospace_prepreg_decision: "Препрег для аэрокосмической отрасли Teijin"
 JAP_teijin_aerospace_prepreg_decision_desc: "Расширить мощность Teijin по производству аэрокосмического препрега, чтобы обеспечить композитную основу современных корпусов и высокотехнологичных оборонных систем."
 JAP_demand_south_kuril: "Требовать Южные Курилы"
 JAP_demand_south_kuril_desc: "Токио предъявит формальное требование о возвращении Южных Курил. Москва может уступить, чтобы избежать эскалации, или отказаться и рискнуть кризисом."
 JAP_demand_north_kuril: "Требовать Северные Курилы"
 JAP_demand_north_kuril_desc: "Япония потребует возвращения Северных Курил как часть более широкой программы имперского восстановления. Отказ может быть использован для оправдания дальнейшей эскалации."
 JAP_demand_sakhalin: "Требовать Сахалин"
 JAP_demand_sakhalin_desc: "Япония потребует возвращения Сахалина. Если советское правительство отвергнет требование, Токио столкнётся с выбором между сдержанностью, ограниченным конфликтом или войной."
 JAP_peaceout_russia: "Заключить мир с Россией"
 JAP_peaceout_russia_desc: "Мы добьёмся соглашения с Россией, чтобы закончить войну на наших условиях и закрепить то, что мы захватили. Это политическое решение так же важно, как и военное, фиксируя новую реальность в договорах до того, как Москва успеет перегруппироваться. Если Россия примет, боевые действия прекратятся, и карта изменится навсегда."
 JAP_claiming_south_korea: "Заявить претензию на Корею"
 JAP_claiming_south_korea_desc: "Мы представим Корею как вопрос японской безопасности и исторической прерогативы, превращая неопределённость в явную претензию. Это не жест — это заявление о том, что наш стратегический рубеж не заканчивается на проливе Цусима. После предъявления претензии каждое будущее переговоры начнутся с наших условий."
 JAP_claiming_north_korea: "Определить северный вопрос Кореи"
 JAP_claiming_north_korea_desc: "Режим в Пхеньяне — не сосед, а постоянный кризис, угрожающий нашим морям и городам. Мы формализуем японскую претензию на формирование будущего северного полуострова, рассматривая его как вопрос безопасности, который нельзя оставлять другим. После объявления Север станет проблемой, которую нужно управлять по японским условиям."
 JAP_claiming_taiwan: "Вновь подтвердить наш мандат над Тайванем"
 JAP_claiming_taiwan_desc: "Тайвань находится на стыке первой островной цепи и в горле нашей морской безопасности. Мы вновь подтвердим японский мандат над островом, представляя его статус как стратегическую необходимость, а не предмет решения далеких держав. После объявления Япония будет рассматривать будущее Тайваня как неотделимое от своего собственного."
 JAP_claiming_phillipines: "Заявить претензию на Филиппинский архипелаг"
 JAP_claiming_phillipines_desc: "Филиппинский архипелаг контролирует подходы к Западной Пацифике и морские пути, снабжающие нашу промышленность. Мы предъявим формальную претензию и ясно дадим понять, что эти острова входят в стратегическую сферу Японии, независимо от того, одобряют это другие или нет. После объявления регион поймёт, что наш флот намерен решать, кто проходит через эти воды."
 JAP_claiming_malaysia: "Заявить претензию на Малаку"
 JAP_claiming_malaysia_desc: "Малака расположена на ключевых проливах и маршрутах снабжения, которые определяют поток торговли и топлива в регионе. Мы предъявим формальную претензию и представим её статус как вопрос японской безопасности и морского порядка. После объявления каждое переговоры начнутся с нашей позиции."
 JAP_claiming_indonesia: "Утвердить мандат на Индонезию"
 JAP_claiming_indonesia_desc: "Индонезия контролирует острова и узкие места, связывающие Индийский и Тихий океаны. Мы утвердим мандат над архипелагом, рассматривая его морские пути и ресурсы как стратегическую необходимость для Японии. Если в регионе должен быть порядок, он будет обеспечен из Токио."
 JAP_claiming_vietnam: "Заявить интерес к Вьетнаму"
 JAP_claiming_vietnam_desc: "Вьетнам закрепляет край Южно-Китайского моря и предлагает базы, способные изменить баланс вдоль всего побережья. Мы объявим японскую претензию на интерес и ясно дадим понять, что его ориентация не будет решаться без нас. Влияние начинается с уверенности, а уверенность начинается с претензии."
 JAP_claiming_cambodia: "Расширить сферу на Камбоджу"
 JAP_claiming_cambodia_desc: "Камбоджа небольшая, но география делает её коридором, буфером и рычагом на материковой Юго-Восточной Азии. Мы расширим нашу претензию и свяжем её будущее с более широкой японской сферой. То, что на карте выглядит незначительным, может решить стабильность региона."
 JAP_claiming_laos: "Заявить претензию на междуречье Меконга"
 JAP_claiming_laos_desc: "Лаос контролирует сухопутные пути, реки и тихую глубину за побережьем. Мы заявим претензию на Меконгское междуречье как часть нашей континентальной безопасности, чтобы соперники не могли использовать его как заднюю дверь в нашу сферу. Контроль — это не только порты, это коридоры."
 JAP_claiming_australia: "Заявить претензию на Австралию"
 JAP_claiming_australia_desc: "Австралия — южный якорь Тихого океана, континент, способный принимать флоты, воздушную мощь и логистику длительной войны. Мы объявим претензию и дадим понять, что южные подходы не останутся вне стратегической досягаемости Японии. Если юг будет обеспечен, океан последует."
 JAP_claiming_new_zealand: "Заявить претензию на южных передовых"
 JAP_claiming_new_zealand_desc: "Новая Зеландия может быть далёкой, но она лежит на маршрутах, которые имеют значение, когда Тихий океан становится оспариваемым. Мы заявим претензию на южных передовых и лишим соперников безопасного тыла за пределами нашей досягаемости. Даже дальние острова становятся оружием, когда ими владеем мы."
 JAP_claiming_myanmar: "Утвердить контроль над Ирравади"
 JAP_claiming_myanmar_desc: "Мьянма — сухопутный мост между океанами и ворота вглубь региона. Мы предъявим претензию и будем рассматривать её порты, коридоры и аэродромы как стратегические активы японской сферы. Кто владеет воротами, решает, кто входит."
 JAP_demand_palau: "Требовать Палау"
 JAP_demand_palau_desc: "Палау — небольшая цепочка с большим влиянием на военно-морское планирование, предлагающая якорные стоянки, наблюдение и досягаемость. Мы потребуем её подчинения японской власти и закрепим её как передовой форпост нашего тихоокеанского порядка. Карта пишется базами, не речами."
 JAP_demand_micronesia: "Требовать Микронезию"
 JAP_demand_micronesia_desc: "Микронезия тянется через центральный Тихий океан как путеводные камни для флотов и самолётов. Мы потребуем контроль, чтобы закрепить маршруты транзита и лишить соперников плацдарма для развертывания. Однажды удержанные, эти острова превращают расстояние в преимущество."
 JAP_demand_nauru: "Требовать Науру"
 JAP_demand_nauru_desc: "Науру крошечная, но такие острова решают обзорность и доступ через широкие воды. Мы потребуем её согласования с Японией и включим её в нашу сеть форпостов. В морскую эпоху нет неважных островов."
 JAP_demand_kiribati: "Требовать Кирибати"
 JAP_demand_kiribati_desc: "Кирибати простирается через ключевые подходы, которые могут поддерживать разведку, дозаправку и перехват. Мы потребуем её подчинения японскому руководству и закрепим острова как звено в нашем более широком периметре. Тихий океан будет упорядочен звеном за звеном."
 JAP_demand_marshall_islands: "Требовать Маршалловы острова"
 JAP_demand_marshall_islands_desc: "Маршалловы острова предоставляют пространство для аэродромов, логистики и контроля над центральными тихоокеанскими маршрутами. Мы потребуем их перехода в японскую сферу и превратим их в укреплённые путевые точки для флота. Кто владеет атоллами, может формировать целый театр."
 JAP_demand_tuvalu: "Требовать Тувалу"
 JAP_demand_tuvalu_desc: "Тувалу предлагает мало земли, но предлагает присутствие, а именно присутствие решает контроль над морем. Мы потребуем согласование Тувалу и закрепим её как прослушивающий пункт и перевал в южном Тихом океане. Даже самые маленькие острова могут закрепить периметр."
 JAP_demand_solomon_islands: "Требовать Соломоновы острова"
 JAP_demand_solomon_islands_desc: "Соломоны — естественный барьер и плацдарм на юго-западе Тихого океана, идеальный для аэродромов и военно-морского прикрытия. Мы потребуем их подчинения Японии и возьмём под контроль маршруты, проходящие через них. Контроль здесь означает контроль над движением."
 JAP_demand_guinea: "Требовать Новую Гвинею"
 JAP_demand_guinea_desc: "Новая Гвинея — континентальный бастион, доминирующий над подходами между Юго-Восточной Азией и Тихим океаном. Мы потребуем её перехода и превратим её в крепость воздушной мощи, логистики и передовой обороны. С Новой Гвинеей под контролем южный театр склоняется к нашей воле."
 JAP_demand_vanuatu: "Требовать Вануату"
 JAP_demand_vanuatu_desc: "Вануату расположено на линиях, имеющих значение для пополнения запасов и проникновения в юго-западный Тихий океан. Мы потребуем её согласование с Японией и интегрируем её в нашу сеть базирования. Цепочка островов становится стеной, когда её удерживают вместе."
 JAP_demand_fiji: "Требовать Фиджи"
 JAP_demand_fiji_desc: "Фиджи — центральный узел в южной части Тихого океана, способный поддерживать флотскую логистику и авиaоперации по широкой дуге. Мы потребуем её подчинения Японии и закрепим её как ключевой элемент нашего южного периметра. Когда Фиджи наше, баланс региона меняется."
 JAP_demand_samoa: "Требовать Самоа"
 JAP_demand_samoa_desc: "Самоа расположено на маршрутах, соединяющих центральный Тихий океан с южными подходами. Мы потребуем согласование Самоа с Японией и интегрируем её порты и аэродромы в наш более широкий периметр. В океанской империи даже далёкие острова становятся решающими."
 JAP_demand_tonga: "Требовать Тонга"
 JAP_demand_tonga_desc: "Тонга предлагает стратегическую опору в южной части Тихого океана и платформу для наблюдения за движением через широкие воды. Мы потребуем её подчинения японскому руководству и закрепим её как часть нашей южной цепочки контроля. Нейтралитет — это роскошь, которую мы не позволим в наших морских путях."
 JAP_demand_american_islands: "Требовать американские острова"
 JAP_demand_american_islands_desc: "Острова, удерживаемые США, — это не просто территория, а передовые базы, проецирующие власть в наш океан. Мы потребуем их перевода или нейтрализации под японским контролем, лишая Вашингтон плацдарма у наших дверей. Если Тихий океан должен быть упорядочен, чужие опоры должны быть устранены."
 JAP_demand_french_islands: "Требовать французские острова"
 JAP_demand_french_islands_desc: "Французские владения на островах дают досягаемость, порты и дипломатическое прикрытие для иностранного присутствия в Тихом океане. Мы потребуем их подчинения Японии и включим их в нашу сеть форпостов и коридоров. Наша сфера не будет прорвана далекими империями."
 JAP_demand_british_islands: "Требовать британские острова"
 JAP_demand_british_islands_desc: "Британские островные владения — остатки старого порядка, но они всё ещё дают базы и влияние на критических маршрутах. Мы потребуем их передачи в японскую сферу и закроем ещё один разрыв в нашем морском периметре. Тихий океан будет организован под одной властью — нашей."
 JAP_imperial_procurement_standardization: "Стандартизация императорских закупок"
 JAP_imperial_procurement_standardization_desc: "Централизовать правила закупок, стандартизировать компоненты и обеспечивать общие спецификации для вооружённых сил. Цель — более быстрый выпуск, простая логистика и меньше узких мест производства."
 JAP_zaibatsu_empowerment_charter: "Хартия расширения возможностей заибатсу"
 JAP_zaibatsu_empowerment_charter_desc: "Предоставить расширенные привилегии выбранным промышленным конгломератам в обмен на обязательные производственные планы, установленные имперским правительством."
 JAP_neighborhood_associations_system: "Система соседских ассоциаций"
 JAP_neighborhood_associations_system_desc: "Восстановить всенациональную сеть местных ассоциаций для регистрации домохозяйств, координации распределения и поддержки быстрого мобилизационного реагирования. Она укрепляет социальный контроль и улучшает оперативность государства."
 JAP_state_rites_restoration: "Восстановление государственных обрядов"
 JAP_state_rites_restoration_desc: "Восстановить государственные церемонии и общественные обряды как центральный столп национальной жизни. Эта реформа укрепляет имперскую легитимность и побуждает общественное согласие с восстановленным порядком."
 JAP_national_morals_education_act: "Закон о национальной морали и образовании"
 JAP_national_morals_education_act_desc: "Стандартизировать гражданское образование вокруг долга, службы и национального единства. Школы будут использоваться для формирования дисциплины, расширения готовности и воспитания лояльности восстановленному государству."
 JAP_imperial_rescript_revival: "Возрождение императорского указа"
 JAP_imperial_rescript_revival_desc: "Возродить официальный императорский указ, чтобы закрепить легитимность государства и определить обязанности граждан. Восстановленный порядок будет представлен как возвращение к единству, долгу и национальной цели."
 JAP_north_korean_remilitarized_dmz: "Отреагировать на эскалацию КНДР на демилитаризованной зоне"
 JAP_north_korean_remilitarized_dmz_desc: "КНДР усилила позиции вдоль демилитаризованной зоны. Токио использует эту эскалацию, чтобы ужесточить позицию безопасности и расширить оперативную свободу в рамках Статьи 9."
 JAP_north_korean_increased_nuclear_testing: "Отреагировать на ядерные испытания КНДР"
 JAP_north_korean_increased_nuclear_testing_desc: "Увеличение темпа ядерных испытаний усилило региональную угрозу. Правительство будет использовать это, чтобы оправдать более жёсткое толкование Статьи 9 и ускорить меры готовности."
 JAP_north_korean_threats_to_south_korea: "Отреагировать на угрозы КНДР"
 JAP_north_korean_threats_to_south_korea_desc: "Прямые угрозы в адрес Республики Корея повышают риск более широкого конфликта, который может распространиться на зону безопасности Японии. Токио может расширить толкование Статьи 9 и усилить планирование сдерживания."
 JAP_north_korean_road_to_war: "Готовиться к маршу КНДР на войну"
 JAP_north_korean_road_to_war_desc: "Ситуация скатывается к открытому конфликту. Япония больше не может рассчитывать только на сдержанность. Пересмотренное толкование Статьи 9 позволит более жёсткое военное планирование и более быстрые варианты ответа."
 JAP_russian_agressiveness: "Отреагировать на агрессивность России"
 JAP_russian_agressiveness_desc: "Всё более напористая позиция России в Северо-Восточной Азии подрывает региональную стабильность. Токио использует усиление угрозы, чтобы укрепить сдерживание и расширить оперативную свободу в рамках Статьи 9."
 JAP_defence_russian_asian_ambitions: "Противостоять азиатским амбициям России"
 JAP_defence_russian_asian_ambitions_desc: "Амбиции Москвы в Азии угрожают безопасности Японии и балансу сил в Тихом океане. Токио ужесточит защитную позицию и расширит оперативные опции в рамках Статьи 9."
 JAP_russian_north_korean_alliance: "Готовиться к оси Россия — Северная Корея"
 JAP_russian_north_korean_alliance_desc: "Более тесное сближение России и Северной Кореи усилит давление на Японию с нескольких направлений. Токио ответит усилением сдерживания и ослаблением оставшихся ограничений по Статье 9."
 JAP_russian_pacific_naval_presence: "Реагировать на наращивание российского военно-морского присутствия в Тихом океане"
 JAP_russian_pacific_naval_presence_desc: "Военно-морская позиция России в Тихом океане становится более напористой. Япония использует это изменение, чтобы оправдать расширение морской готовности и более гибкое толкование Статьи 9."
 JAP_tookover_sikhalin_mission: "Крайний срок для возвращения утраченных территорий"
 JAP_tookover_sikhalin_mission_desc: "Время истекает. Если Россия не успеет выполнить требуемые задачи до срока, международное давление и внутреннее истощение вынудят к урегулированию. Мир будет подписан, и утраченные территории будут уступлены как цена окончания войны."
 JAP_russia_demands_peace_japan: "Мирное соглашение с Россией"
 JAP_russia_demands_peace_japan_desc: "С Курильскими островами и Сахалином теперь прочно под японским контролем, Токио выдвинул предложение закончить войну. Предложение простое и расчётливое: мир в обмен на признание Россией новой реальности на севере. Это не акт милосердия, а стратегическое урегулирование, закрепляющее наши достижения и экономя обеим нациям затраты на затяжной конфликт. Принятие приведёт к концу войны и формализует наш контроль над захваченными территориями. Отказ будет сигналом, что Москва готова продолжать войну, которую она уже не уверена, что сможет выиграть."
 JAP_russia_demands_peace_russia: "Требовать мира с Японией"
 JAP_russia_demands_peace_russia_desc: "Мы потребуем урегулирования с Японией, чтобы положить конец боевым действиям и заморозить ситуацию, прежде чем она ухудшится. Это не примирение, это ограничение ущерба, закрепляющее условия, пока у нас ещё есть рычаги, чтобы навязать исход. Если Токио откажется, мы узнаем, что они ищут победу, а не мира."
 JAP_auto_claiming_tt: "При выборе этого решения процесс будет повторяться до тех пор, пока не будут заявлены все основные государства. После этого вы сможете потребовать подчинения."
 JAP_intellectual_platform_decision: "$JAP_intellectual_platform$"
 JAP_intellectual_platform_decision_desc: "$JAP_intellectual_platform_desc$"
 JAP_declining_birthrate_category: "Агентство мер против снижения рождаемости"
 JAP_declining_birthrate_category_desc: "В Японии около 2000 года снижение числа рождений и прогрессирование низкой рождаемости начали восприниматься как проблема, которая в будущем может пошатнуть основы общества. Причины не единичны: поздние браки или отсутствие брака, трудности в совмещении воспитания детей и работы, а также бытовые нагрузки, включая образование и жильё, и это не проблема, которую можно решить только краткосрочными мерами. Изменения в структуре населения влияют на рабочую силу, систему социального обеспечения и даже на поддержание местных сообществ, поэтому от правительства требуется действовать постоянно и во всех сферах политики.\n\nУсилия по решению этой проблемы постепенно формируются через накопление отдельных мер, таких как расширение поддержки воспитания детей, пересмотр рабочих стилей и снижение бытовых нагрузок. Видимых изменений может не быть сразу, но накопление мер постепенно меняет основу общества и также окажет средне- и долгосрочное влияние на демографические тенденции.\n\nВ отчётах опросов, публикуемых каждые несколько лет, прогресс и эффективность этих усилий снова пересматриваются. В зависимости от результатов чувство кризиса, связанное с низкой рождаемостью, может усилиться, либо могут появиться признаки восстановления и улучшения. Насколько последовательно правительство сможет продолжать выстраивать эти меры, определит будущую демографическую базу.\n\n§YВ национальных фокусных деревьях $JAP_work_style_reform$, $JAP_basic_policy_declining_birthrate_society$ и $JAP_save_ice_age_generation$ повышение значения модификатора §G$JAP_declining_birthrate_measures_modifier$§! может ослабить или убрать эффекты национального духа низкой рождаемости!§!\n\n§YИзменения в национальном духе низкой рождаемости проверяются событием-опросом, проводимым один раз каждые §24 года§!! Если $JAP_declining_birthrate_measures_modifier$ находится на определённом уровне или выше, национальный дух будет §Gулучшаться§!, но если он ниже определённого уровня, он может §Rухудшиться§! вместо этого!§!\n\n§YТекущий прогресс мер против снижения рождаемости:§! [?ROOT.modifier@JAP_declining_birthrate_measures_modifier|0]\n\n§YЦель текущего уровня:§! 7\n\n§YЦель улучшения:§! 14"
 JAP_territorial_disputes: "[JAP.GetNameWithFlag] – территориальные споры"
 JAP_territorial_disputes_desc: "[JAP.GetName] в настоящий момент участвует в территориальных спорах с соседними странами по следующим трём регионам:\n\n§YСеверные территории (Южные Курилы)§!: [JAP.GetName] претендует на острова Эторофу, Кунашир, Шикотан и группу Хабомаи, расположенные к северо-востоку от Хоккайдо, утверждая, что их оккупация Советским Союзом после Второй мировой войны была нелегитимной, и продолжает добиваться их возвращения от [SOV.GetName]. [SOV.GetName], с другой стороны, заявляет суверенитет над островами и сохраняет фактический контроль.\n\n§YTakeshima ([KOR.GetAdjective] название: Докдо)§!: Расположенный в море [JAP.GetName] (Восточное море), этот остров заявлен [JAP.GetName], но находится под фактическим контролем [KOR.GetName] с 1950-х годов. Спор остаётся крайне чувствительным вопросом между двумя странами, включая исторические интерпретации и рыбные права.\n§YПоскольку Такаяшима слишком мала, чтобы отображаться на карте, даже успешные переговоры не приведут к территориальным приобретениям. Однако вы всё равно сможете получить указанные ниже модификаторы!§!\n\n§YОстрова Сэнкаку (китайское название: Дяоюйдуй)§!: Эта группа необитаемых островков в Восточно-Китайском море находится под фактическим контролем [JAP.GetName] с 1895 года, но также претендуется [CHI.GetName] и [TAI.GetName]. С 1990-х годов повторяющиеся дипломатические протесты и конкурирующие притязания сделали этот вопрос потенциальным очагом будущей напряжённости.\n\nВсе эти споры глубоко переплетены с историей, международным правом, фактическим контролем, дипломатическими отношениями и общественным мнением внутри страны. Их разрешение требует налаживания более тесных связей и взаимопонимания с вовлечёнными странами.\n\n§YПодсказка: повышение мнения целевой страны или укрепление вашего влияния над ней сделает переговоры более вероятными!§!\n\n§YНаграда: если переговоры увенчаются успехом, вы можете получить модификаторы к §G$MODIFIER_STABILITY_FACTOR$§! и §G$agriculture_district_income_tax_modifier$§!!"
 JAP_territorial_disputes_TT: "Если переговоры увенчаются успехом, помимо разрешения территориального вопроса, вы можете получить бонусы к §G$MODIFIER_STABILITY_FACTOR$§! и §G$agriculture_district_income_tax_modifier$§!!"
 JAP_dec_negotiations_resolve_northern_territories_dispute: "Переговоры по Северным территориям"
 JAP_dec_negotiations_resolve_northern_territories_dispute_desc: "Вопрос о Северных территориях остаётся одним из наиболее значимых нерешённых вопросов в послевоенной дипломатии [JAP.GetName]-[SOV.GetName]. Принятие этого вопроса напрямую и поиск мирного решения критически важны для восстановления суверенитета [JAP.GetName] и обеспечения стабильности на Дальнем Востоке. Если будет установлено достаточное взаимное доверие и условия для переговоров, мы сможем начать формальные дипломатические переговоры с [SOV.GetName] о возвращении территорий."
 JAP_dec_negotiations_resolve_senkaku_dispute_china: "Переговоры по спору о Сэнкаку с [CHI.GetName]"
 JAP_dec_negotiations_resolve_senkaku_dispute_china_desc: "Территориальные притязания [CHI.GetName] на острова Сэнкаку стали дестабилизирующим фактором в отношениях [JAP.GetName]-[CHI.GetName]. Как сторона, осуществляющая фактический контроль над островами, [JAP.GetName] стремится решить этот вопрос дипломатически, убедив [CHI.GetName] отказаться от претензий. При наличии необходимого взаимного доверия и международного влияния мы теперь готовы начать прямые переговоры с [CHI.GetName]."
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan: "Переговоры по спору о Сэнкаку с [TAI.GetName]"
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan_desc: "Территориальные претензии [TAI.GetName] на острова Сэнкаку стали потенциальным препятствием для взаимного доверия и сотрудничества между [JAP.GetName] и [TAI.GetName]. Чтобы получить дипломатическое признание фактического контроля [JAP.GetName] над островами, мы теперь готовы вступить в мирные переговоры с [TAI.GetAdjective] властями."
 JAP_dec_negotiations_resolve_takeshima_dispute: "Переговоры по спору о Такаяшиме"
 JAP_dec_negotiations_resolve_takeshima_dispute_desc: "Территориальный спор с [KOR.GetName] по поводу Такаяшимы долгое время был серьёзным препятствием в отношениях [JAP.GetName]-[KOR.GetName]. Наша нация готова формально предложить территориальные переговоры [KOR.GetAdjective] правительству, стремясь разрешить его путём спокойной и искренней дипломатии."
 JAP_base_okinawa_decision: "Будущее войск США на Окинаве"
 JAP_base_okinawa_decision_desc: "Окинава остаётся домом для значительного числа военных баз США, что влияет как на систему безопасности Японии, так и на местные сообщества.\nЯпонское правительство сейчас изучает способы пересмотра текущей договорённости в стремлении к большей автономии в области безопасности и снижению регионального бремени.\nЧерез дипломатические контакты может быть найден новый баланс в американо-японских отношениях безопасности.\n\nПодсказка: §Yвлияние [JAP.GetName] на [USA.GetName]§! и §Yвлияние [USA.GetName] на [JAP.GetName]§! влияют на шанс успеха переговоров. Кроме того, вы можете повысить вероятность успеха, §Yразрешив вопрос о балансе сил по Статье 9§! или §Yповысив военные расходы до как минимум $defence_04$§!!"
 JAP_negotiation_base_okinawa: "Начать переговоры о выводе войск США из Окинавы"
 JAP_negotiation_base_okinawa_desc: "Чтобы усилить национальную автономию в области безопасности, Япония начнёт дипломатические переговоры о выводе военнослужащих США, дислоцированных на Окинаве. Этот шаг направлен на пересмотр текущих соглашений о безопасности и изучение более адаптивной схемы в свете меняющейся региональной динамики."
 Japan.101.t: "Ликвидация почтовой службы: проверка нашего мандата на практике"
 Japan.101.d: "Дебаты о приватизации почтовой службы столкнулись с сильным сопротивлением в Диете, и обсуждения становятся всё более напряжёнными. Даже внутри партии сохраняются осторожные и противоположные голоса: одни считают, что следует действовать через корректировки и поправки, другие настаивают, что сейчас время прояснить вопрос и обратиться к суждению общества.\nЕсли мы распустим Палату представителей и проведём всеобщие выборы, мы поставим реформу на прямую проверку. В то же время политический календарь быстро сместится в сторону выборов, и повышенная политическая напряжённость станет неизбежной.\n\nСтоит ли нам приступить к роспуску и общему голосованию?"
 Japan.101.a: "Распустить Палату представителей."
 Japan.101.b: "Не распускать."
 Japan.103.t: "Рост левых сил"
 Japan.103.d: "На фоне экономического застоя, нестабильности занятости и растущей обеспокоенности социальной защитой интерес к левым силам, призывающим к расширению перераспределения и поддержке средств к существованию, быстро растёт. Как вместилище недовольства устоявшейся политикой, поддержка распространяется по разным регионам, и опросы общественного мнения также начали показывать заметный рост левых партий. В предстоящей политической ситуации присутствие левых, вероятно, станет невозможно игнорировать."
 Japan.103.a: "Поток на помощь либеральным силам"
 Japan.103.b: "Рост социал-демократических сил"
 Japan.103.c: "Расширение присутствия коммунистических сил"
 Japan.103.e: "Быстрый рост левых популистских сил"
 Japan.104.t: "Рост правых сил"
 Japan.104.d: "На фоне растущей тревоги по поводу ситуации в области безопасности и растущего недоверия к политике поддержка распространится на правые силы, призывающие к поддержанию порядка, национальной самодостаточности и акценту на традиционных ценностях. Эти позиции привлекают интерес широкой аудитории избирателей, и опросы общественного мнения также начали показывать заметный рост правых партий. В предстоящей политической ситуации присутствие правых может усилиться ещё больше."
 Japan.104.a: "Расширенная поддержка консервативных сил"
 Japan.104.b: "Рост социал-демократических сил"
 Japan.104.c: "Рост реформаторско-консервативных сил"
 Japan.104.e: "Расширенная поддержка сил, ориентированных на реставрацию"
 JAP_diplomacy.01.t: "Начало переговоров по выводу войск США из Окинавы"
 JAP_diplomacy.01.d: "Десятилетиями присутствие войск США в Японии было краеугольным камнем послевоенной системы безопасности и региональной стабильности. Однако с учётом меняющихся геополитических условий, сдвигов общественного мнения и растущего интереса Японии к усилению собственных оборонных возможностей правительство решило, что необходимо пересмотреть военное присутствие США на Окинаве. Как первый шаг теперь начнутся формальные переговоры с Соединёнными Штатами."
 JAP_diplomacy.01.a: "Начать дипломатические переговоры"
 JAP_diplomacy.02.t: "Японский запрос на переговоры по выводу войск"
 JAP_diplomacy.02.d: "Японское правительство направило формальный запрос на вступление в переговоры о выводе войск США, дислоцированных на Окинаве. Предложение носит не антагонистический характер, а скорее представлено как часть более широкой переоценки оборонной позиции Японии и меняющихся потребностей безопасности. Соединённым Штатам теперь предстоит решить, как ответить, балансируя между целостностью альянса и долгосрочными стратегическими интересами в регионе."
 JAP_diplomacy.02.a: "Принять запрос"
 JAP_diplomacy.02.b: "Отклонить запрос"
 JAP_diplomacy.03.t: "Достигнуто соглашение: войска США выводятся"
 JAP_diplomacy.03.d: "После серии дипломатических обсуждений Япония и Соединённые Штаты достигли соглашения о выводе войск из Окинавы. Это знаменует ключевой момент в эволюции оборонной политики Японии и подчёркивает её стремление взять на себя большую ответственность за собственную безопасность. Хотя это означает конец существующей схемы, это также предоставляет возможность переосмысления американо-японских отношений в сфере безопасности и изучения новых форм сотрудничества в будущем."
 JAP_diplomacy.03.a: "Начинается новая глава в политике безопасности"
 JAP_diplomacy.04.t: "Переговоры провалены: вывод отклонён"
 JAP_diplomacy.04.d: "Правительство США отвергло запрос Японии на вывод войск из Окинавы. В результате действующее соглашение останется в силе. Этот исход может вызвать смешанную реакцию внутри Японии и потенциально усилить дебаты о её автономии в оборонных вопросах. Японскому правительству теперь необходимо переосмыслить свой подход, продолжая следить за общей региональной и внутренней ситуацией."
 JAP_diplomacy.04.a: "Время обдумать следующий шаг"
 JAP_diplomacy.05.t: "К будущему через единое наследие"
 JAP_diplomacy.05.d: "Японское правительство решило предложить создание трёхсторонней интеллектуальной платформы под эгидой ООН, направленной на совместное сохранение памяти и уроков прошлых войн и передачу культуры мира будущим поколениям. Проект будет включать музеи и цифровые архивы, при этом все расходы возьмёт на себя Япония. Предложение будет официально передано Китаю и Южной Корее дипломатическими каналами."
 JAP_diplomacy.05.a: "Отправить предложение"
 JAP_diplomacy.06.t: "Японское предложение: разделить память и будущее"
 JAP_diplomacy.06.d: "Японское правительство предложило под эгидой ООН создать трёхстороннюю интеллектуальную платформу с Китаем и Южной Кореей для сохранения памяти и уроков войны для будущих поколений. Инициатива включает строительство музеев и цифровых архивов, при этом все расходы возьмёт на себя Япония. Выберем ли мы сотрудничество, устремлённое в будущее, или продолжим жить в недоверии? Наше решение определит будущее памяти в Восточной Азии."
 JAP_diplomacy.06.a: "Принять предложение"
 JAP_diplomacy.06.b: "Отклонить предложение"
 JAP_diplomacy.08.t: "Трёхсторонняя интеллектуальная платформа запущена"
 JAP_diplomacy.08.d: "Китай и Южная Корея приняли предложение. Под эгидой ООН трёхсторонняя интеллектуальная платформа была официально запущена. Через совместные музеи и архивы память и уроки войны теперь будут передаваться будущим поколениям. Это может стать значимым шагом на пути к примирению и взаимопониманию."
 JAP_diplomacy.08.a: "Новый шаг к будущему"
 JAP_diplomacy.09.t: "Предложение отклонено"
 JAP_diplomacy.09.d: "К сожалению, наше предложенное интеллектуальное пространство было отклонено. Очевидно, что примирению требуется больше времени и постоянные усилия по наращиванию доверия."
 JAP_diplomacy.09.a: "Нам нужно дождаться другой возможности"
 JAP_news.01.t: "Заявление [JAP.GetLeader]: признание истории"
 JAP_news.01.d: "Сегодня японское правительство опубликовало официальное заявление премьер-министра [JAP.GetLeader], выразив глубокое сожаление и искренние извинения за прошлое колониальное господство и военные действия Японии. В заявлении подчёркнута искренняя приверженность выстраиванию перспективных дипломатических отношений и ответственному сохранению памяти истории. Речь привлекла значительное внимание как внутри страны, так и за рубежом, и, как ожидается, повлияет на будущую дипломатию в Восточной Азии."
 JAP_news.01.a: "Наша ответственность за будущее."
 JAP_news.01.b: "Будем внимательно следить за развитием событий."
 JAP_diplomacy.34.t: "Предложение расширить валютные свопы"
 JAP_diplomacy.34.a: "Принять"
 JAP_diplomacy.34.b: "Отказать на данный момент"
 JAP_diplomacy_34_TT: "§YЕсли предложение принято, страны АСЕАН получат модификатор стабильности, а мы получим §Gмодификатор благоприятного мнения§! от стран АСЕАН!§!"
 JAP_diplomacy.35.t: "Достигнуто соглашение о расширении своповой схемы"
 JAP_diplomacy.35.d: "[FROM.GetName] согласилась с предложением Японии о расширении соглашения о валютных свопах. Это еще больше укрепляет «страховочную сеть» ликвидности в кризисные времена, повышая доверие к рынку и эффективность регионального сотрудничества. Это соглашение также является явным шагом к укреплению доверия к Японии в рамках АСЕАН."
 JAP_diplomacy.35.a: "Хорошо."
 JAP_diplomacy.36.t: "Предложение отклонено"
 JAP_diplomacy.36.d: "[FROM.GetName] указала, что отклонит предложение Японии расширить валютную своп-схему. Это отражает предпочтение уделить внимание уточнению условий соглашения и процедур его функционирования, и не является критикой самого предложения. Японии следует учитывать обстоятельства другой страны, продолжая поддерживать каналы для диалога."
 JAP_diplomacy.36.a: "Понятно."
 JAP_diplomacy.37.t: "Предложение инвестировать в ключевую инфраструктуру"
 JAP_diplomacy.37.d: "Чтобы повысить региональную связанность и экономический рост, японское правительство предложило масштабные инвестиции ОДА в нашу страну с фокусом на ключевой инфраструктуре, такой как транспортные сети, порты и энергетика. Улучшение дорог, портов и электросетей укрепит основы логистики и промышленности, напрямую поддерживая рост нашей страны. Принятие предложения также увеличит влияние Японии в рамках АСЕАН.\n\nСтоит ли принять это предложение и ускорить развитие инфраструктуры?"
 JAP_diplomacy.37.a: "Принять"
 JAP_diplomacy.37.b: "Отклонить"
 JAP_diplomacy_37_TT: "§YЕсли предложение принято, страны АСЕАН получат модификатор скорости строительства инфраструктуры, а в обмен на вклад §R3.5B§! на страну мы получим §Gвлияние§! в странах АСЕАН!§!"
 JAP_diplomacy.38.t: "Предложение об инвестировании принято"
 JAP_diplomacy.38.d: "[FROM.GetName] приняла предложение Японии об инвестициях ОДА в ключевую инфраструктуру. Продвижение улучшений транспортных сетей, портов и энергетической инфраструктуры повысит региональную связанность и экономический рост, одновременно укрепив наше присутствие. Это соглашение ещё больше укрепит влияние Японии в АСЕАН."
 JAP_diplomacy.38.a: "Хорошо."
 JAP_diplomacy.39.t: "Предложение отклонено"
 JAP_diplomacy.39.d: "[FROM.GetName] указала, что отклонит предложение Японии по инвестициям ОДА в ключевую инфраструктуру. Другая страна, по-видимому, отдаёт приоритет своим внутренним планам и институциональной подготовке, но это не означает, что она отвергает само предложение. Японии следует учитывать обстоятельства другой стороны и оставить пространство для будущего сотрудничества."
 JAP_diplomacy.39.a: "Понятно."
 JAP_diplomacy.40.t: "Предложение о сотрудничестве в области человеческого капитала и исследований"
 JAP_diplomacy.40.a: "Принять"
 JAP_diplomacy.40.b: "Отклонить"
 JAP_diplomacy_40_TT: "§YЕсли предложение принято, страны АСЕАН получат модификаторы к скорости исследований и росту производительности, а мы получим §Gвлияние§! в странах АСЕАН!§!"
 JAP_diplomacy.41.t: "Предложение о сотрудничестве принято"
 JAP_diplomacy.41.a: "Хорошо."
 JAP_diplomacy.42.t: "Предложение отклонено"
 JAP_diplomacy.42.a: "Понятно."
 JAP_diplomacy.43.t: "Запрос о присоединении к морской системе безопасности Японии"
 JAP_diplomacy.43.d: "Японское правительство представило план запуска нейтральной и мирной морской системы безопасности, направленной на снижение напряжённости в Южно-Китайском море и защиту свободы судоходства, и обратилось к нашей стране с предложением присоединиться к ней. Сотрудничество в обмене информацией, морском поиске и спасении, борьбе с пиратством и совместных учениях поспособствует региональной стабильности и улучшит способности по управлению кризисами. Принятие предложения также увеличит влияние Японии в АСЕАН.\n\nСтоит ли принять это предложение и сотрудничать в рамках японской системы?"
 JAP_diplomacy.43.a: "Принять"
 JAP_diplomacy.43.b: "Отклонить"
 JAP_diplomacy_43_TT: "§YЕсли предложение принято, страны АСЕАН получат модификатор стабильности, а мы получим §Gвлияние§! в странах АСЕАН!§!"
 JAP_diplomacy.44.t: "Соглашение о присоединении к системе"
 JAP_diplomacy.44.d: "[FROM.GetName] согласилась присоединиться к предложенной Японией нейтральной и мирной морской системе безопасности. По мере продвижения сотрудничества в обмене информацией, морском поиске и спасении, борьбе с пиратством и совместных учениях можно ожидать ощутимого прогресса в региональной стабильности и защите свободы судоходства. Это соглашение укрепит доверие и влияние Японии в АСЕАН."
 JAP_diplomacy.44.a: "Хорошо."
 JAP_diplomacy.45.t: "Предложение о участии отклонено"
 JAP_diplomacy.45.d: "[FROM.GetName] указала, что она отклонит участие в предложенной Японией нейтральной и мирной морской системе безопасности. Похоже, другая страна отдаёт приоритет региональной ситуации и внутренним приоритетам, но это не означает, что она отвергает сами принципы сотрудничества. Японии следует сохранить нейтральную позицию, не обостряя напряжённость, и оставить пространство для диалога и сотрудничества."
 JAP_diplomacy.45.a: "Понятно."
 JAP_diplomacy.46.t: "Запуск совместной образовательной программы Японии и США"
 JAP_diplomacy.46.d: "Японское правительство предложило расширить совместные образовательные программы и студенческие обмены, чтобы углубить взаимопонимание и воспитать следующее поколение. Создавая рамки, в которых обе страны могут учиться друг у друга — дисциплина Японии и предпринимательский дух США — цель состоит в том, чтобы вырастить новое поколение лидеров с международным кругозором. Эта инициатива усилит связи между людьми и ещё больше укрепит доверие в альянсе."
 JAP_diplomacy.46.a: "Инвестиция в будущее."
 JAP_diplomacy_46_TT: "§YСША получат модификатор стабильности!§!"
 JAP_diplomacy.47.t: "Японо-американский обмен технологиями и культурой"
 JAP_diplomacy.47.d: "Японское правительство предложило расширить технологический и культурный обмен, связав японские университетские лаборатории, студии и корпоративные сети с партнёрами в Силиконовой долине, Сиэтле и Лос-Анджелесе. Инженеры, дизайнеры и творцы будут ездить туда и обратно для совместных проектов, стремясь сочетать американский опыт в операциях платформ с японскими сильными сторонами в аппаратном обеспечении, играх и анимации. Если культурная близость и научное сотрудничество продвинутся параллельно, это укрепит как социальную стабильность, так и импульс для инноваций."
 JAP_diplomacy.47.a: "Максимизировать синергию."
 JAP_diplomacy.48.t: "Японо-американское сотрудничество в области технологий двойного назначения"
 JAP_diplomacy.48.d: "Японское правительство предложило ещё больше укрепить сотрудничество США и Японии в областях технологий двойного назначения, которые могут применяться как в гражданских, так и в военных целях. Опираясь на взаимодействие промышленности и академии, план направлен на продвижение совместных исследований, обмен опытом и содействие обмену персоналом, ускоряя НИОКР и стимулируя общее технологическое развитие. Если это партнёрство укоренится, ожидается повышение будущей конкурентоспособности как в гражданском, так и в военном секторе."
 JAP_diplomacy.48.a: "Продвинуть совместные исследования."
 JAP_diplomacy_48_TT: "§YСША также получат модификатор скорости исследований!§!"
 JAP_diplomacy.49.t: "Платформа знаний по готовности к бедствиям Японии и Тайваня"
 JAP_diplomacy.49.a: "Укрепим нашу устойчивость."
 JAP_diplomacy_49_TT: "§Y[TAI.GetName] также получит те же модификаторы!§!"
 JAP_diplomacy.50.t: "Усиление высокотехнологического партнёрства Японии и Тайваня"
 JAP_diplomacy.50.a: "Ускорим совместные исследования."
 JAP_diplomacy.51.t: "Расширение программ обучения в Японии"
 JAP_diplomacy.51.d: "Японское правительство предложило расширить квоты стипендий и приёмные места, чтобы увеличить возможности для тайваньских студентов обучаться в японских университетах. Эта инициатива направлена не только на углубление академических и культурных связей, но и на подготовку будущих кадров, которые могут связать наши два общества. По мере расширения обменов основа для следующего поколения, которое будет развивать отношения Японии и Тайваня, станет ещё крепче."
 JAP_diplomacy.51.a: "Инвестиция в следующее поколение."
 JAP_diplomacy.52.t: "Предложение о поддержке реформы торговой системы"
 JAP_diplomacy.52.d: "Японское правительство предложило техническое и институциональное сотрудничество для поддержки реформы и модернизации торговой системы Китая. Упрощая таможенные процедуры, цифровизируя административные операции и разрабатывая правила в соответствии с международными стандартами, цель — облегчить торговлю и повысить предсказуемость для бизнеса. Если эти реформы продвинутся, процедурная нагрузка на импорт и экспорт снизится, что уменьшит трение в экономической деятельности. Принятие этого предложения также увеличит влияние Японии в Китае.\n\nСтоит ли принять поддержку Японии и продвигать международную гармонизацию нашей торговой системы?"
 JAP_diplomacy.52.a: "Принять"
 JAP_diplomacy.52.b: "Отклонить"
 JAP_diplomacy_52_TT: "§YЕсли предложение принято, Китай получит модификатор снижения налоговой нагрузки, а мы получим §Gвлияние§! в Китае!§!"
 JAP_diplomacy.53.t: "Предложение о сотрудничестве принято"
 JAP_diplomacy.53.d: "[FROM.GetName] принял предложение Японии о технической и институциональной поддержке в реформировании и модернизации своей торговой системы. По мере упрощения таможенных процедур и совершенствования административных операций будут увеличиваться торговое содействие и предсказуемость для бизнеса, а также улучшится среда для выхода японских компаний на рынок. Это соглашение постепенно укрепит влияние Японии в Китае."
 JAP_diplomacy.53.a: "Хорошо."
 JAP_diplomacy.54.t: "Предложение отклонено"
 JAP_diplomacy.54.d: "[FROM.GetName] указал, что отклонит предложение Японии о предоставлении технической и институциональной поддержки для реформирования и модернизации своей торговой системы. Другая сторона, по-видимому, отдаёт приоритет своим политическим приоритетам и внутренней координации, но это не означает, что она отвергает саму необходимость реформ. Японии следует учитывать обстоятельства другой страны, оставляя место для диалога и сотрудничества."
 JAP_diplomacy.54.a: "Понятно."
 JAP_diplomacy.55.t: "Расширение инвестиционного сотрудничества Японии и Китая"
 JAP_diplomacy.55.d: "Японское правительство выразило намерение продвигать институциональную координацию и рамки сотрудничества для стимулирования взаимных инвестиций и выхода японских и китайских компаний на рынки друг друга. Если поток взаимных вложений ускорится, производственные сети могут быть оптимизированы и цепочки поставок сделаны более эффективными, что ожидается повысит общую промышленную продуктивность. Углубление экономической взаимозависимости также несёт риски, но оно одновременно может послужить практическим фактором стабилизации, снижая трение."
 JAP_diplomacy.55.a: "Откроем рынок и повысим эффективность."
 JAP_diplomacy_55_TT: "§YКитай также получит те же модификаторы!§!"
 JAP_diplomacy.56.a: "Углубим культурную солидарность."
 JAP_diplomacy.57.t: "Японо-китайский проект по сохранению буддийских храмов"
 JAP_diplomacy.57.d: "Японское правительство предложило совместный японско-китайский проект по сохранению буддийских храмов как общего культурного наследия путём совместных работ по консервации и реставрации. Обмениваясь методиками реставрации и методами обследования и создавая кооперативную структуру защиты культурных ценностей, цель — подтвердить ценность храмов и связанных культурных активов и обеспечить их долгосрочное сохранение. Если результаты этих работ станут заметны, привлекательность культурного туризма возрастёт, и ожидаются положительные побочные эффекты для местной экономики. Это сотрудничество также может стать возможностью подтвердить исторические связи между нашими двумя странами."
 JAP_diplomacy.57.a: "Защитим наше наследие и продвинем туризм."
 JAP_diplomacy.58.t: "Токио-Сеул Акцелератор"
 JAP_diplomacy.58.d: "Японское правительство предложило создать совместную программу акселератора в Токио и Сеуле, институционализируя поддержку стартапов в обеих странах. Через помощь с привлечением средств, наставничество, сотрудничество с компаниями и университетами, а также обмен талантами между двумя городами цель — повысить вероятность успеха стартапов и укрепить технологическое сотрудничество. Если эта структура будет работать как задумано, инновации между городами ускорятся, а экономическое сотрудничество Японии и Кореи укрепится более практичным, ориентированным на результат способом."
 JAP_diplomacy.58.a: "Ускорим стартап-импульс."
 JAP_diplomacy_58_TT: "§YЮжная Корея также получит те же модификаторы!§!"
 JAP_diplomacy.59.t: "Расширение регионального сотрудничества Японии и Кореи"
 JAP_diplomacy.59.a: "Дадим рост регионам."
 JAP_diplomacy.60.t: "Предложение по культурному обмену Япония — Корея"
 JAP_diplomacy.60.d: "Японское правительство предложило системно расширить культурный обмен между Японией и Южной Кореей. Через средства массовой информации, искусство, спорт, туризм и образовательные обмены цель — углубить взаимопонимание наших народов и сократить социальную дистанцию. Если обмены расширятся, они также повлияют на общественные настроения и внешнее отношение, и обе страны получат среду, в которой смогут эффективнее говорить в рамках внутренней политики друг друга.\n\nПринять ли это предложение и продвигать культурный обмен?"
 JAP_diplomacy.60.a: "Принять"
 JAP_diplomacy.60.b: "Отклонить"
 JAP_diplomacy_60_TT: "§YЕсли предложение принято, мы получим §Gвлияние§! в Корее, но Корея тоже получит §Rвлияние§! в Японии.§!"
 JAP_diplomacy_60_TT2: "§YКультурный обмен позволит нам усилить влияние в Японии, но влияние Японии внутри страны тоже возрастёт.§!"
 JAP_diplomacy.61.t: "Предложение принято"
 JAP_diplomacy.61.d: "[FROM.GetName] согласилась с предложением Японии расширить культурный обмен. По мере расширения обменов в СМИ, искусстве, спорте, туризме и образовании взаимопонимание будет углубляться, и в обеих странах могут последовать изменения общественных настроений. Через это соглашение Япония получит более сильный голос в Корее, а Корея также укрепит своё влияние в Японии."
 JAP_diplomacy.61.a: "Хорошо."
 JAP_diplomacy.62.t: "Предложение отклонено"
 JAP_diplomacy.62.d: "[FROM.GetName] указала, что отклонит предложение Японии расширить культурный обмен. Другая сторона, похоже, отдаёт приоритет учёту общественного мнения и внутренним обстоятельствам, но это не означает, что она отвергает сам культурный обмен. Японии следует сохранить каналы для диалога, оставляя пространство для продвижения взаимопонимания другими способами."
 JAP_diplomacy.62.a: "Понятно."
 JAP_diplomacy.63.t: "Японо-корейская рабочая группа по стареющему обществу"
 JAP_diplomacy.63.d: "Японское правительство предложило создать совместную рабочую группу экспертов и профильных учреждений из Японии и Южной Кореи для решения общей проблемы стареющего общества с ежемесячными консультациями по выработке совместных политик. Обмениваясь опытом по укреплению систем ухода за пожилыми, здравоохранения, поддержки занятости и проектирования общественного благополучия, цель — повысить скорость и эффективность политических мер. Если эта структура укоренится, это будет способствовать усилению социальных гарантий и долгосрочной социальной стабильности."
 JAP_diplomacy.63.a: "Движемся вперёд вместе."
 JAP_diplomacy_63_TT: "§YЮжная Корея получит модификатор роста населения.§!"
 JAP_diplomacy.64.t: "Сотрудничество в развитии холодных регионов"
 JAP_diplomacy.64.d: "Правительство Японии предложило «Инициативу для Дальнего Востока» для поддержки развития регионов с холодным климатом на российском Дальнем Востоке, опираясь на опыт Хоккайдо в возрождении таких регионов посредством инвестиций в инфраструктуру и привлечения иностранного капитала. Цель инициативы – стимулирование региональной экономической активности и повышение эффективности развития за счет фундаментальных улучшений в транспорте, логистике и энергетике. Инициатива направлена ​​на развитие инфраструктуры в Саха и Камчатке."
 JAP_diplomacy.64.a: "Укрепим основы Дальнего Востока."
 JAP_diplomacy.65.t: "Сахалин II"
 JAP_diplomacy.65.d: "Японское правительство заявило о намерении усилить иностранные инвестиции в энергетический проект «Сахалин II» при сотрудничестве с Россией, чтобы обеспечить стабильный доступ к ископаемым видам топлива. Если инвестиции и стабилизация операций продвинутся, непрерывность разработки улучшится, и можно ожидать расширения производственных мощностей. Сахалин останется важным узлом поставок и, вероятно, принесёт положительные эффекты региональной экономике."
 JAP_diplomacy.65.a: "Расширим производственные мощности."
 JAP_diplomacy.66.t: "Запуск сотрудничества по евразийской транспортной сети"
 JAP_diplomacy.66.d: "Японское правительство заявило о намерении продвинуть сотрудничество Японии и России для развития сухопутного логистического коридора, связывающего Японию и Европу через Россию. Используя железные дороги и магистрали, цель — сократить время перевозок и обеспечить стабильный доступ к европейским рынкам, а также ускорить модернизацию инфраструктуры вдоль коридора. Если грузопоток начнёт действовать на практике, Россия усилит своё значение евразийского узла, а экономическая связность углубится."
 JAP_diplomacy.66.a: "Ускорим развитие коридора."
 JAP_diplomacy_66_TT: "§YРоссия получит модификатор скорости строительства инфраструктуры!§!"
 JAP_diplomacy.67.t: "Запуск сотрудничества Японии и России в IT-инфраструктуре"
 JAP_diplomacy.67.d: "Правительство Японии представило инициативу «Российский цифровой коридор», в рамках которой совместно с японскими IT-компаниями ведется работа по развитию инфраструктуры в России, такой как центры обработки данных и волоконно-оптические сети. Цель состоит в модернизации внутренней коммуникационной инфраструктуры и укреплении роли России как центра в цифровой торговой сети, связывающей Европу, Центральную Азию и Россию. Если это сотрудничество будет налажено, улучшится стабильность информационных потоков и пропускная способность сетей, а также ускорится цифровизация экономической деятельности."
 JAP_diplomacy.67.a: "Расширим инфраструктуру связности."
 JAP_diplomacy_67_TT: "§YРоссия получит модификатор скорости строительства сетевой инфраструктуры!§!"
 JAP_historical.20110311.t: "Великое восточно-японское землетрясение"
 JAP_historical.20110311.d: "11 марта 2011 года в 14:46 сильнейшее землетрясение магнитудой 9.0 произошло у берегов Тохоку в Тихом океане. Сильнейший толчок, когда-либо зарегистрированный в Японии, сотряс обширные территории от Тохоку до Канто, а громадное цунами, последовавшее за ним, смыло прибрежные города и посёлки, оставив за собой катастрофические разрушения. Порты и рыбацкие поселения были уничтожены за мгновения, а дороги, железные дороги и аэропорты были разорваны, погрузив городские функции в хаос.\n\nСотни тысяч людей лишились жилья и искали убежище в пунктах эвакуации. Экономический ущерб колоссален: сельское хозяйство, рыболовство и промышленность, опора региональной экономики, получили сокрушительные разрушения. Одновременно задачи восстановления инфраструктуры, помощи переселенцам и восстановления отраслей и городов поставят административные возможности правительства на предельное испытание.\n\nНесмотря на эту беспрецедентную трагедию, японский народ показал стойкость и солидарность. Однако то, насколько быстро и эффективно правительство сможет отреагировать, определит стабильность и будущее нации."
 JAP_historical.20110311.a: "Мы должны мобилизовать все силы на спасение и восстановление."
 JAP_great_east_japan_earthquake_tree_tt: "§YОткрыто национальное дерево фокусов восстановления после Великого восточно-японского землетрясения!§!"
 JAP_news.02.t: "Беспрецедентное землетрясение поражает Японию"
 JAP_news.02.d: "11 марта 2011 года Японию поразило мощное землетрясение. Позднее известное как Великое восточно-японское землетрясение, это подводное землетрясение магнитудой 9.0 у побережья Тохоку вызвало катастрофические разрушения на широкой территории, приведя к десяткам тысяч погибших или пропавших без вести и нанеся неизмеримый экономический ущерб.\n\nПоследовавшее цунами смыло прибрежные города, порты и транспортные сети за считанные минуты, вынудив сотни тысяч людей эвакуироваться в укрытия. Японское общество теперь сталкивается со своим величайшим кризисом со времени послевоенной эпохи.\n\nВеликое восточно-японское землетрясение стало определяющим моментом, и весь мир наблюдает, как одна из ведущих экономик мира будет добиваться своего восстановления."
 JAP_news.02.a: "Ужасная трагедия..."
 Japan.201103111.t: "Объявление о завершении восстановления"
 Japan.201103111.d: "Прошли годы с момента великой катастрофы, завалы убраны, и города снова наполнены жизнью своих жителей. Жизни пострадавших постепенно стабилизировались, а отрасли и инфраструктура восстановлены. Сегодня правительство официально объявляет «Восстановление завершено», закрывая главу долгого периода лишений.\n\nХотя трагедия оставила глубокие шрамы, она также воспитывала стойкость и гордость, заложив основу для более светлого будущего."
 Japan.201103111.a: "Мы преодолели невзгоды!"
 Japan.201103112.t: "Прогресс в восстановлении инфраструктуры"
 Japan.201103112.d: "Часть инфраструктуры, уничтоженной катастрофой, теперь восстановлена. Транспорт и логистика постепенно возобновляются, принося небольшие, но значимые изменения в повседневную жизнь. Хотя полное восстановление ещё далеко, это ясный шаг вперёд."
 Japan.201103112.a: "Шаг вперёд."
 Japan.201103113.t: "Полное восстановление инфраструктуры"
 Japan.201103113.d: "Инфраструктура в Тохоку, разрушенная землетрясением, наконец достигла целевого уровня восстановления. Транспортные сети и логистические функции снова полностью работают, давая новый импульс местному обществу и экономике. Реконструкция достигла важной вехи."
 Japan.201103113.a: "Важная веха."
 Japan.201103114.t: "Прогресс в восстановлении инфраструктуры"
 Japan.201103114.d: "Часть инфраструктуры, уничтоженной катастрофой, теперь восстановлена. Транспорт и логистика постепенно возобновляются, принося небольшие, но значимые изменения в повседневную жизнь. Хотя полное восстановление ещё далеко, это ясный шаг вперёд."
 Japan.201103114.a: "Шаг вперёд."
 Japan.201103115.t: "Полное восстановление инфраструктуры"
 Japan.201103115.d: "Инфраструктура в Канто, разрушенная землетрясением, наконец достигла целевого уровня восстановления. Транспортные сети и логистические функции снова полностью работают, давая новый импульс местному обществу и экономике. Реконструкция достигла важной вехи."
 Japan.201103115.a: "Важная веха."
 Japan.201103116.t: "Телекоммуникации восстановлены"
 Japan.201103116.d: "Телекоммуникационная сеть в пострадавшем регионе наконец частично восстановлена. Связь для повседневной жизни и бизнеса улучшилась, принося новую надежду местной экономике и обществу."
 Japan.201103116.a: "Продолжим дальнейшее восстановление"
 Japan.201103117.t: "Телекоммуникации полностью восстановлены"
 Japan.201103117.d: "Телекоммуникационная инфраструктура в Тохоку, разрушенная землетрясением, наконец достигла целевого уровня восстановления. С основанием для повседневной жизни и промышленности обеспеченным путь восстановления достиг важной вехи."
 Japan.201103117.a: "Отметим это как шаг вперёд"
 Japan.201103118.t: "Телекоммуникации полностью восстановлены"
 Japan.201103118.d: "Телекоммуникационная инфраструктура в Канто, разрушенная землетрясением, наконец достигла целевого уровня восстановления. С основанием для повседневной жизни и промышленности обеспеченным путь восстановления достиг важной вехи."
 Japan.201103118.a: "Отметим это как шаг вперёд"
 Japan.201103119.t: "Возобновление местной промышленности"
 Japan.201103119.d: "Фабрики и предприятия в пострадавшем регионе возобновили работу. Хотя полное восстановление ещё далеко, возвращение рабочих мест и экономической активности даёт ощутимое ощущение прогресса."
 Japan.201103119.a: "Продолжить промышленное восстановление"
 Japan.2011031110.t: "Промышленная база полностью восстановлена"
 Japan.2011031110.d: "Промышленная база в Тохоку, разрушенная землетрясением, наконец достигла целевого уровня восстановления. С восстановленной занятостью и производственными мощностями путь реконструкции достиг важной вехи."
 Japan.2011031110.a: "Перейти к следующему этапу восстановления"
 Japan.2011031111.t: "Возобновление местной промышленности"
 Japan.2011031111.d: "Фабрики и предприятия в пострадавшем регионе возобновили работу. Хотя полное восстановление ещё далеко, возвращение рабочих мест и экономической активности даёт ощутимое ощущение прогресса."
 Japan.2011031111.a: "Продолжить промышленное восстановление"
 Japan.2011031112.t: "Промышленная база полностью восстановлена"
 Japan.2011031112.d: "Промышленная база в Канто, разрушенная землетрясением, наконец достигла целевого уровня восстановления. С восстановленной занятостью и производственными мощностями путь реконструкции достиг важной вехи."
 Japan.2011031112.a: "Перейти к следующему этапу восстановления"
 Japan.2011031150.t: "Авария на АЭС «Фукусима-1»"
 Japan.2011031150.d: "Японию поразило беспрецедентное землетрясение и цунами, и пока страна борется с последствиями, поступило ещё одно худшее сообщение. Цунами обрушилось на АЭС «Фукусима-1» в префектуре Фукусима, вызвав отказ аварийных генераторов, батарей и топливных баков и приведя к полной потере питания на объекте.\nКроме того, внутри зданий реакторов образовалось и накопилось большое количество водорода, что привело к взрывам в блоках 1, 3 и 4. Существуют опасения утечек радиоактивных материалов из повреждённых участков, и население впало в панику."
 Japan.2011031150.a: "Мы должны действовать немедленно!"
 JAP_news.03.t: "Авария на АЭС «Фукусима-1»"
 JAP_news.03.d: "После землетрясения и цунами в Японии поступило сообщение о серьёзной аварии на АЭС «Фукусима-1». Хотя реакторы остановились после толчка, цунами, как сообщается, вывело из строя аварийные генераторы и другое критически важное оборудование, что привело к полной потере питания. Охлаждение больше невозможно поддерживать, и в нескольких блоках произошли расплавы активной зоны.\nГенерация и накопление водорода также вызвали взрывы в зданиях реакторов, и высока вероятность выброса радиоактивных материалов в окружающую среду через повреждённые участки. Японское правительство старается справиться с ситуацией."
 JAP_news.03.a: "Какая ситуация..."
 Japan.2011031151.t: "Ядерная политика Японии на распутье"
 Japan.2011031151.d: "Прошел месяц после ядерной аварии, и японское правительство теперь вынуждено принять решение. Авария на «Фукусиме-1» поколебала общественное чувство ядерной безопасности до его основы. Общественное мнение разделено, деловое сообщество боится влияния на энергоснабжение, а граждане тревожатся о возможности радиационного выброса.\n\nЯпонии теперь нужно ясно определить, продолжит ли она полагаться на ядерную энергию или выберет другой путь."
 Japan.2011031151.a: "Запретить это, закрыть!"
 Japan.2011031151.b: "Нужно ввести строгие проверки."
 Japan.2011031151.c: "Продолжать как раньше!"
 Japan_Demographic.003.t: "Отчет об исследовании проблемы низкой рождаемости: динамика снижения рождаемости"
 Japan_Demographic.003.d: "Правительство продвигает меры поддержки рождаемости, но пока они не дают достаточного результата. Трудности совмещения воспитания детей и работы, а также тревога о будущем накладываются друг на друга, и улучшение демографических тенденций остаётся вялым.\n\nПри таком темпе искажения структуры населения углубятся, оставив долгосрочные нагрузки во многих сферах, включая обеспечение рабочей силы и поддержку социальной защиты. Меры по борьбе с низкой рождаемостью требуют пересмотра в более эффективной форме."
 Japan_Demographic.003.a: "Ситуация серьёзнее, чем ожидалось..."
 Japan_Demographic.004.t: "Отчет об исследовании проблемы низкой рождаемости: стагнация мер по борьбе с низкой рождаемостью"
 Japan_Demographic.004.d: "Хотя правительство продвигает поддержку семей и улучшение условий труда, явного улучшения демографических тенденций пока не наблюдается. В некоторых областях есть прогресс, например расширенное использование систем и улучшение поддержки, но проблемы нестабильной занятости и финансовой нагрузки домохозяйств остаются, и в целом ситуация остаётся ровной.\n\nЭтого недостаточно, чтобы остановить прогрессирование снижения рождаемости, но ситуация и не ухудшается. В дальнейшем потребуется продолжать реализацию существующих мер и проверять их эффективность."
 Japan_Demographic.004.a: "Продолжим меры."
 Japan_Demographic.005.t: "Отчет об исследовании проблемы низкой рождаемости: прогресс в мерах по ее решению"
 Japan_Demographic.005.d: "Поддержка семей, улучшение условий труда и меры по снижению расходов домохозяйств постепенно начинают давать результаты. Сами демографические тенденции резко не восстановились, но при расширенном использовании помощи семьям и улучшении среды для баланса работы и семьи прогрессирование снижения рождаемости начинает сдерживаться.\n\nТревога о будущем всё ещё остаётся, но ситуация немного улучшается. В дальнейшем важно продолжать эти меры и повышать эффективность систем."
 Japan_Demographic.005.a: "Сделаем так, чтобы эти признаки улучшения стали реальными."
 Japan_Demographic.006.t: "Отчет об исследовании проблемы низкой рождаемости: изменение тенденции к снижению рождаемости"
 Japan_Demographic.006.d: "Поддержка семей, улучшение условий труда и меры по снижению финансовой нагрузки на домохозяйства, непрерывно реализуемые в течение длительного времени, сложились в единое целое, и теперь в демографических трендах виден явный рост.\nПоскольку это подтверждается на протяжении нескольких лет, а не является временной флуктуацией, это показывает, что накопленные меры стабильно приносят результаты.\n\nЧувство кризиса вокруг низкой рождаемости значительно ослабло, и длительная тенденция ухудшения также берётся под контроль. Можно сказать, что правительственные меры достигли явных результатов по проблеме низкой рождаемости!"
 Japan_Demographic.006.a: "Мы наконец преодолели долгий застой!"
 JAP_territorial.01.t: "Начать переговоры по Северным территориям"
 JAP_territorial.01.d: "Территориальный спор по Северным территориям долгое время оставался нерешённым вопросом между [JAP.GetName] и [SOV.GetName] со времён окончания войны. Сейчас наша страна готова официально запросить переговоры с [SOV.GetName] для мирного урегулирования этого вопроса. Это не просто дипломатическая формальность, а важный шаг в утверждении нашего суверенитета и исторической правоты."
 JAP_territorial.01.oA: "Начнём!"
 JAP_territorial.02.t: "[JAP.GetName] запрашивает переговоры по Северным территориям"
 JAP_territorial.02.d: "Правительство [JAP.GetAdjective] направило официальный запрос об открытии переговоров по Северным территориям. Этот вопрос откладывался десятилетиями, и принятые решения повлияют как на наш международный авторитет, так и на внутреннюю политику. Будет ли компромисс означать утрату национальных интересов или приобретение международного доверия? Пришло время выбрать."
 JAP_territorial.02.oA: "Передать территорию [JAP.GetName]"
 JAP_territorial.02.oB: "Отказать. Здесь не может быть переговоров"
 JAP_territorial.03.t: "Согласие на возвращение Северных территорий"
 JAP_territorial.03.d: "Наконец-то давний вопрос Северных территорий решён. После переговоров с [SOV.GetName] достигнуто соглашение о возвращении спорных территорий. Это дипломатическая победа и историческое достижение в послевоенной истории [JAP.GetAdjective]."
 JAP_territorial.03.oA: "Историческое соглашение!"
 JAP_territorial.04.t: "Переговоры по Северным территориям зашли в тупик"
 JAP_territorial.04.d: "Правительство [SOV.GetAdjective] официально отвергло наше предложение о переговорах по возвращению Северных территорий. Несмотря на наши дипломатические усилия, соглашение не было достигнуто. Теперь нам нужно сосредоточиться на укреплении доверия и расширении влияния, чтобы подготовиться к возобновлению переговоров в будущем."
 JAP_territorial.04.oA: "В этот раз ещё слишком рано..."
 JAP_territorial.05.t: "Начать переговоры по Сэнкаку с [CHI.GetName]"
 JAP_territorial.05.d: "[JAP.GetName] в настоящее время фактически контролирует острова Сэнкаку, но [CHI.GetName] продолжает заявлять о своей суверенной претензии. Учитывая прошлые дипломатические усилия, настало время нашей стране официально вступить в переговоры с [CHI.GetAdjective] правительством в поисках мирного разрешения."
 JAP_territorial.05.oA: "Начнём!"
 JAP_territorial.06.t: "[JAP.GetName] предлагает территориальные переговоры"
 JAP_territorial.06.d: "Правительство [JAP.GetAdjective] попросило нас отказаться от нашей территориальной претензии на острова Сэнкаку. Они выступают за мирное урегулирование и региональную стабильность, и продвигают переговоры при поддержке дипломатического давления и международной поддержки. Принятие этого предложения наверняка вызовет как поддержку, так и сопротивление внутри страны и за рубежом."
 JAP_territorial.06.oA: "Откажемся от претензии и поставим стабильность региона выше."
 JAP_territorial.06.oB: "Сохраним претензию и защитим национальный суверенитет."
 JAP_territorial.07.t: "[CHI.GetName] отзывает претензию на Сэнкаку!"
 JAP_territorial.07.d: "[CHI.GetName] официально отозвало территориальную претензию на острова Сэнкаку. Долгие напряжённости в Восточно-Китайском море существенно уменьшились, и это воспринято как важная дипломатическая победа как внутри страны, так и за рубежом. Это важный первый шаг к региональной стабильности и укреплению доверия."
 JAP_territorial.07.oA: "Исторический прорыв."
 JAP_territorial.08.t: "[CHI.GetName] сохраняет претензию"
 JAP_territorial.08.d: "[CHI.GetName] объявило, что сохранит свою территориальную претензию на острова Сэнкаку. Переговоры завершились безуспешно, что подчеркнуло необходимость дальнейшего укрепления отношений и расширения международного влияния. Хотя диалог остаётся возможным, ситуация по-прежнему остаётся сложной."
 JAP_territorial.08.oA: "Возможно, пока слишком рано..."
 JAP_territorial.09.t: "Начать переговоры по Сэнкаку с [TAI.GetName]"
 JAP_territorial.09.d: "[TAI.GetName] давно заявляет о суверенитете над островами Сэнкаку на исторических и географических основаниях, в то время как [JAP.GetName] отстаивает легитимность своего фактического контроля. В попытке мирно разрешить этот давний вопрос мы представим официальное дипломатическое предложение [TAI.GetName]."
 JAP_territorial.09.oA: "Начнём!"
 JAP_territorial.10.t: "[JAP.GetName] предлагает территориальные переговоры"
 JAP_territorial.10.d: "Правительство [JAP.GetAdjective] попросило нас отказаться от претензии на острова Сэнкаку. Учитывая сложность отношений через пролив и более широкий международный контекст, для решения о принятии этого запроса потребуется осторожное взвешивание."
 JAP_territorial.10.oA: "Откажемся от претензии ради региональной стабильности."
 JAP_territorial.10.oB: "Мы должны продолжать отстаивать свой суверенитет."
 JAP_territorial.11.t: "[TAI.GetName] отзывает претензию на Сенкаку!"
 JAP_territorial.11.d: "Власти [TAI.GetAdjective] официально отозвали свою территориальную претензию на острова Сэнкаку. С разрешением одного из давних вопросов Восточно-Китайского моря отношения [JAP.GetName]-[TAI.GetName] входят в новую эпоху стабильности, вызывая надежду на более глубокое сотрудничество в будущем."
 JAP_territorial.11.oA: "Историческое соглашение."
 JAP_territorial.12.t: "[TAI.GetName] отказывается отзывать претензию"
 JAP_territorial.12.d: "[TAI.GetName] объявил, что сохранит свою территориальную претензию на острова Сэнкаку. Переговоры закончились неудачей, ясно показав, что для разрешения вопроса потребуется больше дипломатического влияния и сильное взаимное доверие."
 JAP_territorial.12.oA: "Может быть, пока слишком рано..."
 JAP_territorial.13.t: "Начать переговоры по Такэсиме с [KOR.GetName]"
 JAP_territorial.13.d: "Чтобы положить конец давнему территориальному спору по Такэсиме между [JAP.GetName] и [KOR.GetName], наше правительство предложило мирные переговоры с [KOR.GetName]. Вместо того чтобы навязывать нашу претензию в одностороннем порядке, этот шаг направлен на построение ориентированных на будущее отношений между двумя странами."
 JAP_territorial.13.oA: "Начнём!"
 JAP_territorial.14.t: "[JAP.GetName] предлагает переговоры о Докдо"
 JAP_territorial.14.d: "Правительство [JAP.GetAdjective] обратилось к нам для переговоров о суверенитете Докдо. Это крайне сложное решение с учётом общественного мнения и исторического контекста, но также важная дипломатическая оценка, которая может определить будущее отношений [JAP.GetName]-[KOR.GetName]."
 JAP_territorial.14.oA: "Приоритет улучшению отношений с [JAP.GetName] и принятие передачи."
 JAP_territorial.14.oB: "Мы не можем отказаться от нашей национальной территории."
 JAP_territorial.15.t: "[KOR.GetName] соглашается вернуть Такэсиму!"
 JAP_territorial.15.d: "В рамках усилий по улучшению отношений [JAP.GetName]-[KOR.GetName] правительство [KOR.GetAdjective] согласилось вернуть Такэсиму. Это означает конец многолетнего противостояния и открывает новую фазу доверия между двумя странами. Это момент, когда мирные дипломатические усилия принесли плоды."
 JAP_territorial.15.oA: "Историческое достижение."
 JAP_territorial.16.t: "[KOR.GetName] отклоняет переговоры по Такэсиме"
 JAP_territorial.16.d: "Правительство [KOR.GetAdjective] отклонило наш запрос о возвращении Такэсима. Решение территориального вопроса остаётся трудным, и без более сильного дипломатического влияния и взаимного доверия его будет трудно закрыть."
 JAP_territorial.16.oA: "Пока что мы должны продолжать диалог."
 JAP_renegotiation_territory: "Повторные переговоры будут возможны через год!"
 JAP_historical.20010426.t: "Йоширо Мори уходит в отставку, Дзюнитиро Коидзуми становится премьер-министром"
 JAP_historical.20010426.oA: "Реформа — немедленно!"
 JAP_historical.20060926.t: "Продолжение или преемственность?"
 JAP_historical.20060926.oA: "Дзюнитиро Коидзуми"
 JAP_historical.20060926.oB: "Синдзо Абэ"
 JAP_historical.20070926.t: "Сохранение или обновление?"
 JAP_historical.20070926.oA: "Синдзо Абэ"
 JAP_historical.20070926.oB: "Ясуо Фукуда"
 JAP_historical.20080924.t: "Тихий переход или смелый поворот?"
 JAP_historical.20080924.oA: "Ясуо Фукуда"
 JAP_historical.20080924.oB: "Таро Асо"
 Japan.01.t: "Подход традиционалистских сил"
 Japan.01.d: "По мере того как разгорается спор вокруг высказываний премьер-министра Мори, разные группы и комментаторы, утверждающие, что Императорский дом следует заново рассматривать как центр государственного порядка Японии, активизировали свою деятельность. Они обратились к правительству, заявив, что если оно яснее продемонстрирует готовность отстаивать традиции и национальный характер, они могут поддержать его, формируя общественное мнение и мобилизуя активистов снизу.\n\nОднако более тесные связи с такими силами грозят размыть границу между консервативной установкой истеблишмента и радикальным монархизмом, потенциально вызывая новую волну критики в адрес кабинета. Стоит ли воспользоваться этим предложением или держаться в стороне?"
 Japan.01.a: "Держаться в стороне."
 Japan.01.b: "Использовать их как политический рычаг."
 mdmosjap_japan.121006001.t: "2000 Тотторийское землетрясение"
 mdmosjap_japan.121006001.d: "Япония состоит из вулканических архипелагов, плавающих на Огненном кольце. Это означает, что японцы постоянно сталкиваются с мощными землетрясениями. Это не изменилось в прошлом тысячелетии и не изменится в следующем.\n\n13:30, 6 октября 2000 года — землетрясение магнитудой 7.3 и силой 6+ по шкале JMA произошло на западе префектуры Симане. Оно нанесло серьёзный ущерб дорогам и домам и вызвало толчки в отдалённых регионах, таких как Осака и Фукуока. Особенно сильно землетрясение ощущалось в Кобе — впервые со времени Великого землетрясения Хансин-Аважи 1995 года."
 mdmosjap_japan.disaster_help: "Помогите им сейчас!"
 mdmosjap_japan.disaster_leave: "Оставьте их. Они восстановятся сами."
 MDMOSJAP_add_debt_disaster1_TT: "§YЕщё §!§R$1 миллиард долгов§!§Y будет выпущен для восстановления после катастрофы.§!\n"
 MDMOSJAP_add_debt_disaster4_TT: "§YЕщё §!§R$4 миллиарда долгов§!§Y будет выпущено для восстановления после катастрофы.§!\n"
 mdmosjap_japan.130210001.t: "Катастрофа «Эхимэ-Мару»"
 mdmosjap_japan.130210001.d: "9 февраля 2001 года учебное судно «Эхимэ-Мару», принадлежащее рыболовному училищу, было сбито подводной лодкой США Greeneville. На борту «Эхимэ-Мару» находились 35 японских студентов и преподавателей; судно затонуло, 9 человек погибло.\n\nПока представители обоих правительств собирают информацию об этой трагедии, премьер-министр [Root.GetLeader] отдыхает, играя в гольф.\n\nКонечно, он должен немедленно прервать отпуск и вернуться в Токио, не так ли?"
 mdmosjap_japan.130210001.oA: "Вернуться в Токио сейчас!"
 mdmosjap_japan.130210001.oB: "Подождите! Ещё один удар..."
 JAP_koizumi_appear_TT: "Мори может наслаждаться раундом гольфа, но его политическое влияние, вероятно, значительно ослабнет. Партия может скоро начать искать §Yнового лидера.§!"
 mdmosjap_japan.130324001.t: "2001 Геёское землетрясение"
 mdmosjap_japan.130324001.d: "15:27, 24 марта 2001 года землетрясение магнитудой 6.7 и силой 6- по шкале JMA произошло на западе префектуры Хиросима. Двое человек погибли, 288 получили ранения. Город Курэ, ближайший к эпицентру, понёс наибольшие разрушения. С другой стороны, многие местные власти смогли уменьшить ущерб, поскольку их города приняли контрмеры после Великого землетрясения Хансин-Аважи 1995 года и землетрясения в Симане прошлого года. Основной ущерб был причинён разрушением водопроводных труб и обрушением поверхности склонов гор."
 mdmosjap_japan.9130901001.t: "Пожар в здании Кабукичо"
 mdmosjap_japan.9130901001.d: "Перед рассветом 1 сентября 2001 года здание \"Myojo 56 Building\" в Кабукичо, районе Синдзюку в Токио, загорелось, и пожар унёс жизни 44 человек, посетивших зал для игры в маджонг и стриптиз-клуб, отравившись угарным газом. По данным пожарной службы, сначала огонь был небольшим, но взорвался эффектом обратной тяги, когда сотрудник, заметивший возгорание, открыл дверь. В докладе также говорится, что пожарные сигнализации были закрыты потолком или отключены из-за неисправности, поэтому раннее тушение не состоялось. Имеются также сообщения, что персонал здания не направил посетителей к эвакуации. Тем временем столичная полиция совместно с пожарной службой обнаружила, что газовая труба была повреждена ненормально. Хотя причина пожара до сих пор не установлена — случайный инцидент или поджог, — ясно, что недостаток культуры пожарной безопасности сделал ситуацию хуже."
 mdmosjap_japan.9130901001.oA: "Надеемся, больше никогда не увидим пожара хуже этого."
 mdmosjap_japan.131201001.t: "Рождение её светлости принцессы Айко"
 mdmosjap_japan.131201001.d: "1 декабря 2001 года в больнице Императорского дворца родилась дочь наследного принца Нарухито и его супруги Масако. Она, первая рожденная императорская принцесса третьего тысячелетия, получила имя Айко, взятое из учения Менция, классической китайской конфуцианской книги. Также её светлость принцесса Айко — внучка Его Величества императора Акихито. Это событие стало самым счастливым с момента рождения Его Светлости принца Фумихито Акисино-но-Мия в 1965 году, и почти вся страна праздновала. Затем 20 000 человек, включая политиков и знаменитостей, кричали «Бандзай» у Императорского дворца. С другой стороны, некоторые опасались, что это может поставить под угрозу нынешнюю линию Императорской семьи. Принцесса-консорт Масако уже была слишком взрослa, чтобы рожать ребёнка, поэтому рождение второго могло быть опасным. И если принцесса Айко вырастет, она может стать матрилатеральной императрицей «как последняя императорская семья», поскольку разница в возрасте между двумя принцами — Нарухито и Фумихито — велика. Но это нарушило бы Императорский домовой закон: на Императорский трон допускается только патрилатеральная линия. В конце концов все начали спорить о поправке к Императорскому домового закону, чтобы допустить матрилатеральную императрицу."
 mdmosjap_japan.131201001.oA: "Бандзай!"
 mdmosjap_japan.150526001.t: "2003 прибрежное землетрясение в Мияги"
 mdmosjap_japan.150526001.d: "18:24, 26 мая 2003 года — землетрясение магнитудой 7.1 и силой 6- произошло у границы префектур Мияги и Иватэ и ударило по региону. Большие районы Тохоку понесли серьёзные разрушения, такие как обрушение опор шинкансэна и оползни на склонах, но никто не погиб. Цунами в этот раз было очень слабым, скорее похоже на рябь. Хотя такие сообщения поступали, многие люди от Хоккайдо до Канто почувствовали толчки."
 mdmosjap_japan.150726001.t: "2003 второе подряд землетрясение в Мияги"
 mdmosjap_japan.150726001.d: "26 июля 2003 года — целых четыре землетрясения подряд ударили по северной части префектуры Мияги в течение дня! Самое сильное зафиксировало магнитуду 6.4 и силу 6+ в 7:13 утра, а даже самое слабое — магнитуду 5.1 и силу 5-. Эти землетрясения нанесли ущерб не только сотням домов, но и военно-воздушной базе Сил самообороны Матсушима. Это был очень неприятный день, но, к счастью, никто не погиб."
 mdmosjap_japan.150926001.t: "2003 землетрясение на Хоккайдо"
 mdmosjap_japan.150926001.d: "4:50, 26 сентября 2003 года — землетрясение магнитудой 8.0 и силой 6- произошло у южного побережья Хоккайдо. Лишь несколько городов пережили его сильно, но вскоре они осознали истинные ужасающие последствия. Землетрясение вызвало разжижение грунта на прибрежной насыпи и пожар на резервуарах нефтехранилища. Кроме того, на восточном побережье Восточной Японии обрушилось мощное цунами, и погибли двое человек."
 JAP_historical.20030926.t: "Слияние ДПЯ–ЛП, Либеральная партия присоединяется к Демократической партии"
 JAP_historical.20030926.d: "Движения по консолидации несистемных сил ускоряются. После повторных переговоров Демократическая партия и Либеральная партия договорились объединить главное политическое средство несистемного лагеря в единую организацию.\n\nЛиберальная партия распустится и войдёт в состав Демократической партии в форме поглощения. Это увеличит присутствие несистемного лагеря в Диете, но также может породить новые очаги напряжения, поскольку партии начнут бороться за направление политики и лидерство."
 JAP_historical.20030926.a: "Реорганизация антиидиппартного лагеря уже началась."
 mdmosjap_japan.161023001.t: "Землетрясение в Тюэцу, Ниигата, 2004 год"
 mdmosjap_japan.161023001.d: "17:56, 23 октября 2004 года — землетрясение магнитудой 6.8 и силой 7 по шкале JMA произошло в Ниигате. Это было впервые после пересмотра шкалы после землетрясения Хансин 1995 года, когда зафиксировали 7 баллов. В Ямакоси все дороги были уничтожены оползнями, и жители оказались отрезаны в селении. Поезд на линии синкансэн Дзёэцу сошёл с рельсов из-за толчка, но никто не погиб. Однако в результате толчков погибло 68 человек."
 mdmosjap_japan.170320001.t: "2005 фукуокское землетрясение"
 mdmosjap_japan.170320001.d: "10:53, 20 марта 2005 года — землетрясение магнитудой 7.0 и силой 6- произошло у побережья Фукуока. В Северном Кюсю таких сильных землетрясений было немного, и это было крупнейшим с 1922 года. На острове Генкай в городе Фукуока около 700 человек эвакуировались, а десять решили остаться для связи и патруля. В центральной части Фукуоки большинство окон разбилось, и осколки упали на тротуар, ранив двух пешеходов. Землетрясение потрясло не только Цусиму, но и Корею, и Китай. Один человек погиб от землетрясения."
 mdmosjap_japan.170425001.t: "Крушение поезда на линии Фукуросимаяма"
 mdmosjap_japan.170425001.d: "В 9:18 утра 25 апреля 2005 года поезд скоростного трамвая на линии Фукутияма (также известной как линия Такарадзука) компании JR West сошел с рельсов на крутом повороте в городе Амагасаки, префектура Хёго, и врезался в первый этаж расположенного неподалеку многоквартирного дома.\nПоезд состоял из семи вагонов, хотя в первоначальных сообщениях ошибочно утверждалось, что их было только шесть, поскольку головной вагон полностью застрял в здании. Расследование показало, что поезд вошел в поворот на скорости приблизительно 116 км/ч (72 мили в час), несмотря на то, что разрешенная скорость на этом участке составляла 70 км/ч (43 мили в час). Чрезмерная скорость, вероятно, стала причиной схода с рельсов из-за центробежной силы.\nВодитель погиб в аварии, но показания кондуктора из заднего вагона указывали на то, что экипаж, возможно, пытался компенсировать задержку примерно в 90 секунд. Позже стало известно, что в компании существовали строгие внутренние дисциплинарные меры даже за незначительные операционные ошибки. Эти меры включали в себя перевоспитание, переписывание правил компании от руки и другие корректирующие действия, истоки которых восходят к приватизации Японских национальных железных дорог (JNR) во время правления Накасонэ.\nК счастью, приближавшийся навстречу скоростной поезд смог совершить экстренную остановку из-за заблокированного пути, избежав вторичного столкновения. Однако, поскольку авария произошла в час пик утром, поезд был переполнен. В общей сложности погибли 107 человек, 562 получили ранения, что делает эту железнодорожную катастрофу самой смертоносной в послевоенной истории Японии. Некоторые медицинские специалисты отметили, что несколько пассажиров, возможно, погибли не сразу в результате столкновения, а позже из-за синдрома сдавливания, возникшего в результате длительного сжатия."
 mdmosjap_japan.180906001.t: "Рождение его светлости принца Хисахито"
 mdmosjap_japan.180906001.d: "6 сентября 2006 года в частной больнице в Минaми-Азабу родился сын принца Фумихито и его супруги Кико. Он, первый рожденный императорский принц в третьем тысячелетии, был назван Хисахито, что означает «Хиса» — «в расслабленном состоянии» и «Хито» — по императорской традиции Хэйанского периода. Он родился с помощью кесарева сечения в частной больнице, а не в Императорском дворце; это был первый такой случай в императорской истории. Это событие было воспринято как легитимное продолжение мужской линии престолонаследия, а также как рождение новой императорской семьи. После рождения мальчика спор о поправке к Императорскому домовому закону стал постепенно утихать."
 mdmosjap_japan.180906001.oA: "Бандзай!"
 JAP_historical.20070307.t: "Тайна коммунальных расходов"
 JAP_historical.20070307.d: "В марте 2007 года на заседании бюджетного комитета Палаты советников стало известно, что политическая организация, финансирующая министра сельского хозяйства, лесного хозяйства и рыболовства Тосикацу Мацуоку, «Политический и экономический форум нового века Тосикацу Мацуоки», в своих отчетах о финансировании политической деятельности указала общие расходы на коммунальные услуги в размере приблизительно 28,8 миллионов иен за пять лет, с 2001 по 2005 год.\n\nОсобое внимание привлекло то, что «главный офис» организации располагался в здании офисов членов Палаты представителей, где вода, электричество и кондиционирование воздуха предоставляются бесплатно.\nМинистр Мацуока пояснил, что расходы включали в себя затраты на «ионизатор воды» и «электрическое отопление», но не смог дать четкого обоснования указанным суммам. На последующих заседаниях парламента он также отказался вдаваться в подробности, заявив: «В рамках этой системы никаких дополнительных объяснений не требуется».\n\nОппозиционные партии резко раскритиковали ситуацию, назвав ее потенциальным «ложным заявлением» и «злоупотреблением системой», в то время как общественное недоверие к подотчетности правительства в целом росло."
 JAP_historical.20070307.oA: "Требовать от министра полного публичного объяснения"
 JAP_historical.20070307.oB: "Защищать его до завершения расследования"
 JAP_historical.20070528.t: "Непосильное бремя"
 JAP_historical.20070528.d: "Министр сельского хозяйства, лесного хозяйства и рыболовства Тосикацу Мацуока был найден мертвым, повесившись, в своей парламентской резиденции в Акасаке, Токио. Позже полиция подтвердила, что это было самоубийство.\n\nВ течение нескольких месяцев министр Мацуока подвергался пристальному вниманию в парламенте, СМИ и общественном мнении из-за высоких расходов на коммунальные услуги, отраженных в его отчетах о финансировании политических кампаний.\n\nЭта новость потрясла общественность и вызвала более глубокие вопросы: «Был ли он единственным, кто должен был понести ответственность?» и «Была ли реакция правительства действительно адекватной?»"
 JAP_historical.20070528.oA: "Какая трагедия..."
 JAP_historical.20070801.t: "Цепочка скандалов: бремя ответственности"
 JAP_historical.20070801.d: "После смерти министра сельского хозяйства, лесного хозяйства и рыболовства Тосикацу Мацуюки его преемником стал Норихико Акаги. Однако всего через два месяца Акаги был фактически вынужден уйти в отставку после того, как в его отчёте о политическом фонде были подняты несколько вопросов, включая расходы на офис, обработку пожертвований и двойное отражение квитанций его политической группы «Токюкай».\n\nС двумя подряд министрами сельского хозяйства, оказавшимися в центре скандалов за такой короткий срок, серьёзные вопросы возникли в отношении ответственности, прозрачности и надёжности назначений в кабинете. Профессия министра сельского хозяйства стала считаться «проклятой», и администрация теперь находится под давлением, чтобы принять решительные меры для восстановления доверия и стабилизации руководства."
 JAP_historical.20070801.oA: "Почему это продолжается... Мы должны вернуть доверие народа."
 JAP_historical.20070704.t: "Фатальная оплошность"
 JAP_historical.20070704.d: "Во время публичной лекции министр обороны Фумио Кюма сделал спорное заявление, что атомные бомбардировки Хиросимы и Нагасаки были «неизбежны».\nКомментарий был широко истолкован как оправдание бомбардировок, вызвав мощную реакцию со стороны групп выживших после атомных бомбардировок и общественности. Критика прозвучала как от правящих, так и от оппозиционных партийных законодателей, а также от местных властей. Премьер-министр Абэ официально выразил ему выговор.\nПосле этого местные лидеры и гражданские группы устроили сидячие протесты в пострадавших городах, обострив конфликт до полного политического кризиса. В итоге Кюма подал в отставку с поста министра обороны, а его сменщицей стала Юрико Коике.\n\nТо, что начиналось как «простая ошибка одного министра», превратилось в серьёзное испытание способности правительства управлять и сохранить международную репутацию."
 JAP_historical.20070704.oA: "Как правительство, мы должны выразить искреннее и глубокое сожаление."
 mdmosjap_japan.190216001.t: "«Потерянная пенсия»"
 mdmosjap_japan.190216001.oA: "Какая катастрофа!"
 mdmosjap_japan.190325001.t: "2007 землетрясение в Ното"
 mdmosjap_japan.190325001.d: "9:41 утра 25 марта 2007 года — сильное землетрясение магнитудой 6.9 поразило регион Хокурику. По шкале JMA толчок оценён как 6+ в городе Вадзима, префектура Исикава, и это было самое сильное землетрясение с начала сейсмических наблюдений в 1922 году. Эпицентр, согласно сообщениям, находился в районе, где до сих пор не обнаружено разлома. Толчки достигли от префектуры Хоккайдо до префектуры Коти и вызвали цунами высотой 20 см (7,87 дюйма). Землетрясение унесло жизнь одного человека при обрушении каменной фонарной конструкции, ранило 356 человек и повредило более 30 000 зданий и домов."
 mdmosjap_japan.190716001.t: "2007 прибрежное землетрясение в Чуэцу"
 mdmosjap_japan.190716001.d: "10:13 утра 16 июля 2007 года — ещё одно землетрясение магнитудой 6.8 потрясло префектуру Ниигата. По шкале JMA оно оценивалось как 6+ в нескольких городах, но на АЭС Касивадзаки-Карива оно было неофициально вычислено как 7. Цунами также вызвано толчком и было зарегистрировано на 1 м (3,28 фута) в городе Касивадзаки. Землетрясение напрямую и вторично убило 15 человек, ранило 2 346 человек и повредило более 34 000 зданий, включая 1 331 разрушенный дом. На упомянутой АЭС Касивадзаки-Карива возник пожар, но тушение было задержано на два часа из-за ошибки в передаче сообщений на ранней стадии пожаротушения, что привело к утечке радиоактивных веществ, хотя она была в экологически незначимом уровне. Это землетрясение произошло всего через 4 месяца после землетрясения в Ното и через 3 года после разрушительного землетрясения Хансин 2004 года в Ниигате."
 mdmosjap_japan.200614001.t: "2008 землетрясение внутри Иватэ-Мияги"
 mdmosjap_japan.200614001.d: "8:43 утра 14 июня 2008 года — сильное землетрясение магнитудой 7.2 произошло под префектурой Иватэ. По шкале JMA оно оценивалось как 6+ в городах Курихара, префектура Мияги, и Осу, префектура Иватэ. Несмотря на то, что землетрясение было внутренним, толчки силой более 3 баллов были зарегистрированы от Хоккайдо до региона Канто. Это толчок, как редкое явление, повредил несколько зданий, но вызвал множество оползней и в итоге убил 17 человек, тяжело ранил 70 и ещё 356 получили лёгкие травмы, а 6 человек остались пропавшими без вести. Поступали сообщения об обрушении моста и повреждении культурных памятников."
 mdmosjap_japan.210811001.t: "2009 землетрясение в заливе Суруга"
 mdmosjap_japan.210811001.d: "5:07 утра 11 августа 2009 года — большое землетрясение магнитудой 6.5 произошло в заливе Суруга, убив одного человека и ранив 319. Толчок вызвал цунами высотой 40 см (1,31 фута). По шкале JMA землетрясение оценивалось как 6- во многих районах префектуры Сидзуока, были повреждены 8 678 домов и несколько исторических зданий, но ни один дом полностью не разрушен. Регион Токай, включающий префектуру Сидзуока, считается ключевой опасной зоной будущего Великого землетрясения Токай-Тонанкай и цунами, поэтому жители готовились: эвакуировались, укрепляли мебель и укрепляли свои дома и здания. Это было причиной меньшего числа жертв и ущерба по сравнению с масштабом толчка. Тем не менее были сообщения о повреждении заводов, чайных плантаций и автомагистрали Томеи."
 JAP_historical.20090808.t: "Создание Вашей партии"
 JAP_historical.20090808.d: "По мере роста ожиданий смены правительства сохраняется сильное недовольство медлительностью в принятии решений существующими партиями и негибкостью администрации. В этой атмосфере Ёсими Ватанабэ и другие выдвинули на первый план «реформы» и призвали к формированию новой политической силы, которая не будет опираться на существующую структуру.\n\nТаким образом, было объявлено о создании вашей партии. Это движение, выступающее за административную реформу и дерегулирование, расширит выбор избирателей, одновременно ускоряя перестройку и маневрирование внутри японской политики."
 JAP_historical.20090808.a: "Под знаменем реформ новая сила начинает движение."
 JAP_historical.20120928.t: "Создание Партии японских инноваций"
 JAP_historical.20120928.d: "По мере распространения недоверия к существующим партиям и недовольства политической стагнацией реформистское движение, основанное на региональной партии «Ассоциация восстановления Осаки», которая расширяла свое влияние в Осаке, начало двигаться в сторону национальной политики. Это течение, усилившее свое присутствие в региональной политике благодаря отстаиванию пересмотра местной администрации и реформы управления, должно было реорганизоваться в общенациональную политическую силу и привлечь внимание как альтернатива существующим партиям.\n\nСоздание Японской инновационной партии ознаменовало не только рождение новой партии, но и событие, которое еще больше ускорило перегруппировку оппозиции и формирование «третьей силы»."
 JAP_historical.20120928.a: "Новая реформаторская сила выходит на национальную арену."
 JAP_historical.20141128.t: "Роспуск Вашей партии"
 JAP_historical.20141128.d: "Ваша партия, успевшая заявить о себе как «третья сила», противостоящая существующим крупным партиям, всё больше испытывала трудности с поддержанием внутрипартийного единства по мере того, как разногласия в отношении управления партией и реакции на выборы постепенно углублялись.\n\nВ конце концов партия решила распустить себя, а её сопричастные депутаты разошлись по разным направлениям. Рассеивание силы, собравшейся под знаменем реформ, снова подчёркивает изменчивую природу перестройки оппозиции и, вероятно, не останется без значительного влияния на будущую политическую карту."
 JAP_historical.20141128.a: "Одна опора третьей силы закрывается."
 JAP_historical.20170925.t: "Перегруппировка оппозиции: раскол между Хоупом и конституционными демократами."
 JAP_historical.20170925.d: "Несистемные силы входят в важную фазу перестройки. Новая партия «Надежда» быстро привлекла внимание как новый реформаторский проект на фоне недовольства существующими партиями и ощущения политического застоя. Для некоторых элементов устоявшегося несистемного лагеря слияние и сотрудничество выглядели как шанс восстановить силу, но одновременно постепенно начали проявляться конфликты по направлениям политики и условиям объединения.\nСилы, корни которых уходили в бывшую Демократическую партию, не объединились в единый блок: одни слились или сотрудничали с партией «Надежда», другие сформировали Конституционно-демократическую партию и взяли независимую линию. Перестройка продвигалась, но одновременно стало яснее разделение, и структура несистемных сил была радикально перерисована."
 JAP_historical.20170925.a: "Несистемный лагерь разделился между «Надеждой» и Конституционными демократами."
 JAP_historical.20170925_TT: "§YДемократическая партия будет заменена Конституционной демократической партией!§!"
 JAP_historical.20180507.t: "Перегруппировка оппозиции: формирование Демократической партии для народа."
 JAP_historical.20180507.d: "Оппозиционные силы, реорганизованные после раскола между партией «Надежда» и Конституционно-демократической партией, продолжили дальнейшее перетасовывание. Часть бывшего лагеря Демократической партии и часть лагеря «Надежды», сохраняя точки разногласий, стремились объединиться в новую центристскую силу, а партия «Надежда» постепенно теряла вес как самостоятельная структура.\nСо временем была сформирована Демократическая партия за народ. Это также ознаменовало создание нового политического проекта, выступающего за центристскую линию, отличную от Конституционно-демократической партии, и структура оппозиции продолжит меняться."
 JAP_historical.20180507.a: "Перестройка продолжается, и облик оппозиции постоянно меняется."
 JAP_historical.20180507_TT: "§YПартия «Надежда» будет заменена Демократической партией за народ!§!"
 JAP_historical.20190401.t: "Создание Рэйва Синсэнгуми"
 JAP_historical.20190401.d: "На фоне нарастающего недоверия к существующим партиям и недовольства по поводу неуверенности в средствах к существованию Таро Ямамото и другие начали создание новой политической силы. Подчёркивая народную поддержку, не зависящую от крупных организаций, и выступая за выведение на национальную политику голосов, которые существующий политический порядок не может полностью услышать, это движение можно рассматривать как силу, ставящую в центр повседневные запросы, включая поддержку домохозяйств, расширение системы социальной защиты и пересмотр нагрузки, включая налог на потребление.\n\nСоздание Рэйва Синсэнгуми расширяет спектр вариантов внутри оппозиционных сил и одновременно становится событием, вновь подчёркивающим изменчивость политической перестройки."
 JAP_historical.20190401.a: "Новая сила снизу заявляет о выходе на национальную политику."
 JAP_historical.20220710.t: "Восхождение Сансэйто"
 JAP_historical.20220710.d: "На фоне растущего недоверия к существующим партиям и ощущения отчужденности от политического участия, Сансейто, новая политическая сила, расширившая свою поддержку за счет деятельности на местах и ​​распространения информации, начала проявлять себя на национальной политической арене. Благодаря созданию местных организаций и собственным уникальным призывам, она все больше привлекает внимание как инструмент для привлечения тех сегментов населения, которые основные партии ранее не могли полностью охватить.\n\nПодчеркивая свою дистанцию ​​от устоявшихся партий, «Сансейто» расширяется как новая партия, придающая большое значение участию и влиянию своих членов и сторонников. Ее позиция, выдвигающая на первый план такие вопросы, как образование, продовольствие, социальные системы и осознание суверенитета, привлекает поддержку, а также потенциально может стать фактором, способным изменить существующую партийную структуру и систему приоритетов.\n\nРост этой новой силы — это изменение, которое существующие партии не могут игнорировать, и оно также может повлиять на будущие перегруппировки оппозиции и консерваторов, а также на формирование политической повестки дня."
 JAP_historical.20220710.a: "Новая зарождающаяся сила укрепляет своё присутствие в политике."
