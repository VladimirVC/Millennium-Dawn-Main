 korea_russia.53.t: "Технологии подводных лодок"
 korea_russia.53.d: "Россия предоставила нам более совершенные технологии, благодаря которым мы можем улучшить наши подводные лодки. Все это стало возможным благодаря стремлению северокорейского лидера к разработке атомных подводных лодок."
 korea_russia.53.a: "Благослови нашего Вождя"
 korea.135.t: "Hacking Operation succeeded"
 korea.135.d: "Our hackers infiltrated the banking infrastructure of Western nations and siphoned off significant funds. Some was lost in the back channels used to move it home, but the operation was a success."
 korea.135.a: "отличная работа"
 korea.136.t: "North Korea Hacked Us"
 korea.136.d: "North Korean hackers have launched a cyberattack on our banking infrastructure to siphon funds. We should retaliate with operations of our own   or appeal to the international community."
 korea.136.a: "Неожиданно."
 korea.137.t: "Drugs Flooding Our Streets"
 korea.137.d: "A new wave of drugs has flooded our streets. The source remains unconfirmed, but we must move carefully, the productivity is already suffering."
 korea.137.a: "Support the Addicts"
 korea.137.b: "Что мы можем сделать"
 korea.138.t: "Drug Operation succeeded."
 korea.138.d: "A new wave of drugs has flooded our enemies' streets. They will have to spend to contain the crisis, while we earn a modest profit. Continued investment in the agency will keep the cash flowing."
 korea.138.a: "Отличная работа!"
 korea.139.t: "Counterfeit Dollar Operation"
 korea.139.d: "We have printed forged $100 bills and will distribute them through back channels into foreign markets, laundering the proceeds through our black market network. Steady income from this scheme will fund further operations."
 korea.139.a: "Отличная работа!"
 NKO_korean_russian_friendship: "North Korean–Russian Treaty on Comprehensive Strategic Partnership"
 NKO_korean_russian_friendship_desc: "The 2024 partnership treaty binds Pyongyang and Moscow into a mutual security pact, with each party pledging to come to the other's defence. Trade, energy, and technology cooperation deepen alongside the formal guarantees."
