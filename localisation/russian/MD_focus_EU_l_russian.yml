 EU_mff: "Multi-Annual Financial Framework"
 EU_budget: "Бюджет следующего года"
 EU_budget_mff_active: "Multi-Annual Financial Framework"
 EU_budget_mff_active_desc: "Current Multi-Annual Financial Framework."
 EU_budget_mff_draft: "Draft Multi-Annual Financial Framework"
 EU_budget_mff_draft_desc: "The member state which drafts the Multi-Annual Financial Framework has to put the draft on the agenda of the European Parliament at the end of the negotiations. As a reward, the drafting member state gets the total invested political power, when the Multi-Annual Financial Framework is approved and put into effect."
 EU_mff_draft_mission: "Multi-Annual Financial Framework Negotiations"
 EU_mff_draft_mission_desc: "В ходе переговоров все государства-члены могут инвестировать политическую силу для изменения проекта в соответствии со своей концепцией. Изменения в проекте повлияют на точку зрения политических групп Европейского парламента на проект."
 EU_global_call_rate_tooltip: "§GЛевый клик:§! Повысить глобальную ставку взноса\n\n§GПравый клик:§! Понизить глобальную ставку взноса\n\n§YСтоимость [?global.EU_10_per_member_cost] политической власти§!"
