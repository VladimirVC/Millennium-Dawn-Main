 taiwan.18.t: "A Grande Corrida dos Chips"
 taiwan.18.d: "À medida que avançamos para os anos 2000, nossa superioridade na produção de microchips está sendo ameaçada. A República Popular da China está começando a expandir sua indústria de produção de microchips, numa tentativa de superar nossa capacidade produtiva. Precisamos manter a liderança para proteger nossa posição no cenário global."
 taiwan.18.a: "Nós vamos vencer!"
 systems.1.t: "Bem-vindos ao Amanhecer do Milênio"
 systems.1.d: "Welcome to Millennium Dawn! Thank you for downloading and playing the mod. If you're new, we recommend exploring the various menus to familiarize yourself with the features. Menus typically can be opened via buttons at the top of the various screens Need help? Join our Discord community where we're happy to assist you with any questions or issues. You can report bugs in-game using \"Report An Issue\" in the pause menu or through our Discord channels.\n\nImportant Information:\n- Fuel is negative on game start due to power plants and population consumption. Look at the Energy UI in the Construction Menu for more details.\n- Historical focus =/= historical outcomes. We use the historical focus option to encouarge the AI to make the most historical possible choice in given choices and options. This is not a guarantee for a historical game."
 systems.1.a: "Ok"
 protests.100.t: "Report: Protests Erupt in [ROOT.capital.GetCapitalVictoryPointName]"
 protests.100.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that recent political shifts in the nation have resulted in the mass mobilization of people, with the first sparks of revolt breaking out in [ROOT.capital.GetCapitalVictoryPointName]. The state security apparatus is currently awaiting orders from the higher-ups before deciding what to do, but unless protester demands are met, this movement may spiral into seeing our government overthrown.\n\nProtest are projected to spread outside of the capital until it engulfs our nation as a whole.\n\n Signed,\n - Internal Security Directorate"
 protests.100.a: "We'll see what we can do"
 protests.101.t: "Report: Protests Spread!"
 protests.101.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears the protests have continued to spread, reaching new states and provinces nationwide. We will need to determine a method to deal with these protesters so that order and calm is restored in society.\n\n Signed,\n - Internal Security Directorate"
 protests.101.a: "We have to act quick!"
 protests.102.t: "Report: Protests Fizzle Regionally"
 protests.102.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecent public disturbances in the region were addressed by local security and administrative authorities. Demonstrations that had formed in several urban and semi-urban areas were dispersed following coordinated efforts by law enforcement units. Authorities report that order has been restored and essential services remain operational.\n\n Signed,\n - Internal Security Directorate"
 protests.102.a: "Good"
 protests.103.t: "Report: Calm Returns as Protests Disperse"
 protests.103.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nLocal security forces are reporting that protests have become incredibly limited in scale and size, with most cities and streets returning to normal operation. This report isn't from just one region, but several, signaling a general lack of energy amongst protesters. This is likely the end of the protest movement.\n\n Signed,\n - Internal Security Directorate"
 protests.103.a: "Excellent"
 protests.104.t: "Protesters Set Ablaze Industrial Assets!"
 protests.104.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several industrial assets, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.104.a: "Bulldoze it, there's no repairing that"
 protests.104.b: "Use government funds to begin reconstruction"
 protests.105.t: "Protesters Set Office Parks Ablaze!"
 protests.105.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several office parks, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.105.a: "Bulldoze it, there's no repairing that"
 protests.105.b: "Use government funds to begin reconstruction"
 protests.106.t: "Protesters Set Military Factories Ablaze!"
 protests.106.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several military factories, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.106.a: "Bulldoze it, there's no repairing that"
 protests.106.b: "Use government funds to begin reconstruction"
 protests.200.t: "Report: Incoming Protests"
 protests.200.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecently, our intelligence agency and security forces have caught wind of plans for a national revolt. This is due to recent developments within our country, creating a clique of dissatisified people. It is alledged that these people are starting to form groups in order to topple our government.\n\n Signed,\n - Internal Security Directorate"
 protests.200.a: "We must act quick"
 influence.5.d1: "Call in Albionis, we're going in"
 recognition.71.t: "The General Assembly Vote Has Passed"
 recognition.71.d: "The General Assembly has voted to admit us to the United Nations. After years of diplomatic effort, our seat is secured."
 recognition.71.a: "[THIS.GetName] takes its seat."
 recognition.72.t: "The General Assembly Vote Has Failed"
 recognition.72.d: "The General Assembly has fallen short of the votes needed to admit us. Our bid for UN membership has stalled for now."
 recognition.72.a: "A setback for our diplomacy."
 recognition.73.t: "General Assembly Rejects [FROM.GetName]'s Bid"
 recognition.73.d: "The General Assembly has voted against the admission of [FROM.GetNameDef] as a member state. The bid has stalled."
 recognition.73.a: "The vote is recorded."
 recognition.12.t: "[FROM.FROM.GetName] Seeks Security Council Recommendation"
 recognition.12.d: "[FROM.FROM.GetName] has petitioned the Security Council for a recommendation to the General Assembly, over the objection of [FROM.GetName]. The Council must now cast its vote."
 recognition.12.a: "Vote Yes"
 recognition.12.b: "Vote No"
 recognition.12.c: "Abstain"
 recognition.15.t: "Vote on [FROM.FROM.GetName] UN Membership"
 recognition.15.d: "With the Security Council's recommendation secured, the question of admitting [FROM.FROM.GetName], opposed by [FROM.GetName], now falls to the General Assembly."
 recognition.15.a: "Vote Yes"
 recognition.15.b: "Vote No"
 recognition.15.c: "Abstain"
 recognition.121.t: "Security Council Recommends [FROM.GetName] for UN Membership"
 recognition.121.d: "The Security Council has issued a recommendation in favor of admitting [FROM.GetName] to the United Nations. The matter now passes to the General Assembly."
 recognition.121.a: "A vote moves forward."
 recognition.122.t: "Security Council Rejects [FROM.GetName]'s Bid"
 recognition.122.d: "The Security Council has voted against recommending [FROM.GetName] to the General Assembly. The membership bid stops at this stage."
 recognition.122.a: "The bid stalls."
 UNSC.1.t: "Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all Offensive Wars"
 UNSC.1.d: "A Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all of their current offensive conflicts is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will have 210 days to resolve all of their ongoing offensive conflicts. If they fail to do so, they will be sanctioned until they finally end all of those conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.1.a: "Yes"
 UNSC.1.b: "No"
 UNSC.1.c: "Abstain"
 UNSC.2.t: "United Nations Security Council Sanctions against [?global.current_sc_vote_nation.GetName]"
 UNSC.2.d: "A Resolution to established UNSC sanctions against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the vote passes, [?global.current_sc_vote_nation.GetName] will be sanctioned until they no longer are an offensive threat to global peace, or until the Security Council removes the sanctions against them.\n\n$unsc_vote_pass_tt$"
 UNSC.2.a: "Yes"
 UNSC.2.b: "No"
 UNSC.2.c: "Abstain"
 UNSC.3.t: "Restrict Foreign Military Volunteers to [?global.current_sc_vote_nation.GetName]"
 UNSC.3.d: "A resolution to prevent foreign military volunteers from being sent to [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, any nation that sends military volunteers to [?global.current_sc_vote_nation.GetName] after the vote will be sanctioned until they either withdraw their volunteers, or the conflict ends.\n\n$unsc_vote_pass_tt$"
 UNSC.3.a: "Yes"
 UNSC.3.b: "No"
 UNSC.3.c: "Abstain"
 UNSC.4.t: "Arms Embargo against [?global.current_sc_vote_nation.GetName]"
 UNSC.4.d: "A Resolution to institute an arms embargo against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will be prevented from purchasing arms from the International Market until they end all of their current offensive conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.4.a: "Yes"
 UNSC.4.b: "No"
 UNSC.4.c: "Abstain"
 UN.6.t: "Confirm UN Security Council seat for [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.6.d: "The United Nations General Assembly is currently voting to confirm the upcoming members of the Security Council. All nations that are nominated must be confirmed by the General Assembly, and will serve a 2 year term, starting January 1st of the year [?global.next_year]\n\n$un_ga_vote_requires_2_3_tt$"
 UN.6.a: "Vote Yes"
 UN.6.b: "Vote No"
 UN.6.c: "Abstain"
 UN.7.t: "Establish Non-Binding Sanctions Against [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.7.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has conducted a military strike against a foreign nation. In response, they have requested that the §BUnited Nations§! sanction [?global.current_ga_vote_nation.GetNameWithFlag] for the next year as a punishment for this action. If we vote in the affirmative, we will agree to bring sanctions against [?global.current_ga_vote_nation.GetNameWithFlag].\n\n$un_ga_vote_auto_pass_tt$"
 UN.7.a: "Vote Yes"
 UN.7.b: "Vote No"
 UN.7.c: "Abstain"
 UN.8.t: "Decrease the UN General Operating Budget"
 UN.8.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has put forward a proposal to decrease the General Operating Budget for the next year. The decrease would be by 0.01% of GPD. The current contribution rate is [?global.general_operating_budget_contribute_percent|%]. The decrease to the rate would take place at the start of the next UN fiscal year, and would affect all UN Aid programs.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.8.a: "Vote Yes"
 UN.8.b: "Vote No"
 UN.8.c: "Abstain"
 UN.9.t: "Increase the UN General Operating Budget"
 UN.9.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has put forward a proposal to increase the General Operating Budget for the next year. The increase would be by 0.01% of GPD. The current contribution rate is [?global.general_operating_budget_contribute_percent|%]. The increase to the rate would take place at the start of the next UN fiscal year, and would affect all UN Aid programs.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.9.a: "Vote Yes"
 UN.9.b: "Vote No"
 UN.9.c: "Abstain"
 UN.10.t: "Resolution: Poverty Reduction"
 UN.10.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt measures aimed at reducing poverty. Nations that vote in favor will commit to policies that improve stability at the cost of increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.10.a: "Vote Yes"
 UN.10.b: "Vote No"
 UN.10.c: "Abstain"
 UN.11.t: "Resolution: Food Security"
 UN.11.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to prioritize food security and agricultural development. Nations that vote in favor will commit to boosting agricultural output at the cost of reduced industrial capacity.\n\n$un_ga_vote_requires_majority$"
 UN.11.a: "Vote Yes"
 UN.11.b: "Vote No"
 UN.11.c: "Abstain"
 UN.12.t: "Resolution: Global Health Initiative"
 UN.12.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to invest in global health initiatives. Nations that vote in favor will benefit from reduced healthcare costs at the expense of increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.12.a: "Vote Yes"
 UN.12.b: "Vote No"
 UN.12.c: "Abstain"
 UN.13.t: "Resolution: Education Initiative"
 UN.13.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to increase investment in education. Nations that vote in favor will benefit from faster research and reduced education costs, but at the expense of slower construction.\n\n$un_ga_vote_requires_majority$"
 UN.13.a: "Vote Yes"
 UN.13.b: "Vote No"
 UN.13.c: "Abstain"
 UN.14.t: "Resolution: Clean Energy Transition"
 UN.14.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to accelerate the transition to clean energy. Nations that vote in favor will receive incentives for renewable energy construction but face penalties to fossil fuel infrastructure and factory output.\n\n$un_ga_vote_requires_majority$"
 UN.14.a: "Vote Yes"
 UN.14.b: "Vote No"
 UN.14.c: "Abstain"
 UN.15.t: "Resolution: Economic Growth"
 UN.15.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt policies that promote economic growth. Nations that vote in favor will benefit from increased productivity and factory output, but at the cost of reduced political power and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.15.a: "Vote Yes"
 UN.15.b: "Vote No"
 UN.15.c: "Abstain"
 UN.16.t: "Resolution: Infrastructure Development"
 UN.16.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to invest in infrastructure development. Nations that vote in favor will benefit from faster infrastructure and civilian factory construction, but at the cost of slower arms factory construction and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.16.a: "Vote Yes"
 UN.16.b: "Vote No"
 UN.16.c: "Abstain"
 UN.17.t: "Resolution: Reduced Inequality"
 UN.17.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt measures to reduce inequality. Nations that vote in favor will benefit from improved stability, but at the cost of reduced political power and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.17.a: "Vote Yes"
 UN.17.b: "Vote No"
 UN.17.c: "Abstain"
 UN.18.t: "Resolution: Climate Action"
 UN.18.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to take aggressive action on climate change. Nations that vote in favor will receive incentives for renewable energy but face significant penalties to fossil fuel plants and factory output.\n\n$un_ga_vote_requires_majority$"
 UN.18.a: "Vote Yes"
 UN.18.b: "Vote No"
 UN.18.c: "Abstain"
 UN.19.t: "Resolution: Peace & Institutions"
 UN.19.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to strengthen peaceful institutions and governance. Nations that vote in favor will benefit from increased political power and drift defense, but at the cost of slower arms factory construction and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.19.a: "Vote Yes"
 UN.19.b: "Vote No"
 UN.19.c: "Abstain"
 UN.20.t: "Resolution: Trade Partnerships"
 UN.20.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to strengthen international trade partnerships. Nations that vote in favor will benefit from improved trade relations, but at the cost of reduced political power.\n\n$un_ga_vote_requires_majority$"
 UN.20.a: "Vote Yes"
 UN.20.b: "Vote No"
 UN.20.c: "Abstain"
 UN.21.t: "Resolution: Digital Development"
 UN.21.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to invest in digital infrastructure and development. Nations that vote in favor will benefit from faster internet, microchip, and research development, but at the cost of increased consumer goods spending and slower infrastructure construction.\n\n$un_ga_vote_requires_majority$"
 UN.21.a: "Vote Yes"
 UN.21.b: "Vote No"
 UN.21.c: "Abstain"
