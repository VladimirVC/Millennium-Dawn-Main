 SOV_proclaim_soviet_hegemony: "Proclamar la hegemonía soviética"
 EST_new_economic_policy_desc: "Desde que recuperamos nuestra independencia, nos hemos posicionado como un puente entre Oriente y Occidente, impulsando la reforma económica y la integración con Occidente. Sin embargo, debemos formular una nueva política que se ajuste mejor a nuestros socios extranjeros, una política más rentable y metódica."
 SOV_proclaim_soviet_hegemony_desc: "Con la economía recuperada y las masas movilizadas, Rusia está lista para retomar su papel de liderazgo. Reivindicaremos abiertamente la primacía soviética, desplazando el equilibrio de poder hacia el este y presionando a los estados europeos para que se enfrenten a nuestro regreso."
 SOV_the_third_rome_desc: "La idea de que Moscú, la Tercera Roma, es la sucesora de la antigua Roma y Bizancio, portadora del legado del Imperio Romano, ha sido objeto de debate a lo largo de la historia europea sobre qué ciudad hereda legítimamente este legado."
 polish_focus: "Árbol de enfoque de Polonia"
 SOV_socialist_humanism_desc: "El socialismo no es solo cuestión de fábricas y cuotas, sino de la dignidad del trabajador. Pondremos el bienestar humano en el centro de la revolución, demostrando que el camino comunista sirve al pueblo y no al revés."
 SOV_socialist_humanism: "Humanismo socialista"
 SOV_the_third_rome: "La Tercera Roma"
 king: "Antecedentes: Realeza"