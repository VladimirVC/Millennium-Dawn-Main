 GRE_unify_cyprus: "Объединить Кипр"
 GRE_failures_capitalism_TT: "§RВлияние фокуса на масштабы долгового кризиса.§!"
 GRE_communist_takeover_TT: "§GГреческий народ требует выборов!§!\n\nУбедитесь, что у вас достаточно политической власти, накопленной для этого. Если потерпеть §Rнеудачу§! при избрании и формировании правительства, §Rнужно будет провести еще одни внеочередные выборы,§! чтобы расширить возможности §Y[Communist-State_L]§!"
 GRE_fascist_takeover_TT: "§GГреческий народ требует выборов!§!\n\nУбедитесь, что у вас достаточно политической власти, накопленной для этого. Если потерпеть §Rнеудачу§! при избрании и формировании правительства, §Rнужно будет провести еще одни внеочередные выборы,§! чтобы расширить возможности §Y[Nat_Fascism_L]§!"
 GRE_civil_units_TT: "§RПредполагается, что мы переехали нашу армию в государственные границы Центральной Греции, где мы можем попытаться удержать повстанцев.§!"
 GRE_worsen_debt_TT: "§RУсугубление долгового кризиса!§!"
 GRE_lowers_debt_TT: "§GСмягчение долгового кризиса!§!"
 GRE_end_austerity_TT: "§GКонец протестам против жесткой экономии!§!"
 GRE_increase_drift_TT: "§GУсиливается политический дрейф в сторону этой партии!§!"
 GRE_process_sco_member_tt: "§YНачинается процесс интеграции в ШОС.§!"
 GRE_enemy_blocked_us: "§RЕсли эти решения недоступны, значит, враг временно помешал нам набрать силу или мы не выполняем другие требования!§! (Дней блокировки: [?TUR_greece_blocked_us:days_left|R0])"
 GRE_unable_to_gain_strength: "§HГреко-киприоты§! будут §GНЕСПОСОБНЫ§! набрать силу в течение §H100 дней§!"
