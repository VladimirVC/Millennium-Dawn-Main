 ALG_algeria_police10_tt: "$ALG_algeria_police_modifier_tt_intro$ \n £operatives_captured_texticon Enemy operative capture chance: §G+15.00%§! \n\n"
 ALG_algeria_support_category: "Auxiliary Troops of Algeria"
 ALG_stabilize_mali: "Stabilize Mali"
 ALG_stabilize_mali_desc: "Mali's instability threatens the entire Sahel. Algeria, with its experience in counterinsurgency and diplomacy, must step in to stabilize its southern neighbor—whether through force, negotiation, or influence."
 ALG_back_tuareg_rebellion: "Back the Tuareg Rebellion"
 ALG_back_tuareg_rebellion_desc: "Rather than support Bamako, we can empower the Tuareg rebels who seek autonomy in northern Mali. This will weaken Mali's central authority and increase our leverage in the region."
 ALG_support_malian_army: "Support the Malian Army"
 ALG_support_malian_army_desc: "Algeria can instead back the Malian government directly, providing political and military support to strengthen their army against insurgents."
 ALG_promote_tuareg_dialogue: "Promote Tuareg Dialogue"
 ALG_promote_tuareg_dialogue_desc: "Rather than choosing a side, Algeria could host talks between the Tuareg rebels and the Malian state, positioning itself as a mediator and stabilizer in the Sahel."
 ALG_support_tuareg_politicians: "Support Tuareg Politicians"
 ALG_support_tuareg_politicians_desc: "Beyond the battlefield, Tuareg influence can also be built through political channels. Supporting moderate Tuareg leaders will give Algeria long-term allies inside Mali."
 ALG_aid_malian_army: "Aid the Malian Army"
 ALG_aid_malian_army_desc: "Algeria can send weapons, vehicles, and command systems to strengthen the Malian army's ability to fight insurgents and stabilize the country."
 ALG_mali_stabilized: "Mali Stabilized"
 ALG_mali_stabilized_desc: "After years of turmoil, Algeria's efforts have paid off. The Malian conflict is under control, the Tuareg rebellion contained, and Algeria stands as the Sahel's stabilizing power."
 ALG_tuareg_autonomy_victory: "Tuareg Autonomy Victory"
 ALG_tuareg_autonomy_victory_desc: "The Tuareg movement has won recognition of its autonomy. With Algeria's backing, the Tuareg now hold political power and Mali faces a new balance of authority in the Sahel."
 Algeria.237.t: "Algerian Intervention in Mali"
 Algeria.237.d: "Algeria has declared its intent to stabilize Mali, citing concerns over terrorism, Tuareg separatism, and regional instability. With Algiers moving troops, aid, and political pressure southward, the balance of power in Mali is shifting. Whether this brings peace or deeper conflict remains to be seen."
 Algeria.237.a: "Algeria takes the lead in the Sahel."
 Algeria.409.t: "Tuareg Dialogue Initiative"
 Algeria.409.d: "Algeria has begun promoting dialogue with Tuareg representatives in Mali and the wider Sahel. While some in Algiers see this as a path toward peace and stability, others fear that legitimizing Tuareg demands could embolden separatism. The government must decide how far to go in supporting this initiative."
 Algeria.409.a: "Engage through cultural and media outreach"
 Algeria.409.b: "Provide discreet support to Tuareg leadership"
 ALG_TUA_REV_TT: "[TUA.GetFlag] §HTuareg Resistance§! has been supported by Algeria, leading to the creation of a §YTuareg Autonomous Region§! (or potentially a §Gnew Tuareg state§!) within Mali."
 ALG_MAL_STABILIZED_TT: "[MAL.GetFlag] §HMali§! has been §Gstabilized§! with Algerian support, securing peace and reducing the risk of renewed conflict."
 ALG_algerian_intervention: "Regional Intervention Doctrine"
 ALG_algerian_intervention_desc: "Algeria has long acted as a regional power broker. With instability threatening our neighborhood, we must decide whether to intervene directly in regional conflicts to safeguard our national interests."
 ALG_intervene_in_sahrawi: "Intervene in the Sahara"
 ALG_intervene_in_sahrawi_desc: "The conflict between Morocco and the Sahrawi Arab Democratic Republic remains unresolved. Algeria must intervene diplomatically—or militarily—to protect its borders and strengthen its influence in the Maghreb."
 ALG_supp_polisario: "Support the Polisario Front"
 ALG_supp_polisario_desc: "The Sahrawi struggle for independence is central to Algeria's regional policy. By supplying arms and support to the Polisario Front, we can weaken Morocco and ensure our influence grows in Western Sahara."
 ALG_a_new_stance: "A New Stance Towards Morocco"
 ALG_a_new_stance_desc: "Algeria has traditionally opposed Moroccan control over Western Sahara, but shifting political winds demand pragmatism. Aligning with Morocco could reduce tensions, open new economic opportunities, and give us leverage in the Maghreb."
 ALG_intervene_in_libya: "Intervene in Libya"
 ALG_intervene_in_libya_desc: "Chaos in Libya threatens to spill across our borders. Algeria cannot afford instability next door. Whether through military action, diplomacy, or covert influence, we must secure our interests in Libya."
 ALG_assassinate_gaddafi: "Assassinate Gaddafi"
 ALG_assassinate_gaddafi_desc: "Muammar Gaddafi's rule destabilizes the entire region. By orchestrating his downfall, Algeria can accelerate regime change in Libya and ensure that a more favorable government emerges—even if it plunges Libya into civil war."
 ALG_peacekeepers: "Send Peacekeepers to Libya"
 ALG_peacekeepers_desc: "Rather than plunging Libya further into chaos, Algeria could step in as a peacekeeping force. Deploying troops to stabilize the situation would strengthen our image as a responsible regional power and give us lasting influence in Tripoli."
 ALG_pulse.1.t: "Sahara Desert Expands"
 ALG_pulse.1.d: "According to the latest data, the Sahara continues its steady expansion. Grazing areas are turning barren, oases are drying up, and wildlife such as gazelles and Barbary deer are disappearing due to poaching. Overgrazing, unchecked mining and ignoring poaching will only worsen the desertification."
 ALG_pulse.1.a: "A worrying sign"
 ALG_pulse.2.t: "Sahara Desert Stable"
 ALG_pulse.2.d: "This year's data suggests the Sahara's advance has slowed, with desertification holding steady. However, without action against overgrazing, poaching, and unsustainable land use, the balance may soon tip again."
 ALG_pulse.2.a: "We must remain vigilant"
 ALG_pulse.3.t: "Sahara Reclaims Land"
 ALG_pulse.3.d: "Recent reports indicate vegetation is slowly returning to some desert margins. Anti-poaching patrols, controlled grazing, and reforestation efforts appear to be helping the land heal, restoring balance to fragile ecosystems."
 ALG_pulse.3.a: "Encouraging progress"
 ALG_sahara_poaching: "Poaching in the Sahara"
 ALG_sahara_poaching_desc: "Poaching is a major issue across Algeria's vast Sahara and steppe. Gazelles, bustards, and Barbary sheep are hunted illegally, while trafficking routes connect to international markets. Combined with overgrazing and water overuse, poaching accelerates desertification and biodiversity loss.\n\nLikelihood of §YDesertification§!: §R[?sahara_expands]%§!\nLikelihood of §YStabilisation§!: [?sahara_steady]%\nLikelihood of §YOasification§!: §G[?sahara_retreats]%§!\n\nEvery month, there is a\n§Y[?chance_to_not_kill_poachers]%§! chance of §Y15 new poachers§! entering operations.\n§Y[?chance_to_kill_poachers]%§! chance of our security forces eliminating §Y[?no_of_poachers_to_kill] poachers§!\n\nHigher §YInternal Security Spending§! and targeted anti-poaching measures improve our chances of success.\n\nEstimated active poachers: [?no_of_poachers] ([ALG_threat_level_of_poachers])"
 ALG_bi_yearly_poaching_report: "Yearly Poaching Report"
 ALG_bi_yearly_poaching_report_desc: "Every 12 months, the impact of poaching is assessed. A §GLow Threat§! reduces the risk of desertification, while a §RHigh Threat§! increases it."
 ALG_anti_poaching_extra_security: "Hire Extra Rangers"
 ALG_anti_poaching_extra_security_desc: "Recruit more rangers and patrols to combat poaching across the Sahara and steppe."
 ALG_anti_poaching_extra_security_tt: "§GThe chance of eliminating poachers increases by 10%§!"
 ALG_anti_poaching_heavy_weapons: "Equip Anti-Poaching Units"
 ALG_anti_poaching_heavy_weapons_desc: "Providing patrols with vehicles, drones, and heavy weapons boosts their effectiveness against armed poaching groups."
 ALG_anti_poaching_heavy_weapons_tt: "§GThe number of poachers eliminated increases by 5§!"
 ALG_anti_poaching_awareness: "Wildlife Protection Campaign"
 ALG_anti_poaching_awareness_desc: "Run a public campaign to raise awareness about the importance of protecting endangered species from poaching."
 ALG_anti_poaching_awareness_tt: "§GLowers the number of new poachers appearing each month§!"
 ALG_reduce_yearly_good_desertification_5: "Likelihood of §YOasification§!: §R-5%§!\n"
 ALG_increase_yearly_good_desertification_5: "Likelihood of §YOasification§!: §G+5%§!\n"
 ALG_increase_yearly_bad_desertification_5: "Likelihood of §YDesertification§!: §R+5%§!\n"
 ALG_decrease_yearly_bad_desertification_5: "Likelihood of §YDesertification§!: §G-5%§!\n"
 ALG_reduce_yearly_neutral_desertification_5: "Likelihood of §YStabilisation§!: §R-5%§!\n"
 ALG_increase_yearly_neutral_desertification_5: "Likelihood of §YStabilisation§!: §G+5%§!\n"
 ALG_threat_level_of_poachers_low: "§GLow Threat§!"
 ALG_threat_level_of_poachers_medium: "§YMedium Threat§!"
 ALG_threat_level_of_poachers_high: "§RHigh Threat§!"
 ALG_anti_poaching_raid_successful: "§GWe successfully eliminate §Y[?poachers_killed]§! poachers!§!"
 ALG_anti_poaching_raid_normal: "§GWe manage to eliminate §Y[?poachers_killed]§! poachers!§!"
 ALG_anti_poaching_raid_failure: "§ROur rangers suffer casualties§!"
 ALG_eliminate_half_of_poachers: "§GReduce number of poachers by §Y[?poachers_killed]§!§!"
 ALG_sahara_expansion: "Sahara Desertification"
 ALG_sahara_expansion_desc: "The Sahara Desert dominates much of Algeria, stretching across the south and encroaching steadily northwards. Each year, the process of desertification worsens as fragile ecosystems give way to expanding arid zones. With only a fraction of Algeria's land suitable for farming, much of the rural population depends on limited arable land, irrigation projects, and fragile grazing areas that are increasingly under strain.\n\nThe Algerian Sahara also contains valuable natural resources, including oil and gas fields, as well as unique ecosystems and communities such as the Tuareg in the Hoggar region. Balancing exploitation of these resources with the urgent need to combat desertification will be a defining challenge.\n\n§YEvery January§! we will receive an update on the desertification status of the Sahara. The desert may continue to expand (§YDesertification§!), the situation may stabilize (§YStabilisation§!), or efforts could succeed in reversing the process (§YOasification§!). The chances of each outcome can be viewed in the §Y$ALG_anti_desertification_decisions$§! decision category.\n\nWe can continue extracting resources and grazing on fragile lands, worsening desertification, or we can take a conservationist and sustainable development approach to slow or even reverse the trend."
 ALG_anti_poaching_decisions: "Poaching in the Sahara"
 ALG_anti_poaching_decisions_desc: "Poaching in Algeria's Sahara remains a persistent problem. Endangered species such as the addax, gazelles, and desert cheetahs are hunted for trade or sport, while smuggling routes often link these activities to wider criminal and terrorist networks across the Sahel. Some poachers come from neighbouring Mali, Niger, and Libya, though local groups are also involved. Algerian authorities have taken a hard stance on §Ypoachers§!, and clashes between them and security forces are not uncommon.\n\nPoaching (together with overgrazing, climate change, and unsustainable land use) contributes to the continuing desertification of the Sahara. Combating poaching and protecting fragile ecosystems is an important step in safeguarding both biodiversity and human livelihoods.\n\nLikelihood of §YDesertification§!: §R[?sahara_expands]%§!\nLikelihood of §YStabilisation§!: [?sahara_steady]%\nLikelihood of §YOasification§!: §G[?sahara_retreats]%§!\n\nEvery month, there is a\n§Y[?chance_to_not_kill_poachers]%§! chance of §Y15 new poachers§! starting operations.\n§Y[?chance_to_kill_poachers]%§! chance of our security forces eliminating §Y[?no_of_poachers_to_kill] poachers§!\n\nWe can increase the likelihood of eliminating poachers by raising §YInternal Security§! spending or by equipping and training our forces for desert operations.\n\nCurrent estimated amount of poachers: [?no_of_poachers] ([ALG_threat_level_of_poachers])"
 ALG_anti_poaching_dehorn_camels: "Camel Marking Campaign"
 ALG_anti_poaching_dehorn_camels_desc: "Marking and closely monitoring camel herds across the Sahara could help discourage poachers and smugglers. While camels are not endangered, they are often targeted for smuggling routes or illegal trade. By introducing identification tags, community oversight, and patrol cooperation, we can make it more difficult for poachers to profit from camel theft and trade."
 ALG_anti_poaching_dehorn_camels_tt: "§GA successful campaign will halve the number of poachers§!"
 ALG_strengthen_ENTV_environmental_campaigns: "Strengthen ENTV Environmental Campaigns"
 ALG_strengthen_ENTV_environmental_campaigns_desc: "The ENTV, our national broadcasting service, can be used to raise awareness of environmental issues. By running campaigns on desertification, water conservation, and wildlife protection, we can encourage citizens to support a sustainable future."
 ALG_increase_cattle_grazing: "Expand Cattle Grazing"
 ALG_increase_cattle_grazing_desc: "Livestock herding remains a cornerstone of Algeria's steppe and high plateau economy. Expanding cattle and sheep grazing could boost rural incomes, but it risks worsening overgrazing, soil degradation, and desertification if not managed carefully."
 ALG_optimize_pastoral_practices: "Optimize Pastoral Practices"
 ALG_optimize_pastoral_practices_desc: "Traditional grazing methods have placed enormous strain on fragile ecosystems. By introducing rotational grazing, sustainable water use, and improved veterinary care, we can modernize pastoral practices and reduce their impact on the steppe and Sahara margins."
 ALG_expand_steppe_farming: "Expand Steppe Farming"
 ALG_expand_steppe_farming_desc: "The steppe regions of Algeria, located between the Tell Atlas and the Sahara, are vital for grain and livestock production. By investing in irrigation and reclamation projects, we can increase cultivation in these areas, though at the risk of further environmental stress."
 ALG_research_drought_resistant_crops: "Research Drought-Resistant Crops"
 ALG_research_drought_resistant_crops_desc: "Climate change and desertification threaten Algeria's food security. By investing in research for drought-resistant crops such as resilient grains and date palm varieties, we can safeguard our agricultural sector against worsening arid conditions."
 ALG_shrink_nature_reserves_sahara: "Shrink Sahara Nature Reserves"
 ALG_shrink_nature_reserves_sahara_desc: "Some argue that large portions of land set aside as nature reserves in the Sahara could be repurposed for agriculture, grazing, or industrial projects. Reducing the size of these reserves would allow development, but at great environmental cost."
 ALG_expand_nature_reserves_sahara: "Expand Sahara Nature Reserves"
 ALG_expand_nature_reserves_sahara_desc: "Protecting fragile ecosystems in the Sahara is essential for biodiversity and long-term environmental balance. By expanding protected areas, we can safeguard endangered species and reduce pressures contributing to desertification."
 ALG_total_ban_on_poaching: "Total Ban on Poaching"
 ALG_total_ban_on_poaching_desc: "Poaching threatens endangered species such as the addax, gazelle, and desert cheetah. While some hunting traditions persist, we must take decisive action and enforce a total ban on poaching across reserves and fragile ecosystems to protect our natural heritage."
 ALG_drs: "The DRS"
 ALG_drs_desc: "Algeria's Département du Renseignement et de la Sécurité (DRS) was forged during the bloody Black Decade and became infamous for its vast powers. While officially serving as the shield against terrorism and foreign infiltration, the DRS also intervenes heavily in politics, ensuring the preservation of state authority and stability—even at the cost of civil liberties."
 ALG_decline_of_tourism: "Decline of Tourism"
 ALG_destroyed_agriculture: "Destroyed Agriculture"
 ALG_tikjda_resort: "Tikjda Ski Resort"
 ALG_algerian_tourism: "Tourism in Algeria"
 ALG_natural_products_idea: "Algerian Natural Products"
 ALG_sonatrach: "Sonatrach Expansion"
 algeria_invest.1.t: "Investments in Algeria"
 algeria_invest.1.d: "Algeria is asking us to invest in their state. Thanks to investments in Algeria, we can strengthen our influence in North Africa and along the Mediterranean coast."
 algeria_invest.1.a: "Okay"
 algeria_invest.1.b: "No"
 algeria_invest.2.t: "They've agreed"
 algeria_invest.2.d: "They've agreed to invest in our country."
 algeria_invest.2.a: "Good."
 algeria_invest.3.t: "They refused"
 algeria_invest.3.d: "They refused to invest in our country, claiming our offer was unprofitable."
 algeria_invest.3.a: "Sad"
 algeria_invest.4.t: "American investments in Algeria"
 algeria_invest.4.d: "Algeria offers our companies the chance to invest in its economy. In return, we will gain influence and, in the long term, strengthen relations with Algeria."
 algeria_invest.4.a: "Who Said Money?"
 algeria_invest.4.b: "No"
 algeria_invest.5.t: "America agreed."
 algeria_invest.5.d: "American companies have already begun planning investment projects in Algeria."
 algeria_invest.5.a: "A win for business and democracy."
 algeria_invest.6.t: "America refused"
 algeria_invest.6.d: "America has refused to invest in our economy. They have no confidence in the transparency of our political system."
 algeria_invest.6.a: "Well, then we'll call Europe."
 algeria_invest.7.t: "European investments in Algeria"
 algeria_invest.7.d: "Algeria is asking us to invest in its economy. According to them, they have a favourable investment climate and our involvement will strengthen ties across the Mediterranean."
 algeria_invest.7.a: "Of Course"
 algeria_invest.7.b: "There's no money."
 algeria_invest.8.t: "Europe agreed"
 algeria_invest.8.d: "European investors have agreed to support our economy. Several major companies are already willing to launch investment projects in Algeria."
 algeria_invest.8.a: "Good news for development."
 algeria_invest.9.t: "Europe refused"
 algeria_invest.9.d: "They claimed there is no money available right now to allocate an investment package."
 algeria_invest.9.a: "Sad"
 algeria_invest.10.t: "Chinese investor funds Algiers Metro"
 algeria_invest.10.d: "A Chinese investor is offering us money to expand the Algiers Metro. We can build the metro with their funds, or embezzle it by cheating them, but this could harm our relations with China."
 algeria_invest.10.a: "Algiers needs a metro!"
 algeria_invest.10.b: "Algeria needs money!"
 algeria_invest.11.t: "Algeria fooled us"
 algeria_invest.11.d: "A group of Algerian crooks rigged the metro project and took all the money we had prepared for them."
 algeria_invest.11.a: "Bastards"
 algeria_invest.12.t: "Rebrab's Investments"
 algeria_invest.12.d: "Issad Rebrab, founder of Cevital, is one of Algeria's most influential entrepreneurs. Since the 1990s, he has invested in industry, food production, and international expansion. Thanks to him, Algeria has gained factories, jobs, and prestige projects. He remains a symbol of the country's private sector potential."
 algeria_invest.12.a: "Thank you, Rebrab!"
 ALG_our_economy: "Our Economy"
 ALG_our_economy_desc: "Algeria's economy stands at a crossroads. After years of instability and underinvestment, the government must decide whether to focus inward or open the door to modernization and growth."
 ALG_attract_foreign_inv: "Attract Foreign Investment"
 ALG_attract_foreign_inv_desc: "By opening our markets to foreign investors, Algeria can secure capital, expertise, and infrastructure projects that would otherwise remain out of reach."
 ALG_france_inv: "Seek French Investment"
 ALG_france_inv_desc: "France remains one of Algeria's closest economic partners. Renewing their involvement in our energy and industrial sectors could accelerate development—if we can bear their influence."
 ALG_chinese_inv: "Chinese Investment Initiative"
 ALG_chinese_inv_desc: "China offers ambitious investment packages, often tied to infrastructure and resource development. Partnering with Beijing could transform our economy, but at the cost of deeper dependence."
 ALG_usa_inv: "Invite American Investment"
 ALG_usa_inv_desc: "The United States can provide advanced technology and substantial financial backing. Cooperation with Washington may reshape Algeria's industry and services into global competitors."
 ALG_russian_inv: "Russian Economic Cooperation"
 ALG_russian_inv_desc: "Russia has long been a strategic ally in energy and defense. Expanding cooperation to broader economic projects will strengthen our industrial and military backbone."
 ALG_iran_inv: "Partnership with Iran"
 ALG_iran_inv_desc: "Algeria and Iran share a history of non-alignment and resistance to foreign domination. Expanding ties with Tehran could open new avenues in energy cooperation, industrial projects, and regional diplomacy, though it may raise concerns among Western partners."
 ALG_italia_inv: "Strengthening Italian Ties"
 ALG_italia_inv_desc: "Italy is one of Algeria's closest European partners, especially through ENI's role in our energy sector. By deepening cooperation with Rome, we can secure vital investment in infrastructure, boost Mediterranean trade, and reinforce our position as a key energy supplier to Europe."
 ALG_algiers_metro_expansion: "Expand the Algiers Metro"
 ALG_algiers_metro_expansion_desc: "Algiers suffers from congestion and outdated infrastructure. Expanding the metro system will not only modernize transport but also signal progress to investors and citizens alike."
 ALG_cevital_group_expansion: "Cevital Group Expansion"
 ALG_cevital_group_expansion_desc: "Cevital, Algeria's leading conglomerate, has the potential to become a continental powerhouse. Supporting its growth will create jobs and accelerate industrial modernization."
 ALG_scientific_research_push: "Promote Scientific Research"
 ALG_scientific_research_push_desc: "Innovation is the key to long-term growth. By investing in scientific research, Algeria can prepare the foundation for a knowledge-based economy."
 ALG_expand_higher_education: "Expand Higher Education"
 ALG_expand_higher_education_desc: "Universities and technical schools must be expanded and modernized to meet the demands of the 21st century. A better educated population will strengthen both society and the economy."
 ALG_digitalize_education: "Digitalize Education"
 ALG_digitalize_education_desc: "Digital platforms, online learning, and IT integration will revolutionize Algeria's education sector, creating a more skilled and adaptable workforce."
 ALG_national_research_program: "Launch National Research Program"
 ALG_national_research_program_desc: "Bringing together universities, industry, and government, a coordinated national research program will allow Algeria to keep pace with global technological advances."
 ALG_industry: "Expand Algerian Industry"
 ALG_industry_desc: "Algeria's industry must be diversified and modernized. By promoting industrial growth, we can reduce dependency on hydrocarbons and create a more balanced economy."
 ALG_constantine_hub: "Develop Constantine Industrial Hub"
 ALG_constantine_hub_desc: "The city of Constantine is an important regional center. Investing here will create a new industrial hub that spreads growth outside of Algiers."
 ALG_tlemcen_agro_industry: "Boost Tlemcen Agro-Industry"
 ALG_tlemcen_agro_industry_desc: "Agriculture and food processing in Tlemcen can be developed into a powerful agro-industrial sector, feeding the nation and creating jobs."
 ALG_snvi_modernization: "Modernize SNVI"
 ALG_snvi_modernization_desc: "SNVI, Algeria's national vehicle manufacturer, must be modernized to compete globally. Expanding production capacity will strengthen our transport and industrial base."
 ALG_annaba_steel_complex: "Annaba Steel Complex"
 ALG_annaba_steel_complex_desc: "Annaba hosts Algeria's largest steel production facilities. Modernizing and expanding them will provide the backbone for future infrastructure and defense industries."
 ALG_arzew_refinery: "Arzew Refinery Expansion"
 ALG_arzew_refinery_desc: "The refinery at Arzew is a vital link in our energy exports. Expanding its capacity will secure foreign currency inflows and strengthen Sonatrach's dominance."
 ALG_pipeline_modernization: "Modernize Pipelines"
 ALG_pipeline_modernization_desc: "A modern pipeline system is essential for secure, efficient energy exports. Upgrading our pipelines will prevent losses and improve international reliability."
 ALG_skikda_port_modernization: "Modernize Skikda Port"
 ALG_skikda_port_modernization_desc: "The port of Skikda is critical for trade and energy exports. Modernizing its facilities will ensure Algeria remains a competitive maritime hub."
 ALG_grant_foreign_energy_concessions: "Grant Foreign Energy Concessions"
 ALG_grant_foreign_energy_concessions_desc: "By granting select concessions to foreign companies, Algeria can attract capital and technology—though at the risk of ceding part of its energy independence."
 ALG_hassi_messaoud_expansion: "Expand Hassi Messaoud Oil Field"
 ALG_hassi_messaoud_expansion_desc: "The Hassi Messaoud oil field is the largest in Algeria. Expanding extraction and refining capacity will greatly boost our energy output."
 ALG_expand_sonatrach: "Expand Sonatrach"
 ALG_expand_sonatrach_desc: "Sonatrach is the beating heart of Algeria's economy. Strengthening the company will secure our global role in oil and gas production."
 ALG_protect_oil_gas_facilities: "Protect Oil and Gas Facilities"
 ALG_protect_oil_gas_facilities_desc: "Our energy infrastructure is vulnerable in times of war or unrest. Strengthening defenses around oil and gas facilities is critical to national security."
 ALG_minister_of_agriculture_reforms: "Agricultural Reform Program"
 ALG_minister_of_agriculture_reforms_desc: "Years of neglect have weakened Algeria's agriculture. New reforms under the Ministry of Agriculture will restore productivity and reduce dependence on food imports."
 ALG_modernize_agricultural_sector: "Modernize the Agricultural Sector"
 ALG_modernize_agricultural_sector_desc: "Years of conflict and neglect have left Algeria's farms outdated and inefficient. Mechanization, irrigation systems, and subsidies will revitalize the agricultural sector, ensuring food security for our people."
 ALG_rural_development_program: "Rural Development Program"
 ALG_rural_development_program_desc: "Algeria's villages have long suffered from underinvestment. By directing funds into rural infrastructure, power, and jobs, we will reduce inequality between cities and the countryside and strengthen national unity."
 ALG_promote_algerian_produce: "Promote Algerian Produce"
 ALG_promote_algerian_produce_desc: "Our land produces a wide variety of crops and natural products, but foreign imports dominate local markets. Through branding, subsidies, and trade incentives, we will raise the profile of Algerian goods at home and abroad."
 ALG_build_farm_to_market_roads: "Farm-to-Market Roads"
 ALG_build_farm_to_market_roads_desc: "Farmers need better access to consumers and export routes. Constructing roads from rural zones to urban centers and across the Tunisian border will strengthen both our agricultural sector and regional ties."
 ALG_new_agro_industrial_complexes: "New Agro-Industrial Complexes"
 ALG_new_agro_industrial_complexes_desc: "Algeria must link agriculture with modern industry. By constructing agro-industrial complexes, we can create value-added products, generate jobs, and raise rural incomes."
 ALG_invest_tourism: "Invest in Tourism"
 ALG_invest_tourism_desc: "Tourism once thrived in Algeria before the war years drove visitors away. With careful investment and improved security, we can begin restoring this vital sector."
 ALG_restore_hotel_resorts: "Restore Hotel Resorts"
 ALG_restore_hotel_resorts_desc: "Many of Algeria's resorts and hotels lie in ruins or disrepair. Renovating them will help attract foreign visitors and provide domestic jobs."
 ALG_blida_airbase_modernization: "Blida Airbase Modernization"
 ALG_blida_airbase_modernization_desc: "The Blida airbase is a key facility for both civilian travel and military transport. Modernizing it will improve Algeria's connectivity and boost regional commerce."
 ALG_algiers_oran_highway: "Algiers–Oran Highway"
 ALG_algiers_oran_highway_desc: "Linking Algiers to Oran with a modern highway will shorten transport times, support trade, and strengthen Algeria's economic backbone."
 ALG_east_west_highway_project: "East–West Highway Project"
 ALG_east_west_highway_project_desc: "Stretching across the length of Algeria, the East–West Highway will be one of the largest infrastructure projects in Africa, connecting our regions and stimulating commerce."
 ALG_ski_resorts_of_tikjda: "Ski Resorts of Tikjda"
 ALG_ski_resorts_of_tikjda_desc: "In the Kabyle mountains lies Tikjda, a resort with untapped potential. Modernizing its facilities and promoting winter tourism will diversify Algeria's economic base."
 ALG_north_african_tourism_hub: "North African Tourism Hub"
 ALG_north_african_tourism_hub_desc: "By investing in our coasts, cultural heritage, and natural landscapes, Algeria can become the leading tourism destination in North Africa, rivaling our Mediterranean neighbors."
 ALG_it_investments: "IT Investments"
 ALG_it_investments_desc: "With the speed at which IT technology is evolving, we can't do without it in the future. So it is high time to invest in this sector."
 ALG_infrastructure_investments: "Infrastructure Investments"
 ALG_infrastructure_investments_desc: "Our infrastructure after the 90's is in a deplorable state. It's about time it was rebuilt"
 ALG_science_idea: "Algerian Science and Education"
 ALG_fuel: "Algerian Fuel"
 ALG_dziri: "Dziri"
 ALG_dziri_desc: "Algeria must address its pressing social questions: from tradition and Islam to Amazigh rights and democratic reforms. The path we choose will shape the nation."
 ALG_traditions_matter: "Traditions Matter"
 ALG_traditions_matter_desc: "The Algerian people hold tight to faith, family, and national identity. Our government must respect these traditions if we are to maintain legitimacy."
 ALG_restrict_women_roles: "Preserve the Family Code"
 ALG_restrict_women_roles_desc: "Conservative leaders argue that women's roles should remain centered on family. Reforming the Family Code risks angering religious authorities and the public."
 ALG_expand_berber_rights: "Recognize Amazigh Rights"
 ALG_expand_berber_rights_desc: "The Berber identity movement demands full cultural and linguistic recognition. Granting Amazigh rights would defuse tensions but could alienate hardliners."
 ALG_censor_internet: "Censor the Internet"
 ALG_censor_internet_desc: "Social media and online activism have fueled protests. Restricting online freedoms will restore state control but damage our international image."
 ALG_open_civil_society: "Open Civil Society"
 ALG_open_civil_society_desc: "Democratic forces push for a free civil society, NGOs, and Hirak associations. Opening this space would strengthen legitimacy but risk political fragmentation."
 ALG_integration_policy: "Integration Policy"
 ALG_integration_policy_desc: "Sub-Saharan migrants and returning diaspora face challenges. A structured integration policy can reduce social tensions and promote cohesion."
 ALG_marriage_subsidies: "Marriage Subsidies"
 ALG_marriage_subsidies_desc: "With youth struggling to marry and start families, subsidies for housing and weddings will stabilize society and encourage family formation."
 ALG_constitutionalize_rights: "Constitutionalize Rights"
 ALG_constitutionalize_rights_desc: "We can lock in civil liberties, women's rights, and Amazigh recognition through constitutional reform. This would signal a permanent social shift."
 ALG_berber_right: "Amazigh Recognition"
 ALG_berber_right_desc: "The Amazigh identity has been officially recognized, boosting stability in Berber-majority regions."
 Algeria.238.t: "Stabilize Mali"
 Algeria.238.d: "The ongoing conflict in Mali threatens to destabilize the entire Sahel region. Tuareg separatists and jihadist groups have created a security crisis on our southern border. Algeria cannot afford to remain passive while instability spreads. We must decide whether to support the Malian government in restoring order, or to pursue negotiations with the Tuareg factions in the hope of achieving a lasting settlement."
 Algeria.238.a: "Support the Malian Government"
 Algeria.238.b: "Provide Support to Tuareg Forces"
 ALG_us_invest_tt: "Seek American investment in Algeria"
 ALG_fra_invest_tt: "Seek French investment in Algeria"
 ALG_eng_invest_tt: "Seek English investment in Algeria"
 ALG_chi_invest_tt: "Seek Chinese investment in Algeria"
 ALG_rus_invest_tt: "Seek Russian investment in Algeria"
 ALG_open_to_west: "Open to the West"
 ALG_open_to_west_desc: "Algeria has long pursued neutrality, but times are changing. Aligning ourselves more closely with the Western world could bring stability, security, and investment opportunities."
 ALG_nato_partnership: "NATO Partnership"
 ALG_nato_partnership_desc: "We will explore structured cooperation with NATO. This partnership will strengthen Algeria's international standing and help modernize our armed forces."
 ALG_energy_partnership_eu: "Energy Partnership with the EU"
 ALG_energy_partnership_eu_desc: "Algeria's vast energy reserves are highly sought after in Europe. By forging energy partnerships with France and the United Kingdom, we can secure lucrative contracts and long-term investments."
 ALG_strengthen_eu_trade: "Strengthen EU Trade Relations"
 ALG_strengthen_eu_trade_desc: "Europe remains our largest trading partner. Strengthening these economic ties will stabilize our export market and integrate Algeria further into global commerce."
 ALG_expand_us_partnership: "Expand US Partnership"
 ALG_expand_us_partnership_desc: "The United States seeks stability in North Africa. By expanding economic and security cooperation with Washington, Algeria can attract investment and gain a powerful ally."
 ALG_become_nato_ally: "Become a NATO Ally"
 ALG_become_nato_ally_desc: "While full membership in NATO may be premature, Algeria can obtain a status as a trusted ally. This would grant us access to military expertise, joint exercises, and diplomatic leverage."
 ALG_exchange_research_with_nato: "Exchange Research with NATO"
 ALG_exchange_research_with_nato_desc: "Scientific cooperation with NATO allies will allow Algeria to benefit from joint research, military technology sharing, and modernization of our education and research institutions."
 ALG_get_nato_military_exp: "Gain NATO Military Expertise"
 ALG_get_nato_military_exp_desc: "NATO's extensive military training and doctrine offer valuable expertise. Algeria's armed forces will modernize through combined training exercises and strategic guidance."
 ALG_counterterrorism_coordination: "Counterterrorism Coordination"
 ALG_counterterrorism_coordination_desc: "Terrorism remains a major threat in North Africa. By coordinating with NATO's intelligence and counterterrorism units, Algeria can strengthen domestic security and regional stability."
 ALG_get_investements_from_nato: "Attract NATO Investments"
 ALG_get_investements_from_nato_desc: "Our NATO alignment will attract economic support and infrastructure projects from alliance members, ensuring long-term benefits for Algeria's economy."
 ALG_strengthen_democratic_norms: "Strengthen Democratic Norms"
 ALG_strengthen_democratic_norms_desc: "To fully integrate with the Western world, Algeria must strengthen democratic institutions. This includes protecting civil liberties, supporting pluralism, and encouraging political reform."
 ALG_seek_greater_influence_in_wto: "Seek Greater Influence in the WTO"
 ALG_seek_greater_influence_in_wto_desc: "As Algeria develops, we must expand our role within the World Trade Organization, ensuring our voice is heard in global economic negotiations."
 ALG_seek_security_council_seat: "Seek UN Security Council Seat"
 ALG_seek_security_council_seat_desc: "Algeria's diplomatic history and peacekeeping record give us a strong case for a permanent presence on the UN Security Council. We must push for this ambition."
 ALG_join_nato: "Join NATO"
 ALG_join_nato_desc: "After decades of neutrality and cautious balancing, Algeria now prepares to take a historic step: full NATO membership. This decision will cement our place among Western powers and reshape our foreign policy."
 ALG_global_companies: "Invite Global Corporations"
 ALG_global_companies_desc: "By opening our markets to foreign investors, Algeria can attract global corporations to establish a presence in our economy. This will boost industrial growth, technology transfers, and international prestige."
 ALG_huawei: "Huawei Telecommunications"
 ALG_huawei_desc: "Huawei has offered to establish advanced telecommunications infrastructure in Algeria, providing us with a modern digital backbone and securing our role in the information age."
 ALG_hyundai: "Hyundai Industrial Expansion"
 ALG_hyundai_desc: "Hyundai has expressed interest in investing in Algeria's vehicle and industrial sectors. By welcoming their factories, we can stimulate employment and technological development."
 ALG_weapons_expert: "Foreign Weapons Expertise"
 ALG_weapons_expert_desc: "Through cooperation with foreign defense firms, Algeria can acquire new expertise in support weapons and tactical systems, strengthening our ground forces."
 ALG_airburst_weapons: "Develop Airburst Weapons"
 ALG_airburst_weapons_desc: "Airburst technology allows infantry to strike enemies behind cover or in fortified positions. Investing in this cutting-edge system will greatly increase our battlefield effectiveness."
 ALG_vehicle_industry: "Expand Vehicle Industry"
 ALG_vehicle_industry_desc: "By partnering with global carmakers and industrial firms, Algeria can establish a strong military and civilian vehicle industry to boost both defense and the economy."
 ALG_advanced_ultility_vehicle: "Advanced Utility Vehicles"
 ALG_advanced_ultility_vehicle_desc: "Our automotive sector must move into advanced development. Producing modern, reliable utility vehicles will strengthen logistics and transport efficiency."
 ALG_sat_tech: "Satellite Technology Cooperation"
 ALG_sat_tech_desc: "Through partnerships with global firms, Algeria can develop advanced satellite technology, improving our surveillance, communications, and positioning systems."
 ALG_advanced_radar: "Advanced Radar Systems"
 ALG_advanced_radar_desc: "Modern radar and detection technology will give Algeria greater defensive capabilities and allow us to integrate into advanced regional security frameworks."
 ALG_microsoft: "Microsoft Digital Infrastructure"
 ALG_microsoft_desc: "By partnering with Microsoft, Algeria can modernize its IT and software sectors, enhancing cybersecurity, digital administration, and technology-driven growth."
 ALG_Lenovo: "Lenovo Technology Investment"
 ALG_Lenovo_desc: "Lenovo is interested in expanding its presence in Algeria. Collaborating with them will strengthen our computing hardware industry and support technological innovation."
 ALG_Danone: "Danone Food Industry Expansion"
 ALG_Danone_desc: "Welcoming Danone's investment in Algeria's food sector will boost nutrition, food production standards, and international trade relations."
 ALG_toyota: "Toyota Industrial Partnership"
 ALG_toyota_desc: "By inviting Toyota to establish industrial and automotive facilities, Algeria can enhance vehicle production, create jobs, and promote technological advancement in the automotive sector."
 ALG_align_with_south_africa: "Align with South Africa"
 ALG_align_with_south_africa_desc: "South Africa plays a leading role in Africa's political and economic affairs. By strengthening our partnership, we can coordinate policies on trade, diplomacy, and security across the continent."
 ALG_open_to_east: "Open to the East"
 ALG_open_to_east_desc: "Turning to the East will diversify our partnerships, reduce dependency on the West, and unlock opportunities in markets such as Russia, China, and other rising powers."
 ALG_expand_trade_with_russia: "Expand Trade with Russia"
 ALG_expand_trade_with_russia_desc: "Russia offers Algeria new opportunities in energy, arms, and industrial cooperation. Strengthening our trade ties will deepen strategic relations."
 ALG_expand_trade_with_china: "Expand Trade with China"
 ALG_expand_trade_with_china_desc: "China is eager to invest in Africa and is offering Algeria beneficial trade deals. This cooperation could provide us with infrastructure and industrial development."
 ALG_mediterranean_corridor_initiative: "Mediterranean Corridor Initiative"
 ALG_mediterranean_corridor_initiative_desc: "By linking our economy more tightly with Mediterranean and Eastern markets, Algeria can establish itself as a key corridor for trade and infrastructure projects."
 ALG_Investments_From_East: "Eastern Investments"
 ALG_Investments_From_East_desc: "Attracting investors from the East will strengthen our economy, provide new industries, and ensure that Algeria benefits from diversified sources of capital."
 ALG_eastern_alignment: "Eastern Alignment"
 ALG_eastern_alignment_desc: "A stronger alignment with Russia, China, and their allies will give Algeria new partners in security, trade, and technology while reducing Western influence."
 ALG_china_civ: "Chinese Civilian Investments"
 ALG_china_civ_desc: "Chinese corporations are ready to expand into Algeria's civilian industries. These projects will generate jobs and accelerate modernization."
 ALG_china_civ2: "Further Chinese Civilian Projects"
 ALG_china_civ2_desc: "After the success of earlier ventures, China is offering additional investments to expand Algeria's civilian industrial base even further."
 ALG_chinese_armor_deal: "Chinese Armor Deal"
 ALG_chinese_armor_deal_desc: "China has proposed selling Algeria armored vehicles and technology packages. This deal will improve our land forces and deepen defense ties."
 ALG_joint_military_exercise_with_rus: "Joint Military Exercises with Russia"
 ALG_joint_military_exercise_with_rus_desc: "By conducting joint exercises with Russia, Algeria will improve military coordination and learn from Russian combat experience."
 ALG_russia_inf_tech: "Russian Infantry Technology"
 ALG_russia_inf_tech_desc: "Russian expertise in small arms and infantry tactics can be adapted to Algerian needs, giving our soldiers better tools and training."
 ALG_russia_experience: "Defense Cooperation with Moscow"
 ALG_russia_experience_desc: "Deepening military cooperation with Russia will bring experienced advisors and training programs to Algeria. Our armed forces will emerge stronger and more prepared."
 ALG_idea_parliamentary_republic: "Majlis al-Watani al-Shaabi"
 ALG_idea_presidential_republic: "Presidential System"
 ALG_idea_semi_presidential_republic: "Al-Jumhorya al-Democratia al-Shaabia"
 ALG_release_political_pirsoners: "Release Political Prisoners"
 ALG_release_political_pirsoners_desc: "To open a new chapter for the nation, the new administration will release those detained for political reasons during the years of unrest. This act of clemency is intended to foster national unity and rebuild trust between the people and the state."
 ALG_al_jazair_al_djadida: "Al-Jazair Al-Djadida"
 ALG_al_jazair_al_djadida_desc: "President Abdelmadjid Tebboune's promise of a 'New Algeria' seeks to renew the state's legitimacy through constitutional and administrative reforms, strengthening democratic institutions and public confidence."
 ALG_republic_of_algeria: "The Republic of Algeria"
 ALG_republic_of_algeria_desc: "With the foundations of reform laid, Algeria reaffirms its identity as a republic guided by national sovereignty, social justice, and the will of its citizens."
 ALG_majlis_al_watani_al_shaabi: "Majlis al-Watani al-Shaabi"
 ALG_majlis_al_watani_al_shaabi_desc: "A parliamentary republic would empower the elected representatives of the people to guide the direction of the nation, limiting the dominance of the executive and ensuring collective decision-making."
 ALG_jumhorya_democratia_shaabia: "Al-Jumhorya al-Democratia al-Shaabia"
 ALG_jumhorya_democratia_shaabia_desc: "Maintaining a semi-presidential balance between executive and legislative power could stabilize Algeria's transition, preventing a return to authoritarianism while ensuring decisive governance."
 ALG_deep_state_republic: "The Deep State Republic"
 ALG_deep_state_republic_desc: "Behind a façade of reform, a new power structure emerges. Former generals, businessmen, and bureaucrats consolidate control in the shadows. This ‘Deep State Republic' maintains the illusion of democracy while safeguarding its networks of influence and corruption."
 ALG_tamazgha: "The Tamazgha Dream"
 ALG_tamazgha_desc: "The time has come for the rebirth of Tamazgha — the land of the Amazigh people stretching from the Atlantic to the Nile. A new dawn rises for North Africa, under the banner of freedom and unity."
 ALG_our_land: "Our Sacred Land"
 ALG_our_land_desc: "Our people must reclaim and rebuild the lands that have always been ours. Industry, manpower, and courage will be the foundation of our reborn homeland."
 ALG_expand_our_army: "Expand Our Army"
 ALG_expand_our_army_desc: "The defense of Tamazgha depends on the strength of our army. We must train, arm, and expand our forces to protect our new nation from its many enemies."
 ALG_berber_of_tunisia: "The Berbers of Tunisia"
 ALG_berber_of_tunisia_desc: "Our Amazigh brothers in Tunisia have long been under foreign rule. It is time to unite them under the flag of Tamazgha and free their lands."
 ALG_libya_invasion: "Invasion of Libya"
 ALG_libya_invasion_desc: "From the sands of the Sahara to the shores of Tripoli, Libya is rightfully part of our cultural homeland. We must bring it into the fold of Tamazgha."
 ALG_take_egypt: "March on Egypt"
 ALG_take_egypt_desc: "Egypt holds the key to the eastern border of Tamazgha. Its vast resources and strategic importance make it a vital part of our vision."
 ALG_canary_island: "Seize the Canary Islands"
 ALG_canary_island_desc: "The Canary Islands were once inhabited by Amazigh people — the Guanches. We will bring these islands back under Amazigh sovereignty."
 ALG_take_niger: "Claim Niger"
 ALG_take_niger_desc: "The Tuareg of Niger are Amazigh by blood and heritage. Their deserts will join the great federation of Tamazgha once again."
 ALG_rif_in_morocco: "The Rif in Morocco"
 ALG_rif_in_morocco_desc: "The Rif mountains gave birth to heroes who resisted colonialism. Their bravery inspires us to unify Morocco under the Amazigh cause."
 ALG_demand_mali: "Demand Mali"
 ALG_demand_mali_desc: "The lands of Mali, rich with history and culture, were once part of the great Amazigh empires. It is time to restore our influence in the Sahel."
 ALG_demand_mauritania: "Demand Mauritania"
 ALG_demand_mauritania_desc: "Mauritania's deserts hold Amazigh roots that go deep into our past. Its unification with Tamazgha is the next step in our continental destiny."
 ALG_TAM_unite_tamazgha: "Unite Tamazgha"
 ALG_TAM_unite_tamazgha_desc: "All Amazigh lands must be united under one banner. The dream of Tamazgha is no longer a vision — it is a mission we shall fulfill."
 ALG_expand_more: "Expand the Federation"
 ALG_expand_more_desc: "Tamazgha must not stagnate. Expansion — both industrial and territorial — will ensure our place as a great power of Africa and the Mediterranean."
 ALG_focus_on_our_land: "Focus on Our Land"
 ALG_focus_on_our_land_desc: "Rather than expanding too far, we should focus on developing our land — improving our influence, economy, and unity within Tamazgha itself."
 ALG_expand_to_ME: "Expand to the Middle East"
 ALG_expand_to_ME_desc: "The Middle East is torn by chaos. With strength and purpose, Tamazgha can bring order and Amazigh leadership to the lands of Arabia."
 ALG_take_arabia: "Conquer Arabia"
 ALG_take_arabia_desc: "The Arabian Peninsula lies divided and weak. We will bring the light of Tamazgha to these lands and ensure our dominance over the Red Sea and the Gulf."
 ALG_take_levant: "Take the Levant"
 ALG_take_levant_desc: "From the mountains of Lebanon to the plains of Syria and Palestine, the Levant will fall under Tamazgha's banner, bringing us closer to controlling the cradle of civilization."
 ALG_legacy_of_dihiya: "Legacy of Dihya"
 ALG_legacy_of_dihiya_desc: "Queen Dihya, the fearless warrior of the Aurès, once united the Amazigh tribes against foreign invaders. Her spirit of defiance and leadership lives on within our people. We carry her legacy forward — unbroken, unyielding, and forever free."
 ALG_de_arabisation_mission_desc: "The national campaign of cultural and linguistic reform is underway. Bureaucracy and education are being rewritten to reflect Amazigh heritage. This transformation will cause short-term strain but strengthen our nation in the long run."
 ALG_dearabisation_end_TT: "§GThe De-Arabisation process concludes.§! Arab cores are replaced by Amazigh ones, and we gain the national idea §Y'Imazighen Perseverance'§!."
 ALG_de_arabisation: "De-Arabisation Campaign"
 ALG_de_arabisation_desc: "For centuries, our people's true identity has been buried under imposed cultures. We will reclaim our roots by reforming education, administration, and language policies — even if it disrupts our society in the short term."
 ALG_dearabisation_penalty: "Administrative Upheaval"
 ALG_dearabisation_penalty_desc: "The De-Arabisation process has disrupted the state bureaucracy and education system. Resistance, confusion, and inefficiency plague the transition as the government attempts to rebuild institutions in the Amazigh image."
 ALG_imazighen_perseverance: "Imazighen Perseverance"
 ALG_imazighen_perseverance_desc: "Through hardship and reform, our people endured. The Amazigh spirit has proven unbreakable — we emerge from the storm stronger, prouder, and unified."
 ALG_dearabisation_start_TT: "§RThe De-Arabisation process begins.§!\n• Stability: §R−10%§!\n• Temporary penalties to bureaucracy and education.\n• The process will last §Y6 months§! before concluding."
 ALG_el_salam_nuclear_reactor: "El Salam Nuclear Reactor"
 ALG_el_salam_nuclear_reactor_desc: "To meet Algeria's growing energy demand and reduce dependence on fossil fuels, the government will begin construction of the El Salam nuclear reactor. This project represents a major step toward scientific progress and energy diversification."
 ALG_uranium_enrichment: "Uranium Enrichment Program"
 ALG_uranium_enrichment_desc: "Developing a domestic uranium enrichment capability will allow Algeria to manage its own nuclear fuel supply. With this program, our scientists aim to master centrifuge technology and achieve nuclear self-sufficiency."
 ALG_el_nour_nuclear_facility: "El Nour Nuclear Facility"
 ALG_el_nour_nuclear_facility_desc: "Following the success of the El Salam reactor, Algeria will expand its nuclear infrastructure by constructing the El Nour facility — a hub for research, reactor maintenance, and peaceful nuclear development."
 ALG_ask_for_help_from_india: "Seek Indian Assistance"
 ALG_ask_for_help_from_india_desc: "India has decades of experience developing nuclear energy under international scrutiny. By reaching out to New Delhi for technical and scientific cooperation, Algeria can advance its civilian nuclear program more rapidly."
 ALG_buy_pinaka_launcher: "Purchase Pinaka Rocket Launchers"
 ALG_buy_pinaka_launcher_desc: "The Indian-made Pinaka multiple rocket launcher is a cost-effective and reliable system. Acquiring these launchers will strengthen Algeria's artillery divisions and foster closer military cooperation with India."
 ALG_indian_missiles: "Acquire Indian Missile Technology"
 ALG_indian_missiles_desc: "Through expanded defense collaboration with India, Algeria may gain access to advanced missile guidance and propulsion systems. Integrating this technology will significantly enhance our national defense capabilities."
 ALG_dearabisation_success_TT: "You have successfully reversed the Arabisation policy: Amazigh rights restored, cultural institutions strengthened."
 ALG_dearabisation_failure_TT: "De-Arabisation efforts failed. Arab influence remains strong, unrest grows among Amazigh communities."
 ALG_subsidise_amazigh_businesses: "Subsidise Amazigh-Run Businesses"
 ALG_subsidise_amazigh_businesses_desc: "Provide state subsidies and preferential support to Amazigh entrepreneurs, encouraging economic growth in Tamazgha regions."
 ALG_subsidise_amazigh_businesses_TT: "Boosts Amazigh economic participation, increases stability, and raises satisfaction among Amazigh groups."
 ALG_leave_arab_league: "Leave the Arab League"
 ALG_leave_arab_league_desc: "Withdraw Algeria from the Arab League, asserting a sovereign Amazigh identity separate from Arab bloc politics."
 ALG_leave_arab_league_TT: "Severs institutional ties to Arab League. May cost prestige but raises minority morale."
 ALG_bring_back_amazigh_exiles: "Bring Back Amazigh Exiles"
 ALG_bring_back_amazigh_exiles_desc: "Facilitate the return of Amazigh exiles and immigrants, offering incentives for resettlement."
 ALG_bring_back_amazigh_exiles_TT: "Returns diaspora populations, adds manpower and factories, boosts regional identity and satisfaction."
 ALG_boost_kabyle_population: "Boost Kabyle Population"
 ALG_boost_kabyle_population_desc: "Implement policies to increase Kabyle demographic share via incentives, resettlement and support."
 ALG_boost_kabyle_pop_TT: "Raises Kabyle ethnic proportion, increases Kabyle satisfaction but may provoke backlash from Arabs."
 ALG_de_arabisation_category: "Tamazgha De-Arabisation Program"
 ALG_de_arabisation_category_desc: "To build a new Tamazgha, we must shed the imposed Arab identity and restore the Amazigh soul of our nation."
 ALG_de_arabisation_mission: "De-Arabisation Process"
 ALG_return_amazigh_exiles: "Bring Back Amazigh Exiles and Immigrants"
 ALG_return_amazigh_exiles_desc: "Decades of discrimination forced many to flee. It is time to bring them home."
 ALG_dearabisation_fail_TT: "Failure weakens stability and increases ethnic tension."
 ALG_amazigh_businesses_complete_TT: "Kabyle satisfaction and economy improve."
 ALG_amazigh_businesses_fail_TT: "Failure decreases Kabyle satisfaction."
 ALG_return_exiles_complete_TT: "Returning exiles strengthen Amazigh identity and manpower."
 ALG_return_exiles_fail_TT: "Failure to repatriate exiles weakens unity."
 ALG_leave_arab_league_complete_TT: "Leaving the Arab League boosts Tamazgha's sovereignty."
 ALG_leave_arab_league_fail_TT: "Failure to leave causes unrest."
 ALG_kabyle_pop_complete_TT: "Kabyle population grows, national unity increases."
 ALG_kabyle_pop_fail_TT: "Neglecting Kabyle demographics causes unrest."
 ALG_tamazgha_cultural_revival_category: "Tamazgha Cultural Revival"
 ALG_tamazgha_cultural_revival_category_desc: "With Arabisation ended, it's time to restore our cultural, linguistic, and intellectual heritage — the rebirth of Tamazgha begins."
 ALG_amazigh_language_reform: "Amazigh Language Reformation"
 ALG_amazigh_language_reform_desc: "We must restore Tamazight as the national language and promote it through education and administration."
 ALG_tamazight_in_education: "Introduce Tamazight in Education"
 ALG_tamazight_in_education_desc: "Implement Tamazight language in schools and universities to preserve our cultural roots."
 ALG_media_cultural_independence: "Cultural and Media Independence"
 ALG_media_cultural_independence_desc: "Support independent Amazigh media outlets and cultural initiatives free from external influence."
 ALG_tamazgha_regional_cooperation: "Tamazgha Regional Cooperation"
 ALG_tamazgha_regional_cooperation_desc: "Unite North African nations of Amazigh descent in a cooperative framework for a shared future."
 ALG_amazigh_language_reform_complete_TT: "Tamazight becomes a state language and boosts education."
 ALG_amazigh_language_reform_fail_TT: "Failure to reform education delays cultural revival."
 ALG_tamazight_in_education_complete_TT: "Tamazight successfully introduced in education programs."
 ALG_tamazight_in_education_fail_TT: "Education system remains Arab-dominated."
 ALG_media_cultural_independence_complete_TT: "Independent Amazigh media strengthens national identity."
 ALG_media_cultural_independence_fail_TT: "Failure to act weakens cultural influence."
 ALG_tamazgha_regional_cooperation_complete_TT: "Regional unity among Tamazgha nations achieved."
 ALG_tamazgha_regional_cooperation_fail_TT: "Failure to establish cooperation isolates Tamazgha."
 ALG_special_forces_cap_flat_tt: "Modifies £specops_max_texticon §HSpecial Forces Flat Cap§! for §HState of the Algerian Armed Forces§! by [?ALG_special_forces_cap_flat_change|+] (Current: [?ALG_special_forces_cap_flat|+])"
 ALG_terrain_penalty_reduction_tt: "Modifies £terrain_penalty_texticon §HTerrain Penalty Reduction§! for §HState of the Algerian Armed Forces§! by [?ALG_terrain_penalty_reduction_change|+%] (Current: [?ALG_terrain_penalty_reduction|+%])"
