 JAP.conservatism: "£JAP_conservatism （LDP）自由民主党"
 JAP.conservatism_desc: "保守主義 - 自由民主党\n\n自由民主党（LDP）は、1955年に自由党と日本民主党の合併によって結成され、日本社会党の再統一などの政治的動向を背景として成立した。日本を代表する保守政党であり、自由民主主義の理念を掲げ、戦後最長期間にわたり政権を担ってきた。清和政策研究会のような派閥に象徴される多くの保守系議員を含む一方で、比較的リベラルな議員も在籍しており、典型的な包括政党とされる。党内には複数の潮流や派閥が存在し、その政策は時代や指導部によって変動することが多いが、党綱領では家族の絆や愛国心といった保守的価値観を掲げるとともに、地方分権の推進などを通じた小さな政府の実現を掲げている。安全保障政策では日米安全保障条約を中心とした現実主義的立場を取り、憲法第9条については現在の解釈を維持しつつ、自衛隊を憲法に明記する方向性を示している。"
 JAP.liberalism: "£JAP_liberalism （DPJ）民主党"
 JAP.liberalism_icon: "£JAP_liberalism"
 JAP.liberalism_desc: "自由主義 - 民主党\n\n民主党（DPJ）は、1998年に複数の野党勢力の合流によって結成され、長年続いた保守政権に対する中道左派の改革志向の代替勢力として位置付けられた。党綱領は、より清廉な政治、透明性と説明責任の強化、そして既得権化した中央官僚機構から市民や地方自治体への政治的影響力の移行を強調している。\n\n民主党は、機会均等と公平性に基づく包摂的社会を推進し、日本の戦後憲法秩序の擁護と密接に結び付けられている。憲法第9条と平和主義的戦略文化を広く支持する一方で、領土防衛や国民保護のための必要な手段として日本の自衛隊を認めている。"
 JAP.socialism: "£JAP_socialism （KP）公明党"
 JAP.socialism_icon: "£JAP_socialism"
 JAP.socialism_desc: "社会民主主義 - 公明党\n\n公明党は1998年に現在の形で再結成され、「人間性社会主義」を掲げる政党として、人間の安全保障、尊厳、社会福祉を公共政策の中心に据えている。思いやりに基づく統治、現実的な社会改革、生命尊重の倫理を重視し、日本の主要政治勢力に十分に代表されていないと感じる一般市民の声を代弁する政党として位置付けられている。\n\n制度面では、公明党は中央官庁に対する地方および都道府県の自治を強化することで、より分権的な国家体制を提唱している。外交および経済政策では、拡大する貿易や安定した地域関係（中国との関与を含む）を通じた繁栄をしばしば強調する一方で、米国との同盟という日本の戦略的要請との均衡を図る姿勢を示している。"
 JAP.Neutral_Communism: "£JAP_Communist_State （JCP）日本共産党"
 JAP.Neutral_Communism_desc: "民主共産主義 - 日本共産党\n\n日本共産党（JCP）は、国家政権に参加したことのない世界最大級の共産党の一つである。ソ連型や中国型のモデルとは異なり、歴史的に独自路線を維持しており、一党独裁的な権威主義を拒否し、日本の民主的枠組みの中で活動する憲法的・議会的勢力として自らを位置付けている。\n\n冷戦終結および1991年のソ連崩壊以降、党は選挙面および組織面で持続的な衰退に直面している。市民的自由、社会福祉、反腐敗政治に関する明確な主張や政策の改革にもかかわらず、社会主義的な経済路線に懐疑的な有権者の間で支持を広げることに苦戦してきた。その結果、日本共産党は主要な野党勢力として、与党連合の監視や国会における原則的な監督役としての立場を維持している。"
 JAP.Nat_Autocracy: "£JAP_Nat_Autocracy （JSDF）自衛隊"
 JAP.Nat_Autocracy_icon: "£JAP_Nat_Autocracy"
 JAP.Nat_Autocracy_desc: "軍事国家主義 - 自衛隊\n\n自衛隊（JSDF）は、日本の戦後安全保障体制と米国との緊密な協力関係の中で1954年に創設され、厳格な憲法上および政治上の制約の下で主として防衛的軍事組織として発展してきた。数十年にわたり、大規模な災害救援や民間支援活動が世論における正当性を形成する上で重要な役割を果たし、自衛隊は信頼される国家機関として広く認識されるようになった。\n\n実戦経験は限定的であるものの、自衛隊は高度な専門性と先進的技術を備え、米軍との相互運用性が高い組織として広く評価されている。新世紀における中心的な政治問題は、その任務範囲である。すなわち、日本が憲法第9条の実質的な意味をさらに再解釈または改正して活動範囲を拡大するのか、それとも制約を強化し、より限定された防衛および国内支援の役割に重点を置くのかという点である。"
 JAP.Monarchist: "£JAP_Monarchist (RNW) 維新政党・新風"
 JAP.Monarchist_icon: "£JAP_Monarchist"
 JAP.Monarchist_desc: "皇政復古主義 - 維新政党・新風\n\n維新政党・新風は、日本の天皇を最高の政治権威へと引き上げ、内閣、国会、そして既存の憲法上の制約の上位に皇位を位置付けることを目指す君主主義運動である。その中心的目標は、国家権力と正統性の最高の源泉として主権を天皇に再集中させる根本的な憲法再設計である。\n\n皇政復古という目的を除けば、同党は最小限の統治綱領しか持たず、主として単一争点の政治運動として自らを提示している。また、憲法上の目標が達成された後は、通常の政党として長期的に政権を担う野心は限定的であるとしており、自らを体制転換の触媒として位置付けている。"
 ENG.conservatism: "£eng_western_conservative （CON）保守党"
 ENG.conservatism_icon: "£eng_western_conservative"
 ENG.conservatism_desc: "保守自由主義 - 保守党（英語：Conservative and Unionist Party, CON）\n\n保守党は、連合王国の擁護、制度的安定、市場志向の統治に根ざした、イギリス政治における主要な中道右派勢力である。通常、財政規律、法と秩序、そして強固な国家防衛態勢を重視しつつ、成長の原動力として民間企業を推進する。\n\n政権にあるとき、この党は実利主義と、一国保守主義的な父権主義から、より対決的で主権重視の保守主義に至るまでの内部潮流との均衡を取る。その持続的な強みは、国政運営を担う本来の政党であるという中核的な主張を捨てることなく、新たな圧力に適応できる点にある。"
 ENG.liberalism: "£eng_western_liberal (LD) 自由民主党"
 ENG.liberalism_icon: "£eng_western_liberal"
 ENG.liberalism_desc: "社会自由主義 - 自由民主党（英語：Liberal Democrats, LD）\n\n自由民主党は、説明責任のある政府、憲法改正、より地方分権化されたイギリスを重視し、改革派かつ市民の自由を擁護する政党として自らを位置づけている。同党は通常、議会による監視機能の強化、選挙制度改革、そして的を絞った公共投資や社会的保護を通じて不平等を是正することを目指す政策を提唱している。\n\n国際的には、欧州のパートナー諸国との緊密な協力やルールに基づく多国間主義を概ね支持しており、その姿勢と並行して、国内においては個人の権利や地域社会レベルの自立を重視している。同党の政治的影響力は、連立政権の構築や、規律ある地方選挙運動によってもたらされることが多い。"
 ENG.socialism: "£eng_western_social_democrat (LAB) 労働党"
 ENG.socialism_icon: "£eng_western_social_democrat"
 ENG.socialism_desc: "社会民主主義 - 労働党（英語：Labour Party, LAB）\n\n労働党は、労働運動と、民主的政府を通じた社会正義の実現という約束を基盤とする、イギリスの主要な中道左派勢力である。一般に、より強力な公共サービス、労働者の権利、そして経済運営における国家のより積極的な役割を優先し、不平等の縮小と生活水準の向上を目指している。\n\nその内部の諸潮流において、労働党は現実的な社会民主主義から、より変革的な経済改革まで幅があるが、一貫して、公平性、共同的な供給、そして政治的説明責任を重視することで定義されている。労働党が政権を担うとき、それは国家戦略を狭い特権ではなく、広範な繁栄に沿わせようとする。"
 ENG.Communist-State: "£eng_emerging_communism (CPB) イギリス共産党"
 ENG.Communist-State_icon: "£eng_emerging_communism"
 ENG.Communist-State_desc: "マルクス・レーニン主義 - イギリス共産党（英語：Communist Party of Britain, CPB）\n\nイギリス共産党は、規模は小さいものの規律あるマルクス・レーニン主義政党であり、イギリスの議会内コンセンサスに対する革命的な代替案としての立場を打ち出している。同党は、主要産業の公有化、強力な労働組合の権限、そして「資本主義的危機管理」と位置づけるものとの断固たる決別を提唱している。\n\n外交政策においては、同党は概して西側の介入主義に反対し、NATO主導の安全保障体制を批判し、より反帝国主義的な姿勢を主張している。選挙での存在感は限定的であるものの、活動家運動、労働組合組織化、およびイデオロギー的なキャンペーンを通じて影響力を維持している。"
 ENG.anarchist_communism: "£eng_emerging_left_wing_radical (SPGB) イギリス社会党"
 ENG.anarchist_communism_icon: "£eng_emerging_left_wing_radical"
 ENG.anarchist_communism_desc: "リバタリアン社会主義 - イギリス社会党（英語：Socialist Party of Great Britain, SPGB）\n\nイギリス社会党は、改革主義的漸進主義を否定し、資本主義を民主的で貨幣のない共同体に完全に置き換えることを主張する、教条的な社会主義組織である。同党は教育、宣伝、そして原則に基づいた政治活動を重視し、その中核的な綱領を希薄化させるような連立を拒否している。\n\nより現実的な左派政党とは異なり、SPGBは議会を妥協的な統治のためではなく、明確な社会主義的権限獲得のための道具として位置づけている。その強みは、大衆的な選挙力にあるのではなく、イデオロギーの一貫性と長期的な運動にある。"
 ENG.Caliphate: "£generic_Caliphate_small (I4UK) イスラム4UK"
 ENG.Caliphate_icon: "£generic_Caliphate_small"
 ENG.Caliphate_desc: "イスラム過激主義 - イスラム4UK（英語：Islam4UK, I4UK）\n\nイスラム4UKは、アル・ムハジロン・ネットワークおよびその対外的なキャンペーンと関連する過激派扇動団体であり、イギリスの法律を強硬的解釈のシャリーア法に置き換え、カリフ制を志向する政治秩序の確立を主張している。同団体は、イギリス国家とその制度を非合法であると位置づける挑発的なデモや対立的な言辞を通じて悪名を高めた。\n\n現代のイギリスにおいて、同組織は指定テロ組織ネットワークの一部として扱われ、対テロ法に基づく取り締まりの対象となっており、その結果、組織は分断され、監視下に置かれ、政治的に有害な存在となっている。それでもなお、特に社会的な緊張や分極化が生じている時期には、非公式なサークルや名称変更を通じて、その思想が再浮上する可能性がある。"
 ENG.Neutral_conservatism: "£eng_non_aligned_conservative (CPA) キリスト教人民同盟"
 ENG.Neutral_conservatism_icon: "£eng_non_aligned_conservative"
 ENG.Neutral_conservatism_desc: "キリスト教民主主義 - キリスト教人民同盟（英語：Christian People's Alliance, CPA）\n\nキリスト教人民同盟は、イギリスの公共生活は明確なキリスト教的社会教義と道徳的保守主義によって導かれるべきであると主張する、小規模なキリスト教民主主義政党である。同党は、家族政策や文化問題に対する確固たる立場に加え、社会正義と地域社会の責任を重視しており、主要政党内の派閥というよりは、それらに対する代替勢力として自らを位置づけている。\n\n政治的には、CPAは地方での選挙運動や課題主導型の活動を通じて影響力を求め、法律、教育、国家権力の限界に関する議論を形作ることを目指している。その影響力は選挙での強さによるものではなく、献身的な支持者を動員し、不都合な問題を公の場に引き出す能力によるものである。"
 ENG.neutral_Social: "£eng_non_aligned_social_democrat (SDP) 社会民主党"
 ENG.neutral_Social_icon: "£eng_non_aligned_social_democrat"
 ENG.neutral_Social_desc: "社会民主主義 - 社会民主党（英語：Social Democratic Party, SDP）\n\n社会民主党は、経済分野における積極的な国家の役割に加え、イギリスにはより強い「共有された責任感」、家族の安定、そして社会的結束が必要であると主張する、小規模な共同体主義的社会民主主義政党である。同党は、一般市民のコミュニティを軽視する「エリートによる合意形成政治」と位置づけるものを拒絶しつつ、公共投資と国家の再生を支持している。\n\n政治的には、SDPは経済的には左派、文化的には伝統的という立場をとり、主流の右派にも左派にも見捨てられたと感じている有権者の支持獲得を目指している。議会における影響力は限定的だが、国家が不確実な状況にある時期には、地方での選挙運動や圧力政治を通じて、その規模以上の影響力を発揮しようと努めている。"
 ENG.Neutral_Libertarian: "£eng_non_aligned_libertarian (LPUK) リバタリアン党"
 ENG.Neutral_Libertarian_icon: "£eng_non_aligned_libertarian"
 ENG.Neutral_Libertarian_desc: "古典的自由主義 - リバタリアン党（英語：Libertarian Party UK, LPUK）\n\nリバタリアン党UKは、個人の自由が国家よりも優先されるべきであり、政府の役割は治安と司法という最小限の中核機能に限定されるべきだと主張する、右派リバタリアン系の小政党である。同党は、自由市場、低税率、規制緩和、国家権力を制限する成文憲法を推進するとともに、より非介入主義的な外交政策を掲げている。\n\n選挙上の規模は依然として小さいが、明確な反国家主義的な政策を打ち出し、主要政党に対して市民的自由の保障や政府の権限縮小を求める圧力をかけることで、世論の議論を形作ることを目指している。"
 ENG.Neutral_Autocracy: "£generic_Neutral_Autocracy_small (EA) イギリスの独裁体制"
 ENG.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 ENG.Neutral_Autocracy_desc: "権威主義的保守主義 - イギリスの独裁体制（英語：The English Autocracy, EA）\n\n「イギリスの独裁体制とは、議会政治を正当性の源泉ではなく弱さの根源と見なす、宮廷および治安機関と連携した強硬派の与党ブロックである。同派は、王国には中央集権的な行政府の下での規律、階層構造、迅速な意思決定が必要であり、反対勢力は法、恩顧、および統制された機関を通じて管理されるべきだと主張する。\n\n実際には、国家権限の拡大、公共秩序維持権限の強化、そしてレジリエンスと再軍備を志向した戦略的国家経済を支持している。その約束は安定と国家の方向性であり、その代償は政治的多元主義である。"
 ENG.Neutral_Communism: "£eng_non_aligned_communism (WRP) 労働者革命党"
 ENG.Neutral_Communism_icon: "£eng_non_aligned_communism"
 ENG.Neutral_Communism_desc: "トロツキー主義 - 労働者革命党（英語：Workers Revolutionary Party, WRP）\n\n労働者革命党は、イギリスの政治を資本主義の「管理された危機」と位置づけ、改革ではなく革命的な体制交代を主張する極左トロツキスト組織である。同党は戦後のトロツキスト潮流から発展し、1970年代に独自の政党として確立した。そのアイデンティティは、幹部規律、徹底したイデオロギー教育、そして労働闘争と結びついた扇動活動を中心に築き上げられた。\n\n1980年代半ばに大規模な内部対立が発生した後、運動は分裂し、社会的影響力は急激に低下した。しかし、正統派トロツキズムの旗印を掲げ続ける、小規模ながらも粘り強い中核グループが残っている。"
 ENG.Neutral_Communism_2017: "£eng_non_aligned_communism_2017 (PBP) 利益の前の国民同盟"
 ENG.Neutral_Communism_2017_icon: "£eng_non_aligned_communism_2017"
 ENG.Neutral_Communism_2017_desc: "トロツキー主義 - 利益の前の国民同盟（英語：People Before Profit、アイルランド語：Pobal Seachas Brabus, PBP）\n\n利益の前の国民同盟は、緊縮財政反対運動と職場組織化に根ざした、急進左派・反資本主義の運動政党である。同党は自らをエコ社会主義と位置づけ、公有制と社会サービスの拡充を推進し、不平等や住宅問題を単なる政策の失敗ではなく、制度的な欠陥として捉えている。\n\n外交政策においてはNATOに敵対的であり、中立を優先するとともに、西側の安全保障体制を紛争激化の要因として提示している。また、憲法上の政治の最終的な帰結として全アイルランドの社会主義的解決を主張し、統一を明確に支持している。"
 ENG.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small (MAB) イギリスムスリム協会"
 ENG.Neutral_Muslim_Brotherhood_icon: "£muslim_brotherhood_small"
 ENG.Neutral_Muslim_Brotherhood_desc: "イスラム主義 - イギリスムスリム協会（英語：Muslim Association of Britain, MAB）\n\nイギリスムスリム協会は、信仰に基づく地域活動、政治参加、および国内外の政策問題に関する公的キャンペーンを展開する、イギリスのスンナ派イスラム教徒による組織である。同団体は、連合活動や草の根組織化を通じて存在感を高め、イギリスにおけるムスリムの市民参加の代弁者としての立場を打ち出している。\n\n批判派は、同団体がムスリム同胞団に端を発する政治的イスラムに依拠していると主張する一方、同団体は自らを独立したイギリスの組織であると位置付けている。実際には、同団体は主流派の擁護活動とイデオロギー的な運動政治との間の争点となる領域に位置しており、その影響力は、公式な選挙による権力と同様に、世論の監視によっても形作られている。"
 ENG.Neutral_green: "£eng_non_aligned_greens (GPEW) 緑の党"
 ENG.Neutral_green_icon: "£eng_non_aligned_greens"
 ENG.Neutral_green_desc: "緑の政治 - 緑の党（英語：Green Party of England and Wales, GPEW）\n\nイングランド・ウェールズ・緑の党は、気候政策を国家全体の基本方針と位置づける環境保護主義的で進歩的な政党である。同党は、急速な脱炭素化、再生可能エネルギーの拡大、汚染や生物多様性の損失に対する規制強化を優先課題とし、その政策を社会正義や地域社会レベルのエンパワーメントと結びつけている。\n\n同党は、生態系の持続可能性と経済的レジリエンスは切り離せないものであると主張し、政治改革、市民的自由、公共サービスへの投資を推進している。その強みは、地方自治体における地盤と、議席数が限られている場合でも国の政策課題を動かすことのできる、特定課題に焦点を当てた運動にある。"
 ENG.Nat_Autocracy: "£eng_nationalist_military_junta (BAF) イギリス軍"
 ENG.Nat_Autocracy_icon: "£eng_nationalist_military_junta"
 ENG.Nat_Autocracy_desc: "軍事政権 - イギリス軍（英語：British Armed Forces, BAF）\n\n政治的支配勢力としてのイギリス軍は、国家の危機や文民指導部の機能不全を理由に、軍服を着た者たちによる非常事態下の統治を体現している。その教義は、党派間の論争よりも安全保障、指揮系統の継続、国家の維持を優先し、各省庁は軍の監督下に置かれ、政策は作戦上の必要性によって決定される。\n\n実際には、これは再軍備の加速、国内治安権限の拡大、そしてレジリエンスと動員を重視した戦略的経済を意味する。その約束は秩序と抑止力であるが、そのリスクは、合意が命令に取って代わられるイギリスの誕生である。"
 ENG.Nat_Fascism: "£eng_nationalist_fascism (BNP) イギリス国民党"
 ENG.Nat_Fascism_icon: "£eng_nationalist_fascism"
 ENG.Nat_Fascism_desc: "超国粋主義 - イギリス国民党（英語：British National Party, BNP）\n\nイギリス国民党は、イギリスの諸問題を民族的・文化的な観点から捉え、移民、アイデンティティ、社会秩序に関して強硬な立場を主張する極右民族主義政党である。同党は、帰属と排除をめぐる政治の二極化を図り、自らを「エリートによる裏切り」と称する勢力に対する、狭義に定義された国民共同体の守護者として位置づけている。\n\n地方レベルでは断続的に躍進を遂げてきたものの、BNPは内部の派閥対立、社会的偏見、そして持続的な反対勢力によって大きく制約されており、ほとんどの全国的な文脈において政治的に周縁化された状態にある。その影響力は、統治を通じてというよりは、扇動活動や議論を極端な方向へと導く能力を通じて持続している。"
 ENG.Nat_Populism: "£eng_nationalist_right_wing_populist (UKIP) イギリス独立党"
 ENG.Nat_Populism_icon: "£eng_nationalist_right_wing_populist"
 ENG.Nat_Populism_desc: "右派ポピュリズム - イギリス独立党（英語：UK Independence Party, UKIP）\n\nイギリス独立党は、主権政治、超国家的な統治への敵意、そして国境管理の強化を公約とする、ナショナリスト・右派ポピュリスト政党である。UKIPは、主要政党が無視しきれなかった反体制的なメッセージや圧力キャンペーンを用い、欧州問題をイギリス政治の中心に押し上げることで台頭した。\n\n議席数が限られている場合でも、UKIPの強みはアジェンダ設定にある。同党は右派を分裂させ、保守派の政策綱領を再構築し、文化やアイデンティティの問題を国家的な争点へと変えることができる。その政治手法は、対立、国民投票の論理、そしてイギリスの自治に対する妥協を許さない姿勢によって駆動されている。"
 ENG.Monarchist: "£eng_nationalist_monarchist (HOW) ウィンザー家"
 ENG.Monarchist_icon: "£eng_nationalist_monarchist"
 ENG.Monarchist_desc: "王権絶対主義 - ウィンザー家（英語：House of Windsor、HOW）\n\n統治勢力としてのウィンザー家は、もはや儀礼的な影響力にとどまらない君主制を体現している。同家は、王冠こそが国民統合の究極の基盤であるとし、したがって大臣、安全保障政策、そして国家の進路に対して決定的な権限を保持しなければならないと主張する。この体制の下では、正当性は政党間の競争ではなく、王朝の継承と継続性から導かれるものである。\n\nその教義は、中央集権的な統治、規律ある公の秩序、そして経済と社会を導くための王室機関の戦略的活用を重視する。支持者はこれを「安定」と「国家的目的」と呼ぶが、反対派は「勅令による統治への回帰」と呼んでいる。"
 USA.conservatism: "£USA_conservatism_small 共和党"
 USA.conservatism_icon: "£USA_conservatism_small"
 USA.conservatism_desc: "保守主義 - 共和党はアメリカ保守主義の「伝統ある偉大な党」である。1854年に反奴隷制政党として設立され、現代においては主に自由主義的な価値観に対してロナルド・レーガンによる保守主義が勝利したことにより形成された。近年、同党はますます社会保守主義の傾向を強めており、福音派キリスト教徒が大量に流入している。包括政党として、主要な穏健確立派やさまざまな保守的な草の根運動との間に幅広い意見が存在する。"
 USA.liberalism: "£USA_liberalism_small 民主党"
 USA.liberalism_icon: "£USA_liberalism_small"
 USA.liberalism_desc: "自由主義 - かつては経済自由主義、ポピュリズム、社会保守主義の政党であったが、現在は社会正義、平等、社会自由主義を核心的価値とする政党に変身した。主要な支持者はリベラル派であり、広範な中道連合の一部として自由貿易と企業寄りの政策を支持している一方で、より左寄りの解決策を支持する進歩派と社会主義派の派閥も持っている。"
 USA.socialism: "£USA_socialism_small 進歩派"
 USA.socialism_icon: "£USA_socialism_small"
 USA.socialism_desc: "社会民主主義 - £USA_socialism_small 民主党の進歩派は、米国における所得格差の拡大と貧困の増大に取り組むことを主な目的としている。企業寄りである民主党確立派の経済政策を「新自由主義」と称し、構造規制改革や福祉支出の拡大、さらには最富裕層への増税によって財源を確保することを主張している。彼らは熱心に少数派の権利を促進し、社会正義を主張している。"
 USA.Communist-State: "£USA_Communist_State_small アメリカ共産党"
 USA.Communist-State_icon: "£USA_Communist_State_small"
 USA.Communist-State_desc: "£USA_Communist_State_small 共産主義 - アメリカ共産党は、アメリカ社会党内の大きな分裂の後、1919年に設立された。それはアメリカの労働運動や世界中の他の共産党と密接に結びついている。アメリカ共産党は、第一次赤狩りによって地下に追いやられるまで、20世紀初頭の主要勢力であった。この党は近年、アメリカの若年層の間でわずかながら注目を集めている。"
 USA.anarchist_communism: "£USA_anarchist_communism_small PSL"
 USA.anarchist_communism_icon: "£USA_anarchist_communism_small"
 USA.anarchist_communism_desc: "左翼急進派ー社会主義解放党は、労働者世界党から分離した革命的社会主義党である。彼らは、世界的な社会主義と共産主義の運動を支援すること、そしてアメリカの資本主義を根絶することに専念している。"
 USA.Conservative: "£USA_Conservative_small アメリカ第一党"
 USA.Conservative_icon: "£USA_Conservative_small"
 USA.Conservative_desc: "反動主義ーアメリカ第一党は主に外交問題に専念する政党であり、アメリカの国連からの脱退とNATOの解散を求めている。さらに、党は武器を持つ権利を強化し、すべての不法移民を国外追放し、高い関税と環境規制の撤廃を通じて経済的自立を促進したいと考えている。"
 USA.Autocracy: "£USA_Autocracy_small 社会主義労働者党"
 USA.Autocracy_icon: "£USA_Autocracy_small"
 USA.Autocracy_desc: "独裁主義 - 社会主義労働者党はもともとトロツキスト共産党であったが、冷戦中に徐々にフィデル・カストロの影響下に入った。現在は主に「キューバとの連帯」を促進することに専念している。"
 USA.Neutral_Muslim_Brotherhood: "£USA_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラム"
 USA.Neutral_Muslim_Brotherhood_icon: "£USA_Neutral_Muslim_Brotherhood_small"
 USA.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - ネーション・オブ・イスラムは、アフリカ系アメリカ人の政治的および宗教的運動である。イライジャ・ムハマドとマルコムXの前のカリスマ的指導の下で名声を上げ、アフリカ系アメリカ人の社会正義のために戦っており、ワシントンDCのデモ行進に数百万人を動員している。多くの人から黒人至上主義の憎悪集団とみなされ、多くの外国人スンナ派学者からはイスラム教において異端とみなされているが、それでもなお強力な中核メンバーを擁し、中東と北アフリカに重要な同盟国を築いている。"
 USA.Neutral_conservatism: "£USA_Neutral_conservatism_small 立憲派"
 USA.Neutral_conservatism_icon: "£USA_Neutral_conservatism_small"
 USA.Neutral_conservatism_desc: "保守主義 - £USA_Neutral_conservatism_small 共和党の立憲主義者および自由主義寄りの派閥は、自らがゴールドウォーターやレーガンの型に倣った「真の保守派」であると信じている。彼らは、アメリカが建国の価値観から大きく逸脱しすぎていると主張し、各州に対する連邦権力を制限し、財政保守主義を推進し、減税し、外国国家建設から撤退することを主張している。"
 USA.neutral_Social: "£USA_neutral_Social_small 民主社会主義派"
 USA.neutral_Social_icon: "£USA_neutral_Social_small"
 USA.neutral_Social_desc: "民主社会主義 - £USA_neutral_Social_small 民主党の社会主義派閥は、主流派の自由主義と進歩派の漸進主義を拒絶し、経済のすべての重要な部門に対する民主的管理を強化し、強力な福祉国家を確立するという根本的な解決策を支持している。彼らは海外におけるアメリカの軍国主義を拒否し、「自由と民主主義を守る」ために行われた戦争は企業エリートの利益という狭い目的に有利に働くだけだとみなしている。"
 USA.Neutral_Libertarian: "£USA_Neutral_Libertarian_small リバタリアン党"
 USA.Neutral_Libertarian_icon: "£USA_Neutral_Libertarian_small"
 USA.Neutral_Libertarian_desc: "自由主義ーリバタリアン党は、アメリカの基準からすれば、定期的にすべての選挙で競合し、成功した「第三政党」とされる。社会自由主義と経済保守主義を推進し、自らを「個人主義のアメリカ精神の体現者」とみなしている彼らは、あらゆる面で社会を根本的に自由化し、連邦政府を縮小して権力を州と国民に戻そうとしている。彼らは軍国主義と国際主義の両方を拒否し、非介入主義の外交政策を支持する。"
 USA.Neutral_Autocracy: "£USA_Neutral_Autocracy_small 改革党"
 USA.Neutral_Autocracy_icon: "£USA_Neutral_Autocracy_small"
 USA.Neutral_Autocracy_desc: "伝統的保守主義 - 米国改革党は、£USA_conservatism_small 共和党の「新帝国主義」外交政策に対する明確な意見の相違を理由に億万長者のロス・ペローによって設立され、冷戦での勝利後に米国を非介入主義外交政策に戻すことを目指している。同党はNAFTAに反対し、任期制限や選挙改革を通じてアメリカ政治の改革を目指している。1992年の選挙では前例のない得票率18.9%に達し、1998年にはジェシー・ベンチュラをミネソタ州知事に選出した同党は、こうした偉業を再現し、民主党と共和党に代わる有力な政党を提供したいと考えている。"
 USA.Neutral_green: "£USA_Neutral_green_small 緑の党"
 USA.Neutral_green_icon: "£USA_Neutral_green_small"
 USA.Neutral_green_desc: "緑の党ー緑の党は、環境保護主義とフェミニズムを推進する環境社会主義かつ反資本主義の政党である。協同組合と地域社会を基盤とする経済改革を望んでいる。"
 USA.Neutral_Communism: "£USA_Neutral_Communism_small 世界労働者党"
 USA.Neutral_Communism_icon: "£USA_Neutral_Communism_small"
 USA.Neutral_Communism_desc: "共産主義 - 世界労働者党は、1959年にトロツキスト社会主義労働者党からの分裂派閥として誕生した。しかし、彼ら自身も数年後にトロツキズムを放棄した。彼らは主に街頭レベルの活動に焦点を当ててきた。"
 USA.Nat_Populism: "£USA_Nat_Populism_small 右派ポピュリズム派"
 USA.Nat_Populism_icon: "£USA_Nat_Populism_small"
 USA.Nat_Populism_desc: "右派ポピュリズムー£USA_Nat_Populism_small 共和党のポピュリストおよびナショナリスト派閥は、1960 年代に人種差別主義者が民主党から大量に流出した後、伝統的に南部に根ざしてきた。彼らは、リベラルな文化戦争と高い移民率によって自分たちが包囲されていると考えており、自分たちの文化と価値観の侵食を逆転させようと努めている。アウトソーシングによって多くの産業中心地が衰退する中、「メキシコから有権者を輸入するグローバリスト政治家に売り飛ばされる」という彼らの言い分は今、全米に広く共鳴しつつある。"
 USA.Nat_Fascism: "£USA_nazi_party   アメリカ・ナチ党"
 USA.Nat_Fascism_icon: "£USA_nazi_party"
 USA.Nat_Fascism_desc: "ファシズムーアメリカ・ナチ党は白人至上主義のネオナチ党である。長い歴史はあるものの、何度も内紛の中で解散したり、別の人々によって再設立されたりしており、ほとんど人気がなかった。"
 USA.Nat_Autocracy: "£USA_Nat_Autocracy_small アメリカ軍"
 USA.Nat_Autocracy_icon: "£USA_Nat_Autocracy_small"
 USA.Nat_Autocracy_desc: "アメリカ軍は、広義の軍産複合体の中で最大規模かつ、おそらく最も影響力のある部門の一つである。終身職の将軍たちや、彼らに有利に働く強力な国防総省を背景に、万が一この国に最悪の事態が起きた場合、アメリカ軍こそが新政権を掌握する最も高い可能性を秘めている。"
 USA.Monarchist: "£USA_nationalist_monarchist アメリカ王党派運動"
 USA.Monarchist_icon: "£USA_nationalist_monarchist"
 USA.Monarchist_desc: "アメリカ君主主義運動は、何世紀も前の夢を見る人々のための周縁的な運動である。もちろん、自分たち以外にこの運動を真剣に受け止める者はいないが、現実には、政府の組織は本質的にそれほど変わらない。いくつかの役職の肩書きを変えれば、あっという間に立憲君主制ができあがる。しかし、今のところ、この運動は草の根運動を通じて成長することだけを目指しており、彼らの考えや理想を受動的に広めるために、より大きな運動に連合するのは簡単である。"
 ARG.conservatism: "£ARG_conservatism 共和国運動"
 ARG.conservatism_icon: "£ARG_conservatism"
 ARG.conservatism_desc: "保守主義 - 共和国運動（スペイン語：Acción por la República）は、アルゼンチンの保守政党であり、1997年にドミンゴ・カヴァッロによって、新自由主義思想の擁護を掲げて設立された。"
 ARG.liberalism: "£ARG_liberalism 市民連合ARI"
 ARG.liberalism_icon: "£ARG_liberalism"
 ARG.liberalism_desc: "自由主義 - 市民連合ARI（スペイン語：Coalición Cívica ARI, CC-ARI）は、2001年にエリサ・カリオによって設立されたアルゼンチンの社会自由主義政党である。同党は、中道および中道右派の政党で構成されるカンビエモスの加盟政党である。"
 ARG.socialism: "£ARG_socialism 急進市民同盟"
 ARG.socialism_icon: "£ARG_socialism"
 ARG.socialism_desc: "社会主義 ｰ 急進市民同盟（スペイン語：Unión Cívica Radical、通称UCR）はアルゼンチンの社会自由主義を標榜する中道政党である。1891年に急進自由主義者により設立されたこの党には、社会自由主義や社会民主主義に属する様々な思想が入り混じっている。この党は、コリエンテス自由党に次ぐアルゼンチンで2番目に古い政党である。"
 ARG.Communist-State: "£ARG_Communist_State アルゼンチン共産党"
 ARG.Communist-State_icon: "£ARG_Communist_State"
 ARG.Communist-State_desc: "共産主義 ｰ アルゼンチン共産党（スペイン語：Partido Comunista de la Argentina、通称PC）は、1918年1月6日に設立されたアルゼンチンの共産主義政党である。その設立の経緯から、ソビエト連邦共産党とはほぼ自動的に同盟を結んだために、国内の左派との軋轢が生じることとなった。左派陣営は、共産党がアルゼンチンにおける共産革命への寄与ではなくソビエト連邦に対する地政学的優位の提供に動いているとして非難している。"
 ARG.Autocracy: "£ARG_Autocracy 広域戦線"
 ARG.Autocracy_icon: "£ARG_Autocracy"
 ARG.Autocracy_desc: "独裁政治 - 広域戦線（スペイン語：Frente Grande）は、1993年に結成されたアルゼンチンの左派政党である。同党は、当時の新自由主義政策に不満を抱いていたアルゼンチン下院の左派系正義党議員グループやその他の左派勢力によって設立された。"
 ARG.anarchist_communism: "£ARG_left_wing_radical 非妥協党"
 ARG.anarchist_communism_icon: "£ARG_left_wing_radical"
 ARG.anarchist_communism_desc: "急進左派 - 非妥協党（スペイン語：Partido Intransigente）は、アルゼンチンの左派ポピュリスト政党であり、1963年にオスカル・アレンデによって結成された。その党員は、1956年に急進市民連合が分裂して生まれた2つの派閥のうちの1つである非妥協急進市民連合から引き継がれたものである。"
