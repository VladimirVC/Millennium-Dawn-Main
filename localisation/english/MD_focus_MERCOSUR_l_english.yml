l_english:
 #MERCOSUL
 BRA_education_integration: "Education Integration"
 BRA_education_integration_desc: "A shared market is stronger when its member states begin to align how they train future generations. Educational cooperation, mutual recognition, and academic exchange will help create a bloc that is not only economically linked, but institutionally compatible."
 BRA_mercosur_market: "MERCOSUR Market"
 BRA_mercosur_market_desc: "Once the institutional groundwork has been laid, MERCOSUR can move beyond limited coordination and toward something more ambitious: a market with deeper commercial links, broader investment flows, and stronger internal economic gravity. This is where the bloc begins to feel powerful."
 BRA_inv_assoc: "Invite Associate States"
 BRA_inv_assoc_desc: "We are close with MERCOSUR's associate states. To make relations even better, and give their economies a chance to grow, we should invite them and make them proud members of MERCOSUR."
 BRA_maintain_quo: "Consolidate MERCOSUR"
 BRA_maintain_quo_desc: "Expansion is not always strength. A bloc that grows too quickly without consolidating its foundations risks becoming larger, but weaker. We should focus on deepening the cohesion, effectiveness, and internal stability of the members we already have."
 BRA_expand_to_latin_america: "Expand Across Latin America"
 BRA_expand_to_latin_america_desc: "MERCOSUR should not remain confined to its current circle if the wider continent can still be drawn into its orbit. With stronger institutions and a more attractive economic model, we can now look beyond the southern cone and extend our influence across Latin America."
 #Unity Tree
 BRA_americas_unity: "South American Summit"
 BRA_americas_unity_desc: "South America has spent too long divided between national priorities, missed opportunities, and half-finished regional projects. We will convene a South American Summit to relaunch cooperation across the continent, restore momentum to MERCOSUR, and place ourselves at the center of a new regional initiative. If integration is to succeed, it must begin with leadership."
 BRA_americas_unity_TT: "The country that takes this gains a §G+15§! §Yopinion modifier§! with the other §YSouth American countries§!."
 BRA_mercosur: "MERCOSUR"
 BRA_mercosur_desc: "MERCOSUR offers more than a customs arrangement. It offers a foundation for a stronger, more coordinated South America, one built on trade, shared rules, and the gradual expansion of regional influence. If we intend to lead the continent, this is where we begin."
 BRA_trade_agreement: "Trade Agreements"
 BRA_trade_agreement_desc: "A regional bloc cannot survive on symbolism alone. It must lower barriers, align commercial expectations, and create visible economic benefits for its members. By strengthening trade agreements within MERCOSUR, we can turn political rhetoric into practical integration."
 BRA_discuss_currency: "Expand Local Currency Settlement"
 BRA_discuss_currency_desc: "To reduce excessive reliance on the dollar and make intra-bloc trade more stable and flexible, we should expand the use of local currency settlement among member states. Lower exchange costs and stronger financial coordination will be an important step toward a more autonomous regional economy."
 BRA_people_goods: "Free Movement of People and Goods"
 BRA_people_goods_desc: "Trade alone does not complete integration. Only when workers, students, entrepreneurs, and families can move across borders more freely will MERCOSUR become more than a market. It will become a regional space where people live, work, and build lasting ties."
 BRA_assoc_members: "Formalize the Accession Path"
 BRA_assoc_members_desc: "Associate status is useful, but it leaves the regional order unfinished. If MERCOSUR is to become a true political and economic bloc, we must create a formal accession path that allows neighboring states to move from loose association to full membership."
 MER_secretariat_reform: "MERCOSUR Secretariat Reform"
 MER_secretariat_reform_desc: "A larger bloc cannot be managed through improvised diplomacy forever. If new members are to trust MERCOSUR as a serious institution, its administrative core must be strengthened. A more capable secretariat will make accession, coordination, and dispute management far more credible."
 MER_infrastructure_corridor_program: "Infrastructure Corridor Program"
 MER_infrastructure_corridor_program_desc: "Regional integration is meaningless if roads end at borders and logistics collapse in the interior. MERCOSUR must be connected not only by agreements, but by infrastructure that moves goods, capital, and people across the continent. A stronger bloc must be physically built, not merely declared."
 MER_development_fund: "MERCOSUR Development Fund"
 MER_development_fund_desc: "Some states will not be persuaded by promises alone. They will join only if integration brings visible development and real investment. By establishing a MERCOSUR Development Fund, we can turn accession into opportunity and make membership materially attractive."

 mercosur_member_state_modifier: "Mercosur Member State"
 mercosur_member_state_modifier_desc: "MERCOSUR began as a customs and political framework centered on Brazil, Argentina, Uruguay, and Paraguay, and later expanded across South America through associate partnerships. Participation in the bloc ties our future to a broader regional project of trade, coordination, and shared development.\n\n§YThis national spirit grows stronger as more associate members and full members join!§!"
 MER_corridor_investment_round_modifier: "MERCOSUR Corridor Investment Round"
 MER_corridor_investment_round_modifier_desc: "Fresh bloc funding is being directed toward roads, logistics corridors, and digital connectivity projects across MERCOSUR. For now, infrastructure construction is moving faster than usual as the current investment round remains active."
 MER_development_fund_round_modifier: "MERCOSUR Development Fund Disbursement"
 MER_development_fund_round_modifier_desc: "The MERCOSUR Development Fund is currently underwriting new civilian and office construction across the bloc. As long as this round of disbursements continues, economic development projects are being pushed forward at an accelerated pace."

 MER_mercosur_diplomacy: "South American Integration"
 MER_mercosur_diplomacy_desc: "MERCOSUR is a framework for expanding trade and strengthening regional market ties, while UNASUL is a broader vision of South American cooperation that reaches into political dialogue, infrastructure, and security. Through these frameworks, South American unity can be strengthened and regional integration can be pushed further forward.\n\n§YThe national spirits for MERCOSUR and UNASUL grow stronger with each new member state!§!"
 MER_invite_CHL_full_member: "Invite Chile as a Full Member"
 MER_invite_CHL_full_member_desc: "Begin negotiations to elevate Chile from associate status to full membership in MERCOSUR.$MER_full_membership_acceptance_hint_desc$$MER_full_membership_invite_process_desc$"
