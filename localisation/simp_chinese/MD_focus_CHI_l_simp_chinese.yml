 CHI_bri_africa_engagement_desc: "非洲“一带一路”倡议累计参与度得分；需与中非合作论坛项目完成情况一同获得，方可解锁非洲大陆一体化顶峰目标。"
 CHI_bri_centralasia_engagement_desc: "中亚地区“一带一路”参与度累计得分；计入丝绸之路经济带走廊加成。"
 CHI_bri_defaulted_projects_desc: "贷款接收方违约的项目数量；触发债务重组和资产扣押之间的选择。"
 CHI_bri_europe_engagement_desc: "欧洲累计“一带一路”参与度得分；需要维持 17+1 机制并解锁后期欧洲连接加成。"
 CHI_bri_latam_engagement_desc: "拉丁美洲“一带一路”倡议累计参与度得分；通过在委内瑞拉、厄瓜多尔、巴西、阿根廷和玻利维亚完成基础设施项目解锁。"
 CHI_bri_meast_engagement_desc: "中东地区“一带一路”倡议参与度累计得分；计入石油元结算采用率。"
 CHI_bri_monthly_income_desc: "在应用收益乘数之前，“一带一路”项目每月产生的人民币收入。"
 CHI_bri_pacific_engagement_desc: "中国与太平洋岛国的交往：外交承认、渔业和海底特许权以及安全谅解。"
 CHI_bri_predatory_score_desc: "追踪我们如何积极地运用债务杠杆和资产扣押策略；高值解锁了汉班托塔学说路径，并增加了违约扣押的机会。"
 CHI_bri_project_slots_desc: "中国同时能够管理的“一带一路”项目数量上限"
 CHI_bri_returns_multiplier_desc: "对项目回报流量应用乘数；通过启用的工程和某些国策完成情况增加。"
 CHI_bri_seasia_engagement_desc: "东南亚地区“一带一路”合作参与度累计得分；影响澜沧江-湄公河合作决议的可用性。"
 CHI_bri_southasia_engagement_desc: "南亚地区“一带一路”合作积分累计值；影响南亚合作伙伴的等级升级速度和加成幅度。"
 CHI_bri_winwin_score_desc: "跟踪我们如何始终如一地应用优惠和改革后的贷款条款；高价值有助于债务重组外交，并提高受援国的善意。"
 CHI_Buffer_State_Doctrine: "缓冲国学说"
 CHI_Buffer_State_Doctrine_desc: "朝鲜是我们与驻韩美军之间的战略缓冲地带。通过强化这一作用，我们确保平壤牢牢处于我们的势力范围之内，并防止任何敌对势力在我们边境建立存在。"
 CHI_chinese_aggression_display: "$CHI_chinese_aggression$: [?CHI.CHI_chinese_aggression]"
 CHI_collective_leadership_active_desc: "七个人围坐在一张桌子旁。这条“总路线”就是这七个人共同商定的路线名称。"
 CHI_Dandong_Lifeline: "丹东生命线"
 CHI_Dandong_Lifeline_desc: "丹东港承担着朝鲜绝大部分的对外贸易，而且贸易流动完全由我们掌控。恢复并扩大这条贸易通道，既能为平壤提供经济命脉，又能巩固我们对朝鲜政权的制约力。"
 CHI_Enforce_Sanctions_Compliance: "强制执行制裁合规"
 CHI_Enforce_Sanctions_Compliance_desc: "通过切实执行对朝鲜的国际制裁，我们展现了对不扩散的承诺，并赢得了美国和日本的善意。平壤会感到不满，但我们在国际社会中的地位将会提升。"
 CHI_focus_tree: "中国国策树"
 CHI_Fortress_of_the_East: "东方要塞"
 CHI_Fortress_of_the_East_desc: "将朝鲜转变为坚不可摧的缓冲国，有利于我们保持战略纵深。我们支持全面军事准备的战略，这使得任何试图对平壤发动进攻的人都将付出极其高昂的代价。"
