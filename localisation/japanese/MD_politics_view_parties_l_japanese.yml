 ECU.conservatism: "£ECU_western_conservative (DP) Popular Democracy"
 ECU.conservatism_desc: "(Christian Democracy) - Formed in 1979 from moderate members of both the Social Christian Union and the Conservative Party - the Popular Democracy party was initially a more centrist leaning party. Since the 90s it has moved more towards the right, adopting more conservative and traditionally Christian democratic positions."
 ECU.socialism: "£ECU_western_social_democrat (ID) Democratic Left"
 ECU.socialism_desc: "(Democratic Socialism) - Formed in 1970, the Democratic Left would see massive electoral success after the restoration of democracy in the country. Gaining the presidency the party was able to guide the newly restored democratic order. Since then it has seen moderate to little electoral gains, though remains nominally committed to its platform of progressivism, social justice, and economic equality."
 ECU.Communist-State: "£ECU_emerging_communism (MPD) Democratic People's Movement"
 ECU.Communist-State_desc: "(Marxism–Leninism) - Founded in 1978, the MPD is the electoral wing of the Marxist–Leninist Communist Party of Ecuador. The goal of the MPD is to facilitate revolution within the country, helping to organize strikes and working with other groups with similar goals to achieve an eventual Marxist-Leninist future."
 ECU.anarchist_communism: "£ECU_anarchist_communism (PAIS) PAIS Alliance/Proud and Sovereign Homeland (Left-Wing)"
 ECU.anarchist_communism_desc: "(Socialism of the 21st century) - Sweeping to power as part of the 'Pink Tide' across Latin America, PAIS initially followed a moderate left agenda blending Bolivarianism, progressivism, and socialist thought together into a broad left populist alliance. Despite its initial success, the party slowly drifted towards the centre, with more right-leaning elements of the party becoming more and more prominent, inspired by 'Third Way' as well as Liberal-aligned ideals."
 ECU.Neutral_conservatism: "£ECU_non_aligned_conservative (PSC) Christian Social Party"
 ECU.Neutral_conservatism_desc: "(Christian Democracy) - Founded in 1951 as the 'Christian Social Movement', the PSC holds a right-leaning and firmly conservative position - aligning heavily with the Christian Democrat movement. With a small, but solid base of support the party has seen - limited - consistent electoral success."
 ECU.neutral_Social: "£ECU_neutral_Social (MUPP) Pachakutik Plurinational Unity Movement – New Country"
 ECU.neutral_Social_desc: "(Indigenismo) - Also simply known as 'Pachakutik', the party was formed in 1995 through the activism of larger Indigenous rights organizations. While the party's main focus is on the issue of Indigenous rights within Ecuador, it also adopts a broader left platform integrating ecosocialism and social justice. Its name, Pachakutik, comes from the Quechua words Pacha and Kuti' and roughly meaning a changing of the world through tumult."
 ECU.Nat_Autocracy: "£ECU_nationalist_military_junta エクアドル軍"
 ECU.Nat_Autocracy_desc: "実用的軍事政権 - 1830年に創設されたエクアドル軍は、スペインと戦った民兵組織を前身とし、後にグラン・コロンビアの一部として発展した。それ以来、同軍の戦闘活動の大部分は、国内紛争、海外派遣、あるいは直近では1995年に発生した隣国ペルーとの小競り合いに限られている。同軍は国連を通じて国際舞台で活躍しており、いくつかの任務に兵士や監視員を派遣している。"
 ECU.Nat_Populism: "£ECU_nationalist_right_wing_populist (PRE) エクアドル・ロルドス主義党"
 ECU.Nat_Populism_desc: "左派ポピュリズム - 1982年に結成されたこの政党は、創設者のアブダラ・ブカラムを中心に展開しており、その名称は、ポピュリストかつ名目上は進歩的な「人民勢力連合」のメンバーであった元大統領ハイメ・ロルドスに由来している。イデオロギー的には、同党は主にブカラムの政治的方針を支持している。創設者のブカラムは1996年に当選したが、マスコミとの対立や支持率の低下を背景に、その精神状態を理由として翌年に弾劾された。"
 EGU.Neutral_Autocracy: "£generic_Neutral_Autocracy_small 赤道ギニア民主党"
 EGU.Neutral_Autocracy_desc: ""
 EGY.conservatism: "£EGY_conservatism 保守党"
 EGY.conservatism_desc: "実用的保守主義 - 保守党は、作家兼ジャーナリストのモスタファ・アブデル・アジズによって設立された。設立当初、同党には多くの著名なエジプト人ジャーナリストや公人が名を連ねていた。現在の党首であるアクマル・ケルタムは、かつて国民民主党の有力な党員であった。\n\nこの党に対する§H軍の評価§!は§G+50§!である"
 EGY.liberalism: "£EGY_liberalism_alt エジプト愛国運動"
 EGY.liberalism_desc: "改革主義 - エジプト愛国運動（エジプト国民運動）は、元大統領候補のアフマド・シャフィク氏と、自由エジプト人党の元副党首でありエジプト人生活党の創設者であるモハメド・アブ・ハメド氏によって結成された政党である。\n\nこの党に対する§H軍の評価§!は§G+50§!である"
 EGY.socialism: "£EGY_socialism 現代エジプト党"
 EGY.socialism_desc: "中道主義 - 現代エジプト党は、国民民主党の元党員によって結成されたエジプトの政党である。\n\nこの党に対する§H軍の評価§!は§G+50§! である"
 EGY.Western_Autocracy: "£EGY_Autocracy_small 国民民主党"
 EGY.Western_Autocracy_icon: "£EGY_Autocracy_small"
 EGY.Western_Autocracy_desc: "包括政党 - 国民民主党（NDP）は、権威主義的な中道政党である。同党は結党当初から、1962年以来の単独与党であったアラブ社会主義連合（ASU）から派生した政党の中で群を抜いて最も強力な存在であり、その意味でASUの自然な後継政党と見なされていた。ASUがアラブ民族主義とアラブ社会主義（ナセル主義）を強く重視していたのに対し、NDPは穏健な中道政党へと発展した。\n\nこの党に対する§H軍の評価§!は§G+50§!である"
 EGY.Communist-State: "£EGY_Communist_State エジプト共産党"
 EGY.Communist-State_desc: "マルクス・レーニン主義 - 現代のエジプト共産党は、旧エジプト共産党の党員数名によって1975年に結成された。アンワル・サダト大統領およびホスニ・ムバラク大統領の政権下において、この新共産党は国家による弾圧に直面し、選挙への立候補を禁じられた。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.Conservative: "£EGY_Conservative 祖国防衛党"
 EGY.Conservative_desc: "中道主義 - 祖国防衛党は、退役軍人らによって結成されたエジプトの中道政党で、穏健な右派政策を提唱している。その後、党は拡大を続け、全国各地に新たな党本部や支部を開設した。支部数は1000に達し、新たな党本部も設置された。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.anarchist_communism: "£EGY_anarchist_communism 労働者民主党"
 EGY.anarchist_communism_desc: "革命的社会主義 - 労働者民主党（WDP）の最も重要な原則は、すべてのエジプト人の宗教的信念を尊重し、宗教、人種、性別に基づく差別に終止符を打つことである。産業の再国有化はWDPの主要な要求の一つであるが、ガマル・アブデル・ナセル政権下のように国営工場の責任者が大統領によって任命されるのとは異なり、WDPはこれらの工場の労働者自身が経営者を任命するよう求めている。WDPは、民営化および独占政策の廃止を主張し、十分な恩恵を受けていない社会階層に利益をもたらすよう開発計画の方向転換を求めている。また同党は、エジプト人労働者の最低賃金引き上げ、国家から独立した労働組合の設立、およびあらゆる職場における労働条件の改善に向け、他の勢力と連携しており、行政腐敗の撲滅や、イスラエルとの経済関係の再検討も求めている。彼らのスローガンは「労働者は団結せよ」である。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.Caliphate: "£generic_Caliphate_small ジハード団"
 EGY.Caliphate_desc: "ジハード主義 - エジプト・イスラム・ジハード団、または聖地解放軍は、当初アル・ジハードと呼ばれ、その後ジハード・グループ、またはジハード団とも称された、1970年代後半から活動しているエジプトのイスラム主義組織である。アルカイダの関連組織として、国連による世界的な制裁対象となっている。\n\nこの党に対する§H軍の評価§!は§R-50§!である"
 EGY.Kingdom: "£EGY_kingdom ヌール党"
 EGY.Kingdom_desc: "サラフィー主義 - ヌール党（光の党）は、厳格なシャリーア法の施行を信条とする、超保守的イスラム主義を掲げている。同党は「サラフィー・コール協会」の政治部門と見なされており、エジプトに存在するいくつかの新しいサラフィー主義政党の中でも、その長い組織運営の経験とカリスマ的な指導者たちによって他を圧倒し、群を抜いて最も有力な存在となっている。同党の政治的目標は、サウジアラビアのようなワッハーブ派に則った神権国家の樹立である。ドイツの公共放送ARDの報道によると、サウジアラビアが同党の主要な資金提供元であることが判明している。\n\nこの党に対する§H軍の評価§!は§R-50§!である"
 EGY.Neutral_conservatism: "£EGY_Neutral_conservatism イスラム党"
 EGY.Neutral_conservatism_desc: "イスラム主義 - イスラム党は、エジプトのイスラム主義政党である。同党の主要な指導者は、モハメド・アブ・サムラとカマル・ハビブである。同党はまた、エジプト・イスラム聖戦組織の支援を受けており、党の創設者の大半は、同組織の元メンバーである。党員の多くは、公職への立候補を禁じる裁判所の判決を受けている。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.oligarchism: "£EGY_oligarchism 共和人民党"
 EGY.oligarchism_desc: "中道主義 - 上院における共和人民党の議員団は、イハブ・ワハバ議員が率いている。同党はイデオロギー的に分類すると中道左派を代表する確固たる路線を持つ市民的・自由主義政党であり、その政治・経済政策や理念もこの傾向を反映している。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.neutral_Social: "£EGY_neutral_Social エジプト社会民主党"
 EGY.neutral_Social_desc: "右派社会民主主義 - エジプト社会民主党（ESDP）は、エジプトの社会自由主義・社会民主主義政党である。同党は、自由で民主的な体制の一環として、自由市場経済と社会正義の両方を重視している。その政策の基盤となるのは、市民権に基づく市民国家を保障する憲法である。これは、アル・タガムムや自由エジプト人党などの他の政党と類似している。ESDPは、エジプトにおける人権の保護と促進を提唱した。これには、市民的自由、表現の自由、および少数派の権利の保護を強化するための取り組みが含まれていた。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.Neutral_Autocracy: "£EGY_Neutral_Autocracy コプト正教会"
 EGY.Neutral_Autocracy_desc: "神権民主政治 - コプト人は、エジプト南部に住む民族・宗教的な先住民族である。独自のキリスト教宗派としてのアイデンティティを持ち、コプト正教会に集約・集中しているコプト人は、しばしば政治生活から隔絶されていた。\n\nこの党に対する§H軍の評価§!は§R-50§!である"
 EGY.Neutral_Communism: "£EGY_Neutral_Communism 革命的社会主義者"
 EGY.Neutral_Communism_desc: "トロツキー主義 - 革命的社会主義者（RS）は、エジプトのトロツキスト組織であり、「下からの社会主義」の伝統に由来する。RSの主要メンバーには、社会学者のサメ・ナギブがいる。 \n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.Neutral_Muslim_Brotherhood: "£EGY_Neutral_Muslim_Brotherhood 自由公正党"
 EGY.Neutral_Muslim_Brotherhood_desc: "自由イスラム主義 - 自由正義党は、エジプトのイスラム主義政党である。名目上は独立した政党であるが、エジプト最大の政治団体であるムスリム同胞団と強いつながりがある。同党は活動禁止処分を受け解散したが、現在も地下活動を行っている。\n\nこの党に対する§H軍の評価§!は§R-100§! である"
 EGY.Neutral_green: "£EGY_Neutral_Green 改革発展党"
 EGY.Neutral_green_desc: "改革発展党の創設者は、元大統領アンワル・サダートの甥であるモハメド・アンワル・エスマト・サダートと、エジプトの億万長者レイモンド・ラカである。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.Nat_Autocracy: "£EGY_Nat_Autocracy エジプト軍"
 EGY.Nat_Autocracy_desc: "実用的軍事政権 - エジプト軍は、エジプト・アラブ共和国の軍事組織であり、国家の自由、独立、および領土保全を守ることを目的としている。陸軍、海軍、空軍、および防空軍で構成されている。 \n\nこの党に対する§H軍の評価§!は§G+100§!である"
 EGY.Nat_Populism: "£EGY_Nat_Populism_alt エジプト・ワフド党"
 EGY.Nat_Populism_desc: "国家自由主義 - エジプト・ワフド党（新ワフド党、アル・ワフド党）は、エジプトの民族主義的自由主義政党である。これは、エジプトで最も古く、歴史的に最も活発な活動を行ってきた政党の一つであるワフド党の系譜を継ぐもので、同党は1952年の革命後に解散した。新ワフド党は1978年に結成し、そのわずか数ヶ月後に禁止されたが、1981年のアンワル・サダト大統領暗殺後に復活した。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 EGY.Monarchist: "£EGY_Monarchist ムハンマド・アリー家"
 EGY.Monarchist_desc: "世俗君主制 - ムハンマド・アリー家は、19世紀から20世紀半ばにかけてエジプトとスーダンを支配した王朝であった。その名は、近代エジプトの創始者と見なされる、その始祖ムハンマド・アリー・パシャにちなんで名付けられた。\n\n§H軍部§!はこの政党に対して§H中立§!の立場をとっている"
 ELS.conservatism: "£generic_conservatism_small Gran Alianza por la Unidad Nacional (GANA)"
 ELS.conservatism_desc: ""
 ELS.liberalism: "£generic_liberalism_small Partido Democrata Cristiano (PDC)"
