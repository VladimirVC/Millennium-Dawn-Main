 ISR.liberalism_alt: "£ISR_liberalism_alt2 シヌイ"
 ISR.liberalism_alt_desc: "（シオニスト自由主義） - §4シヌイ§!（ヘブライ語ローマ字表記：Shinui、変化）\n\nシヌイは、イスラエルにおける反聖職主義の自由市場リベラル政党および政治運動である。同党は二度、クネセトで第三党となったが、いずれも分裂と崩壊に続いてしまった。長年にわたり、イスラエルにおける経済自由主義と世俗主義の旗手であった。"
 ISR.liberalism_alt_icon: "£ISR_liberalism_alt2"
 ISR.liberalism_alt3: "£ISR_liberalism_alt3 イェシュ・アティッド"
 ISR.liberalism_alt3_desc: "（リベラル中道） - §0イェシュ・アティッド§!（ヘブライ語ローマ字表記：Yesh Atid、未来がある）\n\nイェシュ・アティッドは、元司法大臣トミー・ラピドの息子であるヤイル・ラピドによって結成され、反汚職と広範な政府改革を公約に掲げて活動する意図で設立された。元テレビジャーナリストであるラピドは、全てのイスラエル人に軍隊への従軍を呼びかけ、イスラエル国家における宗教的多様性の促進、二国家解決の追求を訴えた。さらに同党は概ねLGBTQ+の権利拡大を支持し、全てのユダヤ人とユダヤ教諸派の平等を推進している。シオニスト政党と位置付けられる一方、パレスチナとの和平交渉再開とイスラエル入植地建設の停止も目指している。"
 ISR.liberalism_alt3_icon: "£ISR_liberalism_alt3"
 ISR.liberalism_alt4: "£ISR_liberalism_alt4 青と白・イスラエル回復党"
 ISR.liberalism_alt4_desc: "（急進的中道主義） - §6青と白・イスラエル回復党§!（ヘブライ語ローマ字表記：Kahol Lavan Hosen LeYisrael）\n\n青と白・イスラエル回復党は、イスラエル国防軍元参謀総長ベニー・ガンツによって設立された、イスラエルの中道・リベラルシオニスト政党である。一般的に、イスラエル回復党は主に中道政党と見なされている。ただし、中道右派あるいは中道左派と評価されることもある。"
 ISR.liberalism_alt4_icon: "£ISR_liberalism_alt4"
 ISR.liberalism_alt5: "£ISR_liberalism_alt5 青と白"
 ISR.liberalism_alt5_desc: "（リベラル中道主義） - §4青と白§!（ヘブライ語ローマ字表記：Kahol Lavan）\n\n青と白は、イスラエルの中道派かつリベラルなシオニスト政治連合である。イスラエル回復党、イェシュ・アティド、テレムによって結成された。"
 ISR.liberalism_alt5_icon: "£ISR_liberalism_alt5"
 ISR.liberalism_alt6: "£ISR_liberalism_alt6 国家統一党"
 ISR.liberalism_alt6_desc: "（リベラル・セントリズム） - §4国家統一党§!（ヘブライ語ローマ字表記：HaMahane HaMamlakhti）\n\n国民統一党（国家連合）は、元イスラエル国防軍参謀総長ベニー・ガンツ率いるイスラエル回復党、元イスラエル国防軍参謀総長ガディ・アイゼンコット、国会議員マタン・カハナで構成されるイスラエルの政治連合である。"
