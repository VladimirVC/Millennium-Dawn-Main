 ITA.Nat_Fascism: "£ITA_nationalist_fascism 三色の炎"
 ITA.Nat_Fascism_desc: "三色の炎党は、1995年にイタリア社会運動が「三色の炎」と「国民同盟」の2つの派閥に分裂した際に設立された。前者である三色の炎は、より過激な派閥である。この党はファシズムに強く触発されており、資本主義と共産主義の両方を公然と批判している。その代わりに、「第三の道」の再現を目指している。"
 ITA.Nat_Populism_desc: "国民同盟党は、1995年にイタリア社会運動が「三色の炎」と「国民同盟」の2つの派閥に分裂した際に設立された。後者である国民同盟は、より穏健な派閥である。その主要な信念は「社会的右翼」イデオロギーに基づいており、伝統主義的で反グローバリズム的な社会観を持ちながら、福祉国家と経済への政府介入を支持している。"
 ITA.Monarchist: "£ITA_nationalist_monarchist サヴォイア家"
 ITA.Monarchist_desc: "サヴォイア家は、ヨーロッパ最古の王朝の一つであり、紀元1000年頃からサヴォイア伯国を統治してきた。リソルジメント（イタリア統一運動）の時代には、サヴォイア王国が半島を統一し、イタリア国家を建国した。しかし、ムッソリーニに実権を事実上委ねた後、第二次世界大戦後の国民投票によって王制は廃止され、サヴォイア家は国外追放された。しかし、憲法第13条の削除により、サヴォイア家は再びイタリアの地に戻ることができた。"
 ITA.Western_Autocracy_roman_desc: "前世紀のファシズムの物語は、薄れかけていた古代ローマの記憶を蘇らせ、やがてその記憶がイタリアを導き、再び帝国の鷲を掲げることとなった。最近台頭した新ローマ帝国は、現代世界の勢力関係を考慮してその野心を縮小したものの、かつての栄光を取り戻すという目標を依然として主要な目的として掲げている。旧来の西側諸国との同盟関係を維持しつつ、ローマに帰属すべき領土を取り戻すという、その両者の適切なバランスを見出すことが、この若き帝国にとって極めて重要となる。戦争は旧来の国境を回復する最も迅速な手段ではあるが、それに伴うリスクは国家が負うには大きすぎる可能性があり、したがってローマの復興を目指す上で、平和的拡大こそが最善の戦略であると信じられている。"
 ITA.Autocracy_roman_desc: "前世紀のファシズムの物語は、薄れかけていた古代ローマの記憶を蘇らせ、やがてその記憶がイタリアを導き、再び帝国の鷲を掲げることとなった。最近台頭した新ローマ帝国は、現代世界の勢力関係を考慮してその野心を縮小したものの、かつての栄光を取り戻すという目標を依然として主要な目的として掲げている。西側諸国に対抗し、その対立を利用するための新たな同盟国の発見は、この若き帝国にとって極めて重要となる。平和的な経済的拡大と外交こそが、かつての国境を取り戻すための最も安全な道かもしれないが、戦争ははるかに迅速であり、ローマの栄光にふさわしい手段である。"
 ITA.Neutral_Autocracy_roman_desc: "前世紀のファシズムの物語は、薄れかけていた古代ローマの記憶を蘇らせ、やがてその記憶がイタリアを導き、再び帝国の鷲を掲げることとなった。最近台頭した新ローマ帝国は、現代世界の勢力関係を考慮してその野心を縮小したものの、かつての栄光を取り戻すという目標を依然として主要な目的として掲げている。西側諸国と東側諸国の勢力を牽制しつつ、ローマに帰属すべき領土を取り戻すという、その両者の適切なバランスを見出すことが、この若き帝国にとって極めて重要となる。戦争は確かにローマ復興を達成するための最速の手段ではあるが、唯一の手段ではない。"
 ITA.oligarchism_roman: "£ITA_roman_senate ローマ元老院"
 ITA.oligarchism_roman_desc: "前世紀のファシズムの物語は、薄れかけていた古代ローマの記憶を蘇らせ、やがてその記憶がイタリアを導き、再びローマの鷲を掲げることとなった。名目上は独裁制ではないものの、権力は国内の産業・政治・軍事エリートの中から選ばれた比較的少数の集団である元老院の手にあり、これは寡頭政治とみなされる。最近台頭した新ローマ共和国は、現代世界の勢力関係を考慮してその野心を縮小したものの、かつての栄光を取り戻すという目標を依然として主要な目的として掲げている。西側諸国と東側諸国の勢力を牽制しつつ、ローマに帰属すべき領土を取り戻すという、その両者の適切なバランスを見出すことが、この若き共和国にとって極めて重要となる。戦争は確かにローマ復興を達成するための最速の手段ではあるが、唯一の手段ではない。 "
