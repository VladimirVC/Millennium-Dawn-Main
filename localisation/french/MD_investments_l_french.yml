l_french:
 this_investment_offer_pending_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! n’envisage pas actuellement de §Coffre d’investissement§! à partir de §Y[ROOT.GetNameWithFlag]§!.\n\n§YNote du développeur:§! Parfois, cela peut devenir bloquant en raison de mauvaises performances lors d'une partie multijoueur. Attendez 90 jours (trois mois) avant de signaler des bugs avec cet état."
 has_available_treasury_tt: "La §Ytrésorerie§! a plus de §Y[?ROOT.project_monetary_cost^-1]§!$$ milliards (Actuel: §G[?ROOT.treasury]§!$$ milliards)\n"
 influence_gain_tooltip_yes_tt: "Nous allons gagner en influence avec ce projet d'investissement.\n\n[investment_cooldown]"
 influence_gain_tooltip_no_tt: "Nous ne gagnerons pas d'influence avec ce projet d'investissement.\n"
 disabled_foreign_investment_flag_tt: "§Y[ROOT.GetNameWithFlag]§! peut investir dans d'autres pays.\n"
 int_auto_reject_investment_flag_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! ne rejette actuellement pas automatiquement les offres"
 state_based_investments_screen_tt: "§HInvestissement interne§!"
 check_for_investment_project_limits_tt: "Currently Has Available §HInternal Investment§! Slot (Free Projects: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0])"
 state_based_investments_screen_delayed_tt: "Le menu ci-dessous présente un certain nombre de décisions que vous pouvez prendre pour encourager différents types de développement au sein de [THIS.GetName]. Toutes les nations auront au moins deux emplacements disponibles qu'elles pourront utiliser pour n'importe lequel de leurs États sur l'ensemble de leur pays. Vous pouvez choisir de réaliser plusieurs projets dans un État ou de répartir les projets sur tout le pays. Vous pouvez gagner des emplacements supplémentaires en augmentant le §YPower Ranking§! de votre nation.\n\nMachines à sous par Power Ranking :\n- §YSuperpuissance§!: 6\n- §YGrande puissance§!: 5\n- §YPuissance majeure§!: 4\n- §YPuissance régionale§!: 3\n"
 available_internal_investments_screen_tt: "Available §HInternal Investment§! Slots: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "All nations will have a minimum of two available slots they can use for any of their states across their entire country. You can choose to do multiple projects in one state or you can choose to spread the projects across the country. You can gain additional slots by increasing your nation's §YPower Ranking§!\n\nOngoing Projects:\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "Développer la capacité locale en énergies renouvelables"
 state_owned_local_renewable_capacity_modifier_desc: "Après une série d’investissements ciblés dans l’infrastructure locale d’énergie renouvelable, l’État produit désormais davantage d’énergie à partir de sources renouvelables."
 state_owned_local_infrastructure_modifier: "Développer les infrastructures locales"
 state_owned_local_infrastructure_modifier_desc: "L’expansion des infrastructures locales dans l’État a donné lieu à une variété de projets à court terme visant à améliorer considérablement les infrastructures locales."
 state_owned_local_military_infrastructure_modifier: "Développer l’infrastructure militaire locale"
 state_owned_local_military_infrastructure_modifier_desc: "After significant investment in local military facilities and infrastructure upgrades, the region's military installations are now fully modernized. The state's military production capabilities have been substantially enhanced."
 state_owned_local_energy_infrastructure_modifier: "Développer les infrastructures énergétiques locales"
 state_owned_local_energy_infrastructure_modifier_desc: "Targeted investments in the local energy grid have resulted in a comprehensive modernization of the state's power generation and distribution infrastructure. The state now has improved energy production capabilities across all energy sectors."
 state_owned_build_forward_logistics_base_modifier: "Construire des bases logistiques avancées"
 state_owned_build_forward_logistics_base_modifier_desc: "Strategic logistics bases have been established throughout the state, creating a forward-deployed supply network. These facilities significantly improve the movement of troops and materials through the region, reducing overall supply demands."
 state_owned_improve_rebuilding_efforts_modifier: "Efforts de reconstruction améliorés"
 state_owned_improve_rebuilding_efforts_modifier_desc: "Reconstruction efforts have won over the local population, improving public cooperation and reducing civil unrest. Investment in local infrastructure and community rebuilding projects have boosted compliance among the local population."
 state_owned_hire_extra_primary_sector_workers_modifier: "Embaucher des travailleurs supplémentaires dans le secteur primaire"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "The state's primary sector workforce has been expanded through targeted recruitment and training initiatives. Agricultural, mining, and other resource extraction operations now benefit from increased labor availability, resulting in higher resource output."
 currently_encouraged_investments: "Actuellement §YEncourager les investissements§! dans §Y[THIS.GetName]§!"
 encourage_investments_in_state_tt: "§YEncouragez les investissements§! dans §Y[THIS.GetName]§!\n---------\nNous pouvons encourager les investissements en §Y[THIS.GetName]§! réduisant les formalités administratives dans ce domaine, rendant le temps d'investissement plus rapide qu'il ne l'aurait été autrement."
 encourage_investments_in_state_delayed_tt: "§YPrérequis:§!\n[!encourage_investments_in_state_click_enabled]\n§YEffets:§!\n[!encourage_investments_in_state_click]\n"
 encourage_investments_in_state_click_tt: "Pendant 120 jours, les §YInvestissements§! dans §Y[THIS.GetName]§! seront §Y15%§! moins chers. L’IA sera également plus susceptible d’investir dans l’État."
 encourage_productivity_in_state: "Actuellement §YEncourager la productivité§! dans §Y[THIS.GetName]§!."
 encourage_productivity_in_state_tt: "§YEncourager la croissance de la productivité§! dans §Y[THIS.GetName]§!\n---------\nNous pouvons encourager la croissance de la productivité dans §Y[THIS.GetName]§! en apportant de nouvelles technologies, techniques et autres à la région pour l’aider à se développer."
 encourage_productivity_in_state_delayed_tt: "§YPrérequis:§!\n[!encourage_productivity_in_state_click_enabled]\n§YEffets:§!\n[!encourage_productivity_in_state_click]\n"
 encourage_productivity_in_state_click_tt: "Pendant 120 jours, la §YCroissance de la productivité§! dans §Y[THIS.GetName]§! sera §Y20%§! plus rapide."
 expand_local_building_capacity: "Actuellement §YÉlargir les capacités de construction locales§! dans §Y[THIS.GetName]§!."
 block_future_expand_local_building_capacity: "Nous pouvons §YÉlargir la capacité de construction locale§! dans §Y[THIS.GetName]§!(Les capacités de construction de Times s'élargissent: [?expanded_building_slot_times|0Y])"
 expand_local_building_capacity_tt: "§YDévelopper les capacités de construction locales§! dans §Y[THIS.GetName]§!\n---------\nNous pouvons accroître la capacité de construction locale en adoptant diverses politiques de construction locales, en défrichant des terrains supplémentaires et en augmentant les ressources disponibles pour les constructeurs locaux."
 expand_local_building_capacity_delayed_tt: "§YPrérequis:§!\n[!expand_local_building_capacity_click_enabled]\n§YEffets:§!\n[!expand_local_building_capacity_click]\n"
 expand_local_building_capacity_click_tt: "Tous les 120 jours, nous pouvons gagner §G1§! §YEmplacements de construction§! dans §Y[THIS.GetName]§!. Nous pouvons étendre les §YEmplacements de construction§! dans un état donné jusqu'à §Y5§!."
 expand_local_renewable_capacity: "Actuellement en train §Yd'étendre les capacités locales en énergies renouvelables§! dans §Y[THIS.GetName]§!."
 expand_local_renewable_capacity_tt: "§YDévelopper la capacité renouvelable locale§! dans §Y[THIS.GetName]§!\n---------\nNous devrions encourager les §Yinfrastructures d’énergie renouvelable§! en §Y[THIS.GetName]§! produisant de l’énergie supplémentaire à partir du réseau local d’énergie renouvelable."
 expand_local_renewable_capacity_delayed_tt: "§YPrérequis:§!\n[!expand_local_renewable_capacity_click_enabled]\n§YEffets:§!\n[!expand_local_renewable_capacity_click]\n"
 expand_local_renewable_capacity_click_tt: "Pendant 180 jours, nous gagnons ce qui suit dans §Y[THIS.GetName]§!:\n"
 expand_local_infrastructure: "Actuellement §YExpansion de l'infrastructure locale§! dans §Y[THIS.GetName]§!."
 expand_local_infrastructure_tt: "§YDévelopper l'infrastructure locale§! dans §Y[THIS.GetName]§!\n---------\nL'infrastructure de §Y[THIS.GetName]§! laisse à désirer. Nous devrions concevoir des projets ciblés à court terme pour étendre l'infrastructure de l'État afin de contribuer à mettre en valeur et à étendre le développement local de l'État."
 expand_local_infrastructure_delayed_tt: "§YPrérequis:§!\n[!expand_local_infrastructure_click_enabled]\n§YEffets:§!\n[!expand_local_infrastructure_click]\n"
 expand_local_military_infrastructure: "Actuellement §YExpansion de l'infrastructure militaire locale§! dans §Y[THIS.GetName]§!."
 expand_local_military_infrastructure_tt: "§YDévelopper l'infrastructure militaire locale§! dans §Y[THIS.GetName]§!\n---------\nL'armée a contacté le gouvernement et identifié des sites de construction potentiels à §Y[THIS.GetName]§!. Ils ont suggéré d'étendre l'infrastructure militaire locale ici pour garantir que l'armée de la région soit correctement soutenue en cas de conflit dans la zone."
 expand_local_military_infrastructure_delayed_tt: "§YPrérequis:§!\n[!expand_local_military_infrastructure_click_enabled]\n§YEffets:§!\n[!expand_local_military_infrastructure_click]\n"
 expand_local_military_infrastructure_click_tt: "Pendant 180 jours, nous gagnons ce qui suit dans §Y[THIS.GetName]§!:\n"
 expand_local_energy_infrastructure: "Actuellement §YDévelopper les infrastructures énergétiques locales§! dans §Y[THIS.GetName]§!."
 expand_local_energy_infrastructure_tt: "§YDévelopper l'infrastructure énergétique locale§! dans §Y[THIS.GetName]§!\n---------\nL’énergie locale dans §Y[THIS.GetName]§! peut être étendue pour mieux soutenir la population de la région locale ainsi que pour mieux améliorer le réseau national."
