l_simp_chinese:
 BLR_china_friendship: "与中国的伙伴关系"
 BLR_china_friendship_desc: "我们打算加强两国间的友好关系。"
 BLR_Bel_G2: "BELGEE"
 BLR_Bel_G2_desc: "JSC“白俄吉”是一家白俄罗斯-中国合资企业，致力于生产中国的吉利汽车。这是白俄罗斯的两家汽车制造商之一。它被安置在鲍里索夫附近的JSC“鲍里索夫斯基工厂”租赁地区。"
 BLR_Chinese_Modernization_Railway: "铁路现代化"
 BLR_Chinese_Modernization_Railway_desc: "我们的中国同事已经同意资助我国铁路网络的现代化。"
 BLR_Brigade_Territorial_Defence: "建立本土防卫旅"
 BLR_Brigade_Territorial_Defence_desc: "战争爆发迫使我们组建领土防御部队。"
 BLR_sso: "特种作战部队的建立"
 BLR_sso_desc: "白俄罗斯共和国武装部队特种作战部队是白俄罗斯共和国武装部队的一支高度机动的部队，是苏联空降部队和苏联格鲁乌特种部队的后继者。白俄罗斯共和国。主要任务：反破坏活动、情报、打击非法武装团体、使用特殊方法执行各种任务，以结束针对白俄罗斯共和国的武装冲突。它们是战略威慑的主要要素之一。"
 BLR_trans_army: "建立运输部队"
 BLR_trans_army_desc: "白俄罗斯运输部队是白俄罗斯武装部队的一个兵种，负责通过卡车、铁路和航空运输人员和物资。其职责是为全国其他兵种的军事单位提供运输支援任务。"
 USSR_Legacy: "苏联的遗产"
 USSR_Legacy_desc: "我们将竭尽全力发展和巩固我们所继承的遗产。"
 BLR_mi_8: "米-8"
 BLR_Communism_start: "共产主义的回归"
 BLR_Communism_start_desc: "共产主义再次回归白俄罗斯。白俄罗斯共产党会再次为马克思列宁主义在该国铺平道路吗？"
 BLR_trade_with_nko: "与朝鲜贸易"
 BLR_trade_with_nko_desc: "朝鲜虽然是一个小国，但它是我们在社会主义阵营中的盟友，我们准备与它建立贸易关系。"
 BLR_nko_workers: "朝鲜工人"
 BLR_nko_workers_desc: "我们准备邀请朝鲜工人来我国工作。他们以高效和勤奋著称。"
 BLR_nko_miiltary_coop: "与朝鲜的军事技术合作"
 BLR_nko_miiltary_coop_desc: "我们已准备好与朝鲜人民军开展军事技术合作。"
 BLR_rotation_KGB: "KGB的轮换"
 BLR_rotation_KGB_desc: "我们正在轮换人员，因为我们现在需要一个强大而有力的组织。"
 BLR_North_Korea_workers: "朝鲜工人"
 BLR_SMERSH_2: "反间谍特别行动机构 2.0"
 BLR_SMERSH_2_desc: "我们将复活反间谍特别行动机构。是时候利用苏联的经验造福国家了。"
 BLR_arest_silovic: "清洗安全部队"
 BLR_arest_silovic_desc: "许多安保机关与新政府意见相左，是时候清除掉他们了。"
 BLR_antigay_propaganda_laws: "反同性恋宣传法"
 BLR_antigay_propaganda_laws_desc: "现在是时候在我国通过法律禁止LGBT宣传了。"
 BLR_clean_soc_net: "清理社会网络"
 BLR_clean_soc_net_desc: "我们将清理所有的社交网络，我们不会允许敌人的宣传传播。"
 BLR_pioneria: "先锋队"
 BLR_pioneria_desc: "青年人不应无所事事，所以我们将重振少先队。"
 BLR_Marks_school: "学校里的马克思主义"
 BLR_Marks_school_desc: "学校课程必然包含马克思主义教育。"
 BLR_free_education: "免费教育"
 BLR_free_education_desc: "我们光荣祖国的每一位公民都应该享有免费的教育机会。"
 BLR_state_atheism: "国家无神论"
 BLR_state_atheism_desc: "宗教是人民的鸦片，是时候抵制它的影响了。"
 BLR_collectivism: "集体主义"
 BLR_collectivism_desc: "集体化以前奏效过，所以我们将再次尝试。"
 BLR_fight_international_capitalists: "对抗国际资本家"
 BLR_fight_international_capitalists_desc: "寡头阶层是一个危险且腐败的阶级，与苏联时期的富农并无二致。自苏联解体以来，俄罗斯和白俄罗斯的寡头不断攫取越来越多的经济影响力，并以外国公司主导的全球化经济模式为幌子，将白俄罗斯工人赶出工作岗位。要复兴真正的社会主义，首先必须清除国际资本家阶级。"
 BLR_weaken_the_banks: "削弱银行业"
 BLR_weaken_the_banks_desc: "银行是资本主义的禁卫军，他们手持银行的旗帜投入战斗，以自身的存在来捍卫自己的利润。他们干预世界的贫穷地区，用工资倾扣和利息投机来虐待工人阶级，并且用合法和非法捐赠来影响政治。银行必须回到一个他们只是政治级短期贷款者的国家。"
 BLR_ultimate_tax_reform: "税制大改革"
 BLR_ultimate_tax_reform_desc: "我们打算进行一项重大的税制改革，这将减轻普通民众的税收负担，但对企业来说则恰恰相反。"
 BLR_single_party: "一党制"
 BLR_single_party_desc: "应该只有一个政党，因为通往社会主义的道路只有一条。"
 BLR_nationalize_foreign_business: "外国企业国有化"
 BLR_nationalize_foreign_business_desc: "外国拥有的工业企业始终构成经济安全隐患。鉴于外国可能对我们实施经济制裁，我们始终担心这些企业主会在一夜之间卷款潜逃，带走工厂的关键设备。为了防止这种情况发生，我们需要将这些企业收归国有——即便这会得罪其他国家。"
 BLR_five_year_plan: "第一个五年计划"
 BLR_five_year_plan_desc: "西方国家的自由经济模式对社会主义国家而言没有未来。回归计划经济，最好是采用经典的苏联式五年计划，将使政府对之前不受控制的经济拥有巨大的影响力。"
 BLR_reestablish_the_military_industrial_complex: "重建军事工业复合体"
 BLR_reestablish_the_military_industrial_complex_desc: "军队与人民合而为一！"
 BLR_mobilize_the_masses: "动员民众"
 BLR_mobilize_the_masses_desc: "党要求的地方，我军就需要人手去保卫国家利益。"
 BLR_better_roads: "通用道路改善"
 BLR_better_roads_desc: "我国必须认真对待道路问题。"
 BLR_progress_cult: "科技进步崇拜"
 BLR_progress_cult_desc: "社会主义者希望社会和科学进步。后者在21世纪尤为重要，不仅关乎国家安全，更关乎革命的传播和社会主义纲领的实现，而这只有在科学技术发展到一定程度后才能完全实现。"
 BLR_soviet_academy_of_sciences: "苏联科学院"
 BLR_soviet_academy_of_sciences_desc: "苏联科学院是苏联最重要的科研机构。我们最优秀、最聪明的头脑将再次在这里孜孜不倦地工作，以取得技术和科学上的突破，有朝一日这将使我们成为资本主义世界羡慕的对象！"
 BLR_the_culture_of_proletarianism: "无产阶级文化"
 BLR_the_culture_of_proletarianism_desc: "现在是时候为工人阶级培育无产阶级文化了，我们将携手迈向共同的、美好的共产主义未来。"
 BLR_empower_the_kgb: "扩大KGB的影响"
 BLR_empower_the_kgb_desc: "我们打算扩大克格勃在我国的影响力，以防止敌人破坏我们的内部体制。因此，我们将赋予克格勃更大的权力来开展我们的活动。"
 BLR_erase_nationalist: "监禁所有民族主义者"
 BLR_erase_nationalist_desc: "现在是时候清除我国境内的民族主义分子了。"
 BLR_the_litbel_start: "立陶宛-白俄罗斯的复兴"
 BLR_the_litbel_start_desc: "立陶宛-白俄罗斯社会主义苏维埃共和国是俄国内战期间短暂存在的一个苏联加盟共和国。与立陶宛兄弟携手合作的前景对我们来说极具吸引力。"
 BLR_peaceful_litbel: "红旗笼罩立陶宛"
 BLR_peaceful_litbel_desc: "我们已经做好了一切准备。所有特工、所有应征入伍的公民和政治家都已各就各位。现在是时候将立陶宛从傀儡政府的占领下解放出来了。"
 BLR_the_litbel: "两国人民"
 BLR_the_litbel_desc: "现在是时候让我们成为一个由白俄罗斯人和立陶宛人组成的单一国家了。"
 BLR_dissolve_monasteries: "裁撤修道院"
 BLR_dissolve_monasteries_desc: "我们将彻底清洗我国的宗教问题！"
 BLR_support_of_the_worker: "支持工人"
 BLR_support_of_the_worker_desc: "工人阶级是我们的支持和力量。我们将永远支持他们与资本主义的毒瘤作斗争！"
 BLR_presidential_election_of_2001: "政治领域"
 BLR_presidential_election_of_2001_desc: "现在是时候决定谁将领导我们的国家进入新千年了。"
 BLR_Andrey_sannikov: "西方民主之路"
 BLR_Andrey_sannikov_desc: "我们国家选出了一位新的领导人，现在他将带领我们走向光明的民主未来。"
 BLR_Join_GUAM: "加入古阿姆"
 BLR_Join_GUAM_desc: "通过加入古阿姆，我们将加强与后苏联空间的联系。"
 BLR_American_Protection: "美国的保护"
 BLR_American_Protection_desc: "我们需要美国的帮助，因为俄罗斯不太可能无视我们的行动。"
 BLR_Linking_foreign_currency: "将货币与欧元挂钩"
 BLR_Linking_foreign_currency_desc: "必须消除我国货币的不稳定性。我们将把我国货币与欧元挂钩。"
 BLR_closed_border_with_Russia: "关闭对俄边界"
 BLR_closed_border_with_Russia_desc: "我们将在与俄罗斯的边境重新设立哨所。任何来自俄罗斯境内的人都无法自由进入我国。"
 BLR_NATO_Membership_Campaign: "北约成员国之战"
 BLR_NATO_Membership_Campaign_desc: "现在是时候启动加入北约的准备工作了。"
 BLR_USA_military_Cooperation: "美国军事科技合作"
 BLR_USA_military_Cooperation_desc: "与美国在军事技术领域的合作有望给我们带来显著优势。"
 BLR_Invite_NATO_advisors: "邀请北约军事顾问"
 BLR_Invite_NATO_advisors_desc: "现在我们已经彻底改革了军事指挥系统，我们将邀请北约军事顾问。"
 BLR_USAD_request: "要求美援署"
 BLR_USAD_request_desc: "我们决定联系美国国际开发署寻求支持。"
 BLR_Military_Exercises_NATO: "与北约的军事演习"
 BLR_Military_Exercises_NATO_desc: "我军将与北约举行首次联合演习。"
 BLR_NATO_integration_command: "北约整合司令部"
 BLR_NATO_integration_command_desc: "北约一体化司令部是我们加入北约的下一步。"
 BLR_Request_NATO_membership: "请求成为北约成员国"
 BLR_Request_NATO_membership_desc: "是时候申请加入北约了。"
 BLR_western_diplomats: "西方外交官"
 BLR_western_diplomats_desc: "西方国家的外交官来访，祝贺我们取得胜利。现在，白俄罗斯可以选择走向西方的道路。"
 BLR_denied_sanctions: "制裁解除"
 BLR_denied_sanctions_desc: "既然我们已经举行了合法选举，那么对我们的所有制裁都将解除。"
 BLR_people_rights: "人权"
 BLR_people_rights_desc: "我们必须尊重人民的权利和自由。"
 BLR_Freedom_Meetings: "会议和集会自由"
 BLR_Freedom_Meetings_desc: "必须保障集会和大会的权利。"
 BLR_dont_torture: "医疗保健改革"
 BLR_dont_torture_desc: "优质医疗保健是公民最基本的需求之一。通过提供优质医疗保健，我们将能够建设一个更美好的国家。"
 BLR_EU_integration: "融入欧盟"
 BLR_EU_integration_desc: "我们打算融入欧盟。"
 BLR_Attract_European_investments: "吸引欧洲投资"
 BLR_Attract_European_investments_desc: "我们已做好准备，吸引欧洲投资者来改善我们的经济。"
 BLR_Opening_garment: "开放人民品牌的服装工厂"
 BLR_Opening_garment_desc: "我们已做好准备，在我国境内建立知名品牌服装的生产基地。"
 BLR_simplification_labor_code: "重写劳动法"
 BLR_simplification_labor_code_desc: "必须改变劳动立法规范，使员工不能总是诉诸工会而不是努力工作。"
 BLR_Encourage_Exchange_Students_desc: "我们的学生已准备好参加与欧洲学生的交流项目。"
 BLR_Adopt_EU_Intellectual: "通过欧盟知识产权法"
 BLR_Adopt_EU_Intellectual_desc: "需要采纳欧盟知识产权法以遵守欧洲在这一领域的标准。"
 BLR_Digitalization: "数字化"
 BLR_Digitalization_desc: "为了提高产品质量，必须对生产流程进行数字化改造。"
 BLR_political_platforms: "为外国企业建立政治平台"
 BLR_political_platforms_desc: "或许我们应该允许外国公司使用我们的政治平台？"
 BLR_Custom_Institutional_reforms: "生物燃料"
 BLR_Custom_Institutional_reforms_desc: "替代燃料资源可以帮助我们减少对那些我们不想建立友好关系的国家的依赖。"
 BLR_Market_Economy: "功能市场经济"
 BLR_Market_Economy_desc: "我们一直努力追求的是成熟的市场经济，而这才是欧洲民主国家应该运作的经济模式。"
 BLR_Delete_KGB2: "解散KGB"
 BLR_Delete_KGB2_desc: "我们将用一个新的结构——国家安全局取代KGB。该组织将从忠于我们西方理想的雇员中招募。"
 BLR_US_money: "美国投资"
 BLR_US_money_desc: "我们需要资金来进一步建设我国的民主制度。"
 BLR_join_wto: "加入世贸组织"
 BLR_join_wto_desc: "加入世贸组织将给我们带来许多优势和进入国际市场的机会。"
 BLR_release_political_prisoners: "释放政治犯"
 BLR_release_political_prisoners_desc: "前政府时期，许多人因政治原因被监禁。我们将解决这个问题。"
 BLR_baltic_economic_cooperation: "与波罗的海国家的贸易协定"
 BLR_baltic_economic_cooperation_desc: "我们的近邻是极佳的贸易伙伴。它们沿海的地理位置和共同的边界为我们提供了充分的理由来提升贸易业绩。"
 BLR_root_out_nationalists: "摆脱民族主义者"
 BLR_root_out_nationalists_desc: "民族主义者一直是我国的一个问题。他们只会带来不稳定，现在是时候解决他们了。"
 BLR_decommunize_belarus_society: "白俄罗斯社会的去共产主义"
 BLR_decommunize_belarus_society_desc: "必须摒弃苏联的遗产。现在是时候拥抱进步的西方了。"
 BLR_fight_the_oligarchs: "与寡头做斗争"
 BLR_European_university_connections: "欧洲教育"
 BLR_European_university_connections_desc: "我们欢迎欧洲大学来我国发展，以提高我国学生的教育质量。"
 BLR_LGBT_Belarus_quest: "白俄罗斯的LGBT问题"
 BLR_LGBT_Belarus_quest_desc: "政府已将女同性恋、双性恋和变性者议案提上日程，因为我们不能忽视这一趋势。我们该怎么办？"
 BLR_Offshore_heaven: "外国投资者减税"
 BLR_Offshore_heaven_desc: "我们将为我国的投资创造有利条件，这将吸引众多投资者。"
 BLR_wind_farms: "风能发电场"
 BLR_wind_farms_desc: "我们在明斯克各区建设了多个风力发电场。"
 BLR_Hajdukiewicz: "盖杜克维奇"
 BLR_Hajdukiewicz_desc: "谢尔盖·瓦西里耶维奇·盖杜克维奇（1954年9月8日出生）是白俄罗斯政治家和公众人物，白俄罗斯自由民主党领导人。他是一名预备役上校，以其亲俄立场而闻名。他主张与俄罗斯建立邦联，发行以莫斯科为发行中心的单一货币，并实行联合军事政策。"
 BLR_Spiritual_revival: "白俄罗斯复兴精神"
 BLR_Spiritual_revival_desc: "白俄罗斯的精神复兴进程应该继续下去。东正教和罗马天主教在社会中的作用应该增强。"
 BLR_Ban_Enemies: "在内敌作战"
 BLR_Ban_Enemies_desc: "我们必须彻底清除我国的政治乱象。任何受境外资助的破坏性政党都不应干涉我国发展。"
 BLR_Russian_Oligarch: "与俄罗斯寡头友好"
 BLR_Russian_Oligarch_desc: "俄罗斯寡头掌握着巨额财富。我认为值得争取他们的支持。"
 BLR_Son_will_rule: "让儿子统治"
 BLR_Son_will_rule_desc: "是时候更换领导人了。现在，谢尔盖·盖杜克维奇的儿子将领导党和国家。"
 BLR_Hardline_EuroScepticism: "强硬的欧洲怀疑主义"
 BLR_Hardline_EuroScepticism_desc: "强硬的疑欧主义是必要的，因为欧洲想要一个虚弱的白俄罗斯。"
 BLR_Belarusian_nation_law: "白俄罗斯国内法"
 BLR_Belarusian_nation_law_desc: "我们的国家早就赢得了自决权。我们是一个拥有伟大历史的民族，必须作为一个主权国家，迈向光明的未来。"
 BLR_russian_education: "俄罗斯教育"
 BLR_russian_education_desc: "我们的大学应该与俄罗斯大学建立联系。这样，我们就能为所有人提供俄式教育。"
 BLR_Union_state_again: "加入俄罗斯"
 BLR_Union_state_again_desc: "我们已准备好再次成为俄罗斯的一部分。"
 BLR_union_become_one: "联盟终将成为一统"
 BLR_Lykashenko: "§Y卢卡申科§!"
 BLR_Lykashenko_desc: "亚历山大·格里戈里耶维奇·卢卡申科（1954年8月30日出生）是白俄罗斯政治家、国务活动家和军事人物。自1994年7月20日起，他一直担任白俄罗斯总统兼武装部队总司令。他以亲俄立场而闻名。在白俄罗斯语和俄语地区，他被称为“老爹”。"
 BLR_ros_atom: "ROS ATOM"
 BLR_ros_atom_desc: "我们将邀请俄罗斯国家原子能公司专家在核电领域进行合作。"
 BLR_Impact_kgb: "KGB的影响"
 BLR_Impact_kgb_desc: "克格勃使用各种手段清除那些对新总统当选不满的人。"
 BLR_Liquidation_pub_assoc: "社会团体清算"
 BLR_Liquidation_pub_assoc_desc: "克格勃正在积极清算或试图清算那些令我们总统反感的公共组织。"
 BLR_crackdown_opp_rall: "镇压反对派集会"
 BLR_crackdown_opp_rall_desc: "我们正在积极驱散对选举结果不满的政治对手的集会。"
 BLR_Increased_censorship: "加强媒体审查"
 BLR_Increased_censorship_desc: "必须对媒体实施严格的审查制度，以防止我们的对手煽动反对我们。"
 BLR_concept_national_security_Belarus: "国家安全理念"
 BLR_concept_national_security_Belarus_desc: "这一理念对白俄罗斯共和国活动的本质和内容建立了一套官方观点，以确保个体、社会和国家利益的平衡，以及他们免受内部和外部威胁的保障。"
 BLR_Economic_development_2001_2005: "社会经济发展项目"
 BLR_Economic_development_2001_2005_desc: "白俄罗斯共和国2001-2005年社会经济发展方案。由白俄罗斯共和国经济部和其他部委、共和国家机构、地区执行委员会和明斯克市执行委员会共同制定，国家科学院、国家银行、专门研究机构和公共团体均根据白俄罗斯共和国《白俄罗斯共和国社会经济发展方案》和白俄罗斯共和国2000年2月2日N141和2000年8月10日白俄罗斯部长会议关于白俄罗斯共和国社会经济发展方案的2001-2005年1248号决议参与。"
 BLR_reforms_Belarusian_Railway: "改革白俄罗斯铁路"
 BLR_reforms_Belarusian_Railway_desc: "我们的铁路状况非常糟糕，因此我们将进行一系列改革来改善这种情况。"
 BLR_new_railway_station: "新明斯克铁路车站"
 BLR_new_railway_station_desc: "我们在明斯克新建了一座火车站。现在，我们这座城市将能够接待更多列车。"
 BLR_Electrification_Myslishche_Kryzhovka: "米斯利什-克雷若夫卡铁路电气化"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "梅斯利什切-克雷若夫卡铁路是我国最重要的发展优先事项之一，因此我们将首先解决它。"
 BLR_Baranovichi_Plant: "巴拉诺维奇工厂"
 BLR_Baranovichi_Plant_desc: "我们正在巴拉诺维奇建筑部件和结构厂创建一个结构部门，以改善我们列车的零部件供应。"
 BLR_Energy_conflict_over: "出售贝尔加兹特兰"
 BLR_Energy_conflict_over_desc: "冲突即将结束。我们已同意俄罗斯的条件，并准备出售白俄罗斯天然气运输公司。作为交换，我们的能源价格将得到稳定。"
 BLR_new_rolling_stock: "购买新的铁路车辆"
 BLR_new_rolling_stock_desc: "通过购置新的铁路车辆，我们将消除困扰我们铁路的主要问题。"
 BLR_promise_first_nuclear: "建造核电站的承诺"
 BLR_promise_first_nuclear_desc: "我们向全体公民承诺，将在我国境内建设一座核电站，从而确保我国的能源安全。"
 BLR_New_Land_code: "新土地法"
 BLR_New_Land_code_desc: "新的土地法大大简化了私人业主和公司购买土地的流程，这显然会吸引一部分人群。"
 BLR_Zubr_Energy_LLC: "野牛能源有限公司开业"
 BLR_Zubr_Energy_LLC_desc: "生产起动机电池的工厂，用于交付给世界和国内汽车制造商的输送线。"
 BLR_Hi_Tech_Park: "高新科技园"
 BLR_Hi_Tech_Park_desc: "白俄罗斯高科技园区是为发展信息技术企业而设立的特殊税收和法律制度。它并非自由经济区（或特殊经济区），而是一个遵循域外管辖原则的司法管辖区。在园区内注册的公司和个体经营者，无论其白俄罗斯办事处位于何处，均可享受园区提供的各项优惠政策。"
 BLR_Referendum_Belarus_2004: "2004年白俄罗斯公投"
 BLR_Referendum_Belarus_2004_desc: "2004年10月17日，白俄罗斯主办了卢卡申科总统在白俄罗斯独立史上发起的第三次共和公投。全民投票是根据2004年9月7日第431号总统令任命的，并与议会选举相结合。"
 BLR_Energy_conflict: "俄罗斯-白俄罗斯能源冲突"
 BLR_Energy_conflict_desc: "冲突始于2006年12月，因为加兹普拉姆宣布最终版本的白俄罗斯共和国天然气价格为每1000立方米105美元。此外，75美元以现金支付，白俄罗斯将有权用Beltransgaz的股份支付剩余的30美元，据估计为50亿美元。"
 BLR_Decree_n3: "寄生主义法令"
 BLR_Decree_n3_desc: "没有人会再坐等政府福利了。是时候让所有闲置人员都开始工作了。"
 BLR_launch_own_satellite: "白俄罗斯自己发射的卫星"
 BLR_launch_own_satellite_desc: "白俄罗斯地球遥感卫星于2012年7月22日在哈萨克斯坦拜科努尔航天发射，由五艘航天器组成集群发射：包括俄罗斯的卡诺普斯-V号、MKA-FKI（Zond-PP）号、德国的TET-1号和加拿大的ADS-1B号。"
 BLR_gasification_country: "国家煤气化的完成"
 BLR_gasification_country_desc: "我们将完成我国的天然气化进程，我们的公民一定会对此感到欣慰。"
 BLR_CJSC_Turkcell: "处理突厥问题"
 BLR_CJSC_Turkcell_desc: "我们将与土耳其合作伙伴达成一项重要交易——将土耳其电信持有的白俄罗斯电信基础设施公司股份的控股权出售给土耳其电信。这将为我国开辟另一条投资途径。"
 BLR_Anti_Corruption: "打击腐败活动"
 BLR_Anti_Corruption_desc: "我们必须打击我国的腐败。最重要的是不要让自己也牵连其中。"
 BLR_Punish_Shushkevich: "惩罚舒什克维奇的王室"
 BLR_Punish_Shushkevich_desc: "舒什克维奇给我们留下的遗产就是他在政府中的那些忠实拥护者。是时候清除他们了。"
 BLR_Promote_new_officers: "白俄罗斯完成军事改革"
 BLR_Promote_new_officers_desc: "我们将完成始于1994年的一系列军队改革措施。"
 BLR_Internet_cencorship: "互联网审查"
 BLR_Internet_cencorship_desc: "互联网已成为公开讨论推翻政府言论的平台，必须加以控制。"
 BLR_Raiffeisen2: "白俄罗斯的拉伊费森"
 BLR_Raiffeisen2_desc: "普赖尔银行成立于1989年，自2003年起成为印度储备银行的子公司。它是印度最大的本土私营银行之一，也是印度效率和盈利能力领先的金融机构之一。作为一家综合性银行，它为企业客户、中小企业以及个人客户提供服务。"
 BLR_Henkel2: "亨克尔"
 BLR_Henkel2_desc: "亨克尔企业在白俄罗斯的化工部门，亨克尔-鲍特亨尼克-LLC，于2004年成立，目的是组织进口替代产品的生产。2005年，企业开始在扎斯拉夫尔生产用于生产塞雷西特混合材料的工厂，该企业的生产范围于2006年9月开始。该企业包括了超过100件物品，包括预先制成的套装，热绝缘和隐形的平整系统，平底和防水系统，平面准备材料，海豹，加固泡沫，“通量钉子”，平质膏。"
 BLR_Jeans_Revolution: "牛仔裤革命"
 BLR_Jeans_Revolution_desc: "2006年3月19日，白俄罗斯明斯克市中心和其他城市爆发大规模抗议集会，起因是当局在之前举行的总统选举中舞弊。"
 BLR_reform_kolhoz: "集体农场改革"
 BLR_reform_kolhoz_desc: "为确保我国农业产业的稳定，必须对集体农场进行改革。"
 BLR_Eastern_Partnership: "与东方合作"
 BLR_Eastern_Partnership_desc: "东部伙伴关系是欧盟的一个项目，其主要目标是发展欧盟与前苏联六个国家（阿塞拜疆、亚美尼亚、白俄罗斯、格鲁吉亚、摩尔多瓦和乌克兰）的融合关系。"
 BLR_Azarenok_case: "伊戈尔·阿扎雷诺克案"
 BLR_Azarenok_case_desc: "阿扎列诺克将军涉嫌通过贿赂和其他欺诈手段，在白俄罗斯共和国为俄罗斯利益进行游说。我们应该关注此事吗？"
 BLR_National_Library: "新建国家图书馆"
 BLR_National_Library_desc: "2006年6月16日，白俄罗斯国家图书馆的新建大楼（包括全国图书馆）开放，供用户使用。"
 BLR_delta_city: "“德尔塔”城市商务中心"
 BLR_delta_city_desc: "在明斯克举行的塞尔维亚国家展览会期间，签署了一项重大合同，用于建设德尔塔商业中心和开发国家图书馆附近的区域，总投资达数十亿欧元（开发商是塞尔维亚商人拥有的达纳控股公司）。"
 BLR_BRSM_desc: "白俄罗斯共和青年联盟是白俄罗斯共和国的一个青年公共协会。它是该国最大的青年协会，并得到亚历山大·卢卡申科的支持。该组织的活动由国家资助。"
 BLR_Potato_Empire: "马铃薯帝国"
 BLR_Potato_Empire_desc: "我们是世界主要马铃薯出口国之一。我们国家应该为此感到自豪。"
 BLR_Factory_Kommunarka: "国有科穆纳卡工厂"
 BLR_Factory_Kommunarka_desc: "我们的总统认为“科穆纳尔卡”糖果厂的私有化是非法的，因此宣布将该企业国有化。"
 BLR_Another_year: "又一个独立年"
 BLR_Another_year_desc: "白俄罗斯将继续奉行独立自主的政策。"
 BLR_Migrant_crisis: "移民危机"
 BLR_Migrant_crisis_desc: "白俄罗斯边境的移民危机源自于非法移民的涌入，主要是来自伊拉克和叙利亚，他们从阿富汗流入，也有从非洲国家进入欧盟（立陶宛，拉脱维亚，波兰）进入。"
 BLR_Another_Elections: "以及又一次选举"
 BLR_Another_Elections_desc: "我国即将举行下一届选举。谁会获胜？"
 BLR_Bye_opposition: "对反对派毫不留情"
 BLR_Bye_opposition_desc: "我们一如既往地采取强硬而迅速的措施来应对反对派。"
 BLR_Milk_war: "牛奶战争"
 BLR_Milk_war_desc: "白俄罗斯和俄罗斯之间的关系因对俄罗斯出口乳制品的争端而出现一系列恶化。"
 BLR_Changes_Customs_policy: "更改海关政策"
 BLR_Changes_Customs_policy_desc: "为了加大打击假冒产品进口到我国的难度，我们出台了新的法规和限制措施。"
 BLR_whitelegion_case: "白色军团案"
 BLR_whitelegion_case_desc: "我们的特勤部门已报告白色军团成员的大量活动。必须将他们抓捕归案并投入监狱。"
 BLR_PolBel_Dplomatic_war: "波兰-白俄罗斯外交战"
 BLR_PolBel_Dplomatic_war_desc: "尽管两国关系有所缓和，但与波兰的冲突正以前所未有的强度死灰复燃。"
 BLR_project_bombel: "BOMBEL工程"
 BLR_project_bombel_desc: "欧盟已拨款加强白俄罗斯与欧盟之间的边境管控，以阻止非法移民涌入。我们公司正在决定如何使用这些资金。"
 BLR_Investing_Agro_industry: "投资农业产业"
 BLR_Investing_Agro_industry_desc: "农业产业是我国经济的重要组成部分，我们将继续加大对该领域的投资。"
 BLR_fate_belarusian_church: "白俄罗斯教会的命运"
 BLR_fate_belarusian_church_desc: "我们应该决定教会未来的发展方向。"
 BLR_Pension_reform: "养老金改革"
 BLR_Pension_reform_desc: "现在是时候进行养老金改革并提高退休年龄了。"
 BLR_People_Militia: "人民民兵的建立"
 BLR_People_Militia_desc: "我们准备通过一项关于组建人民民兵的法律，这支民兵将作为领土防御的后备力量。每个村庄都应该有一支训练有素的队伍来对抗敌人，随后发展成为一支游击队。"
 BLR_Wagner_arrest: "私人军事公司瓦格纳的局势"
 BLR_Wagner_arrest_desc: "我们的特勤部门逮捕了一些来自著名的俄罗斯私人军事公司瓦格纳的武装分子。我们必须决定如何处置他们。"
 BLR_Country_for_life: "宜居之国"
 BLR_Country_for_life_desc: "我国政府决定采取更为巧妙的策略来应对反对派，拉拢其重要人物加入我方阵营。其中一位便是“生命之国”项目的组织者谢尔盖·季哈诺夫斯基。在随后的事件发生后，我们没有逮捕他，而是公开邀请他加入政府，希望他能为国家发展贡献力量。此举势必会分裂反对派。"
 BLR_Amendment_to_Constitution: "修改宪法"
 BLR_Amendment_to_Constitution_desc: "我们的永久领导人亚历山大·卢卡申科已经认识到，国家需要进行彻底的变革，是时候打破总统独揽大权的局面了。他宣布将就修改宪法举行全民公投，根据新宪法，权力将主要归于议会。"
 BLR_army_on_streets_of_cities: "大规模抗议"
 BLR_army_on_streets_of_cities_desc: "人民已经起来反抗我们。他们认为我们的政府篡改选举结果，正在毁掉国家。我希望我们已经为此类事件做好了充分准备。"
 BLR_Pazniak: "白俄罗斯民族主义者"
 BLR_Pazniak_desc: "民族主义势力已经夺取了白俄罗斯的政权。他们将把白俄罗斯引向何方 - 是走向更加光明的未来，还是走向国家的崩溃？"
 BLR_patriotism_desc: "现在是时候提高我国的​​爱国主义教育水平了。"
 BLR_Belarusisation: "白俄罗斯化"
 BLR_Belarusisation_desc: "所有文献和所有官方刊物都必须使用白俄罗斯语。"
 BLR_Democratic_clean: "清洗民主派"
 BLR_Democratic_clean_desc: "我们绝不会成为西方的奴仆。是时候清除我们国家里的民主分子了。"
 BLR_Communistst_clean: "清洗共产主义者"
 BLR_Communistst_clean_desc: "必须摧毁苏联的遗产。是时候驱逐这些红色瘟疫的追随者了。"
 BLR_denied_rus_language: "拒绝用俄语"
 BLR_denied_rus_language_desc: "俄语将不再是第二官方语言。我们受够了俄罗斯的占领。"
 BLR_anti_immigration_policies: "反移民政策"
 BLR_anti_immigration_policies_desc: "实施更严格的反移民政策将有助于保持白俄罗斯民族认同的活力和完整性。"
 BLR_russofobia: "反俄罗斯政策"
 BLR_russofobia_desc: "是时候应对共同的敌人 - 俄罗斯了。是时候遏制它对我们的帝国主义野心了。"
 BLR_decolectivisation: "分权"
 BLR_decolectivisation_desc: "现在是时候摆脱苏联遗留问题，帮助民众迁往城市了。"
 BLR_litvins_past: "利特文人的过去"
 BLR_litvins_past_desc: "历史不会被改变，我们知道。我们利特文人是立陶宛大公国自豪的继承人。"
 BLR_constitution_from_1994: "1994年宪法"
 BLR_constitution_from_1994_desc: "现在是时候在我国恢复一部真正意义上的宪法了。"
 BLR_We_not_energy_slave: "我们不是俄罗斯资源的奴隶"
 BLR_We_not_energy_slave_desc: "俄罗斯提供折扣只是为了扶持其傀儡政权。这就够了。我们无需这些折扣也能建立强大的经济。"
 BLR_Influence_nationalists: "民族主义者的影响"
 BLR_Influence_nationalists_desc: "我们必须积极支持邻国的民族主义运动。"
 BLR_Territorial_claims: "领土宣称"
 BLR_Territorial_claims_desc: "我们的国家必须回归其真正的疆界。"
 BLR_white_legion_desc: "白色军团是白俄罗斯的一个体育和爱国组织，成立于1995年，旨在对青年进行征兵前训练和爱国主义教育。"
 BLR_white_legion_battalion: "白色军团营"
 BLR_white_legion_battalion_desc: "白色军团第一营终于组建完毕。真正的爱国者们已准备好为国家的自由和强大而战。"
 BLR_GDL: "立陶宛大公国"
 BLR_GDL_desc: "是时候恢复立陶宛联邦的伟大国家了。最终，我们的人民将不再受制于超级大国；他们将有机会成为自己的超级大国。"
 BLR_help_silesians: "帮助西里西亚分裂势力"
 BLR_help_silesians_desc: "分而治之是我们对待波兰政策的主要原则。一旦我们开始积极控制波兰，西里西亚人或许能够帮助我们征服该国。"
 BLR_lith_again: "萨莫吉希亚回归"
 BLR_lith_again_desc: "现在是时候完成我们强大国家的重建了。弱小的立陶宛挡在我们的面前；我们将摧毁它。但我们不能毫无理由地侵略这个国家；我们必须创造必要的条件和借口，使我们的入侵不显得毫无根据。"
 BLR_true_political_and_national_freedom: "真正的政治自由"
 BLR_true_political_and_national_freedom_desc: "真正的政治自由始于从内部清洗造成的破坏中恢复过来。现在是时候向前迈进，实现我们人民真正渴望的东西了。"
 BLR_Taler_ruble: "白俄罗斯神话"
 BLR_Taler_ruble_desc: "我们必须彻底放弃卢布，用我们的新货币取而代之。"
 BLR_National_science: "科学与经济增长"
 BLR_National_science_desc: "我们将作为一个独立国家，开始发展我们自己的科学和经济。"
 BLR_Delete_KGB: "解散KGB"
 BLR_Delete_KGB_desc: "克格勃应该解散，并由新的机构取而代之。"
 BLR_Reform_Police: "警察改革"
 BLR_Reform_Police_desc: "苏联民兵是历史遗迹，我们想要彻底清除。我们正在将其重组为一支仿照波兰模式的国家警察部队。"
 BLR_attack_russian_bear: "彻底消灭俄国熊"
 BLR_attack_russian_bear_desc: "最终，我们的主要敌人将被消灭。"
 BLR_Young_Front_desc: "青年阵线是白俄罗斯青年的国际青年运动，也是白俄罗斯的青年反对派组织。"
 BLR_south_river_battalion: "南河营"
 BLR_south_river_battalion_desc: "一个从南河来的居民组成的营。"
 BLR_territorial_reform: "领土改革"
 BLR_territorial_reform_desc: "泽农·波兹尼亚克和该计划的作者团队提议将该国分为16个省，而不是今天的六个地区和110个区，另外还有明斯克。反过来，省将分为60个省和270个旧城。"
 BLR_anti_lgbt: "禁止不正当关系的宣传"
 BLR_anti_lgbt_desc: "我们正在通过一项关于家庭、婚姻（一男一女结合）、母性、保护家庭不受意识形态和组织侵犯和干涉家庭事务的优先和保护的法律。此外，建议通过一项“关于保护人性”的法律，禁止宣传违背人的自然本性的不正当关系。"
 BLR_latgale_or_war: "拉特加尔或战争"
 BLR_latgale_or_war_desc: "拉特加尔曾是立陶宛大公国的一部分。现在是时候将这些土地归还给我们的国家了。拉脱维亚恐怕难以抵挡我们的进攻。"
 BLR_legacy_kurland: "库尔兰公国的遗产"
 BLR_legacy_kurland_desc: "库尔兰公国曾一度涉足殖民扩张。公国的旗帜曾飘扬在特立尼达和多巴哥以及冈比亚的海岸线上。作为公国的合法继承者，现在是时候将这些领土归还给我们的帝国，并将这些昔日的殖民地重新纳入版图了。"
 BLR_pro_poland_propoganda: "波兰的亲白俄罗斯宣传"
 BLR_pro_poland_propoganda_desc: "我们必须通过宣传和其他互动方式来增强我们在波兰的影响力。"
 BLR_Dismiss_soviet_officers: "解雇亲苏军官"
 BLR_Dismiss_soviet_officers_desc: "反对苏联遗毒的斗争也应该延伸到军队。我们不需要同情那个血腥政权的将军。"
 BLR_Anti_corruption_law: "反腐败法"
 BLR_Anti_corruption_law_desc: "我们将打击一切形式的腐败。"
 BLR_open_border_with_pol: "开放边境"
 BLR_open_border_with_pol_desc: "开放国境不仅可以帮助我们的人民感受到经济联系，也可以感受到身体联系。"
 BLR_training_for_pol: "联合军事演习"
 BLR_training_for_pol_desc: "我们的军队需要作战协调。联合军事演习将对此大有裨益。"
 BLR_Asseco_Poland: "阿塞科波兰"
 BLR_Asseco_Poland_desc: "我们将收购这家公司，使其成为我们未来白俄罗斯人和波兰人国家的财产。"
 BLR_ynia_Poland: "第二次卢布林联盟"
 BLR_ynia_Poland_desc: "是时候铭记卢布林联盟给立陶宛大公国带来的耻辱了。这一次，情况将有所不同。"
 BLR_Ukraine_way: "与乌克兰友好"
 BLR_Ukraine_way_desc: "尽管我们存在领土要求，但我们愿意与乌克兰就共同敌人问题展开对话。或许可以建立一个联盟，帮助我们的国家在被敌人包围时生存下去。"
 BLR_Join_GUAM_to_Ukraine: "加入古阿姆"
 BLR_Join_GUAM_to_Ukraine_desc: "我们向乌克兰迈出的友好第一步，就是加入古阿姆，乌克兰在该组织中扮演着领导角色。"
 BLR_training_with_ukr: "联合军事演习"
 BLR_training_with_ukr_desc: "我们准备向乌克兰军队提议举行联合演习，以练习战术和协调部队。"
 BLR_military_coop_with_ukraine: "§G军事技术合作§!"
 BLR_military_coop_with_ukraine_desc: "我们愿与乌克兰军工复合体建立军事技术合作。"
 BLR_Intermarium: "海间联邦"
 BLR_Intermarium_desc: "现在是我们与乌克兰结成强大联盟，共同对抗敌人的时候了。"
 BLR_Intermarium_poland: "海间联邦"
 BLR_Intermarium_poland_desc: "现在是我们与波兰结成强大联盟，共同对抗敌人的时候了。"
 BLR_Ukraine_enemy: "夺取乌克兰领土"
 BLR_Ukraine_enemy_desc: "历史上，这些土地属于立陶宛大公国。任何虚假的友谊都不应阻止我们将它们归还给我们的伟大国家。"
 BLR_Sovereign_Internet: "互联网主权"
 BLR_Sovereign_Internet_desc: "我们必须使我们的互联网空间完全独立于其他国家，以便他们无法影响我们的公民。"
 BLR_Expand_Mozyr_Refinery: "扩建莫济尔炼油厂"
 BLR_Expand_Mozyr_Refinery_desc: "我们将扩建这家炼油厂。"
 BLR_Expand_Naftan_Refinery: "扩建纳夫坦炼油厂"
 BLR_Expand_Naftan_Refinery_desc: "我们将扩建这家炼油厂。"
 BLR_Expansion_Okolovsky_Novoselkovsky: "扩大矿石生产"
 BLR_Expansion_Okolovsky_Novoselkovsky_desc: "奥科洛夫斯基和诺沃谢尔科夫斯基矿床矿石产量的扩大将为我们带来大量的钢铁。"
 BLR_Problem_duying_vilages: "垂死村庄的问题"
 BLR_Problem_duying_vilages_desc: "我们国家是时候决定如何处置那些正在衰落的村庄了。"
 BLR_Economic: "白俄罗斯经济"
 BLR_Economic_desc: "我们需要发展经济，我们正在采取一系列措施来成功实现这一目标。"
 BLR_GrodnoAzot: "格罗德诺氮"
 BLR_GrodnoAzot_desc: "格罗德诺氮肥股份公司旗下的希姆沃洛克诺工厂是一家大型聚酰胺和聚酯纱线及纤维生产商，同时也生产聚酰胺-6 (PA-6) 及其基聚合物复合材料。根据应用需求，该工厂生产的各类主要产品均具有丰富的规格，并具备不同的物理机械性能和质量指标。"
 BLR_AirPort_minsk: "扩建国际机场"
 BLR_AirPort_minsk_desc: "我们准备投入大量资金用于明斯克机场的扩建。"
 BLR_it_industries_help: "帮助本土发展商"
 BLR_it_industries_help_desc: "我们必须尽一切努力支持我们的信息技术产业 - 这关乎我们国家的未来。"
 BLR_viber: "维伯尔"
 BLR_viber_desc: "维伯尔是一个发信应用程序，允许您通过互联网发送消息，进行视频和语音VoIP呼叫。安装了维伯尔r的用户之间的语音通话是免费的。维伯尔能够发送文本，语音和视频消息，文档，图像，视频和文件，以及离线工作。"
 BLR_wot: "坦克世界"
 BLR_wot_desc: "《坦克世界》是一款大型团队多人在线游戏客户端，致力于20世纪中叶的装甲车辆。玩家可以使用根据真实的第二次世界大战地点创建的40多张战斗地图，以及11个国家总数量超过600的历史可靠单位。"
 BLR_russian_gazprom: "俄罗斯天然气工业股份公司"
 BLR_russian_gazprom_desc: "俄罗斯天然气工业股份公司是天然气和石油市场的重要参与者。我们必须与他们建立尽可能紧密的合作关系。"
 BLR_BPS_Sberbank: "BPS储蓄银行"
 BLR_BPS_Sberbank_desc: "BPS储蓄银行是俄罗斯联邦储蓄银行在我国境内的分支机构。"
 BLR_Belgazprombank: "白俄罗斯天然气工业银行"
 BLR_Belgazprombank_desc: "白俄罗斯天然气工业银行是白俄罗斯的俄罗斯天然气工业银行分支。"
 BLR_Development_domestic_tourism: "发展本土旅游业"
 BLR_Development_domestic_tourism_desc: "我们在其本土旅游上看到了巨大的潜力。为此，每个代表都将为其所在地区的旅游发展做出贡献。主要任务是建设起基础建设，毕竟这里有丰富的科学与方法材料。"
 BLR_private_railways: "私人铁路公司"
 BLR_private_railways_desc: "我们将把铁路移交给私营公司。"
 BLR_Lith_pol_railways: "铁路与波兰和立陶宛连接"
 BLR_Lith_pol_railways_desc: "我们计划与这些国家建立高质量的铁路连接，这将使我们能够获得欧洲货物。"
 BLR_JSC_russian_railways: "俄罗斯铁路"
 BLR_JSC_russian_railways_desc: "我们现在已经与俄罗斯铁路完全整合。"
 BLR_belavia: "贝拉维亚"
 BLR_belavia_desc: "白俄罗斯国家航空公司，总部位于明斯克，成立于1996年。主要的定期航班和国际包机航班由明斯克国家机场运营。"
 BLR_Danone: "达能"
 BLR_Danone_desc: "法国食品公司，知名的乳制品和其它食品制品生产商。"
 BLR_Godel_tech: "戈德尔科技"
 BLR_Godel_tech_desc: "英国公司为总部位于曼彻斯特的英国顶级公司提供软件开发解决方案。"
 BLR_Basf_tech: "巴斯夫"
 BLR_Basf_tech_desc: "巴斯夫是德国、欧洲和世界上最大的化学综合体。总部位于德国西南莱茵兰-帕莱纳特的路德维希港。"
 BLR_royal_dutch_shell: "荷兰皇家壳牌集团"
 BLR_royal_dutch_shell_desc: "壳牌是一家英国-荷兰石油和天然气公司"
 BLR_mts: "移动电信"
 BLR_mts_desc: "移动电信是一家俄罗斯公司，以“移动电信”商标在俄罗斯、亚美尼亚和白俄罗斯提供电信、数字和媒体服务。该公司提供蜂窝通信服务（符合UMTS（3G）、4G、LTE和5G标准）、有线电话服务、宽带互联网接入、移动电视、有线电视、卫星电视、数字电视、媒体和娱乐内容服务、金融服务，以及物联网、监控、流程自动化、数据处理和云计算领域的融合IT解决方案。"
 BLR_pol_revol_category: "必须让民族主义者掌权波兰"
 BLR_pol_revol_category_desc: "我们必须向波兰复仇，报复它多年来企图摧毁我们的独立，报复它屈辱的卢布林联盟，报复它在20世纪分裂我们的国家。我们将使波兰人民别无选择，只能服从我们。"
 BLR_Establish_cooperation_pol: "与波兰民族主义者建立联系"
 BLR_podlasie_return: "把比亚里斯托克归还给白俄罗斯"
 BLR_podlasie_return_desc: "比亚韦斯托克一直是白俄罗斯人的土地。现在是时候从波兰人手中夺回这片土地，并将其归还给白俄罗斯国家了。"
 BLR_Duchy_claims_category: "领土宣称"
 BLR_Duchy_claims_category_desc: "我们铭记立陶宛大公国的历史及其曾经统治的所有土地。我们将宣布对所有昔日领土的主权要求。"
 BLR_ukraine_claims: "宣称§Y[UKR.GetNamewithFlag]§!领土"
 BLR_poland_claims: "宣称§Y[POL.GetNamewithFlag]§!领土"
 BLR_russia_claims: "宣称§Y[SOV.GetNamewithFlag]§!领土"
 BLR_latgale_claims: "宣称§Y[LAT.GetNamewithFlag]§!领土"
 BLR_samogitia_return: "整合萨莫吉希亚"
 BLR_sudovia_return: "整合苏多维亚"
 BLR_klaipeda_return: "整合克莱佩达"
 BLR_latgale_return: "整合拉特加莱"
 BLR_Lukashenko_category: "卢卡申科的统治"
 BLR_Lukashenko_category_desc: "卢卡申科的统治本质上显然是专制的，他只想达成一个目标——不惜一切代价保有政权。\n§W--------------§!\n目前，支持亚历山大·格里戈里耶维奇·卢卡申科的百分比为§Y[?BLR.batka]§!"
 BLR_send_russian_omon: "请求俄罗斯暴动警察镇压抗议"
 BLR_go_to_jail_scum: "向反对派送进监狱"
 BLR_trade_with_iraq: "向伊拉克提供武器"
 BLR_fly_protasevich: "瑞安航空飞机降落普罗塔塞维奇"
 BLR_Deal_with_Poland: "与波兰人联盟的协议"
 BLR_New_concept_security: "国家安全新概念"
 BLR_people_militia: "人民武装"
 BLR_people_militia_desc: "但情况并非一帆风顺。我不止一次说过：每个人都（不仅仅是男人）都至少应该能够持械。至少在必要时，为了保护你的家人，你的家庭，你的故乡，祖国的角落，以及（如果有必要的话）国家，没有这个世界就没有角落，没有家，就没有别的东西。许多人明白这一点，”亚历山大·卢卡申科强调道。"
 BLR_Kommunarka_category: "科穆纳卡工厂"
 BLR_Kommunarka_category_desc: "现在我们已经将工厂完全国有化，我们将能够获得工厂的全部收入。"
 BLR_Go_to_Russia: "开始在[SOV.GetNamewithFlag]出售产品"
 BLR_Go_to_Latvia: "开始在[LAT.GetNamewithFlag]出售产品"
