 indonesia.57.t: "¡Desastre en Sulawesi!"
 indonesia.57.d: "Nuestros fracasos a la hora de construir infraestructura adecuada en Sulawesi han provocado el derrumbe de varios edificios y la muerte de muchos de nuestros habitantes."
 indonesia.57.a: "¡Era evitable!"
 indonesia.58.t: "¡Desastre en Papúa Occidental!"
 indonesia.58.d: "Nuestra incapacidad para proporcionar una gestión adecuada a Papúa Occidental ha provocado un incidente en el que una de nuestras fábricas militares se derrumbó."
 indonesia.58.a: "¡Era evitable!"
 indonesia.59.t: "¡Desastre en Papúa!"
 indonesia.59.d: "Nuestros fracasos para proporcionar la infraestructura adecuada en Papúa Occidental han resultado en un accidente industrial que ha causado daños en varias instalaciones de producción militar."
