 GRE_process_sco_member_tt: "§YDébut du processus d'intégration au sein de l'OCS.§!"
 GRE_enemy_blocked_us: "§RSi ces décisions sont indisponibles, cela signifie que l'ennemi nous a temporairement bloqués ou que nous ne remplissons pas d'autres conditions !§!"
