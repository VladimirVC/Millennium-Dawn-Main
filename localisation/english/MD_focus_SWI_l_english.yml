l_english:
 switzerland_focus: "Swiss Focus Tree"
 #Mountain Fortress Tree
 SWI_the_mountain_fortress: "The Mountain Fortress"
 SWI_the_mountain_fortress_desc: "The most efficient defense we possess is our mountains. We must build these up if we wish to maintain the defensive edge."
 SWI_guns_for_the_population: "Guns for the Population"
 SWI_guns_for_the_population_desc: "A nation that is beset on all sides by stronger nations must have a population that is ever ready to protect their homes."
 SWI_zurich_industrial_project: "Zürich Industrial Project"
 SWI_zurich_industrial_project_desc: "If we are to compete with our neighbors we must have a robust industrial sector."
 SWI_strengthen_the_secret_services: "Strengthen the Secret Services"
 SWI_strengthen_the_secret_services_desc: "The secret service can go a long way to discover threats both outside and inside our nation."
 SWI_military_investments_1: "Armaments Programme I"
 SWI_military_investments_1_desc: "Fund the first tranche of the annual Armaments Programme put before Parliament, converting a sustained defence budget into new industrial capacity."
 SWI_geneva_industrial_project: "Geneva Industrial Project"
 SWI_geneva_industrial_project_desc: "Geneva could always use more factory jobs. We should completely reform the area."
 SWI_secure_the_swiss_borders: "Secure the Swiss Borders"
 SWI_secure_the_swiss_borders_desc: "We will begin to set up vast networks of border patrols and checkpoints to ensure no one can get in, or out, without us knowing."
 SWI_italian_forts: "Italian Forts"
 SWI_italian_forts_desc: "We must always be ready for an attack from our Southern neighbors."
 SWI_german_forts: "German Forts"
 SWI_german_forts_desc: "We came way too close for comfort to war with Germany during WW2. We cannot be allowed to be taken off guard should German aggression once again rise."
 SWI_french_forts: "French Forts"
 SWI_french_forts_desc: "It isn't like France has not invaded us before. We cannot allow ourselves to be overwhelmed like we did centuries before. We will be ready, just in case."
 SWI_military_investments_2: "Armaments Programme II"
 SWI_military_investments_2_desc: "Carry the Armaments Programme forward with a second wave of procurement, having proven that steady investment yields a self-sufficient defence industry."

 #CERN Project Tree
 SWI_the_cern_project: "The CERN Project"
 SWI_the_cern_project_desc: "Nuclear research is the way of the future. We should begin extensive studies into the field."
 SWI_the_large_hadron_collider: "The Large Hadron Collider"
 SWI_the_large_hadron_collider_desc: "To better study and advance our projects in CERN, we will begin the construction of the most powerful and robust particle accelerator the world has ever known."
 SWI_construct_power_plants: "Construct Power Plants"
 SWI_construct_power_plants_desc: "With the new knowledge we have gained from our research, we can begin to institute more efficient forms of energy."
 SWI_expand_swiss_nuclear_plants: "Expand Swiss Nuclear Plants"
 SWI_expand_swiss_nuclear_plants_desc: "Our nuclear plants still meet domestic demand, but the margin is thinning. Expanding capacity now would secure Swiss energy independence for a generation."

 #Research & Development Branch
 SWI_research_and_development: "Armasuisse Science and Technology"
 SWI_research_and_development_desc: "Armasuisse S+T is the technology centre of the Department of Defence, uniting sensors, communications, cyber security and materials research. By sustaining a security-relevant technological base at home, Switzerland minimises its dependence on foreign suppliers in a crisis."
 SWI_asd_gruppe: "ETH Domain Research Programme"
 SWI_asd_gruppe_desc: "Bind armasuisse to the ETH Domain, ETH Zurich and EPFL, under a joint Research Programme Security. Federal francs and academic talent are pooled to turn frontier research into fielded defence capability."
 SWI_small_arms_development: "Infantry Weapons Development"
 SWI_small_arms_development_desc: "Modernise the successor to the Stgw 90 (SG 550) service rifle and its optics, drawing on SIG and B&T expertise. A militia army lives or dies by the reliability of the weapon in every citizen-soldier's hands."
 SWI_sig_ag_research_teams: "Swiss Arms Research Teams"
 SWI_sig_ag_research_teams_desc: "Stand up dedicated design teams within the SIG small-arms lineage at Neuhausen. Decades of Swiss precision manufacturing are directed at the next generation of individual and squad weapons."
 SWI_precision_launch_platforms: "Guided Anti-Tank Systems"
 SWI_precision_launch_platforms_desc: "Develop man-portable guided anti-tank systems to give dismounted grenadiers a decisive punch against armour in the close terrain of the Alpine foreland."
 SWI_support_platforms_research: "Integrated Command Systems"
 SWI_support_platforms_research_desc: "Advance the FIS Heer battle-management network so commanders share a common tactical picture in real time. Swiss command, control and communications knit the dispersed militia into one force."
 SWI_mass_produced_firearms: "Ammunition and Small-Arms Production"
 SWI_mass_produced_firearms_desc: "Scale domestic ammunition and small-arms output through SwissP Defence (formerly RUAG Ammotec). Guaranteed national stockpiles keep the militia armed without reliance on imports."
 SWI_armored_vehicles_study: "Armoured Vehicle Programme"
 SWI_armored_vehicles_study_desc: "Coordinate the Swiss armoured-vehicle industry around the GDELS-Mowag Piranha and Eagle families, the wheeled backbone of the mechanised brigades."
 SWI_airframes_study: "Aeronautics Programme"
 SWI_airframes_study_desc: "Consolidate Swiss aeronautics expertise across Pilatus at Stans and RUAG Aviation at Emmen, from trainer airframes to combat-aircraft maintenance and structures."
 SWI_mbt_concept: "Leopard 2 Modernisation"
 SWI_mbt_concept_desc: "Upgrade the Pz 87 Leopard 2 fleet with RUAG-led fire-control, protection and mobility packages to keep the main battle tank relevant into the coming decades."
 SWI_spart_systems: "Self-Propelled Artillery"
 SWI_spart_systems_desc: "Extend the reach and accuracy of the M109 (Pz Hb) self-propelled howitzer through the KAWEST upgrade programme, delivering responsive fires across mountainous terrain."
 SWI_spaa_systems: "Mobile Air Defence"
 SWI_spaa_systems_desc: "Field a mobile short-range air-defence vehicle built on the Rheinmetall Air Defence Skyranger 35mm system, protecting manoeuvre forces from aircraft and drones."
 SWI_production_line_innovations: "Automated Production Lines"
 SWI_production_line_innovations_desc: "Retool RUAG and Mowag assembly halls with modern automation, raising output and freeing scarce skilled labour for higher-value work."
 SWI_import_missile_tech: "Guided Missile Integration"
 SWI_import_missile_tech_desc: "Acquire and integrate modern air-to-air and surface-to-air missiles, building the domestic know-how to sustain and adapt them on Swiss platforms."
 SWI_helicopter_research: "Rotary-Wing Programme"
 SWI_helicopter_research_desc: "Sustain and upgrade the Super Puma / Cougar and EC635 fleets through RUAG Aviation, the workhorses of Swiss transport, liaison and mountain rescue."
 SWI_air_cavalry_armament: "Pilatus Trainer Programme"
 SWI_air_cavalry_armament_desc: "Back Pilatus Aircraft and its PC-21 advanced trainer, a global export success that anchors Switzerland's civil-military aeronautics base at Stans."
 SWI_gunship_development: "Light Attack Aircraft"
 SWI_gunship_development_desc: "Develop armed variants of the Pilatus trainer line for light attack and armed reconnaissance, a niche Swiss export capability."
 #Isolation & Logistics Branch
 SWI_revise_isolation_strategy: "Beyond the Réduit"
 SWI_revise_isolation_strategy_desc: "Move past the static Alpine Réduit toward a modern dynamic area defence, matching the Further Development of the Army (WEA) reforms to a changed threat picture."
 SWI_log_tunnel_network: "Alpine Tunnel Depots"
 SWI_log_tunnel_network_desc: "Exploit Switzerland's hidden network of cavern depots and tunnels bored into the mountains, storing munitions and fuel where no air strike can reach them."
 SWI_domestic_res_output: "National Economic Supply"
 SWI_domestic_res_output_desc: "Strengthen the wirtschaftliche Landesversorgung, the legal framework that keeps energy, food and critical goods flowing to the nation in an emergency."
 SWI_strat_supply_reserves: "Compulsory Strategic Reserves"
 SWI_strat_supply_reserves_desc: "Enforce the Pflichtlager system of compulsory stockpiles, holding months of fuel, food and medicine in reserve against blockade or crisis."
 SWI_environmental_adaptation: "Alpine Warfare Doctrine"
 SWI_environmental_adaptation_desc: "Train and equip specialist mountain formations to fight and survive in high-altitude winter conditions, turning the terrain itself into a weapon."
 SWI_repair_decaying_forts: "Recommission the Alpine Forts"
 SWI_repair_decaying_forts_desc: "Reactivate select artillery forts and hardened positions decommissioned under the Army 95 and Army XXI reforms, restoring depth to the mountain defences."
 SWI_graubunden_gold_silver: "Alpine Mineral Extraction"
 SWI_graubunden_gold_silver_desc: "Reopen dormant mineral workings in the Graubünden Alps to secure a domestic trickle of strategic materials for the arms industry."
 SWI_graubunden_iron_mines: "Alpine Ore Mining"
 SWI_graubunden_iron_mines_desc: "Exploit Alpine iron ore to feed a small domestic steel supply, reducing dependence on imported raw materials for war production."
 #Military Industry Expansion Branch
 SWI_mil_industry_expansion: "Expand the Defence Industrial Base"
 SWI_mil_industry_expansion_desc: "Grow the security-relevant industrial base that the War Materiel Act obliges Switzerland to maintain. A neutral nation must be able to arm and sustain itself when foreign supply lines close."
 SWI_sig_neuhausen_factory: "SIG Works at Neuhausen"
 SWI_sig_neuhausen_factory_desc: "Expand the historic SIG works at Neuhausen am Rheinfall, the heart of Swiss small-arms manufacturing since the nineteenth century."
 SWI_sig_graubunden_factory: "Dispersed Arms Production"
 SWI_sig_graubunden_factory_desc: "Disperse small-arms and munitions production into the Graubünden valleys, hardening the industrial base against a decapitating strike in line with Swiss dispersal doctrine."
 SWI_infrastructural_advancement: "Industrial Infrastructure"
 SWI_infrastructural_advancement_desc: "Upgrade the rail and road links feeding the arms plants so raw materials and finished equipment move reliably even under wartime strain."
 SWI_expand_gdels_mowag: "Expand GDELS-Mowag Kreuzlingen"
 SWI_expand_gdels_mowag_desc: "Enlarge the GDELS-Mowag plant at Kreuzlingen, home of the Piranha and Eagle armoured vehicles serving the Swiss Army and export customers alike."
 SWI_new_factory_ruag: "New RUAG Facility"
 SWI_new_factory_ruag_desc: "Open new RUAG MRO Switzerland capacity for aircraft and land-systems overhaul. National policy reserves the great majority of Swiss military maintenance for RUAG."
 SWI_cooperation_with_rheinmetall: "Cooperation with Rheinmetall"
 SWI_cooperation_with_rheinmetall_desc: "Deepen ties with Rheinmetall Air Defence AG in Zurich, heir to Oerlikon Contraves and its 35mm cannon, Skyguard and Skyshield air-defence heritage."
 SWI_cooperation_with_thales: "Cooperation with Thales"
 SWI_cooperation_with_thales_desc: "Partner with Thales Suisse for radar, optronics and command-and-control systems, plugging Swiss forces into proven sensor and networking technology."
 SWI_general_staff: "Armed Forces Staff"
 SWI_general_staff_desc: "Consolidate planning and doctrine under the Armed Forces Staff (Führungsstab der Armee) beneath the Chief of the Armed Forces, giving the militia a modern joint command."
 SWI_gemeinsames_ok: "Kommando Spezialkräfte"
 SWI_gemeinsames_ok_desc: "Build up the Special Forces Command, its Army Reconnaissance Detachment 10 and grenadier formations, into a small but elite spearhead for the militia army."
 SWI_ausbildungskommando: "Kommando Ausbildung"
 SWI_ausbildungskommando_desc: "Reform the Training Command that runs recruit schools and refresher courses. The strength of the Swiss system is a whole population passing through disciplined, standardised training."
 #Air Force Modernization Branch (Air2030)
 SWI_airforce_modernization: "The Air2030 Programme"
 SWI_airforce_modernization_desc: "Launch Air2030, the largest arms procurement in modern Swiss history, to replace the ageing F-5 Tiger and F/A-18 Hornet and rebuild ground-based air defence for a generation."
 SWI_general_air_defense: "New Fighter Aircraft Evaluation"
 SWI_general_air_defense_desc: "Open the New Fighter Aircraft (NKF) evaluation, flying the shortlisted candidates at Payerne and measuring them against the demands of policing dense, mountainous Swiss airspace."
 SWI_import_eurofighters: "Eurofighter Typhoon Bid"
 SWI_import_eurofighters_desc: "Assess the Airbus and BAE Eurofighter Typhoon, a proven European air-superiority fighter offered with a substantial industrial-participation package."
 SWI_import_rafale_fighters: "Dassault Rafale Bid"
 SWI_import_rafale_fighters_desc: "Assess the Dassault Rafale, France's versatile omnirole fighter, weighing its sovereignty advantages and offset offers against the field."
 SWI_german_manufacturing: "German Industrial Offsets"
 SWI_german_manufacturing_desc: "Negotiate technology transfer and offset work with the German-led Eurofighter consortium, channelling procurement francs back into Swiss industry."
 SWI_french_manufacturing: "French Industrial Offsets"
 SWI_french_manufacturing_desc: "Negotiate offset and industrial-participation deals with Dassault and Thales, securing Swiss workshare in exchange for the aircraft buy."
 SWI_interception_practices: "Select the F-35A Lightning II"
 SWI_interception_practices_desc: "Down-select the Lockheed Martin F-35A, whose sensor fusion and stealth topped the evaluation. Fifth-generation situational awareness transforms Swiss interception and quick-reaction alert."
 SWI_multi_role_specialization: "Multirole Integration"
 SWI_multi_role_specialization_desc: "Integrate the F-35A across air-defence and strike roles, arming it with AIM-120 and AIM-9X missiles and precision munitions for a single flexible fleet."
 SWI_air_sup_adaptation: "Round-the-Clock Air Policing"
 SWI_air_sup_adaptation_desc: "Stand up 24/7 quick-reaction alert over Swiss airspace, a capability the Air Force reached in 2020 and now sustains with the new fighter fleet."
 SWI_acquire_transport_planes: "Tactical Airlift"
 SWI_acquire_transport_planes_desc: "Expand air-transport capacity around the Super Puma and Cougar fleet and light fixed-wing aircraft, moving troops and relief supplies across the country and abroad."
 SWI_airbase_expansion: "Air Base Infrastructure"
 SWI_airbase_expansion_desc: "Modernise the main operating bases at Payerne, Meiringen and Emmen, including the mountain cavern shelters that let jets ride out an attack underground."
 SWI_nasams_batteries: "Patriot Ground-Based Air Defence"
 SWI_nasams_batteries_desc: "Procure Patriot long-range surface-to-air systems under Air2030, giving Switzerland its first true defence against high-altitude and stand-off threats."
 SWI_florako: "FLORAKO Air Surveillance"
 SWI_florako_desc: "Run the FLORAKO system, the integrated radar and command network that watches Swiss airspace around the clock and cues both fighters and ground-based air defence."

 ##Rafael New

 # EVENTS #
 switzerland.2.t: "End of the Swiss Political System"
 switzerland.2.d: "The democracy in Switzerland, once viewed as a role model and a shining star of inspiration for all those seeking more popular involvement in government due to the possibilities given to the Swiss citizens, is no more.\n\nThe Swiss leader [SWI.GetLeader] has announced that these \"Distractions from Public Life\" and \"Unnecessary Referendums\" would stop taking place."
 switzerland.2.o1: "Good riddance."
 switzerland.2.o2: "Such a shame."
 switzerland.2.o3: "Whatever."
 switzerland_news.1.t: "Switzerland joins the UN"
 switzerland_news.1.d: "Originally, the Swiss government had refused to join the United Nations after the end of the Second World War, pointing to the country's continued dedication to its own neutrality, even as Geneva hosted the United Nations Office, the organization's main European seat.\n\nNow, after a public referendum on the matter, the Swiss government has announced that the country would move forward to abandon its post as a spectator and would now join the organization as a full member."
 switzerland_news.1.o1: "It's about time, Switzerland!"
 switzerland_news.1.o3: "Is it really that big of a deal?"

 # MODIFIERS #
 SWI_join_un: "New UN Member"

 # IDEAS #
 swiss_political_system: "Political System of Switzerland"
 swiss_political_system_desc: "Switzerland has a very unique political system and is the only country in the world that can rightfully call itself a 'semi-direct democracy'. Citizens can change the constitution per referendum, can veto laws per referendum, can even pass laws per referendum.\nThis has implications for politicians however: Because the people make the policies either way, the Swiss coalition system has to include as many forces as possible. The four big parties of Switzerland, SVP, FDP, CVP and SP, are constantly in government together - this makes national elections in Switzerland more or less useless - as the people rule not through their representatives, but through referendums."
 swiss_political_system2: "Political System of Switzerland"
 swiss_political_system2_desc: "Switzerland has a very unique political system and is the only country in the world that can rightfully call itself a 'semi-direct democracy'. Citizens can change the constitution per referendum, can veto laws per referendum, can even pass laws per referendum.\nThis has implications for politicians however: Because the people make the policies either way, the Swiss coalition system has to include as many forces as possible. The four big parties of Switzerland, SVP, FDP, CVP and SP, are constantly in government together - this makes national elections in Switzerland more or less useless - as the people rule not through their representatives, but through referendums."
 swiss_political_system3: "Political System of Switzerland"
 swiss_political_system3_desc: "Switzerland has a very unique political system and is the only country in the world that can rightfully call itself a 'semi-direct democracy'. Citizens can change the constitution per referendum, can veto laws per referendum, can even pass laws per referendum.\nThis has implications for politicians however: Because the people make the policies either way, the Swiss coalition system has to include as many forces as possible. The four big parties of Switzerland, SVP, FDP, CVP and SP, are constantly in government together - this makes national elections in Switzerland more or less useless - as the people rule not through their representatives, but through referendums."
 SWI_swiss_neutrality_desc: "§YSpecial Rules:§!\n\n§YWe§! §RCANNOT§! §Ydeclare war on other countries!§!\n--------------\nThe Swiss are known all around the globe to be neutrals. Since its foundation as a republic, the country has not engaged in any kind of offensive conflict, and remained neutral during both world wars.\n--------------\nThis national spirit can be §RRemoved§! by completing the §HRadical Changes§! or the §HOpening Up§! Focus."
 SWI_Expanding_nuclear_research: "Expanding Nuclear Research"
 SWI_Expanding_nuclear_research1: "Expanding Nuclear Research"

 #New Political Ideas
 SWI_Grune_idea: "Grüne Schweiz"
 SWI_Grune_idea_desc: "For a cleaner, fairer, and freer Switzerland - where people and planet come before profit!"
 SWI_universal_education_bonus: "Green Tech"
 SWI_universal_education_bonus_desc: "Switzerland's investment in modern education has fueled research in renewable energy and sustainable technology, paving the way for a cleaner future."
 SWI_environmental_reforms: "Environmental Reforms"
 SWI_environmental_reforms_desc: "Comprehensive environmental laws aim to reduce emissions, protect natural resources, and transition the economy toward sustainability."
 SWI_limit_industry: "Limited Industrial Development"
 SWI_limit_industry_desc: "Industrial expansion is restricted to protect Switzerland's environment, trading rapid growth for long-term ecological stability."
 SWI_eco_tourism: "Eco Tourism"
 SWI_eco_tourism_desc: "Promoting eco-friendly travel brings new life to rural areas while preserving Switzerland's pristine landscapes."
 SWI_national_parks: "National Parks"
 SWI_national_parks_desc: "Expanding protected areas safeguards wildlife and strengthens Switzerland's global image as an environmental leader."
 SWI_completely_green: "Completely Green!"
 SWI_completely_green_desc: "Through relentless reform and innovation, Switzerland achieves full ecological sustainability, a nation powered entirely by clean energy."
 SWI_christian_values: "Christian Values"
 SWI_christian_values_desc: "Traditional Christian principles guide social policy and strengthen the moral foundation of Swiss society."
 SWI_banned_abortion: "Banned Abortion"
 SWI_banned_abortion_desc: "Strict laws prohibit abortion, reflecting a renewed national commitment to conservative social ethics."
 SWI_ndb: "Swiss NDB"
 SWI_ndb_desc: "The Swiss NDB enhances intelligence operations, protecting national security and preserving neutrality in an unstable world."
 SWI_traditionalist: "Traditionalism"
 SWI_traditionalist_desc: "Traditionalist thought shapes policy, emphasizing faith, family, and national heritage over modern social trends."
 SWI_army_fund: "Army Funding"
 SWI_army_fund_desc: "Increased defense spending strengthens the Swiss military's readiness and modernizes its infrastructure."
 SWI_ngo_funding: "NGO Funding"
 SWI_ngo_funding_desc: "Government grants support NGOs working in humanitarian aid, environmental protection, and civil rights."
 SWI_efficiency: "Swiss Efficiency"
 SWI_efficiency_desc: "Swiss efficiency becomes a hallmark of governance - streamlined bureaucracy, reduced waste, and precise management."
 SWI_fortress_switzerland: "Fortress Switzerland"
 SWI_fortress_switzerland_desc: "Major fortifications and modern defense networks ensure that Switzerland remains impenetrable in any conflict."
 SWI_tax_code: "Simplified Tax Code"
 SWI_tax_code_desc: "A simplified tax system reduces evasion, attracts investment, and supports a balanced economy."
 SWI_foreign: "Foreign Companies"
 SWI_foreign_desc: "Foreign corporations are encouraged to invest in Switzerland, driving innovation and job creation while maintaining national control."
 SWI_agriculture: "Agricultural Funding"
 SWI_agriculture_desc: "Switzerland invests in modern, sustainable agriculture - supporting local farmers, protecting rural communities, and ensuring food security for future generations."
 SWI_fdp: "FDP"
 SWI_fdp_desc: "FDP is a liberal party advocating free markets, individual entrepreneurship, economic freedom, and minimal state intervention."
 SWI_police_reforms: "Police Reforms"
 SWI_police_reforms_desc: "Modernize law enforcement, improve efficiency, and enhance public safety throughout the nation."
 SWI_financial_deregulation: "Financial Deregulation"
 SWI_financial_deregulation_desc: "Reduce banking and financial restrictions to encourage investment, growth, and economic dynamism."
 SWI_precision: "Swiss Precision"
 SWI_precision_desc: "Foster excellence in Swiss manufacturing, promote high-quality industry, and maintain the nation's reputation for precision."
 SWI_fund_startups: "Tech Startups"
 SWI_fund_startups_desc: "Provide funding and support to technology startups to drive innovation and secure Switzerland's economic future."
 SWI_direct_democracy: "Direct Democracy Reforms"
 SWI_direct_democracy_desc: "Expand citizen participation through referendums and initiatives, strengthening the democratic process."
 SWI_progressive_tax: "Progressive Tax Reforms"
 SWI_progressive_tax_desc: "Implement a fair progressive tax system to fund public services and ensure economic balance."
 SWI_pda: "Partei der Arbeit"
 SWI_pda_desc: "The Communist Party of Switzerland, gaining significant influence, advocates for radical shifts in the nation's economic structure, seeking to transform Swiss neutrality into an engine for socialist solidarity."
 SWI_nationalize_industries: "Key Industries Nationalized"
 SWI_nationalize_industries_desc: "The Federal Council initiates the takeover of key industrial sectors, placing vital resources and production under state control to ensure equitable distribution and planned development."
 SWI_socialist_countries_ties: "Ties With Socialist Countries"
 SWI_socialist_countries_ties_desc: "Switzerland actively seeks closer diplomatic, cultural, and political ties with nations aligned to the socialist cause, preparing to pivot its long-standing neutrality toward a global movement."
 SWI_socialist_agreements: "Trade Agreements"
 SWI_socialist_agreements_desc: "New long-term trade agreements are negotiated with socialist states, securing access to crucial raw materials and expanding the market for Swiss precision goods."
 SWI_higher_wages_idea: "Higher Wages"
 SWI_higher_wages_idea_desc: "Mandatory increases in the minimum wage and federal oversight of salary structures ensure that Swiss workers receive a fair and sustainable living wage, boosting domestic consumption."
 SWI_cheaper_house: "Cheap Housing"
 SWI_cheaper_house_desc: "A federal initiative to cap rental prices and subsidize construction sharply lowers the cost of private housing, making homeownership accessible to a wider segment of the population."
 SWI_public_housing: "Public Housing"
 SWI_public_housing_desc: "Massive state investment into quality public housing projects provides modern, affordable homes, addressing urban density and housing security for the working class."
 SWI_challenged_elite: "Challenging The Banking Elite"
 SWI_challenged_elite_desc: "A direct challenge is issued to the secretive and powerful banking elite. New regulations are imposed, taxing private capital transfers and investigating tax evasion to refill federal coffers."
 SWI_nato_integration: "NATO Integration"
 SWI_nato_integration_desc: "Swiss staffs, airspace and procurement now run to Alliance standard. Interoperability buys Bern a seat at planning tables it once refused to enter."
 SWI_mind_federation: "Mind Of The Federation"
 SWI_mind_federation_desc: "A unified vision for the new Federation is established, focusing the political system on efficiency, collaboration, and rapid integration of new territories and populations."
 SWI_growing_federation: "Strengthening The Federation"
 SWI_growing_federation_desc: "The new government prioritizes integrating all former regions into the Federation. Resources are dedicated to standardization and political alignment across all newly acquired cantons."
 SWI_modernize_direct: "Modernized Direct Democracy"
 SWI_modernize_direct_desc: "Direct Democracy is overhauled and modernized, incorporating new technologies and streamlined processes to ensure rapid citizen engagement and swift national decision-making."
 SWI_council_states: "Council of States"
 SWI_council_states_desc: "The Council of States is reorganized to give greater, fairer representation to all new and established cantons, balancing the legislative power between population and regional autonomy."
 SWI_fiscal_equalization: "Fiscal Equalization Fund"
 SWI_fiscal_equalization_desc: "A new federal fund is established to redistribute wealth from the richest cantons to the poorest, ensuring uniform development and high standards of living across the entire Federation."
 SWI_develop_federation: "Developing The Federation"
 SWI_develop_federation_desc: "Focus is placed on long-term infrastructure and development projects across the Alpine Federation, especially in newly acquired territories, to maximize economic potential and political stability."

 #New Political Events
 switzerland.8.t: "Swiss Inquiry for the Alps"
 switzerland.8.desc: "Switzerland requests the immediate transfer of Savoy, Provence, and Nice to its control, citing historical ties and shared Alpine culture."
 switzerland.8.a: "Cede the states"
 switzerland.8.b: "Refuse"
 switzerland.9.t: "Alps Claim Accepted"
 switzerland.9.desc: "France has unexpectedly agreed to our inquiry, ceding the entire Alpine region. A great diplomatic victory!"
 switzerland.9.a: "A new, stronger Switzerland!"
 switzerland.10.t: "Alps Claim Refused"
 switzerland.10.desc: "Our inquiry was met with a harsh refusal. France is unwilling to negotiate on territorial integrity."
 switzerland.10.a: "Diplomatic efforts have failed."
 switzerland.11.t: "Inquire for Italian Alps"
 switzerland.11.desc: "The Swiss government has issued a formal inquiry for the cession of Aosta, Piemonte, Lombardia, and South Tyrol to the Swiss Confederation."
 switzerland.11.a: "Cede the provinces"
 switzerland.11.b: "Refuse the inquiry"
 switzerland.12.t: "Italian Acceptance"
 switzerland.12.desc: "Rome has surprisingly agreed to our territorial inquiries, citing a desire for regional peace. The Alps are unified!"
 switzerland.12.a: "A unified Alpine Republic!"
 switzerland.13.t: "Italian Refusal"
 switzerland.13.desc: "Italy has strongly rejected our inquiries, viewing the request as an insult to national sovereignty."
 switzerland.13.a: "Our diplomacy has failed."
 switzerland.14.t: "Inquire for Austrian Tyrol"
 switzerland.14.desc: "Switzerland, in its drive to unify the Alpine heartland, has issued a formal request for the cession of Tyrol. While historically significant, accepting could prevent future conflicts."
 switzerland.14.a: "Cede Tyrol to the Swiss"
 switzerland.14.b: "Reject the Swiss claim"
 switzerland.15.t: "Tyrol Acquired"
 switzerland.15.desc: "Vienna (or the current occupier of Austria) has agreed to our request, adding the vital region of Tyrol to the Confederation. Our unification efforts continue successfully."
 switzerland.15.a: "A major diplomatic win."
 switzerland.16.t: "Tyrol Refusal"
 switzerland.16.desc: "Our diplomatic request for Tyrol was rejected outright. The current owner of the state sees the claim as an unacceptable challenge to their borders."
 switzerland.16.a: "We must wait for a better moment."
 switzerland_news.7.t: "The Alpine Federation"
 switzerland_news.7.d: "Following extensive diplomatic maneuvering and a popular movement across the region, Switzerland has formally consolidated control over the historic Alpine heartland. The nation has officially changed its name to 'The Federation of the Alps' or 'Alpine Federation' for short.\n\nThis momentous shift creates a powerful, unified federal state stretching across the central European mountain range, fundamentally altering the balance of power in the region. The new government guarantees cultural and political autonomy to all regions."
 switzerland_news.7.a: "Redefining neutrality since 1516."
 switzerland_news.8.t: "A New Republic: Switzerland Votes to Centralise Power"
 switzerland_news.8.d: "By a narrow margin, the Swiss people have approved the constitutional referendum to abandon the federal structure in favour of a centralised republic. The change, championed by the New Era movement, promises streamlined governance and a cohesive national identity, but comes at the cost of traditional cantonal autonomy. The new Swiss Republic officially replaces the Confederation today, sparking both celebrations and protests across the former cantons. The international community watches closely for the implications of this radical shift in one of Europe's most stable nations."
 switzerland_news.8.a: "The Confederation is Dead!"

 #New Political focuses
 SWI_suisse_politique: "Swiss Politics"
 SWI_suisse_politique_desc: "Establish the framework for the Swiss national focus tree and determine the initial political direction of the Confederation."
 SWI_strengthening_the_federation: "Strengthening the Federation"
 SWI_strengthening_the_federation_desc: "Reinforce the bonds between the Cantons and strengthen the central government's authority to ensure national unity."
 SWI_dissolving_the_federation: "Dissolving the Federation"
 SWI_dissolving_the_federation_desc: "The federal system is unsustainable. Initiate a controversial process to restructure the country, prioritizing a single, unified Swiss Republic."
 SWI_deepening_swiss_democracy: "Deepening Swiss Democracy"
 SWI_deepening_swiss_democracy_desc: "Expand the scope of direct democratic tools, giving the people more power through referendums and initiatives to shape national policy."
 SWI_panalpine_initiative: "Pan-Alpine Initiative"
 SWI_panalpine_initiative_desc: "Embrace a more active foreign policy and regional role. Seek to align with or integrate the Alpine regions of neighboring states."
 SWI_true_neutrality: "True Neutrality"
 SWI_true_neutrality_desc: "Codify and enforce absolute, perpetual neutrality. Withdraw from international entanglements and focus solely on domestic self-sufficiency and defense."
 SWI_partei_der_arbeit: "Partei der Arbeit"
 SWI_partei_der_arbeit_desc: "Empower the left-wing workers' party to implement a socialist agenda aimed at economic equality and collective ownership."
 SWI_sp: "Social Democratic Party (SP)"
 SWI_sp_desc: "Support the Social Democrats in their efforts to reform the political system toward greater social welfare and international cooperation."
 SWI_grune: "The Green Party (Grüne)"
 SWI_grune_desc: "Provide political support to the Green Party to push for comprehensive environmental protection and sustainable development policies."
 SWI_fdu: "Federal Democratic Union (FDU)"
 SWI_fdu_desc: "Grant greater influence to the Federal Democratic Union to champion conservative, evangelical Christian values and local autonomy."
 SWI_svp: "Swiss People's Party (SVP)"
 SWI_svp_desc: "Back the Swiss People's Party in their push for strict immigration controls, fiscal conservatism, and national sovereignty."
 SWI_the_mind_of_the_federation: "The Mind of The Federation"
 SWI_the_mind_of_the_federation_desc: "Cultivate a unified national identity and strengthen the collective consciousness of the Confederation."
 SWI_improve_relations_with_our_neighbours: "Improve Relations With Our Neighbours"
 SWI_improve_relations_with_our_neighbours_desc: "Initiate diplomatic efforts to foster stronger trade and political ties with all surrounding European powers."
 SWI_inquire_about_the_french_alps: "Inquire About the French Alps"
 SWI_inquire_about_the_french_alps_desc: "Tactfully open negotiations with France regarding the shared destiny and governance of the French Alpine regions."
 SWI_inquire_about_the_italian_alps: "Inquire About the Italian Alps"
 SWI_inquire_about_the_italian_alps_desc: "Explore diplomatic channels with Italy to discuss the future of the Italian Alpine territories and their potential integration."
 SWI_inquire_about_the_austrian_alps: "Inquire About the Austrian Alps"
 SWI_inquire_about_the_austrian_alps_desc: "Engage in dialogue with Austria on the status of their Alpine regions and formally annex Liechtenstein."
 SWI_proclaim_the_alp_federation: "Proclaim the Alp Federation"
 SWI_proclaim_the_alp_federation_desc: "Declare the formation of a unified Alpine Federation, consolidating all shared Alpine territories under a new, powerful Swiss-led entity."
 SWI_alp_federation_coring_tt: "Owned states of the Alpine Federation with at least 80% compliance become core territory. States below that threshold gain claims instead."
 SWI_expel_foreign_influence: "Expel Foreign Influence"
 SWI_expel_foreign_influence_desc: "Take measures to reduce and eliminate the sway of foreign powers and global organizations over Swiss internal affairs."
 SWI_strengthen_the_federation: "Strengthen The Federation"
 SWI_strengthen_the_federation_desc: "Invest in key national projects and institutions to make the federal government more robust and resilient against internal and external pressures."
 SWI_modernize_direct_democracy: "Modernize Direct Democracy"
 SWI_modernize_direct_democracy_desc: "Streamline the petition and voting processes for direct democracy, ensuring the system remains efficient and relevant in the modern age."
 SWI_empower_the_council_of_states: "Empower the Council of States"
 SWI_empower_the_council_of_states_desc: "Increase the legislative power of the Council of States to better represent the interests and sovereignty of the individual Cantons."
 SWI_fiscal_equalization_fund: "Fiscal Equalization Fund"
 SWI_fiscal_equalization_fund_desc: "Establish a permanent fund to redistribute federal wealth, ensuring financial parity and stability across all Cantons, rich and poor."
 SWI_social_equality: "Social Equality"
 SWI_social_equality_desc: "Implement policies to decrease economic disparity and promote social justice, particularly for marginalized communities and low-income citizens."
 SWI_workers_rights: "Worker's Rights"
 SWI_workers_rights_desc: "Pass comprehensive legislation to guarantee fair wages, safe working conditions, and the right to organize for all Swiss laborers."
 SWI_workers_rights_idea: "Worker's Rights"
 SWI_workers_rights_idea_desc: "Pass comprehensive legislation to guarantee fair wages, safe working conditions, and the right to organize for all Swiss laborers."
 SWI_cheaper_housing: "Cheaper Housing"
 SWI_cheaper_housing_desc: "Subsidize and regulate the housing market to ensure affordable housing is available for all citizens across the nation."
 SWI_expand_public_housing: "Expand Public Housing"
 SWI_expand_public_housing_desc: "Launch a massive federal project to construct new, high-quality public housing units in major urban centers."
 SWI_challenge_the_banking_elite: "Challenge the Banking Elite"
 SWI_challenge_the_banking_elite_desc: "Enact strict regulations and introduce new taxes targeting the powerful and secretive international banking sector."
 SWI_nationalize_key_industries: "Nationalize Key Industries"
 SWI_nationalize_key_industries_desc: "Transfer ownership of vital sectors like energy, transport, and communication from private hands to the state."
 SWI_end_banking_secrecy: "End Banking Secrecy"
 SWI_end_banking_secrecy_desc: "Abolish the long-standing tradition of Swiss banking secrecy, aligning the financial system with international transparency standards."
 SWI_neutrality_pda: "Neutrality (Partisan Path)"
 SWI_neutrality_pda_desc: "Reaffirm the traditional policy of Swiss neutrality, but prioritize domestic socialist reforms over foreign entanglements."
 SWI_strengthen_ties_with_socialist_countries: "Strengthen Ties With Socialist Countries"
 SWI_strengthen_ties_with_socialist_countries_desc: "Forge closer diplomatic and economic relationships with the growing bloc of socialist and communist nations."
 SWI_strengthen_domestic_independence: "Strengthen Domestic Independence"
 SWI_strengthen_domestic_independence_desc: "Enact policies that promote self-reliance in resources and industry, shielding the Swiss economy from global market volatility."
 SWI_trade_agreements_with_socialist_states: "Trade Agreements With Socialist States"
 SWI_trade_agreements_with_socialist_states_desc: "Sign exclusive trade pacts with socialist and non-aligned nations to diversify Swiss export markets."
 SWI_direct_democracy_reforms: "Direct Democracy Reforms"
 SWI_direct_democracy_reforms_desc: "Introduce technical and procedural changes to make the democratic process more fluid and responsive to citizens' demands."
 SWI_domestic_independence: "Domestic Independence"
 SWI_domestic_independence_desc: "Focus on maximizing Swiss autonomy and sovereignty, rejecting interference from larger regional blocs like the EU."
 SWI_move_closer_to_the_eu: "Move Closer to the EU"
 SWI_move_closer_to_the_eu_desc: "Work to deepen Switzerland's integration with the European Union's single market and political structures."
 SWI_humanitarian_leadership: "Humanitarian Leadership"
 SWI_humanitarian_leadership_desc: "Reinforce Switzerland's role as a global beacon of aid, refuge, and international law through diplomacy and increased humanitarian spending."
 SWI_national_health_service: "National Health Service"
 SWI_national_health_service_desc: "Reimagine the healthcare system by introducing a fully state-funded National Health Service to guarantee universal access to medical care."
 SWI_expand_labour_union_power: "Expand Labour Union Power"
 SWI_expand_labour_union_power_desc: "Pass legislation that grants significantly more authority and influence to organized labour unions in collective bargaining and industrial policy."
 SWI_progressive_tax_reform: "Progressive Tax Reform"
 SWI_progressive_tax_reform_desc: "Overhaul the tax code to drastically increase rates for the highest earners and corporations to fund social programs."
 SWI_strengthen_parliamentary_socialism: "Strengthen Parliamentary Socialism"
 SWI_strengthen_parliamentary_socialism_desc: "Work within the democratic framework to gradually increase the power of the social democratic political establishment."
 SWI_welfare_state_of_the_future: "Welfare State of the Future"
 SWI_welfare_state_of_the_future_desc: "Pioneer a next-generation social security system, guaranteeing all citizens a dignified basic income and comprehensive social protection."
 SWI_invest_in_green_infrastructure: "Invest in Green Infrastructure"
 SWI_invest_in_green_infrastructure_desc: "Commit significant state funds to building sustainable public works, including renewable energy grids and eco-friendly transport."
 SWI_fund_ngos: "Fund NGOs"
 SWI_fund_ngos_desc: "Provide substantial federal grants and support to environmental and social non-governmental organizations to bolster civil society."
 SWI_geneva_climate_diplomatic_hub: "Strengthen Geneva as a Climate Hub"
 SWI_geneva_climate_diplomatic_hub_desc: "Leverage Geneva's international status to host major climate summits and diplomatic negotiations, increasing Switzerland's soft power."
 SWI_limit_industrial_expansion: "Limit Industrial Expansion"
 SWI_limit_industrial_expansion_desc: "Enact moratoria and strict zoning laws to slow the expansion of heavy industry and protect the natural beauty of the Swiss landscape."
 SWI_protect_the_alps: "Protect The Alps"
 SWI_protect_the_alps_desc: "Designate the Alps as a zone of maximum ecological protection, forbidding large-scale development or resource extraction."
 SWI_renewable_energy_research: "Renewable Energy Research"
 SWI_renewable_energy_research_desc: "Fund scientific and technological advancements in solar, hydro, and geothermal energy to achieve full national energy independence."
 SWI_centralization: "Centralization of Power"
 SWI_centralization_desc: "Shift authority from the Cantons to the Federal Government, consolidating power for swift and decisive national action."
 SWI_strengthen_the_cantons: "Strengthen the Cantons"
 SWI_strengthen_the_cantons_desc: "Reinforce the autonomy and traditional powers of the Cantonal governments, preserving the spirit of federalism."
 SWI_close_the_borders: "Close The Borders"
 SWI_close_the_borders_desc: "Implement a policy of absolute border closure to control immigration and protect Swiss national identity and labor market."
 SWI_ban_abortion: "Ban Abortion"
 SWI_ban_abortion_desc: "Enact legislation to completely outlaw abortion, aligning the country's laws with conservative moral principles."
 SWI_faith_welfare: "Faith-Based Welfare"
 SWI_faith_welfare_desc: "Restructure the social safety net to rely on private religious and charitable organizations, reducing state involvement."
 SWI_stricter_immigration: "Stricter Immigration Laws"
 SWI_stricter_immigration_desc: "Introduce a points-based system and quotas to severely limit all forms of legal and illegal migration into the country."
 SWI_maintain_armed_neutrality: "Maintain Armed Neutrality"
 SWI_maintain_armed_neutrality_desc: "Uphold the long-standing tradition of military non-alignment while ensuring a powerful and ready defense force."
 SWI_distance_from_eu: "Distance Ourselves From the EU"
 SWI_distance_from_eu_desc: "Begin the process of decoupling Swiss economic and political policy from the influence and regulations of the European Union."
 SWI_fund_ndb: "Fund the NDB"
 SWI_fund_ndb_desc: "Increase funding for the National Intelligence Service (NDB) to improve domestic security, counter-espionage, and surveillance capabilities."
 SWI_stop_un_training: "Stop UN Peacekeeper Training"
 SWI_stop_un_training_desc: "End the controversial practice of training foreign UN peacekeepers, emphasizing a purely defensive military posture."
 SWI_traditionalist_propaganda: "Traditionalist Propaganda"
 SWI_traditionalist_propaganda_desc: "Launch a national campaign to promote conservative and traditional Swiss values through state-sponsored media and education."
 SWI_expand_army_fund: "Expand the Army Funds"
 SWI_expand_army_fund_desc: "Secure a new, permanent source of federal revenue dedicated solely to increasing the budget for the Swiss Armed Forces."
 SWI_promote_swiss_identity: "Promote Swiss Identity"
 SWI_promote_swiss_identity_desc: "Subsidize cultural and linguistic institutions to foster a stronger, unified sense of Swiss patriotism and national belonging."
 SWI_skepticism_ngos: "Skepticism About NGOs"
 SWI_skepticism_ngos_desc: "Investigate and restrict the activities of foreign and domestic NGOs, citing concerns over their influence on national sovereignty."
 SWI_expand_agriculture: "Expand Agriculture"
 SWI_expand_agriculture_desc: "Invest in modern farming technology and subsidies to significantly increase domestic food production and national self-sufficiency."
 SWI_national_efficiency: "National Efficiency"
 SWI_national_efficiency_desc: "Introduce bureaucratic and administrative reforms across all federal agencies to reduce waste and increase governmental speed and effectiveness."
 SWI_isolationism: "Isolationism"
 SWI_isolationism_desc: "Adopt a policy of complete global detachment, closing borders and markets to eliminate all foreign interference in Swiss affairs."
 SWI_armed_neutrality: "Armed Neutrality"
 SWI_armed_neutrality_desc: "Formally codify a defense-only foreign policy, ensuring the military is well-equipped to defend the nation's independence at all costs."
 SWI_defend_secrecy: "Defend Banking Secrecy"
 SWI_defend_secrecy_desc: "Vigorously oppose all international pressure to dismantle the country's private banking secrecy laws."
 SWI_attract_foreign_investors: "Attract Foreign Investors"
 SWI_attract_foreign_investors_desc: "Offer new incentives, tax breaks, and regulatory guarantees to encourage international companies to relocate to Switzerland."
 SWI_market_liberalization: "Market Liberalization"
 SWI_market_liberalization_desc: "Deregulation of domestic markets and industries to promote free competition, innovation, and economic growth."
 SWI_keep_swiss_neutrality: "Keep the Swiss Neutrality"
 SWI_keep_swiss_neutrality_desc: "Maintain the traditional, strict interpretation of non-interventionism, prioritizing financial stability over political entanglements."
 SWI_modernize_neutrality: "Modernize Neutrality"
 SWI_modernize_neutrality_desc: "Adapt the concept of neutrality to a modern context, allowing for greater diplomatic engagement and humanitarian intervention abroad."
 SWI_reduce_welfare: "Reduce Welfare Spending"
 SWI_reduce_welfare_desc: "Cut federal expenditure on social programs and benefits to reduce the national debt and encourage private savings."
 SWI_moderate_police_reforms: "Moderate Police Reforms"
 SWI_moderate_police_reforms_desc: "Implement incremental changes to increase police funding, modernize equipment, and improve community relations."
 SWI_industrial_development: "Industrial Development"
 SWI_industrial_development_desc: "Invest heavily in expanding the nation's manufacturing sector and building new industrial complexes in strategic areas."
 SWI_swiss_precision: "Swiss Precision Engineering"
 SWI_swiss_precision_desc: "Focus national research and investment into high-tech manufacturing, watchmaking, and specialized mechanical engineering."
 SWI_tech_startups: "Promote Tech Startups"
 SWI_tech_startups_desc: "Create a favorable ecosystem of funding, tax breaks, and incubation programs to foster a booming domestic technology sector."
 SWI_free_trade: "Free Trade"
 SWI_free_trade_desc: "Eliminate tariffs and reduce trade barriers to fully integrate the Swiss economy into the globalized trading system."
 SWI_radical_changes: "Radical Changes"
 SWI_radical_changes_desc: "A national re-assessment of the political system, paving the way for revolutionary, foundational changes to the Confederation."
 SWI_promote_left: "Promote Left Wing Politics"
 SWI_promote_left_desc: "Begin a campaign to significantly increase the popularity and influence of communist and socialist ideologies across the Confederation."
 SWI_workers_council: "Workers' Councils Take Power"
 SWI_workers_council_desc: "Formally establish workers' councils as the supreme economic and political organs of the state, giving direct power to the proletariat."
 SWI_nationalize_banks: "Nationalize the Banks"
 SWI_nationalize_banks_desc: "Seize control of the nation's powerful and secretive banking sector, placing it under federal, public ownership for the benefit of the people."
 SWI_agricultural_collectivization: "Agricultural Collectivization"
 SWI_agricultural_collectivization_desc: "Abolish private land ownership and organize all farms into large, state-run collective agricultural enterprises."
 SWI_workers_cooperatives: "Workers' Cooperatives"
 SWI_workers_cooperatives_desc: "Support the formation of worker-owned and managed co-operatives as the dominant model of production, maintaining decentralized economic control."
 SWI_militias_of_the_people: "Militias of the People"
 SWI_militias_of_the_people_desc: "Disband the standing army and replace it with a decentralized network of armed, politically reliable people's militias drawn from the working class."
 SWI_secret_police: "Secret Police"
 SWI_secret_police_desc: "Establish a powerful and omnipresent secret police force to monitor for counter-revolutionary activity and suppress internal dissent."
 SWI_denounce_eu: "Denounce The EU"
 SWI_denounce_eu_desc: "Formally condemn the European Union as a bourgeois organization and withdraw any Swiss cooperation or political ties."
 SWI_suppress_party_enemies: "Suppress Party Enemies"
 SWI_suppress_party_enemies_desc: "Use the full power of the state to eliminate and silence all rival political parties and organizations."
 SWI_multilingual_worker_solidarity: "Multilingual Worker Solidarity"
 SWI_multilingual_worker_solidarity_desc: "Emphasize the common class identity across the nation's linguistic divides to forge a unified, multilingual proletariat."
 SWI_peoples_tribune: "People's Tribune"
 SWI_peoples_tribune_desc: "Establish the office of the People's Tribune, an elected representative to act as a popular check on the power of the central government."
 SWI_central_committee: "Central Committee Rule"
 SWI_central_committee_desc: "Vest ultimate political authority in a small, powerful Central Committee of the Party, ensuring ideological purity and centralized command."
 SWI_peoples_constitution: "The People's Constitution"
 SWI_peoples_constitution_desc: "Draft and enact a new constitution that enshrines the rights of the working class and formalizes the socialist structure of the state."
 SWI_national_charter: "The National Charter"
 SWI_national_charter_desc: "Write a National Charter to replace the old constitution, formally declaring the new state's commitment to nationalistic and authoritarian principles."
 SWI_propaganda_machine: "Propaganda Machine"
 SWI_propaganda_machine_desc: "Construct a sophisticated state-run media apparatus to control the flow of information and ensure ideological compliance among the citizenry."
 SWI_economic_self_sufficiency: "Economic Self-Sufficiency"
 SWI_economic_self_sufficiency_desc: "Shift the entire Swiss economy towards autarky, prioritizing domestic production and eliminating dependence on foreign trade."
 SWI_expel_foreign_companies: "Expel Foreign Companies"
 SWI_expel_foreign_companies_desc: "Force the immediate closure and nationalization of all foreign-owned businesses operating on Swiss soil."
 SWI_revive_the_nf: "Revive The National Front"
 SWI_revive_the_nf_desc: "Re-establish the historic National Front and empower its leaders to champion a radical, nationalistic, and authoritarian political program."
 SWI_fascism_idea: "National Front"
 SWI_fascism_idea_desc: "The National Front was a far-right party in Switzerland that flourished during the 1930s. At its peak the group had as many as 9,000 members, according to the Historical Dictionary of Switzerland, and may have had a membership of 25,000 or so, according to the Simon Wiesenthal Center. The party was financed by the Reich Ministry of Propaganda. It became defunct in 1940 and was banned by the Swiss Federal Council in 1943."
 SWI_national_unity: "National Unity"
 SWI_national_unity_desc: "Suppress all internal divisions and ideological conflicts to forge a single, unified national will under the new regime."
 SWI_leader_of_a_nation: "A Leader of a Nation"
 SWI_leader_of_a_nation_desc: "Grant sweeping new powers to a charismatic national figure, transitioning the nation to a strong, personalized leadership."
 SWI_militarize_society: "Militarize Society"
 SWI_militarize_society_desc: "Integrate military principles into civilian life, enforcing mandatory service and promoting discipline and obedience across the nation."
 SWI_fascist_propaganda: "Fascist Propaganda"
 SWI_fascist_propaganda_desc: "Launch an aggressive national media campaign to promote the regime's ideology and demonize all perceived enemies of the state."
 SWI_censorship: "Censorship"
 SWI_censorship_desc: "Impose total control over all forms of media, art, and intellectual output to ensure absolute ideological conformity."
 SWI_pan_alpine_identity: "Pan-Alpine Identity"
 SWI_pan_alpine_identity_desc: "Declare the existence of a common 'Alpine People' across Switzerland and its neighbors, laying the ideological groundwork for expansion."
 SWI_ban_radical_neutrals: "Ban Radical Neutrals"
 SWI_ban_radical_neutrals_desc: "Outlaw all political groups that advocate for absolute, passive neutrality, labeling them as unpatriotic and a danger to the state."
 SWI_german_superiority: "German Superiority"
 SWI_german_superiority_desc: "Prioritize the German-speaking population and adopt a policy of cultural and linguistic alignment with Germany."
 SWI_swiss_identity: "Swiss Identity"
 SWI_swiss_identity_desc: "Champion a unique, multi-ethnic, and fiercely independent Swiss identity, distinct from all neighboring great powers."
 SWI_alpine_destiny: "Alpine Destiny"
 SWI_alpine_destiny_desc: "Demand the unification of all Alpine territories under the Swiss flag and prepare the military for the coming war of unification."
 SWI_one_party_state: "One Party State"
 SWI_one_party_state_desc: "Abolish all remaining democratic institutions and formalize the complete, permanent political monopoly of the ruling party."
 SWI_further_strengthen_the_federation: "Further Strengthen the Federation"
 SWI_further_strengthen_the_federation_desc: "Switzerland is a nation built on compromise between cantons, cultures, and languages. By further strengthening the federal structure, we can ensure greater stability, improve coordination between the cantons, and reinforce the unity of the Confederation in the face of both internal tensions and external threats."
 SWI_higher_wages: "Higher Wages"
 SWI_higher_wages_desc: "Rising living costs and growing economic demands require action. By encouraging higher wages across key sectors, we can improve standards of living, strengthen domestic consumption, and ensure long-term social stability."
 SWI_universal_education: "Universal Education"
 SWI_universal_education_desc: "Education is the foundation of a strong and prosperous nation. By providing universal access to schooling, we can ensure that all citizens have the skills and knowledge necessary to contribute to Switzerland's future."
 SWI_fund_ngo: "Fund The NGOs"
 SWI_fund_ngo_desc: "Non-governmental organizations play a vital role in supporting communities and addressing social challenges. By providing state funding, we can enhance their capacity to serve the public and complement government efforts."
 SWI_ban_neutrals: "Banned Neutrals"
 SWI_ban_neutrals_desc: "Switzerland cannot afford to remain neutral in the face of growing threats and global instability. By banning neutrality, we assert our nation's active role in international affairs and prepare to defend our interests abroad."
 SWI_militarized_society: "Militarized Society"
 SWI_militarized_society_desc: "A strong nation requires a strong citizenry. By embracing a militarized society, we instill discipline, readiness, and a shared responsibility for the defense of Switzerland."
 SWI_secret_agency: "The Secret Agency"
 SWI_secret_agency_desc: "Intelligence is the backbone of national security. By establishing a secret agency, Switzerland can monitor threats, gather critical information, and act decisively before dangers reach our borders."
 SWI_swiss_companies_only: "Swiss Companies Only"
 SWI_swiss_companies_only_desc: "To strengthen our economy and protect domestic interests, only Swiss companies will be allowed to operate in certain sectors. This ensures jobs for our citizens and keeps our industries under national control."
 SWI_self_sufficiency: "Self Sufficient"
 SWI_self_sufficiency_desc: "Switzerland must reduce its dependence on foreign imports and ensure that essential resources are produced at home. By promoting self-sufficiency, we safeguard our economy and strengthen national resilience."
 SWI_workers: "The Workers"
 SWI_workers_desc: "A nation is only as strong as its workforce. By implementing policies in favor of the workers, we ensure fair wages, improved working conditions, and a more satisfied and productive population."
 SWI_communism_idea: "Communism"
 SWI_communism_idea_desc: "Inspired by socialist principles, Swiss Communism seeks to place the means of production under the control of the people. By restructuring our economy, we aim to reduce inequality and ensure that all citizens share in the nation's wealth."
 SWI_new_age: "New Age"
 SWI_new_age_desc: "The old confederation has run its course. By dissolving the federation and establishing a unified republic, Switzerland enters a new era of governance, centralizing power and redefining the nation's future."
 SWI_agricultural_collectivization_idea: "Agricultural Collectivization"
 SWI_agricultural_collectivization_idea_desc: "To feed the nation and modernize the countryside, we must organize farms into collective units. Agricultural collectivization will increase efficiency, improve resource allocation, and strengthen state control over food production."
 SWI_militia: "Swiss Militia"
 SWI_militia_desc: "Every citizen has a duty to defend the nation. By organizing a Swiss Militia, we ensure that the population is trained, disciplined, and ready to resist any threat to our sovereignty."
 SWI_censor: "Censorship"
 SWI_censor_desc: "To preserve social order and protect national stability, information must be carefully monitored. Implementing censorship ensures that harmful ideologies and destabilizing propaganda cannot undermine Switzerland."
 SWI_central_committee_idea: "The Central Committee"
 SWI_central_committee_idea_desc: "A strong state requires decisive leadership. The establishment of a Central Committee consolidates power, coordinates policy across the nation, and ensures that the party's vision is implemented effectively."

 SWI_politica_estera_svizzera: "Politica Estera Svizzera"
 SWI_politica_estera_svizzera_desc: "The foreign policy of Switzerland has always been neutral. Should we stray from that path, it might give us an edge in different fields."
 SWI_choosing_our_path: "Choosing Our Path"
 SWI_choosing_our_path_desc: "Now we face the decision of what to do with our foreign policy. Certain people prefer neutrality, but there is a movement for opening up to NATO and the EU."
 SWI_opening_up: "Opening Up"
 SWI_opening_up_desc: "We have decided to stray from our policy of neutrality."
 SWI_neutral_foreign_policy: "Neutral Foreign Policy"
 SWI_neutral_foreign_policy_desc: "We have decided to embrace neutrality. Why change something that works?"
 switzerland.17.t: "Choosing our path"
 switzerland.17.desc: "Now is the time to decide, will we change or remain unchanged. Whether we change or remain, there will be benefits either way."
 switzerland.17.a: "We must open up to the world!"
 switzerland.17.b: "Why change something that works?"
 SWI_digitalisation: "Digitalisation"
 SWI_digitalisation_desc: "In efforts to keep up and be competitive on the world stage, Switzerland must digitalize. This will increase the productivity of Switzerland, since paperwork can be handled digitally."
 SWI_sustainability: "Sustainability"
 SWI_sustainability_desc: "Even though the economy has to grow, sustainability has to be a factor behind it. Otherwise there is no nature to exploit profits from."
 SWI_microchip_research: "Microchip Research"
 SWI_microchip_research_desc: "Swiss precision engineering has always been our calling card. Directing our research institutes towards semiconductor design lets us claim a share of an industry the world cannot function without."
 SWI_microchip_plant: "Microchip Plant"
 SWI_microchip_plant_desc: "With the research done, it is time to break ground. A domestic fabrication plant turns Swiss designs into Swiss silicon."
 SWI_defending_swiss_independence: "Defending Swiss Independence"
 SWI_defending_swiss_independence_desc: "To maintain our neutrality, we must maintain our independence. And to do this, we must first counteract the foreign influences lingering around, trying to shackle us to other sides."
 SWI_effort_to_better_relations: "Effort to Better Relations"
 SWI_effort_to_better_relations_desc: "For too long we have played the neutrality card. Now we must better our relations with our neighbours that we have neglected for too long."
 SWI_swiss_mercenaries: "Swiss Mercenaries"
 SWI_swiss_mercenaries_desc: "We must establish our own mercenary force. If there are some who know how to fight in the mountains, it is our people. That we must exploit for profit."
 SWI_swiss_peacekeeping: "Swiss Peacekeeping"
 SWI_swiss_peacekeeping_desc: "The UN is in need of peacekeepers in this volatile world. Switzerland must answer."
 SWI_enforcing_the_uns_will: "Enforcing the UN's will"
 SWI_enforcing_the_uns_will_desc: "Swiss contingents move from observation to enforcement, backing Security Council mandates with troops that answer to Bern."
 SWI_befriend_the_eu: "Befriend the EU"
 SWI_befriend_the_eu_desc: "Now we must choose: do we want to still continue on our complete path of neutrality, or do we want to befriend the EU?"
 SWI_nato: "NATO?"
 SWI_nato_desc: "Membership would end centuries of formal neutrality. The Federal Council must decide whether the security guarantee is worth the price."
 SWI_expand_the_mercenaries: "Expand the Mercenaries"
 SWI_expand_the_mercenaries_desc: "It seems our mercenaries are gaining us some reputation around the world. Let's keep it up and expand them!"
 SWI_foreign_investments: "Foreign Investments"
 SWI_foreign_investments_desc: "We must exploit our newfound alignment with other western nations. We can go around to ask for investments, and offer some back."
 SWI_local_arms_production: "Local Arms Production"
 SWI_local_arms_production_desc: "We must continue on our way of neutrality, and arms deals can be seen as some sort of alignment. That is why we must produce our own weaponry."
 SWI_internal_investments: "Internal Investments"
 SWI_internal_investments_desc: "We must improve ourselves by spending our own money on ourselves, doing internal investments."
 SWI_integration_to_nato: "Integration to NATO"
 SWI_integration_to_nato_desc: "Now that we have joined NATO, we have to start integrating our older and newer weapon systems to NATO standards."
 SWI_integration_to_nato_tt: "Every other §YNATO member§! gains §G+25§! opinion of Switzerland"
 SWI_alignment_to_NATO: "Alignment to NATO"
 SWI_alone_is_safer: "Alone Is Safer"
 SWI_alone_is_safer_desc: "Although we have opened ourselves up to the West, it is quite the leap to actually join NATO. We must preserve our independence in that matter."
 SWI_expanded_trade: "Expanded Trade"
 SWI_expanded_trade_desc: "We have to expand our trade to gain favours from the EU, and to perhaps find the courage to join the EU later on."
 SWI_partner_like_everyone: "Partner Like Everyone"
 SWI_partner_like_everyone_desc: "We see no good gain by aligning our trade more with the EU. That is why our relations must be kept as aligned with them as with any other countries."
 SWI_bank_of_the_west: "Bank of the West"
 SWI_bank_of_the_west_desc: "We have a huge banking industry which we can exploit to our own advantage. However, we must offer it mostly to the West."
 SWI_bank_of_the_world: "Bank of the World"
 SWI_bank_of_the_world_2: "Bank of the World"
 SWI_bank_of_the_world_3: "Bank of the World"
 SWI_bank_of_the_west_2: "Bank of the West"
 SWI_bank_of_the_west_3: "Bank of the West"

 #IDEAS
 SWI_idea_environmental_reforms: "Environmental Reforms"
 SWI_idea_environmental_reforms_desc: "Comprehensive environmental laws aim to reduce emissions, protect natural resources, and transition the economy toward sustainability."
 SWI_idea_eco_tourism: "Eco Tourism"
 SWI_idea_eco_tourism_desc: "Promoting eco-friendly travel brings new life to rural areas while preserving Switzerland's pristine landscapes."
 SWI_idea_national_parks: "National Parks"
 SWI_idea_national_parks_desc: "Expanding protected areas safeguards wildlife and strengthens Switzerland's global image as an environmental leader."
 SWI_idea_completely_green: "Completely Green!"
 SWI_idea_completely_green_desc: "Through relentless reform and innovation, Switzerland achieves full ecological sustainability, a nation powered entirely by clean energy."
 SWI_idea_christian_values: "Christian Values"
 SWI_idea_christian_values_desc: "Traditional Christian principles guide social policy and strengthen the moral foundation of Swiss society."
 SWI_idea_fortress_switzerland: "Fortress Switzerland"
 SWI_idea_fortress_switzerland_desc: "Major fortifications and modern defense networks ensure that Switzerland remains impenetrable in any conflict."
 SWI_idea_tax_code: "Simplified Tax Code"
 SWI_idea_tax_code_desc: "A simplified tax system reduces evasion, attracts investment, and supports a balanced economy."
 SWI_idea_fdp: "Free Democratic Party (FDP)"
 SWI_idea_fdp_desc: "The FDP is a liberal party advocating free markets, individual entrepreneurship, economic freedom, and minimal state intervention."
 SWI_idea_financial_deregulation: "Financial Deregulation"
 SWI_idea_financial_deregulation_desc: "Reduced banking and financial restrictions encourage investment, growth, and economic dynamism."
 SWI_idea_sp: "Social Democratic Party (SP)"
 SWI_idea_sp_desc: "The Social Democrats steer the political system toward greater social welfare and international cooperation."
 SWI_idea_fdu: "Federal Democratic Union (FDU)"
 SWI_idea_fdu_desc: "The Federal Democratic Union champions conservative, evangelical Christian values and local autonomy."
 SWI_idea_svp: "Swiss People's Party (SVP)"
 SWI_idea_svp_desc: "The Swiss People's Party presses for strict immigration controls, fiscal conservatism, and national sovereignty."
 SWI_idea_defend_secrecy: "Banking Secrecy"
 SWI_idea_defend_secrecy_desc: "All international pressure to dismantle private banking secrecy is rebuffed. Client confidentiality remains the law of the land."
 SWI_idea_swiss_mercenaries: "Swiss Mercenaries"
 SWI_idea_swiss_mercenaries_desc: "Swiss companies of mountain-trained soldiers take foreign contracts, reviving a trade older than the Confederation itself."
 SWI_idea_foreign_investments: "Foreign Investments"
 SWI_idea_foreign_investments_desc: "Investment flows both ways between Switzerland and its western partners, tying their economies together."
 SWI_idea_bank_of_the_west: "Bank of the West"
 SWI_idea_bank_of_the_west_desc: "The banking industry turns westward, offering its vaults and its discretion to Europe and America first."
 SWI_idea_bastion_of_democracy: "Bastion of Democracy"
 SWI_idea_bastion_of_democracy_desc: "Neutrality was never indifference. Switzerland stands as a working example of self-government, and says so plainly."
 SWI_idea_national_investments: "National Investments"
 SWI_idea_national_investments_desc: "Capital that would have gone abroad is turned inward, into Swiss infrastructure, Swiss industry and Swiss research."
 SWI_idea_defence_training_in_the_alps: "Defence Training in the Alps"
 SWI_idea_defence_training_in_the_alps_desc: "Every recruit learns the ground he will defend. Refresher courses drill the militia in the valleys it is assigned to hold."
 SWI_idea_european_defence: "European Defence"
 SWI_idea_european_defence_desc: "A common European defence framework takes shape, with Swiss engineering and Swiss neutrality at its centre rather than at its margin."
 SWI_idea_last_man_standing: "The Last Man Standing"
 SWI_idea_last_man_standing_desc: "Doctrine assumes the worst: every road cut, every ally gone. The militia is trained to fight on regardless."

