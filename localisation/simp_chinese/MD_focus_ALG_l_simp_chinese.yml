 ALG_ali_belhadj_desc: "阿里·贝勒哈吉是伊斯兰救世阵线的联合创始人，也是阿尔及利亚动荡的20世纪90年代最具魅力和最激进的伊斯兰主义领导人之一。他以激情澎湃的布道、毫不妥协的言辞和对世俗政治的摒弃而闻名，成为反抗民族解放阵线政权的象征。在内战的大部分时间里，他都被监禁，并根据1996年宪法被禁止参与正式政治活动。贝勒哈吉至今仍是一个极具争议的人物 - 对一些人来说，他是伊斯兰主义者不满情绪的化身；对另一些人来说，他是“黑色十年”的危险象征。他可能重返政坛，既带来了和解的希望，也引发了对极端主义死灰复燃的担忧。"
 ALG_bouamrane_desc: "穆罕默德·布阿姆拉内于20世纪90年代崭露头角，成为一位较为温和的伊斯兰主义知识分子和政治人物。他倡导对话而非对抗，将自己定位在阿里·贝勒哈吉等强硬派伊斯兰主义者和根深蒂固的民族解放阵线精英之间。尽管布阿姆拉内从未像伊斯兰救世阵线领导层那样获得广泛的民众支持，但他在战后关于和解与宪政改革的辩论中却备受尊敬。他的愿景强调伊斯兰价值观与民主制度能够共存的阿尔及利亚，这使他成为世俗政治与宗教政治之间紧张平衡的桥梁。"
 algeria_elections.2024.t: "2024年总统大选"
 algeria_elections.2024.d: "阿尔及利亚迎来又一次关键选举。三位主要候选人代表着截然不同的政治道路：阿卜杜勒马吉德·特本承诺在民族解放阵线的领导下保持政策的连续性；苏菲安·吉拉利·奥希什主张民主改革和自由化现代化；阿卜杜勒阿里·哈萨尼则得到伊斯兰主义势力的支持，力图在政治中发挥更大的作用。选举结果反映了各派系之间的力量平衡。"
 algeria_elections.2024.a: "Abdelmadjid Tebboune secures re-election."
 algeria_elections.2024.b: "Youcef Aouchiche wins the presidency."
 algeria_elections.2024.c: "Abdelali Hassani rises with Islamist backing."
 ALG_tebboune_2024_tt: "§YAbdelmadjid Tebboune§! remains President with FLN dominance."
 ALG_aouchiche_2024_tt: "§YYoucef Aouchiche§! becomes President, leading the reformist liberals."
 ALG_hassani_2024_tt: "§YAbdelali Hassani§! becomes President, backed by Islamist movements."
 algeria_gspc.1.t: "Nabil Sahraoui Takes Charge of the GSPC"
 algeria_gspc.1.d: "Discontent has grown inside the Groupe Salafiste pour la Prédication et le Combat (GSPC). Many commanders have accused Hassan Hattab of weakness, criticizing his hesitation to pursue full-scale jihad. In mid-2003, Hattab was sidelined by his own men, and Nabil Sahraoui, a far more radical figure, has declared himself the new emir of the GSPC."
 algeria_gspc.1.a: "The insurgency radicalizes further."
 ALG_sahraoui_rise_tt: "§YNabil Sahraoui§! replaces Hassan Hattab as the new GSPC leader."
 algeria_gspc.2.t: "Sahraoui Killed, Droukdel Emerges"
 algeria_gspc.2.d: "In June 2004, Algerian security forces killed Nabil Sahraoui in a clash. However, his death has not weakened the insurgency — instead, leadership has passed to Abdelmalek Droukdel, an ambitious strategist with ties to Al-Qaeda's global network. Under him, the GSPC is likely to expand and internationalize its jihad."
 algeria_gspc.2.a: "A deadlier era begins."
 ALG_droukdel_rise_tt: "§YAbdelmalek Droukdel§! becomes the leader of the GSPC."
 algeria_gspc.3.t: "Hassan Hattab Surrenders"
 algeria_gspc.3.d: "After years on the run, the founder of the GSPC, Hassan Hattab, has surrendered to Algerian authorities. Disillusioned with the path of the movement he once created, Hattab accepted the government's amnesty program. While his influence has waned, his surrender represents a symbolic victory for the Algerian state."
 algeria_gspc.3.a: "A symbol of defeat for the insurgency."
 ALG_hattab_surrender_tt: "§YHassan Hattab§! surrenders, reducing insurgency activity."
 alg_generals.1.t: "Abdelkader Lounès Appointed Air Force Commander"
 alg_generals.1.d: "General Abdelkader Lounès has been appointed Commander of the Algerian Air Force. Known for his focus on modernization, he will oversee Algeria's air power development through the coming decade."
 alg_generals.1.a: "Our skies are in safe hands."
 alg_generals.2.t: "Amar Amrani Takes Command of Air Defense"
 alg_generals.2.d: "Major General Amar Amrani has been placed in charge of Algeria's Ground-to-Air Defense Forces. His leadership will strengthen Algeria's capacity to defend its airspace from foreign threats."
 alg_generals.2.a: "Our air defense grows stronger."
 alg_generals.3.t: "Menad Nouba Becomes Gendarmerie Commander"
 alg_generals.3.d: "General Menad Nouba has been appointed Commander of the Algerian National Gendarmerie. Tasked with internal security and counterinsurgency, his leadership will be crucial in maintaining domestic order."
 alg_generals.3.a: "A firm hand for Algeria's security."
 ALG_ouyahia_pm: "Ahmed Ouyahia as Prime Minister"
 ALG_belkhadem_pm: "Abdelaziz Belkhadem as Prime Minister"
 ALG_interim_president.1.t: "Interim Presidency Declared"
 ALG_interim_president.1.d: "Following Bouteflika's resignation, Algeria faces a power vacuum. By constitutional mandate, Abdelkader Bensalah, speaker of the upper house, is sworn in as interim president for 90 days. The Hirak rejects this appointment, viewing him as part of the same corrupt system."
 ALG_interim_president.1.a: "Appoint Abdelkader Bensalah"
 ALG_bouteflika_resigns.1.t: "Bouteflika Resigns"
 ALG_bouteflika_resigns.1.d: "Under immense pressure from weeks of Hirak protests and the military establishment's withdrawal of support, President Abdelaziz Bouteflika has formally resigned. His two-decade-long presidency has ended, leaving Algeria's future uncertain."
 ALG_bouteflika_resigns.1.a: "The era of Bouteflika is over."
 ALG_hirak.100.t: "The Voice of the Hirak"
 ALG_hirak.100.d: "From Algiers to Oran, from Constantine to Tamanrasset, millions have marched every Friday demanding 'Yetnahaw Ga3' – they all must go. The old regime has crumbled. Now, the Hirak must choose: who will carry the spirit of February 22nd into the presidential palace at El Mouradia?"
 ALG_hirak.100.a: "Zoubida Assoul – The Constitutional Voice"
 ALG_hirak.100.b: "Karim Tabbou – The Street's Champion"
 ALG_hirak.100.c: "Hakim Addad – The RAJ Generation"
 ALG_hirak.100.e: "Amira Bouraoui – Barakat's Fierce Daughter"
 ALG_african_trade_links: "African Trade Links"
 ALG_african_trade_links_desc: "Through strengthened economic and diplomatic initiatives across Africa, Algeria is expanding its network of trade agreements, reducing dependency on outside markets and ensuring mutual prosperity with our continental partners."
 ALG_african_mediation_role: "African Mediation Role"
 ALG_african_mediation_role_desc: "Algeria has long positioned itself as a trusted mediator in African disputes. By actively engaging in conflict resolution, we can strengthen our legitimacy on the continent and expand our diplomatic influence."
 ALG_african_union_reforms: "Push for African Union Reforms"
 ALG_african_union_reforms_desc: "The African Union remains limited in effectiveness. By pushing for reforms—strengthening its institutions, promoting accountability, and building consensus—we can ensure Algeria becomes a respected leader within Africa's continental framework."
 ALG_african_economic_integration: "African Economic Integration"
 ALG_african_economic_integration_desc: "Continental economic integration is key to Algeria's prosperity. By lowering trade barriers and improving links with African partners, we will reduce dependency on foreign markets and foster sustainable growth within Africa."
 ALG_expand_african_investments: "Expand African Investments"
 ALG_expand_african_investments_desc: "Through state-backed ventures and cooperation with African partners, Algeria can expand investments in infrastructure, energy, and trade. These investments will boost our economy while strengthening ties across the continent."
 ALG_PT: "PT (Worker's Party)"
 ALG_PT_desc: "PT (Parti des travailleurs) is a Trotskyist political party in Algeria, closely linked with the Independent Workers' Party of France. The party is led by Louisa Hanoune.The Workers' Party, which uses the abbreviation \"PT\", advocates for the protection and promotion of trade union movements in Algeria, from its claims, including a figure egalitarian doctrine is to claim that a better distribution of wealth on the people of country. The creation of this party back to the year 1990, one year after the constitutional reform which introduced a multiparty system. Its Secretary General is Louisa Hanoune, who in 2004 was the first woman in the Arab world to stand as a candidate for a presidential election."
 ALG_communist_education: "Communist Education"
 ALG_communist_education_desc: "Young minds are the most impressionable. Instilling the basic values of communism in the younger generation while teaching university-level students the glory of equality could greatly advance our cause."
 ALG_labour_focus_unions: "Contact the Labour Unions"
 ALG_labour_focus_unions_desc: "The labour unions will be very happy to have a government willing to not only cooperate, but concede to their demands. We will ensure their influence doesn't extend beyond our coming to power to avoid §RConflicts of interest.§!"
 ALG_failures_capitalism: "Failures of Capitalism"
 ALG_failures_capitalism_desc: "Capitalism no longer blesses us with the infinite wealth it promised. It is time we go our own way to ensure that such a crisis can never happen again! §RThe effect of this focus scales upon the extent of the debt crisis.§!"
 ALG_working_class: "The Working Class"
 ALG_working_class_desc: "The working class - where dreams are both born and killed. We can promise them they will be treated well and given the credit they deserve for being the foundation of the new communist state."
 ALG_communist_propaganda: "Propaganda Machine"
 ALG_communist_propaganda_desc: "Due to our expanding influence we can afford to unleash the propaganda machine upon Algeria. Although monetary upkeep is high, this propaganda is not something to be disregarded, it will be extremely effective in converting the Greek population."
 ALG_prepare_government: "Prepare a Government"
 ALG_prepare_government_desc: "By setting up a government within our political party, we ensure an effective transition that allows us to act upon our goals faster than our rivals can collect themselves. This will be costly, but considering our odds of winning, it is a well-placed bet."
 ALG_damn_market: "Damn the Free Market"
 ALG_damn_market_desc: "We are in a position to deal the final blow to the capitalists. With the power of propaganda on our side, we can deal the killing blow to the free-market economy, and in the process, usurp the throne of excess on which the capitalists sit!"
 ALG_election_com: "Demand Immediate Elections"
 ALG_election_com_desc: "Comrades, the time is now! All of our buildup towards a new free state has led to this moment! \n\n§RWe will ensure that the people's government will rule for another 1000 years!§!"
 PT_flag: "PT"
 ALG_failures_capitalism_TT: "§RThe effect of the focus scales upon the extent of the debt crisis.§!"
 ALG_communist_takeover_TT: "§GThe Algerian people demand elections!§!\n\nEnsure you have enough Political Power saved for this. If you §Rfail§! to elect and form a government you will §Rneed to hold another extraordinary election§! to empower §Y[Communist-State_L]§!"
 ALG_fascist_takeover_TT: "§GThe Algerian people demand elections!§!\n\nEnsure you have enough Political Power saved for this. If you §Rfail§! to elect and form a government you will §Rneed to hold another extraordinary election§! to empower §Y[Nat_Fascism_L]§!"
 ALG_purge_TT: "§RWe take over the government in its entirety!§!"
 ALG_decrease_corruption_TT: "§GDecreases corruption§!"
 ALG_civil_units_TT: "§RIt is suggested that we relocate our army to the state borders of Central Algeria, where we can attempt to hold the rebels.§!"
 ALG_worsen_debt_TT: "§RWorsens debt crisis!§!"
 ALG_lowers_debt_TT: "§GAlleviates debt crisis!§!"
 ALG_end_austerity_TT: "§GEnds the austerity protests!§!"
 ALG_increase_drift_TT: "§GIncreases political drift towards this party!§!"
 ALG_process_sco_member_tt: "§YStarts of the process of integration into SCO.§!"
 ALG_wild_unions: "Wild Labour Unions"
 ALG_wild_unions_desc: "We gave unions power and they are using it - we see no problem with this."
 ALG_wild_unions_2: "Wild Labour Unions"
 ALG_wild_unions_2_desc: "The labour unions were given great freedom during our climb to power. Now that we are victorious we appeal to them only to ensure we have the heart of the people before completely securing our power base."
 ALG_wild_unions_3: "Wild Labour Unions"
 ALG_wild_unions_3_desc: "The labour unions are simply unbearable, we cannot stand them any longer! They began as a nuisance, but they have become an obstruction to the will of the state, they must be pacified or destroyed!"
 ALG_press_opposition: "Media Opposition"
 ALG_press_opposition_desc: "The media has not depicted us in the best of light ever since we restored order to the government, but it is only logical that the weak should fear the strong."
 ALG_one_party: "One-Party State"
 ALG_one_party_desc: "After declaring that PT is the only political party permitted in Algeria, we have the power to do whatever we want, but at the cost of blood to be shed to ensure our people are subservient."
 ALG_reorganize_army_idea: "Reorganizing the Army"
 ALG_reorganize_army_idea_desc: "We can not simply defund the army to the point of dysfunction. The time may come where we will need powerful armed forces, and for this eventuality we will ensure our army is loyal and ready."
 ALG_new_army_idea: "A New Army"
 ALG_new_army_idea_desc: "We have seen great success in the police taking over the role of the primary defensive force. However, we know they are not equipped enough to the point where they can repel foreign invasion. We will build a new army focused solely on the defense of Algeria to ensure the safety of our people."
 ALG_red_army_idea: "A Red Army"
 ALG_red_army_idea_desc: "We have instilled ideological fanaticism deep into not only the ranks of our army, but the civilian population as well, ensuring we will have the manpower and loyalty needed to field a formidable army."
 ALG_cracked_foundation: "A Cracked Foundation"
 ALG_cracked_foundation_desc: "The foundation of the state has been contradicted so many times at this point that if we continue down our current path we could face a terrible new revolution. \n\n§RIf our stability falls below 30%, we will face revolution in Algeria!§!"
 ALG_militarist_education_idea: "Militarist Education"
 ALG_militarist_education_idea_desc: "The education system has instilled values of the military into its curriculum, allowing for a greater state of readiness in case of sudden attacks."
 ALG_elam: "National Popular Front Resurgence"
 ALG_elam_desc: "The National Popular Front has greatly expanded its efforts across the board to sway the mind of the average voter. We suspect Algeria is the cause of this 'disruption'."
 algeria.5.t: "PT Calls for Elections in Algeria"
 algeria.5.d: "After gaining majority support from Algeria's working class and several political figures, the Parti des Travailleurs (PT) has called on the government to hold free elections. The PT has drawn massive support, and the authorities are under pressure from multiple sides to concede. Many expect the PT to win decisively, as their base among the workers and unions grows stronger by the day. A spokesperson warned that if elections are denied, the workers would launch an uprising to topple the government."
 algeria.5.a: "Workers of Algeria, arise!"
 algeria.5.b: "Interesting"
 algeria.7.t: "Algeria Moves Towards the Left"
 algeria.7.d: "With unemployment rising and economic inequality worsening, Algeria's working class has rallied behind the far-left Parti des Travailleurs (PT). The PT denounces neoliberal policies and violations of workers' rights, while supporting anti-western stances and organizing protests to pressure the government. Their influence grows rapidly, marking a decisive shift to the left in Algerian politics."
 algeria.7.a: "Workers of Algeria, your liberation is coming"
 algeria.7.b: "Interesting"
 ALG_family_centric: "Family Centric"
 ALG_family_centric_desc: "We are encouraging families as the main building block of Algerian society."
 ALG_religion_in_schools: "Religious Education"
 ALG_religion_in_schools_desc: "Our education system incorporates religion tightly into the curriculum, ensuring the younger generations are raised with strong Islamic values."
 ALG_grand_mufti_appointed: "Grand Mufti of Algeria"
 ALG_grand_mufti_appointed_desc: "A Grand Mufti has been appointed to interpret Islamic Law in Algeria, reinforcing the religious legitimacy of the state."
 ALG_islam_above_the_nation: "Islam Above the Nation"
 ALG_islam_above_the_nation_desc: "During Algeria's turbulent past, both nationalism and Islam competed for dominance in shaping the state. For our future, Islam should serve as the guiding principle of governance, above all else."
 ALG_family_is_a_central_unit: "Family Above Else"
 ALG_family_is_a_central_unit_desc: "The core of society is the family. A man, a woman, and their children form the foundation of the nation. Strong families will secure Algeria's prosperity and success for years to come."
 ALG_follow_religious_law: "Follow Religious Law"
 ALG_follow_religious_law_desc: "Islamic Law is the best basis for governing a country. Adopting it as our foundation will ensure justice and fairness for all Algerians."
 ALG_traditional_role_for_women: "Traditional Role for Women"
 ALG_traditional_role_for_women_desc: "Women hold the highest honor in raising children and caring for their families. While men work outside, women must safeguard the nation's traditions at home."
 ALG_religious_education: "Religious Education"
 ALG_religious_education_desc: "Our schools must incorporate religious studies closely into their curriculum. From childhood, Algerians should learn the Quran and Islamic practices."
 ALG_appoint_grand_mufti: "Appoint a Grand Mufti"
 ALG_appoint_grand_mufti_desc: "Algeria requires a Grand Mufti to interpret Islamic Law. We should nominate a respected scholar to provide religious guidance to the state."
 ALG_abrogate_secular_constitution: "Abrogate the Secular Constitution"
 ALG_abrogate_secular_constitution_desc: "The current constitution maintains a secular framework inherited from independence. The only law we should follow is the Quran, not man-made texts."
 ALG_enahda_media_network: "Ennahda Media Network"
 ALG_enahda_media_network_desc: "We should establish a national television network to broadcast the Grand Mufti's message and promote Islamic values throughout Algeria."
 ALG_supreme_islamic_council: "Supreme Islamic Council"
 ALG_supreme_islamic_council_desc: "To safeguard the new state, we must create a Supreme Islamic Council—an advisory body to support the Grand Mufti and ensure Algeria remains firmly on the path of faith."
 ALG_edu_and_social_policy: "Education & Social Policy"
 ALG_edu_and_social_policy_desc: "Algeria's long-term prosperity depends on more than natural resources—it rests on the foundations of education, healthcare, and social protections. By reforming these sectors, we can forge a new social contract for the 21st century."
 ALG_expand_primary_education: "Expand Primary Education"
 ALG_expand_primary_education_desc: "Expanding access to primary schools across rural and urban areas will reduce illiteracy and build a foundation for national development."
 ALG_reform_secondary_curriculum: "Reform Secondary Curriculum"
 ALG_reform_secondary_curriculum_desc: "Our secondary schools must be reformed to meet the demands of a modern economy, while preserving Algerian identity."
 ALG_western_curriculum: "Adopt Western Curriculum"
 ALG_western_curriculum_desc: "By integrating Western-oriented curricula, we can expose our youth to modern sciences and global standards, improving Algeria's competitiveness."
 ALG_national_curriculum: "Strengthen National Curriculum"
 ALG_national_curriculum_desc: "Instead of copying foreign models, we should focus on Arabization and Algerian cultural values in our schools to preserve sovereignty in education."
 ALG_university_reform: "University Reform"
 ALG_university_reform_desc: "Our universities must be expanded and modernized to train professionals, researchers, and innovators who can lead Algeria's future."
 ALG_basic_healthcare_access: "Basic Healthcare Access"
 ALG_basic_healthcare_access_desc: "Every Algerian deserves access to basic healthcare services. Expanding coverage is a first step toward a healthier nation."
 ALG_state_hospitals: "Expand State Hospitals"
 ALG_state_hospitals_desc: "By investing in a state-led hospital system, we can ensure free and accessible healthcare for all Algerians, though at a significant cost to the treasury."
 ALG_modernize_state_hospitals: "Modernize State Hospitals"
 ALG_modernize_state_hospitals_desc: "Upgrading equipment, training doctors, and improving infrastructure will strengthen the state's healthcare network."
 ALG_universal_healthcare: "Universal Healthcare"
 ALG_universal_healthcare_desc: "Healthcare is a right, not a privilege. Algeria will commit to building a fully universal healthcare system."
 ALG_private_healthcare: "Encourage Private Healthcare"
 ALG_private_healthcare_desc: "By promoting private hospitals and clinics, we can reduce the burden on the state and introduce market competition in healthcare."
 ALG_expand_private_clinics: "Expand Private Clinics"
 ALG_expand_private_clinics_desc: "Private clinics can complement the public system by offering more specialized services, especially in urban areas."
 ALG_national_insurance: "National Insurance System"
 ALG_national_insurance_desc: "A national health insurance scheme will unify both public and private healthcare under a single safety net for Algerian citizens."
 ALG_minimum_income_guarantee: "Minimum Income Guarantee"
 ALG_minimum_income_guarantee_desc: "The state will guarantee a minimum level of income for the most vulnerable, protecting Algerians from absolute poverty."
 ALG_housing_support: "Housing Support"
 ALG_housing_support_desc: "Subsidized housing programs will provide affordable homes for working families and reduce urban overcrowding."
 ALG_childcare_support: "Childcare Support"
 ALG_childcare_support_desc: "Supporting childcare centers and family allowances will help young families raise children without financial hardship."
 ALG_fuel_subsidies: "Fuel Subsidies"
 ALG_fuel_subsidies_desc: "By subsidizing fuel prices, we can make transportation and heating affordable for ordinary Algerians, even if it strains the treasury."
 ALG_food_subsidies: "Food Subsidies"
 ALG_food_subsidies_desc: "Protecting the price of bread and essential foods will guarantee that no Algerian family goes hungry."
 ALG_welfare_consolidation: "Consolidate Welfare State"
 ALG_welfare_consolidation_desc: "By merging our social programs into a comprehensive welfare system, Algeria will establish a modern social safety net."
 ALG_civil_rights_protections: "Civil Rights Protections"
 ALG_civil_rights_protections_desc: "Ensuring fundamental rights and freedoms will strengthen national stability and reduce grievances."
 ALG_gender_equality: "Promote Gender Equality"
 ALG_gender_equality_desc: "Empowering Algerian women through equal rights and opportunities is key to building a just and prosperous society."
 ALG_freedom_of_press: "Guarantee Press Freedom"
 ALG_freedom_of_press_desc: "A free press is essential for democracy and accountability. Supporting independent media will give Algerians a stronger voice."
 ALG_judicial_reform: "Judicial Reform"
 ALG_judicial_reform_desc: "A modern and independent judiciary will ensure fair trials, reduce corruption, and strengthen the rule of law."
 ALG_civil_society_empowerment: "Empower Civil Society"
 ALG_civil_society_empowerment_desc: "Supporting NGOs, unions, and grassroots organizations will create a more participatory and resilient society."
 ALG_digital_government: "Digital Government"
 ALG_digital_government_desc: "Digitalization will reduce bureaucracy, improve transparency, and bring government services closer to the people."
 ALG_public_service_efficiency: "Public Service Efficiency"
 ALG_public_service_efficiency_desc: "By modernizing the public sector, we can eliminate inefficiencies and improve service delivery."
 ALG_anti_corruption_campaign: "Anti-Corruption Campaign"
 ALG_anti_corruption_campaign_desc: "Corruption undermines the state. A comprehensive campaign against it will restore trust in Algeria's institutions."
 ALG_e_governance_portal: "E-Governance Portal"
 ALG_e_governance_portal_desc: "Creating an integrated e-governance platform will provide citizens with transparent, fast, and accessible public services."
 ALG_streamlined_bureaucracy: "Streamline Bureaucracy"
 ALG_streamlined_bureaucracy_desc: "By cutting red tape and modernizing administrative structures, Algeria will become more efficient and competitive."
 ALG_social_contract_21st_century: "A Social Contract for the 21st Century"
 ALG_social_contract_21st_century_desc: "Through education, healthcare, welfare, civil rights, and administrative reforms, Algeria will forge a new social contract that secures stability, justice, and prosperity for generations to come."
 ALG_corrupt_mil_idea: "腐败的军队"
 ALG_corrupt_mil_idea_desc: "The Algerian military, while powerful and deeply entrenched in politics, suffers from pervasive corruption. Resources meant for modernization and efficiency are siphoned off by generals and networks of patronage. This undermines operational capacity and erodes public trust, making reforms difficult while entrenching the army's role as both guardian and obstacle to progress."
 ALG_military_oversight: "Military Oversight"
 ALG_military_oversight_desc: "The military has established tight oversight over politics and civilian institutions. While this ensures stability and prevents chaos, it also reduces transparency, restricts reforms, and reinforces the army's dominance in public life."
 ALG_gas_pipeline_leverage: "Gas Pipeline Leverage"
 ALG_gas_pipeline_leverage_desc: "Algeria's extensive network of gas pipelines to Europe provides a powerful bargaining tool in foreign policy. Energy dependency makes partners cautious, but also creates overreliance on hydrocarbon exports to maintain political leverage."
 ALG_resource_curse: "Resource Curse"
 ALG_resource_curse_desc: "Despite immense oil and gas reserves, Algeria struggles with the ‘resource curse.' Dependence on hydrocarbons fuels corruption, discourages diversification, and exposes the economy to the volatility of global energy markets."
 alg_appease_kabyles: "Appease the Kabyle Population"
 alg_appease_kabyles_desc: "Growing unrest in Kabylia threatens national stability. By offering concessions such as cultural recognition, economic investment, or limited autonomy, we can calm tensions—though this risks emboldening other regions to demand the same."
 ALG_PM_Elections: "Appoint a Prime Minister"
 ALG_PM_Elections_desc: "\n£MAIN_desctext_elections\n\n\n\nThe President must decide on the appointment of a Prime Minister to head the government. This choice is not merely administrative—different candidates represent competing visions for Algeria's future, from loyal technocrats to opposition reformists."
 ALG_authority_more_70: "§YReformists§! hold at least §Y70%§! £generic_anarchist_communism Influence within the [ROOT.GetFlag] Algerian Government"
 ALG_PNA_victory_tt: "§Le Pouvoir§! hold more than §Y45%§! of the Influence within the Balance of Power."
 ALG_prime_minister_name_loc: "Prime Minister"
 ALG_minister_bio_loc: "Holder of executive authority under the President."
 alg_ethnic_policy: "Ethnic Policy"
 alg_ethnic_policy_desc: "\n£MAIN_arab_kabyle\n\n\n\nAlgeria is a diverse country with significant ethnic groups: Arabs, Kabyles, Tuaregs, Mozabites, and Chaouis. Government policy must balance their demands — decisions will bring benefits, but upsetting any group risks unrest and even secession."
 algeria_morocco.1.t: "The Morocco Question"
 algeria_morocco.1.d: "Algeria's relations with Morocco have long been overshadowed by the bitter legacy of the Sand War, the Western Sahara conflict, and decades of closed borders. With tensions still simmering, the question of how to approach Morocco looms large. Should Algeria double down on its historic rivalry, or attempt to chart a new course of dialogue and cooperation?"
 algeria_morocco.1.a: "The future of the Maghreb is at stake."
 ALG_morocco_question: "The Moroccan Question"
 ALG_morocco_question_desc: "Our rivalry with Morocco over the Western Sahara, the Sand War, and the decades-long border closure have left Algeria weakened. We must decide: will we confront Morocco, or will we pursue reconciliation?\n\n§YThis focus begins the Moroccan Question branch.§!"
 ALG_sand_war_legacy: "Legacy of the Sand War"
 ALG_sand_war_legacy_desc: "The wounds of the 1963 Sand War still linger. Algerians remember Moroccan ambitions on our territory, and many call for renewed vigilance."
 ALG_close_the_border: "Close the Border"
 ALG_close_the_border_desc: "The border with Morocco remains a source of smuggling, unrest, and espionage. Closing it will send a strong message of defiance."
 ALG_border_security_investments: "Border Security Investments"
 ALG_border_security_investments_desc: "We must reinforce the western frontier with permanent military posts, modern surveillance, and gendarmerie units to keep Moroccan influence at bay."
 ALG_counter_moroccan_influence: "Counter Moroccan Influence"
 ALG_counter_moroccan_influence_desc: "Morocco is actively seeking allies abroad. Algeria must counter this diplomatic offensive, cutting their influence in Africa and beyond."
 ALG_support_polisario_struggle: "Support the Polisario Struggle"
 ALG_support_polisario_struggle_desc: "The Sahrawi people deserve independence. By supporting the Polisario Front, Algeria strengthens its role as the champion of anti-colonial struggle in the Maghreb."
 ALG_internationalize_conflict: "Internationalize the Conflict"
 ALG_internationalize_conflict_desc: "The issue of Western Sahara must be elevated to the UN, the AU, and all possible forums to pressure Morocco diplomatically."
 ALG_african_union_pressure: "Mobilize the African Union"
 ALG_african_union_pressure_desc: "Through the African Union, Algeria will build a coalition of states pressing Morocco to accept Sahrawi self-determination."
 ALG_seek_dialogue_morocco: "Seek Dialogue with Morocco"
 ALG_seek_dialogue_morocco_desc: "Algeria must explore diplomatic channels with Morocco. While past wars and rivalries divide us, dialogue may lead to regional stability."
 ALG_confidence_building: "Confidence-Building Measures"
 ALG_confidence_building_desc: "Small steps such as joint committees and reduced visa restrictions may create the basis for lasting trust with Morocco."
 ALG_reopen_borders: "Reopen the Borders"
 ALG_reopen_borders_desc: "After years of closure, reopening the border to free movement of people and goods would be a historic turning point in our relations."
 ALG_economic_cooperation: "Economic Cooperation"
 ALG_economic_cooperation_desc: "Economic interdependence with Morocco will bring prosperity, reduce tensions, and strengthen Algeria's regional role."
 ALG_security_cooperation: "Security Cooperation"
 ALG_security_cooperation_desc: "Shared threats such as terrorism and smuggling require joint patrols and information sharing. Cooperation is more efficient than rivalry."
 ALG_towards_maghreb_union: "Towards a Maghreb Union"
 ALG_towards_maghreb_union_desc: "With Morocco, Algeria can lay the foundation for a strong Maghreb Union, echoing the dreams of our forefathers for North African unity."
 ALG_morocco.1.t: "UN Debate on Western Sahara"
 ALG_morocco.1.d: "Algeria has brought the question of Western Sahara before the United Nations, condemning Morocco's control of the territory. Delegates debate whether Morocco should withdraw or if Algeria is overstepping."
 ALG_morocco.1.a: "Condemn Morocco Harshly"
 ALG_morocco.1.b: "Push moderate Sanctions and Resolutions"
 ALG_moroccan_rivalry_start: "Border Tensions with Morocco"
 ALG_moroccan_rivalry_start_desc: "Decades of hostility with Morocco, fueled by the Sand War, Western Sahara, and the 1994 border closure, weigh heavily on Algeria. The tensions harm our economy, stability, and military readiness.\n§RThis idea cannot be removed normally.§!\nIt will only be reduced, replaced, or removed by progressing through the §YMoroccan Question§! Focus Tree."
 ALG_moroccan_rivalry_A1: "Countering Moroccan Influence"
 ALG_moroccan_rivalry_A1_desc: "Algeria has taken steps to blunt Moroccan influence in the region. The rivalry persists, but the effects are being managed more effectively."
 ALG_moroccan_rivalry_A2: "Escalated Rivalry"
 ALG_moroccan_rivalry_A2_desc: "Tensions with Morocco remain a drain on the state, but our determination and reforms have limited their impact."
 ALG_moroccan_rivalry_A_final: "Military Preparedness against Morocco"
 ALG_moroccan_rivalry_A_final_desc: "Through years of confrontation, Algeria has built a hardened, capable army, ready for conflict. The rivalry has forged strength from adversity."
 ALG_moroccan_reconciliation_B1: "Diplomatic Overtures"
 ALG_moroccan_reconciliation_B1_desc: "Algeria has taken tentative steps toward dialogue with Morocco, creating opportunities for limited cooperation and trust-building."
 ALG_moroccan_reconciliation_B2: "Opening Borders"
 ALG_moroccan_reconciliation_B2_desc: "With diplomatic ties deepening, Algeria has reopened its borders with Morocco, reducing economic strain and fostering regional trade."
 ALG_moroccan_reconciliation_B_final: "Maghreb Cooperation"
 ALG_moroccan_reconciliation_B_final_desc: "Algeria and Morocco have embraced cooperation, enabling trade, development, and regional leadership. The rivalry is finally behind us."
 ALG_morocco_question_tt: "§YThis focus begins the Moroccan Question path.§!\n\n- §RPath A:§! Pursue confrontation with Morocco - Gradually weaken the debuff idea, ending with a §GStronger Army§!.\n- §GPath B:§! Seek reconciliation with Morocco - Swap the debuff idea for improving §GPositive Buffs§!, ending with stronger §YEconomy and Diplomacy§!."
 alg_general.1.t: "The Return of Khaled Nezzar"
 alg_general.1.d: "With the decision to revive the methods of the Black Decade, the controversial former Minister of Defense, Khaled Nezzar, is once again called upon. His iron-fist approach may stabilize the army, but it risks alienating the population and drawing international criticism."
 alg_general.1.a: "The past returns to guide the present."
