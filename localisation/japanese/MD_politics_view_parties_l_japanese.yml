 PER.conservatism_Farashgard: "£PER_conservatism (F) ファラシュガード"
 PER.conservatism_Farashgard_desc: "(Liberal Democracy) - Farashgard (Persian/Farsi: Farashgard)\n\nFarashgard also refered as Iran Revival is a polical action netwrok founded by 40 Iranian activists across the United States, Canada, Europe, and Iran\nFarashgard advocates for a secular democracy in Iran either through a Republic or a Constitutional monarchy.\nIts original name Farashgard was metaphorically named after the Middle Persian concept Frashokereti. That is a Zoroastrian doctrine of a final renovation of the universe, when evil will be destroyed, and everything else will be then in perfect unity with God."
 PER.conservatism_Novin: "£PER_conservatism (INP) 新イラン党"
 PER.conservatism_Novin_desc: "(Pro-Democracy Conservatism) - Iran-Novin Party (Persian/Farsi: Hezb-é Irān-e Novin)\n\nThe new Iran-Novin Party (INP) takes its name from the original Iran Novin Party (New Iran Party) that was the royalist-state political party of Mohammad Reza Pahlavi Imperial Iran. The new Iran-Novin Party wishes to dismantle the institutions of the Islamic republic and advocates for economic and cultral liberalism."
 PER.liberalism_ADFI: "£PER_liberalism (ADFI) イラン民主主義と自由のための同盟"
 PER.liberalism_ADFI_desc: "自由民主主義 - 民主主義と自由のための同盟（ペルシア語/ファルシ語ローマ字表記：Ettehad Baraye Demokracy va Azadi-ye Irān）\n\nADFIはより世俗的な政府形態を求め、人権、個人の自由、民主主義を推進している。彼らはしばしばより大きな市民的自由を主張し、それが国内の保守派グループとの対立を生んでいる。"
 PER.socialism2: "£PER_anarchist_communism (MEK) イラン人民ムジャヒディン機構 - §C西側派閥§!"
 PER.socialism2_desc: "イスラム教社会主義  - イラン人民ムジャヒディン機構（ペルシア語/ファルシ語ローマ字表記：Mojâhedin-é Khalq-é Irân）\n\nMEK（イラン人民ムジャヒディン機構）は1965年にパフラヴィー朝に反対して結成され、その創設理念はマルクス主義とイスラム主義に強く影響を受けている。党組織がマリアム・ラジャヴィとマソウド・ラジャヴィを中心に構成されていることから、しばしば「カルト的」集団と呼ばれる。MEKはイランをより連邦制的で社会主義的な国家へと導く一連の計画の実施を望んでいる。"
 PER.Communist-State_Tudeh: "£PER_communism (TPI) イラン・トゥーデ党"
 PER.Communist-State_Tudeh_desc: "マルクス・レーニン主義 - イラン・トゥデー党（ペルシア語/ファルシ語ローマ字表記： Hezb-é Tude-ye Irān）\n\nイラン大衆党（トゥデー党）は1941年にソレイマーン・ミルザー・エスカンダリーを指導者として結成され、初期には相当な影響力を持ち、モハンマド・モサデグによるアングロ・ペルシャ石油会社の国有化運動において重要な役割を果たした。1946年のイラン石油危機後、同党は親ソ連路線に転じ、以降、残酷な弾圧を受けた。"
 PER.oligarchism_icon: "£PER_oligarchism"
 PER.Neutral_Libertarian_icon: "£PER_neutral_Social"
 PER.Nat_Fascism_alt: "£generic_Nat_Fascism_small (PFM) 人民改革運動"
 PER.Nat_Fascism_alt_desc: "イスラム民族主義 - 人民改革運動（ペルシア語/ファルシ語ローマ字表記：Nahzat-e Eslâh-e Mardomi）\n\nエスファンディアール・ラヒム・マシャエイとハミド・バガエイが率いる人民改革運動は、イラン思想学派を提唱する。イスラム教はイランによってのみ存在すると信じ、ポピュリスト的見解を持ち、イスラム的要素とイスラム以前のイラン的ナショナリズムを融合させてイラン政治を支配することを目指す。同団体の多くのメンバーは、イスラム共和国時代にアフマディネジャドとその陣営を支持していた者である。"
 ARM.Western_Autocracy_alt: "£ARM_western_autocracy_alty (STPAP) サスナ・ツレル汎アルメニア党"
 ARM.Western_Autocracy_alt_icon: "£ARM_western_autocracy_alty"
 ARM.Western_Autocracy_alt_desc: "親欧米ナショナリズム - サスナ・ツレル汎アルメニア党（アルメニア語ローマ字表記：Sasna Tsrer Hamahaykakan Kusaktsutyun）\n\n サスナ・ツレル汎アルメニア党は、2018年9月に同国で起きた「ベルベット革命」を受けて結成された、強硬な親欧米・国家保守主義の政党である。党名は、アルメニアの英雄叙事詩『サスーンの勇士たち』に由来する。同党は、対立する政治勢力に反対する中で、目標達成のためには暴力も辞さない姿勢を示すことがある。第一次ナゴルノ・カラバフ戦争の退役軍人であるジライル・セフィリアンは、同党の主要人物の一人である。"
 ARM.Western_Autocracy_alty: "£ARM_western_autocracy_alt (NDP) 国民民主連合"
 ARM.Western_Autocracy_alty_icon: "£ARM_western_autocracy_alt"
 ARM.Western_Autocracy_alty_desc: "親欧米ナショナリズム - 国民民主連合（アルメニア語：Azgayin Zhoghovrdavarakan Bever）\n\n 国民民主連合は、サスナ・ツレル汎アルメニア党、アルメニア国民進歩党、および数名の無所属政治家によって構成される、アルメニアの堅固な親欧米ナショナリズムを掲げる政治連合である。外交政策において、サスナ・ツレル汎アルメニア党と国民自決連合の両党は、極めて親欧米・親欧州的である。この連合は、真に独立したアルメニアの実現を求め、アルメニアおよびアルツァフにおけるトルコおよびロシアの影響力を拒否している。"
 ARM.conservatism_alt: "£ARM_western_conservative_alt (HP) 遺産党"
 ARM.conservatism_alt_icon: "£ARM_western_conservative_alt"
 ARM.conservatism_alt_desc: "国民自由主義 - 遺産党（アルメニア語ローマ字表記：Zharangutyun）\n\n 遺産党は、アルメニアの国民自由主義政党である。2002年、独立アルメニア初代外相であるラフィ・ホヴァニシアンによって設立された。同党の立場は、自由主義的資本主義経済政策と、社会的に保守的なナショナリズムを組み合わせたものと分類される。同党は、アルメニアの欧州との統合だけでなく、将来的にはアルメニアの欧州連合加盟も提唱している。遺産党は、欧州のために引かれた地理的境界にかかわらず、何世紀にもわたりアルメニアが欧州文明の構成要素の一つであったと固く信じている。同党は、アルツァフ共和国を独立国家として、あるいはアルメニアの一部として承認することを支持している。"
 ARM.conservatism_alty: "£ARM_western_conservative_alty (PANA) 汎アルメニア国民協定"
 ARM.conservatism_alty_icon: "£ARM_western_conservative_alty"
 ARM.conservatism_alty_desc: "社会保守主義 - 汎アルメニア国民協定（アルメニア語ローマ字表記：Hamahaykakan Azgayin Hamadzaynagir）\n\n 汎アルメニア国民協定（汎アルメニア国民合意）は、アルメニアの政治連合である。同連合は、直接民主制、大統領制の廃止、アルメニアの主権強化、国の経済発展の継続、独立したメディアの確立、大学教育の無償化、アルメニア・ディアスポラの帰還促進、少数民族の権利保護を信条とし、「ウィルソン主義的アルメニア」の概念およびアルツァフとアルメニアの統一を支持している。また、同連合は伝統的価値観を支持し、国内における外国軍基地の設置に反対している。"
 ARM.liberalism_alt: "£ARM_western_liberalism_alt (EPA) アルメニア欧州党"
 ARM.liberalism_alt_icon: "£ARM_western_liberalism_alt"
 ARM.liberalism_alt_desc: "親EU自由主義 - アルメニア欧州党（アルメニア語ローマ字表記：Hayastani Yevropakan Kusakts'ut'yun）\n\n アルメニア欧州党は、アルメニアの親欧州自由主義政党である。2018年11月6日にティグラン・クズマリアンによって設立された。同党は強い親欧州の立場をとり、アルメニアの欧州統合を支持している。同党は、アルメニアの現在のユーラシア連合への加盟に反対しており、アルメニアは遅滞なく欧州連合への加盟交渉の第一歩を踏み出すべきだと考えている。同党のマニフェストでは、アルメニアにおける強固で安定した民主主義の確立、あらゆる形態の差別の撤廃、ならびに人権、社会正義、自由選挙の保護を最優先事項としている。"
 ARM.socialism_alt: "£ARM_western_socialism_alt (DWP) 民主主義の道党"
 ARM.socialism_alt_icon: "£ARM_western_socialism_alt"
 ARM.socialism_alt_desc: "社会民主主義 - 民主主義の道党（アルメニア語ローマ字表記：Hayots Hamazgain Sharzhum）\n\n 民主主義の道党（人民の道党、民主主義の道）は、アルメニアの政党で、党首はマヌエル・ガスパリャンが務めている。同党は親西欧的な外交政策と社会民主主義的な統治原則を支持している。"
 ARM.socialism_alty: "£ARM_western_socialism_alt (BA) 輝けるアルメニア"
 ARM.socialism_alty_icon: "£ARM_western_socialism_alt"
 ARM.socialism_alty_desc: "社会自由主義 - 輝けるアルメニア（アルメニア語ローマ字表記：Lusavor Hayastan）\n\n 輝けるアルメニアは、2015年12月12日に結成された社会自由主義政党である。同党は親欧州的な姿勢をとる一方で、ロシアとの建設的な協力関係を維持し、他国に配慮してアルメニアの国益が損なわれることのないよう確保すべきであるとも考えている。党の綱領では、アルメニアは汎欧州的なプロセスや機構において主導権を発揮し、欧州文明と民主主義の価値観の真の担い手として自らを位置づけるべきであると述べられている。"
 ARM.Conservative_alt: "£ARM_Conservative_alt (RPA) アルメニア共和党（§7新興§!派）"
 ARM.Conservative_alt_icon: "£ARM_Conservative_alt"
 ARM.Conservative_alt_desc: "泥棒政治的保守主義 - アルメニア共和党 - 新興派（アルメニア語ローマ字表記：Hayastani Hanrapetakan Kusaktsutyun）\n\n アルメニア共和党は、アルメニアの第3代大統領セルジ・サルキシャンが率いる、アルメニアの民族保守派政党である。同党の民族保守主義的イデオロギーは、20世紀初頭のアルメニア民族主義思想である「ツェガクロン」に基づいている。しかし、党の新興派は、その根源的なイデオロギーから距離を置いており、主に政府高官、公務員、および政府とのコネに依存する富裕な実業家らで構成される、典型的なポスト・ソビエト型の権力政党と評されている。"
 ARM.Autocracy_alt: "£ARM_autocracy_alt (HAP) アルメニア祖国党"
 ARM.Autocracy_alt_icon: "£ARM_autocracy_alt"
 ARM.Autocracy_alt_desc: "新興の独裁体制 - アルメニア祖国党（アルメニア語ローマ字表記：Hayeri Hayrenik Kusaktsutyun）\n\n アルメニア祖国党は、アルメニアの政党で、アルメニア軍の強化、アルメニアおよびアルツァフの領土保全、そしてヘイトスピーチの犯罪化を支持している。同党は親ロシア的な立場をとり、アルメニア国境の警備にあたるロシア軍を支持している。"
 ARM.Neutral_Autocracy_alt: "£ARM_neutral_autocracy_alt (SF) 祖国の力"
 ARM.Neutral_Autocracy_alt_icon: "£ARM_neutral_autocracy_alt"
 ARM.Neutral_Autocracy_alt_desc: "中道独裁体制 - 祖国の力党（アルメニア語ローマ字表記：Uzh Hayrenyats）\n\n「祖国の力」はアルメニアの政党である。ティグラン・アルザカンツヤン氏は、アルメニアおよびアルツァフが現在直面している課題の解決策を見出すため、国内およびアルメニア・ディアスポラの愛国者たちと協力することを誓約している。同党はまた、汚職との闘い、国民の生活の質の向上、国の経済のさらなる発展、国境の安全確保、そしてアルメニア軍の近代化と強化を支持している。"
 ARM.Neutral_conservatism_alt: "£ARM_neutral_conservative_alt (NAP) 国家課題党"
 ARM.Neutral_conservatism_alt_icon: "£ARM_neutral_conservative_alt"
 ARM.Neutral_conservatism_alt_desc: "保守主義 - 国家議題党（アルメニア語ローマ字表記：Azgayin Orakarg Kusaktsutyun）\n\n 国家議題党は、アルメニアの保守政党である。同党は、ナゴルノ・カラバフ紛争の長期的な解決策として、アルメニアとアルツァフ共和国の統一を支持している。国家議題党は権威主義に反対し、アルメニアの民主主義と言論の自由の強化を目指しているほか、農村開発や軍事予算の増額を支持し、アルメニア政界において女性がより重要な地位に就くことを奨励している。"
 ARM.oligarchism_icon: "£ARM_oligarch"
 ARM.Neutral_Libertarian_icon: "£ARM_Neutral_Libertarian"
 ARM.Neutral_Libertarian_alt: "£ARM_neutral_libertarian_alt (CCP) 市民契約党"
 ARM.Neutral_Libertarian_alt_icon: "£ARM_neutral_libertarian_alt"
 ARM.Neutral_Libertarian_alt_desc: "大衆自由主義 - 市民契約党（アルメニア語ローマ字表記：Kaghakatsiakan Paymanagir）\n\n 市民契約党は、ニコル・パシニャンが率いるアルメニアの大衆自由主義政党である。同党は特定のイデオロギーに帰属するものではないが、実際には急進的なポピュリズムの要素を帯びた自由民主主義的性格を持つ。同党は外交政策について明確な立場を打ち出していないが、EUへの統合とCSTO加盟の凍結に傾いている。"
 ARM.Neutral_green_alt: "£ARM_neutral_green_alt (CD) 市民の決断"
 ARM.Neutral_green_alt_icon: "£ARM_neutral_green_alt"
 ARM.Neutral_green_alt_desc: "進歩環境主義 - 市民の決断（アルメニア語ローマ字表記：Kaghakatsu Voroshum）\n\n 「市民の決断」（市民の決断社会民主党）は、アルメニアの社会民主主義・環境主義政党である。同党は、福祉国家、富の再分配、環境保護、国民皆保険、無償教育、男女平等、労働組合の支援、および直接民主制を提唱している。さらに、アルツァフ共和国の自決権、コーカサス地域における平和の確立、そしてロシアとの中立的な関係の維持を主張している。"
 ARM.neutral_Social_alt: "£ARM_neutral_social_alt (SDHP) 社会民主フンチャキアン党"
 ARM.neutral_Social_alt_icon: "£ARM_neutral_social_alt"
 ARM.neutral_Social_alt_desc: "社会民主主義 - 社会民主フンチャキアン党（アルメニア語ローマ字表記：Sotsial Demokrat Hnchakyan Kusaktsutyun）\n\n 社会民主フンチャキアン党は、1887年にスイスのジュネーブで学生グループによって設立された、アルメニアで最も長く活動を続けている政党である。同党は、オスマン帝国および当時ペルシャと呼ばれていたイランにおいて活動した最初の社会主義政党であった。同党は自らを国民社会民主党と位置づけている。同党は、無償の教育と医療、人権と平等の促進、強固な民主主義の維持、環境保護、そして分散型の社会経済の構築を提唱している。また、アルツァフとアルメニアの統一も支持している。"
 ARM.Nat_Populism_icon: "£ARM_Conservative_alt"
 ARM.Nat_Populism_alt: "£ARM_national_populist (AEUAP) アルメニアン・イーグルス統一アルメニア党"
 ARM.Nat_Populism_alt_icon: "£ARM_national_populist"
 ARM.Nat_Populism_alt_desc: "民族保守主義 - アルメニアン・イーグルス統一アルメニア党（アルメニア語ローマ字表記：Hay Artsivner Miasnakan Hayastan Kusaktsutyun）\n\n アルメニアン・イーグルス統一アルメニア党は、アルメニア共和党から民族主義者が排除された直後に結成された。同党は、アルメニア使徒教会の活動を支持し、統一アルメニアの構築を目指し、ロシアとの連携強化を掲げている。"
 ARM.Nat_Populism_alty: "£ARM_national_populist (PVP) 世論党"
 ARM.Nat_Populism_alty_icon: "£ARM_national_populist"
 ARM.Nat_Populism_alty_desc: "国民ポピュリスト - 世論党（アルメニア語ローマ字表記：Hanrayin Dzayn Kusaktsutyun）\n\n 世論党は2022年8月6日に結成され、エレバンで開催された党大会において、ヴァルダン・グカシャンが満場一致で党委員長に選出された。その後、アルタク・ガルスティアンが委員長に選出されたため、グカシャンは同党の名誉委員長を務めた。同党は、アルツァフとアルメニアの統合、国家の安全保障の強化、汚職の撲滅、社会正義と法の支配の向上、および少数民族の権利保護を掲げている。また、国内の民主的機関の強化、選挙制度改革の実施、経済支援も支持している。"
 ARM.Nat_Autocracy_alt: "£ARM_military_junta_alt (AFA) アルメニア軍"
 ARM.Nat_Autocracy_alt_icon: "£ARM_military_junta_alt"
 ARM.Nat_Autocracy_alt_desc: "軍事政権 - アルメニア軍（アルメニア語ローマ字表記：Hayastani Hanrapetutyan zinvats uzher）\n\n アルメニア共和国軍は、アルメニアの国軍である。アルメニア軍参謀本部の管轄下にある各部隊で構成されており、大別すると陸軍と空軍の2つの主要な部隊に分かれる。アルメニア軍は、アルメニア・ソビエト社会主義共和国に駐留していた旧ソ連軍（主に南カフカース軍管区の第7親衛軍部隊）の一部を基盤として編成されたものの、その起源は1918年の第一アルメニア共和国成立にまで遡ることができる。"
 ARM.Nat_Autocracy_alty: "£ARM_military_junta_alty (5165) 国民保守運動党"
 ARM.Nat_Autocracy_alty_icon: "£ARM_military_junta_alty"
 ARM.Nat_Autocracy_alty_desc: "親軍派政党 - 5165国民保守運動党（アルメニア語ローマ字表記：5165 Azgayin pahpanoghakan sharzhum kusaktsutyun）\n\n 5165国民保守運動党はアルメニアの政党で、2021年4月22日に結成され、現在はカリン・トノヤンが党首を務めている。党名に含まれる数字は、アララト山の標高を表している。同党は、国家の安全保障の強化、軍隊の増強、医療制度改革、経済の強化、アルメニア・ディアスポラの帰国促進、およびアルツァフの独立支持を掲げている。"
 ARM.Monarchist_alt: "£ARM_monarchist_alt (Bagratuni) バグラトゥニ家"
 ARM.Monarchist_alt_icon: "£ARM_monarchist_alt"
 ARM.Monarchist_alt_desc: "国家君主制 - バグラトゥニ家（アルメニア語 - Bagratunineri Arkayatohm）\n\nバグラトゥニ朝またはバグラティド朝は、中世アルメニア王国を紀元前885年から1045年まで支配したアルメニアの王家であった。古代アルメニア王国の家臣として始まり、彼らはアルメニアにおけるアラブ支配の時代に最も著名なアルメニア貴族となり、最終的に独自の独立王国を築いた。この王朝のアルメニア分家の既知の後継者は宣言されていない。しかし、ロランド・バグラトゥニはハンガリーとポーランドとのつながりを持ちながら、王位継承者であると主張している。"
 ARM.Monarchist_alty: "£ARM_monarchist_altr (Savoy) サヴォイア家"
 ARM.Monarchist_alty_icon: "£ARM_monarchist_altr"
 ARM.Monarchist_alty_desc: "国家君主制 - サヴォイア家（イタリア語 - Casa Savoia）\n\nサヴォイア家は、ヨーロッパ最古の王朝の一つであり、紀元1000年頃からサヴォイア伯国を統治してきた。リソルジメント（イタリア統一運動）の時代には、サヴォイア王国が半島を統一し、イタリア国家を建国した。しかし、ムッソリーニに実権を事実上委ねた後、第二次世界大戦後の国民投票によって王制は廃止され、サヴォイア家は国外追放された。しかし、憲法第13条の削除により、サヴォイア家は再びイタリアの地に戻ることができた。 "
 ARM.Monarchist_altr: "£ARM_monarchist_alty (AAO) アルメニア＝アーリア騎士団"
 ARM.Monarchist_altr_icon: "£ARM_monarchist_alty"
 ARM.Monarchist_altr_desc: "ヘタニズム君主制 - アルメニア＝アーリア騎士団党（アルメニア語 - Hay-Ariakan Miabanutyun）\n\nアルメニア＝アーリア騎士団党は、アルメニアのネオ・ペイガン運動と密接に関連する政党である。党のイデオロギーは、古代大アルメニア王国の復興を支持し、それをすべてのインド・ヨーロッパ語族の民の故郷と見なしている。同党はまた、同じ思想を持つロシアやイランの政党や政治家を支持している。"
