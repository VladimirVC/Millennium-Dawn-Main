 belarus_character.1.t: "Era Łukaszenki"
 belarus_character.1.d: "Alexander Grigoryevich Lukashenko has come a long way from an ordinary deputy to the President of the country. Despite having only recently begun to rule Belarus, many influential forces are already dreaming of his overthrow. Will he find a better way for Belarus, or will he become another dictator clinging to power for life?"
 belarus_character.1.a: "Nasza mama Batka Łukaszenko z Białorusi"
 belarus_character.2.t: "Liberalno-Demokratyczna Białoruś"
 belarus_character.2.d: "Sergey Gaidukevich is an extraordinary person with an interesting past and strong views on the future of Belarus. He is clearly regarded as a pro-Russian politician, but will he live up to that reputation?"
 belarus_character.2.a: "Białoruś przede wszystkim"
 belarus_character.3.t: "Europejska Droga Białorusi"
 belarus_character.3.d: "Belarus has finally rejected the Soviet past and moved toward a bright European future. But we must decide which path we will take into this new era."
 belarus_character.3.a: "Liberalizm jest naszą drogą"
 belarus_character.3.b: "Konserwatyzm jest dla nas wszystkim"
 belarus_character.4.t: "Nacjonaliści na Białorusi"
 belarus_character.4.d: "Zenon Poznyak, who has come to power, has long been known for his anti-Russian rhetoric. His central belief is that Russia has suppressed Belarusians throughout history. He intends to end this and possibly avenge it."
 belarus_character.4.a: "Białorusini to nie Rosjanie"
 belarus_character.5.t: "Czerwona Białoruś"
 belarus_character.5.d: "Belarus's desire to gradually move away from the Soviet past has ultimately dragged it back into the clutches of Communism. People remember the good times of the USSR and have apparently decided to bring them back."
 belarus_character.5.a: "Przywróćmy sowieckie dziedzictwo"
 belarus_ukraine.1.t: "Pułk Kastusa Kalinowskiego"
 belarus_ukraine.1.d: "Białorusini wysyłają nas na pomoc w postaci całego pułku. Razem będziemy walczyć z rosyjską agresją."
 belarus_ukraine.1.a: "Precz z Rosją i jej imperialnymi ambicjami."
 belarus_ukraine.2.t: "Wysłać ochotników do Noworosji?"
 belarus_ukraine.2.d: "Among the people, there are those who want to help the residents of Novorossiya in their struggle. We are ready to assist them."
 belarus_ukraine.2.a: "Wyślij ochotników"
 belarus_ukraine.2.b: "Potępiamy tych, którzy udają się do Noworosji jako wolontariusze, ponieważ jest to nielegalne."
 belarus_ukraine.3.t: "Białoruś oferuje Mińsk jako platformę do rozmów pokojowych"
 belarus_ukraine.3.d: "Białoruś oferuje Mińsk jako miasto do negocjacji w sprawie zaprowadzenia pokoju na Ukrainie. Czy zgodzimy się na zawarcie rozejmu z separatystami?"
 belarus_ukraine.3.a: "Pokój jest tym, do czego powinniśmy dążyć!"
 belarus_ukraine.3.b: "Przywrócimy integralność terytorialną Ukrainy!"
 belarus_ukraine.4.t: "Operacja specjalna na Ukrainie"
 belarus_ukraine.4.d: "Russia has launched a special operation in Ukraine. Our leadership faces a choice — to participate or not. We have many obligations, but we should think carefully before getting involved in this carnage."
 belarus_ukraine.4.a: "Ukraina musi zostać wyzwolona!"
 belarus_ukraine.4.b: "Nie będziemy w tym uczestniczyć"
 belarus_export.2.t: "Pierwsze próbki T-72BM1"
 belarus_export.2.d: "We have finally completed our modification of the T-72 tank. Now we will be able to produce it for the needs of our army."
 belarus_export.2.a: "Chwała białoruskiej broni"
 belarus_export.3.t: "Pierwsze próbki „Belgradu”"
 belarus_export.3.d: "We have finally completed our modification of the BM-21. Now we will be able to produce it for the needs of our army."
 belarus_export.3.a: "Chwała białoruskiej broni"
 belarus_export.4.t: "Pierwsze próbki „Poloneza”"
 belarus_export.4.d: "We have finally completed our MLRS \"Polonez\". Now we will be able to produce it for the needs of our army."
 belarus_export.4.a: "Chwała białoruskiej broni"
 belarus_export.6.t: "Białoruś Oferujemy zakup ciągników"
 belarus_export.6.d: "The Belarusian MTZ plant is offering us their newest tractor. It will be a great help in the development of our agro-industry."
 belarus_export.6.a: "Wyrażamy zgodę na ich zakup"
 belarus_export.6.b: "Nie potrzebujemy ich"
 belarus_export.7.t: "Nasze traktory zostały zakupione"
 belarus_export.7.d: "[FROM.GetNameWithFlag] has agreed to sign a contract with us for the supply of tractors."
 belarus_export.7.a: "Świetnie"
 belarus_export.8.t: "Nasze traktory zdecydowały się nie kupować"
 belarus_export.8.d: "[FROM.GetNameWithFlag] refused to sign a contract with us for the supply of tractors."
 belarus_export.8.a: "Bolesny"
 belarus_export.9.t: "Kontrakt z białoruskim Minotorem"
 belarus_export.9.d: "We have long wanted to cooperate with this Belarusian enterprise. They will repair our wheeled military equipment, which will greatly benefit us."
 belarus_export.9.a: "Cienki"
 belarus_export.10.t: "Kontrakt z Zakładem Remontów Samolotów 558"
 belarus_export.10.d: "Białoruscy inżynierowie oferują nam swoje usługi w zakresie naprawy sprzętu lotniczego. Czy zgodzimy się na podpisanie z nimi umowy?"
 belarus_export.10.a: "Oczywiście jest to dobra oferta"
 belarus_export.10.b: "Nie, odrzucimy ich ofertę"
 belarus_export.11.t: "Nowy kontrakt z Zakładem Remontów Samolotów 558"
 belarus_export.11.d: "[FROM.GetNameWithFlag] has signed a contract with the 558 Aircraft Repair Plant."
 belarus_export.11.a: "Świetnie"
 belarus_export.12.t: "Umowa z Zakładem Naprawy Samolotów 558 została odrzucona"
 belarus_export.12.d: "[FROM.GetNameWithFlag] refused the contract with the 558 Aircraft Repair Plant."
 belarus_export.12.a: "Bolesny"
 belarus_export.13.t: "Umowa z firmą Peleng"
 belarus_export.13.d: "Białoruska firma Peleng specjalizująca się w elektronice jest gotowa zaoferować swoje usługi w zakresie dostarczania urządzeń naprowadzających do broni PPK. Czy zgodzimy się na tę umowę?"
 belarus_export.13.a: "Oczywiście jest to dobra oferta"
 belarus_export.13.b: "Nie, odrzucimy ich ofertę"
 belarus_export.14.t: "Nowy kontrakt z firmą Peleng"
 belarus_export.14.d: "[FROM.GetNameWithFlag] has signed a contract with Peleng on the supply of equipment for ATGMs."
 belarus_export.14.a: "Świetnie"
 belarus_export.15.t: "Umowa z firmą Peleng została odrzucona"
 belarus_export.15.d: "[FROM.GetNameWithFlag] refused a contract with Peleng on the supply of equipment for ATGMs."
 belarus_export.15.a: "Bolesny"
 belarus_export.16.t: "Białoruskie PPK"
 belarus_export.16.d: "Belarusian manufacturers want to offer us their ATGMs for delivery. Will we agree to accept this contract?"
 belarus_export.16.a: "Oczywiście jest to dobra oferta"
 belarus_export.16.b: "Nie, odrzucimy ich ofertę"
 belarus_export.17.t: "Sprzedaż PPK"
 belarus_export.17.d: "The contract for the sale of our ATGMs to [FROM.GetNameWithFlag] has been concluded."
 belarus_export.17.a: "Świetnie"
 belarus_export.18.t: "Sprzedaż PPK"
 belarus_export.18.d: "The contract for the sale of our ATGMs to [FROM.GetNameWithFlag] was rejected."
 belarus_export.18.a: "Bolesny"
 belarus_export.19.t: "Podwozie białoruskie"
 belarus_export.19.d: "Białoruscy producenci są gotowi zaoferować swoje podwozia do szeregu naszego sprzętu wojskowego. Czy zgodzimy się na tę umowę?"
 belarus_export.19.a: "Oczywiście jest to dobra oferta"
 belarus_export.19.b: "Nie, odrzucimy ich ofertę"
 belarus_export.20.t: "Umowa na dostawę podwozia"
 belarus_export.20.d: "They agreed to our contract for the supply of chassis."
 belarus_export.20.a: "Świetnie"
 belarus_export.21.t: "Umowa na dostawę podwozia"
 belarus_export.21.d: "They decided to cancel our chassis supply contract."
 belarus_export.21.a: "Bolesny"
 belarus_export.22.t: "Wspólny projekt APC"
 belarus_export.22.d: "[FROM.GetNameWithFlag] is offering us a joint APC project called Cobra-K. This project will bring us experience and knowledge in the modification of older equipment. Will we agree?"
 belarus_export.22.a: "Oczywiście jest to dobra oferta"
 belarus_export.22.b: "Nie, odrzucimy ich ofertę"
 belarus_export.23.t: "Wspólny projekt APC"
 belarus_export.23.d: "[FROM.GetNameWithFlag] agreed to work on a joint modification of the APC."
 belarus_export.23.a: "Świetnie"
 belarus_export.24.t: "Wspólny projekt APC"
 belarus_export.24.d: "[FROM.GetNameWithFlag] refused to work on a joint modification of the APC."
 belarus_export.24.a: "Bolesny"
 belarus_export.25.t: "B-200 «Polonez»"
 belarus_export.25.d: "[FROM.GetNameWithFlag] oferuje nam zakup najnowszego MLRS. Czy zgodzimy się na ich zakup?"
 belarus_export.25.a: "Oczywiście jest to dobra oferta"
 belarus_export.25.b: "Nie, odrzucimy ich ofertę"
 belarus_export.26.t: "B-200 «Polonez»"
 belarus_export.26.d: "[FROM.GetNameWithFlag] has agreed to purchase our MLRS."
 belarus_export.26.a: "Świetnie"
 belarus_export.27.t: "B-200 «Polonez»"
 belarus_export.27.d: "[FROM.GetNameWithFlag] refused to purchase our MLRS."
 belarus_export.27.a: "Bolesny"
 belarus_export.28.t: "Podwozie białoruskie"
 belarus_export.28.d: "Białoruscy producenci są gotowi zaoferować swoje podwozia do szeregu naszego sprzętu wojskowego. Czy zgodzimy się na tę umowę?"
 belarus_export.28.a: "Oczywiście jest to dobra oferta"
 belarus_export.28.b: "Nie, odrzucimy ich ofertę"
 belarus_export.29.t: "Umowa na dostawę podwozia"
 belarus_export.29.d: "[FROM.GetNameWithFlag] agreed to our contract for the supply of chassis."
 belarus_export.29.a: "Świetnie"
 belarus_export.30.t: "Umowa na dostawę podwozia"
 belarus_export.30.d: "[FROM.GetNameWithFlag] decided to cancel our chassis supply contract."
 belarus_export.30.a: "Bolesny"
 belarus_another.1.t: "Białoruś prosi nas o inwestycje"
 belarus_another.1.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.1.a: "Oczywiście"
 belarus_another.1.b: "Przepraszam, nie"
 belarus_another.2.t: "Wojna dyplomatyczna polsko-białoruska"
 belarus_another.2.d: "Nasze stosunki z Polską zaczęły gwałtownie się pogarszać. Białoruś oskarżyła jednego z polskich dyplomatów o „aktywne działania mające na celu destabilizację białoruskiego społeczeństwa”. W odpowiedzi Polska przygotowała listę białoruskich urzędników, którym zostanie zakaz wjazdu na terytorium Polski. Przyczyną konfliktu było społeczne stowarzyszenie „Związek Polaków Białorusi”, które zrzeszało około 20 tysięcy osób. Na zjeździe Związku Polaków na Białorusi usunięto jego byłego przywódcę, lojalnego wobec kierownictwa Białorusi, po czym Związek Polaków na Białorusi został poddany masowym naciskom władz, które oskarżały kierownictwo Polski, że finansował zjazd Związku Polaków Białorusi i ambasadę tego kraju „działalności dywersyjnej” przeciwko Białorusi. Ministerstwo Sprawiedliwości Białorusi odmówiło zatwierdzenia wyników Zjazdu Związku Polaków na Białorusi, który na swoją przewodniczącą wybrał Angelikę Borys. Polski Sejm wyraził swoje niezadowolenie z działań władz białoruskich, które zostało odebrane na Białorusi jako próba ingerencji w jej wewnętrzne sprawy. Dalszy rozwój sytuacji doprowadził do konfliktu dyplomatycznego."
 belarus_another.2.a: "Mamy dość Polaków!"
 belarus_another.3.t: "Uniatyzm na Ukrainie"
 belarus_another.3.d: "Uniatism has begun to spread actively across our territory, and many residents are demanding an official break with the Orthodox Church, which is subordinate to Moscow. Perhaps it is worth listening to them?"
 belarus_another.3.a: "Uniatyzm stanie się religią państwową"
 belarus_another.3.b: "Wszystko pozostanie tak jak poprzednio"
 belarus_another.4.t: "Białoruś prosi nas o inwestycje"
 belarus_another.4.d: "Our old Belarusian friends are asking us for investments."
 belarus_another.4.a: "Oczywiście"
 belarus_another.4.b: "Przepraszam, nie"
 belarus_another.5.t: "Dekret nr 3"
 belarus_another.5.d: "Oburzenie ludzi dekretem nr 3 jest bardzo duże. Ludzie żądają jego odwołania, ludzie żądają odpustów. Czy zgodzimy się pójść z nimi?"
 belarus_another.5.a: "Nie unieważnimy dekretu"
 belarus_another.5.b: "Myślę, że jesteśmy gotowi na ustępstwa"
 belarus_another.7.t: "Inwestycje Białorusi w naszym kraju"
 belarus_another.7.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.7.a: "Podpiszemy umowę"
 belarus_another.7.b: "Odmawiamy"
 belarus_another.8.t: "Projekt BOMBEL"
 belarus_another.8.d: "The EU funds have been received. It is time for us to decide how to dispose of them."
 belarus_another.8.a: "Zrobimy, co powinniśmy – wzmocnimy granicę"
 belarus_another.8.b: "Nie sądzę, że zauważą, jeśli weźmiemy"
 belarus_another.9.t: "Inwestycje Białorusi w naszym kraju"
 belarus_another.9.d: "Our colleagues from the Republic of Belarus propose to conclude a cooperation and investment agreement. We have to consider this agreement and decide whether to conclude it or not."
 belarus_another.9.a: "Podpiszemy umowę"
 belarus_another.9.b: "Odmawiamy"
 belarus_another.10.t: "What Should We Do With PMC Wagner?"
 belarus_another.10.d: "We detained several suspicious people who later turned out to be mercenaries of the famous Russian PMC Wagner. Our law enforcement agencies are already ready to accuse them of preparing terrorism. The Russian side insists on their release. What will we do?"
 belarus_another.10.a: "Uwolnimy ich i przekażemy stronie rosyjskiej"
 belarus_another.10.b: "Put them in jail and accuse them of preparing terrorist attacks"
 belarus_another.11.t: "Wojna domowa na Białorusi"
 belarus_another.11.d: "Our strongly anti-Russian rhetoric, the policy of imposing the Belarusian language, and the active promotion of a history that denies any connection with Russia have taken their toll. The eastern regions have revolted and local self-defense forces have seized power. We must stop this as soon as possible before the major powers can exploit it."
 belarus_another.11.a: "To jest okropne!"
 belarus_another.12.t: "Generał Azarenok lobbuje na rzecz rosyjskich interesów w naszym kraju"
 belarus_another.12.d: "Our law enforcement agencies have learned about the lobbying of Russian interests in our country through the connections of General Azarenka. Should we pay attention, or is it in the interests of the Republic of Belarus to let it continue?"
 belarus_another.12.a: "Oczywiście"
 belarus_another.12.b: "Konieczne jest umieszczenie go w więzieniu"
 belarus_another.14.t: "Siergiej Tichanowski"
 belarus_another.14.d: "A well-known opposition blogger critical of our government, he has started to have too much influence among the people and we need to do something about it."
 belarus_another.14.a: "Musimy go wsadzić do więzienia"
 belarus_another.14.b: "Leave him alone, he may still be useful to us"
 belarus_another.15.t: "Poproś o pomoc MFW"
 belarus_another.15.d: "We are forced to request assistance from the IMF to address the consequences of the crisis."
 belarus_another.15.a: "Nie mamy wyboru"
 belarus_another.16.t: "Zaostrzenie polityki kredytowej"
 belarus_another.16.d: "The credit policy will undergo a sharp revision in connection with the current situation."
 belarus_another.16.a: "Nie mamy wyboru"
 belarus_another.17.t: "Współpraca wojskowa z Białorusią"
 belarus_another.17.d: "We have invited military specialists from Belarus to address the most important tasks in our army. The Belarusian special forces conducted training for our fighters, and the Belarusian military industry improved our air defense system."
 belarus_another.17.a: "Niesamowity!"
 belarus_another.18.t: "Łatgalia lub wojna"
 belarus_another.18.d: "Władze Białorusi stają się coraz bardziej agresywne. Postawili nam ultimatum – albo oddamy im Łatgalię, albo konsekwencje będą dla naszego kraju najstraszniejsze. Tak nieoczekiwane stwierdzenie nas zszokowało. Co zrobimy?"
 belarus_another.18.a: "Będziemy musieli oddać im Łatgalię, żeby przynajmniej zachować niezależność"
 belarus_another.18.b: "Żadnych ustępstw"
 belarus_another.19.t: "Druga Unia Lubelska"
 belarus_another.19.d: "Belarus actively influences our government and holds significant leverage over it. Today, the Belarusian ambassador handed us a draft of a new agreement envisioning the creation of a supranational entity, similar to what Russia proposed for the Lukashenko government. In effect, we would be surrendering some of our autonomy, but our states would become nearly unified. Do we agree to this?"
 belarus_another.19.a: "Nasz kraj jest osłabiony, myślę, że powinniśmy się zgodzić"
 belarus_another.19.b: "Nasza niezależność jest naszym wszystkim"
 belarus_another.20.t: "Podpisanie Unii"
 belarus_another.20.d: "Polski rząd zgodził się stworzyć z nami unię! To zwycięstwo całego narodu białoruskiego!"
 belarus_another.20.a: "Cóż, zobaczymy"
 belarus_another.21.t: "Polska odmówiła!"
 belarus_another.21.d: "The Polish government, which we have nurtured for so long, has betrayed us. Apparently we have no choice and must decide for ourselves what to do with these traitors. We may have to use all available leverage."
 belarus_another.21.a: "Zróbmy piekło Polakom"
 belarus_another.21.b: "Zostawmy ich"
 belarus_another.22.t: "Milicja Śląska"
 belarus_another.22.d: "Our people have a chance for independence. It is time to take advantage of it and take up arms!"
 belarus_another.22.a: "Precz z polskim uciskiem!"
 belarus_another.23.t: "Wspólne ćwiczenia z Białorusią"
 belarus_another.23.d: "Białoruś proponuje nam prowadzenie wspólnych ćwiczeń w celu koordynacji bojowej naszych wojsk. Czy się zgodzimy?"
 belarus_another.23.a: "Oczywiście, że się zgodzimy"
 belarus_another.23.b: "Obejdziemy się bez nich"
 belarus_another.24.t: "Wspólne ćwiczenia z Polską"
 belarus_another.24.d: "They have agreed to conduct exercises with our troops. We will gain valuable experience."
 belarus_another.24.a: "Dobry."
 belarus_another.25.t: "Dostarczyć broń Irakowi"
 belarus_another.25.d: "We are ready to allocate part of our weapons stockpile for delivery to Iraq in support of the friendly regime there."
 belarus_another.25.a: "Dobry."
 belarus_another.26.t: "Wyląduj samolotem Ryanair z Protasevichem"
 belarus_another.26.d: "Our special services were able to intercept and force down the plane carrying the editor of the opposition channel NEXTA. His name is Roman Protasevich."
 belarus_another.26.a: "Dobry."
 belarus_another.27.t: "Losy Kościoła białoruskiego"
 belarus_another.27.d: "Przywódcy naszego kraju poważnie zastanawiali się nad przyznaniem autokefalii naszemu Kościołowi. Ale ten krok z pewnością może zepsuć stosunki z naszym przyjacielem i sąsiadem – Rosją. Czy na to pójdziemy?"
 belarus_another.27.a: "Udzielamy autokefalii naszemu Kościołowi"
 belarus_another.27.b: "NIE"
 belarus_another.28.t: "Co zrobić ze Związkiem Polaków Białorusi?"
 belarus_another.28.d: "The Union of Poles of Belarus has long been our problem. Through it, Poland has exerted its influence on us with full force. It is time to deal with this. Either we leave them as they are, or we completely expel the Polish population."
 belarus_another.28.a: "Niech pozostaną pod naszą kontrolą"
 belarus_another.28.b: "Na Białorusi nie ma miejsca dla Polaków"
 belarus_another.29.t: "Anulowanie handlu Chelnochnaya"
 belarus_another.29.d: "Through Russia and China, we have established supplies of the goods we need to finally get rid of this relic of the 90s."
 belarus_another.29.a: "Dobry."
 belarus_another.30.t: "Anulowanie handlu Chelnochnaya"
 belarus_another.30.d: "Now that we have access to European goods through official channels, our citizens will not have to engage in this dangerous and sometimes unprofitable occupation."
 belarus_another.30.a: "Dobry."
 belarus_another.31.t: "Wojna mleczna"
 belarus_another.31.d: "Russia has boycotted the import of our dairy products, cutting us off from a significant share of our profits. Will we concede to their conditions, or will we protect the domestic producer?"
 belarus_another.31.a: "We stand firmly behind our manufacturers"
 belarus_another.31.b: "Ulegnijmy ich żądaniom"
 belarus_another.32.t: "Problem z Radą Najwyższą"
 belarus_another.32.d: "The Supreme Soviet remains a relic of the Soviet system, which we cannot legally eliminate without changing the constitution. Therefore, we will have to compromise with them until we finally resolve this issue."
 belarus_another.32.a: "Na chwałę Białorusi"
 belarus_another.33.t: "Katastrofa samolotu na Ukrainie"
 belarus_another.33.d: "A plane carrying Zenon on board and heading to Kyiv crashed in Ukraine. There were no survivors, and it became urgently necessary to decide who would take the post of leader of the state. The party deputy, Yuri Belenky, became the temporary and possibly permanent head."
 belarus_another.33.a: "Na chwałę Białorusi"
 belarus_another.34.t: "Talar białoruski"
 belarus_another.34.d: "Belarus proposes to introduce a single currency on our territory — the Thaler, the same one used in Belarus. Perhaps a common currency will improve trade between our countries, but our independence will again come under threat."
 belarus_another.34.a: "Zgadzamy się"
 belarus_another.34.b: "Odmawiamy"
 belarus_another.35.t: "Międzymorze"
 belarus_another.35.d: "Białoruś proponuje nam utworzenie sojuszu wojskowego – zwanego Międzymorzem. Tworząc go uchronimy się przed agresją większych sąsiadów."
 belarus_another.35.a: "Zgadzamy się."
 belarus_another.35.b: "Odmawiamy."
 belarus_another.36.t: "Białoruś chce przystąpić do NATO"
 belarus_another.36.d: "Białoruś od dawna jest na drodze Demokracji i razem z nami chce jej bronić. Rząd Białorusi w pełni spełnił wszystkie warunki przystąpienia do NATO i złożył wniosek o członkostwo w tej organizacji. Czy to zaakceptujemy?"
 belarus_another.36.a: "Zgadzamy się."
 belarus_another.36.b: "Odmawiamy."
 belarus_another.37.t: "Dołączamy do NATO"
 belarus_another.37.d: "Nasz wniosek o członkostwo został zatwierdzony i teraz jesteśmy częścią tego wielkiego Sojuszu, gotowego bronić demokracji na całym świecie!"
 belarus_another.37.a: "Brawo!"
 belarus_another.38.t: "Białoruś chce dołączyć do USAID"
 belarus_another.38.d: "Rząd Białorusi wysłał prośbę o przyłączenie się do programu USAID. Czy jesteśmy gotowi odpowiedzieć na to pozytywnie?"
 belarus_another.38.a: "Akceptujemy ich prośbę"
 belarus_another.38.b: "NIE"
 belarus_another.39.t: "Nasz wniosek został zaakceptowany przez USAID."
 belarus_another.39.d: "USA zatwierdziły naszą prośbę i teraz jesteśmy częścią programu USAID."
 belarus_another.39.a: "Hurra!"
 belarus_another.40.t: "Kryzys Gospodarczy 2008 roku na Białorusi."
 belarus_another.40.d: "Złożone zjawiska w gospodarce kraju, wskazujące na pogorszenie sytuacji finansowo-gospodarczej kraju. W 2008 roku na Białorusi rozpoczął się kryzys finansowy. Teraz musimy wybrać obszar, w którym będziemy ograniczać wydatki, aby zaoszczędzić budżet."
 belarus_another.40.a: "Obniżenie treści systemu edukacji."
 belarus_another.40.b: "Zmniejszenie kosztów utrzymania systemu opieki zdrowotnej."
 belarus_another.40.c: "Ograniczenie zawartości systemu biurokratycznego."
 belarus_another.41.t: "Operacja „Nowy dzień”"
 belarus_another.41.d: "Rząd białoruski proponuje nam wspólną operację wojskową przeciwko Litwie w celu wyeliminowania problemu z korytarzem suwalskim. Czy zgodzimy się na tak niebezpieczny krok?"
 belarus_another.41.a: "Musimy zabezpieczyć nasze granice."
 belarus_another.41.b: "Nie będziemy ryzykować."
 belarus_another.42.t: "Białoruś chce zdobyć Wilno."
 belarus_another.42.d: "Władze białoruskie wyraziły wolę przekazania Wilna i okolic pod pełną kontrolę. Ich argumentacja opiera się na fakcie, że jest to historyczna ziemia białoruska. Czy się na to zgadzamy?"
 belarus_another.42.a: "Oddamy im Wilno, wzmacniając przyjazne więzi"
 belarus_another.42.b: "Być może zatrzymamy to dla siebie"
 belarus_another.43.t: "Wyniki rewolucji dżinsowej"
 belarus_another.43.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change and it is time to cede power to others?"
 belarus_another.43.a: "Nigdy"
 belarus_another.43.b: "Najwyraźniej nadeszła era zmian."
 belarus_another.44.t: "Masowe protesty pod przywództwem Tichanowskiej."
 belarus_another.44.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change, and it is time to cede power to others?"
 belarus_another.44.a: "Nigdy"
 belarus_another.44.b: "Najwyraźniej nadeszła era zmian."
 belarus_another.45.t: "Wojna domowa na Białorusi"
 belarus_another.45.d: "We could not keep the protesters in check, and now they have brought the country to complete chaos. What will happen next?"
 belarus_another.45.a: "To jest okropne!"
 belarus_another.46.t: "„Wycieczka do Warszawy”"
 belarus_another.46.d: "With the assistance of our border guards, PMC Wagner broke through the border of Poland and entered its territory. What no one expected has begun."
 belarus_another.46.a: "Lato i kusze"
 belarus_another.47.t: "Wielki Marsz na Warszawę"
 belarus_another.47.d: "With the assistance of our border guards, PMC Wagner broke through the border of Poland and entered its territory. What no one expected has begun."
 belarus_another.47.a: "Lato i kusze"
 belarus_another.48.t: "Wojna z Wagnerem"
 belarus_another.48.d: "Our government was shocked by the news that Wagner PMC fighters attacked our country from Belarusian territory, which gives us good reason to declare war on Belarus. Will we go for it?"
 belarus_another.48.a: "Czas skończyć z Białorusią"
 belarus_another.48.b: "Wypowiedzenie wojny nie jest konieczne"
 belarus_another.49.t: "„Wycieczka do Wilna”"
 belarus_another.49.d: "With the assistance of our border guards, PMC Wagner broke through the border of Lithuania and entered its territory. What no one expected has begun."
 belarus_another.49.a: "Lato i kusze"
 belarus_another.52.t: "Rewolucja dżinsowa"
 belarus_another.52.d: "The people of Belarus have come out to protest against the legitimate government and demand its resignation. I hope we have prepared well for this."
 belarus_another.52.a: "Stłumić protesty"
 belarus_another.52.b: "Spróbuj negocjować"
 belarus_another.53.t: "Narodowi bolszewicy przejęli władzę w Rosji"
 belarus_another.53.d: "Our loyal supporters were finally able to seize power in Russia. The Kremlin is ours now. Our leader is ready to lead Russia."
 belarus_another.53.a: "Rosja jest wszystkim. Reszta to nic"
 belarus_another.54.t: "Dołączenie do Rosji"
 belarus_another.54.d: "Finally, Belarus is returning home. We will now be part of a great country, sacrificing our autonomy — but did we truly need it?"
 belarus_another.54.a: "Wreszcie"
 belarus_another.55.t: "Rewolucja dżinsowa"
 belarus_another.55.d: "Protests are gaining momentum in Belarus and the Belarusian government cannot suppress them. Perhaps we should step in and save their government?"
 belarus_another.55.a: "Wyślemy naszych specjalistów"
 belarus_another.55.b: "Nie wtrącajmy się"
 belarus_another.56.t: "Rewolucja dżinsowa"
 belarus_another.56.d: "Rosja wysłała do nas swoich specjalistów i wspólnie udało nam się stłumić protesty!"
 belarus_another.56.a: "Dziękuję Ci Rosjo"
 belarus_another.57.t: "Rewolucja dżinsowa"
 belarus_another.57.d: "Potajemnie prosiliśmy rząd rosyjski o pomoc, a on nam odmówił, co pozostawia nas samych z ruchem rewolucyjnym."
 belarus_another.57.a: "Boże pomóż nam"
 belarus_another.58.t: "Rewolucja dżinsowa"
 belarus_another.58.d: "The protests are gaining momentum. Some administrative buildings have already been seized, riots are breaking out in other cities, and some generals have defected to the rebels. What should we do?"
 belarus_another.58.a: "Będziemy walczyć do końca!"
 belarus_another.58.b: "Pokojowo oddamy władzę"
 belarus_another.59.t: "Białoruś prosi o pożyczkę"
 belarus_another.59.d: "The Belarusian government is asking us to provide them with a loan. We may not be sure of their solvency, but the influence we will gain will definitely pay for itself."
 belarus_another.59.a: "Dajmy im pieniądze"
 belarus_another.59.b: "Odmówimy"
 belarus_another.60.t: "Pożyczka rosyjska"
 belarus_another.60.d: "Rząd rosyjski zgodził się udzielić nam pożyczki."
 belarus_another.60.a: "Dobry."
 belarus_another.61.t: "Pożyczka rosyjska"
 belarus_another.61.d: "Rząd rosyjski odmówił udzielenia nam pożyczki."
 belarus_another.61.a: "Smutny"
 belarus_another.62.t: "Białoruś proponuje utworzenie wspólnego handlarza potasem"
 belarus_another.62.d: "The Belarusian government has proposed creating a joint potassium trading company between our two enterprises, Uralkali and Belaruskali. Together, we will be able to profit more from this resource."
 belarus_another.62.a: "Zgadzamy się"
 belarus_another.62.b: "Nie zgadzamy się"
 belarus_another.63.t: "Wspólny handlarz potasem"
 belarus_another.63.d: "Rząd rosyjski zgodził się na utworzenie wspólnej spółki zajmującej się handlem potasem."
 belarus_another.63.a: "Ładny"
 belarus_another.64.t: "Białoruś zamyka spółkę zajmującą się handlem potasem"
 belarus_another.64.d: "The confrontation between our two potassium trading enterprises has reached its limit and the Belarusian government has decided to break away and create its own trader."
 belarus_another.64.a: "Smutny"
 belarus_another.65.t: "Prounijny zamach stanu"
 belarus_another.65.d: "We attempted to carry out a coup in Belarus using all our administrative and law enforcement resources, as well as our connections."
 belarus_another.65.a: "Spójrzmy na wynik"
 belarus_GDL.1.t: "Białoruś chce rządzić naszym krajem."
 belarus_GDL.1.d: "Pro-Belarusian nationalists have significant influence in our country, so the Belarusian authorities have issued us an ultimatum — allow them into the government or face the consequences. What do we say to that?"
 belarus_GDL.1.a: "Zgadzamy się."
 belarus_GDL.1.b: "Nigdy"
 belarus_GDL.2.t: "Dołącz do Białorusi."
 belarus_GDL.2.d: "Nasz kraj znalazł się pod pełnym wpływem Białorusi. Nie mamy wyboru i jesteśmy gotowi podpisać akt przystąpienia."
 belarus_GDL.2.a: "Taka jest historia."
 belarus_azot.1.t: "Białoruś proponuje umowę handlową nawozy chemiczne."
 belarus_azot.1.d: "Belarus recently reached out and proposed an exclusive contract for the best fertilizers they can offer. Accepting it will surely increase our crop yield, though politically this maneuver may be questionable in some eyes."
 belarus_azot.1.a: "Absolutnie."
 belarus_azot.1.b: "W tej chwili nie jest to możliwe."
 belarus_azot.2.t: "[From.GetName] Akceptuje"
 belarus_azot.2.d: "Our efforts to make a deal with [From.GetName] have finally come to a conclusion. The contract was signed and the first payment is about to be received."
 belarus_azot.2.a: "Wreszcie jakieś dobre wieści."
 belarus_azot.3.t: "[From.GetName] odrzuca naszą ofertę."
 belarus_azot.3.d: "Our efforts to make a deal with [From.GetName] seem to be futile. We have not received an answer, and the matter appears to be going nowhere."
 belarus_azot.3.a: "Niech cię diabli, [From.GetNameDef]!"
 belarus_azot.4.t: "[From.GetName] unieważnia umowę."
 belarus_azot.4.d: "We have received stunning news — [From.GetName] is canceling their fertilizer contract with us. We will not be able to sell them our product, at least for now."
 belarus_azot.4.a: "Głupcy! Nie wiedzą, co tracą!"
 BLR_Azot_category: "GrodnoAzot Handel Nawozami"
 BLR_Azot_category_desc: "Skupienie się na liczbie rynków, do których GrodnoAzot ma dostęp, jest kluczowe dla różnorodności i rozwoju białoruskiej gospodarki. Mnogość różnych nawozów i pestycydów, którymi dysponują, może być przydatna dla wielu narodów. Nawiązanie umów z innymi krajami i rozszerzenie produkcji naszych nawozów przyniesie narodowi i mieszkańcom Białorusi ogromne dochody.\n\nDochód uzyskany z transakcji ustalany jest na podstawie liczby podpisanych kontraktów pomnożonej przez pięć procent.\n§YAktualne kontrakty nawozowe:§! [?current_azot_capacity]/[?current_max_azot_capacity]\n§YPomiar nawozu:§! [?current_max_azot_capacity]/[?max_azot_capacity]"
 BLR_Foreign_azot_trade_category: "Handel nawozami chemicznymi"
 BLR_expand_azot_production: "Rozwiń produkcję nawozów"
 BLR_mission_to_Poland: "Misja handlowa do [POL.GetNamewithFlag]"
 BLR_mission_to_Poland_desc: "Utworzenie misji gospodarczej z Polską to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Germany: "Misja handlowa do [GER.GetNamewithFlag]"
 BLR_mission_to_Germany_desc: "Utworzenie misji handlowej z Niemcami to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_France: "Misja handlowa do [FRA.GetNamewithFlag]"
 BLR_mission_to_France_desc: "Utworzenie misji handlowej z Francją to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Norway: "Misja handlowa do [NOR.GetNamewithFlag]"
 BLR_mission_to_Norway_desc: "Utworzenie misji handlowej z Norwegią to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Sweden: "Misja handlowa do [SWE.GetNamewithFlag]"
 BLR_mission_to_Sweden_desc: "Utworzenie misji handlowej ze Szwecją to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Russia: "Misja handlowa do [SOV.GetNamewithFlag]"
 BLR_mission_to_Russia_desc: "Utworzenie misji handlowej z Rosją to rozsądna decyzja biznesowa, służąca dobru naszego narodu."
 BLR_mission_to_Ukraine: "Misja handlowa do [UKR.GetNamewithFlag]"
 BLR_mission_to_Ukraine_desc: "Utworzenie misji handlowej z Ukrainą to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Kazahstan: "Misja handlowa do [KAZ.GetNamewithFlag]"
 BLR_mission_to_Kazahstan_desc: "Utworzenie misji handlowej z Kazachstanem to słuszna decyzja biznesowa, służąca dobru naszego narodu."
 BLR_mission_to_Czechia: "Misja handlowa do [CZE.GetNamewithFlag]"
 BLR_mission_to_Czechia_desc: "Utworzenie misji handlowej z Czechami to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Netherland: "Misja handlowa do [HOL.GetNamewithFlag]"
 BLR_mission_to_Netherland_desc: "Utworzenie misji handlowej z Holandią to rozsądna decyzja biznesowa dla dobra naszego narodu."
 BLR_mission_to_Zimbabwe: "Misja handlowa do [ZIM.GetNamewithFlag]"
 BLR_mission_to_Zimbabwe_desc: "Utworzenie misji handlowej z Zimbabwe to rozsądna decyzja biznesowa mająca na celu dobro naszego narodu."
 cancel_BLR_trade: "Anuluj umowy handlowe dotyczące nawozów."
