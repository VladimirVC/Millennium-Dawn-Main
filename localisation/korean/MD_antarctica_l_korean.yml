 ANTARCTICA_STATION_TOGGLE_ILLEGAL_ACTIVITIES_TEXT: "불법 활동 전환 ([MD_antarctica_illegal_activities_enabled])"
 ANTARCTICA_STATION_TOGGLE_ILLEGAL_ACTIVITIES_TEXT_DELAYED: "§Y필요 조건:§!\n[!antarctica_station_toggle_illegal_activities_button_click_enabled]\n§Y효과:§!\n선택된 기지의 불법 실험실 활동을 켜거나 끕니다.\n\n불법 실험실 보너스는 이 옵션이 활성화된 동안에만 적용됩니다.\n\n§R경고: 다른 국가가 옵서버를 파견할 경우 적발될 수 있으며, 외교적 결과가 초래될 수 있습니다.§!"
