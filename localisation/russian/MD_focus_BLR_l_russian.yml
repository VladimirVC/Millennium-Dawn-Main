 BLR_old_railways2: "Устаревшая железнодорожная инфраструктура"
 BLR_cheln_trade: "Челночная торговля"
 BLR_cheln_trade_desc: "Крупнейшие компании еще не пришли в Беларусь, поэтому появились \"челноки\", которые привозят необходимую высококачественную бытовую технику и ряд других подержанных товаров и предметов роскоши с высокой наценкой"
