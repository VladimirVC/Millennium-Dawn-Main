l_simp_chinese:
 east_timor.1.t: "2006年危机"
 east_timor.1.d: "东帝汶军队已出现区域分裂。西部地区近600名士兵被解职，引发派系冲突，并蔓延至首都帝力。政府正逐渐失去对安全局势的控制。"
 east_timor.1.a: "请求国际维和援助"
 east_timor.1.b: "我们将自行恢复秩序。"
 east_timor.2.t: "东帝汶请求派遣维和部队。"
 east_timor.2.d: "东帝汶已陷入派系冲突，并请求澳大利亚提供军事援助以恢复秩序。作为该地区最大的国家，我们的回应将为国际干预定下基调。"
 east_timor.2.a: "部署国际稳定部队"
 east_timor.2.b: "我们目前无法介入"
 east_timor.3.t: "东帝汶呼吁援助"
 east_timor.3.d: "我们的前殖民地东帝汶正请求军事援助，因为该国正陷入混乱。葡萄牙对东帝汶人民负有历史义务，并与其有着深厚的联系。"
 east_timor.3.a: "派遣维和部队"
 east_timor.3.b: "拒绝请求"
 east_timor.4.t: "东帝汶请求援助"
 east_timor.4.d: "东帝汶已请求新西兰协助恢复秩序。这个小国正饱受暴力冲突和日益崩溃的安全体系的困扰。"
 east_timor.4.a: "派遣维和部队"
 east_timor.4.b: "拒绝"
 east_timor.5.t: "东帝汶危机"
 east_timor.5.d: "东帝汶已请求马来西亚维和部队协助稳定该国局势。作为东南亚国家，马来西亚的参与将展现区域团结。"
 east_timor.5.a: "向帝力部署军队"
 east_timor.5.b: "拒绝请求"
 east_timor.6.t: "澳大利亚军队抵达"
 east_timor.6.d: "澳大利亚维和部队已抵达帝力，正在首都恢复秩序。国际稳定部队是维和行动的主力。"
 east_timor.6.a: "感激不尽"
 east_timor.7.t: "葡萄牙军队抵达"
 east_timor.7.d: "葡萄牙军队已部署到东帝汶，履行了对前殖民地的历史义务。"
 east_timor.7.a: "欢迎，朋友们"
 east_timor.8.t: "新西兰维和军队抵达"
 east_timor.8.d: "新西兰已派遣维和部队协助稳定东帝汶局势。"
 east_timor.8.a: "感谢他们的帮助"
 east_timor.9.t: "马来西亚军队抵达"
 east_timor.9.d: "马来西亚军队已抵达东帝汶，协助当地维和行动。"
 east_timor.9.a: "我们感谢马来西亚"
 east_timor.10.t: "追捕阿尔弗雷多·雷纳多"
 east_timor.10.d: "叛军领导人阿尔弗雷多·雷纳多躲过了当局的追捕，藏身于帝力以南的山区。他的持续自由削弱了政府的权威，并鼓舞了其他持不同政见的派别。"
 east_timor.10.a: "请求澳大利亚派遣特种部队"
 east_timor.10.b: "用我们自己的力量追捕他"
 east_timor.11.t: "东帝汶请求特种空勤团援助"
 east_timor.11.d: "东帝汶已请求澳大利亚部署特种空勤团部队抓捕在逃叛军领导人阿尔弗雷多·雷纳多，他仍在躲避维和部队的追捕。"
 east_timor.11.a: "派遣特种空勤团"
 east_timor.11.b: "这超出了我们的职责范围。"
 east_timor.12.t: "雷纳多逃脱"
 east_timor.12.d: "尽管澳大利亚特种部队展开了行动，阿尔弗雷多·雷纳多还是逃入了山区。行动未能将其抓获，但国际社会更广泛的介入稳定了帝力的安全局势。"
 east_timor.12.a: "他最终会被抓捕的。"
 east_timor_news.1.t: "国际部队部署至东帝汶"
 east_timor_news.1.desc: "应东帝汶政府的正式请求，由澳大利亚领导的国际维和部队已开始向首都帝力部署。派系冲突已造成数百人死亡或流离失所。澳大利亚、葡萄牙、新西兰和马来西亚均向国际稳定部队派遣了部队。"
 east_timor_news.1.a: "我们指望全世界的帮助。"
 east_timor_news.1.b: "我们将恢复帝力的秩序。"
 east_timor_news.1.c: "地区稳定符合我们的利益。"
 east_timor_news.1.d: "一个陷入危机的小国"