 UNSC.200.t: "Intento de Influir en [?sway_target.GetName]"
 UNSC.200.d: "Para obtener el resultado que deseamos en esta Resolución de las §BNaciones Unidas§! §YSoporte de Seguridad§!, necesitamos que más personas voten con nosotros o se abstengan. Para que cambien su voto, debemos ofrecerles algo que valga su lealtad a cambio. Tenemos varias ofertas, pero debemos elegir una ahora y esperar que la acepten."
