 european_council_header_tt: "Юридические акты §C[EUU.GetFlag][EUU.GetName]§!\n--------------\nТекущие принятые юридические акты §C[EUU.GetFlag][EUU.GetName]§!.\n\nСовет Европейского Союза работает по системе квалифицированного большинства (QMV), также известной как двойное большинство. Для принятия решения требуется 55% §Cгосударств-членов§! и 65% §Cнаселения ЕС§!."
