 mercosur.18.d: "Formal negotiations have opened with [PRU.GetName] over full membership in MERCOSUR. This is no symbolic gesture; if the talks succeed, the bloc will gain another government willing to anchor its future inside a shared South American framework."
 mercosur.18.a: "Proceed."
