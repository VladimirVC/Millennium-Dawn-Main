 ITA.democratic_senate: "£ITA_roman_senate テクノクラート元老院"
 ITA.democratic_senate_desc: "寡頭制や特権の時代は終わった。現代では、裕福ではない人々の声にも耳を傾ける必要がある。しかし、旧来の代表民主主義の失敗を無視することはできない。人々は政党に投票するが、その役割は単にどの技術官僚が政府を構成するかを選ぶことに限られるだろう。"
 ITA.Western_Autocracy: "£generic_Western_Autocracy_small テクノクラート"
 ITA.Western_Autocracy_desc: "テクノクラート政府は、国が政治家では対処できない前例のない危機に直面する大きな政治的混乱の時期に設立される。"
