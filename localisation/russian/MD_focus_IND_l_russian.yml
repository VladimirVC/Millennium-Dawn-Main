 indonesia.57.t: "Катастрофа на Сулавеси!"
 indonesia.57.d: "Наши неудачи в создании надлежащей инфраструктуры на Сулавеси привели к обрушению нескольких зданий и гибели многих наших людей."
 indonesia.57.a: "Это можно было предотвратить!"
 indonesia.58.t: "Катастрофа в Западном Папуа!"
 indonesia.58.d: "Наша неспособность обеспечить надлежащее управление Западным Папуа привела к инциденту, в результате которого один из наших военных заводов рухнул."
 indonesia.58.a: "Это можно было предотвратить!"
 indonesia.59.t: "Катастрофа в Папуа!"
 indonesia.59.d: "Наша неспособность обеспечить инфраструктуру Западного Папуа привела к промышленной аварии, в результате которой были повреждены несколько военных производственных объектов"
 indonesia.59.a: "Это можно было предотвратить!"
 indonesia.61.t: "Катастрофа в Восточной Яве!"
 indonesia.61.d: "Наша неспособность обеспечить население Восточной Явы привела к корпоративному инциденту, в результате которого одно офисное здание было закрыто!"
 indonesia.61.a: "Это можно было предотвратить!"
 indonesia.62.t: "Катастрофа в нашей столице!!!"
 indonesia.62.d: "Наша неспособность обеспечить население Западной Явы, где также находится наша столица, привела к инциденту, когда рухнула промышленная фабрика"
 indonesia.62.a: "Это можно было предотвратить!"
 indonesia.63.t: "Катастрофа в небе!"
 indonesia.63.d: "Неспособность обеспечить самолет надлежащим авиационным оборудованием привела к техническим сбоям на одном из наших рейсов, в результате чего погибло много людей!"
 indonesia.63.a: "Это можно было предотвратить!"
 indonesia.64.t: "Катастрофа в нашей столице!!!"
 indonesia.64.d: "Наша неспособность обеспечить население Западной Явы, где также находится наша столица, привела к тому, что несколько промышленных заводов рухнули"
 indonesia.64.a: "Это можно было предотвратить!"
 indonesia.988.t: "Подготовка к строительству новой столицы"
 indonesia.988.d: "Благодаря всем советам и помощи, которые мы получили от Японии, мы пришли к выводу начать подготовку к переносу нашей столицы из Джакарты. Новая столица будет расположена на Восточном Борнео, и строительство должно начаться немедленно!"
 indonesia.988.a: "Вперед мы идем"
 indonesia.888.t: "Новый шелковый путь"
 indonesia.888.d: "Только что завершилась недавняя встреча с китайцами. Они высоко оценили наше партнерство и способность поднять индонезийскую промышленность с нуля до чего-то за такое короткое время. Хотя нам еще многое предстоит сделать, китайские председатели высоко оценили нашу страну и назвали нас \"Шелковый путь 21-го века\""
 indonesia.888.a: "Очень лестно"
