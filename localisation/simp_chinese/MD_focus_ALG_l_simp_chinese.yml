 ALG_civil_reforms_1: "Civil Rights Protections"
 ALG_civil_reforms_1_desc: "Algeria has established basic civil rights protections. Citizens enjoy greater freedoms and the foundation for further reforms is in place."
 ALG_civil_reforms_2: "Civil Rights & Gender Equality"
 ALG_civil_reforms_2_desc: "Building on civil rights reforms, Algeria has advanced gender equality. Women are entering the workforce in greater numbers, boosting productivity and growth."
 ALG_civil_reforms_3a: "Civil Reforms: Free Press"
 ALG_civil_reforms_3a_desc: "Algeria's reform program now includes press freedom. Independent media holds the government accountable while civil rights and gender equality continue to transform society."
 ALG_civil_reforms_3b: "Civil Reforms: Judicial Independence"
 ALG_civil_reforms_3b_desc: "Algeria's reform program now includes an independent judiciary. Fair courts fight corruption while civil rights and gender equality continue to transform society."
 ALG_civil_reforms_4: "Full Civil Society Reforms"
 ALG_civil_reforms_4_desc: "Algeria has completed comprehensive civil society reforms. Civil rights, gender equality, press freedom, judicial independence, and empowered civil society organizations have transformed Algeria into a modern democracy."
 ALG_gov_reforms_1: "Digital Government Initiative"
 ALG_gov_reforms_1_desc: "Algeria has begun digitizing government services. Online platforms improve public service delivery and reduce bureaucratic inefficiency."
 ALG_gov_reforms_2: "Public Service Reforms"
 ALG_gov_reforms_2_desc: "Building on digital foundations, Algeria has reformed public services. Citizens enjoy faster, more efficient government services."
 ALG_gov_reforms_3a: "Anti-Corruption Reforms"
 ALG_gov_reforms_3a_desc: "Algeria's anti-corruption campaign has cleaned up government institutions. Transparency and accountability have been restored."
 ALG_gov_reforms_3b: "E-Governance System"
 ALG_gov_reforms_3b_desc: "Algeria's e-governance portal provides citizens with seamless access to government services online. Bureaucratic efficiency has improved dramatically."
 ALG_gov_reforms_4: "Modern Administrative State"
 ALG_gov_reforms_4_desc: "Algeria has achieved a fully modernized, efficient, and transparent government. Digital services, anti-corruption measures, and streamlined bureaucracy define the new administration."
 ALG_african_union_engagement_full_tt: "§GEngage with the African Union:§!\n\n§YEffects on all AU member states:§!\n• §G+25§! Opinion of Algeria\n• §G+2%§! Algerian Influence\n\nAlgeria strengthens its position as a leading voice in African affairs."
 ALG_mend_ties_with_rabat: "Mend Ties with Rabat"
 ALG_mend_ties_with_rabat_desc: "The Algerian-Moroccan border has been closed since 1994. The Western Sahara conflict, the Sand War of 1963, and Cold War alignments created deep wounds between our nations.\n\nYet we share the same Amazigh and Arab heritage, the same struggle against colonialism, and the same hopes for our people. Perhaps it is time to leave the past behind and build a new relationship with the Kingdom of Morocco."
 ALG_our_east_brothers: "Our Eastern Brothers"
 ALG_our_east_brothers_desc: "Algeria and Tunisia fought side by side against French colonialism. Tunisian soil sheltered Algerian refugees and FLN fighters during our war of independence.\n\nThis brotherhood must be strengthened. Together, Algeria and Tunisia can form the core of a united Maghreb and lead North Africa into a prosperous future."
 ALG_black_spring: "The Black Spring"
 ALG_black_spring_desc: "On April 18, 2001, Massinissa Guermah, a young Kabyle student, was shot dead inside a gendarmerie brigade in Beni Douala. His death sparked the largest protests in Kabylie since independence, with over 100 killed by security forces. The Black Spring has begun."
 ALG_black_spring_tt: "§HThe Black Spring Erupts§!\nMassinissa Guermah's death sparks massive protests across Kabylie. Over 100 protesters killed by gendarmerie.\n\n§YKabyle Demands:§!\n- Justice for the dead\n- Withdrawal of gendarmerie\n- Recognition of Tamazight\n- End to 'hogra' (contempt)"
 ALG_negotiate_with_arrouch: "Negotiate with the Arrouch"
 ALG_negotiate_with_arrouch_desc: "The Arrouch (village councils) have organized into a coordinated movement representing Kabyle demands. Rather than confrontation, we will engage in dialogue with these traditional structures."
 ALG_negotiate_arrouch_tt: "§HThe Arrouch Movement§!\nThe traditional Kabyle village assemblies have united to present demands. Negotiation may bring peace.\n\n§YKey Arrouch Demands:§!\n- El-Kseur Platform recognition\n- Tamazight language rights\n- Economic development\n- End to military presence"
 ALG_recognize_tamazight_2002: "Tamazight: National Language"
 ALG_recognize_tamazight_2002_desc: "On April 8, 2002, following intense negotiations, Tamazight will be recognized as a national language of Algeria - a historic concession to Berber identity."
 ALG_tamazight_national_tt: "§HTamazight Becomes National Language§!\nA historic moment - Tamazight joins Arabic as a national language of Algeria.\n\n§YSignificance:§!\n- First recognition of Berber identity\n- Constitutional amendment\n- Schools may teach Tamazight\n- §GMajor Kabyle victory§!"
 ALG_address_hogra: "Address the Hogra"
 ALG_address_hogra_desc: "Hogra - the contempt and humiliation felt by Kabyles from the state - must be addressed. Investment, jobs, and respect will replace neglect and abuse."
 ALG_address_hogra_tt: "§HEnd the Hogra§!\n'Hogra' - the systematic contempt shown to Kabyles - will be addressed through:\n\n- Infrastructure investment in Kabylie\n- Job creation programs\n- End to discriminatory practices\n- Respect for Kabyle dignity"
 ALG_amazigh_cultural_revival: "Amazigh Cultural Revival"
 ALG_amazigh_cultural_revival_desc: "Investment in Berber cultural institutions, museums, and educational programs will preserve and celebrate the Amazigh heritage that predates Arab arrival."
 ALG_amazigh_revival_tt: "§HAmazigh Cultural Renaissance§!\n- Amazigh Academy established\n- Berber museums funded\n- Cultural festivals supported\n- Tifinagh script promoted"
 ALG_yennayer_national_holiday: "Yennayer National Holiday"
 ALG_yennayer_national_holiday_desc: "In December 2017, President Bouteflika declared Yennayer - the Amazigh New Year - a national holiday. January 12 will now be celebrated across Algeria."
 ALG_yennayer_tt: "§HYennayer Becomes National Holiday§!\nThe Berber New Year (January 12) is now an official Algerian holiday.\n\n§YHistoric Recognition:§!\n- Pre-Islamic heritage celebrated\n- National unity strengthened\n- §GKabyle satisfaction increased§!"
 ALG_tamazight_official_2016: "Tamazight: Official Language"
 ALG_tamazight_official_2016_desc: "The 2016 constitutional amendment elevates Tamazight from 'national' to 'official' language status, placing it on equal footing with Arabic."
 ALG_tamazight_official_tt: "§HTamazight Becomes Official Language§!\n§W2016 Constitutional Amendment:§!\n- Tamazight equal to Arabic\n- All government documents bilingual\n- Berber language in all schools\n- §GMajor constitutional victory§!"
 ALG_berber_integration_complete: "United in Diversity"
 ALG_berber_integration_complete_desc: "Through dialogue, recognition, and investment, Algeria has resolved the Kabyle question. Arab and Amazigh Algerians stand united."
 ALG_integration_complete_tt: "§HKabyle Question Resolved§!\nAlgeria has successfully integrated its Berber population through:\n- Language recognition\n- Cultural investment\n- Economic development\n- Respect and dialogue\n\n§GNational unity achieved!§!"
 ALG_crush_the_uprising: "Crush the Uprising"
 ALG_crush_the_uprising_desc: "The Black Spring threatens national unity. The gendarmerie will restore order, and separatist elements will be neutralized."
 ALG_crush_uprising_tt: "§HSuppression Path§!\nUse force to end the protests and maintain Algeria's territorial integrity.\n\n§YBenefits:§!\n- Keep all territory\n- No concessions to separatists\n- Military control\n\n§RCosts:§!\n- International criticism\n- Deep Kabyle resentment\n- Ongoing resistance"
 ALG_gendarmerie_reinforcement: "Gendarmerie Reinforcement"
 ALG_gendarmerie_reinforcement_desc: "Additional gendarmerie units will be deployed to Kabylie to maintain order and prevent future unrest."
 ALG_gendarmerie_tt: "§HDeploy Security Forces§!\n- Gendarmerie presence increased\n- Protests monitored\n- Key activists detained\n- Order maintained by force"
 ALG_arabization_policy: "Arabization Policy"
 ALG_arabization_policy_desc: "Arabic is the language of Algeria. Intensify Arabization programs in Kabylie to counter separatist Berberist ideology."
 ALG_arabization_1_tt: "§HIntensify Arabization§!\n- Arabic-only education enforced\n- Tamazight suppressed\n- Islamic identity promoted\n- Berberist ideology countered\n\n§RKabyles will be deeply resentful§!"
 ALG_ban_mak: "Ban the MAK"
 ALG_ban_mak_desc: "In May 2021, the Mouvement pour l'Autodétermination de la Kabylie (MAK) led by Ferhat Mehenni will be designated a terrorist organization and banned."
 ALG_ban_mak_tt: "§HMAK Designated Terrorist Organization§!\nThe Movement for the Self-Determination of Kabylie is banned:\n- Ferhat Mehenni labeled terrorist\n- MAK supporters arrested\n- Separatist activity criminalized\n\n§RInternational criticism expected§!"
 ALG_accuse_foreign_interference: "Accuse Foreign Hands"
 ALG_accuse_foreign_interference_desc: "The MAK separatist movement is not organic - it is funded and supported by foreign powers seeking to destabilize Algeria. Morocco and others must be exposed."
 ALG_foreign_interference_tt: "§HBlame Foreign Powers§!\nThe MAK is accused of being a foreign proxy:\n- Morocco accused of funding MAK\n- External plots against Algeria\n- National unity against enemies\n\n§RDiplomatic tensions will increase§!"
 ALG_mak_israel_connection: "MAK-Israel Connection"
 ALG_mak_israel_connection_desc: "Ferhat Mehenni's meeting with Israeli officials proves the MAK is a Zionist project to divide the Arab world. The connection must be exposed."
 ALG_mak_israel_tt: "§HMAK-Israel Link Exposed§!\n- MAK labeled Zionist project\n- Israel accused of destabilization\n- Arab League support gained\n- Anti-Israel sentiment mobilized\n\n§YDomestic support §Gincreases§!§!\n§RRelations with Israel will be destroyed§!"
 ALG_kabylie_pacified: "Kabylie Pacified"
 ALG_kabylie_pacified_desc: "Through security operations and political suppression, Kabylie has been brought under control. The separatist threat is contained."
 ALG_kabylie_pacified_tt: "§HKabylie Under Control§!\n- MAK crushed\n- Separatism criminalized\n- Security forces in control\n- National unity enforced\n\n§YBut resentment simmers.§!"
 ALG_el_kseur_platform: "Accept the El-Kseur Platform"
 ALG_el_kseur_platform_desc: "The El-Kseur Platform, drafted by the Arrouch on June 11, 2001, contains 15 demands for justice and rights. We will accept it as the basis for negotiation."
 ALG_el_kseur_tt: "§HAccept El-Kseur Platform§!\nThe 15 demands include:\n- Justice for Black Spring victims\n- Withdrawal of gendarmerie\n- Tamazight official status\n- End to hogra\n- Economic development\n- Democratic reforms\n\n§RRadical concessions required§!"
 ALG_withdraw_gendarmerie: "Withdraw the Gendarmerie"
 ALG_withdraw_gendarmerie_desc: "A key El-Kseur demand - the hated gendarmerie will be withdrawn from Kabylie and replaced with local police."
 ALG_withdraw_gendarmerie_tt: "§HGendarmerie Withdrawal§!\n- Paramilitary forces leave Kabylie\n- Local police take over\n- Military presence reduced\n- Major Kabyle demand met\n\n§RMilitary will be unhappy§!"
 ALG_trial_responsible_officers: "Trial of Responsible Officers"
 ALG_trial_responsible_officers_desc: "Officers responsible for the deaths during the Black Spring will face justice. This unprecedented step acknowledges state crimes against Kabyles."
 ALG_trial_officers_tt: "§HProsecute Responsible Officers§!\n- Officers face trial for killings\n- Victims' families compensated\n- State acknowledges crimes\n- Historic accountability\n\n§RMilitary will be furious§!\n§GInternational approval increases§!"
 ALG_secular_berber_identity: "Secular Berber Identity"
 ALG_secular_berber_identity_desc: "Kabylie has historically been more secular than the rest of Algeria. Recognizing secular Berber identity challenges the Arab-Islamic definition of Algerian nationhood."
 ALG_secular_berber_tt: "§HRecognize Secular Amazigh Identity§!\n- Pre-Islamic heritage celebrated\n- Secular values protected\n- Religious freedom guaranteed\n- Challenges Islamist narrative\n\n§RIslamists will oppose this§!"
 ALG_mak_dialogue: "Dialogue with the MAK"
 ALG_mak_dialogue_desc: "Opening dialogue with Ferhat Mehenni's MAK separatist movement. This risks legitimizing separatism but may be the only path to peace."
 ALG_mak_dialogue_tt: "§HOpen Dialogue with MAK§!\nNegotiate with separatists:\n- Ferhat Mehenni engaged\n- Self-determination discussed\n- Autonomy explored\n- Independence on table\n\n§RExtremely controversial§!\n§RRisk of legitimizing separatism§!"
 ALG_reject_separatism: "Reject Separatism"
 ALG_reject_separatism_desc: "While respecting Berber rights, Algeria's territorial integrity is non-negotiable. Unity in diversity - not division - is the answer."
 ALG_reject_separatism_tt: "§HUnity in Diversity§!\n- Separatism rejected\n- Berber rights guaranteed\n- Territorial integrity maintained\n- Diverse but united Algeria"
 ALG_kabyle_autonomy_statute: "Kabyle Autonomy Statute"
 ALG_kabyle_autonomy_statute_desc: "A formal autonomy statute for Kabylie - self-governance in local affairs while remaining part of Algeria. A historic compromise."
 ALG_autonomy_statute_tt: "§HKabylie Gains Autonomy§!\n- Regional parliament established\n- Tamazight recognized as official\n- Local taxation powers\n- Cultural autonomy granted\n\n§YKabylie remains part of Algeria§!"
 ALG_federal_algeria: "Federal Algeria"
 ALG_federal_algeria_desc: "Algeria transforms into a federal republic, with Kabylie as the first autonomous region. Other regions may follow this model."
 ALG_federal_algeria_tt: "§HAlgeria Becomes Federal§!\n- Federal constitution adopted\n- Regional autonomy granted\n- Kabylie as model\n- Power decentralized\n- Unity through federalism"
 ALG_united_secular_algeria: "United Secular Algeria"
 ALG_united_secular_algeria_desc: "A united, secular Algeria that respects all identities - Arab and Amazigh, Muslim and secular. Diversity is our strength."
 ALG_united_secular_tt: "§HUnited Secular Algeria§!\n- Secular state established\n- All identities respected\n- No separatism\n- No Islamism\n- Modern democracy"
 ALG_kabyle_satisfaction_minus_5_tt: "§RKabyle Satisfaction:§! -5"
 ALG_kabyle_satisfaction_minus_10_tt: "§RKabyle Satisfaction:§! -10"
