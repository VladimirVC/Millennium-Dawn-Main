 ANT_CATERPILLAR_3512B_EFFECT: "Дизельный двигатель §YCaterpillar 3512B§! становится доступен для установки на §YАнтарктической станции§!."
 ANT_PREMIUM_LIVING_QUARTERS_EFFECT: "§YУлучшенный жилищный модуль§! становится доступен для установки на §YАнтарктической станции§!."
 MD_antarctica_news.1.t: "[FROM.GetName] подает заявку на присоединение к Договору об Антарктике"
 MD_antarctica_news.1.d: "[FROM.GetName] подает заявку на присоединение к Договорy об Антарктике, что знаменует собой возможный сдвиг в ее внешней политике и приверженность делу охраны окружающей среды. Договор об Антарктике - это международное соглашение, которое регулирует использование Антарктиды в мирных целях и для научных исследований, а также защищает уникальную экосистему континента. Заявка [FROM.GetName] на присоединение к договору была тепло встречена международным сообществом: одни называют этот шаг позитивным продвижением на пути к глобальному сотрудничеству, в то время как другие выражают скептицизм относительно намерений [FROM.GetName] и ее верности принципам договора. Процесс рассмотрения заявки займет один месяц."
 MD_antarctica_news.1.a: "Время покажет"
 MD_antarctica_news.1.b: "Пора"
 MD_antarctica_news.2.t: "[FROM.GetName] присоединяется к Договору об Антарктике"
 MD_antarctica_news.2.d: "Сегодня, [GetDateText], [FROM.GetName] официально присоединилась к Договору об Антарктике, став участницей международного соглашения, регулирующего использование Антарктики в мирных целях и для научных исследований. Присоединившись к договору, [FROM.GetName] взяла на себя обязательство соблюдать принципы охраны окружающей среды и международного сотрудничества в Антарктике. Этот шаг был положительно воспринят мировым сообществом: многие высоко оценили приверженность [FROM.GetName] делу защиты уникальной экосистемы Антарктики и содействия мирному сотрудничеству между странами."
 MD_antarctica_news.2.a: "Еще один участник"
 MD_antarctica_news.2.b: "Приступим к работе!"
 MD_antarctica_news.3.t: "[FROM.GetName] стремится выйти из Договора об Антарктике"
 MD_antarctica_news.3.d: "[FROM.GetName] сегодня приняла решение выйти из Договора об Антарктике. Комиссия по сохранению морских живых ресурсов Антарктики (ККНМР) предоставила ей два года на демонтаж всех имеющихся научно-исследовательских станций в Антарктике и на прекращение любой запрещенной деятельности, такой как добыча ресурсов или военное присутствие. Решение о выходе из договора вызвало неоднозначную реакцию со стороны международного сообщества: одни выразили разочарование и обеспокоенность возможными последствиями для окружающей среды и глобального сотрудничества, в то время как другие поддерживают право [FROM.GetName] самостоятельно принимать решения относительно своего участия в международных соглашениях. Процесс выхода из договора займет два года."
 MD_antarctica_news.3.a: "Какая жалость"
 MD_antarctica_news.3.b: "У нас есть дела поважнее"
 MD_antarctica_news.4.t: "[FROM.GetName] выходит из Договора об Антарктике"
 MD_antarctica_news.4.d: "[MD_antarctica_news_4_desc]"
 MD_antarctica_news.4.a: "Договор утратил свою силу"
 MD_antarctica_news.4.b: "Как бы то ни было"
 MD_antarctica_news_4_desc_1: "Спустя 2 года после выхода из Договора об Антарктике [FROM.GetName] официально вышла из международного соглашения, регулирующего использование Антарктики в мирных целях и для научных исследований. Несмотря на предупреждения, [FROM.GetName] вышла из договора, имея при этом исследовательскую станцию в Антарктиде, что вызвало глобальную реакцию со стороны участников договора, включая возможные санкции и дипломатические ответные меры."
 MD_antarctica_news_4_desc_2: "Спустя 2 года после выхода из Договора об Антарктике [FROM.GetName] официально вышла из международного соглашения, регулирующего использование Антарктики в мирных целях и для научных исследований. [FROM.GetName] успешно демонтировала все исследовательские станции в Антарктиде и воздержалась от любой запрещённой деятельности, такой как добыча ресурсов или военное присутствие, что помогло смягчить потенциальные последствия для окружающей среды и глобального сотрудничества."
 MD_antarctica_news.5.t: "На [FROM.GetAdjective] антарктической станции обнаружены разомкнутые инженерные системы"
 MD_antarctica_news.5.d: "В ходе недавней наблюдательной миссии инспекторы Договора обнаружили использование инженерных систем с открытым контуром на одной из антарктических исследовательских станций, которой управляет [FROM.GetAdjective]. Это является нарушением Договора об Антарктике, запрещающего любую деятельность, способную нанести вред окружающей среде или нарушить экосистему Антарктиды. Обнаружение систем с открытым контуром вызвало серьезную озабоченность среди участников Договора и может привести к дипломатическим последствиям."
 MD_antarctica_news.5.a: "Некоторым людям приходится экономить"
 MD_antarctica_news.5.b: "Ну что ж"
 MD_antarctica_news.6.t: "Обнаружена незаконная лабораторная деятельность на станции: [FROM.GetAdjective]"
 MD_antarctica_news.6.d: "В ходе недавней инспекционной миссии наблюдатели Договора обнаружили незаконную лабораторную деятельность на одной из антарктических исследовательских станций: [FROM.GetAdjective]. Подобное поведение неприемлемо и является явным нарушением Договора об Антарктике. Консультативные стороны Договора рассмотрят этот инцидент и примут соответствующие меры для обеспечения защиты уникальной экосистемы Антарктиды и сохранения целостности самого соглашения."
 MD_antarctica_news.6.a: "Это неприемлемо"
 MD_antarctica_news.6.b: "Мы должны что-то с этим сделать"
 MD_antarctica_news.7.t: "Обнаружены исследования ядерного оружия на станции: [FROM.GetAdjective]"
 MD_antarctica_news.7.d: "В ходе недавней инспекционной миссии наблюдатели Договора обнаружили исследования в области ядерного оружия на одной из антарктических исследовательских станций: [FROM.GetAdjective]. Это является грубейшим нарушением Договора об Антарктике, который строго запрещает любую военную деятельность, а также любые действия, способные нанести вред окружающей среде или нарушить экосистему континента. Использование мирной исследовательской станции для разработки и испытания ядерного оружия — вопиющий акт, угрожающий безопасности всего мира. Консультативные стороны Договора незамедлительно примут самые решительные меры для урегулирования этого кризиса и привлечения виновных к ответственности. Международное сообщество должно сплотиться, чтобы осудить эти действия и гарантировать, что Антарктида останется мирной и защищенной зоной для научных исследований и сотрудничества."
 MD_antarctica_news.7.a: "Это возмутительно!"
 MD_antarctica_news.7.b: "Это имело большее значение"
 MD_antarctica_news.8.t: "[FROM.GetName] слишком часто нарушает Договор об Антарктике"
 MD_antarctica_news.8.d: "После многочисленных нарушений Договора об Антарктике со стороны [FROM.GetName] была достигнута критическая точка: Консультативные стороны приняли решение исключить это государство из соглашения и ввести против него жесткие дипломатические санкции. Неоднократные нарушения принципов и правил подорвали авторитет договора и поставили под угрозу защиту уникальной экосистемы Антарктиды. Консультативные стороны Договора предпримут решительные действия, чтобы привлечь [FROM.GetName] к ответственности за свои поступки и гарантировать, что Договор об Антарктике останется сильной и эффективной основой для международного сотрудничества и охраны окружающей среды."
 MD_antarctica_news.8.a: "Они сами в этом виноваты"
 MD_antarctica_news.8.b: "Это уже слишком"
 MD_antarctica_news.9.t: "Сильные ветры в Антарктиде"
 MD_antarctica_news.9.d: "По всей Антарктиде зафиксированы сильные ветры, затронувшие работу исследовательских станций. Консультативные стороны Договора следят за развитием ситуации и оказывают необходимую поддержку для обеспечения безопасности персонала и сохранности проводимых исследований. Инспекционные миссии временно приостановлены до улучшения погодных условий."
 MD_antarctica_news.9.a: "Нехорошо"
 MD_antarctica_news.10.t: "[FROM.GetName] начинает строительство антарктической исследовательской станции"
 MD_antarctica_news.10.d: "[FROM.GetName] начинает строительство новой антарктической исследовательской станции, что подтверждает приверженность государства научным исследованиям и защите окружающей среды в регионе. Ожидается, что возведение объекта займет несколько месяцев. Консультативные стороны Договора будут внимательно следить за ходом работ, чтобы убедиться в их полном соответствии принципам и правилам Договора об Антарктике."
 MD_antarctica_news.10.a: "Великолепно!"
 MD_antarctica.1.t: "Приближается инспекционная миссия"
 MD_antarctica.1.d: "Со стороны [FROM.GetName] направлены наблюдатели Договора для инспекции одной из наших антарктических исследовательских станций. Прибытие миссии ожидается через §Y7 дней§!."
 MD_antarctica.1.a: "Мы будем ждать их прибытия"
 MD_antarctica.3.t: "Отчет инспекционной миссии: обнаружены системы с открытым контуром"
 MD_antarctica.3.d: "Наблюдатели Договора завершили инспекцию нашей антарктической исследовательской станции и сообщили об обнаружении систем с открытым контуром. Это является нарушением Договора об Антарктике и может привести к дипломатическим последствиям. Консультативные стороны Договора потребовали принять меры по замене данных инженерных систем на более экологически безопасные альтернативы."
 MD_antarctica.3.a: "Мы должны от этого избавиться."
 MD_antarctica.4.t: "Отчет наблюдателя о миссии: Выявлена ​​незаконная лабораторная деятельность."
 MD_antarctica.4.d: "Наблюдатели от Договора завершили инспекцию нашей антарктической исследовательской станции и сообщили об обнаружении незаконной лабораторной деятельности. Консультативные стороны не будут предпринимать дальнейших действий, если мы прекратим всю незаконную деятельность на нашей станции."
 MD_antarctica.4.a: "Мы должны что-то с этим сделать"
 MD_antarctica.5.t: "Отчет наблюдательной миссии: Обнаружены исследования по созданию ядерного оружия."
 MD_antarctica.5.d: "Наблюдатели от Договора завершили инспекцию нашей антарктической исследовательской станции и сообщили об обнаружении исследований по разработке ядерного оружия. Это является серьезным нарушением Договора об Антарктике и повлечет за собой немедленные дипломатические последствия. Консультативные стороны Договора предпримут решительные действия для решения этого вопроса и привлекут к ответственности виновных, потребовав немедленного прекращения всех ядерных исследований на нашей станции."
 MD_antarctica.5.a: "Мы должны немедленно от этого избавиться!"
 MD_antarctica.6.t: "Нарушение Договора об Антарктике: слишком много нарушений"
 MD_antarctica.6.d: "Уважаемый [ROOT.GetLeader],\n\nС сожалением сообщаем, что ваша страна, [ROOT.GetName], нарушила Договор об Антарктике слишком много раз — всего зафиксировано [?antarctica_station_reports] нарушений. В результате Консультативные стороны Договора приняли решение исключить [ROOT.GetName] из договора в течение двух лет и применить серьёзные дипломатические последствия. Неоднократные нарушения принципов и положений договора подорвали целостность соглашения и поставили под угрозу защиту уникальной экосистемы Антарктики. Мы настоятельно призываем вас отнестись к этому вопросу серьёзно и убрать исследовательскую станцию до того, как членство будет отозвано.\n\nС уважением,\nКонсультативные стороны Договора об Антарктике"
 MD_antarctica.6.a: "Мы сами виноваты в этом."
 MD_antarctica.7.t: "Наложить эмбарго на [FROM.GetName]?"
 MD_antarctica.7.d: "В связи с недавним обнаружением исследований ядерного оружия на одной из антарктических исследовательских станций [FROM.GetAdjective], консультативные стороны Договора об Антарктике рассматривают возможность введения эмбарго в отношении [FROM.GetName]. Это будет включать ограничение торговых и дипломатических отношений с [FROM.GetName] в ответ на нарушение ими принципов и положений договора."
 MD_antarctica.7.a: "Они должны понести наказание за свои действия."
 MD_antarctica.7.b: "Оно того не стоит"
 MD_antarctica.9.t: "Модуль антарктической станции поврежден"
 MD_antarctica.9.d: "В результате снежной бури поврежден модуль на одной из наших антарктических исследовательских станций. Инженеры готовятся к ремонту и начнут его, как только улучшатся погодные условия."
 MD_antarctica.9.a: "Чёрт возьми, какая погода!"
 MD_antarctica.10.t: "Демонтаж аннексированной страны — Антарктической исследовательской станции."
 MD_antarctica.10.d: "В связи с аннексией страны и размещением на ней исследовательской станции, станция была демонтирована."
 MD_antarctica.10.a: "Хорошо"
 ANT_nukes_research_discovered_idea: "На антарктической станции обнаружено ядерное оружие."
 ANT_nukes_research_discovered_idea_desc: "Эта страна нарушила принцип полного запрета военных исследований в Антарктиде, проводя исследования, связанные с ядерным оружием."
 antarctica_small_treaty_admin_cost_1: "Администрация малого договора об Антарктике"
 antarctica_small_treaty_admin_cost_1_desc: "Эта страна подписала один небольшой договор об Антарктике (CCAS или CCAMLR), что увеличивает административные издержки на политические действия."
 antarctica_small_treaty_admin_cost_2: "Расширение полномочий по управлению в рамках Договора об Антарктике"
 antarctica_small_treaty_admin_cost_2_desc: "Эта страна подписала два небольших договора об Антарктике (CCAS и CCAMLR), что требует расширения ресурсов для администрирования договоров и обеспечения их соблюдения."
 ANT_kicked_from_treaty_idea: "Исключен из Договора об Антарктике"
 ANT_kicked_from_treaty_idea_desc: "В связи с неоднократными нарушениями Договора об Антарктике, эта страна была исключена из соглашения и не сможет присоединиться к нему в течение следующих двух лет."
 ANT_illegal_extraction_idea: "Незаконная добыча ресурсов в Антарктиде"
 ANT_illegal_extraction_idea_desc: "Наши отношения с другими странами ухудшились, потому что мы входим в число немногих, кто не хочет обменивать ценные ресурсы на сохранение прекрасного вида ледяной пустыни. Их слишком волнует эта замерзшая глыба."
 ANT_military_training_idea: "Незаконная военная подготовка в Антарктиде"
 ANT_military_training_idea_desc: "Лучшего места для подготовки наших солдат к зимнему наступлению, чем Антарктида, не найти."
 antarctica_modifier_small_consequences: "Обнаружены неисправные электросети на антарктической исследовательской станции."
 antarctica_modifier_medium_consequences: "На антарктической исследовательской станции обнаружена незаконная лабораторная деятельность."
 antarctica_modifier_large_consequences: "Обнаружены исследования по разработке ядерного оружия на исследовательской станции в Антарктиде."
