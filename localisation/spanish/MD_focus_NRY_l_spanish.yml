 NRY_lawful_society: "La sociedad legal"
 NRY_navy: "Fuerza Naval"
 NRY_cyber_defense: "Fuerza de Defensa Cibernética"
 NRY_army: "Fuerza Terrestre"
 NRY_airforce: "Fuerzas aéreas"
 NRY_pro_migration: "Ánimo a los emigrantes"
 NRY_anti_migration: "Migrantes Limitada"
 NRY_modernize_bergan_line: "Línea Bergen"
 NRY_modernize_bergan_line_desc: "La Línea de Bergen es una vía férrea escénica de calibre estándar de 372 kilómetros que proporciona transporte y flexibilidad muy necesarios en nuestra nación."
 NRY_dovre_line: "La línea Dovre"
 NRY_dovre_line_desc: "La Línea Dovre es la línea principal de 484 km encargada de distribuir eficazmente suministros por todo el país."
 NRY_higher_relations_more_likely_TT: "Son §HMás Propensos§! a Aceptar si:\n- Su §HOpinión§! sobre nosotros es al menos de §H45§!"
 NRY_UK_AGREED: "El [ENG.GetFlag] §H [ENG.GetName]§! Ha Aceptado Nuestra Solicitud"
 NRY_wind_farms: "Parques eólicos"
 NRY_wind_farms_desc: "Se han erigido parques eólicos en varias partes de nuestro país con la esperanza de cosechar energía más limpia para nuestra nación de manera más eficiente."
 NRY_bergen_line: "La línea Bergen"
 NRY_bergen_line_desc: "La Línea de Bergen es una vía férrea escénica de calibre estándar de 372 kilómetros que proporciona transporte y flexibilidad muy necesarios en nuestra nación."
 NRY_taking_decision: "¿Tiene otra decisión activa?"