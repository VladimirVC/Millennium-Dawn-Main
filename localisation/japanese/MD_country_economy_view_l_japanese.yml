 print_money_button_tooltip: "§Y紙幣の増刷§!\n§g政府は苦境に陥り、早急に資金を調達する必要がある。税金や国債発行に頼るのではなく、紙幣を発行しての対応が可能だ。§!\n\nこの命令を実行すると、政府歳入の2週間分に相当する紙幣が発行され、国庫に追加される。しかし、インフレーションによる生産価値の低下により、国民の生産性は低下する。紙幣を増刷するたびに生産性の低下は加速するが、毎年徐々に改善していく。\n\n§Y紙幣発行数:§! [?printing_money_var|0Y]\n\n§Y前提条件:§!\n[!print_money_button_click_enabled]\n§Y効果:§!\n[!print_money_button_click]"
