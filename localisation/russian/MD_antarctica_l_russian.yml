 antarctica_reports_warning_tt: "§RПредупреждение:§!\nЕсли количество отчетов превысит 7, Консультативные стороны Договора об Антарктике могут предпринять дипломатические действия против вашей страны, включая возможные тяжелые санкции и потерю статуса Консультативной стороны (если он имеется). Во избежание негативных последствий рекомендуется удерживать количество отчетов ниже 7.\n\nЕсли превышение лимита произойдет при обнаружении ядерных исследований, каждая страна-участница Договора об Антарктике получит событие на введение эмбарго против вашей страны."
