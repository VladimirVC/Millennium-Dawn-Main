 print_money_button_tooltip: "§Y화폐 발행§!\n§g정부가 어려운 시기에 빠져 신속하게 자금을 조달해야 합니다. 세금이나 채권 매입에 의존하는 대신, 화폐를 발행하여 상황을 타개할 수 있습니다.§!\n\n이 명령을 내리면 2주 치의 정부 수입에 해당하는 화폐가 발행되어 국고에 추가됩니다. 그러나 인플레이션을 유발하는 조치로 인해 산출량 가치가 떨어지므로 국민의 생산성이 감소합니다. 생산성 감소는 발행할 때마다 악화되며, 매년 천천히 회복될 뿐입니다.\n\n§Y화폐 발행 횟수:§! [?printing_money_var|0Y]\n\n§Y전제 조건:§!\n[!print_money_button_click_enabled]\n§Y효과:§!\n[!print_money_button_click]"
