 UKR_hur_reform: "Réforme du HUR"
 UKR_hur_reform_desc: "It is time to begin reforms of our Main Intelligence Agency to increase efficiency and influence opportunities in other countries."
 UKR_hur_opearational_support: "Soutien opérationnel du HUR"
 UKR_hur_opearational_support_desc: "Le HUR soutient actuellement les opérations en cours avec des renseignements et en déployant ses unités sur la ligne de front."
 UKR_hur: "Direction principale du renseignement"
 UKR_hur_desc: "The HUR has a wide range of powers and capabilities that we will be able to implement in our foreign policy."
 UKR_hur_battalions: "Bataillons du HUR d'Ukraine"
 UKR_hur_battalions_desc: "The battalions of the HUR of Ukraine are participating in hostilities on the orders of the Ukrainian command on our side, after the end of hostilities, they will leave our armed forces."
 UKR_hur_decision_category: "La principale agence de renseignement"
 UKR_hur_decision_category_desc: "\n\n\n\n\n\n£UKR_desctext_hur\n\n\n\n\n\n\n\n\nLa Direction principale du renseignement du ministère de la Défense de l'Ukraine est le service de renseignement militaire du gouvernement ukrainien. C'est un département du ministère de la Défense, et non de l'état-major général des Forces armées d'Ukraine. Grâce à ce ministère, nous pourrons mener diverses opérations de sabotage dans les pays voisins et effectuer des sorties avec l'aide d'un bataillon de sabotage.\n\n\n\nNombre actuel de points opérationnels du HUR : [?hur_points]"
