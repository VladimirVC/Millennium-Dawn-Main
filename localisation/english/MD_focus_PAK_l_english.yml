 ### Tribal Areas Pressure Chain ###
 pakistan.1.t: "American Pressure on the Tribal Areas"
 pakistan.1.d: "The United States is demanding Pakistan take decisive military action against militant groups operating from the Federally Administered Tribal Areas along the Afghan border. Washington has made it clear that continued inaction will have consequences for the bilateral relationship and American military aid."
 pakistan.1.a: "Launch a military operation in Waziristan"
 pakistan.1.b: "Negotiate with the tribal elders instead"
 pakistan.1.c: "Refuse American demands"

 pakistan.2.t: "Pakistan Launches Tribal Operation"
 pakistan.2.d: "Pakistan has launched a military operation against militant strongholds in the tribal areas, responding to American pressure. The operation targets Taliban and al-Qaeda elements along the Afghan border."
 pakistan.2.a: "A positive development"

 pakistan.3.t: "Pakistan Refuses to Act"
 pakistan.3.d: "Pakistan has declined to take decisive military action in the tribal areas despite American demands. The militants continue to operate freely along the Afghan border, undermining coalition efforts in Afghanistan."
 pakistan.3.a: "Cut military aid to Pakistan"
 pakistan.3.b: "Accept their decision for now"

 pakistan.4.t: "Militant Retaliation"
 pakistan.4.d: "The military operation in the tribal areas has provoked fierce retaliation. Militant groups have launched a wave of bombings in major cities, targeting government buildings, markets, and military installations. The Pakistani Taliban has declared war on the state."
 pakistan.4.a: "Intensify the crackdown"
 pakistan.4.b: "Seek a ceasefire with the militants"

 pakistan.5.t: "American Aid Suspended"
 pakistan.5.d: "The United States has suspended military aid to Pakistan in response to the government's refusal to act against militants in the tribal areas. The loss of American funding will strain the defense budget."
 pakistan.5.a: "This is an outrage"

 pakistan.6.t: "Progress in the Tribal Areas"
 pakistan.6.d: "After months of sustained military operations, Pakistan's armed forces have made significant progress in the tribal areas. Major militant strongholds have been dismantled, though the human and economic cost has been severe. The question now is whether to declare victory or maintain a permanent military presence."
 pakistan.6.a: "Declare victory and consolidate"
 pakistan.6.b: "Maintain the military presence"

 ### Ideas ###
 PAK_waziristan_insurgency: "Waziristan Insurgency"
 PAK_waziristan_insurgency_desc: "Pakistani armed forces are engaged in a major counterinsurgency campaign in the tribal areas, battling militant groups along the Afghan border."
 PAK_suspended_american_aid: "Suspended American Aid"
 PAK_suspended_american_aid_desc: "The United States has suspended military aid to Pakistan, straining the defense budget and limiting arms acquisitions."
 PAK_tribal_pacification: "Tribal Areas Pacification"
 PAK_tribal_pacification_desc: "The successful military campaign in the tribal areas has strengthened the army's counterinsurgency capabilities and restored a degree of stability to the border region."

 ### News Events ###
 pakistan_news.1.t: "Pakistan Launches Military Operation in Tribal Areas"
 pakistan_news.1.d: "Pakistani armed forces have launched a major military operation against Taliban and al-Qaeda strongholds in the Federally Administered Tribal Areas along the Afghan border. The offensive, conducted under intense American pressure, targets militant networks that have long used the rugged terrain as a safe haven."
 pakistan_news.1.a: "We will root them out"
 pakistan_news.1.b: "A step in the right direction"
 pakistan_news.1.c: "Noted"

 pakistan_news.2.t: "Pakistan Declares Victory in Tribal Areas"
 pakistan_news.2.d: "After a prolonged military campaign, Pakistan has declared that major militant strongholds in the tribal areas have been dismantled. The operation has been costly in both lives and resources, but the government says the border region is more secure than it has been in years."
 pakistan_news.2.a: "A hard-won victory"
 pakistan_news.2.b: "We welcome this progress"
 pakistan_news.2.c: "Noted"
