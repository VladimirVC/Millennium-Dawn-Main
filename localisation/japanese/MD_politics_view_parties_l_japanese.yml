 ALB.conservatism: "£ALB_western_conservative (PDSH) アルバニア民主党"
 ALB.conservatism_desc: "親欧米保守主義 - 1990年に結成されたアルバニア民主党（アルバニア語：Partia Demokratike e Shqipërisë）は、主にエンヴェル・ホッジャ率いる旧共産主義体制の反体制派で構成されており、その性質上、反共産主義的である。また、$USoE.conservatism_2017$と提携関係にあり、親欧州・親EUの立場をとっている。"
 ALB.liberalism: "£ALB_western_liberal (PBDNJ) 統一人権党"
 ALB.liberalism_desc: "自由主義 - 1992年に結成された統一人権党（アルバニア語：Partia Bashkimi për të Drejtat e Njeriut）は、ギリシャ系少数民族の利益に重点を置く社会自由主義政党である。同党は、アルバニア国内のギリシャ系住民の利益を推進するため、しばしばオモノイア（ギリシャ系少数民族民主連合）と連携して活動している。EUのいかなる政治的投票ブロックにも加盟・提携していないものの、全体としては親欧州・親EUの立場をとっている。"
 ALB.socialism: "£ALB_western_social_democrat (PS) アルバニア社会党"
 ALB.socialism_desc: "親西欧社会民主主義 - 厳密には1991年に結成されたアルバニア社会党（アルバニア語：Partia Socialiste e Shqipërisë）は、社会民主主義的な改革派であり、£generic_Communist_State_small アルバニア労働党の後継政党である。ホッジャ主義の母体政党よりもはるかにリベラルなこの党は、$USoE.socialism$の提携政党であり、全体として親欧州・親EUの政党である。"
 ALB.Western_Autocracy: "£ALB_western_autocracy (PLL) 合法運動党"
 ALB.Western_Autocracy_desc: "親西側独裁 - 1924年に結成された合法運動党（アルバニア語：Partia Lëvizja e Legalitetit）は、ゾグ家の政権復帰を目指す右派の王政復古主義政党である。同党は「国際王政主義会議」の加盟団体である。"
 ALB.Communist-State: "£ALB_emerging_communism (PKSh) アルバニア共産党"
 ALB.Communist-State_desc: "ホッジャ共産主義 - 1991年に結成されたアルバニア共産党（アルバニア語：Partia Komuniste e Shqipërisë）は、ホッジャ主義時代の£generic_Communist_State_small アルバニア労働党の後継組織で、反修正主義を掲げている。同党は、かつて国民を魅了したマルクス・レーニン主義およびホッジャ主義の思想を積極的に維持している。1992年に一時禁止されたが、1998年に再び自由に活動することが認められた。"
 ALB.Neutral_conservatism: "£ALB_non_aligned_conservative (PR) アルバニア共和党"
 ALB.Neutral_conservatism_desc: "非同盟保守主義 - 1991年に結成されたアルバニア共和党（アルバニア語：Partia Republikane e Shqipërisë）は、アメリカの共和党から多大な影響を受け、同党を政治的な手本としている国家保守主義政党である。同党は$USoE.Neutral_conservatism_2017$のグローバル・パートナーである一方、欧州連合への一定の統合を目指している。"
 ALB.Neutral_green: "£ALB_non_aligned_greens (PAS) アルバニア農民党"
 ALB.Neutral_green_desc: "農本主義 - 1991年に結成されたアルバニア農民党（アルバニア語：Partia Agrare e Shqipërisë）」は、主に農本主義を掲げる政党であり、アルバニアの農民の利益に特に重点を置きながら、自由市場経済システムを軸にアルバニア国家の改革を目指している。同党は概して左派に位置づけられ、$ALB.socialism$と定期的な協力関係にある。"
 ALB.Nat_Autocracy: "£ALB_nationalist_military_junta (FARSH) アルバニア共和国軍"
 ALB.Nat_Autocracy_desc: "軍事政権 - 1912年以来、アルバニア共和国軍（アルバニア語：Forcat e Armatosura të Republikës së Shqipërisë）は、アルバニアの領土保全を担ってきた。ホッジャ主義政権の末期には、脱共産化の流れを食い止める可能性が懸念されたが、軍は自発的に退いた。"
 ALB.Monarchist: "£ALB_nationalist_monarchist ゾグ家"
 ALB.Monarchist_desc: "君主主義 - 1928年に王家として設立されたゾグ家は、1928年から1939年までの短命なアルバニア王国の王朝名であり、その称号は当時のイタリア国王ヴィットーリオ・エマヌエーレ3世によって継承された。アルバニア王位の称号と主張は、その後、元アルバニア国王ゾグ1世の血筋に沿って受け継がれている。"
 ALG.conservatism: "£ALG_conservatism_small （ANR）国民共和同盟"
 ALG.conservatism_desc: "保守主義 - 国民共和同盟（アラビア語ローマ字表記：(Al-Ittihad al-Watani al-Jumhuri, ANR）\n\n国民共和同盟は、アルジェリアにおける強硬な反イスラム主義政党である。同党は、1991年から2002年まで続いたアルジェリア内戦を終結させるための和平枠組みおよび計画であった1995年のサンテギディオ合意を非難した。1995年に結成され、1997年の議会選挙では得票率2％を獲得したが、議席は獲得できなかった。同党は、選挙が不正操作されるだろうとの見解から、2002年の議会選挙への参加を拒否した。2017年には、得票率1.87％で議席6議席を獲得した。"
 ALG.liberalism: "£ALG_liberalism_small （RND）民主国民連合"
 ALG.liberalism_desc: "自由主義 - 民主国民連合（アラビア語ローマ字表記：Tajammu' al-Watani al-Dimuqrati, RND） \n\nポピュリスト的な自由主義政党であり、政治的な立場は中道から中道右派に位置する民主国民連合は1997年に結成され、同年の議会選挙では最大政党となったが、その後の選挙では約8.2％という過去最低の結果に終わった。2007年以降、議会第2党としての地位を安定して維持している。1999年、アブデルアジズ・ブーテフリカ大統領がRNDから立候補し、驚異的な85%の得票率で当選した。多くの人がこの選挙は不正であったと信じているが、独立した観測筋は公正かつ民主的であったと評価した。2019年にも大統領選への出馬を試みたが、得票率7.3%にとどまり敗北した。"
 ALG.socialism: "£ALG_socialist_small （UDR）民主主義と共和国のための連合"
 ALG.socialism_desc: "社会民主主義 - 民主主義と共和国のための連合（アラビア語ローマ字表記：Al-Ittihad lil-Dimuqratiya wal-Jumhuri, UDR） \n\n民主主義と共和国のための連合は、アルジェリアの社会民主主義的なベルベル系政党であり、政治的なスペクトル上では中道左派に位置づけられる。2012年に「アルジェリア人民運動」へと党名を変更した。"
 ALG.socialism_2012: "£ALG_socialist_2012_small （MPA）アルジェリア人民運動"
 ALG.socialism_2012_desc: "社会民主主義 - アルジェリア人民運動（アラビア語ローマ字表記：Al-Haraka al-Sha'biyya al-Jazairiyya, MPA） \n\n民主主義と共和国のための連合は、アルジェリアの社会民主主義的なベルベル系政党であり、政治的なスペクトル上では中道左派に位置づけられる。2012年以前は、民主主義と共和国のための連合として知られていた。2017年の国民議会選挙では13議席を獲得した。"
 ALG.Autocracy: "£ALG_Autocracy_small (FLN) 民族解放戦線"
 ALG.Autocracy_icon: "£ALG_Autocracy_small"
 ALG.Autocracy_desc: "アラブ社会主義 - 民族解放戦線（アラビア語ローマ字表記：abhat al-Tahrir al-Watani, FLN） \n\nアルジェリアの民族主義政党である民族解放戦線は、1989年まで唯一の合法政党であり、一党独裁体制下でアルジェリアを統治していた。アルジェリア内戦後、2002年に最も支持を集める政党として政権に復帰し、それ以来その地位を維持している。そのイデオロギーは汎アラブ民族主義の思想に基づき、反植民地主義を本来の核心的価値観としている。マルクス主義の思想には反対する一方で、社会主義、特にアラブ社会主義を支持している。"
 ALG.Conservative: "£ALG_Conservative_small （FNA）アルジェリア国民戦線"
 ALG.Conservative_desc: "反動主義 - アルジェリア国民戦線（アラビア語ローマ字表記：Al-Jabha al-Wataniya al-Jazairiyya, FNA） \n\nアルジェリアの国家保守政党であるアルジェリア国民戦線は2002年以降、最も支持を集めた右派政党の一つであったが、2017年の議会選挙では得票率9.5%を記録したにもかかわらず、議席をすべて失った。2009年と2014年には大統領選に立候補したが、いずれも敗北した。"
 ALG.Caliphate: "£ALG_Caliphate_small (GSPC) 説教と戦闘の為のサラフィー主義者集団"
 ALG.Caliphate_desc: "サラフィー・ジハード主義 - 説教と戦闘の為のサラフィー主義者集団（アラビア語ローマ字表記：Al-Jama'a al-Salafiyya li-l-Da'wa wa-l-Qital, GSPC） \n\nGSPCはアルジェリアに拠点を置くサラフィスト・ジハード主義のテロ組織である。1998年、武装イスラム集団の元司令官で、同組織による民間人虐殺に抗議していたハッサン・ハッタブによって設立された。2003年、彼はナビル・サフラウィに後を譲り、サフラウィはGSPCのアルカイダへの忠誠を宣言した。同組織の構成員数は100人から4000人と報じられており、5回の攻撃を実行し、38人を殺害した。2007年1月、同組織は「イスラム・マグレブ諸国のアルカイダ」へと改称した。"
 ALG.Caliphate_2006: "£generic_Caliphate_small (AQIM) イスラム・マグレブ諸国のアルカイダ"
 ALG.Neutral_Muslim_Brotherhood: "£ALG_Neutral_Muslim_Brotherhood_small (MSP/Hamas) 平和のための社会運動"
 ALG.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - 平和のための社会運動（アラビア語ローマ字表記：Harakat al-Mujtama' as-Silmiyya, MSP/Hamas） \n\nアルジェリアの右派から極右の政党である平和のための社会運動は、1990年にムスリム同胞団によって設立され、現在も同団体と連携を保っている。スンニ派イスラム主義を掲げ、イスラム保守民主主義を支持している。最大の成果は1997年の議会選挙で、380議席中69議席を獲得し、第2党となったことである。また、1995年の大統領選挙にも立候補し、得票率25.6％を記録した。2012年にはMRNおよびMRIと選挙連合を結成した。"
 ALG.Neutral_Autocracy: "£ALG_Neutral_Autocracy_small （MRN/Islah）国家改革運動"
 ALG.Neutral_Autocracy_desc: "右派イスラム主義 - 国家改革運動（アラビア語ローマ字表記：Harakat al-Islah al-Wataniy） \n\nアルジェリアの右派イスラム民主主義政党である国家改革運動は、2002年にエンナハダ運動から分裂して結成され、アルジェリア政府との協力に合意した。2002年に初期の成功を収めたが、その後は衰退した。2012年に「平和のための社会運動」や「イスラム復興運動」と共に「緑の同盟」に参加した。"
 ALG.Neutral_conservatism: "£ALG_Neutral_conservatism_small （MRI/Nahda）イスラム復興運動"
 ALG.Neutral_conservatism_desc: "中道イスラム主義 - イスラム復興運動（アラビア語ローマ字表記：Harakat an-Nahda al-Islamiyya, MRI/Nahda） \n\nイスラム復興運動はアルジェリアの穏健派イスラム主義政党であり、中道右派から右派に分類される。最大の成功は1997年の選挙で得票率8.7%を記録したことだが、2002年にはイスラフ運動に支持を大きく奪われ、わずか0.6%にとどまった。同党は平和のための社会運動および国家改革運動と「アルジェリア緑の同盟」を結成した。"
 ALG.neutral_Social: "£ALG_neutral_Social_small （FFS）社会主義勢力戦線"
 ALG.neutral_Social_desc: "民主社会主義 - 社会主義勢力戦線（アラビア語ローマ字表記：Al-Jabha al-Qawiyya al-Ishtirakiyya, FFS） \n\n社会主義勢力戦線はアルジェリアのベルベル系政党である。社会民主主義・世俗主義を掲げ、中道左派に位置づけられる。2002年および2007年の議会選挙、ならびに2009年の大統領選挙については、与党に有利になるよう不正操作されているとの見解から、ボイコットした。"
 ALG.Neutral_Communism: "£ALG_Neutral_Communism_small 労働者党"
 ALG.Neutral_Communism_desc: "共産主義 - 労働者党（アラビア語ローマ字表記：Hizb al-'Ummal） \n\nアルジェリアの左派トロツキスト政党である社会主義勢力戦線は1990年に結成され、労働組合の保護と富の再分配を主張している。書記長のルイーザ・ハヌーンは、2004年にアルジェリアで初めて大統領選に出馬した女性である。1997年以来、国民議会で常に上位8党に入っており、2007年には5.08%の得票率で第4位となり、最多得票数を獲得した。"
 ALG.Nat_Populism: "£ALG_Nat_Populism_small (AHD54) アフド54"
 ALG.Nat_Populism_desc: "右派ポピュリスト - アフド54（誓約54） \n\nアフド54は、アルジェリア革命の年を由来として設立された、アルジェリアの民族主義的かつ改革派の政治運動である。同団体は、国家主権の枠組みの中で、独立闘争の遺産、透明性、近代化を重視する愛国的な政策を推進している。イスラム主義に根ざしているわけではないが、国民的誇りに訴えかけ、従来の支配層とイスラム主義野党の両方に対する代替案となることを目指している。"
 ALG.Nat_Fascism: "£ALG_Nat_Fascism_small アルジェリア・アラブ社会主義バアス党"
 ALG.Nat_Fascism_desc: "汎アラブ社会主義 - アルジェリア・アラブ社会主義バアス党（アラビア語ローマ字表記：Hizb al-Ba'th al-'Arabi al-Jazairi） \n\nアラブ・バアス社会主義党を起源とし、アラブの統一、社会主義、反帝国主義を掲げている。同党は、アルジェリアの政治史において重要な役割を果たした。"
 ALG.Nat_Autocracy: "£ALG_Nat_Autocracy_small アルジェリア人民国軍"
 ALG.Nat_Autocracy_desc: "軍事政権 - 人民国軍（アラビア語ローマ字表記：Al-Jaysh al-Watani al-Sha'bi, ANP） \n\nアルジェリア人民国軍は1962年の独立以来、政治において重要な役割を果たしてきた。1988年に多党制が確立されるまで、事実上政府を掌握していた。現在も影響力を維持しており、直近の例としては、2019年の抗議運動を受けてブテフリカ大統領が退陣したことが挙げられる。"
 AQY.Caliphate: "£generic_Caliphate_small アラビア半島のアルカイダ"
 AQY.Caliphate_desc: ""
 ARM.conservatism: "£ARM_western_conservative (RP) 共和党"
 ARM.conservatism_desc: "保守的自由主義 - 共和党（アルメニア語ローマ字表記：Hanrapetutyun）\n\n 共和党は、アルメニアの親欧州派政党である。同党は、アルメニア共和党の元党員や、より親西欧的な外交姿勢を志向していたイェルクラパ・志願兵連合のメンバーによって結成された。同党は、リベラルな見解と保守的な見解の両方を有していると表明しているが、ほとんどの課題において中道的なアプローチをとる傾向にある。"
 ARM.liberalism: "£ARM_western_liberalism (OEK) 法の支配"
 ARM.liberalism_desc: "親EU自由主義 - 法の支配（アルメニア語ローマ字表記：Orinats Yerkir）\n\n 法の支配は、アルメニアの親欧州リベラル政党である。党首のアルトゥル・バグダサリアン氏は、EUとの加盟交渉を開始するためには、バルト諸国が行ったように、アルメニアも民主主義を強化し、欧州の基準を満たすために法的、社会的、経済的、政治的な改革を完了しなければならないと述べた。"
 ARM.socialism: "£ARM_western_socialism (PANM) 汎アルメニア民族運動"
 ARM.socialism_desc: "社会民主主義 - 汎アルメニア民族運動（アルメニア語ローマ字表記：Hayots Hamazgain Sharzhum）\n\n 汎アルメニア民族運動は、1988年2月20日のナゴルノ・カラバフ自治評議会による、ソビエト・アルメニアとの統合を求める決議を受けて結成された。同党は、コーカサス地域の自由主義政党によるフォーラムに参加した。このフォーラムには、ジョージア共和党やムサヴァト党も参加し、地域間の共同協力や、欧州の枠組みへの統合といった課題が議論された。"
 ARM.Communist-State: "£ARM_Communist_State (ACP) アルメニア共産党"
 ARM.Communist-State_desc: "新興共産主義 - アルメニア共産党（アルメニア語ローマ字表記：Hayastani Komunistakan Kusaktsutyun）\n\n アルメニア共産党は、ソビエト連邦共産党アルメニア支部の後継組織であると自認している。アルメニアにおける主要な共産党であり、18,000人（その大半が高齢者）の党員を擁していると主張している。同党の綱領には、西欧式の市場改革の拒否、混合経済を採り入れた社会主義、そしてロシアとの連邦国家への統合が含まれていた。"
 ARM.Conservative: "£ARM_Conservative コチャリャン政権"
 ARM.Conservative_desc: "泥棒政治的保守主義 - ロベルト・コチャリャン政権\n\n ロベルト・セドラキ・コチャリャンはアルメニアの政治家である。1994年から1997年までナゴルノ・カラバフ共和国の大統領を務め、1992年から1994年までは同共和国の首相を務めた。1998年からはアルメニアの第2代大統領を務め、1997年から1998年まではアルメニアの首相を務めた。前任者のレヴォン・テル＝ペトロシアンが大統領職を追われた後、コチャリャンは1998年3月30日、国際選挙監視団の報告によると双方による不正や違反行為が横行した早期大統領選挙において、主要な対立候補であったカレン・デミルチャン（旧ソビエト・アルメニアの指導者）を破り、アルメニアの第2代大統領に選出された。また、候補者はアルメニア国民であり、かつ10年間アルメニアに居住していなければならないとするアルメニア憲法の下では、コチャリャンには立候補資格がないという不満も寄せられた。首相に就任する前、コチャリャンはナゴルノ・カラバフ共和国に居住しており、同国の国民とみなされていた。"
 ARM.Nat_Autocracy: "£ARM_military_junta (VU) イェルクラパ"
 ARM.Nat_Autocracy_desc: "軍事政党 - イェルクラパ・志願兵連合（アルメニア語：Yerkrapah）\n\n イェルクラパ・志願兵連合（イェルクラパ退役軍人連合、「大地の守護者」の意）は、ヴァズゲン・サルキシャンによって結成された、第一次ナゴルノ・カラバフ戦争の退役軍人6,000名からなるアルメニアの非政府組織である。1994年以降、退役軍人団体「イェルクラパ」は国内で最も強力な組織となった。1998年までに、ヴァズゲン・サルキシャンが影の支配者として率いる「イェルクラパ」議会派閥は、国民議会において最大派閥となった。議会での銃撃戦中にヴァズゲン・サルキシャンが暗殺された後、同組織は現在、勢力を弱めている。"
 ARM.Nat_Fascism: "£ARM_anarchist_communism (ARF) アルメニア革命連盟（§8民族主義§!派）"
 ARM.Nat_Fascism_desc: "社会民族主義 - アルメニア革命連盟 - 民族主義派（アルメニア語ローマ字表記：Hay Heghapokhakan Dashnaktsutyun）\n\n アルメニア革命連盟（ダシュナクツツィウン）は、アルメニアの民族主義・社会主義政党である。同党は、アルメニア、レバノン、イラン、およびアルメニア人ディアスポラが存在する各国で活動している。主に教育や人道支援プロジェクトに重点を置く傾向のある他のアルメニア系ディアスポラ政党と比較して、ARFは最も政治色の強い組織であり、伝統的にアルメニア民族主義の最も強固な支持者の一つである。"
 ARM.Nat_Populism: "£ARM_Conservative_alt (RPA) アルメニア共和党（§8民族主義§! 派）"
 ARM.Nat_Populism_desc: "民族保守主義 - アルメニア共和党 - 民族主義派（アルメニア語：Hayastani Hanrapetakan Kusaktsutyun）\n\n アルメニア共和党は、アルメニアの第3代大統領セルジ・サルキシャンが率いる、アルメニアの民族保守派政党である。同党の民族保守主義的イデオロギーは、20世紀初頭のアルメニア民族主義思想である「ツェガクロン」に基づいている。同党の民族主義派は、アショト・ナヴァサルディアン氏の死去後、現在困難な状況にあり、党内には国家機関出身の側近たちが次々と入っている。"
 AUS.conservatism: "£AUS_western_conservative (ÖVP) オーストリア人民党"
 AUS.conservatism_desc: "親西欧保守主義 ― 第二次世界大戦後の1945年に結成されたオーストリア人民党（ドイツ語：Österreichische Volkspartei）は、ナチス支配からの解放以来、オーストリアにおける主要な保守政党としての地位を確立してきた。自由保守主義とキリスト教民主主義の両方に重点を置く同党は、$USoE.neutral_Social_2017$および国際民主同盟の加盟政党としてふさわしい存在である。"
 AUS.liberalism: "£AUS_western_liberal (LIF) 自由フォーラム"
 AUS.liberalism_desc: "自由主義 - 1993年に設立された自由フォーラム（ドイツ語：Liberales Forum）は、前述の政党の右派ポピュリズム的な傾向に対する意見の相違から、$AUS.Nat_Populism$から分裂して結成された古典的自由主義政党である。LIFは、環境保護に加え、民営化の推進、軽度薬物の合法化、マイノリティの平等、営業時間の自由化、および選挙権年齢の引き上げを支持している。"
 AUS.socialism: "£AUS_western_social_democrat (SPO) オーストリア社会民主党"
 AUS.socialism_desc: "親西欧社会民主主義 - 1889年に結成されたオーストリア社会民主党（ドイツ語：Sozialdemokratische Partei Österreichs）は、オーストリアで現存する最古の政党である。その長い歴史の中で社会民主主義の価値観を堅持し、進歩同盟および社会主義インターナショナルの両方に加盟している。世界的な存在感を示す一方で、EUおよび欧州内では$USoE.socialism$の一員であり、極めて親欧州・親EU的な政党である。"
 AUS.Communist-State: "£generic_Communist_State_small (VRAÖ) オーストリア革命労働者同盟（マルクス・レーニン主義）"
 AUS.Communist-State_desc: "マルクス・レーニン主義 - 1968年、£generic_Communist_State_small オーストリア・マルクス・レーニン主義党との分裂を経て結成されたオーストリア革命労働者連合（ドイツ語：Vereinigung Revolutionärer Arbeiter Österreichs）は、オーストリアにおけるマルクス・レーニン主義の堅固な支持勢力として活動してきた。同党は反修正主義を掲げており、結成以来、断続的に月刊誌を発行している。"
 AUS.anarchist_communism: "£AUS_emerging_communism (KPÖ) オーストリア共産党"
 AUS.anarchist_communism_desc: "社会主義 - 1918年に結成されたオーストリア共産党（ドイツ語：Kommunistische Partei Österreichs）は、国内での実際の議席数は極めて少ないものの、オーストリア国内においてその存在意義を維持し続けている。その名称や歴史にもかかわらず、KPÖは著しく穏健化しており、多くの人々から社会主義政党と見なされている。国際的にはIMCWPに加盟しており、欧州内では$USoE.Neutral_Communism_2017$のメンバーとなっている。"
 AUS.Neutral_conservatism: "£AUS_non_aligned_conservative (BZÖ) オーストリア未来同盟"
 AUS.Neutral_conservatism_desc: "国民保守主義 - 2005年に設立されたオーストリア未来同盟（ドイツ語：Bündnis Zukunft Österreich）は、$AUS.Nat_Populism$（FPÖ）から分裂したグループである。この分裂は、FPÖ内の派閥が「自由化」プロセスを失敗と見なしたことに起因する。同党は、中産階級の支援、自由市場、そして官僚的な支出と政府債務全体の削減を掲げることで、$AUS.conservatism$から支持基盤を奪おうとしている。移民問題に関してはFPÖよりも柔軟な姿勢を示しており、「グリーンカード」制度を支持している。"
 AUS.Neutral_green: "£AUS_non_aligned_greens (GRÜNE) 緑の党 - 緑のオルタナティヴ"
 AUS.Neutral_green_desc: "緑の政治 - 1986年に「緑のオルタナティヴ」として結成され、1993年以降は「緑の党 - 緑のオルタナティヴ」（ドイツ語：Die Grünen - Die Grüne Alternative）として知られるこの政党は、環境保護、マイノリティの権利、社会・生態学的税制改革といった問題について、オーストリアの政界において極めて活発に発言を続けてきた。同党は$USoE.Neutral_green_2017$および$USoE.Neutral_green$の両方に分類されており、極めて親欧州・親EUの立場をとっている。"
 AUS.Nat_Autocracy: "£AUS_nationalist_military_junta オーストリア軍"
 AUS.Nat_Autocracy_desc: "軍事政権 - 前身は1920年に誕生したが、現在のオーストリア軍の形態は、1955年のオーストリア再統一から存在している。オーストリア連邦憲法に基づき、現在のその任務は、民主的自由の保護、秩序の維持、および災害発生時の支援である。"
 AUS.Nat_Populism: "£AUS_nationalist_right_wing_populist (FPÖ) オーストリア自由党"
 AUS.Nat_Populism_desc: "右派ポピュリズム - 1956年に結成されたオーストリア自由党（ドイツ語：Freiheitliche Partei Österreichs）は、かつての汎ゲルマン主義および国民自由主義政党をルーツとする右派政党である。初代党首は、元ナチス閣僚でありSS将校でもあったアントン・ラインタラーであった。しかし1980年代以降、よりリベラルな指導部が台頭し、同党はいくつかの問題について姿勢を軟化させている。"
 AUS.Monarchist: "£AUS_nationalist_monarchist ハプスブルク＝ロレーヌ家"
 AUS.Monarchist_desc: "君主制 - 1736年に王家として設立されたハプスブルク＝ロートリンゲン家は、神聖ローマ帝国からベルギーまで、多くの領域を支配してきた。しかし、オーストリア人にとってより重要なのは、ハプスブルク＝ロートリンゲン家がかつてオーストリア＝ハンガリー帝国を第一次世界大戦の終わりに最終的に解体されるまで支配していたことである。"
 AZE.liberalism: "£AZE_western_liberal (APFP) アゼルバイジャン人民戦線党"
 AZE.liberalism_desc: "大西洋主義 - アゼルバイジャン人民戦線党は、もともとは1989年に結成された反ソ連の反体制派グループであり、独立したばかりのアゼルバイジャンにおいて、いち早く政治権力を求めた団体の一つであった。同党は自由市場資本主義と自由民主主義を支持し、アゼルバイジャン民族主義を掲げている。アゼルバイジャン・ソビエト社会主義共和国内において、当時のソ連構成国であったアルメニアに対する封鎖を行った組織でもあり、近代アゼルバイジャン国家の形成初期において重要な役割を果たした。しかし、1993年のクーデターにより、この運動の野望は事実上終焉を迎え、代わりに新アゼルバイジャン党の支配が確固たるものとなった。"
 AZE.socialism: "£AZE_western_social_democrat (ASRP) アゼルバイジャン社会繁栄党"
 AZE.socialism_desc: "右派社会民主主義 - 1994年に結成され、翌年に正式に登録された社会繁栄党は、国民のための「社会福祉」を掲げている。党の規模は比較的小さく、明確な政策綱領も持たないため、支持を集めたり、実質的な政治的影響力を獲得したりする面では、ほとんど成果を上げていない。"
 AZE.Communist-State: "£AZE_emerging_communism (AzKP) アゼルバイジャン共産党"
 AZE.Communist-State_desc: "マルクス・レーニン主義 - 1993年にソ連共産党アゼルバイジャン支部の非公式な後継組織として結成されたアゼルバイジャン共産党は、かつての与党の理念に強く沿った立場をとっている。党内の対立により分裂が生じ、同様のイデオロギーを持ち、同じ名称を冠する2つの政党が一時的に存在した。いずれもアゼルバイジャン国内での選挙では大きな成功を収めていないものの、アゼルバイジャンにおける西側の利益に反対し、旧ソ連の共産党との協力関係を築くことに、依然として積極的に取り組んでいる。"
 AZE.Neutral_conservatism: "£AZE_non_aligned_conservative (VHP) 市民連帯党"
 AZE.Neutral_conservatism_desc: "国家保守主義 - 1992年に結成され、当初はアゼルバイジャン人民戦線の一派であった市民連帯党は、民族主義的な政策を掲げており、独立以来、アゼルバイジャンの歴代政権に対し、一貫して議会での支持を提供し続けている。"
 AZE.Neutral_Muslim_Brotherhood: "£AZE_non_aligned_moderate_islamist (MP) ミュサヴァト党"
 AZE.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 - ミュサヴァト党は、アゼルバイジャン国内で最も古い政党の一つであり、その起源は1911年に遡るが、現在の形での党の結成は1989年まで待たなければならなかった。当初は野党として一定の成功を収め、アゼルバイジャンの歴史に根ざしていたものの、党内の派閥間の対立や、不明確な政策綱領・統一されたメッセージの欠如により、当初の人気を失ってしまった。イデオロギー的には、穏健な自由主義とアゼルバイジャン民族主義を融合させているが、歴史的にはイスラム保守主義の影響も受けており、それが党内の各派閥を形成する一因となっている。"
 AZE.Nat_Autocracy: "£AZE_nationalist_military_junta アゼルバイジャン軍"
 AZE.Nat_Autocracy_desc: "民族主義軍事政権 - 1991年10月に正式に創設されたアゼルバイジャン軍は、ソ連の解体後になってようやく完全に組織化された。旧ソ連の基地や装備を活用し、アゼルバイジャン軍は隣国アルメニアとのアルツァフをめぐる紛争に引き続き関与した。この係争地問題に加え、隣国であるロシアやイランからの圧力も相まって、アゼルバイジャンは軍の近代化と強化を迫られることになった。"
