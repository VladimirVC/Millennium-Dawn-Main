 NRY_anti_migration: "Борьба с миграцией"
 NRY_modernize_bergan_line: "Бергенская железная дорога"
 NRY_modernize_bergan_line_desc: "Бергенская железная дорога - это живописная железнодорожная линия стандартной колеи протяженностью 231 милю (371 километр), которая обеспечивает необходимую транспортную доступность и гибкость в нашей стране."
 NRY_dovre_line: "Линия Довре"
 NRY_dovre_line_desc: "Линия Довре — это основная линия протяженностью 484 км, задача которой — эффективная доставка грузов по всей нашей стране."
 NRY_higher_relations_more_likely_TT: "Они будут §Hболее склонны§! к согласию если:\n- их §Hмнение§! о нас как минимум §H45§!"
 NRY_UK_AGREED: "[ENG.GetFlag] §H[ENG.GetName]§! согласилась на нашу просьбу"
 NRY_wind_farms: "Ветропарки"
 NRY_wind_farms_desc: "Ветряные электростанции были построены в нескольких частях наших стран в надежде более эффективно собирать более чистую энергию для нашей страны."
 NRY_bergen_line: "Бергенская железная дорога"
 NRY_bergen_line_desc: "Бергенская линия — это живописная железнодорожная линия стандартной колеи протяженностью 231 миля, которая обеспечивает столь необходимые перевозки и гибкость внутри нашей страны."
