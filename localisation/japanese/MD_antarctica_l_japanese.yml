 MD_antarctica_news.1.t: "[FROM.GetName]が南極条約加盟を申請"
 MD_antarctica_news.1.d: "[FROM.GetName]は南極条約への加盟を申請した。これは同国の外交方針の転換と環境保護への取り組みを示唆している。南極条約は、南極を平和的目的および科学的研究のために利用することを規定し、大陸独自の生態系を保護する国際協定である。[FROM.GetName]による加盟申請に対し、国際社会からは、国際協力への前進として歓迎する声がある一方で、同国の意図や条約の原則に対する遵守姿勢に懐疑的な見方を示す声も上がっている。加盟手続きの完了には1ヶ月を要する見込みだ。"
 MD_antarctica_news.1.a: "時が経てばわかるだろう"
 MD_antarctica_news.1.b: "ようやくか"
 MD_antarctica_news.2.t: "[FROM.GetName]が南極条約に加盟"
 MD_antarctica_news.2.d: "本日、[GetDateText]に[FROM.GetName]は南極条約に正式に加盟した。これにより同国は、南極を平和的目的と科学的研究のために利用することを定めた国際協定の一員となった。条約への加盟を通じて、[FROM.GetName]は南極における環境保護と国際協力の原則を維持することを約束した。この動きは国際社会から肯定的に受け止められており、南極独自の生態系を保護し、国家間の平和的な協力を推進しようとする[FROM.GetName]の姿勢が多くの称賛を集めている。"
 MD_antarctica_news.2.a: "新たな一員だ"
 MD_antarctica_news.2.b: "仕事に取りかかろう"
 MD_antarctica_news.3.t: "[FROM.GetName]が南極条約脱退の意向を表明"
 MD_antarctica_news.3.d: "[FROM.GetName]は本日、南極条約からの脱退を決定した。南極の海洋生物資源の保存に関する委員会（CCAMLR）は、南極に保有するあらゆる研究基地を解体し、資源開発や軍事拠点の設置といった禁止活動を回避するために2年間の猶予を与えている。条約脱退の決定に対し、国際社会の反応は分かれている。環境や国際協力への潜在的な影響について失望や懸念を示す声がある一方で、国際協定への関与について自ら決定を下す[FROM.GetName]の権利を支持する声もある。脱退プロセスの完了には2年を要する。"
 MD_antarctica_news.3.a: "残念だ"
 MD_antarctica_news.3.b: "我々にはもっとやるべきことがある"
 MD_antarctica_news.4.t: "[FROM.GetName]が南極条約から脱退"
 MD_antarctica_news.4.d: "[MD_antarctica_news_4_desc]"
 MD_antarctica_news.4.a: "条約の弱体化だ"
 MD_antarctica_news.4.b: "どうでもいい"
 MD_antarctica_news_4_desc_1: "南極条約脱退の意向表明から2年が経過し、[FROM.GetName]は南極を平和的目的と科学的研究のために利用することを定めた国際協定から正式に離脱した。警告にもかかわらず、[FROM.GetName]は南極に研究基地を維持したまま条約を脱退したため、条約締約国から制裁や外交的反発を含む国際的な抗議を招いている。"
 MD_antarctica_news_4_desc_2: "南極条約脱退の意向表明から2年が経過し、[FROM.GetName]は南極を平和的目的と科学的研究のために利用することを定めた国際協定から正式に離脱した。[FROM.GetName]は南極にあるすべての研究基地の解体を完了し、資源開発や軍事拠点の設置といった禁止活動を回避したため、環境や国際協力への潜在的な影響は最小限に抑えられた。"
 MD_antarctica_news.5.t: "[FROM.GetAdjective]の南極基地でオープンループ設備を検知"
 MD_antarctica_news.5.d: "先日の査察任務において、条約査察団は[FROM.GetAdjective]の南極研究基地の一つでオープンループ設備の利用を検知した。これは環境に害を及ぼし、南極の生態系を乱すあらゆる活動を禁止している南極条約への違反である。オープンループ設備の検知は条約締約国の間に懸念を広げており、外交上の問題に発展する可能性がある。"
 MD_antarctica_news.5.a: "安上がりに済ませようとする者がいるものだ"
 MD_antarctica_news.5.b: "なるほど"
 MD_antarctica_news.6.t: "[FROM.GetAdjective]の南極基地で違法な研究活動を検知"
 MD_antarctica_news.6.d: "先日の査察任務において、条約査察団は[FROM.GetAdjective]の南極研究基地の一つで違法な研究活動を検知した。このような行為は容認し難いものであり、南極条約に対する明白な違反である。条約協議国はこの問題に対処し、南極独自の生態系保護と条約の完全性を確保するために適切な措置を講じる予定だ。"
 MD_antarctica_news.6.a: "到底容認できない"
 MD_antarctica_news.6.b: "何らかの対策が必要だ"
 MD_antarctica_news.7.t: "[FROM.GetAdjective]の南極基地で核兵器研究を検知"
 MD_antarctica_news.7.d: "先日の査察任務において、条約査察団は[FROM.GetAdjective]の南極研究基地の一つで核兵器研究が行われていることを確認した。これは南極におけるあらゆる軍事活動、および環境被害や生態系の混乱を招く活動を禁止している南極条約への重大な違反である。平和的な研究基地を核兵器の製造や実験に利用することは、全世界の安全と保障を脅かす言語道断の行為だ。条約協議国はこの問題に対処し、責任者に相応の報いを受けさせるため、即座に断固とした措置を講じる。国際社会は一丸となってこの行為を非難し、南極が科学的研究と協力のための平和で保護された環境であり続けることを保証しなければならない。"
 MD_antarctica_news.7.a: "言語道断だ！"
 MD_antarctica_news.7.b: "背に腹は代えられない"
 MD_antarctica_news.8.t: "[FROM.GetName]による度重なる南極条約違反"
 MD_antarctica_news.8.d: "南極条約に対する度重なる違反を受け、条約協議国は[FROM.GetName]を条約から除名し、深刻な外交的措置を課すことを決定した。条約の原則と規定に対する繰り返しの違反行為は、協定の完全性を損ない、南極独自の生態系保護を脅かしてきた。条約協議国は、[FROM.GetName]にその行動の責任を取らせ、南極条約が国際協力と環境保護のための強力かつ効果的な枠組みであり続けるよう、断固とした行動をとるだろう。"
 MD_antarctica_news.8.a: "自業自得だ"
 MD_antarctica_news.8.b: "やりすぎだ"
 MD_antarctica_news.9.t: "南極全域で強風が発生"
 MD_antarctica_news.9.d: "南極全域で強風が報告されており、各研究基地に影響が出ている。条約協議国は状況を監視し、職員の安全と進行中の研究の完全性を確保するために支援を行っている。天候が回復するまで、査察任務は一時的に中断される。"
 MD_antarctica_news.9.a: "よくないな"
 MD_antarctica_news.10.t: "[FROM.GetName]が南極研究基地の建設を開始"
 MD_antarctica_news.10.d: "[FROM.GetName]は新たな南極研究基地の建設を開始した。これは同地域の科学的研究と環境保護に対する同国の取り組みを示すものである。基地の建設には数ヶ月を要する見込みであり、条約協議国は南極条約の原則と規定が遵守されるよう、進捗を綿密に監視する予定だ。"
 MD_antarctica_news.10.a: "素晴らしい！"
 MD_antarctica.1.t: "査察団の接近"
 MD_antarctica.1.d: "[FROM.GetName]は、我が国の南極研究基地の一つを調査するため、条約査察団を派遣した。査察団は§Y7日§!後に到着する予定だ。"
 MD_antarctica.1.a: "到着を待とう"
 MD_antarctica.3.t: "査察報告: オープンループ設備を検知"
 MD_antarctica.3.d: "条約査察団による我が国の南極研究基地の調査が完了し、オープンループ設備の利用が報告された。これは南極条約への違反であり、外交上の問題に発展する可能性がある。条約協議国は、当該設備をより環境負荷の低い選択肢へと交換するよう求めている。"
 MD_antarctica.3.a: "撤去せざるを得ないだろう"
 MD_antarctica.4.t: "査察報告: 違法な研究活動を検知"
 MD_antarctica.4.d: "条約査察団による我が国の南極研究基地の調査が完了し、違法な研究活動が報告された。基地におけるすべての違法活動を停止すれば、協議国はこれ以上の追及を行わないとしている。"
 MD_antarctica.4.a: "何らかの対策が必要だ"
 MD_antarctica.5.t: "査察報告: 核兵器研究を検知"
 MD_antarctica.5.d: "条約査察団による我が国の南極研究基地の調査が完了し、核兵器研究が報告された。これは南極条約に対する重大な違反であり、即座に外交的措置が講じられることになる。条約協議国はこの問題に対処するため断固とした行動をとり、責任を追及するとともに、我が国の基地におけるすべての核研究活動の即時停止を要求している。"
 MD_antarctica.5.a: "即座に廃棄しなければ！"
 MD_antarctica.6.t: "南極条約違反: 度重なる違反行為"
 MD_antarctica.6.d: "[ROOT.GetLeader]閣下へ\n\n残念ながら、貴国[ROOT.GetName]による南極条約への違反は看過できない回数に達しており、計[?antarctica_station_reports]件の違反が記録されている。その結果、条約協議国は今後2年以内に[ROOT.GetName]を条約から除名し、深刻な外交的措置を課すことを決定した。条約の原則と規定に対する繰り返しの違反は、協定の完全性を損ない、南極独自の生態系を脅かすものである。事態を重く受け止め、加盟資格が剥奪される前に研究基地を撤去することを強く勧告する。\n\n敬具\n南極条約協議国一同"
 MD_antarctica.6.a: "自業自得というわけか"
 MD_antarctica.7.t: "[FROM.GetName]への禁輸措置？"
 MD_antarctica.7.d: "[FROM.GetAdjective]南極研究基地の一つで核兵器研究が検知されたことを受け、南極条約協議国は[FROM.GetName]に対する禁輸措置を検討している。これは条約の原則と規定に対する違反への対応として、[FROM.GetName]との貿易および外交関係を制限するものである。"
 MD_antarctica.7.a: "行動の報いを受けさせるべきだ"
 MD_antarctica.7.b: "割に合わない"
 MD_antarctica.9.t: "南極基地のモジュールが損傷"
 MD_antarctica.9.d: "吹雪の影響により、我が国の南極研究基地のモジュールが損傷した。技術チームが修理の準備を進めており、天候が回復し次第作業を開始する予定だ。"
 MD_antarctica.9.a: "忌々しい天気め！"
 MD_antarctica.10.t: "併合した国家の南極研究基地を解体"
 MD_antarctica.10.d: "研究基地を保有していた国家が併合されたため、当該研究基地は解体された。"
 MD_antarctica.10.a: "了解"
 ANT_nukes_research_discovered_idea: "南極基地での核兵器研究の発覚"
 ANT_nukes_research_discovered_idea_desc: "この国は、核兵器に関連する研究を行うことで、南極における軍事研究の全面禁止の原則に違反した。"
 antarctica_small_treaty_admin_cost_1: "南極小条約の管理"
 antarctica_small_treaty_admin_cost_1_desc: "この国は南極小条約（CCASまたはCCAMLR）のいずれかに署名しており、政治的行動のための行政上の負担が増大している。"
 antarctica_small_treaty_admin_cost_2: "拡張された南極条約の管理"
 antarctica_small_treaty_admin_cost_2_desc: "この国は両方の南極小条約（CCASおよびCCAMLR）に署名しており、より広範な条約管理と遵守のためのリソースを必要としている。"
 ANT_kicked_from_treaty_idea: "南極条約からの除名"
 ANT_kicked_from_treaty_idea_desc: "南極条約に対する度重なる違反により、この国は協定から除外された。今後2年間は再加盟できない。"
 ANT_illegal_extraction_idea: "南極における違法な資源採掘"
 ANT_illegal_extraction_idea_desc: "氷に覆われた荒野の素晴らしい景色を維持するために、貴重な資源の取引を拒むような国は少数派であり、他国との関係が悪化している。彼らはあの凍った塊を気にかけすぎている。"
 ANT_military_training_idea: "南極における違法な軍事訓練"
 ANT_military_training_idea_desc: "冬季攻勢に向けて兵士を訓練するのに、南極以上に適した場所はない。"
