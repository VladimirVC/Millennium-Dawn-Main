 BLR_Kommunarka_invest: "Продажа продукции «Коммунарка» в России\n§W--------------§!\nМы получаем прибыль от продаж в §BРоссию§!, которая поступает в наш бюджет."
 BLR_Kommunarka_invest_cis: "Наша продукция сейчас распространяется практически по всему СНГ\n§W--------------§!\nМы получаем прибыль от продаж в §BРоссию§!,§BМолдову§!,§BАрмению§!,§BЛатвию§!,§BКазахстан§! и §BГрузию§! которая поступает в наш бюджет."
 BLR_privatisation_effect: "Последствия приватизации"
 BLR_privatisation_effect_desc: "Приватизация болезненна для любой страны бывшего СССР. Безработица, заброшенные предприятия, голод и жесткая экономическая перестройка — все это преследует тех, кто начал этот процесс после выхода из советской системы. Но все это временно, и рано или поздно мы это преодолеем."
 BLR_bann_aborts: "Запрет абортов"
 BLR_electoral_law: "Новый закон о выборах"
 BLR_electoral_law_desc: "Лукашенко отменил ограничение на количество выдвижений кандидатов в президенты."
 BLR_agro_industry: "Хорошо сохранившаяся агропромышленность"
