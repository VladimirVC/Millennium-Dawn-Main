 UKR_inner_policy_spu: "Polityka krajowa"
 UKR_inner_policy_spu1: "Polityka lewicowa"
 UKR_inner_policy_spu2: "Polityka lewicowa"
 UKR_inner_policy_spu3: "Polityka lewicowa"
