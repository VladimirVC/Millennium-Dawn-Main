 #Austria-Hungary
 form_AUSHUN_category: "Reform the Austro-Hungarian Empire"
 form_AUSHUN_category_desc: "The Austro-Hungarian Empire was a great power in Central Europe in the late 19th century and early 20th century. The nation was dissolved after its resounding defeat in the Great War. It broke apart into the nations of Czechia, Austria, Hungary, Slovakia, Slovenia, Bosnia, and portions of Ukraine, Poland, and Romania. It is time to reclaim the mantle that was lost so long ago. It is time to reform the Austro-Hungarian Empire."
 AUSHUN_integrate_start: "Begin forming [GetAUSHUNNameDef]"
 AUSHUN_integrate_start_desc: "The holdings of the Austro-Hungarian Empire have been reclaimed by our military and our politicians have started the work towards administering the new regions.\n\n"
 AUSHUN_integrate_AUS: "Integrate [GetAUSHUNNameAdj] [AUS.GetAdjective] Territories"
 AUSHUN_integrate_AUS_desc: "The corelands of the former Habsburg empire, Austria should be one of the main seats of power in our nation."
 AUSHUN_integrate_HUN: "Integrate [GetAUSHUNNameAdj] [HUN.GetAdjective] Territories"
 AUSHUN_integrate_HUN_desc: "The Kingdom of Hungary was the other half of the Dual Monarchy, a partner in the governance of the empire. Its integration is essential to restoring the imperial structure."
 AUSHUN_integrate_SLV: "Integrate [GetAUSHUNNameAdj] [SLV.GetAdjective] Territories"
 AUSHUN_integrate_SLV_desc: "The Slovene lands formed part of the Austrian crown lands, providing access to the Adriatic and serving as a bridge between Austria and the Balkans."
 AUSHUN_integrate_NORTHITA: "Integrate [GetAUSHUNNameAdj] North Italian Territories"
 AUSHUN_integrate_NORTHITA_desc: "The Italian territories of Lombardy-Venetia were once jewels of the Habsburg crown, rich in culture and commerce. Their return would restore Austria's influence over the Po Valley."
 AUSHUN_integrate_CRO: "Integrate [GetAUSHUNNameAdj] [CRO.GetAdjective] Territories"
 AUSHUN_integrate_CRO_desc: "Croatia was part of the Hungarian crown with significant autonomy. Its ports and strategic position along the Adriatic made it vital to the empire's naval power."
 AUSHUN_integrate_BOS: "Integrate [GetAUSHUNNameAdj] [BOS.GetAdjective] Territories"
 AUSHUN_integrate_BOS_desc: "Administered by Austria-Hungary since 1878 and formally annexed in 1908, Bosnia-Herzegovina's integration will secure our southern borders and extend our influence into the Balkans."
 AUSHUN_integrate_SLO: "Integrate [GetAUSHUNNameAdj] [SLO.GetAdjective] Territories"
 AUSHUN_integrate_SLO_desc: "The Slovak lands were an integral part of the Kingdom of Hungary, forming the mountainous northern frontier of the crown. Their reintegration strengthens our hold over the Carpathians."
 AUSHUN_integrate_AUSROM: "Integrate [GetAUSHUNNameAdj] Transylvanian Territories"
 AUSHUN_integrate_AUSROM_desc: "Transylvania was a historic crown land of Hungary, contested between Romanian and Hungarian populations. Control of this region secures the eastern approaches to the empire."
 AUSHUN_integrate_CZE: "Integrate [GetAUSHUNNameAdj] [CZE.GetAdjective] Territories"
 AUSHUN_integrate_CZE_desc: "The Bohemian crown lands were among the most industrialized and culturally rich territories of the empire. Prague stood as one of the great imperial cities, and its reintegration is crucial."
 AUSHUN_integrate_AUSPOL: "Integrate South Poland"
 AUSHUN_integrate_AUSPOL_desc: "Galicia was a crown land acquired through the partitions of Poland, bringing both economic resources and strategic depth to the northern frontier of the empire."
 AUSHUN_integrate_WESTUKR: "Integrate South-Western Ukraine"
 AUSHUN_integrate_WESTUKR_desc: "The eastern reaches of Galicia were home to Ruthenian populations and provided agricultural wealth. Their integration extends our influence into the Ukrainian borderlands."

 AUSHUN_update_flag: "Finish Forming [GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetAUSHUNNameDef], adopting its unified flag and name."
 is_AUSHUN: "Has formed [GetAUSHUNNameDef]"

 #Peru-Bolivian Confederation
 form_PBL_category: "Peru-Bolivian Confederation"
 form_PBL_category_desc: "The Peru-Bolivian Confederation was originally a short-lived entity in the early 19th century. It arose from the division of the Peruvian Republic and the civil wars of 1834 and 1835 to 1836 and included the state of Bolivian State. Modern talks are minimal, but it is nevertheless ever present in the political atmosphere of the Bolivian and Peruvian people. It is time to consider this new tomorrow for our people."

 PBL_integrate_start: "Begin forming [GetPBLNameDef]"
 PBL_integrate_start_desc: ""
 PBL_integrate_PRU: "Integrate [GetPBLNameAdj] [PRU.GetAdjective] Territories"
 PBL_integrate_PRU_desc: "Peru is the larger of the two nation-states in the confederation. It maintains the largest population, economy, and land area. Integrating Peru is a colossal undertaking, but seizing this state is a solid move for the interests of the new confederation."
 PBL_integrate_BOL: "Integrate [GetPBLNameAdj] [BOL.GetAdjective] Territories"
 PBL_integrate_BOL_desc: "Bolivia is one of the two main nation-states that founded the confederation. It is a smaller nation in land area, population, and economic prowess; however, this is no reason to discredit this nation. The mountains are rich with raw materials that are imperative for producing electronics and other intermediate goods. Integrating this nation solidifies another strong position for our now diversified economy."
 PBL_integrate_WESTPAR: "Integrate Western Paraguay"
 PBL_integrate_WESTPAR_desc: "Western Paraguay does not boast the same raw resources as Western Brazil or Northern Chile. Still, this area has plentiful farmlands and regions in which we can develop our new nation's industry."
 PBL_integrate_WESTBRA: "Integrate Western Brazil"
 PBL_integrate_WESTBRA_desc: "Western Brazil is home to indigenous people, plentiful resources, and much more. Integrating Western Brazil should help improve the standpoint of our nation and increase the land on which we can develop."
 PBL_integrate_NORTHCHL: "Integrate Northern Chile"
 PBL_integrate_NORTHCHL_desc: "The northern regions of Chile are ripe for integration, and we must bring these into the fold to assist us in our future goals."

 PBL_update_flag: "Finish Forming [GetPBLNameDef]"
 PBL_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetPBLNameDef], adopting its unified flag and name."
 is_PBL: "Has formed [GetPBLNameDef]"

 #Union of African States
 form_UAS_category: "Union of African States"
 form_UAS_category_desc: "The Union of African States was a short-lived political union between Ghana, Guinea, and Mali, formed in 1961 under the Pan-African vision of Kwame Nkrumah. Let us revive this dream of West African unity and forge a new powerful union."
