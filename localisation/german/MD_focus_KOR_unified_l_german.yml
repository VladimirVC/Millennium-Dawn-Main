 KOR_UN_security_council_seat: "Sitz im UN-Sicherheitsrat anstreben"
 KOR_UN_security_council_seat_desc: "Als ein Land, das nach dem Zweiten Weltkrieg von den USA und der Sowjetunion gewaltsam geteilt wurde, was zum ersten Stellvertreterkrieg im Kalten Krieg führte, sollte die Welt Korea eine gewisse Entschädigung gewähren. Ein ständiger Sitz im UN-Sicherheitsrat wäre eine gute Option.\n\n§Y[USA.GetFlag] Die Vereinigten Staaten von Amerika§!: [Root.recognises_UNSC_seat_USA]\n§Y[SOV.GetFlag] Die Russische Föderation§!: [Root.recognises_UNSC_seat_SOV]\n§Y[ENG.GetFlag] Das Vereinigte Königreich§!: [Root.recognises_UNSC_seat_ENG]\n§Y[FRA.GetFlag] Die Französische Republik§!: [Root.recognises_UNSC_seat_FRA]\n§Y[CHI.GetFlag] Die Chinesische Volksrepublik§! : [Root.recognises_UNSC_seat_CHI]"
