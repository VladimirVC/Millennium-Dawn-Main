 BOT_AI_BEHAVIOR: "@BOT 보츠와나"
 RULE_BOT_BDP_RULES: "보츠와나 민주당(BDP)의 정치적 요새  - 역사적"
 RULE_BOT_BDP_RULES_DESC: "보츠와나 민주당(BDP)은 비동맹 노선과 보수적 가치를 충실히 지키며 보츠와나에 대한 통치권을 계속 유지할 것입니다."
 RULE_BOT_POLITICAL_RAINBOW: "정치적 무지개"
 RULE_BOT_POLITICAL_RAINBOW_DESC: "보츠와나의 야당 세력이 보츠와나 민주당(BDP)의 지배력을 깨고 더 다당제적인 민주주의를 창출하려 시도할 것입니다."
 RULE_BOT_KGOSIKGOLO: "크고시크골로 (Kgosikgolo)"
 RULE_BOT_KGOSIKGOLO_DESC: "보츠와나의 전통 부족장들의 힘이 강화되며, 그중 한 명이 보츠와나의 크고시크골로(국왕)로 즉위할 것입니다."
 RULE_ALLOW_EDGY_FLAGS: "논란이 되는 깃발 허용"
 RULE_ALLOW_EDGY_FLAGS_BLOCKED_DESC: "논란이 될 수 있는 일부 깃발 옵션이 표시되지 않도록 합니다."
 RULE_ALLOW_EDGY_FLAGS_ALLOWED_DESC: "평소라면 검열되었을 논란의 여지가 있는 깃발 옵션을 허용합니다."
 RULE_SPREAD_INFLUENCE_AMOUNT_GAIN: "영향력 확장 획득량"
