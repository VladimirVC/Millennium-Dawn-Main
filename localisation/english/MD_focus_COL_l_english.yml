l_english:
 ### 2008 Andean Diplomatic Crisis ###
 colombia.1.t: "Operation Phoenix"
 colombia.1.d: "Colombian intelligence has located FARC second-in-command Raúl Reyes at a camp just across the Ecuadorian border. The military is requesting authorization for a cross-border strike to eliminate him. Success would be a major blow to the guerrillas, but violating Ecuador's sovereignty could trigger a diplomatic crisis."
 colombia.1.a: "Launch the cross-border strike"
 colombia.1.b: "Respect Ecuador's sovereignty"

 colombia.2.t: "Colombian Violation of Our Sovereignty"
 colombia.2.d: "Colombian armed forces have conducted a military operation on Ecuadorian soil, killing FARC commander Raúl Reyes in a cross-border airstrike. This is an unprecedented violation of our sovereignty."
 colombia.2.a: "Denounce Colombia publicly"
 colombia.2.b: "Handle this through back channels"

 colombia.3.t: "The Andean Crisis Escalates"
 colombia.3.d: "Colombia has violated Ecuador's sovereignty with a cross-border military strike. Ecuador has denounced the attack and is calling on regional allies for support. Venezuela must decide whether to stand with Ecuador or stay out of the dispute."
 colombia.3.a: "Support Ecuador and mobilize troops to the border"
 colombia.3.b: "Stay out of this"

 colombia.4.t: "The Andean Standoff"
 colombia.4.d: "A diplomatic crisis is unfolding between Colombia, Ecuador, and Venezuela following Colombia's cross-border strike against FARC. Ecuador and Venezuela are mobilizing troops. The United States must decide how to respond."
 colombia.4.a: "Back Colombia — they were fighting FARC"
 colombia.4.b: "Urge restraint from all parties"

 colombia.5.t: "Venezuela Mobilizes Against Us"
 colombia.5.d: "Venezuela has mobilized military forces to the Colombian border in solidarity with Ecuador. The situation is escalating rapidly and risks spiraling into armed conflict."
 colombia.5.a: "Prepare our defenses"

 colombia.6.t: "American Support"
 colombia.6.d: "The United States has publicly backed Colombia's actions against FARC, providing diplomatic cover and reaffirming the bilateral alliance."
 colombia.6.a: "We are grateful for Washington's support"

 colombia.7.t: "Rio Group Summit"
 colombia.7.d: "The Rio Group has convened an emergency summit to mediate the Andean crisis. Regional leaders are pressing for a diplomatic resolution. Colombia has the opportunity to apologize and de-escalate, or to stand firm on its right to pursue guerrillas across borders."
 colombia.7.a: "Apologize and shake hands"
 colombia.7.b: "Refuse to apologize"

 colombia.8.t: "Crisis Resolved"
 colombia.8.d: "Colombia has issued a formal apology at the Rio Group summit. The immediate threat of armed conflict has passed, though relations remain strained."
 colombia.8.a: "Accept the apology and stand down"

 colombia.9.t: "Andean Crisis De-escalation"
 colombia.9.d: "The Andean diplomatic crisis has been resolved at the Rio Group summit. Colombia has apologized for violating Ecuador's sovereignty. Troops can be withdrawn from the border."
 colombia.9.a: "Stand down"

 ### News Events ###
 colombia_news.1.t: "Colombia Strikes FARC in Ecuador"
 colombia_news.1.desc: "Colombian armed forces have carried out a cross-border airstrike in Ecuadorian territory, killing senior FARC commander Raúl Reyes. Quito has recalled its ambassador and declared the operation a flagrant violation of international law. Venezuela and Ecuador are mobilizing troops at the Colombian border."
 colombia_news.1.a: "We will not apologize for fighting terrorism"
 colombia_news.1.b: "This is an act of aggression against our nation"
 colombia_news.1.c: "Ecuador will not stand alone"
 colombia_news.1.d: "Colombia's fight against FARC must respect borders"
 colombia_news.1.e: "The Andes are on edge"
 colombia_news.1.f: "A regional crisis in South America"

 colombia_news.2.t: "Andean Crisis Resolved"
 colombia_news.2.desc: "The 2008 Andean diplomatic crisis has ended at the Rio Group summit after Colombia issued a formal apology for violating Ecuador's sovereignty. Regional leaders welcomed the handshake as a step back from the brink, though underlying tensions between the three nations remain."
 colombia_news.2.a: "Diplomacy prevails — for now"
 colombia_news.2.b: "We accept the apology and move forward"
 colombia_news.2.c: "The region can breathe again"
 colombia_news.2.d: "South America steps back from conflict"
