 CAN_multi_ethnic_nation: "多民族国家"
 CAN_multi_ethnic_nation_desc: "カナダは世界の多くの多民族国家の一つであり、イギリスとフランスの両方によって植民地化され、無数の先住民族、そして世界中の他国からの多数の移民が存在する。この分裂の最も顕著なものは、ケベックの人々と国の英語圏の残りとの間にある。もしこのギャップを埋め続けるなら、国家は指導の下で繁栄し、新しいカナダの舞台を整えるだろう。"
 CAN_renewable_energy_focus: "再生可能エネルギー"
 CAN_renewable_energy_focus_desc: "カナダは天然資源と未開発の再生可能エネルギーポテンシャルが豊富な土地であり、太陽光、風力、水力、または原子力であれ。増大する産業を助けるために、これらの戦略的再生可能資源に投資することにより、時代に追いつき成長し続けなければならない。"
