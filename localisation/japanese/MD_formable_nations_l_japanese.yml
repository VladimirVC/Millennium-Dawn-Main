 formable_buy.1.t: "Territorial Offer from [?formable_offer_buyer_id.GetNameDef]"
 formable_buy.1.d: "[?formable_offer_buyer_id.GetNameDef] has formally offered our government §H£treasury 10 billion§! for [?formable_offer_state_id.GetName] — a state they claim as a historical core.\n\nOur cabinet must decide: accept the payment and surrender the land, or reject the offer and keep our territory intact."
 formable_buy.1.a: "An offer we cannot refuse."
 formable_buy.1.b: "Our land is not for sale."
 formable_buy.2.t: "[?formable_offer_holder_id.GetNameDef] Accepts Our Offer"
 formable_buy.2.d: "[?formable_offer_holder_id.GetNameDef] has signed [?formable_offer_state_id.GetName] over to our administration. The funds have been transferred and the territory is now ours."
 formable_buy.2.a: "A worthy investment."
 formable_buy.3.t: "[?formable_offer_holder_id.GetNameDef] Rejects Our Offer"
 formable_buy.3.d: "[?formable_offer_holder_id.GetNameDef] has refused our offer for [?formable_offer_state_id.GetName]. The funds have been returned to our treasury, and the state remains under their control."
 formable_buy.3.a: "We will consider other options."
