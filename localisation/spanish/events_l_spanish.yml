 recognition.16.t: "¿Reconoces [FROM.GetName]?"
 recognition.16.d: "[FROM.GetNameDef] is formally requesting our diplomatic recognition. Whichever way we answer will be read as a statement of our position on their sovereignty."
 recognition.16.a: "We are not prepared to recognize them."
 recognition.16.b: "We recognize [FROM.GetName] as a sovereign state."
 recognition.18.t: "Recognize [FROM.GetName]?"
 recognition.18.d: "[FROM.GetNameDef]'s status is in question on the world stage. Every capital is taking a position. What is ours?"
 recognition.18.a: "We decline to recognize them."
 recognition.18.b: "Reconocemos la soberanía de [FROM.GetName]."
 recognition.31.t: "[FROM.GetName] busca nuestro reconocimiento"
 recognition.31.d: "[FROM.GetNameDef] has declared independence from our territory and is asking us to accept the new reality. Our answer will define our relationship with them, and signal our position to others."
 recognition.31.a: "We will never recognize this regime."
 recognition.31.b: "Reconocemos la independencia de [FROM.GetName]."
 UNSC.10.t: "Resolución del Consejo de Seguridad adoptada"
 UNSC.10.d: "The United Nations Security Council has voted to adopt a resolution against [?global.current_sc_vote_nation.GetNameWithFlag]. [?global.current_sc_vote_nation.UNSCGetResolutionTypePassDesc]"
 UNSC.10.a: "Anotado"
 UNSC.11.t: "Resolución del Consejo de Seguridad contra [This.GetNameWithFlag]"
 UNSC.11.d: "El Consejo de Seguridad de las Naciones Unidas ha votado a favor de adoptar una resolución contra [This.GetNameWithFlag]. [UNSCGetResolutionTypePassDesc]"
 UNSC.11.a: "Reconocemos la aprobación de esta resolución."
 UNSC_pass_type_1_desc: "Se ha adoptado una resolución de presión que exige el cese de todas las operaciones militares ofensivas en un plazo de §Y210 días§!. El incumplimiento conllevará nuevas sanciones."
 UNSC_pass_type_2_desc: "Se ha adoptado una resolución de sanciones económicas que impone penalizaciones comerciales y de investigación hasta que termine la amenaza ofensiva a la paz mundial."
 UNSC_pass_type_3_desc: "Se ha adoptado una resolución que restringe el acceso de voluntarios extranjeros. Cualquier nación que envíe voluntarios militares en violación de esta resolución enfrentará sanciones adicionales."
 UNSC_pass_type_4_desc: "Se ha adoptado una resolución de embargo de armas, cortando el acceso al mercado internacional de armas hasta que hayan terminado todos los conflictos ofensivos."
 COVID_events.0.t: "A New Virus"
 COVID_events.0.d: "A new virus has emerged from Wuhan. Multiple doctors report a rapidly spreading respiratory illness among the local population. Cases have grown from single digits to dozens in under a week."
 COVID_events.0.a: "Keep a close watch on this."
 COVID_events.1.t: "Whistleblower Doctors"
 COVID_events.1.d: "Several doctors have begun sharing reports about the new virus on social media, comparing it to SARS. Local authorities want guidance. We can silence the reports to prevent panic, or allow them to circulate and risk public alarm."
 COVID_events.1.a: "Silence them."
 COVID_events.1.b: "Let the truth come out."
 COVID_events.2.t: "Pandemic Confirmed"
 COVID_events.2.d: "The World Health Organization has confirmed the novel coronavirus as a global health emergency. Hospitals are overwhelmed and the virus is spreading beyond our borders. This will reshape our economy for years to come."
 COVID_events.2.a: "Brace for impact."
 COVID_events.3.t: "COVID-19 Emerges"
 COVID_events.3.d1: "A deadly new coronavirus has spread from China, where authorities initially suppressed reports of the outbreak. The delayed response has allowed the virus to spread unchecked across international borders."
 COVID_events.3.d2: "A deadly new coronavirus originating in China has been declared a global pandemic. Despite early warnings from Chinese doctors, the virus has spread rapidly across international borders."
 COVID_events.3.a: "Prepare our response."
 COVID_events.4.t: "The Pandemic Reaches [This.GetName]"
 COVID_events.4.d: "COVID-19 cases have been confirmed within our borders. Hospitals are bracing for a surge of patients and public fear is mounting. Economic activity is grinding to a halt as citizens self-isolate."
 COVID_events.4.a: "Lock everything down."
 COVID_events.5.t: "Global Supply Chains Collapse"
 COVID_events.5.d: "The pandemic has devastated international trade. Factory closures, port shutdowns, and transportation bottlenecks have created severe shortages of components and raw materials worldwide."
 COVID_events.5.a: "Stockpile whatever is left."
 pandemic_events.1.t: "Swine Flu Pandemic"
 pandemic_events.1.d: "A novel strain of H1N1 influenza has been identified in Mexico, spreading rapidly through the population. The World Health Organization is monitoring the situation closely as cases multiply and the virus threatens to cross international borders."
 pandemic_events.1.a: "Sound the alarm."
 pandemic_events.2.t: "H1N1 Reaches [This.GetName]"
 pandemic_events.2.d: "Cases of H1N1 swine flu have been confirmed within our borders. While less lethal than initially feared, the virus is spreading quickly and straining healthcare resources."
 pandemic_events.2.a: "Distribute masks and hope for the best."
 pandemic_events.3.t: "MERS Outbreak"
 pandemic_events.3.d: "A new coronavirus causing Middle East Respiratory Syndrome has been identified in our country. The virus appears to spread from camels to humans, with a disturbingly high fatality rate among those infected. Hospitals are preparing isolation wards."
 pandemic_events.3.a: "Contain the outbreak."
 pandemic_events.4.t: "Ebola Outbreak in West Africa"
 pandemic_events.4.d: "An outbreak of the Ebola virus has been confirmed in rural Guinea. The hemorrhagic fever is spreading through communities with terrifying speed, overwhelming local clinics. Without immediate intervention, the epidemic could engulf the entire region."
 pandemic_events.4.a: "God help us all."
 pandemic_events.5.t: "Ebola Spreads to [This.GetName]"
 pandemic_events.5.d: "Ebola cases have been confirmed within our borders as the West African epidemic breaches containment. Healthcare workers are at extreme risk and international aid organizations are scrambling to respond."
 pandemic_events.5.a: "We need help. Now."
 pandemic_events.6.t: "Ebola Returns in the Congo"
 pandemic_events.6.d: "A new Ebola outbreak has erupted in the eastern provinces of the Democratic Republic of the Congo. Armed conflict in the region is complicating containment efforts, as health workers face attacks from militia groups suspicious of outsiders."
 pandemic_events.6.a: "Deploy health teams under armed escort."
 pandemic_events.7.t: "MERS Cases in [This.GetName]"
 pandemic_events.7.d: "Cases of Middle East Respiratory Syndrome have been detected in our country, likely carried by travelers from Saudi Arabia. Health authorities are establishing screening protocols at airports and hospitals."
 pandemic_events.7.a: "Screen every traveler."
 pandemic_events.8.t: "Ebola Cases in [This.GetName]"
 pandemic_events.8.d: "Ebola cases have crossed the border from the Democratic Republic of the Congo. Cross-border movement in the region makes containment extremely difficult, and health workers are racing to trace contacts."
 pandemic_events.8.a: "Close the borders immediately."
 pandemic_events.9.t: "MERS Outbreak in South Korea"
 pandemic_events.9.d: "A single patient returning from the Middle East has triggered a devastating hospital super-spreader event. The virus is tearing through healthcare facilities as patients and staff spread it between wards. Over a hundred cases have been confirmed and dozens of deaths reported, exposing critical failures in our infection control protocols."
 pandemic_events.9.a: "Shut down every affected hospital."
 influence.60.t: "A Coup in [event_target:coup_contest_victim.GetName]"
 influence.60.d: "Our intelligence services confirm what many suspected: [event_target:coup_contest_sender.GetNameWithFlag] has orchestrated a successful §Rcoup§! in [event_target:coup_contest_victim.GetNameWithFlag], installing a new regime sympathetic to their interests. We hold significant §Hinfluence§! in [event_target:coup_contest_victim.GetName] of our own — enough that we are not helpless here, if we choose to act. Our options run from a diplomatic denunciation to clandestine support for the old order. Each carries costs. Doing nothing may cost us more."
 influence.60.a: "Denounce publicly and sanction [event_target:coup_contest_sender.GetName]"
 influence.60.f: "Impose targeted §Heconomic sanctions§! on [event_target:coup_contest_sender.GetName]"
 influence.60.b: "Back the old opposition clandestinely and push our own influence"
 influence.60.e: "§RMilitary intervention§! — arm the resistance and posture against [event_target:coup_contest_sender.GetName]"
 influence.60.c: "Accept the new reality and move on"
 influence.61.t: "Civil War in [event_target:coup_contest_victim.GetName]"
 influence.61.d: "[event_target:coup_contest_sender.GetNameWithFlag]'s coup attempt has blown up in their face: [event_target:coup_contest_victim.GetNameWithFlag] is in §Rcivil war§!, and the old regime is still fighting. Our §Hinfluence§! gives us a real stake in which side prevails. Arm the old government, and we may prevent [event_target:coup_contest_sender.GetName] from cementing their gains. Send only money, and we hedge. Commit fully, and we pull the strings. Stay out, and we let others decide the outcome."
 influence.61.a: "Arm the old regime — weapons, equipment, and political backing"
 influence.61.b: "Quietly send economic aid to keep the old regime afloat"
 influence.61.e: "§RFull military intervention§! — commit to the old regime's victory"
 influence.61.c: "Stay out of the civil war"
 News_influence.7.t: "[FROM.GetNameWithFlag] Condemns [event_target:coup_contest_sender.GetNameWithFlag]"
 News_influence.7.d: "[FROM.GetNameWithFlag] issued a scathing condemnation today of [event_target:coup_contest_sender.GetNameWithFlag]'s alleged role in the recent coup in [event_target:coup_contest_victim.GetNameWithFlag]. Diplomatic protests, targeted §Hsanctions§!, and a hardening of relations are all on the table. [event_target:coup_contest_sender.GetName]'s foreign ministry dismissed the accusations as 'baseless political theater,' but international opinion is hardening fast."
 News_influence.7.a: "An opening shot in the influence war"
 News_influence.8.t: "[FROM.GetNameWithFlag] Backs the Old Opposition in [event_target:coup_contest_victim.GetName]"
 News_influence.8.d: "Intelligence sources confirm what observers have suspected for weeks: [FROM.GetNameWithFlag] is quietly channeling §Hfunding§! and §Hpolitical support§! to the pre-coup opposition inside [event_target:coup_contest_victim.GetNameWithFlag]. Democratic factions inside the country are suddenly better organized, better funded, and noticeably more vocal. The §Hcoup regime§! in [event_target:coup_contest_victim.GetName] has called the activity 'an unacceptable foreign intervention' — the same activity they engaged in to take power."
 News_influence.8.a: "The contest for [event_target:coup_contest_victim.GetName] is not over"
 News_influence.9.t: "[FROM.GetNameWithFlag] Arms the Old Regime of [event_target:coup_contest_victim.GetName]"
 News_influence.9.d: "With [event_target:coup_contest_victim.GetNameWithFlag] engulfed in §Rcivil war§! after [event_target:coup_contest_sender.GetNameWithFlag]'s botched coup, [FROM.GetNameWithFlag] has dropped any pretense of neutrality. Cargo flights from [FROM.GetName] are landing in government-held territory loaded with §Hsmall arms§!, §Hvehicles§!, and — according to multiple sources — uniformed 'advisors'. The proxy war is now out in the open."
 News_influence.9.a: "A long fight ahead"
 News_influence.10.t: "[FROM.GetNameWithFlag] Opens a Military Intervention over [event_target:coup_contest_victim.GetName]"
 News_influence.10.d: "In the most escalatory response yet to [event_target:coup_contest_sender.GetNameWithFlag]'s coup in [event_target:coup_contest_victim.GetNameWithFlag], [FROM.GetNameWithFlag] has announced a formal §Rmilitary intervention§!. The language is measured, but the substance is not: forward-deployed units, standing orders to assist the pre-coup government, and open contempt for [event_target:coup_contest_sender.GetName]'s fait accompli. Global markets are in turmoil. The UN Security Council has been called into emergency session."
 News_influence.10.a: "The line has been crossed"
 influence.52.e: "§HModern Equipment§! Package (heavy AT, SAM, drones)"
 influence.52.a_preview_tt: "Send small arms, light anti-tank weapons, and anti-aircraft equipment"
 influence.52.b_preview_tt: "Send main battle tanks, amphibious / specialized tanks, and utility vehicles"
