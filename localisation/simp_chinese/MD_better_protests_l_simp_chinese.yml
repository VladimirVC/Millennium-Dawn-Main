 protests_main_text: "下表显示了公民对您的期望以及您目前的资金投入。红色信息流中存在抗议漂移方面的空白；弥合这些空白是缓解紧张局势最直接的方法。[fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "打开§Y抗议系统§!菜单"
 OPEN_PROTESTS_BUTTON_TT: "打开§Y抗议系统§!面板。查看每月变化来源、当前抗议规模和激进化程度，以及公民对您的支出期望水平。"
 PROTEST_TITLE: "§Y抗议系统§!"
 CLOSE_PROTEST_SCREEN: "关闭§Y抗议系统§!菜单"
 expected_social_spending_tt: "公民期望的§Y社会支出§!水平由法律、国家精神、技术和人均GDP决定。每个整数代表一个水平，并受该类别法律规定的上限约束。\n\n§Y期望水平：§!§Y[expected_social_spending_law_name]§!（当前[?expected_welfare_spending|0Y]）\n\n§Y击穿§!\n法律，国家精神，技术：[?ROOT.modifier@expected_welfare_modifier]\n人均GDP：[calculate_gdp_c_modifier_welfare_spending]\n"
 expected_health_spending_tt: "公民期望的§Y医疗保健支出§!水平由法律、国家精神、技术和人均GDP决定。每个整数代表一个水平，并受该类别法律规定的上限约束。\n\n§Y期望水平：§!§Y[expected_healthcare_spending_law_name]§!（当前[?expected_health_spending|0Y]）\n\n§Y击穿§!\n法律，国家精神，技术：[?ROOT.modifier@expected_healthcare_modifier]\n人均GDP：[calculate_gdp_c_modifier_healthcare_spending]\n"
 expected_adm_spending_tt: "公民期望的§Y行政支出§!水平由法律、国家精神、技术和人均GDP决定。每个整数代表一个水平，并受该类别法律规定的上限约束。\n\n§Y期望水平：§!§Y[expected_bureau_spending_law_name]§!（当前[?expected_adm_spending|0Y]）\n\n§Y击穿§!\n法律，国家精神，技术：[?ROOT.modifier@expected_adm_modifier]\n人均GDP：[calculate_gdp_c_modifier_adm_spending]\n"
 expected_edu_spending_tt: "公民期望的§Y教育支出§!水平由法律、国家精神、技术和人均GDP决定。每个整数代表一个水平，并受该类别法律规定的上限约束。\n\n§Y期望水平：§!§Y[expected_education_spending_law_name]§!（当前[?expected_edu_spending|0Y]）\n\n§Y击穿§!\n法律，国家精神，技术：[?ROOT.modifier@expected_education_modifier]\n人均GDP：[calculate_gdp_c_modifier_education_spending]\n"
 expected_police_spending_tt: "公民期望的§Y警力支出§!水平由法律、国家精神、技术和人均GDP决定。每个整数代表一个水平，并受该类别法律规定的上限约束。\n\n§Y期望水平：§!§Y[expected_police_spending_law_name]§!（当前[?expected_police_spending|0Y]）\n\n§Y击穿§!\n法律，国家精神，技术：[?ROOT.modifier@expected_police_modifier]\n人均GDP：[calculate_gdp_c_modifier_police_spending]\n"
 expected_defence_spending_tt: "公民期望的§Y军事支出§!水平由法律、国家精神、技术和人均GDP决定。每个整数代表一个水平，并受该类别法律规定的上限约束。\n\n§Y期望水平：§!§Y[expected_mil_spending_law_name]§!（当前[?expected_military_sp|0Y]）\n\n§Y击穿§!\n法律，国家精神，技术：[?ROOT.modifier@expected_mil_modifier]\n人均GDP：[calculate_gdp_c_modifier_military_spending]\n"
 expected_law_mechanic_tt: "§Y读取支出表格§!\n"
 EL_green_square_explanation_tt: "§G绿§!：公众预期获得的支出。每增加一块绿色方块，就意味着公民少了一个抗议的理由。"
 EL_blue_square_explanation_tt: "§B蓝§!：支出超出民众预期。每月花费不能提供任何抗议减缓。"
 EL_red_square_explanation_tt: "§R红§!：我们§R未能满足§!预期支出。以上漂移分解图中，每个红色方块都对应§Y支出影响§!线。"
 EL_white_square_explanation_tt: "白色：既未预期也未获得资金支持的法律层面，一直处于闲置状态，直到公民的期望值上升到足够高，提出要求为止。"
 MD_protests_state_calm_text: "§G平息§!：没有正在进行的动乱任务。"
 MD_protests_state_calm_tt: "目前没有警告或叛乱任务。当§Y抗议规模§!高于20时，此面板将保持可见。请在危机触发前，根据上升趋势采取行动。"
 MD_protests_state_warning_text: "§Y警告§!：抗议运动正在形成。"
 MD_protests_state_warning_tt: "§Y即将到来的抗议§!任务已激活。如果任务超时，将爆发全面叛乱。要么通过稳定引发警告的经济和政治状况来解决问题，要么通过§Y安抚抗议者§!和§Y先发制人的改革§!来争取时间并削弱其力量。"
 MD_protests_state_revolt_text: "§R叛乱§!：抵抗运动在核心地区兴起。"
 MD_protests_state_revolt_tt: "§Y即将到来的叛乱§!任务已激活。当所有§Y核心地区§!均无抵抗运动时，任务完成。如果任务超时，内战将爆发。运用绥靖、镇压和争取民心等决策来控制局势。"
 MD_protests_state_cooldown_text: "§B冷却§!：从危机中恢复。"
 MD_protests_state_cooldown_tt: "抗议危机后的恢复期。§Y1000§!天内无法启用新的抗议任务。利用这段喘息之机重新平衡支出，重建社会稳定，以免压力再次攀升。"
 MD_drift_diagnosed_text: "[MD_top_resistant_state_display]"
 MD_top_resistant_state_active: "§Y最差的地区：§![event_target:MD_top_resistant_state_scope.GetName] (§R[?MD_top_resistant_state_value|0]%§!)"
 MD_top_resistant_state_none: "§Y最差的地区：§!§G无§!"
 MD_drift_diagnosed_tt: "§Y抵抗§!规模最高的核心地区。向该地区投入决议和驻军，以清除其抵抗力量；只有当§Y所有§!核心地区都§G无抵抗力量§!时，§Y即将到来的叛乱§!任务才能完成。\n\n当没有核心地区存在抵抗力量时，§G不显示任何内容。§!"
 MD_drift_header_text: "§Y月度漂移来源§!（最后一跳）："
 MD_drift_spending_row_text: "支出影响：[MD_drift_spending_value_colored]"
 MD_drift_spending_value_red: "§R+[?drift_spending_last|1]§!"
 MD_drift_spending_value_green: "§G[?drift_spending_last|1]§!"
 MD_drift_spending_value_yellow: "§Y[?drift_spending_last|1]§!"
 MD_drift_spending_tt: "公民期望社会福利、医疗、教育、警务、行政和军事开支达到一定水平。支出不足会加剧抗议活动；支出过多虽然能缓解紧张局势，但会耗尽国库。燃料耗尽时，固定值§R+1§!。\n\n提高下面支出表中标有红色的法律，以弥补最大的资金缺口。§Y安抚抗议者§!和§Y先发制人的改革§!可以为你重新调整局面争取时间。"
 MD_drift_stability_row_text: "低稳定度+选举：§R+[?drift_stability_last|1]§!"
 MD_drift_stability_tt: "稳定度已降至§Y20%§!以下，而政府仍举行选举，因此选民走上街头。\n\n通过提供稳定性的国策和事件，并暂停拖累稳定性的昂贵军事建设。§Y承诺：为公民减税§!将在300天内提供§G+5%§!稳定度，让其他所有稳定度收益更快地落地。非民选政府将不会有此项举措，除非你的政治路线可以改变。"
 MD_drift_interest_row_text: "高利率：§R+[?drift_interest_last|1]§!"
 MD_drift_interest_tt: "央行利率高于§Y8.9%§!。贷款成本上升，企业裁员，公众将矛头指向政府。\n\n在§Y资金§!选项卡中降低利率。​​低于§G8.9%§!的利率将消除此影响因素。利率高于阈值越高，每月受到的影响就越大。加息周期要短，并且仅用于应对通货膨胀。"
 MD_drift_recession_row_text: "经济衰退：§R+[?drift_recession_last|1]§!"
 MD_drift_recession_tt: "经济正处于衰退期。每个月都会增加一次随机触发，平均每次触发会使抗议规模增加§R+3§!。\n\n通过消除经济体系中的§Y衰退§!国家精神，就能彻底消除这一驱动因素。关注经济面板的复苏事件，并依靠§Y安抚抗议者§!和§Y先发制人的改革§!来度过最糟糕的时期。"
 MD_drift_depression_row_text: "萧条：§R+[?drift_depression_last|1]§!"
 MD_drift_depression_tt: "经济正处于萧条期，比衰退更严重。每个月都会随机增加一次触发，平均会使抗议规模增加§R+4§! ，比衰退期的影响还要严重三分之一左右。\n\n通过消除经济体系中的§Y萧条§!国家精神，就能消除这一驱动因素。如果能够完成§Y承诺：减税§!和§Y承诺：就业计划§!，就能减轻抗议压力；而§Y安抚抗议者§!和§Y先发制人的改革§!，则可以争取时间。"
 MD_drift_war_row_text: "战争疲劳：§R+[?drift_war_last|1]§!"
 MD_drift_war_tt: "我们已经进行了超过§Y36§!个月的战争，民众已经精疲力竭。每增加24个月的战争时间，每月抗议规模就增加§R+1§! 。四年战争将增加§R+2§!，六年战争将增加§R+3§!，没有平台期。\n\n战争结束后，这一驱动因素会立即降至零。如果叛乱已经开始，§Y争取民心§!战役会在你逐步结束战争的同时提升民众的合作度。"
 MD_drift_corruption_row_text: "政治联盟软弱：§R+[?drift_corruption_last|1]§!"
 MD_drift_corruption_tt: "当腐败国家精神激活或选举暂停时，执政联盟的实力低于§Y30%§!。执政联盟越弱，受到的冲击就越大。执政联盟实力为§Y10%§!时，每月增加§R+0.2§!；执政联盟实力为§Y20%§!时，每月增加§R+0.1§!。\n\n通过反腐败国策和活动降低腐败国家精神的影响。通过意识形态协议获得执政联盟支持。恢复选举制度可以彻底消除这一驱动因素。§Y承诺：税收减免§!成功后可使执政联盟实力提升§G+3%§!，在局势稳定上升时非常有用。"
 MD_drift_ct_row_text: "反恐政策：§R+[?drift_ct_last|1]§!"
 MD_drift_ct_tt: "网络监控和抗议逮捕行动正在进行中。镇压行动每月会随机增加一次冲击，使抗议规模平均§R+5§!。这是所有随机冲击中最严厉的一种。\n\n这些措施旨在作为短期工具。一旦当前任务结束，或者损失持续下去，就应移除反恐怖国家精神。在危机期间，将反恐怖与§Y承诺：紧急警务经费§!结合使用，可以叠加降低抵抗增长的效果。"
 MD_drift_passive_row_text: "被动冷却：§G[?drift_passive_last|1]§!"
 MD_drift_passive_tt: "公众注意力会转移。每个月都有§Y50%§!的概率使抗议规模§G-2§!，平均每年大约§G-12§!。\n\n通过§Y安抚抗议者§!和§Y先发制人的改革§!来争取时间，让被动降温发挥大部分作用。"
 MD_drift_total_text: "§Y上一个月净值：§! [MD_drift_total_value_colored]"
 MD_protests_strength_readout_text: "§Y规模：§! §Y[?protest_strength|0]§!§Y / 100   ·   激进度：§! §Y[?protest_radicalisation|0]§!§Y / 10§!"
 MD_protests_strength_readout_tt: "影响抗议活动生命周期的两个指标。\n\n§Y抗议规模§!（当前[?protest_strength|0]/ 100）衡量的是一个国家距离危机有多近。\n\n§Y阈值§!\n高于§Y20§!：判定动荡局势开始生效。\n高于§Y50§!：警告任务可以触发。\n高于§Y80§!：国家面临全面叛乱的风险。\n\n§Y如何改变§!\n每月因活跃漂移源而上涨（见上文细分）。\n当没有驱动因素活动时将被动下降，以及通过§Y安抚抗议者§!、§Y先发制人的改革§!和成功完成承诺任务而下降。\n\n§Y抗议激进化§!（当前[?protest_radicalisation|0]/ 10）程度反映了危机事件爆发时的严重程度。在持续的抗议活动中，激进化程度缓慢上升；而当国家恢复正常时，激进化程度则会下降。"
 MD_drift_total_value_red: "§R+[?drift_total_last|1]§!"
 MD_drift_total_value_green: "§G[?drift_total_last|1]§!"
 MD_drift_total_value_yellow: "§Y[?drift_total_last|1]§!"
 MD_drift_total_tt: "所有主动漂移源加上被动冷却的总和。正值表示抗议规模正在上升；负值表示抗议规模正在下降。\n\n要扭转净负值局面，就要瞄准上面所示的最大驱动因素。§Y先发制人的改革§!和§Y安抚抗议者§!，为结构性改革争取时间。\n\n通过三项§Y承诺§!决议设定一个200至350天的目标。成功则叛乱任务获得更多时间；失败则因违背承诺而受到轻微惩罚。§Y承诺：紧急警务经费§!持续200天，要求你将抗议强度降低§G10§!，并为叛乱任务争取§G+75§!天。§Y承诺：税收减免§!持续300天，要求您将稳定度提高§G5%§!，并为叛乱任务争取§G+100§!天。§Y承诺：就业计划§!持续350 天，要求您将失业率降低§G1.5%§!，并为叛乱任务争取§G+120§!天。"
 MD_protests_revolt_states_text: "§R核心地区仍然抵抗：§! §Y[?cores_resisting_count|0]§!"
 MD_protests_revolt_states_tt: "当该值达到§G0§!时，§Y即将到来的叛乱§!任务完成。每个抵抗区通过该地区的合作度>50%且抵抗<40%来清除，由抗议事件链随机解决。"