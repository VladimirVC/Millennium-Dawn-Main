 form_AVG_category: "Angevin Empire"
 form_AVG_category_desc: "The Angevin Empire was the height of European power in the 12th and 13th centuries, with the Plantagenet dynasty ruling over England, large parts of France, and other territories. The empire was marked by its cultural and political influence across the continent. Reviving the Angevin Empire would be a monumental achievement, uniting these historic lands under one banner once again."
