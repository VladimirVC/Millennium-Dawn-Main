l_spanish:
 north_korea_focus: "Árbol de Enfoque de Corea del Norte"
 NKO_solve_the_arduous_march: "Resolver la Marcha Ardua"
 NKO_solve_the_arduous_march_desc: "La Marcha Ardua ha tenido un costo enorme para nuestra nación. Para asegurar el futuro de nuestra gente, debemos implementar medidas estratégicas para superar este período de dificultades y llevar a nuestro país a la prosperidad. Esto incluye mejorar la producción agrícola, asegurar ayuda humanitaria y reformar nuestras políticas internas para garantizar estabilidad y crecimiento."
 NKO_promote_songun: "Promover Songun"
 NKO_promote_songun_desc: "El Songun, o política de 'el ejército primero', prioriza el Ejército Popular de Corea en nuestros asuntos políticos y económicos. Al promover Songun, aseguramos la seguridad de nuestra nación y fortalecemos el papel del ejército en salvaguardar nuestra soberanía y guiar nuestra construcción socialista."
 NKO_humanitarian_aid: "Ayuda Humanitaria"
 NKO_humanitarian_aid_desc: "En estos tiempos difíciles, aceptar ayuda humanitaria de organizaciones internacionales y naciones amigas proporcionará recursos vitales para aliviar el sufrimiento de nuestra gente. Esta ayuda será cuidadosamente gestionada para asegurar que llegue a quienes la necesitan y apoye nuestros esfuerzos de recuperación."
 NKO_food_production_boost: "Impulso a la Producción de Alimentos"
 NKO_food_production_boost_desc: "Impulsar la producción de alimentos es esencial para garantizar el bienestar de nuestros ciudadanos. Al invertir en tecnologías agrícolas, mejorar los sistemas de riego y apoyar a nuestros agricultores, podemos aumentar los rendimientos de los cultivos y asegurar un suministro estable de alimentos para nuestra nación."
 NKO_healthcare_reform: "Reforma de la Atención de la Salud"
 NKO_healthcare_reform_desc: "Reformar nuestro sistema de atención de la salud es crucial para mejorar la salud y la productividad de nuestra gente. Nos centraremos en modernizar las instalaciones médicas, capacitar a los profesionales de la salud y garantizar el acceso a medicamentos y tratamientos esenciales."
 NKO_punish_corruption: "Castigar la Corrupción"
 NKO_punish_corruption_desc: "La corrupción socava nuestros principios socialistas y obstaculiza el progreso nacional. Lanzaremos una campaña rigurosa para identificar, exponer y castigar a los funcionarios corruptos, asegurando la transparencia e integridad en nuestro gobierno e instituciones."
 NKO_infrastructure_development: "Desarrollo de Infraestructura"
 NKO_infrastructure_development_desc: "Desarrollar nuestra infraestructura es crucial para el crecimiento económico y el desarrollo nacional. Invertiremos en redes de transporte, producción de energía y sistemas de comunicación para crear una base sólida para la futura prosperidad."
 NKO_agricultural_funding: "Financiamiento Agrícola"
 NKO_agricultural_funding_desc: "Proporcionar financiamiento y apoyo a nuestro sector agrícola mejorará la seguridad alimentaria y los medios de vida rurales. Nos centraremos en la mecanización, mejores semillas y mejores técnicas agrícolas para aumentar la productividad."
 NKO_fertiliser_factory: "Fábrica de Fertilizantes"
 NKO_fertiliser_factory_desc: "Construir una fábrica de fertilizantes de última generación mejorará significativamente la fertilidad del suelo y los rendimientos de los cultivos. Esta inversión asegurará que nuestros agricultores tengan los recursos que necesitan para cultivar abundantes cosechas."
 NKO_nutrition_programs: "Programas de Nutrición"
 NKO_nutrition_programs_desc: "Implementar programas de nutrición a nivel nacional abordará la desnutrición y mejorará la salud pública. Nos centraremos en proporcionar dietas equilibradas, especialmente para niños y poblaciones vulnerables, para asegurar un futuro más saludable."
 NKO_land_reclamation: "Recuperación de Tierras"
 NKO_land_reclamation_desc: "Recuperar tierras para uso agrícola e industrial ampliará nuestra base de recursos y apoyará el crecimiento económico. Emprenderemos proyectos ambiciosos para convertir tierras baldías en áreas productivas."
 NKO_Renovate_water_supply_facilities: "Renovar Instalaciones de Suministro de Agua"
 NKO_Renovate_water_supply_facilities_desc: "Renovar y expandir nuestras instalaciones de suministro de agua es esencial para la salud pública y el desarrollo industrial. Aseguraremos un acceso confiable y limpio al agua para todos los ciudadanos e industrias."
 NKO_acquiesce_jangmadang: "Aceptar Jangmadang"
 NKO_acquiesce_jangmadang_desc: "Reconociendo la importancia de Jangmadang, o el mercado negro, en nuestra economía, permitiremos sus operaciones bajo condiciones reguladas. Esto estimulará la actividad económica y proporcionará bienes esenciales a nuestra gente."
 NKO_bureau_39: "Oficina 39"
 NKO_bureau_39_desc: "La Oficina 39 es responsable de generar moneda fuerte para el régimen a través de diversos medios. Fortalecer esta oficina mejorará nuestras capacidades económicas y asegurará un flujo constante de recursos para apoyar proyectos nacionales."
 NKO_admit_the_donju: "Admitir a los Donju"
 NKO_admit_the_donju_desc: "Los Donju, o empresarios ricos, juegan un papel importante en nuestra economía. Al reconocer su influencia e integrar sus recursos, podemos aprovechar su potencial para el desarrollo nacional mientras mantenemos el control sobre sus actividades."
 NKO_government_directed_drug_manufacture: "Fabricación de Drogas Dirigida por el Gobierno"
 NKO_government_directed_drug_manufacture_desc: "La producción controlada de medicamentos bajo supervisión gubernamental creará nuevas fuentes de ingresos. Esta producción controlada se utilizará para generar fondos para proyectos nacionales y mejorar nuestra estabilidad financiera."
 NKO_smuggling_operations: "Hackear Bancos Extranjeros"
 NKO_smuggling_operations_desc: "Debemos usar nuestra influencia en países enemigos, así como las capacidades tecnológicas de nuestros hackers, para irrumpir en los sistemas bancarios de nuestros enemigos."
 NKO_counterfeit_production: "Producción de Falsificaciones"
 NKO_counterfeit_production_desc: "Participar en la producción de bienes falsificados, incluidas monedas y artículos de lujo, proporcionará moneda extranjera y apoyará nuestra economía. Estas operaciones se llevarán a cabo con el máximo secreto para evitar repercusiones internacionales."
 NKO_huichon: "Huichon"
 NKO_huichon_desc: "Desarrollar la ciudad industrial de Huichon aumentará nuestra capacidad de fabricación. Nos centraremos en construir infraestructura clave y atraer trabajadores calificados para transformar Huichon en un centro de actividad económica."
 NKO_huichon_hydroelectric_power: "Energía Hidroeléctrica de Huichon"
 NKO_huichon_hydroelectric_power_desc: "Construir plantas de energía hidroeléctrica en Huichon mejorará nuestra seguridad energética. Estos proyectos proporcionarán energía limpia y renovable y apoyarán nuestro crecimiento industrial."
 NKO_manpo_line_railway: "Ferrocarril de la Línea Manpo"
 NKO_manpo_line_railway_desc: "Construir el ferrocarril de la Línea Manpo mejorará la infraestructura de transporte y facilitará el movimiento de bienes y personas. Este ferrocarril será un enlace vital en nuestra red logística nacional."
 NKO_coal_energy_supermacy: "Supremacía de Energía de Carbón"
 NKO_coal_energy_supermacy_desc: "Centrarse en la energía del carbón asegurará un suministro de energía confiable y abundante para nuestras industrias y hogares. Invertiremos en modernizar las minas de carbón y las plantas de energía para maximizar la eficiencia y la producción."
 NKO_ordnance_manufacture: "Fabricación de Municiones"
 NKO_ordnance_manufacture_desc: "Mejorar nuestras capacidades de fabricación de municiones es crucial para la defensa nacional. Expandiremos las instalaciones de producción e mejoraremos las tecnologías para asegurar que nuestro ejército esté bien equipado."
 NKO_huichon_hard_glassware_factory: "Fábrica de Cristalería Dura de Huichon"
 NKO_huichon_hard_glassware_factory_desc: "Establecer una fábrica de cristalería dura en Huichon apoyará nuestra producción industrial y proporcionará materiales de alta calidad para diversas aplicaciones."
 NKO_huichon_silk_mill: "Molino de Seda de Huichon"
 NKO_huichon_silk_mill_desc: "Construir un molino de seda en Huichon apoyará nuestra industria textil y creará empleos. Esta inversión mejorará nuestra capacidad para producir telas y prendas finas."
 NKO_huichon_machine_tool_factory: "Fábrica de Herramientas Máquina de Huichon"
 NKO_huichon_machine_tool_factory_desc: "La creación de una fábrica de máquinas herramienta en Huichon mejorará nuestra capacidad de fabricación. Esta instalación producirá maquinaria y equipos esenciales para nuestras industrias."
 NKO_bureau_38: "Oficina 38"
 NKO_bureau_38_desc: "La Oficina 38 es responsable de gestionar los recursos y fondos del estado. Fortalecer esta oficina asegurará una asignación eficiente de recursos y apoyará proyectos de desarrollo nacional."
 NKO_sanction_evasions: "Evadir Sanciones"
 NKO_sanction_evasions_desc: "Implementar estrategias sofisticadas para evadir sanciones internacionales fortalecerá nuestra economía. Utilizaremos operaciones clandestinas para asegurar bienes y recursos financieros vitales."
 NKO_international_black_market: "Oficina 121"
 NKO_international_black_market_desc: "La Oficina 121 es una agencia de ciberguerra de Corea del Norte y la unidad principal de la Oficina de Reconocimiento General del ejército de Corea del Norte. Realiza operaciones cibernéticas ofensivas, incluidos el espionaje y el ciberdelito financiero habilitado por cibernética. Según las autoridades estadounidenses, la RGB gestiona operaciones clandestinas y tiene seis oficinas."
 NKO_technological_boost: "Impulso Tecnológico"
 NKO_technological_boost_desc: "Centrarnos en los avances tecnológicos impulsará la innovación y el crecimiento económico. Invertiremos en investigación y desarrollo para mantenernos al día con las tendencias tecnológicas mundiales."
 NKO_purchase_stolen_tech_blueprint: "Comprar Planos de Tecnología Robada"
 NKO_purchase_stolen_tech_blueprint_desc: "Adquirir planos de tecnología robada nos dará una ventaja en el desarrollo de tecnologías avanzadas. Esto acelerará nuestros esfuerzos de investigación e innovación."
 NKO_bribe_researchers_at_institues: "Sobornar a Investigadores en Institutos"
 NKO_bribe_researchers_at_institues_desc: "Sobornar a investigadores en institutos clave acelerará nuestro progreso tecnológico. Esta estrategia encubierta nos permitirá obtener conocimientos y avances valiosos."
 NKO_black_market_innovation: "Innovación del Mercado Negro"
 NKO_black_market_innovation_desc: "Aprovechar el ingenio del mercado negro mejorará nuestras capacidades tecnológicas. Apoyaremos a innovadores subterráneos para desarrollar nuevas y poco convencionales tecnologías."
 NKO_national_recovery_plan: "Plan Nacional de Recuperación"
 NKO_national_recovery_plan_desc: "Implementar un plan nacional de recuperación integral estabilizará y fortalecerá nuestra economía. Este plan se centrará en reconstruir infraestructura crítica, revitalizar industrias y garantizar el bienestar social."
 NKO_emphasis_self_reliance: "Énfasis en la Autosuficiencia"
 NKO_emphasis_self_reliance_desc: "Centrarse en la autosuficiencia reducirá nuestra dependencia de la ayuda y las importaciones extranjeras. Promoveremos la producción nacional y la utilización de recursos."
 NKO_financial_sector_reform: "Reforma del Sector Financiero"
 NKO_financial_sector_reform_desc: "Reformar el sector financiero mejorará la estabilidad económica. Nos centraremos en mejorar las instituciones financieras, mejorar los marcos regulatorios y fomentar prácticas financieras responsables."
 NKO_modernization_efforts: "Esfuerzos de Modernización"
 NKO_modernization_efforts_desc: "Modernizar nuestras industrias aumentará la productividad y la eficiencia. Invertiremos en nuevas tecnologías, actualizaremos las instalaciones existentes y capacitaremos a nuestra fuerza laboral para adaptarse a los métodos de producción modernos."
 NKO_renewable_energy_initiatives: "Iniciativas de Energía Renovable"
 NKO_renewable_energy_initiatives_desc: "Invertir en energía renovable asegurará un desarrollo sostenible y reducirá nuestra dependencia de los combustibles fósiles. Nos centraremos en proyectos solares, eólicos e hidroeléctricos para crear un futuro más verde."
 NKO_labor_force_training: "Capacitación de la Fuerza Laboral"
 NKO_labor_force_training_desc: "Capacitar a nuestra fuerza laboral mejorará las habilidades y la productividad de los trabajadores. Implementaremos programas de capacitación completos para equipar a nuestros trabajadores con las habilidades necesarias para las industrias modernas."
 NKO_50k_housing_project: "Proyecto de 50k Viviendas"
 NKO_50k_housing_project_desc: "Construir 50,000 casas abordará la escasez de viviendas y mejorará los estándares de vida. Este ambicioso proyecto proporcionará viviendas de calidad para nuestros ciudadanos y estimulará la industria de la construcción."
 NKO_resource_mining: "Minería de Recursos"
 NKO_resource_mining_desc: "Expandir la minería de recursos aumentará nuestra disponibilidad de recursos. Nos centraremos en extraer minerales y metales valiosos para apoyar nuestras industrias y el comercio."
 NKO_mansudae_peoples_theatre: "Teatro Popular de Mansudae"
 NKO_mansudae_peoples_theatre_desc: "Construir el Teatro Popular de Mansudae enriquecerá nuestra vida cultural. Este gran lugar albergará actuaciones y eventos que celebran nuestro patrimonio y promueven las artes."
 NKO_rare_metal_exploitation: "Explotación de Metales Raros"
 NKO_rare_metal_exploitation_desc: "Explotar metales raros proporcionará recursos valiosos para nuestras industrias. Desarrollaremos operaciones mineras para extraer estos materiales críticos y mejorar nuestras capacidades tecnológicas."
 NKO_focus_on_quality: "Enfoque en la Calidad"
 NKO_focus_on_quality_desc: "Centrarse en la calidad mejorará los estándares de nuestros productos. Implementaremos medidas de control de calidad y fomentaremos la innovación para asegurar que nuestros bienes cumplan con los estándares internacionales."
 NKO_light_industry_development: "Desarrollo de Industrias Ligeras"
 NKO_light_industry_development_desc: "Desarrollar industrias ligeras diversificará nuestra economía. Apoyaremos a pequeñas y medianas empresas que producen bienes de consumo, textiles y otros productos de industria ligera."
 NKO_modern_mining_operations: "Operaciones Mineras Modernas"
 NKO_modern_mining_operations_desc: "Implementar operaciones mineras modernas aumentará la eficiencia y la producción. Invertiremos en equipos y técnicas mineras avanzadas para impulsar la productividad y asegurar una extracción de recursos sostenible."
 NKO_export_economy: "Economía de Exportación"
 NKO_export_economy_desc: "Fomentar una economía orientada a la exportación impulsará el crecimiento económico. Desarrollaremos nuestra infraestructura de exportación, negociaremos acuerdos comerciales y apoyaremos a las industrias que producen bienes para los mercados internacionales."
 NKO_resource_extraction: "Extracción de Recursos"
 NKO_resource_extraction_desc: "Centrarse en la extracción de recursos asegurará un suministro constante de materiales esenciales. Desarrollaremos nuestras capacidades mineras y de extracción para apoyar nuestras industrias y asegurar nuestro futuro económico."
 NKO_industrial_modernization: "Modernización Industrial"
 NKO_industrial_modernization_desc: "Modernizar nuestras industrias aumentará la productividad y la eficiencia. Invertiremos en nuevas tecnologías, actualizaremos las instalaciones existentes y capacitaremos a nuestra fuerza laboral para adaptarse a los métodos de producción modernos."
 NKO_victory_of_juche_revolution: "Victoria de la Revolución Juche"
 NKO_victory_of_juche_revolution_desc: "Lograr la victoria de la revolución Juche solidificará nuestra independencia y autosuficiencia. Promoveremos los principios de Juche, asegurando la continua fortaleza y autonomía de nuestra nación."
 NKO_national_recovery_plan1: "Plan de Recuperación Nacional"
 NKO_worker_productivity_idea: "Aumento de la Productividad de los Trabajadores"
 NKO_Exporting_Workforce: "Exportación de la Fuerza Laboral"
 NKO_Chollima_Speed: "Velocidad Chollima"
 NKO_international_black_market_gain_tt: "§YIncrementar nuestras operaciones de espionaje creando BUREAU-121.§!\n"
 NKO_economic_expansion: "Expansión Económica"
 NKO_economic_expansion_desc: "Expandir la economía creará más oportunidades y crecimiento. Implementaremos políticas que fomenten la inversión, apoyen el emprendimiento y estimulen la actividad económica."
 NKO_create_komid: "Crear KOMID"
 NKO_create_komid_desc: "Establecer KOMID mejorará nuestras capacidades comerciales. Esta organización gestionará nuestras operaciones comerciales internacionales, asegurando intercambios eficientes y rentables con otras naciones."
 NKO_illict_trade_routes: "Rutas Comerciales Ilícitas"
 NKO_illict_trade_routes_desc: "Crear rutas comerciales ilícitas eludirá las sanciones internacionales. Desarrollaremos redes clandestinas para asegurar bienes y recursos esenciales, garantizando que nuestra economía siga siendo resistente."
 NKO_expand_black_market: "Expandir el Mercado Negro"
 NKO_expand_black_market_desc: "Expandir el mercado negro proporcionará fuentes adicionales de ingresos. Apoyaremos actividades económicas subterráneas para generar fondos y asegurar los bienes necesarios."
 NKO_acquire_military_equipment: "Adquirir Equipamiento Militar"
 NKO_acquire_military_equipment_desc: "La adquisición de equipo militar fortalecerá nuestra capacidad de defensa. Aseguraremos armamento y tecnología avanzados para garantizar que nuestras fuerzas armadas estén bien equipadas para proteger a nuestra nación."
 NKO_black_market_boom: "Auge del Mercado Negro"
 NKO_black_market_boom_desc: "Un mercado negro en auge proporcionará beneficios económicos. Capitalizaremos el comercio subterráneo para generar ingresos y apoyar nuestra economía."
 NKO_advanced_weapons_trade: "Comercio de Armas Avanzadas"
 NKO_advanced_weapons_trade_desc: "La participación en el comercio de armas avanzadas aumentará nuestra fuerza militar. Desarrollaremos y venderemos armamento sofisticado para generar fondos y mejorar nuestras capacidades de defensa."
 NKO_red_star_os: "Sistema Operativo Red Star"
 NKO_red_star_os_desc: "El desarrollo del sistema operativo Red Star mejorará nuestras capacidades tecnológicas. Este sistema operativo mejorará nuestra ciberseguridad y respaldará nuestra independencia tecnológica."
 NKO_the_kwangmyong: "La Kwangmyong"
 NKO_the_kwangmyong_desc: "Desarrollar la red Kwangmyong mejorará nuestra infraestructura de comunicaciones. Esta red interna proporcionará acceso seguro y confiable a la información y apoyará nuestras iniciativas digitales."
 NKO_technological_independence: "Independencia Tecnológica"
 NKO_technological_independence_desc: "Lograr la independencia tecnológica asegurará nuestra autosuficiencia. Nos centraremos en desarrollar nuestras propias tecnologías y reducir la dependencia de las importaciones extranjeras."
 NKO_trade_agreements_with_vietnam: "Acuerdos Comerciales con Vietnam"
 NKO_trade_agreements_with_vietnam_desc: "Formar acuerdos comerciales con Vietnam mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_invite_the_russians: "Acuerdos Comerciales con [SOV.GetName]"
 NKO_invite_the_russians_desc: "Formar acuerdos comerciales con [SOV.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_china: "Acuerdos Comerciales con [CHI.GetName]"
 NKO_trade_agreements_with_china_desc: "Formar acuerdos comerciales con [CHI.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_egypt: "Acuerdos Comerciales con [EGY.GetName]"
 NKO_trade_agreements_with_egypt_desc: "Formar acuerdos comerciales con [EGY.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_sirya: "Acuerdos Comerciales con [SYR.GetName]"
 NKO_trade_agreements_with_sirya_desc: "Formar acuerdos comerciales con [SYR.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_iraq: "Acuerdos Comerciales con [IRQ.GetName]"
 NKO_trade_agreements_with_iraq_desc: "Formar acuerdos comerciales con [IRQ.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_iran: "Acuerdos Comerciales con [PER.GetName]"
 NKO_trade_agreements_with_iran_desc: "Formar acuerdos comerciales con [PER.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_venesuela: "Acuerdos Comerciales con [VEN.GetName]"
 NKO_trade_agreements_with_venesuela_desc: "Formar acuerdos comerciales con [VEN.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_brazilia: "Acuerdos Comerciales con [BRA.GetName]"
 NKO_trade_agreements_with_brazilia_desc: "Formar acuerdos comerciales con [BRA.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_trade_agreements_with_indonesia: "Acuerdos Comerciales con [IND.GetName]"
 NKO_trade_agreements_with_indonesia_desc: "Formar acuerdos comerciales con [IND.GetName] mejorará la cooperación económica. Negociaremos términos favorables para asegurar intercambios mutuamente beneficiosos y fortalecer nuestras relaciones bilaterales."
 NKO_People_Army: "El Ejército del Pueblo"
 NKO_People_Army_desc: "El Ejército del Pueblo tuvo que estar preparado para la guerra, incluso durante el difícil período de la 'Marcha Ardua', para defenderse del imperialismo estadounidense y sus títeres surcoreanos."
 NKO_National_Defence_Force: "Defensa Nacional"
 NKO_National_Defence_Force_desc: "Aumentaremos nuestro Gasto Militar para igualar el de nuestra contraparte del sur, para mantener nuestra nación segura y protegida de cualquier amenaza."
 NKO_Red_Dawn: "Amanecer Rojo"
 NKO_Red_Dawn_desc: "El amanecer de nuestro espíritu revolucionario brillará una vez más mientras fortalecemos nuestro poderío militar. Que este sea el comienzo de nuestra marcha implacable hacia la supremacía."
 NKO_use_russian_model: "Usar Modelos Navales Rusos"
 NKO_use_russian_model_desc: "En nuestra búsqueda de una armada poderosa, adoptaremos y adaptaremos las estrategias y diseños navales de nuestros aliados rusos, impulsando las capacidades de nuestra flota."
 NKO_armed_to_the_teeth: "Armados hasta los Dientes"
 NKO_armed_to_the_teeth_desc: "Cada nave estará equipada con el armamento más formidable. Haremos de nuestra armada una fuerza indomable que infunda miedo en nuestros enemigos."
 NKO_heavy_cruiser_focus: "Enfoque en Cruceros Pesados"
 NKO_heavy_cruiser_focus_desc: "Para proyectar nuestro poder a través de los mares, nos centraremos en construir cruceros fuertemente blindados que dominen las aguas y se mantengan resistentes contra cualquier enemigo."
 NKO_the_north_korean_carrier: "Portaaviones Norcoreano"
 NKO_the_north_korean_carrier_desc: "Una flota de portaaviones es un símbolo de nuestro poderío tecnológico. Desarrollaremos nuestros propios portaaviones para llevar la bandera de la ideología Juche sobre aguas distantes."
 NKO_the_korean_typhoon_class: "Clase Typhoon Norcoreana"
 NKO_the_korean_typhoon_class_desc: "Inspirados en poderosos submarinos de todo el mundo, nuestra propia clase Typhoon aumentará nuestras capacidades submarinas, una amenaza silenciosa para cualquiera que se atreva a desafiarnos."
 NKO_ship_launched_cruise_missiles: "Misiles de Crucero Lanzados desde Buques"
 NKO_ship_launched_cruise_missiles_desc: "Nuestra armada estará equipada con los últimos misiles de crucero lanzados desde buques, mejorando nuestro alcance y poder para atacar objetivos mucho más allá de nuestras costas."
 NKO_korean_mariens: "Infantería de Marina Norcoreana"
 NKO_korean_mariens_desc: "Formar unidades de élite de infantería de marina nos permitirá llevar a cabo operaciones anfibias y asegurar el control sobre ubicaciones estratégicas de manera rápida y decisiva."
 NKO_Studying_their_airforce: "Estudiar Fuerzas Aéreas Enemigas"
 NKO_Studying_their_airforce_desc: "Para prepararnos para conflictos inevitables, debemos estudiar las fuerzas aéreas de nuestros enemigos, aprender sus fortalezas y debilidades, y diseñar contraestrategias."
 NKO_focus_on_the_f-35: "Enfoque en el F-35"
 NKO_focus_on_the_f-35_desc: "We will analyze the F-35's technology, using its design as inspiration to improve our own air capabilities and counter any who wield this advanced fighter."
 NKO_focus_on_the_f-16: "Enfoque en el F-16"
 NKO_focus_on_the_f-16_desc: "El F-16 ha demostrado ser un caza capaz. Disecaremos sus tácticas y tecnología, mejorando nuestra propia flota de cazas en el proceso."
 NKO_focus_on_the_future_kai_kf-21: "Enfoque en el KF-21"
 NKO_focus_on_the_future_kai_kf-21_desc: "The KF-21 is South Korea's next-generation fighter. By analyzing its potential, we prepare our air force to counteract any threat it might pose."
 NKO_get_russian_help: "Buscar Asistencia Militar Rusa"
 NKO_get_russian_help_desc: "Para mejorar nuestra tecnología militar, buscaremos la asistencia de Rusia, un aliado de confianza, para equiparnos con la experiencia y el equipo necesarios."
 NKO_get_chinese_help: "Buscar Asistencia Militar China"
 NKO_get_chinese_help_desc: "Para mejorar nuestra tecnología militar, buscaremos la asistencia de China, un aliado de confianza, para equiparnos con la experiencia y el equipo necesarios."
 NKO_our_jet: "Aeronaves de Combate Nacionales"
 NKO_our_jet_desc: "Continuaremos nuestra investigación en el campo de la aviación, para acelerar nuestra recepción de los últimos cazas, pero ya de producción nacional."
 NKO_korean_ground_forces: "Fortalecer las Fuerzas Terrestres Norcoreanas"
 NKO_korean_ground_forces_desc: "Nuestras fuerzas terrestres son la columna vertebral de nuestra defensa. Invertiremos en su entrenamiento y equipo, asegurando su preparación para cualquier batalla."
 NKO_doctrine_modernization: "Modernizar Nuestra Doctrina"
 NKO_doctrine_modernization_desc: "Adoptaremos un enfoque moderno de la guerra, asegurando que nuestras doctrinas reflejen las realidades de las tácticas y estrategias militares actuales."
 NKO_implement_new_doctrine: "Implementar Nueva Doctrina"
 NKO_implement_new_doctrine_desc: "Al implementar nuevas estrategias, empoderaremos a nuestras fuerzas con tácticas innovadoras y mayor eficacia en el campo de batalla."
 NKO_superior_firepower: "Doctrina de Superioridad de Fuego"
 NKO_superior_firepower_desc: "Centrándonos en la potencia de fuego, equiparemos a nuestras fuerzas para entregar una fuerza abrumadora y lograr victorias decisivas."
 NKO_keep_our_doctrine: "Mantener Nuestra Doctrina Tradicional"
 NKO_keep_our_doctrine_desc: "Nuestra doctrina tradicional nos ha servido bien. La refinaremos y mantendremos, sacando fuerza de nuestro pasado y adaptándola a futuros conflictos."
 NKO_train_the_south: "Entrenar para la Guerra en el Sur"
 NKO_train_the_south_desc: "Con posibles conflictos en el sur, debemos preparar a nuestras fuerzas específicamente para este entorno, listas para enfrentarse con resiliencia y determinación."
 NKO_mass_assault_prevails: "El Asalto Masivo Prevalece"
 NKO_mass_assault_prevails_desc: "Nuestra doctrina de fuerza abrumadora a través de puros números sigue siendo efectiva. Mantendremos nuestra estrategia de asalto masivo, desgastando cualquier oposición."
 NKO_special_mass_assault: "Unidades de Asalto Masivo Especializadas"
 NKO_special_mass_assault_desc: "Para perfeccionar nuestra estrategia de asalto masivo, desarrollaremos unidades especializadas entrenadas específicamente para explotar las fortalezas de esta táctica."
 NKO_korean_iron_fist: "El Puño de Hierro Norcoreano"
 NKO_korean_iron_fist_desc: "Nuestro poder será un puño de hierro que aplasta cualquier oposición. A través de un entrenamiento riguroso y disciplina, preparamos a nuestras fuerzas para encarnar esta voluntad inquebrantable."
 NKO_defend_our_skies: "Defender Nuestros Cielos"
 NKO_defend_our_skies_desc: "Nuestras defensas aéreas deben ser formidables. Priorizaremos la defensa de nuestro espacio aéreo, asegurando que ninguna aeronave enemiga pueda acercarse sin ser detectada."
 NKO_defend_the_coast: "Defender Nuestra Costa"
 NKO_defend_the_coast_desc: "Nuestras defensas costeras deben ser vigilantes. Fortificaremos nuestra línea costera, disuadiendo cualquier intento de invasión y protegiendo nuestra soberanía."
 NKO_harts: "Tácticas de Reconocimiento de Gran Altitud"
 NKO_harts_desc: "Adoptaremos tácticas avanzadas de reconocimiento para monitorear los movimientos enemigos y obtener información valiosa desde grandes altitudes."
 NKO_upgrade_our_radar: "Actualizar Nuestros Sistemas de Radar"
 NKO_upgrade_our_radar_desc: "Para detectar amenazas desde lejos, mejoraremos nuestra tecnología de radar, dándonos un sistema de alerta temprana contra cualquier peligro que se aproxime."
 NKO_counter_enemy_missiles: "Contrarrestar Misiles Enemigos"
 NKO_counter_enemy_missiles_desc: "Para proteger nuestra patria, desarrollaremos contramedidas contra misiles enemigos, asegurando que sigamos siendo seguros ante amenazas aéreas."
 NKO_army_supply_hubs: "Establecer Centros de Suministro del Ejército"
 NKO_army_supply_hubs_desc: "Para mantener a nuestras fuerzas, construiremos centros de suministro que aseguren que nuestro ejército esté siempre listo y bien abastecido para operaciones sostenidas."
 NKO_mass_drones: "Producción Masiva de Drones"
 NKO_mass_drones_desc: "Comenzaremos a centrarnos en la producción masiva de drones para proporcionar a nuestro ejército los mejores drones!"
 NKO_Begin_Uranium_Enrichment: "Comenzar el Enriquecimiento de Uranio"
 NKO_Begin_Uranium_Enrichment_desc: "Ya sea para la liberación del pueblo surcoreano o para la defensa de nuestra gran patria contra la amenaza nuclear de los imperialistas estadounidenses, debemos desarrollar armas nucleares de manera resuelta y valiente!"
 NKO_Remove_Monitoring_Devices: "Eliminar Dispositivos de Monitoreo"
 NKO_Remove_Monitoring_Devices_desc: "Nuestro enriquecimiento de uranio está destinado a ser resistido por la comunidad internacional. Entonces, para ocultar el Enriquecimiento de Uranio, lo mejor que podemos hacer es ----- hacer que la comunidad internacional no lo vea."
 NKO_Expel_Inspectors: "Expulsar Inspectores"
 NKO_Expel_Inspectors_desc: "La Agencia Internacional de Energía Atómica ha enviado muchos inspectores a nuestro país para asegurarse de que solo usemos tecnología nuclear para el suministro de energía. Dado que estamos a punto de separarnos de ellos, bien podríamos deportar a estos espías imperialistas en el proceso."
 NKO_Withdraw_from_NPT: "Retirarse del TNP"
 NKO_Withdraw_from_NPT_desc: "Un paso importante para nuestro programa nuclear, que está relacionado con nuestra independencia y seguridad, es retirarnos del TNP. No podemos limitar nuestra capacidad para defender la independencia y seguridad de nuestro país debido a los tratados desiguales de imperialistas ridículos!"
 NKO_Missile_Tests: "Pruebas de Misiles"
 NKO_Missile_Tests_desc: "Las pruebas de misiles de Corea del Norte son demostraciones de sus crecientes capacidades de misiles balísticos, mostrando una gama de sistemas desde misiles de corto alcance hasta misiles balísticos intercontinentales (ICBM). Estas pruebas son cruciales para avanzar en su tecnología militar, afirmar la influencia regional y señalar intenciones estratégicas, a menudo escalando tensiones y provocando respuestas internacionales."
 NKO_Nuclear_Tests: "Pruebas Nucleares"
 NKO_Nuclear_Tests_desc: "Las pruebas nucleares de Corea del Norte son una serie de detonaciones subterráneas realizadas por el país desde 2006 como parte de su programa de desarrollo de armas nucleares. Estas pruebas demuestran avances en el rendimiento de las armas y la tecnología, a menudo provocando condenas y sanciones internacionales. Representan un elemento crítico en la estrategia de Corea del Norte para asegurar la seguridad del régimen y proyectar poder en el escenario mundial."
 NKO_Our_Pride_and_Joy: "Nuestro Orgullo y Alegría"
 NKO_Our_Pride_and_Joy_desc: "Regocíjense! Frente al severo bloqueo de los imperialistas estadounidenses y sus países subordinados, bajo el liderazgo del querido camarada [NKO.GetLeader], nosotros, la República Popular Democrática de Corea, finalmente tenemos nuestra propia fuerza de contrarrestar nuclear! Los días en que los agresores imperialistas estadounidenses intentaron chantajearnos con un palo nuclear han terminado."
 NKO_Nuclear_Approval_Not_SCO: "No debemos ser miembros de la OCS"
 NKO_People_Air_force: "Fuerza Aérea del Pueblo"
 NKO_People_Air_force_desc: "Los cielos de Choson deben mantenerse seguros contra cualquier intrusión de los imperialistas estadounidenses o sus aliados del sur. Esto resultará ser una tarea difícil si no mejoramos nuestras capacidades aéreas."
 NKO_improve_our_air_doctrine: "Mejorar Nuestra Doctrina Aérea"
 NKO_improve_our_air_doctrine_desc: ""
 NKO_construct_air_bases: "Construir Bases Aéreas"
 NKO_construct_air_bases_desc: ""
 NKO_Self-produced_rifles: "Rifles de Producción Nacional"
 NKO_Self-produced_rifles_desc: "The Korean People's Army cannot depend on foreign suppliers for its standard service rifle. Domestic arsenals will tool up to manufacture small arms in quantity, ensuring every soldier is armed with a weapon made in the homeland."
 NKO_Model_Master: "Maestro de Modelos"
 NKO_Model_Master_desc: "El desarrollo de tanques de Corea del Norte se centra en producir vehículos blindados autóctonos adaptados a su terreno y doctrina militar. Desde modelos inspirados en los soviéticos hasta diseños modernizados, estos tanques juegan un papel crucial en las fuerzas terrestres de la nación, enfatizando la movilidad, la potencia de fuego y la capacidad de operar en diversos escenarios de combate."
 NKO_Artillery: "Nuestra Artillería"
 NKO_Artillery_desc: "La artillería de Corea del Norte es una piedra angular de su estrategia militar, con una vasta gama de sistemas, desde obuses tradicionales hasta artillería de cohetes avanzada. Conocida por su enorme arsenal, la artillería está diseñada para una potencia de fuego abrumadora, capaz de atacar tanto instalaciones militares como áreas civiles, particularmente en la vecina Corea del Sur, convirtiéndola en un elemento clave de disuasión y ofensiva."
 NKO_SPAA: "Nuestra Defensa Aérea"
 NKO_SPAA_desc: "El sistema de defensa aérea de Corea del Norte es una mezcla de tecnología de la era soviética y plataformas desarrolladas nacionalmente, diseñadas para proteger infraestructuras críticas y contrarrestar posibles amenazas aéreas. Incluye misiles tierra-aire, cañones antiaéreos y sistemas de radar, enfatizando una estrategia de defensa en capas. A pesar de las limitaciones en comparación con los sistemas modernos, refleja el enfoque del país en la autosuficiencia y la disuasión."
 NKO_more_zavods: "Inversiones en Nuestro Complejo Militar-Industrial"
 NKO_more_zavods_desc: ""
 NKO_Rocket_Artillery: "Artillería de Cohetes"
 NKO_Rocket_Artillery_desc: "La artillería de cohetes de Corea del Norte es un componente crucial de su ejército, con una amplia gama de sistemas, incluidos los poderosos modelos KN-09 y KN-25. Estas plataformas están diseñadas para ataques de precisión a larga distancia, capaces de entregar una potencia de fuego significativa contra objetivos militares y estratégicos. Su movilidad y despliegue rápido mejoran la capacidad de Corea del Norte para proyectar fuerza y mantener operaciones ofensivas."
 NKO_Naval_Modernization: "Modernización Naval"
 NKO_Naval_Modernization_desc: "La modernización naval de Corea del Norte se centra en mejorar sus capacidades con embarcaciones pequeñas y ágiles y sistemas avanzados de misiles. Esto incluye el desarrollo de submarinos capaces de lanzar misiles balísticos (SLBM) y la actualización de buques de superficie con armamento moderno. El esfuerzo refleja una estrategia de guerra asimétrica, utilizando activos costeros y submarinos para contrarrestar potencias navales más grandes y proyectar fuerza en aguas regionales."
 NKO_Anti-Submarine: "Capacidades Antisubmarinas"
 NKO_Anti-Submarine_desc: "Las capacidades antisubmarinas de Corea del Norte son limitadas pero en evolución, dependiendo de una combinación de patrulleras, cargas de profundidad y barcos equipados con sonar. Los esfuerzos para mejorar estos sistemas incluyen el despliegue de embarcaciones pequeñas y ágiles y la experimentación con tecnología autóctona. Estas capacidades se centran en defender aguas costeras y contrarrestar posibles incursiones submarinas de adversarios, asegurando la seguridad marítima cerca de sus costas."
 NKO_Infiltration_by_Sea: "Infiltración por Mar"
 NKO_Infiltration_by_Sea_desc: "La estrategia de infiltración marítima de Corea del Norte utiliza su flota de embarcaciones pequeñas, rápidas, submarinos y semisumergibles para llevar a cabo operaciones encubiertas. Estos activos permiten el transporte de fuerzas especiales y equipos, a menudo sin ser detectados, para reconocimiento, sabotaje o guerra no convencional. Este enfoque subraya el énfasis de Corea del Norte en tácticas asimétricas para explotar vulnerabilidades a lo largo de las costas enemigas."
 NKO_Submarine_Development: "Desarrollo de Submarinos"
 NKO_Submarine_Development_desc: ""
 NKO_Upgrade_Shipyards: "Actualizar Astilleros"
 NKO_Upgrade_Shipyards_desc: "El desarrollo de submarinos de Corea del Norte se centra en expandir su flota con embarcaciones convencionales y estratégicas, incluidos submarinos de misiles balísticos (SLBM) como la clase Sinpo. Este programa subraya la ambición del país de establecer un disuasivo submarino creíble, mejorando el sigilo y la supervivencia en su estrategia nuclear. Con una mezcla de diseños autóctonos y modernización de modelos más antiguos, Corea del Norte prioriza capacidades navales asimétricas para fortalecer su defensa y alcance estratégico. Estos desarrollos también están dirigidos a apoyar avances en sistemas de misiles, submarinos y otro hardware militar."
 NKO_Expand_Bases: "Expandir Bases"
 NKO_Expand_Bases_desc: "La estrategia de Corea del Norte para expandir sus bases militares refleja su enfoque en reforzar la defensa y la preparación. Esto incluye actualizar instalaciones existentes, construir nuevos refugios subterráneos y mejorar centros logísticos para apoyar a sus fuerzas. La expansión de bases tiene como objetivo mejorar el despliegue eficiente de tropas, proteger activos críticos y proporcionar profundidad estratégica, asegurando la supervivencia contra posibles ataques mientras proyecta poder en puntos estratégicos clave. Estos desarrollos también están orientados a respaldar avances en sistemas de misiles, submarinos y otro hardware militar."
 NKO_Green-Water_Navy: "Armada de Aguas Verdes"
 NKO_Green-Water_Navy_desc: "El desarrollo de una armada de aguas verdes de Corea del Norte se centra en extender su alcance operativo más allá de las aguas costeras hacia mares regionales. Esta estrategia implica desplegar fragatas pequeñas, corbetas y lanchas misilísticas, junto con esfuerzos para mejorar las capacidades submarinas. El objetivo es proteger reclamaciones territoriales, apoyar estrategias de guerra asimétrica y proyectar un poder limitado en aguas regionales, particularmente en el Mar Amarillo y el Mar de Japón. Este enfoque subraya la ambición de Corea del Norte de equilibrar la modernización rentable con sus objetivos militares estratégicos."
 NKO_Revolutionary_Military_Spirit: "Espíritu Militar Revolucionario"
 NKO_Revolutionary_Military_Spirit_desc: "North Korea's concept of \"Revolutionary Military Spirit\" is a core ideology that emphasizes unwavering loyalty, discipline, and commitment to the state and its leadership. It serves as a motivational framework for the armed forces, encouraging resilience, self-reliance, and readiness to sacrifice in the face of adversity. This National Spirit underpins the nation's military culture, fostering unity and determination to achieve strategic objectives despite economic and technological challenges. It reflects the integration of political ideology with military strategy as a driving force behind North Korea's defense initiatives."
 NKO_Expand_Peasant_Militia: "Expandir la Milicia Campesina"
 NKO_Expand_Peasant_Militia_desc: "La expansión de la Milicia Campesina de Corea del Norte, conocida como los Guardias Rojos de Obreros y Campesinos, es una medida estratégica para fortalecer la defensa nacional a través de la movilización masiva. Esta fuerza paramilitar, compuesta por civiles, tiene la tarea de complementar las operaciones militares regulares, defender comunidades locales y asegurar la seguridad interna. Los esfuerzos de expansión incluyen un aumento en el entrenamiento, equipar a los miembros de la milicia con armas ligeras e integrarlos en ejercicios militares más amplios. Este enfoque refleja la atención de Corea del Norte en la guerra asimétrica y su estrategia de 'defensa de todo el pueblo', asegurando una fuerza grande y descentralizada capaz de resistir amenazas externas y mantener la estabilidad interna."
 NKO_Bolster_Young_Red_Guards: "Fortalecer a los Jóvenes Guardias Rojos"
 NKO_Bolster_Young_Red_Guards_desc: "Fortalecer a los Jóvenes Guardias Rojos, la organización paramilitar juvenil de Corea del Norte, es una iniciativa clave para inculcar lealtad ideológica y preparación militar en su población más joven. Esto implica mejorar el entrenamiento militar, la educación política y el acondicionamiento físico de los estudiantes, integrándolos a menudo en ejercicios de defensa nacional. Al equipar a los Jóvenes Guardias Rojos con armamento básico y habilidades de supervivencia, Corea del Norte asegura un flujo constante de individuos ideológicamente comprometidos y listos para el combate que pueden apoyar a las fuerzas armadas regulares en tiempos de conflicto. Esta iniciativa subraya la dependencia del régimen en la movilización juvenil como parte de su estrategia de 'defensa de todo el pueblo'."
 NKO_Rebuild_sso: "Reforma de Fuerzas Especiales"
 NKO_Rebuild_sso_desc: "La reforma de las Fuerzas Especiales de Corea del Norte se centra en modernizar y mejorar las capacidades de sus unidades de élite para llevar a cabo guerra asimétrica, operaciones no convencionales y misiones de respuesta rápida. Esta reforma incluye la mejora de los regímenes de entrenamiento, la incorporación de tácticas avanzadas y el equipamiento de fuerzas con armamento y sistemas de comunicación modernos. Las Fuerzas Especiales están diseñadas para sobresalir en infiltración, sabotaje, reconocimiento y acción directa, a menudo apuntando a activos estratégicos o infraestructura crítica. Las reformas tienen como objetivo aumentar su efectividad en conflictos regionales, fortalecer la disuasión y mantener la preparación para una variedad de misiones de alto riesgo. Este énfasis refleja la dependencia estratégica de Corea del Norte en unidades altamente capacitadas y ágiles para compensar las limitaciones militares convencionales."
 NKO_Rebuild_Kim_Il-sung_Military_University: "Reconstruir la Universidad Militar Kim Il-sung"
 NKO_Rebuild_Kim_Il-sung_Military_University_desc: "La Universidad Militar Kim Il-sung, una importante institución de defensa nacional en Pyongyang, ha reunido a un gran número de los mejores comandantes del país desde 1952. A medida que entramos en el nuevo siglo, las antiguas instalaciones de esta universidad se están volviendo cada vez más inadecuadas para el nuevo estilo de guerra. Es hora de restaurar esta institución a su antigua gloria."
 NKO_Revolutionary_Spirits: "Espíritu Militar Revolucionario"
 NKO_The_Green_Water_Navy: "La Armada de Aguas Verdes"
 NKO_The_Green_Water_Navy_desc: "This national spirit will be §YUpgraded§! if we complete the §HNaval Modernization§! focuses. \n§W--------------§!\nA green-water navy is a maritime force that is capable of operating in its state's littoral zones and has limited competency to operate in the surrounding marginal seas. It is a relatively new term, and has been created to better distinguish, and add nuance, between two long-standing descriptors: blue-water navy (deep waters of open oceans) and brown-water navy (littoral waters and near to shore)."
 NKO_young_red_guard_idea: "Guardias Rojos Juveniles"
 NKO_young_red_guard_idea1: "Guardias Juveniles"
 NKO_army_sso: "Fuerzas Especiales del Ejército"
 NKO_war_university: "Universidad Militar Kim Il Sung"
 NKO_vpk: "Complejo Militar-Industrial Nacional"
 NKO_sad_army_idea: "Ejército del Pueblo Obsoleto"
 NKO_sad_army_idea_desc: "This national spirit will be §YUpgraded§! if we complete the §HRevolutionary Military Spirit§! focuses. \n§W--------------§!\nNorth Korea's army, while boasting significant manpower, relies heavily on outdated equipment and technology. Much of its arsenal consists of Soviet-era tanks, artillery, and aircraft, with limited modernization. This reliance on older systems reflects resource constraints and international sanctions, making the army formidable in numbers but challenged in efficiency and capability compared to modern militaries."
 NKO_new_army_idea: "Nuevo Ejército Popular de Corea del Norte"
 NKO_new_army_idea_desc: "El ejército modernizado de Corea del Norte combina tecnologías autóctonas avanzadas con mejoras estratégicas en activos militares clave. Los sistemas de misiles mejorados, drones y capacidades de ciberguerra muestran un cambio hacia la modernización. Aunque todavía limitado por sanciones, el enfoque en la innovación y las tácticas de guerra asimétrica hacen que el ejército sea una fuerza formidable en la región."
 NKO_marines_idea: "Cuerpo de Marines"
 NKO_Planned_Economy: "Economía Planificada"
 NKO_Planned_Economy_desc: "The country of North Korea, officially known as the Democratic People's Republic of Korea (DPRK), has an isolated and tightly controlled command economy. In a command economy, the economy is centrally planned and coordinated by the government, making it a standard component of any communist country."
 38th_parallel_NKO: "Comité para la Reunificación Pacífica de la Patria"
 NKO_The_38th_Parallel: "El Paralelo 38"
 NKO_The_38th_Parallel_desc: "En julio de 1953, se firmó el Acuerdo de Armisticio de Corea entre las dos Coreas y los voluntarios chinos, así como las fuerzas de las Naciones Unidas, estableciendo una zona desmilitarizada basada en el paralelo 38, separando a Corea del Norte y del Sur. Esta línea divisoria ha existido durante unos 50 años y tal vez sea el momento de avanzar hacia la reunificación, de una forma u otra."
 NKO_The_Road_to_Peace: "¿El Camino hacia la Paz?"
 NKO_The_Road_to_Peace_desc: "La 'Política del Sol' de Corea del Sur parece demostrar un deseo sincero de reunificación. Tal vez sea el momento de que los camaradas intercoreanos trabajen juntos hacia la reunificación."
 NKO_cross_border_initiatives: "Iniciativas Transfronterizas"
 NKO_cross_border_initiatives_desc: ""
 NKO_cease_propaganda_broadcasts: "Cese de Transmisiones de Propaganda"
 NKO_cease_propaganda_broadcasts_desc: "Las transmisiones de propaganda tienen poco uso para nosotros hoy, pero más bien hacen que esos sureños que fueron criados para ser anticomunistas resientan nuestras acciones. Terminar con este comportamiento podría hacerlos un poco más felices."
 NKO_invite_the_president: "Invitar al Presidente"
 NKO_invite_the_president_desc: "Invitar al Presidente del Sur a visitar nuestro país para que podamos conocernos mejor y resolver nuestras diferencias y prejuicios."
 NKO_invite_southern_performers: "Invitar a Artistas del Sur"
 NKO_invite_southern_performers_desc: "Los artistas del sur también tienen una gran influencia en los jóvenes del norte. Invitarlos a nuestro país podría mostrar a los jóvenes del sur nuestra buena voluntad."
 NKO_stress_historical_bonds: "Retórica Conciliadora"
 NKO_stress_historical_bonds_desc: ""
 NKO_unite_sport_team: "Equipo Olímpico Unificado"
 NKO_unite_sport_team_desc: ""
 NKO_propose_confederation: "Cuestión de la Confederación"
 NKO_propose_confederation_desc: ""
 NKO_pave_the_way_for_reunification: "Allanar el Camino para la Reunificación"
 NKO_pave_the_way_for_reunification_desc: "Ahora que se han dado grandes pasos hacia la normalización de las relaciones intercoreanas, podemos comenzar a hacer preparativos para la reunificación."
 NKO_create_confederation: "La Confederación Coreana"
 NKO_create_confederation_desc: ""
 NKO_offer_negotiations: "Ofrecer Negociaciones"
 NKO_offer_negotiations_desc: "Es hora de hablar con el Sur sobre la reunificación pacífica."
 NKO_propose_north_led_unification: "Proponer Unificación Liderada por el Norte"
 NKO_propose_north_led_unification_desc: "Desde nuestro justo sistema de bienestar hasta nuestra arma nuclear más fuerte, está claro que el modelo norcoreano es el camino a seguir para la península coreana. Debemos insistir en que deberíamos ser nosotros quienes lideren a Corea hacia un futuro poderoso y posreunificación."
 NKO_The_Road_to_War: "El Camino hacia la Guerra"
 NKO_The_Road_to_War_desc: "Los imperialistas estadounidenses y sus títeres surcoreanos no fueron, no son y nunca serán capaces de permitir la verdadera reunificación de Corea. La reunificación por la fuerza es la verdad eterna."
 NKO_threaten_the_south: "Amenazar al Sur"
 NKO_threaten_the_south_desc: ""
 NKO_shut_down_communications: "Cerrar Comunicaciones"
 NKO_shut_down_communications_desc: ""
 NKO_accelerate_testing: "Acelerar Pruebas"
 NKO_accelerate_testing_desc: ""
 NKO_end_six-party_negotiations: "Preparar Armas Nucleares"
 NKO_end_six-party_negotiations_desc: "The Six-Party Talks have delivered nothing but delay. We will walk away from the negotiating table and bring our nuclear deterrent to full readiness. South Korea, Japan, and the United States will learn that our security is not theirs to bargain over."
 NKO_remilitarize_the_DMZ: "Remilitarizar la Zona Desmilitarizada"
 NKO_remilitarize_the_DMZ_desc: "Remilitarizar la Zona Desmilitarizada marcará una escalada significativa en nuestro conflicto con el Sur, pero sin duda dará a nuestras tropas una ventaja en el conflicto venidero."
 NKO_demoralize_propaganda: "Propaganda Desmoralizante"
 NKO_demoralize_propaganda_desc: "."
 NKO_border_picture: "Imágenes Fronterizas de Corea del Sur"
 NKO_border_picture_desc: "."
 NKO_finance_rebels: "Financiamiento de los Rebeldes"
 NKO_finance_rebels_desc: "."
 NKO_weapons_for_rebels: "Armas para los Rebeldes"
 NKO_weapons_for_rebels_desc: "."
 NKO_united_again: "Unidos Nuevamente"
 NKO_united_again_desc: "."
 NKO_all_out_war: "Guerra Total"
 NKO_all_out_war_desc: "Es hora! Dejemos que los títeres del sur y nuestro Ejército Popular de Corea se enfrenten en el campo de batalla!"
 NKO_foment_insurrection: "Fomentar la Insurrección"
 NKO_foment_insurrection_desc: ""
 NKO_send_support: "Enviar Apoyo"
 NKO_send_support_desc: "Nadie podría ganar solo con rocas y cócteles molotov; necesitamos apoyar a los guerrilleros del sur con parte del equipo que tanto necesitan."
 NKO_assert_control: "Afirmar Control"
 NKO_assert_control_desc: "Integrar el mando de los guerrilleros del sur en nuestro estado mayor, para que nuestro Ejército Popular de Corea y los guerrilleros puedan trabajar mejor juntos."
 NKO_Struggle_for_Power: "La Lucha por el Poder"
 NKO_Struggle_for_Power_desc: "The power struggle between Kim Jong-un and his brother, Kim Jong-nam, was a covert battle for succession within North Korea's ruling family. Following their father Kim Jong-il's death, both brothers were potential candidates to lead the regime. Kim Jong-nam, once seen as the favored heir, fell out of favor due to his public criticisms of the regime and his exile in Macau. Meanwhile, Kim Jong-un, supported by influential elites, solidified his position through strategic alliances and internal purges. The struggle ended with Kim Jong-un's ascension to power in 2011, marked by the mysterious assassination of Kim Jong-nam in 2017, which many believe was orchestrated by the North Korean government. This conflict underscored the ruthless nature of power dynamics in one of the world's most secretive regimes."
 NKO_Orthodox_Successor: "El Sucesor Ortodoxo"
 NKO_Orthodox_Successor_desc: "En la década de 1990, Kim Jong-un fue elegido por el gran General Kim Jong-il como sucesor del poder debido a sus cualificaciones sobresalientes. El querido camarada Kim Jong-un, a quien Dios ha dado al pueblo coreano en el pasado, presente y futuro, siempre protegerá la seguridad y prosperidad de la Corea Juche."
 NKO_Promote_Self_Reliance: "Promover la Autosuficiencia"
 NKO_Promote_Self_Reliance_desc: "Un país nunca puede ser rico y fuerte dependiendo de otros, solo siendo autosuficiente puede ser fuerte!"
 NKO_Ostracize_Kim_Jong_nam: "Marginar a Kim Jong-nam"
 NKO_Ostracize_Kim_Jong_nam_desc: "Al marginar a Kim Jong-nam, para hacer que el 'padre' desconfíe aún más de él, tenemos una mejor posibilidad de ganar poder."
 NKO_Bribe_KPA_seniors: "Sobornar a los Seniors del Ejército Popular de Corea"
 NKO_Bribe_KPA_seniors_desc: "Los generales del EPC son los que tienen el poder militar, y tener el apoyo de estos veteranos es más probable que nos ponga en control."
 NKO_Oppose_to_Chinese_Reform_Road: "Oponerse abiertamente a la Reforma China"
 NKO_Oppose_to_Chinese_Reform_Road_desc: "El modelo de reforma de China proviene de su modelo de liderazgo colectivo. Si este enfoque se trasladara a Corea del Norte, inevitablemente conduciría al caos social. Y el \"padre\" tampoco lo apoya. Para que continúe la línea de sangre de Baekdu, deberíamos oponernos abiertamente al uso del modelo chino para la reforma."
 NKO_Discredit_Jang_Seong_taek: "Desacreditar a Jang Seong-taek"
 NKO_Discredit_Jang_Seong_taek_desc: "Jang Seong-taek es una facción conocida pro-china en Corea del Norte y también una figura popular del lado del padre. Un traidor así que vendió los intereses de la nación no debe ser tolerado. Para ganar poder con éxito, debemos recolectar evidencia de su culpa y denunciarlo ante el Padre."
 NKO_Call_for_Change: "El Llamado al Cambio"
 NKO_Call_for_Change_desc: "La RPDC ha operado bajo una economía planificada durante casi 50 años. Pero la sucesión de \"Revoluciones de 1989\" y la \"Marcha Forzada\" demostraron que la economía planificada por el estado ya no era apta para el nuevo siglo. Se necesita una reforma audaz y profunda para que Corea del Norte vuelva a ser fuerte."
 NKO_Pull_in_young_Military_Officers: "Atraer a jóvenes oficiales militares"
 NKO_Pull_in_young_Military_Officers_desc: "Atraer a jóvenes oficiales de mente abierta del EPC no nos hará daño, ya que están más cerca de la tropa y serán más conducentes a nuestro control de las tropas."
 NKO_Frame_Opposition: "Incriminar a la Oposición"
 NKO_Frame_Opposition_desc: "The strategy to frame Kim Jong-un involves portraying him as a reckless and destabilizing force within North Korea's leadership. By highlighting his aggressive purges, volatile decision-making, and lack of diplomatic finesse, we can position him as a danger to both the regime's stability and regional security. This framing will contrast his actions with a vision of steady, rational leadership, emphasizing the need for a more balanced and internationally palatable figure. Through carefully curated narratives, targeted messaging, and leveraging insider accounts, the aim is to undermine his credibility and sway both domestic and international opinion."
 NKO_Stir_up_Father-son_Relations: "Aumentar el Conflicto Padre-Hijo"
 NKO_Stir_up_Father-son_Relations_desc: "No será fácil aumentar el conflicto entre Kim Jong-un y Kim Jong-il, pero nos dará más apoyo."
 NKO_Place_Loyalists_in_KPA: "Colocar a los Leales en el EPC"
 NKO_Place_Loyalists_in_KPA_desc: "Hace veinte años, cuando tanto Kim Jong-il como su medio hermano tuvieron la oportunidad de asumir el liderazgo de Corea del Norte, el apoyo de los viejos guerrilleros para Kim Jong-il fue un factor clave en su eventual elección como líder supremo del país. Ahora que el Ejército Popular de Corea ha heredado esa posición. Coloque a los Leales en el EPC, aumente nuestro control sobre el EPC."
 NKO_Finding_Reformist_of_Party: "Encontrar al Reformista del Partido"
 NKO_Finding_Reformist_of_Party_desc: "No es que los reformistas no existan en el partido, pero tienen miedo de hablar frente a la oposición de Kim Jong Il, si ganamos su apoyo es más probable que cambiemos a Chosun"
 NKO_Power_struggle: "Lucha de Poder"
 NKO_Power_struggle_desc: "Tarde o temprano, el gran líder de Corea del Norte en la actualidad, el Camarada Kim Jong-il, morirá y su sucesor será sin duda uno de sus dos hijos, Kim Jong-nam y Kim Jong-un. Pero \"un país no puede tener dos amos\", y ambos tienen que encontrar formas de ganarse la confianza de su padre. Apoyar a un candidato sobre el otro hasta que se haya elegido un sucesor hará que se pierda £stability_texticon §YEstabilidad§!.\n\nSi no tenemos más de £stability_texticon §YEstabilidad§! que 45% la Junta buscará tomar el poder una vez que Kim Jong-il haya muerto.\n\nActual £stability_texticon §YEstabilidad§!: [?NKO.stability|1%]\n\nActualmente,\n§OKim Jong-un§! Ortodoxia: §Y[?ROOT.Kim_Jong_un]%§!\n§GKim Jong-nam§! Ortodoxia: §Y[?ROOT.Kim_Jong_Nam]%§!\n\n§YEl Sucesor Elegido por Kim Jong-il§!: [ROOT.GetChosenSuccessor]\n§REl Sucesor Más Probable Actualmente§!: [ROOT.GetSuccessor]\n\nNuestro Líder, §YKim Jong Il§!, puede que no viva para ver 2012, así que prepárate para elegir un sucesor en §Y2011§!"
 Kim_Jong_un_support: "Kim Jong-un: Cabildeo en la Cima"
 Kim_Jong_Nam_support: "Kim Jong-nam: Cabildeo en la Cima"
 Kim_Jong_il_Death: "Muerte de Kim Jong-il"
 Kim_Jong_il_Death_desc: "El amado Gran Líder, el fundador de la República Popular Democrática de Corea y el Presidente eterno de la República, Kim Jong-il, Presidente de la RPDC, murió a las 8.30 a.m. del 17 de diciembre de 2011 de un infarto agudo de miocardio complicado por un shock cardiogénico mientras se dirigía a visitar un área local en tren."
 NKO_1_increase_Kim_Jong_un_tt: "El apoyo de Kim Jong-un §Yaumenta§! en 1%"
 NKO_2_increase_Kim_Jong_Nam_tt: "El apoyo de Kim Jong-nam §Yaumenta§! en 2%"
 NKO_3_increase_Kim_Jong_un_tt: "El apoyo de Kim Jong-un §Yaumenta§! en 3%"
 NKO_3_increase_Kim_Jong_Nam_tt: "El apoyo de Kim Jong-nam §Yaumenta§! en 3%"
 NKO_2_5_increase_Kim_Jong_un_tt: "El apoyo de Kim Jong-un §Yaumenta§! en 2% ~ 5%"
 NKO_2_5_increase_Kim_Jong_Nam_tt: "El apoyo de Kim Jong-nam §Yaumenta§! en 2% ~ 5%"
 NKO_5_decrease_Kim_Jong_un_tt: "El apoyo de Kim Jong-un §Ydisminuye§! en 5%"
 NKO_2_decrease_Kim_Jong_Nam_tt: "El apoyo de Kim Jong-nam §Ydisminuye§! en 2%"
 NKO_3_decrease_Kim_Jong_un_tt: "El apoyo de Kim Jong-un §Ydisminuye§! en 3%"
 NKO_4_increase_Kim_Jong_Nam_tt: "El apoyo de Kim Jong-nam §Ydisminuye§! en 4%"
 NKO_5_increase_Kim_Jong_Nam_tt: "El apoyo de Kim Jong-nam §Ydisminuye§! en 5%"
 NKO_Kim_Jong_il_Death: "Muerte de Kim Jong-il"
 NKO_Kim_Jong_il_Death_desc: "\n§W--------------§!\nEste Enfoque §YDesbloqueará§! a las  §H8.30 a.m. del 17 de diciembre de 2011§! enfoque.El amado Gran Líder, el fundador de la República Popular Democrática de Corea y el Presidente eterno de la República, Kim Jong-il, murió a las 8.30 a.m. del 17 de diciembre de 2011 de un infarto agudo de miocardio complicado por un shock cardiogénico mientras se dirigía a visitar un área local en tren."
 NKO_Junta: "Golpe de la Junta"
 NKO_Junta_desc: "Las reformas exitosas en China y Vietnam han sentado un buen ejemplo para nosotros, pero sus reformas no han sido fáciles. Si nuestras propias reformas hubieran fallado, habríamos muerto y sido anexados por el Sur. Y tanto Kim Jong-un como Kim Jong-nam quieren diferentes niveles de reforma. Tendremos que tomar la decisión más difícil para no perder nuestro país o nuestro partido..."
 NKO_Preserve_Songun: "Preservar Songun"
 NKO_Preserve_Songun_desc: "Songun es la base del ejército y debemos mantener su ideología."
 NKO_Entrench_Military_Authority: "Consolidar la Autoridad Militar"
 NKO_Entrench_Military_Authority_desc: "Aunque hemos usado el ejército para arrebatar el poder de la dinastía Kim, todavía hay algunos leales a Kim dentro del ejército, usaremos nuestros \"medios\" para convencerlos..."
 NKO_Smash_Black_Market: "Destruir el \"Mercado\""
 NKO_Smash_Black_Market_desc: "Las fuerzas del \"mercado\" están causando un gran daño a nuestro país y deben detenerse de inmediato!"
 NKO_Determining_the_loyalty_of_army: "Determinar la Lealtad del Ejército"
 NKO_Determining_the_loyalty_of_army_desc: "Ahora podemos promover a algunos de nuestros leales y hacerlos más serviles a nosotros."
 NKO_Purge_Dissenters: "Purgar Disidentes"
 NKO_Purge_Dissenters_desc: "Para mantener la estabilidad del país en este momento crítico de la transición de poder, debemos arrestar de inmediato a todos los posibles disidentes!"
 NKO_Crush_the_Kims: "Ejecución de los Kim"
 NKO_Crush_the_Kims_desc: "Mantener vivos a los hijos de Kim Jong-il es, en última instancia, un factor desestabilizador, ejecútenlos en secreto!"
 NKO_Constrain_the_Donju: "Restringir al Donju"
 NKO_Constrain_the_Donju_desc: "El Donju ha hecho una pequeña contribución al desarrollo económico de nuestro país antes, manténganlos activos..."
 NKO_End_the_Donju: "Represión del Contrabando"
 NKO_End_the_Donju_desc: "El contrabando es un delito grave y, a pesar de su contribución a la economía del país, es hora de erradicar a estos infractores de una vez por todas."
 NKO_High_pressure_politics: "Política de Alta Presión"
 NKO_High_pressure_politics_desc: "El descontento popular ha crecido hasta tal punto que debemos usar medios forzosos para mantener nuestro gobierno."
 NKO_Empower_the_State_Security_Department: "Empoderar al Buró General de Reconocimiento"
 NKO_Empower_the_State_Security_Department_desc: "Ahora necesitamos autorizar al Buró General de Reconocimiento del ejército para asumir mayores responsabilidades y convertirse en la agencia de inteligencia dominante del país. El Buró General de Reconocimiento detectará, arrestará y eliminará a posibles saboteadores y espías imperialistas."
 NKO_CHI_military_support: "Apoyo Militar Chino"
 NKO_CHI_military_support_desc: "China es nuestro hermano y aliado eterno. Para sobrevivir en el escenario internacional, volveremos a estar en los brazos de Beijing."
 NKO_CHI_invest_resources: "Asistencia en la Extracción de Recursos"
 NKO_CHI_invest_resources_desc: "Estamos listos para dejar entrar a las empresas de recursos chinas en nuestro territorio"
 NKO_CHI_banks: "Bancos Chinos"
 NKO_CHI_banks_desc: "Estamos listos para dejar entrar a los bancos chinos en nuestro país"
 NKO_CHI_help_factories: "Fábricas Chinas"
 NKO_CHI_help_factories_desc: "Tenemos la intención de pedirle al gobierno chino ayuda con la construcción de nuevas fábricas en nuestro territorio"
 NKO_CHI_huawei: "Cooperación con Huawei"
 NKO_CHI_huawei_desc: "Huawei Corporation es una de las más famosas del mundo y queremos que el gobierno chino les permita operar en nuestro territorio"
 NKO_perpetual_war_footing: "Solicitar Protección China"
 NKO_perpetual_war_footing_desc: "Nuestro gobierno militar es un objetivo potencial para la intervención. Debemos ceder parte de nuestra soberanía a China para asegurar nuestra supervivencia. Es lo necesario"
 NKO_Military_Collectives: "Gobierno de la Junta"
 NKO_Military_Collectives_desc: "Nuestra gente no está lista para abrazar a Occidente, necesitamos seguir manteniendo nuestro gobierno."
 NKO_expand_local_industry: "Inversiones en la Industria Nacional"
 NKO_expand_local_industry_desc: "Debemos expandir la producción nacional, porque sin una industria fuerte, nuestro país no podrá soportar la presión económica de nuestros enemigos"
 NKO_Encourage_private_enterprise: "Fomentar la Empresa Privada"
 NKO_Encourage_private_enterprise_desc: "La empresa privada es el futuro motor del progreso de nuestra economía, y tenemos la intención de fomentarla"
 NKO_Market-based_economy: "Economía Basada en el Mercado"
 NKO_Market-based_economy_desc: "Nuestro sistema económico solo nos ha traído problemas y crisis constantes, es hora de cambiar esto"
 NKO_Reorganising_Government: "Reorganizar el Gobierno"
 NKO_Reorganising_Government_desc: "Es hora de reorganizar el gobierno, el país necesita un nuevo gobierno."
 NKO_more_arms_factories: "Más Fábricas Militares"
 NKO_field_hospitals: "Hospitales de Campaña"
 NKO_field_hospitals_desc: "Desplegaremos más hospitales de campaña para que, en caso de guerra, podamos tratar a los soldados lo más rápido posible"
 NKO_reform_youth: "Reforma de la Guardia de los Trabajadores"
 NKO_reform_youth_desc: "Fue necesario reformar esta estructura hace mucho tiempo, su funcionalidad anterior hace tiempo que no está a la altura de la modernidad"
 NKO_Kim_Jong_un: "Kim Jong-un"
 NKO_Kim_Jong_un_desc: "Como sucesor de Kim Jong-il, quien ha recibido grandes esperanzas, Kim Jong-un espera hacer reformas económicas adecuadas para impulsar la economía del país mientras el país es estable y unido. Sin embargo, no quiere perder su firme control sobre el poder y su elevado estatus como \"linaje de sangre de Baekdu\"..."
 NKO_Consolidate_power: "Consolidar el Poder"
 NKO_Consolidate_power_desc: ""
 NKO_Light_Industry_Develop: "Desarrollar la Industria Ligera"
 NKO_Light_Industry_Develop_desc: ""
 NKO_Criticize_Ineptitude: "Criticar la Ineptitud"
 NKO_Criticize_Ineptitude_desc: ""
 NKO_Improvement_of_People_live: "Mejora de la Vida de las Personas"
 NKO_Improvement_of_People_live_desc: ""
 NKO_People_support: "Apoyo de las Personas"
 NKO_People_support_desc: ""
 NKO_Centralize_Power: "Centralizar el Poder"
 NKO_Centralize_Power_desc: ""
 NKO_Root_out_Corruption: "Erradicar la Corrupción"
 NKO_Root_out_Corruption_desc: ""
 NKO_Formalize_Power_Structures: "Formalizar las Estructuras de Poder"
 NKO_Formalize_Power_Structures_desc: ""
 NKO_Assassinate_Kim_Jong-Nam: "Asesinar a Kim Jong-nam"
 NKO_Assassinate_Kim_Jong-Nam_desc: "Kim Jong-nam siempre será una amenaza para la estabilidad de nuestro régimen si no está muerto, elimínalo a cualquier costo."
 NKO_Appoint_Loyalists: "Nombrar Leales"
 NKO_Appoint_Loyalists_desc: ""
 NKO_Civilian_Control_of_the_Economy: "Control Civil de la Economía"
 NKO_Civilian_Control_of_the_Economy_desc: ""
 NKO_Party_State_Army: "Partido, Estado, Ejército"
 NKO_Party_State_Army_desc: ""
 NKO_Party_Unchecked: "El Partido Eterno"
 NKO_Party_Unchecked_desc: ""
 NKO_Eternal_Juche_sasang: "Juche Eterno"
 NKO_Eternal_Juche_sasang_desc: ""
 NKO_Kim_Jong_Nam: "[ROOT.GetKimJongNam]"
 NKO_Kim_Jong_Nam_desc: "Desde la \"Marcha Forzada\", Kim Jong Nam se ha vuelto más ansioso por cambiar el atraso de Corea del Norte. Para ello, ha dirigido su atención a China, un país que ha tenido éxito en \"Reforma y Apertura\". Quiere usar la experiencia de reforma de este país vecino amigable para llevar a Corea del Norte a una \"Sociedad Próspera\"..."
 KimJongNam_BACK_NAME: "Kim Jong-nam ha Vuelto!"
 KimJongNam_NAME: "Kim Jong-nam"
 NKO_Face_world: "Enfrentar al Mundo"
 NKO_Face_world_desc: "La reforma institucional del país no se puede lograr sin apoyo externo, y por lo tanto necesitamos centrarnos en el aspecto diplomático del gobierno y tener buenas relaciones con el mundo."
 NKO_Conciliatory_Rhetoric: "Reconciliación con el Mundo"
 NKO_Conciliatory_Rhetoric_desc: "Los países extranjeros nos han malinterpretado durante demasiado tiempo, nuestra política de puertas abiertas puede convencerlos de nuestra postura pro-paz."
 NKO_Diplomatic_Overtures: "Establecer Relaciones Diplomáticas con Países"
 NKO_Diplomatic_Overtures_desc: "El segundo paso en la diplomacia norcoreana es el establecimiento de relaciones diplomáticas formales con varios países, lo que allanará el camino para la reforma en el país."
 NKO_step_up_joint_Ventures: "Invitar a Más Empresas Conjuntas"
 NKO_step_up_joint_Ventures_desc: "La inversión extranjera es un canal para ayudar a reformar nuestra economía y la damos la bienvenida."
 NKO_Embrace_the_people: "Abrazar a la Gente"
 NKO_Embrace_the_people_desc: "Nuestro país no puede permanecer cerrado para siempre. Es hora de abrir nuestros brazos y abrazar a nuestra gente y crear una Corea del Norte diferente."
 NKO_Loosen_Information_monopoly: "Aflojar el Monopolio de la Información"
 NKO_Loosen_Information_monopoly_desc: "La gente es libre de expresar sus opiniones."
 NKO_Tone_Down_Propaganda: "Reducir la Publicidad Oficial"
 NKO_Tone_Down_Propaganda_desc: "Aunque los medios oficiales solían encarnar la voluntad del estado, nuestras reformas de democratización no necesitan forzar la \"democracia\" en ellos ahora."
 NKO_End_forced_Labor: "Fin del Trabajo Forzado"
 NKO_End_forced_Labor_desc: "No más trabajo forzado, y avanzamos hacia el mundo abierto."
 NKO_Expand_SEZs: "Expandir las ZEE"
 NKO_Expand_SEZs_desc: "No podemos reformar nuestra economía sin la ayuda de las zonas económicas especiales en Raseon y Kaesong, y podemos establecer más zonas económicas especiales para que algunas personas se enriquezcan primero."
 NKO_End_Juche: "Fin de Juche"
 NKO_End_Juche_desc: "Juche no es una panacea; necesitamos un modelo de orientación más científico."
 NKO_Foreign_Knowledge: "Talentos de Investigación Externos"
 NKO_Foreign_Knowledge_desc: "La RPDC ha perdido mucho talento debido a sus políticas opresivas en las últimas décadas, y para llenar la brecha de talento, podríamos tener algunos investigadores externos."
 NKO_Join_the_WTO: "Unirse a la OMC"
 NKO_Join_the_WTO_desc: "Durante demasiado tiempo, hemos sido excluidos de los beneficios del comercio global compartidos por los miembros de la Organización Mundial del Comercio. Ahora que lo cambiaremos, podemos hacer un mejor uso de los mecanismos del orden económico liberal occidental al servicio de nuestras reformas."
 NKO_Preserve_the_Party: "Retener el Liderazgo del PTC"
 NKO_Preserve_the_Party_desc: "La reforma y la apertura no es lo mismo que poner fin al liderazgo del Partido de los Trabajadores, que puede llevar a la gente a un futuro próspero y brillante."
 NKO_Appeal_to_the_Youth: "Apelar a los Jóvenes"
 NKO_Appeal_to_the_Youth_desc: "Son los jóvenes los que son la columna vertebral de nuestra reforma."
 NKO_The_Choson_Dream: "El Sueño Choson"
 NKO_The_Choson_Dream_desc: "El \"Sueño Choson\" es un nuevo concepto introducido por el Presidente [NKO.GetLeader], que encapsula los objetivos personales y nacionales de la nación coreana. Aborda aspiraciones en muchos campos diferentes, incluidas las esferas económica, política e internacional."
 NKO_Democracy_with_North_Characteristics: "Democracia con Características Norcoreanas"
 NKO_Democracy_with_North_Characteristics_desc: "La democracia de estilo occidental no es completamente adecuada para la RPDC y la RPDC necesita su propia democracia con características de la RPDC."
 NKO_People_before_Party: "La Gente Antes que el Partido"
 NKO_People_before_Party_desc: "La gente son los dueños de su país!"
 NKO_Elections: "Elecciones Locales"
 NKO_Elections_desc: "Nuestras reformas incluyen la democratización del sistema político y el pueblo tendrá el poder de elegir a los líderes que deseen."
 NKO_Free_Expression: "Libertad de Expresión"
 NKO_Free_Expression_desc: "La gente de Corea del Norte ha sido suprimida durante demasiado tiempo bajo políticas opresivas y la principal libertad otorgada a la gente es la libertad de expresión."
 NKO_Byungjin: "Byungjin"
 NKO_Byungjin_desc: "Durante la Marcha Forzada, el sabio General Kim Jong-il mantuvo a flote a nuestro país adoptando la política de \"Songun\" para mantener su estabilidad. Pero ahora que la economía del país se ha recuperado, es hora de abandonar el antiguo enfoque centrado en lo militar y desarrollar nuestro ejército y economía en tándem!"
 NKO_Scale_Back_Spending: "Reducir el Gasto Gubernamental"
 NKO_Scale_Back_Spending_desc: ""
 NKO_Encourage_Consumption: "Fomentar el Consumo"
 NKO_Encourage_Consumption_desc: ""
 NKO_Loosen_Grip_on_SOEs: "Aflojar el Control sobre las EEPP"
 NKO_Loosen_Grip_on_SOEs_desc: ""
 NKO_State_owned_Enterprises_Competition: "Competencia de las Empresas Estatales"
 NKO_State_owned_Enterprises_Competition_desc: ""
 NKO_Resorts_and_Tourism: "Resorts y Turismo"
 NKO_Resorts_and_Tourism_desc: "Con sanciones internacionales, solo tenemos pocas formas de acceder a divisas. Fortalezcamos el turismo, dejemos que la gente de todo el mundo venga y vea la belleza de Corea del Norte!"
 NKO_Samjiyon: "Samjiyon"
 NKO_Samjiyon_desc: "Samjiyon es nuestro gran santuario revolucionario en Corea del Norte. Tiene un estatus similar al de Yan'an en China. Debemos trabajar duro para construir allí para que la gente pueda recibir más educación patriótica."
 NKO_Incentive-Based_Economy: "Economía Basada en Incentivos"
 NKO_Incentive-Based_Economy_desc: "Loosening central control over enterprises has shown results. By letting managers reward productivity and keep a share of output, the state harnesses self-interest in service of growth without abandoning the commanding heights of the economy."
 NKO_Empower_the_Donju: "Empoderar al Donju"
 NKO_Empower_the_Donju_desc: "Aunque el país no puede depender en exceso del mundo exterior para su desarrollo. Pero sin el Donju, nuestra economía no sería sostenible. Dale más derechos a favor del comercio, déjalos ser los líderes de la economía nacional, y deja que el caballo de mil labios de la economía coreana corra!"
 NKO_Weaken_the_Donju: "Debilitar al Donju"
 NKO_Weaken_the_Donju_desc: "Reetiquetar y revender bienes chinos y surcoreanos no ha hecho rico a nuestro país. Necesitamos centrarnos en nuestras propias marcas industriales y dejar que las marcas norcoreanas lleguen a la cima del mercado mundial!"
 NKO_Encourage_Foreign_Investment: "Fomentar la Inversión Extranjera"
 NKO_Encourage_Foreign_Investment_desc: "Por resilientes que sean nuestras industrias nacionales, su potencial económico completo no puede desbloquearse sin inversión del extranjero. Deberíamos ofrecer incentivos para fomentar la inversión extranjera directa en nuestra nación."
 NKO_Privatize_Means_of_Production: "Privatizar los Medios de Producción"
 NKO_Privatize_Means_of_Production_desc: ""
 NKO_Economy_Revival: "Revitalización Económica"
 NKO_Economy_Revival_desc: "Con el fin de la \"Marcha Forzada\", es hora de poner en marcha nuestra economía de nuevo."
 NKO_Priorit_for_Civilian_Industry: "Enfocarse en la Industria Civil"
 NKO_Priorit_for_Civilian_Industry_desc: ""
 NKO_Priorit_for_Army_Industry: "Enfocarse en la Industria Militar"
 NKO_Priorit_for_Army_Industry_desc: "La industria militar es vital para nosotros, tanto para impulsar nuestra demanda económica nacional como para fortalecer nuestras fuerzas de defensa."
 NKO_Arms_Trafficking: "Tráfico de Armas"
 NKO_Arms_Trafficking_desc: "¿Por qué debería haber innumerables armas apiladas en almacenes todo el tiempo? Podríamos cambiarlas por oro."
 NKO_Sinuiju: "Región Administrativa Especial de Sinuiju"
 NKO_Sinuiju_desc: "Sinuiju siempre ha sido un puerto importante para el comercio entre Corea del Norte y China. Podríamos seguir el enfoque de China de un país, dos sistemas. Para hacerlo más adecuado para el comercio con países extranjeros."
 NKO_Recognition_of_Economic_Backwardness: "Reconocimiento del Atraso Económico"
 NKO_Recognition_of_Economic_Backwardness_desc: "La economía de Corea del Norte se ha quedado atrás en los tiempos después de la \"Marcha Forzada\". Necesitamos reformas radicales"
 NKO_2009_Revaluation: "Revaluación"
 NKO_2009_Revaluation_desc: "Durante la Marcha Forzada, nuestra economía nacional, y en particular nuestro sistema monetario, se vio muy afectado. La gente no confiaba en nuestra moneda y la vida diaria estaba llena de trueque. Para cambiar esta situación, necesitamos una reforma monetaria audaz y una revaluación."
 NKO_Revaluation_Failure: "Fracaso de la Revaluación..."
 NKO_Revaluation_Failure_desc: ""
 NKO_Air_Koryo: "Air Koryo"
 NKO_Air_Koryo_desc: ""
 NKO_Reform_of_the_Privatisation_of_Collective_Farms: "Privatización de Granjas Colectivas"
 NKO_Reform_of_the_Privatisation_of_Collective_Farms_desc: "Relajación de los controles sobre las granjas colectivas locales para aumentar su incentivo para producir."
 NKO_Construction_of_Hydraulic_Facilities: "Construcción de Instalaciones Hidráulicas"
 NKO_Construction_of_Hydraulic_Facilities_desc: "Para aumentar los rendimientos agrícolas sin depender tanto de fertilizantes químicos, debemos construir más instalaciones hidráulicas."
 NKO_Free_Housing: "Vivienda Gratuita Extra"
 NKO_Free_Housing_desc: "Construye más apartamentos, deja que la gente pueda pagarlos!"
 NKO_Expand_Compulsory_Education: "Expandir la Educación Obligatoria"
 NKO_Expand_Compulsory_Education_desc: "La educación es la base de una nación fuerte. Ampliar la educación obligatoria, dar a más niños acceso a niveles más altos de educación."
 NKO_Chollima_Speed_desc: "El desarrollo de la infraestructura es un paso importante en el camino para reconstruir nuestra economía, no solo para nuestro desarrollo económico, sino también para fines militares, como carreteras capaces de transportar equipos pesados y ferrocarriles capaces de transportar trenes de misiles."
 korea_north.1.t: "Corea del Norte nos pide que retiremos nuestras tropas de Corea del Sur"
 korea_north.1.d: "Corea del Norte exige que retiremos las tropas estadounidenses de Corea del Sur y rompamos lazos con Corea del Sur, o usarán armas nucleares en caso de reunificación. Aunque Corea del Norte siempre ha sido principalmente intimidante sin intención de seguir con sus amenazas, esta vez parece ser real..."
 korea_north.1.a: "Esta demanda es ridícula!"
 korea_north.1.b: "Es mejor para nosotros ceder..."
 korea_north.2.t: "Corea del Norte se une a la Organización Mundial del Comercio"
 korea_north.2.d: "Después de largas negociaciones entre la RPDC y los miembros actuales de la Organización Mundial del Comercio (OMC), la solicitud de la RPDC para unirse a la OMC finalmente ha sido aprobada. La RPDC tuvo que mostrar a los miembros de la OMC, especialmente a Estados Unidos, la Unión Europea y China, que estaba tomando medidas significativas para abrir su economía a la competencia. Los medios oficiales de la RPDC describieron el evento como \"un momento histórico en el proceso de reforma y modernización de la RPDC\"."
 korea_north.2.a: "Corea del Norte continúa abriéndose al mundo."
 korea_north.3.t: "Revaluación"
 korea_north.3.d: "Los funcionarios norcoreanos anunciaron una reforma monetaria a gran escala para revaluar la moneda, con un límite de 100,000 monedas antiguas por hogar.\n¿Cuál será la tasa de cambio entre la moneda antigua y la nueva?"
 korea_north.3.a: "25(antiguo) a 1(nuevo)"
 korea_north.3.b: "100(antiguo) a 1(nuevo)"
 korea_north.4.t: "Éxito de la Revaluación"
 korea_north.4.d: "Después de todos nuestros esfuerzos, nuestra reforma monetaria finalmente ha tenido éxito!"
 korea_north.4.a: "¡Impresionante!"
 korea_north.5.t: "Aliviar Conflictos"
 korea_north.5.d: "Nuestras reformas recientes han llevado a algo de caos, con personas intercambiando frenéticamente moneda extranjera e incluso un motín en la provincia de North Hamgyong. ¿Deberíamos hacer algunas concesiones?"
 korea_north.5.a: "Mantener el statu quo."
 korea_north.5.b: "Relajación del número de restricciones de cambio de moneda."
 korea_north.6.t: "Fracaso de la Revaluación..."
 korea_north.6.d: "La reforma monetaria llevó al caos económico ya que los bienes no se podían vender antes de que el estado fijara los precios y la población entrara en pánico en medio de una lucha por cambiar moneda extranjera.\nEl won norcoreano cayó un 96% frente al dólar estadounidense en la semana siguiente a la reforma monetaria y el precio del arroz por kilo subió de 17 won norcoreanos a 50 won en tres días. Se declaró que la reforma monetaria fue un fracaso total."
 korea_north.6.a: "Ejecutar a la persona responsable!"
 korea_north.7.t: "Las Drogas están Inundando Nuestras Calles"
 korea_north.7.d: "Las calles se ahogan en el caos mientras poderosas drogas como la metanfetamina y la cocaína inundan los vecindarios, destrozando comunidades. Las familias están destrozadas, el crimen está en aumento y nadie se siente seguro ya."
 korea_north.7.a: "Nuestros enemigos caerán!"
 korea_north.8.t: "Nuestras drogas han sido detenidas en la frontera"
 korea_north.8.d: "Everything was going smooth until the message came through: the shipment got stopped at the border. Now, everything is on the line. Months of planning is gone down the drain "
 korea_north.8.a: "Lo intentaremos de nuevo"
 korea_north.9.t: "El Dinero Falsificado está Plagando Nuestro Sistema Bancario"
 korea_north.9.d: "El dinero falso está en todas partes, deslizándose por las manos y los negocios sin ser detectado, dejando el caos a su paso. Tiendas locales, vendedores ambulantes e incluso grandes minoristas se están quemando a medida que los billetes falsos circulan más rápido de lo que las autoridades pueden responder."
 korea_north.9.a: "El Imperialismo Caerá!"
 korea_north.10.t: "Nuestro Dinero Falsificado ha sido Capturado por las Autoridades!"
 korea_north.10.d: "Las autoridades han capturado este envío pero esto no es el fin, esto es solo el comienzo."
 korea_north.10.a: "Haz más!"
 korea_north.11.t: "[NKO.GetName] Nos Ofrece Comprar Sus Armas"
 korea_north.11.d: "El gobierno norcoreano está dispuesto a vendernos en secreto un lote de sus armas a través de canales clandestinos. Armas que, aunque no sean de la mejor calidad, adquirirlas en tal cantidad en este momento puede tener un efecto positivo en el estado de nuestro ejército."
 korea_north.11.a: "Estamos Comprando"
 korea_north.11.b: "No"
 korea_north.12.t: "Nuestras Armas Fueron Compradas por [FROM.GetName]"
 korea_north.12.d: "Nuestra oferta de compra de armas ha sido aceptada por su gobierno!."
 korea_north.12.a: "Genial"
 korea_north.13.t: "No Pudimos Vender las Armas"
 korea_north.13.d: "Nuestra oferta de compra de armas fue rechazada por su gobierno, ¿de qué tienen tanto miedo?"
 korea_north.13.a: "Triste"
 kim_jong_il_death.1.t: "¿Quién será el heredero del \"trono\"?"
 kim_jong_il_death.1.d: "Kim Jong-il no vivirá mucho y debe elegir a su sucesor entre sus dos hijos.\nKim Jong-un prefiere una reforma conservadora del sistema político y económico del país. Kim Jong-nam prefiere la reforma de la economía de mercado socialista, así como una reforma más radical del sistema político."
 kim_jong_il_death.1.a: "Kim Jong-un!"
 kim_jong_il_death.1.b: "Kim Jong-nam!"
 kim_jong_il_death.2.t: "El camarada Kim Jong-il ha muerto!"
 kim_jong_il_death.2.d: "El amado Gran Líder, el fundador de la República Popular Democrática de Corea y el Presidente eterno de la República, Kim Jong-il, murió a las 8.30 a.m. del 17 de diciembre de 2011 de un infarto agudo de miocardio complicado por un shock cardiogénico mientras se dirigía a visitar un área en tren."
 kim_jong_il_death.2.a: "Noticias Tristes..."
 kim_jong_il_death.3.t: "Un Informe de Kim Jong-un..."
 kim_jong_il_death.3.d: "Kim Jong-un entró en la oficina de su padre. La habitación olía fuertemente a humo y su padre parecía haber terminado un puro completo y estaba de buen humor.\n\"Padre, el camarada Jang Song-thaek parece estar vendiendo los intereses del país en privado a sus espaldas y he compilado un informe.\"\nColocó el informe sobre la mesa, junto a un cenicero lleno de colillas y medio vaso de whisky sin terminar.\nKim Jong-il lo recogió y lo miró, \"El asunto de vender antigüedades fue hecho por mí con Jang Sung-taek con la gente de la Habitación 39, el país realmente no tenía dinero, fue una medida desesperada... y el camarada Jang Sung-taek solo actuaba bajo órdenes. Además de eso, no es gran cosa, algunos de los cuales me ha hablado antes, y yo he consentido.\"\nEl padre se levantó, caminó hacia Kim Jong-un y le dio una palmada en el hombro, \"Jong-un, estos son asuntos pequeños, deberías encontrar al camarada Jang Sung-taek para resolverlos en privado, no siempre eleves rencores personales a alturas políticas.\" El padre tomó su vaso y tomó un sorbo, \"Vete, hablaré con Jang Sung-taek pronto.\""
 kim_jong_il_death.3.a: "\"Chang Sung-taek tampoco parece ser muy confiable...\""
 kim_jong_il_death.4.t: "Kim Jong-nam toma el poder en Corea del Norte!"
 kim_jong_il_death.4.d: "Esta mañana, Kim Jong-nam se ha convertido oficialmente en el Presidente de la Comisión de Asuntos de Estado y Secretario General del Partido de los Trabajadores de Corea. Se informa que su hermano Kim Jong-un ha huido del país y vive escondido en algún lugar."
 kim_jong_il_death.4.a: "¿Qué tiene que ver esto con nosotros?"
 kim_jong_il_death.4.b: "Inesperado."
 kim_jong_il_death.5.t: "Kim Jong-un toma el poder en Corea del Norte!"
 kim_jong_il_death.5.d: "Esta mañana, Kim Jong-un se ha convertido oficialmente en el Presidente de la Comisión de Asuntos de Estado y Secretario General del Partido de los Trabajadores de Corea. Se informa que su hermano Kim Jong-nam se ha mudado al extranjero."
 kim_jong_il_death.5.a: "¿Qué tiene que ver esto con nosotros?"
 kim_jong_il_death.5.b: "Esperado."
 kim_jong_il_death.6.t: "La Junta del Ejército Popular Conduce un Golpe Sorpresa en Corea del Norte!"
 kim_jong_il_death.6.d: "En noticias sorprendentes, un golpe militar por el EPC tuvo lugar en Corea del Norte esta mañana, con el nuevo gobierno de la junta anunciando que asumiría el poder dejado vacante por la muerte de Kim Jong-il. La nueva Junta afirmó que fue un golpe de estado para preservar la pureza de la ideología Juche a la \"solicitud urgente del estado y la nación coreanos\"."
 kim_jong_il_death.6.a: "¿Qué tiene que ver esto con nosotros?"
 kim_jong_il_death.6.b: "Noticias sorprendentes, ¿esto representa el fin completo de la dinastía Kim?"
 kim_jong_il_death.6.c: "Oh Dios..."
 kim_jong_il_death.7.t: "Solicitud de Jang Song-thaek"
 kim_jong_il_death.7.d: "La visita de Jang Song-thaek a China para reunirse con [CHI.GetLeader], con la esperanza de que China intervenga para ayudar a Kim Jong-nam a ganar poder."
 kim_jong_il_death.7.a: "Decirle a Kim Jong-un esta información."
 kim_jong_il_death.7.b: "No hacer nada. ¿Qué tiene que ver Kim Jong-un conmigo?"
 NKO_united_front_department: "[Root.38th_parallel]"
 NKO_united_front_department_desc: "Desde el final de la Segunda Guerra Mundial, Corea ha sido una nación dividida. La polarización ideológica y el conflicto de grandes potencias han separado a las familias e impedido la realización del potencial completo del pueblo coreano. En el Sur, aunque las generaciones mayores aún recuerdan una Corea unida y anhelan la reunificación, el recuerdo de una península unida está comenzando a desvanecerse gradualmente.\n\nEl §YApoyo a la Reunificación§!, junto con la §Yopinión§! de Corea del Sur sobre nosotros y la creciente popularidad del §YEmergente§! en el Sur determina cuánto estará dispuesto el pueblo surcoreano a ceder en las negociaciones de reunificación. Disminuye a una tasa del 0.1% por mes y está afectado por decisiones, enfoques y eventos. Si o cuando se produzca la reunificación, deberá mantenerse alta para asegurar que el país permanezca unido."
 NKO_close_kaesong_industrial_park: "Cerrar el Parque Industrial de Kaesong"
 NKO_close_kaesong_industrial_park_desc: "Nuestros homólogos al otro lado de la ZDM no se pueden confiar. Deberíamos cerrar el Parque Industrial de Kaesong para evitar que se beneficien de él."
 NKO_reopen_kaesong_industrial_park: "Reabrir el Parque Industrial de Kaesong"
 NKO_reopen_kaesong_industrial_park_desc: "Debemos mostrar a nuestros compatriotas que estamos dispuestos a buscar mejores relaciones. Con ese fin, deberíamos reabrir el acceso al Parque Industrial de Kaesong."
 NKO_restart_peace_talks: "Reanudar las Conversaciones de Paz"
 NKO_restart_peace_talks_desc: "El Sur ha rechazado nuestra oferta de paz, pero eso no significa que no podamos intentarlo de nuevo. Sin embargo, primero debemos intentar hacer lo que podamos para evitar un fracaso en la repetición de las conversaciones anteriores."
 NKO_Arduous_March: "La Marcha Forzada"
 NKO_Arduous_March_desc: "El §Rhambruna norcoreana§! fue un período de hambre masiva junto con una crisis económica general desde 1994 en Corea del Norte, también conocida como la \"Marcha Forzada\"."
 NKO_accept_money: "§YAceptar§! Dinero"
 NKO_medicine_relief: "§YEnviar§! Ayuda Médica"
 NKO_build_farms1: "§YGranjas§! Construcción"
 NKO_build_farms1_desc: "Construir las Granjas para alimentar a nuestra gente es un deber esta granja está en construcción"
 NKO_build_factory1: "Construcción de §YIndustria Civil§!"
 NKO_build_factory1_desc: "Para ayudar a nuestra economía a crecer debemos empoderar a nuestra gente para producir más bienes de consumo e incrementar nuestra capacidad industrial."
 NKO_international_assistance: "§YAceptar Ayuda Humanitaria Internacional§!"
 NKO_international_assistance_desc: "\"Los norcoreanos dan la bienvenida a la ayuda humanitaria de extranjeros\"."
 NKO_end_of_arduous_march: "§YEl Fin§! de la Marcha Forzada"
 NKO_end_of_arduous_march_desc: "Bajo el liderazgo del Gran Líder [NKO.GetLeader], finalmente logramos una gran victoria contra \"La Marcha Forzada\"!"
 korea_herb: "§YApoyo a la Reunificación§!"
 korea_herb_output: "§YApoyo a la Reunificación§!"
 korea_herb_output_text: "§Y[?KOR.SFR]%§!"
 NKO_social_security: "Ministerio de Seguridad Social"
 NKO_social_security_desc: "El Ministerio de Seguridad Social, comúnmente conocido como BoAn o el Ministerio de Seguridad del Pueblo, es el ministerio del interior y la principal agencia de aplicación de la ley dentro de Corea del Norte. El ministerio sirve como la fuerza oficial de seguridad pública e interna, responsable de mantener el orden público y proteger instalaciones clave, incluidos ferrocarriles y otros medios de transporte."
 NKO_security_forces: "Fuerzas de Seguridad Social"
 NKO_security_forces_desc: "Las Fuerzas de Seguridad Social es una fuerza paramilitar norcoreana que realiza varias tareas de seguridad interna y seguridad fronteriza"
 NKO_railway_bureau: "Buró de Seguridad Ferroviaria"
 NKO_railway_bureau_desc: "Buró de Seguridad Ferroviaria - guarda rutas importantes de viaje y transporte dentro de la RPDC"
 NKO_finacial_bureau: "Agencia de Inteligencia Financiera"
 NKO_finacial_bureau_desc: "Agencia de Inteligencia Financiera - combate el lavado de dinero, la extorsión y otros delitos financieros"
 NKO_corrections_bureau: "Buró de Correcciones"
 NKO_corrections_bureau_desc: "El Buró de Correcciones opera el brutal sistema penitenciario en Corea del Norte"
 NKO_social_security_forces_idea: "Fuerzas de Seguridad Social"
 NKO_social_security_idea: "Ministerio de Seguridad Social"
 NKO_black_market: "Tercer Piso"
 NKO_black_market_desc: "The Third Floor is a general use term referring to the interaction of  three bureaus subordinate to. the Party Central Committee Secretariat. Bureau 35, Bureau 38, Bureau 39, in coordination with the Personal Secretariat are tasked with intelligence collection, earning foreign currency for the party and core elites and managing some of the party's and the Kim Family's money.  Third Floor operatives, stationed in over 20 countries in the world, were also responsible for the purchase of a variety of goods for DPRK elites and collecting intelligence, outside of the DPRK's dedicated information networks.The term Third Floor refers to the original location of these offices on the third floor of Kim Jong-il's office building in the KWP Central Committee Office Complex in the Central District of Pyongyang.  The Third Floor is technically subordinate to the Party Central Committee.  However, it is directly tied to the Kim Family."
