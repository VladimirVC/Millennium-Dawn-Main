 JUB.Nat_Autocracy: "£generic_Nat_Autocracy_small (ASF) ソマリア連合軍"
 JUB.Nat_Autocracy_desc: "派閥主義的軍事政権 - ソマリア連合軍は、1999年にソマリア国内情勢の悪化を背景にジュバランド地域にて台頭し、地元の軍閥指導者モハメド・サイド・ヘルシ・モルガンに対抗して活動した。同組織は主にマレハン氏族から支持を得ており、ソマリア国民戦線など、マレハン氏族が主導する他の組織とも一定のつながりを持っている。"
 JUB.Nat_Autocracy_1: "£generic_Nat_Autocracy_small (JVA) ジュバ渓谷同盟"
 JUB.Nat_Autocracy_desc_1: "派閥主義的軍事政権 - ソマリア連合軍から派生したジュバ渓谷同盟は、バレ・アダン・シレ・ヒラーレを中心に結成された。この組織は全体としてマレハン氏族が主導しており、ソマリアの国家政府樹立を支持し、ジュバランド地域内の地方軍閥やイスラム主義勢力と敵対している。"
