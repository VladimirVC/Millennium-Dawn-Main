 IND_papua_resist4: "Résistance chrétienne papoue"
 IND_papua_resist_info: "Les chrétiens de notre pays résident principalement en Papouasie. Malheureusement, ils ont été victimes d'abus de la part des gouvernements passés et actuels et les habitants ne nous aiment pas du tout, ce qui fait de nos missions politiques là-bas un véritable défi."
 IND_islamic_resist: "Résistance musulmane de Sulawesi"
