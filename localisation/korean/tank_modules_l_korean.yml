 medium_tank_destroyer_chassis_0: "1세대 경전차 차체"
 medium_tank_destroyer_chassis_0_desc: "The role of light tanks is reconnaissance and airborne operations, but they have the disadvantage of weak armor and low survivability under various anti-tank weapons today. Coupled with the emergence of infantry tanks, the development of light tanks has declined."
