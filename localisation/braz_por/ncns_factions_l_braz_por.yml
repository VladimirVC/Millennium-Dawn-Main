l_braz_por:
 faction_manifest_containment_of_decadence_name: "Contenção da Decadência Ocidental"
 faction_manifest_containment_of_decadence_desc: "'Em nome de Deus, o clemente, o misericordioso'\n--------------\nO que temos senão nossa própria carne e sangue para proteger esta terra? A sede imperialista por terras que não lhes pertencem jamais poderia ser saciada com simples diplomacia. Por fim, um Eixo de Resistência é o único caminho a seguir para impedir que agendas imperialistas ganhem terreno no mundo, mesmo que isso signifique lutar até o último homem."
 faction_manifest_peace_in_our_time_name: "Paz no Mundo"
 faction_manifest_peace_in_our_time_desc: "'Animus in consulendo liber'\n--------------\nO colapso do Pacto de Varsóvia e a ascensão do direito e da ordem internacional mais uma vez foram possíveis graças ao esforço coletivo dos Estados-membros da OTAN. Hoje, contudo, parece que alguns estados em nosso mundo decidiram explorar esta era de estabilidade em seus próprios interesses, e estão trabalhando ativamente contra os esforços da OTAN. Para garantir a segurança em nossos tempos, devemos trabalhar para expandir a aliança para novas fronteiras e assegurar a segurança para todos os povos globalmente."
 faction_manifest_unite_islamic_countries_name: "Unir o Mundo Islâmico"
 faction_manifest_unite_islamic_countries_desc: "Por séculos, o mundo islâmico tem estado desarticulado - agora, por meio da cooperação e do entendimento, podemos estar unidos mais uma vez."
 faction_manifest_the_second_red_wave_goal_name: "A Segunda Onda Vermelha"
 faction_manifest_the_second_red_wave_goal_desc: "Quando os bolcheviques tomaram o poder pela primeira vez, eles acenderam um fogo que durou décadas. Contudo, eles não conseguiram resolver a maior falha do seu novo sistema: a liderança incompetente. Enquanto o Ocidente se fortalecia, a União Soviética estagnava. Vivemos sob ditaduras comunistas por tempo demais. Agora, é a nossa vez de governar o mundo sob a nossa própria visão de comunismo."
 faction_manifest_comeback_of_the_monarchy_name: "O Retorno da Monarquia"
 faction_manifest_comeback_of_the_monarchy_desc: "Por séculos, as monarquias governaram o mundo com sabedoria e força. Contudo, nas últimas décadas, repúblicas e democracias assumiram o controle, introduzindo apenas paz e estabilidade temporárias. Aquela prosperidade começou a cair, por isso é hora de as monarquias se erguerem novamente, para restaurar a ordem e a tradição às nossas nações. Por meio da unidade e da cooperação, podemos trazer de volta a glória da monarquia e conduzir nosso povo a um futuro mais brilhante."
 faction_manifest_preserving_our_place_name: "Preservando Nosso Lugar no Mundo"
 faction_manifest_preserving_our_place_desc: "'Segurança coletiva em um mundo multipolar'\n--------------\nO colapso da União Soviética trouxe a criação de vários estados. Tal evento apresentou-se como uma oportunidade para o bloco ocidental, onde os Estados Unidos e o restante da OTAN buscaram trazer ex-estados soviéticos para sob sua influência. Embora muitos digam que os Estados Unidos, agora hegemonicos, são a única superpotência mundial, é a intenção de nossa facção descarrilar qualquer esperança de que isso se torne uma realidade permanente. Por meio da força na unidade, garantiremos que a esfera pós-soviética seja protegida, armada e preparada."
 faction_cento_motto_name: "Liberdade, União, Vigilância"
 faction_cento_motto_desc: "'Uma ponte entre o Oriente e o Ocidente'\n--------------\nDo nada surgiu algo, uma identidade e aliança reconstruídas. Em uma região tão conturbada, o que homens fracos poderiam realizar? Infelizmente, é à CENTO que foi confiada a responsabilidade de vigiar e garantir a estabilidade contínua de todas as vidas confinadas nestas fronteiras orientais."