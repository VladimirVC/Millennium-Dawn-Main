 belarus_another.6.t: "卢卡申科崇拜"
 belarus_another.6.d: "亚历山大·卢卡申科长期担任白俄罗斯共和国总统。在他的统治下，围绕他形成了一种名为“老爹”的个人崇拜。这种个人崇拜不仅使他与其他独联体国家的独裁者区别开来，也要求他以特殊的方式与民众互动。“老爹支持率”指标显示了民众对亚历山大·格里戈里耶维奇·卢卡申科的支持程度。根据不同的行为，该指标会上升或下降，并带来相应的奖励或惩罚。"
 belarus_another.6.a: "我们的老爹卢卡申科，白俄罗斯母亲"
