 HKG_contract_title: "中国海军采购合同"
 HKG_contract_standing_line: "§Y与北京站在一起：§! [?HKG_contract_standing|0] / [?HKG_contract_standing_max|0]"
 HKG_contract_funds_line: "§Y合同收入：§! $[?HKG_contract_funds|0]"
