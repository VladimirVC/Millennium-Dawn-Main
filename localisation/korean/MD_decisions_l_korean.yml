 MD_preemptive_reform: "선제적 개혁"
 MD_preemptive_reform_desc: "불만이 공개적인 위기로 비화하기 전에 추진되는 일회성 양보 및 안정화 조치 제안안입니다. 일찍 행동하여 최악의 상황을 진화합니다."
 MD_emergency_police_funding: "공약: 긴급 경찰 자금 지원"
 MD_emergency_police_funding_desc: "폭동 진압대, 감시, 초과 근무 수당에 긴급 자금을 쏟아붓고 대중에 질서가 회복될 것이라고 약속합니다. 공약을 완수하면 보안 부대의 정당성이 입증됩니다. 실패하면 국민들은 단속을 예산 낭비로 여길 것입니다."
 MD_police_funding_mission: "공공 질서 회복"
 MD_police_funding_mission_desc: "우리는 보안 단속에 예산을 걸었습니다. 이제 대중의 인내심이 바닥나기 전에 거리를 정리해야 합니다. 경찰 국가 정신, 구조적 해결책, 그리고 시간에 기대십시오."
 MD_tax_relief_promise: "공약: 시민을 위한 세금 감면"
 MD_tax_relief_promise_desc: "재정 부양책과 함께 저소득층 가구를 위한 광범위한 세금 감면을 발표하고, 이를 통해 국가를 안정시키겠다고 약속합니다. 공약을 완수하면 대중은 우리를 신뢰할 것입니다. 실패하면 깨진 약속을 기억할 것입니다."
 MD_tax_relief_mission: "안정 제공"
 MD_tax_relief_mission_desc: "세금 감면이 시행 중이며 대중이 지켜보고 있습니다. 패키지의 효과가 끝나기 전에 국가가 눈에 띄게 안정되어야 합니다. 중점을 완료하고, 불안정을 유발하는 이벤트를 피하며, 균형 잡힌 지출을 유지하십시오."
 MD_jobs_for_unemployed: "공약: 실업자를 위한 일자리 프로그램"
 MD_jobs_for_unemployed_desc: "광범위한 공공 토목 사업 및 고용 프로그램을 발표하고 실업자들에게 일자리를 약속합니다. 공약을 완수하면 시위 위기의 위세가 꺾입니다. 실패하면 깨진 약속으로 인해 대가를 치르게 됩니다."
 MD_jobs_program_mission: "실업률 감소"
 MD_jobs_program_mission_desc: "우리는 대중에게 대규모 일자리 프로그램을 약속했습니다. 약속 기한이 도래하기 전에 실업률이 떨어져야 합니다. 산업 공장 건설을 촉진하고, 복지 지출을 늘리며, 고용을 창출하는 중점을 통과시키십시오."
 MD_police_funding_mission_available_tt: "시위 강도가 자금 지원 승인 당시 설정된 목표치 미만입니다"
 MD_tax_relief_mission_available_tt: "안정도가 제시안 발표 당시 설정된 목표치 초과입니다"
 MD_jobs_program_mission_available_tt: "실업률이 공약 발표 당시 설정된 목표치 미만입니다"
 MD_preemptive_reform_available_tt: "시위 강도가 §Y30§! 초과입니다"
 MD_appease_warning_timer_tt: "경고 임무 타이머에 §G60§!일 추가"
 MD_appease_revolt_timer_tt: "반란 임무 타이머에 §G280§!일 추가"
 MD_preemptive_reform_strength_tt: "§G-20§! 시위 강도"
 MD_promise_police_start_tt: "§Y공공 질서 회복§! 임무를 시작합니다. §Y200§!일 이내에 시위 강도를 현재 수준보다 §G10§! 낮추십시오."
 MD_promise_tax_start_tt: "§Y안정 제공§! 임무를 시작합니다. §Y300§!일 이내에 안정도를 현재 수준보다 §G5%§! 높이십시오."
 MD_promise_jobs_start_tt: "§Y실업률 감소§! 임무를 시작합니다. §Y350§!일 이내에 실업률을 현재 수준보다 §G1.5%§! 낮추십시오."
 MD_promise_police_reward_tt: "§Y성공 시:§! 반란 임무에 §G+75§!일(경고 임무에 §G+40§!일), §G-1§! 급진화, §G+2%§! 안정도.\n§Y시간 초과 시:§! §R+3§! 시위 강도."
 MD_promise_tax_reward_tt: "§Y성공 시:§! 반란 임무에 §G+100§!일(경고 임무에 §G+50§!일), §G-10§! 시위 강도, §G-1§! 급진화, §G+3%§! 연합 지지율.\n§Y시간 초과 시:§! §R+5§! 시위 강도."
 MD_promise_jobs_reward_tt: "§Y성공 시:§! 반란 임무에 §G+120§!일(경고 임무에 §G+60§!일), §G-10§! 시위 강도, §G-1§! 급진화, §G+5%§! 안정도.\n§Y시간 초과 시:§! §R+5§! 시위 강도."
 command_power_more_than_150: "£command_power §H145§!"
 command_power_more_than_150_blocked: "£command_power §R145§!"
 add_productivity_idea: "멀티플레이 생산성 부스터"
 add_productivity_idea_desc: "국가 생산성이 1000에 도달할 때까지 매월 일정한 수치만큼 꾸준히 상승시키며, 도달 시 부스터 효과가 제거됩니다."
 NATO_CSTO_AI_breach_fix: "CFE 조약 위반 정리"
 SWI_join_the_united_nations: "유엔 가입"
 SWI_join_the_united_nations_desc: "스위스는 오랫동안 정회원국이 아닌 유엔 참관국(옵저버)으로 남아 있었습니다. 국민 투표를 통해 국가의 국제연합 정회원국 가입을 확정할 것입니다."
 cost_14_0: "£treasury 14.0"
 cost_14_0_blocked: "£treasury §R14.0§!"
