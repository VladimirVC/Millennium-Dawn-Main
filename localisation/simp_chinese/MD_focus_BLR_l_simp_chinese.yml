 BLR_mzkt_another_desc: "明斯克轮式拖拉机厂是一家专业生产公路和非公路重型车辆、牵引车辆以及用于建筑、石油天然气和机械制造行业的专用轮式底盘的企业。它是白俄罗斯共和国国家军事工业委员会下属的国有企业。"
