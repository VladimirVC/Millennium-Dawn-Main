 algeria_news.9.c_tt: "$opinion_tick_rate_tt$\n归咎于外部势力所产生的影响力效果：\n\n§Y军方§!：[?ALG_military_opinion|+%]（当前：[?ALG_military_opinion_current|Y%]）\n§Y乌理玛§!：[?ALG_ulema_opinion|+%]（当前：[?ALG_ulema_opinion_current|Y%]）\n§Y恐怖威胁§!：+8\n§Y民族主义倾向§!：+2%\n§Y国库§!：+50\n§Y政治点数§!：+30"
