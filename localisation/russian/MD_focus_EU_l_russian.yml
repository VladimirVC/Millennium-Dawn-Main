 EUvote.1.t: "Голосование в Европарламенте началось"
 EUvote.1.d: "Парламент ЕС вынес законопроект на голосование! Посетите раздел Парламента ЕС, чтобы помочь рассмотреть или принять эту меру."
 EUvote.1.a: "На выборы!"
 EUvote.2.t: "Началось голосование в Совете ЕС"
 EUvote.2.d: "Совет ЕС начал голосование по новому закону! Перейдите в раздел Euro Voting, чтобы проголосовать и повлиять на другие страны!"
 EUvote.2.a: "На выборы!"
 EUevent.2.t: "Сделка между ЕС и Турцией"
 EUevent.2.d: "Между §C[EUU.GetFlag] Европейским союзом§! и [TUR.GetNameWithFlag] достигнута договоренность, направленная на прекращение потока нелегальной миграции через Турцию в Европу. Согласно заявлению ЕС-Турция, все новые нелегальные мигранты и просители убежища, прибывающие из Турции на греческие острова и чьи ходатайства о предоставлении убежища были признаны неприемлемыми, должны быть возвращены в Турцию. §C[EUU.GetFlag] Европейский союз§! заплатит 3 миллиарда евро за Фонд для беженцев в Турции."
 EUevent.2.a: "Понятно"
 EUevent.17.t: "Сделка между ЕС и Турцией"
 EUevent.17.d: "Между §C[EUU.GetFlag] Европейским союзом§! и [TUR.GetNameWithFlag] достигнута договоренность, направленная на прекращение потока нелегальной миграции через Турцию в Европу. Согласно заявлению ЕС-Турция, все новые нелегальные мигранты и просители убежища, прибывающие из Турции на греческие острова и чьи ходатайства о предоставлении убежища были признаны неприемлемыми, должны быть возвращены в Турцию. §C[EUU.GetFlag] Европейский союз§! заплатит 3 миллиарда евро за Фонд для беженцев в Турции."
 EUevent.17.a: "Понятно"
 EUevent.4.t: "Соединённые Штаты Европы"
 EUevent.4.d: "[FROM.GetNameWithFlag] объединяет члены ЕС §C[EUU.GetFlag] Европейский союз§! в одно европейское супергосударство под названием §C[EUU.GetFlag] Соединенные Штаты Европы§!. [ROOT.GetNameWithFlag] откажется от своего суверенитета и присоединится §C[EUU.GetFlag] Соединенные Штаты Европы§!."
 EUevent.4.a: "Ода Радости!"
 EUevent.5.t: "Европейский долговой кризис"
 EUevent.5.d: "Неспособность Европейского Союза провести реформу Еврозоны. Страны в пределах союза не в состоянии погасить или рефинансировать свой государственный долг или спасти банки с чрезмерной задолженностью. Государства-члены сейчас пытаются быстро продвинуть реформы, чтобы обеспечить финансовую и экономическую жизнеспособность Еврозоны. Кризис начался, и евро находится на грани."
 EUevent.5.a: "Евро под угрозой!"
 EUevent.6.t: "Реформы Еврозоны"
 EUevent.6.d: "Надвигающийся долговой кризис удалось предотвратить благодаря серии реформ в еврозоне, таких как создание фискального союза и расширение полномочий Европейского центрального банка (ЕЦБ) и дополнительных механизмов стабильности. Еврозона была спасена, и Европейский союз теперь может смотреть в будущее с уверенностью, что кризис предотвращен."
 EUevent.6.a: "В разнообразии конкордия."
 EUevent.7.t: "Реформы Еврозоны"
 EUevent.7.d: "Глобальный финансовый кризис в Соединенных Штатах вызвал каскадный эффект среди стран Европы. Многие члены Европейского парламента ищут решение проблемы растущего долга в ряде стран Европейского союза. Страны не смогли ни выплатить, ни рефинансировать свой государственный долг, ни выдать экстренные фонды банкам-банкротам в результате глобального финансового кризиса. Все упомянутые государства-члены сообщили о неспособности погасить свой долг и опубликовали, что их бюджетный дефицит был намного хуже, чем считалось ранее. Главной общей чертой среди стран является то, что первопричина кризиса заключается в перераспределении частного долга в государственный долг посредством серии мер по спасению долгов для спасения испытывающих трудности учреждений в странах. Европейский центральный банк (ЕЦБ) и Международный валютный фонд (МВФ) начали разрабатывать соглашения с государствами-членами о выдаче пакетов помощи и национальных программ спасения для предотвращения гораздо более серьезного кризиса. Единственное, что остается ясным, это то, что Европейский союз находится на грани катастрофического кризиса, поскольку мы находимся в центре бури, которую представляет собой глобальный финансовый кризис. Мы должны оставаться сильными, и Союз должен реформировать еврозону, чтобы мы могли выдержать бурю и показать, что Европейский союз не дрогнет. Ни сейчас, ни завтра, ни когда-либо. In varietate concordia."
 EUevent.7.a: "За Евро!"
 EUevent.8.t: "Реформы тройки завершены!"
 EUevent.8.d: "[ROOT.GetNameWithFlag] ввел в действие реформы, требуемые так называемой Тройкой Европейской комиссии (ЕК), Европейским центральным банком (ЕЦБ) и Международным валютным фондом (МВФ). Это означает строгую экономию для людей [ROOT.GetNameWithFlag]!"
 EUevent.8.a: "Мы выздоровеем!"
 EUevent.9.t: "Exit by accident"
 EUevent.9.d: "[ROOT.GetNameWithFlag] не удалось осуществить реформы, которых требовала так называемая Тройка Европейской комиссии (ЕК), Европейского центрального банка (ЕЦБ) и Международного валютного фонда (МВФ). Другие члены ЕС ссылаются на клаузулу об отсутствии финансовой помощи, так что [ROOT.GetNameWithFlag] должен покинуть еврозону и §C[EUU.GetFlag] Европейский союз§!, чтобы девальвировать собственную новую валюту и предотвратить банкротство."
 EUevent.9.a: "Плохие времена"
 EUevent.10.t: "Передача флота"
 EUevent.10.d: "В XXI веке многонациональные флоты и оперативные группы становятся все более распространенными и значимыми. Государства-члены [EUU.GetFlag] Европейского союза решили объединить свои силы и передать военные корабли под единое европейское военно-морское командование, известное как EuroNavy.  \n\n[FROM.GetNameWithFlag] занимает должность генерального секретаря EuroNavy и требует, чтобы наш флот присоединился к EuroNavy."
 EUevent.10.a: "Европа, правь волнами!"
 EUevent.10.b: "Мы никогда не отдадим флот!"
 EUevent.18.t: "[FROM.GetNameWithFlag] просит нас провести военные учения"
 EUevent.18.d: "[FROM.GetNameWithFlag] просит нас провести военные учения на границе. Военные учения на нашей границе могут повысить напряженность в мире."
 EUevent.18.a: "Да"
 EUevent.18.b: "Нет"
 EUevent.20.t: "Дополнительная помощь в процессе присоединения для [FROM.GetNameWithFlag]"
 EUevent.20.d: "[FROM.GetNameWithFlag] не смогла провести необходимые реформы для соответствия критериям вступления в ЕС. Мы должны оказать им дополнительную финансовую и техническую помощь."
 EUevent.20.a: "Да"
 EUevent.20.b: "Нет"
 EUelection.1.t: "Выборы в Европейский парламент [GetYear] года"
 EUelection.1.d: "Выборы в Европейский парламент проходят каждые пять лет."
 EUelection.1.a: "Понятно"
 EU_news.1.t: "Государство Европейского союза"
 EU_news.1.d: "Европейский союз находится в хорошей форме."
 EU_news.1.a: "Понятно"
 EU_news.20.t: "Exit by accident"
 EU_news.20.d: "[FROM.GetNameWithFlag] не смог осуществить реформы, требуемые так называемой Тройкой Европейской комиссии (ЕК), Европейского центрального банка (ЕЦБ) и Международного валютного фонда (МВФ). Другие государства-члены ссылаются на Положение о невыплате помощи, поэтому [FROM.GetNameWithFlag] должен покинуть еврозону и §C[EUU.GetFlag] Европейский союз§! девальвировать свою собственную новую валюту и предотвратить банкротство."
 EU_news.20.a: "До свидания!"
 EU_news.21.t: "Государство-член покидает Союз"
 EU_news.21.d: "[FROM.GetNameWithFlag] покинул §C[EUU.GetFlag] Европейский союз§!."
 EU_news.21.a: "До свидания!"
 EU_news.22.t: "Статья 50 аннулирована"
 EU_news.22.d: "[FROM.GetNameWithFlag] отменил Статью 50 и остается в §C[EUU.GetFlag] Европейском Союзе§!."
 EU_news.22.a: "Понятно"
 EU_news.23.t: "Договор о выходе"
 EU_news.23.d: "[FROM.GetNameWithFlag] и члены ЕС §C[EUU.GetFlag] Европейского союза§! подписали Договор о выводе войск. [FROM.GetNameWithFlag] уйдет из §C[EUU.GetFlag] Европейского союза§! на условиях, изложенных в Договоре о выходе."
 EU_news.23.a: "Прощайте!"
 EU_news.24.t: "Продление статьи 50"
 EU_news.24.d: "[FROM.GetNameWithFlag] и члены ЕС §C[EUU.GetFlag] Европейского союза§! договорились о продлении статьи 50 в течение трех месяцев. Теперь [FROM.GetNameWithFlag] выйдет из §C[EUU.GetFlag] Европейского союза§! через три месяца."
 EU_news.24.a: "Понятно"
 EU_news.34.t: "Сработала статья 50"
 EU_news.34.d: "[FROM.GetNameWithFlag] спровоцировал действие Статьи 50 и уйдет §C[EUU.GetFlag] Европейский союз§! через два года."
 EU_news.34.a: "Понятно"
 EU_news.25.t: "Перевод флота в Еврофлот"
 EU_news.25.d: "[FROM.GetNameWithFlag] передает свой флот [FROM.FROM.GetNameWithFlag] владельцу должности генерального секретаря компании Еврофлот."
 EU_news.25.a: "Понятно"
 EU_news.26.t: "Передача флота отклонена"
 EU_news.26.d: "[FROM.GetNameWithFlag] не передаст свой флот в Еврофлот."
 EU_news.26.a: "Понятно"
 EU_news.27.t: "Государство присоединяется к Европейскому союзу"
 EU_news.27.d: "[FROM.GetNameWithFlag] присоединяется к §C[EUU.GetFlag] Европейскому союзу§!."
 EU_news.27.a: "Добро пожаловать!"
 EU_news.32.t: "Программа ОМТ"
 EU_news.32.d: "ЕЦБ начал свою программу OMT."
 EU_news.32.a: "Понятно"
 EU_news.33.t: "Завершение программы OMT"
 EU_news.33.d: "Текущая программа ОМТ ЕЦБ заканчивается."
 EU_news.33.a: "Понятно"
 EU_news.45.t: "Уменьшить программу OMT"
 EU_news.45.d: "The ECB has reduced its OMT Program.\n§YOMT Size Limit§!: Add §R-$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §G+5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §R-5%§! Europeanism.\n"
 EU_news.45.a: "Понятно"
 EU_news.46.t: "Расширить программу OMT"
 EU_news.46.d: "The ECB has expanded its OMT Program.\n§YOMT Size Limit§!: Add §G+$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §R-5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §G+5%§! Europeanism.\n"
 EU_news.46.a: "Понятно"
 EU_news.47.t: "Европейский союз обороны (ЕСО)"
 EU_news.47.d: "Для достижения необходимой стратегической автономии для защиты своих коллективных интересов, реагирования на внешние конфликты и кризисы, а также обеспечения безопасности в нашем регионе государства-члены приняли решение сформировать Европейский оборонительный союз (ЕОС) как военный альянс и коллективно выйти из НАТО."
 EU_news.47.a: "Понятно"
 EU_news.48.t: "Европейский союз обороны (ЕСО)"
 EU_news.48.d: "Для достижения необходимой стратегической автономии для защиты своих коллективных интересов, реагирования на внешние конфликты и кризисы, а также проекции безопасности в европейском соседстве, государства-члены [EUU.GetFlag][EUU.GetName] решили создать Европейский оборонный союз (ЕОС) как военный альянс и коллективно покинуть НАТО."
 EU_news.48.a: "Понятно"
 EU_news.49.t: "Член НАТО выходит и присоединяется к ЕСО"
 EU_news.49.d: "[FROM.GetNameWithFlag] выходит из НАТО и присоединяется к [EUU.GetFlag] Европейскому союзу и Европейскому оборонному союзу (ЕСО)."
