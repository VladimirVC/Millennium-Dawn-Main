 ALG_us_sanctions: "美国制裁"
 ALG_us_sanctions_desc: "美国实施了多项制裁，限制了我们与外界互动的能力。虽然制裁并不严重，但确实在一定程度上阻碍了我们取得经济成功。\n§W--------------§!\n美国有能力根据我们的行动增加或减少对我们政府的制裁。\n§W--------------§!\n如果美国认为我们不再追求核武器，该国家精神将被§R移除§!。"
