 AFG.conservatism: "£generic_conservatism_small アフガニスタン共和党"
 AFG.conservatism_desc: "第三の道 - 1999年に結成されたアフガニスタン共和党は、幅広い政治勢力――進歩派、ポピュリスト、リベラル派、穏健保守派など――を、軍閥主義や汚職に反対し、ある種の福祉国家と多党制のリベラル民主主義を提唱するという共通の旗印の下に結集させた幅広い政治政党である。"
 AFG.liberalism: "£generic_liberalism_small (NCA) アフガニスタン国民会議"
 AFG.liberalism_desc: "改革主義 - かつての共産主義政権、短命に終わったイスラム政権、そしてイスラム共和国に反対するアフガニスタン国民会議は、世俗的な自由民主主義と地方分権に基づく統治モデルを提唱している。同党は、アフガニスタンの混沌とした政治情勢の中でも一貫した確固たる政策方針を維持し、党指導部を中心に結束を保ち続けている。"
 AFG.Western_Autocracy: "£AFG_western_autocracy アフガニスタン無所属派"
 AFG.Western_Autocracy_desc: "実用的独裁 - アフガニスタン無所属派とは、政党に所属せずに立候補し、一般的に西側機関と関連付けられる候補者のリストを指す。彼らはしばしば汚職や独裁の非難にさらされるが、主に、様々な支援勢力から統治への支持を集めることを目的とした、より穏健な政策を掲げている。"
 AFG.Communist-State: "£AFG_communist_state （CMP）アフガニスタン共産党（毛沢東主義派）"
 AFG.Communist-State_desc: "マルクス・レーニン・毛沢東主義 - アフガニスタン国内に以前から存在していた毛沢東主義組織から結成されたフガニスタン共産党（毛沢東主義派）は、従来の毛沢東主義グループよりも強硬かつ過激な後継組織を自任した。ムジャヒディンと協力した勢力を排斥し、アフガニスタン内戦の混乱に乗じて「人民戦争」を開始し、新たな社会主義共和国を樹立することを目標とした。"
 AFG.Conservative: "£AFG_conservative イスラム民族運動"
 AFG.Conservative_desc: "左派実用主義 - 1992年にアブドゥル＝ラシード・ドスタム元帥によって設立された、元共産主義者とイスラム主義者で構成されるトルコ系政党。元々はアフガニスタン北部の油田の自衛軍であったが、ジュンビシュは主要な軍事・政治勢力となり、強力なウズベク人有権者基盤で北部を支配した。世俗的で左翼的でありながら、党はアフガン内戦中の人権侵害と、1990年代後半のタリバンとの一時的な同盟を含む、その変化する同盟関係で悪名高い。"
 AFG.Vilayat_e_Faqih: "£AFG_hardline_shiites アフガニスタン・イスラム運動"
 AFG.Vilayat_e_Faqih_desc: "シーア派イスラム主義 - 当初、イランとそのイスラム革命によって支援・影響を受けていた組織や政党のグループ「テヘラン・エイト」の一員であったアフガニスタン・イスラム運動は、後にイスラム統一党および北部同盟の両方と連携した。イデオロギー的には、同運動はイスラム革命以前のシーア派イスラム主義の理想と、指導者アシフ・モフセニの個人的な思想を基盤としている。"
 AFG.Caliphate: "£AFG_salafist_jihadism ターリバーン"
 AFG.Caliphate_desc: "サラフィー・ジハード主義 - 1994年にムジャヒディンから派生して登場したターリバーンは、厳格なイスラム主義の綱領を掲げ、首長国の樹立とシャリーア法の施行を主張している。同組織は、アフガニスタン民主共和国の崩壊後、新たに成立した国家において唯一の合法的な権力機関として統治することを目指し、対立するより穏健なグループに対して攻撃を仕掛け、急速にアフガニスタンの支配権を掌握していった。イデオロギー的には、サラフィズム、原理主義的統治、そしてアフガニスタンに対する伝統主義的な支配を提唱しているが、一部の派閥はパシュトゥーン民族主義や、より穏健な形態のイスラム主義を主張している。"
 AFG.Kingdom: "£AFG_kingdom イスラム党・ハーリス派"
 AFG.Kingdom_desc: "イスラム主義 - 大規模イスラム主義組織の分派であるイスラム党・ハーリス派は、創設者のムハンマド・ユーヌス・ハーリスを中心に組織されている。かつてはターリバーンと連携していた同組織は、アフガニスタンにおける部族自治とイスラム法に基づく統治を主張しており、自由主義的な運動やより穏健なイスラム主義運動に反対し、伝統的な権力構造と権威を支持している。"
 AFG.neutral_Social: "£AFG_neutral_social アフガニスタン・ワタン党"
 AFG.neutral_Social_desc: "右派社会民主主義 - 1990年、モハンマド・ナジブッラーによるアフガニスタン人民民主党（PDPA）の再編により結成されたワタン党は、アフガニスタン内戦の平和的終結と、同国の自由民主主義への移行を目指した。アフガニスタン共和国の崩壊に伴い、同党は活動禁止処分を受けたが、1997年にようやく正式に再結成された。同党は穏健な進歩主義的な政策を掲げており、旧PDPA内の各派閥とは一線を画し、より過激な勢力や反体制派が党内で要職に就くことを明確に禁じている。"
 AFG.Neutral_Autocracy: "£AFG_neutral_autocracy アフガニスタン・イスラム・ダアワ機構"
 AFG.Neutral_Autocracy_desc: "ワッハーブ派 - アフガニスタン解放イスラム連合として設立されたイスラム・ダアワ機構は、ソ連軍の追放、そして最終的にアフガニスタン民主共和国政府の打倒、さらにその後成立した短命な暫定共和国の崩壊に関与した。同組織はサウジアラビアのモデルに基づく過激なイスラム主義を提唱しているが、欧米や隣国パキスタンに対してはより現実的な姿勢をとっている。"
 AFG.Neutral_Muslim_Brotherhood: "£AFG_neutral_muslim_brotherhood イスラム協会"
 AFG.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 - 主にタジク人の政党であるイスラム協会は、1960年代にブルハーヌッディーン・ラッバーニーによって設立されたアフガニスタン最古で、最大の政治組織である。元々はカブール大学の学生運動であったが、ソビエト・アフガン戦争中に強力なムジャヒディングループに進化した。党はイスラム法に基づいており、共同体主義的なイデオロギーを持っている。アフマド・シャー・マスードの指導の下、ジャミアットはアフガン内戦とタリバンに対する抵抗における主要なプレーヤーとなり、後に北部同盟を結成した。"
 AFG.Nat_Autocracy: "£AFG_nat_autocracy アフガニスタン国軍"
 AFG.Nat_Autocracy_desc: "イスラム主義軍事政権 - 1997年に現在の体制で創設され、当初はターリバーンの指揮下にあったアフガニスタン軍は、指揮系統の分断、軍閥主義、横行する汚職、士気の低下といった問題に深刻に悩まされてきた。アフガニスタン内戦の第一段階およびそれに続く第二段階を経て、この未熟な軍隊は分裂し、地方レベルでも国家レベルでも、分裂した指導部が権力を巡って争うことで、その問題はさらに悪化の一途をたどっている。"
 AFG.Nat_Populism: "£AFG_nat_populism (NIFA) アフガニスタン国民イスラム戦線"
 AFG.Nat_Populism_desc: "国民ポピュリズム - 1979年に結成されたアフガニスタン国民イスラム戦線は、アフガニスタン民主共和国の権威も、それに対するイスラム抵抗勢力もともに拒否した。その代わりに、同組織はパシュトゥーン民族主義と穏健なポピュリズムを融合させた路線を提唱した。同党の一部派閥は、君主制の復活や、世俗的な多元的民主主義も主張していた。"
 AFG.Monarchist: "£AFG_monarchist バーラクザイ朝"
 AFG.Monarchist_desc: "宗教的君主制 - アフガン帝国の解体を受けて1823年にドースト・ムハンマド・ハーンによって樹立されたバーラクザイ家は、1973年までアフガニスタンを統治し続けた。同家は、イギリスとロシアの間で繰り広げられた「グレート・ゲーム」を巧みに乗り切り、名目上の独立を維持することに成功した。その後の統治者らは、より立憲的な体制の導入を含む数々の改革を推進したが、ナセルに感化された同家出身のムハンマド・ダーウード・ハーンが起こしたクーデターによって短命なアフガニスタン共和国が樹立されたことで、王国および王朝の統治は終焉を迎えた。共和制の崩壊、アフガニスタン民主共和国（DRA）の成立、そして二度目の共和制樹立の試みを経て、国家の統一の象徴として君主制を復活させようとする試みが幾度か行われたが、いずれも失敗に終わった。"
 AFR.Nat_Autocracy: "£generic_Nat_Autocracy_small (AFRC) 軍事革命評議会"
 AFR.Nat_Autocracy_desc: "腐敗した軍事政権 - 極度の汚職、独裁、貧困という状況下で台頭した軍事革命評議会は、国の資源を私物化して富を蓄積することで、国内の現状維持を図った。違法取引や汚職による資金を原資に、彼らはシエラレオネ政府に対し、自らの主張を支持するギャングや軍の一部勢力を味方につけて内戦を繰り広げた。同グループは一時的に国家の支配権を掌握したが、大規模な略奪や人権侵害が行われた結果、近隣諸国が介入し、旧政権を復権させ、反政府勢力を駆逐することとなった。"
 AFR.Nat_Fascism: "£generic_Nat_Fascism_small West Side Niggaz"
 AFR.Nat_Fascism_desc: "(Gang Rule) - Described alternatively as part of, a splinter faction of, or an allied group to the Armed Forces Revolutionary Council the West Side Niggaz are a gang influenced heavily by American 'gangster culture'. Having little in the way of ideology or platform, they instead utilize violence as a means towards power - including the use of child soldiers."
