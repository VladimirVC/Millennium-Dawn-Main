 ABK_soviet_support_decisions: "Ностальгия по СССР"
 ABK_soviet_support_decisions_desc: "Абхазия жила более богато и мирно в советское время, и для того, чтобы население активно приняло наши коммунистические реформы, мы должны оказать давление на их чувство ностальгии по тем временам\".\n§W§!\n В настоящее время §Y[?ABK.soviet_support]§!% населения испытывает ностальгию по СССР"
