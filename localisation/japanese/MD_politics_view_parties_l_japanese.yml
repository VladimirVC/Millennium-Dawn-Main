 CBD.conservatism: "£generic_conservatism_small フンシンペック"
 CBD.conservatism_desc: "(Monarchism) - Founded by Norodom Sihanouk, the FUNCINPEC (National United Front for an Independent, Neutral, Peaceful and Cooperative Cambodia) serves as the primary opposition within modern Cambodia. It was initially founded as Sihanouk's second exile-oriented organization in opposition to the Khmer Rouge and Vietnamese-backed People's Republic of Kampuchea. It organized into a party in 1992, advocating primarily for support for the monarchy."
 CBD.Autocracy: "£generic_Autocracy_small (CPP) カンボジア人民党"
 CBD.Autocracy_desc: "実用的独裁体制 - 1951年にカンボジア人民革命党として結成されたカンボジア人民党は、当初、マルクス・レーニン主義政党として活動し、Cクメール・ルージュが主要な対立勢力として中国を支持していたのとは異なり、ベトナムやソ連と連携していた。同党はポル・ポト率いるクメール・ルージュの台頭には同調せず、代わりにベトナムの支援を得て政権を樹立し、クメール・ルージュが実施していた政策を終わらせた。その後、世界が激変する中、同党は不安定なカンボジアを統治した。社会主義陣営の崩壊に伴い、同党はマルクス・レーニン主義へのコミットメントを徐々に放棄し、やがて社会主義そのものからも距離を置くようになった。90年代にはより左派的な見解を持つ派閥が依然として活動していたが、特定のイデオロギーに依拠することなくカンボジアの支配権を維持しようとする実用主義的な勢力によって、彼らは排除されていった。"
 CBD.Neutral_conservatism: "£generic_Neutral_conservatism_small (KDP) Khmer Democratic Party"
 CBD.Neutral_conservatism_desc: "(National Conservatism) - Founded in 1998, the KDP advocates for a mix of conservative policies mixed with nominally reformist viewpoints regarding democracy and human rights."
 CBD.neutral_Social: "£generic_neutral_Social_small (LDP) League for Democracy Party"
 CBD.neutral_Social_desc: "(Third Way) - Advocating for a mix of social liberalism, progressivism, and secularism - the LDP is a nominally left-wing party striving towards a more egalitarian and democractic Cambodia. The party maintains an eight-point list of political reforms, though has seen little electoral success despite its broad populist platform and consistent growth."
 CBD.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (CNSP) カンボジア国家維持党"
 CBD.Neutral_Libertarian_desc: "国家自由主義 - 君主制への保守的な支持と、強力で中央集権的な国家への支持を、女性の権利や民主的改革に関する中道左派的な社会政策と融合させ、カンボジア国家維持党は多元的な国家の構築を目指す穏健な野党として自らを位置づけている。"
 CBD.Nat_Autocracy: "£generic_Nat_Autocracy_small (RCAF) カンボジア王立軍"
 CBD.Nat_Autocracy_desc: "軍事君主制 - カンボジア王立軍は1953年に創設されたが、カンボジアの激動の歴史により、それ以来数多くの変遷を経てきた。幾度もの戦争、クーデター、侵略を乗り越えて存続してきた軍は現在、カンボジア人民革命軍と、クメール・ルージュと連携する反体制派グループを含む民主カンボジア国民軍が統合された、穏健な形態をとっている。政治が独裁的であるため、軍は非政治的であるものの、カンボジア人民党によるほぼ完全な支配と、カンボジアの支配を維持するための同党の実利的なアプローチに強く影響を受けている。"
 CBD.Nat_Fascism: "£generic_Nat_Fascism_small クメール反貧困党"
 CBD.Nat_Fascism_desc: "国家大西洋主義 - クメール反貧困党は、カンボジアの国境の保全に関する国家主義的な主張や、貧困の撲滅に関するポピュリスト的な主張を掲げつつ、同国に「アメリカ式」の政府を導入したいとの意向も表明している。同党は、複数のアメリカ人アドバイザーや投資家からの支援を受けていると主張しているが、そうしたつながりがあるにもかかわらず、選挙では成果を上げていない。"
 CDI.liberalism: "£CDI_liberalism_small Rassemblement des Républicains (RDR)"
 CDI.liberalism_desc: "The Rally of the Republicans (Rassemblement des Républicains/RDR) is a leading liberal pary in Côte d'Ivoire. It was formed as an offshoot of the PDCI in the early 1990s due to disagreements with the PDCI choice of leader for the 1995 presidental elections. They have become the backing party of Alassane ouattara since his return to the Côte d'Ivoire and espouse strict liberal policies and republicanism values."
