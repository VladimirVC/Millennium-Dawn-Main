 SPR.Western_Autocracy: "£SPR_spanish_bourbons ブルボン家 ｰ 立憲主義派"
 SPR.Western_Autocracy_icon: "£SPR_spanish_bourbons"
 SPR.Western_Autocracy_desc: "西側専制主義 - スペインのブルボン家は18世紀以来スペインを統治してきた。現在のスペイン王家は、その系譜をフェリペ5世にまで遡ることができ、スペイン人の心に深く根ざした正統な君主として認識されている。1978年スペイン憲法には、フアン・カルロス1世の子孫のみがスペイン王位を継承できると規定されており、王位継承権が明示的に認められている。立憲主義派は絶対主義派に比べ、はるかに民主的で西欧的である。\n"
 SPR.Western_Autocracy_carlist: "£SPR_carlists カルリスタ ｰ 立憲主義派"
 SPR.Western_Autocracy_carlist_icon: "£SPR_carlists"
 SPR.Western_Autocracy_carlist_desc: "西側専制主義 - カリルスタは伝統主義的・正統主義的思想「カルロス主義」の支持者であり、ブルボン＝パルマ家を王位に復帰させることを目指している。立憲主義派は絶対主義派に比べ、はるかに民主的で西欧的である。\n"
 SPR.conservatism_icon: "£SPR_partido_popular"
