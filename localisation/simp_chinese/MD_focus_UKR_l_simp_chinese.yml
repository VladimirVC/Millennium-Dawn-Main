 UKR_european_education_connections_desc: "欧洲教育将比旧的、苏联的和极权主义的教育给予我们更多。"
 UKR_european_defence_program: "欧洲防御计划"
 UKR_european_defence_program_desc: "我们将加入欧洲防御计划，以加强我们的武装力量。"
 UKR_nato_application_por: "与北约的合作计划"
 UKR_nato_application_por_desc: "北约在武装部队领域的伙伴关系也将使我们能够对军队进行改革。"
 UKR_ukraine_anew: "新乌克兰"
 UKR_ukraine_anew_desc: "我们的国家经历了漫长的道路，经历了许多改革，但现在它已经重生，并对未来充满乐观。"
 UKR_apply_to_eu_por: "与欧盟的合作计划"
 UKR_apply_to_eu_por_desc: "与欧盟的合作将继续是我们的重点"
 UKR_anti_rus_doctrine: "反俄主义"
 UKR_anti_rus_doctrine_desc: "我们的政治和意识形态敌人是俄罗斯，现在依然如此。我们必须接受这一事实，做好战争准备。"
 UKR_foreign_advisors_desc: "来自各个私人军事公司的外国教官已准备好训练我们的士兵。"
