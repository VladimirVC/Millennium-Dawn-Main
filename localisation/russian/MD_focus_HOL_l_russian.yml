 HOL_empowering_local_governments_idea: "Децентрализованное управление"
 HOL_empowering_local_governments_idea_desc: "Власть была передана региональным органам управления, что повысило местную автономию и административную эффективность. Меры по децентрализации укрепили стабильность и способствовали созданию более эффективной экономической структуры."
 HOL_centralized_governance_idea: "Централизованное управление"
 HOL_centralized_governance_idea_desc: "Корона сосредоточила власть, создав единообразную, но жесткую систему управления. Бюрократические издержки возросли, но политическая власть была консолидирована для укрепления контроля монархии."
 HOL_restore_nobility_influence_idea: "Восстановление влияния дворянства"
 HOL_restore_nobility_influence_idea_desc: "Дворянство вновь утвердило свою роль как опоры королевской власти. Их влияние укрепляет авторитет монархии, способствует политической лояльности и формирует чувство культурного единства."
 HOL_nobility_backed_military_idea: "Вооружённые силы под руководством дворянства"
 HOL_nobility_backed_military_idea_desc: "Дворянство заняло руководящие позиции в армии, обеспечивая лояльность к короне. Эффективность вооружённых сил возросла, а авторитет монархии укрепляется через армию."
 HOL_nato_commitments_idea: "Обязательства перед НАТО"
 HOL_nato_commitments_idea_desc: "На фоне растущей глобальной напряжённости НАТО остаётся основой безопасности Нидерландов. Подтверждая нашу приверженность альянсу, мы обеспечиваем сотрудничество в сфере обороны и получение технологических преимуществ от союзников."
