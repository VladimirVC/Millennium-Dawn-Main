 IND_papua_resist_info: "Chrześcijanie naszej ziemi zamieszkują głównie Papuę. Niestety, były one obiektem nadużyć ze strony poprzednich i obecnych rządów, a mieszkańcy bardzo nas nie lubią, co sprawia, że ​​nasza misja polityczna w tym kraju jest prawdziwym wyzwaniem"
