 HPR.Communist-State: "£HPR_Communist_State (KNP) ハリコフ人民党"
 HPR.Communist-State_icon: "£HPR_Communist_State"
 HPR.Communist-State_desc: "共産主義 - ハリコフ人民党（ロシア語ローマ字表記：Kharkovskaya Narodnaya Partiya）は、ハリコフ蜂起の際に結成された親ロシア共産党である。ロシア共産党との強固な結びつきを持ち、マルクス・レーニン主義を主張している。"
 HPR.Autocracy: "£HPR_Autocracy (SR) 自由共和国"
 HPR.Autocracy_icon: "£HPR_Autocracy"
 HPR.Autocracy_desc: "専制主義 - 自由共和国（ロシア語ローマ字表記：Svobodnaya Respublica）は、ハリコフ人民共和国の指導者たちによって創設されたハリコフの主要政党である。ハリコフにおけるロシア人およびロシア文化の防衛を主張し、ロシアへの完全な統合を支持している。"
 HPR.Nat_Fascism: "£HPR_nationalist_fascism 国家ボリシェヴィキ"
 HPR.Nat_Fascism_icon: "£HPR_nationalist_fascism"
 HPR.Nat_Fascism_desc: "ファシズム - 国家ボリシェヴィキは、ロシアの国家ボリシェヴィキ党と強く結びついたテロリスト集団のネットワークであり、ハルキウ人民共和国全土に配置されている。彼らの目的は政府を掌握し、ロシア民族国家を創設することである。"
 HPR.Nat_Autocracy: "£HPR_nationalist_military_junta 共和国民兵"
 HPR.Nat_Autocracy_icon: "£HPR_nationalist_military_junta"
 HPR.Nat_Autocracy_desc: "軍事政権 - ハリコフ人民共和国民兵（ロシア語ローマ字表記：Respublicanskoe Opolchenie Kharkovskoy Narodnoy Respublici）は、ハリコフ人民共和国の領土防衛のために創設された公式武装勢力である。"
 KHM.liberalism: "£KHM_western_liberal l (RUDPY) ヤブロコ"
 KHM.liberalism_icon: "£KHM_western_liberal"
 KHM.liberalism_desc: "自由主義 - ロシア統一民主党「ヤブロコ」（ロシア語ローマ字表記：Rossiyskaya Obyedinennaya Democraticheskaya Partiya 'Yabloko'）は、市場経済と民主主義的価値観を推進する社会自由主義政党である。ロシア語で「りんご」を意味するヤブロコは、歴史的にロシアにおける共産主義と保守主義の両方に対する主要な政治勢力であった。"
 KHM.Communist-State: "£KHM_emerging_communism (KPRF) ロシア連邦共産党"
 KHM.Communist-State_icon: "£KHM_emerging_communism"
 KHM.Communist-State_desc: "共産主義 - ロシア連邦共産党（ommunisticheskaya Partiya Rossiyskoy Federatsii）は、旧ソビエト連邦共産党の後継組織である。マルクス・レーニン主義を掲げ、ロシアのポストソビエト時代を通じて第二の規模を誇る政党である。"
 KHM.Conservative: "£KHM_emerging_reactionary (ER) 統一ロシア"
 KHM.Conservative_icon: "£KHM_emerging_reactionary"
 KHM.Conservative_desc: "反動主義 - 統一ロシア（ロシア語ローマ字表記：Yedinaya Rossiya）は、公式イデオロギーを「ロシア保守主義」と称するが、実質的なイデオロギーはほとんど存在せず、幅広い支持層を抱える大衆政党として機能している。その中核的価値として安定性を掲げ、プーチン政権誕生までのポストソビエト期にロシアを特徴づけた革命的混乱と対比させている。"
 KHM.Nat_Populism: "£KHM_nationalist_right_wing_populist (LDPR) ロシア自由民主党"
 KHM.Nat_Populism_icon: "£KHM_nationalist_right_wing_populist"
 KHM.Nat_Populism_desc: "右派ポピュリスト ｰ ロシア自由民主党（ロシア語ローマ字表記：Liberal'no-demokraticheskaya partiya Rossii）は、自由主義でも民主主義でもなく、むしろ権威主義的・ポピュリスト的・民族主義的な手法で、大幅に拡大されたロシア帝国の復活を追求している。"
