 NKO_international_sanctions_idea: "유엔 안보리 제재"
 NKO_international_sanctions_idea_desc: "공화국에 대한 국제 제재는 공화국의 핵 야망과 인권 문제에 대응하여 그 경제, 무역, 군사 발전을 표적으로 삼고 있습니다. 이 제재는 외화, 첨단 기술, 핵심 자원에 대한 접근을 제한하며, 정권에 비핵화를 압박하는 동시에 인민들과 경제적 안정성에 상당한 타격을 주는 것을 목표로 합니다."
 NKO_closed_nation: "전체주의 정부"
 NKO_closed_nation_desc: "국가의 안정을 지키고 국가 주권을 수호하기 위해 우리는 인터넷 접속을 전면 차단하고 다른 모든 형태의 대중 매체를 직접 통제하고 있습니다. 이견은 결코 용납될 수 없습니다."
 korea_russia.1.t: "러시아 군사 기지"
 korea_russia.1.d: "러시아 정부가 우리 영토에 군사 기지를 배치하겠다고 제안하고 있습니다. 이는 공격적인 이웃 국가의 위협으로부터 우리를 보호해 줄 훌륭한 방어막이 될 뿐만 아니라, 러시아와의 협력을 한층 강화해 줄 것입니다."
 korea_russia.1.a: "동의한다"
 korea_russia.1.b: "필요 없다."
 korea_russia.2.t: "우리의 제안을 수락한 러시아"
 korea_russia.2.d: "러시아 정부가 우리의 제안에 동의했습니다. 이는 우리를 매우 기쁘게 하며 양국 관계를 공고히 하는 데 도움이 됩니다."
 korea_russia.2.a: "좋아"
 korea_russia.3.t: "우리의 제안을 거절한 러시아"
 korea_russia.3.d: "러시아 정부가 우리의 관대한 제의를 거절했습니다. 아마 다음에 더 잘 생각해보겠지요..."
 korea_russia.3.a: "슬픈 일이군"
 korea_russia.4.t: "북한의 원자력 발전소"
 korea_russia.4.d: "북한 정부는 우리 로사톰(ROSATOM)과 자국 내 발전소 건설 계약을 체결하기를 원합니다. 우리는 누구에게나 원자력 에너지를 내어줄 수 없기 때문에 이는 우리에게도 중요한 단계입니다."
 korea_russia.4.a: "그들에게 발전소를 지어줄 것이다."
 korea_russia.4.b: "거절한다"
 korea_russia.5.t: "북한의 원자력 발전소"
 korea_russia.5.d: "러시아 정부가 우리 영토에 로사톰의 원자력 발전소 건설을 허용하는 데 동의했습니다. 이제 시작할 때입니다!"
 korea_russia.5.a: "조선의 원자력은 새로운 시대에 진입해야 한다."
 korea_russia.6.t: "새로운 장비"
 korea_russia.6.d: "러시아 총참모부는 우리 군대에 최신 '라트니크' 장비를 공급할 준비가 되어 있으며, 이는 우리 보병의 전투 능력을 향상시킬 것입니다."
 korea_russia.6.a: "러시아와 조선의 무기에 영광을"
 korea_russia.7.t: "북한 가스관"
 korea_russia.7.d: "북한은 한반도 가스관 사업의 재개를 원하지만, 그 종착지를 북한 자체로 하려 합니다. 이는 타국에 대한 북한의 자원 자립도를 강화할 것이며, 우리는 그들에 대한 또 다른 영향력 수단을 얻게 될 것입니다."
 korea_russia.7.a: "가스관을 건설할 때다"
 korea_russia.7.b: "이 사업은 우리에게 수익성이 없다"
 korea_russia.8.t: "포괄적인 전략적 동반자 관계 조약"
 korea_russia.8.d: "북한은 오래전 소련에 의해 세워졌고 붕괴 전까지 소련의 지원을 받았지만, 지금 러시아의 외교 정책이 변화하면서 북한은 더 이상 우리의 도움을 바라지 않았습니다. 그러나 현재 상황이 그들이 다시 우리에게 의존하도록 만들었습니다."
 korea_russia.8.a: "우리는 새로운 조약에 서명할 것이다"
 korea_russia.8.b: "거절한다"
 korea_russia.9.t: "포괄적인 전략적 동반자 관계 조약"
 korea_russia.9.d: "러시아가 우리가 제안한 협정에 서명하기로 동의했습니다. 아마도 이제 조선반도의 힘의 균형이 우리에게 유리하게 바뀔 것입니다!"
 korea_russia.9.a: "만세"
 korea_russia.10.t: "포괄적인 전략적 동반자 관계 조약"
 korea_russia.10.d: "러시아가 우리가 제안한 협정에 서명하기로 동의했습니다. 아마도 이제 조선반도의 힘의 균형이 우리에게 유리하게 바뀔 것입니다!"
 korea_russia.10.a: "만세"
 korea_russia.11.t: "포괄적인 전략적 동반자 관계 조약"
 korea_russia.11.d: "북한은 오래전 소련에 의해 세워졌고 붕괴 전까지 소련의 지원을 받았지만, 지금 러시아의 외교 정책이 변화하면서 북한은 더 이상 우리의 도움을 바라지 않았습니다. 그러나 현재 상황이 그들이 다시 우리에게 의존하도록 만들었습니다."
 korea_russia.11.a: "우리는 새로운 조약에 서명할 것이다"
 korea_russia.11.b: "거절한다"
 korea_russia.12.t: "포괄적인 전략적 동반자 관계 조약"
 korea_russia.12.d: "북한이 우리가 제안한 협정에 서명하기로 동의했습니다. 아마도 이제 조선반도의 힘의 균형이 우리에게 유리하게 바뀔 것입니다!"
 korea_russia.12.a: "만세"
 korea_russia.13.t: "포괄적인 전략적 동반자 관계 조약"
 korea_russia.13.d: "북한이 우리가 제안한 협정에 서명하기로 동의했습니다. 아마도 이제 조선반도의 힘의 균형이 우리에게 유리하게 바뀔 것입니다!"
 korea_russia.13.a: "만세"
 korea_russia.14.t: "합작 함선 프로젝트를 제안하는 북한"
 korea_russia.14.d: "북한 정부가 해군 분야의 합작 프로젝트를 제안했습니다. 조선인민군 해군은 현재 매우 노후화된 함선들만을 보유하고 있어 유사시 적에게 강력한 저항을 하기가 어렵습니다. 그들은 북한 해군의 요구를 충족할 수 있도록 합작 함선 프로젝트에 자금을 지원해 줄 것을 우리에게 제안했습니다."
 korea_russia.14.a: "그들을 도울 것이다"
 korea_russia.14.b: "거절한다"
 korea_russia.15.t: "러시아와의 합작 함선 프로젝트"
 korea_russia.15.d: "러시아 정부가 우리의 취약한 소함대를 돕기 위해 해군 분야의 합작 프로젝트 추진에 동의했습니다. 우리는 그들에게 무한한 감사를 표합니다!"
 korea_russia.15.a: "만세(Uraaaaaa)"
 korea_russia.16.t: "무역 확대를 희망하는 [NKO.GetNameWithFlag]"
 korea_russia.16.d: "북한 정부가 우리와 무역 협정을 체결하고 협력을 확대하려 한다고 합니다. 북한의 상황을 고려하면 회의적인 시각을 갖는 것이 좋을 수도 있고, 아닐 수도 있겠습니다."
 korea_russia.16.a: "동의한다"
 korea_russia.16.b: "안 돼"
 korea_russia.17.t: "[FROM.GetName]과의 무역 협정"
 korea_russia.17.d: "그들의 정부는 우리와의 무역 확대를 승인했으며, 우리가 제안한 새로운 협정들을 체결하기로 했습니다. 제재의 영향력에 맞서는 우리의 투쟁은 계속될 것입니다!"
 korea_russia.17.a: "훌륭하군"
 korea_russia.18.t: "[FROM.GetName]와의 무역 협정"
 korea_russia.18.d: "그들 정부는 양국 간의 무역량 확대를 거부했으며 근본적으로 어떠한 분야에서든 우리와 협력을 확대하는 데 회의적인 태도를 보였습니다."
 korea_russia.18.a: "슬픈 일이군"
 korea_russia.19.t: "공동 프로젝트를 제안하는 북한"
 korea_russia.19.d: "북한 정부는 우리의 군용 항공 산업에 관심을 갖고 있으며, 북한군의 필요에 맞는 북한 전투기를 공동 개발하는 프로젝트를 추진하고 싶어합니다. 우리는 그들을 도울 수 있지만, 그 대가로 우리는 북한에 대한 영향력을 크게 강화할 것입니다."
 korea_russia.19.a: "우린 그들을 도울 것이다"
 korea_russia.19.b: "안된다."
 korea_russia.20.t: "러시아와의 합작 항공기 프로젝트"
 korea_russia.20.d: "러시아 정부가 우리를 위한 자체 전투기를 제작하는 합작 프로젝트에 동의했습니다. 이제 우리 비행대대에 더 많은 힘이 생길 것입니다!"
 korea_russia.20.a: "만세(Uraaaaaa)"
 korea_russia_news.1.t: "[NKO.GetName]과(와) [SOV.GetName]의 동맹"
 korea_russia_news.1.d: "오늘 [NKO.GetName]과(와) [SOV.GetName] 간에 포괄적인 전략적 동반자 관계 조약이 체결되었습니다. 이 조약은 체결국 간의 경제적, 정치적, 군사적 지원을 의미합니다. 이제 두 국가는 그 어느 때보다도 가까워졌습니다."
 korea_russia_news.1.a: "그들이 우릴 두려워하게 만들어라!"
 korea_russia_news.1.b: "갑작스럽군"
 korea_china.1.t: "합작 항공기 프로젝트를 제안하는 북한"
 korea_china.1.d: "북한 정부는 우리 군사 항공 산업에 관심을 보이며 군대의 요구에 맞는 전투기를 제작하기 위한 합작 프로젝트를 추진하고자 합니다. 우리는 이를 도울 수 있지만, 그 대가로 우리는 북한에 대한 영향력을 크게 강화할 것입니다."
 korea_china.1.a: "우린 그들을 도울 것이다"
 korea_china.1.b: "안된다."
 korea_china.2.t: "중국과의 합작 항공기 프로젝트"
 korea_china.2.d: "중국 정부가 우리를 위한 자체 전투기를 제작하는 합작 프로젝트에 동의했습니다. 이제 우리 비행대대에 더 많은 힘이 생길 것입니다!"
 korea_china.2.a: "좋다"
 korea_china.3.t: "우리의 제안을 거절한 중국"
 korea_china.3.d: "중국 정부가 우리의 관대한 제의를 거절했습니다. 아마 다음에 더 잘 생각해보겠지요..."
 korea_china.3.a: "슬픈 일이군"
 korea_china.4.t: "보호를 요청하는 북한"
 korea_china.4.d: "북한 정부는 국가의 정치적 상황이 복잡해짐에 따라 위협을 느끼며 우리에게 자국의 독립을 보장해 달라고 요청했습니다."
 korea_china.4.a: "우린 그들을 도울 것이다"
 korea_china.4.b: "안된다."
 korea_china.5.t: "중국에 보호 요청"
 korea_china.5.d: "중국 정부가 우리 독립을 그들 측에서 보장해주기로 동의했습니다. 이는 우리의 정치적 상황을 눈에 띄게 완화시킬 것입니다."
 korea_china.5.a: "좋다"
 korea_china.6.t: "중국에 보호 요청"
 korea_china.6.d: "중국 정부가 우리의 관대한 제의를 거절했습니다. 아마 다음에 더 잘 생각해보겠지요..."
 korea_china.6.a: "슬픈 일이군"
 korea_china.7.t: "자원 탐색 지원"
 korea_china.7.d: "북한 정부가 자국 영토 내 새로운 자원 매장량을 탐사하기 위해 다양한 자원 프로젝트에 대한 지원을 요청하고 있습니다. 당연히 이 협정을 통해 우리는 그들에 대한 영향력을 강화할 것입니다."
 korea_china.7.a: "우린 그들을 도울 것이다"
 korea_china.7.b: "안된다."
 korea_china.8.t: "자원 탐색 지원"
 korea_china.8.d: "중국 정부가 자원 탐사 프로젝트를 돕기로 동의했습니다"
 korea_china.8.a: "좋다"
 korea_china.9.t: "북한 내 신규 공장"
 korea_china.9.d: "북한 정부는 자국의 경제 상황에 대해 매우 우려하고 있습니다. 노동자들은 일할 곳이 없고 이를 위한 새로운 공장이 시급히 필요한 실정입니다. 그래서 그들은 이 문제를 해결하는 데 도움을 구하고자 우리에게 도움을 청했습니다. 우리는 이것이 북한 정부에 대한 영향력을 강화하는 데 도움이 될 것임을 알고 있습니다."
 korea_china.9.a: "우린 그들을 도울 것이다"
 korea_china.9.b: "안된다."
 korea_china.10.t: "북한 내 신규 공장"
 korea_china.10.d: "중국 정부가 우리 영토에 신규 공장을 건설하는 것을 돕기로 동의했습니다."
 korea_china.10.a: "좋다"
 korea_china.11.t: "북한 내 국내 은행"
 korea_china.11.d: "북한 정부는 국가 경제 상황을 우려하고 있으며, 지난 사건들 이후 즉각적인 경제 복원을 위한 방법을 강구하고 있습니다. 그들은 우리나라 은행을 자국으로 적극적으로 유치하려 하고 있으며 우리는 답변을 줄 계획입니다."
 korea_china.11.a: "우린 그들을 도울 것이다"
 korea_china.11.b: "안 돼"
 korea_china.12.t: "북한 내 중국 은행"
 korea_china.12.d: "중국 정부가 자국 은행들이 우리나라에서 영업하는 것을 허가했습니다."
 korea_china.12.a: "좋아"
 korea_china.13.t: "공화국 내 화웨이"
 korea_china.13.d: "북한 정부는 자국 경제에 화웨이가 참여하기를 바라며 화웨이의 자국 진출을 적극적으로 모색하고 있습니다. 우리가 그들이 그곳에서 영업하도록 허가한다면 우리에게는 중대한 결정이 될 것입니다."
 korea_china.13.a: "우리가 그들을 도울 것이다"
 korea_china.13.b: "거절한다"
 korea_china.14.t: "공화국 내 화웨이"
 korea_china.14.d: "화웨이는 우리 영토에서 사업을 운영할 것이며, 중국 정부는 해당 회사의 이러한 활동에 대한 허가를 승인했습니다."
 korea_china.14.a: "좋아"
 korea_china.15.t: "북한 내 중국 군사 기지"
 korea_china.15.d: "북한군은 적의 공격 가능성에 대비해 국내 안정을 유지하기 위해 자국 영토 내에 우리 군사 기지가 설치되기를 원합니다."
 korea_china.15.a: "우리가 그들을 도울 것이다"
 korea_china.15.b: "거절한다"
 korea_china.16.t: "주북 중국군"
 korea_china.16.d: "중국의 군사 기지가 곧 우리 영토에 들어설 예정입니다. 이제야 안심이 되는군요!"
 korea_china.16.a: "좋아"
