 RULE_OPTION_GREAT_COLLAPSE: "대붕괴"
 RULE_OPTION_GREAT_COLLAPSE_AI_DESC: "1991년 소련 붕괴 이후, 미국의 고삐 풀린 군국주의는 점차 납세자들에게 큰 부담이 되었습니다. 1995년부터 1999년까지 이어진 일련의 시위는 사상자와 국민적 반감을 계속해서 증폭시켰고, 냉전 사고방식에 갇힌 연방정부에 대한 불신도 커져갔습니다. 이제 세기가 바뀌는 시점, Y2K 공포와 맞물려 전국적인 철도 파업에 대한 소문이 돌고 있습니다. 파업이 발생한다면 경제는 마비될 것이며, 시위 진압 작전을 조율할 연방 정부의 능력 또한 무력화될 것입니다."
 USB_AI_BEHAVIOR: "@USB 아메리카 자유 주 연합"
 RULE_OPTION_REVANCHIST_PATH: "운명을 되찾다"
 RULE_OPTION_REVANCHIST_PATH_AI_DESC: "연방의 영향력이 자유 주 연합을 흔들어 미 본토 48개 주에 대한 보복주의로 대외 정책을 맞추도록 할 것입니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_ISOLATION_PATH: "대고립"
 RULE_OPTION_ISOLATION_PATH_AI_DESC: "아메리카 드림은 죽었고 세상은 끊임없이 팽창하는 공허처럼 보입니다. 이에 따라 국민들과 정치 지도자들은 세상에 등을 돌리고 자신들의 작은 구석이 가져다줄 달콤한 평화와 고요함을 즐기는 것이 최선이라고 결정합니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_ARCADIA_PATH: "동부의 정체성"
 RULE_OPTION_ARCADIA_PATH_AI_DESC: "아메리카 드림이 악몽으로 변하면서 연방의 영향력이 약화됩니다. 이에 따라 국민들은 앞으로 나아갈 새로운 길이 오직 정당한 길뿐이라 판단하고, 아르카디아 계획(Arcadia Plan)을 통해 새로운 \"동부 정체성\"을 창조하려 합니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 CSA_AI_BEHAVIOR: "@CSA 아메리카 남부 공화국"
 RULE_OPTION_A_SOUTHERN_AMERICA_PATH: "남부의 아메리카"
 RULE_OPTION_A_SOUTHERN_AMERICA_PATH_AI_DESC: "남부 인민들의 가슴 속에 여전히 아메리카 드림이 타오르는 가운데, 많은 이들이 과거의 영광을 개혁하고 새로운 아메리카, 즉 남부의 아메리카를 창조하기 위해 나아가도록 정부의 시각을 흔들고 있습니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_GOLDEN_CIRCLE_PATH: "골든 서클"
 RULE_OPTION_GOLDEN_CIRCLE_PATH_AI_DESC: "많은 남부인들은 본질적으로 고유한 남부만의 새로운 운명을 개척해야 한다고 믿습니다. 이에 따라 권력을 잡은 많은 이들이 이 새로운 자유의 시대를 공고히 하기 위한 방법으로 과거 남부연합(Confederacy)의 오래된 아이디어를 재검토하길 원합니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_SOUTHERN_ARCADIA_PATH: "동부의 정체성"
 RULE_OPTION_SOUTHERN_ARCADIA_PATH_AI_DESC: "아메리카 드림이 소멸하고 \"남부연합의 오명\"에 너무 깊이 빠지기를 원하는 사람이 많지 않은 상황에서, 많은 남부인들은 새로운 정체성을 개척하기 위해 아카디안 및 크리올 인민들의 프랑스적 영향력에 눈을 돌립니다. 이는 미국적이지도 남부연합적이지도 않지만, 그럼에도 불구하고 우리 고유의 정체성입니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_THE_FLORIDA_UPRISING_PATH: "플로리다 봉기"
 RULE_OPTION_THE_FLORIDA_UPRISING_PATH_AI_DESC: "우리 신생 국가의 초기 시절, 사회주의 쓰레기와 동조자들이 선거를 훔치고 정권을 장악했습니다. 이제 진정한 남부의 애국자들이 이 붉은 악마들로부터 우리 고향에 남은 것을 지켜내야 할 때입니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 CAS_AI_BEHAVIOR: "@CAS 캐스케이디아"
 RULE_OPTION_ROCKY_MOUNTAIN_RESISTANCE_PATH: "로키산맥 저항군"
 RULE_OPTION_ROCKY_MOUNTAIN_RESISTANCE_PATH_AI_DESC: "올림피아 정부는 로키산맥이 위치한 아이다호 주에서 고조되는 사회 불만을 현지 법 집행기관이 처리하도록 허용할 것입니다. 그러나 날로 성장하는 저항 운동을 진압하지 못한 현지 법 집행기관의 실책은 결국 카스카디아 국가에 대항하는 독립 봉기로 이어집니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_PEACE_IN_OUR_TIME_PATH: "우리 시대의 평화"
 RULE_OPTION_PEACE_IN_OUR_TIME_PATH_AI_DESC: "올림피아 정부는 대저항군 운동을 지원하고 이끌 특별 조사 부대를 파견할 것입니다. 시간이 지남에 따라 그들의 도움으로 법과 질서가 회복되고 저항군(RMR) 지도자가 조직을 해체하도록 강제하여 더욱 평화롭고 통합된 국가를 이루게 됩니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 LKT_AI_BEHAVIOR: "@LKT 라코타 공화국"
 RULE_OPTION_RECLAMATION_FRONT_WAR_PATH: "개척 전선 전쟁"
 RULE_OPTION_RECLAMATION_FRONT_WAR_PATH_AI_DESC: "북부 정부는 개척 전선(Reclamation Front) 조직 산하로 유입되는 무작위적인 원주민들을 무시하고 멸시할 것입니다. 이에 따라 라코타 정부가 파견한 과도하게 열정적인 감사관이 단독으로 개척 전선 지도부와 만나면서 신속한 불화가 초래되고, 결국 개척 전선이 통제하는 캔자스와 라코타 공화국 사이의 무장화와 전쟁으로 이어집니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_RECLAMATION_FRONT_PEACE_PATH: "개척 전선 평화"
 RULE_OPTION_RECLAMATION_FRONT_PEACE_PATH_AI_DESC: "보고서의 혼선을 이해한 후 더 많은 조사가 진행될 것이며, 이는 개척 전선 조직에 대한 보다 공격적인 주장 중 일부가 사실이 아님을 신속히 반증하는 결과로 이어집니다. 이 새롭게 발견된 통합을 통해 국가를 재건하고 전반적으로 더 나은 경제 및 사회적 연합을 형성하기 위한 협력 대화가 시작될 것입니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RUS_AI_BEHAVIOR: "@SOV 러시아 연방"
 RULE_OPTION_PUTIN_AI_DESC: "러시아 연방은 통합러시아당의 대외 정책을 추구하고 그들의 힘을 강화하려 할 것입니다.\n"
 RULE_OPTION_PEACEFUL_REFORM_AI_DESC: "러시아는 자유주의적 개혁을 단행하고 서방과의 관계를 더욱 강화하려 할 것입니다.\n"
 RULE_OPTION_THE_RED_MENACE_AI_DESC: "러시아는 마르크스주의 정책으로 기울기 시작할 것이며 소련 부활을 시도할 것입니다.\n"
 RULE_OPTION_RISE_OF_RUSSIA_AI_DESC: "러시아는 민족주의 정책으로 기울기 시작할 것이며, 대러시아 선포를 목표로 공격적인 대외 정책을 추진하려 할 것입니다.\n"
 RULE_OPTION_NAZBOL_RUSSIA_AI_DESC: "국가볼셰비키들은 조국의 발전을 위한 다른 길을 실현할 수 있습니다. 그들은 안정과 위대함을 되찾길 바라며 러시아에 새로운 질서를 수립할 것입니다.\n"
 RULE_OPTION_IRON_DIMON_RUSSIA_AI_DESC: "러시아에는 언제든 우리 위대한 조국을 배신할 자들에게 영원히 양보하거나 협상하지 않을 새로운 통치자가 필요합니다.\n"
 RULE_OPTION_LIBERAL_DIMON_RUSSIA_AI_DESC: "드미트리 아나톨리예비치는 마침내 자유주의 노선으로 나아가 러시아를 자유주의로 이끌 것입니다.\n"
 RULE_OPTION_OLIGARCHS_RUSSIA_AI_DESC: "이미 러시아 내에서 막강한 권력을 쥐고 있는 올리가르히들이 자신들을 위해 더 많은 통제권을 장악하려 시도할 것입니다.\n"
 RULE_OPTION_CONFEDERATION_RUSSIA: "러시아 연합"
 RULE_OPTION_CONFEDERATION_RUSSIA_AI_DESC: "러시아는 구성체들에게 가능한 최대의 자치를 부여하여 진정한 연방이 되려고 할 것입니다. 어쩌면 국가연합일 지도요?\n"
 CZE_AI_BEHAVIOR_MD: "@CZE 체코 공화국"
 CZE_HISTORICAL: "기본"
 CZE_HISTORICAL_DESC: "체코 공화국은 역사적인 선거 프로그램을 따르고, 가능한 한 빨리 스코다(Škoda) 자동차 수출을 시작하며, 이라크 침공 동참을 시도할 것입니다. 페트르 파벨은 민주적인 체코 공화국에 머무르며 표준 임무를 완료할 것입니다."
 CZE_COMMUNISM: "보헤미아 모라바 공산당의 승리"
 CZE_COMMUNISM_DESC: "공산당인 보헤미아 모라바 공산당(KSČM)이 선거에서 승리하고 대체 역사 경로를 시작하여 다른 국가들에게 분쟁 영토를 요구하려 시도할 것입니다."
 GAME_RULE_nato_disabled: "게임 규칙에 의해 §YNATO§! 비활성화됨"
 RULE_OPTION_HISTORICAL_PRESIDENTS: "역사적인 미국 대통령"
 RULE_OPTION_HISTORICAL_PRESIDENTS_AI_DESC: "AI는 매 선거 연도 1월 20일에 실제 역사적 승자를 기반으로 대통령을 선출합니다."
 BRA_HISTORICAL: "역사적"
 BRA_HISTORICAL_DESC: "브라질은 룰라 쪽으로 기울어 그의 정책을 시행하기 위해 노력할 가능성이 더 높으며, 동시에 서방 열강 및 동방 열강 사이에서 아슬아슬한 줄타기를 하며 긍정적인 관계를 유지할 것입니다."
 BRA_LULA: "노동자당"
 BRA_LULA_DESC: "브라질은 룰라와 노동자당이 다가오는 선거에서 주요 선두 주자가 되어 브라질의 권력 좌석을 차지할 수 있도록 보장하려 노력할 것입니다."
 BRA_SERRA: "브라질 사회민주당"
 BRA_SERRA_DESC: "브라질은 세라와 브라질 사회민주당이 첫 선거에서 권력을 유지하도록 보장하려 노력할 것입니다."
 RULE_GOD_OF_WAR: "전쟁의 신 모드"
 RULE_GOD_OF_WAR_NO: "비활성화"
 RULE_GOD_OF_WAR_YES: "활성화"
 RULE_GOD_OF_WAR_NO_DESC: "AI는 기본 구성을 사용합니다."
 RULE_GOD_OF_WAR_YES_DESC: "AI가 강화된 편제와 약간의 치트를 사용합니다."
 RULE_ALLOW_CONDITIONAL_PEACE_DEAL: "조건부 평화협정 허용"
 RULE_OPTION_CONDITIONAL_PEACE_DEAL_YES_DESC: "교전국들이 §Y'조건부 평화협정'§! 외교 기능을 사용할 수 있도록 허용합니다. 이를 통해 어느 한쪽이 완전히 항복하지 않더라도 평화협정을 체결할 수 있습니다."
 RULE_OPTION_CONDITIONAL_PEACE_DEAL_NO_DESC: "국가들이 §Y조건부 평화협정§! 외교 기능을 사용할 수 없도록 제한합니다. 따라서 평화를 되찾기 위해서는 강제로 총력전을 끝까지 치러야만 할 것입니다."
 RULE_PEACE_PROPOSAL_BLOCKED_TT: "§Y조건부 평화 협정§!이 활성화된 동안에는 이 기능이 차단됩니다. 대신 §Y$CPD_OFFER_CONDITIONAL_PEACE_TITLE$§!을(를) 사용하십시오!"
 RULE_OPTION_ALL_AHEAD_SLOW: "미속 전진"
 RULE_OPTION_ALL_AHEAD_SLOW_AI_DESC: "이 게임 규칙을 활성화하면 AI가 미국을 붕괴시키는 사태를 방지합니다. 비역사적 AI 모드에서의 무작위 요소를 제거합니다."
 RULE_OPTION_SECOND_COAL_WARS: "제2차 석탄 전쟁"
 RULE_OPTION_SECOND_COAL_WARS_AI_DESC: "자유 주 연합은 새로 재건된 미국노동조합(UMWA)에 웨스트버지니아 광산이 당초 폐쇄되었던 원칙에 따라 다시 열리지 않을 것이라고 선포하며, \"현대적인 해결책과 문제들이 당초 폐쇄된 이유였다\"라고 밝힙니다. 그 결과 광부들이 폭동을 일으키고 주 독립을 선언하여 제2차 석탄 전쟁 사태로 이어집니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 NEN_AI_BEHAVIOR: "@NEN 뉴잉글랜드"
 RULE_OPTION_GREEN_MOUNTAIN_REBELLION: "그린 마운틴 반란"
 RULE_OPTION_GREEN_MOUNTAIN_REBELLION_AI_DESC: "소수의 시끄러운 목소리가 내는 사소한 정치적 압력에 굴복하지 않습니다. 뉴잉글랜드 국가 정부는 정부 소재지를 몬트필리어로 이전하라는 버몬트인들의 요구를 거부할 것입니다. 그 결과 주 내에서 일어난 반란을 진압할 때까지 적대감이 계속 고조될 것입니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 RULE_OPTION_THE_OTHER_NEW_CAPITAL: "또 다른 새로운 수도"
 RULE_OPTION_THE_OTHER_NEW_CAPITAL_AI_DESC: "새로운 수도가 어디가 되든 진심으로 신경 쓰는 사람이 거의 없음을 확인한 뉴잉글랜드 정부는 버몬트인들의 \"요구\"를 수용하고 수도를 몬트필리어로 이전합니다. §R 미국 게임 규칙이 연합 유지(Post United) 또는 대붕괴(Great Collapse) 설정 중 하나여야 합니다.§!"
 POL_PHALANGA: "팔랑가"
 POL_PHALANGA_DESC: "폴란드는 민족주의 운동인 팔랑가(Falanga)의 경로를 선택할 것입니다."
 EST_HISTORICAL: "역사적"
 EST_HISTORICAL_DESC: "에스토니아는 평화로운 공존과 유럽연합 가입 열망이라는 역사적 경로를 따를 것입니다.."
 RULE_OPTION_EST_FASCIST: "급진적 에스토니아"
 RULE_OPTION_EST_FASCIST_DESC: "에스토니아에서 급진적인 세력이 집권할 것이며, 이는 지역의 불안정을 초래할 수 있습니다.."
 RULE_OPTION_EST_DEMOCRATIC: "민주주의의 길"
 RULE_OPTION_EST_DEMOCRATIC_DESC: "에스토니아는 민주적 가치를 고수할 것이며, 민주 정당 중 하나가 권력을 잡을 것입니다.."
 RULE_OPTION_EST_CENTER: "에스토니아의 중도주의"
 RULE_OPTION_EST_CENTER_DESC: "에스토니아는 정치 방향에서 중도주의 경로를 따를 것입니다."
 ROM_HISTORICAL: "역사적"
 ROM_HISTORICAL_DESC: "루마니아는 평화로운 공존과 유럽연합 가입 열망이라는 역사적 경로를 따를 것입니다.."
 RULE_OPTION_ROM_FASCIST: "급진적 루마니아"
 RULE_OPTION_ROM_FASCIST_DESC: "루마니아에서 급진적인 세력이 집권할 것이며, 이는 지역의 불안정을 초래할 수 있습니다.."
 RULE_OPTION_ROM_DEMOCRATIC: "민주주의의 길"
 RULE_OPTION_ROM_DEMOCRATIC_DESC: "루마니아는 민주적 가치를 고수할 것이며, 민주 정당 중 하나가 권력을 잡을 것입니다.."
 RULE_OPTION_ROM_CENTER: "루마니아의 중도주의"
 RULE_OPTION_ROM_CENTER_DESC: "루마니아는 정치 방향에서 중도주의 경로를 따를 것입니다."
 RULE_OPTION_MONARCHISTS: "군주제 아르메니아"
 RULE_OPTION_MONARCHISTS_AI_DESC: "아르메니아는 다시 군주제 국가가 될 것입니다"
 RULE_OPTION_UNITED_STATE_OF_ARMENIA: "아르메니아 합중국"
 RULE_OPTION_UNITED_STATE_OF_ARMENIA_AI_DESC: "아르메니아는 자신들만의 합중국을 만들 것입니다"
 RULE_OPTION_DASHNAK_COMMI: "다슈나크 사회주의자"
 RULE_OPTION_DASHNAK_COMMI_AI_DESC: "다슈나크당 좌파가 아르메니아의 정권을 잡을 것입니다"
 RULE_OPTION_DASHNAK_NATI: "다슈나크 민족주의자"
 RULE_OPTION_DASHNAK_NATI_AI_DESC: "다슈나크당 우파가 아르메니아의 정권을 잡을 것입니다"
 RULE_ALLOW_WORLD_WAR: "세계대전 강제화"
 RULE_ALLOW_ENABLE_WORLD_WAR: "정해진 수순의 세계 대전 활성화"
 RULE_ALLOW_ENABLE_WORLD_WAR_YES_DESC: "이 옵션은 대체역사 요소를 제한하고, 다른 모드들처럼 특정 연도에 세계대전이 발발하도록 유도합니다.\n\n역사적 AI 모드로 플레이하고 'AI 부채 전쟁' 옵션을 끄는 것이 강력히 권장됩니다."
 RULE_ALLOW_ENABLE_WORLD_WAR_NO: "정해진 수순의 세계 대전 비활성화"
 RULE_ALLOW_ENABLE_WORLD_WAR_NO_DESC: "밀레니엄 던이 기존의 대체역사 형태를 유지합니다."
 RULE_ENABLE_INVESTMENT_COLLAPSE_LOCK: "파산 위기 상황에서 투자 제한"
 RULE_ENABLE_INVESTMENT_COLLAPSE_LOCK_NO_DESC: "\"파산 위기\" 임무가 활성화된 상태에서도 타국에 투자를 보낼 수 있습니다."
 RULE_ENABLE_INVESTMENT_COLLAPSE_LOCK_YES_DESC: "\"파산 위기\" 임무가 활성화된 상태에서는 더 이상 타국에 투자를 보낼 수 없습니다."
 RULE_SYRIA_ARAB_SPRING_CHOICE_DEFAULT_DESC: "시리아가 아랍의 봄 선택지를 평소처럼 평가하여 결정합니다."
 RULE_SYRIA_ARAB_SPRING_CHOICE_HISTORICAL_CIVIL_WAR_DESC: "아랍의 봄 발생 시, 시리아가 역사적 내전을 강제로 유발하는 선택지를 고르도록 보장합니다."
 RULE_SYRIA_ARAB_SPRING_CHOICE_HISTORICAL_ISIS_SPAWN_DESC: "시리아가 아랍의 봄 당시 역사적 이슬람 국가(ISIS)의 출현을 보장하는 선택지를 항상 선택합니다. 이는 역사적 내전 발생 또한 보장합니다."
 RULE_SYRIA_ARAB_SPRING_CHOICE: "아랍의 봄 도중 시리아의 행동 설정"
 RULE_HISTORIC_EVENTS: "역사적 사건 발생 시기"
 RULE_HISTORIC_EVENTS_NO: "역사적 사건이 무작위로 발생합니다. 이는 일반적인 게임 설정입니다."
 RULE_HISTORIC_EVENTS_YES: "역사적 사건이 무작위로 발생하지 않습니다. 대부분의 사건은 여전히 무작위성을 띠지만, 특정 사건은 지연을 방지하기 위해 역사적 날짜가 포함된 달에 반드시 발생하도록 보정됩니다. 이것이 완벽한 역사적 고증을 의미하지는 않으며, 단지 역사적 흐름을 따르도록 도울 뿐입니다."
 HOL_DEMOCRATIC_RULE: "민주주의"
 HOL_DEMOCRATIC_RULE_AI_DESC: "네덜란드는 노동당(PvdA), 기독민주사회당(CDA) 또는 자유민주국민당(VVD)과 함께 서방 기관과의 협력 및 규칙 기반 국제 질서를 강조하는 민주주의 경로를 따를 것입니다.\n"
 HOL_POPULIST_RULE: "포퓰리즘"
 HOL_POPULIST_RULE_AI_DESC: "네덜란드는 국가 주권, 직접 민주주의, 기득권 정치에 대한 강한 비판 레토릭을 내세우는 포르튀인 명부(LPF) 또는 자유당(PVV)과 함께 포퓰리즘 방향을 따를 것입니다.\n"
 HOL_MONARCHY_VOC_RULE: "네덜란드 동인도 회사 (VOC)"
 HOL_MONARCHY_VOC_RULE_AI_DESC: "네덜란드는 네덜란드 동인도 회사(VOC)를 부활시켜 주권 해양 강국으로 행동할 수 있는 권한을 부여할 것입니다. 아시아 및 그 너머의 영토들이 기업 지배 또는 정복을 통해 다시 한번 통치될 것입니다\n"
 HOL_MONARCHY_WIC_RULE: "네덜란드 서인도 회사 (WIC)"
 HOL_MONARCHY_WIC_RULE_AI_DESC: "네덜란드는 네덜란드 서인도 회사(WIC)를 부활시켜 대서양 영지들에 대한 권한을 부여할 것입니다. 무역과 정복의 혼합을 통해, 그들은 왕권 아래 아메리카와 아프리카에서 네덜란드의 영향력을 다시 주장할 것입니다.\n"
 HOL_NVU_RULE: "네덜란드 인민연합 (NVU)"
 HOL_NVU_RULE_AI_DESC: "네덜란드는 통일된 게르만 제국을 건설하려는 야망을 가진 급진적 초국수주의 운동인 네덜란드 인민연합(NVU)의 지배하에 놓입니다. 군국주의, 문화적 동화, 그리고 공격적인 팽창주의를 통해 네덜란드 국가는 어떤 대가를 치르더라도 범게르만의 운명을 선도하려 할 것입니다.\n"
 RULE_ALLOW_MD_ANNEX: "지저분한 국경 합병 허용"
 RULE_OPTION_MD_ANNEX_NO_DESC: "평화 협정 이후의 국경에 개입하지 않으며, 국경은 회담에서 획정된 그대로 유지됩니다."
 RULE_OPTION_MD_ANNEX_YES_DESC: "평화협정 이후 동일한 국가 태그가 여러 개 존재할 경우, 나머지 세력은 가장 강력한 종주국을 둔 쪽으로 통합됩니다. 종주국의 국력은 열강 순위 국민정신에 따라 결정됩니다. 합병이 완료되기까지 최대 14일이 소요될 수 있습니다."
 RULE_DISABLE_CSTO: "집단안보조약기구(CSTO) 비활성화"
 RULE_YES_DISABLE_CSTO_DESC: "게임 로딩 시 집단안보조약기구(CSTO)가 비활성화됩니다."
 RULE_NO_DISABLE_CSTO_DESC: "집단안보조약기구(CSTO)는 세력으로 계속 유지됩니다."
 RULE_DISABLE_MUSLIM_BROTHERHOOD_CIVIL_WAR: "무슬림 형제단 내전 비활성화"
 RULE_YES_DISABLE_MUSLIM_BROTHERHOOD_CIVIL_WAR_DESC: "무슬림 형제단 내전이 비활성화됩니다."
 RULE_NO_DISABLE_MUSLIM_BROTHERHOOD_CIVIL_WAR_DESC: "무슬림 형제단 내전이 활성화됩니다."
 RULE_SYRIA_ARAB_SPRING_CHOICE_HISTORICAL_CIVIL_WAR: "역사적인 시리아 내전"
 RULE_SYRIA_ARAB_SPRING_CHOICE_HISTORICAL_ISIS_SPAWN: "이슬람 국가 (ISIS) 출현"
 RULE_OPTION_SWE_PRO_WESTERN: "서방으로"
 RULE_OPTION_SWE_PRO_WESTERN_AI_DESC: "스웨덴은 나토(NATO) 및 유럽연합(EU)과 더욱 밀착할 것입니다."
 RULE_OPTION_SWE_RED_SWEDEN: "스웨덴 공화국"
 RULE_OPTION_SWE_RED_SWEDEN_AI_DESC: "스웨덴 극좌파가 정권을 잡고 군주제를 폐지할 것입니다."
 RULE_DISABLE_AI_INFLUENCE_PUPPETING: "AI 영향력 괴뢰화 비활성화"
 RULE_YES_DISABLE_AI_INFLUENCE_PUPPETING_DESC: "AI가 영향력 시스템을 통해 타국을 괴뢰국으로 만들 수 없습니다."
 RULE_NO_DISABLE_AI_INFLUENCE_PUPPETING_DESC: "AI가 영향력 시스템을 통해 타국을 괴뢰국으로 만들 수 있습니다."
 RULE_ALLOW_MP_ENHANCEMENTS: "멀티플레이 최적화"
 RULE_NOT_ALLOW_MP_ENHANCEMENTS_DESC: "게임 속도 향상을 위한 멀티플레이 기능을 허용하지 않습니다. 싱글플레이 시 권장하지 않습니다."
 RULE_ALLOW_MP_ENHANCEMENTS_DESC: "게임 속도 향상을 위한 멀티플레이 기능을 허용하지 않습니다. 또한 국력 순위 요구 조건을 무시하고 모든 국가가 세력을 창설할 수 있게 합니다."
 RULE_DISABLE_WESTERN_OUTLOOK_FEATURES: "서구권의 공격적 영향력 기능 비활성화"
 RULE_YES_DISABLE_WESTERN_OUTLOOK_FEATURES: "영향력을 이용한 쿠데타 시도나 괴뢰화 같은 공격적인 서구권 기능을 비활성화합니다."
 RULE_INTERNAL_FACTION_COST_REDUCTION: "내부 파벌 비용 감소"
 RULE_DISABLE_INTERNAL_FACTION_COST_REDUCTION_DESC: "내부 파벌 변경 비용이 기본값으로 유지됩니다."
 RULE_ENABLE_INTERNAL_FACTION_COST_REDUCTION_DESC: "(콘텐츠상 막혀있는 경우를 제외하고) 모든 국가의 내부 파벌 변경 비용이 감소합니다. §R이로 인해 중점이 고장 나거나 문제가 발생하더라도 책임은 본인에게 있습니다.§!"
 RULE_OPTION_EU_ONE: "1일"
 RULE_OPTION_EU_ONE_DESC: "§R테스트 목적용입니다.§! 유럽 의회 및 유럽 이사회 투표 대기시간이 기본 180일 대신 1일로 설정됩니다."
 RULE_ALLOW_FORCING_A_WHITE_PEACE: "평화 강제 허용"
 RULE_YES_FORCING_A_WHITE_PEACE: "공격 전쟁 중인 국가에 백지 평화를 강제할 수 있도록 허용합니다."
 RULE_NO_FORCING_A_WHITE_PEACE: "공격 전쟁 중인 국가에 백지 평화를 강제하는 것을 허용하지 않습니다."
 CZE_MONARCHY_KING: "군주제 복고 (국왕)"
 CZE_MONARCHY_KING_DESC: "왕당파 정당이 더 적극적으로 활동하여 선거에서 승리하며, 합스부르크 왕가 아래 체코 군주제를 복고할 것입니다."
 CZE_MONARCHY_PRESIDENT: "군주제 복고 (대통령)"
 CZE_MONARCHY_PRESIDENT_DESC: "왕당파 정당이 더 적극적으로 활동하여 선거에서 승리하며, 민주적 체제 아래 체코 군주제를 복고할 것입니다."
 RULE_OPTION_IF_POINT_00: "매달 0.00"
 RULE_OPTION_IF_POINT_00_DESC: "§Y내부 파벌§! 의견의 매달 변동치가 기본값인 0.50 대신 0.00으로 설정됩니다. 이 설정 사용 시 밀레니엄 던의 도전 과제가 비활성화됩니다."
 RULE_ENABLE_ENERGY_LOAD_SHARING: "에너지 부하 공유 활성화"
 RULE_ENABLE_ENERGY_LOAD_SHARING_DESC: "에너지 적자 발생 시 인접 국가에서 에너지를 사거나 팔 수 있는 에너지 부하 공유 시스템을 활성화합니다."
 RULE_DISABLE_ENERGY_LOAD_SHARING_DESC: "에너지 적자 발생 시 인접 국가에서 에너지를 사거나 팔 수 있는 에너지 부하 공유 시스템을 비활성화합니다."
