 NKO_for_well_being_of_people: "Para o Bem-estar do Povo de Chosun"
 NKO_for_well_being_of_people_desc: "Os primórdios do Partido dos Trabalhadores da Coreia são para a felicidade e bem-estar do povo coreano. Não devemos esquecer nossos princípios."
 NKO_quality_first: "Qualidade em Primeiro Lugar"
 NKO_quality_first_desc: "As indústrias civis locais estão seriamente comprometendo a qualidade de seus produtos para cumprir nossas metas planejadas, e isso deve ser interrompido!"
