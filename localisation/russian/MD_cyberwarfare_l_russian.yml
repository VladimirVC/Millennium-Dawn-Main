l_russian:
 cyber_operations: "Кибероперации"
 cyber_operations_desc: "Проводите наступательные и разведывательные операции против назначенных стран-целей. Добавляйте цели через киберпанель, затем выполняйте операции в соответствии с вашим уровнем возможностей."
 branch_cyber: "Национальное киберкомандование"
 CYBER_CAP_TITLE: "§YОперативные возможности киберкомандования§!"
 CYBER_TIER_LABEL: "Уровень возможностей:"
 CYBER_TIER_TT: "Общий уровень вашей программы киберопераций. Более высокие уровни открывают более мощные операции и дополнительные одновременные целевые слоты."
 CYBER_OFFENSE_LABEL: "Сила нападения:"
 CYBER_OFFENSE_TT: "Определяет эффективность наступательных операций. Увеличивает шансы на успех при всех кибератаках."
 CYBER_DEFENSE_LABEL: "Рейтинг защиты:"
 CYBER_ATTRIB_LABEL: "Бонус за Атрибуцию:"
 CYBER_ATTRIB_TT: "Снижает вероятность того, что ваши операции будут приписаны вам. Положительные значения затрудняют отслеживание."
 CYBER_MAX_TARGETS_LABEL: "Максимальные цели:"
 CYBER_MAX_TARGETS_TT: "Максимальное количество стран, на которые вы можете нацелиться одновременно. Соответствует вашему уровню возможностей."
 CYBER_GUI_INVEST_OFF: "Наступательный потенциал"
 CYBER_GUI_INVEST_OFF_TT: "§YНеобходимые условия:§!\n[!cyber_invest_offense_button_click_enabled]\n§Y Щелкните правой кнопкой мыши. Необходимые условия:§!\n[!cyber_invest_offense_button_right_click_enabled]\n§Y Эффект:§!\n[!cyber_invest_offense_button_click]\n\n§Y Щелкните правой кнопкой мыши. Эффект:§!\n[!cyber_invest_offense_button_right_click]"
 CYBER_GUI_INVEST_DEF: "Оборонительный потенциал"
 CYBER_GUI_INVEST_DEF_TT: "§YНеобходимые условия:§!\n[!cyber_invest_defense_button_click_enabled]\n§Y Щелкните правой кнопкой мыши. Необходимые условия:§!\n[!cyber_invest_defense_button_right_click_enabled]\n§Y Эффект:§!\n[!cyber_invest_defense_button_click]\n\n§Y Щелкните правой кнопкой мыши. Эффект:§!\n[!cyber_invest_defense_button_right_click]"
 CYBER_OPERATIONS_TITLE: "§YКИБЕРОРУДИЙНЫЕ ОПЕРАЦИИ§!"
 CYBER_CUR_DECRYPT_TT: "§YХод расшифровки§!: [?decryption_progress@var:current_cyber_nation_target|+%1]"
 CYBER_DECRYPT_TT: "Отображает текущий прогресс в расшифровке зашифрованных файлов [?current_cyber_nation_target.GetNameWithFlag]'."
 CYBER_DECRYPT_TT_DELAYED: "Чем выше будет наш прогресс в расшифровке, тем эффективнее станут наши кибероперации против [?current_cyber_nation_target.GetNameWithFlag] и тем меньше будет вероятность того, что нас обнаружат или идентифицируют во время кибероперации."
 CYBER_CUR_DEFENSE_TT: "§YЦелевая Кибербезопасность§!: [?cryptology_defense_level@var:current_cyber_nation_target|-]"
 CYBER_DEFENSE_TT: "Устойчивость ваших сетей к внешним вторжениям. Снижает эффективность атак, направленных против вас."
 CYBER_DEFENSE_TT_DELAYED: "Чем выше уровень §Yкибербезопасности§! в стране, тем сложнее нам будет проводить успешные операции, не взломав или не взломав хотя бы частично их методы шифрования."
 CYBER_ACTIVE_TITLE: "§YАКТИВНЫЕ ЦЕЛИ§!"
 CYBER_POTENTIAL_TITLE: "§YПОТЕНЦИАЛЬНЫЕ ЦЕЛИ§!"
 CYBER_SLOTS_LABEL: "Активные цели: [?cyber_active_targets^num|0] / [?cyber_max_targets|0]"
 CYBER_SLOTS_TT: "Текущее количество активных целей в зависимости от вашей максимальной одновременной пропускной способности."
 CYBER_CUR_OP_TARGET_TT: "Выберите эту страну для таргетирования конкретной операции."
 CYBER_REMOVE_TARGET_TT: "Удалите эту страну из списка ваших активных целей."
 CYBER_CUR_TARGET_TT: "§YПри щелчке правой кнопкой мыши:§!\n[!cyber_current_targets_list_button_right_click_enabled]\n§Y При щелчке левой кнопкой мыши:§! [!cyber_current_targets_list_button_click]\n\n§Y При щелчке правой кнопкой мыши:§! [!cyber_current_targets_list_button_right_click]"
 CYBER_CUR_OP_TITLE: "§YТЕКУЩАЯ ОПЕРАТИВНАЯ ИНФОРМАЦИЯ§!"
 CYBER_CUR_OP_NAME_TITLE: "§YТекущая§! §RЦель§!: [?current_cyber_nation_target.GetNameWithFlag]"
 CYBER_CUR_OP_INFO_TITLE: "§YТекущие операции§!: [?cyber_ongoing_operations] / [?cyber_op_max_targets|0]"
 CYBER_BROWSER_TITLE: "§YДОБАВИТЬ ЦЕЛЬ§!"
 CYBER_BROWSER_HINT: "Щелкните страну, чтобы начать ее отслеживание."
 CYBER_ADD_TARGET_TT: "Обозначьте эту страну как кибернетическую цель."
