l_english:
 ### Mažeikiai Refinery ###
 lithuania.1.t: "The Mažeikių Nafta Question"
 lithuania.1.d: "Lithuania's only oil refinery, Mažeikių Nafta, has become a geopolitical flashpoint. Both Polish energy giant PKN Orlen and a Russian consortium have expressed interest in acquiring the facility. Keeping it in state hands remains an option, though a costly one."
 lithuania.1.a: "Sell to PKN Orlen"
 lithuania.1.b: "Sell to the Russian consortium"
 lithuania.1.c: "Keep it nationalized"

 lithuania.2.t: "PKN Orlen Acquires Lithuanian Refinery"
 lithuania.2.d: "PKN Orlen has completed the acquisition of Lithuania's Mažeikių Nafta refinery, expanding Polish energy interests in the Baltic region."
 lithuania.2.a: "A sound investment"

 lithuania.3.t: "Fire at Mažeikiai Refinery"
 lithuania.3.d: "A suspicious fire has broken out at the Mažeikiai oil refinery. The timing, shortly after the sale to Russian interests, has fueled speculation about sabotage and raised questions about the security of Lithuania's energy infrastructure."
 lithuania.3.a: "Point the finger at Moscow"
 lithuania.3.b: "Launch a quiet investigation"

 ### Ignalina Nuclear Power Plant ###
 lithuania.10.t: "The Future of Ignalina"
 lithuania.10.d: "The European Union has demanded Lithuania close the Ignalina Nuclear Power Plant, home to two RBMK reactors — the same design that failed at Chernobyl. Closure is a condition of EU membership, but Ignalina supplies most of Lithuania's electricity. A replacement plant could be built jointly with Poland and the Baltic States."
 lithuania.10.a: "Negotiate a joint replacement with our neighbors"
 lithuania.10.b: "Keep Ignalina running"
 lithuania.10.c: "Close it without a replacement"

 lithuania.11.t: "Lithuanian Nuclear Cooperation Proposal"
 lithuania.11.d: "Lithuania has proposed that Poland co-fund the construction of the Visaginas Nuclear Power Plant to replace the aging Ignalina facility. The project would strengthen Baltic energy independence and deepen regional ties, but requires significant investment."
 lithuania.11.a: "Agree to co-fund the project"
 lithuania.11.b: "We have other priorities"

 lithuania.12.t: "Poland Agrees to Nuclear Cooperation"
 lithuania.12.d: "Poland has agreed to co-fund the Visaginas Nuclear Power Plant. Construction can begin, though the project will take years to complete and require substantial resources."
 lithuania.12.a: "Begin construction"

 lithuania.13.t: "Poland Declines Nuclear Cooperation"
 lithuania.13.d: "Poland has declined to participate in the Visaginas project. Lithuania must now decide the fate of Ignalina on its own."
 lithuania.13.a: "Keep Ignalina running despite the risks"
 lithuania.13.b: "Close it — we will manage without"

 lithuania.14.t: "Visaginas Nuclear Plant Referendum"
 lithuania.14.d: "After years of construction, the Visaginas Nuclear Power Plant project faces a national referendum. Public opinion is divided between those who see it as essential for energy security and those concerned about nuclear safety and cost overruns."
 lithuania.14.a: "The people approve the plant"
 lithuania.14.b: "The people reject the project"

 lithuania.15.t: "Visaginas Plant Completed"
 lithuania.15.d: "The joint Lithuanian-Polish Visaginas Nuclear Power Plant is operational. The project represents a milestone in Baltic energy cooperation and regional independence from Russian gas."
 lithuania.15.a: "A triumph of cooperation"

 lithuania.16.t: "International Pressure on Ignalina"
 lithuania.16.d: "The European Union has issued a formal warning over Lithuania's continued operation of the Ignalina Nuclear Power Plant. Sanctions and loss of EU structural funds are on the table if the Chernobyl-type reactors are not shut down."
 lithuania.16.a: "We have no choice — shut it down"
 lithuania.16.b: "Resist the pressure"

 ### Ideas ###
 LIT_refinery_sale_revenue: "Refinery Sale Revenue"
 LIT_refinery_sale_revenue_desc: "The proceeds from the sale of Mažeikių Nafta are providing a temporary boost to the national budget."
 LIT_russian_energy_leverage: "Russian Energy Leverage"
 LIT_russian_energy_leverage_desc: "The sale of Lithuania's only refinery to Russian interests has given Moscow economic leverage over Lithuanian energy policy."
 LIT_nationalized_refinery: "Nationalized Refinery"
 LIT_nationalized_refinery_desc: "Lithuania has retained state ownership of Mažeikių Nafta, ensuring resource security at the cost of operational efficiency."
 LIT_energy_deficit: "Energy Deficit"
 LIT_energy_deficit_desc: "The closure of the Ignalina Nuclear Power Plant without a replacement has left Lithuania dependent on expensive energy imports."
 LIT_visaginas_nuclear_plant: "Visaginas Nuclear Power Plant"
 LIT_visaginas_nuclear_plant_desc: "The new Visaginas plant provides clean, reliable energy and stands as a symbol of Baltic regional cooperation."

 ### News Events ###
 lithuania_news.1.t: "Mažeikių Nafta Sold"
 lithuania_news.1.d_poland: "Lithuania has sold its sole oil refinery, Mažeikių Nafta, to Polish energy giant PKN Orlen. The deal deepens Baltic-Polish economic ties and is seen in Brussels as a step toward reducing regional energy dependence on Russia."
 lithuania_news.1.d_russia: "Lithuania has sold its sole oil refinery, Mažeikių Nafta, to a Russian-backed consortium. Critics warn the deal gives Moscow strategic leverage over Lithuanian energy infrastructure."
 lithuania_news.1.a: "A cornerstone of our energy future"
 lithuania_news.1.b: "A welcome expansion into the Baltic market"
 lithuania_news.1.c: "Another step forward in the region"
 lithuania_news.1.d: "Energy security in the Baltics shifts"
 lithuania_news.1.e: "A footnote in European energy politics"

 lithuania_news.2.t: "Ignalina Nuclear Plant Closed"
 lithuania_news.2.d: "Lithuania has shut down the Ignalina Nuclear Power Plant, decommissioning the last of its Soviet-era RBMK reactors. The closure fulfills a key EU accession requirement but leaves the country dependent on energy imports until a replacement source is found."
 lithuania_news.2.a: "The lights will stay on — somehow"
 lithuania_news.2.b: "A victory for nuclear safety in Europe"
 lithuania_news.2.c: "One less reactor in the world"

 lithuania_news.3.t: "Visaginas Nuclear Plant Completed"
 lithuania_news.3.desc: "Lithuania's new Visaginas Nuclear Power Plant has come online, built with Polish co-financing. The facility restores the country's energy self-sufficiency and marks a landmark achievement in Baltic regional cooperation."
 lithuania_news.3.a: "Energy independence, at last"
 lithuania_news.3.b: "Our investment in the region pays off"
 lithuania_news.3.c: "A new chapter for Baltic energy policy"
 lithuania_news.3.d: "The Baltics secure their energy future"
