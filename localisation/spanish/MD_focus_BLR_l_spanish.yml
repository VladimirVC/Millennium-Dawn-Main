 BLR_belvesh_category: "Belspetsvneshtechnika"
 BLR_belvesh_category_desc: "El campo de actividad de la Empresa Unitaria de Comercio Exterior Estatal \"BELSPETSVNESHTECHNIKA\" es la actividad científica, de producción y de comercio exterior (incluida la prestación de servicios de intermediación) relacionada con los productos militares y de doble uso, los medios de codificación (obras, servicios), los medios de obtención de información secreta y otros productos. La Empresa Unitaria de Comercio Exterior Estatal \"BELSPETSVNESHTECHNIKA\" forma parte del Organismo Estatal de Industria Militar de la República de Belarús."
