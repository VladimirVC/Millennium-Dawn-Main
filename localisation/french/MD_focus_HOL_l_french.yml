 HOL_groningen_quake_reduce_tt: "Monthly Groningen Earthquake Change: §G-10%§!"
 HOL_groningen_quake_end_tt: "§GEnds the induced earthquakes in Groningen.§!"
 HOL_groningen.1.t: "The Ground Shifts in Groningen"
 HOL_groningen.1.d: "Years of continued gas extraction have destabilised the subsurface beneath Groningen. The first major induced earthquake has struck, cracking homes and damaging infrastructure. As long as the wells keep pumping, the tremors will return."
 HOL_groningen.1.a: "We will manage the consequences"
 HOL_groningen.2.t: "Earthquake in Groningen"
 HOL_groningen.2.d: "The ground has shifted again, cracking homes and damaging infrastructure across the province as the induced tremors continue."
 HOL_groningen.2.a: "Repair the damage"
 HOL_soft_power_doctrine: "Soft Power Doctrine"
 HOL_soft_power_doctrine_desc: "The Netherlands commands influence beyond its size through development assistance, EU leadership, and the global projection of its water and logistics expertise. Formalising this as doctrine channels political capital into sustained foreign influence."
 HOL_development_cooperation_ministry: "Ministry of Development Cooperation"
 HOL_development_cooperation_ministry_desc: "The Netherlands restores full funding to its development cooperation ministry, historically one of the most generous ODA contributors relative to GDP. Aid flows are directed at building long-term partnerships with recipient governments rather than extracting political concessions."
 HOL_global_development_partnerships: "Global Development Partnerships"
 HOL_global_development_partnerships_desc: "Dutch embassies and development attachés expand programming across Africa, Asia, the Middle East, and Latin America. Recipient governments register the consistent, non-coercive character of Dutch assistance as a mark of credibility."
 HOL_untied_aid_program: "Untied Aid Program"
 HOL_untied_aid_program_desc: "The Netherlands commits to untied development aid, meaning recipient nations may procure goods and services on open markets. This approach deepens goodwill and broadens Dutch influence beyond what bilateral conditionality could achieve."
 HOL_humanitarian_leadership: "Humanitarian Leadership"
 HOL_humanitarian_leadership_desc: "The Netherlands positions itself at the centre of international humanitarian law and crisis response, drawing on The Hague's role as the seat of the International Court of Justice and the International Criminal Court. This international standing insulates Dutch foreign policy from world-tension pressures."
 HOL_humanitarian_leadership_name: "Humanitarian Leadership"
 HOL_humanitarian_leadership_name_desc: "As the host of the international courts, the Netherlands wields moral authority that steadies domestic politics and lets it commit forces abroad with far less diplomatic friction."
 HOL_eu_single_market_champion: "EU Single Market Champion"
 HOL_eu_single_market_champion_desc: "The Netherlands consistently ranks among the EU member states most committed to deepening the single market, particularly in services, digital trade, and financial regulation. Dutch diplomats lobby actively within EU institutions to remove remaining barriers."
 HOL_frugal_four_leadership: "Frugal Four Leadership"
 HOL_frugal_four_leadership_desc: "Together with Austria, Denmark, and Sweden, the Netherlands leads the fiscally conservative bloc within the EU, insisting on budget discipline and reform conditionality for joint spending. This coordination amplifies Dutch influence within EU fiscal negotiations well beyond what bilateral leverage alone could deliver."
 HOL_european_strategic_autonomy: "European Strategic Autonomy"
 HOL_european_strategic_autonomy_desc: "The Netherlands champions a stronger European defence and foreign policy identity, supporting the EU's strategic compass and contributing to joint capabilities. Dutch diplomats build coalitions among EU partners to shift the bloc toward more independent strategic postures."
 HOL_water_diplomacy_initiative: "Water Diplomacy Initiative"
 HOL_water_diplomacy_initiative_desc: "Dutch water engineers and Deltares experts are deployed through a formal diplomacy programme to flood-prone and water-scarce countries across Africa, Asia, and Latin America. The Delta Works and the Dutch approach to integrated water management serve as reference models, building lasting technical and political relationships."
 HOL_gateway_to_europe: "Gateway to Europe"
 HOL_gateway_to_europe_desc: "Rotterdam is Europe's largest port and Schiphol one of its premier aviation hubs. The Netherlands leverages this logistical centrality as a diplomatic asset, hosting trade missions and positioning Dutch infrastructure as a preferred entry point for partners seeking access to European markets."
 HOL_global_trade_facilitation: "Global Trade Facilitation"
 HOL_global_trade_facilitation_desc: "Dutch diplomats champion open, rules-based trade across western-aligned and non-aligned markets. Bilateral trade facilitation agreements, backed by Rotterdam's throughput capacity and Dutch financial services, extend Dutch commercial and political reach."
 HOL_dutch_soft_power_powerhouse: "Dutch Soft Power Powerhouse"
 HOL_dutch_soft_power_powerhouse_desc: "The Netherlands has systematically cultivated its reputation as a reliable, principled, and capable partner across development, European leadership, and trade. Its soft power now exceeds what its population and military weight would predict, granting persistent political influence in international forums."
 HOL_development_partner_opinion: "Dutch Development Partner"
 HOL_water_partnership_opinion: "Dutch Water Partnership"
 HOL_eu_leadership_opinion: "Dutch EU Leadership"
 HOL_mocro.1.t: "A Narco-State in All But Name?"
 HOL_mocro.1.d: "Cocaine floods through Rotterdam, criminal networks rooted in the city's underworld launder billions, and a string of killings has struck witnesses, lawyers, and a journalist. Commentators openly ask whether the Netherlands is losing ground to organized crime."
 HOL_mocro.1.a: "Confront the threat to the rule of law"
 HOL_mocro.1.b: "The threat is overstated"
 HOL_mocro.2.t: "Record Cocaine Haul in Rotterdam"
 HOL_mocro.2.d: "Customs officers have intercepted tonnes of cocaine hidden in a container of fruit. Investigators suspect corrupt dockworkers, the so-called extractors, guided the shipment through the port."
 HOL_mocro.2.a: "Reinforce customs at the port"
 HOL_mocro.2.b: "The shipment slips through"
 HOL_mocro.3.t: "A Lawyer is Gunned Down"
 HOL_mocro.3.d: "A defence lawyer connected to a major organized-crime trial has been shot dead in broad daylight. The killing is a direct assault on the justice system and has horrified the public."
 HOL_mocro.3.a: "Provide state protection to witnesses"
 HOL_mocro.3.b: "We cannot protect everyone"
 HOL_mocro.4.t: "Encrypted Network Cracked"
 HOL_mocro.4.d: "Police have broken into an encrypted phone network used by criminal organizations, harvesting millions of messages on trafficking, money laundering, and planned killings."
 HOL_mocro.4.a: "Act on the intercepted messages"
 HOL_mocro.4.b: "We lack the manpower to follow every lead"
 HOL_mocro.5.t: "Dirty Money in Bricks and Mortar"
 HOL_mocro.5.d: "Investigators have traced laundered drug profits into real estate, restaurants, and small businesses across the country. Untangling the ownership will be slow and politically sensitive."
 HOL_mocro.5.a: "Seize the assets"
 HOL_mocro.5.b: "Look the other way"
 HOL_mocro.6.t: "A Lost Generation"
 HOL_mocro.6.d: "Recruiters lure teenagers from struggling neighbourhoods into the drug trade with quick money and status, while a violent youth subculture glorifies the gangster life."
 HOL_mocro.6.a: "Fund prevention and youth programmes"
 HOL_mocro.6.b: "Answer with a hard crackdown"
 HOL_mocro.7.t: "Corruption in the Harbour"
 HOL_mocro.7.d: "An internal inquiry has uncovered customs officials, port workers, and police on the payroll of criminal networks. Rooting them out risks paralysing operations at the port."
 HOL_mocro.7.a: "Purge the corrupt officials"
 HOL_mocro.7.b: "There is no proof we can act on"
 HOL_mocro.8.t: "The Marengo Trial Reaches a Verdict"
 HOL_mocro.8.d: "After years of proceedings under extraordinary security, the court has convicted the leaders of the country's most notorious crime syndicate. It is a landmark victory for the rule of law."
 HOL_mocro.8.a: "Justice is served"
 VVD_Leader_Wilders: "§YGeert Wilders§! is £HOL_western_liberal VVD Leader"
 HOL_wilders_vvd_firebrand: "Media Firebrand"
 HOL_wilders_vvd_firebrand_desc: "His relentless presence in the press and parliament keeps rivals on the defensive and hardens the party against outside pressure."
 HOL_voice_of_the_discontented: "Voice of the Discontented"
 HOL_voice_of_the_discontented_desc: "He speaks for the voters others ignore, binding them to the party while shielding the country from foreign meddling."
 HOL_asylum_clampdown: "Asylum Clampdown"
 HOL_asylum_clampdown_desc: "Tighter entry rules and faster procedures sharply cut new arrivals, easing the strain on housing and the labour market."
 HOL_politics.82.t: "Asylum Stop"
 HOL_politics.82.d: "Reception centres are overflowing and the public demands action. Wilders presses for the harshest possible answer to the asylum influx."
 HOL_politics.82.a: "Impose a strict legal cap"
 HOL_politics.82.b: "Order mass deportations"
 HOL_politics.83.t: "The Integration Debate"
 HOL_politics.83.d: "Wilders forces a national argument over Islam, integration, and Dutch identity. The party must decide how far to push."
 HOL_politics.83.a: "Mandate assimilation courses"
 HOL_politics.83.b: "Defend free speech and confront"
 HOL_politics.84.t: "Embassy to Jerusalem"
 HOL_politics.84.d: "A fierce friend of Israel, Wilders urges the government to recognise Jerusalem and move the Dutch embassy there. Washington would applaud, but capitals across the region warn of consequences."
 HOL_politics.84.a: "Move the embassy to Jerusalem"
 HOL_politics.84.b: "Keep the embassy in Tel Aviv"