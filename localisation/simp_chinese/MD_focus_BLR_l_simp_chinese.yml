 belarus_export.13.t: "与佩伦公司的合同"
 belarus_export.13.d: "白俄罗斯公司佩伦专门从事电子产品，准备为反坦克导弹提供制导装置。我们会同意这份合同吗？"
 belarus_export.13.a: "当然，一笔很好的交易。"
 belarus_export.13.b: "不，我们拒绝他们的交易。"
