 UN.300.t: "Lost §YEducational, Scientific, and Cultural Organization§! §GSubsidies§!"
 UN.300.d: "Following the yearly budget review by the §YEducational, Scientific, and Cultural Organization§! Budget Committee, it was determined that we no longer meet the requirements to receive §YEducational, Scientific, and Cultural Organization§! §GSubsidies§!. As a result, we no longer have access to the subsidy program. We may apply again in the future if we meet the program requirements."
 UN.300.a: "Okay"
