 SOV.Neutral_Communism_alty_desc: "ポピュリスト社会主義 ｰ 左翼戦線（ロシア語ローマ字表記：Levyy Front）\n\n左翼戦線は、ロシアにおける社会主義建設を支持する左翼組織の広範な連合体である。同組織は主流政党とも協力し、活動家運動を展開している。"
 SOV.neutral_Social_1_desc: "進歩自由主義 ｰ 新しい人々（ロシア語ローマ字表記：Novyye Lyudi）\n\n新人民は、実業家でありファベルリック社の創設者であるアレクセイ・ネチャエフによって設立された政党である。同党は市場改革、表現の自由、行政のデジタル化を提唱し、電子民主主義の理念を支持している。"
 SOV.Neutral_Muslim_Brotherhood_desc: "イスラム行動主義 ｰ ロシア・ムスリム全国組織（ロシア語ローマ字表記：Natsyonalnaya Organizatsyya Russkih Musulman）\n\n ロシア・ムスリムは、イスラム教を信仰するロシア系民族の利益を代表する宗教組織である。また、ロシア人およびその他の先住民族の間で、イスラム教とその価値観の平和的な普及を提唱している。"
 SLV.liberalism_icon_Positive_Slovenia: "£SLV_Positive_Slovenia"
 BRA.conservatism_2000: "£BRA_conservatism (PFL) 自由戦線党"
 BRA.conservatism_2000_desc: "自由保守主義 - 自由戦線党（ポルトガル語：Partido da Frente Liberal, PFL）\n\n自由戦線党は、現在は解散した民主社会党からの分裂により結成された。民主社会党は、1960年代から1980年代の軍事独裁政権下で与党であった国民刷新同盟の後継政党として広く知られている。この間接的な繋がりにより、自由戦線党は軍事独裁政権下の旧軍事政党の自然な後継者として位置づけられ、社会保守主義を掲げつつ市場自由主義経済政策を堅持している。同党は自由放任主義的資本主義と人権・民主主義の行使を強く主張する。"
 BRA.conservatism_2007: "£BRA_conservatism (DEM) 民主党"
 BRA.conservatism_2007_desc: "自由保守主義 - 民主党（ポルトガル語：Democratas, DEM）\n\n民主党はブラジルの中道右派政党である。同党は、1964年から1985年まで与党であった国民刷新同盟の後継政党である、民主社会党からの離脱派により、1985年に自由戦線党として設立され、2007年に現在の名称に変更した。当初の名称は、国際的な自由主義政党との連携ではなく、自由市場政策への支持を反映したものであった。その後同党は、キリスト教民主主義政党国際連盟および保守政党国際連合に加盟した。"
 ISR.conservative_alt2: "£ISR_liberalism_alt1 カディマ"
 ISR.conservative_alt2_desc: "（シオニスト自由主義） - §4カディマ§!（ヘブライ語ローマ字表記：Kadima、前進）\n\nカディマはイスラエルの中道・自由主義政党である。当初は、分離計画（パレスチナ領土からのイスラエル入植地撤去と、将来のパレスチナ国家との国境画定）を実行する自由を得るために創設された。"
 ISR.conservative_alt2_icon: "£ISR_liberalism_alt1"
 ISR.liberalism_alt7: "£ISR_liberalism_alt7 新たな希望"
 ISR.liberalism_alt7_desc: "（国家自由主義） - §2新たな希望§!（ヘブライ語ローマ字表記：Tikva Hadasha）\n\n新たな希望はイスラエルの中道右派から右派による国家自由主義政党である。1998年まで検事総長補佐を務め、その後に国家検事補佐を務めた元リクード党員、ギドン・サールによって結党された。"
 ISR.liberalism_alt7_icon: "£ISR_liberalism_alt7"
 ISR.socialism_alt: "£ISR_democrats 民主党 - 労働派"
 ISR.socialism_alt_desc: "（社会民主主義） - §4民主党§! - §t労働派§!（ヘブライ語ローマ字表記：HaDemokratim - Avoda）\n\n民主党は、イスラエルの社会民主主義政党である。同党は2024年、労働党とメレツの合併により設立された。労働シオニズムの伝統を継承し、福祉国家と労働組合との連携を支持する政党として、民主党はイスラエル・パレスチナ和平プロセス支援、現実的な外交政策、社会民主主義的経済政策を推進してきた。"
 ISR.socialism_alt_icon: "£ISR_democrats"
 ISR.Neutral_conservatism_bibi: "£ISR_conservatism リクード - §2ネタニヤフ派§!"
 ISR.Neutral_conservatism_bibi_desc: "（保守ポピュリズム） - §2リクード§!（ヘブライ語ローマ字表記：Likud、団結）\n\nリクードは1973年、メナヘム・ベギンとアリエル・シャロンによって、複数の右派政党との連合により設立された。1977年の選挙におけるリクードの圧勝は、同国政治史における重大な転換点となり、左派が初めて政権を失ったことを示した。さらに、イスラエルにおいて右派政党が得票率で過半数を獲得した初めての事例でもあった。"
 ISR.Neutral_conservatism_bibi_icon: "£ISR_conservatism"
 ISR.neutral_democrats: "£ISR_democrats 民主党 - メレツ"
 ISR.neutral_democrats_desc: "（社会進歩主義） - §4民主党§! - §7メレツ§!（ヘブライ語ローマ字表記：HaDemokratim - Meretz）\n\n民主党は、イスラエルの社会民主主義政党である。同党は2024年、労働党とメレツの合併により設立された。労働シオニズムの伝統を継承し、福祉国家と労働組合との連携を支持する政党として、民主党はイスラエル・パレスチナ和平プロセス支援、現実的な外交政策、社会民主主義的経済政策を推進してきた。"
 ISR.neutral_democrats_icon: "£ISR_neutral_Social"
