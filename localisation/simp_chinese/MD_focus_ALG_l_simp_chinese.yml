 alg_deep_state.202.t: "共和国危在旦夕"
 alg_deep_state.202.d: "抵抗军事接管的尝试已经失败。武装的忠诚派与军事单位在街头爆发冲突。国家正濒临全面内战的边缘。此刻作出的决定将决定阿尔及利亚能否作为一个统一国家存续下去。"
 alg_deep_state.202.a: "让冲突顺其自然发展"
 alg_deep_state.202.b: "趁为时未晚，进行谈判"
 alg_civil_war_erupts_tt: "政治危机已演变为公开的武装冲突。社会秩序崩溃，国家正滑向内战的深渊。"
 alg_civil_war_averted_tt: "经过痛苦的妥协，最坏的情况得以避免。军方保留了重要影响力，但全面内战暂时被阻止——至少目前如此。"
 ALG_victims_compensated: "受害者已获赔偿"
 ALG_victims_recognized: "受害者得到承认"
 ALG_victims_ignored: "受害者遭到忽视"
