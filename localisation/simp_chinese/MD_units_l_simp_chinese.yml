 light_inf_hq: "轻步兵指挥部"
 light_inf_hq_desc: "轻步兵和摩托化步兵指挥部单位"
 helo_hq: "直升机指挥部"
 helo_hq_desc: "直升机指挥部单位"
 group_light_bat_title: "缩编的单位"
 group_light_bat_title_desc: "缩编的作战单位，旨在倍增兵力，能力有所降低，但训练时间和成本也有所降低。"
