 SOV_jreci_swiss_tooltip: "Wszystko £text_icon_jreci §0Kapłani egipscy§! w §Y[SWI.GetNameWithFlag]§! zostaną znalezione i zniszczone! §tNikt się przed nami nie ukryje§!.\n"
