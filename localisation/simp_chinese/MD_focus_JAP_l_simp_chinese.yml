 JAP_choice: "政治重启"
 JAP_choice_desc: "在长期停滞和体制疲劳的背景下，民众对政治的信任逐渐动摇，而改革的迫切需求却与日俱增。这个国家要想向前发展，首先必须明确治理方向，并建立决策框架。"
 JAP_left: "日本左翼"
 JAP_left_desc: "政治的目的不仅在于经济增长，更在于保障人民的生计和尊严。我们将确保政治透明，严格监督当权者，增强劳动者的议价能力，完善社会保障体系，缩小不平等和不安全感。我们将秉持不漠视人权的治理理念，推进向可持续能源的转型，以此重建日本社会。"
 JAP_left_TT: "§Y你可以大幅提高某个左翼政党的支持率！\n但是，如果其为执政党，增幅则会很小。§!"
 JAP_information_disclosure: "加强信息披露"
 JAP_information_disclosure_desc: "为重建公众对政治和公共管理的信任，我们将全面推进信息公开，加强官方文件的编制、保存和发布。这将切断腐败和勾结的滋生土壤，提高政策决策的透明度，并为推进改革创造更有利的条件。"
 JAP_left_party_TT: "需要其中之一：\n§Y$JAP.liberalism$§!正在执政。\n§Y$JAP.liberalism_alt$§!正在执政。\n§Y$JAP.neutral_Social$§!正在执政。\n§Y$JAP.Neutral_Communism$§!正在执政。\n§Y$JAP.anarchist_communism$§!正在执政。\n"
 JAP_management_documents: "严格管理官方文件"
 JAP_management_documents_desc: "我们将按照统一标准整理和保存公共机构保存的政策制定记录、行政程序历史记录和文件，同时加强管理体系建设。通过防止记录散落和处理不当，提高可核查性和行政连续性，我们旨在提升政府运作的可靠性和实际效率。"
 JAP_digital_archiving: "官方文件的数字化存档"
 JAP_digital_archiving_desc: "我们将把官方档案数字化并集中管理，以简化检索、共享和保存流程。通过摒弃以纸质文件为中心的做法，我们将减轻行政负担和管理成本，并控制政府支出。"
 JAP_independent_audits: "全面独立审计"
 JAP_independent_audits_desc: "我们将确保审计机构的完全独立性，建立不受政治或官僚机构干预的监督体系。通过及早发现勾结和不当行为，我们将推进反腐败工作；通过重建公众对政治的信任，我们也将增强政策落实的动力。"
 JAP_eliminating_amakudari: "根除“空降”现象"
 JAP_eliminating_amakudari_desc: "我们将终结官僚与企业勾结的“空降”情况，并严厉打击根深蒂固的既得利益集团。通过提高人事任命的透明度，加强竞争，我们将遏制腐败，同时降低效率低下，提高生产力。"
 JAP_disclosure_of_political_funding: "全面披露政治资金"
 JAP_disclosure_of_political_funding_desc: "我们将全面公开政治资金流动情况，使捐款人和支出清晰可见。这将减少不透明资金流入政治领域的空间，推进反腐败工作，同时增强抵御外国势力影响力行动的能力。"
 JAP_protecting_human_rights: "保护人权"
 JAP_protecting_human_rights_desc: "我们将把维护每个人的尊严和权利置于治理的核心位置。通过纠正歧视和不公平待遇，建设一个人民可以安心生活的社会，我们将加强国内凝聚力和稳定性。"
 JAP_same_sex_partnerships: "同性伴侣关系合法化"
 JAP_same_sex_partnerships_desc: "我们将从法律上承认同性伴侣关系，并建立一套制度，以减少他们在医疗同意、住房和继承等领域面临的日常劣势。通过尊重多元化的家庭形式，并缓和社会分化，我们将增强国内稳定。"
 JAP_employment_disabilities: "扩大残疾人就业机会"
 JAP_employment_disabilities_desc: "我们将创造一个让残障人士都能工作的环境，并扩大就业支持和工作场所的合理便利措施。通过拓宽就业机会，我们将增强劳动力；通过促进社会参与，我们也将为国内稳定做出贡献。"
 JAP_prevent_domestic_violence: "预防家庭暴力的措施"
 JAP_prevent_domestic_violence_desc: "我们将加强对家庭暴力的预防和早期发现，扩大咨询服务和保护支持。通过打破虐待循环，减少家庭中的不安全感和暴力，我们将增强社会稳定。"
 JAP_immigrants_and_refugees: "加强对移民和难民的保护"
 JAP_immigrants_and_refugees_desc: "我们将加强对移民和难民的接纳和保护，建立公平的甄别、生活保障和融入援助体系。在履行人道主义责任的同时，我们也将鼓励劳动力流入，并引导其为社会注入更大的活力。"
 JAP_protecting_labor_union: "保护工会权利"
 JAP_protecting_labor_union_desc: "我们将明确保障工会的权益，并创造一个能够妥善开展集体谈判和劳资协商的环境。通过在制度和企业管理中反映员工的声音，我们将促进就业和工作条件的稳定。"
 JAP_subcontracto: "遏制分包商欺凌行为"
 JAP_subcontracto_desc: "我们将严厉打击强加给分包商的不公平降价要求、拖欠货款和单方面变更合同条款等行为，营造公平的交易环境。通过保护中小企业的收入基础，我们将增强整个供应链的健康度，为社会稳定作出贡献。"
 JAP_pressure_wage_increases: "工资上涨压力"
 JAP_pressure_wage_increases_desc: "我们将鼓励企业提高工资，增加家庭收入。通过支持消费、缓解日常生活中的不安全感，我们将增强社会稳定，力争形成经济良性循环。"
 JAP_regulation_temporary_agency_work: "加强对临时机构工作的监管"
 JAP_regulation_temporary_agency_work_desc: "我们将遏制滥用临时工现象，促进就业稳定，改善劳动条件。我们将优先考虑安全、长期的劳动环境，而非短期效率，从而增强社会稳定性。"
 JAP_ban_non_regular_employment: "禁止非正式就业"
 JAP_ban_non_regular_employment_desc: "我们将改革依赖非正式就业的劳动制度，过渡到人人都能获得稳定就业和公平待遇的制度。通过减少日常生活中的不安全感和遏制社会分裂，我们将增强国家稳定。"
 JAP_redistribution: "优先考虑再分配"
 JAP_redistribution_desc: "我们将转向优先纠正收入不平等和经济不安全状况的政策，更加慷慨地向需要帮助的人分配资源。通过再分配，我们将遏制社会分化，增强人民的安全感，并致力于实现稳定的治理。"
 JAP_reducing_medical_costs: "降低自付医疗费用"
 JAP_reducing_medical_costs_desc: "我们将降低民众自付医疗费用，建立民众能够毫不犹豫地获得必要治疗的体系。通过减轻家庭的经济压力，遏制医疗差距的扩大，我们将增强社会稳定。"
 JAP_care_workers: "提升护理人员薪酬及待遇"
 JAP_care_workers_desc: "我们将提高护理人员的工资和工作条件，并促进护理人员的招聘和留任。通过加强护理的连续性，减轻家庭负担，并支持劳动参与，我们将为社会稳定做出贡献。"
 JAP_housing_support: "扩大住房支持"
 JAP_housing_support_desc: "我们将扩大住房支持力度，减轻租房负担，帮助民众获得稳定的住房。通过缓解住房不安全状况，保障民众日常生活稳定，我们将遏制社会分裂，增强国内稳定。"
 JAP_student_loans: "减轻学生贷款负担"
 JAP_student_loans_desc: "我们将减轻学生贷款的偿还负担，降低高等教育和技能提升的门槛。通过推进人力资本发展，将其视为对未来的投资，我们将支持科研和技术进步。"
 JAP_focusing_renewable_energy: "关注可再生能源"
 JAP_focusing_renewable_energy_desc: "我们将把扩大可再生能源利用作为国家优先事项，加快技术研发和示范投资。通过夯实能源转型基础，我们将保障未来能源供应稳定，提升产业竞争力。"
 JAP_renewable_energy_feed_in_tariffs: "加强对可再生能源的上网电价补贴"
 JAP_renewable_energy_feed_in_tariffs_desc: "我们将加强可再生能源上网电价补贴机制，提高投资可预测性，加快部署速度。这将有助于扩大可再生能源供电规模，并为能源转型奠定坚实基础。"
 JAP_energy_efficiency: "加强能源效率标准"
 JAP_energy_efficiency_desc: "我们将加强能源效率标准，促进住房和家用电器提高能效。通过减少不必要的电力消耗，我们将减轻家庭乃至整个社会的能源负担。"
 JAP_nuclear_phaseout: "宣布终止核能"
 JAP_nuclear_phaseout_desc: "我们将明确承诺不依赖核能，并采取无核国家的立场。作为一个地震多发国家，我们高度重视安全问题，并将推进以可再生能源为中心的电力系统转型，力求实现可持续能源政策。"
 JAP_leading_disarmament: "领导裁军外交"
 JAP_leading_disarmament_desc: "我们将把裁军和缓和局势作为外交政策的支柱，并通过对话和建立信任寻求地区稳定。我们将优先考虑不依赖武力的解决方案，并努力改善与其他国家的关系。"
 JAP_restricting_arms_exports: "限制武器出口"
 JAP_restricting_arms_exports_desc: "我们将限制武器出口，并明确表明我们采取的外交立场不太可能加剧军事紧张局势。通过优先推进裁军和建立信任，我们将促进对话，以实现地区稳定。"
 JAP_principle_of_no_armed_forces: "重申不使用军事力量的原则"
 JAP_principle_of_no_armed_forces_desc: "我们将重申不维持军事力量的原则，明确表明不依赖军事力量的治理立场。我们将把和平主义置于政策核心，强调通过外交和国际合作维护安全。"
 JAP_abrogating_us_japan_security_treaty: "废除美日安保条约"
 JAP_abrogating_us_japan_security_treaty_desc: "我们将退出日美安全框架，转向不依赖美国的独立自主的安全政策。这将扩大我国外交政策的自由度，更清晰地维护我国主权和独立。"
 JAP_dissolving_sdf: "解散自卫队"
 JAP_dissolving_sdf_desc: "我们将解散自卫队，转向不依赖军事力量的治理模式。通过将原先用于国防的资源和精力转移到民用领域，我们将优先加强产业和民生基础建设，加快国内发展。"
 JAP_army_delete_TT: "§R所有陆军部队将被移除！§!"
 JAP_right: "日本右翼"
 JAP_right_desc: "我们强调国家能力建设和社会秩序，致力于加强公共安全、危机应对，并奉行以国家利益为核心的外交和安全政策。我们力求通过监管改革和振兴营商活动促进经济增长，并致力于在传统和集体价值观的基础上重建国家。"
 JAP_right_TT: "§Y你可以大幅提高某个右翼政党的支持率！\n但是，如果是执政党执政，增幅将依然很小。§!"
 JAP_strengthen_military_power: "加强军事力量的政策"
 JAP_strengthen_military_power_desc: "鉴于安全环境的变化，我们将明确把加强国防态势确立为一项国家政策。通过增强威慑力，我们将防患于未然，展现我们维护公共安全和国家主权的决心。"
 JAP_right_party_TT: "需要其中之一：\n§Y$JAP.conservatism$§!正在执政。\n§Y$JAP.socialism$§!正在执政。\n§Y$JAP.Neutral_conservatism$§!正在执政。\n§Y$JAP.Neutral_conservatism2$§!正在执政。\n§Y$JAP.Neutral_conservatism3$§!正在执政。\n§Y$JAP.Neutral_conservatism4$§!正在执政。\n§Y$JAP.Neutral_Libertarian$§!正在执政。\n§Y$JAP.Nat_Populism$§!正在执政。\n"
 JAP_allow_overseas_deployment: "允许向海外部署自卫队"
 JAP_allow_overseas_deployment_desc: "考虑到国际形势和与盟友的合作，我们将明确阐述允许自卫队海外部署的政策。通过参与国际任务，我们将加强威慑和影响力，更加积极主动地维护国家利益和安全。"
 JAP_international_missions: "国际特派任务法律框架"
 JAP_international_missions_desc: "我们将建立参与国际任务的法律基础和程序，构建自卫队能够在统一规则下开展行动的体系。这将减少实地不确定性，并使国际合作的开展更加可靠。"
 JAP_revising_use_weapons: "重估武器使用规则"
 JAP_revising_use_weapons_desc: "我们将重新审查武器使用标准和程序，使其符合国际任务和危机应对的实际情况。通过明确执行任务所需的权限和责任范围，我们将建立一个自卫队能够适当保护自身和他人的体系。"
 JAP_exclusive_defense: "保持完全防御姿态"
 JAP_exclusive_defense_desc: "我们将严格奉行完全防御姿态作为安全政策的指导原则，明确将防御能力的使用限制在防止对我国发动攻击的范围内。在保持威慑力的同时，我们将避免过度扩张军事力量，并展现出不太可能加剧与邻国紧张关系的姿态。"
 JAP_exclusive_defense_TT: "§Y该国策将使权力平衡更接近第2级！§!"
 JAP_collective_self_defense: "集体自卫权政策"
 JAP_collective_self_defense_desc: "鉴于攻击盟友也会直接影响自身安全，我们将明确阐述允许行使集体自卫权的政策。这将增强威慑力，提高联盟的有效性，并构建更加积极主动的安全框架。"
 absolute_majority_popularity_66_TT: "执政联盟的支持率必须超过66%。"
 JAP_prioritizing_order: "秩序优先"
 JAP_prioritizing_order_desc: "我们将把维护社会秩序和公共安全作为治理国家的首要任务。通过重视规则和责任，维护公共安全和行政稳定，我们将重建国家的基础。"
 JAP_strengthen_public_security: "综合公共安全计划"
 JAP_strengthen_public_security_desc: "我们将对公共安全体系进行全面检讨，制定涵盖装备、人员和信息协调的综合方案。通过精简一线运作、提升警务能力，我们将加强犯罪威慑，维护社会稳定。"
 JAP_against_organized_crime: "加强打击有组织犯罪措施"
 JAP_against_organized_crime_desc: "我们将加大力度打击有组织犯罪，推进切断资金来源和提升侦查能力。通过恢复国内公共安全，我们将增强社会稳定，并构建一个不易受外部势力渗透和影响的国家体系。"
 JAP_against_terrorist_financing: "反恐怖主义融资措施"
 JAP_against_terrorist_financing_desc: "我们将严格监控资金流动，全面落实各项制度，切断恐怖组织和极端组织的资金来源。通过加强金融监管部门与调查机构的协调合作，我们将维护国内安全，增强抵御外部影响的能力，同时提升社会稳定。"
 JAP_counter_espionage: "构建反间谍框架"
 JAP_counter_espionage_desc: "我们将加强反情报活动措施，建立保护机密信息和加强监控的机制。通过遏制外部势力渗透和秘密行动，维护国家决策，我们将确保国内稳定。"
 JAP_strengthening_cabinet: "加强内阁权力"
 JAP_strengthening_cabinet_desc: "我们将加强内阁的指挥链和协调职能，提高决策的速度和一致性。通过构建能够迅速应对危机和制定关键政策的体系，我们将强化国家治理中的果断领导。"
 JAP_cabinet_personnel_bureau: "内阁人事局"
 JAP_cabinet_personnel_bureau_desc: "我们将建立一套使内阁能够集中监督人事事务的制度，加强对高层任命的透明度和管控。通过提拔合适的人才担任合适的职位，我们将精简官僚机构的运作，并提升政府的政策执行能力。"
 JAP_breaking_down_bureaucratic_siloing: "打破官僚主义壁垒"
 JAP_breaking_down_bureaucratic_siloing_desc: "我们将改革各部委各自为政的行政体制，加强信息共享和跨部委协调。通过减少重复程序和瓶颈环节，我们将精简公共行政，加快公共投资和项目的落实。"
 JAP_policy_evaluation_and_kpis: "引入政策评估和关键绩效指标"
 JAP_policy_evaluation_and_kpis_desc: "我们将引入评估体系和关键绩效指标，以便用可量化的数据验证政策成效。通过审查低效措施，并将有限资源集中于高效领域，我们将提高行政效率，提升经济生产力。"
 JAP_national_security_council: "建立国家安全委员会"
 JAP_national_security_council_desc: "我们将把安全相关信息和决策权集中到内阁，建立一套能够快速、一致地做出决策的体系。通过加强危机应对能力，并深化与盟友和相关机构的协调，我们将强化威慑力。"
 JAP_emergency_powers: "紧急权力条款"
 JAP_emergency_powers_desc: "为应对重大灾害或武装袭击等突发事件，我们将明确紧急情况下所需的权限和程序。在保持和平时期监督的同时，我们将加快危机应对速度，加强指挥链，确保国家稳定和国防态势。"
 JAP_regulatory_reform: "通过监管改革实现增长"
 JAP_regulatory_reform_desc: "我们将审查相关法规和程序，减轻行政负担，促进商业活动和投资。通过简化新企业创办和设施建设流程，我们将加快经济增长步伐。"
 JAP_postal_privatization: "邮政私有化"
 JAP_postal_privatization_desc: "我们将推进邮政服务的私有化，改革政府主导的体制，以提高公共管理效率。引入市场原则旨在增强商业活动和扩大税基，但这项改革也可能因其优劣而引发强烈反对，并加剧政治冲突。"
 JAP_postal_privatization_TT: "§Y将会触发一个事件，您可以选择是否举行解散议会大选！§!"
 JAP_second_wave_privatization: "私有化第二阶段"
 JAP_second_wave_privatization_desc: "我们将进一步推进私有化改革，重新审视公共部门的作用和公共服务的运作方式。通过减少行政低效，鼓励投资和商业活动，我们将增强经济活力。"
 JAP_special_zones: "国家战略特区"
 JAP_special_zones_desc: "我们将在指定区域制定监管例外政策，大力促进企业准入和新投资。通过突破现有体制壁垒，推进示范项目和商业化进程，我们将加速私营部门活力驱动的增长，振兴地方经济。"
 JAP_expansion_regulatory_reform_zones: "全国改革区"
 JAP_expansion_regulatory_reform_zones_desc: "我们将把特区取得的成果推广到全国，把监管改革从区域性例外转变为全国标准。通过降低准入和投资门槛，我们将鼓励新企业发展，促进全国经济复苏。"
 JAP_new_market_entry: "促进新市场准入"
 JAP_new_market_entry_desc: "我们将降低准入门槛，支持创业和新企业成立。通过促进竞争和创新，我们将提高生产力，并扩大税基。"
 JAP_new_technologies: "欢迎新技术"
 JAP_new_technologies_desc: "我们将积极支持新技术的应用和商业化，加快研发和产业创新。通过培育新兴增长领域，我们将增强国家竞争力。"
 JAP_key_industries_back_home: "关键行业回流"
 JAP_key_industries_back_home_desc: "我们将构建一个能够稳定保障关键产业国内生产的体系，强化供应链，提高重点领域的自主生产能力。通过鼓励国内投资，我们将夯实产业基础，构建一个不易受国际环境变化影响的产业结构。"
 JAP_economic_security: "建立经济安全"
 JAP_economic_security_desc: "我们将审查关键材料和重点行业的供应安排，并管控技术、资本和信息方面的风险，以维护经济安全。这将增强国家自主能力和企业可持续竞争力，从而支持经济稳定增长。"
 JAP_patriotic_education: "爱国主义教育"
 JAP_patriotic_education_desc: "我们将推进注重国家历史、文化和公民责任的教育，增强社会凝聚力和共同规范意识。通过构建不易受外部影响的基础，我们将巩固国内稳定。"
 JAP_fundamentals_of_education: "重新定义教育基础"
 JAP_fundamentals_of_education_desc: "我们将重新审视教育的目标和标准，并将学术能力、基础知识和实践技能的培养重新定义为一项国家政策。通过优先投资教育，我们将加强人力资本发展和研发的基础。"
 JAP_dotoku_education: "道德教育"
 JAP_dotoku_education_desc: "我们将更加重视道德教育，并在学校教育中培养公民意识、责任感和为人处世之道等价值观。通过强化社会规范、深化社区凝聚力，我们将为国内稳定做出贡献。"
 JAP_national_flag_and_anthem: "尊重国旗和国歌"
 JAP_national_flag_and_anthem_desc: "我们将明确表达对国旗和国歌的尊重，增强民族归属感和社会团结。这将有助于在危机时刻巩固凝聚力，并奠定不易受外部影响的基础。"
 JAP_family_policy: "强化家庭政策"
 JAP_family_policy_desc: "我们将尊重家庭价值观，扩大对育儿和日常生活的支持措施。通过营造一个让人们能够安心组建家庭的环境，我们将增强未来人口基础，并为社会稳定做出贡献。"
 JAP_glorious_decade: "迈向辉煌的十年"
 JAP_inflation_target: "明确政策承诺"
 JAP_down_long_term_interest_rates: "降低长期利率"
 JAP_down_long_term_interest_rates_desc: "我们将维持长期利率的低位稳定，降低企业和家庭的融资成本。通过支持投资、资本更新和住房购买，从而提振需求、促进经济增长，我们也将为税收收入的恢复铺平道路。"
 JAP_cash_benefits: "落实家庭福利"
 JAP_cash_benefits_desc: "我们将直接向家庭提供支持，以防止消费下降并支撑经济。通过营造一个即使在高度不确定的情况下人们也能继续日常消费的环境，我们将帮助需求复苏。"
 JAP_public_investment: "持续公共投资"
 JAP_public_investment_desc: "为防止经济下行加剧，我们将继续有计划地进行公共投资，支撑需求。同时，我们将加强物流、防灾和核心生活基础设施建设，营造有利于民营投资流动的环境。"
 JAP_special_inspection_banks: "银行专项检查"
 JAP_special_inspection_banks_desc: "为恢复金融体系的稳健性，我们将对银行资产进行全面审查。通过查明不良贷款的真实情况，杜绝拖延损失和不透明处理，我们将站稳脚跟，遏制信贷焦虑和信贷紧缩的连锁反应。"
 JAP_population_tax_tt: "人口税率为35或更低。"
 JAP_public_capital_injection_banks: "公共资本注入银行"
 JAP_public_capital_injection_banks_desc: "为防止金融不稳定蔓延，我们将加强银行资本基础，维持信贷供应。通过安抚储户和市场的焦虑情绪，确保资金持续流向企业和家庭，我们将避免经济突然恶化。"
 JAP_disposal_non_performing_loans: "处置危险不良贷款"
 JAP_disposal_non_performing_loans_desc: "清除侵蚀金融体系的危险不良贷款，减轻银行资产负债表的负担。"
 JAP_bank_supervision: "加强银行监管"
 JAP_bank_supervision_desc: "我们将不再把检查和纠正措施视为一次性措施，而是永久性地加强监管框架。通过强化信息披露和公司治理，防止风险管理不善和交易不透明现象再次发生，我们将稳定市场对金融体系的信任。"
 JAP_business_assessment: "公平商业评估"
 JAP_business_assessment_desc: "为了准确判断企业的实力和风险，我们将客观评估其盈利能力和未来前景。我们不以维持企业生存或延长其寿命为目的，而是区分哪些领域需要重建，哪些领域需要重组，并为资本和人才流入增长型行业奠定基础。"
 JAP_corporate_debt_restructuring: "企业债务重组"
 JAP_corporate_debt_restructuring_desc: "我们将着手解决过重的债务负担，并确保经济复苏所需的时间和喘息空间。通过摆脱被利息和还款所吞噬的状态，并将资源用于投资、就业和企业转型，我们将打破停滞不前的恶性循环。"
 JAP_support_restructuring_unprofitable_sectors: "优化不盈利单位"
 JAP_support_restructuring_unprofitable_sectors_desc: "我们将为正在进行亏损部门重组的公司提供支持，以确保重组顺利进行。在尽量减少就业岗位骤减和对当地社区造成冲击的同时，我们将鼓励企业聚焦战略，并帮助其加速向可持续发展模式转型。"
 JAP_m_and_a: "并购与业务整合"
 JAP_m_and_a_desc: "我们将鼓励企业兼并和重组，以消除重复投资和产能过剩。通过规模经济和管理资源的集中，我们将提高生产率，加强研发，以期恢复竞争力。"
 JAP_corporate_revitalization: "企业复兴"
 JAP_corporate_revitalization_desc: "我们将把重组推向新的阶段，从财务和运营层面重建企业基础。通过解决企业负担过重和效率低下的问题，使企业能够加大投资、招聘和提高工资，我们将巩固私营部门主导的复苏。"
 JAP_expectations_escaping_deflation: "恢复增长预期"
 JAP_expectations_escaping_deflation_desc: "通过解决不良贷款和解除过高债务，我们将把经济重心从“防御”转向“进攻”。如果企业恢复投资、研发和人员投入，家庭对未来前景重拾信心，生产率和工资的良性循环就更有可能形成。我们将为全面重启竞争力复苏奠定基础。"
 JAP_public_private_calls_wage_increases: "公私部门呼吁加薪"
 JAP_public_private_calls_wage_increases_desc: "政府将牵头与企业界合作，扩大涨薪势头。通过将企业利润增长与提高工资挂钩，增强家庭购买力，我们将支持需求复苏和物价稳定。"
 JAP_phased_increases_to_the_minimum_wage: "逐步提高最低工资"
 JAP_phased_increases_to_the_minimum_wage_desc: "我们将分阶段提高最低工资标准，以增加劳动人民的收入。通过增强低收入家庭的购买力，支持国内需求的复苏，并创造一个工资增长能够扩散的环境。"
 JAP_promoting_labor_mobility: "促进劳动力流动"
 JAP_promoting_labor_mobility_desc: "我们将创造条件，促进人才向成长性行业流动，推动劳动力资源优化配置。通过降低换岗再就业门槛、支持技能提升，驱动产业更新换代，提升劳动生产率。"
 JAP_competition_service_sector: "促进服务业竞争"
 JAP_competition_service_sector_desc: "我们将鼓励服务业准入与竞争，解决导致经济停滞的低效与价格僵化问题。通过审视现有法规与固化的行业惯例，优化营商环境，推动市场向优质服务更易被选择的模式转型。"
 JAP_improving_domestic_service_sector: "改善国内服务业环境"
 JAP_improving_domestic_service_sector_desc: "我们将创造条件，使国内服务业能够发展壮大，并提升经济吸纳需求的能力。通过审视那些给一线运营带来负担的流程与实践，并培育一个支持投资和人力资源发展的环境，为国内需求的持续复苏贡献力量。"
 JAP_international_liberalization_service_sector: "服务业对外开放"
 JAP_international_liberalization_service_sector_desc: "我们将开放服务业市场，引入国际竞争与先进经验。通过鼓励外资企业进入并遵循国际标准，从而扩大用户选择，打破国内市场的封闭性，推动行业焕发活力。"
 JAP_revitalization_economy: "重振日本经济"
 JAP_revitalization_economy_desc: "我们推进了金融体系和企业部门的重建，制定了恢复需求和提高工资水平的路线图。通过逐一消除经济停滞的根源，营造一个让家庭和企业对未来看得更清晰的环境，我们将巩固经济增长势头。"
 JAP_work_style_reform: "工作方式改革"
 JAP_work_style_reform_desc: "我们将首先纠正过长的工作时间，并创造一个人们可以选择多样化工作方式的环境。通过支持就业稳定和工作生活平衡，我们将减轻基层负担，并为人们持续贡献力量和蓬勃发展奠定基础。"
 JAP_cap_on_overtime_hours: "设定加班时间限制"
 JAP_cap_on_overtime_hours_desc: "为遏制过长工时，我们将明确规定加班时间上限。通过减少健康危害和过度劳累的风险，并确保合理的劳动管理，我们将把工作方式的改进制度化。"
 JAP_mandating_paid_leave: "强制带薪休假"
 JAP_mandating_paid_leave_desc: "我们将建立一套制度化的休假制度，使员工更容易请假，并要求员工休最低带薪假天数。通过确保员工获得充足的休息，减少身心健康问题和人员流动，我们将提高员工留任率，并推动更可持续的工作方式。"
 JAP_digitalization_management: "发展数字化考勤系统"
 JAP_digitalization_management_desc: "我们将推行工时管理的数字化，使工作时间的追踪与管理更加精确。通过减少基层行政负担并确保全面遵守法规，建立制度体系防止过度工作被忽视。"
 JAP_equal_pay_for_equal_work: "同工同酬"
 JAP_equal_pay_for_equal_work_desc: "我们将纠正基于雇佣身份的不合理待遇差异，确保同工同酬同条件。通过增强劳动者的公平感、提升人才留用与招聘吸引力，同时缩小正式与非正式雇佣之间的鸿沟，构建更稳定的就业环境。"
 JAP_minimum_rest: "最短班次间隔"
 JAP_minimum_rest_desc: "我们将确保在两个工作日之间设定固定的休息时间，以防止因连续工作导致疲劳累积。通过保障睡眠与恢复的时间，减少健康问题和失误，建立起可持续的工作安排。"
 JAP_flexible_working: "扩展弹性工作制"
 JAP_flexible_working_desc: "我们将增加工作时间的灵活性，让人们更容易选择适合自身情况的工作安排。通过缓解通勤拥堵，支持工作与育儿、照护之间的平衡，建设人们能够持续工作的环境。"
 JAP_ideal_working_styles: "理想的工作方式"
 JAP_ideal_working_styles_desc: "我们建立了不依赖长时间加班的工作制度，并营造了让不同境遇的员工都能安心持续工作的环境。通过推行\"需要时正常休假、必要时弹性办公\"的机制，我们将使工作与生活的平衡成为常态。"
 JAP_basic_policy_declining_birthrate_society: "少子化对策纲要"
 JAP_basic_policy_declining_birthrate_society_desc: "我们将把应对少子化问题定位为国家首要任务，全面整合支持育儿与日常生活的政策体系。营造让家庭能够规划未来的社会环境，促进工作与养育责任的平衡，为提升生育率奠定坚实基础。"
 JAP_zero_waiting: "儿童保育零等待计划"
 JAP_zero_waiting_desc: "我们将扩大托育服务容量，建立一套能让有需要的家庭可靠获得托育服务的体系。保障更多托育从业人员和完善设施，减少阻碍父母平衡育儿与工作的障碍。"
 JAP_increasing_childbirth_allowance: "提高育儿津贴"
 JAP_increasing_childbirth_allowance_desc: "我们将减轻生育相关的初期成本负担，营造让人们能够安心迎接新生命的环境。通过缓解经济压力、降低生育选择门槛，为提升生育率提供有力支持。"
 JAP_free_early_childhood_education: "免费早教与托儿服务"
 JAP_free_early_childhood_education_desc: "我们将减轻幼儿教育和托育的经济负担，支持育儿家庭的家庭预算。营造防止教育机会差距扩大的环境，并促进工作与育儿的平衡，助力构建一个生育更轻松的社会。"
 JAP_parental_leave: "推广育儿假"
 JAP_parental_leave_desc: "我们将营造一个更易于休产假的环境，并拓展产后继续工作的选择。通过加强对这些制度的职场理解与运行机制，构建男女共同参与育儿的社会框架，从而分担家庭养育责任，缓解生育焦虑。"
 JAP_child_allowances: "扩大育儿津贴"
 JAP_child_allowances_desc: "为了降低养育子女的持续开销，我们将扩大育儿津贴的发放范围。通过使家庭财务更具可预测性，并缓解对教育和日常生活的担忧，我们将支持人们选择生育子女。"
 JAP_fertility_treatment: "生育医疗保险覆盖"
 JAP_fertility_treatment_desc: "我们将减轻生育治疗的经济负担，为有需要的人群创造更易获得治疗的环境。通过降低费用门槛，拓宽通向怀孕与生育的选择路径，帮助人们更轻松地实现生育愿望。"
 JAP_raising_children_is_easier: "儿童友好型社会"
 JAP_raising_children_is_easier_desc: "我们建立了覆盖全社会的育儿支持体系，并拓展了让人们能够安心组建家庭的环境。通过将托育、教育和经济支持相结合，使工作与育儿平衡成为常态，我们将缓解人们对未来的忧虑，助力提升生育率。"
 JAP_save_ice_age_generation: "拯救就业冰河一代！"
 JAP_save_ice_age_generation_desc: "我们将把就业冰河一代面临的不稳定就业、低工资和技能发展滞后问题，作为全社会共同应对的挑战。通过保障就业机会、开辟二次发展路径，并重建人们能够获得稳定生活、规划未来的社会环境，防止社会分裂与发展停滞的长期化。"
 JAP_hello_work: "改造Hello Work"
 JAP_hello_work_desc: "我们将把就业安置服务从一个\"以防万一的选择\"转变为一个支持人们实现再就业的实用机构。通过提高工作质量的透明度并提升匹配精准度，建立一个让合适的工作和支持能够触达所需人群的体系。"
 JAP_expanding_social_insurance_coverage: "扩大社会保险网"
 JAP_expanding_social_insurance_coverage_desc: "我们将扩大参保范围，让需要社会保险的人无论以何种方式工作都能参保。通过减少制度空白，缓解人们在医疗、养老和就业方面的后顾之忧，我们将稳定那些更可能集中在非正规就业群体的生活基础。"
 JAP_vocational_training: "扩大职业培训"
 JAP_vocational_training_desc: "我们将拓宽职业培训机会，让人们掌握必要的技能，为重新出发奠定基础。通过支持向高需求领域转型，并将再培训与就业挂钩，我们将为打破长期停滞局面打下坚实基础。"
 JAP_digital_reskilling: "数字技能再培训方案"
 JAP_digital_reskilling_desc: "我们将提供一套完整的支持方案，助力学员实现阶梯式再学习——从适用于数字领域的基础技能，到具备就业竞争力的实践能力。通过减轻学习负担，并建立直通就业的培训与认证体系，我们将为包括零经验者在内的更多人群拓宽重启职业生涯的道路。"
 JAP_converting_regular_employment: "企业正规化补贴"
 JAP_converting_regular_employment_desc: "我们将支持那些促进非正规就业向正规就业转变的企业，以增加稳定的就业机会。通过打破固化的就业模式，拓展人们能够规划职业生涯与人生的环境，我们将防止就业冰河世代的不稳定状况长期化。"
 JAP_job_change_market: "改善中年就业市场"
 JAP_job_change_market_desc: "我们将建立一个不依赖年龄或背景的中途招聘和转职体系，为重新开始提供更多机会。通过提高招聘信息和评估标准的透明度，并创造一个能够正确认可经验和技能的环境，我们将促进更顺畅的劳动力流动。"
 JAP_rent_housing_support: "租金补贴与住房支持"
 JAP_rent_housing_support_desc: "我们将提供支持以减少住房不稳定性，使其不再阻碍人们选择就业或搬迁。通过减轻租金负担并加强保障住房的机制，我们将帮助人们重建生活，开启新的起点。"
 JAP_support_marriage_and_starting_a_new: "婚姻与家庭支持"
 JAP_support_marriage_and_starting_a_new_desc: "我们将减轻结婚或开始同居所涉及的初期成本负担，并创造一个更容易开始新生活的环境。通过降低与住房、家庭财务和行政手续相关的障碍，并减少对未来规划的焦虑，我们将扩大组建家庭的选择范围。"
 JAP_reviving_lost_generation: "重振失落的一代"
 JAP_reviving_lost_generation_desc: "我们致力于打破不稳定就业的固化现象，通过将再培训、再就业与生活基础重建作为一体化方案推进。通过确保就业和工作条件，让就业冰河世代能够规划未来，并营造一个他们能够朝着组建家庭和积累资产迈出步伐的环境，我们将克服长期的社会分化。"
 JAP_industries: "日本全产业链"
 JAP_industries_desc: "从扎根本土的农林渔业，到制造业、服务业及尖端科技领域，我们将全面激发日本全产业链优势。在保障国内就业与供应链韧性的同时，统筹出口竞争力与新兴增长领域投资，推动产业根基迈向新时代。"
 JAP_rice_and_sake: "大米与清酒"
 JAP_rice_and_sake_desc: "大米是日本人民的主食，是支撑餐桌与乡村社区的基石。而以大米酿造的日本清酒，则凝聚了鲜明独特的“日本”特质，值得在国内外自豪地分享——其风味个性由各地风土水源塑造，更凝聚着酿酒仙人的精湛技艺。"
 JAP_wagyu: "和牛"
 JAP_wagyu_desc: "和牛是日本标志性的高级食材之一，以其细腻的大理石纹理和浓郁风味而闻名。依托在畜牧技术与品质管控方面的优势，我们将持续支持日本饮食文化的发展，同时将其打造为能够以品牌力量开拓海外需求的产业。"
 JAP_seafood: "海国海鲜"
 JAP_seafood_desc: "作为一个岛国，日本与海洋共生。由风味各异的水域孕育出的海产，是从日常饮食到地方产业的重要支撑资源，同时也是塑造日本饮食文化的一大特色。"
 JAP_automobiles: "日本汽车工业"
 JAP_automobiles_desc: "日本汽车工业凭借高品质与可靠性，以及深厚且富有韧性的零部件供应网络得以发展壮大。丰田、本田、日产、马自达、斯巴鲁、铃木、三菱汽车等制造商构成了支撑国内就业与出口的核心力量，同时致力于适应新一代技术并保持竞争力。"
 JAP_japanese_brand: "打造日本品牌"
 JAP_japanese_brand_desc: "基于我们在品质与信任方面的优势，我们将持续以\"日本品牌\"展现产品与服务的价值。通过精进产地、技术、设计、安全等要素，并清晰传达我们在国内外被选择的理由，我们将构建不依赖价格竞争的竞争力。"
 JAP_semiconductor: "半导体与元器件"
 JAP_semiconductor_desc: "半导体与电子元器件是支撑所有产业的战略性领域。我们将发挥在材料、制造设备、零部件等领域的优势，通过强化研发与供应能力，为日本的产业基础与技术竞争力提供支撑。"
 JAP_machinery_that_supports_manufacturing: "制造业之基石"
 JAP_machinery_that_supports_manufacturing_desc: "日本制造业的根本支撑在于加工、组装、检测所需的精密机械。通过不断精进机床与生产设备的技术，持续制造符合现场需求的机械设备，我们将为众多产业的质量与供应能力提供坚实后盾。"
 JAP_small_factory_craftsmanship: "保护工匠精神"
 JAP_small_factory_craftsmanship_desc: "小作坊中蕴含的工匠精神，如机械加工、模具制造和表面处理，是支撑日本制造业的基石。通过确保新一代技术工人的培养，促进技术诀窍的传承，并改善商业环境，我们将确保这些植根于本土的能力不会流失，并传承给下一代。"
 JAP_broadband: "发展数字基础设施"
 JAP_broadband_desc: "我们将发展宽带基础设施，确保全国范围内都能获得稳定、高速的网络连接。通过缩小城乡差距，支持商业活动、教育和公共服务的在线扩展，我们将夯实数字社会的根基。"
 JAP_games_are_fun: "游戏一定要好玩！"
 JAP_games_are_fun_desc: "游戏是日本能够向世界自豪展示的娱乐文化之一。任天堂通过家用游戏机和角色IP将游戏乐趣带给各个年龄层，而索尼（PlayStation）则以硬件和独家服务为核心构建了全球市场。通过将创意与技术相结合，我们将进一步发展这一领域，使其成为支撑国内产业及日本全球传播力与竞争力的支柱。"
 JAP_cool_japan: "酷日本数字出口"
 JAP_cool_japan_desc: "我们将通过数字市场持续构建日本内容输送体系，涵盖动漫、游戏、音乐及视频等领域。通过强化发行、翻译与版权管理，并捕捉海外市场需求，我们将同时提升日本文化的国际影响力与相关产业的盈利能力。"
 JAP_port_logistics: "现代化港口物流"
 JAP_port_logistics_desc: "我们将升级港口的物流功能，如货物装卸、仓储和清关，以降低进出口流程受阻的可能性。通过提升程序效率与完善设施，我们将增强供应链韧性，同时保持在国际物流领域的竞争力。"
 JAP_fiber_optic_rollout: "全国光纤网络扩展"
 JAP_fiber_optic_rollout_desc: "我们将扩大光纤网络的覆盖范围，为全国每个角落带来快速稳定的网络连接。通过缩小城乡之间的网络覆盖差距，我们将建立起支持远程办公、在线学习以及商业活动数字化转型的基础设施。"
 JAP_diplomacy: "日本外交政策"
 JAP_diplomacy_desc: "重建与世界的关系，重新定义日本在国际社会中的角色。"
 JAP_diplomacy_idea_TT: "§Y随着你在外交国策中的推进，该国家精神将获得额外的修正效果！§!"
 JAP_friendship_asean: "改善与东盟关系"
 JAP_friendship_asean_desc: "日本政府将致力于改善与东盟国家的关系，推动信任恢复与对话促进。对日本而言，东盟在经济与安全层面都是不可或缺的重要伙伴，其团结与稳定将塑造整个地区的未来。"
 JAP_not_asean_war_TT: "至少有一个国家拥有“东盟成员国”国家精神，且日本未与任何拥有“东盟成员国”国家精神的国家处于战争状态。"
 JAP_chiang_mai: "清迈倡议"
 JAP_chiang_mai_desc: "通过清迈倡议，日本将加强区域金融合作，以支持东盟国家的经济稳定与凝聚力。"
 JAP_quantitative_oda: "扩大援助规模"
 JAP_quantitative_oda_desc: "通过对交通、港口和能源等核心基础设施的大规模官方发展援助，日本支持东盟经济增长和区域互联互通。"
 JAP_qualitative_oda: "提高援助效益"
 JAP_qualitative_oda_desc: "通过与当地企业和机构合作，日本将推动人力资源开发和民主价值观，增强其在东盟地区的影响力。"
 JAP_security_south_china_sea: "南海安全态势"
 JAP_security_south_china_sea_desc: "在东盟国家的信任支持下，日本将启动南海中立与和平海上安全框架。"
 JAP_away_dependence: "摆脱对美国依赖"
 JAP_away_dependence_desc: "日本开始重新审视其长期以来的关系本质，力求拓展战略选择与自主空间。在经济、科技及安全等领域，我们正沿着基于自身未来愿景所规划的路线前行。"
 JAP_development_production: "自主国防生产链"
 JAP_development_production_desc: "为保障国防自主，我们将在日本国内建立能够生产武器和物资的体系。"
 JAP_japanese_doctrine: "研究日式学说"
 JAP_japanese_doctrine_desc: "我们将建立独立的日本安全学说，以灵活应对战略环境的变化。"
 JAP_recalling_researchers: "召回海外研究人员"
 JAP_recalling_researchers_desc: "为吸引在美国工作的日本科学家回国，政府推出激励政策。大学和国家实验室提供快速通道职位、升级科研设施及有竞争力的资助项目，旨在扭转数十年的人才外流趋势，重建本土科研实力。"
 JAP_japanese_cloud: "霞关云"
 JAP_japanese_cloud_desc: "建立一个由政府运营的“霞关云”，由日本供应商提供服务，并在国内服务器上托管。各政府部门和关键机构将其系统迁移至这一共享平台，以降低成本、统一安全标准，并将敏感数据置于国家控制之下。"
 JAP_base_okinawa: "冲绳美军撤离谈判"
 JAP_base_okinawa_desc: "为增强日本的安全自主性，日美将就驻冲绳美军撤离事宜展开谈判。"
 JAP_enhancement_exercises: "强化联合演习"
 JAP_enhancement_exercises_desc: "通过规模更大、频率更高的联合演习深化与美军的融合。海陆空部队演练共享流程、通信和后勤体系，确保在真实危机中双方能够作为一支协调统一的部队进行机动、作战和补给。"
 JAP_education_jap_usa: "美日联合教育项目"
 JAP_education_jap_usa_desc: "为了加深日美之间的相互理解，我们将实施联合教育项目和学生交流计划。通过借鉴日本的纪律意识与美国的创业精神，这项举措将培养具有国际视野的新一代领导者，并进一步巩固双边互信。"
 JAP_culture_technology: "美日技术文化交流"
 JAP_culture_technology_desc: "加强日本企业与美国科技中心的联系，通过将大学实验室和工作室与硅谷、西雅图及洛杉矶的合作伙伴配对。工程师、设计师和创作者在联合项目中频繁交流，将美国的平台技术与日本的硬件、游戏及动画产业深度融合。"
 JAP_dual_use: "军民两用技术合作"
 JAP_dual_use_desc: "日本和美国将在军民两用技术领域深化合作，这些技术既适用于民用也适用于军事目的。通过产业界与学术界的协作，这一伙伴关系将加速研发进程，推动整体技术进步。"
 JAP_okinawa_development: "冲绳联合开发项目"
 JAP_okinawa_development_desc: "为促进冲绳经济增长与区域融合，日本与美国将围绕基础设施建设开展联合开发项目合作。通过完善交通网络、物流体系和公共设施，该举措旨在提升区域发展水平，同时为日美合作开辟新路径。"
 JAP_informal_cooperation: "非正式合作框架"
 JAP_informal_cooperation_desc: "尽管没有正式的外交关系，日本与台湾在灾害应对、技术交流和民间互动等方面依然开展了务实且富有成效的合作，正在建立互利的基础。"
 JAP_disaster_countermeasure_cooperation: "日台防灾知识平台"
 JAP_disaster_countermeasure_cooperation_desc: "鉴于共同面临自然灾害的脆弱性，日本和台湾正在建立一个联合平台，以分享灾害应对的专业知识和经验教训。这一合作有助于提升双方的抗灾和修复能力。"
 JAP_tai_high_technology: "日台高科技联系"
 JAP_tai_high_technology_desc: "日本和台湾的研究机构与私营企业正携手合作，共同开发前沿民用技术。这一合作旨在提升双方产业的创新能力和生产力。"
 JAP_tai_tourist_visa: "放宽旅游签证"
 JAP_tai_tourist_visa_desc: "为进一步鼓励台湾游客入境，日本将简化签证手续。增加人员往来与旅游将有助于刺激经济，促进更深层次的相互理解。"
 JAP_tai_international_student: "学生交流项目扩展"
 JAP_tai_international_student_desc: "日本将扩大台湾学生在其大学就读的机会。此举旨在深化学术和文化联系，同时培养未来能够沟通两个社会的领导者。"
 JAP_tai_senkaku: "对台海上事务对话"
 JAP_tai_senkaku_desc: "日本和台湾在尖阁诸岛问题上的立场差异可能影响东海地区的渔业作业、海上安全及外交关系。在坚定维护我国立场的同时，我们将建立对话渠道和实务协商框架，以减少现场摩擦。通过平衡管控对立与维护利益，我们将解除与台湾就钓鱼岛问题进行协商的限制。"
 JAP_dprk_national_policy: "半岛对策"
 JAP_dprk_national_policy_desc: "朝鲜依然是我们海岸线最近的火药桶，也是半岛上最不可预测的角色。我们将制定统一的对朝国家政策，将外交、情报与战备力量整合为单一行动纲领。我们选择的道路将决定东北亚安全格局的走向。"
 JAP_dprk_maximum_pressure: "对平壤极限施压"
 JAP_dprk_maximum_pressure_desc: "朝鲜只认实力，不识善意。我们将加强制裁执行力度，扩大海上监控范围，并协调外交施压以限制平壤的升级空间。目标很简单：提高每一次挑衅的代价，直至该政权被迫重新权衡。"
 JAP_dprk_missile_defense: "分层导弹防御"
 JAP_dprk_missile_defense_desc: "北方的威胁以分钟计，而非天数。我们将强化陆海空多层次导弹防御网络，以保护我们的城市、港口和指挥中心免遭突袭。一道可靠的防护盾将使平壤无法再以远程威慑恫吓我们。"
 JAP_dprk_trilateral_training: "三方半岛演习"
 JAP_dprk_trilateral_training_desc: "半岛安全不能仅靠声明来保障。与韩国和美国进行联合训练将提升该地区最危险热点区域的战备状态、协同作战能力以及危机应对能力。通过共同演练，我们传递出一个明确信号：任何侵略行为都将遭到协调一致的回应。"
 JAP_dprk_korean_defense_treaty: "日韩防卫协定"
 JAP_dprk_korean_defense_treaty_desc: "朝鲜半岛与日本列岛共享同一战线。与韩国签订正式防务协定，将情报共享、应急规划和共同安全承诺纳入一个持久的框架。旧怨犹存，但战略必要性要求建立更坚实的基础。"
 JAP_dprk_conditional_engagement: "有条件外交联系"
 JAP_dprk_conditional_engagement_desc: "单靠施压无法应对所有危机。我们将与朝鲜开启受管控的外交渠道，并附加关于导弹试验、军事事件和地区局势稳定的严格条件。对话不会取代威慑，但或许能避免误判。"
 JAP_dprk_normalization_framework: "关系正常化框架"
 JAP_dprk_normalization_framework_desc: "稳定的东北亚需要的不仅是永久的危机管控。我们将与朝鲜建立分阶段的关系正常化框架，将外交进展与可核查的安全承诺及区域保障措施挂钩。任何解决方案都必须是渐进式、可执行且以互惠为基础的。"
 JAP_dprk_support_unification: "支持半岛统一"
 JAP_dprk_support_unification_desc: "朝鲜半岛的分裂影响了东亚几代人的安全格局，但这并非不可改变。我们将通过外交途径、与伙伴国的协调以及区域稳定规划，支持朝鲜半岛实现和平统一。若半岛局势重塑，日本必须参与构建后续的地区秩序。"
 JAP_history_education: "透明化历史教育"
 JAP_history_education_desc: "我们必须直面历史事实，审查教材和教学指导方针。透明的历史教育是与邻国建立信任的第一步。"
 JAP_statement: "[ROOT.GetLeader]声明"
 JAP_statement_desc: "为表明对历史事件负责和悔悟的明确立场，政府将发布新的官方声明。此举旨在促进与受影响国家的和解，并推动建立基于互信、面向未来的关系。"
 JAP_intellectual_platform: "三方历史平台"
 JAP_intellectual_platform_desc: "在联合国调解下，日本、中国和韩国将共同规划并建立博物馆与数字档案馆，将战争记忆传承给后代。日本将提供资金支持，将这一倡议定位为全球和平与和解的象征。"
 JAP_intellectual_platform_TT: "§Y若双方达成协议，所有三个国家都将获得一个提升§G稳定度§!的国家精神！§!"
 JAP_chi_friendship: "改善对华关系"
 JAP_chi_friendship_desc: "为稳定日中关系，日本政府将继续开展对话，致力于增进相互理解、管控分歧。中国是对地区秩序和经济具有重要影响的邻国，改善两国关系直接关系到日本的安全与繁荣。"
 JAP_chi_accept_intellectual_platform: "中国已同意建立中日韩历史研究平台。"
 JAP_chi_trade_support: "支持中国贸易改革"
 JAP_chi_trade_support_desc: "为中国贸易体系的改革和现代化提供技术与制度支持。这将有助于日本企业更顺畅地进入中国市场，并增强日本在华影响力。"
 JAP_chi_advancement_companies: "企业相互准入"
 JAP_chi_advancement_companies_desc: "促进中日企业相互投资与市场准入，以增强经济相互依存度，提升生产力水平。"
 JAP_chi_kanji: "“中华文化圈”文化合作项目"
 JAP_chi_kanji_desc: "通过加强中华文化圈国家间的文化联系，强调我们共同的价值观和历史纽带，作为抵御外部影响的文化缓冲。"
 JAP_chi_temple: "联合寺庙保护项目"
 JAP_chi_temple_desc: "通过日中合作保护佛教寺庙作为共同文化遗产。该项目提升其作为旅游资产的价值，并重申两国间的历史纽带。"
 JAP_chi_senkaku: "处理尖阁诸岛争端"
 JAP_chi_senkaku_desc: "围绕尖阁诸岛的紧张局势直接关系到日中整体关系及东海稳定。在坚持我方主权立场的同时，有必要建立外交管控框架以避免意外冲突。让我们正式建立对话渠道，在约束海上摩擦的同时，于对我国有利的环境下推进谈判。"
 JAP_kor_friendship: "改善对韩关系"
 JAP_kor_friendship_desc: "面向未来的日韩关系，日本政府将致力于恢复信任并持续对话。韩国是日本最重要的邻国之一，直接关系到地区稳定与经济，改善关系将拓宽日本的选择与影响力。"
 JAP_kor_accept_intellectual_platform: "韩国已同意建立日中韩历史平台。"
 JAP_kor_accelerator: "东京-首尔企业孵化器"
 JAP_kor_accelerator_desc: "东京与首尔联合启动了一项企业孵化器计划，旨在扶持和培育初创企业，从而加强两座首都之间的创新与经济合作。"
 JAP_kor_local_companies: "地方商业交流倡议"
 JAP_kor_local_companies_desc: "促进区域企业协作，加速地方民用产业的增长与发展。"
 JAP_kor_cultural_exchange: "文化交流"
 JAP_kor_cultural_exchange_desc: "通过促进文化交流，为两国人民之间增进相互理解和舆论影响奠定基础。"
 JAP_kor_aging: "日韩老龄化社会特别工作组"
 JAP_kor_aging_desc: "日韩联合工作组成立，以应对共同面临的人口老龄化社会挑战，每月举行会议商讨合作政策。"
 JAP_kor_liancourt_rocks: "处理竹岛争端"
 JAP_kor_liancourt_rocks_desc: "竹岛（独岛）争端是可能影响日韩整体关系的重要悬案。在坚定维护我国立场的同时，为避免偶发性摩擦及外交紧张局势升级，我们将建立对话框架与实务磋商机制。此举将解除围绕竹岛（独岛）问题与韩方谈判的限制。"
 JAP_approaching_russia: "对俄和解"
 JAP_approaching_russia_desc: "为确保地缘政治稳定并保障资源获取，我们奉行旨在改善与俄罗斯关系的外交路线，重点推进能源、基础设施及贸易领域的合作。"
 JAP_sov_far_east_development: "远东倡议"
 JAP_sov_far_east_development_desc: "借助日本在北海道寒冷气候下的区域振兴经验，该计划通过基础设施投资和外资引入，推动俄罗斯远东地区的寒带开发。"
 JAP_sov_saakhalin: "萨哈林二号"
 JAP_sov_saakhalin_desc: "为确保化石燃料的稳定供应，日本与俄罗斯合作，加强对萨哈林2号能源项目的外国投资。"
 JAP_sov_logistics_corridor: "日欧物流走廊"
 JAP_sov_logistics_corridor_desc: "我们将通过俄罗斯的铁路和公路网络，开发一条连接日本与欧洲的陆上物流走廊。此举旨在缩短运输时间，并建立通往欧洲市场的稳定通道。"
 JAP_sov_it_corridor: "俄罗斯数字走廊"
 JAP_sov_it_corridor_desc: "与日本IT企业合作，在俄罗斯建立数据中心和光纤电缆等基础设施，打造连接欧洲、中亚和俄罗斯的数字贸易网络。"
 JAP_sov_kuril_islands: "处理北方领土争端"
 JAP_sov_kuril_islands_desc: "北方领土问题是关乎日俄关系基础的未决悬案。在坚持我国立场的同时，为免对立固化，将建立外交谈判与实务磋商的框架。在审慎处理对俄关系的同时，将解除围绕北方领土问题的谈判限制。"
 JAP_defensive_foundations: "自卫为本"
 JAP_defensive_foundations_desc: "日本强化自卫队的基本防御态势，聚焦于本土防卫、危机应对与威慑能力，同时恪守对宪法第九条严格防御性解释的界限。"
 JAP_jgsdf: "加强陆上自卫队"
 JAP_jgsdf_desc: "陆上自卫队通过提升机动性、加强训练和战备状态来增强防御能力。这些措施确保部队在严格遵守现行法律与战略框架的前提下，始终保持保卫国土的能力。"
 JAP_type_x_mbt: "10式主战坦克"
 JAP_type_x_mbt_desc: "10式坦克代表了日本装甲发展的飞跃，它更轻、更快，专为在日本复杂地形上快速部署而设计。通过扩大这种先进平台的生产并培训乘员，日本陆上自卫队增强了其快速应对国内威胁的能力。"
 JAP_type_manouvre_combat_vehicle: "16式机动战车"
 JAP_type_manouvre_combat_vehicle_desc: "16式机动战车为快速反应部队提供了高度机动的火力支援。其轮式设计使日本陆上自卫队能够在群岛间快速调动部队，无需依赖重型装甲的后勤支持即可增援偏远地区。"
 JAP_wheeled_howitzer: "19式轮式自行榴弹炮"
 JAP_wheeled_howitzer_desc: "新一代机动火炮——19式，集现代火控系统与快速再部署能力于一身。其轮式底盘能够在日本分散崎岖的地理环境中，为防御作战提供灵活支援。"
 JAP_chu_sam: "扩展03式中程防空导弹网络"
 JAP_chu_sam_desc: "日本通过增配03式中程地对空导弹系统强化了防空态势。这款现代化中程导弹系统可有效提升对空中入侵的防御能力，并与国家早期预警及追踪体系实现无缝集成。"
 JAP_type_atgm: "升级步兵反坦克导弹"
 JAP_type_atgm_desc: "陆上自卫队为其步兵和侦察单位配备了改进型反坦克导弹系统，包括更新型的01式和96式导弹。这些升级确保地面部队在任何防御作战中都能有效应对现代装甲威胁。"
 JAP_central_readiness_force: "扩充中央快速反应集团"
 JAP_central_readiness_force_desc: "中央快速反应集团被发展为一支灵活、快速部署的指挥力量，能够应对日本境内任何地区的紧急情况。通过加强联合训练、机动能力以及与地方部队的协调，我们确保地面部队能够在短时间内增援关键区域。"
 JAP_civil_protection_act: "完善民防框架"
 JAP_civil_protection_act_desc: "新的民防措施正式确立了自卫队、地方政府、警察和应急服务部门之间的协作机制。针对疏散撤离、危机应对和基础设施保护的明确法律程序，增强了日本在灾害和安全事件中保护民众的能力。"
 JAP_maritime_self_defence_force: "强化海上自卫队"
 JAP_maritime_self_defence_force_desc: "海上自卫队通过改进训练、维护和支援体系得到加强，以维持海上高节奏作战行动。通过强化护航编队、巡逻能力及海军后勤保障，日本能更有效地保卫关键海上通道与沿岸水域。"
 JAP_amphibious_rapid_deployment: "两栖快反旅"
 JAP_amphibious_rapid_deployment_desc: "日本组建了一支专门的两栖快速部署部队，以应对偏远岛屿的危机。这支旅级部队融合了步兵、装甲力量与海上投送能力，接受过强化防御、确保安全并在必要时夺回日本海疆关键领土的专项训练。"
 JAP_atago_destroyer: "先进宙斯盾舰"
 JAP_atago_destroyer_desc: "新型配备宙斯盾系统的驱逐舰投入使用，提供强大的防空、反潜及指挥能力。这些先进护卫舰构成了日本现代水面舰队的核心，显著增强了舰队防护与区域威慑力。"
 JAP_keen_sword_operation: "扩大“利剑”联合演习"
 JAP_keen_sword_operation_desc: "\"利剑\"演习系列扩展至涵盖更复杂的海、空、陆作战单元。与盟军部队定期举行的大规模演练，不仅提升了协同作战能力，优化了联合指挥控制体系，更彰显了日本在争议性区域环境中有效开展军事行动的备战水平。"
 JAP_f2_multirole_defensive_enhancement: "增强F-2多功能机队"
 JAP_f2_multirole_defensive_enhancement_desc: "F-2机队升级了航空电子设备、传感器和武器系统，以提升近海水域的防空与海上打击能力。这些改进使该机型能更有效地应对区域威胁，同时保持以防御为主的任务定位。"
 JAP_f15_defensive_updat_programe: "F-15防御升级计划"
 JAP_f15_defensive_updat_programe_desc: "日本F-15空优战斗机进行全面升级，包括现代化雷达、电子战套件和改进型空对空导弹。升级后的机队显著增强了日本保卫本国领空的能力，以应对日益强大的对手。"
 JAP_hyuga_class: "日向级直升机驱逐舰"
 JAP_hyuga_class_desc: "日向级直升机驱逐舰作为指挥及反潜作战平台全面投入使用。其协调护航编队与多架直升机协同作战的能力，显著提升了舰队防护能力与海上态势感知水平。"
 JAP_p_maritime_patrol: "扩展海上巡逻航空兵"
 JAP_p_maritime_patrol_desc: "日本投资现代化海上巡逻机，以监控航道、追踪潜艇并支持搜救行动。加强群岛周边的巡逻覆盖范围，既增强了国家安全，也保障了海上交通的安全。"
 JAP_deploy_ballistic_warning_radars: "部署弹道导弹预警雷达"
 JAP_deploy_ballistic_warning_radars_desc: "新型远程预警雷达已部署到位，用于探测和跟踪该地区的弹道导弹发射。通过将这些传感器整合进国家指挥网络，日本获得了关键的几分钟来评估威胁、向民众发出警报并协调防御响应。"
 JAP_modernize_jadge: "现代化JADGE防空网络"
 JAP_modernize_jadge_desc: "日本航空自卫队防空地面环境系统（JADGE）完成升级，数据链、处理能力以及与海军和陆基传感器的整合均得到提升。现代化的JADGE网络能实现更快速的决策，并更高效地部署防空资源。"
 JAP_air_self_defence_force: "强化航空自卫队"
 JAP_air_self_defence_force_desc: "航空自卫队扩大训练项目、基地基础设施和支援单位，以应对更高的作战节奏。随着地区空中环境日益严峻，这些改进确保日本能够维持持续的空中巡逻、快速紧急起飞以及复杂的联合演习。"
 JAP_article_nine_transition_comittee: "成立国防转型委员会"
 JAP_article_nine_transition_comittee_desc: "日本成立了一个专门委员会，以协调其向现代化国防态势的转型。通过汇聚政策制定者、军事规划者和法律专家，日本能够有效管理职责转变，确保实现稳定有序的国防现代化转型。"
 JAP_article_nine_transition_comittee_tt: "§G“第九条”势力平衡修正将不再能根据解释程度改变。现已解锁国策以完全移除“第九条”§!"
 JAP_secure_public_support: "争取公众支持"
 JAP_secure_public_support_desc: "全国范围内开展了一场宣传运动，阐释日本防卫政策的演变历程，回应公众关切，并增强对新安全态势的信心。社会各界的广泛支持确保了政治稳定，减少了转型期间的摩擦。"
 JAP_modernize_joint_command: "现代化联合指挥"
 JAP_modernize_joint_command_desc: "武装部队将其作战指挥整合为统一的联合结构，提升了互操作性与战备水平。现代联合规划与共享训练标准使得对复杂安全局势的响应更为高效。"
 JAP_normalize_defense_procurement: "规范国防采购体系"
 JAP_normalize_defense_procurement_desc: "日本简化国防采购流程，扩大工业产能，并加强与国内制造商的协作。透明化、现代化的采购体系确保关键国防项目能够高效且可持续地交付。"
 JAP_formalize_national_defense: "正规化国防能力"
 JAP_formalize_national_defense_desc: "日本正式确立其扩大的防卫职责，明确了角色定位、任务使命及长期战略目标。随着转型完成，武装力量将在统一战略愿景下运作，旨在日益复杂的区域环境中维护国家利益。"
 JAP_normalize_defense_procurement_done: "规范国防采购完成"
 JAP_modernize_joint_command_done: "现代化联合指挥完成"
 JAP_consolidate_national_defense_framework_done: "国防框架整合完成"
 JAP_rebuild_blue_water_navy: "重建蓝水海军"
 JAP_rebuild_blue_water_navy_desc: "日本正为其舰队准备远赴本土水域之外进行持续作战，扩展后勤补给能力与远程护航力量。一支焕然一新的蓝水海军将使日本能够保护海上航线、支援盟友，并对更广泛区域内的危机作出反应。"
 JAP_carrier_aviation_tt: "[JAP_carrier_aviation_idea_desc]\n"
 JAP_carrier_aviation_development: "航母发展计划"
 JAP_carrier_aviation_development_desc: "一项专门计划启动，旨在发展舰载航空能力，整合海军战斗机、甲板作业及专业训练。打造一支可靠的舰载航空力量，将极大提升舰队在威慑与作战行动中的覆盖范围和灵活性。"
 JAP_submarine_modernization_project: "潜艇现代化项目"
 JAP_submarine_modernization_project_desc: "日本升级潜艇舰队，采用静音艇体、先进传感器和现代化武器。新一代攻击潜艇增强了水下威慑力、海上拒止能力以及对争议水域的纵深监控能力。"
 JAP_expand_multi_role_destroyer_fleet: "扩展多用途驱逐舰舰队"
 JAP_expand_multi_role_destroyer_fleet_desc: "更多多功能驱逐舰已投入使用，它们集防空、反潜和对海打击能力于一体，成为灵活多用的作战平台。这些护航舰艇构成了日本海上扩编特遣部队的中坚力量。"
 JAP_establish_joint_rapid_deployment_command: "联合快速部署指挥部"
 JAP_establish_joint_rapid_deployment_command_desc: "联合指挥部成立，旨在协调快速部署的陆海空部队。通过统一规划和预先制定的应急响应机制，日本获得了一支能够在其广泛战略环境内迅速应对危机的能力。"
 JAP_full_defense_industrial_mobilisation: "全面防御工业动员"
 JAP_full_defense_industrial_mobilisation_desc: "日本将其工业基础、研究机构与后勤网络整合，全面服务于国防生产计划。通过标准化采购、长期合同及产能扩张，实现了舰船、车辆、飞机及先进武器的持续量产。"
 JAP_long_range_strike_missile_artillery_forces: "远程打击与导弹炮兵部队"
 JAP_long_range_strike_missile_artillery_forces_desc: "专业导弹与炮兵部队被组建起来，以实施远程精确打击。通过将先进弹药与现代瞄准及指挥系统相结合，日本获得了威胁远方军事资产与关键基础设施的能力。"
 JAP_expand_mechanized_brigades: "扩展机械化旅"
 JAP_expand_mechanized_brigades_desc: "现有机械化部队得到加强，并组建了新的旅级单位，装备现代化步兵战车及配套装甲。此次扩军显著提升了地面部队的机动性、防护能力和持续作战效能。"
 JAP_deploy_next_generation: "新一代作战编队"
 JAP_deploy_next_generation_desc: "作战单位围绕新一代装备、网络化指挥系统和联合作战学说进行重组。这些编组旨在实现快速部署、高生存能力，并在复杂高强度环境中高效作战。"
 JAP_national_defense_professionalization: "国防专业化"
 JAP_national_defense_professionalization_desc: "日本投资于各军种的专业军事教育、职业发展和现代化人事体系。一支更有能力、经验丰富且凝聚力强的军官与士官队伍，提升了战备水平，增强了领导力，并确保了国防力量的长期效能。"
 JAP_integrated_air_space_command: "一体化空天司令部"
 JAP_integrated_air_space_command_desc: "日本建立了综合空天司令部，以协调防空、预警、卫星支持和空间监视。通过整合来自地面雷达、机载传感器和轨道平台的信息，日本能够更清晰地掌握战场态势，并对新出现的威胁做出更快速的反应。"
 JAP_establish_long_range_strike_aviation: "远程打击航空兵"
 JAP_establish_long_range_strike_aviation_desc: "专门的远程打击航空部队已经组建，配备现代化飞机和防区外武器。这些力量具备远程打击关键目标的能力，为更广泛区域的威慑行动和联合作战提供支持。"
 JAP_mext_generation_air_dominance: "下一代空中优势"
 JAP_mext_generation_air_dominance_desc: "日本加速研发下一代空中优势战斗机，融合隐身技术、先进传感器与网络化作战系统。该计划确保其空军能够在未来日益激烈的空域争夺中持续保持优势。"
 JAP_advanced_missile_development: "先进导弹管理局"
 JAP_advanced_missile_development_desc: "设立专门的管理机构，负责监督先进导弹系统的研发、测试与生产。从现代空对空及反舰武器到远程精确打击能力，这一举措不仅丰富了日本的武器库，更显著提升了各军种的作战效能。"
 JAP_high_tech_domestic_manufacturing: "高科技国内防卫制造业"
 JAP_high_tech_domestic_manufacturing_desc: "日本投资于航空电子设备、传感器、复合材料和推进系统的高端制造。加强关键部件的国内供应链，减少对外国供应商的依赖，支持航空和导弹平台的快速升级。"
 JAP_establish_japan_defense_technology_agency: "日本防卫技术厅"
 JAP_establish_japan_defense_technology_agency_desc: "成立中央国防技术机构，统筹协调工业界、学术界与武装部队之间的研究、采购与创新工作。统一监管加速了研发周期，减少重复投入，确保前沿理念能够迅速从实验室转化为前线部队的实际战斗力。"
 JAP_atla_defense_technology_consolidation: "防卫厅技术整合"
 JAP_atla_defense_technology_consolidation_desc: "日本防卫省装备厅被赋予核心角色，统筹协调陆海空自卫队的研发与采购事务。通过将国防技术项目整合至单一管理机构，日本能够减少重复投入、加速技术创新，并推动潜力项目更快投入实战部署。"
 JAP_gifu_test_aerospace_development_center: "岐阜试验与航空航天开发中心"
 JAP_gifu_test_aerospace_development_center_desc: "岐阜被打造为飞机、航空电子设备和武器系统的顶级测试与评估中心。专用靶场、仪表化空域和专业工程团队支撑着严格的试验流程，确保新设计在投入前线服役前得到全面验证。"
 JAP_aichi_nagoya_aerospace_defense_cluster: "爱知-名古屋航空航天国防集群"
 JAP_aichi_nagoya_aerospace_defense_cluster_desc: "爱知-名古屋地区被打造为领先的航空航天与国防产业集群，将主要制造商、供应商及研究机构紧密联结。该区域通过集中投资，显著提升了军用及军民两用平台的机身、发动机及高科技零部件产能。"
 JAP_kobo_maritime_heavy_industry_corridor: "神户海事重工业走廊"
 JAP_kobo_maritime_heavy_industry_corridor_desc: "神户及周边沿海城市被打造为一条连绵的海上重工业走廊。扩建的造船厂、钢铁厂和海洋工程企业为建造和维护规模更大、性能更强的舰队及其配套基础设施提供了产能保障。"
 JAP_nagasaki_shipyard_defense: "长崎造船厂国防整合"
 JAP_nagasaki_shipyard_defense_desc: "长崎的主要造船厂已更深地融入国防规划体系，额外产能专注于建造护航舰艇、支援舰船及特种海军平台。船厂与海军间的紧密协作缩短了建造周期，提升了舰队战备水平。"
 JAP_kure_naval_arsenal_revival: "吴港海军工厂复兴"
 JAP_kure_naval_arsenal_revival_desc: "吴港的历史性海军设施被改造为现代化的造船与维修综合体。升级后的船坞、车间和物流节点恢复了这座城市作为前线战舰维护、改装和升级关键中心的地位。"
 JAP_sasebo_fleet_support_complex: "佐世保舰队支援基地"
 JAP_sasebo_fleet_support_complex_desc: "佐世保被扩建为一个综合性的舰队支援综合体，提升了维修能力、弹药储存和补给基础设施。其位于日本西部的地理位置，使其成为维持附近海域及关键海上咽喉要道作战的理想枢纽。"
 JAP_yokosuka_dockyard_expansion: "横须贺造船厂扩建"
 JAP_yokosuka_dockyard_expansion_desc: "横须贺的船坞及相关设施得到扩建，能够容纳更多舰船并支持更深入的维护周期。作为日本主要的海军基地之一，扩建后的横须贺极大提升了海军保持主要水面作战舰艇随时可部署状态的能力。"
 JAP_revitalize_defense_production: "振兴国防工业基础"
 JAP_revitalize_defense_production_desc: "日本正大力振兴其国防工业基础，通过扶持重点军工企业、签订长期稳定合同以及升级生产线等措施，全面提升军工体系。更健康的工业基础使该国能够可靠地装备部队，并更快适应新的作战需求。"
 JAP_kaguya_starward_expedition: "辉夜星途远征"
 JAP_kaguya_starward_expedition_desc: "受辉夜姬身披光衣返回月球的传说启发，日本启动了一项雄心勃勃的近地小行星深空探测计划。先进的机器人探测器和采矿演示器被送入太空，将神话转化为科技，为未来星际资源开采奠定基础。"
 JAP_kaguya_starward_expedition_tt: "§Y我们的登月任务即将启动！§!"
 JAP_tsukuyomi_lunar_program: "月读月球计划"
 JAP_tsukuyomi_lunar_program_desc: "以日本神话中的月神\"月读命\"命名的这项计划，整合了工业界、科研机构与航天部门的力量，共同致力于持续的月球开发。轨道飞行器、着陆器及月表基础设施的部署，将使月球从遥远的象征转变为切实可用的前哨站，服务于科学研究、导航定位，并支撑日本航天事业的长远抱负。"
 JAP_amaterasu_martian_dawn: "天照火星黎明"
 JAP_amaterasu_martian_dawn_desc: "以旭日女神天照大神之名，日本将目光投向了这颗红色星球。远程探测器、先进推进技术与开创性的生命维持研究，共同支撑起新一轮火星探索浪潮。每一次任务都在拓展人类智慧的边界，将遥远火星的微光转化为日本高科技文明的下一个地平线。"
 JAP_restore_imperial_household: "菊花王座复临"
 JAP_restore_imperial_household_desc: "数十年来，皇室始终被禁锢于礼仪之中，受人尊崇却远离国家权柄。我们将通过恢复制度能力、赋予宫廷在国政中的正式角色来扭转这一局面。这并非浮华仪典，而是对法统秩序的重构——当菊花御座向前迈步时，所有派系都将被迫做出抉择。"
 JAP_reinstate_former_imperial_houses: "恢复帝国皇室"
 JAP_reinstate_former_imperial_houses_desc: "仅凭象征意义无法维系皇权制度。其未来取决于延续性、稳定性与稳固的继承体系。我们将恢复前朝皇室家族地位，使其重归国家体制框架，拓展与皇位相连的合法支系范围。此举将被保皇派赞颂为传统的捍卫，亦将遭宪政派斥责为政治操弄。"
 JAP_male_line_succession_act: "嫡子继承法"
 JAP_male_line_succession_act_desc: "继承权的不确定性既是国内争议，也是战略弱点。我们将通过立法确立男性直系继承制度，以消除歧义，确保王朝世代延续。此举将巩固君主派支持，但也会引发改革派的激烈反对，他们认为这是现代日本的一次倒退。"
 JAP_imperial_rites_restored: "恢复帝国礼仪"
 JAP_imperial_rites_restored_desc: "无仪式之御座，便是无分量之冠冕。我们将恢复帝国仪典作为国家认可的典礼，重铸君主制的神圣根基与民族传承的连续性。此举意在将现代国家与古老法统相联结，无论政治阶层赞同与否。"
 JAP_recall_privy_council: "重开枢密院"
 JAP_recall_privy_council_desc: "议会政治已变得喧嚣、短暂，且日益脱离长远的治国方略。我们将重召枢密院，为王室建立一个永久的顾问机构——它行事审慎、经验丰富，并忠于国家延续性。其回归将被君主主义者视为稳定的锚点，而在反对者眼中，则是一个未经选举的权力中心。"
 JAP_imperial_reform_commission: "帝国改革委员会"
 JAP_imperial_reform_commission_desc: "复兴需要的是体系，而非即兴发挥。我们将成立帝国改革委员会，负责起草复兴君主制的法律与制度蓝图，并协调各部委、宫廷机构及安全机关统一遵循国家单一信条。一旦委员会启动，象征将转化为政策，使退却成为政治上不可行的选项。"
 JAP_imperial_audience: "召开御前会议"
 JAP_imperial_audience_desc: "各党派将以请愿者而非平等者的身份被召至御前。在一场精心安排的御前会议上，我们将使各派系领袖臣服于新秩序——在这种秩序下，民选政治将服务于国家，而非凌驾于国家之上。若菊花御座要统领现代幕府体制，首先必须让政治阶层臣服于其统治逻辑。"
 JAP_imperial_civic_oath: "颁布帝国公民誓约"
 JAP_imperial_civic_oath_desc: "新秩序的建立不仅需要法令，更需要共同的效忠。我们将颁布《帝国公民誓约》，将官员、军人及民事机构与皇权紧密相连，视其为合法性的最终源泉。如此一来，忠诚将化为律法，异议则形同背叛。"
 JAP_unified_intelligence_secretariat: "建立统一情报秘书处"
 JAP_unified_intelligence_secretariat_desc: "一个现代化的幕府不可闭目塞听。我们将整合相互竞争的情报机构，成立统一情报秘书处，通过单一指挥链汇报，以维护天皇的战略视野。此举将在一夜之间提升我们的治国手腕，同时让对手有充分理由畏惧朝廷如今所掌握的情报。"
 JAP_blue_water_navy: "打造蓝水海军"
 JAP_blue_water_navy_desc: "日本的命运在于海洋，我们的安全绝不能止步于地平线。我们将打造一支真正的远洋海军，使其能够远离本土水域行动，保护海上航线，并在利益所需之处投射力量。以舰队作为皇权的钢铁利器，世界将通过日本留下的航迹来认识这个国家。"
 JAP_imperial_defense_council: "帝国国防委员会"
 JAP_imperial_defense_council_desc: "战略决策不能受制于选举周期与内阁纷争。我们将成立帝国防务委员会，将武装力量、情报机构及关键部门统一于以天皇为核心的单一战略方针之下。此举将使日本的安全政策形成统一整体，极大削弱内部派系从中破坏的可能性。"
 JAP_rare_earth_resilience: "保障稀土资源韧性"
 JAP_rare_earth_resilience_desc: "大国无需一枪一炮即可被扼杀——只需切断其工业无法替代的原材料。我们将通过战略储备、供应链多元化及战略性开采合作，确保稀土资源的韧性，使日本免受胁迫。若世界企图施压，恐怕得另寻支点了。"
 JAP_national_shipbuilding_plan: "帝国舰队扩张计划"
 JAP_national_shipbuilding_plan_desc: "皇座不会满足于海岸防御；日本将掌控决定我们命运的海域。在帝国舰队扩张计划下，我们将大幅提升造船厂产能，锁定长期海军采购，并推动从龙骨铺设到服役的连续建造周期。当这一计划启动时，我们的对手将不再质疑日本的意图 - 他们只会清点我们的舰船数量。"
 JAP_imperial_war_cabinet: "帝国战时内阁会议"
 JAP_imperial_war_cabinet_desc: "值此危难之际，日本绝不能被拖延、委员会和党派纷争所统治。我们将召开帝国战争内阁，以集中指挥权，并依据天皇敕令，将政治领导层统一于单一战略路线之下。自此刻起，国家将以一个声音行动——那便是天皇的声音。"
 JAP_russian_lost_territories: "收复北方领土"
 JAP_russian_lost_territories_desc: "北方的创伤从未愈合，只是被条约与沉默所掩盖。我们将主张对俄罗斯控制下的岛屿及水域的主权，这并非恳求，而是基于筹码与准备的正当诉求。若莫斯科不愿归还失地，日本就必须决定将不惜代价走多远以夺回故土。"
 JAP_fight_china_again: "龙与菊"
 JAP_fight_china_again_desc: "旧日的冲突从未真正解决，只是被条约与变动的均势所掩盖。我们将动员全国工业、武装力量与民众意志，为再次与中国对决做好准备——这场战争将决定亚洲的未来。这一次，日本不仅为生存而战，更为战后的新秩序而战。"
 JAP_reclaim_pacific_rim: "环太平洋霸权"
 JAP_reclaim_pacific_rim_desc: "日本的繁荣与安全镌刻在太平洋之上，从海上航道到岛链体系，直至远方的战略要冲。我们将确立环太平洋主导权，将海上影响力提升至国家战略层面，以舰队部署、基地准入与经济杠杆为支撑。坐视他人绘制版图的时代已经终结——日本必将亲手塑造未来格局。"
 JAP_office_for_colonialism: "复兴大东亚省"
 JAP_office_for_colonialism_desc: "一个没有行政管理的帝国，其征服的成果终将因自身重负而崩塌。我们将复兴大东亚省，以单一的帝国理念统筹海外治理、安全安排与经济一体化。通过一个部门来指导整个势力范围，日本的影响力将不再临时拼凑，而是得到有序管理、持续扩张并有力执行。"
 JAP_office_for_colonialism_tt: "解锁亚洲国家的占领政策！\n"
 JAP_reclaim_south_chinese_sea: "掌控南方海域"
 JAP_reclaim_south_chinese_sea_desc: "南海是亚洲的命脉，谁控制了它，谁就掌握了贸易、燃料和权力的流动。我们将着手重获在这些水域的主导地位，建立存在、基地以及海军力量，以强制执行我们的意志，对抗任何挑战者。日本不会请求通行，而是将以武力确保通行权。"
 JAP_reclaim_indochina: "重返印度支那"
 JAP_reclaim_indochina_desc: "印度支那坐落在东南亚的十字路口，港口、资源和海上航线决定了谁能掌控区域平衡。我们将以压力、武力和政治运作重返此地，将这些领土重新纳入日本的战略轨道。一旦稳固，我们海洋疆域的南翼将获得永久性的影响力支撑。"
 JAP_reclaim_australia: "极南锚点"
 JAP_reclaim_australia_desc: "澳大利亚是南太平洋的基石，这片大陆能够容纳舰队、空中力量以及决定长期战争的补给体系。我们将采取行动，将其纳入日本的战略控制之下——这并非一次突袭或姿态，而是作为我们海洋势力范围的永久支点。若南方得以稳固，太平洋将成为日本的内湖。"
 JAP_reclaim_myanmar: "确保伊洛瓦底江门户"
 JAP_reclaim_myanmar_desc: "缅甸是连接南亚与东南亚的陆桥，掌控着孟加拉湾通往区域腹地的要道。我们将通过武力与政治施压夺回控制权，将其港口、机场及通道转化为日本大东亚共荣圈的资产。一旦伊洛瓦底门户稳固，我军南翼将固若金汤。"
 JAP_reclaim_the_pacific: "海洋即前线"
 JAP_reclaim_the_pacific_desc: "太平洋并非遥不可及的海域，它是决定日本存亡与辉煌的前沿阵地。我们将通过舰队部署、岛屿据点以及贯彻东京制定的海洋秩序之决心，重新掌控这片海域。当海洋成为我们的疆界时，所有对手都将在我们的威势之下行事。"
 JAP_reclaim_north_korea: "东京统治北方"
 JAP_reclaim_north_korea_desc: "我们将强制达成一项解决方案，剥夺平壤的战略自主权，并将其对外政策置于日本监督之下。通过管控准入、提供安全保障以及对资源和重建施加硬性影响，朝鲜将被转变为依附性缓冲地带，而非不可预测的威胁。这是毫无幻想的支配，也是通过精心设计强加的稳定。"
 JAP_reclaim_south_korea: "建立保护国框架"
 JAP_reclaim_south_korea_desc: "我们将超越影响力的范畴，建立一个将朝鲜外交与安全政策同东京方向捆绑的保护国框架。通过受控协议、顾问渗透以及对关键机构的杠杆操控，朝鲜将被推入从属地位，而无需公开吞并。这是一个用文书、压力与永久性构建的现代帝国。"
 JAP_reclaim_taiwan: "建立台湾保护国"
 JAP_reclaim_taiwan_desc: "我们将通过建立保护国框架，从施加影响力转向实施控制，将台湾的防务与外交政策纳入东京的指挥体系。通过安全保障、驻军权利及制度性杠杆，这座岛屿将成为忠诚的海上堡垒，无需公开吞并。这是一种依托海上力量与政治压力维系的现代帝国安排。"
 JAP_basic_reconstruction_policy: "重建政策"
 JAP_basic_reconstruction_policy_desc: "在东日本大地震造成前所未有的破坏之后，政府必须制定灾后重建的基本方针。提出恢复民生、重建基础设施、振兴产业的国家框架，将是重获公众信任、稳定社会的第一步。"
 JAP_tohoku_infrastructure: "重建东北地区基础设施"
 JAP_tohoku_infrastructure_desc: "地震和海啸给东北地区的交通网络和生命线造成了灾难性破坏。重建道路、铁路和港口，是恢复当地社区生活、推动区域复兴的第一步。尽管这项工程将耗费巨大成本和时间，但刻不容缓。"
 JAP_fishery_revival: "农渔产业恢复"
 JAP_fishery_revival_desc: "海啸摧毁了东北地区的渔港和农田，使无数生计毁于一旦。重建这些产业将恢复该地区的经济基础，并确保稳定的粮食供应。这一努力对于地方复苏和国家安全都至关重要。"
 JAP_tohoku_port: "恢复东北港口功能"
 JAP_tohoku_port_desc: "海啸摧毁了港口设施和造船厂，导致物流与海上贸易陷入停滞。重建工作将振兴区域产业，并重新打通关键的国内与国际航线。恢复这些门户通道对于日本更广泛的经济复苏至关重要。"
 JAP_power_supply: "电力稳定"
 JAP_power_supply_desc: "灾难已损毁众多电力设施与输电网，导致严重电力短缺。我们必须迅速拓展替代能源并加固电网，以确保民生与工业的稳定供电。"
 JAP_kanto_infrastructure: "重建关东地区基础设施"
 JAP_kanto_infrastructure_desc: "这场灾难对关东地区造成了严重破坏，尤其是北部地区，交通网络和城市功能陷入瘫痪。恢复支撑首都圈的基础设施对于重振经济活动和维护国家稳定至关重要。迅速且规划周详的重建工作势在必行。"
 JAP_reconstruction_agency: "复兴厅"
 JAP_reconstruction_agency_desc: "为加速和协调灾后重建工作，政府将设立复兴厅。这一专门机构将统筹中央与地方力量，确保重建计划的有效实施。"
 JAP_industrial_recovery: "恢复工业基础"
 JAP_industrial_recovery_desc: "这场灾难严重破坏了工厂和工业设施。通过重建工业基础，我们可以恢复就业，并加速经济复苏。"
 JAP_funding_local_governments: "支持受灾地方政府"
 JAP_funding_local_governments_desc: "向受灾地区地方政府提供资金，以支持灾后恢复、重建民生和维持公共服务。"
 JAP_housing_reconstruction: "安置灾民"
 JAP_housing_reconstruction_desc: "加快临时住房和长期住宅区的建设，将流离失所的家庭迁出避难所，并为城镇制定明确的永久性安置计划。"
 JAP_reconstruction_completed_focus: "重建完成"
 JAP_reconstruction_completed_focus_desc: "东北地区正从紧急重建转向长期振兴。核心基础设施已恢复，产业重新运转，城镇开始从生存模式转向发展模式。"
 JAP_trilateral_anti_north_korea_training: "三方半岛战备"
 JAP_trilateral_anti_north_korea_training_desc: "与韩国和美国的定期联合演习，已在半岛危机应对方面形成了共同的行动手册。可互操作的指挥程序、海空联合演习以及协调的导弹防御演练，确保对平壤的任何挑衅都能做出迅速、统一且可信的回应。"
 JAP_dprk_policy_idea: "日本政策渗透"
 JAP_dprk_policy_idea_desc: "东京的新朝鲜政策开辟了前所未有的渠道。通过外交接触、秘密中介、经济杠杆与情报渗透，日本在朝鲜政治环境中获得了扩大影响力的短暂窗口。这一突破口虽脆弱且充满争议，但眼下日本在平壤施加的压力与存在感已较以往更具分量。"
 JAP_depopulation_0: "低生育率遗留负担（等级1）"
 JAP_depopulation_0_desc: "得益于持续的对策，少子化进程在一定程度上正逐渐得到遏制。出生趋势也显现出改善迹象，较为危机导向的观点已有所消退，但长期影响不会立即消失。稳定人口基础仍需时日，需要持续的政策努力并维持其成效。\n-------------\n通过国策§Y$JAP_work_style_reform$§!，§Y$JAP_basic_policy_declining_birthrate_society$§!，和§Y$JAP_save_ice_age_generation$§!提升修正值§G$JAP_declining_birthrate_measures_modifier$§!。若达成条件，每§Y4年§!触发的调查事件将可升级国家精神！"
 JAP_depopulation_1: "低生育率持续压力（等级2）"
 JAP_depopulation_1_desc: "育儿支持和工作方式改革等措施已初见成效，但少子化带来的社会压力依然普遍存在。虽然生育率出现回升迹象，但对未来的不安等情绪仍阻碍着改善趋势的全面扩散。当前形势并非单向恶化，但持续推行对策仍至关重要。\n\n通过国策§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!和§Y$JAP_save_ice_age_generation$§!提升修正值§G$JAP_declining_birthrate_measures_modifier$§!。若达成条件，每§Y4年§!触发的调查事件将可升级国家精神！"
 JAP_depopulation_2: "低生育率长期趋势（等级3）"
 JAP_depopulation_2_desc: "少子化进程依然是全国性的问题，尚未取得明显改善。尽管通过各项措施的积累在某些领域可见进展，但横跨就业、家庭财政与生活条件的结构性问题依然存在，生育趋势持续处于低位。虽然快速恶化的势头得到遏制，但现状仍远未令人安心。\n\n通过国策§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!和§Y$JAP_save_ice_age_generation$§!提升修正值§G$JAP_declining_birthrate_measures_modifier$§!。若达成条件，每§Y4年§!触发的调查事件将可升级国家精神！"
 JAP_depopulation_3: "低生育率日益恶化（等级4）"
 JAP_depopulation_3_desc: "出生人数下降的趋势仍在持续，对未来人口基数的担忧依然强烈。育儿与就业难以兼顾、家庭经济负担、地区间支援体系差异等因素相互叠加，改善迹象依然有限。虽然正在推进应对措施，但总体上仍不足以完全遏制局势恶化。\n\n通过国策§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!和§Y$JAP_save_ice_age_generation$§!提升修正值§G$JAP_declining_birthrate_measures_modifier$§!。若达成条件，每§Y4年§!触发的调查事件将可升级国家精神！"
 JAP_depopulation_4: "低生育率危机（等级 5）"
 JAP_depopulation_4_desc: "出生率长期恶化的趋势已开始对国家治理的多个领域造成沉重压力，人口结构扭曲日益加深。劳动力萎缩与社会保障负担加剧的忧虑正同步推进，传统应对措施已不足以有效遏制这一趋势。少子化问题不再仅仅是单一政策领域的议题，它已演变为威胁国家存续根基的严峻挑战。\n\n通过国策§Y$JAP_work_style_reform$§!、§Y$JAP_basic_policy_declining_birthrate_society$§!和§Y$JAP_save_ice_age_generation$§!提升修正值§G$JAP_declining_birthrate_measures_modifier$§!。若达成条件，每§Y4年§!触发的调查事件将可升级国家精神！"
 JAP_entrenched_demand_shortfall_idea_1: "根深蒂固的需求低迷"
 JAP_entrenched_demand_shortfall_idea_1_desc: "通缩预期和对未来的焦虑抑制了家庭支出，而企业在需求疲软的情况下也缩减了投资。工资停滞不前，物价几乎没有波动，没有人愿意率先消费。日本经济并未崩溃，但却因经济瘫痪而日渐萎靡。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议以提升§Y需求复苏进展§!至§G30§!以§G缓解§!该国家精神的效果。"
 JAP_declining_birthrate_measures_modifier: "少子化对策"
 JAP_work_style_reform_modifier: "工作方式改革"
 JAP_work_style_reform_modifier_desc: "我们将审视长期以来依赖过度工时的做法，在重塑工作场所以确保可持续运营的同时，保护劳动者的健康与日常生活稳定。通过改善休息制度、提升劳动管理透明度，并减少因雇佣身份差异造成的不公，我们致力于构建一个更易实现家庭与工作平衡的社会。"
 JAP_long_working_idea: "加班文化"
 JAP_declining_birthrate_modifier: "政府少子化对策"
 JAP_declining_birthrate_modifier_desc: "面对日益严峻的少子化问题，政府正以紧迫感推进育儿支援政策与工作方式改革。通过减轻民众生活压力、拓宽家庭组建路径，力求为社会发展注入更明朗的未来预期。"
 JAP_save_ice_age_generation_modifier: "帮扶就业冰河一代"
 JAP_save_ice_age_generation_modifier_desc: "作为国家，我们将直接应对并弥补就业冰河期进入社会的那一代人所承受的不利条件。通过提供从求职、技能再培训到改变工作方式，再到重建住房与日常生活的全方位支持，我们将为人们重新出发奠定坚实基础。"
 JAP_ice_age_generation_idea: "就业冰河期"
 JAP_ice_age_generation_idea_desc: "就业岗位急剧萎缩，造就了一代无论能力与意愿如何都失去起点的年轻人。长期的非稳定就业与收入停滞持续存在，对整个社会弥漫着对未来的不信任感。\n-------------\n可以通过完成始于§Y$JAP_save_ice_age_generation$§!的国策来§G移除§!。"
 JAP_industries_modifier: "$JAP_industries$"
 JAP_industries_modifier_desc: "$JAP_industries_desc$"
 JAP_aftermath_of_disposal_non_performing_loans_idea: "加速清除坏账之后果"
 JAP_aftermath_of_disposal_non_performing_loans_idea_desc: "不良贷款处置的加速正迅速推动金融机构与企业重组。由此，尽管资本配置正常化的路径正开始显现，但短期内就业调整与区域经济动荡正在蔓延，增加了与失业应对措施、生计支持及再就业援助相关的社会负担。"
 JAP_transparency_and_audit_reform_modifier: "透明化审计改革"
 JAP_transparency_and_audit_reform_modifier_desc: "我们将加强信息公开与公共记录管理，通过数字化和独立审计减少不当行为的发生机会。通过解决\"天下り\"（官员空降）和政治资金不透明问题，我们将提升行政效率与公信力，增强抵御外部影响的能力。"
 JAP_protecting_human_rights_modifier: "$JAP_protecting_human_rights$"
 JAP_protecting_human_rights_modifier_desc: "$JAP_protecting_human_rights_desc$"
 JAP_worker_protection_modifier: "保障工人"
 JAP_worker_protection_modifier_desc: "我们将保障工人的生计和工作场所安全，为人们能够长期持续工作创造条件。通过支持提高工资待遇、改善劳动条件以及缓解经济不安全感，我们将增强社会稳定与产业基础。"
 JAP_redistribution_modifier: "$JAP_redistribution$"
 JAP_redistribution_modifier_desc: "$JAP_redistribution_desc$"
 JAP_energy_efficiency_idea: "$JAP_focusing_renewable_energy$"
 JAP_energy_efficiency_idea_desc: "$JAP_focusing_renewable_energy_desc$"
 JAP_leading_disarmament_idea: "$JAP_leading_disarmament$"
 JAP_leading_disarmament_idea_desc: "$JAP_leading_disarmament_desc$"
 JAP_leading_disarmament_idea_3: "和平发展"
 JAP_leading_disarmament_idea_3_desc: "我们将明确一条不依赖军事力量的国家发展道路，将资源和人才重新导向民用领域。通过优先强化工业基础与城市功能，加速民用产业与办公区域建设，我们将提升民众生活水平并推动经济增长。"
 JAP_prioritizing_order_modifier: "$JAP_prioritizing_order$"
 JAP_prioritizing_order_modifier_desc: "$JAP_prioritizing_order_desc$"
 JAP_strengthening_cabinet_modifier: "$JAP_strengthening_cabinet$"
 JAP_strengthening_cabinet_modifier_desc: "$JAP_strengthening_cabinet_desc$"
 JAP_regulatory_reform_modifier: "监管改革与增长战略"
 JAP_regulatory_reform_modifier_desc: "我们将增强国内竞争力，转向能够维持稳定增长的体系。通过减少对企业活动的限制，我们将利用私营部门的活力来推动产业和就业向前发展。"
 JAP_patriotic_education_modifier: "$JAP_patriotic_education$"
 JAP_patriotic_education_modifier_desc: "$JAP_patriotic_education_desc$"
 JAP_strengthen_military_idea: "$JAP_strengthen_military_power$"
 JAP_strengthen_military_idea_desc: "$JAP_strengthen_military_power_desc$"
 JAP_jsdf_international_missions_idea1a: "国际合作任务制度基础"
 JAP_jsdf_international_missions_idea1a_desc: "国际合作任务所需的法律框架和行动标准建设取得进展。随着海外派遣程序与任务期间应对标准日益明晰，部队行动稳定性与现场决策一致性正得到提升。"
 JAP_constitutional_debate_idea: "宪法辩论升级"
 JAP_constitutional_debate_idea_desc: "安保政策的重大转变动摇了战后秩序长期以来的既定认知。尽管加强国防建设的支持声浪日益高涨，但担忧和平主义退潮的反对力量依然强大，社会与政治领域的对立正不断加剧。"
 JAP_f15_programe: "F15升级计划"
 JAP_submarine_modernization_idea: "潜艇现代化计划"
 JAP_carrier_aviation: "航空母舰复兴"
 JAP_keen_sword_operation_idea: "“利剑”联合演习"
 JAP_defense_technology_agency1: "日本防卫技术厅"
 JAP_defense_technology_agency1_desc: "日本防卫技术厅统筹协调工业界、学术界与武装部队之间的研究、开发及采购工作。通过将先进项目统一纳入单一战略视野之下，日本加速了创新进程，减少了资源重复投入，并确保前沿技术能够更快地配发至一线作战单位。"
 JAP_diplomacy_modifier: "日本外交政策"
 JAP_diplomacy_modifier_desc: "日本重视与关键国家的双边关系，在经济、安全、文化等领域深化合作。通过务实且基于共同利益的伙伴关系，日本正不断增强其全球影响力。"
 JAP_chiang_mai_initiative: "清迈倡议"
 JAP_chiang_mai_initiative_desc: "随着与日本货币互换协议的扩大，东盟成员国增强了抵御金融危机的能力，提升了经济稳定性和自主性。"
 JAP_quantitative_oda_idea: "日本基础设施投资"
 JAP_quantitative_oda_idea_desc: "日本的官方发展援助加速了交通、港口和电力等基础设施的建设。这一支持为我国的经济增长奠定了重要基础。"
 JAP_qualitative_oda_idea: "日本人力资本与创新投资"
 JAP_qualitative_oda_idea_desc: "与日本的合作为教育、人力资源发展和研究领域带来了显著进步。加强本地企业和机构的能力为可持续发展铺平了道路。"
 JAP_security_south_china_sea_idea: "日本海上维和行动"
 JAP_security_south_china_sea_idea_desc: "日本在南海海事安全方面的中立参与有助于缓解地区紧张局势，保护航行自由。它为我们地区提供了可靠的稳定力量。"
 JAP_jap_education: "日美教育交流计划"
 JAP_jap_education_desc: "一项融合日本纪律性与美国创业精神的混合教育项目正在试点中。这种优势互补的学习方式为下一代的发展提供了宝贵的激励。"
 JAP_jap_education_culture: "日美文教合作"
 JAP_jap_education_culture_desc: "日本与美国之间正在构建更为全面的伙伴关系，其合作范围已超越流行文化与尖端科技领域。通过日本注重纪律的教育体系与美国崇尚创造力的文化理念相融合，双方在人才培养方面不断深化。这种文化亲和力与科技协作的协同效应，既促进了社会稳定性，也为创新注入了持续动力。"
 JAP_dual_use_idea: "日美两用技术合作"
 JAP_dual_use_idea_desc: "日本与美国在军民两用技术领域的合作正在加强。加速研发与共享专业知识有望在未来民用和军用领域带来更强的竞争力。"
 JAP_disaster_countermeasure_cooperation_idea: "防灾抗灾合作"
 JAP_disaster_countermeasure_cooperation_idea_desc: "通过与日本的灾害应对合作，台湾地区显著提升了应对紧急情况的能力。知识交流和联合培训项目有望减少损失并加快恢复进程。"
 JAP_tai_high_technology_idea: "日台先进技术伙伴关系"
 JAP_tai_high_technology_idea_desc: "与日本的联合研究正在加速台湾民用科技领域的创新。共享研究资源和国际合作正在提升产业竞争力。"
 JAP_tai_international_student_idea: "日本培养的下一代"
 JAP_tai_international_student_idea_desc: "日本扩大留学机会，让更多台湾学生能够获得多元的学术体验。这有助于培养未来推动日台关系发展的领军人才，并拓宽国际视野。"
 JAP_chi_kor_intellectual_platform: "东亚记忆对话平台"
 JAP_chi_kor_intellectual_platform_desc: "在联合国支持下，中日韩三国共同启动历史记忆共享与理解深化联合知识平台。这一创新性国际机制标志着三国在历史反思与前瞻合作间实现了新的平衡。"
 JAP_chi_trade_support_idea: "贸易体系国际化"
 JAP_chi_trade_support_idea_desc: "在日本的技术和制度支持下，中国正推进符合国际标准的贸易体系建设。简化海关手续、修订法律等改革措施，正助力制度现代化进程。"
 JAP_chi_advancement_companies_idea: "对日工业一体化"
 JAP_chi_advancement_companies_idea_desc: "日企与华企的共同扩张正在优化生产网络，深化两国经济相互依存关系。"
 JAP_chi_kanji_idea: "中华文化圈合作"
 JAP_chi_kanji_idea_desc: "通过与日本的文化合作，中国正在加强\"中华文化圈\"内部的交流。这有助于提升软实力和改善国际形象。"
 JAP_chi_temple_idea: "联合佛教遗产保护"
 JAP_chi_temple_idea_desc: "通过与日本共同保护和修复佛教寺庙及文化遗产，中国正在重申其宗教遗产的价值，同时促进旅游业发展。"
 JAP_kor_accelerator_idea: "东京-首尔企业孵化器"
 JAP_kor_accelerator_idea_desc: "首尔与东京共同建立的创业支持框架，正在培育新一代企业家，并加强两市间的技术合作。"
 JAP_kor_local_companies_idea: "地方商业交流计划"
 JAP_kor_local_companies_idea_desc: "通过韩国与日本当地企业间的商业交流，区域经济正得到振兴，新的私营部门产业网络正在形成。"
 JAP_kor_aging_idea: "联合老龄化社会工作组"
 JAP_kor_aging_idea_desc: "为应对共同面临的人口老龄化挑战，韩国与日本专家组成联合工作组，旨在交流政策经验并加强社会福利措施。"
 JAP_sov_logistics_corridor_idea: "日俄欧亚物流网络"
 JAP_sov_logistics_corridor_idea_desc: "通过与日本合作，经由俄罗斯连接日本与欧洲的物流通道正在建设中。基础设施升级与经济联动正提升俄罗斯的地缘政治重要性。"
 JAP_sov_it_corridor_idea: "日俄数字互联倡议"
 JAP_sov_it_corridor_idea_desc: "在日本的支持下，俄罗斯正在扩展其信息技术基础设施。日俄合作旨在构建广泛的数字走廊，为全球信息交流奠定基础。"
 JAP_territorial_disputes1: "领土谈判的政治收益"
 JAP_territorial_disputes1_desc: "随着长期存在的领土问题取得一定进展，周边海域紧张局势有所缓和，国内舆论也开始弥漫着一种如释重负的氛围。外交不确定性的减少，正通过改善经营环境对沿海地区的经济活动产生积极影响，为渔业相关税收基础提供支撑。"
 JAP_monarchist_shipbuilding_idea: "帝国海军建设动员"
 JAP_monarchist_shipbuilding_idea_desc: "帝国将重返海洋，将其作为天然疆域。在帝国海军建设计划的推动下，船厂得以扩建，合同实现集中管理，生产以持续的战争节奏推进，直至舰队规模与日本的雄心相匹配。以天皇之名奠基，海洋终将属于帝国！"
 JAP_monarchist_shipbuilding_idea_tt: "§R此国家精神将在你成为§! §Y$naval_power_of_the_continent$§!时失效§!"
 JAP_restoring_imperial_household_idea: "菊花王座复临"
 JAP_restoring_imperial_household_idea_desc: "皇室正在重建为国家机构，而非装饰性的宫廷。其办公机构得以扩充，礼仪规范正式确立，并通过任命将各部委和社会更紧密地联系于皇权之下，从而恢复其影响力。皇室将再次成为凝聚国家力量、引领国家方向的无声引擎。"
 JAP_once_millennium_disaster: "千年一遇的浩劫"
 JAP_once_millennium_disaster_desc: "2011年3月11日发生的东日本大地震，堪称日本现代史上最惨重的灾难之一。地震与海啸瞬间摧毁了基础设施、工业体系与民生根基，使整个国家陷入严重动荡。重建之路漫长而艰难，需要耗费巨大的资源与时间。"
 JAP_scars_earthquake_and_tsunami: "地震与海啸的创伤"
 JAP_scars_earthquake_and_tsunami_desc: "东日本大地震及其引发的毁灭性海啸，给东北地区的城市、港口及沿海社区造成了灾难性破坏。基础设施和工业设施被摧毁，严重削弱了当地的生产力与民生。灾后重建将历时多年，需要投入巨大的资源与努力。"
 JAP_scars_earthquake: "地震的创伤"
 JAP_scars_earthquake_desc: "东日本大地震的余波同样波及关东地区，交通网络受到严重影响，部分工业基础遭到破坏。就连首都圈的经济活动也一度陷入停滞。虽然受灾程度不及东北地区，但恢复仍需投入大量时间和精力。"
 JAP_focus_renewable_energy_idea: "注重可再生能源"
 JAP_focus_renewable_energy_idea_desc: "对核安全的担忧促使我们优先发展可再生能源，从而增强了我们在发电领域的长期自主性。"
 JAP_focus_energy_TT: "额外支出：GDP的§R0.01%§!"
 JAP_focus_thermal_power_idea: "注重化石燃料发电厂"
 JAP_focus_thermal_power_idea_desc: "选择化石燃料发电厂能确保稳定的输出和即时供应，特别是在核能安全仍是国家关切焦点的情况下。"
 JAP_anxiety_nuclear_power: "公众核能焦虑"
 JAP_anxiety_nuclear_power_desc: "福岛第一核电站事故的冲击，已在全社会范围内引发对核能的恐惧与不信任。公众的反对声浪和程序上的拖延，正使新核电站的建设陷入停滞，而政治动荡也持续不断。"
 JAP_shut_down_nuclear_plants: "关闭所有核电站"
 JAP_shut_down_nuclear_plants_desc: "政府决定关停核电，直接回应了公众的担忧。尽管仍有反对声音，但这一决定被广泛视为将安全置于首位，社会动荡正逐渐平息。"
 JAP_nuclear_strict_examination: "收紧核安全标准"
 JAP_nuclear_strict_examination_desc: "针对此次事故，监管规定与审查程序已大幅强化。新建项目与重启机组如今需要额外措施和冗长流程，导致核电扩张速度放缓，且难以维持原有运行水平。"
 JAP_continue_nuclear_plants: "继续核能发电"
 JAP_continue_nuclear_plants_desc: "政府决定继续发展核电，但事故的记忆依然历历在目。对安全问题的质疑与反对声浪持续发酵，不断激化政治矛盾，正逐渐侵蚀国内的稳定根基。"
 JAP_crown_centered: "皇道思想复兴"
 JAP_crown_centered_desc: "在森首相发表讲话后，传统主义者和君主主义者的言论开始在某些圈子里获得势头。由于政府已表现出利用这一趋势的意愿，一场寻求重新评估皇室作为国家核心原则的运动开始获得有限但日益增长的政治影响力。"
 JAP_monarchist_modifier: "帝国统治"
 JAP_monarchist_modifier_desc: "皇权重掌号令，国家现依帝国诏令而非党派博弈运转。各部委、安全机构与工业体系皆统一于单一信条之下，视天皇为合法性与方向的唯一源泉。"
