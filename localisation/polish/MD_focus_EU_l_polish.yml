 EU_Tech_Share_name: "Europejska Agencja Obrony (EDA)"
 EU_Tech_Share_desc: "Państwa członkowskie łączą swoje wysiłki badawcze. Europejska Agencja Obrony (EDA) koordynuje wysiłki państw członkowskich Unii Europejskiej."
 tooltip_ECB_Start_OMT_effect: "§GOPo kliknięciu lewym przyciskiem:§! §Program YOMT§! stanie się dostępny.\n\n§GPo kliknięciu prawym przyciskiem myszy:§! §YOMT Limit rozmiaru§! > 0 dolarów."
 tooltip_ECB_adjust_OMT_limit_effect: "§GOPo kliknięciu lewym przyciskiem:§! §YOMT Limit rozmiaru§!: Dodaj §G+200$§! miliardów.\nWszystkie państwa członkowskie z §Ystopą procentową§! < §R4.0%§!: Dodaj §R+5%§! Eurosceptycyzm.\nWszystkie państwa członkowskie z §Ystopą procentową§! > §R4.0%§!: Dodaj §G-5%§! Eurosceptycyzm.\n\n§GPo kliknięciu prawym przyciskiem myszy:§! §YOMT Limit rozmiaru§!: Dodaj §R-200$§! miliardów.\nWszystkie państwa członkowskie z §Ystopą procentową§! < §R4.0%§!: Dodaj §G-5%§! Eurosceptycyzm.\nWszystkie państwa członkowskie z §Ystopą procentową§! > §R4,0%§!: Dodaj §R+5%§! Eurosceptycyzm.\n"
 tooltip_ECB_Outright_Monetary_Transactions_available: "§YOMT Limit rozmiaru§! > 0 dolarów."
 tooltip_ECB_Outright_Monetary_Transactions_complete_effect: "Wszystkie państwa członkowskie, których §Ystopa procentowa§! jest większa niż §R4,0%§!: mają dług, który jest redukowany do czasu, gdy §Ystopa procentowa§! spadnie poniżej §R4,0%§! ORAZ §Glimit wielkości OMT§! jest większy niż §Bcałkowita wartość OMT§!.\n"
 tooltip_ECB_Outright_Monetary_Transactions_remove_effect: "Wszystkie państwa członkowskie posiadające §Konto BOMT§! > $0: §RADodaj§! §Konto BOMT§! do długów.\n"
 EU_exit_category: "Wystąpienie z Unii Europejskiej"
 EU_exit_category_desc: "With rising Euroscepticism throughout the Union some member states will think about leaving §C[EUU.GetFlag] The European Union§!."
 Article_50: "[THIS.GetName] powołał się na Artykuł 50"
 EU_Article_50: "Opuść Unię Europejską! (Artykuł 50)"
 EU_Article_50_desc: "„Każde państwo członkowskie może podjąć decyzję o wystąpieniu z Unii zgodnie ze swoimi własnymi wymogami konstytucyjnymi.”\n– Artykuł 50 ust. 1 Traktatu o Unii Europejskiej.\n\n Pierwszy artykuł 50 został opracowany na potrzeby Traktatu Konstytucyjnego na rok Unia Europejska. Po niepowodzeniu procesu ratyfikacji Konstytucji Europejskiej klauzula ta została włączona do Traktatu Lizbońskiego."
 EU_Revoke_Article_50: "Unieważnić artykuł 50"
 EU_Revoke_Article_50_desc: "Revoke Article 50 and remain in §C[EUU.GetFlag] The European Union§!\n\"Article 50 TEU must be interpreted as meaning that, where a Member State has notified the European Council, in accordance with that article, of its intention to withdraw from the European Union, that article allows that Member State, for as long as a withdrawal agreement concluded between that Member State and the European Union has not entered into force or, if no such agreement has been concluded, for as long as the two years laid down in Article 50(3) TEU, possibly extended by that paragraph, has not expired, to revoke that notification unilaterally, in an unequivocal and unconditional manner, by a notice addressed to the European Council in writing, after the Member State concerned has taken the revocation decision in accordance with its constitutional requirements. The purpose of that revocation is to confirm the EU membership of the Member State concerned under terms that are unchanged as regards its status as a Member State, and that revocation brings the withdrawal procedure to an end.\"\n- Judgment of the Court of Justice of the European Union in Case C-621/18"
 EU_exit: "Leaving the EU"
 EU_exit_desc: "§Y[ROOT.GetNameWithFlag]§! powiadomił Radę Europejską o swoim zamiarze wystąpienia z §C[EUU.GetFlag] Unii Europejskiej§!. §Y[ROOT.GetNameWithFlag]§! opuści Unię dwa lata po powiadomieniu."
 EU_extend_Article_50: "Rozszerzenie artykułu 50"
 EU_extend_Article_50_desc: "Zapytaj §C[EUU.GetFlag] Unię Europejską§! o przedłużenie art. 50 i opuścić Unię na później."
 EU_exit_three_month: "Three-month extension"
 EU_exit_three_month_desc: "§Y[ROOT.GetNameWithFlag]§! otrzymał trzymiesięczne przedłużenie art. 50 od §C[EUU.GetFlag] Unia Europejska§!. §Y[ROOT.GetNameWithFlag]§! opuści Unię po upływie trzech miesięcy."
 EU_withdrawal_treaty: "Traktat o wystąpieniu"
 EU_withdrawal_treaty_desc: "§Y[ROOT.GetNameWithFlag]§! oraz państwa członkowskie §C[EUU.GetFlag] Unia Europejska§! uzgodniły traktat o wystąpieniu."
 EU_prepared_no_deal_exit: "Przygotuj wyjście bez umowy"
 EU_prepared_no_deal_exit_desc: "§C[EUU.GetFlag] Unia Europejska§! i jej słabowiti lokaje oraz ci napompowani biurokraci w Brukseli odmawiają nam korzystnego traktatu o wystąpieniu. Musimy przygotować nasz kraj na nieuniknione wyjście z UE bez porozumienia, chyba że coś się wydarzy."
 cant_invoke_article_50: "§Y[ROOT.GetNameWithFlag]§! niedawno uchylił §Yartykuł 50§! decyzja (Pozostało dni: [?cant_invoke_article_50:days_left|Y0])"
 EU_article_50_available_click: "Wymagania wstępne:\n[!EU_Article_50_click_enabled]\nEfekty:\n§Y[ROOT.GetNameWithFlag]§! zacznie wychodzić z §C[EUU.GetFlag][EUU.GetName]§!"
 EU_article_50_available_delayed: "„Każde państwo członkowskie może podjąć decyzję o wystąpieniu z Unii zgodnie ze swoimi własnymi wymogami konstytucyjnymi.”\n– Artykuł 50 ust. 1 Traktatu o Unii Europejskiej. -\nPierwszy artykuł 50 został opracowany na potrzeby Traktatu Konstytucyjnego Unii Europejskiej. Po niepowodzeniu ratyfikacji Konstytucji klauzula ta została włączona do Traktatu Lizbońskiego."
 tooltip_EU_exit_available: "§Y[ROOT.GetNameWithFlag]§! obecnie nie próbuje opuścić §C[EUU.GetFlag][EUU.GetName]§!"
 tooltip_EU_exit_cancel_trigger: "§Y[ROOT.GetNameWithFlag]§! ma decyzję §YUchylenie art. 50§! aktywowany."
 tooltip_EU_Revoke_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!."
 tooltip_EU_Revoke_Article_50_effect: "§Y[ROOT.GetNameWithFlag]§! stays in §Y[EUU.GetFlag] The European Union§!. Mission §YLeaving the EU§! AND Mission §YThree-month extension§! is removed.\nYou won't be able to invoke §YArticle 50§! for the next §Y180 days§!."
 tooltip_EU_extend_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!  \nAND [ROOT.GetNameWithFlag] must have > 25% influence on the European Union's Leader of Foreign Policy."
 tooltip_EU_remove_laws_and_offices: "Usuń wszystkie §YEU prawa i urzędy§!.\n"
 EU_defense_category: "Polityki obronne UE"
 EU_defense_category_desc: "In the 1950s the idea of the European Defence Community collapsed when it failed to obtain ratification in the French Parliament. Its successor became the Common Security and Defence Policy of the European Union. With the majority of European Nations being members of the North Atlantic Treaty Organization (NATO), there wasn't seen the need for an own European Defense Organization throughout the 20th century. But with rising world tensions in the 21st century, this is changing."
 EU_Frontex_take_control: "Przejmij kontrolę nad siłami Frontexu"
 EU_Frontex_take_control_desc: "W ostatnich latach na zewnętrznych granicach Europy odnotowano bezprecedensowy wzrost liczby migrantów i uchodźców pragnących przedostać się do UE. Kraje posiadające granicę zewnętrzną ponoszą wyłączną odpowiedzialność za kontrolę graniczną. Frontex może jednak zapewnić dodatkowe wsparcie techniczne krajom UE stojącym w obliczu poważnej presji migracyjnej.\n Czyni to poprzez koordynację rozmieszczania dodatkowego wyposażenia technicznego (np. samolotów i łodzi) oraz specjalnie wyszkolonego personelu granicznego."
 EU_EuroNavy_take_control: "Przejmij kontrolę nad EuroNavy"
 EU_EuroNavy_take_control_desc: "Ponieważ w XXI wieku wielonarodowe floty i grupy zadaniowe stają się coraz bardziej powszechne i ważne, państwa członkowskie §C[EUU.GetFlag] Unia Europejska§! postanowili połączyć swoje siły i przekazać swoje okręty wojenne zjednoczonemu Europejskiemu Dowództwu Marynarki Wojennej znanemu jako §YEuroNavy§!."
 EU_EuroArmy_take_control: "Przejmij kontrolę nad EuroArmy"
 EU_EuroArmy_take_control_desc: "Państwa członkowskie §C[EUU.GetFlag] Unia Europejska§! podjął decyzję o powołaniu wspólnych sił zbrojnych znanych jako §YEuroArmy§!"
 EU_create_EDU: "Utwórz Europejską Unię Obronną (EDU)"
 EU_create_EDU_desc: "Aby osiągnąć niezbędną autonomię strategiczną w celu obrony swoich zbiorowych interesów, reagowania na zewnętrzne konflikty i kryzysy oraz zapewnienia bezpieczeństwa w naszym sąsiedztwie, państwa członkowskie zdecydowały się utworzyć §YEuropejską Unię Obrony (EDU)§! jako sojusz wojskowy i wspólnie opuścić §YNATO§!."
