 LIB.conservatism: "£LIB_conservatism_small （LNU）- 民主変革会議"
 LIB.liberalism: "£LIB_liberalism_small （UP）- 統一党"
 LIB.liberalism_desc: "(Liberal Democracy) - The Unity Party is the main opposition party to Taylor. The party was created in 1984 to run in the first elections against Samuel Doe after the coup of 1980. The party advocates liberal democracy and economic liberalisation. It also advocates closer ties with the US, who has been the traditional ally of the country."
 LIB.Western_Autocracy: "£LIB_Western_Autocracy_small  (NDPL) リベリア国民民主党"
 LIB.Western_Autocracy_desc: "ナショナリズム - リベリア国民民主党は、かつてサミュエル・ドウ博士が率いた政党である。ドウは強権的かつ反共産主義、反フリーメイソンを掲げつつも、リベリアをアメリカに接近させた。第一次リベリア内戦におけるドウの打倒と死後、彼の盟友である軍閥や閣僚たちが同党を維持し続けている。"
 LIB.anarchist_communism: "£LIB_anarchist_communism_small （LPP）- リベリア人民党"
 LIB.anarchist_communism_desc: "(Democratic Socialism) - The Liberian People's Party is a pan-African socialist party."
 LIB.Nat_Autocracy: "£LIB_Nat_Autocracy_small (AFL) リベリア軍"
 LIB.Nat_Autocracy_desc: "軍事政権 - テイラーが権力を掌握した後、彼は実質的にリベリア軍の人員を大幅に削減し、代わりに自身の私兵組織である「対テロ部隊」を優遇した。軍は2000年代初頭までに事実上消滅状態に追い込まれ、テイラーは人員の大部分を退役させた。"
 LIT.conservatism: "£LIT_conservatism (TS-LKD) Homeland Union – Lithuanian Christian Democrats"
 LIT.conservatism_icon: "£LIT_conservatism"
 LIT.conservatism_desc: "(Christian Democracy) - Also known simply as the Conservatives, the Homeland Union is a Christian Democratic party in Lithuania. It espouses liberal conservative social policies and supports both free market capitalism and greater integration with Europe through the European Union."
 LIT.liberalism: "£generic_liberalism_small (LLS) Liberal Union of Lithuania"
 LIT.liberalism_desc: "(Classical Liberalism) - Initially promoting itself as a right-wing party, the Liberal Union of Lithuania has moved more towards the center as Lithuania's young democracy has evolved."
 LIT.socialism: "£generic_socialism_small (LSDP) Social Democratic Party of Lithuania"
 LIT.socialism_desc: "(Third Way) - Restored after the dissolution of the USSR, the LSDP has been dominated by those seeking to pull the party in a more left-ward direction and those who want to maintain a more pragmatic populist agenda influenced heavily by other social democratic parties. Despite this friction, the party maintains a commitment to nominally social democratic ideals, supporting welfare and worker rights as well as LGBTQ rights and opposition to austerity."
 LIT.Western_Autocracy: "£generic_Western_Autocracy_small (NS) 新同盟（社会自由党）"
 LIT.Western_Autocracy_desc: "社会自由主義 - 1998年に結成された新同盟は、社会自由主義的な政策と綱領を掲げており、自らが国民の自由、社会的連帯、そして福祉を推進する存在であると位置づけている。"
 LIT.Communist-State: "£generic_Communist_State_small Communist Party of Lithuania"
 LIT.Communist-State_desc: "(Marxism-Leninism) - Banned in Lithuania under anti-communism laws, the Communist Party of Lithuania has continued to exist in various forms or informal networks - with more moderate parties maintaining ties with former members or actively advocating for its formal refoundation."
 LIT.anarchist_communism: "£generic_anarchist_communism_small (LSP) Socialist Party of Lithuania"
 LIT.anarchist_communism_desc: "(Socialism of the 21st century) - The LSP is a party which split from the more moderate Democratic Labour Party of Lithuania, formed by members who viewed it as moving too far to the right. While not espousing Marxism-Leninism, the party has advocated for the release of pro-Soviet dissidents and has connections to the banned Communist Party of Lithuania."
 LIT.Neutral_conservatism: "£generic_Neutral_conservatism_small (LKDP) Lithuanian Christian Democratic Party"
 LIT.Neutral_conservatism_desc: "(Christian Democracy) - A refoundation of a political party in the former Lithuanian state, the LKDP advocates for more traditional Christian Democratic views and policies."
 LIT.neutral_Social: "£generic_neutral_Social_small (LDDP) Democratic Labour Party of Lithuania"
 LIT.neutral_Social_desc: "(Left Social Democracy) - Formed as one of several successors to the banned Communist Party of Lithuania, the LDDP maintains a connection with several other leftist parties in the country."
 LIT.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (LS) 自由運動"
 LIT.Neutral_Libertarian_desc: "保守自由主義 - 自由運動は、経済面ではリベラルな政策を掲げつつ、社会問題に関してはより穏健な立場をとっているが、一部の派閥はさらに右寄りの傾向にある。"
 LIT.Neutral_Autocracy: "£generic_Neutral_Autocracy_small (LCS) リトアニア中道連合"
 LIT.Neutral_Autocracy_desc: "農本主義 - リトアニア国家の創設期に重要な役割を果たしたロムアルダス・オゾラスをはじめ、民主化を支持する「リトアニア改革連合」の元メンバーらによって設立されたリトアニア中道連合は、リトアニアの「無制限の自由」を支持し、欧州連合への統合には反対する一方で、ロシアや同国のソ連時代の過去に対しても依然として反対の姿勢を貫いている。"
 LIT.Neutral_green: "£LIT_green (LVZS) リトアニア農民・緑の連合"
 LIT.Neutral_green_icon: "£LIT_green"
 LIT.Neutral_green_desc: "環境保守主義 - リトアニア農民・緑の連合は経済面では一貫して左派の立場を堅持してきたが、社会面では社会的保守主義とよりリベラルな影響との間で揺れ動いてきた。党の初期の変遷は、見解や政策の変遷によって特徴づけられている。"
 LIT.Nat_Autocracy: "£generic_Nat_Autocracy_small リトアニア国軍"
 LIT.Nat_Autocracy_desc: "実用的軍事政権 - 現代のリトアニア軍は、国内の政治にほとんど影響を与えてこなかった。その近年の活動は、主にロシアによる侵略の可能性への対応や、NATO同盟国に対する義務の履行に重点が置かれてきた。"
 LIT.Nat_Fascism: "£generic_Nat_Fascism_small (LNP) リトアニア国家民主党"
 LIT.Nat_Fascism_desc: "超国粋主義 - リトアニア国家民主党は、極右政党であり、EU懐疑主義および名目上は反自由主義的な立場を掲げている。同党は反全体主義・反アナキズムを標榜しつつも、より穏健な路線を歩んでいると自認しており、国際貿易や資本主義を支持し、福祉政策への支持も表明している。"
 LIT.Nat_Populism: "£generic_Nat_Populism_small 若きリトアニア党"
 LIT.Nat_Populism_desc: "国家保守主義 - 1924年から1940年までリトアニアに存在した極右のコーポラティズム政党にちなんで名付けられた「ヤング・リトアニア」は、その名前の由来となった政党と政策面で一部共通点を持つ。しかし、選挙での成功は限定的であり、右派の大政党の存在が政策実行の妨げとなっている。"
 LIT.Monarchist: "£generic_Monarchist_small ヴュルテンベルク家"
 LIT.Monarchist_desc: "立憲君主制 - ヴュルテンベルク家の分家であるウラッハ家は、第一次世界大戦の終戦間際、リトアニアで短期間ながら権力を掌握した。ドイツ君主制の樹立は失敗に終わったものの、彼らはリトアニアの領土を統治した王家の中で、現在も存続している唯一の家系である。"
