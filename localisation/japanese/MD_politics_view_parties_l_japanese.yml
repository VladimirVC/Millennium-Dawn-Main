 SPR.Neutral_conservatism_2017: "£generic_Neutral_conservatism_small (AES) スペイン・オルタナティブ"
 SPR.Neutral_conservatism_2017_icon: "£generic_Neutral_conservatism_small"
 SPR.Neutral_conservatism_2017_desc: "保守主義 - スペイン・オルタナティブ（スペイン語：Alternativa Española）は、国家保守主義を掲げる右派政党であり、国民党によるスペイン国民とそのカトリック有権者への裏切りによって誕生したと主張している。同党は、自治州制度に断固反対しており、ネオ・ファシストたちの受け皿となり得る政党と見なされている。"
 SPR.neutral_Social_2017_icon: "£SPR_unidas_podemos"
 SPR.neutral_Social_2019: "£SPR_unidas_podemos (UP) ウニダス・ポデモス"
 SPR.neutral_Social_2019_icon: "£SPR_unidas_podemos"
 SPR.neutral_Social_2019_desc: "社会民主主義 - ウニダス・ポデモス（スペイン語：Unidos Podemos、団結すれば我らはできる）は、ポデモスとその他多くの小規模左派政党によって結成された政治連合である。同党は、スペインにおける直接民主主義、連邦主義、そして真の共和主義を提唱しており、緊縮財政に断固として反対している。\n"
 SPR.oligarchism: "£generic_oligarchism_small ラ・パカ・クラン"
 SPR.oligarchism_desc: "寡頭政治 - ラ・パカ・クランはスペイン最大のジプシー・クランの一つである。「ラ・パカ」の異名を持つ女家長はスペイン随一の麻薬王の一人である。\n"
 SPR.Neutral_Libertarian_icon: "£SPR_centro_democratico"
 SPR.Neutral_Libertarian_2017: "£SPR_partido_libertarian (PL) リバタリアン党"
 SPR.Neutral_Libertarian_2017_icon: "£SPR_partido_libertarian"
 SPR.Neutral_Libertarian_2017_desc: "リバタリアン - リバタリアン党（スペイン語：Partido Libertario）は、古典的自由主義、リバタリアニズム、アナキスト資本主義、非介入主義を掲げる。同党は、アイン・ランドの客観主義思想から多大な影響を受けている。\n"
