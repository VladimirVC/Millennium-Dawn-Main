 NKO_trade_agreements_with_sirya_desc: "Заключение торговых соглашений с [SYR.GetName] расширит экономическое сотрудничество. Мы будем вести переговоры на выгодных условиях, чтобы обеспечить взаимовыгодное сотрудничество и укрепить наши двусторонние отношения."
