 CPD_country_action_regime_change: "§YRegime Change§!"
 CPD_country_action_military_basing: "§YMilitary Basing§!"
 CPD_country_action_full_puppet: "§YFull Puppet§!"
 CPD_country_action_ceasefire_TT: "A §YCeasefire§! ends the war with the current front line as the new border. A §Y720-day§! truce holds afterward.\n\nClick to remove from deal."
 CPD_country_action_war_reparations_TT: "§YWar Reparations§! force the loser to pay a weekly portion of their GDP to the receiver for one year.\n\nClick to remove from deal."
