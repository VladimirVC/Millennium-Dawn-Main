 CYBER_GPS_BTN_TT_DELAYED: "特殊なマルウェアが標的の衛星受信インフラに侵入し、軍用航法システムへ偽装信号を大量に送り込む。前線では、デジタル地図から見慣れた目印が消え、指揮官たちは部隊の連携に苦しむ。精密な航法が機能しなくなると、日常的な作戦行動でさえ危険を伴うものとなる。"
 CYBER_SIGINT_BTN_TT_DELAYED: "持続的な侵入プログラムが標的の通信基幹網へ静かに潜り込み、政府、軍事、外交の各チャネルを流れる通信データを複製する。週を追うごとに傍受された情報は、標的の意図、脆弱性、内部対立の詳細な全体像を形作っていく－－これは通常のスパイでは到底収集できない情報である。"
 CYBER_RADAR_BTN_TT_DELAYED: "存在しない航空機の幻影が標的の防空レーダー画面に現れる。オペレーターは実在しない航空機を追跡するため警戒体制を消耗し、幽霊を追い続ける。実際の航空機はその隙間をすり抜けて検知されない。効果の持続は短いが、30日間の航空探知能力の低下は作戦において決定的となり得る。"
 CYBER_ECON_BTN_TT_DELAYED: "決済処理システムがエラーを連発し始める。取引アルゴリズムは破損したデータフィードによって機能不全に陥る。工場の制御装置には不正な更新パッケージが送り込まれる。この攻撃は否認可能となるよう設計されている－－一見無関係に見える技術的障害の連鎖が、数か月にわたり静かに標的国の経済生産を蝕んでいく。"
 CYBER_PROP_BTN_TT_DELAYED: "数千もの連携したアカウントが標的のメディア環境に相反する物語を氾濫させる。捏造された政府文書がソーシャルネットワーク上で拡散される。目的は欺くことではなく、疲弊させることにある。－－事実と虚構を区別できなくなった国民は、政府を含むあらゆる制度への信頼を失っていく。"
 CYBER_ELECT_BTN_TT_DELAYED: "有権者登録システムが密かに改ざんされる。投票日直前には、野党指導者のディープフェイク映像が拡散される。ソーシャルメディアのアルゴリズムは既存の分断を拡大するよう操作される。標的国の民主的制度は破壊されない－－しかし、密かに信頼を失わせられ、開票前からその結果が疑われるようになる。"
 CYBER_ESPION_BTN_TT_DELAYED: "スピアフィッシング攻撃により、標的の最も機密性の高い研究ネットワークへ専用のマルウェアが埋め込まれる。マルウェアは数か月にわたり横展開し、設計図、試験データ、独自の配合式を収集する。侵害が発覚した頃には、我々の研究者はすでに盗んだ成果を基に開発を進めている。"
 CYBER_COMMS_BTN_TT_DELAYED: "静かな中間者が標的の機密性の高い通信ノードの間に入り込む。将軍の命令、大使の電報、閣僚会議の議論－－それらはすべて同じ侵害された中継点を通過する。情報は複製され、分類され、リアルタイムで我々の分析官へ届けられる。標的は、我々がそのすべてを傍受していることに気づかぬまま、意思決定を続ける。"
 CYBER_INFRA_BTN_TT_DELAYED: "電力供給、水処理、物流拠点などを管理する産業制御システムに、静かに悪意あるファームウェア更新が送り込まれる。ペイロードが作動すると、連鎖的な障害が複数の分野で同時に発生し、修復チームを圧倒する。その被害は現実の物理的なものであり、回復には長い時間を要する。"
 CYBER_FIN_BTN_TT_DELAYED: "中央銀行の決済システムが停止する。ATMネットワークは全国的に機能不全に陥る。通貨取引アルゴリズムには悪意のあるデータが入力され、フラッシュクラッシュを引き起こす。この混乱は通常の制裁をはるかに超える影響を及ぼす－－さらに制裁と異なり、帰属は特定されない。"
 CYBER_LOG_BTN_TT_DELAYED: "補給管理ソフトウェアがすべての前線基地で同時にクラッシュする。弾薬要求は破損したキューの中で消え、燃料配分アルゴリズムは存在しない補給所へ車列を誘導する。敵の軍事機構は戦場で壊れるのではない－－その場で飢えるのだ。"
 CYBER_SLEEP_BTN_TT_DELAYED: "忍耐強く、緻密に、そして目立たず。我々の工作員は攻撃するために来たのではない－－留まり続けるために来たのだ。標的の重要ネットワーク基盤全体に休眠アクセス拠点が埋め込まれ、命令があれば即座に起動できるよう配置されている。今後一年間、彼らの最も機密性の高いシステムには秘密が存在しないかもしれない。"
 CYBER_CRIT_BTN_TT_DELAYED: "我々のサイバー兵器庫の全力が一斉に解き放たれる。電力網は麻痺し、軍事通信は崩壊し、工業生産は止まり、金融システムは凍結する。この作戦はデジタル版の戦略爆撃に等しく、国家権力のあらゆる領域を同時に機能不全へと追い込む。"
 CYBER_DECEPT_BTN_TT_DELAYED: "我々は標的のシステムを攻撃するのではなく、その思考を蝕む。捏造された情報分析、上級指揮官の認証署名を偽装した命令、最高レベルの意思決定者に提示される改ざん画像－－標的が下すあらゆる決定は、我々が作り出した現実の上に成り立っている可能性がある。"
 CYBER_ZERO_BTN_TT_DELAYED: "長年にわたり蓄積され、この瞬間のために温存されてきた未公開エクスプロイトの機密兵器庫が、標的の最重要システムへ同時に投入される。分析官が何が起きたのか理解する頃には、脆弱性はすでに使い尽くされ、被害は取り返しのつかないものとなっている。"
 CYBER_HARDEN_BTN_TT_DELAYED: "我々のセキュリティチームは、すべての公開インターフェースを監査し、既知の脆弱性をすべて修正し、外国情報機関が最も頻繁に探るプロトコルを強化する。地味な作業だが、閉じた扉一つ一つが敵の侵入経路を減らしていく。最高のサイバー作戦とは、そもそも実行されないものである。"
 CYBER_CNTRINT_BTN_TT_DELAYED: "分析官はネットワークログとシステムのテレメトリを精査し、外部からの侵入を示す微細な兆候を探す－－異常なアクセスパターン、予期しない外向き接続、正当な目的を持たない休眠プロセスなどだ。感染したネットワークを浄化する作業は遅く、慎重なものとなる。発見されていないマルウェアは、既知のものよりはるかに危険である。"
 CYBER_ATTRIB_BTN_TT_DELAYED: "我々のデジタルフォレンジックチームは攻撃経路を再構築する－－マルウェアの特徴を追跡し、コマンド＆コントロール（C&C）インフラをマッピングし、攻撃者のセキュリティパターンを記録する。侵入の背後にいる国家を特定することは、適切な対応策を講じるための第一歩である。"
