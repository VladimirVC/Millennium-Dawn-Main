 nationalist_propaganda_button_tt: "§Y民族主义§!宣传活动\n利用信息战，我们可以影响公众对世界局势的看法。然而，任何此类活动都只会在有限的时间内有效，因为人们会逐渐失去兴趣。\n\n§Y宣传活动花费§!修正：[?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§Y民族主义宣传活动花费§!修正：[?ROOT.modifier@nationalist_outlook_campaign_cost_modifier|-2%]\n\n§Y先决条件：§!\n[!nationalist_propaganda_button_click_enabled]\n§Y当启动时修正：§!\n[!nationalist_propaganda_button_click]"
