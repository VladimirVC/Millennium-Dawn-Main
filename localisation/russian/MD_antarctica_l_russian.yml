 ANTARCTICA_STATION_SHOW_BP_TEXT_DELAYED: "§YНеобходимые условия:§!\n[!antarctica_station_show_blueprint_button_click_enabled]\n§YЭффекты:§!\nПоказывает или скрывает панель чертежей выбранной станции"
 ANTARCTICA_STATION_FIND_OR_CREATE_TEXT: "Основать/Найти свою станцию"
 ANTARCTICA_STATION_FIND_OR_CREATE_TEXT_DELAYED: "§YЭффекты:§!\nВыбирает вашу антарктическую станцию и открывает её чертежи.\n\nЕсли вы не контролируете станцию, запускает процесс основания станции во внутренней зоне.\n- Стоимость основания:§R$15.00b§! (удваивается во время антарктической зимы).\n- Время основания:§Y45 дней§!(удваивается во время антарктической зимы).\n\nДо окончания текущего основания осталось:§Y[?antarctica_station_setup_days_remaining|0]§! дн."
 ANTARCTICA_STATION_FUEL_CAPACITY_TEXT: "[MD_antarctica_fuel_capacity_or_renewable]"
 ANTARCTICA_STATION_FUEL_CAPACITY_DAYS_TEXT: "Запас горючего: §Y[?selected_antarctica_station_output_fuel_capacity_days|0]§! дн."
 ANTARCTICA_STATION_BLACKOUT_TEXT: "Источник питания: §RАварийное отключение§!"
 ANTARCTICA_STATION_FULL_RENEWABLE_TEXT: "Источник питания:§GПолностью возобновляемая энергия§!"
 ANTARCTICA_STATION_ENERGY_BALANCE_TEXT: "Энергетический баланс: [?selected_antarctica_station_output_power|+0] кВт / §Y [?selected_antarctica_station_output_power_total|0] §! кВт"
 ANTARCTICA_STATION_AVAILABLE_STAFF_TEXT: "Доступный персонал: [?selected_antarctica_station_output_required_staff|+0]§Y[?selected_antarctica_station_output_total_staff|0]§!"
 ANTARCTICA_STATION_MAINTENANCE_COST_TEXT: "Стоимость содержания: $$[?selected_antarctica_station_output_upkeep_cost|-] млрд"
 ANTARCTICA_STATION_SEND_SUPPLIES_TEXT: "Отправить снабжение"
 ANTARCTICA_STATION_SEND_SUPPLIES_TEXT_DELAYED: "§YНеобходимые условия:§!\n[!antarctica_station_send_supplies_button_click_enabled]\n§YЭффекты:§!\nЗаправляет станцию до максимальной емкости топливных баков.\nСтоимость: §R$0.25b за 1000 ед. топлива§! (удваивается во время антарктической зимы).\nКазначейство списывает средства при заказе, топливо прибывает по истечении времени доставки.\n\n§YВремя доставки:§! §G15 дней (нояб.–март)§! или §R30 дней (апр.–окт.)§!"
 ANTARCTICA_STATION_SEND_OBSERVERS_TEXT: "Отправить наблюдателей"
 ANTARCTICA_STATION_SEND_OBSERVERS_TEXT_DELAYED: "§Y Необходимые условия:§!\n[!antarctica_station_send_observers_button_click_enabled]§Y Статус метели: §! [MD_antarctica_observer_blizzard_status]\n\n§Y Эффекты: §!\n Направляет миссию наблюдателей на выбранную станцию.\n Целевая страна получает немедленное уведомление.\n Наблюдатели прибывают через §Y 7 дней §! и проводят инспекцию на предмет незаконной деятельности лабораторий или использования установок с открытым контуром."
 ANTARCTICA_STATION_DISMANTLE_TEXT: "Уничтожить станцию"
 ANTARCTICA_STATION_DISMANTLE_TEXT_DELAYED: "§Y Необходимые условия: §!\n[!antarctica_station_dismantle_button_click_enabled]\n§YЭффекты:§!\nЗапускает процесс демонтажа выбранной станции.\nВремя демонтажа зависит от установленных модулей: §Y30 дней§! (базовое) + §Y20 дней§! за каждый установленный модуль.\nДо окончания текущего демонтажа осталось: §Y[?antarctica_station_dismantle_days_remaining|0]§! дн."
 ANTARCTICA_STATION_SEND_OBSERVERS_COUNTRY_LOCK_TT: "Ваша страна в данный момент не проводит других §Yмиссий наблюдателей§!"
 ANTARCTICA_STATION_SEND_OBSERVERS_STATION_LOCK_TT: "На выбранную станцию сейчас не направляются §Yнаблюдатели§!"
 ANTARCTICA_STATION_SEND_OBSERVERS_BLIZZARD_TT: "В Антарктике сейчас нет§Yметели§! (осталось §Y[?global.antarctica_blizzard_days_remaining]§! дн.)."
 ANTARCTICA_STATION_SEND_SUPPLIES_QUEUE_TT: "На выбранную станцию в данный момент не выполняется §Yдоставка снабжения§!"
 ANTARCTICA_BLIZZARD_STATUS_ACTIVE: "§RАктивна§! (осталось [?global.antarctica_blizzard_days_remaining|0] дн.)"
 ANTARCTICA_BLIZZARD_STATUS_INACTIVE: "§GНеактивна§!"
 ANTARCTICA_MODULE_UNDER_REPAIR_OUTPUT: "§RРабота модуля приостановлена.§!\nЭтот модуль будет находиться на ремонте еще §Y[?research_station_module_repair_days_remaining]§! дн. из-за повреждений, вызванных метелью."
 ANTARCTICA_ILLEGAL_ACTIVITIES_DISABLED: "§RОтключено§!"
 ANTARCTICA_ILLEGAL_ACTIVITIES_ENABLED: "§GВключено§!"
 ANTARCTICA_STATION_TOGGLE_ILLEGAL_ACTIVITIES_TEXT: "Переключить незаконную деятельность ([MD_antarctica_illegal_activities_enabled])"
 ANTARCTICA_STATION_TOGGLE_ILLEGAL_ACTIVITIES_TEXT_DELAYED: "§YНеобходимые условия:§!\n[!antarctica_station_toggle_illegal_activities_button_click_enabled]\n§YЭффекты:§!\nПереключает незаконную деятельность лаборатории на выбранной станции.\n\nБонусы от незаконной лаборатории действуют только тогда, когда эта опция включена.\n\n§RВнимание: если другая страна направит своих наблюдателей, они могут обнаружить эту деятельность, что приведёт к дипломатическим последствиям.§!"
