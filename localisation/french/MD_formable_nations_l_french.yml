 form_ANTCONF_category: "La Confédération des Antilles"
 form_ANTCONF_category_desc: "La Confédération des Antilles est une proposition d'État dans les Caraïbes avec l'unification [CUB.GetNameWithFlag],  [DOM.GetNameWithFlag], et [HAI.GetNameWithFlag]. Il s'agit à l'origine d'une idée de Ramón Emeterio Betances, un militant de l'indépendance portoricaine, visant à unifier toutes les nations hispanophones des Caraïbes en une seule entité. L'idée originale n'incluait pas [HAI.GetNameWithFlag], mais les partisans de l'idée l'ont rapidement incluse. L'idée a disparu en raison de la guerre hispano-américaine, les colonies  [CUB.GetNameWithFlag] et  [PTR.GetNameWithFlag] ayant été transférées aux États-Unis. L'idée allait donner naissance à une nation dont la capitale serait probablement Saint-Domingue et dont la langue officielle serait l'espagnol."
 ANTCONF_integrate_start: "Begin forming [GetANTCONFNameDef]"
 ANTCONF_integrate_start_desc: "It is time to form the Antillean Confederation. Our people must be united now to ensure a brighter future for the people of the Caribbean.\n\n"
 ANTCONF_integrate_CUB: "Integrate [GetANTCONFNameAdj] [CUB.GetAdjective] Territories"
 ANTCONF_integrate_CUB_desc: "Cuba est la plus grande des trois grandes nations de la confédération. L'intégration de celle-ci augmentera la taille de l'économie et doublera presque la population et la superficie."
 ANTCONF_integrate_DOM: "Integrate [GetANTCONFNameAdj] [DOM.GetAdjective] Territories"
 ANTCONF_integrate_DOM_desc: "La République dominicaine est l'une des trois grandes nations de la Confédération. Elle partage l'île d'Hispaniola avec Haïti et compte de nombreux touristes et industries. La partie nord de l'île mène également des opérations minières légères et produit de l'acier destiné à l'usage local de la République. Son intégration sera précieuse pour la nouvelle Confédération."
 ANTCONF_integrate_HAI: "Integrate [GetANTCONFNameAdj] [HAI.GetAdjective] Territories"
 ANTCONF_integrate_HAI_desc: "Haïti est la plus petite des trois grandes nations de la Confédération. Il diffère largement de Cuba et de la République dominicaine, car il s'agit d'une ancienne colonie française. L'intégration prendra plus de temps en raison des différences linguistiques entre le groupe de nations ; cependant, la base industrielle et le port naturel de Port-au-Prince seront inestimables pour les opérations économiques et militaires dans les Caraïbes."
 ANTCONF_integrate_PTR: "Integrate [GetANTCONFNameAdj] [PTR.GetAdjective] Territories"
 ANTCONF_integrate_PTR_desc: "Porto Rico est depuis longtemps un territoire des États-Unis. Il bénéficie de la protection des États-Unis, mais ne fait pas partie intégrante de leur territoire. Avec près de quatre millions d'habitants, Porto Rico est l'une des plus grandes îles des Caraïbes. C'est le plus petit des États potentiellement intégrés à la Confédération antillaise. Cependant, le dynamisme culturel et touristique de la région apportera de nombreux avantages à l'ensemble de la confédération."
 ANTCONF_update_flag: "Finish Forming [GetANTCONFNameDef]"
 ANTCONF_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetANTCONFNameDef], adopting its unified flag and name."
 is_ANTCONF: "Has formed [GetANTCONFNameDef]"
 form_CANZUK_category: "CANZUK"
 form_CANZUK_category_desc: "CANZUK est une union de nations entre le Canada, l'Australie, la Nouvelle-Zélande et le Royaume-Uni. Elle diffère de l'Empire britannique car cette union d'États serait directement administrée et constituerait un pays véritablement uni. La nation s'étendrait sur plusieurs continents et deviendrait un concurrent majeur sur la scène mondiale. Peut-être devrions-nous séduire l'idée et unifier les nations ?"
