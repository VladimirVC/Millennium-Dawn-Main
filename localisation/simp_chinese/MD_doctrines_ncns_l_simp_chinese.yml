 DOCTRINE_TRACK_AIRCRAFT_DESIGN: "飞机设计"
 DOCTRINE_TRACK_MULTIROLE_AIRCRAFT: "多用途飞机"
 DOCTRINE_TRACK_INFANTRY_EQP: "步兵装备"
