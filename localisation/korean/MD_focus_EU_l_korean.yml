l_korean:
 EU_Voting_tutorial: "유럽 연합 (EU) 튜토리얼"
 EU_Voting_tutorial_desc: "본 Millennium Dawn 모드에서 §C[EUU.GetFlag] 유럽 연합§!이 어떻게 구성되어 있는지에 대한 튜토리얼"
 EU001: "유럽 연합 정책"
 EU001_desc: "The policies of §C[EUU.GetFlag] The EU§! are determined by the Union's values, objectives and principles. Because the EU started as an economic community, economic policy is still an important area in the EU. In keeping with its values, the EU seeks to promote the well-being, security and interests of the citizens. The EU wishes to keep the economy stable and competitive. The EU tries to reform itself."
 EU702: "탈퇴 조약"
 EU702_desc: "§C[EUU.GetFlag] 유럽 연합§!의 탈퇴는유럽 연합의 체계를 자국의 법과 체계로 다시 바꾸고 적응해야되는 국가들에겐 매우 복잡한 과정이 될 것입니다. 떠나려는 국가와 §C[EUU.GetFlag] 유럽 연합§!은 그들간의 미래 관계를 위한 합의를 해야합니다."
 EU_voting_category: "유럽 연합"
 EU_voting_category_desc: "[ROOT.GetFlag] Euroscepticism: [?ROOT.eurosceptic|%R1]\nEuroscepticism, also known as EU-scepticism, means a criticism of the European Union (EU) and European integration. According to public opinion surveys, this ratio represents the number of people who will likely vote for leaving the European Union in the case of a European Union membership referendum of their country.\n\n[EUU.GetFlag] Europeanism: [?global.var_europeanism|%G1]\nEuropeanism also known as Pro-Europeanism, sometimes called European Unionism, is a political position that favours European integration and membership of the European Union (EU). It includes the more radical European federalists, who seek to create a single superstate known informally as a United States of Europe. A related term is 'Europhile'. The ratio represents the Europhile people throughout the whole Union.\n\n[ROOT.GetFlag] Breach of values of the European Union: [?ROOT.breach_of_EU_value|g0]\n\"The Union is founded on the values of respect for human dignity, freedom, democracy, equality, the rule of law and respect for human rights, including the rights of persons belonging to minorities. These values are common to the Member States in a society in which pluralism, non-discrimination, tolerance, justice, solidarity and equality between women and men prevail.\"\n- Article 2, Treaty on European Union\n\n"
 EU_info.1.t: "유럽 연합 시스템 값 (위반 사항 목록) 보기"
 EU_info.1.d: "EU value:\nissue of breach - level of breach\n\nRule of Law:\nParalyzing Corruption - 5\nCrippling Corruption - 4\nRampant Corruption - 3\nUnrestrained Corruption - 2\nSystematic Corruption - 1\n\nRespect for human dignity and freedom:\nhas offensive war with EU member state - 10\nhas communist government - 2\nhas reactionary government - 2\nhas communist in coalition - 1\nhas reactionary in coalition - 1\n\nDemocracy:\nNo elections - 5\nDictatorship - 5\nCommunist Dictatorship - 5\nFascist Dictatorship - 5\nis puppet - 4\nNeo-Imperialism - 1\n\nWomen and Minority Rights:\nProhibited Service for Women - 1\nElection Threshold 10% - 1\n\nNo Bailout clause:\nDefault on Debts - 1\nBailout given - 1"
 EU_info.1.a: "알겠다"
