 ukraine_parliament.100.d: "The Pro-Russian Bloc in our parliament has won the majority of the seats in our parliament, as a result of the high level of influence that the Russian government currently holds over Ukraine."
 ukraine_parliament.100.t: "Pro-Russian Bloc Wins Majority of the Seats"
 ukraine_parliament.100.a: "Let's See How They Do"
 ukraine_parliament.200.d: "The Pro-Western Bloc in our parliament has won the majority of the seats in our parliament, as a result of the high level of influence that the American government currently holds over Ukraine."
 ukraine_parliament.200.t: "Pro-Western Bloc Wins Majority of the Seats"
 ukraine_parliament.200.a: "Let's See How They Do"
 ukraine_parliament.300.t: "Bloque Pro-Ucraniano Gana la Mayoría de los Escaños"
 ukraine_parliament.300.d: "El Bloque Pro-Ucraniano en nuestro parlamento ha ganado la mayoría de los escaños en las elecciones recientes, y esto se debe a la influencia vacilante del gobierno estadounidense y el gobierno ruso."
 ukraine_parliament.300.a: "Let's See How They Do"
 ukraine_parliament.400.t: "Elecciones Parlamentarias"
 ukraine_parliament.400.d: "Election season has come around once more, and voting booths all around the nation have begun to open up. Hopefully voter turnout is high enough to bring about good change in the nation."
 ukraine_parliament.400.a: "Let's See How It Goes"
 ukraine_parliament.1.t: "El Parlamento aprueba la ley de Centralización"
 ukraine_parliament.1.d: "El Parlamento ha decidido aprobar un proyecto de ley que aumenta nuestro gasto burocrático, siguiendo una propuesta que hicimos hace unos días."
 ukraine_parliament.1.a: "Genial"
 ukraine_parliament.2.t: "El Parlamento rechaza la nueva ley de Centralización"
 ukraine_parliament.2.d: "El Parlamento ha decidido en contra de un proyecto de ley que aumentaría nuestro gasto burocrático. Esto viene tras nuestra propuesta que se hizo hace unos días, y parece que la moción simplemente no fue lo suficientemente popular."
 ukraine_parliament.2.a: "Desafortunado"
 ukraine_parliament.2.b: "Tal vez un pequeño soborno cambie su opinión..."
 ukraine_parliament.3.t: "El Parlamento aprueba la ley de Descentralización"
 ukraine_parliament.3.d: "The Parliament has approved our request to decrease bureaucracy spending. This comes following our proposal that was made a few days back, and it appears that the motion gained a lot of popularity and support."
 ukraine_parliament.3.a: "Genial"
