 give_up_coalition_1_desc: "[Root.GetLeader] 와 그의 당 [show_ruling_party] 이 정부 구성에 실패한 것을 인정합니다. 이제 이 일은 [show_second_biggest_party_elect] ([show_second_biggest_elect_percentage]) 로 갈 것입니다.\n\n현재의 연립 정부를 구성하기 위해 지금까지 소모한 정치력의 75%가 반환됩니다."
