 GENERIC_krepost_state_defense_bureau_desc: "MANPADS와 대전차 유도 미사일을 전문으로 하는 베일에 싸인 국영 수출업체로, 표식이 없는 중개인을 통해 고객들에게 무기를 공급합니다."
 GENERIC_north_plains_heavy_industries_desc: "보병 화기를 대량 생산하는 구소련 유산의 거대 공장으로, 품질보다는 고용량 생산 출력에 최적화되어 있습니다."
 GENERIC_sentinel_grid_networks_desc: "통합 지휘 인프라가 부족한 군대에 킬체인 단축 솔루션을 제공하는 신호 및 지휘통제(C2) 계약업체입니다."
 GENERIC_brunn_heavy_engineering_werke_desc: "합스부르크 시대에 뿌리를 둔 중앙유럽의 엔지니어링 기업으로, 면허 생산 및 독자 개발한 포병 체계를 생산합니다."
 GENERIC_reichswerke_konstrukt_dynamik_desc: "자주포와 주력전차 플랫폼을 모두 다루는 중앙유럽의 양방향 무기 개발업체입니다."
 GENERIC_vector_defense_labs_desc: "달러당 요격 효율이 과도한 고비용 장비보다 우수하다는 교리를 바탕으로 설립된, 비용 효율 중심의 미사일 방어 통합업체입니다."
 GENERIC_marshall_tractor_works_desc: "구소련의 생산 방법론을 물려받아 운영되는 전차 공장 집합체로, 생산량과 정비 용이성을 강조합니다."
 GENERIC_vanderlind_hartwell_systems_desc: "정치적 인맥을 활용하여 장갑차 및 IFV 프로그램을 대규모로 확보하는 미 연방 정부의 주요 계약업체입니다."
 GENERIC_mil_kamov_rotorworks_desc: "구소련의 공격 및 수송 헬기 설계에 뿌리를 둔 회전익기 부서로, 정교함보다는 내구성이 뛰어난 것으로 유명합니다."
 GENERIC_helitech_avionique_desc: "첨단 전자 제품을 프리미엄 가격에 제공하는 영-이 합작의 소규모 항공전자 및 헬기 통합 전문 기업입니다."
 GENERIC_aurora_aerodynamics_corporation_desc: "안목 있는 국방 고객들을 위해 최첨단 전투기 및 다목적 항공기를 생산하는 기밀 스컹크 웍스 부서입니다."
 GENERIC_societe_europeenne_daerostructures_desc: "대형 항공기 구조물, 수송 플랫폼 및 해상 초계기를 전문으로 하는 범유럽 협력 컨소시엄입니다."
 GENERIC_southwestern_aerospace_dynamics_bureau_desc: "엄격한 정부 감독하에 다목적 및 전략 항공 플랫폼을 생산하는 이사회 운영 부서입니다."
 GENERIC_skyforge_autonomous_systems_desc: "실리콘밸리 특유의 발 빠른 스타트업 문화를 자율 타격 드론 개발에 적용하고 있는 기업입니다."
 GENERIC_compagnie_aeronatique_darmement_desc: "전투기, 해군 항공기, 유도 미사일에 적용 가능한 교차 플랫폼 탄약 표준을 제공하는 프랑스 전통의 무기 제조사입니다."
 GENERIC_whitehall_strategic_solutions_desc: "해군 전문 컨설팅 회사에서 소형 전투함 건조사로 변모한 기업으로, 초계함 및 고속정을 전문으로 합니다."
 GENERIC_triton_maritime_defense_group_desc: "여러 파트너 국가에 걸쳐 구축함과 호위함을 생산하는 다국적 조선소 네트워크입니다."
 GENERIC_eastern_maritime_shipbuilding_group_desc: "압축된 일정 속에서 3교대 연속 가동으로 순양함과 항공모함을 생산하는 조선업체입니다."
 GENERIC_sevmorprom_submarine_yards_desc: "한랭지 작전 수심에 특화되어 있으며, 수출 등급의 공격 및 미사일 잠수함 플랫폼을 전문으로 하는 러시아 북부의 잠수함 조선소입니다."
 GENERIC_halland_civic_engineering_group_desc: "민간 인프라와 군사 공급망을 아우르는 이중 용도 물류 전문 지식을 보유한 북유럽의 산업 대기업입니다."
 GENERIC_second_academy_missile_bureau_desc: "엄격한 비밀 유지 프로토콜 하에 운영되는 독립된 탄도 및 순항 미사일 연구국입니다."
 GENERIC_western_orbital_systems_bureau_desc: "차세대 발사체와 우주 영역 인식에 초점을 맞춘 궤도 및 전략 시스템 부서입니다."
 GENERIC_central_heavy_atomics_power_desc: "민간 원자로 전문 지식과 해군 탄도 미사일 개발을 결합한 원자력 추진 및 무기 프로그램입니다."
