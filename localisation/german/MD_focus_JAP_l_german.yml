l_german:
 japan_focus: "Japanischer Fokusbaum"
 japan_classic.15.t: "Keizō Obuchi erleidet Schlaganfall"
 japan_classic.15.d: "Keizō Obuchi, ein treuer Diener der Liberaldemokratischen Partei und des japanischen Volkes, war seit dem 30. Juli 1998 Premierminister von Japan, nachdem Ryūtarō Hashimoto nach der Niederlage der LDP bei den Oberhauswahlen 1998 zurückgetreten war.\nKeizō Obuchi wurde als ruhig, kompetent und effizient beschrieben – doch nur wenige hatten seinen plötzlichen Gesundheitsverfall vorhergesehen. Am 1. April 2000 erlitt Obuchi einen Schlaganfall und wurde umgehend ins Krankenhaus eingeliefert."
 japan_classic.15.o1: "Hoffen wir auf das Beste"
 japan_classic.16.t: "Yoshirō Mori übernimmt das Amt des Premierministers"
 japan_classic.16.d: "Following the stroke suffered by then-Prime Minister Keizō Obuchi, senior members of the Liberal Democratic Party convened a closed-door meeting of five key figures and selected Yoshirō Mori as his successor in order to avoid a power vacuum.\n\nThe transition took place without any formal explanation to the public, prompting a wave of criticism from the public accusing the government of \"backroom politics\" and \"excluding the people from leadership decisions.\" As a result, the Mori administration faced strong headwinds from the very start.\n\nAll eyes are now on Yoshirō Mori's leadership and whether he can regain the public's trust."
 japan_classic.16.o1: "Die Vermeidung eines Machtvakuums hatte oberste Priorität."
 japan_classic.18.t: "Yoshirō Moris politischer Fauxpas"
 japan_classic.18.d: "Am 15. Mai 2000 geriet der neu gewählte Premierminister Yoshirō Mori erstmals in die Schlagzeilen, als er Japan öffentlich als „eine göttliche Nation, deren Zentrum der Kaiser ist“ bezeichnete. Dies stellt in den Augen der Opposition und der regierenden LDP die demokratischen Ideale Japans sowie die Rolle der Monarchie infrage.\nDie Zustimmungswerte des Premierministers in der Bevölkerung sind gesunken."
 japan_classic.18.o1: "Was für ein Narr!"
 japan_classic.18.o2: "Seine Aussagen bekräftigen er nachdrücklich."
 Japan.3.t: "Der Anbruch einer neuen Ära"
 Japan.3.d: "The Emperor, the symbol of Japan, is abdicating and a new Emperor is ascending the throne,an exceptionally rare national turning point in modern Japan. With Emperor Akihito's abdication, Crown Prince Naruhito will ascend as the 126th Emperor, and the era name will be renewed.\n\nSeveral years ago, Emperor Akihito's words about his duties came as a surprise to many people. At first, shock and uncertainty spread, but through debate and the necessary procedures, preparations for the ceremonies steadily moved forward.\n\nAnd now, after solemn rites, the \"Heisei\" era comes to an end and \"Reiwa\" begins. The political system will not change directly. However, the nation's atmosphere will clearly shift, likely influencing social cohesion and public expectations of the government."
 Japan.3.a: "Lasst uns die neue Ära stillschweigend willkommen heißen."
 Japan.8.t: "China fordert die Senkaku-Inseln!"
 Japan.8.d: "China hat den Streit mit uns um die Besitzverhältnisse der Senkaku-Inseln wieder aufgenommen. Sollten wir ihren Forderungen nachgeben, könnten wir Chinas Selbstvertrauen in seinen Einfluss auf unsere Außenpolitik stärken und gleichzeitig unsere Beliebtheit bei den nationalistisch gesinnten Bürgern verringern. Die Folgen einer Ablehnung wären jedoch vermutlich auch für uns nicht günstig."
 Japan.8.a: "Lasst sie ihre Fischereirechte haben..."
 Japan.8.b: "Japan lässt sich nicht einschüchtern!"
 Japan.4.t: "Japan hat die Inseln übergeben!"
 Japan.4.d: "Japan hat die Legitimität unseres Anspruchs eindeutig anerkannt und die Senkaku-Inseln an uns, ihren rechtmäßigen Eigentümer, zurückgegeben."
 Japan.4.a: "Vielleicht haben die Japaner ja doch etwas Verstand!"
 Japan.5.t: "Japan bleibt trotzig!"
 Japan.5.d: "Die Japaner sind ganz offensichtlich nach wie vor entschlossen, unsere Todfeinde zu bleiben."
 Japan.5.a: "Sie werden es bereuen."
 Japan.6.t: "Chinesische Kampfjets haben das Flugzeug beschossen, das wir zur Abfangjagd aufgestiegen waren!"
 Japan.6.d: "Unsere Kampfflugzeuge reagieren regelmäßig auf chinesische Luftraumverletzungen, normalerweise ohne Zwischenfälle. Dieses Mal jedoch wurden unsere Kampfflugzeuge von den Chinesen beschossen, was zum Tod mehrerer unserer Piloten und zum Verlust mehrerer Flugzeuge führte. Angesichts der jüngsten Aktionen Chinas sollten wir prüfen, ob es sich bei diesem Vorfall um eine vorsätzliche Provokation oder einen bedauerlichen Unfall handelte, und unsere Reaktion entsprechend anpassen."
 Japan.6.a: "Wir haben ein Recht auf Selbstverteidigung!"
 Japan.6.b: "Wir sollten unsere Beschützer anrufen!"
 Japan.6.c: "Das war vermutlich ein Unfall..."
 Japan.7.t: "Chinesische und japanische Kampfflugzeuge liefern sich Luftkampf"
 Japan.7.d: "Im Ostchinesischen Meer ist es nach einer Konfrontation zwischen chinesischen und japanischen Flugzeugen zu einem Konflikt gekommen. Der Zusammenstoß begann Berichten zufolge, als japanische Kampfjets aufstiegen, um chinesische Kampfflugzeuge über japanischem Luftraum abzufangen. Anstatt wie in der Vergangenheit nach ähnlichen Vorfällen üblich, zogen sich die Chinesen zurück, woraufhin die japanischen Flugzeuge beschossen wurden. Dabei kamen mehrere japanische Piloten ums Leben, und zahlreiche Flugzeuge gingen verloren.[JAP.GetLeader] hat den Vorfall aufs Schärfste verurteilt und führt Berichten zufolge dringende Gespräche hinter verschlossenen Türen über Japans Reaktion auf dieses Ereignis."
 Japan.7.a: "Droht ein dritter Chinesisch-Japanischer Krieg?"
 idea_JAP_emperor_naruhito: "Kaiser Naruhito"
 idea_JAP_emperor_naruhito_desc: "Naruhito was born on 23 February 1960, son of Akihito and Michiko Shōda. He studied at many prestigious schools around Japan and is said to have had a joyful childhood, also studying at Oxford University."
