l_polish:
 this_investment_offer_pending_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! nie rozważa obecnie §Coferty inwestycyjnej§! z §Y[ROOT.GetNameWithFlag]§!.\n\n§YUwaga dla programisty:§! Czasami może to stać się blokiem z powodu słabej wydajności podczas gry wieloosobowej. Odczekaj 90 dni (trzy miesiące) przed zgłoszeniem jakichkolwiek błędów związanych z tym stanem."
 has_available_treasury_tt: "§YSkarbiec§! ma więcej niż $$§Y[?ROOT.project_monetary_cost^-1]§! Miliardy (obecnie: $$§G[?ROOT.treasury]§! Miliardy)\n"
 influence_gain_tooltip_yes_tt: "Dzięki temu projektowi inwestycyjnemu zyskamy wpływy.\n\n[investment_cooldown]"
 influence_gain_tooltip_no_tt: "Dzięki temu projektowi inwestycyjnemu nie uzyskamy wpływów.\n"
 disabled_foreign_investment_flag_tt: "§Y[ROOT.GetNameWithFlag]§! może inwestować w innych krajach.\n"
 int_auto_reject_investment_flag_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! obecnie nie odrzuca automatycznie ofert"
 state_based_investments_screen_tt: "§HInwestycje Wewnętrzne§!"
 check_for_investment_project_limits_tt: "Currently Has Available §HInternal Investment§! Slot (Free Projects: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0])"
 state_based_investments_screen_delayed_tt: "Poniższe menu zawiera szereg decyzji, które możesz podjąć, aby zachęcić do różnych typów rozwoju w ramach [THIS.GetName]. Wszystkie narody będą miały co najmniej dwa dostępne sloty, które mogą wykorzystać w dowolnym ze swoich stanów w całym kraju. Możesz zdecydować się na realizację wielu projektów w jednym stanie lub rozłożyć projekty na cały kraj. Możesz uzyskać dodatkowe sloty, zwiększając §YRanking mocy§! swojego kraju\n\nSloty według rankingu mocy:\n- §YSupermoc§!: 6\n- §YWielka moc§!: 5\n- §YMoc główna§!: 4\n- §YMoc regionalna§!: 3\n"
 available_internal_investments_screen_tt: "Available §HInternal Investment§! Slots: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "All nations will have a minimum of two available slots they can use for any of their states across their entire country. You can choose to do multiple projects in one state or you can choose to spread the projects across the country. You can gain additional slots by increasing your nation's §YPower Ranking§!\n\nOngoing Projects:\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "Rozszerzanie lokalnych mocy odnawialnych"
 state_owned_local_renewable_capacity_modifier_desc: "Po serii ukierunkowanych inwestycji w lokalną infrastrukturę energii odnawialnej, stan obecnie produkuje więcej energii ze źródeł odnawialnych."
 state_owned_local_infrastructure_modifier: "Rozwijanie lokalnej infrastruktury"
 state_owned_local_infrastructure_modifier_desc: "Rozwój lokalnej infrastruktury w stanie doprowadził do podjęcia szeregu krótkoterminowych projektów, których celem była znaczna poprawa lokalnej infrastruktury."
 state_owned_local_military_infrastructure_modifier: "Rozwijanie lokalnej infrastruktury wojskowej"
 state_owned_local_military_infrastructure_modifier_desc: "Po znacznych inwestycjach w lokalne obiekty wojskowe i modernizację infrastruktury, regionalne instalacje wojskowe zostały w pełni zmodernizowane. Zdolności produkcyjne państwa w zakresie produkcji wojskowej zostały znacząco zwiększone."
 state_owned_local_energy_infrastructure_modifier: "Rozwijanie lokalnej infrastruktury energetycznej"
 state_owned_local_energy_infrastructure_modifier_desc: "Celowe inwestycje w lokalną sieć energetyczną doprowadziły do ​​kompleksowej modernizacji infrastruktury wytwarzania i dystrybucji energii w stanie. Stan poprawił obecnie możliwości produkcji energii we wszystkich sektorach energetycznych."
 state_owned_build_forward_logistics_base_modifier: "Budowa baz logistycznych Forward"
 state_owned_build_forward_logistics_base_modifier_desc: "W całym stanie utworzono strategiczne bazy logistyczne, tworząc wysuniętą sieć zaopatrzeniową. Obiekty te znacząco usprawniają przemieszczanie wojsk i materiałów w regionie, zmniejszając ogólne zapotrzebowanie na zaopatrzenie."
 state_owned_improve_rebuilding_efforts_modifier: "Ulepszone wysiłki na rzecz odbudowy"
 state_owned_improve_rebuilding_efforts_modifier_desc: "Działania rekonstrukcyjne zyskały poparcie lokalnej społeczności, poprawiając współpracę społeczną i zmniejszając niepokoje społeczne. Inwestycje w lokalną infrastrukturę i projekty odbudowy społeczności zwiększyły posłuszeństwo wśród lokalnej społeczności."
 state_owned_hire_extra_primary_sector_workers_modifier: "Zatrudnij dodatkowych pracowników sektora podstawowego"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "Siła robocza w sektorze podstawowym stanu została zwiększona dzięki ukierunkowanym inicjatywom rekrutacyjnym i szkoleniowym. Rolnictwo, górnictwo i inne przedsiębiorstwa zajmujące się wydobyciem surowców korzystają obecnie ze zwiększonej dostępności siły roboczej, co przekłada się na wyższą wydajność."
 currently_encouraged_investments: "Aktualnie §YZachęcamy do inwestycji§! w §Y[THIS.GetName]§!."
 encourage_investments_in_state_tt: "§YZachęcaj do inwestycji§! w §Y[THIS.GetName]§!\n---------\nMożemy zachęcać do inwestycji w §Y[THIS.GetName]§!, zmniejszając biurokrację w tym obszarze i sprawiając, że czas inwestycji będzie szybszy, niż gdyby nie było takiej konieczności."
 encourage_investments_in_state_delayed_tt: "§YWymagania wstępne:§!\n[!encourage_investments_in_state_click_enabled]\n§YEfekt:§!\n[!encourage_investments_in_state_click]\n"
 encourage_investments_in_state_click_tt: "Przez 160 dni §YInvestments§! w §Y[THIS.GetName]§! będzie o §Y15%§! tańsze. Sztuczna inteligencja będzie również chętniej inwestować w państwo."
 encourage_productivity_in_state: "Aktualnie §Ywspieramy produktywność§! w §Y[THIS.GetName]§!."
 encourage_productivity_in_state_tt: "§YZachęcaj do wzrostu produktywności§! w §Y[THIS.GetName]§!\n---------\nMożemy stymulować wzrost produktywności w §Y[THIS.GetName]§!, wprowadzając do regionu nowe technologie, techniki itp., co pomoże mu się rozwijać."
 encourage_productivity_in_state_delayed_tt: "§YWymagania wstępne:§!\n[!encourage_productivity_in_state_click_enabled]\n§YEfekt:§!\n[!encourage_productivity_in_state_click]\n"
 encourage_productivity_in_state_click_tt: "Przez 160 dni §YWzrost Produktywności§! w §Y[THIS.GetName]§! będzie o §Y20%§! szybszy."
 expand_local_building_capacity: "Aktualnie §YRozszerzanie lokalnej pojemności budowlanej§! w §Y[THIS.GetName]§!."
 block_future_expand_local_building_capacity: "Możemy §YRozszerzyć Lokalną Pojemność Budynków§! w §Y[THIS.GetName]§!(Zwiększono pojemność budynku Times: [?expanded_building_slot_times|0Y])"
 expand_local_building_capacity_tt: "§YRozszerz pojemność lokalnego budynku§! w §Y[THIS.GetName]§!\n---------\nMożemy zwiększyć lokalne możliwości budowlane poprzez wprowadzenie różnorodnych lokalnych zasad budowlanych, wykarczowanie dodatkowych terenów i zwiększenie dostępnych zasobów dla lokalnych budowniczych."
