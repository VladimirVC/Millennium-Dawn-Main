 korea_russia.22.d: "El Estado Mayor de Corea del Norte propone realizar ejercicios conjuntos de nuestras fuerzas armadas para demostrar la fuerza de nuestros ejércitos y probar la cooperación entre nuestras fuerzas armadas."
 korea_russia.22.a: "Esa es una gran idea"
 korea_russia.22.b: "No"
 korea_russia.23.t: "Ejercicios militares con Rusia"
 korea_russia.23.d: "El Estado Mayor General ruso acordó realizar ejercicios conjuntos de las fuerzas armadas de nuestros países."
