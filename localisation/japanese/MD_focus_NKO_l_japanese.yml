 korea_russia.21.t: "ロシアが我が国の労働者を雇用"
 korea_russia.21.d: "我々はロシアとの間に、多数の労働者を建設工事の補助として雇用する合意を結んだ。ロシア側が気前よく給料を支払ってくれるため、我々にとってはますます好都合だ。"
 korea_russia.21.a: "いいぞ"
