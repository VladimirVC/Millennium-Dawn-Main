 korea.50.t: "朝鲜半岛终于统一"
 korea.50.d: "经过多年的分裂，朝鲜半岛终于实现统一，标志着世界历史上的一个历史性时刻。曾经分裂的南北双方克服了数十年的政治、经济和文化差异，最终走到了一起，组成了一个统一的国家。这一重大事件标志着朝鲜半岛人民迈入和平、合作与繁荣的新时代，重塑了东亚乃至世界的地缘政治格局。"
 korea.50.a: "万岁!!!"
 korea.51.t: "扩建农场"
 korea.51.d: "没有朝鲜人民，朝鲜就不可能强大，我们必须集中精力尽快解决饥荒问题。"
 korea.51.a: "平壤的农业"
 korea.51.b: "黄海的农业"
 korea.51.c: "慈江的农业"
 korea.51.e: "咸镜的农业"
 korea.52.t: "升级我们欠缺的补给中心"
 korea.52.d: "我们的伟大领导人提供了资金来建造更多的铁路和补给中心，他们让我们选择是专注于我们的经济区野心还是为战争做好后勤准备。"
 korea.52.a: "支援韩国方面"
 korea.52.b: "支援未来的自由经济区"
