 UKR_decrease_pension_desc: "Если дебаты в Верховной Раде будут §Gуспешными§!, закон будет §Yизменен§!"
 UKR_promote_russian_interests: "Продвигать [SOV.GetFlag] российские интересы"
 UKR_promote_russian_interests_desc: "Мы будем продвигать [SOV.GetFlag] российские интересы внутри страны, чтобы повысить популярность пророссийского блока на следующих выборах."
 UKR_promote_western_interests: "Продвигать [USA.GetFlag] западные интересы"
 UKR_promote_western_interests_desc: "Мы будем продвигать [USA.GetFlag] американские интересы внутри страны, чтобы повысить популярность прозападного блока на следующих выборах."
 UKR_dissolved_verkhovna: "Парламент распущен"
 UKR_get_25_t62_ifv: "Собрать 50 БМПП Т-62"
 UKR_get_50_mtlb_ifv: "Собрать 50 МТ-ЛБ Шквал"
 UKR_get_50_m113: "Собрать 50 МТ-ЛБ М113"
 UKR_get_50_buggies: "Собрать 50 машин общего назначения"
 UKR_party_regions_start: "Партия регионов"
 UKR_party_regions_start_desc: "Янукович взял власть в стране в свои руки. Пришло время регионов!"
 UKR_party_regions_inaguration: "Инаугурация Януковича"
 UKR_party_regions_inaguration_desc: "It is time for the inauguration of our new president."
 UKR_party_regions_decrease: "Сократить администрацию"
 UKR_party_regions_decrease_desc: "We will reduce the number of employees of the state apparatus."
 UKR_party_regions_anti_corrupt: "Национальный антикоррупционный комитет"
 UKR_party_regions_anti_corrupt_desc: "We will create a new ministry, the national Anti-Corruption Committee, to combat corrupt officials in our country."
 UKR_party_regions_unifed_window: "Инвестиции в единое окно"
 UKR_party_regions_unifed_window_desc: "We will introduce new rules for investors in our country, which will make it easier for them to interact with our authorities."
 UKR_party_regions_decrease_agro: "Снизить регулирование сельского хозяйства"
 UKR_party_regions_decrease_agro_desc: "Агропромышленный комплекс получит новые преимущества, тем самым мы надеемся повысить его производительность."
 UKR_party_regions_laizes: "Свобода действий"
 UKR_party_regions_laizes_desc: "We will partially adopt one of the libertarian principles in our economic policy and will not interfere in economic processes."
 UKR_party_regions_taxx: "Изменить налоговый кодекс"
 UKR_party_regions_taxx_desc: "Мы внесем изменения в налоговый кодекс, которые посчитаем необходимыми. Наши уступки позволят снизить местные налоги в три раза!"
 UKR_party_regions_autocracy: "Усилить автократию"
 UKR_party_regions_autocracy_desc: "A strong government must control everything it can, otherwise it is chaos and disorder that existed before our rule."
 UKR_party_regions_pressure_media: "Давление на СМИ"
 UKR_party_regions_pressure_media_desc: "The media has become too free, it is necessary to cool their ardor."
 UKR_party_regions_stability_reform: "Стабильность и реформы"
 UKR_party_regions_stability_reform_desc: "We will assemble a loyal coalition of politicians, which we will call \"Stability and Reforms\", which will actively promote our projects and ideas."
 UKR_party_regions_stability_restricting_freedom_speech: "Ограничение свободы слова"
 UKR_party_regions_stability_restricting_freedom_speech_desc: "Freedom of speech ends where it begins to offend us."
 UKR_party_regions_stability_purge_opposition: "Попытка очистить политическую оппозицию"
 UKR_party_regions_stability_purge_opposition_desc: "The opposition is too self-willed and undermines the institutions of power using its freedom, it's time to fix this."
 UKR_party_regions_lustration: "Люстрация губернаторского корпуса и силовых структур"
 UKR_party_regions_lustration_desc: "Lustration of disloyal and openly harmful to the state people in these structures has long been necessary."
 UKR_party_regions_agreement_opposition: "Соглашения с оппозицией"
 UKR_party_regions_agreement_opposition_desc: "We will try to establish relations with some part of the opposition, thereby dividing it."
 UKR_party_regions_appease_the_westermists: "Успокоить западников"
 UKR_party_regions_appease_the_westermists_desc: "Western Ukraine has long been a hotbed of discontent and instability, we will appease them, I will try to give them what they want - promises."
 UKR_party_regions_request_russian: "Запросить российские инвестиции"
 UKR_party_regions_request_russian_desc: "Мы будем просить российские инвестиции. Они явно не будут лишними."
 UKR_party_regions_personal_gain: "Сосредоточиться на личной выгоде"
 UKR_party_regions_personal_gain_desc: "The country is certainly good, but it's worth thinking about yourself."
 UKR_party_regions_titushki: "Митинги титушек"
 UKR_party_regions_titushki_desc: "Мы будем использовать новый метод дискредитации митингов оппозиции - титушки"
 UKR_party_regions_regional_council: "Региональный совет"
 UKR_party_regions_regional_council_desc: "We will introduce a new authority, the regional council, to facilitate the interaction of regional and state authorities."
 UKR_party_regions_optimise_east_ukraine_gamble: "Восточноукраинская игра"
 UKR_party_regions_optimise_east_ukraine_gamble_desc: "Eastern Ukraine has always been our patrimony, we will actively try to get their support, because in fact they are our main electorate."
 UKR_party_regions_optimise_prior_loyals: "Отдать предпочтение лояльным"
 UKR_party_regions_optimise_prior_loyals_desc: "People loyal to us are much more important and we will actively promote them."
 UKR_party_regions_western_oligarch: "Сближение с западными олигархами"
 UKR_party_regions_western_oligarch_desc: "The oligarchs of western Ukraine will be our priority, we want to find a balance between the west and the east, perhaps their oligarchs will help us."
 UKR_party_regions_meet_akhmetov: "Встретиться с Ахметовым"
 UKR_party_regions_meet_akhmetov_desc: "The Donetsk clan of oligarchs, and its representative Rinat Akhmetov, an important political resource that we use to maintain our power, it is worth listening to him."
 UKR_party_regions_informational_act: "Закон об информации"
 UKR_party_regions_informational_act_desc: "The new act, or law, will open access to the broad masses to the activities of politicians, which will reduce the corruption component in their activities."
 UKR_party_regions_optimise_ministries: "Оптимизировать министерства"
 UKR_party_regions_optimise_ministries_desc: "Government structures have become too huge, it's time to reduce them."
 UKR_party_regions_reform_constituion: "Реформировать конституцию"
 UKR_party_regions_reform_constituion_desc: "Мы будем активно продвигать реформу конституции, настало время нашей стране двигаться к глобальным переменам!"
 UKR_party_regions_compulsory: "Обязательная служба"
 UKR_party_regions_compulsory_desc: "We will change the system of service in our army, literally turning it into a contract one."
 UKR_party_regions_pension_reform: "Пенсионная реформа"
 UKR_party_regions_pension_reform_desc: "Pension reform has been brewing for a long time and now we will carry it out."
 UKR_party_regions_kozhara: "Кожара - лидер МИД"
 UKR_party_regions_kozhara_desc: "We will appoint one of our friends and partners as Foreign Minister."
 UKR_party_regions_youth_region: "Расширить молодежные регионы"
 UKR_party_regions_youth_region_desc: "The youth wing of our party will gain more power and influence, we will open access to them."
 UKR_party_regions_berkut_reforms: "Реформы Беркута"
 UKR_party_regions_berkut_reforms_desc: "Berkut, as a police structure, needs reforms so that we can protect ourselves."
 UKR_party_regions_berkut_extreme_training: "Экстремальная подготовка для Беркута"
 UKR_party_regions_berkut_extreme_training_desc: "Berkut will become even more active in conducting competitions and training processes to improve its skill."
 UKR_dual_language: "Двуязычное государство"
 UKR_dual_language_desc: "The Russian language occupies an important part of the life of Ukraine and it would be foolish to deny it. We will not promote stupid political ideas about the abolition of the Russian language in our country."
 UKR_cancel_decommunization: "Антидекоммунизация"
 UKR_cancel_decommunization_desc: "Мы не допустим борьбы с нашим советским прошлым, когда мы боролись с фашизмом и нацизмом."
 UKR_donbass_autonomy_pass: "Особая автономия Донбасса"
 UKR_donbass_autonomy_pass_desc: "Donbass is a special region of our country, perhaps it's time to start a discussion about the special autonomy of this region."
 UKR_sng_integrate: "Интеграция в СНГ"
 UKR_sng_integrate_desc: "We will continue integration processes within the framework of cooperation between the CIS countries."
 UKR_europe_negotiat: "Переговоры с ЕС"
 UKR_europe_negotiat_desc: "We will start negotiations with the European Union on an issue that has been on our political agenda for a long time. This is an association with the European Union."
 UKR_russian_ukrainian_military_coop: "Украинско-российское военное сотрудничество"
 UKR_russian_ukrainian_military_coop_desc: "We will strengthen cooperation with the Russian Armed Forces."
 UKR_party_regions_european_chart: "Европейская языковая карта"
 UKR_party_regions_european_chart_desc: "We will sign the European Charter of Regional Languages as an indicator of our democratic attitude towards national minorities."
 UKR_parti_regions_anti_corruption_commitie: "Национальный антикоррупционный комитет"
 UKR_parti_regions_anti_corruption_commitie_desc: "The new committee is designed to fight corrupt officials at all levels."
 UKR_parti_regions_invest_open_window: "Единое окно инвестиций"
 UKR_parti_regions_taxx: "Реформированный налоговый кодекс"
 UKR_parti_regions_laizes: "Свобода действий"
 UKR_parti_regions_stability_reform: "Стабильность и реформа"
 UKR_parti_regions_lustration: "Люстрации"
 UKR_parti_regions_opposition_agree: "Сотрудничество с оппозицией"
 UKR_parti_regions_titushki: "Титушки"
 UKR_parti_regions_optimise_ministers: "Оптимизация министерств"
 UKR_parti_regions_inform_act: "Закон об информации"
 UKR_parti_regions_pension_reform: "Пенсионная реформа"
 UKR_parti_regions_youth_regions: "Молодежные регионы"
 UKR_parti_regions_autocracy: "Автократия Януковича"
 UKR_parti_regions_autocracy_desc: "Действия Януковича многие называют настоящей автократией, но так ли это важно для блага государства?"
 ukraine_regions.7.t: "Инвестиции в Украину"
 ukraine_regions.7.d: "Президент Украины попросил нас инвестировать в его страну. Согласны ли мы с его предложением?"
 ukraine_regions.7.a: "Да"
 ukraine_regions.7.b: "Нет"
 ukraine_regions.8.t: "Инвестиции в Украину"
 ukraine_regions.8.d: "Russia has agreed to invest in our country."
 ukraine_regions.8.a: "Мило"
 ukraine_regions.9.t: "Инвестиции в Украину"
 ukraine_regions.9.d: "Russia refused to invest in our country."
 ukraine_regions.9.a: "Грустно"
 ukraine_regions.10.t: "Сотрудничество с СНГ"
 ukraine_regions.10.d: "В последние годы мы не очень активно сотрудничали со странами СНГ. Определенная часть оппозиционно настроенного населения также может быть возмущена нашим решением продолжить сотрудничество, но мы должны решить, стоит ли нам это делать?"
 ukraine_regions.10.a: "Конечно"
 ukraine_regions.10.b: "Нет"
 ukraine_regions.11.t: "Переговоры об ассоциации с ЕС"
 ukraine_regions.11.d: "Пришло время начать переговоры об ассоциации с Европейским союзом, к началу которых мы так долго стремились, пришло время, наконец, решить, начнем ли мы их?"
 ukraine_regions.11.a: "Конечно"
 ukraine_regions.11.b: "Нет"
 ukraine_regions.12.t: "Вопрос о статусе Донбасса"
 ukraine_regions.12.d: "Мы уже много лет слышим о предложениях предоставить Донбассу особый статус, тем самым начав медленный процесс федерализации Украины. Это серьезное решение, которое мы должны принять, понимая, что пути назад не будет."
 ukraine_regions.12.a: "Мы предоставим им особый статус"
 ukraine_regions.12.b: "Оставим все как есть"
 ukraine_nato_help.1.t: "[FROM.GetName] предоставляет денежную помощь"
 ukraine_nato_help.1.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include monetary support."
 ukraine_nato_help.1.a: "Хорошо"
 ukraine_nato_help.2.t: "[FROM.GetName] оказывает помощь"
 ukraine_nato_help.2.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include light equipment and support."
 ukraine_nato_help.2.a: "Хорошо"
 ukraine_nato_help.3.t: "[FROM.GetName] предоставляет помощь"
 ukraine_nato_help.3.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include medium equipment for our brigades."
 ukraine_nato_help.3.a: "Хорошо"
 ukraine_nato_help.4.t: "[FROM.GetName] предоставляет помощь"
 ukraine_nato_help.4.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include heavy weaponry and equipment."
 ukraine_nato_help.4.a: "Хорошо"
 ukraine_nato_help.5.t: "[FROM.GetName] закупает пехотное снаряжение"
 ukraine_nato_help.5.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include infantry equipment."
 ukraine_nato_help.5.a: "Хорошо"
 ukraine_nato_help.6.t: "[FROM.GetName] закупает вспомогательное оборудование"
 ukraine_nato_help.6.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include support equipment."
 ukraine_nato_help.6.a: "Хорошо"
 ukraine_nato_help.7.t: "[FROM.GetName] закупает ПТ и ПВ оборудование"
 ukraine_nato_help.7.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include anti-tank and anti-air infantry weaponry."
 ukraine_nato_help.7.a: "Хорошо"
 ukraine_nato_help.8.t: "[FROM.GetName] закупает легкие транспортные средства"
 ukraine_nato_help.8.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include utility trucks, MRAPs and IMVs."
 ukraine_nato_help.8.a: "Хорошо"
 ukraine_nato_help.9.t: "[FROM.GetName] закупает БТР"
 ukraine_nato_help.9.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include APC."
 ukraine_nato_help.9.a: "Хорошо"
 ukraine_nato_help.10.t: "[FROM.GetName] Закупает БМП"
 ukraine_nato_help.10.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include IFV."
 ukraine_nato_help.10.a: "Хорошо"
 ukraine_nato_help.11.t: "[FROM.GetName] Provides Fighter Planes"
 ukraine_nato_help.11.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include fighter planes."
 ukraine_nato_help.11.a: "Хорошо"
 ukraine_nato_help.12.t: "[FROM.GetName] предоставляет ударные самолеты"
 ukraine_nato_help.12.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include strike planes."
 ukraine_nato_help.12.a: "Хорошо"
 ukraine_nato_help.13.t: "[FROM.GetName] закупает артиллерийское оборудование"
 ukraine_nato_help.13.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package produced locally for investor's money will include self-propelled artillery and ammo."
 ukraine_nato_help.13.a: "Хорошо"
 ukraine_nato_help.14.t: "[FROM.GetName] закупает танки"
 ukraine_nato_help.14.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package produced locally for investor's money will include MBTs."
 ukraine_nato_help.14.a: "Хорошо"
 ukraine_parliament.100.d: "The Pro-Russian Bloc in our parliament has won the majority of the seats in our parliament, as a result of the high level of influence that the Russian government currently holds over Ukraine."
 ukraine_parliament.100.t: "Pro-Russian Bloc Wins Majority of the Seats"
 ukraine_parliament.100.a: "Let's See How They Do"
 ukraine_parliament.200.d: "The Pro-Western Bloc in our parliament has won the majority of the seats in our parliament, as a result of the high level of influence that the American government currently holds over Ukraine."
 ukraine_parliament.200.t: "Pro-Western Bloc Wins Majority of the Seats"
 ukraine_parliament.200.a: "Let's See How They Do"
 ukraine_parliament.300.t: "Проукраинский блок получает большинство мест"
 ukraine_parliament.300.d: "Проукраинский блок в нашем парламенте получил большинство мест на недавних выборах, и это благодаря колеблющемуся влиянию американского правительства и российского правительства."
 ukraine_parliament.300.a: "Let's See How They Do"
 ukraine_parliament.400.t: "Парламентские выборы"
 ukraine_parliament.400.d: "Election season has come around once more, and voting booths all around the nation have begun to open up. Hopefully voter turnout is high enough to bring about good change in the nation."
 ukraine_parliament.400.a: "Let's See How It Goes"
 ukraine_parliament.1.t: "Парламент одобрил закон о централизации"
 ukraine_parliament.1.d: "Парламент принял решение о принятии законопроекта, который увеличивает расходы на бюрократию, в соответствии с нашим предложением, сделанным несколько дней назад/"
 ukraine_parliament.1.a: "Отлично"
 ukraine_parliament.2.t: "Парламент отклонил новый закон о централизации"
 ukraine_parliament.2.d: "Парламент отклонил законопроект, который увеличит расходы на бюрократию. Это произошло после нашего предложения, которое было внесено несколько дней назад, и, судя по всему, оно оказалось недостаточно популярным."
 ukraine_parliament.2.a: "Прискорбно"
 ukraine_parliament.2.b: "Возможно, небольшой подкуп заставит их передумать..."
 ukraine_parliament.3.t: "Парламент одобрил закон о децентрализации"
 ukraine_parliament.3.d: "The Parliament has approved our request to decrease bureaucracy spending. This comes following our proposal that was made a few days back, and it appears that the motion gained a lot of popularity and support."
 ukraine_parliament.3.a: "Отлично"
 ukraine_parliament.4.t: "Парламент отклонил новый закон о децентрализации"
 ukraine_parliament.4.d: "Парламент отклонил законопроект, который уменьшит расходы на бюрократию. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, похоже, предложение оказалось недостаточно популярным."
 ukraine_parliament.4.a: "Прискорбно"
 ukraine_parliament.4.b: "Возможно, небольшой подкуп заставит их передумать..."
 ukraine_parliament.5.t: "Парламент утверждает наш новый военный бюджет"
 ukraine_parliament.5.d: "The Parliament has approved our request to increase military spending. This comes following our proposal that was made a few days back, and it appears that the motion gained a lot of popularity and support."
 ukraine_parliament.5.a: "Отлично"
 ukraine_parliament.7.t: "Парламент отклоняет наш новый военный бюджет"
 ukraine_parliament.7.d: "The Parliament has rejected our request to increase military spending. This comes following our proposal that was made a few days back, and it appears that the motion has not gained a lot of popularity and support."
 ukraine_parliament.7.a: "Прискорбно"
 ukraine_parliament.7.b: "Может быть, небольшая взятка заставит их передумать..."
 ukraine_parliament.8.t: "Парламент утверждает наш новый военный бюджет"
 ukraine_parliament.8.d: "The Parliament has approved our request to decrease military spending. This comes following our proposal that was made a few days back, and it appears that the motion gained a lot of popularity and support."
 ukraine_parliament.8.a: "Отлично"
 ukraine_parliament.9.t: "Парламент отклоняет наш новый военный бюджет"
 ukraine_parliament.9.d: "The Parliament has rejected our request to decrease military spending. This comes following our proposal that was made a few days back, and it appears that the motion has not gained a lot of popularity and support."
 ukraine_parliament.9.a: "Прискорбно"
 ukraine_parliament.9.b: "Может быть, небольшая взятка заставит их передумать..."
