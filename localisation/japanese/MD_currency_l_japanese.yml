l_japanese:
 reserve_currency: "準備通貨政策"
 reserve_currency_desc: "この国の外貨準備と対外債務の通貨基盤。主要な準備通貨に連動する国は、その流動性ネットワークや決済インフラにアクセスできる一方、自国通貨準備を維持する国は国際信用へのアクセスを犠牲にする代わりに、完全な通貨主権を保持することになる。"
 us_dollar: "[1182.owner.GetAdjective]ドル"
 us_dollar_desc: "米ドルは世界有数の準備通貨である。ドル建ての準備資産を保有することは、比類のない流動性と国際金融市場へのアクセスを提供する一方で、自国通貨が下落した際にドル建ての債務コストが急激に上昇するというリスクも伴う。"
 euro: "ユーロ"
 euro_desc: "ユーロは欧州連合の通貨であり、世界第2位の取引高を誇る準備通貨でもある。ユーロはEU加盟国に開放されており、域内の通貨安定を保障するとともに、加盟国が欧州資本市場に参入する際の優遇措置を提供している。"
 chinese_yuan: "[547.owner.GetAdjective]元"
 chinese_yuan_desc: "人民元は中国の法定通貨であり、新興の国際準備資産でもある。中国政府はこれを、米ドルの支配的地位に代わる選択肢と見なしている。中国経済圏内の貿易相手国は、日々整備が進む決済ネットワークの恩恵を受けている。"
 russia_rouble: "[652.owner.GetAdjective]ルーブル"
 russia_rouble_desc: "ルーブルはロシア連邦の通貨であり、ユーラシア経済連合内および旧ソ連諸国との貿易相手国間で使用されている。ルーブルの準備高を保有することは、その国をロシアの代替決済システムおよびエネルギー決済の枠組みに組み込むことを意味する。"
 japanese_yen: "[615.owner.GetAdjective]円"
 japanese_yen_desc: "円は日本の法定通貨であり、世界の取引高で第3位の通貨でもある。日本経済圏内の国々は、その確立された決済ネットワークと円の相対的な安定性の恩恵を受けているが、東アジア以外での準備通貨としての採用は依然として限定的である。"
 british_pound: "[13.owner.GetAdjective]ポンド"
 british_pound_desc: "英ポンドは、現在も国際的に流通している最も古い準備通貨である。英連邦内の貿易や金融取引を支えるとともに、世界の外貨準備において重要な地位を占めており、英国と連携する国々に対し、ロンドンの豊富な資本市場へ安定的にアクセスする手段を提供している。"
 swiss_frank: "[74.owner.GetAdjective]フラン"
 swiss_frank_desc: "スイス・フランはスイスの法定通貨であり、世界的に安全資産として広く知られている。他国がこれを公式な準備通貨として採用することは稀だが、スイス・フランの厳格な通貨規律とスイスの政治的中立性により、通貨危機や外部からのショックに対して独自の耐性を持っている。"
 no_foreign_reserve: "国内準備通貨"
 no_foreign_reserve_desc: "この国は外国通貨ではなく自国通貨で準備を保有している。完全な通貨主権を維持し、外部からの為替レートの変動による影響を受けない一方で、主要準備通貨に結びついた流動性ネットワークや国際的な信用供与の機会を放棄している。"
 currency_strength_modifier: "通貨強度"
 reserve_roi_bonus: "準備通貨投資収益率"
 reserve_roi_bonus_desc: "強力な外貨準備を保有することは、追加的な投資収益をもたらす。この収益は、発行国の通貨強度と採用ネットワークの規模に応じて毎月変動する。発行国の経済が弱体化するとこのボーナスは減少する。"
 reserve_trade_bonus: "準備通貨貿易連携"
 reserve_trade_bonus_desc: "同じ通貨圏で事業を展開することによる、わずかな貿易評価ボーナス。これは、同じ準備通貨を使用する国々間で共有される優遇的な貿易関係や決済インフラを反映したものである。"
 seigniorage_income_modifier: "通貨発行益"
 monetary_policy_decisions: "金融政策"
 monetary_policy_expand_money_supply: "通貨供給の拡大"
 monetary_policy_expand_money_supply_desc: "中央銀行に通貨供給の拡大を指示する。準備通貨を発行する国々は、自国通貨に対する海外からの需要がインフレ圧力の多くを吸収するため、最も大きな恩恵を受ける。すべての国は、ある程度の通貨安に直面することになる。"
 monetary_policy_austerity: "緊縮政策"
 monetary_policy_austerity_desc: "財政政策を引き締め、通貨供給を抑制する。これにより短期的な収入への圧力は緩和されるが、通貨の価値を高め、国家予算を抑制することができる。"
 currency_backing: "通貨裏付け"
 currency_backing_desc: "国家通貨の基盤となる資産基準。ハードマネー制度は、通貨を商品備蓄と結びつけることで抑制効果を発揮するが、その一方で金融政策の柔軟性を制限する。フィアット通貨制度は完全な通貨主権を認めるが、その代償としてインフレのリスクが高まる。"
 gold_standard_back: "金本位制"
 gold_standard_back_desc: "自国通貨は金と連動しており、固定レートで金と交換することができる。通貨供給の拡大は実物金準備によって制約されるため、長期的な信頼は得られるものの、経済危機への政府の対応能力は制限される。"
 silver_standard: "銀本位制"
 silver_standard_desc: "同国の通貨は銀準備によって裏付けられ、固定為替レートを採用している。金本位制に比べ銀本位制は制約が少なく、商品価格の規律をある程度維持しつつ、通貨の柔軟性をわずかに高めることができる。"
 bi_metal_standard: "複本位制"
 bi_metal_standard_desc: "この通貨は金と銀を裏付けとし、固定為替レートに基づいて交換される。歴史的に見て、この通貨制度は通貨供給量を拡大することを目的としており、商品の規律とのバランスを保ちつつ、単一金属本位制よりも供給面での柔軟性を高めている。"
 no_currency_backing: "不換紙幣"
 no_currency_backing_desc: "この通貨は、発行する政府の権威と信用のみによって裏付けられている。商品による制約がないため、金融政策には十分な柔軟性がある。これにより、政府は危機に迅速に対応できる一方で、インフレ圧力の影響を受けやすくなる。"
 gulden: "[46.owner.GetAdjective]ギルダー"
 gulden_desc: "オランダの歴史的な通貨であり、ユーロ圏離脱後に再導入された。厳格な金融規律と巨額の貿易黒字に支えられ、ギルダーは完全な通貨主権を保障し、経済を外部ショックから守る。ただし、主要な準備通貨圏のような潤沢な流動性はなく、海外で保有されることは稀である。"