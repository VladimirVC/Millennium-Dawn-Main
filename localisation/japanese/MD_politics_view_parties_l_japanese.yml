 BOS.Caliphate: "£BOS_salafist_jihadism エル・ムジャヒド"
 BOS.Caliphate_desc: "エル・ムジャヒド（ボスニア・ムジャヒディン）は、ボスニア戦争（1992年～1995年）中にボスニア・ヘルツェゴビナにやって来て、ボスニア・セルビア人およびクロアチア人部隊に対抗してボスニア軍と共に戦った外国人戦闘員の集団を指す。エル・ムジャヒドという用語は、アラビア語で闘う者たちを意味するムジャヒディンに由来する。このグループは主にアラブ諸国やその他のイスラム諸国からの外国人戦闘員で構成されており、その多くはボスニア人の独立闘争に感化され、ボスニアを世界的なジハードの新たな戦場と見なしていた。エル・ムジャヒドの戦闘員たちは当初、一部のボスニア人指導者から歓迎されたが、やがてボスニア・ヘルツェゴビナ国内の多くの人々にとって、論争と懸念の種となった。同グループは、セルビア人やクロアチア人の民間人に対する戦争犯罪や残虐行為を行ったと非難され、一部のボスニア系指導者は、彼らの存在が国際社会におけるボスニアの評判を損なうことを懸念した。ボスニア戦争終結後、多くのエル・ムジャヒドの戦闘員はボスニア・ヘルツェゴビナを去ったが、一部は残留し、ボスニア社会に溶け込んだ。エル・ムジャヒドの遺産は、ボスニア・ヘルツェゴビナにおいて今なお議論の的となっており、彼らをボスニア系住民の独立のために戦った英雄と見る者もいれば、分裂や過激主義の源と見なす者もいる。"
