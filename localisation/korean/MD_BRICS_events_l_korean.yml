l_korean:
 brics_join.1.t: "[FROM.GetNameDef]의 BRICS 가입 신청"
 brics_join.1.d: "[FROM.GetNameDef]이(가) BRICS 가입을 공식 신청했습니다. 연합의 주도국으로서 이들의 가입 승인 여부는 우리의 결정에 달려 있습니다."
 brics_join.1.a: "이들은 연합을 강화할 것이다. 승인하라."
 brics_join.1.b: "이들의 가입은 우리에게 도움이 되지 않는다."
 brics_join.2.t: "가입 신청 승인됨"
 brics_join.2.d: "BRICS가 우리의 가입 신청을 승인했습니다. 우리는 연합의 회원국들 사이에 자리를 잡게 되었습니다."
 brics_join.2.a: "BRICS에서 우리의 자리를 차지하자."
 brics_join.3.t: "BRICS 가입 신청 거부됨"
 brics_join.3.d: "BRICS 지도부가 우리의 가입 신청을 거부했습니다. 문이 영원히 닫힌 것은 아니며, 시간이 지나면 다시 가입을 추진할 수 있습니다."
 brics_join.3.a: "나중에 다시 신청할 것이다."
 brics_join.3.b: "가입 노력을 단념하자."
 brics_join.4.t: "[ROOT.GetNameDef]의 BRICS 가입"
 brics_join.4.d: "[ROOT.GetNameDef]이(가) BRICS에 가입하여 국제 질서에서 블록의 영향력과 비중을 확대했습니다."
 brics_join.4.a: "변화하는 힘의 균형"
 brics_join.5.t: "BRICS 가입 재추진 시기 도래"
 brics_join.5.d: "지난 거부 이후 충분한 시간이 흘렀습니다. 이제 BRICS 지도부에 가입 신청서를 새로 제출할 수 있습니다."
 brics_join.5.a: "가입 신청서 재제출"
 brics_join.5.b: "아직은 아니다."
 brics_join.6.t: "[FROM.GetNameDef]의 BRICS 창설 초청"
 brics_join.6.d: "[FROM.GetNameDef]이(가) BRICS를 출범시키며 우리에게 창립 회원국으로 동참하여 출범 초기부터 블록을 함께 형성해 나갈 것을 요청했습니다."
 brics_join.6.a: "우리는 BRICS 창설을 도울 것이다."
 brics_join.6.b: "우리는 거리를 둘 것이다."