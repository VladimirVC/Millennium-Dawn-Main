 investments_construction_CIC: "§YCivilian Industry§!\nThis building provides the state with industry for production of civilian goods or construction of new buildings. Can be converted to military industry if needed.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^1|3]§! Billion"
 investments_construction_CIC_delayed: "§YPrerequisites§!:\n[!investments_building_cic_button_click_enabled]"
 investments_construction_MIC: "§YMilitary Industry§!\nThis building provides the state with industry for production of new military equipment. Can be converted to civilian industry if needed.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^2|3]§! Billion"
 investments_construction_MIC_delayed: "§YPrerequisites§!:\n[!investments_building_mic_button_click_enabled]"
 investments_construction_NIC: "§YNaval Yard§!\nThis building provides the state with industry for building new ships.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^3|3]§! Billion"
 investments_construction_NIC_delayed: "§YPrerequisites§!:\n[!investments_building_nic_button_click_enabled]"
 investments_construction_INF: "§YInfrastructure§!\nThis building provides the state with improvement of infrastructure. It increases your supply power in strategic regions and increases your divisions' speed, as well as increasing your raw resource extraction.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^4|3]§! Billion"
 investments_construction_INF_delayed: "§YPrerequisites§!:\n[!investments_building_infra_button_click_enabled]"
 investments_construction_offices: "§YOffice Sector§!\nThe office sectors represents all the other industries of the economy beyond the extraction and heavy industries. These includes financial, customer, information technology, retail services and so much more.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^5|3]§! Billion"
 investments_construction_offices_delayed: "§YPrerequisites§!:\n[!investments_building_offices_button_click_enabled]"
 investments_construction_AA: "§YSHORAD Sites§!\n§YSHORAD Sites§!(Short Range Air Defense) are complexes and groups of anti-aircraft weapons and tactics that handle air defence against low-altitude air threats. These sites work together to divide airspace into defensible areas providing local military targets and infrastructure air coverage from everything ranging from helicopters to low-flying aircraft to jets.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^6|3]§! Billion"
 investments_construction_AA_delayed: "§YPrerequisites§!:\n[!investments_building_antiair_button_click_enabled]"
 investments_construction_RAD: "§YRadar Station§!\nRadar Stations allows you to gain intel on enemy troops in nearby states. It consists of various radars and sensors, as well as intel assets and capacity to analyse the evolving situation.\nA higher level will increase it's effective range.\nIt's radars also provides the state with better detection of enemy air forces, giving your aircraft a better chance to engage them.\nIn addition the radars are increasing detection of enemy fleets at sea.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^7|3]§! Billion"
 investments_construction_RAD_delayed: "§YPrerequisites§!:\n[!investments_building_radar_button_click_enabled]"
 investments_construction_AIR: "§YAir Base§!\nThis building provides the state with deployment for your air forces.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^8|3]§! Billion"
 investments_construction_AIR_delayed: "§YPrerequisites§!:\n[!investments_building_airbase_button_click_enabled]"
 investments_construction_fuel_silo: "§YStrategic Resource Reserve§!\nThis building provides your nation with more room for stockpiling §HFuel§!.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^9|3]§! Billion"
 investments_construction_fuel_silo_delayed: "§YPrerequisites§!:\n[!investments_building_fuel_silos_button_click_enabled]"
 investments_construction_internet_station: "§YNetwork Infrastructure§!\nNetwork Infrastructure are tall structures used in the telecommunication and radio communication fields in order to push transmissions across great distances or underground fiber optic cables and cloud computing systems.\n\nEach level of §YNetwork Infrastructure§! improves local productivity growth speed by §G+5.00%§!.\nEach level of §YNetwork Infrastructure§! reduces the duration of §YInternational Investments§! by §G-5.00%§!.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^10|3]§! Billion"
 investments_construction_internet_station_delayed: "§YPrerequisites§!:\n[!investments_building_internet_station_button_click_enabled]"
 investments_construction_REF: "§YRenewable Energy Infrastructure§!\nRenewable energy infrastructure is a catch-all for all renewable energy sources. These include but are not limited to; solar parks, wind turbines, biofuel refineries, charcoal plants, biofuel power plants, and more. As such, it uses renewable sources and produces fuel from those sources.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^11|3]§! Billion"
 investments_construction_REF_delayed: "§YPrerequisites§!:\n[!investments_building_ref_button_click_enabled]"
 investments_construction_POWER_PLANT: "§YFossil Fuel Powerplant§!\nFossil Fuel Powerplant is a catch-all for all fossil-based thermoelectric energy sources. These include but are not limited to; coal, natural gas and oil.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^12|3]§! Billion"
 investments_construction_POWER_PLANT_delayed: "§YPrerequisites§!:\n[!investments_building_power_plant_button_click_enabled]"
 investments_construction_NUCLEAR_REACTOR: "§YNuclear Reactor§!\nThe Nuclear Reactor building converts nuclear energy into electrical energy, consuming moderately enriched uranium in the process.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^13|3]§! Billion"
 investments_construction_NUCLEAR_REACTOR_delayed: "§YPrerequisites§!:\n[!investments_building_nuclear_reactor_button_click_enabled]"
 investments_construction_agriculture_district: "§YCommercialized Agriculture District§!\nCommercialized Agriculture District represents a catch-all for all non-subsistence Agriculture within our nation. It includes Agro-Industry, arable land, grain silos, butcherhouses and more.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^14|3]§! Billion"
 investments_construction_agriculture_district_delayed: "§YPrerequisites§!:\n[!investments_building_agriculture_district_button_click_enabled]"
