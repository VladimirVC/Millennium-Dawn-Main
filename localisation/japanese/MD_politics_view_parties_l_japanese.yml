 KUW.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small (NIA) 国民イスラム同盟"
 KUW.Vilayat_e_Faqih_desc: "シーア派イスラム主義 - 国民イスラム同盟はクウェートで最も有力なシーア派勢力であり、そのルーツは「クウェート・ヒズボラ」にある。同党はイランの「ウィラヤト・アル・ファキーフ」の教義に従っているが、イランと過度に接近しないよう慎重を期しており、クウェート王室とは友好的な関係を維持している。"
 KUW.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small 正義と平和の同盟"
 KUW.Mod_Vilayat_e_Faqih_desc: "シーア派イスラム主義シラージ派 - 国民イスラム同盟のシラージ派は、歴史的に概して親政府的な立場を貫いており、他のほとんどのシラージ派政党と同様、ホメイニ主義のイラン・イスラム共和国とは政治的にも宗教的にも距離を置いている。"
