 state_owned_local_naval_infrastructure_modifier: "Expansión de la Infraestructura Naval Local"
 state_owned_local_naval_infrastructure_modifier_desc: "La inversión en defensa costera e infraestructura naval ha transformado las capacidades marítimas del estado. Nuevas instalaciones navales y centros de suministro brindan ahora un apoyo integral a las operaciones navales en la región."
 state_owned_local_fortification_efforts_modifier: "Esfuerzos de Fortificación Local"
 state_owned_local_fortification_efforts_modifier_desc: "Se han construido extensas obras defensivas en todo el estado, incluyendo búnkeres, fortificaciones costeras y redes de fortificaciones. Estas instalaciones militares mejoran significativamente la capacidad defensiva del estado contra invasiones y asaltos terrestres."
