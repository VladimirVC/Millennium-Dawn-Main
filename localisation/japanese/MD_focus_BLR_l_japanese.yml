 BLR_end_reform: "陸軍改革完了"
 BLR_end_reform_desc: "We will complete the reforms of our army, and it will now meet modern standards."
 BLR_MZKT_desc: "Minsk Wheeled Tractor Plant is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_minoitor_desc: "Minotor-Service is a Belarusian enterprise located in Minsk and engaged in the development, production, modernization, repair, and maintenance of combat tracked vehicles, as well as the supply of spare parts. It is one of the leading enterprises of the country's military-industrial complex."
 BLR_belspecveshtech_desc: "Belspetsvneshtechnika, BSVT is a Belarusian state-owned foreign trade unitary enterprise founded in 1995. It specializes in the trade and production of weapons and dual-use products. It is a member of the State Military-Industrial Committee and is considered the country's leading enterprise in the field of arms exports."
 BLR_140_zavod_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of Belarus, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_fight_the_oligarchs_desc: "We cannot allow oligarchs to hold power in our country, or we will definitely not see economic growth."
 BLR_russian_fsb_desc: "The FSB will work together with our special services and provide us with greater political stability."
 BLR_science_boost: "科学への投資"
 BLR_science_boost_desc: "Science should be funded as generously as possible from the state budget."
 BLR_support_promka: "国内産業支援"
 BLR_support_promka_desc: "We will support the domestic industry."
 BLR_boost_economic: "経済成長加速"
 BLR_boost_economic_desc: "Our reforms are making themselves felt and the economy has started to grow."
 BLR_anti_gibdd: "反LGBT政策"
 BLR_anti_gibdd_desc: "We reject and will fight LGBT propaganda in our country."
 BLR_union_state_course: "連合国家への道筋"
 BLR_union_state_course_desc: "Our goal is the Union State, and we will strive for it."
 BLR_support_army: "陸軍支援"
 BLR_support_army_desc: "We will support the military in our country, because it is thanks to them that our country remains independent."
 BLR_russian_tver_desc: "We will purchase a large number of wagons from Russia for our railways."
 BLR_russian_teplovzor_desc: "We will open the production of thermal imagers, which we will also be able to sell to Russia for use in their armed forces."
 BLR_dai_denyag: "ロシアに融資要請"
 BLR_dai_denyag_desc: "We will ask the Russian government to provide us with a loan."
 BLR_kgb: "KGB"
 BLR_Kal: "共同カリ販売業者"
 BLR_Kal_desc: "We will propose to Russia the creation of a joint stock company that will be our common potassium trader."
 BLR_Kal2: "カリ共同販売業者閉鎖"
 BLR_Kal2_desc: "Recent criminal cases initiated by us against employees of the Russian company Uralkali, as well as abuses of authority on their part, have forced us to close the joint trader and create our own."
 BLR_New_concept_security_desc: "Our defensive concept needs to be updated, and we will make the necessary changes to our law."
 BLR_anti_lgbtqa_stance: "反LGBT政策"
 BLR_revansh_return: "プラーヴィー・レヴァンシュ復活"
 BLR_revansh_return_desc: "The Praviy Revansh was a nationalist organization of the 1990s that professed anti-Polish and anti-Russian rhetoric, and argued for the creation of paramilitary organizations modeled on Ukrainian ones."
 BLR_blackcat: "黒猫復活"
 BLR_blackcat_desc: "The Black Cat was a large partisan organization that operated on Belarusian territory for forty years, fighting for independence against the Soviet government. Their methods will serve us well in defending against enemy invasions."
 BLR_create_nationalsecurity: "新部門創設"
 BLR_create_nationalsecurity_desc: "Instead of the KGB, a legacy of the USSR, we will create two new structures: the National Security Service and the National Intelligence Service."
 BLR_zmagar_army: "陸軍改革"
 BLR_zmagar_army_desc: "Our army needs urgent reform. While we were busy with the socio-political transformation of our country, our armed forces were seriously weakened."
 BLR_Belshina: "JSCベルシナ"
 BLR_Belshina_desc: "JSC Belshina is a manufacturer of automobile tires. It produces tires for passenger cars, trucks, heavy-duty vehicles, road construction and lifting vehicles, electric vehicles, buses, tractors and agricultural machinery."
 BLR_whitelegion_battalion_category: "白い軍団"
 BLR_whitelegion_battalion_category_desc: "The White Legion is a sports and patriotic Belarusian organization that was transformed into a military one. The White Legion appeared in the early 1990s and maintained order at opposition meetings and rallies. Its members were trained as special forces, earning a steel beret analogous to the crimson one. They were given in-depth knowledge of the history of Belarus."
 BLR_white_legion_battalion_create: "白い軍団大隊創設"
 BLR_white_legion_recruit_youngfront: "若い戦線卒業生徴募"
 BLR_white_legion_recruit_people: "忠実な市民徴募"
 BLR_white_legion_recruit_revansh: "「プラーヴィー・レヴァンシュ」組織メンバー徴募"
 BLR_white_legions_TT: "徴募兵数が§Y[?modify_white_legion]§!変化する！\n"
 BLR_whitelegion_recruit_2000: "利用可能な徴募兵数は2000人"
 BLR_union_programm_desc: "It is necessary to strengthen the integration of our countries. We will agree on several roadmaps for integration with Russia."
 BLR_soviet_system: "国家ボリシェヴィキ・ベラルーシ"
 BLR_soviet_system_desc: "The National Bolsheviks have seized power in the country and are ready to begin their first economic reforms. One of these will be a return to the Soviet economic system, given the unsuccessful record of the previous ruler."
 BLR_free_weapon: "武器の自由携帯"
 BLR_free_weapon_desc: "We will allow our citizens to carry weapons freely in the country. They have the right to self-defense!"
 BLR_new_church: "新宗教"
 BLR_new_church_desc: "It is time to create a new religion that serves the interests of our state!"
 BLR_reform_education: "教育改革"
 BLR_reform_education_desc: "教育システムはひどい状態にある。我々はそれを修正し、このシステムに重大な変更を導入するだろう。革新の一つは、学童と学生の学習時間を短縮し、彼らをより早く完全な市民になる準備をさせることだ。"
 BLR_ruralisation: "農村化"
 BLR_ruralisation_desc: "21世紀のトレンドは人々が村から都市へ移住することだが、我々はこれを逆転させ、貧困層やホームレスに村へ行くことを提案し、その見返りに新しい住居での活動を刺激するだろう。"
 BLR_revoult_army: "革命軍"
 BLR_revoult_army_desc: "Our army has not shown itself in the best light. It needs people who burn with the passion of the revolution, ready to throw themselves at an enemy machine gun for the sake of the motherland."
 BLR_revoult_army_zeks: "囚人の陸軍徴募許可"
 BLR_revoult_army_zeks_desc: "We will start recruiting prisoners into the army, placing them in separate battalions. Stop feeding the prisoners — they must feed the flame of the revolution!"
 BLR_revoult_rne: "ロシア民族統一招待"
 BLR_revoult_rne_desc: "We will officially bring representatives of this nationalist organization into government structures."
 BLR_revoult_sobor: "白ロシア・スラヴ聖堂招待"
 BLR_revoult_sobor_desc: "We will officially bring representatives of this nationalist organization into government structures."
 BLR_revoult_army_volunteer: "革命精神"
 BLR_revoult_army_volunteer_desc: "Some of our soldiers are so eager to fight that they would go to another country. Perhaps we should not restrain their zeal and should send them to fulfill their international duty?"
 BLR_revoult_army_gco: "共産主義正教守護隊"
 BLR_revoult_army_gco_desc: "我々はイランのIRGC（イスラム革命防衛隊）に倣い、独自の軍隊を創設するだろう。彼らの経験は我々に大きな感銘を与えた。彼らは共産主義正教守護隊と呼ばれるだろう。"
 BLR_work_army: "労働者軍"
 BLR_work_army_desc: "我々は全ての失業者を生産に送り、第一に我が国家に必要な商品の生産を設定するだろう。"
 BLR_revoult_army_gco_ground_force: "地上部隊"
 BLR_revoult_army_gco_ground_force_desc: "GCO（共産主義正教守護隊）構成における主要かつ最も多数の部隊種別。平時には、軽火器で装備される。主な目的：国内治安。二次的：ベラルーシ正規軍と連携した対外防衛。"
 BLR_revoult_debur: "脱官僚化"
 BLR_revoult_debur_desc: "We will reduce expenditure on officials and cut their numbers, and the freed funds will go to the benefit of the people."
 BLR_revoult_army_gco_anti_corrupt: "反汚職革命委員会"
 BLR_revoult_army_gco_anti_corrupt_desc: "We will create a special unit to fight corruption in our country. No one will hide from the hand of justice."
 BLR_revoult_dsocial: "社会支援"
 BLR_revoult_dsocial_desc: "We will strengthen social support for our citizens! No one will be left without help."
 BLR_revoult_army_agro_invest: "農業産業開発"
 BLR_revoult_army_agro_invest_desc: "We must invest as much as possible in the development of our agro-industry!"
 BLR_revoult_army_gco_air: "空軍"
 BLR_revoult_army_gco_air_desc: "We will create an air wing and give our guards the opportunity to use aviation to fulfill their goals."
 BLR_revoult_army_gco_drone: "ドローン部隊"
 BLR_revoult_army_anti_west: "反西側ドクトリン"
 BLR_revoult_army_anti_west_desc: "Western civilization has always been and will always be our enemy, forever seeking our destruction."
 BLR_revoult_army_interbrigade: "国際旅団"
 BLR_revoult_army_interbrigade_desc: "We intend to form interbrigade units, which we will send abroad to protect our interests."
 BLR_kgb_expanded: "KGB拡大"
 BLR_kgb_expanded_desc: "We will strengthen the influence of the KGB, because we do not intend to dissolve such an effective instrument of state security."
 BLR_army_stabilize: "陸軍安定化"
 BLR_army_stabilize_desc: "For our future purposes, we need to restore the combat capability of the army."
 BLR_prepare_attacks: "介入準備"
 BLR_prepare_attacks_desc: "Our army is ready. We have assembled an impressive force and are ready to expand our country's influence across the former territory of the USSR."
 BLR_baltic_campaign: "バルト作戦"
 BLR_baltic_campaign_desc: "We will begin preparations for a military campaign in the Baltic States. These countries have no right to independence or existence!"
 BLR_baltic_war: "バルト進軍開始"
 BLR_baltic_war_desc: "Our army has taken up positions and is ready to begin a march on the Baltic States."
 BLR_ukraine_campaign: "ウクライナ作戦"
 BLR_ukraine_campaign_desc: "Our southern neighbor is showing signs of joining a military-political bloc hostile to us, which could be followed by an attack on us. We must strike first!"
 BLR_ukraine_campaign_border_prepare: "ウクライナ国境強化"
 BLR_ukraine_campaign_border_prepare_desc: "Despite the fact that we are attacking, we should prepare for possible countermeasures and construct fortifications on the border."
 BLR_poland_campaign_border_prepare: "ポーランド国境強化"
 BLR_poland_campaign_border_prepare_desc: "Despite the fact that we are attacking, we should prepare for possible countermeasures and construct fortifications on the border."
 BLR_poland_campaign_war: "ポーランド作戦開始"
 BLR_poland_campaign_war_desc: "Our army is ready! Forward to Warsaw!"
 BLR_ukraine_campaign_war: "ウクライナ作戦開始"
 BLR_ukraine_campaign_war_desc: "Our army is ready! Forward to Kyiv!"
 BLR_military_nazbol: "軍事産業への投資"
 BLR_military_nazbol_desc: "Our military industry has still not recovered to the level of Soviet times. We must fix this."
 BLR_nazbol_soviet_system_idea: "国家ボリシェヴィキ経済システム"
 BLR_revoult_army_idea: "革命軍"
 BLR_anti_baltic_idea: "反バルト・ドクトリン"
 BLR_anti_ukraine_idea: "反ウクライナ・ドクトリン"
 BLR_anti_west_idea: "反西側ドクトリン"
 GCO_anti_corruption_idea: "反汚職革命委員会"
 GCO_idea: "正統共産主義の守護隊"
 BLR_sobor: "白ロシア・スラヴ聖堂"
 BLR_rne: "ロシア民族統一"
 BLR_increased_social_spending_idea: "増加した社会支援"
 BLR_interbrigade_idea: "国際旅団"
 BLR_free_weapon_idea: "武器の自由携帯"
 BLR_ruralisation_idea: "農村化"
 BLR_revoult_spirits_idea: "革命精神"
 BLR_kal_with: "CJSC「ベラルーシカリウム会社」"
 BLR_kal_without: "JSC「ベラルーシカリウム会社」"
 BLR_National_Intelligence_Service: "国家情報局"
 BLR_blackkcat: "黒猫"
 BLR_revanshh: "プラーヴィー・レヴァンシュ"
 BLR_MVD_desc: "ベラルーシの国家行政機関であり、内務機関および内務省内務部隊のシステムを率い、その権限の範囲内で、犯罪との闘い、公共秩序の保護、公共安全の確保の分野における規制と管理、およびこの分野における他の共和国国家行政機関の活動調整を実施する。"
 BLR_Countering_Cybercrime_desc: "Cybercrimes must also fall under our supervision."
 BLR_with_tt: "追加収入: $$§G0.150§!（[BLR.GetFlag]ベラルーシ＝[SOV.GetFlag]ロシア間の§Yカリウム貿易§!）\n"
 BLR_without_tt: "追加収入: $$§G0.210§!（[BLR.GetFlag]ベラルーシ＝[SOV.GetFlag]ロシア間の§Yカリウム貿易§!）\n"
 BLR_rus_oil_tt: "週毎の支出$§R0.044§!（§Y[SOV.GetFlag]ロシア§!エネルギー資源）\n"
 BLR_rus_oil_positive_tt: "週毎の支出$§R0.066§!（§Y[SOV.GetFlag]ロシア§!エネルギー資源）\n"
 BLR_sov_oil_tt: "追加収入: $$§G0.44§!（§Y[BLR.GetFlag]ベラルーシ§!とのエネルギー契約）\n"
 BLR_sov_oil_positive_tt: "追加収入: $$§G0.66§!（§Y[BLR.GetFlag]ベラルーシ§!とのエネルギー契約）\n"
 belarus_another.52.b: "交渉を試みよ"
 belarus_another.55.t: "ジーンズ革命"
 belarus_another.55.d: "Protests are gaining momentum in Belarus and the Belarusian government cannot suppress them. Perhaps we should step in and save their government?"
 belarus_another.55.a: "我々は専門家を送るだろう"
 belarus_another.55.b: "干渉しないでおこう"
 belarus_another.56.t: "ジーンズ革命"
 belarus_another.56.d: "ロシアは我々に専門家を送り、我々は共に抗議を鎮圧することができた！"
 belarus_another.56.a: "ありがとうロシア"
 belarus_another.57.t: "ジーンズ革命"
 belarus_another.57.d: "我々は秘密裏にロシア政府に助けを求めたが、彼らは我々を拒否し、それは我々を革命運動と一対一で残す。"
 belarus_another.57.a: "神よ、我らを助けたまえ"
 belarus_another.58.t: "ジーンズ革命"
 belarus_another.58.d: "The protests are gaining momentum. Some administrative buildings have already been seized, riots are breaking out in other cities, and some generals have defected to the rebels. What should we do?"
 belarus_another.58.a: "我々は最後まで戦う！"
 belarus_another.58.b: "我々は平和的に権力を譲るだろう"
 belarus_another.59.t: "ベラルーシ、融資要請"
 belarus_another.59.d: "The Belarusian government is asking us to provide them with a loan. We may not be sure of their solvency, but the influence we will gain will definitely pay for itself."
 belarus_another.59.a: "彼らに金を与えよう"
 belarus_another.59.b: "我々は拒否するだろう"
 belarus_another.60.t: "ロシア融資"
 belarus_another.60.d: "ロシア政府は我々に融資することに同意した。"
 belarus_another.60.a: "よし"
 belarus_another.61.t: "ロシア融資"
 belarus_another.61.d: "ロシア政府は我々への融資を拒否した。"
 belarus_another.61.a: "残念だ。"
 belarus_another.62.t: "ベラルーシが共同カリウム貿易機関の設立を提案"
 belarus_another.62.d: "The Belarusian government has proposed creating a joint potassium trading company between our two enterprises, Uralkali and Belaruskali. Together, we will be able to profit more from this resource."
 belarus_another.62.a: "同意する"
 belarus_another.62.b: "同意しない"
 belarus_another.63.t: "共同カリウム貿易"
 belarus_another.63.d: "ロシア政府は共同のカリウム貿易会社を設立することに合意した。"
 belarus_another.63.a: "よし"
 belarus_another.64.t: "ベラルーシが共同カリウム貿易を停止"
 belarus_another.64.d: "The confrontation between our two potassium trading enterprises has reached its limit and the Belarusian government has decided to break away and create its own trader."
 belarus_another.64.a: "残念だ。"
 belarus_another.65.t: "親連合クーデター"
 belarus_another.65.d: "We attempted to carry out a coup in Belarus using all our administrative and law enforcement resources, as well as our connections."
 belarus_another.65.a: "結果を見てみよう"
 BLR_oil_sov: "ベラルーシとのエネルギー契約"
 BLR_new_railways: "新たな鉄道"
 BLR_constitution_BSSR: "ベラルーシ・ソビエト社会主義共和国憲法"
 BLR_constitution_BSSR_desc: "まず第一に、BSSR（白ロシア・ソビエト社会主義共和国）憲法を回復する必要がある。"
 BLR_Excursion_Vilnius: "ヴィリニュスへの「遠足」"
 BLR_Excursion_Vilnius_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Vilnius. We can help them organize it. A border crossing from our territory is theoretically possible, but will Lithuania declare war on us afterwards?"
 BLR_vilnius_return: "ヴィリニュス統合"
 BLR_belorusisation_vilnius: "ヴィリニュスのベラルーシ化"
 BLR_belorusisation_vilnius_desc: "Vilnius has long been a disputed region that we sought to possess, but now that we have secured it, we are ready to promote to the masses the idea of settling the region with Belarusians."
 BLR_new_democratic_constitution: "新民主憲法"
 BLR_new_democratic_constitution_desc: "It is time to adopt a new constitution consistent with Western democracy."
 BLR_Great_stone_china: "中国のグレートストーン"
 BLR_national_library: "ベラルーシ国立図書館"
 BLR_Transnistria_enemy: "トランスニストリア問題解決"
 BLR_Transnistria_enemy_desc: "Transnistria is a small, unrecognized state that has long been a headache for Moldova. We are ready to help them solve this problem — by taking these lands for ourselves, of course."
 BLR_transnistria_claims: "§Y[PMR.GetNamewithFlag]§!への領土主張！"
 BLR_batka_krut_TT: "我々は§Y政治領域§!を§R浄化§!し、我々に忠実な§Gいくつかの政党§!だけを残し、§Yルカシェンコ§!のために§G真の愛国政党を創設§!するだろう！"
 belarus_politics.1.t: "新しい政治的現実"
 belarus_politics.1.d: "抗議者に対する勝利は記念碑的であったが、我が国を破壊する時をただ待っている反体制派組織と政党の広範なネットワークがまだある。これを防ぐために、我々は不必要な政治家と組織の政治分野を完全に浄化し、我々に忠実な政党だけを残す必要があり、また政治領域を支配するために独自の政党も必要かもしれない。あるいは全てをそのままにしておくこともできるが、敵は依然として国内で我々に影響を与えるための道具を持つだろう。"
 belarus_politics.1.a: "彼らを揺さぶれ！"
 belarus_politics.1.b: "これ以上人々を怒らせるのはやめよう。"
 BLR_revoult_army_gco_drone_desc: "We will actively use drones in our army to improve its effectiveness."
 BLR_potato_empire_idea: "ポテト・エンパイア"
 BLR_country_for_life_idea: "生活のための国"
 BLR_pension_reform_idea: "年金改革"
 BLR_agriculture2: "民間農村企業の強化"
 BLR_agriculture2_desc: "Further privatization of Belarus' agricultural sector."
 BLR_country_for_life_idea_desc: "'Country for Life' is a slogan and movement associated with Belarusian blogger and activist Sergei Tikhanovsky. It represents a vision of a Belarus where ordinary citizens can live freely and without fear."
 BLR_pension_reform_idea_desc: "年金基金は社会の機能にとって不可欠であり、その制度がより良く機能するようにいくつかの変更が必要である。"
 BLR_assembly_shop_of_europe: "ヨーロッパの組立工場"
 BLR_assembly_shop_of_europe_desc: "As perhaps one of the most overlooked economies, Belarus has the potential to overtake Russia economically. But that will only happen if we focus on fixing the root problems that exist, as for years we have neglected even the most basic investments into our economy."
 BLR_increase_livestock_imports: "家畜輸入の増加"
 BLR_increase_livestock_imports_desc: "§C'This milk tastes funny'§!\n\nOur people need animals, not just to eat, but also to produce goods. Cows are particularly valuable for their dairy output. With many use cases, dairy could give a serious boost to our agricultural sector."
 BLR_proportional_mining: "比例採掘"
 BLR_proportional_mining_desc: "We cannot dig for resources just anywhere we want; proper infrastructure must be established beforehand. We must establish mines only in areas that warrant the need for resources, and will only construct new mines in areas with an industrial sector. Of course, this will worsen air quality, but at least [BLR.GetLeader] will be able to finance some nice palaces."
 BLR_industrial_wide_reform: "産業全体の改革"
 BLR_industrial_wide_reform_desc: "While the heart of Belarusian industry is beating strong, it could beat even stronger. We will initiate a series of reforms to enhance knowledge on sustainable industrial expansion."
 BLR_fostering_automotive_innovation: "自動車のイノベーションの促進"
 BLR_fostering_automotive_innovation_desc: "While Belarus is not yet world-renowned for its automotive industry, that does not mean the idea is entirely out of the picture. With the right amount of motivation and propaganda (and maybe some funding), we will kick-start an automotive titan to rival the likes of Germany. Maybe."
 BLR_the_fate_of_belarusian_steel_works: "ベラルーシ製鉄所の運命"
 BLR_the_fate_of_belarusian_steel_works_desc: "1984年に設立されたベラルーシ鋼鉄工場株式会社は、ベラルーシの産業に世界最高水準の鋼材を供給しており、これほどの品質の鋼材は地球上のどこにも存在しない。"
 BLR_tractors: "ヨーロッパ最強のトラクター"
 BLR_tractors_desc: "One thing Belarusian industry is known for is its reliable tractors, with Belarusian farmers being the envy of Europe. Funding the tractor industry would benefit the economy even further, as we will be able to equip our farms with state-of-the-art equipment."
 BLR_buses: "The East's Bus"
 BLR_buses_desc: "Luckily, our brilliant engineers at several companies have been able to decode the impossible task of constructing somewhat reliable buses. With that in mind, our buses could only improve. With a little luck and some funding, we will get to work and construct the best bus found anywhere east of Britain."
 BLR_trains: "ビエラルースカヤ・チフンカの活性化"
 BLR_trains_desc: "§R'Faster than any bullet train!'§!\n\nBielaruskaja Čyhunka, also known as Belarusian Railway by the English-speaking world, has been at the forefront of building railway infrastructure for the many citizens living within our borders. Reporting directly to the Ministry of Transport, Belarusian Railway is one of the successor companies from the Soviet era and is currently projected to continue its monopoly on Belarusian railways. We can revitalize Bielaruskaja Čyhunka and also bankroll certain train producers to best fit the needs of Belarusian commuters."
 BLR_infrastructure_contracts: "Proposed Infrastructure Contracts"
 BLR_new_paths: "すべての道は[BLR.capital.GetCapitalVictoryPointName]に通じる"
 BLR_revamp_railroads: "刷新された鉄道"
 BLR_revamp_railroads_desc: "国内の鉄道システムは老朽化した設備と遅延した運行に悩まされている。現代基準で刷新すれば移動時間が短縮され、保守上の問題も減少する。強化された鉄道システムは民生・産業双方の輸送を促進する。"
 BLR_belneftekhim: "ベルネフテクヒムを強化する"
 BLR_belneftekhim_desc: "ベルネフテヒムはベラルーシの石油化学産業において中核的な役割を担っているが、競争力を維持するためには近代化が必要である。新技術や精製プロセスへの投資は生産物の品質向上につながる。こうしたアップグレードは世界市場における当社の地位を確固たるものにする。"
 BLR_the_belaruskali_monopoly: "ベラルーシ独占を維持する"
 BLR_the_belaruskali_monopoly_desc: "ベラルーシカリは我々の最も貴重な資産の一つであり、その独占状態を維持することで予測可能な収益を確保できる。同社の市場地位を強化することは、カリ産業におけるベラルーシの影響力を守ることに繋がる。この分野の安定は、より広範な経済計画を支える基盤となる。"
 BLR_uplift_grodno_azot: "アップリフト・グロドノ・アゾト"
 BLR_uplift_grodno_azot_desc: "グロドノ・アゾート社は農業と産業に不可欠な化学製品を生産している。施設の近代化により効率が向上し、廃棄物が削減される。この工場への支援は、化学セクター全体を強化することを意味する。"
 BLR_tend_to_oil_shale: "オイルシェールの探索"
 BLR_tend_to_oil_shale_desc: "ベラルーシには、未開発のまま残されているオイルシェール鉱床の可能性がある。これらの油田の調査と開発は、エネルギー源の多様化につながる可能性がある。たとえ小規模な発見であっても、外国からの輸入への依存を軽減できるだろう。"
 BLR_award_chinese_contractors: "中国企業に契約を授与"
 BLR_award_chinese_contractors_desc: "中国建設企業は競争力のある入札と迅速なプロジェクト遂行を提供する。主要契約を彼らに授与することは、我々のインフラ計画を加速させることができる。この動きは北京との外交的・経済的結びつきも強化する。"
 BLR_award_luxembourgian_contractors: "ルクセンブルク人をなだめる"
 BLR_award_luxembourgian_contractors_desc: "ルクセンブルク企業は高品質な仕事を提供し、我々の市場への公平なアクセスを期待している。彼らに重要な契約を授与することは、関係改善につながり、協力する意思を示すことになる。彼らの参画は国内の建設基準の向上にも寄与しうる。"
 BLR_potash_safety_and_hazards_regulation: "カリウムの安全性と危険性に関する規制"
 BLR_potash_safety_and_hazards_regulation_desc: "カリウム採掘は安全規則を無視すれば重大なリスクを伴う。より強力な規制を設けることで労働者を保護し、事故を防止できる。より安全な産業は、より安定的で信頼性の高い生産も保証する。"
 BLR_bountiful_fields: "豊かな畑を耕す"
 BLR_bountiful_fields_desc: "ベラルーシは肥沃な土壌を有するが、収穫量は不安定である。農家への支援拡大と優れた農業手法の導入により、農地を安定した収穫源へと変革できる。この取り組みは食料安全保障を向上させ、農村コミュニティを強化する。"
 BLR_speed_up_land_reformation: "土地改革の加速"
 BLR_speed_up_land_reformation_desc: "土地改革は全国的に遅々として進まず、地域によってばらつきがある。このプロセスを加速させることで、農民の安定化と投資促進が図られる。所有権に関する明確なルールは、農業生産性全体の向上につながる。"
 BLR_reinforce_government_support_for_agriculture: "農業支援の強化"
 BLR_reinforce_government_support_for_agriculture_desc: "農業はベラルーシ社会の基盤であり続け、政府の強力な支援を必要としている。補助金の増額、研修、設備へのアクセス拡大は収穫量を増やし、小規模農家を守る。強靭な農業部門は国家の安定を支える。"
 BLR_achieving_self_sufficiency: "自給自足を追求する"
 BLR_achieving_self_sufficiency_desc: "Reducing reliance on imports strengthens national independence and economic stability. By developing domestic industries and improving productivity, Belarus can meet more of its own needs. Achieving this goal will take time but is essential for long-term resilience."
 BLR_streamline_taxation: "税制の合理化"
 BLR_streamline_taxation_desc: "複雑な税制は企業の成長を阻害し、投資家を苛立たせる。規則を簡素化すれば起業を促進し、官僚的な遅延を減らせる。より明確な課税はコンプライアンスを容易にし、税収増につながる。"
 BLR_counterurbanization: "反都市化政策"
 BLR_counterurbanization_desc: "地方では都市部への人口流出が続き、不均衡な発展が生じている。反都市化政策は新たな投資とサービスの向上を通じて村落を支援することを目的とする。農村生活の強化は全国的な成長の均衡化に寄与する。"
 BLR_potash_large_reserves: "豊富なカリウム埋蔵量"
 BLR_agriculture_reduced: "農業の縮小"
 BLR_belneftekhim_idea: "ベルネフテクヒム"
 BLR_streamlined_taxation: "効率化された課税"
 BLR_safety_protocols_in_place: "実施された安全プロトコル"
 BLR_disease_amongst_livestock: "家畜の病気"
 BLR_belarusian_trains: "指揮者スティード"
 BLR_treading_on_thin_steel: "薄い鋼鉄の上を歩く"
 BLR_treading_on_thin_steel_desc: "In terms of our economy, we are treading on thin steel now that all the ice has melted. We will need to reinforce this steel by further advancing our industry, whether through resources or production."
 BLR_agricultural_shock: "農業ショック"
 BLR_agricultural_shock_desc: "我々は経済を工業中心へと移行させる過程であまりにも急ぎすぎたため、その結果として農業部門は深刻な打撃を受けた。"
 BLR_automotive_industry: "ベラルーシの自動車産業"
 BLR_automotive_industry_desc: "4つのドアと、おそらく1つの車輪さえあれば、信頼性が高く、信頼に足る、現代的なベラルーシ製機械は完成する。自動車分野への進出により、メルセデスやBMWで働く無能な愚か者どもを確実に打ち負かすだろう。"
 BLR_activates_fermer_mission_TT: "£text_icon_kaldanger 特定の地域に§H商業用農業地域§!を建設することを要求する§Hミッション§!を発動する\n - この要求を満たせなかった場合、農村の不満が生じる可能性がある\n - 成功した場合、国家経済への強化を得る"
 BLR_livestock_warning_TT: "£text_icon_kaldanger 我々の§H遺伝子工学§!研究水準に応じて、疫病が家畜を§R死なせる§!危険が生じる\n\n友好国から§H500§!頭の牛が輸入される"
 BLR_steel_warning_TT: "£text_icon_kaldanger 我々がまず§H11の民需産業§!を保有せずに、経済を§H工業重視§!へ向ける改革を開始した場合、短期的な危機を経験する可能性がある"
 BLR_potash_purchase_TT: "我々は労働者のために§H安全装備§!を購入する試みを行うが、保証はしない"
 BLR_oil_shale_TT: "§H3つ以上の戦略資源備蓄§!を有するすべての州は、£oil_texticon §H2§!の石油を受け取る"
 BLR_factory_to_steel_TT: "§H民需産業を1つ以上§!有するすべての州で§H採掘事業§!を開始する"
 belarus_md.1.t: "農業危機の兆し"
 belarus_md.1.d: "産業主導型経済への急激な転換に伴い、政府支援が撤廃されたものの、代替となる適切なインフラが整備されていなかったため、農業部門は突然の打撃を受けた。その結果、農業部門は完全な回復に1年を要するほどの深刻な打撃を受けた。"
 belarus_md.1.a: "くそっ"
 belarus_md.2.t: "民営化すべきか、否か?"
 belarus_md.2.d: "The OJSC Belarusian Steel Works was founded in 1984 during the Soviet era. Since then, much has changed, and the collapse of the Union has led us to open our markets to some degree. There have been calls from within the state to privatize the company and tap into the revenue it would generate, but others are warning us against letting such an important enterprise pass into private hands."
 belarus_md.2.a: "民営化はしません！"
 belarus_md.2.b: "民営化が唯一の答え"
 belarus_md.3.t: "家畜の間で病気が急速に蔓延"
 belarus_md.3.d: "友好国から約500頭の牛を輸入した後、専門家による分析の結果、ベラルーシ全土で家畜の死亡が急増していることが判明した。さらに調査を進めたところ、輸入された牛の一頭が牛海綿状脳症（通称「狂牛病」）に感染していたことが確認された。この結果、牛から変異型狂牛病に感染した市民が既に数名、病院に搬送されている。"
 belarus_md.3.a: "物事がうまくいけば"
 BLR_peleng_desc: "JSCペレングはベラルーシの企業である。ミンスクに本社を置き、軍事・民生用光電子システムの開発・製造を専門としていおり、ベラルーシにおける光電子産業の主要企業だ。"
 BLR_infrastructure_contracts_desc: ""
 BLR_baltic_revolution_category: "Baltic Communist Revolution"
 BLR_baltic_revolution_category_desc: "The workers of Lithuania and Latvia yearn for liberation from their bourgeois overlords. Through a combination of covert operations, political subversion, and popular uprising, we will bring the revolution to the Baltic states and forge a new LitBel state."
 BLR_establish_cooperation_lit: "Establish Cooperation With Lithuanian Communists"
 BLR_establish_cooperation_lit_desc: "Communist elements in Lithuania are fragmented and cut off from power. We must establish covert contact with them to lay the groundwork for future operations."
 BLR_finance_protests_lit: "Finance Communist Protests in Lithuania"
 BLR_finance_protests_lit_desc: "Funding organised demonstrations will draw public attention to communist causes and destabilise the current Lithuanian government."
 BLR_recruit_sympathizers_lit: "Recruit Lithuanian Sympathizers"
 BLR_recruit_sympathizers_lit_desc: "The ethnic Belarusian minority in Lithuania provides a pool of potential sympathisers. We can recruit local operatives to advance our influence."
 BLR_spread_propaganda_lit: "Spread LitBel Propaganda in Lithuania"
 BLR_spread_propaganda_lit_desc: "A coordinated propaganda campaign promoting the strength of a unified Lithuanian-Belarusian state will shift public opinion toward cooperation."
 BLR_bribe_military_lit: "Bribe Lithuanian Military Officers"
 BLR_bribe_military_lit_desc: "Several Lithuanian military officers have expressed dissatisfaction with the current government. Financial incentives may convince them to support our cause."
 BLR_bribe_politicians_lit: "Bribe Lithuanian Politicians"
 BLR_bribe_politicians_lit_desc: "With enough coin, key members of the Lithuanian parliament can be persuaded to advance communist legislation and weaken the ruling coalition."
 BLR_raise_revolt_lit: "Raise a Communist Revolt in Lithuania"
 BLR_raise_revolt_lit_desc: "With sufficient influence over Lithuania, we can trigger a communist uprising, overthrow the government, and install a friendly regime."
 BLR_establish_cooperation_lat: "Establish Cooperation With Latvian Communists"
 BLR_establish_cooperation_lat_desc: "Communist elements in Latvia are fragmented and cut off from power. We must establish covert contact with them to lay the groundwork for future operations."
 BLR_finance_protests_lat: "Finance Communist Protests in Latvia"
 BLR_finance_protests_lat_desc: "Funding organised demonstrations will draw public attention to communist causes and destabilise the current Latvian government."
 BLR_recruit_sympathizers_lat: "Recruit Latvian Sympathizers"
 BLR_recruit_sympathizers_lat_desc: "The ethnic Belarusian minority in Latvia provides a pool of potential sympathisers. We can recruit local operatives to advance our influence."
 BLR_spread_propaganda_lat: "Spread LitBel Propaganda in Latvia"
 BLR_spread_propaganda_lat_desc: "A coordinated propaganda campaign promoting the strength of a unified Latvian-Belarusian state will shift public opinion toward cooperation."
 BLR_bribe_military_lat: "Bribe Latvian Military Officers"
 BLR_bribe_military_lat_desc: "Several Latvian military officers have expressed dissatisfaction with the current government. Financial incentives may convince them to support our cause."
 BLR_bribe_politicians_lat: "Bribe Latvian Politicians"
 BLR_bribe_politicians_lat_desc: "With enough coin, key members of the Latvian parliament can be persuaded to advance communist legislation and weaken the ruling coalition."
 BLR_raise_revolt_lat: "Raise a Communist Revolt in Latvia"
 BLR_raise_revolt_lat_desc: "With sufficient influence over Latvia, we can trigger a communist uprising, overthrow the government, and install a friendly regime."
