 cyber_op_slot_0_gps_tracking: "Активные помехи GPS"
 cyber_op_slot_0_gps_tracking_desc: "Полезная нагрузка для подавления сигнала GPS нацелена на военную навигационную инфраструктуру [?cyber_op_target_nation^0.GetNameWithFlag]'. Операция завершится примерно через 90 дней."
 cyber_op_slot_0_economic_tracking: "Активный экономический спад"
