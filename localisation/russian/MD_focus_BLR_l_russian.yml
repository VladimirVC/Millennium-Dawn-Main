 blr_union_with_russia_info: "[SOV.GetName] замарионетит вас\nИгрок будет перенесен в [SOV.GetName]"
 BLR_belarus_nati_modifier: "Государственная политика Беларуси"
 BLR_belarus_nati_modifier_desc: "Приход к власти националистических сил в Беларуси существенно повлиял на её внутреннюю и внешнюю политику. Приоритетом стала мощь и сила нации, пропаганда великого прошлого и реваншизма, за утраченное белорусское величие."
 BLR_belarus_police_modifier: "Внутренняя безопасность Белоруссии"
 BLR_belarus_police_modifier_desc: "Белорусское правительство имеет богатый опыт с времён своего нахождения в составе СССР в подавлении инакомыслия и агентов противника."
 BLR_belarus_kommi_modifier: "Политика коммунистической Беларуси"
 BLR_belarus_kommi_modifier_desc: "Коммунистическое правительство Беларуси активно пытается возродить и в пропаганде, и на деле - всё лучшее, что было в советское время."
 BLR_Polonez: "Полонез"
 BLR_btr60: "БТР-60"
 BLR_btr70: "БТР-70"
 BLR_kobra_k: "Кобра-К"
 tracktors_TT: "Будут выпускаться новые тракторы"
 BLR_new_railways: "Новые железные дороги"
 BLR_constitution_BSSR: "Конституция БССР"
 BLR_constitution_BSSR_desc: "Для начала необходимо восстановить Конституцию БССР."
 BLR_Excursion_Vilnius: "Экскурсия в Вильнюс"
 BLR_Excursion_Vilnius_desc: "Бойцы Вагнера активно агитируют и выражают желание организовать «экскурсию» в Вильнюс. Мы можем помочь им в её организации. Пересечение границы с нашей территории теоретически возможно, но объявит ли Литва нам после этого войну?"
 BLR_vilnius_return: "Интеграция Вильнюса"
 BLR_vilnius_returns: "Интеграция Вильнюса"
 BLR_belorusisation_vilnius: "Белорусизация Вильнюса"
 BLR_belorusisation_vilnius_desc: "Вильнюс долгое время был спорным регионом, который мы стремились захватить, но теперь, когда мы его обеспечили, мы готовы продвигать среди широких масс идею заселения этого региона белорусами."
 BLR_new_democratic_constitution: "Новая демократическая конституция"
 BLR_new_democratic_constitution_desc: "Пришло время принять новую конституцию, соответствующую западной демократии."
 BLR_Great_stone_china: "Великий камень Китая"
 BLR_national_library: "Национальная библиотека Беларуси"
 BLR_Transnistria_enemy: "Решить проблему Приднестровья"
 BLR_Transnistria_enemy_desc: "Приднестровье — небольшое непризнанное государство, которое долгое время доставляло Молдове немало хлопот. Мы готовы помочь им решить эту проблему — разумеется, захватив эти земли для себя."
 BLR_transnistria_claims: "Территориальные претензии к §Y[PMR.GetNamewithFlag]§!"
 BLR_batka_krut_TT: "Мы §RПочистим§! §Yполитическую сферу§!, оставив лишь §Gнесколько лояльных нам партий§! и §Gсоздадим настоящую патриотическую партию§! для §YЛукашенко§!"
 belarus_politics.1.t: "Новая политическая реальность"
 belarus_politics.1.d: "Хотя победа над протестующими была грандиозной, до сих пор существует широкая сеть оппозиционных организаций и партий, которые только и ждут удобного момента, чтобы уничтожить нашу страну. Чтобы предотвратить это, нам нужно полностью очистить политическое поле от ненужных политиков и организаций, оставив только лояльные нам партии, а также, возможно, нам понадобится собственная политическая партия, чтобы контролировать политическую сферу. Или мы можем оставить всё как есть, но у врага всё равно останутся инструменты для внутреннего влияния на нас."
 belarus_politics.1.a: "Встряхни их!"
 belarus_politics.1.b: "Давай больше не будем злить людей."
 BLR_potato_empire_idea: "Картофельная Империя"
 BLR_revoult_army_gco_drone_desc: "Мы будем активно использовать беспилотники в нашей армии для повышения ее эффективности."
 BLR_country_for_life_idea: "Страна для жизни"
 BLR_pension_reform_idea: "Пенсионная реформа"
 BLR_agriculture2: "Развитие частных сельских компаний"
 BLR_agriculture2_desc: "Дальнейшая приватизация сельскохозяйственного сектора Беларуси."
 BLR_country_for_life_idea_desc: "«Страна для жизни» — это лозунг и движение, связанные с белорусским блогером и активистом Сергеем Тихановским. Он отражает видение Беларуси, где обычные граждане могут жить свободно и без страха."
 BLR_pension_reform_idea_desc: "Пенсионные фонды играют важнейшую роль в функционировании нашего общества, и для повышения эффективности их работы необходимо внести некоторые изменения."
 BLR_assembly_shop_of_europe: "Сборочный цех Европы"
 BLR_assembly_shop_of_europe_desc: "Беларусь, возможно, одна из самых недооцененных экономик, имеет потенциал обогнать Россию в экономическом плане. Но это произойдет только в том случае, если мы сосредоточимся на решении существующих коренных проблем, поскольку годами мы пренебрегали даже самыми элементарными инвестициями в нашу экономику."
 BLR_increase_livestock_imports: "Увеличение импорта скота"
 BLR_increase_livestock_imports_desc: "§C'Это молоко странное на вкус'§!\n\nНашим людям нужны животные не только для еды, но и для производства товаров. Коровы особенно ценны благодаря своей молочной продуктивности. Благодаря множеству вариантов применения, молочное животноводство могло бы дать серьезный импульс нашему сельскохозяйственному сектору."
 BLR_proportional_mining: "Пропорциональный майнинг"
 BLR_proportional_mining_desc: "Мы не можем добывать ресурсы где попало; необходимо заранее создать надлежащую инфраструктуру. Мы должны строить шахты только в тех районах, где потребность в ресурсах оправдана, и будем возводить новые шахты только в районах с промышленным сектором. Конечно, это ухудшит качество воздуха, но, по крайней мере, [BLR.GetLeader] сможет профинансировать строительство красивых дворцов."
 BLR_industrial_wide_reform: "Общеотраслевая реформа"
 BLR_industrial_wide_reform_desc: "Сердце белорусской промышленности бьется мощно, но могло бы биться еще мощнее. Мы инициируем ряд реформ для повышения уровня знаний об устойчивом развитии промышленности."
 BLR_fostering_automotive_innovation: "Содействие автомобильным инновациям"
 BLR_fostering_automotive_innovation_desc: "Хотя Беларусь пока не известна во всем мире своей автомобильной промышленностью, это не значит, что эта идея полностью исключена. При наличии достаточной мотивации и пропаганды (и, возможно, некоторого финансирования) мы сможем запустить автомобильного гиганта, способного соперничать с такими странами, как Германия. Возможно."
 BLR_the_fate_of_belarusian_steel_works: "Судьба Белорусского металлургического завода"
 BLR_the_fate_of_belarusian_steel_works_desc: "Основанное в 1984 году, ОАО «Белорусский металлургический завод» поставляет белорусской промышленности сталь мирового класса, аналогов которой не найти больше нигде на Земле."
 BLR_tractors: "Самый сильный трактор Европы"
 BLR_tractors_desc: "Белорусская промышленность известна своими надежными тракторами, которым завидуют все европейцы. Финансирование тракторной промышленности принесет еще большую пользу экономике, поскольку мы сможем оснастить наши фермы самым современным оборудованием."
 BLR_buses: "Восточный автобус"
 BLR_buses_desc: "К счастью, нашим блестящим инженерам из нескольких компаний удалось решить невыполнимую задачу по конструированию относительно надёжных автобусов. Учитывая это, наши автобусы будут только совершенствоваться. С небольшой удачей и некоторым финансированием мы приступим к работе и сконструируем лучший автобус, который можно найти к востоку от Британии."
 BLR_trains: "Возродить Белорусскую железную дорогу"
 BLR_trains_desc: "§R'Быстрее любого скоростного поезда!'§!\n\nБелорусская Чигунка, также известная в англоязычном мире как Белорусская железная дорога, находится в авангарде строительства железнодорожной инфраструктуры для многочисленных граждан, проживающих в пределах наших границ. Подчиняясь непосредственно Министерству транспорта, Белорусская железная дорога является одной из компаний-преемниц советской эпохи и в настоящее время, как ожидается, сохранит свою монополию на белорусских железных дорогах. Мы можем возродить Белорусскую Чигунку, а также профинансировать производство некоторых поездов, чтобы наилучшим образом удовлетворить потребности белорусских пассажиров."
 BLR_infrastructure_contracts: "Контракты на инфраструктуру недвижимости"
 BLR_new_paths: "Все дороги ведут в [BLR.capital.GetCapitalVictoryPointName]"
 BLR_revamp_railroads: "Обновленные железные дороги"
 BLR_revamp_railroads_desc: "Национальная железнодорожная система страдает от устаревшего оборудования и медленного обслуживания. Её модернизация в соответствии с современными стандартами сократит время в пути и уменьшит проблемы с техническим обслуживанием. Более сильная железнодорожная система стимулирует развитие как пассажирских, так и промышленных перевозок."
 BLR_belneftekhim: "Укрепить Белнефтехим"
 BLR_belneftekhim_desc: "Белнефтехим играет центральную роль в белорусской нефтехимии, но ему необходима модернизация, чтобы оставаться конкурентоспособным. Инвестиции в новые технологии и процессы переработки повышают качество выпускаемой продукции. Эти улучшения помогают закрепить наши позиции на мировых рынках."
 BLR_the_belaruskali_monopoly: "Сохранить монополию Беларуськалия"
 BLR_the_belaruskali_monopoly_desc: "Беларуськалий является одним из наших наиболее ценных активов, и сохранение его монополии обеспечивает предсказуемый доход. Укрепление его рыночных позиций помогает защитить белорусское влияние в калийной отрасли. Стабильность в этом секторе поддерживает более широкое экономическое планирование."
 BLR_uplift_grodno_azot: "Поднять Гродно Азот"
 BLR_uplift_grodno_azot_desc: "Гродно Азот производит необходимые химические вещества для сельского хозяйства и промышленности. Модернизация его производственных мощностей повысит эффективность и сократит отходы. Поддержка этого завода укрепит наш химический сектор в целом."
 BLR_tend_to_oil_shale: "Поиск горючего сланца"
 BLR_tend_to_oil_shale_desc: "Беларусь обладает потенциальными месторождениями горючих сланцев, которые остаются в значительной степени неисследованными. Исследование и разработка этих месторождений могли бы диверсифицировать наши источники энергии. Даже небольшие открытия ослабили бы зависимость от иностранного импорта."
 BLR_award_chinese_contractors: "Присуждать контракты китайским фирмам"
 BLR_award_chinese_contractors_desc: "Китайские строительные компании предлагают конкурентные предложения и быструю реализацию проектов. Заключение с ними крупных контрактов может ускорить наши инфраструктурные планы. Этот шаг также укрепляет дипломатические и экономические связи с Пекином."
 BLR_award_luxembourgian_contractors: "Умиротворить люксембуржцев"
 BLR_award_luxembourgian_contractors_desc: "Люксембургские компании предоставляют высококачественные работы и ожидают справедливого доступа к нашим рынкам. Заключение с ними ключевых контрактов улучшает отношения и свидетельствует о нашей готовности к сотрудничеству. Их участие также может повысить стандарты строительства у нас в стране."
 BLR_potash_safety_and_hazards_regulation: "Положения по безопасности и опасностям калия"
 BLR_potash_safety_and_hazards_regulation_desc: "Добыча калийных солей сопряжена со значительными рисками, если игнорируются правила безопасности. Установление более строгих правил защищает рабочих и предотвращает несчастные случаи. Более безопасная отрасль также обеспечивает более стабильное и надежное производство."
 BLR_bountiful_fields: "Возделывать обильные поля"
 BLR_bountiful_fields_desc: "В Беларуси плодородная почва, но урожайность нестабильна. Оказание поддержки фермерам и внедрение передовых методов может превратить наши поля в источник надежных урожаев. Это повысит продовольственную безопасность и укрепит сельские общины."
 BLR_speed_up_land_reformation: "Ускорить земельную реформу"
 BLR_speed_up_land_reformation_desc: "Земельная реформа продвигалась медленно и неравномерно по всей стране. Ускорение этого процесса поможет фермерам обрести стабильность и стимулировать инвестиции. Более четкие правила собственности улучшают общую сельскохозяйственную производительность."
 BLR_reinforce_government_support_for_agriculture: "Укрепить поддержку сельского хозяйства"
 BLR_reinforce_government_support_for_agriculture_desc: "Сельское хозяйство остаётся опорой белорусского общества и требует мощной государственной поддержки. Увеличение субсидий, обучения и доступа к оборудованию повысит урожайность и защитит мелких фермеров. Устойчивый сельскохозяйственный сектор поддерживает национальную стабильность."
 BLR_achieving_self_sufficiency: "Стремиться к самодостаточности"
 BLR_achieving_self_sufficiency_desc: "Снижение зависимости от импорта укрепляет национальную независимость и экономическую стабильность. Развивая отечественные отрасли промышленности и повышая производительность, Беларусь может удовлетворять больше своих собственных потребностей. Достижение этой цели займет время, но является важным для долгосрочной устойчивости."
 BLR_streamline_taxation: "Упростить налогообложение"
 BLR_streamline_taxation_desc: "Сложная налоговая система замедляет рост бизнеса и отпугивает инвесторов. Упрощение правил поощряет предпринимательство и сокращает бюрократические задержки. Более прозрачное налогообложение может увеличить доходы, облегчая соблюдение требований."
 BLR_counterurbanization: "Политика деурбанизации"
 BLR_counterurbanization_desc: "Сельские районы продолжают терять население в пользу городов, что создаёт неравномерное развитие. Политика деурбанизации направлена на поддержку деревень через новые инвестиции и улучшение услуг. Укрепление сельской жизни помогает сбалансировать развитие страны."
 BLR_potash_large_reserves: "Крупные калийные запасы"
 BLR_agriculture_reduced: "Сельское хозяйство сократилось"
 BLR_belneftekhim_idea: "Белнефтехим"
 BLR_streamlined_taxation: "Упрощенное налогообложение"
 BLR_safety_protocols_in_place: "Внедренные протоколы безопасности"
 BLR_disease_amongst_livestock: "Заболевание среди скота"
 BLR_belarusian_trains: "Кондукторы Стеде"
 BLR_treading_on_thin_steel: "Хождение по тонкой стали"
 BLR_treading_on_thin_steel_desc: "В экономическом плане мы сейчас стоим на тонкой стали, поскольку весь лед растаял. Нам необходимо укрепить эту сталь, продолжая развивать нашу промышленность, будь то за счет ресурсов или производства."
 BLR_agricultural_shock: "Сельскохозяйственный шок"
 BLR_agricultural_shock_desc: "Мы слишком быстро перевели нашу экономику на индустриальные рельсы, и в результате наш сельскохозяйственный сектор сильно пострадал."
 BLR_automotive_industry: "Белорусский автомобильный сектор"
 BLR_automotive_industry_desc: "4 двери и, возможно, 1 колесо — это всё, что нужно для надёжной, заслуживающей доверия и современной белорусской техники. С нашим выходом в автомобильный сектор мы обязательно превзойдём этих некомпетентных дураков, работающих на Mercedes или BMW."
 BLR_activates_fermer_mission_TT: "£text_icon_kaldanger Запустит §Hмиссию§!, требующую от нас строительства §Hсельскохозяйственных районов§! в определённых регионах\n- Невыполнение этих требований может привести к аграрному недовольству\n- В случае успеха мы получим стимул для национальной экономики"
 BLR_livestock_warning_TT: "£text_icon_kaldanger Будет риск заболевания, §Rуничтожающего§! наш скот, в зависимости от нашего уровня исследования §HГенной инженерии§!.\n\n§H500§! коров будут импортированы из дружественного государства."
 BLR_steel_warning_TT: "£text_icon_kaldanger Если мы инициируем реформы, чтобы ориентировать нашу экономику на §HПромышленный фокус§!, не имея предварительно §H11 гражданских отраслей§!, мы можем столкнуться с кратким кризисом."
 BLR_potash_purchase_TT: "Мы предпримем попытку приобрести §HОборудование для обеспечения безопасности§! для наших работников, но не даем никаких обещаний"
 BLR_oil_shale_TT: "Каждый штат, в котором есть как минимум §H3 стратегических запаса ресурсов§! получат £oil_texticon  §H2§! нефти"
 BLR_factory_to_steel_TT: "Мы начнем §HГорнодобывающие работы§! в каждом штате с §H1 единицей гражданской промышленности§! или более"
 belarus_md.1.t: "Надвигается сельскохозяйственный кризис"
 belarus_md.1.d: "После нашего внезапного перехода к экономике, ориентированной на промышленность, наш сельскохозяйственный сектор пережил внезапный шок, поскольку государственная поддержка была отозвана без какой-либо надлежащей инфраструктуры, на которую мы могли бы опереться. В результате наш сельскохозяйственный сектор понес урон, на полное восстановление которого потребуется год."
 belarus_md.1.a: "Чёрт возьми"
 belarus_md.2.t: "Приватизировать или не приватизировать?"
 belarus_md.2.d: "ОАО «Белорусский металлургический комбинат» было основано в 1984 году в советскую эпоху. С тех пор многое изменилось, и распад Союза привел к некоторому открытию наших рынков. Внутри государства раздаются призывы к приватизации предприятия и использованию его доходов, но другие предостерегают нас от перехода такого важного предприятия в частные руки."
 belarus_md.2.a: "Мы не будем приватизировать!"
 belarus_md.2.b: "Приватизация - единственный ответ"
 belarus_md.3.t: "Болезнь стремительно распространяется среди скота"
 belarus_md.3.d: "После импорта примерно 500 коров из дружественного государства наши экспертные аналитики начали замечать резкое увеличение гибели скота по всей Беларуси. При дальнейшем исследовании было установлено, что одна импортированная корова являлась носителем бычьей губчатой энцефалопатии, также известной как «коровье бешенство». В результате некоторые граждане уже были госпитализированы после заражения вариантом этой болезни от коровы."
 belarus_md.3.a: "Если бы только всё шло хорошо"
 BLR_peleng_desc: "ОАО Пеленг — белорусская компания со штаб-квартирой в Минске, специализирующаяся на разработке и производстве оптоэлектронных систем военного и гражданского назначения. Это ведущая компания в оптоэлектронной промышленности Беларуси."