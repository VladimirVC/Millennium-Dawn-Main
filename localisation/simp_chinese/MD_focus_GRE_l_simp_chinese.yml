 GRE_rheinmetall_rws_30mm_upgrade: "Mk 30-2/ABM火炮升级"
 GRE_rheinmetall_rws_dual_weapon: "双武器交战系统"
 GRE_rheinmetall_fire_control: "光电火控"
 GRE_rheinmetall_hunter_killer: "猎杀者交战模式"
 GRE_rheinmetall_ammo_logistics: "标准化弹药后勤"
 GRE_rheinmetall_battlefield_networking: "战场管理集成"
 GRE_rheinmetall_lethality_export_package: "出口武器方案"
 GRE_rheinmetall_hellenic_lynx_doctrine: "希腊山猫战斗学说"
 GRE_vision_2030: "军事远景"
 GRE_vision_2030_desc: "多年来的财政紧缩和过时的冷战思维导致我国武装部队落后于时代。我们装备陈旧，机构臃肿，军队规模无法应对我们所面临的威胁。这项计划是希腊现代史上最雄心勃勃的国防改革。"
 GRE_armored_transition: "装甲过渡"
 GRE_armored_transition_desc: "BMP-1和M48巴顿坦克已经完成了它们的使命。退役冷战时期的装甲车辆，换装希腊版的豹2坦克，将使我们的装甲旅拥有足以匹敌该地区任何对手的坦克部队。"
 GRE_pzh_2000: "PzH 2000式自行榴弹炮"
 GRE_pzh_2000_desc: "我们的炮兵需要跟上现代装甲战的步伐。PzH 2000自行榴弹炮将为我方部队提供远距离精确火力支援，并确保地面指挥官始终拥有有效的间接火力支援。"
 GRE_m270_mlrs: "M270多管火箭系统"
 GRE_m270_mlrs_desc: "掩护岛屿登陆作战和打击爱琴海沿岸目标需要超越前线的火力。M270多管火箭炮系统将赋予我军这种射程。"
 GRE_puls_rocket: "脉冲火箭炮系统"
 GRE_puls_rocket_desc: "通过与以色列和欧洲伙伴开展的“欧洲脉冲”联合项目，我们可以部署一种能够远距离打击目标的精确火箭炮系统。这将使爱琴海的任何对手三思而后行。"
 GRE_special_warfare_command: "特种作战司令部"
 GRE_special_warfare_command_desc: "将我们的反恐特种作战部队、突击旅、战斗潜水员和伞兵统一到一个特种作战司令部之下，将使我们拥有一支能够在岛屿内外作战的精锐部队。在现代战争中，规模虽小但杀伤力强大的部队能够左右整个师的战局。"
 GRE_archipelagos_strategy: "群岛战略"
 GRE_archipelagos_strategy_desc: "我们数以千计的岛屿并非累赘。只要防御到位，战略连贯，它们就能构成一道层层屏障，任何敌方舰队都无法轻易突破，必将遭受惨重损失。我们应该充分利用爱琴海的地理优势。"
 GRE_f16_modernisation: "F-16现代化"
 GRE_f16_modernisation_desc: "通过希腊航空航天工业公司将我们的83架F-16战斗机升级到Block 70/72毒液标准，既能保持我们战斗机机队的良好状态，又能培养我们未来F-35维护所需的国内专业技术。"
 GRE_intl_flight_training: "国际飞行训练中心"
 GRE_intl_flight_training_desc: "向盟国开放我们的飞行训练设施，将有助于建立友好关系，加深军事联系，并使我们的飞行员获得按照国际标准进行训练的经验。"
 GRE_new_transport_helicopters: "新型运输直升机"
 GRE_new_transport_helicopters_desc: "岛屿间的快速运输对岛屿防御至关重要。部署35架UH-60M黑鹰直升机与MH-60R海鹰直升机协同作战，将使我们拥有足够的运输能力，在敌人构筑防御工事之前，对任何受威胁的阵地进行增援。"
 GRE_f35_program: "F-35项目合作"
 GRE_f35_program_desc: "加入F-35项目使我们拥有了该地区其他任何国家都无法匹敌的第五代隐形战斗机。2024年7月签署的这份合同是希腊空军的一个重要里程碑，使我们的飞行员在爱琴海地区遥遥领先。"
 GRE_patriot_air_defense: "爱国者防空系统"
 GRE_patriot_air_defense_desc: "我们的耐克大力神导弹系统电池过于老旧，无法应对现代威胁。升级到配备MSE拦截器的爱国者PAC-3导弹系统，将最终为希腊提供真正有效的弹道导弹防御能力，并保护我们的关键基础设施。"
 GRE_centauros_anti_drone: "半人马座反无人机系统"
 GRE_centauros_anti_drone_desc: "“半人马座”反无人机系统由希腊航空航天工业公司研发，并在红海行动中得到验证。将其部署到我们的岛屿、海军基地和机场是当务之急。无人机是现代战争中最大的威胁，我们必须具备应对能力。"
 GRE_achilles_shield: "阿喀琉斯之盾"
 GRE_achilles_shield_desc: "将我们的爱国者导弹系统、半人马座无人机防御系统和岸基导弹系统整合到一个覆盖整个爱琴海的统一网络中，将创建一个反介入区，使任何对希腊领土的攻击都付出极其惨重的代价。"
 GRE_kimon_class_frigate: "基蒙级护卫舰"
 GRE_kimon_class_frigate_desc: "经过多年的项目搁置，我们终于与法国海军集团签署了三艘FDI HN护卫舰的建造协议，并保留了第四艘的选购权。基蒙级护卫舰将为希腊海军提供一支真正意义上的水面作战力量，足以与该地区任何舰队抗衡。"
 GRE_hydra_class_upgrade: "海德拉级现代化"
 GRE_hydra_class_upgrade_desc: "海德拉级护卫舰是上世纪90年代在斯卡拉曼加斯造船厂建造的MEKO 200HN型舰艇，它们是我国水面作战力量的中坚力量。对其雷达、电子战系统和反舰导弹进行中期升级，将使其在未来几十年内保持作战效能。"
 GRE_elli_class: "艾利级舰艇替换计划"
 GRE_elli_class_desc: "艾利级护卫舰是上世纪80年代移交给我们的老旧荷兰范·斯佩克级护卫舰，早已超过使用寿命。我们需要替换舰体，可以在斯卡拉曼加斯自行建造，也可以从国外采购，以恢复我们的护卫舰实力。"
 GRE_roussen_attack_craft: "鲁森级快速攻击艇"
 GRE_roussen_attack_craft_desc: "爱琴海并非开阔的海洋，而是狭窄的水域，非常适合快速攻击艇作战。鲁森级战舰正是为此而设计的：速度快、配备导弹、近距离杀伤力强。新一代鲁森级战舰足以阻止任何敌对舰队进入希腊水域。"
 GRE_fremm_frigate: "欧洲多用途护卫舰"
 GRE_fremm_frigate_desc: "我们的舰队需要更多舰艇。我们可以迅速采购成熟的意大利欧洲多用途护卫舰，或者投资法国海军集团的第五艘FDI护卫舰。每种方案在速度、性能和联盟关系方面各有优势。"
 GRE_submarine_expansion: "214型采购计划"
 GRE_submarine_expansion_desc: "帕帕尼科利斯级潜艇代表了常规潜艇作战的最高水平。不依赖空气推进系统使我们的潜艇能够在水下停留数周而无需浮出水面。扩大和维持该项目将加强我们对爱琴海水下领域的控制。"
 GRE_bluewhale_submarines: "蓝鲸潜艇"
 GRE_bluewhale_submarines_desc: "以色列航空航天公司生产的自主式无人潜艇将为我国海军带来该地区其他任何海军都无法匹敌的能力。这些系统无需船员操作，且无任何风险，使我国海军能够持续保持水下存在。"
 GRE_defense_manufacturing: "本地制造业指令"
 GRE_defense_manufacturing_desc: "所有重大国防项目25%的本地化率要求，将确保我国国内产业从每一份合同中受益。EAS、HAI以及我国造船厂将更加强大，同时我们也能减少对外国供应商的依赖。"
 GRE_research_hubs: "研究中心"
 GRE_research_hubs_desc: "我们的大学、希腊航空航天工业公司和国防部之间的正式合作将为武装部队创造创新渠道。"
 GRE_defense_innovation_center: "希腊国防创新中心"
 GRE_defense_innovation_center_desc: "建立一个专门的创新中心，将初创企业、大学和国防工业合作伙伴联系起来，将有助于加快希腊下一代军事技术的发展。"
 GRE_communication_satellites: "通信卫星"
 GRE_communication_satellites_desc: "专用军用通信卫星将为我们提供爱琴海持续的空中覆盖，并为所有武装部队部门提供安全的通信骨干网。"
 GRE_theon_international: "席恩国际扩张"
 GRE_theon_international_desc: "席恩国际在夜视和光学系统领域享有盛誉。支持其拓展新的出口市场，不仅能创造收入、建立国防合作关系，还能展现希腊工业在最高水平的竞争力。"
 GRE_industrial_synergy: "工业协同"
 GRE_industrial_synergy_desc: "我们的国防项目只有在各行业通力合作时才能发挥最佳效果。HAI、我们的造船厂、EAS以及我们的研究机构之间建立正式的协调机制，将使每个项目都更快、更经济、更高效。"
 GRE_irix_loitering: "IRIX游荡弹药"
 GRE_irix_loitering_desc: "希腊国防系统公司与派拉蒙工业公司合作生产了IRIX游荡弹药，这是希腊首款国产游荡弹药。该弹射程可达100公里，使我军具备了深入敌后进行精确打击的能力，且无需依赖外国供应商。"
 GRE_lora_ballistic: "LORA弹道导弹系统"
 GRE_lora_ballistic_desc: "以色列航空航天工业公司的LORA弹道导弹系统将赋予我们400公里射程的远程精确打击能力。这种射程将显著改变爱琴海的局势，并让任何潜在对手都不得不认真考虑。"
 GRE_iniochos: "伊尼奥乔斯演习计划"
 GRE_iniochos_desc: "每年在安德拉维达举行的“伊尼奥乔斯”联合军演已成为欧洲顶尖的多国空中训练活动之一。扩大参与规模并增加演习场景的复杂性，将有助于提升飞行员的技能，并加强我们与盟国的军事关系。"
 GRE_grypas_ucav: "狮鹫无人机项目"
 GRE_grypas_ucav_desc: "希腊航空航天工业公司研发出了狮鹫无人机，这是我们首款自主设计的作战无人机。投资该项目意味着我们将获得一种不受外国出口限制或政治环境影响的无人打击能力。"
 GRE_integrated_air_defense: "综合防空网络"
 GRE_integrated_air_defense_desc: "将爱国者导弹系统、阿喀琉斯导弹防御系统、反无人机系统和雷达覆盖范围整合到一个多层网络中，使希腊的天空能够有效防御任何敌方飞机或无人机的入侵。现在，所有传感器和拦截器都作为一个整体系统协同作战。"
 GRE_strategic_transport_fleet: "战略运输机队"
 GRE_strategic_transport_fleet_desc: "我们的岛屿防御能力取决于我们补给和增援的能力。更新我们的C-27J机队并采购更多的C-130H运输机，将确保所有驻军都能得到支援，所有岛屿都不会在危机中孤立无援。"
 GRE_constellation_co_production: "星座级联合制作"
 GRE_constellation_co_production_desc: "我们已与美国开始规划联合生产FFG-62星座级护卫舰。这项合作将为我们的舰队增添世界一流的战舰，并提升我们在斯卡拉曼加斯和埃莱夫西纳造船厂的专业技术和产能。"
 GRE_eyes_of_poseidon: "波塞冬之眼"
 GRE_eyes_of_poseidon_desc: "我们无法保护我们看不见的东西。将海上巡逻机、海岸雷达站和卫星图像整合到一个统一的监视网络中，将使我们能够全面了解爱琴海和爱奥尼亚海的情况。"
 GRE_souda_bay_expansion: "苏达湾海军基地扩建"
 GRE_souda_bay_expansion_desc: "苏达湾是地中海最具战略价值的港口之一。扩大我们与美国和北约在该设施的合作，将加强我们的联盟，并巩固希腊作为北约南翼关键支柱的地位。"
 GRE_alexandroupolis_strategic_hub: "亚历山德鲁波利斯战略中心"
 GRE_alexandroupolis_strategic_hub_desc: "亚历山德鲁波利斯港已成为北约通往东欧的重要后勤走廊，完全绕过了博斯普鲁斯海峡。加大对港口基础设施的投资，并与保加利亚和罗马尼亚加强合作，将使其成为一项永久性的战略资产。"
 GRE_spike_atgm_integration: "长钉反坦克导弹集成"
 GRE_spike_atgm_integration_desc: "我们的步兵和装甲车辆需要一种能够打击视距外目标的现代化反坦克导弹。将“长钉”导弹系列整合到我们的地面部队和海军巡逻舰艇上，将为每位指挥官提供精确打击选项。"
 GRE_stinger_manpads: "便携式防空导弹系统现代化"
 GRE_stinger_manpads_desc: "我们的岛屿驻军和前沿部队面临着大型防空导弹系统无法有效应对的空中威胁。对“毒刺”便携式防空导弹系统进行现代化改造和扩充，将使每个步兵单位和巡逻舰艇都具备自主防空能力。"
 GRE_infantry_digitisation: "步兵数字化计划"
 GRE_infantry_digitisation_desc: "现代士兵需要与空中飞行员和近海护卫舰共享相同的作战态势图。为步兵配备战场管理系统、加密通信设备和数字化目标瞄准设备，能够将他们接入更大的网络，而不是让他们孤立作战。"
 GRE_sovereign_waters: "主权水域"
 GRE_sovereign_waters_desc: "几十年来，其他国家不断挑战我们在爱琴海和东地中海的主权权利，而我们却缺乏足够的海军力量来应对。如今，随着舰队的现代化和岛屿防御的完善，我们终于可以行使国际法赋予我们的权利：我们的专属经济区属于我们。"
 GRE_rheinmetall_greece: "希腊莱茵金属公司"
 GRE_rheinmetall_greece_desc: "莱茵金属公司希望在未来的采购协议中，在希腊设立本地组装和维护基地。正式确立这一合作关系，并将其生产融入我国国内国防工业，将有助于加强我国陆军现代化建设，并使希腊成为东南欧的国防制造中心。"
 GRE_joint_operations_reform: "联合行动改革"
 GRE_joint_operations_reform_desc: "我们的三个军种几十年来各自为政，拥有各自的作战理论和指挥文化。建立一个统一的联合作战框架，使陆军、海军和空军能够协同作战、共同计划、共同训练。我们想要开展的其他一切都取决于此。"
 GRE_new_army_doctrine: "从质量到机动性"
 GRE_new_army_doctrine_desc: "希腊军队的组建是为了在色雷斯地区投入尽可能多的兵力守住防线。但那场战争最终并未发生。我们需要重组军队，组建规模更小、速度更快的旅级战斗群，以便能够迅速部署到爱琴海各地，并在威胁演变成危机之前就做出反应。"
 GRE_nco_reform: "军队的脊梁"
 GRE_nco_reform_desc: "希腊军官一直以来都被要求对所有决策，直至排级单位，因为士官从未被赋予自主行动的权力或接受过相关训练。建立一支能够独立领导和适应，无需等待上级命令的专业士官队伍，将大大提升军队的作战效能。"
 GRE_thrace_to_aegean: "重新调整军队方向"
 GRE_thrace_to_aegean_desc: "四十年来，我们的地面部队一直面向东北方向的埃夫罗斯河。这一威胁并未消失，但它不再是我们唯一的关注点。我们应该将主要部署方向调整到爱琴海的岛屿和海岸线，那里的主权每天都在经受考验。"
 GRE_joint_fires_doctrine: "联合作战学校"
 GRE_joint_fires_doctrine_desc: "炮兵、装甲兵、步兵和近距离空中支援部队长期以来各自为政。联合作战必须成为标准，所有部队都必须进行联合训练。我们的士兵需要知道如何与空中支援协同作战，而不仅仅是纸上谈兵。"
 GRE_sead_doctrine: "压制敌方防御"
 GRE_sead_doctrine_desc: "我们的飞行员在北约爱琴海上空的防御性反空作战方面经验最为丰富，但对防御目标的进攻性打击能力仍不成熟。我们需要一套专门的防空压制理论，利用“阵风”战斗机的“风暴阴影”和“流星”导弹系统在打击群进入目标前摧毁敌方防空系统。"
 GRE_iniochos_as_doctrine: "从伊尼奥乔斯学到的教训"
 GRE_iniochos_as_doctrine_desc: "每年，“伊尼奥乔斯”演习都会汇聚来自二十个国家的飞行员，共同学习在对抗空域中行之有效的战术。多年来，我们一直在开展这项演习，但始终未能将经验完全转化为作战条令。每一轮演习的成果都应正式纳入更新的战术和程序，并在希腊空军全面推广应用。"
 GRE_cas_doctrine: "近距离空中支援一体化"
 GRE_cas_doctrine_desc: "希腊空军和希腊陆军很少进行有效近距离空中支援所需水平的联合训练。需要一个永久性的联合训练渠道和标准化的通信协议，以便地面指挥官和战斗机飞行员能够在重要的时候真正合作。"
 GRE_aegean_fortress_doctrine: "爱琴海，我们的海"
 GRE_aegean_fortress_doctrine_desc: "爱琴海并非一片开阔的海洋，而是由六千座岛屿、狭窄海峡、浅滩和咽喉要道交织而成的迷宫。准备充分的防御者能够使这片地形对任何进攻舰队都构成极大的威胁。我们需要一支强大的海军，让任何试图接近希腊领土的行为都成为无人敢冒的风险。"
 GRE_aegean_fortress_doctrine_tt: "[GREadmiraldefenseeffect]"
 GRE_aegean_fortress_doctrine_effect: "海军上将：等级提升时有§G30%几率§!获得§Y+1防御§!。"
 GRE_submarine_wolf_packs: "水下作战学说"
 GRE_submarine_wolf_packs_desc: "潜艇是爱琴海最危险的武器。这里的水浅敌人难以藏身，但在某些关键位置水深足够我方潜艇藏身。如果我们训练艇员以协同作战的方式行动，共享目标数据，并互相掩护巡逻区域，那么任何水面舰队都无法在爱琴海航行而不被水下侦察。"
 GRE_missile_corvette_network: "鲁森网络"
 GRE_missile_corvette_network_desc: "我们的鲁森级导弹护卫舰速度快、杀伤力强，非常适合爱琴海作战，但它们从未作为一个协同作战网络进行过作战。如果能将它们与海岸雷达、岛屿传感器和潜艇目标报告整合到一个统一的目标图像中，任何一艘护卫舰都能在几分钟内打击任何水面威胁。"
 GRE_aegean_minefield_doctrine: "布满水雷的海峡"
 GRE_aegean_minefield_doctrine_desc: "希腊自二战以来就拥有海军布雷能力，但从未将其真正融入作战理论。如果能在爱琴海所有主要航道预先布设雷区，并在数小时内启动，就能将海峡变成一道道屏障，即使是实力更强的舰队也无法安全通过。"
 GRE_sea_denial_complete: "爱琴海要塞"
 GRE_sea_denial_complete_desc: "爱琴海现已完全成为希腊的作战区域。我们的海上防御体系，包括潜艇、轻型护卫舰、护卫舰、水雷和岸基导弹，已整合为一套统一的海上拒止作战理论。我们或许没有地中海地区规模最大的海军，但对于任何企图侵入我们海域的人来说，我们拥有最危险的海军。"
 GRE_eastern_med_doctrine: "越过爱琴海"
 GRE_eastern_med_doctrine_desc: "希腊的利益远不止于多德卡尼斯群岛。我们在克里特岛以南的专属经济区权益、我们对塞浦路斯的承诺，以及我们与以色列和埃及的能源伙伴关系，都需要一支能够长期远离本土作战的海军。我们需要一支在整个东地中海地区都具有威慑力的舰队，而不仅仅是在爱琴海。"
 GRE_asw_training: "猎杀潜艇"
 GRE_asw_training_desc: "反潜作战是希腊海军中最具挑战性却又最被忽视的技能。我们新型护卫舰配备了先进的反潜传感器和鱼雷，但舰员需要接受专门训练才能正确使用。建立一套依托自身潜艇部队的常设反潜训练计划，能够让水面舰艇人员了解敌方潜艇的实际作战方式。"
 GRE_fleet_coordination: "单一海军司令部"
 GRE_fleet_coordination_desc: "在东地中海地区作战需要协调一致的指挥，而分散的舰队指挥体系无法提供这种协调。将希腊海军重组为一个统一的作战指挥部，并实时掌握每艘舰艇、潜艇和巡逻机的动向，将大大提升舰队的整体作战效能。"
 GRE_eastern_med_taskforce: "地中海行动掌控"
 GRE_eastern_med_taskforce_desc: "在确保爱琴海安全之后，我们需要将影响力扩展到整个地中海。重组训练体系、改革舰队轮换制度以及开展长期部署，将有助于我们建立在整个地中海沿岸追踪和打击任何敌对舰队的能力。"
 GRE_eastern_med_supremacy: "东地中海霸权"
 GRE_eastern_med_supremacy_desc: "一支常备远征特遣部队，依托现代化干船坞，活动范围从爱奥尼亚海延伸至黎凡特海盆，使希腊海军成为东地中海的决定性海上力量。如此规模的兵力投射，足以在任何挑战抵达希腊水域之前将其化解。"
 GRE_landforces_modifier: "希腊陆军"
 GRE_landforces_modifier_desc: "希腊拥有一支身经百战的陆军，其作战经验源于数十年来爱琴海地区的紧张局势。我们的军队训练有素、装备精良、部署到位，随时准备捍卫希腊的每一寸土地。"
 GRE_airforce_modifier: "希腊空军"
 GRE_airforce_modifier_desc: "希腊空军控制着爱琴海上空的制空权。我们的飞行员是北约经验最丰富的飞行员之一，他们凭借日常拦截和争夺空域的经验磨练而成。"
 GRE_navy_modifier: "希腊海军"
 GRE_navy_modifier_desc: "希腊是一个海洋国家。我们的护卫舰、潜艇和快速攻击艇舰队巡逻着自古以来就属于希腊的水域。"
 GRE_cold_war_giant_1: "冷战陆军"
 GRE_cold_war_giant_1_desc: "我们的军队当初是为了阻止苏联在巴尔干半岛的推进而建立的。但那场战争从未发生。如今，我们拥有规模庞大、人员配备昂贵、行动迟缓，且训练内容针对的战场早已不复存在的部队。"
 GRE_aircraft_bad_1: "冷战空军"
 GRE_aircraft_bad_1_desc: "我们的空军机队是由冷战时期的飞机拼凑而成。大型飞机的维护成本高昂，而且我们的飞行员缺乏将力量投射到爱琴海以外地区的作战理论。战略航空和监视能力存在重大缺陷。"
 GRE_navy_bad_1: "冷战海军"
 GRE_navy_bad_1_desc: "我们的舰队纸面上规模庞大，但实际运作却一团糟。来自三个不同海军的二手舰艇意味着三条不同的后勤保障链。燃料成本过高，防空火力覆盖不足，而且我们的军官接受的是近海巡逻训练，而非舰队作战训练。"
 GRE_defense_industry: "爱琴海兵工厂"
 GRE_defense_industry_modifier: "爱琴海兵工厂"
 GRE_defense_industry_modifier_desc: "从斯卡拉曼加斯的造船厂到比雷埃夫斯周边的军工厂，希腊工业世世代代都在为军队提供物资。我们拥有自己的国防工业，我们应该充分利用它。"
 GRE_research_hubs_idea_tt: "[GREresearchhubidea]"
 GRE_archipelagos_defense_plan: "爱琴海之盾"
 GRE_archipelagos_defense_plan_desc: "希腊采用分层防御架构，将爱琴海岛链视为一个一体化的堡垒网络。快速修复、海岸炮台、补给封锁和导弹覆盖相结合，使得任何入侵希腊水域的行动都代价高昂。"
 GRE_archipelagos_defense_plan_country: "爱琴海之盾"
 GRE_archipelagos_defense_plan_country_desc: "希腊采用分层防御架构，将爱琴海岛链视为一个一体化的堡垒网络。快速修复、海岸炮台、补给封锁和导弹覆盖相结合，使得任何入侵希腊水域的行动都代价高昂。"
 GRE_defense_innovation_research_mission: "国防创新研究周期"
 GRE_defense_innovation_research_mission_desc: "希腊国防创新中心推动武装部队各军种的持续研究。每隔100天，装甲、火炮、步兵系统、航空或海军技术领域都可能出现突破性进展。"
 GRE_aegean_survey: "爱琴海海底调查"
 GRE_aegean_survey_desc: "我们对属于我们的区域进行测绘。对爱琴海海底进行全面的地质调查，将确定我们油气储量的范围，并为开采奠定基础。"
 GRE_aegean_surveyed: "爱琴海水域地图"
 GRE_aegean_extraction: "爱琴海石油开采"
 GRE_aegean_extraction_desc: "勘测工作已完成。我们开始从爱琴海油田开采石油。希腊海域的希腊石油，造福希腊经济。"
 GRE_aegean_extracting: "爱琴海石油开采"
 GRE_aegean_offshore_industry: "爱琴海离岸产业"
 GRE_aegean_offshore_industry_desc: "开采活动催生了产业。我们建设配套基础设施，用于加工和分销从爱琴海海底开采的资源。"
 GRE_crete_survey: "南克里特岛海底调查"
 GRE_crete_survey_desc: "克里特岛以南的水域蕴藏着巨大的未开发潜力。我们将勘探作业扩展到爱奥尼亚海盆地和黎凡特海盆地。"
 GRE_crete_surveyed: "克里特岛水域地图"
 GRE_crete_extraction: "南克里特岛石油开采"
 GRE_crete_extraction_desc: "希腊最深处的海域蕴藏着最丰富的资源。我们从克里特岛以南开始开采，以此保障国家的经济未来。"
 GRE_crete_extracting: "克里特岛石油开采"
 GRE_crete_offshore_industry: "南克里特岛离岸产业"
 GRE_crete_offshore_industry_desc: "南方的油田正在生产。我们正在建设工业产能，将原材料开采转化为持久的经济产出。"
 TUR_naval_expansion_response: "海军扩建计划"
 TUR_naval_expansion_response_desc: "为应对希腊在海上日益强硬的姿态，土耳其加快了海军建设步伐。船坞产能不断提升，旨在缩小东地中海地区的实力差距。"
 GRE_creditor_management_category: "希腊债务管理"
 GRE_creditor_management_category_desc: "作为希腊主权债务的持有者，我们可以要求偿还部分债务，也可以全部免除。我们目前的持有量能从雅典获得定期利息收入。"
 GRE_propose_debt_deal: "提出债务协定"
 GRE_propose_debt_deal_desc: "提议由外国承担我方部分国债，以换取定期利息支付。我们将把目前债务的10%转移给选定的债权国，一旦我方债务超过GDP的90%，转移比例将提高至25%。"
 GRE_repay_creditor: "偿还债权人"
 GRE_repay_creditor_desc: "一次性支付一笔款项，以减少我们欠该债权人的未偿债务金额的 10%。"
 GRE_creditor_call_in_debt: "希腊债务催收"
 GRE_creditor_call_in_debt_desc: "要求希腊立即偿还其所欠债务的20%。这是一项可能损害两国关系的严厉外交举措。"
 GRE_creditor_forgive_debt: "免除希腊债务"
 GRE_creditor_forgive_debt_desc: "作为善意的姿态，免除希腊欠我们25%的债务。这将显著改善与雅典的关系。"
 greece_debt.10.t: "希腊债务提案"
 greece_debt.10.d: "[FROM.GetName]已与我们联系，提出由我们承担其部分国债。作为交换，我们将定期收到所承担金额的利息。拟议金额虽不大，但能提供稳定的收入来源。"
 greece_debt.10.a: "接受条款"
 greece_debt.10.b: "我们对此毫无兴趣"
 greece_debt.10.c: "提高比率"
 greece_debt.12.t: "债务提案已接受"
 greece_debt.12.d: "[FROM.GetName]已同意承担我们部分国债。我们将定期向其支付利息，但我们的整体债务负担已得到重组。"
 greece_debt.12.a: "必要的安排"
 greece_debt.13.t: "债务提案被拒绝"
 greece_debt.13.d: "[FROM.GetName]拒绝了我们提出的持有部分债务的提议。我们必须另寻其他救济途径或寻找其他方法来解决我们的财务困境。"
 greece_debt.13.a: "我们会找到其他方法"
 greece_debt.14.t: "已收到反要约"
 greece_debt.14.d: "[FROM.GetName]愿意持有我们的债务，但利率高于我们最初提出的方案。偿还这笔债务增加的成本必须与它带来的即时缓解进行权衡。"
 greece_debt.14.a: "接受更高比率"
 greece_debt.14.b: "这些条款是无法接受的"
 greece_debt.16.t: "债务催收"
 greece_debt.16.d: "[FROM.GetName]要求我们立即偿还部分欠款。如不履行此要求，将损害我们之间的关系和国际信誉。"
 greece_debt.16.a: "按他们的要求付钱"
 greece_debt.16.b: "我们承担不起"
 greece_debt.17.t: "债务豁免"
 greece_debt.17.d: "[FROM.GetName]慷慨地免除了我们部分债务。这项意外的援助大大减轻了我们的经济负担。"
 greece_debt.17.a: "如释重负"
 greece_debt.18.t: "希腊债务已全部偿还"
 greece_debt.18.d: "[FROM.GetName]已全额偿还所有欠款。虽然我们因此损失了一笔利息收入，但此次还款体现了其良好的财务责任感。"
 greece_debt.18.a: "账户已结算"
 greece_debt.2.t: "债务互换提案"
 greece_debt.2.d: "[FROM.GetName]请求我们考虑通过债务互换安排承担他们的一部分国债。"
 GRE_eligible_creditor_tt: "必须不与希腊处于战争状态，保持独立，尚未成为债权国，且关系值高于-50。"
 GRE_debt_ratio_above_50_tt: "债务占GDP比重必须高于50%"
 GRE_debt_ratio_above_90_tt: "债务占GDP比重必须高于90%"
 GRE_propose_debt_deal_accept_tt: "债权人承担了我们的一部分债务，通过持续支付利息来减少我们的国家债务。"
 GRE_creditor_call_in_debt_accept_tt: "希腊偿还了它欠我们债务中已确定的那部分。"
 GRE_creditor_call_in_debt_reject_tt: "希腊拒绝付款，导致两国关系恶化。"
 GRE_retry_outreach_accept_tt: "他们同意了我们的提议，改善了关系，加深了我们的合作。"
 GRE_repay_10pct_tt: "偿还欠该债权人债务的10%。"
 GRE_call_in_20pct_tt: "要求偿还我们所持有的希腊债务的20%。"
 GRE_forgive_25pct_tt: "免除希腊欠我们债务的25%。"
 GRE_eastmed_jor_accept_tt: "约旦加入论坛，改善了与我国的关系，并与我们签署了贸易协定。"
 GRE_eastmed_jor_reject_tt: "约旦拒绝，使我们损失了政治资本。"
 GRE_interest_rate_below_cap_tt: "利率必须低于8%"
 GRE_interest_rate_above_min_tt: "利率必须高于0.5%"
 GRE_creditor_holds_significant_debt_tt: "我们拥有超过§Y10B§!§Y希腊债务§!（当前§Y[?GRE_debt_held_by_us|1]B§!）"
 GRE_deferred_to_creditors_tt: "递延成本按债权国比例分摊。"
 GRE_prospecting_category: "希腊资源勘探"
 GRE_prospecting_category_desc: "我们的地质勘测已在希腊大陆和岛屿上发现了具有开采潜力的矿藏。凭借合适的开采技术和基础设施，我们可以将这些矿藏开发成高产矿山。"
 GRE_prospecting_unlocked_tt: "解锁资源勘探决议"
 GRE_halkidiki_prospecting: "哈尔基迪基矿业扩张"
 GRE_halkidiki_prospecting_desc: "希腊北部哈尔基迪基半岛蕴藏着丰富的铬矿和金矿。斯库里斯和斯特拉托尼矿区可利用现代开采技术进行扩建。"
 GRE_peloponnese_bauxite: "伯罗奔尼撒铝土矿开采"
 GRE_peloponnese_bauxite_desc: "迪斯托蒙矿区和福基斯地区蕴藏着丰富的铝土矿储量。持续开采可以满足我们铝业数十年的供应需求。"
 GRE_thessaly_mining: "色萨利镍矿"
 GRE_thessaly_mining_desc: "位于色萨利地区的拉里姆纳镍红土矿床是欧洲最大的镍矿储量之一。系统开采将产生钢铁和铬等副产品。"
 GRE_aegean_mining: "爱琴海岛屿矿产开采"
 GRE_aegean_mining_desc: "爱琴海的火山岛，特别是米洛斯岛和纳克索斯岛，蕴藏着可以进行商业开发的膨润土、珍珠岩和金刚砂矿藏。"
 GRE_pipeline_infrastructure: "管道基础设施"
 GRE_pipeline_infrastructure_desc: "连接勘探地点与现有炼油厂和工业用户的管道网络，使开采在商业上可行，并将资源部门与更广泛的希腊能源网络联系起来。"
 greece.28.t: "中国工业投资提案"
 greece.28.d: "[FROM.GetName]已与我们联系，希望投资其工业基地。他们提议我们资助在色萨利地区建设一家工厂，以换取我们对当地日益增长的经济的商业影响力。"
 greece.28.a: "这是一笔划算的投资"
 greece.28.b: "我们对希腊工业不感兴趣。"
 greece.29.t: "中国投资已被接受"
 greece.29.d: "中国已同意资助我们在色萨利地区的工业扩张。一座新工厂将利用中国资金建设，这将深化我们与北京的经济联系。"
 greece.29.a: "真是好消息"
 greece.30.t: "中国投资被拒绝"
 greece.30.d: "中国拒绝了我们的工业投资提议。我们仍然可以自行推进建设，但费用将由我们承担。"
 greece.30.a: "我们将自行筹资。"
 greece.30.b: "如果没有外资，这个项目就无法实现。"
 greece.31.t: "比雷埃夫斯港投资提案"
 greece.31.d: "[FROM.GetName]提议中国投资比雷埃夫斯港。中远海运将收购港务局的控股权，出资进行重大基础设施升级，以换取对地中海最繁忙港口之一的商业控制权。"
 greece.31.a: "比雷埃夫斯港是一项值得投资的战略资产。"
 greece.31.b: "我们不会投资希腊港口。"
 greece.32.t: "中远集团收购比雷埃夫斯港股份"
 greece.32.d: "中国已同意投资比雷埃夫斯港。中远海运将出资扩建港口，增加新的船坞容量和基础设施。中国对我国经济的影响力日益增强，我国的港口吞吐能力也随之提升。"
 greece.32.a: "港口将会繁荣发展"
 greece.33.t: "中国拒绝向比雷埃夫斯投资"
 greece.33.d: "中国拒绝投资比雷埃夫斯港。我们仍然可以自行改造港口，但如果没有中国资金，所有费用都将由我们承担。"
 greece.33.a: "我们将自行完成比雷埃夫斯港的现代化改造。"
 greece.33.b: "港口可以​​等待"
 greece.34.t: "希腊房地产开发提案"
 greece.34.d: "[FROM.GetName]已与我们联系，洽谈在阿提卡地区开发商业地产的事宜。中国开发商将出资建设购物中心、酒店和办公楼，以换取长期租赁权和商业经营权。"
 greece.34.a: "希腊房产是一项极具吸引力的投资。"
 greece.34.b: "我们对希腊房地产不感兴趣。"
 greece.35.t: "中国房地产投资获批"
 greece.35.d: "中国开发商将投资阿提卡地区的多个大型建设项目。新增的商业和住宅项目将改变该地区的面貌，而中国企业在该地区的商业影响力也将显著增长。"
 greece.35.a: "建造开始"
 greece.36.t: "中国房地产投资被拒"
 greece.36.d: "中国已拒绝投资我国房地产行业。但我们仍可利用国内资本继续推进开发。"
 greece.36.a: "我们将自行开发。"
 greece.36.b: "开发可以等待"
 greece.37.t: "全国基础设施投资提案"
 greece.37.d: "[FROM.GetName]提出了一项覆盖希腊全境的综合基础设施建设方案。中国国有企业将出资在全国范围内建设机场、工厂和办公楼，以换取巨大的商业影响力。"
 greece.37.a: "希腊已具备发展的条件"
 greece.37.b: "这项提案的范围与我们有关"
 greece.38.t: "中国全国性投资获批"
 greece.38.d: "中国已承诺在希腊全国范围内推行基础设施建设项目。新的机场、工厂和商业建筑将在希腊各地建设，所有费用均由中国承担。"
 greece.38.a: "变革性的伙伴关系"
 greece.39.t: "中国全国性投资被拒"
 greece.39.d: "中国拒绝了我们提出的全国性投资方案。我们仍然可以自行建设基础设施，但成本会相当高昂。"
 greece.39.a: "我们将自己建造它"
 greece.39.b: "如果没有外国支持，成本太高。"
 greece.40.t: "埃利尼科开发提案"
 greece.40.d: "[FROM.GetName]提议中国投资开发原埃利尼科国际机场旧址。这项大型沿海开发项目将把废弃的跑道改造成现代化城区，并改善阿提卡和伯罗奔尼撒半岛的基础设施。"
 greece.40.a: "埃利尼科项目具有巨大潜力"
 greece.40.b: "我们不会投资这个项目。"
 greece.41.t: "中国埃利尼科投资已获接受"
 greece.41.d: "中国已同意为埃利尼科重建项目提供资金。基础设施改善工程将覆盖阿提卡和伯罗奔尼撒半岛。"
 greece.41.a: "一项具有里程碑意义的项目启动"
 greece.42.t: "中国埃利尼科投资被拒"
 greece.42.d: "中国已拒绝投资埃利尼科重建项目。我们仍然可以使用自有资金继续推进该项目，或者也可以搁置该计划。"
 greece.42.a: "我们将自行筹资。"
 greece.42.b: "暂时搁置这个项目"
 greece.46.t: "中国工商银行贷款申请"
 greece.46.d: "[FROM.GetName]已向中国工商银行寻求大额贷款。他们建议中国工商银行提供相当于其国内生产总值10%的信贷，加深我们与雅典的金融联系，并扩大中国银行业在地中海的业务。"
 greece.46.a: "延长贷款"
 greece.46.b: "这风险也太大了"
 greece.47.t: "中国工商银行贷款获批"
 greece.47.d: "中国工商银行已批准我们的贷款申请。中国资本流入我们的国库，提供了大量资金注入。我们对北京的经济依赖加深，但立即缓解是值得欢迎的。"
 greece.47.a: "资金已得到保障。"
 greece.48.t: "中国工商银行贷款遭拒"
 greece.48.d: "中国拒绝向工商银行提供贷款。没有中国银行业的支持，我们必须寻找其他资金来源，或者在现有资源范围内运作。"
 greece.48.a: "我们要想办法处理"
 GRE_drydock_modernization: "干船坞现代化"
 GRE_drydock_modernization_desc: "对现代化干船坞设施的投资扩大了海军维修和建造能力，使希腊海军能够更有效地升级其舰队。"
 GRE_strategic_autonomy_idea: "战略自主"
 GRE_strategic_autonomy_idea_desc: "希腊不隶属于任何单一阵营，而是与所有阵营都进行贸易和谈判。这种与各方周旋的自由使其能够获得更有利的条件，并在一定程度上免受大国压力的影响。"
 GRE_euro_adopted: "采用欧元"
 GRE_euro_adopted_desc: "希腊采用欧元使其经济融入了更广泛的欧元区，降低了借贷成本，促进了贸易，但代价是牺牲了独立的货币政策。"
 GRE_manpads_expansion_idea: "单兵防空导弹扩展"
 GRE_manpads_expansion_idea_desc: "通过国内研发和制造，扩大便携式防空系统计划，提高了防空能力，降低了生产成本。"
 GRE_pension_reformed: "养老金改革"
 GRE_pension_reformed_desc: "养老金制度重组减轻了国家的财政负担，但削减措施引起了受影响退休人员的不满。"
 GRE_port_modernization: "港口现代化"
 GRE_port_modernization_desc: "升级后的港口基础设施扩大了船坞容量，提高了希腊各造船厂的船舶建造效率。"
 GRE_research_hubs_idea: "军事研究中心"
 GRE_research_hubs_idea_desc: "已建立专门的军事研究中心，以加速国防技术发展和武器系统创新。"
 GRE_research_hubs_idea_2: "高级研究中心"
 GRE_research_hubs_idea_2_desc: "研究中心计划的扩展现在涵盖了空间技术和军事应用，拓宽了希腊的技术前沿。"
 GRE_greater_state_control_authoritarian: "威权国家控制"
 GRE_greater_state_control_authoritarian_desc: "国家已直接控制关键经济部门，以牺牲政治自由和官僚灵活性为代价加快了建设步伐。"
 GRE_police_influence_desc: "执政党已将其影响力扩展到警察机构，降低了监督成本，但也使政治忠诚渗透到执法部门的各个角落。"
 GRE_com_liberators: "人民解放者"
 GRE_com_liberators_desc: "革命热情在队伍中高涨。在本土作战的士兵们受到革命事业的鼓舞，战斗更加激烈，捍卫革命的决心也更加坚定。"
 GRE_golden_visa_money: "黄金签证计划"
 GRE_golden_visa_money_desc: "外国投资者通过向希腊经济注入资金获得居留许可，从而产生稳定的额外收入。"
 GRE_western_outreach: "西部外延"
 GRE_western_outreach_desc: "希腊外交正致力于在北约和欧盟范围内开展有针对性的双边和多边拓展活动。西方承诺：[?GRE_western_commitment|0]"
 GRE_franco_hellenic_strategic_partnership: "法希战略伙伴关系"
 GRE_franco_hellenic_strategic_partnership_desc: "2021年建立的战略伙伴关系开启了与法国深化国防工业合作的进程。希腊的武器工厂采用共同标准，法国的研发资金流入我们的军事项目，政治协调也更加紧密。"
 GRE_franco_greek_mutual_defense: "法希共同防御条款"
 GRE_franco_greek_mutual_defense_desc: "升级后的伙伴关系协议第二条规定法国有义务保卫希腊领土。该条款从欧洲大陆层面保障希腊安全，并将地中海两大军事力量凝聚成一个战略单位。"
 GRE_eastmed_trilateral_idea: "希腊-以色列-塞浦路斯三边"
 GRE_eastmed_trilateral_idea_desc: "联合声明、联合演习和情报共享，将三国海军和空军凝聚成一个横跨东地中海盆地的统一作战区域。"
 GRE_eastmed_gas_forum_idea: "东地中海天然气论坛成员"
 GRE_eastmed_gas_forum_idea_desc: "希腊船只通过优先航道航行，区域天然气流动为希腊炼油厂和船坞提供燃料，雅典在东地中海能源领域保持着永久地位。"
 GRE_3plus1_pact: "3+1战略对话"
 GRE_3plus1_pact_desc: "美国的参与使东地中海三边关系更加稳固。联合演习、情报交流和结构化的战略对话提升了希腊武装部队在海空领域的作战能力。"
 GRE_eu_political_anchor_idea: "欧盟创始成员国锚点"
 GRE_eu_political_anchor_idea_desc: "希腊作为欧盟创始成员国，拥有政治影响力，从欧盟内部贸易中获益，并凭借资历优势影响布鲁塞尔的议程。"
 GRE_eu_strategic_compass_idea: "欧盟战略指南针倡导者"
 GRE_eu_strategic_compass_idea_desc: "希腊的外交政策推进了欧洲战略指南针，呼吁摆脱外部大国冒险主义的束缚，同时不断加强欧盟国防工业基础的联系。"
 greece.556.t: "西方重申立场"
 greece.556.d: "希腊宣布全面重申其西方立场，开启一项持续的、涵盖北约和欧盟的双边及多边外交活动。雅典此举意在向盟友和对手表明，其战略未来牢牢扎根于西方。"
 greece.556.a: "令人欣慰的重申"
 greece.556.b: "希腊保持立场"
 greece.556.c: "保持警惕"
 greece.557.t: "希腊提案：战略伙伴关系"
 greece.557.d: "雅典方面提议建立一项涵盖国防工业合作、外交政策协调和东地中海安全的全面战略伙伴关系。希腊政府愿意投入大量政治资源，使之成为法国地中海政策的旗舰项目。"
 greece.557.a: "签署合作协议"
 greece.557.b: "拒绝该提议"
 greece.558.t: "法国接受伙伴关系"
 greece.558.d: "巴黎接受了这一战略伙伴关系。双方立即成立了国防工业合作联合工作组，法国的专业技术不断流入希腊的军工厂和研究项目。该伙伴关系被誉为欧洲双边合作的典范。"
 greece.558.a: "历史性的协议"
 greece.559.t: "[FROM.GetName]拒绝该伙伴关系"
 greece.559.d: "[FROM.GetName]以谨慎的外交辞令告知雅典，该伙伴关系无法继续进行。政治代价依然存在。"
 greece.559.a: "令人遗憾的挫折"
 greece.560.t: "希腊提议：东地中海三边"
 greece.560.d: "雅典提议与以色列和塞浦路斯建立正式的三边框架：联合演习、情报共享和外交立场协调。该安排将把长期合作转化为具有约束力的制度形式。"
 greece.560.a: "签署条约"
 greece.560.b: "拒绝该提议"
 greece.561.t: "以色列加入三边协议"
 greece.561.d: "以色列签署了三方框架协议。联合计划小组在行动层面成立，以色列的情报共享安排也扩展到希腊方面。"
 greece.561.a: "欢迎我们的伙伴"
 greece.563.t: "希腊提议：东地中海三边"
 greece.563.d: "雅典提议与塞浦路斯和以色列建立正式的三方框架。对尼科西亚而言，这一提议基本上是自动生效的，但仍需正式签署。"
 greece.563.a: "我们当然会签署"
 greece.563.b: "暂不作进一步审查"
 greece.564.t: "塞浦路斯加入三边协议"
 greece.564.d: "尼科西亚与雅典和耶路撒冷签署了三方框架协议。如今，这三个国家的政府在东地中海地区实行统一的外交和行动框架。"
 greece.564.a: "统一的东地中海"
 greece.566.t: "希腊提案：第二条共同防御条款"
 greece.566.d: "雅典方面提议，战略伙伴关系的自然结果在于：在双边条约中直接写入一项具有约束力的共同防御条款，该条款以《欧洲共同体条约》第五条为蓝本。这将使希腊的领土完整首次在条约条款下得到一个欧洲大国的保障。"
 greece.566.a: "签署共同防御条款"
 greece.566.b: "拒绝。操之过急。"
 greece.567.t: "法国签署共同防御条款"
 greece.567.d: "巴黎签署了该条约。修订后的条约第二条规定法国有义务保卫希腊领土。这一外交冲击波远远超出了地中海地区。"
 greece.567.a: "欧洲安全的新时代"
 greece.568.t: "法国拒绝接受共同防御条款"
 greece.568.d: "巴黎方面拒绝了共同防御条款，认为这超出了法国当前的战略战略范畴。现有的伙伴关系依然存在，但具有约束力的安全保障将不会落实。"
 greece.568.a: "这是严重的挫折"
 greece.569.t: "希腊提议：3+1战略对话"
 greece.569.d: "雅典、尼科西亚和耶路撒冷共同提议与美国正式建立“3+1”战略对话机制。该机制是由美国国务院支持的框架，涵盖东地中海的能源安全、海上合作和反恐等领域。"
 greece.569.a: "参与对话"
 greece.569.b: "推迟参与"
 greece.570.t: "美国参与“3+1”对话"
 greece.570.d: "华盛顿正式启动“3+1”战略对话。美国的训练和演习承诺扩展到整个东地中海地区，希腊武装部队也获得了更高层次的联合作战经验。"
 greece.570.a: "不可或缺的伙伴关系"
 greece.571.t: "美国推迟参与"
 greece.571.d: "美国国务院表示，更广泛的战略重点正吸引着美国的注意力。“3+1”合作框架并未被放弃，但在本轮周期内不会进行正式升级。"
 greece.571.a: "以后再说"
 greece.572.t: "希腊：西方的支柱"
 greece.572.d: "一系列条约、宣言和伙伴关系使希腊从一个边缘的北约成员国转变为西方在东地中海地区外交的中坚力量。如今，雅典在布鲁塞尔和华盛顿都拥有举足轻重的地位。"
 greece.572.a: "西方的支柱"
 greece.572.b: "盟友恢复"
 greece.572.c: "新的战略格局"
 greece.575.t: "亚历山德鲁波利斯浮式储存再气化装置上线"
 greece.575.d: "停泊在亚历山德鲁波利斯的浮式储存再气化装置已开始商业运营，这标志着东南欧摆脱对俄罗斯管道天然气的依赖。希腊如今已成为欧洲大陆能源供应的门户。"
 greece.575.a: "雅典点亮了灯"
 greece.575.b: "一个有用的新节点"
 greece.577.t: "比雷埃夫斯港是度-中东-欧洲走廊的中心枢纽"
 greece.577.d: "德里、利雅得和布鲁塞尔的国家元首已确认比雷埃夫斯港为印度-中东-欧洲经济走廊的欧洲终点站。预计未来十年，经由阿提卡地区的转运量将增长两倍。"
 greece.577.a: "从爱琴海到印度洋"
 greece.577.b: "一个物流里程碑"
 greece.580.t: "希腊提案：普雷斯帕合作路线图"
 greece.580.d: "雅典方面提出了一项结构化的路线图，旨在延长《普雷斯帕协定》的期限：包括成立行业工作组、达成自由贸易协定以及开展联合基础设施规划。该方案将使我们两国的经济在未来一代人的时间里紧密相连。"
 greece.580.a: "斯科普里已准备好在普雷斯帕河畔进行建设。"
 greece.580.b: "我们不会超出现有框架。"
 greece.581.t: "北马其顿支持该路线图"
 greece.581.d: "斯科普里已签署普雷斯帕合作路线图。各工作组将于数周内在塞萨洛尼基召开会议，自由贸易协定指日可待。"
 greece.581.a: "真是好消息"
 greece.582.t: "希腊提案：少数群体权利框架"
 greece.582.d: "雅典方面提出了一项关于阿尔巴尼亚南部希腊语社区权利的正式框架：语言学校、财产归还和跨境文化合作，以换取更友好的双边关系。"
 greece.582.a: "地拉那接受该框架"
 greece.582.b: "我们不能同意这些条款。"
 greece.583.t: "阿尔巴尼亚签署少数族裔框架"
 greece.583.d: "该协议在地拉那签署。阿尔巴尼亚南部讲希腊语的社区将获得切实保护，与雅典的部长级沟通渠道也将相应深化。"
 greece.583.a: "外交上的收获"
 greece.584.t: "希腊提议：东地中海专属经济区协议"
 greece.584.d: "雅典提议与开罗达成双边专属经济区划界协议。该协议将解决重叠的海洋权益主张，并排除竞争对手共同开发海底资源的可能性。"
 greece.584.a: "开罗签署协议"
 greece.584.b: "开罗暂时拒绝"
 greece.585.t: "埃及批准专属经济区协议"
 greece.585.d: "埃及已批准该海洋划界协议。划定区域的联合勘测工作将于本月内开始，与该协议相关的贸易条款也将生效。"
 greece.585.a: "一项基础性协议"
 greece.586.t: "希腊的提议：建立意希地中海轴心"
 greece.586.d: "雅典提议与罗马建立全面伙伴关系：协调一致的产业政策、共享船坞项目以及在地中海安全问题上立场一致。这两个半岛将在布鲁塞尔作为一个整体发挥作用。"
 greece.586.a: "罗马同意建立伙伴关系"
 greece.586.b: "罗马方面礼貌地拒绝了。"
 greece.587.t: "意大利加入地中海轴心"
 greece.587.d: "意大利已签署合作文件。联合工业委员会和海军联合生产框架会议将于本季度在雅典召开。"
 greece.587.a: "新轴心诞生"
 greece.588.t: "希腊提案：希腊- 保加利亚天然气互联管道扩建"
 greece.588.d: "雅典提议分阶段扩建希腊-保加利亚天然气管道及其连接的亚历山德鲁波利斯终端。索非亚将获得多元化的天然气供应；雅典则可获得巴尔干地区的过境收入。"
 greece.588.a: "索非亚签署扩建计划"
 greece.588.b: "索菲亚拒绝了这项提议"
 greece.589.t: "保加利亚批准输油管道扩建项目"
 greece.589.d: "索非亚方面已批准扩建计划。工程计划于本季内开工；预计向北输往保加利亚和向南经希腊终端输送的天然气流量将翻一番。"
 greece.589.a: "一条战略走廊"
 greece.590.t: "希腊提议：希腊-沙特战略委员会"
 greece.590.d: "雅典提议与利雅得建立最高战略合作委员会，内容涵盖国防工业合作、主权财富基金共同投资以及定期部长级对话。沙特阿拉伯将获得一个地中海伙伴，而希腊将获得资金。"
 greece.590.a: "利雅得接受"
 greece.590.b: "利雅得拒绝"
 greece.591.t: "沙特阿拉伯召开理事会"
 greece.591.d: "最高战略合作委员会在雅典举行首次会议。沙特主权财富基金宣布对希腊工业进行首批投资。"
 greece.591.a: "一项具有里程碑意义的合作"
 greece.592.t: "希腊提议：希腊-阿联酋投资协定"
 greece.592.d: "雅典提议与阿布扎比达成一项结构化的投资协议：对阿联酋资金实行税收优惠，允许其进入阿提卡自由区，以及希腊对海湾物流网络进行互惠投资。"
 greece.592.a: "阿布扎比接受"
 greece.592.b: "阿布扎比拒绝"
 greece.593.t: "阿拉伯联合酋长国签署协议"
 greece.593.d: "阿布扎比已签署该协议。阿联酋资本开始流入希腊物流和工业领域，希腊企业也将获得优先使用海湾枢纽基础设施的机会。"
 greece.593.a: "棒极了"
 greece.594.t: "希腊提案：加入东地中海天然气论坛"
 greece.594.d: "雅典提议安曼加入东地中海天然气论坛，并由希腊作为其入会担保。届时，一个从黎凡特延伸至爱琴海的区域能源架构将得以构建。"
 greece.594.a: "安曼接受了邀请"
 greece.594.b: "安曼拒绝"
 greece.595.t: "约旦加入东地中海天然气论坛"
 greece.595.d: "约旦已正式加入东地中海天然气论坛。该机构的地理和政治影响力如今已显著扩展至整个东地中海盆地。"
 greece.595.a: "外交上的胜利"
 GRE_lobby_eu_partners: "游说欧盟伙伴"
 GRE_lobby_eu_partners_desc: "将政治资本投入到欧盟内部持续的游说活动中：双边访问、立场文件和让步交易，以推进希腊的外交优先事项并积累西方的承诺。"
 GRE_eastern_alignment_score: "希腊东部联盟"
