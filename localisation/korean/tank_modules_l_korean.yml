 tank_small_medium_cannon_5: "초고도 경전차포"
 tank_small_medium_cannon_5_desc: "포구 속도가 증가하고 주력 전차포의 요소가 도입된 미래의 경전차포는 전장의 거의 모든 위협에 대응할 수 있을 것입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 tank_small_medium_cannon_6: "초첨단 경전차포"
 tank_small_medium_cannon_6_desc: "포구 속도가 증가하고 주력 전차포의 요소가 도입된 미래의 경전차포는 전장의 거의 모든 위협에 대응할 수 있을 것입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 tank_small_cannon_5: "초고도 경전차포"
 tank_small_cannon_5_desc: "나노기술과 컴퓨터 지원 설계의 도입으로 미래 경전차 주포의 전례 없는 발전이 가능해졌으며 경전차의 생존성과 출력 능력이 더욱 향상되었습니다."
 tank_small_cannon_6: "초첨단 경전차포"
 tank_small_cannon_6_desc: "나노기술과 컴퓨터 지원 설계의 도입으로 미래 경전차 주포의 전례 없는 발전이 가능해졌으며 경전차의 생존성과 출력 능력이 더욱 향상되었습니다."
 tank_medium_cannon_5: "초고도 중형 전차포"
 tank_medium_cannon_5_desc: "매우 정교한 중형 전차포입니다."
 tank_medium_cannon_6: "초첨단 중형 전차포"
 tank_medium_cannon_6_desc: "매우 정교한 중형 전차포입니다."
 tank_large_cannon_4: "초고도 중전차포"
 tank_large_cannon_4_desc: "개선된 설계를 통해, 발전된 중전차포에서 발사되는 탄약은 기갑 차량과 보병 모두에게 효과적인 타격을 입힙니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 tank_large_cannon_5: "초첨단 중전차포"
 tank_large_cannon_5_desc: "개선된 설계를 통해, 발전된 중전차포에서 발사되는 탄약은 기갑 차량과 보병 모두에게 효과적인 타격을 입힙니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 tank_very_large_cannon_4: "초고도 초중전차포"
 tank_very_large_cannon_4_desc: "전자기 가속 보조 장치가 추가되어, 초중전차포는 탄자를 통해 장갑은 물론 건물과 벙커까지 관통할 수 있습니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 tank_very_large_cannon_5: "초첨단 초중전차포"
 tank_very_large_cannon_5_desc: "전자기 가속 보조 장치가 추가되어, 초중전차포는 탄자를 통해 장갑은 물론 건물과 벙커까지 관통할 수 있습니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 art_small_gun_gen6: "초고도 경곡사포"
 art_small_gun_gen6_desc: "우리 제조 업체가 생산할 수 있는 최고의 제품인 이 이동식 포병은 모든 목표 지역에 포탄을 쏟아부을 것입니다."
 art_small_gun_gen7: "초첨단 경곡사포"
 art_small_gun_gen7_desc: "우리 제조 업체가 생산할 수 있는 최고의 제품인 이 이동식 포병은 모든 목표 지역에 포탄을 쏟아부을 것입니다."
 art_med_gun_gen6: "초고도 곡사포"
 art_med_gun_gen6_desc: "중형 포병 체계의 정점입니다. 이 포가 발사되는 지역은 그저 먼지와 흙더미로 변하게 될 것입니다."
 art_med_gun_gen7: "초첨단 곡사포"
 art_med_gun_gen7_desc: "중형 포병 체계의 정점입니다. 이 포가 발사되는 지역은 그저 먼지와 흙더미로 변하게 될 것입니다."
 art_big_gun_gen6: "Hyper Advanced Howitzer"
 art_big_gun_gen6_desc: "Perfected heavy-barrels and firing mechanisms lead to the development of heavy long-range artillery that is extremely effective, for when you need to really destroy a target."
 art_big_gun_gen7: "Ultra Advanced Howitzer"
 art_big_gun_gen7_desc: "Perfected heavy-barrels and firing mechanisms lead to the development of heavy long-range artillery that is extremely effective, for when you need to really destroy a target."
 art_med_rocket_gen6: "초고도 중형 MLRS"
 art_med_rocket_gen6_desc: "중형 MLRS는 동시에 여러 종류의 로켓을 발사할 수 있습니다. 이 발사대는 평소보다 훨씬 빠르게 재장전할 수 있어, 여러 대의 플랫폼을 배치할 필요 없이 지속적인 화력을 투사할 수 있습니다."
 art_med_rocket_gen7: "초첨단 중형 MLRS"
 art_med_rocket_gen7_desc: "중형 MLRS는 동시에 여러 종류의 로켓을 발사할 수 있습니다. 이 발사대는 평소보다 훨씬 빠르게 재장전할 수 있어, 여러 대의 플랫폼을 배치할 필요 없이 지속적인 화력을 투사할 수 있습니다."
 fire_ammo_4: "Hyper Advanced Napalm Ammo"
 fire_ammo_4_desc: "By switching the payload of our rockets to napalm, we can increase the effectiveness against soft targets. However, it will seriously hamper our ability to fight enemy armoured vehicles."
 fire_ammo_5: "Ultra Advanced Napalm Ammo"
 fire_ammo_5_desc: "By switching the payload of our rockets to napalm, we can increase the effectiveness against soft targets. However, it will seriously hamper our ability to fight enemy armoured vehicles."
 mine_ammo_4: "Hyper Advanced Mining Rocket"
 mine_ammo_4_desc: "Similar to a cluster rocket, a mining rocket will break into smaller pieces and fill the target area with anti-infantry or anti-vehicle mines."
 mine_ammo_5: "Ultra Advanced Mining Rocket"
 mine_ammo_5_desc: "Similar to a cluster rocket, a mining rocket will break into smaller pieces and fill the target area with anti-infantry or anti-vehicle mines."
 heat_ammo_4: "Hyper Advanced HEAT Ammo"
 heat_ammo_4_desc: "HEAT (High Explosive Anti-Tank) shells are a specialised ammo type intended to take out enemy armour. As the shell hits its target, an explosion sends a jet of metal that penetrates through enemy armour. This of course means very little effectiveness against infantry unless it is a direct hit."
 heat_ammo_5: "Ultra Advanced HEAT Ammo"
 heat_ammo_5_desc: "HEAT (High Explosive Anti-Tank) shells are a specialised ammo type intended to take out enemy armour. As the shell hits its target, an explosion sends a jet of metal that penetrates through enemy armour. This of course means very little effectiveness against infantry unless it is a direct hit."
 cluster_ammo_4: "Hyper Advanced Cluster Ammo"
 cluster_ammo_4_desc: "Instead of one large payload, cluster shells carry several smaller bombs. As the shells approaches its target, the smaller bombs are released. This will pepper the area with a cluster of smaller explosions instead of a single large one."
 cluster_ammo_5: "Ultra Advanced Cluster Ammo"
 cluster_ammo_5_desc: "Instead of one large payload, cluster shells carry several smaller bombs. As the shells approaches its target, the smaller bombs are released. This will pepper the area with a cluster of smaller explosions instead of a single large one."
 laser_guided_ammo_4: "Hyper Advanced Laser Guided Ammo"
 laser_guided_ammo_4_desc: "A laser-guided shell will be able to change its path mid-flight by using small control thrusters. This allows the shell to hit its target more accurately."
 laser_guided_ammo_5: "Ultra Advanced Laser Guided Ammo"
 laser_guided_ammo_5_desc: "A laser-guided shell will be able to change its path mid-flight by using small control thrusters. This allows the shell to hit its target more accurately."
 burst_fire_gun_medium_gen4: "Hyper Advanced Burst Fire Mode"
 burst_fire_gun_medium_gen4_desc: "With an advanced targeting computer and an autoloader, artillery can fire multiple rounds in quick succession at the same target, maximising suppression."
 burst_fire_gun_medium_gen5: "Ultra Advanced Burst Fire Mode"
 burst_fire_gun_medium_gen5_desc: "With an advanced targeting computer and an autoloader, artillery can fire multiple rounds in quick succession at the same target, maximising suppression."
 multiple_rounds_medium_gen4: "Hyper Advanced Multiple Impact Mode"
 multiple_rounds_medium_gen4_desc: "By firing multiple shells in succession with different propellant charges and different firing arcs, it is possible to make all fired shells impact the target at the same time. This requires a highly skilled crew and an advanced targeting computer."
 tank_composite_armor_gen5: "초고도 복합 장갑"
 tank_composite_armor_gen5_desc: "3D 프린팅, 레이저 소결 및 탄소 나노튜브가 포함된 나노 크기의 알루미나 분말을 적용하여 전차에 최고 수준의 방어력을 제공합니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 tank_composite_armor_gen6: "초첨단 복합 장갑"
 tank_composite_armor_gen6_desc: "3D 프린팅, 레이저 소결 및 탄소 나노튜브가 포함된 나노 크기의 알루미나 분말을 적용하여 전차에 최고 수준의 방어력을 제공합니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 tank_battlestation_6: "초고도 배틀스테이션"
 tank_battlestation_6_desc: "다목적 카메라 세트와 고급 전투 관측 시스템이 탑재되어 있습니다.\n\n§G설계 힌트: 배틀스테이션은 전차 운용에 필요한 사격 통제, 화기 제어, 광학 장비 및 기타 보조 장비를 나타냅니다. 더 우수한 배틀스테이션을 장착할수록 전차의 전반적인 품질이 향상됩니다.§!"
 tank_battlestation_7: "초첨단 배틀스테이션"
 tank_battlestation_7_desc: "다목적 카메라 세트와 고급 전투 관측 시스템이 탑재되어 있습니다.\n\n§G설계 힌트: 배틀스테이션은 전차 운용에 필요한 사격 통제, 화기 제어, 광학 장비 및 기타 보조 장비를 나타냅니다. 더 우수한 배틀스테이션을 장착할수록 전차의 전반적인 품질이 향상됩니다.§!"
 reactive_armor_gen5: "5세대 폭발반응장갑 (ERA)"
 reactive_armor_gen5_desc: "초고도 형태의 ERA로, 다양한 환경 조건에서 운용 가능하며 적의 화력 대부분을 효과적으로 무력화합니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 reactive_armor_gen6: "6세대 폭발반응장갑 (ERA)"
 reactive_armor_gen6_desc: "폭발반응장갑의 가장 발전된 형태로, 다양한 환경 조건에서 운용 가능하며 적의 화력 대부분을 효과적으로 무력화합니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 nera_armor_gen4: "4th Gen Heavy NERA"
 nera_armor_gen4_desc: "With additional titanium or depleted uranium plates and distinct shapes, we can improve the overall armor protection of our vehicles.\n\n§GDesigner Hint: Heavy NERA is more resistant but also more expensive than simpler composite§!"
 nera_armor_gen5: "5th Gen Heavy NERA"
 nera_armor_gen5_desc: "With additional titanium or depleted uranium plates and distinct shapes, we can improve the overall armor protection of our vehicles.\n\n§GDesigner Hint: Heavy NERA is more resistant but also more expensive than simpler composite§!"
 hardkill_system_gen3: "Advanced Hard-Kill System"
 hardkill_system_gen3_desc: "An improved hard-kill system will be able to stop even fast moving kinetic penetrators and tandem shaped charges. The improved system also covers the tank from all directions.\n\n§GDesigner Hint: A hard-kill system is a good way to bolster our tanks defensive capabilities against hostile missiles. It also will allow our armour to be more effective at breaking through hostile lines.§!"
 hardkill_system_gen4: "Hyper Advanced Hard-Kill System"
 hardkill_system_gen4_desc: "An improved hard-kill system will be able to stop even fast moving kinetic penetrators and tandem shaped charges. The improved system also covers the tank from all directions.\n\n§GDesigner Hint: A hard-kill system is a good way to bolster our tanks defensive capabilities against hostile missiles. It also will allow our armour to be more effective at breaking through hostile lines.§!"
