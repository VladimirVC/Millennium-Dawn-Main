 CRO.conservatism: "£CRO_western_conservative (HDZ) Croatian Democratic Union"
 CRO.conservatism_desc: "(Christian Democracy) - Initially founded as a nationalist and anti-communist political party within the Socialist Republic of Croatia, the HDZ managed to win the first multiparty elections within the country. Under the early rule of the HDZ, Croatia would go on to gain independence, with the party overseeing aggressive policies of removing vestiges of communist rule and socialist economics."
 CRO.liberalism: "£CRO_western_liberal (HSLS) Croatian Social Liberal Party"
 CRO.liberalism_desc: "(Conservative Liberalism) - Among the first parties in the newly independent Croatia to espouse liberal views, the HSLS enjoyed a brief monopoly on becoming the main opposition for the ruling HDZ. However the party quickly began to move more towards the center, eventually abandoning an initial stance of social liberalism with a more moderated vision."
 CRO.socialism: "£CRO_western_social_democrat （SDP）クロアチア社会民主党"
 CRO.socialism_desc: "(Third Way) - Formed from liberal members of the former ruling League of Communists of Croatia, the Social Democratic Party of Croatia claimed lineage from not only the former commuinist party but also the long defunct Social Democratic Party of Croatia and Slavonia. It eventually went on to absorb a rival social democratic party, further moving itself away from its communist past."
 CRO.Communist-State: "£CRO_emerging_communism (SRP) Socialist Labour Party of Croatia"
 CRO.Communist-State_desc: "(Broad Left) Describing itself as a big tent left-wing organization, the SRP was formed in 1997 to capitalize on the absence of an existing prominent leftist party. Despite identifying heavily with some Ostalgic views, the party supports several aspects of the New Left and advocates for both democracy and worker self-management."
 CRO.Conservative: "£CRO_emerging_reactionary (ZZ) 人間の盾"
 CRO.Conservative_desc: "融合型ポピュリズム - 人間の盾党は、左派でも右派でもないという立場を貫き、その信条やイデオロギーにいくつかの陰謀論を取り入れた、ほぼ完全にポピュリスト的な政策綱領を掲げている。同党の実際の政策は、幅広いポピュリスト的かつやや左寄りの経済・社会政策と、ワクチン否定論やケムトレイル説への信奉などが混在している。"
 CRO.anarchist_communism: "£CRO_emerging_left_wing_radical (PH) Promijenimo Hrvatsku"
 CRO.anarchist_communism_desc: ""
 CRO.Neutral_conservatism: "£CRO_non_aligned_conservative (HDKU) Croatian Christian Democratic Union"
 CRO.Neutral_conservatism_desc: "(National Conservatism) Founded in 1992 with direct ispirations from Western European Christian Democratic parties, the HDKU ended up adopting a much more radical right-wing ideology than its more moderate counterpart in the HDZ. This fact saw it perform poorly in the first election it participated in, only participating in the National Unity government during the Croatian War for Independence."
 CRO.Neutral_Communism: "£CRO_non_aligned_communism (CA/CI) レッド・アクション/レッド・イニシアティブ"
 CRO.Neutral_Communism_desc: "マルクス・レーニン主義 - セルビア（レッド・イニシアティブ）とクロアチア（レッド・アクション）の両国で活動しており、各国で異なる名称で知られているレッド・アクション/レッド・イニシアティブは、NATOとEUの両方に反対する、主に反帝国主義を掲げる政党であると自認している。社会政策の面では、同党は進歩的な社会運動を支持しており、LGBTQコミュニティに対して積極的な支持を表明している。"
 CRO.Neutral_green: "£CRO_non_aligned_greens (HSS) クロアチア農民党"
 CRO.Neutral_green_desc: "農本主義 - 1991年に再結成されたクロアチア農民党は、1904年から1929年および1941年に禁止されるまで存在した初代クロアチア農民党の直接的な継承者であると自認している。同党は、リベラリズムや緑の政治の要素を取り入れた、より穏健な農業主義の立場を掲げており、より左寄りの政党と共にいくつかの政権に参加している。"
 CRO.Nat_Autocracy: "£CRO_nationalist_military_junta クロアチア軍"
 CRO.Nat_Autocracy_desc: "民族主義的軍事政権 - 1991年に結成されたクロアチア軍は、主にユーゴスラビア内戦の最中に組織され、セルビアに対して蜂起した複数の民兵組織と共にクロアチア独立戦争で戦った。政治への介入歴はないものの、その設立時の特殊な状況やクロアチア国内の政治情勢が、軍そのもののあり方を形作っている。"
 CRO.Nat_Fascism: "£CRO_nationalist_fascism (HCSP) クロアチア純粋権利党"
 CRO.Nat_Fascism_desc: "超国粋主義 - 1904年に結成されたクロアチア権利党の直接の後継を自称するクロアチア純粋権利党は、NATOとEUの両方に反対し、クロアチアの「自決」を求めている。さらに同党は、かつて親ドイツ派であったウスタシャを崇拝しており、幹部らが同組織の元幹部たちを称える式典に出席している。"
 CRO.Nat_Populism: "£CRO_nationalist_right_wing_populist (HSP) クロアチア権利党"
 CRO.Nat_Populism_desc: "ネオファシズム - 1929年に解散した政党の名を冠した「クロアチア権利党」は、1990年にネオファシズム政党として結成された。当初は急速な成長を遂げたが、党内の度重なる分裂、テロリズムやその他の犯罪への関与疑惑、そして指導部の失墜により、最終的には衰退した。同様の名称を冠する他の政党と同様、同党は親ドイツ派のウスタシャを崇拝し、ユーゴスラビア内戦中にクロアチア政府が行ったと見なしたセルビアとの協力に反対している。"
 CSA.conservatism: "£generic_conservatism_small 南部保守党"
 CSA.conservatism_desc: "£generic_conservatism_small 南部保守党（SCP）は、長きにわたる伝統を持つ政党であり、政治的信条の現代的な変化や、ここ数十年にわたる人口構成の変化を取り入れている。その結果、現代の民主党の残存勢力は、徹底した右翼政党というよりは、むしろ中道右派の政党としての性格を強めている。この穏健化により、分断が深まる南部共和国において、政治に関心が薄く無関心な人々を「穏健派ブロック」として取り込むことが可能となった。"
 CSA.Communist-State: "£generic_Communist_State_small 南部労働者党"
 CSA.Communist-State_desc: "£generic_Communist_State_small 南部労働者党（CWP）は、参加を認めるべきかどうかさえ議論の的となっている、極左のマイナー政党と見なされている。同党はより伝統的なマルクス主義の政策を実践しているが、南部連合の文化の中でその枠組みを確立することを目指している。この点だけでも矛盾した傾向を持つ政党であり、同党の存続を支持する人々は、この対立的な政策を、一般的な左派や社会主義系政党を分裂させる手段として利用している。"
 CSA.Conservative: "£generic_Conservative_small 南部伝統党"
 CSA.Conservative_desc: "£generic_Conservative_small 南部伝統党（STP）は、アメリカ連合国時代への回帰を望む数ある連合国系政党の一つと見なされている。しかし同党は、連合国への回帰は政府の組織形態に限られるべきであると強調している。党指導部は、旧連合が露骨な中央集権化によって崩壊したと述べ、連合規約や連邦政府が誤った点において、連合国こそが正しい道を示していたと主張している。"
 CSA.anarchist_communism: "£generic_anarchist_communism_small 革命党連合"
 CSA.anarchist_communism_desc: "£generic_anarchist_communism_small 革命党連合（URP）は、公正な社会を実現するために必要な社会主義革命を成し遂げることを目指す革命的社会主義政党である。多くの人は彼らをトロツキスト系の政党と見なしているが、党員に尋ねると、「マルクスこそが唯一の真の社会主義者であり、我々はマルクスにのみ従う」という言葉を引用する。この攻撃的で、場合によってはテロリスト的なグループを警戒する者もいるが、右派の対立勢力は、「正常」と見なされるものより左寄りのあらゆる主張の価値を貶める手段として、彼らの存在を望んでいる。"
 CSA.Caliphate: "£generic_Caliphate_small 南部イスラム国"
 CSA.Caliphate_desc: ""
 CSA.oligarchism: "£generic_oligarchism_small 経済繁栄党"
 CSA.oligarchism_desc: "£generic_oligarchism_small 経済繁栄党（PEP） という名称は、原則としてやや誤解を招きやすいものである。南部共和国内の独立した政党として自らを位置づけているが、深く掘り下げてみると、この党が大規模農業や企業経営者層の党であることがわかるだろう。しかし、同党には明確な政策綱領があり、それは規制緩和、起業支援金、補助金、そして特定の重要戦略資源の国内需要に基づいた自給自足と自由貿易のバランスの取れた政策である。"
 CSA.Nat_Populism: "£generic_Nat_Populism_small ディキシー第一党"
 CSA.Nat_Populism_desc: "£generic_Nat_Populism_small ディキシー第一党（DFP） は、アメリカ連合国を支持し、移民に強く反対する政党である。同党は、時代、技術、価値観の変化に伴い、連合国を新たな現代的なビジョンへと再構築することを目指している。同調する超保守派やオルタナ右翼の運動からは、「薄っぺらい存在」と非難されており、南部人であることの意義を明確に打ち出そうとしない姿勢が指摘されている。確かに南部アイデンティティ党よりは右寄りの立場にあるものの、「リーグ」は彼らを非難し、協力することを拒否している。"
 CSA.Nat_Fascism: "£generic_Nat_Fascism_small 南部同盟"
 CSA.Nat_Fascism_desc: "£generic_Nat_Fascism_small 南部同盟（LoS）あるいは単に「同盟」として知られるこの団体は、南部の文化とアイデンティティを守り抜くことを目指す超国家主義団体である。中道や左派の多くは、彼らをクランやホワイト・リーグのような単なるヘイトグループに過ぎないと見なしている。彼らの政策姿勢は明白であり、強硬な反移民姿勢や、彼らが守らなければならないとされるキリスト教的アイデンティティを強調する極めて社会保守的な立場をとっている。それにもかかわらず、同連盟は政治活動を行うよりも、ネーション・オブ・イスラムや強硬な社会主義政党との対立に多くの時間を費やしている。"
 CSA.Nat_Autocracy: "£generic_Nat_Autocracy_small 南部軍"
 CSA.Nat_Autocracy_desc: "£generic_Nat_Autocracy_small 南部軍（SMF）は、ディキシーの領土を守ることを目指す、極めて保守的な勢力である。軍事伝統の面では南軍支持の立場をとっており、外交政策における主な目標もディキシーの全土奪還にある。しかし、ある種のカルチャーショックとなるのは、SMFがゲイやマイノリティの軍隊への入隊、および下士官・将校への昇進を驚くほど積極的に認めている点である。外国諸国は常にSMFの真の目的を警戒しているが、今のところ彼らは友好的な態度を保っている。SMFが前進するのか、それとも古くからの悪習に逆戻りしてしまうのかは、時が経てば明らかになるだろう。"
 CUB.conservatism: "£CUB_western_conservative キューバキリスト教民主党（PDC）"
 CUB.conservatism_desc: "The Partido Democratic Cristian of Cuba was founded in 1959 and is based on the principles of Christian democracy, emphasizing social justice, human dignity and sustainable development. The party favors democratic reforms, including a multiparty system, and opposes the authoritarian Castro regime. It supports a market economy with elements of social protection, freedom of speech, equality and protection of the rights of all citizens. The party seeks peace and justice based on Christian values, calling for national reconciliation and unity"
 CUB.liberalism: "£CUB_western_liberal キューバ自由連合（ULC）"
 CUB.liberalism_desc: "The Liberal Union of Cuba, active in the early 20th century, was one of the key parties in the country's political life. The party promoted liberalism, insisting on reforms, expansion of civil liberties and respect for constitutionality. The Liberal Union supported the development of private initiative, investment, and economic modernization. Domestic policy focused on ensuring the rights and freedoms of citizens, as well as strengthening the rule of law and democratic institutions. Liberals opposed corruption and favored sustainable development, seeking to make Cuba a progressive state."
 CUB.socialism: "£CUB_western_social_democrat キューバ民主社会革命党（PSRDC）"
 CUB.socialism_desc: "Partido Social Revolutionary de Cuba, founded in the early 20th century, united the ideals of socialism and national independence. The party advocated social justice, land reform, workers' rights, and cultural development. Striving for social revolution through democratic processes, the party supported national liberation from external domination and the deepening of national sovereignty. Emphasizing the importance of education and health as the foundations for progress, the party aimed to create a society of equal opportunity and social well-being for all Cubans."
 CUB.Communist-State: "£CUB_emerging_communism （PCC）キューバ共産党"
 CUB.Communist-State_desc: "The Communist Party of Cuba is a political party of the Republic of Cuba. It is the largest party in the country. It was founded in 1965 on the principles of Marxism-Leninism, Castroism and Guevarism. It has a large role in the life of society, as well as a number of youth organizations"
 CUB.Nat_Autocracy: "£CUB_nationalist_military_junta (FAR) 革命軍"
 CUB.Nat_Autocracy_desc: "キューバ革命軍は、キューバの軍事組織である。これには、革命陸軍、革命海軍、革命空軍・防空軍のほか、地域民兵、青年労働軍、防衛生産旅団などの準軍事組織、さらに民間防衛機構および国家予備役機構が含まれる。"
 CYP.conservatism: "£CYP_western_conservative (DISY) 民主運動党"
 CYP.conservatism_desc: ""
 CYP.liberalism: "£CYP_western_liberal (EDI) 民主同盟"
 CYP.liberalism_desc: ""
 CYP.socialism: "£CYP_western_social_democrat (EDEK) EDEK社会党"
 CYP.socialism_desc: ""
 CYP.Western_Autocracy: "£CYP_western_autocrat (DIKO) 民主党"
 CYP.Western_Autocracy_desc: ""
 CYP.Communist-State: "£CYP_emerging_communism (AKEL) 労働者進歩党"
 CYP.Communist-State_desc: ""
 CYP.Neutral_conservatism: "£CYP_non_aligned_conservative (KA) 連帯運動"
 CYP.Neutral_conservatism_desc: ""
 CYP.neutral_Social: "£CYP_neutral_Social (SYPOL) 市民同盟"
 CYP.neutral_Social_desc: ""
 CYP.Neutral_Communism: "£CYP_Neutral_Communism (ADISOK) 革新民主社会主義運動"
 CYP.Neutral_Communism_desc: ""
 CYP.Neutral_green: "£CYP_Neutral_green (KOSP) 環境運動 - 市民協力"
 CYP.Neutral_green_desc: ""
 CYP.Nat_Autocracy: "£CYP_Nat_Autocracy キプロス国家警備隊"
 CYP.Nat_Autocracy_desc: ""
 CYP.Nat_Fascism: "£CYP_nationalist_fascism 国民人民戦線（ELAM）"
 CYP.Nat_Fascism_desc: ""
 CZE.conservatism: "£CZE_western_conservative 市民民主党 （ODS）"
 CZE.conservatism_desc: "The Civic Democratic Party is a conservative and Eurosceptic political party in the Czech Republic. The party sits centre-right to right-wing on the political spectrum.Founded in 1991 as the pro-free market wing of the Civic Forum by Václav Klaus and modeled on the British Conservative Party, the ODS won the 1992 legislative election, and has remained in government for most of the Czech Republic's independence."
 CZE.liberalism: "£CZE_western_liberal 自由同盟 - 民主同盟 （US-DEU）"
 CZE.liberalism_desc: "The Freedom Union-Democratic Union was a small pro-European liberal political party in the Czech Republic from 1998 to 2011. The Freedom Union was founded in January 1998 by former members of the Civic Democratic Party who were unhappy with the leadership of Václav Klaus. After initially serving in a caretaker government, Freedom Union went into opposition after the 1998 election. In opposition, Freedom Union merged with the Democratic Union, and formed an alliance with the Christian Democratic Union - Czechoslovak People's Party (KDU-ČSL)."
 CZE.socialism: "£CZE_western_social_democrat チェコ社会民主党 （ČSSD）"
 CZE.socialism_desc: "Social Democratic Party is a social-democratic political party, sitting on the centre-left of the political spectrum and holding pro-European views. The party originates from the Social Democratic Czechoslavonic party in Austria (Czech: Sociálně Demokratická strana Českoslovanská v Rakousku), which was a political group founded on 7 April 1878 in Austria-Hungary as a regional wing of the Social Democratic Party of Austria."
 CZE.Communist-State: "£CZE_emerging_communism チェコ・モラビア共産党 （KSČM）"
 CZE.Communist-State_desc: "The Communist Party of Bohemia and Moravia is a communist party. Sources variously describe the party as either left-wing or far-left on the political spectrum. It is one of the few former ruling parties in post-Communist Central Eastern Europe to have not dropped the Communist title from its name, although it has changed its party program to adhere to laws adopted after 1989. It was previously a member party of The Left in the European Parliament - GUE/NGL in the European Parliament, and an observer member of the European Left Party, but is now unaffiliated."
 CZE.Conservative: "£CZE_emerging_reactionary (NS) 国民党"
 CZE.Conservative_desc: "国民党は極右の民族主義政党である。同党はチェコの欧州連合加盟に強く反対している。その主な目標は、外国の機関の影響力を最小限に抑えることで完全な国家主権を回復すること、および移民政策を厳格化することである。"
 CZE.Autocracy: "£CZE_Autocracy 国民統一"
 CZE.Autocracy_desc: "国民統一は、2002年6月3日にザクピで結党大会を開いた、チェコの小さな民族主義政党である。党首はマルティン・チェイカである。2014年に保守社会運動に名称変更したが、これは1934年にチェコスロバキアで結成された政党でも使用されていた名称である。"
 CZE.Neutral_conservatism: "£CZE_non_aligned_conservative キリスト教民主連合 - チェコスロバキア人民党 （KDU-ČSL）"
 CZE.Neutral_conservatism_desc: "Christian and Democratic Union - Czechoslovak People's Party, often shortened to lidovci ('the popular ones'), is a Christian-democratic political party in the Czech Republic. The party has taken part in almost every Czech government since 1990. After the German occupation of Czechoslovakia, Šrámek served as head of Czechoslovak government in exile (in the United Kingdom). After 1945, ČSL was part of the national unity government, forming its most right-wing section. It's the most chrisianic party in the Czech Republic, standing for christian democracy and social conservatism."
 CZE.neutral_Social: "£CZE_neutral_Social チェコ国民社会党 （ČSNS）"
 CZE.neutral_Social_desc: "Czech National Social Party is a civic nationalist political party in the Czech Republic, that once played an important role in Czechoslovakia during the interwar period. It was established in 1897 by break-away groups from both the national liberal Young Czech Party and the Czech Social Democratic Party, with a stress on achieving independence of the Czech lands from Austria-Hungary. Its variant of socialism was moderate and reformist rather than a Marxist one. After the National Labour Party dissolved and merged with National Socialists in 1930, the party also became the refuge for Czech liberals. Its best-known member was Edvard Beneš, a co-founder of Czechoslovakia and the country's second President during the 1930s and 1940s. Despite the similar name, the Czech 'National Socialists' were not affiliated with Nazism or the German Nazi Party."
 CZE.Neutral_Libertarian: "£CZE_non_aligned_libertarian 自由改革党 （LiRA）"
 CZE.Neutral_Libertarian_desc: "自由改革党は、自由市場主義を掲げる小規模な古典的自由主義政党である。"
 CZE.Neutral_Communism: "£CZE_Neutral_Communism (SDS) 民主社会主義党"
 CZE.Neutral_Communism_desc: "民主社会主義党は、チェコ共和国の民主社会主義政党で、欧州左翼党の創設メンバーの一つであった。現在の党名は1997年12月から使用されている。これは1997年6月に民主左翼党と左翼ブロックが統合して結成されたものである。当初、同党はLB-SDLという名称であった。"
 CZE.Neutral_Muslim_Brotherhood: "£CZE_Neutral_Muslim_Brotherhood (UMO) ムスリム宗教コミュニティ"
 CZE.Neutral_Muslim_Brotherhood_desc: "ムスリムコミュニティ本部は、チェコ共和国のムスリムを結束させる組織である。近代チェコの歴史におけるムスリムコミュニティの最初の痕跡は、オーストリア＝ハンガリー帝国統治時代の末期、すなわち1908年に遡ることができる。当時、オーストリア＝ハンガリー帝国は30年にわたる占領を経て、ボスニア・ヘルツェゴビナを正式に併合し、ハナフィー派のスンニ派イスラム教を次の国教として宣言し、それに伴うあらゆる法的効力を生じさせた。当時のコミュニティの中核はボスニア系ムスリムであり、第一次世界大戦中には、主にイスラム諸国での戦闘参加中にイスラム教を受け入れた、最初のチェコ系ムスリムたちも加わった。こうしてチェコのイスラム運動が形成され、さらに新しく成立したソビエト連邦からの移民によってより「豊か」なものとなった。"
 CZE.Neutral_green: "£CZE_Neutral_green (SZ) 緑の党"
 CZE.Neutral_green_desc: "緑の党は、チェコ共和国の環境保護を掲げる政党である。"
 CZE.Nat_Autocracy: "£CZE_Nat_Autocracy チェコ共和国軍"
 CZE.Nat_Autocracy_desc: "緑の党は、ビロード革命を経てチェコが自由民主主義体制に復帰した1990年に結成された。同党は、平和主義（外国の軍事勢力がチェコ共和国に軍事基地を置くべきではないという立場）と、国内における草の根民主主義のさらなる定着を掲げて活動している。"
 CZE.Nat_Populism: "£CZE_Nat_Populism (SPR-RSČ) 共和国連盟 - チェコスロバキア共和党"
 CZE.Nat_Populism_desc: "共和国連盟 - チェコスロバキア共和党は、EU、NATO、移民に強く反対する小政党である。同党とその党首ミロスラフ・スラデクは、ロマ（ジプシー）やドイツ人に対する過激な姿勢（反ジプシー主義）で特に知られている。同党は1989年12月30日、ポスト共産主義時代のチェコスロバキアで最初に結成された政党の一つとして発足した。1996年のチェコ議会選挙では得票率8％を記録してピークを迎えたが、その後は衰退し、2001年には財務上の不正（具体的には、党首が党資金を横領し、自身の贅沢な生活費に充てていたこと）を理由に解散した。"
 DEN.conservatism: "£DEN_western_conservative Det Konservative Folkeparti"
 DEN.conservatism_desc: "Det Konservative Folkeparti (Conservative People's Party) is the leading centre-right political party of Denmark. Founded in 1916, the party stands for individual freedoms and responsibility, a free market economy, maintaining the welfare state, cooperation with the European Union and ensuring Denmark's national history and traditions are upheld. The party also supports and highlights environmentalism as a core philosophy in accordance with green conservatism."
 DEN.liberalism: "£DEN_western_liberal Venstre"
 DEN.liberalism_desc: "Venstre, Danmarks Liberale Parti (Left, Denmark's Liberal Party) is a conservative-liberal, agrarian party in Denmark. It was founded in 1910 as part of a peasants' movement against the landed aristocracy and espouses an economically liberal, pro-free market ideology. It is the major party of the centre-right in Denmark and is the second-largest party in the country. The modern party follows a classic liberal doctrine and takes a firm stance on immigration. The party is quoted as stating that 'immigrants should learn Danish and understand and respect Danish culture and traditions.'"
 DEN.socialism: "£DEN_western_social_democrat  デンマーク社会民主党"
 DEN.socialism_desc: "Socialdemokratiet (Social Democrats) is the largest political party in Denmark and is the leading social democratic party in the country. Founded in 1871 it has consistently had the largest representation in the Folketing since the early 20th century. The party paved the way for the creation of the Danish Welfare State and constantly seeks to expand on the concept. It has adopted a number of left-leaning economic policies and a growing group within the party is becoming increasingly skeptical of mass immigration and economic globalisation with them being quoted as stating 'mass immigration and the free movement of labour is paid for by the lower classes.'"
 DEN.Communist-State: "£DEN_emerging_communism デンマーク共産党"
 DEN.Communist-State_desc: "Danmarks Kommunistiske Parti (Communist Party of Denmark) is the Marxist-Leninist party of Denmark. The party was founded in 1919 as the Left-Socialist Party Party of Denmark before it renamed itself to its current name. The party supports the transition of Denmark to a communist society."
 DEN.anarchist_communism: "£DEN_anarchist_communism Enhedslisten"
 DEN.anarchist_communism_desc: "Enhedslisten (Red-Green Alliance) is an eco-socialist party in Denmark founded in 1989 with the merger of three Marxist parties and it is the furthest left-wing party in the Danish parliament. The party campaigns on socialist and democratic grassroots party which claim to also represent green politics, peace movements, anti-discrimination, and the trade union movement."
 DEN.Neutral_conservatism_desc: "The Centrum-Demokraterne is a party that´s ideology was a mix of centrism, social democracy, and liberal conservatism. The party was formed in 1973 by Erhard Jakobsen, a former MP and mayor of Gladsaxe, as a centrist splinter group from the Danish Social Democrats"
 DEN.Neutral_Libertarian: "£DEN_non_aligned_libertarian ラディケーリ"
 DEN.Neutral_Libertarian_desc: "ラディケーリ（デンマーク語：Radikale Venstre, 急進左翼、英語：Danish Social Liberal Party, デンマーク社会自由党）は、1905年にヴェンスタ改革党から分裂して結成された。同党は、中道および社会自由主義を掲げて活動している。"
 DEN.Neutral_green: "£DEN_Neutral_green オルタナティブ"
 DEN.Neutral_green_desc: "オルタナティヴ（デンマーク語：Alternativet）は、デンマークの環境政党である。同党は2013年、環境政策、本格的な気候変動対策、そして起業家精神を理念の基盤として公に発足した。設立当初は完全な政策綱領を持っていなかったが、「政治実験室」と呼ばれる取り組みを通じて、クラウドソーシングによる政策提案によって党が成長・発展していくことを目指していた。"
 DEN.neutral_Social: "£DEN_neutral_Social Socialistisk Folkeparti"
 DEN.neutral_Social_desc: "Socialistisk Folkeparti (Green Left) is a democratic socialist party in Denmark. The party was founded in 1959 as a split from the Danmarks Kommunistiske Parti (Communist Party of Denmark) due to the founder's critique of the Soviet intervention in the Hungarian Revolution of 1956. It sought to combine the United States-oriented social democracy and Soviet Union-oriented communism to combine democracy with socialism. It campaigns on the ideological base of socialism inspired by green politics and democratic socialism. It sees the democratic-socialist Denmark as the end goal of its politics. It is a strong supporter of feminism, human rights, minority rights, and democracy."
 DEN.Nat_Autocracy: "£DEN_Nat_Autocracy デンマーク王立軍"
 DEN.Nat_Autocracy_desc: "デンマーク王立陸軍（デンマーク語：Hæren）は、デンマーク国防軍における陸上部隊であり、デンマーク国民防衛隊と共に、同国防軍の主要な防衛・攻撃部隊を構成している。1614年に創設され、その歴史を通じて数多くの軍事紛争に参加してきた。"
 DEN.Nat_Fascism: "£DEN_Nat_Fascism 進歩党"
 DEN.Nat_Fascism_2017: "£DEN_Nat_Fascism_alt ストラム・クルス"
 DEN.Nat_Fascism_desc: "進歩党（デンマーク語：Fremskridtspartiet）は1972年、モーゲンス・グリストラップによって設立された。同党は、所得税の廃止、官僚主義と「法のジャングル」の抜本的な削減、国境と国境管理体制の回復、移民の即時停止とデンマーク国籍の付与停止、統合政策への反対、そして欧州連合におけるデンマークの立場の段階的な縮小といった政策を掲げて選挙運動を展開した。1970年代、グリストラップがデンマークの生放送番組で「自分は所得税を支払っていない」と発言したことが話題となり、進歩党は支持を大幅に拡大した。"
 DEN.Nat_Populism: "£DEN_Nat_Populism デンマーク人民党"
 DEN.Nat_Populism_desc: "デンマーク人民党（デンマーク語：Dansk Folkeparti）は、デンマークを代表する民族主義・右派ポピュリスト政党である。1995年に進歩党の元党員らによって結成された。同党は、反移民を掲げ、デンマーク国民の自由と文化的遺産を守り、起業家精神と経済成長を促進することを公約としている。また、欧州連合に対してデンマークの主権を守ることも目指している。同党の経済政策は中道から中道左派に近い位置にあり、デンマーク社会において独特の存在感を放っている。一方で、断固とした反移民の姿勢により、デンマークの政治スペクトル上では、民族主義的かつ右派ポピュリストの立場にしっかりと位置づけられている。"
 DEN.Monarchist: "£DEN_nationalist_monarchist グリュックスブルク家"
 DEN.Monarchist_desc: "グリュックスブルク家は、ドイツのオルデンブルク家の分家であり、現在はデンマークの女王マルグレーテ2世が率いている。この家は、1863年以来、途切れることのない継承でデンマーク王国の王朝の血統を保持している。"
