 eu_president_commission_tip: "§YPrerequisites:§!\n[!eu_president_commission_back_click_enabled]"
 eu_president_council_tip: "§YPrerequisites:§!\n[!eu_president_council_back_click_enabled]"
 EU_recently_retired_from_an_eu_office_tt: "§Y[ROOT.GetNameWithFlag]§! ist kürzlich nicht aus einem EU-Amt ausgeschieden (Tage bis neues Amt: [?recently_retired_from_an_eu_office:days_left|Y0])\n"
 EU_does_not_hold_another_office_tt: "§Y[ROOT.GetNameWithFlag]§! bekleidet derzeit kein anderes Amt der §C[EUU.GetFlag][EUU.GetName]§!\n"
 EU_president_council_tt: "Der §YPräsident des Europäischen Rates§! leitet die Arbeit des Europäischen Rates, der aus siebenundzwanzig Staats- und Regierungschefs und einem Hauptvertreter der §C[EUU.GetFlag][EUU.GetName]§! auf der Weltbühne besteht. Die Institution umfasst das Kollegium der Staats- und Regierungschefs und den Präsidenten der Europäischen Kommission und gibt der gesamten EU politische Richtung.\n\n§YVorteile des Amtes:§!\nDieses Amt erlaubt es, Gesetzesvorschläge ohne Einflusskosten zur Abstimmung zu bringen.\n\nErhöht die Erfolgsquote pro-europäischer und euroskeptischer Kampagnen um §G+10%§!\n\n[!eu_president_council_back_click]\n"
 EU_president_council_unlocks_tt: "Der §YVertrag von Lissabon§! hat das Amt des §YPräsidenten des Europäischen Rates§! geschaffen"
 eu_president_commission_tt: "Der §YPräsident der Europäischen Union§! ist das Oberhaupt der Exekutive der §C[EUU.GetFlag][EUU.GetName]§!. Er leitet das Kollegium der Kommissare, das dem Europäischen Parlament rechenschaftspflichtig ist, und hat die Befugnis, Ressorts zu verteilen, umzustrukturieren oder Kommissare zu entlassen. Nur die Kommission darf Gesetzesvorschläge einbringen.\n\n§YVorteile des Amtes:§!\nDieses Amt erlaubt es, Gesetzesvorschläge ohne Einflusskosten zur Abstimmung zu bringen.\n\nErhöht die Erfolgsquote pro-europäischer und euroskeptischer Kampagnen um §G+10%§!\n\nErlaubt das Suspendieren von Mitgliedstaaten bei mehr als drei Verstößen – unabhängig vom Einfluss.\n\n[!eu_president_commission_back_click]\n"
 EU_high_representative_tt: "The §YHigh Representative of the Union for Foreign Affairs and Security Policy§! is the chief coordinator and representative of the Common Foreign and Security Policy (CFSP) within the European Union. The title is often shortened to the EU Foreign Minister and they primarily coordinate foreign policy on behalf of member states.\n\n§YPerks of the Office:§!\n\n[!foreign_affairs_security_back_click]\n"
 EU_high_representative_unlocks_tt: "Der §YEuropäische Auswärtige Dienst§! hat das Amt des §YPräsidenten des Europäischen Parlaments§! geschaffen"
 EU_president_european_parliament_tt: "Der §YPräsident des Europäischen Parlaments§! leitet Debatten und Aktivitäten des Parlaments, vertritt es rechtlich und außenpolitisch und unterzeichnet den Haushalt der §C[EUU.GetFlag][EUU.GetName]§! sowie gemeinsame Rechtsakte. Die Amtszeit beträgt zweieinhalb Jahre.\n\n§YVorteile des Amtes:§!\nDieses Amt erlaubt es, Gesetzesvorschläge ohne Einflusskosten zur Abstimmung zu bringen.\n\nErhöht die Erfolgsquote pro-europäischer und euroskeptischer Kampagnen um §G+10%§!\n\n[!eu_parliament_president_back_click]\n"
 eu_parliament_president_unlocks_tt: "Der §YVertrag von Lissabon§! hat das Amt des §YPräsidenten des Europäischen Parlaments§! geschaffen"
 EU_central_bank_president_tt: "Der §YPräsident der Europäischen Zentralbank§! leitet die EZB, die das Euro-Management und die Geldpolitik der Eurozone verantwortet. Er führt das Direktorium, den EZB-Rat und den erweiterten Rat und vertritt die Bank international.\n\n§YVorteile des Amtes:§!\nErlaubt das Starten, Anpassen oder Reduzieren des OMT-Programms zur vorübergehenden Zinssenkung für Mitgliedstaaten mit hohen Zinsen.\n\n[!eu_central_bank_president_back_click]\n"
 EU_central_bank_idea_president_tt: "Verändert $investment_cost_modifier$ und $investment_duration_modifier$ um §G15%§! für Investitionen in §CEU-Mitgliedstaaten§!\n"
 EU_ministry_of_economy_and_finance_tt: "Der §YEU-Wirtschafts- und Finanzminister§! leitet die europäische Wirtschaftsregierung und hat Zuständigkeiten durch die Fiskalunion. Er ist verantwortlich für Steuerbehörden, Mindestlöhne und wirtschaftspolitische Entscheidungen.\n\n§YVorteile des Amtes:§!\n\nErlaubt es dem Inhaber, Haushaltsentwürfe jederzeit auf die Tagesordnung des Parlaments zu setzen – ohne Einflusskosten.\n\n[!eu_minister_economy_finance_back_click]\n"
 EU_ministry_of_economy_and_finance_idea_tt: "Verändert $investment_cost_modifier$ und $investment_duration_modifier$ um §G5%§! für Investitionen in §CEU-Mitgliedstaaten§!\n"
 EU_ministry_of_economy_and_finance_unlocks_tt: "Das Amt des §YEU-Wirtschafts- und Finanzministers§! wurde geschaffen"
 EU_frontex_director_tt: "Der §YFrontex-Exekutivdirektor§! leitet die EU-Grenz- und Küstenwache (Frontex). Ziel ist die Unterstützung der Mitgliedstaaten beim Schutz der Außengrenzen und die Kontrolle des Schengen-Raums.\n\n§YVorteile des Amtes:§!\n\nErlaubt vorübergehende Kontrolle über Frontex-Einheiten.\n\n[!eu_frontex_director_back_click]\n"
 EU_frontex_director_unlocks_tt: "Die §YEuropäische Grenz- & Küstenwache§! hat das Amt des §YFrontex-Direktors§! geschaffen"
 EU_sec_general_euro_army_tt: "Der §YGeneralsekretär der EuroArmy§! leitet die kombinierten Streitkräfte der EU-Mitgliedstaaten.\n\n§YVorteile des Amtes:§!\n\nErlaubt vorübergehende Kontrolle über die EuroArmy.\n[!eu_sec_general_euro_army_back_click]\n"
 EU_sec_general_euro_army_unlocks_tt: "Die §YEuroArmy§! hat das Amt des §YGeneralsekretärs der EuroArmy§! geschaffen"
 EU_sec_general_euro_navy_tt: "Der §YGeneralsekretär der EuroNavy§! leitet die gemeinsame Seestreitkraft der EU.\n\n§YVorteile des Amtes:§!\n\nErlaubt Kontrolle über Flotten der Mitgliedstaaten und deren Vereinigung zur europäischen Flotte.\n[!eu_sec_general_euro_navy_back_click]\n"
 EU_sec_general_euro_navy_unlocks_tt: "Die §YEuroNavy§! hat das Amt des §YGeneralsekretärs der EuroNavy§! geschaffen"
 EU_ambassador_to_un_tt: "The §YAmbassador of the Union to the United Nations§! represents the European Union at the United Nations, working in coordination with diplomatic missions of all the European Union member states.\n\n§YPerks of the Office:§!\nHolding this office grants the holder nation the Permanent Member of the UNSC national spirit.\n\n[!eu_ambassador_to_un_back_click]\n"
 EU_ambassador_to_un_unlocks_tt: "Das §YStändige Mitglied des UNSC§! hat das Amt des §YEU-Botschafters bei den Vereinten Nationen§! geschaffen"
 EU_president_of_the_eurofederation_tt: "Der §YPräsident der Europäischen Föderation§! ist das gewählte Oberhaupt dieser föderalen Struktur – eine der Endstufen der EU-Integration und eine sehr mächtige Position.\n\n§YVorteile des Amtes:§!\n\n[!eu_pres_federation_back_click]\n"
