 POL_KORWIN_PE_DESC: "폴란드는 실수정치연합(UPR)을 지지하고, 코르빈으로 승리한 뒤, 우크라이나를 나토(NATO)에 가입시키고 폴란드-리투아니아 연방을 개혁할 것입니다."
