 md_alert_tooltip: "[Get_md_alert_name]"
 md_alert_desc: "[Get_md_alert_description]\n\n£click_right §YR Click§!: dismiss this alert permanently.\n£key_shift + £click_left §YShift L Click§!: restore all dismissed alerts."
 md_negative_nuclear_fuel: "§RNuclear Fuel Deficit§!"
 md_negative_expected_social_spending: "§RSocial Spending Shortfall§!"
 md_negative_expected_healthcare_spending: "§RHealthcare Spending Shortfall§!"
 md_negative_expected_administrative_spending: "§RAdministrative Spending Shortfall§!"
 md_negative_expected_education_spending: "§REducation Spending Shortfall§!"
 md_negative_expected_police_spending: "§RPolice Spending Shortfall§!"
 md_negative_expected_defense_spending: "§RDefense Spending Shortfall§!"
 md_negative_eletricity: "§REnergy Deficit§!"
 md_available_tech_slot_expansion: "§YResearch Slot Available§!"
 md_negative_nuclear_fuel_Desc: "Vos réacteurs nucléaires consomment plus de combustible qu'ils n'en produisent. Accédez à l'onglet Construction pour gérer votre énergie."
 md_negative_expected_social_spending_Desc: "Vos lois sociales actuelles ne répondent pas aux attentes de votre population. Rendez-vous dans l'onglet Politique pour augmenter les dépenses sociales."
 md_negative_expected_healthcare_spending_Desc: "Votre législation actuelle en matière de santé ne répond pas aux attentes de la population. Rendez-vous dans l'onglet Politique pour augmenter les dépenses de santé."
 md_negative_expected_administrative_spending_Desc: "Votre administration actuelle ne répond pas aux attentes de la population. Rendez-vous dans l'onglet Politique pour augmenter les dépenses administratives."
 md_negative_expected_education_spending_Desc: "Votre législation actuelle en matière d'éducation ne répond pas aux attentes de la population. Rendez-vous dans l'onglet Politique pour augmenter les dépenses d'éducation."
 md_negative_expected_police_spending_Desc: "Votre budget policier actuel est inférieur aux attentes de la population. Rendez-vous dans l'onglet Politique pour augmenter les dépenses policières."
 md_negative_expected_defense_spending_Desc: "Vos dépenses militaires actuelles sont inférieures aux attentes de votre population. Rendez-vous dans l'onglet Politique pour augmenter les dépenses de défense."
 md_negative_eletricity_Desc: "Votre production énergétique actuelle ne couvre pas la demande totale. Accédez à l'onglet Construction pour construire des centrales électriques supplémentaires ou ajuster votre consommation d'énergie."
 md_available_tech_slot_expansion_Desc: "Votre PIB ou PIB par habitant a suffisamment progressé pour débloquer un nouvel emplacement de recherche. Ouvrez l'onglet Technologie et cliquez sur le bouton Emplacements de recherche £topbar_research  pour le réclamer."
 md_idle_nuclear_reactors: "§RRéacteurs nucléaires inactifs§!"
 md_idle_nuclear_reactors_Desc: "Vous avez construit des réacteurs nucléaires, mais votre statut nucléaire actuel est réglé sur « Énergie non nucléaire », ce qui les laisse inactifs. Passez à l'option « Énergie nucléaire » (ou à un statut supérieur) dans l'onglet « Politique » pour commencer à produire de l'énergie nucléaire."