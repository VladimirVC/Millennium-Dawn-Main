 PHI.conservatism: "£PHI_conservatism (Lakas–CMD) ラカス・クリスチャン・ムスリム民主主義党"
 PHI.conservatism_desc: "保守主義 - Lakas-CMDはキリスト教民主主義とイスラム民主主義の理念に基づき設立された中道右派政党である。同党は一貫してアメリカとの強固な関係構築を追求し、経済成長と発展に重点を置いている。また、イスラム教指導者を同盟に包含する点で独自性を持ち、憲法改正を通じて大統領制から議会制政府への移行を目指す。\n"
 PHI.liberalism: "£PHI_liberalism (LP) 自由党"
 PHI.liberalism_desc: "自由主義 - 自由党（フィリピン語：Partido Liberal ng Pilipinas）\n\n自由党は、国民党から離脱した初代大統領マヌエル・ロハス含む自由主義派によって設立された。自らが掲げる「バヤニハン」すなわち「自由、正義、連帯」という哲学を理念とし、これが共通の思想となっている。また、同党は歴史的にアメリカとの関係維持に関心を持ち続け、中国に対しては慎重な姿勢を示してきた。\n"
 PHI.socialism: "£generic_socialism_small (Akbayan) アクバヤン市民行動党"
 PHI.socialism_desc: "社会民主主義 - アクバヤン市民行動党は民主社会主義的かつ進歩主義的な政党であり、共産党と結びついていない民主的左派の主要勢力として知られる。両極端に対する彼らの批判的立場ゆえに、過激派右派と極左双方の標的となってきた。\n"
 PHI.Communist-State: "£generic_Communist_State_small (CPP) フィリピン共産党"
 PHI.Communist-State_desc: "共産主義 - フィリピン共産党（フィリピン語：Partido Komunista ng Pilipinas）\n\nフィリピン共産党は1968年の結成以来、政府に対してゲリラ戦を展開してきた。マルクス・レーニン主義・毛沢東主義に基づく独自の共産主義を掲げると同時に、フィリピン社会のために各イデオロギーの優れた部分を統合している。\n"
 PHI.anarchist_communism: "£PHI_anarchist_communism (PDP) フィリピン民主党"
 PHI.Neutral_conservatism: "£PHI_Neutral_conservatism (LDP) 民主的フィリピン人の闘い"
 PHI.Neutral_conservatism_desc: "中道保守主義 - 民主的フィリピン人の闘い（フィリピン語：Laban ng Demokratikong Pilipino）\n\n民主的フィリピン人の闘いは、フィリピンの現状維持を目的とし、減税など複数の政策を提唱する保守政党である。同党の理念は、経済的には自由主義的でありながら社会的には保守的であると要約できる。フィリピンにおける家族単位への固有の重視を基盤とし、離婚や中絶など、キリスト教原理主義的価値観に合致する社会政策に反対している。\n"
 PHI.neutral_Social: "£PHI_neutral_social (Aksyon) 民主行動"
 PHI.neutral_Social_desc: "中道社会主義 - 民主行動（フィリピン語：Aksyon Demokratiko）\n\n民主行動は地域主義的アプローチによる政府運営の確立を目指す進歩主義的政党である。同党は各地域が独自の解決策を有すると確信している。また、教育水準の低さといったフィリピン政府内の重要課題に焦点を当てつつ、安定した成長を維持しながら環境問題に取り組むことを目指している。\n"
 PHI.Nat_Populism: "£PHI_Nat_Populism (NP) 国民党"
 PHI.Nat_Populism_desc: "右派ポピュリスト - 国民党（フィリピン語：Nacionalista Party）\n\n国民党はフィリピン最古の政党の一つである。1978年までフィリピン民族主義に基づく国家主義的方針を維持していたが、その後より穏健な形態へと移行する伝統を築いた。自由党や進歩党に強く反対する立場から、伝統主義を強調しようとする右派ポピュリスト集団としての厳格な姿勢を堅持している。\n"
