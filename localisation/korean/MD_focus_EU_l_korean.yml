 EUvote.1.t: "유럽연합 의회 투표 시작됨"
 EUvote.1.d: "유럽연합 의회가 투표를 위한 법안을 제출했습니다! 법안을 검토하거나 통과시키려면 유럽 연합 의회 섹션을 확인하세요."
 EUvote.1.a: "투표소로 가자!"
 EUvote.2.t: "유럽연합 이사회 투표가 시작됨"
 EUvote.2.d: "유럽연합 이사회가 새로운 법안에 대한 투표를 시작했습니다! 유로 투표 섹션을 확인하여 투표하고 다른 국가에 영향을 미치세요!"
 EUvote.2.a: "투표장으로 가자!"
 EUU_idea_gdpr: "일반 데이터 보호 규정"
 EUU_idea_gdpr_desc: "§Y일반 데이터 보호 규정§!(GDPR)은 유럽연합 및 유럽 경제 지역(EEA)내의 정보 보호에 관한 유럽연합 규정입니다. 유럽연합의 개인정보 보호, 인권법과 특히 §Y유럽연합 기본권 헌장§! 제8조 1항을 구성하는 중요 요소로 간주됩니다. 규정의 주 목표는 개인정보 보호와 개인의 자기 개인정보 통제권을 강화하고 국제 비즈니스 목적의 규제를 간소화 하는 것입니다."
 foreign_data_kraken: "크라켄 해외 데이터"
 foreign_data_kraken_desc: "크라켄 해외 데이터는 일반 데이터 보호 규정 이전의 법률 모음입니다. 이 법률 모음들은 장기적으로 유럽연합 회원국들의 안보에 해가 되는 여러가지 구멍과 허점이 존재 합니다."
 EU_copyright: "디지털 단일 시장의 저작권에 관한 지침"
 EU_copyright_desc: "§Y디지털단일시장의 저작권에 관한 지침§!은 저작권 시장이 원활하게 작동하도록 하기 위해 채택한 유럽연합의 지침입니다. 본 지침은 유럽연합의 저작권법을 확장함과 동시에 단일 디지털 시장으로 확대 적용합니다."
 asylum_shopping: "이민 쇼핑 (Asylum Shopping)"
 asylum_shopping_desc: "전세계에서 오는 망명 신청자들이 가장 유리한 망명 국가를 찾기 위해 유럽연합을 계속 돌아다니고 있습니다. 이는 유럽연합 전체에서 관료적 낭비를 초래하고 있으며 가능한 한 빨리 해결책을 모색해야 할 문제입니다."
 relocation_asylum_seekers: "난민 신청자의 이주 및 정착"
 relocation_asylum_seekers_desc: "우리는 압도적인 이민자들의 숫자를 감소하기 위해 망명 신청자들을 이주시키고 재정착 시키는 조치를 취해왔습니다. 이제는 증가하는 이민자와 망명 신청자 문제에 대한 영구적인 해결책을 찾아야 합니다."
 EU_Turkey_deal: "유럽연합 – 터키 협상"
 EU_Turkey_deal_desc: "유럽연합-터키 협상은 터키에서 그리스 섬으로 비정기적으로 이동하는 사람들을 억제하기 위한 것이었습니다. 유럽연합으로의 불법 이민을 억제하기 위한 기념비적 협상이었지만, 망명 신청자들의 흐름을 억제할 수 있을진 미지수입니다."
 European_Asylum_Agency: "유럽 망명 지원 기구"
 European_Asylum_Agency_desc: "§Y유럽망명지원기구§!는 유럽연합 회원국간 망명에 관한 협력을 강화하고, 유럽공동망명시스템의 이행을 개선하며, 망명 신청자들로 압박 받는 회원국을 지원하기 위한 유럽연합내 기구입니다."
 Frontex: "유럽 대외 국경 관리 협력 기관 (Frontex)"
 Frontex_desc: "유럽 국경 및 해안경비대, 일반적으로는 프론텍스(Frontex)로 알려진 이 기관은 유럽연합내 기구입니다. 프론텍스는 회원국들의 국경 및 해안경비대와 협력해 유럽 셍겐지역의 국경 통제를 수행합니다."
 EU_commission_president: "유럽 집행위원회 위원장"
 EU_commission_president_desc: "§Y유럽연합 집행위원회 위원장§!은§C[EUU.GetFlag][EUU.GetName]§!의 행정부 수반입니다. 위원장은 위원회의 집행위원들로 구성된 내각을 이끌며, 유럽연합에 대해 공동책임을 집니다. 위원회는 줄여서 집행위라고도 합니다. 또한, 집행위원장은 필요에 따라 이들 위원들에 대한 개각을 단행하거나 해임할 수 있는 권한이 있습니다. 집행위원회는 유럽연합의 법률이 될 법안을 제안할 수 있는 유일한 기관입니다."
 EU_council_president: "유럽연합 정상회의 상임의장"
 EU_council_president_desc: "§Y유럽연합 정상회의 상임의장§!은 27개국 회원국 정상 가운데 §C[EUU.GetFlag][EUU.GetName]§!로 구성되며 국제무대에서 유럽연합 정상들의 대표로 활동하며, 유럽연합 의회의 업무를 주재하고 추진합니다. 기관은 유럽연합 각국의 국가원수들과 유럽연합 집행위원회 위원장으로 구성되며 유럽연합 전체의 정치적 방향성을 제시합니다."
 EU_parliament_president: "유럽 의회 의장"
 EU_parliament_president_desc: "§Y유럽의회 의장§!은 유럽의회의 활동과 토론을 주재합니다. 의장은 또한, 모든 법적문제, 대외관계, 특히 국제 관계에서 유럽의회를 대표합니다. 의장의 임기는 2년 6개월이며, 공동 의결 절차에 따라 채택된 모든 유럽연합 법률과 예산안에 의장의 서명을 필요로 한다는 특징을 가집니다."
 frontex_ExDir: "유럽 대외 국경 관리 협력 기관 (Frontex) 상임 이사"
 frontex_ExDir_desc: "The §YFrontex Executive Director§! presides over the European Border and Coast Guard Agency (commonly known as Frontex). The purpose of Frontex is to support European Union member states on the ground in their efforts to protect external European Borders. It also exercises border control over the Schengen area to assist with the area of freedom, security and justice domain."
 European_Defence_Fund: "유럽방위기금"
 European_Defence_Fund_desc: "§Y유럽방위기금§!은 유럽연합 공동 안보 및 방위 정책(CSDP)의 부분 중 하나로, CSDP는 유럽연합 회원국 군대간의 국방연구 및 상호 운용성에 대한 국가 투자를 조정하고 증가하는 것을 목표로 합니다. 특히, 유럽방위기금은 공동 방위 프로젝트에 자금을 지원하는 프로그램입니다."
 European_Security_Council: "유럽 안전보장이사회"
 European_Security_Council_desc: "§Y유럽 안전보장 이사회§!는 유럽연합이 관여된 모든 사건에 대해 신속하고 효과적으로 생각하고 전략적으로 행동할 수 있도록 지원하는 것을 목표로 한 안보 협의체입니다."
 EUU_euroarmy_sc: "유로군 사무총장"
 EUU_euroarmy_sc_desc: "§Y유럽육군 사무총장§!은 유럽연합내 유럽육군(EuroArmy)을 이끄는 수장입니다. 유럽연합 회원국의 연합 및 공동군인 유럽육군(EuroArmy)의 조정을 책임지고 있습니다."
 EUU_euronavy_sc: "유럽 해군 사무총장"
 EUU_euronavy_sc_desc: "§Y유럽해군 사무총장§!은 유럽연합의 유럽해군의 수장입니다. 유럽연합 회원국들의 연합 및 공동 해군인 유럽해군의 조정을 담당합니다."
 EUU_cfr_eu: "유럽 연합의 기본권 헌장"
 EUU_cfr_eu_desc: "§Y유럽연합 기본권 헌장§!은 유럽연합내 시민과 거주민들의 정치적, 사회적, 경제적 권리를 유럽법에 명시하고 있습니다. 이 헌장은 유럽연합의 자유, 안보 및 정의(AFSJ) 정책 영역들의 일부를 구성합니다. 헌장은 모든 유럽연합과 유라톰(Euratom) 국경에 적용되며, 적용 국가들은 해당 조항에 따라 행동하고 입법을 해야 합니다."
 european_spirit: "유럽의 정신"
 european_spirit_desc: "언제나, 우리는 분열된 것보다 단결했을 때 힘이 더 강합니다. 우리는 유럽연합을 계속 강화해 유럽 대륙과 전세계의 발전을 도모해야 합니다."
 EU_foreign_minister: "유럽 연합 외교안보정책 고위대표"
 EU_foreign_minister_desc: "The §YHigh Representative of the Union for Foreign Affairs and Security Policy§! is the chief coordinator and representative of the Common Foreign and Security Policy (CFSP) within the European Union. The title is often shortened to the EU Foreign Minister and they primarily coordinate foreign policy on behalf of member states."
 ECB_president: "유럽 중앙은행의 총재"
 ECB_president_desc: "§Y유럽중앙은행 총재§!는 유로존내 유로화 관리와 유럽연합의 통화정책을 담당하는 기구인 유럽중앙은행(ECB)의 업무를 주재합니다. 유럽중앙은행 총재는 ECB 집행위원회, 이사회 및 총회를 이끌며 해외에서 유럽중앙은행을 대표합니다."
 ECB_zero_interest_rate_policy: "유럽중앙은행의 제로금리 정책"
 ECB_zero_interest_rate_policy_desc: "유럽중앙은행의 제로금리 정책은 유럽중앙은행의 통화 정책 결정을 수행하기 위해 만들어진 거시경제 개념의 일부입니다. 유럽중앙은행의 제로금리 정책은 경제 성장 둔화, 디플레이션, 디레버리징과 연관되어 있어 많은 비판을 받아 왔습니다."
 EUU_national_dept_crisis_eu: "국가 부채 위기"
 EUU_national_dept_crisis_eu_desc: "미국의 대불황은 계속해서 세계 여러 지역에 파급 효과를 미치고 있습니다. 유럽의 국가 부채 위기는 현재 진행 중인 파급 효과의 한 예일 뿐입니다. 우리나라의 부채 증가는 유로 전체를 위협하기 시작했습니다."
 european_debt_crisis: "유럽 부채 위기"
 european_debt_crisis_desc: "미국의 대불황은 계속해서 세계 여러 지역에 파급 효과를 미치고 있습니다. 여러 유럽연합 회원국들은 대불황의 여파로 어려움을 겪고 있습니다."
 euro_bonds: "유로본드 (Euro Bond)"
 euro_bonds_desc: "유럽공동채권(Eurobonds, 유로본드)은 공공채권을 조달하기 위한 새로운 방법입니다. 유럽공동채권은 유로존 회원국의 정부채 조달을 지원하기 위해 발행되며, 미국 채권시장과 경쟁하는 예금자들로 하여금 유동성 투자 기회를 제공합니다."
 euro_rescue_package: "유럽 종합 구제 정책"
 euro_rescue_package_desc: "유럽중앙은행은 부채 위기의 흐름을 막고 다시 통제하기 위한 구제책을 발표했습니다. 비용이 많이 드는 조치지만, 유로존의 경제 경제 상황을 안정 시킬 수 있을 겁니다."
 fiscal_union: "재정동맹 (Fiscal Union)"
 fiscal_union_desc: "The establishment of a fiscal union for the European Union will allow us to further share a common budget. It is furthering the point of the growing sense of unity within the European Union and the concessions that are being made to further the Union as a whole."
 European_Economic_Government: "유럽 경제 정부"
 European_Economic_Government_desc: "The establishment of the European Economic Government has now set the precedent and the ability for the [EUU.GetFlag][EUU.GetName] at large to establish a tax authority and set spending goals for the member states."
 EU_finance_minister: "유럽 경제 및 재무 장관"
 EU_finance_minister_desc: "The §YEuropean Minister of Economy and Finance§! heads the European Economic Government and as such has the powers invested in them by the fiscal union. The minister is responsible for overseeing the tax authority, the minimum wage for member states, and other economic and fiscal decisions."
 EUU_ambassador_unsc: "유엔 주재 유럽연합 대사"
 EUU_ambassador_unsc_desc: "§Y유엔 주재 유럽연합 대사§!는 유엔에서 유럽연합을 대표하며, 모든 유럽연합 회원국들의 외교 사절단과 협력하여 활동합니다."
 EU_president: "유럽 연방의 대통령"
 EU_president_desc: "The §YPresident of the European Federation§! is the duly elected leader of the European Federation. The European Federation is one of the final federalization options of the European Union and as such this makes this a very powerful position."
 withdrawal_treaty: "탈퇴 조약"
 withdrawal_treaty_desc: "As we withdraw from the European Union we have achieved a Withdrawal Treaty which allows us to exit the European Union with a deal to keep trade deals or other political concessions on the table."
 no_deal_exit: "노딜 브렉시트 (No Deal Exit)"
 no_deal_exit_desc: "우리는 No Deal Exit을 선택했습니다. 우리는 우리나라의 유럽연합 탈퇴에 관한 세부사항에 대해 합의할 수 없었습니다."
 austerity: "긴축"
 austerity_desc: "We have accomplished the goals of the Troika Reforms of the European Commission. We have accomplished Austerity for the sake of our nation and as such our economy is continuing to stabilize."
 EUU_voting_rights_suspended: "정상회의에서의 유럽연합 투표권 박탈"
 EUU_voting_rights_suspended_desc: "Our voting rights in the European Union have been suspended due to repeated breaches of European values. It is time we either change the direction we are taking our country or we should explore leaving the Union."
 EUU_subsidies_suspended: "유럽연합의 보조금 지급 중지"
 EUU_subsidies_suspended_desc: "The European Union subsidies we were once receiving have now been suspended. The sudden change in our budget will take some getting used to and we should look to remedying the situation to once again take advantage of the subsidies allotted to us."
 EU_office_category: "유럽 연합의 부서"
 EU_office_category_desc: "[EUU.GetFlag] 유럽 연합의 주요 산하 기구 :\n\n[EU_commission_president_Loc][EU_council_president_Loc][EU_foreign_minister_Loc][EU_parliament_president_Loc][ECB_president_Loc][EU_finance_minister_Loc][frontex_ExDir_Loc][EuroArmy_SC_Loc][EuroNavy_SC_Loc][EU_ambassador_UNSC_Loc][EU_president_Loc]\n\n[POTEF_polls_loc]"
