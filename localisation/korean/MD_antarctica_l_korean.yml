 ANTARCTICA_STATION_INSTALL_MODULE_STAFF_BALANCE_TT: "§Y설치 후 가용 인력§!\n현재: [?selected_antarctica_station_output_required_staff|+0] / §Y[?selected_antarctica_station_output_total_staff|0]§!\n교체 후: [?selected_antarctica_station_preview_output_required_staff|+0] / §Y[?selected_antarctica_station_output_total_staff|0]§!"
