 CAN_russian_arms_deal_idea_desc: ""
 CAN_american_arms_deal_idea: "Acuerdos de Armas Estadounidenses"
 CAN_american_arms_deal_idea_desc: ""
 CAN_ground_military_one: "Fuerzas Terrestres Canadienses"
 CAN_ground_military_one_desc: ""
 CAN_ground_military_two_infantry: "Fuerzas Terrestres Canadienses: Enfoque en Infantería"
 CAN_ground_military_two_infantry_desc: ""
 CAN_ground_military_three_infantry: "Fuerzas Terrestres Canadienses: Enfoque en Infantería"
 CAN_ground_military_three_infantry_desc: ""
 CAN_ground_military_two_armored: "Fuerzas Terrestres Canadienses: Enfoque en Blindados"
 CAN_ground_military_two_armored_desc: ""
 CAN_ground_military_three_armored: "Fuerzas Terrestres Canadienses: Enfoque en Blindados"
 CAN_ground_military_three_armored_desc: ""
 CAN_overburdened_economy: "Economía Sobrecargada"
 CAN_overburdened_economy_desc: "In the late 1990s, the Canadian budget was overburdened with inefficient subsidies and overspending. Revising old policy and reorganizing the subsidies should assuage this issue."
 CAN_multi_ethnic_nation: "Nación multiétnica"
 CAN_multi_ethnic_nation_desc: "Canadá es una de las muchas naciones multiétnicas del mundo, habiendo sido colonizada tanto por el Reino Unido como por Francia, la miríada de tribus nativas y el número de inmigrantes de otras naciones de todo el planeta. La más prominente de estas divisiones es la que existe entre los habitantes de Quebec y el resto anglófono del país. Si seguimos cerrando esta brecha, nuestra nación florecerá bajo nuestro liderazgo, sentando las bases de un nuevo Canadá."
 CAN_a_culture_shift: "Cambio Cultural"
 CAN_a_culture_shift_desc: ""
 CAN_native_policy_idea: "Política Indígena Obsoleta"
 CAN_native_policy_idea_desc: ""
 CAN_native_policy_society_idea: "Política de Integración Indígena"
 CAN_native_policy_society_idea_desc: ""
 CAN_native_policy_destroy_idea: "Política Anti-Indígena"
 CAN_native_policy_destroy_idea_desc: ""
 CAN_true_neutrality: "Neutralidad Verdadera"
 CAN_true_neutrality_desc: "Los suizos lo tienen todo mal. El esquema de neutralidad canadiense es una verdadera neutralidad."
 CAN_renewable_energy_focus: "Energía Renovable"
 CAN_renewable_energy_focus_desc: "Canadá es un país rico en recursos naturales y en un potencial de energías renovables sin explotar, ya sea solar, eólica, hidráulica o nuclear. Debemos seguir creciendo y mantenernos al día para ayudar a nuestra industria en constante crecimiento invirtiendo en estos recursos renovables estratégicos."
 CAN_Focus_Oil_Sands_research_boost: "Enfoque en las Arenas Petrolíferas"
 CAN_Focus_Oil_Sands_research_boost_desc: "Hemos centrado nuestros esfuerzos en el desarrollo de nuevos yacimientos de arenas petrolíferas. Este desarrollo nos ayudará también en otras áreas."
 CAN_Focus_Oil_Shales_research_boost: "Enfoque en las Pizarras Petrolíferas"
 CAN_Focus_Oil_Shales_research_boost_desc: "Hemos centrado nuestros esfuerzos en el desarrollo de nuevos yacimientos de esquisto bituminoso. Este desarrollo nos ayudará también en otras áreas."
 CAN_nato_research_research_boost: "Investigación Conjunta con la OTAN"
 CAN_nato_research_research_boost_desc: "We have joined together with NATO to develop new tactics."
 CAN_rejected_quebec_proposal_flag: "Propuesta de Quebec Rechazada"
 canada.0.t: "Preparativos para las próximas elecciones"
 canada.0.d: "En casi un año, en octubre, se celebrarán las elecciones. Se dice que serán unas elecciones muy reñidas. Por eso debemos pensar si comenzar la campaña ahora sería beneficioso o si deberíamos retrasarla hasta la próxima primavera."
 canada.0.a: "Comenzar la campaña de inmediato"
 canada.0.b: "Necesitamos retrasarlo hasta la primavera..."
 canada.1.t: "Preparativos para las próximas elecciones: primavera"
 canada.1.d: "En unos meses, en octubre, se celebrarán las elecciones. Se dice que serán unas elecciones muy reñidas. Por eso debemos pensar si comenzar la campaña ahora sería beneficioso o si deberíamos retrasarla hasta el próximo verano."
 canada.1.a: "Comenzar la campaña de inmediato"
 canada.1.b: "Necesitamos retrasarlo hasta el verano..."
 canada.2.t: "Preparativos para las próximas elecciones: verano"
 canada.2.d: "The elections are just around the corner in October. It is said that it is going to be a very fierce election. There is no more time to delay — we must start campaigning now."
 canada.2.a: "No podemos retrasarlo más"
 canada.3.t: "Financiamiento de los partidos"
 canada.3.d: "De cara a las próximas elecciones, muchos partidos están empezando a conseguir apoyo y financiación. ¿Qué partido tiene más apoyo y financiación?"
 canada.3.a: "¡Los Conservadores tienen la ventaja!"
 canada.3.b: "¡Los Liberales tienen la ventaja!"
 canada.3.c: "¡El NDP tiene la ventaja!"
 canada.3.e: "¡Nadie tiene la ventaja!"
 canada.5.t: "¡Los canadienses francófonos están enfadados!"
 canada.5.d: "The Québécois are angered by the central government's actions. They have begun to form mild and small-scale strikes around Quebec and it is threatening to spill over into the French Canadian enclaves in the other provinces. We must address this before it becomes even more of an issue."
 canada.5.a: "¡Tenemos que intentar solucionar el problema!"
 canada.5.b: "No hacer nada"
 canada.6.t: "Protestas de los canadienses francófonos"
 canada.6.d: "Los canadienses francófonos han comenzado a protestar contra las acciones del gobierno canadiense. ¿Qué debemos hacer al respecto?"
 canada.6.a: "Proteger estas protestas"
 canada.6.b: "Prohibir estas protestas"
 canada.7.t: "Rebelión de los canadienses francófonos"
 canada.7.d: "Los canadienses francófonos están al borde de la rebelión. ¿Qué debemos hacer al respecto?"
 canada.7.a: "Intentar solucionar la situación."
 canada.7.b: "¡Sofocar la rebelión!"
 canada.8.t: "Los canadienses francófonos piden más autonomía"
 canada.8.d: "Los canadienses francófonos sienten la necesidad de tener más autonomía en nuestro gobierno. ¿Qué debemos hacer al respecto?"
 canada.8.a: "Darles más autonomía."
 canada.8.b: "We shouldn't..."
 canada.20.t: "El nuevo acuerdo petrolero norteamericano"
 canada.20.d: "Canadá ha propuesto una revisión integral de las disposiciones energéticas del TLCAN, denominada \"Nuevo Acuerdo Petrolero de América del Norte\". Este acuerdo reestructuraría las regulaciones comerciales petroleras entre nuestras naciones, ofreciendo potencialmente condiciones más favorables para los productores nacionales de energía, a la vez que mantiene la seguridad energética continental. El gobierno canadiense argumenta que esta modernización es necesaria para adaptarse a los mercados energéticos cambiantes y a las realidades geopolíticas."
 canada.20.a: "Aceptar el Trato"
 canada_news.1.t: "El Tratado de Petróleo de América del Norte"
 canada_news.1.d: "Tras intensas negociaciones, Canadá y Estados Unidos han enmendado con éxito el capítulo energético del TLCAN. El acuerdo revisado ofrece mayor protección a los productores de petróleo Norteamericanos, agiliza el comercio energético transfronterizo y establece nuevos marcos para la cooperación energética continental en un mercado global cada vez más competitivo."
 canada_news.1.a: "¡Gracias a Estados Unidos!"
 canada_news.1.b: "Mmm, petróleo"
 canada_news.1.c: "¿Está bien?"
 canada.100.t: "Air Canada adquiere Canadian Airlines"
 canada.100.d: "Canadian Airlines is a struggling Canadian airline that, due to economic hardships, is no longer able to compete with its rival Air Canada.\n\nAir Canada bureaucrats have now presented a plan to integrate their former main rival into the company. The plan seems to be comprehensive and able to save most of the jobs that are threatened by Canadian Airlines possibly going bankrupt - the takeover, to be agreed upon on January 4th, 2000, is to go into effect on January 1st, 2001."
 canada.100.a: "Parece una buena propuesta."
 canada.100.b: "Deberíamos mantenernos alejados de los monopolios."
 canada.501.t: "Ministerio de Cultura de Canadá"
 canada.501.d: "The Canadian Ministry of Culture has been established."
 canada.501.a: "¡Así se hace, eh!"
 canada.502.t: "Subsidios al Petróleo Canadiense"
 canada.502.d: "We have been subsidizing oil companies all across the nation for many years. Parliament has passed some additional legislation to potentially subsidize the various national companies like Suncor or Imperial Oil."
 canada.502.a: "¡Subsidiar a las compañías petroleras!"
 canada.502.b: "En realidad, deberíamos reconsiderarlo"
 canada.503.t: "El Gobierno Canadiense Subsidia el Petróleo"
 canada.503.d: ""
 canada.503.a: "Glorioso"
 canada.504.t: "Infraestructura Canadiense"
 canada.504.d: "Municipalities own the core infrastructure assets that are critical to the quality of life of Canadians and the competitiveness of our country. Almost 60% of Canada's core public infrastructure is owned and maintained by municipal governments. According to survey results, the total value of core municipal infrastructure assets is estimated at $1.1 trillion dollars, or about $80,000 per household. We must start moving towards a new federally based infrastructure system."
 canada.504.a: "Grandes Inversiones"
 canada.504.b: "Inversiones moderadas"
 canada.504.c: "Inversiones ligeras"
 canada.510.t: "La Negativa Danesa"
 canada.510.d: ""
 canada.510.a: "Entonces, ¡es guerra!"
 canada.510.b: "Todavía no estamos preparados"
 canada.511.t: "La Aceptación Danesa"
 canada.511.d: ""
 canada.511.a: "Excelente"
 canada.520.t: "Abrazando el Status Quo"
 canada.520.d: "Since the foundation of Canada as a nation, the French and English sections of the country have coexisted. It is important we maintain this status quo unless the stability of our great nation crumbles and Canada as it is now will not stand."
 canada.520.a: "It's the Right Move"
 canada.521.t: "Un Nuevo Gobierno Francés"
 canada.521.d: "We have decided it is in our best interest to follow the lead of Quebec and let the Quebecois play a greater role in government."
 canada.521.a: "Un Nuevo Destino"
 canada.522.t: "Empoderamiento de los Anglófonos"
 canada.522.d: "Empoderar a las secciones de habla inglesa del gobierno mientras se limitan los derechos de la población de habla francesa nos permitirá tener un mayor control sobre nuestra identidad. ¡Siléncialos!"
 canada.522.a: "Un cambio oscuro"
 canada.600.t: "La Recesión Estadounidense se Propaga por Canadá"
 canada.600.d: "La Gran Recesión se está propagando por Estados Unidos y ahora se están sintiendo sus efectos en Canadá."
 canada.600.a: "Lamentable"
 canada.601.t: "Fin de la Recesión"
 canada.601.d: "Canadá finalmente se ha recuperado de la recesión causada por los estadounidenses. ¡Es un día glorioso para nuestra sólida economía!"
 canada.601.a: "De acuerdo"
 canada.700.t: "Disturbios en Quebec"
 canada.700.d: "The Québécois have begun to riot and demand concessions from the government. The recent policy changes from the central government have caused significant unrest amongst the Québécois."
 canada.700.a: "Reprimir los disturbios"
 canada.700.b: "Conceder concesiones"
 canada.700.c: "Concesiones políticas"
 canada.701.t: "Protestas pacíficas contra el gobierno"
 canada.701.d: "Los quebequeses han comenzado a hacer piquetes en Quebec y Montreal en contra de los recientes cambios legislativos."
 canada.701.a: "Romper las protestas"
 canada.701.b: "Sobornarlos"
 canada.701.c: "Anunciar apoyo a ellos"
 canada.702.t: "Orador Anti-Gubernamental"
 canada.702.d: "A local Québécois speaker has come out of the woodwork and is trying to undermine the government. What should we do with him?"
 canada.702.a: "Permítele hablar, es bastante gracioso"
 canada.702.b: "Arrestarlo"
 canada.703.t: "Orador Pro-Gobierno"
 canada.703.d: "Un orador local de Quebec ha dicho que Quebec necesita a Canadá tanto como Canadá necesita a Quebec. Hizo hincapié en la relación simbiótica. ¿Debemos condonar a este orador?"
 canada.703.a: "Apoyarlos públicamente"
 canada.703.b: "Reconocerlos"
 canada.703.c: "Rechazar sus declaraciones frívolas"
 canada.704.t: "Quebec Apoya al Gobierno"
 canada.704.d: "Algunas encuestas han mostrado que el gobierno actual cuenta con un alto apoyo entre los residentes de Quebec."
 canada.704.a: "Buenas noticias"
 keystonepipeline_can.0.t: "Comienza la planificación del Oleoducto Keystone"
 keystonepipeline_can.0.d: "Deberíamos comenzar la planificación de la construcción del oleoducto. ¿Pediremos ayuda a Estados Unidos o lo haremos solos?"
 keystonepipeline_can.0.a: "Utilizar los planes estadounidenses"
 keystonepipeline_can.0.b: "Deberíamos hacerlo solos"
 keystonepipeline_can.0.c: "Pedir ayuda a Estados Unidos para planificar el oleoducto"
 keystonepipeline_can.1.t: "Los costos del oleoducto se estiman en 9 mil millones"
 keystonepipeline_can.1.d: "Sin la ayuda de Estados Unidos, se estima que el proyecto nos costará alrededor de 9 mil millones de dólares construirlo. ¿Lo haremos?"
 keystonepipeline_can.1.a: "¡Deberíamos hacerlo!"
 keystonepipeline_can.1.b: "Necesitamos el dinero en otro lugar."
 keystonepipeline_can.2.t: "Los costos del oleoducto se estiman en 2 mil millones"
 keystonepipeline_can.2.d: "Debido a que el oleoducto estadounidense ya está terminado, los costos serán considerablemente más bajos al completar el oleoducto canadiense. Se estima que los costos serán de alrededor de 2 mil millones de dólares para completar el oleoducto."
 keystonepipeline_can.3.t: "Los costos del oleoducto se estiman en 5 mil millones"
 keystonepipeline_can.3.d: "¡Los estadounidenses nos respondieron! Han aceptado ayudarnos a planificar el oleoducto. Proyectamos un costo total de 5 mil millones de dólares para completar el oleoducto. Suponemos que los estadounidenses nos han ahorrado alrededor de 4 mil millones de dólares. ¡Podríamos usar ese dinero para comprar 114 millones de litros de jarabe de arce ahora mismo!"
 keystonepipeline_can.4.t: "Se completa el oleoducto Keystone"
 keystonepipeline_can.4.d: "Después de un periodo de tiempo muy largo y costoso, finalmente hemos completado el oleoducto."
 keystonepipeline_can.4.a: "¡Finalmente!"
 keystonepipeline_usa.0.t: "Canadá nos pide ayuda en la planificación del oleoducto"
 keystonepipeline_usa.0.d: "Canada has reached out asking for our assistance in planning the Keystone Pipeline extension."
 keystonepipeline_usa.0.a: "Deberíamos ayudar a nuestros aliados"
 keystonepipeline_usa.0.b: "No podemos gastar dinero de nuestra tesorería por el momento."
 canada_md_politics.2.t: "Operación Cinta Amarilla"
 canada_md_politics.2.d: "Aparentemente se ha realizado un ataque coordinado contra el World Trade Center en la ciudad de Nueva York. Puede que haya otras amenazas pendientes en el aire, lo que ha llevado a Estados Unidos a cerrar su espacio aéreo. Debemos seguir su ejemplo para prevenir futuros ataques a posibles objetivos. Transport Canada y Nav Canada activarán sus medidas de emergencia para hacer aterrizar todas las aeronaves que vuelan sobre el espacio aéreo estadounidense y el nuestro. Los pilotos deberán aterrizar en los aeropuertos más cercanos, excluyendo aquellos cerca de áreas urbanas grandes. Cada aeronave debe ser inspeccionada al aterrizar, y miles de pasajeros deben pasar por aduanas. Se necesita apoyo del público para proporcionar comida y refugio a todos los afectados. Esto seguramente será una tarea enorme."
 canada_md_politics.2.a: "Unidos en Pie"
 canada_md_politics.2.b: "¡Envía a Estados Unidos todo lo que podamos ahorrar!"
 canada_md_politics.3.t: "Otra disputa sobre la madera blanda"
 canada_md_politics.3.a: "Ponerse en contacto con la Organización Mundial del Comercio supondrá una victoria fácil."
 canada_md_politics.3.b: "Podemos intentar un nuevo acuerdo con ellos en lugar de iniciar una guerra comercial."
 canada_md_politics.4.t: "Ontario se oscurece"
 canada_md_politics.4.d: "Al parecer, 10 millones de ontarianos y 45 millones de estadounidenses se han quedado sin electricidad. Esto parece el segundo apagón más extendido de la historia mundial si nuestras cifras cuadran correctamente. Sin embargo, tenemos que dejar de lado las estadísticas por ahora. Las ciudades, desde Windsor hasta Ottawa, necesitan ayuda. Toronto, en particular, está pasando apuros con todo el transporte público de la ciudad paralizado. El Primer Ministro Ernie Eves ha decretado el estado de emergencia, y podemos esperar que la ayuda llegue pronto a las zonas afectadas. Afortunadamente, algunos ciudadanos honrados ya han asumido la responsabilidad de dirigir el tráfico y poner a salvo a la gente hasta que llegue la policía. Estamos trabajando con Estados Unidos para investigar lo ocurrido, pero la causa sigue sin estar clara por el momento."
 canada_md_politics.4.a: "Fueron los americanos"
 canada_md_politics.4.b: "Necesitamos mejorar nuestras infraestructuras"
 canada_md_politics.5.t: "El escándalo del patrocinio"
 canada_md_politics.5.d: "In 1996, the Liberals began a sponsorship program which promoted the Canadian government's contributions to Quebec's industries to counter sovereigntist sentiments. However, it would seem that the money was not being put to good use. Auditor General Sheila Fraser has just finished a report on the program, and it has been revealed to the nation that almost half of the $250 million program was spent on corporations friendly to the Liberals. Some of the money would even end up donated back to the Liberals for use in election campaigns. Prime Minister Paul Martin is doing everything he can to reduce the hit his party's popularity will take, but it appears that the next election might already be decided."
 canada_md_politics.5.a: "Podemos llegar a un acuerdo y promulgar leyes que prohíban programas como estos."
 canada_md_politics.5.b: "Los liberales siempre parecen verse envueltos en algún escándalo."
 canada_md_politics.6.t: "Submarinos nucleares estadounidenses en el Paso del Noroeste"
 canada_md_politics.6.d: "Al parecer, el USS Charlotte ha llegado a Virginia tras tomar una ruta norte desde Pearl Harbor. Normalmente, la Marina estadounidense no nos preocupa. Sin embargo, la ruta que tomó este submarino atraviesa directamente el Paso del Noroeste. Consideramos que esta región forma parte de nuestras aguas interiores, pero Estados Unidos no comparte esta opinión. Esto plantea un problema que no hará sino crecer en el futuro. Cada vez más naciones querrán utilizar el Paso del Noroeste como ruta marítima a medida que sea más fácil navegar por él. Nuestros rivales del norte, como Rusia, también pueden sentir que tienen libre acceso a nuestras aguas septentrionales. Esto debe terminar."
 canada_md_politics.6.a: "No se tolerará la presencia de Estados extranjeros en nuestras aguas territoriales."
 canada_md_politics.6.b: "Lo dejaremos pasar."
 canada_md_politics.7.t: "Toronto 18"
 canada_md_politics.7.d: "Un horrible complot terrorista acaba de ser descubierto en el área metropolitana de Toronto. Las redadas antiterroristas han detenido a 14 adultos y 4 jóvenes que han sido bautizados como los 18 de Toronto. Todos ellos están acusados de planear atentados coordinados en todo el sur de Ontario. Estos atentados habrían consistido en bombardear lugares de interés cultural, abrir fuego contra multitudes en las calles de Toronto, derribar redes eléctricas, invadir el Centro Canadiense de Radiodifusión, asaltar la sede del Servicio Canadiense de Inteligencia de Seguridad e incluso lanzar un asalto contra la Colina del Parlamento. Quizá lo más inquietante fue su objetivo de decapitar al Primer Ministro y a otros políticos en directo por televisión. Siempre recordamos al público que nunca debe ser víctima del miedo. Sin embargo, la posibilidad de que un atentado como este sea remotamente posible es aterradora."
 canada_md_politics.7.a: "Despojad a estos monstruos sin corazón de su ciudadanía"
 canada_md_politics.7.b: "Nuestras acciones en Oriente Medio podrían provocar una catástrofe aquí en casa."
 canada_md_politics.8.t: "Comienza la Operación Medusa"
 canada_md_politics.8.d: "The struggle for Kandahar Province continues in Afghanistan, and we are about to lead the largest land battle ever undertaken in NATO's history. We enter this fight with our Afghan, American, British, Danish, and Dutch allies. This operation will surely be successful, but our troops must remain cautious against the Taliban. Opposing us are thousands of militants prepared to die for this land. It is unlikely that we will be able to completely push them out of the region so soon. This has many Canadians worried about the casualties our side may suffer in this conflict. After all, the death toll can only rise from here. How smoothly this operation goes will affect the public's perception of the war."
 canada_md_politics.8.a: "Tenemos que terminar esta lucha, y eso significa eliminar a los talibanes."
 canada_md_politics.8.b: "A partir de ahora sólo habrá más sangre canadiense en nuestras manos."
 canada_md_politics.9.t: "Moción de la Nación Quebequense"
 canada_md_politics.9.d: "Prime Minister Stephen Harper has put forward a motion in the House of Commons regarding Quebec. It calls for the House of Commons to recognize that the Quebecois form a distinct society within Canada. Each party seems to be showing a large amount of support for this motion, but the Canadian public is divided down the middle. Some say that this only serves to revive separatist sentiments, and that Quebec does not deserve special treatment. Others see this as a positive step forward in Canada's relationship with Quebec by recognizing the things that make their province unique. In any case, motions in the House have no real effect on the law regardless of the outcome."
 canada_md_politics.9.a: "Canadá es indivisible, y Quebec es como cualquier otra provincia."
 canada_md_politics.9.b: "Quebec debe ver reconocidas y respetadas sus diferencias."
 canada_md_politics.10.t: "Día de Acción Indígena"
 canada_md_politics.10.d: "Las Primeras Naciones canadienses de todo el país están cada vez más desilusionadas con su relación con el gobierno federal. Hoy han celebrado la primera jornada nacional de protesta para llamar la atención sobre los problemas a los que se enfrentan. Se han bloqueado las principales rutas de transporte de muchas ciudades importantes. Los activistas piden que se tomen medidas en relación con las reclamaciones de tierras, la calidad de vida en las reservas y los programas de servicios sociales a su disposición. Una de sus preocupaciones más acuciantes es la cancelación del Acuerdo de Kelowna por parte del Primer Ministro Stephen Harper. Se trataba de una serie de acuerdos entre el gobierno federal y los pueblos indígenas que pretendían mejorar la educación, el empleo y las condiciones de vida mediante programas patrocinados por el gobierno. El acuerdo no era jurídicamente vinculante, pero a pesar de ello supone un paso atrás en las relaciones con los indígenas."
 canada_md_politics.10.a: "Recupera el Acuerdo de Kelowna y comprométete a cumplirlo esta vez."
 canada_md_politics.10.b: "Esta gente debería aceptar que el mundo ha cambiado."
 canada_md_politics.11.t: "Redada de la RPMC en la sede de los conservadores"
 canada_md_politics.11.d: "The Conservatives have been accused of illegally surpassing the number of funding parties are allowed to use on advertising during the last election. Some loopholes were found in the laws on how transactions must be done between different organizations in a party, and the Conservatives used them to funnel lots of money into local advertisements that were not national in scope. Elections Canada is normally supposed to refund some of a party's expenses in each riding based on the votes they received, but they withheld this due to the scandal. Today, the Royal Canadian Mounted Police raided the Conservative headquarters in search of documents pertaining to the illegal funding. Both the Liberals and NDP are now using this as an opportunity to attack corruption brought on by the Conservatives."
 canada_md_politics.11.a: "Arregla las cosas con Elecciones Canadá rápidamente para que esto salga a la luz pública."
 canada_md_politics.11.b: "A este paso es imposible que ganemos las próximas elecciones."
 canada_md_politics.13.t: "El gol de oro"
 canada_md_politics.13.d: "It is the closing day of the 2010 Winter Olympics, and all eyes were set on the final event. The Canadian men's hockey team had made it to the finals. Only the United States stood in the way of gold. Canada had a strong start at a 2-0 score, but the Americans managed to even the odds with 25 seconds left in the third period. The entire stadium grew tense as sudden death began. Eventually, Jarome Iginla made a pass to Sidney Crosby who then scored the game-winning goal. Cities across Canada immediately erupted with cheering as if the entire nation had come together as one."
 canada_md_politics.13.a: "Algo para los libros de historia"
 canada_md_politics.13.b: "Dinero malgastado"
 canada_md_politics.14.t: "Disturbios en la Cumbre del G20"
 canada_md_politics.14.d: "The G20 convened in Toronto for the first summit of 2010, and everything was meant to go smoothly. Canada recovered swiftly from the global financial crisis, and this led us to some great opportunities during the meetings. However, there was a massive problem outside the venue. G20 summits seem to attract the attention of many political activists. All the world's most influential leaders are gathered in one place, and this is a chance for them to have their voices heard. Thousands showed up on the streets to peacefully protest against a perceived lack of transparency and care for public opinion. Rioters among them took advantage of the large crowds to vandalize buildings, loot shops, and set some vehicles ablaze. Many riot police were sent out to put an end to the anarchy, but a lack of leadership lead to some violent clashes involving innocent bystanders. Over a thousand people were detained, and that number makes this the largest mass arrest in Canadian history."
 canada_md_politics.14.a: "Vergonzoso"
 canada_md_politics.14.b: "Podría haber sido peor sin nuestra seguridad"
 canada_md_politics.15.t: "Retirada de la candidatura del Consejo de Seguridad"
 canada_md_politics.15.d: "Canada was a founding member of the United Nations and continues to be one of the most involved. This involvement once included a record of winning every single bid for a non-permanent seat on the UN Security Council. Our record just got shattered. The first round saw Germany demolish us in votes, and the second had us lose to Portugal. We decided to withdraw at this point, and Portugal's membership was confirmed in the third round. Many Canadians are upset with this loss and blame it on the Conservative administration's foreign policy. Lately, Canada has been intervening much more than usual on the world stage alongside NATO allies. We have followed the US in particular into many battles on foreign soil. Perhaps we must change our approach."
 canada_md_politics.15.a: "Sólo defendemos nuestros valores por un mundo más seguro"
 canada_md_politics.15.b: "¡Esto es un ataque a nuestra reputación!"
 canada_md_politics.16.t: "Una ola naranja"
 canada_md_politics.16.d: "Los últimos sondeos para las próximas elecciones sugieren que el NDP ha ganado más apoyo que los liberales. Su partido ha estado en tercer lugar desde su creación, pero ahora parece estar al alcance de la mano para formar gobierno. Esto se debe a Jack Layton, su carismático líder. Es un paladín de las causas progresistas, y ha hecho su mayor campaña para convertirse en Primer Ministro. Muchos candidatos del NDP son políticos veteranos de otros partidos que se han dejado conmover por su visión. Los canadienses de todo el país también han mostrado un amplio apoyo a su plataforma. Este podría ser el primer gobierno de la historia de Canadá que no esté formado por conservadores o liberales."
 canada_md_politics.16.a: "Ignora a estos aspirantes. Céntrate en la verdadera competencia."
 canada_md_politics.16.b: "¡Debemos actuar antes de que Layton tome el poder!"
 canada_md_politics.17.t: "Bicentenario de la Guerra de 1812"
 canada_md_politics.17.d: "Today marks two hundred years since the United States declared war on the British Empire. It was a war that helped shape Canada's national identity, and the current Conservative administration under Harper is doing everything it can to remind Canadians of that. Millions of dollars have been spent over the past three years to create commemorative coins, historical reenactments, and promotional videos. Not many can argue that teaching youth about our past is a bad thing, but the high cost of the bicentennial compared to similar events has raised eyebrows."
 canada_md_politics.17.a: "Todos conocerán a los canadienses que defendieron nuestra libertad"
 canada_md_politics.17.b: "La guerra ni siquiera valió la pena."
 canada_md_politics.18.t: "Expedición 35 de la Estación Espacial Internacional"
 canada_md_politics.18.d: "Colonel Chris Hadfield has returned from the International Space Station. He was the first astronaut with the Canadian Space Agency to be put in command of the station. Not only is he highly accomplished but he also attracted a massive social media presence. Hadfield often streamed videos to children across the nation to show them what life in space is like. Sometimes he would host online sessions where the internet could ask him anything. He even created a music video on the ISS of him singing Space Oddity by David Bowie. Now he is preparing to publish an autobiography recounting his experiences in space, due later this year."
 canada_md_politics.18.a: "Award him all the nation's honors for his service, and get us a copy of that book"
 canada_md_politics.18.b: "Ha inspirado a la próxima generación de astronautas canadienses."
 canada_md_politics.19.t: "Negociaciones con la Unión Europea sobre el CETA concluyen"
 canada_md_politics.19.d: "Our efforts to diversify our trade partners have resulted in many new free trade opportunities. The Comprehensive Economic and Trade Agreement with the European Union might be our biggest trade deal yet. Our markets will open to 28 nations when this is ratified. However, the deal is not without controversy. There are growing concerns regarding the terms on intellectual property laws, genetically modified organisms, and visa restrictions between the two signatories. Newfoundland and Labrador in particular is upset with the way the enforcement of our exclusive economic zone will be altered. Some rules which protected fisheries in the Maritimes are now being dropped to appease the Europeans, and this stings after we had fought the Turbot War against them in 1994. Nonetheless, we managed a good deal overall considering the economic powerhouse that the European Union is."
 canada_md_politics.19.a: "Abramos nuestra nación a la inversión europea"
 canada_md_politics.19.b: "Ingresamos a los mercados europeos con fuerza."
 canada_md_politics.20.t: "Terror en la Capital"
 canada_md_politics.20.d: "Ottawa está actualmente en estado de emergencia después de que un pistolero solitario intentara atacar al gobierno. Todo comenzó cuando hirió de muerte al centinela llamado Cabo Nathan Cirillo en el Monumento Conmemorativo de Guerra Nacional. Luego se dirigió al Parlamento y entró al Edificio del Centro a través de la entrada principal bajo la Torre de la Paz. Muchos Miembros del Parlamento estaban en reuniones en ese momento y se encontraban en salas por las que el pistolero pasó. El Primer Ministro Stephen Harper estaba en una de esas salas y se vio obligado a esconderse en un armario mientras sus compañeros de partido agarraban astas de bandera para defenderse. El pistolero disparó algunas rondas mientras avanzaba por los pasillos y una bala voló hacia la sala en la que se encontraba el NDP. Finalmente, la Policía Montada logró acorralar al pistolero detrás de una columna. El Sargento de Armas Kevin Vickers se abalanzó sobre el pistolero disparándole, y según se informa, el policía Curtis Barrett disparó la bala fatal. Ya las cadenas de noticias de todo el mundo han comenzado a sensacionalizar este evento con informes de que la ciudad está bajo asedio. Incluso los periodistas más serenos cuestionan la falta de seguridad en la Colina del Parlamento. Tal vez los estadounidenses tenían razón al aumentar tanto la vigilancia después de enfrentar ataques terroristas propios."
 canada_md_politics.20.a: "Canadians have never been known to lock their doors, and terrorists won't change that"
 canada_md_politics.20.b: "Debemos proteger a los canadienses incluso si eso implica sacrificar algunas libertades."
 canada_md_politics.21.t: "Ataques aéreos en Irak y Siria"
 canada_md_politics.21.d: "Los Liberales acaban de ganar las elecciones prometiendo poner fin a nuestros ataques aéreos contra el Estado Islámico en Irak y Siria. En su lugar, quieren centrarse en entrenar a nuestros aliados en el terreno para construir una fuerza de combate más efectiva. Una razón para este cambio es que ahorraría costos, ya que ya hemos gastado cientos de millones en nuestras operaciones de combate. Además, los canadienses no tendrían que arriesgar sus vidas si las fuerzas locales pudieran manejar sus propias batallas. Hay cierto mérito en ambos argumentos, pero corremos el riesgo de molestar a nuestros aliados de la OTAN. Otros países podrían tener la impresión de que los estamos haciendo cargar con todo el peso."
 canada_md_politics.21.a: "Debemos seguir comprometidos con nuestros aliados"
 canada_md_politics.21.b: "Existen mejores formas de apoyar la lucha contra el Estado Islámico"
 canada_md_politics.22.t: "El caso de Omar Khadr"
 canada_md_politics.22.d: "Omar Khadr has become quite a divisive figure in the nation. His father took him to Afghanistan as a boy, and he ended up fighting on the side of Al-Qaeda along with other terrorist groups during the war. He was wounded in a battle against American forces and allegedly killed a Sergeant 1st Class by the name of Christopher Speer with a grenade. Later, he was captured and sent to Guantanamo Bay where he was interrogated by American and Canadian intelligence officers. In 2010, he pled guilty to war crimes after 8 years in custody. He returned to Canada to serve the rest of his term here. Controversy arose from his treatment at Guantanamo Bay. The UN found that he is the first person since World War II to be prosecuted for war crimes as a minor. Civil rights activists across the nation voiced disdain for the actions of our intelligence services, and the Supreme Court of Canada ruled that they violated his human rights. Khadr was released on bail in 2015, but the Conservatives sought to appeal this decision. The new Liberal administration is now considering dropping this appeal. Canadians will surely react negatively either way this goes."
 canada_md_politics.22.a: "Era solo un niño cuando su padre lo arrastró a los brazos de los terroristas"
 canada_md_politics.22.b: "No podemos permitir que camine libremente por nuestras calles después de todo lo que ha hecho."
 canada_md_politics.23.t: "Destino de la Bombardier CSeries"
 canada_md_politics.23.d: "Nuestra industria aeroespacial está sufriendo, lo que ha llevado a algunas medidas desesperadas por parte de Bombardier. Su nuevo avión de pasajeros, el CSeries, cubre un nicho en el mercado que podría traerles fortuna. Sin embargo, no muchas compañías han estado comprando estos aviones. En respuesta, Bombardier redujo drásticamente el precio de cada uno por debajo del costo de producción para hacerlos más atractivos. Cada avión se está vendiendo por 19 millones de dólares, a pesar de que cuesta 33 millones de dólares producirlo. Boeing no le gustó esto en absoluto, ya que representa una dura competencia para su MAX 7. Por lo tanto, presentaron una petición contra Bombardier. Es algo hipócrita que los acusen de tener ventajas económicas injustas cuando ellos mismos reciben enormes exenciones fiscales del gobierno estadounidense. No obstante, esto podría ser un golpe mortal para nuestra industria aeroespacial. No ayuda que la actual administración estadounidense nos haya acusado de aprovecharnos de nuestra relación comercial. Afortunadamente, Europa ha venido en nuestra ayuda. Airbus quiere adquirir una participación mayoritaria en el programa CSeries a cambio de beneficios exclusivos para Canadá. Los europeos son aliados confiables, pero no seremos tan independientes en esta industria si aceptamos la oferta."
 canada_md_politics.23.a: "Es mejor trabajar con los europeos que arrodillarse ante los estadounidenses."
 canada_md_politics.23.b: "Venderse a Europa no soluciona nada"
 canada_md_politics.25.t: "Incluso un frente unido no podrá influir en los estadounidenses"
 canada_md_politics.25.d: "Our military and allies in NATO have been persistently asking our administration to spend more on security. They make a good argument. Our military has been struggling to keep up with the times these past few decades. Hardware is outdated, and recruitment is on the decline. We have also been deploying our forces to an increasing number of conflict zones overseas. Our sovereignty in the north will also need to be protected as the ice continues to melt. Defence Minister Harjit Sajjan has put forward a new defence policy to tackle these concerns. It calls for an overhaul of the military over the next 20 years, and this includes a 73% increase to spending over the next decade. This plan will be costly, and it is unclear where all the necessary resources will come from."
 canada_md_politics.25.a: "Canadá debe hacer más para protegerse a sí misma y a sus aliados."
 canada_md_politics.25.b: "El ejército ya es lo suficientemente capaz."
 canada_md_politics.26.t: "Celebraciones del Canadá 150"
 canada_md_politics.26.d: "It has been 150 years since Canadian Confederation. The federal and provincial governments are hosting the largest celebrations in the country's history. Shows are being put on, national parks are free to access, and commemorative coins have been minted. We also have a giant duck swimming around Lake Ontario. Some of our friends across the world have sent gifts too. The Dutch have bred a tulip that looks just like the Maple Leaf flag. Despite all this, not everyone is excited today. Some are criticizing the high cost of the festivities, and they would rather see the money put elsewhere. Indigenous groups assert that the sesquicentennial only reinforces hundreds of years of colonial rule. Both these points have caused a bit of tension among Canadians."
 canada_md_politics.26.a: "¡Qué día glorioso para Canadá, y por ende, para el mundo!"
 canada_md_politics.26.b: "¡Olvida el pasado!"
 CAN_modify_french_happiness_tt: "§YLa felicidad de los canadienses franceses§! cambia en [?modify_que_happy|+0] (Actual: [?CAN.french_happiness_var|Y0])\n"
 CAN_invest_in_PREV_tt: "Canadá envía ofertas de inversión a [PREV.GetNamewithFlag]."
