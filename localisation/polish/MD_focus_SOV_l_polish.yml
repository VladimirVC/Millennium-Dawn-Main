 free_don: "Negocjuj wydanie [DON.GetNamewithFlag]"
 free_csb: "Negocjuj wydanie [CSB.GetNamewithFlag]"
 free_esb: "Negocjuj wydanie [ESB.GetNamewithFlag]"
 SOV_reunification_mission: "Rozmowy przy okrągłym stole zjednoczeniowym"
 sov_dissolution.1.t: "Regionalizm w natarciu"
 sov_dissolution.1.d: "W obliczu niedawnej wojny, która przybiera coraz gorszy obrót, coraz więcej podmiotów państwowych zaczyna domagać się niepodległości. To tylko kwestia czasu, zanim sytuacja wymknie się spod kontroli i doprowadzi do powszechnej niestabilności."
 sov_dissolution.1.a: "Niemożliwe"
 sov_dissolution.2.t: "Część Rosji ponownie zintegrowana"
 sov_dissolution.2.d: "Po długich negocjacjach kolejny region ojczyzny powrócił pod swoją prawdziwą flagę. To ważny krok w kierunku zjednoczenia i stabilizacji narodowej."
 sov_dissolution.2.a: "Jeden krok bliżej"
 sov_dissolution.3.t: "Rosja prosi o uwolnienie marionetki"
 sov_dissolution.3.d: "Rząd rosyjski wyciągnął rękę w nadziei na wynegocjowanie pełnej niepodległości jednego ze swoich byłych terytoriów. Ten krok mógłby zmienić równowagę sił w regionie."
 sov_dissolution.3.a: "Inwestycja pieniężna może być pomocna"
 sov_dissolution.3.b: "Moglibyśmy kupić ich majątek państwowy"
 sov_dissolution.3.c: "Bez dyskusji"
 sov_dissolution.4.t: "[FROM.GetName] Prosi o rekompensatę pieniężną"
 sov_dissolution.4.d: "Po rozmowach z [FROM.GetNamewithFlag] na temat ewentualnego uwolnienia części ich kraju, zaproponowali oni rekompensatę pieniężną w zamian za tę koncesję. Takie żądania komplikują proces negocjacji."
 sov_dissolution.4.a: "Mała cena do zapłaty"
 sov_dissolution.4.b: "Niemożliwe"
 sov_dissolution.5.t: "[FROM.GetName] prosi o przekazanie majątku państwowego"
 sov_dissolution.5.d: "W dyskusjach na temat zwolnienia niektórych regionów, [FROM.GetNamewithFlag] zażądał przekazania aktywów państwowych w ramach rekompensaty. Żądanie to będzie wymagało starannego rozważenia przed kontynuacją."
 sov_dissolution.5.a: "Mała cena do zapłaty"
 sov_dissolution.5.b: "Niemożliwe"
 sov_dissolution.6.t: "[FROM.GetName] zaprzecza możliwym negocjacjom"
 sov_dissolution.6.d: "Pomimo wysiłków, [FROM.GetNamewithFlag] stanowczo odrzucił wszystkie propozycje uwolnienia części swojego terytorium. Sytuacja pozostaje napięta i niestabilna, z niewielką nadzieją na szybkie rozwiązanie."
 sov_dissolution.6.a: "Aroganccy głupcy!"
 sov_dissolution.7.t: "[SOV.GetName] wyraża zgodę na nasze warunki"
 sov_dissolution.7.d: "[SOV.GetName] zaakceptował nasze uzasadnione żądania rekompensaty za uwolnienie naszego państwa stowarzyszonego. To porozumienie przybliża nas do zjednoczenia i pokoju."
 sov_dissolution.7.a: "Tylko biznes"
 sov_dissolution.8.t: "[SOV.GetName] odrzuca nasze warunki"
 sov_dissolution.8.d: "[SOV.GetName] odmówił rozpatrzenia naszych uzasadnionych żądań odszkodowania za uwolnienie państwa, z którym jesteśmy powiązani. Ta odmowa może opóźnić postępy i zwiększyć napięcia."
 sov_dissolution.8.a: "Ich strata"
 sov_dissolution.10.t: "Zawirowania polityczne podczas negocjacji"
 sov_dissolution.10.d: "Podczas rozmów na temat możliwej reintegracji z Rosją pojawiło się kilka drażliwych kwestii, które skutecznie zahamowały proces negocjacyjny. Klimat polityczny pozostaje niepewny i kruchy."
 sov_dissolution.10.a: "Wykorzystajmy niektóre narzędzia, którymi dysponujemy"
 sov_dissolution.10.b: "Musimy to przeczekać"
 sov_dissolution.11.t: "Brak funduszy na negocjacje"
 sov_dissolution.11.d: "Podczas rozmów o reintegracji zaproponowano rekompensatę pieniężną na pokrycie kosztów administracyjnych związanych z transferem państwowym. Jednak niedobory funduszy grożą zahamowaniem postępu i wymagają starannego planowania budżetu."
 sov_dissolution.11.a: "Część procesu"
 sov_dissolution.11.b: "Nie ma pieniędzy – ale wytrzymaj!"
 sov_dissolution.12.t: "Niezgodne aktywa państwowe"
 sov_dissolution.12.d: "Stało się jasne, że niektóre aktywa państwowe staną w obliczu bankructwa podczas negocjacji reintegracyjnych. Musimy podjąć zdecydowane działania, aby rozwiązać te kwestie i posunąć rozmowy do przodu."
 sov_dissolution.12.a: "Sprzedaj teraz."
 sov_dissolution.12.b: "Potrzebujemy tych aktywów"
 SOV_reunification_plus_10: "§GTo zwiększy postęp zjednoczenia o 10§!"
 SOV_reunification_plus_15: "§GTo zwiększy postęp zjednoczenia o 15§!"
 SOV_reunification_plus_20: "§GTo zwiększy postęp zjednoczenia o 20§!"
 SOV_reunification_minus_10: "§RTo zmniejszy postęp zjednoczenia o 10§!"
 russia.108.t: "Bunt wojskowy generałów"
 russia.108.d: "Nasze dojście do władzy nie spodobało się wielu osobom w społeczeństwie i rosyjskim władzom. Niespodziewanie generałowie Szojgu i Gierasimow pospiesznie uciekli z Moskwy, zmobilizowali swoich zwolenników w Tatarstanie i Tuwie i wypowiedzieli nam wojnę. Ta zdrada wstrząsnęła narodem."
 russia.108.a: "Cholerni zdrajcy!"
 russia.109.t: "Rosgwardia wszczęła zamieszki"
 russia.109.d: "Bunt generałów Szojgu i Gierasimowa pogrążył kraj w chaosie. Teraz Zołotow, przywódca Rosgwardii, dołączył do powstania wraz ze swoimi wiernymi siłami, rzucając wyzwanie naszemu rządowi i pogłębiając niepokoje społeczne."
 russia.109.a: "Straż Zdrajców!"
 russia.110.t: "Rząd nas zdradził"
 russia.110.d: "Urzędnicy państwowi, na czele z Wołodinem, wprowadzili stan wojenny w kontrolowanych przez siebie regionach. Armia jest rozbita, co zmusza nas do konfrontacji nie tylko z rebeliantami, ale także z byłymi sojusznikami, którzy teraz są lojalni wobec wrogich urzędników."
 russia.110.a: "Urzędnicy są jak szczury"
 russia.111.t: "Powstanie Komunistyczne"
 russia.111.d: "Wołgograd stał się bastionem nowego powstania komunistycznego. Kilka regionów ogłosiło secesję i dąży do odtworzenia odpowiednika ZSRR. Pojawił się nowy i niebezpieczny wróg."
 russia.111.a: "Teraz są takie"
 russia.112.t: "Nowa wojna czeczeńska"
 russia.112.d: "Rząd Czeczenii wypowiedział nam wojnę, łamiąc swoje przywiązanie do Rosji. Odmawiają wsparcia krajowi, który nie zagwarantował im przetrwania i niepodległości."
 russia.112.a: "Tym razem musimy ich wykończyć"
 russia.113.t: "Wściekli patrioci powstają"
 russia.113.d: "Igor Striełkow, znany weteran wojskowy i patriota, niedawno przybył do Doniecka. Wezwał mieszkańców Donbasu do przeciwstawienia się nam i sprzeciwienia się rządowi, który uważają za skorumpowany i przestępczy."
 russia.113.a: "Donbas nas zdradził."
 russia.114.t: "Syberia rośnie"
 russia.114.d: "Aktywiści syberyjscy ogłosili powstanie republiki na Dalekim Wschodzie, odmawiając uznania naszego rządu. Ta secesja odcina nas od kluczowych terytoriów i zasobów wschodnich."
 russia.114.a: "Dotrzemy do nich."
 russia.115.t: "Powrót Republiki Uralu"
 russia.115.d: "Republika Uralska, inicjatywa gubernatora Rossela pod koniec lat 90., została zmiażdżona przez Jelcyna. Obecnie wśród Urańczyków odżywają nastroje rewanżystowskie, którzy dążą do odrodzenia dawnej republiki."
 russia.115.a: "Ural za to zapłaci."
 russia.116.t: "Powstanie na Północy"
 russia.116.d: "Pośród chaosu, liberalni aktywiści w północnej Rosji utworzyli rząd, który dąży do przeciwstawienia się nam i obalenia nas. Ich wzrost tworzy nowy front w chaosie ogarniającym kraj."
 russia.116.a: "Nawet te?!"
 NOV_limonka: "Noworosja"
 georgia_broken_relations: "Zrujnowane stosunki z Gruzją"
 SOV_Georgian_question: "Losy Gruzji"
 SOV_Georgian_question_desc: "W tej chwili głównym zadaniem naszej polityki zagranicznej jest jak najszybsze rozwiązanie kwestii dalszej współpracy z Gruzją."
