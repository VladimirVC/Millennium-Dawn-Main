 BLR_belvesh_category: "Belspetsvneshtechnika"
 BLR_belvesh_category_desc: "Przedmiotem działalności Państwowego Jednostkowego Przedsiębiorstwa Handlu Zagranicznego „BELSPETSVNESHTECHNIKA” jest działalność naukowa, produkcyjna i handlu zagranicznego (w tym świadczenie usług pośrednictwa) w zakresie towarów wojskowych i produktów podwójnego przeznaczenia, środków szyfrujących (roboty, usługi), środków tajnych pozyskiwanie informacji i inne produkty. SFTUE „BELSPETSVNESHTECHNIKA” jest organizacyjnie włączona do Państwowego Urzędu Przemysłu Wojskowego Republiki Białorusi."
