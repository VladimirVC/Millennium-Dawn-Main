 NKO_market_economy_system_pilot: "Projet pilote de système d'économie de marché"
 NKO_market_economy_system_pilot_desc: "Nous devons créer des villes pilotes d’économie de marché comme Shenzhen et Shanghai en Corée du Nord, pour tester notre façon de maintenir le marché en activité de manière stable."
 NKO_national_ownership_reform: "Réforme de la propriété nationale"
 NKO_national_ownership_reform_desc: "Le système de propriété nationale est devenu un frein à l’économie de nos jours, nous avons besoin de réformes audacieuses !"
