 SEL.Neutral_Autocracy_1: "£SEL_neutral_autocracy セレカ"
 SEL.Neutral_Autocracy_1_desc: "セレカは、中央アフリカ共和国の反政府民兵組織の連合体である。同組織は主に同国のイスラム教徒層から支持を集めており、「正義と平和のための愛国者会議」および「国を救うための愛国者会議」から分裂した「原理主義派」グループによって結成された。その後、多数の反政府勢力を吸収し、中でも特に注目すべきは、ミシェル・ジョトディア率いる「統一のための民主勢力連合」の加入であり、ジョトディアは中央アフリカ共和国内戦において同グループの指導者となる。"
 SEL.Neutral_Autocracy_2: "£SEL_neutral_autocracy 元セレカ"
 SEL.Neutral_Autocracy_2_desc: "元セレカは、セレカの後継連合である。これは、ミシェル・ジョトディア大統領によるセレカの解散に同意しなかったアンチ・バラカ（一連のキリスト教系民兵組織）や政府に対して公然と戦った、いくつかの分派グループから成る。"
 SUD.Autocracy: "£generic_Autocracy_small (APWF) 人民労働勢力同盟"
 SUD.Autocracy_desc: "ナセル主義 - 人民労働勢力同盟（アラビア語ローマ字表記：Tahaluf al-Qiwaa al-Eamilat al-Shaebia）は、冷戦時代のスーダン独裁者ガアファル・ニメイリの政党であった「スーダン社会主義連合」の後継組織である。"
 SUD.Nat_Fascism: "£IRQ_Nat_Autocracy_small (ASBP-RS) アラブ社会主義バアス党 - スーダン支部"
 SUD.Nat_Fascism_icon: "£IRQ_Nat_Autocracy_small"
 SUD.Nat_Fascism_desc: "イラク・バアス主義 - スーダンのアラブ社会主義バアス党（アラビア語ローマ字表記：al-Hizb al-Ba'th al-Arabi al-Ishtiraki）は、比較的小規模な政党であるが、イラクからの資金援助により、その規模の割には大きな影響力を発揮している。同党は主に、イラクで学んだ学生たちで構成されている。"
 SYR.Nat_Fascism_Alternative: "£generic_Nat_Populism_small アラブ民主党"
 SYR.Nat_Populism_icon: "£SYR_Nat_Fascism"
 YEM.Nat_Fascism: "£IRQ_Nat_Autocracy_small 国家アラブ社会主義バアス党"
 YEM.Nat_Fascism_desc: ""
 USA.American_Anarchist_Society: "£generic_anarchist_communism_small American Anarchist Society"
 USA.American_Anarchist_Society_icon: "£generic_anarchist_communism_small"
 USA.American_Anarchist_Society_desc: "£generic_anarchist_communism_small The AAS or American Anarchist Society is a dedicated group of people that look to restore a more naturalistic order by taking the idea of minarchism and more or less going further. Sort of functioning like Syndicalism in terms of societal organization being more of a grid in format, nevertheless the main focus is the peak decentralization to ensure that the fairest forms of society are realized through collective and mutual benefits in terms of economic and social interactions."
 USA.Commissariat_Corps: "£USA_Commissariat_Corps_small The Commissariat Corps"
 USA.Commissariat_Corps_icon: "£USA_Commissariat_Corps_small"
 USA.Commissariat_Corps_desc: "The Commissariat Corps is the political body of the military. Being focused on the political integrity of the nation, it does surprisingly have competent military officers since in order to be apart of the CC one must complete an entire tenure at one of the nation's military institutions. Nevertheless many discount it as just they 'bullying arm' of the party despite the clear requirements to join. Their Unity Plan also has seen some heads turn for its strange almost contradicting formatting using Military service and Socialist economics as a way to truly unite the nation and its people to the common goal. But that means nothing if they are just military service folks instead of politicians...right?"
 USA.Naturalist_NFP_Victory: "£USA_american_heritage_party American Naturalist Party"
 USA.Naturalist_NFP_Victory_icon: "£USA_american_heritage_party"
 USA.Naturalist_NFP_Victory_desc: "American Naturalist Party - The ANP is a pseudo coalition party in where the ultranationalist wing of the old NFP conformed into a united ideology. This comprises of the Natualist Movement, American Nazi Party, KKK remnants and a smattering of other groups and organizations. The main ideology is focused around American Naturalism which is a modern adaptation of the Liberian Plan. Since unwarranted murder is obviously frowned upon, government helped relocation abroad is how the party wants to focus its purity plan. Economics tends to be a form of State Capitalism/Authoritarin Socialism, but cause no one likes the 'Reds', they just clean up the naming to make it work. Foreign Policy is moderate Expansionism with heavy Mercantile and Isolationist influences."
 USA.Militarist_NFP_Victory: "£USA_Nat_Autocracy_small American Military Society"
 USA.Militarist_NFP_Victory_icon: "£USA_Nat_Autocracy_small"
 USA.Militarist_NFP_Victory_desc: "American Military Society - The AMS is the product of the NFP policies which saw a shift in the party base towards the militarist and Pentagon Elites. Now in charge those same Pentagon Generals now need to find a office branch to shove in civilian affairs so they can continue focusing on quote, real soldiering, end quote. Nevertheless the public are enthusiatic and national pride is at an all time high so lets ride the wave for as long as possible."
 USB.Western_Autocracy: "£USA_federalist 連邦党"
 USB.Western_Autocracy_icon: "£USA_federalist"
 USB.Western_Autocracy_desc: "£USA_federalist 連邦党 - 右派（FPRW）は、連邦党の主要な反選挙派だが、いくつかの矛盾した立場が見られる。彼らは現時点では選挙を望んでいないが、将来はあり得るとしている。崩壊した合衆国の大陸を再統一するという構想には無関心だが、完全に反対しているわけでもない。一方で、財政面では緊縮路線を志向する傾向にある一方で、文化的な進歩主義を奨励したいとも考えているようだ。これを「新時代の進歩的共和主義」と見る者もいれば、独裁的な未来への偽りの希望だと指摘する者もいる。最終的な目標が何であれ、それが実現して初めて明らかになるだろう。"
 USB.conservatism: "£generic_conservatism_small 自由保守党"
 USB.conservatism_icon: "£generic_conservatism_small"
 USB.conservatism_desc: "£generic_conservatism_small 自由保守党（FCP）は、選挙戦には無関心な穏健保守政党だが、その財政・社会政策により、一部の野党からは「ソフト・ライト」とレッテルを貼られている。この政治的無関心さゆえに、同党は連邦党の右派勢力とほぼ同調して投票する傾向にある。そのため、他党とこれほど密接に連携している同党が、果たしてどれほど独立性を保てているのか、多くの人が疑問を抱いている。"
 USB.liberalism: "£USA_federalist 連邦党"
 USB.liberalism_icon: "£USA_federalist"
 USB.liberalism_desc: "£USA_federalist 連邦党 - 左派（FPLW）は、党内の主要な選挙支持派閥であり、社会民主主義と中道左派の思想を持つ者たちで構成されている。多くの人が、この派閥を1990年代の民主党に類似していると見なしているが、主な違いは、この党がレナフ主義と拡張主義を支持している点にある。彼らは大陸の衰退を、若年世代を率いる老害の欠陥と、若者に対して新しい考え方を提示できない無力さの表れと見なしている。そのため、連邦党のこの派閥は、順位付投票制を採用した比例代表制政府の実現を望んでいる。人口に対する代表者数は後日決定される予定である。現時点での彼らの主な目標は、真の未来を築くために、国民の支持を獲得することである。"
 USB.socialism: "£generic_socialism_small 社会民主労働党"
 USB.socialism_icon: "£generic_socialism_small"
 USB.socialism_desc: "£generic_socialism_small 社会民主労働党（SDWP）は、自由国の政界において独自の道を歩む進歩的左派政党である。欧州の同種の政党とより親和性が高く、主要政党の中では連邦党の左派（FPLW）が、自らの目標達成に向けて最も協力的であり、連携しやすいと見なしている。しかし、FPLWとSDWPの最大の違いの一つは、税制に対するアプローチ、そして税制そのものが社会に経済的な不利益をもたらすと同時に利益をもたらすという役割についてである。"
 USB.Communist-State: "£USA_free_socialist_party 自由社会党"
 USB.Communist-State_icon: "£USA_free_socialist_party"
 USB.Communist-State_desc: "£USA_free_socialist_party 自由社会党 - 国家統制主義派（FSPS）は、自由社会党のより伝統的な連合であり、労働者により相応しい公正な待遇をもたらすため、プロレタリア独裁による秩序の確立を目標としている。彼らの要点は反選挙にあるが、しかしながら拡張主義と対外介入主義的な外交を支持する。彼らのもっとも物議を醸す点は反米主義を徹底していることにあるが、これは大陸的統一を目標とするのではなく、むしろ新たな独自性の確立を目指すことを意味している。"
 USB.Neutral_Communism: "£generic_Neutral_Communism_small 共産自由同盟"
 USB.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 USB.Neutral_Communism_desc: "£generic_Neutral_Communism_small 共産自由同盟（CFL）はマルクス＝レーニン主義政党であり、プロレタリア独裁を確固たるものにすることを目標としている。主にはキューバのカストロやベネズエラの社会主義政権から影響を受けた。社会主義的経済学と、スターリンの一国社会主義とトロツキーの永続革命論との妥協案である「半球社会主義」に基づく外交方針を徹底している。共産自由同盟は社会主義の宿命を覆い隠すものを求めており、彼らは目標を達成するためなら自由社会党の反選挙派との協力もいとわないだろう。"
 USB.anarchist_communism: "£USA_free_socialist_party 自由社会党"
 USB.anarchist_communism_icon: "£USA_free_socialist_party"
 USB.anarchist_communism_desc: "£USA_free_socialist_party 自由社会党 - 無政府主義派（FSPA）は、自由社会党における急進的ミナキスト派であり、伝統的には無政府主義者というわけではなく、一種のリバタリアン社会主義者であると見なされている。この派閥は、選挙の公平性を最大化するための手段として、直接民主主義的な投票制度や比例代表制、優先順位付投票制を希望している。彼らは選挙には非常に賛成しているが、しかしながら反拡大主義、反米主義的でもある。彼らは最も純粋なる形の民主主義を通じて新たな独自性を確立し、連邦政府の権力を連邦制に基づいた責務のみに限定することを求めている。数多くの若者がこの派閥に引き付けられ、自由社会党の国家統制主義派との激しい闘争を繰り広げている。"
 USB.Neutral_green: "£generic_Neutral_green_small 緑の未来党"
 USB.Neutral_green_icon: "£generic_Neutral_green_small"
 USB.Neutral_green_desc: "£generic_Neutral_green_small 緑の未来党（GFP） は、「グリーン・シンキング」に対する現代的なアプローチを掲げる政党である。我々の地球が強靭でありながらも繊細であることを理解することで、国内政治全体への取り組み方について、より広い視野を得ることができる。GFPは、自由社会党内の無政府主義派を強力に牽制しつつ、科学と技術を活用して「緑の未来」への道を切り拓こうとしている。"
 USB.oligarchism: "£USA_mid_atlantic_party 中部大西洋岸党"
 USB.oligarchism_icon: "£USA_mid_atlantic_party"
 USB.oligarchism_desc: "£USA_mid_atlantic_party 中部大西洋岸党 - 孤立主義派（MAPI）は、新興政党「中部大西洋岸党」の主要派閥の一つで、強硬な孤立主義を掲げている。彼らは新たな中部大西洋岸のアイデンティティを模索し、過去の失敗を新たな視点で乗り越えようとしている。彼らは選挙に反対し、領土拡大や対外関与には無関心だが、強い反米主義を掲げている。両派閥ともこの反米主義を共有しているが、外交政策や選挙制度、あるいは民主主義の理想への回帰に関する彼らの立場は、限界を超えているように見える。"
 USB.Autocracy: "£generic_Autocracy_small 大西洋権威党"
 USB.Autocracy_icon: "£generic_Autocracy_small"
 USB.Autocracy_desc: "£generic_Autocracy_small 大西洋権威党（AAP）は、法執行機関に付与された権限を定義し、その行使を保証する連邦法の制定を目指す、強硬な権威主義政党である。偏狭な政党と見なす多くの反対派は、彼らを中部大西洋岸党の孤立主義派閥（MAPI）にとっての単なる駒に過ぎないと見なしている。名称は似ているものの、MAPIは権威に対する見解がやや柔軟であり、むしろ自分たちが権威そのものであると主張し、より強い反選挙姿勢を打ち出している。この反選挙姿勢こそが、AAPがMAPIに対抗する際の主な論点であるが、彼らの主張はほとんど注目されていないようだ。"
 USB.Neutral_Libertarian: "£USA_mid_atlantic_party 中部大西洋岸党"
 USB.Neutral_Libertarian_icon: "£USA_mid_atlantic_party"
 USB.Neutral_Libertarian_desc: "£USA_mid_atlantic_party 中部大西洋岸党 - アイデンティタリアン派（MAPNI）は、新たに創出された「ニュー・ウェーブ・アイデンティティ」に全面的に焦点を当てた政党である。選挙支持を掲げつつも、反米主義という点では孤立主義的な側面とも整合しており、いわゆるアイデンティタリアンたちは、主に自らのための新たなアイデンティティを確立することに注力している。拡大そのものには反対していないものの、仮にその時が来ても、ミシシッピ川を越えていく必要性を感じてはいない。"
 USB.Neutral_conservatism: "£generic_Neutral_conservatism_small 自由連帯党"
 USB.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 USB.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small 自由連帯党（FSP/F&SP）は、科学とイノベーションの力を活用して、適切な生活水準と人生の充実を確保しようとする孤立主義的な政党である。同党の経済政策の主な柱は、可能な限り自給自足を目指すことだが、自給自足が不可能な場合はその限りではない。社会政策に関しては、テーマによって多少の左右の傾向はあるものの、全体としてはかなり穏健である。例えば軍隊における同性愛者の問題では、背景に関わらずすべての市民にとって最優先事項であると信じ、支持しているが、一方で同性婚については全面的には支持していない。それにもかかわらず、彼らは最も親密な政治的同盟者である、中部大西洋岸党の孤立主義派閥と一貫して連携を続けている。かつてのアメリカが掲げた世界的な理想主義こそが崩壊を招いたという共通の認識から、彼らは外交問題や、いわば近隣地域以外のあらゆる事柄に対して、ある種の閉鎖的な姿勢をとっている。"
 USB.Nat_Autocracy: "£USA_national_service_party 国民奉仕党"
 USB.Nat_Autocracy_icon: "£USA_national_service_party"
 USB.Nat_Autocracy_desc: "£USA_national_service_party 国民奉仕党 - 軍国主義派（NSPM）は、親米主義と強硬な愛国主義を掲げる政党である。党内では選挙制度の是非をめぐって意見が分かれているが、軍国主義派は選挙制度に強く反対している。しかし、この派閥は拡張主義を支持しており、ほぼ完全な実力主義の思想に強く影響を受けている。"
 USB.Nat_Populism: "£generic_Nat_Populism_small 国民連合党"
 USB.Nat_Populism_icon: "£generic_Nat_Populism_small"
 USB.Nat_Populism_desc: "£generic_Nat_Populism_small 国民連合党（NUP）は、自然主義を掲げる政党だが、彼らが属する国家がまだそれほど歴史の浅いものであることを考えると、多くの人々にとってその立場は不可解に映る。それにもかかわらず、NUPは支持基盤の大部分が退役軍人と少数の右派志向の人々で構成されているという事実を利用して、自らの正当性を強固なものにしている。しかし、退役軍人支援政策はさておき、同党はますます軍の政治部門と見なされるようになっており、驚くべきことに、党内でそれを否定する声はほとんどない。彼らがそれを認めているわけではないが、決して否定もしていないのだ。"
 USB.Monarchist: "£USA_modern_monarchist_movement 国民奉仕党"
 USB.Monarchist_icon: "£USA_modern_monarchist_movement"
 USB.Monarchist_desc: "£USA_modern_monarchist_movement 国民奉仕党 - 近代君主主義派（NSPM）は、本質的に軍事および緊急サービス政党であり、夢想家で満ちている。NSP全体の近代君主主義運動は、選挙君主制を普及させることによって君主制を流行に戻すのが適切であると見なした。その考えは、本質的に選挙と民主主義の原則の考え方は同じままであるが、役職とその名前/引用、肩書きは、それらに投票された人々に付けられるというものである。強力な親選挙の姿勢に関しては、派閥は新しいアイデアを拡大し、創造することを望んでいる。多くの人がアーリントン家とされるものについて聞いているが、それが何を意味するのか誰も確信していない。しかし、今のところ、彼らは強力な指導者が選出されることができ、一生懸命働けば、いつか王様になれると、子供の頃に言われたように、人々に納得させなければならない。"
 USB.Neutral_Autocracy: "£generic_Neutral_Autocracy_small 大西洋統一党"
 USB.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 USB.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small 大西洋統一党（AUP）は、法と秩序、過度に直接的ではない直接民主主義、そして理想主義を掲げる政党である。「未定の独裁者」と激しく非難される中、AUPは順位選択投票や、市民の所得に比例して課税することにのみ焦点を当てた累進課税などの実現に努めている。こうした共通点に加え、党内のより理想主義的なメンバーたちは、国民奉仕党の近代君主主義派とかなり協力し合っている。結局のところ、あるAUP指導者が語ったように、「少しの装飾的な華やかさが何の問題があるというのか」ということだ。"
 USB.Conservative: "£generic_Conservative_small コンドル連合党"
 USB.Conservative_icon: "£generic_Conservative_small"
 USB.Conservative_desc: "£generic_Conservative_small コンドル連合党（CUP）は、古き良き時代のポピュリスト政党である。完全に左派でもなければ完全に右派でもない「コンドルズ」（党員の通称）は、「やってみなければ分からない」という姿勢こそが統治における最優先の戦略であると信じている。この党は、真の政党というよりはむしろ「紛らわしい存在」と見なされており、多くの野党勢力が、彼らがどの主要政党から政治的恩恵を受けているかについて、ほぼ矛盾した見解を示している。それにもかかわらず、CUPは原則を重んじる政党であり、国内の広範な政治情勢において、確固たる「第三の勢力」としての地位を築いてきた。"
 USB.neutral_Social: "£generic_neutral_Social_small 労働者連合党"
 USB.neutral_Social_icon: "£generic_neutral_Social_small"
 USB.neutral_Social_desc: "£generic_neutral_Social_small 労働者連合党（WUP） は、労働組合支持かつ国有化推進派政党である。党員たちは、生存の基盤となる分野を中心に国有産業を確立することで、民間企業が自社の労働者の支援や労働条件の改善を優先するよう促せると考えている。また、同党は、搾取的な企業活動の行き過ぎを規制すべきだと考えており、いざという時には、地域、地方、そして全国レベルで問題を調整・対処するための労働組合ネットワークの構築を義務付けることに尽力している。"
 USB.Nat_Fascism: "£generic_Nat_Fascism_small 自由国家連盟"
 USB.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 USB.Nat_Fascism_desc: "£generic_Nat_Fascism_small 自由国家連盟（FNL）は、中東に対して衝撃的な排外主義を掲げる自然主義政党である。同党は、中東およびいわゆる「イスラム世界」の宗教やイデオロギーが、我が国の自由と安定に対する脅威であると明言している。彼らはこのいわゆる「限定的な人種差別」を売り物にしているが、実際には党外の人々の多くが、ネオナチやファシスト、さらにはクランの元メンバーが集まっていることに気づいている。この党は、良くてマイナーな存在、悪くてテロ組織に過ぎないが、政治的に言えば、多くの人は彼らを、目の前の事実を見ようとしない、あるいは信じようとしない人々しか惹きつけない、極右過激主義のサーカスに過ぎないと見なしている。"
 CSA.Western_Autocracy: "£generic_Western_Autocracy_small ディキシー&デルタ党"
 CSA.Western_Autocracy_icon: "£generic_Western_Autocracy_small"
 CSA.Western_Autocracy_desc: "£generic_Western_Autocracy_small ディキシー&デルタ党（DDP／D&DP）のことを知らない人にとっては、単なる一政党に過ぎないのかもしれない。この政党は、公共交通機関の整備を優先し、特に鉄道交通を重視しているようだ。しかし、それ以外の政策決定は、彼らの主要な公約とは無関係なものばかりである。単なる単一課題政党だとする声もあれば、経済政策を通じて国を運営するという鈍感なアプローチだと考える者もいる。仮に当選したとしても、彼らが実際に何者なのか、国はすぐに知ることになるだろう。"
 CSA.conservatism_icon: "£generic_conservatism_small"
 CSA.liberalism: "£generic_liberalism_small ディキシー・ウィッグ党"
 CSA.liberalism_icon: "£generic_liberalism_small"
 CSA.liberalism_desc: "£generic_liberalism_small ディキシー・ウィッグ党（WPD）は、最近の合衆国解体を機に、かつての政党を復活させようとしている政党である。通称「ウィッグ」と呼ばれるこの党は、古典的自由主義を手段として、共和国の後退を防ぐことを目指す中道左派の政党である。国内のブラックベルト地域と連携し、ウィッグ党は政治的な平和維持という点で、かなりのソフトパワーを有している傾向にある。"
 CSA.socialism: "£generic_socialism_small 進歩民主党"
 CSA.socialism_icon: "£generic_socialism_small"
 CSA.socialism_desc: "£generic_socialism_small 進歩民主党（PDP） は、政治力という点ではやや小規模な政党である。同共和国の一般的な世論は保守的傾向が強く、南部において真の意味で長きにわたり進歩主義を掲げる地域はほとんどない。PDPの支持基盤は主に港湾都市、都市部、そして工業地帯にあり、南部は工業化が進んでいる地域としてあまり知られていない。"
 CSA.Communist-State_icon: "£generic_Communist_State_small"
 CSA.anarchist_communism_icon: "£generic_anarchist_communism_small"
 CSA.Conservative_icon: "£generic_Conservative_small"
 CSA.Autocracy: "£generic_Autocracy_small 農業統一党"
 CSA.Autocracy_icon: "£generic_Autocracy_small"
 CSA.Autocracy_desc: "£generic_Autocracy_small 農業統一党（AUP）あるいは農業党は、どちらかといえばプランテーション階級を代表する政党である。つまり、その政策の多くは農業開発を優先し、経済の他のほとんどの分野よりも農業部門に利益をもたらす決定を下す傾向がある。社会問題に関しては、南部経済の「王様」としての地位が揺るがない限り、無関心である。"
 CSA.Neutral_Muslim_Brotherhood: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラム"
 CSA.Neutral_Muslim_Brotherhood_icon: "£generic_Neutral_Muslim_Brotherhood_small"
 CSA.Neutral_Muslim_Brotherhood_desc: "£generic_Neutral_Muslim_Brotherhood_small ネーション・オブ・イスラムは、白人が支配するアメリカの社会において、黒人の地位を向上させ、確保することを目指すアフリカ系アメリカ人の文化団体である。南部共和国においては、新国家の半分近く、あるいはそれ以上を占める「ブラック・ベルト」地域が存在するため、彼らの影響力ははるかに大きい。その結果、ネーション・オブ・イスラムの過激派メンバーは、実際に黒人だけのための新国家を創設しようとしており、この新国家を大陸にいる黒人にとっての救済と見なしている。"
 CSA.Neutral_Autocracy: "£generic_Neutral_Autocracy_small ディキシー連邦党"
 CSA.Neutral_Autocracy_icon: "£generic_Neutral_Autocracy_small"
 CSA.Neutral_Autocracy_desc: "£generic_Neutral_Autocracy_small ディキシー連邦党（FDP）は、野党議員たちから「南部連邦主義者」と呼ばれており、機能不全に陥った南部連合の体制と、旧合衆国の強権的な一元主義との妥協点を見出し、それをモデルとして新たな共和国を築こうとしている。経済面でも社会面でも左寄りの傾向があるが、特定の問題に関しては、より右寄りの立場を譲らない姿勢を見せている。"
 CSA.Neutral_conservatism: "£generic_Neutral_conservatism_small 南部アイデンティティ党"
 CSA.Neutral_conservatism_icon: "£generic_Neutral_conservatism_small"
 CSA.Neutral_conservatism_desc: "£generic_Neutral_conservatism_small 南部アイデンティティ党（SIP）の支持者たちは、おおむね穏健な中立的立場をとる政党である。単一課題を掲げる政党として、南部アイデンティティ党は、南部のアイデンティティを文化的に高め、独自のものとすることを目指している。皮肉なことに、こうした活動について問われると、多くの党員は「我々は自立した国家として立ち上がろうとしているのであり、歴史を再現しようとしているわけではない。単にそこから学べることを理解し、取り入れようとしているだけだ」と主張する。社会主義者やリベラル派は、この党を「腰の引けた奴隷主義者」と呼び、過去とその行為を切り離すことはできないと批判するが、SIPの党員たちは、彼らが「野党の雑音」と呼ぶような批判など意に介さない。"
 CSA.oligarchism_icon: "£generic_oligarchism_small"
 CSA.Neutral_Libertarian: "£USA_Neutral_Libertarian_small 南部自由党"
 CSA.Neutral_Libertarian_icon: "£USA_Neutral_Libertarian_small"
 CSA.Neutral_Libertarian_desc: "£USA_Neutral_Libertarian_small 南部自由党（SLP）は、かつてのアメリカ・リバタリアン党の残存勢力である。SLPはミナキズムを提唱するとともに、国家経済に対してより自由放任的なアプローチを推進している。社会政策に関しては、同党が社会的にリベラルな立場をとるべきか、それとも社会的に保守的な立場をとるべきかについて意見が分かれているようだが、連邦政府には州や個人の事柄を規制する権利はないと確信している。"
 CSA.Neutral_green: "£generic_Neutral_green_small 南部美化党"
 CSA.Neutral_green_icon: "£generic_Neutral_green_small"
 CSA.Neutral_green_desc: "£generic_Neutral_green_small 南部美化党（SBP）は、政策や政治的な全体的なテーマという点では、ごく一般的な緑の党である。彼らの興味深い点の一つは、真の南部政党とは、南軍をそのありのままに受け入れ、そこから学び、前に進むべきものであると信じていることだ。この主張により、リベラル派の強硬派から「偽物」や「人種差別主義者」と見なされるなど、南部に対するこの物議を醸すビジョンを巡って支持基盤が分裂している。"
 CSA.neutral_Social: "£generic_neutral_Social_small 進歩民主党"
 CSA.neutral_Social_icon: "£generic_neutral_Social_small"
 CSA.neutral_Social_desc: "£generic_neutral_Social_small 民主進歩党（DPP）は、急進的な社会主義者と穏健な左派の中間に位置する政党である。同党は、対象を絞った国有化や、より優れた柔軟性のある現代的な福祉国家の形態を支持するほか、企業による露骨な支配に対抗するための労働組合支援法も支持している。"
 CSA.Neutral_Communism: "£generic_Neutral_Communism_small 南部共産主義協会"
 CSA.Neutral_Communism_icon: "£generic_Neutral_Communism_small"
 CSA.Neutral_Communism_desc: "£generic_Neutral_Communism_small 南部共産主義協会（SCA）は、いわゆる「南部社会主義共和国」の樹立を目指す、マルクス主義、レーニン主義、スターリン主義、およびその他の主流派共産主義の信奉者たちによって構成されている。彼らは、農民こそがマルクスが説く「労働者」であり、近代的な階級格差を生み出しているのは工業化であると考えている。そのため、彼らの工業化計画は、全国を網羅し、バランスを保つことを基本としており、会員たちが「現代の奴隷労働の場」と見なすような近代的な工業拠点の形成を避けるよう配慮されている。"
 CSA.Nat_Populism_icon: "£generic_Nat_Populism_small"
 CSA.Nat_Fascism_icon: "£generic_Nat_Fascism_small"
 CSA.Nat_Autocracy_icon: "£generic_Nat_Autocracy_small"
 CSA.Monarchist: "£generic_Monarchist_small メリディアン家"
 CSA.Monarchist_icon: "£generic_Monarchist_small"
 CSA.Monarchist_desc: "£generic_Monarchist_small メリディアン家（HoM）は、南部版近代君主主義運動である。彼らは、選挙で選ばれた君主制が現代社会に完全に適合し、役職の称号を単に外見的に王室に基づいた称号に変更できると信じている。数字による命名規則の考え方は、その役職に選出された個人の名前に基づいており、命名は名前に基づいている。社会的には中道右派、経済的には中道左派であり、この運動は驚くほど親労働組合的であり、脆弱な南部経済を搾取の容易さや国家の富の外部委託から守るためである。"
