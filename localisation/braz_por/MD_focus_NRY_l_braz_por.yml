 NRY_modernize_bergan_line: "Linha de Bergen"
 NRY_modernize_bergan_line_desc: "A Linha de Bergen é uma linha ferroviária padrão de 372 quilômetros de extensão que proporciona transporte e flexibilidade muito necessários em nossa nação."
 NRY_dovre_line: "Linha de Dovre"
 NRY_dovre_line_desc: "A Linha de Dovre é a principal linha de 484 km que foi encarregada de entregar suprimentos de forma eficiente em nossa nação."
 NRY_higher_relations_more_likely_TT: "Eles têm §HMais Probabilidade§! de Aceitar se:\n- Sua §HOpinião§! sobre nós for pelo menos §H45§!"
 NRY_UK_AGREED: "O [ENG.GetFlag] §H[ENG.GetName]§! Concordou com nosso Pedido"
 NRY_wind_farms: "Parques Eólicos"
 NRY_wind_farms_desc: "Parques Eólicos foram construídos em várias partes de nossa nação na esperança de colher energia mais limpa de forma mais eficiente."
 NRY_bergen_line: "Linha de Bergen"
 NRY_bergen_line_desc: "A Linha de Bergen é uma linha ferroviária padrão de 372 quilômetros de extensão que proporciona transporte e flexibilidade muito necessários em nossa nação."
