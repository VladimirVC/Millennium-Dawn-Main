 boost_party_TT: "§H[party_name_by_index] ([party_support_by_index]) 지지§!\n우리의 진짜 정치적 적들의 힘을 약화시키기 위해, 우리는 정치 공작을 사용하여 다른 정당들의 인기도를 끌어올릴 수 있습니다.\n\n§Y전제 조건:§!\n[!boost_button_click_enabled]\n§Y효과:§!\n[!boost_button_click]"
 attack_party_TT: "§H[party_name_by_index] ([party_support_by_index]) 공격§!\n우리는 허위 정보 캠페인과 정부 외부의 주요 정당들에 대해 수집한 치부를 활용하여 그들의 인기도에 심각한 타격을 입히고, 이들이 우리의 권력에 도전하지 못하도록 확실히 할 수 있습니다. 사소한 관심이라도 군소 정당에게는 인기도 상승을 초래할 수 있으므로, 이 방법은 선거 장벽 [?election_threshold|%0]을 넘는 주요 정당에게만 효과가 있습니다.\n\n§Y전제 조건:§!\n[!attack_button_click_enabled]\n§Y효과:§!\n[!attack_button_click]"
 ban_party_TT: "§H[party_name_by_index] ([party_support_by_index]) 금지§!\n정당이나 정치 운동을 불법화하면 그들이 선거를 통해 권력을 얻는 것을 영구적으로 막을 수 있으며, 소속원들을 탄압하기 더 쉬워집니다.\n\n§Y전제 조건:§!\n[!ban_button_click_enabled]\n§Y효과:§!\n[!ban_button_click]"
 allow_party_TT: "§H[party_name_by_index] ([party_support_by_index]) 합법화§!\n이제 금지를 해제하고 그들의 당원들이 공직에 출마하고 합법적으로 조직할 수 있도록 허용할 때가 되었습니다.\n\n§Y전제 조건:§!\n[!allow_button_click_enabled]\n§Y효과:§!\n[!allow_button_click]"
