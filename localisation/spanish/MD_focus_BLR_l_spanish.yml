 BLR_Litva_belarusizations_category: "Integración de nuevos territorios"
 BLR_Litva_belarusizations_category_desc: "Los territorios de Lituania han caído bajo nuestro control. La integración de estas nuevas tierras y territorios es absolutamente imprescindible; de ​​lo contrario, no podremos mantener un control permanente sobre la región."
 BLR_Lukashenko_category: "El gobierno de Lukashenko"
 BLR_Lukashenko_category_desc: "El gobierno de Lukashenko es claramente autoritario y busca solo un objetivo: permanecer en el poder a cualquier costo.\n§W--------------§!\nEn este momento, el porcentaje de apoyo a Alexander Grigoryevich Lukashenko es igual a §Y[?BLR.batka]§!"
