 GDP_TOTAL: "GDP"
 GDP_TOTAL_DESC: "我们的§Y国内生产总值§!(GDP)是衡量国家生产的所有产品和服务的价值。千禧黎明使用经购买力平价(PPP)调整后的GDP，因为这一数值考虑到了当地的经济状况，使国家比较更加有用。"
 NUM_GDP_TOTAL: "$$§Y[?ROOT.gdp_total|1]§!b"
