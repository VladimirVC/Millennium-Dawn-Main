 helicopter_armor_gen4: "4th Generation Helicopter Armor"
 helicopter_armor_gen4_desc: "Os avanços na tecnologia e doutrina de blindagem levaram ao desenvolvimento de esquemas de blindagem modulares adaptados a conjuntos de missões específicos."
 helicopter_armor_gen5: "5th Generation Helicopter Armor"
 helicopter_armor_gen5_desc: "Os avanços na tecnologia e doutrina de blindagem levaram ao desenvolvimento de esquemas de blindagem modulares adaptados a conjuntos de missões específicos."
 sensors_and_avionics_gen_6: "6th Generation Sensors and Avionics"
 sensors_and_avionics_gen_6_desc: "Atualmente, estamos em processo de integração da IA ​​no sistema, analisando terabytes de dados de diversos sensores, como radar, FLIR, LIDAR e outros, para fornecer uma imagem abrangente e precisa do campo de batalha."
 sensors_and_avionics_gen_7: "7th Generation Sensors and Avionics"
 sensors_and_avionics_gen_7_desc: "Atualmente, estamos em processo de integração da IA ​​no sistema, analisando terabytes de dados de diversos sensores, como radar, FLIR, LIDAR e outros, para fornecer uma imagem abrangente e precisa do campo de batalha."
 active_defence_system_gen4: "2nd Gen Helicopter APS Laser Hard-Kill"
 active_defence_system_gen4_desc: "Um sistema de defesa de energia dirigida capaz de incapacitar fisicamente os projécteis. Dispara um laser de alta energia para destruir ou desviar mísseis antes do impacto. Representa a mais recente geração de proteção ativa para aeronaves de asa rotativa."
 active_defence_system_gen5: "3rd Gen Helicopter APS Laser Hard-Kill"
 active_defence_system_gen5_desc: "Um sistema de defesa de energia dirigida capaz de incapacitar fisicamente os projécteis. Dispara um laser de alta energia para destruir ou desviar mísseis antes do impacto. Representa a mais recente geração de proteção ativa para aeronaves de asa rotativa."
 stealth_modification_gen4: "4th Generation Stealth Modification"
 stealth_modification_gen4_desc: "Com um foco ainda maior na furtividade, os sistemas de helicópteros incorporam agora materiais avançados, sistemas de camuflagem adaptativa e tecnologia de redução de assinatura acústica. São utilizados metamateriais avançados e nanotecnologia, juntamente com camuflagem adaptativa. Os rotores Fenestron tornaram-se padrão."
 stealth_modification_gen5: "5th Generation Stealth Modification"
 stealth_modification_gen5_desc: "Com um foco ainda maior na furtividade, os sistemas de helicópteros incorporam agora materiais avançados, sistemas de camuflagem adaptativa e tecnologia de redução de assinatura acústica. São utilizados metamateriais avançados e nanotecnologia, juntamente com camuflagem adaptativa. Os rotores Fenestron tornaram-se padrão."
 helicopter_gun_pod_gen6: "6th Generation Gun Pod"
 helicopter_gun_pod_gen6_desc: "Os canhões de 5ª geração apresentam miniaturas de canhões eletromagnéticos ou canhões de bobina, aumentando ainda mais a letalidade."
 helicopter_gun_pod_gen7: "7th Generation Gun Pod"
 helicopter_gun_pod_gen7_desc: "Os canhões de 5ª geração apresentam miniaturas de canhões eletromagnéticos ou canhões de bobina, aumentando ainda mais a letalidade."
 helicopter_light_nose_gun_gen4: "4th Generation 12.7mm Nose Gun"
 helicopter_light_nose_gun_gen4_desc: "The fourth generation of nose mounted machine guns is characterized by advancements in automation and autonomous capabilities. Machine guns are now fully integrated with the pilot's helmet mounted displays.\n\n§GDesigner Hint: Light Nose Guns are effective against infantry but NOT armored vehicles§!"
 helicopter_light_nose_gun_gen5: "5th Generation 12.7mm Nose Gun"
 helicopter_light_nose_gun_gen5_desc: "The fifth generation of nose mounted machine guns is characterized by advancements in automation and autonomous capabilities. Machine guns are now fully integrated with the pilot's helmet mounted displays.\n\n§GDesigner Hint: Light Nose Guns are effective against infantry but NOT armored vehicles§!"
 helicopter_medium_nose_gun_gen4: "4th Generation 20mm Nose Gun"
 helicopter_medium_nose_gun_gen4_desc: "The fourth generation of nose mounted 20mm guns includes even more advanced fire control systems, lightweight munitions and semi-autonomous targeting with AI-driven targeting and predictive firing solutions along with munitions employing the latest advancements in materials science.\n\n§GDesigner Hint: Medium Nose Guns provide a balance of anti-armor and anti-infantry capabilities§!"
 helicopter_medium_nose_gun_gen5: "5th Generation 20mm Nose Gun"
 helicopter_medium_nose_gun_gen5_desc: "The fifth generation of nose mounted 20mm guns includes even more advanced fire control systems, lightweight munitions and semi-autonomous targeting with AI-driven targeting and predictive firing solutions along with munitions employing the latest advancements in materials science.\n\n§GDesigner Hint: Medium Nose Guns provide a balance of anti-armor and anti-infantry capabilities§!"
 helicopter_heavy_nose_gun_gen4: "4th Generation 30mm Nose Gun"
 helicopter_heavy_nose_gun_gen4_desc: "The fourth generation of nose mounted 30mm guns includes even more advanced fire control systems, lightweight munitions and semi-autonomous targeting with AI-driven targeting and predictive firing solutions along with munitions employing the latest advancements in materials science.\n\n§GDesigner Hint: Heavy Nose Guns provide a better anti-armor capabilities at the cost of anti-infantry capabilities§!"
 helicopter_heavy_nose_gun_gen5: "5th Generation 30mm Nose Gun"
 helicopter_heavy_nose_gun_gen5_desc: "The fifth generation of nose mounted 30mm guns includes even more advanced fire control systems, lightweight munitions and semi-autonomous targeting with AI-driven targeting and predictive firing solutions along with munitions employing the latest advancements in materials science.\n\n§GDesigner Hint: Heavy Nose Guns provide a better anti-armor capabilities at the cost of anti-infantry capabilities§!"
 helicopter_atgm_gen6: "6th Generation ATGM"
 helicopter_atgm_gen6_desc: "The sixth generation of ATGMs is characterised by further advancements in seeker technology, target discrimination, range, and engagement capabilities. Features include improved network-centric warfare integration, increased automation, and even more sophisticated counter-countermeasure capabilities."
 helicopter_atgm_gen7: "7th Generation ATGM"
 helicopter_atgm_gen7_desc: "A sétima geração de mísseis antitanque é caracterizada por avanços adicionais na tecnologia de busca, discriminação de alvos, alcance e capacidades de empenhamento. As características incluem uma melhor integração de guerra centrada em redes, maior automatização e capacidades de contramedidas ainda mais sofisticadas."
 helicopter_multiple_atgm_gen6: "Quadruple 6th Generation ATGM"
 helicopter_multiple_atgm_gen6_desc: "The sixth generation of ATGMs is characterised by further advancements in seeker technology, target discrimination, range, and engagement capabilities. Features include improved network-centric warfare integration, increased automation, and even more sophisticated counter-countermeasure capabilities."
