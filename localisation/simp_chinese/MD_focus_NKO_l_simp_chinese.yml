 NKO_export_munitions: "将常规武器运送至[FROM.GetNameWithFlag]"
 NKO_export_munitions_desc: "将武器从人民军仓库通过铁路运往前线。[FROM.GetName]选择他们最需要的师级单位 - §Y轻步兵§!，§Y摩托化§!，§Y装甲§!或者§Y机械化§! - 我们从自己的库存中直接调拨足够§Y三个营§!使用的现代化装备，这些装备都是基于1995年或更新的设计。装甲车辆和机械化装备需要采用现代化的坦克设计。我们不提供飞机。他们战斗得更努力，而我们得到的报酬越丰厚。"
 NKO_deploy_storm_corps: "向[FROM.GetNameWithFlag]部署暴风部队"
 NKO_deploy_storm_corps_desc: "向[FROM.GetName]提出干预朝鲜的提议。如果他们接受，我们将能够派遣§Y志愿部队§!前往他们的前线，这将加强我们与赞助者的关系并赢得他们的感激。向§Y俄罗斯§!或§Y中国§!部署兵力会开启一种永久性的硬通货补贴，即使部队撤回国内后这种补贴仍然持续。这需要奉行§Y全球干涉主义§!外交政策。"
 NKO_arms_export_lobby_relief: "游说解除制裁"
 NKO_arms_export_lobby_relief_desc: "利用我们装备精良的伙伴的外交影响力，以及一笔不为人知的现金，在联合国争取国际制裁放松一级。"
 NKO_arms_export_capstone: "多极化世界的兵工厂"
 NKO_arms_export_capstone_desc: "在武装了反对帝国主义秩序的国家联盟之后，正式确立了平壤作为多极世界工厂的角色。"
 NKO_arms_export_relief_deals_tt: "已经完成至少§Y5§!项出口交易"
 NKO_arms_export_relief_sanctions_tt: "目前正处于国际制裁之下"
 NKO_arms_export_unlock_tt: "§G解锁外交事务办公室、对外武器和人力出口计划。§!"
 NKO_export_munitions_effect_tt: "如果他们接受，客户会要求一个师级装备方案，我们会§Y从我们自己的库存§!中提供足够§Y三个营§!使用的基于§Y1995 年或更新设计§!的硬件。装甲和机械化装备需要§Y现代坦克设计§!（至少一半是冷战后模块）。§R不提供飞机§!。我们以§Y硬通货§!获得报酬，新客户还会根据合同金额提供永久性的工厂产量加成：§G+1%§!轻步兵，§G+2%§!摩托化，§G+3%§!装甲与机械化。同时制裁压力上升。\n\n客户获得§Y朝鲜弹药§!，持续§Y365§!天：\n§G+5%§!部队攻击\n§G+5%§!部队恢复率\n§G-5%§!补给消耗"
 NKO_export_troops_effect_tt: "我们提议派遣干预部队。如果东道国接受，我们便可向其派遣§Y志愿师§!参与战争，同时还能获得政治支持和外汇收入。国内不会损失任何人力。"
 NKO_storm_corps_permanent_income_tt: "作为大国赞助者，他们提供§Y永久性§!每周硬通货补贴，即使在风暴军团返回家园后也继续提供。"
 NKO_arms_client_munitions: "朝鲜弹药"
 NKO_arms_client_munitions_desc: "成箱的朝鲜炮弹和步枪让战火持续燃烧。"
 NKO_arms_client_troops: "朝鲜人民军志愿者"
 NKO_arms_client_troops_desc: "风暴军团老兵们稳住前线，坚守阵地。"
 NKO_storm_corps_abroad: "风暴军团于海外部署"
 NKO_storm_corps_abroad_desc: "我们最好的部队正在打一场对外战争。他们的缺席在人力和士气上都让人感到宾至如归。"
 NKO_arms_export_capstone_spirit: "多极化世界的兵工厂"
 NKO_arms_export_capstone_spirit_desc: "平壤已成为抵抗西方列强的国家不可或缺的供应商。我们的工厂全速运转，不受制裁压力的影响。"
 NKO_export.1.t: "莫斯科需要炮弹"
 NKO_export.1.d: "俄罗斯的攻势消耗弹药的速度远远超过了其工厂的供应能力。克里姆林宫正通过秘密渠道向平壤请求炮弹、火箭弹以及人民军队能够提供的任何其他物资。回报将十分丰厚：现金、粮食以及我们长期以来梦寐以求的军事技术。"
 NKO_export.1.a: "满足此要求"
 NKO_export.1.b: "现在还不是时候"
 NKO_export.10.t: "[FROM.GetNameWithFlag]提供军火援助"
 NKO_export.10.d: "平壤方面提出以硬通货支付，向我们疲于奔命的部队提供一批现代化武器装备。我们可以申请我们最需要的师级装备 - 足够§Y三个营§!使用的物资，直接从朝鲜的库存中提取。"
 NKO_export.10.a: "申请§Y轻步兵§!装备方案 - 步枪和指挥装备"
 NKO_export.10.b: "拒绝提议"
 NKO_export.11.t: "[FROM.GetNameWithFlag]接受我们的军火"
 NKO_export.11.d: "[FROM.GetName]已接受我们的提议。货物已从我们的仓库发往前线，外汇款项已到账。"
 NKO_export.11.a: "装载火车"
 NKO_export.12.t: "[FROM.GetNameWithFlag]拒绝我们的军火"
 NKO_export.12.d: "[FROM.GetName]拒绝了我们的武器。这些箱子将留在我们的仓库里。"
 NKO_export.12.a: "就这样吧"
 NKO_export.99.t: "多极化世界的兵工厂"
 NKO_export.99.d: "从莫斯科到德黑兰，十几个国家的军队的枪炮都由朝鲜的工厂生产。最初为了获取硬通货而进行的无奈交易，如今却使朝鲜民主主义人民共和国成为所有与华盛顿对抗的强权不可或缺的伙伴。革命的工厂找到了它的客户。"
 NKO_export.99.a: "让世界依赖我们"
 NKO_export.22.t: "平壤提议派遣干预部队"
 NKO_export.22.d: "[FROM.GetName]提议向我方前线部署朝鲜志愿师。他们的士兵将与我方并肩作战，对抗敌人。平壤提出的这项干预提议，我们实在无法拒绝。"
 NKO_export.22.a: "接收他们的士兵"
 NKO_export.22.b: "拒绝提议"
 NKO_export.20.t: "[FROM.GetNameWithFlag]需要人力"
 NKO_export.20.d: "我军风暴军团已在[FROM.GetName]地区作战，但该地区兵力储备已耗尽。其指挥部请求平壤增派人手坚守阵地。"
 NKO_export.20.a: "派遣增援"
 NKO_export.20.b: "我们也抽不出人手"
 NKO_export_send_manpower_tt: "§G从我们的后备力量中抽调相当于[FROM.GetName]可招募人员总数§Y10%§!的人力。§!"
 NKO_export.40.t: "西方以制裁回应"
 NKO_export.40.d: "我们的硬件不断出现在帝国主义者想要封锁的战线上。[USA.GetName]联合[FRA.GetName]、[GER.GetName]和[JAP.GetName]推出了一揽子新制裁措施：冻结账户、将贸易公司列入黑名单，并警告所有继续从平壤购买商品的人。我们以前就承受过他们的压力。"
 NKO_export.40.a: "让帝国主义者们尽情咆哮吧。"
 NKO_export.40.b: "默默承受打击"
 NKO_arms_contract_title: "§Y赞助人志愿者承诺§!"
 NKO_expeditions_readout: "已承诺的远征：§G[?NKO_expeditions_completed|0]§!"
 NKO_commit_volunteers: "将志愿远征队派遣至[FROM.GetName]"
 NKO_commit_volunteers_desc: "正式部署我方志愿师在[FROM.GetName]作战。平壤向其赞助方收取人力费用，并收取硬通货。[FROM.GetName]为我方部队支付高额费用。"
 NKO_commit_volunteers_req_tt: "[FROM.GetName]可接纳至少§Y6§!个我方志愿师"
 NKO_commit_volunteers_effect_tt: "向我国§Y国库§!转入硬通货。当我们的§Y志愿部队§!继续在海外作战时，持续的部署训练着我们的军队，使我们每周都能获得§Y陆军作战理论§!。"
 NKO_economy_shortcut: "经济"
 NKO_military_shortcut: "军事"
 NKO_38th_parallel_shortcut: "三八线"
 NKO_political_shortcut: "政治"
 NKO_overcome_the_arduous_march: "克服苦难行军"
 NKO_overcome_the_arduous_march_desc: "饥荒年代已经过去。农业恢复了，熙川重建了，新兴市场阶层也融入了社会。我们终于可以宣布艰苦卓绝的征程已经结束，并将国家的全部力量投入到国家复苏中。"
 NKO_renovate_water_supply_facilities: "改造供水设施"
 NKO_renovate_water_supply_facilities_desc: "改造和扩建供水设施对公共卫生和工业发展至关重要。我们将确保所有市民和企业都能获得清洁可靠的用水。"
 NKO_national_power_grid: "国家电网"
 NKO_national_power_grid_desc: "将我们的可再生能源电站和水力发电厂连接到统一的国家电网，将稳定工厂和家庭的电力供应，结束长期以来严重影响生产的轮流停电。"
 NKO_pojon_field_responsibility: "圃田担当制"
 NKO_pojon_field_responsibility_desc: "圃田担当制赋予小型家庭劳动团队对超出国家配额的农业剩余产品的自主权。通过允许农民保留奖励性收成，生产得以扩大，粮食安全得到加强。"
 NKO_rason_ftz: "罗先特别经济区"
 NKO_rason_ftz_desc: "位于朝鲜东北部的罗先自由贸易区，由中俄两国共同投资开发，为朝鲜开启了合法跨境贸易的大门。控制罗津港和边境通道，将促进朝鲜经济的持续发展。"
 NKO_koryolink_network: "高丽移动网络"
 NKO_koryolink_network_desc: "高丽电信于2008年推出，是与奥斯康电信合作建设的3G网络，为数百万用户提供现代化的电信服务。移动网络实现了信息流的现代化，并降低了对国家控制媒体的依赖。"
 NKO_pyongyang_prestige_streets: "平壤名胜街"
 NKO_pyongyang_prestige_streets_desc: "诸如未来科学家大街和黎明大街等标志性街道，为了展现国家现代化和无视国际制裁的姿态，建设速度非常快。这些城市地标提升了民众士气和国际声望。"
 NKO_ryugyong_hotel: "柳京饭店竣工"
 NKO_ryugyong_hotel_desc: "长期闲置的105层金字塔形柳京饭店在2008年至2011年间完成了全玻璃外墙的安装。这座建筑地标象征着国家的科技雄心和经济复苏。"
 NKO_exporting_workforce: "输出劳动力"
 NKO_chollima_speed: "千里马速度"
 NKO_field_responsibility_system: "圃田担当制"
 NKO_field_responsibility_system_desc: "圃田担当制赋予农民劳动队保留超出国家配额的剩余收成的权力，从而激励生产。持续的农业产量能够改善粮食安全和提升民众士气。"
 NKO_mobile_network: "高丽移动网络"
 NKO_mobile_network_desc: "现代3G电信网络覆盖数百万用户，实现了通信基础设施的现代化。信息获取渠道的改善和对官方媒体依赖性的降低，有助于缓解社会压力。"
 NKO_people_army: "人民军"
 NKO_people_army_desc: "人民军即使在“苦难行军”的困难时期也必须做好战争准备，以保卫我国免受美帝国主义及其南伪傀儡的侵害。"
 NKO_national_defence_force: "国家防御"
 NKO_national_defence_force_desc: "我们将增加军费开支，与南方国家持平，以确保国家安全，免受任何威胁。"
 NKO_red_dawn: "赤色黎明"
 NKO_red_dawn_desc: "随着我们军事力量的增强，我们的革命精神必将再次闪耀光芒。让这成为我们迈向霸权的坚定征程的开端。"
 NKO_studying_their_airforce: "研究敌人的空军力量"
 NKO_studying_their_airforce_desc: "为应对不可避免的冲突，我们必须研究敌方空军力量，掌握其优势与弱点，并制定相应的反制策略。"
 NKO_focus_on_the_f_35: "关注F-35"
 NKO_focus_on_the_f_35_desc: "我们将分析F-35的技术，以它的设计为灵感，提高我们自身的空中能力，并对抗任何拥有这种先进战斗机的国家。"
 NKO_focus_on_the_f_16: "关注F-16"
 NKO_focus_on_the_f_16_desc: "F-16已证明自己是一款性能卓越的战斗机。我们将深入剖析其战术与技术，在此过程中提升我们自己的战斗机编队实力。"
 NKO_focus_on_the_future_kai_kf_21: "关注KF-21"
 NKO_focus_on_the_future_kai_kf_21_desc: "KF-21是韩国的下一代战斗机。通过分析其潜力，我们为空军应对其可能构成的任何威胁做好了准备。"
 NKO_begin_uranium_enrichment: "开始铀浓缩"
 NKO_begin_uranium_enrichment_desc: "无论是为了解放韩国人民，还是为了保卫我们伟大的祖国免受美帝国主义的核威胁，我们都应该坚定不移、勇敢无畏地继续发展核武器！"
 NKO_remove_monitoring_devices: "移除监控装置"
 NKO_remove_monitoring_devices_desc: "我们的铀浓缩活动必然会遭到国际社会的抵制。因此，我们能做的最好的事情，就是掩盖铀浓缩活动，让国际社会视而不见。"
 NKO_expel_inspectors: "驱逐监察员"
 NKO_expel_inspectors_desc: "国际原子能机构曾向我国派遣大量核查人员，以确保我们只使用核技术作为能源供应。既然我们即将摆脱他们的控制，不如顺便把这些帝国主义间谍也驱逐出境。"
 NKO_withdraw_from_npt: "退出《不扩散核武器条约》"
 NKO_withdraw_from_npt_desc: "我国核项目关系到我国的独立与安全，其一个重要步骤是退出《不扩散核武器条约》。我们不能因为荒谬的帝国主义不平等条约而限制我们捍卫国家独立和安全的能力！"
 NKO_missile_tests: "导弹测试"
 NKO_missile_tests_desc: "朝鲜的导弹试验旨在展示其日益增强的弹道导弹能力，涵盖从短程导弹到洲际弹道导弹的多种系统。这些试验对于提升其军事技术、巩固地区影响力以及传递战略意图至关重要，但往往也会加剧紧张局势并引发国际社会的反应。"
 NKO_nuclear_tests: "核试验"
 NKO_nuclear_tests_desc: "朝鲜的核试验是该国自2006年以来进行的一系列地下核爆，是其核武器发展计划的一部分。这些试验展示了朝鲜在武器当量和技术方面的进步，往往引发国际社会的谴责和制裁。它们是朝鲜确保政权安全和在全球舞台上展现实力战略的关键组成部分。"
 NKO_our_pride_and_joy: "我们的骄傲和喜悦"
 NKO_our_pride_and_joy_desc: "欢呼吧！面对美帝国主义及其附庸国的严酷封锁，在敬爱的[NKO.GetLeader]同志的领导下，我们朝鲜民主主义人民共和国终于拥有了自己的核反制力量！美帝国主义侵略者企图用核棒勒索我们的日子已经一去不复返了！"
 NKO_nuclear_approval_not_sco: "我们必须不是上海合作组织成员"
 NKO_people_air_force: "人民空军"
 NKO_people_air_force_desc: "朝鲜的天空必须严防美帝国主义及其南方傀儡的任何侵犯。如果我们不提高空中能力，这将成为一项艰巨的任务。"
 NKO_self_produced_rifles: "国产步枪"
 NKO_self_produced_rifles_desc: "朝鲜人民军不能依赖外国供应商提供制式步枪。国内兵工厂将加大力度批量生产轻武器，确保每名士兵都配备国产武器。"
 NKO_model_master: "现代巨兽"
 NKO_model_master_desc: "朝鲜的坦克发展重点在于生产适应其地形和军事理论的国产装甲车辆。这些坦克涵盖了从苏式坦克到现代化改进型的各种型号，在朝鲜陆军中发挥着至关重要的作用，强调机动性、火力和在各种作战场景中作战的能力。"
 NKO_artillery: "我们的炮兵"
 NKO_artillery_desc: "朝鲜的炮兵是其军事战略的基石，拥有从传统榴弹炮到先进火箭炮的庞大系统阵列。火炮以其庞大的储备而闻名，旨在提供压倒性火力，既能瞄准军事设施，也能瞄准民用区域，尤其是邻国南朝鲜，使其成为威慑和进攻的关键因素。"
 NKO_spaa: "我们的防空体系"
 NKO_spaa_desc: "朝鲜的防空系统混合了苏联时代的技术和自主开发平台，旨在保护关键基础设施并应对潜在空中威胁。该系统包括地对空导弹、高射炮和雷达系统，强调分层防御战略。尽管与现代化系统相比有存在局限，但体现了该国对自主防御和威慑能力的重视。"
 NKO_rocket_artillery: "火箭炮"
 NKO_rocket_artillery_desc: "朝鲜火箭炮是其军队的重要组成部分，拥有包括威力强大的KN-09和KN-25在内的多种型号。这些平台专为远程精确打击设计，能够对军事目标和战略要地实施强劲火力覆盖。其高机动性和快速部署能力显著增强了朝鲜投射武力和维持进攻行动的能力。"
 NKO_naval_modernization: "海军现代化"
 NKO_naval_modernization_desc: "朝鲜海军现代化进程着重于通过小型灵活舰艇与先进导弹系统提升作战能力。这包括开发能够发射弹道导弹的潜艇，并为水面舰艇配备现代化武器系统。该举措体现了一种非对称作战战略，旨在依托沿海及水下作战力量制衡更强大的海军力量，并在周边水域展示实力。"
 NKO_anti_submarine: "反潜能力"
 NKO_anti_submarine_desc: "朝鲜的反潜能力有限但正在发展，主要依靠巡逻艇、深水炸弹和配备声纳的船只组合。改进这些系统的努力包括部署更小型、更灵活的船只，并尝试自主研发技术。这些能力旨在保卫沿海水域，应对对手的潜在潜艇入侵，确保近海海域安全。"
 NKO_infiltration_by_sea: "海上渗透"
 NKO_infiltration_by_sea_desc: "朝鲜的海上渗透战略利用其小型快速船只、潜艇和半潜式舰队进行秘密行动。这些装备能够运送特种部队和设备，通常难以被察觉，用于侦察、破坏或非常规作战。这种方法凸显了朝鲜强调不对称战术，以利用敌方海岸线的薄弱环节。"
 NKO_submarine_development: "发展潜艇"
 NKO_submarine_development_desc: ""
 NKO_upgrade_shipyards: "升级造船厂"
 NKO_upgrade_shipyards_desc: "朝鲜的潜艇发展重点是扩大其舰队，增加常规和战略舰艇，包括新浦级弹道导弹潜艇。该计划凸显了该国建立可靠水下威慑力量的雄心，增强了其核战略的隐身性和生存能力。通过结合本土设计和旧型号的现代化，朝鲜优先发展不对称海军能力，以加强其防御和战略影响力。"
 NKO_expand_bases: "扩建海军基地"
 NKO_expand_bases_desc: "朝鲜扩大军事基地的战略反映了其对加强国防和战备的重视。这包括升级现有设施、建造新的地下掩体和加强后勤中心以支持其军队。基地扩建旨在提高部队部署效率、保护关键资产并提供战略纵深，确保在关键战略要地上投射力量的同时抵御潜在攻击的能力。这些发展也旨在支持导弹系统、潜艇和其他军事硬件的进步。"
 NKO_green_water_navy: "绿水海军"
 NKO_green_water_navy_desc: "朝鲜发展绿水海军的重点是将其作战范围从沿海水域扩大到区域海域。该战略包括部署小型护卫舰、轻型护卫舰和导弹艇，同时努力增强潜艇能力。目标是保护领土主张、支持不对称战争战略，并在区域海域（特别是黄海和日本海）投射有限的力量。这种方法凸显了朝鲜在成本效益高的现代化与战略军事目标之间取得平衡的雄心。"
 NKO_revolutionary_military_spirit: "革命军事精神"
 NKO_revolutionary_military_spirit_desc: "朝鲜的“革命军事精神”概念是一种核心意识形态，强调对国家及其领导人的绝对忠诚、纪律和奉献精神。它为军队提供激励框架，鼓励其培养韧性、自力更生和在逆境中牺牲奉献的精神。这种民族精神是朝鲜军事文化的基石，它促进了团结和决心，以应对经济和技术挑战，实现战略目标。它体现了政治意识形态与军事战略的融合，并成为朝鲜国防行动背后的驱动力。"
 NKO_expand_peasant_militia: "拓展工农赤卫军"
 NKO_domestic_naval_strategy: "本土海军战略"
 NKO_domestic_naval_strategy_desc: "为现代海军理论奠定基础。该计划的每个分支——潜艇、导弹艇、近海防御和特种作战——都将获得各自份额的资源，以启动研发工作。"
 NKO_domestic_submarine_program: "国产潜艇项目"
 NKO_domestic_submarine_program_desc: "集中力量发展国产潜艇。改进艇体制造工艺，加强艇员训练，将使我们拥有所需的无声打击力量，足以威慑远离海岸的敌人。"
 NKO_domestic_destroyer_buildup: "国产驱逐舰制造"
 NKO_domestic_destroyer_buildup_desc: "大规模生产导弹艇和小型水面作战舰艇，以便在近海海域对敌方舰队形成蜂拥攻击。我们的造船厂建造舰体的速度比南方部署重型驱逐舰的速度还要快。"
 NKO_destroyer_unleashed: "驱逐舰出击"
 NKO_destroyer_unleashed_desc: "部署新一代配备更重型火炮和专用防空炮的驱逐舰。舰队最终将能够参与远洋作战，而不是仅仅沿海岸线作战。"
 NKO_navy_projects: "朝鲜海军计划"
 NKO_navy_projects_desc: "建立一支现代化海军将使我们能够保卫近海海域，并向整个地区投射力量。这些新舰艇将构成我们未来舰队的核心。"
 NKO_expand_peasant_militia_desc: "朝鲜扩充工农赤卫队是一项旨在通过大规模动员加强国防的战略举措。这支由平民组成的准军事部队的任务是补充正规军事行动、保卫地方社区和维护国内安全。扩充工作包括加强训练、为民兵成员配备轻武器以及将其纳入更广泛的军事演习。这种做法体现了朝鲜重视非对称战争和“全民防御”战略，旨在确保拥有一支规模庞大、分散化的军队，以抵御外部威胁并维护国内稳定。"
 NKO_bolster_young_red_guards: "壮大青年赤卫军"
 NKO_bolster_young_red_guards_desc: "加强朝鲜青年准军事组织“青年赤卫军”的建设是一项重要举措，旨在向年轻人灌输思想忠诚和军事备战意识。该计划通过强化学生的军事训练、政治教育和体能锻炼，将他们纳入国家国防演习体系。通过为“青年赤卫军”配备基本武器和生存技能，朝鲜确保能够持续培养出思想坚定、具备战斗能力的人员，在冲突时期支持正规武装部队。这一举措凸显了朝鲜政权依赖青年动员作为其“全民国防”战略的一部分。"
 NKO_rebuild_sso: "特种部队改革"
 NKO_rebuild_sso_desc: "朝鲜特种部队改革的重点是实现其精锐部队的现代化并提高其执行不对称战争、非常规行动和快速反应任务的能力。改革包括改进训练方法、采用先进战术、为部队配备现代化武器和通信系统。特种部队擅长渗透、破坏、侦察和直接行动，通常以战略资产或重要基础设施为目标。改革的目的是提高特种部队在地区冲突中的战斗力，增强其威慑力，并为各种高风险任务做好准备。这一重点反映了朝鲜在战略上对高技能、敏捷部队的依赖，以弥补常规军事力量的局限。"
 NKO_rebuild_kim_il_sung_military_university: "重建金日成军事综合大学"
 NKO_rebuild_kim_il_sung_military_university_desc: "金日成军事大学是平壤的一所重要的国防学院，自1952年以来，这里汇集了众多朝鲜最优秀的军官。但进入新世纪后，这所大学的旧设施日益无法适应新型战争的需求。现在是时候恢复这一机构昔日荣光了。"
 NKO_revolutionary_spirits: "革命军事精神"
 NKO_the_green_water_navy: "绿水海军"
 NKO_the_green_water_navy_desc: "如果我们完成国策§H海军现代化§!，该国家精神将得到§Y提升§!。\n§W--------------§!\n绿水海军是指能够在本国近岸海域作战，但在周边边缘海域作战能力有限的海上力量。这是一个相对较新的术语，旨在更好地区分并补充两个长期使用的描述词之间的细微差别：蓝水海军（指远洋深水作战）和棕水海军（指近岸及沿岸水域作战）。"
 NKO_the_blue_water_navy: "蓝水海军"
 NKO_the_blue_water_navy_desc: "多年的船厂扩建、作战理论改革和联合演习，已将我们的舰队从一支近海舰队转变为一支真正的远洋海军。如今，我们能够远航至远海，其舰艇和人员配置足以与该地区的任何竞争对手匹敌。\n§W--------------§!\n蓝水海军是指能够在公海深水区持续作战，并将力量投射到远超其本土海岸的海上力量。"
 NKO_planned_economy: "计划经济"
 NKO_planned_economy_desc: "朝鲜，正式名称为朝鲜民主主义人民共和国（简称朝鲜），实行封闭且高度管制的计划经济。在计划经济体制下，经济由政府集中计划和协调，这是所有共产主义国家的典型特征。"
 NKO_the_38th_parallel: "三八线"
 NKO_the_38th_parallel_desc: "1953年7月，朝鲜半岛南北双方、中国志愿军以及联合国军签署了《朝鲜停战协定》，以北纬38度线为界，设立了朝鲜半岛非军事区。这条分界线已经存在了大约50年，或许现在是时候以某种方式走向统一了。"
 NKO_the_road_to_peace: "和平之路？"
 NKO_the_road_to_peace_desc: "韩国的“阳光政策”似乎表达了对统一的真诚愿望。也许现在是朝韩之间的同志们为统一而共同努力的时候了。"
 NKO_the_road_to_war: "战争之路"
 NKO_the_road_to_war_desc: "美帝国主义及其南朝鲜傀儡过去、现在和将来都不可能实现朝鲜的真正统一。武力统一才是永恒的真理。"
 NKO_end_six_party_negotiations: "准备核武器"
 NKO_end_six_party_negotiations_desc: "六方会谈除了拖延时间之外一无所获。我们将退出谈判桌，并将我们的核威慑力量全面部署到位。韩国、日本和美国将会明白，我们的安全不是他们可以随意谈判的。"
 NKO_remilitarize_the_dmz: "非军事区再军事化"
 NKO_remilitarize_the_dmz_desc: "重新军事化非军事区将标志着我们与南方冲突的显著升级，但无疑将使我军在即将到来的冲突中占据优势。"
 NKO_struggle_for_power: "权力斗争"
 NKO_struggle_for_power_desc: "金正恩与其兄金正男之间的权力斗争，是朝鲜统治家族内部一场隐秘的继承权争夺战。在他们的父亲金正日去世后，兄弟二人都被视为政权的潜在继承人。金正男一度被视为最受青睐的继承人，但由于他公开批评政权以及流亡澳门而失宠。与此同时，在有影响力的精英阶层的支持下，金正恩通过战略联盟和内部清洗巩固了自己的地位。这场斗争最终以金正恩于2011年上台而告终，但随后在2017年发生了金正男的神秘遇刺事件，许多人认为这是朝鲜政府策划的。这场冲突凸显了世界上最神秘的政权之一——朝鲜——内部权力斗争的残酷本质。"
 NKO_orthodox_successor: "正统的继承者"
 NKO_orthodox_successor_desc: "1990年代，金正恩因资历出众，被伟大的金正日将军选为权力接班人。上天在过去、现在和未来赐予朝鲜人民的敬爱的金正恩同志将永远守护主体朝鲜的安全和繁荣。"
 NKO_promote_self_reliance: "促进自力更生"
 NKO_promote_self_reliance_desc: "一个国家不能靠别人富强，只有自力更生才能强大！"
 NKO_ostracize_kim_jong_nam: "放逐金正男"
 NKO_ostracize_kim_jong_nam_desc: "通过排挤金正男，让“父亲”更加不信任他，我们就有更大的机会掌权。"
 NKO_bribe_kpa_seniors: "贿赂朝鲜人民军元老"
 NKO_bribe_kpa_seniors_desc: "朝鲜人民军的将军们手握兵权，有这些元老的支持，我们更有可能掌控局面。"
 NKO_oppose_to_chinese_reform_road: "公开反对中国式改革道路"
 NKO_oppose_to_chinese_reform_road_desc: "中国的改革模式源于他们的集体领导体制。若将此模式照搬到朝鲜，必将引发社会动荡。而且“父亲”同样不支持这种做法。为了保证白头山血统的延续，我们应该公开反对使用中国模式进行改革。"
 NKO_discredit_jang_seong_taek: "诋毁张成泽"
 NKO_discredit_jang_seong_taek_desc: "张成泽是朝鲜著名的亲中派，也是父亲的身边红人。这种出卖国家利益的叛徒绝不能容忍。为了顺利掌权，我们必须收集他的罪证，在父亲面前揭发他。"
 NKO_call_for_change: "变革的呼声"
 NKO_call_for_change_desc: "朝鲜民主主义人民共和国已经实行计划经济近50年。但是“苏东剧变”和“苦难行军”连续的到来，证明了国家计划经济已经不再适应新世纪的发展需求。朝鲜要想再次强大，就需要一场大胆而深刻的改革。"
 NKO_pull_in_young_military_officers: "拉拢青年军官"
 NKO_pull_in_young_military_officers_desc: "从朝鲜人民军中拉拢年轻、思想开放的军官对我们并无害处，他们更贴近基层官兵，更有利于我们掌控部队。"
 NKO_frame_opposition: "陷害反对派"
 NKO_frame_opposition_desc: "陷害金正恩的策略是将他描绘成朝鲜领导层中鲁莽且破坏稳定的力量。通过强调他的激进清洗、不稳定的决策和缺乏外交技巧，我们可以将他定位为对该政权稳定和地区安全的威胁。这一框架将他的行动与稳定、理性的领导愿景形成鲜明对比，强调需要一个更加平衡和国际上可接受的人物。通过精心策划的叙述、有针对性的信息传递和利用内部账户，其目的是削弱他的可信度并影响国内和国际舆论。"
 NKO_stir_up_father_son_relations: "挑起父子矛盾"
 NKO_stir_up_father_son_relations_desc: "想要在金正恩和金正日之间挑起矛盾并不容易，但是这会给我们赢得更多支持。"
 NKO_place_loyalists_in_kpa: "在人民军安插人马"
 NKO_place_loyalists_in_kpa_desc: "二十年前，当金正日与其同父异母兄弟都有机会接掌朝鲜领导权时，老一辈游击队员对金正日的支持是他最终当选为该国最高领导人的关键因素。如今朝鲜人民军已继承了这一传统。把效忠派安置在朝鲜人民军中，以加强我们对人民军的控制。"
 NKO_finding_reformist_of_party: "寻找党内改革派"
 NKO_finding_reformist_of_party_desc: "党内不是没有改革派，而是他们不敢在金正日的反对下发声，如果得到他们的支持就更有可能改变朝鲜。"
 NKO_power_struggle: "权力斗争"
 NKO_power_struggle_desc: "当今朝鲜的伟大领袖金正日同志迟早会去世，他的继任者无疑将是他的两个儿子金正男和金正恩中的一个。但是国无二主，他们两人都必须设法获得父亲的信任。在确定继承人之前，让天平偏向任何一方，都会导致稳定性降低。支持一方候选人而另一方不赞成，直到选出继任者并且确定其为继承人，否则将引发 £stability_texticon §Y稳定度§!丢失。\n\n如果我们的 £stability_texticon §Y稳定度§!没有超过45%，那么一旦金正日去世，军政府就会试图夺取政权。\n\n当前£stability_texticon §Y稳定度§!：[?NKO.stability|1%]\n\n目前\n§O金正恩§!的支持度：§Y[?ROOT.NKO_kim_jong_un]%§!\n§G金正男§!的支持度：§Y[?ROOT.NKO_kim_jong_nam]%§!\n\n§Y金正日选出的继承者§!：[ROOT.GetChosenSuccessor]\n§R最有可能得到权力的继承者§!：[ROOT.GetSuccessor]\n\n我们的领袖§Y金正日§!可能活不到2012年，因此要准备好在§Y2011§!年选出继任者！"
 NKO_1_increase_kim_jong_un_tt: "金正恩支持率§Y增加§!1%"
 NKO_2_increase_kim_jong_nam_tt: "金正男支持率§Y增加§!2%"
 NKO_3_increase_kim_jong_un_tt: "金正恩支持率§Y增加§!3%"
 NKO_3_increase_kim_jong_nam_tt: "金正男支持率§Y增加§!3%"
 NKO_2_5_increase_kim_jong_un_tt: "金正恩支持率§Y增加§!2% ~ 5%"
 NKO_2_5_increase_kim_jong_nam_tt: "金正男支持率§Y增加§!2% ~ 5%"
 NKO_5_decrease_kim_jong_un_tt: "金正恩支持率§Y下降§!5%"
 NKO_2_decrease_kim_jong_nam_tt: "金正男支持率§Y下降§!2%"
 NKO_3_decrease_kim_jong_un_tt: "金正恩支持率§Y下降§!3%"
 NKO_4_increase_kim_jong_nam_tt: "金正男支持率§Y下降§!4%"
 NKO_5_increase_kim_jong_nam_tt: "金正男支持率§Y下降§!5%"
 NKO_kim_jong_il_death: "金正日逝世"
 NKO_kim_jong_il_death_desc: "\n§W--------------§!\n该国策将于§H2011年12月17日上午8:30§!§Y解锁§!。敬爱的伟大领袖、朝鲜民主主义人民共和国奠基者、共和国永远的总统金正日，在乘坐火车访问当地的途中，因急性心肌梗塞并发心源性休克，于2011年12月17日上午8时30分去世。"
 NKO_junta: "军事政变"
 NKO_junta_desc: "中国和越南的成功改革为我们树立了良好榜样，但他们的改革并非一帆风顺。 如果我们自己的改革失败，我们就会亡党亡国而被南方吞并。 金正恩和金正男都希望进行不同程度的改革。 为了不失去我们的国家和我们的党，我们将不得不做出最艰难的选择……"
 NKO_preserve_songun: "坚持先军路线"
 NKO_preserve_songun_desc: "先军政治是军队的基础，必须坚持先军政治的理念。"
 NKO_entrench_military_authority: "巩固军政府权威"
 NKO_entrench_military_authority_desc: "虽然我们已动用军队从金氏王朝手中夺取了政权，但军队中仍有一些金氏的忠诚分子，我们将用我们的手段“说服”他们……"
 NKO_smash_black_market: "打击“市场”"
 NKO_smash_black_market_desc: "“市场”正在给我国造成巨大的破坏，必须立即制止！"
 NKO_determining_the_loyalty_of_army: "确定军队的绝对忠诚"
 NKO_determining_the_loyalty_of_army_desc: "现在我们可以提拔一些忠诚分子，让他们更加顺从于我们。"
 NKO_purge_dissenters: "清洗异己"
 NKO_purge_dissenters_desc: "为了在政权更迭的关键时刻维护国家稳定，我们必须立即逮捕所有潜在的异见分子！"
 NKO_crush_the_kims: "处决金氏家族"
 NKO_crush_the_kims_desc: "让金正日的儿子们活着终究是一个不稳定因素，秘密处决他们！"
 NKO_constrain_the_donju: "约束金主"
 NKO_constrain_the_donju_desc: "金主们之前为我国的经济发展做出了小小的贡献，让他们继续吧……"
 NKO_end_the_donju: "打击走私"
 NKO_end_the_donju_desc: "走私是重罪，尽管它对国家经济有所贡献，但现在是时候彻底清除这些违法者了。"
 NKO_high_pressure_politics: "高压政治"
 NKO_high_pressure_politics_desc: "民众的不满情绪已经高涨到如此地步，我们必须采取强硬手段来维持统治。"
 NKO_empower_the_state_security_department: "赋权人民军总参侦察总局"
 NKO_empower_the_state_security_department_desc: "我们现在需要授权军队侦察总局承担更多责任，成为国家的主要情报机构。侦察总局将发现、逮捕和清除潜在的破坏分子和帝国主义间谍。"
 NKO_chi_military_support: "中国的军事援助"
 NKO_chi_military_support_desc: "中国是我们永远的兄弟和盟友。为了在国际舞台上继续生存，我们将再次投入北京的怀抱。"
 NKO_chi_invest_resources: "资源开采援助"
 NKO_chi_invest_resources_desc: "我们愿意让中国资源公司进入我国境内"
 NKO_chi_banks: "中国银行"
 NKO_chi_banks_desc: "我们愿意让中国的银行进入我国境内"
 NKO_chi_help_factories: "中国工厂"
 NKO_chi_help_factories_desc: "我们打算请求中国政府帮助在我国境内建设新工厂。"
 NKO_chi_huawei: "与华为合作"
 NKO_chi_huawei_desc: "华为公司是世界上最知名的企业之一，我们希望中国政府允许他们在我国境内开展业务。"
 NKO_military_collectives: "军政府统治"
 NKO_military_collectives_desc: "我们的人民还没有准备好拥抱西方，我们需要继续维持我们的统治。"
 NKO_encourage_private_enterprise: "鼓励私营企业"
 NKO_encourage_private_enterprise_desc: "私营企业是未来经济发展的引擎，我们打算大力鼓励其发展。"
 NKO_market_based_economy: "市场导向型经济"
 NKO_market_based_economy_desc: "我们的经济体系给我们带来的只有问题和持续的危机，是时候改变它了。"
 NKO_reorganising_government: "重组政府"
 NKO_reorganising_government_desc: "现在是重组政府的时候了，国家需要一个新政府。"
 NKO_kim_jong_un: "金正恩"
 NKO_kim_jong_un_desc: "作为被寄予厚望的金正日接班人，金正恩希望在国家稳定团结的情况下，进行适当的经济改革，提振国家经济。 然而，他并不想失去稳固的权力和“白头山血脉”的崇高地位……"
 NKO_consolidate_power: "巩固权力"
 NKO_consolidate_power_desc: ""
 NKO_light_industry_develop: "发展轻工业"
 NKO_light_industry_develop_desc: ""
 NKO_criticize_ineptitude: "批评无能官员"
 NKO_criticize_ineptitude_desc: ""
 NKO_improvement_of_people_live: "改善人民生活"
 NKO_improvement_of_people_live_desc: ""
 NKO_people_support: "人民的支持"
 NKO_people_support_desc: ""
 NKO_centralize_power: "集中权力"
 NKO_centralize_power_desc: ""
 NKO_root_out_corruption: "打击腐败"
 NKO_root_out_corruption_desc: ""
 NKO_formalize_power_structures: "权力结构正规化"
 NKO_formalize_power_structures_desc: ""
 NKO_assassinate_kim_jong_nam: "刺杀金正男"
 NKO_assassinate_kim_jong_nam_desc: "金正男不死，将永远是我们政权稳定的威胁，不惜一切代价除掉他。"
 NKO_appoint_loyalists: "任命效忠派"
 NKO_appoint_loyalists_desc: ""
