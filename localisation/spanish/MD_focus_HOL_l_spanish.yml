 faction_manifest_hol_germanic_union: "Nosotros, los hijos e hijas del antiguo Norte, declaramos el renacimiento de la Hermandad Germánica, una unión sin fronteras, forjada en espíritu y herencia. En una época de decadencia desarraigada, nos alzamos para restaurar la dignidad de nuestros pueblos afines, unidos por la lengua, la cultura y la eterna llamada de nuestros ancestros. Rechazamos la división, la corrupción y la debilidad de los imperios impuestos. Nuestra lealtad no reside en las naciones, sino en la esencia imperecedera del alma germánica. De los fiordos a los bosques, de las tierras bajas a las montañas, nos unimos como una sola voluntad viva para preservar, fortalecer y despertar el espíritu que una vez forjó el destino de Europa."
 HOL_restoring_royal_authority_nationalist: "Restaurando la Autoridad Real"
 HOL_restoring_royal_authority_nationalist_desc: "El retorno de la monarquía a su legítimo lugar no ha estado exento de desafíos. La ineficiencia burocrática y la inestabilidad política plagan la nación, mientras las instituciones tradicionales luchan por recuperar el control. Sin embargo, con tiempo y esfuerzo, la autoridad real puede restaurar una vez más la unidad y la fuerza del Estado holandés."
 HOL_wic_war_preparations: "Revivir el Groot Desseyn"
 HOL_wic_war_preparations_desc: "Inspirados por el Groot Desseyn, el ambicioso plan del siglo XVII para establecer la supremacía neerlandesa en América y África, debemos prepararnos para la guerra para restaurar el legado de la Compañía de las Indias Occidentales. Al movilizar nuestras fuerzas y asegurar territorios vitales, podemos cumplir la visión del dominio global holandés y recuperar nuestro lugar como potencia marítima."
 HOL_wic_war_preparations_tt: "Se desbloqueará al elegir la §YEstrategia Groot Desseyn§! para el §YWIC§!"
 HOL_focus_can_only_be_completed_by_coalition_tt: "Este enfoque solo puede ser iniciado por §Y$CHARACTER$§! cuando están en nuestra coalición"
 HOL_oranje_nassau-mines: "Reactivate Oranje-Nassau Mines"
 HOL_oranje_nassau-mines_desc: "The Oranje-Nassau collieries in Heerlen were the last Dutch coal mines, closed in 1974 as part of a national energy transition. Reopening them restores domestic steel and aluminium feedstock, reducing import dependency at the cost of increased carbon exposure."
 HOL_military.114.t: "Netherlands Joins the F-35 Program"
 HOL_military.114.d: "The Netherlands has formally committed to the Joint Strike Fighter program, acquiring the F-35 Lightning II as its next-generation multirole fighter. This deepens transatlantic defense ties and strengthens NATO interoperability."
 HOL_military.114.a: "A welcome partner in the program."
 HOL_military.115.t: "Dutch F-35 Procurement in Progress"
 HOL_military.115.d: "The Netherlands has initiated procurement talks for the F-35 Lightning II. Final delivery timelines depend on the program's development schedule, but the commitment marks a significant step in Dutch air force modernization."
 HOL_military.115.a: "We will proceed when the aircraft is ready."
 BEL_referendum_mission: "The Belgian Referendum"
 BEL_referendum_mission_desc: "Belgium has agreed to hold a referendum on the future of the country. The outcome will determine whether Belgium remains a unified state or is absorbed into the Netherlands."
