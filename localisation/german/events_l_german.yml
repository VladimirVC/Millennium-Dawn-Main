 UNSC.200.t: "Attempt to Sway [?sway_target.GetName]"
 UNSC.200.d: "In order to get the result we want on this §BUnited Nations§! §YSecurity Council§! Resolution, we need to get more people to either vote with us, or abstain from voting. To get them to change their vote, we must offer them something worth their allegiance for this vote. We have several different offers we can make, but we must choose one now, and hope they will accept it."
 UNSC.200.a: "Offer Trade & Investment Deals"
 UNSC.200.b: "Offer Financial Incentives"
 UNSC.200.c: "Offer Military Incentives"
 UNSC.200.e: "Offer Developmental Incentives"
 UNSC.201.t: "[FROM.GetName] Wishes to Sway Our Vote"
 UNSC.201.d: "[FROM.GetLeader] has quietly approached [THIS.GetLeader], requesting that we change our vote to [vote_change_too] for the current United Nations Security Council resolution. They have offered to give us Trade Agreements & Mutual Investment Treaties, along with cancelling any Embargos or Blockades if we agree to change our vote, to be granted after the vote is changed. We must decide if agreeing to their request is worth changing our stance on the Security Council."
 UNSC.201.a: "Accept their Offer"
 UNSC.201.b: "Reject this Outrageous Demand!"
