 CANZUK_update_flag: "[GetCANZUKNameDef] 형성 완료"
 CANZUK_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetCANZUKNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_RDLP_category: "리오데라플라타"
 form_RDLP_category_desc: "리오데라플라타 연합주는 오늘날의 아르헨티나, 우루과이, 파라과이, 볼리비아에 있던 국가들의 연합이었습니다. 현대의 구상에는 칠레까지 그룹에 포함되어 남아메리카의 대부분을 하나의 국가 깃발 아래 통합합니다. 신생 국가는 면적, 인구, 경제력에서 브라질과 맞먹습니다. 어쩌면 이것이 우리 국가들이 맞이할 새로운 미래일지도 모릅니다."
