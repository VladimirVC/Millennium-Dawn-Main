 BRA_support_from_the_eu: "Support from the EU"
 BRA_support_from_the_eu_desc: "EU countries have been thriving through social democracy for years. It is only logical for us to develop good relationships with fellow social democrats."
 brazil.45.t: "Millions Take to the Streets"
 brazil.45.d: "Following the recent public disclosure of the Operation Car Wash investigations, the true scale of bribery schemes across the country has been laid bare and the public reaction has been explosive. Millions of citizens poured into the streets across major countries demanding immediate resignations and justice. The people have made it clear that business as usual is over."
 brazil.45.a: "The establishment is falling apart!"