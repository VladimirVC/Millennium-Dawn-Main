 EUU_migrant_crisis_triggered: "§YMigrant Crisis in Europe§! Triggered"
 EUevent.22.t: "The Migrant Crisis in Europe"
 EUevent.22.d: "아프리카와 중동에서의 다양한 전쟁, 급진적인 지하디즘의 대두 등으로 많은 사람들이 고향을 떠나야 했습니다. 이 전쟁으로 피폐해진 국가들에서의 불안과 불안정성은 수십 년 만에 보기 힘든 정도의 대규모 이주를 초래했습니다. 수천 명의 이주민들이 유럽연합으로 몰려들며, 망명과 난민 지위를 요청하고 있습니다. 연합의 주변 국가들은 이미 국경 경비대와 경찰을 동원해 이주민들의 흐름을 막으려 하고 있지만, 이들은 유럽연합이 영구적인 대책을 마련하기를 바라보고 있습니다. 일부 임시 해결책은 터키와 협정을 맺어 일부 이주민들을 수용하는 것이며, 다른 나라들은 유럽난민청(European Asylum Agency)과 같은 더 영구적인 기구를 설립해 이 흐름을 처리하려고 하고 있습니다. 확실한 것은 이 문제를 신속하고 효율적으로 처리해야 한다는 점입니다."
 EUevent.22.a: "A New Crisis Begins."
 Migrant_Crisis_Europe: "Migrant Crisis"
 Migrant_Crisis_Europe_desc: "The Migrant Crisis has hit Europe like a hammer, pounding away at both national unity and the popularity of ruling parties. The war in Syria has caused thousands of refugees to flee to neighboring countries, and although Europe stood at the ready to accept those suffering from war, the amount of new and permanent migrants from all over North Africa and the Middle East has overwhelmed Europe's institutions and made many resent the newcomers."
