 #Foreign Policy Focuses - EU & NATO branch
 SWI_the_bank_of_the_world: "The Bank of the World"
 SWI_the_bank_of_the_world_desc: "Swiss banking secrecy made Zurich and Geneva the vaults of the world. Formalise that role and let foreign capital settle here rather than in London or Frankfurt."
 SWI_strengthening_swiss_cooperation: "Strengthening Swiss Cooperation"
 SWI_strengthening_swiss_cooperation_desc: "Joint exercises, shared doctrine and standardised equipment bind the Swiss militia to its new Alliance partners."
 SWI_bastion_of_democracy: "Bastion of Democracy"
 SWI_bastion_of_democracy_desc: "Neutrality was never indifference. Switzerland stands as a working example of self-government, and says so plainly."
 SWI_eu_investments: "European Investments"
 SWI_eu_investments_desc: "Swiss capital flows into the Single Market. Our banks underwrite European growth, and European growth underwrites our banks."
 SWI_on_our_own_path: "On Our Own Path"
 SWI_on_our_own_path_desc: "The EU is one customer among many. Swiss finance serves whoever pays, and answers to Bern alone."
 SWI_staple_of_democracy: "Staple of Democracy"
 SWI_staple_of_democracy_desc: "Western capitals bank with us because our institutions are predictable. That predictability is itself an export."
 SWI_eu_candidacy: "European Union Candidacy"
 SWI_eu_candidacy_desc: "Bern submits a formal application to Brussels. Accession would end the bilateral patchwork and bind Switzerland to the Union it has circled for decades."
 SWI_eu_candidacy_tt: "Switzerland becomes an §YEU candidate§!"
 SWI_friend_for_all: "A Friend to All"
 SWI_friend_for_all_desc: "No bloc, no alignment, no permanent friends. Switzerland offers its good offices to every nation and is trusted by all of them."
 SWI_trust_in_the_eu: "Trust in the EU"
 SWI_trust_in_the_eu_desc: "Candidacy is not membership. Deepening cooperation with the member states proves Swiss commitment before the accession vote."
 SWI_trust_in_the_eu_tt: "Every §YEU member state§! gains §G+30§! opinion of Switzerland"
 SWI_swiss_independence: "Swiss Independence"
 SWI_swiss_independence_desc: "Foreign lobbies have grown comfortable in Bern. Their influence is rolled back and domestic institutions reassert control."
 SWI_mutual_defence_training: "Mutual Defence Training"
 SWI_mutual_defence_training_desc: "Alpine warfare schools open to European partners. Their soldiers learn our mountains, and our militia learns to fight beside them."
 SWI_invest_in_eu: "Invest in the EU"
 SWI_invest_in_eu_desc: "Swiss pension funds and banks take direct stakes in European industry, converting financial weight into political standing."
 SWI_national_investments: "National Investments"
 SWI_national_investments_desc: "Capital that would have gone abroad is turned inward, into Swiss infrastructure, Swiss industry and Swiss research."
 SWI_defence_training_in_the_alps: "Defence Training in the Alps"
 SWI_defence_training_in_the_alps_desc: "Every recruit learns the ground he will defend. Refresher courses drill the militia in the valleys it is assigned to hold."
 SWI_european_defence: "European Defence"
 SWI_european_defence_desc: "A common European defence framework takes shape, with Swiss engineering and Swiss neutrality at its centre rather than at its margin."
 SWI_swiss_banking: "Swiss Banking"
 SWI_swiss_banking_desc: "Our banks have outgrown the country they are named after. Consolidate the sector and let it work at the scale it has earned."
 SWI_swiss_banking_two: "The World's Vault"
 SWI_swiss_banking_two_desc: "Deposits arrive from every continent. Switzerland stops competing with the great financial centres and becomes the place they keep their reserves."
 SWI_last_man_standing: "The Last Man Standing"
 SWI_last_man_standing_desc: "Doctrine assumes the worst: every road cut, every ally gone. The militia is trained to fight on regardless."

 #Tech Bonus
 SWI_environment: "Environmental Research"

 #Ideas
 SWI_swiss_neutrality: "Swiss Neutrality"
 SWI_protect_alps: "Protector of the Alps"
 SWI_protect_alps_desc: "The Alps are not scenery. Federal protection of the high valleys preserves the terrain that has kept invaders out for six centuries."
 SWI_Expanding_nuclear_research_desc: "Swiss reactors move beyond power generation. Research programmes at the federal institutes push into fuel cycles and materials science."
 SWI_Expanding_nuclear_research1_desc: "The nuclear programme matures. Swiss laboratories now work at the edge of what civilian research permits."
 swiss_political_system4: "Political System of Switzerland"
 swiss_political_system4_desc: "Power is pushed back down to the cantons. Bern coordinates rather than commands, and local government decides what local government can decide. Federal decision-making slows, but building and administration answer to the people who live with the consequences."
 SWI_milita: "The Armed Militia"
 SWI_milita_desc: "The citizen army is politicised as well as armed. Service becomes a school of the state as much as of the rifle."
 SWI_multilingual_workers: "Multilingual Workers"
 SWI_multilingual_workers_desc: "German, French, Italian and Romansh workers organise across the language borders that have long divided Swiss labour."
 SWI_propaganda_idea: "State Propaganda"
 SWI_propaganda_idea_desc: "The federal press office stops informing and starts persuading. Radio, print and school curriculum carry the same message."
 SWI_true_neutral: "True Neutrality"
 SWI_true_neutral_desc: "Not armed neutrality, not benevolent neutrality. Switzerland takes no side, hosts no base and signs no guarantee."
 SWI_sig_sauer_ag: "SIG Sauer AG"
 SWI_sig_sauer_ag_desc: "The Neuhausen works arm the militia. Every Swiss household with a service rifle holds a piece of SIG's output."
 SWI_rheinmetall_cooperation: "Rheinmetall Cooperation"
 SWI_rheinmetall_cooperation_desc: "Rheinmetall Air Defence in Zurich, heir to Oerlikon, ties Swiss gun and radar work to the largest arms house in Germany."
 SWI_thales_cooperation: "Thales Cooperation"
 SWI_thales_cooperation_desc: "Thales Suisse supplies the radars, optronics and command systems that turn a militia into a networked force."
 SWI_local_production1: "Local Production"
 SWI_local_production1_desc: "Weapons bought abroad can be embargoed. Weapons built in Thun cannot. Domestic lines take over the essentials."
 SWI_local_production2: "Local Production - Expanded"
 SWI_local_production2_desc: "Domestic industry now covers the full inventory, and the money that once left the country stays in it."
 SWI_swiss_mercenaries_2: "Swiss Mercenaries - Expanded"
 SWI_swiss_mercenaries_2_desc: "The old trade returns at scale. Swiss soldiers serve foreign paymasters, and their wages come home."
 SWI_swiss_peacekeepers: "Swiss Peacekeepers"
 SWI_swiss_peacekeepers_desc: "Blue helmets over a white cross. Swiss troops deploy where no one suspects them of taking a side."
 SWI_swiss_peacekeepers_2: "Swiss Peacekeepers - Expanded"
 SWI_swiss_peacekeepers_2_desc: "Switzerland becomes a first call for the Security Council, contributing formed units rather than observers."
 SWI_strengthened_swiss_cooperation: "Strengthened Swiss Cooperation"
 SWI_strengthened_swiss_cooperation_desc: "Alliance partners train to Swiss mountain standards, and Swiss staff officers sit in Alliance headquarters."
 SWI_defence_training: "Alpine Defence Training"
 SWI_defence_training_desc: "European units rotate through the Swiss mountain schools, and leave better at fighting where the ground does the killing."
 SWI_investment_in_eu: "Investment in the EU"
 SWI_investment_in_eu_desc: "Swiss money underwrites European industry, buying influence in the councils that set the EU's economic policy."
 SWI_bank_of_the_world_desc: "Foreign deposits find their way to Swiss vaults, and Swiss discretion keeps them there."
 SWI_bank_of_the_world_2_desc: "The EU routes its capital through Zurich. Swiss banking becomes European infrastructure."
 SWI_bank_of_the_world_3_desc: "Unaligned and unbothered, Swiss banks take deposits the great powers will not touch."
 SWI_bank_of_the_world_4: "Bank of the World"
 SWI_bank_of_the_world_4_desc: "European and global capital both settle here. The franc is the currency of last resort."
 SWI_bank_of_the_world_5: "Bank of the World"
 SWI_bank_of_the_world_5_desc: "Independence and scale together. Switzerland banks for everyone and owes nothing to anyone."
 SWI_bank_of_the_west_2_desc: "Western capital concentrates in Swiss hands, and Western governments notice who holds it."
 SWI_bank_of_the_west_3_desc: "Zurich sets the terms on which the West borrows. The relationship has quietly reversed."

