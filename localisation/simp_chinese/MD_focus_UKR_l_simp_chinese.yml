 ukraine_parliament.100.d: "由于俄罗斯政府目前对乌克兰拥有很高的影响力，我们议会中的亲俄阵营赢得了议会的大多数席位。"
 ukraine_parliament.100.t: "亲俄阵营赢得多数席位"
 ukraine_parliament.100.a: "让我们看看他们做得怎么样"
 ukraine_parliament.200.d: "由于美国政府目前对乌克兰拥有很高的影响力，我国议会中的亲西方阵营赢得了议会的大多数席位。"
 ukraine_parliament.200.t: "亲西方阵营赢得多数席位"
 ukraine_parliament.200.a: "让我们看看他们做得怎么样"
 ukraine_parliament.300.t: "亲乌克兰阵营赢得多数席位"
 ukraine_parliament.300.d: "我们议会中的亲乌克兰集团在最近的选举中赢得了大多数席位，而这归因于美国政府和俄罗斯政府的摇摆不定的影响。"
 ukraine_parliament.300.a: "让我们看看他们做得怎么样"
 ukraine_parliament.400.t: "议会选举"
 ukraine_parliament.400.d: "选举季又到了，全国各地的投票站都已开始开放。希望投票率足够高，能给国家带来好的改变。"
 ukraine_parliament.400.a: "让我们拭目以待"
 ukraine_parliament.1.t: "议会批准中央集权法"
 ukraine_parliament.1.d: "根据我们几天前提出的建议，议会决定通过一项增加我们官僚机构开支的法案。"
 ukraine_parliament.1.a: "太好了"
 ukraine_parliament.2.t: "议会否决新的中央集权法"
 ukraine_parliament.2.d: "议会决定否决一项会增加我们官僚机构开支的法案。这是我们几天前提出的提案，但看来这项议案不够受欢迎。"
 ukraine_parliament.2.a: "真是不幸"
 ukraine_parliament.2.b: "也许一点贿赂就能改变他们的想法……"
 ukraine_parliament.3.t: "议会批准权力下放法"
 ukraine_parliament.3.d: "议会批准了我们减少官僚机构开支的请求。这是我们几天前提出的提案，看来该提案获得了广泛的支持。"
 ukraine_parliament.3.a: "太好了"
 ukraine_parliament.4.t: "议会否决新的权力下放法"
 ukraine_parliament.4.d: "议会决定否决一项旨在减少我们官僚机构开支的法案。这是我们几天前提出的提案，但看来这项议案不够受欢迎。"
 ukraine_parliament.4.a: "真是不幸"
 ukraine_parliament.4.b: "也许一点贿赂就能改变他们的想法……"
 ukraine_parliament.5.t: "议会批准我们增加新的军事预算"
 ukraine_parliament.5.d: "议会批准了我们增加军费开支的请求。这是我们几天前提出的提案，看来该提案获得了广泛的支持。"
 ukraine_parliament.5.a: "太好了"
 ukraine_parliament.7.t: "议会否决我们增加新的军事预算"
 ukraine_parliament.7.d: "议会拒绝了我们增加军费开支的请求。这是我们几天前提出的提案，看来该提案并没有获得太多支持。"
 ukraine_parliament.7.a: "真是不幸"
 ukraine_parliament.7.b: "也许一点点贿赂就能改变他们的想法……"
 ukraine_parliament.8.t: "议会批准我们增加新的军事预算"
 ukraine_parliament.8.d: "议会批准了我们减少军费开支的请求。这是我们几天前提出的提案，看来该提案获得了广泛的支持。"
 ukraine_parliament.8.a: "太好了"
