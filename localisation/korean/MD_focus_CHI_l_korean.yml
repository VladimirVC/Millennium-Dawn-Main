 CHI_bri_africa_engagement_desc: "Accumulated BRI engagement score for Africa; required alongside FOCAC completions to unlock the African Continental Integration capstone."
 CHI_bri_centralasia_engagement_desc: "Accumulated BRI engagement score for Central Asia; feeds into the Silk Road Economic Belt corridor bonuses."
 CHI_bri_defaulted_projects_desc: "Number of projects where the recipient has defaulted on loan terms; triggers the choice between debt restructuring and asset seizure."
 CHI_bri_europe_engagement_desc: "Accumulated BRI engagement score for Europe; needed to maintain the 17+1 mechanism and unlock late-game European connectivity bonuses."
 CHI_bri_latam_engagement_desc: "Accumulated BRI engagement score for Latin America; unlocked by completing infrastructure projects in Venezuela, Ecuador, Brazil, Argentina, and Bolivia."
 CHI_bri_meast_engagement_desc: "Accumulated BRI engagement score for the Middle East; feeds into Petroyuan settlement adoption rates."
 CHI_bri_monthly_income_desc: "Monthly renminbi income generated by active BRI projects before returns multiplier is applied."
 CHI_bri_pacific_engagement_desc: "Chinese engagement with Pacific Island states: diplomatic recognitions, fisheries and seabed concessions, and security understandings."
 CHI_bri_predatory_score_desc: "Tracks how aggressively we have pursued debt-leverage and asset-seizure tactics; high values unlock the Hambantota Doctrine path and increase default-to-seizure opportunities."
 CHI_bri_project_slots_desc: "Maximum number of BRI projects China can manage simultaneously"
 CHI_bri_returns_multiplier_desc: "Multiplier applied to project return flows; increased by active IC-secretaries and certain focus completions."
 CHI_bri_seasia_engagement_desc: "Accumulated BRI engagement score for Southeast Asia; affects Lancang-Mekong Cooperation decision availability."
 CHI_bri_southasia_engagement_desc: "Accumulated BRI engagement score for South Asia; affects tier upgrade speed and bonus magnitudes for South Asian partners."
 CHI_bri_winwin_score_desc: "Tracks how consistently we have applied concessional and reformed lending terms; high values unlock Debt Restructuring diplomacy and improve recipient goodwill."
 CHI_Buffer_State_Doctrine: "Buffer State Doctrine"
 CHI_Buffer_State_Doctrine_desc: "North Korea serves as a strategic buffer between us and the American-aligned forces in South Korea. By reinforcing this role, we ensure that Pyongyang remains firmly within our sphere of influence and that no hostile power establishes a presence on our border."
 CHI_chinese_aggression_display: "$CHI_chinese_aggression$: [?CHI.CHI_chinese_aggression]"
 CHI_collective_leadership_active_desc: "Seven men around one table. The general line is whatever the seven men agree to call the general line."
 CHI_Dandong_Lifeline: "The Dandong Lifeline"
 CHI_Dandong_Lifeline_desc: "Dandong handles the overwhelming majority of North Korea's external trade, and the flow moves on our terms. Restoring and expanding this pipeline provides Pyongyang with economic oxygen while cementing our leverage over the regime."
 CHI_Enforce_Sanctions_Compliance: "Enforce Sanctions Compliance"
 CHI_Enforce_Sanctions_Compliance_desc: "By genuinely enforcing international sanctions against North Korea, we demonstrate our commitment to nonproliferation and earn goodwill from the United States and Japan. Pyongyang will be displeased, but our standing in the international community will improve."
 CHI_focus_tree: "China Focus Tree"
 CHI_Fortress_of_the_East: "Fortress of the East"
 CHI_Fortress_of_the_East_desc: "Transforming North Korea into an impenetrable buffer state serves our strategic depth. We back a doctrine of total military preparedness that makes any push against Pyongyang prohibitively costly for those who might attempt it."
