 EU_Tech_Share_name: "Agence européenne de défense (AED)"
 EU_Tech_Share_desc: "Les États membres unissent leurs efforts de recherche. L'Agence européenne de défense (AED) coordonne les efforts des États membres de l'Union européenne."
 tooltip_ECB_Start_OMT_effect: "§GClic gauche :§! Le §Yprogramme OMT§! devient disponible.\n\n§GClic droit :§! §YLimite de taille des OMT§! > 0 $."
 tooltip_ECB_adjust_OMT_limit_effect: "§GOn Left Click:§! §YOMT Size Limit§!: Add §G+$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §R-5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §G+5%§! Europeanism.\n\n§GOn Right Click:§! §YOMT Size Limit§!: Add §R-$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §G+5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §R-5%§! Europeanism.\n"
 tooltip_ECB_Outright_Monetary_Transactions_available: "§YLimite de taille des OMT§! > 0 $."
 tooltip_ECB_Outright_Monetary_Transactions_complete_effect: "Tous les États membres dont le §Ytaux d'intérêt§! est > à §R4,0 %§! : La dette est réduite jusqu'à ce que le §Ytaux d'intérêt§! soit < à §R4,0 %§! ET que la §Glimite de taille des OMT§! soit > à la §Bvaleur totale des OMT§!.\n"
 tooltip_ECB_Outright_Monetary_Transactions_remove_effect: "Tous les États membres dont le §Bcompte d'OMT§! est > à 0 $ : §RAjoute§! le §Bcompte d'OMT§! à la dette.\n"
 EU_exit_category: "Retrait de l'Union européenne"
 EU_exit_category_desc: "With rising Euroscepticism throughout the Union some member states will think about leaving §C[EUU.GetFlag] The European Union§!."
 Article_50: "[THIS.GetNameDefCap] a invoqué l'article 50"
 EU_Article_50: "Quittez l'Union européenne ! (Article 50)"
 EU_Article_50_desc: "« Tout État membre peut décider, conformément à ses règles constitutionnelles, de se retirer de l'Union. »\n- Article 50, paragraphe 1, du traité sur l'Union européenne.\n\nL'article 50 a d'abord été rédigé pour le traité constitutionnel de l'Union européenne. Après l'échec du processus de ratification de la Constitution européenne, la clause a été incorporée dans le traité de Lisbonne."
 EU_Revoke_Article_50: "Révoquer l'article 50"
 EU_Revoke_Article_50_desc: "Revoke Article 50 and remain in §C[EUU.GetFlag] The European Union§!\n\"Article 50 TEU must be interpreted as meaning that, where a Member State has notified the European Council, in accordance with that article, of its intention to withdraw from the European Union, that article allows that Member State, for as long as a withdrawal agreement concluded between that Member State and the European Union has not entered into force or, if no such agreement has been concluded, for as long as the two years laid down in Article 50(3) TEU, possibly extended by that paragraph, has not expired, to revoke that notification unilaterally, in an unequivocal and unconditional manner, by a notice addressed to the European Council in writing, after the Member State concerned has taken the revocation decision in accordance with its constitutional requirements. The purpose of that revocation is to confirm the EU membership of the Member State concerned under terms that are unchanged as regards its status as a Member State, and that revocation brings the withdrawal procedure to an end.\"\n- Judgment of the Court of Justice of the European Union in Case C-621/18"
 EU_exit: "Leaving the EU"
 EU_exit_desc: "§Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! a notifié au Conseil européen son intention de quitter §C[EUU.GetFlag] l'Union européenne§!. §Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! quittera l'Union deux ans après cette notification."
 EU_extend_Article_50: "Extension de l'article 50"
 EU_extend_Article_50_desc: "Demander à §C[EUU.GetFlag] l'Union européenne§! une prolongation de l'article 50 et quitter l'Union à une date ultérieure."
 EU_exit_three_month: "Three-month extension"
 EU_exit_three_month_desc: "§C[EUU.GetFlag] L'Union européenne§! a accordé à §Y[ROOT.GetFlag] [ROOT.GetNameDef]§! une prolongation de trois mois de l'article 50. §Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! quittera l'Union après une période de trois mois."
 EU_withdrawal_treaty: "Traité de retrait"
 EU_withdrawal_treaty_desc: "§Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! et les États membres de §C[EUU.GetFlag] l'Union européenne§! se sont mis d'accord sur un traité de retrait."
 EU_prepared_no_deal_exit: "Se préparer à une sortie sans accord"
 EU_prepared_no_deal_exit_desc: "§C[EUU.GetFlag] L'Union européenne§!, ses laquais faibles et ses bureaucrates gonflés à bloc à Bruxelles refusent de nous donner un traité de retrait favorable. Nous devons préparer notre pays à l'inévitable sortie sans accord, à moins que quelque chose ne change."
 cant_invoke_article_50: "§Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! a récemment révoqué la décision relative à l'§Yarticle 50§! (Jours restants : [?cant_invoke_article_50:days_left|Y0])"
 EU_article_50_available_click: "Conditions préalables :\n[!EU_Article_50_click_enabled]\nEffets :\n§Y[ROOT.GetFlag][ROOT.GetNameDefCap]§! commence à sortir de §C[EUU.GetFlag][EUU.GetNameDef]§!"
 EU_article_50_available_delayed: "« Tout État membre peut décider, conformément à ses règles constitutionnelles, de se retirer de l'Union. »\n- Article 50, paragraphe 1, du traité sur l'Union européenne. -\nL'article 50 a d'abord été rédigé pour le traité constitutionnel de l'Union européenne. Suite à l'échec de la ratification de la Constitution, la clause a été incorporée dans le traité de Lisbonne."
 tooltip_EU_exit_available: "§Y[ROOT.GetFlag][ROOT.GetNameDefCap]§! ne cherche pas actuellement à quitter §C[EUU.GetFlag][EUU.GetNameDef]§!"
 tooltip_EU_exit_cancel_trigger: "§Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! a activé la décision §YRévoquer l'article 50§!."
 tooltip_EU_Revoke_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!."
 tooltip_EU_Revoke_Article_50_effect: "§Y[ROOT.GetNameWithFlag]§! stays in §Y[EUU.GetFlag] The European Union§!. Mission §YLeaving the EU§! AND Mission §YThree-month extension§! is removed.\nYou won't be able to invoke §YArticle 50§! for the next §Y180 days§!."
 tooltip_EU_extend_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!  \nAND [ROOT.GetNameWithFlag] must have > 25% influence on the European Union's Leader of Foreign Policy."
 tooltip_EU_remove_laws_and_offices: "Supprime toutes les §Ylois et bureaux de l'Union européenne§!.\n"
 EU_defense_category: "Politiques de défense de l'UE"
 EU_defense_category_desc: "In the 1950s the idea of the European Defence Community collapsed when it failed to obtain ratification in the French Parliament. Its successor became the Common Security and Defence Policy of the European Union. With the majority of European Nations being members of the North Atlantic Treaty Organization (NATO), there wasn't seen the need for an own European Defense Organization throughout the 20th century. But with rising world tensions in the 21st century, this is changing."
 EU_Frontex_take_control: "Prendre le contrôle des forces de Frontex"
 EU_Frontex_take_control_desc: "Ces dernières années, les frontières extérieures de l'Europe ont connu une augmentation sans précédent du nombre de migrants et de réfugiés souhaitant entrer dans l'UE. Les pays qui ont une frontière extérieure sont les seuls responsables du contrôle des frontières. Toutefois, Frontex peut apporter un soutien technique supplémentaire aux pays de l'UE confrontés à une forte pression migratoire.\nPour ce faire, elle coordonne le déploiement d'équipements techniques supplémentaires (avions et bateaux, par exemple) et de personnel frontalier spécialement formé."
 EU_EuroNavy_take_control: "Prendre le contrôle de l'EuroMarine"
 EU_EuroNavy_take_control_desc: "Les flottes et les forces opérationnelles multinationales devenant de plus en plus courantes et importantes au XXIème siècle, les États membres de §C[EUU.GetFlag] l'Union européenne§! ont décidé d'unir leurs forces et de transférer leurs navires de guerre à un commandement naval européen unifié, connu sous le nom d'§YEuroMarine§!."
 EU_EuroArmy_take_control: "Prendre le contrôle de l'EuroArmée"
 EU_EuroArmy_take_control_desc: "Les États membres de §C[EUU.GetFlag] l'Union européenne§! ont décidé de mettre sur pied des forces armées communes, connues sous le nom d'§YEuroArmée§!."
 EU_create_EDU: "Former l'Union européenne de la défense (UED)"
 EU_create_EDU_desc: "Afin d'acquérir l'autonomie stratégique nécessaire pour défendre leurs intérêts collectifs, répondre aux conflits et crises extérieurs et assurer la sécurité dans notre voisinage, les États membres ont décidé de former l'§YUnion européenne de la défense (UED)§! en tant qu'alliance militaire et de quitter collectivement l'§YOTAN§!."
 EU_military_exercise: "Préparer un exercice militaire à la frontière [FROM.GetAdjFS]"
 EU_military_exercise_desc: "Préparation un exercice militaire à la frontière [FROM.GetAdjFS]"
 EU_ask_to_host_military_exercise: "Demander l'organisation d'un exercice militaire à la frontière"
 EU_ask_to_host_military_exercise_desc: "Demande d'organiser un exercice militaire à la frontière avec [FROM.GetFlag] [FROM.GetNameDef]"
 EU_military_exercise_mission: "Exécuter un exercice militaire"
 EU_military_exercise_mission_desc: "Exécution d'un exercice militaire"
 counter_military_exercise_mission: "Contre-exercice militaire"
 counter_military_exercise_mission_desc: "Contre-exercice militaire"
 EU_military_exercise_threat: "Exercice militaire"
 no_active_agenda: "Le §YParlement européen§! n'examine actuellement aucun ordre du jour."
 cur_inf_nat: "§Y[THIS.GetFlag] [THIS.GetNameDefCap]§! n'a pas encore été influencée dans son vote au cours de cette session"
 EU_all_big_players_have_office: "Toutes les nations contrôlées par les joueurs, ou les principales nations de l'UE, sont actuellement dotées d'un poste."
 EU_budget_mff: "Pas de cadre financier en cours"
 EU_budget_nfy: "Pas de budget annuel en cours"
 ongoing_potef_election: "Pas d'élection en cours du président de la Fédération européenne"
 EU_apply_for_membership_category: "Adhésion à l'UE"
 EU_apply_for_membership_category_desc: "Becoming a member of the EU is a complex procedure which does not happen overnight. Once an applicant country meets the conditions for membership, it must implement EU rules and regulations in all areas.\nAny country that satisfies the conditions for membership can apply. These conditions are known as the 'Copenhagen criteria' and include a free-market economy, a stable democracy and the rule of law, and the acceptance of all EU legislation, including of the euro."
 EU_apply_for_membership: "Adhésion à l'UE"
 EU_apply_for_membership_desc: "§Y[ROOT.GetFlag] [ROOT.GetNameDefCap]§! peut rejoindre §C[EUU.GetFlag] l'Union européenne§!, chantons l'Ode à la joie :\nJoie, belle étincelle divine,\nFille de l'assemblée des dieux,\nNous pénétrons, ivres de feu,\nô céleste, ton sanctuaire !\nTes charmes assemblent\nCe que, sévèrement, les modes divisent ;\nTous les humains deviennent frères,\nlorsque se déploie ton aile douce."
 USoE_integrate_new_members: "Intégrer les nouveaux États membres"
 USoE_integrate_new_members_desc: "De nouvelles nations ont décidé d'aller de l'avant et de rejoindre l'Union. Il est temps d'intégrer ces nouveaux États membres et de rendre les États-Unis d'Europe beaucoup plus forts pour les années à venir."
 instrument_for_pre_accession_assistance: "Instrument d'Aide de Préadhésion (IAP)"
 instrument_for_pre_accession_assistance_desc: "L'Instrument d'Aide de Préadhésion (IAP) permet à l'UE de soutenir les réformes dans la zone d'élargissement au moyen d'une assistance financière et technique."
 instrument_for_pre_accession_assistance_tt: "Les candidats à l'UE bénéficient de §YProgrammes d'assistance à la pré-adhésion§!"
 pre_accession_assistance_program: "Programme d'aide de préadhésion"
 pre_accession_assistance_program_desc: "§C[EUU.GetFlag][EUU.GetNameDefCap]§! soutient les réformes des pays candidats à l'adhésion afin qu'ils puissent satisfaire aux critères d'adhésion de §C[EUU.GetFlag][EUU.GetNameDef]§!. L'aide est principalement destinée à aider à éliminer la corruption et à donner un coup de pouce économique à la nation pour qu'elle mette de l'ordre dans ses finances."
 EU_pre_accession_assistance: "Aide de préadhésion"
 EU_pre_accession_assistance_desc: "§C[EUU.GetFlag][EUU.GetNameDefCap]§! soutient les réformes des pays candidats à l'adhésion afin qu'ils puissent satisfaire aux critères d'adhésion de §C[EUU.GetFlag][EUU.GetNameDef]§!. L'aide vise principalement à contribuer à l'élimination de la corruption et à apporter un coup de pouce économique pour aider à remettre de l'ordre dans nos finances."
 tooltip_leader_of_EU_trade_policy_influence_3_percent: "Les §Cresponsables de la politique commerciale de [EUU.GetFlag] l'Union européenne§! (dans l'ordre le §Yprésident de la Commission européenne§!, le §Yprésident du Conseil européen§!, le §Yprésident du Parlement européen§!) doivent avoir une influence > à 3 % sur l'ensemble des §CÉtats membres de [EUU.GetFlag] l'Union européenne§!"
