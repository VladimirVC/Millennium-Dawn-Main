 EU_news.5.d: "[FROM.GetNameWithFlag] ocupará ahora el cargo de Presidente del Parlamento Europeo durante los próximos 5 años."
 EU_news.5.a: "Esperamos una buena cooperación!"
 EU_news.6.t: "Presidente del Banco Central Europeo"
 EU_news.6.d: "[FROM.GetNameWithFlag] ocupará ahora el cargo de Presidente del Banco Central Europeo durante los próximos 8 años."
