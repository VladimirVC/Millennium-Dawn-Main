l_korean:
 CHI_NKO_bilateral_cooperation: "조중 우호조약"
 CHI_NKO_bilateral_cooperation_desc: "1961년 중국과 북한 사이에 체결된 조중 우호협조 및 상호원조조약은 양국이 맺은 유일한 상호방위조약으로 남아있습니다. 이 조약에 대한 약속을 재확인하는 것은 베이징과 평양이 소원해지도록 방치했던 관계를 회복시키고 경제, 군사, 정치 분야 전반에 걸친 체계적인 협력의 문을 열어줄 것입니다."
 CHI_NKO_border_trade_zones: "황금평 경제지구"
 CHI_NKO_border_trade_zones_desc: "황금평은 신의주와 단둥 사이 압록강에 위치한 섬입니다. 2011년 공동 경제특구로 지정되었으나 정치적 갈등으로 인해 프로젝트가 중단되었습니다. 황금평 지구에 대한 중국의 투자를 재개하면 압록강 회랑을 양국 무역의 중추로 다시 세울 수 있습니다."
 CHI_NKO_rason_sez: "라진-선봉 자유무역항"
 CHI_NKO_rason_sez_desc: "라진과 선봉을 통합하여 조성된 라선 경제특구는 중국에게 흔치 않은 태평양 부동항 접근권을 제공합니다. 중국의 투자를 통해 라진항 제3컨테이너 터미널, 경공업, 그리고 이 지구를 두만강 및 훈춘의 중국 국경과 연결하는 도로 및 철도망을 개발합니다."
 CHI_NKO_dandong_trade_hub: "신의주-단둥 상업 회랑"
 CHI_NKO_dandong_trade_hub_desc: "단둥은 조중 국경을 통과하는 모든 물자의 70% 이상을 처리합니다. 조중우의교의 통관 절차 간소화와 함께 단둥의 세관 및 창고 인프라를 확장하면, 이 도시는 양국 관계에서 대체 불가능한 상업적 중추로 확고히 자리 잡을 것입니다."
 CHI_NKO_mineral_extraction: "무산 철광석 채굴권"
 CHI_NKO_mineral_extraction_desc: "함경북도의 무산 노천 철광은 아시아 최대 규모의 철광석 매장지 중 하나입니다. 중신그룹(CITIC)과 통화강철을 포함한 중국 기업들은 자본과 인프라를 제공하는 대가로 채굴 계약을 체결했습니다. 이 채굴권은 함경남도의 마그네사이트와 안주 분지의 무연탄까지 확대됩니다."
 CHI_NKO_fisheries_agreement: "서조선해 어업 협정"
 CHI_NKO_fisheries_agreement_desc: "북한은 과거 한국 어민들이 의존했던 서해 영해에서 조업하는 중국 선단에 연간 어업 면허를 판매해 왔습니다. 이를 양국 간의 정식 협정으로 제도화하면 평양에는 예측 가능한 면허 수입을 제공하는 동시에, 서울과 도쿄의 거센 항의를 유발했던 중국 어선들의 조업 활동에 법적 명분을 부여하게 됩니다."
 CHI_NKO_yuan_settlement: "고려상업은행 협정"
 CHI_NKO_yuan_settlement_desc: "고려상업은행과 중국은행 단둥 지점은 오랫동안 양국 무역의 기반이 되는 비공식 자금 흐름을 처리해 왔습니다. 정식 위안화 결제 시스템을 구축하면 북한 무역상들이 미국이 부여한 대북 세컨더리 보이콧(제3자 제재)에 노출되는 달러 거래 위험을 제거하여, 북한 경제를 중국의 금융 인프라에 더욱 깊숙이 편입시킬 수 있습니다."
 CHI_NKO_labor_export: "동북 노동자 파견 프로그램"
 CHI_NKO_labor_export_desc: "국가 주도의 노동자 파견을 통해 수만 명의 북한 노동자가 랴오닝, 지린, 헤이룽장성의 공장, 건설 현장, 식당으로 보내집니다. 이 노동자들은 정부 기관을 통해 모집되며, 임금의 대부분을 평양으로 직접 송금하는 계약에 따라 파견되므로 동북 프로그램은 북한 정권의 핵심 외화벌이 수단이 됩니다."
 CHI_NKO_yalu_river_bridge: "신의주-단둥 제2교량"
 CHI_NKO_yalu_river_bridge_desc: "중국의 비용 부담으로 2014년에 완공된 4차선 교량인 신압록강대교는 단둥의 수변 개발구와 신의주 외곽을 직접 연결합니다. 북한 측 연결 도로가 없어 수년간 방치되어 있었음에도 불구하고, 이 교량을 개통하면 국경에서 가장 중요한 회랑의 화물 수송 능력이 완전히 변화합니다."
 CHI_NKO_energy_cooperation: "CNPC 단둥 송유관"
 CHI_NKO_energy_cooperation_desc: "중국석유천연가스공사(CNPC)는 단둥에서 신의주 인근 봉화화학공장까지 이어지는 북한행 유일의 송유관을 운영합니다. 중국은 이 단 하나의 동맥을 통해 북한 원유의 사실상 전부를 공급하고 있으며, 이는 베이징이 북한 경제를 통제할 수 있는 무언의 지렛대가 됩니다. 송유관 수송량을 확장하고 랴오닝성으로부터의 전력 수출을 확대하면 북한의 공업 기반을 안정화할 수 있습니다."
 CHI_NKO_telecom_network: "고려링크 3G 구축"
 CHI_NKO_telecom_network_desc: "북한의 이동통신망인 고려링크는 이집트 오라스콤의 투자로 건설되었으나, 장비 공급망은 중국 업체에 크게 의존하고 있습니다. 화웨이와 ZTE 장비를 통해 중국의 참여를 확대하면 3G 서비스 범위를 평양을 넘어 지방 도시까지 넓힐 수 있으며, 국경을 넘는 광케이블 연결은 북한 정부에 통제 가능하면서도 실용적인 광대역 백본망을 제공합니다."
 CHI_NKO_power_grid_link: "수풍수력발전소 송전망 연결"
 CHI_NKO_power_grid_link_desc: "압록강의 수풍수력발전소는 1940년대에 건설된 이래 랴오닝성과 북한 모두에 전력을 공급해 왔습니다. 공동 송전 인프라를 복구하고 전력망 상호 연결 협정을 정식화하면 평양과 북부 공업 지대의 전력 공급이 안정되어 공장 생산량을 회복할 수 있습니다."
 CHI_NKO_paektu_tourism: "백두산-창바이산 회랑"
 CHI_NKO_paektu_tourism_desc: "량강도와 지린성 사이에 걸쳐 있는 화산 봉우리인 백두산은 김씨 왕조 건국 신화의 신성한 발상지인 동시에 창바이산을 방문하는 중국인 관광객들의 주요 목적지이기도 합니다. 국경 양측의 통합 관광 인프라를 개발하면 중국인 관광객의 소비를 흡수하는 동시에 평양 정권에 철저히 통제된 대외 창구를 제공할 수 있습니다."
 CHI_NKO_defense_consultations: "중국 인민해방군-조선인민군 총참모부 회담"
 CHI_NKO_defense_consultations_desc: "중국 인민해방군 총참모부와 조선인민군 총정치국 간의 공식 채널은 6.25 전쟁 이후부터 존재해 왔으나 자주 중단되었습니다. 부총참모장급의 정례 협의를 재개하면 위협 평가를 공유하고, 한미 연합훈련에 대한 대응을 조율하며, 국경 지역에서의 오판을 방지하기 위한 체계적인 장이 마련됩니다."
 CHI_NKO_military_exchanges: "국방대학교 교류 프로그램"
 CHI_NKO_military_exchanges_desc: "베이징의 중국 인민해방군 국방대학교는 북한 장교들을 고위 지휘관 과정에 받아들이고, 그 대가로 중국 무관들은 조선인민군 훈련 시설에 더 많이 접근할 수 있게 됩니다. 이 프로그램은 인민해방군의 교리와 장비에 익숙한 북한 지휘관 세대를 양성하여, 단발성 정치 협정보다 오래 지속될 상호 운용성과 인적 네트워크를 심화시킵니다."
 CHI_NKO_joint_naval_patrols: "황해 해상 순찰 협정"
 CHI_NKO_joint_naval_patrols_desc: "중국 인민해방군 해군 북해함대와 조선인민군 해군 사령부는 불법 환적, 제3국 선단의 무허가 조업 대응, 미국 항모강습단 감시를 위해 황해에서의 순찰 일정을 조율합니다. 양국 간 해상 통신 핫라인은 해상 충돌 위험을 줄이고 중국을 북한의 사실상 해상 보증국으로 만듭니다."
 CHI_NKO_air_defense_umbrella: "동북아 방공망"
 CHI_NKO_air_defense_umbrella_desc: "랴오닝성과 지린성에 위치한 중국 인민해방군 공군의 레이더 기지들은 이미 한반도를 감시하고 있습니다. 이들의 조기 경보 피드를 조선인민군 공군 지휘소와 연결하고 수평선 너머의 탐지 데이터를 공유하면, 평양이 독자적으로 인프라를 개발할 필요 없이 미국이나 한국의 공습에 대응할 수 있는 충분한 경보 시간을 확보할 수 있습니다."
 CHI_NKO_arms_transfers: "조선광업개발무역회사(KOMID) 공급 계약"
 CHI_NKO_arms_transfers_desc: "조선광업개발무역회사(KOMID)는 북한의 핵심 무기 조달 기관으로, 역사적으로 중국 국영 방산 기업으로부터의 기술 이전을 중개해 왔습니다. 포병 부품, 장갑차 부품, 탄약 공급 계약을 정식화하면 조선인민군의 전투 준비 태세에 있는 치명적인 공백을 메우는 동시에, 중국 방산 기업에는 대외 노출이 적은 수출 고객을 확보해 줍니다."
 CHI_NKO_buffer_state_doctrine: "순망치한 교리"
 CHI_NKO_buffer_state_doctrine_desc: "'입술과 이빨처럼 가까운 사이'라는 구절은 6.25 전쟁 이후 조중 관계를 상징해 왔습니다. 이를 공식적인 전략 교리로 명문화하는 것은 양국 모두 상대방의 붕괴나 타국과의 동맹 결성을 용인할 수 없음을 인정하는 것입니다. 베이징에 있어 북한이라는 완충지대는 미군과 한국군이 압록강에 도달하는 것을 차단합니다. 평양에 있어 중국의 전략적 지원은 정권 생존을 위한 최후의 보루로 남습니다."
 CHI_NKO_party_to_party_dialogue: "중국 공산당-조선노동당 중앙위원회 협정"
 CHI_NKO_party_to_party_dialogue_desc: "중국 공산당과 조선노동당의 관계는 양국 정부의 수립보다 앞서 시작되었으며, 역사적으로 외교 채널보다는 당 대 당 채널을 통해 유지되어 왔습니다. 중앙위원회 연락 체계를 부활시키면 베이징은 국가 간의 격식을 우회하여 조선노동당 정치국으로 이어지는 직통선을 확보하게 되며, 이를 통해 공개적인 기록을 남기지 않고 민감한 논의를 진행할 수 있습니다."
 CHI_NKO_cultural_exchanges: "만수대예술단 교류"
 CHI_NKO_cultural_exchanges_desc: "만수대창작사와 그 공연단은 북한 혁명 문화의 최고 정수를 대변합니다. 만수대 예술단을 베이징과 상하이로 파견하고 중국의 영화 및 오페라 대표단이 평양을 방문하게 함으로써 형제적 연대라는 대외적 서사를 구축하고, 북한의 성과를 환호하는 중국 관객들의 모습을 담은 선전용 영상을 정권에 제공합니다."
 CHI_NKO_un_coordination: "유엔 안보리 거부권 방패 협정"
 CHI_NKO_un_coordination_desc: "유엔 안전보장이사회 내 중국의 상임이사국 지위는 북한을 겨냥한 결의안을 희석하거나 차단하는 데 반복적으로 사용되어 왔습니다. 유엔에서 중국과 북한 외교관 간의 조율을 공식화하면 베이징의 거부권이 전략적으로 배치되어 평양을 가장 가혹한 조치로부터 보호하는 동시에, 대외적으로는 건설적인 관여를 하는 듯한 모습을 유지할 수 있습니다."
 CHI_NKO_un_coordination_tt: "§Y[CHI.GetNameWithFlag]§!은 §Y[NKO.GetNameWithFlag]§!에 반대하는 모든 유엔 제안에 거부권을 행사할 것입니다."
 CHI_NKO_sanctions_circumvention: "조광무역 위장회사 네트워크"
 CHI_NKO_sanctions_circumvention_desc: "조광무역과 단둥, 선양, 홍콩에 등록된 유령회사 네트워크는 제재 물품을 이동시키고 금지된 금융 송금을 처리하며, 북한의 연료 공급을 유지하는 선박 간 원유 환적을 지원합니다. 중국이 이러한 인프라를 묵인하는 태도를 심화하면 중국 기업들이 미국의 세컨더리 보이콧에 노출되는 대가를 치르더라도 평양에는 대체 불가능한 생명줄을 제공하게 됩니다."
 CHI_NKO_strategic_partnership: "전략적 협력 동반자 관계"
 CHI_NKO_strategic_partnership_desc: "양국 관계를 중국 외교 분류의 최고 단계인 '포괄적 전략적 협력 동반자 관계'로 격상하는 것은 북한을 러시아, 파키스탄과 함께 중국의 핵심 전략적 동맹권에 배치하는 것을 의미합니다. 이 선언은 양측이 모든 주요 국제 문제에 대해 협의할 것을 약속하며 워싱턴, 서울, 도쿄를 향해 베이징이 북한의 안보를 자국의 안보와 분리할 수 없는 것으로 간주한다는 신호를 보냅니다."
 CHI_nko_juche_production: "대량 예비 생산"
 CHI_nko_juche_production_desc: "동북 노동 프로그램을 통해 파견된 북한 노동자들은 수십 년간 지속된 주체사상에 의해 형성된 독특한 산업 규율, 즉 최소한의 간접비로 단순하고 검증된 설계의 제품을 대량으로 생산해내는 능력을 갖추고 있습니다. 이 인력을 북방공업(NORINCO)의 단둥 지역 하청 네트워크에 통합하면 단가가 절감되고 보병 장비 부문의 전반적인 생산 라인 용량이 확장됩니다."
 NKO_chi_manufacturing_assistance: "중국 제조 표준"
 NKO_chi_manufacturing_assistance_desc: "조선광업개발무역회사를 통해 활동하는 북방공업(NORINCO) 자회사를 중심으로 한 중국 국영 방산 기업들의 기술 지원은 표준화된 생산 오차 범위, 품질 관리 절차 및 부품 사양을 북한 제1장비국의 경무기 공장들에 이전했습니다. 그 결과 불량률이 감소하고, 더 일관된 탄도 성능이 확보되며, 제1국의 소화기 및 공용화기 라인 전반에서 생산 단가가 절감됩니다."
 CHI_NKO_border_trade_idea: "황금평 무역지구"
 CHI_NKO_energy_supply_idea: "CNPC 연료 공급 협정"
 CHI_NKO_telecom_idea: "고려링크 인프라 프로그램"
 CHI_NKO_telecom_idea_desc: "북한의 통신망을 중국 네트워크와 연결하고 국경 간 통신을 개선하기 위해 고려링크의 모바일 및 데이터 인프라를 확장하는 합작 투자 사업입니다."
 CHI_NKO_shared_modifier: "[CHI.GetAdjectiveCap]-[NKO.GetAdjectiveCap] 관계"
 CHI_NKO_shared_modifier_desc: "경제, 군사, 정치 분야에 걸쳐 축적된 조중 협력의 깊이를 추적합니다. 관계가 강화될수록 농업 및 공업 생산량, 무역 관계, 공장 효율성, 자원 수출이 개선되는 동시에 육군 기획, 조직 및 방공망이 강화됩니다. 또한 양국이 더 긴밀히 조율함에 따라 정보 역량이 확장되고 정치력과 전쟁 지지도가 상승합니다."
 CHI_eternal_allies: "주체-공산주의 동맹"
 CHI_NKO_telecom_network_tt: "[CHI_NKO_telecom_idea_desc]\n"