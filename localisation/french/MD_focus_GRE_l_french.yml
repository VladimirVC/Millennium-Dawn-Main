 GRE_communist_takeover_TT: "§GLe peuple grec exige des élections !§!\n\nAssurez-vous d'avoir suffisamment de poids politique en réserve pour cela. Si vous §Rne parvenez pas§! à élire et à former un gouvernement, vous §Rdevrez organiser de nouvelles élections extraordinaires§! pour donner le pouvoir au §Y[Communist-State_L]§!."
 GRE_fascist_takeover_TT: "§GLe peuple grec exige des élections !§!\n\nAssurez-vous d'avoir suffisamment de poids politique en réserve pour cela. Si vous §Rne parvenez pas§! à élire et à former un gouvernement, vous §Rdevrez organiser de nouvelles élections extraordinaires§! pour donner le pouvoir au §Y[Nat_Fascism_L]§!."
 GRE_civil_units_TT: "§RIl nous est proposé de déplacer notre armée vers les frontières de la Grèce centrale, où nous pourrons tenter de retenir les rebelles.§!"
 GRE_worsen_debt_TT: "§RAggravation de la crise de la dette !§!"
 GRE_lowers_debt_TT: "§GAllégement de la crise de la dette !§!"
 GRE_end_austerity_TT: "§GFin des manifestations contre l'austérité !§!"
