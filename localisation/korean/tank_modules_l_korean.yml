 walker_tank_module_diesel_engine_gen1: "디젤 엔진 I"
 walker_tank_module_diesel_engine_gen1_desc: "디젤 엔진은 보행 병기(워커)를 위한 검증된 전통적인 동력원을 제공하며, 널리 사용되는 부품을 통해 간편한 생산과 유지보수가 가능합니다.\n\n§G설계 힌트: 디젤 엔진은 표준적이고 비용 효율적인 선택이지만, 연료 소모량이 많습니다.§!"
 walker_tank_module_fusion_engine_gen1: "Fusion Engine I"
 walker_tank_module_fusion_engine_gen1_desc: "Fusion engines provide high-density onboard power generation that eliminates conventional fuel consumption, enabling sustained operations without reliance on fuel logistics.\n\n§GDesigner Hint: Fusion Engines offer the same fuel-independence benefits as Nuclear Engines, but they are more reliable and even more expensive.§!"
 walker_tank_module_solar_engine_gen1: "Solar Engine I"
 walker_tank_module_solar_engine_gen1_desc: "Solar engines provide onboard electrical power generation that reduces reliance on conventional fuel logistics, enabling extended operations under favorable conditions.\n\n§GDesigner Hint: Solar Engines offer similar fuel-independence benefits to Nuclear Engines at a lower cost, but they are less reliable.§!"
 walker_tank_module_two_legs: "Bipedal Walker Frame"
 walker_tank_module_two_legs_desc: "Bipedal walker frames provide a standard two-leg mobility layout, offering balanced maneuverability and protection for general-purpose combat roles.\n\n§GDesigner Hint: Two-leg frames are the baseline walker configuration, delivering reliable mobility and survivability without the higher cost and complexity of heavier leg assemblies§!"
 walker_tank_module_four_legs: "Quadrupedal Heavy Frame"
 walker_tank_module_four_legs_desc: "Quadrupedal heavy frames use four reinforced leg assemblies to improve stability under fire and support heavier loads, increasing combat resilience during assaults.\n\n§GDesigner Hint: Four-leg heavy frames provide higher breakthrough and improved reliability, but they are more expensive to build and suffer reduced movement.§!"
 walker_tank_light_chassis: "Light Walker Body"
 walker_tank_light_chassis_desc: "Light walker chassis form the core body structure of walker tanks, prioritizing low weight and agility for rapid maneuver and repositioning.\n\n§GDesigner Hint: Light Chassis provide high maneuverability and access to 1 armament slot, making them ideal for roles where speed matters most§!"
 walker_tank_medium_chassis: "Medium Walker Body"
 walker_tank_medium_chassis_desc: "Medium walker chassis form the core body structure of walker tanks, balancing protection, mobility, and payload for versatile frontline performance.\n\n§GDesigner Hint: Medium Chassis are the all-round option, providing access to 2 armament slots for flexible loadouts.§!"
 walker_tank_heavy_chassis: "Heavy Walker Chassis"
 walker_tank_heavy_chassis_desc: "Heavy walker chassis form the core body structure of Heavy Walker Tanks, prioritizing maximum payload and weapon integration over speed and agility.\n\n§GDesigner Hint: Heavy Chassis are very expensive and the slowest walker body, but they offer the most armament options and are built to overwhelm and destroy the toughest targets§!"
 walker_tank_module_battlestation_1: "Battle Station Suite I"
 walker_tank_module_battlestation_1_desc: "Battle station suites integrate fire control, sensors, and onboard coordination tools to improve overall combat effectiveness and responsiveness across the platform.\n\n§GDesigner Hint: Battle Station Suites provide broad, across-the-board improvements to walker performance, making them a strong general upgrade for any role and loadout§!"
 walker_tank_module_countermeasures_1: "Active Protection System I"
 walker_tank_module_countermeasures_1_desc: "Active protection systems use sensors and rapid-response countermeasures to detect and defeat incoming threats, improving overall defensive survivability under fire.\n\n§GDesigner Hint: Active Protection Systems provide a broad defensive upgrade, helping walkers survive missiles, rockets, and other precision threats when operating on the front line§!"
 walker_tank_module_anti_rocket_laser_1: "Point Defense Laser I"
 walker_tank_module_anti_rocket_laser_1_desc: "Point defense lasers use rapid tracking and directed-energy bursts to detect and destroy incoming rockets before impact, reducing the likelihood of successful penetrations.\n\n§GDesigner Hint: Point Defense Lasers improve protection against rocket and missile threats by reducing penetration chances, making them especially valuable for breakthrough units expected to take sustained fire§!"
 walker_tank_module_recon_drone_1: "Recon Drone Package I"
 walker_tank_module_recon_drone_1_desc: "Recon drone packages allow walkers to deploy a battlefield drone for forward observation and target confirmation, improving situational awareness beyond line of sight.\n\n§GDesigner Hint: Recon Drones enhance reconnaissance.§!"
 walker_tank_module_suicide_drone_1: "Loitering Munition Cells I"
 walker_tank_module_suicide_drone_1_desc: "Loitering munition cells launch expendable attack drones that can search, track, and strike targets with improved guidance and target discrimination compared to standard missile salvos.\n\n§GDesigner Hint: Loitering Munitions provide better targeting and hit reliability than conventional VLS strikes, but they deliver lower raw damage due to smaller warheads and limited payload§!"
