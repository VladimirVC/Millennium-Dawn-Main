l_russian:
 CYP_division_of_the_island: "Разделённый остров"
 CYP_division_of_the_island_desc: "The Green Line cuts Cyprus in two. Northern Cyprus remains under Turkish occupation and the Republic's authority ends at a UN-monitored buffer zone. The unresolved division drains political will and keeps a portion of the population and territory out of reach."
 CYP_eu_membership: "EU Member State"
 CYP_eu_membership_desc: "Cyprus joined the European Union in 2004, gaining access to the single market, structural funds, and a framework of political backing from Nicosia's partners in Brussels. Membership shapes the island's economic trajectory and diplomatic posture."
 CYP_offshore_gas: "East Med Gas Fields"
 CYP_offshore_gas_desc: "Exploration blocks in Exclusive Economic Zone waters have confirmed commercially viable gas reserves. Extraction revenue and licensing deals bring a new stream of income and complicate relations with Turkey, which contests parts of the zone."
 CYP_financial_center: "Regional Financial Hub"
 CYP_financial_center_desc: "Cyprus has developed a reputation as a low-tax jurisdiction for holding companies, shipping registries, and international capital flows. The sector brings in substantial service income but attracts scrutiny over transparency."
 CYP_tourism_economy: "Tourism-Driven Economy"
 CYP_tourism_economy_desc: "Sun, coast, and antiquity draw millions of visitors each year. Tourism is a cornerstone of Cypriot GDP, supporting hospitality and retail while smoothing some of the import pressure from a consumption-heavy economy."
 CYP_foreign_investment_wave: "Foreign Investment Drive"
 CYP_foreign_investment_wave_desc: "An active programme of tax incentives, investor visas, and bilateral guarantees has opened a short window of elevated foreign direct investment. New capital is flowing into services, real estate, and light manufacturing."
 CYP_develop_offshore_gas: "Develop Offshore Gas Fields"
 CYP_develop_offshore_gas_desc: "Commission survey work and commit licensing contracts to bring East Med gas blocks into production. The investment is substantial, but successful development will provide a long-term income stream and reinforce Cypriot claims over its Exclusive Economic Zone."
 CYP_eu_accession_push: "EU Deepening Initiative"
 CYP_eu_accession_push_desc: "Cyprus engages Brussels and key member states on full participation in EU integration processes, from Schengen candidacy to Eurozone consolidation. Sustained lobbying builds Greek and European goodwill toward Nicosia's position on the island dispute."
 CYP_bicommunal_talks: "Bicommunal Talks"
 CYP_bicommunal_talks_desc: "Invite representatives from Northern Cyprus to a structured dialogue under UN auspices. Progress is rarely dramatic, but sustained contact keeps a settlement path open and signals to Greece and Europe that Nicosia is acting in good faith."
 CYP_court_foreign_investment: "Court Foreign Investment"
 CYP_court_foreign_investment_desc: "Offer targeted incentives to foreign companies considering Cyprus as a base of operations. The initial package costs treasury funds, but successful attraction of capital raises service-sector income and broadens the tax base for a limited period."
 CYP_mobilize_greek_cypriots: "Rally the Greek-Cypriot Community"
 CYP_mobilize_greek_cypriots_desc: "Direct state resources toward civic associations, the Church, and the diaspora to shore up support for the Republic's vision of the island. A confident, organised Greek-Cypriot community strengthens Nicosia's hand in the contest over Cyprus's future."
 CYP_outreach_to_north: "Reach Across the Green Line"
 CYP_outreach_to_north_desc: "Fund cross-community projects, trade openings, and quiet contacts with moderates in the North. Every Turkish-Cypriot won over to a shared, Nicosia-led settlement chips away at the case for permanent partition."
 NCY_mobilize_turkish_cypriots: "Rally the Turkish-Cypriot Community"
 NCY_mobilize_turkish_cypriots_desc: "Mobilise the institutions of the North and Ankara's backing to consolidate the Turkish-Cypriot community behind the existence of a separate state. A unified North is harder to absorb into any Greek-led settlement."
 NCY_settler_program: "Anatolian Settlement Programme"
 NCY_settler_program_desc: "Continue the long-running policy of resettling mainland Anatolian families in the North. The demographic shift cements Turkish-Cypriot weight on the island, though it deepens the grievance in the South and draws international criticism."
