 ANTARCTICA_STATION_SEND_SUPPLIES_TEXT_DELAYED: "§Y前提条件:§!\n[!antarctica_station_send_supplies_button_click_enabled]\n§Y効果:§!\n基地の燃料を最大容量まで補給する。\nコスト: §R1000燃料あたり$0.25b§!（南極の冬期は2倍）\n費用は国庫から差し引かれ、燃料は配送期間の経過後に到着する。\n\n§Y配送期間:§!§G15日（11月～3月）§!または§R30日（4月～10月）§!。"
 ANTARCTICA_STATION_SEND_OBSERVERS_TEXT: "査察団を派遣"
 ANTARCTICA_STATION_SEND_OBSERVERS_TEXT_DELAYED: "§Y前提条件:§!\n[!antarctica_station_send_observers_button_click_enabled]§Y吹雪の状況:§! [MD_antarctica_observer_blizzard_status]\n\n§Y効果:§!\n選択した基地へ査察任務を派遣する。\n対象国には即座に通知される。\n査察団は§Y7日§!後に到着し、違法な研究活動やオープンループ設備の利用を調査する。"
