 SLV.conservatism: "£SLV_Slovenian_Peoples_Party (SLS) スロベニア人民党"
 SLV.conservatism_desc: "保守主義 - スロベニア人民党（スロベニア語：Slovenska ljudska stranka）は、1988年に設立されたキリスト教・農業基盤の政党であり、当初はスロベニア農民同盟として知られていた。スロベニア農民同盟は、1945年以来スロベニアで初めて公然と非共産主義を掲げた政党であり、その設立は1988年の「スロベニアの春」における重要な出来事の一つと見なされている。\n1991年、同党は戦前のカトリック系保守政党であるスロベニア人民党にちなんで、現在の「スロベニア人民党」へと改称した。この改称は、戦前のスロベニア人民党の正統な後継者であると自認するスロベニアキリスト教民主党との間で論争を引き起こした。同党は、亡命中に歴史的なスロベニア人民党と合併していたのである。"
 SLV.liberalism_desc: "自由主義 - スロベニア自由民主党（スロベニア語：Liberalna demokracija Slovenije）は、社会自由主義かつ親欧州的な政党である。LDSは、1992年以降スロベニアの連立政権の一翼を担ってきた社会主義連合（自由党）から結成された。"
 SLV.socialism: "£SLV_western_social_democrat (SD) 社会民主党"
 SLV.socialism_desc: "社会民主主義 - 社会民主統一リスト（スロベニア語：Združena lista socialnih demokratov）は、親欧州的な社会民主主義政党であり、スロベニア共産主義者同盟の後継政党である。1990年代初頭、共産党の支持率が急速に低下する中、同党は存在意義を維持するために大幅な変革を遂げた。同党は統一リストとして知られる中道左派の政党連合へと再編された。当初、この新たに結成された連合は得票率13.6%を獲得し、スロベニアで第3位の勢力となった。しかし1993年、社会福祉政策をめぐる内部対立が連合内の分裂を招いた。数名の有力メンバーが党を離脱し、当初の連合パートナーの一つであったスロベニア年金受給者民主党を再結成した。この分裂が統一リストの支持率低下を招き、得票率は9％まで落ち込んだ。新党首に選出されたボルート・パホル氏の指導の下、同党は大きな転換期を迎えた。時を経て、同党はより穏健な立場へと進化し、共産主義のルーツから距離を置くようになった。今日では、かつての共産主義のルーツとはほぼ見分けがつかないほど変貌を遂げていると言えるだろう。"
 SLV.Nat_Autocracy: "£SLV_nationalist_military_junta (SAF/SV) スロベニア軍"
 SLV.Nat_Autocracy_desc: "軍事政権 - スロベニア軍（スロベニア語：Slovenska vojska） 現在のスロベニア軍は、1968年にユーゴスラビア国内の準軍事組織として設立された地域防衛隊を統合し、1990年に結成された「スロベニア共和国地域防衛隊（スロベニア語：Teritorialna Obramba Republike Slovenije）」を前身としている。1991年にスロベニアが独立を宣言した際、スロベニア領土防衛軍と警察は「10日戦争」においてユーゴスラビア人民軍と交戦した。1994年にスロベニア領土防衛軍が再編され、スロベニア軍は正式に創設された。"
 SLV.Nat_Populism: "£SLV_nationalist_right_wing_populist (SNS) スロベニア国民党"
 SLV.Nat_Populism_desc: "右派ポピュリズム - スロベニア国民党（スロベニア語：Slovenska nacionalna stranka）は、ズマゴ・イェリンチッチ・プレメニティによって設立された国民ポピュリスト政党である。1993年、党内から反発する派閥が離脱し、「スロベニア国民右派」と「国民労働党」を結成した。離脱した党員の多くは、ジェリンチッチがスロベニア・パルチザンを支持することに反対した「スロベニア自警団」の支持者であった。同党のイデオロギーは強い反教権主義を掲げ、徹底した政教分離の立場を主張しており、LGBTの権利に反対している。また、国有企業の民営化にも反対している。さらに、同党は国旗と国章の変更を求めており、現在のシンボルは第二次世界大戦中の特定の準軍事組織と関連付けられており、スロベニア特有の歴史的特徴を欠いていると主張している。スロベニア国民党は、ファシズムおよび旧ユーゴスラビアのティトー共産主義政権に対するスロベニアの抵抗運動に共感を示している。同党は、スロベニアのEUおよびNATOへの加盟に反対している。同党の指導者たちは、特定の少数民族、特にスロベニアのロマ人に対して、排外主義的、さらには人種差別的な態度をとっていると非難されてきた。"
