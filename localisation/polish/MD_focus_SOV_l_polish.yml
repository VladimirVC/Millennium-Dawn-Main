 SOV_referendum_in_kuban: "Projekt [KUB.GetFlag]Republiki Kubańskiej"
 SOV_referendum_in_kuban_desc: "Republika Kubańska była historycznym tworem z czasów rosyjskiej wojny domowej. Dziś rozważamy ponowne rozszerzenie jej autonomii, dla obopólnych korzyści gospodarczych zarówno regionu, jak i całej Rosji."
 SOV_referendum_in_ural: "Ożywienie projektu [URA.GetFlag]Republiki Uralskiej"
 SOV_referendum_in_ural_desc: "Gubernator Eduard Rossel zaproponował kiedyś utworzenie Republiki Uralskiej, aby nadać regionowi status równy republikom narodowym. Choć prawnie zablokowana, pomysł wciąż jest aktualny. Teraz może być właściwy moment, aby ponownie rozważyć i ewentualnie ożywić ten od dawna odłożony projekt."
 ukraha_rebellion: "Na Ukrainie był Majdan"
 SOV_paid_cons_tt: "Additional Income: $§G0.015§! per 10 million people from the §YPaid Off Conscripts§!\n"
 SOV_party_earnings_tt: "Additional Income: $$§G0.300§! From the §YParty Earnings§!\n"
 SOV_bumaga: "Zjednoczeni tylko na papierze"
 SOV_bumaga_desc: "Choć LDPR sprawuje władzę, wewnętrzne podziały wciąż trwają, podważając spójność partii. Choć na papierze wydają się zjednoczeni, frakcje podążają w różnych kierunkach. Czas wreszcie zjednoczyć naszą partię i wyeliminować wewnętrzne konflikty, aby stworzyć silny, spójny front."
 SOV_jirik_partiya: "Partia Żyrinowskiego"
 SOV_jirik_partiya_desc: "Partia Żyrinowskiego stoi zjednoczona wokół swojego lidera. Lojalność i dyscyplina wzmocniły trzon partii, umożliwiając jej realizację nacjonalistycznego programu z przekonaniem. Ta jedność umacnia naszą pozycję na rosyjskim scenie politycznej."
 SOV_jirik_partiya_jirinovci: "Zbliż do siebie lojalnych"
 SOV_jirik_partiya_jirinovci_desc: "Musimy zebrać najbardziej oddanych i lojalnych członków, którzy bez wahania będą wykonywać rozkazy. Ci niezłomni zwolennicy będą stanowić trzon naszej partii, gotowi działać zdecydowanie, gdy tylko zajdzie taka potrzeba. Wzmocnienie lojalności jest niezbędne dla naszego przetrwania."
 SOV_jirik_partiya_chistki: "Czystki partyjne"
 SOV_jirik_partiya_chistki_desc: "Czas oczyścić partię z wolnomyślicieli i potencjalnych zdrajców, którzy zagrażają naszej jedności. Usuwając dysydentów, zapewnimy zdyscyplinowaną i posłuszną organizację. To oczyszczenie jest niezbędne dla zabezpieczenia naszej politycznej przyszłości."
 SOV_jirik_partiya_puppet_sovet: "Najwyższa Rada Marionetek"
 SOV_jirik_partiya_puppet_sovet_desc: "Rada Najwyższa musi być wyłącznie naszym rzecznikiem, nie posiadając żadnej realnej autonomii ani władzy. Podporządkowując ten organ, zapobiegamy kwestionowaniu przywództwa i zapewniamy absolutną kontrolę nad decyzjami partii."
 SOV_jirik_partiya_young: "Militaryzacja Skrzydła Młodzieży"
 SOV_jirik_partiya_young_desc: "Młodzież musi być przygotowana na nadchodzący konflikt, ponieważ czasy pokoju dobiegają końca. Szkolenie i militaryzacja młodych członków partii stworzy nowe pokolenie gotowe bronić naszych ideałów. Skupienie się na młodzieży jest kluczowe dla naszej długoterminowej siły."
 SOV_jirik_partiya_total_control: "Całkowita kontrola"
 SOV_jirik_partiya_total_control_desc: "Nasza partia musi być całkowicie pod naszą kontrolą, aby zapobiec buntom i nieautoryzowanym działaniom. Absolutna dominacja nad wszystkimi funkcjami partii zapewnia efektywność i lojalność. Tylko dzięki całkowitej kontroli możemy osiągnąć nasze cele."
 SOV_jirik_partiya_and: "Żyrinowski i Partia"
 SOV_jirik_partiya_and_desc: "Władza partii nie spoczywa wyłącznie na jej liderze; ona go uzupełnia i wspiera. Ta symbiotyczna relacja pozwala na skoordynowane przywództwo i szersze poparcie wśród różnych frakcji partyjnych. Razem tworzą one zjednoczoną siłę."
 SOV_jirik_partiya_and_samodeal: "Zachęcaj do aktywności osobistej"
 SOV_jirik_partiya_and_samodeal_desc: "Będziemy wspierać inicjatywę i samodzielną działalność w szeregach partii. Zachęcanie członków do brania odpowiedzialności i proaktywnego działania wzmacnia nasz ruch od wewnątrz. Takie podejście buduje bardziej odporną organizację."
 SOV_jirik_partiya_and_kadres: "Pragmatyczne podejście do zasobów ludzkich"
 SOV_jirik_partiya_and_kadres_desc: "Zamiast domagać się ślepej lojalności, będziemy szukać dla partii najskuteczniejszych i najbardziej kompetentnych pracowników. Kompetencje i wyniki będą miały pierwszeństwo przed zwykłym oddaniem, zapewniając silniejsze i bardziej efektywne przywództwo."
 SOV_jirik_partiya_and_sovet: "Wzmocnić Najwyższą Radę"
 SOV_jirik_partiya_and_sovet_desc: "Rada Najwyższa powinna pokazać, że Żyrinowski nie jest dyktatorem, a partia akceptuje pluralizm poglądów. Wzmacniając ten organ, pokazujemy zaangażowanie partii w wewnętrzną debatę i współrządzenie."
 SOV_jirik_partiya_and_money: "Dodatkowe zarobki"
 SOV_jirik_partiya_and_money_desc: "Będziemy zwiększać dochody partii z różnych źródeł, aby skuteczniej finansować naszą działalność. Zwiększanie zasobów finansowych jest niezbędne dla zwiększenia naszych wpływów i utrzymania długoterminowych kampanii. Dywersyfikacja źródeł dochodów jest strategicznym priorytetem."
 SOV_jirik_partiya_and_autonomous: "Partia Autonomiczna"
 SOV_jirik_partiya_and_autonomous_desc: "Autonomiczna partia gwarantuje wolność opinii i różnorodność w swoich szeregach. Umożliwienie wewnętrznej niezależności sprzyja innowacyjności i debacie, co wzmocni naszą platformę polityczną i zdolność adaptacji."
 SOV_alliance_armenia: "Koniec Azerbejdżanu"
 SOV_alliance_armenia_desc: "Sfabrykowana historia Azerbejdżanu jedynie blokuje rozwój naszej bratniej Armenii. Zmierzymy się z tą przeszkodą i ją pokonamy, aby zapewnić bezpieczeństwo i dobrobyt Armenii."
 SOV_south_azer_admistration: "Gubernatorstwo irańskie"
 SOV_south_azer_admistration_desc: "Zamierzamy wesprzeć lokalne siły lojalne wobec nas w południowym Azerbejdżanie, aby wzniecić bunt, który osłabi irańską władzę. Ta strategia ma na celu destabilizację irańskiej kontroli i rozszerzenie naszych wpływów."
 SOV_nov: "Powrót Noworosja"
 SOV_nov_desc: "Czas przywrócić Noworosji należne jej miejsce w naszym imperium. Odbudowa tego regionu wzmacnia nasze południowe granice i ożywia nasze historyczne dziedzictwo."
 SOV_galicia: "Gubernatorstwo Galicyjskie"
 SOV_galicia_desc: "Galicja to wyjątkowy region, który wymaga gruntownej reformy, aby w pełni zintegrować się z naszym imperium. Choć zajmie to trochę czasu, Galicja ostatecznie uzyska status guberni i stanie się lojalną częścią naszego królestwa."
 SOV_help_sirya: "Bracia Syryjscy"
 SOV_help_sirya_desc: "Zamierzamy zwiększyć nasze wpływy w Syrii, kraju, który jest celem ataków zachodnich globalistów dążących do jego zniszczenia. Wspieranie Syrii chroni nasze strategiczne interesy i przeciwdziała wrogim siłom."
 SOV_zhirinovsky_attack_ukraha: "Operacja wojskowa na Ukrainie"
 SOV_zhirinovsky_attack_ukraha_desc: "Naszym celem jest zakończenie istnienia Ukrainy jako niepodległego państwa. Czas, aby rosyjska flaga znów zawisła nad Kijowem, przywracając naszą historyczną kontrolę."
 SOV_question_of_bavaria: "Bawarski Separatyzm"
 SOV_question_of_bavaria_desc: "Popieramy dążenie Bawarii do odłączenia się od Niemiec. Zachęcanie do separatyzmu osłabi Niemcy i będzie służyć naszym strategicznym interesom w regionie."
 SOV_question_of_east_german: "Recall the NRD"
 SOV_question_of_east_german_desc: "Przypomnimy mieszkańcom Niemiec Wschodnich o dumnej historii NRD. Przywrócenie tego dziedzictwa wspiera nasze szersze cele polityczne i wpływy regionalne."
 SOV_europe_pizda: "Przygotowania do Marszu do Europy"
 SOV_europe_pizda_desc: "Nadszedł czas, aby wyeliminować zagrożenie ze strony Europy. Zniszczymy je od wewnątrz i całkowicie złamiemy ich władzę. Ta kampania oznacza początek naszego zdecydowanego natarcia na Europę."
 SOV_question_of_spain: "Podzielona Hiszpania"
 SOV_question_of_spain_desc: "Hiszpania od dawna utrzymuje równowagę w regionach autonomicznych, aby zapobiegać separatyzmowi. Zamierzamy zakłócić tę równowagę, aby osłabić Hiszpanię i pogłębić podziały regionalne. Ta strategia doprowadzi do rozbicia jedności Hiszpanii."
 SOV_question_of_germany: "Problem niemiecki"
 SOV_question_of_germany_desc: "Niemcy pozostają kluczowym rywalem strategicznym. Nie zamierzamy już okazywać pobłażliwości, jak w poprzednich stuleciach. Rozwiązanie problemu niemieckiego jest kluczowe dla zapewnienia naszej dominacji w Europie."
 SOV_crusade_russian: "Rosyjska krucjata"
 SOV_crusade_russian_desc: "Czas rozpocząć naszą wielką rosyjską krucjatę do Ziemi Świętej. To, czego nie udało się osiągnąć dawnym cesarzom, my dokonamy z determinacją i siłą. Ta misja odnawia nasz duchowy i imperialny cel."
 SOV_crusade_antioch: "Gubernatorstwo Antiochii"
 SOV_crusade_antioch_desc: "Te ziemie niegdyś należały do ​​Królestwa Antiochii i my je przywrócimy. Odrodzenie tego gubernatorstwa przywraca naszą obecność i honoruje historyczne roszczenia."
 SOV_crusade_assiryan: "Gubernatorstwo asyryjskie"
 SOV_crusade_assiryan_desc: "Współczesna Syria to cień wielkiego imperium asyryjskiego. Poprowadzimy Syryjczyków z powrotem do świetności pod rządami Rosji, przywracając im dawną potęgę i prestiż."
 SOV_crusade_isr: "Gubernatorstwo Jerozolimy"
 SOV_crusade_isr_desc: "Jerozolima jest ostatecznym celem naszej kampanii. Grobowiec Pański będzie odtąd należał do nas, umacniając nasze duchowe i polityczne wpływy w regionie."
 SOV_crusade_egy: "Gubernatorstwo koptyjskie"
 SOV_crusade_egy_desc: "Koptowie są prawdziwymi władcami Egiptu. Będziemy wspierać ich sprawę i zrobimy wszystko, co w naszej mocy, aby pomóc im odzyskać należną im pozycję w naszym imperium."
 SOV_romanian_shit: "Zagrożenie rumuńskie"
 SOV_romanian_shit_desc: "Rumunia zagraża naszym południowo-zachodnim granicom. Musimy szybko rozwiązać ten problem, aby zabezpieczyć nasze granice i utrzymać stabilność regionalną."
 SOV_treaty_with_afganistan: "Powrót do Afganistanu"
 SOV_treaty_with_afganistan_desc: "Nasze imperium ponownie dotarło do granic Afganistanu. Być może tym razem szczęście nam sprzyja i odzyskamy kontrolę nad tym strategicznym regionem."
 SOV_allied_nrk: "Sojusz z Koreą Północną"
 SOV_allied_nrk_desc: "Dążymy do wzmocnienia naszych wpływów na Wschodzie poprzez rozszerzanie sojuszy, zaczynając od narodu, którego mieszkańcy uznają nasze wsparcie dla ich istnienia. To partnerstwo umocni naszą pozycję w regionie."
 SOV_return_kgb: "Przywrócić KGB"
 SOV_return_kgb_desc: "Obecne służby wywiadowcze to marna imitacja KGB z czasów sowieckich, które było najskuteczniejsze. Przywrócimy KGB do życia, aby przywrócić siłę i bezpieczeństwo."
 SOV_storm_v: "Wysyłaj jeńców na wojnę"
 SOV_storm_v_desc: "Więźniowie drenują publiczne zasoby, nie wnosząc do nich żadnego wkładu. Teraz zostaną wysłani, by walczyć za ojczyznę i spłacać długi poprzez służbę."
 SOV_new_russian_army: "Rosyjska Armia Ochotnicza"
 SOV_new_russian_army_desc: "Nasze siły zbrojne wymagają gruntownej reformy. Obecny system zawiódł i nadszedł czas, aby stworzyć armię ochotniczą, gotową bronić Rosji z nową energią."
 SOV_women: "Bataliony kobiet"
 SOV_women_desc: "Nasze kobiece bataliony zasieją strach wśród wrogów. Sama ich obecność sprawi, że przeciwnicy uciekną w panice."
 SOV_kazachestvo: "Zmilitaryzować Kozaków"
 SOV_kazachestvo_desc: "Kozacy muszą zaprzestać swojego niesfornego zachowania i powrócić do służby jako zdyscyplinowana część rosyjskiej armii."
 SOV_war_kafedra: "Przywrócić departamenty wojskowe"
 SOV_war_kafedra_desc: "Likwidacja jednostek wojskowych była poważnym błędem. Przywrócimy je, aby wzmocnić naszą armię i szkolnictwo wojskowe."
 SOV_nationalize: "Przejrzyj wyniki prywatyzacji"
 SOV_nationalize_desc: "Dokonamy ponownej oceny destrukcyjnych skutków prywatyzacji i zniwelujemy jej szkodliwe skutki, aby chronić interesy narodowe."
 SOV_minister_propaganda: "Utwórz Ministerstwo Propagandy"
 SOV_minister_propaganda_desc: "Propaganda musi być scentralizowana i podporządkowana osobnemu ministerstwu, aby zagwarantować całkowitą kontrolę i skuteczność wszystkich przekazów."
 SOV_pay_off_army: "Możliwość wykupienia armii"
 SOV_pay_off_army_desc: "Umożliwimy jednostkom unikanie służby wojskowej poprzez zapłacenie wysokiej składki, która zostanie ponownie zainwestowana w wzmocnienie armii."
 SOV_jirik_cult: "Kult Żyrinowskiego"
 SOV_jirik_cult_desc: "Żyrinowski stał się ikoną naszego państwa. Ludzie stworzyli wokół niego kult, a my pozwolimy mu rozkwitnąć."
 SOV_fuck_parties: "Do diabła z demokracją"
 SOV_fuck_parties_desc: "Demokracja jest narzędziem zachodnich służb wywiadowczych do szerzenia propagandy. Nie pozwolimy, by wrogowie wpływali na naszą ziemię."
 SOV_jirik_fear: "Państwo policyjne"
 SOV_jirik_fear_desc: "Nie będzie litości dla wrogów ojczyzny. Nasza policja ma mnóstwo pracy, by utrzymać porządek."
 SOV_jirik_stand: "Ojczyzna jest ponad wszystkim"
 SOV_jirik_stand_desc: "Obrona ojczyzny jest obowiązkiem każdego obywatela. Nawet cywile powinni być gotowi bronić swojego kraju z niezachwianą odwagą."
 SOV_jirik_warlord: "Najwyższy Władca"
 SOV_jirik_warlord_desc: "Naprzód, ku świetlanej przyszłości wielkiej i potężnej Rosji!"
 SOV_military_exercises_anti_turkey_idea: "Wspólne ćwiczenia z armią rosyjską"
 SOV_military_exercises_anti_turkey1_idea: "Wspólne ćwiczenia z koalicją antyturecką"
 SOV_jirik_loyal_party_support_idea: "Polityka wewnętrzna partii"
 SOV_jirik_unloyal_party_idea: "Partia Autonomiczna"
 SOV_jirik_loyal_party_idea: "Lojalna Partia"
 SOV_jirik_bad_party_idea: "Zjednoczeni tylko na papierze"
 SOV_jirik_cult_idea: "Militarystyczna Rosja"
