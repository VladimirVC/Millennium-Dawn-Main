l_japanese:
 faroe_islands_focus: "フェロー諸島 国家方針ツリー"
 FAO_national_decisions: "フェロー諸島の国家決定"
 FAO_national_decisions_desc: "フェロー諸島は、非常に穏やかでありながらも緊張感のある状況にある。政治指導者たちが島とその住民の発展のためにあらゆる手段を講じようとする一方で、常に差し迫った問題である独立問題にも取り組まなければならない。今すぐ独立を望む人もいれば、より安定した基盤が築かれるまで待つことを望む人もいる。いずれにせよ、最終的にこの島が真に自由になるかどうかは、フェロー諸島の人々とデンマーク双方の判断にかかっている。"
 FAO_decision_independence_war: "独立戦争"
 FAO_decision_independence_war_desc: "ついにその時が来た。政治家たちは国民に選択を迫った。戦争が宣言され、今やデンマークが王位を守り切れるか、それとも世論の圧力によってすべての勢力が和平を強いられ、王位が失われるかの瀬戸際にある。"