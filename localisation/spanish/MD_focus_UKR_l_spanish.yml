 ukr_sabotage.1.t: "Ucrania atacó nuestras reservas"
 ukr_sabotage.1.d: "In a recent drone attack, Ukraine struck a warehouse holding some old heavy equipment."
 ukr_sabotage.1.a: "Maldición"
 ukr_sabotage.2.t: "Ucrania atacó nuestras reservas"
 ukr_sabotage.2.d: "In a recent drone attack, Ukraine struck a warehouse holding some old light equipment."
 ukr_sabotage.2.a: "Maldición"
 ukr_sabotage.3.t: "Ucrania atacó nuestra producción militar"
 ukr_sabotage.3.d: "In a recent drone attack, Ukraine struck one of our manufacturers, and we have suffered temporary damage."
 ukr_sabotage.3.a: "Pagarán por ello."
 UKR_our_ukraine_start: "Nuestra Ucrania"
 UKR_our_ukraine_start_desc: "Es hora de poner orden en el país y aplicar reformas liberales. Para nosotros, la gente es lo primero!"
 UKR_our_ukraine_secretariat: "Secretaría de la Presidencia de Ucrania"
 UKR_our_ukraine_secretariat_desc: "La Secretaría desempeña un papel clave en la gestión de funciones administrativas y organizativas relacionadas con las actividades presidenciales. El propósito principal de la creación de la Secretaría de la Presidencia de Ucrania es garantizar el cumplimiento de las facultades constitucionales del Presidente y la ejecución efectiva de sus deberes."
 UKR_our_ukraine_secretariat_reduction: "Reducción del personal de la Secretaría"
 UKR_our_ukraine_secretariat_reduction_desc: "Necesitamos reducir el número de personal de la secretaría para optimizar el trabajo de las agencias gubernamentales y reducir los costos presupuestarios."
 UKR_our_ukraine_decentralization: "Descentralización"
 UKR_our_ukraine_decentralization_desc: "Necesitamos aumentar el gobierno local en nuestro país."
 UKR_our_ukraine_wto: "Pedir ayuda para unirse a la OMC"
 UKR_our_ukraine_wto_desc: "Estamos listos para convertirnos en miembros de la OMC y necesitamos apoyo en esto."
 UKR_our_ukraine_yanukovich_go_home: "Destituir a Yanukovych"
 UKR_our_ukraine_yanukovich_go_home_desc: "Yanukovych, como primer ministro, se ha mostrado terrible, así que lo destituirás y nombrarás a un nuevo primer ministro."
 UKR_our_ukraine_timoha: "Oficina de Tymoshenko"
 UKR_our_ukraine_timoha_desc: "La famosa Yulia Tymoshenko se ha unido a nuestro gobierno, veamos qué aportará a nuestro estado."
 UKR_our_ukraine_aviation_reform: "Reforma de la Industria de Aviación"
 UKR_our_ukraine_aviation_reform_desc: "La industria de la aviación es muy importante para nuestro país, y nos esforzaremos por revivirla."
 UKR_our_ukraine_help_western: "Ganar el apoyo de Lviv"
 UKR_our_ukraine_help_western_desc: "We will restore the supply of hot and cold water in Lviv, thereby enlisting the support of the residents of this city and possibly the region."
 UKR_our_ukraine_cheap_gas_negotiate: "Negociaciones para reducir los precios del gas"
 UKR_our_ukraine_cheap_gas_negotiate_desc: "We will try to negotiate with Moscow on lowering energy prices."
 UKR_our_ukraine_service_life: "Reducir la vida de servicio"
 UKR_our_ukraine_service_life_desc: "El ejército ucraniano necesita modernización. Nuestra primera reforma en esta área será reducir el período de servicio en el ejército, de dos años a un año! Así, los conscriptos perderán menos tiempo para servir."
 UKR_our_ukraine_nato_eu: "Apoyar la integración de Ucrania en la OTAN y la UE"
 UKR_our_ukraine_nato_eu_desc: "Comencemos una integración más progresiva en la OTAN y la UE. Esto es necesario para la seguridad militar y económica de nuestro gran país."
 UKR_our_ukraine_fire_corrupt: "Despedir a los corruptos"
 UKR_our_ukraine_fire_corrupt_desc: "Hay personas corruptas en nuestro gobierno y las despediremos! No habrá lugar para la corrupción en nuestro país!!!"
 UKR_our_ukraine_form_new_government: "Formar un nuevo gobierno"
 UKR_our_ukraine_form_new_government_desc: "Ahora que hemos despedido a todos los que han estado robando a nuestro país, podemos formar un nuevo gobierno, honesto y justo."
 UKR_our_ukraine_fight_corruption: "Lucha contra la corrupción"
 UKR_our_ukraine_fight_corruption_desc: "La corrupción es el principal enemigo de nuestro país, la combatiremos con fuerza!"
 UKR_our_ukraine_alternative_energy_sources: "Fuentes de energía alternativa"
 UKR_our_ukraine_alternative_energy_sources_desc: "Desarrollar fuentes de energía alternativa nos ayudará a reducir nuestra dependencia de sus importaciones. "
 UKR_our_ukraine_crush_oligarchs: "Reducción de la influencia de los oligarcas"
 UKR_our_ukraine_crush_oligarchs_desc: "La oligarquía es el enemigo número dos en nuestro país. Pueden influir en nuestro gobierno eludiendo las leyes. Para evitar esto, reduciremos su influencia y trataremos de expulsarlos de nuestro país."
 UKR_our_ukraine_increase_media_freedom: "Aumentar la libertad de los medios"
 UKR_our_ukraine_increase_media_freedom_desc: "Nuestros medios han estado restringidos durante mucho tiempo y ahora, durante nuestro reinado, serán más libres e independientes que nunca!"
 UKR_our_ukraine_release_political_prisoners: "Liberar a los presos políticos"
 UKR_our_ukraine_release_political_prisoners_desc: "Bajo el gobierno anterior, muchos políticos de la oposición fueron encarcelados. Démosles libertad!"
 UKR_our_ukraine_internet_freedom: "Libertad en Internet"
 UKR_our_ukraine_internet_freedom_desc: "La libertad en Internet implica que los ciudadanos tienen derecho al acceso libre a la información, a la libertad de expresión y a la privacidad en las comunicaciones en línea. Asegurémonos de que estos derechos y libertades estén protegidos."
 UKR_our_ukraine_provide_housing: "Proporcionar vivienda a los ciudadanos ucranianos"
 UKR_our_ukraine_provide_housing_desc: "It is necessary to provide housing for our citizens, for this we will carry out appropriate reforms."
 UKR_our_ukraine_health_insurance_law: "Ley de Seguro de Salud"
 UKR_our_ukraine_health_insurance_law_desc: "We will adopt a law on health insurance, which will encourage the population to actively apply to medical institutions and increase the level of health of our citizens."
 UKR_our_ukraine_curriculum_modernization: "Modernización de los planes de estudio"
 UKR_our_ukraine_curriculum_modernization_desc: "We will reform the educational program in our schools to improve the education of the younger generation."
 UKR_our_ukraine_diversification_of_gas_supply_sources: "Diversificación de las fuentes de suministro de gas"
 UKR_our_ukraine_diversification_of_gas_supply_sources_desc: "We will actively diversify our resource assets so as not to be dependent on a single supplier."
 UKR_our_ukraine_cost_reduction: "Reducción de los gastos presupuestarios"
 UKR_our_ukraine_cost_reduction_desc: "We will make budget cuts to improve the state of our budget."
 UKR_our_ukraine_deregulation_of_business_environment: "Desregulación del entorno empresarial"
 UKR_our_ukraine_deregulation_of_business_environment_desc: "Nuestro país necesita reducir la burocracia y bajar las barreras administrativas para los emprendedores."
 UKR_our_ukraine_attracting_investments: "Atracción de inversiones"
 UKR_our_ukraine_attracting_investments_desc: "Our country is open for investment and we are ready to attract potential investors."
 UKR_our_ukraine_beginning_decommunization_policy: "Comienzo de la política de descomunización"
 UKR_our_ukraine_beginning_decommunization_policy_desc: "En 1991 obtuvimos la independencia de la opresión soviética. Conmemorémoslo y comencemos una política de descomunización en todo el país! La influencia comunista debe ser suprimida aquí y ahora."
 UKR_our_ukraine_economic_liberalism: "Liberalismo económico"
 UKR_our_ukraine_economic_liberalism_desc: "El liberalismo económico es obligatorio si queremos que la economía sea más eficiente, y por lo tanto debemos abrazarlo. "
 UKR_our_ukraine_parliamentary_republic: "Fortalecimiento de los poderes del Parlamento"
 UKR_our_ukraine_parliamentary_republic_desc: "Fortalecer los poderes del parlamento ayuda a aumentar la representatividad del gobierno. El Parlamento es un órgano elegido por el pueblo y, por lo tanto, debe tener una mayor influencia en el proceso de toma de decisiones. Esto contribuye a una mayor inclusión de las opiniones e intereses de los ciudadanos en el proceso político."
 UKR_our_ukraine_president_republic: "Fortalecimiento de los poderes del Presidente"
 UKR_our_ukraine_president_republic_desc: "The first important argument in favor of strengthening presidential powers is to ensure a more effective and rapid response to crisis situations. In a world saturated with global challenges such as economic crises, counterterrorism, and pandemics, the president must have sufficient authority to act quickly and decisively.\n\nLimited authority can lead to bureaucratic delays and ineffective decisions."
 UKR_our_ukraine_recognition_holodomor: "Reconocimiento del Holodomor"
 UKR_our_ukraine_recognition_holodomor_desc: "El poder soviético cometió con nosotros, con los ucranianos, el crimen más terrible del siglo XX. Esta terrible hambruna, el Holodomor, fue causada por la colectivización de la agricultura y la política de violencia estatal llevada a cabo por el régimen comunista de la URSS. "
 UKR_our_ukraine_ukrainian_institute: "Instituto Ucraniano de la Memoria Nacional"
 UKR_our_ukraine_ukrainian_institute_desc: "The Ukrainian Institute of National Memory is a central body of executive power for realization of state policy in the sphere of restoration and preservation of national memory. It will be established to recreate a fair history of the Ukrainian nation and to form and implement state policy in this direction.\n\nWe will also immortalize the memory of the victims of political repressions and famines on the territory of our country."
 UKR_our_ukraine_secretariat_of_president_reduction: "Secretaría reducida de la Presidencia de Ucrania"
 UKR_ukrainian_libertarianism: "Libertarismo ucraniano"
 UKR_ukrainian_libertarianism_desc: "It is time for Ukraine to enter the era of libertarianism! Let's liberate the country from the shackles of capitalists and communists."
 UKR_full_deregulation: "Desregulación completa"
 UKR_full_deregulation_desc: "We will begin the process of complete deregulation, and government influence will decrease."
 UKR_decrease_role_of_government: "Reducir el poder del gobierno"
 UKR_decrease_role_of_government_desc: "The state will play a minimal role in our beautiful country."
 UKR_free_the_common_folk: "Gente verdaderamente libre"
 UKR_free_the_common_folk_desc: "Nuestra gente finalmente respirará hondo y se sentirá libre!"
 UKR_offshore_country: "País de empresas offshore"
 UKR_offshore_country_desc: "We welcome the creation of many offshore zones in our country."
 UKR_true_servant_of_people: "Un verdadero servidor del pueblo"
 UKR_true_servant_of_people_desc: "Finalmente, Ucrania se ha convertido en el país más libre del mundo!"
 UKR_our_ukraine_freedom_of_social_media_idea: "Libertad en las redes sociales"
 UKR_our_ukraine_freedom_of_social_media_idea_desc: "The media should be free and will be so. We will support the prohibition of censorship."
 UKR_our_ukraine_secretariat_of_president: "Secretaría de la Presidencia de Ucrania"
 UKR_our_ukraine_ukrainian_institute_of_national_memory: "Instituto Ucraniano de la Memoria Nacional"
 UKR_our_ukraine_ukrainian_institute_of_national_memory_desc: "Every Ukrainian should remember the sacrifices of their people that he made in the past. The Institute of National Memory will help us form generations of those who will remember the heroism of Ukrainians."
 UKR_our_ukraine_fight_with_corruption_idea: "Lucha contra la corrupción"
 UKR_our_ukraine_education_reform_idea: "Consecuencias de la reforma educativa"
 UKR_our_ukraine_health_reform_idea: "Consecuencias de la reforma de salud"
 UKR_our_ukraine_social_reform_idea: "Consecuencias de la reforma de vivienda"
 UKR_our_ukraine_air_industry_idea: "Reforma de la Industria de Aviación"
 UKR_zelya_helsi: "Helsi"
 UKR_zelya_dia: "Dia"
 UKR_liberals_modifier: "Liberalismo ucraniano"
 UKR_liberals_modifier_desc: "Ukraine has finally embarked on the path of liberalism, now we have removed the shackles of authoritarian rule."
 ukraine_our_ukraine.1.t: "Secretaría de la Presidencia de Ucrania"
 ukraine_our_ukraine.1.d: "La Administración Presidencial se ha comportado terriblemente durante los años de Yushchenko, por lo que la reformaremos en la Secretaría de la Presidencia de Ucrania para garantizar una mayor estabilidad política."
 ukraine_our_ukraine.1.a: "Es hora de un cambio."
 ukraine_our_ukraine.2.t: "Instituto Ucraniano de la Memoria Nacional"
 ukraine_our_ukraine.2.d: "The Institute of National Memory has started its work, now we are ready to return Ukraine to its true history!"
 ukraine_our_ukraine.2.a: "Hurray!"
 ukraine_our_ukraine.3.t: "Constitución Democrática"
 ukraine_our_ukraine.3.d: "We will introduce amendments to the constitution that will make our country more democratic!"
 ukraine_our_ukraine.3.a: "Hurray!"
 ukraine_our_ukraine.4.t: "Ucrania ofrece a nuestro país invertir en ella."
 ukraine_our_ukraine.4.d: "El gobierno ucraniano anunció el lanzamiento de un programa para atraer inversores extranjeros y envió a nuestro gobierno una oferta para invertir en su economía."
 ukraine_our_ukraine.4.a: "Invirtamos!"
 ukraine_our_ukraine.4.b: "No estamos interesados en esto."
 ukraine_our_ukraine.5.t: "Inversiones en Ucrania."
 ukraine_our_ukraine.5.d: "Han aceptado invertir en nuestro país."
 ukraine_our_ukraine.5.a: "Bien"
 ukraine_our_ukraine.6.t: "Inversiones en Ucrania."
 ukraine_our_ukraine.6.d: "Rechazaron nuestra oferta de invertir en nuestro país."
 ukraine_our_ukraine.6.a: "Triste"
 ukraine_our_ukraine.7.t: "Contrato de gas con Ucrania."
 ukraine_our_ukraine.7.d: "Ucrania nos ha ofrecido reducir los precios de compra para nuestro contrato de gas, a cambio el intermediario entre nosotros será eliminado, por lo tanto tendremos más influencia sobre ellos, ¿deberíamos aceptar?"
 ukraine_our_ukraine.7.a: "Nosotros Firmaremos Esto"
 ukraine_our_ukraine.7.b: "No estamos interesados en esto."
 ukraine_our_ukraine.8.t: "Contrato de Gas con Rusia."
 ukraine_our_ukraine.8.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.8.a: "Bueno"
 ukraine_our_ukraine.9.t: "Contrato de Gas con Rusia."
 ukraine_our_ukraine.9.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.9.a: "Bueno"
 UKR_zelensky_western: "El Camino hacia el Oeste"
 UKR_zelensky_western_desc: "We will continue our political course with a desire to the west."
 UKR_befriend_the_west: "Amistad con el Oeste"
 UKR_befriend_the_west_desc: "We will continue our policy of improving relations with Western countries, and it is in them that we see our partners and allies."
 UKR_avakov_befriend: "Amistad con Avakov"
 UKR_avakov_befriend_desc: "Arsen Avakov turned out to be the most persistent minister of all that we have seen, he was able to survive many governments, besides, he supports the Azov battalion financially, if we strengthen ties with him, we will be able to increase the Azov in numbers."
 UKR_land_reform_zelya: "Reforma Agraria"
 UKR_land_reform_zelya_desc: "We will continue the Land reform, which was started a long time ago."
 UKR_fasten_nato_join: "Aspiración a Unirse a la OTAN"
 UKR_fasten_nato_join_desc: "NATO is our finish line, what we have been striving for from the very beginning."
 UKR_peaceful_negotiation_don: "Resolver el Problema de Donbass Pacíficamente"
 UKR_peaceful_negotiation_don_desc: "Estamos dispuestos a hacer concesiones por Donbass y finalmente poner fin a este conflicto interminable."
 UKR_keep_status_quo: "Mantener el Status Quo"
 UKR_keep_status_quo_desc: "We are not ready to resolve this issue peacefully, we will go the same way as before."
 UKR_our_ukraine_democratic_constitution: "Nueva Constitución Democrática"
 UKR_our_ukraine_democratic_constitution_desc: "We are ready to reform our constitution in order to bring true democracy in our country closer."
 UKR_our_ukraine_helsi: "Helsi"
 UKR_our_ukraine_helsi_desc: "Helsi - medical information system for healthcare institutions and medical portal for patients in Ukraine."
 UKR_our_ukraine_dia: "Dia"
 UKR_our_ukraine_dia_desc: "Ukrainian electronic service of public services, developed by the Ministry of Digital Transformation of Ukraine. This is a website and a mobile application with digital documents, the possibility of digital signature and verification, as well as a portal with public services."
 UKR_next_azov_created_tt: "Se creará una nueva §YBrigada Azov§!"
 UKR_our_influence_helps_tt: "§CPorque influimos en el Parlamento, podemos aprobar esta ley con una mayor probabilidad de éxito a pesar de tener menos escaños a nuestro favor§!"
 UKR_lose_some_seats_TT: "§RPerderemos§! algunos escaños en el §HParlamento§!"
 UKR_gain_some_seats_TT: "§GGanaremos§! algunos escaños en el §HParlamento§!"
 UKR_is_pro_west_TT: "Es un Partido Aliado con el Oeste"
 UKR_is_pro_east_TT: "Es un Partido Aliado con Rusia"
 UKR_is_neutral_TT: "Es un Partido No Aliado con Ninguna Nación Extranjera"
 UKR_influence_parliament_TT: "Comenzará a §pInfluir§! en el §HParlamento§!"
 UKR_puppet_parliament_TT: "Se §OManipulará§! el §HParlamento§!\n\n§RNO NECESITAREMOS PASAR POR EL PARLAMENTO PARA CAMBIOS DE LEY§!"
 UKR_dissolve_parliament_TT: "Se §RDisolverá§! el §HParlamento§!\n\n§RNO NECESITAREMOS PASAR POR EL PARLAMENTO PARA CAMBIOS DE LEY§!"
 UKR_zelenskiy_socialist_TT: "§YZelenskyy§! cambiará su §BVisión§!!"
 UKR_zelenskiy_formed_TT: "Se Creará el Partido §YEl Servidor del Pueblo§! £ukr_servant_of_the_people"
 UKR_zelenskiy_here_TT: "El Partido §YEl Servidor del Pueblo§! debe ser creado! £ukr_servant_of_the_people"
 ukr_zelenskiy.1.t: "Anuncio Sorprendente"
 ukr_zelenskiy.1.d: "Hoy, Volodymyr Zelenskyy hizo un anuncio sorprendente. En este comunicado, dijo que renunció a las ideas del libertarismo y 'a petición de la mayoría' adoptó las ideas del socialismo. Además, el presidente anunció que Ucrania fortalecerá los lazos con el Oeste y tratará de atraer a inversores occidentales."
 ukr_zelenskiy.1.a: "Desarrollo Sorprendente"
 ukr_zelenskiy.2.t: "Sluha Narodu"
 ukr_zelenskiy.2.d: "Noticias inesperadas han sacudido a toda Ucrania. Hoy, como resultado del congreso, se creó el partido Servidor del Pueblo, llamado así por la popular película. Muchos creen que este partido fue creado como una campaña de relaciones públicas para la película, mientras que otros afirman que este partido fue creado para promover al famoso comediante Volodymyr Zelenskyy como candidato a la presidencia. Aunque el mismo Zelenskyy niega su participación, sus respuestas evasivas pueden convertirse en la base para futuras especulaciones."
 ukr_zelenskiy.2.a: "Interesante"
 UKR_reform_programm: "Programa de Reformas"
 UKR_reform_programm_desc: "Comenzaremos una serie de reformas que deberían llevar a nuestro estado al crecimiento económico y sacarlo de la crisis de la caída de la URSS."
 UKR_reform_national_guard: "Disolver la Guardia Nacional"
 UKR_reform_national_guard_desc: "Es tiempo de reformas. Es tiempo de disolver la Guardia Nacional y reformarla en una estructura más efectiva: las Tropas Internas."
 UKR_reform_vsu: "Nueva Doctrina Militar"
 UKR_reform_vsu_desc: "Nuestro ejército necesita cambiar y actualizarse; de lo contrario, no estaremos listos para la guerra con el enemigo. La nueva doctrina también fortalece nuestra cooperación con la OTAN."
 UKR_check_and_balances: "Sistema de Pesos y Contrapesos"
 UKR_check_and_balances_desc: "Nuestro estado se encuentra actualmente en una situación política precaria; debemos encontrar un equilibrio en la esfera política para evitar una catástrofe."
 UKR_yushenko_cabinet: "Gabinete de Yushchenko"
 UKR_yushenko_cabinet_desc: "Viktor Yushchenko ya es un viejo conocido que ha demostrado ser bueno en su experiencia gerencial. Los resultados de sus actividades, que nos prometió, deberían estimular el crecimiento del componente económico de nuestro país."
 UKR_welfare_reform: "Reformas para el Bienestar"
 UKR_welfare_reform_desc: "La atención médica ha estado en un estado lamentable desde la década de 1990; es necesario comenzar a reformarla."
 UKR_kosuik: "Panadería Kosiuk"
 UKR_kosuik_desc: "La industria automotriz nacional está comenzando su recuperación, y los empresarios privados serán el motor de este proceso. Uno de ellos, Yuri Kosyuk, planea establecer sus propias fábricas para la producción de productos agrícolas."
 UKR_azovstal_private: "Privatización de Azovstal"
 UKR_azovstal_private_desc: "We will continue to work on giving Azovstal to private hands since we cannot financially support such a huge enterprise ourselves."
 UKR_land_reform: "Reforma Agraria"
 UKR_land_reform_desc: "La reforma agraria debería haber ocurrido hace mucho tiempo, pero la retrasamos tanto como pudimos. Ahora nos será más fácil vender tierras a manos privadas."
 UKR_land_trade: "Simplificar el Comercio de Tierras"
 UKR_land_trade_desc: "Continuaremos facilitando la adquisición de parcelas de tierra por parte de inversores privados en nuestro país."
 UKR_bolster_privatization: "Fortalecer la Privatización de Tierras"
 UKR_bolster_privatization_desc: "La privatización se acelerará y nuestro país debe ingresar a una nueva economía de mercado."
 UKR_ukrenergo_reform: "Reformar Ukrenergo"
 UKR_ukrenergo_reform_desc: "Nuestra estructura energética está en una situación terrible; es necesario reformar Ukrenergo."
 UKR_burshtyn_tes: "Ampliar Burshtyn TES"
 UKR_burshtyn_tes_desc: "Llevaremos a cabo la reconstrucción y mejora de la planta de energía térmica Burshtyn."
 UKR_diversy_fuel: "Diversificar la Compra de Combustible"
 UKR_diversy_fuel_desc: "Debemos diversificar hábilmente las fuentes de energía que compramos en el extranjero; no podemos depender de un solo vendedor."
 UKR_short_terms: "Abolición de Préstamos a Corto Plazo"
 UKR_short_terms_desc: "Eliminaremos por completo cosas como los préstamos a corto plazo; son perjudiciales para la economía."
 UKR_bank_lobbyst: "Eliminar al Lobbista del Banco"
 UKR_bank_lobbyst_desc: "Muchos lobbistas bancarios llegaron al poder en la década de 1990; es hora de deshacernos de su influencia en nuestro país."
 UKR_social_cut_down: "Reducir el Gasto Social"
 UKR_social_cut_down_desc: "Estamos obligados a reducir temporalmente el gasto social para estabilizar nuestras reservas financieras."
 UKR_struggle_power: "Lucha por el Poder"
 UKR_struggle_power_desc: "Nuestra situación precaria ha llevado a la aparición de fuertes oponentes políticos; necesitamos protegernos de ellos y convencer a los votantes de que se queden con nosotros."
 UKR_tax_agro: "Recorte de Impuestos para Empresas Agro"
 UKR_tax_agro_desc: "Reduciremos los impuestos para la agroindustria con el fin de estimular el crecimiento de su producción."
 UKR_stimulate: "Estimular la Economía"
 UKR_stimulate_desc: "Nuestras medidas están dando resultados y la economía está comenzando a crecer."
 UKR_negotiation_left: "Negociación con la Oposición de Izquierda"
 UKR_negotiation_left_desc: "Los activistas de izquierda están ganando fuerza notablemente; es necesario encontrar un compromiso con ellos."
 UKR_radicalize_without_kuchma: "Eradicate Ukraine Without Kuchma"
 UKR_radicalize_without_kuchma_desc: "El movimiento 'Ucrania sin Kuchma' estaba ganando un impulso peligroso; es hora de lidiar con ellos."
 UKR_slowdown_reform_land: "Desacelerar la Reforma Agraria"
 UKR_slowdown_reform_land_desc: "Decidimos desacelerar nuestra reforma agraria porque causó una reacción mixta en nuestra sociedad."
 UKR_re_approach_privatbank: "Replanteamiento con PrivatBank"
 UKR_re_approach_privatbank_desc: "PrivatBank es el banco más grande de nuestro país; debemos encontrar un compromiso exitoso con él, y nos proporcionará grandes ingresos fiscales."
 UKR_concessin_with_donbass: "Concesiones con la Banda de Donbass"
 UKR_concessin_with_donbass_desc: "Estamos dispuestos a hacer concesiones por Donbass, asegurando así su lealtad hacia nosotros."
 UKR_invest_mining_companies: "Inversiones en Empresas Mineras"
 UKR_invest_mining_companies_desc: "Al invertir en empresas de Donbass, aseguraremos un fuerte apoyo de los votantes locales."
 UKR_donbass_infrastructure: "Programa de Infraestructura de Donbass"
 UKR_donbass_infrastructure_desc: "Invertir en la infraestructura de Donbass nos permitirá atraer nuevos votantes y aumentar los ingresos de esta región."
 UKR_impeachment: "Impeachment Proceedings"
 UKR_impeachment_desc: "The Verkhovna Rada is moving to impeach us. We must respond to this threat to our authority before it is too late."
 UKR_privatization_ukrenergo: "Expansion of Ukrenergo"
 UKR_privatization_ukrenergo_desc: "We are expanding UkrEnergo, connecting a part of our network to the european synchronous grid."
 UKR_reach_russian_oligarch: "Alcanzar a los Oligarcas Rusos"
 UKR_reach_russian_oligarch_desc: "Atraeremos a los oligarcas rusos para que apoyen nuestra compañía política."
 UKR_rus_mobile_operators: "Atraer a Operadores Móviles Rusos"
 UKR_rus_mobile_operators_desc: "Daremos acceso a los operadores de telecomunicaciones rusos a nuestro mercado."
 UKR_free_economic_zones: "Zonas Económicas Libres"
 UKR_free_economic_zones_desc: "Crearemos varias zonas económicas en nuestro territorio, donde naturalmente esperaremos a los inversores rusos como prioridad."
 UKR_yanuk_cabinet: "Yanukovych [Yanu_Status]"
 UKR_yanuk_cabinet_desc: "Viktor Yanukovych y sus próximas actividades políticas deberían tener un efecto estimulante en la economía, al igual que las actividades de Yushchenko."
 UKR_block_land_trading: "Bloquear el Comercio de Tierras"
 UKR_block_land_trading_desc: "Las transacciones de tierras serán congeladas activamente, ya que esto podría afectar negativamente la independencia de nuestro complejo militar-industrial."
 UKR_soft_taxation: "Reforma Tributaria Suave"
 UKR_soft_taxation_desc: "Llevaremos a cabo una reforma tributaria suave que no enojará demasiado tanto a corporaciones como a individuos."
 UKR_floating_excange: "Tipo de Cambio Flotante"
 UKR_floating_excange_desc: "Practicaremos un tipo de cambio flotante, pero puede darnos efectos económicos completamente diferentes."
 UKR_small_favor: "Beneficios para Pequeñas Empresas"
 UKR_small_favor_desc: "Introduciremos beneficios para pequeñas empresas, estimulando el crecimiento económico."
 UKR_doentskstal: "Donetskstal"
 UKR_doentskstal_desc: "Estamos formando una nueva empresa en el territorio de Donbass para optimizar nuestras actividades en esta región."
 UKR_gas_azvostal: "Construir un Gasoducto en Azovstal"
 UKR_gas_azvostal_desc: "Construiremos un gasoducto en Azovstal para mejorar el funcionamiento de la empresa, así como las condiciones de vida en los distritos."
 UKR_dorohy_avto: "Autopistas de Ucrania"
 UKR_dorohy_avto_desc: "Llamar a la condición de las carreteras en nuestro país terrible es hacer un cumplido. El 95% de las carreteras están simplemente en mal estado. Comenzaremos a arreglarlo."
 UKR_roshen: "Roshen"
 UKR_roshen_desc: "La famosa fábrica de confitería Roshen está expandiendo sus actividades, vigilaremos de cerca a sus propietarios."
 UKR_luaz_reopen: "Modernize LuAZ"
 UKR_luaz_reopen_desc: "LuAZ produces old vehicles. It is necessary to modernize them to help our road reforms."
 UKR_ukraine_2000: "Ucrania 2000"
 UKR_ukraine_2000_desc: "El nuevo milenio debería traer reformas constitucionales globales a Ucrania, y las promoveremos activamente."
 UKR_gain_rada_support: "Ganar el Apoyo de la Rada"
 UKR_gain_rada_support_desc: "El apoyo total de la Verkhovna Rada es necesario para la implementación de nuestras reformas."
 UKR_deal_pro_socialist_media: "Tratar con los Medios Pro-Socialistas"
 UKR_deal_pro_socialist_media_desc: "Los partidos socialistas están ganando impulso; es necesario suprimir sus medios."
 UKR_referendum_const: "Referéndum sobre la Constitución"
 UKR_referendum_const_desc: "Estamos listos para llevar a cabo un referéndum nacional sobre enmiendas a la constitución."
 UKR_push_for_reforms: "Impulsar las Reformas"
 UKR_push_for_reforms_desc: "Continuaremos promoviendo nuestras ideas reformistas al gobierno; nuestro estado las necesita."
 UKR_arrest_timoshenko: "Arresto de Tymoshenko"
 UKR_arrest_timoshenko_desc: "Tymoshenko es un oponente político demasiado peligroso para nosotros; la arrestaremos."
 UKR_prepare_protest: "Prepararse para las Protestas"
 UKR_prepare_protest_desc: "Nuestras acciones seguramente generarán una serie de protestas; necesitamos estar preparados para ellas."
 UKR_reform_berkut: "Reformar Berkut"
 UKR_reform_berkut_desc: "Las fuerzas especiales Berkut necesitan ser reformadas, sin lo cual podríamos perder el control de las protestas."
 UKR_deal_yushenko: "Tratar con Yushchenko"
 UKR_deal_yushenko_desc: "Nos ocuparemos de Yushchenko y sus ambiciones políticas."
 UKR_appoint_yanukovich: "Nombrar a Yanukovych"
 UKR_appoint_yanukovich_desc: "Nombraremos a Yanukovych como jefe de gobierno; tal vez pueda mejorar la situación."
 UKR_seek_help_eastern_oligarch: "Buscar Ayuda de los Oligarcas del Este"
 UKR_seek_help_eastern_oligarch_desc: "Nuestros recursos claramente no son suficientes para suprimir el movimiento de protesta; ¿tal vez los oligarcas del este nos ayuden?"
 UKR_aid_from_minign_companies: "Obtener Ayuda de Empresas Mineras"
 UKR_aid_from_minign_companies_desc: "Nuestras inversiones en empresas mineras deberían dar sus frutos, y sus gerentes estarán listos para brindarnos asistencia financiera y de otro tipo."
 UKR_negotiate_orange_maidan: "Negociar con el Maidán Naranja"
 UKR_negotiate_orange_maidan_desc: "Es hora de entrar en negociaciones con los manifestantes y resolver el problema de una vez por todas."
 UKR_const_reform: "Reforma Constitucional"
 UKR_const_reform_desc: "Finalmente pudimos impulsar nuestras reformas en el gobierno, a través del movimiento de protesta."
 UKR_lyvochkin: "Solución de Lyovochkin"
 UKR_lyvochkin_desc: "Nuestro principal asesor nos dejó claro que tendremos que llegar a un compromiso con los manifestantes; de lo contrario, nuestro país se enfrentará al caos."
 UKR_stay_for_fair_election: "Quedarse para 'Elecciones Justas'"
 UKR_stay_for_fair_election_desc: "No vamos a entregar nuestro poder así como así; nos quedaremos hasta el final."
 UKR_yusha_tt: "§YEsto nos impedirá realizar los enfoques en la rama del Gabinete de Yushchenko§!"
 UKR_yana_tt: "§YEsto nos permitirá completar el enfoque del Gabinete de Yanukovych§!"
 UKR_easterns_tt: "El apoyo para los residentes de las £text_icon_ukr_dobro §3Regiones del Este§! de Ucrania cambiará en §Y[?modify_easterns]§! (Apoyo Actual: §Y[?UKR.easterns]§!)\n"
 UKR_westerns_tt: "El apoyo para los residentes de las £text_icon_ukr_yasno §tRegiones del Oeste§! de Ucrania cambiará en §Y[?modify_westerns]§! (Apoyo Actual: §Y[?UKR.westerns]§!)\n"
 UKR_maidani_tt: "El apoyo para los §8Representantes del Maidán§! cambiará en §Y[?modify_maidani]§! (Apoyo Actual: §Y[?UKR.maidani]§!)\n"
 UKR_political_situation_decision_category: "Inestabilidad Política Ucraniana"
 UKR_political_situation_decision_category_desc: "[UKR.GetFlag]§YUkraine§! is a huge state with many peoples living in it, but two of them represent the majority - [UKR.GetFlag]§YUkrainians§! and [SOV.GetFlag]§YRussians§!. Due to historical events, the [SOV.GetFlag]§YRussian-speaking§! population mainly lives in the east of the country, while the [UKR.GetFlag]§YUkrainian§! population already occupies more western territories. This geographical division is constantly shaking [UKR.GetFlag]§YUkraine§! and may become a §Rbig problem§! for the country in the future. Among other things, the political electorate of [UKR.GetFlag]§YUkraine§! is very prone to protests and expressing their opinions through rather §Rnon-peaceful§! protests.  We need to take into account all these aspects and find an opportunity to balance these forces.\n\nIf support for the §8Maidan§! §Rfalls below 15§!, unrest will begin, which could lead to a §Rcivil war§!. To reduce the consequences of a possible §Rcivil war§!, it is necessary to expand the influence and power of the §YSBU§!, the §YNational Guard§!, etc. Depending on whose support is §Rless§! (§tWesterners§! or §3Easterners§!), there will be different scenarios of political unrest."
 ukr_west_output_text: "§Y[?UKR.westerns]§!"
 ukr_west_tooltip: "Apoyo Actual de las §tRegiones del Oeste§!"
 ukr_maidan_output_text: "§Y[?UKR.maidani]§!"
 ukr_maidan_tooltip: "Apoyo Actual del §8Maidán§!"
 ukr_east_output_text: "§Y[?UKR.easterns]§!"
 ukr_east_tooltip: "Apoyo Actual de las §3Regiones del Este§!"
 UKR_our_agricultrure: "Agricultura Nacional"
 UKR_our_agricultrure_desc: "The Ukrainian agricultural industry is one of the best in the world, and we will try not to lose this title."
 UKR_azovsteel: "Azovstal"
 UKR_yushenko_premier_idea: "El Gobierno de Yushchenko"
 UKR_yanuk_premier_idea: "El Gobierno de Yanukovych"
 UKR_unstable_government_idea: "Descontento con el Maidán"
 UKR_land_reform_idea: "Reforma Agraria"
 UKR_land_reform_idea_desc: "The land reform initiated in the last century should lead to a complete redistribution of land holdings throughout the country. So far, it is in the process."
 UKR_zaims: "Consecuencias Económicas de la Cancelación del Préstamo"
 UKR_banks_lobbyst_liquidate: "Liquidación de Lobbistas Bancarios"
 UKR_mining_company_help: "Beneficios Fiscales para Empresas Mineras"
 UKR_privatization_idea: "Privatización"
 UKR_without_kuchma_idea: "Ucrania Sin Kuchma"
 UKR_left_opposition_idea: "La Oposición de Izquierda"
 UKR_luaz_idea: "LuAZ"
 UKR_anti_socialist_media: "Medios Antisocialistas"
 UKR_crisis_political: "Crisis Política"
 UKR_crisis_political_desc: "Our country is gripped by a political crisis, the authorities are paralyzed and political forces are fighting with each other for power."
 ukraine_kuchma.2.t: "Preparación para Protestas"
 ukraine_kuchma.2.d: "Nuestras acciones claramente llevarán a protestas, necesitamos prepararnos."
 ukraine_kuchma.2.a: "Estaremos Listos"
 ukraine_kuchma.2.b: "Todo se Resolverá por Sí Mismo"
 ukraine_kuchma.11.t: "Intento de Juicio Político"
 ukraine_kuchma.11.d: "La Verkhovna Rada ha intentado enjuiciarnos políticamente muchas veces, es hora de resolver este problema."
 ukraine_kuchma.11.a: "No al Juicio Político"
 ukraine_kuchma.12.t: "Amistad con el Clan de Donetsk"
 ukraine_kuchma.12.d: "Intentaremos atraer al llamado clan de oligarcas de Donetsk a nuestro lado, nos serán útiles en la futura confrontación con la oposición."
 ukraine_kuchma.12.a: "Donbass Está con Nosotros"
 ukraine_kuchma.12.b: "No los apoyaremos"
 ukraine_kuchma.13.t: "Yanukovych se convertirá en presidente"
 ukraine_kuchma.13.d: "No reconoceremos los resultados de la segunda ronda de la carrera presidencial y nombraremos a Yanukovych como presidente de Ucrania."
 ukraine_kuchma.13.a: "Que así sea"
 ukraine_kuchma.14.t: "Protestas en el sureste"
 ukraine_kuchma.14.d: "Después de nuestra victoria en las elecciones, pensamos que todo había terminado, pero ahora el sureste de nuestro país ha comenzado a mostrar una fuerte actividad de protesta. El llamado \"Maidán Azul\" ha comenzado a aumentar la presión sobre nuestro gobierno, amenazando con graves consecuencias."
 ukraine_kuchma.14.a: "Debemos ser más cuidadosos."
 ukraine_kuchma.15.t: "Maidán Azul en Ucrania"
 ukraine_kuchma.15.d: "Activists in Southeastern Ukraine continued to develop their autonomy project, while the Kyiv authorities are busy changing chairs in the rada offices, a big storm is coming. Supporters of the Blue Maidan have asked us for support, will we help them?"
 ukraine_kuchma.15.a: "Los apoyaremos."
 ukraine_kuchma.15.b: "No deberíamos interferir"
 ukraine_kuchma.16.t: "Gobierno del Sureste"
 ukraine_kuchma.16.d: "The so-called activists of the Blue Maidan have officially announced the creation of their government, and that they do not recognize the Kyiv government. It seems that they were supported from outside, otherwise they would not have decided on such a thing."
 ukraine_kuchma.16.a: "Enviar a la policía allí urgentemente"
 ukraine_kuchma.17.t: "La Revolución Azul"
 ukraine_kuchma.17.d: "Hoy, los partidarios del Maidán Azul, liderados por Viktor Yanukovych, declararon oficialmente su independencia y la formación de su propia república del sureste de Ucrania. Hay unidades militares que se han pasado a su lado, así como generales y oficiales."
 ukraine_kuchma.17.a: "La tormenta ha comenzado"
 ukraine_kuchma.18.t: "Protestas en Galicia"
 ukraine_kuchma.18.d: "Nuestra decisión de ignorar la segunda ronda de las elecciones presidenciales llevó a la inestabilidad en el país, muchos residentes de las regiones occidentales pasaron a la fase activa de protestas, donde comenzaron los enfrentamientos con la policía."
 ukraine_kuchma.18.a: "Debemos ser más cuidadosos"
 ukraine_kuchma.19.t: "Maidán Rojo en Ucrania"
 ukraine_kuchma.19.d: "Los activistas en Galicia ucraniana han comenzado protestas contra las elecciones ilegales en el país, la situación se ha vuelto tan tensa que ya estamos hablando de un levantamiento armado, porque varios generales apoyan a los rebeldes, tal vez deberíamos ayudarlos?"
 ukraine_kuchma.19.a: "Los apoyaremos."
 ukraine_kuchma.19.b: "No deberíamos interferir"
 ukraine_kuchma.20.t: "El Gobierno de Ucrania Occidental"
 ukraine_kuchma.20.d: "The protests have already moved into a more heated phase, and they are clearly being helped from abroad. Now they have announced the creation of their own government, which is not subordinate to the Kyiv authorities."
 ukraine_kuchma.20.a: "Enviar a la policía allí urgentemente"
 ukraine_kuchma.21.t: "La Revolución Roja"
 ukraine_kuchma.21.d: "Today, supporters of the so-called Red Maidan announced their withdrawal from Ukraine and the beginning of armed resistance with the Kyiv Pro-Russian government."
 ukraine_kuchma.21.a: "La tormenta ha comenzado"
 UKR_spu_start: "Partido Socialista de Ucrania"
 UKR_spu_start_desc: "After years of struggling we managed to get the people trust. Now we shall start our great reforms."
 UKR_spu_rada_position: "Posiciones en Rada"
 UKR_spu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_spu_coalition: "Coalición CPU/SPU"
 UKR_cpu_spu_coalition_desc: "CPU y SPU podrían describirse como hermanos. Siempre participaron en las elecciones como un frente unido. Es obvio que formarán una coalición si uno de ellos gana."
 UKR_ditch_cpu: "Distancia de CPU"
 UKR_ditch_cpu_desc: "CPU y SPU podrían describirse como hermanos. Siempre participaron en las elecciones como un frente unido, pero es obvio que si CPU obtuviera el poder reinstaurarían el régimen comunista. Debemos distanciarnos de ellos lo antes posible."
 UKR_cpu_start: "Partido Comunista de Ucrania"
 UKR_cpu_start_desc: "Communist Party of Ukraine."
 UKR_cpu_rada_position: "Posiciones en Rada"
 UKR_cpu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_monocoalition: "Monocoalición"
 UKR_cpu_monocoalition_desc: "Monocoalition is a term in Ukrainian politics. It refers to a government formed by only one party. By creating a CPU monocoalition, we could easily take control of the legislature and executive branches and begin the Soviet restoration."
 UKR_back_to_soviet_tracks: "Vuelta a la era soviética"
 UKR_back_to_soviet_tracks_desc: "After the collapse of the USSR, our country only lost, missed and destroyed everything that remains of the heritage of this great country. We will change this process."
 UKR_commie_russia_trade: "Asociación con Rusia"
 UKR_commie_russia_trade_desc: "Tenemos la intención de fortalecer las relaciones amistosas entre nuestros países."
 UKR_commie_russia_rjd: "Asociación con Ferrocarriles Rusos"
 UKR_commie_russia_rjd_desc: "Russian railways will be an excellent partner for us, thanks to their help we will significantly improve our infrastructure."
 UKR_commie_russia_banks: "Bancos rusos"
 UKR_commie_russia_banks_desc: "We are ready to let Russian banks into our territory, their financial capabilities will help us in our development."
 UKR_commie_russia_gas: "Nuevo contrato de gas"
 UKR_commie_russia_gas_desc: "We are ready to conclude a new gas contract with Russia, on favorable terms for us."
 UKR_commie_china_trade: "Asociación con China"
 UKR_commie_china_trade_desc: "Tenemos la intención de fortalecer las relaciones amistosas entre nuestros países."
 UKR_commie_china_trains: "Compra de trenes en China"
 UKR_commie_china_trains_desc: "We will purchase several trains in China that will help improve our supply."
 UKR_comsomol: "Revivir el Komsomol"
 UKR_comsomol_desc: "The Komsomol movement needs to be revived as an ideological pillar of our system in the minds of new generations."
 UKR_commie_china_infra: "Modernización de ferrocarriles"
 UKR_commie_china_infra_desc: "Nuestros colegas chinos han acordado financiar la modernización de la red ferroviaria de nuestro país."
 UKR_commie_china_huawei: "Cooperación con Huawei"
 UKR_commie_china_huawei_desc: "We will establish a strong cooperation with this Chinese company."
 UKR_commie_motor_sich: "Expandir MotorSich"
 UKR_commie_motor_sich_desc: "We will invest additional funds in the development of our key enterprise - MotorSich."
 UKR_ukr_pioners: "Revivir el Pionero"
 UKR_ukr_pioners_desc: "The pioneers need to be revived, the youth have lost their moral guidelines and must be guided on the path of socialism again."
 UKR_one_union_for_all: "Sindicato Estatal Unificado"
 UKR_one_union_for_all_desc: "We will protect the rights of workers across the country by creating a single trade union."
 UKR_remilitarization: "Remilitarización"
 UKR_remilitarization_desc: "Our state must have a strong army, so we will begin the immediate process of remilitarization."
 UKR_arms_zavods: "Inversiones en fábricas de armas"
 UKR_arms_zavods_desc: "Our military industry was destroyed after the collapse of the USSR, it's time to revive it."
 UKR_sbu_kgb: "Métodos del KGB"
 UKR_sbu_kgb_desc: "We must rebuilt the old KGB school, this will clearly increase the professionalism of our staff."
 UKR_arms_tanks: "Énfasis en tanques"
 UKR_arms_tanks_desc: "Our armed forces need tanks urgently, we will give them this need."
 UKR_revolut_in_blr: "La Revolución Socialista de Bielorrusia"
 UKR_revolut_in_blr_desc: "Nuestro pueblo hermano bielorruso está oprimido por sus gobernantes y capitalistas! Libéramoslos!"
 UKR_revolution_in_russia: "La Revolución Socialista de Rusia"
 UKR_revolution_in_russia_desc: "Nuestro pueblo hermano ruso está oprimido por sus gobernantes y capitalistas! Libéramoslos!"
 UKR_befriend_russia_com: "Amistad con Rusia"
 UKR_befriend_russia_com_desc: "We intend to establish partnership and friendly relations with Russia."
 UKR_befriend_belarus_com: "Amistad con Bielorrusia"
 UKR_befriend_belarus_com_desc: "We intend to establish partnership and friendly relations with Belarus."
 UKR_central_asia_revolt: "Revoluciones en Asia Central"
 UKR_central_asia_revolt_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_caucasus_revolut: "Revoluciones en el Cáucaso"
 UKR_caucasus_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_baltic_revolut: "Revoluciones en los Estados Bálticos"
 UKR_baltic_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_revolut_in_mol: "La Revolución Socialista de Moldavia"
 UKR_revolut_in_mol_desc: "Nuestro pueblo hermano moldavo está oprimido por sus gobernantes y capitalistas! Libéramoslos!"
 UKR_csto_com_app: "Unirse a la OTSC"
 UKR_csto_com_app_desc: "Our fraternal peoples are members of the CSTO, perhaps it is worth joining them."
 UKR_integration_support: "Integración de las antiguas repúblicas"
 UKR_integration_support_desc: "We will begin the integration processes of the former republics."
 UKR_declare_ussr: "Revivir la URSS"
 UKR_declare_ussr_desc: "Somos los verdaderos herederos de la URSS! Es hora de revivir este gran estado!"
 UKR_nationalize_everything: "Lanzar la nacionalización"
 UKR_nationalize_everything_desc: "No daremos nada a los capitalistas! Las empresas volverán al seno del estado!"
 UKR_social_propaganda: "Reformas sociales"
 UKR_social_propaganda_desc: "We will launch large-scale social reforms that will allow us to win the hearts of the poor."
 UKR_christian_communism_desc: "Prohibir la religión fue uno de los errores que no permitiremos. El comunismo cristiano es nuestro futuro. Después de todo, Jesús mismo era comunista!"
 UKR_criminalize_oligrachy: "Criminalizar a la oligarquía"
 UKR_criminalize_oligrachy_desc: "Los oligarcas han estado bebiendo sangre de nuestro país durante muchos años, vendiendo la propiedad creada por nuestros bisabuelos, eso es suficiente!"
 UKR_land_to_people: "Tierra para el pueblo!"
 UKR_land_to_people_desc: "The land should belong to the people! Not a bunch of oligarchs, bandits."
 UKR_revive_soviet_factories: "Revivir las fábricas soviéticas"
 UKR_revive_soviet_factories_desc: "Many enterprises that remained as a legacy from the USSR were destroyed and destroyed, we will revive them again."
 UKR_regions_ditch: "Abandonar la coalición con el Partido de las Regiones"
 UKR_regions_ditch_desc: "No formaremos una coalición con este partido, solo nos traerá problemas."
 UKR_regions_integr: "Coalición con el Partido de las Regiones"
 UKR_regions_integr_desc: "We will form a coalition with this party, it will strengthen our political capabilities."
 UKR_socialist_ukraine_effort: "Reformas socialistas"
 UKR_socialist_ukraine_effort_desc: "We will begin a series of reforms that should strengthen our political position."
 UKR_pensions_for_elders_incr: "Aumentar las pensiones"
 UKR_pensions_for_elders_incr_desc: "We will increase pension payments so that citizens are willing to retire."
 UKR_full_rabota: "Reformas laborales"
 UKR_full_rabota_desc: "We will carry out serious reforms in the labor legislation to improve the working conditions of our citizens."
 UKR_socialist_democratic_policies: "País socialdemócrata"
 UKR_socialist_democratic_policies_desc: "New future awaits our country, under the banner of social democracy."
 UKR_start_to_support: "Comenzar a apoyar a los pobres"
 UKR_start_to_support_desc: "Our electorate is low-income citizens who hope that our reforms will pull them out of the economic abyss into which they were dragged by the previous government. We will help them."
 UKR_progressive_taxation: "Impuestos progresivos"
 UKR_progressive_taxation_desc: "We intend to introduce progressive taxation for greater economic equality of our citizens."
 UKR_social_conservative_prog: "Programa social conservador"
 UKR_social_conservative_prog_desc: "We intend to carry out a number of reforms that were inspired by the social conservative representatives of the political sphere of our country."
 UKR_ukr_cossack_freedom: "Libertad Cosaca"
 UKR_ukr_cossack_freedom_desc: "Our citizen is like a free Cossack, he is no longer a slave to capital and not a slave to anyone."
 UKR_nationalization_of_big_com: "Nacionalización de grandes empresas"
 UKR_nationalization_of_big_com_desc: "We will carry out a series of nationalizations of large companies."
 UKR_crusade_against_inequality: "Lucha contra la desigualdad"
 UKR_crusade_against_inequality_desc: "Inequality in our society is becoming more pronounced, and we will begin an economic and political program to soften the financial boundaries between different social strata."
 UKR_reduce_cap_oligrach: "Debilitar la influencia de los oligarcas"
 UKR_reduce_cap_oligrach_desc: "The oligarchs have too much influence on our country, it's time to deal with this."
 UKR_people_brotherhood: "Unidad fraternal"
 UKR_people_brotherhood_desc: "Our people, the peoples that inhabit our country must be a united brotherhood that will resist threats from outside."
 UKR_ask_russia_to_give_nukes: "Solicitar armas nucleares a Rusia"
 UKR_ask_russia_to_give_nukes_desc: "We intend to request from Russia some stocks of nuclear weapons to protect our country from external threats."
 UKR_reduce_foreign_influence: "Reducir la influencia extranjera"
 UKR_reduce_foreign_influence_desc: "We will weaken foreign influence on our country, independence is our foundation."
 UKR_labourr_unions: "Apoyo a los sindicatos"
 UKR_labourr_unions_desc: "Protejeremos activamente los sindicatos nacionales para crear un clima laboral positivo en el país."
 UKR_immigartion_easing: "Facilitar la inmigración"
 UKR_immigartion_easing_desc: "We will facilitate immigration processes, because our borders should not be closed by walls."
 UKR_uindependence_prop: "Proteger al inversor nacional"
 UKR_uindependence_prop_desc: "We should not abandon the domestic investor, this is the only way we will strengthen the growth of our economy."
 UKR_dont_touch_west_inv: "Inversor occidental prioritario"
 UKR_dont_touch_west_inv_desc: "We will concentrate our efforts to protect the Western investor."
 UKR_pro_russian_approach: "Dirección pro-rusa"
 UKR_pro_russian_approach_desc: "We will choose Russia as a reference point, historically we are only on the way with them."
 UKR_pro_western_approach: "Dirección pro-occidental"
 UKR_pro_western_approach_desc: "We have chosen our way - the way to the west."
 UKR_request_protection_from_rus: "Solicitar protección rusa"
 UKR_request_protection_from_rus_desc: "We will try to conclude agreements on protection and defense so that our country is protected by Russia."
 UKR_apply_economic_union: "Unirse al Espacio Económico Ruso"
 UKR_apply_economic_union_desc: "Economic cooperation with Russia will give us economic growth and profitable contracts."
 UKR_donbas_peaceful: "Solución pacífica al problema separatista"
 UKR_donbas_peaceful_desc: "We are ready to peacefully resolve the issue with the territories that have separated from us."
 UKR_csto_apply: "Unirse a la OTSC"
 UKR_csto_apply_desc: "We intend to become a part of the CSTO, we see that only the members of this alliance are really interested in protecting us."
 UKR_western_socialists_coalition: "Coalición con partidos occidentales"
 UKR_western_socialists_coalition_desc: "We intend to create a coalition with pro-Western parties."
 UKR_harsh_separat_dealkill: "Poner fin a los separatistas"
 UKR_harsh_separat_dealkill_desc: "We are ready to liberate our territories."
 UKR_apply_eu_reforms: "Adoptar reformas pro-europeas"
 UKR_apply_eu_reforms_desc: "We intend to follow the European political course."
 UKR_nato_commitment: "Reformas de la OTAN"
 UKR_nato_commitment_desc: "We intend to carry out military reform in accordance with NATO standards for future membership there."
 UKR_pmr_invite_union: "Proponer un Estado Unificado a Transnistria"
 UKR_pmr_invite_union_desc: "Tenemos la intención de seguir adelante y crear un nuevo estado en Europa, que no pueda ser influenciado por fuerzas externas y tener un candidato adecuado para aumentar este estado."
 UKR_belarus_invite: "Proponer un Estado Unificado a Bielorrusia"
 UKR_belarus_invite_desc: "Tenemos la intención de seguir adelante y crear un nuevo estado en Europa, que no pueda ser influenciado por fuerzas externas y tener un candidato adecuado para aumentar este estado."
 UKR_hungary_invite: "Proponer un Estado Unificado a Hungría"
 UKR_hungary_invite_desc: "Tenemos la intención de seguir adelante y crear un nuevo estado en Europa, que no pueda ser influenciado por fuerzas externas y tener un candidato adecuado para aumentar este estado."
 UKR_moldova_invite: "Proponer un Estado Unificado a Moldavia"
 UKR_moldova_invite_desc: "Tenemos la intención de seguir adelante y crear un nuevo estado en Europa, que no pueda ser influenciado por fuerzas externas y tener un candidato adecuado para aumentar este estado."
 ukraine_rada.2.t: "¿Coalición con SPU?"
 ukraine_rada.2.d: "Durante mucho tiempo los socialistas han sido nuestros aliados a pesar de nuestras diferencias. La mayoría de los miembros del SPU solían ser miembros de nuestro partido y la larga historia de relaciones hace que una coalición sea una opción obvia, pero los socialistas se están alejando gradualmente de nosotros, volviéndose mucho más moderados y permeados de revisionismo, por lo que no se nos permitirá implementar las políticas más radicales bajo un gobierno común."
 ukraine_rada.2.b: "Al diablo con SPU. Declarar Monocoalición!"
 ukraine_rada.2.a: "Let's Start Coalition Talks"
 ukraine_rada.1.t: "¿Coalición con CPU?"
 ukraine_rada.1.d: "Durante mucho tiempo los comunistas han sido nuestros aliados, a pesar de sus diferencias. La mayoría de los miembros de nuestro partido han sido miembros del CPU y la larga historia de la relación hace que una coalición sea una necesidad, pero los comunistas no están dispuestos a mantenerse al día con los tiempos al defender ideas regresivas y apoyar iniciativas caníbales y una coalición con ellos también puede permitir que algunos miembros radicales del CPU obtengan poder."
 ukraine_rada.1.b: "Al diablo con CPU!"
 ukraine_rada.1.a: "Let's Start Coalition Talks"
 ukraine_kommi.1.t: "Ucrania pide armas nucleares"
 ukraine_kommi.1.d: "An unexpected statement came from the Ukrainian government. They want to get Nuclear weapons from us in order to defend themselves from an external attack. Such a dangerous decision requires us to weigh the pros and cons."
 ukraine_kommi.1.a: "Les daremos armas nucleares"
 ukraine_kommi.1.b: "No les daremos armas nucleares"
 ukraine_kommi.2.t: "Armas nucleares rusas"
 ukraine_kommi.2.d: "They agreed to provide us with some of the nuclear weapons."
 ukraine_kommi.2.a: "Bueno"
 ukraine_kommi.3.t: "Armas nucleares rusas"
 ukraine_kommi.3.d: "They refused to provide us with part of the nuclear weapons."
 ukraine_kommi.3.a: "Triste"
 ukraine_kommi.4.t: "A New Communist State"
 ukraine_kommi.4.d: "Our revolution has succeeded. The old regime is finished here, but we cannot stand alone yet. Ukraine has offered to back our government while we get on our feet."
 ukraine_kommi.4.a: "We Accept Their Support"
 ukraine_kommi.5.t: "Ucrania ofrece cooperación militar"
 ukraine_kommi.5.d: "The Ukrainian government says it is ready to sign a number of documents on military-political cooperation between our countries."
 ukraine_kommi.5.a: "Estamos a favor de la amistad con Ucrania"
 ukraine_kommi.5.b: "No firmaremos nada"
 ukraine_kommi.6.t: "Cooperación militar con Rusia"
 ukraine_kommi.6.d: "They agreed to sign agreements on military-political cooperation with us."
 ukraine_kommi.6.a: "Bien"
 ukraine_kommi.7.t: "Cooperación militar con Rusia"
 ukraine_kommi.7.d: "They refused to sign agreements on military-political cooperation with us."
 ukraine_kommi.7.a: "Triste"
 ukraine_kommi.8.t: "Estado Democrático Unificado"
 ukraine_kommi.8.d: "El gobierno ucraniano sugiere que creamos un solo estado democrático en la vastedad de Europa, una especie de tercer centro de poder, ¿estaremos de acuerdo en perder la independencia por el sueño de una tercera fuerza?"
 ukraine_kommi.8.a: "La independencia es una ficción"
 ukraine_kommi.8.b: "Nunca"
 ukraine_kommi.9.t: "Estado Democrático Unificado"
 ukraine_kommi.9.d: "They refused our offer! It was expected, but so pathetic on their part."
 ukraine_kommi.9.a: "No entienden"
 ukraine_kommi.10.t: "Ucrania pide protección"
 ukraine_kommi.10.d: "The Ukrainian government asks us to provide them with guarantees to protect their independence. An unexpected request, but perhaps we should consider it."
 ukraine_kommi.10.a: "Los protegeremos"
 ukraine_kommi.10.b: "Nunca"
 ukraine_kommi.11.t: "Garantía de protección rusa"
 ukraine_kommi.11.d: "El gobierno ruso ha aceptado proporcionarnos garantías de independencia!"
 ukraine_kommi.11.a: "Bueno"
 ukraine_kommi.12.t: "Garantía de protección rusa"
 ukraine_kommi.12.d: "The Russian government has refused to provide us with guarantees of independence."
 ukraine_kommi.12.a: "Maldición"
 ukraine_kommi.13.t: "Contrato de gas con Ucrania."
 ukraine_kommi.13.d: "Ucrania nos ha ofrecido reducir los precios de compra para nuestro contrato de gas, a cambio el intermediario entre nosotros será eliminado, de esta manera tendremos más influencia sobre ellos, ¿deberíamos aceptar?"
 ukraine_kommi.13.a: "Nosotros Firmaremos Esto"
 ukraine_kommi.13.b: "No estamos interesados en esto."
 ukraine_kommi.14.t: "Contrato de gas con Rusia."
 ukraine_kommi.14.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.14.a: "Bueno"
 ukraine_kommi.15.t: "Contrato de gas con Rusia."
 ukraine_kommi.15.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.15.a: "Bueno"
 UKR_inner_policy_spu_desc: "Finally, communist ideals have returned to Ukraine again, it's time to revive the great state."
 UKR_brotherhood_people: "Hermandad del pueblo"
 UKR_social_reform: "Reformas sociales"
 UKR_christian_communism: "Comunismo cristiano"
 UKR_inner_policy_cpu: "Política interna"
 UKR_inner_policy_cpu_desc: "Finally, socialist ideals have returned to Ukraine again, it's time to revive the great state."
