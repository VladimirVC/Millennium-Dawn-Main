l_french:
 STAT_NAVY_SUB_VISIBILITY: "£sub_visibility_texticon  Sub Visibility: "
 STAT_NAVY_SUB_VISIBILITY_DESC: "How easy to detect a submarine is."
 STAT_NAVY_SHORE_BOMBARDMENT: "Capacité d'assaut amphibie : "
 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "Capacité d'un navire à assister les troupes débarquant lors d'assauts amphibies et de combats sur les côtes voisines où le navire est en position."
 STAT_NAVY_MISSION_COVERAGE: "Efficacité de détection des ennemis : "
 STAT_NAVY_MISSION_COVERAGE_DESC: "§TDétermine l'efficacité des navires à détecter l'ennemi. La valeur correspond au cumul de l'efficacité de détection de chaque navire.§!"
 STAT_NAVY_FIRE_RANGE_DESC: "Détermine la portée de tir des principaux missiles d'un navire."
 STAT_NAVY_EVASION: "Armes de défense ponctuelle : "
 STAT_NAVY_EVASION_DESC: "Détermine la capacité des navires à éviter les tirs ennemis à l'aide de fusées éclairantes, de système d'armes rapproché (SAR) et d'autres contre-mesures. Les navires plus petits sont naturellement plus aptes à esquiver les tirs."
 STAT_NAVY_SUB_ATTACK: "£depth_charge_texticon  Anti-Submarine Warfare: "
 STAT_NAVY_SUB_ATTACK_DESC: "Dégâts infligés aux sous-marins ennemis."
 STAT_NAVY_ATTACK: "£attack_texticon  Missile firepower: "
 STAT_NAVY_ATTACK_DESC: "Le nombre et la puissance de nos missiles anti-navires."
 STAT_NAVY_ANTI_AIR_ATTACK_DESC: "Le nombre et la puissance des missiles antiaériens dont nous disposons pour cibler les avions ennemis."
 STAT_NAVY_ANTI_AIR_TARGETTING_DESC: "Détermine la capacité du radar du navire à suivre et à cibler les avions ennemis."
 STAT_AIR_RANGE: "£air_range_texticon  Flight Range: "
 STAT_AIR_AGILITY: "£speed_intercept_texticon  Radar Advantage: "
 STAT_AIR_AGILITY_DESC: "Capacité d'un avion à tirer parti de ses caractéristiques furtives, de son avionique, de ses systèmes d'armes et de la formation de ses pilotes dans un combat à longue portée et à courte distance."
 STAT_AIR_DEFENCE: "£defence_air_texticon  Air Defense: "
 STAT_AIR_DEFENCE_DESC: "Capacité d'un avion à tromper, à manœuvrer ou à détruire une arme ennemie qui l'attaque."
 STAT_NAVY_RAIDING_COORDINATION:1 "£coordination_texticon  Raiding Coordination: "
 STAT_NAVY_PATROL_COORDINATION:1 "£coordination_texticon  Patrol Coordination: "
 STAT_NAVY_TORPEDO_ATTACK: "£torpedo_texticon  Torpedos: "
 STAT_NAVY_TORPEDO_ATTACK_DESC: "La quantité de dégâts que nous pouvons faire en utilisant des missiles antinavires et des torpilles."
 STAT_NAVY_HG_ATTACK:1 "£rocket_modifiericons_texticon  Anti-Ship Missiles: "
 STAT_NAVY_HG_ATTACK_DESC: "Mesure de la capacité du navire à soutenir les combats côtiers, soit par le biais d'unités de débarquement, soit par un appui-feu."
 STAT_NAVY_HG_ARMOR_PIERCING:1 "£rocket_modifiericons_texticon  AShM Piercing: "
 STAT_NAVY_HG_ARMOR_PIERCING_DESC: "Cette statistique est négative pour éviter que les dommages causés par le soutien terrestre ne soient appliqués dans les batailles navales."
 STAT_NAVY_LG_ATTACK:1 "£naval_battery2_texticon  Cannon Attack: "
 STAT_NAVY_LG_ATTACK_DESC: "Endommagé par l'artillerie navale, les autocanons et les mitrailleuses, il contribuera aussi marginalement au bombardement des côtes."
 STAT_NAVY_LG_ARMOR_PIERCING:1 "£piercing_texticon  Cannon Piercing: "
 STAT_NAVY_LG_ARMOR_PIERCING_DESC: "Capacité de perforation des blindages par l'artillerie légère, des valeurs de perçage plus élevées augmentent les chances de coups critiques, tandis que des valeurs de perçage inférieures au blindage ennemi réduisent considérablement les dégâts."
 STAT_NAVY_SURFACE_VISIBILITY: "£surface_visibility_texticon  Surface Visibility: "
 STAT_NAVY_SURFACE_VISIBILITY_DESC: "Valeurs indiquant la difficulté à repérer et à toucher le navire. Plus la valeur est faible, plus le navire est difficile à repérer et plus ses chances de survie sont élevées."
 STAT_COMMON_ARMOR: "£armor_texticon  Armor/CIWS: "
 STAT_NAVY_WEATHER_PENALTY: "£weather_texticon  Weather Penalty: "
 CARRIER_SORTIE_EFFICIENCY_FACTOR: "£sortie_efficiency_texticon  Sortie efficiency"
 MODIFIER_SHORE_BOMBARDMENT_COLLATERAL_DAMAGE_FACTOR: "£naval_battery_texticon  Shore Bombardment Collateral Damage"
 shore_bombardment_collateral_damage_factor: "£naval_battery_texticon  Shore Bombardment Collateral Damage"
 MODIFIER_ARMY_RETREAT_SPEED_FACTOR: "£retreat_texticon  Retreating Divisions Speed"