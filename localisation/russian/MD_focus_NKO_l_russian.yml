 NKO_specialise_commanders_tt: "§GArmored, defensive, offensive, and combined-arms commanders each gain a trait deepening their specialty.§!"
 NKO_specialise_guerrilla_tt: "§GGuerrilla-trained commanders learn to set ambushes.§!"
 NKO_specialise_commando_tt: "§GCommando-trained commanders are promoted to lead special forces.§!"
