 JAP_military_decision_category: "[JAP.GetAdjectiveCap]军事"
 JAP_consolidate_national_defense_framework_mission: "巩固国防体系"
 JAP_consolidate_national_defense_framework_mission_desc: "转向更广泛的防御态势，给指挥结构、规划流程及法律责任带来了不确定性。通过整合国防框架，日本逐步恢复了一致性，减少了改革带来的混乱。"
 JAP_modernize_joint_command_mission: "现代化联合指挥"
 JAP_modernize_joint_command_mission_desc: "将陆、海、空及新兴作战领域整合为统一的联合指挥体系，需要时间、训练和组织变革。随着新规程的测试与完善，摩擦逐渐减少，日本武装部队的作战效能得以提升。"
 JAP_JAP_normalize_defense_procurement_mission: "规范国防采购体系"
 JAP_JAP_normalize_defense_procurement_mission_desc: "国防职责的扩大给现有采购与工业体系带来了巨大压力。通过审慎改革、长远规划以及与产业界加强协调，日本正努力推动国防采购正常化，减少转型期的效率损耗。"
 JAP_establish_asterioid_mining_network_mission: "建立小行星采矿网络"
 JAP_establish_asterioid_mining_network_mission_desc: "日本正在组建其首个小行星采矿网络，随着太空资源开采行动初具雏形，轨道平台已就位，勘探设备正陆续部署。"
 JAP_asteroid_mining_light_operation: "轻触天颜"
 JAP_asteroid_mining_light_operation_desc: "日本展开小规模小行星勘测，在探测器搜寻可用矿石的同时祈求先人指引。"
 JAP_asteroid_mining_medium_operation: "撷取神物"
 JAP_asteroid_mining_medium_operation_desc: "一支规模更大的探险队深入小行星带，借助神话象征主义来激励此次任务，日本正在寻求珍贵的地外金属资源。"
 JAP_asteroid_mining_heavy_operation: "长天远征"
 JAP_asteroid_mining_heavy_operation_desc: "日本启动了大规模小行星采矿行动，呼应着天界熔炉的传说，全力开采丰饶的天体资源。"
 JAP_mars_mission_program_mission: "建立火星殖民地"
 JAP_restore_guarantee: "请求恢复美国安全保障"
 JAP_restore_guarantee_desc: "随着地区紧张局势加剧，对我国长期安全的疑虑日益增长，政府内部有声音主张必须寻求美国重新提供明确的安全保障。此举很可能需要在国防政策及《第九条》解释上作出政治让步，但这或许是为换取战略稳定所必须付出的代价。"
 JAP_remove_american_blockade: "要求结束美国海军施压"
 JAP_remove_american_blockade_desc: "美国在我们关键航道周边加强海军部署，已在国内外引发紧张局势。我们仍可通过外交渠道协商缓解或终止这种施压，但华盛顿方面几乎必然会要求我们深化安全承诺，并进一步调整《第九条》立场作为交换。"
 JAP_restore_trade_relations: "寻求对美贸易正常化"
 JAP_restore_trade_relations_desc: "美国实施的关税和针对性贸易措施正损害我国出口商利益，并削弱了同盟互信。通过直接与华盛顿交涉，我们或许能够实现经济关系正常化，但任何实质性的缓解措施都可能与重启安全合作及对《宪法第九条》的广义解读相挂钩。"
 USA_demand_japanese_article_9_interpretation: "要求对第九条进行宽松解释"
 USA_demand_japanese_article_9_interpretation_desc: "在快速变化的安全环境中，日本仍是至关重要的盟友，但其对宪法第九条的现行解释限制了实质性的责任分担。通过正式敦促东京拓宽对自卫权的理解，我们可以推动更深层次的合作，打造更具能力的伙伴——尽管此举可能引发日本国内反弹，并给同盟关系带来潜在摩擦。"
 JAP_chinese_agression_five: "中国威胁日显"
 JAP_chinese_agression_five_desc: "中国在该地区的行动引起了我国防务规划者的关注。尽管局势尚未达到临界点，但趋势是明确的：北京方面正在逐步升级其姿态。政策制定者警告称，日本必须为可能出现的进一步不稳定事态做好准备。"
 JAP_chinese_agression_five_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R5§!"
 JAP_chinese_agression_ten: "中国威胁升级"
 JAP_chinese_agression_ten_desc: "中国在该地区加强了军事和地缘政治压力。巡逻入侵、领空挑战以及强硬言论均显著增加。这些事件日益频繁的发生，暗示着一种旨在考验日本决心并重塑地区平衡的蓄意策略。"
 JAP_chinese_agression_ten_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R10§!"
 JAP_chinese_agression_twelve: "中国威胁加剧"
 JAP_chinese_agression_twelve_desc: "北京的最新举动标志着令人担忧的升级。情报报告显示，在有争议水域附近的海军部署增加、军事演习频繁，以及直接针对日本的政治表态。局势正变得日益不稳定，要求国家采取更强有力回应的呼声越来越高。"
 JAP_chinese_agression_twelve_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R12§!"
 JAP_chinese_agression_fourteen: "中国严重挑衅"
 JAP_chinese_agression_fourteen_desc: "中国已采取多项超出常规施压的激进举措。战略资产已在日本领土附近部署，且对我周边海域的侵入频次达到新高。防务官员警告称，日本可能需要重新审视其安全态势的某些要素。"
 JAP_chinese_agression_fourteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R14§!"
 JAP_chinese_agression_sixteen: "中国危险越界"
 JAP_chinese_agression_sixteen_desc: "地区局势正变得日益危险。中国的军事演习现在似乎旨在直接威慑日本，而北京的宣传渠道也采取了更为强硬的语调。因误判引发危机的可能性正在急剧上升。"
 JAP_chinese_agression_sixteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R16§!"
 JAP_chinese_agression_eighteen: "中国军事威压"
 JAP_chinese_agression_eighteen_desc: "中国的进攻姿态已达到一个关键节点。关键海域持续面临压力，空中越境事件频次创下历史新高，地区伙伴纷纷拉响警报。东京的决策者们普遍认为，日本必须重新评估其防务战略，包括对宪法第九条的解释。"
 JAP_chinese_agression_eighteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R18§!"
 JAP_chinese_agression_twenty: "严重地区危机：中国侵略临近"
 JAP_chinese_agression_twenty_desc: "局势已演变为一场全面的地区性危机。中国在日本领土附近进行了大规模军事部署，表明其有意进一步升级事态。对国家安全的威胁已不再是理论上的假设，日本正面临直接挑战，这可能迫使其就军事态势及自卫队的角色作出历史性决策。"
 JAP_chinese_agression_twenty_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap]侵略度§!至少达到§R20§!"
 JAP_world_tension_high: "审视安全态势"
 JAP_world_tension_high_desc: "全球局势日益动荡，要求日本重新评估其防卫政策，为国际秩序可能出现的变局做好准备。"
 JAP_world_tension_high2: "准备应对区域突发事件"
 JAP_world_tension_high2_desc: "世界正变得越来越危险。日本必须采取具体措施来确保国家安全，并保持战略准备状态。"
 JAP_world_tension_high3: "启动国家安全措施"
 JAP_world_tension_high3_desc: "全球紧张局势已达到临界点。日本现在必须考虑采取非常措施来维护国家利益，并确保区域稳定。"
 JAP_article_nine_protests_appeal: "回应亲国防抗议"
 JAP_article_nine_protests_appeal_desc: "广泛的亲国防抗议活动要求增强军事实力和采取更强硬的安全姿态。政府通过响应这些呼声并扩大对宪法第九条的解释，可以利用公众压力来为更强势的国防政策正名。"
 JAP_article_nine_protests_appeal_tt: "§Y抗议强度§!至少达到§R50§!"
 JAP_article_nine_protests_appeal_tt2: "[JAP.GetName]§Y军事法案§!不及民众预期"
 JAP_article_nine_military_parties: "利用亲军方政党"
 JAP_article_nine_military_parties_desc: "政府内部的亲军派系正推动加强国防力量，并对宪法第九条进行更宽泛的解读。通过与其议程保持一致，政府能够推进军事改革，并为更高水平的国防战备提供正当理由。"
 JAP_article_nine: "宪法第九条解释"
 JAP_article_nine_left_side: "严格和平主义"
 JAP_article_nine_level_one: "第一级：和平主义解读"
 JAP_article_nine_level_two: "第二级：防御武力解读"
 JAP_article_nine_level_three: "第三级：协同防御解读"
 JAP_article_nine_level_four: "第四级：集体自卫解读"
 JAP_article_nine_level_five: "第五级：扩大军事职能"
 JAP_article_nine_right_side: "积极防御政策"
 JAP_great_east_japan_earthquake_decision: "复兴之路"
 JAP_great_east_japan_earthquake_decision_desc: "2011年3月11日，东日本大地震以史无前例的剧烈震动与海啸席卷全国，造成了近代历史上前所未有的破坏。从东北到关东，广大地区陷入瘫痪，交通网络中断，经济活动停滞，无数人的生活被彻底颠覆。社区与产业根基尽失，整个国家陷入了动荡与不安。\n\n这场灾难不仅是物质上的摧毁，更在国民心理上刻下深刻伤痕，迫使社会重新审视其根本。日本如今站在十字路口，肩负着复苏与重建的巨大挑战。重建受灾地区、恢复产业、重振民生与社群纽带，是国家不可推卸的责任。\n\n这项被称为\"复兴之路\"的工程将漫长而艰巨。但唯有战胜如此逆境，日本才能开创崭新的未来。"
 JAP_tohoku_infrastructure_decision: "东北基础设施重建"
 JAP_tohoku_infrastructure_decision_desc: "我们必须一步步重建被地震摧毁的基础设施。恢复道路、铁路和港口——这些区域经济和日常生活的基石——是迈向复苏的第一步。"
 JAP_kanto_infrastructure_decision: "关东基础设施重建"
 JAP_kanto_infrastructure_decision_desc: "我们必须一步步重建被地震摧毁的基础设施。恢复道路、铁路和港口——这些区域经济和日常生活的基石——是迈向复苏的第一步。"
 JAP_tohoku_communication_decision: "恢复东北地区的电信通信"
 JAP_tohoku_communication_decision_desc: "灾难中遭受重创的电信基础设施对灾后恢复和日常生活至关重要。必须逐步推进修复工作，重新连接社区，重振经济活力。"
 JAP_kanto_communication_decision: "恢复关东地区的电信通信"
 JAP_kanto_communication_decision_desc: "灾难中遭受重创的电信基础设施对灾后恢复和日常生活至关重要。必须逐步推进修复工作，重新连接社区，重振经济活力。"
 JAP_tohoku_industrial_recovery_decision: "振兴东北地区工业"
 JAP_tohoku_industrial_recovery_decision_desc: "恢复因灾难而停滞的地方工业对经济复苏至关重要。重建民用工业将有助于创造就业岗位，并夯实生产基础。"
 JAP_kanto_industrial_recovery_decision: "振兴关东地区工业"
 JAP_kanto_industrial_recovery_decision_desc: "恢复因灾难而停滞的地方工业对经济复苏至关重要。重建民用工业将有助于创造就业岗位，并夯实生产基础。"
 JAP_domestic_policy_decision: "[JAP.GetFlag][JAP.GetAdjective]日本国内政策决议"
 JAP_focus_renewable_energy_decision: "关注可再生能源"
 JAP_focus_renewable_energy_decision_desc: "随着对核能安全性的担忧日益加剧，加大对太阳能、风能及其他可再生能源的投资，为能源结构多元化、降低对进口燃料的依赖开辟了新路径。"
 JAP_focus_thermal_power_decision: "注重化石燃料发电厂"
 JAP_focus_thermal_power_decision_desc: "在核能安全备受关注之际，扩建煤炭、石油和天然气发电厂为国家提供了更直接可靠的电力来源。"
 JAP_expand_national_oil_stockpiles: "扩大国家石油储备"
 JAP_expand_national_oil_stockpiles_desc: "日本绝不能因封锁、禁运或价格冲击而陷入困境。我们将扩大国家石油储备，加固储存设施，并加强燃料分配规划，确保国家能在危机中从容应对。"
 JAP_saudi_aramco_crude_storage: "沙特阿美原油储备"
 JAP_saudi_aramco_crude_storage_desc: "通过沙特阿美公司确保专用原油储备，以稳定供应并降低突发市场冲击的风险。通过锁定长期获取渠道和可预测的交付，日本赢得了战略缓冲空间。"
 JAP_overseas_upstream_equity: "海外上游股权"
 JAP_overseas_upstream_equity_desc: "拥有油田本身而不仅仅是合同，能让我们能源安全更稳固。我们将在海外寻求上游股权，以锁定供应、增强谈判筹码，并减少受政治压力影响的风险。"
 JAP_minamitori_deep_sea_trial: "南鸟岛深海试验"
 JAP_minamitori_deep_sea_trial_desc: "南鸟岛附近的海底蕴藏着资源，若能稳定开采，或将改变日本的战略地位。我们将启动深海试验，在实际环境中检验设备、物流与处理流程，将理论转化为实际能力。"
 JAP_minamitori_deep_sea_trial_tt: "完成§Y特殊项目$sp_deep_sea_mining$§!后，我们将获得更多资源"
 JAP_mitsubishi_escrap: "三菱电子废料回收计划"
 JAP_mitsubishi_escrap_desc: "最清洁的资源就在我们国境之内。我们将支持三菱主导的电子废料回收项目，从废弃电子产品中提取稀有金属，为关键产业构建国内供应链闭环。"
 JAP_kosaka_tsl_furnace: "小坂TSL熔炉扩建"
 JAP_kosaka_tsl_furnace_desc: "加工与提炼同等重要。我们将扩大小坂TSL炉的产能，以处理复杂废料和混合精矿，回收那些原本会流失的关键金属。"
 JAP_green_ship_recycling: "绿色船舶回收"
 JAP_green_ship_recycling_desc: "舰队不仅需要建造，也需要拆解，钢材必须回归国家。我们将建立绿色船舶回收标准与能力，安全高效地回收高价值材料。每一艘退役舰体都将成为下一艘舰船的建造资源。"
 JAP_horizontal_recycling_expansion_decision: "横向回收扩展"
 JAP_horizontal_recycling_expansion_decision_desc: "韧性源于将每一股工业流转化为补给线。我们将扩大横向回收体系，让回收的金属与零部件跨行业流通，用国产材料滋养造船、电子及国防生产。"
 JAP_rubber_butadience_brench_decision: "丁二烯合成橡胶"
 JAP_rubber_butadience_brench_decision_desc: "天然橡胶可能被切断、配给或高价削弱，日本不能容忍这种制约存在。我们将发展丁二烯基合成橡胶产业，以确保工业与军队所需的轮胎、密封件及关键零部件供应。"
 JAP_bibi_world_decision: "Rapidus IIM-1“比比世界”晶圆厂"
 JAP_bibi_world_decision_desc: "加速建设Rapidus IIM-1“比比世界”晶圆厂，确保日本本土的下一代半导体产能。"
 JAP_yufutsu_oil_expansion_decision: "油伏津油田扩建"
 JAP_yufutsu_oil_expansion_decision_desc: "扩大勇拂油田的产量，以加强国内供应并减少对外部干扰的暴露。"
 JAP_nankai_through_decision: "南海天然气开发"
 JAP_nankai_through_decision_desc: "开发南海海槽，以确保国内天然气供应，减少日本受海上运输中断和国外价格冲击的影响。"
 JAP_toray_expansion_program_decision: "东丽扩张计划"
 JAP_toray_expansion_program_decision_desc: "扩大东丽先进材料的生产规模，以在关键领域强化日本的工业基础。"
 JAP_teijin_aerospace_prepreg_decision: "帝人航空预浸料"
 JAP_teijin_aerospace_prepreg_decision_desc: "扩大帝人公司的航空航天级预浸料产能，以巩固现代飞机机身和高端国防系统的复合材料骨干地位。"
 JAP_demand_south_kuril: "要求归还南千岛群岛"
 JAP_demand_south_kuril_desc: "东京将正式要求归还南千岛群岛。莫斯科可能为避免局势升级而做出让步，也可能拒绝并引发危机。"
 JAP_demand_north_kuril: "要求归还北千岛群岛"
 JAP_demand_north_kuril_desc: "日本将要求归还北千岛群岛，作为其更广泛的帝国复兴议程的一部分。拒绝这一要求可被用作进一步升级局势的借口。"
 JAP_demand_sakhalin: "要求归还桦太岛"
 JAP_demand_sakhalin_desc: "日本将要求归还桦太岛。若苏联政府拒绝此要求，东京将面临克制、有限冲突或战争之间的抉择。"
 JAP_peaceout_russia: "对俄和谈"
 JAP_peaceout_russia_desc: "我们将迫使俄罗斯接受和解，按照我们的条件结束战争，并确保已取得的成果。这既是军事决策，也是政治决策，旨在莫斯科重整旗鼓之前，通过条约将新的现实固化下来。如果俄罗斯接受，战事便将终结，版图也将永久改变。"
 JAP_claiming_south_korea: "宣称朝鲜"
 JAP_claiming_south_korea_desc: "我们将把朝鲜问题包装成关乎日本安全与历史特权的议题，将模糊地带转化为明确主张。这并非姿态性的举动，而是宣告我们的战略边疆绝不终止于对马海峡。一旦主张确立，未来所有谈判都将在我们设定的框架内展开。"
 JAP_claiming_north_korea: "半岛北部问题"
 JAP_claiming_north_korea_desc: "平壤政权不是我们的邻居，而是一场永久性的危机，威胁着我们的海域和城市。我们将正式确立日本对塑造朝鲜半岛北部未来的主张，将其视为一个不容他人置喙的安全事务。一旦声明发布，北方问题将按照日本的意愿来处理。"
 JAP_claiming_taiwan: "宣称台湾主权"
 JAP_claiming_taiwan_desc: "台湾位于第一岛链的枢纽，是我国海上安全的关键。我们将重申日本对台湾的托管权，将其地位界定为战略必需，而非远方的势力所能决定。一旦宣布，日本将把台湾的未来视为与自身不可分割的一部分。"
 JAP_claiming_phillipines: "宣称菲律宾"
 JAP_claiming_phillipines_desc: "菲律宾群岛掌控着通往西太平洋的航道以及维系我国工业命脉的海上通道。我们将正式提出主权要求，并明确宣告这些岛屿属于日本的战略范围，无论他国是否赞同。一旦声明发布，该地区将明白，我国海军将决定谁有权通过这些水域。"
 JAP_claiming_malaysia: "宣称马来亚"
 JAP_claiming_malaysia_desc: "马来亚扼守关键海峡与补给线，决定本地区贸易与燃料的流向。我们将正式提出主权声索，并将其地位界定为关乎日本安全与海洋秩序的问题。一旦声明发布，所有谈判都将在我们提出的授权框架下展开。"
 JAP_claiming_indonesia: "印尼委任统治"
 JAP_claiming_indonesia_desc: "印度尼西亚控制着连接印度洋和太平洋的岛屿与咽喉要道。我们将确立对这片群岛的统治权，将其海上通道和资源视为日本的战略必需品。若要使该地区恢复秩序，必须由东京来强制执行。"
 JAP_claiming_vietnam: "宣布越南为利益所在"
 JAP_claiming_vietnam_desc: "越南扼守南海边缘，其基地足以影响整个海岸线的战略平衡。我们将宣告日本在此的利益主张，并明确表态：其阵营归属不能绕过我们。影响力始于确定性，而确定性始于主张。"
 JAP_claiming_cambodia: "囊括柬埔寨"
 JAP_claiming_cambodia_desc: "柬埔寨虽小，但地理上却是中南半岛的走廊、缓冲区和战略支点。我们将拓展我们的主张，将其未来与更广阔的日本势力范围紧密相连。地图上看似微不足道之处，往往能决定整个区域的稳定。"
 JAP_claiming_laos: "夺取湄公河腹地"
 JAP_claiming_laos_desc: "老挝控制着陆路、河流以及海岸线后方的静谧腹地。我们将把湄公河内陆地区纳入大陆安全体系，确保对手无法将其作为渗透我们势力范围的后门。控制不仅是港口，更是战略走廊。"
 JAP_claiming_australia: "宣称澳洲"
 JAP_claiming_australia_desc: "澳大利亚是太平洋的南方锚点，这片大陆能够容纳舰队、空中力量以及持久战的后勤体系。我们将宣示主权并表明，南方通道不会始终处于日本战略范围之外。一旦南方稳固，大洋自当随之掌控。"
 JAP_claiming_new_zealand: "夺取南方前哨"
 JAP_claiming_new_zealand_desc: "新西兰或许遥远，但它位于太平洋争端的关键航线上。我们将掌控南太平洋的前哨，阻止对手在我们势力范围之外建立安全后方。即便是偏远岛屿，若落入他人之手，亦能化为利器。"
 JAP_claiming_myanmar: "控制伊洛瓦底江门户"
 JAP_claiming_myanmar_desc: "缅甸是连接海洋的陆桥，也是通往该地区内陆的门户。我们将主张主权，并将其港口、走廊和机场视为日本势力范围的战略资产。谁掌控了门户，谁就决定了谁可进入。"
 JAP_demand_palau: "索要帕劳"
 JAP_demand_palau_desc: "帕劳虽是小岛链，却在海军布局中占据重要地位，提供锚地、监视和战略延伸。我们将要求其归顺日本管辖，并将其打造为我们太平洋秩序的前哨据点。版图由基地而非空谈铸就。"
 JAP_demand_micronesia: "索要密克罗尼西亚"
 JAP_demand_micronesia_desc: "密克罗尼西亚横跨太平洋中部，犹如舰队与机群的踏脚石。我们必须掌控此地以保障航道安全，并阻止对手在我们的海域建立前进基地。一旦占领这些岛屿，遥远的距离将转化为战略优势。"
 JAP_demand_nauru: "索要瑙鲁"
 JAP_demand_nauru_desc: "瑙鲁虽小，但此类岛屿决定了广袤海域的监控覆盖与通行权。我们将要求其与日本保持一致，并将其纳入我们的前哨网络。在海洋时代，没有一座岛屿是无足轻重的。"
 JAP_demand_kiribati: "索要基里巴斯"
 JAP_demand_kiribati_desc: "基里巴斯横跨关键通道，可支援侦察、补给燃料与封锁行动。我们将要求其服从日本领导，并将这些岛屿作为更广阔防御圈的一环加以控制。太平洋的秩序将逐步建立，一环接一环。"
 JAP_demand_marshall_islands: "索要马绍尔群岛"
 JAP_demand_marshall_islands_desc: "马绍尔群岛为机场、后勤设施提供了空间，并掌控着中太平洋航线。我们将要求将其纳入日本势力范围，将其打造为舰队行动的强化跳板。谁掌控这些环礁，谁就能左右整个战区的局势。"
 JAP_demand_tuvalu: "索要图瓦卢"
 JAP_demand_tuvalu_desc: "图瓦卢虽土地有限，却具备战略存在价值，而存在即决定制海权。我们将要求图瓦卢明确立场，将其打造为南太平洋的监听站与中转枢纽。纵使最微小的岛屿，亦能构筑防线的支点。"
 JAP_demand_solomon_islands: "索要所罗门群岛"
 JAP_demand_solomon_islands_desc: "所罗门群岛是西南太平洋的天然屏障和战略集结地，非常适合建设机场和提供海军掩护。我们将要求其臣服于日本，并封锁途经此处的航线。掌控此地即意味着掌控了交通命脉。"
 JAP_demand_guinea: "索要新几内亚"
 JAP_demand_guinea_desc: "新几内亚是横亘在东南亚与太平洋之间的陆桥要塞。我们将要求接管该地，将其打造为空中力量、后勤保障与前沿防御的堡垒。只要新几内亚在手，整个南方战区便将任我们掌控。"
 JAP_demand_vanuatu: "索要瓦努阿图"
 JAP_demand_vanuatu_desc: "瓦努阿图位于西南太平洋补给与辐射的关键航线上。我们将要求其与日本结盟，并将其纳入我们的基地网络。岛屿连成一线，便能构筑起一道坚不可摧的屏障。"
 JAP_demand_fiji: "索要斐济"
 JAP_demand_fiji_desc: "斐济是南太平洋的中心枢纽，能够为广阔海域的舰队后勤和空中作战提供支持。我们将要求其向日本臣服，并将其作为我们南方防线的基石加以巩固。一旦斐济归入我方掌控，该地区的战略平衡将发生根本性转变。"
 JAP_demand_samoa: "索要萨摩亚"
 JAP_demand_samoa_desc: "萨摩亚地处连接太平洋中部与南部通道的要冲。我们将要求萨摩亚与日本结盟，并将其港口和机场纳入我们更广阔的防御圈。在海洋帝国中，即便是遥远的岛屿也具有决定性意义。"
 JAP_demand_tonga: "索要汤加"
 JAP_demand_tonga_desc: "汤加为我们在南太平洋提供了战略立足点，也是监控广阔海域动向的平台。我们将要求汤加服从日本的指导，并将其作为我们南部控制链的一部分加以掌控。在我们的海上航线上，中立是我们绝不容许的奢侈。"
 JAP_demand_american_islands: "索要美属岛屿"
 JAP_demand_american_islands_desc: "美国所占据的岛屿不仅是领土，更是向我国海域投射力量的前沿基地。我们将要求这些岛屿移交或置于日本管辖下实现非军事化，从而剥夺华盛顿在我们家门口的集结地。若欲建立太平洋秩序，就必须清除外国的立足点。"
 JAP_demand_french_islands: "索要法属岛屿"
 JAP_demand_french_islands_desc: "法国在太平洋的岛屿领地提供了战略延伸、港口以及外交掩护，使外国势力得以在此存在。我们将要求它们臣服于日本，并将其纳入我们的前哨站与走廊网络。我们的势力范围绝不容许被遥远帝国所渗透。"
 JAP_demand_british_islands: "索要英属岛屿"
 JAP_demand_british_islands_desc: "英国岛屿属地是旧秩序的残余，但它们仍为关键航线提供基地与影响力。我们将要求将其移交至日本的势力范围，从而填补我们海上防线的又一缺口。太平洋将在一个权威——即我们的权威之下实现统一。"
 JAP_imperial_procurement_standardization: "帝国采购标准化"
 JAP_imperial_procurement_standardization_desc: "集中采购规则，统一零部件标准，并在全军范围内强制执行通用规格。目标是实现更快的产出、更简化的后勤以及更少的生产瓶颈。"
 JAP_zaibatsu_empowerment_charter: "立法赋权财阀"
 JAP_zaibatsu_empowerment_charter_desc: "授予特定工业集团特权，以换取帝国政府设定的强制性生产指标。"
 JAP_neighborhood_associations_system: "邻里协会制度"
 JAP_neighborhood_associations_system_desc: "重建覆盖全国的基层协会网络，用于户籍登记、物资调配与快速动员支持。此举强化了社会管控能力，提升了国家响应效率。"
 JAP_state_rites_restoration: "国礼复兴"
 JAP_state_rites_restoration_desc: "恢复国家典礼与公共仪式，使其成为国民生活的核心支柱。这项改革将巩固帝国统治的合法性，并促进公众对重建秩序的遵从。"
 JAP_national_morals_education_act: "国民道德与教育法案"
 JAP_national_morals_education_act_desc: "围绕责任、服务和民族团结来规范公民教育。学校将被用于培养纪律性、增强战备意识，并促进对复兴国家的忠诚。"
 JAP_imperial_rescript_revival: "帝国诏书复兴"
 JAP_imperial_rescript_revival_desc: "颁布正式诏书以确立国家法统，界定国民义务。重建的秩序将彰显为回归统一、责任与民族使命。"
 JAP_north_korean_remilitarized_dmz: "回应朝鲜在非军事区的升级行动"
 JAP_north_korean_remilitarized_dmz_desc: "朝鲜已加强非军事区沿线的防御部署。东京将以此局势升级为由，依据宪法第九条强化安保态势并扩大行动权限。"
 JAP_north_korean_increased_nuclear_testing: "回应朝鲜核试验"
 JAP_north_korean_increased_nuclear_testing_desc: "新一轮核试验步伐的加快加剧了地区威胁态势。政府将以此为由，对宪法第九条作出更严格的解释，并加速推进战备措施。"
 JAP_north_korean_threats_to_south_korea: "回应朝鲜的威胁"
 JAP_north_korean_threats_to_south_korea_desc: "针对大韩民国的直接威胁增加了冲突扩大的风险，可能波及日本的安全范围。东京方面可以扩大对宪法第九条的解释，并加强威慑规划。"
 JAP_north_korean_road_to_war: "准备应对朝鲜战争威胁"
 JAP_north_korean_road_to_war_desc: "局势正滑向公开冲突。日本已无法仅靠克制来应对。对第九条进行重新解释，将能实现更强大的军事规划和更快速的应对选择。"
 JAP_russian_agressiveness: "应对俄罗斯侵略"
 JAP_russian_agressiveness_desc: "俄罗斯在东北亚日益强硬的姿态正在破坏地区稳定。东京将利用这一加剧的威胁环境，加强威慑力，并在宪法第九条下扩大行动空间。"
 JAP_defence_russian_asian_ambitions: "遏制俄罗斯亚洲野心"
 JAP_defence_russian_asian_ambitions_desc: "莫斯科在亚洲的野心威胁到日本的安全环境及太平洋地区的势力平衡。东京将根据第九条强化其防御姿态，并拓宽军事行动选项。"
 JAP_russian_north_korean_alliance: "准备应对俄朝轴心"
 JAP_russian_north_korean_alliance_desc: "俄罗斯与朝鲜的进一步靠拢，将从多个方向加大对日本的压力。东京方面将通过加强威慑力、放宽宪法第九条下的剩余限制来作出回应。"
 JAP_russian_pacific_naval_presence: "应对俄罗斯太平洋海军扩张"
 JAP_russian_pacific_naval_presence_desc: "俄罗斯在太平洋的海军姿态正变得更具进取性。日本将利用这一变化来为其扩大海上战备和对宪法第九条进行更灵活的解释提供理由。"
 JAP_tookover_sikhalin_mission: "收复失地的最后期限"
 JAP_tookover_sikhalin_mission_desc: "时间所剩无几。如果俄罗斯未能在截止日期前夺回既定目标，国际压力与国内疲态将迫使其接受和解。届时将签署和平协议，割让失地作为结束战争的代价。"
 JAP_russia_demands_peace_japan: "对俄和谈"
 JAP_russia_demands_peace_japan_desc: "随着千岛群岛和萨哈林岛现已牢牢掌握在日本手中，东京方面提出了结束战争的提议。这项提议简洁而审慎：以和平换取俄罗斯承认北方的新现实。这并非慈善之举，而是一种战略性的解决方式，旨在确保我们的战果，同时避免两国陷入长期冲突的代价。接受提议将使战争告终，并使我们对所占领土的控制正式化。拒绝则意味着莫斯科愿意继续一场已无必胜把握的战争。"
 JAP_russia_demands_peace_russia: "向日本求和"
 JAP_russia_demands_peace_russia_desc: "我们将要求与日本达成和解，以结束战斗并冻结局势，防止其进一步恶化。这不是和解，而是损害控制，趁我们仍有筹码迫使结果时锁定条件。如果东京方面拒绝，我们便会明白他们追求的是胜利，而非和平。"
 JAP_auto_claiming_tt: "选择此项决议后，该决议将反复执行，直至所有核心地区被索要完毕。届时，便可要求对方臣服。"
 JAP_intellectual_platform_decision: "$JAP_intellectual_platform$"
 JAP_intellectual_platform_decision_desc: "$JAP_intellectual_platform_desc$"
 JAP_declining_birthrate_category: "少子化对策厅"
 JAP_declining_birthrate_category_desc: "千禧年前后的日本，出生人口减少与少子化进程开始被强烈认知为未来可能动摇社会根基的课题。其原因并非单一——晚婚与非婚化、育儿与就业难以两全、包括教育和住房在内的家庭负担——这并非短期对策所能解决的问题。人口结构的变化影响着劳动力、社会保障乃至地域社会的维系，因此政府需要持续跨政策领域应对。\n\n对这一问题的努力，通过扩充育儿支援、改革工作方式、减轻家庭负担等个别政策的积累逐渐成形。虽然未必能立即看到明显的变化，但措施的积累确实在稳步改变社会根基，并对出生动向产生中长期效应。\n\n每隔数年发布的调查报告，会对这些努力的进展和效果进行再次审视。其结果可能使围绕少子化的危机感加剧，也可能确认到复苏与改善的迹象。政府能否持之以恒地持续推进措施，将决定未来的人口基础。\n\n§Y在国策$JAP_work_style_reform$、$JAP_basic_policy_declining_birthrate_society$和$JAP_save_ice_age_generation$中，提高§G$JAP_declining_birthrate_measures_modifier$§!修正值，可以削弱或消除少子化国家精神的影响！§!\n\n§Y少子化国家精神的变更由每§24年§!一次的调查报告事件进行确认！如果$JAP_declining_birthrate_measures_modifier$达到或超过一定水平，国家精神将§G改善§!，但若低于一定水平，则可能反而§R恶化§!！§!\n\n§Y当前少子化对策进度：§! [?ROOT.modifier@JAP_declining_birthrate_measures_modifier|0]\n\n§Y维持现状目标值：§! 7\n\n§Y改善目标值：§! 14"
 JAP_territorial_disputes: "[JAP.GetNameWithFlag]领土争端"
 JAP_territorial_disputes_desc: "[JAP.GetName]现与邻国在以下三个地区存在领土争端：\n\n§Y北方领土（南千岛群岛）§!：[JAP.GetName]主张位于北海道东北部的择捉岛、国后岛、色丹岛及齿舞群岛的主权，认为苏联在二战后占领这些岛屿是非法的，并持续向[SOV.GetName]要求归还。而[SOV.GetName]则主张对这些岛屿拥有主权并维持着实际控制。\n\n§Y竹岛（[KOR.GetAdjective]名称：独岛）§!：位于[JAP.GetName]海（东海）的该岛屿虽由[JAP.GetName]主张主权，但自1950年代以来一直处于[KOR.GetName]的实际控制之下。这一争端涉及历史解释与渔业权，是两国间极具争议且政治敏感的问题。\n§Y由于竹岛面积过小无法在地图上显示，即使谈判成功也不会获得领土增益。但您仍可获得下述修正效果！§!\n\n§Y尖阁诸岛（中文名称：钓鱼岛及其附属岛屿）§!：这片位于东海的无人岛群自1895年起处于[JAP.GetName]的实际控制之下，但[CHI.GetName]与[TAI.GetName]亦主张主权。自1990年代以来，反复的外交抗议与主权声索使该问题成为未来紧张局势的潜在导火索。\n\n所有这些争端都与历史、国际法、实际控制、外交关系及国内民意深度交织。解决这些争端需要与相关国家建立更紧密的联系并增进相互理解。\n\n§Y提示：提升目标国家对您的好感度或增强您对其的影响力将使谈判更易成功！§!\n\n§Y奖励：若谈判成功，您可获得§G$MODIFIER_STABILITY_FACTOR$§!与§G$agriculture_district_income_tax_modifier$§!的修正效果！"
 JAP_territorial_disputes_TT: "如果谈判成功，除了解决领土问题，你还能获得§G$MODIFIER_STABILITY_FACTOR$§!和§G$agriculture_district_income_tax_modifier$§!的增益效果！"
 JAP_dec_negotiations_resolve_northern_territories_dispute: "谈判解决北方领土争端"
 JAP_dec_negotiations_resolve_northern_territories_dispute_desc: "北方领土问题始终是战后[JAP.GetName]与[SOV.GetName]外交中最重大的悬案之一。直面这一问题并寻求和平解决，对于恢复[JAP.GetName]主权和保障远东地区稳定至关重要。若能建立充分的互信与谈判条件，我们便可与[SOV.GetName]启动正式外交谈判，要求归还相关领土。"
 JAP_dec_negotiations_resolve_senkaku_dispute_china: "与[CHI.GetName]就尖阁诸岛进行谈判"
 JAP_dec_negotiations_resolve_senkaku_dispute_china_desc: "[CHI.GetName]对尖阁诸岛的领土主张已成为[JAP.GetName]与[CHI.GetName]关系中的不稳定因素。作为实际控制该岛屿的一方，[JAP.GetName]希望通过外交途径说服[CHI.GetName]撤回其主张以解决这一问题。在具备必要的互信与国际影响力后，我们现已准备与[CHI.GetName]展开直接谈判。"
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan: "与[TAI.GetName]就尖阁诸岛进行谈判"
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan_desc: "[TAI.GetName]对尖阁诸岛的领土主张已成为[JAP.GetName]与[TAI.GetName]之间互信合作的潜在障碍。为获得[JAP.GetName]对岛屿实际控制权的外交承认，我们现已准备与[TAI.GetAdjective]当局展开和平谈判。"
 JAP_dec_negotiations_resolve_takeshima_dispute: "谈判解决竹岛争端"
 JAP_dec_negotiations_resolve_takeshima_dispute_desc: "与[KOR.GetName]关于竹岛（韩称独岛）的领土争端长期以来一直是[JAP.GetName]与[KOR.GetName]关系中的主要障碍。我国准备正式向[KOR.GetAdjective]政府提出领土谈判，寻求通过冷静而真诚的外交途径解决这一问题。"
 JAP_base_okinawa_decision: "冲绳美军的未来"
 JAP_base_okinawa_decision_desc: "冲绳至今仍驻有大量美军基地，这对日本的安全架构和当地社区都产生了深远影响。\n日本政府正着手研究如何调整现有安排，以寻求更大的安全自主权并减轻地区负担。\n通过外交磋商，美日安全关系或将达成新的平衡。\n\n提示：§Y[JAP.GetName]在[USA.GetName]的影响力§!与§Y[USA.GetName]在[JAP.GetName]的影响力§!将影响谈判成功率。此外，您也可以通过§Y解决围绕宪法第九条的权力平衡问题§!或§Y将军事开支提升至至少$defence_04$§!来提高成功率！"
 JAP_negotiation_base_okinawa: "冲绳撤军谈判"
 JAP_negotiation_base_okinawa_desc: "为增强国家安全自主性，日本将就驻冲绳美军撤离事宜启动外交谈判。此举旨在重新评估现有安全安排，并基于地区动态变化探索更具适应性的框架。"
 Japan.101.t: "邮政解散：执政面临考验"
 Japan.101.d: "邮政民营化法案在国会审议中遭遇了强烈反对，审议气氛日益紧张。即使在党内，谨慎和反对的声音依然强烈：有人认为应通过调整和修订来推进，也有人主张现在是明确问题、寻求公众裁决的时机。\n如果我们解散众议院并举行大选，将是对改革本身的直接考验。同时，政治日程将迅速转向选举，政治紧张局势的加剧将不可避免。\n\n我们是否应该推进解散国会并举行大选？"
 Japan.101.a: "解散众议院"
 Japan.101.b: "不解散"
 Japan.103.t: "左翼力量崛起"
 Japan.103.d: "在经济停滞、就业不稳定以及社会保障问题日益突出的背景下，呼吁扩大再分配与民生支持的左翼力量正迅速引发关注。作为对既有政治不满情绪的载体，左翼支持在各地区蔓延，民意调查也开始显示左翼政党支持率的显著增长。在未来的政治格局中，左翼力量的存在或将变得不容忽视。"
 Japan.103.a: "自由主义风潮"
 Japan.103.b: "社民力量增长"
 Japan.103.c: "共产势力扩张"
 Japan.103.e: "左翼民粹抬头"
 Japan.104.t: "右翼势力崛起"
 Japan.104.d: "在人们对安全环境的日益焦虑和对政治的不信任感不断上升的背景下，呼吁维持秩序、实现国家自主并强调传统价值观的右翼势力正获得越来越多的支持。这些立场吸引了广泛选民的关注，民意调查也开始显示右翼政党支持率的显著增长。在未来的政治局势中，右翼的影响力可能会进一步增强。"
 Japan.104.a: "保守力量获得支持"
 Japan.104.b: "社会民主力量增长"
 Japan.104.c: "改革保守势力崛起"
 Japan.104.e: "复辟派系获得支持"
 JAP_diplomacy.01.t: "就美军撤离冲绳事宜启动谈判"
 JAP_diplomacy.01.d: "数十年来，美军驻日部队一直是日本战后安全框架和地区稳定的基石。然而，鉴于地缘政治环境的变化、公众舆论的转变以及日本对提升自身防御能力日益增长的兴趣，政府决定必须重新审视美军在冲绳的驻军问题。作为第一步，与美国的正式谈判现已启动。"
 JAP_diplomacy.01.a: "开始外交谈判"
 JAP_diplomacy.02.t: "日本请求撤军谈判"
 JAP_diplomacy.02.d: "日本政府已正式提出请求，就驻冲绳美军的撤离问题展开谈判。该提议并非出于对抗性质，而是作为日本国防态势全面重估及安全需求演变的一部分而提出。美国现在必须权衡如何回应，既要维护同盟关系的完整性，又要兼顾在该地区的长期战略利益。"
 JAP_diplomacy.02.a: "接受请求"
 JAP_diplomacy.02.b: "拒绝请求"
 JAP_diplomacy.03.t: "协议达成：美军将撤离"
 JAP_diplomacy.03.d: "经过一系列外交磋商，日本与美国已就美军撤离冲绳事宜达成协议。这标志着日本国防政策演变的关键时刻，凸显了其希望为本国安全承担更多责任的意愿。虽然这意味着现有框架的终结，但也为重新审视美日关系、探索未来新型安全合作模式提供了契机。"
 JAP_diplomacy.03.a: "安全政策的新篇章开启"
 JAP_diplomacy.04.t: "谈判失败：撤军遭拒绝"
 JAP_diplomacy.04.d: "美国政府拒绝了日本提出的从冲绳撤军的要求。因此，现有的安保安排将继续维持。这一结果可能在日本国内引发复杂反应，或将激化关于日本在防务事务上自主权的讨论。日本政府现在必须重新评估其应对策略，同时继续密切关注更广泛的地区及国内局势。"
 JAP_diplomacy.04.a: "是时候考虑我们的下一步行动了"
 JAP_diplomacy.05.t: "迈向未来的共同记忆"
 JAP_diplomacy.05.d: "日本政府决定提议在联合国斡旋下建立三方知识平台，旨在分享过往战争的记忆与教训，并将和平文化传承给后代。该项目将包括博物馆和数字档案馆，所有费用由日本承担。该提议将通过外交渠道正式递交给中国和韩国。"
 JAP_diplomacy.05.a: "发送提案"
 JAP_diplomacy.06.t: "日本提议：共享记忆与未来"
 JAP_diplomacy.06.d: "在联合国斡旋下，日本政府提议与中国和韩国建立一个三方知识平台，以保存战争的记忆和教训，造福后代。该倡议包括建设博物馆和数字档案馆，所有费用均由日本承担。我们将选择面向未来的合作，还是继续深陷不信任之中？我们的决定将塑造东亚记忆的未来。"
 JAP_diplomacy.06.a: "接受提议"
 JAP_diplomacy.06.b: "拒绝提议"
 JAP_diplomacy.08.t: "三方知识平台启动"
 JAP_diplomacy.08.d: "中国和韩国均已接受该提议。在联合国斡旋下，三方知识交流平台正式启动。通过联合博物馆和档案馆，战争的记忆和教训将传承给后代。这或许标志着迈向和解与相互理解的重要一步。"
 JAP_diplomacy.08.a: "迈向未来的新一步"
 JAP_diplomacy.09.t: "提案被驳回"
 JAP_diplomacy.09.d: "遗憾的是，我们设想的知识平台遭到了拒绝。显然，和解需要更多时间，也需要持续努力来建立信任。"
 JAP_diplomacy.09.a: "我们必须等待下一次机会"
 JAP_news.01.t: "[JAP.GetLeader]声明：正视历史"
 JAP_news.01.d: "今天，日本政府发布首相[JAP.GetLeader]的正式声明，对日本过去的殖民统治和战争行为表示深刻反省和由衷道歉。声明强调将真诚致力于构建面向未来的外交关系，并以负责任的态度保存历史记忆。这一讲话在国内外引起广泛关注，预计将对未来东亚地区的外交格局产生影响。"
 JAP_news.01.a: "我们对未来的责任。"
 JAP_news.01.b: "我们将密切关注事态发展。"
 JAP_diplomacy.34.t: "扩大货币互换的提议"
 JAP_diplomacy.34.a: "接受"
 JAP_diplomacy.34.b: "暂时否绝"
 JAP_diplomacy_34_TT: "§Y如果提议被接受，东盟国家将获得稳定度修正，而我们将获得来自东盟国家的§G正向态度修正§!!§!"
 JAP_diplomacy.35.t: "扩大货币互换协议"
 JAP_diplomacy.35.d: "[FROM.GetName]已同意日本关于扩大货币互换安排的提议。此举进一步强化了危机时期的流动性支持\"安全网\"，增强了市场信心及区域合作的有效性。该协议也是提升东盟内部对日本信任度的明确举措。"
 JAP_diplomacy.35.a: "好。"
 JAP_diplomacy.36.t: "提议被拒绝"
 JAP_diplomacy.36.d: "[FROM.GetName]已表示将拒绝日本关于扩大货币互换协议规模的提议。这反映出该国倾向于优先明确协议条款与操作流程，并非对提议本身的否定。日本应在保持对话渠道畅通的同时，继续关注对方的具体情况。"
 JAP_diplomacy.36.a: "明白。"
 JAP_diplomacy.37.t: "核心基础设施投资提案"
 JAP_diplomacy.37.d: "为提升区域互联互通与经济增长，日本政府提议在我国开展大规模政府开发援助投资，重点投向交通网络、港口及能源等核心基础设施领域。道路、港口与电网的升级将强化物流与工业基础，直接助力我国发展。接受该提案还将增强日本在东盟内部的影响力。\n\n我们是否应接受该提案以加速基础设施建设？"
 JAP_diplomacy.37.a: "接受"
 JAP_diplomacy.37.b: "拒绝"
 JAP_diplomacy_37_TT: "§Y如果提议被接受，东盟国家将获得基础设施建设速度修正，作为各国贡献§R3.5B美元§!的回报，我们将在东盟国家内获得§G影响力§!！§!"
 JAP_diplomacy.38.t: "投资提案已接受"
 JAP_diplomacy.38.d: "[FROM.GetName]已接受日本关于核心基础设施官方发展援助投资的提议。推进交通网络、港口和电力基础设施的改善将提升区域互联互通与经济增长，同时使我们的参与更加稳固。此项协议将进一步增强日本在东盟内部的影响力。"
 JAP_diplomacy.38.a: "好。"
 JAP_diplomacy.39.t: "提议被拒绝"
 JAP_diplomacy.39.d: "[FROM.GetName]已表示将拒绝日本关于核心基础设施的政府开发援助投资提案。该国似乎正优先考虑其国内计划与制度准备，但这并不代表其完全拒绝提案本身。日本应在体谅对方国情的同时，为未来合作保留空间。"
 JAP_diplomacy.39.a: "明白。"
 JAP_diplomacy.40.t: "关于人力资本与科研合作的提案"
 JAP_diplomacy.40.a: "接受"
 JAP_diplomacy.40.b: "拒绝"
 JAP_diplomacy_40_TT: "§Y若接受此提议，东盟国家将获得研究速度与生产效率增长的修正，同时我方将在东盟国家内赢得§G影响力§!§!"
 JAP_diplomacy.41.t: "合作提案已接受"
 JAP_diplomacy.41.a: "好。"
 JAP_diplomacy.42.t: "提议被拒绝"
 JAP_diplomacy.42.a: "明白。"
 JAP_diplomacy.43.t: "申请加入日本海上安保框架"
 JAP_diplomacy.43.d: "日本政府提出了一项旨在缓解南海紧张局势、保护航行自由的中立和平海上安全框架计划，并已就我国加入该框架事宜与我方接洽。信息共享、海上搜救、反海盗行动及联合演习等合作将有助于区域稳定，并提升危机管理能力。接受该提议还将增强日本在东盟内部的影响力。\n\n我们是否应接受该提议，并在日本主导的框架内开展合作？"
 JAP_diplomacy.43.a: "接受"
 JAP_diplomacy.43.b: "拒绝"
 JAP_diplomacy_43_TT: "§Y若提议被接受，东盟国家将获得稳定度修正，同时我方将在东盟国家内获得§G影响力§!的提升！§!"
 JAP_diplomacy.44.t: "同意加入框架"
 JAP_diplomacy.44.d: "[FROM.GetName]已同意加入日本提出的中立与和平的海上安全框架。随着信息共享、海上搜救、反海盗行动及联合演习等合作的推进，我们有望在区域稳定与航行自由保护方面取得实质性进展。该协议将增强日本在东盟内部的信任度与影响力。"
 JAP_diplomacy.44.a: "好。"
 JAP_diplomacy.45.t: "参与提案已拒绝"
 JAP_diplomacy.45.d: "[FROM.GetName]已表示将拒绝加入日本提出的中立与和平海上安全框架。该国似乎更优先考虑地区局势和国内事务，但这并不意味着其拒绝合作原则本身。日本应保持不加剧紧张局势的立场，同时为对话与合作留出空间。"
 JAP_diplomacy.45.a: "明白。"
 JAP_diplomacy.46.t: "启动日美联合教育计划"
 JAP_diplomacy.46.d: "日本政府提议扩大联合教育项目和学生交流，以深化相互理解并培养下一代。通过建立一个让两国能够相互学习对方优势——日本的纪律性与美国的创业精神——的框架，旨在培养具有国际视野的新一代领导者。这一举措将增进民间联系，并进一步巩固同盟内部的信任。"
 JAP_diplomacy.46.a: "对未来的投资。"
 JAP_diplomacy_46_TT: "§Y美国将获得一个稳定度修正！§!"
 JAP_diplomacy.47.t: "日美技术文化交流"
 JAP_diplomacy.47.d: "日本政府提出一项计划，旨在通过将日本大学实验室、工作室及企业网络与硅谷、西雅图和洛杉矶的合作伙伴相连接，以扩大技术与文化交流。工程师、设计师和创作者将往返两地开展联合项目，力求将美国在平台运营方面的专业知识与日本在硬件、游戏和动画领域的优势相结合。若文化亲和力与科技合作能同步推进，将共同巩固社会稳定并增强创新动力。"
 JAP_diplomacy.47.a: "最大化协同效应。"
 JAP_diplomacy.48.t: "日美两用研究合作"
 JAP_diplomacy.48.d: "日本政府提出一项旨在进一步加强日美在军民两用技术领域合作的提案。该计划以产学研协作为核心，旨在推进联合研究、共享专业知识并促进人员交流，从而加速研发进程，推动整体技术发展。若此项合作得以稳固推进，预计将提升未来在民用与军事领域的综合竞争力。"
 JAP_diplomacy.48.a: "推进联合研究。"
 JAP_diplomacy_48_TT: "§Y美国还将获得一项研究速度修正！§!"
 JAP_diplomacy.49.t: "日台防灾知识平台"
 JAP_diplomacy.49.a: "增强我们的韧性。"
 JAP_diplomacy_49_TT: "§Y[TAI.GetName]也将获得相同的修正！§!"
 JAP_diplomacy.50.t: "强化日台先进技术伙伴关系"
 JAP_diplomacy.50.a: "促进联合研究。"
 JAP_diplomacy.51.t: "扩大赴日留学名额"
 JAP_diplomacy.51.d: "日本政府提议扩大奖学金名额和招生名额，以增加台湾学生进入日本大学学习的机会。这一举措不仅旨在深化学术和文化联系，也意在培养能够连接我们两个社会的未来人才。随着交流的扩大，下一代推动日台关系发展的基础将变得更加牢固。"
 JAP_diplomacy.51.a: "投资下一代。"
 JAP_diplomacy.52.t: "支持贸易体系改革"
 JAP_diplomacy.52.d: "日本政府提出技术及制度合作，以支持中国贸易体系的改革与现代化。通过简化海关程序、数字化行政运作以及制定符合国际标准的规则，旨在促进贸易并提高商业活动的可预测性。若这些改革得以推进，进出口的程序性负担将减轻，从而降低经济活动中的摩擦。接受此提议还将增加日本在中国的影响力。\n\n我们是否应接受日本的支持，推进我国贸易体系的国际协调？"
 JAP_diplomacy.52.a: "接受"
 JAP_diplomacy.52.b: "拒绝"
 JAP_diplomacy_52_TT: "§Y若对方接受提议，中国将获得减少税收负担的修正，同时我方将在中国获得§G影响力§!！§!"
 JAP_diplomacy.53.t: "合作提案已接受"
 JAP_diplomacy.53.d: "[FROM.GetName]已接受日本提供的贸易体系改革与现代化技术支持及制度援助。随着海关手续的简化与行政运作的改进，贸易便利化程度和商业活动可预测性将得到提升，日本企业进入市场的环境也将改善。此项协议将稳步增强日本在中国境内的影响力。"
 JAP_diplomacy.53.a: "好。"
 JAP_diplomacy.54.t: "提案被拒绝"
 JAP_diplomacy.54.d: "[FROM.GetName]已表示将拒绝日本关于为其贸易体系改革与现代化提供技术和制度支持的建议。对方似乎更优先考虑其政策设计重点和国内协调，但这并不意味着其完全拒绝改革需求。日本应在保持对话合作空间的同时，继续关注对方国情。"
 JAP_diplomacy.54.a: "明白。"
 JAP_diplomacy.55.t: "日中投资合作扩大"
 JAP_diplomacy.55.d: "日本政府表示，有意推进制度协调与合作框架，以促进日中企业间的相互投资和市场准入。若双向进入加速，生产网络将得以优化，供应链效率提升，有望带动整体产业生产力增长。经济依存关系的深化虽伴随风险，但通过减少摩擦，亦可成为具有实际意义的稳定因素。"
 JAP_diplomacy.55.a: "开放市场，提升效率。"
 JAP_diplomacy_55_TT: "§Y中国也将获得相同的修正！§!"
 JAP_diplomacy.56.a: "深化文化团结。"
 JAP_diplomacy.57.t: "日中联合佛教寺庙保护项目"
 JAP_diplomacy.57.d: "日本政府提议实施一项中日联合项目，通过共同开展保护与修复工作，将佛教寺庙作为共同文化遗产加以保存。通过共享修复技术和调查方法，并建立文化遗产保护合作框架，旨在重新确认寺庙及相关文化资产的价值，确保其长期保存。若这些保护工作的成果显现，文化旅游的吸引力将得到提升，同时也有望对地方经济产生积极的溢出效应。此次合作或许也能成为重申两国历史纽带的契机。"
 JAP_diplomacy.57.a: "保护文化遗产，推动旅游发展。"
 JAP_diplomacy.58.t: "东京-首尔企业孵化器"
 JAP_diplomacy.58.d: "日本政府提出了一项在东京和首尔建立联合孵化器项目的提案，旨在制度化两国对初创企业的支持。通过协助筹款、提供指导、促进企业与大学合作以及两地人才交流，该项目旨在提高初创企业的成功率并加强技术合作。如果这一框架按预期运作，两地间的创新将加速推进，日韩经济合作也将以更务实、注重成果的方式得到加强。"
 JAP_diplomacy.58.a: "助力初创企业。"
 JAP_diplomacy_58_TT: "§Y韩国也将获得相同的修正！§!"
 JAP_diplomacy.59.t: "日韩地方合作扩展"
 JAP_diplomacy.59.a: "发展地方。"
 JAP_diplomacy.60.t: "日韩文化交流提案"
 JAP_diplomacy.60.d: "日本政府提出了一项系统性地扩大日韩文化交流的提案。通过媒体、艺术、体育、旅游和教育交流，旨在加深两国人民之间的相互理解，缩短社会距离。如果交流得以扩大，还将影响公众情绪和外部态度，两国也将在彼此国内领域获得更有效发言的环境。\n\n我们是否应该接受这一提案并促进文化交流？"
 JAP_diplomacy.60.a: "接受"
 JAP_diplomacy.60.b: "拒绝"
 JAP_diplomacy_60_TT: "§Y若接受此提议，我们将获得§G对韩国的影响力§!，但韩国也将获得§R对日本的影响力§!。§!"
 JAP_diplomacy_60_TT2: "§Y文化交流将使我们能够增加在日本的影响力，但日本在我国国内的影响力也会随之提升。§!"
 JAP_diplomacy.61.t: "提案已接受"
 JAP_diplomacy.61.d: "[FROM.GetName]已同意日本提出的扩大文化交流提案。随着媒体、艺术、体育、旅游和教育领域的交流日益广泛，两国间的相互理解将加深，公众情绪也可能随之发生变化。通过此项协议，日本将在韩国获得更强的话语权，而韩国也将增强其在日本的影响力。"
 JAP_diplomacy.61.a: "好。"
 JAP_diplomacy.62.t: "提案被拒绝"
 JAP_diplomacy.62.d: "[FROM.GetName]已表示将拒绝日本扩大文化交流的提案。该国似乎优先考虑舆论与国内形势，但这并非意味着拒绝文化交流本身。日本应保持对话渠道畅通，同时为通过其他方式增进相互理解留出空间。"
 JAP_diplomacy.62.a: "明白。"
 JAP_diplomacy.63.t: "日韩老龄化社会特别工作组"
 JAP_diplomacy.63.d: "日本政府提议设立日韩专家及相关机构联合工作组，以应对共同面临的老龄化社会挑战，通过每月磋商制定合作政策。通过分享强化养老与医疗体系、就业支持以及社区福利设计等方面的专业知识，旨在提升政策应对的速度与效能。若该框架得以确立，将推动社会福利措施的强化，并为长期社会稳定作出贡献。"
 JAP_diplomacy.63.a: "一起未雨绸缪。"
 JAP_diplomacy_63_TT: "§Y韩国将获得人口增长修正。§!"
 JAP_diplomacy.64.t: "寒冷地区开发合作"
 JAP_diplomacy.64.d: "日本政府提出\"远东倡议\"，借鉴北海道振兴寒冷地区的经验，通过基础设施投资和引进外资支持俄罗斯远东地区的寒带开发。通过推进交通、物流、能源等基础条件改善，旨在激发区域经济活力并提升开发成效。该倡议主要针对萨哈与堪察加地区的基础设施建设。"
 JAP_diplomacy.64.a: "巩固远东的根基。"
 JAP_diplomacy.65.t: "萨哈林二号"
 JAP_diplomacy.65.d: "日本政府表示，有意在与俄罗斯合作的同时，加强萨哈林二号能源项目的外国投资，以确保化石燃料的稳定供应。如果资本投资和运营稳定得以推进，开发连续性将得到改善，并有望扩大产能。萨哈林将继续作为重要的供应枢纽，并可能对区域经济带来积极影响。"
 JAP_diplomacy.65.a: "扩大产能。"
 JAP_diplomacy.66.t: "启动欧亚运输网络合作"
 JAP_diplomacy.66.d: "日本政府已表示有意推进日俄合作，开发一条经由俄罗斯连接日本与欧洲的陆上物流通道。通过利用铁路网络和主要高速公路，旨在缩短运输时间，建立稳定的欧洲市场准入，同时加速沿线基础设施升级。若货物运输实际启动，俄罗斯作为欧亚枢纽的重要性将进一步提升，经济连通性也将随之深化。"
 JAP_diplomacy.66.a: "加快走廊建设。"
 JAP_diplomacy_66_TT: "§Y俄罗斯将获得基础设施建造速度修正！§!"
 JAP_diplomacy.67.t: "启动日俄信息技术基建合作"
 JAP_diplomacy.67.d: "日本政府提出\"俄罗斯数字走廊\"倡议，联合日本IT企业在俄罗斯建设数据中心、光纤网络等基础设施。此举旨在升级本国通信基础设施，同时强化俄罗斯作为连接欧洲、中亚与俄罗斯的数字贸易网络枢纽地位。若合作顺利推进，信息流稳定性与网络容量将得到提升，经济活动数字化进程也将加速。"
 JAP_diplomacy.67.a: "扩展互联基础设施。"
 JAP_diplomacy_67_TT: "§Y俄罗斯将获得网络基础设施建设速度修正！§!"
 JAP_historical.20110311.t: "东日本大地震"
 JAP_historical.20110311.d: "2011年3月11日下午2点46分，日本东北地区太平洋海域发生里氏9.0级特大地震。这场日本观测史上最强级别的地震，以猛烈摇晃席卷东北至关东广大地区，随之而来的滔天海啸吞噬了沿海城镇村落，留下满目疮痍。渔港集落在瞬间化为乌有，道路、铁路、机场等基础设施中断，城市功能陷入瘫痪。\n\n数十万人失去家园，被迫栖身避难场所。作为地区经济支柱的农林水产业与制造业损失惨重，经济损失难以估量。基础设施修复、灾民安置、产业重建与城市规划，每一项重担都将考验政府行政能力的极限。\n\n在这场史无前例的浩劫中，日本民众展现出坚韧与团结。而政府能否迅速有效地展开应对，将决定国家的稳定与未来。"
 JAP_historical.20110311.a: "全力以赴投入救援和恢复工作。"
 JAP_great_east_japan_earthquake_tree_tt: "§Y东日本大地震灾后重建的国策树已解锁！§!"
 JAP_news.02.t: "日本遭遇史无前例大地震"
 JAP_news.02.d: "2011年3月11日，日本遭遇巨大地震。这场被称为“东日本大地震”的里氏9.0级强震，发生在东北地区太平洋海域，对广大地区造成毁灭性打击，数万人死伤或失踪，经济损失难以估量。\n\n随之而来的海啸在瞬间摧毁了沿海城镇、港口和交通网络，数十万人被迫栖身避难所。日本社会正面临着战后以来最严峻的危机。\n\n东日本大地震已成为一个历史性时刻，全球都在关注这个经济大国将如何实现复兴。"
 JAP_news.02.a: "一场可怕的悲剧……"
 Japan.201103111.t: "重建完成声明"
 Japan.201103111.d: "自那场大灾难过去已有多年，瓦砾已被清除，城市再次充满了人民的活力。受灾民众的生活逐渐稳定，工业和基础设施得以恢复。今天，政府正式宣布“重建完成”，为漫长的艰难岁月画上了句号。\n\n尽管这场悲剧留下了深刻的伤痕，但它也铸就了坚韧与自豪，为更光明的未来奠定了基石。"
 Japan.201103111.a: "我们自逆境中复苏！"
 Japan.201103112.t: "基础设施修复进展"
 Japan.201103112.d: "灾害中损毁的部分基础设施现已得到修复。交通运输和物流正逐步恢复，为日常生活带来了微小却意义深远的变化。虽然全面复苏尚需时日，但这无疑是向前迈出的坚实一步。"
 Japan.201103112.a: "向前迈进一步。"
 Japan.201103113.t: "基础设施完全修复"
 Japan.201103113.d: "东北地区因地震而遭受重创的基础设施，终于达到了预定的修复目标。交通网络和物流功能现已全面恢复运行，为当地社会和经济注入了新的活力。重建工作取得了重大进展。"
 Japan.201103113.a: "重要的里程碑。"
 Japan.201103114.t: "基础设施修复进展"
 Japan.201103114.d: "灾害中损毁的部分基础设施现已得到修复。交通运输和物流正逐步恢复，为日常生活带来了微小却意义深远的变化。虽然全面复苏尚需时日，但这无疑是向前迈出的坚实一步。"
 Japan.201103114.a: "向前迈进一步。"
 Japan.201103115.t: "基础设施完全修复"
 Japan.201103115.d: "关东地区因地震而遭受重创的基础设施，终于达到了预定的修复目标。交通网络和物流功能现已全面恢复运行，为当地社会和经济注入了新的活力。重建工作取得了重大进展。"
 Japan.201103115.a: "重要的里程碑。"
 Japan.201103116.t: "电信恢复"
 Japan.201103116.d: "受灾地区的电信网络终于部分恢复。日常生活和商业通信得到改善，为当地经济和社会带来了新的希望。"
 Japan.201103116.a: "继续推进重建。"
 Japan.201103117.t: "电信全面恢复"
 Japan.201103117.d: "因地震而遭受重创的东北地区通信基础设施，终于达到了预定的修复目标。随着日常生活和产业基础的稳固，复兴之路迎来了一个重要的里程碑。"
 Japan.201103117.a: "又在重建之路上迈进一步。"
 Japan.201103118.t: "电信全面恢复"
 Japan.201103118.d: "因地震而遭受重创的关东地区通信基础设施，终于达到了预定的修复目标。随着日常生活和产业基础的稳固，复兴之路迎来了一个重要的里程碑。"
 Japan.201103118.a: "又在重建之路上迈进一步。"
 Japan.201103119.t: "地方工业恢复"
 Japan.201103119.d: "受灾地区的工厂和企业已恢复运营。尽管全面复苏仍任重道远，但就业和经济活动的回归带来了切实的进步感。"
 Japan.201103119.a: "进一步推进工业复苏"
 Japan.2011031110.t: "工业基础已完全恢复"
 Japan.2011031110.d: "东北地区的工业基地在地震中遭受重创后，终于达到了预期的恢复水平。随着就业和生产能力的恢复，重建之路已迈出重要一步。"
 Japan.2011031110.a: "下一阶段恢复进程"
 Japan.2011031111.t: "地方工业恢复"
 Japan.2011031111.d: "受灾地区的工厂和企业已恢复运营。尽管全面复苏仍任重道远，但就业和经济活动的回归带来了切实的进步感。"
 Japan.2011031111.a: "进一步推进工业复苏"
 Japan.2011031112.t: "工业基础已完全恢复"
 Japan.2011031112.d: "关东地区的工业基地在地震中遭受重创后，终于达到了预期的恢复水平。随着就业和生产能力的恢复，重建之路已迈出重要一步。"
 Japan.2011031112.a: "下一阶段恢复进程"
 Japan.2011031150.t: "福岛第一核电站事故"
 Japan.2011031150.d: "日本遭遇了史无前例的地震和海啸袭击，正当全国上下紧急应对之际，又一个糟糕的消息传来。海啸袭击了福岛县的福岛第一核电站，导致应急发电机、电池和燃料箱发生故障，整个核电站陷入全面停电。\n更糟糕的是，反应堆建筑内产生并积聚了大量氢气，导致1号、3号和4号机组发生氢气爆炸。由于担心受损点可能发生放射性泄漏，公众陷入了恐慌。"
 Japan.2011031150.a: "我们必须立即行动！"
 JAP_news.03.t: "福岛第一核电站事故"
 JAP_news.03.d: "日本福岛第一核电站在地震和海啸后发生严重事故。尽管地震后反应堆已紧急停堆，但海啸导致应急发电机及其他关键设备损毁，造成全厂断电。冷却系统无法持续运行，多个机组发生堆芯熔毁。\n氢气积聚引发反应堆厂房爆炸，放射性物质极可能已通过破损点泄漏至外部环境。日本政府正全力组织应对。"
 JAP_news.03.a: "这局面真是……"
 Japan.2011031151.t: "日本核政策面临抉择"
 Japan.2011031151.d: "核事故已过去一个月，日本政府如今被迫做出抉择。福岛第一核电站事故从根本上动摇了公众对核安全的信心。舆论出现分歧，商界担忧电力供应受影响，民众则对放射性物质泄漏的可能性感到焦虑。\n\n日本现在必须明确表态：是继续依赖核能，还是选择另一条道路。"
 Japan.2011031151.a: "关掉，关掉，一定要关掉！"
 Japan.2011031151.b: "我们必须实行严格的监管制度。"
 Japan.2011031151.c: "按既定方针办！"
 Japan_Demographic.003.t: "低生育率问题调查报告：生育率下降在加剧"
 Japan_Demographic.003.d: "政府一直在推进旨在支持生育率的措施，但目前看来这些措施尚未产生足够的效果。育儿与就业难以兼顾、对未来感到不安等因素相互交织，导致生育趋势的改善依然迟缓。\n\n照此发展，人口结构的扭曲将进一步加深，在确保劳动力、维持社会保障等诸多领域留下长期负担。低生育率对策正被要求审视并调整为更有效的形式。"
 Japan_Demographic.003.a: "情况比预想的更严重……"
 Japan_Demographic.004.t: "低生育率问题调查报告：低生育率对策陷入困境"
 Japan_Demographic.004.d: "尽管政府一直在推进育儿支持和工作环境的改善，但生育趋势尚未出现明显好转。在某些领域，如制度应用范围的扩大和支持结构的完善方面已取得进展，但不稳定的就业状况和家庭经济负担等问题依然存在，整体形势仍处于停滞状态。\n\n现有措施尚不足以遏制少子化进程，但情况也并未进一步恶化。未来需要继续实施现有政策，并对其效果进行验证。"
 Japan_Demographic.004.a: "继续推进对策。"
 Japan_Demographic.005.t: "低生育率问题调查报告：低生育率对策取得成效"
 Japan_Demographic.005.d: "政府推行的育儿支持政策、工作环境改善以及减轻家庭负担的措施，正逐步显现成效。尽管生育率本身并未出现显著回升，但随着育儿家庭对支持政策的广泛利用以及工作与家庭平衡环境的改善，少子化进程在一定程度上开始得到遏制。\n\n尽管对未来的担忧等问题依然存在，但整体形势正呈现缓慢好转。未来，持续推行这些措施并提升制度实效性，仍将是至关重要的任务。"
 Japan_Demographic.005.a: "我们必须确保这些改进的迹象落到实处。"
 Japan_Demographic.006.t: "低生育率问题调查报告：低生育率趋势得到扭转"
 Japan_Demographic.006.d: "持续推行的育儿支持、工作环境改善以及减轻家庭经济负担的措施相结合，如今在生育趋势上已显现出明确的改善迹象。\n由于这一趋势经多年数据证实，并非暂时波动，表明迄今为止累积的政策正在稳步取得成效。\n\n围绕低生育率的危机感已大幅消退，长期恶化的趋势也得到遏制。可以说，政府在应对低生育率问题上已取得显著成果！"
 Japan_Demographic.006.a: "我们终于止跌回稳！"
 JAP_territorial.01.t: "开启北方领土谈判"
 JAP_territorial.01.d: "关于北方领土的争端，自世界大战结束以来一直是[JAP.GetName]与[SOV.GetName]之间悬而未决的问题。如今，我国已到了正式要求与[SOV.GetName]进行谈判以和平解决此事的关键时刻。这不仅是外交程序，更是维护我国主权与历史正当性的重要一步。"
 JAP_territorial.01.oA: "开始吧！"
 JAP_territorial.02.t: "[JAP.GetName]要求就北方领土问题进行谈判"
 JAP_territorial.02.d: "[JAP.GetAdjective]政府已正式提出开启北方领土谈判的请求。这一议题已被搁置数十年，而我们的决定将同时影响国际地位与国内政局。妥协究竟意味着国家利益的损失，还是国际信任的收获？此刻已到抉择之时。"
 JAP_territorial.02.oA: "将领土割让给[JAP.GetName]"
 JAP_territorial.02.oB: "拒绝请求。此事没有商量的余地。"
 JAP_territorial.03.t: "北方领土归还协定"
 JAP_territorial.03.d: "长久以来的北方领土问题终于得到解决。经过与[SOV.GetName]的谈判，双方已就争议领土归还达成协议。这标志着战后[JAP.GetAdjective]外交的重大胜利，也是其历史上的一项里程碑式成就。"
 JAP_territorial.03.oA: "历史性的协议！"
 JAP_territorial.04.t: "北方领土谈判破裂"
 JAP_territorial.04.d: "[SOV.GetAdjective]政府已正式拒绝了我们关于归还北方领土的谈判提议。尽管我们做出了外交努力，但问题仍未得到解决。我们现在必须专注于建立更大的信任并扩大我们的影响力，为未来的新一轮谈判做好准备。"
 JAP_territorial.04.oA: "这次来得太早了……"
 JAP_territorial.05.t: "与[CHI.GetName]就尖阁诸岛进行谈判"
 JAP_territorial.05.d: "[JAP.GetName]目前实际控制着尖阁诸岛，但[CHI.GetName]仍坚持其主权主张。鉴于过往的外交努力，我国是时候与[CHI.GetAdjective]政府正式展开谈判，以寻求和平解决方案。"
 JAP_territorial.05.oA: "开始吧！"
 JAP_territorial.06.t: "[JAP.GetName]提出领土谈判"
 JAP_territorial.06.d: "[JAP.GetAdjective]政府要求我们撤回对钓鱼岛（日称尖阁诸岛）的领土主张。他们主张和平解决与地区稳定，并正通过外交压力和国际支持推进谈判。接受这一提议无疑将在国内外引发支持与反对两方面的反响。"
 JAP_territorial.06.oA: "撤回领土主张，优先维护地区稳定。"
 JAP_territorial.06.oB: "维护主权，捍卫国家统一。"
 JAP_territorial.07.t: "[CHI.GetName]撤回尖阁诸岛主权主张！"
 JAP_territorial.07.d: "[CHI.GetName]已正式撤回对尖阁诸岛的领土主张。东海地区长期存在的紧张局势因此得到显著缓解，此举被国内外誉为重大的外交胜利。这标志着迈向地区稳定与互信建设的重要第一步。"
 JAP_territorial.07.oA: "历史性的突破。"
 JAP_territorial.08.t: "[CHI.GetName]坚持其主张"
 JAP_territorial.08.d: "[CHI.GetName]已宣布将继续坚持对尖阁诸岛的主权主张。谈判以失败告终，凸显出加强关系建设和提升国际影响力的必要性。尽管对话渠道依然存在，但局势依然严峻。"
 JAP_territorial.08.oA: "也许还为时过早……"
 JAP_territorial.09.t: "与[TAI.GetName]就尖阁诸岛进行谈判"
 JAP_territorial.09.d: "[TAI.GetName]长期以来基于历史和地理依据主张对尖阁诸岛拥有主权，而[JAP.GetName]则坚持其有效控制的合法性。为和平解决这一长期争议，我们将向[TAI.GetName]提出正式外交提案。"
 JAP_territorial.09.oA: "开始吧！"
 JAP_territorial.10.t: "[JAP.GetName]提出领土谈判"
 JAP_territorial.10.d: "[JAP.GetAdjective]政府要求我们放弃对钓鱼岛的主权主张。考虑到两岸关系的复杂性及更广泛的国际背景，是否接受这一要求需要审慎斟酌。"
 JAP_territorial.10.oA: "撤回领土主张，优先维护地区稳定。"
 JAP_territorial.10.oB: "我们必须继续维护我们的主权。"
 JAP_territorial.11.t: "[TAI.GetName]撤回尖阁诸岛主权主张！"
 JAP_territorial.11.d: "[TAI.GetAdjective]当局已正式撤回对尖阁诸岛的领土主张。随着东海长期争议问题之一得到解决，[JAP.GetName]与[TAI.GetName]关系正步入一个稳定的新时代，为未来深化合作带来希望。"
 JAP_territorial.11.oA: "历史性的协议。"
 JAP_territorial.12.t: "[TAI.GetName]拒绝撤回主张"
 JAP_territorial.12.d: "[TAI.GetName]已宣布将坚持其对尖阁诸岛的领土主张。谈判以失败告终，这表明未来解决该问题需要更强的外交影响力和更牢固的相互信任。"
 JAP_territorial.12.oA: "也许还为时过早……"
 JAP_territorial.13.t: "与[KOR.GetName]就竹岛进行谈判"
 JAP_territorial.13.d: "为了结束[JAP.GetName]与[KOR.GetName]之间长期存在的竹岛领土争端，我国政府已提议与[KOR.GetName]进行和平谈判。此举并非单方面强加主张，而是旨在构建两国面向未来的关系。"
 JAP_territorial.13.oA: "开始吧！"
 JAP_territorial.14.t: "[JAP.GetName]提议就独岛问题进行谈判"
 JAP_territorial.14.d: "[JAP.GetAdjective]政府已就独岛主权问题与我们展开谈判。尽管考虑到国内民意和历史背景，这是一个极其艰难的决定，但它也是可能塑造[JAP.GetName]与[KOR.GetName]未来关系的关键外交抉择。"
 JAP_territorial.14.oA: "优先改善与[JAP.GetName]的关系并同意移交。"
 JAP_territorial.14.oB: "我们绝不能放弃我们的国土。"
 JAP_territorial.15.t: "[KOR.GetName]同意移交竹岛！"
 JAP_territorial.15.d: "作为改善[JAP.GetName]与[KOR.GetName]关系努力的一部分，[KOR.GetAdjective]政府已同意归还竹岛。这标志着长达数十年的对抗告一段落，开启了两国互信的新篇章。这是和平外交努力结出硕果的时刻。"
 JAP_territorial.15.oA: "历史性的成就。"
 JAP_territorial.16.t: "[KOR.GetName]拒绝竹岛谈判"
 JAP_territorial.16.d: "[KOR.GetAdjective]政府拒绝了我们将竹岛归还的请求。领土争端的解决依然困难重重，若没有更强的外交影响力与相互信任，此事将难以了结。"
 JAP_territorial.16.oA: "眼下，我们必须继续对话。"
 JAP_renegotiation_territory: "一年后可以重新谈判！"
 JAP_historical.20010426.t: "森喜朗辞职，小泉纯一郎出任首相"
 JAP_historical.20010426.oA: "改革，刻不容缓！"
 JAP_historical.20060926.t: "延续还是继任？"
 JAP_historical.20060926.oA: "小泉纯一郎"
 JAP_historical.20060926.oB: "安倍晋三"
 JAP_historical.20070926.t: "延续还是革新？"
 JAP_historical.20070926.oA: "安倍晋三"
 JAP_historical.20070926.oB: "福田康夫"
 JAP_historical.20080924.t: "悄然过渡还是大胆转变？"
 JAP_historical.20080924.oA: "福田康夫"
 JAP_historical.20080924.oB: "麻生太郎"
 Japan.01.t: "接触传统主义势力"
 Japan.01.d: "随着围绕森首相言论的争议持续发酵，主张应重新评估皇室作为日本国家秩序核心地位的各团体与评论家正加紧活动。他们已向政府提出建议，称若当局能更明确展现捍卫传统与民族特性的意愿，他们愿通过塑造舆论和基层运动提供支持。\n\n然而，与此类势力建立更紧密联系，可能模糊建制派保守主义与激进君主主义之间的界限，或将招致对内阁的新一轮批评。我们是否该接受这项提议，还是保持距离？"
 Japan.01.a: "保持距离。"
 Japan.01.b: "将其用作政治筹码。"
 mdmosjap_japan.121006001.t: "2000年鸟取地震"
 mdmosjap_japan.121006001.d: "日本坐落于漂浮在环太平洋火山带上的火山群岛之上。这意味着日本及其人民必须不断经历大规模地震。这一状况在过去千年未曾改变，未来千年亦将如此。\n\n2000年10月6日下午1时30分，一场震级7.3、烈度6+的地震袭击了岛根县西部。这场地震对许多道路和房屋造成严重破坏，震动甚至波及大阪、福冈等遥远地区。尤其值得注意的是，这是神户自1995年阪神淡路大地震以来首次遭遇强震。"
 mdmosjap_japan.disaster_help: "现在就帮助他们！"
 mdmosjap_japan.disaster_leave: "别管他们。他们会自己恢复的。"
 MDMOSJAP_add_debt_disaster1_TT: "§Y再§!投入§R1B美元§!§Y用于灾后恢复。§!\n"
 MDMOSJAP_add_debt_disaster4_TT: "§Y再§!投入§R4B美元§!§Y用于灾后恢复。§!\n"
 mdmosjap_japan.130210001.t: "爱媛丸号事故"
 mdmosjap_japan.130210001.d: "2001年2月9日，爱媛县立宇和岛水产高中的实习船“爱媛丸”被[USA.GetName]潜艇“格林维尔”号撞沉。船上搭载的35名日本师生中有9人不幸遇难。\n\n当两国政府官员正全力收集这起悲剧事故的详细信息时，首相[Root.GetLeader]却在度假打高尔夫。\n\n他们当然应该立即放弃休假返回东京，对吧？"
 mdmosjap_japan.130210001.oA: "现在立刻返回东京！"
 mdmosjap_japan.130210001.oB: "等等！再来一杆……"
 JAP_koizumi_appear_TT: "森喜朗或许还能享受他的高尔夫球局，但他的政治影响力很可能会大幅削弱。党可能很快就要开始物色§Y新的领导人§!了。"
 mdmosjap_japan.130324001.t: "2001年芸予地震"
 mdmosjap_japan.130324001.d: "2001年3月24日下午3时27分，一场6.7级、烈度6度的地震袭击了广岛县西部。造成2人死亡、288人受伤。距离震中最近的吴市受灾最为严重。另一方面，由于许多地方政府在1995年阪神淡路大地震及去年岛根地震后采取了防灾措施，其他地区受灾程度相对较轻。主要灾情包括供水管道破裂和山体表层滑坡。"
 mdmosjap_japan.9130901001.t: "歌舞伎町大楼火灾"
 mdmosjap_japan.9130901001.d: "2001年9月1日凌晨，位于东京都新宿区歌舞伎町的\"明星56大厦\"发生火灾，因一氧化碳中毒导致44名正在麻将馆和脱衣舞俱乐部的顾客遇难。据消防部门报告，火灾起初规模较小，但因一名发现火情的工作人员打开房门引发回燃现象导致火势爆发。报告补充说明，火灾报警器因被天花板遮挡或因故障被切断，导致错过了早期灭火时机。另有报告指出，大楼工作人员未引导顾客疏散。与此同时，警视厅与消防部门联合调查发现，一处燃气管道存在非自然破损。虽然火灾原因尚未明确是意外还是纵火，但可以确定的是，防火意识的缺失加剧了灾难的严重性。"
 mdmosjap_japan.9130901001.oA: "希望再不会有比这更严重的建筑火灾了。"
 mdmosjap_japan.131201001.t: "敬宫爱子内亲王殿下诞生"
 mdmosjap_japan.131201001.d: "2001年12月1日，皇太子德仁与太子妃雅子的女儿在皇宫医院诞生。这位新千年首位诞生的内亲王被命名为\"爱子\"，其名源自中国儒家典籍《孟子》。爱子内亲王同时是当今天皇明仁的孙女。这是自1965年秋筱宫文仁亲王诞生以来时隔多年的皇室喜事，举国上下几乎都在欢庆。随后包括政要与各界名流在内的两万民众齐聚皇宫前高呼\"万岁\"。然而亦有人担忧这种情况可能导致现存皇室血脉断绝——太子妃雅子已属高龄产妇，生育二胎风险极高。若爱子内亲王成年后成为\"末代女系天皇\"，将因德仁与文仁两位亲王年龄差距悬殊而引发继承危机。但这显然违背《皇室典范》中\"皇位仅限父系继承\"的规定。最终，为确立女系天皇继承权，全民展开了修订《皇室典范》的讨论。"
 mdmosjap_japan.131201001.oA: "板载！"
 mdmosjap_japan.150526001.t: "2003年宫城县近海地震"
 mdmosjap_japan.150526001.d: "2003年5月26日下午6时24分，一场7.1级、烈度6弱的地震发生在宫城县与岩手县交界近海区域并造成冲击。东北地区大面积遭受严重破坏，如新干线高架桥损毁及山体滑坡，但无人死亡。此次海啸极为轻微，仅如涟漪波动。尽管已有这些报告，从北海道到关东地区的许多民众仍感受到了震动。"
 mdmosjap_japan.150726001.t: "2003年宫城连续地震"
 mdmosjap_japan.150726001.d: "2003年7月26日——从凌晨0点至傍晚，宫城县北部在一天内竟连续遭遇多达四次地震！最强一次发生于上午7点13分，震级达6.4级，烈度6+；最弱一次也有5.1级，烈度5-。这些地震不仅造成数百栋房屋损毁，更波及航空自卫队松岛基地。这无疑是令人极度不安的一天，所幸最终无人遇难。"
 mdmosjap_japan.150926001.t: "2003年北海道地震"
 mdmosjap_japan.150926001.d: "2003年9月26日凌晨4点50分，北海道南部近海发生里氏8.0级、震度6弱的地震。最初仅有少数城镇感受到强烈震感，但人们很快意识到这场灾难的真正恐怖之处。地震导致沿海填海区发生土壤液化，并引发储油罐火灾。更严重的是，一场巨大海啸袭击了日本东部太平洋沿岸，已造成两人死亡。"
 JAP_historical.20030926.t: "自由党与民主党合并：自由党加入民主党"
 JAP_historical.20030926.d: "整合非自民党势力的行动正在加速。经过多轮磋商，民主党与自由党已同意将非自民党阵营的主要政治载体统一为单一组织。\n\n自由党将解散并以吸收合并方式并入民主党。此举将增强非自民党阵营在国会的存在感，但随着各党派在政策方向和领导权上的角力，也可能引发新的矛盾焦点。"
 JAP_historical.20030926.a: "非自民党势力重组开始了。"
 mdmosjap_japan.161023001.t: "2004年新潟县中越地震"
 mdmosjap_japan.161023001.d: "2004年10月23日下午5时56分，新潟县发生里氏6.8级、震度7级的地震。这是自1995年阪神大地震修订震度标准以来，首次观测到震度7级的地震。山古志村所有道路因山体滑坡损毁，村民被困村中。上越新干线一列行驶中的列车因地震脱轨，所幸无人死亡。但此次地震最终仍导致68人遇难。"
 mdmosjap_japan.170320001.t: "2005年福冈地震"
 mdmosjap_japan.170320001.d: "2005年3月20日上午10时53分，福冈市近海发生矩震级7.0、震度6弱的地震。九州北部地区地震记录较少，此次是自1922年以来最强震。福冈市玄界岛约700名居民已撤离，十人决定留守负责灾情通报与巡逻。福冈市中心区多数窗户震碎，玻璃碎片坠落人行道致两名行人受伤。地震波及范围除对马岛外，朝鲜半岛与中国部分地区亦有震感。此次地震造成一人死亡。"
 mdmosjap_japan.170425001.t: "福知山线脱轨事故"
 mdmosjap_japan.170425001.d: "2005年4月25日上午9时18分，西日本旅客铁道福知山线（又称JR宝冢线）一列快速列车在兵库县尼崎市一处急弯脱轨，撞入附近公寓楼一层。\n该列车共七节车厢，但由于首节车厢完全嵌入建筑，初期报道误称仅有六节。调查显示，列车以约116公里/小时的速度进入限速70公里/小时的弯道，超速产生的离心力很可能导致脱轨。\n司机在事故中身亡，但后方车厢乘务员的证词表明，工作人员可能因试图弥补约90秒的延误而超速行驶。后续报道揭露该公司对轻微操作失误实施严厉内部惩戒措施，包括再教育课程、手抄公司规章等矫正手段，这些制度可追溯至中曾根内阁时期日本国有铁道民营化改革。\n所幸对向驶来的特急列车因轨道受阻紧急停车，避免了二次碰撞。但由于事故发生在早高峰时段，列车十分拥挤，最终造成107人死亡、562人受伤，成为战后日本最严重的铁路事故。部分医学专家指出，多名乘客并非在撞击中当场死亡，而是因长时间受压导致挤压综合征而丧生。"
 mdmosjap_japan.180906001.t: "悠仁亲王殿下诞生"
 mdmosjap_japan.180906001.d: "2006年9月6日，文仁亲王与王妃纪子的儿子在港区南麻布的私人医院诞生。作为新千年首位诞生的皇室亲王，他被命名为\"悠仁\"——\"悠\"取\"悠然自得\"之意，\"仁\"则沿袭平安时代以来的皇室命名传统。此次剖腹产手术在私立医院而非皇宫内进行，这两点均创下皇室历史先例。这位合法男性继承人的诞生不仅确保了皇位传承，也为皇室注入了新生力量。随着小皇子的降生，关于修改《皇室典范》的争议声浪已逐渐平息。"
 mdmosjap_japan.180906001.oA: "板载！"
 JAP_historical.20070307.t: "神秘开销"
 JAP_historical.20070307.d: "2007年3月，在参议院预算委员会会议上，农林水产大臣松冈利胜的政治资金团体\"松冈利胜新世纪政经论坛\"被曝出，其政治资金报告书中记载了从2001年至2005年五年间约2880万日元的公用事业费用。\n\n尤其引发质疑的是，该团体的\"主要办公室\"设在众议院议员会馆内，而会馆的水电及空调费用本由政府承担。\n松冈大臣解释称这些费用包含\"净水器\"和\"电暖器\"开支，但未能就申报金额作出合理解释。在后续国会质询中，他更以\"制度上无需进一步说明\"为由拒绝详细解释。\n\n在野党强烈批评此事可能涉及\"虚假申报\"和\"制度滥用\"，民众对政府整体问责机制的质疑也随之升温。"
 JAP_historical.20070307.oA: "要求部长做出全面的公开解释"
 JAP_historical.20070307.oB: "在调查结束前保护他"
 JAP_historical.20070528.t: "不堪重负"
 JAP_historical.20070528.d: "农林水产大臣松冈利胜在东京赤坂的议员宿舍内上吊身亡。警方随后确认其为自杀。\n\n数月来，松冈大臣因其政治资金收支报告中的高额水电费问题，在国会、媒体和舆论中面临严格审查。\n\n这一消息在公众中引发震动，也引发了更深层次的质疑：\"难道只有他一人该为此负责吗？\"以及\"政府的应对真的足够吗？\""
 JAP_historical.20070528.oA: "真是场悲剧啊……"
 JAP_historical.20070801.t: "连串的丑闻：责任的重担"
 JAP_historical.20070801.d: "继农林水产大臣松冈利胜去世后，赤城德彦被任命为其继任者。然而仅仅两个月后，赤城就因政治资金报告中的多项问题而被迫辞职，这些问题包括其办公室开支、捐款处理以及其政治团体\"德友会\"收据的双重申报。\n\n在如此短的时间内，连续两任农业大臣卷入丑闻，引发了关于政府在任命内阁成员时的责任感、透明度和可靠性的严重质疑。农林水产大臣一职已被视为\"被诅咒的职位\"，政府现在面临压力，必须采取果断行动以恢复信任并稳定其领导地位。"
 JAP_historical.20070801.oA: "为什么总是这样……我们必须重新赢得人民的信任。"
 JAP_historical.20070704.t: "致命失策"
 JAP_historical.20070704.d: "在一次公开演讲中，防卫大臣久间章生发表争议性言论，暗示广岛与长崎原子弹爆炸\"不可避免\"。\n此番言论被广泛解读为对核爆行为的变相认可，引发原子弹爆炸幸存者团体及社会各界的强烈反弹。来自执政党与在野党议员、地方政府的批评声浪持续高涨，首相安倍晋三下达正式训诫令。\n言论发酵后，受灾城市的地方官员与市民团体发起静坐抗议，使争议升级为全面政治危机。久间章生最终辞去防卫大臣职务，由小池百合子接任其职。\n\n这场始于\"某大臣失言\"的风波，最终演变为对政府执政能力与国际公信力的严峻考验。"
 JAP_historical.20070704.oA: "作为政府，我们必须表达诚挚而深切的遗憾。"
 mdmosjap_japan.190216001.t: "“失去的养老金”"
 mdmosjap_japan.190216001.oA: "一场灾难！"
 mdmosjap_japan.190325001.t: "2007年能登半岛地震"
 mdmosjap_japan.190325001.d: "2007年3月25日上午9时41分，一场强烈的6.9级地震袭击北陆地区。日本气象厅测定石川县轮岛市震度达6强，这是自1922年有地震观测记录以来该地区遭遇的最强地震。震源位于尚未发现断层的地带，震动范围从北海道延伸至高知县，并引发20厘米（7.87英寸）海啸。地震导致1人被倒塌的石灯笼砸中身亡，356人受伤，超过3万栋建筑与房屋受损。"
 mdmosjap_japan.190716001.t: "2007年新潟县中越近海地震"
 mdmosjap_japan.190716001.d: "2007年7月16日上午10时13分，新潟县再次发生6.8级地震。日本气象厅测得多个城镇震度达6级以上，而在柏崎刈羽核电站，非官方测算震度达到7级。地震引发的海啸在柏崎市记录到1米（3.28英尺）浪高。此次地震直接及间接导致15人死亡，2346人受伤，超过34000栋建筑受损，其中1331栋房屋完全损毁。先前提及的柏崎刈羽核电站发生火灾，由于初期灭火阶段信息沟通失误，灭火延迟两小时，导致放射性物质泄漏，所幸未超出环境可忽略水平。距离能登半岛地震仅4个月、距2004年新潟中越地震仅3年，该地区再度遭遇强震。"
 mdmosjap_japan.200614001.t: "2008年岩手·宫城内陆地震"
 mdmosjap_japan.200614001.d: "2008年6月14日上午8点43分，一场强烈的7.2级地震发生在岩手县地下。日本气象厅测定宫城县栗原市与岩手县奥州市的震度达到6强。尽管这是一次内陆地震，但从北海道至关东地区均记录到震度3以上的晃动。此次地震造成罕见现象：建筑物损毁较少，但引发大量山体滑坡，最终导致17人死亡、70人重伤、356人轻伤，另有6人下落不明。据报道还出现了桥梁坍塌和文化财产受损等情况。"
 mdmosjap_japan.210811001.t: "2009年骏河湾地震"
 mdmosjap_japan.210811001.d: "2009年8月11日凌晨5点07分，骏河湾发生6.5级强震，造成1人死亡、319人受伤。地震引发40厘米（约1.31英尺）海啸。日本气象厅测定静冈县多地震度达6弱，8678栋房屋及多处历史建筑受损，但未有房屋完全倒塌。包含静冈县的东海地区是未来东海-东南海大地震及海啸的关键预估受灾带，当地居民通过疏散演习、家具固定及房屋加固等措施进行防灾准备，这使得本次地震伤亡与损失程度相对较低。尽管如此，工厂、茶园及东名高速公路仍报告遭受破坏。"
 JAP_historical.20090808.t: "众人之党成立"
 JAP_historical.20090808.d: "随着政权更迭的期待高涨，人们对现有政党决策迟缓及行政僵化的不满情绪依然强烈。在此氛围下，渡边喜美等人将\"改革\"置于首位，呼吁集结不依赖现有框架的新政治力量。\n\n由此，\"众人之党\"宣告成立。这场倡导行政改革与放宽管制的运动，在拓宽选民选择的同时，也将进一步加速日本政界的重组与博弈。"
 JAP_historical.20090808.a: "在改革的旗帜下，新的力量蠢蠢欲动。"
 JAP_historical.20120928.t: "日本维新会的成立"
 JAP_historical.20120928.d: "随着对现有政党的不信任和对政治停滞的不满情绪蔓延，以在大阪地区不断扩大影响力的地域政党——大阪维新会为基础的改革派运动，开始向全国政坛进军。这股通过在地方政治中主张重新审视行政体制和治理改革而增强存在感的势力，将重组为全国性政治力量，并作为既存政党的替代选项而备受瞩目。\n\n日本维新会的成立，不仅意味着一个新政党的诞生，更将成为加速在野党重组与\"第三极\"势力形成的重要事件。"
 JAP_historical.20120928.a: "新兴改革势力进入国家政治舞台。"
 JAP_historical.20141128.t: "众人之党解散"
 JAP_historical.20141128.d: "众人之党作为反对现有主要政党的\"第三势力\"而建立，但随着党内管理和选举应对方向上的意见分歧逐渐加深，维持内部团结变得越来越困难。\n\n最终，该党决定解散，其所属议员各自走上了不同的道路。这股曾以改革为旗帜集结的力量的消散，再次凸显了反对派重组的多变性，并可能对未来政治版图产生不小的影响。"
 JAP_historical.20141128.a: "第三势力一极走向落幕。"
 JAP_historical.20170925.t: "反对派重组：希望之党与立宪民主党决裂"
 JAP_historical.20170925.d: "非自民党势力正进入一个重大的重组阶段。在民众对现有政党不满和政治停滞感的背景下，新崛起的希望党作为改革导向的新载体迅速吸引了关注。对于部分老牌非自民党阵营而言，合并与合作似乎是重建实力的契机，但与此同时，政策方向和合并条件上的矛盾也逐渐浮现。\n源于前民主党的势力并未形成统一阵营：部分与希望党合并或合作，另一些则组建了立宪民主党并采取独立路线。重组进程持续推进，但分裂态势也同步显现，非自民党势力的格局正在经历剧烈重塑。"
 JAP_historical.20170925.a: "非自民党阵营分裂为希望之党与立宪民主党。"
 JAP_historical.20170925_TT: "§Y民主党将被立宪民主党取代！§!"
 JAP_historical.20180507.t: "反对派重组：人民民主党成立"
 JAP_historical.20180507.d: "在野势力经过希望之党与立宪民主党的分裂重组后，持续进行着进一步洗牌。一部分原民进党阵营与一部分希望党阵营，在存在意见分歧的情况下，仍寻求以新的中道势力实现集结，希望党作为独立框架的分量逐渐流失。\n假以时日，国民民主党应运而生。这也标志着与立宪民主党不同的、主张中道路线的新政治载体的诞生，在野党的结构还将持续变化。"
 JAP_historical.20180507.a: "洗牌继续，党无常型。"
 JAP_historical.20180507_TT: "§Y希望之党将被国民民主党取代！§!"
 JAP_historical.20190401.t: "令和新选组的成立"
 JAP_historical.20190401.d: "在现有政党信任危机持续发酵、民生不安日益加剧的背景下，山本太郎等人着手组建新的政治势力。该运动强调不依赖大型组织的草根支持，主张将现行政治体制未能充分吸纳的民意带入国家政治舞台，其定位可视为以民生诉求为核心的政治力量，聚焦育儿家庭扶持、社会保障体系扩充及消费税等负担调整议题。\n\n令和新选组的成立不仅拓宽了在野阵营的政治光谱，也成为再次凸显日本政界重组流动性的标志性事件。"
 JAP_historical.20190401.a: "新兴草根力量进入国家政治舞台。"
 JAP_historical.20220710.t: "参政党崛起"
 JAP_historical.20220710.d: "随着对现有政党的不信任感日益加剧、政治参与距离感不断扩大的讨论升温，通过草根活动和信息传播扩大支持基础的新兴政治势力——参政党，已开始在全国政治舞台上崭露头角。凭借地方组织建设和自身鲜明的政治主张，该党正日益成为主要政党未能完全吸纳的社会群体的代表载体，持续引发关注。\n\n参政党强调与既有政党的距离感，以重视党员及支持者的参与度与传播力为特色，逐步发展壮大。该党将教育、粮食、社会制度、主权意识等议题置于政治议程前沿的立场，不仅持续吸引民众支持，更可能成为撼动现有政党格局与议题结构的潜在变量。\n\n这股新兴力量的崛起是既有政党不可忽视的变局，其发展或将影响未来在野势力与保守阵营的重组进程，乃至国家政治议程的设定方向。"
 JAP_historical.20220710.a: "新兴力量崭露头角。"
