 remove_usaid_desc: "이제 우리는 미국에 맞서 단호히 맞서고 그들의 원조를 거부해야 할 때입니다. 우리는 그들의 원조가 필요하지 않으며 앞으로도 결코 필요하지 않을 것입니다. 우리는 국가로서, 그리고 국민으로서 서방 열강의 간섭에 맞서 단호히 맞설 것입니다."
 GEN_remove_saudi_aid_desc: "사우디아라비아가 우리나라의 모스크에 자금을 지원하는 것은 터무니없이 불필요하며, 따라서 우리 위대한 나라에서 그들의 존재를 없애야 할 때입니다."
