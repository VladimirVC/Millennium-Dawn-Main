 active_defence_system_gen3: "Helicopter APS Laser Hard-Kill"
 active_defence_system_gen3_desc: "Um sistema de defesa de energia dirigida capaz de incapacitar fisicamente os projécteis. Dispara um laser de alta energia para destruir ou desviar mísseis antes do impacto. Representa a mais recente geração de proteção ativa para aeronaves de asa rotativa."
 EQ_MOD_CAT_helicopter_railgun_nose_gun_category_TITLE: "Heavy Nose Guns"
 helicopter_module_drone_control_gen_1: "Drone Control Suite"
 helicopter_module_drone_control_gen_1_desc: "Um pacote dedicado de controlo de drones e gestão de missões que transfere as tarefas de reconhecimento e ataque para sistemas não tripulados. Isto reduz a necessidade de mão-de-obra e melhora a eficácia operacional global através de um maior conhecimento do terreno e de um envolvimento coordenado, mas aumenta significativamente o custo de produção e a procura de recursos devido à eletrónica avançada, aos sensores e às ligações de dados."
 helicopter_railgun_nose_gun_gen1: "Railgun Nose Gun I"
 helicopter_railgun_nose_gun_gen1_desc: "Railgun nose guns use electromagnetic acceleration to fire high-velocity rounds, providing excellent armor piercing and hard-target lethality in direct engagements.\n\n§GDesigner Hint: Railgun Nose Guns greatly improve armor piercing, but they are very expensive. Use them when you need reliable penetration against hardened targets§!"
 helicopter_railgun_nose_gun_gen2: "Railgun Nose Gun II"
