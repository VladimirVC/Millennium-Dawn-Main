 IND_islamic_resist_info: "苏拉威西岛是我们最大的岛屿之一，岛上居住着许多不同的民族。然而，大多数穆斯林正在呼吁政府忽视，并对我们的大部分军队和经济进行了强烈抵抗。这种抵抗使我们的士兵和安全部队的处境非常艰难。"
