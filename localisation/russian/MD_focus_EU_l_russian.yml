 system_of_eu_values_tt: "Система европейских ценностей:\nЦенность ЕС:\nнарушение — уровень нарушения\n\nВерховенство закона:\nПарализующая коррупция — 5\nСковывающая коррупция — 4\nРаспространённая коррупция — 3\nНеконтролируемая коррупция — 2\nСистемная коррупция — 1\n\nУважение человеческого достоинства и свободы:\nВедёт наступательную войну с государством-членом ЕС — 10\nКоммунистическое правительство — 2\nРеакционное правительство — 2\nКоммунисты в коалиции — 1\nРеакционеры в коалиции — 1\n\nДемократия:\nОтсутствие выборов — 5\nДиктатура — 5\nКоммунистическая диктатура — 5\nФашистская диктатура — 5\nГосударство-марионетка — 4\nНеоимпериализм — 1\n\nПрава женщин и меньшинств:\nЗапрещена служба для женщин — 1\nИзбирательный порог 10% — 1\n\nКлауза отсутствия финансовой помощи:\nДефолт по долгам — 1\nВыдана финансовая помощь — 1"
