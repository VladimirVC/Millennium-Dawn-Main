l_spanish:
 abkhazia_focus: "Árbol de enfoque de Abjasia"
 ABK_Corruption_economic: "Abjasia en el Nuevo Milenio"
 ABK_Corruption_economic_desc: "Our country is not meeting the new millennium in the best condition. Corruption is eating away at our country, the infrastructure was destroyed after the war and has not been restored."
 ABK_jd_abk_russia: "Restaurar Vínculos de Transporte con Rusia"
 ABK_jd_abk_russia_desc: "Necesitamos restablecer las rutas de transporte hacia Rusia, ya que es nuestro único aliado y socio en este momento."
 ABK_tourism1: "Desarrollo del Turismo"
 ABK_tourism1_desc: "It is time to start the development of tourism in our country; perhaps the funds received from tourists will help our economy to hold out."
 ABK_associated_state: "Estado Asociado de la CEI"
 ABK_associated_state_desc: "Russia is ready to help us become part of the CIS in the form of an associated state."
 ABK_internet_akvafon: "Primer Acceso a Internet"
 ABK_internet_akvafon_desc: "The Internet is actively developing all over the world; it is time for us to develop it in the republic."
 ABK_promotion_of_independence: "Promoción de la Independencia"
 ABK_promotion_of_independence_desc: "We will promote the independence of our republic through all media. Our country can exist independently."
 ABK_promotion_of_russia: "Propaganda de Amistad con Rusia"
 ABK_promotion_of_russia_desc: "Russia is our friend, brother, and ally. We will actively broadcast this view through all our media."
 ABK_training_in_russia: "Entrenamiento de Soldados en Rusia"
 ABK_training_in_russia_desc: "We will send our soldiers to Russia for training to gain advanced combat experience."
 ABK_russia_invest_industry: "Rusia está Invirtiendo en Nuestra Industria"
 ABK_russia_invest_industry_desc: "We are ready to conclude an agreement on investing Russian funds in our industry."
 ABK_visa_free_russia: "Régimen sin Visa con Rusia"
 ABK_visa_free_russia_desc: "We have signed an agreement that cancels the visa regime between our countries. We hope this will help us improve our economic situation."
 ABK_tourism2: "Continuar el Desarrollo del Turismo"
 ABK_tourism2_desc: "We need to attract more tourists to the country, so we will increase our investments in the tourism sector."
 ABK_decrease_cencorship: "Flexibilizar la Censura"
 ABK_decrease_cencorship_desc: "We will abandon the strict censorship that existed before."
 ABK_abkhazian_passports: "Pasaportes Abjasios"
 ABK_abkhazian_passports_desc: "We are ready to introduce the passport of a citizen of Abkhazia."
 ABK_rearms_russia_us: "Rusia está Lista para Rearmarnos"
 ABK_rearms_russia_us_desc: "Russia is ready to rearm our forces with modern equipment."
 ABK_energy_help: "Comenzar a Resolver los Problemas de Energía"
 ABK_energy_help_desc: "Our country has been suffering from energy problems for a long time. It is time to start solving this problem."
 ABK_crypto: "Legalización de las Criptomonedas"
 ABK_crypto_desc: "Our country must move forward with the times. Cryptocurrencies are gaining momentum, and we need to benefit financially from this."
 ABK_president_illness: "Enfermedad del Presidente"
 ABK_president_illness_desc: "Our President is very ill and cannot fulfill the duties of the head of state. It is time to change the government."
 ABK_sgb: "State Security Service (SGB)"
 ABK_sgb_desc: "Necesitamos fortalecer nuestro Servicio de Seguridad del Estado."
 ABK_internet_a_mobail: "Segundo Operador"
 ABK_internet_a_mobail_desc: "A-Mobile will become the second telecom operator in our republic."
 ABK_jd_abk_russia_arms: "Tropas Ferroviarias de Rusia"
 ABK_jd_abk_russia_arms_desc: "Russia is ready to allocate a unit of its railway troops to restore our infrastructure."
 ABK_research_net: "Desarrollo de Redes de Internet"
 ABK_research_net_desc: "It is necessary to further develop our Internet network."
 ABK_soo_friend: "Amistad con Osetia del Sur"
 ABK_soo_friend_desc: "We will continue to improve our relations with our colleagues from South Ossetia."
 ABK_artshakh_friend: "Amistad con Artsaj"
 ABK_artshakh_friend_desc: "We will continue to improve our relations with our colleagues from Artsakh."
 ABK_new_era: "Nueva Era"
 ABK_new_era_desc: "Our republic is entering a new era. Perhaps, with a new president, we will finally be able to become an economically strong nation."
 ABK_increase_medicine: "Desarrollo de la Medicina"
 ABK_increase_medicine_desc: "It is necessary to invest in the healthcare of our country. Our population is declining and we must reverse this trend."
 ABK_against_corruption: "Lanzamiento de una Campaña contra la Corrupción"
 ABK_against_corruption_desc: "We intend to firmly and decisively eradicate corruption."
 ABK_increase_education: "Invertir en Educación"
 ABK_increase_education_desc: "The quality of education for our youth is declining. We need to invest in improving it."
 ABK_ros_neft: "Cooperación con Rosneft"
 ABK_ros_neft_desc: "Rosneft is ready to help with the discovery of oil reserves on the territory of our republic."
 ABK_rus_hydro: "RusHydro"
 ABK_rus_hydro_desc: "We are ready to approve RusHydro projects on our territory."
 ABK_mvd_sgb: "Unificar el SGB y el Ministerio del Interior"
 ABK_mvd_sgb_desc: "The time has come for a comprehensive reform of our law enforcement agencies."
 ABK_let_russians_buy: "Permitir a los Rusos Comprar Bienes Raíces"
 ABK_let_russians_buy_desc: "We will legally allow Russian citizens to purchase real estate in our country, thereby increasing its investment attractiveness."
 ABK_jd_abk_russia_help: "Ayuda de las Tropas Ferroviarias de Rusia"
 ABK_jd_abk_russia_help_desc: "The railway troops of Russia are ready to remain on the territory of our republic and temporarily help us with the restoration."
 ABK_our_place: "Nuestro Lugar en Este Mundo"
 ABK_our_place_desc: "Our people must find their way in this world, and we will definitely find it."
 ABK_cus_create: "Relaciones con Estados no reconocidos"
 ABK_cus_create_desc: "We will establish relations with other unrecognized states that share our situation."
 ABK_abkhazian_farmers: "Apoyo a los Agricultores Locales"
 ABK_abkhazian_farmers_desc: "No siempre podemos contar con ayuda externa, por lo que el apoyo a los agricultores locales debe ser nuestra prioridad."
 ABK_army: "Reforma de las Fuerzas Armadas"
 ABK_fleet: "La Marina de Abjasia"
 ABK_air: "Fuerza Aérea de Abjasia"
 ABK_modernize_army: "Modernización del Ejército"
 ABK_modernize_army_desc: "We cannot afford to weaken our army, because it is our guarantor of sovereignty."
 ABK_network_warfare_desc: "Network-centric warfare is a military doctrine that seeks to translate an information advantage into a competitive edge through the robust networking of geographically dispersed forces. Adopting this doctrine will modernize how our military shares and acts on battlefield intelligence."
 ABK_decentralized_warfare_desc: "Fourth-generation warfare (4GW) is conflict characterized by a blurring of the lines between war and politics, combatants and civilians. Embracing this decentralized form of warfare will allow our forces to operate with greater flexibility and initiative."
 ABK_president_illness2: "El comunismo está regresando"
 ABK_president_illness2_desc: "¡Nos alzaremos nuevamente bajo las banderas rojas!"
 ABK_china_help: "Inversiones Chinas"
 ABK_china_help_desc: "We were able to attract Chinese investments for the development of our country."
 ABK_china_help_jd: "Inversiones Chinas en Ferrocarriles"
 ABK_china_help_jd_desc: "Chinese companies are ready to restore railway tracks in our republic as part of their broader strategy."
 ABK_returm_marxism: "El Regreso del Marxismo a las Escuelas"
 ABK_returm_marxism_desc: "La antigua literatura soviética nos será útil nuevamente, ¡es hora de educar a las nuevas generaciones de comunistas!"
 ABK_increase_cencorship: "Fortalecer la censura"
 ABK_increase_cencorship_desc: "¡Es necesario silenciar a todos los enemigos del pueblo!"
 ABK_our_red_path: "El Camino Rojo es el Único Verdadero"
 ABK_our_red_path_desc: "The path of communism and socialism is the only true one for our country."
 ABK_one_party: "Un País, Un Partido"
 ABK_one_party_desc: "Our country does not need dozens of different parties. One is enough for us."
 ABK_china_invest_tech: "China está Invirtiendo en Nuestro Sector Tecnológico"
 ABK_china_invest_tech_desc: "Chinese companies are ready to finance our technical sector."
 ABK_defend_our_home: "Protegiendo nuestro hogar"
 ABK_defend_our_home_desc: "Our country is always under threat. Let us protect it."
 ABK_defend_our_home2: "Estructuras Defensivas"
 ABK_defend_our_home2_desc: "Es necesario no sólo inspirar a la gente, sino también estar físicamente preparados para defender nuestras fronteras."
 ABK_china_invest_mesta: "Continúa la Inversión China"
 ABK_china_invest_mesta_desc: "Chinese companies have seen a positive outcome from previous investments and are ready to continue in the same spirit."
 ABK_atheism: "Ateísmo en Cada Hogar"
 ABK_atheism_desc: "La propaganda de Marx guiará a nuestro pueblo de regreso al glorioso camino del ateísmo."
 ABK_mil_prop: "Propaganda Militar"
 ABK_mil_prop_desc: "Our country will not be able to defend itself if our people do not stand up as one and fight."
 ABK_empower_sgb: "Fortalecer el Financiamiento para los Servicios de Seguridad"
 ABK_empower_sgb_desc: "The state must be reliably protected from within."
 ABK_mobilise_masses: "Movilización Masiva"
 ABK_mobilise_masses_desc: "Get up, people of Abkhazia! Fight to the death!"
 ABK_nep: "El resurgimiento de una nueva política económica"
 ABK_nep_desc: "The old methods will be put to use once again."
 ABK_fiveka: "The First Five-Year Plan"
 ABK_fiveka_desc: "It is time for us to return to the practice of five-year plans."
 ABK_free_education: "Educación gratis"
 ABK_free_education_desc: "¡Todos los abjasios deberían recibir educación, independientemente de dónde se encuentren!"
 ABK_collectivism: "Colectivismo"
 ABK_collectivism_desc: "Let us restore unity to the Abkhazian people through collectivism."
 ABK_sup_work: "Apoyaremos a los trabajadores"
 ABK_sup_work_desc: "Every Abkhazian worker will be protected by the state."
 ABK_people_militia: "People's Militia"
 ABK_people_militia_desc: "¡Todos los ciudadanos deben proteger el país!"
 ABK_rel_quest: "La cuestión de la religión"
 ABK_rel_quest_desc: "¿Qué debemos hacer en un asunto tan delicado?"
 ABK_rel_commu: "Comunismo religioso"
 ABK_rel_commu_desc: "¿Están combinados?"
 ABK_farmer_collab: "Apoyo a los agricultores"
 ABK_farmer_collab_desc: "Agriculture is the lifeblood of our republic."
 ABK_president_illness3: "La Monarquía está Regresando"
 ABK_president_illness3_desc: "All these games of democracy have brought our country to ruin. Only a real monarchy will save us."
 ABK_ally_with_mafia: "Alianza con la Mafia"
 ABK_ally_with_mafia_desc: "The clans of Abkhazia have long divided the country and only adversely affected its development. Under the banner of the monarchy, we will force them to work for the good of our country."
 ABK_nati_ideas: "Ideas Nacionalistas"
 ABK_nati_ideas_desc: "Consolidation of our society is more necessary than ever. For added assurance, we will reinforce it with nationalist ideas."
 ABK_start_prepare_for_war: "Preparándonos para la Guerra"
 ABK_start_prepare_for_war_desc: "Our neighbor Georgia will not grant us peace, so we must be prepared for the upcoming war with all our might."
 ABK_abkhazian_kingdom: "El Legado del Reino de Abjasia"
 ABK_abkhazian_kingdom_desc: "The history textbook is the best propaganda tool. It is time to remind the people of our country that an Abkhazian kingdom once stood on these lands."
 ABK_miiltia: "Milicia Abjasia"
 ABK_miiltia_desc: "It is time to call the militia. The hour of war will come soon."
 ABK_militarism: "El Tiempo del Militarismo"
 ABK_militarism_desc: "Militarism is as necessary to us as air."
 ABK_militari_industry: "Industria Militar"
 ABK_militari_industry_desc: "Necesitamos muchas armas."
 ABK_finish_opposition: "Acabar con la Oposición"
 ABK_finish_opposition_desc: "The opposition has been hindering our country's development for a long time. Now that we have abandoned democracy, it is time to eliminate all opponents."
 ABK_church_help: "Asistencia de la Iglesia"
 ABK_church_help_desc: "Religion is an important part of our life. May it bless us in our righteous war."
 ABK_cis_2_military: "El CEI-2 como alianza militar"
 ABK_cis_2_military_desc: "Es hora de convertir CEI-2 en algo más."
 ABK_ally_with_south_ossetia: "Formar una Alianza Militar con Osetia del Sur"
 ABK_ally_with_south_ossetia_desc: "In the upcoming war, we must fight together."
 ABK_georgia_attack: "Iniciar una guerra con Georgia"
 ABK_georgia_attack_desc: "Es hora de una gran batalla."
 ABK_arm_friend: "Amistad con Armenia"
 ABK_arm_friend_desc: "Es hora de establecer lazos amistosos con Armenia."
 ABK_arm_battalion: "Revivir el Batallón Baghramyan"
 ABK_arm_battalion_desc: "It is time to revive the Baghramyan Battalion, a symbol of our friendship with Armenia in the fight against Georgia."
 ABK_abkhazvozvrashenstroy: "Establecer los cimientos de \"Abkhazvozvrashenstroy\""
 ABK_abkhazvozvrashenstroy_desc: "This fund will be a cornerstone of the new Abkhazian economy. With its help, we will be able to attract investments from all over the world."
 ABK_parli_dead: "Tratar con el Parlamento"
 ABK_parli_dead_desc: "It is time to eliminate this relic of democracy."
 ABK_dictatorship: "El monarca dictatorial"
 ABK_dictatorship_desc: "Only the firm hand of the monarch will save our country."
 ABK_sov_heast: "Amistad con Rusia"
 ABK_sov_heast_desc: "Estamos dispuestos a ser amigos de una Rusia así."
 ABK_invest_from_eng: "Inversiones de Inglaterra"
 ABK_invest_from_eng_desc: "We hope for investments from England, whose role in the tragic fate of the peoples of the Northwest Caucasus — including the Abkhaz — under Lord Palmerston gives it a particular responsibility toward us."
 ABK_invest_from_tur: "Inversiones de Turquía"
 ABK_invest_from_tur_desc: "We hope for investments from Turkey, which was one way or another involved in the tragedy of the mahajirism. Its involvement in the activities of the Foundation will mean participation in the future fate of the Abkhazian people."
 ABK_invest_from_chi: "Inversiones de China"
 ABK_invest_from_chi_desc: "It is necessary to attract investments from China. The PRC, as one of the great powers and a permanent member of the UN Security Council, is among the least susceptible to the opportunistic pressures of external factors."
 ABK_repatriation: "Programa de Repatriación"
 ABK_repatriation_desc: "We are ready to launch a program to return ethnic Abkhazians to their homeland."
 ABK_tourism_sector: "Inversiones de Capital en el Sector Turístico"
 ABK_tourism_sector_desc: "A stable inflow of funds will allow us to increase investments in the tourism sector."
 ABK_fight_with_narco: "Luchar contra la Adicción a las Drogas"
 ABK_fight_with_narco_desc: "It is necessary to fight the spread of drugs in our country."
 ABK_declare_kingdom: "Anunciar la Creación del Reino de Abjasia"
 ABK_declare_kingdom_desc: "It is time to restore the former greatness to our people."
 ABK_korea_workers: "Atraer trabajadores norcoreanos"
 ABK_korea_workers_desc: "We are ready to bring in workers from North Korea to help develop our country."
 ABK_internal_state: "Política doméstica"
 ABK_internal_state_desc: "It is also necessary to address the internal problems of the state."
 ABK_sports_development: "Desarrollo Deportivo"
 ABK_sports_development_desc: "¡En un cuerpo sano, una mente sana!"
 ABK_education_development: "Desarrollo de la educación"
 ABK_education_development_desc: "It is necessary that our children grow up literate so that we are able to pass our country on to them."
 ABK_wine: "Desarrollo de la industria del vino"
 ABK_wine_desc: "El desarrollo de la industria del vino es fundamental para nosotros."
 ABK_bul_bondex: "Amistad con Bulgaria"
 ABK_bul_bondex_desc: "Our ruling dynasty has long been present in Bulgaria and has managed to gain influence there. Friendship with this country will clearly benefit us."
 ABK_china_sosiski: "Compras de armas en China"
 ABK_china_sosiski_desc: "Estamos interesados en adquirir algunas muestras de armas."
 ABK_eng_sosiski: "Compras de armas en Inglaterra"
 ABK_eng_sosiski_desc: "Estamos interesados en adquirir algunas muestras de armas."
 ABK_rus_sosiski: "Compras de armas en Rusia"
 ABK_rus_sosiski_desc: "Estamos interesados en adquirir algunas muestras de armas."
 ABK_armenia_sosiski: "Compras de armas en Armenia"
 ABK_armenia_sosiski_desc: "Estamos interesados en adquirir algunas muestras de armas."
 ABK_bulgaria_sosiski: "Compras de armas en Bulgaria"
 ABK_bulgaria_sosiski_desc: "Estamos interesados en adquirir algunas muestras de armas."
 ABK_let_wagner_enter: "Contratar PMC Wagner"
 ABK_let_wagner_enter_desc: "We are interested in receiving services from the Wagner PMC to protect our country."
 ABK_unesko: "Invitar a la UNESCO"
 ABK_unesko_desc: "Abkhazia is a very ancient land with a great history and culture. We can now invite UNESCO to help us preserve this heritage."
 ABK_free_zone: "Zona Económica Libre"
 ABK_free_zone_desc: "We can now establish a fully functioning free economic zone, which will attract investment into our economy."
 ABK_we_are_country: "We Are a Recognized State"
 ABK_we_are_country_desc: "¡Finalmente logramos lo que hemos estado intentando conseguir durante muchos años! ¡Ahora nuestro estado es reconocido!"
 ABK_union_state: "Únase al Estado de la Unión"
 ABK_union_state_desc: "We are ready to join the Union State. This type of relationship with Russia suits us well."
 ABK_korea_trade: "Comercio con la RPDC"
 ABK_korea_trade_desc: "We are ready to establish trade relations with the DPRK."
 ABK_monarchy_eng: "Amistad con la Monarquía Inglesa"
 ABK_monarchy_eng_desc: "Our monarchs should establish friendly ties."
 ABK_friend_russia: "Amistad con la Rusia comunista"
 ABK_friend_russia_desc: "Only communists in power in Russia can be our partners and friends."
 ABK_friend_georgia: "Amistad con Georgia"
 ABK_friend_georgia_desc: "Los comunistas georgianos son nuestros amigos."
 ABK_friend_armenia: "Amistad con Armenia"
 ABK_friend_armenia_desc: "Los comunistas armenios son nuestros amigos."
 ABK_Russian_Way: "La forma rusa de modernizar el ejército"
 ABK_Russian_Way_desc: "We have chosen the path of modernization of our army according to the Russian system."
 ABK_China_Way: "La forma china de modernizar el ejército"
 ABK_China_Way_desc: "We have chosen the path of modernization of our army according to the Chinese system."
 ABK_CSTO_training: "Ejercicios con los países de la OTSC"
 ABK_CSTO_training_desc: "Exercises with the CSTO countries will help our soldiers learn new combat skills."
 ABK_Iska: "Coloque el \"Iskander\" ruso con nosotros"
 ABK_Iska_desc: "Rockets are never superfluous."
 ABK_rus_officer: "Escuela de oficiales rusos"
 ABK_rus_officer_desc: "Our officers will study at Russian military universities."
 ABK_china_rszo: "Comprar MLRS chino"
 ABK_china_rszo_desc: "El WM-80 es un sistema de lanzamiento múltiple de cohetes chino. Desarrollado por la fábrica n.º 123 en China. Se ofrece para exportación por la corporación comercial exterior china Norinco. El sistema se ha entregado a Bangladesh, Armenia, Jordania y Sudán."
 ABK_weapon: "Acuerdo de armas con China"
 ABK_weapon_desc: "China has agreed to supply us with several automatic rifles free of charge."
 ABK_China_training: "Entrenamiento con el ejército chino"
 ABK_China_training_desc: "Our fighters will train alongside Chinese soldiers."
 ABK_tur_sosiski: "Compra de equipos turcos"
 ABK_tur_sosiski_desc: "We are ready to purchase a small quantity of equipment from Turkey."
 ABK_union_social: "Cooperación con la Seguridad Social"
 ABK_union_social_desc: "We have concluded an agreement on social interaction between the members of the Union State, which will greatly facilitate the lives of our citizens."
 ABK_union_programm_care: "Cooperación en el campo de la atención médica"
 ABK_union_programm_desc: "The agreement on cooperation in the field of healthcare is an important step in the development of the Union State, as our citizens will now receive the same standard of medical care throughout."
 ABK_union_btr: "Cooperación técnica y de transporte"
 ABK_union_btr_desc: "Our countries have a strong production base, which we will leverage to increase the output of essential equipment."
 ABK_tourism1_idea: "Turismo en Abjasia"
 ABK_tourism2_idea: "Desarrollo del turismo en Abjasia"
 ABK_outdated_army_idea: "Ejército Obsoleto"
 ABK_outdated_army_idea_desc: "The Abkhaz army is very poorly armed and almost untrained."
 ABK_victory_war_idea: "Victoria en la Guerra de Independencia"
 ABK_victory_war_idea_desc: "Abkhazia has won the war for its independence against Georgia. The people of Abkhazia are proud of this and remember the glorious victory."
 ABK_mafia_idea: "Mafia abjasia"
 ABK_mafia_idea_desc: "Abkhazia is a deeply corrupt state riddled with clan influence. Power is divided between rival clans, which clearly hinder the country's development."
 ABK_mafia2_idea: "Debilitamiento de la mafia abjasia"
 ABK_mafia2_idea_desc: "Our actions began to bear fruit as the mafia's ranks started to decrease."
 ABK_mafia3_idea: "Desmantelamiento de la mafia abjasia"
 ABK_mafia3_idea_desc: "Abkhazian mafiosi are almost cornered; they are losing their connections in government and other authorities."
 ABK_mafia4_idea: "Destrucción de la mafia abjasia"
 ABK_mafia4_idea_desc: "Very few mafia leaders remain with enough influence to radically affect life in our country."
 ABK_energy_problems_idea: "Problemas energéticos"
 ABK_energy_problems_idea_desc: "The energy infrastructure of Abkhazia is in a terrible state. The War for Independence effectively destroyed it, and we must now restore it almost from scratch."
 ABK_energy_problems2_idea: "Pequeños problemas energéticos"
 ABK_energy_problems2_idea_desc: "Some progress has been made, but the energy infrastructure of Abkhazia still needs significant investment to fully recover from the damage of the War for Independence."
 ABK_narcos_idea: "Adicción a las drogas"
 ABK_narcos_idea_desc: "Drug addiction in Abkhazia is a serious problem — young people are increasingly turning to drugs. We have to fight this!"
 ABK_narcos2_idea: "Adicción a las drogas"
 ABK_narcos2_idea_desc: "Drug addiction in our country still affects young people, but not as severely as before."
 ABK_defense_of_abkhazia_idea: "Defensa de Abjasia"
 ABK_crypto_idea: "Minería legal de criptomonedas"
 ABK_russian_railway_help_idea: "Asistencia de las Tropas Ferroviarias Rusas"
 ABK_repatriation_idea: "Programa de repatriación"
 CIS_two_member_state_idea: "Miembro del CEI-2"
 CIS_two_member_state_idea_desc: "La Comunidad de Estados No Reconocidos (EE.UU.) o CEI-2 es una unión creada para la consulta, la ayuda mutua y la coordinación de acciones de cooperación de los estados no reconocidos en el territorio postsoviético."
 abkh.1.t: "Abjasia nos ofrece unirnos a la Commonwealth de Estados No Reconocidos"
 abkh.1.d: "La Comunidad de Estados No Reconocidos (EE.UU.) o CEI-2 es una unión creada para la consulta, la ayuda mutua y la coordinación de acciones de cooperación de los estados no reconocidos en el territorio postsoviético."
 abkh.1.a: "Nosotros estamos de acuerdo"
 abkh.1.b: "Rechazamos"
 abkh.2.t: "Abjasia ofrece una alianza militar al CEI-2"
 abkh.2.d: "Abjasia propone formar una alianza militar a partir de la CEI-2. ¿Estamos de acuerdo con esa asociación?"
 abkh.2.a: "Nosotros estamos de acuerdo"
 abkh.2.b: "Rechazamos"
 abkh.3.t: "International Brigade from Abkhazia - \"Pyatnashka\""
 abkh.3.d: "Abkhazian volunteers founded a brigade, which was subsequently joined by many willing people from across the CIS countries. Now they are fighting alongside us."
 abkh.3.a: "¡Hurra!"
 abkh.4.t: "International Brigade from Abkhazia - \"Pyatnashka\""
 abkh.4.d: "Abkhazian volunteers founded a brigade, which was subsequently joined by many willing people from across the CIS countries. Now they are fighting alongside us."
 abkh.4.a: "¡Hurra!"
 ABK_political_decisions: "Política abjasia"
 ABK_political_decisions_desc: "La política abjasia es algo muy complejo y a la vez sencillo. En ella, uno debe equilibrar el temperamento ardiente del pueblo y su deseo de ser independiente. ¿Es posible encontrar un equilibrio?"
 ABK_need_russian_money: "Solicitar un desembolso de Moscú"
 ABK_exersises_with_russia: "Realizar ejercicios con Rusia"
 ABK_fight_with_mafia: "Combatir a la mafia"
