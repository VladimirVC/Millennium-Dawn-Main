l_korean:
 RESOURCE_STORAGE_HEADER: "§Y저장소§!"
 OPEN_STORAGE_BUTTON: "§Y자원 저장소§! 인터페이스 열기"
 OPEN_STORAGE_BUTTON_TT: "§Y전략 자원 비축고§!에 현재 자원이 얼마나 보관되어 있는지 확인할 수 있는 §Y자원 저장소§! 메뉴를 엽니다.\n\n참고: §Y자원 저장소§!는 게임 엔진의 한계로 인해, 무역법이 §Y수출 중심 경제§! 또는 §Y세계화 무역 경제§!일 경우 필요한 생산 라인보다 수출로 더 많은 자원을 보내게 될 수 있습니다. 저장소에서 자원을 인출하기 시작해야 한다면 무역법을 §Y혼합 경제§! 이하로 변경하는 것이 권장됩니다.\n"
 WITHDRAWAL_STATUS: "인출 상태"
