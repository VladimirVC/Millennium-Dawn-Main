 ALLOW_ALL_PARTIES_TT: "§HОтказаться от однопартийной системы§!"
 ALLOW_ALL_PARTIES_TT_DELAYED: "Пришло время отменить наш полный запрет на другие партии.\n\n§YУсловие:§!\n[!allow_all_parties_button_click_enabled]\n§YЭффекты:§!\n[!allow_all_parties_button_click]"
 BAN_ALL_PARTIES_TT: "§HОбъявить однопартийное государство§!"
 BAN_ALL_PARTIES_TT_DELAYED: "Как единственная правящая партия, управляющая правительством, мы можем законодательно объявить все остальные политические партии незаконными.\n\nДа здравствует партия!\n\n§YУсловие:§!\n[!ban_all_parties_button_click_enabled]\n§YЭффекты:§!\n[!ban_all_parties_button_click]"
 set_partyall_banned_tt: "Запрещает все партии, кроме §Y[show_ruling_party]§!\n"
 set_partyall_allowed_tt: "Снимает запрет со всех партий в нашей стране\n"
 revolt_party_TT: "§HНачать революцию как [party_name_by_index] ([party_support_by_index])§!\n\n§YУсловие:§!\n[!revolt_button_click_enabled]\n§YЭффекты:§!\n[!revolt_button_click]"
 boost_party_TT: "§HУсилить [party_name_by_index] ([party_support_by_index])§!\nПытаясь ослабить влияние наших настоящих политических оппонентов, мы можем использовать нашу политическую машину для повышения популярности других партий.\n\n§YУсловие:§!\n[!boost_button_click_enabled]\n§YЭффекты:§!\n[!boost_button_click]"
 attack_party_TT: "§HАтаковать [party_name_by_index] ([party_support_by_index])§!\nМы можем использовать дезинформационные кампании и компромат, собранный нами на крупные партии вне правительства, чтобы нанести сильный удар по их популярности — тогда они не смогут бросить вызов нашей власти. Поскольку любое внимание лишь повысит популярность малым партиям, это сработает только с крупными партиями, преодолевшими избирательный порог в [?election_threshold|%0].\n\n§YУсловие:§!\n[!attack_button_click_enabled]\n§YЭффекты:§!\n[!attack_button_click]"
 ban_party_TT: "§HЗапретить [party_name_by_index] ([party_support_by_index])§!\nОбъявление политической партии или движения вне закона гарантирует, что они никогда не смогут получить власть через выборы, и облегчает преследование их членов.\n\n§YУсловие:§!\n[!ban_button_click_enabled]\n§YЭффекты:§!\n[!ban_button_click]"
 allow_party_TT: "§HЛегализовать [party_name_by_index] ([party_support_by_index])§!\nПришло время снять наш запрет и позволить их членам баллотироваться на государственные должности и действовать легально.\n\n§YУсловие:§!\n[!allow_button_click_enabled]\n§YЭффекты:§!\n[!allow_button_click]"
