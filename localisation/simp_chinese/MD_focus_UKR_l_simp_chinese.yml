 UKR_get_50_m113: "组装50辆MT-LB M113"
 UKR_get_50_buggies: "组装50辆通用载具"
 UKR_party_regions_start: "地区党"
 UKR_party_regions_start_desc: "亚努科维奇已经将国家权力掌握在自己手中，现在是各地区权力的时候了！"
 UKR_party_regions_inaguration: "亚努科维奇就职典礼"
 UKR_party_regions_inaguration_desc: "现在是新总统就职典礼的时候了。"
 UKR_party_regions_decrease: "减少管理人员"
 UKR_party_regions_decrease_desc: "我们将减少国家机关雇员人数。"
 UKR_party_regions_anti_corrupt: "国家反腐败委员会"
 UKR_party_regions_anti_corrupt_desc: "我们将成立一个新的部门 - 国家反腐败委员会，以打击我国的腐败官员。"
 UKR_party_regions_unifed_window: "统一窗口投资"
 UKR_party_regions_unifed_window_desc: "我们将为我国投资者推出新的规则，使他们更容易与我国当局进行互动。"
 UKR_party_regions_decrease_agro: "减少农业管制"
 UKR_party_regions_decrease_agro_desc: "农业产业将获得新的利益，从而我们希望提高其生产力。"
 UKR_party_regions_laizes: "自由放任"
 UKR_party_regions_laizes_desc: "我们将部分采纳自由主义原则之一来制定经济政策，并且不会干预经济进程。"
 UKR_party_regions_taxx: "改变税法"
 UKR_party_regions_taxx_desc: "我们将对税法做出我们认为必要的修改。我们的优惠将使地方税减少三倍！"
 UKR_party_regions_autocracy: "赋予专制权力"
 UKR_party_regions_autocracy_desc: "一个强有力的政府必须控制一切它能够控制的东西，否则就会重蹈我们统治之前的混乱和无序的覆辙。"
 UKR_party_regions_pressure_media: "对媒体施压"
 UKR_party_regions_pressure_media_desc: "媒体已经变得过于自由，有必要让他们冷静下来。"
 UKR_party_regions_stability_reform: "稳定与改革"
 UKR_party_regions_stability_reform_desc: "我们将组建一个忠诚的政治家联盟，我们称之为“稳定与改革”，该联盟将积极推广我们的项目和理念。"
 UKR_party_regions_stability_restricting_freedom_speech: "限制言论自由"
 UKR_party_regions_stability_restricting_freedom_speech_desc: "言论自由的界限在于它是否开始冒犯我们。"
 UKR_party_regions_stability_purge_opposition: "试图清除政治反对派"
 UKR_party_regions_stability_purge_opposition_desc: "反对派太任性，利用自由破坏权力机构，是时候解决这个问题了。"
 UKR_party_regions_lustration: "净化政府集团和安全机构"
 UKR_party_regions_lustration_desc: "长期以来，这些机构中对国家不忠诚和公开有害的人的清洗一直是必要的。"
 UKR_party_regions_agreement_opposition: "与反对派达成协议"
 UKR_party_regions_agreement_opposition_desc: "我们将尝试与反对派的某些部分建立关系，从而分化他们。"
 UKR_party_regions_appease_the_westermists: "安抚西方主义者"
 UKR_party_regions_appease_the_westermists_desc: "乌克兰西部长期以来一直是不满和不稳定的温床，我们会安抚他们，我会尽力满足他们的需求 - 承诺。"
 UKR_party_regions_request_russian: "请求俄罗斯投资"
 UKR_party_regions_request_russian_desc: "我们将请求俄罗斯的投资，这显然不会是多余的。"
 UKR_party_regions_personal_gain: "关注个人收益"
 UKR_party_regions_personal_gain_desc: "国家当然好，但更值得我们思考的是自己。"
 UKR_party_regions_titushki: "召集蒂图什基"
 UKR_party_regions_titushki_desc: "我们将使用一种抹黑反对派集会的新方法 - 蒂图什基。"
 UKR_party_regions_regional_council: "地区理事会"
 UKR_party_regions_regional_council_desc: "我们将设立一个新的机构，即地区理事会，以促进地区和州当局之间的互动。"
 UKR_party_regions_optimise_east_ukraine_gamble: "乌克兰东部赌局"
 UKR_party_regions_optimise_east_ukraine_gamble_desc: "乌克兰东部一直是我们的遗产，我们将积极争取他们的支持，因为事实上他们是我们的主要选民。"
 UKR_party_regions_optimise_prior_loyals: "优先考虑忠诚者"
 UKR_party_regions_optimise_prior_loyals_desc: "忠诚于我们的人更为重要，我们将积极提拔他们。"
 UKR_party_regions_western_oligarch: "接近西部寡头"
 UKR_party_regions_western_oligarch_desc: "乌克兰西部的寡头将是我们的首要任务，我们希望在西方和东方之间找到平衡，也许他们的寡头会帮助我们。"
 UKR_party_regions_meet_akhmetov: "与阿赫梅托夫会面"
 UKR_party_regions_meet_akhmetov_desc: "顿涅茨克寡头家族及其代表里纳特·阿赫梅托夫是我们用来维护权力的重要政治资源，值得听听他要讲什么。"
 UKR_party_regions_informational_act: "信息法案"
 UKR_party_regions_informational_act_desc: "新的法案或法律将向广大群众开放政治家的活动，这将减少政治家活动中的腐败成分。"
 UKR_party_regions_optimise_ministries: "优化部门"
 UKR_party_regions_optimise_ministries_desc: "政府机构过于庞大，是时候精简它们了。"
 UKR_party_regions_reform_constituion: "改革宪法"
 UKR_party_regions_reform_constituion_desc: "我们将积极推动宪法改革，我们的国家是时候走向全面变革了！"
 UKR_party_regions_compulsory: "义务兵役制的改变"
 UKR_party_regions_compulsory_desc: "我们将改变军队的服役制度，真正把它变成合同制。"
 UKR_party_regions_pension_reform: "养老金改革"
 UKR_party_regions_pension_reform_desc: "养老金改革酝酿已久，现在要作的就是实施。"
 UKR_party_regions_kozhara: "科扎拉是外交部领导人"
 UKR_party_regions_kozhara_desc: "我们将任命一位朋友和伙伴担任外交部长"
 UKR_party_regions_youth_region: "扩大青少年团队"
 UKR_party_regions_youth_region_desc: "我们党的青年翼将获得更多的权力和影响力，我们将向他们开放。"
 UKR_party_regions_berkut_reforms: "金雕部队改革"
 UKR_party_regions_berkut_reforms_desc: "作为警察机构，金雕部队需要改革，以便我们能够保护自己。"
 UKR_party_regions_berkut_extreme_training: "金雕部队极限训练"
 UKR_party_regions_berkut_extreme_training_desc: "金雕部队将更加积极地开展比赛和训练，以提高其技能。"
 UKR_dual_language: "双语国家"
 UKR_dual_language_desc: "俄语在乌克兰人生活中占有重要地位，否认这一点是愚蠢的。我们不会宣传在我国废除俄语的愚蠢政治思想。"
 UKR_cancel_decommunization: "反对去共产主义化"
 UKR_cancel_decommunization_desc: "我们不会允许与我们在苏联时期反对法西斯主义和纳粹主义的过去作斗争。"
 UKR_donbass_autonomy_pass: "顿巴斯特别自治"
 UKR_donbass_autonomy_pass_desc: "顿巴斯是我们国家的一个特殊地区，也许现在是时候开始讨论这个地区的特殊自治权了。"
 UKR_sng_integrate: "独联体一体化"
 UKR_sng_integrate_desc: "我们将在独联体国家合作框架内继续推进一体化进程。"
 UKR_europe_negotiat: "欧盟谈判"
 UKR_europe_negotiat_desc: "我们将与欧盟就长期以来一直列在我们政治议程上的一个问题展开谈判。这是与欧盟的一项合作。"
 UKR_russian_ukrainian_military_coop: "乌克兰-俄罗斯军事合作"
 UKR_russian_ukrainian_military_coop_desc: "我们将加强与俄罗斯武装部队的合作。"
 UKR_party_regions_european_chart: "欧洲区域语言宪章"
 UKR_party_regions_european_chart_desc: "我们将签署《欧洲区域语言宪章》，作为我们对少数民族民主态度的体现。"
 UKR_parti_regions_anti_corruption_commitie: "国家反腐败委员会"
 UKR_parti_regions_anti_corruption_commitie_desc: "新委员会的职责是打击各级腐败官员。"
 UKR_parti_regions_invest_open_window: "统一窗口投资"
 UKR_parti_regions_taxx: "税法改革"
 UKR_parti_regions_laizes: "自由放任"
 UKR_parti_regions_stability_reform: "稳定与改革"
 UKR_parti_regions_lustration: "净化"
 UKR_parti_regions_opposition_agree: "与反对派的合作"
 UKR_parti_regions_titushki: "蒂图什基"
 UKR_parti_regions_optimise_ministers: "精简部门"
 UKR_parti_regions_inform_act: "信息法案"
 UKR_parti_regions_pension_reform: "养老金改革"
 UKR_parti_regions_youth_regions: "青少年团队"
 UKR_parti_regions_autocracy: "亚努科维奇的独裁统治"
 UKR_parti_regions_autocracy_desc: "亚努科维奇的行为被广泛称为真正的独裁，但这对国家利益来说重要吗？"
 ukraine_regions.7.t: "在乌克兰的投资"
 ukraine_regions.7.d: "乌克兰总统要求我们到他的国家投资，我们应该同意他的建议吗？"
 ukraine_regions.7.a: "是"
 ukraine_regions.7.b: "不"
 ukraine_regions.8.t: "在乌克兰的投资"
 ukraine_regions.8.d: "俄罗斯同意对我国投资"
 ukraine_regions.8.a: "很好"
 ukraine_regions.9.t: "在乌克兰的投资"
 ukraine_regions.9.d: "俄罗斯拒绝在我国投资"
 ukraine_regions.9.a: "悲哀"
 ukraine_regions.10.t: "与独联体的合作"
 ukraine_regions.10.d: "近年来，我们没有积极地与独联体国家开展合作，一部分反对派民众可能也会对我们继续合作的决定感到愤怒，但我们必须决定是否应该这样做？"
 ukraine_regions.10.a: "当然"
 ukraine_regions.10.b: "不"
 ukraine_regions.11.t: "与欧盟的关联谈判"
 ukraine_regions.11.d: "现在是时候开始与欧盟的入盟谈判了，我们已经为开始这项谈判努力了很长时间，现在是时候最终决定是否要开始这项谈判了？"
 ukraine_regions.11.a: "当然"
 ukraine_regions.11.b: "不"
 ukraine_regions.12.t: "顿巴斯地位问题"
 ukraine_regions.12.d: "多年来，我们一直听到有人提议赋予顿巴斯特殊地位，从而启动缓慢的乌克兰联邦化进程。这是我们必须做出的严肃决定，因为我们意识到这是没有回头路的。"
 ukraine_regions.12.a: "我们将给予他们特殊地位"
 ukraine_regions.12.b: "保持原样"
