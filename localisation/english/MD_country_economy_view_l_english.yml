 # Economy
 ECONOMY_TITLE: "Overview"
 REFRESH_ECONOMYVIEW_TOOLTIP: "£click_left §YL Click§! to refresh the economy view."
 BALANCE_TITLE: "Balance"
 BALANCE_VALUE: "§Y[?treasury_rate|+3]§!"
 BALANCE_TOOLTIP: "Our weekly balance is $[?treasury_rate|+3] §Hbillion§!."
 BALANCE_TOOLTIP_DELAYED: "The balance is the net change to our treasury each week, equal to total income minus total expenses. A negative balance drains the treasury and forces weekly debt to be issued once it runs dry."
 TREASURY_TITLE: "Treasury"
 TREASURY_VALUE: "§Y[?treasury|3]§!"
 TREASURY_TOOLTIP: "We have $[?treasury] §Hbillion§! in the treasury.\nOur weekly balance is $[?treasury_rate|+3] §Hbillion§!."
 TREASURY_TOOLTIP_DELAYED: "Our treasury reflects the amount of money we have available to spend, and can be used for purchases and investments. If the treasury goes into the red, debt will automatically be issued weekly to keep it positive.\n\n£click_left §YL Click§! will open the §YEconomic Preview§! screen."
 DEBT_TITLE: "Debt"
 DEBT_VALUE: "§R[?debt|3]§!"
 INVESTMENTS_TITLE: "Investments"
 INVESTMENTS_VALUE: "§G[?int_investments|3]§!"
 STATS_TITLE: "Statistics"

 GDP_TOTAL: "GDP"
 GDP_TOTAL_DESC: "Our §YGross Domestic Product§! (GDP) is the value measure of all products and services produced in the country. Millennium Dawn uses GDP adjusted with PPP (Purchasing Power Parity) as this value takes local economic conditions into effect, making the country comparison more useful."
 NUM_GDP_TOTAL: "$$§Y[?ROOT.gdp_total|1]§!b"
 NUM_GDP_TOTAL_DESC: "Our §YGDP§! is currently $§Y[?ROOT.gdp_total|3]§! billion.\n\nRecent §YQuarterly GDP Growth Rate§!: [?last_quarter_gdp_growth_rate|%Y].\n\nHint: The higher your §YQuarterly GDP Growth Rate§! the more likely you are to get positive economic events."
 NUM_GDP_TOTAL_DELAYED_DESC: "Approximate Contribution of Industries by Percent:\n§PCivilian Factories§!: [?ROOT.civil_fac_percent|%]\n§OMilitary Factories§!: [?ROOT.military_fac_percent|%]\n§BNaval Dockyards§!: [?ROOT.dockyard_fac_percent|%]\n§COffice Parks§!: [?ROOT.office_fac_percent|%]\n§GNon-Commercialized Agriculture§!: [?ROOT.agriculture_percent|%]\n§YCommercialized Agriculture Districts§!: [?ROOT.agriculture_district_fac_percent|%]\n§YMicrochip Plants§!: [?ROOT.microchip_plant_percent|%]\n§YComposite Plants§!: [?ROOT.composite_plant_percent|%]\n§YSynthetic Refineries§!: [?ROOT.synthetic_refinery_percent|%]\n§GResource Extraction§!: [?ROOT.resources_percent|%]\n§YInfrastructure§!: [?ROOT.infrastructure_gdp_percent|%]\n§PHealthcare§!: [?ROOT.healthcare_gdp_percent|%]\n"
 GDP_PER_CAPITA: "GDP/C"
 GDP_PER_CAPITA_DESC: "This number represents our §YGDP per Capita§! or §YGDP/C§!. It represents the output of every person in the nation.\n\nRecent §YQuarterly GDP/C Growth Rate§!: [?last_quarter_gdpc_growth_rate|%Y].\n\nHint: The higher your §YQuarterly GDP/C Growth Rate§! the more likely you are to get positive economic events, and the higher §RInflation§! can potentially grow if left unchecked."
 GDP_PER_CAPITA_DELAYED_DESC: "Current impact of §YGDP per Capita§! on our nation:\nConstruction Speed: [?production_speed_buildings_factor_gdp_modifier|%+]\nMonthly Population: [?monthly_population_gdp_modifier|%+1]\nResearch Speed: [?research_speed_factor_gdp_modifier|%+]\nStability: [?stability_factor_gdp_modifier|%+]\nTotal Workforce: [?total_workforce_gdp_c_modifier_var|%+]\nFossil Powerplant Construction Speed: [?fossil_pp_construction_gdp_c_modifier_var|%+]\n"
 NUM_GDP_PER_CAPITA: "$$§Y[?ROOT.gdp_per_capita|3]§!k"
 NUM_GDP_PER_CAPITA_DESC: "Our §YGDP/C§! is currently $§Y[?ROOT.gdp_per_capita|3]§! thousand"
 PRODUCTIVITY: "Productivity"
 PRODUCTIVITY_DESC: "This number represents our nation's §YProductivity§!."
 NUM_PRODUCTIVITY_DELAYED_DESC: "Current Monthly Productivity Growth: [?productivity_growth_scaled|3+]\n\nEffect of Productivity:\n§YFactory Output:§! [?productivity_tax_effect_display|%+1]\n§YDockyard Output:§! [?productivity_tax_effect_display|%+1]\n§YConstruction Speed:§! [?productivity_tax_effect_display|%+1]\n§YCorporate Tax:§! [?productivity_tax_effect_display|%+1]\n§Y£construction_speed_texticon §YCommercialized Agriculture Districts§! Construction Speed:§! [?agriculture_district_output_var|%+1]"
 NUM_PRODUCTIVITY: "§Y[?ROOT.overall_productivity|3]§!"
 NUM_PRODUCTIVITY_DESC: "§YProductivity§! is the value that determines the output within our country. The value comes as an aggregate from each state's productivity divided by your nation's population. §YProductivity§! is a multiplier against all Gross Domestic Product (GDP) sources, corporate tax, and the output of every factory. If your §YProductivity§! is higher than 1000, you will see larger bonuses boosting your economic growth and the output of all your buildings. §YProductivity§! grows or falls each month passively, with that growth being impacted by your economic cycle, technologies, and national spirits and is further scaled based on the §YGlobal Average Productivity§!. Countries below the §YGlobal Average Productivity§! will see their §YProductivity§! grow more rapidly, while countries above the average will grow more slowly.\n\nThe §YGlobal Average Productivity§! is currently §Y[?global.average_world_productivity|3]§!\nOur §YProductivity§! is currently §Y[?ROOT.overall_productivity|3]§!\n"

 INFLATION: "Inflation"
 INFLATION_DESC: "This number represents our nation's §YInflation§!"
 NUM_INFLATION: "§Y[?ROOT.inflation_rate_var|%]§!"
 NUM_INFLATION_DESC: "§YInflation§! is the value that determines how much your nation's purchasing power is growing or decreasing in strength. The higher your inflation gets, the less purchasing power your people, and your government, have, as your money loses value. Inflation is calculated by the average of the last 4 quarters of §YQuarterly GDP/C Growth Rate§!, multiplied by your averaged §YTax Rate§!, and further adjusted by §YEconomic Cycles§!, §YPrinting Money§!, §YPolicy Rate§!, and other economic events.\n\nThe higher your average §YQuarterly GDP/C Growth Rate§! is, along with the larger your §YGDP/C§! is, the higher your inflation rate will be. Higher §YTax Rate§! will reduce inflation, while a lower rate will increase it. A Higher §YPolicy Rate§! will decrease inflation, but increase §RInterest on Debt§!, while a lower rate will do the opposite.\n\n§YEconomic Cycles§! above §YStable Growth§! will increase your §YInflation§!, simulating an increased demand for goods and spending money, while §YEconomic Cycles§! below §YStable Growth§! will decrease your §YInflation§!, simulating decreased spending money and a decreased demand for consumer goods.\n\n§YDeflation§! can occur if you end up with a negative §YInflation§! rate. §YDeflation§! can help reduce government expenses, but can also cause economic downturns, as people stop spending money as they wait for prices to fall further, potentially causing markets and businesses to §RFail§! if things deflate too much or too quickly."
 NUM_INFLATION_DELAYED_DESC: "§HLast 4 Quarters:§! [?ROOT.year_quarter_inflation_tracker^0|%] · [?ROOT.year_quarter_inflation_tracker^1|%] · [?ROOT.year_quarter_inflation_tracker^2|%] · [?ROOT.year_quarter_inflation_tracker^3|%]\n\nThe displayed rate is the §Yrolling four-quarter average§!, representing an averaged yearly inflation, which is the number used for all economic effects."

 # Taxes
 POPULATION_TAX_RATE: "Population Tax"
 POPULATION_TAX_RATE_TT: "Population Tax Rate includes all of the taxes imposed on the public. This can include but is not limited to income tax, VAT taxes, sales tax, and property taxes.\n\n§YModifiers from Population Taxes:§!\n£stability_texticon  Stability: [?stability_factor_from_population_tax|%+]"
 CORPORATE_TAX_RATE: "Corporate Tax"
 CORPORATE_TAX_RATE_TT: "Corporate Tax Rate includes all of the taxes imposed on corporations. The value consists of corporate income taxes, employer taxes, and more.\n\n§YModifiers from Corporate Taxes:§!\n£consumer_goods_texticon  Tax Cost: [?consumer_goods_from_corporate_tax|%Y]\n£receiving_investment_cost_modifier_texticon §YReceiving Foreign Investment§! Cost Modifier: [?receiving_investment_cost_form_corporate_tax|%-]\nMonthly Productivity Growth: [?productivity_growth_modifier_from_corporate_tax|+3]\n"
 CB_POLICY_RATE: "Policy Rate"
 CB_POLICY_RATE_TT: "The §YCentral Bank Policy Rate§! is the benchmark interest rate set by the central bank. It controls the cost of borrowing across the economy.\n\n§YRaising the rate§! tightens the money supply, suppressing inflation but increasing the cost of sovereign debt and slowing economic activity.\n§YLowering the rate§! stimulates borrowing and investment but allows inflation to rise more freely.\n\nEach adjustment costs §Y25§! £pol_power_icon and has a §Y60-day§! cooldown.\n\n§YCurrent Rate:§! [?cb_policy_rate]%\n§YQuarterly Inflation Suppression:§! [?cb_policy_rate|+0]% × 0.003 per quarter\n§YDebt Interest Premium:§! [?cb_policy_rate|+0]% × 0.5pp added to §YInterest Rate§!"

