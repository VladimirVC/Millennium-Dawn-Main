 HOL_Naval_Group_naval_equipment_organisation_desc: "La Direction des Constructions Navales (DCNS) est un partenaire majeur de l'industrie navale §Y[HOL.GetAdjectiveCap]§!, fournissant des navires de guerre et des technologies de sous-marins de premier ordre à la Marine royale néerlandaise. Avec des décennies d'expertise en ingénierie navale, Naval Group renforce la flotte §Y[HOL.GetAdjectiveCap]§!."
