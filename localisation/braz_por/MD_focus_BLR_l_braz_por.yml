 uniate_church: "Igreja Uniata"
 uniate_church_desc: "The Uniate Church is a union of Orthodox and Catholic traditions, accepting the primacy of Rome while preserving Eastern Orthodox rites. An early union was concluded at the Council of Florence in 1439 but soon dissolved. From the late 15th century, Polish feudal lords revived the idea, as much of the population of Poland and Lithuania remained Orthodox, and a church union offered a means of gradually drawing Ukrainians and Belarusians toward Catholicism. Some Orthodox clergy and nobles supported the union in the 16th century, seeking to gain rights equal to those of Catholics. In 1595, Bishops Hypatius Potei of Vladimir-Volyn and Kirill Terletsky of Lutsk appealed to the pope for union. At the Council of Brest in 1596, six bishops proclaimed the Union of Brest despite protest from most of the clergy and populace. The king endorsed the union and declared the Orthodox Church outlawed, transferring its property to the Uniate Church. In the 17th century, the Order of Basilians was established to advance the union alongside the Jesuits. Over time, the Uniate Church moved increasingly close to Catholic ceremony; vestments, temple design, and liturgical practice all shifted, and Orthodox holidays were abolished. These changes were codified at the Synod of Zamosc in 1720. In Transcarpathia, the union was proclaimed at the Uzhhorod Cathedral in 1649 and fully established by the late 18th century. Resistance to the union on behalf of religious and national freedoms in Ukraine and Belarus during the 16th and 17th centuries was largely led by Orthodox brotherhoods."
 BLR_church_reforms: "Church Reform"
 BLR_church_reforms_desc: "Our state should abandon the Orthodox religion, which is sponsored from Moscow. It is time to revive Uniatism on our land."
 BLR_separate_rel: "Religião é separada do Estado"
 BLR_state_rel: "Unidade do Estado e da Religião"
 BLR_church_separate: "Separação da Religião"
 BLR_church_separate_desc: "Religion should not interfere in state affairs and should serve only as a support for our society."
 BLR_church_state: "Religião do Estado"
 BLR_church_state_desc: "Religion must actively guide state affairs, otherwise we are doomed to spiritual decay."
 BLR_Increase_funding_Police: "Aumentar Financiamento da Polícia"
 BLR_Increase_funding_Police_desc: "Recent events have shown that it is necessary to increase the funding of the Ministry of Internal Affairs and its various departments."
 BLR_riot_finance: "Financiamento da Polícia Anti-Motim"
 BLR_riot_finance_desc: "Our riot police units should be equipped with the best gear available. We should not spare our funds here."
 BLR_MVD: "Ministério do Interior"
 BLR_MVD_desc: "Órgão de administração estatal bielorrusso, que lidera o sistema de órgãos de assuntos internos e tropas internas do Ministério do Interior, regulando e gerenciando, dentro de suas competências, a luta contra o crime, a proteção da ordem pública, a segurança pública e coordenando as atividades nesta área de outros órgãos de administração estatal republicanos."
 BLR_Internal_troops: "Tropas Internas"
 BLR_Internal_troops_desc: "State military organization of Belarus that protects the rights of citizens, the constitutional system, security and sovereignty of the Republic of Belarus from criminal encroachments."
 BLR_kgb_expand: "Comitê de Segurança Estatal"
 BLR_kgb_expand_desc: "State executive authority of Belarus and a special service designed to protect the independence and territorial integrity of the Republic of Belarus, the constitutional order and state sovereignty of the Belarusian state, as well as ensuring national security in the political, economic, military, scientific, technological, informational, social, demographic and environmental spheres, and conducting counterintelligence and foreign intelligence operations."
 BLR_new_equipment_omon: "Unidade Especial - Alpha"
 BLR_new_equipment_omon_desc: "Group \"A\" (\"Alpha\") under the State Security Committee of the Republic of Belarus is an anti-terrorist unit of the KGB of Belarus and one of the most secretive special forces in the country's law enforcement agencies. Alpha fighters are involved in operational and combat activities conducted by KGB units related to the detention of suspects in espionage, hostage-taking, drug trafficking, smuggling, illegal trafficking of weapons and radioactive substances, extortion, and illegal migration."
 BLR_Countering_Cybercrime: "Diretoria Principal de Combate ao Cibercrime"
 BLR_Countering_Cybercrime_desc: "Cybercrimes must also fall under our supervision."
 BLR_Increase_funding_Almaz: "Unidade Especial - ALMAZ"
 BLR_Increase_funding_Almaz_desc: "The Almaz Special Unit for Combating Terrorism is an anti-terrorist special unit of the Ministry of Internal Affairs of Belarus that performs a wide range of tasks to prevent and respond to terrorist acts. It reports directly to the Minister of Internal Affairs of the Republic of Belarus. According to media reports, the unit also takes part in the suppression of political opposition and is involved in the dispersal of mass protests."
 BLR_military_police_training: "Treinamento da Polícia Militar"
 BLR_military_police_training_desc: "We must be ready for protests and mass unrest in our country, as they can be instigated from abroad. Our police officers should be well trained to suppress such unrest."
 BLR_peoples_security: "O Controle Está em Todo Lugar"
 BLR_peoples_security_desc: "We must use the technical achievements of the 21st century to improve surveillance of the population — for the sake of their safety, of course."
 BLR_procurement_of_espionage_equipment: "Aquisição de Equipamentos de Espionagem"
 BLR_procurement_of_espionage_equipment_desc: "Instead of spending on expensive cameras, it is better to equip our valiant law enforcement with the appropriate equipment, allowing us to quickly track down anyone who displeases us."
 BLR_occupation_management_strategies: "Intimidate and Dominate"
 BLR_occupation_management_strategies_desc: "Before daring to overthrow the legitimate government, everyone will think three times, because everyone knows perfectly well that nothing good awaits those who fall into the hands of our special services."
 BLR_fin_snipes: "Sako TRG"
 BLR_fin_snipes_desc: "Sako TRG-22 rifles are used by snipers of the SOBR of the Internal Troops of the Ministry of Internal Affairs of the Republic of Belarus."
 BLR_ger_guns: "Metralhadoras Alemãs"
 BLR_ger_guns_desc: "We are ready to purchase a large number of German submachine guns for our special services."
