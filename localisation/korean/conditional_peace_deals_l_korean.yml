 CPD_country_action_ceasefire_TT: "§Y휴전§!은 현재의 전선을 새로운 국경으로 삼아 전쟁을 종결합니다. 이후 §Y720일§! 동안 정전 협정이 유지됩니다.\n\n클릭 시 협정에서 제거합니다."
 CPD_country_action_war_reparations_TT: "§Y전쟁 배상금§!은 패전국이 1년 동안 자국 GDP의 일부를 매주 승전국에 지급하도록 강제합니다.\n\n클릭 시 협정에서 제거합니다."
 CPD_country_action_forced_neutrality_TT: "§Y강제 중립화§!는 대상을 소속 세력에서 탈퇴시키고 5년 동안 다른 세력에 가입하는 것을 금지합니다.\n\n클릭 시 협정에서 제거합니다."
 CPD_country_action_regime_change_TT: "§Y정권 교체§!는 대상국의 정부에 우리의 집권당을 정착시킵니다. 지속적인 정치적 불안정이 예상됩니다.\n\n클릭 시 협정에서 제거합니다."
 CPD_country_action_military_basing_TT: "§Y군사 기지 이용권§!은 수령국에 상대방 영토를 자유롭게 통행하고 주둔할 수 있는 권리를 부여합니다.\n\n클릭 시 협정에서 제거합니다."
 CPD_country_action_full_puppet_TT: "§Y완전 괴뢰화§!는 대상국 전체를 종속국 상태로 격하시킵니다.\n\n클릭 시 협정에서 제거합니다."
