 ALG_sanction_trade_laws_cost_factor_tt: "将§H经济制裁§!的£trade_laws_cost_texticon §H贸易法案成本§!修改[?ALG_sanction_trade_laws_cost_factor_change|-%]（当前：[?ALG_sanction_trade_laws_cost_factor|-%]）"
 ALG_sanction_improve_relations_maintain_cost_factor_tt: "将§H经济制裁§!的£improve_relations_cost_texticon §Y改善关系成本§!修改[?ALG_sanction_improve_relations_maintain_cost_factor_change|-%]（当前：[?ALG_sanction_improve_relations_maintain_cost_factor|-%]）"
 ALG_sanction_productivity_growth_modifier_tt: "将§H经济制裁§!的£production_efficiency_texticon §Y工厂/工业生产力增长§!修改[?ALG_sanction_productivity_growth_modifier_change|-%]（当前：[?ALG_sanction_productivity_growth_modifier|-%]）"
 ALG_sanction_stability_factor_tt: "将§H经济制裁§!的£stability_texticon §Y国家稳定度§!修改[?ALG_sanction_stability_factor_change|-%]（当前：[?ALG_sanction_stability_factor|-%]）"
 ALG_joint_scientific_collaboration_idea: "联合科学合作"
 ALG_jcpoa_idea: "伊核协议"
 ALG_nspa_idea: "国家安全合作协议"
 ALG_algeria_behave_TT: "[USA.GetFlag]§H美国§!将有可能§G移除§!经济制裁"
 ALG_the_lion_roars_idea: "阿尔及利亚雄狮怒吼"
 nuclear_algeria.1.t: "潜在供应商？"
 nuclear_algeria.1.d: "在我们寻求获取核技术的过程中，必须承认我们目前的技术水平尚不足以制造出合格的武器或设施。因此，我们必须放眼世界，寻找愿意提供帮助的国家。根据我们掌握的情报，有一个特定国家或许能伸出援手。"
 nuclear_algeria.1.a: "接触中国势力"
 nuclear_algeria.2.t: "阿尔及利亚请求援助"
 nuclear_algeria.2.d: "阿尔及利亚的科学家和外交官最近与我们会面，请求我们对其核计划提供援助。表示只要能帮助他们发展核计划，愿意接受我们提出的任何条件。"
 nuclear_algeria.2.a: "好啊好啊"
 nuclear_algeria.2.b: "我们可不能分享机密"
 nuclear_algeria.3.t: "中国共享导弹技术"
 nuclear_algeria.3.d: "中国科学家最近在[ALG.capital.GetCapitalVictoryPointName]与我国科学家会面，并向我们提供了我国目前尚未掌握的先进洲际弹道导弹设计图纸。"
 nuclear_algeria.3.a: "太好了！"
 nuclear_algeria.4.t: "中国提供核技术"
 nuclear_algeria.4.d: "中国科学家最近在[ALG.capital.GetCapitalVictoryPointName]与我国科学家会面，并向我们提供了我们目前尚未掌握的先进反应堆蓝图。"
 nuclear_algeria.4.a: "太好了！"
 nuclear_algeria.5.t: "[FROM.GetName]拒绝提供援助！"
 nuclear_algeria.5.d: "我们在联系[FROM.GetName]寻求核计划援助时犯了一个重大误判，他们不仅拒绝了我们的请求，还威胁要将此事提交国际法庭，这可能会暴露我们的秘密。"
 nuclear_algeria.5.a: "错失良机。"
 nuclear_algeria.6.t: "阿尔及利亚欲购导弹"
 nuclear_algeria.6.d: "阿尔及利亚政府已请求我们向其出售一系列弹道导弹。他们声明将用这些导弹来保卫国家边境，不会将其用于任何形式的进攻性战争。"
 nuclear_algeria.6.a: "好的，完成销售"
 nuclear_algeria.6.b: "不行"
 nuclear_algeria.7.t: "中国出售其导弹"
 nuclear_algeria.7.d: "中国向我们出售了大约400枚弹道导弹。虽然其中一些可能已经过时，但它们仍然有效，这才是最重要的。"
 nuclear_algeria.7.a: "很好"
 nuclear_algeria.8.t: "中国拒绝出售导弹"
 nuclear_algeria.8.d: "中国政府拒绝了我们的导弹购买请求，理由是这些导弹需用于其自身的军事行动。"
 nuclear_algeria.8.a: "好啊好啊"
 nuclear_algeria.9.t: "成功窃取导弹"
 nuclear_algeria.9.d: "我方特工成功伪装成俄罗斯核运输部队，通过中亚地区将15枚洲际弹道导弹运抵马什哈德。"
 nuclear_algeria.9.a: "记住，不留任何后患"
 nuclear_algeria.10.t: "阿尔及利亚请求援助短程防空系统站点"
 nuclear_algeria.10.d: "阿尔及利亚政府请求我们协助其短程防空系统站点建设，以便在该国南部增建更多设施，以应对可能来自波斯湾地区的任何威胁。"
 nuclear_algeria.10.a: "好啊好啊"
 nuclear_algeria.10.b: "不行"
 nuclear_algeria.11.t: "俄罗斯同意建设短程防空导弹防御基地"
 nuclear_algeria.11.d: "俄罗斯政府已同意派遣数名工程师和建筑承包商前往该国南部建设短程防空导弹防御基地。"
 nuclear_algeria.11.a: "很好"
 nuclear_algeria.12.t: "俄罗斯拒绝提供短程防空导弹防御基地援助"
 nuclear_algeria.12.d: "俄罗斯政府拒绝了我们的请求，不愿派遣俄罗斯承包商和工程师在我国南部地区建设短程防空系统站点，理由是担心我们无法按时偿还费用。"
 nuclear_algeria.12.a: "为什么？"
 nuclear_algeria.13.t: "我们的条件"
 nuclear_algeria.13.d: "时机已到，我们的核计划已取得足够进展，可以开始与西方谈判，以最终获取其他国目前不具备的优势。然而，尽管进行这些谈判，我们依然完全有自由追求自己的雄心壮志。"
 nuclear_algeria.13.a: "协商金钱利益"
 nuclear_algeria.13.b: "协商工业利益"
 nuclear_algeria.13.c: "协商能源利益"
 nuclear_algeria.14.t: "阿尔及利亚披露其核计划"
 nuclear_algeria.14.d: "阿尔及利亚政府已拿出文件、照片和其他证据，证明他们目前具备制造核武器的能力，即便他们尚未拥有核武器。我国政府对此举感到十分困惑，因为国际社会一直猜测阿尔及利亚一直在试图制造核武器，而阿尔及利亚方面对此予以否认。然而，人们怀疑阿尔及利亚此举意在胁迫我国和国际社会给予他们原本不会给予的利益。无论如何，我们都必须解除对阿尔及利亚的制裁，至于解除制裁的条件是按我们自己的意愿还是按他们的意愿，仍需进一步商议。"
 nuclear_algeria.14.a: "好吧，他们想要什么？"
 nuclear_algeria.14.b: "我们将坚守立场，他们必须全面放弃核能力！"
 nuclear_algeria.15.t: "美国要求拆除所有核设施和武器"
 nuclear_algeria.15.d: "美国对我们提出的非常合理、合乎逻辑的谈判提议做出了威胁回应。他们要求我们拆除所有核武器技术，并遵守国际原子能机构的条款。然而，美国表示，如果我们决定与他们合作，他们就会解除制裁，但这并不是我们期望他们做出的反应。"
 nuclear_algeria.15.a: "好的，我们会遵守"
 nuclear_algeria.15.b: "就这种态度？我们将继续追求核武器！"
 nuclear_algeria.16.t: "阿尔及利亚遵守规定"
 nuclear_algeria.16.d: "阿尔及利亚政府已同意遵守我们在核武器问题上的条件。他们将有整整六个月的时间实现国家无核化，这包括改变其核武器理论，并销毁所有核武器库存（如有）。"
 nuclear_algeria.16.a: "很好"
 nuclear_algeria.17.t: "阿尔及利亚拒绝接受我们的条款"
 nuclear_algeria.17.d: "阿尔及利亚政府决定玩火，并拒绝了我们慷慨的提议。因此，我们将能够采取多种措施，从制裁到直接干预。"
 nuclear_algeria.17.a: "对其行业和关键人物的制裁"
 nuclear_algeria.17.b: "对他们的设施实施制裁和军事干预！"
 nuclear_algeria.17.c: "我们应该让他们被孤立"
 nuclear_algeria.18.t: "美国呼吁对阿尔及利亚进行干预"
 nuclear_algeria.18.d: "美国最近宣布阿尔及利亚越过了不应逾越的红线。这主要是因为阿尔及利亚的核计划被发现，以及其拒绝遵守美国的条件。我们被要求制裁阿尔及利亚政权，并协助向阿尔及利亚施压。"
 nuclear_algeria.18.a: "好的"
 nuclear_algeria.18.b: "这明显违反了国际法！"
 nuclear_algeria.19.t: "国际制裁"
 nuclear_algeria.19.d: "看来世界已经决定与我们作对，对我们的经济实施制裁，这将不可避免地使我们的经济陷入停滞。我们需要评估我们的政策。"
 nuclear_algeria.19.a: "我们对这个充满叛徒的世界还能期待什么呢？"
 nuclear_algeria.20.t: "阿尔及利亚核计划曝光"
 nuclear_algeria.20.d: "既然阿尔及利亚的核计划已被曝光，我们不得不采取行动。我们必须要求阿尔及利亚尽快放弃其核武器，以便解除我们即将对其实施的制裁。"
 nuclear_algeria.20.a: "制裁，制裁，制裁！"
 nuclear_algeria.21.t: "美国要求核裁军"
 nuclear_algeria.21.d: "在我们的核计划曝光后，美国宣布我们需要消除所有核武器并回到谈判桌前，以取消目前对我们政府的制裁。"
 nuclear_algeria.21.a: "拭目以待"
 nuclear_algeria.22.t: "阿尔及利亚提供廉价石油"
 nuclear_algeria.22.d: "阿尔及利亚以折扣价向我们出售石油。这是由于西方列强及其盟友对其实施了严厉的制裁。制裁严重打击了阿尔及利亚的经济，迫使其以更低的价格出售石油。"
 nuclear_algeria.22.a: "好的"
 nuclear_algeria.22.b: "不"
 nuclear_algeria.23.t: "中国购买我们的石油！"
 nuclear_algeria.23.d: "中国政府同意以折扣价购买我们的石油，以帮助我们的经济维持运转。"
 nuclear_algeria.23.a: "太好了"
 nuclear_algeria.24.t: "中国拒绝购买我们的石油"
 nuclear_algeria.24.d: "即使我们大幅降价，中国政府似乎也没有兴趣购买我们的石油。"
 nuclear_algeria.24.a: "好的"
 nuclear_algeria.25.t: "美国加大经济压力"
 nuclear_algeria.25.d: "美国已决定通过加大对我国人民的经济制裁来实现其帝国主义的野心。"
 nuclear_algeria.25.a: "我们会抵抗！"
 nuclear_algeria.26.t: "美国减轻经济压力"
 nuclear_algeria.26.d: "美国选择减少对我国人民的制裁。他们是否会继续保持这一立场，我们拭目以待。"
 nuclear_algeria.26.a: "很好"
 nuclear_algeria.27.t: "阿尔及利亚开始行为反常"
 nuclear_algeria.27.d: "阿尔及利亚的行为再次越来越像一个被国际社会孤立的国家，而不是一个文明国家。我们必须重新考虑我们对制裁的立场。"
 nuclear_algeria.27.a: "他们自找的"
 nuclear_algeria.28.t: "阿尔及利亚屈服"
 nuclear_algeria.28.d: "阿尔及利亚的政策与典型的政策完全相反，似乎正朝着更加和平、更加可控的方向发展。"
 nuclear_algeria.28.a: "很好，也许我们现在可以放松制裁"
 nuclear_algeria.29.t: "美国解除制裁！"
 nuclear_algeria.29.d: "这一天终于到来了，[USA.GetLeader]总统宣布将解除对我国的所有经济制裁。这是我们期盼已久的一天，我们的梦想终于实现了。现在是时候放下分歧，与美国人民和解了。"
 nuclear_algeria.29.a: "伟大之日"
 algerian_focus.171.t: "埃斯萨拉姆核电站"
 algerian_focus.171.d: "美国人未完成的埃斯萨拉姆核电站已经闲置了几十年。随着几位中国科学家的到来，一家中国公司被提议完成该电站剩余的工程。"
 algerian_focus.171.a: "接受提议"
 algerian_focus.171.b: "不了谢谢"
 ALG_sanctioned: "被制裁"
 ALG_nuclear_known: "核计划曝光"
 ALG_restrictions_on_nuclear_weapons: "国际原子能机构限制"
 ALG_restrictions_on_nuclear_weapons_desc: "国际原子能机构对我们能生产和不能生产的东西施加了某些限制，从而限制了我们生产和使用核武器的能力。\n§W--------------§!\n如果我们完成§H核理论§!国策，该国家精神将被§R移除§!。"
