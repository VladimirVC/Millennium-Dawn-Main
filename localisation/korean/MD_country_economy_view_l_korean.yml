 total_civilian_factories_amount_tt_delayed: "이 건물은 민수품을 생산하거나 새로운 건물을 건설하기 위한 산업 역량을 주에 제공합니다. 필요한 경우 군수 산업으로 전환할 수 있습니다.\n\n주에 다음을 제공합니다:\n기본 필요 노동자 수: §Y206K§!\n§Y민간 산업§!당 기본 GDP 산출량: $§Y17.5 ×십억§!\n기본 에너지 소비량: §R-0.5§! GW\n\n§Y민간 산업 노동력§!에 대한 생산성 영향: [?worker_requirement_productivity_multiplier_display|-%0]\n§Y모든 건물 노동력§!에 대한 법률, 국가 정신, 기술의 영향: [?modifier@buildings_worker_requirement_modifier|-%0]\n§Y민간 산업 노동력§!에 대한 법률, 국가 정신, 기술의 영향: [?modifier@civ_facs_worker_requirement_modifier|-%0]\n\n§Y민간 산업§!당 필요 노동자: [?workers_per_civ_fac_display|2]K\n"
 total_military_factories_amount_tt: "이 수치는 국가 내의 총 §Y군수 산업§! 시설 수를 나타냅니다."
