 EU_total_member_vote_desc_tt: "§C[EUU.GetFlag][EUU.GetName]§! использует основную систему голосования — Квалифицированное большинство (QMV). QMV требует, чтобы [?global.EU_majority_qmv_state] §Cгосударств-членов§! (или 55% от текущего общего числа §Cгосударств-членов§!) поддержали резолюцию. Когда число сторонников превышает [?global.EU_majority_qmv_state] §Cгосударств-членов§!, закон может быть принят при условии, что есть необходимое большинство населения — 65% (CЕС).\n\nПоп % §CЕС§! §Gподдерживающих§!: [?global.EU_pop_ratio_yes|%+]\nПоп % §CEU§! §Rпротив§!: [?global.EU_pop_ratio_no|%-]"
