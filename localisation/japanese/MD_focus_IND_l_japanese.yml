 IND_papua_resist_info: "我が国のキリスト教徒は主にパプアに住んでいる。悲しいことに、彼らは昔から政府による迫害を受けており、住民は我々を非常に嫌っている。そのため、そこでの政治的任務は本当に困難なものとなっている。"
