 BLR_Lukashenko_category_desc: "Правление Лукашенко явно авторитарно по своей природе и преследует только одну цель - остаться у власти любой ценой.\n§W--------------§!\n На данный момент процент поддержки Александра Григорьевича Лукашенко равен §Y[?BLR.batka]§!"
