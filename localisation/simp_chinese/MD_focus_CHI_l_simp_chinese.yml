 CHI_SAR_MIO_share_tt: "所有特别行政区傀儡政权都能接触到中国的军工企业。"
 CHI_tai_pressure_economic_tt: "中国利用贸易依赖关系向华盛顿施压，要求其减少对台湾的支持。美国必须决定如何应对。"
 CHI_tai_pressure_diplomatic_tt: "中国开启审慎的外交渠道，试图说服华盛顿与台湾保持距离。"
 CHI_pressure_derecognize_TAI_tt: "中国施加经济和外交压力。如果目标国未在规定期限内撤回对台湾的承认，中国将实施贸易禁运。"
 TAI_reduced_us_support: "美国军事支持减少"
 TAI_reduced_us_support_desc: "在中国向华盛顿施压后，美国缩减了与台湾的武器交付和军事合作。依赖美国装备和条令的部队面临着战备状态下降和士气低落的问题。"
 TAI_isolated_from_us: "被华盛顿抛弃"
 TAI_isolated_from_us_desc: "在中国的持续施压下，美国已正式撤回对台湾的军事和外交支持。台湾军队失去了其主要安全保障，这严重削弱了台湾的国防能力和民众信心。"
 CHI_TAI_shared_modifier: "海峡两岸关系"
 CHI_TAI_shared_modifier_desc: "台湾海峡两岸经济和政治相互依存的动态指数。更紧密的联系提升了稳定性和民主化进程，同时改善了贸易关系、工厂效率、研发速度和建筑产出；而疏离则加剧了共产主义倾向、内部政治压力和海军袭击能力。"
 CHI_SAR_network_modifier: "一个中国制度"
 CHI_SAR_network_modifier_desc: ""
 CHI_TAI_air_dominance: "海峡上空的空中优势"
 CHI_TAI_air_dominance_desc: "解放军空军在台湾海峡的行动对台湾的防御系统施加了持续的空中压力，削弱了台湾争夺空域控制权的能力。"
 CHI_TAI_naval_modernization_idea: "海军现代化"
 CHI_TAI_naval_modernization_idea_desc: "解放军海军加快采购计划，打造了一支能够在台湾海峡持续作战的现代化舰队。"
 TAI_blockade_economic_crisis: "封锁经济危机"
 TAI_blockade_economic_crisis_desc: "中国海上封锁切断了台湾的海上贸易航线，导致燃料、原材料和消费品严重短缺，工业产出大幅下滑。"
 TAI_self_sufficiency: "自给自足措施"
 TAI_self_sufficiency_desc: "发展国内生产能力、减少对进口商品依赖的紧急措施已开始生效，部分抵消了封锁的影响。"
 TAI_cyber_sabotage: "网络破坏"
 TAI_cyber_sabotage_desc: "中国发动的协同网络攻击破坏了台湾的关键基础设施、军事通信和金融系统。"
 TAI_blockade_partial: "海事中断"
 TAI_blockade_partial_desc: "中国宣布的海上安全区扰乱了商业航运，并推高了驶往台湾港口的船舶的保险成本。"
 TAI_emergency_situation: "紧急状态"
 TAI_emergency_situation_desc: "为应对中国大陆的封锁，台湾宣布进入紧急状态。征兵范围扩大，民防措施启动，但经济损失惨重。"
 CHI_TAI_tourism_ban: "海峡两岸旅游业冻结"
 CHI_TAI_tourism_ban_desc: "中国大陆已暂停赴台团体及个人旅游，切断了自2008年两岸旅游自由化以来积累的游客流量。2019年，北京将禁令扩大至个人旅游许可，导致每年数十万游客无法入境。此举直接损害了台湾的酒店、零售和服务业，同时也表明北京有意利用经济相互依存作为胁迫手段。"
 CHI_crossstrait_operations: "海峡两岸行动准备"
 CHI_crossstrait_operations_desc: "解放军已具备在台湾海峡进行两栖和空降联合作战的全面作战能力。"
 CHI_TAI_amphibious_mastery: "两栖突击理论"
 CHI_TAI_amphibious_mastery_desc: "解放军海军陆战队各部队通过在台湾海峡进行的密集训练演习，在联合兵种两栖作战方面达到了很高的熟练程度。"
 CHI_TAI_military_buildup_idea: "海峡两岸军事集结"
 CHI_TAI_military_buildup_idea_desc: "中国人民解放军已在福建沿海地区集中了大量的陆军、海军和空军力量，以应对可能发生的台湾海峡突发事件。"
 china_sar.027.t: "台湾问题：开场白"
 china_sar.027.d: "国务院已授权开展一项持续削弱美国对台湾支持的行动。经济杠杆、外交孤立和军事信号都是可用的手段。问题在于力度和速度。"
 china_sar.027.a: "施加最大经济压力。我们将使支持台湾的代价高昂到无法承受。"
 china_sar.027.b: "首先采取谨慎的外交姿态。耐心比对抗更能取得成效。"
 china_sar.028.t: "华盛顿正在权衡各种选择"
 china_sar.028.d: "北京的施压行动在华盛顿的时机颇为尴尬。美国政府面临着内部的两派对抗：鹰派要求政府重申对台湾的承诺，而务实派则担忧激怒中国会带来经济后果。"
 china_sar.028.a: "重申我们对台湾的承诺。中国的压力只会增强我们的决心。"
 china_sar.028.b: "承认中国的关切。我们可以找到一个既能缓解紧张局势又不放弃台湾的方案。"
 china_sar.029.t: "局势升级：中国加大赌注"
 china_sar.029.d: "华盛顿的拒绝令中南海方面感到措手不及。领导层面临巨大压力，必须表明对抗是要付出代价的。摆在他们面前的是两条路：要么组建外交联盟对抗美国的台湾政策，要么通过在海峡举行军事演习来展现决心。"
 china_sar.029.a: "建立国际联盟。外交孤立比对抗更具可持续性。"
 china_sar.029.b: "进行台海联合演习。华盛顿必须理解我们承诺的军事层面。"
 china_sar.030.t: "华盛顿方面做出部分让步"
 china_sar.030.d: "经过内部讨论，美国政府已表示愿意减少而非完全停止对台军售。此举被视为维护稳定的姿态。北京方面必须决定是接受这一部分让步，还是坚持要求全面撤军。"
 china_sar.030.a: "接受让步。部分收益也是收益。"
 china_sar.030.b: "拒绝这项提议。彻底撤回支持是唯一可接受的结果。"
 china_sar.031.t: "美国站在十字路口"
 china_sar.031.d: "中国持续不断的施压迫使华盛顿做出最终决定。情报界警告称，进一步的让步可能会助长北京在整个印太地区的嚣张气焰。但对抗的经济代价也是实实在在的。美国政府必须做出选择。"
 china_sar.031.a: "停止对台湾的正式支持。与北京的关系太重要了，不能牺牲。"
 china_sar.031.b: "重申我们对台湾的全面承诺。我们绝不会屈服于胁迫而放弃台湾。"
 china_sar.032.t: "华盛顿从台湾问题上退缩"
 china_sar.032.d: "美国悄然做出重大转变，表明将不再为台湾的独立地位提供积极的军事和外交支持。声明措辞虽略显官僚，但其战略意义却不言而喻：台湾将独立自主。"
 china_sar.032.a: "一项历史性成就。统一之路已经开启。"
 china_sar.033.t: "华盛顿重申其承诺"
 china_sar.033.d: "美国拒绝了中国的施压，并公开重申了对台湾安全的承诺。美国政府宣布了一项新的对台军售计划，并紧急召集日本和澳大利亚举行磋商。北京的施压已经失败，并加剧了华盛顿方面的反对。"
 china_sar.033.a: "这是一次挫折，但并非失败。我们将重新评估我们的策略。"
 china_sar.001.t: "提案：海峡两岸服务贸易协定"
 china_sar.001.d: "北京方面提出了《海峡两岸服务贸易协定》，旨在开放两岸主要服务业，促进更自由的贸易和投资。该协定将允许大陆企业进入台湾的银行、医疗和零售业。支持者认为这将深化经济一体化；批评者则警告称，这将赋予北京对台湾经济的结构性控制权。"
 china_sar.001.a: "签署协议。经济一体化符合我们的长远利益。"
 china_sar.001.b: "拒绝这项协议。让步幅度过大，监督力度过弱。"
 china_sar.002.t: "海峡两岸商业网络"
 china_sar.002.d: "亲北京的商业网络已在大陆资本的支持下，通过一系列不透明的投资协议，将触角伸向台湾的金融和媒体领域。政府必须决定如何应对这种日益增长的影响力，因为它模糊了商业与政治的界限。"
 china_sar.002.a: "欢迎两岸交流。经济联系是稳定的基础。"
 china_sar.002.b: "监控网络，但不要限制它们。反应过度会损害合法贸易。"
 china_sar.002.c: "对内地相关投资在敏感领域的应用施加限制。"
 china_sar.003.t: "九二共识问题"
 china_sar.003.d: "中国大陆正式提出以“九二共识”作为两岸对话的外交基础。这一表述刻意含糊：北京将其解读为致力于实现统一中国的目标，而国民党则历来接受“一个中国，各自解释”的表述。民进党长期以来一直拒绝接受，认为这是一个政治陷阱。台湾必须对此作出回应。"
 china_sar.003.a: "接受共识方案。“一个中国，各自表述”既维护了我们的立场，又为对话开辟了道路。"
 china_sar.003.b: "承认对话精神，但不明确支持某种模式。我们寻求和平，而非政治承诺。"
 china_sar.003.c: "拒绝接受共识。任何暗示接受“一个中国”的方案都会损害我们的主权地位。"
 china_sar.004.t: "台湾独立势力获胜"
 china_sar.004.d: "支持台独的阵营在台湾选举中赢得多数席位。新政府已明确表示不会接受“九二共识”，并打算在台湾的国际地位问题上采取更为强硬的路线。两岸关系进入降温期。"
 china_sar.004.a: "遭遇挫折。我们将重新评估对台北的策略。"
 china_sar.005.t: "北京的干预行动曝光"
 china_sar.005.d: "台湾国家安全局已查明与中国大陆有关联的行动，旨在影响台湾内部政治，包括通过代理人投资媒体、资助亲中共政治人物以及建立商业网络以传播政治信息。这些调查结果已被泄露给媒体，引发公众强烈愤慨。"
 china_sar.005.a: "驱逐涉案文化专员并提出正式抗议。我们不会容忍境外操纵我们的民主。"
 china_sar.006.t: "台湾驱逐大陆官员"
 china_sar.006.d: "在北京的政治影响力运作曝光后，台北正式驱逐了几名文化和商务专员。此举引起了台湾民主盟友的掌声，也遭到了北京外交部的严厉公开谴责。"
 china_sar.006.a: "承担外交代价。此次行动的曝光会阻碍我们的工作，但总体战略依然正确。"
 china_sar.035.t: "北京的文化推广"
 china_sar.035.d: "中国和内蒙古在外蒙古境内发起了一场协调一致的文化影响力宣传活动，旨在推广蒙古族共同的文化遗产，同时引导舆论朝着更加紧密的融合方向发展。北京方面将此举包装成文化交流，但其背后的政治意味却不言而喻。"
 china_sar.035.a: "我们别无选择，只能承认这一点。"
 china_sar.036.t: "与内蒙古结盟？"
 china_sar.036.d: "来自北京和呼和浩特的官方代表团抵达乌兰巴托，正式邀请蒙古加入中华人民共和国，成为“一国两制”框架下的特别行政区。该提议包含经济保障和文化自治的承诺，同时也体现了中国强大的影响力。"
 china_sar.036.a: "我们接受提议"
 china_sar.036.b: "蒙古将保持独立。"
 china_sar.037.t: "蒙古拒绝统一"
 china_sar.037.d: "乌兰巴托方面已正式拒绝了统一提议。蒙古政府援引国家主权和民众反对作为理由，但外交渠道仍然畅通。北京方面承认这一决定，但明确表示统一提议仍然有效。"
 china_sar.037.a: "我们会再次尝试"
 china_sar.007.t: "危险的海峡航线"
 china_sar.007.d: "一架解放军战斗机在台湾海峡中线附近对一架外国军机进行了挑衅性拦截。座舱摄像头拍摄到的画面显示，中国飞行员与目标飞机仅相距数米。国际媒体纷纷要求中方作出回应。"
 china_sar.007.a: "否认参与其中并缓和局势。"
 china_sar.007.b: "保持官方沉默。"
 china_sar.007.c: "公开辩护称该行动是合法执法行为。"
 china_sar.008.t: "台湾海峡海上碰撞"
 china_sar.008.d: "一艘中国人民解放军海军驱逐舰与一艘外国军舰在台湾海峡近距离相撞，两舰均受损。该事件引发国际社会强烈谴责，令北京陷入困境。"
 china_sar.008.a: "指责对方鲁莽航行。"
 china_sar.008.b: "不要发表任何声明，让这件事逐渐平息。"
 china_sar.008.c: "通过非正式渠道私下道歉。"
 china_sar.009.t: "火箭试验：区域性沉默"
 china_sar.009.d: "解放军火箭军在台湾海峡进行的弹道导弹试验并未引起国际社会的广泛关注。华盛顿方面仅发表了一份形式上的关切声明，并未采取任何具体行动。美国缺乏实质性反应，向整个地区发出了一个强烈的信号。"
 china_sar.009.a: "我们的决心胜过他们的沉默。"
 china_sar.010.t: "火箭试验：美国的反击"
 china_sar.010.d: "解放军火箭军在台湾附近进行的导弹试验适得其反，造成了巨大损失。华盛顿已下令派遣航母打击群进入海峡，并宣布向台北紧急提供武器援助。国际舆论已趋于一致地反对北京。"
 china_sar.010.a: "这次挫折不会让我们气馁。"
 china_sar.011.t: "台湾被孤立"
 china_sar.011.d: "台湾的正式邦交国已减少到寥寥几个小国。在缺乏实质性国际承认的情况下，台北的主权主张日益站不住脚。这种孤立既是象征性的，也是实际的。"
 china_sar.011.a: "对叛逆省份的包围圈正在收紧。"
 china_sar.012.t: "国会军售投票"
 china_sar.012.d: "美国国会正在辩论一项对台军售方案。我们在华盛顿的游说网络有机会影响投票结果，但如果我们的介入被曝光，干预也将带来风险。"
 china_sar.012.a: "启动游说网络阻止这笔交易。"
 china_sar.012.b: "通过外交渠道发出经济威胁。"
 china_sar.012.c: "让这个过程自然进行，不要干预。"
 china_sar.013.t: "商业理事会倡导缓和"
 china_sar.013.d: "美中贸易全国委员会发布报告，敦促华盛顿将贸易稳定置于台湾安全承诺之上。这份报告凝聚了我们开展经济交流工作的经验，已在政策界引起广泛关注。"
 china_sar.013.a: "已阅。"
 china_sar.014.t: "选举干预事件曝光"
 china_sar.014.d: "美国情报机构已公开指责中国政府行为体发动了一场政治影响力行动。这一丑闻在国会引发了两党的强烈愤慨，并导致一系列惩罚性措施出台。我们与华盛顿的战略关系遭受重创。"
 china_sar.014.a: "代价惨重的误判。"
 china_sar.015.t: "紧急安全会议"
 china_sar.015.d: "中国在台湾海峡举行的封锁模拟演习引发了国家安全委员会的紧急会议。军方指挥官和内阁官员正在讨论如何应对北京不断升级的压力。"
 china_sar.015.a: "加强沿海地区的军事战备。"
 china_sar.015.b: "呼吁国际社会提供支持。"
 china_sar.016.t: "紧急状态"
 china_sar.016.d: "部分封锁已持续两个月，扰乱了贸易，造成燃料和关键物资短缺。政府面临越来越大的压力，要求其宣布正式进入紧急状态，并让武装部队进入全面戒备状态。"
 china_sar.016.a: "宣布进入紧急状态。"
 china_sar.016.b: "寻求与北京进行外交解决。"
 china_sar.017.t: "投降问题"
 china_sar.017.d: "全面海上封锁已经重创了我们的经济，切断了我们的补给线。随着美国的支持实际上已经撤回，政府内部有人正在悄悄地提出，或许可以按照北京提出的条件与北京展开谈判。"
 china_sar.017.a: "我们绝不投降。继续战斗。"
 china_sar.017.b: "与北京展开谈判。"
 china_sar.018.t: "台湾开启谈判"
 china_sar.018.d: "台北已派遣代表团前往北京，商讨统一事宜。封锁、经济崩溃以及美国撤回支持，使台湾别无选择。一个历史篇章即将落幕。"
 china_sar.018.a: "接受祖国统一。"
 china_sar.019.t: "台海危机"
 china_sar.019.d: "台海局势已达临界点。双方军队均处于高度戒备状态，任何一次误判都可能引发公开冲突。中共中央政治局常委会召开紧急会议，商讨下一步行动。"
 china_sar.019.a: "远离冲突边缘，缓和局势。"
 china_sar.019.b: "全力推进。发布正式的战争目标。"
 china_sar.020.t: "来自北京的最后通牒"
 china_sar.020.d: "北京已发出正式最后通牒，要求接受中华人民共和国的统一。若不接受，将采取军事行动。中国政府必须决定是抵抗还是谈判。"
 china_sar.020.a: "拒绝最后通牒。准备战争。"
 china_sar.020.b: "接受条款。斗争结束了。"
 china_sar.021.t: "台湾拒绝统一"
 china_sar.021.d: "台北方面已正式拒绝我方最后通牒。台湾当局已宣布将抵制任何强行统一的企图，并正在动员军队。和平解决之道已然封闭。"
 china_sar.021.a: "那就这样吧。准备战争。"
 china_sar.022.t: "台湾接受统一"
 china_sar.022.d: "台北已接受统一条款。中华民国将​​解散，其领土并入中华人民共和国。长达数十年的两岸分裂即将结束。"
 china_sar.022.a: "祖国再次完整了。"
 china_sar.023.t: "中国外交施压"
 china_sar.023.d: "北京已正式要求我们撤回对台湾的承认。中国承诺以经济利益诱惑我们服从，并威胁对拒绝者实施制裁。我们继续承认台北已成为一项代价高昂的外交举措。"
 china_sar.023.a: "遵命。撤销对台湾的承认。"
 china_sar.023.b: "拒绝。我们信守承诺。"
 china_sar.024.t: "在海峡进行两栖演习"
 china_sar.024.d: "解放军海军陆战队在台湾海峡举行了迄今为止规模最大的两栖登陆演习，模拟对设防海岸线进行滩头突击。此次演习通过官方媒体播出，向台北和华盛顿都发出了明确的信号。"
 china_sar.024.a: "全世界都注意到了。"
 china_sar.025.t: "航行自由对抗"
 china_sar.025.d: "美国海军派遣一艘军舰进入我方在台湾附近划定的海上安全区。该舰公然展示其存在，挑衅解放军海军作出回应。我方部队正在追踪这艘美国军舰。"
 china_sar.025.a: "允许通行。避免正面冲突。"
 china_sar.025.b: "跟踪并挑战美国舰艇。"
 china_sar.026.t: "美国领导层转变"
 china_sar.026.d: "美国总统的更迭改变了我们台湾战略的政治格局。新政府对两岸关系的立场将影响美国对台北的支持力度。"
 china_sar.026.a: "据此调整我们的策略。"
 USA_taiwan_defense_category: "台湾防御"
 CHI_TAI_amphibious_exercise: "在海峡进行两栖演习"
 CHI_TAI_amphibious_exercise_desc: "下令在台湾海峡举行大规模两栖登陆演习，以展示军事能力并向台北施压。"
 CHI_TAI_adiz_incursion: "防空识别区突入"
 CHI_TAI_adiz_incursion_desc: "派遣解放军空军战斗机进入台湾防空识别区，测试其反应速度，削弱台北的信心。"
 CHI_TAI_rocket_test: "弹道导弹实验"
 CHI_TAI_rocket_test_desc: "在台湾海峡上空进行弹道导弹试验。对此，美国的反应取决于其目前对台湾防务的承诺程度。"
 CHI_TAI_grey_zone_ops: "灰色地带行动"
 CHI_TAI_grey_zone_ops_desc: "在台湾附近海域进行低级别挑衅，包括海岸警卫队入侵、渔船部署和电子战探测。"
 CHI_TAI_blockade_simulation: "封锁模拟演习"
 CHI_TAI_blockade_simulation_desc: "举行大规模海军演习，模拟对台湾的全面封锁，测试后勤保障能力，并展示切断台湾补给线的能力。"
 CHI_TAI_cyberattack: "台湾遭受网络攻击"
 CHI_TAI_cyberattack_desc: "发起针对台湾电网、金融系统和军事通信的协同网络攻击行动。"
 CHI_TAI_shadow_carrier: "遮蔽美国航母群"
 CHI_TAI_shadow_carrier_desc: "部署潜艇和水面作战舰艇跟踪在台湾海峡附近活动的美国航母打击群。"
 CHI_TAI_intercept_aircraft: "拦截美国侦察"
 CHI_TAI_intercept_aircraft_desc: "紧急出动战斗机拦截并积极跟踪在海峡附近活动的美国侦察机。"
 CHI_TAI_un_protest: "联合国抗议武器销售"
 CHI_TAI_un_protest_desc: "向联合国正式抗议美国向台湾出售武器，从而对华盛顿施加国际压力。"
 CHI_TAI_maritime_zone: "宣布设立海上安全区"
 CHI_TAI_maritime_zone_desc: "在台湾主要航道周围划定海上安全区，为拦截和检查商船建立法律借口。"
 CHI_TAI_partial_blockade: "部分海上封锁"
 CHI_TAI_partial_blockade_desc: "将海上安全区升级为部分海上封锁，限制向台湾运送燃料和原材料。"
 CHI_TAI_full_blockade: "全面海上封锁"
 CHI_TAI_full_blockade_desc: "对台湾实施全面海上封锁，切断所有通往该岛的海上贸易和补给线。"
 CHI_TAI_influence_us_election: "影响美国大选"
 CHI_TAI_influence_us_election_desc: "在美国部署秘密政治影响力行动，以支持同情北京在台湾问题上立场的候选人。"
 CHI_TAI_support_houthis: "支持胡塞武装行动"
 CHI_TAI_support_houthis_desc: "向也门胡塞武装提供秘密物资支持，制造安全危机，从而将美国军事资源从太平洋地区转移出去。"
 CHI_TAI_arm_iran: "向伊朗秘密输送武器"
 CHI_TAI_arm_iran_desc: "通过中间人向伊朗输送先进军事技术，增加了驻中东美军的压力。"
 CHI_TAI_scs_provocations: "南海挑衅"
 CHI_TAI_scs_provocations_desc: "中国通过岛屿军事化、海警骚扰竞争对手以及扩大防空区等手段，宣示其对南海争议岛礁的主权。这些行动迫使美国调动海军力量安抚东盟伙伴。"
 CHI_TAI_nk_provocations: "鼓励朝鲜挑衅"
 CHI_TAI_nk_provocations_desc: "向平壤发出信号，表明朝鲜半岛的导弹试验和军事挑衅将被容忍，迫使美国从台湾战区撤军。"
 CHI_TAI_middleeast_diversion: "中东战略参与"
 CHI_TAI_middleeast_diversion_desc: "深化中东地区的军事和经济伙伴关系，以增加该地区对北京的依赖，同时转移美国对印太地区的注意力。"
 CHI_TAI_support_russia: "支持俄罗斯行动"
 CHI_TAI_support_russia_desc: "为俄罗斯的军事行动提供经济和后勤支持，延长冲突，从而消耗美国的注意力和资源。"
 CHI_TAI_strait_naval_exercise: "台湾海峡海军演习"
 CHI_TAI_strait_naval_exercise_desc: "在台湾海峡举行大规模海军演习，演练两栖突击作战和反介入/区域拒止作战。此次演习将提升海军战备水平，但会招致国际社会的谴责。"
 CHI_TAI_fund_us_opposition: "资助亲华的美国游说活动"
 CHI_TAI_fund_us_opposition_desc: "通过中间人输送资源，支持那些同情北京在台湾问题上立场的美国政治团体、智库和媒体。一旦发现，必将引发强烈反弹。"
 CHI_TAI_exploit_us_commitments: "利用美军过度扩张"
 CHI_TAI_exploit_us_commitments_desc: "在美国忙于海外军事行动之际，应加大对台湾的外交和军事压力。美军兵力捉襟见肘，无力有效增援太平洋地区。"
 USA_TAI_send_carrier: "向台湾海峡部署航母"
 USA_TAI_send_carrier_desc: "命令航母打击群穿越台湾海峡，以展示武力，表明美国对地区稳定的承诺。"
 USA_TAI_recon_flight: "海峡上空的侦察飞行"
 USA_TAI_recon_flight_desc: "派遣侦察机监视解放军在台湾海峡的活动，此前解放军曾多次入侵台湾防空识别区。"
 USA_TAI_arm_taiwan: "紧急向台湾提供武器供应"
 USA_TAI_arm_taiwan_desc: "为应对中国不断升级的封锁准备，批准向台湾军方紧急出售武器方案。"
 USA_TAI_fon_operation: "航行自由行动"
 USA_TAI_fon_operation_desc: "派遣军舰穿越中国宣布的海上安全区，以维护航行自由并挑战北京的主张。"
 USA_TAI_rimpac_exercise: "环太平洋海军演习"
 USA_TAI_rimpac_exercise_desc: "邀请台湾参加一年一度的环太平洋海军演习，这是世界上最大的国际海上作战演习，以此表明美国对地区伙伴的承诺。"
 CHI_SAR_decisions_category: "一个中国战略"
 CHI_SAR_decisions_category_desc: "\n£MAIN_desctext_sco \n\n\n\n§Y一个中国战略§!代表了北京将所有声称拥有主权的领土整合到单一中国政府之下的政策。通过政治施压、经济发展和行政控制相结合的方式，逐步使各地与中央政府保持一致。\n\n这一过程可以遵循不同的路径。§Y一体化§!程度的提高会加强直接控制和整合，而更加自治的安排则会以牺牲中央权威为代价，优先考虑地方稳定和经济潜力。\n\n这些方法之间的平衡将决定国家的长期统一，而§Y台湾§!问题仍然受到国际承认、外国支持和两岸紧张局势的影响。\n\n§Y中国的特别行政区§!\n$HKG_sinicization$\n$ETK_sinicization$\n$MAC_sinicization$\n$OMG_sinicization$\n\n$CHI_TAI_trust$\n$CHI_taiwan_us_support$\n$CHI_taiwan_strait_tension$\n$CHI_taiwan_recognition_count$\n$uighur_threat_display$"
 CHI_pressure_derecognize_TAI: "施压[From.GetName]撤回对台湾的承认"
 CHI_pressure_derecognize_TAI_desc: "北京正持续开展外交攻势，以削弱国际社会对台湾的承认。[From.GetName]目前与台北保持着正式外交关系。经济激励和制裁威胁相结合或许足以促使其改变立场。"
 CHI_establish_education_centres: "在新疆建立职业技能教育中心"
 CHI_establish_education_centres_desc: ""
 CHI_MON_reunification_retry: "重申统一提议"
 CHI_MON_reunification_retry_desc: "蒙古拒绝了我们之前的提议。待外交条件稳定后，我们可以再次与乌兰巴托方面接洽。"
 CHI_han_settlement_small: "小型汉族移民安置计划"
 CHI_han_settlement_small_desc: "一项规模适中的国家资助计划将汉族家庭从人口稠密的内陆省份迁往内蒙古的新城镇，并辅以就业激励和土地分配方案。"
 CHI_han_settlement_medium: "中型汉族移民安置计划"
 CHI_han_settlement_medium_desc: "一项规模更大的有组织的移民安置计划将数万名汉族工人和他们的家人迁往内蒙古。新的工业区和农业用地被划拨出来，用于安置这些新迁入的人口。"
 CHI_han_settlement_large: "大型汉族移民安置计划"
 CHI_han_settlement_large_desc: "一场大规模的人口改造运动将数十万汉族移民集中迁入内蒙古。尽管短期内当地民众的抵制情绪急剧上升，但从长远来看，这对该地区的民族构成产生了显著影响。"
 CHI_TAI_media_infiltration: "媒体网络渗透"
 CHI_TAI_media_infiltration_desc: "资助并扩大台湾境内亲北京媒体的所有权和编辑影响力网络。营造更有利于两岸交流的信息环境。"
 CHI_TAI_business_council_funding: "海峡两岸商业理事会资助"
 CHI_TAI_business_council_funding_desc: "为国民党旗下的商业协会和两岸商会提供财政支持。加强台湾经济精英中支持参与对话的势力。"
 CHI_TAI_cultural_exchange_program: "海峡两岸文化交流计划"
 CHI_TAI_cultural_exchange_program_desc: "赞助海峡两岸的学术交流、文化节和青年对话项目。建立民间联系，以缓和加强关系的政治阻力。"
 CHI_TAI_cross_strait_infrastructure_investment: "海峡两岸基础设施投资"
 CHI_TAI_cross_strait_infrastructure_investment_desc: "将大陆资本引入台湾的基础设施项目，将中国投资定位为经济机遇的来源，并加深两地经济的物质相互依存。"
 CHI_45g_national_deployment_idea: "5G国家部署计划"
 CHI_45g_national_deployment_idea_desc: "加快在全国范围内部署5G网络基础设施，由各州协调基站、核心网络设备和频谱分配方面的资本投资。该计划优先覆盖战略性产业和关键基础设施。"
 CHI_avic_innovation_idea: "中航工业飞机开发"
 CHI_avic_innovation_idea_desc: "中国航空工业集团公司致力于发展自主飞机设计和生产能力，推进战斗机和运输机项目，摆脱对外国技术和许可的依赖。"
 CHI_big_fund_phase_1_idea: "国家半导体产业基金"
 CHI_big_fund_phase_1_idea_desc: "中国为实现半导体自主化而设立的“半导体大基金”调动国家资金，用于发展本土制造能力、设计能力和设备制造能力。该基金强调减少对外国代工厂和EDA工具的依赖。"
 CHI_caic_innovation_idea: "昌河飞机工业集团攻击直升机研发"
 CHI_caic_innovation_idea_desc: "中国航天集团通过研发和生产国产旋翼机平台，推进攻击直升机技术的发展，这些平台旨在快速部署和持续作战。"
 CHI_casc_innovation_idea: "中国航天科技集团太空和卫星计划"
 CHI_casc_innovation_idea_desc: "中国航天科技集团公司扩大了太空发射、卫星通信和地球观测能力，巩固了中国作为不受外国准入限制的主要太空强国的地位。"
 CHI_casic_innovation_idea: "中国航天科工集团导弹及反制措施研发"
 CHI_casic_innovation_idea_desc: "中国航天科工集团通过在推进、制导和电子战方面的持续研发，推进巡航导弹、弹道导弹和防空系统的发展。"
 CHI_cetc_innovation_idea: "中国电子科技集团公司计算与人工智能开发"
 CHI_cetc_innovation_idea_desc: "中国电子科技集团投资高性能计算、半导体设计和人工智能平台，以降低技术依赖性，加速国内关键使能技术的创新。"
 CHI_crrc_innovation_idea: "中国中车工业制造"
 CHI_crrc_innovation_idea_desc: "中国轨道交通制造商正将其业务多元化拓展至更广泛的工业领域，充分利用其在冶金、精密制造和系统集成方面数十年的供应链专业知识。"
 CHI_csgc_innovation_idea: "中国兵器装备集团装甲车辆研发"
 CHI_csgc_innovation_idea_desc: "中国国有装甲车辆制造商正在研发下一代坦克、步兵战车和支援车辆平台，融合了先进的装甲、火力和机动性。"
 CHI_csic_innovation_idea: "中国船舶重工公司潜艇开发"
 CHI_csic_innovation_idea_desc: "中国船舶工业集团公司致力于推进潜艇设计和生产，重点研究船体材料、静音技术以及用于延长水下作业时间的先进传感器系统。"
 CHI_cssc_innovation_idea: "中国船舶集团水面舰艇开发"
 CHI_cssc_innovation_idea_desc: "中国的主要造船企业专注于先进的驱逐舰、护卫舰和轻型护卫舰设计，并配备一体化作战系统，从而将中国的远洋作战能力扩展到战略海上航线。"
 CHI_failed_five_year_plan: "五年计划失败"
 CHI_failed_five_year_plan_desc: "最新五年规划周期的成果令人失望，迫使人们重新评估优先事项和资源分配。公众对长期发展目标的信心受损，亟需立即进行政策调整。"
 CHI_haig_innovation_idea: "哈尔滨飞机工业集团发展"
 CHI_haig_innovation_idea_desc: "哈尔滨航空业扩大了旋翼机能力，开发运输直升机和攻击平台，减少了对外国设计和许可证的依赖。"
 CHI_inner_mongolia_innovation_idea: "内蒙古装甲开发"
 CHI_inner_mongolia_innovation_idea_desc: "内蒙古的综合装甲生产基地利用数百年的冶金专业知识和现代制造技术，推进了主战坦克和装甲车辆的发展。"
 CHI_jap_strategic_isolation: "日本的战略孤立"
 CHI_jap_strategic_isolation_desc: "我们的经济影响力和区域外交地位日益削弱日本在东亚的战略影响力。东京面临着消费品通胀、出口市场萎缩以及战略地位下降带来的心理压力。"
 CHI_kor_g2_economic_platform: "中韩G2经济框架"
 CHI_kor_g2_economic_platform_desc: "中韩两国建立双边经济协调机制，涵盖贸易政策、投资流动和技术合作等领域。该安排将两国定位为东亚繁荣的共同管理者。"
 CHI_kor_trilateral_opening: "三边韩国开放"
 CHI_kor_trilateral_opening_desc: "通过高层磋商和有限的经济接触，中国向朝鲜开放外交关系，表明中国愿意斡旋对话，并为可控改革提供物质支持。"
 CHI_made_in_china_2025_idea: "中国制造2025"
 CHI_made_in_china_2025_idea_desc: "一项为期十年的产业政策计划，旨在发展半导体、先进复合材料、机器人和轨道交通等高科技制造业。该计划的目标是将中国从世界工厂转变为世界创新者。"
 CHI_nko_final_transition: "朝鲜的最终过渡"
 CHI_nko_final_transition_desc: "朝鲜转型的最后阶段标志着中国影响和结盟的最终完成。平壤在功能上完全融入中国势力范围，名义上的独立性降至最低。"
 CHI_nko_managed_reform_pilot: "朝鲜的有序改革试点"
 CHI_nko_managed_reform_pilot_desc: "中国通过设立经济特区和实施受控市场机制，在朝鲜推行有限的经济自由化。这一试点项目旨在检验平壤能否在不破坏政权稳定的前提下进行改革。"
 CHI_norinco_innovation_idea: "北方工业公司武器研发"
 CHI_norinco_innovation_idea_desc: "中国北方工业公司加快步兵武器现代化、火炮系统和轻型装甲平台的研发。北方工业公司的出口产品组合扩大到那些难以获得西方供应商产品的国家的军队。"
 CHI_phi_abandonment_doctrine: "菲律宾遗弃原则"
 CHI_phi_abandonment_doctrine_desc: "蓄意培养菲律宾在经济上对中国的经济依赖和外交上的疏远，使马尼拉陷入孤立，容易受到来自中国的压力。"
 CHI_poly_innovation_idea: "保利科技军工发展"
 CHI_poly_innovation_idea_desc: "保利科技多元化的军工产业组合扩展到新兴国防领域，利用国家支持和与国防机构各研究机构的合作机会。"
 CHI_sac_innovation_idea: "沈阳飞机公司战机开发"
 CHI_sac_innovation_idea_desc: "沈阳飞机公司推进战斗机设计和生产，开发自主平台，减少对俄罗斯发动机和电子扫描阵列雷达技术的依赖。"
 CHI_shadow_banking_cleanup_idea: "影子银行部门清理"
 CHI_shadow_banking_cleanup_idea_desc: "监管机构严厉打击不受监管的信托产品、P2P借贷和表外融资，可以消除金融体系中的系统性风险。短期信贷紧缩会被监管机构信心的增强所抵消。"
 CHI_south_china_sea_dominance_window: "南海优势窗口"
 CHI_south_china_sea_dominance_window_desc: "通过加强海军存在、扩大民用渔船队规模以及在填海造陆岛屿上建设军事设施，巩固对南海的控制权，这一战略窗口已经开启。但如果地区大国联合起来对抗中国的扩张，这一窗口可能会关闭。"
 CHI_ztz99_rollout_idea: "99式主战坦克下线"
 CHI_ztz99_rollout_idea_desc: "99式主战坦克在解放军陆军全面生产部署，与早期平台相比，装甲、火力、机动性均得到提升。"
 ETK_security_reinforcement_idea: "安全部队增援"
 ETK_security_reinforcement_idea_desc: "扩大安全部队规模并加强基础设施以抵御恐怖袭击，经济成本适中，但公民自由减少和监控加强会抵消这些成本。"
 ETK_surveillance_state_idea: "国家监控措施"
 ETK_surveillance_state_idea_desc: "在全社会范围内全面扩展监控系统、检查站网络和情报收集。社会控制力度加大带来的经济效率提升，却被创新能力下降和公民参与度降低所抵消。"
 ETK_terrorism_aftermath: "恐怖主义余波"
 ETK_terrorism_aftermath_desc: "挥之不去的安全隐患和近期恐怖袭击造成的社会创伤持续扰乱经济活动和公众信心。复苏需要时间和有效的安全重建措施。"
 TAI_civil_defense_readiness: "民防准备"
 TAI_civil_defense_readiness_desc: "动员民众参与防空任务，并接受掩体搭建、伤员救护和损管等方面的培训。抵御空中威胁的能力提升，但代价​​是生活质量下降和经济中断。"
 CHI_bri_pacific_engagement_tt: "$CHI_bri_pacific_engagement$: $RIGHT|+=1$"
 CHI_the_hainan_response: "海南的回应"
 CHI_space_events_lunar_satellite: "月球卫星计划"
 CHI_space_events_lunar_rocketry: "月球火箭计划"
 CHI_Asset_Seizure_tt: "§Y夺取资产：§!国库§G+25§!，§G+3§! $CHI_bri_global_presence$"
 chi_bri.16.a: "我们会处理好后续。"
 chi_bri.16.d: "财政部已确认账目显示的情况：我们无法按时支付本月​​“一带一路”建设相关款项。我们将在数日内通知北京。在欠款结清之前，债权人有权采取行动，而他们可选择的方案并非全是温和的。"
 chi_bri.16.t: "“一带一路”还款逾期"
 chi_bri.17.a: "签署让步协议"
 chi_bri.17.b: "这些押金不出售。"
 chi_bri.17.d: "中国代表团抵达，带来的与其说是提议，不如说是方案。北京方面希望以取消我们拖欠的“一带一路”债务为交换条件，换取我们矿产资源的长期开采和出口权。债务将从账面上消失，而我们脚下的土地也将在很大程度上被剥夺。"
 chi_bri.17.t: "北京要求获得资源开采权"
 chi_bri.18.a: "其他设施仍然保留"
 chi_bri.18.d: "[FROM.GetName]断然拒绝了我们的资源特许权条款。他们的债务依然存在，违约行为依然成立，而我们的代表团空手而归。现在的问题是，是继续等待，还是采取其他手段追讨我们应得的款项。"
 chi_bri.18.t: "[FROM.GetName]拒绝了我们提出的条件"
 chi_bri.19.a: "权衡手头的选择"
 chi_bri.19.d: "[FROM.GetName]已拖欠其“一带一路”建设义务款项。虽然金额按“一带一路”倡议的标准来看并不算大，但此举意义重大：其他所有借款方都在密切关注北京的应对措施。我们可能会重组债务、要求资源权益，甚至收回我们资助的项目。"
 chi_bri.19.t: "[FROM.GetName]“一带一路”债务违约"
 chi_bri.23.a: "建设才是最重要的。"
 chi_bri.23.d: "我们的国库无法承担我们在§Y[GetBRIProjectName]§!项目中所占的份额，因此北京提供了信贷来弥补资金缺口。无论如何，工程都会继续进行。这笔债务现在已记入我们的账簿，会产生利息，如果我们无力偿还，条款给予中国相当大的回旋余地。"
 chi_bri.23.t: "“一带一路”项目信贷融资"
 CHI_BRI_automation_disable_tt: "“一带一路”倡议申请必须§Y逐一审核§!。"
 CHI_BRI_automation_enable_tt: "“一带一路”申请将§G自动被受理§!"
 CHI_bri_buy_back_concession: "回购特许经营权"
 CHI_bri_buy_back_concession_desc: "我们可以通过购买手段解除授予中国公司的开采和出口权。这代价高昂，北京也不会轻易接受损失，但至少能将矿藏的控制权重新交还给国家。"
 CHI_bri_can_host_energy: "我们控制着一个拥有强大工业体系的国家。"
 CHI_bri_can_host_mine: "我们控制着一个拥有丰富矿产资源的地区。"
 CHI_bri_can_host_pipeline: "我们控制着一个拥有宝贵石油、钢铁或铬矿藏的地区。"
 CHI_bri_can_host_port: "我们控制着一个沿海地区，该地区可以建设港口。"
 CHI_bri_can_host_prestige: "我们控制着自己的首都"
 CHI_bri_can_host_rail: "我们控制着一个与中国控制区接壤的地区。"
 CHI_bri_can_host_sez: "我们控制着一个沿海或交通便利的地区，该地区可以容纳该区域。"
 CHI_bri_can_host_telecom: "我们控制着一个可以建设网络的地区"
 CHI_bri_can_request: "中国正在接受“一带一路”项目申请，并有一个空余项目名额。"
 CHI_bri_clear_loan_tt: "他们未偿还的“一带一路”债务被§G注销§!。"
 CHI_bri_has_reclaimable_structure: "他们拥有一个我们可以参与的“一带一路”项目。"
 CHI_bri_monthly_income_base: "“一带一路”基础每月贡献"
 CHI_bri_monthly_income_base_desc: "国家预算中，各部门在发放奖金前，按重点和决策拨给“一带一路”基金的份额。"
 CHI_bri_monthly_income_total: "“一带一路”每月贡献"
 CHI_bri_monthly_income_total_desc: "每月拨付给“一带一路”基金的总额：承诺的基本金额加上任何部门加成。"
 CHI_bri_refuse_concession_tt: "我们将继续§R背负债务§!，并保持违约状态。"
 CHI_bri_returns_multiplier_base: "“一带一路”回报乘数"
 CHI_bri_returns_multiplier_base_desc: "对于每个已完成的“一带一路”项目，国际投资回报中国账簿均可获得加成。"
 CHI_bri_unlock_tt: "§Y一带一路：§!§G6§!项目槽，每个项目§G40§!，§G+8§!每月贡献，每个已完工项目的国际投资§G+4§!"
 CHI_Write_Off_Debts_tt: "所有符合条件的合作伙伴的“一带一路”债务均被全额§G免除§!。"
 CHI_bri_forum_surge: "“一带一路”论坛热潮"
 CHI_bri_forum_surge_desc: "在三年一度的论坛上签署的承诺使北京在未来三年内可以同时推进两个新项目。随着更多名额的开放，任何时候都可以有更多的伙伴国家参与建设。"
 CHI_bri_partner_1: "“一带一路”参加者"
 CHI_bri_partner_1_desc: "首个“一带一路”项目已经破土动工。中国建筑队加快国内建设步伐，为政府的发展议程增添了可信度。"
 CHI_bri_partner_2: "“一带一路”伙伴"
 CHI_bri_partner_2_desc: "第二个“一带一路”项目已经竣工。中国的工程和基础设施融资正日益成为国家发展规划中不可或缺的一部分。"
 CHI_bri_partner_3: "“一带一路”战略伙伴"
 CHI_bri_partner_3_desc: "目前，多个“一带一路”项目正在全国各地推进。中国承包商、信贷额度和政治支持增强了国家能力，北京方面则期望以此换取外交上的合作。"
 CHI_bri_partner_4: "“一带一路”锚点国"
 CHI_bri_partner_4_desc: "“一带一路”投资支撑着国民经济。中国资本为建设和消费供给提供资金，如今这种依赖性很难在不造成严重破坏的情况下解除。"
 CHI_bri_partner_5: "“一带一路”关键伙伴"
 CHI_bri_partner_5_desc: "中国是“一带一路”的支柱之一。中国的标准、承包商和融资渠道渗透到每一个主要走廊，经济政策的制定也以北京为中心。"
 CHI_bri_presence_modifier: "“一带一路”全球影响力"
 CHI_bri_presence_modifier_desc: "中国目前的实力得益于其“一带一路”倡议网络。中国的实力随着伙伴国数量的增加以及各国参与程度的加深而增强。"
 CHI_bri_presence_modifier_tt: "随§Y$CHI_bri_global_presence$§!变化：所有“一带一路”伙伴国的综合排名。"
 CHI_bri_claim_resource_rights: "宣称资源开采权"
 CHI_bri_claim_resource_rights_desc: "以实物支付。债务人转让长期开采和出口权，以此偿还贷款，但放弃对其自身资源基地的控制权。仅适用于掠夺性贷款路径。"
 CHI_bri_project_mission: "一带一路建设"
 CHI_bri_project_mission_desc: "中国的承包商和融资方正在推进§Y[GetBRIProjectName]§!项目。项目建成后，我们将从中受益，我们的合作伙伴等级将提升，而北京将获得回报。"
 CHI_bri_raise_contribution: "增加“一带一路”建设资金"
 CHI_bri_raise_contribution_desc: "每月应将国家预算中更大比例的资金拨给“一带一路”建设基金。国库预先支付建设费用，项目收益无法补充，因此增加基金规模是持续建设的唯一途径。"
 CHI_bri_raise_contribution_tt: "§Y$CHI_bri_monthly_income$§!：§G+4§!每月"
 CHI_bri_resource_concession_idea: "中国资源特许权"
 CHI_bri_resource_concession_idea_desc: "一笔“一带一路”贷款违约后，通过放弃开采和出口权的方式予以偿付。中国企业开采这些矿藏，而收益在征税前就流出国外。这项特许权一直有效，直到偿还的债务被回购为止。"
 CHI_BRI_project_missions: "“一带一路”项目"
 CHI_BRI_project_missions_desc: "目前正在我国建设的“一带一路”项目，均由中国承包商出资建设。"
 CHI_BRI_automation_disable: "禁用“一带一路”自动化"
 CHI_BRI_automation_disable_desc: "恢复对“一带一路”项目申请的人工审核流程。每份申请都将作为独立事件提交，由中方逐一审查并批准或驳回。已提交审核的申请将继续沿用之前的审核流程。"
 CHI_BRI_automation_enable: "启用“一带一路”自动化"
 CHI_BRI_automation_enable_desc: "自动审批所有“一带一路”项目申请，无需逐一审核。申请人在提交申请前已通过资格审查并获得空余项目名额，因此自动化流程可直接跳过纸质申请环节。已提交待审核的申请将继续沿用原有的审批流程。"
 CHI_bri_committed_projects: "“一带一路”已承诺项目"
 CHI_bri_committed_projects_desc: "已启动的“一带一路”项目以及正在等待审核的申请项目。每个待审核的申请项目都预留一个项目名额。"
