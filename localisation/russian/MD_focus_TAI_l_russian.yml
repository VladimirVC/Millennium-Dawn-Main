l_russian:
 TAI_legacy_of_1949: "Наследие 1949 года"
 TAI_legacy_of_1949_desc: "После окончания Гражданской войны в Китае в 1949 году националисты Гоминьдана (КНП) и их сторонники бежали в островную провинцию Тайвань. Наследие этого события в сочетании с местным нативистским тайваньским движением привело к решительному неприятию воссоединения с материком большинством тайваньских граждан."
 TAI_the_great_chip_empire: "Великая чиповая империя"
 TAI_the_great_chip_empire_desc: "Воспользовавшись преимуществом на ранних этапах производства полупроводников и микрочипов и будучи более привлекательным направлением для инвестиций, чем другие страны, Тайвань вырвался на передовые позиции в этой отрасли. Благодаря дешёвому, эффективному производству и крупным объёмам экспорта в западные страны, Тайвань сбалансировал свою экономику и национальную безопасность, став поставщиком микрочипов для западного мира, и продолжает оставаться лидером отрасли благодаря постоянным и регулярным инновациям."
 TAI_flight_crew_strike: "Забастовка профсоюза бортпроводников Таоюань"
 TAI_flight_crew_strike_desc: "Никаких результатов! Никаких остановок!"