 increases_cb_rate_tooltip: "Raise the §YPolicy Rate§! by 1pp, tightening monetary conditions.\n\n§YEffects:§!\nQuarterly inflation suppressed by an additional §G0.3%§! per quarter\nSovereign debt interest rate increased by §R0.5pp§!\n\n§YPrerequisites:§!\n£pol_power_icon §Y25§! Political Power\nPolicy Rate below 20%\nNo rate change in the last 60 days"
