 JAP_military_decision_category: "[JAP.GetAdjectiveCap] の軍事"
 JAP_consolidate_national_defense_framework_mission: "国防体制の統合"
 JAP_consolidate_national_defense_framework_mission_desc: "より広範な防衛態勢への移行は、指揮系統、計画プロセス、法的責任の面で不確実性を生み出した。国防体制を統合することで、日本は徐々に整合性を回復し、改革によって生じた混乱を抑えていく。"
 JAP_modernize_joint_command_mission: "統合指揮体制の近代化"
 JAP_modernize_joint_command_mission_desc: "陸・海・空、そして新たな領域を統一された統合指揮の下に統合するには、時間と訓練、そして組織改革が必要だ。新たな手順が試行され改良されるにつれ、摩擦は徐々に減少し、日本の武装戦力の有効性は向上していく。"
 JAP_JAP_normalize_defense_procurement_mission: "防衛調達体制の正常化"
 JAP_JAP_normalize_defense_procurement_mission_desc: "防衛上の責務の拡大は、既存の調達体制と産業上の取り決めに大きな負担をかけている。慎重な改革、長期計画、そして産業界とのより緊密な連携を通じて、日本は防衛調達を正常化し、移行期の非効率を減らそうとしている。"
 JAP_establish_asterioid_mining_network_mission: "小惑星採掘ネットワークの確立"
 JAP_establish_asterioid_mining_network_mission_desc: "日本は初の小惑星採掘ネットワークを構築しており、軌道プラットフォームを配置し、地球外の資源開発が形を成し始める中で探査機材を展開している。"
 JAP_asteroid_mining_light_operation: "軽規模天体調査"
 JAP_asteroid_mining_light_operation_desc: "日本は小規模な小惑星調査を実施し、探査機が利用可能な鉱石を求めて天空を探る中で、祖先の霊の導きを仰いでいる。"
 JAP_asteroid_mining_medium_operation: "中規模神聖採掘ミッション"
 JAP_asteroid_mining_medium_operation_desc: "より大規模な遠征隊が小惑星帯の奥深くへと進出し、日本が価値ある地球外金属を求める中で、神話的象徴を拠り所として任務の士気を鼓舞している。"
 JAP_asteroid_mining_heavy_operation: "大規模天界採掘遠征"
 JAP_asteroid_mining_heavy_operation_desc: "全面的な小惑星採掘計画が始動し、日本が豊かな天体資源の回収に努める中で、天上の鍛冶場の物語が重ね合わされている。"
 JAP_mars_mission_program_mission: "火星植民地の設立"
 JAP_restore_guarantee: "米国の安全保障保証の回復を要請"
 JAP_restore_guarantee_desc: "地域の緊張が高まり、長期的な安全保障への疑念が強まる中で、政府内の一部は、米国からの新たで明確な安全保障保証を求めねばならないと主張している。これには防衛政策や憲法第9条の解釈に関する政治的な譲歩が必要となる可能性が高いが、それが戦略的安定の代償となるのかもしれない。"
 JAP_remove_american_blockade: "米海軍の圧力の終結を要請"
 JAP_remove_american_blockade_desc: "主要な海上交通路周辺における米海軍の存在感の増大は、国内外で緊張の火種となっている。外交ルートは、この圧力の縮小または終結を交渉するために引き続き開かれているが、その見返りとしてワシントンは、より深い安全保障上の関与と、憲法第9条に対する姿勢のさらなる調整をほぼ確実に求めてくるだろう。"
 JAP_restore_trade_relations: "米国との貿易正常化を要請"
 JAP_restore_trade_relations_desc: "米国が課している関税や特定の貿易措置は、我が国の輸出業者に打撃を与え、同盟への信頼を損ないつつある。ワシントンと直接交渉することで経済関係を正常化できる可能性はあるが、実質的な緩和は、安全保障協力の再強化と、憲法第9条のより広い解釈に結び付けられる可能性が高い。"
 USA_demand_japanese_article_9_interpretation: "日本の憲法第9条解釈の拡大を要求"
 USA_demand_japanese_article_9_interpretation_desc: "日本は急速に変化する安全保障環境において依然として重要な同盟国だが、現行の憲法第9条解釈は実質的な負担分担を制約している。東京に対し、自衛の理解を拡大するよう正式に迫ることで、より深い協力と、より有能なパートナーを促すことができる——ただし、それは日本国内での反発や、同盟内の摩擦を招く危険も伴う。"
 JAP_chinese_agression_five: "高まる中国の攻勢"
 JAP_chinese_agression_five_desc: "地域における近年の中国の行動は、我々の防衛計画担当者の懸念を高めている。状況はまだ臨界点に達してはいないが、傾向は明白だ。北京は着実に姿勢を強硬化させている。政策担当者は、日本がさらなる不安定化を招く展開の可能性に備えなければならないと警告している。"
 JAP_chinese_agression_five_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R5§!"
 JAP_chinese_agression_ten: "強まる中国の圧力"
 JAP_chinese_agression_ten_desc: "中国は地域における軍事的・地政学的圧力を強めている。哨戒の侵入、領空への挑戦、攻撃的な言辞はいずれも大幅に増加した。これらの事案の頻度が高まっていることは、日本の決意を試し、地域の均衡を作り替えようとする意図的な戦略を示唆している。"
 JAP_chinese_agression_ten_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R10§!"
 JAP_chinese_agression_twelve: "憂慮すべき中国の活動"
 JAP_chinese_agression_twelve_desc: "北京の最近の行動は、憂慮すべきエスカレーションを示している。情報報告によれば、海軍の展開増加、係争水域付近での軍事演習、そして日本を直接狙った政治的メッセージが確認されている。情勢はますます不安定化しており、より強硬な国家的対応を求める声が強まっている。"
 JAP_chinese_agression_twelve_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R12§!"
 JAP_chinese_agression_fourteen: "深刻な中国の挑発"
 JAP_chinese_agression_fourteen_desc: "中国は、常態的な圧力の範囲を超える複数の攻撃的措置を取っている。戦略的資産が日本領土の近傍に展開され、周辺海域への侵入は新たな頻度に達している。防衛当局者は、日本が安全保障態勢の一部を再考する必要があるかもしれないと警告している。"
 JAP_chinese_agression_fourteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R14§!"
 JAP_chinese_agression_sixteen: "危険な中国のエスカレーション"
 JAP_chinese_agression_sixteen_desc: "地域情勢はますます危険度を増している。中国の軍事行動は、いまや日本を直接威圧することを狙ったものに見え、北京の宣伝チャネルもより強硬な論調を採っている。誤算によって危機が引き起こされる可能性は、急激に高まっている。"
 JAP_chinese_agression_sixteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R16§!"
 JAP_chinese_agression_eighteen: "重大な中国の軍事的圧力"
 JAP_chinese_agression_eighteen_desc: "中国の攻撃的姿勢は重大な段階に達した。主要な海上区域は常時圧力にさらされ、航空侵入は前例のない水準にまで増加しており、地域のパートナー諸国も警鐘を鳴らしている。東京の政策担当者の間では、憲法第9条の解釈を含め、日本が防衛戦略を再評価しなければならないという主張が強まっている。"
 JAP_chinese_agression_eighteen_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R18§!"
 JAP_chinese_agression_twenty: "深刻な地域危機：中国の攻勢が頂点に到達"
 JAP_chinese_agression_twenty_desc: "情勢は全面的な地域危機へと発展した。中国は日本領土の近傍で大規模な軍事展開を行い、さらなるエスカレーションも辞さない意思を示している。国家安全保障への脅威はもはや仮定ではない——日本は、自らの軍事態勢と自衛隊の役割に関する歴史的な決断を迫り得る、直接的な挑戦に直面している。"
 JAP_chinese_agression_twenty_tt: "§Y[CHI.GetFlag][CHI.GetAdjectiveCap] Aggression§! at least §R20§!"
 JAP_world_tension_high: "安全保障態勢の見直し"
 JAP_world_tension_high_desc: "世界的な不安定化の高まりは、日本に対し防衛政策を再評価し、国際秩序の変化の可能性に備えることを求めている。"
 JAP_world_tension_high2: "地域有事への備え"
 JAP_world_tension_high2_desc: "世界はますます危険になっている。日本は国家安全保障を確保し、戦略的即応態勢を維持するための具体的な措置を講じなければならない。"
 JAP_world_tension_high3: "国家安全保障措置の発動"
 JAP_world_tension_high3_desc: "世界的緊張は重大な水準に達した。日本は国益を守り、地域の安定を維持するために、今や特別な措置を検討しなければならない。"
 JAP_article_nine_protests_appeal: "防衛強化デモへの対応"
 JAP_article_nine_protests_appeal_desc: "広範な防衛強化デモは、より強い軍事能力と、より強硬な安全保障態勢を求めている。これらの要求に応え、憲法第9条の解釈を拡大することで、政府は世論の圧力を利用し、より積極的な国防政策を正当化できる。"
 JAP_article_nine_protests_appeal_tt: "§YProtest Strength§! is at least §R50§!"
 JAP_article_nine_protests_appeal_tt2: "[JAP.GetName] は§Y期待される軍事法§!を有していない"
 JAP_article_nine_military_parties: "親軍派政党を活用"
 JAP_article_nine_military_parties_desc: "政府内の親軍派政党は、より強い国防と、憲法第9条のより広い解釈を推し進めている。彼らのアジェンダに歩調を合わせることで、政府は軍事改革を進め、より高い防衛即応度を正当化できる。"
 JAP_article_nine: "憲法第9条の解釈"
 JAP_article_nine_left_side: "厳格な平和主義"
 JAP_article_nine_level_one: "レベルI：平和主義的解釈"
 JAP_article_nine_level_two: "レベルII：防衛的解釈"
 JAP_article_nine_level_three: "レベルIII：協調防衛"
 JAP_article_nine_level_four: "レベルIV：集団的自衛権"
 JAP_article_nine_level_five: "レベルV：拡大された軍事的役割"
 JAP_article_nine_right_side: "積極防衛"
 JAP_great_east_japan_earthquake_decision: "復興への道"
 JAP_great_east_japan_earthquake_decision_desc: "2011年3月11日、東日本大震災は未曾有の揺れと津波によって日本を襲い、近代史に例のない破壊をもたらした。東北から関東に至るまで広大な地域が打撃を受け、交通網は麻痺し、経済活動は停止し、無数の人々の暮らしが一変した。共同体と産業は土台を失い、国家全体が混乱と不確実性の渦中に投げ込まれた。\n\nこの災害は単なる物理的破壊にとどまらなかった。国民の心理に深い傷跡を刻み、社会にその基盤そのものの再考を迫った。いま日本は岐路に立ち、復旧と再生という巨大な課題を担っている。被災地の再建、産業の回復、そして人々の生活と絆の再生は、国家にとって避けがたい責務である。\n\nこの取り組み――「復興への道」――は長く険しいものとなるだろう。しかし、この逆境を乗り越えてこそ、日本は新たな未来を切り開くことができる。"
 JAP_tohoku_infrastructure_decision: "東北インフラ復旧"
 JAP_tohoku_infrastructure_decision_desc: "震災で破壊されたインフラを、一歩ずつ再建していかなければならない。道路、鉄道、港湾――地域経済と日常生活の基盤を復旧させることが、復興への第一歩となる。"
 JAP_kanto_infrastructure_decision: "関東インフラ復旧"
 JAP_kanto_infrastructure_decision_desc: "震災で被害を受けたインフラを、一歩ずつ再建していかなければならない。道路、鉄道、港湾――地域経済と日常生活の基盤を復旧させることが、復興への第一歩となる。"
 JAP_tohoku_communication_decision: "東北の通信復旧"
 JAP_tohoku_communication_decision_desc: "災害で被害を受けた通信インフラは、復興と日常生活に不可欠である。地域社会を再びつなぎ、経済を活性化させるため、段階的に復旧を進めなければならない。"
 JAP_kanto_communication_decision: "関東の通信復旧"
 JAP_kanto_communication_decision_desc: "災害で被害を受けた通信インフラは、復興と日常生活に不可欠である。地域社会を再びつなぎ、経済を活性化させるため、段階的に復旧を進めなければならない。"
 JAP_tohoku_industrial_recovery_decision: "東北の産業再生"
 JAP_tohoku_industrial_recovery_decision_desc: "災害で停滞した地域産業を復活させることは、経済復興に不可欠である。民生産業を立て直すことで雇用を生み出し、生産基盤を強化できる。"
 JAP_kanto_industrial_recovery_decision: "関東の産業再生"
 JAP_kanto_industrial_recovery_decision_desc: "災害で停滞した地域産業を復活させることは、経済復興に不可欠である。民生産業を立て直すことで雇用を生み出し、生産基盤を強化できる。"
 JAP_domestic_policy_decision: "[JAP.GetFlag][JAP.GetAdjective]の国内政策ディシジョン"
 JAP_focus_renewable_energy_decision: "再生可能エネルギーを重視"
 JAP_focus_renewable_energy_decision_desc: "原子力の安全性への懸念が高まる中、太陽光や風力などの再生可能エネルギーへの投資を拡大することは、エネルギー源の多様化と輸入燃料への依存低下につながる。"
 JAP_focus_thermal_power_decision: "火力発電所重視"
 JAP_focus_thermal_power_decision_desc: "原子力の安全性への懸念がある中で、石炭・石油・天然ガス発電所を拡充することは、より即効性があり信頼できる電力供給源を国内に確保する。"
 JAP_expand_national_oil_stockpiles: "国家石油備蓄の拡充"
 JAP_expand_national_oil_stockpiles_desc: "日本は、封鎖、禁輸、あるいは価格高騰によって締め上げられる余裕はない。国家石油備蓄を拡充し、貯蔵施設の防護を強化し、燃料配分計画を引き締めることで、国家が危機を混乱なく乗り切れるようにする。"
 JAP_saudi_aramco_crude_storage: "サウジアラムコ原油貯蔵の確保"
 JAP_saudi_aramco_crude_storage_desc: "サウジアラムコを通じて専用の原油貯蔵を確保し、供給を安定させ、急激な市場変動へのさらされやすさを低減する。長期的な利用権と予測可能な引き渡しを固定することで、日本は戦略的な余裕を手にする。"
 JAP_overseas_upstream_equity: "海外上流権益の確保"
 JAP_overseas_upstream_equity_desc: "エネルギー安全保障は、契約を持つだけでなく、油井そのものの権益を保有しているときにより強固になる。我々は供給を固定し、交渉における影響力を得て、政治的圧力への脆弱性を低減するため、海外における上流権益の取得を進める。"
 JAP_minamitori_deep_sea_trial: "南鳥島深海実証試験"
 JAP_minamitori_deep_sea_trial_desc: "南鳥島近海の海底には、これを安定して採取できるなら、日本の戦略的立場を変え得る資源が眠っている。我々は実条件下で装備、物流、処理工程を試験するため、深海実証試験を開始し、理論を能力へと変える。"
 JAP_minamitori_deep_sea_trial_tt: "§Y特別計画$sp_deep_sea_mining$§!を完了したとき、より多くの資源を得る"
 JAP_mitsubishi_escrap: "三菱電子スクラップ構想"
 JAP_mitsubishi_escrap_desc: "最もクリーンな資源は、すでに我々の国境内にある資源だ。我々は三菱主導の電子スクラップ回収を支援し、廃棄された電子機器から希少金属を取り出して、重要産業のための国内供給循環を構築する。"
 JAP_kosaka_tsl_furnace: "小坂TSL炉の拡張"
 JAP_kosaka_tsl_furnace_desc: "製錬処理は採掘と同じくらい戦略的に重要だ。我々は小坂TSL炉の処理能力を拡張し、複雑なスクラップや混合精鉱を処理して、本来なら失われるはずの重要金属を回収する。"
 JAP_green_ship_recycling: "グリーンシップリサイクル"
 JAP_green_ship_recycling_desc: "艦隊は建造されるだけではなく、解体もされ、その鋼材は国家へ戻らなければならない。我々は高付加価値資材を安全かつ効率的に回収するため、環境配慮型の船舶解体基準と処理能力を整備する。退役したすべての船体は、次の船のための資源となる。"
 JAP_horizontal_recycling_expansion_decision: "水平リサイクルの拡大"
 JAP_horizontal_recycling_expansion_decision_desc: "強靭性は、あらゆる産業の流れを供給線へと変えることから生まれる。我々は回収された金属や部品を部門横断的に移す水平リサイクルを拡大し、造船、電子産業、防衛生産に国内資材を供給する。"
 JAP_rubber_butadience_brench_decision: "ブタジエン系合成ゴム部門"
 JAP_rubber_butadience_brench_decision_desc: "天然ゴムは、遮断され、配給制に置かれ、あるいは価格高騰によって弱体化の要因となり得るものであり、日本はそのような梃子を許すことはできない。我々はタイヤ、シール材、そして産業と軍のための重要部品を確保するため、ブタジエン系の合成ゴム部門を拡大する。"
 JAP_bibi_world_decision: "ラピダスIIM-1「美々ワールド」工場整備"
 JAP_bibi_world_decision_desc: "日本国内で次世代半導体の生産能力を確保するため、ラピダスIIM-1「美々ワールド」工場の整備を加速させる。"
 JAP_yufutsu_oil_expansion_decision: "勇払油田拡張"
 JAP_yufutsu_oil_expansion_decision_desc: "国内供給を強化し、外部の混乱へのさらされやすさを低減するため、勇払油田を拡張する。"
 JAP_nankai_through_decision: "南海トラフ天然ガス開発"
 JAP_nankai_through_decision_desc: "国内の天然ガス供給源を確保し、海上輸送の混乱や海外の価格高騰へのさらされやすさを低減するため、南海トラフの開発を進める。"
 JAP_toray_expansion_program_decision: "東レ拡張計画"
 JAP_toray_expansion_program_decision_desc: "東レの先端材料生産規模を拡大し、日本にとって最も重要な産業基盤を強化する。"
 JAP_teijin_aerospace_prepreg_decision: "帝人航空宇宙用プリプレグ"
 JAP_teijin_aerospace_prepreg_decision_desc: "帝人の航空宇宙級プリプレグ生産能力を拡大し、現代の機体と高性能防衛システムを支える複合材の基盤を確保する。"
 JAP_demand_south_kuril: "南クリル諸島の要求"
 JAP_demand_south_kuril_desc: "東京は南クリル諸島の返還を正式に要求する。モスクワは緊張の激化を避けるために譲歩するかもしれないし、拒否して危機を招くかもしれない。"
 JAP_demand_north_kuril: "北クリル諸島の要求"
 JAP_demand_north_kuril_desc: "日本は、より広範な帝国復興構想の一環として、北クリル諸島の返還を要求する。拒否は、さらなる緊張激化を正当化する材料として利用され得る。"
 JAP_demand_sakhalin: "樺太の要求"
 JAP_demand_sakhalin_desc: "日本は樺太の返還を要求する。ソビエト政府がこの要求を拒否した場合、東京は自制、限定的衝突、あるいは戦争のいずれかを選ぶことになる。"
 JAP_peaceout_russia: "ロシアとの和平交渉"
 JAP_peaceout_russia_desc: "我々はロシアとの講和を強行し、我々の条件で戦争を終結させ、獲得したものを確保する。これは軍事的決定であると同時に政治的決定でもあり、モスクワが立て直す前に、新たな現実を条約に固定するものだ。ロシアが受諾すれば、戦闘は終わり、地図は恒久的に変わる。"
 JAP_claiming_south_korea: "朝鮮に対する権利主張"
 JAP_claiming_south_korea_desc: "我々は朝鮮を日本の安全保障と歴史的権限の問題として位置づけ、曖昧さを明確な権利主張へと変える。これは身振りではない。我々の戦略的前線は対馬海峡で終わらないという宣言である。いったんこの主張がなされれば、今後のあらゆる交渉は我々の条件から始まることになる。"
 JAP_claiming_north_korea: "朝鮮北部問題の規定"
 JAP_claiming_north_korea_desc: "平壌の政権は隣国ではなく、我々の海と都市を脅かす恒久的危機である。我々は朝鮮半島北部の将来を形作る日本の権利主張を正式化し、これを他国に委ねることのできない安全保障問題として扱う。いったん宣言されれば、北部は日本の条件で管理されるべき問題となる。"
 JAP_claiming_taiwan: "台湾に対する我々の権限の再主張"
 JAP_claiming_taiwan_desc: "台湾は第一列島線の要衝であり、我々の海上安全保障の要でもある。我々はこの島に対する日本の権限を再主張し、その地位を遠方の勢力が決めるべき問題ではなく、戦略的必要性として位置づける。いったん宣言されれば、日本は台湾の将来を自国の将来と切り離せないものとして扱う。"
 JAP_claiming_phillipines: "フィリピン諸島に対する領有主張"
 JAP_claiming_phillipines_desc: "フィリピン諸島は西太平洋への接近路と、我々の産業を支える海上交通路を押さえている。我々は正式な領有主張を行い、他国がどう考えようと、これらの島々が日本の戦略圏に属することを明確にする。いったん宣言されれば、誰がこの海域を航行するかは日本海軍が決定するということをこの地域は理解することになる。"
 JAP_claiming_malaysia: "マラヤに対する権利主張"
 JAP_claiming_malaysia_desc: "マラヤは、この地域の交易と燃料の流れを左右する重要な海峡と補給路にまたがって位置している。我々は正式な権利主張を行い、その地位を日本の安全保障と海上秩序の問題として位置づける。いったん宣言されれば、あらゆる交渉は我々の権限を前提として始まることになる。"
 JAP_claiming_indonesia: "インドネシアに対する統治権の主張"
 JAP_claiming_indonesia_desc: "インドネシアは、インド洋と太平洋を結びつける島々と海上の要衝を支配している。我々はこの諸島に対する統治権を主張し、その海上交通路と資源を日本にとっての戦略的必需として扱う。この地域に秩序をもたらすためには、東京からの介入が不可欠である。"
 JAP_claiming_vietnam: "ベトナムに対する関心の表明"
 JAP_claiming_vietnam_desc: "ベトナムは南シナ海の縁を押さえており、その沿岸全体の均衡を左右し得る拠点を有している。。我々は日本の利害関係を宣言し、その進路が我々抜きで決められることはないと明確にする。影響力は確実性から始まり、確実性は主張から始まる。"
 JAP_claiming_cambodia: "カンボジアへの圏域拡大"
 JAP_claiming_cambodia_desc: "カンボジアは小国だが、その地理は大陸部東南アジアにおいて回廊であり、緩衝地帯であり、梃子でもある。我々は我々の主張を拡大し、その将来をより広い日本の圏域に結びつける。地図の上では小さく見えるものが、この地域の安定を左右し得る。"
 JAP_claiming_laos: "メコン内陸部の領有主張"
 JAP_claiming_laos_desc: "ラオスは陸路、河川、そして沿岸の背後に広がる静かな内陸の縦深を支配している。我々はメコン内陸部を大陸における我々の安全保障の一部として主張し、競合勢力がそれを我々の圏域への裏口として利用できないようにする。支配とは港湾だけでなく、回廊をも支配することである。"
 JAP_claiming_australia: "オーストラリアに対する領有主張"
 JAP_claiming_australia_desc: "オーストラリアは太平洋の南方の要であり、艦隊、航空戦力、そして長期戦の兵站を収容できる大陸である。我々は領有主張を宣言し、南方の接近路が日本の戦略的到達圏の外にとどまることはないと示す。南方が確保されれば、海洋はそれに続く。"
 JAP_claiming_new_zealand: "南方外縁諸島の領有主張"
 JAP_claiming_new_zealand_desc: "ニュージーランドは遠方にあるかもしれないが、太平洋が争奪の場となったときには重要な航路上に位置している。我々は南方外縁諸島に対する領有主張を行い、競合勢力が我々の手の届かない安全な後背地を持つことを許さない。他国が保持すれば、遠方の島々でさえ武器となる。"
 JAP_claiming_myanmar: "イラワジ門戸の支配主張"
 JAP_claiming_myanmar_desc: "ミャンマーは海洋を結ぶ陸橋であり、この地域の内陸部への門戸でもある。我々は権利主張を行い、その港湾、回廊、飛行場を日本の圏域に属する戦略資産として扱う。門戸を握る者が、誰が入るかを決める。"
 JAP_demand_palau: "パラオの要求"
 JAP_demand_palau_desc: "パラオは小さな島嶼群だが、海軍計画においては大きな存在感を持ち、停泊地、監視拠点、そして行動範囲を提供する。我々は日本の権威への服属を要求し、これを太平洋秩序の前方拠点として確保する。地図を形作るのは演説ではなく基地である。"
 JAP_demand_micronesia: "ミクロネシアの要求"
 JAP_demand_micronesia_desc: "ミクロネシアは、艦隊や航空戦力の飛び石のように中央太平洋に横たわっている。我々は航行路を確保し、競合勢力が我々の海洋で前進拠点を得ることを防ぐため、その支配を要求する。いったん確保されれば、これらの島々は距離を優位へと変える。"
 JAP_demand_nauru: "ナウルの要求"
 JAP_demand_nauru_desc: "ナウルは小さいが、このような島々は広大な海域における監視範囲と接近路を左右する。我々は日本への従属を要求し、これを我々の前哨拠点網に組み込む。海洋の時代において、無関係な島は一つもない。"
 JAP_demand_kiribati: "キリバスの要求"
 JAP_demand_kiribati_desc: "キリバスは、偵察、補給、そして阻止行動を支え得る重要な接近路にまたがっている。我々は日本の指導への服属を要求し、これらの島々を我々のより広い外周線の一環として確保する。太平洋は、一つずつ着実に組織化されていく。"
 JAP_demand_marshall_islands: "マーシャル諸島の要求"
 JAP_demand_marshall_islands_desc: "マーシャル諸島は、飛行場、兵站、そして中央太平洋の航路支配のための空間を提供する。我々はそれらを日本の圏域へ移譲するよう要求し、艦隊行動のための要塞化された飛び石へと変える。これらの環礁を握る者は、戦域全体を左右し得る。"
 JAP_demand_tuvalu: "ツバルの要求"
 JAP_demand_tuvalu_desc: "ツバルは土地こそわずかしか持たないが、存在感を持ち、その存在感が制海権を左右する。我々はツバルの従属を要求し、これを南太平洋における監視拠点および中継地点として確保する。たとえ小さな島であっても、防衛線を構築する上で重要な役割を果たすことができるのだ。"
 JAP_demand_solomon_islands: "ソロモン諸島の要求"
 JAP_demand_solomon_islands_desc: "ソロモン諸島は南西太平洋における天然の障壁であり、前進拠点でもあり、飛行場や海軍の掩護に理想的である。我々は日本への服属を要求し、そこを通過する航路を封鎖する。ここを支配することは、移動を支配することを意味する。"
 JAP_demand_guinea: "ニューギニアの要求"
 JAP_demand_guinea_desc: "ニューギニアは、東南アジアと太平洋の間の接近路を支配する、大陸規模の堡塁である。我々はその移譲を要求し、これを航空戦力、兵站、そして前方防衛の要塞へと変える。ニューギニアが確保されれば、南方戦域は我々の意思に従うことになる。"
 JAP_demand_vanuatu: "バヌアツの要求"
 JAP_demand_vanuatu_desc: "バヌアツは、南西太平洋への補給と展開にとって重要な航路上に位置している。我々は日本への従属を要求し、これを我々の基地網へ組み込む。島々の連鎖は、一体として保持されるとき、壁となる。"
 JAP_demand_fiji: "フィジーの要求"
 JAP_demand_fiji_desc: "フィジーは南太平洋の中核拠点であり、広範な範囲にわたる艦隊兵站と航空作戦を支えることができる。我々は日本への服属を要求し、これを我々の南方外周線の要石として確保する。フィジーが我々のものとなれば、この地域の均衡は変わる。"
 JAP_demand_samoa: "サモアの要求"
 JAP_demand_samoa_desc: "サモアは、中央太平洋と南方の接近路を結ぶ航路上に位置している。我々はサモアの日本への従属を要求し、その港湾と飛行場を我々のより広い外周線に組み込む。海洋帝国においては、遠方の島々でさえ決定的な意味を持つ。"
 JAP_demand_tonga: "トンガの要求"
 JAP_demand_tonga_desc: "トンガは南太平洋における戦略的足場であり、広大な海域にわたる動きを監視するための拠点でもある。我々は日本の指導へのトンガの服属を要求し、これを我々の南方支配線の一部として確保する。我々の海上交通路において、中立は許される贅沢ではない。"
 JAP_demand_american_islands: "米領諸島の要求"
 JAP_demand_american_islands_desc: "アメリカが保有する島々は単なる領土ではなく、我々の海洋へ戦力を投射する前方基地である。我々はそれらの移譲、あるいは日本の権威の下での中立化を要求し、ワシントンが我々の目と鼻の先に前進拠点を持つことを許さない。太平洋に秩序を打ち立てるのであれば、外国の足場は取り除かれなければならない。"
 JAP_demand_french_islands: "仏領諸島の要求"
 JAP_demand_french_islands_desc: "フランスの島嶼保有地は、太平洋における外国勢力の存在に展開力、港湾、そして外交上の隠れ蓑を与えている。我々はそれらの日本への服属を要求し、前哨拠点と回廊の我々の網へ組み込む。我々の圏域が遠方の帝国によって穴だらけにされることは許されない。"
 JAP_demand_british_islands: "英領諸島の要求"
 JAP_demand_british_islands_desc: "イギリスの島嶼保有地は旧来の秩序の残滓ではあるが、なおも重要な航路にまたがって基地と影響力を提供している。我々はそれらを日本の圏域へ移譲するよう要求し、我々の海上外周線にあるもう一つの空隙を塞ぐ。太平洋は我々、ただ一つの権威の下で組織されることになる。"
 JAP_imperial_procurement_standardization: "帝国調達基準の標準化"
 JAP_imperial_procurement_standardization_desc: "調達規則を中央集権化し、部品を標準化し、軍全体に共通仕様を徹底する。目標は、生産の迅速化、兵站の簡素化、そして生産上のボトルネックの削減である。"
 JAP_zaibatsu_empowerment_charter: "財閥権限強化憲章"
 JAP_zaibatsu_empowerment_charter_desc: "帝国政府が定める拘束力ある生産目標と引き換えに、選定された産業コングロマリットに拡大された特権を付与する。"
 JAP_neighborhood_associations_system: "隣組制度"
 JAP_neighborhood_associations_system_desc: "世帯の登録、配給の調整、そして迅速な動員支援のため、全国的な地域組織の網を再建する。これは社会統制を強化し、国家の即応性を高める。"
 JAP_state_rites_restoration: "国家儀礼の復興"
 JAP_state_rites_restoration_desc: "国家的儀式と公的儀礼を、国民生活の中核的支柱として復興する。この改革は、帝国の正統性を強化し、復元された秩序への国民の順応を促す。"
 JAP_national_morals_education_act: "国民道徳教育法"
 JAP_national_morals_education_act_desc: "義務、奉仕、そして国家的一体性を軸として公民教育を標準化する。学校は規律を築き、備えを拡充し、復興された国家への忠誠を育むために用いられる。"
 JAP_imperial_rescript_revival: "勅語の復活"
 JAP_imperial_rescript_revival_desc: "国家の正統性を支え、市民の義務を定めるため、公的な勅語を復活させる。復元された秩序は、統一、義務、そして国家的使命への回帰として示される。"
 JAP_north_korean_remilitarized_dmz: "北朝鮮のDMZ緊張激化への対応"
 JAP_north_korean_remilitarized_dmz_desc: "北朝鮮は非武装地帯沿いの陣地を強化した。東京はこの緊張激化を根拠として、安全保障態勢を引き締め、第9条の下での作戦上の裁量を拡大する。"
 JAP_north_korean_increased_nuclear_testing: "北朝鮮の核実験への対応"
 JAP_north_korean_increased_nuclear_testing_desc: "再び加速した核実験のペースは、地域の脅威環境を悪化させている。政府はこれを利用して、第9条のより厳格な解釈を正当化し、即応態勢の強化を加速させる。"
 JAP_north_korean_threats_to_south_korea: "北朝鮮の脅迫への対応"
 JAP_north_korean_threats_to_south_korea_desc: "大韓民国に対する直接的な脅迫は、日本の安全保障圏に波及し得る、より広範な紛争の危険を高める。東京は第9条の解釈を拡大し、抑止計画を強化することができる。"
 JAP_north_korean_road_to_war: "北朝鮮の戦争への進行への備え"
 JAP_north_korean_road_to_war_desc: "情勢は公然たる衝突へと滑り落ちつつある。日本はもはや自制のみに頼ることはできない。第9条の解釈を改めることで、より強固な軍事計画と、より迅速な対応の選択肢が可能となる。"
 JAP_russian_agressiveness: "Respond to Russian Aggressiveness"
 JAP_russian_agressiveness_desc: "Russia's increasingly assertive posture in Northeast Asia is undermining regional stability. Tokyo will use the heightened threat environment to strengthen deterrence and expand operational latitude under Article 9."
 JAP_defence_russian_asian_ambitions: "Counter Russia's Asian Ambitions"
 JAP_defence_russian_asian_ambitions_desc: "Moscow's ambitions in Asia threaten Japan's security environment and the balance of power in the Pacific. Tokyo will harden its defense posture and broaden operational options under Article 9."
 JAP_russian_north_korean_alliance: "Prepare for a Russia North Korea Axis"
 JAP_russian_north_korean_alliance_desc: "Closer alignment between Russia and North Korea would tighten the pressure on Japan from multiple directions. Tokyo will respond by strengthening deterrence and loosening remaining constraints under Article 9."
 JAP_russian_pacific_naval_presence: "Answer Russia's Pacific Naval Buildup"
 JAP_russian_pacific_naval_presence_desc: "Russia's naval posture in the Pacific is becoming more assertive. Japan will use this shift to justify expanded maritime readiness and a more flexible interpretation of Article 9."
 JAP_tookover_sikhalin_mission: "Deadline to Reclaim Lost Teritories"
 JAP_tookover_sikhalin_mission_desc: "Time is running out. If Russia fails to regain the required objectives before the deadline, international pressure and domestic exhaustion will force a settlement. A peace will be signed, and the lost territories will be ceded as the price of ending the war."
 JAP_russia_demands_peace_japan: "Russia Demands Peace"
 JAP_russia_demands_peace_japan_desc: "Moscow is pushing for a settlement to end the conflict, offering peace in exchange for formalizing the new territorial reality. The proposal is not a gesture of goodwill, it is a calculation, trading continued escalation for a deal that locks borders in place. Accepting ends the war, rejecting it signals we intend to press further."
 JAP_russia_demands_peace_russia: "Demand Peace from Japan"
 JAP_russia_demands_peace_russia_desc: "We will demand a settlement with Japan to end the fighting and freeze the situation before it worsens. This is not reconciliation, it is damage control, locking in terms while we still have leverage to force an outcome. If Tokyo refuses, we will know they seek victory, not peace."
 JAP_auto_claiming_tt: "When selecting this decision, it will repeat itself untill all core states are claimed. Then you can demand submission"
 JAP_intellectual_platform_decision: "$JAP_intellectual_platform$"
 JAP_intellectual_platform_decision_desc: "$JAP_intellectual_platform_desc$"
 JAP_declining_birthrate_category: "少子化対策庁"
 JAP_declining_birthrate_category_desc: "2000年前後の日本では、出生数の減少と少子化の進行が、将来の社会基盤を揺るがしかねない課題として強く意識され始めている。晩婚化・未婚化、子育てと就労の両立の難しさ、教育・住居を含む家計負担など、要因は一つではなく、短期的な施策だけで解決できる問題でもない。人口構造の変化は労働力、社会保障、地域社会の維持にまで影響を及ぼすため、政府には継続的かつ分野横断的な対応が求められる。\n\nこの課題への取り組みは、子育て支援の拡充、働き方の見直し、家計負担の軽減など、個別の政策を積み重ねることで少しずつ形になっていく。目に見える変化がすぐに現れるとは限らないが、施策の蓄積は社会の土台を着実に変え、出生動向にも中長期的な影響を与えていく。\n\n数年ごとに公表される調査報告では、こうした取り組みの進捗と実効性が改めて点検される。その結果次第では、少子化をめぐる危機感が強まることもあれば、状況の持ち直しや改善の兆しが確認されることもあるだろう。政府がどれだけ粘り強く対策を積み上げられるかが、将来の人口基盤を左右する。\n\n§Y国家方針の$JAP_work_style_reform$、$JAP_basic_policy_declining_birthrate_society$、$JAP_save_ice_age_generation$で補正§G$JAP_declining_birthrate_measures_modifier$§!の数値を上げることで少子化の国民精神の効果を弱めたり削除することができる！§!\n\n§Y少子化の国民精神の変化は§24年§!に一度行われる調査イベントで判定が行われる！一定以上の$JAP_declining_birthrate_measures_modifier$をしていれば国民精神が§G良化§!するが、一定以下であれば§R悪化§!することもある！§!\n\n§Y現在の少子化対策進行状況:§! [?ROOT.modifier@JAP_declining_birthrate_measures_modifier|0]\n\n§Y現状維持目標値:§! 7\n\n§Y改善目標値:§! 14"
 JAP_territorial_disputes: "[JAP.GetNameWithFlag]の領土問題"
 JAP_territorial_disputes_desc: "[JAP.GetName]は現在、近隣諸国との間で、以下の3地域をめぐる領土問題を抱えている。\n\n§Y北方領土（南クリル諸島）§!： [JAP.GetName]は、北海道の北東に位置する択捉島、国後島、色丹島、歯舞群島について、第二次世界大戦後にソ連が占拠したことは不当であるとして領有権を主張し、[SOV.GetName]に対して返還を求め続けている。一方の[SOV.GetName]は同諸島の主権を主張し、実効支配を維持している。\n\n§Y竹島（[KOR.GetAdjective]名：独島）§!： [JAP.GetName]海（東海）に位置するこの島は[JAP.GetName]が領有権を主張しているが、1950年代以降は[KOR.GetName]が実効支配している。この問題は、歴史認識や漁業権などを含む両国間の極めて対立的な争点であり、政治的にも敏感な問題とされている。\n§Y竹島は地図上に表示されるには小さすぎるため、交渉に成功しても領土の獲得はない。しかし、後述の補正は手にすることができる！§!\n\n§Y尖閣諸島（中国名：釣魚島）§!： 東シナ海に位置する無人島群で、1895年以来[JAP.GetName]が実効支配しているが、[CHI.GetName]および[TAI.GetName]も領有権を主張している。1990年代以降、外交的抗議や相互の主張が繰り返され、この問題は将来の緊張の火種となり得る。\n\nこれらの領土問題はいずれも、歴史、国際法、実効支配、外交関係、国内世論と深く絡み合っている。解決には、関係国とのより緊密な関係と相互理解を育むことが求められる。\n\n§Yヒント：対象国からの評価を上げたり、相手国への影響力を高めたりすると、交渉が成功しやすくなる！§!\n\n§Y報酬：交渉に成功すると§G$MODIFIER_STABILITY_FACTOR$§!と§G$agriculture_district_income_tax_modifier$§!の補正を得ることができる！"
 JAP_territorial_disputes_TT: "交渉に成功すると領土問題の解決に加え、§G$MODIFIER_STABILITY_FACTOR$§!と§G$agriculture_district_income_tax_modifier$§!の補正を得ることができる！"
 JAP_dec_negotiations_resolve_northern_territories_dispute: "北方領土問題解決に向けた交渉"
 JAP_dec_negotiations_resolve_northern_territories_dispute_desc: "北方領土をめぐる領土問題は、戦後の[JAP.GetName]-[SOV.GetName]外交における最大級の未解決事項の一つであり続けている。この問題に正面から向き合い、平和的解決を目指すことは、[JAP.GetName]の主権回復と極東地域の安定を確保するうえで極めて重要である。十分な相互信頼と交渉条件が整えば、[SOV.GetName]に対して領土返還を求める正式な外交交渉を開始できる。"
 JAP_dec_negotiations_resolve_senkaku_dispute_china: "[CHI.GetName]との尖閣諸島問題解決に向けた交渉"
 JAP_dec_negotiations_resolve_senkaku_dispute_china_desc: "[CHI.GetName]による尖閣諸島の領有権主張は、[JAP.GetName]-[CHI.GetName]関係における不安定要因となっている。諸島を実効支配する立場にある[JAP.GetName]は、[CHI.GetName]に主張の撤回を促すことで、この問題を外交的に解決することを目指す。必要な相互信頼と国際的影響力が整ったいま、我々は[CHI.GetName]との直接交渉を開始する用意ができている。"
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan: "[TAI.GetName]との尖閣諸島問題解決に向けた交渉"
 JAP_dec_negotiations_resolve_senkaku_dispute_taiwan_desc: "[TAI.GetName]による尖閣諸島の領有権主張は、[JAP.GetName]と[TAI.GetName]の相互信頼と協力にとって潜在的な障害となっている。諸島に対する[JAP.GetName]の実効支配について外交的な承認を得るため、我々はいま、[TAI.GetAdjective]当局との平和的な交渉に入る用意ができている。"
 JAP_dec_negotiations_resolve_takeshima_dispute: "竹島問題解決に向けた交渉"
 JAP_dec_negotiations_resolve_takeshima_dispute_desc: "竹島をめぐる[KOR.GetName]との領土問題は、長年にわたり[JAP.GetName]-[KOR.GetName]関係における大きな障害となってきた。我が国は、冷静かつ誠実な外交を通じた解決を目指し、[KOR.GetAdjective]政府に対して正式に領土交渉を提案する用意がある。"
 JAP_base_okinawa_decision: "沖縄における米軍の将来"
 JAP_base_okinawa_decision_desc: "沖縄には依然として多数の米軍基地が存在し、日本の安全保障体制と地域住民の双方に影響を与えている。\n日本政府はいま、より大きな安全保障上の自律性の確保と、地域負担の軽減を目指し、現行の取り決めを見直す方策を模索している。\n外交的関与を通じて、日米安全保障関係における新たな均衡点を見いだせるかもしれない。\n\nヒント：§Y[USA.GetName]での[JAP.GetName]の影響力§!、§Y[JAP.GetName]での[USA.GetName]の影響力§!が交渉成功率に影響する。また、§Y憲法9条のバランスオブパワーを解決§!したり、§Y軍事支出を$defence_04$以上にする§!ことでも成功率を上げることができる！"
 JAP_negotiation_base_okinawa: "沖縄からの米軍撤退交渉を開始"
 JAP_negotiation_base_okinawa_desc: "国家の安全保障上の自律性を高めるため、日本は沖縄に駐留する米軍部隊の撤退に関する外交交渉を開始する。この動きは、現行の安全保障体制を見直し、変化する地域情勢を踏まえて、より柔軟な枠組みを模索することを目的としている。"
 Japan.101.t: "Postal Dissolution: Putting Our Mandate to the Test"
 Japan.101.d: "郵政民営化をめぐる議論は国会で強い反発に直面し、審議は緊迫の度を増している。党内にも慎重論や反対論が根強く、このまま調整と修正で進めるべきだという声もあれば、いまこそ争点を明確にして国民の判断を仰ぐべきだという声もある。\n衆議院を解散し、総選挙を行えば、改革の是非を正面から問う形になる。一方で、政治日程は一気に選挙へ傾き、政局の緊張は避けられない。\n\n我々は、解散総選挙に踏み切るべきだろうか？"
 Japan.101.a: "衆議院を解散する。"
 Japan.101.b: "解散は見送る"
 Japan.103.t: "左派勢力の台頭"
 Japan.103.d: "景気の停滞や雇用不安、社会保障への懸念が広がる中、再分配や生活支援の拡充を訴える左派勢力への関心が急速に高まっている。既存政治への不満の受け皿として、各地で支持が広がりつつあり、世論調査でも左派政党の伸長が目立ち始めた。今後の政局において、左派の存在感は無視できないものとなるだろう。"
 Japan.103.a: "リベラル勢力に追い風"
 Japan.103.b: "社会民主主義勢力の伸長"
 Japan.103.c: "共産主義勢力の存在感拡大"
 Japan.103.e: "左派ポピュリズム勢力の急伸"
 Japan.104.t: "右派勢力の台頭"
 Japan.104.d: "安全保障環境への不安や政治への不信感が高まる中、秩序の維持、国家の自立、伝統的価値観の重視を訴える右派勢力への支持が広がっている。こうした立場は幅広い有権者層の関心を集めており、世論調査でも右派政党の伸長が目立ち始めた。今後の政局において、右派の存在感は一段と増していく可能性がある。"
 Japan.104.a: "保守勢力への支持拡大"
 Japan.104.b: "社会民主主義勢力の伸長"
 Japan.104.c: "改革保守勢力の台頭"
 Japan.104.e: "維新系勢力の支持拡大"
 JAP_diplomacy.01.t: "沖縄からの米軍撤退をめぐる交渉の開始"
 JAP_diplomacy.01.d: "数十年にわたり、日本における米軍の駐留は、戦後の安全保障体制と地域の安定の要となってきた。しかし、地政学的環境の変化、世論の動き、そして日本自身の防衛能力を強化したいという関心の高まりを踏まえ、政府は沖縄における米軍駐留を再検討する必要があると判断した。第一歩として、米国との正式な交渉を開始する。"
 JAP_diplomacy.01.a: "外交交渉を開始する"
 JAP_diplomacy.02.t: "日本による撤退交渉の要請"
 JAP_diplomacy.02.d: "日本政府は、沖縄に駐留する米軍の撤退に関する交渉に入るための正式な要請を提出した。この提案は敵対的なものではなく、日本の防衛姿勢の見直しと変化する安全保障上の必要性という、より広い再評価の一環として位置づけられている。米国は同盟の一体性を保ちつつ、地域における長期的な戦略的利益とのバランスを取りながら、どのように対応するかを検討しなければならない。"
 JAP_diplomacy.02.a: "要請を受け入れる"
 JAP_diplomacy.02.b: "要請を拒否する"
 JAP_diplomacy.03.t: "合意成立：在沖米軍の撤退へ"
 JAP_diplomacy.03.d: "一連の外交協議を経て、日本と米国は沖縄からの米軍撤退に関する合意に達した。これは日本の防衛政策が変化していく中での重要な転換点であり、自国の安全保障に対してより大きな責任を担おうとする意思を示すものだ。既存の枠組みの終わりを意味する一方で、日米関係を再評価し、将来に向けた新たな安全保障協力の形を模索する機会にもなる。"
 JAP_diplomacy.03.a: "安全保障政策の新たな章が始まる"
 JAP_diplomacy.04.t: "交渉決裂：撤退は拒否された"
 JAP_diplomacy.04.d: "米国政府は、沖縄からの米軍撤退を求める日本の要請を拒否した。これにより、既存の安全保障体制は維持される。この結果は日本国内で賛否両論を呼ぶ可能性があり、防衛面での自律性をめぐる議論をさらに強めることもあり得る。日本政府は、より広い地域情勢と国内状況を注視しつつ、今後の方針を再検討しなければならない。"
 JAP_diplomacy.04.a: "次の一手を考える時だ"
 JAP_diplomacy.05.t: "未来へ向けた共有の記憶へ"
 JAP_diplomacy.05.d: "日本政府は、過去の戦争の記憶と教訓を共有し、平和の文化を次世代へ受け継ぐことを目的として、国連の仲介の下で三国間の知的プラットフォームを設立する提案を行うことを決定した。本プロジェクトには博物館とデジタルアーカイブが含まれ、費用はすべて日本が負担する。提案は外交ルートを通じて中国および韓国に正式に送付される。"
 JAP_diplomacy.05.a: "提案を送る"
 JAP_diplomacy.06.t: "日本の提案：記憶と未来の共有"
 JAP_diplomacy.06.d: "日本政府は、国連の仲介の下で、中国および韓国とともに、戦争の記憶と教訓を将来世代のために保存する三国間の知的プラットフォームを設立することを提案した。この取り組みには、博物館とデジタルアーカイブの整備が含まれ、費用はすべて日本が負担する。将来を見据えた協力の枠組みを選ぶのか、それとも慎重な距離を保ち続けるのか――我々の決定は、東アジアにおける「記憶」の未来を形作ることになる。"
 JAP_diplomacy.06.a: "提案を受け入れる"
 JAP_diplomacy.06.b: "提案を拒否する"
 JAP_diplomacy.08.t: "三国間知的プラットフォームが発足"
 JAP_diplomacy.08.d: "中国と韓国の双方が提案を受け入れた。国連の仲介の下、三国間の知的プラットフォームが正式に発足した。共同の博物館とアーカイブを通じて、戦争の記憶と教訓は今後、将来世代へと受け継がれていく。これは和解と相互理解に向けた、意義ある第一歩となるかもしれない。"
 JAP_diplomacy.08.a: "未来へ向けた新たな一歩"
 JAP_diplomacy.09.t: "提案は拒否された"
 JAP_diplomacy.09.d: "残念ながら、我々の知的プラットフォーム構想は拒否された。和解には、より多くの時間と、信頼を築くための継続的な努力が必要であることが明らかになった。"
 JAP_diplomacy.09.a: "次の機会を待たねばならない"
 JAP_news.01.t: "[JAP.GetLeader]の声明：歴史の認識"
 JAP_news.01.d: "本日、日本政府は首相[JAP.GetLeader]による公式声明を発表し、日本の過去の植民地支配および戦時の行為について、深い反省と心からの謝罪を表明した。声明では、前向きな外交関係を築くことへの誠実なコミットメントと、歴史の記憶を責任をもって継承していく姿勢が強調された。この演説は国内外で大きな注目を集めており、東アジアにおける今後の外交にも影響を与えると見込まれる。"
 JAP_news.01.a: "未来への責任。"
 JAP_news.01.b: "今後の動向を注視する。"
 JAP_diplomacy.34.t: "通貨スワップ拡充の打診"
 JAP_diplomacy.34.a: "承諾する"
 JAP_diplomacy.34.b: "見送る"
 JAP_diplomacy_34_TT: "§Y申し出が承諾されればASEAN諸国は安定度補正を、我が国はASEAN諸国からの§G好意的な意見補正§!を得るだろう！§!"
 JAP_diplomacy.35.t: "スワップ拡充の合意"
 JAP_diplomacy.35.d: "[FROM.GetName] は、日本が提案した通貨スワップ協定の拡充に同意した。危機時の流動性支援という“安全網”が一段と厚くなり、市場への安心感と域内協調の実効性が高まるだろう。この合意は、ASEANにおける日本の信頼を押し上げる明確な一歩でもある。"
 JAP_diplomacy.35.a: "よし。"
 JAP_diplomacy.36.t: "提案は見送り"
 JAP_diplomacy.36.d: "[FROM.GetName] は、通貨スワップ協定の拡充提案について、受け入れを見送る意向を示した。協定条件や運用手続きの整理を優先したいとの判断であり、提案そのものを非難するものではない。日本としては、相手国の事情に配慮しつつ、対話の窓口を維持する必要がある。"
 JAP_diplomacy.36.a: "了解した。"
 JAP_diplomacy.37.t: "基幹インフラ投資の打診"
 JAP_diplomacy.37.d: "地域連結性と経済成長を後押しするため、日本政府は我が国に対し、交通網・港湾・エネルギーなどの基幹インフラを対象とした大規模ODA投資を提案してきた。道路、港湾、電力網の整備は物流と産業の土台を強化し、我が国の成長を直接に支えるだろう。また、受け入れればASEAN域内での日本の影響力も高まる。\n\n我々はこの提案を受け入れ、インフラ開発を加速させるべきだろうか？"
 JAP_diplomacy.37.a: "承諾する"
 JAP_diplomacy.37.b: "拒否する"
 JAP_diplomacy_37_TT: "§Y申し出が承諾されればASEAN諸国はインフラ建設速度補正を、我が国は1国あたり§R3.5B§!を拠出する代わりにASEAN諸国での§G影響力§!を得るだろう！§!"
 JAP_diplomacy.38.t: "投資提案が承諾"
 JAP_diplomacy.38.d: "[FROM.GetName] は、日本が提示した基幹インフラ向けODA投資の提案を承諾した。交通網・港湾・電力などの整備が進めば、地域連結性と経済成長を後押しし、我が国の関与もより確かなものとなる。この合意により、ASEAN域内での日本の影響力は一段と強まるだろう。"
 JAP_diplomacy.38.a: "よし。"
 JAP_diplomacy.39.t: "提案は見送り"
 JAP_diplomacy.39.d: "[FROM.GetName] は、基幹インフラ向けODA投資の提案について、受け入れを見送る意向を示した。相手国は国内の優先計画や制度面の整理を優先したいようだが、提案そのものを否定したわけではない。日本としては、相手国の事情に配慮しつつ、協力の余地を残すべきだろう。"
 JAP_diplomacy.39.a: "了解した。"
 JAP_diplomacy.40.t: "人材・研究協力の打診"
 JAP_diplomacy.40.a: "承諾する"
 JAP_diplomacy.40.b: "拒否する"
 JAP_diplomacy_40_TT: "§Y申し出が承諾されればASEAN諸国は研究速度と生産性成長の補正を、我が国はASEAN諸国での§G影響力§!を得るだろう！§!"
 JAP_diplomacy.41.t: "協力提案が承諾"
 JAP_diplomacy.41.a: "よし。"
 JAP_diplomacy.42.t: "提案は見送り"
 JAP_diplomacy.42.a: "了解した。"
 JAP_diplomacy.43.t: "日本の海上安全保障枠組みへの参加要請"
 JAP_diplomacy.43.d: "日本政府は、南シナ海における緊張緩和と航行の自由の保護を目的として、中立的かつ平和的な海上安全保障の枠組みを立ち上げる構想を示し、我が国に参加を打診してきた。情報共有、海難救助、海賊対処、共同訓練といった協力は、地域の安定と危機管理能力の向上に寄与するだろう。また、受け入れればASEAN域内での日本の影響力も高まる。\n\n我々はこの提案を受け入れ、日本の枠組みに協力するべきだろうか？"
 JAP_diplomacy.43.a: "承諾する"
 JAP_diplomacy.43.b: "拒否する"
 JAP_diplomacy_43_TT: "§Y申し出が承諾されればASEAN諸国は安定度の補正を、我が国はASEAN諸国での§G影響力§!を得るだろう！§!"
 JAP_diplomacy.44.t: "枠組み参加の合意"
 JAP_diplomacy.44.d: "[FROM.GetName] は、日本が提案した中立的・平和的な海上安全保障枠組みへの参加に同意した。情報共有、海難救助、海賊対処、共同訓練といった協力が進めば、地域の安定と航行の自由の保護に具体的な前進が期待できる。この合意は、ASEAN域内での日本の信頼と影響力を高めるだろう。"
 JAP_diplomacy.44.a: "よし。"
 JAP_diplomacy.45.t: "参加提案は見送り"
 JAP_diplomacy.45.d: "[FROM.GetName] は、日本が提案した中立的・平和的な海上安全保障枠組みへの参加について、受け入れを見送る意向を示した。相手国は地域情勢への配慮や国内の優先事項を重視しているようだが、協力の理念そのものを否定したわけではない。日本としては、対立を煽らない姿勢を維持しつつ、対話と協力の余地を残すべきだろう。"
 JAP_diplomacy.45.a: "了解した。"
 JAP_diplomacy.46.t: "日米共同教育プログラムの発足"
 JAP_diplomacy.46.d: "日本政府は、相互理解の深化と次世代育成を目的として、共同教育プログラムと学生交流の拡充を提案してきた。日本の規律意識と、米国の起業家精神――両国の強みを学び合う仕組みを整え、国際感覚を備えた新たな世代のリーダーを育てる狙いだ。この取り組みは、人的な結びつきを増やし、同盟の信頼をより強固なものにするだろう。"
 JAP_diplomacy.46.a: "未来への投資だ。"
 JAP_diplomacy_46_TT: "§Yアメリカは安定度補正を得るだろう！§!"
 JAP_diplomacy.47.t: "日米テック・カルチャー交流"
 JAP_diplomacy.47.d: "日本政府は、日米の大学研究室やスタジオ、企業ネットワークを、シリコンバレー、シアトル、ロサンゼルスのパートナーと結びつける形で、テックとカルチャーの交流を拡大する構想を提示してきた。技術者・デザイナー・クリエイターが共同プロジェクトのために行き来し、米国のプラットフォーム運用ノウハウと、日本のハードウェア、ゲーム、アニメーションを融合させる狙いだ。文化的親和性と科学協力が同時に進めば、社会の安定とイノベーションの推進力の双方を押し上げるだろう。"
 JAP_diplomacy.47.a: "相乗効果を最大化しよう。"
 JAP_diplomacy.48.t: "日米デュアルユース研究協力"
 JAP_diplomacy.48.d: "日本政府は、民生・軍事の双方に応用可能なデュアルユース技術分野で、日米の協力を一段と強化する提案を示した。産業界と学術界の連携を軸に、共同研究・知見共有・人材交流を進めることで、研究開発の速度を高め、技術全体の発展を押し上げる狙いだ。このパートナーシップが定着すれば、民生・軍事の両分野で将来の競争力向上が見込まれる。"
 JAP_diplomacy.48.a: "共同研究を前に進めよう。"
 JAP_diplomacy_48_TT: "§Yアメリカも研究速度補正を得るだろう！§!"
 JAP_diplomacy.49.t: "日台防災知見プラットフォーム"
 JAP_diplomacy.49.a: "レジリエンスを高めよう。"
 JAP_diplomacy_49_TT: "§Y[TAI.GetName]も同様の補正を得るだろう！§!"
 JAP_diplomacy.50.t: "日台先端技術パートナーシップの強化"
 JAP_diplomacy.50.a: "共同研究を加速させよう。"
 JAP_diplomacy.51.t: "日本留学枠の拡大"
 JAP_diplomacy.51.d: "日本政府は、台湾の学生が日本の大学で学ぶ機会を拡大するため、奨学金枠と受け入れ枠の拡充を提案してきた。この取り組みは、学術的・文化的な結びつきを深めるだけでなく、両社会をつなぐ将来の人材を育成することを目的としている。交流が広がれば、日台関係を担う次世代の基盤はより強固になるだろう。"
 JAP_diplomacy.51.a: "次世代への投資だ。"
 JAP_diplomacy.52.t: "貿易制度改革支援の提案"
 JAP_diplomacy.52.d: "日本政府は、中国の貿易制度の改革・近代化を支援するため、技術面および制度面の協力を提案してきた。通関手続きの簡素化、制度運用のデジタル化、国際基準に整合したルール整備を進めることで、貿易の円滑化と企業活動の予見可能性を高める狙いだ。改革が進めば、輸出入の手続き負担は軽くなり、経済活動の摩擦を減らせるだろう。また、この提案を受け入れれば、中国国内での日本の影響力も高まる。\n\n我々は日本の支援を受け入れ、貿易制度の国際的調和を進めるべきだろうか？"
 JAP_diplomacy.52.a: "承諾する"
 JAP_diplomacy.52.b: "拒否する"
 JAP_diplomacy_52_TT: "§Y申し出が承諾されれば中国は税負担補正の軽減補正を、我が国は中国での§G影響力§!を得るだろう！§!"
 JAP_diplomacy.53.t: "協力提案が承諾"
 JAP_diplomacy.53.d: "[FROM.GetName] は、日本が提示した貿易制度の改革・近代化に関する技術的・制度的支援を承諾した。通関手続きの簡素化や制度運用の整備が進めば、貿易の円滑化と企業活動の予見可能性が高まり、日本企業の参入環境も改善するだろう。この合意により、中国国内での日本の影響力は着実に強まる。"
 JAP_diplomacy.53.a: "よし。"
 JAP_diplomacy.54.t: "提案は見送り"
 JAP_diplomacy.54.d: "[FROM.GetName] は、貿易制度の改革・近代化に関する日本の技術的・制度的支援提案について、受け入れを見送る意向を示した。相手側は制度設計の優先順位や国内調整を重視しているようだが、改革の必要性そのものを否定したわけではない。日本としては、相手国の事情に配慮しつつ、対話と協力の余地を残すべきだろう。"
 JAP_diplomacy.54.a: "了解した。"
 JAP_diplomacy.55.t: "日中投資協力の拡大"
 JAP_diplomacy.55.d: "日本政府は、日本企業と中国企業の相互投資および市場参入を促進するため、制度面での調整と協力の枠組みを進める意向を示した。相互進出が加速すれば、生産ネットワークの最適化と供給網の効率化が進み、産業全体の生産性向上が期待できる。経済的な相互依存が深まることはリスクも伴うが、同時に摩擦を抑える現実的な安定要因にもなり得る。"
 JAP_diplomacy.55.a: "市場を開き、効率を高めよう。"
 JAP_diplomacy_55_TT: "§Y中国も同様の補正を得るだろう！§!"
 JAP_diplomacy.56.a: "文化的連帯を深めよう。"
 JAP_diplomacy.57.t: "日中・仏教寺院保全共同プロジェクト"
 JAP_diplomacy.57.d: "日本政府は、仏教寺院を共通の文化遺産として保全するため、日中で保存・修復を進める共同プロジェクトの実施を提案してきた。修復技術や調査手法の共有、文化財保護の協力体制を整えることで、寺院と関連文化財の価値を再確認し、長期的な保存を図る狙いだ。また、保全の成果が可視化されれば、文化観光の魅力が高まり、地域経済への波及も期待できる。この協力は、両国の歴史的な結びつきを再確認する機会にもなるだろう。"
 JAP_diplomacy.57.a: "遺産を守り、観光を促進しよう。"
 JAP_diplomacy.58.t: "東京―ソウル・アクセラレーター"
 JAP_diplomacy.58.d: "日本政府は、東京とソウルに共同のアクセラレーター・プログラムを設立し、両国のスタートアップ支援を制度化する提案を示した。資金調達支援、メンタリング、企業・大学との連携、両都市間の人材交流を通じて、起業の成功率と技術協力を高める狙いだ。この枠組みが機能すれば、都市間のイノベーションは加速し、日韓の経済協力もより実利的な形で強化されるだろう。"
 JAP_diplomacy.58.a: "起業の流れを加速させよう。"
 JAP_diplomacy_58_TT: "§Y韓国も同様の補正を得るだろう！§!"
 JAP_diplomacy.59.t: "日韓地方連携の拡大"
 JAP_diplomacy.59.a: "地域から成長を生み出そう。"
 JAP_diplomacy.60.t: "日韓文化交流の提案"
 JAP_diplomacy.60.d: "日本政府は、日韓間の文化交流を体系的に拡充する提案を示してきた。メディア・芸術・スポーツ・観光・教育交流などを通じて、両国民の相互理解を深め、社会的な距離を縮める狙いだ。交流が広がれば、世論の温度感や対外姿勢にも影響が及び、両国は互いの国内でより発言しやすい環境を得るだろう。\n\n我々はこの提案を受け入れ、文化交流を推進するべきだろうか？"
 JAP_diplomacy.60.a: "承諾する"
 JAP_diplomacy.60.b: "拒否する"
 JAP_diplomacy_60_TT: "§Y申し出が承諾されれば我々は韓国に§G影響力§!を得るが、韓国もまた日本に§R影響力§!を持つだろう。§!"
 JAP_diplomacy_60_TT2: "§Y文化交流をすることで日本に影響力を持つことができるが、国内の日本の影響力も増すだろう。§!"
 JAP_diplomacy.61.t: "提案が承諾"
 JAP_diplomacy.61.d: "[FROM.GetName] は、日本が提案した文化交流の拡充に同意した。メディア、芸術、スポーツ、観光、教育交流が広がれば、相互理解が深まり、両国の世論環境にも変化が生まれるだろう。この合意により、日本は韓国内での発言力を得る一方、韓国もまた日本国内での影響力を強めることになる。"
 JAP_diplomacy.61.a: "よし。"
 JAP_diplomacy.62.t: "提案は見送り"
 JAP_diplomacy.62.d: "[FROM.GetName] は、日本が提案した文化交流の拡充について、受け入れを見送る意向を示した。相手国は世論や国内事情への配慮を優先しているようだが、文化交流そのものを否定したわけではない。日本としては、対話の窓口を維持しつつ、別の形で相互理解を進める余地を残すべきだろう。"
 JAP_diplomacy.62.a: "了解した。"
 JAP_diplomacy.63.t: "日韓・高齢社会タスクフォース"
 JAP_diplomacy.63.d: "日本政府は、高齢化社会という共通課題に対処するため、日韓の専門家と関係機関による共同タスクフォースを設置し、月例協議で協力政策を策定する提案を示してきた。介護・医療体制の整備、就労支援、地域福祉の設計などの知見を共有することで、制度対応の速度と実効性を高める狙いだ。この枠組みが定着すれば、社会福祉施策の強化が進み、長期的な社会の安定にも資するだろう。"
 JAP_diplomacy.63.a: "共同で備えを進めよう。"
 JAP_diplomacy_63_TT: "§Y韓国は人口増加の補正を得るだろう。§!"
 JAP_diplomacy.64.t: "寒冷地開発協力"
 JAP_diplomacy.64.d: "日本政府は、北海道の寒冷地における地域活性化の知見を活用し、インフラ投資と外資導入を通じてロシア極東の寒冷地開発を後押しする「極東イニシアチブ」を提案してきた。交通・物流・エネルギーなどの基盤整備を進めることで、地域の経済活動を刺激し、開発の実効性を高める狙いだ。対象はサハおよびカムチャツカでのインフラ整備としている。"
 JAP_diplomacy.64.a: "極東の基盤を強化しよう。"
 JAP_diplomacy.65.t: "サハリンII"
 JAP_diplomacy.65.d: "日本政府は、化石燃料への安定的なアクセス確保を目的として、ロシアと協力しながらサハリンIIエネルギー事業への対外投資を強化する意向を示した。資本投入と事業運営の安定化が進めば、開発の継続性が高まり、生産能力の拡大も見込まれる。サハリンは引き続き重要な供給拠点となり、地域経済にも好影響をもたらすだろう。"
 JAP_diplomacy.65.a: "生産能力を拡大しよう。"
 JAP_diplomacy.66.t: "ユーラシア輸送網協力の発足"
 JAP_diplomacy.66.d: "日本政府は、ロシア経由で日本と欧州を結ぶ陸上物流回廊の整備に向け、日露協力を進める意向を示した。鉄道網と幹線道路を活用し、輸送時間の短縮と欧州市場への安定的なアクセス確立を図るとともに、回廊沿線のインフラ更新を加速させる狙いだ。物流が実際に流れ始めれば、ロシアはユーラシアの結節点としての重要性を一段と高め、経済的な連結も強まるだろう。"
 JAP_diplomacy.66.a: "回廊整備を加速しよう。"
 JAP_diplomacy_66_TT: "§Yロシアはインフラ建設速度の補正を得るだろう！§!"
 JAP_diplomacy.67.t: "日露ITインフラ協力の開始"
 JAP_diplomacy.67.d: "日本政府は、日本のIT企業と連携し、ロシア国内でデータセンターや光ファイバー網などの基盤整備を進める「ロシア・デジタル回廊」構想を提示してきた。国内の通信基盤を更新しつつ、欧州・中央アジア・ロシアを結ぶデジタル貿易ネットワークの結節点としての機能を強化する狙いだ。この協力が軌道に乗れば、情報流通の安定性と回線容量が改善し、経済活動のデジタル化も加速するだろう。"
 JAP_diplomacy.67.a: "接続基盤を拡充しよう。"
 JAP_diplomacy_67_TT: "§Yロシアはネットワークインフラ建設速度の補正を得るだろう！§!"
 JAP_historical.20110311.t: "東日本大震災"
 JAP_historical.20110311.d: "2011年3月11日午後2時46分、東北地方太平洋沖でマグニチュード9.0の巨大地震が発生した。日本で観測史上最大の揺れが東北から関東にかけて広範囲を激しく襲い、その直後に押し寄せた巨大津波が沿岸の町や村をのみ込み、壊滅的な被害を残した。港湾や漁村は瞬く間に破壊され、道路・鉄道・空港は寸断されて都市機能は混乱に陥った。\n\n数十万人が住まいを失い、緊急避難所に身を寄せている。農業・漁業・製造業といった地域経済の基盤は甚大な損害を受け、経済的打撃も計り知れない。インフラの復旧、避難者支援、産業と都市の再建を同時に進めることは、政府の行政能力を限界まで試すだろう。\n\nこの未曽有の悲劇の中で、日本国民は強い回復力と連帯を示している。だが、政府がどれだけ迅速かつ効果的に対応できるかが、国家の安定と将来を左右する。"
 JAP_historical.20110311.a: "救助と復旧に全力を注がねばならない。"
 JAP_great_east_japan_earthquake_tree_tt: "§Y東日本大震災後の復興に関する国家方針ツリーが解禁された！§!"
 JAP_news.02.t: "未曽有の地震が日本に襲来"
 JAP_news.02.d: "2011年3月11日、日本は巨大地震に見舞われた。後に「東日本大震災」として知られることになるこのマグニチュード9.0の地震は、東北地方の太平洋沖で発生し、広範囲にわたって壊滅的な被害をもたらした。死者・行方不明者は数万人規模にのぼり、経済的損失も計り知れない。\n\n続いて襲来した津波は、沿岸の町、港湾、交通網を瞬く間に破壊し、数十万人が避難所生活を余儀なくされた。日本社会は今、戦後最大級の危機に直面している。\n\n東日本大震災は時代を画する出来事となった。世界は、世界有数の経済大国である日本がどのように復興を成し遂げるのかを注視している。"
 JAP_news.02.a: "恐ろしい悲劇だ……"
 Japan.201103111.t: "復興完了宣言"
 Japan.201103111.d: "あの大災害から幾年もの歳月が過ぎ、瓦礫は片づけられ、街には再び人々の活気が戻った。被災者の暮らしは徐々に安定し、産業とインフラも復旧した。政府は本日、「復興達成」を公式に宣言し、長きにわたる苦難の時代に区切りをつける。\n\nこの悲劇は深い傷跡を残したが、同時に回復力と誇りを育み、より明るい未来への礎ともなった。"
 Japan.201103111.a: "我々は逆境を乗り越えた！"
 Japan.201103112.t: "インフラ復旧の進展"
 Japan.201103112.d: "災害で破壊されたインフラの一部が復旧した。交通と物流は徐々に再開し、日常生活にも小さいながら意味のある変化が生まれている。完全な復興にはまだ遠いが、これは確かな前進だ。"
 Japan.201103112.a: "一歩前進だ。"
 Japan.201103113.t: "インフラの全面復旧"
 Japan.201103113.d: "地震で壊滅した東北のインフラは、ついに目標としていた復旧水準に到達した。交通網と物流機能は再び全面的に稼働し、地域社会と経済に新たな勢いをもたらしている。復興事業は大きな節目を迎えた。"
 Japan.201103113.a: "大きな節目だ。"
 Japan.201103114.t: "インフラ復旧の進展"
 Japan.201103114.d: "災害で破壊されたインフラの一部が復旧した。交通と物流は徐々に再開し、日常生活にも小さいながら意味のある変化が生まれている。完全な復興にはまだ遠いが、これは確かな前進だ。"
 Japan.201103114.a: "一歩前進だ。"
 Japan.201103115.t: "インフラの全面復旧"
 Japan.201103115.d: "地震で壊滅した関東のインフラは、ついに目標としていた復旧水準に到達した。交通網と物流機能は再び全面的に稼働し、地域社会と経済に新たな勢いをもたらしている。復興事業は大きな節目を迎えた。"
 Japan.201103115.a: "大きな節目だ。"
 Japan.201103116.t: "通信網の復旧"
 Japan.201103116.d: "被災地域の通信網が、ついに一部復旧した。生活や事業に必要な連絡が取りやすくなり、地域の経済と社会に新たな希望をもたらしている。"
 Japan.201103116.a: "さらなる復旧を進めよう"
 Japan.201103117.t: "通信網の全面復旧"
 Japan.201103117.d: "地震で壊滅した東北の通信インフラは、ついに目標としていた復旧水準に到達した。生活と産業の基盤が確保され、復興の歩みは大きな節目を迎えた。"
 Japan.201103117.a: "復興への前進として刻もう"
 Japan.201103118.t: "通信網の全面復旧"
 Japan.201103118.d: "地震で壊滅した関東の通信インフラは、ついに目標としていた復旧水準に到達した。生活と産業の基盤が確保され、復興の歩みは大きな節目を迎えた。"
 Japan.201103118.a: "復興への前進として刻もう"
 Japan.201103119.t: "地域産業の再開"
 Japan.201103119.d: "被災地域の工場や事業所が操業を再開した。完全な復興にはまだ遠いが、雇用と経済活動が戻りつつあることは、確かな前進を実感させる。"
 Japan.201103119.a: "さらなる産業復興を進めよう"
 Japan.2011031110.t: "産業基盤の全面復旧"
 Japan.2011031110.d: "地震で壊滅した東北の産業基盤は、ついに目標としていた復旧水準に到達した。雇用と生産能力が回復し、復興の歩みは大きな節目を迎えた。"
 Japan.2011031110.a: "復興の次の段階へ進もう"
