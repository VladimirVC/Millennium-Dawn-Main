l_korean:
 STAT_NAVY_SUB_VISIBILITY: "£sub_visibility_texticon  Sub Visibility: "
 STAT_NAVY_SUB_VISIBILITY_DESC: "How easy to detect a submarine is."
 STAT_NAVY_SHORE_BOMBARDMENT: "강습 상륙함 수용량:"
 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "강습 상륙함의 상륙 부대들을 지원하고 근처 해안가를 방어하며 군대를 호송할 수 있는 함선의 능력입니다."
 STAT_NAVY_MISSION_COVERAGE: "적 감지 효율:"
 STAT_NAVY_MISSION_COVERAGE_DESC: "§T함선이 적을 감시하는데 얼마나 효율적인지 나타냅니다. 각 함선의 효율이 합해져서 표시됩니다.§!"
 STAT_NAVY_FIRE_RANGE_DESC: "함선 주포의 사거리입니다."
 STAT_NAVY_EVASION: "거점 방어 무기:"
 STAT_NAVY_EVASION_DESC: "적의 신호탄, 근접무기시스템 (CIWS), 그리고 적의 대응 사격을 피할 수 있는 함선의 능력입니다. 당연하지만, 작은 크기의 함선들이 포격을 더 쉽게 피할 수 있습니다."
 STAT_NAVY_SUB_ATTACK: "£depth_charge_texticon  Anti-Submarine Warfare: "
 STAT_NAVY_SUB_ATTACK_DESC: "적 잠수함에 얼마나 큰 피해를 입힐 수 있는지 나타냅니다."
 STAT_NAVY_ATTACK: "£attack_texticon  Missile firepower: "
 STAT_NAVY_ATTACK_DESC: "강력한 대잠 무기들을 우리가 얼마나 많이 보유하고 있는지 나타냅니다."
 STAT_NAVY_ANTI_AIR_ATTACK_DESC: "강력한 대공 미사일을 우리가 얼마나 많이 가지고 있는지 나타냅니다."
 STAT_NAVY_ANTI_AIR_TARGETTING_DESC: "함선의 레이더가 얼마나 적 항공기를 잘 추적할 수 있는지 나타냅니다."
 STAT_AIR_RANGE: "£air_range_texticon  Flight Range: "
 STAT_NAVY_RAIDING_COORDINATION:1 "£coordination_texticon  Raiding Coordination: "
 STAT_NAVY_PATROL_COORDINATION:1 "£coordination_texticon  Patrol Coordination: "
 STAT_NAVY_TORPEDO_ATTACK: "£torpedo_texticon  Torpedos: "
 STAT_NAVY_TORPEDO_ATTACK_DESC: "함선의 어뢰로 입힐 수 있는 피해 수치."
 STAT_NAVY_HG_ATTACK:1 "£rocket_modifiericons_texticon  Anti-Ship Missiles: "
 STAT_NAVY_HG_ATTACK_DESC: "대함 미사일이 적 함정에 가할 수 있는 피해량과 공격력."
 STAT_NAVY_HG_ARMOR_PIERCING:1 "£rocket_modifiericons_texticon  AShM Piercing: "
 STAT_NAVY_HG_ARMOR_PIERCING_DESC: "이 능력치는 대함 미사일 공격이 적의 점방어 체계와 장갑을 얼마나 잘 관통할 수 있는지를 나타냅니다."
 STAT_NAVY_LG_ATTACK:1 "£naval_battery2_texticon  Cannon Attack: "
 STAT_NAVY_LG_ATTACK_DESC: "기관포, 기관총을 포함한 함선의 부포에 의한 피해량입니다. 또한 해안 폭격에도 동일하게 적용됩니다."
 STAT_NAVY_LG_ARMOR_PIERCING:1 "£piercing_texticon  Cannon Piercing: "
 STAT_NAVY_LG_ARMOR_PIERCING_DESC: "부포의 장갑 관통력입니다. 높은 관통력을 가질 수록 치명타의 확률이 증가하며, 반대로 적의 장갑 수치보다 낮은 관통력 일수록 피해량이 급격히 감소할 것입니다."
 STAT_NAVY_SURFACE_VISIBILITY: "£surface_visibility_texticon  Surface Visibility: "
 STAT_NAVY_SURFACE_VISIBILITY_DESC: "이 함선이 얼마나 발견하기 어려운지를 나타냅니다. 낮은 수치일수록 생존성과 탐지되지 않을 확률이 증가합니다."
 STAT_AIR_AGILITY: "£speed_intercept_texticon  Radar Advantage: "
 STAT_AIR_AGILITY_DESC: "항공기의 스텔스 특성, 항공 공학, 무기 체계, 그리고 파일럿 훈련도가 가시거리 밖 공중전 (BVR, Beyond Visual Range)과 근접항공전 (WVR, Within Visual Range)에 가져다주는 이득을 나타냅니다."
 STAT_AIR_DEFENCE: "£defence_air_texticon  Air Defense: "
 STAT_AIR_DEFENCE_DESC: "항공기가 유인 및 공역을 벗어나는 기동을 하거나 다가오는 화기의 위협을 하드킬로 정리할 수 있는 능력을 나타냅니다."
