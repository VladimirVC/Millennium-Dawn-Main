 eu_president_council_tip: "§YПредпосылки:§!\n[!eu_president_council_back_click_enabled]"
 EU_recently_retired_from_an_eu_office_tt: "§Y[ROOT.GetNameWithFlag]§! недавно не ушел в отставку с должности в Европейском Союзе (Дней до занятия новой должности: [?recently_retired_from_an_eu_office:days_left|Y0])\n"
 EU_does_not_hold_another_office_tt: "§Y[ROOT.GetNameWithFlag]§! В настоящее время не занимает другую должность в §C[EUU.GetFlag][EUU.GetName]§! Офисе\n"
 EU_president_council_tt: "§YПредседатель Европейского Совета§! возглавляет и продвигает работу Европейского Совета, который состоит из двадцати семи глав государств и главного представителя §C[EUU.GetFlag][EUU.GetName]§! на мировой арене. Институция включает коллегию глав государств и президента Европейской комиссии и обеспечивает политическое направление для всего Европейского Союза.\n\n§YПривилегии должности:§!\nЗанятие этой должности позволяет нам выдвигать законопроект на голосование без необходимости влиять на других членов.\n\nПовышает успешность кампаний «Про-Европа» и «Евроскептицизм» на §G+10%§!\n\n[!eu_president_council_back_click]\n"
 eu_president_commission_tt: "§YПрезидент Европейского Союза§! — глава исполнительной власти §C[EUU.GetFlag][EUU.GetName]§!. Президент возглавляет кабинет комиссаров, называемый просто Коллегией, которая коллективно подотчётна Европейскому парламенту. Президент уполномочен распределять портфели, переставлять или освобождать комиссаров по мере необходимости. Комиссия — единственный орган, имеющий право вносить законопроекты для превращения их в законы ЕС.\n\n§YПреимущества должности:§!\nЗанятие этой должности позволяет нам выдвигать законопроекты на голосование без необходимости влиять на какие-либо государства-члены.\n\nПовышает успех кампаний за проевропейскую позицию и евроскептицизм на §G+10%§!\n\nЗанятие этой должности позволяет приостанавливать государства-члены, которые допустили более трёх уровней нарушений, независимо от влияния.\n\n[!eu_president_commission_back_click]\n"
 EU_high_representative_tt: "§YВысокий представитель Союза по иностранным делам и политике безопасности§! — главный координатор и представитель Общей внешней и оборонной политики (ОВОП) в рамках Европейского Союза. Часто эту должность сокращённо называют Министр иностранных дел ЕС, и он главным образом координирует внешнюю политику от имени государств-членов.\n\n§YПреимущества должности:§!\n\n[!foreign_affairs_security_back_click]\n"
 EU_president_european_parliament_tt: "§YПредседатель Европейского парламента§! руководит дебатами и деятельностью Европейского парламента. Они представляют Европейский парламент во всех юридических вопросах и во внешних связях, особенно в международных отношениях. Срок их полномочий составляет два с половиной года, и их подпись требуется для утверждения бюджета §C[EUU.GetFlag][EUU.GetName]§! и актов Союза, принятых по процедурам совместного решения.\n\n§YПривилегии должности:§!\nЗанятие этой должности позволяет нам выдвигать законопроект на голосование без необходимости влиять на других членов.\n\nПовышает успешность кампаний «Про-Европа» и «Евроскептицизм» на §G+10%§!\n\n[!eu_parliament_president_back_click]\n"
 EU_central_bank_president_tt: "§YПрезидент Европейского центрального банка§! возглавляет Европейский центральный банк (ЕЦБ) — учреждение, ответственное за управление евро и монетарную политику Европейского союза в еврозоне. Он руководит исполнительным советом, Советом управляющих и Общим советом ЕЦБ, а также представляет банк за рубежом.\n\n§YПреимущества должности:§!\nЗанятие этой должности позволяет нам запускать, расширять или сокращать программу OMT ЕЦБ для временного снижения процентных ставок в государствах-членах с высокими ставками.\n\n[!eu_central_bank_president_back_click]\n"
 EU_central_bank_idea_president_tt: "Изменяет $investment_cost_modifier$ и $investment_duration_modifier$ на §G15%§! для инвестиций в §Cгосударства-члены ЕС§!\n"
 EU_ministry_of_economy_and_finance_tt: "§YЕвропейский министр экономики и финансов§! возглавляет Европейское экономическое правительство и обладает полномочиями, наделенными им финансовым союзом. Министр отвечает за надзор за налоговыми органами, минимальной заработной платой для стран-членов и другими экономическими и финансовыми решениями.\n\n§YПреимущества поста:§!\n\nЗанимание этого поста позволит владельцу всегда включать проект бюджета в повестку дня Европарламента, минуя все требования влияния.\n\n[!eu_minister_economy_finance_back_click]\n"
 EU_ministry_of_economy_and_finance_idea_tt: "Изменяет $investment_cost_modifier$ и $investment_duration_modifier$ на §G5%§! для инвестиций в §Cгосударства-члены ЕС§!\n"
 EU_frontex_director_tt: "§YИсполнительный директор Frontex§! возглавляет Европейское агентство по охране границ и побережья (обычно называемое Frontex). Основная задача Frontex — оказывать поддержку государствам-членам ЕС на местах в защите внешних границ Европы. Агентство также осуществляет контроль границ в Шенгенской зоне, помогая обеспечивать свободу, безопасность и правосудие.\n\n§YПреимущества должности:§!\n\nЗанятие этой должности позволяет временно контролировать силы Frontex на период пребывания в должности.\n\n[!eu_frontex_director_back_click]\n"
 EU_sec_general_euro_army_tt: "§YСекретарь-генерал Евроармии§! — глава Евроармии Европейского Союза. Он отвечает за координацию Евроармии, объединённых и общих вооружённых сил государств-членов ЕС.\n\n§YПреимущества должности:§!\nЗанятие этой должности позволяет временно взять под контроль силы Евроармии на период пребывания в должности.\n\n[!eu_sec_general_euro_army_back_click]\n"
 EU_sec_general_euro_navy_tt: "The §YSecretary General of EuroNavy§! is the head of the EuroNavy of the European Union. They are responsible for the coordination of the EuroNavy which is the combined and common naval strength of the European Union.\n\n§YPerks of the Office:§!\n\nHolding this office will allow the holder to take control over Member States Navies and unify them into one European Fleet.\n[!eu_sec_general_euro_navy_back_click]\n"
 EU_ambassador_to_un_tt: "§YПосол Союза в ООН§! представляет Европейский Союз в Организации Объединенных Наций, работая в координации с дипломатическими миссиями всех государств-членов Европейского Союза.\n\n§YПреимущества поста:§!\nЗанимание этого поста дает нации-держателю статус Постоянного члена СБ ООН в национальном духе.\n\n[!eu_ambassador_to_un_back_click]\n"
 EU_president_of_the_eurofederation_tt: "The §YPresident of the European Federation§! is the duly elected leader of the European Federation. The European Federation is one of the final federalization options of the European Union and as such is a very powerful position.\n\n§YPerks of the Office:§!\n\n[!eu_pres_federation_back_click]\n"
