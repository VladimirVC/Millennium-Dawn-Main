 helicopter_heavy_atgm_gen2_desc: "ATGMs agora apresentam sistemas de orientação de comando semiautomáticos. Esses sistemas apresentavam maior precisão e eram mais resistentes a contramedidas. Eles usavam orientação a laser ou comandos de rádio para rastreamento de alvos e controle de mísseis."
 helicopter_heavy_atgm_gen3: "ATGM Pesado de 3ª Geração"
 helicopter_heavy_atgm_gen3_desc: "Adaptando ATGMs projetados para uso em guerra terrestre, os ATGMs de helicóptero agora incorporam a capacidade de disparar e esquecer. Esses mísseis tinham sistemas de busca avançados que lhes permitiam rastrear e atacar alvos de forma autônoma após o lançamento, liberando o helicóptero para manobrar ou atacar outros alvos Além disso, eles apresentavam capacidades anti-bloqueio aprimoradas e melhor resistência a contramedidas."
 helicopter_heavy_atgm_gen4: "ATGM Pesado de 4ª Geração"
 helicopter_heavy_atgm_gen4_desc: "Melhorias adicionais na tecnologia de mísseis levaram a ATGMs com buscadores multimodo e maior precisão e alcance. Esses mísseis geralmente apresentam uma combinação de buscadores infravermelho, radar e laser, permitindo-lhes adaptar-se a vários cenários de alvos e contramedidas."
 helicopter_heavy_atgm_gen5: "ATGM Pesado de 5ª Geração"
 helicopter_heavy_atgm_gen5_desc: "A quinta geração de ATGMs é caracterizada por mais avanços em tecnologia de busca, discriminação de alvos, alcance e capacidades de engajamento. Os recursos incluem integração aprimorada de guerra centrada em rede, automação aumentada e capacidades de contramedidas ainda mais sofisticadas."
 helicopter_rocket_pod_gen1: "Pods de foguete de 1ª geração"
 helicopter_rocket_pod_gen1_desc: "Foguetes básicos não guiados de 70 a 80 mm para uso contra alvos vulneráveis, infantaria e veículos leves. Baratos e amplamente disponíveis, mas com precisão limitada a curtas distâncias."
 helicopter_rocket_pod_gen2: "Pods de foguete de 2ª geração"
 helicopter_rocket_pod_gen2_desc: "Tipos de ogivas aprimorados e sistemas de estabilização melhores aumentam a letalidade e o controle da dispersão. Oferece maior eficácia contra alvos levemente blindados."
 helicopter_rocket_pod_gen3: "Pods de foguete de 3ª geração"
 helicopter_rocket_pod_gen3_desc: "Moderniza foguetes não guiados existentes com kits de guiamento a laser para maior precisão. Permite ataques de precisão com custo-benefício contra alvos móveis e vulneráveis."
 helicopter_rocket_pod_gen4: "Pods de foguete de 4ª geração"
 helicopter_rocket_pod_gen4_desc: "Sistemas de foguetes inteligentes com buscadores e mira aprimorados. Permitem engajamentos de precisão com baixo risco de danos colaterais e logística reduzida em comparação com mísseis antitanque convencionais."
 helicopter_rocket_pod_gen5: "Pods de foguete de 5ª geração"
 helicopter_rocket_pod_gen5_desc: "Sistemas de foguetes de última geração equipados com processadores de bordo e guiamento autônomo. Cada munição pode identificar, rastrear e priorizar alvos em tempo real com mínima intervenção do piloto. Ideal para ataques de saturação contra formações inimigas dispersas e ativos móveis."
 helicopter_aa_missile_gen1: "Mísseis ar-ar de 1ª geração"
 helicopter_aa_missile_gen1_desc: "Os primeiros mísseis ar-ar montados em helicópteros eram relativamente simples e tinham capacidades limitadas. Esses mísseis eram principalmente direcionados ao calor e dependiam de buscadores infravermelhos para rastrear e atacar aeronaves inimigas. Eles tinham alcance curto e muitas vezes não eram guiados ou semi-guiado."
 helicopter_aa_missile_gen2: "Mísseis ar-ar de 2ª geração"
 helicopter_aa_missile_gen2_desc: "A segunda geração de mísseis ar-ar montados em helicópteros viu melhorias nos sistemas de orientação, propulsão e alcance de engajamento. Esses mísseis se tornaram mais confiáveis e podiam atingir alvos em distâncias mais longas. Buscadores mais avançados, como buscadores de radar, foram introduzido, permitindo mais versatilidade em diferentes cenários de engajamento."
 helicopter_aa_missile_gen3: "Mísseis ar-ar de 3ª geração"
 helicopter_aa_missile_gen3_desc: "A terceira geração representou um avanço significativo na tecnologia de mísseis. Esses mísseis caracterizavam-se por buscadores aprimorados, maior resistência a contramedidas, agilidade aprimorada e capacidades de guerra centradas em redes. Muitos mísseis de terceira geração possuíam capacidades de engajamento \"fora do eixo de visão\", permitindo que o míssil atingisse alvos mesmo quando não estivessem diretamente na linha de visão dos sensores do helicóptero."
 helicopter_aa_missile_gen4: "Mísseis ar-ar de 4ª geração"
 helicopter_aa_missile_gen4_desc: "A quarta geração de mísseis ar-ar montados em helicópteros apresenta sensores aprimorados, melhor discriminação de alvos, maior resistência a contramedidas e maior alcance de engajamento. Eles geralmente se integram perfeitamente aos aviônicos do helicóptero e podem ser conectados em rede com outras plataformas e sistemas para melhorar a consciência situacional."
 helicopter_aa_missile_gen5: "Mísseis ar-ar de 5ª geração"
 helicopter_aa_missile_gen5_desc: "A quinta geração de mísseis ar-ar montados em helicópteros apresenta sensores multiespectrais, perfis mais furtivos, agilidade aprimorada, link de dados avançado e recursos de rede, bem como contramedidas e contra-contramedidas aprimoradas, bem como alcance e letalidade aprimorados ."
 helicopter_drones_gen1: "Helicópteros Drones de 1ª Geração"
 helicopter_drones_gen1_desc: "A primeira geração de drones implantados em helicópteros de ataque era relativamente simples e focada em fornecer consciência situacional adicional e capacidades de reconhecimento para a tripulação do helicóptero. Esses drones eram principalmente controlados remotamente e não possuíam recursos autônomos avançados."
 helicopter_drones_gen2: "Helicópteros Drones de 2ª Geração"
 helicopter_drones_gen2_desc: "A segunda geração de drones implantados por helicópteros de ataque viu melhorias significativas em autonomia, comunicação e capacidades. Esses drones começaram a integrar sensores mais sofisticados, capacidades de processamento de dados e links de comunicação aprimorados com o helicóptero hospedeiro."
 helicopter_drones_gen3: "Helicóptero Drones de 3ª Geração"
 helicopter_drones_gen3_desc: "A terceira geração de drones implantados por helicópteros de ataque apresenta avanços ainda mais transformadores devido ao rápido progresso tecnológico. Esses avanços se concentram em maior autonomia, equipe perfeita entre homem e máquina, fusão de sensores aprimorada e capacidades de missão mais versáteis."
 em_lock_detection_system_gen1: "RWR e Flares de 1° geração"
 em_lock_detection_system_gen1_desc: "Um receptor rudimentar de alerta de radar, combinado com sinalizadores infravermelhos acionados manual ou semiautomaticamente. Oferece conhecimento básico de ameaças de radar, como mísseis terra-ar ou rastreamento de armas antiaéreas. Possui alcance de detecção limitado e é vulnerável a falsos positivos ou reação tardia."
 em_lock_detection_system_gen2: "RWR Integrado e Dispensadores de 2° geração"
 em_lock_detection_system_gen2_desc: "Um sistema RWR mais avançado, integrado a lançadores automáticos de chaff e flares. Capaz de detectar múltiplas assinaturas de radar e acionar as contramedidas apropriadas sem intervenção do piloto."
 em_lock_detection_system_gen3: "Rede Digital de EWS de 3ª geração"
 em_lock_detection_system_gen3_desc: "Um conjunto de guerra eletrônica totalmente integrado com análise de radar em tempo real e bibliotecas de ameaças programáveis. Coordena o lançamento de chaff e flares com precisão temporal baseada no tipo e vetor da ameaça. Melhora significativamente a capacidade de sobrevivência contra sistemas de mísseis multiespectrais modernos."
