 KBY_new_state: "Land for Berber"
 KBY_new_state_desc: "Finally, the true heiress of these lands, Berbers, will take power into their own hands"
 KBY_constitution: "The Constitution of Kabylia"
 KBY_constitution_desc: "We must formalize our state legislative. To do this, we will adopt our own constitution."
 KBY_drs: "Cooperation With The DRS"
 KBY_fsb_desc: "Unfortunately, we do not yet have the opportunity to create our own special services, so we will rely on cooperation with the DRS of Algeria"
 KBY_mvd: "Subordinate the Local Ministry of Internal Affairs"
 KBY_mvd_desc: "We will subordinate the local bodies of the Ministry of Internal Affairs, which were under French power"
 KBY_ter_defence: "Territorial Defense"
 KBY_ter_defence_desc: "We will create a Territorial Defense from the local militia"
 KBY_contract_army: "Contract Army System"
 KBY_contract_army_desc: "Our army will be created according to the contract system"
 KBY_defence_doctrine: "Defensive Doctrine"
 KBY_defence_doctrine_desc: "We are not attacking anyone, our task is to defend our borders. Our army will adopt the doctrine of defensive tactics"
 KBY_nat_guard: "The National Guard of Kabylia"
 KBY_nat_guard_desc: "Once Algeria, back in the 80s, had a national guard. We will re-create this division but already under our command"
 KBY_defence_prom: "Military Industry"
 KBY_defence_prom_desc: "We will invest significant funds in the restoration of the military industry on our territory. We need a strong army"
 KBY_rebuild_war_academy: "Military Schools"
 KBY_rebuild_war_academy_desc: "Our fighters must have the best training to defend their homeland. Therefore, we will revive military academies on our territory"
 KBY_no_corrupt_military: "Seriously Reduce Corruption In The Army"
 KBY_no_corrupt_military_desc: "Our army is still young, so it is much easier to eliminate corruption in it"
 KBY_nation_quest: "The National Question"
 KBY_nation_quest_desc: "Kabylia was and will be part of Algeria, this is our answer to the national question"
 KBY_referendum: "Referendum On The Fate of Kabylia"
 KBY_referendum_desc: "The fateful moment has come when we must decide which way our country will go. Will it become a full-fledged part of Russia, in the form of a republic, or will we choose the path of a Union State"
 KBY_dinar: "The Dinar As The State Currency"
 KBY_dinar_desc: "The dinar will become our state currency, no one even doubted it"
 KBY_corruption: "Fight Against Corruption"
 KBY_corruption_desc: "Despite the fact that our state is still young, corrupt officials have already started in it. We need to deal with this"
 KBY_isr_invest: "Israel Investments"
 KBY_isr_invest_desc: "Israel supports us with its investments"
 KBY_build_factories: "Construction Of Factories"
 KBY_build_factories_desc: "The country needs factories and factories, we will provide our people with everything they need"
 KBY_social_invest: "Investments In The Social Sphere"
 KBY_social_invest_desc: "Our citizens should have access to the best quality medical facilities, as well as have all social guarantees"
 KBY_infrastructure: "Infrastructure Investments"
 KBY_infrastructure_desc: "Roads are the veins of our state"
 KBY_fight_oligarch: "The Fight Against Oligarchs"
 KBY_fight_oligarch_desc: "Even in our young state, corrupt oligarchs have already begun to appear, who made a lot of money in the war. Let's deal with them"
 KBY_it_invest: "Investing In IT"
 KBY_it_invest_desc: "We will invest in IT technologies for the successful development of our country"
 KBY_maloross_economy: "Kabylia Economy"
 KBY_maloross_economy_desc: "Our economic measures have led to the growth of our economy"
 KBY_union_state: "Union State"
 KBY_union_state_desc: "We have chosen the path of the Union State"
 KBY_union_group_army: "Joint Grouping Of Troops"
 KBY_union_group_army_desc: "Our soldiers will become members of the joint grouping of the troops of the Union State"
 KBY_union_group_economic: "Investments of The Union State"
 KBY_union_group_economic_desc: "Membership in the Union State has had a positive impact on our economy"
 KBY_union_health_social: "Cooperation With The Social And Medical Sphere"
 KBY_union_health_social_desc: "The members of the Union State actively cooperate in the Social and Medical Spheres"
 KBY_republic_rf: "We Are Part of Algeria"
 KBY_republic_rf_desc: "We have become a republic of Algeria, now our fate is connected with it"
 KBY_alg_regions: "Cooperation With Algeria Regions"
 KBY_alg_regions_desc: "We will actively cooperate with other regions of Algeria"
 KBY_fra_companies: "Cooperation With French Companies"
 KBY_fra_companies_desc: "French companies will be our main partners"
 KBY_integrate_army: "Integrate into the Algerian Army"
 KBY_integrate_army_desc: "We will bring our army to the standards of the Algerian Army"
 ALG_legacy_of_independence_war: "Legacy of the Algerian War of Independence"
 ALG_legacy_of_independence_war_desc: "The struggle against French colonial rule forged a strong sense of national identity and unity. This enduring legacy strengthens our political power, accelerates research and modernization, and increases Algeria's influence abroad. Yet, ideological divisions and historical memories continue to shape domestic opinion and foreign relations."
 ALG_recruitable_population_factor_pvda: "£manpower_texticon Recruitable Population"
 ALG_recruitable_population_factor_pvda_tt: "Base §YNet Migration Rate§!: [?ALG_recruitable_population_factor_pvda_change|%+] "
 ALG_productivity_growth_modifier_pvda: "Monthly Productivity Growth"
 ALG_productivity_growth_modifier_pvda_tt: "Monthly Productivity Growth: [?ALG_productivity_growth_modifier_pvda_change|%+]"
 ALG_new_nobility_idea: "Renewed Nobility"
 ALG_new_nobility_idea_desc: "By restoring noble privileges and creating a loyal aristocracy, the monarchy strengthens its rule, rewarding loyalty with influence and prestige."
 ALG_state_islam_idea: "Islam as the State"
 ALG_state_islam_idea_desc: "The monarchy formalizes Islam as the guiding principle of the state, empowering the ulema and embedding Sharia into governance, at the cost of scientific progress."
 ALG_andalus_crusade_idea: "Legacy of al-Andalus"
 ALG_andalus_crusade_idea_desc: "The dream of reclaiming al-Andalus fuels the Caliphate's cause, inspiring warriors and legitimizing expansion across the Iberian Peninsula."
 ALG_maghribi_identity_idea: "Maghribi Identity"
 ALG_maghribi_identity_idea_desc: "The monarchy promotes a distinct Maghribi identity rooted in shared culture and unity, strengthening stability while distancing foreign influence."
 ALG_maghribi_identity_idea_two: "True Maghribism"
 ALG_maghribi_identity_idea_two_desc: "From Morocco to Libya, the Maghreb unites under a singular destiny. The monarchy embodies this vision, reducing foreign meddling and binding the region together."
 ALG_renewed_nobility_idea: "Restored Knighthood"
 ALG_renewed_nobility_idea_desc: "The knights of the realm return, honored as a loyal military and political elite. Their renewed role strengthens the monarchy's grip while lowering costs of leadership."
 ALG_going_to_roots: "Return to Our Roots"
 ALG_going_to_roots_desc: "Both Maghrebi and Andalusi dynasties laid the foundation for Algerian identity. By embracing these traditions, we will unify past and present into a single guiding vision for the nation."
 ALG_state_islam: "Islam as the State Faith"
 ALG_state_islam_desc: "Religion has always guided Algeria's people. By proclaiming Islam as the foundation of the monarchy, we solidify our legitimacy, win the favor of the ulema, and strengthen the unity of the faithful."
 ALG_restore_knighthood: "Restore the Knighthood"
 ALG_restore_knighthood_desc: "In the age of empires, orders of warriors and nobles defended our land and faith. We shall restore such chivalric orders to serve the throne and inspire loyalty in arms."
 ALG_andalus_legacy: "Legacy of al-Andalus"
 ALG_andalus_legacy_desc: "Our Andalusi revival is not only about the throne. It is about rekindling the lost pride of Muslims expelled from Iberia centuries ago. We will spread our influence and remind Europe that al-Andalus is not forgotten."
 ALG_our_old_realm: "Our Old Realm"
 ALG_our_old_realm_desc: "We once ruled parts of Iberia under the banner of al-Andalus. Now, by diplomatic overtures and historic memory, we will lay claim to our old lands and prepare the ground for their return."
 ALG_renewed_nobility: "Renewed Nobility"
 ALG_renewed_nobility_desc: "New noble houses must be forged to serve the monarchy. Old families will be restored, and new elites elevated, to provide Algeria with loyal servants of the crown."
 ALG_politic_outreach_iberia: "Political Outreach in Iberia"
 ALG_politic_outreach_iberia_desc: "By supporting sympathetic forces in Spain and Portugal, we can extend Algeria's influence westward. Our backing of Iberian movements will strengthen our claims and weaken their states."
 ALG_fate_of_spain: "The Fate of Spain"
 ALG_fate_of_spain_desc: "Spain sits upon the land of our ancestors. Its fate may now be decided by Algeria's hand — through union, reclamation, or conquest."
 ALG_true_maghribism: "True Maghribism"
 ALG_true_maghribism_desc: "The time has come to declare our own vision — an ideology rooted in Maghreb identity, Islamic unity, and monarchist pride. The doctrine of Maghribism will inspire a new order across North Africa."
 ALG_glory_of_andalus_idea: "Glory of al-Andalus"
 ALG_glory_of_andalus_idea_desc: "A cultural revival, inspired by the legacy of al-Andalus, invigorates our scholars, artisans, and rulers. It binds the nation together under a proud shared memory."
 ALG_effect_if_they_accept_TT: "If accepted, Algeria will gain resources and stronger relations."
 ALG_maghreb_ambition_tt: "Claims will be extended over the Maghreb region."
 ALG_restore_maghreb_empire_tt: "Algeria will proclaim itself as the §YMaghreb Empire§!, uniting al-Andalus and North Africa."
 ALG_new_decision_govern_unlock_tt: "Unlocks new decisions to govern conquered Iberian territories."
 ALG_spain_algeria_union_tt: "Unlocks decisions for union with Spain under Algerian monarchy."
 ALG_influence_all_nato_tt: "§YAlgeria§! gains §G+5%§! influence in all §YNATO members§!."
 ALG_trade_with_arabic_nations_tt: "Algeria establishes improved trade agreements with all Arabic nations."
 ALG_loas_influence_tt: "Algeria increases its influence among Arab League member states through diplomatic efforts and friendship agreements."
 ALG_isr_threat: "Algeria Condemns Israeli Aggression"
 ALG_palestinian_aid_package_tt: "Algeria provides aid to Palestine and increases influence across all Middle Eastern nations."
 ALG_african_union_reforms_tt: "Algeria has established improved trade agreements with all OAU member states."
 ALG_mutual_defense_idea: "Mutual Defense"
 ALG_mutual_defense_idea_desc: ""
 ALG_the_State: "The State of Algeria"
 ALG_bureaucracy_cost_multiplier_modifier_var: "Bureaucracy Costs"
 ALG_police_cost_multiplier_modifier_var: "Police Costs"
 ALG_education_cost_multiplier_modifier_var: "Education Costs"
 ALG_health_cost_multiplier_modifier_var: "Healthcare Costs"
 ALG_social_cost_multiplier_modifier_var: "Welfare Costs"
 ALG_stability_factor: "Stability"
 ALG_monthly_population: "Monthly Population"
 ALG_bureaucracy_cost_multiplier_modifier_tt: "Modifies §YAdministration Cost§! for §HState of Algeria§! by [?ALG_bureaucracy_cost_multiplier_modifier_change|+%] (Current: [?ALG_bureaucracy_cost_multiplier_modifier|Y%])"
 ALG_unlocks_focus_for_us: "§CUnlocks a decision which will let us remove the negative modifiers we receive from this!§!"
 ALG_activate_from_event: "§HThese focuses are activated through an event or decision§!"
 ALG_our_society: "Algerian Society"
 ALG_our_society_desc: "Algerian Society is constantly changing and evolving into something new. Though the governments role is typically liDRSed when it comes to this due to certain restraints, there have been times where we needed to intervene and there will be times where we will have to intervene to make changes to our policies."
 ALG_DRS: "The DRS"
 ALG_DRS_desc: "DRS is our nations intelligence agency tasked with protecting the government and policies of the nation from internal and external threats."
 ALG_domestic_focus: "Domestic Focus"
 ALG_domestic_focus_desc: "DRS should focus on protecting the nation from domestic threats, such as bad actors who wish to overthrow the government by spreading dangerous ideals."
 ALG_foreign_focus: "Foreign Focus"
 ALG_foreign_focus_desc: "DRS should worry about the threats from outside our borders, as people will never wish to bring harm to their own nation."
 ALG_disaster_relief: "Disaster Plan"
 ALG_disaster_relief_desc: "Currently we have no disaster plan, which means that we are unprepared to protect and come to the aid of our citizens."
 ALG_charity_based: "Establish a Charity-led System"
 ALG_charity_based_desc: "The Charities will cover our people when disaster strikes, so we can cut back spending quite a bit."
 ALG_government_reliant: "Establish a Government-led System"
 ALG_government_reliant_desc: "It is the governments job to come to its peoples aid when disaster strikes, even if it means increasing our spending."
 ALG_migration_problems: "Migration Problems"
 ALG_migration_problems_desc: "We have always had problems with an influx of migrants coming into the nation.. But we never knew what to do with them after their problems end back in their home nation."
 ALG_open_door_policy: "Open Door Policy"
 ALG_open_door_policy_desc: "By opting to use a open door policy, we can easily utilize incoming migrants to better our nation and develop it."
 ALG_closed_borders: "Close the Borders"
 ALG_closed_borders_desc: "We are able to completely get rid of Migrants coming into the nation by just closing our borders, thus closing our problems."
 ALG_drug_problem: "The Drug Problem"
 ALG_drug_problem_desc: "At times, drugs are required for medical use, but that doesn't stop certain individuals from abusing the system and using them for recreational purposes with dangerous outcomes."
 ALG_tighten_punishments: "Tougher Stance"
 ALG_tighten_punishments_desc: "We will criminalize anyone that uses drugs for anything but medical use, no matter what their excuse is."
 ALG_relax_restrictions: "Soften our Stance"
 ALG_relax_restrictions_desc: "Even if our people wish to use drugs for recreational purposes, why should we care? Perhaps we should just let them do what they want even if there are some risks."
 ALG_rising_nationalism: "Rise of Nationalism"
 ALG_rising_nationalism_desc: "Despite Nationalism being a good thing, too much of it can be bad. Nationalism within the nation has caused problems and fights to break out between minority groups."
 ALG_utilize_it: "Utilize Nationalism"
 ALG_utilize_it_desc: "We will utilize nationalism to our advantage, this way the enemy will know that the Algerian people wont sit back idly by in times of war."
 ALG_combat_it: "Combat it"
 ALG_combat_it_desc: "We are going to have to combat Nationalism as we cannot risk any further instability within our nations borders."
 ALG_drs_reformed: "DRS - Domestic Focus"
 ALG_drs_reformed_desc: "The DRS will focus more on domestic matters rather than external"
 ALG_drs_emboldened: "DRS - Foreign Focus"
 ALG_drs_emboldened_desc: "The DRS is going to worry more about what goes on outside of our country"
 ALG_charity_disasters: "Charity Run Plan"
 ALG_charity_disasters_desc: "Our disaster plan relies on citizens kindness and donations to give aid to people in times of need"
 ALG_government_led_disasters: "Government Led Plan"
 ALG_government_led_disasters_desc: "The Government is going to provide aid to people who have been in natural disasters instead of charities, though they are also free to help out if they want"
 ALG_drugs_illegalized: "Drugs Criminalized"
 ALG_drugs_illegalized_desc: "If anyone uses drugs for any purpose except medical use, they will get in trouble with the law"
 ALG_drugs_legalized: "Drugs Legalized"
 ALG_drugs_legalized_desc: "We don't really care about what people use drugs for, it is their life anyway"
 ALG_nationalist_advantage: "Nationalist Utilized"
 ALG_nationalist_advantage_desc: "We are utilizing Nationalist for an extra boost to governance, making it easier to pursue certain policies"
 ALG_fight_nationalist: "Fighting Nationalism"
 ALG_fight_nationalist_desc: "Nationalism is a dangerous force, it can wreak havoc and instability within our nation"
 ALG_drs_idea_1: "Militarized Police"
 ALG_drs_idea_1_desc: "The police have been reorganized into a paramilitary force capable of handling terrorism, riots, and unrest, giving them a stronger role in Algeria's internal security."
 ALG_drs_idea_2: "Heavily Militarized Police"
 ALG_drs_idea_2_desc: "The police now operate as a heavily armed paramilitary body, with advanced equipment and close ties to the army, blurring the lines between civil security and military control."
 ALG_drs_idea_3: "Integrated Militarized Police"
 ALG_drs_idea_3_desc: "Our police forces are fully integrated into the security apparatus, operating side-by-side with the army in counter-terrorism, border defense, and domestic surveillance."
 ALG_riot_police_idea: "Riot Police"
 ALG_riot_police_idea_desc: "A specialized police branch designed to deal with protests, demonstrations, and social unrest. They are equipped with crowd-control gear and operate with a strong emphasis on maintaining regime stability."
 ALG_algerian_special_forces: "Form Algerian Special Forces"
 ALG_algerian_special_forces_desc: "Algeria's security threats demand elite units capable of rapid intervention and counter-terrorism. Establishing specialized forces will strengthen our defense against both internal unrest and external dangers."
 ALG_BRI: "Expand the BRI"
 ALG_BRI_desc: "The Brigade de Recherche et d'Intervention (BRI) is a specialized police unit trained for hostage rescue and high-risk operations. Expanding their numbers and resources will improve our urban security."
 ALG_al_saiqa: "Al-Sa'iqa Units"
 ALG_al_saiqa_desc: "Special paramilitary riot-control and counter-insurgency units will bolster our ability to maintain law and order during periods of civil unrest."
 ALG_al_hars_al_watani: "National Guard"
 ALG_al_hars_al_watani_desc: "A National Security Guard will provide local security in vulnerable areas, free up army resources, and maintain order in crisis situations."
 ALG_haras_al_hudod: "Border Guard Units"
 ALG_haras_al_hudod_desc: "Specialized forces patrolling our borders will curb smuggling, prevent infiltration, and strengthen Algeria's frontier defenses."
 ALG_central_armed_police: "Central Armed Police"
 ALG_central_armed_police_desc: "Consolidating armed police into a centralized command will improve response times and efficiency, ensuring a stronger hand against organized threats."
 ALG_border_security_force: "Border Security Force"
 ALG_border_security_force_desc: "By creating a dedicated force for border surveillance and interdiction, Algeria will clamp down on trafficking networks and armed infiltration."
 ALG_firqat_tadakhol_al_sariye: "Rapid Intervention Unit"
 ALG_firqat_tadakhol_al_sariye_desc: "Elite rapid-reaction units will allow Algeria to strike swiftly against terrorist cells and emerging crises before they escalate."
 ALG_expanding_BRI: "Expanding BRI Capabilities"
 ALG_expanding_BRI_desc: "With more funding, training, and advanced equipment, the BRI can evolve into a formidable counter-terror and hostage-rescue unit rivaling the best in the region."
 ALG_increase_police_funding: "Increase Police Funding"
 ALG_increase_police_funding_desc: "Boosting investment in our police and gendarmerie will strengthen internal stability, reinforce public security, and improve Algeria's resilience against unrest."
 ALG_drs_expand: "Expand the DRS"
 ALG_drs_expand_desc: "The Département du Renseignement et de la Sécurité (DRS) can be further expanded, granting greater intelligence-gathering and counter-espionage capabilities."
 ALG_new_gendarmerie_equipment: "New Equipment for the Gendarmerie"
 ALG_new_gendarmerie_equipment_desc: "Our gendarmerie must be properly armed and equipped to meet the challenges of terrorism, crime, and internal unrest."
 ALG_mia_reform: "Reform the Ministry of Interior"
 ALG_mia_reform_desc: "Centralizing command under the Ministry of Interior will streamline internal security management, ensuring quicker and more coordinated responses."
 ALG_internal_troops: "Internal Troops"
 ALG_internal_troops_desc: "Paramilitary internal troops under state command will reinforce the fight against insurgency and criminal networks."
 ALG_increase_special_forces: "Increase Special Forces"
 ALG_increase_special_forces_desc: "Our elite forces need expanded recruitment and specialized training programs to face the sophisticated threats of modern warfare."
 ALG_cybercrime_directorate: "Cybercrime Directorate"
 ALG_cybercrime_directorate_desc: "The creation of a Directorate against Cybercrime will protect Algeria from digital espionage, cyber-attacks, and hostile disinformation campaigns."
 ALG_riot_police: "Riot Police Units"
 ALG_riot_police_desc: "Organized riot police units will provide crowd control and a disciplined response to mass protests, ensuring stability during unrest."
 ALG_military_police_training: "Military Police Training"
 ALG_military_police_training_desc: "Training programs for military police will increase discipline, reduce desertion, and improve occupation management in unstable regions."
 ALG_peoples_security: "People's Security"
 ALG_peoples_security_desc: "A doctrine of ‘People's Security' will strengthen civil-military cooperation, bolster morale, and integrate local populations into national defense efforts."
 ALG_procurement_of_espionage_equipment: "Procurement of Espionage Equipment"
 ALG_procurement_of_espionage_equipment_desc: "Investing in advanced surveillance and espionage technology will enhance our ability to detect and neutralize internal and foreign threats."
 ALG_occupation_management_strategies: "Occupation Management Strategies"
 ALG_occupation_management_strategies_desc: "New strategies for managing occupied or unstable areas will minimize resistance, reduce casualties, and consolidate state authority."
 ALG_french_weapons: "Import French Weapons"
 ALG_french_weapons_desc: "By acquiring French small arms and equipment, Algeria can rapidly modernize its infantry while strengthening ties with Paris."
 ALG_russian_guns: "Import Russian Guns"
 ALG_russian_guns_desc: "Russian small arms, delivered in bulk, provide Algeria with durable and reliable weaponry, reinforcing our traditional defense partnership with Moscow."
 ALG_algerian_space_programme: "Establish ASAL"
 ALG_algerian_space_programme_desc: "The Algerian Space Agency (ASAL) will coordinate all national space activities, from satellite development to international cooperation in space research."
 ALG_alsat_initiative: "AlSat Initiative"
 ALG_alsat_initiative_desc: "The AlSat project provides Algeria with its first satellites, dedicated to earth observation and communications, marking our entry into the space age."
 ALG_alsat2_series: "AlSat-2 Series"
 ALG_alsat2_series_desc: "The development of advanced AlSat-2 satellites will enhance our surveillance, communications, and remote sensing capabilities."
 ALG_finance_private_space_companies: "Finance Private Space Companies"
 ALG_finance_private_space_companies_desc: "Encouraging Algeria's private sector to participate in the space industry will strengthen our domestic high-tech base."
 ALG_regional_satnet: "Regional SatNet"
 ALG_regional_satnet_desc: "We will link our satellites into a regional network, integrating civilian and military uses while connecting Algeria with its neighbors."
 ALG_asal_lunar_project: "ASAL Lunar Project"
 ALG_asal_lunar_project_desc: "Algeria's space agency will begin an ambitious project to study lunar exploration and advance rocketry technology."
 ALG_human_spaceflight: "Human Spaceflight Program"
 ALG_human_spaceflight_desc: "Our space program will take a bold step forward: planning Algeria's first human spaceflight in partnership with international allies."
 ALG_orbital_defense_program: "Orbital Defense Program"
 ALG_orbital_defense_program_desc: "Satellites can also be used for defense. Developing orbital defense capabilities will protect Algeria from future threats."
 ALG_alsat_future: "Future of AlSat"
 ALG_alsat_future_desc: "The future of Algeria's space program lies in sustained investment, public-private partnerships, and long-term scientific planning."
 ALG_cyber_sat_integration: "Cyber-Satellite Integration"
 ALG_cyber_sat_integration_desc: "Merging cyber warfare capabilities with our satellite network will give Algeria a powerful asymmetric tool in modern conflict."
 ALG_idea_the_new_space_race: "The New Space Race"
 ALG_idea_the_new_space_race_desc: "Algeria has entered the global space race, competing with world powers to prove its technological and strategic strength."
 ALG_idea_cyberwarfare_2: "Cyber-Satellite Integration"
 ALG_idea_cyberwarfare_2_desc: "Algeria's cyber command is now integrated with our satellite systems, providing superior communications security and offensive capabilities."
 ALG_algeria_police_modifier: "Internal Security of Algeria"
 ALG_algeria_police_modifier_desc: "The Algeriaian government has a wealth of experience since its time as part of the USSR in suppressing dissent and enemy agents."
 ALG_algeria_police_modifier_tt_intro: "Modify §Y$ALG_algeria_police_modifier$§! by"
