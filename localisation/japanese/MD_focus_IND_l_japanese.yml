 IND_finished_disaster: "災害早期阻止"
 IND_finished_disaster_desc: "わあ、最後の災害を早期に阻止したね！よくやった。"
 IND_purchase_rafale_jets: "ラファールジェット購入"
 IND_purchase_rafale_jets_desc: "Our friends in the west have offered us their latest and greatest multi-role jets, but it comes at a cost. We should consider this, as we can grow closer with them and get our hands on western planes."
 IND_cede_riau: "リアウ割譲"
 IND_cede_riau_desc: "Ceding Riau will solve a lot of our issues. It is not worth it fighting over a small island."
 IND_our_policies_tt: "§Y$IND_new_capital$§!または§Y$IND_new_silkroad$§!のいずれかを完了する必要がある！"
 IND_grasberg_mine_exploitation: "グラスベルグ鉱山開発"
 IND_grasberg_mine_exploitation_desc: "西パプアのグラスベルグ鉱山は世界最大の金および銅鉱山の一つである。我々はこの地域の埋蔵量を拡大・開発し、インドネシアを貴金属市場により良く参入させるべきである。"
 IND_separate_school: "男女別学"
 IND_separate_school_desc: "Our students will be distracted looking at each other while in the classroom. We must build new, separate schools for boys and girls."
 IND_dont_separate_school: "男女共学"
 IND_dont_separate_school_desc: "保守派が別学を求めているにもかかわらず、彼らの要求に屈するのは愚かだろう。もし新しい学校を建設するなら、それは借金を積み上げ、生徒の教育を遅らせるだろう！"
 IND_dem_entrepreneur: "起業家精神資金提供"
 IND_dem_entrepreneur_desc: "ますますデジタル化する世界において、国民がインドネシアを世界の他の国々と同等にするために起業家精神に資金を提供することが重要である。"
 IND_equal_opportunities: "均等な機会"
 IND_equal_opportunities_desc: "An equal opportunity is not something many have the luxury of, especially here in Indonesia. We can change that however, by granting people plots of land."
 IND_reparations_give: "賠償金提供"
 IND_reparations_give_desc: "Lets give the families of the volunteers some financial compensation as a way to say sorry, and also boost our nations image."
 IND_demand_reparations: "賠償要求"
 IND_demand_reparations_desc: "我が男女の家族は即時の金銭的補償を必要としている。もしこの補償を受け取らなければ、力ずくで取るつもりだ……"
 IND_crackdown_counterfeit: "Crackdown on Counterfeits"
 IND_crackdown_counterfeit_desc: "Counterfeit bills are running rampant in our nation. This is not good for our economy. So we must begin cracking down such practices and inch ever closer to economic recovery."
 IND_counterfeit: "Counterfeit Practices"
 IND_counterfeit_desc: "A little bit of counterfeit wouldn't hurt our nation. As long as our people are not protesting and are satisfied, then so are our pockets."
 IND_batam_sez: "Batam Special Economic Zone"
 IND_batam_sez_desc: "Batam Island sits at a strategic crossroads between Singapore and the Indonesian archipelago. By designating it as a special economic zone with tax incentives and streamlined regulations, we can attract electronics manufacturers and build a high-tech industrial cluster."
 IND_nickel_processing: "Nickel Downstreaming Initiative"
 IND_nickel_processing_desc: "Indonesia holds the world's largest nickel reserves, yet we export most of it as raw ore. A downstreaming policy will mandate domestic processing, creating value-added industries in battery materials and stainless steel."
 IND_semiconductor_fab: "Semiconductor Fabrication"
 IND_semiconductor_fab_desc: "With a growing electronics sector in Batam and processed nickel for advanced materials, we are positioned to establish our first semiconductor fabrication facility. This is a critical step toward technological self-sufficiency."
 IND_pt_pindad_modernize: "PT Pindad Modernization"
 IND_pt_pindad_modernize_desc: "PT Pindad, our state-owned defense manufacturer, has produced small arms and armored vehicles for the TNI for decades. Integrating domestic semiconductor components will reduce our reliance on foreign arms imports."
 IND_pt_di_aerospace: "PT Dirgantara Indonesia"
 IND_pt_di_aerospace_desc: "PT Dirgantara Indonesia is our national aerospace company with decades of aircraft assembly experience. Investing in advanced composite materials and domestically produced avionics will revitalize the company."
 IND_korean_chip_partnership: "Korean Semiconductor Partnership"
 IND_korean_chip_partnership_desc: "South Korea is a global leader in semiconductor manufacturing. A partnership with Korean firms could accelerate our chip production capabilities and provide access to cutting-edge fabrication techniques."
 IND_taiwan_chip_partnership: "TSMC Partnership Agreement"
 IND_taiwan_chip_partnership_desc: "Taiwan Semiconductor Manufacturing Company is the world's largest chip foundry. Securing a partnership with TSMC would bring unparalleled expertise to our nascent semiconductor industry and benefit both nations."
 IND_defense_industrial_base: "Integrated Defense Industrial Base"
 IND_defense_industrial_base_desc: "The culmination of our industrial strategy: an integrated defense industrial base combining nickel processing, semiconductor fabrication, and modernized state enterprises into a self-sustaining ecosystem."
 indonesia.17.t: "Indonesia Proposes a Semiconductor Partnership"
 indonesia.17.d: "Indonesian officials have approached us with a proposal for a joint semiconductor manufacturing partnership. They seek to leverage our expertise in chip fabrication to develop their own domestic industry, and are willing to invest substantially in the arrangement."
 indonesia.17.a: "This could be mutually beneficial."
 indonesia.17.b: "We are not interested at this time."
 indonesia.170.t: "South Korea Accepts the Partnership!"
 indonesia.170.d: "The South Korean government has agreed to our semiconductor partnership proposal. South Korean firms will share fabrication expertise with our Batam facilities, and both nations stand to benefit from closer economic ties."
 indonesia.170.a: "A promising arrangement."
 indonesia.1700.t: "South Korea Declines the Partnership"
 indonesia.1700.d: "The South Korean government has declined our proposal for a semiconductor partnership. This is a setback for our ambitions in chip manufacturing."
 indonesia.1700.a: "We will find another way."
 indonesia.18.t: "Indonesia Proposes a TSMC Partnership"
 indonesia.18.d: "Indonesia has approached us with a proposal for TSMC to establish a collaborative manufacturing arrangement with their new semiconductor facilities in Batam. The deal would expand TSMC's production footprint in Southeast Asia while developing Indonesia's chip industry."
 indonesia.18.a: "TSMC will benefit from this expansion."
 indonesia.18.b: "We must decline this proposal."
 indonesia.180.t: "Taiwan Accepts the TSMC Partnership!"
 indonesia.180.d: "Taiwan's authorities have agreed to our TSMC partnership proposal. The world's leading chip foundry will now collaborate with our Batam semiconductor facilities, bringing cutting-edge expertise to Indonesia."
 indonesia.180.a: "A landmark agreement!"
 indonesia.1800.t: "Taiwan Declines the Partnership"
 indonesia.1800.d: "Taiwan's authorities have declined our proposal for a TSMC partnership. Without their expertise, our semiconductor ambitions will be more difficult to realize."
 indonesia.1800.a: "A disappointing outcome."
 IND_maluku_back_christians: "Back the Christians!"
 IND_maluku_back_christians_desc: "We must back our neglected Christian Population. It is the least we can do for them in these trying times."
 IND_national_awakening: "National Awakening Party's Agenda"
 IND_national_awakening_desc: "The National Awakening Party, a conservative Indonesian political party, has once again entered the political scene. How they proceed this time is anyone's guess."
 IND_parliament_stormed: "Parliament Stormed!"
 IND_parliament_stormed_desc: "The Parliament has been stormed and several key officials have been taken prisoner. They are demanding that they resign in order to gain their freedoms."
 IND_purify_philippines: "Purify the Philippines"
 IND_purify_philippines_desc: "Let us push north, into the Philippines. Though they are not an islamic nation, it doesn't mean they cannot become one!"
 indonesia.15.t: "Indonesia Proposes the 10 Principles of Bandung"
 indonesia.15.d: "Indonesian diplomats have approached us with a proposal based on the historic Bandung Conference principles. They are asking us to agree to a pact of mutual non-aggression and non-interference in each other's internal affairs. This could strengthen Sino-Indonesian relations considerably."
 indonesia.15.a: "We agree to these principles."
 indonesia.15.b: "We have no interest in such an agreement."
 indonesia.150.t: "China Accepts the Bandung Principles!"
 indonesia.150.d: "The Chinese government has agreed to the 10 Principles of Bandung. A non-aggression pact has been signed, and both nations have pledged to respect each other's sovereignty and internal affairs."
 indonesia.150.a: "A historic moment for Asian unity."
 indonesia.1500.t: "China Rejects the Bandung Principles"
 indonesia.1500.d: "The Chinese government has turned down our proposal for a non-aggression pact based on the Bandung principles. This is a diplomatic setback that may strain our relations with Beijing."
 indonesia.1500.a: "A disappointing outcome."
 indonesia.16.t: "Indonesia Seeks a Diplomatic Meeting"
 indonesia.16.d: "The Indonesian government has requested a formal meeting between our ministers to iron out remaining differences and establish a non-aggression pact. Given our recent history, this could be a significant step toward lasting peace in the region."
 indonesia.16.a: "We welcome this diplomatic effort."
 indonesia.16.b: "We are not interested at this time."
 indonesia.160.t: "Australia Agrees to Meet!"
 indonesia.160.d: "The Australian government has accepted our invitation for a formal diplomatic meeting. A non-aggression pact has been signed, and both nations look forward to a new era of cooperation."
 indonesia.160.a: "Excellent news!"
 indonesia.1600.t: "Australia Declines the Meeting"
 indonesia.1600.d: "The Australian government has declined our request for a formal diplomatic meeting. This is a setback for our efforts to normalize relations with Canberra."
 indonesia.1600.a: "We will remember this."