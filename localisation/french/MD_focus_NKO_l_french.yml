 NKO_china_economic_assistant: "Aide économique chinoise"
 NKO_china_economic_assistant_desc: "L'aide économique de la Chine à la Corée du Nord représente environ la moitié de toute l'aide étrangère chinoise. Pékin fournit cette aide directement à Pyongyang, ce qui lui permet de contourner les Nations Unies. Pendant la période de grave pénurie alimentaire entre 1996 et 1998, Pékin a fourni une aide alimentaire inconditionnelle à la Corée du Nord."
