 NKO_social_security: "Министерство социального обеспечения"
 NKO_social_security_desc: "Министерство социального обеспечения, широко известное как БоАн или Министерство народной безопасности, является министерством внутренних дел и главным правоохранительным органом Северной Кореи. Министерство служит официальным органом общественной и внутренней безопасности, отвечающим за поддержание общественного порядка и защиту ключевых объектов, включая железные дороги и другие виды транспорта."
 NKO_security_forces: "Силы социального обеспечения"
 NKO_security_forces_desc: "Силы социального обеспечения — это северокорейские военизированные формирования, которые выполняют различные задачи по обеспечению внутренней и пограничной безопасности"
 NKO_railway_bureau: "Бюро железнодорожной безопасности"
 NKO_railway_bureau_desc: "Бюро железнодорожной безопасности — охраняет важные маршруты передвижения и перевозки грузов в КНДР"
 NKO_finacial_bureau: "Агентство финансовой разведки"
 NKO_finacial_bureau_desc: "Агентство финансовой разведки — борется с отмыванием денег, вымогательством и другими финансовыми преступлениями"
 NKO_corrections_bureau: "Бюро исполнения наказаний"
 NKO_corrections_bureau_desc: "Бюро исполнения наказаний управляет жестокой тюремной системой в Северной Корее"
 NKO_social_security_forces_idea: "Силы социального обеспечения"
 NKO_social_security_idea: "Министерство социального обеспечения"
 NKO_black_market: "Третий этаж"
 NKO_black_market_desc: "Третий этаж - это общеупотребительный термин, обозначающий взаимодействие трех бюро, подчиненных. Секретариат Центрального комитета партии. Бюро 35, Бюро 38, Бюро 39 в координации с Личным секретариатом занимаются сбором разведывательной информации, получением иностранной валюты для партии и ключевых элит и управлением некоторыми деньгами партии и семьи Кима.  Сотрудники «Третьего этажа», работавшие более чем в 20 странах мира, также отвечали за закупку различных товаров для элиты КНДР и сбор разведданных за пределами специальных информационных сетей КНДР. Термин «Третий этаж» относится к первоначальному местоположению этих офисов — на третьем этаже офисного здания Ким Чен Ира в комплексе Центрального комитета Трудовой партии Кореи в центральном районе Пхеньяна. «Третий этаж» технически подчиняется Центральному комитету партии.  Однако это напрямую связано с семьей Ким."
