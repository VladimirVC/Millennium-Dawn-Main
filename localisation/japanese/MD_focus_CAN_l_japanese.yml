 canada.20.b: "協定を拒否する"
 canada_md_politics.3.d: "Here we go again with a fourth dispute over softwood lumber. The United States has picked yet another fight over it. According to them, our provincial governments are unfairly subsidizing our lumber industry. Timber is owned by the provinces, so they set the prices. Our markets operate somewhat differently from what the Americans are used to. In any case, they have laws allowing them to set tariffs on us to \"even the playing field\" as they call it. We can probably put an end to this nonsense once and for all by bringing in the World Trade Organization. However, that carries the risk of angering the Americans and causing this issue to go beyond just lumber."