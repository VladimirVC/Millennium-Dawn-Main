 sov_nationalists.10.t: "Sojusz z §Y[PER.GetNameWithFlag]§!"
 sov_nationalists.10.d: "Rząd Iranu odmówił przystąpienia do naszego sojuszu na mocy traktatu. Wygląda na to, że będziemy musieli wymusić naszą wolę siłą."
 sov_nationalists.10.a: "Iran będzie nasz!"
 sov_nationalists.11.t: "Utworzono Brygadę Południowego Azerbejdżanu"
 sov_nationalists.11.d: "Siły prorosyjskie w południowym Azerbejdżanie zorganizowały się w formalną brygadę, składając przysięgę wierności Moskwie. Ten rozwój sytuacji daje nam przyczółek w regionie."
 sov_nationalists.11.a: "Będą nam dobrze służyć"
 sov_nationalists.12.t: "§Y[SOV.GetNameWithFlag]§! Oferty dołączenia do sojuszu"
 sov_nationalists.12.d: "Rząd rosyjski proponuje szereg porozumień, które mają nas chronić przed inwazją. Czy przyjmiemy ich ofertę i dołączymy do sojuszu?"
 sov_nationalists.12.a: "Rosja nas uratuje!"
 sov_nationalists.12.b: "NIE"
 sov_nationalists.13.t: "Sojusz z §Y[FROM.GetNameWithFlag]§!"
 sov_nationalists.13.d: "Rząd [FROM.GetName] odmówił przyłączenia się do naszego sojuszu na mocy traktatu. Wygląda na to, że będziemy musieli narzucić naszą wolę siłą."
 sov_nationalists.13.a: "Smutne wieści"
 sov_nationalists.14.t: "Ćwiczenia wojskowe z §Y[FROM.GetNameWithFlag]§!"
 sov_nationalists.14.d: "Rosja prowadzi wspólne ćwiczenia wojskowe z naszymi siłami i siłami innych sojuszników w ramach przygotowań do potencjalnej interwencji militarnej w Turcji."
 sov_nationalists.14.a: "Będziemy gotowi"
 sov_nationalists.15.t: "Stan związkowy z §Y[SOV.GetNameWithFlag]§!"
 sov_nationalists.15.d: "Rząd rosyjski proponuje reaktywację dawnego projektu Państwa Związkowego między Rosją a Serbią. Pierwotnie odrzucony przez rząd Jelcyna w latach 90., teraz proponuje wskrzeszenie tego sojuszu. Czy się zgodzimy?"
 sov_nationalists.15.a: "Tak"
 sov_nationalists.15.b: "NIE"
 sov_nationalists.16.t: "Stan związkowy z §Y[SER.GetNameWithFlag]§!"
 sov_nationalists.16.d: "Rząd Serbii zgodził się na wznowienie projektu Państwa Związkowego, co otwiera nowy rozdział w naszej współpracy."
 sov_nationalists.16.a: "Dobrze"
 sov_nationalists.17.t: "Stan związkowy z §Y[SER.GetNameWithFlag]§!"
 sov_nationalists.17.d: "Rząd Serbii odmówił wznowienia projektu Państwa Związkowego. Ta porażka jest rozczarowująca dla tych, którzy mieli nadzieję na wzmocnienie więzi i zjednoczenie naszych narodów. Musimy dokładnie rozważyć nasze kolejne kroki."
 sov_nationalists.17.a: "Niefortunne"
 sov_nationalists.18.t: "Zmobilizowana milicja Karakałpaków"
 sov_nationalists.18.d: "Zmobilizowały się bojówki Karakałpaki sprzyjające interesom Rosji, oferując swoje usługi w zamian za większą autonomię i ochronę przed władzami uzbeckimi."
 sov_nationalists.18.a: "Ich wsparcie jest zauważalne"
 sov_nationalists.19.t: "Umowa z Rosją"
 sov_nationalists.19.d: "Imperialne ambicje Rosji dotarły już do naszych granic. Ich rząd postawił bezpośrednie ultimatum, żądając kontroli nad naszym krajem. Pytanie pozostaje: czy powinniśmy się sprzeciwić, czy ulec ich żądaniom?"
 sov_nationalists.19.a: "Poddajemy się"
 sov_nationalists.19.b: "Nie dzisiaj"
 sov_nationalists.20.t: "Nowe Imperium Rosyjskie"
 sov_nationalists.20.d: "Prezydent Żyrinowski ogłosił odrodzenie Imperium Rosyjskiego kamieniem węgielnym swojego programu politycznego. Rosja jest gotowa odzyskać swoje dawne terytoria, zarówno pokojowo, jak i siłą. Musimy przygotować się na możliwość wznowienia konfliktu, gdy imperium znów się odrodzi."
 sov_nationalists.20.a: "Boże chroń prezydenta."
 sov_nationalists.21.t: "Reimperializacja"
 sov_nationalists.21.d: "Po powstaniu 1917 roku komuniści starali się wymazać pamięć o przeszłości naszej ojczyzny, zastępując ją swoją ideologią. Wiele rosyjskich miast zostało przemianowanych na cześć komunistycznych przywódców i symboli. Musimy przywrócić naszą historię i godność, przywracając przedrewolucyjne nazwy tym miastom."
 sov_nationalists.21.a: "Przywróćmy stare, przedrewolucyjne nazwy miast"
 sov_nationalists.21.b: "Tytuły przedwojenne były lepsze"
 sov_nationalists.22.t: "Rosja proponuje przeprowadzenie referendum"
 sov_nationalists.22.d: "Rząd rosyjski zasugerował przeprowadzenie pilnego referendum w sprawie przystąpienia Rosji do Unii. Ta nagła propozycja podkreśla tempo i determinację nowej polityki Rosji. Pytanie brzmi: czy przeprowadzimy to referendum i zaakceptujemy jego wynik?"
 sov_nationalists.22.a: "Zróbmy to i zaakceptujmy wynik"
 sov_nationalists.22.b: "Nie chcemy być częścią Rosji"
 sov_nationalists.23.t: "Rosja żąda Mandżurii"
 sov_nationalists.23.d: "Rosja domaga się aneksji Mandżurii w ramach swojego planu odtworzenia Żeltorosji. To agresywne żądanie zmusza nas do podjęcia decyzji, czy poddać się, czy też stawić opór ich ambicjom."
 sov_nationalists.23.a: "Musimy poddać..."
 sov_nationalists.23.b: "Dziś nie będzie Żeltorosji."
 sov_nationalists.24.t: "Chiny akceptują nasze żądanie"
 sov_nationalists.24.d: "Chiny zgodziły się na nasze żądania dotyczące Mandżurii. Dzięki tej akceptacji ostatecznie zapewniliśmy sobie kontrolę nad Żeltorosją. To zwycięstwo stanowi ważny krok w realizacji naszych regionalnych ambicji."
 sov_nationalists.24.a: "Sława Rossii!"
 sov_nationalists.25.t: "Chiny odmawiają nam poparcia"
 sov_nationalists.25.d: "Chiny odrzuciły nasze żądania dotyczące Mandżurii. Teraz będziemy musieli rozważyć podjęcie działań militarnych w celu odzyskania Żeltorosji i wyegzekwowania naszych roszczeń."
 sov_nationalists.25.a: "Wybrali śmierć."
 sov_nationalists.26.t: "Rosja wypowiada wojnę USA"
 sov_nationalists.26.d: "Nacjonalistyczny rząd Rosji ogłosił kampanię unifikacjonistyczną przeciwko atlantyckiemu zagrożeniu dla porządku świata. Ta nagła deklaracja zwiastuje nową fazę globalnego konfliktu."
 sov_nationalists.26.a: "Co do cholery?"
 sov_nationalists.27.t: "Umowa z Rosją"
 sov_nationalists.27.d: "Imperialne ambicje Rosji dotarły już do naszych granic. Ich rząd postawił bezpośrednie ultimatum, domagając się kontroli nad naszym krajem. Pytanie pozostaje: czy powinniśmy stawiać opór, czy się poddać?"
 sov_nationalists.27.a: "Poddajemy się"
 sov_nationalists.27.b: "Nie dzisiaj"
 sov_nationalists.28.t: "Ochrona z Gruzji"
 sov_nationalists.28.d: "Rosja zaproponowała przeprowadzenie referendum w sprawie naszego przystąpienia do ich unii. Oczekiwany wynik jest jasny, ale musimy zdecydować, czy przyjąć tę propozycję, czy ją odrzucić."
 sov_nationalists.28.a: "Oczywiście, że czas wracać do domu – do Rosji"
 sov_nationalists.28.b: "Nie dzisiaj"
 sov_nationalists.29.t: "Nieoczekiwany związek"
 sov_nationalists.29.d: "Nikt nie spodziewał się współpracy z komunistami, a jednak nastąpiła ona nieoczekiwanie. Ten sojusz może radykalnie zmienić sytuację polityczną."
 sov_nationalists.29.a: "Ciekawe"
 sov_nationalists.30.t: "Wybór nowego monarchy..."
 sov_nationalists.30.d: "Rosja potrzebuje silnego nowego monarchy, który poprowadzi odrodzone imperium. Musimy zdecydować, kto obejmie tron ​​i poprowadzi naród przez te burzliwe czasy."
 sov_nationalists.30.d1: "Andriej Romanow jest najbardziej uzasadnionym kandydatem!"
 sov_nationalists.30.b: "Maria Władimirowna!"
 sov_nationalists.30.c: "Gieorgij powinien rządzić!"
 sov_nationalists.30.a: "Mikołaj Trzeci!"
 sov_nationalists.31.t: "Zjednoczenie Kościoła i Państwa"
 sov_nationalists.31.d: "Rząd ogłosił połączenie Kościoła i państwa w jeden organizm. Kościół prawosławny jest teraz w pełni zintegrowany z kręgami rządzącymi, przywracając historyczną harmonię między władzą duchową i polityczną."
 sov_nationalists.31.a: "Carebożnicy."
 sov_nationalists.32.t: "Żyrinowski wybrany na prezydenta"
 sov_nationalists.32.d: "Podczas niedawnej zmiany rządu władzę zdobyła nacjonalistyczna partia LDPR, a prezydentem został Władimir Żyrinowski. Obiecali oni gruntowne reformy, w tym przywrócenie starej flagi i realizację konserwatywnego, nacjonalistycznego programu."
 sov_nationalists.32.a: "Co czeka Rosję?"
 sov_nationalists.33.t: "Operacja wojskowa w [UKR.GetName]"
 sov_nationalists.33.d: "Dyplomatyczne wysiłki mające na celu przywrócenie Ukrainy Imperium Rosyjskiemu zakończyły się niepowodzeniem. Teraz zostaną podjęte działania militarne w celu obalenia obecnego rządu i odzyskania tych ziem."
 sov_nationalists.33.a: "Kijów będzie nasz!"
 sov_nationalists.34.t: "Armia [SOV.GetName]"
 sov_nationalists.34.d: "Nasze odrodzone państwo potrzebuje silnej i sprawnej armii. Wdrożymy reformy, aby zmodernizować i wzmocnić nasze siły zbrojne, przygotowując je do przyszłych wyzwań."
 sov_nationalists.34.a: "Dla [SOV.GetName]!"
 sov_nationalists.35.t: "Porozumienie Moskiewskie Podpisane!"
 sov_nationalists.35.d: "Oficjalnie utworzyliśmy nowy sojusz wojskowo-polityczny, którego celem jest promowanie interesów Rosji i przeciwstawianie się mocarstwom zachodnim. Ten blok będzie kluczowym narzędziem naszej odrodzonej siły."
 sov_nationalists.35.a: "Dla [SOV.GetName]!"
 sov_nationalists.36.t: "[NOV.GetName] Gubernatorstwo"
 sov_nationalists.36.d: "[NOV.GetName] zostanie w pełni włączone do Imperium Rosyjskiego. Flaga rosyjska ponownie zawiśnie nad tym krajem, symbolizując jego powrót do ojczyzny."
 sov_nationalists.36.a: "Dla [SOV.GetName]!"
 sov_nationalists.37.t: "Powstania kozackie w [KAZ.GetName]"
 sov_nationalists.37.d: "Grupy kozackie lojalne wobec nas w [KAZ.GetName] rozpoczęły zbrojne rebelie po naszym ogłoszeniu odzyskania tych ziem dla [SOV.GetName]. Ich zacięta lojalność napędza to powstanie."
 sov_nationalists.37.a: "Dla [SOV.GetName]!"
 sov_nationalists.38.t: "Operacja wojskowa w Azji Środkowej"
 sov_nationalists.38.d: "Republiki Azji Środkowej są produktem sowieckiego błędu, który przyznał im fałszywą niepodległość. W razie potrzeby siłą przywrócimy te terytoria do naszego wielkiego Imperium."
 sov_nationalists.38.a: "Dla [SOV.GetName]!"
 sov_nationalists.39.t: "Antyrosyjska zbrojna rebelia"
 sov_nationalists.39.d: "Nasza prorosyjska polityka wywołała bunt wśród niektórych generałów, którzy teraz maszerują na Warszawę, mając na celu obalenie rosyjskich sił okupacyjnych kontrolujących polski rząd."
 sov_nationalists.39.a: "O Boże..."
 SOV_URA_separ_tt: "§RSeparatyzm§! w §Y[URA.GetNameWithFlag]§!: §Y[?URA.subjectinped]§!%"
 SOV_question_of_genrih: "Niemiecka rewolucja monarchiczna"
 SOV_question_of_genrih_desc: "Planujemy obalić skorumpowany i upadający rząd niemiecki i przywrócić Niemcom ich dawną świetność – jako części Rosji, oczywiście. Ta rewolucja zmieni równowagę sił w Europie."
 SOV_suppress_nationalists: "Tłumić nacjonalistów"
 SOV_suppress_nationalists_desc: "Rosyjscy nacjonaliści zagrażają powstaniu jakiejkolwiek demokracji na wzór zachodni. Trzeba ich stłumić."
 SOV_iraq_moscow_pact: "Chroń Irak"
 SOV_iraq_moscow_pact_desc: "Nie pozwolimy obcym armiom swobodnie przemierzać ulic Bagdadu. Ochrona Iraku przed ingerencją z zewnątrz jest kluczowa dla utrzymania stabilności regionu i naszych wpływów."
 sov_nationalists.40.t: "Antyrosyjska zbrojna rebelia"
 sov_nationalists.40.d: "Nasze prorosyjskie stanowisko skłoniło niektórych generałów do buntu, którzy ogłosili zamiar siłowego wydalenia z Republiki Czeskiej całego prorosyjskiego rządu."
 sov_nationalists.40.a: "O Boże..."
 SOV_czechoslovak_region: "Region Czechosłowacki"
 SOV_czechoslovak_region_desc: "Podobnie jak w 1968 roku, region czechosłowacki nadal ma dla nas ogromne znaczenie strategiczne. Zapewnienie sobie tu wpływów umocni naszą dominację nad Europą Wschodnią. Musimy działać zdecydowanie, aby odbudować naszą pozycję."
 SOV_promotion_of_unite_with_russia_agains_chechos: "Promuj interesy §Yrosyjski§! w §Y[CZE.GetNameWithFlag]§! i §Y[SLO.GetNameWithFlag]§!"
 SOV_perevorot_czechia_govern: "§Y[SOV.GetFlag]§!§YProrosyjski§! Zamach stanu w §Y[CZE.GetNameWithFlag]§!"
 SOV_perevorot_slovakia_govern: "§Y[SOV.GetFlag]§!§YProrosyjski§! Zamach stanu w §Y[SLO.GetNameWithFlag]§!"
 SOV_unite_of_greater_russia: "Zjednoczeni, wielcy i niepodzielni"
 SOV_unite_of_greater_russia_desc: "Rosja musi być zjednoczonym, niepodzielnym krajem, bez podziałów narodowych. Rozbicie na republiki zniszczyło kiedyś nasze potężne państwo i tylko jedność może przywrócić nam siłę."
 SOV_republickill_23_TT: "[CHE.GetFlag][TAT.GetFlag][BSH.GetFlag] Większość §YNarodowych republik§! została §RZlikwidowana§!§Y(ponad 18)§!"
 sov_nationalists.41.t: "§Y[SOV.GetNameWithFlag]§! Is Demanding Troops on Our Territory"
 sov_nationalists.41.d: "Rząd rosyjski obawia się potencjalnego zagrożenia z naszej strony i żąda dostępu wojska na nasze terytorium. Czy powinniśmy pozwolić im na przejście, aby złagodzić napięcia, czy odmówić?"
 sov_nationalists.41.a: "Jeśli to jest droga do pokojowego rozwiązania, to się zgadzamy"
 sov_nationalists.41.b: "NIE"
 sov_nationalists.42.t: "Odrzucili naszą propozycję"
 sov_nationalists.42.d: "Ich odmowa współpracy przekonała nas, że stanowią realne zagrożenie dla bezpieczeństwa naszego kraju. Musimy być przygotowani na dalszy konflikt."
 sov_nationalists.42.o1: "Głupcy"
 sov_war_cult_idea: "Kult wojny"
 sov_war_cult_idea_desc: "Historia Rosji jest przesiąknięta wojnami i zwycięstwami. Od Napoleona po Hitlera stawialiśmy czoła niezliczonym zagrożeniom. Historia ta ukształtowała głęboki kulturowy szacunek dla siły i poświęcenia."
 SOV_return_alaska: "Powrót Alaski"
 SOV_return_alaska_desc: "Alaska została sprzedana za marne grosze przez nierozsądnych władców w minionych stuleciach. Teraz nadszedł czas, aby odzyskać to ważne terytorium i przywrócić je do prawowitej ojczyzny."
 SOV_jirik_war_religion: "Religia wojskowa imperialna"
 SOV_jirik_war_religion_desc: "Nasz naród musi odrzucić pacyfizm i przyjąć zmilitaryzowaną wiarę prawosławną, aby zjednoczyć i wzmocnić swój naród."
 GOV_SLO: "Gubernatorstwo słowackie"
 GOV_CZE: "Królestwo Czech"
 GOV_ASK: "Gubernatorstwo Alaski"
 sov_nationalists.43.t: "Inwazja na Alaskę"
 sov_nationalists.43.d: "Nasze siły pomyślnie wylądowały na Alasce i są gotowe do odzyskania tego terytorium siłą. To początek nowej, śmiałej kampanii."
 sov_nationalists.43.o1: "Gubernatorstwo Alaski powinno powrócić"
 SOV_protect_russians: "Ustawa o ochronie Rosjan"
 SOV_protect_russians_desc: "Będziemy chronić Rosjan, gdziekolwiek mieszkają, nie porzucając naszych rodaków. Ta ustawa gwarantuje im prawa i bezpieczeństwo, wzmacniając nasze zaangażowanie na rzecz narodu rosyjskiego na całym świecie."
 SOV_IRQ_base: "[SOV.GetFlag]Rosyjska baza wojskowa"
 SOV_IRQ_base_desc: "Rosyjska baza wojskowa, położona niedaleko naszej stolicy, przypomina nam, że Rosja nas nie opuści w przypadku wojny globalnej. Jeśli jednak reżim w naszym kraju lub w Rosji ulegnie drastycznej zmianie, baza wojskowa zostanie natychmiast zamknięta."
 SOV_IRQ_military_advisors: "Instruktorzy wojskowi z [SOV.GetNameWithFlag]"
 SOV_iraq_weapons: "Zaoferuj broń §Y[IRQ.GetNameWithFlag]§!"
 SOV_iraq_instructors: "Wyślij GRU do §Y[IRQ.GetNameWithFlag]§!"
 SOV_iraq_bases: "Offer a Military Base to §Y[IRQ.GetNameWithFlag]§!"
 sov_nationalists.44.t: "[FROM.GetName] Oferuje broń"
 sov_nationalists.44.d: "[FROM.GetName] zaoferował nam dostawę broni, która będzie nieoceniona w nadchodzących konfliktach. To wsparcie wzmocni nasze zdolności militarne."
 sov_nationalists.44.o1: "Zgadzamy się"
 sov_nationalists.44.o2: "Nie potrzebujemy tego"
 sov_nationalists.45.t: "[FROM.GetName] zgodził się na naszą propozycję"
 sov_nationalists.45.d: "[FROM.GetName] przyjął naszą hojną ofertę, co stanowi kolejny krok w kierunku wzmocnienia naszego sojuszu i zwiększenia naszych wpływów w regionie."
 sov_nationalists.45.o1: "Dobrze"
 sov_nationalists.46.t: "[FROM.GetName] Oferuje instruktorów wojskowych"
 sov_nationalists.46.d: "[FROM.GetName] proponuje wysłanie instruktorów wojskowych, aby przeszkolili nasze wojska w zakresie nowoczesnych taktyk wojennych. To szkolenie zwiększy skuteczność naszej armii."
 sov_nationalists.46.o1: "Zgadzamy się"
 sov_nationalists.46.o2: "Nie potrzebujemy tego"
 sov_nationalists.47.t: "[FROM.GetName] zgodził się na naszą propozycję"
 sov_nationalists.47.d: "[FROM.GetName] przyjął naszą ofertę, co jeszcze bardziej umacnia nasz sojusz i rozszerza nasze wpływy polityczne w tym obszarze."
 sov_nationalists.47.o1: "Dobrze"
 sov_nationalists.48.t: "[FROM.GetName] Odrzucił naszą ofertę"
 sov_nationalists.48.d: "[FROM.GetName] odrzuciło naszą hojną propozycję, tracąc szansę na wzmocnienie naszych wpływów i ustabilizowanie własnej sytuacji politycznej."
 sov_nationalists.48.o1: "Niefortunne"
 sov_nationalists.49.t: "[FROM.GetName] Oferuje hostowanie bazy wojskowej"
 sov_nationalists.49.d: "[FROM.GetName] zaoferował utworzenie bazy wojskowej na swoim terytorium, aby pomóc nam w walce z potencjalnymi przeciwnikami. To może być strategiczna przewaga."
 sov_nationalists.49.o1: "Zgadzamy się"
 sov_nationalists.49.o2: "Nie potrzebujemy tego"
 SOV_save_gaddafi: "Chroń Libię"
 SOV_save_gaddafi_desc: "Obcym ​​armiom nie pozwolimy na zdominowanie Trypolisu. Jesteśmy zdecydowani chronić suwerenność Libii i przeciwstawiać się zewnętrznej interwencji wojskowej."
 SOV_help_karabah: "Wyzwolić Karabach spod władzy Azerbejdżanu"
 SOV_help_karabah_desc: "Nie uznajemy okupacji Karabachu przez Azerbejdżan i zamierzamy zwrócić te ziemie naszemu imperium. To wyzwolenie przywróci historyczną sprawiedliwość i wzmocni nasze południowe granice."
 SOV_LBA_base: "[SOV.GetFlag]Rosyjska baza wojskowa"
 SOV_LBA_base_desc: "Rosyjska baza wojskowa, położona niedaleko naszej stolicy, przypomina nam, że Rosja nas nie opuści w przypadku wojny globalnej. Jeśli jednak reżim w naszym kraju lub w Rosji ulegnie drastycznej zmianie, baza wojskowa zostanie natychmiast zamknięta."
 SOV_libya_weapons: "Zaoferuj broń §Y[LBA.GetNameWithFlag]§!"
 SOV_libya_instructors: "Wyślij GRU do §Y[LBA.GetNameWithFlag]§!"
 SOV_libya_bases: "Offer a Military Base to §Y[LBA.GetNameWithFlag]§!"
 jirik_military_base_TT: "[SOV.GetFlag]rosyjski §HMnożnik wpływu§! w §Y[ROOT.GetNameWithFlag]§!: §R+15%§!"
 GOV_NKR: "Gubernatorstwo Szemacha"
 russia_governorate.16.t: "Rosja postanowiła utworzyć z nas gubernię"
 russia_governorate.16.d: "Rosja jest zdecydowanie przeciwna staremu ustrójowi państwowemu. Naciska na powrót podziałów administracyjnych i chce, abyśmy stali się jedną z ich guberni."
 russia_governorate.16.o1: "Razem odbudujemy wielkie Imperium!"
 russia_governorate.16.o2: "Oprzyj się i ugryź!"
 russia_governorate.16.o3: "Zaproponuj stan związkowy"
 russia_governorate.17.t: "Białoruś wraca do domu"
 russia_governorate.17.d: "Rząd Białorusi postąpił mądrze, unikając konfliktu z nami. Białoruś ponownie stanie się częścią Imperium Rosyjskiego, wzmacniając nasz sojusz."
 russia_governorate.17.o1: "Doskonały"
 russia_governorate.18.t: "Białoruś stawia nam opór!"
 russia_governorate.18.d: "Białoruś miała czelność przeciwstawić się rosyjskim dążeniom do utworzenia Państwa Związkowego. Musimy przygotować zdecydowaną odpowiedź na ten opór."
 russia_governorate.18.o1: "Głupcy"
 russia_governorate.19.t: "Białoruś proponuje państwo związkowe"
 russia_governorate.19.d: "The Belarusian government has offered an alternative, less aggressive approach: the creation of a Union State at an accelerated pace. It appears they seek to minimize the power losses they might suffer."
 russia_governorate.19.o1: "Czy może istnieć państwo związkowe?"
 russia_governorate.19.o2: "Nie, Białoruś nie."
 SOV_west_east_bop_left_side: "£text_icon_sov_democratic §YNowa Demokratyczna Rosja§!"
 SOV_west_east_bop_right_side: "£text_icon_sov_empire §YDziedzice Wielkiej Rosji§!"
 SOV_west_east_bop: "§YPrzyszłość Rosji§!"
 SOV_west_east_bop_mid_range: "£text_icon_sov_democratic §YNastępcy Jelcyna§!"
 SOV_west_east_left_win_range: "£text_icon_sov_democratic §YDemokracja rosyjska§!"
 SOV_west_east_left_advanced_range: "£text_icon_sov_democratic §YZasady demokratyczne§!"
 SOV_west_east_left_medium_range: "£text_icon_sov_democratic §YŚwiadomość demokratyczna§!"
 SOV_west_east_left_low_range: "£text_icon_sov_democratic §YPierwsze kroki demokracji§!"
 SOV_west_east_right_win_range: "£text_icon_sov_empire §YTrzeci Rzym§!"
 SOV_west_east_right_advanced_range: "£text_icon_sov_empire §YNowe Imperium§!"
 SOV_west_east_right_medium_range: "£text_icon_sov_empire §YŚwiadomość wielkości§!"
 SOV_west_east_right_low_range: "£text_icon_sov_empire §YWielka przeszłość§!"
 russian_legacy_empire: "£text_icon_sov_empire Dziedzictwo Imperialne"
 russian_legacy_empire_desc: "Russia has always stood as a great empire, and we will not abandon this legacy in pursuit of fleeting democratic illusions."
 russian_legacy_democratic: "£text_icon_sov_democratic Demokratyczne dziedzictwo"
 russian_legacy_democratic_desc: "While Russia has experienced long periods of autocracy, it has also known moments of democratic hope. We will preserve and expand this legacy of freedom."
 SOV_kosmo_voiska: "Rosyjskie Siły Kosmiczne"
 SOV_kosmo_voiska_desc: "The Russian Space Forces serve as the space branch of the Aerospace Forces."
 SOV_armyreform_ipso: "Oddziały Operacji Informacyjnych"
 SOV_armyreform_ipso_desc: "These troops conduct cyberwarfare, manage military networks, and protect communication systems from cyber threats."
 SOV_army_mto: "Wsparcie logistyczne rosyjskich sił zbrojnych"
 SOV_army_sso: "Siły Operacji Specjalnych"
 SOV_army_ipso: "Oddziały Operacji Informacyjnych"
 SOV_russian_spaceforce: "Rosyjskie Siły Kosmiczne"
 SOV_putinism_propaganda: "Propaganda Putina"
 SOV_putinism_propaganda_desc: "Before Putin, Russia was a shattered and humiliated country. Under his leadership, hope and pride were restored. We will celebrate this revival, and ensure that all citizens understand the greatness he has brought to Russia."
 SOV_idea_putinism_propaganda: "Propaganda Putina"
 SOV_putinism_system_protest: "Protest przeciwko systemowi Putina"
 SOV_moscow_no_more: "Piotrogród jest stolicą Rosji"
 SOV_KUB_separ_tt: "§RSeparatyzm§! w §Y[KUB.GetNameWithFlag]§!: §Y[?KUB.subjectinped]§!%"
 GOV_TRK: "Gubernatorstwo Turkiestanu"
 SOV_stabilisation_fund: "Fundusz Stabilizacyjny"
 SOV_stabilisation_fund_desc: "The stabilization fund will serve as a financial reserve in the event of an economic crisis. It will help preserve national stability during downturns and ensure that public services continue to function. Having this safety net strengthens our position in both domestic and international markets."
 SOV_kasyanov_govern: "Rząd Kasjanowa"
 SOV_kasyanov_govern_desc: "Kasyanov's government plans to reach an agreement with the Paris Club to write off part of our national debt. This would ease financial burdens and help stimulate growth. With more fiscal breathing room, we can focus on development and public welfare."
 SOV_young_guard: "Młoda Gwardia"
 SOV_young_guard_desc: "The Young Guard is the youth wing of the United Russia party. Its name traces back to a heroic World War II underground movement. A pro-Putin direct action group, it claims 85 regional branches from Kaliningrad to Vladivostok, mobilizing patriotic youth across the nation."
 SOV_reform_sovfed: "Reforma Rady Federacji"
 SOV_reform_sovfed_desc: "We are reforming the Federation Council to make its work more effective. In its current state, it serves little use. With better structure and clearer purpose, the Council can become a vital tool for policy implementation."
 SOV_stab_fund_idea: "Fundusz Stabilizacyjny"
 SOV_young_guard_idea: "Młoda Gwardia"
 SOV_stab_fund_tt: "W przypadku §RZłej sytuacji gospodarczej§!, §YFundusz Stabilizacyjny§! jest wykorzystywany w celu stabilizacji gospodarki\n"
 SOV_economic_russian: "Gospodarka rosyjska"
 SOV_economic_russian_desc: "Our economy remains weakened by the crises of the 1990s, the collapse of the USSR, and other lasting effects. It is time to take decisive action to rebuild and strengthen our nation's economic foundation."
 SOV_economic_reform_gazprom: "Reforma Gazpromu"
 SOV_economic_reform_gazprom_desc: "Gazprom suffered greatly during the 1990s crisis. Reforming this critical company is essential to preserve it as a powerful driver of our economic growth."
 SOV_economic_buy_sibur: "Nabycie aktywów SIBUR"
 SOV_economic_buy_sibur_desc: "We are acquiring assets of the SIBUR oil company to expand our industrial capabilities and secure our energy sector."
 SOV_economic_zapolyarnoe: "Pole gazowe Zapolyarnoye"
 SOV_economic_zapolyarnoe_desc: "Discovered in the 1960s, the vast gas, oil, and condensate reserves at Zapolyarnoye are now ready for extraction to boost our energy output."
 SOV_economic_gazprom_tes: "Budowa Elektrowni Cieplnych"
 SOV_economic_gazprom_tes_desc: "As part of our energy development program, we will build multiple thermal power plants nationwide to ensure stable electricity supply."
 SOV_economic_nat_gas_sakhalin: "Produkcja gazu na Sachalinie"
 SOV_economic_nat_gas_sakhalin_desc: "Investments in Sakhalin's gas fields will secure substantial profits and strengthen our energy exports."
 SOV_economic_gazprom_stream: "Budowa strumieni"
 SOV_economic_gazprom_stream_desc: "We are prepared to construct new gas pipelines that bypass certain countries, securing stable and reliable gas exports."
 SOV_economic_gazprom_norstream: "Nord Stream"
 SOV_economic_gazprom_norstream_desc: "We will build a direct gas pipeline to Germany, ensuring consistent supply and strengthening economic ties."
 SOV_economic_gazprom_bluestream: "Blue Stream"
 SOV_economic_gazprom_bluestream_desc: "Planowana jest budowa gazociągu do Turcji, która ma zwiększyć nasz eksport energii i wzmocnić współpracę regionalną."
 SOV_economic_gazprom_turkeystream: "Turkish Stream"
 SOV_economic_gazprom_nordstream2: "Nord Stream 2"
 SOV_economic_gazprom_nordstream2_desc: "We plan to extend our gas partnership with Germany by building a second pipeline to meet increasing demand."
 SOV_outer_space_vostochniy: "Kosmodrom Wostocznyj"
 SOV_outer_space_vostochniy_desc: "To reduce dependence on Baikonur, we will begin construction of the Vostochny Cosmodrome for future launches."
 SOV_outer_space_asteroids_mining: "Zasoby z asteroidów"
 SOV_outer_space_asteroids_mining_desc: "Our space technology now enables the extraction of valuable resources from asteroids, which we will capitalize on."
 SOV_outer_space_space_combat_wombat: "Preparing for the Space Race"
 SOV_outer_space_space_combat_wombat_desc: "The space race has resumed after a pause, and we must intensify our efforts to regain leadership."
 SOV_outer_space_sateelites: "Inwestowanie w satelity"
 SOV_outer_space_sateelites_desc: "Satellites are vital eyes in space, essential not only for the race but also for potential future conflicts."
 SOV_outer_space_weaponized_space: "Militaryzacja Kosmosu"
 SOV_outer_space_weaponized_space_desc: "Space will inevitably become a militarized domain, so it is crucial that we act first to secure our interests."
 SOV_outer_space_moon_base: "Baza Księżycowa"
 SOV_outer_space_moon_base_desc: "Establishing a lunar base will be a major milestone on our path toward conquering the solar system."
 SOV_outer_space_marines: "Rosyjscy Marines Kosmiczni"
 SOV_outer_space_marines_desc: "Our new branch of Space Marines will show no mercy, defeating any enemy in space combat."
 SOV_economic_floating_nuclear: "Pływające elektrownie jądrowe"
 SOV_economic_floating_nuclear_desc: "Rosatom is designing self-contained, floating nuclear power plants to be mass-produced and deployed near locations in need of electricity."
 SOV_economic_securing_rosatom: "Bezpieczeństwo przemysłowe"
 SOV_economic_securing_rosatom_desc: "We will strengthen security at nuclear facilities to prevent catastrophic incidents."
 SOV_economic_anti_terrorist_rosatom: "Ochrona antyterrorystyczna"
 SOV_economic_anti_terrorist_rosatom_desc: "We will cooperate with the National Guard to fully protect our nuclear facilities from terrorist threats."
 SOV_economic_rao_ues: "Likwidacja RAO UES"
 SOV_economic_rao_ues_desc: "Reforming the energy sector requires dismantling the current market monopolist, RAO UES."
 SOV_economic_rus_hydro: "Powstanie RusHydro"
 SOV_economic_rus_hydro_desc: "We will establish RusHydro to efficiently control and manage energy production facilities."
 SOV_economic_rus_hydro_expanded: "Ekspansja RusHydro"
 SOV_economic_rus_hydro_expanded_desc: "Investments have strengthened RusHydro, enabling it to build new energy infrastructure across the country."
 SOV_economic_interrao: "Inter RAO"
 SOV_economic_interrao_desc: "Founded in 1997, Inter RAO will expand by acquiring domestic power grids as part of our energy reform."
 SOV_economic_interrao_expand: "Rozszerzenie Inter RAO"
 SOV_economic_interrao_expand_desc: "With state support, Inter RAO is prepared to build new energy facilities nationwide."
 SOV_economic_trikolov_tv: "Telewizja trójkolorowa"
 SOV_economic_trikolov_tv_desc: "Though a private company, we will maintain covert control over Tricolor TV's broadcasting network."
 SOV_economic_gazprom_media: "Gazprom Media"
 SOV_economic_gazprom_media_desc: "Gazprom plans to create its own media holding; we must manage and influence this development."
 SOV_economic_gazprom_neft: "Gazprom Nieft"
 SOV_economic_gazprom_neft_desc: "Following Sibneft's liquidation, Gazprom acquired a controlling stake and full control over its assets."
 SOV_economic_gas_with_sibur: "Projekt naftowo-gazowy z SIBUR"
 SOV_economic_gas_with_sibur_desc: "Gazprom is developing a joint oil and gas project with SIBUR to enhance regional production."
 SOV_economic_arctic_gas: "Arktyczne pola naftowe i gazowe"
 SOV_economic_arctic_gas_desc: "Gazprom plans to explore and exploit the vast reserves in Arctic oil and gas fields."
 SOV_economic_oil_nenets: "Projekt naftowo-gazowy w [NEE.GetName]"
 SOV_economic_oil_nenets_desc: "Gazprom continues to develop oil and gas projects in this strategic region."
 SOV_economic_oil_yamao: "Projekt naftowo-gazowy w [YAM.GetName]"
 SOV_economic_oil_yamao_desc: "Further development of oil and gas resources in this area remains a priority for Gazprom."
 SOV_economic_oil_khmao: "Projekt naftowo-gazowy w [KHM.GetName]"
 SOV_economic_oil_khmao_desc: "Gazprom intends to expand oil and gas extraction operations in this region."
 SOV_economic_slavneft: "Purchase of Slavneft Assets"
 SOV_economic_slavneft_desc: "Rosneft and Gazprom plan to divide and acquire the assets of Slavneft."
 SOV_economic_reform_rosneft: "Reforma Rosnieftu"
 SOV_economic_reform_rosneft_desc: "Rosneft aims to restructure and expand its operations to strengthen its market position."
 SOV_economic_use_yukos: "Użyj zasobów YUKOS"
 SOV_economic_use_yukos_desc: "Rosneft will utilize the assets acquired from Yukos' liquidation for further company development."
 SOV_economic_buy_itera: "Nabycie ITERA"
 SOV_economic_buy_itera_desc: "Rosneft plans to incorporate ITERA into its portfolio as a new strategic asset."
 SOV_economic_buy_severnaya_neft: "Nabycie SevernayaNeft"
 SOV_economic_buy_severnaya_neft_desc: "The acquisition of SevernayaNeft will expand Rosneft's resource base."
 SOV_economic_buy_thk_bp: "Nabycie TNK"
 SOV_economic_buy_thk_bp_desc: "Rosneft intends to acquire TNK to strengthen its oil production capabilities."
 SOV_economic_efko: "Efko"
 SOV_economic_efko_desc: "Efko is a leading Russian producer of fats, margarine, mayonnaise, vegetable oils, and dairy products, ranking among the largest agro-industrial companies."
 SOV_economic_miratorg: "Miratorg"
 SOV_economic_miratorg_desc: "Miratorg is Russia's largest vertically integrated agricultural holding, producing pork and meat products across the entire supply chain."
 SOV_economic_rusagro: "RusAgro"
 SOV_economic_rusagro_desc: "One of Russia's largest agricultural firms, RusAgro specializes in pork, fats, and sugar production, founded in 1995."
 SOV_economic_efko_expanded: "Rozszerzenie Efko"
 SOV_economic_efko_expanded_desc: "Efko plans continued growth, supported by state subsidies to boost its development."
 SOV_economic_miratorg_expanded: "Rozszerzenie Miratorg"
 SOV_economic_miratorg_expanded_desc: "Miratorg aims to expand production with the help of government investment."
 SOV_economic_rusagro_expanded: "Rozszerzenie RusAgro"
 SOV_economic_rusagro_expanded_desc: "RusAgro seeks further development backed by state funding."
 SOV_economic_phos_agro: "PhosAgro"
 SOV_economic_phos_agro_desc: "PhosAgro, based in Moscow, is Europe's largest producer of phosphate-based fertilizers and related chemicals."
 SOV_economic_belarus_integrate: "Integracja przemysłu białoruskiego"
 SOV_economic_belarus_integrate_desc: "We will integrate Belarusian factories into the Russian economy, bringing these industries under our control."
 SOV_economic_mzkt_annex: "Zintegruj MZKT"
 SOV_economic_mzkt_annex_desc: "MZKT, a Belarusian producer of heavy-duty and specialized vehicles, will be incorporated under our jurisdiction."
 SOV_economic_140_annex: "Zintegruj 140. Zakład Naprawczy"
 SOV_economic_140_annex_desc: "The 140th Repair Plant specializes in the modernization of armored vehicles and will be annexed to expand our military-industrial capacity."
 SOV_economic_peleng_annex: "Zintegruj Peleng"
 SOV_economic_peleng_annex_desc: "Peleng, a leading Belarusian company in optoelectronics for military and civilian use, will join our industrial system."
 SOV_economic_grodno_annex: "Zintegruj Grodno Azot"
 SOV_economic_grodno_annex_desc: "Grodno Azot produces fertilizers critical for agriculture, and integrating it will enhance our market reach."
 SOV_economic_evraz: "EVRAZ"
 SOV_economic_evraz_desc: "EVRAZ is a multinational steel and mining company, partly owned by Russian oligarchs, operating mainly in Russia, the US, Canada, and Kazakhstan."
 SOV_economic_mechel: "Mechel"
 SOV_economic_mechel_desc: "Mechel is a major Russian producer of coal, iron ore, and steel products, headquartered in Moscow with domestic and international sales."
 SOV_economic_severstal: "Severstal"
 SOV_economic_severstal_desc: "Severstal is Russia's largest steelmaker, headquartered in Cherepovets and controlled by billionaire Alexey Mordashov."
 SOV_economic_evraz_asset: "Rozszerzenie EVRAZ"
 SOV_economic_evraz_asset_desc: "EVRAZ is set to expand further with state subsidies supporting its growth."
 SOV_economic_yakut_ugol: "Przejęcie YakutUgol"
 SOV_economic_yakut_ugol_desc: "Mechel plans to acquire YakutUgol's assets to broaden its coal production capacity."
 SOV_economic_severstal_expanded: "Rozszerzenie Severstal"
 SOV_economic_severstal_expanded_desc: "Severstal aims to grow with government support for new projects."
 SOV_economic_nornickel: "Nornickel"
 SOV_economic_nornickel_desc: "Nornickel is a leading Russian mining and smelting company specializing in nickel and palladium, operating mainly near Norilsk."
 SOV_economic_buy_polus: "Kup Polyus"
 SOV_economic_buy_polus_desc: "Polyus is Russia's largest gold producer and one of the world's top mining companies by output."
 SOV_economic_alrosa: "Alrosa"
 SOV_economic_alrosa_desc: "Alrosa leads global diamond production by volume, accounting for 95% of Russian diamond output and 27% worldwide."
 SOV_economic_nakynskoe: "Zakład górniczo-przetwórczy Nyurbinsky"
 SOV_economic_nakynskoe_desc: "Alrosa has opened the Nyurbinsky plant, enhancing its mining and processing capacity."
 SOV_economic_rusal: "Rusal"
 SOV_economic_rusal_desc: "Rusal is the world's second-largest aluminium producer, responsible for nearly 9% of global output."
 SOV_economic_buy_sual: "Nabycie aktywów SUAL"
 SOV_economic_buy_sual_desc: "Completion of SUAL's integration will finalize the company's full formation under our control."
 SOV_economic_aeroflot: "Aeroflot"
 SOV_economic_aeroflot_desc: "Aeroflot is Russia's flagship airline, evolved from the Soviet-era state enterprise, now operating internationally."
 SOV_economic_poebda: "Pobeda"
 SOV_economic_poebda_desc: "Pobeda is a Russian budget airline and subsidiary of Aeroflot, based at Moscow's Vnukovo Airport."
 SOV_economic_new_airports: "Zbuduj nowe lotniska"
 SOV_economic_new_airports_desc: "Aeroflot plans to invest in constructing new airports nationwide to improve flight accessibility."
 SOV_economic_rjd: "RZD"
 SOV_economic_rjd_desc: "Russian Railways is a state-owned vertically integrated company that owns public infrastructure and is the largest carrier on the Russian railway network. It was established based on the former Ministry of Railways of Russia. The company plays a vital role in connecting the vast regions of the country and supporting economic development."
 SOV_economic_rjd_sochi: "Infrastruktura w Soczi"
 SOV_economic_rjd_sochi_desc: "Russian Railways plans to invest significantly in Sochi's infrastructure to boost tourism and improve the region's transport capabilities. These developments aim to make Sochi a more accessible and attractive destination for both domestic and international visitors."
 SOV_economic_rjd_more_trains: "Zakup pociągów"
 SOV_economic_rjd_more_trains_desc: "Russian Railways is expanding its fleet by urgently ordering a large number of new wagons. This move will modernize the network and improve transportation capacity across the country."
 SOV_economic_rjd_moscow_circle: "Centralny Okręg Moskiewski"
 SOV_economic_rjd_moscow_circle_desc: "The Moscow Central Circle (MCC), known as Line 14 and marked with strawberry red and white colors, is a 54-kilometer urban rail line that encircles historic Moscow. It provides a vital orbital route, easing congestion and connecting many key areas around the city."
 SOV_economic_rjd_transsib: "Kolej Transsyberyjska"
 SOV_economic_rjd_transsib_desc: "The Trans-Siberian Railway, historically called the Great Siberian Route and often shortened to Transsib, is a vast rail network connecting European Russia with the Russian Far East. It is crucial for freight and passenger transport across the continent."
 SOV_economic_rjd_baikal_amure: "Linia główna Bajkalsko-Amurska"
 SOV_economic_rjd_baikal_amure_desc: "The Baikal Amur Mainline (BAM) is a broad-gauge railway running 4,324 kilometers across Eastern Siberia and the Russian Far East. It lies roughly 610 to 770 kilometers north of and parallel to the Trans-Siberian Railway, providing an important alternative transport corridor."
 SOV_economic_rjd_north_latitudinal: "Północna Kolej Równoległościowa"
 SOV_economic_rjd_north_latitudinal_desc: "The Northern Latitudinal Railway, currently under construction in the Yamalo-Nenets Autonomous District, will span 707 kilometers. It will connect the western and eastern parts of the region, linking the Northern Railway in the east with Sverdlovsk Oblast, greatly improving regional connectivity."
 SOV_economic_rjd_sakhalin: "Infrastruktura transportowa na Sachalinie"
 SOV_economic_rjd_sakhalin_desc: "Sakhalin's transport infrastructure requires upgrades to support the island's economic growth. Russian Railways is planning expansion projects to modernize and enhance connectivity within Sakhalin."
 SOV_economic_rjd_mcd: "Średnice centralne Moskwy"
 SOV_economic_rjd_mcd_desc: "The Moscow Central Diameters (MCD) are commuter rail services operating on existing suburban rail lines in Moscow and the surrounding Moscow Oblast. These services improve transit efficiency by linking outlying areas directly to the city center."
 SOV_economic_rubber: "Krajowy przemysł oponiarski"
 SOV_economic_rubber_desc: "Our domestic tire industry remains underdeveloped and urgently needs more investment. By allocating several budget tranches, we aim to modernize production and strengthen this important sector of our economy."
 SOV_economic_rubber_foreign: "Inwestorzy zagraniczni"
 SOV_economic_rubber_foreign_desc: "We plan to attract top tire manufacturers and brands from abroad to establish production facilities in Russia. This will bring advanced technology and boost local industry development."
 SOV_economic_auto: "Przemysł samochodowy"
 SOV_economic_auto_desc: "The demand for automobiles has grown significantly over the past decade, making it crucial to decide the future direction of our automotive industry. Investments and strategic partnerships will help meet this rising need."
 SOV_economic_invite_investors: "Zaproś zagraniczne marki"
 SOV_economic_invite_investors_desc: "We are ready to welcome foreign automobile brands to build factories in Russia. This will diversify our market and bring cutting-edge automotive technologies."
 SOV_economic_cars_usa: "Amerykańskie marki samochodów"
 SOV_economic_cars_usa_desc: "American car manufacturers are invited to enter and expand their presence in our market. This cooperation will enhance consumer choice and foster competition."
 SOV_economic_cars_europe: "Europejskie marki samochodów"
 SOV_economic_cars_europe_desc: "We are prepared to integrate European car brands fully into the Russian market. Their involvement will contribute to technological growth and market diversity."
 SOV_economic_reno_nissan_autovaz: "Avtovaz Renault Nissan"
 SOV_economic_reno_nissan_autovaz_desc: "The alliance between Avtovaz, Renault, and Nissan aims to strengthen our automotive sector and positively impact the market through shared expertise and resources."
 SOV_economic_cars_west_market: "Rynek samochodów zachodnich"
 SOV_economic_cars_west_market_desc: "Our market is increasingly integrated with Western automakers. This trend is set to continue, helping modernize the industry and offer consumers a wider range of vehicles."
 SOV_economic_cars_japan_market: "Rynek samochodów japońskich"
 SOV_economic_cars_japan_market_desc: "We plan to deepen partnerships with Japanese car manufacturers to benefit from their advanced technologies and manufacturing standards."
 SOV_economic_cars_china_market: "Rynek samochodów chińskich"
 SOV_economic_cars_china_market_desc: "Strengthening ties with Chinese automakers will open new opportunities and allow access to innovative models for Russian consumers."
 SOV_economic_cars_udar_market: "Szeroki dostęp chińskich producentów"
 SOV_economic_cars_udar_market_desc: "We will expand the presence of Chinese manufacturers in our domestic market. This will increase competition and offer more affordable options for buyers."
 SOV_economic_cars_moskvich: "Moskvich"
 SOV_economic_cars_moskvich_desc: "We plan to revive the historic Moskvich brand by licensing foreign car designs. This approach balances heritage with modern technology."
 SOV_economic_aurus: "Aurus"
 SOV_economic_aurus_desc: "Aurus is a prestigious Russian brand known for executive and luxury vehicles. Originally developed as the Unified Modular Platform and the Tuple project, it represents our high-end automotive craftsmanship."
 SOV_economic_domestic: "Focus on the Domestic Car Brands"
 SOV_economic_domestic_desc: "It is essential to prioritize and protect our domestic car manufacturers instead of relying solely on foreign solutions. Building local capacity strengthens our economy and automotive independence."
 SOV_economic_avtovaz: "AvtoVAZ"
 SOV_economic_avtovaz_desc: "AvtoVAZ is a major Russian state-owned car manufacturer, formerly known as VAZ. Best known for its Lada series, the company's vehicles were once sold under various names like Zhiguli, Oka, and Sputnik, which were phased out in favor of the Lada brand in the 1990s."
 SOV_economic_kamaz: "KAMAZ"
 SOV_economic_kamaz_desc: "KAMAZ, headquartered in Naberezhnye Chelny, is a leading Russian producer of trucks, buses, and engines. Founded in 1969, the company is especially famous for its cab-over-engine truck designs."
 SOV_economic_gaz: "GAZ"
 SOV_economic_gaz_desc: "GAZ, or Gorkovsky Avtomobilny Zavod, is a key Russian automotive manufacturer based in Nizhny Novgorod. It operates as the core subsidiary of GAZ Group Holding, itself part of the Basic Element industrial group."
 SOV_economic_national_proud: "Duma narodowa"
 SOV_economic_national_proud_desc: "Our domestic cars are a source of national pride. We remain committed to supporting their development and ensuring they become some of the best vehicles in the world."
 SOV_economic_vaz_electro_car: "Samochody elektryczne VAZ"
 SOV_economic_vaz_electro_car_desc: "VAZ is planning to launch its own line of electric vehicles. This initiative is part of a broader strategy to modernize the automotive industry and meet future demands."
 SOV_economic_own_mosnosti: "Nasze możliwości"
 SOV_economic_own_mosnosti_desc: "We intend to rely exclusively on our own production facilities for the automotive industry's growth. This will help maintain control over quality and strengthen domestic manufacturing."
 SOV_economic_chaika: "Chaika"
 SOV_economic_chaika_desc: "The historic Chaika brand will be revived with modern updates and features. This revival aims to blend classic heritage with contemporary automotive design."
 SOV_economic_rostelekom: "Rostelecom"
 SOV_economic_rostelekom_desc: "Rostelecom is Russia's largest digital services provider, serving households, businesses, government, and telecom operators. It connects local networks into a unified national system for long-distance calls and internet services, playing a crucial role in Russia's communication infrastructure."
 SOV_economic_inter_networks: "Wewnętrzni operatorzy sieciowi"
 SOV_economic_inter_networks_desc: "Rostelecom plans to acquire many smaller network operators across Russia to consolidate them under its control. This strategy will improve efficiency and expand its market share."
 SOV_economic_gosuslugi: "Gosuslugi"
 SOV_economic_gosuslugi_desc: "Gosuslugi is a federal digital platform operated by the Russian government, providing online access to information about state and municipal services. It offers electronic forms and streamlines interaction between citizens, businesses, and the government."
 SOV_economic_mts: "MTS"
 SOV_economic_mts_desc: "Mobile TeleSystems (MTS) is Russia's largest mobile network operator, headquartered in Moscow. It provides services across GSM, UMTS, and LTE standards, along with fixed-line telephone, broadband internet, and various television services."
 SOV_economic_mts_expanding: "Rozszerzenie MTS"
 SOV_economic_mts_expanding_desc: "MTS is investing in building numerous network towers nationwide. This expansion will improve communication coverage and quality throughout Russia, benefiting millions of users."
 SOV_economic_tele2: "Tele2 Russia"
 SOV_economic_tele2_desc: "Tele2 Russia, initially founded by Swedish Tele2, is now a fully owned subsidiary of Rostelecom. It is a key player in the Russian telecommunications market."
 SOV_economic_megaphon: "MegaFon"
 SOV_economic_megaphon_desc: "MegaFon, formerly North-West GSM, is Russia's second-largest mobile phone operator and the third-largest telecom provider. It offers services on GSM, UMTS, and LTE networks across the country."
 SOV_economic_it_sphere: "Rosyjski sektor IT"
 SOV_economic_it_sphere_desc: "We are committed to developing the domestic IT sector because technology is the foundation of the future. Investing in IT ensures that our country remains competitive and innovative."
 SOV_economic_destiny_sber: "Rebranding Sberbanku"
 SOV_economic_destiny_sber_desc: "It is time for Sberbank to undergo a major rebranding. The old structure and visual style are outdated. Today, Sberbank is not just a bank but a full ecosystem offering a variety of financial and digital services."
 SOV_economic_destiny_vk: "Przyszłość VK"
 SOV_economic_destiny_vk_desc: "VKontakte is Russia's largest social network, with influence reaching beyond what we could have imagined. It might be time to bring this platform under state control to ensure its alignment with national interests."
 SOV_economic_mir: "Mir"
 SOV_economic_mir_desc: "Mir is a Russian electronic payment system established by the Central Bank of Russia. It offers financial institutions branded payment products used for credit, debit, and other card programs, providing a domestic alternative to international card systems."
 SOV_economic_destiny_yandex: "Przyszłość Yandex"
 SOV_economic_destiny_yandex_desc: "Starting as a small company, Yandex has grown to dominate the IT sector in Russia. It is now influential enough that state involvement may be necessary to guide its future direction."
 SOV_economic_glonass: "GLONASS"
 SOV_economic_glonass_desc: "GLONASS is Russia's satellite navigation system providing global coverage. As an alternative to the GPS system, it offers precise positioning services critical for civilian and military use."
