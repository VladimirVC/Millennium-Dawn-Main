l_russian:
 Proscription_LTTE_as_a_terrorist_organization: "Запрет организации «Тамильские тигры» как террористической"
 Proscription_LTTE_as_a_terrorist_organization_Trade: "Запрет ЛТТЭ как террористической организации (Торговля)"
 State_sponsor_of_the_LTTE: "Поставщик боеприпасов"
 news.91.t: "Завершение гражданской войны в Шри-Ланке"
 news.91.d: "Правительство Шри-Ланки объявило о полной победе над организацией «Тигры освобождения Тамил-Илама». В ходе серии финальных наступлений на северо-востоке правительственные силы захватили последние опорные пункты «Тигров». В последние дни войны оставшиеся тамильские боевики были окружены в районе лагун и джунглей Муллайттиву. Отрезанные от путей отхода, любые попытки бегства морем перехватывались. Руководство «Тигров», долгое время считавшееся неприкосновенным, по сообщениям, было уничтожено в последние часы конфликта. Выступая перед парламентом, президент [SRI.GetName] провозгласил, что нация «освобождена от терроризма». Отныне львиный флаг беспрепятственно развевается над всем островом."
 news.91.a: "Мир... но дорогой ценой."
 news.92.t: "Освобождение Тамил-Илама «Тиграми»"
 news.92.d: "То, что некогда было войной на истощение, завершилось. «Тигры освобождения Тамил-Илама» одержали победу. В последние дни конфликта последние оплоты ланкийского государства на землях Тамил-Илама пали под непрекращающимся натиском. Линии снабжения рухнули, взлётные полосы пылали, а некогда грозная армия оказалась в окружении и брошена на произвол судьбы. Тигры Тамил-Илама вышли из джунглей не как мятежники, но как лидеры. Мечта о Тамил-Иламе, написанная кровью и жертвами, наконец стала реальностью."
 news.92.a: "Интересно."