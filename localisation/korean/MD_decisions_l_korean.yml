 TAI_choose_new_capital: "새로운 수도 선정"
 TAI_choose_new_capital_desc: "본토를 다시 우리의 통제하에 두었으니, 이제 중국의 새로운 수도를 선정할 수 있습니다."
 TAI_CHI_confidence_building: "양안 신뢰 구축"
 TAI_CHI_confidence_building_desc: "베이징과의 대화 채널을 열고 양안 신뢰 구축 조치를 추진하여, 해협 전반의 긴장을 완화하고 상호 신뢰를 높입니다."
 TAI_CHI_assert_sovereignty: "주권 확립"
 TAI_CHI_assert_sovereignty_desc: "공식 성명, 외국 파트너와의 관계 심화, 그리고 베이징을 향한 강경한 태도를 통해 대만의 주권을 재확인합니다. 이로 인해 양안 간의 신뢰는 타격을 입을 것입니다."