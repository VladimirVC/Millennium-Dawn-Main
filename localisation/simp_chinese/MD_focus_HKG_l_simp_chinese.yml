 HKG_contract_capstone_label: "香港舰队"
 HKG_contract_capstone_progress: "完成国内航母计划并部署一艘航母，为这座城市赢得海军传统。"
 HKG_contract_capstone_done: "§G香港舰队扬帆起航 - 香港是公认的海军强权。§!"
 HKG_contract_capstone_progress_tt: "当整个航母发展路线完成且香港建造或获得了一艘航母后，此事件触发。获得§Y香港海军力量§!国家精神。"
 HKG_contract_capstone_done_tt: "最终目标已经实现。§Y香港海军力量§!国家精神生效，可以协商更好的合同条款。"
 HKG_naval_contracts_category: "海军采购合同"
 HKG_contract_chi_category: "香港造船"
 HKG_contract_solicit_contract: "向北京请愿签订合同"
 HKG_contract_solicit_contract_desc: "向中央军委申请新的军舰采购订单。最多可以同时签订三份合同；你同时签订的合同越多，北京允许的每份合同期限就越长。合同的等级和奖励与我们的地位成正比。"
 HKG_contract_deliver_destroyer: "交付一艘驱逐舰"
 HKG_contract_deliver_destroyer_desc: "将一艘已完工的驱逐舰移交给中国人民解放军海军。这将计入您最紧急的驱逐舰合同。重复此操作直至完成该合同的配额。"
 HKG_contract_deliver_frigate: "交付一艘护卫舰"
 HKG_contract_deliver_frigate_desc: "将一艘已完工的护卫舰移交给中国人民解放军海军。这将计入您最紧急的护卫舰合同。重复此操作直至完成该合同的配额。"
 HKG_contract_deliver_submarine: "交付一艘潜艇"
 HKG_contract_deliver_submarine_desc: "将一艘已完工的攻击型潜艇交付给中国人民解放军海军。该任务计入您最紧急的潜艇合同。"
 HKG_contract_deliver_cruiser: "交付一艘巡洋舰"
 HKG_contract_deliver_cruiser_desc: "将一艘已完工的巡洋舰移交给中国人民解放军海军。该任务计入您最紧急的巡洋舰建造合同。"
 HKG_contract_deliver_carrier: "交付一艘航空母舰"
 HKG_contract_deliver_carrier_desc: "将一艘已完工的航空母舰移交给中国人民解放军海军，并履行航空母舰建造合同。"
 HKG_contract_negotiate_terms: "重新协商采购条​​款"
 HKG_contract_negotiate_terms_desc: "随着香港舰队的建立，香港船厂赢得了尊重。应敦促北京方面提高未来所有合同的付款额度并延长工期。"
 HKG_contract_need_destroyer_tt: "我们的海军至少需要一艘驱逐舰来完成交付。"
 HKG_contract_need_frigate_tt: "我们的海军至少需要一艘护卫舰来完成交付。"
 HKG_contract_need_submarine_tt: "我们的海军至少需要一艘攻击型潜艇来完成交付。"
 HKG_contract_need_cruiser_tt: "我们的海军至少需要一艘巡洋舰来完成交付。"
 HKG_contract_need_carrier_tt: "我们的海军至少需要一艘航空母舰来完成交付。"
 HKG_contract_slots_free_tt: "我们有一个空余的合约名额（最多可以同时运行三份合约。）"
 HKG_contract_modules_tt: "我们的造船厂已经研发出所有核心战舰模块的至少一级技术：发动机、主炮、导弹、鱼雷、声呐和雷达。"
 HKG_contract_commission_ready_tt: "香港目前有一个空余合约名额，且没有待定合约。"
 HKG_contract_commission_yards_tt: "香港的造船厂拥有核心军舰模块技术。"
 HKG_contract_commission_accept_tt: "香港获得采购合同并开始建造所需军舰"
 HKG_contract_tt_unlock: "解锁§Y中国海军采购合同§!系统：为北京建造军舰，以换取国库收入、政治点数和工业发展。"
 HKG_contract_tt_solicit: "中央军委将在几天内给出采购报价。"
 HKG_contract_tt_accept_advance: "签订合同时，向国库将接收§G$[?HKG_contract_offer_advance|0]§!与§G1000§!人力。"
 HKG_contract_tt_accept_license: "北京转让了其批准的设计 - 们获得了建造[GetHKGContractOfferClass]的船体技术。"
 HKG_contract_tt_accept_onfulfil: "完成全部订单后：剩余款项入库，§G[?HKG_contract_offer_pp|0]§!获得政治点数和工业生产率提升，并开始限时船坞收入加成。"
 HKG_contract_tt_decline: "该提议已失效。没有违约处罚，北京方面未来可能会再次提出类似提议。"
 HKG_contract_tt_deliver: "将一艘舰艇移交给中国人民解放军海军，记入您该级别中最紧急的合同。\n§Y这艘舰船必须位于您的预备舰队中。已分配给特遣舰队的舰船无法交付。请先将其移至预备舰队。§!"
 HKG_contract_tt_deliver_reward: "当合同的全部配额交付完毕时：剩余款项将进入国库，并授予政治点数、生产率和船坞收入加成。"
 HKG_contract_tt_negotiate: "所有未来合同的报酬将增加§G25%§!，付款期限将延长§G50%§!。"
 HKG_contract.1.t: "来自北京的委托"
 HKG_contract.1.d_normal: "北京中央军委已向我们的造船厂发出采购订单。\n\n§Y订单：§![?HKG_contract_offer_quota|0] x [GetHKGContractOfferClass]\n§Y最后期限：§![?HKG_contract_offer_deadline|0]天\n§Y支付：§!$[?HKG_contract_offer_funds|0] - $[?HKG_contract_offer_advance|0] 和§G1000§!人力在签约时支付，剩余部分在交付时支付。\n§Y完成后：§![?HKG_contract_offer_pp|0]政治点数、生产率的持续提升以及限时船坞收入加成\n\n这些舰艇必须在我们自己的船厂建造，并交付给中国人民解放军海军。错过最后期限将恶化与大陆的关系。"
 HKG_contract.1.d_license: "北京中央军委提供§O许可证合同§!。中国人民解放军海军将提供其批准的设计方案，我们的船厂必须按照该方案建造。\n\n§Y授权设计：§![?HKG_contract_offer_quota|0] x [GetHKGContractOfferClass]\n§Y最后期限：§![?HKG_contract_offer_deadline|0]天\n§Y支付：§!$[?HKG_contract_offer_funds|0] - $[?HKG_contract_offer_advance|0] 和§G1000§!人力在签约时支付，剩余部分在交付时支付。\n§Y完成后：§![?HKG_contract_offer_pp|0]政治点数、生产率的持续提升以及限时船坞收入加成\n\n接受该设计方案意味着将设计权移交给我们的造船厂，并授予我们建造​​该船所需的船体技术。错过最后期限将损害与大陆的关系。"
 HKG_contract.1.a: "接受委托"
 HKG_contract.1.b: "拒绝 - 我们的船坞还没准备好"
 HKG_contract.2.t: "合同履行完成"
 HKG_contract.2.d: "该订单的最后一艘舰艇已交付中国人民解放军海军。北京方面很满意：最后一笔款项§Y$[?HKG_contract_last_payment|0]§!已入库，政治资本已释放，我们的造船厂赢得了声誉，我们在大陆的地位也提升了。"
 HKG_contract.2.a: "香港建造舰队"
 HKG_contract.3.t: "错过合同截止日期"
 HKG_contract.3.d: "合同期限已过，订单仍未完成。中央军委已注意到香港未能履行承诺。北京的不满情绪如今已影响到我们的造船厂，我们在大陆的地位也已下降。"
 HKG_contract.3.a: "一次不幸的挫折"
 HKG_contract.50.t: "香港舰队"
 HKG_contract.50.d: "从分包商到一流造船厂 - 香港船厂已完成国内航母建造计划，并成功交付首艘航母。最初为北京承接采购合同，如今已发展成为不受任何国家约束的造船产业。香港舰队由此诞生，香港也因此跻身世界海军强权之列。"
 HKG_contract.50.a: "城市扬帆起航"
 HKG_contract_dockyard_revenue: "采购红利"
 HKG_contract_dockyard_revenue_desc: "与北京的合同已完成，香港的船坞保持繁忙且盈利。海军造船业务带来稳定的收入，订单也始终充足。"
 HKG_contract_beijing_displeasure: "北京的不满"
 HKG_contract_beijing_displeasure_desc: "香港未能按时交付合同订单。中央军委对香港造船厂失去信心，由此产生的政治代价波及整个政府。"
 HKG_contract_naval_power: "香港海军力量"
 HKG_contract_naval_power_desc: "香港的造船厂建造了自己的航母，并证明其实力足以媲美亚洲任何一家造船厂。如今，香港的海军工业已成为一项永久性的战略资产。"
 HKG_carrier_home: "香港的航空母舰"
 HKG_carrier_home_desc: "建造一艘国产航空母舰是这座城市迄今为止最雄心勃勃的项目。这首先需要船台、干船坞，以及贯彻执行的政治决心。"
 HKG_carrier_construction: "放下船体"
 HKG_carrier_construction_desc: "东方海事造船集团为这艘航母的船体破土动工。这项工作动用了香港所有能调动的船厂和焊工。"
 HKG_carrier_construction2: "为航空母舰进行舾装"
 HKG_carrier_construction2_desc: "船体建造完成后，航空母舰进入舾装阶段。动力装置、指挥舱室和舰岛上层建筑都在码头进行安装。"
 HKG_carrier_modules: "航空母舰系统集成"
 HKG_carrier_modules_desc: "现代航母模块被集成到设计中：弹射器、阻拦装置和损管系统，借鉴了海军来之不易的经验。"
 HKG_flight_deck_limitations: "克服飞行甲板的限制"
 HKG_flight_deck_limitations_desc: "香港首个飞行甲板按西方标准来看十分狭窄。工程师们正在重新设计甲板布局，以确保飞机能够以可行的节奏起降。"
 HKG_carrier_special_airwing: "训练航空母舰舰载机联队"
 HKG_carrier_special_airwing_desc: "航空母舰的作战能力取决于其飞行员的水平。香港投资兴建了一支专门训练舰载机作战的海军航空兵部队。"
 HKG_carrier_defensive_weapons: "航空母舰自卫套件"
 HKG_carrier_defensive_weapons_desc: "为了使航空母舰能够在不完全依赖护航舰艇的情况下生存，舰上配备了近程武器系统、点防御导弹和电子对抗措施。"
 HKG_carrier_logistics: "航空母舰支援基础设施"
 HKG_carrier_logistics_desc: "航空母舰需要一个与其任务相匹配的母港：深水泊位、弹药库以及维持其海上航行所需的后勤保障。"
 HKG_expanded_shipyards: "扩建船坞"
 HKG_expanded_shipyards_desc: "香港的船坞已接近极限。新的滑道和干船坞扩大了香港建造和修理军舰的能力。"
 HKG_expanded_trade_capacity: "扩大贸易能力"
 HKG_expanded_trade_capacity_desc: "作为世界主要转口港之一，香港投资建设港口和工业设施，以确保货物能够顺利通过海港。"
 HKG_expanded_searoutes: "确保海路"
 HKG_expanded_searoutes_desc: "香港的繁荣依赖于畅通的航道。政府不断深化与海上邻国的贸易联系，以确保航道安全。"
 HKG_expanded_inland_routes: "拓展内陆路线"
 HKG_expanded_inland_routes_desc: "除了港口之外，香港还在加强与内地的铁路和公路联系，为内地产业提供原料。"
 HKG_offshore_industry: "发展离岸产业"
 HKG_offshore_industry_desc: "香港土地稀缺且价格昂贵。为了建设新的工业园区，香港不得不利用填海造地和离岸地块。"
 HKG_offshore_industry2: "扩大离岸产业"
 HKG_offshore_industry2_desc: "离岸工业计划证明了其价值。进一步的填海造地和建设将香港的制造业基地推向了海的另一边。"
 HKG_investigate_police_triad_cooperation_problem_desc: "我们在三合会内部安插卧底，但他们也对我们做同样的事情。这些内奸在行动开始前就破坏了我们的安全。我们将通过廉政公署和有组织犯罪调查局，彻底铲除这些“黑警”。"
 HKG_housing_policy_modifier: "住房政策"
 HKG_housing_policy_modifier_desc: "香港房屋决策的累积影响波及建筑业、公共财政以及市民的耐心。房屋计划的每一步都会对这些指标产生影响，或好或坏。"
 HKG_small_house_policy: "改革丁屋政策"
 HKG_small_house_policy_desc: "殖民时代的“丁屋政策”赋予新界原住民村民在祖传土地上建造低层房屋的权利。改革这项政策可以腾出大片土地用于高密度开发，但农村既得利益集团会抵制任何对其既得特权的改变。"
 HKG_brownfield_consolidation: "整合棕地"
 HKG_brownfield_consolidation_desc: "新界数百公顷的土地被露天堆场、废品场和集装箱堆场所覆盖。将这些棕地整合为多层建筑，无需任何填海造地，即可释放地下土地用于住宅建设。"
 HKG_revitalise_private_market: "重振私人市场"
 HKG_revitalise_private_market_desc: "公共竞争机制被取消后，政府转而扶持开发商。政府提供简化审批流程、放宽容积率限制和税收优惠等措施，以加快私人住宅的上市速度。"
 HKG_relax_mortgage_rules: "放宽抵押贷款规则"
 HKG_relax_mortgage_rules_desc: "金融管理局放宽了贷款价值比率和压力测试门槛。首次购房者终于可以跨越首付障碍，但批评人士警告称，这将给家庭资产负债表带来沉重的杠杆负担。"
 HKG_vacancy_tax: "征收空置税"
 HKG_vacancy_tax_desc: "对未售出和空置的新公寓征收惩罚性税款。开发商不能再通过逐步投放已竣工的房屋来维持高价；囤积房屋的投机行为就此终结。"
 HKG_light_public_housing: "轻型公共住房"
 HKG_light_public_housing_desc: "利用闲置的政府土地建造预制模块化住宅区，作为安置滞留在住房等候名单上的家庭的权宜之计。这些住宅区建造成本低廉、速度快，为房屋管理局争取了建造永久性住宅所需的时间。"
 HKG_tenancy_control: "规范分割式公寓"
 HKG_tenancy_control_desc: "针对该市臭名昭著的分割式公寓，政府实施了租金上限、强制签订书面租赁合同和最低标准。房东的自由裁量权受到限制；数万被困在隔间里的居民获得了一定程度的保护。"
 HKG_starter_homes_scheme: "首套房计划"
 HKG_starter_homes_scheme_desc: "一项针对年轻专业人士的新型住房计划，旨在帮助他们摆脱对公共住房和私人住房的依赖。该计划以低于市场价的价格出售，并限制转售，从而重建了购房阶梯的第一步。"
 HKG_artificial_islands: "人工岛屿计划"
 HKG_artificial_islands_desc: "一项在中央水域建造大型人工岛的计划，旨在容纳数十万人口并打造一个全新的都市区。该计划耗资数千亿美元，环境方面的反对声浪也十分强烈，但其带来的可用土地面积却是无与伦比的。"
 HKG_northern_metropolis: "北方大都会"
 HKG_northern_metropolis_desc: "一项涵盖深圳周边新界地区的宏伟发展蓝图，旨在将香港融入粤港澳大湾区。规划中的新市镇、铁路连接线和创新带均位于北部边境地区。"
 HKG_country_park_periphery: "开发郊野公园周边地区"
 HKG_country_park_periphery_desc: "生态价值最低的郊野公园边缘地带被开放用于建设。环保人士对此先例感到震惊；政府则坚称，在住房危机日益严峻的当下，这片土地价值连城，不容闲置。"
 HKG_redevelop_old_estates: "老旧住宅区改造"
 HKG_redevelop_old_estates_desc: "那些在经济繁荣时期建造、如今已破败不堪的老旧公共住宅区被拆除重建，以达到现代高密度住宅的标准。居民被迁出并重新安置；同样的占地面积却能建造出更多的公寓。"
 HKG_abolish_subdivided_flats: "废除分割式公寓"
 HKG_abolish_subdivided_flats_desc: "随着足够多的新住房投入使用，政府开始取缔那些曾让这座城市蒙羞一代人的隔间式公寓和笼式住宅。这种分割式廉租房的时代就此终结。"
 HKG_urban_renewal_push: "赋予市区重建局更大的权力"
 HKG_urban_renewal_push_desc: "市区重建局被赋予更大的强制收购权和更充足的资金，用于清理和重建破败的街区。旧九龙和海滨地区被逐个街区地改造。"
 HKG_smart_city_housing: "智慧城市住房"
 HKG_smart_city_housing_desc: "新建屋苑从一开始就进行了全面规划：包括综合交通、区域供冷和数字化治理。香港的住宅成为大湾区智慧城市愿景的典范。"
 HKG_housing_for_all: "每个香港人的家"
 HKG_housing_for_all_desc: "长达数十年的危机终于宣告结束。等候名单已清空，分割的公寓楼已不复存在，普通家庭再次拥有了自己的房子。一代人从小就习惯租房，如今终于可以憧憬拥有属于自己的家了。"
 HKG_naval_contracts_category_desc: "为北京建造军舰并按时交付，以提升香港在大陆的地位。\n§Y这艘舰船必须位于您的预备舰队中。已分配给特遣舰队的舰船无法交付。请先将其移至预备舰队。§!"
 HKG_contract_acquire_pearl_river: "珠江三角洲请愿书"
 HKG_contract_acquire_pearl_river_desc: "香港的造船厂一直忠实地为北京服务，赢得了内地的充分信任。利用这一地位，要求中央军委转交珠江三角洲，使香港的工业基础翻一番。"
 HKG_contract_max_standing_tt: "我们与大陆的关系必须达到最高水平。"
 HKG_contract_pearl_river_accept_tt: "北京将珠江三角洲转交给香港"
 HKG_contract_commission_destroyers: "委托香港制造驱逐舰"
 HKG_contract_commission_destroyers_desc: "从香港造船厂订购一批驱逐舰。之后，北京将决定采用哪种设计方案进行建造。"
 HKG_contract_commission_frigates: "委托香港制造护卫舰"
 HKG_contract_commission_frigates_desc: "向香港造船厂订购一批护卫舰。之后，北京将决定采用哪种设计方案进行建造。"
 HKG_contract_commission_submarines: "委托香港制造潜艇"
 HKG_contract_commission_submarines_desc: "从香港造船厂订购一批攻击型潜艇。之后，北京将决定采用哪种设计方案进行建造。"
 HKG_contract_commission_cruisers: "委托香港制造巡洋舰"
 HKG_contract_commission_cruisers_desc: "向香港造船厂订购一批巡洋舰。之后，北京方面将决定采用哪种设计方案进行建造。"
 HKG_contract_commission_carriers: "委托香港制造航空母舰"
 HKG_contract_commission_carriers_desc: "向香港的造船厂订购一艘航空母舰。之后，北京将决定采用哪种设计方案进行建造。"
 HKG_contract_yard_slack_tt: "我们的船厂有剩余产能，可以承接另一份合同并按时交付。"
 HKG_contract.10.t: "香港应该采用哪种设计方案？"
 HKG_contract.10.desc: "指令已下达：[GetHKGContractPickClass]。现在中央军委必须决定香港船厂将建造何种设计的舰艇。我们可以授权转让我们已获批准的设计方案，或者直接让香港特别行政区自行决定建造方案。"
 HKG_contract.10.a: "分享我们最优秀的设计（完整授权，高级条款）"
 HKG_contract.10.b: "分享一个经过验证的设计（标准许可）"
 HKG_contract.10.c: "分享出口级设计（许可证、香港需要更多注资）"
 HKG_contract.10.d: "让香港建造他们最好的"
 HKG_contract.20.t: "来自香港的请愿书"
 HKG_contract.20.d: "香港一直以来都为我们建造舰队，如今它要求获得应有的回报：将珠江三角洲转交给香港管理。南方的造船厂将为香港的工业提供动力，而一家忠诚的分包商将成为区域巨头。资金已经到位。"
 HKG_contract.20.a: "给予珠江三角洲"
 HKG_contract.20.b: "大陆不可分割"
 HKG_contract.21.t: "三角洲归乡"
 HKG_contract.21.d: "北京已同意。珠江三角洲如今归香港管辖，其工厂和航运路线都融入了香港的经济体系。香江不再是一座拥挤的孤岛，而是南方工业带的核心。"
 HKG_contract.21.a: "一个工业巨头崛起"
 HKG_contract.22.t: "北京拒绝"
 HKG_contract.22.d: "中央军委拒绝转交珠江三角洲。大陆领土完整不容分割，无论造船厂多么忠诚。我们的款项已退还。"
 HKG_contract.22.a: "我们会择日再问。"
 HKG_contract.30.t: "交付失败"
 HKG_contract.30.d: "没有舰船交付。选定的交付舰船会被分配给一个特遣舰队，旗舰不能转让。\n§Y将舰船移入你的预备舰队，然后再次使用交付决策。§!未获得合同点数"
 HKG_contract.30.a: "把它移到预备舰队再试一次"
 HKG_contract_resource_access: "大陆供应线"
 HKG_contract_resource_access_desc: "一份有效的海军采购合同为中国海军提供了优先进入中国大陆供应链的渠道。北京方面以远低于正常成本的价格将原材料运往中国海军造船厂，同时订单也始终充足。"
 HKG_contract_resource_access_tt: "§G在合同期内，从中国进口的资源价格要便宜得多。§!"
 HKG_contract_shipbuilding_legacy: "造船遗产"
 HKG_contract_shipbuilding_legacy_desc: "每艘交付内地的军舰都会提升香港造船厂的产能。每完成一项订单，海军船坞的产能就会永久提升1%。"