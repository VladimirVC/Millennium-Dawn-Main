l_spanish:
 belorussia_focus: "Árbol de enfoque bielorruso"
 BLR_china_friendship: "Asociación con China"
 BLR_china_friendship_desc: "Tenemos la intención de fortalecer las relaciones amistosas entre nuestros países."
 BLR_Bel_G2: "BELGEE"
 BLR_Bel_G2_desc: "JSC \"BELGEE\" is a Belarusian-Chinese joint venture for the assembly of Chinese Geely passenger cars. One of two passenger car assembly companies in Belarus. It is placed on the leased areas of JSC \"Borisovsky plant Autohydrousilitel\" near Borisov."
 BLR_Chinese_Modernization_Railway: "Modernización de los ferrocarriles"
 BLR_Chinese_Modernization_Railway_desc: "Nuestros colegas chinos han acordado financiar la modernización de la red ferroviaria de nuestro país."
 BLR_Credit_tec2: "Crédito para la mejora de la CHP"
 BLR_Credit_tec2_desc: "Nuestras centrales térmicas en Minsk necesitan ser modernizadas, solicitaremos un préstamo a China para ello."
 BLR_AES: "Central nuclear bielorrusa"
 BLR_AES_desc: "Finalmente construiremos nuestra propia central nuclear."
 BLR_Chinese_kal: "Acuerdo comercial con China"
 BLR_Chinese_kal_desc: "Celebraremos un acuerdo comercial con China que nos permitirá aumentar la capacidad de producción de Grodno Azot."
 BLR_Chinese_zdania: "Construcción de Nuevas Fábricas"
 BLR_Chinese_zdania_desc: "El gobierno chino está aumentando las inversiones en nuestro país y está dispuesto a construir nuevas fábricas."
 BLR_Chinese_konfuci: "Institutos Confucio"
 BLR_Chinese_konfuci_desc: "Abriremos varios Institutos Confucio en nuestro país."
 BLR_Chinese_Poezda: "Compra de trenes en China"
 BLR_Chinese_Poezda_desc: "Compraremos varios trenes en China que nos ayudarán a mejorar nuestro suministro."
 BLR_Chinese_huawei: "Cooperación con Huawei"
 BLR_Chinese_huawei_desc: "Estableceremos una fuerte cooperación con esta empresa china."
 BLR_Chinese_energy: "Inversiones chinas en nuestro sector energético"
 BLR_Chinese_energy_desc: "Las empresas chinas continúan su marcha inversora en nuestro país y ahora están listas para invertir nuevamente en nuestro sector energético."
 BLR_Chinese_uchenia: "Ejercicios con el ejército chino."
 BLR_Chinese_uchenia_desc: "El intercambio de experiencias entre nuestras fuerzas armadas será muy útil."
 BLR_Chinese_yuan: "El Yuan es la segunda moneda del país"
 BLR_Chinese_yuan_desc: "Estamos dispuestos a aceptar el yuan como segunda moneda en nuestro país."
 BLR_Chinese_skynet: "Experiencia de control de Internet en China"
 BLR_Chinese_skynet_desc: "Estamos listos para aprender de la experiencia de monitorear redes sociales."
 BLR_Chinese_economic: "Experiencia económica china"
 BLR_Chinese_economic_desc: "Estamos implementando toda la experiencia adquirida por la economía china."
 BLR_military_exercises_CHI_idea: "Ejercicios bielorruso-chinos"
 BLR_Socialist_Market_Economy: "Economía de mercado socialista"
 BLR_minotor_servise_sov: "Servicio Minotor Bielorruso"
 BLR_minotor_servise_blr: "Contrato Minotor con Rusia"
 BLR_558zadov_contract: "Contrato con planta de reparación de aeronaves 558"
 BLR_peleng_contract: "[BLR.GetFlag]Contrato con la empresa Peleng"
 BLR_peleng_contract_desc: "[BLR.GetFlag]Empresa bielorrusa dedicada al desarrollo y producción de productos optoelectrónicos para fines militares y civiles, empresa líder en la industria en la República de Bielorrusia."
 BLR_peleng_union_state: "[BLR.GetFlag]JSC Peleng"
 BLR_peleng_union_state_desc: "[SOV.GetFlag]Compañía estatal de la Unión para el desarrollo y producción de productos optoelectrónicos para fines militares y civiles, la empresa líder en la industria en el estado de la Unión."
 BLR_peacerota_idea: "Contingente de mantenimiento de la paz"
 BLR_Foreign_legion_idea: "Legión extranjera"
 BLR_sso_idea: "Fuerzas de Operaciones Especiales"
 BLR_ter_orobona_idea: "Defensa territorial"
 BLR_mzkt_contract: "Contrato con MZKT"
 BLR_mzkt_contract_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state-owned enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_mzkt_contract_another: "Contrato con MZKT"
 BLR_mzkt_another_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state-owned enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_mzkt_contract_blr: "Contrato MZKT con [SOV.GetNamewithFlag]"
 BLR_mzkt_contract_blr_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state-owned enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_mzkt_union_state: "[BLR.GetFlag]Planta de tractores de ruedas de Minsk"
 BLR_mzkt_union_state_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is currently under the jurisdiction of the Union State."
 BLR_140_zavod_remont: "La planta de reparación número 140"
 BLR_140_zavod_remont_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of Belarus, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_140_zavod_union_state: "[BLR.GetFlag]La planta de reparación número 140"
 BLR_140_zavod_union_state_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of [SOV.GetFlag]Union State, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_Brigade_Territorial_Defence: "Crear una Brigada de Defensa Territorial"
 BLR_Brigade_Territorial_Defence_desc: "The outbreak of war forces us to raise a territorial defense force."
 BLR_Transport_troops: "Tropas de transporte"
 BLR_Transport_troops_desc: "Tropas especiales diseñadas para realizar tareas de apoyo al transporte."
 BLR_sso: "Creación de Fuerzas de Operaciones Especiales"
 BLR_sso_desc: "Las Fuerzas de Operaciones Especiales de las Fuerzas Armadas de la República de Bielorrusia, una rama de gran movilidad de las Fuerzas Armadas de la República de Bielorrusia, son las sucesoras de las Fuerzas Aerotransportadas de la URSS y de las fuerzas especiales del GRU de la URSS en el República de Bielorrusia. Tareas principales: actividades de contrasabotaje, inteligencia, lucha contra los grupos armados ilegales, realización de diversas tareas utilizando métodos especiales para poner fin al conflicto armado contra la República de Bielorrusia. Actúan como uno de los principales elementos de disuasión estratégica."
 BLR_trans_army: "Creación de Tropas de Transporte"
 BLR_trans_army_desc: "The Belarusian Transport Troops are the service branch of the Armed Forces of Belarus responsible for the movement of personnel and materiel by truck, rail, and air. They are designed to carry out transport support tasks for military formations from other service branches across the country."
 BLR_end_reform: "Completar la reforma del ejército."
 BLR_end_reform_desc: "We will complete the reforms of our army, and it will now meet modern standards."
 USSR_Legacy: "Desarrollo del MZKT"
 USSR_Legacy_desc: "We will make every effort to develop and build upon the legacy we have inherited."
 BLR_mi_8: "Mi-8"
 BLR_MZKT: "MZKT"
 BLR_MZKT_desc: "Minsk Wheeled Tractor Plant is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_minoitor: "Servicio Minotor"
 BLR_minoitor_desc: "Minotor-Service is a Belarusian enterprise located in Minsk and engaged in the development, production, modernization, repair, and maintenance of combat tracked vehicles, as well as the supply of spare parts. It is one of the leading enterprises of the country's military-industrial complex."
 BLR_belspecveshtech: "Belspetsvneshtechnika"
 BLR_belspecveshtech_desc: "Belspetsvneshtechnika, BSVT is a Belarusian state-owned foreign trade unitary enterprise founded in 1995. It specializes in the trade and production of weapons and dual-use products. It is a member of the State Military-Industrial Committee and is considered the country's leading enterprise in the field of arms exports."
 BLR_140_zavod: "140 Planta de Reparación"
 BLR_140_zavod_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of Belarus, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_polonez: "Comience a desarrollar nuestro MLRS con China"
 BLR_polonez_desc: "We have enlisted the help of our Chinese colleagues to create our MLRS."
 BLR_peleng: "Peleng"
 BLR_peleng_for_russia: "Equipo ATGM"
 BLR_peleng_for_russia_desc: "We are ready to launch the production of equipment for the Russian ATGM."
 BLR_peleng_for_ukr: "Equipo ATGM"
 BLR_peleng_for_ukr_desc: "We are ready to launch the production of equipment for the Ukrainian ATGM."
 BLR_558_zavod: "558 Planta de reparación de aeronaves"
 BLR_558_zavod_desc: "The 558th Aviation Repair Plant is one of the largest enterprises in the CIS for the repair and modernization of modern combat aviation equipment in service with the Air Forces of post-Soviet countries and many foreign nations alike. It is the most important aircraft repair facility in Belarus, located in the city of Baranovichi."
 BLR_Communism_start: "¡Tatyana Golubeva!"
 BLR_Communism_start_desc: "El comunismo ha regresado a Bielorrusia. ¿Abrirá el Partido Comunista el camino al marxismo-leninismo en el país una vez más?"
 BLR_trade_with_nko: "Comercio con Corea del Norte"
 BLR_trade_with_nko_desc: "Corea del Norte, aunque es un país pequeño, es nuestro aliado en el campo socialista con el que estamos dispuestos a establecer relaciones comerciales."
 BLR_nko_workers: "trabajadores norcoreanos"
 BLR_nko_workers_desc: "Estamos dispuestos a invitar a trabajadores norcoreanos a nuestro país. Son famosos por su eficiencia y dedicación."
 BLR_nko_miiltary_coop: "¡Cooperación Técnico-Militar con Corea del Norte!"
 BLR_nko_miiltary_coop_desc: "Estamos listos para iniciar la cooperación técnico-militar con el Ejército Popular de Corea del Norte."
 BLR_rotation_KGB: "Rotación en el KGB"
 BLR_rotation_KGB_desc: "Estamos rotando personal, porque ahora necesitamos una organización fuerte y poderosa."
 BLR_North_Korea_workers: "Trabajadores de Corea del Norte"
 BLR_SMERSH_2: "SMERSH 2.0"
 BLR_SMERSH_2_desc: "Reviviremos SMERSH. Es hora de utilizar la experiencia soviética en beneficio de la nación."
 BLR_arest_silovic: "Arresto de Fuerzas de Seguridad"
 BLR_arest_silovic_desc: "Resultó que muchas fuerzas de seguridad no están de acuerdo con el nuevo gobierno, es hora de purgarlas."
 BLR_antigay_propaganda_laws: "Leyes contra la Propaganda Gay"
 BLR_antigay_propaganda_laws_desc: "It is time to legally prohibit LGBT propaganda in our country."
 BLR_clean_soc_net: "Limpieza de Redes Sociales"
 BLR_clean_soc_net_desc: "Limpiaremos todas las redes sociales, no permitiremos la difusión de propaganda enemiga."
 BLR_pioneria: "Pioneros"
 BLR_pioneria_desc: "Los jóvenes no deben quedarse de brazos cruzados, por eso reviviremos a los Jóvenes Pioneros."
 BLR_Marks_school: "Marxismo en las Escuelas"
 BLR_Marks_school_desc: "El currículo escolar incluirá necesariamente la educación marxista."
 BLR_free_education: "Educación Gratuita"
 BLR_free_education_desc: "La educación debe ser gratuita y disponible para todos los ciudadanos de nuestro glorioso país."
 BLR_state_atheism: "Ateísmo de Estado"
 BLR_state_atheism_desc: "Religion is the opium of the people, and it is time to fight its influence."
 BLR_collectivism: "Colectivismo"
 BLR_collectivism_desc: "Collectivization has worked before, so we will repeat the experience."
 BLR_fight_international_capitalists: "Lucha contra los Capitalistas Internacionales"
 BLR_fight_international_capitalists_desc: "Los oligarcas son una clase peligrosa y corrupta, tan inalterable como los kulaks de la época soviética. Desde la disolución de la URSS, los oligarcas rusos y bielorrusos han absorbido cada vez más influencia económica y han desalojado a los trabajadores bielorrusos en favor de un modelo económico globalista impulsado por empresas extranjeras. Para revivir el verdadero socialismo, primero es esencial expulsar a la clase capitalista internacional."
 BLR_weaken_the_banks: "Debilitar los Bancos"
 BLR_weaken_the_banks_desc: "Los bancos son la guardia pretoriana del capitalismo, llevando su estandarte al combate y defendiendo sus ganancias con su mera existencia. Se entrometen en áreas pobres del mundo, abusan de la clase trabajadora con la especulación salarial y de intereses, e influyen en la política con donaciones legales e ilegales. Los bancos deben volver a un estado en el que sean simples prestamistas de dinero a corto plazo, apolíticos."
 BLR_ultimate_tax_reform: "Gran Reforma Tributaria"
 BLR_ultimate_tax_reform_desc: "Tenemos la intención de llevar a cabo una importante reforma fiscal que aliviará la carga fiscal para la gente común, pero para las empresas será lo contrario."
 BLR_single_party: "Partido Único"
 BLR_single_party_desc: "Debería haber un solo partido, porque tenemos un solo camino hacia el socialismo."
 BLR_nationalize_foreign_business: "Nacionalizar Empresas Extranjeras"
 BLR_nationalize_foreign_business_desc: "Las plantas industriales propiedad de extranjeros siempre representan un riesgo para la seguridad económica. Ante las amenazas de sanciones económicas de países extranjeros, siempre preocupa que los propietarios industriales se marchen de la noche a la mañana y se lleven partes vitales de sus plantas. Para evitarlo, debemos reclamar estas industrias para el Estado, incluso si ello ofende a otras naciones."
 BLR_five_year_plan: "Primer Plan Quinquenal"
 BLR_five_year_plan_desc: "The free economic models of Western states offer no future for a socialist country. A return to a planned economy, preferably in the form of classical Soviet-style Five-Year Plans, will give the government great influence over the previously unchecked economy."
 BLR_reestablish_the_military_industrial_complex: "Reestablecer el Complejo Militar-Industrial"
 BLR_reestablish_the_military_industrial_complex_desc: "¡El ejército y el pueblo son uno!"
 BLR_mobilize_the_masses: "Movilizar a las Masas"
 BLR_mobilize_the_masses_desc: "Nuestro ejército necesita gente que defienda los intereses de nuestro país dondequiera que el partido lo demande."
 BLR_better_roads: "Mejora General de Carreteras"
 BLR_better_roads_desc: "Es necesario abordar de cerca el problema vial en nuestro país."
 BLR_progress_cult: "Culto al Progreso"
 BLR_progress_cult_desc: "Los socialistas aspiran al progreso social y científico. Este último es especialmente importante en el siglo XXI, no solo por motivos de seguridad nacional, sino para difundir la revolución y cumplir la agenda socialista, que solo puede lograrse plenamente si la ciencia y la tecnología avanzan hasta cierto punto."
 BLR_soviet_academy_of_sciences: "Academia Soviética de Ciencias"
 BLR_soviet_academy_of_sciences_desc: "La Academia Soviética de Ciencias fue la principal institución científica de la Unión Soviética. Nuestras mentes más brillantes volverán a trabajar incansablemente aquí para lograr avances tecnológicos y científicos que algún día nos convertirán en la envidia del mundo capitalista."
 BLR_the_culture_of_proletarianism: "Cultura del Proletariado"
 BLR_the_culture_of_proletarianism_desc: "It is time to cultivate a proletarian culture for the working class, with which we will move together toward a common, beautiful communist future."
 BLR_empower_the_kgb: "Expandir la Influencia del KGB"
 BLR_empower_the_kgb_desc: "Pretendemos ampliar la influencia de la KGB en nuestro país para que el enemigo no pueda socavar nuestro sistema interno. Por lo tanto, otorgaremos aún más poderes para llevar a cabo nuestras actividades."
 BLR_erase_nationalist: "Encarcelar a Todos los Nacionalistas"
 BLR_erase_nationalist_desc: "It is time to eliminate nationalist cells in our country."
 BLR_the_litbel_start: "Revivir Litbel"
 BLR_the_litbel_start_desc: "Litbel es una república soviética que surgió brevemente durante la Guerra Civil Rusa. La perspectiva de unir fuerzas con nuestros hermanos lituanos nos parece muy tentadora."
 BLR_peaceful_litbel: "Litbel sin guerra"
 BLR_peaceful_litbel_desc: "Hemos preparado todo lo necesario. Todos los agentes, todos los ciudadanos y políticos están en sus puestos. Es hora de liberar a Lituania de la ocupación del gobierno títere."
 BLR_the_litbel: "Estado de Dos Pueblos"
 BLR_the_litbel_desc: "Ha llegado el momento de que nos convirtamos en un solo país con dos pueblos: bielorruso y lituano."
 BLR_dissolve_monasteries: "Disolución de los Monasterios"
 BLR_dissolve_monasteries_desc: "¡Limpiaremos nuestro país de la religión por completo!"
 BLR_support_of_the_worker: "Apoyo a los Trabajadores"
 BLR_support_of_the_worker_desc: "The working class is our support and strength. We will always support them in the fight against the capitalist contagion!"
 BLR_litbel_attack_lat: "Latgalia bielorrusa"
 BLR_litbel_attack_lat_desc: "The lands of Latgale have long been torn away from us by Latvia. It is time to end this injustice."
 BLR_litbel_annex_lat: "El fin del Estado letón"
 BLR_litbel_annex_lat_desc: "Las tierras de Letonia vuelven a ser nuestras."
 BLR_presidential_election_of_2001: "La Esfera Política"
 BLR_presidential_election_of_2001_desc: "Es hora de decidir quién dirigirá nuestro país en el nuevo milenio."
 BLR_Andrey_sannikov: "¡El camino de la democracia occidental!"
 BLR_Andrey_sannikov_desc: "Nuestro país ha elegido un nuevo líder. Ahora nos guiará hacia un futuro democrático brillante."
 BLR_Join_GUAM: "Unirse a GUAM"
 BLR_Join_GUAM_desc: "We will strengthen our ties in the post-Soviet space by joining GUAM."
 BLR_American_Protection: "Protección estadounidense"
 BLR_American_Protection_desc: "We need America's help, because Russia is unlikely to ignore our actions."
 BLR_Linking_foreign_currency: "Vincular nuestra moneda al euro"
 BLR_Linking_foreign_currency_desc: "The instability of our currency must be eliminated. We will bind our currency to the Euro."
 BLR_closed_border_with_Russia: "Cierre de la frontera con Rusia"
 BLR_closed_border_with_Russia_desc: "We are putting up border posts with Russia again. No one from Russian territory will be able to move freely into our country."
 BLR_NATO_Membership_Campaign: "Campaña de membresía en la OTAN"
 BLR_NATO_Membership_Campaign_desc: "It is time to start a campaign to prepare for joining NATO."
 BLR_USA_military_Cooperation: "Cooperación militar con Estados Unidos"
 BLR_USA_military_Cooperation_desc: "Cooperation with the United States in the military-technical sphere promises us significant advantages."
 BLR_Invite_NATO_advisors: "Invitar asesores militares de la OTAN"
 BLR_Invite_NATO_advisors_desc: "Now that we have completely reformed our military command, we will invite NATO military advisers."
 BLR_USAD_request: "Solicitud de USAID"
 BLR_USAD_request_desc: "We have decided to contact USAID for support."
 BLR_Military_Exercises_NATO: "Ejercicios militares con la OTAN"
 BLR_Military_Exercises_NATO_desc: "Our army will hold its first joint exercises with NATO."
 BLR_NATO_integration_command: "Comando de Integración de la OTAN"
 BLR_NATO_integration_command_desc: "The NATO Integration Command is our next step towards joining the Alliance."
 BLR_Request_NATO_membership: "Solicitar la membresía en la OTAN"
 BLR_Request_NATO_membership_desc: "It is time to apply for NATO membership."
 BLR_western_diplomats: "Diplomáticos occidentales"
 BLR_western_diplomats_desc: "Diplomats from Western countries visited us and congratulated us on the victory we had achieved. Now Belarus can choose the path toward the West."
 BLR_denied_sanctions: "Suspensión de las sanciones"
 BLR_denied_sanctions_desc: "Now that we have held legitimate elections, all sanctions against us will be lifted."
 BLR_people_rights: "Derechos humanos"
 BLR_people_rights_desc: "We must respect the rights and freedoms of our people."
 BLR_Freedom_Meetings: "Libertad de reuniones y asambleas"
 BLR_Freedom_Meetings_desc: "The right to meetings and assemblies must be secured."
 BLR_dont_torture: "Reforma del sistema de salud"
 BLR_dont_torture_desc: "Quality healthcare is one of the most basic needs of our citizens. By delivering it, we will be able to build a better country."
 BLR_EU_integration: "Integración en la Unión Europea"
 BLR_EU_integration_desc: "We intend to integrate into the European Union."
 BLR_Attract_European_investments: "Atraer inversiones europeas"
 BLR_Attract_European_investments_desc: "We are ready to attract European investors to improve our economy."
 BLR_Opening_garment: "Apertura de fábricas de prendas de vestir para marcas populares"
 BLR_Opening_garment_desc: "We are ready to establish the production of clothing for popular brands on the territory of our country."
 BLR_simplification_labor_code: "Simplificación del Código Laboral"
 BLR_simplification_labor_code_desc: "It is necessary to change the norms of labor legislation so that employees cannot constantly resort to trade unions instead of working."
 BLR_Encourage_Exchange_Students_desc: "Our students are ready to participate in an exchange program with European counterparts."
 BLR_Adopt_EU_Intellectual: "Adoptar leyes de propiedad intelectual de la UE"
 BLR_Adopt_EU_Intellectual_desc: "Se deben adoptar las leyes de propiedad intelectual de la UE para cumplir con los estándares europeos en esta área."
 BLR_Digitalization: "Digitalización"
 BLR_Digitalization_desc: "It is necessary to digitize production processes to improve their quality."
 BLR_political_platforms: "Creación de plataformas políticas para empresas extranjeras"
 BLR_political_platforms_desc: "Perhaps we should allow foreign companies access to our political platforms?"
 BLR_Custom_Institutional_reforms: "Biocombustible"
 BLR_Custom_Institutional_reforms_desc: "Las fuentes de energía alternativas pueden ayudarnos a reducir nuestra dependencia de aquellos países con los que no deseamos tener lazos amistosos."
 BLR_Market_Economy: "Economía de mercado funcional"
 BLR_Market_Economy_desc: "A full-fledged market economy is what we have been striving for, and it is what should function in a European and democratic country."
 BLR_Delete_KGB2: "Disolver el KGB"
 BLR_Delete_KGB2_desc: "Reemplazaremos al KGB con una nueva estructura: el Servicio de Seguridad Nacional. Esta organización reclutará a empleados leales a nuestros ideales occidentales."
 BLR_US_money: "Inversiones estadounidenses"
 BLR_US_money_desc: "We need money to further build democracy in our country."
 BLR_join_wto: "Adhesión a la OMC"
 BLR_join_wto_desc: "Joining the WTO will give us many advantages and access to international markets."
 BLR_release_political_prisoners: "Liberar a los presos políticos"
 BLR_release_political_prisoners_desc: "Many people were imprisoned for political reasons under the previous government. We will fix this."
 BLR_baltic_economic_cooperation: "Asociación comercial con los países bálticos"
 BLR_baltic_economic_cooperation_desc: "Our nearest neighbors are excellent trading partners. Their coastal location and common borders give us strong reasons to improve our trade performance."
 BLR_root_out_nationalists: "Eliminar a los nacionalistas"
 BLR_root_out_nationalists_desc: "Nationalists have always been a problem in our country. They will only lead to instability, and it is time to deal with them."
 BLR_decommunize_belarus_society: "Descomunización de la sociedad bielorrusa"
 BLR_decommunize_belarus_society_desc: "The Soviet legacy must be left behind. The time has come to embrace the progressive West."
 BLR_fight_the_oligarchs: "Lucha contra los oligarcas"
 BLR_fight_the_oligarchs_desc: "We cannot allow oligarchs to hold power in our country, or we will definitely not see economic growth."
 BLR_European_university_connections: "Educación europea"
 BLR_European_university_connections_desc: "We are ready to welcome European universities into our country to improve the quality of education for our students."
 BLR_LGBT_Belarus_quest: "Cuestión LGBT en Bielorrusia"
 BLR_LGBT_Belarus_quest_desc: "El tema LGBT ha sido puesto en la agenda por nuestro gobierno, porque no podemos ignorar esta tendencia. ¿Qué haremos al respecto?"
 BLR_Offshore_heaven: "Beneficios fiscales para inversores extranjeros"
 BLR_Offshore_heaven_desc: "We will create favorable conditions for investment in our country, which will attract many investors."
 BLR_wind_farms: "Parques eólicos"
 BLR_wind_farms_desc: "We have built several wind farms in the districts of Minsk."
 BLR_Hajdukiewicz: "Sergey Vasilyevich Gaidukevich (nacido el 8 de septiembre de 1954) es un político y figura pública bielorruso, líder del Partido Liberal Democrático de Bielorrusia. Es coronel de la reserva. Se le conoce por su orientación pro-rusa, defiende la confederación con Rusia y la introducción de una moneda única (con un centro emisor en Moscú), así como por 'llevar a cabo una política militar conjunta'"
 BLR_Hajdukiewicz_desc: "Sergey Vasilyevich Gaidukevich (born September 8, 1954) is a Belarusian politician and public figure, leader of the Liberal Democratic Party of Belarus. He is a reserve colonel known for his pro-Russian orientation. He stands for confederation with Russia and the introduction of a single currency with an issue center in Moscow, as well as for conducting a joint military policy."
 BLR_Spiritual_revival: "Renacimiento espiritual de Bielorrusia"
 BLR_Spiritual_revival_desc: "The process of spiritual revival of Belarus should continue. The role of the Orthodox Church and the Roman Catholic Church in society should increase."
 BLR_Ban_Enemies: "Luchar contra los enemigos internos"
 BLR_Ban_Enemies_desc: "We must completely clear the political field in our country. No destructive parties financed from abroad should interfere with our country's development."
 BLR_Russian_Oligarch: "Amistad con los oligarcas rusos"
 BLR_Russian_Oligarch_desc: "Russian oligarchs command enormous wealth. I think it is worth winning them over."
 BLR_Hardline_EuroScepticism: "Euroscepticismo radical"
 BLR_Hardline_EuroScepticism_desc: "Tough Euroscepticism is necessary, because Europe wants a weak Belarus."
 BLR_Belarusian_nation_law: "Ley nacional bielorrusa"
 BLR_Belarusian_nation_law_desc: "Our nation has long earned the right to self-determination. We are a people with a great history and must stride toward a bright future as a sovereign nation."
 BLR_russian_education: "Educación rusa"
 BLR_russian_education_desc: "Our universities should establish ties with Russian ones. This way, we will be able to offer Russian-style education to everyone."
 BLR_Son_will_rule: "Que el hijo gobierne"
 BLR_Son_will_rule_desc: "It is time to change the leader. Now Sergei Gaidukevich's son will lead the party and the country."
 BLR_rus_media: "Dejen entrar a los medios rusos"
 BLR_rus_media_desc: "We will allow Russian media into our territory without restrictions."
 BLR_russian_fsb: "Permitir las oficinas de representación del FSB"
 BLR_russian_fsb_desc: "The FSB will work together with our special services and provide us with greater political stability."
 BLR_science_boost: "Invertir en ciencia"
 BLR_science_boost_desc: "Science should be funded as generously as possible from the state budget."
 BLR_support_promka: "Apoyo a la industria nacional"
 BLR_support_promka_desc: "We will support the domestic industry."
 BLR_boost_economic: "Acelerar el crecimiento económico"
 BLR_boost_economic_desc: "Our reforms are making themselves felt and the economy has started to grow."
 BLR_anti_gibdd: "Política anti-LGBT"
 BLR_anti_gibdd_desc: "We reject and will fight LGBT propaganda in our country."
 BLR_union_state_course: "Rumbo al Estado Unión"
 BLR_union_state_course_desc: "Our goal is the Union State, and we will strive for it."
 BLR_support_army: "Apoyo del ejército"
 BLR_support_army_desc: "We will support the military in our country, because it is thanks to them that our country remains independent."
 BLR_russian_tver: "Producción conjunta con la Fábrica de Carros de Tver"
 BLR_russian_tver_desc: "We will purchase a large number of wagons from Russia for our railways."
 BLR_russian_teplovzor: "Apertura de producción de cámaras térmicas para Rusia"
 BLR_russian_teplovzor_desc: "We will open the production of thermal imagers, which we will also be able to sell to Russia for use in their armed forces."
 BLR_cyphrovizacia: "Digitalización"
 BLR_cyphrovizacia_desc: "We will begin our journey toward the digital economy."
 BLR_russian_uvz: "Firma contratos exclusivos con UVZ"
 BLR_russian_uvz_desc: "Partnership with this well-known enterprise will bring us significant benefits."
 BLR_all_cyphro: "Digitalización completa"
 BLR_all_cyphro_desc: "Digitalization of many government processes will help us work more effectively with citizens and the problems that arise."
 BLR_kalash_zavod: "Inauguración de la fábrica de armas Kalashnikov"
 BLR_kalash_zavod_desc: "We will manufacture the products of this famous brand domestically."
 BLR_Union_state_again: "Unirse a Rusia"
 BLR_Union_state_again_desc: "We are ready to become part of Russia once again."
 BLR_union_become_one: "La Unión se Convertirá en Una"
 BLR_Lykashenko: "§YLukashenko§!"
 BLR_Lykashenko_desc: "Alexander Grigoryevich Lukashenko (born August 30, 1954) is a Belarusian politician, statesman, and military figure. He has held the post of President of Belarus and Commander-in-Chief of the Armed Forces since July 20, 1994. He is known for his pro-Russian views. In Belarusian and Russian-speaking societies, he is known by the nickname \"Batka\"."
 BLR_GrodnoAzot: "Grodno Azot"
 BLR_GrodnoAzot_desc: "The Khimvolokno Plant branch of Grodno Azot OJSC is a large manufacturer of polyamide and polyester yarns and fibers, as well as polyamide-6 (PA-6) and polymer composite materials based on it. Each of the main types of products is produced in a wide assortment with various physical and mechanical properties and quality indicators, depending on the application."
 BLR_PinskDrev: "Finanzas \"PinskDrev\""
 BLR_PinskDrev_desc: "PinskDrev is a large woodworking enterprise in Belarus and the oldest in Pinsk. We should finance their activities so that they can develop further."
 BLR_AirPort_minsk: "Expansión del Aeropuerto Internacional"
 BLR_AirPort_minsk_desc: "We are ready to invest significant financial resources in the expansion of Minsk Airport."
 BLR_dai_denyag: "Solicitar un préstamo desde Rusia"
 BLR_dai_denyag_desc: "We will ask the Russian government to provide us with a loan."
 BLR_ros_atom: "ROS ATOM"
 BLR_ros_atom_desc: "Invitaremos a especialistas de ROSATOM para colaborar en el campo de la energía nuclear"
 BLR_Impact_kgb: "Impacto del KGB"
 BLR_Impact_kgb_desc: "The KGB uses various methods to eliminate those dissatisfied with the election of a new president."
 BLR_Liquidation_pub_assoc: "Liquidación de Asociaciones Públicas"
 BLR_Liquidation_pub_assoc_desc: "The KGB is actively liquidating, or attempting to liquidate, public associations that are objectionable to our president."
 BLR_crackdown_opp_rall: "Represión de Mítines de Oposición"
 BLR_crackdown_opp_rall_desc: "We are actively dispersing the rallies of our political opponents who are dissatisfied with the elections."
 BLR_Increased_censorship: "Fortalecer la Censura de los Medios de Comunicación"
 BLR_Increased_censorship_desc: "It is necessary to impose strong censorship on the media so that our opponents cannot agitate against us."
 BLR_concept_national_security_Belarus: "Concepto de Seguridad Nacional"
 BLR_concept_national_security_Belarus_desc: "Este concepto establece un conjunto de opiniones oficiales sobre la esencia y el contenido de las actividades de la República de Bielorrusia para garantizar el equilibrio de los intereses del individuo, la sociedad y el Estado, y su protección de amenazas internas y externas"
 BLR_Economic_development_2001_2005: "Programa de Desarrollo Socioeconómico"
 BLR_Economic_development_2001_2005_desc: "El programa de desarrollo socioeconómico de la República de Bielorrusia para 2001-2005, desarrollado por el Ministerio de Economía de la República de Bielorrusia en colaboración con otros ministerios y órganos de administración estatales republicanos, comités ejecutivos regionales y el Comité Ejecutivo de la Ciudad de Minsk con la participación de la Academia Nacional de Ciencias, el Banco Nacional, institutos de investigación especializados y organizaciones públicas, de acuerdo con la Ley de la República de Bielorrusia 'Sobre la previsión estatal y los programas de desarrollo socioeconómico de la República de Bielorrusia' y las resoluciones del Consejo de Ministros de la República de Bielorrusia de febrero 2, 2000 N 141 y de agosto 10, 2000 N 1248 sobre el desarrollo del Programa de desarrollo socioeconómico de la República de Bielorrusia para 2001-2005."
 BLR_reforms_Belarusian_Railway: "Reformas de los Ferrocarriles Bielorrusos"
 BLR_reforms_Belarusian_Railway_desc: "Our railways are in a very poor state, so we will carry out a set of reforms to improve the situation."
 BLR_new_railway_station: "Nueva Estación de Tren de Minsk"
 BLR_new_railway_station_desc: "We have built a new train station in Minsk. Our city will now be able to receive more trains."
 BLR_Electrification_Myslishche_Kryzhovka: "Electrificación del Ferrocarril Myslyshche - Kryzhovka"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "The Myslyshche-Kryzhovka line is one of the highest development priorities in our country, so we will address it first."
 BLR_Baranovichi_Plant: "Planta de Piezas y Estructuras de Construcción de Baranovichi"
 BLR_Baranovichi_Plant_desc: "We are creating a structural division of the Baranovichi Plant of Construction Parts and Structures to improve the supply of parts to our trains."
 BLR_Energy_conflict_over: "Venta de Belgaztrans"
 BLR_Energy_conflict_over_desc: "The conflict is coming to an end. We have agreed to Russia's terms and are ready to sell Belgaztrans. In return, energy prices will be stabilized for us."
 BLR_new_rolling_stock: "Compra de Nuevo Material Rodante"
 BLR_new_rolling_stock_desc: "By purchasing new rolling stock, we will eliminate the main problem plaguing our railways."
 BLR_promise_first_nuclear: "La Promesa de Construir una Planta Nuclear"
 BLR_promise_first_nuclear_desc: "We promise all our citizens that a nuclear power plant will be built on the territory of our country, thereby ensuring our energy security."
 BLR_New_Land_code: "Nuevo Código de Tierras"
 BLR_New_Land_code_desc: "The new Land Code significantly simplifies the purchase of land by private owners and companies, which will clearly appeal to a certain segment of the population."
 BLR_Zubr_Energy_LLC: "Apertura de Zubr Energy LLC"
 BLR_Zubr_Energy_LLC_desc: "Planta para la producción de baterías de arranque para su entrega a las líneas de producción de fabricantes de automóviles nacionales y extranjeros."
 BLR_Hi_Tech_Park: "Parque de Alta Tecnología"
 BLR_Hi_Tech_Park_desc: "Hi-Tech Park is a special tax and legal regime for the development of IT business in Belarus. It is not a free (special, special) economic zone, but it is a jurisdiction that operates on the principle of extraterritoriality. Companies and individual entrepreneurs registered in the Park can use the preferences provided to them regardless of the location of their Belarusian office."
 BLR_Referendum_Belarus_2004: "Referéndum en Bielorrusia 2004"
 BLR_Referendum_Belarus_2004_desc: "El 17 de octubre de 2004, Bielorrusia acogió el tercer referéndum republicano iniciado por el presidente Lukashenko en la historia de Bielorrusia independiente. El referéndum fue convocado por el Decreto Presidencial Nº 431 de septiembre 7, 2004 y se combinó con las elecciones parlamentarias."
 BLR_Energy_conflict: "Conflicto Energético Ruso-Bielorruso"
 BLR_Energy_conflict_desc: "El conflicto comenzó en diciembre de 2006, cuando Gazprom anunció el precio final del gas natural para la República de Bielorrusia en 105 dólares por 1.000 m3. Además, 75 dólares se pagarían en efectivo y Bielorrusia tendría derecho a pagar los 30 dólares restantes con acciones de Beltransgaz, cuyo importe se estimó en 5.000 millones de dólares."
 BLR_Decree_n3: "Decreto sobre el Parasitismo"
 BLR_Decree_n3_desc: "No one will sit on state benefits any longer. It is time to make all the idle work."
 BLR_launch_own_satellite: "Lanzamiento de su Propio Satélite por Bielorrusia"
 BLR_launch_own_satellite_desc: "El satélite bielorruso de observación de la Tierra fue lanzado el 22 de julio de 2012 desde el cosmódromo de Baikonur en Kazajstán, en un grupo de cinco satélites: junto con los rusos Canopus-V y MKA-FKI (Zond-PP), el alemán TET-1 y el canadiense ADS-1B."
 BLR_gasification_country: "Finalización de la Gasificación del País"
 BLR_gasification_country_desc: "We will complete the gasification of our country, which our citizens will surely appreciate."
 BLR_CJSC_Turkcell: "Acuerdo con Turkcell"
 BLR_CJSC_Turkcell_desc: "An important deal will be made between us and our Turkish partners — the sale of a controlling stake in CJSC \"BeST\" to Turkcell. This will open another avenue for investment in our country."
 BLR_Anti_Corruption: "Campaña Anticorrupción"
 BLR_Anti_Corruption_desc: "We must defeat corruption in our country. The main thing is not to end up implicated yourself."
 BLR_Punish_Shushkevich: "Punish Shushkevich's Cronies"
 BLR_Punish_Shushkevich_desc: "Shushkevich left us a legacy in the form of his loyalists in the government. It is time to get rid of them."
 BLR_State_Run_Capitalism: "Capitalismo dirigido por el Estado"
 BLR_State_Run_Capitalism_desc: "The state should completely control the economic policy of the country."
 BLR_reform_officers: "Apertura de nuevas escuelas de oficiales"
 BLR_reform_officers_desc: "One of the priorities of our military reforms is to improve officer education."
 BLR_peace_rota: "Crear una Compañía de Mantenimiento de la Paz"
 BLR_peace_rota_desc: "We will create a special unit to participate in peacekeeping missions."
 BLR_Promote_new_officers: "Promover a Nuevos Oficiales"
 BLR_Promote_new_officers_desc: "We will complete a set of measures for the transformation of our armed forces, which began in 1994."
 BLR_Internet_cencorship: "Censura en Internet"
 BLR_Internet_cencorship_desc: "The Internet has become a platform where sentiments aimed at overthrowing the government are openly discussed. It is necessary to control this."
 BLR_kgb: "KGB"
 BLR_Batka_policy: "Censura en Internet"
 BLR_Batka_policy1: "Decreto sobre parasitismo"
 BLR_Batka_policy2: "Política de Internet de Belarús"
 BLR_Batka_policy3: "Política de Internet de Belarús"
 BLR_Raiffeisen2: "Raiffeisen en Bielorrusia"
 BLR_Raiffeisen2_desc: "Established in 1989, Priorbank has been a subsidiary of RBI since 2003. It is one of the largest local private banks and one of the country's leading financial institutions in terms of efficiency and profitability. As a universal bank, it services corporate customers, small and medium-sized enterprises as well as private individuals."
 BLR_Henkel2: "Henkel"
 BLR_Henkel2_desc: "La división de productos químicos para la construcción del consorcio Henkel en Bielorrusia, Henkel Bautechnik LLC, fue fundada en 2004 con el objetivo de organizar la producción de productos que sustituyan a las importaciones. En 2005, comenzó la construcción de una planta para la producción de mezclas para la construcción Ceresit en Zaslavl, cuya producción se inició en septiembre de 2006. La gama de productos de la empresa incluye más de 100 artículos, entre los que se incluyen revestimientos prefabricados, sistemas de aislamiento térmico y acabado de fachadas, sistemas de suelos e impermeabilización, materiales para la preparación de superficies para el acabado, selladores, espuma de montaje, \"clavos líquidos\" y yesos."
 BLR_Jeans_Revolution: "Revolución de los Jeans"
 BLR_Jeans_Revolution_desc: "A mass protest rally in the center of Minsk and other cities of Belarus, which began on March 19, 2006 in response to the falsifications of the authorities in the presidential elections that took place earlier."
 BLR_reform_kolhoz: "Reformas de las Granjas Colectivas"
 BLR_reform_kolhoz_desc: "It is necessary to reform collective farms to ensure the stability of our agro-industry."
 BLR_Eastern_Partnership: "Asociación Oriental"
 BLR_Eastern_Partnership_desc: "The Eastern Partnership is a project of the European Union, with the main stated goal of developing integration ties of the European Union with six countries of the former USSR: Azerbaijan, Armenia, Belarus, Georgia, Moldova and Ukraine."
 BLR_Azarenok_case: "El caso de Igor Azarenok"
 BLR_Azarenok_case_desc: "General Azarenok was suspected of lobbying for Russian interests in the Republic of Belarus through bribes and other frauds. Should we pay attention to this?"
 BLR_National_Library: "Nuevo Edificio de la Biblioteca Nacional"
 BLR_National_Library_desc: "El nuevo edificio de la Biblioteca Nacional de Bielorrusia, en cuya construcción participó todo el país, se inauguró a los usuarios el 16 de junio de 2006."
 BLR_delta_city: "Centro de Negocios 'Delta City'"
 BLR_delta_city_desc: "During the National Exhibition of Serbia in Minsk, a major contract was signed for the construction of the Delta City business center and the development of the territory near the National Library with a total investment of several billion euros (the developer is Dana Holdings, owned by Serbian businessmen)."
 BLR_Kal: "Comerciante conjunto de potasio"
 BLR_Kal_desc: "We will propose to Russia the creation of a joint stock company that will be our common potassium trader."
 BLR_Kal2: "Cerrar una operación conjunta con potasio"
 BLR_Kal2_desc: "Recent criminal cases initiated by us against employees of the Russian company Uralkali, as well as abuses of authority on their part, have forced us to close the joint trader and create our own."
 BLR_BRSM_desc: "La Unión de Jóvenes Republicanos de Bielorrusia es una asociación pública juvenil en la República de Bielorrusia. Es la asociación juvenil más grande del país y cuenta con el apoyo de Alexander Lukashenko. Sus actividades son financiadas por el estado."
 BLR_Potato_Empire: "Imperio de la Papa"
 BLR_Potato_Empire_desc: "We are one of the top potato exporters in the world. Our country should be proud of this."
 BLR_Factory_Kommunarka: "Nacionalizar la Fábrica Kommunarka"
 BLR_Factory_Kommunarka_desc: "Our President believes that the privatization of the Confectionery Factory \"Kommunarka\" was illegal, so the nationalization of this enterprise has been announced."
 BLR_Another_year: "Otro Año de Independencia"
 BLR_Another_year_desc: "Belarus will continue to follow its independent policy."
 BLR_Migrant_crisis: "La Crisis Migratoria"
 BLR_Migrant_crisis_desc: "La crisis migratoria en la frontera de Bielorrusia surgió debido al flujo de migrantes ilegales, principalmente de Irak y Siria, en menor medida de Afganistán y de países africanos (según estadísticas del Servicio de Fronteras polaco) que intentan ingresar a países de la UE (Lituania, Letonia, Polonia)."
 BLR_gudermes: "Envían a OMON a entrenar en Gudermes, Chechenia"
 BLR_gudermes_desc: "Deberíamos echar un vistazo a esta famosa universidad de fuerzas especiales. Tal vez nuestros combatientes puedan mejorar sus habilidades."
 BLR_Another_Elections: "Y Otra Vez Elecciones"
 BLR_Another_Elections_desc: "The next elections in our country are just around the corner. Who will win?"
 BLR_Bye_opposition: "Sin Misericordia para la Oposición"
 BLR_Bye_opposition_desc: "We do what we always do — we deal with the opposition hard and fast."
 BLR_Milk_war: "Guerras de la Leche"
 BLR_Milk_war_desc: "A series of deteriorations in relations between Belarus and Russia, stemming from disputes over the export of dairy products to Russia."
 BLR_jeans_revolution: "Revolución de los jeans"
 BLR_jeans_revolution_desc: "The people are dissatisfied with the upcoming elections. They allegedly do not believe in the victory of Alexander Lukashenko. What will happen next?"
 BLR_Changes_Customs_policy: "Cambio de Política Aduanera"
 BLR_Changes_Customs_policy_desc: "New changes and strictures have been introduced to complicate the import of counterfeit products into our country."
 BLR_whitelegion_case: "Caso de la Legión Blanca"
 BLR_whitelegion_case_desc: "Our special services have reported on the great activity of representatives of the White Legion. It is necessary to catch them and put them in prison."
 BLR_PolBel_Dplomatic_war: "Guerra Diplomática Polaco-Bielorrusa"
 BLR_PolBel_Dplomatic_war_desc: "Despite the warming of relations, the conflict with Poland is rekindling with its former strength."
 BLR_project_bombel: "Proyecto BOMBEL"
 BLR_project_bombel_desc: "The European Union has allocated funds to strengthen the border between Belarus and the EU against the influx of illegal migrants. Our business is deciding how to use these funds."
 BLR_Investing_Agro_industry: "Inversiones en la Agroindustria"
 BLR_Investing_Agro_industry_desc: "The agro-industry is an important component of our country's economy, and we will continue to increase investments in this sector."
 BLR_fate_belarusian_church: "El Destino de la Iglesia Bielorrusa"
 BLR_fate_belarusian_church_desc: "We should decide which way our church will go."
 BLR_Pension_reform: "Reforma de Pensiones"
 BLR_Pension_reform_desc: "It is time to carry out pension reform and raise the retirement age."
 BLR_New_concept_security: "Nuevo Concepto de Seguridad Nacional"
 BLR_New_concept_security_desc: "Our defensive concept needs to be updated, and we will make the necessary changes to our law."
 BLR_Zimbabwe: "Viaje a Zimbabwe"
 BLR_Zimbabwe_desc: "We will visit Zimbabwe to conclude contracts for the supply of our products."
 BLR_100dney: "100 ideas para Bielorrusia"
 BLR_100dney_desc: "The project \"100 Ideas for Belarus\", aimed at identifying gifted and talented youth, developing their scientific activities and promoting promising innovative developments."
 BLR_stroiotryad: "Reactivación de la brigada estudiantil de construcción"
 BLR_stroiotryad_desc: "We will revive the practice of Student Construction Brigades from the Soviet era. As an incentive, we will exempt them from taxes."
 BLR_People_Militia: "Creation of People's Militia"
 BLR_People_Militia_desc: "We are ready to adopt a law on the creation of a people's militia, which will be a kind of reserve for Territorial defense. In each village there should be a trained group of people to counter the enemy, with subsequent transformation into a partisan movement."
 BLR_Excursion_Warsaw: "Excursión a Varsovia"
 BLR_Excursion_Warsaw_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Warsaw. We can help them organize it. A border crossing from our territory is theoretically possible, but will Poland declare war on us afterwards?"
 BLR_azarenok_tv: "Nuevo propagandista de Lukashenko"
 BLR_azarenok_tv_desc: "Now on television you can often see a new propagandist who broadcasts on behalf of our party and convinces the people of the correctness of our actions."
 BLR_Wagner_arrest: "Situation With PMCs Wagner"
 BLR_Wagner_arrest_desc: "Our special services have arrested fighters from the famous Russian PMC Wagner. We must decide what to do with them."
 BLR_decree_227: "Decreto Nº 227 “Sobre la prestación de servicios de seguridad”"
 BLR_decree_227_desc: "El nuevo decreto número 227 ha causado un gran revuelo en muchos medios de comunicación. Por primera vez, permitimos que una empresa privada acepte armas para la protección de instalaciones. ¿Esto realmente va a dar resultados?"
 BLR_Country_for_life: "País para Toda la Vida"
 BLR_Country_for_life_desc: "Our government has decided to deal with the opposition more cunningly, luring its prominent figures to our side. One of them is Sergey Tikhanovsky, organizer of the \"Country for Life\" project. After the events that followed, rather than arresting him, we publicly invited him into the government, where he could help improve our country. The opposition itself will be divided by such a move."
 BLR_Amendment_to_Constitution: "Cambios Serios en la Constitución"
 BLR_Amendment_to_Constitution_desc: "Our permanent leader, Alexander Lukashenko, has recognized that the country needs radical changes and that it is time to move away from sole presidential power. A referendum on changing the constitution has been announced, under which power will mostly belong to the parliament."
 BLR_army_on_streets_of_cities: "Protestas Masivas"
 BLR_army_on_streets_of_cities_desc: "The people have rebelled against us. They believe that our government is falsifying election results and ruining the country. I hope we have prepared well for such events."
 BLR_anti_lgbtqa_stance: "Política anti-LGBT"
 BLR_Pazniak: "Nacionalistas bielorrusos"
 BLR_Pazniak_desc: "Nationalist forces have seized power in the country. Where will they lead Belarus — toward a brighter future, or toward the country's collapse?"
 BLR_rofeign_legion: "La legión extranjera"
 BLR_rofeign_legion_desc: "We will draw from the experience of the French and create our own foreign legion."
 BLR_debur: "Desburocratización"
 BLR_debur_desc: "We will reduce expenditure on officials and cut their numbers, and the freed funds will go to the benefit of the people."
 BLR_patriotism_desc: "It is time to raise the level of patriotic education in our country."
 BLR_Belarusisation: "Bielorrusización"
 BLR_Belarusisation_desc: "All literature and all official titles must be in Belarusian."
 BLR_Democratic_clean: "Purgas de los demócratas"
 BLR_Democratic_clean_desc: "We are not going to become servants of the West. It is time to purge our country of democrats."
 BLR_Communistst_clean: "Purga de comunistas"
 BLR_Communistst_clean_desc: "The legacy of the USSR must be destroyed. It is time to drive out these adherents of the red contagion."
 BLR_denied_rus_language: "Lengua rusa denegada"
 BLR_denied_rus_language_desc: "Russian will no longer be the second state language. We have had enough of the Russian occupation."
 BLR_anti_immigration_policies: "Políticas anti-inmigratorias"
 BLR_anti_immigration_policies_desc: "Implementing stricter anti-immigration policies will keep the Belarusian identity alive and well."
 BLR_russofobia: "Política antirrusa"
 BLR_russofobia_desc: "It is time to deal with the common enemy — Russia. It is time to tame its imperialist ambitions toward us."
 BLR_decolectivisation: "Descolectivización"
 BLR_decolectivisation_desc: "It is time to get rid of the Soviet legacy and assist the population in moving to the cities."
 BLR_litvins_past: "El pasado de Litvin"
 BLR_litvins_past_desc: "La historia no se puede cambiar y lo sabemos. Los lituanos somos los orgullosos herederos del Gran Ducado de Lituania."
 BLR_constitution_from_1994: "Constitución de 1994"
 BLR_constitution_from_1994_desc: "It is time to restore a proper constitution in our country."
 BLR_We_not_energy_slave: "No somos esclavos de los recursos rusos"
 BLR_We_not_energy_slave_desc: "Russia gave discounts only to support its puppet regime. That is enough. We are ready to build a strong economy without those discounts."
 BLR_Influence_nationalists: "Influencia de los nacionalistas"
 BLR_Influence_nationalists_desc: "We must actively support nationalist movements in neighboring countries."
 BLR_Territorial_claims: "Reivindicaciones territoriales"
 BLR_Territorial_claims_desc: "Our country must return to its true borders."
 BLR_white_legion_desc: "The White Legion is a sports and patriotic organization of Belarus, founded in 1995 for pre-conscription training and patriotic education of young people."
 BLR_white_legion_battalion: "Batallón de la Legión Blanca"
 BLR_white_legion_battalion_desc: "The first battalion of the White Legion has finally been formed. True patriots of their country are ready to fight for its freedom and strength."
 BLR_GDL: "Gran Ducado de Lituania"
 BLR_GDL_desc: "It is time to restore the great state of the Litvinov people. Finally, our people will not be under the yoke of a superpower; they will have the opportunity to become a superpower themselves."
 BLR_help_silesians: "Ayuda a los separatistas de Silesia"
 BLR_help_silesians_desc: "Divide and rule is the main principle we will apply in our policy toward Poland. When the active phase of bringing the Poles under our control begins, the Silesians may help facilitate our conquest of that country."
 BLR_revansh_return: "Revivir el Praviy Revansh"
 BLR_revansh_return_desc: "The Praviy Revansh was a nationalist organization of the 1990s that professed anti-Polish and anti-Russian rhetoric, and argued for the creation of paramilitary organizations modeled on Ukrainian ones."
 BLR_blackcat: "Revivir al gato negro"
 BLR_blackcat_desc: "The Black Cat was a large partisan organization that operated on Belarusian territory for forty years, fighting for independence against the Soviet government. Their methods will serve us well in defending against enemy invasions."
 BLR_lith_again: "De regreso a Zemaitija"
 BLR_lith_again_desc: "The time has come to complete the reconstruction of our mighty state. A small and weak Lithuania stands in our way; we will break it. But we cannot attack the country without justification; we must create the necessary conditions and a pretext so that our invasion does not appear groundless."
 BLR_true_political_and_national_freedom: "Verdadera Libertad Política"
 BLR_true_political_and_national_freedom_desc: "True political freedom begins with recovering from the devastation caused by our internal purges. It is time to move forward and attain what our people truly desire."
 BLR_Taler_ruble: "Táler Bielorruso"
 BLR_Taler_ruble_desc: "We must abandon the ruble entirely, replacing it with our new currency."
 BLR_National_science: "Ciencia Nacional"
 BLR_National_science_desc: "We will begin developing our own science and economy as an independent state."
 BLR_create_nationalsecurity: "Crear nuevos departamentos"
 BLR_create_nationalsecurity_desc: "Instead of the KGB, a legacy of the USSR, we will create two new structures: the National Security Service and the National Intelligence Service."
 BLR_Delete_KGB: "Disolver el KGB"
 BLR_Delete_KGB_desc: "The KGB should be dissolved and replaced by a new structure."
 BLR_Reform_Police: "Reforma Policial"
 BLR_Reform_Police_desc: "The Soviet militia was a relic of the past that we want to get rid of. We are reorganizing it into a national police force modeled on that of Poland."
 BLR_attack_russian_bear: "Acabar con el oso ruso"
 BLR_attack_russian_bear_desc: "Finally, our main enemy will be destroyed."
 BLR_zmagar_army: "Reforma del ejército"
 BLR_zmagar_army_desc: "Our army needs urgent reform. While we were busy with the socio-political transformation of our country, our armed forces were seriously weakened."
 BLR_Young_Front_desc: "The Young Front is an international youth movement of Belarusian youth and a youth opposition organization of Belarus."
 BLR_south_river_battalion: "Batallón South River"
 BLR_south_river_battalion_desc: "Un batallón formado por residentes de los Estados Unidos del condado de South River."
 BLR_territorial_reform: "Reforma Territorial"
 BLR_territorial_reform_desc: "En lugar de las seis regiones y 110 distritos actuales, Zenon Poznyak y el equipo de autores del programa proponen dividir el país en 16 voivodatos, además de Minsk por separado. Los voivodatos, a su vez, se dividirán en 60 provincias y 270 ciudades antiguas."
 BLR_anti_lgbt: "Prohibición de la Propaganda de Relaciones Perversas"
 BLR_anti_lgbt_desc: "Estamos adoptando una ley sobre la prioridad y protección de la familia, el matrimonio (unión de un hombre y una mujer), la maternidad, y sobre la protección de la familia contra intromisiones y interferencias en los asuntos familiares por parte de la ideología y las organizaciones. Además, se propone aprobar una ley \"sobre la protección de la naturaleza humana\" y prohibir la propaganda de relaciones perversas contrarias a la naturaleza humana."
 BLR_latgale_or_war: "Latgale o Guerra"
 BLR_latgale_or_war_desc: "Latgale was once part of the Grand Duchy of Lithuania. The time has come to return these lands to our state. Latvia is unlikely to be able to resist us."
 BLR_legacy_kurland: "Legado del Ducado de Curlandia"
 BLR_legacy_kurland_desc: "The Duchy of Courland once reached out in the race of colonization. The flag of the Duchy once flew over Trinidad and Tobago and along the coast of Gambia. As the rightful successors of the Duchy, the time has come to seek the return of these territories to our empire and bring these former colonial holdings back into the fold."
 BLR_pro_poland_propoganda: "Pro-Belarusian Propaganda in Poland"
 BLR_pro_poland_propoganda_desc: "We must increase our influence in Poland through propaganda and other means of interaction."
 BLR_Dismiss_soviet_officers: "Dismiss Pro-Soviet Officers"
 BLR_Dismiss_soviet_officers_desc: "The fight against the Soviet legacy should also extend to the army. We do not need generals who sympathize with that bloody regime."
 BLR_Anti_corruption_law: "Ley Anticorrupción"
 BLR_Anti_corruption_law_desc: "We will fight corruption in all its manifestations."
 BLR_open_border_with_pol: "Apertura de Fronteras"
 BLR_open_border_with_pol_desc: "La apertura de las fronteras ayudará a que nuestros pueblos se sientan conectados no solo económicamente, sino también físicamente."
 BLR_training_for_pol: "Ejercicios militares conjuntos"
 BLR_training_for_pol_desc: "Our armies need combat coordination. Joint military exercises will help greatly with this."
 BLR_Asseco_Poland: "Asseco Polonia"
 BLR_Asseco_Poland_desc: "We will buy out this company and make it the property of our future state of Belarusians and Poles."
 BLR_ynia_Poland: "La Segunda Unión de Lublin"
 BLR_ynia_Poland_desc: "It is time to remember how humiliating the Union of Lublin was for the Grand Duchy of Lithuania. This time, it will be different."
 BLR_Ukraine_way: "Amistad con Ucrania"
 BLR_Ukraine_way_desc: "Despite our territorial claims, we are ready to conduct a dialogue with Ukraine against common enemies. It may be possible to create an alliance that will help our states survive when surrounded by opponents."
 BLR_Join_GUAM_to_Ukraine: "Unirse a GUAM"
 BLR_Join_GUAM_to_Ukraine_desc: "One of our first friendly steps toward Ukraine will be joining GUAM, an organization where Ukraine plays a leading role."
 BLR_training_with_ukr: "Ejercicios militares conjuntos"
 BLR_training_with_ukr_desc: "We are ready to propose to the Ukrainian army joint exercises to practice maneuvers and coordinate troops."
 BLR_military_coop_with_ukraine: "Cooperación militar-tecnológica"
 BLR_military_coop_with_ukraine_desc: "We are ready to establish military-technical cooperation with the Ukrainian military-industrial complex."
 BLR_Intermarium: "Intermarium"
 BLR_Intermarium_desc: "It is time for us to unite with Ukraine in a powerful alliance to confront our enemies together."
 BLR_Intermarium_poland: "Intermarium"
 BLR_Intermarium_poland_desc: "It is time for us to unite with Poland in a powerful alliance to confront our enemies together."
 BLR_Ukraine_enemy: "Aprovechar las tierras ucranianas"
 BLR_Ukraine_enemy_desc: "Historically, these lands belonged to the Grand Duchy of Lithuania. No false ties of friendship should prevent us from returning them to our great state."
 BLR_Sovereign_Internet: "Internet soberano"
 BLR_Sovereign_Internet_desc: "Debemos hacer que nuestro espacio de Internet sea completamente independiente de otros países para que no puedan influir en nuestros ciudadanos."
 BLR_Expand_Mozyr_Refinery: "Expandir la Refinería de Petróleo de Mozyr"
 BLR_Expand_Mozyr_Refinery_desc: "We will expand this oil refinery."
 BLR_Belshina: "JSC Belshina"
 BLR_Belshina_desc: "JSC Belshina is a manufacturer of automobile tires. It produces tires for passenger cars, trucks, heavy-duty vehicles, road construction and lifting vehicles, electric vehicles, buses, tractors and agricultural machinery."
 BLR_Expand_Naftan_Refinery: "Expandir la Refinería de Petróleo de Naftan"
 BLR_Expand_Naftan_Refinery_desc: "We will expand this oil refinery."
 BLR_Expansion_Okolovsky_Novoselkovsky: "Expansión de la producción de minerales en los yacimientos de Okolovsky y Novoselkovsky"
 BLR_Expansion_Okolovsky_Novoselkovsky_desc: "Expansion of ore production from the Okolovsky and Novoselkovsky deposits will bring us a lot of steel."
 BLR_Problem_duying_vilages: "Problema de los pueblos en declive"
 BLR_Problem_duying_vilages_desc: "It is time for our state to decide what to do with dying villages."
 BLR_Economic: "Economía bielorrusa"
 BLR_Economic_desc: "We need to develop our economy, and we are taking a number of measures to successfully achieve this."
 BLR_metro_minsk: "Ampliación del metro de Minsk"
 BLR_metro_minsk_desc: "We will improve and expand the Minsk metro to improve the logistical characteristics of the city."
 BLR_it_industries_help: "Help Domestic IT Developers"
 BLR_it_industries_help_desc: "It is necessary to support our IT sector with everything we can — this is the future of our country."
 BLR_viber: "Viber"
 BLR_viber_desc: "Viber es una aplicación de mensajería que permite enviar mensajes, realizar llamadas de voz y video a través de Internet. Viber tiene la capacidad de enviar mensajes de texto, voz y video, documentos, imágenes, videos y archivos, así como funcionar sin conexión a Internet. Promover el uso de Viber en nuestro país puede mejorar la comunicación y conectividad de nuestros ciudadanos."
 BLR_wot: "Mundo de tanques"
 BLR_wot_desc: "World of Tanks es un juego en línea masivo multijugador dedicado a vehículos blindados de mediados del siglo XX. Los jugadores tienen a su disposición más de 40 mapas de batalla creados en base a ubicaciones reales de la Segunda Guerra Mundial, y equipos históricos de 11 naciones con un total de más de 600 unidades. Promover y apoyar juegos como World of Tanks puede fomentar el desarrollo de la industria del entretenimiento digital en nuestro país."
 BLR_russian_gazprom: "Gazprom"
 BLR_russian_gazprom_desc: "Gazprom is an important player in the gas and oil market. We must establish the closest possible cooperation with them."
 BLR_BPS_Sberbank: "BPS Sberbank"
 BLR_BPS_Sberbank_desc: "BPS Sberbank es una sucursal del Sberbank ruso en nuestro territorio. Establecer una sólida cooperación con BPS Sberbank puede fortalecer nuestro sistema bancario y promover el desarrollo económico en el país."
 BLR_Belgazprombank: "lgazprombank"
 BLR_Belgazprombank_desc: "Belgazprombank es una sucursal de Gazprombank en Bielorrusia. La cooperación con Belgazprombank puede fortalecer nuestros lazos económicos con Rusia y promover el desarrollo de proyectos conjuntos en diversos sectores."
 BLR_Development_domestic_tourism: "Desarrollo del turismo nacional"
 BLR_Development_domestic_tourism_desc: "Vemos un fuerte potencial en el turismo interno. En este sentido, cada diputado contribuirá al desarrollo del turismo en su distrito. La tarea principal es crear una infraestructura adecuada y promover los atractivos turísticos de nuestro país para atraer a visitantes nacionales y extranjeros."
 BLR_private_railways: "Empresas ferroviarias privadas"
 BLR_private_railways_desc: "We will transfer the railways to private companies."
 BLR_Lith_pol_railways: "Conexión ferroviaria con Polonia y Lituania"
 BLR_Lith_pol_railways_desc: "We intend to build a high-quality railway connection with these countries, which will give us access to European goods."
 BLR_JSC_russian_railways: "Ferrocarriles rusos"
 BLR_JSC_russian_railways_desc: "We are now fully integrated with Russian Railways."
 BLR_belavia: "Belavia"
 BLR_belavia_desc: "Belavia es la aerolínea estatal bielorrusa con sede en Minsk. Se formó en 1996 y opera vuelos internacionales regulares y chárter desde el Aeropuerto Nacional de Minsk. Promover y fortalecer a Belavia puede mejorar nuestra conectividad aérea, atraer más turistas y estimular el desarrollo económico en el sector de la aviación."
 BLR_Danone: "Danone"
 BLR_Danone_desc: "Empresa alimentaria francesa, reconocida fabricante de productos lácteos y otros productos alimentarios."
 BLR_Godel_tech: "Tecnologías Gödel"
 BLR_Godel_tech_desc: "Empresa británica que proporciona soluciones de desarrollo de software a empresas líderes del Reino Unido con sede en Manchester. Promover la colaboración con Godel Technologies puede impulsar el crecimiento de la industria de tecnología de la información en nuestro país y fomentar la transferencia de conocimientos y tecnología."
 BLR_Basf_tech: "BASF Sociedad Europea"
 BLR_Basf_tech_desc: "BASF Societas Europaea es la mayor empresa química de Alemania, Europa y el mundo. Tiene su sede en la ciudad de Ludwigshafen en Renania-Palatinado, en el suroeste de Alemania. La colaboración con BASF puede brindar oportunidades de inversión, transferencia de tecnología y desarrollo conjunto en el sector químico y de materiales en Bielorrusia."
 BLR_royal_dutch_shell: "Royal Dutch Shell"
 BLR_royal_dutch_shell_desc: "Shell is a British-Dutch oil and gas company."
 BLR_mts: "MTS"
 BLR_mts_desc: "MTS is a Russian company providing telecommunications services, digital and media services in Russia, Armenia and Belarus under the trademark \"MTS\". The company provides cellular communication services (in UMTS (3G), 4G, LTE and 5G standards), wired telephone services, broadband Internet access, mobile television, cable television, satellite television, digital television, media and entertainment content services, financial services, as well as convergent IT solutions in the field of the Internet of Things, monitoring, process automation, data processing and cloud computing."
 BLR_belarus_support_category: "Tropas auxiliares de Bielorrusia"
 BLR_ter_oboronaup_start: "Llamado a tropas de defensa territorial"
 BLR_internalup_start: "Convocatoria para la creación de una tercera brigada especial independiente"
 BLR_whitelegion_battalion_category: "Legión Blanca"
 BLR_whitelegion_battalion_category_desc: "The White Legion is a sports and patriotic Belarusian organization that was transformed into a military one. The White Legion appeared in the early 1990s and maintained order at opposition meetings and rallies. Its members were trained as special forces, earning a steel beret analogous to the crimson one. They were given in-depth knowledge of the history of Belarus."
 BLR_white_legion_battalion_create: "Crea un Batallón de la Legión Blanca"
 BLR_white_legion_recruit_youngfront: "Recluta graduados del Frente Joven"
 BLR_white_legion_recruit_people: "Reclutar ciudadanos leales"
 BLR_white_legion_recruit_revansh: "Reclutar miembros de la organización \"Praviy Revansh\""
 BLR_white_legions_TT: "¡El número de reclutas cambiará en §Y[?modify_white_legion]§!\n"
 BLR_whitelegion_recruit_2000: "El número de reclutas disponibles es 2000."
 BLR_pol_revol_category: "Llevar al poder a los nacionalistas que necesitamos en Polonia"
 BLR_pol_revol_category_desc: "We must take revenge on Poland for all the years it attempted to destroy our independence, for the humiliating Union of Lublin, and for the division of our country in the 20th century. We will put the Polish people in a position where they will have no choice but to obey us."
 BLR_Establish_cooperation_pol: "Establecer lazos con los nacionalistas polacos"
 BLR_podlasie_return: "Recuperar Bialystok para Bielorrusia"
 BLR_podlasie_return_desc: "Bialystok has always been a land inhabited by Belarusians. It is time to reclaim this land from the Poles and return it to the Belarusian state."
 BLR_Duchy_claims_category: "Reclamaciones territoriales"
 BLR_Duchy_claims_category_desc: "We well remember the history of the Grand Duchy of Lithuania and all the lands that were under its command. We will declare our territorial claims over all our former territories."
 BLR_ukraine_claims: "Reclamaciones territoriales a §Y[UKR.GetNamewithFlag]§!"
 BLR_poland_claims: "Reclamaciones territoriales a §Y[POL.GetNamewithFlag]§!"
 BLR_russia_claims: "Reclamaciones territoriales a §Y[SOV.GetNamewithFlag]§!"
 BLR_latgale_claims: "Reclamaciones territoriales a §Y[LAT.GetNamewithFlag]§!"
 BLR_samogitia_return: "Integración de Samogitia"
 BLR_sudovia_return: "Integración de Sudovia"
 BLR_klaipeda_return: "Integración de Klaipeda"
 BLR_latgale_return: "Integración de Latgale"
 BLR_Litva_belarusizations_category: "Integration of New Lands"
 BLR_Litva_belarusizations_category_desc: "The lands of Lithuania have fallen under our control. Integration of these new lands and territories is an absolute must else we will not be able to maintain permanent control over the region."
 BLR_Lukashenko_category: "El gobierno de Lukashenko"
 BLR_Lukashenko_category_desc: "El gobierno de Lukashenko es claramente autoritario y busca solo un objetivo: permanecer en el poder a cualquier costo.\n§W--------------§!\nEn este momento, el porcentaje de apoyo a Alexander Grigoryevich Lukashenko es igual a §Y[?BLR.batka]§!"
 BLR_send_russian_omon: "Solicitar la intervención de la policía antidisturbios rusa para reprimir las protestas"
 BLR_go_to_jail_scum: "Enviar a los opositores a la cárcel"
 BLR_trade_with_iraq: "Proporcionar armas a Irak"
 BLR_fly_protasevich: "Aterrizar un avión de Ryanair con Protasevich a bordo"
 BLR_Deal_with_Poland: "Tratar con la Unión de Polacos"
 BLR_belorusisation_sudovia: "Bielorrusización de Sudovia"
 BLR_belorusisation_klaipeda: "Bielorrusización de Klaipeda"
 BLR_belorusisation_samogitia: "Bielorrusización de Samogitia"
 BLR_people_militia: "Militia Popular"
 BLR_people_militia_desc: "Pero la situación no es fácil. He dicho más de una vez: cada hombre (y no solo un hombre) debería poder manejar armas, al menos para proteger a su familia, su hogar, su rincón nativo de la tierra y, si es necesario, al país, sin el cual no habrá rincón, no habrá hogar, nada más. Muchas personas entienden esto"
 BLR_Kommunarka_category: "Fábrica Kommunarka"
 BLR_Kommunarka_category_desc: "Now that we have fully nationalized the factory, we will be able to receive full income from it."
 BLR_Go_to_Russia: "Comenzar a vender productos en Rusia"
 BLR_Go_to_Latvia: "Comenzar a vender productos en Letonia"
 BLR_Go_to_Kazakhstan: "Comenzar a vender productos en Kazajistán"
 BLR_Go_to_Georgia: "Comenzar a vender productos en Georgia"
 BLR_Go_to_Moldova: "Comenzar a vender productos en Moldavia"
 BLR_Go_to_Armenia: "Comenzar a vender productos en Armenia"
 BLR_Produst_all_CIS: "Comenzar a vender productos en la mayoría de los países de la CEI"
 BLR_mtz: "Planta de tractores de Minsk"
 BLR_mtz_desc: "A factory in Belarus and a manufacturer of agricultural machinery. Minsk Tractor Plant was founded on May 29, 1946. The plant's capacity is designed for the production of 71,000 tractors of various series."
 BLR_Tracktor_category: "Planta MTZ"
 BLR_Tracktor_category_desc: "La Planta de Tractores de Minsk es una planta en Bielorrusia, fabricante de maquinaria agrícola. La Planta de Tractores de Minsk desarrolla y fabrica tractores de ruedas y orugas, motoazadas, herramientas remolcadas y suspendidas para trabajos agrícolas, de construcción, forestales y municipales, piezas de repuesto, bienes de consumo, organiza su producción sobre una base de licencia, presta servicios para el establecimiento y la realización de servicios.\n\n\n                                                   -§YNúmero de tractores disponibles§! §G[?BLR.tracktors]§! - "
 BLR_start_tracktor: "Empecemos a montar el tractor \"Bielorrusia\""
 BLR_tracktor_engine: "Instalación del motor D-245.5"
 BLR_tracktor_trans: "Instalar la transmisión"
 BLR_tracktor_hydraulic: "Instalar el sistema de suspensión hidráulica"
 BLR_tracktor_kabina: "Ensamblar la cabina del tractor"
 BLR_tracktor_final: "Conjunto completo de tractor"
 BLR_tracktor_build: "Producir nuevos tractores"
 BLR_tracktor_holding: "Establecer MTZ Holding"
 BLR_tracktor_export_rus: "Vender tractores a [SOV.GetNamewithFlag]"
 BLR_tracktor_export_ukr: "Vender tractores a [UKR.GetNamewithFlag]"
 BLR_tracktor_export_aze: "Vender tractores a [AZE.GetNamewithFlag]"
 BLR_tracktor_export_pak: "Vender tractores a [PAK.GetNamewithFlag]"
 BLR_tracktor_export_kaz: "Vender tractores a [KAZ.GetNamewithFlag]"
 BLR_tracktor_export_rom: "Vender tractores a [ROM.GetNamewithFlag]"
 BLR_tracktor_export_cub: "Vender tractores a [CUB.GetNamewithFlag]"
 BLR_tracktor_export_raj: "Vender tractores a [RAJ.GetNamewithFlag]"
