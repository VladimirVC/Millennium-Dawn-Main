 VTB.Nat_Fascism_desc: "国家ボリシェヴィキ、エドゥアルド・リモノフの支持者たちは、1994年以来ベラルーシで活動している政治運動である。現代の国家ボリシェヴィズムは、国家と社会の正義の思想と国民の自由の要求を組み合わせた柔軟なイデオロギーである。国家ボリシェヴィキにとって、我々の祖国は福祉国家であり、国民の権利に基づく自由な国と同義である。"
