 TRI.Nat_Autocracy_desc: ""
 TRK.liberalism: "£TRK_western_liberal (TRP) Republican Party of Turkmenistan"
 TRK.liberalism_desc: "(Reformist Liberalism) - Republican Party of Turkmenistan (Turkmen: Turkmenistanyn Respublikan Partiyasy)\n\nThe Republican Party of Turkmenistan is one of several dissident political parties that have been outlawed within Turkmenistan. Leaders of the exile-based RPT include Nurmuhammet Hanamow who went into exile in 2002 and Annadurdy Hajyyew, whose sister Ogulsapar Myradowa died in a Turkmen prison in September 2006. The latest opposition party, RPT operates in exile - since all opposition is banned within Turkmenistan, it was forced to form and operate from abroad."
 TRK.socialism: "£TRK_western_social_democrat (TZB) Women's Union of Turkmenistan"
 TRK.socialism_desc: "(Pragmatic Social Democracy) - Women's Union of Turkmenistan (Turkmen: Zenanlar Birlesigi)\n\nThe Women's Union of Turkmenistan (TZB; Turkmen: Turkmenistanyn zenanlar birlesigi) is a mass women's organization in Turkmenistan. For a long time, Women's Union was the only women organization permitted in the country. Advocating for women's rights, this organization appeared as a non-governmental organization, but in reality, Women's Union was closely linked and controlled by the government."
 TRK.Western_Autocracy: "£generic_Western_Autocracy_small (TUDF) トルクメニスタン民主勢力連合"
 TRK.Western_Autocracy_desc: "民主派保守主義 - トルクメニスタン民主勢力連合（トルクメン語ローマ字表記：Turkmen demokratik guclerinin birlesigi）\n\nトルクメニスタン民主勢力連合は、2003年11月23日にオーストリアのウィーンで結成されたトルクメニスタンの政党である。（当初の合意は9月29日に成立した）創設メンバーには、元外務大臣のアウディ・クリエフ、元トルコ大使のヌルムハメット・ハナモフ、元中央銀行総裁のフダイベルディ・オラゾフ、元農業副大臣のサパルミラト・イクリモフらが名を連ねている。"
 TRK.Communist-State: "£generic_Communist_State_small (CPT) Communist Party of Turkmenistan"
 TRK.Communist-State_desc: "(Marxism-Leninism) - The Communist Party of Turkmenistan (Turkmen: Kommunistik Partiyasy)\n\nThe Communist Party of Turkmenistan (Russian: Kommunisticheskaya partiya Turkmenistana; Turkmen: Turkmenistanyn Kommunistik Partiyasy) is a division of the Communist Party of the Soviet Union and the ruling Communist party of the Turkmen Soviet Socialist Republic."
 TRK.Conservative: "£TRK_emerging_reactionary (MAYG) トルクメニスタン・マフティムグリ青年組織"
 TRK.Conservative_desc: "ナショナリズム - トルクメニスタン・マグティムグリ青年組織（トルクメン語ローマ字表記：Magtymguly adyndaky Yashlar guramasy）\n\nトルクメニスタン・マグティムグリ青年組織は、トルクメニスタンで登録された社会・政治団体である。同組織は、第6期（2013年～2018年）のトルクメニスタン・メジリス（議会）において議席を有していた。この組織は非政府組織（NGO）のような外観を呈しているものの、実際にはマグティムグリ青年組織は政府と密接に結びつき、政府によって統制されていた。"
 TRK.anarchist_communism: "£TRK_anarchist_communism (KAG) Organisation of Trade Unions of Turkmenistan"
 TRK.anarchist_communism_desc: "(Left Social Democracy) - Organisation of Trade Unions of Turkmenistan (Turkmen: Kardeshler arkalashyklary guramasy)\n\nThe Organisation of Trade Unions of Turkmenistan (Turkmen: Turkmenistanyn kardeshler arkalashyklary guramasy), officially the National Center of Trade Unions of Turkmenistan (TKAMM; Turkmen: Turkmenistanyn Kardeshler arkalashyklerinin Milli merkezi), is an officially registered social organization in Turkmenistan, uniting trade unions in the country. It was represented in the 2013–2018 Assembly of Turkmenistan. Members of the organization held 33 out of 125 seats in the Mejilis."
 TRK.Neutral_conservatism: "£TRK_non_aligned_conservative (STP) Party of Industrialists and Entrepreneurs"
 TRK.Neutral_conservatism_desc: "(Oligarchism) - Party of Industrialists and Entrepreneurs (Turkmen: Senagatchylar we Telekechiler Partiyasy)\n\nThe Party of Industrialists and Entrepreneurs (STP) (Turkmen: Senagatchylar we Telekechiler Partiyasy) is a political party in Turkmenistan. The party was founded on 21 August 2012 and is the first legal opposition party in the country. The party is led by Saparmurat Ovganov."
 TRK.neutral_Social: "£TRK_non_aligned_socialist_democrat (AP) Agrarian Party of Turkmenistan"
 TRK.neutral_Social_desc: "(Agrarianism) - The Agrarian Party of Turkmenistan (Turkmen: Agrar Partiyasy)\n\nAgrarian Party of Turkmenistan (Turkmen: Turkmenistanyn agrar Partiyasy) is a political party in Turkmenistan. It was founded on September 28, 2014. The Agrarian Party of Turkmenistan is one of three officially registered political parties legally present in Turkmenistan and is represented in the Parliament of Turkmenistan."
 TRK.Neutral_Autocracy: "£TRK_non_aligned_autocracy (TDP) トルクメニスタン民主党"
 TRK.Neutral_Autocracy_desc: "保守独裁体制 - トルクメニスタン民主党（トルクメン語ローマ字表記：Demokratik Partiyasy）\n\nトルクメニスタン民主党は、トルクメニスタンの政党である。同党は1991年12月16日に結成され、トルクメニスタン共産党に取って代わった。2010年に他の政党が合法化されるまで、国内で唯一の政党であった。"
 TRK.Nat_Autocracy: "£TRK_nationalist_military_junta トルクメニスタン軍"
 TRK.Nat_Autocracy_desc: "民族主義的軍事政権 - 1992年に組織されたトルクメニスタン軍は、ソ連崩壊後に残されたソ連の装備や人員を大幅に引き継いだ。トルクメニスタンは中立を公式な立場としているため、トルクメニスタン軍が国外で展開した作戦はほとんどない。また、与党であるトルクメニスタン民主党による権力の強力な掌握が、軍による与党勢力への忠誠と服従を確固たるものにする一因となっている。"
