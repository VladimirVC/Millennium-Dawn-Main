 ELS.socialism: "£generic_socialism_small Cambio Democratico (CD)"
 ELS.socialism_desc: ""
 ELS.Conservative: "£generic_Conservative_small (PAN) 国民行動党"
 ELS.Conservative_desc: ""
 ELS.anarchist_communism: "£generic_anarchist_communism_small Farabundo Marti National Liberation Front (FMLN)"
 ELS.anarchist_communism_desc: ""
 ELS.Neutral_conservatism: "£generic_Neutral_conservatism_small （ARENA）民族主義共和同盟"
 ELS.Neutral_conservatism_desc: ""
 ELS.neutral_Social: "£generic_neutral_Social_small Centro Democratico Unido (CDU)"
 ELS.neutral_Social_desc: ""
 ELS.Neutral_Autocracy: "£generic_Neutral_Autocracy_small (PCN) 国民協調党"
 ELS.Neutral_Autocracy_desc: ""
 ELS.Nat_Autocracy: "£generic_Nat_Autocracy_small エルサルバドル軍"
 ELS.Nat_Autocracy_desc: ""
 ERI.anarchist_communism: "£ERI_anarchist_communism （PFDJ）民主正義人民戦線"
 ERI.anarchist_communism_desc: "（左翼エリトリア・ナショナリスト）\n民主正義人民戦線（ティグリニャ語ローマ字表記:Hizbawi Ginbar n'Demokrasen Fithi'en）\n\n民主正義人民戦線（PFDJ）はエリトリア人民解放戦線（EPLF）の後継政党である。独立戦争中、EPLFは新興国の政治機構において急成長する勢力となり、はるかに穏健なELFを容易に凌駕した。1993年に開催された国民投票の形で独立が公式になった後、EPLFは正当な政党に改革され、1994年に民主正義人民戦線として知られるようになった。"
 ERI.neutral_Social: "£ERI_neutral_social （SAGEM）エリトリア解放人民民主戦線"
 ERI.neutral_Social_desc: "（中道アフリカ社会主義-エリトリア解放人民民主戦線（アラビア語ローマ字表記:Jabhat Al-Shabiya Al-Dimuqratiya Li-Tahrir Iritrea）\n\nSAGEMという略称で知られる同党は、エリトリア独立戦争中はEPLFと同盟を結んでいた。この関係は長くは続かず、結果的にSAGEMは追放された。彼らは、部族の所属に沿った連邦化という視点を共有するTPLF内に同盟者を持ち、同時に前述の部族団体の代表者で構成される中央政府を維持している。"
 EST.conservatism: "£EST_conservatism (I) 祖国党"
 EST.conservatism_icon: "£EST_conservatism"
 EST.conservatism_desc: "国民保守主義 - 祖国党（エストニア語：Isamaa Erakond）\n\n 祖国党はエストニアのキリスト教民主主義・国民保守主義政党である。同党は社会的に保守的、経済的に自由主義的という複数の価値観を掲げている。また党名「祖国党」が示すように、エストニアにおけるナショナリズムを訴求している。"
 EST.liberalism: "£EST_western_liberal (RE) エストニア改革党"
 EST.liberalism_desc: "自由改革主義 - エストニア改革党（エストニア語：Eesti Reformierakond）\n\n REは自由主義政党であり、「リス党」の通称で知られている。中道から中道右派に位置付けられ、保守的自由主義、自由主義的保守主義、古典的自由主義、自由主義などと形容されることが多い。一貫して経済的自由主義と財政保守主義の政策を提唱している。国内で新自由主義を掲げる主要政党であり、他党と比べて独自性を有する複数の政策を支持している。"
 EST.socialism: "£EST_western_social_democrat (SDE) 社会民主党"
 EST.socialism_desc: "社会民主主義 - 社会民主党（エストニア語：Sotsiaaldemokraatlik Erakond）\n\n SDEはエストニアの中道左派政党である。同党は主に社会民主主義の原則を志向し、欧州連合加盟の熱心な支持者であり、極めて親欧米的である。また、社会市場経済モデル、社会的公正、国内における強力な福祉国家の確立にも取り組んでいる。"
 EST.oligarchism: "£EST_oligarchic (EK) エストニア中央党"
 EST.oligarchism_icon: "£EST_oligarchic"
 EST.oligarchism_desc: "中道ポピュリズム - エストニア中央党（エストニア語：Eesti Keskerakond）\n\n EKは社会自由主義的ポピュリズム政党であり、社会自由主義を掲げ、社会市場経済を支持する。ロシア語話者層の主要な政治的基盤であり、中道・中道左派・左派ポピュリストと評されることが多い。主な目標は強固な中産階級の形成と左傾政策の確立にあるが、党員の個人差に基づきイデオロギー的指向は流動的である。"
 EST.anarchist_communism: "£EST_anarchist_communism (EVP) エストニア左派党"
 EST.anarchist_communism_desc: "民主社会主義 - エストニア左派党（エストニア語: Eesti Vasakpartei）\n\n EVPはエストニア共産党の元党員によって結成された左派社会主義政党で、旧エストニア共産党に類似した、かなり一貫した民主社会主義政策を掲げている。1990年から登録政党として活動し、二度の改名を経ているが、エストニア政治において依然として小規模な勢力である。"
 EST.Neutral_conservatism: "£EST_neutral_conservatism (EEKD) エストニア・キリスト教民主党"
 EST.Neutral_conservatism_desc: "キリスト教保守主義 - エストニア・キリスト教民主党（エストニア語: Erakond Eesti Kristlikud Demokraadid）\n\n EEKDはキリスト教保守政党であり、欧州憲法に反対し、エストニアのEU加盟に反対運動を展開した。同党は欧州キリスト教政治運動のメンバーである。"
 EST.Neutral_green: "£EST_neutral_greens (EER) エストニア緑の党"
 EST.Neutral_green_desc: "環境主義 - エストニア緑の党（エストニア語：Erakond Eestimaa Rohelised）\n\n EERはエストニアの緑の党であり、環境に優しい経済の構築、民主主義的価値観の確立、経済的に効率的な政策を重視している。科学に基づく強力な政策を支持し、意思決定プロセスに研究者を関与させるとともに、国内政策を決定するための客観的な指標を提供している。さらに、定期的な国民投票に基づく直接民主制の実施に注力し、全閣僚に対する修士号取得の最低要件を支持している。"
 EST.Nat_Autocracy: "£EST_military_junta (K) エストニア防衛連盟"
 EST.Nat_Autocracy_desc: "軍国主義 - エストニア防衛連盟（エストニア語：Kaitseliit）\n\nエストニア防衛連盟は、エストニア共和国国防省の管理下にある、自発的な国民防衛準軍事組織である。エストニア国家の保全と独立、およびその領土の完全性を保証することを目的としている。同組織は、山火事消火活動などの民間支援、警察補助要員としてのボランティア活動、国内各地での各種イベントにおける安全確保など、多様な役割を担っている。"
 EST.Nat_Fascism: "£EST_Nat_Fascism_2000 (EIP) エストニア独立党"
 EST.Nat_Fascism_desc: "エストニア民族主義 - エストニア独立党（エストニア語：Eesti Iseseisvuspartei）\n\n EIPはエストニアの極右民族主義政党である。新自給自足型地政学的空間の教義を推進し、東西間で地政学的に中立を保つ。党綱領ではエストニアが天然資源に極めて恵まれていると主張し、強いユーロ懐疑主義を掲げている。"
 EST.Nat_Populism: "£EST_national_populsm (ERL) エストニア人民連合"
 EST.Nat_Populism_desc: "保守農業主義 - エストニア人民連合（エストニア語：Eestimaa Rahvaliit）\n\n ERLは農業政策を主軸とし、社会民主主義とポピュリズムの影響を受けた農業社会保守政党である。その結果、農村政策と政治に重点を置いたため、大都市や町での支持獲得には失敗した。"
 ETH.liberalism: "£ETH_western_liberal 民主主義と正義のための統一"
 ETH.liberalism_desc: ""
 ETH.Communist-State: "£ETH_emerging_communism （WPE）エチオピア労働者党"
 ETH.Communist-State_desc: "(Marxism-Leninism)\nWorkers' Party of Ethiopia, (Amharic, romanised: Ye'Ityopia Serategnoch Parti)\n\nOnce the sole legal party of the People's Democratic Republic of Ethiopia, in 1991, this came to an end. But that was not the end of the party's existence, many of its most prominent members fled the civil strife that followed."
 ETH.anarchist_communism: "£ETH_left_wing_radical （EPRDF）エチオピア人民革命民主戦線"
 ETH.anarchist_communism_desc: "(Poly-Ethnic Nationalist)\nEthiopian People's Revolutionary Democratic Front, (Amharic, romanised: Ye'Ītiyop'iya Hizibochi Ābiyotawī Dīmokirasīyawī Ginibari)\n\nThey are less of a political party and moreso a political bloc, with members of the EPRDF subscribing to the overarching message of Ethnic Federalism, albeit with a healthy sprinkling of Socialism, Marxism-Leninism and even some Hoxhaist sentiments.\n\nDuring the Ethiopian civil war, the EPRDF fought against the Derg, and then the WPE. After the collapse of the PDRE and subsequently the WPE, the EPRDF gained support from Western allies and heavily moderated their ideals, embracing what has been termed as 'Revolutionary Democracy', though many still believe that the EPRDF are masking their true beliefs of Marxism-Leninism."
 ETH.Neutral_conservatism: "£ETH_non_aligned_autocracy （EDP）- エチオピア民主党"
 ETH.Neutral_conservatism_desc: "(Conservative Liberals)\nEthiopian Democratic Party, (Amharic, romanised: Ye'Ītiyop'iya Dēmokirasīyawī Paritī)\n\nThe result of the merging of no less than five liberal and conservative liberal parties. The party originates from the Ethiopian Democratic Union in 1974 who sought to fight against the Derg military dictatorship as part of a monarchist resistance movement."
 ETH.neutral_Social: "£generic_neutral_Social_small エチオピア・ソマリア人民民主党"
 ETH.neutral_Social_desc: ""
 ETH.Nat_Autocracy: "£ETH_nationalist_military_junta (ENDF) エチオピア国防軍"
 ETH.Nat_Autocracy_desc: "軍部\nエチオピア国防軍（アムハラ語ローマ字表記：Ye'Īfēdērī Mekelakeya Šerawīt）\n\n現在の国防軍は1996年から現役として活動しているが、その起源はアドワの戦いおよびその後の1907年の「公式」な創設にまで遡ることができる。アフリカ分割の時代において、エチオピアが独立を維持できたのはこの戦闘部隊のおかげであり、独立を維持できた唯一のアフリカ国家であった。"
 ETH.Monarchist: "£ETH_nationalist_monarchist (HoS) ソロモン朝"
 ETH.Monarchist_desc: "君主制\nソロモン朝（アムハラ語ローマ字表記:Yeselemonawī Širiwe Menigišiti）\n\n世界で最も長く続く王朝の一つかつ、アフリカで最も長く続く王朝であり、1270年から1975年に強制的に廃止されるまで、合計705年間統治した。この王朝はソロモン王自身の治世にまで遡ると主張する者もおり、この聖書の人物との近接性が、主にカリブ海を拠点とするラスタファリ運動の主な原因である。"
 FIJ.conservatism: "£FIJ_western_conservative Fijian Association Party (FAP)"
 FIJ.conservatism_desc: "The FAP was founded in 1994 by Josefata Kamikamica, head of the Native Land Trust Board and a former Minister of Finance. Following the parliamentary election of 1992, Kamikamica and five of his supporters had left the Soqosoqo ni Vakavulewa ni Taukei of Sitiveni Rabuka and unsuccessfully challenged him for the Prime Ministership, attempting to build a coalition government with the Indo-Fijian opposition. The party won five seats in the general election of 1994, which was called three years early because of political instability. Following Kamikamica's death from cancer in 1996, Ratu Finau Mara (the son of then-President Ratu Sir Kamisese Mara) took over the leadership. In 1998, he was replaced by Adi Kuini Speed, the widow of former Fiji Labour Party (FLP) Prime Minister Timoci Bavadra, who had been deposed in a coup led by Rabuka, then a lieutenant colonel in the army, in 1987. Speed joined the FAP in 1995 after falling out with her late husband's party over the direction in which Mahendra Chaudhry, the new leader, was taking it."
 FIJ.liberalism: "£FIJ_western_liberal Soqosoqo ni Vakavulewa ni Taukei (SVT)"
 FIJ.liberalism_desc: "The Soqosoqo ni Vakavulewa ni Taukei (SVT), occasionally known in English as Fijian Political Party, was a party which dominated the politics of Fiji in the 1990s and was the mainstay of coalition governments from 1992 to 1999."
 FIJ.socialism: "£FIJ_socialism フィジー労働党"
 FIJ.socialism_desc: "By 1985, the people of Fiji were yearning for a third force in Fiji politics, as the opposition National Federation Party (NFP) was again falling apart and the right-wing policies of the ruling Alliance Party had alienated it from the ordinary people. Dissatisfaction with Government policies had begun soon after the 1982 elections with a prolonged teachers' strike and a hunger strike by young graduates, who were longer guaranteed employment. In industrial disputes, the government sided with the employers. In November 1984, when the Government announced a wage freeze, instead of calling a national strike, the largest trade union in Fiji, the Fiji Public Service Association (FPSA), decided, in March 1985 by a margin of 2914 votes to 326 votes, to \"associate itself with any organisation, in pursuance of workers' rights.\" The Fiji Labour Party was launched on 6 July 1985 under the auspices of the Fiji Trades Union Congress, at the Fiji Teachers Association hall in Suva."
 FIJ.Nat_Autocracy: "£FIJ_nationalist_military_junta (RFMF) フィジー共和国軍"
 FIJ.Nat_Autocracy_desc: "フィジー軍は波乱に満ちた歴史を歩んできた。独立以来、文民政府は度重なるクーデターに見舞われ、軍内部も野心家たちの支配下に置かれてきたため、フィジー軍は同国の政治に深く関与してきた。とはいえ、これまでのところ、少なくとも同軍が共和国の憲法を順守してきたという点こそが最大の支えとなっているようだが、この状況がいつまで続くのかが問題である。"
 FIJ.Nat_Populism: "£generic_Nat_Populism_small (NVTLP) 民族主義ヴァヌア・タコ・ラヴォ党"
 FIJ.Nat_Populism_desc: "民族主義ヴァヌア・タコ・ラヴォ党は1990年代後半、サケアシ・ブタドロカ率いるフィジー民族主義党と、イリエサ・ドゥヴロコ率いるヴァヌア・タコ・ラヴォ党が合併して結成された。両党首は現行憲法の採択に強く反対し、議会で可決された際には公の場でその憲法を焼却した。ブタドロカが述べたように、同党は「フィジーはフィジー人のためにあり、フィジー人の権利は常に守られるべきである」という公約を掲げて選挙運動を行った。"
