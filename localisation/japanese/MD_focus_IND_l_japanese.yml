 indonesia.57.t: "スラウェシで災害！"
 indonesia.57.d: "スラウェシに適切なインフラを建設できなかった失敗は、いくつかの建物が崩壊し、多くの国民が死亡する原因となった。"
 indonesia.57.a: "それは防げた！"
 indonesia.58.t: "西パプアで災害！"
 indonesia.58.d: "西パプアへの適切な管理提供失敗は、軍需工場の一つが崩壊する事件をもたらした。"
