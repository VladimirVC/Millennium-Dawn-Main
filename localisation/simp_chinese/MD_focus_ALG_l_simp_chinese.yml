 KBY_new_state: "柏柏尔人的土地"
 KBY_new_state_desc: "终于，这片土地真正的继承者——柏柏尔人，将把权力掌握在自己手中。"
 KBY_constitution: "卡比利亚宪法"
 KBY_constitution_desc: "我们必须正式确立国家立法体系。为此，我们将制定我们自己的宪法。"
 KBY_drs: "与情报与安全部合作"
 KBY_fsb_desc: "遗憾的是，我们目前还没有机会建立自己的特殊服务，因此我们将依靠与阿尔及利亚情报与安全部的合作。"
 KBY_mvd: "隶属于地方内务部"
 KBY_mvd_desc: "我们将使原先受法国控制的内政部地方机构服从于我们的控制。"
 KBY_ter_defence: "国土防御"
 KBY_ter_defence_desc: "我们将在地方民兵中选拔成立一支国土防御部队。"
 KBY_contract_army: "合同制军队"
 KBY_contract_army_desc: "我们的军队将根据合同制度组建。"
 KBY_defence_doctrine: "防守学说"
 KBY_defence_doctrine_desc: "我们没有攻击任何人，我们的任务是保卫边境。我们的军队将采取防御战术。"
 KBY_nat_guard: "卡比利亚国民警卫队"
 KBY_nat_guard_desc: "阿尔及利亚在上世纪80年代曾拥有一支国民警卫队。我们将重建这支部队，但它将完全由我们指挥。"
 KBY_defence_prom: "军事工业"
 KBY_defence_prom_desc: "我们将投入大量资金，恢复我国境内的军事工业。我们需要一支强大的军队。"
 KBY_rebuild_war_academy: "军事学院"
 KBY_rebuild_war_academy_desc: "我们的战士必须接受最好的训练，以保卫祖国。因此，我们将恢复我国境内的军事学院。"
 KBY_no_corrupt_military: "严厉打击军队腐败"
 KBY_no_corrupt_military_desc: "我们的军队还很年轻，因此消除军队中的腐败现象尚且要容易得多。"
 KBY_nation_quest: "民族问题"
 KBY_nation_quest_desc: "卡比利亚过去是、现在是、将来也永远是阿尔及利亚的一部分，这就是我们对民族问题的回答。"
 KBY_referendum: "关于卡比利亚命运的全民公投"
 KBY_referendum_desc: "我们必须决定国家何去何从的决定性时刻已经到来。是以自治共和国的形式成为俄罗斯联邦的一份子，还是选择成为俄罗斯的联盟国道路？"
 KBY_dinar: "第纳尔作为国家货币"
 KBY_dinar_desc: "第纳尔将成为我们的国家货币，这一点毋庸置疑。"
 KBY_corruption: "打击腐败"
 KBY_corruption_desc: "尽管我们的国家还很年轻，但贪官污吏已经在这里开始滋生。我们需要解决这个问题。"
 KBY_isr_invest: "以色列投资"
 KBY_isr_invest_desc: "以色列通过投资支持我们。"
 KBY_build_factories: "建设工厂"
 KBY_build_factories_desc: "国家需要工厂、工厂和大量工厂，我们将为人民提供所需的一切。"
 KBY_social_invest: "社会领域投资"
 KBY_social_invest_desc: "我们的公民应享有最优质的医疗设施，以及所有社会保障。"
 KBY_infrastructure: "基础设施投资"
 KBY_infrastructure_desc: "道路就是我们国家的血管。"
 KBY_fight_oligarch: "打击寡头"
 KBY_fight_oligarch_desc: "甚至在我们这个年轻的国家，都已经开始出现腐败的寡头，他们在战争大发横财。我们要解决掉他们。"
 KBY_it_invest: "信息技术投资"
 KBY_it_invest_desc: "我们将投资IT技术，促进我国的成功发展。"
 KBY_maloross_economy: "卡比利亚经济"
 KBY_maloross_economy_desc: "我们的经济措施将促进经济增长。"
 KBY_union_state: "联盟国"
 KBY_union_state_desc: "我们选择了联盟国家的道路"
 KBY_union_group_army: "部队联合编组"
 KBY_union_group_army_desc: "我们的士兵将成为联盟国部队联合编组的成员"
 KBY_union_group_economic: "联盟国的投资"
 KBY_union_group_economic_desc: "加入联盟国对我国经济产生了积极影响"
 KBY_union_health_social: "社会医疗领域合作"
 KBY_union_health_social_desc: "联盟国成员在社会和医疗领域积极合作"
 KBY_republic_rf: "我们属于阿尔及利亚"
 KBY_republic_rf_desc: "我们已成为阿尔及利亚的联盟共和国，如今我们的命运已与之紧密相连。"
 KBY_alg_regions: "与阿尔及利亚地区合作"
 KBY_alg_regions_desc: "我们将积极与阿尔及利亚其他地区合作。"
 KBY_fra_companies: "与法国公司合作"
 KBY_fra_companies_desc: "法国企业将成为我们的主要合作伙伴。"
 KBY_integrate_army: "并入阿尔及利亚军队"
 KBY_integrate_army_desc: "我们将使我们的军队达到阿尔及利亚军队的标准。"
 ALG_legacy_of_independence_war: "阿尔及利亚独立战争遗产"
 ALG_legacy_of_independence_war_desc: "反对法国殖民统治的斗争锻造了强烈的民族认同感与团结精神。这一持久遗产增强了我们的政治实力，加速了科研与现代化进程，并提升了阿尔及利亚的国际影响力。然而，意识形态的分歧和历史记忆仍在持续塑造国内舆论与对外关系。"
 ALG_recruitable_population_factor_pvda: "£manpower_texticon 适役人口"
 ALG_recruitable_population_factor_pvda_tt: "基础§Y净移民率§!：[?ALG_recruitable_population_factor_pvda_change|%+]"
 ALG_productivity_growth_modifier_pvda: "每月生产率增长"
 ALG_productivity_growth_modifier_pvda_tt: "每月生产率增长：[?ALG_productivity_growth_modifier_pvda_change|%+]"
 ALG_new_nobility_idea: "复兴贵族"
 ALG_new_nobility_idea_desc: "通过恢复贵族特权并建立忠诚的贵族阶层，巩固君主统治，以影响力和声望奖赏忠诚。"
 ALG_state_islam_idea: "伊斯兰国教"
 ALG_state_islam_idea_desc: "君主正式将伊斯兰教确立为国家指导原则，赋予乌理玛权力并将伊斯兰教法融入治理体系，但代价是牺牲了科学进步。"
 ALG_andalus_crusade_idea: "安达卢斯遗产"
 ALG_andalus_crusade_idea_desc: "收复安达卢西亚的梦想激励着哈里发国的事业，鼓舞着战士们，并为在伊比利亚半岛的扩张提供了合法性。"
 ALG_maghribi_identity_idea: "马格里布认同"
 ALG_maghribi_identity_idea_desc: "君主国推动了一种独特的马格里布认同，这种认同植根于共同的文化和团结，在加强稳定性的同时，也疏远了外国的影响。"
 ALG_maghribi_identity_idea_two: "真正的马格里布主义"
 ALG_maghribi_identity_idea_two_desc: "从摩洛哥到利比亚，马格里布地区在共同命运下团结一致。君主国体现了这一愿景，减少了外部干预，并将该地区紧密联系在一起。"
 ALG_renewed_nobility_idea: "骑士制度复兴"
 ALG_renewed_nobility_idea_desc: "王国骑士归来，作为忠诚的军事与政治精英受到尊崇。他们重获新生，既巩固了君主的掌控力，又降低了领导成本。"
 ALG_going_to_roots: "回归本源"
 ALG_going_to_roots_desc: "马格里布和安达卢西亚王朝都为阿尔及利亚的身份认同奠定了基础。通过接纳这些传统，我们将把过去与现在融合，形成国家统一的指导愿景。"
 ALG_state_islam: "伊斯兰国教"
 ALG_state_islam_desc: "宗教始终指引着阿尔及利亚人民。通过将伊斯兰教确立为君主国的基础，我们巩固了自身的合法性，赢得了乌理玛的支持，并增强了信众的团结。"
 ALG_restore_knighthood: "恢复骑士制度"
 ALG_restore_knighthood_desc: "在帝国时代，武士与贵族的骑士团曾守护我们的土地与信仰。我们将重建此类骑士团，以效忠王权，并在征战中激发忠诚。"
 ALG_andalus_legacy: "安达卢斯遗产"
 ALG_andalus_legacy_desc: "我们的安达卢西亚复兴，不只为王座。它关乎重燃数个世纪前被逐出伊比利亚的穆斯林失落的骄傲。我们将传播影响力，让欧洲铭记——安达卢西亚从未被遗忘。"
 ALG_our_old_realm: "我们的古老王国"
 ALG_our_old_realm_desc: "我们曾以安达卢斯之名统治伊比利亚的部分地区。如今，通过外交手段与历史记忆，我们将主张对故土的权利，并为收复失地奠定基础。"
 ALG_renewed_nobility: "复兴贵族"
 ALG_renewed_nobility_desc: "必须建立新的贵族家族来效忠君主。古老的家族将得以恢复，新的精英将被提拔，为阿尔及利亚提供忠诚的王室仆人。"
 ALG_politic_outreach_iberia: "伊比利亚政治宣传"
 ALG_politic_outreach_iberia_desc: "通过支持西班牙和葡萄牙的同情势力，我们可以将阿尔及利亚的影响力向西扩展。我们对伊比利亚运动的支持将加强我们的主张，同时削弱这些国家。"
 ALG_fate_of_spain: "西班牙的命运"
 ALG_fate_of_spain_desc: "西班牙占据着我们祖先的土地。如今，它的命运或许将由阿尔及利亚之手决定——通过联合、收复或征服。"
 ALG_true_maghribism: "真正的马格里布主义"
 ALG_true_maghribism_desc: "是时候宣告我们自己的愿景了——一种植根于马格里布身份认同、伊斯兰团结与君主制自豪感的意识形态。马格里布主义学说将激励整个北非建立新的秩序。"
 ALG_glory_of_andalus_idea: "安达卢西亚的荣耀"
 ALG_glory_of_andalus_idea_desc: "一场受安达卢斯遗产启发的文化复兴，正激励着我们的学者、工匠与统治者。它让整个国家在骄傲的共同记忆下紧密团结。"
 ALG_effect_if_they_accept_TT: "如果接受，阿尔及利亚将获得资源并加强关系。"
 ALG_spain_algeria_union_tt: "解锁在阿尔及利亚君主制下与西班牙合并的决议。"
 ALG_trade_with_arabic_nations_tt: "阿尔及利亚与所有阿拉伯国家建立了进一步贸易协定。"
 ALG_loas_influence_tt: "阿尔及利亚通过外交努力和友好协议，在阿拉伯联盟成员国中提升了影响力。"
 ALG_isr_threat: "阿尔及利亚谴责以色列侵略行为"
 ALG_palestinian_aid_package_tt: "阿尔及利亚向巴勒斯坦提供援助，并在所有中东国家中扩大了影响力。"
 ALG_african_union_reforms_tt: "阿尔及利亚已与所有非统组织成员国建立了进一步贸易协定。"
 ALG_mutual_defense_idea: "共同防御"
 ALG_mutual_defense_idea_desc: ""
 ALG_the_State: "阿尔及利亚国"
 ALG_bureaucracy_cost_multiplier_modifier_var: "官僚机构支出"
 ALG_police_cost_multiplier_modifier_var: "警务机构支出"
 ALG_education_cost_multiplier_modifier_var: "教育机构支出"
 ALG_health_cost_multiplier_modifier_var: "医疗机构支出"
 ALG_social_cost_multiplier_modifier_var: "福利机构支出"
 ALG_stability_factor: "稳定度"
 ALG_monthly_population: "每月人口"
 ALG_bureaucracy_cost_multiplier_modifier_tt: "将§H阿尔及利亚国家状况§!的§Y行政开支§!乘数修改[?ALG_bureaucracy_cost_multiplier_modifier_change|+%]（当前：[?ALG_bureaucracy_cost_multiplier_modifier|Y%]）"
 ALG_unlocks_focus_for_us: "§C解锁一项决议，让我们消除由此受到的负面修正！§!"
 ALG_activate_from_event: "§H这些国策是通过事件或决议激活的§!"
 ALG_our_society: "阿尔及利亚社会"
 ALG_our_society_desc: "阿尔及利亚社会正不断变化，朝着崭新的形态演进。尽管政府在此过程中通常扮演着有限角色，受制于某些约束。但历史表明，我们曾多次需要介入调整政策，未来也必将再次采取行动推动变革。"
 ALG_DRS: "情报与安全局"
 ALG_DRS_desc: "情报与安全局，简称DRS，是我国的情报机构，负责保护国家政府及政策免受内外威胁。"
 ALG_domestic_focus: "聚焦国内"
 ALG_domestic_focus_desc: "情报与安全局应专注于保护国家免受国内威胁，例如那些企图通过传播危险思想来推翻政府的恶意分子。"
 ALG_foreign_focus: "聚焦国外"
 ALG_foreign_focus_desc: "情报与安全局应当担忧来自国境之外的威胁，因为人民永远不会希望给自己的国家带来伤害。"
 ALG_disaster_relief: "灾难预案"
 ALG_disaster_relief_desc: "目前我们没有制定灾难应对计划，这意味着我们尚未准备好保护并援助我们的公民。"
 ALG_charity_based: "慈善机构主导"
 ALG_charity_based_desc: "当灾难发生时，慈善机构将为我们的人民提供援助，因此我们可以大幅削减开支。"
 ALG_government_reliant: "政府机关主导"
 ALG_government_reliant_desc: "当灾难发生时向人民提供援助是政府的职责，即使这意味着增加我们的支出。"
 ALG_migration_problems: "移民问题"
 ALG_migration_problems_desc: "我们一直对涌入国内的移民潮感到棘手……但我们却始终不知在他们原籍国的问题解决后，该如何安置这些人。"
 ALG_open_door_policy: "开放政策"
 ALG_open_door_policy_desc: "通过选择开放政策，我们可以轻松地利用移民来改善我们的国家并发展它。"
 ALG_closed_borders: "关闭边境"
 ALG_closed_borders_desc: "只要关闭边境，我们就能完全消除移民进入该国，从而解决我们的问题。"
 ALG_drug_problem: "毒品问题"
 ALG_drug_problem_desc: "有时药物是医疗所需，但这并不能阻止某些人滥用制度，将其用于娱乐目的，从而带来危险的后果。"
 ALG_tighten_punishments: "强硬立场"
 ALG_tighten_punishments_desc: "我们将把任何非医疗用途使用毒品的人定为罪犯，无论他们有何种借口。"
 ALG_relax_restrictions: "柔和立场"
 ALG_relax_restrictions_desc: "即使我们的民众想为了娱乐目的使用毒品，我们又何必在意？或许我们应该放任他们做自己想做的事，哪怕存在一些风险。"
 ALG_rising_nationalism: "民族主义的兴起"
 ALG_rising_nationalism_desc: "尽管民族主义是一件好事，但太多可能是坏事。国内的民族主义导致少数群体之间爆发问题和斗争。"
 ALG_utilize_it: "利用民族主义"
 ALG_utilize_it_desc: "我们将利用民族主义来争取优势，这样敌人就会明白，阿尔及利亚人民不会在战争时期坐视不理。"
 ALG_combat_it: "打击民族主义"
 ALG_combat_it_desc: "我们必须打击民族主义，因为我们不能冒国内进一步不稳定的风险。"
 ALG_drs_reformed: "DRS - 聚焦国内"
 ALG_drs_reformed_desc: "DRS将更侧重于国内事务而非对外事务。"
 ALG_drs_emboldened: "DRS - 聚焦国外"
 ALG_drs_emboldened_desc: "DRS会更关注我国境外的事务。"
 ALG_charity_disasters: "慈善机构主导计划"
 ALG_charity_disasters_desc: "我们的灾难计划依靠公民的善意和捐款，在需要的时候向人们提供援助。"
 ALG_government_led_disasters: "政府主导计划"
 ALG_government_led_disasters_desc: "政府将向遭受自然灾害的人们提供援助，而不是慈善机构，但如果他们愿意，他们也可以自由地提供帮助。"
 ALG_drugs_illegalized: "毒品定罪"
 ALG_drugs_illegalized_desc: "如果任何人出于医疗用途以外的任何目的使用毒品，他们将会触犯法律。"
 ALG_drugs_legalized: "毒品合法化"
 ALG_drugs_legalized_desc: "我们并不真正关心人们吸毒的目的，无论如何，这就是他们的生活。"
 ALG_nationalist_advantage: "利用民族主义"
 ALG_nationalist_advantage_desc: "我们正在利用民族主义来进一步推动治理，使某些政策的实施变得更加容易。"
 ALG_fight_nationalist: "打击民族主义"
 ALG_fight_nationalist_desc: "民族主义是一股危险的力量，它可能在我们国家内部造成严重破坏和不稳定。"
 ALG_drs_idea_1: "军事化警察"
 ALG_drs_idea_1_desc: "警方已被重组为能够应对恐怖主义、骚乱和动荡的准军事力量，使其在阿尔及利亚国内安全事务中扮演更重要的角色。"
 ALG_drs_idea_2: "高度军事化警察"
 ALG_drs_idea_2_desc: "如今，警察已演变为一支装备精良的准军事化部队，他们配备先进装备，与军队关系密切，模糊了民事安全与军事管控之间的界限。"
 ALG_drs_idea_3: "综合军事化警察"
 ALG_drs_idea_3_desc: "我们的警察力量已完全融入国家安全体系，在反恐、边防和国内监控等领域与军队协同作战。"
 ALG_riot_police_idea: "防暴警察"
 ALG_riot_police_idea_desc: "专门应对抗议、示威和社会动荡的特种警察部队。他们配备防暴装备，并以维护政权稳定为首要任务展开行动。"
 ALG_algerian_special_forces: "组建阿尔及利亚特种部队"
 ALG_algerian_special_forces_desc: "阿尔及利亚面临的安全威胁需要能够快速干预和反恐的精锐部队。建立特种部队将增强我们应对内部动乱和外部危险的能力。"
 ALG_BRI: "扩大BRI"
 ALG_BRI_desc: "研究与干预旅（BRI）是一支专门接受人质救援和高风险行动训练的特警部队。扩大其人员规模和资源将提升我们的城市安全水平。"
 ALG_al_saiqa: "闪电特种部队"
 ALG_al_saiqa_desc: "特种准军事防暴与反叛乱部队将增强我们在内乱时期维持法律与秩序的能力。"
 ALG_al_hars_al_watani: "国民警卫队"
 ALG_al_hars_al_watani_desc: "国民警卫队将在脆弱地区提供地方安全保障，解放军队资源，并在危机情况下维持秩序。"
 ALG_haras_al_hudod: "边防部队"
 ALG_haras_al_hudod_desc: "特种部队在边境巡逻将遏制走私活动，防止渗透，并加强阿尔及利亚的边境防御。"
 ALG_central_armed_police: "中央警察部队"
 ALG_central_armed_police_desc: "将武警部队纳入集中统一指挥，将提高响应速度与行动效率，确保对组织化威胁形成更强有力的打击。"
 ALG_border_security_force: "边境安全部队"
 ALG_border_security_force_desc: "通过建立专门的边境监视与拦截部队，阿尔及利亚将严厉打击走私网络和武装渗透活动。"
 ALG_firqat_tadakhol_al_sariye: "快速反应部队"
 ALG_firqat_tadakhol_al_sariye_desc: "精锐快速反应部队将使阿尔及利亚能够迅速打击恐怖分子窝点，并在危机升级前应对突发状况。"
 ALG_expanding_BRI: "拓展BRI能力"
 ALG_expanding_BRI_desc: "随着更多资金、训练和先进装备的投入，BRI可发展成为一支强大的反恐与人质营救部队，足以媲美该地区最顶尖的力量。"
 ALG_increase_police_funding: "增加警察资金"
 ALG_increase_police_funding_desc: "加大对警察和宪兵部队的投入，将增强内部稳定，巩固公共安全，并提升阿尔及利亚应对动荡的韧性。"
 ALG_drs_expand: "扩大DRS"
 ALG_drs_expand_desc: "情报与安全局（DRS）可以进一步扩充，以提供更强的情报搜集和反间谍能力。"
 ALG_new_gendarmerie_equipment: "宪兵部队新装备"
 ALG_new_gendarmerie_equipment_desc: "我们的宪兵队必须配备适当的武装与装备，以应对恐怖主义、犯罪和内部动乱的挑战。"
 ALG_mia_reform: "改革内政部"
 ALG_mia_reform_desc: "将指挥权集中在内政部之下，将优化内部安全管理体系，确保更迅速、更协调的响应能力。"
 ALG_internal_troops: "内卫部队"
 ALG_internal_troops_desc: "国家指挥下的准军事化内卫部队将加强对叛乱和犯罪网络的打击力度。"
 ALG_increase_special_forces: "扩充特种部队"
 ALG_increase_special_forces_desc: "我们的精英部队需要扩大招募规模并实施专业训练计划，以应对现代战争中的复杂威胁。"
 ALG_cybercrime_directorate: "网络犯罪调查局"
 ALG_cybercrime_directorate_desc: "设立网络犯罪调查局将保护阿尔及利亚免受数字间谍活动、网络攻击和敌对虚假信息宣传的侵害。"
 ALG_riot_police: "防暴警察部队"
 ALG_riot_police_desc: "组织化的防暴警察部队将提供人群控制，并对大规模抗议活动采取有纪律的应对措施，确保动乱期间的稳定。"
 ALG_military_police_training: "宪兵训练"
 ALG_military_police_training_desc: "宪兵训练计划将提升纪律性，减少逃兵现象，并改善不稳定地区的占领管理。"
 ALG_peoples_security: "人民安全"
 ALG_peoples_security_desc: "\"人民安全\"学说将加强军民合作，提振士气，并将地方民众纳入国家防御体系。"
 ALG_procurement_of_espionage_equipment: "采购间谍设备"
 ALG_procurement_of_espionage_equipment_desc: "投资先进的监控与间谍技术，将提升我们侦测并消除国内外威胁的能力。"
 ALG_occupation_management_strategies: "占领区管理策略"
 ALG_occupation_management_strategies_desc: "管理占领区或不稳定区域的新策略将有效降低抵抗、减少伤亡，并巩固国家权威。"
 ALG_french_weapons: "进口法国武器"
 ALG_french_weapons_desc: "通过获取法国的轻武器和装备，阿尔及利亚能快速实现步兵现代化，同时加强与巴黎的联系。"
 ALG_russian_guns: "进口俄罗斯武器"
 ALG_russian_guns_desc: "俄罗斯批量交付的小型武器为阿尔及利亚提供了耐用可靠的武器装备，巩固了我们与莫斯科之间传统的防务伙伴关系。"
 ALG_algerian_space_programme: "成立ASAL"
 ALG_algerian_space_programme_desc: "阿尔及利亚航天局（ASAL）将统筹所有国家航天活动，从卫星研发到空间研究国际合作。"
 ALG_alsat_initiative: "阿尔萨特项目"
 ALG_alsat_initiative_desc: "阿尔及利亚的阿尔萨特项目为我们提供了首批卫星，专注于地球观测和通信，标志着我们进入了太空时代。"
 ALG_alsat2_series: "阿尔萨特-2系列"
 ALG_alsat2_series_desc: "先进阿尔萨特-2卫星的研发将提升我们的监视、通信和遥感能力。"
 ALG_finance_private_space_companies: "资助私营航天公司"
 ALG_finance_private_space_companies_desc: "鼓励阿尔及利亚私营部门参与航天工业，将增强我国的高科技基础。"
 ALG_regional_satnet: "区域卫星网络"
 ALG_regional_satnet_desc: "我们将把我们的卫星连接成一个区域网络，整合民用与军事用途，同时将阿尔及利亚与其邻国连接起来。"
 ALG_asal_lunar_project: "ASAL月球计划"
 ALG_asal_lunar_project_desc: "阿尔及利亚航天局将启动一项雄心勃勃的项目，研究月球探索并推进火箭技术。"
 ALG_human_spaceflight: "载人航天计划"
 ALG_human_spaceflight_desc: "我们的太空计划将迈出大胆的一步：计划与盟友合作，实现阿尔及利亚首次载人航天飞行。"
 ALG_orbital_defense_program: "轨道防御计划"
 ALG_orbital_defense_program_desc: "卫星同样可用于防御。发展轨道防御能力将保护阿尔及利亚免受未来威胁。"
 ALG_alsat_future: "阿尔萨特的未来"
 ALG_alsat_future_desc: "阿尔及利亚太空计划的未来在于持续投资、公私合作以及长期的科学规划。"
 ALG_cyber_sat_integration: "网络卫星整合"
 ALG_cyber_sat_integration_desc: "将网络战能力与我们的卫星网络相结合，将为阿尔及利亚在现代冲突中提供强大的非对称优势工具。"
 ALG_idea_the_new_space_race: "新太空竞赛"
 ALG_idea_the_new_space_race_desc: "阿尔及利亚已加入全球太空竞赛，与世界强国一较高下，以证明其科技与战略实力。"
 ALG_idea_cyberwarfare_2: "网络卫星整合"
 ALG_idea_cyberwarfare_2_desc: "阿尔及利亚的网络司令部现已与我们的卫星系统整合，提供卓越的通信安全与进攻能力。"
 ALG_algeria_police_modifier: "阿尔及利亚内部安全"
 ALG_algeria_police_modifier_desc: "阿尔及利亚政府自苏联时期起，在镇压异议和敌对特工方面积累了丰富经验。"
 ALG_algeria_police_modifier_tt_intro: "§Y$ALG_algeria_police_modifier$§!追加效果："
 ALG_algeria_support_category: "阿尔及利亚辅助部队"
 ALG_stabilize_mali: "稳定马里局势"
 ALG_stabilize_mali_desc: "马里的动荡威胁着整个萨赫勒地区。阿尔及利亚凭借其在反叛乱和外交方面的经验，必须介入以稳定其南部邻国——无论是通过武力、谈判还是施加影响力。"
 ALG_back_tuareg_rebellion: "支持图阿雷格叛乱"
 ALG_back_tuareg_rebellion_desc: "与其支持巴马科，我们不如扶持那些寻求马里北部自治的图阿雷格叛军。这将削弱马里的中央权威，并增强我们在该地区的影响力。"
 ALG_support_malian_army: "支持马里军队"
 ALG_support_malian_army_desc: "阿尔及利亚可以选择直接支持马里政府，提供政治和军事援助以加强其军队对抗叛乱分子。"
 ALG_promote_tuareg_dialogue: "促进图阿雷格对话"
 ALG_promote_tuareg_dialogue_desc: "与其选边站队，阿尔及利亚可以在图阿雷格叛军与马里政府之间主持和谈，从而在萨赫勒地区扮演调停者与稳定者的角色。"
 ALG_support_tuareg_politicians: "支持图阿雷格政治家"
 ALG_support_tuareg_politicians_desc: "在战场之外，图阿雷格人的影响力也能通过政治渠道建立。支持温和的图阿雷格领导人将使阿尔及利亚在马里内部获得长期盟友。"
 ALG_aid_malian_army: "援助马里军队"
 ALG_aid_malian_army_desc: "阿尔及利亚可以向马里输送武器、车辆和指挥系统，以增强马里军队打击叛乱分子和稳定国家的能力。"
 ALG_mali_stabilized: "马里局势稳定"
 ALG_mali_stabilized_desc: "经过多年的动荡，阿尔及利亚的努力终于有了回报。马里冲突已得到控制，图阿雷格人的叛乱被遏制，阿尔及利亚已成为萨赫勒地区的稳定力量。"
 ALG_tuareg_autonomy_victory: "图阿雷格自治"
 ALG_tuareg_autonomy_victory_desc: "图阿雷格运动赢得了对其自治权的承认。在阿尔及利亚的支持下，图阿雷格人如今掌握了政治权力，马里在萨赫勒地区面临着新的权力平衡。"
 Algeria.237.t: "阿尔及利亚干预马里"
 Algeria.237.d: "阿尔及利亚宣布有意稳定马里局势，理由是对恐怖主义、图阿雷格分离主义及地区动荡的担忧。随着阿尔及利亚向南调动军队、提供援助并施加政治压力，马里的力量平衡正在发生变化。此举将带来和平还是更深的冲突，仍有待观察。"
 Algeria.237.a: "阿尔及利亚正主导萨赫勒。"
 Algeria.409.t: "图阿雷格对话倡议"
 Algeria.409.d: "阿尔及利亚已开始推动与马里及更广泛萨赫勒地区图阿雷格代表的对话。阿尔及尔方面部分人士视此为通往和平与稳定的道路，另一些人则担忧承认图阿雷格诉求的合法性可能助长分离主义气焰。政府必须审慎决定对此倡议的支持力度。"
 Algeria.409.a: "通过文化和媒体交流进行接触"
 Algeria.409.b: "向图阿雷格领导人提供谨慎支持"
 ALG_TUA_REV_TT: "[TUA.GetFlag]§H图阿雷格抵抗组织§!得到了阿尔及利亚的支持，导致在马里境内建立了§Y图阿雷格自治区§!（或可能形成一个§G新的图阿雷格国家§!）。"
 ALG_MAL_STABILIZED_TT: "[MAL.GetFlag]§H马里§!在阿尔及利亚的支持下已§G恢复稳定§!，确保了和平并降低了冲突再起的风险。"
 ALG_algerian_intervention: "区域干预学说"
 ALG_algerian_intervention_desc: "阿尔及利亚长期以来一直扮演着地区权力掮客的角色。随着不稳定因素威胁到我们的周边环境，我们必须决定是否直接介入地区冲突，以维护我们的国家利益。"
 ALG_intervene_in_sahrawi: "干预撒哈拉"
 ALG_intervene_in_sahrawi_desc: "摩洛哥与西撒哈拉之间的冲突仍未解决。阿尔及利亚必须通过外交——或军事——手段介入，以保护其边界并加强在马格里布地区的影响力。"
 ALG_supp_polisario: "支持波利萨里奥阵线"
 ALG_supp_polisario_desc: "撒拉维争取独立的斗争是阿尔及利亚地区政策的核心。通过向波利萨里奥阵线提供武器和支持，我们可以削弱摩洛哥，并确保我国在西撒哈拉的影响力不断增强。"
 ALG_a_new_stance: "对摩洛哥的新立场"
 ALG_a_new_stance_desc: "阿尔及利亚历来反对摩洛哥对西撒哈拉的控制，但政治风向的转变要求我们采取务实态度。与摩洛哥结盟有助于缓解紧张局势、开辟新的经济机遇，并增强我们在马格里布地区的影响力。"
 ALG_intervene_in_libya: "干预利比亚"
 ALG_intervene_in_libya_desc: "利比亚的混乱局势正威胁着向我国边境蔓延。阿尔及利亚绝不能容忍邻国陷入动荡。无论是通过军事行动、外交手段还是秘密影响，我们都必须确保我国在利比亚的利益。"
 ALG_assassinate_gaddafi: "刺杀卡扎菲"
 ALG_assassinate_gaddafi_desc: "穆阿迈尔·卡扎菲的统治使整个地区陷入动荡。通过策划其垮台，阿尔及利亚可以加速利比亚的政权更迭，并确保一个更有利的政府上台——即使这会让利比亚陷入内战。"
 ALG_peacekeepers: "向利比亚派遣维和部队"
 ALG_peacekeepers_desc: "与其让利比亚进一步陷入混乱，阿尔及利亚可以以维和部队的身份介入。派遣军队稳定局势将强化我们作为负责任地区大国的形象，并让我们在的黎波里获得持久的影响力。"
 ALG_pulse.1.t: "撒哈拉沙漠扩张"
 ALG_pulse.1.d: "根据最新数据显示，撒哈拉沙漠正持续稳步扩张。牧场正变得贫瘠，绿洲逐渐干涸，瞪羚和巴巴里鹿等野生动物因盗猎而濒临消失。过度放牧、无节制的采矿以及对盗猎行为的漠视，只会加剧沙漠化进程。"
 ALG_pulse.1.a: "令人担忧的信号"
 ALG_pulse.2.t: "撒哈拉沙漠稳定"
 ALG_pulse.2.d: "今年数据显示，撒哈拉沙漠扩张速度有所放缓，荒漠化趋势趋于稳定。但若不对过度放牧、盗猎及不可持续的土地利用采取行动，这种平衡可能很快被再次打破。"
 ALG_pulse.2.a: "我们必须保持警惕。"
 ALG_pulse.3.t: "撒哈拉沙漠退却"
 ALG_pulse.3.d: "最新报告显示，部分沙漠边缘地带正逐渐重现植被。反盗猎巡逻、控制放牧以及植树造林等措施似乎正在帮助土地恢复生机，让脆弱的生态系统重归平衡。"
 ALG_pulse.3.a: "进展顺利"
 ALG_sahara_poaching: "撒哈拉偷猎行为"
 ALG_sahara_poaching_desc: "在阿尔及利亚广阔的撒哈拉沙漠和草原地区，偷猎是一个严重问题。瞪羚、鸨和巴巴里绵羊遭到非法捕猎，而贩运路线则与国际市场相连。偷猎与过度放牧和水资源过度使用相结合，加速了荒漠化和生物多样性的丧失。\n\n§Y荒漠化§!的可能性：§R[?sahara_expands]%§!\n§Y稳定化§!的可能性：[?sahara_steady]%\n§Y绿洲化§!的可能性：§G[?sahara_retreats]%§!\n\n每个月都有\n§Y[?chance_to_not_kill_poachers]%§! 的几率有§Y15名新偷猎者§!开始活动。\n§Y[?chance_to_kill_poachers]%§! 的几率我们的安全部队能消灭§Y[?no_of_poachers_to_kill]名偷猎者§!。\n\n提高§Y国内安全开支§!并采取有针对性的反偷猎措施，可以增加我们成功的几率。\n\n估计活跃偷猎者数量：[?no_of_poachers] ([ALG_threat_level_of_poachers])"
 ALG_bi_yearly_poaching_report: "年度偷猎报告"
 ALG_bi_yearly_poaching_report_desc: "每12个月会评估一次偷猎活动的影响。§G低威胁§!会降低沙漠化风险，而§R高威胁§!则会增加该风险。"
 ALG_anti_poaching_extra_security: "雇佣额外巡护员"
 ALG_anti_poaching_extra_security_desc: "招募更多巡护员和安保队，以打击撒哈拉和草原地区的偷猎行为。"
 ALG_anti_poaching_extra_security_tt: "§G消灭偷猎者的可能性增加10%§!"
 ALG_anti_poaching_heavy_weapons: "武装反盗猎部队"
 ALG_anti_poaching_heavy_weapons_desc: "为巡逻队配备车辆、无人机和重型武器，能显著提升其打击武装偷猎团伙的作战效能。"
 ALG_anti_poaching_heavy_weapons_tt: "§G消灭的偷猎者数量增加5§!"
 ALG_anti_poaching_awareness: "野生动物保护运动"
 ALG_anti_poaching_awareness_desc: "发起一项公共宣传活动，提高公众对保护濒危物种免受盗猎重要性的认识。"
 ALG_reduce_yearly_good_desertification_5: "§Y绿洲化§!可能性：§R-5%§!\n"
 ALG_increase_yearly_good_desertification_5: "§Y绿洲化§!可能性：§G+5%§!\n"
 ALG_increase_yearly_bad_desertification_5: "§Y荒漠化§!可能性：§R+5%§!\n"
 ALG_decrease_yearly_bad_desertification_5: "§Y荒漠化§!可能性：§G-5%§!\n"
 ALG_reduce_yearly_neutral_desertification_5: "§Y稳定化§!可能性：§R-5%§!\n"
 ALG_increase_yearly_neutral_desertification_5: "§Y稳定化§!可能性：§G+5%§!\n"
 ALG_threat_level_of_poachers_low: "§G低威胁§!"
 ALG_threat_level_of_poachers_medium: "§Y中威胁§!"
 ALG_threat_level_of_poachers_high: "§R高威胁§!"
 ALG_anti_poaching_raid_successful: "§G我们成功地消灭了§Y[?poachers_killed]§!偷猎者！§!"
 ALG_anti_poaching_raid_normal: "§G我们设法消灭了§Y[?poachers_killed]§! 偷猎者！§!"
 ALG_anti_poaching_raid_failure: "§R我们的巡护员遭受伤亡§!"
 ALG_eliminate_half_of_poachers: "§G偷猎者的数量§Y[?poachers_killed]§!§!"
 ALG_sahara_expansion: "撒哈拉荒漠化"
 ALG_sahara_expansion_desc: "撒哈拉沙漠覆盖了阿尔及利亚的大部分地区，从南部一直延伸，并持续向北侵蚀。每年，随着脆弱的生态系统被不断扩张的干旱区域所取代，沙漠化进程都在加剧。阿尔及利亚仅有少部分土地适宜耕种，许多农村人口依赖着有限的耕地、灌溉工程以及日益脆弱的牧场，这些资源正承受着越来越大的压力。\n\n阿尔及利亚的撒哈拉地区还蕴藏着宝贵的自然资源，包括油气田，以及独特的生态系统和社区，例如霍加尔地区的图阿雷格人。在开发利用这些资源与遏制沙漠化的迫切需求之间取得平衡，将是一项决定性的挑战。\n\n§Y每年一月§!，我们都会收到关于撒哈拉沙漠化状况的更新。沙漠可能继续扩张（§Y沙漠化§!），情况可能趋于稳定（§Y稳定化§!），或者努力可能成功逆转这一进程（§Y绿洲化§!）。每种结果的发生概率可以在§Y$ALG_anti_desertification_decisions$§!决议类别中查看。\n\n我们可以继续在脆弱的土地上开采资源和放牧，加剧沙漠化，也可以采取保护主义和可持续发展的方法，以减缓甚至逆转这一趋势。"
 ALG_anti_poaching_decisions: "撒哈拉偷猎行为"
 ALG_anti_poaching_decisions_desc: "阿尔及利亚撒哈拉地区的偷猎问题依然顽固存在。诸如白长角羚、瞪羚和沙漠猎豹等濒危物种因贸易或运动狩猎而遭捕杀，同时走私路线常将这些活动与萨赫勒地区更广泛的犯罪和恐怖网络联系起来。部分偷猎者来自邻国马里、尼日尔和利比亚，但当地团伙亦有参与。阿尔及利亚当局对§Y偷猎者§!采取了强硬立场，他们与安全部队之间的冲突并不罕见。\n\n偷猎（连同过度放牧、气候变化和不可持续的土地利用）加剧了撒哈拉地区的持续荒漠化。打击偷猎并保护脆弱的生态系统，是维护生物多样性和人类生计的重要一步。\n\n§Y荒漠化§!可能性：§R[?sahara_expands]%§!\n§Y稳定化§!可能性：[?sahara_steady]%\n§Y绿洲化§!可能性：§G[?sahara_retreats]%§!\n\n每月有\n§Y[?chance_to_not_kill_poachers]%§!的几率出现§Y15名新偷猎者§!开始活动。\n§Y[?chance_to_kill_poachers]%§!的几率由我方安全部队消灭§Y[?no_of_poachers_to_kill]名偷猎者§!\n\n我们可以通过增加§Y内部安全§!支出，或为部队装备并训练沙漠作战能力，来提高消灭偷猎者的几率。\n\n当前预估偷猎者数量：[?no_of_poachers] ([ALG_threat_level_of_poachers])"
 ALG_anti_poaching_dehorn_camels: "骆驼标记运动"
 ALG_anti_poaching_dehorn_camels_desc: "在整个撒哈拉地区对骆驼群进行标记和密切监控，有助于遏制偷猎者和走私者的活动。虽然骆驼并未濒临灭绝，但它们常被用作走私路线或非法贸易的目标。通过引入识别标签、社区监督和巡逻合作，我们可以增加偷猎者从盗窃和交易骆驼中获利的难度。"
 ALG_anti_poaching_dehorn_camels_tt: "§G一次成功的行动将使偷猎者的数量减半§!"
 ALG_strengthen_ENTV_environmental_campaigns: "加强ENTV环保宣传活动"
 ALG_strengthen_ENTV_environmental_campaigns_desc: "国家广播服务ENTV可用于提高公众对环境问题的认识。通过开展关于荒漠化防治、水资源保护和野生动物保护的宣传活动，我们可以鼓励公民支持可持续发展的未来。"
 ALG_increase_cattle_grazing: "扩大放牧规模"
 ALG_increase_cattle_grazing_desc: "畜牧业仍是阿尔及利亚草原和高原经济的支柱。扩大牛羊放牧规模有望提高农村收入，但若管理不当，可能加剧过度放牧、土壤退化和荒漠化风险。"
 ALG_optimize_pastoral_practices: "畜牧业优化"
 ALG_optimize_pastoral_practices_desc: "传统的放牧方式给脆弱的生态系统带来了巨大压力。通过引入轮牧制、可持续用水和改善兽医服务，我们可以实现牧业现代化，减少对草原和撒哈拉边缘地区的影响。"
 ALG_expand_steppe_farming: "扩大草原农业"
 ALG_expand_steppe_farming_desc: "阿尔及利亚的草原地区位于泰勒阿特拉斯山脉与撒哈拉沙漠之间，是粮食和牲畜生产的重要区域。通过投资灌溉和垦殖项目，我们可以增加这些地区的耕种面积，尽管这可能带来进一步的环境压力。"
 ALG_research_drought_resistant_crops: "研究抗旱作物"
 ALG_research_drought_resistant_crops_desc: "气候变化和荒漠化正威胁着阿尔及利亚的粮食安全。通过投资研究抗旱作物，如抗逆性强的谷物和椰枣品种，我们能够保护农业部门免受日益恶化的干旱条件影响。"
 ALG_shrink_nature_reserves_sahara: "缩小撒哈拉自然保护区"
 ALG_shrink_nature_reserves_sahara_desc: "有人认为，撒哈拉沙漠中划出的大片自然保护区可以重新规划为农业、牧业或工业项目用地。缩小这些保护区的规模将促进发展，但会带来巨大的环境代价。"
 ALG_expand_nature_reserves_sahara: "扩大撒哈拉自然保护区"
 ALG_expand_nature_reserves_sahara_desc: "保护撒哈拉脆弱的生态系统对于生物多样性和长期环境平衡至关重要。通过扩大保护区范围，我们能够保护濒危物种，并减轻导致沙漠化的压力。"
 ALG_total_ban_on_poaching: "全面禁止偷猎"
 ALG_total_ban_on_poaching_desc: "偷猎行为威胁着诸如旋角羚、瞪羚和沙漠猎豹等濒危物种的生存。尽管某些狩猎传统仍在延续，但我们必须采取果断行动，在保护区和脆弱生态系统中全面禁止偷猎，以守护我们的自然遗产。"
 ALG_drs: "情报与安全局"
 ALG_drs_desc: "阿尔及利亚的情报与安全局（DRS）在血腥的\"黑暗十年\"期间形成，并因其广泛的权力而声名狼藉。虽然官方上它是抵御恐怖主义和外国渗透的盾牌，但DRS也深度介入政治，以确保国家权威和稳定——甚至不惜以公民自由为代价。"
 ALG_decline_of_tourism: "旅游业的衰退"
 ALG_destroyed_agriculture: "被毁的农业"
 ALG_tikjda_resort: "蒂克吉达滑雪场"
 ALG_algerian_tourism: "阿尔及利亚旅游业"
 ALG_natural_products_idea: "阿尔及利亚天然产品"
 ALG_sonatrach: "阿尔及利亚国家石油公司扩张"
 algeria_invest.1.t: "对阿尔及利亚的投资"
 algeria_invest.1.d: "阿尔及利亚请求我们对其进行投资。通过在阿尔及利亚的投资，我们可以加强在北非和地中海沿岸的影响力。"
 algeria_invest.1.a: "好的"
 algeria_invest.1.b: "不"
 algeria_invest.2.t: "他们同意了"
 algeria_invest.2.d: "他们同意在我国投资。"
 algeria_invest.2.a: "很好"
 algeria_invest.3.t: "他们拒绝了"
 algeria_invest.3.d: "他们拒绝在我国投资，声称我们的提议无利可图。"
 algeria_invest.3.a: "悲哀"
 algeria_invest.4.t: "美国在阿尔及利亚的投资"
 algeria_invest.4.d: "阿尔及利亚为我国企业提供了投资其经济的机会。作为回报，我们将获得影响力，并在长期内加强与阿尔及利亚的关系。"
 algeria_invest.4.a: "谁说到钱了？"
 algeria_invest.4.b: "不"
 algeria_invest.5.t: "美国同意"
 algeria_invest.5.d: "美国公司已开始在阿尔及利亚规划投资项目。"
 algeria_invest.5.a: "商业与民主的双赢。"
 algeria_invest.6.t: "美国拒绝"
 algeria_invest.6.d: "美国已拒绝在我国经济领域投资。他们对我们政治体系的透明度缺乏信心。"
 algeria_invest.6.a: "那么，我们就联系欧洲吧。"
 algeria_invest.7.t: "欧洲在阿尔及利亚的投资"
 algeria_invest.7.d: "阿尔及利亚请求我们对其经济进行投资。据他们称，该国拥有良好的投资环境，而我们的参与将加强地中海两岸的联系。"
 algeria_invest.7.a: "当然"
 algeria_invest.7.b: "没有资金"
 algeria_invest.8.t: "欧洲同意"
 algeria_invest.8.d: "欧洲投资者已同意支持我国经济。数家大型公司已表示愿意在阿尔及利亚启动投资项目。"
 algeria_invest.8.a: "发展方面的好消息"
 algeria_invest.9.t: "欧洲拒绝"
 algeria_invest.9.d: "他们声称目前没有资金可以拨付投资计划。"
 algeria_invest.9.a: "悲哀"
 algeria_invest.10.t: "中国投资者为阿尔及尔地铁项目提供资金"
 algeria_invest.10.d: "一位中国投资者正为我们提供资金扩建阿尔及尔地铁。我们可以用他们的资金建设地铁，或者通过欺骗手段侵吞这笔钱，但这可能会损害我们与中国的关系。"
 algeria_invest.10.a: "阿尔及尔需要一条地铁！"
 algeria_invest.10.b: "阿尔及利亚需要资金！"
 algeria_invest.11.t: "阿尔及利亚愚弄了我们"
 algeria_invest.11.d: "一群阿尔及利亚骗子在修建地铁的项目上做了手脚，卷走了我们为他们准备的全部资金。"
 algeria_invest.11.a: "混蛋"
 algeria_invest.12.t: "雷布拉布的投资"
 algeria_invest.12.d: "伊萨德·雷布拉布，赛维塔集团的创始人，是阿尔及利亚最具影响力的企业家之一。自20世纪90年代以来，他持续投资于工业、食品生产和国际扩张领域。得益于他的努力，阿尔及利亚拥有了更多工厂、就业岗位和标志性项目。他至今仍是该国私营部门潜力的象征。"
 algeria_invest.12.a: "谢谢，雷布拉布！"
 ALG_our_economy: "我们的经济"
 ALG_our_economy_desc: "阿尔及利亚的经济正处在十字路口。历经多年的动荡与投资不足后，政府必须决定是转向内顾，还是敞开大门迎接现代化与增长。"
 ALG_attract_foreign_inv: "吸引外资"
 ALG_attract_foreign_inv_desc: "通过向外国投资者开放市场，阿尔及利亚能够获得原本难以企及的资金、专业知识和基础设施项目。"
 ALG_france_inv: "寻求法国投资"
 ALG_france_inv_desc: "法国仍是阿尔及利亚最紧密的经济伙伴之一。若能承受其影响力，让他们重新参与我们的能源和工业领域，或将加速发展进程。"
 ALG_chinese_inv: "中国投资倡议"
 ALG_chinese_inv_desc: "中国提供雄心勃勃的投资方案，这些方案往往与基础设施和资源开发挂钩。与北京合作可能改变我们的经济，但代价是加深依赖性。"
 ALG_usa_inv: "邀请美国投资"
 ALG_usa_inv_desc: "美国能够提供先进技术和雄厚资金支持。与华盛顿的合作或将重塑阿尔及利亚的工业与服务业，使其成为全球竞争者。"
 ALG_russian_inv: "俄罗斯经济合作"
 ALG_russian_inv_desc: "俄罗斯长期以来一直是我们在能源和国防领域的战略盟友。将合作拓展至更广泛的经济项目，将强化我们的工业和军事支柱。"
 ALG_iran_inv: "与伊朗的伙伴关系"
 ALG_iran_inv_desc: "阿尔及利亚与伊朗都拥有不结盟和反对外国支配的历史。加强与德黑兰的联系，或许能在能源合作、工业项目和地区外交方面开辟新途径，尽管这可能引起西方伙伴的担忧。"
 ALG_italia_inv: "增强意大利纽带"
 ALG_italia_inv_desc: "意大利是阿尔及利亚在欧洲最亲密的伙伴之一，特别是在能源领域通过埃尼集团发挥着重要作用。深化与罗马的合作，将有助于我们获得关键的基础设施投资，促进地中海贸易，并巩固我们作为欧洲重要能源供应国的地位。"
 ALG_algiers_metro_expansion: "扩建阿尔及尔地铁"
 ALG_algiers_metro_expansion_desc: "阿尔及尔正饱受交通拥堵和基础设施陈旧之苦。扩建地铁系统不仅能实现交通现代化，更能向投资者与市民彰显城市的发展决心。"
 ALG_cevital_group_expansion: "赛维塔集团扩张"
 ALG_cevital_group_expansion_desc: "赛维塔，阿尔及利亚的龙头企业集团，有潜力成为非洲大陆的巨头。支持其发展将创造就业机会，并加速工业现代化进程。"
 ALG_scientific_research_push: "促进科学研究"
 ALG_scientific_research_push_desc: "创新是长期增长的关键。通过投资科学研究，阿尔及利亚可以为知识经济奠定基础。"
 ALG_expand_higher_education: "扩大高等教育规模"
 ALG_expand_higher_education_desc: "大学和技术学校必须进行扩建和现代化改造，以满足21世纪的需求。受过更好教育的民众将同时增强社会和经济实力。"
 ALG_digitalize_education: "数字化教育"
 ALG_digitalize_education_desc: "数字平台、在线学习和信息技术整合将彻底改变阿尔及利亚的教育领域，培养出技能更强、适应性更高的劳动力队伍。"
 ALG_national_research_program: "启动国家研究计划"
 ALG_national_research_program_desc: "将大学、产业界和政府联合起来，通过协调的国家研究计划，阿尔及利亚将能够跟上全球技术发展的步伐。"
 ALG_industry: "扩建阿尔及利亚工业"
 ALG_industry_desc: "阿尔及利亚的工业必须实现多元化与现代化。通过促进工业增长，我们可以降低对碳氢化合物的依赖，构建更加平衡的经济体系。"
 ALG_constantine_hub: "发展君士坦丁工业中心"
 ALG_constantine_hub_desc: "市是重要的区域中心。在此投资将打造新的工业枢纽，将发展辐射至阿尔及尔以外地区。"
 ALG_tlemcen_agro_industry: "促进特莱姆森农业产业"
 ALG_tlemcen_agro_industry_desc: "特莱姆森的农业和食品加工业可以发展成为一个强大的农工综合体，既能养活国民，又能创造就业机会。"
 ALG_snvi_modernization: "SNVI现代化"
 ALG_snvi_modernization_desc: "SNVI，阿尔及利亚的国家汽车制造商，必须实现现代化以在全球竞争中立足。扩大生产能力将巩固我们的运输和工业基础。"
 ALG_annaba_steel_complex: "安纳巴钢铁联合体"
 ALG_annaba_steel_complex_desc: "安纳巴拥有阿尔及利亚最大的钢铁生产基地。对其进行现代化改造和扩建，将为未来的基础设施和国防工业奠定坚实基础。"
 ALG_arzew_refinery: "阿尔泽夫炼油厂扩建"
 ALG_arzew_refinery_desc: "阿尔泽夫的炼油厂是我们能源出口的关键环节。扩大其产能将确保外汇流入，并巩固阿尔及利亚国家石油公司的优势地位。"
 ALG_pipeline_modernization: "升级管道系统"
 ALG_pipeline_modernization_desc: "现代化的管道系统对于安全、高效的能源出口至关重要。升级我们的管道将减少损耗，并提升国际信誉。"
 ALG_skikda_port_modernization: "现代化斯基克达港"
 ALG_skikda_port_modernization_desc: "斯基克达港对贸易和能源出口至关重要。实现其设施现代化将确保阿尔及利亚保持具有竞争力的海运枢纽地位。"
 ALG_grant_foreign_energy_concessions: "授予外国能源特许权"
 ALG_grant_foreign_energy_concessions_desc: "通过向外国公司提供特定特许权，阿尔及利亚能够吸引资本与技术，但代价是可能丧失部分能源自主权。"
 ALG_hassi_messaoud_expansion: "扩建哈西迈萨乌德油田"
 ALG_hassi_messaoud_expansion_desc: "哈西迈萨乌德油田是阿尔及利亚最大的油田。扩大开采和炼油能力将极大提升我们的能源产量。"
 ALG_expand_sonatrach: "扩大国家石油公司"
 ALG_expand_sonatrach_desc: "阿尔及利亚国家石油是阿尔及利亚经济的命脉。强化这家公司将确保我们在全球石油和天然气生产中的重要地位。"
 ALG_protect_oil_gas_facilities: "保护油气设施"
 ALG_protect_oil_gas_facilities_desc: "我们的能源基础设施在战争或动荡时期十分脆弱。加强油气设施周边的防御对国家安全至关重要。"
 ALG_minister_of_agriculture_reforms: "农业改革计划"
 ALG_minister_of_agriculture_reforms_desc: "多年的忽视削弱了阿尔及利亚的农业。农业部推行的新改革将恢复生产力，并减少对粮食进口的依赖。"
 ALG_modernize_agricultural_sector: "农业部门现代化"
 ALG_modernize_agricultural_sector_desc: "多年的冲突与忽视使阿尔及利亚的农场设备陈旧、效率低下。机械化、灌溉系统和补贴将重振农业部门，确保我们人民的粮食安全。"
 ALG_rural_development_program: "农村发展计划"
 ALG_rural_development_program_desc: "阿尔及利亚的乡村长期以来饱受投资不足之苦。通过将资金投入农村基础设施、电力及就业领域，我们将缩小城乡差距，增强国家凝聚力。"
 ALG_promote_algerian_produce: "推广阿尔及利亚农产品"
 ALG_promote_algerian_produce_desc: "我们的土地出产多种多样的农作物和天然产品，但本地市场却被外国进口商品所主导。通过品牌建设、补贴和贸易激励措施，我们将提升阿尔及利亚商品在国内外市场的知名度。"
 ALG_build_farm_to_market_roads: "从农场到市场"
 ALG_build_farm_to_market_roads_desc: "农民需要更好地接触消费者和出口渠道。修建从农村地区通往城市中心以及跨越突尼斯边境的道路，将增强我们的农业部门并加强区域联系。"
 ALG_new_agro_industrial_complexes: "新型农工综合体"
 ALG_new_agro_industrial_complexes_desc: "阿尔及利亚必须将农业与现代工业联系起来。通过建设农工综合体，我们可以创造高附加值产品、提供就业机会并提高农村收入。"
 ALG_invest_tourism: "投资旅游业"
 ALG_invest_tourism_desc: "战争年代之前，阿尔及利亚的旅游业曾一度繁荣。通过审慎投资和加强安保，我们可以着手重振这一重要产业。"
 ALG_restore_hotel_resorts: "恢复酒店度假村"
 ALG_restore_hotel_resorts_desc: "阿尔及利亚的许多度假胜地和酒店都处于废墟或失修状态。翻新这些设施将有助于吸引外国游客，并提供国内就业机会。"
 ALG_blida_airbase_modernization: "卜利达空军基地升级"
 ALG_blida_airbase_modernization_desc: "卜利达空军基地是民用旅行和军事运输的关键设施。现代化改造将提升阿尔及利亚的互联互通能力，并促进区域贸易发展。"
 ALG_algiers_oran_highway: "阿尔及尔-奥兰高速公路"
 ALG_algiers_oran_highway_desc: "将阿尔及尔与奥兰通过现代化高速公路连接起来，将缩短运输时间、促进贸易往来，并增强阿尔及利亚的经济支柱。"
 ALG_east_west_highway_project: "东西向高速公路项目"
 ALG_east_west_highway_project_desc: "横跨阿尔及利亚全境的东-西高速公路将成为非洲最大的基础设施项目之一，它将连接我国各地区并促进商业发展。"
 ALG_ski_resorts_of_tikjda: "提克贾滑雪胜地"
 ALG_ski_resorts_of_tikjda_desc: "在卡比利亚山脉中，坐落着提克贾度假村，这里蕴藏着尚未开发的潜力。现代化其设施并推广冬季旅游，将有助于阿尔及利亚经济基础的多元化。"
 ALG_north_african_tourism_hub: "北非旅游枢纽"
 ALG_north_african_tourism_hub_desc: "通过投资我们的海岸线、文化遗产和自然景观，阿尔及利亚有望成为北非领先的旅游目的地，与地中海邻国一较高下。"
 ALG_it_investments: "IT投资"
 ALG_it_investments_desc: "随着信息技术日新月异的发展，未来我们已离不开它。因此，现在是投资这一领域的最佳时机。"
 ALG_infrastructure_investments: "基础设施投资"
 ALG_infrastructure_investments_desc: "90年代之后，我们的基础设施状况很糟糕。是时候重建了。"
 ALG_science_idea: "阿尔及利亚文教"
 ALG_fuel: "阿尔及利亚燃料"
 ALG_dziri: "阿尔及利亚民族"
 ALG_dziri_desc: "阿尔及利亚必须解决其紧迫的社会问题：从传统与伊斯兰教到阿马齐格人权利及民主改革。我们选择的道路将塑造这个国家的未来。"
 ALG_traditions_matter: "传统至关重要"
 ALG_traditions_matter_desc: "阿尔及利亚人民坚守信仰、家庭和民族认同。我们的政府必须尊重这些传统，才能维持其合法性。"
 ALG_restrict_women_roles: "保留家庭法典"
 ALG_restrict_women_roles_desc: "保守派领导人主张，女性的角色应继续以家庭为核心。改革《家庭法典》可能会激怒宗教权威和公众。"
 ALG_expand_berber_rights: "承认阿马齐格权利"
 ALG_expand_berber_rights_desc: "柏柏尔身份认同运动要求获得充分的文化和语言认可。赋予阿马齐格人权利将缓解紧张局势，但可能会疏远强硬派。"
 ALG_censor_internet: "审查互联网"
 ALG_censor_internet_desc: "社交媒体和网络活动助长了抗议活动。限制网络自由将恢复国家控制，但会损害我们的国际形象。"
 ALG_open_civil_society: "释放民间力量"
 ALG_open_civil_society_desc: "民主力量推动建立自由的公民社会、非政府组织和\"希拉克\"运动协会。开放这一领域将增强合法性，但存在政治碎片化的风险。"
 ALG_integration_policy: "融合政策"
 ALG_integration_policy_desc: "撒哈拉以南移民和归国侨民面临挑战。一项结构化的融合政策能够缓解社会紧张，促进凝聚力。"
 ALG_marriage_subsidies: "婚姻补贴"
 ALG_marriage_subsidies_desc: "年轻人成家立业困难重重，提供住房和婚礼补贴将有助于稳定社会，促进家庭组建。"
 ALG_constitutionalize_rights: "权利入宪"
 ALG_constitutionalize_rights_desc: "我们可以通过宪法改革来确立公民自由、妇女权利和阿马齐格人认可。这将标志着一场永久性的社会变革。"
 ALG_berber_right: "承认阿马齐格权利"
 ALG_berber_right_desc: "阿马齐格身份已获得官方承认，提升了柏柏尔人占多数地区的稳定性。"
 Algeria.238.t: "稳定马里局势"
 Algeria.238.d: "马里持续的冲突正威胁着整个萨赫勒地区的稳定。图阿雷格分离主义者和圣战组织在我国南部边境制造了安全危机。阿尔及利亚绝不能坐视不稳定局势蔓延。我们必须决定是支持马里政府恢复秩序，还是与图阿雷格派系进行谈判，以期达成持久解决方案。"
 Algeria.238.a: "支持马里政府"
 Algeria.238.b: "支持图阿雷格"
 ALG_us_invest_tt: "寻求美国投资"
 ALG_fra_invest_tt: "寻求法国投资"
 ALG_eng_invest_tt: "寻求英国投资"
 ALG_chi_invest_tt: "寻求中国投资"
 ALG_rus_invest_tt: "寻求俄国投资"
 ALG_open_to_west: "对西方开放"
 ALG_open_to_west_desc: "阿尔及利亚长期奉行中立政策，但时代正在改变。与西方世界更紧密地结盟，或许能为我们带来稳定、安全与投资机遇。"
 ALG_nato_partnership: "北约伙伴关系"
 ALG_nato_partnership_desc: "我们将探索与北约组织的结构化合作。这一伙伴关系将提升阿尔及利亚的国际地位，并助力我国武装力量的现代化进程。"
 ALG_energy_partnership_eu: "欧盟能源伙伴关系"
 ALG_energy_partnership_eu_desc: "阿尔及利亚丰富的能源储备在欧洲备受青睐。通过与法国和英国建立能源合作伙伴关系，我们可以获得利润丰厚的合同与长期投资。"
 ALG_strengthen_eu_trade: "加强欧盟贸易关系"
 ALG_strengthen_eu_trade_desc: "欧洲仍是我们最大的贸易伙伴。加强这些经济联系将稳定我们的出口市场，并推动阿尔及利亚进一步融入全球贸易体系。"
 ALG_expand_us_partnership: "扩大美国伙伴关系"
 ALG_expand_us_partnership_desc: "美国寻求北非地区的稳定。通过与华盛顿扩大经济与安全合作，阿尔及利亚能够吸引投资并获得强大的盟友。"
 ALG_become_nato_ally: "成为北约盟友"
 ALG_become_nato_ally_desc: "虽然加入北约正式成员国可能为时过早，但阿尔及利亚可以争取成为值得信赖的盟友。这将使我们获得军事专业知识、联合演习和外交影响力。"
 ALG_exchange_research_with_nato: "北约技术交换"
 ALG_exchange_research_with_nato_desc: "与北约盟友的科学合作将使阿尔及利亚受益于联合研究、军事技术共享以及我国教育和研究机构的现代化。"
 ALG_get_nato_military_exp: "北约军事经验"
 ALG_get_nato_military_exp_desc: "北约组织广泛的军事训练和条令提供了宝贵的专业知识。阿尔及利亚武装力量将通过联合训练演习和战略指导实现现代化。"
 ALG_counterterrorism_coordination: "反恐协调"
 ALG_counterterrorism_coordination_desc: "恐怖主义仍是北非地区的主要威胁。通过与北约情报及反恐部门协调合作，阿尔及利亚能够加强国内安全与区域稳定。"
 ALG_get_investements_from_nato: "吸引北约投资"
 ALG_get_investements_from_nato_desc: "我们与北约的结盟将吸引来自联盟成员的经济支持和基础设施项目，确保阿尔及利亚经济获得长期利益。"
 ALG_strengthen_democratic_norms: "加强民主规范"
 ALG_strengthen_democratic_norms_desc: "为了完全融入西方世界，阿尔及利亚必须加强民主制度。这包括保护公民自由、支持多元主义以及鼓励政治改革。"
 ALG_seek_greater_influence_in_wto: "寻求在世贸组织中的更大影响力"
 ALG_seek_greater_influence_in_wto_desc: "随着阿尔及利亚的发展，我们必须扩大在世界贸易组织中的作用，确保在全球经济谈判中我们的声音被倾听。"
 ALG_seek_security_council_seat: "寻求联合国安理会席位"
 ALG_seek_security_council_seat_desc: "阿尔及利亚的外交历史和维和记录为我们争取联合国安理会常任理事国席位提供了有力论据。我们必须全力推进这一目标。"
 ALG_join_nato: "加入北约"
 ALG_join_nato_desc: "经过数十年的中立与谨慎平衡，阿尔及利亚如今准备迈出历史性的一步：正式加入北大西洋公约组织。这一决定将巩固我国在西方强国中的地位，并重塑我们的外交政策。"
 ALG_global_companies: "邀请全球企业"
 ALG_global_companies_desc: "通过向外国投资者开放市场，阿尔及利亚能够吸引全球企业在我国经济中建立业务。这将促进工业增长、技术转移并提升国际声望。"
 ALG_huawei: "华为电信"
 ALG_huawei_desc: "华为已提议在阿尔及利亚建设先进的电信基础设施，为我们提供现代化的数字骨干网络，确保我们在信息时代的重要地位。"
 ALG_hyundai: "现代工业扩张"
 ALG_hyundai_desc: "现代集团已表示有兴趣投资阿尔及利亚的汽车和工业领域。通过引进他们的工厂，我们可以促进就业和技术发展。"
 ALG_weapons_expert: "外国武器专家"
 ALG_weapons_expert_desc: "通过与外国防务公司的合作，阿尔及利亚能够获得支援武器和战术系统方面的新技术，从而增强我国地面部队的实力。"
 ALG_airburst_weapons: "研发空爆武器"
 ALG_airburst_weapons_desc: "空爆技术能让步兵打击掩体后或加固阵地内的敌人。投资这项尖端系统将极大提升我们的战场效能。"
 ALG_vehicle_industry: "扩展车辆工业"
 ALG_vehicle_industry_desc: "通过与全球汽车制造商和工业公司合作，阿尔及利亚可以建立强大的军用和民用车辆产业，从而同时提升国防力量和经济水平。"
 ALG_advanced_ultility_vehicle: "先进通用载具"
 ALG_advanced_ultility_vehicle_desc: "我们的汽车产业必须迈向先进发展阶段。生产现代化、可靠的通用车辆将增强后勤保障与运输效率。"
 ALG_sat_tech: "卫星技术合作"
 ALG_sat_tech_desc: "通过与全球企业合作，阿尔及利亚能够发展先进的卫星技术，从而提升我们的监控、通信和定位系统能力。"
 ALG_advanced_radar: "先进雷达系统"
 ALG_advanced_radar_desc: "现代雷达与探测技术将提升阿尔及利亚的防御能力，使我们能够融入先进的区域安全框架。"
 ALG_microsoft: "微软数字基建"
 ALG_microsoft_desc: "通过与微软合作，阿尔及利亚能够实现信息技术和软件产业的现代化，从而加强网络安全、推动数字政务建设并促进技术驱动型经济增长。"
 ALG_Lenovo: "联想科技投资"
 ALG_Lenovo_desc: "联想有意扩大在阿尔及利亚的业务。与他们合作将加强我们的计算硬件产业并支持技术创新。"
 ALG_Danone: "达能食品工业"
 ALG_Danone_desc: "欢迎达能在阿尔及利亚食品领域的投资，这将有助于提升营养水平、食品生产标准，并促进国际贸易关系的发展。"
 ALG_toyota: "丰田工业合作"
 ALG_toyota_desc: "通过邀请丰田建立工业和汽车设施，阿尔及利亚能够提升汽车产量、创造就业机会，并推动汽车行业的技术进步。"
 ALG_align_with_south_africa: "与南非结盟"
 ALG_align_with_south_africa_desc: "南非在非洲的政治和经济事务中扮演着领导角色。通过加强我们的伙伴关系，我们可以在整个非洲大陆协调贸易、外交和安全政策。"
 ALG_open_to_east: "向东方开放"
 ALG_open_to_east_desc: "转向东方将多元化我们的伙伴关系，减少对西方的依赖，并在俄罗斯、中国及其他新兴强国的市场中开启机遇。"
 ALG_expand_trade_with_russia: "扩大对俄贸易"
 ALG_expand_trade_with_russia_desc: "俄罗斯向阿尔及利亚提供能源、军备和工业合作的新机遇。加强我们的贸易联系将深化战略关系。"
 ALG_expand_trade_with_china: "扩大对华贸易"
 ALG_expand_trade_with_china_desc: "中国渴望在非洲投资，并向阿尔及利亚提供有利的贸易协议。这种合作可能为我们带来基础设施和工业发展的机遇。"
 ALG_mediterranean_corridor_initiative: "地中海走廊倡议"
 ALG_mediterranean_corridor_initiative_desc: "通过将我们的经济与地中海及东方市场更紧密地连接起来，阿尔及利亚可以确立自身作为贸易和基础设施项目的关键走廊地位。"
 ALG_Investments_From_East: "东方投资"
 ALG_Investments_From_East_desc: "吸引东方投资者将增强我国经济实力，带来新兴产业，并确保阿尔及利亚从多元化的资本来源中获益。"
 ALG_eastern_alignment: "靠近东方"
 ALG_eastern_alignment_desc: "与俄罗斯、中国及其盟友加强结盟，将为阿尔及利亚在安全、贸易和技术领域带来新的合作伙伴，同时削弱西方的影响力。"
 ALG_china_civ: "中国民间投资"
 ALG_china_civ_desc: "中国企业已准备好向阿尔及利亚的民用工业领域扩张。这些项目将创造就业机会并加速现代化进程。"
 ALG_china_civ2: "中国民用项目进展"
 ALG_china_civ2_desc: "在早期投资取得成功后，中国正提供额外投资，以进一步扩大阿尔及利亚的民用工业基础。"
 ALG_chinese_armor_deal: "中国装甲协议"
 ALG_chinese_armor_deal_desc: "中国已提议向阿尔及利亚出售装甲车辆和技术包。这项交易将提升我们的陆军实力，并深化两国防务关系。"
 ALG_joint_military_exercise_with_rus: "俄罗斯联合军演"
 ALG_joint_military_exercise_with_rus_desc: "通过与俄罗斯进行联合演习，阿尔及利亚将提升军事协调能力，并学习俄罗斯的实战经验。"
 ALG_russia_inf_tech: "俄罗斯步兵科技"
 ALG_russia_inf_tech_desc: "俄罗斯在小型武器和步兵战术方面的专长可适应阿尔及利亚的需求，这将为我们的士兵提供更精良的装备和训练。"
 ALG_russia_experience: "莫斯科防务合作"
 ALG_russia_experience_desc: "深化与俄罗斯的军事合作将为阿尔及利亚带来经验丰富的顾问和训练项目。我们的武装力量将变得更加强大，准备更加充分。"
 ALG_idea_parliamentary_republic: "人民国民议会"
 ALG_idea_presidential_republic: "总统制"
 ALG_idea_semi_presidential_republic: "阿尔及利亚人民民主共和国"
 ALG_release_political_pirsoners: "释放政治犯"
 ALG_release_political_pirsoners_desc: "为开启国家新篇章，新政府将释放动荡年代因政治原因被拘留的人员。这一宽恕之举旨在促进民族团结，重建人民与国家之间的信任。"
 ALG_al_jazair_al_djadida: "新阿尔及利亚"
 ALG_al_jazair_al_djadida_desc: "总统阿卜杜勒马吉德·特本承诺打造一个“新阿尔及利亚”，旨在通过宪法和行政改革重塑国家合法性，加强民主制度与公众信任。"
 ALG_republic_of_algeria: "阿尔及利亚共和国"
 ALG_republic_of_algeria_desc: "改革基础奠定后，阿尔及利亚重申其作为一个共和国的身份认同，以国家主权、社会公正和公民意志为指引。"
 ALG_majlis_al_watani_al_shaabi: "人民国民议会"
 ALG_majlis_al_watani_al_shaabi_desc: "议会共和制将赋予民选代表引导国家方向的权力，限制行政部门的支配地位，确保集体决策机制的有效运行。"
 ALG_jumhorya_democratia_shaabia: "阿尔及利亚人民民主共和国"
 ALG_jumhorya_democratia_shaabia_desc: "维持行政与立法权之间的半总统制平衡，可以稳定阿尔及利亚的转型进程，既能防止威权主义回潮，又能确保治理的果断性。"
 ALG_deep_state_republic: "深层政府共和国"
 ALG_deep_state_republic_desc: "在改革的表象背后，新的权力结构正在浮现。前将军、商人和官僚们在暗影中巩固着控制。这个\"深层政府共和国\"维持着民主的幻象，同时守护着其影响力与腐败的网络。"
 ALG_tamazgha: "塔马兹加之梦"
 ALG_tamazgha_desc: "塔马兹加——这片从大西洋延伸至尼罗河的阿马齐格人土地，重生的时刻已经来临。在自由与团结的旗帜下，北非迎来了新的曙光。"
 ALG_our_land: "我们神圣的土地"
 ALG_our_land_desc: "我们的人民必须收复并重建那些一直属于我们的土地。工业、人力与勇气将是我们重获新生的祖国的基石。"
 ALG_expand_our_army: "扩编军队"
 ALG_expand_our_army_desc: "塔马兹加的防御仰赖于我军的力量。我们必须训练、武装并扩充我们的部队，以保护我们新生的国家免受众多敌人的威胁。"
 ALG_berber_of_tunisia: "突尼斯柏柏尔人"
 ALG_berber_of_tunisia_desc: "我们突尼斯的阿马齐格兄弟长期处于外国统治之下。是时候让他们团结在塔马兹加旗帜下，解放他们的土地了。"
 ALG_libya_invasion: "入侵利比亚"
 ALG_libya_invasion_desc: "从撒哈拉的沙海到的黎波里的海岸，利比亚理当是我们文化家园的一部分。我们必须将其纳入塔马兹加的统一版图。"
 ALG_take_egypt: "进军埃及"
 ALG_take_egypt_desc: "埃及掌控着塔马兹加东部边境的关键。其丰富的资源和战略重要性，使其成为我们宏图伟业中不可或缺的一环。"
 ALG_canary_island: "夺取加那利群岛"
 ALG_canary_island_desc: "加那利群岛曾由阿马齐格人——关契斯族居住。我们将让这些岛屿重归阿马齐格主权之下。"
 ALG_take_niger: "宣称尼日尔"
 ALG_take_niger_desc: "尼日尔的图阿雷格人拥有阿马齐格的血统和传统。他们的沙漠将再次融入伟大的塔马兹加联邦。"
 ALG_rif_in_morocco: "摩洛哥里夫"
 ALG_rif_in_morocco_desc: "里夫山脉孕育了反抗殖民主义的英雄。他们的英勇激励我们以阿马齐格事业统一摩洛哥。"
 ALG_demand_mali: "索要马里"
 ALG_demand_mali_desc: "马里这片土地，历史悠久、文化丰富，曾是伟大的阿马齐格帝国的一部分。现在，是时候恢复我们在萨赫勒地区的影响力了。"
 ALG_demand_mauritania: "索要毛里塔尼亚"
 ALG_demand_mauritania_desc: "毛里塔尼亚的沙漠承载着深入我们历史的阿马齐格根基。它与塔马兹加的统一，是我们大陆命运的下一个篇章。"
 ALG_TAM_unite_tamazgha: "统一塔马兹加"
 ALG_TAM_unite_tamazgha_desc: "所有阿马齐格的土地必须统一在同一旗帜下。塔马兹加不再是一个梦想——它是我们必将完成的使命。"
 ALG_expand_more: "联邦外扩"
 ALG_expand_more_desc: "塔马兹加绝不能停滞不前。工业与领土的双重扩张，将确保我们成为非洲与地中海地区的强国。"
 ALG_focus_on_our_land: "内圣之道"
 ALG_focus_on_our_land_desc: "与其过度扩张，不如专注于发展我们的土地——提升我们在塔马兹加地区的影响力、经济实力和内部团结。"
 ALG_expand_to_ME: "向中东扩张"
 ALG_expand_to_ME_desc: "中东地区正陷入混乱。凭借力量与决心，塔马兹加能够为阿拉伯土地带来秩序与阿马齐格人的领导。"
 ALG_take_arabia: "征服阿拉伯"
 ALG_take_arabia_desc: "阿拉伯半岛四分五裂，积弱不振。我们将把塔马兹加之光带到这片土地，确保我们对红海和海湾的统治。"
 ALG_take_levant: "夺取黎凡特"
 ALG_take_levant_desc: "从黎巴嫩的山脉到叙利亚和巴勒斯坦的平原，黎凡特地区将归于塔马兹加的旗帜之下，让我们更接近掌控文明的摇篮。"
 ALG_legacy_of_dihiya: "迪希亚的遗产"
 ALG_legacy_of_dihiya_desc: "迪希亚女王，奥雷斯山脉的无畏战士，曾团结阿马齐格诸部共御外敌。她那不屈的斗志与领袖风范至今仍在我们民族的血脉中流淌。我们传承着她的遗志 - 永不屈服、百折不挠、誓守自由。"
 ALG_de_arabisation_mission_desc: "全国性的文化与语言改革运动正在进行中。官僚体系与教育系统正在重构，以传承阿马齐格文化遗产。这场变革短期内会造成压力，但从长远来看将增强我们的国力。"
 ALG_dearabisation_end_TT: "§G去阿拉伯化进程完成。§!阿拉伯核心地区已被阿马齐格核心取代，我们获得了国家精神§Y\"阿马齐格人的坚韧\"§!。"
 ALG_de_arabisation: "去阿拉伯化运动"
 ALG_de_arabisation_desc: "几个世纪以来，我们民族的真实身份一直被强加的文化所掩盖。我们将通过改革教育、行政和语言政策来重拾我们的根基——即使这会在短期内给社会带来动荡。"
 ALG_dearabisation_penalty: "行政动荡"
 ALG_dearabisation_penalty_desc: "去阿拉伯化进程扰乱了国家官僚体系和教育系统。政府试图以阿马齐格人的形象重建机构，但转型过程中充斥着抵制、混乱和效率低下的问题。"
 ALG_imazighen_perseverance: "柏柏尔人的坚韧"
 ALG_imazighen_perseverance_desc: "历经磨难与改革，我们的人民坚韧不拔。阿马齐格精神已证明不可摧毁 - 我们从风暴中走出，更加强大、更加自豪、更加团结。"
 ALG_el_salam_nuclear_reactor: "萨拉姆核反应堆"
 ALG_el_salam_nuclear_reactor_desc: "为满足阿尔及利亚日益增长的能源需求并减少对化石燃料的依赖，政府将开始建设萨拉姆核反应堆。该项目标志着阿尔及利亚在科学进步和能源多元化道路上迈出了重要一步。"
 ALG_uranium_enrichment: "铀浓缩计划"
 ALG_uranium_enrichment_desc: "发展国内铀浓缩能力将使阿尔及利亚能够自主管理其核燃料供应。通过这一计划，我们的科学家旨在掌握离心机技术，实现核能自给自足。"
 ALG_el_nour_nuclear_facility: "埃尔努尔核设施"
 ALG_el_nour_nuclear_facility_desc: "继埃勒萨拉姆反应堆取得成功后，阿尔及利亚将通过建设埃勒努尔设施来扩大其核基础设施——该设施将成为研究、反应堆维护及和平核能发展的中心。"
 ALG_ask_for_help_from_india: "寻求印度援助"
 ALG_ask_for_help_from_india_desc: "印度在国际监督下发展核能已有数十年经验。通过寻求与新德里的技术和科学合作，阿尔及利亚可以更快推进其民用核计划。"
 ALG_buy_pinaka_launcher: "购买皮纳卡火箭炮"
 ALG_buy_pinaka_launcher_desc: "印度制造的皮纳卡多管火箭炮系统是一种经济高效且可靠的装备。获取这些发射器将增强阿尔及利亚炮兵部队的实力，并促进与印度更紧密的军事合作。"
 ALG_indian_missiles: "获取印度导弹技术"
 ALG_indian_missiles_desc: "通过与印度扩大防务合作，阿尔及利亚有望获得先进的导弹制导与推进系统。整合这项技术将极大增强我们的国防实力。"
 ALG_subsidise_amazigh_businesses: "资助阿马齐格人企业"
 ALG_subsidise_amazigh_businesses_desc: "为阿马齐格企业家提供国家补贴和优惠政策支持，鼓励塔马兹加地区的经济增长。"
 ALG_leave_arab_league: "退出阿拉伯联盟"
 ALG_leave_arab_league_desc: "退出阿拉伯联盟，主张与阿拉伯集团政治分离的独立阿马齐格主权身份。"
 ALG_bring_back_amazigh_exiles: "迎回阿马齐格流亡者"
 ALG_bring_back_amazigh_exiles_desc: "促进阿马齐格流亡者和移民回归，为重新定居提供激励措施。"
 ALG_boost_kabyle_population: "鼓励卡比利亚人口增长"
 ALG_boost_kabyle_population_desc: "实施政策，通过激励措施、重新安置和支持来提高卡比利亚族的人口比例。"
 ALG_de_arabisation_category: "塔马兹加去阿拉伯化计划"
 ALG_de_arabisation_category_desc: "要建立一个新的塔马兹加，我们必须摆脱强加的阿拉伯身份，恢复我们国家阿马齐格人的灵魂。"
 ALG_de_arabisation_mission: "去阿拉伯化进程"
 ALG_return_amazigh_exiles: "迎回阿马齐格流亡者"
 ALG_return_amazigh_exiles_desc: "多年的歧视迫使许多人背井离乡。现在是时候让他们重返家园了。"
 ALG_dearabisation_fail_TT: "失败会削弱稳定并加剧民族紧张关系。"
 ALG_amazigh_businesses_complete_TT: "卡比利亚人满意度与经济状况得到改善。"
 ALG_amazigh_businesses_fail_TT: "失败会降低卡比利亚人的满意度。"
 ALG_return_exiles_complete_TT: "流亡者回归增强了阿马齐格人的身份认同与人力。"
 ALG_return_exiles_fail_TT: "未能迎回流亡者削弱了团结。"
 ALG_leave_arab_league_complete_TT: "脱离阿拉伯联盟增强了塔马兹加的主权。"
 ALG_leave_arab_league_fail_TT: "拒绝退出将引发动荡。"
 ALG_kabyle_pop_complete_TT: "卡比利亚人口增长，国家凝聚力提升。"
 ALG_kabyle_pop_fail_TT: "忽视卡比利亚人口结构会引发动荡。"
 ALG_tamazgha_cultural_revival_category: "塔马兹加文化复兴"
 ALG_tamazgha_cultural_revival_category_desc: "阿拉伯化进程已告终结，是时候重振我们的文化、语言与思想遗产——塔马兹加的复兴由此开启。"
 ALG_amazigh_language_reform: "阿马齐格语改革"
 ALG_amazigh_language_reform_desc: "我们必须恢复塔马齐格特语作为国家语言，并通过教育和行政管理来推广它。"
 ALG_tamazight_in_education: "塔马齐格特语教育"
 ALG_tamazight_in_education_desc: "在学校和大学中推行塔马齐格特语教学，以保护我们的文化根基。"
 ALG_media_cultural_independence: "文化和媒体独立性"
 ALG_media_cultural_independence_desc: "支持不受外部影响的独立阿马齐格媒体和文化活动。"
 ALG_tamazgha_regional_cooperation: "塔马兹加区域合作"
 ALG_tamazgha_regional_cooperation_desc: "将北非阿马齐格血统国家团结在合作框架内，共创美好未来。"
 ALG_amazigh_language_reform_complete_TT: "塔马齐格特语成为国家语言，促进了教育发展。"
 ALG_amazigh_language_reform_fail_TT: "教育改革的失败会延缓文化复兴。"
 ALG_tamazight_in_education_complete_TT: "塔马齐格特语已成功引入教育课程。"
 ALG_tamazight_in_education_fail_TT: "教育体系仍然以阿拉伯语为主导。"
 ALG_media_cultural_independence_complete_TT: "独立的阿马齐格媒体增强了民族认同感。"
 ALG_media_cultural_independence_fail_TT: "不采取行动会削弱文化影响力。"
 ALG_tamazgha_regional_cooperation_complete_TT: "塔马兹加各民族实现了区域统一。"
 ALG_tamazgha_regional_cooperation_fail_TT: "未能建立合作关系使塔马兹加陷入孤立。"
 ALG_black_decade_lesson: "黑色十年的教训"
 ALG_black_decade_lesson_desc: "上世纪90年代的内战给国家留下了深深的创伤，使一代人对极端主义和动荡局势充满警惕。国家从这段黑暗的历史中汲取了惨痛的教训，致力于维护国家统一、加强安全机构建设，并避免意识形态对抗带来的混乱。然而，这些教训也为旧势力继续掌控政治提供了理由，因为对历史重演的恐惧仍然影响着每一项改革。"
 AlgeriaElections.1.t: "选举"
 AlgeriaElections.1.d: "多年来，阿尔及利亚首次迎来真正意义上的竞争性选举。数百万公民前往投票站，决心在经历了数十年的政治停滞后塑造国家的未来，空气中弥漫着期待与紧张的气氛。多股势力主导着阿尔及利亚的政治格局。\n\n一个由改革派、自由派和温和派伊斯兰派组成的联盟，致力于争取民主、透明和民族和解。他们的愿景是解散“权力集团”，恢复政府的合法性。他们的诉求在寻求真正变革的青年、公民社会和工人中引起了强烈的共鸣。\n\n另一阵营由务实的独立人士和技术官僚组成 - 他们寻求从内部进行改革。他们优先考虑逐步推进民主化、改善治理和经济自由化，同时维护稳定与安全。\n\n随着选票统计完毕，一个政党胜出 - 每个政党都代表着国家未来发展的不同道路。"
 AlgeriaElections.1.a: "社会主义力量阵线宣布胜利"
 AlgeriaElections.1.b: "民族民主联盟赢得大选"
 AlgeriaElections.1.c: "和平社会运动获得授权"
 AlgeriaElections.1.dd: "争取文化与民主联盟掌权"
 AlgeriaElections.2.t: "选举"
 AlgeriaElections.2.d: "举国瞩目的选举终于到来，全国屏息凝神。执政的民族解放阵线再次成为阿尔及利亚政治体系的核心支柱，吸引着那些在经历了“黑色十年”的动荡之后仍然珍视稳定、团结和延续性的人们。在总统阿卜杜勒-阿齐兹·布特弗利卡及其忠诚的建制派领导下，民族解放阵线承诺在不造成混乱的情况下实现现代化，在不造成分裂的情况下进行改革。\n\n反对派运动虽然声势浩大、形式多样，但依然四分五裂，无法形成足以挑战旧势力的统一战线。许多阿尔及利亚人厌倦了动荡，渴望秩序，于是投票支持熟悉的政权 - 他们坚信经验和安全感远胜于变革的风险。\n\n随着最终投票结果的统计，结果变得明朗起来：革命的遗产仍然至高无上。"
 AlgeriaElections.2.a: "民族解放阵线再次获胜！"
 ALG_election_time: "选举期间"
 ALG_election_time_desc: "阿尔及利亚正准备迎接又一个至关重要的选举季。执政党民族解放阵线和反对党都在积极筹备竞选活动，政治局势因此变得紧张。"
 ALG_FLN_media_control: "国控媒体"
 ALG_FLN_media_control_desc: "政府通过加强对新闻媒体和电视的控制，确保公众舆论始终忠于执政的民族解放阵线及其稳定愿景。"
 ALG_loyal_military: "忠诚的军队"
 ALG_loyal_military_desc: "事实证明，军队是政权的可靠守护者，确保秩序和国家统一高于一切。"
 ALG_FLN_state_led_development: "国家主导发展"
 ALG_FLN_state_led_development_desc: "国家指导经济的主要部门，确保工业和社会发展始终处于国家控制之下。"
 ALG_FLN_oil_for_people: "人民的石油"
 ALG_FLN_oil_for_people_desc: "政府利用该国丰富的油气财富提供福利和补贴，促进以经济再分配为基础的社会契约。"
 ALG_FLN_national_security_council: "国家安全委员会"
 ALG_FLN_national_security_council_desc: "负责协调内部安全和反间谍工作的高级机构，确保迅速消除对国家的威胁。"
 ALG_FLN_industrial_nationalization: "工业国有化"
 ALG_FLN_industrial_nationalization_desc: "为保护阿尔及利亚的经济主权，民族解放阵线政府已采取措施重新控制关键行业。"
 ALG_FLN_legacy_of_stability: "稳定的传承"
 ALG_FLN_legacy_of_stability_desc: "尽管存在缺陷，但民族解放阵线政府带来了延续性和稳定性 - 这是许多阿尔及利亚人在经历了多年的动荡之后所珍视的。"
 ALG_FLN_oil_for_people_idea: "人民的石油"
 ALG_FLN_oil_for_people_idea_desc: "政府决定将石油收入直接用于公共项目和补贴。虽然这提高了人民的生活水平，但也存在长期效率低下和依赖性的风险。"
 ALG_FLN_legacy_of_stability_idea: "稳定的传承"
 ALG_FLN_legacy_of_stability_idea_desc: "几十年来，民族解放阵线一直标榜自己是阿尔及利亚稳定的捍卫者。它对政治和安全的严密控制确保了和平 - 但代价是自由受到限制。"
 ALG_FLN_industrial_nationalization_idea: "工业国有化"
 ALG_FLN_industrial_nationalization_idea_desc: "为确保国家独立，引导工业发展走上政府规划之路，经济的主要部门正被置于国家控制之下。"
 ALG_FLN_state_led_development_idea: "国家主导发展"
 ALG_FLN_state_led_development_idea_desc: "国家在引导阿尔及利亚经济增长方面发挥积极作用，强调基础设施、教育和社会福利，以加强国家基础。"
 ALG_FLN_media_control_idea: "信息条例"
 ALG_FLN_media_control_idea_desc: "信息条例确立了管理新闻和广播活动的法律框架，使国家能够监管媒体运作并指导国家信息空间。"
 ALG_FLN_national_security_council_idea: "国家安全委员会"
 ALG_FLN_national_security_council_idea_desc: "一个由军方、情报部门和高级官员组成的强大委员会负责监督内部稳定和国家战略，确保对民族解放阵线政府的忠诚。"
 ALG_loyal_military_idea: "忠诚的军队"
 ALG_loyal_military_idea_desc: "军队依然效忠于民族解放阵线，将秩序和等级制度置于一切之上。这种团结导致其适应能力和战场主动性下降。"
 ALG_loyal_military2_idea: "忠诚的军事集团"
 ALG_loyal_military2_idea_desc: "通过政治整合和特权待遇，军队的忠诚度不断加深，从而确保了在政府指挥下拥有一支强大而纪律严明的军队。"
 ALG_invest_in_youth_idea: "投资青年"
 ALG_invest_in_youth_idea_desc: "旨在教育和雇用阿尔及利亚不断增长的青年人口的计划将塑造该国的未来，培养新一代的专业人才和领导者。"
 ALG_anti_corruption_campaign_idea: "反腐败运动"
 ALG_anti_corruption_campaign_idea_desc: "政府发起了一场根除腐败和官僚主义滥用职权的运动，旨在恢复公众信任，提高国家效率。"
 ALG_new_era_for_algeria_idea: "阿尔及利亚新纪元"
 ALG_new_era_for_algeria_idea_desc: "阿尔及利亚迈入改革和现代化的新时代，在应对不断变化的全球经济挑战的同时，努力平衡创新和社会进步。"
 ALG_open_market_idea: "开放市场政策"
 ALG_open_market_idea_desc: "阿尔及利亚经济的逐步自由化吸引了投资和创业，但同时也存在削弱国家对关键行业传统控制的风险。"
 ALG_reform_education_system_idea: "改革教育系统"
 ALG_reform_education_system_idea_desc: "正在进行全面改革，以实现教育体系现代化，促进创新，并使学校与现代阿尔及利亚经济的需求相适应。"
 ALG_reform_the_judicial_system_idea: "司法改革"
 ALG_reform_the_judicial_system_idea_desc: "阿尔及利亚正在努力实现司法系统现代化，减少腐败，建立维护法治的更公正的法院。"
 ALG_free_media_idea: "自由媒体"
 ALG_free_media_idea_desc: "独立媒体机构开始蓬勃发展，提供透明度和问责制 - 尽管这也增加了批评和公众辩论。"
 ALG_black_decade_lesson_idea: "黑色十年的教训"
 ALG_black_decade_lesson_idea_desc: "内战的创伤至今仍困扰着阿尔及利亚。这个国家依然保持谨慎，将安全置于风险之上，以确保此类动荡不再重演。"
 ALG_election_day: "选举日"
 ALG_election_day_desc: "阿尔及利亚人民是时候选择自己的未来了。执政的民族解放阵线能否继续掌权，还是反对派最终获胜，将决定这个国家未来几十年的走向。"
 ALG_FLN_path: "民族解放阵线胜选"
 ALG_FLN_path_desc: "民族解放阵线再次取得胜利，继续掌控政府和阿尔及利亚的未来方向。"
 ALG_FLN_preserve_system: "维护系统"
 ALG_FLN_preserve_system_desc: "民族解放阵线领导层认为没有必要进行剧烈的变革 - 维护现有秩序能够确保稳定和延续。"
 ALG_FLN_control_media: "通过第12-05号组织法"
 ALG_FLN_control_media_desc: "通过制定规范信息和媒体活动的组织法第12-05号，国家可以在维持新闻监督法律框架的同时，塑造国家叙事。"
 ALG_election_day_tt: "§Y解锁通往阿尔及利亚2000年选举之路。§!\n您很快将不得不在执政党§R民族解放阵线§!与§Y反对派§!之间做出选择，决定国家的未来。"
 ALG_ethnic_kabyle_tt: "§Y卡比利亚人口§!超过§Y10%§!"
 ALG_kabyle_satisfaction_tt: "§Y卡比利亚人满意度§!至少为§Y65§!"
 ALG_kabyle_satisfaction_70_tt: "§Y卡比利亚人满意度§!高于§Y70§!"
 ALG_kabyle_satisfaction_60_tt: "§Y卡比利亚人满意度§!至少为§Y60§!"
 ALG_fossil_fuel_industry: "阿尔及利亚国家石油公司游说团"
 ALG_fossil_fuel_industry_desc: "国有能源巨头阿尔及利亚国家石油公司及其承包商网络是阿尔及利亚最有权势的势力之一。他们捍卫补贴，抵制经济多元化，并与依赖阿尔及利亚石油和天然气的外国公司和政府保持密切联系。"
 ALG_the_military: "国家人民军"
 ALG_the_military_desc: "阿尔及利亚军队 - 即国家人民军 - 是国家的脊梁。它肩负着维护国家统一与稳定的重任，但其强大的实力也限制了民主改革。国家人民军在保卫国家和限制文官统治之间寻求平衡，始终是政治舞台上举足轻重的角色。"
 ALG_industrial_conglomerates: "塞维塔尔 - 马达尔"
 ALG_industrial_conglomerates_desc: "以塞维塔尔和马达尔控股集团等巨头为首的工业集团代表了阿尔及利亚日益壮大的寡头商业精英。这些集团与政治权力关系密切，往往与军方和统治家族纠缠不清，它们通过私有化、消费品、房地产和对外贸易来牟取暴利。它们能够带来亟需的投资和经济增长，但代价却是腐败、不平等和政治权力被攫取。"
 ALG_offices_contruction_speed: "办公园区建设速度"
 ALG_arms_factory_contruction_speed: "军用工厂建设速度"
 ALG_civ_construction_speed: "民用工厂建设速度"
 ALG_population_energy_consumption: "人口能源消耗"
 ALG_civ_factory_workforce: "民用工厂需要工人"
 ALG_mil_factory_workforce: "军用工厂需要工人"
 ALG_office_workforce: "办公园区需要工人"
 ALG_military_modifier: "阿尔及利亚军队"
 ALG_military_modifier_desc: "展现了阿尔及利亚军队的能力和改革。"
 ALG_opposition_path: "反对派之路"
 ALG_opposition_path_desc: "随着政治反对派势力日益壮大，国家面临抉择：要么进行内部改革，要么冒着陷入混乱的风险。现在是时候拥抱透明和进步了。"
 ALG_OPP_free_elections: "举行自由选举"
 ALG_OPP_free_elections_desc: "长期以来，人民的声音一直被压制。真正的民主始于透明、公平的选举。"
 ALG_FLN_military_loyalty: "确保军队忠诚"
 ALG_FLN_military_loyalty_desc: "军队是稳定的支柱。确保他们的忠诚将防止动乱，保障国家的未来。"
 ALG_FLN_public_works: "启动公共工程项目"
 ALG_FLN_public_works_desc: "通过投资公共基础设施，我们能够提供就业机会，并重振人民对政府机构的信心。"
 ALG_reform_armed_forces: "改革武装部队"
 ALG_reform_armed_forces_desc: "军事结构现代化将确保效率、纪律和对国家的忠诚，而不是对个人的忠诚。"
 ALG_counter_extremism: "反恐能力"
 ALG_counter_extremism_desc: "恐怖主义网络威胁着我国的稳定。通过加强情报、安全部队和预防项目，我们可以提升阿尔及利亚的反恐能力。"
 ALG_regional_power: "地区强国"
 ALG_regional_power_desc: "阿尔及利亚实现内部稳定后，便能在北非和地中海地区展现实力和领导力。"
 ALG_expanding_the_power_grid: "拓展电网"
 ALG_expanding_the_power_grid_desc: "可靠的电力供应对经济增长至关重要。扩大电网规模将支持工业和农村发展。"
 ALG_OPP_new_constitution: "起草新宪法"
 ALG_OPP_new_constitution_desc: "新宪法将为民主、平等和文官统治奠定基础。"
 ALG_OPP_media_freedom: "确保媒体自由"
 ALG_OPP_media_freedom_desc: "新闻自由对于追究领导人的责任和向公众提供真实信息至关重要。"
 ALG_OPP_judiciary_reform: "司法改革"
 ALG_OPP_judiciary_reform_desc: "独立透明的司法体系是确保所有公民无论身份或影响力如何都能获得公正待遇的关键。"
 ALG_OPP_education_first: "教育第一"
 ALG_OPP_education_first_desc: "一个现代国家的发展依赖于受过良好教育的人口。投资于中小学和大学将塑造更加美好的未来。"
 ALG_OPP_open_market: "开放市场"
 ALG_OPP_open_market_desc: "经济改革和开放贸易将吸引投资，并为企业家创造机会。"
 ALG_OPP_new_era: "阿尔及利亚新纪元"
 ALG_OPP_new_era_desc: "经过多年的斗争和改革，阿尔及利亚进入了自由、繁荣和稳定的新篇章。"
 ALG_OPP_anti_corruption: "打击腐败"
 ALG_OPP_anti_corruption_desc: "腐败会扼杀国家的潜力。现在是时候制定严格的法律，建立透明的机构，并在各个层面落实问责制了。"
 ALG_OPP_invest_in_youth: "投资青年"
 ALG_OPP_invest_in_youth_desc: "青年是阿尔及利亚的灵魂。通过教育和就业赋能青年，我们才能保障国家的未来。"
 ALG_OPP_state_first: "国家至上"
 ALG_OPP_state_first_desc: "在变革时代，团结和国家利益必须指导每一项政策。国家完整高于党派利益。"
 ALG_terror_2013_in_amenas_title: "2013年阿梅纳斯人质危机"
 ALG_terror_2013_in_amenas_desc: "一群与极端组织有关联的武装分子对阿尔及利亚南部伊纳梅纳斯天然气设施发动了突袭。袭击者劫持了数百名人质，其中包括外国工人，引发了一场国际危机。阿尔及利亚军队迅速包围了该设施，导致双方发生流血冲突，震惊世界，并引发了人们对阿尔及利亚政府应对沙漠地区恐怖主义能力的质疑。"
 ALG_terror_2013_placeholder_option: "我军予以果断回应。"
 ALG_terror_2013_low_tt: "小规模骚乱已得到控制。§G稳定度略有提高。§!"
 ALG_terror_2013_medium_tt: "局势恶化，加剧了§O激进化§!，降低了§R稳定度§!。"
 ALG_terror_2013_high_tt: "袭击事件迅速失控。§R国家稳定度急剧恶化§!，§O激进叛乱分子§!节节攀升。"
 ALG_healthcare_reform_tt: "§Y公众不满§!必须低于§Y40§!才能启动医疗改革。"
 ALG_education_reform_tt: "§Y公众不满§!必须低于§Y40§!才能启动教育改革。"
 ALG_unemployment_reform_tt: "§Y公众不满§!必须低于§Y40§!才能启动失业改革。"
 ALG_employment_TT: "§H失业率§!低于§H20%§!"
 ALG_grand_mosque: "阿尔及尔大清真寺"
 ALG_grand_mosque_desc: "作为阿尔及利亚精神和文化复兴的象征，阿尔及尔大清真寺是世界上最高、最宏伟的清真寺之一。它的建造不仅展现了阿尔及利亚在建筑领域的雄心壮志，也成为了伊斯兰传统和团结的灯塔。这项意义非凡的工程竣工将增强民族自豪感，并提升阿尔及利亚在穆斯林世界的影响力。"
 ALG_big_cities_or_rising_states: "城市或区域发展计划"
 ALG_big_cities_or_rising_states_desc: "战后重建计划结束后，政府必须决定下一步行动 - 是将资源集中用于沿海主要城市以加强阿尔及利亚的工业支柱，还是提升内陆和沙漠地区以实现国家均衡发展？"
 ALG_focus_on_big_cities: "关注主要城市"
 ALG_focus_on_big_cities_desc: "阿尔及尔、奥兰和君士坦丁等城市中心是阿尔及利亚经济的引擎。通过集中发展这些城市，我们可以实现基础设施现代化并提高生产力。"
 ALG_rising_states_program: "省份崛起计划"
 ALG_rising_states_program_desc: "沿海城市繁荣发展，内陆地区却相对滞后。“省份崛起计划”旨在为阿尔及利亚腹地建设道路、学校和工业，确保每个省份都能得到发展。"
 ALG_develop_atlas: "开发阿尔及利亚阿特拉斯"
 ALG_develop_atlas_desc: "阿特拉斯山脉山区蕴藏着巨大的农业和小工业发展潜力。在此投资将改善当地居民的生活水平，并创造长期的粮食安全保障。"
 ALG_develop_kabylia: "扩展卡比利亚地区"
 ALG_develop_kabylia_desc: "卡比利亚地区拥有浓厚的文化底蕴和勤劳的人民。发展其基础设施和办公场所将增强地区自豪感和民族团结。"
 ALG_develop_aures: "奥雷斯地区的农业增长"
 ALG_develop_aures_desc: "奥雷斯山脉拥有广袤的农田和勤劳的居民。实现农业生产的现代化将有助于减少农村贫困，稳定粮食供应。"
 ALG_expand_oran: "扩大奥兰工业区"
 ALG_expand_oran_desc: "奥兰是阿尔及利亚最重要的工业和港口城市之一。扩建其工业区将创造新的就业机会并促进出口。"
 ALG_expand_algiers: "阿尔及尔现代化"
 ALG_expand_algiers_desc: "作为阿尔及利亚的心脏，阿尔及尔必须不断发展。新的办公楼、基础设施和城市改革将使其转型成为北非的模范首都。"
 ALG_expand_constantine: "投资君士坦丁"
 ALG_expand_constantine_desc: "君士坦丁悠久的教育和文化历史使其成为高等教育和创新的理想中心。在此投资将培养出新一代的阿尔及利亚思想家和工程师。"
 ALG_develop_tamanrasset: "开发塔曼拉塞特基础设施"
 ALG_develop_tamanrasset_desc: "塔曼拉塞特位于撒哈拉沙漠深处，是阿尔及利亚南部物流的关键枢纽。道路、补给站和通信基础设施将沙漠与北部连接起来。"
 ALG_develop_mzab: "为姆扎布山谷提供动力"
 ALG_develop_mzab_desc: "姆扎卜地区拥有坚韧不拔的精神，能源需求也在不断增长。建设新的发电厂将为当地居民提供电力和就业机会。"
 ALG_develop_granderg: "充分利用大沙漠的资源"
 ALG_develop_granderg_desc: "大东方沙漠看似空旷，但其地下蕴藏的财富却讲述着截然不同的故事。在此开发石油开采点将巩固阿尔及利亚作为能源生产国的地位。"
 ALG_FIS.1.t: "乌理玛回归"
 ALG_FIS.1.d: "在伊斯兰救世阵线内部，关于我们运动方向的激烈辩论已经爆发。受沙特阿拉伯严格教义影响的瓦哈比派学者呼吁彻底净化阿尔及利亚的伊斯兰教和政治，清除他们眼中腐败的创新。与此同时，阿尔及利亚的传统乌里玛则主张回归精神指导，并在更加宽容的伊斯兰框架内进行国家改革。\n\n我们的选择将决定这场运动的灵魂。"
 ALG_FIS.1.a: "遵循瓦哈比派乌里玛的教导 - 净化并巩固信仰"
 ALG_FIS.1.b: "支持传统乌里玛 - 改革并引导国家"
 ALG_FIS.2.t: "伊斯兰救世阵线的未来"
 ALG_FIS.2.d: "1991年，在伊斯兰救世阵线领导的大规模示威游行之后，阿尔及利亚当局采取了武力镇压，这成为该国现代史上最血腥的转折点之一。在六月事件中，军队和警察暴力驱散了数千名伊斯兰救世阵线支持者，该运动的创始人阿巴西·马达尼因此被判处15年监禁。哈立德·内扎尔将军下令逮捕马达尼，并宣布进入紧急状态，旨在瓦解该党并压制伊斯兰主义的影响。镇压导致混乱、平民伤亡，以及和平改革希望的破灭 - 这颗火星点燃了毁灭性的阿尔及利亚内战，即后来的“黑色十年”。随着阿巴西·马达尼被监禁，伊斯兰救世阵线领导层四散，运动内部涌现出新的人物。如今，随着我们的影响力悄然复苏，问题依然存在 - 谁将带领我们走出这血腥与牺牲的时代，走向阿尔及利亚的新愿景？"
 ALG_FIS.2.a: "任命联合创始人兼人民之声 - 阿里·贝尔哈吉"
 ALG_FIS.2.b: "拥抱奋斗之路 - 阿卜杜勒哈克·拉亚达，武装伊斯兰团体创始人"
 ALG_ps_victory: "民众救世阵线的胜利"
 ALG_ps_victory_desc: "伊斯兰救世阵线取得了胜利。阿尔及利亚正处于十字路口 - 信仰与秩序之间，清真寺与兵营之间。我们现在必须巩固这股新的力量。"
 ALG_consolidate_power: "巩固新秩序"
 ALG_consolidate_power_desc: "权力必须在社会各个层面得到巩固。政党、宗教领袖和武装团体现在必须服务于一个共同的目标 - 维护我们的统治。"
 ALG_national_reconstruction: "国家重建"
 ALG_national_reconstruction_desc: "我们饱受战争蹂躏的国家必须从废墟中重建。重建需要信念和务实精神，才能恢复工业和公众信心。"
 ALG_religious_reconciliation: "宗教和解"
 ALG_religious_reconciliation_desc: "阿尔及利亚伊斯兰学者之间的分歧威胁着我们的团结。我们必须弥合分歧，为新国家建立统一的宗教基础。"
 ALG_crackdown_purges: "镇压与清洗"
 ALG_crackdown_purges_desc: "为了维护政权，我们必须清除反对派。必须清除旧政权的残余势力、世俗官员和异议派别。"
 ALG_unify_parties: "统一伊斯兰运动"
 ALG_unify_parties_desc: "支持我们崛起的形形色色的伊斯兰主义团体现在必须团结在同一面旗帜下。穆斯林社群的团结始于自身。"
 ALG_infrastructure_crash: "基础设施重建"
 ALG_infrastructure_crash_desc: "内战使我们的基础设施满目疮痍。我们将启动紧急计划，修复道路、桥梁和公用设施。"
 ALG_industry_investment: "工业投资"
 ALG_industry_investment_desc: "为了维持长期复苏，我们必须投资于国家产业，并支持遵循伊斯兰经济原则的本土企业家。"
 ALG_madrasa_reforms: "伊斯兰学校改革"
 ALG_madrasa_reforms_desc: "教育必须兼顾现代需求和宗教价值观。改革我们的伊斯兰学校将确保培养出一批信仰坚定的新一代学者和工程师。"
 ALG_community_outreach: "社区外展计划"
 ALG_community_outreach_desc: "我们将通过社会活动加强与当地社区的联系，在伊斯兰价值观的指导下促进团结和互助。"
 ALG_internal_security: "内部安全处置"
 ALG_internal_security_desc: "我们必须建立一支忠诚的内部安全队伍，以镇压动乱，从内部保护革命。"
 ALG_intelligence_network: "伊斯兰情报局"
 ALG_intelligence_network_desc: "有效的情报机构能够让我们预见威胁，并在阴谋扎根之前将其化解。"
 ALG_transport_upgrade: "交通现代化"
 ALG_transport_upgrade_desc: "现代交通系统将加速商业发展，改善交通出行，并将阿尔及利亚各地区比以往任何时候都更加紧密地联系起来。"
 ALG_energy_program: "国家能源计划"
 ALG_energy_program_desc: "发展可再生能源和传统能源将为阿尔及利亚的新经济提供支柱。"
 ALG_scholastic_centers: "学术研究中心"
 ALG_scholastic_centers_desc: "我们的学者和科学家将携手合作，推进伊斯兰知识和现代科学的发展，为国家进步做出贡献。"
 ALG_social_welfare: "扩大社会福利"
 ALG_social_welfare_desc: "我们将照顾穷人、寡妇和流离失所者 - 确保每个阿尔及利亚人都能从我们以信仰为导向的治理中受益。"
 ALG_military_rebuild: "重建信仰之军"
 ALG_military_rebuild_desc: "军队必须重建，必须清除腐败。一支纪律严明的军队才能捍卫革命和国家。"
 ALG_garrison_restructure: "卫戍重组"
 ALG_garrison_restructure_desc: "我们必须重组卫戍，以确保忠诚、效率和应对外部或内部威胁的准备。"
 ALG_factory_output: "工业产出扩张"
 ALG_factory_output_desc: "我们的投资正在取得成效。工厂现在将满负荷运转，以推动经济增长。"
 ALG_oil_and_minerals: "石油和矿产开发"
 ALG_oil_and_minerals_desc: "阿尔及利亚丰富的自然资源是上天的恩赐。我们将负责任地利用这些资源，以确保能源独立。"
 ALG_religious_council: "建立宗教理事会"
 ALG_religious_council_desc: "最高乌里玛委员会将指导国家的道德和精神方向，确保每一项法律都符合伊斯兰教法。"
 ALG_national_cohesion: "国家凝聚力"
 ALG_national_cohesion_desc: "我们将通过福利和信仰来弥合战争造成的裂痕，并塑造一个全新的、团结的阿尔及利亚民族认同。"
 ALG_border_defences: "增援边境"
 ALG_border_defences_desc: "我们的边境必须加强防御，防止渗透和走私。革命的敌人既存在于边境之外，也存在于边境之内。"
 ALG_strategic_reserves: "战略储备计划"
 ALG_strategic_reserves_desc: "我们将储备物资，扩大储备规模，以确保在战争或经济不稳定时期能够持续发展。"
 ALG_heavy_industry: "发展重工业"
 ALG_heavy_industry_desc: "我们将把工业基础拓展到消费品以外，重点发展重型机械、钢铁和武器生产。"
 ALG_international_trade: "扩大国际贸易"
 ALG_international_trade_desc: "通过与伊斯兰世界的友好国家进行贸易，阿尔及利亚可以成为以信仰为驱动的商业中心。"
 ALG_cultural_influence: "文化影响倡议"
 ALG_cultural_influence_desc: "我们将输出我们的文化、我们的信仰和我们的榜样 - 传播阿尔及利亚伊斯兰复兴模式。"
 ALG_welfare_programs: "福利计划"
 ALG_welfare_programs_desc: "全面的社会福利举措将增强我们的执政合法性，并保护弱势群体。"
 ALG_army_of_salvation: "救世军"
 ALG_army_of_salvation_desc: "救世军将成为伊斯兰的盾牌和阿尔及利亚的利剑 - 纪律严明、忠诚可靠、毫不屈服。"
 ALG_nation_energy_independence: "国家能源独立"
 ALG_nation_energy_independence_desc: "一旦我们的能源完全由国内控制，我们将摆脱对外国的依赖。"
 ALG_international_outreach: "国际伊斯兰推广"
 ALG_international_outreach_desc: "我们将向伊斯兰世界伸出援手，与拥有共同愿景的运动和国家搭建桥梁。"
 ALG_regional_leadership: "区域领导力"
 ALG_regional_leadership_desc: "阿尔及利亚将确立其在北非乃至更广泛地区的政治、宗教和经济领导地位。"
 ALG_technological_renaissance: "技艺复兴"
 ALG_technological_renaissance_desc: "信仰与科学并非对立面。我们将引领一个以伊斯兰伦理为指导的科技进步新时代。"
 ALG_islamic_coalition: "建立伊斯兰联盟"
 ALG_islamic_coalition_desc: "伊斯兰世界的团结必须通过合作来恢复。阿尔及利亚将领导伊斯兰国家联盟，走向共同繁荣。"
 ALG_grand_strategy: "大战略"
 ALG_grand_strategy_desc: "我们的国家如今在军事、经济和精神层面都十分强大。现在是时候为我们的文明制定长远发展愿景了。"
 ALG_final_salvation: "最终救赎"
 ALG_final_salvation_desc: "我们旅程的最后一步 - 创建一个完全由神圣法则和道德力量指导的社会。"
 FIS_rust_belt_rejuvenation: "锈带复兴"
 FIS_rule_to_perfection: "完美规则"
 FIS_new_islamic_architecture: "新伊斯兰建筑"
 FIS_prioritize_military_industries: "优先考虑军事工业"
 FIS_industrialize_the_umma: "使伊斯兰世界工业化"
 ALG_fis_win: "伊斯兰救世阵线的胜利"
 ALG_fis_win_desc: "凭借坚韧不拔的精神、团结一致和真主的指引，伊斯兰救国阵线战胜了敌人。未来的道路是精神治理和复兴之路。阿尔及利亚开启了新的篇章 - 一个由信仰、正义和真主的旨意所定义的篇章。"
 ALG_fis_win_tt: "§Y解锁伊斯兰救世阵线国策树§!"
 ALG_FIS_return: "伊斯兰救世阵线回归"
 alg_politics_news.1.t: "阿卜杜拉·贾巴拉成立正义与发展阵线"
 alg_politics_news.1.d: "前民族改革运动（伊斯兰改革运动）领导人、复兴运动创始人阿卜杜拉·贾巴拉宣布成立新的政党 - 正义与发展阵线。该党以土耳其正义与发展党为灵感，力求将伊斯兰原则与政治温和主义和国家发展相结合。该运动旨在通过强调正义、改革和道德治理，重塑阿尔及利亚内战后民众对伊斯兰政治的信任。"
 alg_politics_news.1.a: "一个新的伊斯兰主义运动登上阿尔及利亚政治舞台。"
 algerian.1.t: "阿尔及利亚基础设施投资请求"
 algerian.1.d: "阿尔及利亚政府已向我们提出一项融资方案，旨在资助修建农产品运输道路和农村基础设施。这项投资将改善阿尔及利亚的农产品分销和工业产能，同时也有助于我们扩大政治和经济影响力。然而，这项计划需要我国国库提供资金支持。"
 algerian.1.a: "为基础设施项目提供资金"
 algerian.1.b: "拒绝请求"
 algerian.4.t: "基础设施合作获批"
 algerian.4.d: "突尼斯已同意支持我们的农产品市场基础设施建设计划。这项投资将增强我们的农村经济和工业能力，同时改善双边关系。"
 algerian.4.a: "这是我国经济向前迈出的一步"
 algerian.5.t: "基础设施建设资金申请被拒"
 algerian.5.d: "突尼斯拒绝为我们提出的基础设施建设项目提供资金。缺乏外国支持，农产品运输道路及相关项目的建设将会延误。"
 algerian.5.a: "我们能自己搞定"
 algeria_news.30.t: "黑色之春起义"
 algeria_news.30.d: "经过卡比利亚地区多年的动荡，你必须决定如何回应柏柏尔人民日益增长的需求。"
 algeria_news.30.a: "给予卡比利亚人完全独立"
 algeria_news.30.b: "赋予卡比利亚人自治权"
 algeria_news.30.c: "镇压起义"
 algeria_news.30_a_tt: "选择这条道路将建立一个独立的卡比利亚国家。稳定度提高，并且收获政治点数。"
 algeria_news.30_b_tt: "选择赋予卡比利亚人有限的自治权（柏巴沙）。稳定度略有提高，并且收获政治点数。"
 algeria_news.30_c_tt: "镇压卡比利亚人会降低稳定度和战争支持度，但你会获得一些政治点数。"
 AlgeriaFocusEvents.43.t: "致伊斯兰世界理事会的邀请"
 AlgeriaFocusEvents.43.d: "[Root.GetName]的领导层已收到加入伊斯兰世界理事会的正式邀请。加入该理事会将加强伊斯兰国家之间的经济合作，开拓新的贸易机遇，并巩固我们共同的政治联盟。然而，加入该理事会可能会使我们与非伊斯兰经济集团渐行渐远。"
 AlgeriaFocusEvents.43.a: "加入理事会"
 AlgeriaFocusEvents.43.b: "拒绝邀请"
 AlgeriaFocusEvents.41.t: "致伊斯兰世界理事会的邀请"
 AlgeriaFocusEvents.41.d: "阿尔及利亚已正式邀请我们加入伊斯兰世界理事会。该提议强调经济合作、政治协调以及加强伊斯兰国家间的联系。接受邀请可能提升我们在该地区的地位，而拒绝则可能导致关系紧张。"
 AlgeriaFocusEvents.41.a: "这是个好主意"
 AlgeriaFocusEvents.41.b: "我们对此毫无兴趣"
 AlgeriaFocusEvents.411.t: "伊拉克拒绝邀请"
 AlgeriaFocusEvents.411.d: "伊拉克政府以战略考虑和国家优先事项为由，婉拒了我们加入伊斯兰世界理事会的邀请。"
 AlgeriaFocusEvents.411.a: "很遗憾，但已记录在案"
 AlgeriaFocusEvents.42.t: "致伊斯兰世界理事会的邀请"
 AlgeriaFocusEvents.42.d: "我们已收到关于我们扩大伊斯兰世界理事会倡议的正式回复。受邀国正在考虑是否在经济和政治上与伊斯兰世界理事会结盟。"
 AlgeriaFocusEvents.42.a: "欢迎他们加入理事会"
 AlgeriaFocusEvents.42.b: "他们拒绝了"
 AlgeriaFocusEvents.421.t: "邀请被拒绝"
 AlgeriaFocusEvents.421.d: "受邀国已拒绝参加伊斯兰世界理事会。我们的外交努力需要转向其他方向。"
 AlgeriaFocusEvents.421.a: "很好"
 AlgeriaFocusEvents.81.t: "伊斯兰世界理事会联盟的邀请"
 AlgeriaFocusEvents.81.desc: "我们已收到加入伊斯兰世界理事会联盟的邀请。该提议承诺加强合作与互助，但也可能要求我们做出一些让步。"
 AlgeriaFocusEvents.81.a: "只有在有回报保证的情况下才行"
 AlgeriaFocusEvents.81.b: "绝对不行"
 ALG_power_struggle_resistance_dominant: "§R人民公然反抗政权。§!"
 ALG_power_struggle_army_dominant: "§B军方牢牢掌控着局势。§!"
 ALG_power_struggle_resistance_rising: "§Y民众对当权派的压力越来越大§!"
 ALG_power_struggle_army_rising: "§Y军方正在重新掌控权力。§!"
 ALG_power_struggle_stable: "§W目前，脆弱的平衡依然存在。§!"
 ALG_west_alignment_tt: "与美国正式建立战略伙伴关系，并深化与北约和欧盟的关系。这将有助于获得西方技术和投资，但可能会使与中国和俄罗斯的关系紧张。"
 ALG_china_alignment_tt: "深化与中国在“一带一路”倡议下的合作。预计将出现大规模基础设施投资和贸易增长，但西方国家将保持警惕。"
 alg_crackdown.1.t: "阿尔及尔爆发抗议活动"
 alg_crackdown.1.d: "反对派人士被捕引发了街头示威。抗议者要求进行政治改革，并结束镇压。"
 alg_crackdown.1.a: "镇压游行者。"
 alg_crackdown.1.b: "释放部分被拘留者。"
 alg_crackdown.2.t: "全国罢工和示威游行"
 alg_crackdown.2.d: "取缔反对党引发了一场类似于“人民运动”的大规模抗议活动。国家陷入瘫痪。"
 alg_crackdown.2.a: "部署军队"
 alg_crackdown.2.b: "开启对话，解除禁令。"
 democratic_reforms: "民主改革进程"
 ALG_healthcare_success_tt: "我们的医疗改革将改善公众健康，减少民众不满。"
 ALG_healthcare_failure_tt: "医疗改革若未能落实，将加剧公众的愤怒，并巩固军方的政治地位。"
 ALG_education_success_tt: "教育改革将使我们的劳动力队伍现代化，并减少不满情绪。"
 ALG_education_failure_tt: "教育危机仍在持续，公众的不满情绪日益高涨。"
 ALG_unemployment_success_tt: "创造就业机会的计划将降低失业率，稳定国家局势。"
 ALG_unemployment_failure_tt: "不解决失业问题将引发罢工和动乱。"
 alg_appease_kabyles_tt: "增加对卡比利亚族聚居区、文化项目和地方自治的拨款。阿拉伯民族主义者会不高兴。"
 alg_arabization_tt: "在教育和公共生活中推广阿拉伯语和阿拉伯-伊斯兰身份认同。柏柏尔人社区将会抵制。"
 alg_arab_satisfaction_display: "§Y阿拉伯人满意度：§! [?alg_arab_sat_display]%"
 alg_kabyle_satisfaction_display: "§Y卡比利亚人满意度：§! [?alg_kabyle_sat_display]%"
 alg_chaoui_satisfaction_display: "§Y沙维亚人满意度：§! [?alg_chaoui_sat_display]%"
 alg_mozabite_satisfaction_display: "§Y莫扎比特人满意度：§! [?alg_mozabite_sat_display]%"
 alg_tuareg_satisfaction_display: "§Y图阿雷格人满意度：§! [?alg_tuareg_sat_display]%"
 alg_ethnic.10.t: "塔马齐格特人身份的认可结出硕果"
 alg_ethnic.10.d: "在承认塔马齐格特语三个月后，柏柏尔人社区报告称与国家的关系有所改善。公众支持率也在上升。"
 alg_ethnic.10.a: "阿尔及利亚开启了新的篇章。"
 ALG_tamazgha.1.t: "来自塔马兹加的邀请"
 ALG_tamazgha.1.d: "现已更名为“塔马兹加”的[FROM.GetName]政府联系我们，提议建立一个基于共同的阿马齐格文化遗产和文化合作的新区域联盟。他们声称，该联盟将带来共同的经济发展和安全保障，并摒弃阿拉伯联盟等过时的泛阿拉伯组织架构。\n\n虽然我国政府中有些人认为这是一个历史性的机会，但也有人质疑塔马兹加的意图和长期目标。"
 ALG_tamazgha.1.a: "我们将加入塔马兹加邦联。"
 ALG_tamazgha.1.b: "这不是我们的战斗。"
 ALG_election_time_idea: "为下届选举做准备"
 ALG_casablanca_decisions: "卡萨布兰卡倡议"
 ALG_casablanca_decisions_desc: "通过非洲联盟或国际渠道，以外交手段向摩洛哥施压，以解决西撒哈拉问题。"
 AlgeriaFocusNews.AU_court_great_powers: "阿尔及利亚正积极游说各大国支持卡萨布兰卡倡议。"
 AlgeriaFocusNews.AU_regional_approach: "阿尔及利亚正在推行一项仅限于区域范围的卡萨布兰卡倡议。"
 AlgeriaFocusNews.AU_mixed_strategy: "阿尔及利亚对卡萨布兰卡倡议采取了混合战略。"
 AlgeriaFocusNews.AU_result_high: "卡萨布兰卡倡议取得了巨大成功；非盟调解势头强劲。"
 AlgeriaFocusNews.AU_result_med: "卡萨布兰卡倡议取得了中等成果。"
 AlgeriaFocusNews.AU_result_low: "卡萨布兰卡倡议取得了微小成果。"
 AlgeriaFocusNews.AU_timeout: "卡萨布兰卡倡议任务已超时；外交势头已丧失。"
 ALG_casablanca_mission_tt: "启动卡萨布兰卡行动任务。首先需要选择一种行动方案。任务持续180天，并产生低/中/高三种不同等级的结果。"
 ALG_casablanca_mission_desc: "启动限时外交施压。结果将决定非洲联盟的压力能否迫使摩洛哥放弃宣称，或（若取得重大成功）迫使其放弃核心。"
 ALG_casablanca_approach_tt: "为卡萨布兰卡倡议选择一项战略方针。只能选择一种方案；随后启动任务板块以执行。"
 ALG_casablanca_approach_great_powers: "拉拢大国"
 ALG_casablanca_approach_great_powers_desc: "消耗政治力量拉拢主要大国（美国/西班牙/俄罗斯）。此举最有可能产生决定性的非洲联盟压力，但成本高昂且政治风险较大。"
 ALG_casablanca_approach_regional: "注重区域内部"
 ALG_casablanca_approach_regional_desc: "依靠地区伙伴，避免大国干预。成本较低且风险较小，但难以取得决定性成果。"
 ALG_casablanca_approach_mixed: "混合战略"
 ALG_casablanca_approach_mixed_desc: "结合地区与国际压力。平衡成本与胜算。"
 AlgeriaFocusNews.AU_court_great_powers.t: "卡萨布兰卡倡议——争取大国支持"
 AlgeriaFocusNews.AU_court_great_powers.d: "阿尔及利亚决定拉拢大国支持其卡萨布兰卡倡议。此举代价高昂，但将提升实现强非洲联盟成果的可能性。"
 AlgeriaFocusNews.AU_regional_approach.t: "卡萨布兰卡倡议——区域内部方针"
 AlgeriaFocusNews.AU_regional_approach.d: "阿尔及利亚正采取仅限于区域的外交路线，依赖邻国及非洲联盟盟友的支持。"
 AlgeriaFocusNews.AU_mixed_strategy.t: "卡萨布兰卡倡议——混合战略"
 AlgeriaFocusNews.AU_mixed_strategy.d: "阿尔及利亚将结合地区与国际力量，在规避风险的同时加大施压力度。"
 AlgeriaFocusNews.AU_result_high.t: "卡萨布兰卡倡议——重大成功"
 AlgeriaFocusNews.AU_result_high.d: "卡萨布兰卡倡议在非盟/联合国进程中取得了决定性成果。外交压力已形成切实势头；阿尔及利亚处于有利地位，可迫使摩洛哥放弃领土宣称（根据您的国策，还能够使其放弃核心）。"
 AlgeriaFocusNews.AU_result_med.t: "卡萨布兰卡倡议——中等成功"
 AlgeriaFocusNews.AU_result_med.d: "卡萨布兰卡倡议取得了显著的外交成果。对摩洛哥的压力有所增加；非洲联盟表示支持但并非决定性因素。"
 AlgeriaFocusNews.AU_result_low.t: "卡萨布兰卡倡议——成果有限"
 AlgeriaFocusNews.AU_result_low.d: "卡萨布兰卡倡议在非盟仅激起有限同情。要迫使对方作出重大让步，还需进一步努力。"
 AlgeriaFocusNews.AU_timeout.t: "卡萨布兰卡倡议——任务超时"
 AlgeriaFocusNews.AU_timeout.d: "时间流逝，却未取得实质性成果。外交势头已然丧失。"
 AlgeriaFocusNews.ok: "收到"
 ALG_morocco.2.t: "非盟和联合国对摩洛哥施压"
 ALG_morocco.2.d: "在阿尔及利亚于非盟和联合国发起外交攻势后，摩洛哥在西撒哈拉问题上正面临国际压力。王国是会顺应要求，还是选择抵抗并承担制裁风险？"
 ALG_morocco.2.a: "在压力之下服从"
 ALG_morocco.2.b: "顶住压力，甘冒制裁风险"
 Algeria_events.5.t: "反盗猎行动成功"
 Algeria_events.5.desc: "得益于我们的协同努力，过去数月已有数百种濒危动物得到保护。这不仅减少了非法狩猎，还有助于维护脆弱的沙漠生态系统，减缓了受影响地区的荒漠化进程。"
 Algeria_events.5.a: "好极了！"
 Algeria_events.6.t: "反盗猎行动失败"
 Algeria_events.6.desc: "尽管我们努力保护野生动物，偷猎者却依然我行我素。沙漠生态系统持续面临威胁，我们的行动在遏制荒漠化和非法狩猎方面收效甚微。"
 Algeria_events.6.a: "所有努力都白费了！"
 ALG_ethnic_data.0.t: "民族认同问题"
 ALG_ethnic_data.0.d: "\"黑色春天\"事件迫使我们直面一个根本问题：何为阿尔及利亚人？\n\n数十年来，历届政府始终在推行单一的阿拉伯-伊斯兰认同。但卡比利亚起义已清楚表明，数百万国民感到自己被排斥在这种国家愿景之外。柏柏尔各族 - 卡比利亚人、沙维亚人、图阿雷格人、莫扎比特人 - 要求国家承认他们的语言、文化以及对民族的贡献。\n\n我们不能再忽视这个问题。必须建立管理民族关系的全面框架，否则社会将面临进一步分裂的风险。\n\n§Y此决议将激活民族管理体系。§!"
 ALG_ethnic_data.0.a: "建立民族事务框架。"
 ALG_ethnic_data.0.b: "我们需要更多时间来考虑此事。"
 ALG_ethnic_data.1.t: "阿尔及利亚民族人口构成"
 ALG_ethnic_data.1.d: "我们对\"黑色春天\"后阿尔及利亚民族构成的评估已完成。这场危机揭示了我们社会中的深刻裂痕：\n\n§Y阿拉伯人§!：[?ALG_ethnic_arab]% — 满意度：[?arab_satisfaction]/100\n主体民族。他们的主导地位正受到质疑。\n\n§Yⵣ 卡比利亚人§!：[?ALG_ethnic_kabyle]% — 满意度：[?kabyle_satisfaction]/100\n§R黑色春天事件使许多人走向激进。紧张局势已到临界点。§!\n\n§Y沙维亚人§!：[?ALG_ethnic_chaoui]% — 满意度：[?chaoui_satisfaction]/100\n正密切关注卡比利亚地区的局势发展。\n\n§Y⵿ 图阿雷格人§!：[?ALG_ethnic_tuareg]% — 满意度：[?tuareg_satisfaction]/100\n撒哈拉地区的社群感到被阿尔及尔当局忽视。\n\n§Yⵎ 莫扎比特人§!：[?ALG_ethnic_mozabite]% — 满意度：[?mozabite_satisfaction]/100\n始终维系着其独特的伊巴德派社区传统。\n\n§Y其他民族§!：[?ALG_ethnic_other]%\n\n§Y民族管理体系现已激活。§!"
 ALG_ethnic_data.1.a: "我们必须谨慎处理。"
 ALG_ethnic_system_active_tt: "§G民族管理系统现已激活！§!\n\n请在决议面板中监控满意度。\n运用政策来维持各群体的满意度。\n被忽视的群体会引发问题！"
 ALG_ethnic_data_category: "[ALG.GetFlag]§Y民族人口构成§!"
 ALG_ethnic_data_category_desc: "§Y阿尔及利亚的族群马赛克§! 描绘了构成我们国家的复杂民族画卷。在毁灭性的§R内战(1991-2002)§! 之后，管理民族关系对国家稳定至关重要。[ALG.GetLeader]总统的民族和解政策必须解决所有社群的诉求。\n\n§Y卡比利亚人§!尤其躁动不安——如果他们的问题得不到解决，§R2001年的黑色春天§!可能即将来临。与此同时，南部的§Y图阿雷格人§!正饶有兴趣地关注着邻国马里和尼日尔的局势。\n\n§H 运作机制 §!\n\n每个族群都有一个§Y满意度等级§! (0-100)：\n§G- 高于70§!：族群§G满意§! -> 提供国家加成\n§Y- 40-70§!：族群§Y中立§! -> 无特殊效果\n§R- 低于40§!：族群§R不满§! -> 造成负面惩罚\n§R- 低于25§!：§R危险§! -> 严重惩罚，可能发生叛乱\n\n被忽视的族群，其§Y满意度每月都会衰减§!。偏袒一个族群常常会激怒其他族群！\n\n§H 当前状态 §!\n\n§Y阿拉伯人§! - [?ALG_ethnic_arab]%的人口\n满意度：[?arab_satisfaction]/100\n§Y满意时：§! §G+政治点数、+稳定度、+人力§!\n\n§Y卡比利亚人§! - [?ALG_ethnic_kabyle]%的人口\n满意度：[?kabyle_satisfaction]/100\n§Y满意时：§! §G+科研速度§!\n§R警告：如果满意度持续偏低，黑色春天可能触发！§!\n\n§Y沙维亚人§! - [?ALG_ethnic_chaoui]%的人口\n满意度：[?chaoui_satisfaction]/100\n§Y满意时：§! §G+建造速度、+资源§!\n\n§Y图阿雷格人§! - [?ALG_ethnic_tuareg]%的人口\n满意度：[?tuareg_satisfaction]/100\n§Y满意时：§! §G+陆军组织度、+沙漠作战§!\n\n§Y莫扎布人§! - [?ALG_ethnic_mozabite]%的人口\n满意度：[?mozabite_satisfaction]/100\n§Y满意时：§! §G-消费品、+贸易§!\n\n§Y其他族群§! - [?ALG_ethnic_other]%的人口"
 ALG_ethnic_arab_display: "阿拉伯人：[?ALG_ethnic_arab]%"
 ALG_ethnic_kabyle_display: "卡比利亚人：[?ALG_ethnic_kabyle]%"
 ALG_ethnic_chaoui_display: "沙维亚人：[?ALG_ethnic_chaoui]%"
 ALG_ethnic_tuareg_display: "图阿雷格人：[?ALG_ethnic_tuareg]%"
 ALG_ethnic_mozabite_display: "莫扎比特人：[?ALG_ethnic_mozabite]%"
 ALG_ethnic_other_display: "其他：[?ALG_ethnic_other]%"
 ALG_census_tt: "开展全国人口普查，更新人口统计数据，为政策制定提供依据。"
 ALG_ethnic_data.2.t: "人口普查结果与民族认同"
 ALG_ethnic_data.2.d: "我们的普查显示阿尔及利亚存在多种族裔。我们应在政治上采取包容政策，尊重各民族的文化传统，促进民族团结，共同维护国家稳定与发展。"
 ALG_ethnic_data.2.a: "强化阿拉伯-伊斯兰认同。"
 ALG_ethnic_data.2.b: "平等对待我们的柏柏尔与阿拉伯文化遗产。"
 ALG_ethnic_data.2.c: "避免表态。"
 ALG_ethnic_data.20.t: "盖尔达耶冲突"
 ALG_ethnic_data.20.d: "§R2013年 - 姆扎卜河谷§!\n\n在历史名城盖尔达耶为中心的姆扎卜河谷地区，阿拉伯社区与莫扎比特社区之间爆发了激烈冲突。这场始于墓地纠纷的暴力事件已升级为广泛的社区骚乱。\n\n莫扎比特人的商铺和住宅遭到袭击与焚毁。双方均有数人在冲突中丧生。作为古罗斯图姆王朝后裔的莫扎比特社区，深感自身生存受到威胁。\n\n安全部队正竭力控制局势。我们该如何应对？"
 ALG_ethnic_data.20.a: "阿拉伯人有正当的不满。支持他们。"
 ALG_ethnic_data.20.b: "保护莫扎比特少数民族。部署军队以保障其所在区域的安全。"
 ALG_ethnic_data.20.c: "尝试在双方社区之间进行中立调解。"
 ALG_ghardaia_arab_side_tt: "我们站在阿拉伯社区一边。\n§R莫扎比特满意度 -20§!\n§G阿拉伯满意度 +5§!"
 ALG_ghardaia_mozabite_side_tt: "我们部署部队保护莫扎比特人。\n§R莫扎比特人满意度-5§!（心怀感激但受创）\n§R阿拉伯人满意度-10§!"
 ALG_ghardaia_neutral_tt: "我们尝试进行调解。\n§R莫扎比特人满意度 -10§!\n§R阿拉伯人满意度 -3§!\n双方均未完全满意。"
 ALG_ethnic_data.10.t: "民族紧张局势加剧"
 ALG_ethnic_data.10.d: "报告显示，不满的少数族裔群体中不安情绪日益加剧。地方官员警告称，抗议活动正在组织之中，有人担心如果诉求得不到解决，可能会引发更激进的行动。\n\n§R当前危机群体：§!"
 ALG_ethnic_data.10.a: "我们无法回应所有的抱怨。"
 ALG_ethnic_data.10.b: "派遣官员处理他们的关切。"
 ALG_init_ethnic_data: "建立民族事务框架"
 ALG_init_ethnic_data_desc: "为阿尔及利亚内战后时期建立管理多元族裔社区的框架。"
 ALG_show_ethnic_data: "§Y查看民族概况§!"
 ALG_show_ethnic_data_desc: "评估阿尔及利亚各族群现状。"
 ALG_ethnic_overview_full_tt: "§H民族群体概览§!\n\n§Y阿拉伯人§! | 人口：§G[?ALG_ethnic_arab]%§! | 满意度：§B[?arab_satisfaction]§!/100\n§Yⵣ 卡比利亚人§! | 人口：§G[?ALG_ethnic_kabyle]%§! | 满意度：§B[?kabyle_satisfaction]§!/100\n§Y沙维亚人§! | 人口：§G[?ALG_ethnic_chaoui]§! | 满意度：§B[?chaoui_satisfaction]§!/100\n§Y⵿ 图阿雷格人§! | 人口：§G[?ALG_ethnic_tuareg]%§! | 满意度：§B[?tuareg_satisfaction]§!/100\n§Yⵎ 莫扎比人§! | 人口：§G[?ALG_ethnic_mozabite]%§! | 满意度：§B[?mozabite_satisfaction]§!/100\n§Y其他群体§! | 人口：§G[?ALG_ethnic_other]%§!\n\n§Y注意：§!若未获得积极支持，群体的满意度将会下降！"
 ALG_favor_arab_policies: "亲阿拉伯政策"
 ALG_favor_arab_policies_desc: "推广阿拉伯语、阿拉伯-伊斯兰文化认同，并在发展中优先考虑阿拉伯地区。\n\n§G效果：§!\n• 阿拉伯人满意度 §G+10§!\n• 卡比利亚人满意度 §R-5§!\n• 沙维亚人满意度 §R-3§!\n• 图阿雷格人满意度 §R-3§!\n• 莫扎比特人满意度 §R-3§!\n\n§Y冷却时间：§! 60天"
 ALG_favor_arab_tt: "§G阿拉伯人对我们的支持感到满意！§!\n§R少数群体感到被边缘化。§!"
 ALG_favor_kabyle_policies: "亲卡比利亚政策"
 ALG_favor_kabyle_policies_desc: "支持塔马齐格特语教育、卡比利亚文化保护及卡比利亚地区发展。\n\n§G效果：§!\n• 卡比利亚满意度 §G+10§!\n• 阿拉伯人满意度 §R-5§!\n• 沙维亚人满意度 §R-2§!\n\n§Y冷却时间：§! 60天"
 ALG_favor_kabyle_tt: "§G卡比利亚人为他们的文化遗产获得认可而欢庆！§!\n§R阿拉伯人感到他们的主导地位受到威胁。§!"
 ALG_favor_chaoui_policies: "亲沙维亚政策"
 ALG_favor_chaoui_policies_desc: "投资奥雷斯山脉地区发展并支持沙维文化倡议。\n\n§G效果：§!\n• 沙维亚满意度§G+10§!\n• 阿拉伯满意度§R-3§!\n• 卡比利亚满意度§R-2§!\n\n§Y冷却时间：§!60天"
 ALG_favor_chaoui_tt: "§G沙维亚人赞赏他们地区的发展！§!"
 ALG_favor_tuareg_policies: "亲图阿雷格政策"
 ALG_favor_tuareg_policies_desc: "支持撒哈拉地区的图阿雷格人自治，投资南部发展，并整合图阿雷格社区。\n\n§G效果：§!\n• 图阿雷格人满意度 §G+10§!\n• 阿拉伯人满意度 §R-3§!\n\n§Y冷却时间：§! 60天"
 ALG_favor_tuareg_tt: "§G沙漠中的蓝衣民族对我们的关注表示赞赏！§!"
 ALG_favor_mozabite_policies: "亲莫扎比特政策"
 ALG_favor_mozabite_policies_desc: "保护伊巴迪宗教习俗，支持莫扎比特商人社群，并发展姆扎卜河谷地区。\n\n§G效果：§!\n• 莫扎比特满意度 §G+10§!\n• 阿拉伯人满意度 §R-2§!\n\n§Y冷却时间：§! 60天"
 ALG_favor_mozabite_tt: "§G莫扎比特商人扩展了他们的贸易网络！§!"
 ALG_recognize_tamazight_1: "承认塔马齐格特语"
 ALG_recognize_tamazight_1_desc: "正式承认塔马齐格特语与阿拉伯语同为阿尔及利亚的国家语言。这一历史性决定将满足柏柏尔运动的核心诉求。\n\n§G效果：§!\n• 卡比利亚满意度 §G+20§!\n• 沙维亚满意度 §G+15§!\n• 图阿雷格满意度 §G+10§!\n• 莫扎比特满意度 §G+10§!\n• 阿拉伯人满意度 §R-10§!\n• §G+5%§! 稳定度\n\n§Y2002年后可用§!"
 ALG_recognize_tamazight_tt: "§G塔马齐格特语被历史性地认可为国家语言！§!\n所有柏柏尔族群都感到高兴，但阿拉伯民族主义者却感到不满。"
 ALG_national_unity_initiative: "国家团结倡议"
 ALG_national_unity_initiative_desc: "启动一项全面的计划，在布特弗利卡的和解政策基础上，推广超越民族分歧的阿尔及利亚国家认同。\n\n§G效果：§!\n• 所有群体满意度§G+5§!\n• 完成后§G+3%§!稳定性\n\n§Y此举成本高昂但效果均衡。§!\n§Y冷却时间：§!180天"
 ALG_unity_policy_tt: "§G所有阿尔及利亚人团结在民族旗帜下！§!"
 ALG_suppress_ethnic_unrest: "§R镇压民族动乱§!"
 ALG_suppress_ethnic_unrest_desc: "动用安全部队镇压民族抗议并恢复秩序。\n\n§R紧急措施§! - 仅在群体处于危机状态（满意度<25）时可用。\n\n§Y效果：§!\n• 关键群体满意度 §G+15§!\n• §R-5%§! 稳定度\n• §R-3%§! 战争支持度\n\n§R这只是权宜之计！§!"
 ALG_suppress_unrest_tt: "安全部队暂时恢复了秩序。\n§R但这并未解决根本问题。§!"
 ALG_conduct_national_census: "开展全国人口普查"
 ALG_conduct_national_census_desc: "执行详细的人口普查，以深入了解我国人口构成。"
 ALG_census_arab_focus_tt: "§G阿拉伯人感到满意！§! 其他群体感到被边缘化。"
 ALG_census_balanced_tt: "§G所有群体都赞赏对多样性的认可！§!"
 ALG_census_neutral_tt: "我们对身份政治不持官方立场。"
 ALG_arab_content: "阿拉伯社区支持"
 ALG_arab_content_desc: "阿拉伯多数派全心全意支持政府，为我们的武装力量提供了政治后盾和热忱的新兵。"
 ALG_arab_discontent: "阿拉伯人不满情绪"
 ALG_arab_discontent_desc: "阿拉伯民众对政府政策日益感到不满，这些政策似乎以牺牲他们的利益为代价来偏袒少数群体。"
 ALG_arab_unrest: "阿拉伯人动荡"
 ALG_arab_unrest_desc: "阿拉伯裔民众普遍深感不满。抗议活动与民间骚乱日益频繁，这威胁到我们在内战结束后千辛万苦才实现的稳定局面。"
 ALG_kabyle_content: "卡比利亚人合作"
 ALG_kabyle_content_desc: "卡比利亚人凭借其传统的高教育水平，正热情地为国家发展和科研事业贡献力量。"
 ALG_kabyle_discontent: "卡比利亚自治运动"
 ALG_kabyle_discontent_desc: "卡比利亚活动人士正组织抗议，要求承认塔马齐格特语并扩大区域自治权。黑色春天的阴影正在逼近。"
 ALG_kabyle_unrest: "卡比利亚危机"
 ALG_kabyle_unrest_desc: "卡比利亚地区已公开叛乱。抗议、罢工和公民抗命正使该地区陷入瘫痪。必须立即采取行动。"
 ALG_chaoui_content: "奥瑞斯繁荣"
 ALG_chaoui_content_desc: "沙维亚人正在奥雷斯山脉各地参与建设和采矿项目，助力区域发展。"
 ALG_chaoui_discontent: "奥雷斯遭忽视"
 ALG_chaoui_discontent_desc: "沙维亚人感觉自己被中央政府遗忘了。自内战以来，奥雷斯地区的发展一直停滞不前。"
 ALG_tuareg_content: "图阿雷格联盟"
 ALG_tuareg_content_desc: "骄傲的图阿雷格战士支持政府，并将他们传奇般的沙漠作战专长贡献给我们的军队。"
 ALG_tuareg_discontent: "撒哈拉紧张局势"
 ALG_tuareg_discontent_desc: "图阿雷格社区感到被阿尔及尔忽视。马里和尼日尔的地区动荡正让他们质疑自己的忠诚。"
 ALG_tuareg_unrest: "图阿雷格起义"
 ALG_tuareg_unrest_desc: "图阿雷格武装分子正在撒哈拉地区组织武装抵抗。与马里和尼日尔的跨境活动使局势复杂化。南部地区正变得难以管控。"
 ALG_mozabite_content: "莫扎比特商业"
 ALG_mozabite_content_desc: "注重商业的莫扎比特地区正凭借其商业专长，拓展贸易网络并降低消费品成本。"
 ALG_mozabite_discontent: "姆扎卜紧张局势"
 ALG_mozabite_discontent_desc: "莫扎比特社区正在退出国家经济参与。与姆扎卜河谷阿拉伯邻国的紧张关系正在加剧。"
 ALG_ethnic_harmony: "民族和谐"
 ALG_ethnic_harmony_desc: "所有主要民族都对政府政策感到满意。阿尔及利亚团结一致，终于走出了内战的创伤！"
 ALG_ethnic_tension: "民族紧张"
 ALG_ethnic_tension_desc: "多个民族群体深感不满。布特弗利卡时代的脆弱和平正在瓦解，国家正沿着民族界线分裂。"
 ALG_census_conducted: "人口普查已实施"
 ALG_ethnic_question_raised: "民族问题被提出"
 ALG_ethnic_data_initialized: "民族事务框架已建立"
 ALG_recent_ethnic_policy: "近期颁布民族政策"
 ALG_recent_unity_policy: "近期团结倡议"
 ALG_recent_suppression: "近期镇压行动"
 ALG_tamazight_recognized: "承认塔马齐格特语"
 ALG_black_spring_happened: "黑色春天事件发生"
 ALG_ghardaia_clashes_happened: "盖尔达耶冲突爆发"
 ALG_ethnic_warning_recent: "近期处理过民族紧张局势"
 ALG_has_conducted_census: "已进行全国人口普查"
 ALG_ethnic_system_active: "民族事务框架已建立"
 ALG_can_enact_ethnic_policy: "可颁布新民族政策"
 algeria_power_balance: "阿尔及利亚政治斗争"
 algeria_old_guard: "权力集团（保守派）"
 algeria_reformists: "人民运动（改革派）"
 algeria_compromise_range: "脆弱的妥协"
 algeria_compromise_range_desc: "双方势均力敌。不安的对峙仍在持续，两派势力都在为争取优势而运筹帷幄。"
 old_guard_leaning: "保守派影响增长"
 old_guard_leaning_desc: "军方势力开始重新确立其传统的主导地位。"
 old_guard_partial_control: "保守派串通一气"
 old_guard_partial_control_desc: "权力集团加紧控制。改革派的声音被边缘化。"
 old_guard_strong_control: "威权主义滋长"
 old_guard_strong_control_desc: "安全机构主导政治生活，民主制度逐渐瓦解。"
 old_guard_full_control: "军方主导"
 old_guard_full_control_desc: "权力集团以铁腕手段控制着阿尔及利亚，公民自由受到严重限制。"
 reformists_leaning: "改革派思潮涌动"
 reformists_leaning_desc: "民间社会愈发大胆。希拉克精神复苏。"
 reformists_gaining_ground: "改革派势头高涨"
 reformists_gaining_ground_desc: "改革运动声势日盛。守旧势力竭力维持控制。"
 reformists_strong_momentum: "民主潮流崛起"
 reformists_strong_momentum_desc: "改革派主导了公众舆论，真正的变革似乎触手可及。"
 reformists_victory: "民主过渡"
 reformists_victory_desc: "阿尔及利亚拥抱文官统治与多元主义。权力集团的掌控已被打破。"
 ALG_political_struggle: "阿尔及利亚政治斗争"
 ALG_political_struggle_desc: "保守派与改革派之间的较量将决定阿尔及利亚的未来走向。\n当前态势：[ALG_power_struggle_state]\n军方掌控力：[ALG_army_grip_text]\n民众不满度：[ALG_grievance_text]"
 ALG_power_struggle_state: "政治局势"
 ALG_boost_reformists_tt: "向改革派政治家和民间社会团体输送资源。\n将平衡向改革派倾斜§G+0.15§!。"
 ALG_boost_old_guard_tt: "巩固退伍军人和安全机构中的支持基础。\n将平衡向保守派倾斜§R-0.15§!。"
 ALG_rally_students_tt: "动员学生运动和青年活动家支持改革。\n将平衡向改革派倾斜§G+0.08§!。"
 ALG_mobilize_veterans_tt: "召集独立战争老兵和退役军官。\n将平衡向保守派倾斜§R-0.08§!。"
 ALG_bribe_elites_tt: "运用恩庇手段巩固精英阶层忠诚。\n将平衡向保守派倾斜§R-0.05§!。\n消耗§R30§!国库资金，此举可能助长腐败风险。"
 ALG_compromise_tt: "促成改革派与保守派之间的权力分享协议。\n使政治平衡向中间靠拢§W±0.08§!。"
 ALG_media_campaign_reform_tt: "发起一场宣传民主价值观的媒体运动。\n将平衡向改革派倾斜§G+0.05§!。"
 ALG_security_crackdown_tt: "授权安全部队镇压异议。\n将平衡向保守派倾斜§R-0.05§!。"
 ALG_world_tension_security_tt: "全球局势动荡为强化安全机构提供了正当理由。\n将平衡向保守派倾斜§R-0.08§!。"
 ALG_world_tension_high_security_tt: "全球紧张局势严峻，亟需采取特殊安全措施。\n将平衡向保守派倾斜§R-0.12§!。"
 ALG_crackdown_momentum_tt: "我们的镇压政策巩固了守旧派的地位。\n将平衡向保守派倾斜§R-0.10§!。"
 ALG_reconciliation_momentum_tt: "我们的和解策略增强了改革派的声音。\n将平衡向改革派倾斜§G+0.10§!。"
 ALG_oil_patronage_tt: "利用石油收入资助恩庇网络。\n将平衡向保守派倾斜§R-0.06§!。\n消耗§R25§!国库资金，但能提升稳定度。"
 ALG_economic_reforms_tt: "实施经济自由化与透明度措施。\n将平衡向改革派倾斜§G+0.08§!。"
 ALG_elite_patronage: "精英恩庇网络"
 ALG_elite_patronage_desc: "我们正通过恩庇换取稳定，但这加剧了腐败，并消耗着资源。"
 alg_politics.10.t: "妥协谈判"
 alg_politics.10.d: "双方代表已秘密会面。一项妥协方案已经达成——但双方都会遵守吗？"
 alg_politics.10.a: "接受协议"
 alg_politics.10.b: "拒绝并继续斗争"
 alg_politics.20.t: "改革派夺取政权"
 alg_politics.20.d: "改革派运动已达到临界点。保守势力面临抉择：是退位让贤，还是负隅顽抗。"
 alg_politics.20.a: "接受民主化转型"
 alg_politics.20.b: "军队不会投降"
 alg_politics.21.t: "军事政变一触即发"
 alg_politics.21.d: "将军们已经巩固了权力，并开始着手排挤文职改革派。"
 alg_politics.21.a: "接受军方权威"
 alg_politics.21.b: "保卫改革运动"
 alg_politics.22.t: "阿尔及尔上空的阴影"
 alg_politics.22.d: "安全机构愈发肆无忌惮。阿尔及利亚正滑向威权主义。我们该如何应对？"
 alg_politics.22.a: "安全必须放在首位。"
 alg_politics.22.b: "趁还来得及，缓和紧张局势。"
 alg_politics.23.t: "变革之风"
 alg_politics.23.d: "改革运动日益壮大，但权力集团仍掌控着安全部队。我们该如何行动？"
 alg_politics.23.a: "推进改革"
 alg_politics.23.b: "降速渐进以避免反弹"
 ALG_political_truce: "政治休战"
 ALG_political_truce_desc: "改革派与保守派之间维持着脆弱的妥协。"
 ALG_arabization_hardline: "强硬阿拉伯化政策"
 ALG_arabization_pushed_once: "阿拉伯化初步推进"
 ALG_arabization_recent: "近期阿拉伯化举措"
 ALG_kabyle_appeased_recently: "安抚卡比利亚人情绪"
 ALG_tamazight_integration_process: "柏柏尔语融合进程"
 ALG_tamazight_integration_process_desc: "塔马齐格特语作为官方语言的地位正在各国家机构中逐步落实。此举虽已基本平息相关地区的不满，但行政体系转型与国家认同调整过程中，仍会经历短暂的磨合期，方能实现完全的社会融合。"
 ALG_auto.1.t: "汽车工业丑闻"
 ALG_auto.1.desc: "阿尔及利亚汽车行业爆出大规模腐败丑闻。雷诺、宝马、奔驰等多家外资合作企业被曝涉及贿赂及欺诈性进口行为，引发民众强烈愤慨并要求政府采取行动。"
 ALG_auto.1.a: "展开全面调查"
 ALG_auto.1.b: "封锁消息"
 ALG_auto.2.t: "对汽车行业丑闻的回应"
 ALG_auto.2.desc: "在丑闻调查之后，我们必须决定今后如何处理汽车进口问题。全面禁令将传递强烈信号，但会损害我国经济。部分限制措施则是一个折中方案。"
 ALG_auto.2.a: "实施全面进口禁令"
 ALG_auto.2.b: "实施部分限制"
 ALG_auto.2.c: "不采取行动"
 ALG_auto.3.t: "菲亚特提议建立合作伙伴关系"
 ALG_auto.3.desc: "意大利汽车制造商菲亚特已向我们提出建议，希望在阿尔及利亚建立制造工厂。在我们实施进口限制后，他们看到了我们市场的机遇。这可能会重振我们的汽车行业。"
 ALG_auto.3.a: "接受菲亚特的提议"
 ALG_auto.3.b: "争取更有利的条款"
 ALG_auto.3.c: "拒绝提议"
 ALG_auto.4.t: "汽车产业复苏"
 ALG_auto.4.desc: "在我们对丑闻采取审慎应对措施后，汽车行业开始趋于稳定。国内制造商展现出扩张意愿，而外国企业也持续与我们接洽。"
 ALG_auto.4.a: "支持国内制造商"
 ALG_auto.4.b: "接受外国合作意愿"
 ALG_auto.5.t: "菲亚特接受我方条件"
 ALG_auto.5.desc: "我们的谈判代表成功了。菲亚特公司已同意更优惠的条件，包括追加投资和技术转让。这对阿尔及利亚工业而言是一次重大胜利。"
 ALG_auto.5.a: "好消息！"
 ALG_auto.6.t: "菲亚特拒绝重新谈判"
 ALG_auto.6.desc: "菲亚特拒绝了我们的改善条款要求。他们坚称最初的报价已经非常公道。我们必须决定是接受他们的条件，还是彻底放弃合作。"
 ALG_auto.6.a: "接受原始条款"
 ALG_auto.6.b: "放弃这笔交易"
 ALG_corruption_auto_scandal: "汽车工业腐败丑闻"
 ALG_corruption_auto_scandal_desc: "我国汽车行业普遍存在的腐败问题曝光后，严重动摇了公众信心。在调查持续进行期间，外国合作伙伴正逐渐疏远我们。我们的工业产出和政治资本都遭受了沉重打击。"
 ALG_corruption_auto_scandal_coverup: "汽车丑闻遭压制"
 ALG_corruption_auto_scandal_coverup_desc: "我们已尝试压制汽车行业丑闻的新闻。虽然暂时控制住了直接损害，但外国情报机构已察觉我们的欺瞒行为，国内反对派也获得了攻击我们的把柄。真相恐怕迟早会曝光。"
 ALG_import_ban_penalty: "汽车进口禁令"
 ALG_import_ban_penalty_desc: "在腐败丑闻之后，政府全面禁止了汽车进口。尽管此举有力打击了外国剥削，但也严重扰乱了供应链和工业生产。消费者面临物资短缺和价格上涨的困境。"
 ALG_import_restrictions_light: "汽车进口限制"
 ALG_import_restrictions_light_desc: "对汽车进口实施部分限制。这一审慎举措在维持部分贸易关系的同时，也回应了公众对腐败丑闻的愤怒。经济影响虽在可控范围内，但仍较为显著。"
 ALG_4g_rollout_tt: "§G阿尔及利亚推出全国性4G移动网络：§!\n- 高速移动互联网\n- 提升商业连接性\n- 扩展数字服务范围"
 ALG_4g_coverage_basic: "4G覆盖——基础"
 ALG_4g_coverage_basic_desc: "我们的4G网络已投入运营，但覆盖范围仅限于主要城市中心。需要持续进行基础设施投资。"
 ALG_4g_coverage_moderate: "4G 覆盖——中等"
 ALG_4g_coverage_moderate_desc: "目前，4G网络已覆盖大部分城镇。企业和民众正从改善的互联互通中获益。"
 ALG_4g_coverage_good: "4G 覆盖——良好"
 ALG_4g_coverage_good_desc: "阿尔及利亚大部分地区拥有强大的4G网络覆盖。数字经济蓬勃发展，生产力持续提升。"
 ALG_4g_coverage_excellent: "4G 覆盖——优秀"
 ALG_4g_coverage_excellent_desc: "全国4G覆盖已实现！阿尔及利亚现已成为移动连接领域的区域领导者。为5G发展奠定了基础。"
 algerian_event.51.t: "阿尔及利亚航天器成功登陆月球！"
 algerian_event.51.desc: "阿尔及利亚航天局（ASAL）取得了历史性突破！我们的月球着陆器成功在月球表面实现软着陆，使阿尔及利亚成为历史上第五个完成这一壮举的国家。\n\n着陆过程在全国范围内进行了直播，数百万阿尔及利亚人民屏息见证了我们的航天器在月球南极附近降落。当阿尔及尔控制中心的遥测数据确认着陆成功时，科学家们爆发出热烈的欢呼声。\n\n这一成就使阿尔及利亚与苏联、美国、中国和印度并肩，跻身能够实现月球软着陆的精英国家行列。这标志着我国数十年航天投资终于结出硕果，也预示着阿尔及利亚正崛起为航天强国。\n\n当绿白相间的国旗在月球上展开时，全世界都投来了钦佩的目光。"
 algerian_event.51.a: "阿尔及利亚的一大步！"
 ALG_missile_leverage: "杠杆换导弹"
 ALG_missile_leverage_desc: "我们与中国的关系为获取先进导弹技术提供了契机。通过利用我们的外交关系和战略地位，可以协商引进陆基巡航导弹和机动发射平台。这将极大增强阿尔及利亚的威慑能力。"
 ALG_build_nuclear_reactor_tt: "§G建造核反应堆：§!\n- 建立民用核能发电能力\n- 降低对化石燃料的依赖\n- 培养核科学家与工程师\n- 为先进核研究奠定基础"
 ALG_election_pending: "全国大选即将举行"
 ALG_opposition_reforms_1: "反对派改革：新闻自由"
 ALG_opposition_reforms_1_desc: "反对派政府已启动改革计划，承诺保障媒体自由。如今，新闻自由正监督政府履职，并向公众传达信息。"
 ALG_opposition_reforms_2: "反对派改革：司法体系"
 ALG_opposition_reforms_2_desc: "在媒体改革的基础上，反对派政府进一步推进司法体系改革。如今独立的法院系统确保所有阿尔及利亚人都能获得公正审判，并有力打击腐败现象。"
 ALG_opposition_reforms_3: "反对派改革：教育体系"
 ALG_opposition_reforms_3_desc: "反对派的改革计划继续进行，在教育领域投入巨资。现代化的教育体系正为阿尔及利亚的年轻人迎接未来挑战做好准备。"
 ALG_opposition_reforms_4: "阿尔及利亚新纪元"
 ALG_opposition_reforms_4_desc: "反对派的全面改革计划已经完成。阿尔及利亚已转变为一个现代化、民主且繁荣的国家。自由媒体、独立司法、优质教育和经济机遇定义了这个新时代。"
 ALG_fis_movement: "伊斯兰救世阵线"
 ALG_fis_movement_desc: "伊斯兰救世阵线以伊斯兰民主、社会公正和反腐败的号召，激发了阿尔及利亚人民的热情。清真寺成为社区中心，提供政府忽视的社会服务。民众支持与日俱增。"
 ALG_fln.1.t: "阿尔及利亚腐败丑闻震动全国"
 ALG_fln.1.desc: "调查记者揭露了一个遍布阿尔及利亚政治体制的腐败网络。银行记录显示，数百万公共资金被转移至私人账户。多个政党似乎牵涉其中，包括我们民族解放阵线的成员。\n\n丑闻已公之于众，我们无法视而不见。证据确凿，但我们的应对方式可能稳定或动摇整个政治体系。我们必须审慎决定行动方针。"
 ALG_fln.1.a: "封杀消息"
 ALG_cover_up_corruption_tt: "§R掩盖丑闻：§!\n• 腐败程度显著增加\n• 少量政治点数损失\n• 民族解放阵线声望轻微受损\n• 当前稳定性得以维持\n\n§7\"人民不知道的事，就不会伤害他们。\"§!"
 ALG_fln.1.b: "要怪就怪反对党"
 ALG_blame_others_tt: "§Y指责反对党：§!\n• 腐败加剧\n• 反对党严重受损\n• 民族解放阵线获得一定支持\n• 损失部分稳定度\n\n§7\"他们才是真正的罪犯！\"§!"
 ALG_fln.1.c: "让真相大白于天下"
 ALG_expose_all_tt: "§G全面揭露腐败：§!\n• 所有政党受损（包括民族解放阵线）\n• 显著稳定性损失\n• 高昂政治点数消耗\n• 但腐败程度降低\n• 获得反腐势头（持续1年的增益效果）\n\n§7\"人民有权知道真相。\"§!"
 ALG_fln.1.e: "开展全面反腐运动"
 ALG_anti_corruption_campaign_tt: "§G发起反腐败运动：§!\n• 所有政党受损（包括民族解放阵线）\n• 巨额国库开支（§R-15§!）\n• 大量政治点数消耗（§R-100§!）\n• 但腐败程度显著降低\n• §G永久性反腐改革§!\n• 获得长期稳定\n\n§7\"我们将彻底根除这颗毒瘤！\"§!"
 ALG_anti_corruption_momentum: "反腐势头"
 ALG_anti_corruption_momentum_desc: "腐败丑闻的曝光引发了公众对改革的强烈呼声。尽管过程令人痛心，但这场透明化的风暴正为积极变革积蓄力量。"
 ALG_anti_corruption_reforms: "反腐改革"
 ALG_anti_corruption_reforms_desc: "政府已全面实施反腐措施。透明的采购流程、独立的审计机构以及举报人保护机制正在减少贪污行为，重建公众信任。"
 ALG_fln.2.t: "国家石油腐败丑闻"
 ALG_fln.2.desc: "阿尔及利亚国有石油公司爆发大规模腐败丑闻。调查显示通过虚假合同和离岸账户侵吞了数十亿资金。公司高管和外国合作伙伴均牵涉其中。\n\n公众要求给出解释。我们将如何应对？"
 ALG_fln.2.a: "掩盖起来"
 ALG_fln.2.b: "调查腐败"
 ALG_fln.2.c: "指责反对派"
 ALG_fln.3.t: "人民觉醒"
 ALG_fln.3.desc: "数百万阿尔及利亚人走上街头，发起了一场要求变革的群众运动。\"希拉克\"抗议活动跨越了所有分歧——无论老少、世俗还是宗教群体——团结了人民。\n\n\"Yetnahaw Ga3!\"（他们必须全部下台！）的呼声在每个城市回荡。\n\n旧秩序正在颤抖。人民已经发出了自己的声音。"
 ALG_fln.3.a: "人民已经发声"
 ALG_grievance_increase_5_tt: "§Y民众不满：§! +5"
 ALG_cover_up_scandal: "丑闻掩盖"
 ALG_cover_up_scandal_desc: "国家石油腐败丑闻已被掩盖，但流言蜚语仍在暗中流传。外国情报机构已察觉到这起事件的真相被隐瞒，随时可能重新浮出水面。"
 ALG_anti_corruption_probe: "反腐调查"
 ALG_anti_corruption_probe_desc: "对国家石油公司腐败案的全面调查正在进行中。尽管调查扰乱了正常业务，但它正在恢复公众信任，并根除腐败官员。"
 ALG_shift_blame: "指责反对派"
 ALG_shift_blame_desc: "政府成功地将公众对国家石油公司丑闻的愤怒转移到了反对党身上。虽然宣传手段有效，但这种转移注意力的做法对解决根本的腐败问题毫无帮助。"
 ALG_sonatrach_corruption: "国家石油腐败丑闻"
 ALG_sonatrach_corruption_desc: "巨大的国家石油腐败丑闻动摇了公众信任。数十亿资金被侵吞，而普通阿尔及利亚人却在艰难求生。石油行业的声誉已然蒙尘。"
 ALG_mass_protests: "大规模抗议"
 ALG_mass_protests_desc: "阿尔及利亚的\"希拉克运动\"已动员数百万人走上街头。民众要求根本性变革，经济活动因此受到干扰。旧秩序正在动摇。"
 ALG_FLN_chosen: "选择民族解放阵线路线"
 ALG_fln_opp_path: "选择民族解放阵线反对派路线"
 ALG_domestic_development_focus: "注重国内发展"
 ALG_domestic_development_focus_desc: "阿尔及利亚选择投资于自身发展而非对外扩张。基础设施项目、工业发展和社会计划正在将这个国家转变为一个现代化、繁荣的国家。"
 ALG_middle_east_expansion: "中东扩张"
 ALG_middle_east_expansion_desc: "我们的军队正向中东进军。部队补给充足，对荣耀与征服的憧憬激励着他们奋勇向前。"
 ALG_domestic_focus_bonus: "国内发展"
 ALG_de_arabisation_effect_TT: "§Y去阿拉伯化政策：§!\n\n§G 柏柏尔语言复兴§!\n  塔马齐格特语成为共同官方语言\n\n§G 文化认同§!\n  阿马齐格身份在全国范围内得到颂扬\n\n§G 教育改革§!\n  学校教授柏柏尔历史\n\n§R后果：§!\n  -阿拉伯民族主义者支持度\n  -与阿拉伯联盟的关系\n  +卡比利亚地区稳定"
