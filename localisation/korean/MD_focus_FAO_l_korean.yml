l_korean:
 faroe_islands_focus: "페로 제도 중점계통도"
 FAO_national_decisions: "페로 제도 국가 결정"
 FAO_national_decisions_desc: "페로 제도는 매우 여유로우면서도 동시에 긴장감이 감도는 상황에 놓여 있습니다. 정치 지도자들이 섬과 주민들을 발전시키기 위해... 뭐라도 해보려 노력하는 것과는 별개로, 언젠가는 맞이해야 할 독립이라는 압박적인 문제와도 씨름해야만 합니다. 어떤 이들은 당장의 독립을 원하고, 어떤 이들은 더 안정적인 기반이 다져질 때까지 기다리기를 원합니다. 어느 쪽이든 이 섬이 마침내 진정한 자유를 얻을 수 있을지는 페로 제도 주민들과 덴마크 양측에 달려 있습니다."
 FAO_decision_independence_war: "독립 전쟁"
 FAO_decision_independence_war_desc: "결단의 때가 도래했고, 정치인들은 국민들을 어쩔 수 없는 상황으로 몰아넣었습니다. 전쟁이 선포된 지금, 덴마크가 왕관을 지켜낼 수 있을지, 아니면 대중의 압박에 의해 모든 세력 간에 평화가 강제되며 그 지배력을 상실하게 될지 판가름할 싸움이 시작되었습니다."