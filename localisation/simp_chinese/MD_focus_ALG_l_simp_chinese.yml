 ALG_ethnic_data.0.t: "The Question of National Identity"
 ALG_ethnic_data.0.d: "The events of the Black Spring have forced us to confront a fundamental question: What does it mean to be Algerian?\n\nFor decades, successive governments have promoted an exclusively Arab-Islamic identity. But the Kabyle uprising has made clear that millions of our citizens feel excluded from this vision. The Berber peoples - Kabyles, Chaouis, Tuaregs, Mozabites - demand recognition of their languages, cultures, and contributions to our nation.\n\nWe can no longer ignore this issue. A comprehensive framework for managing ethnic relations must be established, or we risk further fragmentation of our society.\n\n§YThis will activate the Ethnic Management System.§!"
 ALG_ethnic_data.0.a: "Establish the ethnic affairs framework."
 ALG_ethnic_data.0.b: "We need more time to consider this."
 ALG_delay_ethnic_tt: "§RDelaying will not make the problem go away.§!\nThe system will still activate, but with penalties."
 ALG_ethnic_data.1.t: "Ethnic Demographics of Algeria"
 ALG_ethnic_data.1.d: "Our analysis of Algeria's ethnic composition following the Black Spring is complete. The crisis has revealed deep fractures in our society:\n\n§YArabs§!: [?ALG_ethnic_arab]% — Satisfaction: [?arab_satisfaction]/100\nThe majority population. Their dominance is being questioned.\n\n§Yⵣ Kabyles§!: [?ALG_ethnic_kabyle]% — Satisfaction: [?kabyle_satisfaction]/100\n§RThe Black Spring has radicalized many. Tensions are critical.§!\n\n§YChaouis§!: [?ALG_ethnic_chaoui]% — Satisfaction: [?chaoui_satisfaction]/100\nWatching events in Kabylie closely.\n\n§Y⵿ Tuaregs§!: [?ALG_ethnic_tuareg]% — Satisfaction: [?tuareg_satisfaction]/100\nSaharan communities feel neglected by Algiers.\n\n§Yⵎ Mozabites§!: [?ALG_ethnic_mozabite]% — Satisfaction: [?mozabite_satisfaction]/100\nMaintaining their distinct Ibadi communities.\n\n§YOthers§!: [?ALG_ethnic_other]%\n\n§YThe Ethnic Management System is now active.§!"
 ALG_ethnic_data.1.a: "We must manage this carefully."
 ALG_ethnic_system_active_tt: "§GEthnic Management System is now active!§!\n\nMonitor satisfaction in the decision panel.\nUse policies to keep groups satisfied.\nNeglected groups will cause problems!"
 ALG_ethnic_data_category: "[ALG.GetFlag]§YEthnic Demographics§!"
 ALG_ethnic_data_category_desc: "§YAlgeria's Ethnic Mosaic§! represents the complex tapestry of peoples that make up our nation. In the aftermath of the devastating §RCivil War (1991-2002)§!, managing ethnic relations has become crucial for national stability. President [ALG.GetLeader]'s policy of national reconciliation must address the grievances of all communities.\n\nThe §YKabyle population§! in particular remains restless - the §RBlack Spring of 2001§! looms on the horizon if their concerns are not addressed. Meanwhile, the §YTuareg§! communities in the south watch events in neighboring Mali and Niger with interest.\n\n§H══════ HOW IT WORKS ══════§!\n\nEach ethnic group has a §Ysatisfaction level§! (0-100):\n§G• Above 70§!: Group is §GCONTENT§! → Provides national bonuses\n§Y• 40-70§!: Group is §YNEUTRAL§! → No special effects\n§R• Below 40§!: Group is §RDISCONTENT§! → Causes penalties\n§R• Below 25§!: §RDANGER!§! → Severe penalties, possible revolt\n\n§YSatisfaction decays monthly§! for neglected groups. Favoring one group often upsets others!\n\n§H══════ CURRENT STATUS ══════§!\n\n§YARABS§! — [?ALG_ethnic_arab]% of population\n  Satisfaction: [?arab_satisfaction]/100\n  §YWhen Content:§! §G+Political Power, +Stability, +Manpower§!\n\n§Yⵣ KABYLES§! — [?ALG_ethnic_kabyle]% of population\n  Satisfaction: [?kabyle_satisfaction]/100\n  §YWhen Content:§! §G+Research Speed§!\n  §RWarning: Black Spring may trigger if satisfaction stays low!§!\n\n§YCHAOUIS§! — [?ALG_ethnic_chaoui]% of population\n  Satisfaction: [?chaoui_satisfaction]/100\n  §YWhen Content:§! §G+Construction Speed, +Resources§!\n\n§Y⵿ TUAREGS§! — [?ALG_ethnic_tuareg]% of population\n  Satisfaction: [?tuareg_satisfaction]/100\n  §YWhen Content:§! §G+Army Organization, +Desert Combat§!\n\n§Yⵎ MOZABITES§! — [?ALG_ethnic_mozabite]% of population\n  Satisfaction: [?mozabite_satisfaction]/100\n  §YWhen Content:§! §G-Consumer Goods, +Trade§!\n\n§YOTHERS§! — [?ALG_ethnic_other]% of population"
 ALG_ethnic_arab_display: "Arabs: [?ALG_ethnic_arab]%"
 ALG_ethnic_kabyle_display: "Kabyle: [?ALG_ethnic_kabyle]%"
 ALG_ethnic_chaoui_display: "Chaoui: [?ALG_ethnic_chaoui]%"
 ALG_ethnic_tuareg_display: "Tuareg: [?ALG_ethnic_tuareg]%"
 ALG_ethnic_mozabite_display: "Mozabite: [?ALG_ethnic_mozabite]%"
 ALG_ethnic_other_display: "Others: [?ALG_ethnic_other]%"
 ALG_census_tt: "Conduct a comprehensive national census to update demographic data and inform policy."
 ALG_ethnic_data.2.t: "Census Results and National Identity"
 ALG_ethnic_data.2.d: "Our census reveals Algeria's ethnic diversity. How should we respond politically?"
 ALG_ethnic_data.2.a: "Reinforce Arab-Islamic identity."
 ALG_ethnic_data.2.b: "Celebrate our Berber and Arab heritage equally."
 ALG_ethnic_data.2.c: "Avoid taking a stance."
 ALG_ethnic_data.20.t: "Ghardaïa Clashes"
 ALG_ethnic_data.20.d: "§R2013 - M'ZAB VALLEY§!\n\nViolent clashes have erupted between Arab and Mozabite communities in the M'zab Valley, centered on the historic city of Ghardaïa. The violence, which began over a cemetery dispute, has escalated into widespread communal riots.\n\nMozabite shops and homes have been attacked and burned. Several people have been killed on both sides. The Mozabite community, descendants of the ancient Rustamid dynasty, feel their very existence is threatened.\n\nThe security forces are struggling to contain the situation. How do we respond?"
 ALG_ethnic_data.20.a: "The Arabs have legitimate grievances. Side with them."
 ALG_ethnic_data.20.b: "Protect the Mozabite minority. Deploy troops to secure their areas."
 ALG_ethnic_data.20.c: "Attempt neutral mediation between both communities."
 ALG_ghardaia_arab_side_tt: "We side with the Arab community.\n§RMozabite satisfaction §R-20§!\n§GArab satisfaction §G+5§!"
 ALG_ghardaia_mozabite_side_tt: "We deploy forces to protect Mozabites.\n§RMozabite satisfaction §R-5§! (appreciative but traumatized)\n§RArab satisfaction §R-10§!"
 ALG_ghardaia_neutral_tt: "We attempt mediation.\n§RMozabite satisfaction §R-10§!\n§RArab satisfaction §R-3§!\nNeither side is fully satisfied."
 ALG_ethnic_data.10.t: "Ethnic Tensions Rising"
 ALG_ethnic_data.10.d: "Reports indicate growing unrest among dissatisfied ethnic communities. Local officials warn that protests are being organized, and some fear more radical action if concerns aren't addressed.\n\n§RCurrent Crisis Groups:§!"
 ALG_ethnic_data.10.a: "We cannot address every complaint."
 ALG_ethnic_data.10.b: "Send officials to address their concerns."
 ALG_init_ethnic_data: "Initialize Ethnic Affairs"
 ALG_init_ethnic_data_desc: "Establish the framework for managing Algeria's diverse ethnic communities in the post-Civil War era."
 ALG_show_ethnic_data: "§YView Ethnic Overview§!"
 ALG_show_ethnic_data_desc: "Review the current status of all ethnic groups in Algeria."
 ALG_ethnic_overview_full_tt: "§HETHNIC GROUPS OVERVIEW§!\n\n§YARABS§! | Pop: §G[?ALG_ethnic_arab]%§! | Satisfaction: §B[?arab_satisfaction]§!/100\n§Yⵣ KABYLES§! | Pop: §G[?ALG_ethnic_kabyle]%§! | Satisfaction: §B[?kabyle_satisfaction]§!/100\n§YCHAOUIS§! | Pop: §G[?ALG_ethnic_chaoui]%§! | Satisfaction: §B[?chaoui_satisfaction]§!/100\n§Y⵿ TUAREGS§! | Pop: §G[?ALG_ethnic_tuareg]%§! | Satisfaction: §B[?tuareg_satisfaction]§!/100\n§Yⵎ MOZABITES§! | Pop: §G[?ALG_ethnic_mozabite]%§! | Satisfaction: §B[?mozabite_satisfaction]§!/100\n§YOTHERS§! | Pop: §G[?ALG_ethnic_other]%§!\n\n§YRemember:§! Groups lose satisfaction if not actively supported!"
 ALG_favor_arab_policies: "Pro-Arab Policies"
 ALG_favor_arab_policies_desc: "Promote Arabic language, Arab-Islamic cultural identity, and prioritize Arab regions in development.\n\n§GEffects:§!\n• Arab satisfaction §G+10§!\n• Kabyle satisfaction §R-5§!\n• Chaoui satisfaction §R-3§!\n• Tuareg satisfaction §R-3§!\n• Mozabite satisfaction §R-3§!\n\n§YCooldown:§! 60 days"
 ALG_favor_arab_tt: "§GArabs are pleased with our support!§!\n§RMinority groups feel marginalized.§!"
 ALG_favor_kabyle_policies: "Pro-Kabyle Policies"
 ALG_favor_kabyle_policies_desc: "Support Tamazight language education, Kabyle cultural preservation, and development in Kabylie region.\n\n§GEffects:§!\n• Kabyle satisfaction §G+10§!\n• Arab satisfaction §R-5§!\n• Chaoui satisfaction §R-2§!\n\n§YCooldown:§! 60 days"
 ALG_favor_kabyle_tt: "§GKabyles celebrate recognition of their heritage!§!\n§RArabs feel their dominance threatened.§!"
 ALG_favor_chaoui_policies: "Pro-Chaoui Policies"
 ALG_favor_chaoui_policies_desc: "Invest in development of the Aurès Mountains region and support Chaoui cultural initiatives.\n\n§GEffects:§!\n• Chaoui satisfaction §G+10§!\n• Arab satisfaction §R-3§!\n• Kabyle satisfaction §R-2§!\n\n§YCooldown:§! 60 days"
 ALG_favor_chaoui_tt: "§GChaouis appreciate the development in their region!§!"
 ALG_favor_tuareg_policies: "Pro-Tuareg Policies"
 ALG_favor_tuareg_policies_desc: "Support Tuareg autonomy in the Sahara, invest in southern development, and integrate Tuareg communities.\n\n§GEffects:§!\n• Tuareg satisfaction §G+10§!\n• Arab satisfaction §R-3§!\n\n§YCooldown:§! 60 days"
 ALG_favor_tuareg_tt: "§GThe Blue Men of the desert appreciate our attention!§!"
 ALG_favor_mozabite_policies: "Pro-Mozabite Policies"
 ALG_favor_mozabite_policies_desc: "Protect Ibadi religious practices, support Mozabite merchant communities, and develop the M'zab Valley.\n\n§GEffects:§!\n• Mozabite satisfaction §G+10§!\n• Arab satisfaction §R-2§!\n\n§YCooldown:§! 60 days"
 ALG_favor_mozabite_tt: "§GMozabite merchants expand their trade networks!§!"
 ALG_recognize_tamazight_1: "Recognize Tamazight Language"
 ALG_recognize_tamazight_1_desc: "Officially recognize Tamazight as a national language of Algeria, alongside Arabic. This historic decision would address a core demand of the Berber movement.\n\n§GEffects:§!\n• Kabyle satisfaction §G+20§!\n• Chaoui satisfaction §G+15§!\n• Tuareg satisfaction §G+10§!\n• Mozabite satisfaction §G+10§!\n• Arab satisfaction §R-10§!\n• §G+5%§! Stability\n\n§YAvailable after 2002§!"
 ALG_recognize_tamazight_tt: "§GHistoric recognition of Tamazight as a national language!§!\nAll Berber groups are pleased, but Arab nationalists are upset."
 ALG_national_unity_initiative: "National Unity Initiative"
 ALG_national_unity_initiative_desc: "Launch a comprehensive program promoting Algerian national identity above ethnic divisions, building on Bouteflika's reconciliation policy.\n\n§GEffects:§!\n• All groups satisfaction §G+5§!\n• §G+3%§! Stability on completion\n\n§YThis is expensive but balanced.§!\n§YCooldown:§! 180 days"
 ALG_unity_policy_tt: "§GAll Algerians unite under the national banner!§!"
 ALG_suppress_ethnic_unrest: "§RSuppress Ethnic Unrest§!"
 ALG_suppress_ethnic_unrest_desc: "Use security forces to quell ethnic protests and restore order.\n\n§REMERGENCY MEASURE§! - Only available when groups are in crisis (<25 satisfaction).\n\n§YEffects:§!\n• Critical groups satisfaction §G+15§!\n• §R-5%§! Stability\n• §R-3%§! War Support\n\n§RThis is only a temporary solution!§!"
 ALG_suppress_unrest_tt: "Security forces restore order for now.\n§RThis will not solve the underlying issues.§!"
 ALG_conduct_national_census: "Conduct National Census"
 ALG_conduct_national_census_desc: "Perform a detailed demographic census to better understand our population composition."
 ALG_census_arab_focus_tt: "§GArabs are pleased!§! Other groups feel marginalized."
 ALG_census_balanced_tt: "§GAll groups appreciate the recognition of diversity!§!"
 ALG_census_neutral_tt: "We take no official stance on identity politics."
 ALG_arab_content: "Arab Community Support"
 ALG_arab_content_desc: "The Arab majority supports the government wholeheartedly, providing political backing and eager recruits for our armed forces."
 ALG_arab_discontent: "Arab Discontent"
 ALG_arab_discontent_desc: "The Arab population is growing frustrated with government policies that seem to favor minorities at their expense."
 ALG_arab_unrest: "Arab Unrest"
 ALG_arab_unrest_desc: "The Arab majority is deeply unhappy. Protests and civil unrest are becoming common, threatening the stability we fought so hard to achieve after the Civil War."
 ALG_kabyle_content: "Kabyle Cooperation"
 ALG_kabyle_content_desc: "The Kabyle people, with their traditionally high education levels, are contributing enthusiastically to national development and research."
 ALG_kabyle_discontent: "Kabyle Autonomy Movement"
 ALG_kabyle_discontent_desc: "Kabyle activists are organizing protests demanding recognition of Tamazight and greater regional autonomy. The shadow of the Black Spring looms."
 ALG_kabyle_unrest: "Kabylie Crisis"
 ALG_kabyle_unrest_desc: "The Kabyle region is in open revolt. Protests, strikes, and civil disobedience are paralyzing the region. Urgent action is needed."
 ALG_chaoui_content: "Aurès Prosperity"
 ALG_chaoui_content_desc: "The Chaoui people are contributing to construction and mining projects throughout the Aurès Mountains, boosting regional development."
 ALG_chaoui_discontent: "Aurès Neglect"
 ALG_chaoui_discontent_desc: "The Chaoui population feels forgotten by the central government. Development in the Aurès region has stagnated since the Civil War."
 ALG_tuareg_content: "Tuareg Alliance"
 ALG_tuareg_content_desc: "The proud Tuareg warriors support the government and lend their legendary desert warfare expertise to our military."
 ALG_tuareg_discontent: "Saharan Tension"
 ALG_tuareg_discontent_desc: "The Tuareg communities feel ignored by Algiers. Regional instability in Mali and Niger is making them question their loyalty."
 ALG_tuareg_unrest: "Tuareg Uprising"
 ALG_tuareg_unrest_desc: "Tuareg fighters are organizing armed resistance in the Sahara. Cross-border movements with Mali and Niger complicate matters. The south is becoming ungovernable."
 ALG_mozabite_content: "Mozabite Commerce"
 ALG_mozabite_content_desc: "The business-minded Mozabite community is boosting trade networks and reducing consumer goods costs through their commercial expertise."
 ALG_mozabite_discontent: "M'zab Tensions"
 ALG_mozabite_discontent_desc: "The Mozabite community is withdrawing from national economic participation. Tensions with Arab neighbors in the M'zab Valley are rising."
 ALG_ethnic_harmony: "Ethnic Harmony"
 ALG_ethnic_harmony_desc: "All major ethnic groups are content with government policies. Algeria stands united, finally moving past the trauma of the Civil War!"
 ALG_ethnic_tension: "Ethnic Tensions"
 ALG_ethnic_tension_desc: "Multiple ethnic groups are deeply unhappy. The fragile peace of the Bouteflika era is crumbling as the country fractures along ethnic lines."
 ALG_census_conducted: "Census Conducted"
 ALG_ethnic_question_raised: "Ethnic Question Raised"
 ALG_ethnic_data_initialized: "Ethnic Affairs Established"
