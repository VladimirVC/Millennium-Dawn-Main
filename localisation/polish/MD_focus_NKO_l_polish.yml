 NKO_Simhwajo_Sageon_legacy_desc: "Simhwajo Sageon to wielka kampania czystek prowadzona przez Kim Dzong Ila, mająca na celu usunięcie mężczyzn jego ojca Kim Ir Sena, która miała miejsce w Korei Północnej w latach 1997–2000\nNiektórzy nazywali ją „północnokoreańską wersją makartyzmu” lub „północnokoreańską wersją” rewolucji kulturalnej”"
