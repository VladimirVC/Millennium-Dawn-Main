 alg_deep_state_news.1.t: "Military Coup in Algeria!"
 alg_deep_state_news.1.d: "Reports from Algiers indicate that the Algerian military has seized control of the government. Tanks surround key government buildings and a military junta has announced it is taking power.\n\nThis marks a dramatic shift in Algerian politics, with the long-rumored 'deep state' now openly in control."
 alg_deep_state_news.1.a: "This is deeply concerning."
 alg_deep_state_news.1.b: "Algeria's internal affairs are not our concern."
