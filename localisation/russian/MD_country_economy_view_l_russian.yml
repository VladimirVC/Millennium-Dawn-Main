 BALANCE_TOOLTIP_DELAYED: "Деньги в нашей казне — это средства, которые мы можем потратить. Они используются для покупок и инвестиций. Если их остаток станет отрицательным, система автоматически возьмет в долг, чтобы сохранить положительный баланс."
 TREASURY_TITLE: "Казна"
