 CHI_korea_peninsula_tension_display: "$CHI_korea_peninsula_tension$: [?CHI_korea_peninsula_tension]"
 CHI_legitimacy_concentrated_desc: "政治局常务委员会不再需要法定人数— - 总书记圈子已经融入了政治网络。中央纪委现在只是个摆设。"
 CHI_Lips_and_Teeth: "唇齿相依"
 CHI_Lips_and_Teeth_desc: "自朝鲜战争以来，对中朝关系“唇齿相依”的历史性描述一直指导着中国的政策。正式确立这一理论意味着中国将自身置于金氏政权生存的保护之下，以牺牲更广泛的朝鲜半岛和解为代价，加深与平壤的联系。"
 CHI_mass_line_campaign: "群众路线运动"
 CHI_mass_line_campaign_desc: "官员被派往农村社区，与农民同桌用餐，并就当地情况提交报告。政府办公场所的奢侈品被移除，铺张浪费的公共开支受到公开谴责。这场运动重塑了官员的公开行为，并遏制了此前将国家资源转移到私人渠道的非正规消费。"
 CHI_Mount_Paektu_Understanding: "白头山谅解"
 CHI_Mount_Paektu_Understanding_desc: "在金氏王朝的发源地白头山脚下，双方秘密达成双边谅解，正式确立了中国与朝鲜军方指挥部之间的安全磋商。"
