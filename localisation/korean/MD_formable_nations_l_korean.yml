 GCL_integrate_ECU: "[GetGCLNameAdj] [ECU.GetAdjective] 영토 통합"
 GCL_integrate_ECU_desc: ""
 GCL_update_flag: "[GetGCLNameDef] 형성 완료"
 GCL_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetGCLNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_SCA_category: "노르드인의 단결"
 form_SCA_category_desc: "노르딕 민족들은 이전에 스웨덴 제국, 칼마르 동맹 등 여러 나라를 공유한 바 있습니다. 이러한 활기차고 풍부한 역사, 독특한 문화, 그리고 언어를 가진 민족들을 통합하는 것은 이를 시도하는 누구에게나 큰 도전이 될 것입니다."
 SCA_integrate_start: "[GetSCANameDef] 형성 시작"
 SCA_integrate_start_desc: "스칸디나비아 제국을 결성할 때가 되었습니다. 더 나은 내일을 건설해 나가는 동안, 우리의 형제자매들은 진정으로 하나의 깃발 아래 뭉치게 될 것입니다.\n\n"
