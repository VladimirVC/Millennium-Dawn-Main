 afv_gasoline_engine_gen1: "2차대전 이후 가솔린 엔진"
 afv_gasoline_engine_gen1_desc: "중형 가솔린 엔진 또는 소형 차량을 움직일 수 있을 만큼 충분한 출력을 갖춘 여러 개의 소형 엔진 세트."
 afv_gasoline_engine_gen2: "냉전 초기 가솔린 엔진"
 afv_gasoline_engine_gen2_desc: "경차용 가솔린 엔진의 개선되고 강력한 버전"
 afv_gasoline_engine_gen3: "냉전 후기 가솔린 엔진"
 afv_gasoline_engine_gen3_desc: "현대에서는 보기 드문 결정인 이 매우 효과적인 엔진은 경자동차가 적절한 속도로 이동할 수 있도록 도와줍니다."
 tank_small_medium_cannon_4: "최첨단 경전차포"
 tank_small_medium_cannon_4_desc: "포구 속도가 증가하고 주력 전차포의 요소가 도입된 미래의 경전차포는 전장의 거의 모든 위협에 대응할 수 있을 것입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 tank_medium_cannon_4: "최첨단 중형 전차포"
 tank_medium_cannon_4_desc: "전열 화학 추진(ETC) 기술이 추가됨에 따라, 포신 전체 길이를 통해 탄자가 가속되므로 미래의 전차포는 믿을 수 없을 정도로 높은 포구 속도를 가질 수 있을 것입니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 tank_large_cannon_3: "발전된 중전차포"
 tank_large_cannon_3_desc: "개선된 설계를 통해, 발전된 중전차포에서 발사되는 탄약은 기갑 차량과 보병 모두에게 효과적인 타격을 입힙니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 tank_very_large_cannon_3: "발전된 초중전차포"
 tank_very_large_cannon_3_desc: "전자기 가속 보조 장치가 추가되어, 초중전차포는 탄자를 통해 장갑은 물론 건물과 벙커까지 관통할 수 있습니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 art_small_gun_gen3: "현대 경곡사포"
 art_small_gun_gen3_desc: "더 가벼운 차량에서 발사하도록 제작된 총신으로, 가동 중지 시간을 최소화하고 효과적인 반동 완화 시스템을 사용하여 여러 발을 신속하게 발사할 수 있습니다."
 art_small_gun_gen4: "발전된 경곡사포"
 art_small_gun_gen4_desc: "경포 개념을 현대화하여 신속하게 발사할 수 있고, 재배치 시 플랫폼 속도를 늦추지 않을 만큼 가벼워진 이동식 포병 체계입니다."
 art_small_gun_gen5: "최첨단 경곡사포"
 art_small_gun_gen5_desc: "우리 제조 업체가 생산할 수 있는 최고의 제품인 이 이동식 포병은 모든 목표 지역에 포탄을 쏟아부을 것입니다."
 art_med_gun_gen1: "냉전 초기 곡사포"
 art_med_gun_gen1_desc: "제2차 세계 대전 당시의 중형 곡사포를 궤도형 플랫폼에서 운용할 수 있도록 최소한으로 개조한 형태입니다. 발사 시 충격이 매우 크므로 차량 근처에 서 있는 것은 권장하지 않습니다."
 art_med_gun_gen2: "냉전기 곡사포"
 art_med_gun_gen2_desc: "궤도형 차량에서 운용하기 위해 밀폐된 포탑 체계로 개조된 제2차 세계 대전 시대의 중형 곡사포입니다. 화력과 기동성 사이에서 적절한 균형을 이루고 있으며, 차체 후면에 주퇴용 삽날(Plow)을 갖추어 안정적인 사격이 가능합니다."
 art_med_gun_gen3: "현대 곡사포"
 art_med_gun_gen3_desc: "현대 군대의 요구 사항에 맞춰 특별히 설계된 중형 포병 체계입니다. 이동성과 신뢰성, 그리고 강력한 화력을 완벽하게 결합했습니다."
 art_med_gun_gen4: "발전된 곡사포"
 art_med_gun_gen4_desc: "현대군을 위한 중형 포병 체계로, 포의 구동 메커니즘을 개선하여 목표물에 더 치명적인 피해를 입힐 수 있는 고성능 탄약을 운용할 수 있습니다."
 art_med_gun_gen5: "최첨단 곡사포"
 art_med_gun_gen5_desc: "중형 포병 체계의 정점입니다. 이 포가 발사되는 지역은 그저 먼지와 흙더미로 변하게 될 것입니다."
 art_big_gun_gen3: "현대 곡사포"
 art_big_gun_gen4: "향상된 곡사포"
 art_big_gun_gen3_desc: "적의 위치에 가장 무거운 포탄을 발사할 준비가 된 장거리 포병포입니다. 반동 완화 기능이 향상되었지만 구경이 크기 때문에 여전히 발사 속도가 느립니다."
 art_big_gun_gen5: "Cutting-Edge Howitzer"
 art_big_gun_gen5_desc: "완벽한 중포신과 발사 메커니즘을 통해 실제로 목표물을 파괴해야 할 때 매우 효과적인 중장거리 포병이 개발됩니다."
 art_med_rocket_gen1: "냉전 초기 중형 MLRS"
 art_med_rocket_gen1_desc: "초기 200-300mm 로켓은 일반적으로 수정된 100-200mm 플랫폼에서 발사되며, 발사관 수는 적지만 전반적으로 폭발력과 파편화력이 더 높습니다."
 art_med_rocket_gen2: "냉전기 중형 MLRS"
 art_med_rocket_gen2_desc: "중형 로켓용 발사기 시스템 개발을 통해 플랫폼의 전반적인 효율성과 비용 절감을 실현했습니다. 향상된 사거리와 다양한 탄두 및 로켓 호환성을 갖추어 다양한 사격 임무에 적합하며, 광범위한 지역의 표적과 교전하는 데 사용됩니다."
 art_med_rocket_gen3: "현대 중형 MLRS"
 art_med_rocket_gen3_desc: "발사대와 시스템의 현대화를 통해 중장거리 표적과 교전할 수 있는 고성능 로켓과 탄두를 운용하게 되었으며, 향상된 정확도로 훨씬 넓은 범위를 커버하는 중형 MLRS가 탄생했습니다."
 art_med_rocket_gen4: "발전된 중형 MLRS"
 art_med_rocket_gen4_desc: "발사관 수를 늘린 대형화된 중형 MLRS 시스템과 더 큰 탄두를 조합하여, 시스템의 효율성을 유지하면서도 최대한의 피해를 입히도록 설계되었습니다."
 art_med_rocket_gen5: "미래 중형 MLRS"
 art_med_rocket_gen5_desc: "중형 MLRS는 동시에 여러 종류의 로켓을 발사할 수 있습니다. 이 발사대는 평소보다 훨씬 빠르게 재장전할 수 있어, 여러 대의 플랫폼을 배치할 필요 없이 지속적인 화력을 투사할 수 있습니다."
 direct_fire_conversion: "직접 사격 모듈"
 direct_fire_conversion_desc: "총을 더 많이 내림으로써 포병을 긴급 상황에서 직접 사격 모드로 사용할 수 있습니다. 이렇게 하면 어려운 목표물에 대한 교전이 더 쉬워지지만 직접 사격에 대한 더 많은 옵션을 허용하면 포병의 간접 사격 능력이 일부 저하될 것입니다."
 direct_fire_conversion_medium: "직접 사격 모듈"
 direct_fire_conversion_medium_desc: "총을 더 많이 내림으로써 포병을 긴급 상황에서 직접 사격 모드로 사용할 수 있습니다. 이렇게 하면 어려운 목표물에 대한 교전이 더 쉬워지지만 직접 사격에 대한 더 많은 옵션을 허용하면 포병의 간접 사격 능력이 일부 저하될 것입니다."
 mortar_barrel_conversion_small: "경 박격포대"
 mortar_barrel_conversion_small_desc: "곡사포를 비슷한 크기의 박격포로 교체하면 포병의 발사 속도와 탄도를 향상시킬 수 있습니다. 그러나 장거리 공격을 지원하는 능력은 더욱 제한됩니다."
 mortar_barrel_conversion: "중 박격포대"
 mortar_barrel_conversion_desc: "곡사포를 비슷한 크기의 박격포로 교체하면 포병의 발사 속도와 탄도를 향상시킬 수 있습니다. 그러나 장거리 공격을 지원하는 능력은 더욱 제한됩니다."
 gun_barrel_conversion: "포신"
 gun_barrel_conversion_desc: "표준 곡사포보다 긴 포신을 사용하여 앙각은 낮아졌지만, 작전상의 한계를 감수하면서도 명중률을 높였으며 중거리 교전에 적합합니다."
 thermobaric_ammo_conversion: "열압력탄"
 thermobaric_ammo_conversion_desc: "열압력 로켓은 매우 파괴적인 대보병 무기입니다. 로켓이 목표물에 도달하면 작은 1차 폭발을 통해 기화된 연료 구름을 생성합니다. 이어지는 2차 폭발로 연료가 점화되어 거대한 불덩어리가 형성됩니다. 이 폭발은 주변의 모든 산소를 소진시키며, 인체를 증발시킬 정도로 강력한 고열을 발생시킵니다."
 thermobaric_ammo_conversion_small: "열압력탄"
 thermobaric_ammo_conversion_small_desc: "열압력 로켓은 매우 파괴적인 대보병 무기입니다. 로켓이 목표물에 도달하면 작은 1차 폭발을 통해 기화된 연료 구름을 생성합니다. 이어지는 2차 폭발로 연료가 점화되어 거대한 불덩어리가 형성됩니다. 이 폭발은 주변의 모든 산소를 소진시키며, 인체를 증발시킬 정도로 강력한 고열을 발생시킵니다."
 double_caliber_ammo_conversion: "다중 구경 로켓"
 double_caliber_ammo_conversion_desc: "동일한 발사기에서 여러 구경의 탄약을 발사할 수 있도록 로켓 발사기를 조정하면 전장에서 더 많은 유연성을 얻을 수 있습니다. 하지만 이렇게 하면 두 배의 탄약을 운반해야 하므로 전진 속도가 느려질 것입니다."
 burst_fire_gun_medium_gen1: "초기 점사 발사 모드"
 burst_fire_gun_medium_gen1_desc: "첨단 표적 컴퓨터와 자동 장전 장치를 갖춘 포병은 동일한 표적에 여러 발의 포탄을 빠르게 연속해서 발사하여 제압 효과를 극대화할 수 있습니다."
 burst_fire_gun_medium_gen2: "개선된 점사 발사 모드"
 burst_fire_gun_medium_gen2_desc: "첨단 표적 컴퓨터와 자동 장전 장치를 갖춘 포병은 동일한 표적에 여러 발의 포탄을 빠르게 연속해서 발사하여 제압 효과를 극대화할 수 있습니다."
 burst_fire_gun_medium_gen3: "발전된 점사 발사 모드"
 burst_fire_gun_medium_gen3_desc: "첨단 표적 컴퓨터와 자동 장전 장치를 갖춘 포병은 동일한 표적에 여러 발의 포탄을 빠르게 연속해서 발사하여 제압 효과를 극대화할 수 있습니다."
 multiple_rounds_medium_gen1: "초기 다중 타격 모드"
 multiple_rounds_medium_gen1_desc: "서로 다른 추진제 충전량과 발사 각도를 사용하여 여러 포탄을 연속으로 발사함으로써, 발사된 모든 포탄이 목표물에 동시에 탄착하도록 할 수 있습니다. 이를 위해서는 고도로 숙련된 승무원과 첨단 표적 컴퓨터가 필요합니다."
 multiple_rounds_medium_gen2: "개선된 다중 타격 모드"
 multiple_rounds_medium_gen2_desc: "서로 다른 추진제 충전량과 발사 각도를 사용하여 여러 포탄을 연속으로 발사함으로써, 발사된 모든 포탄이 목표물에 동시에 탄착하도록 할 수 있습니다. 이를 위해서는 고도로 숙련된 승무원과 첨단 표적 컴퓨터가 필요합니다."
 multiple_rounds_medium_gen3: "발전된 다중 타격 모드"
 multiple_rounds_medium_gen3_desc: "서로 다른 추진제 충전량과 발사 각도를 사용하여 여러 포탄을 연속으로 발사함으로써, 발사된 모든 포탄이 목표물에 동시에 탄착하도록 할 수 있습니다. 이를 위해서는 고도로 숙련된 승무원과 첨단 표적 컴퓨터가 필요합니다."
 tank_steel_armor_gen3: "발전된 강철 장갑"
 tank_steel_armor_gen3_desc: "강철 합금에 추가적인 원소들을 포함하여 파괴 및 피로에 대한 강도를 높였습니다.\n\n§G설계 힌트: 강철 장갑은 전차를 위한 저예산 장갑 옵션입니다. 현대적인 복합 장갑을 견뎌내지는 못할 것입니다.§!"
 spaced_armor_gen3: "현대 공간장갑"
 spaced_armor_gen3_desc: "추가적인 세라믹 판과 특수 형상을 적용하여 차량의 전반적인 방어력을 향상시킵니다.\n\n§G설계 힌트: 공간장갑은 전차에 더 많은 보호를 제공하기 위한 폭발반응장갑(ERA)의 보급형 버전입니다.§!"
 afv_machine_gun: "2차 대전기 이후 중기관총"
 afv_machine_gun_desc: "제2차 세계 대전 당시의 신뢰성 높은 총기를 약간 개조한 형태입니다. 현재는 장갑차의 지원 화기로 사용되고 있습니다."
 afv_machine_gun_2: "냉전기 중기관총"
 afv_machine_gun_2_desc: "제2차 세계 대전 이후, 주요 국가들은 중기관총의 운용성을 개선하기 위해 조작 편의성, 정확도 향상 등 여러 가지 설계 변경을 단행했습니다."
 afv_machine_gun_3: "현대 중기관총"
 afv_machine_gun_3_desc: "소련의 해체로 인해 일부 국가들은 양보다 질을 추구할 여유가 생겼고, 이 차세대 중기관총은 바로 그러한 시대적 변화를 반영합니다."
 afv_machine_gun_4: "미래 중기관총"
 afv_machine_gun_4_desc: "플라스틱 덮개와 추적 기술을 적용한 이 중기관총은 그 어느 때보다 치명적인 성능을 자랑합니다."
 afv_assault_gun: "냉전 초기 돌격포"
 afv_assault_gun_desc: "경전차에 탑재된 포는 일반적으로 저속포이며, 낮은 반동을 대가로 대구경의 화력을 발휘합니다."
 afv_assault_gun_2: "냉전 후기 돌격포"
 afv_assault_gun_2_desc: "제2차 세계 대전 이후 설계된 모델들과 비교했을 때, 탄도가 개선되었으며 더 우수한 파편탄을 갖추었습니다."
 afv_assault_gun_3: "현대 돌격포"
 afv_assault_gun_3_desc: "현대 군사 기술이 제공하는 최고 수준인 스마트 탄약과 공중폭발탄을 사용합니다."
 afv_assault_gun_4: "최첨단 돌격포"
 afv_assault_gun_4_desc: "집속탄 타격과 고성능 벙커 파괴 능력을 갖추어, 이 돌격포로 처리하지 못할 목표는 거의 없으며 전차만이 유일한 예외일 것입니다."
 small_autocannon: "냉전 초기 기관포"
 small_autocannon_desc: "20~30mm 구경의 기관포로, 대개 제2차 세계 대전 당시의 대공포를 약간 개조한 형태입니다. 하지만 맡은 바 임무는 충실히 수행합니다."
 small_autocannon_2: "냉전 후기 기관포"
 small_autocannon_2_desc: "보병은 물론 경장갑 차량까지 효과적으로 제압하기 위해 설계된 전용 기관포입니다."
 small_autocannon_3: "현대 기관포"
 small_autocannon_3_desc: "최신 기술의 집약체로, 공중폭발탄과 프로그래밍 가능한 탄약을 사용합니다."
 small_autocannon_4: "최첨단 기관포"
 small_autocannon_4_desc: "최첨단 수준의 기관포로, 그 어떤 목표물도 초토화할 수 있습니다."
 big_autocannon: "냉전 초기 중 기관포"
 big_autocannon_desc: "35mm~60mm 구경의 대구경 기관포로, 시야에 들어오는 모든 경장갑 차량을 파괴하는 것을 목표로 합니다."
 big_autocannon_2: "냉전 후기 중 기관포"
 big_autocannon_2_desc: "새로운 날개안정분리철갑탄(APFSDS)을 적용하여, 이전 모델과는 차원이 다른 위력을 발휘합니다."
 big_autocannon_3: "현대 중 기관포"
 big_autocannon_3_desc: "전장에 있는 그 어떤 장갑 차량이라도 무력화할 수 있도록 설계되었습니다."
 big_autocannon_4: "최첨단 중 기관포"
 big_autocannon_4_desc: "그 어떤 장갑이든 관통할 수 있도록 설계된 최첨단 대구경 기관포입니다."
 afv_steel_armor_gen1: "강철 장갑"
 afv_steel_armor_gen1_desc: "가장 표준적인 군용 등급 강철입니다."
 afv_steel_armor_gen2: "개선된 강철 장갑"
 afv_steel_armor_gen2_desc: "일반 강철보다 더 높은 방호력을 제공하는 압연 균질 장갑(RHA)입니다."
 afv_steel_armor_gen3: "발전된 강철 장갑"
 afv_steel_armor_gen3_desc: "나노코팅과 현대식 합금이 적용되었습니다. 사실상 더 이상 '강철'이라고 부르기 어려울 정도의 물성을 지닙니다."
 afv_alum_armor_gen1: "알루미늄 장갑"
 afv_alum_armor_gen1_desc: "경량이면서도 꽤나 내구성이 강합니다."
 afv_alum_armor_gen2: "개선된 알루미늄 장갑"
 afv_alum_armor_gen2_desc: "합금 개선을 통해 충격 및 관통 저항력을 향상했습니다."
 afv_alum_armor_gen3: "발전된 알루미늄 장갑"
 afv_alum_armor_gen3_desc: "나노코팅 및 현대 합금이 적용되었습니다. '알루미늄'은 기존 장갑 체계를 대체할 훌륭한 선택지가 될 것입니다."
 afv_composite_armor_gen1: "냉전 초기 경형 복합 장갑"
 afv_composite_armor_gen1_desc: "전차용 초기 복합 장갑의 모방품입니다."
 afv_composite_armor_gen2: "냉전기 경형 복합 장갑"
 afv_composite_armor_gen2_desc: "전차에서 이식된 복합 장갑의 개선된 버전입니다."
 afv_composite_armor_gen3: "현대 경형 복합 장갑"
 afv_composite_armor_gen3_desc: "내구성이 뛰어난 기갑 전투 차량(AFV)을 위한 현대적이고 발전된 해법입니다."
 afv_composite_armor_gen4: "발전된 경형 복합 장갑"
 afv_composite_armor_gen4_desc: "미터 단위로 측정되는 압연 균질 장갑(RHA) 환산 방어력을 가진 가장 효과적인 장갑입니다."
 afv_atgm_gen1: "냉전 초기 ATGM (대전차 유도 미사일)"
 afv_atgm_gen1_desc: "차체 외부에 탑재된 초기형 대전차 유도 미사일(ATGM) 발사기입니다."
 afv_atgm_gen2: "냉전 후기 ATGM (대전차 유도 미사일)"
 afv_atgm_gen2_desc: "발사기를 개선하여, 이제야 진정한 대전차 유도 미사일(ATGM)다운 면모를 갖추었습니다."
 afv_atgm_gen3: "현대 ATGM (대전차 유도 미사일)"
 afv_atgm_gen3_desc: "우수한 제어 시스템을 갖춘 현대적인 레이저 유도 미사일입니다."
 afv_atgm_gen4: "발전된 ATGM (대전차 유도 미사일)"
 afv_atgm_gen4_desc: "첨단 광학 장비와 복합 미사일 시스템을 갖추어, 그야말로 전차를 사냥하는 살인 병기입니다."
 afv_atgm_gen5: "미래 ATGM (대전차 유도 미사일)"
 afv_atgm_gen5_desc: "대전차 분야에서 가장 앞선 기술과 혁신을 집약한 차세대 미사일 시스템입니다."
 afv_gun_ports: "포문"
 afv_gun_ports_desc: "승무원이 차량 내부에서 직접 사격할 수 있도록 설계된 포문입니다."
 afv_mine_protection: "지뢰 방어"
 afv_mine_protection_desc: "승무원 보호를 위한 지뢰 방어용 하부 장갑입니다."
 afv_reverse_doors: "인체공학적인 병력 출입구"
 afv_reverse_doors_desc: "승무원이 안전하게 하차할 수 있도록 설계된 크고 위치 선정이 뛰어난 출입구입니다."
 afv_coax_machine_gun: "냉전 초기 동축기관총"
 afv_coax_machine_gun_desc: "동축기관총으로 장착된 제2차 세계대전 당시의 기관총입니다."
 afv_coax_machine_gun_2: "냉전 후기 동축기관총"
 afv_coax_machine_gun_2_desc: "동축기관총으로 장착된 제2차 세계대전 당시 화기의 개량형입니다."
 afv_coax_machine_gun_3: "현대 동축기관총"
 afv_coax_machine_gun_3_desc: "동축기관총으로 장착된 현대식 기관총입니다."
 afv_coax_machine_gun_4: "미래 동축기관총"
 afv_coax_machine_gun_4_desc: "동축기관총으로 장착된 첨단 설계의 기관총입니다."
 afv_coax_autocannon: "냉전 초기 동축기관포"
 afv_coax_autocannon_desc: "동축포로 장착된 기관포입니다."
 afv_coax_autocannon_2: "냉전 후기 동축 기관포"
 afv_coax_autocannon_2_desc: "동축포로 장착된 개량형 기관포입니다."
 afv_coax_autocannon_3: "현대 동축 기관포"
 afv_coax_autocannon_3_desc: "동축포로 장착된 현대식 기관포입니다."
 afv_coax_autocannon_4: "최첨단 동축기관포"
 afv_coax_autocannon_4_desc: "동축 형식으로에 사용되는 미래의 자동포입니다."
 double_feed_system: "이중 구경 급탄 시스템"
 double_feed_system_desc: "이 시스템을 사용하면 대구경 대포가 더 작은 구경의 포탄을 발사할 수 있습니다."
 double_cannons: "이중포"
 double_cannons_desc: "하나의 대포 대신 두 개의 대포를 장착하는 시스템으로, 자체적인 문제가 있습니다."
