 alg_mufti.2.t: "伊斯兰国将何去何从？"
 alg_mufti.2.d: "既然伊斯兰教已被确立为国家的指导原则，我们必须决定由哪股思潮来引领前路。阿卜杜拉·贾巴拉领导的伊斯兰复兴运动（Nahda）主张通过选举箱实现温和且有体系的伊斯兰愿景。但也有人将目光投向宗教学者和魅力型传教士，他们承诺建立更直接且不妥协的伊斯兰权威形式。"
 alg_mufti.2.a: "增强伊斯兰复兴运动的力量"
 alg_mufti.2.a.tt: "贾巴拉赫的复兴运动成为伊斯兰政治的主导力量。"
 alg_mufti.2.b: "将权力交予乌理玛"
 alg_mufti.2.b.tt: "稍后我们将选择是追随一位有争议的传教士，还是政府认可的穆夫提。"
 alg_mufti.3.t: "乌里玛的头面人物"
 alg_mufti.3.d: "在乌里玛权威得到确认后，政府现在必须决定由谁来代表这股潮流担任领导职务。谢赫·布阿姆拉内是温和派，为国家与军方所接受；而阿里·本哈吉仍是激进派，他激昂的言论能激发民众支持，却可能引发与当局的对抗。"
 alg_mufti.3.a: "支持贝勒哈吉"
 alg_mufti.3.a.tt: "阿里·贝勒哈吉将成为领导人，代表着一股强硬的萨拉菲主义潮流。"
 alg_mufti.3.b: "支持布阿姆兰"
 alg_mufti.3.b.tt: "谢赫·布阿姆兰将成为领导人，代表温和且与国家结盟的乌里玛派系。\n§R2016年5月后不可用。§!"
 ALG_ennahda: "支持复兴运动"
 ALG_ennahda_desc: "我们将支持阿卜杜拉·贾巴利和伊斯兰复兴运动，将伊斯兰主义政治纳入我们国家机构的范畴。"
 ALG_independent: "独立乌理玛"
 ALG_independent_desc: "我们将加强乌理玛的独立性，赋予宗教学者在精神事务乃至国家领导权方面的权威。"
 ALG_grand_mufti_rule: "大穆夫提掌权"
 ALG_grand_mufti_rule_desc: "乌里玛，即政治伊斯兰主义运动，将成为阿尔及利亚国家的指导权威。我们所选择的道路将决定谁将成为伊斯兰权威的代表。"
 ALG_nahda_path: "选择复兴运动"
 ALG_ulema_path: "选择乌里玛"
 ALG_belhadj_leader: "阿里·贝勒哈吉是领导人"
 ALG_bouamrane_leader: "谢赫·布阿姆兰是领导人。"
