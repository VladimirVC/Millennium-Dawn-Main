 SOV.conservatism: "£SOV_western_conservative （URF）右派連合"
 SOV.conservatism_icon: "£SOV_western_conservative"
 SOV.conservatism_desc: "自由市場主義 ｰ 右派連合（ロシア語ローマ字表記：Soyuz Pravykh Sil）\n\n 1999年に設立された右派連合は、民営化と自由市場資本主義を推進し、権威主義に強く反対している。"
 SOV.liberalism: "£SOV_western_liberal （RUDPY）ヤブロコ"
 SOV.liberalism_icon: "£SOV_western_liberal"
 SOV.liberalism_desc: "社会自由主義 - ロシア統一民主党「ヤブロコ」（ロシア語ローマ字表記：Rossiyskaya Obyedinennaya Democraticheskaya Partiya 'Yabloko'）\n\n ヤブロコは市場経済と民主主義的価値観を推進する社会自由主義政党である。ロシア語で「りんご」を意味するヤブロコは、歴史的にロシアにおける共産主義と保守主義の両方に対する主要な政治勢力であった。"
 SOV.socialism: "£SOV_western_social_democrat （PPRF）ロシア連邦人民党"
 SOV.socialism_icon: "£SOV_western_social_democrat"
 SOV.socialism_desc: "中道左派 ｰ ロシア連邦人民党（ロシア語ローマ字表記：Narodnaya Partiya Rossiyskoy Federatsii）\n\n ロシア連邦人民党は、小選挙区制で選出された議員のみで構成された派閥「人民代議員」を基盤として結成された。同党は中道政党であるが、福祉プログラムの拡充をしばしば主張する。"
 SOV.Communist-State: "£SOV_emerging_communism （CPRF）ロシア連邦共産党"
 SOV.Communist-State_icon: "£SOV_emerging_communism"
 SOV.Communist-State_desc: "21世紀の社会主義 ｰ ロシア連邦共産党（ロシア語ローマ字表記：Kommunisticheskaya Partiya Rossiyskoy Federatsii）\n\n KPRFは旧ソビエト連邦共産党の後継組織である。マルクス・レーニン主義を掲げ、ロシアのポストソビエト時代を通じて第二の規模を誇る政党である。"
 SOV.Conservative: "£SOV_emerging_conserva （IM）統一"
 SOV.Conservative_icon: "£SOV_emerging_conserva"
 SOV.Conservative_desc: "親政府中道主義 ｰ 地域間運動「統一」（ロシア語ローマ字表記：Mezhregionalnoye Dvizheniye 'Yedinstvo'）\n\n統一は、1999年に国家院選挙への出馬を目的に設立された中道主義の政治組織である。同党は保守主義の理念と、元首相で現大統領のウラジーミル・プーチン氏の政策を支持している。"
 SOV.anarchist_communism: "£SOV_left_wing_radical （RPL）ロシア生活党"
 SOV.anarchist_communism_icon: "£SOV_left_wing_radical"
 SOV.anarchist_communism_desc: "中道左派 ｰ ロシア生活党（ロシア語ローマ字表記：Rossiskaya Partiya Zhizni）\n\n ロシア生活党は連邦会議議長セルゲイ・ミロノフによって設立された。同党は社会プログラムの拡充、市民の生活水準向上、経済に対する国家統制を提唱している。"
 SOV.Neutral_conservatism: "£SOV_conservative_one (NV) 人民の意志"
 SOV.Neutral_conservatism_icon: "£SOV_conservative_one"
 SOV.oligarchism: "£SOV_oligarchists （FAR）祖国・全ロシア"
 SOV.oligarchism_icon: "£SOV_oligarchists"
 SOV.oligarchism_desc: "地域主義 ｰ 祖国・全ロシア（ロシア語ローマ字表記：Otechestvo - Vsya Rossiya）\n\n ОVRは「祖国」と「全ロシア」運動の合併により結成された政治連合体であり、地域エリートや有力知事の大半を包含していたため、「知事の党」と称された。同党の目的は、連邦議会において地域の利益を代表することにあった。"
 SOV.Neutral_Libertarian: "£SOV_non_aligned_libertarian (LPR) ロシア・リバタリアン党"
 SOV.Neutral_Libertarian_icon: "£SOV_non_aligned_libertarian"
 SOV.Neutral_Libertarian_desc: "リバタリアニズム ｰ ロシア・リバタリアン党（ロシア語ローマ字表記：Libertarianskaya Partiya Rossii）\n\n ロシア・リバタリアン党は、ロシアにおけるリバタリアニズムの思想を推進し、幅広い基盤を持つ政党として、絶対的自由と市場関係の不可侵性という思想を共有する多くの人々を惹きつけようとしている。同党は複雑な組織構造を持ち、支部間の関係も複雑なシステムを形成している。また国家のリバタリアン的発展、連邦制、市場関係の発展といった理念を共有している。"
 SOV.Neutral_Communism: "£SOV_non_aligned_communism （CR）ロシアの共産主義者"
 SOV.Neutral_Communism_icon: "£SOV_non_aligned_communism"
 SOV.Neutral_Communism_desc: "反修正共産主義 ｰ 共産党「ロシアの共産主義者」（ロシア語ローマ字表記：Kommunisticheskaya Partiya 'Kommunisty Rossii'）\n\nロシアの共産主義者は2012年に設立された共産党であり、ロシア連邦共産党の代替勢力として位置づけられている。マルクス・レーニン主義イデオロギーのいかなる改革も拒否し、ロシア連邦共産党の政策を修正主義と見なしている。同党はまた、スターリン主義と無神論を支持している。"
 SOV.Neutral_green: "£SOV_non_aligned_greens (REP \"The Greens\") 「緑の党」"
 SOV.Neutral_green_icon: "£SOV_non_aligned_greens"
 SOV.Neutral_green_desc: "環境活動主義 ｰ ロシア環境政党「緑の党」（ロシア語ローマ字表記：Ecologicheskaya Partiya Rossii 'Zelenyye'）\n\n「緑の党」（旧称「ケードル」）は環境政策の優先化を提唱する政党である。汚染対策、無秩序な森林伐採への対抗、地球温暖化対策を支援している。西欧の緑の党とは異なり、ロシアの緑の党は社会進歩主義を支持せず、汚染対策こそが最重要目標であると考えている。"
 SOV.neutral_Social: "£SOV_non_aligned_socialist_democrat （PR）ロシアの愛国者"
 SOV.neutral_Social_icon: "£SOV_non_aligned_socialist_democrat"
 SOV.neutral_Social_desc: "民主社会主義 ｰ ロシアの愛国者（ロシア語ローマ字表記：Patrioty Rossii）\n\n ロシアの愛国者は実業家ゲンナジー・セミギンによって設立された政党である。同党は民主社会主義、左派ナショナリズム、愛国主義の思想を支持している。"
 SOV.Nat_Fascism: "£SOV_nationalist_fascism (NBP) 国家ボリシェヴィキ党"
 SOV.Nat_Fascism_icon: "£SOV_nationalist_fascism"
 SOV.Nat_Fascism_desc: "国家ボリシェヴィズム ｰ 国家ボリシェヴィキ党（ロシア語ローマ字表記：Natsional Bolshevistskaya Partiya）\n\n 国家ボリシェヴィキ党は、スターリン主義と国家社会主義の要素を融合させた超国家主義運動である。"
 SOV.Nat_Populism: "£SOV_nationalist_right_wing_populist （LDPR）ロシア自由民主党"
 SOV.Nat_Populism_icon: "£SOV_nationalist_right_wing_populist"
 SOV.Nat_Populism_desc: "国民ポピュリズム ｰ ロシア自由民主党（ロシア語ローマ字表記：Liberal'no-demokraticheskaya partiya Rossii）\n\n ロシア自由民主党は自由主義でも民主主義でもなく、むしろ権威主義的・ポピュリスト的・民族主義的な手法で、大幅に拡大されたロシア帝国の復活を追求している。"
 SOV.Monarchist: "£SOV_nationalist_monarchist ロマノフ家"
 SOV.Monarchist_icon: "£SOV_nationalist_monarchist"
 SOV.Monarchist_desc: ""
 TAI.conservatism: "£TAI_conservatism (KMT) 国民党"
 TAI.conservatism_icon: "£TAI_conservatism"
 TAI.conservatism_desc: "右派三民主義 - 中国国民党（通称：国民党）は1894年に孫文によって創立された。中国本土と中華民国双方の称賛を集める人物である孫文の指導下、同党は中国の統一に向け尽力し、多くの集団や理念に対する統一戦線を築いた。党の公式イデオロギーは、孫文の「三民主義」によって大きく形作られてきた。これらの理念は、公民的中華民族主義、中華民主主義、人民福祉である。当初は左傾的と見られ、ソビエト連邦とさえ連携していたが、1927年の上海虐殺事件を契機に共産党と決裂し、間もなく中国内戦が勃発した。国民党自体は、内戦終結時に台湾島へ退去を余儀なくされるまで、様々な形で中国支配を維持した。台湾では一党独裁制の下で「残存中華民国」を統治し、1987年に民主化が回復されるまで続いたが、その後も根強い政治勢力として影響力を保持した。共産主義への反対姿勢、中国内戦の経緯、冷戦下の政治情勢といった要素が相まって、国民党は右傾化を強め、三民主義の理念を民族主義的・保守的な政治基盤に適合させる形で変容していった。"
 TAI.liberalism: "£TAI_liberalism (DPP) 民主進歩党"
 TAI.liberalism_icon: "£TAI_liberalism"
 TAI.liberalism_desc: "進歩主義 - 1986年に設立された民進党は、国民党の「泛藍連合」に対する主要な政治的対抗勢力の一つとなった。同党は同盟勢力と共に、中華民国および中華人民共和国からの台湾独立を主張するだけでなく、統一された進歩的な政策基盤を提示している。同党の具体的な社会政策（LGBTQ支持など）は、台湾の「白色テロ」時代に人権団体として誕生した経緯に強く影響されている。"
 TAI.socialism: "£TAI_socialism (CPP) 中国民衆党"
 TAI.socialism_icon: "£TAI_socialism"
 TAI.socialism_desc: "三民主義 - 中国の小政党の中でも、中国国民党は三民主義の理念を堅持しつつ中国統一を目指すことを掲げている。同党の政策綱領は三民主義の影響を強く受けており、社会民主主義により近い立場を取っている。"
 TAI.Communist-State: "£TAI_Communist_State (LP) 労働党"
 TAI.Communist-State_icon: "£TAI_Communist_State"
 TAI.Communist-State_desc: "実用的社会主義 - 「一国二制度」の原則に基づく本土との再統一を主張するためだけに創設された労働党は、政策綱領や主張がほとんどない。名目上は社会主義を掲げるが、同党は「アメリカ帝国主義」と台湾内の不正な選挙制度を非難し、これに反対している。"
 TAI.Conservative: "£TAI_Conservative (NP) 新党"
 TAI.Conservative_icon: "£TAI_Conservative"
 TAI.Conservative_desc: "右派三民主義 - 1993年に国民党を離脱したメンバーによって結成された新党は、当初は国民党と類似した政策綱領を掲げる保守寄りの政党であった。しかしその思想は急速に変化し、右傾化が進み、最終的には「一国二制度」に基づく中国統一問題において親大陸的立場を採るに至った。"
 TAI.Neutral_conservatism: "£TAI_Neutral_conservatism (PFP) 親民党"
 TAI.Neutral_conservatism_icon: "£TAI_Neutral_conservatism"
 TAI.Neutral_conservatism_desc: "自由保守主義 - 国民党の元党員である宋楚瑜が大統領選出馬を支援するために結成した親民党は、国民党とやや類似したイデオロギー的基盤を持つが、三民主義への明確な帰属は表明していない。一党支配終結後に国民党内部から分裂した多数の政党と競合せざるを得ない状況下で、親民党は選挙での成功をほとんど収めていない。"
 TAI.neutral_Social: "£TAI_neutral_Social (TAIP) 台湾独立党"
 TAI.neutral_Social_icon: "£TAI_neutral_Social"
 TAI.neutral_Social_desc: "進歩主義 - 台湾独立党は1996年、台湾問題における民主進歩党の穏健姿勢に不満を抱いた元党員によって結成された。同様の進歩的政策綱領を掲げる同党は、この対立点を自らの核心的課題として位置付けている。"
 TAI.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (PP) 農民党"
 TAI.Neutral_Libertarian_desc: "農本主義 - 多様な思想を併せ持つ農民党は、中国統一については中立的な立場をとりつつ、保護主義政策によって台湾の農民を保護することに重点を置いている。"
 TAI.Neutral_green: "£TAI_Neutral_green (GPT) 台湾緑党"
 TAI.Neutral_green_icon: "£TAI_Neutral_green"
 TAI.Neutral_green_desc: "緑の政治 - 標準的な緑の党の政策綱領を掲げる台湾緑党は、選挙ではほとんど成功を収めていない。同様に進歩的な政策を掲げる他の大政党が有権者基盤の争いで優位に立っているためだ。それでもなお、同党は環境保護活動家としての姿勢を堅持している。"
 TAI.Nat_Autocracy: "£TAI_Nat_Autocracy (ROCAF) 中華民国国軍"
 TAI.Nat_Autocracy_icon: "£TAI_Nat_Autocracy"
 TAI.Nat_Autocracy_desc: "民族主義的軍事政権 - 1924年に国民革命軍として創設された中華民国軍は、その組織化以来、大規模な変遷を遂げてきた。当初の国民革命軍は、ソ連の支援を得て、中国を初期国民党の旗印の下で統一し、脅威として蔓延していた軍閥主義を回避する目的で、高度に政治化され中央集権化された軍事組織を構築した。しかし孫文の死と国民党政治、そして中国政治全体の変容に伴い、状況は急速に変化した。台湾における一党独裁体制とそれに伴う戒厳令の終結後、軍は政治から分離された状態を維持している。とはいえ、国民党との政治的連携の歴史、大陸からの脅威、そしてわずか数十年前の戒厳令の記憶は、今なお重くのしかかっている。"
 TAI.Nat_Fascism: "£TAI_Nat_Fascism (CDSP) 中国民主社会党"
 TAI.Nat_Fascism_icon: "£TAI_Nat_Fascism"
 TAI.Nat_Fascism_desc: "国民ポピュリズム - 当初は社会的平等と民主的社会主義を掲げる左派政党として設立されたが、中国の情勢変化と国共内戦後の影響により、同党は次第に右傾化。保守主義と中国民族主義を政策に融合させた。台湾の独裁統治期に国民党と並んで活動が許された数少ない政党の一つであったにもかかわらず、同党はほとんど成功を収めていない。"
 TAI.Nat_Populism: "£TAI_Nat_Populism (YCP) 中国青年党"
 TAI.Nat_Populism_icon: "£TAI_Nat_Populism"
 TAI.Nat_Populism_desc: "極右三民主義 - 台湾で最も古い政党の一つであり、一党支配下でも合法政党として存続した青年中国党は、「一国二制度」と台湾独立に反対する綱領を掲げている。同党は現在も中国本土政府に反対し、中華民国が唯一の正当な中華国家として復帰することを主張し続けている。"
 TAI.Monarchist: "£generic_Monarchist_small 皇室"
 TAI.Monarchist_desc: ""
 SWE.conservatism: "£SWE_western_conservative (M) 穏健党"
 SWE.conservatism_icon: "£SWE_western_conservative"
 SWE.conservatism_desc: "自由保守主義 - 穏健統一党（スウェーデン語：Moderata Samlingspartiet）は、自由保守政党であり、歴史的にスウェーデン社会民主党の対極を自認し、自由市場と減税を推進してきた。しかし近年では政治的中道へと舵を切り、スウェーデン福祉モデルの維持を主張している。"
 SWE.liberalism: "£SWE_western_liberal (FP) 自由人民党"
 SWE.liberalism_icon: "£SWE_western_liberal"
 SWE.liberalism_desc: "保守自由主義 - 1934年にいくつかの小規模な自由主義団体が合併して結成された自由人民党は、スウェーデンにおける最初の正式な自由主義政党の一つとなった。当初は社会自由主義を掲げていたが、冷戦の進行に伴い徐々に中道へと移行し、市場自由主義へと転じ、さらに中道右派的な自由主義の政策基盤へと向かっていった。政治路線の変化にもかかわらず、同党は教育などの福祉や公共サービスへの何らかの資金援助を支持するという一貫した見解を維持しており、NATOとEUの両方に対して強い支持を表明している。"
 SWE.liberalism_2017: "£SWE_western_liberal_2017 (L) 自由党"
 SWE.liberalism_2017_icon: "£SWE_western_liberal_2017"
 SWE.liberalism_2017_desc: "保守自由主義 - 1934年にいくつかの小規模な自由主義団体が合併して結成された自由党（旧称：自由人民党）は、スウェーデンにおける最初の正式な自由主義政党の一つとなった。当初は社会自由主義を掲げていたが、冷戦の進行に伴い徐々に中道へと移行し、市場自由主義へと転じ、さらに中道右派的な自由主義の政策基盤へと向かっていった。政治路線の変化にもかかわらず、同党は教育などの福祉や公共サービスへの何らかの資金援助を支持するという一貫した見解を維持しており、NATOとEUの両方に対して強い支持を表明している。"
 SWE.socialism: "£SWE_western_social_democrat (S) スウェーデン社会民主党"
 SWE.socialism_icon: "£SWE_western_social_democrat"
 SWE.socialism_desc: "北欧モデル - スウェーデン社会民主労働党（スウェーデン語：Sveriges Socialdemokratiska Arbetareparti）は、歴史的にスウェーデン最大かつ最も影響力のある政党であり、1932年から1994年の間に投票率40％を下回ったのは一度きりである。現代スウェーデンの形成と、福祉国家モデルおよび労使協力体制の構築に貢献してきたが、近年ではトニー・ブレア率いるニュー・レイバーの例に倣い、民主社会主義からスウェーデン政治の中道へとより大きく移行している。"
 SWE.Communist-State: "£SWE_emerging_communism (K) スウェーデン共産党"
 SWE.Communist-State_icon: "£SWE_emerging_communism"
 SWE.Communist-State_desc: "マルクス・レーニン主義 - 1995年に労働者共産党の後継として結成されたスウェーデン共産党は、強硬かつ正統的なマルクス・レーニン主義の信条を中核とする反修正主義政党を標榜している。イデオロギー的には、従来の反修正主義団体よりも左寄りの立場を取り、LGBTQの権利を擁護し、社会問題に重点を置いている。冷戦終結以降、スウェーデン国内のより改革志向の強い左派組織に比べ、選挙での成果は乏しい。"
 SWE.anarchist_communism: "£SWE_non_aligned_socialist_democrat (V) 左翼党"
 SWE.anarchist_communism_icon: "£SWE_non_aligned_socialist_democrat"
 SWE.anarchist_communism_desc: "環境社会主義 - 左翼党（スウェーデン語：Vänsterpartiet）は、1990年まで共産党と見なされ、ユーロコミュニズムの教義を支持していた。その後、社会民主党が右傾化したことで、極左社会主義政党の余地が広がり、同党には新たな有権者が大きく流入した。左翼党は社会主義に加え、フェミニズムの旗印も掲げている。欧州連合に反対し、イスラエルへの経済制裁を主張している。"
 SWE.Neutral_conservatism: "£SWE_non_aligned_conservative (KD) キリスト教民主党"
 SWE.Neutral_conservatism_icon: "£SWE_non_aligned_conservative"
 SWE.Neutral_conservatism_desc: "キリスト教民主主義 - 1964年にキリスト教民主統一として結成されたキリスト教民主党は、スウェーデンにおけるキリスト教民主主義政党として台頭した。その歴史の大部分において、同党はより穏健で中道寄りの政党を支援する役割を果たしてきた。イデオロギー的には、より広範なキリスト教民主主義運動と強く共鳴しているが、党内には政策を右寄りへと転換させようとする勢力も存在するものの、スウェーデンの福祉モデルを支持し続けている。"
 SWE.oligarchism: "£SWE_non_aligned_oligarchism (C) 中央党"
 SWE.oligarchism_icon: "£SWE_non_aligned_oligarchism"
 SWE.oligarchism_desc: "北欧の農本主義 - 中央党（スウェーデン語：Centerpartiet）は、伝統的に農村・農業を基盤とする政党であり、社会主義政党以外のスウェーデン政府において常に重要な役割を担ってきた。近年では、自由主義的保守主義的価値観の推進に加え、権力の分散化を支持する姿勢を強めている。"
 SWE.Neutral_Libertarian: "£SWE_non_aligned_libertarian (PP) 海賊党"
 SWE.Neutral_Libertarian_icon: "£SWE_non_aligned_libertarian"
 SWE.Neutral_Libertarian_desc: "海賊政治 - 海賊党（スウェーデン語：Piratpartiet）は、電子民主主義、著作権改革、市民的自由の擁護を掲げる融和的な政党である。同党は世界初の海賊党で、トレントサイト「パイレート・ベイ」を運営するスウェーデンの団体「ピラートビューロン」によって設立された。"
 SWE.Neutral_green: "£SWE_non_aligned_greens (MP) 緑の党"
 SWE.Neutral_green_icon: "£SWE_non_aligned_greens"
 SWE.Neutral_green_desc: "緑の政治 - 1981年に結成されたスウェーデンの緑の党は、広範な反核運動を背景に、環境保護政党の不在によって生じていたスウェーデン政界の空白を埋めるべく誕生した。イデオロギー的には、同党は広範な緑の党運動と強く連携しており、生態系問題に重点を置きつつも、社会正義、福祉、そして比較的左寄りの政策を提唱する政策綱領を掲げている。"
 SWE.neutral_Social: "£SWE_feministiskt_initiativ (FI) フェミニスト・イニシアティヴ"
 SWE.neutral_Social_icon: "£SWE_feministiskt_initiativ"
 SWE.neutral_Social_desc: "進歩的フェミニズム - 左翼党の元党首によって設立されたフェミニスト・イニシアティブは、当初は圧力団体として活動していたが、その後、本格的な政党へと発展した。イデオロギー的には、フェミニスト・イニシアティブは比較的進歩的な傾向を掲げて活動しているが、スウェーデン国内の他の進歩的、リベラル、社会民主主義的な運動とも概ね連携している。選挙面では、より広範な左派運動ほど成功を収めてはいないものの、スウェーデン国内および世界中の様々な団体との関係を維持している。"
 SWE.Nat_Populism: "£SWE_nationalist_right_wing_populist (NyD) 新民主主義"
 SWE.Nat_Populism_icon: "£SWE_nationalist_right_wing_populist"
 SWE.Nat_Populism_desc: "国民自由主義 - 1991年に結成された新民主主義党は、スウェーデン国内の経済的安全保障を掲げる民族主義政党として活動してきた。同党は、欧州全体との統合を支持しつつも、国家主権を軸とした経済改革や移民政策の改革を主張している。名目上は中道右派の政策を掲げているものの、党内にはより右派的な要素や国民ポピュリズム的な要素が強く、その結果、スウェーデン政界においてより周辺的な立場に追いやられている。"
 SWE.Nat_Populism_2017: "£SWE_nationalist_right_wing_populist_2017 (SD) スウェーデン民主党"
 SWE.Nat_Populism_2017_icon: "£SWE_nationalist_right_wing_populist_2017"
 SWE.Nat_Populism_2017_desc: "国民保守主義 - スウェーデン民主党（スウェーデン語：Sverigedemokraterna）は、ファシストの白人至上主義運動として台頭したものの、党は次第に穏健化し、ナチスやファシズム支持者の多くを除名した。同党はあらゆる移民に強く反対し、EU懐疑主義を掲げている。"
 SWE.Nat_Fascism: "£SWE_nationalist_fascism (AfS) スウェーデンのための選択肢"
 SWE.Nat_Fascism_icon: "£SWE_nationalist_fascism"
 SWE.Nat_Fascism_desc: "超国粋主義 - スウェーデン民主党から除名されたメンバーによって結成された「スウェーデンのための選択肢」は、より強硬な姿勢をとり、公然と超国家主義を掲げる政党である。イデオロギー的にはドイツのAfDなどの団体から影響を受けており、排他的な政策綱領と反動的な社会政策を提唱している。"
 IND.conservatism: "£IND_conservative (PKB) 国民覚醒党"
 IND.conservatism_icon: "£IND_conservative"
 IND.conservatism_desc: "イスラム民主主義 - 1999年にインドネシア国内の伝統主義的かつ保守的なイスラム教指導者たちによって設立された国民覚醒党は、ナフダトゥル・ウラマーの関心事や願望を代弁する政治的組織となることを目指した。イデオロギー的には中道から中道右派に近く、イスラム民主主義や穏健保守政策を提唱する一方で、インドネシア独自の「パンチャシラ」思想にインスピレーションを得た、経済面ではより左寄りの見解も掲げている。"
 IND.liberalism: "£IND_liberal (PAN) 国民信託党"
 IND.liberalism_icon: "£IND_liberal"
 IND.liberalism_desc: "イスラム民主主義 - スハルト政権崩壊後の1998年に結成された国民信託党は、インドネシアの半社会主義的イデオロギーであるパンチャシラを擁護する政党として自らを位置づけてきた。もっとも、同党の宗教的基盤がその見解や政策に大きな影響を与えてきたことは事実である。同党は極めて宗教色が強い一方で、宗派に偏らない姿勢を打ち出しており、インドネシア国内では一定の選挙での成功を収めている。"
 IND.socialism: "£IND_social_democrat (PB) 労働党"
 IND.socialism_icon: "£IND_social_democrat"
 IND.socialism_desc: "民主社会主義 - スハルト政権崩壊後の1998年に結成された数ある政党の一つである労働党は、インドネシアのパンチャシラに触発され、その影響を受けた民主社会主義のイデオロギーを掲げて結集した。労働党はインドネシア労働者福祉組合と密接な関係にある。同組合と既存の左翼政党との間に亀裂が生じたことを受け、同組合の政治的受け皿として部分的に誕生したものの、労働党自体は結党以来、選挙での成功をほとんど収めていない。"
 IND.Western_Autocracy: "£IND_pro_western_2000 (PDI) インドネシア民主党"
 IND.Western_Autocracy_icon: "£IND_pro_western_2000"
 IND.Western_Autocracy_desc: "実用進歩主義 - 1973年、5つの小政党の強制的な合併により結成されたインドネシア民主党は、スハルト政権下で数少ない合法政党の一つで、スハルト率いる与党ゴルカルに対する主要な野党として、国内で活動が認められた唯一の公式な左派政党であった。政府からの圧力や党自身の政策も一因となり、スハルト政権の崩壊に伴い、90年代には党内での派閥対立が激化し、より左派的な派閥が相次いで独自の対立政党を結成した。それにもかかわらず、PDIは穏健な進歩主義を掲げて活動を続けているが、インドネシアが複数政党制民主主義に復帰した後の状況から台頭した、現在ではより主流となった政党たちにその存在感を薄められている。"
 IND.Conservative: "£IND_reactionary (Gerindra) 大インドネシア運動党"
 IND.Conservative_icon: "£IND_reactionary"
 IND.Conservative_desc: "国民保守主義 - かつて与党であったゴルカル党から分裂して結成された大インドネシア運動党（ゲリンドラ党）は、スハルト政権時代の遺産を復活させることを目指している。同党は自由民主主義を否定し、インドネシアのパンチャシラおよびスハルト政権時代の政策に基づく経済面でのポピュリスト的立場と、超国家主義的な見解を併せ持つ。"
 IND.Autocracy: "£IND_pro_emerging_autocrat (PKS) 福祉正義党"
 IND.Autocracy_icon: "£IND_pro_emerging_autocrat"
 IND.Autocracy_desc: "穏健イスラム主義 - 1998年にジェマー・タルビヤ運動から派生して結成された福祉正義党は、当初、政府内の汚職対策と改革を主な焦点とする穏健イスラム主義政党として設立された。しかし、急速に変化する政治情勢に伴い、その政策方針は変容し始め、宗教的な影響が強まるにつれてさらに右傾化していった。さらには、より原理主義的なイスラム主義の潮流を支持しているとの指摘さえある。"
 IND.anarchist_communism: "£IND_left_wing_radical (PDI-P) 闘争民主党"
 IND.anarchist_communism_icon: "£IND_left_wing_radical"
 IND.anarchist_communism_desc: "ポピュリスト社会民主主義 - 1999年、インドネシア民主党（PDI）から離脱した、あるいは追放された左派勢力によって結成されたインドネシア民主党闘争派（闘争民主党、PDI-P）は、スハルト政権下で許容されていたものよりもはるかに急進的な進歩主義的政策を掲げている。その声高な進歩的政策や綱領にもかかわらず、同党は社会主義的あるいは共産主義的であるという性質を否定しており、左派というレッテルを名目上のみ受け入れるにとどめ、むしろ世俗的民主主義にコミットした幅広い支持層を擁する運動であると自認している。PDIの運命とは対照的に、PDI-Pはスハルト政権崩壊以降、大きな成功を収めてきた。"
 IND.Neutral_conservatism: "£IND_neutral_conservative (PDI) 民主党"
 IND.Neutral_conservatism_icon: "£IND_neutral_conservative"
 IND.Neutral_conservatism_desc: "保守テクノクラシー - 主にスシロ・バンバン・ユドヨノ氏の政治的基盤として設立された民主党は、穏健な政策を掲げており、主にナショナリズム、適度な社会的保守主義、経済的自由主義を主張している。もっとも、同党は幅広い有権者にアピールすることを目的とした、世俗的な包括政党としての姿勢を打ち出している。同党は一時、人気が急上昇し選挙でも成功を収めたが、その後再び他党に後れを取るようになった。"
 IND.Neutral_Libertarian: "£IND_libertarian (Nasdem) 国民民主党"
 IND.Neutral_Libertarian_icon: "£IND_libertarian"
 IND.Neutral_Libertarian_desc: "国民進歩主義 - 青年団体「国民民主党」を母体として結成された国民民主党は、名目上は進歩主義を掲げる民族主義政党であり、インドネシアの政治制度の改革を目指している。同党の政策綱領には、民主化改革や経済的平等の推進などが盛り込まれている。"
 IND.Neutral_Muslim_Brotherhood: "£IND_moderate_islamist (PPP) 開発統一党"
 IND.Neutral_Muslim_Brotherhood_icon: "£IND_moderate_islamist"
 IND.Neutral_Muslim_Brotherhood_desc: "伝統主義的イスラム主義 - 1973年、スハルト政権下において、同様の政策綱領と支持基盤を持ついくつかの小政党を強制的に統合して結成された開発統一党は、当時、数少ない容認されていた政党の一つであった。この期間、同党は主要な野党として活動し、与党ゴルカルに次ぐ、インドネシア民主党を上回る議席数を獲得した。しかし、ゴルカルと軍が政治を強固に掌握していたため、与党に対するその反対運動のほとんどは、ほとんど影響力を及ぼさなかった。当初、スハルトの「新秩序」下でよりイスラム主義的な路線を穏健化するよう強制されていた同党は、多党制民主主義への回帰後、再び右傾化へと舵を切り、保守派のスペクトルのさらに端へと移行し、より公然とイスラム主義的な政策を確固として採用するようになった。"
 IND.Nat_Autocracy: "£IND_military_junta (TNI) インドネシア国軍"
 IND.Nat_Autocracy_icon: "£IND_military_junta"
 IND.Nat_Autocracy_desc: "民族主義軍事政権 - 1945年に「人民保安軍」として発足したインドネシア国軍が初めて参戦した主要な戦闘、そしてその創設の契機となったのは、オランダに対する独立闘争であるインドネシア独立革命であった。第二次世界大戦後の高まるナショナリズムと独立達成の勝利に後押しされ、軍は急速に政治活動に参入した。当初は、初代インドネシア大統領スカルノと、その社会主義的イデオロギーであるパンチャシラを支持していた。しかし、西側諸国からの圧力や軍との結びつき、そして冷戦の進行に伴い、軍内部に亀裂が生じ始め、その結果、より右派的な勢力がクーデターを起こした。これにより、90年代まで続く軍事独裁体制へと国は転落し、スハルトが権力を握り、政府内外の左派勢力が一掃された。しかし、独裁体制の終結と民主主義の回復後も、軍は依然としてインドネシア国内で支配的な地位を占めている。その権限を制限しようとする試みは、汚職や、軍および国内の他の勢力からの圧力によって阻まれている。"
 IND.Nat_Fascism: "£generic_Nat_Fascism_small ゴルカル"
 IND.Nat_Fascism_desc: "超国粋主義 - ゴルカル（ゴロンガン・カリヤ、「職能集団」の意）は、1964年に結成され、スハルト政権下の「新秩序」として知られる権威主義的な軍事政権時代の主要な政治的手段として機能した。同党は、右派ポピュリスト的、超国粋主義的、そして公然と権威主義的な見解を掲げ、国内における軍事支配の維持を図り、スハルトおよび政権内部の権力者たちの政策と指示に従うことを目指した。「新秩序」の崩壊後も、同党は存続し選挙に立候補し続け、より「穏健」な政党として自らを再定義しようと試みたが、こうした新しい派閥の影響力は依然としてはるかに小さいままである。"
 IND.Monarchist: "£IND_monarchism ハメンクブウォノ家"
 IND.Monarchist_icon: "£IND_monarchism"
 IND.Monarchist_desc: "スルタン制 - ハメンクブウォノ家は、ジャワ島に位置し、現在はインドネシアの自治王政下にあるジョグジャカルタ・スルタン国の統治家系である。1755年のスルタン国の建国と共に設立されたハメンクブウォノ家は、対立する諸勢力による陰謀、オランダによる植民地化、日本による占領、そして独立後の時代を乗り越えて存続してきた。"
