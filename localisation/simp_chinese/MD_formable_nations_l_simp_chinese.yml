 form_NORDEM_category: "北海帝国"
 form_NORDEM_category_desc: "北海帝国是 11 世纪初英格兰、丹麦和挪威国家的政治联盟。帝国接近维京时代的末期，而且非常短暂。再次统一帝国将是现代的一项成就，并可能标志着新维京时代的回归。"
