l_spanish:
 faroe_islands_focus: "Árbol de enfoque de las Islas Feroe"
 FAO_national_decisions: "Decisiones nacionales de las Islas Feroe"
 FAO_national_decisions_desc: "Las Islas Feroe presentan una situación muy relajada, pero a la vez tensa. Además de los esfuerzos de los líderes políticos por impulsar el desarrollo de la isla y su población, también deben lidiar con la siempre acuciante cuestión de la independencia. Algunos la desean ahora, otros prefieren esperar a alcanzar una mayor estabilidad. En cualquier caso, dependerá tanto del pueblo feroés como de los daneses que la isla sea verdaderamente libre al final."
 FAO_decision_independence_war: "Guerra de Independencia"
 FAO_decision_independence_war_desc: "Ha llegado el momento y los políticos han forzado la mano del pueblo. Se ha declarado la guerra y ahora es una carrera contrarreloj para ver si Dinamarca logra conservar su corona o si esta se desmoronará ante la presión popular que obliga a alcanzar la paz entre todas las partes."