 ANTARCTICA_ATCP_TITLE: "§CКонсультативные стороны Договора об Антарктике§!"
 ANTARCTICA_CAP_TITLE: "§CПостоянные члены Договора об Антарктике§!"
 ANTARCTICA_CCAS_TITLE: "CCAS"
 ANTARCTICA_CCAS_TEXT: "Конвенция по сохранению антарктических тюленей (CCAS) — это соглашение, регулирующее охоту на тюленей в Антарктике. Она была принята в 1972 году с целью защиты популяций тюленей и обеспечения рационального использования их ресурсов."
 ANTARCTICA_CCAMLR_TITLE: "АНТКОМ"
 ANTARCTICA_CCAMLR_TEXT: "Комиссия по сохранению морских живых ресурсов Антарктиды (CCAMLR) — это организация, отвечающая за сохранение морской жизни в Южном океане. Она была создана в 1982 году для управления и защиты уникальной экосистемы Антарктиды."
