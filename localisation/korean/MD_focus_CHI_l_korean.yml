 CHI_korea_peninsula_tension_display: "$CHI_korea_peninsula_tension$: [?CHI_korea_peninsula_tension]"
 CHI_legitimacy_concentrated_desc: "The Politburo Standing Committee no longer needs a quorum - the General Secretary's circle has merged with the network. The Central Discipline Inspection Commission is a courtesy now."
 CHI_Lips_and_Teeth: "Lips and Teeth"
 CHI_Lips_and_Teeth_desc: "The historic characterization of Sino-North Korean relations 'as close as lips and teeth' has guided Chinese policy since the Korean War. Formalizing this doctrine commits China to the Kim regime's survival, deepening ties with Pyongyang at the cost of broader Korean reconciliation."
 CHI_mass_line_campaign: "Mass Line Campaign"
 CHI_mass_line_campaign_desc: "Officials are dispatched to rural communities, required to eat with farmers and file reports on local conditions. Luxury goods are removed from government offices and extravagant public spending is publicly condemned. The campaign reshapes visible official behaviour and restrains the informal consumption that had diverted state resources into private channels."
 CHI_Mount_Paektu_Understanding: "Mount Paektu Understanding"
 CHI_Mount_Paektu_Understanding_desc: "A secret bilateral understanding, concluded in the shadow of Mount Paektu  the mythologized birthplace of the Kim dynasty  formalizes Chinese security consultations with North Korean military command."
 CHI_nc_inf_cplac_value: "$CHI_nc_current_influence_tt$ [?CHI_ic_inf_cplac|Y0]"
