 GUA.conservatism: "£generic_conservatism_small （PAN）国民進歩党"
 GUA.conservatism_desc: "保守主義 - 国民進歩党（Partido de Avanzada Nacional）はグアテマラの右派保守政党である。同党は1989年に結成され、1995年の大統領選挙では勝利を収めた。同年の議会選挙においても最大多数の政党となった。その後はより強力な政党に後れを取り始め、その後に行われたほとんどの選挙で得票数を失っていった。"
 GUA.liberalism: "£generic_liberalism_small 愛国党"
 GUA.liberalism_desc: "自由主義 - 愛国党（Partido Patriota）は2001年に結成された保守的な自由主義政党である。2007年と2011年の選挙では大成功を収めたものの、その後には多くの支持を失い、最終的には2017年に解党された。2011年には議会の全158議席のうち56議席を占める最大多数政党となった。"
 GUA.socialism: "£generic_socialism_small （UNE）国民希望党"
 GUA.socialism_desc: "社会民主主義 - 国民希望党（Unidad Nacional de la Esperanza）はグアテマラの社会民主主義政党である。自らを社会的キリスト教、そして大衆主義的だと定義している。2002年に創設されたのち、2003年の総選挙では大成功を収め、2007年と2019年には議会における最大政党にもなり、大統領選挙でも勝利を収めた。同党は2019年の大統領選挙における第一回目の投票では勝利したが、第二回目の投票ではバモス党の候補の前に敗北した。"
 GUA.Communist-State: "£generic_Communist_State_small （URNG-MAIZ）グアテマラ国民革命連合"
 GUA.Communist-State_desc: "共産主義 - グアテマラ国民革命連合（Unidad Revolucionaria Nacional Guatemalteca）はグアテマラの共産主義政党である。マルクス・レーニン主義、チャベス主義、ボリバル主義や大衆主義など、様々な政治的思想に従っている。党は1982年に結成されたが、議会へは2003年に参入を果たしたばかりである。それ以降も1桁台前半の支持率を維持し続けているが、支持率が4%を超えたことは一度たりともない。2011年と2015年にはウィナクと選挙連合を組み出馬した。"
 GUA.anarchist_communism: "£generic_anarchist_communism_small 新国家同盟"
 GUA.anarchist_communism_desc: "急進左派 - 新国家同盟（Alianza Nueva Nació）は左翼政党である。1999年には第三の人気政党としてグアテマラ議会へと参入した。その後は継続的に得票数を失っていき、最終的にはグアテマラの選挙法に基づく得票数不足を理由に、2007年には解党を余儀なくされた。"
 GUA.anarchist_communism_2007: "£generic_anarchist_communism_small ウィナク"
 GUA.anarchist_communism_2007_desc: "急進左派 - ウィナクは2007年に創設されたグアテマラの民主社会主義政党である。グアテマラの先住民族共同体にそのルーツを持ち、国内の民族間における平等を求める運動を行っている。「ウィナク（Winaq）」という党名はキチェ語で「人々」を意味し、キチェ人はマヤ族を先祖に持つアメリカにおける先住民系の人々である。当初はグアテマラ国民革命連合と連立を組んで出馬していたが、2019年の選挙ではその連立から離脱し、投票数、議席数ともにグアテマラ国民革命連合を上回った。"
 GUA.Conservative: "£generic_Conservative_small 統一党"
 GUA.Conservative_desc: "反動主義 - 統一党（Partido Unionista）は保守政党であり、民族主義的な右派にして経済面では自由主義的でもある。党の主な目標は中央アメリカ連合の再設置にある。当初は6%を超えるほどのわずかな成功を収めていたが、2007年以降は人気が低迷している。2015年には公約・革新・秩序運動党（Compromiso, Renovación y Orden）との選挙連合を結成した。"
 GUA.Neutral_conservatism: "£generic_Neutral_conservatism_small （LIDER）自由民主刷新党"
 GUA.Neutral_conservatism_desc: "中道保守主義 - 自由民主刷新党（Libertad Democrática Renovada）はグアテマラに短期間存在した中道右派政党である。2010年に国民希望党から分離し、2011年の選挙では初の成功を収め、約9%の得票を得た。次の選挙ではそれの倍以上の結果を残し、ほぼ19%に近い得票を得た。彼らは選挙法と政党法に違反し続け、それらを理由に2016年には追放処分を受けた。また、麻薬密売組織との強い結び付きがあるとも報じられている。"
 GUA.Neutral_conservatism_2017: "£generic_Neutral_conservatism_small バモス"
 GUA.Neutral_conservatism_2017_desc: "中道保守主義 - バモス党はグアテマラにおける保守政党である。2017年に結成されると、2019年には急速に力を増して第二党となり、同年の大統領選挙における第二回目の投票でも勝利を収めた。社会的には保守的であり、経済的には自由主義的である。党の完全な正式名称は「Vamos por una Guatemala Diferente」、直訳するなれば「我々は違いのあるグアテマラを目指す」となる。"
 GUA.Neutral_Libertarian: "£generic_Neutral_Libertarian_small （UCN）国民革新同盟"
 GUA.Neutral_Libertarian_desc: "民族主義 - 国民革新同盟（Unión del Cambio Nacional）はグアテマラの民族主義政党である。2006年に結成され、2007年の総選挙では4%を超える得票を獲得し、2011年には10%を超える得票を獲得した。その後はわずかに票を落としたものの、現在でも5%を超える得票数は維持している。"
 GUA.Neutral_green: "£generic_Neutral_green_small トドス"
 GUA.Neutral_green_desc: "中道主義 - トドス党（Todos）はグアテマラの中道政党である。民族主義的であり、キリスト教民主主義とヒューマニズム、そして社会的市場経済を支持している。同党は国民希望党から離党した議員らが「紫のネクタイ」としても知られる政府内派閥を結成したのちに結党された。2012年の中ごろには環境主義者らが合流し、党名とロゴを変更して「トドス」（「すべて」、もしくは「全員」の意）となった。2015年の選挙では第三党となったが、次の選挙では前回議席数の半数以下にまでその数を減らすこととなった。"
 GUA.neutral_Social: "£generic_neutral_Social_small 集合"
 GUA.neutral_Social_desc: "社会民主主義 - グアテマラ集合党（Encuentro por Guatemala、グアテマラの集合/グアテマラと共に）はグアテマラの社会民主主義政党である。彼らは根本的な原理として、先住民系の人々の権利を強く主張してきた。彼らのロゴはグアテマラにおける四つの先住民系集団、マヤ人、ガリフナ人、シンカ人、そしてラディーノ人が一堂に会する様子を表している。彼らは2007年から2015年にかけて6%の得票を得る成功を収めたが、2019年には過酷なる敗北を喫し、2020年には解党へと至った。"
 GUA.Neutral_Communism: "£generic_Neutral_Communism_small （MLP）国民解放運動"
 GUA.Neutral_Communism_desc: "共産主義 - 国民解放運動（Movimiento para la Liberación de los Pueblos）はグアテマラの先住民系政党である。ウィナクとグアテマラ国民革命連合が先住民の人々を代表していないという主張のもとで結成された。政党自体は2016年に結成されたものの、合法化されたのはその2年後のことであった。2019年の選挙では、大統領選においては10%以上の得票を得たものの、議会選挙では3%の得票に留まるのみだった。"
 GUA.Nat_Populism: "£generic_Nat_Populism_small (MLN) 国民解放運動"
 GUA.Nat_Populism_desc: "右派大衆主義 - 国民解放運動（スペイン語：Movimiento de Liberación Naciona）はグアテマラの極右政党であった。1954年に国民民主運動（スペイン語：Movimiento Democratico Nacional）として結成され、1963年のクーデターによって国民解放運動は軍部の主要な政治基盤となった。また、右派大衆主義、農本主義、保守主義、経済的自由主義としても分類されていた。1999年には、同年の選挙で議会における全議席を失陥したために解党された。"
 GUA.Nat_Populism_2008: "£generic_Nat_Populism_small (FCN) 国民集中戦線"
 GUA.Nat_Populism_2008_desc: "右派大衆主義 - 国民集中戦線（スペイン語：Frente de Convergencia Nacional）はグアテマラの右派大衆主義政党である。2008年に退役軍人将校らによって結成され、民族主義、国家的にも社会的にも保守主義、反共主義、反社会主義、そして国家主義的である。2011年に臨んだ最初の選挙では成功を収められず、0.5%の得票だけに留まったが、その後に人気が急騰し9%の票を得た。2019年には再び議席の大多数を失陥した。"
 GUA.Nat_Fascism: "£generic_Nat_Fascism_small (FRG) グアテマラ共和戦線"
 GUA.Nat_Fascism_desc: "極右 - グアテマラ共和戦線（スペイン語：Frente Republicano Guatemaltec）は極右政党であった。保守的であり共和主義、そして反共主義的で右派大衆主義的でもあった。グアテマラの元大統領であり独裁者のエフライン・リオス・モントによって1989年に創設された。1990年代には大きな成功を収め、1999年には42%の票を得て最大の政党となった。しかしながら、その後の選挙では得票数が二度半減し、2011年には得票率が3%にまで落ち込んだ。2015年には議席を獲得することが出来ず、その年の内には解党された。2013年には制度的共和党（PRI）に改名された。"
 GUA.Nat_Fascism_2013: "£generic_Nat_Fascism_small (PRI) 制度的共和党"
 GUA.Nat_Fascism_2013_desc: "極右 - 制度的共和党（スペイン語：Partido Republicano Institucional）は極右政党であった。保守的であり共和主義、そして反共主義的で右派大衆主義的でもあった。グアテマラの元大統領であり独裁者のエフライン・リオス・モントによって1989年に創設された。1990年代には大きな成功を収め、1999年には42%の票を得て最大の政党となった。しかしながら、その後の二度の選挙で得票数が半減し、2011年には得票率が3%にまで落ち込んだ。2015年には議席を獲得することが出来ず、その年の内には解党された。2013年まではグアテマラ共和戦線（FRG）としても知られていた。"
 GUA.Nat_Autocracy: "£generic_Nat_Autocracy_small グアテマラ国軍"
 GUA.Nat_Autocracy_desc: ""
 GUY.conservatism: "£GUY_western_conservative 統一勢力"
 GUY.conservatism_desc: "保守主義 - 統一勢力は、社会的に保守的なガイアナの政党である。経済的には自由主義で、反ロシア的な姿勢をとり、イデオロギー的には中道右派に位置づけられる。1960年に結成され、2015年の選挙まで活動を続けた。1968年以降は得票率が5%を超えることはなかったものの、主要な小政党の一つとしての地位を維持した。"
 GUY.liberalism: "£GUY_western_liberal 変革同盟"
 GUY.liberalism_desc: "自由主義 - 変革同盟は、社会自由主義を掲げる政党である。2005年、所属政党を離党した3人の国会議員によって結成された。進歩的で多民族的な政党であり、中道から中道左派の立場をとっている。結党以来、議会では一貫して第3党の座を維持している。2015年以降は、国家統一パートナーシップと共同で単一リストを組んで選挙に臨んでいる。"
 GUY.socialism: "£GUY_western_social_democrat 人民国家会議"
 GUY.socialism_desc: "社会民主主義 - 人民国家会議 - 改革派は、ガイアナの社会民主主義政党である。民主社会主義とも分類され、過去には左派ナショナリストおよびポピュリストの立場をとっていた。政治的には中道左派から左派に位置づけられる。1957年に結成され、それ以来、人民進歩党/市民党と共にガイアナの二大政党の一つとなっている。主にアフリカ系ガイアナ人から支持を受けている。2011年には、国家統一パートナーシップと呼ばれる他のいくつかの政党と選挙連合を結成した。"
 GUY.socialism_2011: "£GUY_western_social_democrat_alt (APNU) 国家統一パートナーシップ"
 GUY.socialism_2011_desc: "社会民主主義 - 国家統一パートナーシップ（APNU）は、2011年の選挙に向けて10の政党によって結成され、その中でも人民国家会議が最も重要かつ人気のある政党であった。この連合は主に左派政党で構成されている。2011年、同連合は変革同盟（AFC）と連立を組んだ。議席の過半数を獲得したが、総得票数では人民進歩党/市民党が最大政党であったため、大統領職は同党が獲得した。次の選挙では、APNUとAFCが単一の候補者名簿で共同出馬し、単一の組織として大統領選に立候補することが可能となった。"
 GUY.anarchist_communism: "£GUY_anarchist_communism (PPP/C) 人民進歩党/市民党"
 GUY.anarchist_communism_desc: "共産主義 - 人民進歩党/市民党は、ガイアナの二大政党の一つである。1950年、イギリス領ギアナ労働党と政治問題委員会の合併により結成された。結成以来、ガイアナ最大の政党、あるいは第2位の政党としての地位を維持している。多民族政党であるが、支持基盤は主にインド系ガイアナ人で構成されている。政治的には中道左派から左派に位置し、社会民主主義、民主社会主義、左派ポピュリズムのイデオロギーを掲げている。過去には、左派ナショナリストおよびマルクス・レーニン主義と分類されていた。"
 GUY.Neutral_conservatism: "£GUY_non_aligned_conservative (ROAR) 台頭組織化再建ガイアナ"
 GUY.Neutral_conservatism_desc: "中道保守主義 - 台頭組織化再建ガイアナは、ガイアナの保守政党である。インド系ガイアナ人政党として、自らを民族に基づいた政党と位置づけた最初の政党であった。1999年に結成されたが、2001年の選挙では振るわなかった。その後、ガイアナ行動党と連立を組んでやや好成績を収めたが、2011年の選挙を前に多くの党員が変革同盟へ移籍した。"
 GUY.neutral_Social: "£GUY_neutral_Social (WPA) 労働者同盟"
 GUY.neutral_Social_desc: "民主社会主義 - 労働者同盟は、ガイアナの左派政党である。1974年に3つの左派政党の連合として結成され、1979年に正式に独立した政党として発足した。全体としては大きな成果を上げていないが、2001年の選挙ではガイアナ行動党と共同で立候補し、過去最高の成績を収めた。"
 GUY.Neutral_Communism: "£GUY_Neutral_Communism (GAP) ガイアナ行動党"
 GUY.Neutral_Communism_desc: "共産主義 - ガイアナ行動党は、ガイアナの左派政党で、同国の先住民であるアメリカ先住民を代表している。1989年に結成されたが、2001年に労働者人民同盟と連合を組んで初めて選挙に立候補した。2006年には台頭組織化再建ガイアナと連合を結び、2011年には国家統一パートナーシップに加盟した。"
 GUY.Nat_Populism: "£GUY_Nat_Populism 統一共和党"
 GUY.Nat_Populism_desc: "右派ポピュリズム - 統一共和党は1985年にアメリカで結成され、1987年にガイアナで活動を開始した。1992年の選挙では、議席を1つたりとも獲得できず、2015年以降になってようやく選挙への立候補を再開したが、それ以降もほとんど成果を上げられていない。同党は、ガイアナにおける生活水準や教育の向上などを掲げている。"
 GUY.Nat_Autocracy: "£GUY_Nat_Autocracy ガイアナ国防軍"
 GUY.Nat_Autocracy_desc: ""
 HAI.conservatism: "£HAI_western_conservatives (RDNP) 進歩国民民主連合"
 HAI.conservatism_desc: "キリスト教民主主義 - 進歩国民民主連合（フランス語：Rassemblement des Démocrates Nationaux Progressistes）は、ハイチで現存する最古の政党の一つである。1979年に設立され、第二デュバリエ政権崩壊直後の1987年に選挙への立候補が認められた。\n\n同党は中道民主主義国際連盟およびアメリカキリスト教民主主義機構の加盟組織である。"
 HAI.liberalism: "£HAI_western_liberalism (PHTK) ハイチ・テト・カレ党"
 HAI.liberalism_desc: "自由主義 - ハイチ・テト・カレ党（ハイチ・クレオール語：Pati Ayisyen Tèt Kale、ハイチ禿頭党）は、2012年8月に共和党から分裂した自由主義政党である。ミシェル・マルテリはPHTKの党員ではなかったが、同党は共和党と緊密な関係を維持していた。"
 HAI.socialism: "£HAI_western_socialism (FL) ラヴァラの家族"
 HAI.socialism_desc: "社会民主ポピュリズム - ラヴァラの家族（ハイチ・クレオール語：Fanmi Lavalas）は、ジャン＝ベルトラン・アリスティドの1990年大統領選挙運動で広まったラヴァラス運動に因んで名付けられた政党であり、1996年に闘争人民機構から正式に分裂した。\n\n同党は「成長と公平」政策を維持することで知られ、西欧的な社会民主主義の原則を追求しつつ、IMFが求める緊縮財政措置の実施を拒否している。"
 HAI.Communist-State: "£HAI_communist_state (NPCH(ML)) 新ハイチ共産党（マルクス・レーニン主義）"
 HAI.Communist-State_desc: "マルクス・レーニン共産主義 - 新ハイチ共産党（マルクス・レーニン主義）（フランス語：Nouveau Parti Communiste Haïtien (Marxiste-Léniniste) ）は、2000年に結成された政党であり、マルクス・レーニン主義者、毛沢東主義者、スターリン主義者が混在している。\n\n同党は広く反修正主義者と見なされており、フランソワ・デュバリエ（通称パパ・ドク）とその息子ジャン＝クロード・デュバリエ（通称ベイビー・ドク）の両政権下で弾圧され、最終的に亡命を余儀なくされた旧共産党「ハイチ統一共産党」の思想的継承者である。"
 HAI.anarchist_communism: "£HAI_anarchist_communists (PPD) デサリーヌの子プラットフォーム"
 HAI.anarchist_communism_desc: "デサリニズム - デサリーヌの子プラットフォーム（ハイチ・クレオール語：Platfòm Pitit Desalin）は、2014年12月に設立された民主社会主義政党であり、広範なデサリニスト経済原則に強く影響を受けている。\n\n党名はハイチ革命後の初代統治者ジャン＝ジャック・デサリーヌに由来する。奴隷制を永久に廃止した後、デサリーヌは現金作物の生産・加工を全て新ハイチ政府の管理下に置き、ハイチの経済的利益を守るため強硬な保護主義政策を実施した。彼は外国投資自体に反対していたわけではなく、フランスからの投資のみを拒否していた。"
 HAI.Neutral_conservatism: "£HAI_neutral_conservatives (Mochrenha) 新たなハイチのためのキリスト教運動"
 HAI.Neutral_conservatism_desc: "キリスト教民主主義 - 新たなハイチのためのキリスト教運動（フランス語：Mouvement Chrétien pour une Nouvelle Haïti）は、中道右派のキリスト教民主主義政党であり、1991年にハイチ国内の福音派プロテスタント諸教会の連合によって設立された。\n\n選挙管理当局が同党を公式な選挙候補として承認したのは1999年になってからである。"
 HAI.neutral_Social: "£HAI_neutral_socialist (OPL) 闘争人民機構"
 HAI.neutral_Social_desc: "社会民主主義 - 闘争人民機構（ハイチ・クレオール語：Òganizasyon Pèp k ap Lite）は、1991年のラヴァラス運動期に設立された政党である。\n\n同党は社会民主主義の枠組みに属するものの、低迷するハイチ経済の活性化策として民営化と緊縮財政政策を支持したため、1996年にOPLは思想的に分裂し、離脱派はラヴァラの家族を結成した。"
 HAI.Nat_Autocracy: "£HAI_nationalist_junta (FAd'H) ハイチ軍"
 HAI.Nat_Autocracy_desc: "軍事政権 - ハイチ軍（フランス語：Forces Armées d'Haïti）は、軍高官によるクーデター及びクーデター未遂が頻発したため、1995年に活動停止となり、その後解散した。"
 HEZ.Vilayat_e_Faqih: "£generic_Vilayat_e_Faqih_small ヒズボラ"
 HEZ.Vilayat_e_Faqih_desc: "ホメイニ主義 - イスラエルによるレバノン侵攻と占領への対抗として、1982年にシーア派聖職者らによって結成されたヒズボラは、瞬く間に支持を集め、イスラエルの拠点を攻撃するための民兵組織を結成した。イデオロギー的には、同組織はイランから多大な影響を受け、ルーホッラー・ホメイニーの理想とモデルを採用した。同組織はレバノンの政界で活動しており、海外にも数カ国に支部を持つが、レバノン国内外での活動により、多くの国がヒズボラをテロ組織と見なしている。"
 HKG.conservatism: "£HKG_conservatism 民主党"
 HKG.conservatism_desc: "中道主義 - 民主党は、1995年に香港で初めて選出された立法会において最大政党となった。同党は、汎民主派の中でも最も穏健な政党の一つであり、北京との妥協を図ろうとする姿勢が、かつての支持者の一部を遠ざける結果となっている。"
 HKG.liberalism: "£generic_liberalism_small 民權党"
 HKG.liberalism_desc: "自由主義 - 民權党は、民主化派の他の政党と同様、普通選挙の実現と個人の自由の保護を訴えている。同党の特徴は、環境保護とマイノリティの権利への配慮にある。"
 HKG.liberalism_2006: "£HKG_liberalism_2006 公民党"
 HKG.liberalism_2006_desc: "自由主義 - 公民党は、弁護士団体によって設立された主流の民主化支持政党であり、普通選挙、市民の自由、法の支配といった課題に重点を置いている。"
 HKG.socialism: "£generic_socialism_small 前線"
 HKG.socialism_desc: "社会民主主義 - エミリー・ラウが立ち上げた前線は、他の汎民主派の一部よりも過激な民主化を掲げる政党であり、基本法に代わる新憲法の制定を求めている。"
 HKG.socialism_2006: "£generic_socialism_small (LSD) 社会民主連線"
 HKG.socialism_2006_desc: "社会民主主義 - 社会民主連線は、進歩的民主主義を掲げる政党であり、他の泛民主派政党とは異なり、街頭行動の政策と密接に結びついている。"
 HKG.socialism_2016: "£generic_socialism_small (PP-LSD) 人民力量 - 社会民主連線"
 HKG.socialism_2016_desc: "社会民主主義 - 人民力量 - 社会民主連線は、進歩的民主主義を掲げる選挙同盟であり、他の泛民主派政党とは異なり、街頭行動の政策と密接に結びついている。"
 HKG.Communist-State: "£HK_PLA 人民解放軍駐香港部隊"
 HKG.Communist-State_desc: "共産主義 - 人民解放軍駐香港部隊は、特別行政区の防衛を維持するために存在している。基本法では駐屯軍が地方の事務に干渉することを禁じているが、香港政府からの要請があれば、駐屯軍は公共の秩序を回復するために動員されることがある。"
 HKG.Conservative: "£HKG_Conservative (DAB) 民主建港協進連盟"
 HKG.Conservative_desc: "保守主義 - 民主建港協進連盟は立法会における主要な親北京政党であり、一貫して中国本土との統合を支持してきた。また、同党は社会的に保守的な立場を取り、同性婚に反対し、福音派キリスト教団体と緊密な関係を維持している。"
 HKG.Autocracy: "£HKG_Autocracy (NPP) 新民党"
 HKG.Autocracy_desc: "保守主義 - 新民党は、親北京派の有力政治家である葉劉淑儀（レジーナ・イップ）の選挙活動のための組織であると広く見なされている。国家安全法への支持や、外国勢力がソーシャルメディアを利用して抗議活動に干渉したとする主張により、彼女は物議を醸す人物となっている。"
 HKG.anarchist_communism: "£HKG_anarchist_communism (HKFTU) 港九労工社団聯会"
 HKG.anarchist_communism_desc: "左派急進主義 - 港九労工社団聯会は、長年にわたり中国の中国共産党と密接な関係にある。同組合は、1967年にイギリス植民地当局に対して起きた左翼暴動において重要な役割を果たし、現在も親北京かつ労働者階級の立場を堅持しており、反北京派の「泛民主派」や、より中産階級寄りの親北京政党とは一線を画している。"
 HKG.Neutral_conservatism: "£generic_Neutral_conservatism_small 民主思路"
 HKG.Neutral_conservatism_desc: "中道主義 - 民主思路は、親北京派と泛民主派という二分法を超越した立場を標榜する小規模な中道政党である。同党は両陣営の妥協点を見出すアプローチを推進しているが、その取り組みに対する支持は比較的低い。"
 HKG.Neutral_Libertarian: "£generic_Neutral_Libertarian_small 新思維"
 HKG.Neutral_Libertarian_desc: "リバタリアン - 新思維は、親北京派と泛民主派という二分法を超越した立場を標榜する小規模な中道政党である。同党は両陣営の妥協点を見出すアプローチを推進しているが、その取り組みに対する支持は比較的低い。"
 HKG.oligarchism: "£generic_oligarchism_small 自由党"
 HKG.oligarchism_desc: "寡頭政治 - 自由党は、親企業かつ社会的に保守的な政党である。親北京派の一員であるにもかかわらず、同党は常に同盟関係にあるとされる勢力と足並みを揃えているわけではなく、これまで何度も政府に対して公然と反対の立場を表明してきた。"
 HKG.Neutral_green: "£generic_Neutral_green_small 香港緑の党"
 HKG.Neutral_green_desc: "緑の政治 - 香港緑の党は、左派的な理念を持つ小規模な環境保護政党である。アジア太平洋緑の党連盟の加盟団体である。"
 HKG.Nat_Populism: "£generic_Nat_Populism_small 本土派"
 HKG.Nat_Populism_desc: "国家ポピュリズム - 本土派は、香港における自主決定を求めるという共通の願いの下、多様な政党を包括する政治的集団である。「青年新政」、「香港衆志」、「香港民族党」といった団体は、2014年の香港デモの際に台頭し、論争の的となっている、より過激でポピュリスト的な新しい香港政治の潮流を代表している。一部のローカリストは香港独自の文化の保存を主張し、他の一部は本土からの観光客や移民の制限を主張している。より過激なローカリストの中には、独立を主張する者や、過渡的な措置として一時的な英国統治への回帰さえ提唱する者もいる。いずれにせよ、彼らは若年層の相当な割合からは称賛の眼差しを向けられている一方で、高齢層からは嫌悪に近い不快感を伴う批判を受けている。"
 HOL.conservatism: "£HOL_western_conservative (CDA) キリスト教民主勢力"
 HOL.conservatism_desc: "キリスト教民主主義 - キリスト教民主勢力（オランダ語：Christen-Democratisch Appèl, CDA）は、オランダのキリスト教民主主義の伝統に根ざした中道右派政党である。同党は、社会的責任、均衡のとれた市場経済、農村地域の代表権の確保、そして地域社会の制度の維持を重視している。同党は、欧州の協力と大西洋横断の絆をオランダの安全保障と繁栄に不可欠なものとして捉え、断固としてEUおよびNATO支持の外交政策を支持している。選挙での浮き沈みはあるものの、CDAは農業、家族政策、倫理に関する議論において依然として大きな影響力を持ち、リベラル派と保守派のブロックの間に位置する現実的な勢力としての立場を確立している。"
 HOL.liberalism: "£HOL_western_liberal (VVD) 自由民主国民党"
 HOL.liberalism_desc: "自由主義 - 自由民主国民党（オランダ語：Volkspartij voor Vrijheid en Democratie, VVD）は、経済成長、低税率、個人の責任を重視する市場自由主義・親企業的な政党である。EUの協力を強く支持し、NATOへの加盟を確固たるものとしている同党は、社会政策においては穏健な立場を保ちつつ、規制緩和、起業家精神、財政規律を推進している。オランダ政界において長きにわたり支配的な勢力であったVVDは、安定と経済競争力の現実的な担い手としての立場を打ち出している。"
 HOL.socialism: "£HOL_western_social_democrat (PvdA) 労働党"
 HOL.socialism_desc: "社会民主主義 - 労働党（オランダ語：Partij van de Arbeid, PvdA）は、福祉国家の強化、労働者の権利の保護、そして累進課税と公共投資を通じた不平等の是正に重点を置く中道左派の社会民主主義政党である。同党は、欧州連合内での緊密な協力、NATOにおける積極的な役割、そして公共サービスと団体交渉が中核的な柱であり続ける混合経済を支持している。歴史的にオランダの主要な与党の一つであるPvdAは、社会正義、労働条件、そして公共サービスの将来に関する議論を今なお牽引し続けている。"
 HOL.Communist-State: "£HOL_emerging_communism (NCPN) オランダ新共産党"
 HOL.Communist-State_desc: "共産主義 - オランダ新共産党（オランダ語：Nieuwe Communistische Partij Nederland, NCPN）は、反資本主義、労働者管理、NATOおよび西側経済構造への抵抗を基盤とするマルクス・レーニン主義の綱領を掲げている。同党は、主要産業の国有化、社会保障の拡充、そしてアメリカやEUの影響力から独立した外交政策を主張している。選挙では微力な存在ではあるが、労働組合界や左派活動家ネットワークにおいて一定の存在感を維持しており、オランダにおける歴史的な共産主義運動のイデオロギー的後継者としての立場を確立している。"
 HOL.Neutral_conservatism: "£HOL_non_aligned_conservative (SGP) 改革派政党"
 HOL.Neutral_conservatism_desc: "宗教的保守主義 - 改革派政党（オランダ語：Staatkundig Gereformeerde Partij, SGP）は、オランダで最も歴史のある政党であり、正統派改革派教会に根ざした厳格なカルヴァン主義の伝統を体現している。同党は社会的に保守的な政策を提唱し、家族生活、公の道徳、聖書の原則を統治の指針として優先している。欧州統合に対しては懐疑的な姿勢を保ち、慎重な防衛政策を推進するとともに、キリスト教的義務に基づく限定的な政府を重視している。規模は小さいものの、SGPは規律ある組織体制、政策の継続性、そして議会交渉における信頼性の高さで知られている。"
 HOL.neutral_Social: "£HOL_non_aligned_socialist_democrat (D66) 民主66"
 HOL.neutral_Social_desc: "社会自由主義 - 民主66（オランダ語：Democraten 66, D66）は、市場経済と強力な市民的自由、そして教育やイノベーションにおける国家の積極的な役割を融合させた、進歩的で親欧州的な政党である。同党は国民投票や制度改革を推進し、EUのさらなる統合を支持するとともに、安楽死、薬物政策、LGBTQの権利といった問題についてリベラルな立場をとっている。連立政権においては、D66はしばしば中道左派と中道右派のブロック間の架け橋としての役割を果たしつつ、オランダの国家と社会の近代化を推進している。"
 HOL.Neutral_Libertarian: "£HOL_non_aligned_libertarian (LP) リバタリアン党"
 HOL.Neutral_Libertarian_desc: "リバタリアニズム - リバタリアン党（オランダ語：Libertarische Partij, LP）は、国家による介入の最小化、大幅な減税、そして経済・社会生活の双方における個人の自由の強力な保護を提唱している。同党は、公共サービスの民営化、市場の規制緩和、そして不干渉を重視した外交政策を求めている。選挙での得票数は少ないものの、同党は一貫したイデオロギー的姿勢を堅持しており、デジタル権利、政府の透明性、個人の自律性に関する議論に影響を与えている。"
 HOL.Neutral_Communism: "£HOL_non_aligned_communism (SP) 社会党"
 HOL.Neutral_Communism_desc: "社会主義 - 社会党（オランダ語：Socialistische Partij, SP）は、1970年代の毛沢東主義運動を起源とする、経済的平等、充実した公共サービス、市場自由化への抵抗を重視する幅広い左派ポピュリスト政党へと発展した。同党は、主要分野における国有化の拡大、多国籍企業へのより厳しい規制、そしてより手厚い社会保障の保証を求めて活動している。EU統合の諸側面には批判的であるものの、SPは市場の規律ではなく社会正義に根ざした国際協力を支持している。その支持基盤には、労働者階級の有権者、医療従事者、そして既存の政治体制に懐疑的な市民が含まれている。"
 HOL.Neutral_green: "£HOL_non_aligned_greens (GL) フルンリンクス"
 HOL.Neutral_green_desc: "環境進歩主義 - フルンリンクス（オランダ語：GroenLinks, GL）は、気候変動対策、社会的平等、国際人権に重点を置く進歩的な緑の政党である。同党は、急速な脱炭素化、公共交通機関の拡充、富の再分配、そして強力な環境規制を提唱している。同党は強固な親EU派であり、気候変動や移民政策における欧州のより深い協力を支持している。その支持基盤には、都市部の進歩派、若年層の有権者、そして持続可能性と社会正義に尽力する活動家らが含まれており、フルンリンクスはオランダにおける生態学的・社会的改革の主導的な声としての地位を確立している。"
 HOL.Nat_Autocracy: "£HOL_nationalist_military_junta (AFN) オランダ国軍"
 HOL.Nat_Autocracy_desc: "軍事独裁 - オランダ軍（オランダ語：Nederlandse Krijgsmacht, NK）この体制下において、オランダ軍は国家に対して直接的な支配権を行使し、上級将校が国家安全保障、行政、戦略計画を統括している。文民の政治機関は名目上の存在に過ぎず、軍の監督下で運営されており、統治は安定、規律、国家防衛によって正当化されている。軍事政権はNATO加盟国と緊密な作戦上の連携を維持しているが、国内においては厳格な治安体制を敷き、多元主義や議会の権威よりも秩序と忠誠を優先している。"
 HOL.Nat_Fascism: "£HOL_nationalist_fascism (NVU) オランダ人民連合"
 HOL.Nat_Fascism_desc: "超国粋主義 - オランダ人民連合（オランダ語：Nederlandse Volks-Unie, NVU）NVUは、アイデンティティ、移民、国家主権に関する強硬な姿勢で知られる極右の超国粋主義運動である。20世紀後半に台頭した同党は、政治的には周辺的な存在にとどまっているが、対立的な言辞や主流社会との頻繁な衝突で知られている。同党は、強力な中央集権国家、厳格な文化的同質性、超国家機関からの離脱を主張している。選挙への影響力は限定的であるものの、NVUは活動家ネットワークや過激なデモを通じて活動を続け、オランダにおける最も過激なイデオロギー潮流の一つを代表している。"
 HOL.Nat_Populism: "£HOL_nationalist_right_wing_populist (LPF) ピム・フォルタイン党"
 HOL.Nat_Populism_desc: "右派ポピュリズム - ピム・フォルタイン党（オランダ語：Lijst Pim Fortuyn, LPF）。2002年にピム・フォルタインによって設立されたLPFは、厳格な移民管理、文化保護、そして国民の自信の回復を力強く訴える政策を掲げ、オランダの政治体制に挑んだ。フォルタインのカリスマ的で対立を恐れないスタイルは、官僚主義の停滞、多文化主義政策、そしてエリート層の一般市民との隔たりを批判し、大きな支持を集めた。"
 HOL.Monarchist: "£HOL_nationalist_monarchist (N-HoON) オラニエ＝ナッサウ家"
 HOL.Monarchist_desc: "国家君主主義 - オラニエ＝ナッサウ家（オランダ語：Huis van Oranje-Nassau）は、王室の権威が国民的アイデンティティ、政治的統一、国家の継続性の中心となるという、国家君主主義の理念を体現している。王冠は、オランダの主権、文化的遺産、社会的結束の守護者として位置づけられ、政党政治を超越しつつ、政府の進路に対して決定的な影響力を行使する。このモデルにおいて、君主制への忠誠は市民社会を統合する柱として機能し、国家の誇り、伝統的な制度、そして何世紀にもわたる王朝の遺産に根ざした結束力があり秩序ある社会が強く重視される。"
 HOR.Autocracy: "£generic_Autocracy_small (PFLL) リビア解放人民戦線"
 HOR.Autocracy_desc: ""
 HOR.Kingdom: "£generic_Kingdom_small マドカリ"
 HOR.Kingdom_desc: ""
 HOR.Caliphate: "£generic_Caliphate_small リビア・イスラム国"
 HOR.Caliphate_desc: ""
 HOR.Nat_Autocracy: "£generic_Nat_Autocracy_small (LNA) リビア国民軍"
 HOR.Nat_Autocracy_desc: ""
 HUN.liberalism: "£HUN_western_liberal 自由民主同盟"
