l_braz_por:
 belorussia_focus: "Árvore de Foco Bielorrussa"
 BLR_china_friendship: "Parceria com a China"
 BLR_china_friendship_desc: "Temos a intenção de fortalecer as relações amigáveis entre nossos países."
 BLR_Bel_G2: "BELGEE"
 BLR_Bel_G2_desc: "JSC \"BELGEE\" is a Belarusian-Chinese joint venture for the assembly of Chinese Geely passenger cars. One of two passenger car assembly companies in Belarus. It is placed on the leased areas of JSC \"Borisovsky plant Autohydrousilitel\" near Borisov."
 BLR_Chinese_Modernization_Railway: "Modernização das Ferrovias"
 BLR_Chinese_Modernization_Railway_desc: "Nossos colegas chineses concordaram em financiar a modernização da rede ferroviária de nosso país."
 BLR_Credit_tec2: "Crédito para o Aperfeiçoamento da CHP"
 BLR_Credit_tec2_desc: "Nossas usinas termelétricas em Minsk precisam ser modernizadas; solicitaremos um empréstimo da China para isso."
 BLR_AES: "Central Nuclear Bielorrussa"
 BLR_AES_desc: "Finalmente construiremos nossa própria usina nuclear."
 BLR_Chinese_kal: "Acordo Comercial com a China"
 BLR_Chinese_kal_desc: "Concluiremos um acordo comercial com a China, o que nos permitirá aumentar a capacidade de produção da Grodno Azot."
 BLR_Chinese_zdania: "Construção de Novas Fábricas"
 BLR_Chinese_zdania_desc: "O governo chinês está aumentando os investimentos em nosso país e está pronto para construir novas fábricas."
 BLR_Chinese_konfuci: "Institutos Confúcio"
 BLR_Chinese_konfuci_desc: "Abriremos diversos institutos Confúcio em nosso país."
 BLR_Chinese_Poezda: "Compra de Trens na China"
 BLR_Chinese_Poezda_desc: "Vamos adquirir vários trens na China, o que ajudará a melhorar nosso fornecimento."
 BLR_Chinese_huawei: "Cooperação com a Huawei"
 BLR_Chinese_huawei_desc: "Estabeleceremos uma forte cooperação com essa empresa chinesa."
 BLR_Chinese_energy: "Investimentos Chineses no Nosso Setor Energético"
 BLR_Chinese_energy_desc: "As empresas chinesas continuam sua onda de investimentos em nosso país e agora estão prontas para investir novamente em nosso setor de energia."
 BLR_Chinese_uchenia: "Exercícios com o Exército Chinês"
 BLR_Chinese_uchenia_desc: "A troca de experiências entre as nossas forças armadas será muito útil."
 BLR_Chinese_yuan: "O Yuan é a Segunda Moeda do País"
 BLR_Chinese_yuan_desc: "Estamos prontos para aceitar o yuan como segunda moeda em nosso país."
 BLR_Chinese_skynet: "Experiência de Controle da Internet Chinesa"
 BLR_Chinese_skynet_desc: "Estamos prontos para aprender com a experiência de monitoramento de redes sociais."
 BLR_Chinese_economic: "Experiência Econômica Chinesa"
 BLR_Chinese_economic_desc: "Estamos implementando toda a experiência adquirida pela economia chinesa."
 BLR_military_exercises_CHI_idea: "Exercícios Bielorrusso-Chineses"
 BLR_Socialist_Market_Economy: "Economia de Mercado Socialista"
 BLR_minotor_servise_sov: "Serviço de Minotor Bielorrusso"
 BLR_minotor_servise_blr: "Contrato Minotor com a Rússia"
 BLR_558zadov_contract: "Contrato com a Planta de Reparo de Aeronaves 558"
 BLR_peleng_contract: "[BLR.GetFlag]Contrato Com a Empresa Peleng"
 BLR_peleng_contract_desc: "[BLR.GetFlag]Empresa bielorrussa para o desenvolvimento e produção de produtos optoeletrônicos para fins militares e civis, líder no setor na República da Bielorrússia."
 BLR_peleng_union_state: "[BLR.GetFlag]JSC Peleng"
 BLR_peleng_union_state_desc: "[SOV.GetFlag]Empresa estatal da União para o desenvolvimento e produção de produtos optoeletrônicos para fins militares e civis, empresa líder do setor no estado da União."
 BLR_peacerota_idea: "Contingente de Manutenção da Paz"
 BLR_Foreign_legion_idea: "Legião Estrangeira"
 BLR_sso_idea: "Forças de Operações Especiais"
 BLR_ter_orobona_idea: "Defesa Territorial"
 BLR_mzkt_contract: "Contrato Com a MZKT"
 BLR_mzkt_contract_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state-owned enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_mzkt_contract_another: "Contrato Com a MZKT"
 BLR_mzkt_another_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state-owned enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_mzkt_contract_blr: "Contrato MZKT com [SOV.GetNamewithFlag]"
 BLR_mzkt_contract_blr_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state-owned enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_mzkt_union_state: "[BLR.GetFlag]Planta de Tratores de Rodas de Minsk"
 BLR_mzkt_union_state_desc: "Minsk Wheeled Tractor Plant, MZKT is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is currently under the jurisdiction of the Union State."
 BLR_140_zavod_remont: "140ª Planta de Reparos"
 BLR_140_zavod_remont_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of Belarus, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_140_zavod_union_state: "[BLR.GetFlag]140ª Planta de Reparos"
 BLR_140_zavod_union_state_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of [SOV.GetFlag]Union State, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_Brigade_Territorial_Defence: "Criar uma Brigada de Defesa Territorial"
 BLR_Brigade_Territorial_Defence_desc: "The outbreak of war forces us to raise a territorial defense force."
 BLR_Transport_troops: "Transportar Tropas"
 BLR_Transport_troops_desc: "Tropas especiais designadas para realizar tarefas de suporte de transporte."
 BLR_sso: "Criação de Forças de Operações Especiais"
 BLR_sso_desc: "Reconhecendo a importância das operações especiais em tempos modernos, estamos investindo em treinamento especializado e equipamentos avançados para nossas forças especiais. Esta preparação nos permitirá executar missões críticas com precisão e eficácia, onde quer que seja necessário."
 BLR_trans_army: "Criação de Tropas de Transporte"
 BLR_trans_army_desc: "The Belarusian Transport Troops are the service branch of the Armed Forces of Belarus responsible for the movement of personnel and materiel by truck, rail, and air. They are designed to carry out transport support tasks for military formations from other service branches across the country."
 BLR_end_reform: "Completar a Reforma do Exército"
 BLR_end_reform_desc: "We will complete the reforms of our army, and it will now meet modern standards."
 USSR_Legacy: "Desenvolvimento da MZKT"
 USSR_Legacy_desc: "We will make every effort to develop and build upon the legacy we have inherited."
 BLR_mi_8: "Mi-8"
 BLR_MZKT: "MZKT"
 BLR_MZKT_desc: "Minsk Wheeled Tractor Plant is an enterprise specializing in the production of road and off-road heavy-duty vehicles, trailed vehicles, and special wheeled chassis for construction, oil and gas, and machine-building industries. It is a state enterprise under the jurisdiction of the State Military-Industrial Committee of the Republic of Belarus."
 BLR_minoitor: "Serviço Minotor"
 BLR_minoitor_desc: "Minotor-Service is a Belarusian enterprise located in Minsk and engaged in the development, production, modernization, repair, and maintenance of combat tracked vehicles, as well as the supply of spare parts. It is one of the leading enterprises of the country's military-industrial complex."
 BLR_belspecveshtech: "Belspetsvneshtechnika"
 BLR_belspecveshtech_desc: "Belspetsvneshtechnika, BSVT is a Belarusian state-owned foreign trade unitary enterprise founded in 1995. It specializes in the trade and production of weapons and dual-use products. It is a member of the State Military-Industrial Committee and is considered the country's leading enterprise in the field of arms exports."
 BLR_140_zavod: "140ª Planta de Reparo"
 BLR_140_zavod_desc: "The 140th Repair Plant is a state-owned enterprise of the military-industrial complex of Belarus, which specializes in the repair and modernization of armored vehicles and their engines."
 BLR_polonez: "Iniciar Desenvolvimento do Nosso MLRS com a China"
 BLR_polonez_desc: "We have enlisted the help of our Chinese colleagues to create our MLRS."
 BLR_peleng: "Peleng"
 BLR_peleng_for_russia: "Equipamento ATGM"
 BLR_peleng_for_russia_desc: "We are ready to launch the production of equipment for the Russian ATGM."
 BLR_peleng_for_ukr: "Equipamento ATGM"
 BLR_peleng_for_ukr_desc: "We are ready to launch the production of equipment for the Ukrainian ATGM."
 BLR_558_zavod: "558ª Planta de Reparo de Aeronaves"
 BLR_558_zavod_desc: "The 558th Aviation Repair Plant is one of the largest enterprises in the CIS for the repair and modernization of modern combat aviation equipment in service with the Air Forces of post-Soviet countries and many foreign nations alike. It is the most important aircraft repair facility in Belarus, located in the city of Baranovichi."
 BLR_Communism_start: "§YTatyana Golubeva§!"
 BLR_Communism_start_desc: "O comunismo retornou à Bielorrússia. Será que o Partido Comunista abrirá caminho para o marxismo-leninismo no país mais uma vez?"
 BLR_trade_with_nko: "Comércio Com a Coreia do Norte"
 BLR_trade_with_nko_desc: "A Coreia do Norte, embora seja um país pequeno, é nossa aliada no bloco socialista, com a qual estamos prontos para estabelecer relações comerciais."
 BLR_nko_workers: "Trabalhadores norte-coreanos"
 BLR_nko_workers_desc: "Estamos prontos para convidar trabalhadores norte-coreanos para o nosso país. Eles são famosos por sua eficiência e dedicação ao trabalho."
 BLR_nko_miiltary_coop: "Cooperação Técnico-Militar com a Coreia do Norte"
 BLR_nko_miiltary_coop_desc: "Estamos prontos para iniciar a cooperação técnico-militar com o Exército Popular da Coreia do Norte."
 BLR_rotation_KGB: "Rotação no KGB"
 BLR_rotation_KGB_desc: "Estamos fazendo rodízio de pessoal, porque agora precisamos de uma organização forte e eficiente."
 BLR_North_Korea_workers: "Trabalhadores da Coreia do Norte"
 BLR_SMERSH_2: "SMERSH 2.0"
 BLR_SMERSH_2_desc: "Vamos reativar a SMERSH. É hora de usar a experiência soviética em benefício da nação."
 BLR_arest_silovic: "Prisão das Forças de Segurança"
 BLR_arest_silovic_desc: "Muitos membros das forças de segurança discordaram do novo governo, é hora de expurgá-los."
 BLR_antigay_propaganda_laws: "Leis Contra Propaganda Anti-gay"
 BLR_antigay_propaganda_laws_desc: "It is time to legally prohibit LGBT propaganda in our country."
 BLR_clean_soc_net: "Limpar as Redes Sociais"
 BLR_clean_soc_net_desc: "Vamos limpar todas as redes sociais, não permitiremos a disseminação de propaganda inimiga."
 BLR_pioneria: "Pioneria"
 BLR_pioneria_desc: "Os jovens não devem ficar ociosos, por isso vamos reativar os Jovens Pioneiros."
 BLR_Marks_school: "Marxismo nas Escolas"
 BLR_Marks_school_desc: "O currículo escolar incluirá necessariamente educação marxista."
 BLR_free_education: "Educação Gratuita"
 BLR_free_education_desc: "A educação deve ser gratuita e acessível a todos os cidadãos do nosso glorioso país."
 BLR_state_atheism: "Ateísmo Estatal"
 BLR_state_atheism_desc: "Religion is the opium of the people, and it is time to fight its influence."
 BLR_collectivism: "Coletivismo"
 BLR_collectivism_desc: "Collectivization has worked before, so we will repeat the experience."
 BLR_fight_international_capitalists: "Luta Contra Capitalistas Internacionais"
 BLR_fight_international_capitalists_desc: "Os oligarcas são uma classe perigosa e corrupta, não melhores que os kulaks da época soviética. Desde a dissolução da URSS, os oligarcas russos e bielorrussos têm absorvido cada vez mais influência econômica e expulsado trabalhadores bielorrussos de seus empregos em favor de um modelo econômico globalizado, impulsionado por empresas estrangeiras. Para reviver o verdadeiro socialismo, é fundamental, antes de tudo, expulsar a classe capitalista internacional."
 BLR_weaken_the_banks: "Enfraquecer os Bancos"
 BLR_weaken_the_banks_desc: "Os bancos são a guarda pretoriana do capitalismo, carregando sua bandeira para o combate e defendendo seus lucros com sua própria existência. Eles se intrometem em áreas pobres do mundo, abusam da classe trabalhadora com a especulação salarial e de juros, e influenciam a política com doações legais e ilegais. Os bancos devem voltar a um estado em que sejam meros credores de curto prazo apolíticos."
 BLR_ultimate_tax_reform: "Grande Reforma Tributária"
 BLR_ultimate_tax_reform_desc: "Pretendemos realizar uma grande reforma tributária, que aliviará a carga tributária para as pessoas comuns, mas para as empresas será o oposto."
 BLR_single_party: "Partido Único"
 BLR_single_party_desc: "Deveria haver apenas um partido, porque só temos um caminho para o socialismo."
 BLR_nationalize_foreign_business: "Nacionalizar Empresas Estrangeiras"
 BLR_nationalize_foreign_business_desc: "As instalações industriais pertencentes a estrangeiros representam sempre um risco para a segurança económica. Com países estrangeiros a ameaçarem-nos com sanções económicas, existe sempre a preocupação de que os proprietários industriais abandonem o país de repente, levando consigo partes vitais das suas instalações. Para evitar isso, precisamos de reivindicar estas indústrias para o Estado – mesmo que isso ofenda outras nações."
 BLR_five_year_plan: "Primeiro Plano Quinquenal"
 BLR_five_year_plan_desc: "The free economic models of Western states offer no future for a socialist country. A return to a planned economy, preferably in the form of classical Soviet-style Five-Year Plans, will give the government great influence over the previously unchecked economy."
 BLR_reestablish_the_military_industrial_complex: "Restabelecer o Complexo Industrial-Militar"
 BLR_reestablish_the_military_industrial_complex_desc: "O Exército e o Povo São Um!"
 BLR_mobilize_the_masses: "Mobilizar as Massas"
 BLR_mobilize_the_masses_desc: "Nosso exército precisa de pessoas para defender os interesses de nosso país onde quer que o partido exija."
 BLR_better_roads: "Melhoria Geral das Estradas"
 BLR_better_roads_desc: "É necessário lidar de perto com o problema das estradas em nosso país."
 BLR_progress_cult: "Culto ao Progresso"
 BLR_progress_cult_desc: "Os socialistas desejam o progresso social e científico. Este último é especialmente importante no século XXI, não apenas para fins de segurança nacional, mas também para disseminar a revolução e cumprir a agenda socialista, que só pode ser plenamente alcançada se a ciência e a tecnologia avançarem até certo ponto."
 BLR_soviet_academy_of_sciences: "Academia de Ciências Soviética"
 BLR_soviet_academy_of_sciences_desc: "A Academia Soviética de Ciências era a principal instituição científica da União Soviética. Nossas mentes mais brilhantes e talentosas trabalharão incansavelmente aqui mais uma vez para alcançar avanços tecnológicos e científicos que um dia nos tornarão a inveja do mundo capitalista!"
 BLR_the_culture_of_proletarianism: "Cultura do Proletariado"
 BLR_the_culture_of_proletarianism_desc: "It is time to cultivate a proletarian culture for the working class, with which we will move together toward a common, beautiful communist future."
 BLR_empower_the_kgb: "Expandir a Influência da KGB"
 BLR_empower_the_kgb_desc: "Pretendemos expandir a influência da KGB em nosso país para que o inimigo não possa minar nosso sistema interno. Portanto, concederemos ainda mais poderes para conduzir nossas atividades."
 BLR_erase_nationalist: "Colocar todos os nacionalistas na prisão"
 BLR_erase_nationalist_desc: "It is time to eliminate nationalist cells in our country."
 BLR_the_litbel_start: "Revitalização de Litbel"
 BLR_the_litbel_start_desc: "A Lituânia é uma república soviética que surgiu por um curto período durante a Guerra Civil Russa. A perspectiva de unir forças com nossos irmãos lituanos nos parece muito tentadora."
 BLR_peaceful_litbel: "Litbel sem guerra"
 BLR_peaceful_litbel_desc: "Preparamos tudo o que é necessário. Todos os agentes, todos os cidadãos alistados e políticos estão em seus postos. É hora de libertar a Lituânia da ocupação do governo fantoche."
 BLR_the_litbel: "Estado de Duas Nações"
 BLR_the_litbel_desc: "Chegou a hora de nos tornarmos um único país de dois povos: o bielorrusso e o lituano."
 BLR_dissolve_monasteries: "Dissolução de Mosteiros"
 BLR_dissolve_monasteries_desc: "Vamos purificar nosso país da religião completamente!"
 BLR_support_of_the_worker: "Apoio aos Trabalhadores"
 BLR_support_of_the_worker_desc: "The working class is our support and strength. We will always support them in the fight against the capitalist contagion!"
 BLR_litbel_attack_lat: "Latgale Bielorrussa"
 BLR_litbel_attack_lat_desc: "The lands of Latgale have long been torn away from us by Latvia. It is time to end this injustice."
 BLR_litbel_annex_lat: "O Fim do Estado Letão"
 BLR_litbel_annex_lat_desc: "As terras da Latgália são nossas novamente."
 BLR_presidential_election_of_2001: "A Esfera Política"
 BLR_presidential_election_of_2001_desc: "Chegou a hora de decidir quem liderará nosso país no novo milênio."
 BLR_Andrey_sannikov: "Caminho da Democracia Ocidental"
 BLR_Andrey_sannikov_desc: "Nosso país elegeu um novo líder. Agora ele nos conduzirá a um futuro democrático brilhante."
 BLR_Join_GUAM: "Junte-se ao GUAM"
 BLR_Join_GUAM_desc: "We will strengthen our ties in the post-Soviet space by joining GUAM."
 BLR_American_Protection: "Proteção Americana"
 BLR_American_Protection_desc: "We need America's help, because Russia is unlikely to ignore our actions."
 BLR_Linking_foreign_currency: "Vincular Nossa Moeda ao Euro"
 BLR_Linking_foreign_currency_desc: "The instability of our currency must be eliminated. We will bind our currency to the Euro."
 BLR_closed_border_with_Russia: "Fechamento da Fronteira com a Rússia"
 BLR_closed_border_with_Russia_desc: "We are putting up border posts with Russia again. No one from Russian territory will be able to move freely into our country."
 BLR_NATO_Membership_Campaign: "Campanha de Adesão à NATO"
 BLR_NATO_Membership_Campaign_desc: "It is time to start a campaign to prepare for joining NATO."
 BLR_USA_military_Cooperation: "Cooperação Militar com os EUA"
 BLR_USA_military_Cooperation_desc: "Cooperation with the United States in the military-technical sphere promises us significant advantages."
 BLR_Invite_NATO_advisors: "Convidar Assessores Militares da NATO"
 BLR_Invite_NATO_advisors_desc: "Now that we have completely reformed our military command, we will invite NATO military advisers."
 BLR_USAD_request: "Solicitar Assistência da USAID"
 BLR_USAD_request_desc: "We have decided to contact USAID for support."
 BLR_Military_Exercises_NATO: "Exercícios Militares com a NATO"
 BLR_Military_Exercises_NATO_desc: "Our army will hold its first joint exercises with NATO."
 BLR_NATO_integration_command: "Comando de Integração da NATO"
 BLR_NATO_integration_command_desc: "The NATO Integration Command is our next step towards joining the Alliance."
 BLR_Request_NATO_membership: "Solicitar a Adesão à NATO"
 BLR_Request_NATO_membership_desc: "It is time to apply for NATO membership."
 BLR_western_diplomats: "Diplomatas Ocidentais"
 BLR_western_diplomats_desc: "Diplomats from Western countries visited us and congratulated us on the victory we had achieved. Now Belarus can choose the path toward the West."
 BLR_denied_sanctions: "Suspensão das Sanções"
 BLR_denied_sanctions_desc: "Now that we have held legitimate elections, all sanctions against us will be lifted."
 BLR_people_rights: "Direitos Humanos"
 BLR_people_rights_desc: "We must respect the rights and freedoms of our people."
 BLR_Freedom_Meetings: "Liberdade de Reunião e Associação"
 BLR_Freedom_Meetings_desc: "The right to meetings and assemblies must be secured."
 BLR_dont_torture: "Reforma de Saúde"
 BLR_dont_torture_desc: "Quality healthcare is one of the most basic needs of our citizens. By delivering it, we will be able to build a better country."
 BLR_EU_integration: "Integração na UE"
 BLR_EU_integration_desc: "We intend to integrate into the European Union."
 BLR_Attract_European_investments: "Atrair Investimentos Europeus"
 BLR_Attract_European_investments_desc: "We are ready to attract European investors to improve our economy."
 BLR_Opening_garment: "Abertura de Fábricas de Roupas para Marcas Populares"
 BLR_Opening_garment_desc: "We are ready to establish the production of clothing for popular brands on the territory of our country."
 BLR_simplification_labor_code: "Simplificação do Código de Trabalho"
 BLR_simplification_labor_code_desc: "It is necessary to change the norms of labor legislation so that employees cannot constantly resort to trade unions instead of working."
 BLR_Encourage_Exchange_Students_desc: "Our students are ready to participate in an exchange program with European counterparts."
 BLR_Adopt_EU_Intellectual: "Adotar Leis de Propriedade Intelectual da UE"
 BLR_Adopt_EU_Intellectual_desc: "As leis de propriedade intelectual da UE precisam ser adotadas para cumprir os padrões europeus nessa área."
 BLR_Digitalization: "Digitalização"
 BLR_Digitalization_desc: "It is necessary to digitize production processes to improve their quality."
 BLR_political_platforms: "Criação de Plataformas Políticas para Empresas Estrangeiras"
 BLR_political_platforms_desc: "Perhaps we should allow foreign companies access to our political platforms?"
 BLR_Custom_Institutional_reforms: "Biocombustível"
 BLR_Custom_Institutional_reforms_desc: "Fontes alternativas de combustível podem nos ajudar a reduzir nossa dependência de países com os quais não gostaríamos de ter laços amigáveis."
 BLR_Market_Economy: "Economia de Mercado Funcional"
 BLR_Market_Economy_desc: "A full-fledged market economy is what we have been striving for, and it is what should function in a European and democratic country."
 BLR_Delete_KGB2: "Dissolver o KGB"
 BLR_Delete_KGB2_desc: "Substituiremos o KGB por uma nova estrutura - o Serviço de Segurança Nacional. Esta organização será recrutada entre funcionários leais aos nossos ideais ocidentais."
 BLR_US_money: "Investimentos Americanos"
 BLR_US_money_desc: "We need money to further build democracy in our country."
 BLR_join_wto: "Adesão à OMC"
 BLR_join_wto_desc: "Joining the WTO will give us many advantages and access to international markets."
 BLR_release_political_prisoners: "Libertar Prisioneiros Políticos"
 BLR_release_political_prisoners_desc: "Many people were imprisoned for political reasons under the previous government. We will fix this."
 BLR_baltic_economic_cooperation: "Parceria Comercial com os Estados Bálticos"
 BLR_baltic_economic_cooperation_desc: "Our nearest neighbors are excellent trading partners. Their coastal location and common borders give us strong reasons to improve our trade performance."
 BLR_root_out_nationalists: "Eliminar os Nacionalistas"
 BLR_root_out_nationalists_desc: "Nationalists have always been a problem in our country. They will only lead to instability, and it is time to deal with them."
 BLR_decommunize_belarus_society: "Descomunização da Sociedade Bielorrussa"
 BLR_decommunize_belarus_society_desc: "The Soviet legacy must be left behind. The time has come to embrace the progressive West."
 BLR_fight_the_oligarchs: "Luta Contra os Oligarcas"
 BLR_fight_the_oligarchs_desc: "We cannot allow oligarchs to hold power in our country, or we will definitely not see economic growth."
 BLR_European_university_connections: "Educação Europeia"
 BLR_European_university_connections_desc: "We are ready to welcome European universities into our country to improve the quality of education for our students."
 BLR_LGBT_Belarus_quest: "Questão LGBT na Bielorrússia"
 BLR_LGBT_Belarus_quest_desc: "A questão LGBT foi colocada na agenda pelo nosso governo, porque não podemos ignorar essa tendência. O que faremos?"
 BLR_Offshore_heaven: "Benefícios Fiscais para Investidores Estrangeiros"
 BLR_Offshore_heaven_desc: "We will create favorable conditions for investment in our country, which will attract many investors."
 BLR_wind_farms: "Parques Eólicos"
 BLR_wind_farms_desc: "We have built several wind farms in the districts of Minsk."
 BLR_Hajdukiewicz: "§YGaidukevich§!"
 BLR_Hajdukiewicz_desc: "Sergey Vasilyevich Gaidukevich (born September 8, 1954) is a Belarusian politician and public figure, leader of the Liberal Democratic Party of Belarus. He is a reserve colonel known for his pro-Russian orientation. He stands for confederation with Russia and the introduction of a single currency with an issue center in Moscow, as well as for conducting a joint military policy."
 BLR_Spiritual_revival: "Ressurgimento Espiritual de Belarus"
 BLR_Spiritual_revival_desc: "The process of spiritual revival of Belarus should continue. The role of the Orthodox Church and the Roman Catholic Church in society should increase."
 BLR_Ban_Enemies: "Combater Inimigos Internos"
 BLR_Ban_Enemies_desc: "We must completely clear the political field in our country. No destructive parties financed from abroad should interfere with our country's development."
 BLR_Russian_Oligarch: "Amizade com Oligarcas Russos"
 BLR_Russian_Oligarch_desc: "Russian oligarchs command enormous wealth. I think it is worth winning them over."
 BLR_Hardline_EuroScepticism: "Euroceticismo Firme"
 BLR_Hardline_EuroScepticism_desc: "Tough Euroscepticism is necessary, because Europe wants a weak Belarus."
 BLR_Belarusian_nation_law: "Lei Nacional Bielorrussa"
 BLR_Belarusian_nation_law_desc: "Our nation has long earned the right to self-determination. We are a people with a great history and must stride toward a bright future as a sovereign nation."
 BLR_russian_education: "Educação Russa"
 BLR_russian_education_desc: "Our universities should establish ties with Russian ones. This way, we will be able to offer Russian-style education to everyone."
 BLR_Son_will_rule: "Deixe o Filho Governar"
 BLR_Son_will_rule_desc: "It is time to change the leader. Now Sergei Gaidukevich's son will lead the party and the country."
 BLR_rus_media: "Deixe a Mídia Russa Entrar"
 BLR_rus_media_desc: "We will allow Russian media into our territory without restrictions."
 BLR_russian_fsb: "Permitir os Escritórios Representativos do FSB"
 BLR_russian_fsb_desc: "The FSB will work together with our special services and provide us with greater political stability."
 BLR_science_boost: "Investindo em Ciência"
 BLR_science_boost_desc: "Science should be funded as generously as possible from the state budget."
 BLR_support_promka: "Apoio à Indústria Doméstica"
 BLR_support_promka_desc: "We will support the domestic industry."
 BLR_boost_economic: "Acelerar o Crescimento Econômico"
 BLR_boost_economic_desc: "Our reforms are making themselves felt and the economy has started to grow."
 BLR_anti_gibdd: "Política Anti-LGBT"
 BLR_anti_gibdd_desc: "We reject and will fight LGBT propaganda in our country."
 BLR_union_state_course: "Rumo ao Estado da União"
 BLR_union_state_course_desc: "Our goal is the Union State, and we will strive for it."
 BLR_support_army: "Apoio ao Exército"
 BLR_support_army_desc: "We will support the military in our country, because it is thanks to them that our country remains independent."
 BLR_russian_tver: "Compra de Vagões"
 BLR_russian_tver_desc: "We will purchase a large number of wagons from Russia for our railways."
 BLR_russian_teplovzor: "Abertura da Produção de Imagens Térmicas"
 BLR_russian_teplovzor_desc: "We will open the production of thermal imagers, which we will also be able to sell to Russia for use in their armed forces."
 BLR_cyphrovizacia: "Digitalização"
 BLR_cyphrovizacia_desc: "We will begin our journey toward the digital economy."
 BLR_russian_uvz: "Assinar Contratos Exclusivos com UVZ"
 BLR_russian_uvz_desc: "Partnership with this well-known enterprise will bring us significant benefits."
 BLR_all_cyphro: "Digitalização Completa"
 BLR_all_cyphro_desc: "Digitalization of many government processes will help us work more effectively with citizens and the problems that arise."
 BLR_kalash_zavod: "Abertura da Fábrica de Armas Kalashnikov"
 BLR_kalash_zavod_desc: "We will manufacture the products of this famous brand domestically."
 BLR_Union_state_again: "Juntando-se à Rússia"
 BLR_Union_state_again_desc: "We are ready to become part of Russia once again."
 BLR_union_become_one: "A União Se Tornará Uma Só"
 BLR_Lykashenko: "§YLukashenko§!"
 BLR_Lykashenko_desc: "Alexander Grigoryevich Lukashenko (born August 30, 1954) is a Belarusian politician, statesman, and military figure. He has held the post of President of Belarus and Commander-in-Chief of the Armed Forces since July 20, 1994. He is known for his pro-Russian views. In Belarusian and Russian-speaking societies, he is known by the nickname \"Batka\"."
 BLR_GrodnoAzot: "Grodno Azot"
 BLR_GrodnoAzot_desc: "The Khimvolokno Plant branch of Grodno Azot OJSC is a large manufacturer of polyamide and polyester yarns and fibers, as well as polyamide-6 (PA-6) and polymer composite materials based on it. Each of the main types of products is produced in a wide assortment with various physical and mechanical properties and quality indicators, depending on the application."
 BLR_PinskDrev: "Finanças \"PinskDrev\""
 BLR_PinskDrev_desc: "PinskDrev is a large woodworking enterprise in Belarus and the oldest in Pinsk. We should finance their activities so that they can develop further."
 BLR_AirPort_minsk: "Expansão do Aeroporto Internacional"
 BLR_AirPort_minsk_desc: "We are ready to invest significant financial resources in the expansion of Minsk Airport."
 BLR_dai_denyag: "Solicite um empréstimo da Rússia"
 BLR_dai_denyag_desc: "We will ask the Russian government to provide us with a loan."
 BLR_ros_atom: "ROSATOM"
 BLR_ros_atom_desc: "Vamos convidar especialistas da ROSATOM para cooperar no campo da energia nuclear."
 BLR_Impact_kgb: "Impacto do KGB"
 BLR_Impact_kgb_desc: "The KGB uses various methods to eliminate those dissatisfied with the election of a new president."
 BLR_Liquidation_pub_assoc: "Extinção de Associações Públicas"
 BLR_Liquidation_pub_assoc_desc: "The KGB is actively liquidating, or attempting to liquidate, public associations that are objectionable to our president."
 BLR_crackdown_opp_rall: "Repressão às Manifestações da Oposição"
 BLR_crackdown_opp_rall_desc: "We are actively dispersing the rallies of our political opponents who are dissatisfied with the elections."
 BLR_Increased_censorship: "Fortalecer a Censura na Mídia"
 BLR_Increased_censorship_desc: "It is necessary to impose strong censorship on the media so that our opponents cannot agitate against us."
 BLR_concept_national_security_Belarus: "Conceito de Segurança Nacional"
 BLR_concept_national_security_Belarus_desc: "Este Conceito estabelece um conjunto de visões oficiais sobre a essência e o conteúdo das atividades da República da Bielorrússia para garantir o equilíbrio de interesses do indivíduo, da sociedade e do Estado e sua proteção contra ameaças internas e externas."
 BLR_Economic_development_2001_2005: "Programa de Desenvolvimento Socioeconômico"
 BLR_Economic_development_2001_2005_desc: "O programa de desenvolvimento socioeconômico da República da Bielorrússia para 2001-2005, desenvolvido pelo Ministério da Economia da República da Bielorrússia em conjunto com outros ministérios e órgãos da administração estadual republicana, comitês executivos regionais e o Comitê Executivo da Cidade de Minsk com a participação da Academia Nacional de Ciências, o Banco Nacional, institutos de pesquisa especializados e organizações públicas, de acordo com a Lei da República da Bielorrússia \"Sobre a Previsão Estatal e Programas de Desenvolvimento Socioeconômico da República da Bielorrússia\" e resoluções do Conselho de Ministros da República da Bielorrússia de 2 de fevereiro de 2000, Nº 141, e de 10 de agosto de 2000, Nº 1248, sobre o desenvolvimento do Programa de Desenvolvimento Socioeconômico da República da Bielorrússia para 2001-2005."
 BLR_reforms_Belarusian_Railway: "Reformas da Ferrovia Bielorrussa"
 BLR_reforms_Belarusian_Railway_desc: "Our railways are in a very poor state, so we will carry out a set of reforms to improve the situation."
 BLR_new_railway_station: "Novo Terminal Ferroviário de Minsk"
 BLR_new_railway_station_desc: "We have built a new train station in Minsk. Our city will now be able to receive more trains."
 BLR_Electrification_Myslishche_Kryzhovka: "Eletrificação da Ferrovia Myslyshche — Kryzhovka"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "The Myslyshche-Kryzhovka line is one of the highest development priorities in our country, so we will address it first."
 BLR_Baranovichi_Plant: "Fábrica de Peças e Estruturas de Construção de Baranovichi"
 BLR_Baranovichi_Plant_desc: "We are creating a structural division of the Baranovichi Plant of Construction Parts and Structures to improve the supply of parts to our trains."
 BLR_Energy_conflict_over: "Venda da Belgaztrans"
 BLR_Energy_conflict_over_desc: "The conflict is coming to an end. We have agreed to Russia's terms and are ready to sell Belgaztrans. In return, energy prices will be stabilized for us."
 BLR_new_rolling_stock: "Compra de Novos Vagões"
 BLR_new_rolling_stock_desc: "By purchasing new rolling stock, we will eliminate the main problem plaguing our railways."
 BLR_promise_first_nuclear: "A Promessa de Construir uma Usina Nuclear"
 BLR_promise_first_nuclear_desc: "We promise all our citizens that a nuclear power plant will be built on the territory of our country, thereby ensuring our energy security."
 BLR_New_Land_code: "Novo Código de Terras"
 BLR_New_Land_code_desc: "The new Land Code significantly simplifies the purchase of land by private owners and companies, which will clearly appeal to a certain segment of the population."
 BLR_Zubr_Energy_LLC: "Abertura da Zubr Energy LLC"
 BLR_Zubr_Energy_LLC_desc: "Fábrica para a produção de baterias de arranque para entrega às linhas de montagem de fabricantes de automóveis mundiais e nacionais."
 BLR_Hi_Tech_Park: "Parque de Alta Tecnologia"
 BLR_Hi_Tech_Park_desc: "Hi-Tech Park is a special tax and legal regime for the development of IT business in Belarus. It is not a free (special, special) economic zone, but it is a jurisdiction that operates on the principle of extraterritoriality. Companies and individual entrepreneurs registered in the Park can use the preferences provided to them regardless of the location of their Belarusian office."
 BLR_Referendum_Belarus_2004: "Referendo na Bielorrússia em 2004"
 BLR_Referendum_Belarus_2004_desc: "Em 17 de outubro de 2004, a Bielorrússia sediou o terceiro referendo republicano iniciado pelo Presidente Lukashenko na história da Bielorrússia independente. O referendo foi marcado pelo Decreto Presidencial Nº 431 de 7 de setembro de 2004 e foi combinado com as eleições parlamentares."
 BLR_Energy_conflict: "Conflito Energético Russo-Bielorrusso"
 BLR_Energy_conflict_desc: "O conflito começou em dezembro de 2006, quando a Gazprom anunciou a versão final do preço do gás natural para a República da Bielorrússia no valor de $ 105 por 1000 m³. Além disso, $75 são pagos em dinheiro, e a Bielorrússia teria o direito de pagar os 30 restantes com ações da Beltransgaz, que foram avaliadas em $ 5 bilhões."
 BLR_Decree_n3: "Decreto sobre Parasitismo"
 BLR_Decree_n3_desc: "No one will sit on state benefits any longer. It is time to make all the idle work."
 BLR_launch_own_satellite: "Lançamento do Próprio Satélite da Bielorrússia"
 BLR_launch_own_satellite_desc: "O satélite bielorrusso de sensoriamento remoto da Terra foi lançado em 22 de julho de 2012 a partir do Cosmódromo de Baikonur, no Cazaquistão - em um conjunto de cinco espaçonaves: junto com o russo Canopus-V e MKA-FKI (Zond-PP), o alemão TET-1 e o canadense ADS-1B."
 BLR_gasification_country: "Conclusão da Gasificação do País"
 BLR_gasification_country_desc: "We will complete the gasification of our country, which our citizens will surely appreciate."
 BLR_CJSC_Turkcell: "Acordo com a Turkcell"
 BLR_CJSC_Turkcell_desc: "An important deal will be made between us and our Turkish partners — the sale of a controlling stake in CJSC \"BeST\" to Turkcell. This will open another avenue for investment in our country."
 BLR_Anti_Corruption: "Campanha Anti Corrupção"
 BLR_Anti_Corruption_desc: "We must defeat corruption in our country. The main thing is not to end up implicated yourself."
 BLR_Punish_Shushkevich: "Punish Shushkevich's Cronies"
 BLR_Punish_Shushkevich_desc: "Shushkevich left us a legacy in the form of his loyalists in the government. It is time to get rid of them."
 BLR_State_Run_Capitalism: "Capitalismo Estatal"
 BLR_State_Run_Capitalism_desc: "The state should completely control the economic policy of the country."
 BLR_reform_officers: "Abrir Novas Escolas de Oficiais"
 BLR_reform_officers_desc: "One of the priorities of our military reforms is to improve officer education."
 BLR_peace_rota: "Criar uma Companhia de Manutenção da Paz"
 BLR_peace_rota_desc: "We will create a special unit to participate in peacekeeping missions."
 BLR_Promote_new_officers: "Promover Novos Oficiais"
 BLR_Promote_new_officers_desc: "We will complete a set of measures for the transformation of our armed forces, which began in 1994."
 BLR_Internet_cencorship: "Censura na Internet"
 BLR_Internet_cencorship_desc: "The Internet has become a platform where sentiments aimed at overthrowing the government are openly discussed. It is necessary to control this."
 BLR_kgb: "KGB"
 BLR_Batka_policy: "Censura na Internet"
 BLR_Batka_policy1: "Decreto sobre Parasitismo"
 BLR_Batka_policy2: "Política da Internet da Bielorrússia"
 BLR_Batka_policy3: "Política da Internet da Bielorrússia"
 BLR_Raiffeisen2: "Raiffeisen na Bielorrússia"
 BLR_Raiffeisen2_desc: "Established in 1989, Priorbank has been a subsidiary of RBI since 2003. It is one of the largest local private banks and one of the country's leading financial institutions in terms of efficiency and profitability. As a universal bank, it services corporate customers, small and medium-sized enterprises as well as private individuals."
 BLR_Henkel2: "Henkel"
 BLR_Henkel2_desc: "A divisão de produtos químicos para construção da Henkel Concern na Belarus, Henkel Bautechnik LLC, foi fundada em 2004 com o objetivo de organizar a produção de produtos substitutivos às importações. Em 2005, começou a construção de uma fábrica para a produção de misturas de construção Ceresit em Zaslavl, e a produção foi lançada em setembro de 2006. A linha de produtos da empresa inclui mais de 100 itens, incluindo revestimentos prontos, sistemas de isolamento térmico e acabamento de fachadas, sistemas de piso e impermeabilização, materiais para preparação de superfície para acabamento, selantes, espuma de montagem, \"colas líquidas\", gessos."
 BLR_Jeans_Revolution: "Revolução Jeans"
 BLR_Jeans_Revolution_desc: "A mass protest rally in the center of Minsk and other cities of Belarus, which began on March 19, 2006 in response to the falsifications of the authorities in the presidential elections that took place earlier."
 BLR_reform_kolhoz: "Reformas nas Fazendas Coletivas"
 BLR_reform_kolhoz_desc: "It is necessary to reform collective farms to ensure the stability of our agro-industry."
 BLR_Eastern_Partnership: "Parceria Oriental"
 BLR_Eastern_Partnership_desc: "The Eastern Partnership is a project of the European Union, with the main stated goal of developing integration ties of the European Union with six countries of the former USSR: Azerbaijan, Armenia, Belarus, Georgia, Moldova and Ukraine."
 BLR_Azarenok_case: "Caso de Igor Azarenok"
 BLR_Azarenok_case_desc: "General Azarenok was suspected of lobbying for Russian interests in the Republic of Belarus through bribes and other frauds. Should we pay attention to this?"
 BLR_National_Library: "Novo Prédio da Biblioteca Nacional"
 BLR_National_Library_desc: "O novo prédio da Biblioteca Nacional da Belarus, na construção do qual todo o país participou, foi aberto aos usuários em 16 de junho de 2006."
 BLR_delta_city: "Centro de Negócios 'Delta City'"
 BLR_delta_city_desc: "During the National Exhibition of Serbia in Minsk, a major contract was signed for the construction of the Delta City business center and the development of the territory near the National Library with a total investment of several billion euros (the developer is Dana Holdings, owned by Serbian businessmen)."
 BLR_Kal: "Trader Conjunto de Potássio"
 BLR_Kal_desc: "We will propose to Russia the creation of a joint stock company that will be our common potassium trader."
 BLR_Kal2: "Encerrar Comércio Conjunto Com Potássio"
 BLR_Kal2_desc: "Recent criminal cases initiated by us against employees of the Russian company Uralkali, as well as abuses of authority on their part, have forced us to close the joint trader and create our own."
 BLR_BRSM_desc: "A União da Juventude Republicana Bielorrussa é uma associação pública juvenil na República da Bielorrússia. É a maior associação juvenil do país e é apoiada por Alexander Lukashenko. Suas atividades são financiadas pelo estado."
 BLR_Potato_Empire: "Império da Batata"
 BLR_Potato_Empire_desc: "We are one of the top potato exporters in the world. Our country should be proud of this."
 BLR_Factory_Kommunarka: "Nacionalizar a Fábrica Kommunarka"
 BLR_Factory_Kommunarka_desc: "Our President believes that the privatization of the Confectionery Factory \"Kommunarka\" was illegal, so the nationalization of this enterprise has been announced."
 BLR_Another_year: "Outro Ano de Independência"
 BLR_Another_year_desc: "Belarus will continue to follow its independent policy."
 BLR_Migrant_crisis: "A Crise Migratória"
 BLR_Migrant_crisis_desc: "A crise migratória na fronteira da Bielorrússia surgiu devido ao influxo de migrantes ilegais, principalmente do Iraque e da Síria, em menor medida do Afeganistão e em menor medida de países africanos (segundo estatísticas do Serviço de Fronteiras Polonês) tentando entrar em países da UE (Lituânia, Letônia, Polônia)."
 BLR_gudermes: "Enviar OMON para Treinar em Gudermes Checheno"
 BLR_gudermes_desc: "Devemos dar uma olhada nesta famosa universidade de Forças Especiais. Talvez nossos combatentes consigam melhorar suas habilidades."
 BLR_Another_Elections: "E Novamente Eleições"
 BLR_Another_Elections_desc: "The next elections in our country are just around the corner. Who will win?"
 BLR_Bye_opposition: "Sem Misericórdia para a Oposição"
 BLR_Bye_opposition_desc: "We do what we always do — we deal with the opposition hard and fast."
 BLR_Milk_war: "Guerras do Leite"
 BLR_Milk_war_desc: "A series of deteriorations in relations between Belarus and Russia, stemming from disputes over the export of dairy products to Russia."
 BLR_jeans_revolution: "Revolução dos Jeans"
 BLR_jeans_revolution_desc: "The people are dissatisfied with the upcoming elections. They allegedly do not believe in the victory of Alexander Lukashenko. What will happen next?"
 BLR_Changes_Customs_policy: "Mudança na Política Aduaneira"
 BLR_Changes_Customs_policy_desc: "New changes and strictures have been introduced to complicate the import of counterfeit products into our country."
 BLR_whitelegion_case: "Caso da Legião Branca"
 BLR_whitelegion_case_desc: "Our special services have reported on the great activity of representatives of the White Legion. It is necessary to catch them and put them in prison."
 BLR_PolBel_Dplomatic_war: "Guerra Diplomática Polaco-Bielorrussa"
 BLR_PolBel_Dplomatic_war_desc: "Despite the warming of relations, the conflict with Poland is rekindling with its former strength."
 BLR_project_bombel: "Projeto BOMBEL"
 BLR_project_bombel_desc: "The European Union has allocated funds to strengthen the border between Belarus and the EU against the influx of illegal migrants. Our business is deciding how to use these funds."
 BLR_Investing_Agro_industry: "Investimentos na Agroindústria"
 BLR_Investing_Agro_industry_desc: "The agro-industry is an important component of our country's economy, and we will continue to increase investments in this sector."
 BLR_fate_belarusian_church: "O Destino da Igreja Bielorrussa"
 BLR_fate_belarusian_church_desc: "We should decide which way our church will go."
 BLR_Pension_reform: "Reforma da Previdência"
 BLR_Pension_reform_desc: "It is time to carry out pension reform and raise the retirement age."
 BLR_New_concept_security: "Novo Conceito de Segurança Nacional"
 BLR_New_concept_security_desc: "Our defensive concept needs to be updated, and we will make the necessary changes to our law."
 BLR_Zimbabwe: "Viagem ao Zimbábue"
 BLR_Zimbabwe_desc: "We will visit Zimbabwe to conclude contracts for the supply of our products."
 BLR_100dney: "100 Ideias Para Belarus"
 BLR_100dney_desc: "The project \"100 Ideas for Belarus\", aimed at identifying gifted and talented youth, developing their scientific activities and promoting promising innovative developments."
 BLR_stroiotryad: "Reviver Brigada de Construção Estudantil"
 BLR_stroiotryad_desc: "We will revive the practice of Student Construction Brigades from the Soviet era. As an incentive, we will exempt them from taxes."
 BLR_People_Militia: "Creation of People's Militia"
 BLR_People_Militia_desc: "We are ready to adopt a law on the creation of a people's militia, which will be a kind of reserve for Territorial defense. In each village there should be a trained group of people to counter the enemy, with subsequent transformation into a partisan movement."
 BLR_Excursion_Warsaw: "Excursão a Varsóvia"
 BLR_Excursion_Warsaw_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Warsaw. We can help them organize it. A border crossing from our territory is theoretically possible, but will Poland declare war on us afterwards?"
 BLR_azarenok_tv: "Novo Propagandista de Lukashenko"
 BLR_azarenok_tv_desc: "Now on television you can often see a new propagandist who broadcasts on behalf of our party and convinces the people of the correctness of our actions."
 BLR_Wagner_arrest: "Situation With PMCs Wagner"
 BLR_Wagner_arrest_desc: "Our special services have arrested fighters from the famous Russian PMC Wagner. We must decide what to do with them."
 BLR_decree_227: "Decreto Nº 227 'Sobre a prestação de serviços de segurança'"
 BLR_decree_227_desc: "O novo decreto número 227 causou um grande alvoroço em muitos meios de comunicação. Pela primeira vez, permitimos que uma empresa privada aceitasse armas para a proteção de instalações. Isso realmente vai levar a algo?"
 BLR_Country_for_life: "País para a Vida"
 BLR_Country_for_life_desc: "Our government has decided to deal with the opposition more cunningly, luring its prominent figures to our side. One of them is Sergey Tikhanovsky, organizer of the \"Country for Life\" project. After the events that followed, rather than arresting him, we publicly invited him into the government, where he could help improve our country. The opposition itself will be divided by such a move."
 BLR_Amendment_to_Constitution: "Mudanças Sérias na Constituição"
 BLR_Amendment_to_Constitution_desc: "Our permanent leader, Alexander Lukashenko, has recognized that the country needs radical changes and that it is time to move away from sole presidential power. A referendum on changing the constitution has been announced, under which power will mostly belong to the parliament."
 BLR_army_on_streets_of_cities: "Protestos em Massa"
 BLR_army_on_streets_of_cities_desc: "The people have rebelled against us. They believe that our government is falsifying election results and ruining the country. I hope we have prepared well for such events."
 BLR_anti_lgbtqa_stance: "Política Anti-LGBT"
 BLR_Pazniak: "§YNacionalistas Bielorrussos§!"
 BLR_Pazniak_desc: "Nationalist forces have seized power in the country. Where will they lead Belarus — toward a brighter future, or toward the country's collapse?"
 BLR_rofeign_legion: "A Legião Estrangeira"
 BLR_rofeign_legion_desc: "We will draw from the experience of the French and create our own foreign legion."
 BLR_debur: "Desburocratização"
 BLR_debur_desc: "We will reduce expenditure on officials and cut their numbers, and the freed funds will go to the benefit of the people."
 BLR_patriotism_desc: "It is time to raise the level of patriotic education in our country."
 BLR_Belarusisation: "Belarusização"
 BLR_Belarusisation_desc: "All literature and all official titles must be in Belarusian."
 BLR_Democratic_clean: "Purificação dos Democratas"
 BLR_Democratic_clean_desc: "We are not going to become servants of the West. It is time to purge our country of democrats."
 BLR_Communistst_clean: "Purificação dos Comunistas"
 BLR_Communistst_clean_desc: "The legacy of the USSR must be destroyed. It is time to drive out these adherents of the red contagion."
 BLR_denied_rus_language: "Negar a Língua Russa"
 BLR_denied_rus_language_desc: "Russian will no longer be the second state language. We have had enough of the Russian occupation."
 BLR_anti_immigration_policies: "Políticas Anti-Imigração"
 BLR_anti_immigration_policies_desc: "Implementing stricter anti-immigration policies will keep the Belarusian identity alive and well."
 BLR_russofobia: "Política Anti-Russa"
 BLR_russofobia_desc: "It is time to deal with the common enemy — Russia. It is time to tame its imperialist ambitions toward us."
 BLR_decolectivisation: "Descoletivização"
 BLR_decolectivisation_desc: "It is time to get rid of the Soviet legacy and assist the population in moving to the cities."
 BLR_litvins_past: "Passado dos Litvinos"
 BLR_litvins_past_desc: "A história não pode ser mudada, e nós sabemos disso. Nós, Litvin, somos orgulhosos herdeiros do Grão-Ducado da Lituânia."
 BLR_constitution_from_1994: "Constituição de 1994"
 BLR_constitution_from_1994_desc: "It is time to restore a proper constitution in our country."
 BLR_We_not_energy_slave: "Não Somos Escravos dos Recursos Russos"
 BLR_We_not_energy_slave_desc: "Russia gave discounts only to support its puppet regime. That is enough. We are ready to build a strong economy without those discounts."
 BLR_Influence_nationalists: "Influência de Nacionalistas"
 BLR_Influence_nationalists_desc: "We must actively support nationalist movements in neighboring countries."
 BLR_Territorial_claims: "Reivindicações Territoriais"
 BLR_Territorial_claims_desc: "Our country must return to its true borders."
 BLR_white_legion_desc: "The White Legion is a sports and patriotic organization of Belarus, founded in 1995 for pre-conscription training and patriotic education of young people."
 BLR_white_legion_battalion: "Batalhão da Legião Branca"
 BLR_white_legion_battalion_desc: "The first battalion of the White Legion has finally been formed. True patriots of their country are ready to fight for its freedom and strength."
 BLR_GDL: "Grão-Ducado da Lituânia"
 BLR_GDL_desc: "It is time to restore the great state of the Litvinov people. Finally, our people will not be under the yoke of a superpower; they will have the opportunity to become a superpower themselves."
 BLR_help_silesians: "Ajude os separatistas da Silésia."
 BLR_help_silesians_desc: "Divide and rule is the main principle we will apply in our policy toward Poland. When the active phase of bringing the Poles under our control begins, the Silesians may help facilitate our conquest of that country."
 BLR_revansh_return: "Reviver o Praviy Revansh"
 BLR_revansh_return_desc: "The Praviy Revansh was a nationalist organization of the 1990s that professed anti-Polish and anti-Russian rhetoric, and argued for the creation of paramilitary organizations modeled on Ukrainian ones."
 BLR_blackcat: "Reviver o Gato Preto"
 BLR_blackcat_desc: "The Black Cat was a large partisan organization that operated on Belarusian territory for forty years, fighting for independence against the Soviet government. Their methods will serve us well in defending against enemy invasions."
 BLR_lith_again: "De Volta a Zemaitija"
 BLR_lith_again_desc: "The time has come to complete the reconstruction of our mighty state. A small and weak Lithuania stands in our way; we will break it. But we cannot attack the country without justification; we must create the necessary conditions and a pretext so that our invasion does not appear groundless."
 BLR_true_political_and_national_freedom: "Verdadeira Liberdade Política"
 BLR_true_political_and_national_freedom_desc: "True political freedom begins with recovering from the devastation caused by our internal purges. It is time to move forward and attain what our people truly desire."
 BLR_Taler_ruble: "Taler Bielo-Russo"
 BLR_Taler_ruble_desc: "We must abandon the ruble entirely, replacing it with our new currency."
 BLR_National_science: "Crescimento Científico e Econômico"
 BLR_National_science_desc: "We will begin developing our own science and economy as an independent state."
 BLR_create_nationalsecurity: "Criar Novos Departamentos"
 BLR_create_nationalsecurity_desc: "Instead of the KGB, a legacy of the USSR, we will create two new structures: the National Security Service and the National Intelligence Service."
 BLR_Delete_KGB: "Dissolver o KGB"
 BLR_Delete_KGB_desc: "The KGB should be dissolved and replaced by a new structure."
 BLR_Reform_Police: "Reforma da Polícia"
 BLR_Reform_Police_desc: "The Soviet militia was a relic of the past that we want to get rid of. We are reorganizing it into a national police force modeled on that of Poland."
 BLR_attack_russian_bear: "Eliminar o Urso Russo"
 BLR_attack_russian_bear_desc: "Finally, our main enemy will be destroyed."
 BLR_zmagar_army: "Reforma do Exército"
 BLR_zmagar_army_desc: "Our army needs urgent reform. While we were busy with the socio-political transformation of our country, our armed forces were seriously weakened."
 BLR_Young_Front_desc: "The Young Front is an international youth movement of Belarusian youth and a youth opposition organization of Belarus."
 BLR_south_river_battalion: "Batalhão do Rio Sul"
 BLR_south_river_battalion_desc: "Um batalhão formado por residentes dos EUA do Condado de South River."
 BLR_territorial_reform: "Reforma Territorial"
 BLR_territorial_reform_desc: "Em vez das seis regiões e 110 distritos atuais, Zenon Poznyak e a equipe de autores do programa propõem dividir o país em 16 voivodatos, mais Minsk separadamente. Os voivodatos, por sua vez, serão divididos em 60 províncias e 270 cidades antigas."
 BLR_anti_lgbt: "Proibição da Propaganda de Relações Perversas"
 BLR_anti_lgbt_desc: "Estamos adotando uma lei sobre a prioridade e proteção da família, do casamento (união de um homem e uma mulher), da maternidade, sobre a proteção da família contra invasões e interferências em assuntos familiares por ideologia e organizações. Além disso, propõe-se adotar uma lei 'sobre a proteção da natureza humana' e proibir a propaganda de relações perversas contra a natureza natural do homem."
 BLR_latgale_or_war: "Latgale ou Guerra"
 BLR_latgale_or_war_desc: "Latgale was once part of the Grand Duchy of Lithuania. The time has come to return these lands to our state. Latvia is unlikely to be able to resist us."
 BLR_legacy_kurland: "Legado do Ducado de Curlândia"
 BLR_legacy_kurland_desc: "The Duchy of Courland once reached out in the race of colonization. The flag of the Duchy once flew over Trinidad and Tobago and along the coast of Gambia. As the rightful successors of the Duchy, the time has come to seek the return of these territories to our empire and bring these former colonial holdings back into the fold."
 BLR_pro_poland_propoganda: "Pro-Belarusian Propaganda in Poland"
 BLR_pro_poland_propoganda_desc: "We must increase our influence in Poland through propaganda and other means of interaction."
 BLR_Dismiss_soviet_officers: "Dismiss Pro-Soviet Officers"
 BLR_Dismiss_soviet_officers_desc: "The fight against the Soviet legacy should also extend to the army. We do not need generals who sympathize with that bloody regime."
 BLR_Anti_corruption_law: "Lei Anticorrupção"
 BLR_Anti_corruption_law_desc: "We will fight corruption in all its manifestations."
 BLR_open_border_with_pol: "Abrir Fronteiras"
 BLR_open_border_with_pol_desc: "A abertura de fronteiras ajudará nossos povos a se sentirem conectados não apenas economicamente, mas também fisicamente."
 BLR_training_for_pol: "Exercícios Militares Conjuntos"
 BLR_training_for_pol_desc: "Our armies need combat coordination. Joint military exercises will help greatly with this."
 BLR_Asseco_Poland: "Asseco Polónia"
 BLR_Asseco_Poland_desc: "We will buy out this company and make it the property of our future state of Belarusians and Poles."
 BLR_ynia_Poland: "A Segunda União de Lublin"
 BLR_ynia_Poland_desc: "It is time to remember how humiliating the Union of Lublin was for the Grand Duchy of Lithuania. This time, it will be different."
 BLR_Ukraine_way: "Amizade Com a Ucrânia"
 BLR_Ukraine_way_desc: "Despite our territorial claims, we are ready to conduct a dialogue with Ukraine against common enemies. It may be possible to create an alliance that will help our states survive when surrounded by opponents."
 BLR_Join_GUAM_to_Ukraine: "Junte-se ao GUAM"
 BLR_Join_GUAM_to_Ukraine_desc: "One of our first friendly steps toward Ukraine will be joining GUAM, an organization where Ukraine plays a leading role."
 BLR_training_with_ukr: "Exercícios Militares Conjuntos"
 BLR_training_with_ukr_desc: "We are ready to propose to the Ukrainian army joint exercises to practice maneuvers and coordinate troops."
 BLR_military_coop_with_ukraine: "Cooperação Militar-Técnica!"
 BLR_military_coop_with_ukraine_desc: "We are ready to establish military-technical cooperation with the Ukrainian military-industrial complex."
 BLR_Intermarium: "Intermarium"
 BLR_Intermarium_desc: "It is time for us to unite with Ukraine in a powerful alliance to confront our enemies together."
 BLR_Intermarium_poland: "Intermarium"
 BLR_Intermarium_poland_desc: "It is time for us to unite with Poland in a powerful alliance to confront our enemies together."
 BLR_Ukraine_enemy: "Apreender Terras Ucranianas"
 BLR_Ukraine_enemy_desc: "Historically, these lands belonged to the Grand Duchy of Lithuania. No false ties of friendship should prevent us from returning them to our great state."
 BLR_Sovereign_Internet: "Internet Soberana"
 BLR_Sovereign_Internet_desc: "Devemos tornar nosso espaço na Internet completamente independente de outros países para que eles não possam influenciar nossos cidadãos."
 BLR_Expand_Mozyr_Refinery: "Expandir Refinaria de Petróleo de Mozyr"
 BLR_Expand_Mozyr_Refinery_desc: "We will expand this oil refinery."
 BLR_Belshina: "JSC Belshina"
 BLR_Belshina_desc: "JSC Belshina is a manufacturer of automobile tires. It produces tires for passenger cars, trucks, heavy-duty vehicles, road construction and lifting vehicles, electric vehicles, buses, tractors and agricultural machinery."
 BLR_Expand_Naftan_Refinery: "Expandir Refinaria de Petróleo de Naftan"
 BLR_Expand_Naftan_Refinery_desc: "We will expand this oil refinery."
 BLR_Expansion_Okolovsky_Novoselkovsky: "Expansão da Produção de Minério de Depósitos"
 BLR_Expansion_Okolovsky_Novoselkovsky_desc: "Expansion of ore production from the Okolovsky and Novoselkovsky deposits will bring us a lot of steel."
 BLR_Problem_duying_vilages: "Problema das Vilas em Declínio"
 BLR_Problem_duying_vilages_desc: "It is time for our state to decide what to do with dying villages."
 BLR_Economic: "Economia Bielo-Russa"
 BLR_Economic_desc: "We need to develop our economy, and we are taking a number of measures to successfully achieve this."
 BLR_metro_minsk: "Expandir o Metrô de Minsk"
 BLR_metro_minsk_desc: "We will improve and expand the Minsk metro to improve the logistical characteristics of the city."
 BLR_it_industries_help: "Help Domestic IT Developers"
 BLR_it_industries_help_desc: "It is necessary to support our IT sector with everything we can — this is the future of our country."
 BLR_viber: "Viber"
 BLR_viber_desc: "O Viber é um aplicativo de mensagens que permite enviar mensagens, fazer chamadas VoIP de vídeo e voz pela Internet. Chamadas de voz entre usuários com o Viber instalado são gratuitas. O Viber tem a capacidade de enviar mensagens de texto, voz e vídeo, documentos, imagens, vídeos e arquivos, além de funcionar offline."
 BLR_wot: "Mundo dos tanques"
 BLR_wot_desc: "World of Tanks é um jogo online multiplayer em equipe dedicado a veículos blindados do meio do século 20. Os jogadores têm à disposição mais de 40 mapas de batalha criados com base em locais reais da Segunda Guerra Mundial e equipamentos historicamente confiáveis de 11 nações, com um total de mais de 600 unidades."
 BLR_russian_gazprom: "Gazprom"
 BLR_russian_gazprom_desc: "Gazprom is an important player in the gas and oil market. We must establish the closest possible cooperation with them."
 BLR_BPS_Sberbank: "BPS Sberbank"
 BLR_BPS_Sberbank_desc: "O BPS Sberbank é uma filial do Sberbank russo em nosso território."
 BLR_Belgazprombank: "Belgazprombank"
 BLR_Belgazprombank_desc: "O Belgazprombank é uma filial do Gazprombank na Bielorrússia."
 BLR_Development_domestic_tourism: "Desenvolvimento do Turismo Doméstico"
 BLR_Development_domestic_tourism_desc: "Vemos um forte potencial no turismo doméstico. Nesse sentido, cada deputado contribuirá para o desenvolvimento do turismo em seu distrito. A principal tarefa é criar uma infraestrutura adequada, já que há muito material científico e metodológico disponível."
 BLR_private_railways: "Empresas Ferroviárias Privadas"
 BLR_private_railways_desc: "We will transfer the railways to private companies."
 BLR_Lith_pol_railways: "Conexão Ferroviária com Polônia e Lituânia"
 BLR_Lith_pol_railways_desc: "We intend to build a high-quality railway connection with these countries, which will give us access to European goods."
 BLR_JSC_russian_railways: "Ferrovias Russas"
 BLR_JSC_russian_railways_desc: "We are now fully integrated with Russian Railways."
 BLR_belavia: "Belavia"
 BLR_belavia_desc: "A companhia aérea estatal bielorrussa com sede em Minsk. Foi formada em 1996. Os principais voos internacionais programados e charter são operados a partir do Aeroporto Nacional de Minsk."
 BLR_Danone: "Danone"
 BLR_Danone_desc: "Empresa de alimentos francesa, conhecida fabricante de produtos lácteos e outros produtos alimentícios."
 BLR_Godel_tech: "Godel Technologies"
 BLR_Godel_tech_desc: "Empresa britânica que fornece soluções de desenvolvimento de software para as principais empresas do Reino Unido com sede em Manchester."
 BLR_Basf_tech: "BASF Societas Europaea"
 BLR_Basf_tech_desc: "BASF Societas Europaea, a BASF é a maior empresa química da Alemanha, da Europa e do mundo. A sede fica na cidade de Ludwigshafen, na Renânia-Palatinado, no sudoeste da Alemanha."
 BLR_royal_dutch_shell: "Royal Dutch Shell"
 BLR_royal_dutch_shell_desc: "Shell is a British-Dutch oil and gas company."
 BLR_mts: "MTS"
 BLR_mts_desc: "MTS is a Russian company providing telecommunications services, digital and media services in Russia, Armenia and Belarus under the trademark \"MTS\". The company provides cellular communication services (in UMTS (3G), 4G, LTE and 5G standards), wired telephone services, broadband Internet access, mobile television, cable television, satellite television, digital television, media and entertainment content services, financial services, as well as convergent IT solutions in the field of the Internet of Things, monitoring, process automation, data processing and cloud computing."
 BLR_belarus_support_category: "Tropas Auxiliares de Belarus"
 BLR_ter_oboronaup_start: "Chamar Tropas de Defesa Territorial"
 BLR_internalup_start: "Chamar 3ª Brigada de Propósitos Especiais Separada"
 BLR_whitelegion_battalion_category: "Legião Branca"
 BLR_whitelegion_battalion_category_desc: "The White Legion is a sports and patriotic Belarusian organization that was transformed into a military one. The White Legion appeared in the early 1990s and maintained order at opposition meetings and rallies. Its members were trained as special forces, earning a steel beret analogous to the crimson one. They were given in-depth knowledge of the history of Belarus."
 BLR_white_legion_battalion_create: "Criar um Batalhão da Legião Branca"
 BLR_white_legion_recruit_youngfront: "Recrutar Formandos do Jovem Front"
 BLR_white_legion_recruit_people: "Recrutar Cidadãos Leais"
 BLR_white_legion_recruit_revansh: "Recrutar Membros da organização \"Praviy Revansh\""
 BLR_white_legions_TT: "O número de recrutas mudará por §Y[?modify_white_legion]§!\n"
 BLR_whitelegion_recruit_2000: "O número de recrutas disponíveis é 2000"
 BLR_lith_revol_category: "Revolução da Lituânia"
 BLR_Establish_cooperation_lit: "Estabelecer Cooperação com Comunistas Lituanos"
 BLR_Establish_cooperation_lit_desc: "Our Communist brothers in Lithuania are completely cut off from power. We must establish communication with them so that our future cooperation will bear fruit for both countries."
 BLR_Financing_of_protest_movements_lit: "Financiamento de Protestos Comunistas"
 BLR_Financing_of_protest_movements_lit_desc: "We will expand the influence of the Communist Party by financing protests in Lithuania."
 BLR_Strengthen_com_partys_agenda_lit: "Usar Bielorrussos Locais"
 BLR_Strengthen_com_partys_agenda_lit_desc: "Belarusians are the third largest non-indigenous people of Lithuania. We should use this as an instrument of influence."
 BLR_buy_militaries: "Subornar o Exército Local"
 BLR_litbel_propaganda: "Propaganda do Poder do Estado LitBel"
 BLR_litbel_propaganda_desc: "We must convince people that a single Lithuanian-Belarusian state will be more powerful and stronger than either country separately."
 BLR_parlament_lit_places: "Subornar Políticos Locais"
 BLR_lat_revol_category: "Revolução na Letônia"
 BLR_Establish_cooperation_lat: "Estabelecer Cooperação com Comunistas Letões"
 BLR_Establish_cooperation_lat_desc: "Our Communist brothers in Latvia are completely cut off from power. We must establish communication with them so that our future cooperation will bear fruit for both countries."
 BLR_Financing_of_protest_movements_lat: "Financiamento de Protestos Comunistas"
 BLR_Financing_of_protest_movements_lat_desc: "We will expand the influence of the Communist Party by financing protests in Latvia."
 BLR_Strengthen_com_partys_agenda_lat: "Usar Bielorrussos Locais"
 BLR_Strengthen_com_partys_agenda_lat_desc: "Belarusians are the third largest non-indigenous people of Latvia. We should use this as an instrument of influence."
 BLR_buy_militaries_lat: "Subornar o Exército Local"
 BLR_litbel_propaganda_lat: "Propaganda do Poder do Estado LitBel"
 BLR_parlament_lat_places: "Subornar Políticos Locais"
 BLR_revoult_lat: "Promover uma Rebelião na Letônia!"
 BLR_pol_revol_category: "Levar os Nacionalistas Necessários ao Poder na Polônia"
 BLR_pol_revol_category_desc: "We must take revenge on Poland for all the years it attempted to destroy our independence, for the humiliating Union of Lublin, and for the division of our country in the 20th century. We will put the Polish people in a position where they will have no choice but to obey us."
 BLR_Establish_cooperation_pol: "Estabelecer Laços com Nacionalistas Poloneses"
 BLR_podlasie_return: "Devolver Bialystok à Bielorrússia"
 BLR_podlasie_return_desc: "Bialystok has always been a land inhabited by Belarusians. It is time to reclaim this land from the Poles and return it to the Belarusian state."
 BLR_Duchy_claims_category: "Reivindicações Territoriais"
 BLR_Duchy_claims_category_desc: "We well remember the history of the Grand Duchy of Lithuania and all the lands that were under its command. We will declare our territorial claims over all our former territories."
 BLR_ukraine_claims: "Reivindicações territoriais para §Y[UKR.GetNamewithFlag]§!"
 BLR_poland_claims: "Reivindicações territoriais para §Y[POL.GetNamewithFlag]§!"
 BLR_russia_claims: "Reivindicações territoriais para §Y[SOV.GetNamewithFlag]§!"
 BLR_latgale_claims: "Reivindicações territoriais para §Y[LAT.GetNamewithFlag]§!"
 BLR_Litva_belarusization_category: "Integração de Novas Terras"
 BLR_Litva_belarusization_category_desc: "New lands need to be integrated into our state. The revival of the Litvinov nation is undoubtedly a risky project, but it can be the key to creating a powerful state."
 BLR_samogitia_return: "Integração de Samogitia"
 BLR_sudovia_return: "Integração de Sudovia"
 BLR_klaipeda_return: "Integração de Klaipeda"
 BLR_latgale_return: "Integração de Latgale"
 BLR_Litva_belarusizations_category: "Integração da Lituânia"
 BLR_Litva_belarusizations_category_desc: "Lithuania has always been and will always be a Belarusian land. We will return these lands to the Belarusian people."
 BLR_samogitia_returns: "Integração de Samogícia"
 BLR_sudovia_returns: "Integração de Sudovia"
 BLR_klaipeda_returns: "Integração de Klaipeda"
 BLR_latgale_returns: "Integração de Latgale"
 BLR_Lukashenko_category: "Governo de Lukashenko"
 BLR_Lukashenko_category_desc: "O governo de Lukashenko é claramente de natureza autoritária e busca apenas um objetivo - permanecer no poder a qualquer custo.\n§W--------------§!\nNo momento, a porcentagem de apoio a Alexander Grigoryevich Lukashenko é igual a §Y[?BLR.batka]§!"
 BLR_send_russian_omon: "Solicitar a Polícia de Choque Russa para Suprimir Protestos"
 BLR_go_to_jail_scum: "Enviar Opositores para a Prisão"
 BLR_trade_with_iraq: "Fornecer Armas para o Iraque"
 BLR_fly_protasevich: "Pousar um Avião da Ryanair com Protasevich"
 BLR_Deal_with_Poland: "Lidar com a União dos Poloneses"
 BLR_belorusisation_sudovia: "Bielorrussificação de Sudovia"
 BLR_belorusisation_klaipeda: "Bielorrussificação de Klaipeda"
 BLR_belorusisation_samogitia: "Bielorrussificação de Samogícia"
 BLR_people_militia: "Milícia Popular"
 BLR_people_militia_desc: "\"Mas a situação não é fácil. Já disse mais de uma vez: todo homem (e não apenas um homem) deve ser capaz, pelo menos, de manejar armas. Pelo menos para, se necessário, proteger sua família, sua casa, seu canto nativo da terra e, se necessário, o país, sem o qual não haverá canto, nem casa, nem mais nada. Muitas pessoas entendem isso,\" enfatizou Alexander Lukashenko."
 BLR_Kommunarka_category: "Fábrica Kommunarka"
 BLR_Kommunarka_category_desc: "Now that we have fully nationalized the factory, we will be able to receive full income from it."
 BLR_Go_to_Russia: "Começar a Vender Produtos na Rússia"
 BLR_Go_to_Latvia: "Começar a Vender Produtos na Letônia"
 BLR_Go_to_Kazakhstan: "Começar a Vender Produtos no Cazaquistão"
 BLR_Go_to_Georgia: "Começar a Vender Produtos na Geórgia"
 BLR_Go_to_Moldova: "Começar a Vender Produtos na Moldávia"
 BLR_Go_to_Armenia: "Começar a Vender Produtos na Armênia"
 BLR_Produst_all_CIS: "Começar a Vender Produtos em grande parte da CEI"
 BLR_mtz: "Fábrica de Tratores de Minsk"
 BLR_mtz_desc: "A factory in Belarus and a manufacturer of agricultural machinery. Minsk Tractor Plant was founded on May 29, 1946. The plant's capacity is designed for the production of 71,000 tractors of various series."
 BLR_Tracktor_category: "Fábrica MTZ"
 BLR_Tracktor_category_desc: "A Fábrica de Tratores de Minsk é uma planta na Bielorrússia, fabricante de máquinas agrícolas. A Fábrica de Tratores de Minsk desenvolve e fabrica tratores com rodas e lagartas, motocultivadores, ferramentas rebocadas e montadas para trabalhos agrícolas, de construção, florestais e municipais, peças de reposição, bens de consumo, organiza sua produção com base em licença, presta serviços para o estabelecimento e realização de manutenção.\n\n\n                                                 - §YNúmero de tratores disponíveis§! §G[?BLR.tracktors]§! - "
 BLR_start_tracktor: "Iniciar a Montagem do Trator \"Belarus\""
 BLR_tracktor_engine: "Instalar o Motor D-245.5"
 BLR_tracktor_trans: "Instalar a Transmissão"
 BLR_tracktor_hydraulic: "Instalar o Sistema de Suspensão Hidráulica"
 BLR_tracktor_kabina: "Montar a Cabine do Trator"
 BLR_tracktor_final: "Completar a Montagem do Trator"
 BLR_tracktor_build: "Produzir Novos Tratores"
 BLR_tracktor_holding: "Estabelecer a Holding MTZ"
