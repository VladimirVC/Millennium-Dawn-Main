 drugs.1.t: "麻薬売人の捜査の結果"
 drugs.1.d: "We recently completed a search for the biggest drug traffickers in our country. We found them! Now drug trafficking is not as strong as it used to be."
 drugs.1.a: "良いぞ"
 drugs.2.t: "麻薬売人の捜査の結果"
 drugs.2.d: "We recently completed a search for the largest drug traffickers in our country. Unfortunately, we were unable to find them. It may be worth trying again."
 drugs.2.a: "残念だ。"
 drugs.3.t: "麻薬売人の捜査の結果"
 drugs.3.d: "We recently completed a search for the largest drug traffickers in our country. Unfortunately, we were unable to find them. It may be worth trying again."
 drugs.3.a: "残念だ。"
 drugs.4.t: "麻薬商人の裁判"
 drugs.4.d: "We found the drug dealers and took them to court. There will be no more drug trafficking through our country. We are free of smugglers!"
 drugs.4.a: "良いぞ"
 ces_post_soviet_legacy_idea: "ソ連崩壊の遺産"
 ces_post_soviet_legacy_idea_desc: "One of the key aspects of the post-Soviet legacy is the transition from a centrally planned economy to market relations. This period was accompanied by economic instability, inflation, and redistribution of wealth, which affected livelihoods and consumption."
 ces_neutral_idea: "ウズベキスタンの中立性"
 ces_neutral_idea_desc: "ウズベキスタンの中立は、平和と不侵略へのウズベキスタンの願望を体現している。それは国際紛争に関与せず、その領土を軍事行動のために使用させないというコミットメントである。この原則は地域の安定に貢献し、国際紛争解決におけるウズベキスタンの仲介者としての役割を強化する。"
 CES_our_state_kaz: "我らが[ROOT.GetName]"
 CES_our_state_kaz_desc: "今日は新千年紀における国の旅の始まりである。"
 CES_newly_reestab_militar: "[ROOT.GetName]の軍事"
 CES_newly_reestab_militar_desc: "[ROOT.GetName]の軍隊には改革が必要だ。"
 CES_assemble_generals: "将官の招集"
 CES_assemble_generals_desc: "これは我々の戦略的な旅における重要な一歩である。成功と繁栄を追求する中で、我々は陸軍のすべての真の将軍、専門家、指導者を集め、健全な開発計画を議論し開発する必要がある。"
 CES_improve_borderline_guards: "国境警備の改良"
 CES_improve_borderline_guards_desc: "国境警備の強化は国家の安全保障と安定を確保するための重要な戦略的段階だ。"
 CES_establish_the_doctrine: "教育改革"
 CES_establish_the_doctrine_desc: "国家安全保障の維持と陸軍の有効性は、質の高い陸軍教育を必要とする。"
 CES_broken_economy_idea_1: "荒廃した経済システム"
 CES_broken_economy_idea_1_desc: "ソ連の計画経済体制の遺産は、ソ連崩壊後の[FROM.GetName]の立場を困難にさせた。経済インフラは中央集権的に管理され、市場経済への移行をより困難で骨の折れるものにした。多くの再輸出地域の喪失とエネルギー供給への依存も、[FROM.GetName]の経済に影響を与えた。共和国は、ソ連が管理していたいくつかの天然資源へのアクセスを失い、経済の不安定化と収入不足につながった。"
 CES_broken_economy_idea_2: "やや荒廃した経済システム"
 CES_broken_economy_idea_2_desc: "ソ連の計画経済体制の遺産は、ソ連崩壊後の[FROM.GetName]の立場を困難にさせた。経済インフラは中央集権的に管理され、市場経済への移行をより困難で骨の折れるものにした。多くの再輸出地域の喪失とエネルギー供給への依存も、[FROM.GetName]の経済に影響を与えた。共和国は、ソ連が管理していたいくつかの天然資源へのアクセスを失い、経済の不安定化と収入不足につながった。"
 CES_broken_economy_idea_3: "わずかに荒廃した経済システム"
 CES_broken_economy_idea_3_desc: "ソ連の計画経済体制の遺産は、ソ連崩壊後の[FROM.GetName]の立場を困難にさせた。経済インフラは中央集権的に管理され、市場経済への移行をより困難で骨の折れるものにした。多くの再輸出地域の喪失とエネルギー供給への依存も、[FROM.GetName]の経済に影響を与えた。共和国は、ソ連が管理していたいくつかの天然資源へのアクセスを失い、経済の不安定化と収入不足につながった。"
 CES_outdated_army_idea: "軍隊の混乱"
 CES_outdated_army_idea_desc: "ソ連の崩壊によって我が国は新たな地政学的環境に置かれ、旧ソ連諸国や新たに独立した国々との関係に不確実性が生じたことで、軍隊の管理が複雑になり、戦力と構造の見直しが必要となった。"
 CES_outdated_army_idea_1: "無秩序な軍事統制"
 CES_outdated_army_idea_1_desc: "ソ連の崩壊によって我が国は新たな地政学的環境に置かれ、旧ソ連諸国や新たに独立した国々との関係に不確実性が生じたことで、軍隊の管理が複雑になり、戦力と構造の見直しが必要となった。"
 CES_outdated_army_idea_2: "腐敗した軍事統制"
 CES_outdated_army_idea_2_desc: "ソ連の崩壊によって我が国は新たな地政学的環境に置かれ、旧ソ連諸国や新たに独立した国々との関係に不確実性が生じたことで、軍隊の管理が複雑になり、戦力と構造の見直しが必要となった。"
 CES_outdated_army_idea_3: "非効率的な軍事統制"
 CES_outdated_army_idea_3_desc: "ソ連の崩壊によって我が国は新たな地政学的環境に置かれ、旧ソ連諸国や新たに独立した国々との関係に不確実性が生じたことで、軍隊の管理が複雑になり、戦力と構造の見直しが必要となった。"
 CES_army_modernization: "陸軍近代化"
 CES_army_modernization_desc: "我々の陸軍の近代化は、我々の軍隊形成における重要な鍵である。"
 CES_create_territorial_defence: "領土防衛の確立"
 CES_create_territorial_defence_desc: "領土防衛の創設は、我々の防衛能力形成における重要な側面である。"
 CES_airforce_trainings: "Air Force Training"
 CES_airforce_trainings_desc: "Air Force training programs are vital for ensuring the readiness and professionalism of aviation personnel. These programs encompass a range of activities, including flight simulations, technical skills development, and international collaborations. They are essential for enhancing the country's defense capabilities and safeguarding its airspace, contributing to national security and regional stability in Central Asia."
 CES_india_air: "インドの航空機"
 CES_india_air_desc: "We may arrange an arms deal between us and India to buy new, modern planes for our air force."
 CES_russian_air: "ロシアの航空機"
 CES_russian_air_desc: "We may arrange an arms deal between us and Russia to buy new, modern planes for our air force."
 CES_european_air: "欧州の航空機"
 CES_european_air_desc: "We may arrange an arms deal between us and European countries to buy new, modern planes for our air force."
 CES_china_air: "中国の航空機"
 CES_china_air_desc: "We may arrange an arms deal between us and China to buy new, modern planes for our air force."
 CES_us_air: "米国の航空機"
 CES_us_air_desc: "We may arrange an arms deal between us and the United States to buy new, modern planes for our air force."
 CES_wing_loong: "中国製ドローン"
 CES_wing_loong_desc: "We may arrange an arms deal between us and China to buy new, modern drones for our air force."
 CES_predator_xp: "プレデターXP"
 CES_predator_xp_desc: "ジェネラル・アトミクス MQ-1 プレデター（しばしばプレデタードローンと呼ばれる）は、ジェネラル・アトミクスによって製造されたアメリカの遠隔操縦航空機（RPA）であり、主にアメリカ空軍（USAF）と中央情報局（CIA）によって使用された。"
 CES_airbus_stuff: "エアバス輸送機"
 CES_airbus_stuff_desc: "We may establish contracts with Airbus to purchase transport planes for our air force's logistical needs."
 CES_euro_helicopters: "ヨーロッパ製ヘリコプター"
 CES_euro_helicopters_desc: "Buying the newest European helicopters will greatly benefit our air force."
 CES_czech_jets: "チェコスロバキア製練習機"
 CES_czech_jets_desc: "After the fall of the Eastern Bloc, many post-communist states sold off their retired equipment. We may need to buy some for our air force."
 CES_tai_anka: "トルコ製ドローン"
 CES_tai_anka_desc: "Turkish drones have proven themselves very effective in recent conflicts. We may need to buy some."
 CES_bell_uh: "ベルUH-1"
 CES_bell_uh_desc: "ベル UH-1 イロコイは、アメリカの航空宇宙会社ベル・ヘリコプターによって設計・生産された汎用軍用ヘリコプターである。それは多産なヒューイ・ファミリーの最初のメンバーであり、またアメリカ軍で運用された最初のタービン動力ヘリコプターでもある。"
 CES_infantr_guns: "歩兵改革"
 CES_infantr_guns_desc: "部隊の連携と団結を高めるには、歩兵の改革が必要だ。"
 CES_us_guns: "米国製ライフル"
 CES_us_guns_desc: "AR rifles may not be as reliable as AKs, but they have proven themselves as very modular and accurate weapons. We need to acquire them."
 CES_us_equip: "NATO級装備"
 CES_us_equip_desc: "NATO級装備は世界最高だ！"
 CES_rus_equip: "ロシア製装備"
 CES_rus_equip_desc: "ロシア製装備は世界最高だ！"
 CES_russian_guns: "AKライフル"
 CES_russian_guns_desc: "AK rifles may not be as modular as ARs, but they have proven themselves as very sturdy and reliable weapons. We need to acquire them."
 CES_chinese_guns: "中国製ライフル"
 CES_chinese_guns_desc: "The QBZ-95 is a promising weapon platform that has attracted the interest of our Ministry of Defense. We may need to procure them."
 CES_chinese_equip: "新しい中国の代替品"
 CES_chinese_equip_desc: "新しい中国製装備は世界最高だ！"
 CES_us_art: "アメリカ製火砲"
 CES_us_art_desc: "Our country's acquisition of American artillery represents a strategic move to enhance its defense capabilities. This procurement involves the purchase of advanced artillery systems from the US, strengthening our military preparedness. Such acquisitions are integral to the country's national security strategy, promoting defense modernization and bolstering its ability to respond to regional security challenges effectively."
 CES_rus_art: "ロシア製火砲"
 CES_rus_art_desc: "我が国のロシア製火砲の取得は、その防衛能力を高めるための戦略的な動きを表している。この調達には、ロシアからの先進的な火砲システムの購入が含まれ、我々の軍事準備態勢を強化する。このような取得は、国の国家安全保障戦略にとって不可欠であり、防衛近代化を促進し、地域の安全保障課題に効果的に対応する能力を強化する。"
 CES_chinese_art: "中国製火砲"
 CES_chinese_art_desc: "我が国の中国製火砲の取得は、その防衛能力を高めるための戦略的な動きを表している。この調達には、中国からの先進的な火砲システムの購入が含まれ、我々の軍事準備態勢を強化する。このような取得は、国の国家安全保障戦略にとって不可欠であり、防衛近代化を促進し、地域の安全保障課題に効果的に対応する能力を強化する。"
 CES_buying_tanks: "[ROOT.GetName]戦車"
 CES_buying_tanks_desc: "[ROOT.GetName]'s tank needs must be assessed and researched."
 CES_chinese_tanks: "中国製戦車"
 CES_chinese_tanks_desc: "[ROOT.GetName]の中国製戦車の取得は、その軍隊を近代化するというコミットメントを反映している。これらの購入には、国の軍事能力を強化するために中国から先進的な戦車システムを調達することが含まれる。この戦略的な投資は、[ROOT.GetName]の防衛即応性を高め、地域の安全保障ニーズに対処するための堅牢で十分に装備された陸軍を維持するという献身を強調する。"
 CES_russian_tanks: "ロシア製戦車"
 CES_russian_tanks_desc: "[ROOT.GetName]のロシア製戦車の取得は、その軍隊を近代化するというコミットメントを反映している。これらの購入には、国の軍事能力を強化するためにロシアから先進的な戦車システムを調達することが含まれる。この戦略的な投資は、[ROOT.GetName]の防衛即応性を高め、地域の安全保障ニーズに対処するための堅牢で十分に装備された陸軍を維持するという献身を強調する。"
 CES_american_tanks: "アメリカ製戦車"
 CES_american_tanks_desc: "[ROOT.GetName]'s acquisition of American tanks reflects its commitment to modernizing its armed forces. These purchases involve procuring advanced tank systems from the US to bolster the country's military capabilities. This strategic investment enhances [ROOT.GetName]'s defense readiness and underscores its dedication to maintaining a robust and well-equipped army to address regional security needs."
 CES_urainian_btr: "Ukrainian BTRs"
 CES_urainian_btr_desc: "[ROOT.GetName]'s decision to purchase Ukrainian BTR (armored personnel carrier) vehicles signals a strategic move to enhance its military capabilities. This acquisition involves procuring these versatile armored vehicles from Ukraine to strengthen [ROOT.GetName]'s armed forces. These BTRs will play a crucial role in the country's defense strategy, aiding in mobility, troop transport, and border security, ultimately contributing to national security and regional stability."
 CES_rus_bars: "ロシア製BARS"
 CES_rus_bars_desc: "[ROOT.GetName]'s decision to purchase Russian BARS vehicles signals a strategic move to enhance its military capabilities. This acquisition involves procuring these versatile armored vehicles from Russia to strengthen [ROOT.GetName]'s armed forces. These vehicles will play a crucial role in the country's defense strategy, aiding in mobility, troop transport, and border security, ultimately contributing to national security and regional stability."
 CES_polaris: "ポラリス"
 CES_polaris_desc: "ポラリスの政府および防衛車両は、ニーズが何であれ、我々の組織のミッション駆動型の要求に合致する性能と信頼性を提供する。"
 CES_navy: "[ROOT.GetName]海軍"
 CES_navy_desc: "[ROOT.GetName]'s Navy is in need of reform."
 CES_navy_dockyard: "我々の海軍工廠"
 CES_navy_dockyard_desc: "我々の船が建造され保管されるために、新しいドックが建設されなければならない。"
 CES_navy_corvette: "コルベット"
 CES_navy_corvette_desc: "A corvette is a small warship. It is traditionally the smallest class of vessel considered to be a proper warship. The warship class above the corvette is that of the frigate, while the class below was historically that of the sloop-of-war."
 CES_navy_frigates: "フリゲート"
 CES_navy_frigates_desc: "フリゲートは軍艦の一種である。異なる時代において、フリゲートとして分類される船の役割と能力はいくらか変化してきた。17世紀から18世紀初頭にかけてのフリゲートという名前は、速度と機動性のために建造されたあらゆる全装帆船に与えられ、偵察、護衛、哨戒の役割で使用されることを意図していた。"
 CES_navy_doctrine: "ドクトリン改革"
 CES_navy_doctrine_desc: "Our naval doctrine is in need of renovation."
 CES_western_start: "民主主義の道"
 CES_western_start_desc: "It is time for our country to embark on the path of democratic government."
 CES_western_reform_govern: "政府改革"
 CES_western_reform_govern_desc: "Our government needs urgent reform."
 CES_western_decentr: "地方分権化"
 CES_western_decentr_desc: "It is time to give the regions more rights."
 CES_western_defend_people_rights: "人権と自由"
 CES_western_defend_people_rights_desc: "Our state will henceforth respect the rights and freedoms of every citizen."
 CES_western_anti_corruption: "汚職との闘い"
 CES_western_anti_corruption_desc: "腐敗した役人は罰せられるだろう！"
 CES_western_prave_rabochich: "労働者の権利"
 CES_western_prave_rabochich_desc: "Our workers must be protected by social guarantees."
 CES_western_freedom_smi: "言論の自由"
 CES_western_freedom_smi_desc: "Freedom of speech is one of the basic principles of our state."
 CES_western_welfare: "医療への投資"
 CES_western_welfare_desc: "Our people should be healthy."
 CES_western_mothers_posobia: "出産手当"
 CES_western_mothers_posobia_desc: "We will allocate as much money as possible for maternity benefits."
 CES_western_economic_rost: "我々の経済成長"
 CES_western_economic_rost_desc: "Our competent policy has led to economic growth."
 CES_western_infrastructure: "インフラ投資"
 CES_western_infrastructure_desc: "Our country's infrastructure must be developed and modernized."
 CES_western_education_reform: "教育改革"
 CES_western_education_reform_desc: "We will invest heavily in education reform."
 CES_western_science_reform: "科学投資"
 CES_western_science_reform_desc: "我々は科学に投資するだろう、なぜならそれは我が国の未来だからだ！"
 CES_western_sport: "スポーツの推進"
 CES_western_sport_desc: "健康な国家！ - 強い国家！"
 CES_western_ciphrovisation: "グローバルなデジタル化"
 CES_western_ciphrovisation_desc: "Digitalization will strengthen the growth of our economy."
 CES_western_liberal_heaven: "中央アジアのリベラルショーケース"
 CES_western_liberal_heaven_desc: "We are an example of building a liberal state in Central Asia."
 CES_liberals_modifier: "中央アジアの民主主義"
 CES_liberals_modifier_desc: "The democratic system is, in principle, unique for the Central Asian region. It represents a sharp and rapid attempt to catch up with Western democracies on all counts."
 CES_debt_reafctoring: "Debt Restructuring"
 CES_debt_reafctoring_desc: "Restructuring our debt will allow us more freedom in government spending."
 CES_exploit_natural_resources: "天然資源の活用"
 CES_exploit_natural_resources_desc: "中央アジアは、多様な景観と豊富な天然資源で知られる地域であり、歴史を通じて資源活用の焦点となってきた。"
 CES_uranium_extraction: "ウラン採掘"
 CES_uranium_extraction_desc: "中央アジアにおけるウラン採掘には、この放射性元素の採掘、処理、輸出が含まれ、世界中のエネルギー生成と核技術に貢献している。この資源は地域にとって経済的に重要であり、ウラン資源の管理における国際協力と規制をもたらした。"
 CES_support_gold_mining: "金採掘の支援"
 CES_support_gold_mining_desc: "中央アジアは豊かな金鉱床で知られており、この貴金属の採掘は地域の経済において極めて重要な役割を果たしている。カザフスタン、キルギス、ウズベキスタンのような国々は、金採掘産業の主要なプレイヤーである。"
 CES_keep_it_governmental: "政府管理の維持"
 CES_keep_it_governmental_desc: "We must keep our mining industries state-owned, as it ensures our autonomy."
 CES_metal_extraction: "金属採掘"
 CES_metal_extraction_desc: "Central Asia is a hub for the extraction of various metals, including copper, silver, and rare earth elements. The region's extensive mineral reserves have spurred a vibrant mining industry."
 CES_increase_privatisation: "民営化の増加"
 CES_increase_privatisation_desc: "We will benefit more from privatization, but it will make us more vulnerable to foreign influence."
 CES_natural_gas: "天然ガス"
 CES_natural_gas_desc: "中央アジアにおけるガス採掘には、国内および国際的なエネルギー需要を満たすための天然ガスの掘削、処理、輸送が含まれる。地域のガス資源は実質的な経済的重要性を持ち、地域協力と世界的なエネルギー貿易の両方を促進している。"
 CES_oil_extraction: "石油採掘"
 CES_oil_extraction_desc: "Central Asia is home to significant oil reserves, with Kazakhstan being a major player in the region's oil extraction industry."
 CES_invite_exxon: "エクソンの招待"
 CES_invite_exxon_desc: "エクソンモービル・コーポレーションは、アメリカの多国籍石油・ガス企業であり、ジョン・D・ロックフェラーのスタンダード・オイルの最大の直系子孫である。"
 CES_invite_chevron: "シェブロンの招待"
 CES_invite_chevron_desc: "シェブロン・コーポレーションは、主に石油とガスに特化したアメリカの多国籍エネルギー企業である。"
 CES_invite_lukoil: "ルクオイルの招待"
 CES_invite_lukoil_desc: "PJSC ルクオイル石油会社は、モスクワに本社を置くロシアの多国籍エネルギー企業であり、石油、天然ガス、石油製品、電力の採掘、生産、輸送、販売事業を専門としている。"
 CES_united_joint_venture: "共同合弁事業"
 CES_united_joint_venture_desc: "我々は株式を合併し、それから利益を得るだろう。"
 CES_trade_idea: "貿易拡大"
 CES_supporting_what_has_left: "残されたものの支援"
 CES_supporting_what_has_left_desc: "Our economy was shattered by the fall of the Soviet Union. The time has come to support what remains."
 CES_establishing_relations_with_world_bank: "WTOへの加盟"
 CES_establishing_relations_with_world_bank_desc: "Entering the WTO is crucial for expanding our trade economy."
 CES_establishing_relations_with_asian_bank: "アジア開発銀行の支援"
 CES_establishing_relations_with_asian_bank_desc: "Getting support from the ADB is a good opportunity for us to gain more benefits."
 centrasiaev.1.t: "アジア開発銀行支援交渉"
 centrasiaev.1.d: "アジア開発銀行は我々の支援提案を受け入れた。今、我々は彼らに何を求める必要があるかを選択する必要がある。"
 centrasiaev.1.a: "教育支援"
 centrasiaev.1.b: "経済支援"
 centrasiaev.1.c: "社会支援"
 CES_national_invest_strategy: "国家投資戦略"
 CES_national_invest_strategy_desc: "The development and implementation of a national investment strategy is becoming an integral part of modern economic development."
 centrasiaev.2.t: "カザフスタンが投資を要請"
 centrasiaev.2.d: "They are asking for economic investments. Should we agree?"
 centrasiaev.2.a: "もちろん"
 centrasiaev.2.b: "申し訳ないが、拒否する"
 centrasiaev.3.t: "ウズベキスタンが投資を要請"
 centrasiaev.3.d: "They are asking for economic investments. Should we agree?"
 centrasiaev.3.a: "もちろん"
 centrasiaev.3.b: "申し訳ないが、拒否する"
 centrasiaev.4.t: "キルギスが投資を要請"
 centrasiaev.4.d: "They are asking for economic investments. Should we agree?"
 centrasiaev.4.a: "もちろん"
 centrasiaev.4.b: "申し訳ないが、拒否する"
 CES_special_economic_zones: "特別経済区"
 CES_special_economic_zones_desc: "中央アジアは、経済発展を刺激するために特別経済区（SEZ）を設立する必要性を認識している。これらのゾーンは、税制優遇措置、規制緩和、簡素化された行政プロセスのようなインセンティブを提供し、国内および外国投資を引き付ける。中央アジアでは、SEZは経済の多様化、革新の促進、雇用の創出、特に製造業、技術、貿易のようなセクターにおいて触媒として機能する。ビジネスフレンドリーな環境を促進することにより、これらのゾーンは、投資を引き付け、インフラを強化し、経済成長を推進する地域の取り組みにおいて極めて重要な役割を果たしている。"
 CES_infr_investment: "インフラ投資"
 CES_infr_investment_desc: "中央アジアは、その輸送、エネルギー、電気通信ネットワークを近代化し拡大するためにインフラ投資を優先している。これらの投資は、地域の多様な国々を結びつけ、近隣諸国との貿易と接続性を促進する上で役立つ。"
 CES_industrial_revival: "産業復興"
 CES_industrial_revival_desc: "中央アジアにおける産業投資は、地域の経済成長の重要な推進力である。これらの投資は、製造業、エネルギー、技術、インフラのような多様なセクターを対象としている。それらは生産性の向上、雇用機会の創出、そして世界舞台での地域の競争力の向上において極めて重要な役割を果たしている。中央アジアは、その経済的可能性を活用し、地域開発を促進するために、国内および外国の産業投資を積極的に求めており、それが地域における政府と民間企業の両方にとって重要な焦点となっている。"
 CES_invite_daewoo: "大宇の招待"
 CES_invite_daewoo_desc: "Daewoo, literally meaning 'great universe' and a portmanteau of dae, meaning great, and the given name of founder and chairman Kim Woo-choong, also known as the Daewoo Group, was a major South Korean chaebol (type of conglomerate) and automobile manufacturer."
 CES_invite_toyota: "トヨタの招待"
 CES_invite_toyota_desc: "トヨタ自動車株式会社は、日本の愛知県豊田市に本社を置く日本の多国籍自動車メーカーである。トヨタは世界最大の自動車メーカーの一つであり、年間約1000万台の車両を生産している。"
 CES_invite_avtovas: "アフトヴァースの招待"
 CES_invite_avtovas_desc: "AvtoVAZ is a Russian state-owned automobile manufacturing company. It was formerly known as VAZ, an acronym for Volga Automotive Plant in Russian. AvtoVAZ is best known for its flagship Lada series of vehicles."
 CES_fostering_productive_innovation_project: "生産的革新促進プロジェクト"
 CES_fostering_productive_innovation_project_desc: "中央アジアにおける生産的革新促進プロジェクトは、地域における革新と技術進歩を促進することを目的とした戦略的イニシアチブである。研究、教育、起業家精神への対象を絞った投資を通じて、このプロジェクトは創造性と革新を刺激しようとしている。それは中央アジア諸国の競争力と経済的多様化を高める上で重要な役割を果たし、21世紀における持続可能な成長と世界的な関連性のためにそれらを位置付けている。"
 CES_russian_it_companies: "ロシアのIT企業"
 CES_russian_it_companies_desc: "ロシアのIT企業は中央アジアで存在感を増しており、地域のデジタルトランスフォーメーションに貢献している。これらの企業は、金融、医療、教育を含む多様なセクターに技術的専門知識と革新的なソリューションをもたらしている。彼らの存在は、国境を越えた協力、知識共有、経済開発を促進し、ロシアの技術能力と投資から利益を得ながら、デジタル未来への中央アジアの旅を支援している。"
 CES_restructuring_the_army: "陸軍の再編"
 CES_restructuring_the_army_desc: "[ROOT.GetName]は、その防衛能力を近代化し強化するために、包括的な陸軍再編努力を行っている。このイニシアチブには、装備の更新、部隊展開の最適化、訓練と技術の改善が含まれる。現代の安全保障課題に軍隊を整合させることにより、[ROOT.GetName]は国家安全保障を強化し、地域の安定に貢献することを目指しており、より能力が高く機敏な軍事力として自らを位置付けている。"
 CES_develop_turism: "観光業の開発"
 CES_attract_tourists: "観光客の誘致"
 CES_attract_tourists_desc: "観光客の誘致"
 CES_special_gambling_regions: "特別ギャンブル地域"
 CES_special_gambling_regions_desc: "Our Minister of Economy has proposed a special gambling regions project to boost our economy."
 CES_russian_it_specialists: "Russian IT Specialists"
 CES_russian_it_specialists_desc: "Russian IT specialists are seeking new places to establish their companies. Our country is the perfect destination!"
 CES_agricultural_reneissance: "農業ルネサンス"
 CES_agricultural_reneissance_desc: "We need to start revitalizing our agriculture."
 CES_supporting_wheat_production: "シャワルマ生産の支援"
 CES_supporting_wheat_production_desc: "我々のシャワルマは、世界中のすべての国々の中で最高のものでなければならない！"
 CES_foster_horse_production: "馬生産の育成"
 CES_foster_horse_production_desc: "馬の飼育は我々の経済の不可欠な部分であり、我々はそれを拡大する必要がある！"
 CES_export_of_kumis: "クミスの輸出"
 CES_export_of_kumis_desc: "Kumis is our national drink and we should show its greatness to the whole world!"
 CES_agricultural_subsidies: "農業補助金"
 CES_agricultural_subsidies_desc: "我が国の農業への補助金は必要である。"
 CES_farming_encoruraging: "農業の奨励"
 CES_farming_encoruraging_desc: "Much of our population is unemployed. We must show that farming is a viable way to participate in the economy."
 CES_supporting_wheat_production_one: "小麦生産の支援"
 CES_supporting_wheat_production_one_desc: "小麦は我々の田園地帯で繁栄しなければならない。我々はそれを輸出し、収入を得ることができるだろう。"
 CES_supporting_wheat_production_two: "代替農業方法"
 CES_supporting_wheat_production_two_desc: "Efficiency must be our top priority. The more we harvest, the better."
 CES_farming_encouragement_one: "質の高い農業の奨励"
 CES_farming_encouragement_one_desc: "有効性が我々の優先事項でなければならない。我々はニッチを見つけるために品質を保証しなければならない。"
 CES_cotton_production: "綿花生産"
 CES_cotton_production_desc: "我々の土地は伝統的に質の高い綿花生産で知られている。我々はその期待に応えなければならない。"
 CES_connection_with_educational_abroad: "海外教育との連携"
 CES_connection_with_educational_abroad_desc: "我々は農民を教育するために農業研究所との連携を確立すべきである。"
 CES_connection_with_educational_abroad_one: "海外教育との連携 1"
 CES_connection_with_educational_abroad_one_desc: "我々は農民を教育するために農業研究所との連携を確立すべきである。"
 CES_voluonteer_labor: "ボランティア労働"
 CES_voluonteer_labor_desc: "我々は刑務所から……ええと……ボランティアを作り、畑で働かせるべきだ。これは繁栄だけをもたらすだろう、そうだろ？"
 CES_keep_it_civil: "市民的に保つ"
 CES_keep_it_civil_desc: "我々は農業セクターにおいて市民的で公正な労働のみを奨励すべきである。"
 CES_agricultural_institutes: "農業研究所"
 CES_agricultural_institutes_desc: "我々は我々自身の農業機関を開設し、我々の経験から彼らを教育すべきである。"
 CES_agriculture_policy: "農業政策"
 CES_switzerland_investments_idea: "スイスとの貿易"
 CES_new_markets: "新市場"
 CES_new_markets_desc: "Opening new markets is the key to success in the global economic space. On the one hand, it provides an opportunity to expand sales internationally and increase overall business revenue. On the other hand, trade with other countries helps develop cultural diversity and understanding between peoples, which promotes peace and cooperation between nations."
 CES_trade_with_china: "中国との貿易"
 CES_trade_with_china_desc: "中国との貿易は、その影響力、技術的能力、資源のために、世界経済における重要な要因となりつつある。それは相互の発展、革新、そして持続可能な経済関係の創造を促進する。"
 CES_trade_with_south_korea: "韓国との貿易"
 CES_trade_with_south_korea_desc: "韓国との貿易は、我々のグローバル経済における繁栄と多様性の鍵である。この重要な貿易相手国は、我々の視野を広げ、様々なセクターでの関係を豊かにするためのユニークな機会を提供する。"
 CES_trade_with_north_korea: "北朝鮮との貿易"
 CES_trade_with_north_korea_desc: "北朝鮮は、ほとんど知られていない巨大な潜在力を持つ市場である。石炭、鉱物、そして潜在的に価値のある金属を含む豊富な天然資源を持っている。この国との貿易は、新しい市場と原材料の源を探している企業にとって興味深いものとなる可能性がある。"
 CES_trade_with_india: "インドとの貿易"
 CES_trade_with_india_desc: "インドは商品とサービスの輸出のための巨大な市場を表している。10億人以上の人口と成長する中間層を持つインドは、世界貿易にとって重要なパートナーとなり得る。インドへの輸出は、我々の顧客基盤を拡大し、売上を増加させるのに役立つ。"
 CES_trade_with_turkey: "トルコとの貿易"
 CES_trade_with_turkey_desc: "トルコはヨーロッパとアジアの間の橋であり、大陸間貿易の発展のための重要なパートナーとなっている。国は広範なインフラ、ならびに現代的な港と輸送回廊を持っており、それが効率的なロジスティクスと多様な市場へのアクセスを保証する。"
 CES_trade_with_mongolia: "モンゴルとの貿易"
 CES_trade_with_mongolia_desc: "Mongolia has vast natural resources, including minerals, coal, meat, and wool. Trade with Mongolia can be a source of affordable, quality raw materials, which will positively impact our industries."
 CES_trade_with_pakistan: "パキスタンとの貿易"
 CES_trade_with_pakistan_desc: "パキスタンは、重要な経済的および地政戦略的な利点を提供する国であり、それとの協力は非常に有益となり得る。"
 CES_trade_with_russia: "ロシアとの貿易"
 CES_trade_with_russia_desc: "ロシアは大きな潜在力と多くの利点を持つ国であり、それとの協力は大きな利益をもたらす可能性がある。"
 CES_trade_with_ukraine: "ウクライナとの貿易"
 CES_trade_with_ukraine_desc: "ウクライナは4000万人以上の大きな市場であり、我々の貿易業務を拡大し売上を増加させるための魅力的なパートナーとなっている。"
 CES_trade_with_azerbaijan: "アゼルバイジャンとの貿易"
 CES_trade_with_azerbaijan_desc: "アゼルバイジャンは、重要な石油と天然ガスの埋蔵量を持つエネルギー産業の主要なプレイヤーである。アゼルバイジャンとの協力は、これらの重要な資源へのアクセスを提供し、エネルギー商品の供給の多様性に貢献することができる。"
 CES_trade_with_belarus: "ベラルーシとの貿易"
 CES_trade_with_belarus_desc: "ベラルーシは何百万人もの人口を持つ大きな市場である。ベラルーシへの商品とサービスの輸出は、売上を増加させ顧客基盤を拡大するための見通しを我々に開く。"
 CES_trade_with_armenia: "アルメニアとの貿易"
 CES_trade_with_armenia_desc: "アルメニアは活発に発展している経済を持つ国であり、それとの協力は我々に新しい市場とパートナーへのアクセスを提供することができる。アルメニアへの商品とサービスの輸出は、我々のビジネスを拡大し売上を増加させるための新しい見通しを我々に開く。"
 CES_trade_with_georgia: "ジョージアとの貿易"
 CES_trade_with_georgia_desc: "ジョージアは豊かな文化遺産と協力の見通しを持つ国であり、それが我々の経済にとって重要なパートナーとなっている。"
 CES_trade_with_iran: "イランとの貿易"
 CES_trade_with_iran_desc: "イランは石油とガスを含む重要なエネルギー資源の埋蔵量を持っている。イランとの貿易は、我々にエネルギー安全保障と重要な資源へのアクセスの機会を提供する。"
 CES_trade_with_europe: "ヨーロッパとの貿易"
 CES_trade_with_europe_desc: "Europe is home to some of the largest economies in the world. Trade with European countries offers us opportunities to expand our business and increase sales."
 CES_trade_with_switzerland: "スイスとの貿易"
 CES_trade_with_switzerland_desc: "スイスは時計、医薬品、食品加工を含む製造業で有名である。スイスとの貿易は高品質の商品と製品へのアクセスを提供し、それが我々のビジネス業務の成長を支援することができる。"
 CES_trade_with_greece: "ギリシャとの貿易"
 CES_trade_with_greece_desc: "Greece is rich in tourism resources, and cooperation with it can create opportunities for the development of the tourism industry and exchange of experiences."
 CES_trade_with_united_kingdom: "イギリスとの貿易"
 CES_trade_with_united_kingdom_desc: "The UK is a large market with high purchasing power, making it an attractive partner for expanding our business opportunities and increasing sales."
 CES_trade_with_france: "フランスとの貿易"
 CES_trade_with_france_desc: "フランスは豊かな芸術、文化、そしてダイナミックな経済を持つ国であり、我々の貿易関係を発展させるための魅力的なパートナーとなっている。"
 CES_trade_with_usa: "アメリカとの貿易"
 CES_trade_with_usa_desc: "アメリカは大きな経済的影響力、卓越した革新、そして協力のための途方もない見通しを持つ国であり、国際的なビジネス関係を発展させるための重要なパートナーとなっている。"
 CES_trade_with_spain: "スペインとの貿易"
 CES_trade_with_spain_desc: "スペインはビジネス成長の高い潜在力を持つ大きな市場である。スペインの企業や起業家との協力は、我々の業務を拡大し売上を増加させるための新しい機会を開く。"
 TRK_berli_modifier: "復活した政治局"
 nat_coalit_tt: "§Y他の国家主義者と団結するだろう！§!"
 nationalists.1.t: "軍事協力の提案"
 nationalists.1.d: "Due to our common geopolitical interests on the world stage, the question of the possibility of military cooperation has arisen before our governments. As we believe, such cooperation will boost our national spirit because we will become even closer to our Central Asian Turkic brothers."
 nationalists.1.a: "我々の国家にとって歴史的な瞬間だ。テュルク民族はさらに強くなるだろう！"
 nationalists.1.b: "中央アジア？何だそれは？"
 CES_nationalist_policy: "国家主義政策"
 CES_kaz_modifier: "カザフスタンの軍事・政治改革"
 CES_kaz_modifier_desc: "我が国の陸軍と国家安全保障機関は改革が必要であり、カザフスタンが防衛または戦争の準備をしなければ、敵に対して立ち向かうことはできないだろう。"
 CES_kaz_reform_vs: "グローバル改革"
 CES_kaz_reform_vs_desc: "Our army and security agencies need sweeping reforms, and we will begin them now."
 CES_kaz_ter_oborna: "領土防衛"
 CES_kaz_ter_oborna_desc: "Our country is vast and needs more protection. Territorial defense will address this need."
 CES_kaz_nat_gurad: "国家警備隊"
 CES_kaz_nat_gurad_desc: "We will transform the internal troops into the National Guard for greater efficiency."
 CES_kaz_gos_ohrana: "国家保安庁"
 CES_kaz_gos_ohrana_desc: "A special state body directly subordinate and accountable to the President of Kazakhstan, forming part of the national security forces, and carrying out security measures to ensure the protection of the President, other protected persons, and objects within the competence established by law."
 CES_kaz_reog_kadet: "軍事学校の再編"
 CES_kaz_reog_kadet_desc: "Our soldiers should be trained according to the best international standards."
 CES_kaz_defence_doctrine: "防御ドクトリン"
 CES_kaz_defence_doctrine_desc: "Our country is peaceful, but it must be ready to defend itself."
 CES_kaz_sso: "特殊作戦部隊"
 CES_kaz_sso_desc: "We will create our own Special Operations Forces."
 CES_kaz_national_tt: "§Y国家警備隊§!が創設されるだろう"
 CES_ter_oborona_tt: "§Y領土防衛隊§!が創設される"
 CES_kaz_sso_tt: "§Y特殊作戦部隊§!が創設されるだろう"
 nationalists.2.t: "我々の未来の問題"
 nationalists.2.d: "我々の新しい政府は、国を強化するために多くの努力を注いできた。そして今、我々は影響圏の将来の拡大の問題に直面している。我々は黄金のオルドのかつての力を回復する道をたどることができるが、テュルク民族を団結させるというかなり新鮮な考えに従うこともできる。"
 nationalists.2.a: "黄金のオルドは我が国の最良のバージョンだった。我々はその力を取り戻す！"
 nationalists.2.b: "団結することによってのみ、テュルク民族は強くなる！"
 mongolempire.path: "§Y我々は黄金のオルドの道を選んだ§!"
 turan.path: "§Y我々は偉大なるトゥランの道を選んだ§!"
 nationalists.3.t: "黄金のオルドの帰還"
 nationalists.3.d: "Nobody expected this could happen at all; however, recent events suggest otherwise — the Golden Horde has been recreated. This event promises radical political changes across Asia."
 nationalists.3.a: "黄金のオルド？解散したと思っていた。"
 nationalists.4.t: "偉大なるトゥランの宣言"
 nationalists.4.d: "Many experts believed that uniting the Turkic peoples was an impossible task, but this notion has recently been proven wrong. A unified state of Turkic peoples was proclaimed. This unification threatens the sphere of influence of regional powers."
 nationalists.4.a: "The dream of many Turkic empires and states has been realized."
 CES_new_turkic_state: "新テュルク国家"
 CES_new_turkic_state_desc: "テュルク民族は常にアジア、そして場合によってはヨーロッパで支配的な民族であった。我々は強力なテュルク国家を創設することによって、我々の民族の栄光を取り戻さなければならない。"
 CES_national_counc: "民族評議会"
 CES_national_counc_desc: "Without the support of various militarized nationalist parties and their followers, we will not be able to sustain our regime in the long run."
 CES_look_hist: "歴史的に見る"
 CES_look_hist_desc: "Some territories that once belonged to us are now under the control of other states. We must reclaim them."
 CES_revive_nomad_spirit: "遊牧民精神の復活"
 CES_revive_nomad_spirit_desc: "Nomadism is our true way of life. Our ancestors roamed across many lands, spreading our culture to other territories. We should be proud of this heritage."
 CES_ignite_turkic_militar: "テュルク軍国主義の点火"
 CES_ignite_turkic_militar_desc: "The Turkic peoples must unite to face external threats."
 CES_promote_pan_turk: "汎テュルク主義の推進"
 CES_promote_pan_turk_desc: "Only by uniting the minds of many Turkic people can we draw closer to the goal of unifying our peoples."
 CES_establish_loyal_natgov: "忠実な民族政府の樹立"
 CES_establish_loyal_natgov_desc: "By installing loyal leadership, we will not have to worry about internal strife."
 CES_trukism_is_our_body: "テュルク主義は我々の身体なり"
 CES_trukism_is_our_body_desc: "We should be proud of our identity and promote the idea of uniting our nations under one flag."
 CES_connect_grey_wolves: "灰色狼との接続"
 CES_connect_grey_wolves_desc: "Turkey is our potential strategic and ideological ally. We must strengthen our engagement to project our influence with even greater force."
 CES_turkic_army: "テュルク軍"
 CES_turkic_army_desc: "我々の外交政策を成功裏に実施するためには、我々の軍産複合体に資金を提供する必要がある。"
 CES_purge_disloyals: "ネズミの粛清"
 CES_purge_disloyals_desc: "There are still many in our country who oppose our position. We must eradicate this dissent."
 CES_anti_russian_nat_prop: "反ロシア民族プロパガンダ"
 CES_anti_russian_nat_prop_desc: "The time has come to cut ties with our greatest enemy. No more Russian boots will set foot on our soil."
 CES_no_other_lang: "他の言語は不要"
 CES_no_other_lang_desc: "Russia has long exploited our lands and our people in senseless and bloody wars far from home. We will no longer tolerate their presence in our country."
 CES_embrace_traditions: "伝統の受容"
 CES_embrace_traditions_desc: "We need to keep our traditions alive to strengthen our national spirit."
 CES_paramilitar_stuff: "準軍事組織"
 CES_paramilitar_stuff_desc: "我々の社会で軍国主義的な考え方を維持することにより、我々はより大きな成功をもって我々の議題を推進することができるだろう。"
 CES_milyouth_nat: "軍事青年国家主義"
 CES_milyouth_nat_desc: "Youth are an integral part of our system. By nurturing their fighting spirit from an early age, we can strengthen our country's defenses."
 CES_nat_tengri_spir: "民族テングリ精神"
 CES_nat_tengri_spir_desc: "We must restore the glory of the Turkic Khaganate so that our people can once again be considered the rightful masters of their land."
 CES_back_to_genghis_khan: "チンギス・カンへの回帰"
 CES_back_to_genghis_khan_desc: "モンゴルは我が国の偉大さの出発点である。我々は歴史的正義を回復するためにこれらの土地に戻るだろう。"
 CES_kipchak_chak: "キプチャク・チャク"
 CES_kipchak_chak_desc: "We will bring the Gagauz back to our country, freeing them from Romanian oppression."
 CES_free_uighurs: "ウイグル人の解放"
 CES_free_uighurs_desc: "The Uyghurs are an oppressed nation within China. They are calling upon us to help liberate them."
 CES_invade_jap: "日本への侵攻"
 CES_invade_jap_desc: "今回は別の神風によって救われることはないだろう。"
 CES_march_to_siberia: "シベリアへの進軍"
 CES_march_to_siberia_desc: "Russia thinks we are too weak to strike them from behind? They are very much mistaken."
 CES_those_whorej: "あのホレズム"
 CES_those_whorej_desc: "Either the people of Central Asia unite with us under a single flag, or there will only be chaos here. The time has come to decide the fate of this region."
 CES_revive_khanate: "カガン国の復活"
 CES_revive_khanate_desc: "The Turkic Khaganate will become such a great nation that even the USA will listen to our opinion. Everything will be done with our permission!"
 CES_tribute_to_khan: "カンへの貢物"
 CES_tribute_to_khan_desc: "我々の体制に忠実なすべての男は、我々の新しいカンに貢物を支払う義務があるだろう。"
 CES_finally_united: "ついに団結"
 CES_finally_united_desc: "今やほとんどのテュルク諸国が我々の旗の下に団結したので、我々は完全に我々の国家を再び偉大と見なすことができる。"
 CES_cultural_unif: "文化的統一"
 CES_cultural_unif_desc: "我々の人口が主にテュルク系であるという事実にもかかわらず、我が国にはまだ完全に団結することを許さない多くの異なる文化がある。我々は文化的な統一のための新しい考えを見つけなければならない。"
 CES_turkify_finland: "フィンランドのテュルク化"
 CES_turkify_finland_desc: "フィンランドは我々のカガン国が到達しなかった領土である。我々はフィン人を服従させ、彼らをテュルク化することによってそれを是正するだろう。"
 CES_nat_islam_spir: "民族イスラム精神"
 CES_nat_islam_spir_desc: "イスラムは我々の国家を偉大さに導いたものである。我々は文化と宗教における我々の兄弟たちと再会することによって、その偉大さを回復しなければならない。"
 CES_path_of_seljuk: "セルジュークの道"
 CES_path_of_seljuk_desc: "イランの領土を服従させることにより、我々は地域における戦略的優位性を確保することができる。"
 CES_idelural: "イデル＝ウラル"
 CES_idelural_desc: "Bashkiria is a territory that rightfully belongs to us. We must take it back."
 CES_ottoman_spirit: "オスマンの精神"
 CES_ottoman_spirit_desc: "トルコは最大のテュルク系の隣人であり、我々はより公正な社会を築くために我々の民族を再会させなければならない。"
 CES_reunite_azer: "アゼルバイジャンとの再統一"
 CES_reunite_azer_desc: "アゼルバイジャンはテュルク系の国家であるが、かなり手に負えない。我々はそれを修正するだろう。"
 CES_crush_who_reject: "拒絶した者を粉砕せよ"
 CES_crush_who_reject_desc: "今回、我々は中央アジア全体に我々の影響力を拡大するだろう。すべての反対者は排除されるだろう。"
 CES_finish_the_deed: "アルメニアの脅威"
 CES_finish_the_deed_desc: "アルメニアは現在、我々のテュルク系の兄弟たちをその支配下に置いている。我々は彼らをアルメニアの支配から解放するだろう。"
 CES_declare_turan: "トゥランの宣言"
 CES_declare_turan_desc: "ついに我々は我々の民族の完全な統一を宣言することができるだろう。多くの国々が我々の優位性を認め、我々は今や世界に対してよりグローバルな影響力を持つことができる。"
 CES_turkic_equality: "テュルクの平等"
 CES_turkic_equality_desc: "All residents of our country will have equal rights, regardless of their past economic status under the control of other countries."
 CES_raise_from_ash: "灰からの復活"
 CES_raise_from_ash_desc: "[FROM.GetNameDef]は、独立国家として、ソビエト連邦崩壊後の困難な歴史的時期を経た。国が1991年に得た独立は、過去の時代の灰からの復活の象徴であった。"
 CES_raise_from_ash_idea: "灰からの復活"
 CES_raise_from_ash_idea_desc: "[FROM.GetNameDef]は、独立国家として、ソビエト連邦崩壊後の困難な歴史的時期を経た。国が1991年に得た独立は、過去の時代の灰からの復活の象徴であった。"
 CES_establ_absolu_loy: "絶対的忠誠の確立"
 CES_establ_absolu_loy_desc: "これは我々の支配者がオリガルヒに彼の政策を完全に支持させる試みである。しかし、彼らの一部は政府と国の指導部を批判し始めており、それがエリート間の勢力の分裂につながり、国際舞台での大統領の権威を弱める可能性がある。"
 CES_our_beloved_autocrat_kaz: "党の強化"
 CES_our_beloved_autocrat_kaz_desc: "[CES_our_beloved_autocrat_kaz_desc]"
 KAZ_our_beloved_autocrat_kaz_desc: "我々の敬愛する独裁者として、ヌルスルタン・アビシュリ・ナザルバエフは、彼の長い統治期間（1989-2019）中にカザフスタンの経済を変革することができた。彼の政策と戦略的思考のおかげで、中央アジア諸国は新たな安定と繁栄を得た。独裁者ナザルバエフの成功の重要な要因の一つは、彼が国の経済を効果的に管理できる強力な国家機構を作り出すことができたことである。その結果、カザフスタンは産業と農業で大きな進歩を遂げ、それが国民所得の増加と人口の生活の質の向上につながった。"
 UZB_our_beloved_autocrat_kaz_desc: "我々の敬愛する独裁者として、イスラム・アブドゥガニエヴィチ・カリモフは、彼の長い統治期間（1991-2016）中にウズベキスタンの経済を変革することができた。彼の政策と戦略的思考のおかげで、中央アジア諸国は新たな安定と繁栄を得た。カリモフの独裁者の成功の重要な要因の一つは、彼が国の経済を効果的に管理できる強力な国家機構を作り出すことができたことである。その結果、ウズベキスタンは産業と農業で大きな進歩を遂げ、それが国民所得の増加と人口の生活の質の向上につながった。"
 KYR_our_beloved_autocrat_kaz_desc: "我々の敬愛する独裁者として、アスカル・アカエフは、彼の長い統治期間（1991-2005）中にキルギスの経済を変革することができた。彼の政策と戦略的思考のおかげで、中央アジア諸国は新たな安定と繁栄を得た。アカエフの独裁者の成功の重要な要因の一つは、彼が国の経済を効果的に管理できる強力な国家機構を作り出すことができたことである。その結果、キルギスは産業と農業で大きな進歩を遂げ、それが国民所得の増加と人口の生活の質の向上につながった。"
 CES_purge_unloyal_polit: "不忠な政治家の粛清"
 CES_purge_unloyal_polit_desc: "我々の指導者は厳しい政治改革を実施することを決定する。これらの改革は、我々の権力を強化し、体制に不忠と見なされる反対勢力を抑圧することを目的としている。"
 nursultan: "ヌルスルタン"
 akmolinsk: "アクモリンスク"
 uzbekgrad: "ウズベクグラード"
 chachkent: "チャーチュケント"
 kyrgyzgrad: "キルギスグラード"
 frunze: "フルンゼ"
 CES_oligarchic_drift: "オリガルヒへの配慮"
 CES_oligarchic_drift_desc: "Pleasing the oligarchs for now is a good option for kickstarting our foreign diplomacy."
 CES_populistic_sentiment: "ポピュリスト感情"
 CES_populistic_sentiment_desc: "我々は公衆をなだめるためにいくらかのお金を使うかもしれない。"
 CES_common_soviet_legacy: "共通のソビエト遺産"
 CES_common_soviet_legacy_desc: "The common Soviet legacy unites all post-Soviet countries and beyond. We shall use this for our diplomatic efforts."
 CES_cis_ties: "CISとのつながり"
 CES_cis_ties_desc: "CIS countries are the closest to us due to the shared historical path we took together."
 CES_us_ties: "米国とのつながり"
 CES_us_ties_desc: "USAIDとの協力は、貧困との闘い、健康と教育の強化のような主要な課題に対処するための技術支援、専門知識、資源へのアクセスを我々に与えることができる。"
 CES_diplo_startup: "外交の始動"
 CES_diplo_startup_desc: "我々の外交は今、他の国々とのより積極的な関与を開始しなければならない。"
 centrasiaev.5.t: "[FROM.GetName]が投資を要請"
 centrasiaev.5.d: "[FROM.GetName]が投資を要請"
 centrasiaev.5.a: "もちろん！"
 centrasiaev.5.b: "断る"
 centrasiaev.6.t: "[FROM.GetName]は我々の申し出を拒否した。"
 centrasiaev.6.d: "[FROM.GetName]は我々の申し出を拒否した。"
 centrasiaev.6.a: "はぁ……"
 centrasiaev.7.t: "[FROM.GetName]は我々の申し出を受け入れた。"
 centrasiaev.7.d: "[FROM.GetName]は我々の申し出を受け入れた。"
 centrasiaev.7.a: "素晴らしい！"
 centrasiaev.8.t: "[FROM.GetName] Asks for Debt Reduction"
 centrasiaev.8.d: "[FROM.GetName] has approached us to renegotiate their debt. We can reduce their debt by $12 billion if we accept, or we can reject their offer. We have very little to lose, and much to gain in terms of our influence over their nation."
 centrasiaev.8.a: "もちろん……"
 centrasiaev.8.b: "申し訳ないが、拒否する"
 centrasiaev.9.t: "ロシアは我々の提案を拒否した。"
 centrasiaev.9.d: "ロシアは我々の提案を拒否した。"
 centrasiaev.9.a: "くそったれ！"
 centrasiaev.10.t: "ロシアは我々の提案を受け入れた。"
 centrasiaev.10.d: "ロシアは我々の提案を受け入れた。"
 centrasiaev.10.a: "ありがとう"
 centralnato.1.t: "カザフスタンがNATO加盟を希望"
 centralnato.1.d: "Kazakhstan has become much more Western-aligned in recent years. Many of our ministers and diplomats have proposed inviting Kazakhstan to join NATO. Should we do it?"
 centralnato.1.a: "彼らを招待しよう！"
 centralnato.1.b: "ええ？いや！"
 centralnato.2.t: "ウズベキスタンがNATO加盟を希望"
 centralnato.2.d: "Uzbekistan has become much more Western-aligned in recent years. Many of our ministers and diplomats have proposed inviting Uzbekistan to join NATO. Should we do it?"
 centralnato.2.a: "彼らを招待しよう！"
 centralnato.2.b: "ええ？いや！"
 centralnato.3.t: "キルギスがNATO加盟を希望"
 centralnato.3.d: "Kyrgyzstan has become much more Western-aligned in recent years. Many of our ministers and diplomats have proposed inviting Kyrgyzstan to join NATO. Should we do it?"
 centralnato.3.a: "彼らを招待しよう！"
 centralnato.3.b: "ええ？いや！"
 centralnato.4.t: "[From.GetNameDef]は我々の申し出を受け入れた"
 centralnato.4.d: "我々は最近NATOに申請書を提出した。[From.GetNameDef]はそれを審査し、決定を下した - 我々は同盟の新しいメンバーである。"
 centralnato.4.a: "非常に良い！"
 centralnato.5.t: "[From.GetNameDef]は我々の申し出を拒否した"
 centralnato.5.d: "我々は最近NATOに申請書を提出した。[From.GetNameDef]はそれを審査し、残念ながら拒否した。"
 centralnato.5.a: "残念だ。"
 centralasianunion.1.t: "[From.GetNameDef]が我々を中央アジア連合への加盟に招待"
 centralasianunion.1.d: "[From.GetNameDef]が我々を中央アジア連合への加盟に招待している、それに同意すべきか？"
 centralasianunion.1.a: "もちろん"
 centralasianunion.1.b: "申し訳ないが、拒否する"
 centralasianunion.2.t: "[From.GetNameDef]が中央アジア連合への加盟に同意"
 centralasianunion.2.d: "我々は最近、[From.GetNameDef]国家に中央アジア連合への加盟を申し出た。そして彼らは肯定的に応答した！"
 centralasianunion.2.a: "非常に良い！"
 centralasianunion.3.t: "[From.GetNameDef]が中央アジア連合への加盟を拒否"
 centralasianunion.3.d: "We recently extended an offer to join the Central Asian Union to the state of [From.GetNameDef]. Unfortunately, they turned down that offer."
 centralasianunion.3.a: "残念だ。"
 centralkaz.1.t: "我々のカザフスタン"
 centralkaz.1.d: "カザフスタンは歴史と自然に富んだ素晴らしい国である。その歴史は何千年にも遡り、スキタイ人やサカ人のような遊牧民がこの土地に居住していた古代から始まる。カザフスタンの歴史の重要な部分は、独特の文化と生活様式が形成された大草原の形成であった。\n\nカザフスタンの歴史の重要な段階の一つは、カザフ・ハン国やジュンガル・ハン国のようなハン国の形成であった。これらの時代は、貿易、文化、芸術の発展によって特徴づけられた。\n\n19世紀、カザフスタンは世界の大国の関心の対象となり、最終的にはロシア帝国に組み込まれた。この時代は、カザフスタンの社会と経済に大きな変化をもたらした。\n\nカザフスタンは、広大な草原、雄大な山々、数多くの湖や川を含むユニークな自然の豊かさを持っている。この自然は今、地域の生態学的バランスを維持するためにますます重要になっている。"
 centralkaz.1.a: "興味深い"
 centraluzb.1.t: "我々のウズベキスタン"
 centraluzb.1.d: "1991年、ウズベキスタンはソビエト連邦から独立を獲得し、これはその歴史における重要な瞬間であった。ウズベキスタンの初代大統領イスラム・カリモフは、長年国を率い、経済、教育、医療の改革を導入した。ウズベキスタンは世界最大の綿花生産国の一つとなり、輸出産業を積極的に発展させた。\n\nウズベキスタンの独立期は、過激主義やテロとの闘いのような課題に直面したが、国は安全保障と安定を強化するために懸命に働いた。\n\n一方、独立時のウズベキスタンの歴史は、経済的および政治的な側面だけに限られていない。国は文化遺産が豊富であり、その人々は彼らの伝統と歴史を誇りに思っている。国民の祝日や祭りは、ウズベク文化と伝統の豊かさを反映している。"
 centraluzb.1.a: "興味深い"
 centralkyr.1.t: "我々のキルギス"
 centralkyr.1.d: "キルギスは1991年にソビエト連邦の崩壊とともに独立を獲得した。この歴史的な瞬間は、今や自分たちの運命を形作ることができるようになったキルギスの人々にとって画期的であった。この期間中、国は民主的制度の構築、経済改革、国家変革を含む様々な課題に直面した。\n\n時間が経つにつれて、キルギスは印象的な成果を上げてきた。国は安定した社会を形成し、国際舞台で積極的な役割を果たしている。キルギスは、伝統的な歌や踊り、そして天山山脈を含む美しい自然を含む文化的な豊かさで有名である。"
 centralkyr.1.a: "興味深い"
 centralkaz.2.t: "カザフスタン軍"
 centralkaz.2.d: "カザフスタン軍は、国の国家安全保障と誇りの重要な構成要素である。1991年に独立を獲得して以来、カザフスタンは積極的に軍隊を発展させ、現代的で、よく訓練され、十分に供給された軍隊を創設しようと努めてきた。\n\nカザフスタン軍には、国の防衛能力の確保、平和維持ミッションへの参加、国境の保護を含む多くの任務がある。また、安全保障問題に関して他の国々と積極的に協力し、共同演習を実施している。"
 centralkaz.2.a: "興味深い"
 centraluzb.2.t: "ウズベキスタン軍"
 centraluzb.2.d: "ウズベキスタン軍は、国家安全保障を確保し、国の利益を保護する上で重要な役割を果たしている。1991年に独立を獲得して以来、ウズベキスタンは積極的に軍隊を発展させ、現代的で専門的な軍隊を創設してきた。\n\nウズベキスタン軍は、国境の防衛、国内の安定維持、国際平和ミッションへの参加を含む幅広い機能を果たしている。それは訓練されており、今日の世界で発生する可能性のある様々な課題に対応する準備ができている。"
 centraluzb.2.a: "興味深い"
 centralkyr.2.t: "キルギス軍"
 centralkyr.2.d: "キルギス軍は、国家安全保障と国の誇りの重要な要素である。1991年の独立以来、キルギスは専門的で現代的な軍隊を創設する努力の中で積極的に軍隊を発展させてきた。\n\nキルギス軍は、国境の防衛、国内の安定維持、平和維持ミッションへの参加を含む様々な機能を果たしている。それは、現代世界が直面する可能性のある様々な課題に対して訓練され準備ができている兵士と将校を誇りに思っている。"
 centralkyr.2.a: "興味深い"
 centralkaz.3.t: "カザフスタン共和国独立10周年記念"
 centralkaz.3.d: "10年前、カザフスタン共和国は独立国家となり、それ以来多くの変化と変革があった。この重要な記念日は、自由と独立への国家の願望を象徴し、国の過去、現在、未来に関する重要な問いを提起する。\n\nこの日、我々は植民地依存の負担からの自由を祝うだけでなく、我が国の国内的な成長と発展も祝う。経済、教育、文化の発展は、我々の国家にとって重要な優先事項となった。カザフスタンはグローバルコミュニティに対してより開かれ、他の国々との関係を強化し、地球規模の問題への対処に積極的に参加した。\n\nこの記念日はまた、希望と楽観主義をもって未来を見据える機会でもある。我々は、国民的アイデンティティを強化し、我が国の持続可能な発展を促進するために働き続けなければならない。\n\nしたがって、カザフスタン共和国独立10周年記念は、我々の成果を祝い、我々が直面している課題を見つめ、我が国の独立と繁栄を維持し強化するという我々のコミットメントを再確認する機会である。"
 centralkaz.3.a: "興味深い"
 centralkaz.4.t: "ヌルスルタン・ナザルバエフ辞任"
 centralkaz.4.d: "30年間の権力の座にあった後、カザフスタンの初代大統領ヌルスルタン・ナザルバエフは辞任することを決定した。この決定は、国内外で驚きと議論の波を引き起こした。\n\nヌルスルタン・ナザルバエフは、ソビエト共和国から強力な経済と地政学的な役割を持つ独立国家へと進化したカザフスタンの発展に巨大な貢献をした。彼の辞任は一つの時代の終わりを示したが、カザフスタンのさらなる発展と民主化への願望も示した。\n\nカザフスタンの新しい大統領は、議会によって選出されたカシムジョマルト・トカエフであった。この権力移行は、民主主義社会の構築における法的手続きと制度への遵守の重要性を強調する、国の憲法に従って行われた。\n\nこれらの出来事は、間違いなくカザフスタンだけでなく、地域全体の政治情勢にも影響を与えた。それらはカザフスタンの未来と世界舞台でのこの国の役割についての議論を求めている。ヌルスルタン・ナザルバエフの決定とカシムジョマルト・トカエフの到着は、カザフスタンの歴史における新しい章の始まりとなるかもしれない。"
 centralkaz.4.a: "興味深い"
 centralkaz.5.t: "憲法改正"
 centralkaz.5.d: "国民投票は、国の統治形態を大幅に変更する憲法改正を承認した。これらの変更は、超大統領制の統治形態から、強力な議会と責任ある政府を持つ大統領共和制への移行を意味した。\n\nこれらの改正の重要な点の一つは、カザフスタンの初代大統領としてのヌルスルタン・ナザルバエフの地位に関するすべての言及を憲法から削除することであった。これは、民主主義原則と権力分立に基づいた国の政治史における新しい時代への移行を象徴した。\n\n憲法の変更はまた、議会の役割を強化し、意思決定における国家機関の重要性を強調した。カザフスタンは、この道をたどり、より民主的で開かれた社会になることを目指している。\n\nヌルスルタン・ナザルバエフが初代大統領の地位から去ることは、カザフスタンの歴史の一章の終わりを意味するが、市民社会と政治機関の役割がより重要になる新しい章の始まりでもある。これらの変更は、統治へのバランスの取れたアプローチと、国の将来の発展における市民の民主的参加の探求を示唆している。"
 centralkaz.5.a: "興味深い"
 centralkaz.6.t: "抗議の始まり"
 centralkaz.6.d: "今日カザフスタンで展開された出来事は、多くの市民を衝撃と不安の状態に残した。国での抗議の始まりは、国内および世界規模の両方で懸念を引き起こした。市民的立場の平和的な表現はどの国にとっても重要であるが、この場合、問題が臨界点に達したように思われる。\n\n抗議の開始につながった過去の出来事は、社会的不公正、汚職、政治改革の問題を前面に押し出した。カザフスタンの市民は不満を表明し、変化を要求している。しかし、抗議は国にとって困難な時期に来ており、分裂にもかかわらず、平和と安定を維持することが重要であることを覚えておくことが重要である。\n\nおそらく今、カザフスタンは紛争のエスカレーションを防ぎ、対話と紛争解決の方法を見つけるために、集団安全保障条約機構（CSTO）からの支援を求めるべきである。国際機関からの協力と支援は、安定を回復し、国を改革と発展の道に乗せる上で重要な役割を果たすことができる。"
 centralkaz.6.a: "暴力的に抗議を鎮圧する"
 centralkaz.6.b: "選挙を実施する"
 centralkaz.7.t: "抗議は続き、カザフスタンはCSTOに支援を要請"
 centralkaz.7.d: "カザフスタンでの抗議の継続と、集団安全保障条約機構（CSTO）への国の支援要請は、真剣な注意と分析を必要とする展開である。当局が紛争を解決しようと試みたにもかかわらず、抗議は続いており、これは国内の深刻な問題を示している。\n\nこのような状況は、危機的な瞬間における国際協力と支援の重要性を強調している。CSTOは、地域の安全と安定を確保することを専門とする国際機関として、紛争の解決とカザフスタンへの必要な支援を提供する上で重要な役割を果たすことができる。"
 centralkaz.7.a: "CSTOに支援を要請する"
 centralkaz.7.b: "選挙を実施する"
 centralkaz.8.t: "カザフスタンが支援を要請"
 centralkaz.8.d: "集団安全保障条約機構（CSTO）へのカザフスタンの支援要請は、国際社会の側で真剣な議論と分析を必要とする出来事である。この要請に対する我々の対応は、考慮されバランスが取れているべきである。\n\nまず第一に、CSTOは国際機関として、国家の主権と独立の尊重の原則を考慮すべきである。我々の対応は、地域の安定と平和を達成する上でカザフスタンを支援することの重要性を強調すべきである。\n\nしかし、CSTOの支援が紛争を悪化させたり、人権侵害につながったりしないことを保証しなければならない。我々の対応には、状況を監視し解決するためのメカニズム、ならびに政府と反対派の間の対話を促進することが含まれるべきである。\n\nカザフスタンの要請に対する我々の対応が、紛争の解決、地域の平和と安定の維持における協力と支援の準備ができていることを強調することが重要である。我々は、カザフスタンが困難を克服し、その人々の幸福を確保するのを助けるために、国際規範と原則に従って行動しなければならない。"
 centralkaz.8.a: "彼らを助けよう"
 centralkaz.8.b: "自分たちで処理させよう"
 centralkaz.9.t: "[FROM.GetNameWithFlag]が我々を助けることに同意"
 centralkaz.9.d: "[FROM.GetNameWithFlag]は、我が国での抗議の鎮圧を助けることに同意した。"
 centralkaz.9.a: "彼らに感謝を！"
 centralkaz.10.t: "[FROM.GetNameWithFlag]は我々を助けることを拒否"
 centralkaz.10.d: "[FROM.GetNameWithFlag] have unfortunately refused to help us quell the protests."
 centralkaz.10.a: "くたばれ！"
 centralkaz.11.t: "CSTO加盟国が抗議鎮圧支援の要請を受諾"
 centralkaz.11.d: "CSTO加盟国は、カザフスタンでの抗議鎮圧における我々の支援要請を受け入れた。"
 centralkaz.11.a: "興味深い"
 centralkaz.12.t: "CSTO軍がアルマトイに到着"
 centralkaz.12.d: "CSTO軍は、抗議を鎮圧するのを助けるためにアルマトイに到着した。"
 centralkaz.12.a: "興味深い"
 centralkaz.13.t: "抗議は終了、政府はCSTO軍と共に鎮圧"
 centralkaz.13.d: "カザフスタンで展開された出来事は、平和的な抗議の権利と、国内の秩序と安全を維持する必要性との間の困難なバランスを強調している。抗議の鎮圧は社会に苦い後味を残し、当局の行動の公正さと合法性について疑問を提起する可能性がある。\n\nCSTOの介入はまた、カザフスタンの主権と、国の内政に対する外部アクターの影響力について疑問を提起する。それは、国益と国際的利益のバランスをとることがいかに難しいかを我々に思い出させる。\n\n今や抗議が終わったので、カザフスタンは国内および世界舞台での信頼を再構築するための長く困難な道のりを前にしている。政府が人権を尊重して行動し、エスカレートする問題を解決するための建設的な方法を見つけるよう努めることが重要である。"
 centralkaz.13.a: "興味深い"
 centralkaz.14.t: "カザフスタンでの抗議は終了"
 centralkaz.14.d: "Protests in Kazakhstan are over. Our forces are coming home."
 centralkaz.14.a: "興味深い"
 centralkaz.15.t: "我々の軍隊が帰国"
 centralkaz.15.d: "我々の軍隊はカザフスタンでの抗議を鎮圧し、終了させ、今や帰国した。"
 centralkaz.15.a: "興味深い"
 centraluzb.3.t: "アンディジャンでの騒乱"
 centraluzb.3.d: "今日はウズベキスタンの歴史に消えない痕跡を残す日となるだろう。朝、アンディジャンの街は抗議の音と変化と正義を要求する多くの声で目覚めた。抗議は始まったばかりだが、すでに人々の意志の強力な表明となっている。\n\n抗議者、主に若者と労働者は、政治改革とより良い生活条件を要求して街頭に出た。彼らは自由と正義のスローガンが書かれたプラカードを運び、彼らの声は情熱と希望に満ちていた。人々は変化と自分たちの国の未来に影響を与える機会を望んでいた。"
 centraluzb.3.a: "暴力的に抗議を鎮圧する"
 centraluzb.3.b: "民主的な選挙を実施する"
 centraluzb.4.t: "アンディジャンでの抗議激化"
 centraluzb.4.d: "アンディジャンでの抗議は激化し、当局の対応は厳しく暴力的であった。特殊部隊は平和的な抗議者に対して力を使用し、これはウズベキスタン内外で怒りの波を引き起こした。平和的な抗議は血なまぐさい衝突に変わり、多くの人々が殺された。"
 centraluzb.4.a: "暴力的に抗議を鎮圧する"
 centraluzb.4.b: "民主的な選挙を実施する"
 centraluzb.5.t: "アンディジャンでの抗議の結果"
 centraluzb.5.d: "The events that took place in the Uzbek city of Andijan in May 2005 left an indelible mark on the history of Uzbekistan and reverberated widely throughout the international community. The Andijan riots were a severe challenge to the Uzbek authorities and caused deep rifts in society.\n\nProtesters in Andijan demanded political reforms and freedom of speech, but the authorities' response was harsh and bloody. Footage and reports of the mass shootings attracted international media attention and led to widespread condemnation of Islam Karimov's regime.\n\nThe Andijan riots were a lesson to Uzbekistan about the need for dialog and the importance of resolving societal problems without resorting to violence. The events also emphasized the importance of respect for human rights and democratic values.\n\nFor the international community, the Andijan incident underscored the importance of supporting human rights and democratic initiatives in regions where they are violated. These events also highlighted the need for careful analysis and response to events occurring in countries with authoritarian regimes.\n\nThe Andijan riots were a tragic event, but they also drew attention to important human rights and democracy issues that remain relevant not only for Uzbekistan, but for the entire global community."
 centraluzb.5.a: "残念だ。"
 centraluzb.6.t: "イスラム・アブドゥガニエヴィチ・カリモフ逝去"
 centraluzb.6.d: "今日、イスラム・カリモフ大統領が脳出血で亡くなった。現ウズベキスタン共和国首相であるシャフカト・ミロノヴィッチ・ミルジヨエフがウズベキスタン大統領となった。"
 centraluzb.6.a: "残念だ。"
 centralkyr.3.t: "アメリカ空軍基地マナス"
 centralkyr.3.d: "2001年、9月11日の悲劇的な出来事の後、世界はテロの脅威に直面し、この挑戦に応えて多くの国々が世界テロとの闘いで団結した。我々もまた、テロを打ち負かすのを助け、マナス基地のための領土を提供することができる。我々はそれを行うべきか？"
 centralkyr.3.a: "彼らに基地を与えよう"
 centralkyr.3.b: "彼らに自分たちでテロと戦わせよう"
 centralkyr.4.t: "キルギスが基地のための領土を提供"
 centralkyr.4.d: "キルギスは世界テロとの闘いで我々を助けることを決定し、我々のアメリカ基地マナスを収容するための領土を提供した。"
 centralkyr.4.a: "興味深い"
 centralkyr.5.t: "アメリカ空軍基地マナス"
 centralkyr.5.d: "我々はアメリカのマナス空軍基地を収容するために我々の領土を利用可能にした。アメリカのマナス空軍基地は不朽の自由作戦中に重要なセンターとなり、キルギスタンだけでなく、地域全体の安全と安定に大きな影響を与えた。基地はテロとの闘いとアフガニスタンへの人道援助を提供する共同努力の場であった。"
 centralkyr.5.a: "興味深い"
 centralkyr.6.t: "地元住民が抗議"
 centralkyr.6.d: "キルギスのジャララバード州アクシ地区ボスピエク村の地元住民が、キルギス領土の一部（90,000ヘクタール）の中国への譲渡に抗議している。これに対する我々の対応はどうなるだろうか？"
 centralkyr.6.a: "土地を引き渡し、抗議者を撃て！！！"
 centralkyr.6.b: "わかった、譲歩しよう、そして土地は譲渡しない。"
 centralkyr.7.t: "アクシ事件"
 centralkyr.7.d: "The Aksy events refer to the shooting of a demonstration by local residents of the village of Bospiek, Aksy district, Jalal-Abad region of Kyrgyzstan on March 17, 2002, protesting against the transfer of part of Kyrgyz territory (90,000 hectares) to China."
 centralkyr.7.a: "街頭に出る必要はなかった！！！"
 centralkyr.8.t: "チューリップ革命の始まり"
 centralkyr.8.d: "今日はキルギスの歴史にチューリップ革命の始まりとして永遠に残る日である。この日は、国中の隅々に影響を与えた大規模な抗議と市民活動によって特徴づけられた。\n\nアスカル・アカエフ大統領が人口の不満を引き起こした改革を承認してから数日が経過していた。最初は、これらの措置が国を革命の瀬戸際に追いやるとは誰も想定できなかった。しかし、変化への願望によって団結した若者、学生、そして一般市民は、首都や他の都市の街頭に出た。\n\n民主主義、公正な選挙、言論の自由を要求するスローガンが、アラ＝トー広場やビシュケクの通り沿いで聞かれた。何千ものチューリップの花が平和とより良い未来への希望の象徴となった。数日間の途切れることのない集会と抗議が経過し、この感動的な危機が大きな革命になったように思われる。"
 centralkyr.8.a: "我々は後退しない"
 centralkyr.8.b: "すべての反対派メンバーを投獄せよ"
 centralkyr.8.c: "すべての反対派メンバーを撃て"
 centralkyr.8.d1: "民主的な選挙を実施せよ、我々は人民のためだ！"
 centralkyr.9.t: "ますます多くの人々が街頭に出ている"
 centralkyr.9.d: "キルギスでのチューリップ革命の開始から数日が経過したが、興奮と民衆の活動は衰えていない。キルギスの都市の街路は、人々の怒りと変化への渇望を表現する場であり続けている。\n\n毎日、最前線にいる人々の決意と連帯に触発され、より多くの市民が街頭に出ている。集会と大規模な抗議は、日常生活の不可欠な部分となった。ビシュケクのアラ＝トー広場、ならびに他の公共の場所は、人々が不満を表明し変化を要求する活動の中心となっている。\n\n革命の象徴であるチューリップは、どこにでもある - 少女たちの髪に、コートの襟に、そして車にさえも。それらはより良い未来への希望と、民主主義と正義への願望を表している。"
 centralkyr.9.a: "興味深い"
 centralkyr.10.t: "最初の行政庁舎が解放された"
 centralkyr.10.d: "キルギスにおける革命の力は衰えず、人々は自分たちの権利と民主的な変化のために戦い続けている。この運動における新しい重要な節目は、権力と支配の象徴となった地域行政庁舎の解放であった。\n\nこの瞬間は、市民が要求と不満を表明した多くの日々の抗議と集会の後に来た。以前は一般市民がアクセスできなかった行政庁舎は、今や彼らの管理下にある。これは民衆の意志の一種の勝利であり、政府が人々の利益に奉仕しなければならないという象徴であった。\n\n行政庁舎の解放は、キルギス人民の決意と連帯、体制変革と民主主義確立のために戦う意欲を強調している。これらの瞬間、革命の象徴であるチューリップが建物や人々を飾り、この重要な瞬間とともに来た希望と自由を皆に思い出させている。"
 centralkyr.10.a: "Interesting."
 centralkyr.11.t: "人々がアカエフの肖像画を燃やす"
 centralkyr.11.d: "革命のオーケストラ音楽に合わせて、アカエフの肖像画が様々な場所から集められ、公共の広場に運ばれた。そこで、燃える松明の前で、そして群衆の喜びの叫び声に合わせて、それらは炎の中に投げ込まれた。炎は元指導者のイメージを飲み込み、この鮮やかなイメージは過去との最終的な決別の象徴となった。\n\nアカエフの肖像画を燃やすこの行為は、長い間国を飲み込んできた権威主義と腐敗から自らを解放するという人々の決意を象徴している。それは、権力が専制政治を象徴するのではなく、人々の利益に奉仕する新しい始まりへの希望を物語っている。それは、彼らの国の新しい時代の始まりの象徴として、キルギス人民の記憶に残る行為である。"
 centralkyr.11.a: "興味深い"
 centralkyr.12.t: "革命は終わりに近づき、内閣は解放された"
 centralkyr.12.d: "キルギスにおける革命はその最終段階にあり、変化への希望はますます明確になった。この運動における重要な瞬間は、権威主義体制の待望の終わりを象徴する、閣僚の内閣の解放であった。\n\n数ヶ月にわたる大規模な抗議と市民的不服従の行為の後、内閣府は元役人と、法律違反と人々の信頼の侵害につながった行動からクリアされた。この瞬間は、腐敗と権威主義に対する人々の勝利を象徴した。\n\n以前はもっぱら体制の利益に奉仕していた建物が、今やキルギスの未来が民主主義の精神で議論され形作られることができる自由な空間となった。革命の象徴であるチューリップが近隣を飾り、この重要な瞬間とともに来た希望と自由を我々に思い出させている。"
 centralkyr.12.a: "興味深い"
 centralkyr.13.t: "革命は終了、早期大統領選挙"
 centralkyr.13.d: "数ヶ月にわたる政治的混乱と大規模な抗議の後、キルギスにおけるチューリップ革命は、臨時大統領選挙の実施をもってその結論を見出した。この日は、国内の民主的変化のための長い闘争の終わりを象徴した。\n\n選挙は、キルギスの新しい未来を定義した待望の歴史的瞬間であった。幅広い政党と候補者が参加したが、クルマンベク・バキエフが人々の最大の支持を得た。彼の勝利は決定的であり、それは国内の変化と安定を見たいという人々の願望の表明であった。\n\n選挙結果は、新しい統治への希望と民主主義への願望を反映していた。キルギスはバキエフの中に新しい指導者を見出し、今や安定の回復、腐敗との闘い、民主的制度の発展という複雑な課題に直面していた。\n\nこの瞬間は、一つの時代の終わりとキルギスの歴史における新しい章の始まりを示し、そこではより良い未来への希望と民主主義への願望が生き生きと強く残っていた。"
 centralkyr.13.a: "新しい時代だ！"
 centralkyr.14.t: "4月革命の始まり"
 centralkyr.14.d: "歴史的な4月革命が今日キルギスで始まり、変化への人々の願望に平和的なメッセージを送った。何千人もの市民が首都ビシュケクのアラ＝トー広場に集まり、権威主義体制に抗議した。この日の出来事は、キルギスの歴史における重要な点を示している。\n\n抗議者は正義、民主主義、人権尊重を要求した。街路には緊張があったが、より良い未来への希望もあった。議会と政府が注目の中心であり、人々は彼らの辞任を要求した。\n\n自己組織化された市民自警団が街をパトロールし、秩序と安全を確保した。平和的な行動は祈りと歌を伴い、キルギス人民が変化をもたらす決意を象徴していた。\n\nキルギスにおける4月革命の開始は、市民参加と統一の力が国内に変化をもたらすことができることを示した。この出来事は、キルギスの歴史における新しい時代をもたらした大きな政治的変化の出発点であった。"
 centralkyr.14.a: "我々は後退しない"
 centralkyr.14.b: "すべての反対派メンバーを投獄せよ"
 centralkyr.14.c: "すべての反対派メンバーを撃て"
 centralkyr.14.d1: "民主的な選挙を実施せよ、我々は人民のためだ！"
 centralkyr.15.t: "人々がバキエフの肖像画を燃やす"
 centralkyr.15.d: "これはキルギスの歴史において、クルマンベク・バキエフ大統領の権威主義的支配に対する民衆の不満が頂点に達した瞬間である。象徴的な抗議の恐ろしい行為として、何千人もの市民が指導者の肖像画を運んで街頭に出、それらを炎の中で燃やした。\n\nこの出来事は、バキエフ政権における長期間の政治的不安定、経済悪化、汚職疑惑の後に起こった。人々は自分たちの利益と権利が組織的に無視されてきたと感じ、怒りと絶望を表明することを決定した。バキエフの肖像画を燃やすことは、彼の権力からの象徴的な解放の行為であった。"
 centralkyr.15.a: "興味深い"
 centralkyr.16.t: "人々がAPCを乗っ取る"
 centralkyr.16.d: "抗議という共通の目標によって団結した人々は、政府の権威と力の象徴であった装甲兵員輸送車（APC）を奪取することができた。この行為は、抗議者の決意と団結の明確なデモンストレーションであった。人々は文字通り、通常は政府が抗議を鎮圧するために使用する軍事装備を解放し、それを自分たちの力と決意の象徴に変えた。APCの奪取は、国内の権力関係の変化の強力なシグナルを送り、人々に自分たちの利益のために変化をもたらすことができるという感覚を与えた。"
 centralkyr.16.a: "興味深い"
 centralkyr.17.t: "人々がアカエフの肖像画を燃やす"
 centralkyr.17.d: "革命のオーケストラ音楽に合わせて、アカエフの肖像画が様々な場所から集められ、公共の広場に運ばれた。そこで、燃える松明の前で、そして群衆の喜びの叫び声に合わせて、それらは炎の中に投げ込まれた。炎は元指導者のイメージを飲み込み、この鮮やかなイメージは過去との最終的な決別の象徴となった。\n\nアカエフの肖像画を燃やすこの行為は、長い間国を飲み込んできた権威主義と腐敗から自らを解放するという人々の決意を象徴している。それは、権力が専制政治を象徴するのではなく、人々の利益に奉仕する新しい始まりへの希望を物語っている。それは、彼らの国の新しい時代の始まりの象徴として、キルギス人民の記憶に残る行為である。"
 centralkyr.17.a: "興味深い"
 centralkyr.18.t: "略奪者がビシュケクのキルギス大統領クルマンベク・バキエフの家を荒らす"
 centralkyr.18.d: "人々がクルマンベク・バキエフの権威主義体制に抗議した4月革命の勃発後、多くの市民が怒りと不満、ならびに権利剥奪感と当局の腐敗感を表明した。\n\n大統領の家の略奪は、民衆の拒絶と復讐の象徴的な行為であった。略奪者はこの行動を長年の不正な支配に対する報復と見なしたかもしれない。出来事を取り巻く炎と混乱は、政府と市民の間の深い亀裂を強調した。\n\nこの出来事はまた、感情と民衆の不満が時に制御不能になる可能性がある革命運動の複雑さと予測不可能性を示唆した。それは変化のために戦う人々の粘り強さを思い出させ、キルギスの未来と国を安定させるための長期的な解決策を見つける必要性について重要な問いを提起した。"
 centralkyr.18.a: "興味深い"
 centralkyr.19.t: "革命は終了、ローザ・オトゥンバエヴァがキルギスの暫定大統領に任命"
 centralkyr.19.d: "これは、クルマンベク・バキエフ大統領の失脚につながった不安定と大規模な抗議の期間の後、キルギスの歴史における重要な転換点である。\n\n経験豊富な政治家であり外交官であるローザ・オトゥンバエヴァは、国に安定をもたらし秩序を回復するために、この重要な移行期の役割に選ばれた。彼女の任命は、政治的変化の必要性と統治の民主的原則への回帰についての重要なメッセージを送った。\n\nそれはまた、キルギスにおける女性の政治参加の重要性と、平和と新しい政治秩序への移行プロセスにおいて重要な役割を果たす能力を強調した。ローザ・オトゥンバエヴァは中央アジアで最初の女性大統領となり、人権、民主主義、社会正義の尊重に基づいた未来への希望を高めた。\n\nこの出来事は、革命的変化の期間から、キルギスにおける新しい統治構造と民主主義社会の構築プロセスへの移行を表している。"
 centralkyr.19.a: "選挙後までローザを暫定大統領として維持する"
 centralkyr.19.b: "ローザは予定より早く大統領になるだろう"
 centralkyr.20.t: "臨時大統領選挙が実施され、アタンバエフが決定的に勝利"
 centralkyr.20.d: "臨時大統領選挙はキルギスの政治史における重要な瞬間であり、民主的変化への移行に対する国家の決意を反映していた。これらの選挙は人々に自由に指導者を選ぶ機会を与え、その結果は彼らの意志の明確な表明であった。\n\n野党の卓越した政治家であり指導者であるアタンバエフは、説得力のある過半数で勝利した。彼の勝利は民衆の信頼と支持の反映として認識された。彼は移行期間を通じて国を導き、キルギスを安定、民主主義、発展の道に戻す任務を託された。"
 centralkyr.20.a: "新しい時代だ！"
 centralkyr.21.t: "第三革命の始まり"
 centralkyr.21.d: "キルギス、2020年10月、新しい変化の時代を目撃した。今日、この国の歴史は今後何世紀にもわたって記憶されるであろう新しいページを書き始めた。勃発した大規模な抗議と市民不安は、キルギスにおける第三革命の始まりであった。\n\n何千人もの市民が変化を要求して首都や他の都市の街頭に集まったとき、国内の状況は不安定になった。抗議者の主な要求は、腐敗との闘い、政府システムの民主化、経済状況の改善であった。\n\n若い世代と様々な階層の活動家がこの革命を推進し、ソーシャルメディアや他のコミュニケーション手段を利用して彼らの努力を調整した。自由と正義のスローガンの下で、彼らは自分たちの未来のために戦う準備ができている。"
 centralkyr.21.a: "我々は後退しない"
 centralkyr.21.b: "すべての反対派メンバーを投獄せよ"
 centralkyr.21.c: "すべての反対派メンバーを撃て"
 centralkyr.21.d1: "民主的な選挙を実施せよ、我々は人民のためだ！"
 centralkyr.22.t: "抗議者がビシュケクのジョゴルク・ケネシ庁舎の門を破壊"
 centralkyr.22.d: "主に若い市民からなる抗議者の群衆が、変化と彼らの要求への回答を要求して、キルギス議会であるジョゴルク・ケネシの前に集まった。\n\n突然、雰囲気はより緊張し、空気中の興奮が感じられた。政府の目に見える変化の欠如に怒った抗議者のグループが、議会の門を破壊し始めた。このシナリオは、市内の緊張と不安を高めることにつながった。\n\n市民によるこのような行動は、深い不満と彼らが見たいと願う待望の変化を示している。この行動の結果がどうなるかは時が経てばわかるだろうが、それは確かに抗議者が阻止されず、自分たちの権利と理想のために戦い続ける決意を示した。"
 centralkyr.22.a: "興味深い"
 centralkyr.23.t: "抗議者がジョゴルク・ケネシの占拠を祝う"
 centralkyr.23.d: "キルギスの第三革命が新たな高みに達する中、ビシュケクは進行中の変化の時代を目撃した。興奮と変化への願望に掴まれた、怒り決意した抗議者は、ジョゴルク・ケネシ庁舎を占拠しただけでなく、議会の前で彼らの成果を祝った。\n\n壮大な議会庁舎の前には、希望と自由の火が燃える多くの焚き火があった。市民の群衆がこれらの焚き火の周りに集まり、彼らの精神と決意を象徴して、炎を空高く掲げた。\n\n夜は、変化への願望で団結した人々の祝賀の一種に変わった。若者、活動家、一般市民が、彼らの行動と決意が腐敗と不寛容のない新しい未来への道を開くことを知って、彼らの希望と夢を共有した。議会前でのこの祝賀の瞬間は、キルギス人民が自国における正義と民主主義のために戦う揺るぎない決意を象徴した。"
 centralkyr.23.a: "興味深い"
 centralkyr.24.t: "抗議者が大統領執務室に"
 centralkyr.24.d: "大規模な抗議の波と変化への願望に続き、ビシュケクの抗議者は、現在の政治体制に対する彼らの抗議と不満を象徴して、大統領執務室を襲撃することを決定した。第三革命におけるこの画期的な瞬間、今日、彼らは現職大統領ソーロンバイ・シャリポヴィチ・ジェーンベコフの肖像画が置かれていた大統領執務室を襲撃した。\n\n抗議者のグループが破壊的な決意をもって壁の定位置から大統領の肖像画を壊し引き裂き始めたとき、耳をつんざくような騒音と興奮が部屋を満たした。この行為は、現在の指導者に対する不満だけでなく、変化と自国の新しい未来を見たいという人々の願望も象徴した。"
 centralkyr.24.a: "興味深い"
 centralkyr.25.t: "革命は終了、臨時大統領選挙が実施"
 centralkyr.25.d: "数日にわたる激しい抗議活動、大規模なデモ、政治的変化を経て、キルギスタンはついに民主的な未来への道を見つけた。2020年に始まった出来事は、待望の変化を勝利に導いた臨時大統領選挙で最高潮に達した。\n\n選挙では、何百万人ものキルギスタン人が意思を表明し、結果は明白だった。民主主義と反汚職の理想を象徴する候補者、サディル・ジャパロフが圧勝したのだ。彼の当選は、変化と民主的改革を求める多くの市民の声を反映したものだった。\n\n新大統領は、多大な変革と汚職との闘いを約束して就任した。それはまた、市民参加と民主主義の追求が、国に前向きな変化をもたらすことの象徴でもあった。キルギスタンは、明るい未来への希望と期待に満ちた歴史の新たな章を開く。"
 centralkyr.25.a: "新しい時代だ！"
 centralkyr.26.t: "すべての反対派メンバーが逮捕下に置かれた"
 centralkyr.26.d: "Today, the revolutionary movement in the capital suddenly fell silent as all its key figures were arrested and isolated from society. This abrupt suppression of the opposition has caused confusion in the country and hopes for change have been dashed. The authorities have shown hardline opposition to dissidents, leaving little room for dialog and peaceful movements."
 centralkyr.26.a: "暴動を起こす必要はなかった！"
 centralkyr.27.t: "すべての反対派メンバーが射殺された"
 centralkyr.27.d: "今日、首都の革命運動は、当局が反対派志向の市民の大量銃撃に訴えたため、極端な残虐行為で鎮圧された。この悲劇的な出来事の転換は、国内外で深い嫌悪感と憤りを引き起こした。弾圧は壊滅的な結果をもたらし、基本的人権と道徳的価値観の尊重の問題を提起した。"
 centralkyr.27.a: "暴動を起こす必要はなかった！"
 centralkyr.28.t: "別の大統領選挙"
 centralkyr.28.d: "キルギスにおける別の大統領選挙は、二人の経験豊富で著名な政治家、ソーロンバイ・ジェーンベコフとアルマズベク・アタンバエフを提示し、国家にとって重要な決定を提起する。この選択は国の未来にとって極めて重要であり、キルギス社会が直面している複雑な政治的ジレンマを反映している。\n\nソーロンバイ・ジェーンベコフとアルマズベク・アタンバエフは共に広範な政治経験を持ち、国民的人物である。彼らのそれぞれがキルギスの未来についての彼のビジョンを表しており、彼の支持者を持っている。\n\n二人の間の選択は、しばしば政治プロセスに伴う安定と変化の間の弁証法を反映している。この選択はキルギスの発展における重要な一歩となり、未来への道筋を決定するだろう。"
 centralkyr.28.a: "ソーロンバイ・ジェーンベコフ - 我々の選択！"
 centralkyr.28.b: "現職大統領を維持する。"
 centralinvestments.1.t: "大統領訪問"
 centralinvestments.1.d: "大統領は、国際関係を強化し経済協力を発展させるために別の国を訪問することを決定した。大統領はこの国への投資意欲を表明し、それが雇用を創出し経済を発展させるのに役立つ。どの国が投資にとって最も有望か？"
 centralinvestments.1.a: "最初の申し出"
 centralinvestments.1.b: "二番目の申し出"
 centralinvestments.1.c: "三番目の申し出"
 centralinvestments.1.d1: "誰もいない！"
 CES_russian_debt_negotiations: "ロシア債務交渉"
 CES_russian_debt_negotiations_desc: "Russian debt negotiations can be very beneficial for us and the Russians."
 CES_western_invest_negotiations: "西側への投資要請"
 CES_western_invest_negotiations_desc: "Western countries may consider investing in us if we present them with attractive options."
 CES_econ_Partnership: "Economic Partnership with Russia"
 CES_econ_Partnership_desc: "In recent years, our country and Russia have continued to develop trade ties and cooperation in various fields."
 CES_asking_money: "英国への資金要請"
 CES_asking_money_desc: "These funds will be used for several key initiatives to strengthen our country."
 CES_our_stance: "我々の立場"
 CES_our_stance_desc: "我々は、我が国が世界舞台で積極的な地位を占め、地球規模の問題の解決と平和と安定の維持に貢献するよう努めている。"
 CES_indian_diplomacy: "インド外交"
 CES_indian_diplomacy_desc: "インドは世界最大の経済圏と国家の一つである。インドとの協力は、我々に巨大な市場と貿易および投資の潜在力へのアクセスを与え、それが我々の経済成長に貢献する。"
 CES_enter_act_east: "東方との協力"
 CES_enter_act_east_desc: "東方諸国は巨大な市場と投資源を表している。彼らとの協力は、我々の経済成長と発展のための新しい機会を開き、我々の貿易と投資の関係を拡大する。"
 CES_indian_protection: "インドの保護"
 CES_indian_protection_desc: "インドは地域および世界において大きくて影響力のある国である。インドとのパートナーシップを維持することは、地域の安定と安全に貢献し、それが我々の国家安全保障の重要な要素である。"
 CES_central_asian_union: "中央アジア連合"
 CES_central_asian_union_desc: "中央アジアは、天然資源と文化遺産が豊富なユニークな地域である。連合の創設は、地域の国々が協力を強化し、資源を最大限に活用することを可能にするだろう。"
 CES_individual_trade_partner: "個別貿易パートナー"
 CES_individual_trade_partner_desc: "中央アジア地域の各国は、ユニークな資源、特徴、潜在力を持っている。個別の貿易パートナーを見つけることは、これらの資源を最大限に活用し、相互に利益のある商品とサービスの交換のための条件を作り出すことを可能にする。"
 CES_russian_military_bases: "ロシア軍事基地"
 CES_russian_military_bases_desc: "我々のロシアとの協力は長い歴史を持ち、相互尊重と信頼に基づいている。我々の領土にあるロシア軍事基地は、我々の戦略的関係の強化に貢献し、共同の安全を保証する。"
 CES_partner_cis_un: "CISとのパートナーシップ"
 CES_partner_cis_un_desc: "CISは、経済、安全保障、教育、文化を含む様々な分野での協力のためのプラットフォームである。"
 CES_full_eaeu_integr: "EAEUへの完全統合"
 CES_full_eaeu_integr_desc: "EAEUは、その領土内で商品、サービス、資本、労働力の自由な移動を保証する。これは経済成長、起業家精神、雇用創出に貢献する。"
 CES_entering_CSTO: "CSTOの保証"
 CES_entering_CSTO_desc: "CSTOは、脅威が発生した場合の軍事支援と連帯の保証を提供し、地域の安定の重要性を強調する。"
 CES_china_ties_un: "中国とのつながり"
 CES_china_ties_un_desc: "中国は世界最大の経済圏の一つを表している。それとの協力は、我々に巨大な市場と投資へのアクセスを与え、それが我々の経済発展に貢献する。"
 CES_chinese_agreement: "中国との協定"
 CES_chinese_agreement_desc: "中国との貿易協定は、関税および非関税障壁を削減するのに役立ち、それが相互貿易を促進し投資を奨励する。"
 CES_ask_china_protect: "中国に我々を守るよう要請"
 CES_ask_china_protect_desc: "China now has much in common with us. They should extend their protection to us."
 CES_eu_kazuz: "EUとのパートナーシップ"
 CES_eu_kazuz_desc: "Although the EU is relatively far from us, their model is very appealing and we should follow it."
 CES_korean_pact_trade: "韓国との貿易協定"
 CES_korean_pact_trade_desc: "韓国は東方で最も繁栄している民主主義国の一つである。我々は彼らとの貿易を増やすべきである。"
 CES_entering_nato: "米国の保証"
 CES_entering_nato_desc: "NATOは我々の地域を網羅していないが、我々は西側に我々を参加させるよう要請するかもしれない。"
 jihad.1.t: "相互軍事協力"
 jihad.1.d: "Diplomats from Central Asia are offering us military cooperation to achieve common goals in the name of the Islamic revolution. Such cooperation will allow us to strengthen our position on the world stage."
 jihad.1.a: "そのような協力こそ成功への鍵だ"
 jihad.1.b: "我々は自分たちで守れる。タリバンは助けを必要としない。"
 CES_revolution_1_tt: "§Yもし我々が後退しなければ、我々大統領は反対派によって打倒され、次の革命もそう遠くないだろう。§!\n\n"
 CES_revolution_2_tt: "§Yもし我々がすべての反対派メンバーを投獄すれば、我々は現職大統領を維持するだろう。§!\n\n"
 CES_revolution_3_tt: "§Yもし我々がすべての反対派メンバーを射殺すれば、我々は現職大統領を維持し、次の革命は起こらないだろう。§!\n\n"
 CES_revolution_4_tt: "§Yもし我々が民主的な選挙を実施すれば、民主的な大統領のおかげで、我が国ではもはや革命は起こらないだろう。§!\n\n"
 gla_forces_tt: "§Y我々はGLA部隊を編成するだろう§!"
 chechenskaya_machina_tt: "我々はチェチェンでイスラム反乱を開始するだろう"
 CES_red_tt: "§Y共産主義政策が発効し、国の状態を変えるだろう！§!"
 gdp_kaz_200_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y199§!億ドル)"
 gdp_kaz_300_tt: "GDP ($$[?gdp_total|Y]億ドル) > GDP ($§Y299§!億ドル)"
