 IND_disasters_mechanic: "印度尼西亚的运气真糟糕"
 IND_disasters_mechanic_desc: "印度尼西亚非常幸运，拥有丰富的自然资源、人力和意志力来冲刺21世纪。\n然而，§H印度尼西亚面临着许多阻碍其进步的挑战§!。§R灾难§!是一个§R共同的主题§!，如果不是为了更好地照顾特定地区，事故很容易避免。\n\n因此，我们有义务和责任及时关注我们的国家，避免造成严重伤害的灾难性命运。\n\n我们将在相当长的一段时间内继续遭受灾难，但是如果我们迅速解决它们，它们最终会在一段时间后停止！"
 IND_back_muslim: "支持穆斯林"
 IND_back_muslim_desc: "我们是伊斯兰国家！因此，我们必须不惜一切代价保护我们的穆斯林。这样做，将为我们赢得民众的支持，并消除伊斯兰占多数的苏莱威西人对我们的任何仇恨。\n\n\n\n谈判是无意义的，必须立即开始！"
