 BHU.Neutral_Autocracy_desc: ""
 BHU.Monarchist: "£generic_Monarchist_small ワンチュク家"
 BHU.Monarchist_desc: ""
 BLR.liberalism: "£BLR_liberalism (EB) ヨーロッパのベラルーシ"
 BLR.liberalism_desc: "親欧州自由主義 - ヨーロッパのベラルーシ（ベラルーシ語ローマ字表記：Ewrapiejskaja Biełaruś）\n\n ヨーロッパのベラルーシは、ベラルーシ国内の親欧州派による連合体である。同団体は、反ロシア的な主張を明確に打ち出しており、政権掌握後はロシアに関連するすべての協定から離脱する意向を示している。"
 BLR.socialism: "£BLR_western_socialism (BSDP) ベラルーシ社会民主党（人民会議）"
 BLR.socialism_desc: "社会民主主義 - ベラルーシ社会民主党（人民会議）（ベラルーシ語ローマ字表記：Bielaruskaja Sacyjal-Demakratyčnaja Partyja (Narodnaja Hramada)）\n\n ベラルーシ社会民主党はベラルーシの政党である。当初、同党は1991年3月2日にベラルーシ社会民主会議として設立され、1996年6月29日に人民合意党と合併するまでこの名称で活動していた。その結果、 ベラルーシ社会民主党（人民会議）となり、2005年6月24日までこの名称で活動した。同党は、ベラルーシ社会主義会議（1902年～1918年）およびベラルーシ社会民主党（1918年～1924年）の伝統を継承しており、社会主義インターナショナルおよび進歩同盟に加盟する政党の連合に属している。同党はまた、ルカシェンコ政権に反対している。"
 BLR.Communist-State: "£BLR_Communist_State (KPB) ベラルーシ共産党"
 BLR.Communist-State_desc: "マルクス・レーニン主義 - ベラルーシ共産党（ベラルーシ語ローマ字表記：Kamunistyčnaja Partyja Bielarusi）\n\n ベラルーシ共産党（KPB）は、1996年にベラルーシ共産党（PKB）内部において、同国大統領が推進する政策に対する見解の相違を背景に、親ルカシェンコ派が分離して結成された。KPBはアレクサンドル・ルカシェンコ大統領の政策を支持しており、同国最大の共産主義組織である。"
 BLR.Conservative: "£BLR_Conservative ルカシェンコ政権"
 BLR.Conservative_desc: "アレクサンドル・ルカシェンコは権力の座に固執しており、そう簡単に手放すつもりはない。彼は自らの思想に熱烈な支持者たちを集めている。彼のイデオロギーは明らかに親ロシア的であり、経済・社会面での可能な限り深い統合を志向している。しかしそれにもかかわらず、ルカシェンコは依然として、西側だけでなく東側――具体的には中国――にもパートナーを求めている。そのため、彼はロシアの完全な傀儡になることなく、ロシアと駆け引きを図ろうとしている。"
 BLR.Autocracy: "£BLR_Autocracy (BPP) ベラルーシ愛国党"
 BLR.Autocracy_desc: "左派ナショナリズム - ベラルーシ愛国党（ベラルーシ語ローマ字表記：Bielaruskaja Patryjatyčnaja Partyja）\n\n ベラルーシ愛国党は、1996年にアレクサンドル・ルカシェンコ大統領の熱心な支持者たちによって結成された。同党の目標は、社会的に公正な社会の構築を推進すること、兄弟諸国民、とりわけロシア、ベラルーシ、ウクライナの連合の再生を促進すること、ベラルーシを危機から脱却させるための選挙公約や緊急措置の実施に向けた大統領の取り組みを支持すること、あらゆる分野においてベラルーシの国益、名誉、尊厳を守ることにある。"
 BLR.anarchist_communism: "£BLR_anarchist_communism (RPLJ) 労働正義共和党"
 BLR.anarchist_communism_desc: "左派ポピュリズム - 労働正義共和党（ベラルーシ語ローマ字表記：Respublikanskaja Partyja Pracy i Spraviadlivaści）\n\n 労働正義共和党は、1993年に結成された社会主義政党である。同党は福祉国家の構築や計画経済への部分的な移行を支持しているが、社会保守主義を掲げている。同党はCIS内の同種の政党と積極的に協力しており、西側諸国に対して極めて否定的な姿勢をとっている。"
 BLR.Neutral_conservatism: "£BLR_Neutral_conservatism (BCD) ベラルーシ・キリスト教民主主義"
 BLR.Neutral_conservatism_desc: "キリスト教民主主義 - ベラルーシ・キリスト教民主主義（ベラルーシ語ローマ字表記：Bielaruskaja Chryścijanskaja Demakratyja）\n\n ベラルーシ・キリスト教民主主義は、20世紀にベラルーシの独立を求めて戦った同名の政党の後継政党である。同党はキリスト教民主主義をイデオロギーとして掲げ、権威主義に反対している。"
 BLR.oligarchism: "£BLR_oligarchism (LDPB) ベラルーシ自由民主党"
 BLR.oligarchism_desc: "親ロシアポピュリズム - ベラルーシ自由民主党（ベラルーシ語ローマ字表記：Libieraĺna-Demakratyčnaja Partyja Bielarusi）\n\n 自由民主党はベラルーシ最大の政党であり、1994年にソビエト連邦自由民主党のベラルーシ支部を母体として設立された。1999年10月以来、自由民主党は「建設的野党」としての立場を打ち出している。"
 BLR.neutral_Social: "£BLR_neutral_Social (BSDH) ベラルーシ社会民主会議"
 BLR.neutral_Social_desc: "社会民主主義 - ベラルーシ社会民主会議（ベラルーシ語ローマ字表記：Bielaruskaja Sacyjal-Demakratyčnaja Hramada）\n\n ベラルーシ社会民主会議はベラルーシの政党である。同党の名誉党首は、著名な政治家であり、独立ベラルーシの初代大統領であったスタニスラフ・シュシュケヴィチであった。1999年の第2回党大会で採択されたBSDHの綱領では、BSDHは中道右派の政党であると明記されている。その名称にもかかわらず、同党は社会民主主義政党の間で確立された経済の国家統制という原則には従わず、多層的な経済、とりわけ市場経済を提唱している。BSDHの第二の特徴は、綱領においてベラルーシの国民的復興と国家の独立強化に大きな役割が割り当てられている点である。（これもまた「右派」的な傾向の伝統的な兆候である）"
 BLR.Neutral_Communism: "£BLR_Neutral_Communism (BPL) ベラルーシ左翼党「公正な世界」"
 BLR.Neutral_Communism_desc: "革命的社会主義 -  ベラルーシ左翼党「公正な世界」（ベラルーシ語ローマ字表記：Bielaruskaja Partyja Lievych 'Spraviadlivy Sviet'）\n\n ベラルーシ左翼党は、1991年にベラルーシ共和国領内における白ロシア共産党の活動停止を受け、ベラルーシ共産党（PKB）の名称で結成された。1996年、ルカシェンコ大統領の政策を支持していた一部の党員が党を離脱し、親大統領派のベラルーシ共産党（KPB）を結成した。現在、「公正な世界」はルカシェンコ政権に反対している。同党は広範な地方組織網を有しており、欧州左派の一員である。"
 BLR.Neutral_green: "£BLR_neutral_green (BGP) ベラルーシ緑の党"
 BLR.Neutral_green_desc: "環境進歩主義 - ベラルーシ緑の党（ベラルーシ語ローマ字表記：Bielaruskaja Partyja 'Zialionyja'）\n\n ベラルーシ緑の党は、環境問題を最優先課題と位置づけ、LGBTの権利を公に支持する進歩的な政党である。また、同党は死刑制度や権威主義にも反対している。"
 BLR.Nat_Autocracy: "£BLR_Nat_Autocracy (AFRB) ベラルーシ共和国軍"
 BLR.Nat_Autocracy_desc: "軍事政権 - ベラルーシ共和国軍（ベラルーシ語ローマ字表記：Uzbrojenyja sily Respubliki Bielaruś）\n\n ベラルーシ共和国軍の主要将軍たちによる軍事政権。彼らは鉄の統治で権力を掌握し、国外の敵から国を守る態勢を整えている。"
 BLR.Nat_Fascism: "£BLR_Nat_Fascism (NBP) 国家ボリシェヴィキ党"
 BLR.Nat_Fascism_desc: "国家ボリシェヴィズム - 国家ボリシェヴィキ党（ベラルーシ語ローマ字表記：Nacyjanal-Baĺšavickaja Partyja）\n\nエドゥアルド・リモノフの支持者たちは、1994年以来ベラルーシで活動している政治運動である。現代の国家ボリシェヴィズムは、国家と社会の正義の思想と国民の自由の要求を組み合わせた柔軟なイデオロギーである。国家ボリシェヴィキにとって、我々の祖国は福祉国家であり、国民の権利に基づく自由な国と同義である。"
 BLR.Nat_Populism: "£BLR_Nat_Populism (BPF) ベラルーシ人民戦線「復興」"
 BLR.Nat_Populism_desc: "国家ボリシェヴィズム - ベラルーシ人民戦線「復興」（ベラルーシ語ローマ字表記：Biełaruski Narodny Front 'Adradžeńnie'）\n\n ベラルーシ人民戦線は、ベラルーシの中道右派政党である。その顔でもある指導者のゼノン・ポズニャクは反ロシア的な見解で知られているほか、西側および東側からのベラルーシの完全な自治を支持している。"
 BLZ.conservatism: "£generic_conservatism_small (UDP) 統一民主党"
 BLZ.conservatism_desc: ""
 BLZ.socialism: "£generic_socialism_small (PUP) 人民統一党"
