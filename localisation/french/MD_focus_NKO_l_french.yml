 Kim_Jong_il_Death: "La mort de Kim Jong-il's"
 Kim_Jong_il_Death_desc: "Le grand leader bien-aimé, fondateur de la République populaire démocratique de Corée et président éternel de la République, Kim Jong-il, président de la RPDC, est décédé à 8h30 le 17 décembre 2011 d'un infarctus aigu du myocarde compliqué par un choc cardiogénique alors qu'il se rendait en train pour visiter une région locale."
 NKO_Anti_tatmadaw_sentiment: "Sentiment anti-armée populaire"
 NKO_Anti_tatmadaw_sentiment_desc: "Lorsque l'APC a choisi de procéder à un remaniement majeur de la situation politique en Corée, l'hostilité du peuple au régime militaire avait atteint un niveau sans précédent."
