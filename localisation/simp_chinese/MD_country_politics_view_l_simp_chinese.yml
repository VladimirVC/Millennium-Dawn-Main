 ALLOW_ALL_PARTIES_TT: "§H取消一党专政§!"
 ALLOW_ALL_PARTIES_TT_DELAYED: "是时候全面解除对其他政党的禁令了。\n\n§Y先决条件：§!\n[!allow_all_parties_button_click_enabled]\n§Y效果：§!\n[!allow_all_parties_button_click]"
 BAN_ALL_PARTIES_TT: "§H宣布一党专政§!"
 BAN_ALL_PARTIES_TT_DELAYED: "作为执政政府的唯一执政党，我们可以将宣布所有其他政党非法的法律写入法律。\n\n吾党万岁！\n\n§Y先决条件：§!\n[!ban_all_parties_button_click_enabled]\n§Y效果：§!\n[!ban_all_parties_button_click]"
 set_partyall_banned_tt: "禁止除§Y[show_ruling_party]§!之外所有政党\n"
 set_partyall_allowed_tt: "解除对我们国家所有政党的禁令\n"
 revolt_party_TT: "§H以[party_name_by_index] ([party_support_by_index]) §!身份开始革命\n\n§Y先决条件：§!\n[!revolt_button_click_enabled]\n§Y效果：§!\n[!revolt_button_click]"
 boost_party_TT: "§H强化[party_name_by_index]([party_support_by_index])§!\n我们可以通过国家机器的宣传来提高其他党派的民望，以便削弱我们真正政敌的实力。\n\n§Y先决条件：§!\n[!boost_button_click_enabled]\n§Y效果：§!\n[!boost_button_click]"
 attack_party_TT: "§H打击[party_name_by_index] ([party_support_by_index])§!\n我们可以利用政府以外的主要政党所收集到的虚假信息和污点，对他们的受欢迎程度进行严厉打击 - 确保他们不能够挑战我们的权力地位。由于任何焦点都会给小党派带来支持率，这只会在选举门槛超过[?election_threshold|%0]以上的主要政党中起作用。\n\n§Y先决条件：§!\n[!attack_button_click_enabled]\n§Y效果：§!\n[!attack_button_click]"
 ban_party_TT: "§H禁止[party_name_by_index]（[party_support_by_index]）§!\n通过取缔一个政党或运动，确保他们永远无法通过选举赢得权力，并更容易迫害他们的成员。\n\n§Y先决条件：§!\n[!ban_button_click_enabled]\n§Y效果：§!\n[!ban_button_click]"
 allow_party_TT: "§H合法化[party_name_by_index]（[party_support_by_index]）§!\n现在是我们解除禁令，让他们的成员竞选公职的时候了。\n\n§Y先决条件：§!\n[!allow_button_click_enabled]\n§Y效果：§!\n[!allow_button_click]"
