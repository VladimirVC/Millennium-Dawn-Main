 ALG_constitution_1996: "1996年宪法"
 ALG_constitution_1996_desc: "1996年修订的宪法旨在稳定经历了“黑色十年”动荡的阿尔及利亚。然而，许多条款的设计目的并非真正为了民主化，而是为了维护政权的存续。其僵化的世俗框架被伊斯兰运动的大部分成员视为不合法且“不符合伊斯兰教义”。尽管该宪法巩固了国家控制并强化了总统权力，但也限制了政治参与，削弱了政府与社会之间的信任，并阻碍了长期改革。这部宪法的遗留问题至今仍对阿尔及利亚的稳定和合法性构成沉重负担。"
 ALG_enahda_media_network_idea: "复兴运动媒体网络"
 ALG_enahda_media_network_idea_desc: "复兴运动已建立起自己的媒体渠道，以传播其理念并动员公众支持。这些媒体在宣扬宗教价值观的同时，也批评了政权的种种失败。\n\n§Y如果我们没有与复兴运动结盟，该国家精神将被移除§!"
 ALG_supreme_islamic_council_idea: "最高伊斯兰委员会"
 ALG_supreme_islamic_council_idea_desc: "一个由资深乌里玛和伊斯兰学者组成的咨询委员会已经成立，旨在指导国家政策遵循宗教原则。虽然该委员会不掌握直接权力，但其对立法和公共生活的影响力不容小觑。\n\n§Y如果我们不是萨拉菲主义或伊斯兰主义，该国家精神将被移除。§!"
 ALG_new_constitution: "改革宪法"
 ALG_new_constitution_desc: "1996年宪法已过时，现已进行修订，以体现一个更加平衡和民主的阿尔及利亚。尽管改革仍不完善，但它加强了国家机构，促进了伊斯兰主义者和世俗主义者之间的和解，并为社会和经济进步开辟了空间。改革的成功与否取决于其执行的忠实程度。"
 alg_constitution.1.t: "宪法已进行改革"
 alg_constitution.1.d: "经过多年的争议，1996年宪法终于进行了修订。新宪法框架删除了部分最具专制色彩的条款，引入了对行政权力的制衡，并力求在阿尔及利亚的伊斯兰思潮和世俗思潮之间取得更好的平衡。许多人认为这是迈向和解的必要一步，而另一些人则怀疑这些改革是否真的能够改变根深蒂固的权力体系。"
 alg_constitution.1.a: "通过新宪法"
 alg_constitution.1.a.tt: "以§Y改革后的宪法§!取代§Y1996宪法§!，为稳定度、政治点数和经济增长提供加成。"
