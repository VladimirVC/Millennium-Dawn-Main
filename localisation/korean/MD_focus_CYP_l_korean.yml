l_korean:
 CYP_division_of_the_island: "분단된 섬"
 CYP_division_of_the_island_desc: "선 하나가 키프로스를 둘로 갈라놓았습니다. 북키프로스는 여전히 튀르키예 점령 하에 있으며, 공화국의 주권은 유엔이 감시하는 완충 지대에서 끝납니다. 해결되지 않은 분단은 정치적 의지를 고갈시키고 인구와 영토의 일부를 통제 불가능한 상태로 만들고 있습니다."
 CYP_eu_membership: "EU 회원국"
 CYP_eu_membership_desc: "키프로스는 2004년 유럽연합에 가입하여 단일 시장, 구조 기금, 그리고 브뤼셀에 있는 니코시아의 파트너들로부터 정치적 지원을 받을 수 있는 체계를 확보했습니다. 회원국 지위는 이 섬의 경제적 궤적과 외교적 태세를 형성하고 있습니다."
 CYP_offshore_gas: "동지중해 가스전"
 CYP_offshore_gas_desc: "배타적 경제수역 해역의 탐사 광구에서 상업적으로 실성이 있는 가스 매장량이 확인되었습니다. 채굴 수익과 면허 계약은 새로운 수입원을 가져다주는 동시에, 해당 수역의 일부를 영유권 주장하는 튀르키예와의 관계를 복잡하게 만듭니다."
 CYP_financial_center: "지역 금융 허브"
 CYP_financial_center_desc: "키프로스는 지주회사, 선박 등록, 국제 자본 흐름을 위한 저세율 관할권으로 명성을 쌓아왔습니다. 이 부문은 상당한 서비스 수입을 창출하지만, 투명성 측면에서 면밀한 감시를 받기도 합니다."
 CYP_tourism_economy: "관광 중심 경제"
 CYP_tourism_economy_desc: "태양, 해안, 그리고 고대 유적이 매년 수백만 명의 방문객을 끌어모읍니다. 관광은 키프로스 GDP의 초석이며, 숙박·외식업과 소매업을 지탱하는 동시에 소비 비중이 큰 경제 구조에서 오는 수입 압박을 일부 완화해 줍니다."
 CYP_foreign_investment_wave: "외국인 투자 유치"
 CYP_foreign_investment_wave_desc: "세제 혜택, 투자자 비자, 양자 간 보증 등 적극적인 프로그램을 통해 외국인 직접 투자가 급증하는 짧은 기회가 열렸습니다. 새로운 자본이 서비스업, 부동산, 경공업 분야로 유입되고 있습니다."
 CYP_develop_offshore_gas: "해상 가스전 개발"
 CYP_develop_offshore_gas_desc: "동지중해 가스 광구를 생산에 돌입시키기 위해 탐사 작업을 의뢰하고 면허 계약을 체결합니다. 투자 규모는 상당하지만, 개발에 성공하면 장기적인 수입원을 확보하고 배타적 경제수역에 대한 키프로스의 권리 주장을 강화할 수 있습니다."
 CYP_eu_accession_push: "EU 통합 심화 계획"
 CYP_eu_accession_push_desc: "키프로스는 솅겐 협정 가입 후보부터 유로존 공고화에 이르기까지 EU 통합 프로세스에 완전히 참여하기 위해 브뤼셀 및 주요 회원국들과 접촉합니다. 지속적인 로비는 이 섬의 분쟁에 대한 니코시아의 입장에 힘을 실어줄 그리스와 유럽의 호의를 형성합니다."
 CYP_bicommunal_talks: "양대 공동체 회담"
 CYP_bicommunal_talks_desc: "유엔 주관 하에 북키프로스 대표들을 체계적인 대화의 장으로 초청합니다. 진전이 극적이기는 어렵지만, 지속적인 접촉은 해결을 향한 길을 열어두고 니코시아가 성의를 다해 임하고 있음을 그리스와 유럽에 보여줍니다."
 CYP_court_foreign_investment: "외국인 투자 유치 노력"
 CYP_court_foreign_investment_desc: "키프로스를 운영 기지로 고려 중인 외국 기업들에 맞춤형 인센티브를 제공합니다. 초기 패키지에는 국고 자금이 소모되지만, 자본 유치에 성공하면 서비스 부문 수입이 증가하고 한시적으로 세원이 확대됩니다."
 CYP_mobilize_greek_cypriots: "그리스계 키프로스인 공동체 결집"
 CYP_mobilize_greek_cypriots_desc: "공화국이 그리는 이 섬의 미래상에 대한 지지를 강화하기 위해 시민 단체, 교회, 해외 동포에게 국가 자원을 투입합니다. 자신감 있고 조직적인 그리스계 키프로스인 공동체는 키프로스의 미래를 둘러싼 경쟁에서 니코시아의 입지를 강화합니다."
 CYP_outreach_to_north: "경계선을 넘어선 손길"
 CYP_outreach_to_north_desc: "공동체 간 협력 프로젝트, 무역 개방, 그리고 북부 온건파와의 물밑 접촉에 자금을 지원합니다. 니코시아가 주도하는 공동 해결책에 동조하는 터키계 키프로스인이 늘어날 때마다 영구 분단을 주장하는 명분은 약화됩니다."
 NCY_mobilize_turkish_cypriots: "터키계 키프로스인 공동체 결집"
 NCY_mobilize_turkish_cypriots_desc: "독립된 국가의 존립을 위해 북부의 기관들과 앙카라의 지원을 동원하여 터키계 키프로스인 공동체를 결집합니다. 단합된 북부는 그리스계가 주도하는 그 어떤 해결책으로도 흡수하기 어렵습니다."
 NCY_settler_program: "아나톨리아 이주 정착 프로그램"
 NCY_settler_program_desc: "아나톨리아 본토 가구들을 북부에 정착시키는 오랜 정책을 지속합니다. 이러한 인구학적 변화는 이 섬에서 터키계 키프로스인의 비중을 공고히 하지만, 남부의 불만을 심화시키고 국제적인 비판을 불러일으킵니다."
 CYP_gain_8_strength_TT: "§H그리스계 키프로스인§!의 영향력이 §G8 증가§!합니다"
 CYP_reduce_north_TT: "§H터키계 키프로스인§!의 영향력이 §R6 감소§!합니다"
 NCY_gain_8_strength_TT: "§H터키계 키프로스인§!의 영향력이 §G8 증가§!합니다"
 NCY_settler_TT: "§H터키계 키프로스인§!의 영향력이 §G6 증가§!하고 §H그리스계 키프로스인§!의 영향력이 §R4 감소§!합니다"
 cyprus.1.t: "확인됨: 동지중해 매장량의 실성 입증"
 cyprus.1.d: "탐사 결과가 나왔습니다. 아프로디테 및 인접 광구의 시추를 통해 상업적 채굴을 뒷받침할 수 있을 만큼 충분한 매장량이 확인되었습니다. 니코시아는 면허 계약을 마무리하기 위해 신속하게 움직입니다. 튀르키예는 외교 경로를 통해 이의를 제기했으나, 우리의 배타적 경제수역에 대한 법적 근거는 탄탄합니다."
 cyprus.1.a: "개발을 시작한다."
 cyprus.2.t: "양대 공동체 회담: 접근 방식의 선택"
 cyprus.2.d: "유엔의 중재 하에 그리스계 키프로스측과 터키계 키프로스측의 대표단이 니코시아에서 만났습니다. 분위기는 조심스럽습니다. 양측 모두 해소되지 않은 불만을 품고 있으며, 어느 쪽도 서둘러 양보하려 하지 않습니다. 여기서 우리가 어떻게 행동하느냐에 따라 다음 협상 주기가 결정될 것입니다."
 cyprus.2.a: "건설적으로 동참하고 구체적인 제안을 테이블에 올린다."
 cyprus.2.b: "핵심 입장을 고수하고 먼저 움직이기를 거부한다."
 cyprus.3.t: "키프로스: 유럽 무대에서의 더 확고한 입지"
 cyprus.3.d: "키프로스 관료들이 이전보다 강화된 제도적 입지를 확보하고 브뤼셀에서 돌아왔습니다. EU 파트너들은 니코시아가 EU 법령 체계를 일관되게 준수하고 유럽 기구들에 적극적으로 참여해 온 점을 인정했습니다. 브뤼셀 내에서 이 섬의 위상은 EU 가입 이래 그 어느 때보다 높습니다."
 cyprus.3.a: "이 추진력을 활용해야 한다."
 cyprus.4.t: "경계선: 완충 지대에서의 충돌"
 cyprus.4.d: "완충 지대 검문소 중 한 곳에서의 대치가 경미한 외교적 사건으로 확대되었습니다. 유엔 평화유지군이 질서를 회복했으나 양측은 서로 비난을 주고받고 있습니다. 이 사건으로 인해 북부의 도발에 어떻게 대처할 것인가에 대한 니코시아 내부의 논쟁이 다시 불붙었습니다."
 cyprus.4.a: "공식적으로 공개 규탄 성명을 발표한다."
 cyprus.4.b: "유엔을 통해 문제를 제기하고 언론에 보도되지 않도록 한다."