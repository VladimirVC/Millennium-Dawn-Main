 ANTARCTICA_CCAS_TITLE: "CCAS"
 ANTARCTICA_CCAS_TEXT: "南極のあざらしの保存に関する条約（CCAS）は、南極におけるあざらしの捕獲を規制する協定である。あざらしの個体群を保護し、その資源の持続可能な利用を確保することを目的として、1972年に設立された。"
 ANTARCTICA_CCAMLR_TITLE: "CCAMLR"
 ANTARCTICA_CCAMLR_TEXT: "南極の海洋生物資源の保存に関する委員会（CCAMLR）は、南極海における海洋生物の保存に責任を持つ組織である。南極独自の生態系を管理・保護するため、1982年に設立された。"
