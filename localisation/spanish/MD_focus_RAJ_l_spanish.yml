 indian_event.55.d: "La última reunión de BRICS propuso una unificación de BRICS en una alianza militar. ¿Deberíamos unirnos?"
 indian_event.55.a: "Estamos dentro!"
 indian_event.55.b: "Gracias, no"
 indian_event.56.t: "Negociaciones NATO-Plus"
 indian_event.56.d: "India has grown far more Western-aligned in recent years. Our ministers and diplomats propose binding India to the alliance as a Major Non-NATO Ally, the 'NATO-Plus' partner status short of full membership. Should we pursue it?"
 indian_event.56.a: "Invitémoslos!"
 indian_event.56.b: "¿Eh? No!"
