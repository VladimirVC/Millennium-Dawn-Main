 GRAND_DOCTRINE_LOCAL_AIRSPACE_DEFENCE_DESC: "이 대교리는 국가 및 지역 영공의 보호와 통제를 중심으로 공군을 구조화합니다. 지역 영공 방어 개념은 정의된 항공 영역 내에서의 조율된 감시 및 대응을 강조합니다."
 GRAND_DOCTRINE_AIR_BATTLEFIELD_SUPPORT_DESC: "이 대교리는 활성화된 전투 구역 내에서 지상군 및 해군 부대를 직접 지원하도록 항공 작전을 구조화합니다. 전장 지원 개념은 합동 작전 계획에 항공력을 통합하는 것을 강조합니다."
 GRAND_DOCTRINE_AIR_SUPREMACY_DESC: "이 대교리는 항공 영역의 통제권을 확립하고 유지하기 위해 공군을 조직합니다. 공중 지배 개념은 모든 작전 구역에 걸쳐 행동의 자유를 확보하기 위한 조율된 항공 작전을 강조합니다."
 GRAND_DOCTRINE_MIXED_ROLE_DESC: "이 대교리는 단일 체계 내에서 여러 작전 역할의 균형을 맞추기 위해 공군을 구조화합니다. 혼합 역할 개념은 다양한 임무 세트 전반에 걸친 항공력 운용의 유연성을 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_LIGHT_DESC: "이 대교리는 경량화되고 단순화된 장비 세트를 중심으로 부대를 조직합니다. 경장비 개념은 다양한 작전 환경 전반에 걸친 전개 용이성과 적응성을 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_HEAVY_DESC: "이 대교리는 중무장되고 고성능인 장비 체계를 중심으로 부대를 구조화합니다. 중장비 개념은 부대 편제 내에서의 지속적인 주둔과 강력한 전투 능력을 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_MOBILE_DESC: "이 대교리는 높은 작전 기동성과 신속한 기동을 지원하도록 부대 장비를 편성합니다. 기동 장비 개념은 이동, 재배치 및 작전의 도달 범위를 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_FIRES_DESC: "이 대교리는 간접 사격 및 지원 화력을 전달하는 데 특화된 시스템을 중심으로 장비 개발을 구조화합니다. 화력 지원 장비 개념은 전장 전반에 걸친 조율된 전투력의 적용을 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_FULL_DESC: "이 대교리는 포괄적이고 완전한 장비 보급을 중심으로 부대를 구성합니다. 완전군장 개념은 지속적이고 광범위한 작전을 지원하기 위한 표준화된 복장을 강조합니다."
 GRAND_DOCTRINE_BLUE_WATER_DESC: "이 대교리는 넓은 대양과 먼 해양 전구에 걸친 지속적인 작전을 위해 해군을 구조화합니다. 대양 해군 개념은 전 세계적인 도달 범위, 전력 투사, 지속적인 함대 주둔을 강조합니다."
 GRAND_DOCTRINE_GREEN_WATER_DESC: "이 대교리는 연안 및 지역 해양 환경에서의 작전을 중심으로 해군을 구성합니다. 지역 해군 개념은 연안의 영향력과 지역 제해권을 강조합니다."
 GRAND_DOCTRINE_JEUNE_ECOLE_DESC: "이 대교리는 더 작고 특화된 함정과 분산된 해상 작전을 중심으로 해군 전략을 구조화합니다. 청년학파 개념은 해전 내에서의 비대칭성과 선별적인 무력 행사를 강조합니다."
 GRAND_DOCTRINE_GUERRE_DE_COURSE_DESC: "이 대교리는 통상을 노린 해전을 통해 적 해상 활동을 교란하는 것을 중심으로 해군 작전을 구성합니다. 통상파괴 개념은 해상 교통로 전반에 걸친 표적 해군 행동을 강조합니다."
 marine_commandos: "해병 코만도"
 air_assault_artillery: "공수 부대"
 SUBDOCTRINE_DESIGN_DRONE_DESC: "이 교리는 원격 조종 및 자율 지원 시스템을 중심으로 제작된 무인 항공기 설계 개발을 우선시합니다. 드론 설계는 모듈식 통합과 유연한 임무 구성을 강조하여 작전 요구 사항 전반에 걸쳐 항공력 옵션을 확장합니다."
