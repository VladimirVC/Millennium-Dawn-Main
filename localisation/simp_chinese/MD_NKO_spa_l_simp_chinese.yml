l_simp_chinese:
 NKO_spa_unlocked_tt: "§G解锁§!§Y最高人民会议§!§G机制。§!\n每120天召开一次会议；从§Y8项§!生产指令中选择§Y2项§!，可暂停对应领域的常驻惩罚并施加持续120天的增益效果。每项选择会触发内含§G3个事件§!的事件链，并有§G25%§!额外概率触发奖励事件。"
 NKO_spa_focus_lifts_industry_tt: "§G永久移除§!§Y“停滞的工业”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_production_tt: "§G永久移除§!§Y“生产线衰败”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_military_tt: "§G永久移除§!§Y“外强中干的军队”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_economy_tt: "§G永久移除§!§Y\"资源囤积\"§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_research_tt: "§G永久移除§!§Y“研究停滞”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_agriculture_tt: "§G永久移除§!§Y“自给农场”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_foreign_tt: "§G永久移除§!§Y“外交孤立”§!§G常驻惩罚。§!"
 NKO_spa_focus_lifts_construction_tt: "§G永久移除§!§Y“施工瓶颈”§!§G常驻惩罚（防御性基础设施）。§!"
 NKO_spa_bonus_chance_tt: "§G每项选择会触发内含§G3个事件§!的事件链，并有§Y25%§!额外概率触发奖励事件。§!"
 NKO_spa_domain_unlocked_tt: "§G该领域的加成目前尚未激活。§!"
 NKO_spa_picks_remaining_tt: "§G本届会议至少还有一个指令可用。§!"
 NKO_spa_umbrella: "最高人民会议"
 NKO_spa_umbrella_desc: "最高人民会议每四个月召开一次，通过两项生产率指令。每项指令暂停中央计划的八项长期弊端之一，为期§Y120天§!，并在此基础上给予生产力奖励。完成相应的国策可以永久消除现有的惩罚。"
 NKO_spa_debuff_industry: "停滞的工业"
 NKO_spa_debuff_industry_desc: "数十年的中央配给制导致工厂缺乏原材料和熟练劳动力，建筑业发展缓慢。"
 NKO_spa_debuff_production: "生产线衰败"
 NKO_spa_debuff_production_desc: "工具陈旧，供应链临时拼凑，质量控制完全取决于工头当天的心情。"
 NKO_spa_debuff_military: "外强中干的军队"
 NKO_spa_debuff_military_desc: "纸面上，朝鲜人民军兵力数百万。但实际上，训练如同作秀，士气低落。"
 NKO_spa_debuff_economy: "资源囤积"
 NKO_spa_debuff_economy_desc: "省级干部只顾着攫取流经辖区的资源。中央拨付的资源要么迟到，要么量少，要么根本没到。"
 NKO_spa_debuff_research: "研究停滞"
 NKO_spa_debuff_research_desc: "制裁、人才流失和实验室设备落后意味着，即使是基本技术，朝鲜民主主义人民共和国的研发速度也比其他地方慢一倍。"
 NKO_spa_debuff_agriculture: "自给农场"
 NKO_spa_debuff_agriculture_desc: "合作农场的产量勉强够养活本村村民，城市里则严重缺货。"
 NKO_spa_debuff_foreign: "外交孤立"
 NKO_spa_debuff_foreign_desc: "制裁和被国际社会孤立的地位意味着每一次外交努力都会付出比预期更高的代价，而获得的收益却比预期更少。"
 NKO_spa_debuff_construction: "施工瓶颈"
 NKO_spa_debuff_construction_desc: "国防工程是受影响最严重的领域。堡垒还没完工就坍塌了，雷达桅杆只装了一半电线，海军基地疏浚工程只完成了一半，机场也因为维护不善而坑坑洼洼。"
 NKO_spa_bonus_industry: "工业加速"
 NKO_spa_bonus_industry_desc: "最高人民会议已发布工业指令。民用工厂发展迅速，军工企业随后跟进。"
 NKO_spa_bonus_production: "设备生产指令"
 NKO_spa_bonus_production_desc: "生产线按计划超负荷运转。效率上限被突破；新设备更快投入使用。"
 NKO_spa_bonus_military: "先军决议"
 NKO_spa_bonus_military_desc: "军事优先论盛行。演习日程紧凑，攻击理论日趋完善，党重申其优先事项。"
 NKO_spa_bonus_economy: "主体思想自力更生"
 NKO_spa_bonus_economy_desc: "主体思想自力更生"
 NKO_spa_bonus_research: "研究运动"
 NKO_spa_bonus_research_desc: "所有研究所都在加班加点；机密实验室更是24小时轮班运转。以前需要800天才能完成的技术，现在只需三分之一的时间就能研发出来。"
 NKO_spa_bonus_research_half: "研究运动（收益递减）"
 NKO_spa_bonus_research_half_desc: "各研究所仍在加班加点地工作，但轻松获利的时代已经过去。由于已经掌握了1995年时代的技术，每一次新的突破都需要付出更多努力，回报却更少 - 加成减半了。"
 NKO_spa_bonus_research_quarter: "研究运动（前沿高地）"
 NKO_spa_bonus_research_quarter_desc: "朝鲜的实验室如今已处于技术前沿。由于2005年的技术已被掌握，单纯依靠蛮力加班只能带来有限的加速 - 加速效果缩水至原先的四分之一。"
 NKO_spa_bonus_agriculture: "农业运动"
 NKO_spa_bonus_agriculture_desc: "合作农场超额完成配额，民用短缺缓解，工厂产量小幅增长。"
 NKO_spa_bonus_foreign: "外交政策指令"
 NKO_spa_bonus_foreign_desc: "外交部特使们四处奔走。改善关系成本更低，贸易伙伴对我们也会更加友好。"
 NKO_spa_bonus_construction: "建筑营"
 NKO_spa_bonus_construction_desc: "大规模动员的军事工程部队进驻每一个防御工事。堡垒、雷达站、近程防空阵地、机场、海军基地、燃料筒仓、铁路和补给中心都以前所未有的速度拔地而起。"
 NKO_spa_resolution_industry: "工业加速"
 NKO_spa_resolution_industry_desc: "Suspend §RIndustrial Stagnation§! for §Y120 days§!. While active: §G+45%§! civ factory speed, §G+30%§! mil factory speed, §G+10%§! civ factory output, §G+15%§! production efficiency start.\n\nFires a 3-event flavor chain (Five-Year Plan / Stakhanovite Heroes / Industrial Records)."
 NKO_spa_resolution_production: "设备生产指令"
 NKO_spa_resolution_production_desc: "Suspend §RProduction Line Decay§! for §Y120 days§!. While active: §G+30%§! production efficiency cap, §G+15%§! efficiency growth, §G+20%§! efficiency start.\n\nFires a 3-event flavor chain (New Tooling / Production Lines Hum / Quality Control Triumph)."
 NKO_spa_resolution_military: "先军决议"
 NKO_spa_resolution_military_desc: "Suspend §RHollow Force§! for §Y120 days§!. While active: §G+15%§! army attack, §G+30%§! division training speed, §G+10%§! army morale, §G+5%§! army organisation.\n\nFires a 3-event flavor chain (Drills Intensify / Officer Corps Excels / Songun Triumphs)."
 NKO_spa_resolution_economy: "主体思想自力更生"
 NKO_spa_resolution_economy_desc: "Suspend §RResource Hoarding§! for §Y120 days§!. While active: §G+50%§! local resources, §G-15%§! production resource cost, §G+5%§! monthly population growth.\n\nFires a 3-event flavor chain (Mineral Surveys / Mining Output Rises / Self-Reliance Achieved)."
 NKO_spa_resolution_research: "研究运动"
 NKO_spa_resolution_research_desc: "Suspend §RResearch Stagnation§! for §Y120 days§!. While active: §G+200%§! research speed - tech that took 800+ days completes in a fraction of the time.\n\nFires a 3-event flavor chain (Lab Doors Open / Crash Programs / Catching Up).\n\n§RPremium cost§!: this is the most expensive mandate, reflecting the resources required to break sanctions and brain drain."
 NKO_spa_resolution_agriculture: "农业运动"
 NKO_spa_resolution_agriculture_desc: "Suspend §RSubsistence Farming§! for §Y120 days§!. While active: §G-30%§! consumer goods, §G+15%§! civ factory output, §G+10%§! monthly population growth.\n\nFires a 3-event flavor chain (Spring Planting / Summer Tending / Bumper Harvest)."
 NKO_spa_resolution_foreign: "外交政策指令"
 NKO_spa_resolution_foreign_desc: "Suspend §RDiplomatic Isolation§! for §Y120 days§!. While active: §G-75%§! improve-relations cost, §G+30%§! trade opinion, §G+25%§! monthly opinion gain.\n\nFires a 3-event flavor chain (Diplomatic Overtures / Quiet Backchannels / Trade Concessions)."
 NKO_spa_resolution_construction: "建筑营"
 NKO_spa_resolution_construction_desc: "Suspend §RConstruction Bottleneck§! for §Y120 days§!. Defensive & strategic infrastructure surge: §G+60%§! bunker / coastal bunker / radar / anti-air building speed, §G+55%§! air base / naval base / fuel silo speed, §G+50%§! railway / supply hub speed.\n\nFires a 3-event flavor chain (Vanguard Mobilizes / Sites Across the Republic / Projects Complete)."
 NKO_spa.0.t: "最高人民会议召开"
 NKO_spa.0.d: "总书记同志，内阁已拟定议程。最高人民会议召集完毕。有八大积弊亟待解决，本次会议可对其中§Y任意两项§!发布约束性指令。\n\n在§Y120天§!内，所选定领域将按党的意图运作。"
 NKO_spa.0.a: "会议开幕"
 NKO_spa.1.t: "新一届会议开始"
 NKO_spa.1.d: "四个月过去了。最高人民会议再次召开。内阁提交了同样的八项决议；从中选择两项通过。"
 NKO_spa.1.a: "开会"
 NKO_spa.5.t: "内阁代行职权"
 NKO_spa.5.d: "会议即将结束而您未采取任何行动。内阁以党的生产职责为由，代表您通过了最经济可行的决议。"
 NKO_spa.5.a: "认可内阁的提案。"
 NKO_spa.6.t: "议会中止"
 NKO_spa.6.d: "内乱已导致最高人民会议无法运作。所有现行法令在秩序恢复前均告失效。"
 NKO_spa.6.a: "收到"
 NKO_spa.10.t: "议会周期"
 NKO_spa.10.d: "内部周期事件"
 NKO_spa.10.a: "好"
 NKO_spa.20.t: "斯达汉诺夫英雄"
 NKO_spa.20.d: "黄海工业带的工人在新指令实施的头几周内就打破了生产定额。他们的肖像已经挂遍全国，管理者报告称产能激增，将立即投入实际应用。"
 NKO_spa.20.a: "奖励英雄们"
 NKO_spa.21.t: "工艺创新"
 NKO_spa.21.d: "平壤重型机械厂的工程师们设计出了一种新的夹具工艺，使装甲车辆生产线的吞吐量翻了一番。最新可用的底盘批量生产了75辆——坦克、步兵战车、装甲运兵车、侦察车或自行火炮，具体取决于当周装载的生产线。"
 NKO_spa.21.a: "推广这项技术"
 NKO_spa.22.t: "共和国的英雄"
 NKO_spa.22.d: "一位初级军官在先军演习中的模范领导能力引起了总参谋部的注意。预备役人员受到榜样的鼓舞，纷纷涌向征兵办公室。"
 NKO_spa.22.a: "晋升并为他授勋"
 NKO_spa.23.t: "发现矿藏"
 NKO_spa.23.d: "测绘人员分散至北部山区，发现了一处此前未知的矿脉。初步化验将确定该矿床产出何种战略资源。国家资源局已批准立即开采。"
 NKO_spa.23.a: "开始开采"
 NKO_spa.24.t: "外国科学家叛逃"
 NKO_spa.24.d: "一名外籍工程师已绕过制裁管制，潜入朝鲜某研究中心。其见解正加速国家科学院的一项重点计划。"
 NKO_spa.24.a: "欢迎您，同志"
 NKO_spa.25.t: "丰收"
 NKO_spa.25.d: "咸镜北道的合作农场报告产量远超指标。粮食储备增加；农村征兵办公室挤满了想参军找工作的年轻农工。"
 NKO_spa.25.a: "分配剩余物资"
 NKO_spa.26.t: "外交操作"
 NKO_spa.26.d: "外交部特使利用新指令取得了一项低调的外交胜利——与主要伙伴通过秘密渠道达成让步，从而换取硬通货。"
 NKO_spa.26.a: "收入囊中"
 NKO_spa.27.t: "建设先锋"
 NKO_spa.27.d: "志愿工程营的表现超出了所有预期。由于仍有闲置产能，内阁决定将剩余劳动力投入进度最落后的民用项目。若无法安排就业，则可解散劳工以换取硬通货。"
 NKO_spa.27.factory_take: "建造一座民用工厂"
 NKO_spa.27.factory_cash: "解散劳动力（§Y+0.5§! 国库）"
 NKO_spa.27.offices_take: "建造一个办公园区"
 NKO_spa.27.offices_cash: "解散劳动力（§Y+0.75§! 国库）"
 NKO_spa.27.refinery_take: "建造一座合成炼油厂"
 NKO_spa.27.refinery_cash: "解散劳动力（§Y+0.45§! 国库）"
 NKO_spa.27.agri_take: "建造一个农业区"
 NKO_spa.27.agri_cash: "解散劳动力（§Y+0.45§! 国库）"
 NKO_spa.30.t: "五年计划启动"
 NKO_spa.30.d: "每一座工厂大门前都飘扬着旗帜。最高人民会议已下令，接下来的120天将作为一次微型五年计划，为每个工业区带设定具体的生产指标。"
 NKO_spa.30.a: "执行计划"
 NKO_spa.31.t: "提前完成配额"
 NKO_spa.31.d: "指令执行到一半，大同江沿岸的工厂报告混凝土和钢材浇筑量远超计划。工人突击队正在争当荣誉集体。"
 NKO_spa.31.a: "奖励先进集体"
 NKO_spa.32.t: "创记录工业产值"
 NKO_spa.32.d: "生产指令以在金日成广场举行的胜利集会作为结束。新工业力量增添到共和国的生产能力中，党的威望也再上台阶。"
 NKO_spa.32.a: "庆祝这一成就"
 NKO_spa.33.t: "新装备抵达"
 NKO_spa.33.d: "通过灰色市场渠道，新装备已送达设备工厂。生产主管正按新规格重新培训车间员工。"
 NKO_spa.33.a: "投入生产"
 NKO_spa.34.t: "生产线正常运转"
 NKO_spa.34.d: "平壤和咸兴两大生产线的运转情况达到了十年来最佳水平。次品率下降，成品质量提高。"
 NKO_spa.34.a: "推动进一步完善。"
 NKO_spa.35.t: "质量控制的胜利"
 NKO_spa.35.d: "设备生产指令的最后阶段是州级检查，结果显示质量指标达到了有史以来的最高水平。朝鲜人民军的采购官员对此表示满意。"
 NKO_spa.35.a: "将新标准记录下来。"
 NKO_spa.36.t: "演习强度加大"
 NKO_spa.36.d: "先军正值高峰期。所有部队的操练节奏都加快了一倍。暂停多年的实弹演习也重新启动。"
 NKO_spa.36.a: "加强对部队的训练。"
 NKO_spa.37.t: "军官团表现出色"
 NKO_spa.37.d: "在强化训练制度下，新一代连级和营级军官脱颖而出。晋升也沿着指挥链向上层层传递。"
 NKO_spa.37.a: "奖励和晋升。"
 NKO_spa.38.t: "先军胜利"
 NKO_spa.38.d: "先军决议以在平壤举行的伟大胜利阅兵式落下帷幕。预备役人员的征召使军队补充充足；朝鲜人民军达到了多年来的最强状态。"
 NKO_spa.38.a: "列队行进。"
 NKO_spa.39.t: "矿产勘测开始"
 NKO_spa.39.d: "地质勘测队分散到北部山区。尘封已久的苏联时期地图被重新翻出，并用现代仪器进行了更新。"
 NKO_spa.39.a: "批准勘测。"
 NKO_spa.40.t: "Mining Output Rises"
 NKO_spa.40.d: "The new surveys have steered miners to higher-grade veins. Coal, magnesite, and rare earth output are all up sharply."
 NKO_spa.40.a: "Press the advantage."
 NKO_spa.41.t: "Self-Reliance Achieved"
 NKO_spa.41.d: "The Juche Self-Reliance Mandate ends with foreign-currency reserves replenished by export sales. Comrade General Secretary, the Republic stands tall."
 NKO_spa.41.a: "Bank the reserves."
 NKO_spa.42.t: "Lab Doors Open"
 NKO_spa.42.d: "The State Academy of Sciences gets the call: every priority program is unlocked, every classified file accessible. Researchers who have been waiting years for clearance are read in overnight."
 NKO_spa.42.a: "Authorise the priorities."
 NKO_spa.43.t: "Crash Programs Bear Fruit"
 NKO_spa.43.d: "Several long-stalled programs across the State Academy achieve breakthroughs in rapid succession. The General Staff is briefed on whichever discipline turned the corner this time."
 NKO_spa.43.a: "向总参谋部汇报。"
 NKO_spa.44.t: "Catching Up"
 NKO_spa.44.d: "The Research Drive ends with the DPRK closer to the technological frontier than at any point since the 1970s. The Party celebrates a quiet triumph."
 NKO_spa.44.a: "Press the new advantage."
 NKO_spa.45.t: "Spring Planting Begins"
 NKO_spa.45.d: "Cooperative farms across the country mobilize for an aggressive planting season. Volunteer brigades from the cities reinforce the rural workforce."
 NKO_spa.45.a: "Mobilize the brigades."
 NKO_spa.46.t: "Summer Tending"
 NKO_spa.46.d: "Mid-season inspections show fields in better shape than they have been in years. Irrigation channels are flowing; pesticide stocks have arrived from China."
 NKO_spa.46.a: "Maintain the effort."
 NKO_spa.47.t: "Bumper Harvest"
 NKO_spa.47.d: "Yields come in 20% above plan. Grain reserves swell; for the first time in years some districts will see a full ration."
 NKO_spa.47.a: "Distribute the surplus."
 NKO_spa.48.t: "Diplomatic Overtures"
 NKO_spa.48.d: "DPRK delegations are quietly dispatched to friendly capitals — Beijing, Moscow, Tehran, Damascus — bearing favourable terms and discreet asks."
 NKO_spa.48.a: "Send the envoys."
 NKO_spa.49.t: "Quiet Backchannels"
 NKO_spa.49.d: "Several delegations return with under-the-table agreements: shell-company joint ventures, infrastructure loans, and quiet equity stakes from sympathetic foreign partners. Sanctions enforcement has been a little less rigorous than usual."
 NKO_spa.49.a: "Receive the deliveries."
 NKO_spa.50.t: "Trade Concessions"
 NKO_spa.50.d: "The Foreign Policy Directive ends with a cluster of new arrangements that significantly improve foreign capital inflows. Investment commitments are inked for the next decade."
 NKO_spa.50.a: "Sign the agreements."
 NKO_spa.51.t: "Construction Vanguard Mobilizes"
 NKO_spa.51.d: "The Construction Battalion Mandate is a windfall for whichever internal faction the Cabinet decides to credit. The Party can steer the political dividend to a faction whose cooperation it needs more than the others."
 NKO_spa.51.military: "Credit §YThe Military§!. (§G+15§! opinion)"
 NKO_spa.51.cadres: "Credit §YCommunist Cadres§!. (§G+15§! opinion)"
 NKO_spa.51.donju: "Credit §YThe Donju§!. (§G+15§! opinion)"
 NKO_spa.51.farmers: "Credit §YFarmers§!. (§G+15§! opinion)"
 NKO_spa.51.labour: "Credit §YLabour Unions§!. (§G+15§! opinion)"
 NKO_spa.51.none: "Take the political credit. (§G+25 PP§!)"
 NKO_spa.52.t: "Sites Across the Republic"
 NKO_spa.52.d: "Construction is underway in every province. Roads are graded, rail spurs welded, power lines re-strung — the kind of unglamorous infrastructure work that compounds for decades."
 NKO_spa.52.a: "Press the schedule."
 NKO_spa.53.t: "Projects Complete"
 NKO_spa.53.d: "The Construction Battalion Mandate closes with ribbon-cutting ceremonies broadcast across the Republic. The Party reaps the political dividend; the population is steadier; the treasury sees a small windfall from project surpluses."
 NKO_spa.53.a: "Cut the ribbons."
