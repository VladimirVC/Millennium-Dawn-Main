 ELECTIONS_THRESHOLD_DESC: "Порог"
 increase_election_threshold: "§YПовышение избирательного порога§!"
 increase_election_threshold_TT: "Избирательный порог — это минимальный процент голосов, который политическая партия должна набрать, чтобы получить представительство в законодательном органе.\n\n§YУсловия§!:\n[!increase_election_threshold_click_enabled]\n§YЭффекты§!:\n[!increase_election_threshold_click]\n\nИзменение вступит в силу на следующих выборах, затруднив небольшим партиям получение власти."
 decrease_election_threshold: "§YСнизить избирательный порог§!"
 decrease_election_threshold_TT: "Избирательный порог — это минимальный процент голосов, который политическая партия должна набрать, чтобы получить представительство в законодательном органе.\n\n§YУсловия§!:\n[!decrease_election_threshold_click_enabled]\n§YЭффекты§!:\n[!decrease_election_threshold_click]\n\nИзменение вступит в силу на следующих выборах, облегчив небольшим партиям получение власти."
