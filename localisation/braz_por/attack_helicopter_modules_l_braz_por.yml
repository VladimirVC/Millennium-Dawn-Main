 helicopter_twin_engine_gen1: "1st Gen Twin Engine"
 helicopter_twin_engine_gen1_desc: "Um sistema bimotor, concebido para que ambos os motores acionem os rotores e façam a aeronave voar."
 helicopter_twin_engine_gen2: "2nd Gen Twin Engine"
