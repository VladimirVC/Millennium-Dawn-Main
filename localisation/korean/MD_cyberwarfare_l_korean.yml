 cyber_network_hardening_complete_tt: "네트워크 강화 완료. 중요한 네트워크 인프라가 강화되었고 알려진 취약점이 패치되었습니다."
 cyber_counter_intrusion_complete_tt: "대침입 소탕 완료. 감지된 모든 외부 임플란트와 지속성 페이로드가 우리 네트워크에서 제거되었습니다."
 cyber_attribution_hunt_complete_tt: "공격자 추적 완료. 정보 분석가들이 최근 침입 활동에 대한 포렌식 검토를 마무리했습니다."
 cyber_gps_tracking_complete_tt: "GPS 교란 작전이 완료되었습니다. 우리의 신호팀이 대상의 위성 내비게이션 시스템 교란을 마무리했습니다."
 cyber_economic_tracking_complete_tt: "경제 교란 작전이 완료되었습니다. 우리의 사이버팀이 적의 금융 인프라를 겨냥한 캠페인을 마무리했습니다."
 cyber_propaganda_tracking_complete_tt: "선전 작전이 완료되었습니다. 우리의 정보 부대가 대상 인구를 겨냥한 영향력 캠페인을 마무리했습니다."
 cyber_infra_tracking_complete_tt: "인프라 공격이 완료되었습니다. 우리의 요원들이 적의 중요 인프라에 대한 지속적인 공격을 마무리했습니다."
 cyber_crit_tracking_complete_tt: "치명적 타격 작전이 완료되었습니다. 우리 부대가 대상의 가장 필수적인 시스템에 대해 최우선 페이로드를 실행했습니다."
 cyber_sigint_surveillance_tracking_complete_tt: "신호 정보(SIGINT) 감시 작전이 완료되었습니다. 우리의 감청팀이 대상으로부터 신호 정보 수집을 마무리했습니다."
 cyber_radar_spoofing_tracking_complete_tt: "레이더 기만 작전이 완료되었습니다. 우리의 전자전 팀이 적의 방공 감시 네트워크 교란을 마무리했습니다."
 cyber_election_interference_tracking_complete_tt: "선거 개입 작전이 완료되었습니다. 우리의 영향력 부대가 적의 선거 과정을 겨냥한 은밀한 캠페인을 마무리했습니다."
 cyber_industrial_espionage_tracking_complete_tt: "산업 첩보공작 작전이 완료되었습니다. 우리의 요원들이 적국으로부터 표적이 된 연구 및 개발 데이터를 추출했습니다."
 cyber_comms_intercept_tracking_complete_tt: "통신 감청 작전이 완료되었습니다. 우리의 팀이 적의 지휘 및 통제 네트워크에 대한 지속적인 침투를 마무리했습니다."
 cyber_financial_system_attack_tracking_complete_tt: "금융 시스템 공격이 완료되었습니다. 우리 부대가 적의 은행 및 결제 인프라를 표적으로 한 작전을 마무리했습니다."
 cyber_logistics_disruption_tracking_complete_tt: "병참 교란 작전이 완료되었습니다. 우리의 요원들이 적의 공급망 및 유통 시스템에 대한 캠페인을 마무리했습니다."
 cyber_sleeper_network_tracking_complete_tt: "잠복형 악성 네트워크가 완료되었습니다. 우리의 팀이 향후 활성화를 위해 적의 네트워크 내부에 지속적인 액세스 도구를 심어놓았습니다."
 cyber_deception_campaign_tracking_complete_tt: "기만 작전이 완료되었습니다. 우리의 요원들이 적의 정보 분석가를 오도하기 위해 고안된 거짓 깃발 작전을 마무리했습니다."
 cyber_zero_day_strike_tracking_complete_tt: "제로데이 공격이 완료되었습니다. 우리 부대가 적의 주요 시스템에 있는 미공개 취약점에 대해 강력한 익스플로잇을 실행했습니다."
 cyber_network_hardening_active: "네트워크 강화됨"
 cyber_network_hardening_active_desc: "우리의 사이버 보안팀이 인증 시스템을 강화하고 알려진 취약점을 패치하며 중요한 액세스 채널을 격리했습니다. 이러한 방어가 유지되는 동안에는 외부 침입 시도가 성공할 가능성이 크게 줄어듭니다."
 cyber_counter_intrusion_active: "침입 탐지 및 차단 작업"
 cyber_counter_intrusion_active_desc: "분석가들이 우리 네트워크에 외국 세력이 존재하는지 적극적으로 찾고 있습니다. 로그를 샅샅이 뒤지고, 비정상적인 프로세스를 격리하며, 지속성 임플란트를 제거하고 있습니다. 모든 정부 시스템에서 작전 보안 의식이 고조되었습니다."
 cyber_attribution_hunt_active: "공격자 추적 진행 중"
 cyber_attribution_hunt_active_desc: "디지털 포렌식 팀이 공격 경로를 재구성하고 배후의 공격자 서명을 분류하고 있습니다. 수집된 정보는 방어를 날카롭게 하고 비례적인 대응을 하는 데 사용될 것입니다."
 MD_cyber.201.t: "침투 소탕됨"
 MD_cyber.201.d: "침입 탐지 및 차단이 완료했습니다. 외부 액세스 도구, 감시 임플란트, 지속성 백도어가 식별되어 제거되었습니다. 우리 네트워크는 깨끗합니다."
 MD_cyber.201.a: "잘했다. 계속 경계하라."
 MD_cyber.202.t: "소탕 완료 — 네트워크 안전함"
 MD_cyber.202.d: "침입 탐지 및 차단을 위해 구성된 인원이 모든 중요 시스템에 대한 검시를 완료했습니다. 어떤 외부 액세스 도구이나 감시 임플란트도 감지되지 않았습니다. 우리 네트워크는 안전해 보입니다."
 MD_cyber.202.a: "감시를 유지하라."
 MD_cyber.1.t: "작전 성공"
 MD_cyber.1.d: "우리의 사이버팀이 작전을 성공적으로 수행했습니다. 어떠한 흔적도 남기지 않았으며, 대상은 우리의 개입을 전혀 눈치채지 못했습니다."
 MD_cyber.1.a: "훌륭하다."
 MD_cyber.2.t: "외부 침입 감지됨"
 MD_cyber.2.d: "우리의 보안팀이 외부 사이버 침입 징후를 식별했습니다. 공격자는 자신의 출처를 효과적으로 은폐했기 때문에 누구의 소행인지 파악할 수 없습니다."
 MD_cyber.2.a: "우리의 방어망을 강화하라."
 MD_cyber.3.t: "[?disp_name_agressor.GetNameWithFlag]의 사이버 공격 식별됨"
 MD_cyber.3.d: "우리의 정보기관이 최근 발생한 사이버 침입을 추적한 결과 [?disp_name_agressor.GetNameWithFlag]의 소행임을 밝혀냈습니다. 이 공격은 고의적이고 표적화되었습니다. 우리는 공식적인 외교적 항의를 제기했습니다."
 MD_cyber.3.a: "공격자를 규탄하라."
 MD_cyber.4.t: "작전 취소됨"
 MD_cyber.4.d: "우리의 사이버팀이 대상의 시스템에 신뢰할 수 있는 거점을 확보하지 못했습니다. 어떤 조치도 취해지기 전에 작전이 중단되었습니다. 추가적인 준비가 필요합니다."
 MD_cyber.4.a: "재정비하고 다시 평가하라."
 MD_cyber.11.t: "GPS 신호 교란"
 MD_cyber.11.d: "군부대에서 위성 내비게이션 시스템의 광범위한 장애를 보고하고 있습니다. 현장의 지휘관들은 효과적인 병력 조율에 어려움을 겪고 있습니다. 외부 신호 교란 공격이 의심됩니다."
 MD_cyber.11.a: "예비 내비게이션으로 전환하라."
 MD_cyber.12.t: "금융망손상됨"
 MD_cyber.12.d: "은행, 거래소, 결제 프로세서에서 동시다발적인 시스템 고장이 보고되고 있습니다. 이 혼란은 우발적인 사고가 아닙니다. 우리 분석가들은 외국 요원들이 국가 금융 인프라를 표적으로 삼았다고 확신하고 있습니다."
 MD_cyber.12.a: "피해를 격리하고 억제하라."
 MD_cyber.13.t: "정보 공간 침투됨"
 MD_cyber.13.d: "소셜 미디어 플랫폼과 뉴스 네트워크에 조직적인 허위 정보가 난무하고 있습니다. 정부에 대한 대중의 신뢰가 무너지고 있습니다. 우리 분석가들은 이것이 외국 영향력 작전이라고 믿고 있습니다."
 MD_cyber.13.a: "역선전 작전을 시작하라."
 MD_cyber.14.t: "중요 인프라 공격받음"
 MD_cyber.14.d: "발전소, 교통 허브, 통신 노드가 동시에 작동을 멈췄습니다. 엔지니어들은 제어 시스템을 통한 고의적인 사보타주 징후를 보고하고 있습니다. 이것은 심각한 사태 악화입니다."
 MD_cyber.14.a: "국가 비상사태를 선포하라."
 MD_cyber.15.t: "파멸적인 사이버 타격"
 MD_cyber.15.d: "금융 네트워크, 전력망, 군사 통신, 공급망 등 전국의 모든 중요 시스템이 동시에 타격을 입었습니다. 공격의 규모와 정확도는 전례가 없는 수준입니다. 국가 기능이 마비되었습니다."
 MD_cyber.15.a: "가용한 모든 자원을 동원하라."
 MD_cyber.16.t: "통신망 손상됨"
 MD_cyber.16.d: "외국 요원들이 우리의 암호화된 통신 채널에 침투했습니다. 적대국이 민감한 교신 내용을 모니터링하고 있을 가능성이 높습니다."
 MD_cyber.16.a: "통신망 봉쇄를 시행하라."
 MD_cyber.17.t: "레이더 네트워크 교란됨"
 MD_cyber.17.d: "우리의 방공 레이더 네트워크가 거짓 신호를 반환하고 있습니다. 유령 접촉이 레이더 조작원들을 압도하고 있습니다. 적 항공기가 이 혼란을 악용하고 있을 수 있습니다."
 MD_cyber.17.a: "예비 탐지 프로토콜로 전환하라."
 MD_cyber.18.t: "외국 영향력 작전 감지됨"
 MD_cyber.18.d: "국내 정치 지형을 겨냥한 외국의 조직적 영향력 캠페인 증거가 나타났습니다. 소셜 미디어 네트워크를 통해 허위 정보가 확산되며 대중의 분열을 심화시키고 있습니다."
 MD_cyber.18.a: "외국의 간섭을 규탄하라."
 MD_cyber.19.t: "연구 네트워크 해킹됨"
 MD_cyber.19.d: "국가 연구소와 방위산업체에서 기밀 연구 데이터와 산업 설계도가 유출되었습니다. 유출의 전체 규모는 아직 평가 중입니다."
 MD_cyber.19.a: "모든 기밀 시스템을 감사하라."
 MD_cyber.110.t: "지휘 네트워크 침투됨"
 MD_cyber.110.d: "우리의 군사 및 외교 통신 채널이 침투당했습니다. 적 요원들이 명령과 민감한 서신을 실시간으로 감청하고 있습니다."
 MD_cyber.110.a: "손상된 모든 채널을 삭제하라."
 MD_cyber.111.t: "중앙은행 시스템 공격받음"
 MD_cyber.111.d: "우리 중앙은행과 주요 금융 결제 인프라가 지속적인 사이버 공격을 받고 있습니다. 거래 처리가 중단되고 통화 시장이 빠르게 불안정해지고 있습니다."
 MD_cyber.111.a: "금융 비상사태를 선포하라."
 MD_cyber.112.t: "보급망 교란됨"
 MD_cyber.112.d: "전방 물류를 관리하는 지휘 통제 소프트웨어가 여러 구역에 걸쳐 마비되었습니다. 전선의 부대들은 시스템 전반에 퍼진 혼란으로 인해 물자 부족을 겪고 있습니다."
 MD_cyber.112.a: "수동 보급 절차로 전환하라."
 MD_cyber.113.t: "지속성 침입 감지됨"
 MD_cyber.113.d: "우리 보안 기관이 중요 네트워크 인프라 깊숙한 곳에 숨겨진 휴면 액세스 포인트를 발견했습니다. 이 임플란트는 정교하며 꽤 오랫동안 활성화되어 있었을 가능성이 큽니다."
 MD_cyber.113.a: "전면적인 네트워크 감사를 시작하라."
 MD_cyber.114.t: "지휘 정보 손상됨"
 MD_cyber.114.d: "우리의 정보 기관이 체계적으로 조작된 신호 트래픽 및 허위 통신 캠페인을 확인했습니다. 군 지휘관들이 의도적으로 오염된 정보에 따라 행동했을 가능성이 있습니다."
 MD_cyber.114.a: "신호 검증 태스크포스를 구성하라."
 MD_cyber.115.t: "제로데이 공격"
 MD_cyber.115.d: "이전에 알려지지 않은 익스플로잇을 사용한 파괴적인 사이버 정밀 타격이 우리의 가장 중요한 시스템을 동시에 강타했습니다. 산업 제어 시스템, 전력망 및 방어 네트워크가 모두 영향을 받았습니다."
 MD_cyber.115.a: "국가 사이버 비상 프로토콜을 활성화하라."
 cyber_propaganda_ops_malus: "정보 공간 침투됨"
 cyber_propaganda_ops_malus_desc: "조직적인 외국의 허위 정보 캠페인이 정부 및 제반 기관에 대한 대중의 신뢰를 적극적으로 무너뜨려 정치적 산출을 억제하고 국가적 결속력을 약화시키고 있습니다."
 cyber_gps_jamming_malus: "GPS 시스템 교란됨"
 cyber_gps_jamming_malus_desc: "외국 사이버 요원들이 우리의 군사 위성 내비게이션 인프라를 손상시켜 부대 조정 및 전장 상황 인식을 심각하게 저하시키고 있습니다."
 cyber_economic_disruption_malus: "금융망손상됨"
 cyber_economic_disruption_malus_desc: "외국의 지속적인 사이버 캠페인이 우리의 은행 시스템, 결제망 및 산업 생산량을 저하시키고 있습니다. 경제 회복에는 시간이 걸릴 것입니다."
 cyber_infrastructure_damage_malus: "인프라 피해"
 cyber_infrastructure_damage_malus_desc: "외국 사이버 공격자들이 우리 중요 인프라에 심각한 타격을 입혀 물류, 건설 및 물자 분배에 차질을 빚고 있습니다."
 cyber_critical_strike_malus: "파멸적인 사이버 타격"
 cyber_critical_strike_malus_desc: "파괴적인 전면적 사이버 공격으로 인해 산업 기반, 통신, 공급망이 동시에 마비되었습니다. 복구 과정은 길고 고통스러울 것입니다."
 cyber_sigint_surveillance_malus: "통신망 감시당함"
 cyber_sigint_surveillance_malus_desc: "외국 요원들이 암호화된 통신 인프라에 침투했습니다. 민감한 정보가 모니터링될 가능성이 높아 조직적인 정치 활동이 방해받고 있습니다."
 cyber_radar_spoofing_malus: "레이더 네트워크 손상됨"
 cyber_radar_spoofing_malus_desc: "외국 사이버 요원들이 방공 레이더망에 가짜 신호를 주입하여 탐지 및 요격 능력을 저하시키고 있습니다."
 cyber_election_interference_malus: "외국 영향력 캠페인 활성화됨"
 cyber_election_interference_malus_desc: "조직적인 외국의 허위 정보 캠페인이 대중의 신뢰를 무너뜨리고 국내 정치 분열을 심화시키고 있습니다."
 cyber_industrial_espionage_malus: "연구 네트워크 해킹됨"
 cyber_industrial_espionage_malus_desc: "기밀 연구 데이터와 산업 설계도가 국립 연구소 및 방산업체에서 도난당하여 개발 프로그램이 지연되고 있습니다."
 cyber_comms_intercept_malus: "지휘 네트워크 손상됨"
 cyber_comms_intercept_malus_desc: "군 및 외교 통신이 해킹당했습니다. 작전 보안이 무너지고 부대 간 조정 능력에 타격을 입고 있습니다."
 cyber_financial_system_attack_malus: "금융 인프라 공격받음"
 cyber_financial_system_attack_malus_desc: "중앙은행 및 결제 인프라에 대한 지속적인 공격이 국가 경제 전반에 연쇄적인 붕괴를 초래하고 있습니다."
 cyber_logistics_disruption_malus: "보급망 교란됨"
 cyber_logistics_disruption_malus_desc: "전방 병참을 관리하는 지휘 통제 소프트웨어가 손상되었습니다. 최전선 부대들이 극심한 물자 부족을 겪고 있습니다."
 cyber_sleeper_network_malus: "지속성 네트워크 침입"
 cyber_sleeper_network_malus_desc: "외국 요원들이 우리 주요 네트워크 깊숙한 곳에 휴면 액세스 포인트를 이식하여 민감한 시스템에 대해 저강도의 접근 권한을 지속적으로 유지하고 있습니다."
 cyber_deception_campaign_malus: "지휘 정보 오염됨"
 cyber_deception_campaign_malus_desc: "지휘관들이 조작된 신호와 허위 통신을 바탕으로 임무를 수행하고 있습니다. 군의 조율과 상황 인식이 극도로 저하되었습니다."
 cyber_zero_day_strike_malus: "제로데이 공격"
 cyber_zero_day_strike_malus_desc: "분류된 기밀 제로데이 익스플로잇을 활용한 파괴적인 정밀 공격이 우리의 가장 중요한 산업 및 인프라 시스템을 동시에 덮쳤습니다."
 upgrade_establish_cyber_operations_division: "사이버 작전 부서"
 upgrade_establish_cyber_operations_division_desc: "정보기관 내에 전담 사이버 작전 부서를 설립하여 기본적인 디지털 전쟁을 수행할 수 있는 기초 역량을 제공합니다. 이 부서를 통해 §Y사이버전§! 작전을 수행할 수 있는 능력이 개방됩니다."
 upgrade_offensive_cyber_operations: "공격적 사이버전"
 upgrade_offensive_cyber_operations_desc: "지능형 지속 위협(APT) 도구 및 제로데이 익스플로잇 연구 역량으로 부서를 확장하여 보다 정교한 공격 작전을 가능하게 합니다."
 upgrade_cyber_warfare_operational_planning: "전방위 사이버 사령부"
 upgrade_cyber_warfare_operational_planning_desc: "부서를 전면적인 사이버 사령부로 진화시켜 방어 체계가 견고한 목표물에 대해서도 다각적인 복합 작전을 조직하고 실행할 수 있게 합니다."
 upgrade_defensive_cyber_operations: "방어적 사이버 작전"
 upgrade_defensive_cyber_operations_desc: "자체 네트워크 강화, 침입 탐지 및 아군의 디지털 흔적 은폐를 전문으로 하는 전담 방어팀을 구성합니다."
 upgrade_cyber_elite: "제로데이 무기고"
 upgrade_cyber_elite_desc: "세계에서 가장 강력한 방어 시스템조차 뚫을 수 있는 기밀 엘리트 제로데이 익스플로잇 무기고를 개발하고 비축합니다."
 cyber_offense_power_modifier: "공격적 사이버전"
 cyber_offense_power_modifier_desc: "우리의 공격적인 사이버전 작전이 얼마나 강력한지를 결정하는 값입니다."
 cyber_defense_rating_modifier: "방어적 사이버전"
 cyber_capability_modifier: "사이버전 역량"
 cyber_attribution_bonus_modifier: "사이버 추적 회피 보너스"
 cyber_unlock: "§Y국제 시스템§! 인터페이스 내에 §Y사이버전§! 시스템을 활성화합니다."
 has_cyber_capability_1: "[THIS.GetNameWithFlag]이(가) §G1티어§! §Y사이버 사령부§!를 보유함"
 has_cyber_capability_2: "[THIS.GetNameWithFlag]이(가) §G2티어§! §Y사이버 사령부§!를 보유함"
 has_cyber_capability_3: "[THIS.GetNameWithFlag]이(가) §G3티어§! §Y사이버 사령부§!를 보유함"
 has_cyber_capability_4: "[THIS.GetNameWithFlag]이(가) §G4티어§! §Y사이버 사령부§!를 보유함"
 cyber_not_recently_attacked_target_tt: "[THIS.GetNameWithFlag]이(가) 최근 선택된 국가를 상대로 사이버 공격을 실행하지 않았음"
 cyber_not_at_op_capacity_tt: "[THIS.GetNameWithFlag]의 §Y사이버 사령부§!가 최대 작전 허용량에 도달하지 않음"
 cyber_has_valid_target_tt: "현재 선택된 표적이 유효한 사이버 공격 대상임"
 cyber_not_doing_current_mission_against_tt: "[ROOT.GetNameWithFlag]은(는) 현재 선택된 대상 국가를 상대로 이 유형의 임무를 수행하고 있지 않음"
 cyber_has_expanded_offensive_tt: "자국의 공격적인 사이버전 역량을 확장했음"
 cyber_has_expanded_defensive_tt: "자국의 방어적인 사이버전 역량을 확장했음"
 CYBER_TARGET_DEFENSE_TT: "[?current_cyber_nation_target.GetNameWithFlag]의 §Y사이버 보안§! 수준을 표시합니다."
 CYBER_OFFENSE_TT_DELAYED: "공격 작전의 효과를 결정합니다. 모든 사이버 공격의 성공 확률을 높입니다."
 CYBER_TARGET_DEFENSE_TT_DELAYED: "대상 국가의 §Y사이버 보안§!이 높을수록, 그들의 암호화 방식을 깨거나 부분적으로 무력화하기 전까지 성공적인 작전을 수행하기가 더 어려워집니다."
 cyber_can_expand_offensive_tt: "자국의 공격적인 사이버전 역량을 확장 가능함"
 cyber_can_expand_defensive_tt: "자국의 방어적인 사이버전 역량을 확장 가능함"