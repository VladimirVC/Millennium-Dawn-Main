 BLR_140zadov_category: "140.ª Planta de Reparación"
 BLR_140zadov_category_desc: "La Planta de Reparación número 140 es una empresa estatal del complejo militar-industrial de Bielorrusia, especializada en la reparación y modernización de vehículos blindados y sus motores."
 BLR_140_btr60: "BTR-60MB1"
 BLR_140_btr60_desc: "Una de las variantes bielorrusas de la modernización del vehículo blindado de transporte de tropas soviético BTR-60PB."
 BLR_140_btr70: "BTR-70MB1"
 BLR_140_btr70_desc: "Una de las variantes bielorrusas de la modernización del vehículo blindado de transporte de personal soviético BTR-70."
 BLR_140_kobra_k: "Cobra-K"
 BLR_140_kobra_k_desc: "Una de las variantes bielorruso-eslovacas de modernización del vehículo blindado de transporte de tropas soviético BTR-70."
 BLR_soviet_system: "Bielorrusia nacional-bolchevique"
 BLR_soviet_system_desc: "Los nacionalbolcheviques han tomado el poder en el país y están listos para iniciar sus primeras reformas económicas. Una de ellas será el retorno al sistema económico soviético, dado el historial fallido del anterior gobernante."
 BLR_free_weapon: "Portación libre de armas"
 BLR_free_weapon_desc: "Permitiremos que nuestros ciudadanos porten armas libremente en el país. ¡Tienen derecho a la autodefensa!"
 BLR_new_church: "Nueva religión"
 BLR_new_church_desc: "¡Es hora de crear una nueva religión que sirva a los intereses de nuestro estado!"
 BLR_reform_education: "Reforma Educativa"
 BLR_reform_education_desc: "El sistema educativo está en un estado lamentable, lo solucionaremos e introduciremos cambios importantes en este sistema. Una de las innovaciones será que reduciremos el tiempo de aprendizaje de los escolares y estudiantes, preparándolos más rápidamente para convertirse en ciudadanos de pleno derecho."
 BLR_ruralisation: "Ruralización"
 BLR_ruralisation_desc: "La tendencia del siglo XXI es el reasentamiento de personas de las aldeas a las ciudades, revertiremos esto y ofreceremos a los pobres o personas sin hogar ir a las aldeas, a cambio estimulamos sus actividades en nuevas viviendas."
 BLR_revoult_army: "El Ejército Revolucionario"
 BLR_revoult_army_desc: "Nuestro ejército no ha dado la mejor imagen. Necesita gente que arda con la pasión de la revolución, dispuesta a lanzarse contra una ametralladora enemiga por la patria."
 BLR_revoult_army_zeks: "Permitir que los prisioneros sean reclutados en el ejército"
 BLR_revoult_army_zeks_desc: "Comenzaremos a reclutar prisioneros para el ejército, ubicándolos en batallones separados. ¡Dejen de alimentar a los prisioneros: deben alimentar la llama de la revolución!"
 BLR_revoult_rne: "Invitación a la unidad nacional rusa"
 BLR_revoult_rne_desc: "Incorporaremos oficialmente a representantes de esta organización nacionalista a las estructuras gubernamentales."
 BLR_revoult_sobor: "Invitación a la Catedral Eslava de Belaya Rus"
 BLR_revoult_sobor_desc: "Incorporaremos oficialmente a representantes de esta organización nacionalista a las estructuras gubernamentales."
 BLR_revoult_army_volunteer: "Espíritu revolucionario"
 BLR_revoult_army_volunteer_desc: "Algunos de nuestros soldados están tan ansiosos por luchar que irían a otro país. Quizás no deberíamos reprimir su entusiasmo y enviarlos a cumplir con su deber internacional."
 BLR_revoult_army_gco: "Guardias del comunismo ortodoxo"
 BLR_revoult_army_gco_desc: "Crearemos nuestro propio ejército, similar al CGRI iraní, cuya experiencia nos ha impresionado mucho. Se llamarán Guardias Ortodoxos del Comunismo."
 BLR_work_army: "El ejército obrero"
 BLR_work_army_desc: "Enviaremos a todos los desempleados a la producción, estableciendo en primer lugar la producción de bienes necesarios para nuestro estado."
 BLR_revoult_army_gco_ground_force: "Fuerzas terrestres"
 BLR_revoult_army_gco_ground_force_desc: "El principal y más numeroso tipo de tropas en la composición del GCO. En tiempos de paz, está equipado con armas ligeras. Objetivo principal: seguridad interna; secundario: defensa externa en conjunto con las fuerzas armadas regulares de Bielorrusia."
 BLR_revoult_debur: "Desburocratización"
 BLR_revoult_debur_desc: "Reduciremos el gasto en funcionarios y disminuiremos su número, y los fondos liberados se destinarán al beneficio del pueblo."
 BLR_revoult_army_gco_anti_corrupt: "Comité Revolucionario Anticorrupción"
 BLR_revoult_army_gco_anti_corrupt_desc: "Crearemos una unidad especial para combatir la corrupción en nuestro país. Nadie escapará de la justicia."
 BLR_revoult_dsocial: "Apoyo social"
 BLR_revoult_dsocial_desc: "¡Reforzaremos el apoyo social a nuestros ciudadanos! Nadie se quedará sin ayuda."
 BLR_revoult_army_agro_invest: "Desarrollo de la Agroindustria"
 BLR_revoult_army_agro_invest_desc: "¡Debemos invertir lo máximo posible en el desarrollo de nuestra agroindustria!"
 BLR_revoult_army_gco_air: "Fuerzas aéreas"
 BLR_revoult_army_gco_air_desc: "Crearemos una unidad aérea y daremos a nuestros guardias la oportunidad de utilizar la aviación para cumplir sus objetivos."
 BLR_revoult_army_gco_drone: "Tropas de drones"
 BLR_revoult_army_anti_west: "La Doctrina Antioccidental"
 BLR_revoult_army_anti_west_desc: "La civilización occidental siempre ha sido y siempre será nuestra enemiga, buscando eternamente nuestra destrucción."
 BLR_revoult_army_interbrigade: "Inter brigadas"
 BLR_revoult_army_interbrigade_desc: "Tenemos la intención de formar unidades interbrigadas, que enviaremos al extranjero para proteger nuestros intereses."
 BLR_kgb_expanded: "Ampliar la KGB"
 BLR_kgb_expanded_desc: "Reforzaremos la influencia de la KGB, porque no tenemos intención de disolver un instrumento tan eficaz de seguridad del Estado."
 BLR_army_stabilize: "Estabilizar el ejército"
 BLR_army_stabilize_desc: "Para nuestros propósitos futuros, necesitamos restablecer la capacidad de combate del ejército."
 BLR_prepare_attacks: "Preparación para las intervenciones"
 BLR_prepare_attacks_desc: "Nuestro ejército está listo. Hemos reunido una fuerza impresionante y estamos preparados para expandir la influencia de nuestro país por todo el antiguo territorio de la URSS."
 BLR_baltic_campaign: "La campaña del Báltico"
 BLR_baltic_campaign_desc: "Iniciaremos los preparativos para una campaña militar en los Estados bálticos. ¡Estos países no tienen derecho a la independencia ni a existir!"
 BLR_baltic_war: "Comienza la Marcha del Báltico"
 BLR_baltic_war_desc: "Nuestro ejército ha tomado posiciones y está listo para iniciar una marcha sobre los Estados bálticos."
 BLR_ukraine_campaign: "La campaña ucraniana"
 BLR_ukraine_campaign_desc: "Nuestro vecino del sur está dando señales de unirse a un bloque político-militar hostil hacia nosotros, lo que podría derivar en un ataque. ¡Debemos atacar primero!"
 BLR_ukraine_campaign_border_prepare: "Fortalecimiento de la frontera con Ucrania"
 BLR_ukraine_campaign_border_prepare_desc: "A pesar de que estamos atacando, debemos prepararnos para posibles contramedidas y construir fortificaciones en la frontera."
 BLR_poland_campaign_border_prepare: "Fortalecimiento de la frontera con Polonia"
 BLR_poland_campaign_border_prepare_desc: "A pesar de que estamos atacando, debemos prepararnos para posibles contramedidas y construir fortificaciones en la frontera."
 BLR_poland_campaign_war: "Iniciar una campaña en Polonia"
 BLR_poland_campaign_war_desc: "¡Nuestro ejército está listo! ¡Adelante, a Varsovia!"
 BLR_ukraine_campaign_war: "Iniciar una campaña en Ucrania"
 BLR_ukraine_campaign_war_desc: "¡Nuestro ejército está listo! ¡Adelante, a Kyiv!"
