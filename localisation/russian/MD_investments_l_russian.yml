l_russian:
 this_investment_offer_pending_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! в настоящее время не рассматривает §Cинвестиционные предложения§! от §Y[ROOT.GetNameWithFlag]§!.\n\n§YПримечание разработчика:§! иногда это может привести к блокировке из-за низкой производительности во время многопользовательской игры. Подождите 90 дней (три месяца), прежде чем сообщать о каких-либо ошибках в этом состоянии."
 has_available_treasury_tt: "§YВ казне§! более чем $$§Y[?ROOT.project_monetary_cost^-1]§! миллиардов (Текущее состояние: $$§G[?ROOT.treasury]§! миллиард(ов/а))\n"
 influence_gain_tooltip_yes_tt: "Мы получим влияние с помощью этого инвестиционного проекта.\n\n[investment_cooldown]"
 influence_gain_tooltip_no_tt: "Мы получим влияние с помощью этого инвестиционного проекта.\n"
 disabled_foreign_investment_flag_tt: "§Y[ROOT.GetNameWithFlag]§! может инвестировать в другие страны.\n"
 int_auto_reject_investment_flag_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! не является в настоящее время автоотклонением предложений"
 state_based_investments_screen_tt: "§HВнутренние инвестиции§!"
 check_for_investment_project_limits_tt: "В настоящее время доступен слот §H для внутренних инвестиций §! (бесплатные проекты: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0])"
 state_based_investments_screen_delayed_tt: "Меню ниже представляет собой ряд решений, которые вы можете принять для поощрения различных типов развития в [THIS.GetName]. Все нации будут иметь минимум два доступных слота, которые они могут использовать для любого из своих штатов по всей стране. Вы можете выбрать выполнение нескольких проектов в одном штате или распределить проекты по всей стране. Вы можете получить дополнительные слоты, повысив §YРейтинг мощности§! своей нации\n\nСлоты по рейтингу мощности:\n- §YСверхдержава§!: 6\n- §YВеликая держава§!: 5\n- §YКрупная держава§!: 4\n- §YРегиональная держава§!: 3\n"
 available_internal_investments_screen_tt: "Доступные §Hвнутренние инвестиционные§! слоты: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "У каждой страны будет как минимум два доступных слота, которые можно использовать в любом из штатов на территории всей страны. Вы можете выбрать несколько проектов в одном штате или распределить их по всей стране. Вы можете получить дополнительные слоты, повысив §Yрейтинг силы§!\n\n своей страны.\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "Расширение местных возможностей возобновляемой энергетики"
 state_owned_local_renewable_capacity_modifier_desc: "После серии целевых инвестиций в местную инфраструктуру возобновляемых источников энергии, государство теперь производит больше энергии из возобновляемых источников."
 state_owned_local_infrastructure_modifier: "Расширение местной инфраструктуры"
 state_owned_local_infrastructure_modifier_desc: "Расширение местной инфраструктуры в штате привело к ряду краткосрочных проектов, направленных на значительное улучшение местной инфраструктуры."
 state_owned_local_military_infrastructure_modifier: "Расширение местной военной инфраструктуры"
 state_owned_local_military_infrastructure_modifier_desc: "После значительных инвестиций в местные военные объекты и модернизацию инфраструктуры военные объекты региона в настоящее время полностью модернизированы. Существенно расширились возможности государства в области военного производства."
 state_owned_local_energy_infrastructure_modifier: "Расширение местной энергетической инфраструктуры"
 state_owned_local_energy_infrastructure_modifier_desc: "Целевые инвестиции в местную энергосистему привели к комплексной модернизации государственной инфраструктуры производства и распределения электроэнергии. В настоящее время государство обладает улучшенными возможностями по производству энергии во всех секторах энергетики."
 state_owned_build_forward_logistics_base_modifier: "Создание передовых логистических баз"
 state_owned_build_forward_logistics_base_modifier_desc: "Стратегические базы материально-технического обеспечения были созданы по всему штату, создавая передовую сеть снабжения. Эти объекты значительно улучшают передвижение войск и материальных средств по региону, снижая общие потребности в поставках."
 state_owned_improve_rebuilding_efforts_modifier: "Улучшение усилий по восстановлению"
 state_owned_improve_rebuilding_efforts_modifier_desc: "Усилия по восстановлению привлекли внимание местного населения, улучшив общественное сотрудничество и уменьшив гражданские беспорядки. Инвестиции в местную инфраструктуру и проекты восстановления общин повысили уровень соблюдения требований среди местного населения."
 state_owned_hire_extra_primary_sector_workers_modifier: "Нанять дополнительных работников первичного сектора"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "Численность рабочей силы в первичном секторе штата была расширена за счет целевых инициатив по набору персонала и профессиональной подготовке. Сельскохозяйственные, горнодобывающие и другие операции по добыче ресурсов теперь выигрывают от увеличения доступности рабочей силы, что приводит к увеличению добычи ресурсов."
 currently_encouraged_investments: "В настоящее время §YПоощрение инвестиций§! в §Y[THIS.GetName]§!."
 encourage_investments_in_state_tt: "§YПоощрение инвестиций§! в §Y[THIS.GetName]§!\n---------\nМы можем поощрять инвестиции в §Y[THIS.GetName]§!, сокращая бюрократические препоны в этой области, что позволит ускорить процесс инвестирования."
 encourage_investments_in_state_delayed_tt: "§YТребования:§!\n[!encourage_investments_in_state_click_enabled]\n§YЭффекты:§!\n[!encourage_investments_in_state_click]\n"
 encourage_investments_in_state_click_tt: "В течение 160 дней §Yинвестиции§! в §Y[THIS.GetName]§! будут на §Y15%§! дешевле. Кроме того, ИИ с большей вероятностью будет инвестировать в государство."
 encourage_productivity_in_state: "В данный момент §YСтимулируем продуктивность§! в §Y[THIS.GetName]§!."
 encourage_productivity_in_state_tt: "§YПоощрение роста производительности§! в §Y[THIS.GetName]§!\n---------\nМы можем поощрять рост производительности в §Y[THIS.GetName]§!, привнося новые технологии, методы и другие ресурсы в регион, способствуя его росту."
 encourage_productivity_in_state_delayed_tt: "§YТребования:§!\n[!encourage_productivity_in_state_click_enabled]\n§YЭффекты:§!\n[!encourage_productivity_in_state_click]\n"
 encourage_productivity_in_state_click_tt: "В течение 160 дней §YРост производительности§! в §Y[THIS.GetName]§! будет на §Y20%§! быстрее."
 expand_local_building_capacity: "В настоящее время §YРасширяем возможности местного строительства§! в §Y[THIS.GetName]§!."
 block_future_expand_local_building_capacity: "Мы можем §YРасширить возможности местного строительства§! в §Y[THIS.GetName]§!(Времена Строительство Мощность Расширена: [?expanded_building_slot_times|0Y])"
 expand_local_building_capacity_tt: "§YРасширить местный потенциал строительства§! в §Y[THIS.GetName]§!\n---------\nМы можем расширить местный потенциал строительства, приняв ряд местных строительных политик, расчистив дополнительные земли и расширив доступные ресурсы для местных строителей."
 expand_local_building_capacity_delayed_tt: "§YТребования:§!\n[!expand_local_building_capacity_click_enabled]\n§YЭффекты:§!\n[!expand_local_building_capacity_click]\n"
 expand_local_building_capacity_click_tt: "Каждые 120 дней мы можем получать §G1§! §Yячейку для строительства§! в §Y[THIS.GetName]§!. Мы можем расширить количество §Yячеек для строительства§! в данном регионе до §Y5§!."
 expand_local_renewable_capacity: "В настоящее время §Yрасширяется локальная возобновляемая энергосистема§! в §Y[THIS.GetName]§!."
 expand_local_renewable_capacity_tt: "§YРасширить местную возобновляемую мощность§! в §Y[THIS.GetName]§!\n---------\nНам следует поддержать §YИнфраструктуру возобновляемых источников энергии§! в §Y[THIS.GetName]§!, что приведет к дополнительному производству энергии из местной сети возобновляемых источников энергии."
 expand_local_renewable_capacity_delayed_tt: "§YТребования:§!\n[!expand_local_renewable_capacity_click_enabled]\n§YЭффекты:§!\n[!expand_local_renewable_capacity_click]\n"
 expand_local_renewable_capacity_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 expand_local_infrastructure: "В настоящее время §YРасширение локальной инфраструктуры§! в §Y[THIS.GetName]§!."
 expand_local_infrastructure_tt: "§YРасширьте местную инфраструктуру§! в §Y[THIS.GetName]§!\n---------\nИнфраструктура в §Y[THIS.GetName]§! оставляет желать лучшего. Нам следует разработать несколько целевых краткосрочных проектов по расширению инфраструктуры в штате, чтобы подчеркнуть и расширить местное развитие штата."
 expand_local_infrastructure_delayed_tt: "§YТребования:§!\n[!expand_local_infrastructure_click_enabled]\n§YЭффекты:§!\n[!expand_local_infrastructure_click]\n"
 expand_local_military_infrastructure: "В настоящее время §YРасширение местной военной инфраструктуры§! в §Y[THIS.GetName]§!."
 expand_local_military_infrastructure_tt: "§YРасширьте местную военную инфраструктуру§! в §Y[THIS.GetName]§!\n---------\nВоенные обратились к правительству и определили потенциальные строительные площадки в §Y[THIS.GetName]§!. Они предложили расширить местную военную инфраструктуру здесь, чтобы гарантировать, что военные в регионе получат адекватную поддержку в случае конфликта в этом районе."
 expand_local_military_infrastructure_delayed_tt: "§YТребования:§!\n[!expand_local_military_infrastructure_click_enabled]\n§YЭффекты:§!\n[!expand_local_military_infrastructure_click]\n"
 expand_local_military_infrastructure_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 expand_local_energy_infrastructure: "В данный момент §YРасширяем местную энергетическую инфраструктуру§! в §Y[THIS.GetName]§!."
 expand_local_energy_infrastructure_tt: "§YРасширьте местную энергетическую инфраструктуру§! в §Y[THIS.GetName]§!\n---------\nМестная энергетика в §Y[THIS.GetName]§! может быть расширена для лучшей поддержки населения местного региона, а также для лучшего улучшения национальной сети."
 expand_local_energy_infrastructure_delayed_tt: "§YТребования:§!\n[!expand_local_energy_infrastructure_click_enabled]\n§YЭффекты:§!\n[!expand_local_energy_infrastructure_click]\n"
 expand_local_energy_infrastructure_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 build_forward_logistics_base: "В данный момент §YСтроим базу для перспективной логистики§! в §Y[THIS.GetName]§!."
 build_forward_logistics_base_tt: "§YПостроить передовую логистическую базу§! в §Y[THIS.GetName]§!\n---------\nЭтот регион в настоящее время несколько оторван от наших основных логистических маршрутов. Нам следует рассмотреть возможность строительства передовых логистических баз для поддержки войск, дислоцированных в §Y[THIS.GetName]§!."
 build_forward_logistics_base_delayed_tt: "§YТребования:§!\n[!build_forward_logistics_base_click_enabled]\n§YЭффекты:§!\n[!build_forward_logistics_base_click]\n"
 build_forward_logistics_base_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 improve_rebuilding_efforts: "В данный момент §YУлучшаем усилия по восстановлению§! в §Y[THIS.GetName]§!."
 improve_rebuilding_efforts_tt: "§YУлучшение усилий по восстановлению§! в §Y[THIS.GetName]§!\n---------\nТеперь, когда §Y[THIS.GetName]§! полностью под нашим контролем, мы должны обратить внимание на усиление усилий по восстановлению в регионе, чтобы гарантировать, что население сможет продолжать беспрепятственно."
 improve_rebuilding_efforts_delayed_tt: "§YТребования:§!\n[!improve_rebuilding_efforts_click_enabled]\n§YЭффекты:§!\n[!improve_rebuilding_efforts_click]\n"
 improve_rebuilding_efforts_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 hire_extra_primary_sector_workers: "В данный момент §YНанимаем дополнительных работников первичного сектора§! в §Y[THIS.GetName]§!."
 hire_extra_primary_sector_workers_tt: "§YНанять дополнительных работников первичного сектора§! в §Y[THIS.GetName]§!\n---------\nПроизводство ресурсов в §Y[THIS.GetName]§! не соответствует ожиданиям страны по объему. Нам следует рассмотреть возможность найма дополнительных работников первичного сектора для повышения производства ресурсов."
 hire_extra_primary_sector_workers_delayed_tt: "§YТребования:§!\n[!hire_extra_primary_sector_workers_click_enabled]\n§YЭффекты:§!\n[!hire_extra_primary_sector_workers_click]\n"
 hire_extra_primary_sector_workers_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 improve_local_conservation_efforts: "В данный момент §YУлучшаем местные усилия по охране природы§! в §Y[THIS.GetName]§!."
 improve_local_conservation_efforts_tt: "§YНеобходимо активизировать усилия по охране природы на местном уровне§! в §Y[THIS.GetName]§!\n---------\nНам следует обратить внимание на активизацию усилий по охране природы на местном уровне в §Y[THIS.GetName]§!, чтобы защитить местную экосистему и дикую природу, а также сохранить биоразнообразие и естественную среду обитания для будущих поколений."
 improve_local_conservation_efforts_delayed_tt: "§YПредпосылки:§!\n[!improve_local_conservation_efforts_click_enabled]\n§YЭффекты:§!\n[!improve_local_conservation_efforts_click]\n"
 improve_local_conservation_efforts_click_tt: "В течение 120 дней мы получаем следующее в §Y[THIS.GetName]§!:\nШтрафы от §YМестных усилий по охране природы Амазонки§! уменьшаются на §G-25%§!."
 state_owned_local_naval_infrastructure_modifier: "Расширение местной военно-морской инфраструктуры"
 state_owned_local_naval_infrastructure_modifier_desc: "Инвестиции в береговую оборону и военно-морскую инфраструктуру изменили морские возможности государства. Новые военно-морские объекты и узлы снабжения теперь обеспечивают всестороннюю поддержку военно-морских операций в регионе."
 state_owned_local_fortification_efforts_modifier: "Местные фортификационные работы"
 state_owned_local_fortification_efforts_modifier_desc: "По всему штату были построены обширные оборонительные сооружения, включая бункеры, прибрежные укрепления и сети опорных пунктов. Эти военные объекты значительно повышают оборонительные возможности государства против вторжения и наземных атак."
 expand_local_coastal_infrastructure: "В настоящее время §Yрасширяется прибрежная местная инфраструктура§! в §Y[THIS.GetName]§!."
 expand_local_coastal_infrastructure_tt: "§YРасширить местную прибрежную инфраструктуру§! в §Y[THIS.GetName]§!\n---------\nПрибрежные регионы §Y[THIS.GetName]§! значительно выиграют от улучшения инфраструктуры. Нам следует заняться расширением портов, гаваней и прибрежной обороны, чтобы усилить морскую торговлю и военно-морские возможности."
 expand_local_coastal_infrastructure_delayed_tt: "§YТребования:§!\n[!expand_local_coastal_infrastructure_click_enabled]\n§YЭффекты:§!\n[!expand_local_coastal_infrastructure_click]\n"
 expand_local_coastal_infrastructure_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 expand_local_fortification_efforts: "В настоящее время §Yведутся местные фортификационные работы§! в §Y[THIS.GetName]§!."
 expand_local_fortification_efforts_tt: "§YРасширить местные фортификационные работы§! в §Y[THIS.GetName]§!\n---------\nОборонные возможности §Y[THIS.GetName]§! необходимо укрепить. Нам следует заняться расширением местных укреплений и оборонительных сооружений, чтобы лучше защитить этот стратегически важный регион."
 expand_local_fortification_efforts_delayed_tt: "§YТребования:§!\n[!expand_local_fortification_efforts_click_enabled]\n§YЭффекты:§!\n[!expand_local_fortification_efforts_click]\n"
 expand_local_fortification_efforts_click_tt: "За 180 дней мы получаем следующее в §Y[THIS.GetName]§!:\n"
 investments_DECISIONS: "Строительные проекты"
 investments_DECISIONS_desc: "Наши строительные проекты в зарубежных странах.\n\nНаш текущий объем §Gмеждународных инвестиций§! $$[?ROOT.int_investments] §Hмлрд§!.\nТекущие активные §Yинвестиционные проекты§!: [?active_projects]/15\n"
 investments_construction_CANCEL_decision: "Отменить строительный проект"
 investments_construction_CANCEL_decision_desc: "Возмещает стоимость недостроенных зданий."
 investments_target_country_DECISIONS: "Строительные проекты"
 investments_target_country_DECISIONS_desc: "Строительные проекты зарубежных стран в нашей стране."
 investments_project_0_decision: "Инвестиционный проект №1 в §Y[?ROOT.project_array^0.GetName]§!"
 investments_project_0_decision_desc: "Строительный проект с иностранными инвестициями. Подробности о здании см. во всплывающей подсказке.\n\n Общее время строительства: [?ROOT.project_construction_duration^0] дней\n Первоначальная стоимость: [?ROOT.project_monetary_cost^0|3]\n Щелкните правой кнопкой мыши, чтобы увидеть целевое состояние."
 investments_project_0_target_decision: "Инвестиционный проект №1 в §Y[?FROM.project_array^0.GetName]§!"
 investments_project_0_target_decision_desc: "Страна: [FROM.GetName]\nОчередь строительства: [?FROM.project_build_amount^0]\n\nПри выборе этого решения строительный проект будет отменен. \nЩелкните правой кнопкой мыши, чтобы увидеть целевое состояние."
 investments_project_1_decision: "Инвестиционный проект №2 в §Y[?ROOT.project_array^1.GetName]§!"
