 investments_standby_project_desc: "[THIS.GetName] анализирует наш запрос"
 investments_build_button_tt: "[investments_get_build_button_tt]"
 investments_build_button_tt_1: "Инвестиции в строительные проекты повысят ваше влияние в целевой стране и принесут доход вашей стране.\n\n§Y На общее время строительства влияют как уровень коррупции в стране, так и уровень развития инфраструктуры.  По умолчанию время строительства увеличивается на 35 %, независимо от модификаторов. §!\n\n§L Если целевая страна примет ваше инвестиционное предложение, по завершении строительства она получит здание. §!\n ИИ отклонит инвестиционное предложение, если в стране проблемы с экономикой или слишком низкий уровень внутреннего влияния.\n\n[investment_cooldown]"
 investments_build_button_tt_delayed: "§YПредварительные условия§!:\n[!investments_build_button_click_enabled]"
 investments_14_cooldown_tt: "Если страна примет его, запустится таймер на §Y14 дней§!, который начнет отсчитываться с момента принятия.  Вы не получите больше влияния, сколько бы денег ни вложили в эту страну за время действия таймера."
 investments_30_cooldown_tt: "Если страна примет предложение, запустится таймер на §Y30 дней§!, который начнет отсчитываться с момента принятия.  Вы не получите больше влияния, сколько бы денег ни вложили в эту страну за время действия таймера."
 investments_build_button_tt_2: "Отмените активный проект (Вы можете сделать только одну инвестицию в этом штате в день)."
 investments_build_button_tt_b: "При нажатии на эту кнопку будет запрошено разрешение у управляющего штата. Если он согласится, на вкладке «Решения» начнется строительный проект. Этот проект будет повторяться до тех пор, пока не будут завершены все здания, стоящие в очереди.\n\n§Y Скорость строительства снижается на 25 % по сравнению с обычной (с учетом модификаторов скорости строительства в вашей стране).§!\n\n§L Одновременно может быть активен только один строительный проект.\n\n В штате не может быть активен строительный проект из нескольких стран.\n\nАдминистратор этого штата откажет вам, если у него сложилось о вас негативное мнение.§!"
 investments_gain_tooltip: "[investments_gain_tooltip]"
 investments_event.1.t: "Инвестиционное предложение от [FROM.GetNameWithFlag]"
 investments_event.1.d: "[FROM.GetName] предлагает построить [?pending_offer_amount]x [investments_get_pending_offer_construction_type] в [?pending_offer_state.GetName].\n\n Полная стоимость проекта оценивается в $$[?pending_offer_total_cost] миллиардов. Ориентировочно на завершение проекта уйдет [?pending_offer_duration] дней.  [FROM.GetName] предлагает нам сделку, по условиям которой мы вносим 10% от стоимости строительства. [FROM.GetNameWithFlag] потенциально может усилить свое влияние благодаря этой работе.  [FROM.GetNameWithFlag] получит прибыль от этого проекта.\n\n\n Срок выполнения: [?pending_offer_duration]\n Общая стоимость проекта ([FROM.GetNameWithFlag]): $$[?pending_offer_total_cost] миллиардов\n Тип здания: [investments_get_pending_offer_construction_type]\n Стоимость инвестиций ([THIS.GetNameWithFlag]): $$[?investor_cost]\n Местоположение: [?pending_offer_state.GetName]"
 investments_event.1.o1: "Принимаю предложение"
 investments_event.1.o2: "Отклонить предложение"
 investments_event.2.t: "Отказано в разрешении на строительство"
 investments_event.2.d: "Мы получили отказ от нашего потенциального нового инвестиционного партнера. Невероятно, что они отказались от нашего проекта! Мы же не получим никакого влияния или контроля над их правительством, помогая развивать их страны! Что ж, инвестиционная сделка с [FROM.GetName] сорвалась в [?ROOT.investments_state_target.GetName], так что мы можем предложить ее кому-нибудь еще."
 investments_event.2.o1: "Может быть, их сосед..."
 investments_event.3.t: "Строительный проект отменен"
 investments_event.3.d: "К сожалению, мы не смогли завершить инвестиционную сделку с нашими партнерами в [FROM.GetName]. Причин может быть много: отношения с правительством, нехватка финансирования или просто отсутствие интереса со стороны местных жителей. Мы всегда можем попробовать в другой раз."
 investments_event.3.o1: "Их потеря!"
 investments_build_cost_tt: "§YСтоимость иностранных инвестиций§!\n\n§YСтоимость иностранных инвестиций§! §g — это первоначальные затраты на проект, который мы планируем запустить. Они напрямую списываются из государственного бюджета и добавляются к нашим§! §Y международным инвестициям§! §g после утверждения проекта.§!\n\n§g Если вы только что нажали на кнопку из другой страны или штата, увеличьте сумму инвестиций или нажмите на другое здание, чтобы обновить всплывающую подсказку и увидеть реальную стоимость.§!\n\n§g На стоимость инвестиционного проекта могут повлиять коррупция, национальные особенности и многое другое. Коррупция в стране, в которую инвестируют, увеличит стоимость проекта в зависимости от уровня коррупции.§!\n"
 investments_build_cost_tt_delayed: "Модификаторы:\n§YСтоимость инвестиций в [PREV.CONTROLLER.GetNamewithFlag]:§! [?ROOT.displayable_monetary_cost_modifier|%0-] \n"
 investments_clock_tt: "§YВремя реализации инвестиций: §! [?ROOT.project_total_construction_duration_display^-1] дней\n\n§Y Время реализации инвестиций§! §g или продолжительность проекта — это общее время, которое потребуется для реализации предложенного нами проекта в [PREV.GetName]. Чем больше зданий вы предлагаете §Y[PREV.CONTROLLER.GetNamewithFlag]§! для реализации, тем дольше будет длиться проект.§!\n\n§g Если вы только что перешли из другой страны или штата, увеличьте количество зданий или выберите другое здание, чтобы обновить всплывающую подсказку и увидеть реальную стоимость.§!\n"
 investments_clock_tt_delayed: "Модификаторы:\n[investments_get_infrastructure]\n§Y Модификатор для инвестирования в [PREV.CONTROLLER.GetNamewithFlag]:§! [?ROOT.displayable_construction_modifier|%]\n"
