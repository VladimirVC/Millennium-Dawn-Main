 UZB_migration_central_asia_4_desc: "このディシジョンは海外のウズベク人の間でのウズベク人アイデンティティを守り強くすることを目的としている。文化プログラムや教育活動、海外ウズベク人コミュニティの支援を組織することによって、ウズベキスタンの人口流出を減らし同胞との絆を維持することが狙いである。"
