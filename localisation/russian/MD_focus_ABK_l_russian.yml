 ABK_transnistria_friend: "Дружба с Приднестровьем"
 ABK_transnistria_friend_desc: "Мы продолжим улучшать наши отношения с коллегами из Приднестровья."
 ABK_orthodox_church_support: "Поддержка Православной Церкви"
 ABK_orthodox_church_support_desc: "Православная Церковь стала опорой стабильности и нравственного ориентира в Абхазии, укрепляя нашу национальную идентичность и обеспечивая духовное руководство народом."
