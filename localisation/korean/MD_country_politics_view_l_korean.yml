 RETIRE_LEADER: "§Y[Root.GetLeader]§! \n 지도자 자리에서 §R은퇴§!"
 RETIRE_LEADER_TT: "이 결정은 확실히 충격을 주고 막대한 정치적 대가를 치르게 하며, [Root.GetLeader]이(가) 정계에 복귀할 가능성을 영원히 차단하겠지만, 정계의 노고에서 벗어나 가족과 더 많은 시간을 보내기 위해 은퇴할 수 있는 가능성은 항상 열려 있습니다.\n\n§Y전제 조건:§! \n[!retire_leader_button_click_enabled] \n§Y효과:§! \n[!retire_leader_button_click]"
