l_simp_chinese:
 brics_join.1.t: "[FROM.GetNameDef]寻求加入金砖国家"
 brics_join.1.d: "[FROM.GetNameDef]已正式申请加入金砖国家。作为金砖国家的领导者，是否接纳他们加入的决定权在我们手中。"
 brics_join.1.a: "他们能增强集团实力。接纳他们吧。"
 brics_join.1.b: "他们的成员资格对我们没有任何好处。"
 brics_join.2.t: "我们的申请已被接受。"
 brics_join.2.d: "金砖国家已批准我们的入盟申请。我们将正式成为金砖国家的一员。"
 brics_join.2.a: "在金砖国家中占据一席之地"
 brics_join.3.t: "我们的金砖国家申请被驳回"
 brics_join.3.d: "金砖国家领导国拒绝了我们的申请。但这扇门并非永远关闭，我们或许会在适当的时候再次提出申请。"
 brics_join.3.a: "我们将稍后再次申请。"
 brics_join.3.b: "放弃努力"
 brics_join.4.t: "[ROOT.GetNameDef]加入金砖国家"
 brics_join.4.d: "[ROOT.GetNameDef]已被接纳为金砖国家成员，扩大了该集团在国际秩序中的影响力和地位。"
 brics_join.4.a: "不断变化的平衡"
 brics_join.5.t: "是时候再次与金砖国家接触了"
 brics_join.5.d: "距离我们上次被拒已经过去了足够长的时间。我们可以再次向金砖国家领导国提交申请。"
 brics_join.5.a: "重新提交申请"
 brics_join.5.b: "时机未到"
 brics_join.6.t: "[FROM.GetNameDef]邀请我们一同建立金砖国家"
 brics_join.6.d: "[FROM.GetNameDef]正在促成金砖国家的诞生，并邀请我们加入其创始成员行列，从一开始就塑造这个集团。"
 brics_join.6.a: "我们将协助创立金砖国家。"
 brics_join.6.b: "我们将保持距离"