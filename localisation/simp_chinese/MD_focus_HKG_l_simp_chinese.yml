 HKG_contract_section_label: "有效合同 ([?HKG_contract_count|0] / [?HKG_contract_max_slots|0])"
 HKG_contract_idle: "目前没有有效合同。请向北京申请采购令，或等待中央军委下达采购令。"
 HKG_contract_row0: "§Y[GetHKGContractRow0Class]§![GetHKGContractRow0License] - §G[?HKG_contract_disp_quota_0|0]§!/[?HKG_contract_disp_total_0|0]军舰未完成，§G[?HKG_contract_disp_deadline_0|0]§!剩余天数"
 HKG_contract_row1: "§Y[GetHKGContractRow1Class]§![GetHKGContractRow1License] - §G[?HKG_contract_disp_quota_1|0]§!/[?HKG_contract_disp_total_1|0]军舰未完成，§G[?HKG_contract_disp_deadline_1|0]§!剩余天数"
