 afv_assault_gun_5: "Hyper Advanced Assault Cannon"
 afv_assault_gun_5_desc: "Guided munitions with programmable fuzing and autonomous target tracking make every round count, even against fast-moving or concealed targets."
 afv_assault_gun_6: "Ultra Advanced Assault Cannon"
 afv_assault_gun_6_desc: "Directed-energy assist and hypervelocity propellant technology push muzzle velocity and penetration beyond what conventional ballistics can achieve. Nothing short of a main battle tank's armor is safe."
