 NKO_Simhwajo_Sageon_legacy: "l'Héritage de Simhwajo Sageon"
 NKO_Simhwajo_Sageon_legacy_desc: "Le Simhwajo Sageon est une campagne de purge massive menée par Kim Jong-il pour éliminer les hommes de son père Kim Il-Sung qui a eu lieu en RPDC entre 1997 et 2000.\nCertains l'ont appelé la « version nord-coréenne du maccarthysme » ou la « version nord-coréenne de la révolution culturelle »."
