 FCA_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetFCANameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_GCL_category: "제 2 그란콜롭비아"
 form_GCL_category_desc: "그란 콜롬비아는 오늘날의 에콰도르, 콜롬비아, 파나마, 베네수엘라를 아우르던 지금은 사라진 국가입니다. 이 볼리바르주의 국가는 남아메리카의 힘을 상징하는 전형 중 하나이며, 우리 위대한 국가가 추구할 가치가 있는 목표입니다. 형제 국가들에 있는 동포들을 통합하는 것은 외세의 영향력을 격퇴하고 우리 위대한 국가를 강화할 것입니다. 우리는 제2의 그란 콜롬비아를 선포하고 우리 위대한 국가들에 통합을 가져올 것입니다!"
 GCL_integrate_COL: "[GetGCLNameAdj] [COL.GetAdjective] 영토 통합"
 GCL_integrate_COL_desc: ""
 GCL_integrate_VEN: "[GetGCLNameAdj] [VEN.GetAdjective] 영토 통합"
