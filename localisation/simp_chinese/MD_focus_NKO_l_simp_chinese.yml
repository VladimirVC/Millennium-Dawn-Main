 NKO_party_state_army_desc: ""
 NKO_party_unchecked: "永恒的党"
 NKO_party_unchecked_desc: ""
 NKO_eternal_juche_sasang: "永恒的主体思想"
 NKO_eternal_juche_sasang_desc: ""
 NKO_kim_jong_nam: "金正男"
 NKO_kim_jong_nam_desc: "金正日的长子金正男长期以来一直是朝鲜政坛的争议人物。他曾被视为政权继承人，但其对政权的公开批评以及随后的流亡，使他成为异议的象征。金正男倡导经济改革和与国际社会接触，其理念与弟弟金正恩的传统主义路线截然不同。他返回朝鲜可能预示着朝鲜政策将转向更加开放的方向，并可能对现有秩序构成挑战。"
 NKO_face_world: "面对世界"
 NKO_face_world_desc: "国家的体制改革离不开外部支持，因此我们需要重视外交治理，与世界保持良好关系。"
 NKO_diplomatic_overtures: "与各国建立外交关系"
 NKO_diplomatic_overtures_desc: "朝鲜外交之路的第二步是与各国建立正式的外交关系，这将使我们的改革之路更加顺利。"
 NKO_step_up_joint_ventures: "邀请更多合资企业"
 NKO_step_up_joint_ventures_desc: "外国投资是帮助我们经济改革的渠道，我们对此表示欢迎。"
 NKO_embrace_the_people: "拥抱人民"
 NKO_embrace_the_people_desc: "我国不能永远闭关自守。现在是时候张开双臂拥抱我们的人民，创造一个不同的朝鲜了。"
 NKO_loosen_information_monopoly: "放宽信息垄断"
 NKO_loosen_information_monopoly_desc: "人们可以自由表达自己的观点。"
 NKO_tone_down_propaganda: "减少官方宣传力度"
 NKO_tone_down_propaganda_desc: "虽然官方媒体曾经体现了国家的意志，但我们的民主化改革如今无需把“民主”强加给他们。"
 NKO_end_forced_labor: "终止劳役制度"
 NKO_end_forced_labor_desc: "再也没有强制劳役，我们将走向开放的世界。"
 NKO_expand_sezs: "拓展经济特区"
 NKO_expand_sezs_desc: "我们的经济改革离不开罗先和开城经济特区的帮助，我们可以建立更多的经济特区，让一部分人先富起来。"
 NKO_end_juche: "终结主体思想"
 NKO_end_juche_desc: "主体思想不是灵丹妙药，我们需要更科学的指导思想。"
 NKO_foreign_knowledge: "聘请外国研究人才"
 NKO_foreign_knowledge_desc: "由于过去几十年的高压政策，朝鲜失去了很多人才，为了弥补人才缺口，我们可以聘请一些外国研究人员。"
 NKO_join_the_wto: "加入世贸组织"
 NKO_join_the_wto_desc: "长期以来，我们被排除在世界贸易组织成员共享的全球贸易利益之外。现在我们改变这种状况，可以更好地利用西方自由经济秩序的机制为我们的改革服务。"
 NKO_preserve_the_party: "维持劳动党领导"
 NKO_preserve_the_party_desc: "改革开放不等于放弃党的领导，党可以带领人民走向光明、繁荣的未来。"
 NKO_appeal_to_the_youth: "号召青年"
 NKO_appeal_to_the_youth_desc: "青年才是我们改革路程的中坚力量！"
 NKO_the_choson_dream: "朝鲜梦"
 NKO_the_choson_dream_desc: "“朝鲜梦”是[NKO.GetLeader]主席提出的新理念，它凝聚了朝鲜民族的个人和国家目标，包括经济、政治和国际等多个领域的愿望。"
 NKO_democracy_with_north_characteristics: "具有朝鲜特色的民主制度"
 NKO_democracy_with_north_characteristics_desc: "西方式民主并不完全适合朝鲜，朝鲜需要有朝鲜特色的民主制度。"
 NKO_people_before_party: "民先于党"
 NKO_people_before_party_desc: "人民才是国家的主人！"
 NKO_elections: "地方选举"
 NKO_elections_desc: "我们的改革包括政治制度的民主化，人民将有权选择他们想要的领导人。"
 NKO_free_expression: "言论自由"
 NKO_free_expression_desc: "朝鲜人民在压迫性政策下被压制太久，赋予人民的首要自由是言论自由。"
 NKO_byungjin: "并进"
 NKO_byungjin_desc: "在苦难行军的征程中，英明的金正日将军为了保持国家的稳定，采取了“先军”政策，使我国得以渡过难关。 但现在国家经济已经回暖，是时候摒弃以军事为中心的老路，让我们的国防和经济事业同步发展了！"
 NKO_scale_back_spending: "削减政府开支"
 NKO_scale_back_spending_desc: ""
 NKO_encourage_consumption: "鼓励消费"
 NKO_encourage_consumption_desc: ""
 NKO_loosen_grip_on_soes: "放宽对国有企业的控制"
 NKO_loosen_grip_on_soes_desc: ""
 NKO_state_owned_enterprises_competition: "国有企业竞争"
 NKO_state_owned_enterprises_competition_desc: ""
 NKO_resorts_and_tourism: "度假村和旅游业"
 NKO_resorts_and_tourism_desc: "在国际制裁下，我们获得外汇的途径寥寥无几。加强旅游业建设，让全世界的人都来领略朝鲜的美丽风光！"
 NKO_samjiyon: "三池渊"
 NKO_samjiyon_desc: "三池渊是我们朝鲜伟大的革命圣地。 它的地位与中国的延安相似。 我们应该努力建设好那里，让人们接受更多的爱国主义教育。"
 NKO_incentive_based_economy: "激励型经济"
 NKO_incentive_based_economy_desc: "放松中央对企业的控制已初见成效。通过允许管理者奖励生产力并保留一部分产出，国家既能利用自身利益促进经济增长，又不会放弃对经济的掌控。"
 NKO_empower_the_donju: "倚重金主"
 NKO_empower_the_donju_desc: "尽管国家的发展不能过度依赖外部世界。 但如果没有“金主”，我们的经济将难以为继。 给他们更多有利于贸易的权利，让他们做国民经济的领头羊，让朝鲜经济这匹千里马奔腾吧！"
 NKO_weaken_the_donju: "削弱金主"
 NKO_weaken_the_donju_desc: "贴牌转售中国和南朝鲜的商品并没有让我们的国家变得富裕起来。我们要专注于自己的工业品牌，让朝鲜品牌崛起于世界市场！"
 NKO_protect_state_owned_business: "保护国有企业"
 NKO_protect_state_owned_business_desc: ""
 NKO_encourage_foreign_investment: "鼓励外国投资"
 NKO_encourage_foreign_investment_desc: "尽管我们的国内产业具有韧性十足，但若没有海外投资，其全部经济潜力仍难以完全释放。我们应当提供激励措施，鼓励外商直接投资进入我国。"
 NKO_privatize_means_of_production: "私有化生产资料"
 NKO_privatize_means_of_production_desc: ""
 NKO_economy_revival: "经济复苏"
 NKO_economy_revival_desc: "随着“苦难行军”的结束，是时候让我们的经济重新运转起来了。"
 NKO_priorit_for_civilian_industry: "专注于民用工业"
 NKO_priorit_for_civilian_industry_desc: ""
 NKO_priorit_for_army_industry: "专注于军事工业"
 NKO_priorit_for_army_industry_desc: "军工产业对我们至关重要，既能拉动经济内需，又能增强国防力量。"
 NKO_arms_trafficking: "军火贩运"
 NKO_arms_trafficking_desc: "为什么仓库里要一直堆放着无数的武器？ 我们可以用它们换来真金白银。"
 NKO_sinuiju: "新义州特别行政区"
 NKO_sinuiju_desc: "新义州一直是朝中贸易的重要港口。 我们可以效仿中国的一国两制。 使其更适合对外贸易。"
 NKO_recognition_of_economic_backwardness: "承认经济落后"
 NKO_recognition_of_economic_backwardness_desc: "“苦难行军”之后，朝鲜经济已经落后于时代。我们需要彻底的改革。"
 NKO_2009_revaluation: "改革"
 NKO_2009_revaluation_desc: "苦难行军期间，我国的经济，特别是货币体系受到重创。人们不信任我们的货币，日常生活充满了以物易物的现象。要改变现状，我们需要一次大胆的货币改革。"
 NKO_revaluation_failure: "改革失败了……"
 NKO_revaluation_failure_desc: ""
 NKO_air_koryo: "高丽航空"
 NKO_air_koryo_desc: ""
 NKO_reform_of_the_privatisation_of_collective_farms: "集体农庄私有化"
 NKO_reform_of_the_privatisation_of_collective_farms_desc: "放宽对当地集体农庄的控制，以增加其生产的积极性。"
 NKO_construction_of_hydraulic_facilities: "水利设施建设"
 NKO_construction_of_hydraulic_facilities_desc: "为了在不过度依赖化肥的情况下提高农业产量，我们必须建设更多的水利设施。"
 NKO_free_housing: "额外免费住房"
 NKO_free_housing_desc: "多建些公寓，让人们买得起房住！"
 NKO_expand_compulsory_education: "拓展义务教育"
 NKO_expand_compulsory_education_desc: "教育是强国之本。扩大义务教育，让更多儿童接受高等教育。"
 NKO_chollima_speed_desc: "基础设施建设是重建我们经济的重要一步，不仅对我们的经济发展有利，也有利于军事，比如能够承载重型装备的道路和能够运输导弹列车的铁路。"
 NKO_arduous_march: "苦难行军"
 NKO_arduous_march_desc: "§R朝鲜饥荒§!是1994年起朝鲜发生的大规模饥荒和整体经济危机时期，亦被称为“苦难行军”。"
 NKO_dmz_remilitarized: "非军事区再军事化"
 NKO_dmz_remilitarized_desc: "重新军事化非军事区将标志着我们与南方冲突的显著升级，但无疑将使我军在即将到来的冲突中占据优势。"
 NKO_kor_hostile_action_tt: "没有被最近的敌对行动所激怒"
 NKO_broken_juche: "破碎的主体思想"
 NKO_eternal_juche: "永恒的主体思想"
 NKO_marxism_leninism: "马列主义"
 NKO_democratic_land: "民主之地"
 NKO_songun_junta: "先军"
 NKO_songun_junta_desc: "先军是朝鲜的一项政策。它要求在国家的政治和经济中，“一切以人民军为先”。"
 NKO_self_reliance: "自力更生"
 NKO_choson_dream: "朝鲜梦"
 NKO_anti_tatmadaw_sentiment: "反人民军情绪"
 NKO_anti_tatmadaw_sentiment_desc: "当朝鲜人民军选择对朝鲜的政治局势进行重大改组时，人民对军事统治的敌意已经达到了前所未有的水平。"
 NKO_simhwajo_sageon_legacy: "深化组事件的遗产"
 NKO_simhwajo_sageon_legacy_desc: "深化组事件是一场在1997年至2000年间由金正日发起的大规模清洗运动，旨在清除其父金日成时期的旧部。\n有些学者称之为“朝鲜版麦卡锡主义”或“朝鲜版文化大革命”。"
 NKO_close_dmz: "关闭非军事区"
 NKO_close_dmz_desc: ""
 NKO_superiority_of_dprk_model: "朝鲜模式的优越性"
 NKO_superiority_of_dprk_model_desc: ""
 NKO_abolish_life_time_system_for_cadres_in_leadership: "废除领导干部终身制"
 NKO_abolish_life_time_system_for_cadres_in_leadership_desc: ""
 NKO_allow_donju_to_join_wpk: "允许金主加入朝鲜劳动党"
 NKO_allow_donju_to_join_wpk_desc: "金主就是合法经商，依法纳税的商人。为什么他们不能加入朝鲜劳动党？"
 NKO_kim_jong_un_successor: "§Y金正恩§! 上位。"
 NKO_kim_jong_nam_successor: "§Y金正男§!上位。"
 NKO_chi_propose_trade_agreement_tooltip: "与§Y[CHI.GetNameWithFlag]有贸易协议§!\n"
 NKO_russian_friendship: "俄朝联盟"
 NKO_russian_friendship_desc: "俄罗斯一直是我们的主要盟友之一，苏联更是对我们的诞生与存续发挥了重要作用。我们打算再次努力恢复两国之间的盟友关系。"
