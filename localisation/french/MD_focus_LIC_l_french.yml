 LIC_9833_name: "Constantinople"
 LIC_Hire_a_Chief_of_the_Army: "Embaucher un chef d'état-major de l'armée"
 LIC_Hire_a_Chief_of_the_Army_desc: "Toute armée a besoin d'un général. Sans lui, tous les fonds investis dans l'armée seront vains. Notre chef de police actuel, Jules Hoch, accomplira un travail remarquable à ce poste !"