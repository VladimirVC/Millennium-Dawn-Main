 RETIRE_LEADER: "§Y[Root.GetLeader]§! \n §RУйти в отставку§! с поста лидера"
 RETIRE_LEADER_TT: "Хотя это, безусловно, станет потрясением, повлечёт высокую политическую цену и навсегда исключит возможность возвращения [Root.GetLeader] в политику, существует открытая возможность уйти в отставку, чтобы проводить больше времени с семьёй и держаться подальше от политических тягот.\n\n§YУсловие:§! \n[!retire_leader_button_click_enabled]\n§YЭффекты:§! \n[!retire_leader_button_click]"
 retire_leader_effect_tt: "§H[Root.GetLeader]§! §Wуйдёт в отставку с поста лидера [Root.GetName]§!\n§H[show_ruling_party]§! §Wвыберет нового лидера из своих рядов.§!"
