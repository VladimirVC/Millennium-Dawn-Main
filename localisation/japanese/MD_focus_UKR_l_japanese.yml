l_japanese:
 UKR_found_the_uop: "軍産複合体の改革"
 UKR_found_the_uop_desc: "わが国の防衛産業は悲惨な状態にあるため、この分野で世界規模の改革を開始せざるを得ない。"
 UKR_ukrainian_armed_forces_reform: "軍隊の改革"
 UKR_ukrainian_armed_forces_reform_desc: "Our armed forces urgently need reform. We must create new structures and new types of troops, and solve the old problems of our army."
 UKR_srdsc: "国立研究設計造船センター"
 UKR_srdsc_desc: "国立研究設計造船センターは、ウクライナ国防産業国営企業の一部であり、造船を専門とする設計局で、ウクライナのミコラーイウにある。"
 UKR_defend_our_sky: "航空産業の復活"
 UKR_defend_our_sky_desc: "ソ連崩壊以来、ひどい状況にあった我が国の航空産業の復興を開始する。"
 UKR_cut_down_the_general_staff: "将軍の数を減らす"
 UKR_cut_down_the_general_staff_desc: "Too many generals negatively affect our army, it's time to fix it."
 UKR_contract_army: "軍事教育改革"
 UKR_contract_army_desc: "We will reorganize the old military universities, as well as create new ones, to improve the quality of our armed forces."
 UKR_war_on_donbass_experience: "私たちの軍隊"
 UKR_war_on_donbass_experience_desc: "The Ukrainian Army is literally a shadow of its former Soviet, and now Russian, counterpart. It is time to change that."
 UKR_support_uia: "ウクライナ国際航空"
 UKR_support_uia_desc: "ウクライナ国際航空（UIA）は、ウクライナの主要航空会社であり、最大の航空会社だ。同社の航空機の主要拠点はキエフのボルィースピリ国際空港で、ヨーロッパ、中東、米国、カナダ、アジアへの旅客便および貨物便を運航している。"
 UKR_build_new_airports: "新空港の建設"
 UKR_build_new_airports_desc: "我々の空港は長い間放置されてきた。民間目的と軍事目的の両方で空港に投資する必要がある。"
 UKR_invest_in_ministry_of_infrastructure: "国土交通省"
 UKR_invest_in_ministry_of_infrastructure_desc: "インフラ省は批判を浴びている。ウクライナのインフラは、同省の腐敗した役人が資金を流用したために崩壊しつつある。道路状況の悪さから、人々は車を運転することができない。産業のより良い未来を願って、同省を再編すべき時が来ている。"
 UKR_roads_extend_plan: "道路投資計画"
 UKR_roads_extend_plan_desc: "ウクライナの道路は世界一良いとは言えない。一部の地域では未舗装道路やほぼ破壊された道路が残っている。そろそろこれらの地域に少し愛情を注ぐ時期だ。"
 UKR_ukrainian_railways: "UZ"
 UKR_ukrainian_railways_desc: "UZ is the name of the state-owned company that currently possesses a massive monopoly on the majority of the Ukrainian railroad transportation within the country. The company boasts an impressive combined total track length of over 23,000km worth of track, marking it as the 13th largest in the world.\n\nIt is also the 6th largest rail passenger transporter and 7th largest freight transporter."
 UKR_legacy_of_the_ukr_ind: "ウクライナ工業化"
 UKR_legacy_of_the_ukr_ind_desc: "ウクライナの経済成長は工業基盤に大きく依存している。キエフ、リヴィウ、ザポリージャといった主要都市には、長年にわたり成長の原動力となってきた何らかの産業が存在しており、この傾向を維持しないと停滞してしまう。"
 UKR_ssau: "SSAU"
 UKR_ssau_desc: "ウクライナの宇宙産業は、宇宙技術の世界的リーダーからは程遠い。しかし、宇宙船やその他の地球外機械の大規模な生産国である。この最後のフロンティアで競争力を維持できるかどうかが、今後数年間の私たちの将来を左右するだろう。"
 UKR_pivdenmash_udo: "ユージュマシュ"
 UKR_pivdenmash_udo_desc: "ピヴデンマッシュはウクライナの主要宇宙船製造会社である。同社はNASAなどの外国向けのロケット製造で有名。この急成長産業を発展させ、ウクライナを世界舞台に躍り出させるのは良いことだ。ちなみに、2006年の全宇宙飛行の12%をウクライナ製ロケットが占めた。誰が知っていたことだろう！"
 UKR_national_steel_companies: "ルテニア製鉄"
 UKR_national_steel_companies_desc: "ルーシ鋼はかつて戦争に使われる強力な製品だった。今では剣や盾で戦うことはなくなったが、競争力を維持するためには戦車、銃、弾丸に高品質の鋼が必要だ。"
 UKR_naftogaz: "ナフトガズ"
 UKR_naftogaz_desc: "ナフトガスは国営の石油・天然ガス会社で、製品の抽出から精製までの過程に携わっている。この会社は、ロシアやその他の主要エネルギー輸出国に対して石油と天然ガスの独立を推進するためによく利用される。"
 UKR_extend_ukrainian_refineries: "再生可能エネルギーに焦点を当てる"
 UKR_extend_ukrainian_refineries_desc: "天然ガスやその他の石油埋蔵量は豊富だが、現在のエネルギー需要を他の形態のエネルギーで補うことで、化石燃料の生産量が減少する時期の安定化に役立つ。"
 UKR_zalk: "ザポロージャ産業計画"
 UKR_zalk_desc: "ザポリージャはウクライナの重要な工業中心地だ。ザポリージャ州の州都であり、ZAZの本拠地であり、冶金業の中心地であり、ドンバスからの商品を輸送する主要な港湾都市でもある。"
 UKR_zaz: "ZAZ"
 UKR_zaz_desc: "ザポリージャ自動車製造工場（ZAZ）は、ウクライナの主要自動車メーカーである。名前が示すように、ウクライナ南東部のザポリージャ市に拠点を置いている。バスやトラックの製造も行っており、旧親会社であるAvtoZAZでも知られている。"
 UKR_kraz: "KrAZ"
 UKR_kraz_desc: "KrAZはウクライナのクレメンチュクにある非公開企業である。同社は主にトラックやその他の特殊車両を生産している。しかし、彼らの主な専門は大型オフロード・モデルである。最近、持株会社として登録され、現在はウクライナの法人Finance and Creditが所有している。"
 UKR_west_east_rivalry_balanced: "東側と西側の間 \n§L現在の対立状況:§! §G均衡§!\n"
 UKR_west_east_rivalry_balanced_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_strengthened: "Between East and West \n§LCurrent rivalry status:§! §GMoving towards West§!\n"
 UKR_west_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_dominant: "東側と西側の間 \n§L現在の対立状況:§! §G親西側§!"
 UKR_west_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_strengthened: "東側と西側の間 \n§L現在の対立状況:§! §G東側への傾斜§!\n"
 UKR_east_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_dominant: "東側と西側の間\n§L現在の対立状況:§! §G親東側§!"
 UKR_east_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_kleptocracy: "泥棒政治"
 UKR_kleptocracy_desc: "ウクライナ政府は現在、泥棒政治に陥っている。高官たちは腐敗しており、権力を利用して国民や領土の天然資源を搾取し、富と政治権力を拡大している。\n\n§C泥棒政治の悪影響を排除するために、国は汚職と闘うための対策を講じる必要がある。§!"
 UKR_to_many_generals: "過剰な参謀本部"
 UKR_to_many_generals_desc: "ウクライナ軍には450人の現役将軍がいる。彼らのほとんどは縁故や汚職のためにその地位を得たため、戦闘作戦を行った経験はない。現在の参謀陣は無能であり、改革が切望されている。"
 UKR_idea_eu_member_associate: "EU準加盟国"
 UKR_idea_eu_member_associate_desc: "ウクライナはEUとの連携を開始し、欧州や西側諸国との連携を深めるだろう。しかし、それはロシア語を話す多数地域に問題が発生する。"
 UKR_idea_government_in_need: "無効な政府"
 UKR_idea_pro_ukraine_reform_1: "改革された政府。"
 UKR_idea_shortened_general_staff: "小型の参謀本部"
 ukraine_news.7.t: "ウクライナでの内戦"
 ukraine_news.7.d: "ウクライナでドンバス地方の人々が独立を宣言した。彼らはドネツク州とルハンスク州の人々に、もはやキーウの専制政治には従わないと宣言した。[UKR.GetLeader]とウクライナ政権は反乱軍を糾弾し、鎮圧に動員した。同地域ではすでに、地元の親ウクライナ勢力と反政府勢力の間で小競り合いが発生している。"
 ukraine_news.7.a: "反乱を鎮圧"
 ukraine_news.7.b: "圧政者を打倒せよ！"
 ukraine_news.7.c: "興味深い状況"
 ukraine_news.8.t: "クリミア併合"
 ukraine_news.8.d: "クリミアの住人はウクライナから離脱し、ロシアの側につくかどうかの住民投票を実施した。ロシアの対応は迅速かつ決定的で、軍隊をこの地域になだれ込ませ半島を併合した。また、重要軍事拠点は迅速に制圧された。ウクライナ政府はこの問題に憤慨し、ロシアがクリミアを返還するよう要求している。"
 ukraine_news.8.a: "今だけだ……"
 ukraine_news.8.b: "母なるロシアのために！"
 ukraine_news.8.c: "厄介な話だ"
 ukraine_focus: "ウクライナ 国家方針ツリー"
 UKR_home_to_chernobyl_zone: "チェルノブイリ立入禁止区域の故郷"
 UKR_chernobyl_tooltip: "チェルノブイリ原子力発電所の大事故を受け、ウクライナ北部地域に立入禁止区域が設定された。この地域は約2,600平方キロメートルにおよび、高レベルの放射能汚染のために住民は避難し、居住不可能とされた。立入禁止区域の設定以来、区域はウクライナ政府によって管理され、事故による環境と健康への影響を監視し、改善するための努力が続けられている。"
 UKR_chernobyl_effects_tooltip: "§Rさらなる放射能漏れは長期的な被害を引き起こす可能性がある§!"
 UKR_every_man_ataman: "誰もがアタマン"
 UKR_foreign_advisors: "外国人顧問"
 ukraine_coup.1.t: "ロシアが我々に対するクーデターを画策！"
 ukraine_coup.1.d: "キーウからの最新の報告によれば、ロシア側の工作員が我が政府に対するクーデターを計画している！これはロシアからの、独立に対する直接的な脅威である。"
 ukraine_coup.1.a: "Bastards."
 ukraine_coup.2.t: "ロシアが我々に対しクーデターを起こした！"
 ukraine_coup.2.d: "キーウからの最新の報告によれば、ロシア側の工作員が我が政府に対しクーデターを起こした！今、我が国は親ロシア派によって支配されようとしている。"
 ukraine_coup.2.a: "なんなんだ？"
 UKR_tro_brigades_ukraine_decision_category: "ウクライナ領土防衛隊"
 UKR_tro_brigades_ukraine_decision_category_desc: "ウクライナ軍領土防衛軍は、ウクライナ軍の独立した軍種であり、領土防衛任務の組織化、準備及び遂行を任されている。"
 UKR_tro_created_tt: "§Y領土防衛隊§!を募集可能"
 UKR_reorganize_the_national_guard_ukraine_decision_category: "ウクライナ国家親衛隊"
 UKR_reorganize_the_national_guard_ukraine_decision_category_desc: "The National Guard of Ukraine is a military formation with law enforcement functions, is part of the system of the Ministry of Internal Affairs of Ukraine (MIA) and is designed to perform tasks to protect and protect the life, rights, freedoms and legitimate interests of citizens of Ukraine, society and the state from criminal and other illegal encroachments, protect public order and ensure public safety.\n\nAs well as in cooperation with law enforcement agencies, to ensure state security and protection of the state border, suppression of terrorist activities, activities of illegal paramilitary or armed formations (groups), terrorist organizations, organized groups and criminal organizations."
 UKR_reorganize_the_national_guard_first_brigade: "ウクライナ国家親衛隊 §Y第1旅団§!"
 UKR_reorganize_the_national_guard_second_brigade: "公安保護§Y第25独立旅団§!"
 UKR_reorganize_the_national_guard_third_brigade: "ウクライナ国家親衛隊 §Y第4旅団§!"
 UKR_reorganize_the_national_guard_four_brigade: "公安保護§Y第23独立旅団§!"
 UKR_natguard_created_tt: "§Y国家警備隊旅団§!を募集できるようになる"
 UKR_uop_decision_category: "国営企業ウクロボロンプロム"
 UKR_uop_decision_category_desc: "国営企業のウクロボロンプロムは、国営のウクライナ軍産複合体企業の連合体である。ウクロボロンプロムには、武器や軍用・特殊装備品、弾薬の、開発、製造、販売、修理、近代化、廃棄の分野で経済活動に従事する国防産業企業や、外国との軍事技術協力に参加する企業が含まれる。同組織は、戦略的計画、調整、防衛産業企業の効率改善、公的機関との交流などの機能を担っている。\n\n\n現在、臨時車両に追加で投入できる余剰産業能力は[?ukr_industry_points]だ。"
 UKR_t84_oplot: "§YT-84オプロート戦車§!の試作機を組み立てる！"
 UKR_bpla_oup: "§YUAV§!分野での開発を実施！"
 UKR_btr70_m: "試作機§YBTR 70M§!を組み立てる！"
 UKR_bm21_k: "試作機§YBM-21K§!を組み立てる！"
 UKR_helicopter: "§Yヘリコプター§!の開発を行う"
 UKR_uda_created_tt: "§Yウクライナ義勇軍§!が編成される"
 UKR_aidar_created_tt: "§Yアイダール大隊§!が編成される"
 UKR_donbass_created_tt: "§Yドンバス・ウクライナ大隊§!が編成される"
 UKR_azov_created_tt: "§Yアゾフ大隊§!が編成される"
 UKR_police_mobilisation_1: "Mobilize §YPolice Regiment Kyiv§!"
 UKR_police_mobilisation_2: "§Yイヴァーノ＝フランキーウシク警邏警察§!を動員"
 UKR_police_mobilisation_4: "§Yミロトヴォレツ警邏警察§!を動員"
 UKR_police_mobilisation_5: "§Yポルタヴァ警邏警察§!を動員"
 UKR_interlegion_2: "§Y第2ジョージア国際軍団§!を前線に召集"
 UKR_interlegion_3: "§Yジョージア国際軍団§!を前線に召集"
 UKR_interlegion_5: "§Yカザマト・ゲラエフ大隊§!を前線に召集"
 UKR_interlegion_7: "§Yイマーム・シャミール大隊§!を前線に召集"
 UKR_interlegion_8: "§Yカナダ・ウクライナ旅団§!を前線に召集"
 UKR_interlegion_11: "§Yノルマン旅団§!を前線に召集"
 UKR_interlegion_12: "§Yポーランド義勇軍団§!を前線に召集"
 UKR_interlegion_13: "§Yクリム大隊§!を前線に召集"
 UKR_inter_created_tt: "§Y多国籍軍団§!が編成され、さまざまな国から同盟軍を募集できるようになる。"
 UKR_kraken_created_tt: "§Yクラーケン連隊§!が編成される"
 UKR_ter_oborona: "領土防衛部隊を創設"
 UKR_ter_oborona_desc: "We need more different units to protect our homeland. We will begin the creation of Ukrainian Territorial Defense so that every region is protected."
 UKR_azov: "アゾフ大隊を創設"
 UKR_azov_desc: "Let's take a chance and let them join the ranks of our armed forces."
 UKR_create_sso: "ウクライナ特殊作戦軍を創設"
 UKR_create_sso_desc: "The new military structure will help to fight our enemies more effectively."
 UKR_donbass: "ドンバス・ウクライナ大隊を創設"
 UKR_donbass_desc: "Another team, created from volunteers, comes to our service."
 UKR_reform_mvd: "内務省改革"
 UKR_reform_mvd_desc: "We will carry out a global reform in the Ministry of Internal Affairs."
 UKR_found_the_national_police: "特殊任務巡回警察"
 UKR_found_the_national_police_desc: "The Patrol Service of the Special Purpose Police of Ukraine is a service within the Patrol Police Department of Ukraine within the National Police of Ukraine, which was created as part of the Ministry of Internal Affairs of Ukraine as a structure of special forces for the protection of public order.\n\nThe structure became part of the National Police of Ukraine. The service combines former battalions and regiments of the Ministry of Internal Affairs."
 UKR_found_the_kord: "特殊部隊KORD"
 UKR_found_the_kord_desc: "KORDこと即応作戦対応部隊は、ウクライナ国家警察直属の特殊部隊である。この部隊は、緊急対応部隊や捜査部隊の能力を超える可能性のあるほどにレベルの高く、複雑な緊急事態を解決するために設置されている。"
 UKR_inter_legion: "国際領土防衛軍"
 UKR_inter_legion_desc: "ウクライナ領土防衛多国籍軍団は、ウクライナ国軍の領土防衛の一環として義勇兵部隊を編成するために外国人を誘致するウクライナ政府のプロジェクトである。"
 UKR_kraken: "特殊部隊｢クラーケン｣"
 UKR_kraken_desc: "The Kraken Special Unit is a Ukrainian separate intelligence and sabotage unit of the Main Intelligence Directorate of the Ministry of Defense of Ukraine."
 UKR_civil_war: "ドンバス戦争"
 UKR_ukraine_elections: "ウクライナ選挙"
 UKR_ukraine_elections_desc: "It is time to decide who will lead our country further."
 donbass_civil_war: "ドンバスで内戦が起こった"
 UKR_republic_ukr: "連邦共和国"
 UKR_republic_ukr_desc: "The Federal Republic is a special type of entity, which is the basis of the entire Ukrainian Federation. It has expanded autonomy as well as the ability to make its own laws."
 UKR_confederation: "連邦化"
 UKR_confederation_desc: "Several regions received the maximum possible autonomy, which led to a state similar to the Confederate system."
 subject_ukr.1.t: "[FROM.GetNameWithFlag]が工場の建設を要請"
 subject_ukr.1.d: "[FROM.GetNameWithFlag] government requests the construction of a factory on its territory, due to the inability to do it on its own."
 subject_ukr.1.a: "いいだろう"
 subject_ukr.1.b: "ダメだ"
 subject_ukr.2.t: "工場の建設"
 subject_ukr.2.d: "[UKR.GetNameWithFlag] has agreed to build a factory."
 subject_ukr.2.a: "よし"
 subject_ukr.3.t: "工場の建設"
 subject_ukr.3.d: "[UKR.GetNameWithFlag] has refused to build a factory."
 subject_ukr.3.a: "残念だ。"
 subject_ukr.4.t: "[FROM.GetNameWithFlag]が補助金を要請"
 subject_ukr.4.d: "[FROM.GetNameWithFlag]政府は我々に補助金を要請している。配分する準備は整っているか？"
 subject_ukr.4.a: "いいだろう"
 subject_ukr.4.b: "ダメだ"
 subject_ukr.5.t: "連邦予算からの補助金"
 subject_ukr.5.d: "[UKR.GetNameWithFlag] has agreed to provide us with funds from the Federal budget."
 subject_ukr.5.a: "よし"
 subject_ukr.6.t: "連邦予算からの補助金"
 subject_ukr.6.d: "[UKR.GetNameWithFlag] has refused to allocate funds from the Federal budget to us."
 subject_ukr.6.a: "残念だ。"
 UKR_subsidies: "§Y[UKR.GetNameWithFlag]§!からの補助金を要請！"
 UKR_buildings: "§Y[UKR.GetNameWithFlag]§!からの工場を要請！"
 UKR_subject_annex: "傀儡国の再統合"
 UKR_subjectautoritet_tt: "主体の権威は§Y[?modify_subjectavtoritet]%§!増加するだろう！"
 UKR_authority_more_60: "我々の主体は[ROOT.GetFlag]連邦政府の中で§Y60%§!の権威を持っている"
 ukraine_maidan_west.1.t: "マイダンでの抗議"
 ukraine_maidan_west.1.d: "Our state policies do not suit a certain part of the population. People are starting to come out to the famous Kyiv square - Maidan, as way to express dissatisfaction with our political decisions."
 ukraine_maidan_west.1.a: "我々は監視している"
 ukraine_maidan_west.2.t: "マイダンでの抗議"
 ukraine_maidan_west.2.d: "我々の政府は抗議が迅速な終結に至ると期待していたが、これは起こらず、むしろ人々はより長い期間滞在するために広場にテントを張りキャンプを設置し始めた。"
 ukraine_maidan_west.2.a: "これについて悪い予感がする"
 ukraine_maidan_west.3.t: "マイダンでの抗議"
 ukraine_maidan_west.3.d: "The protesters are not going to leave and are starting to behave more aggressively, maybe it's time to take action and demolish their little tent city."
 ukraine_maidan_west.3.a: "ベルクト部隊を展開しよう"
 ukraine_maidan_west.3.b: "我々は干渉しない"
 ukraine_maidan_west.4.t: "マイダンでの抗議"
 ukraine_maidan_west.4.d: "We have begun to disperse the protesters, many foreign TV channels are covering this as a bloody massacre, but our task is only one - to save the state."
 ukraine_maidan_west.4.a: "祖国のために！"
 ukraine_maidan_west.5.t: "マイダンでの抗議"
 ukraine_maidan_west.5.d: "We decided against dispersing the protesters, hoping that their ardor would cool down and they would all go back home, for now let's see what happens next, but so far we do not see any sign of the situation cooling down."
 ukraine_maidan_west.5.a: "我々は待っている"
 ukraine_maidan_west.6.t: "マイダンでの抗議"
 ukraine_maidan_west.6.d: "We decided to negotiate with the protesters, perhaps we can satisfy their political demands."
 ukraine_maidan_west.6.a: "最善を願う"
 ukraine_maidan_west.7.t: "マイダンでの抗議"
 ukraine_maidan_west.7.d: "我々の交渉の試みは、我々の党内でさえ弱さと見なされた。我々の同僚たちは積極的に我々の隊列を去り、変化の風が彼らの側にあると感じて抗議者の側に寝返っている。"
 ukraine_maidan_west.7.a: "これについて悪い予感がする"
 ukraine_maidan_west.8.t: "マイダンでの抗議"
 ukraine_maidan_west.8.d: "我々の政党は完全に崩壊した、我々は同僚を失い、そして我々の党員仲間が反対派の要求に同意しているようだ……これが終わりのようだ。"
 ukraine_maidan_west.8.a: "Oh God..."
 ukraine_maidan_west.9.t: "クリミアでの暴動"
 ukraine_maidan_west.9.d: "クリミアの住民は何が起こっているかに不満であることが判明し、ロシアの連邦制システムと同様に、主体に権利と権限を与える完全な連邦化を我々に要求した。我々はそれに賛成するか？"
 ukraine_maidan_west.9.a: "おそらく連邦化を開始する時だ。"
 ukraine_maidan_west.9.b: "ここでは連邦化は起こらない"
 ukraine_maidan_west.10.t: "南東部での反乱"
 ukraine_maidan_west.10.d: "南東部地域もまた、起こっている事態に不満を抱いていることが判明し、我々に対して連邦制を要求してきた。応じるべきか？"
 ukraine_maidan_west.10.a: "ドンバスは主体となるだろう"
 ukraine_maidan_west.10.b: "連邦化なし"
 ukraine_maidan_west.11.t: "ハルキウ反乱"
 ukraine_maidan_west.11.d: "ドネツクとルハーンシクでの暴動は、ハルキウで同様の反応を引き起こした。分離主義者たちはそこで権力を握り、彼らのハルキウ共和国を宣言することができた。"
 ukraine_maidan_west.11.a: "どれだけいるんだ？"
 ukraine_maidan_west.12.t: "オデッサ反乱"
 ukraine_maidan_west.12.d: "ドンバスでの蜂起はオデッサでの暴動を引き起こした。最初はかなり平和に始まり、終わることができたかもしれないが、我々には反乱を鎮圧する資源がなく、今や地元の市民が彼らの共和国を宣言した。"
 ukraine_maidan_west.12.a: "どれだけいるんだ？"
 ukraine_maidan_west.13.t: "マイダンでの抗議"
 ukraine_maidan_west.13.d: "我々はベルクトの関与をもってマイダンを強制的に解散させる試みを行った。"
 ukraine_maidan_west.13.a: "国を守ろう！"
 ukraine_maidan_west.14.t: "マイダンでの抗議"
 ukraine_maidan_west.14.d: "反応は長くはかからず、抗議は過激化し始めた。暴力的な戦略を採用し、人々は我々の治安部隊に対して火炎瓶、小火器、石を使用し始めた。"
 ukraine_maidan_west.14.a: "Oh God..."
 ukraine_maidan_west.15.t: "陸軍の展開！"
 ukraine_maidan_west.15.d: "抗議活動を取り締まるために軍隊を派遣する。"
 ukraine_maidan_west.15.a: "ウクライナ軍はウクライナを救うだろう。"
 ukraine_maidan_west.16.t: "マイダンでの抗議"
 ukraine_maidan_west.16.d: "軍隊からのいくつかの部隊が高い警戒態勢に置かれ、抗議に対処するために首都へ送られた。"
 ukraine_maidan_west.16.a: "The Army Has Arrived in Kyiv"
 ukraine_maidan_west.16.b: "陸軍は助けられなかった"
 ukraine_maidan_west.17.t: "The Kyiv Massacre"
 ukraine_maidan_west.17.d: "陸軍は抗議者との武力衝突に入った。双方から戦闘に銃器が発射されたため、本当の虐殺が始まった。"
 ukraine_maidan_west.17.a: "それはひどい"
 ukraine_maidan_west.18.t: "The Kyiv Massacre"
 ukraine_maidan_west.18.d: "我々には他に選択肢がなく、その結果、この取り締まりを生き延びることができた多くの人々が国の西部地域へ逃げ、そこで彼らは人々のこのような残酷な裏切りに対して我々の政府に反撃する準備をしている。"
 ukraine_maidan_west.18.a: "嵐が来る"
 ukraine_maidan_west.19.t: "ガリツィアでの蜂起"
 ukraine_maidan_west.19.d: "Euromaidan supporters, as well as survivors of the Kyiv massacre, have declared independence from Ukraine. Two new republics on the territory of Volhynia and the Lviv region intend to fight back against the central government."
 ukraine_maidan_west.19.a: "我々は戦う準備ができている！"
 ukraine_maidan_west.20.t: "マイダンでの抗議"
 ukraine_maidan_west.20.d: "陸軍の支援なしには、我々の治安部隊は抗議者の圧力に対処できない。もしかしたらこの闘争の最終ラウンドが間もなく来るかもしれない。"
 ukraine_maidan_west.20.a: "終わりは近い"
 ukraine_maidan_west.21.t: "マイダンでの抗議"
 ukraine_maidan_west.21.d: "抗議中に恐ろしい悲劇が起こった。未知の狙撃兵が抗議者に発砲し、さらに大きな反発を引き起こした。我々の同僚たちは、発砲命令が我々の政府から来たと信じて去っている。"
 ukraine_maidan_west.21.a: "我々は本当に負けたのか？"
 ukraine_maidan_west.22.t: "マイダンでの抗議"
 ukraine_maidan_west.22.d: "我々の政府は完全に崩壊した。間もなく、我々を支持する者は誰もいなくなるだろう。権力を降伏する準備をする時が来た。"
 ukraine_maidan_west.22.a: "最後の時間"
 ukraine_maidan_west.23.t: "マイダンでの抗議"
 ukraine_maidan_west.23.d: "我々の政府はついに打倒された。抗議はその目標を達成した。"
 ukraine_maidan_west.23.a: "マイダンは勝利した"
 ukraine_maidan_west.24.t: "連邦化"
 ukraine_maidan_west.24.d: "我々は我が国の連邦化プロセスを開始するだろう。クリミアは我々の新しい連邦の最初の完全なメンバーとなるだろう。誰も政治的利益のために地域問題を悪用することはできないだろう。"
 ukraine_maidan_west.24.a: "良い"
 ukraine_maidan_west.25.t: "ガリツィアの連邦化"
 ukraine_maidan_west.25.d: "In light of our reforms and the emergence of independent entities within our federation, representatives of Galicia have also expressed a desire, through an ultimatum, to become a full-fledged member. Will we expand the federation to the west?"
 ukraine_maidan_west.25.a: "拡大せよ"
 ukraine_maidan_west.25.b: "必要ない"
 ukraine_maidan_east.1.t: "南東部での騒乱"
 ukraine_maidan_east.1.d: "我々の政策は国の南東部での抗議とデモにつながった。明確に反政府的なスローガンを持つ抗議が多くの都市を飲み込んだ。"
 ukraine_maidan_east.1.a: "突然だ"
 ukraine_maidan_east.2.t: "議員たちが自己組織化"
 ukraine_maidan_east.2.d: "抗議は勢いを増しており、今や地元の議員たちがそれに加わり、かなり危険なスローガンを宣言している。"
 ukraine_maidan_east.2.a: "心配だ。"
 ukraine_maidan_east.4.t: "交渉の試み"
 ukraine_maidan_east.4.d: "The deputies want to negotiate. It is still possible to resolve the conflict peacefully."
 ukraine_maidan_east.4.a: "Meet the deputies"
 ukraine_maidan_east.5.t: "交渉は失敗"
 ukraine_maidan_east.5.d: "We couldn't reach an agreement. The protesters are not interested in a peaceful solution anymore."
 ukraine_maidan_east.5.a: "最悪に備える"
 ukraine_maidan_east.6.t: "Negotiations Keep Going"
 ukraine_maidan_east.6.d: "For now, we were able to prevent violence and negotiate with the parties involved in the conflict. Now we await their proposal for a final settlement."
 ukraine_maidan_east.6.a: "We May Have Avoided The Worst"
 ukraine_maidan_east.7.t: "民兵の組織化"
 ukraine_maidan_east.7.d: "地元の抗議者たちが民兵部隊を結成し始め、武力反乱につながった。"
 ukraine_maidan_east.7.a: "Oh God..."
 ukraine_maidan_east.8.t: "弾圧の開始"
 ukraine_maidan_east.8.d: "南東部の多くの地域で状況が制御不能になっている。決定的な行動を取る時が来た。"
 ukraine_maidan_east.8.a: "我々はオデッサへ行く"
 ukraine_maidan_east.8.b: "我々はドンバスとハルキウへ行く"
 ukraine_maidan_east.8.c: "我々はより良く準備する必要がある"
 ukraine_maidan_east.9.t: "オデッサは救われた"
 ukraine_maidan_east.9.d: "我々は地元の分離主義者たちが地域を支配する前に彼らを弾圧したが、今やオデッサへの我々の焦点のため、ドンバスで武力反乱が始まった。"
 ukraine_maidan_east.9.a: "準備する時が来た"
 ukraine_maidan_east.10.t: "ドンバスの弾圧"
 ukraine_maidan_east.10.d: "ドンバス反乱を弾圧する我々の試みは失敗した。ベルクト部隊が反乱軍に加わり、我々をさらに困難な状況に置いた。"
 ukraine_maidan_east.10.a: "準備する時が来た"
 ukraine_maidan_east.11.t: "致命的な遅延"
 ukraine_maidan_east.11.d: "我々の遅延は南東部の多くの共和国が武力反乱に突入する結果となった。"
 ukraine_maidan_east.11.a: "我々は過ちを犯した。"
 ukraine_maidan_east.12.t: "南東部での騒乱"
 ukraine_maidan_east.12.d: "我々の行動は広範なエスカレーションにつながり、今や我々はその結果に直面している。"
 ukraine_maidan_east.12.a: "我々は過ちを犯した。"
 ukraine_maidan_east.13.t: "ハルキウでの反乱"
 ukraine_maidan_east.13.d: "我々の特殊部隊の準備不足が再び我々に悪い冗談を言った。ハルキウでは、我々は反乱を鎮圧できず、武力蜂起につながった。"
 ukraine_maidan_east.13.a: "どれだけいるんだ？"
 ukraine_maidan_east.17.t: "ドンバス反乱"
 ukraine_maidan_east.17.d: "ドネツクおよびルハーンシク地域で武力蜂起が始まった。ベルクト部隊は、そこに駐留していたいくつかの軍事部隊を反乱軍が武装解除するのを助ける上で役立った。"
 ukraine_maidan_east.17.a: "くそっ"
 ukraine_maidan_east.18.t: "オデッサ反乱"
 ukraine_maidan_east.18.d: "ベルクトの反乱軍への寝返りは、オデッサの分離主義者を大いに鼓舞し、そこで彼らもまた人民共和国の創設を宣言した。"
 ukraine_maidan_east.18.a: "どれだけいるんだ？"
 ukraine_maidan_east.19.t: "政府が権力を失いつつある"
 ukraine_maidan_east.19.d: "我々は内戦につながった致命的な過ちを犯し、我々の政敵はこれを利用して権力を掌握するだろう。"
 ukraine_maidan_east.19.a: "来るなら来い"
 ukraine_maidan_east.19.b: "来るなら来い"
 ukraine_maidan_east.19.c: "来るなら来い"
 ukraine_maidan_east.20.t: "政府が権力を失いつつある"
 ukraine_maidan_east.20.d: "我々は内戦につながった致命的な過ちを犯し、我々の政敵はこれを利用して権力を掌握するだろう。"
 ukraine_maidan_east.20.a: "我々は自力で管理するだろう"
 ukraine_maidan_east.20.b: "我々はロシアの助けを求めるだろう"
 ukraine_maidan_east.21.t: "政府が権力を失いつつある"
 ukraine_maidan_east.21.d: "我々は内戦につながった致命的な過ちを犯し、我々の政敵はこれを利用して権力を掌握するだろう。"
 ukraine_maidan_east.21.a: "我々は自力で管理するだろう"
 ukraine_maidan_east.21.b: "我々はロシアの助けを求めるだろう"
 ukraine_maidan_east.22.t: "共通の敵に対する統合"
 ukraine_maidan_east.22.d: "内戦の勃発にもかかわらず、人々は我々の周りに結集した。我々は政治的な地盤をわずかに失っただけであり、分離主義者に対する聖なる闘争についてのスローガンで補っている。"
 ukraine_maidan_east.22.a: "ウクライナのために！"
 ukraine_maidan_east.23.t: "ウクライナが我々の助けを要請"
 ukraine_maidan_east.23.d: "ウクライナ政府は内戦勃発のため我々の助けを求めてきた。我々は今、彼らを支援する意思があるかどうかを決定しなければならない。"
 ukraine_maidan_east.23.a: "我々は彼らを助けるだろう"
 ukraine_maidan_east.23.b: "彼らに自分たちで処理させよう"
 ukraine_maidan_east.24.t: "援助の選択"
 ukraine_maidan_east.24.d: "我々はウクライナからの部隊派遣要請を受け入れた。次に、誰を派遣するか決定する必要がある。"
 ukraine_maidan_east.24.a: "機動隊を送ろう"
 ukraine_maidan_east.24.b: "ロスグヴァルディヤを送ろう"
 ukraine_maidan_east.24.c: "PMCワグネルを送ろう"
 ukraine_maidan_east.25.t: "ロシアが我々を助けることを拒否"
 ukraine_maidan_east.25.d: "ロシア政府は我々に助けを送ることも、いかなる形であれ我々の悲劇的な出来事に参加することも拒否した。我々は失望している。"
 ukraine_maidan_east.25.a: "裏切り者め"
 ukraine_maidan_east.26.t: "連邦化の問題"
 ukraine_maidan_east.26.d: "反乱軍は彼らの主要かつ唯一の要求を提示した：ウクライナの連邦化、ドンバスに連邦主体としての特別な地位を与えること。我々はそのような改革にリスクを冒して同意する準備ができているか？"
 ukraine_maidan_east.26.a: "連邦化はあるべきだ"
 ukraine_maidan_east.26.b: "ありえない"
 ukraine_maidan_east.27.t: "Peace at last"
 ukraine_maidan_east.27.d: "我々は連邦化に同意し、これのおかげで、我々は我が国にとって恐ろしい結果を避けることができた。"
 ukraine_maidan_east.27.a: "良い"
 UKR_maidan_temporary_attack_idea: "組織的攻勢"
 ukraine_maidan.1.t: "クリミアの地位"
 ukraine_maidan.1.d: "クリミアはロシア人多数派の人口を持っている。そこにいる人々は我々の人々である。彼らとドンバスの兄弟たちがウクライナ支配下に生きることは不公平である。我々は彼らの呼びかけを尊重し、我々と共にあることを切望する人々を統合すべきか？"
 ukraine_maidan.1.a: "クリミアを掌握せよ"
 ukraine_maidan.1.b: "クリミアはウクライナのものだ"
 ukraine_maidan.2.t: "ロシアがクリミアを併合"
 ukraine_maidan.2.d: "クリミアの人々は離脱した。彼らはロシア政府の支援を求めた。クリミアの人々は、国家がロシア国家に吸収されることを許可する国民投票を圧倒的多数で可決した。クリミア近くに駐留していたロシア軍が地域に殺到し、迅速に要所を掌握した。部隊は裏切り者たちによって開かれた腕で歓迎された。いつか、我々は正当に我々のものである領土を取り戻すだろう！"
 ukraine_maidan.2.a: "興味深い"
 ukraine_maidan.3.t: "ロシアがウクライナ人民を拒否"
 ukraine_maidan.3.d: "クリミアの裏切り者たちはついに我々から離脱しようとする彼らの馬鹿げた国民投票を実施した。ロシアの人々はこの行動方針を長い間奨励してきた。ロシア人がクリミアの人々を拒否した理由は謎である。しかし、彼らが地域を掌握することによって我々をさらに弱体化させなかったことは評価される。この決定が何を引き起こしたかは、時間が経てばわかるだろう。"
 ukraine_maidan.3.a: "良い日だ"
 ukraine_maidan.4.t: "ミンスク合意"
 ukraine_maidan.4.d: "戦争は我々にとって期待された結果をもたらさなかった。分離主義者たちは破壊されておらず、人々は終わりのない戦争に明らかに不満を持っている。もしかしたら我々は休憩を取るべきか？"
 ukraine_maidan.4.a: "今すぐ平和を"
 ukraine_maidan.4.b: "平和？なぜ？"
 ukraine_maidan.5.t: "ミンスク合意"
 ukraine_maidan.5.d: "戦争は我々にとって期待された結果をもたらさなかった。分離主義者たちは破壊されておらず、人々は終わりのない戦争に明らかに不満を持っている。もしかしたら我々は休憩を取るべきか？"
 ukraine_maidan.5.a: "今すぐ平和を"
 ukraine_maidan.5.b: "平和？なぜ？"
 ukraine_maidan.6.t: "OSCE監視団"
 ukraine_maidan.6.d: "武力紛争を管理し防ぐために、OSCE監視団がドンバスの平和と安定を保証するために国境地域へ送られた。"
 ukraine_maidan.6.a: "ただの休戦だ"
 ukraine_maidan.7.t: "OSCE監視団"
 ukraine_maidan.7.d: "武力紛争を管理し防ぐために、OSCE監視団がドンバスの平和と安定を保証するために国境地域へ送られた。"
 ukraine_maidan.7.a: "ただの休戦だ"
 ukraine_maidan.8.t: "ウクライナが連邦化を提案"
 ukraine_maidan.8.d: "ウクライナは我々に連邦化プロジェクトを提案し、我々を別個の主体として承認することに同意している。我々はこれに同意するか？"
 ukraine_maidan.8.a: "同意しよう"
 ukraine_maidan.8.b: "We Refuse"
 ukraine_maidan.9.t: "ロシア企業との協力"
 ukraine_maidan.9.d: "欧州連合は我々が必要とするレベルの資源と技術を提供できないため、我々はロシア企業と協力し続けるだろう。"
 ukraine_maidan.9.a: "必要な犠牲だ"
 ukraine_maidan.10.t: "ウクライナが連邦化を提案"
 ukraine_maidan.10.d: "ウクライナは我々に連邦化プロジェクトを提案し、我々を別個の主体として承認することに同意している。我々はこれに同意するか？"
 ukraine_maidan.10.a: "同意しよう"
 ukraine_maidan.10.b: "We Refuse"
 ukraine_maidan.11.t: "我々の政策への不満"
 ukraine_maidan.11.d: "Residents of the western part of our country are dissatisfied with the policies we are pursuing. They feel the policies are directed against them and are actively expressing their dissatisfaction."
 ukraine_maidan.11.a: "これは悪い"
 ukraine_maidan.12.t: "我々の政策への不満"
 ukraine_maidan.12.d: "Residents of the eastern part of our country are dissatisfied with the policies we are pursuing. They feel the policies are directed against them and are actively expressing their dissatisfaction."
 ukraine_maidan.12.a: "これは悪い"
 ukraine_maidan.13.t: "ウクライナの運命"
 ukraine_maidan.13.d: ""
 ukraine_maidan.13.a: ""
 ukraine_maidan.14.t: "東部地域との交渉"
 ukraine_maidan.14.d: "我々の政策は東部地域による我々の政府の完全な不承認につながり、彼らは積極的に我々の活動を妨害している。しかし、我々は彼らと交渉する機会を持っている。"
 ukraine_maidan.14.a: "我々は妥協するだろう"
 ukraine_maidan.14.b: "彼らは何でもない"
 ukraine_maidan.15.t: "西部地域との交渉"
 ukraine_maidan.15.d: "我々の政策は西部地域による我々の政府の完全な不承認につながり、彼らは積極的に我々の活動を妨害している。しかし、我々は彼らと交渉する機会を持っている。"
 ukraine_maidan.15.a: "我々は妥協するだろう"
 ukraine_maidan.15.b: "彼らは何でもない"
 ukraine_maidan.16.t: "ポピュリスト改革"
 ukraine_maidan.16.d: "我々の大統領職は何らかの改革から始めなければならない。我々は改革活動の焦点を正確に何にするかを決定しなければならない。"
 ukraine_maidan.16.a: "土地改革"
 ukraine_maidan.16.b: "道路改革"
 ukraine_maidan.16.c: "我々はラーダに影響を与えるだろう"
 ukraine_maidan.17.t: "政治的安定"
 ukraine_maidan.17.d: "我々の賢明で有能な政策は実を結んだ。我が国が安定している間、我々の政治力は増大するばかりである。"
 ukraine_maidan.17.a: "よし"
