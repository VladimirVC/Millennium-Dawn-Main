 LBA.socialism: "£generic_socialism_small （LNDF） - リビア民族民主戦線"
 LBA.socialism_desc: "（国家民主主義） - リビア民族民主戦線\n\nリビア民族民主戦線は、アメリカで複数の著名なリビア人政治亡命者によって設立された政治組織である。このグループは、貧困層と中流階級の権利、絶対的な国家の独立、そして民主的統治手段を提唱している。"
 LBA.Communist-State: "£generic_Communist_State_small （LCP） - リビア共産党"
 LBA.Communist-State_desc: "（マルクス・レーニン主義） - リビア共産党\n\nリビア共産党は第二次世界大戦直後に設立された。しかし、共産主義者たちは直ちに王国当局からの弾圧に直面した。カッザーフィーが権力を握った後も、共産主義者たちが西側のプロパガンダと資本主義を広めていると非難され、弾圧は続いた。"
 LBA.Conservative: "£LBA_Conservative （LPNM） - リビア人民民族運動"
 LBA.Conservative_desc: "カッザーフィー忠誠主義 - リビア人民民族運動（アラビア語ローマ字表記：Al-Harakat Al-Wataniat Al-Shaebiat Al-Liybia）\n\nリビア人民民族運動は、カッザーフィー失脚後にフウェルディ・ハメイディ少将によって設立された。ハメイディはカッザーフィーの治世中、彼の最も親しい同盟者の一人であり、その娘はカッザーフィーの息子の一人と結婚している。この運動の主な目標は、リビア内戦によって引き起こされた損害を修復し、まるで内戦がなかったかのように物事を「現状維持」に戻すことである。"
 LBA.Conservative_icon: "£LBA_Conservative"
 LBA.Autocracy_democracy: "£LBA_Autocracy_democracy (ASU) アラブ社会主義連合"
 LBA.Autocracy_democracy_desc: "第三国際理論 - アラブ社会主義連合（アラビア語ローマ字表記：Al'Iitihad Al'Iishtirakiu Al-Arabiu Al-Liybiu）\n\nリビアに民主主義が創設されると、カッザーフィーは自らのルーツに戻った。アラブ社会主義連合は、彼がクーデターで国を掌握する前の彼の政党の名前で、エジプトのナセル主義的なアラブ社会主義連合党とイデオロギー的に近い。"
 LBA.Autocracy_democracy_icon: "£LBA_Autocracy_democracy"
 LBA.Autocracy_comeback: "£LBA_Autocracy_comeback (PFLL) リビア解放人民戦線"
 LBA.Autocracy_comeback_desc: "第三国際理論 - リビア解放人民戦線（アラビア語ローマ字表記：Al-Jabhat Al-Shaebiat Li-Tahrir Libiya）\n\nムアンマル・カッザーフィーの失脚後、彼の息子はカッザーフィー支持の政党を結成することで彼の遺志を継いだ。リビア解放人民戦線は、外国の敵に資金提供されたテロ組織から国を解放し、国をムアンマル・カッザーフィーの第三国際理論に従う状態に戻すことを目指している。"
 LBA.Autocracy_comeback_icon: "£LBA_Autocracy_comeback"
 LBA.Kingdom_icon: "£LBA_Kingdom"
 LBA.Caliphate_icon: "£LBA_Caliphate"
 LBA.Neutral_Muslim_Brotherhood_icon: "£LBA_Neutral_Muslim_Brotherhood"
 LBA.Neutral_Autocracy: "£LBA_Neutral_Autocracy （NFA） - 国民勢力連合"
 LBA.Neutral_Autocracy_desc: "（権威的自由主義） - 国民勢力連合\n\n国民勢力連合は、（少なくともリビアの基準では）自由主義的な政党である。ムアンマル・カッザーフィーの経済顧問であり、カッザーフィーの息子サイフ・アル＝イスラムと親交のあるマフムード・ジブリールによって設立された。名目上は自由主義で改革派であるが、多くの人々は、旧カッザーフィー政権とのつながりや、ジブリールが友人や家族に政治的地位を与える傾向があるという事実から、同党に疑惑を抱いている。"
 LBA.Neutral_Autocracy_icon: "£LBA_Neutral_Autocracy"
 LBA.Neutral_conservatism_icon: "£LBA_Neutral_conservatism"
 LBA.Neutral_conservatism_democracy: "£LBA_Neutral_conservatism_democracy （NFP） - 国民戦線党"
 LBA.Neutral_conservatism_democracy_desc: "（進歩主義） - 国民戦線党\n\n国民戦線党は、リビア救済国民戦線の政治的な後継者である。同党はリビアで最も自由主義的な政党の一つであるが、イスラム教が統治の指針として機能すべきであると依然として述べている。"
 LBA.Neutral_conservatism_democracy_icon: "£LBA_Neutral_conservatism_democracy"
 LBA.Neutral_Libertarian_icon: "£LBA_Neutral_Libertarian"
 LBA.neutral_Social: "£LBA_neutral_Social （EM） - インサフ運動"
 LBA.neutral_Social_desc: "（社会民主主義） - インサフ運動\n\nインサフ運動は、リビアの社会民主主義政党である。同党は労働者の権利、世俗主義、フェミニズム、そして民兵の解体を提唱している。リビアの社会民主主義を北欧モデルに倣うことを目指している。"
