 Kim_Jong_il_Death_desc: "Ukochany Wielki Przywódca, założyciel Koreańskiej Republiki Ludowo-Demokratycznej i wieczny Prezydent Republiki Kim Dzong-il, Prezydent KRLD, zmarł 17 grudnia 2011 r. o godzinie 8.30 w wyniku ostrego zawału mięśnia sercowego powikłanego wstrząsem kardiogennym podczas pobytu na w drodze do okolicy pociągiem."
