l_polish:
 ukraine_focus: "Ukraińskie drzewo fokusowe"
 UKR_home_to_chernobyl_zone: "Strona Strefy Wykluczenia w Czarnobylu"
 UKR_chernobyl_tooltip: "Strefa Wykluczenia w Czarnobylu wystąpiła w północnych regionach tego katastrofalnego obciążenia w elektrowni jądrowej w Czarnobylu. Strefa około 2600 kilometrów przebiegu na Ukrainie i została ewakuowana i uznana za niezdatną do zamieszkania ze względu na wysoki poziom skażenia radioaktywnego. Od chwili wyłączenia wykluczenia rządu Ukrainy i usunięcia skutków ubocznych dla środowiska i usuwania ich skutków."
 UKR_chernobyl_effects_tooltip: "§Rdalsze skutki mogą wystąpić późniejsze szkody§!"
 UKR_found_the_uop: "Reforma kompleksu militarno-przemysłowego"
 UKR_found_the_uop_desc: "Nasz przemysł zbrojeniowy jest w opłakanym stanie, jesteśmy więc zmuszeni rozpocząć globalną reformę w tej dziedzinie."
 UKR_ukrainian_armed_forces_reform: "Reforma Sił Zbrojnych"
 UKR_ukrainian_armed_forces_reform_desc: "Our armed forces urgently need reform. We must create new structures and new types of troops, and solve the old problems of our army."
 UKR_srdsc: "Państwowe Centrum Badawczo-Projektowe Budowy Okrętów"
 UKR_srdsc_desc: "State Research and Design Shipbuilding Center to biuro projektowe specjalizujące się w budowie statków, zlokalizowane w Mikołajowie na Ukrainie. Jest częścią państwowej korporacji Ukrainian Defense Industries."
 UKR_defend_our_sky: "Ożywić przemysł lotniczy"
 UKR_defend_our_sky_desc: "Rozpoczniemy odbudowę naszego przemysłu lotniczego, który od rozpadu ZSRR znajduje się w opłakanym stanie."
 UKR_cut_down_the_general_staff: "Zmniejsz liczbę generałów"
 UKR_cut_down_the_general_staff_desc: "Too many generals negatively affect our army, it's time to fix it."
 UKR_contract_army: "Reforma edukacji wojskowej"
 UKR_contract_army_desc: "We will reorganize the old military universities, as well as create new ones, to improve the quality of our armed forces."
 UKR_war_on_donbass_experience: "Nasza armia"
 UKR_war_on_donbass_experience_desc: "The Ukrainian Army is literally a shadow of its former Soviet, and now Russian, counterpart. It is time to change that."
 UKR_support_uia: "UIA"
 UKR_support_uia_desc: "UIA, czyli Ukraińskie Międzynarodowe Linie Lotnicze, do flagowej linii lotniczej obecnej na Ukrainie. Główny węzłem komunikacyjnym dla samolotów pasażerskich jest Międzynarodowy Port Lotniczy Boryspol w Kijowie. Obsługuje wiele połączeń i usług cargo do Europy, Bliskiego Wschodu, Stanów Zjednoczonych, Kanady i Azji."
 UKR_build_new_airports: "Buduj nowe lotnisko"
 UKR_build_new_airports_desc: "Nasze lotnisko było zbyt długo zaniedbywane. wystąpienie zagrożenia na naszym lotnisku niezależnie od zastosowań cywilnych, jak i wojskowych."
 UKR_invest_in_ministry_of_infrastructure: "Ministerstwo Infrastruktury"
 UKR_invest_in_ministry_of_infrastructure_desc: "Ministerstwo Infrastruktury ostroło zareagowało. Infrastruktura Ukrainy załamuje się z powodu wysysania programów przez skorumpowanych ministerstwa. Ze względu na warunki, w których ludzie nie mogą poruszać się po niektórych drogach. Najwyższy czas na nowo usunięty Ministerstwo w końcowym etapie końcowym dla naszego przemysłu."
 UKR_roads_extend_plan: "Plany inwestycji drogowych"
 UKR_roads_extend_plan_desc: "Drogi na Ukrainie nie są najlepsze na świecie. Być może będzie to możliwe z dróg nieutwardzonych lub prawie zniszczonych. Najwyższy czas, aby te regiony obdarzyły się odrobiną miłości."
 UKR_ukrainian_railways: "UZ"
 UKR_ukrainian_railways_desc: "UZ is the name of the state-owned company that currently possesses a massive monopoly on the majority of the Ukrainian railroad transportation within the country. The company boasts an impressive combined total track length of over 23,000km worth of track, marking it as the 13th largest in the world.\n\nIt is also the 6th largest rail passenger transporter and 7th largest freight transporter."
 UKR_legacy_of_the_ukr_ind: "Ukraińska industrializacja"
 UKR_legacy_of_the_ukr_ind_desc: "Ukraina jest w dużym stopniu zależna od twojej bazy przemysłowej, jeśli chodzi o twój wzrost gospodarczy. W głównych miastach Kijowie, Lwowie i Zaporożu znajduje się jakaś forma przemysłu, która przez lata napędzała ich rozwój. wystąpienie zdarzenia natychmiastowego, w razie wypadku po upadku w stagnację."
 UKR_ssau: "SSAU"
 UKR_ssau_desc: "Ukraińskiemu przemysłowi wytwarzamu daleko do światowego lidera technologii kosmicznych. Jest to jednak zastosowanie, ponieważ są to urządzenia pozaziemskie i inne maszyny pozaziemskie. Zdolność do świadczenia konkurencyjności na tej ostatniej granicy, która będzie kontrolowana przez nasze przyszłe lata."
 UKR_pivdenmash_udo: "Piwdenmasz"
 UKR_pivdenmash_udo_desc: "Pivdenmash jest wysunięty wysunięty na Ukrainę. Firma wyróżniająca się rakietami dla innych krajów, takich jak NASA. Dobrze możliwe dziesięć rozwiązań rozwijających się przemysł, aby wynieść Ukrainę na arenę światową. Ciekawostka: rakiety ukraińskiej technologii 12% wszystkich lotów kosmicznych w 2006 roku. Kto wiedział!"
 UKR_national_steel_companies: "Stal Ruska"
 UKR_national_steel_companies_desc: "Ruska stal była wyposażona w urządzenie przeznaczone do prowadzenia wojny. Teraz nie walczymy już mieczami i tarczami. Warunki naszych czołgów, działają i kule o wysokiej jakości stali, aby zapewnić konkurencyjność."
 UKR_naftogaz: "Naftogaz"
 UKR_naftogaz_desc: "Naftogaz do państwowego koncernu naftowo-gazowego. Bierze udział w ekstrakcji aż po uszlachetnienie produktów. Firma jest często wykorzystywana do nawoływania do niezależności, która jest użyteczna i gazowa, przeciwko krajom takim jak Rosja lub inni główni eksporterzy energii."
 UKR_extend_ukrainian_refineries: "Skoncentruj się na energii odnawialnej"
 UKR_extend_ukrainian_refineries_desc: "Dostęp do zasilania ziemnego i innych źródeł zasilania, nasze źródło zasilania na innych formach zasilania, może być ustabilizowany w czasach urządzenia paliw kopalnych."
 UKR_zalk: "Zaporoże Zakłady Przemysłowe"
 UKR_zalk_desc: "Zaporoże jest ważnym elementem przemysłowym Ukrainy. Jest stolicą zasilacza zaporowskiego, siedziba ZAZ, węzłem hutniczym i głównym miastem portowym dla transportu towarów z Donbasu."
 UKR_zaz: "ZAZ"
 UKR_zaz_desc: "ZAZ, czyli Zaporoskie Zakłady Budowy Samochodów, głównemu producentowi samochodów na Ukrainie. Jak sama nazwa wskazuje, ma swoje miejsce zamieszkania w mieście Zaporże w południowo-wschodniej Ukrainie. Powszechnie produkują także autobusy i przewodnicy i są znani ze swojej byłej spółki-matki AvtoZAZ."
 UKR_kraz: "KrAZ"
 UKR_kraz_desc: "KrAZ to prywatna firma z siedzibą w Krzemieńczuku na Ukrainie. Firma odpowiedzialna za zarządzanie i inne specjalne przeznaczenie. Ich główną częścią są modele terenowe. Została zarejestrowana jako spółka holdingowa, a obecnie jest jej właścicielem ukraińskiego koncernu Finance and Credit."
 UKR_west_east_rivalry_balanced: "Między Wschodem a Zachodem \n§LCobecny stan następujący:§! §GBZrównoważony§!\n"
 UKR_west_east_rivalry_balanced_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_strengthened: "Between East and West \n§LCurrent rivalry status:§! §GMoving towards West§!\n"
 UKR_west_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_west_dominant: "Między Wschodem a Zachodem \n§LCobecny stan następujący:§! §GPro-zachodni§!"
 UKR_west_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_strengthened: "Między Wschodem a Zachodem \n§LCobecny stan następujący:§! §GW kierunku Wschodu§!\n"
 UKR_east_strengthened_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_east_dominant: "Między Wschodem a Zachodem \n§LCobecny stan następujący:§! §GProwschodni§!"
 UKR_east_dominant_desc: "The end of the Cold War brought an unprecedented degree of independence to Ukraine. Nevertheless, the legacy of suzerainty lingered, making the country's political scene more volatile. Russia continues to influence Ukraine from the east, while the European Union began to exert its power over the country from the west. Within Ukraine, competing political factions emerged, each loyal to one foreign patron or the other. \n\n§RChanges in domestic or foreign policy may disrupt the balance of power between the pro-Western and pro-Eastern camps!§! \n\n§C(Pro-Eastern predominance)§! \nThe government will focus on closer ties with Russia (including CSTO and EACU integration), which will cause discontent among nationalist forces. \n\n§C(Pro-Western predominance)§! \nThe government will focus on EU and NATO integration, which, in turn, will cause discontent among the opponents in the pro-Russian camp."
 UKR_kleptocracy: "Kleptokracja"
 UKR_kleptocracy_desc: "Ukraiński rząd pogrążony jest obecnie w swojej kleptokracji. Wysokie rangi są skorumpowane i podlegają władzy wykonawczej do wyzyskiwania ludzi i zasobów naturalnych twojego terytorium w celu powiększenia twojego bogactwa i władzy politycznej. \n\n§CAby zastosować skutki kleptokracji, kraj musi wystąpić działanie na celu zwalczanie korupcji.§!"
 UKR_to_many_generals: "Nadmierny Sztab Generalny"
 UKR_to_many_generals_desc: "Ukraina ma w swojej armii 450 czynnych generałów. Narzędzia te są stosowane w wynikach powiązań i programów korupcyjnych i nie mają doświadczenia w prowadzeniu działań bojowych. Obecny sztab generalny jest niekompetentny i rozpaczliwie wymaga reformy."
 UKR_idea_eu_member_associate: "Członek stowarzyszony UE"
 UKR_idea_eu_member_associate_desc: "Ukraina otwarte stowarzyszenie z UE. Pogłębi to więzi z Europą i blokiem zachodnim. Stwarza jednak problemy w regionach z różnicą rosyjskojęzyczną."
 UKR_idea_government_in_need: "Nieskuteczny rząd"
 UKR_idea_pro_ukraine_reform_1: "Rząd reformowany."
 UKR_idea_shortened_general_staff: "Kompaktowy Sztab Generalny"
 UKR_every_man_ataman: "Każdy człowiek – Ataman"
 UKR_foreign_advisors: "Doradcy zagraniczni"
 ukraine_coup.1.t: "Rosja została zatrzymana przez zamach!"
 ukraine_coup.1.d: "Z najnowszego raportu z Kijowa wynika, że ​​agenci wspierani przez Rosję mieli uderzyć w nasz rząd! Stanowisko do bezpośredniego stosowania dla naszej polityki od strony rosyjskiej."
 ukraine_coup.1.a: "Bastards."
 ukraine_coup.2.t: "Rosja nas zamachuje!"
 ukraine_coup.2.d: "Z najnowszego raportu z Kijowa wynika, że ​​agenci wspierani przez Rosję dokonali zamachu stanu na nasz rząd! Teraz naszym krajem będzie rządzić prorosyjska klika establishmentu."
 ukraine_coup.2.a: "Co do cholery?"
 ukraine_news.7.t: "Wojna domowa na Ukrainie."
 ukraine_news.7.d: "regionu Donbasu na Ukrainie ogłosili niepodległość. Ogłosili mieszkaniacom obwodów donieckiego i ługańskiego, że nie będą już poddawać się tyranii Kijowa. [UKR.GetLeader] i ukraińska administracja potępiły rebeliantów i zmobilizowały się, aby ich stłumić. W następstwie już do potyczek między siłami proukraińskimi a rebeliantami."
 ukraine_news.7.a: "Stłumić bunt"
 ukraine_news.7.b: "Pokonaj Prześladowców!"
 ukraine_news.7.c: "Ciekawość zysków"
 ukraine_news.8.t: "Aneksja Krymu"
 ukraine_news.8.d: "Naród krymski zorganizował referendum w sprawie opuszczenia Ukrainy i sprzymierzenia się z Rosją. Reakcja Rosji była szybka i zdecydowana, ponieważ szybko zalała region wojskami i zaanektowała półwysep. Szybko przejęto kluczowe stanowiska wojskowe. Rząd ukraiński wyraził swoje oburzenie tą sprawą i żąda od Rosji zwrotu Krymu."
 ukraine_news.8.a: "Tylko na razie.."
 ukraine_news.8.b: "Dla matki Rosji!"
 ukraine_news.8.c: "Niepokojące wiadomości."
 UKR_tro_brigades_ukraine_decision_category: "Wojsk Obrony Terytorialnej Ukrainy"
 UKR_tro_brigades_ukraine_decision_category_desc: "Siły Obrony Terytorialnej Sił Zbrojnych Ukrainy są odrębnym rodzajem Sił Zbrojnych Ukrainy, któremu powierzono organizację, przygotowanie i realizację zadań obrony terytorialnej."
 UKR_tro_created_tt: "Będzie można werbować §YTBrygady Obrony Terytorialnej§!"
 UKR_reorganize_the_national_guard_ukraine_decision_category: "Gwardia Narodowa Ukrainy"
 UKR_reorganize_the_national_guard_ukraine_decision_category_desc: "The National Guard of Ukraine is a military formation with law enforcement functions, is part of the system of the Ministry of Internal Affairs of Ukraine (MIA) and is designed to perform tasks to protect and protect the life, rights, freedoms and legitimate interests of citizens of Ukraine, society and the state from criminal and other illegal encroachments, protect public order and ensure public safety.\n\nAs well as in cooperation with law enforcement agencies, to ensure state security and protection of the state border, suppression of terrorist activities, activities of illegal paramilitary or armed formations (groups), terrorist organizations, organized groups and criminal organizations."
 UKR_reorganize_the_national_guard_first_brigade: "§Y1. Brygada Operacyjna§! Gwardii Narodowej Ukrainy"
 UKR_reorganize_the_national_guard_second_brigade: "§Y25 Oddzielna Brygada§! Ochrony Porządku Publicznego"
 UKR_reorganize_the_national_guard_third_brigade: "§Y4. Brygada Operacyjna§! Gwardii Narodowej Ukrainy"
 UKR_reorganize_the_national_guard_four_brigade: "§Y23. Oddzielna Brygada§! Ochrony Porządku Publicznego"
 UKR_natguard_created_tt: "Będziesz mógł werbować §YBrygady Gwardii Narodowej§!"
 UKR_uop_decision_category: "Koncern państwowy Ukroboronprom"
 UKR_uop_decision_category_desc: "Koncern państwowy Ukroboronprom jest zrzeszeniem przedsiębiorstw kompleksu wojskowo-przemysłowego Ukrainy pod państwowym zarządem. W skład koncernu wchodzą przedsiębiorstwa przemysłu obronnego, które prowadzą działalność gospodarczą w zakresie rozwoju, produkcji, sprzedaży, naprawy, modernizacji i utylizacji broni, sprzętu wojskowego i specjalnego oraz amunicji, a także uczestniczą we współpracy wojskowo-technicznej z zagranicą. Koncern odpowiada za funkcje planowania strategicznego, koordynacji i poprawy efektywności przedsiębiorstw przemysłu obronnego, współdziałanie z organami władzy publicznej.\n\n\nObecne dodatkowe moce produkcyjne przemysłu, które możemy przeznaczyć na dodatkowe prowizoryczne pojazdy, to [?ukr_industry_points]"
 UKR_t84_oplot: "Dodaj prototyp czołgu §YT-84 Oplot§!"
 UKR_bpla_oup: "Wprowadź zmianę w §YUAV§!"
 UKR_btr70_m: "Dodaj prototyp §YBTR 70M§!"
 UKR_bm21_k: "Dodaj prototyp §YBM-21K§!"
 UKR_helicopter: "Dokonuj rozwoju w dziedzinie §YŚmigłowców§!"
 UKR_uda_created_tt: "§YUkraińska Armia Ochotnicza§! zostać stworzone"
 UKR_aidar_created_tt: "§YBatalion Aidar§! zostać stworzone"
 UKR_donbass_created_tt: "§YBatalion Donbas-Ukraina§! zostać stworzone"
 UKR_azov_created_tt: "§JAzow§! zostać stworzone"
