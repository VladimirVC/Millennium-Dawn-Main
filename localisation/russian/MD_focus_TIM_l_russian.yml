l_russian:
 east_timor.1.t: "Кризис 2006 года"
 east_timor.1.d: "Вооруженные силы Восточного Тимора расколоты по региональному признаку. Почти 600 солдат из западных округов были уволены, что спровоцировало межфракционное насилие, которое распространяется по столице страны Дили. Правительство теряет контроль над ситуацией в области безопасности."
 east_timor.1.a: "Запросить международную помощь по поддержанию мира"
 east_timor.1.b: "Мы сами наведем порядок"
 east_timor.2.t: "Восточный Тимор просит миротворцев"
 east_timor.2.d: "Восточный Тимор скатился к межфракционному насилию и обращается к Австралии за военной помощью для восстановления порядка. Как крупнейшая держава региона, наш ответ задаст тон международному вмешательству."
 east_timor.2.a: "Развертывание Международных сил по стабилизации"
 east_timor.2.b: "В данный момент мы не можем вмешиваться"
 east_timor.3.t: "Восточный Тимор взывает о помощи"
 east_timor.3.d: "Наша бывшая колония Восточный Тимор обращается за военной помощью, поскольку страна погружается в хаос. У Португалии есть исторические обязательства и прочные связи с тиморским народом."
 east_timor.3.a: "Отправить миротворческий контингент"
 east_timor.3.b: "Отклонить запрос"
 east_timor.4.t: "Восточный Тимор просит помощи"
 east_timor.4.d: "Восточный Тимор обратился к Новой Зеландии за помощью в восстановлении порядка. Маленькая нация борется с широко распространенным насилием и разваливающимся аппаратом безопасности."
 east_timor.4.a: "Пришлите миротворцев"
 east_timor.4.b: "Снижение"
 east_timor.5.t: "Кризис в Восточном Тиморе"
 east_timor.5.d: "Восточный Тимор обратился к малайзийским миротворческим силам с просьбой помочь стабилизировать ситуацию в стране. Как дружественное государство Юго-Восточной Азии, участие Малайзии продемонстрировало бы региональную солидарность."
 east_timor.5.a: "Перебросить войска в Дили"
 east_timor.5.b: "Отклонить запрос"
 east_timor.6.t: "Прибывают Австралийские войска"
 east_timor.6.d: "Австралийские миротворческие силы прибыли в Дили и восстанавливают порядок в столице. Международные силы по стабилизации являются основой миротворческой операции."
 east_timor.6.a: "Мы благодарны"
 east_timor.7.t: "Прибывают Португальские войска"
 east_timor.7.d: "Португальские войска были развернуты в Восточном Тиморе, выполняя историческое обязательство перед своей бывшей колонией."
 east_timor.7.a: "Добро пожаловать, друзья"
 east_timor.8.t: "Прибывают новозеландские миротворцы"
 east_timor.8.d: "Новая Зеландия направила миротворческий контингент для оказания помощи в стабилизации положения в Восточном Тиморе."
 east_timor.8.a: "Мы ценим их помощь"
 east_timor.9.t: "Прибывают малайзийские войска"
 east_timor.9.d: "Малазийские войска прибыли для оказания помощи миротворческой операции в Восточном Тиморе."
 east_timor.9.a: "Наша благодарность Малайзии"
 east_timor.10.t: "Охота на Альфредо Рейнадо"
 east_timor.10.d: "Лидер повстанцев Альфредо Рейнадо скрылся от властей и скрывается в горах к югу от Дили. Его продолжающаяся свобода подрывает авторитет правительства и придает смелости другим диссидентским группировкам."
 east_timor.10.a: "Попросите Австралию прислать спецназ"
 east_timor.10.b: "Охотиться на него нашими собственными силами"
 east_timor.11.t: "Восточный Тимор просит SAS О Помощи"
 east_timor.11.d: "Восточный Тимор попросил Австралию направить войска полка специальной авиационной службы для поимки беглого лидера повстанцев Альфредо Рейнадо, который продолжает уклоняться от участия в миротворческих силах."
 east_timor.11.a: "Пошлите в SAS"
 east_timor.11.b: "Это выходит за рамки нашего мандата"
 east_timor.12.t: "Рейнадо убегает"
 east_timor.12.d: "Несмотря на операцию австралийского спецназа, Альфредо Рейнадо сбежал в горы. В ходе операции его задержать не удалось, но более широкое международное присутствие стабилизировало ситуацию с безопасностью в Дили."
 east_timor.12.a: "В конце концов, он будет найден"
 east_timor_news.1.t: "Международные силы дислоцируются в Восточном Тиморе"
 east_timor_news.1.desc: "Международные миротворческие силы во главе с Австралией начали развертывание в Дили по официальному запросу правительства Восточного Тимора. В результате межфракционного насилия в столице погибли сотни людей или стали вынужденными переселенцами. Австралия, Португалия, Новая Зеландия и Малайзия предоставляют войска в состав Международных сил стабилизации."
 east_timor_news.1.a: "Мы рассчитываем на помощь всего мира"
 east_timor_news.1.b: "Мы восстановим порядок в Дили"
 east_timor_news.1.c: "Стабильность в регионе отвечает нашим интересам"
 east_timor_news.1.d: "Маленькая нация в кризисе"