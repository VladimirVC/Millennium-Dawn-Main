 algeria_nationalist: "国家人民军国策"
 ALG_productivity_cost_tt: "将§H阿尔及利亚国家状况§!的§Y月度生产率增长§!修改[?ALG_productivity_cost_change|+]（当前：[?ALG_productivity_growth|+]）"
 monitor_kabyle_unrest: "监视[KBY.GetFlag]卡比利亚动荡"
 ALG_us_sanctions: "美国制裁"
 ALG_us_sanctions_desc: "美国实施了多项制裁，限制了我们与外界互动的能力。虽然制裁并不严重，但确实在一定程度上阻碍了我们取得经济成功。\n§W--------------§!\n美国有能力根据我们的行动增加或减少对我们政府的制裁。\n§W--------------§!\n如果美国认为我们不再追求核武器，该国家精神将被§R移除§!。"
 ALG_imf_path: "选择国际货币基金组织贷款路径"
 ALG_imf_loan_taken: "接受了国际货币基金组织的贷款"
 ALG_oil_reformed: "石油重整"
 ALG_repression_modifier: "镇压"
 ALG_surveillance_state_modifier: "监控国家"
 ALG_national_dialogue_modifier: "全国对话"
 ALG_boteflika: "阿尔及利亚总统健康危机"
 idea_alg_empowered_parliament: "授权议会"
 algeria_sahar.1.t: "来自阿尔及利亚的帮助"
 algeria_sahar.1.d: "我们收到了阿尔及利亚的提议，他们愿意向我们提供军事援助，帮助我们做好恢复敌对行动的准备，以换取我们参与建立阿拉伯联合共和国的进程。我们应该接受阿尔及利亚的支持吗？"
 algeria_sahar.1.a: "我们必须接受！"
 algeria_sahar.1.b: "我们决不能成为他们的傀儡！"
 algeria_sahar.2.t: "和平协议"
 algeria_sahar.2.d: "我们无法遏制叛乱分子，他们占领了整个西撒哈拉。我们应该向叛军提供和平条约并交出领土吗？"
 algeria_sahar.2.a: "接受他们的提议"
 algeria_sahar.2.b: "我们必须碾碎他们！"
 algeria_sahar.3.t: "来自摩洛哥的提议"
 algeria_sahar.3.d: "摩洛哥向我们发出了和平条约提案，这个声明可以算是正式的投降行为！我们可以接受投降，也可以在广阔的战线上解放北马格里布人民！"
 algeria_sahar.3.a: "我们胜利了！"
 algeria_sahar.3.b: "向人民联邦前进！"
 algeria_sahar.5.t: "和平终临。"
 algeria_sahar.5.d: "我们与西撒哈拉签署了和平条约，战争结束了。"
 algeria_sahar.5.a: "我们的至暗时刻.."
 algeria_sahar.6.t: "他们拒绝了！"
 algeria_sahar.6.d: "西撒哈拉拒绝了我们的和平条约！战争仍在继续！"
 algeria_sahar.7.t: "西撒哈拉同意了！"
 algeria_sahar.7.d: "西撒哈拉接受了我们的提议！"
 algeria_sahar.7.a: "向阿拉伯联合共和国前进！"
 algeria_sahar.8.t: "他们拒绝了！"
 algeria_sahar.8.d: "西撒哈拉拒绝了我们的提议。"
 algeria_sahar.8.a: "多么耻辱。"
 TT_ALG_DEAL_WITH_TRADE_UNIONS: "当我们拥有工会作为内部派系时，会提高工会的支持度。"
 ALG_oil_price_collapse: "石油价格暴跌"
 ALG_oil_price_collapse_desc: "全球油价骤降严重影响了阿尔及利亚的国家财政收入。由于油气产业仍是国民经济支柱，此次价格暴跌威胁到预算稳定、外汇储备和社会支出。\n\n§R- 国库收入锐减§!"
 alg_hirak_victory_option: "人民运动胜利"
 alg_hirak_victory_option_desc: "经过多年的抗议、动员和基层抵抗，人民运动最终取得了胜利。民主改革正在进行中，但国家依然脆弱，转型前景不明朗。\n\n§G+改革派合法性§!\n§Y- 深层政府影响力§!"
 alg_hirak_reforms_title: "人民运动驱动的改革"
 alg_hirak_reforms_desc: "面对来自民众的巨大压力，政府被迫实施象征性的改革。"
 alg_hirak_reforms_option: "宣布政治改革"
 alg_hirak_gains_influence_tt: "§Y人民运动§!在政治格局中获得更大的影响力。"
 alg_hirak_crackdown_title: "镇压人民运动抗议活动"
 alg_hirak_crackdown_desc: "该政权选择了镇压而非改革，动用安全部队镇压抗议者。"
 alg_hirak_crackdown_option: "使用武力恢复秩序"
 alg_pouvoir_crackdown_tt: "§Y权力集团§!以牺牲稳定为代价巩固了权力。"
 alg_old_guard_advances_tt: "§Y保守派§!重新掌控阿尔及利亚的未来。"
 alg_health_crisis_title: "总统健康危机"
 alg_health_crisis_desc: "布特弗利卡总统突发重病，再次引发人们对阿尔及利亚政治领导层老龄化和缺乏透明度的担忧。尽管他的亲信坚称他将继续执政，但许多民众和精英人士开始质疑他继续执政的合法性。"
 alg_health_crisis_option_continue: "重申布特弗利卡的领导地位"
 alg_le_pouvoir_strengthens_tt: "随着总统核心圈子保护他免受公众监督，§Y权力集团§!得越来越大。"
 maghreb_union_member: "§Y接受了我们关于组建马格里布联盟的提议§!"
 has_power_balance_algeria: "2014年阿尔及利亚大选已完成"
 supports_brics: "支持金砖国家联盟"
 ALG_eu_trade_agreements_desc: "与欧盟签署贸易协定，以加强我们与西方的联系并发展我们的经济"
 ALG_join_nato_partnership_desc: "加入北约伙伴关系，这样我们才能主导非洲地区，并将阿尔及利亚建设成为发达国家。"
 ALG_al_quwwat_al_jawwiya_al_jazaeriya: "阿尔及利亚空军"
 ALG_al_quwwat_al_jawwiya_al_jazaeriya_desc: "自独立以来，阿尔及利亚空军一直是我国军事力量的支柱之一。通过现代化和装备采购加强空军能力，将确保我们在北非空域的制空权。"
 ALG_al_jaysh_al_watani_al_shaabi: "国家人民军"
 ALG_al_jaysh_al_watani_al_shaabi_desc: "国家人民军是阿尔及利亚国防的骨干力量。改革和装备陆军将确保我们的领土安全，并在面对威胁时维护稳定。"
 ALG_al_quwwat_al_bahriya_al_jazaeriya: "阿尔及利亚海军"
 ALG_al_quwwat_al_bahriya_al_jazaeriya_desc: "阿尔及利亚海军负责保卫我们在地中海沿岸的利益和海上安全。扩充舰队和基础设施将使阿尔及利亚能够投射力量并保护重要的海上航道。"
 ALG_al_quwwat_al_musallaha_al_jazaeriya: "阿尔及利亚武装部队"
 ALG_al_quwwat_al_musallaha_al_jazaeriya_desc: "阿尔及利亚武装部队代表着我国陆军、空军和海军的综合力量。作为国家主权的保障者，它必须进行重组和现代化改造，以应对新世纪的挑战。"
 ALG_expand_the_EFCIP: "扩建突击队训练和伞降入门学校"
 ALG_expand_the_EFCIP_desc: "位于博加尔的突击队训练和伞降入门学校自1963年以来一直是阿尔及利亚特种部队训练的基石。通过扩建设施、现代化基础设施并引入先进的作战课程，我们将进一步提升突击队员和伞兵的作战能力。这项投资将确保阿尔及利亚继续保持北非最强大的特种部队之一。"
 ALG_expand_conscription: "扩大征兵范围"
 ALG_expand_conscription_desc: "扩大征兵范围可以增加我们训练有素的士兵数量。这能确保我们拥有足够的人力来保卫国家并应对各种威胁。"
 ALG_expand_military_infrastructure: "扩大军事基础设施"
 ALG_expand_military_infrastructure_desc: "建设新的基地、训练中心和后勤枢纽，增强我们的军事能力。基础设施的改善有助于提高作战效率。"
 ALG_focus_on_military_morale: "关注军队士气"
 ALG_focus_on_military_morale_desc: "高昂的士气对于战斗力至关重要。投资于士兵福利、领导力和团队精神可以增强战斗精神。"
 ALG_expand_artillery_units: "扩充炮兵部队"
 ALG_expand_artillery_units_desc: "炮兵是战场上至关重要的火力，增加炮兵部队可以增强我军的攻防能力。"
 ALG_an_army_of_the_masses: "群众的军队"
 ALG_an_army_of_the_masses_desc: "一支规模庞大、训练有素的军队能够震慑侵略，保卫主权。打造一支大规模军队需要投入训练和资源。"
 ALG_expand_the_escuela_de_condores: "扩大秃鹰学校"
 ALG_expand_the_escuela_de_condores_desc: "秃鹰学校训练玻利维亚精锐士兵。扩建该学校将培养更多特种部队，以应对复杂的安全挑战。"
 ALG_form_specops_brigades: "组建特种部队旅"
 ALG_form_specops_brigades_desc: "特种部队旅执行需要高超技能的高风险任务。组建这些部队增强了玻利维亚的战术灵活性。"
 ALG_military_mechanization: "军队机械化"
 ALG_military_mechanization_desc: "机械化步兵提高了机动性和火力。这一转变实现了军队的现代化，并提高了战场效能。"
 ALG_abolish_conscription: "废除征兵制"
 ALG_abolish_conscription_desc: "取消征兵制将使军队转变为一支专业的志愿部队。这可以提高军队素质，但会减少可用的人力。"
 ALG_quality_over_quantity: "质量而非数量"
 ALG_quality_over_quantity_desc: "专注于规模较小、装备精良的部队可以提高战斗力。训练和现代化装备比单纯的数量更重要。"
 ALG_a_cost_effective_army: "一支具有成本效益的军队"
 ALG_a_cost_effective_army_desc: "保持精简高效的军队确保财政责任。合理的预算使我们能够平衡国防需求和经济现实。"
 ALG_modernizing_our_equipment: "使我们的设备现代化"
 ALG_modernizing_our_equipment_desc: "升级武器和装备，让我们的部队保持竞争力。现代化的装备能够提升我们的生存力和战斗力。"
 ALG_develop_algerian_military_industry: "发展军工工业"
 ALG_develop_algerian_military_industry_desc: "建立国内军火工业可以减少对进口的依赖，从而增强主权并创造就业机会。"
 ALG_cooperate_with_foreign_arms_companies: "与外国武器公司合作"
 ALG_cooperate_with_foreign_arms_companies_desc: "与国际军火公司合作加速了技术转让。这些合作提升了我们的军事能力。"
 ALG_tackle_military_corruption: "打击军队腐败"
 ALG_tackle_military_corruption_desc: "腐败损害军队效能和士气。强有力的改革和监督将恢复信任和纪律。"
 ALG_elite_officer_training: "精英军官训练"
 ALG_elite_officer_training_desc: "高技能军官是战场胜利的关键。专业培训项目旨在培养领导力和战略专业知识。"
 ALG_an_army_for_the_future: "未来之军"
 ALG_an_army_for_the_future_desc: "我们必须让军队做好准备，应对未来的威胁和技术。创新和适应能力是这一愿景的核心。"
 ALG_purchase_american_aircraft: "购买美国飞机"
 ALG_purchase_american_aircraft_desc: "从美国采购飞机，为我们提供了先进的技术和可靠的保障，增强了我们的空中作战能力。"
 ALG_purchase_chinese_aircraft: "购买中国飞机"
 ALG_purchase_chinese_aircraft_desc: "中国飞机提供经济高效的选择，且技术日益精进。多元化的供应商拓展了战略合作伙伴关系。"
 ALG_purchase_russian_aircraft: "购买俄罗斯飞机"
 ALG_purchase_russian_aircraft_desc: "俄罗斯飞机设计坚固，性能强劲。合作增强了我们空军的多功能性。"
 ALG_improve_air_defense_infrastructure: "改善防空基础设施"
 ALG_improve_air_defense_infrastructure_desc: "加强防空系统可以保护关键资产和人口中心。升级可以降低遭受空中威胁的脆弱性。"
 ALG_close_air_support: "近地支援机"
 ALG_close_air_support_desc: "近距离空中支援能够提升地面部队的作战效能。整合空中和陆地作战对于战场胜利至关重要。"
 ALG_a_new_world_class_academy: "一所新的世界级学院"
 ALG_a_new_world_class_academy_desc: "建立一所世界一流的军事学院，将培养未来的领导者。该学院将树立卓越的标准。"
 ALG_dominate_the_skies: "制霸诸天"
 ALG_dominate_the_skies_desc: "在现代战争中，夺取空中优势至关重要。我们将投入资金，控制我们的领空，并支持所有军事行动。"
 ALG_might_of_the_sky: "天空之力"
 ALG_might_of_the_sky_desc: "我们的空中力量象征着国家实力和技术进步。保持强大的空军可以遏制侵略。"
 ALG_naval_military_police: "海军宪兵"
 ALG_naval_military_police_desc: "海军宪兵负责维持舰艇和基地的纪律和安全，确保秩序和有效行动。"
 ALG_expand_the_naval_academy: "扩大海军学院"
 ALG_expand_the_naval_academy_desc: "扩建后的海军学院将培养更多军官和水兵。这项投资旨在打造一支专业化、精干的海上力量。"
 ALG_return_to_the_sea: "重返大海"
 ALG_return_to_the_sea_desc: "恢复通往太平洋的通道是阿尔及利亚的历史性目标。发展海军力量对这一雄心至关重要。"
 ALG_algerian_marine_forces: "阿尔及利亚海军陆战队"
 ALG_algerian_marine_forces_desc: "海军陆战队提供快速反应能力和两栖作战技术。其扩充将提升阿尔及利亚的作战范围。"
 ALG_quick_strikes: "快速打击"
 ALG_quick_strikes_desc: "快速果断的打击可以压倒对手。发展这样的力量可以提高战术灵活性。"
 ALG_invest_into_shipbuilding: "投资造船业"
 ALG_invest_into_shipbuilding_desc: "发展国产造船业有利于海军扩张和经济增长。该领域对长期国防具有战略意义。"
 ALG_djebel_chenoua: "查努亚山"
 ALG_djebel_chenoua_desc: "打造一支强大的舰队能够展现实力并保护国家利益。查努亚山级轻型护卫舰是海上主权的象征。"
 ALG_masters_of_the_mediterranean: "地中海之主"
 ALG_masters_of_the_mediterranean_desc: "控制地中海海域能够确保贸易路线和战略优势。阿尔及利亚必须力争成为该地区的关键参与者。"
 ALG_focus_on_mass_assault_tactics: "关注大规模攻击战术"
 ALG_focus_on_mass_assault_tactics_desc: "大规模突击战术强调以大规模兵力压制敌军。该战略依靠人力和协同作战来取得胜利。"
 ALG_licence_mir: "购买幻影许可证"
 ALG_licence_mir_desc: "我们拥有生产法国飞机的一切手段，所以我们必须申请生产许可证。"
 ALG_purchase_russian_su30: "购买俄罗斯苏-30战机"
 ALG_purchase_russian_su30_desc: "作为地区强国，保卫我们广袤的边境线并向马格里布和萨赫勒地区投射影响力至关重要。我军高层已认定俄罗斯传奇战机苏-30是大幅提升我方空中优势的理想平台。此次采购不仅能增强我方机队的实力并规范后勤保障，还能立即带来决定性的优势，尽管无疑会引起国际社会的广泛关注。"
 alg_promote_arabization: "促进阿拉伯化"
 alg_promote_arabization_desc: "通过强化阿拉伯认同来加强民族团结。这将有助于稳定国家局势，但会激怒卡比利亚人和莫扎比特人。"
 alg_recognize_tamazight: "承认塔马齐格特语"
 alg_recognize_tamazight_desc: "正式承认塔马齐格特语，这令卡比利亚人满意，但激怒了阿拉伯民族主义者。"
 alg_ethnicity.100.t: "卡比利亚人抗议"
 alg_ethnicity.100.d: "卡比利亚地区的民众积怨已演变为抗议活动，他们要求获得文化权利和自治权。政府必须决定是镇压抗议还是做出让步。"
 alg_ethnicity.100.a: "镇压抗议活动"
 alg_ethnicity.100.b: "作出让步"
 alg_ethnicity.200.t: "卡比利亚分裂！"
 alg_ethnicity.200.d: "卡比利亚地区的动乱已达到临界点。卡比利亚自决运动的武装分子宣布独立，引发了卡比利亚内战。"
 alg_ethnicity.200.a: "给他们想要的东西"
 alg_ethnicity.200.b: "内战风险"
 alg_politics.50.t: "斯迈因·拉马里将军去世"
 alg_politics.50.d: "阿尔及利亚国家安全局负责反间谍工作的头目斯迈因·拉马里将军去世。他的突然离世在阿尔及利亚的权力核心留下了权力真空，各路对手正竞相争夺他昔日的影响力。"
 alg_politics.50.a: "旧政权的阴影逐渐消失。"
 ALG_black_decade_threat: "复兴黑色十年方法"
 ALG_2001_title: "法蒂玛·布达尼的晋升"
 ALG_2001_desc: "作为布特弗利卡总统改革的一部分，法蒂玛·布达尼成为阿尔及利亚首位女将军。她的晋升标志着女性在军队中进入了一个新时代，提振了士气，也标志着军队现代化进程的开始。"
 ALG_2001_a: "这是军队历史上具有里程碑意义的一步。"
 ALG_2002_title: "法蒂玛·祖赫拉·阿尔多内的宣传"
 ALG_2002_desc: "继法蒂玛·布达尼开创性晋升之后，法蒂玛·祖赫拉·阿尔多内也晋升为将军。作为阿尔及利亚医疗队首位女将军，她的任命体现了阿尔及利亚在军队中推进性别平等的谨慎举措。"
 ALG_2002_a: "又一道障碍被突破了。"
 alg_reform.1.t: "真正改革的机会"
 alg_reform.1.d: "在“民有、民治”倡议的推动下，阿尔及利亚迎来了一个难得的机会，可以选出一位致力于真正改革的领导人。三位候选人脱颖而出，各自承诺走一条不同的道路，以实现国家的稳定和现代化。现在，选择权掌握在人民手中。"
 alg_reform.1.a: "艾哈迈德·本比图尔 - 技术官僚改革者"
 alg_benbitour_desc: "艾哈迈德·本比图尔是一位专注于行政效率和经济现代化的技术官僚。他稳健的方针旨在建立长期稳定并改革国家机构。"
 alg_reform.1.b: "苏菲安·吉拉利 – 魅力十足的改革家"
 alg_djilali_desc: "苏菲安·吉拉利是一位主张改革的反对派领导人，强调社会和政治改革。他魅力非凡、意志坚定，致力于加强民主制度和公众参与。"
 alg_reform.1.c: "拉希德·内卡兹——民粹主义活动家"
 alg_nekkaz_desc: "拉希德·内卡兹是一位直接向民众发声的民粹主义活动家。尽管他声望很高，但其对抗性风格可能在微妙的政治环境中引发不稳定。"
 ALG_citizens_constitution: "公民宪法"
 ALG_justice_for_the_people: "人民正义"
 ALG_free_press_free_people: "新闻自由，人民自由"
 ALG_economic_transparency: "经济透明度"
 ALG_citizens_constitution_desc: "起草一部新宪法，保障基本权利并加强民主制度。"
 ALG_justice_for_the_people_desc: "改革司法体系，确保其独立、公正，并免受政治干预。"
 ALG_free_press_free_people_desc: "保障新闻自由，让媒体能够监督权力并告知公民。"
 ALG_economic_transparency_desc: "实施透明预算和财政政策，以打击腐败并提升公众信任。"
 ALG_true_reformist_path_tt: "这条道路允许阿尔及利亚选择一位真正的改革派领袖，提升民主支持度与稳定度，并为人民开启政治经济改革进程。"
 algeria_news.3_tt: "布特弗利卡的和平计划为阿尔及利亚带来了希望，提升了国家的稳定度和民主支持度。"
 algeria_news.7_tt: "对“当权派”的抵抗赢得了民众支持，增强了民主影响力与政治资本。"
 algeria_news.1_tt: "军队在紧急措施后接管了控制权。稳定度略有下降，但战争支持度和政治力量有所提升。"
 algeria_news.4_tt: "布特弗利卡的和解努力提升了国家稳定度与民主支持度。"
 algeria_news.8.t: "黑色十年的受害者"
 algeria_news.8.d: "1990年代的内战造成了数十万受害者：失踪者、寡妇、孤儿，以及那些遭受酷刑和恐怖的人们。当阿尔及利亚寻求和解时，一个问题浮现：国家应如何回应正义与承认的要求？"
 algeria_news.8.a: "补偿家属与受害者"
 algeria_news.8.b: "仅提供象征性承认"
 algeria_news.8.c: "我们不能沉溺于过去"
 algeria_news.8_a_tt: "§Y代价高昂的补偿计划§!将提升稳定度并增强阿尔及利亚的合法性，但会使国库承受压力。"
 algeria_news.8_b_tt: "§Y象征性承认§!以巨大的政治代价换取稳定性的提升，但部分诉求仍未得到满足。"
 algeria_news.8_c_tt: "§Y无视受害者诉求§!虽能节省当前资源，却会降低稳定并加剧民怨。"
 algeria_news.10.t: "复苏之路"
 algeria_news.10.d: "随着内战结束，阿尔及利亚面临着重建破碎经济的艰巨挑战。工厂闲置、基础设施受损、失业率居高不下。然而多年来首次，人们看到了通过重建与改革恢复繁荣与稳定的希望。"
 algeria_news.10.a: "走向复苏！"
 algeria_news.10_a_tt: "§Y阿尔及利亚经济复苏的第一步已经迈出。§! 这为基础设施、工业和金融领域的更深层次改革开辟了道路。"
 algeria_news.11.t: "联合国援助团"
 algeria_news.11.d: "联合国代表已抵达阿尔及尔，提出经济援助与重建支持方案。他们的计划可能带来宝贵的资金、专业知识和人道主义救援——但政府内部许多人士警告，接受此类援助或将导致外国势力干涉阿尔及利亚内政。"
 algeria_news.11.a: "接受联合国使团"
 algeria_news.11_a_tt: "§G我们将获得国际援助资金和技术支持。§!\n§R但这将增加美国、法国、英国在阿尔及利亚的影响力。§!"
 algeria_news.11.b: "拒绝外国干涉"
 algeria_news.11_b_tt: "§R我们拒绝联合国监督，将依靠自身力量恢复。§!\n§Y此举维护了我国主权，但会减缓经济增长。§!"
 algeria_news.20.t: "审视阿尔及利亚外交政策"
 algeria_news.20.d: "随着内战结束，阿尔及利亚的脆弱复苏正在进行中，阿尔及尔领导层已对国家外交政策展开全面评估。未来几年的选择将决定我们是在日益两极分化的世界中巩固与传统盟友的关系、寻求新的合作伙伴，还是保持独立自主。辩论已经开始，阿尔及利亚很快将必须确定自己的道路。"
 algeria_news.20.a: "阿尔及利亚的未来正等待着。"
 algeria_news.20_tt: "§Y这标志着阿尔及利亚外交政策分支的开端。§!"
 ALG_between_east_and_west_tt: "阿尔及利亚力求在东西方关系间寻求平衡，同时奉行不结盟的外交政策。"
 ALG_mediate_great_power_conflict_tt: "阿尔及利亚积极在全球大国间进行斡旋，树立起中立调停者的国际声誉。"
 ALG_secure_balance_tt: "阿尔及利亚强化了其不结盟立场，在全球主要大国之间确保了稳定的平衡。"
 alg_news_non_aligned.1.t: "东西方之间的平衡"
 alg_news_non_aligned.1.d: "阿尔及利亚已开始在各大全球强国之间谨慎规划路线，力求在保持独立的同时与东方和西方都进行外交接触。"
 alg_news_non_aligned.1.a: "阿尔及利亚寻求平衡"
 alg_news_non_aligned.2.t: "调解全球紧张局势"
 alg_news_non_aligned.2.d: "阿尔及利亚已主动介入调解大国间的紧张关系，旨在提升其作为中立和平斡旋者的国际地位。"
 alg_news_non_aligned.2.a: "调停在路上"
 alg_news_non_aligned.3.t: "促进地区和解"
 alg_news_non_aligned.3.d: "阿尔及利亚发起了一系列外交倡议，旨在调解地区大国间的分歧，寻求稳定与合作伙伴关系。"
 alg_news_non_aligned.3.a: "和解努力"
 alg_news_non_aligned.4.t: "不结盟主义平衡"
 alg_news_non_aligned.4.d: "阿尔及利亚已巩固其不结盟立场，谨慎维持与各大国的关系，但未完全倒向任何阵营。"
 alg_news_non_aligned.4.a: "一碗水端平"
 alg_news_non_aligned.5.t: "复兴不结盟运动"
 alg_news_non_aligned.5.d: "阿尔及利亚已采取措施重振其在\"不结盟运动\"中的参与，重申其在中立国家间的领导地位和外交影响力。"
 alg_news_non_aligned.5.a: "恢复在不结盟运动中的影响力"
 alg_news_non_aligned.6.t: "支持发展中国家"
 alg_news_non_aligned.6.d: "阿尔及利亚已开始对发展中国家展开广泛的外交与经济拓展，旨在促进稳定与合作，同时增强其在该大陆的影响力。"
 alg_news_non_aligned.6.a: "伸出触手"
 algeria_news.9.t: "黑色十年的遗产"
 algeria_news.9.d: "内战给阿尔及利亚留下了深深的伤痕。政府必须决定如何界定过去、分配责任，并引领国家的未来。"
 algeria_news.9.a: "支持军事政权"
 algeria_news.9.b: "站在受害者和穷人一边"
 algeria_news.9.c: "归咎于外部势力"
 algeria_news.9.dd: "正式清除并压制讨论"
 ALG_promote_reconciliation_tt: "§G促进和解：§!\n• 改善与邻国关系\n• 降低地区紧张局势\n• 开辟外交渠道"
 algeria_news.9.a_tt: "$opinion_tick_rate_tt$\n支持军事政权带来的舆论影响：\n\n§Y军方§!：[?ALG_military_opinion|+%]（当前：[?ALG_military_opinion_current|Y%]）\n§Y恐怖威胁§!：+5\n§Y国库§!：+40\n§Y政治点数§!：+50\n§Y稳定度§!：+5%"
 algeria_news.9.b_tt: "$opinion_tick_rate_tt$\n支持受害者带来的舆论影响：\n\n§Y乌理玛§!：[?ALG_ulema_opinion|+%]（当前：[?ALG_ulema_opinion_current|Y%]）\n§Y公民社会§!：+80\n§Y恐怖威胁§!：-5\n§Y国库§!：-8\n§Y政治点数§!：+25\n§Y稳定度§!：+10%"
