 investments_construction_CIC: "§YГражданская промышленность§!\nЭто здание обеспечивает государство промышленными мощностями для производства товаров гражданского назначения или строительства новых зданий. При необходимости может быть переоборудовано для нужд военной промышленности.\n\n§Y Базовая стоимость сооружения:§! §R$[?global.build_cost_array^1|3]§! миллиардов"
 investments_construction_CIC_delayed: "§YПредварительные условия§!:\n[!investments_building_cic_button_click_enabled]"
 investments_construction_MIC: "§YВоенная промышленность§!\nЭто здание обеспечивает государство промышленными мощностями для производства новой военной техники. При необходимости может быть переоборудовано для нужд гражданской промышленности.\n\n§Y Базовая стоимость сооружения:§! §R$[?global.build_cost_array^2|3]§! миллиардов"
 investments_construction_MIC_delayed: "§YПредварительные условия§!:\n[!investments_building_mic_button_click_enabled]"
 investments_construction_NIC: "§YВоенно-морская верфь§!\nЭто здание обеспечивает государство промышленными мощностями для строительства новых кораблей.\n\n§Y Базовая стоимость за единицу:§! §R$[?global.build_cost_array^3|3]§! миллиардов"
 investments_construction_NIC_delayed: "§YПредварительные условия§!:\n[!investments_building_nic_button_click_enabled]"
 investments_construction_INF: "§YИнфраструктура§!\nЭто здание обеспечивает государству улучшение инфраструктуры. Оно увеличивает вашу ресурсную базу в стратегических регионах и повышает скорость работы ваших подразделений, а также увеличивает добычу сырья.\n\n§Y Базовая стоимость за единицу:§! §R$[?global.build_cost_array^4|3]§! миллиардов"
 investments_construction_INF_delayed: "§YПредварительные условия§!:\n[!investments_building_infra_button_click_enabled]"
 investments_construction_offices: "§YОфисный сектор§!\nОфисный сектор включает в себя все остальные отрасли экономики, кроме добывающей и тяжелой промышленности. К ним относятся финансовый сектор, обслуживание клиентов, информационные технологии, розничная торговля и многое другое.\n\n§Y Базовая стоимость одной структуры:§! §R$[?global.build_cost_array^5|3]§! млрд"
 investments_construction_offices_delayed: "§YПредварительные условия§!:\n[!investments_building_offices_button_click_enabled]"
 investments_construction_AA: "§YОбъекты ПВО малой дальности§!\n§YОбъекты ПВО малой дальности§! (Short Range Air Defense) — это комплексы и группы зенитных средств и тактических приемов, предназначенных для защиты от низколетящих воздушных угроз. Эти объекты работают сообща, разделяя воздушное пространство на зоны, пригодные для обороны, и обеспечивая прикрытие местных военных объектов и инфраструктуры от всех видов воздушных угроз — от вертолетов до низколетящих самолетов и реактивных истребителей.\n\n§Y Базовая стоимость одного объекта:§! §R$[?global.build_cost_array^6|3]§! миллиардов"
 investments_construction_AA_delayed: "§YПредварительные условия§!:\n[!investments_building_antiair_button_click_enabled]"
 investments_construction_RAD: "§YРадиолокационная станция§!\nРадиолокационные станции позволяют получать информацию о войсках противника в близлежащих штатах. Они состоят из различных радаров и датчиков, а также средств разведки и анализа меняющейся ситуации.\nЧем выше уровень станции, тем больше ее эффективная дальность действия.\nРадары также позволяют штату лучше обнаруживать воздушные силы противника, повышая шансы на их уничтожение.\nКроме того, радары повышают эффективность обнаружения вражеских флотов в море.\n\n§Y Базовая стоимость за единицу:§! §R$[?global.build_cost_array^7|3]§! миллиардов"
 investments_construction_RAD_delayed: "§YПредварительные условия§!:\n[!investments_building_radar_button_click_enabled]"
 investments_construction_AIR: "§YАвиабаза§!\nЭто здание обеспечивает развертывание ваших военно-воздушных сил.\n\n§YБазовая стоимость сооружения:§! §R$[?global.build_cost_array^8|3]§! миллиардов"
 investments_construction_AIR_delayed: "§YПредварительные условия§!:\n[!investments_building_airbase_button_click_enabled]"
 investments_construction_fuel_silo: "§YСтратегический резерв ресурсов§!\nЭто здание предоставляет вашей стране больше места для хранения §Hтоплива§!.\n\n§YБазовая стоимость постройки:§! §R$[?global.build_cost_array^9|3]§! миллиардов"
 investments_construction_fuel_silo_delayed: "§YПредварительные условия§!:\n[!investments_building_fuel_silos_button_click_enabled]"
 investments_construction_internet_station: "§YСетевая инфраструктура§!\nСетевая инфраструктура — это высокие сооружения, используемые в сфере телекоммуникаций и радиосвязи для передачи данных на большие расстояния, а также для прокладки подземных оптоволоконных кабелей и систем облачных вычислений.\n\nКаждый уровень §Yсетевой инфраструктуры§! повышает скорость роста локальной производительности на §G+5,00%§!.\nКаждый уровень §Yсетевой инфраструктуры§! сокращает срок окупаемости §Yмеждународных инвестиций§! на §G-5,00%§!.\n\n§YБазовая стоимость сооружения:§! §R$[?global.build_cost_array^10|3]§! миллиардов"
 investments_construction_internet_station_delayed: "§YПредварительные условия§!:\n[!investments_building_internet_station_button_click_enabled]"
 investments_construction_REF: "§YИнфраструктура возобновляемых источников энергии§!\nИнфраструктура возобновляемых источников энергии — это общее понятие для всех возобновляемых источников энергии. К ним относятся, в частности, но не ограничиваются ими: солнечные электростанции, ветряные турбины, заводы по переработке биотоплива, предприятия по производству древесного угля, электростанции, работающие на биотопливе, и многое другое. Таким образом, инфраструктура использует возобновляемые источники и производит топливо из этих источников.\n\n§Y Базовая стоимость одной структуры:§! §R$[?global.build_cost_array^11|3]§! миллиардов"
 investments_construction_REF_delayed: "§YПредварительные условия§!:\n[!investments_building_ref_button_click_enabled]"
 investments_construction_POWER_PLANT: "§YЭлектростанция, работающая на ископаемом топливе§!\nЭлектростанция, работающая на ископаемом топливе, — это общее название для всех источников тепловой энергии на основе ископаемого топлива. К ним относятся, в частности, но не только, уголь, природный газ и нефть.\n\n§YБазовая стоимость одной структуры:§! §R$[?global.build_cost_array^12|3]§! миллиардов"
 investments_construction_POWER_PLANT_delayed: "§YПредварительные условия§!:\n[!investments_building_power_plant_button_click_enabled]"
 investments_construction_NUCLEAR_REACTOR: "§YЯдерный реактор§!\nЗдание ядерного реактора преобразует ядерную энергию в электрическую, потребляя при этом уран средней степени обогащения.\n\n§Y Базовая стоимость сооружения:§! §R$[?global.build_cost_array^13|3]§! миллиардов"
 investments_construction_NUCLEAR_REACTOR_delayed: "§YПредварительные условия§!:\n[!investments_building_nuclear_reactor_button_click_enabled]"
 investments_construction_agriculture_district: "§YРайон коммерческого сельского хозяйства§!\nРайон коммерческого сельского хозяйства — это обобщающее понятие для всех видов сельского хозяйства, не связанных с натуральным хозяйством, в нашей стране. Сюда входят агропромышленный сектор, пахотные земли, зернохранилища, скотобойни и многое другое.\n\n§Y Базовая стоимость одной структуры:§! §R$[?global.build_cost_array^14|3]§! миллиардов"
 investments_construction_agriculture_district_delayed: "§YПредварительные условия§!:\n[!investments_building_agriculture_district_button_click_enabled]"
