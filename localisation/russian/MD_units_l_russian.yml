 hq_Mech_Inf_Bat: "Штабной охранный отряд механизированной пехоты"
 hq_Arm_Inf_Bat: "Штабной охранный отряд бронетехники"
 hq_Mech_Marine_Bat: "Штабной охранный отряд морской пехоты"
 hq_Mech_Air_Inf_Bat: "Штабной охранный отряд воздушно-штурмовых войск"
 Militia_Recce_Comp: "Разведывательная рота ополчения"
 Militia_Recce_Comp_desc: "Разведывательные роты ополчения действуют пешком. Для подразделений ополчения характерно меньшее количество тяжелого снаряжения и средств связи, чем у обычной пехоты. Разведывательные роты ополчения могут играть более значительную роль в разведке позиций противника на труднопроходимой местности, а также они недороги в производстве."
