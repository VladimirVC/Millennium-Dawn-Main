 the_great_chip_race_modifier: "The Great Chip Race"
 the_great_chip_race_modifier_desc: "We are in a race with China to maintain our superiority in microchip production. The trade benefits we derive from that advantage are indispensable to sustaining our alliances and our position in the world.\n\nAs PRC microchip production increases, Taiwan will gain increased $production_speed_microchip_plant_factor$ and increased $local_resources_microchips_factor$."
 tsmc_modifier: "Taiwan Semiconductor Manufacturing Company"
 tsmc_modifier_desc: "Taiwan's state-owned Semiconductor Manufacturing Company has led the global semiconductor industry for decades, setting the pace in production capacity, process-node research, and international expansion."
