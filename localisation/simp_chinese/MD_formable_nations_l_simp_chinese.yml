 form_AUSHUN_category: "重建奥匈帝国"
 form_AUSHUN_category_desc: "奥匈帝国是19世纪末20世纪初中欧的强国。在第一次世界大战中惨败后，这个国家解体了。它分裂为捷克、奥地利、匈牙利、斯洛伐克、斯洛文尼亚、波斯尼亚以及乌克兰、波兰和罗马尼亚的部分国家。是时候收回很久以前丢失的地位了。 开始重建奥匈帝国。"
 AUSHUN_integrate_start: "开始组建[GetAUSHUNNameDef]"
 AUSHUN_integrate_start_desc: "奥匈帝国的领土已被我们的军队收复，我们的政治家们已经开始着手管理这些新地区。\n\n"
 AUSHUN_integrate_AUS: "整合[GetAUSHUNNameAdj][AUS.GetAdjective]领土"
 AUSHUN_integrate_AUS_desc: "作为前哈布斯堡帝国的核心领土，奥地利理应成为我们国家的主要权力中心之一。"
 AUSHUN_integrate_HUN: "整合[GetAUSHUNNameAdj][HUN.GetAdjective]领土"
 AUSHUN_integrate_HUN_desc: "匈牙利王国是奥匈帝国的另一半，是帝国治理的伙伴。它的并入对于恢复帝国结构至关重要。"
 AUSHUN_integrate_SLV: "整合[GetAUSHUNNameAdj][SLV.GetAdjective]领土"
 AUSHUN_integrate_SLV_desc: "斯洛文尼亚的土地曾是奥地利王室领地的一部分，为奥地利提供了通往亚得里亚海的通道，并充当了奥地利和巴尔干半岛之间的桥梁。"
 AUSHUN_integrate_NORTHITA: "整合[GetAUSHUNNameAdj]北意大利领土"
 AUSHUN_integrate_NORTHITA_desc: "意大利的伦巴第-威尼托地区曾是哈布斯堡王朝的瑰宝，文化和商业都非常繁荣。它们的回归将恢复奥地利对波河谷的影响力。"
 AUSHUN_integrate_CRO: "整合[GetAUSHUNNameAdj][CRO.GetAdjective]领土"
 AUSHUN_integrate_CRO_desc: "克罗地亚是匈牙利王国的一部分，享有相当大的自治权。其港口和亚得里亚海沿岸的战略位置使其对帝国的海军力量至关重要。"
 AUSHUN_integrate_BOS: "整合[GetAUSHUNNameAdj][BOS.GetAdjective]领土"
 AUSHUN_integrate_BOS_desc: "波斯尼亚和黑塞哥维那自1878年起由奥匈帝国统治，并于1908年正式被吞并。波斯尼亚和黑塞哥维那的并入将确保我们的南部边界安全，并将我们的影响力扩展到巴尔干地区。"
 AUSHUN_integrate_SLO: "整合[GetAUSHUNNameAdj][SLO.GetAdjective]领土"
 AUSHUN_integrate_SLO_desc: "斯洛伐克领土曾是匈牙利王国不可分割的一部分，构成了王室北部山区的边境。重新纳入匈牙利版图将加强我们对喀尔巴阡山脉的控制。"
 AUSHUN_integrate_AUSROM: "整合[GetAUSHUNNameAdj]特兰西瓦尼亚领土"
 AUSHUN_integrate_AUSROM_desc: "特兰西瓦尼亚是匈牙利历史上的一块王室领地，罗马尼亚人和匈牙利人都曾争夺这片土地。控制该地区可以确保帝国东部通道的安全。"
 AUSHUN_integrate_CZE: "整合[GetAUSHUNNameAdj][CZE.GetAdjective]领土"
 AUSHUN_integrate_CZE_desc: "波西米亚王室领地是帝国工业化程度最高、文化最丰富的地区之一。布拉格曾是帝国的重要城市之一，它的重新整合至关重要。"
 AUSHUN_integrate_AUSPOL: "整合南波兰"
 AUSHUN_integrate_AUSPOL_desc: "加利西亚是帝国通过瓜分波兰而获得的一块王室领地，为帝国的北部边境带来了经济资源和战略纵深。"
 AUSHUN_integrate_WESTUKR: "整合乌克兰西南部"
 AUSHUN_integrate_WESTUKR_desc: "加利西亚东部地区曾是鲁塞尼亚人的聚居地，并拥有丰富的农业财富。他们的融入使我们的影响力扩展到了乌克兰边境地区。"
 AUSHUN_update_flag: "完成组建[GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "随着各个组成领土的整合，我们可以完成转型并宣布[GetAUSHUNNameDef]成立，采用其统一的旗帜和名称。"
 is_AUSHUN: "成立了[GetAUSHUNNameDef]"
 form_PBL_category: "秘鲁-玻利维亚联邦"
 form_PBL_category_desc: "秘鲁-玻利维亚联邦最初是 19 世纪初的一个短命实体。它源于秘鲁共和国的分裂以及 1834 年和 1835 年至 1836 年的内战，包括玻利维亚国。现代对它的讨论很少，但它仍然存在于玻利维亚和秘鲁人民的政治氛围中。是时候为我们的人民考虑这个新的明天了。"
 PBL_integrate_start: "开始组建[GetPBLNameDef]"
 PBL_integrate_start_desc: ""
 PBL_integrate_PRU: "整合[GetPBLNameAdj][PRU.GetAdjective]领土"
 PBL_integrate_PRU_desc: "秘鲁是联邦中两个民族国家中较大的一个。它保持着最大的人口、经济和土地面积。整合秘鲁是一项艰巨的任务，但为了新联邦的利益，夺取这个国家是一个坚实的举措。"
 PBL_integrate_BOL: "整合[GetPBLNameAdj][BOL.GetAdjective]领土"
 PBL_integrate_BOL_desc: "玻利维亚是建立联邦的两个主要民族国家之一。 它在土地面积、人口和经济实力方面是一个较小的国家； 然而，这不是诋毁这个国家的理由。 山区富含生产电子产品和其他中间产品必不可少的原材料。 整合这个国家巩固了我们现在多元化经济的另一个强大地位。"
 PBL_integrate_WESTPAR: "整合巴拉圭西部"
 PBL_integrate_WESTPAR_desc: "巴拉圭西部并不拥有与巴西西部或智利北部相同的原始资源。尽管如此，该地区仍拥有丰富的农田和地区，我们可以在其中发展我们新国家的工业。"
