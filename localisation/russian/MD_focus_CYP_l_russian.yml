l_russian:
 CYP_division_of_the_island: "Разделённый остров"
 CYP_division_of_the_island_desc: "«Зелёная линия» разрезает Кипр надвое. Северный Кипр остаётся под турецкой оккупацией, а власть Республики заканчивается у буферной зоны, контролируемой ООН. Нерешённый раздел истощает политическую волю и держит часть населения и территории вне досягаемости."
 CYP_eu_membership: "Государство — член ЕС"
 CYP_eu_membership_desc: "Кипр вступил в Европейский союз в 2004 году, получив доступ к единому рынку, структурным фондам и системе политической поддержки со стороны партнёров Никосии в Брюсселе. Членство определяет экономическую траекторию острова и его дипломатическую позицию."
 CYP_offshore_gas: "Месторождения газа в Восточном Средиземноморье"
 CYP_offshore_gas_desc: "Разведочные блоки в водах исключительной экономической зоны подтвердили наличие коммерчески выгодных запасов газа. Доходы от добычи и лицензионные соглашения приносят новый поток поступлений и осложняют отношения с Турцией, которая оспаривает часть зоны."
 CYP_financial_center: "Региональный финансовый центр"
 CYP_financial_center_desc: "Кипр приобрёл репутацию низконалоговой юрисдикции для холдинговых компаний, судовых регистров и международных потоков капитала. Сектор приносит значительный доход от услуг, но привлекает пристальное внимание к вопросам прозрачности."
 CYP_tourism_economy: "Экономика, движимая туризмом"
 CYP_tourism_economy_desc: "Солнце, побережье и древности ежегодно привлекают миллионы посетителей. Туризм является краеугольным камнем ВВП Кипра, поддерживая гостиничный бизнес и розничную торговлю, одновременно смягчая часть импортного давления, характерного для экономики с высоким уровнем потребления."
 CYP_foreign_investment_wave: "Привлечение иностранных инвестиций"
 CYP_foreign_investment_wave_desc: "Активная программа налоговых льгот, инвестиционных виз и двусторонних гарантий открыла короткое окно повышенных прямых иностранных инвестиций. Новый капитал поступает в сферу услуг, недвижимость и лёгкую промышленность."
 CYP_develop_offshore_gas: "Освоение морских газовых месторождений"
 CYP_develop_offshore_gas_desc: "Заказать изыскательские работы и заключить лицензионные контракты для ввода газовых блоков Восточного Средиземноморья в эксплуатацию. Инвестиции значительны, но успешное освоение обеспечит долгосрочный доход и укрепит претензии Кипра на свою исключительную экономическую зону."
 CYP_eu_accession_push: "Инициатива по углублению интеграции с ЕС"
 CYP_eu_accession_push_desc: "Кипр взаимодействует с Брюсселем и ключевыми государствами-членами по вопросу полного участия в интеграционных процессах ЕС: от кандидатства в Шенген до консолидации Еврозоны. Непрерывное лоббирование укрепляет добрую волю Греции и Европы к позиции Никосии в кипрском споре."
 CYP_bicommunal_talks: "Двухобщинные переговоры"
 CYP_bicommunal_talks_desc: "Пригласить представителей Северного Кипра к структурированному диалогу под эгидой ООН. Прогресс редко бывает значительным, но постоянные контакты оставляют путь к урегулированию открытым и сигнализируют Греции и Европе, что Никосия действует добросовестно."
 CYP_court_foreign_investment: "Привлекать иностранные инвестиции"
 CYP_court_foreign_investment_desc: "Предложить целевые стимулы иностранным компаниям, рассматривающим Кипр в качестве базы для своей деятельности. Первоначальный пакет требует затрат из казны, но успешное привлечение капитала повышает доходы сектора услуг и расширяет налоговую базу на ограниченный период."
 CYP_mobilize_greek_cypriots: "Сплотить греко-кипрскую общину"
 CYP_mobilize_greek_cypriots_desc: "Направить государственные ресурсы на гражданские объединения, Церковь и диаспору для укрепления поддержки республиканского видения будущего острова. Уверенная и организованная греко-кипрская община усиливает позиции Никосии в борьбе за будущее Кипра."
 CYP_outreach_to_north: "Протянуть руку через «Зелёную линию»"
 CYP_outreach_to_north_desc: "Финансировать межобщинные проекты, открытие торговли и негласные контакты с умеренными на севере. Каждый турок-киприот, привлечённый на сторону единого урегулирования под эгидой Никосии, подтачивает доводы в пользу постоянного раздела."
 NCY_mobilize_turkish_cypriots: "Сплотить турко-кипрскую общину"
 NCY_mobilize_turkish_cypriots_desc: "Мобилизовать институты Севера и поддержку Анкары, чтобы консолидировать турко-кипрскую общину вокруг существования отдельного государства. Единый Север труднее поглотить в рамках любого урегулирования под руководством греков."
 NCY_settler_program: "Программа анатолийского заселения"
 NCY_settler_program_desc: "Продолжить многолетнюю политику переселения семей из материковой Анатолии на Север. Демографический сдвиг укрепляет вес турок-киприотов на острове, хотя и усугубляет недовольство на Юге и вызывает международную критику."
 CYP_gain_8_strength_TT: "§HГреки-киприоты§! §GПОЛУЧАТ§! §H8 силы§!"
 CYP_reduce_north_TT: "§HТурки-киприоты§! §RПОТЕРЯЮТ§! §H6 силы§!"
 NCY_gain_8_strength_TT: "§HТурки-киприоты§! §GПОЛУЧАТ§! §H8 силы§!"
 NCY_settler_TT: "§HТурки-киприоты§! §GПОЛУЧАТ§! §H6 силы§!, а §Hгреки-киприоты§! §RПОТЕРЯЮТ§! §H4 силы§!"
 cyprus.1.t: "Подтверждено: запасы Восточного Средиземноморья коммерчески выгодны"
 cyprus.1.d: "Результаты изысканий получены. Бурение на блоке «Афродита» и прилегающих участках подтвердило запасы, достаточные для коммерческой добычи. Никосия оперативно завершает лицензионные контракты. Турция заявила свои возражения по дипломатическим каналам, однако правовая основа нашей исключительной экономической зоны прочна."
 cyprus.1.a: "Приступить к освоению."
 cyprus.2.t: "Двухобщинные переговоры: выбор подхода"
 cyprus.2.d: "Делегации греков-киприотов и турок-киприотов встретились в Никосии при содействии ООН. Атмосфера осторожная. У обеих сторон есть неразрешённые претензии, и ни одна не спешит идти на уступки. То, как мы поступим сейчас, определит следующий цикл переговоров."
 cyprus.2.a: "Вести конструктивный диалог и выдвинуть конкретные предложения на стол переговоров."
 cyprus.2.b: "Твёрдо держаться основных позиций и отказаться делать первый шаг."
 cyprus.3.t: "Кипр: более глубокое место за европейским столом"
 cyprus.3.d: "Кипрские официальные лица вернулись из Брюсселя с более прочной институциональной позицией, чем прежде. Партнёры по ЕС признали последовательную приверженность Никосии законодательству Евросоюза и её активное участие в европейских структурах. Положение острова в Брюсселе сейчас выше, чем когда-либо с момента вступления."
 cyprus.3.a: "Мы воспользуемся этим импульсом."
 cyprus.4.t: "«Зелёная линия»: инцидент в буферной зоне"
 cyprus.4.d: "Столкновение на одном из контрольно-пропускных пунктов буферной зоны переросло в небольшой дипломатический инцидент. Миротворческие силы ООН восстановили порядок, но обе стороны обмениваются обвинениями. Событие вновь разожгло дебаты в Никосии о том, как реагировать на провокации с Севера."
 cyprus.4.a: "Выступить с официальным публичным осуждением."
 cyprus.4.b: "Задействовать ООН, избегая публичности в прессе."