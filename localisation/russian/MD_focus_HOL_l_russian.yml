 HOL_royal_influence_church: "Восстановление протестантского господства"
 HOL_royal_influence_church_desc: "В условиях возрождения монархии корона восстанавливает свою власть над государственными институтами, в значительной степени разрушая плюралистическое влияние. Протестантская церковь возвращается к своей прежней центральной роли в общественной жизни, определяя нормы, образование и право."
 HOL_eindhoven_brainport_idea: "Мозговой Центр Эйндховена"
 HOL_eindhoven_brainport_idea_desc: "Эйндховенский Brainport — ведущий высокотехнологичный регион Нидерландов, известный своими инновациями и передовыми промышленными технологиями. Сосредоточенный вокруг Эйндховена, этот район является центром таких отраслей, как полупроводники, автомобильные технологии и робототехника. Здесь расположены глобальные компании, такие как ASML и Philips. Brainport Eindhoven вносит значительный вклад в экономический рост страны и укрепляет позиции Нидерландов как мирового лидера в области технологий и инноваций."
 HOL_brainport: "Мозговой Центр Эйндховена"
 HOL_brainport_desc: "Эйндховенский Brainport — ведущий высокотехнологичный регион Нидерландов, известный своими инновациями и передовыми промышленными технологиями. Сосредоточенный вокруг Эйндховена, этот район является центром таких отраслей, как полупроводники, автомобильные технологии и робототехника. Здесь расположены глобальные компании, такие как ASML и Philips. Brainport Eindhoven вносит значительный вклад в экономический рост страны и укрепляет позиции Нидерландов как мирового лидера в области технологий и инноваций."
