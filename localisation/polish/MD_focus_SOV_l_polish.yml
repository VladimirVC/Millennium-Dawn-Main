 S0V_russian_sphere_idea: "Układ Moskiewski"
 S0V_russian_sphere_idea_desc: "Sojusz stworzony przez Rosję, by zastąpić niepotrzebną i nieuzasadnioną Organizację Układu o Bezpieczeństwie Zbiorowym. Teraz Rosja jest gotowa zgromadzić wokół siebie sojuszników i stawić czoła swoim wrogom."
