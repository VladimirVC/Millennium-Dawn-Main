 UZB.liberalism: "£UZB_western_liberal (EDP) Erk Demokratik Partiyasi"
 UZB.liberalism_desc: "(National conservatism) - The Erk Democratic Party (Uzbek: Erk Demokratik Partiyasi)\n\nThe Erk Democratic Party is a political party in Uzbekistan formed in 1990 as a pro-independent party in the Soviet Union. It was the first registered political party in the history of Uzbekistan. Its charter was registered at the Ministry of Justice, Certificate of registration dated 3 September 1991, No. 039, which was signed by the minister of justice before the adoption of the law of Uzbekistan on political parties. The principal goals of activities, as written in the certificate on registration, are 'the foundation of the independent democratic republic for Uzbekistan.' Since 1993, its headquarters have been in Istanbul, Turkey."
 UZB.Western_Autocracy: "£UZB_western_autocracy (BKT) ビルダムリク"
 UZB.Western_Autocracy_desc: "経済自由主義 - ビルダムリク人民民主党（ウズベク語ローマ字表記：Birdamlik）\n\nビルダムリクは、ウズベキスタンを拠点とする政治団体である。同団体は、ポピュリスト的なレトリックを通じて、経済自由主義と非暴力抵抗を提唱してきた。"
 UZB.Neutral_conservatism: "£UZB_non_aligned_conservative (UzMTDP) Milliy Tiklanish Demokratik Partiyasi"
 UZB.Neutral_conservatism_desc: "(National conservatism) - Uzbekistan 'National Revival' Democratic Party (Uzbek: Milliy Tiklanish Demokratik Partiyasi)\n\nThe Uzbekistan 'National Revival' Democratic Party, simply known as Milliy Tiklanish, is a national-conservative political party in Uzbekistan. It is allied with the Liberal Democratic Party of Uzbekistan, the country's ruling party. The party was formed in 1995 with a largely intellectual membership and has a comparatively high proportion of female members. The party advocates a strong sense of Uzbek culture, desiring a cultural revival, whilst also seeking to build closer links with other states in Central Asia. The party opposes the influence of Russia in the region and attacked the foundation of the Eurasian Economic Community on this basis."
 UZB.oligarchism: "£UZB_non_aligned_oligarchism (ASDP) 公正社会民主党"
 UZB.oligarchism_desc: "社会民主主義 - 公正社会民主党（ウズベク語ローマ字表記：Adolat sotsial-demokratik partiyasi）\n\n公正社会民主党は、ウズベキスタンの政党である。初代書記長を務めたのは、創設者の一人でもあるアンヴァル・ジュラボエフである。同党は、与党であるウズベキスタン自由民主党に対して親政府的な野党として活動する4つの政党の一つである。"
 UZB.Neutral_Autocracy: "£UZB_non_aligned_autocracy (XDP) 人民民主党"
 UZB.Neutral_Autocracy_desc: "社会民主主義 - ウズベキスタン人民民主党（ウズベク語ローマ字表記：Xalq Demokratik Partiyasi）\n\nウズベキスタン人民民主党は、ウズベキスタンの政党である。1991年、ウズベキスタン共産党の法的後継組織として結成された。創設者のイスラム・カリモフの下、ウズベク・ソビエト社会主義共和国の解体とウズベキスタン共和国の樹立を主導した。1996年にカリモフが党を離党し、後にウズベキスタン自由民主党を結成したことで、与党の地位を失った。同党は社会民主主義および中道左派の政治を標榜しており、ウズベキスタン下院における主要な左派政党である。党規約において、同党は福祉国家における平等主義と規制された社会市場経済を提唱する一方、外交政策においては不干渉主義を支持している。主な支持層は、社会福祉に依存する人々、年金受給者、障害者、および労働者である。それにもかかわらず、同党は親政府系野党として活動する4つの政党の一つであり、自由民主党の結成以来、その役割を果たしてきた。"
 UZB.Neutral_green: "£UZB_non_aligned_greens (O'EP) 生態党"
 UZB.Neutral_green_desc: "環境保護主義 - 生態党（ウズベク語ローマ字表記：Ekologik partiyasi）\n\nウズベキスタン生態党は、ウズベキスタンにおける政党であり、環境保護運動である。"
 UZB.Nat_Autocracy: "£generic_Nat_Autocracy_small (UGF) ウズベキスタン陸軍"
 UZB.Nat_Autocracy_desc: "軍事政権 - ウズベキスタン陸軍（ウズベク語ローマ字表記：Quruqlik Qo'Shinlari）\n\nウズベキスタン陸軍は、ウズベキスタン共和国軍の陸上部隊である。1991年のソビエト連邦崩壊以降、ウズベキスタン領内に駐留していた旧ソ連軍の部隊を基盤として編成されている。"
 UZB.Nat_Populism: "£UZB_nationalist_right_wing_populist (UzLiDeP) 自由民主党"
 UZB.Nat_Populism_desc: "（権威主義） - ウズベキスタン自由民主党（ウズベク語ローマ字表記：Liberal Demokratik Partiyasi）\n\nウズベキスタン自由民主党（UzLiDeP）は、ウズベキスタンの政党であり、同国の与党である。ウズベキスタンの議会であるオリイ・マジリスに議席を持つ他の4党も、いずれも与党系である。中産階級や私有財産所有者、さらには実業家、農民、サービス業従事者を代表する政党として、同党は経済的自由主義と経済自由化を推進しており、外貨市場を自由化した実績を持つ。同党は名目上リベラルであり、自由民主主義的価値観を掲げている。"
 VEN.liberalism: "£VEN_western_liberal (VP) 大衆意思党"
 VEN.liberalism_desc: "大衆意思党（スペイン語：Voluntad Popular, VP）は、元チャカオ市長レオポルド・ロペスによって設立されたベネズエラの政党である。大衆意思党は自らを多元主義的かつ民主的な運動と位置づけ、進歩への取り組みを掲げている。同党が進歩と定義するのは、あらゆるベネズエラ国民の社会的・経済的・政治的権利ならびに人権の実現である。党は自らの基本理念として進歩、民主主義、社会行動を掲げている。"
 VEN.socialism: "£VEN_western_social_democrat (UNT) 新時代"
 VEN.socialism_desc: "新時代（スペイン語：Un Nuevo Tiempo, UNT）は中道左派の政党である。UNTは自らを進歩的かつ左派と位置付けている。同党は大統領権限の縮小を求め、選挙運動における公的資源の使用に反対している。また寛容な宗教や政治思想に対する寛容を信条とし、刑務所環境の改善と、より訓練され報酬の高い警察官で構成される治安部隊の創設を提唱している。UNTはまた、刑事裁判における被告人により有利な法改正を要求している。"
 VEN.Communist-State: "£VEN_emerging_communism (PCV) ベネズエラ共産党"
 VEN.Communist-State_desc: "ベネズエラ共産党（スペイン語：Partido Comunista de Venezuela, PCV）はベネズエラの共産党である。1931年に創設されたベネズエラで最も古い現役政党であり、1971年に対立する派閥に分裂するまで同国を代表する左派政党であった。"
 VEN.anarchist_communism: "£VEN_anarchist_communism (MVR) 第五共和国運動"
 VEN.anarchist_communism_desc: "第五共和国運動（スペイン語：Movimiento V República, MVR）はボリバル革命を掲げ、国内の貧困層の政治的代弁者であると主張した。MVRはまた、過激な反米主義とマルクス主義を追求した。"
 VEN.Neutral_conservatism: "£VEN_non_aligned_conservative 正義第一党"
 VEN.Neutral_conservatism_desc: "正義第一党（スペイン語：Primero Justicia）はベネズエラの中道右派政党である。1992年に市民団体として設立され、2000年に政党化した。アリリオ・アブレウ・ブレリ率いる大学生グループにより1992年に市民団体として創設された。このグループは、国内の司法権力の衰退を懸念し、ベネズエラの法制度改革を求めていた。"
 VEN.neutral_Social: "£VEN_neutral_Social (AD) 民主行動党"
 VEN.neutral_Social_desc: "民主行動党（スペイン語：Alianza Democrática, AD）は、今後の選挙（知事・市長選）への積極的な参加を通じて「選挙的・民主的・憲法上の」手段で第五共和国政府の退陣を実現し、その後リコール国民投票を実施することを目的としていた。"
 VEN.Neutral_Communism: "£VEN_Neutral_Communism (MRT) トゥパマロ革命運動"
 VEN.Neutral_Communism_desc: "トゥパマロ革命運動（スペイン語：Movimiento Revolucionario Tupamaro, MRT）は、極左マルクス・レーニン主義共産党であり、ベネズエラで最も著名なコレクティーボの一つである。"
 VEN.Neutral_green: "£VEN_Neutral_green ベネズエラ環境運動"
 VEN.Neutral_green_desc: "ベネズエラ環境運動（スペイン語：Movimiento Ecológico de Venezuela）は、ベネズエラ初の緑の党であり、グローバル・グリーンズ・ネットワークに正式加盟した最初の政党である。彼らは自らを「環境保護に尽力する環境保護主義者の市民組織」と定義し、その政治行動は「ベネズエラ国民が公正な社会において、自由かつ自然と調和して生きることを可能にする持続可能な開発の推進」に向けられている。"
