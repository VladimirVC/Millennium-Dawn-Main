 NKO_increase_agricultural_tax_desc: ""
 NKO_decrease_agricultural_tax: "Obniżenie stawek podatku rolnego"
 NKO_decrease_agricultural_tax_desc: "Obniżenie stawki podatku rolnego uczyniłoby rolników szczęśliwszymi, choć spowodowałoby również mniejsze dochody."
 NKO_market_economy_system_pilot: "Pilot systemu gospodarki rynkowej"
 NKO_market_economy_system_pilot_desc: "Musimy utworzyć kilka miast pilotażowych gospodarki rynkowej, takich jak Shenzhen i Szanghaj w Korei Północnej, aby przetestować, jak utrzymać stabilne funkcjonowanie rynku."
 NKO_national_ownership_reform: "Reforma własności narodowej"
 NKO_national_ownership_reform_desc: "Narodowy system własności stał się obecnie przeszkodą dla gospodarki, potrzebujemy odważnych reform!"
 NKO_complementary_to_state_owned_economy: "Uzupełnienie gospodarki państwowej"
