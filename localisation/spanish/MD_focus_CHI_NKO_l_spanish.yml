l_spanish:
 CHI_NKO_bilateral_cooperation: "Sino-DPRK Treaty of Friendship"
 CHI_NKO_bilateral_cooperation_desc: "The Treaty of Friendship, Cooperation and Mutual Assistance signed in 1961 between the PRC and the DPRK remains the only mutual defense treaty either nation holds. Reaffirming its commitments revitalizes a relationship that both Beijing and Pyongyang have allowed to cool, opening the door to structured cooperation across economic, military, and political domains."
 CHI_NKO_border_trade_zones: "Hwanggumpyong Economic Zone"
 CHI_NKO_border_trade_zones_desc: "Hwanggumpyong Island sits in the Yalu River between Sinuiju and Dandong. Jointly designated as a special economic zone in 2011, the project stalled due to political friction. Reviving Chinese investment in the Hwanggumpyong zone reestablishes the Yalu River corridor as the backbone of bilateral trade."
 CHI_NKO_rason_sez: "Rajin-Sonbong Free Trade Port"
 CHI_NKO_rason_sez_desc: "The Rason Special Economic Zone, formed by merging Rajin and Sonbong, gives China rare ice-free Pacific port access. Chinese investment develops Container Terminal 3 at Rajin Port, light manufacturing, and the road and rail links connecting the zone to the Chinese border at Tumen and Hunchun."
 CHI_NKO_dandong_trade_hub: "Sinuiju-Dandong Commerce Corridor"
 CHI_NKO_dandong_trade_hub_desc: "Dandong handles over 70% of all goods crossing the China-DPRK border. Expanding the Dandong customs and warehousing infrastructure, together with streamlined clearance at the Friendship Bridge, cements the city as the irreplaceable commercial spine of the bilateral relationship."
 CHI_NKO_mineral_extraction: "Musan Iron Ore Concessions"
 CHI_NKO_mineral_extraction_desc: "The Musan open-pit iron ore mine in North Hamgyong Province is one of the largest iron ore deposits in Asia. Chinese groups including CITIC and the Tonghua Iron and Steel Company have signed extraction contracts granting access in exchange for capital and infrastructure. The concessions extend to magnesite from South Hamgyong and anthracite from the Anju basin."
 CHI_NKO_fisheries_agreement: "West Korea Sea Fishing Compact"
 CHI_NKO_fisheries_agreement_desc: "North Korea has sold annual fishing licenses in the West Korea Sea to Chinese fleets operating in waters that Korean fishermen once depended on. Formalizing this into a bilateral compact provides Pyongyang with predictable licensing revenue while giving Chinese fishing companies legal cover for operations that have repeatedly prompted protests from Seoul and Tokyo."
 CHI_NKO_yuan_settlement: "Koryo Commercial Bank Accord"
 CHI_NKO_yuan_settlement_desc: "The Koryo Commercial Bank and the Bank of China Dandong branch have long handled the informal financial flows underlying bilateral trade. Establishing formal yuan-clearing arrangements eliminates the dollar exposure that subjects North Korean traders to secondary sanctions, embedding the DPRK economy more deeply into China's financial infrastructure."
 CHI_NKO_labor_export: "Dongbei Labor Dispatch Program"
 CHI_NKO_labor_export_desc: "State-organized labor dispatch sends tens of thousands of North Korean workers to factories, construction sites, and restaurants across Liaoning, Jilin, and Heilongjiang. Workers are recruited through government agencies and dispatched under contracts that remit the majority of wages directly to Pyongyang, making the Dongbei program a primary source of hard currency for the regime."
 CHI_NKO_yalu_river_bridge: "Sinuiju-Dandong Second Crossing"
 CHI_NKO_yalu_river_bridge_desc: "The New Yalu River Bridge, a four-lane span completed in 2014 at Chinese expense, connects Dandong's riverside development zone directly to Sinuiju's outskirts. Despite sitting unused for years without a connecting road on the North Korean side, opening the crossing transforms freight capacity on the most critical corridor on the border."
 CHI_NKO_energy_cooperation: "CNPC Dandong Oil Pipeline"
 CHI_NKO_energy_cooperation_desc: "China National Petroleum Corporation operates the only oil pipeline into North Korea, running from Dandong to the Ponghwa chemical complex near Sinuiju. China supplies virtually all of the DPRK's crude oil through this single artery, giving Beijing an unspoken lever over the North Korean economy. Expanding throughput and extending electricity exports from Liaoning secures North Korea's industrial base."
 CHI_NKO_telecom_network: "Koryolink 3G Rollout"
 CHI_NKO_telecom_network_desc: "Koryolink, North Korea's mobile network, was built with Egyptian Orascom investment but its equipment chains run heavily through Chinese suppliers. Expanding Chinese involvement through Huawei and ZTE hardware rolls 3G coverage beyond Pyongyang to provincial cities, while cross-border fiber links provide the DPRK government with a controlled but functional broadband backbone."
 CHI_NKO_power_grid_link: "Supung Hydroelectric Grid Link"
 CHI_NKO_power_grid_link_desc: "The Supung hydroelectric station on the Yalu River was built in the 1940s and has supplied electricity to both Liaoning and North Korea ever since. Rehabilitating the shared transmission infrastructure and formalizing the grid interconnection agreement stabilizes power supply to Pyongyang and the industrial north, enabling factory output to recover."
 CHI_NKO_paektu_tourism: "Paektusan-Changbaishan Corridor"
 CHI_NKO_paektu_tourism_desc: "Mt. Paektu, the volcanic peak straddling Ryanggang Province and Jilin, is simultaneously the sacred origin of the Kim dynasty's founding mythology and a major destination for Chinese tourists visiting Changbaishan. Developing integrated tourism infrastructure on both sides of the border captures Chinese visitor spending while giving Pyongyang a carefully curated window to the outside world."
 CHI_NKO_defense_consultations: "PLA-KPA General Staff Talks"
 CHI_NKO_defense_consultations_desc: "Formal channels between the PLA General Staff Department and the KPA General Political Bureau have existed since the Korean War but have frequently lapsed. Reestablishing regularized consultations at the vice-chief level creates a structured forum for sharing threat assessments, coordinating responses to US-ROK exercises, and preventing miscalculation along the border."
 CHI_NKO_military_exchanges: "National Defense University Exchange Program"
 CHI_NKO_military_exchanges_desc: "The PLA National Defense University in Beijing accepts DPRK officers for senior command courses, while Chinese military attaches gain greater access to KPA training facilities in return. The program builds a generation of North Korean commanders familiar with PLA doctrine and equipment, deepening interoperability and personal networks that outlast any single political agreement."
 CHI_NKO_joint_naval_patrols: "Yellow Sea Maritime Patrol Compact"
 CHI_NKO_joint_naval_patrols_desc: "The PLAN North Sea Fleet and KPA Naval Command coordinate patrol schedules in the Yellow Sea to address illegal transshipment, unauthorized fishing by third-party fleets, and US carrier group monitoring. A bilateral maritime communication hotline reduces the risk of incidents at sea and establishes China as North Korea's de facto naval guarantor."
 CHI_NKO_air_defense_umbrella: "Northeast Asia Air Defense Net"
 CHI_NKO_air_defense_umbrella_desc: "PLA Air Force radar stations in Liaoning and Jilin already observe the Korean Peninsula. Linking their early warning feeds to KPA Air Force command centers and sharing over-the-horizon detection data gives North Korea effective warning time against any US or South Korean air strike, without requiring Pyongyang to develop the infrastructure independently."
 CHI_NKO_arms_transfers: "KOMID Supply Contracts"
 CHI_NKO_arms_transfers_desc: "The Korea Mining Development Trading Corporation is the DPRK's primary arms procurement agency and has historically facilitated technology transfers from Chinese state defense enterprises. Formalizing supply contracts for artillery components, armored vehicle parts, and ammunition fills critical gaps in KPA readiness while providing Chinese defense firms with a low-visibility export customer."
 CHI_NKO_buffer_state_doctrine: "Lips and Teeth Doctrine"
 CHI_NKO_buffer_state_doctrine_desc: "The phrase as close as lips and teeth has described the China-DPRK relationship since the Korean War. Codifying this into formal strategic doctrine acknowledges that neither nation can accept the collapse or foreign alignment of the other. For Beijing, a North Korean buffer prevents US and ROK forces from reaching the Yalu. For Pyongyang, Chinese strategic backing remains the ultimate guarantee of regime survival."
 CHI_NKO_party_to_party_dialogue: "CPC-WPK Central Committee Accord"
 CHI_NKO_party_to_party_dialogue_desc: "Relations between the Chinese Communist Party and the Korean Workers' Party predate both states and have historically been conducted through party channels rather than diplomatic ones. Reviving the Central Committee liaison framework gives Beijing a direct line to the WPK Politburo that bypasses state-to-state formalities and allows sensitive discussions to occur without public record."
 CHI_NKO_cultural_exchanges: "Mansudae Arts Troupe Exchange"
 CHI_NKO_cultural_exchanges_desc: "The Mansudae Art Studio and its performance troupes represent the highest expression of DPRK revolutionary culture. Sending Mansudae ensembles to Beijing and Shanghai while Chinese film and opera delegations visit Pyongyang builds the public narrative of fraternal solidarity and provides the regime with propaganda footage of Chinese audiences celebrating Korean achievements."
 CHI_NKO_un_coordination: "UNSC Veto Shield Accord"
 CHI_NKO_un_coordination_desc: "China's permanent seat on the UN Security Council has repeatedly been used to water down or block resolutions targeting North Korea. Formalizing coordination between Chinese and North Korean diplomats at the UN ensures that Beijing's vetoes are deployed strategically to protect Pyongyang from the harshest measures while maintaining the appearance of constructive engagement."
 CHI_NKO_un_coordination_tt: "§Y[CHI.GetNameWithFlag]§! will veto every UN suggestion against §Y[NKO.GetNameWithFlag]§!"
 CHI_NKO_sanctions_circumvention: "Zokwang Front Company Network"
 CHI_NKO_sanctions_circumvention_desc: "Zokwang Trading and a network of affiliated shell companies registered in Dandong, Shenyang, and Hong Kong move sanctioned goods, process prohibited financial transfers, and facilitate the ship-to-ship crude oil transfers that sustain North Korea's fuel supply. Deepening Chinese toleration of this infrastructure provides Pyongyang with an indispensable lifeline, at the cost of exposing Chinese entities to US secondary sanctions."
 CHI_NKO_strategic_partnership: "Strategic Cooperative Partnership"
 CHI_NKO_strategic_partnership_desc: "Elevating the bilateral relationship to a Comprehensive Strategic Cooperative Partnership, the highest tier of Chinese diplomatic categorization, places the DPRK alongside Russia and Pakistan in the inner ring of Chinese strategic alignment. The declaration commits both parties to consultation on all major international questions and signals to Washington, Seoul, and Tokyo that Beijing regards North Korean security as inseparable from its own."
 CHI_nko_juche_production: "Mass Reserve Production"
 CHI_nko_juche_production_desc: "North Korean workers dispatched through the Dongbei labor program bring a distinct industrial discipline shaped by decades of Juche self-reliance doctrine: the ability to sustain high-volume output of simple, proven designs under minimal overhead. Integrating this workforce into NORINCO's Dandong-area subcontracting network reduces per-unit costs and expands production line capacity across the bureau's infantry equipment range."
 NKO_chi_manufacturing_assistance: "Chinese Manufacturing Standards"
 NKO_chi_manufacturing_assistance_desc: "Technical assistance from Chinese state defense enterprises, principally NORINCO subsidiaries operating through the Korea Mining Development Trading Corporation, has transferred standardized production tolerances, quality control procedures, and component specifications to the 1st Bureau's light weapons factories. The result is lower scrap rates, more consistent ballistic performance, and reduced unit costs across the bureau's small arms and crew-served weapons lines."
 CHI_NKO_border_trade_idea: "Hwanggumpyong Trade Zone"
 CHI_NKO_energy_supply_idea: "CNPC Fuel Supply Agreement"
 CHI_NKO_telecom_idea: "Koryolink Infrastructure Program"
 CHI_NKO_telecom_idea_desc: "A joint venture expanding Koryolink's mobile and data infrastructure, linking North Korean telecommunications to Chinese networks and improving communications across the border."
 CHI_NKO_shared_modifier: "[CHI.GetAdjectiveCap]-[NKO.GetAdjectiveCap] Relationship"
 CHI_NKO_shared_modifier_desc: "Tracks the accumulated depth of Sino-DPRK cooperation across economic, military, and political domains. Stronger ties improve agricultural and industrial output, trade relations, factory efficiency, and resource exports while bolstering army planning, organisation, and air defence; deeper alignment also expands intelligence capacity and raises Political Power and War Support as the two states coordinate more closely."
 CHI_eternal_allies: "Juche-Communist Alliance"
 CHI_NKO_telecom_network_tt: "[CHI_NKO_telecom_idea_desc]\n"