 investments_build_button_tt_1: "Investing in construction projects will increase your influence with the targeted country and provide investment income for your country.\n\n§YBoth the corruption level of the country and infrastructure level of the state will affect the total construction time. Construction has a default 35% increase in time, regardless of modifiers.§!\n\n§LIf the targeted country accepts your investment offer, at the end of the construction period they will gain the building.§!\nThe AI will deny investments if they have issues with the economy or their domestic influence is too low.\n\n[investment_cooldown]"
 investments_build_button_tt_delayed: "§YPrerequisites§!:\n[!investments_build_button_click_enabled]"
 investments_14_cooldown_tt: "If the country accepts it there will be a §Y14 day§! timer that begins on acceptance. You will not gain more influence regardless of how much money you dump into this nation during this cooldown period."
 investments_30_cooldown_tt: "If the country accepts it there will be a §Y30 day§! timer that begins on acceptance. You will not gain more influence regardless of how much money you dump into this nation during this cooldown period."
 investments_build_button_tt_2: "Cancel the active project (You can only make one investment in this state per day)."
 investments_build_button_tt_b: "Pressing this button will request a permission from the controller of the state. If they accept, a construction project will begin in your decisions tab. This project repeats until all the queued up buildings are completed.\n\n§YConstruction speed takes a -25% penalty on what it would normally be (your country's construction speed modifiers apply).§!\n\n§LYou can only have one active construction project at a time.\n\nA state cannot have a construction project active from multiple countries.\n\nThe controller of this state will refuse if it has a negative opinion of you.§!"
 investments_gain_tooltip: "[investments_gain_tooltip]"
 investments_event.1.t: "Investment Offer from [FROM.GetNameWithFlag]"
 investments_event.1.d: "[FROM.GetName] proposes to construct [?pending_offer_amount]x [investments_get_pending_offer_construction_type] in [?pending_offer_state.GetName].\n\nThe full project cost is estimated at $$[?pending_offer_total_cost] billion. It will take an estimated [?pending_offer_duration] days to complete this project. [FROM.GetName] is offering us a deal whereby we contribute 10% of the construction sum. The [FROM.GetNameWithFlag] will potentially gain influence from this work. [FROM.GetNameWithFlag] will profit from this project.\n\n\nDays to Complete: [?pending_offer_duration]\nTotal Project Cost([FROM.GetNameWithFlag]): $$[?pending_offer_total_cost] Billion\nBuilding Type: [investments_get_pending_offer_construction_type]\nInvestee Cost ([THIS.GetNameWithFlag]): $$[?investor_cost]\nLocation: [?pending_offer_state.GetName]"
 investments_event.1.o1: "Accept the Offer"
 investments_event.1.o2: "Decline the Offer"
 investments_event.2.t: "Construction Permission Refused"
 investments_event.2.d: "We have received a decline from our potential new investment partner. It is unbelievable that they would refuse our project! It isn't like we would gain any influence or control over their government by helping develop their nations! Oh well, the investment deal with [FROM.GetName] has fallen through in [?ROOT.investments_state_target.GetName], so we might as well send someone else an investment deal."
 investments_event.2.o1: "Maybe their neighbor..."
 investments_event.3.t: "Construction Project Cancelled"
 investments_event.3.d: "Unfortunately, we could not complete our investment deal with our friends in [FROM.GetName]. There are many potential reasons for this, whether it be relations with the government, a lack of funding, or maybe just a general lack of interest from the local people. We can always try some other time."
 investments_event.3.o1: "Their loss!"
 investments_build_cost_tt: "§YForeign Investment Cost§!\n\n§YForeign Investment Cost§! §gis the upfront cost of the project we are considering starting. It is directly taken from our nation's treasury and added to our§! §YInternational Investments§! §gupon acceptance of the project.§!\n\n§gIf you just clicked from another country or state make sure you up the building amount or click another building to update the tooltip to see true cost.§!\n\n§gCorruption, national spirits and more can effect the cost of the investment project. The investee nation's corruption will increase the cost of the project based on their corruption level.§!\n"
 investments_build_cost_tt_delayed: "Modifiers:\n§YCost to Invest in [PREV.CONTROLLER.GetNamewithFlag]:§! [?ROOT.displayable_monetary_cost_modifier|%0-] \n"
 investments_clock_tt: "§YTime to Complete Investment:§! [?ROOT.project_total_construction_duration_display^-1] Days\n\n§YTime to Complete Investment§! §gor the duration of the project is simply a total of the time it will take to complete our proposed project in [PREV.GetName]. The more buildings you are offering to §Y[PREV.CONTROLLER.GetNamewithFlag]§! the longer the project.§!\n\n§gIf you just clicked from another country or state make sure you up the building amount or click another building to update the tooltip to see true cost.§!\n"
