 BRA_pro_bolsonaro_parties_tt: "¡El §Y[Nat_Populism_L]§!, el §Y[Conservative_L]§!, el §Y[Monarchist_L]§! y el §Y[Nat_Autocracy_L]§! obtienen un impulso en su §GPopularidad§!\n"
