 NKO_social_security: "社会安全省"
 NKO_social_security_desc: "社会安全省（或称人民保安省）是朝鲜的内务部和主要执法机构。该部门作为官方的公安和国家安全力量，负责维护公共秩序与保护包括铁路和其他交通工具在内的重要设施。"
 NKO_security_forces: "社会安全军"
 NKO_security_forces_desc: "社会安全军是一支朝鲜准军事部队，执行各种国内和边境安全任务。"
 NKO_railway_bureau: "铁路保安局"
 NKO_railway_bureau_desc: "铁路保安局 - 保卫朝鲜境内重要的交通运输通道"
 NKO_finacial_bureau: "金融情报局"
 NKO_finacial_bureau_desc: "金融情报局 - 打击洗钱、敲诈与其他金融犯罪"
 NKO_corrections_bureau: "教化局"
 NKO_corrections_bureau_desc: "教化局负责管理朝鲜残酷的监狱系统"
 NKO_social_security_forces_idea: "社会安全军"
 NKO_social_security_idea: "社会安全省"
 NKO_black_market: "三楼"
 NKO_black_market_desc: "三楼是朝鲜劳动党中央书记处下属三个局的统称。三十五局、三十八局、三十九局与私人秘书处协同，负责收集情报、为党和核心精英赚取外汇、管理党和金氏家族的部分资金。三楼的特工驻扎在全球20多个国家，还负责为朝鲜精英阶层采购各类商品，并在朝鲜专用信息网络之外收集情报。三楼是指这些办公室的原始位置——位于平壤中区朝鲜劳动党中央委员会办公大楼金正日办公楼的三楼。三楼从技术上讲隶属于党中央委员会，但实际上直接听命于金氏家族。"
