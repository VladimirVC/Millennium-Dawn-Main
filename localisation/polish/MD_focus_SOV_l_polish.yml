 Sov_warsaw_pact.7.t: "Referendum w sprawie zjednoczenia w jeden kraj"
 Sov_warsaw_pact.7.d: "Narody Czech i Słowacji nie zapomniały, jak niedawno ich przywódcy oszukali ich, dzieląc kraj bez ostrzeżenia. Teraz nadarza się okazja, by naprawić ten historyczny błąd i ponownie zjednoczyć się jako jeden silny naród. Rosja będzie pełnić rolę neutralnego mediatora, aby zapewnić uczciwy i bezpieczny proces referendalny."
 Sov_warsaw_pact.7.a: "Czas się zjednoczyć!"
 SOV_United_Network_of_Warsaw_Pact_Laboratories: "Zjednoczona Sieć Laboratoriów Układu Warszawskiego"
 SOV_Joint_research_on_armor_and_infantry: "Wspólne badania w dziedzinie broni pancernej i piechoty"
 SOV_Joint_aviation_research: "Wspólne badania lotnicze"
 SOV_joint_research_ttip: "§RTe bonusy można wykorzystać tylko raz i dotyczą wyłącznie krajów Układu Warszawskiego. Kraje spoza historycznego Układu Warszawskiego nie otrzymują tych bonusów. Korzystaj z nich tylko wtedy, gdy masz pewność, że wszyscy twoi sojusznicy są członkami Układu, ponieważ tylko oni z nich korzystają.§!"
 SOV_warsaw_influence_close: "Zamknij decyzje w sprawie rewolucji w §Y[BUL.GetNameWithFlag]§!"
 SOV_warsaw_influence_close1: "Zamknij decyzje w sprawie rewolucji w §Y[ROM.GetNameWithFlag]§!"
