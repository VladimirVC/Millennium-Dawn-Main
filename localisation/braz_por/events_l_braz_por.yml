 war_justification.210.a: "[FROM.GetName] is a dubious democracy anyway, pursuing such aggressive action."
 war_justification.211.t: "[FROM.GetLeader] Speaks Against Red Menace"
 war_justification.211.d: "'Without a doubt, [Root.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [Root.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe nascent worker's movement has intimidated [FROM.GetAdjective] leaders. While representatives in their opposition have called this a Red Scare aimed at pursuing war with us, the rhetoric of the [FROM.GetRulingParty] has been highly successful so far."
 war_justification.211.a: "Enquanto houver lucro a ser feito, os capitalistas fabricarão uma guerra."
 war_justification.212.t: "[FROM.GetLeader] Confronts [Root.GetAdjective] Fascism"
 war_justification.212.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [Root.GetRulingParty] now holds [Root.GetName]. People may argue that we should not provoke conflict, that we should trust [Root.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nJealous of the glorious society we are building and the legacy it is founded upon, the [FROM.GetAdjective] seem prepared to start a war to destroy it. So much for their pretensions of peace."
 war_justification.212.a: "Inevitável. Melhor que acabe logo."
 war_justification.213.t: "[FROM.GetLeader] Calls for War Against [Root.GetName]"
 war_justification.213.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [Root.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\nIn a recent speech to the [FROM.GetAdjective] people the hostile rhetoric towards [Root.GetName] has intensified and [FROM.GetLeader] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of their leader."
 war_justification.213.a: "Eles vão se arrepender de nos tornar seu inimigo."
 war_justification.214.t: "[FROM.GetLeader] Challenges [Root.GetAdjective] Pretensions"
 war_justification.214.d: "'[Root.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [Root.GetName] long held by the [FROM.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [Root.GetAdjective] people want to avoid war, [FROM.GetLeader] claims that our elected leaders have provoked it through their arrogance."
 war_justification.214.a: "The voices for peace among the [FROM.GetAdjective] people are, of course, silenced."
 war_justification.215.t: "[FROM.GetLeader] Wants to Restore Order in [Root.GetName]"
 war_justification.215.d: "'The [FROM.GetAdjective] national spirit is strong, but not all nations are so fortunate. [Root.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [FROM.GetName] against this threat.'\n\nWhile the [FROM.GetRulingParty] has always opposed communism, [Root.GetName] has been a target of particular attacks in recent speeches. Fearing their nation's inevitable progress to the next stage of history, a preemptive attack on [Root.GetAdjective] communism is already in the works."
 war_justification.215.a: "É tarde demais para reverter o progresso que fizemos."
 war_justification.216.t: "[FROM.GetLeader] Calls Out [Root.GetAdjective] Oppressors"
 war_justification.216.d: "'My opponents would have you believe that my rule is like that of the [Root.GetRulingParty] in [Root.GetName]. They could not be more wrong. While [Root.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [FROM.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [FROM.GetLeader] regime has adopted a hostile policy towards the [Root.GetAdjective] nation. Our visionary plans for future greatness have put their nation to shame, and unsurprisingly, they feel threatened."
 war_justification.216.a: "Se eles querem testar nosso poder, irão se arrepender."
 war_justification.217.t: "[FROM.GetLeader] Questions [Root.GetAdjective] Sovereignty"
 war_justification.217.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [FROM.GetName] ends and [Root.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [FROM.GetLeader]'s recent speeches, an invasion of [Root.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.217.a: "O mundo não aprendeu nada com a Grande Guerra?"
 war_justification.218.t: "[FROM.GetLeader] Questions the Motives of [Root.GetName]"
 war_justification.218.d: "'There is no doubt that [Root.GetName] is preparing for war. The changes in economic policy make it plain to see that the [Root.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [FROM.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [FROM.GetRulingParty] have turned their eyes towards [Root.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [FROM.GetName] is preparing for war."
 war_justification.218.a: "Por isso que precisamos estar prontos."
 war_justification.219.t: "[FROM.GetLeader] Angered by [Root.GetAdjective] Posturing"
 war_justification.219.d: "'Those naïve citizens of [FROM.GetName] who imagine the [Root.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [Root.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nOur military presence close to [FROM.GetAdjective] territory has sparked increased concern, since they interpret our troop movements as proof hostile intent. They hardly seem to have considered that their aggressive rhetoric is the reason for our defensive measures."
 war_justification.219.a: "Mal podemos nos desarmar após essas ameaças."
 war_justification.220.t: "[FROM.GetLeader] Advocates Invasion of [Root.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [Root.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [FROM.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [FROM.GetRulingParty] leaders, most prominently [FROM.GetLeader], has been calling the public to support an invasion of [Root.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "Melhor nos prepararmos. A guerra virá."
 war_justification.301.t: "[Root.GetLeader] Criticado por Política Externa Fraca"
 war_justification.301.d: "'Tivemos a chance de atacar nossos inimigos, mas o [Root.GetRulingParty] deixou essa oportunidade passar. Isso não apenas é mais um caso condenável em uma série de oportunidades perdidas para fortalecer a posição de [Root.GetName] internacionalmente, é um sinal de que a afirmação de que agem no interesse do povo [Root.GetAdjective] é principalmente retórica vazia. É hora de mudar a política.'\n\nNosso fracasso em prosseguir com a guerra, que muitos esperavam, tem sido alvo de críticas severas de nossos oponentes políticos. Não seguir adiante com nossos planos militares tornará mais difícil convencer as pessoas para qual direção estamos levando [Root.GetName]."
 war_justification.301.a: "Eles não querem evitar a guerra?"
 war_justification.301.b: "Não há espaço para discordância pública fora das reuniões do partido."
 war_justification.301.c: "Não podemos permitir que acusem [Root.GetLeader] de covardia!"
 nuke_dropped.1.t: "Atomic Bombing of [FROM.FROM.GetName]"
 nuke_dropped.1.d: "For the first and hopefully last time in history, a nuclear bomb has been detonated in [FROM.FROM.GetName] as part of international warfare. The unprecedented destruction stands as a testament to the devastating power of this new weapon, which is feared not only for what it can do to its targets, but what implications it has for the one who deploys it and for humanity itself.\n\nThe world holds its breath waiting for what will come next. Will this force [FROM.FROM.Owner.GetName] to surrender to avoid further terror, or will it only strengthen their resolve to strike back against those who would resort to such measures?"
 nuke_dropped.1.a: "A Era Atômica realmente começou."
 nuke_dropped.1.b: "Faremos o que for necessário para proteger o povo [Root.GetAdjective]."
 nuke_dropped.2.t: "Bombardeio Atômico de Hiroshima"
 nuke_dropped.2.d: "\"As ruas eram como uma cena do inferno.\"\n - Kuniyoshi Aikawa\n\nHoje, uma bomba nuclear foi detonada sobre a cidade de Hiroshima a uma altitude de 580 metros. Mais de dois terços da cidade foram instantaneamente destruídos. Apesar de a cidade ter sido construída para resistir a terremotos, apenas algumas estruturas robustas sobreviveram à explosão.\n\nEnquanto o poder da bomba atômica tem sido exagerado na mente pública, o custo humano da arma tem sido minimizado. Nenhuma das partes quer contemplar o horror do evento, mas seu legado será de vidas perdidas num piscar de olhos e consequências duradouras."
 nuke_dropped.2.a: "Quantos mais cairão antes que essa guerra acabe?"
 nuke_dropped.2.b: "Devemos agir rapidamente para ajudar as vítimas."
 nuke_dropped.3.t: "Bombardeio Atômico de Nagasaki"
 nuke_dropped.3.d: "Uma bomba nuclear, originalmente destinada a Kokura, foi detonada hoje sobre Nagasaki. Condições climáticas forçaram os aviões a desviar sua missão, uma combinação de fumaça, nuvens e dificuldades técnicas sendo fatores decisivos em um evento que pode mudar a história.\n\nOs efeitos da bomba foram contidos em parte pela localização da cidade em um vale, mas os danos ainda são graves. Algumas instalações militares foram atingidas, mas as perdas catastróficas de civis as superam de longe. Pode levar décadas até que saibamos os efeitos a longo prazo dessa arma com certeza."
 nuke_dropped.3.a: "Will this lead to [FROM.Owner.GetAdjective] surrender?"
 nuke_dropped.3.b: "Esperávamos que Nagasaki fosse poupada."
 nuke_dropped.4.t: "Bombardeio Atômico de Berlim"
 nuke_dropped.4.d: "Today, at [GetDateText], the German capital of Berlin was struck by a nuclear explosion. The city has suffered several attacks, in this war and the last, but all else pale in comparison to this. Not since the Thirty Years' War has Berlin seen comparable devastation - considering its growth, this was seen as an impossibility.\n\nThe Führerbunker appears to have survived the blast at least partially due to the bomb detonating away from its planned epicenter, and [FROM.Owner.GetLeader] is rumored to still be alive, if outraged. How [FROM.Owner.GetAdjective] leaders should be evacuated and if they can be protected from the fallout is another matter, however."
 nuke_dropped.4.a: "Hoje, estou aliviado por não ser berlinense."
 nuke_dropped.4.b: "Nossos inimigos atacaram o coração da nação!"
 nuke_dropped.5.t: "Bombardeio Atômico de Londres"
 nuke_dropped.5.d: "A nuclear explosion has devastated the city of London today. Despite the city's anti-air defenses, [FROM.Owner.GetName] was not prepared for this attack. At [GetDateText], Big Ben chimed for the last time, having been melted by the blast. Early reports suggest Buckingham Palace has been completely leveled and the whereabouts of the royal family are currently unknown.\n\n[FROM.Owner.GetLeader] has nevertheless been confirmed to have survived and is preparing a rousing speech for the radio later today. With morale at an all-time low, the British people is in dire need of this - or a very eloquent surrender."
 nuke_dropped.5.a: "É difícil manter a compostura diante de uma onda de explosão nuclear."
 nuke_dropped.5.b: "Deus salve o Rei!"
 nuke_dropped.6.t: "Bombardeio Atômico de Kyoto"
 nuke_dropped.6.d: "The city of Kyoto, a prominent [FROM.Owner.GetAdjective] industrial center, was struck today by a nuclear bomb. It is speculated that the city was chosen as a target because it has been regarded as an intellectual center.\n\nThe beauty and historical significance of the Kyoto led many to assume it would be spared from the bomb, but it appears the terror of raining destruction on such a place has rather been seen as a benefit, increasing the psychological impact of the attack. The city's location in the valley somewhat limited the blast, but the old Imperial Palace and many industrial buildings have been completely destroyed."
 nuke_dropped.6.a: "Legado e beleza não significam nada em uma guerra como esta."
 nuke_dropped.6.b: "Se eles destruírem o antigo, construiremos o novo."
 nuke_dropped.7.t: "Bombardeio Atômico de Tóquio"
 nuke_dropped.7.d: "Today, a nuclear strike was directed at the heart of the Japanese Empire. The capital of Tokyo, although expected to be the target of firebombing, was never assumed to be a prioritized target of this new weapon. Yet ultimately, perhaps due to the significance of the new capital and Imperial Palace which has now been destroyed, an even more all-consuming fire has fallen on the city.\n\nAlthough [FROM.Owner.GetLeader] is reported to have survived, the event has raised questions about how far Japan's enemies are willing to go. If the war does not end with this, what targets remain? What is left to threaten with?"
 nuke_dropped.7.a: "Isso significa o fim do Império Japonês?"
 nuke_dropped.7.b: "As long as [FROM.Owner.GetLeader] lives, so does the Empire."
 nuke_dropped.8.t: "Bombardeio Atômico de Washington D.C."
 nuke_dropped.8.d: "A nuclear bomb was detonated today over the capital of the United States. In an attack clearly directed at the political center and historical legacy of the US, the White House, the Capitol and a number of monuments and memorials were wiped off the face of the Earth. Even the Burning of Washington over a century ago pales in comparison to the destruction visited upon the city by this devastating weapon.\n\nAlthough President [FROM.Owner.GetLeader] has been brought to safety, the nation has been shaken to its core. No doubt, the US hoped to be the first and only country to wield such a weapon. Those hopes have now been shattered in the worst possible way."
 nuke_dropped.8.a: "Uma nação, indivisível, contra um átomo, divisível."
 nuke_dropped.8.b: "A águia surgirá das cinzas como uma fênix."
 nuke_dropped.9.t: "Bombardeio Atômico de Roma"
 nuke_dropped.9.d: "Uma explosão nuclear atingiu a cidade de Roma hoje, chocando pessoas ao redor do mundo. Devido a seus tesouros históricos e artísticos, muitos nunca pensaram que a antiga cidade seria alvo de uma destruição tão indiscriminada. Com a Cidade do Vaticano também parcialmente destruída e o paradeiro do Papa desconhecido, o evento horrorizou não apenas os italianos, mas também católicos em todo o mundo.\n\nO crescimento rápido de Roma na última década foi quase completamente desfeito pelo ataque. Por um tempo, parecia que a cidade poderia auxiliar a recuperação da nação após o fim da guerra. Essas esperanças agora se transformaram em pó, junto com muitas pessoas."
 nuke_dropped.9.a: "A sorte está lançada!"
 nuke_dropped.9.b: "Roma não será reconstruída em um dia..."
 nuke_dropped.10.t: "Bombardeio Atômico de Paris"
 nuke_dropped.10.d: "Hoje, um dispositivo nuclear foi detonado sobre a cidade de Paris, causando destruição generalizada e inúmeras vítimas. A França ficou chocada, pois sua capital sofreu o que pode ser o ataque mais devastador que já experimentou, apesar de séculos de guerras e revoluções. Os parisienses talvez esperassem a conquista, mas não a completa e brutal desolação.\n\nParadas de vitória na Champs-Élysées, passando pelos restos do Arco do Triunfo, parecem improváveis no estado atual da cidade. Talvez nas próximas décadas surja uma nova Paris, mas a Paris da mente pública, a cidade construída na Belle Époque, desapareceu para sempre."
 nuke_dropped.10.a: "A cidade luz se apagou."
 nuke_dropped.10.b: "Apenas ontem, parecia que sempre teríamos Paris."
 nuke_dropped.11.t: "Bombardeio Atômico de Moscou"
 nuke_dropped.11.d: "A city many have tried and failed to conquer, Moscow was the target of a nuclear attack today. The explosion was directed at the heart of [FROM.Owner.GetAdjective] leadership, the Kremlin having been nearly completely destroyed by the blast.\n\n[FROM.Owner.GetLeader], having grown more aware and fearful of all possible and impossible threats recently, evacuated in time and survived. However, even the vastness of [FROM.Owner.GetName] may not be enough to escape such a ruthless enemy. Indeed, if this continues, the nation will soon consist only of two kinds of wastelands: Those which were there in the first place, and those created by its enemies."
 nuke_dropped.11.a: "Será que um inverno nuclear só tornará Moscou um alvo mais difícil?"
 nuke_dropped.11.b: "Eles podem queimar todas as cidades que temos, mas nunca as tomarão."
 nuke_dropped.12.t: "Bombardeio Atômico de Copenhague"
 nuke_dropped.12.d: "Hoje, a cidade de Copenhague foi atingida por uma explosão nuclear. Tendo crescido após escapar da destruição na Grande Guerra graças à neutralidade da Dinamarca, a capital nunca experimentou um ataque tão devastador desde as Guerras Napoleônicas. A área circundante do Øresund também foi afetada pela chuva radioativa, e os sobreviventes começaram a escapar para Fyn e o continente com medo de mais ataques.\n\nO paradeiro do Rei Christian X é atualmente desconhecido, e a moral da nação foi gravemente abalada pelo ataque. Resta saber se esse é o começo do fim de uma das nações mais antigas da Europa."
 nuke_dropped.12.a: "Algo está irradiado no estado da Dinamarca."
 nuke_dropped.12.b: "A cidade já queimou antes, mas não pereceu."
 nuke_dropped.12.c: "Com plutônio, colocamos os dinamarqueses de joelhos!"
 nuke_dropped.13.t: "Bombardeio Atômico de Estocolmo"
 nuke_dropped.13.d: "A bela cidade de Estocolmo, orgulhosa Veneza do Norte, foi atingida hoje por uma bomba nuclear. Apesar de seus melhores esforços para permanecer neutra no passado, os suecos agora pagaram o preço final pelo conflito internacional. O epicentro da explosão foi no meio de Estocolmo, uma área planejada para desenvolvimento futuro e grandes projetos de construção, agora irreversivelmente destruída.\n\nMuito da cidade está irreconhecível, mas as estruturas antigas de Slussen parecem ter sobrevivido melhor do que o esperado. Decidiu-se que elas permanecerão intocadas para sempre como um monumento à resiliência da cidade."
 nuke_dropped.13.a: "Com isso, a neutralidade sueca será apenas uma lembrança."
 nuke_dropped.13.b: "O tigre sueco não perderá suas listras!"
 country_capitulated.0.t: "[Root.GetName] capitulou"
 country_capitulated.0.d_positive_both_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war continues elsewhere, this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for all of the [FROM.FROM.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nDespite this devastating loss the war against [FROM.FROM.GetName] is far from over."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] and the rest of the [FROM.FROM.GetFactionName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nAlthough the struggles between [FROM.FROM.GetName] and [Root.GetName] are over, [FROM.FROM.GetName] is still at all-out war, and the fighting continues elsewhere."
 country_capitulated.0.d_neutral_prev_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles in [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.d_neutral_prev_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles between [FROM.FROM.GetName] and [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetFactionName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.a: "Ótimas notícias"
 country_capitulated.0.b: "Estes são tempos sombrios"
 country_capitulated.0.c: "Tempos incertos"
 GAME_OVER_TT: "§RA partida terminará para você.§!"
 CAN_ANGERED_WORKERS: "Isso deixará a população irritada"
 excellent: "Excelente."
 unfortunate: "Infeliz"
 news.1.t: "O Acordo de Livre Comércio [fta_inviter.GetNameDef]-[fta_applicant.GetName]"
 news.1.d: "Hoje, [fta_inviter.GetNameDef] e [fta_applicant.GetNameDef] assinaram um tratado de livre comércio e investimento para fortalecer a cooperação econômica entre os dois países."
 news.1.a: "Ok"
 news.2.t: "O Tratado de Cooperação Militar [mct_inviter.GetNameDef]-[mct_applicant.GetName]"
 news.2.d: "Hoje, [mct_inviter.GetNameDef] e [mct_applicant.GetNameDef] assinaram um tratado de cooperação militar, fortalecendo seus laços militares."
 news.2.a: "Ok"
 news.3.t: "Bombardeio do USS Cole"
 news.3.d: "O Comando Naval dos Estados Unidos informou que o destróier USS Cole foi atacado pela rede Al-Qaeda, matando 17 militares americanos. Relatórios de inteligência dos EUA apontam para o governo do Sudão como um possível apoiador dos dois atacantes."
 news.3.a: "Eles vão se arrepender disso."
 news.3.b: "Envie nossas condolências aos americanos."
 news.3.c: "Americanos mortos? Bom."
 news.3.e: "Eles estão nos culpando?!"
 news.4.t: "[FROM.GetName] leaves the European Union"
 news.4.d: "Today the [FROM.GetAdjective] delegation to the European Parliament left the buildings in Brussels for what might be the last time. Article 50 has been fulfilled and pulled through, the treaties with the EU partners reset to ones of usual international partnership. [FROM.GetName] has left the European Union."
 news.4.a: "Ok"
 news.5.t: "Preparando a União"
 news.5.d: "[FROM.GetName] has begun the process of preparing legislation to unite the European Union under [FROM.GetAdjective] leadership. The European Parliament has much to discuss in the coming days."
 news.5.a: "Uma Endeavour Interessante."
 news.82.t: "Japão se retira"
 news.82.desc: "Depois que o Japão tentou unificar a península coreana sob a Coreia do Sul, invadindo a Coreia do Norte, o governo chinês interveio na missão japonesa. O Japão, ao receber essas notícias, recua e deixa a missão de unificação para trás."
 news.82.a: "Teríamos perdido de qualquer maneira!"
 news.82.b: "A China é realmente tão poderosa!"
 influence.1.t: "Offer Economic Aid to [FROM.GetName]?"
 influence.1.d: "Decidimos começar a elaborar um pacote de Auxílio Econômico. Podemos decidir enviar 5%, 10% ou 15% do PIB do nosso país como auxílio. Essa generosidade melhorará as relações e nos dará influência em [FROM.GetName], embora não haja garantia de que eles usarão o auxílio econômico em algo de valor. Quanto mais doarmos, mais influência ganharemos.\n\n"
 influence.1.a: "Envie 5% do PIB como Ajuda Econômica."
 influence.1.b: "Envie 10% do PIB como Ajuda Econômica."
 News_influence.0.t: "Economic aid given by [FROM.GetName]!"
 News_influence.0.d: "We have been given $$[?gift_sum] billion in immediate economic aid by [FROM.GetName]. This has strengthened [Root.GetAdjective]-[FROM.GetAdjective] Relations, and while the gift officially came without preconditions, it is understood to have strengthened their influence in our country."
 News_influence.0.a: "Maravilhoso"
 News_influence.0.b: "Rejeitar a ajuda."
 influence.3.t: "Visar outro influenciador em [FROM.GetName]?"
 influence.3.d: "Qual dos influenciadores de [FROM.GetNameWithFlag] devemos visar ou devemos visar a independência deles em relação ao país?\n"
 influence.3.a: "Visar a Independência Nacional de [FROM.GetNameWithFlag]."
 influence.3.b: "Visar [?var:FROM.influence_array^0.GetNameWithFlag]."
 influence.3.c: "Visar [?var:FROM.influence_array^1.GetNameWithFlag]."
 influence.3.e: "Visar [?var:FROM.influence_array^2.GetNameWithFlag]."
 influence.3.f: "Recuar."
 News_influence.1.t: "[FROM.GetNameWithFlag] attacks our influence in [FROM.FROM.GetNameWithFlag]!"
 News_influence.1.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our ambitions in [FROM.FROM.GetName]. Singleing us out, their attack on our business and governmental interests have lowered our influence in [FROM.FROM.GetNameWithFlag]."
 News_influence.1.a: "Damn you, [FROM.GetLeader]!"
 News_influence.2.t: "[FROM.GetNameWithFlag] attacks our independence from foreign influence!"
 News_influence.2.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our aspirations to keep foreign meddling out, and weakened our sovereignty. Our independence from foreign influence has been reduced."
 News_influence.2.a: "Not cool, [FROM.GetLeader]!"
 influence.5.t: "Launch Coup in [FROM.GetNameWithFlag]?"
 influence.5.d: "Dear [Root.GetLeader], we in the [Root.GetAdjective] Intelligence Services cannot confirm or deny whether [FROM.GetName] is conducive to a coup.\n\nHowever, we have, to the best of our ability, drawn up probabilities of outcomes. These are based on:\n - How big our influence is\n - How popular our outlook is\n - The popularity and stability of the government\n - Which other influential countries are likely to back us\n - Which influential countries are likely to back their current government.\n\nIf we proceed with the plans we will try to use mostly local sources and contacts, to try to maintain plausible deniability."
 influence.5.a: "Lançar um Golpe para colocar no poder o maior partido em nossa Perspectiva."
 influence_coup_largest_success_TT: "§H Golpe Bem-Sucedido§!"
 influence_coup_largest_discovered_TT: "§R Golpe Falhado§!"
 influence.5.b: "Lançar um Golpe para colocar no poder o mesmo partido governante que o nosso."
 influence.5.c: "Desistir desses planos - por enquanto."
 News_influence.3.t: "Mudança de Regime!"
 News_influence.3.d: "Forces with [FROM.GetAdjective] backing have deposited the previous government."
 News_influence.3.a: "Uau"
 News_influence.4.t: "Dramatic scenes as regime change sweeps [FROM.FROM.GetNameWithFlag]"
 News_influence.4.d: "After a period with uptick in foreign intelligence activity, especially from [FROM.GetNameWithFlag], the previous government of [FROM.FROM.GetName] have been toppled with many top officials of the former regime detained. [FROM.FROM.GetLeader] of the [FROM.FROM.GetRulingParty] has emerged as the new leader amid the turmoil. Early indications are that the new regime of [FROM.FROM.GetName] will identify with the [FROM.FROM.GetRulingIdeology], uprooting the balance of power."
 News_influence.4.a: "Interessante."
 News_influence.5.t: "[FROM.GetNameWithFlag] under pressure as [FROM.FROM.GetNameWithFlag] defeat coup"
 News_influence.5.d: "[FROM.FROM.GetAdjective] leader [FROM.FROM.GetLeader] was gesturing vividly from the stage as 'hostile evil forces spearheaded by [FROM.GetName]' were being blamed for today's latest escalations that saw [FROM.FROM.GetLeader] defeating a dramatic coup attempt. Though [FROM.GetAdjective] leader [FROM.GetLeader] strongly denied the accusations, it is widely known that the two leaders don't see eye to eye. With [FROM.GetAdjective]-[FROM.FROM.GetAdjective] ties at all time low, [FROM.FROM.GetName] vowed to the public to \"irradicate [FROM.GetAdjective] influence from [FROM.FROM.GetName]\", and otherwise double down on the [FROM.FROM.GetRulingIdeology] direction that the ruling [FROM.FROM.GetRulingParty] have been steering [FROM.FROM.GetNameWithFlag] towards."
 News_influence.5.a: "Interessante."
 News_influence.6.t: "Drama as [FROM.FROM.GetNameWithFlag] collapse into Civil War!"
 News_influence.6.d: "Traumatic scenes from [FROM.FROM.GetNameWithFlag] could be seen today, as the last few days of protests, uncertainty and strange military movements gave way to gunfire, suffering and fleeing civilians. While details are scarce, it seems several whole units of the [FROM.FROM.GetAdjective] Army have declared for the armed opposition against [FROM.FROM.GetLeader] and the [FROM.FROM.GetRulingParty] ([FROM.FROM.GetRulingIdeology]). A opposition leader, speaking to WNN under conditions of anonymity, said that they \"expect significant help from [FROM.GetNameWithFlag] in their quest to overthrow the illegitimate [FROM.FROM.GetAdjective] tyrant [FROM.FROM.GetLeader]\".\n\nAlthough [FROM.GetAdjective] leadership have expressed their \"surprise about these dramatic developments\", this is given little credibility by close watchers of [FROM.GetAdjective]-[FROM.FROM.GetAdjective] relations. One analyst described the situation like this; \"It's clear that this in reality was a [FROM.GetAdjective]-backed coup attempt that failed to secure their objectives fast enough, resulting in a tense standoff that degraded into what now looks like a full civil war\". Several world leaders, especially those with a [FROM.FROM.GetRulingIdeology] have had less than diplomatic words for the as of yet unconfirmed [FROM.GetAdjective] involvement.\n\nWith the two different sides in the conflict represent not only stark differences in domestic, but also international direction, it will be interesting to follow if other countries also get involved in the conflict."
 News_influence.6.a: "Quem governará as cinzas?"
 influence.51.t: "Ajuda Militar para [FROM.GetName]"
 influence.51.d: "Our fellow nation [FROM.GetName] is currently in an armed conflict and is looking for suppliers to fuel their war effort. They have shown an interest in our small arms, infantry vehicles, and other military surplus. We should decide if it is worthwhile to send them the military equipment lest they use it against us in future conflicts..."
 influence.51.a: "Sim, vamos fazer isso!"
 influence.51.a_tt: "Você pode decidir quais equipamentos encaminhar!"
 influence.51.b: "Pensando melhor..."
 influence.51.b_tt: "Pensando melhor. Eu preciso dessas armas!"
 influence.52.t: "A Questão do Que"
 influence.52.d: "We can send [FROM.FROM.GetName] one of three categories of military aid. After picking the category, we will choose a §Hpackage size§! that determines the quantity, political cost, and threat generated.\n\n§HInfantry§!: small arms, light anti-tank, anti-aircraft.\n§HVehicles & Armor§!: main battle tanks, amphibious tanks, utility vehicles.\n§HModern Equipment§!: heavy anti-tank missiles, surface-to-air missiles, drones."
 influence.52.a: "§HInfantry Equipment§! Package"
 influence.52.b: "§HVehicles & Armor§! Package"
 influence.52.c: "Na verdade, eu preciso destes..."
 influence.53.t: "Ajuda Militar de [FROM.GetName]"
 influence.53.d: "[FROM.GetName] has offered us a package of military equipment. Should we accept or return it?"
 influence.53.a: "Accept the Package"
 influence.53.c: "Return the Equipment"
 influence.54.t: "Relatório Mensal de Auto-Influência"
 influence.54.d: "[?nations_influenced|0] foram influenciados com sucesso em [GetDateText]. As seguintes nações foram influenciadas por nossos esforços contínuos de influência:"
 influence.54.a: "OK, obrigado!"
 econvent.1.t: "Banco Central do(a) [Root.GetName] adverte sobre possível bolha imobiliária"
 econvent.1.d: "Prezado [Root.GetLeader], lamentamos informá-lo que uma parte considerável de nossa equipe de especialistas (com os melhores e mais brilhantes economistas) está identificando sinais precoces de que o mercado imobiliário da(a)[Root.GetName] está superaquecido e pode estar caminhando para uma bolha prestes a estourar. Tenha em mente que prever o futuro é difícil e trabalhoso, portanto, pode ser que nossos especialistas estejam errados. \nNós, é claro, jamais sonharíamos em dar ordens a Vossa Excelência sobre o que fazer, mas fazer alguns ajustes agora será menos doloroso do que uma crise completa no futuro."
 econvent.1.a: "Vamos esfriar os mercados antes que isso se torne grave."
 econvent.1.b: "Chega de bobagens. A economia [Root.GetAdjective] está sempre saudável!"
 econvent.1.b_tt: "§HSem efeito§! por enquanto, mas uma bolha imobiliária pode ser criada no futuro\n"
 econvent.2.t: "Colapso dos preços imobiliários"
 econvent.2.d: "À medida que os preços das casas e apartamentos dispararam, especialmente no último ano, as pessoas têm assumido empréstimos cada vez maiores para comprar imóveis, enquanto os especuladores têm investido pesadamente em propriedades, também usando dinheiro emprestado. Agora, isso está chegando ao fim rapidamente. Os preços estão caindo, e as pessoas estão tentando vender como se não houvesse amanhã. Muitos menos afortunados ficarão presos em empréstimos vultuosos que não podem pagar. À medida que as pessoas estão culpando tanto [Root.GetLeader] quanto o Banco Central [Root.GetAdjective] por causar isso, devemos fazer uma declaração pública sobre como pretendemos lidar rapidamente com essa crise."
 econvent.2.a: "Vamos inundar o sistema com dinheiro barato para fazer o mercado se recuperar."
 econvent.2.b: "Isso é doloroso, mas os preços dos imóveis precisavam cair."
 econvent.3.t: "Crash do Mercado de Ações"
 econvent.3.d: "Parece que o caos após o estouro da bolha imobiliária atingiu o Mercado de Ações. Os preços das ações de quase todas as empresas listadas [Root.GetAdjective] despencaram fortemente nesta manhã, e nossa moeda também sofreu uma grande desvalorização. A negociação foi temporariamente suspensa antes do almoço, mas não se espera melhora quando os mercados reabrirem amanhã, pois todos estão desesperados para vender suas ações."
 econvent.3.a: "Ainda bem que meu dinheiro está em paraísos fiscais offshore."
 econvent.3.b: "Conceder resgates financeiros."
 econvent.4.t: "Bancos [Root.GetAdjective] enfrentam crise"
 econvent.4.d: "Apesar do delicioso e quente café com arte latte em sua xícara [Root.GetName] §R<3§!, este não é um bom dia. Magnatas financeiros desesperados, seus lobistas e os políticos que receberam suas contribuições estão todos inundando os escritórios do governo [Root.GetAdjective], e todos têm a mesma mensagem: \"Precisamos de um resgate financeiro!\".\n\nAparentemente, o duplo impacto do Declínio do Mercado Imobiliário e do Crash do Mercado de Ações foi demais para o setor financeiro suportar. O acúmulo de dívidas ruins de suas especulações é simplesmente muito grande, e precisa haver um influxo de dinheiro fresco do governo - caso contrário, haverá falências generalizadas com os poupadores inocentes perdendo seus depósitos."
 econvent.4.a: "Vamos fornecer os resgates financeiros."
 econvent.4.b: "Sem resgates financeiros, mas garantiremos os depósitos de poupança."
 econvent.4.c: "A sobrevivência do mais apto faz o capitalismo grandioso."
 econvent.5.t: "Consumidores [Root.GetAdjective] Gastam Menos"
 econvent.5.d: "Um relatório recente destacou que as pessoas trabalhadoras [Root.GetAdjective] estão cada vez mais preocupadas com o seu futuro. Este pessimismo está a fazer com que as pessoas poupem mais e o consumo global diminua. Se isso continuar, muitas empresas em [Root.GetName] terão que reduzir ou fechar. As empresas que exportam principalmente produtos [Root.GetAdjective] não são afetadas por isso."
 econvent.5.a: "Transfira algum dinheiro para compras."
 econvent.5.b: "Espero que isso melhore."
 econvent.6.t: "Menor Demanda por Produtos [Root.GetAdjective] no Exterior"
 econvent.6.d: "Os dados são claros; as exportações internacionais de [Root.GetName] estão em declínio. A causa, no entanto, está sendo acaloradamente debatida entre os conselheiros econômicos de [Root.GetLeader]. Uma teoria é que nos tornamos menos competitivos devido aos nossos salários relativamente altos, outra é que nossos concorrentes aumentaram a qualidade de seus produtos. Outros acham que a diminuição da demanda se deve apenas a mudanças de tendências no exterior. Seja qual for a causa, não há realmente muito que possamos fazer a respeito, exceto superá-la e trabalhar mais arduamente no futuro."
 econvent.6.a: "Os estrangeiros estão sendo bobos. Coisas [Root.GetAdjective] são as melhores!"
 econvent.7.t: "Seca causa desastre para os agricultores [Root.GetAdjective]"
 econvent.7.d: "Embora normalmente não recebamos muita chuva, a precipitação nesta estação de crescimento tem sido terrível, com a maioria das colheitas fracassando. O pouco produto agrícola que foi produzido é inteiramente devido a rios remanescentes e irrigação artificial, algo que infelizmente não é muito comum aqui em [Root.GetName]. Os agricultores estão exigindo ajuda do Governo de [Root.GetLeader], e os moradores das cidades estão preocupados com o aumento dos preços dos alimentos."
 econvent.7.a: "Boa sorte na próxima temporada."
 econvent.8.t: "Fome em [Root.GetName]!"
 econvent.8.d: "A seca contínua fez com que grandes partes do campo de [Root.GetName] ficassem sem comida acessível. Os estoques foram esgotados, e uma verdadeira fome está causando desnutrição, morte e doença."
 econvent.8.a: "Dor!"
 econvent.9.t: "Aumento da Confiança do Consumidor"
 econvent.9.d: "As condições recentes dentro da economia [ROOT.GetAdjective] mostraram que os consumidores dentro do nosso país agora têm as condições de mercado perfeitas para gastar dinheiro e fazer investimentos no futuro do país. As pessoas estão comprando bens de consumo como se não houvesse amanhã!"
 econvent.9.a: "Notícia maravilhosa!"
 econvent.10.t: "Boom no Mercado de Ações"
 econvent.10.d: "O mercado de ações do(a) [ROOT.GetName] está em alta. As pessoas estão negociando ações como se estivessem fazendo compras de alimentos.\n"
 econvent.10.a: "Mantenha o boom!"
 econvent.10.a_tt: "Injetar liquidez adicional no mercado pode ser devastador caso ocorra um colapso.\n"
 econvent.10.b: "Ótimo"
 econvent.10.b_tt: "O mercado continuará normalmente sem intervenção. Ainda há uma chance moderada de um colapso.\n"
 econvent.10.c: "Desacelere a economia."
 econvent.10.c_tt: "A economia aqueceu muito rapidamente. Vamos começar a desacelerar o ritmo apertando o fluxo de capital.\n"
 econvent.11.t: "Importante Instituição Financeira Faliu!"
 econvent.11.d: "As manchetes anunciam a falência de uma importante instituição financeira. A mídia está em polvorosa e o pânico toma conta. O governo está sendo implorado por uma resposta, pois teme-se uma crise maior no horizonte. O que devemos fazer?"
 econvent.11.a: "É grande demais para falir..."
 econvent.11.b: "É apenas bom negócio..."
 econvent.12.t: "Ondas da Crise Financeira de [FROM.GetName]"
 econvent.12.d: "A recente crise em [FROM.GetName] causou muitos problemas em nossa nação, pois os efeitos de sua crise são sentidos aqui. Nossas economias interconectadas agora estão sofrendo com o peso dessa crise."
 econvent.12.a: "Conceder fundos de auxílio."
 econvent.12.b: "O mercado acima de tudo."
 econvent.13.t: "Dívida Elevada Faz Empresas Sairem"
 econvent.13.d: "A alta relação entre dívida e PIB do nosso país está levando empresas a fecharem e saírem do país. Reduzir nossa dívida é imperativo, caso contrário, podemos ver mais indústrias decidindo partir."
 econvent.13.a: "Permitir que a Empresa Saia"
 econvent.13.b: "Comprar a Empresa"
 econvent.14.t: "Investidores Privados Investem na Indústria Civil"
 econvent.14.d: "Os investidores privados decidiram investir em uma nova indústria civil no país."
 econvent.14.a: "Incrível!"
 econvent.15.t: "Investidores Privados Investem em Parques de Escritórios"
 econvent.15.d: "Os investidores privados decidiram investir em novos parques de escritórios no país."
 econvent.15.a: "Incrível!"
 econvent.100.t: "Fechamento de Indústrias"
 econvent.100.d: "Devido a mudanças nas circunstâncias econômicas, grande parte de nossa indústria se tornou não competitiva e precisou fechar as portas."
 econvent.100.a: "Vamos reconstruir."
 econvent.101.t: "Indústrias se Relocam"
 econvent.101.d: "Devido a mudanças nas circunstâncias econômicas, muitas empresas decidiram se mudar para o exterior para serem mais competitivas. Isso prejudicará a economia doméstica."
 econvent.101.a: "Vamos reconstruir."
 econvent.102.t: "Indústrias se Mudam para [Root.GetNameDef]"
 econvent.102.d: "Due to changing economic circumstances in [FROM.GetNameDef], many [FROM.GetAdjective] corporations have decided to relocate to [Root.GetNameDef] to be more competitive. This will be a boon to our economy."
 econvent.102.a: "Excelentes notícias."
 remove_civilian_industry_effect_tt: "Perder [?reduction_factor|%R0] das fábricas civis.\n"
 migrate_industry_to_random_effect_tt: "§R[?reduction_factor|%0]§! das fábricas civis se mudam para §Y[relocation_location.GetNameDef]§!.\n"
 factories_migrated_to_us_tt: "[?FROM.ind_factories|Y0] civilian factories relocate from §Y[FROM.GetNameDef]§! to §Y[Root.GetNameDef]§!.\n"
 war.0.t: "[FROM.GetName] goes to war!"
 war.0.d: "[FROM.GetName] has gone to war today. The international community will be keeping a close eye as this conflict continues to rage on.\n"
 war.0.a: "Preocupante"
 anti_bully.2.t: "Cansaço Público com a Guerra"
 anti_bully.2.d: "We have decided war is our best course of action. However, in order to maintain support among the people we must either win this quickly or push quickly into foreign soil. The people will march as long as they see how necessary this war is. Boots march, drums beat, and the time for [FROM.GetName] to go to war is upon us!\n\n§YThis triggers the Public War Weariness System§!\n"
 anti_bully.2.a: "Devemos vencer!"
 sco.1.t: "[FROM.GetName] apresentou um pedido para status de observador na SCO"
 sco.1.d: "Um novo estado deseja observar as atividades da SCO e talvez se tornar um membro pleno da organização!"
 sco.1.a: "Não vemos razão para não conceder o pedido deles."
 sco.1.b: "Não podemos conceder esse status a eles!"
 sco.2.t: "[FROM.GetName] apresentou um pedido para status de membro na SCO"
 sco.2.d: "Um novo estado deseja se tornar um membro pleno da organização!"
 sco.2.a: "Não vemos razão para não conceder o pedido deles."
 sco.2.b: "Não podemos conceder esse status a eles!"
 sco.3.t: "[FROM.GetName] está oferecendo conduzir exercícios militares conjuntos conosco"
 sco.3.d: "Este estado membro da SCO está propondo exercícios conjuntos para fortalecer a cooperação militar e aumentar a confiança entre nossos dois países."
 sco.3.a: "Esta é uma oportunidade bem-vinda para nossas tropas ganharem experiência!"
 sco.3.b: "A cooperação com [FROM.GetName] é impossível."
 sco.4.t: "[FROM.GetName] aceitou nossa oferta!"
 sco.4.d: "Os delegados [FROM.GetAdjective] receberam calorosamente nossa proposta e estão se preparando para nossos exercícios conjuntos."
 sco.4.a: "Que comecem os jogos!"
 sco.5.t: "[FROM.GetName] recusou nossa oferta!"
 sco.5.d: "Os delegados [FROM.GetAdjective] recusaram realizar exercícios militares altamente proveitosos conosco."
 sco.5.a: "É uma perda para eles..."
 sco.6.t: "SCO realiza exercícios militares em grande escala"
 sco.6.d: "[FROM.GetAdjective] tropas se juntaram a milhares de outras hoje no que está sendo descrito como um exercício antiterrorismo sob os auspícios da Organização de Cooperação de Xangai (SCO). Enquanto muitos saudaram esses exercícios como um sintoma de cooperação internacional bem-sucedida, outros reagiram com muito menos entusiasmo a esse último desenvolvimento. Analistas americanos e europeus citaram a implantação de aeronaves de longo alcance e poder de fogo substancial como evidência de que esses exercícios não são feitos como prática para operações antiterrorismo, mas como um ensaio geral bem armado para o confronto com o Ocidente."
 sco.6.a: "Esses exercícios ameaçadores são para nosso benefício?"
 sco.6.b: "Apenas os terroristas têm algo a temer disso!"
 sco.6.c: "Um desenvolvimento interessante."
 sco.7.t: "[FROM.GetName] adquire o status de membro da SCO"
 sco.7.d: "Após um processo gradual de integração, [FROM.GetLeader] anunciou hoje a filiação de seu país à Organização de Cooperação de Xangai. Observadores esperançosos retrataram esse desenvolvimento como uma progressão adicional da cooperação econômica e política regional no continente eurasiano, enquanto analistas mais pessimistas lamentaram a crescente influência da China e a ameaça que isso representa para a ordem mundial existente."
 sco.7.a: "A ameaça chinesa continua crescendo..."
 sco.7.b: "Um bom dia para a diplomacia!"
 sco.8.t: "[FROM.GetName] deixa a SCO"
 sco.8.d: "Após a reavaliação das ações chinesas pelo atual governo [FROM.GetAdjective], [FROM.GetLeader] retirou [FROM.GetNameDef] da Organização de Cooperação de Xangai. [CHI.GetLeader] ainda não comentou o desenvolvimento, mas as organizações de mídia ligadas ao governo chinês foram rápidas em lamentar como essa saída representa um passo para trás em termos de integração regional."
 sco.8.a: "A agressão chinesa alienou esta nação."
 sco.8.b: "Um dia triste para a cooperação internacional..."
 sco.9.t: "China assume as rédeas do poder sobre a SCO em relação à Rússia"
 sco.9.d: "Historicamente, a Organização de Cooperação de Xangai era administrada como um esforço conjunto sino-russo. No entanto, o descontentamento chinês com esse arranjo supostamente levou a Rússia a ser forçada a ocupar uma posição mais subordinada dentro da organização. Enquanto tanto [CHI.GetLeader] quanto [SOV.GetLeader] permanecem em silêncio sobre essa luta pelo poder, autoridades russas estão supostamente furiosas com os chineses e amargas sobre a humilhação do gigante eslavo que ocorreu à vista dos demais estados membros da SCO. As ramificações geopolíticas dessa movimentação em termos de hegemonia sobre a Ásia Central provavelmente serão substanciais."
 sco.9.a: "A China não está disposta a compartilhar o holofote..."
 sco.10.t: "A China está exigindo que escolhamos um lado"
 sco.10.d: "Nossa contínua adesão tanto à CSTO quanto à Organização de Cooperação de Xangai nos colocou em uma posição difícil após a divisão sino-russa. A China está exigindo que escolhamos entre deixar a SCO e permanecer na aliança russa ou permanecer na SCO e abandonar os russos. A escolha que fizermos provavelmente terá um papel significativo no confronto entre os dois gigantes regionais que em breve ocorrerá."
 sco.10.a: "Somos leais acima de tudo!"
 sco.10.b: "Hora de abandonar este navio afundando..."
 sco.11.t: "[FROM.GetName] está nos fornecendo assistência para o desenvolvimento!"
 sco.11.d: "Sob os auspícios da Organização de Cooperação de Xangai, o governo [FROM.GetAdjective] está fornecendo às nossas empresas locais fundos e recursos muito necessários para ajudar a facilitar seus projetos de desenvolvimento. Embora essa assistência seja uma boa notícia para nossa economia, ela aumentará o grau de influência que [FROM.GetNameDef] exerce sobre nosso país."
 sco.11.a: "Somos gratos pela ajuda!"
 sco.12.t: "[FROM.GetName] formou o $SHANGHAI_PACT$!"
 sco.12.d: "[FROM.GetName] formou $SHANGHAI_PACT$ para rivalizar com [USA.GetFactionName]. Nós permitimos que eles tivessem uma grande [FROM.GetAdjective] influência sobre nós, nós também somos um membro da SCO, então somos forçados a ser um membro da nova facção."
 sco.12.a: "Ok"
 taiwan.1.t: "Mão dada na manifestação 228"
 taiwan.1.d: "Uma demonstração de solidariedade. Uma corrente humana foi formada com cerca de dois milhões de pessoas, cobrindo uma distância de 500 km. Começando no porto de Keelung, a cidade mais ao norte de Taiwan, a corrente seguiu até a ponta sul da ilha. O propósito foi duplo: os taiwaneses desejavam a paz, mas também protestavam contra o posicionamento de mísseis pela República Popular da China voltados para Taiwan, seu vizinho na ilha. Alguns dos simbolismos da manifestação, particularmente no momento em que os participantes \"se afastam da China\", claramente apoiaram a independência de Taiwan e, portanto, não contaram com a presença de membros da Coligação Pan-Azul, que responderam com uma manifestação em toda a ilha alguns dias depois."
 taiwan.1.a: "Nunca devemos esquecer as vítimas."
 taiwan.2.t: "Tufão Bilis"
 taiwan.2.d: "Em preparação para o Bilis, escritórios foram fechados em toda a ilha. Além do fechamento de empresas, voos de e para a ilha foram reprogramados e um centro de auxílio ao tufão foi estabelecido. Devido à ameaça de deslizamentos de terra, um alerta de deslizamento foi emitido para Taiwan. Embora a tempestade ainda não tivesse atingido a terra, uma pessoa foi morta em Taipei em 22 de agosto após ser soterrada por um deslizamento de terra causado pelo tufão iminente; isso representou a primeira fatalidade causada pelo Bilis. Juntamente com o reagendamento de voos, vários aeroportos foram fechados e a Bolsa de Valores de Taiwan ficou fechada em 23 de agosto. Enquanto isso, hospitais estenderam os horários de atendimento em antecipação à admissão de pacientes. Os membros da guarda costeira de Taiwan regularam a atividade pesqueira devido à ameaça de ondas mortais. O Porto de Kaohsiung permaneceu fechado durante toda a duração da tempestade. Devido à maior demanda por vegetais antes da tempestade, o custo desses alimentos aumentou de 20 a 30 por cento.\n\nO Bilis foi um ciclone tropical altamente destrutivo para Taiwan. Os danos nas indústrias agrícola, pesqueira e florestal da ilha totalizaram US$ 133,5 milhões. O tufão causou 14 mortes e feriu mais 80 pessoas. Apagões afetaram negativamente aproximadamente 600.000 residências e 400 casas em toda Taiwan foram destruídas. Centenas de milhares de famílias experimentaram escassez de água após a tempestade. Em Cheng-Kung, uma estação meteorológica registrou uma rajada de vento de 281 km/h, que quebrou o anemômetro da estação. Um único deslizamento de terra na cidade de Jenai soterrou nove agricultores. Dezenas de milhares de pessoas foram deslocadas durante a tempestade e se mudaram para abrigos de evacuação montados pelo governo. No leste do condado de Hualien, 250 casas sucumbiram aos ventos fortes. Os ventos também derrubaram árvores e levaram veículos leves, bloqueando estradas. As fortes chuvas associadas ao Bilis inundaram aproximadamente 40.000 ha de pomares e arrozais. Após a passagem do Bilis por Taiwan, ocorreu um terremoto de magnitude 5,7 na ilha, agravando ainda mais as condições já pioradas."
 taiwan.2.a: "Hora de reconstruir."
 taiwan.3.t: "Eleição presidencial de Taiwan"
 taiwan.3.d: "Esta é a segunda eleição presidencial direta da República da China, para eleger o Presidente e Vice-Presidente da 10ª legislatura da República da China, conforme a Constituição de 1947. Isso tem o potencial de encerrar mais de meio século de domínio do Kuomintang (KMT) em Taiwan, desde que os eleitores do KMT se dividiram em dois grupos.\n\nEmbora mais popular e consistentemente melhor colocado nas pesquisas, o ex-governador de Taiwan, James Soong, não conseguiu obter a indicação do Kuomintang. Como resultado, ele anunciou sua candidatura como candidato independente. O Kuomintang respondeu expulsando Soong e 21 de seus aliados. Eles processaram Soong por roubo, alegando que, como Secretário-Geral do partido, ele roubou milhões de dólares taiwaneses em dinheiro destinado à família do falecido Presidente Chiang Ching-kuo e escondeu o dinheiro no Chunghsing Bills Finance Co. Soong se defendeu, afirmando que estava agindo sob a direção de Lee, mas sua história foi amplamente considerada pouco convincente. Inicialmente, comandando uma vantagem sólida nas pesquisas, Soong perdeu por pouco mais de 300.000 votos, e o escândalo financeiro que manchou sua imagem como político honesto provavelmente levou ao seu fracasso.\n\nO Partido Progressista Democrático apresentou o ex-prefeito de Taipei, Chen Shui-bian, como candidato a presidente. Depois de concorrer à eleição de 1996 em uma plataforma de independência radical e perder por uma larga margem, o DPP moderou sua posição em maio de 1999, emitindo a \"Resolução sobre o Futuro de Taiwan\". A resolução aceitava o status quo e defendia a visão moderada de que Taiwan já era independente, então qualquer declaração formal não seria urgentemente necessária, se fosse necessária. Também estava incluído o compromisso de que qualquer mudança no status internacional de Taiwan seria feita por meio de referendo, aliviando o medo de que um governo do DPP, se eleito, declarasse unilateralmente a independência sem aprovação popular. A chapa Chen-Lu também promete ser mais agressiva na luta contra a corrupção, fornecer mais financiamento para serviços sociais e ser mais favorável ao meio ambiente, incluindo a oposição à energia nuclear."
 taiwan.3.a: "Chen Shui-bian (DPP)"
 taiwan.3.b: "Lien Chan (KMT)"
 taiwan.3.c: "James Soong (Independente)"
 taiwan.4.t: "Estabelecimento da Administração da Guarda Costeira"
 taiwan.4.d: "A CGA combina o Comando da Guarda Costeira, a Divisão de Polícia Marítima e vários cortadores da Direção Geral de Alfândega de Taiwan, do Ministério das Finanças. A CGA unifica formalmente as agências de aplicação da lei costeira e marítima. Ela verá muita ação como uma agência jovem, participando de várias operações de busca e resgate e de combate ao contrabando no futuro próximo.\n\nA Administração da Guarda Costeira do Conselho de Assuntos Oceânicos (CGA) é responsável por manter a lei e a ordem, proteger os recursos das águas territoriais da ROC, que cercam Taiwan, Penghu, Kinmen, Ilhas Matsu, Ilha Verde, Ilha Orquídea, Ilhas Dongsha e Ilhas Nansha, bem como fornecer a primeira linha de defesa ao longo das áreas costeiras contra contrabandistas e imigrantes ilegais. A CGA é considerada uma agência civil de aplicação da lei sob a administração do Conselho de Assuntos Oceânicos do Yuan Executivo, embora durante emergências ela possa ser incorporada como parte das Forças Armadas da República da China.\n\nA Administração da Guarda Costeira é liderada por um ministro e três vice-ministros. A CGA inclui oito departamentos, um escritório e cinco forças-tarefa, bem como uma Diretoria-Geral de Patrulha Marítima e uma Diretoria-Geral de Patrulha Costeira. Sua jurisdição abrange as águas que cercam Kinmen, Matsu, Penghu e a principal ilha de Taiwan, para garantir a proteção adequada dos 1.819,8 quilômetros de costa e 540.000 quilômetros quadrados do \"Território Azul\", que é 15 vezes maior que a ilha de Taiwan."
 taiwan.4.a: "Por uma costa segura."
 taiwan.5.t: "Universidade Nacional de Kaohsiung é inaugurada"
 taiwan.5.d: "A universidade tem como objetivo reduzir a lacuna na educação entre o sul e o norte de Taiwan e promover a economia da região sul.\n\nExistem vinte departamentos na universidade, incluindo Línguas e Literatura Ocidentais, Língua e Literatura do Leste Asiático, Arquitetura, Design Criativo, Cinesiologia, Estudos de Saúde e Lazer, Direito, Governo e Lei, Direito Econômico e Financeiro, Economia Aplicada, Matemática Aplicada, Química Aplicada, Engenharia Elétrica, Engenharia Civil e Ambiental, Ciências da Vida e Gestão Industrial e de Negócios na Ásia-Pacífico, Artes Tradicionais, Finanças, Gestão de Informações e Física Aplicada. Entre esses departamentos, a Gestão Industrial e de Negócios na Ásia-Pacífico é especialmente projetada para formar elites industriais.\n\nUma característica incomum desta escola é seu espaço aberto. Não há muros nas fronteiras do campus. Os moradores que vivem ao redor dessa escola podem caminhar até o campus ou se exercitar usando os equipamentos da academia. A biodiversidade também é uma característica notável da NUK. Existem mais de 60 tipos de peixes no lago do Parque Water Land."
 taiwan.5.a: "Isso ajudará o sul."
 taiwan.6.t: "O Acordo de Serviço Transfronteiriço foi ratificado"
 taiwan.6.d: "Após sua aprovação pelo legislativo de Taiwan, o CSTA, um acordo de livre comércio entre Taiwan e a China continental, entrou oficialmente na legislação taiwanesa."
 taiwan.6.a: "Taiwan se aproxima da China."
 taiwan.7.t: "Manifestantes do Girassol ocupam o legislativo de Taiwan"
 taiwan.7.d: "Membros do movimento estudantil liderado pelos manifestantes do Girassol escalaram a cerca que separa o legislativo de Taiwan ontem, após protestos contra as tentativas do governo de aprovar o controverso Acordo de Serviço Transfronteiriço com a China continental. O movimento de protesto levantou preocupações sobre a abordagem apressada do governo para ratificar o tratado e a falta de transparência durante as negociações, bem como o conteúdo do tratado em si."
 taiwan.7.a: "Um golpe para o KMT."
 taiwan.8.t: "O Acordo de Serviço Transfronteiriço foi ratificado"
 taiwan.8.d: "Após sua aprovação pelo legislativo de Taiwan, o CSTA, um acordo de livre comércio entre Taiwan e a China continental, entrou oficialmente na legislação taiwanesa. Este acordo marca uma melhoria significativa nas relações entre as duas partes e melhorará significativamente o comércio de serviços entre as duas margens. No entanto, os críticos do acordo ainda não estão convencidos de que ele não represente uma ameaça à autonomia política de Taiwan em relação à China."
 taiwan.8.a: "Taiwan se aproxima da China."
 taiwan.8.b: "Taiwan não é China!"
 taiwan.9.t: "Manifestantes do Girassol ocupam o legislativo de Taiwan"
 taiwan.9.d: "Membros do movimento estudantil liderado pelos manifestantes do Girassol escalaram a cerca que separa o legislativo de Taiwan ontem, após protestos contra as tentativas do governo de aprovar o controverso Acordo de Serviço Transfronteiriço com a China continental. O movimento de protesto levantou preocupações sobre a abordagem apressada do governo para ratificar o tratado e a falta de transparência durante as negociações, bem como o conteúdo do tratado em si."
 taiwan.9.a: "Um golpe para o KMT."
 taiwan.9.b: "Devemos investigar."
 taiwan.10.t: "O \"Plano de Reunificação\" da República Popular da China"
 taiwan.10.d: "O governo de [CHI.GetLeader] ofereceu um \"Plano de Reunificação\" para Taiwan, traçando um caminho para que Taiwan eventualmente retorne ao controle chinês como uma Região Administrativa Especial. A proposta inclui várias salvaguardas para a continuação da democracia taiwanesa e da autonomia política, mas isso pode não ser suficiente para os oponentes taiwaneses da reunificação com o continente. A forma como a China pode responder se rejeitarmos este plano ainda é incerta."
 taiwan.10.a: "Devemos aceitar o plano."
 taiwan.10.b: "Taiwan não é a China!"
 taiwan.11.t: "Relatos de Atividades Suspeitas de Inteligência Chinesa"
 taiwan.11.d: "Nossos serviços de inteligência estão relatando atividades intensificadas de agentes chineses em nosso território. Essa atividade não significa nada em particular, mas também pode significar que a China está planejando algo. Devemos decidir se é um bom uso do tempo de nossos serviços de inteligência investigar isso."
 taiwan.11.a: "Parece inofensivo."
 taiwan.12.t: "Elementos Militares em Taiwan Tentam um Golpe"
 taiwan.12.d: "Uma facção de oficiais militares taiwaneses começou a tomar locais-chave em toda a ilha de Taiwan. [TAI.GetLeader] declarou estado de emergência e mobilizou aqueles que permanecem leais ao governo. Resta saber se os esforços do presidente serão bem-sucedidos.\n\nEmbora o objetivo declarado dos líderes do golpe seja abordar a insatisfação com o governo de [TAI.GetLeader], muitas das figuras proeminentes envolvidas têm fortes ligações com a China. Apesar disso, a extensão do envolvimento da China nesta tentativa de golpe ainda não está clara."
 taiwan.12.a: "O futuro de Taiwan está em jogo."
 taiwan.13.t: "O Golpe em Taiwan foi Bem-Sucedido"
 taiwan.13.d: "Após a tentativa fracassada de [TAI.GetLeader] de angariar apoio contra o golpe, oficiais militares leais à facção pró-chinesa em Taiwan tomaram o controle do país. Embora os oficiais tenham prometido um eventual retorno à democracia, a autonomia política de Taiwan em relação ao continente está indubitavelmente em perigo. Com o apoio não declarado, mas amplamente conhecido da China ao golpe, a probabilidade de uma Resolução do Conselho de Segurança em resposta a esse evento é altamente improvável."
 taiwan.13.a: "Aceite suas demandas"
 taiwan.13.b: "Nunca recuamos"
 taiwan.14.t: "Greve fracassada"
 taiwan.14.d: "Depois de negarmos as suas exigências, a greve acabou rapidamente. Todo mundo está voltando ao trabalho agora."
 taiwan.14.a: "Eles nunca tiveram chance"
 taiwan.15.t: "A greve continua"
 taiwan.15.d: "Depois de negarmos as suas exigências, a greve ficou ainda mais intensa. Não parece que a greve acabará em breve."
 taiwan.15.a: "Pelo menos tentamos"
 taiwan.16.t: "Tanque caiu da ponte"
 taiwan.16.d: "An army CM-11 tank toppled into a creek in Pingtung County as it was returning to base from a training exercise yesterday morning, killing three of the five soldiers onboard. The driver sustained only minor injuries and pulled himself out of the tank. The four others, who were inside the gun turret, could not escape through the turret's hatches because the tank was upside down."
 taiwan.16.a: "Investigar como isso pôde acontecer"
 taiwan_news.1.t: "O Acordo de Serviço Transfronteiriço foi Ratificado"
 taiwan_news.1.d: "Após sua aprovação pelo legislativo taiwanês, o CSSTA, um acordo de livre comércio entre Taiwan e a China continental, entrou oficialmente na lei taiwanesa."
 taiwan_news.1.a: "Taiwan se aproxima da China."
 taiwan_news.2.t: "Protestantes do Movimento Girassol Ocupam a Legislatura de Taiwan"
 taiwan_news.2.d: "Membros do Movimento Girassol liderado por estudantes escalaram a cerca que os separava da legislatura taiwanesa ontem, após protestos contra as tentativas do governo de aprovar o controverso Acordo de Serviço Transfronteiriço (CSSTA), um acordo de livre comércio com a China continental. O movimento de protesto levantou preocupações sobre a abordagem apressada do governo para a ratificação do tratado, a falta de transparência durante as negociações e o conteúdo do tratado em si."
 taiwan_news.2.a: "Um golpe para o KMT."
 taiwan_news.3.t: "Elementos do Exército de Taiwan Fazem um Golpe"
 taiwan_news.3.d: "Uma facção de oficiais militares taiwaneses começou a tomar locais-chave em toda a ilha de Taiwan. [TAI.Getleader] declarou estado de emergência e mobilizou aqueles que permanecem leais ao governo. Ainda não se sabe se os esforços do presidente serão bem-sucedidos.\n\nEmbora o objetivo declarado dos líderes do golpe seja abordar a insatisfação com a administração de [TAI.GetLeader], muitos dos figurões envolvidos têm laços estreitos com a China. Apesar disso, o grau de envolvimento da China nessa tentativa de golpe ainda não está claro."
 taiwan_news.3.a: "O futuro de Taiwan está em jogo."
 taiwan_news.4.t: "O Golpe em Taiwan teve Sucesso"
 taiwan_news.4.d: "Após a tentativa fracassada de [TAI.Getleader] em mobilizar apoio contra o golpe, oficiais militares leais à facção pró-chinesa em Taiwan assumiram o controle do país. Embora os oficiais tenham prometido um eventual retorno à democracia, a autonomia política de Taiwan em relação ao continente está indubitavelmente em perigo. Com o apoio tácito, mas amplamente conhecido da China ao golpe, a probabilidade de uma Resolução do Conselho de Segurança em resposta a esse evento é altamente improvável."
 taiwan_news.4.a: "Uma nova era na história de Taiwan."
 taiwan_news.5.t: "O Golpe em Taiwan falhou"
 taiwan_news.5.d: "[TAI.Getleader] emergiu vitorioso hoje, já que os últimos participantes do golpe se renderam à polícia taiwanesa. As últimas duas semanas viram uma falha dos conspiradores do golpe em conquistar o apoio do povo ou de seus companheiros de armas. Essa falta de apoio contribuiu para deficiências existentes em recursos e moral, levando as tropas pró-golpe em todo o país a se renderem às autoridades em massa. [TAI.Getleader] assegurou aos jornalistas que a estabilidade e a calma serão rapidamente restauradas na nação insular, enquanto a China ainda não se pronunciou sobre os eventos recentes."
 taiwan_news.5.a: "A crise foi evitada."
 taiwan_news.5.b: "Parece que precisamos de outra solução."
 taiwan_news.6.t: "Taiwan Aprova Lei para Combater a Interferência Chinesa"
 taiwan_news.6.d: "Com o objetivo declarado de frustrar as tentativas chinesas de interferir no processo eleitoral de Taiwan, [TAI.GetLeader] conseguiu aprovar um controverso \"projeto de lei anti-infiltração\" no parlamento. O projeto de lei proíbe potências estrangeiras hostis de fazer campanha, fazer lobby, fazer doações políticas ou espalhar desinformação. Parlamentares da oposição se opuseram veementemente ao projeto de lei, assim como o Escritório de Assuntos de Taiwan de Pequim. Ambos criticaram [TAI.GetLeader] por perpetrar um \"Terror Verde\" que contribui para um clima de paranoia e medo. O partido governante de [TAI.GetLeader] defendeu a medida como um ato necessário diante da ameaça substancial que a China continental representa para o território insular."
 taiwan_news.6.a: "Taiwan contra-ataca."
 hongkong.1.t: "Os Chineses se Recusam a Reverter a Anexação!"
 hongkong.1.d: "A China rejeitou nossas ameaças, não nos deixando escolha senão seguir em frente."
 hongkong.1.a: "Eles parecem não nos temer mais."
 hongkong.2.t: "China Desloca Tropas para Hong Kong"
 hongkong.2.d: "Após protestos na Região Administrativa Especial de Hong Kong, a China ordenou que várias unidades do Exército de Libertação Popular fossem às ruas de Hong Kong para \"restaurar a lei e a ordem\". [CHI.GetLeader] garantiu aos \"manifestantes pacíficos\" que eles não serão alvos e que todos os que forem presos serão tratados de acordo com a lei internacional de direitos humanos. No entanto, muitos em Hong Kong e no exterior expressaram ceticismo quanto à extensão em que as tropas chinesas exercerão contenção em relação aos manifestantes."
 hongkong.2.a: "Esta ação é repugnante!"
 hongkong.2.b: "A China fez o que precisava ser feito."
 hongkong.2.c: "Isso não é da nossa conta."
 hongkong.3.t: "China anexa Hong Kong"
 hongkong.3.d: "A China decidiu pôr fim ao status especial de Hong Kong como Região Administrativa Especial, anexando formalmente o território. Devemos decidir sobre a resposta do nosso país a esse evento significativo."
 hongkong.3.a: "Essa ação é desprezível!"
 hongkong.3.b: "A China fez o que precisava ser feito."
 hongkong.3.c: "Isso não é da nossa conta."
 hongkong.4.t: "Anexação de Hong Kong pela China exige uma resposta"
 hongkong.4.d: "Em uma flagrante violação da Lei Básica que foi negociada entre nós e os chineses, a China anexou formalmente a Região Administrativa Especial. Como garantidor da autonomia de 50 anos de Hong Kong, devemos enfrentar esse ato ilegal com uma resposta apropriada."
 hongkong.4.a: "Devemos ameaçar ação militar."
 hongkong.4.b: "Devemos ameaçar medidas econômicas."
 hongkong.4.c: "Devemos criticar a ação."
 hongkong.5.t: "O Reino Unido está ameaçando com ação militar!"
 hongkong.5.d: "Os britânicos reagiram de forma mais beligerante do que esperávamos à nossa anexação de seu antigo território colonial. Devemos considerar se devemos ceder às suas demandas."
 hongkong.5.a: "Essa não é a colina em que queremos morrer."
 hongkong.5.b: "Deixem-nos vir."
 hongkong.6.t: "O Reino Unido está ameaçando com medidas econômicas contra nós!"
 hongkong.6.d: "Os britânicos decidiram ameaçar sanções contra nós se não revertermos nossa anexação de seu antigo território colonial. Devemos considerar se devemos ou não atender às suas demandas."
 hongkong.6.a: "Devemos evitar confronto."
 hongkong.6.b: "Suas ameaças não significam nada!"
 hongkong.7.t: "Os chineses concordaram em reverter a anexação"
 hongkong.7.d: "Claramente impressionados com o poder britânico, os chineses recuaram na questão de Hong Kong."
 hongkong.7.a: "Nossas ameaças ainda têm efeito!"
 hongkong_news.1.t: "Hong Kong Abalada por Protestos Generalizados"
 hongkong_news.1.d: "Após a decisão da China de descartar a possibilidade de Hong Kong eleger seu chefe executivo por sufrágio universal, protestos em massa eclodiram no território chinês. [HKG.GetLeader] declarou que, embora o governo de Hong Kong respeite o direito do povo de Hong Kong de expressar suas opiniões de forma pacífica e legal, a violência e a ilegalidade não serão toleradas. A resposta da China à crise atual ainda está para ser vista, já que [CHI.GetLeader] não comentou sobre os eventos recentes."
 hongkong_news.1.d_limit: "Após a decisão da China de que o Chefe do Executivo de Hong Kong só poderia ser eleito por sufrágio universal se pré-aprovasse os candidatos, protestos em massa eclodiram no território chinês. [HKG.GetLeader] declarou que, embora o governo de Hong Kong respeite o direito do povo de Hong Kong de expressar suas opiniões de forma pacífica e legal, a violência e a ilegalidade não serão toleradas. A resposta da China à crise atual ainda está para ser vista, já que [CHI.GetLeader] não comentou sobre os eventos recentes."
 hongkong_news.1.d_reunification: "Após o anúncio da China de que em 2047 Hong Kong perderá seu status especial e retornará completamente ao controle chinês, protestos em massa eclodiram no território chinês. [HKG.GetLeader] declarou que, embora o governo de Hong Kong respeite o direito do povo de Hong Kong de expressar suas opiniões de forma pacífica e legal, a violência e a ilegalidade não serão toleradas. A resposta da China à crise atual ainda está para ser vista, já que [CHI.GetLeader] não comentou sobre os eventos recentes."
 hongkong_news.1.d_annexed: "Após a anexação altamente controversa de Hong Kong pela China, protestos em massa eclodiram no território chinês. [HKG.GetLeader] declarou que, embora o governo de Hong Kong respeite o direito do povo de Hong Kong de expressar suas opiniões de forma pacífica e legal, a violência e a ilegalidade não serão toleradas. A resposta da China à crise atual ainda está para ser vista, já que [CHI.GetLeader] não comentou sobre os eventos recentes."
 hongkong_news.1.a: "Um desenvolvimento interessante."
 hongkong_news.1.b: "Isso é uma má notícia para nós."
 hongkong_news.2.t: "Protestos em Hong Kong Perdem Força"
 hongkong_news.2.d: "Os protestos na Região Administrativa Especial de Hong Kong contra as recentes ações chinesas diminuíram gradualmente nos últimos dias e praticamente cessaram. As operações policiais no território chinês não encontraram resistência, e muitos que antes ocupavam as ruas retornaram às suas casas. O que isso significa para a relação entre a China e um território problemático que mantém valores políticos significativamente diferentes permanece a ser visto. Talvez um indicativo do que está por vir foi uma faixa deixada por manifestantes em um local proeminente no centro da cidade que dizia 'Voltaremos'."
 hongkong_news.2.a: "Um desenvolvimento interessante."
 hongkong_news.2.b: "Eles sabem que sua causa é fútil."
 hongkong_news.3.t: "Protestos em Hong Kong Aumentam em Escala"
 hongkong_news.3.d: "Os protestos contra as ações chinesas no território de Hong Kong aumentaram rapidamente, com analistas concordando amplamente que os protestos entraram em um novo estágio em termos de escala e táticas. Como os governos chinês e de Hong Kong responderão a essa nova escalada ainda está para ser visto, mas autoridades em ambos os governos estão cada vez mais ressentidas com os impactos dos protestos em seus interesses adquiridos. Os manifestantes, por sua vez, estão se recusando a recuar até que os governos chinês e de Hong Kong atendam às suas demandas."
 hongkong_news.3.a: "O povo de Hong Kong não ficará em silêncio..."
 hongkong_news.3.b: "Eles ficarão em casa se souberem o que é bom para eles!"
 korea.1.t: "China exige nossa retirada da Península Coreana"
 korea.1.d: "A RPC (República Popular da China) exigiu que retiremos nossas tropas que protegem a República da Coreia do que eles descrevem como sua \"esfera de influência\". Essa exigência é, sem dúvida, um prelúdio para ação agressiva em relação à Coreia do Sul. Se retirarmos nossas tropas da Península, as chances de um conflito na Zona Desmilitarizada aumentarão drasticamente."
 korea.1.a: "Essa exigência é absurda!"
 korea.1.b: "É melhor que cedamos..."
 korea.2.t: "China está nos incentivando a iniciar reformas econômicas"
 korea.2.d: "[CHI.GetLeader] está instando nosso governo a seguir o exemplo da China e iniciar reformas de liberalização do mercado. Embora a perspectiva de experimentar o mesmo rápido crescimento econômico que a China teve na década de 1980 seja tentadora, devemos considerar a instabilidade que inevitavelmente resultaria de nossa busca por tais reformas."
 korea.2.a: "Agora não é hora de reformas!"
 korea.2.b: "Inicie reformas menores."
 korea.2.c: "Inicie reformas moderadas."
 korea.2.e: "Inicie reformas importantes."
 korea.3.t: "[NKO.GetLeader] anunciou novas reformas econômicas"
 korea.3.d: "Sob pressão chinesa para reformas, a Coreia do Norte iniciou um processo de liberalização econômica que muitos esperam que melhore o padrão de vida no \"reino eremita\". Embora muitos economistas tenham elogiado o início desse processo de reforma, outros levantaram preocupações sobre se a velocidade da reforma pode causar instabilidade em um país que se acostumou com uma economia totalmente planejada."
 korea.3.a: "Notícia encorajadora?"
 korea.4.t: "A Separação entre China e Coreia do Norte"
 korea.4.d: "As críticas ao regime de [NKO.GetLeader] nos meios de comunicação ligados ao governo chinês aumentaram drasticamente nas últimas semanas. Essas críticas atacaram o problema nuclear contínuo da Coreia do Norte e a falha do estado norte-coreano em melhorar a qualidade de vida de seus cidadãos por meio da liberalização econômica, assim como a China fez nas últimas décadas. Embora [CHI.GetLeader] tenha permanecido em silêncio sobre o assunto, acredita-se amplamente que essas organizações de mídia não teriam lançado tal crítica contundente a um aliado próximo sem a aprovação tácita de [CHI.GetLeader]. Muitos observadores veem isso como uma culminação da frustração chinesa com a dinastia Kim e possivelmente um desejo de estabelecer um governo alternativo mais estável e obediente aos desejos da China."
 korea.4.a: "Apenas [CHI.GetLeader] sabe para onde isso está indo..."
 korea.5.t: "As Negociações Iniciam"
 korea.5.d: "A principal demanda do Norte é que cessemos nossos exercícios militares conjuntos com os Estados Unidos, exercícios que eles veem como preparativos para uma invasão de seu território. No entanto, nossos militares veem esses exercícios como preparações necessárias em caso de um ataque norte-coreano. Concordar em interromper esses exercícios seria, portanto, um grande risco, no qual a segurança de nosso país estaria em jogo."
 korea.5.d_NKO: "A principal demanda do Sul é que paremos com os testes de armas nucleares, testes que eles veem como evidência de nossas intenções agressivas. No entanto, nosso programa de armas nucleares é visto pelo exército como um importante elemento dissuasor contra a invasão dos EUA. Além disso, o programa e os testes necessários para sua continuação ajudam a fortalecer a legitimidade de nosso governo. Concordar em interromper esses testes seria, portanto, um grande risco, no qual tanto a segurança de nosso país quanto a do nosso governo estariam em jogo."
 korea.5.a: "Nosso país nunca será completo novamente, a menos que corramos alguns riscos..."
 korea.5.b: "Alguns riscos são grandes demais para serem assumidos."
 korea.6.t: "Início das Negociações de Paz Coreana"
 korea.6.d: "Há mais de meio século, a Coreia do Norte e a Coreia do Sul estão tecnicamente em estado de guerra. Esse conflito congelado às vezes esquenta com confrontos entre os dois lados ao longo de fronteiras marítimas disputadas ou através da Zona Desmilitarizada. Agora, os dois lados estão se reunindo na esperança de pôr fim a essa situação e alcançar a desescalada na península coreana por meio de um tratado de paz formal. Negociar um tratado de paz é amplamente visto como um importante primeiro passo para reunificar a península coreana."
 korea.6.a: "Os dois lados podem chegar a um compromisso?"
 korea.7.t: "[CHI.GetLeader] Manifesta Apoio à Reunificação Coreana"
 korea.7.d: "A China historicamente tem sido cautelosa em relação à perspectiva de uma Coreia unida alinhada com os Estados Unidos em sua porta. Observadores ficaram surpresos ao ouvir [CHI.GetLeader] manifestar apoio incondicional à reunificação, em uma medida que, segundo algumas contas, pegou a liderança norte-coreana de surpresa. Dada a substancial influência da China em ambas as Coreias, este anúncio provavelmente pressionará os dois lados a se sentarem à mesa de negociações."
 korea.7.a: "A mudança está no ar?"
 korea.8.t: "Movimento radical coreano ganha popularidade"
 korea.8.d: "A desigualdade económica na República da Coreia contribuiu para a crescente insatisfação entre as classes mais baixas do país. Milhares de activistas online começaram a apelar a uma maior igualdade através do estabelecimento de autonomia a nível comunitário em toda a República da Coreia. Embora o movimento não tenha liderança e, portanto, careça de uma mensagem central e clara, a maioria dos seus membros parece desejar a abolição do Estado coreano e dos chaebols a que está ligado, em favor de um sistema que distribua o poder político e económico entre os eleitos directamente. representantes a nível comunitário.\n\nEsta nova ideologia, que rejeita as ideologias fundamentais tanto da República da Coreia como da RPDC, representa um afastamento significativo da política tradicional da esquerda radical sul-coreana, que ou promoveu políticas de esquerda dentro do sistema político existente na Coreia do Sul ou apelou ao estabelecimento de um estado ao estilo norte-coreano."
 korea.8.a: "Algo está acontecendo na República da Coreia..."
 korea.9.t: "Rebeldes no Sul Pedem Nosso Apoio"
 korea.9.d: "Representantes do Movimento Nacional de Libertação Coreana que buscam derrubar o governo no Sul vieram até nós solicitando uma aliança para abrir uma nova frente ao longo da ZDM."
 korea.9.a: "Nós nos juntaremos à luta deles!"
 korea.9.b: "Nós observaremos da margem."
 JUCHE_FACTION: "Frente Anti-Imperialista Coreana"
 korea.10.t: "Coreia do Sul solicita que encerremos nossa proteção ao Norte"
 korea.10.d: "Há algum tempo a Coreia do Sul tem se esforçado para mostrar que não é mais um país submisso aos interesses dos EUA. As relações entre nossos dois países estão em alta, enquanto nossas relações com o Norte têm estagnado em sua maioria. Agora uma delegação sul-coreana veio solicitar o fim do tratado de defesa entre nós e os norte-coreanos. Se concordarmos com o pedido deles, não mais iremos ajudar a Coreia do Norte em caso de invasão externa."
 korea.10.a: "Nós permaneceremos ao lado dos nossos aliados!"
 korea.10.b: "O Norte não vale nossa proteção."
 korea.11.t: "Empresas de Armas Coreanas Oferecem Produtos"
 korea.11.d: "A República da Coreia é conhecida por sua capacidade de produzir armas de alta qualidade a preços relativamente acessíveis. Devemos considerar se devemos comprar alguns de seus equipamentos, mas nossos fundos não são ilimitados, então devemos escolher com sabedoria."
 korea.11.a: "Comprar tanques coreanos."
 korea.11.b: "Comprar artilharia autopropulsada coreana."
 korea.11.c: "Comprar jatos treinadores coreanos."
 korea.11.e: "Comprar rifles de assalto coreanos."
 korea.11.f: "Recusar a oferta."
 korea.12.t: "[FROM.GetName] Aceita Acordo de Armas!"
 korea.12.d: "Os representantes deste país concordaram em importar armas de nós, aumentando nossa receita e nossa influência internacional."
 korea.12.a: "Nosso status internacional cresce!"
 korea.13.t: "Pequim e Seul Criticam Conjuntamente as Ações Japonesas na Segunda Guerra Mundial"
 korea.13.d: "Em uma atitude incomum, os governos da China e da República da Coreia emitiram uma declaração conjunta criticando as ações do Japão durante a guerra e sua subsequente recusa em se redimir completamente por elas. Muitos observadores interpretaram essa ação como parte dos esforços de Seul para afastar a China de seu apoio à Coreia do Norte. Embora Pyongyang tenha expressado apoio à condenação conjunta de [KOR.GetLeader] e [CHI.GetLeader], [NKO.GetLeader] estaria preocupada com sinais de que a China está favorecendo cada vez mais Seul."
 korea.13.a: "Nunca esqueceremos o que eles fizeram."
 korea.13.b: "Suas críticas são cansativas..."
 korea.13.c: "O passado projeta uma longa sombra..."
 korea.14.t: "China Anula Tratado de Defesa com a Coreia do Norte"
 korea.14.d: "Após a retirada da presença militar dos EUA da Coreia do Sul, a China concordou em se retirar de seu tratado de defesa com a Coreia do Norte, gerando condenação furiosa de Pyongyang. A decisão segue uma longa série de movimentos de Seul para ganhar o apoio da China e demonstrar sua autonomia de Washington. Alguns têm hipotetizado que agora que o caminho está livre para a reunificação forçada, [KOR.GetLeader] decidiu retomar o Norte pela força."
 korea.14.a: "Nossos esforços valeram a pena."
 korea.14.b: "Toleramos Pyongyang por tempo demais."
 korea.14.c: "A guerra está no horizonte?"
 korea.15.t: "[KOR.GetLeader] Exige Reparações do Japão"
 korea.15.d: "Após semanas de retórica antagonista de Seul e pressão de ativistas coreanos, [KOR.GetLeader] pediu ao Japão que pague reparações aos sobreviventes dos crimes de guerra japoneses cometidos durante a Segunda Guerra Mundial. O Japão, que afirma que a questão foi resolvida entre seu governo e o da Coreia do Sul durante o governo autoritário de Park Chung-hee, previsivelmente recusou-se a considerar pagar reparações.\n\nEmbora o incidente não tenha resultado em compensação para as vítimas coreanas, levou ao fortalecimento da posição política de [KOR.GetLeader] com muitos coreanos se unindo em torno dessa causa nacional extremamente emotiva."
 korea.15.a: "Um dia teremos justiça."
 korea.15.b: "Suas demandas são absurdas!"
 korea.15.c: "Será que o desacordo pode ser resolvido?"
 korea.16.t: "Guerra!"
 korea.16.d: "A guerra estourou entre nós e o Norte. Conforme nosso acordo com os Estados Unidos, agora devemos transferir o controle operacional de nossas forças armadas para o militar dos EUA."
 korea.16.a: "Devemos transferir o controle."
 korea.17.t: "A guerra acabou"
 korea.17.d: "A paz retornou à península coreana. Agora que voltamos às condições de tempo de paz, podemos reafirmar o controle sobre nossas forças armadas."
 korea.17.a: "Finalmente a paz."
 korea.18.t: "Eleições da Assembleia Nacional se aproximam enquanto os partidos começam a fazer campanha"
 korea.18.d: "Com as eleições da Assembleia Nacional se aproximando em cerca de um mês, devemos começar a impulsionar a popularidade de nosso partido para facilitar uma maioria na legislatura pelos próximos quatro anos."
 korea.18.a: "Esperemos por uma maioria!"
 korea.21.t: "Os resultados estão em!"
 korea.21.a: "Como sempre, foi uma eleição acirrada."
 korea.21.d_no: "Infelizmente, nenhum dos dois principais partidos conseguiu obter uma maioria na Assembleia Nacional. Nosso governo terá que lutar mais para conquistar legisladores de outros partidos a fim de aprovar legislação controversa."
 korea.21.d_con_loss: "Infelizmente, nosso partido não conseguiu garantir uma maioria na Assembleia Nacional. Legisladores liberais se recusarão a aprovar qualquer legislação que restrinja sindicatos, apoie grandes empresas ou promova antagonismo com a Coreia do Norte."
 korea.21.d_lib_loss: "Infelizmente, nosso partido não conseguiu garantir uma maioria na Assembleia Nacional. Legisladores conservadores se recusarão a aprovar qualquer legislação que restrinja grandes empresas, reforme o recrutamento e a inteligência, ou promova reconciliação com a Coreia do Norte."
 korea.21.d_con_win: "Felizmente, nosso partido conseguiu garantir uma maioria na Assembleia Nacional. A legislatura e o executivo poderão trabalhar de mãos dadas para facilitar objetivos conservadores, como limitar sindicatos, apoiar os chaebols e manter uma postura firme em relação à Coreia do Norte."
 korea.21.d_lib_win: "Felizmente, nosso partido conseguiu garantir uma maioria na Assembleia Nacional. A legislatura e o executivo poderão trabalhar de mãos dadas para facilitar objetivos liberais, como enfraquecer os chaebols, reformar o aparato de segurança e buscar a reunificação com o Norte."
 korea.22.t: "Choques da Reunificação Começam a se Manifestar"
 korea.22.d: "A grande nação da Coreia finalmente foi reunificada, após muitas décadas de dolorosa separação. No entanto, nossa tarefa de reintegrar as duas metades está longe de terminar. Muitos dos dois lados do paralelo 38 estão insatisfeitos com a forma como a reunificação aconteceu, e os custos econômicos de reunir dois estados muito diferentes estão se tornando rapidamente evidentes. Se falharmos em nossa tarefa de reunificar o país, podemos enfrentar a dissolução de nossa nação recém-nascida."
 korea.22.a: "Agora começa a parte difícil..."
 korea.23.t: "Nossa Resposta à Oferta de Paz do Sul"
 korea.23.d: "Depois de semanas de discussões, chegou a hora de decidirmos se estamos dispostos a aceitar a oferta de paz do Sul. Devemos considerar se confiamos na sinceridade da oferta do Sul, mas também como concordar com um tratado de paz será percebido por nossos apoiadores internos que ainda esperam reunificar o país pela força algum dia."
 korea.23.a: "Nós concordaremos com um tratado."
 korea.23.b: "Nunca haverá paz entre nós!"
 korea.24.t: "Acordo de Paz Coreano Assinado"
 korea.24.d: "Após uma melhora nas relações entre as duas Coreias, [KOR.GetLeader] do Sul e [NKO.GetLeader] do Norte concordaram em substituir o frágil Acordo de Armistício por um acordo de paz formal. Este tratado finalmente pôs fim ao estado de hostilidades que existia entre as duas Coreias desde a Guerra da Coreia. Ambos os líderes expressaram esperanças de que esse desenvolvimento coloque a península em um caminho rumo à reunificação, embora alguns observadores tenham expressado dúvidas sobre a disposição de perseguir a reunificação em ambos os lados."
 korea.24.a: "Um futuro brilhante se abre para a península!"
 korea.25.t: "Conversas Intercoreanas Colapsam"
 korea.25.d: "As conversas em Panmunjom entre [KOR.GetLeader] do Sul e [NKO.GetLeader] do Norte colapsaram devido a vários desacordos entre os dois lados. Embora o fato de haver alguns pontos de acordo tenha levado alguns a esperar um retorno às conversas no futuro, está claro que um acordo entre as duas Coreias não será alcançado em um futuro próximo."
 korea.25.a: "A paz continua elusiva..."
 korea.26.t: "Coreia do Sul propõe reunificação"
 korea.26.d: "Buscando capitalizar uma melhoria sem precedentes nas relações entre as duas Coreias, o Sul está oferecendo cooperar conosco para reunificar nossa nação dividida. No entanto, eles estão insistindo que o processo de reunificação será liderado pelo Sul, uma demanda que ameaça a cultura política única que desenvolvemos no Norte."
 korea.26.d1: "Buscando capitalizar uma melhoria sem precedentes nas relações entre as duas Coreias, o Sul está oferecendo cooperar conosco para reunificar nossa nação dividida. O Sul, entendendo nossas preocupações sobre a reunificação, ofereceu compartilhar o poder pós-reunificação por meio de um governo de unidade, incorporando elementos do Norte e do Sul."
 korea.26.a: "Nosso país será inteiro novamente!"
 korea.26.b: "A reunificação nunca pode acontecer nessas condições..."
 korea.27.t: "O Norte concordou com nossas condições para reunificação!"
 korea.27.d: "Após extensas negociações, o Norte concordou em começar a trabalhar para reunificar nossos dois países! Com as relações entre as duas Coreias estabilizadas e a reintegração da península no horizonte, o futuro do povo coreano nunca pareceu tão brilhante!"
 korea.27.a: "Notícia fantástica!"
 korea.28.t: "O Norte recusou nossas condições para reunificação!"
 korea.28.d: "Lamentavelmente, [NKO.GetLeader] optou por colocar sua própria posição egoísta antes da do povo coreano e rejeitou nossa oferta de cooperar na reunificação do país. Essa rejeição não significa que não possamos tentar novamente no futuro, mas significa que a reunificação não ocorrerá em um futuro próximo. Devemos lançar as bases para garantir que nossa próxima tentativa tenha maior sucesso."
 korea.28.a: "Um dia triste para o povo coreano..."
 korea.29.t: "China solicita a entrega dos restos mortais do pessoal do Exército de Voluntários Populares do Povo da China da Coreia do Sul para a China"
 korea.29.d: ""
 korea.29.a: "É claro que vamos. Respeitamos esses soldados."
 korea.29.b: "Eles são nossos inimigos e invasores da nossa terra! Não podemos aceitar isso!"
 korea.30.t: "Primeira Transferência de Restos Mortais dos Soldados do Exército de Voluntários Populares da China da ROK para a China"
 korea.30.d: "\nA primeira coleta consistiu em restos mortais encontrados por meio de escavações em múltiplas regiões como a Província de Gangwon e a Província de Gyeonggi. Muitos dos restos mortais eram não identificáveis. A primeira coleta foi inicialmente estimada para conter os restos mortais de 425 soldados, mas essa estimativa foi posteriormente aumentada para 437.\n\nChina e Coreia do Sul realizaram uma cerimônia de entrega desses restos mortais na Coreia no Aeroporto Internacional de Incheon. Representantes chineses e coreanos assinaram a carta de entrega lá. O lado coreano enviou vinte e dois veículos para transferir os restos mortais. Após os aviões especiais da Força Aérea Chinesa entrarem no espaço aéreo da China, dois J-11s vieram para escoltar."
 korea.30.a: "Saudação!"
 korea.31.t: "Sétima Transferência de Restos Mortais dos Soldados do Exército de Voluntários Populares da China da ROK para a China"
 korea.31.d: "A Coreia do Sul entregou 117 restos mortais no Aeroporto de Incheon. O Ministro dos Assuntos de Veteranos da China compareceu à cerimônia. Os restos mortais foram escavados no Morro da Flecha (local da Batalha do Cavalo Branco) na Zona Desmilitarizada da Coreia do Norte em 2019."
 korea.31.a: "Saudação!"
 korea.33.t: "Nossa Resposta à Oferta de Paz do Norte"
 korea.33.d: "Após semanas de discussões, chegou a hora de decidirmos se estamos dispostos a aceitar a oferta de paz do Norte. Devemos considerar se confiamos na sinceridade da oferta do Norte, mas também como concordar com um tratado de paz será percebido por aqueles de nosso povo que permanecem opostos a negociar com o regime norte-coreano."
 korea.34.t: "Coreia do Norte propõe reunificação"
 korea.34.d: "Buscando capitalizar uma melhoria sem precedentes nas relações entre as duas Coreias, o Norte está oferecendo cooperar conosco para reunificar nossa nação dividida. No entanto, eles estão insistindo que o processo de reunificação será liderado pelo Norte, uma demanda que ameaça o modo de vida que cultivamos no Sul."
 korea.34.d1: "Buscando capitalizar uma melhoria sem precedentes nas relações entre as duas Coreias, o Norte está oferecendo cooperar conosco para reunificar nossa nação dividida. O Norte, entendendo nossas preocupações sobre a reunificação, ofereceu compartilhar o poder pós-reunificação por meio de um governo de unidade, incorporando elementos do Sul e do Norte."
 korea.35.t: "O Sul concordou com nossos termos para reunificação!"
 korea.35.d: "Após extensas negociações, o Sul concordou em começar a trabalhar para reunificar nossos dois países! Com as relações entre as duas Coreias estabilizadas e a reintegração da península no horizonte, o futuro do povo coreano nunca pareceu tão brilhante!"
 korea.36.t: "O Sul recusou nossos termos para reunificação!"
 korea.36.d: "Lamentavelmente, [KOR.GetLeader] optou por colocar sua própria posição egoísta antes daquela do povo coreano e rejeitou nossa oferta de cooperar na reunificação do país. Essa rejeição não significa que não possamos tentar novamente no futuro, mas significa que a reunificação não ocorrerá em um futuro próximo. Devemos lançar as bases para garantir que nossa próxima tentativa tenha maior sucesso."
 korea.37.t: "Coreia obtém assento permanente no Conselho de Segurança da ONU"
 korea.37.d: "At today's UN Security Council meeting, the five permanent members agreed to Korea's application to become a new permanent member. Korea pledged to do its utmost to maintain world peace in accordance with its UN Charter obligations."
 korea.37.a: "Finalmente o mundo deu à Coreia alguma compensação pela divisão forçada."
 korea.38.t: "Coreia nos pede para retirar nossas tropas no Japão e na Coreia"
 korea.38.d: "A Coreia fez um pedido formal hoje para que retiremos nossas tropas no Japão e na Coreia."
 korea.38.a: "Não vamos atender às suas demandas injustas."
 korea.38.b: "Bem, talvez seja hora dos soldados voltarem para casa..."
 recognition.1.t: "[FROM.GetName] Recognizes the Breakaway"
 recognition.1.d: "[FROM.GetNameDef] has extended formal diplomatic recognition to the breakaway state on our territory. The decision is a setback for our claim to the region."
 recognition.1.a: "Não seremos divididos."
 recognition.3.t: "[FROM.GetName] Withdraws Recognition"
 recognition.3.d: "[FROM.GetNameDef] has reversed its earlier recognition of our sovereignty. Whatever the reason, the result is the same."
 recognition.3.a: "The struggle continues."
 recognition.4.t: "[FROM.GetName] Withdraws Recognition of the Breakaway"
 recognition.4.d: "[FROM.GetNameDef] has reversed its earlier recognition of the breakaway state on our territory. One fewer capital backs their claim to sovereignty."
 recognition.4.a: "A small victory for our position."
 recognition.7.t: "[FROM.GetName] Entra para as Nações Unidas"
 recognition.7.d: "After a sustained campaign for international recognition, [FROM.GetNameDef] has been admitted to the United Nations General Assembly as a member state."
 recognition.7.a: "Welcome to the General Assembly."
 recognition.8.t: "[FROM.GetName] Pressures Us to Recognize [pressured_to_recognize]"
 recognition.8.d: "[FROM.GetNameDef] is leveraging its influence over us to force recognition of [pressured_to_recognize]. Refusing a partner with this much leverage carries a real cost."
 recognition.8.a: "We extend recognition."
 recognition.8.b: "We refuse to recognize this regime."
 internal_faction.1.t: "O Exército está Solicitando um Aumento Orçamentário"
 internal_faction.1.d: "Citando novas ameaças à nossa segurança nacional, o exército solicitou um aumento no orçamento de defesa [ROOT.GetAdjective]. Conceder esse pedido aumentará a pressão sobre nosso orçamento, mas negá-lo reduzirá a opinião do exército sobre nosso governo."
 internal_faction.1.a: "Devemos dar a eles o dinheiro."
 internal_faction.1.b: "Não podemos arcar com essa despesa!"
 internal_faction.2.t: "Alguns Quadros do Partido Comunista Estão Envolvidos em Atividades Corruptas!"
 internal_faction.2.d: "Nossas agências de inteligência descobriram recentemente que alguns oficiais do partido comunista estão aceitando subornos e praticando nepotismo. Por um lado, não devemos permitir que tais atividades fiquem impunes se quisermos permanecer legítimos aos olhos do povo, mas por outro, tal ação certamente alienará muitos aliados importantes dentro do Partido Comunista."
 internal_faction.2.a: "Devemos fazer vista grossa."
 internal_faction.2.b: "Devemos dar um exemplo deles!"
 internal_faction.3.t: "Conglomerados Industriais Estão Solicitando Isenções Fiscais"
 internal_faction.3.d: "Os líderes de alguns dos maiores conglomerados industriais de [ROOT.GetName] estão fazendo lobby privado em nosso governo para que concedamos mais isenções fiscais a eles. Conceder essas isenções fiscais melhorará a opinião dos conglomerados industriais sobre nosso governo, mas reduzirá a receita de impostos em todo o país."
 internal_faction.3.a: "Devemos conceder as isenções fiscais."
 internal_faction.3.b: "Não podemos nos dar ao luxo de fazer tal concessão."
 isis.1.t: "Vitória sobre o Estado Islâmico"
 isis.1.d: "Agora que o Estado Islâmico foi derrotado, nosso país não será mais afligido pela propaganda extremista produzida pelo Estado Islâmico. Agora podemos nos concentrar em espalhar nossas ideias em nosso país e nunca mais permitir que extremistas tomem o controle novamente."
 isis.1.a: "Ótimo"
 isis.2.t: "Infiltrar-se em Tahrir al-Sham?"
 isis.2.d: "O Califado de todos os muçulmanos, [Root.GetLeader]. Devemos atacar o coração de nosso vil inimigo, Tahrir al-Sham, que se recusa a reconhecer seu justo e legítimo governo. Embora eles tenham se desviado do caminho do verdadeiro Islã e da gloriosa Jihad, eles têm muitos bons combatentes jihadistas em suas fileiras. Inshallah, devemos nos infiltrar neles e tentar fazer com que o máximo possível desertem para nosso glorioso Califado!"
 isis.2.a: "Vamos tentar influenciar verdadeiros combatentes a se afastarem deste falso grupo jihadista!"
 isis.2.b: "Não, não podemos arcar com a possível luta interna."
 isis.2.a_tt: "§HInfiltração falhou§! (Sem efeito)"
 isis.3.t: "Combatentes desertam para o Daesh"
 isis.3.d: "[Root.GetLeader]! O assim chamado Estado \"Islâmico\" nos infiltrou e conseguiu convencer alguns de nossos melhores combatentes a se juntarem ao ridículo pretexto de califado deles. Não devemos deixar isso sem resposta, devemos lutar e derrotar esses kharijitas que fazem takfir para todos os lados, enquanto usam o Sagrado Alcorão como papel higiênico."
 isis.3.a: "Nós, os jihadistas justos, os mataremos como cães!"
 isis.3.b: "Não, não podemos arcar com outra frente nessa guerra."
 isis.4.t: "Unidades de Tahrir al-Sham desertam"
 isis.4.d: "O Califa, muitos irmãos muwahhid justos e corajosos desertaram da malévola Frente Tahrir al-Sham e se juntaram à nossa causa!"
 isis.4.a: "Takbir! Takbir para o Estado Islâmico!"
 isis.4.a_tt: "Adiciona 2 §HBrigadas Jabat al-Nusra§! em §HRaqqa§!."
 isis.5.t: "Sinal de fraqueza de Tahrir al-Sham"
 isis.5.d: "O Califa, a nojenta Frente Tahrir al-Sham está mais fraca do que pensávamos, não fazendo nada contra nossa infiltração deles e as deserções recentes. O Conselho de Guerra Shura recomenda que matemos seus restos apodrecendo como cães e tomemos seu território - adicionando-o ao nosso glorioso Califado!"
 isis.5.a: "Ensine a esses jihadistas falsos quem é o verdadeiro sucessor do Sheik Osama!"
 isis.5.b: "O tempo deles chegará, mas por enquanto devemos esperar."
 isis.6.t: "Restos de Tahrir al-Sham se juntam ao nosso Califado"
 isis.6.d: "O Califa, o doce néctar da vitória está em nossos lábios. À beira da derrota, os restos de Tahrir al-Sham prestaram juramento de lealdade a você, [Root.GetLeader], e ao nosso sempre crescente Califado."
 isis.6.a: "Damos as boas-vindas aos nossos irmãos ao verdadeiro Califado!"
 isisNews.1.t: "Tahrir al-Sham se une ao ISIS"
 isisNews.1.d: "Com a pressão crescente sobre os islamistas sírios de Tahrir al-Sham, suas forças remanescentes prestaram juramento de lealdade ao ISIS em um último esforço desesperado para impor sua ideologia fundamentalista na Síria."
 isisNews.1.a: "Deus nos ajude a todos!"
 isis.7.t: "Oculto"
 isis.7.d: "Oculto"
 isis.7.a: "Oculto"
 isis.1301.t: "Abu Fatima Morto em Ataque Aéreo da Coalizão"
 isis.1301.d: "Más notícias, Califa! Seu bom amigo e companheiro iraquiano, Abu Fatima al-Jaheishi, foi corajosamente martirizado em um covarde ataque aéreo pelos americanos.\n\n                                               Ele matou muitos apóstatas.\n\n                                         Que Alá aceite seu martírio."
 isis.1301.a: "Vingaremos ele quando conquistarmos Washington DC!"
 isisNews.1301.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1301.d: "O terrorista iraquiano e comandante sênior do ISIS, Abu Fatima al-Jaheishi, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. Abu Fatima fazia parte do círculo interno de al-Baghdadi e atuava como vice-líder das partes controladas pelo ISIS no Iraque."
 isisNews.1301.a: "Boa Viagem!"
 isis.1302.t: "al-Sulami Morto em Ataque Aéreo da Coalizão"
 isis.1302.d: "Más notícias, Califa! O clérigo chefe Abu Sufyan al-Sulami foi martirizado em um covarde ataque aéreo pelos americanos. Ele veio até nós da terra do Bahrein e nos deu apoio religioso fundamental para nosso Califado.\n\n               Ó Califa, ele nos inspirou a todos com sua bela biografia sobre você.\n\n                                         Que Alá aceite seu martírio."
 isisNews.1302.t: "Líder Religioso do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1302.d: "O terrorista do Bahrein e líder religioso sênior do ISIS, Turki al-Binali, conhecido por seu nome de guerra \"Abu Sufyan al-Sulami\", foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Binali não era importante para o esforço militar do ISIS, mas era fundamental para fornecer apoio religioso ao grupo e escreveu a primeira biografia de Abu Bakr al-Baghdadi."
 isis.1303.t: "Comandante Morto em Ataque Aéreo da Coalizão"
 isis.1303.d: "Más notícias, Califa! O Emir de nossos lutadores albaneses e kosovares e comandante sênior, Lavdrim Muhaxheri, foi martirizado em um covarde ataque aéreo pelos cães americanos.\n\n                                                Ele matou muitos apóstatas.\n\n                                         Que Alá aceite seu martírio."
 isisNews.1303.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1303.d: "O terrorista kosovar e albanês e comandante sênior do ISIS, Lavdrim Muhaxheri, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. Muhaxheri lutou no Afeganistão ao lado da OTAN, mas foi radicalizado por volta de 2012 e viajou para a Síria. Em 2013, ele se juntou ao ISIS e rapidamente se tornou 'Emir' dos lutadores albaneses e kosovares na Síria e no Iraque. Ele era um bandido brutal que pessoalmente decapitava prisioneiros."
 isis.1304.t: "Comandante Morto em Ataque Aéreo da Coalizão"
 isis.1304.d: "O Califa, terríveis notícias! Nosso comandante militar de elite, Gulmurod Khalimov, foi martirizado em um covarde ataque aéreo pelos cães americanos. Antes de encontrar seu caminho até nós a partir das terras dos tajiques, ele era um oficial de forças especiais de alto escalão. Seu conhecimento militar fará muita falta.\n\n                                           Ele matou muitos apóstatas.\n\n                                          Que Alá aceite seu martírio."
 isisNews.1304.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1304.d: "O terrorista tajique e comandante sênior do ISIS, Gulmurod Khalimov, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. Khalimov era um oficial experiente e de alto escalão das forças especiais nas Forças Armadas do Tajiquistão antes de desertar para o ISIS."
 isis.1305.t: "Comandante Morto em Ataque Aéreo da Coalizão"
 isis.1305.d: "O Califa, terríveis notícias! Nosso chefe de operações de martírio e principal instrutor de Mujahid estrangeiros, Abdullah Ahmed al-Mashadani, foi martirizado em um ataque aéreo pelos cães americanos.\n\n                                                Ele matou muitos apóstatas.\n\n                                                  Que Alá aceite seu martírio."
 isisNews.1305.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1305.d: "O terrorista iraquiano e comandante sênior do ISIS, Abdullah Ahmed al-Mashadani, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Mashadani era fundamental para o esforço de guerra do ISIS, liderando operações de atentados suicidas e treinando jihadistas estrangeiros."
 isis.1306.t: "Comandante Martirizado em Ataque Aéreo da Coalizão"
 isis.1306.d: "Ó Califa, más notícias! Nosso governador da região do Centro Eufrates, Ahmed Khalal al-Juhayshi, foi martirizado em um ataque aéreo dos cães americanos.\n\n                                                Ele matou muitos apóstatas.\n\n                                                Que Alá aceite seu martírio."
 isisNews.1306.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1306.d: "O terrorista iraquiano e membro sênior do ISIS, Ahmed Khalal al-Juhayshi, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Juhayshi não era um comandante militar proeminente, mas um administrador e governador da importante região do Centro do Eufrates para o Estado Islâmico."
 isis.1307.t: "Comandante Morto em Ataque Aéreo da Coalizão"
 isis.1307.d: "O Califa, más notícias! Seu bom amigo e Chefe de Logística e Suprimentos, Fares Reif al-Naima, foi martirizado em um ataque aéreo pelos cães americanos. Ele era um mujahid corajoso e leal de longa data, lutando contra os infiéis e apóstatas desde 2003.\n\n                                 Ele matou muitos pela glória do Califado.\n\n                                         Que Alá aceite seu martírio."
 isisNews.1307.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1307.d: "O terrorista iraquiano e comandante sênior do ISIS, Fares Reif al-Naima, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Naima lutou contra as forças dos EUA na guerra do Iraque e, após ter sido detido pelas forças dos EUA em Camp Bucca junto com al-Baghdadi, ganhou destaque como Chefe de Logística e Suprimentos do Estado Islâmico."
 isis.1308.t: "Comandante Morto em Ataque Aéreo da Coalizão"
 isis.1308.d: "O Califa, más notícias! Abu Ahmad al-Alwani foi martirizado em um ataque aéreo pelos infiéis americanos. Ele era um oficial no Exército Iraquiano de Saddam Hussein e nos ajudou muito com sua visão após se juntar à insurgência sunita e ao nosso amado Estado Islâmico.\n\n                                                Ele matou muitos apóstatas.\n\n                                                  Que Alá aceite seu martírio."
 isisNews.1308.t: "Comandante do ISIS Morto em Ataque Aéreo da Coalizão"
 isisNews.1308.d: "O terrorista iraquiano e comandante sênior do ISIS, Abu Ahmad al-Alwani, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Alwani era um oficial no Exército Iraquiano de Saddam Hussein antes de se juntar à insurgência sunita contra as forças dos EUA. Ele rapidamente subiu nas fileiras do Estado Islâmico do Iraque até a posição de comandante sênior."
 isis.1309.t: "Comandante Morto em Ataque Aéreo da Coalizão"
 isis.1309.d: "O Califa, desastre! Nosso ministro da guerra e segundo em comando, Ayad al-Jumaili, foi bravamente martirizado em um covarde ataque aéreo pelos cães infiéis americanos. Um colega iraquiano, ele era um oficial sênior de inteligência sob Saddam Hussein e aplicou sua sabedoria sobre como manter o Califado a salvo de inimigos internos como nosso chefe de inteligência e segurança interna.\n\n                                                Ele matou muitos traidores.\n\n                                                Que Alá aceite seu martírio."
 isisNews.1309.t: "Comandante do ISIS Morto em Ataque da Coalizão"
 isisNews.1309.d: "O terrorista saudita e comandante sênior do ISIS, Abu Muhammad al-Shimali, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Shimali era um recrutador-chave e contrabandista para o Estado Islâmico. Além disso, relatórios de inteligência sugerem que ele desempenhou um papel fundamental em auxiliar os ataques de Paris em 2015."
 isis.1310.t: "Comandante Morto em Ataque da Coalizão"
 isis.1310.d: "O Califa, desastre! Nosso ministro da guerra e segundo em comando, Ayad al-Jumaili, foi bravamente morto em um covarde ataque aéreo pelos cães infiéis americanos. Um colega iraquiano, ele foi um oficial de inteligência sênior sob Saddam Hussein, e aplicou sua sabedoria para manter o Califado seguro de inimigos internos como nosso chefe de inteligência e segurança interna.\n\n                                               Ele eliminou muitos traidores.\n\n                                                Que Alá aceite seu martírio."
 isisNews.1310.t: "Segundo em Comando do ISIS Morto em Ataque da Coalizão"
 isisNews.1310.d: "O terrorista iraquiano e segundo em comando do Estado Islâmico, Ayad al-Jumaili, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Jumaili era um oficial de inteligência sênior sob Saddam Hussein, que se juntou à insurgência sunita após a ocupação dos EUA em 2003. Ele se tornou chefe de inteligência e segurança interna no Estado Islâmico, e posteriormente foi promovido a segundo em comando e ministro da guerra."
 isis.1311.t: "Comandante Morto em Ataque da Coalizão"
 isis.1311.d: "O Califa, más notícias! O comandante sênior Khairy Abed Mahmoud al-Taey foi morto em um ataque aéreo pelos infiéis americanos. Um colega iraquiano, ele era membro do nosso conselho militar e liderou operações com dispositivos explosivos improvisados (IED), semeando justamente o medo e o caos nos corações de nossos inimigos.\n\n                                               Ele eliminou muitos apóstatas.\n\n                                                 Que Alá aceite seu martírio."
 isisNews.1311.t: "Comandante do ISIS Morto em Ataque da Coalizão"
 isisNews.1311.d: "O terrorista iraquiano e comandante sênior do ISIS, Khairy Abed Mahmoud al-Taey, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. al-Taey fazia parte do conselho militar do ISIS e era responsável pelas operações com dispositivos explosivos improvisados (IED), semeando caos nas cidades atacadas pelo ISIS."
 isis.1312.t: "Comandante Morto em Ataque da Coalizão"
 isis.1312.d: "O Califa, más notícias! Seu amigo, conselheiro e comandante sênior, Abdul Wahid Khutnayer Ahmad, foi morto em um ataque aéreo pelos infiéis americanos. Um colega iraquiano, ele estava encarregado da segurança interna.\n\n                                        Ele descobriu muitos traidores e apóstatas.\n\n                                         Que Alá aceite seu martírio."
 isisNews.1312.t: "Comandante do ISIS Morto em Ataque da Coalizão"
 isisNews.1312.d: "O terrorista iraquiano e comandante sênior do ISIS, Abdul Wahid Khutnayer Ahmad, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. Khutnayer Ahmad era um conselheiro-chave de al-Baghdadi e estava encarregado da segurança interna."
 isis.1313.t: "Comandante Morto em Ataque da Coalizão"
 isis.1313.d: "O Califa, notícia terrível! Nosso comandante sênior, Abu Jihad Shishani, foi morto em um ataque aéreo pelos infiéis americanos. Ele veio das terras dos chechenos e lutou bravamente pela glória de Alá até o fim.\n\n                                               Ele eliminou muitos apóstatas.\n\n                                                Que Alá aceite seu martírio."
 isisNews.1313.t: "Comandante do ISIS Morto em Ataque da Coalizão"
 isisNews.1313.d: "O terrorista checheno e comandante sênior do ISIS, Abu Jihad Shishani, foi morto hoje em um ataque aéreo da coalizão liderada pelos EUA. Shishani, cidadão russo, era o segundo em comando do grupo terrorista Emirado do Cáucaso sob a liderança de Umar Shishani. Após Umar viajar para a Síria e se juntar ao ISIS, Abu Jihad tentou assumir o controle do Emirado do Cáucaso para se aliar ao ISIS, mas acabou viajando para a Síria para lutar pelo ISIS como comandante sênior também."
 isis.11301.t: "Abu Fatima Martirizado em Ataque Aéreo Russo"
 isis.11301.d: "Más notícias, Califa! Seu bom amigo e companheiro vice iraquiano, Abu Fatima al-Jaheishi, foi corajosamente martirizado em um covarde ataque aéreo pelos russos.\n\n                                               Ele matou muitos apóstatas.\n\n                                         Que Alá aceite seu martírio."
 isis.11301.a: "Vingaremos ele quando conquistarmos Moscou!"
