 GRE_eastern_vars_initialized: "Eastern Brotherhood track initialised"
 GRE_migration_deal_active: "Migration cooperation with Turkey is active"
 GRE_assertive_patrols: "Aegean assertive patrol regime is active"
 GRE_lost_continental_shelf_claims: "Conceded continental shelf claims to Turkey"
 GRE_aegean_de_escalation: "Backed down from Turkish ultimatum"
 GRE_confederation_active: "Confederation decision chain is active"
 GRE_confederation_autonomy_done: "Confederation autonomy structure agreed"
 GRE_confederation_economy_done: "Confederation economic distribution agreed"
 GRE_confederation_security_done: "Confederation security framework agreed"
 GRE_defending_sovereignty: "Defending Greek Sovereignty"
 GRE_defending_sovereignty_desc: "A sustained posture of military readiness focused on deterring Turkish encroachment in the Aegean and over Cyprus. The Hellenic Navy and Air Force maintain heightened vigilance, and defense spending consumes resources that might otherwise go to consumer goods. This targeted deterrent strengthens Greek resolve but imposes an economic cost."
 GRE_aegean_naval_supremacy: "Aegean Naval Supremacy"
 GRE_aegean_naval_supremacy_desc: "Forward-deployed patrols and a permanent surface presence give the Hellenic Navy the edge in the contested waters of the Aegean."
 GRE_migration_cooperation_idea: "EU-Turkey Migration Compact"
 GRE_migration_cooperation_idea_desc: "Turkey processes migrant flows on its own territory in exchange for Greek and EU concessions, easing the pressure on the Aegean islands."
 GRE_migration_crisis_idea: "Migration Crisis"
 GRE_migration_crisis_idea_desc: "Turkey has withdrawn from the migration compact, sending fresh waves of arrivals across the Aegean and overwhelming Greek reception facilities."
 GRE_confederation_category: "Cyprus Confederation"
 GRE_confederation_category_desc: "Resolve the structural questions of the proposed Cypriot confederation: autonomy, economic distribution, and security."
 GRE_eastern_missions_category: "Eastern Brotherhood Missions"
 GRE_eastern_missions_category_desc: "Recurring policy challenges arising from the Aegean and Cyprus tracks."
 GRE_decide_autonomy_level: "Decide Confederation Autonomy"
 GRE_decide_autonomy_level_desc: "Settle whether the new state will adopt a federal model with strong central institutions, or a looser confederation that grants each community broad self-government."
 GRE_decide_economic_distribution: "Decide Economic Distribution"
 GRE_decide_economic_distribution_desc: "Decide whether the federal budget will be apportioned on a parity basis between the two communities, or weighted by GDP contribution."
 GRE_decide_security_guarantees: "Decide Security Guarantees"
 GRE_decide_security_guarantees_desc: "Decide whether the reunified state will fall under the NATO security umbrella, or pursue a neutral defence posture."
 GRE_aegean_dialogue_mission: "Aegean Dialogue"
 GRE_aegean_dialogue_mission_desc: "Every six months, Greek and Turkish negotiators must decide how far to push their respective claims. The mission ends if dialogue collapses into open confrontation or war."
 greece.700.t: "Aegean Dialogue: Six-Month Review"
 greece.700.d: "The latest round of negotiations has reached a familiar fork. Turkish counterparts press for partial Greek concessions on the continental shelf in exchange for further de-escalation. Holding firm preserves our claims, but tempers will fray."
 greece.700.a: "Offer measured concessions"
 greece.700.b: "Hold the line"
 greece.701.t: "Ankara Walks Out of the Migration Compact"
 greece.701.d: "Citing Greek diplomatic posture, Turkish authorities have suspended cooperation on migrant returns and processing. New arrivals are already being reported across the Aegean islands; reception centres face a crisis within weeks."
 greece.701.a: "Brace for the influx"
 greece.702.t: "Aegean Incident"
 greece.702.d: "A Turkish patrol crossed into Greek-claimed airspace overnight. Hellenic interceptors intervened. There were no shots fired, but the closing distances were dangerously short. The decision now is whether to defuse or to push back harder."
 greece.702.a: "De-escalate"
 greece.702.b: "Escalate the response"
 greece.703.t: "Ankara Reinforces Northern Cyprus"
 greece.703.d: "Turkish state media has confirmed expanded support for the administration in Northern Cyprus. The move appears calibrated rather than provocative, a signal that Athens cannot pursue Cyprus on its own terms."
 greece.703.a: "Note for the record"
 greece.704.t: "Eastern Mediterranean Gas Crisis"
 greece.704.d: "Turkish drilling vessels have entered waters Greece and Cyprus consider an exclusive economic zone. Athens must decide whether to defuse the standoff or hold the field at the risk of a wider confrontation."
 greece.704.a: "Yield ground for now"
 greece.704.b: "Hold the field"
 greece.705.t: "Turkish Ultimatum"
 greece.705.d: "Ankara has issued a stern warning: continued Greek action over Cyprus will be met with unspecified but tangible consequences. The Foreign Ministry must answer."
 greece.705.a: "Step back from the brink"
 greece.705.b: "Refuse to be intimidated"
 greece.706.t: "Routine Airspace Incident"
 greece.706.d: "Another Turkish overflight has been logged and protested through the usual channels. The pattern continues, neither side wishing for escalation, neither willing to step back."
 greece.706.a: "File the protest"
 greece.710.t: "Confederation: Autonomy Question"
 greece.710.d: "Negotiators have placed two models on the table: a federal arrangement with strong central institutions, or a confederation that delegates most powers to the communities. The choice will define the new state's character."
 greece.710.a: "Federal model"
 greece.710.b: "Confederal model"
 greece.711.t: "Confederation: Economic Distribution"
 greece.711.d: "How will federal revenues be shared? Strict parity reassures the smaller community, but a GDP-weighted formula reflects economic reality and would be easier to defend domestically."
 greece.711.a: "Parity-based distribution"
 greece.711.b: "GDP-weighted distribution"
 greece.712.t: "Confederation: Security Framework"
 greece.712.d: "Will the reunified state fall under the NATO umbrella, or adopt a neutral defence posture? Each path has its supporters in Athens and Nicosia."
 greece.712.a: "NATO security umbrella"
 greece.712.b: "Neutral defence posture"
 greece.720.t: "Demands for Cypriot Union"
 greece.720.d: "After months of diplomatic maneuvering and pressure on Turkey, Athens is ready to issue formal demands for the union of Cyprus and Northern Cyprus with Greece. Greece has cultivated sufficient support among the Greek-Cypriot population and, if Turkey has backed down under international pressure, the Northern Cypriot leadership may also be persuaded. The moment of truth is at hand."
 greece.720.a: "Issue the demands"
 greece.721.t: "War Returns to Cyprus"
 greece.721.d: "One or both Cypriot governments have refused Greece's demands for union, and military conflict is imminent. Ankara has issued furious condemnations and warnings. The Turkish military maintains a ready posture but has not committed directly to intervention. The international community watches tensely to see whether Athens will commit its own armed forces or continue covert support."
 greece.721.a: "Note the reaction"
 greece.722.t: "How Far Will Athens Go? (Cyprus)"
 greece.722.d: "The Republic of Cyprus has rejected the union demand and military conflict is imminent. We can arm and supply pro-union Greek-Cypriot forces from the shadows with volunteers and materiel, or commit the Hellenic Armed Forces openly to enforce annexation. The first keeps Greece in NATO's good graces. The second puts Greek soldiers in combat, requires leaving the alliance, and may trigger direct Turkish intervention. But it also guarantees rapid conquest and the integration of the southern island."
 greece.722.a: "Volunteers and materiel only"
 greece.722.b: "Commit the Hellenic Armed Forces; declare war on Cyprus"
 greece.730.t: "NATO Pressure on Turkey"
 greece.730.d: "Athens approaches a NATO ally, requesting that they use diplomatic channels to persuade Turkey to moderate its aggressive posture in the Aegean. Such pressure from a Western power could persuade Ankara to reconsider its stance."
 greece.730.a: "Stand with Athens"
 greece.730.b: "This is not our quarrel"
 greece.731.t: "Allied Support Secured"
 greece.731.d: "Our NATO partner has agreed to engage Ankara on the matter of Aegean tensions. Diplomatic support from the West should help ease the standoff and vindicate our assertive stance."
 greece.731.a: "A diplomatic victory"
 greece.732.t: "Our Request Declined"
 greece.732.d: "The NATO ally has politely declined to enter into direct talks with Turkey over Aegean disputes. They prefer to remain neutral on bilateral maritime matters."
 greece.732.a: "We remain resolute"
 greece.733.t: "Cypriot Economic Integration Proposed"
 greece.733.d: "Athens proposes deep economic integration with the Republic of Cyprus, including a customs union, banking harmonization, and coordinated energy policy. Such ties would bind the island closely to the Greek economy while raising living standards in Nicosia."
 greece.733.a: "Integrate with Greece"
 greece.733.b: "Preserve our autonomy"
 greece.734.t: "Cyprus Accepts Integration"
 greece.734.d: "Nicosia has embraced the proposal. Greek and Cypriot businesses are now harmonizing regulations, banking systems are consolidating, and shared investment flows across the Aegean. The economic union strengthens Athens's hand in any future political settlement."
 greece.734.a: "Unity yields prosperity"
 greece.735.t: "Cyprus Declines Deep Integration"
 greece.735.d: "Nicosia has respectfully declined the offer of deep economic integration. The Republic of Cyprus prefers to maintain its independence in economic matters for now, even at the cost of slower growth."
 greece.735.a: "We remain committed"
 greece.736.t: "East Mediterranean Gas Development Proposed"
 greece.736.d: "Athens proposes joint development of offshore natural gas fields in the waters south of Cyprus and east of Crete. A shared extraction programme would boost both economies and generate long-term energy revenue."
 greece.736.a: "Develop the fields together"
 greece.736.b: "Too provocative for now"
 greece.737.t: "Cyprus Gas Fields Commence Operations"
 greece.737.d: "Greek and Cypriot drilling rigs have begun extracting natural gas from the joint fields. New refining capacity comes online and both economies benefit from sustained energy revenue. The move sends a signal to Ankara that the Greeks are willing to develop their Exclusive Economic Zone regardless of Turkish objections."
 greece.737.a: "Resources secure our future"
 greece.738.t: "Cyprus Rejects the Gas Venture"
 greece.738.d: "The Republic of Cyprus has declined to participate in joint gas development, fearing the diplomatic backlash from Turkey. Athens will not force the issue."
 greece.738.a: "A missed opportunity"
 greece.739.t: "Outreach to Turkish Cypriots"
 greece.739.d: "Athens extends an economic and cultural hand to the Turkish-Cypriot community in the north. Athens offers investment, trade privileges, and cultural exchange programmes, demonstrating that reunification under Greek auspices serves northern interests as much as the Greek Cypriot side."
 greece.739.a: "Accept Greek investment"
 greece.739.b: "We remain wary"
 greece.740.t: "Northern Cyprus Welcomes Investment"
 greece.740.d: "The Turkish-Cypriot leadership has accepted Greek investment and closer economic ties. Money flows north, business partnerships form, and influence shifts gradually in Athens's favour. The groundwork for eventual reunification grows firmer by the month."
 greece.740.a: "Seeds planted for unity"
 greece.741.t: "Northern Cyprus Rejects Outreach"
 greece.741.d: "The Turkish-Cypriot community, wary of Greek intentions, has declined the investment package. Ankara's support remains their shield, and Athens's overtures have not persuaded them otherwise."
 greece.741.a: "Another setback"
 greece.742.t: "Sovereign Bases Accord Proposed"
 greece.742.d: "Athens requests that the United Kingdom transfer control of the Sovereign Base Areas of Akrotiri and Dhekelia. In exchange, Greece offers compensation, continued NATO access, and guarantees to preserve British military facilities. Transfer of these bases would reshape the strategic balance on Cyprus."
 greece.742.a: "Cede the bases to Greece"
 greece.742.b: "The bases stay British"
 greece.743.t: "United Kingdom Agrees to Transfer"
 greece.743.d: "London has decided that transferring the bases serves both nations' long-term interests. Greek forces now occupy Akrotiri and Dhekelia, and Athens gains strategic depth and control over key airfields and harbours. The shift tips the military balance decisively in favour of Enosis."
 greece.743.a: "A historic acquisition"
 greece.744.t: "United Kingdom Declines Transfer"
 greece.744.d: "The British government has declined to relinquish the Sovereign Base Areas. They remain British territory and British military installations, as they have since 1960."
 greece.744.a: "Our hands are tied"
 GRE_western_commitment: "Greek Western Alignment"
 GRE_western_commitment_tt: "$GRE_western_commitment$: $RIGHT|+=0Y$"
 greece.745.t: "The Pressure Campaign Concludes"
 greece.745.d: "The campaign to pressure Turkey over Cyprus has concluded. Several great powers have voiced support for the Greek position, citing the need for stability in the Eastern Mediterranean and the rights of the Cypriot people. Athens now holds significant diplomatic leverage. Based on the number of allied voices, Ankara has a [GRE_GetTurkeyConcessionChance] chance of backing down and accepting reduced influence over Cyprus. If Turkey refuses, tensions will rise across the Aegean."
 greece.745.a: "See how Ankara responds"
 greece.724.t: "Athens Demands Union"
 greece.724.d: "The Greek government has formally demanded that the Republic of Cyprus submit to union with Greece. The offer is clear: join voluntarily, and the transition will be smooth and prosperous. Based on Greek-Cypriot sentiment and Turkish influence, the acceptance odds stand at [GRE_GetCyprusAcceptanceChance]. The government in Nicosia faces a historic choice."
 greece.724.a: "Accept union with Greece"
 greece.724.b: "Refuse the demand"
 greece.725.t: "Athens Demands the North Submit"
 greece.725.d: "Greece has now turned its attention to Northern Cyprus, demanding that the Turkish-Cypriot leadership accept union with Athens as well. The Turkish-Cypriot position is more complicated: the north has long relied on Turkish military protection and cultural ties. The acceptance odds stand at [GRE_GetNorthernCyprusAcceptanceChance], modulated by whether Turkey has backed down under NATO pressure and by the depth of Greek-Cypriot momentum. If Northern Cyprus refuses, the island remains divided and armed conflict becomes likely."
 greece.725.a: "Accept union with Greece"
 greece.725.b: "Seek Turkish protection; refuse the demand"
 greece.726.t: "How Far Will Athens Go?"
 greece.726.d: "Northern Cyprus refuses to submit voluntarily, and the Turkish-Cypriot government signals it will seek Turkish military support to resist absorption. Greece now faces a choice: continue covert aid to pro-union forces and hope the situation resolves peacefully, or commit the Hellenic Armed Forces directly to annex the north by force. Direct military action means leaving NATO, since the alliance will not back an offensive war to take territory from a NATO member's sphere of influence."
 greece.726.a: "Volunteers and materiel only"
 greece.726.b: "Commit the Hellenic Armed Forces; declare war on Northern Cyprus"
 greece.723.t: "Cyprus Reunified"
 greece.723.d: "The two Cypriot states have been unified under the Greek flag. Both southern and northern territories are now fully incorporated into Greece as cored states. For the first time since 1974, the island is whole under a single authority. This is the culmination of decades of Cypriot nationalism and Greek irredentist ambitions: enosis achieved at last."
 greece.723.a: "A historic day for Hellenism"
 GRE_turkey_concedes_tt: "Turkey backs down: its influence in Cyprus and Northern Cyprus falls substantially, Aegean tension eases, and Cyprus momentum rises."
 GRE_turkey_holds_firm_tt: "Turkey refuses to yield; Aegean tensions rise."
 GRE_gain_cyprus_tt: "The Republic of Cyprus is united with Greece and becomes cored Greek territory."
 GRE_gain_north_cyprus_tt: "Northern Cyprus is united with Greece and becomes cored Greek territory."
 GRE_enosis_demand_refused_tt: "Refusal draws international condemnation and forces Athens to choose how far to escalate; the crisis may end in war."
 GRE_eastern_neighborhood_setup_tt: "Opens the file on relations with Turkey and Cyprus; seeds Greek influence across the Cypriot communities."
 GRE_cypriot_economic_integration_reject_tt: "Cyprus rebuffs deeper economic integration; Greek-Cypriot momentum slips."
 GRE_northern_outreach_accept_tt: "Northern Cyprus accepts Greek investment and cultural exchange; influence and momentum grow."
 GRE_british_bases_accord_accept_tt: "Britain cedes the Sovereign Base Areas to Greece; Greece grants military access to British forces. The territory can be fully integrated once local compliance is high enough."
 GRE_british_bases_accord_reject_tt: "Britain declines to cede the Sovereign Base Areas."
 GRE_integrate_sovereign_bases: "Integrate the Sovereign Base Areas"
 GRE_integrate_sovereign_bases_desc: "Akrotiri and Dhekelia came to us as occupied ground, not Greek soil. Winning over the local population and settling the administration will let us claim the bases as a full and permanent part of the Hellenic Republic."
 GRE_sovereign_bases_compliance_tt: "Compliance in the Sovereign Base Areas is above 80%"
 GRE_integrate_sovereign_bases_effect_tt: "Greece gains a core on the Sovereign Base Areas"
 GRE_defense_innovation_funding_tt: "Each research grant is funded from the treasury (deferred into national debt while payments are deferred)"
 GRE_cyprus_reunification_accept_tt: "Cyprus and Northern Cyprus join Greece and are fully integrated as cored Greek territory."
 GRE_cyprus_reunification_reject_tt: "The Cypriot governments remain independent; a small opinion penalty towards Greece."
