 formable_buy.1.t: "来自[?formable_offer_buyer_id.GetNameDef]的领土提议"
 formable_buy.1.d: "[?formable_offer_buyer_id.GetNameDef]已经正式向我们的政府提出以§H£treasury 10B§!以换取[?formable_offer_state_id.GetName] - 他们声称该地区是其历史核心领土。\n\n我们的内阁必须做出决定：接受这笔款项并放弃土地，还是拒绝这一提议并保持领土完整。"
 formable_buy.1.a: "我们无法拒绝的提议。"
 formable_buy.1.b: "我们的土地不予出售。"
 formable_buy.2.t: "[?formable_offer_holder_id.GetNameDef]接受我们的提议"
 formable_buy.2.d: "[?formable_offer_holder_id.GetNameDef]已将[?formable_offer_state_id.GetName]移交给我方管理。资金已交付，该地区现已归我方所有。"
 formable_buy.2.a: "值得的投资。"
 formable_buy.3.t: "[?formable_offer_holder_id.GetNameDef]拒绝我方提议"
