 SOO_defence_doctrine: "防衛ドクトリン"
 SOO_invervention_rus: "ロシアの軍事介入ドクトリン"
 SOO_help_ossetia_SOV: "§Y[SOO.GetNameWithFlag]§!への投資"
 SOO_help_ossetia_SOV_desc: "この国家自体がそれを行うことができないため、南オセチアの予算を財政的に支援するだろう。追加収入: $§R-0.120§!"
 SOO_help_ossetia: "§Y[SOV.GetNameWithFlag]§!からの投資"
 SOO_help_ossetia_desc: "ロシアは財政的に我々を提供し、これにより経済は持ちこたえることができる。追加収入: $§G0.120§!"
 SOO_develop_turism: "観光開発"
 SOO_develop_turism_desc: "国庫に追加収入をもたらしてくれる観光産業を開発する。追加収入: $§G0.100§!"
 SOO_Mamison_path: "マミソン峠"
 SOO_Mamison_path_desc: ""
 SOO_hydroelectric_dams: "マイクロ水力発電システム"
 SOO_Tskhinvali_district: "ツヒンヴァリ地区"
 SOO_GAS_Electrical_lines: "ガス・電力線"
 SOO_Java_townlet: "ジャヴァ小町"
 SOO_reinforced_roads: "強化された道路"
 SOO_subsidise_the_Farmers: "農民への補助金"
 SOO_subsidise_the_Farmers_desc: "我が国は非常に貧しい国です。予算を捻出するために、あらゆる機会を活用する必要があります。私たちは農家の人々を刺激するよう努めます。"
 SOO_Roki_Tunnel_tollage: "ロキトンネル修復"
 SOO_Roki_Tunnel_tollage_desc: "このトンネルはロシアとの唯一の連絡路なので、修復する必要がある。"
 SOO_Tskhinvali_gas_and_electricity_network: "ツヒンヴァリの\nエネルギー供給"
 SOO_Tskhinvali_gas_and_electricity_network_desc: "私たちはツヒンヴァリに必要なエネルギーをすべて提供します。"
 SOO_Move_towards_cash_crop_growth: "対露貿易回転率増加"
 SOO_Move_towards_cash_crop_growth_desc: "我々はロシアへの農産物供給量を増やす準備ができている。"
 SOO_Rural_Revitalization: "インフラ復旧投資"
 SOO_Rural_Revitalization_desc: "長年にわたって荒廃してしまった道路を修復する必要がある。"
 SOO_konserv_zavod: "缶詰工場開設"
 SOO_konserv_zavod_desc: "私たちは自国に缶詰工場を開設し、人々に雇用を提供するとともに、健全な利益を生み出します。"
 SOO_Redevelop_the_Mamison_Pass: "マミソン峠再開発"
 SOO_Redevelop_the_Mamison_Pass_desc: "マミソン峠は、オセチアとロシアの国境にある険しい山道である。1854年から1889年にかけてロシア帝国によって建設されたオセチア軍用道路がこの峠を横断しているが、今日ではトランスコーカサス街道の陰に隠れてしまっている。"
 SOO_The_Ergneti_market: "エルグネティ市場"
 SOO_The_Ergneti_market_desc: "エルグネティは、国境を挟んでジョージア側に位置するツヒンヴァリ郊外の村である。かつては地元のジョージア人が安価なロシア製品を購入する場所だったこの市場は、今や農産物から工業製品まであらゆる商品が取引される巨大な闇市場へと発展した。エルグネティ市場は、数千人ものオセチア人とジョージア人にとって、最も安定した持続可能な収入源となっている。"
 SOO_Sponsor_the_Georgian_grey_market: "ジョージアの\nグレーマーケット後援"
 SOO_Sponsor_the_Georgian_grey_market_desc: "グルジアのグレーマーケットは、この地域に流入するロシア製品の洪水から生まれたもので、その大部分はトランスコーカサス街道からオセチア国境を越えて流入している。グレーマーケットを支援することは、我が国のような財政難の国にとって、未開拓の収入源となる可能性がある。"
 SOO_fostering_economic_ties: "経済的絆の育成"
 SOO_fostering_economic_ties_desc: "エルグネティは、南オセチアとジョージア間の平和構築の礎となってきた。安定した成長路線を維持するためには、ジョージア国家との関係をより緊密にする機会を捉える必要がある。"
 SOO_tourism: "南オセチア観光"
 SOO_tourism_desc: "我が国には美しい景観と景色が広がっています。観光客がこの美しさを堪能できるよう、必要なインフラを整備する時が来ました。"
 SOO_A_Shifting_market: "変化する市場"
 SOO_A_Shifting_market_desc: "グルジア政府は市場を閉鎖しました。私たちは国の将来を見据え、この問題に取り組まなければなりません。多くの人が職を失う中、ロシアからの援助を増やし、密輸品やその他の違法な取引源に重点を置くことで、適応せざるを得ない状況です。"
 SOO_Host_transit_tax: "通過税主催"
 SOO_Host_transit_tax_desc: "エルグネティ市場は依然として闇市場として運営されている。未開拓の収入源を確保するため、国境のオセチア側に通過税を導入することが考えられる。これは多くの人にとって歓迎されない負担となるかもしれないが、税収は国境を越えた隣国に流出することなく、自国に留まることになる。"
 SOO_Promote_contraband: "密輸促進"
 SOO_Promote_contraband_desc: "ジョージア政府による市場閉鎖を受け、私たちは他の手段で収入を得る必要に迫られています。国境の両側の住民の多くは、ジョージアによる市場閉鎖に憤慨しています。そのため、私たちは密輸品の取引に手を染めざるを得なくなっています。"
 SOO_regulate_the_market: "市場規制"
 SOO_regulate_the_market_desc: "市場規制は違法行為を根絶するために必要不可欠である。これにより、変化の時や緊張が高まる時でも、グルジア側が市場を開放し続けることがより魅力的な選択肢となるだろう。"
 SOO_Districted_Oversight: "地区監督"
 SOO_Districted_Oversight_desc: "この新たな政権の発足に伴い、グルジア領土の統治機関は、住民をオセチア国家の慣習と法律に統合するプロセスを開始しなければならない。"
 SOO_Resilient_Commerce: "回復力のある商業"
 SOO_Resilient_Commerce_desc: "我々は経済的な潜在力を拡大するために、これまで以上に積極的に貿易を行う。"
 SOO_Raise_Import_Tariffs: "輸入関税引き上げ"
 SOO_Raise_Import_Tariffs_desc: "国庫収入を増やすため、輸入関税を引き上げる。"
 SOO_the_Russian_bankroll: "ロシア銀行受け入れ"
 SOO_the_Russian_bankroll_desc: "我が国の経済を支えるためには、ロシアの銀行が我が国市場に参入することを認めざるを得ないだろう。"
 SOO_new_developments_in_Kvaisa: "オセチアのエネルギー"
 SOO_new_developments_in_Kvaisa_desc: "エネルギー安全保障を確保するため、発電所の建設に着手する。"
 SOO_Boost_the_local_flour_production: "小麦粉生産への投資"
 SOO_Boost_the_local_flour_production_desc: "我が州は、地元の小麦粉生産を皮切りに、あらゆる農業分野に投資すべきである。"
 SOO_Tractor_Imports: "トラクターの輸入"
 SOO_Tractor_Imports_desc: "農業部門のニーズを満たすため、トラクターを輸入する予定です。"
 SOO_Forestry_Development: "林業"
 SOO_Forestry_Development_desc: "私たちは林業を再び発展させるために尽力します。"
 SOO_increase_tolls_on_Roki_Tunnel: "ロキトンネルからの\n通行料増加"
 SOO_increase_tolls_on_Roki_Tunnel_desc: "ロキトンネルの通行料金を値上げします。"
 SOO_South_Ossetian_State_University: "南オセチア国立大学"
 SOO_South_Ossetian_State_University_desc: "我が国には最高の頭脳が必要だ。高等教育への投資こそが、我々の未来を確かなものにする。"
 SOO_Dzuarikau_Tskhinvali_pipeline: "修復された石油\nパイプライン"
 SOO_Dzuarikau_Tskhinvali_pipeline_desc: "このガスパイプラインは、我々のエネルギー供給にとって不可欠だ。"
 SOO_Develop_Tskhinvali: "ツヒンヴァリの\nインフラ"
 SOO_Develop_Tskhinvali_desc: "ツヒンヴァリの地方道路は明らかに修繕が必要な状態だ。"
 SOO_Develop_Java: "ジャヴァの復興"
 SOO_Develop_Java_desc: "この集落は財政的な投資も必要としている。"
 SOO_Revive_soviet_era_works: "ソビエト遺産の復活"
 SOO_Revive_soviet_era_works_desc: "今こそ、長年にわたって失われ、破壊されてきたもの――ソ連の遺産――を回復する時だ。"
 SOO_Develop_Gori: "ゴリの開発"
 SOO_Develop_Gori_desc: "我が共和国の新たな領土もまた開発されなければならない。"
 SOO_private_sector: "民間部門"
 SOO_private_sector_desc: "我々は共和国全土において民間セクターの発展を促進する。"
 SOO_Geared_for_hardship: "開発の困難"
 SOO_Geared_for_hardship_desc: "経済、特に農業の発展と活性化には、まだまだ長い道のりが残されている。"
 SOO_Gori_Tskhinvali_rail_link: "ゴリ＝ツヒンヴァリ\n輸送路"
 SOO_Gori_Tskhinvali_rail_link_desc: "我々は新たな領土を共和国の他の地域と繋げるつもりだ。"
 SOO_Ministry_of_internal_affairs: "内務省"
 SOO_Ministry_of_internal_affairs_desc: "我々の共和国は、安らかに眠れるべきだ。"
 SOO_Reinforce_Parliamentary_administration: "議会指導部の交代"
 SOO_Reinforce_Parliamentary_administration_desc: "政治の世界には新しい人材が必要な時が来た。"
 SOO_Dismantle_Parliamentary_Dominance: "議会支配の解体"
 SOO_Dismantle_Parliamentary_Dominance_desc: "議会だけが国を統治すべきではない。"
 SOO_Downplay_opposition_forces: "反対派の弾圧"
 SOO_Downplay_opposition_forces_desc: "現在の形態の野党は、わが共和国とその安定を脅かしている。"
 SOO_banner_of_the_people: "人民の旗"
 SOO_banner_of_the_people_desc: "オセチアの真の息子たちは国を守る準備ができている"
 SOO_Political_independent: "政治的独立"
 SOO_Political_independent_desc: "私たちの政策は、特定の個人や集団の影響を受けにくくなるでしょう。"
 SOO_Defenders_of_the_Fatherland: "祖国の防衛"
 SOO_Defenders_of_the_Fatherland_desc: "戦闘員は最後まで祖国のために戦うだろう"
 SOO_Evaluate_the_existing_constitution: "現行憲法の評価"
 SOO_Evaluate_the_existing_constitution_desc: "そろそろ現行の憲法を改正する時期なのかもしれない。"
 SOO_Allow_presidential_constitution_changes: "大統領による憲法改正"
 SOO_Allow_presidential_constitution_changes_desc: "大統領は憲法に関して独自のビジョンを持っている。"
 SOO_The_Regal_Relinquishment: "新しい政治生活"
 SOO_The_Regal_Relinquishment_desc: "今こそ、我が共和国の政治情勢に新たな息吹を吹き込む時だ。"
 SOO_Reform_the_distribution_of_farmland: "農業改革"
 SOO_Reform_the_distribution_of_farmland_desc: "私たちの主な収入源は農産物です。この産業を賢明に改革しなければなりません。"
 SOO_The_Kremlin_state: "親クレムリン姿勢"
 SOO_The_Kremlin_state_desc: "ロシア以外に同盟国はもういない。"
 SOO_Ossetian_Patriotism_Reforms: "オセット愛国主義"
 SOO_Ossetian_Patriotism_Reforms_desc: "誰もが自らの義務を自覚し、祖国のために戦う覚悟を持つべきだ。"
 SOO_adopted_a_new_constitution: "新憲法"
 SOO_adopted_a_new_constitution_desc: "今こそ新しい憲法を制定する時だ。"
 SOO_Enduring_the_Sovereignty_Fight: "独立闘争の継続"
 SOO_Enduring_the_Sovereignty_Fight_desc: "ロシアの一部でない限り、我々は独立のために戦わなければならない。"
 SOO_pro_russian: "親ロシア路線"
 SOO_pro_russian_desc: "私たちの究極の目標は、北オセチアの兄弟たち、そしてロシアとの再統一です。"
 SOO_integrate_to_russian_army: "ロシア軍への統合"
 SOO_integrate_to_russian_army_desc: "我々はロシア軍への完全統合に向けて準備ができている。"
 SOO_referendum: "ロシアへの編入\n住民投票"
 SOO_referendum_desc: "私たちは長い間この目標に向けて努力してきました。今こそ国民投票を実施する時です。"
 SOO_invest: "経済への投資"
 SOO_invest_desc: "ロシアは我が国の経済に惜しみなく投資する用意がある。"
 SOO_rosbanks: "ロシア銀行"
 SOO_rosbanks_desc: "ロシアの銀行は我が国への進出準備を進めている。これは我が国の経済を強化するだろう。"
 SOO_inverv_warfrare: "ロシアの軍事介入\nドクトリン"
 SOO_inverv_warfrare_desc: "我々は自国の軍事ドクトリンに従い、世界の紛争に積極的に参加する。"
 SOO_fight_start: "オセチア自由のための\n戦い開始"
 SOO_fight_start_desc: "タデエフ一族は長年にわたり我が国を恐怖に陥れてきた。今こそ彼らに対処すべき時だ。"
 SOO_fight_narcota: "麻薬流通停止"
 SOO_fight_narcota_desc: "麻薬密売に関与しているテデーエフ関係者全員を排除するだろう"
 SOO_fight_contrabanda: "違法密輸の克服"
 SOO_fight_contrabanda_desc: "The Tadeev smuggling networks will be destroyed forever."
 SOO_fight_alchohol: "違法アルコールの取り締まり"
 SOO_fight_alchohol_desc: "我が国では、違法なアルコール飲料はもはや流通しなくなる。"
 SOO_fight_reket: "恐喝の克服"
 SOO_fight_reket_desc: "我々は、彼らが我が国の起業家から金銭を脅し取ろうとする企みを阻止する。"
 SOO_fight_orujie: "武器密輸ルート破壊"
 SOO_fight_orujie_desc: "武器が我が国を違法に通過することはもうなくなる。"
 SOO_fight_tamojnia: "腐敗税関職員排除"
 SOO_fight_tamojnia_desc: "弊社は、税関業務において不誠実な従業員を全員解雇します。"
 SOO_fight_kgb: "KGBの汚職対処"
 SOO_fight_kgb_desc: "KGB内部にさえ、タデエフ兄弟は賄賂で買収できる人物を見つけ出していた。もうこんなことは終わりにすべきだ。"
 SOO_fight_minor: "教育省から\n腐敗官僚排除"
 SOO_fight_minor_desc: "タデエフ一族最後の情報提供者は教育省に潜伏しており、一族はそれによって国内における足がかりを築いている。今こそ彼女を始末する時だ。"
 SOO_end_fight: "国を解放せよ"
 SOO_end_fight_desc: "ようやく、我が国は安堵のため息をつくことができる。"
 SOO_prepare_for_war: "戦争への準備"
 SOO_prepare_for_war_desc: "戦争は避けられない。我々はそれに備えなければならない。"
 SOO_call_abkhazia: "アブハジアへの訴え"
 SOO_call_abkhazia_desc: "我々とアブハジア人は、グルジアからの脅威に対抗するために団結しなければならない。"
 SOO_establish_connection_with_kavkaz: "チェチェンとの連合"
 SOO_establish_connection_with_kavkaz_desc: "もしかしたら、チェチェン人は90年代のように、また私たちを助けてくれるかもしれない。"
 SOO_ossetia_at_war: "戦場経験"
 SOO_ossetia_at_war_desc: "今まさに、戦場で、我々はより強く、より経験豊富になっている"
 SOO_lessons_from_war: "戦争の教訓"
 SOO_lessons_from_war_desc: "この戦争の経験は、私たちに多くのことを教えてくれた。"
 SOO_new_defences: "新軍事投資"
 SOO_new_defences_desc: "我々は軍事分野への投資を増やす。"
 SOO_doctrine_update: "更新された軍事\nドクトリン"
 SOO_doctrine_update_desc: "我々の軍事ドクトリンには、若干の調整が必要だ。"
 SOO_north_ossetia_ratnik: "軍隊へ「ラトニク」\n完全装備"
 SOO_north_ossetia_ratnik_desc: "ロシアの軍事装備は我が軍にとって最良の選択肢となるだろう"
 SOO_submission_to_the_russian_doctrine: "ロシア・ドクトリン\nへの服従"
 SOO_submission_to_the_russian_doctrine_desc: "完全にロシアのドクトリンに切り替えるだろう"
 SOO_Gori_pereseleniye: "ゴリへの入植"
 SOO_Gori_pereseleniye_desc: "我々は自国民がこの地域に定住することを許可する。"
