l_simp_chinese:
 algeria_focus: "阿尔及利亚国策树"
 ALG_political_tree_shortcut: "政治国策树"
 ALG_foreign_policy_shortcut: "外交政策"
 ALG_industry_shortcut: "经济复苏"
 ALG_military_shortcut: "阿尔及利亚军队"
 ALG_the_nation_stands_at_a_crossroads: "十字路口的国家"
 ALG_restore_the_presidency_desc: "政治动荡之后，总统权力遭到削弱。现在是时候恢复民选领导人的权威，重建已被侵蚀的民主规范了。通过重建总统制，我们可以为政府带来稳定和信心。"
 ALG_emergency_rule_continues: "§R紧急状态令继续有效§!"
 ALG_emergency_rule_continues_desc: "国家仍处于动荡之中，政府决定延长紧急状态。虽然此举对于维护秩序是必要的，但却损害了公民自由和民主进程。我们必须谨慎行事，才能渡过这片动荡的水域。"
 ALG_national_reconciliation: "民族和解"
 ALG_national_reconciliation_desc: "为了弥合分裂与冲突造成的创伤，我们必须走上民族和解之路。通过促进各派之间的对话，解决彼此的不满，我们可以建设一个更加团结的社会，为持久和平奠定基础。"
 ALG_moderate_islamist_talks: "与温和伊斯兰主义者对话"
 ALG_moderate_islamist_talks_desc: "为了弥合分歧、促进稳定，我们正与温和派伊斯兰派别展开对话。我们希望通过建设性对话，寻求共同点，并创造一个多元声音能够和平共处的政治环境。"
 ALG_charter_for_civil_peace: "公民和平宪章"
 ALG_charter_for_civil_peace_desc: "为确保持久稳定与社会和谐，我们提议制定《公民和平宪章》。该文件将阐明所有公民的权利和义务，促进社会各群体间的宽容、理解与合作。"
 ALG_open_democratic_path: "开启民主之路"
 ALG_open_democratic_path_desc: "现在是时候全面拥抱民主，开辟通往更美好未来的道路了。通过实施赋予公民权力、促进政治参与的改革，我们可以创建一个充满活力、真正反映人民意愿的民主社会。"
 ALG_clamp_down_on_extremism: "镇压极端主义"
 ALG_clamp_down_on_extremism_desc: "政府将利用军事法庭和情报力量，消除所有剩余的极端伊斯兰主义和政治威胁。"
 ALG_counterterrorism_program: "反恐计划"
 ALG_counterterrorism_program_desc: "必须建立一套现代化的安全机制，以便在威胁破坏阿尔及利亚稳定之前，追踪、渗透并消除这些威胁。"
 ALG_authoritarian_restoration: "威权复辟"
 ALG_authoritarian_restoration_desc: "只有通过强有力的中央集权统治才能保障稳定。军队将全面掌控国家的未来。"
 ALG_the_crisis_reignites: "§4危机重燃§!"
 ALG_the_crisis_reignites_desc: "我们采取的政治镇压行动非但没有缓和紧张局势，反而加剧了局势。伊斯兰极端组织正在重新武装，叛乱的迹象再次出现。"
 ALG_gia_and_fis_resurge: "阿尔及利亚武装伊斯兰组织与伊斯兰救国阵线再起"
 ALG_gia_and_fis_resurge_desc: "阿尔及利亚武装伊斯兰集团的残余势力和被禁的伊斯兰救世阵线的政治伊斯兰主义者现在呼吁发动武装起义。"
 ALG_counterterrorism_agency: "反恐机构"
 ALG_extremism_crackdown_modifier: "打击极端主义"
 ALG_extremism_crackdown_modifier_desc: "为应对企图破坏国家稳定的极端主义团体日益增长的威胁，我们正在实施全面打击极端主义的行动。这项行动旨在瓦解极端主义网络，加强监控，并提升执法能力。通过倡导宽容和理解的文化，我们希望在保障公民安全的同时，从根源上解决极端主义问题。通过这些措施，我们将促进社会更加团结，并捍卫我们的民主价值观。"
 ALG_algeria_slides_into_civil_war: "阿尔及利亚陷入内战"
 ALG_algeria_slides_into_civil_war_desc: "我们试图避免的冲突如今再次爆发。武装叛军在内陆各地起义，军队不得不再次为争夺国家控制权而战。"
 ALG_civilwar.1.t: "伊斯兰势力宣布圣战"
 ALG_civilwar.1.d: "激进伊斯兰主义指挥官呼吁对政权发动新一轮圣战，并召集支持者和原有组织。冲突再度燃起。"
 ALG_civilwar.1.a: "动员军队！"
 ALG_military_regime_restored: "军政府复辟"
 ALG_military_regime_restored_desc: "经过多年的政治动荡，军方重新掌控了局势，恢复了秩序。该政权着重强调纪律、国家安全和严格治理，以重建国家实力和团结。"
 ALG_reconciliation_path_category: "民族和解"
 ALG_reconciliation_path_category_desc: "\n£AFG_menu1\n\n\n\n为了弥合分裂与冲突造成的创伤，我们必须走上民族和解之路。通过促进各派之间的对话，解决彼此的不满，我们可以建设一个更加团结的社会，为持久和平奠定基础。"
 ALG_pardon_moderate_islamist: "赦免温和派伊斯兰主义者"
 ALG_pardon_moderate_islamist_desc: "以前的非暴力伊斯兰主义者可以获得有条件的特赦，条件是解除武装并放弃政治暴力。"
 ALG_initiate_national_dialogues: "启动全国对话"
 ALG_initiate_national_dialogues_desc: "将成立一个全国性论坛，让前叛军、政党和民间社会参与建设一个崭新的阿尔及利亚。"
 ALG_reintegrate_former_fighter: "重新整合前战斗人员"
 ALG_reintegrate_former_fighter_desc: "一项旨在通过工作、住房或国家服务帮助投降叛乱分子重新融入平民生活的计划。"
 ALG_crackdown_category: "威权镇压"
 ALG_crackdown_category_desc: "\n£TAJ_desctext_pamir\n\n\n\n为了确保国家稳定，我们必须打击颠覆分子，加强内部安全力量。"
 ALG_arrest_political_opponents: "逮捕政敌"
 ALG_arrest_political_opponents_desc: "我们将通过将激进政治人物清除出公共领域来消除内部威胁。"
 ALG_expand_surveillance_services: "扩展监控服务"
 ALG_expand_surveillance_services_desc: "强大的情报网络将监控民众，并在动乱蔓延之前加以阻止。"
 ALG_ban_opposition_parties: "查禁反对党"
 ALG_ban_opposition_parties_desc: "凡不以国家团结为目标的政党，都将被禁止参与政治活动。"
 ALG_economic_recovery_category: "经济复苏计划"
 ALG_economic_recovery_category_desc: "\n£MAIN_desctext_dept\n\n\n\n国际货币基金组织提供有条件援助，阿尔及利亚现在可以开始更广泛的改革、贷款和私有化进程。"
 ALG_accept_imf_loan: "接受国际货币基金组织贷款"
 ALG_accept_imf_loan_desc: "我们可以接受国际货币基金组织的财政援助来稳定我们的货币并启动改革。但这需要付出长期债务和接受一些附加条件的代价。"
 ALG_start_oil_licensing: "向外国公司开放石油开采许可证"
 ALG_start_oil_licensing_desc: "允许跨国公司获取石油储备可能会加速经济增长，但也会加剧外国的影响力。"
 ALG_repay_imf_loan: "偿还国际货币基金组织贷款"
 ALG_repay_imf_loan_desc: "随着财务状况趋于稳定，我们可以偿还贷款，从而减少对国际援助的依赖。"
 ALG_civil_war_recovery: "内战恢复"
 ALG_civil_war_recovery_desc: "必须治愈“黑色十年”的创伤。国家现在将投资于国家复苏。"
 ALG_improve_public_services: "改善公共服务"
 ALG_improve_public_services_desc: "我们将扩大对战争受害者的医疗保健、教育和支持。"
 ALG_international_aid_effort: "国际援助行动"
 ALG_international_aid_effort_desc: "与联合国和捐助者合作可以迅速启动基本服务和重建工作。"
 ALG_building_civil_society: "建设公民社会"
 ALG_building_civil_society_desc: "增强社区和社会项目的能力有助于防止冲突再次发生。"
 ALG_economic_recovery_program: "经济复苏计划"
 ALG_economic_recovery_program_desc: "我们启动了一项国家发展计划，该计划得到了外国援助和国家改革的支持。"
 ALG_remove_international_monitors: "移除国际监察"
 ALG_remove_international_monitors_desc: "阿尔及利亚已经恢复到足以重新完全自主掌控其经济发展道路的程度。"
 ALG_postwar_recovery_program: "§O战后复苏计划§!"
 ALG_postwar_recovery_program_desc: "战争结束了。现在，我们开始重建国家、经济和社会。"
 ALG_un_aid_mission: "联合国援助团"
 ALG_un_aid_mission_desc: "联合国援助和非政府组织将协助我们开展基本公共服务。"
 ALG_social_healing_programs: "社会疗愈项目"
 ALG_social_healing_programs_desc: "必须通过社会项目和和解来解决战后创伤和不信任问题。"
 ALG_public_services_funding: "公共服务资金"
 ALG_public_services_funding_desc: "我们将恢复民众获得医疗保健、住房和就业机会的途径。"
 ALG_finalize_recovery_phase: "完成恢复阶段"
 ALG_finalize_recovery_phase_desc: "随着局势恢复稳定，我们可以减少外国的监督，重获经济自主权。"
 ALG_change_the_economy: "改变经济模式"
 ALG_change_the_economy_desc: "现在是做出选择的时候了：我们应该维持国家控制还是实行自由化？"
 ALG_preserve_state_controlled_oil: "维护国家对石油的控制"
 ALG_preserve_state_controlled_oil_desc: "阿尔及利亚国家石油公司必须继续成为我们主权和经济的支柱。"
 ALG_industrial_expansion_plan: "工业扩张计划"
 ALG_industrial_expansion_plan_desc: "我们将通过基础设施和工厂建设来提高国内产量。"
 ALG_open_market_reforms: "开放市场改革"
 ALG_open_market_reforms_desc: "阿尔及利亚可以通过放松对关键行业的管制来吸引投资并促进经济增长。"
 ALG_oil_licensing_program: "启动石油许可证计划"
 ALG_oil_licensing_program_desc: "外国公司可以根据许可证合同申请开采油田。"
 ALG_urban_or_rural_development: "部落还是城市？"
 ALG_urban_or_rural_development_desc: "战后我们应该把重点放在部落地区还是主要城市？"
 ALG_empower_rural_provinces: "赋权乡村省份"
 ALG_empower_rural_provinces_desc: "我们的南部农村地区和卡比利亚人聚居区将获得直接投资。"
 ALG_tribal_consultative_council: "组建部落协商委员会"
 ALG_tribal_consultative_council_desc: "当地长者和地区领导人将协助制定发展重点。"
 ALG_urbanization_initiative: "启动城市化倡议"
 ALG_urbanization_initiative_desc: "阿尔及尔和奥兰等城市中心是我们现代化的关键。"
 ALG_expand_the_capital: "扩建首都"
 ALG_expand_the_capital_desc: "我们将扩建阿尔及尔的基础设施和办公场所，使其成为真正的现代化枢纽。"
 ALG_foreign_policy_review: "审视外交政策"
 ALG_foreign_policy_review_desc: "随着国内局势恢复稳定，阿尔及利亚必须重新定义其在全球舞台上的角色。"
 MSP_foreign_policy_review: "审视外交政策"
 MSP_foreign_policy_review_desc: "随着国内局势恢复稳定，阿尔及利亚必须重新定义其在全球舞台上的角色。"
 ALG_africa_and_arab_nations: "非洲和阿拉伯国家"
 ALG_africa_and_arab_nations_desc: "我们将致力于引领非洲和阿拉伯世界的外交与发展。"
 ALG_western_sahara_position: "支持西撒哈拉"
 ALG_western_sahara_position_desc: "我们重申支持撒哈拉独立，反对摩洛哥的主张。"
 ALG_african_union_engagement: "加入非洲联盟"
 ALG_african_union_engagement_desc: "阿尔及利亚必须重新加入非洲大陆外交，并发挥领导作用。"
 ALG_sahel_initiatives: "拓展至萨赫勒"
 ALG_sahel_initiatives_desc: "我们将通过软实力和国防来打击萨赫勒地区的不稳定和恐怖主义。"
 ALG_choose_global_partner: "选择全球合作伙伴"
 ALG_choose_global_partner_desc: "我们必须在经济和军事上与世界超级大国之一结盟。"
 ALG_align_with_us: "与美国结盟"
 ALG_align_with_us_desc: "与美国合作可以带来安全和经济优势。"
 ALG_align_with_china: "与中华人民共和国结盟"
 ALG_align_with_china_desc: "中国奉行不干涉主义的经济发展政策，并拥有巨大的投资潜力。"
 ALG_align_with_russia: "与俄罗斯联邦结盟"
 ALG_align_with_russia_desc: "俄罗斯向阿尔及利亚提供军事技术，并且与阿尔及利亚一样对西方主导地位持怀疑态度。"
 ALG_non_aligned_revival: "重振不结盟外交政策"
 ALG_non_aligned_revival_desc: "我们将重拾中立精神和南方团结精神，就像上世纪60年代那样。"
 ALG_global_south_solidarity: "全球南方团结"
 ALG_global_south_solidarity_desc: "阿尔及利亚将通过贸易、外交和援助加强与后殖民国家的关系。"
 ALG_future_national_policy: "§G阿尔及利亚的未来§!"
 ALG_future_national_policy_desc: "随着内战的结束，我们现在必须确定阿尔及利亚新的政治方向。\n§R注意§!：§Y选择此国策最终会覆盖当前的国策树，并为每个政党定制一个分支国策，因此请在结束此国策之前完成其他重要的国策。§!"
 ALG_approach_nato: "§C追随北约§!"
 ALG_approach_nato_desc: "与西方结盟可能带来经济增长和安全保障。"
 ALG_aspire_nato_support: "渴望加入北约伙伴关系"
 ALG_aspire_nato_support_desc: "只要满足条件，阿尔及利亚就能成为北约主要盟友。"
 ALG_invite_western_investors: "吸引西方投资者"
 ALG_invite_western_investors_desc: "吸引来自民主国家的资本和贸易。"
 ALG_request_us_protection: "请求美国保护"
 ALG_request_us_protection_desc: "阿尔及利亚将请求美国提供军事保护或独立保证。"
 ALG_remain_neutral: "§g保持中立§!"
 ALG_remain_neutral_desc: "不结盟政策能够带来外交自由和国内稳定。"
 ALG_economy_first: "把经济放在首位"
 ALG_economy_first_desc: "减少军费开支，加强教育和长期发展。"
 ALG_seek_un_protection: "寻求国际保护"
 ALG_seek_un_protection_desc: "如果威胁加剧，我们将寻求联合国安理会的保护。"
 ALG_align_with_china1: "§t与中国和俄罗斯结盟§!"
 ALG_align_with_china1_desc: "东方强国为北约阵营提供了一种替代方案。"
 ALG_join_sco: "申请加入上合组织"
 ALG_join_sco_desc: "上海合作组织能够带来经济和安全方面的好处。"
 ALG_invite_eastern_investors: "吸引东方投资者"
 ALG_invite_eastern_investors_desc: "与中国和俄罗斯的基础设施公司建立合作关系。"
 ALG_request_chinese_protection: "请求中国保护"
 ALG_request_chinese_protection_desc: "北京可能会同意保障阿尔及利亚的独立和投资。"
 ALG_reform_the_military: "重组军队"
 ALG_reform_the_military_desc: "阿尔及利亚军队需要进行深刻的结构性改革，以应对21世纪的挑战。"
 ALG_military_academy_upgrade: "升级军事学院"
 ALG_military_academy_upgrade_desc: "投资教育是培养称职专业官员的关键。"
 ALG_internal_security_brigade: "组建内部安全旅"
 ALG_internal_security_brigade_desc: "我们必须通过专门的内部安全部门来确保内部秩序。"
 ALG_military_industry_support: "支持军事工业"
 ALG_military_industry_support_desc: "加强我们的军事工业基础将有助于确保自给自足。"
 ALG_anti_air_force: "建立防空司令部"
 ALG_anti_air_force_desc: "防空能力对于保护我们的领空至关重要。"
 ALG_mechanized_modernization: "机械化部队现代化"
 ALG_mechanized_modernization_desc: "现代机械化部队是有效陆军的核心。"
 ALG_uav_development: "无人机开发计划"
 ALG_uav_development_desc: "无人机系统将赋予我们监视和精确打击能力。"
 ALG_national_guard_initiative: "国民警卫队倡议"
 ALG_national_guard_initiative_desc: "以公民为基础的卫戍部队可以帮助稳定农村和边远地区。"
 ALG_air_force_reform: "改革空军"
 ALG_air_force_reform_desc: "改革作战理论和装备对于我们的空中优势至关重要。"
 ALG_infantry_equipment_project: "现代化步兵装备"
 ALG_infantry_equipment_project_desc: "我们的步兵理应配备最先进的武器和防护装备。"
 ALG_ballistic_program: "弹道导弹项目"
 ALG_ballistic_program_desc: "扩大导弹能力将增强战略威慑力。"
 ALG_simulation_center: "军事模拟中心"
 ALG_simulation_center_desc: "建立现代化训练中心将大幅提高我们的作战准备水平。"
 ALG_logistics_command: "建立后勤司令部"
 ALG_logistics_command_desc: "简化后勤保障措施可确保我军保持战斗力。"
 ALG_military_doctrine_finalization: "最终确定军事条令"
 ALG_military_doctrine_finalization_desc: "我们必须将各项改革整合为一套现代理论体系。"
 ALG_foreign_arms_contracts: "外国武器合约"
 ALG_foreign_arms_contracts_desc: "战略伙伴关系可以帮助我们迅速弥补自身能力的不足。"
 ALG_local_armor_production: "本地装甲生产"
 ALG_local_armor_production_desc: "启动本地装甲输送车和坦克生产，可确保自主性和发展。"
 ALG_military_university_program: "军事大学项目"
 ALG_military_university_program_desc: "投资军事院校将为我们的下一代指挥官做好准备。"
 ALG_heavy_artillery_project: "重型火炮倡议"
 ALG_heavy_artillery_project_desc: "我们将优先发展国内重型火炮研发。"
 ALG_special_operations_command: "特种作战司令部"
 ALG_special_operations_command_desc: "对精锐部队实行集中指挥可以提高协调性和作战效能。"
 ALG_joint_command_center: "建立联合指挥中心"
 ALG_joint_command_center_desc: "将各分支机构合并为联合行动中心，将加强战略一体化。"
 ALG_indigenous_rifle_program: "原住民步枪计划"
 ALG_indigenous_rifle_program_desc: "自主研发先进轻武器是国家优先事项。"
 ALG_integrated_defense_network: "综合防御网络"
 ALG_integrated_defense_network_desc: "统一的雷达和通信系统能够加强国防。"
 ALG_advanced_command_structure: "高级指挥结构"
 ALG_advanced_command_structure_desc: "我们将为数字化战场实施现代化的C4ISR指挥系统。"
 ALG_military_modernization_complete: "军事现代化完成"
 ALG_military_modernization_complete_desc: "我们漫长的改革之路终于结出了硕果 - 阿尔及利亚现在拥有一支现代化、团结一致的军队。"
 ALG_military_education: "军事教育改革"
 ALG_military_education_desc: "我们正在改革军事教育机构，以培养更优秀的军官，加快战场学习。"
 ALG_internal_troops_deployed: "内卫部队"
 ALG_internal_troops_deployed_desc: "部署纪律严明的内卫部队，以维护国内稳定并提高反叛乱能力。"
 ALG_military_industry_idea: "军事工业刺激计划"
 ALG_military_industry_idea_desc: "加强我国军工产业建设，提高生产效率，满足日益增长的军事需求。"
 ALG_anti_air_command: "防空司令部"
 ALG_anti_air_command_desc: "建立集中式防空指挥系统将提高我们应对空中威胁的效率。"
 ALG_mechanized_idea: "机械化发展计划"
 ALG_mechanized_idea_desc: "提高我军机械化和摩托化师的训练水平和作战效能。"
 ALG_uav_program: "无人机项目"
 ALG_uav_program_desc: "投资无人机可以为我们在战场上提供侦察和作战优势。"
 ALG_militia_idea: "人民民兵"
 ALG_militia_idea_desc: "动员志愿兵作为我们后备防御战略的一部分，以便快速部署和训练。"
 ALG_air_command: "空军司令部条令"
 ALG_air_command_desc: "将我们的空军整合到一个统一的指挥结构下，以便更有效地制定空军作战理论。"
 ALG_local_arms_production: "本地武器制造"
 ALG_local_arms_production_desc: "鼓励国内武器生产，以减少对外国武器的依赖，加快步兵装备的生产。"
 ALG_training_doctrine: "现代训练理论"
 ALG_training_doctrine_desc: "提升训练标准和流程，以增加我军的经验积累。"
 ALG_logistics_reform: "后勤改革"
 ALG_logistics_reform_desc: "增强我们的后勤能力，以减少物资消耗并提高作战持久性。"
 ALG_finalized_military_doctrine: "完成理论"
 ALG_finalized_military_doctrine_desc: "经过广泛的改革，我们正在实施一项最终确定的、符合我们独特军事需求的理论。"
 ALG_armor_development: "装甲开发计划"
 ALG_armor_development_desc: "研发性能更优的装甲车辆，以提高速度、生存能力和战术灵活性。"
 ALG_military_academy_national: "国家军事学院"
 ALG_military_academy_national_desc: "建立一所享有盛誉的国家级学院，以推进军事研究和军官培训。"
 ALG_special_ops_unit: "特别行动部队"
 ALG_special_ops_unit_desc: "我们的精锐特种部队接受强化训练并配备先进装备，从而具备卓越的作战能力。"
 ALG_joint_ops_coordination: "联合行动协调"
 ALG_joint_ops_coordination_desc: "改进指挥结构，以提高陆军各军种间的联合作战效率。"
 ALG_national_weapons_dev: "国家武器发展"
 ALG_national_weapons_dev_desc: "投资于本地武器研发和创新，以提高生产质量和速度。"
 ALG_integrated_defense_net: "综合防御网络"
 ALG_integrated_defense_net_desc: "建立全国雷达和预警网络，以提高响应和协调能力。"
 ALG_military_industry_growth: "军事工业增长"
 ALG_military_industry_growth_desc: "扩大国防工业规模，以满足长期采购和现代化目标。"
 ALG_modern_c4isr: "现代C4ISR基础设施"
 ALG_modern_c4isr_desc: "实施现代化的指挥、控制、通信和情报系统，以提高指挥效率。"
 ALG_modernized_military_status: "现代武装力量"
 ALG_modernized_military_status_desc: "我们已经拥有了一支现代化、高素质的军队，随时准备投射力量、捍卫国家利益。"
 ALG_african_union_member: "非洲联盟成员国"
 ALG_african_union_member_desc: "我们现在全面参与非洲联盟，加强整个非洲大陆的外交和经济联系。"
 ALG_idea_us_support: "美国战略支持"
 ALG_idea_us_support_desc: "通过与美国的战略合作，我们可以在军事和经济援助方面加强我们的全球地位。"
 ALG_idea_chinese_investment: "中国基础设施投资"
 ALG_idea_chinese_investment_desc: "中国已承诺进行大规模基础设施投资，这将提升我们的工业产能。"
 ALG_idea_chinese_loans: "中国发展贷款"
 ALG_idea_chinese_loans_desc: "我们接受了中国的发展贷款，提高了建筑产量，但也增加了我们的财务负担。"
 ALG_idea_russian_arms: "俄罗斯武器协议"
 ALG_idea_russian_arms_desc: "我们与俄罗斯达成了军事供应协议，加快了我国武装力量的发展。"
 ALG_idea_non_aligned_policy: "不结盟外交政策"
 ALG_idea_non_aligned_policy_desc: "我们独立自主的道路使我们能够从所有集团中受益，而无需与任何集团结盟。"
 ALG_global_south_network: "全球南方团结网络"
 ALG_global_south_network_desc: "加强南南合作能够提升我们的国际影响力和软实力。"
 ALG_arab_league_reaffirmed: "重申阿拉伯联盟的承诺"
 ALG_arab_league_reaffirmed_desc: "我们重申对阿拉伯联盟的承诺，并加强与阿拉伯兄弟国家的联系。"
 ALG_pan_arab_network: "泛阿拉伯外交网络"
 ALG_pan_arab_network_desc: "新的外交努力促进了阿拉伯国家在全球事务中的合作与集体力量。"
 ALG_palestinian_support: "支持巴勒斯坦事业"
 ALG_palestinian_support_desc: "我们支持巴勒斯坦人民争取自决的斗争，巩固了我们在该地区的立场。"
 ALG_presidential_succession_crisis: "总统继任危机"
 ALG_presidential_succession_crisis_desc: "随着局势日益动荡，领导权问题再次浮出水面。我们是继续沿用旧体制，还是开辟一条新道路？"
 ALG_stay_with_bouteflika: "维持布特弗利卡的领导地位"
 ALG_stay_with_bouteflika_desc: "布特弗利卡代表着延续，也代表着腐败。我们或许能获得经济稳定，但代价是丧失合法性。"
 ALG_choose_tebboune: "任命特本"
 ALG_choose_tebboune_desc: "一位温和的技术官僚，推行以稳定为导向的改革，但会给国库带来沉重的负担。"
 ALG_choose_msp: "任命和平社会运动领导人"
 ALG_choose_msp_desc: "一种与穆斯林兄弟会结盟的伊斯兰主义替代方案。它在某些圈子中颇受欢迎，但也存在与根深蒂固的军方精英发生内战的风险。"
 ALG_random_president: "随机选择一位总统"
 ALG_random_president_desc: "一张王牌。这位新总统或许能拯救阿尔及利亚，也可能将其推向毁灭。"
 ALG_resolve_presidency_crisis: "总统危机解决"
 ALG_resolve_presidency_crisis_desc: "领导层问题已经得到解决。现在是时候向前迈进了。"
 ALG_idea_bouteflika_legacy: "布特弗利卡的遗产"
 ALG_idea_bouteflika_legacy_desc: "尽管腐败和不信任根深蒂固，布特弗利卡时代仍然是阿尔及利亚过去统治的代名词。他的关系网至今仍然具有影响力。"
 ALG_idea_tebboune_moderate: "特本的温和总统任期"
 ALG_idea_tebboune_moderate_desc: "特本以稳定和渐进式改革的形象示人，力求在整顿政府的同时维持秩序。"
 ALG_idea_msp_presidency: "和平社会运动总统"
 ALG_idea_msp_presidency_desc: "和平社会运动已经掌权。但这究竟标志着和平转型还是滑向冲突深渊，仍有待观察。"
 ALG_idea_random_good: "新任总统就职"
 ALG_idea_random_good_desc: "无论是出于运气还是策略，这位新总统都能力出众、充满激情，带来了改革和方向。"
 ALG_idea_random_bad: "无能的新总统"
 ALG_idea_random_bad_desc: "这位领导人准备不足、不堪重负，而且可能存在腐败问题。在如此关键的时刻，他绝非理想人选。"
 ALG_presidency.1.t: "与军方的紧张关系"
 ALG_presidency.1.d: "在和平社会运动领导人被任命为总统后，军方精英们怒不可遏。他们认为这威胁到了他们长期以来对权力的掌控。关于秘密动员的传言四起，效忠于旧势力的武装部队也开始集结。军方会接受这一变化，还是会发动叛乱？"
 ALG_presidency.1.a: "军方接受新政府"
 ALG_presidency.1.b: "军事叛乱 - 内战爆发！"
 ALG_presidency_army_accepts_tt: "军队勉强接受了和平社会运动政府。目前，和平暂时维持。"
 ALG_presidency_army_civilwar_tt: "军事政变演变为公开的内战！"
 ALG_economy_digital_initiative: "数字经济倡议"
 ALG_economy_digital_initiative_desc: "阿尔及利亚必须拥抱数字时代，实现经济现代化。投资技术基础设施、电子政务服务和数字素养计划，将使我们为21世纪经济做好准备。"
 ALG_digital_initiative_tt: "§G阿尔及利亚启动全面数字化转型计划：§!\n- 政府服务现代化\n- 扩展互联网基础设施\n- 扶持科技创业公司\n- 提升劳工的数字化技能"
 ALG_digital_initiative_bonus: "数字经济倡议"
 ALG_digital_economy_initiative: "数字经济倡议"
 ALG_digital_economy_initiative_desc: "我们对数字基础设施和技术教育的投资正在获得回报。政府服务效率更高，企业正在采用现代化做法，新一代精通技术的劳动者正在进入职场。"
 ALG_arpt_regulatory_framework: "建立邮政和电信监管局监管机构"
 ALG_arpt_regulatory_framework_desc: "邮政和电信监管局将确保电信市场的竞争，并保护消费者权益。"
 ALG_algerie_telecom_expansion: "阿尔及利亚电信现代化"
 ALG_algerie_telecom_expansion_desc: "对阿尔及利亚电信的基础设施进行现代化改造和扩建，以改善宽带接入和公共通信。"
 ALG_nedjma_and_mobilis: "内吉玛和莫比利斯竞争"
 ALG_nedjma_and_mobilis_desc: "鼓励像内吉玛和莫比利斯这样的电信运营商之间进行良性竞争，将降低价格并提高服务质量。"
 ALG_fiber_optic_program: "光纤基础设施"
 ALG_fiber_optic_program_desc: "投资在全国范围内部署光纤网络，以提高全国的网络连接速度和网络覆盖范围。"
 ALG_4g_rollout: "推出4G服务"
 ALG_4g_rollout_desc: "4G移动互联网的推出将改变网络连接方式，从而实现更好的电子服务和数字化生产力。"
 ALG_air_algerie_modernization: "阿尔及利亚航空现代化"
 ALG_air_algerie_modernization_desc: "加强阿尔及利亚航空的机队和航线将促进旅游业发展并改善国际物流。"
 ALG_international_airports_upgrade: "主要机场升级改造"
 ALG_international_airports_upgrade_desc: "投资建设阿尔及尔、奥兰和君士坦丁等机场，使其成为区域和全球航空交通枢纽。"
 ALG_aadl_housing_projects: "国家住房改善和发展署计划"
 ALG_aadl_housing_projects_desc: "国家住房改善和发展署将为不断增长的城市人口提供补贴住房和城市发展项目。"
 ALG_urbanization_initiatives: "城市发展倡议"
 ALG_urbanization_initiatives_desc: "扩建道路、公用设施和建筑区将支持我们不断发展的城市，并提高生活质量。"
 ALG_arpt_regulation: "邮政和电信监管局监管机构"
 ALG_arpt_regulation_desc: "邮政和电信监管局确保电信行业的公平市场行为、竞争和消费者保护。"
 ALG_algerie_telecom_program: "阿尔及利亚电信项目"
 ALG_algerie_telecom_program_desc: "为国有电信运营商制定的全面现代化计划。"
 ALG_mobile_operator_competition: "电信竞争改革"
 ALG_mobile_operator_competition_desc: "内吉玛和莫比利斯之间的市场竞争促进了创新和实惠的价格。"
 ALG_fiber_investment: "光纤部署"
 ALG_fiber_investment_desc: "扩展光纤网络将为重点城市和工业区提供高速接入。"
 ALG_4g_coverage: "4G全国覆盖"
 ALG_4g_coverage_desc: "先进的移动宽带技术增强了通信能力，并为数字经济发展提供了支持。"
 ALG_national_innovation_push: "国家创新推动计划"
 ALG_national_innovation_push_desc: "一项政府支持的旨在促进各领域创新和技术发展的计划。"
 ALG_highway_project: "东西向高速公路项目"
 ALG_highway_project_desc: "一项耗资130亿美元连接东西方的项目将实现交通现代化并缩短旅行时间。"
 ALG_air_algerie_investment: "阿尔及利亚航空投资"
 ALG_air_algerie_investment_desc: "阿尔及利亚国家航空公司的扩张将带来新的贸易和旅游机遇。"
 ALG_air_hub_status: "阿尔及尔区域航空枢纽"
 ALG_air_hub_status_desc: "阿尔及尔有潜力成为连接非洲、欧洲和中东的中心枢纽。"
 ALG_aadl_program: "国家住房改善和发展署住房倡议"
 ALG_aadl_program_desc: "阿尔及利亚国家住房改善和发展署的目标是为阿尔及利亚各地成千上万个家庭建造经济适用房。"
 ALG_berber_autonomy_idea: "柏柏尔自治倡议"
 ALG_berber_autonomy_idea_desc: "通过谈判和对话，我们承认了柏柏尔人的身份，并赋予了卡比利地区有限的自治权。"
 ALG_federal_charter_idea: "联邦宪章"
 ALG_federal_charter_idea_desc: "新的联邦框架赋予阿尔及利亚不同地区文化和行政自治权，在维护国家统一的同时缓解了民族紧张局势。"
 ALG_strict_centralization_idea: "严格的集权"
 ALG_strict_centralization_idea_desc: "绝不能允许地区主义分裂阿尔及利亚。权力已集中于阿尔及尔，以确保国家完整。"
 ALG_kabylia_unrest: "卡比利亚动乱"
 ALG_kabylia_unrest_desc: "自1980年“柏柏尔之春”以来，卡比利地区一直不时爆发抗议活动，民众提出文化诉求，并对中央政府普遍缺乏信任。这些紧张局势暗流涌动，若不加以解决，可能会演变成更大规模的动乱。如果这些问题得不到解决，未来事态可能会急剧升级。"
 ALG_black_spring.1.t: "卡比利亚暗潮涌动"
 ALG_black_spring.1.d: "马西尼萨·盖尔马被宪兵部队杀害后，卡比利亚地区爆发了大规模抗议活动。动乱局势日益加剧。"
 ALG_black_spring.1.a: "这个问题必须解决。"
 ALG_black_decade: "黑色十年"
 ALG_black_decade_desc: "阿尔及利亚内战，在阿尔及利亚被称为“黑色十年”，是阿尔及利亚政府与多个伊斯兰主义叛乱组织之间爆发的内战，始于1992年1月11日（此前发生政变，推翻了伊斯兰主义者的选举胜利），终于2002年2月8日。战争初期进展缓慢，政府似乎已成功镇压了伊斯兰主义运动，但随后武装团体出现并宣布发动圣战。到1994年，暴力冲突升级，政府似乎难以招架。1996-1997年，伊斯兰主义抵抗运动明显失去了民众支持，但此后战斗仍持续了数年。"
 algeria.157.t: "阿尔及利亚军火交易"
 algeria.157.d: "阿尔及利亚军方想购买我们的米格-29战斗机，我们卖给他们吗？"
 algeria.157.a: "给他们武器！"
 algeria.157.b: "不"
 algeria.158.t: "俄罗斯接受"
 algeria.158.d: "他们会卖给我们米格-29战斗机"
 algeria.158.a: "太好了"
 algeria.159.t: "俄罗斯拒绝"
 algeria.159.d: "他们不会把米格-29战斗机卖给我们。"
 algeria.159.a: "该死"
 algeria_events.38.t: "[ALG.GetFlag]阿尔及利亚有意购买苏-27战斗机"
 algeria_events.38.d: "[ALG.GetFlag]作为地区强国，保卫我们广袤的边境线并向马格里布和萨赫勒地区投射影响力至关重要。我军高层已认定俄罗斯传奇的苏-27“侧卫”战斗机是大幅提升我方空中优势的理想平台。此次采购不仅能增强我方机队的实力并规范后勤保障，还能立即带来决定性的优势，尽管无疑会引起国际社会的广泛关注。"
 algeria_events.38.a: "成交！获得侧翼"
 algeria_events.38.b: "取消请求：风险太大"
 algeria_events.39.t: "[SOV.GetFlag]克里姆林宫批准向阿尔及尔出售侧翼战斗机"
 algeria_events.39.d: "经过慎重考虑，克里姆林宫[SOV.GetFlag]正式批准了阿尔及利亚购买大量苏-27“侧卫”战斗机的请求。这笔交易不仅仅是一笔军售，它更代表着战略联系的深化、国防工业出口的显著提升，以及我们在北非地区影响力的重大扩张。北非地区对我们的地缘政治利益而言日益重要。"
 algeria_events.39.a: "极好：战略伙伴关系深化"
 algeria_events.40.t: "[SOV.GetFlag]克里姆林宫拒绝向阿尔及尔出售侧翼战斗机"
 algeria_events.40.d: "尽管阿尔及利亚与莫斯科保持着长期的友好关系并对其抱有浓厚的兴趣，但莫斯科遗憾地通知阿尔及尔，无法满足其增购苏-27“侧卫”战斗机的请求。当前的地缘政治形势，加上国内对军事装备日益增长的需求以及产能紧张，意味着我国武装部队的需求必须优先考虑。我们珍视与阿尔及利亚的战略伙伴关系，但出于国家安全考虑和工业能力的限制，我们目前无法将这些至关重要的资产用于出口。"
 algeria_events.40.a: "深感失望：重新评估我们的国防战略。"
 ALG_maghreb_invite.1.t: "向马格里布联盟发出邀请"
 ALG_maghreb_invite.1.d: "阿尔及利亚提议建立北非经济和军事联盟。我们会加入吗？"
 ALG_maghreb_invite.1.a: "加入联盟"
 ALG_maghreb_invite.1.b: "拒绝（只限摩洛哥）"
 ALG_maghreb_trade_hub: "马格里布贸易中心"
 ALG_maghreb_trade_hub_desc: "作为北非商业中心，我们的经济蓬勃发展。"
 ALG_sahel_aid.1.t: "阿尔及利亚对萨赫勒地区的援助"
 ALG_sahel_aid.1.d: "我们在马里的稳定部队既可以通过发展项目赢得民心，也可以用武力镇压武装分子。我们将选择哪条道路？"
 ALG_sahel_aid.1.a: "部署工程师和医生"
 ALG_sahel_aid.1.b: "只关注反恐"
 ALG_sahel_intervention: "干预萨赫勒"
 ALG_sahel_intervention_desc: "我们的部队部署在撒哈拉沙漠各地，与叛乱分子作战，并确保资源安全。"
 ALG_sahel_hearts_and_minds: "民心"
 ALG_sahel_hearts_and_minds_desc: "人道主义援助提升了阿尔及利亚的国际声誉。"
 ALG_maghreb_diplomacy: "马格里布外交"
 ALG_maghreb_diplomacy_desc: "阿尔及利亚正在确立其作为北非领导者的地位，通过贸易和共同安全促进团结。"
 ALG_maghreb_union_tt: "马格里布联盟由\n阿尔及利亚、突尼斯和其他北非国家组成，目前在我们的领导下，这些国家在经济和军事上建立了联系。"
 ALG_trade_allies: "贸易同盟"
 ALG_egypt_algiers_axis: "埃及-阿尔及尔轴心"
 ALG_egypt_algiers_axis_desc: "我们与埃及的关系源远流长。我们必须继续加强我们在非洲的地位，引领非洲大陆。"
 FIS_Are_Terrorists: "伊斯兰救世阵线是恐怖分子"
 ALG_un_peacekeepers: "联合国维和人员部署"
 ALG_un_peacekeepers_desc: "联合国已派遣维和部队稳定该地区局势，防止冲突进一步升级。他们的任务是维护秩序、保护平民，并支持旨在实现持久和平的外交努力。"
 ALG_civil_war_recovered: "内战结束"
 ALG_civil_war_recovered_desc: "国家已走出内战的动荡，开始了漫长的疗愈和重建进程。各项工作的重点是恢复国家团结、重建基础设施和预防未来的内部冲突。"
 ALG_sonatrach_restructure: "阿尔及利亚国家石油公司重组"
 ALG_sonatrach_restructure_desc: "阿尔及利亚国家石油公司正在进行重大重组，旨在提高效率、增加产量并增强经济稳定性。此次转型旨在促进国家能源行业发展，并支持其长期增长。"
 ALG_investment_boom_modifier: "投资热潮"
 ALG_investment_boom_modifier_desc: "该国正经历着国内外投资的激增，推动着经济的快速增长和发展。这一繁荣景象提升了工业产能、基础设施，并促进了整体繁荣。"
 ALG_foreign_oil_licensing_bonus: "外国石油许可证"
 ALG_foreign_oil_licensing_bonus_desc: "允许外国公司暂时进入我们的油田，从而提高我们的石油生产能力。"
 ALG_rural_cooperative_initiative: "农村合作社倡议"
 ALG_rural_cooperative_initiative_desc: "通过合作企业促进农村发展和农业产量增长，提高农业产量。"
 ALG_idea_pro_palestinian_campaign: "支持巴勒斯坦运动"
 ALG_idea_pro_palestinian_campaign_desc: "加强与巴勒斯坦各团体的关系，并有可能提升该地区对阿尔及利亚独立运动的支持。"
 ALG_charter_peace_modifier: "阿尔及利亚和平宪章"
 ALG_charter_peace_modifier_desc: "1995年签署了一项旨在结束阿尔及利亚内战的全面和平协议。该协议概述了和解、大赦和政治改革的框架，以解决冲突的根源并建立持久和平。"
 ALG_urban_development_bonus: "城市化进程"
 ALG_urban_development_bonus_desc: "这项计划优先考虑阿尔及利亚城市地区的快速发展和扩张。其目标是通过重点投资基础设施、住房和工业，打造经济中心，改善公民的生活条件。"
 ALG_idea_palestinian_backing: "阿尔及利亚支持巴勒斯坦人的权利"
 ALG_idea_palestinian_backing_desc: "分析阿尔及利亚对巴勒斯坦权利的历史和持续支持，包括外交立场、援助举措和更广泛的政治参与。"
 ALG_idea_palestinian_aid_fund: "阿尔及利亚巴勒斯坦援助基金"
 ALG_idea_palestinian_aid_fund_desc: "阿尔及利亚设立的基金，旨在向巴勒斯坦人民提供人道主义和发展援助。援助内容可能包括紧急救援、基础设施建设、教育和经济赋权等项目。"
 ALG_neutrality_idea: "阿尔及利亚中立政策"
 ALG_neutrality_idea_desc: "建议阿尔及利亚在国际冲突和争端中保持中立立场，避免卷入军事行动或在地缘政治竞争中选边站队。这可能包括致力于通过外交途径解决问题，以及不干涉他国内政。"
 ALG_intervention_isolation: "阿尔及利亚干涉与孤立主义"
 ALG_intervention_isolation_desc: "一项针对阿尔及利亚的政策建议，旨在优先考虑国家利益和安全，同时避免直接军事干预外国冲突。然而，该政策可能包括对特定盟友或阿尔及利亚利益受到直接威胁的地区提供选择性支持，即便这意味着阿尔及利亚将与某些国际伙伴关系隔绝。"
 ALG_hardliner_controlled_state: "一个受到严密控制的强硬派国家"
 ALG_hardliner_controlled_state_desc: "在一种政策情景下，阿尔及利亚政府采取高度威权的立场，压制异议并限制自由。这可能包括大力强调民族团结，通常通过宣传、严格的社会控制以及对反对派团体进行暴力镇压来实现。经济政策可能优先考虑国家自给自足，并倾向于与特定盟友保持密切关系，这可能会以牺牲经济多元化和开放性为代价。"
 ALG_surveillance_state: "监控之国"
 ALG_surveillance_state_desc: "阿尔及利亚日益利用先进的监控技术和方法来监视公民的线上线下活动。这可能涉及广泛使用人脸识别技术、从各种渠道收集数据，甚至可能渗透到公民社会团体中。这种做法极易导致镇压和滥用权力，公民的言论自由和集会自由可能受到限制。"
 ALG_reform_government: "政府改革举措"
 ALG_reform_government_desc: "这部分内容描述了阿尔及利亚政府正在进行或计划进行的各项改革举措，旨在改善其治理的各个方面。这些举措可能包括经济多元化、政治自由化、司法独立或反腐败措施等。描述应具体说明改革的性质、预期成效或挑战，以及改革发生的更广泛背景。"
 ALG_amnesty_reform: "政府改革举措"
 ALG_amnesty_reform_desc: "这部分内容描述了阿尔及利亚政府正在进行或计划进行的各项改革举措，旨在改善其治理的各个方面。这些举措可能包括经济多元化、政治自由化、司法独立或反腐败措施等。描述应具体说明改革的性质、预期成效或挑战，以及改革发生的更广泛背景。"
 ALG_crackdown_backfired: "镇压适得其反"
 ALG_primary_education_reform: "小学教育改革"
 ALG_idea_refoming_education1: "教育改革"
 ALG_idea_refoming_education: "教育改革"
 ALG_university_expansion: "大学扩招"
 ALG_health_insurance_idea: "医疗保险"
 ALG_health_insurance_idea1: "医疗保险"
 ALG_basic_income_support: "基本收入保障"
 ALG_housing_support_idea: "住房支持"
 ALG_childcare_reform: "托儿计划"
 ALG_civil_rights: "授予公民权"
 ALG_public_admin_reform: "免费公共交通"
 MSP_switch_to_morocco: "抛弃西撒哈拉"
 MSP_switch_to_morocco_desc: "支持撒哈拉维已经恶化了我们与摩洛哥的关系。摩洛哥是一个正在崛起的经济强国，一个紧邻我们的强大国家。放弃对撒哈拉维的无谓支持，转而与摩洛哥建立友好关系，才是最明智的选择。"
 MSP_influence_mauritania: "影响毛里塔尼亚"
 MSP_influence_mauritania_desc: "西班牙撤出西撒哈拉后，毛里塔尼亚曾与摩洛哥就此爆发短暂战争。如今，毛里塔尼亚已不再声称拥有该地区的主权，但他们一直密切关注西撒哈拉冲突，并且是波利萨里奥阵线的支持者之一。为了解决西撒哈拉冲突，加强对毛里塔尼亚的控制至关重要。"
 MSP_casablanca_accords: "卡萨布兰卡协议"
 MSP_casablanca_accords_desc: "西撒哈拉冲突已陷入僵局数十年，无人能够解决。我们需要利用我们在该地区的影响力来解决这场冲突。"
 ALG_influence_mauritania: "影响毛里塔尼亚"
 ALG_influence_mauritania_desc: "西班牙撤出西撒哈拉后，毛里塔尼亚曾与摩洛哥就此爆发短暂战争。如今，毛里塔尼亚已不再声称拥有该地区的主权，但他们一直密切关注西撒哈拉冲突，并且是波利萨里奥阵线的支持者之一。为了解决西撒哈拉冲突，加强对毛里塔尼亚的控制至关重要。"
 ALG_energy_reform: "能源改革"
 ALG_energy_reform_desc: "我们需要解决能源问题，通过改革能源行业，我们可以为全国分配能源。"
 ALG_focus_on_oil: "专注于石油"
 ALG_focus_on_oil_desc: "阿尔及利亚各地蕴藏着许多尚未开发的油田，一些研究表明，阿尔及利亚可能是世界上石油储量最丰富的国家之一，但其中大部分石油尚未开发。因此，我们应该关注石油。"
 ALG_focus_on_oil_tt: "§C专注于石油将使我们能够通过向邻国出售能源获得更多利润，但这对哈西梅萨乌德来说将是灾难性的！§!"
 ALG_focus_on_renewables: "专注可再生能源"
 ALG_focus_on_renewables_desc: "在阿尔及利亚，没有哪个村庄小到无法享受阳光。我们需要向世界其他国家树立榜样，建立一个可持续的能源网络。这需要投入大量资金，但为了子孙后代，一切都是值得的。"
 ALG_focus_on_renewables_tt: "§C专注于可再生能源虽然不如使用石油那样有利可图，但对哈西梅萨乌德来说却更好！§!"
 ALG_oil_production: "与阿尔及利亚国家石油公司合作"
 ALG_oil_production_desc: "阿尔及利亚主要的石油天然气公司是国有企业阿尔及利亚国家石油公司。该公司是全球能源市场的重要参与者，并积极寻求在石油天然气领域的投资和合作伙伴关系。索纳特拉克的业务涵盖油气价值链的各个环节，从勘探和生产到炼制和分销。"
 ALG_grid_expansion: "网络扩展"
 ALG_grid_expansion_desc: "我们能够自己发电固然很好，但我们也需要一个强大的电网将电力输送到全国各地以及邻国。"
 ALG_solar_panel_grid: "太阳能电池板网络"
 ALG_solar_panel_grid_desc: "考虑到地理位置，阿尔及利亚几乎全年阳光充足。这使其成为建设太阳能发电厂的绝佳地点。"
 ALG_hassi_massoud_exploitation: "哈西梅萨乌德的剥削"
 ALG_resource_excavation_research: "石油开采研究"
 ALG_resource_excavation_research_desc: "部分石油位于难以到达的地方。我们需要与阿尔及尔第一大学合作，找到尽可能开采每一份石油的方法。"
 ALG_wind_turbine_research: "风力涡轮机研究"
 ALG_wind_turbine_research_desc: "以目前的技术水平，在阿尔及利亚建设风力发电场是不可能的。那里的风况根本不适合现代风力涡轮机。我们需要投入资源研究解决这一问题的方案。"
 ALG_ethanol_power_plant: "乙醇发电厂"
 ALG_ethanol_power_plant_desc: "利用牛粪制成的乙醇，我们可以创造一种可持续的发电方式。"
 ALG_algeria_steelworks: "阿尔及利亚钢铁厂"
 ALG_algeria_steelworks_desc: "我们需要开采更多石油！有了额外的石油，我们还可以建一座钢铁厂。"
 ALG_Adrar_wind_park: "阿德拉尔风电场"
 ALG_Adrar_wind_park_desc: "阿德拉尔风电场位于阿尔及利亚南部，是一座天然风电场。该风电场附近的地形非常适合建设风电场，我们将在此建设阿尔及利亚首个风电场。"
 ALG_national_space_program: "国家太空计划"
 ALG_national_space_program_desc: "阿尔及利亚必须建立国家航天计划，才能跻身航天强国之列。这项举措将为未来在太空探索和卫星技术领域取得成就奠定基础。"
 ALG_arab_world_outreach: "深化阿拉伯外交关系"
 ALG_arab_world_outreach_desc: "为了加强阿尔及利亚在阿拉伯世界的影响力，我们必须重振外交拓展和协调工作。通过双边访问、峰会和贸易倡议，阿尔及利亚可以确立自身作为该地区团结力量的地位。"
 ALG_join_arab_league: "加强阿拉伯联盟参与"
 ALG_join_arab_league_desc: "作为阿拉伯联盟的现有成员国，阿尔及利亚可以超越参与层面，发挥领导外交作用。促进经济协调、防务磋商和文化团结将提升我们在阿拉伯世界的地位。"
 ALG_support_palestine: "支持巴勒斯坦事业"
 ALG_support_palestine_desc: "阿尔及利亚与巴勒斯坦的长期关系根植于共同的历史经历和政治团结。这种联系体现在诸多方面，包括对巴勒斯坦自决权的外交支持和人道主义援助。阿尔及利亚对巴勒斯坦事业的承诺是其外交政策的关键组成部分。"
 ALG_algeria_algiers_axis: "打造埃及-阿尔及尔轴心"
 ALG_algeria_algiers_axis_desc: "通过与埃及更紧密地结盟，阿尔及利亚可以帮助建立一个强大的区域集团，该集团能够引导阿拉伯世界的团结，确保北非的稳定，并制衡外国的影响。"
 ALG_condemn_israel: "谴责以色列的行动"
 ALG_condemn_israel_desc: "鉴于以色列持续的侵略和侵犯人权行为，阿尔及利亚将在国际舞台上正式谴责以色列的行动，争取各方支持实现公正和平，反对在没有解决方案的情况下实现关系正常化。"
 ALG_palestinian_aid_package: "巴勒斯坦援助方案"
 ALG_palestinian_aid_package_desc: "我们将调拨资源，向巴勒斯坦地区提供人道主义、经济和技术援助，确保阿尔及利亚的承诺不仅仅停留在口头上，而是真正产生影响的援助。"
 ALG_pan_african_defense_initiative: "泛非防务倡议"
 ALG_pan_african_defense_initiative_desc: "为保护非洲主权和增强非洲大陆稳定，阿尔及利亚将提出一项协调一致的非洲防务倡议，以建立应对共同威胁的集体军事准备。"
 ALG_send_troops_to_sahel: "向萨赫勒地区部署部队"
 ALG_send_troops_to_sahel_desc: "为应对萨赫勒地区日益加剧的不稳定局势，阿尔及利亚将派遣军队与地区各国政府合作，支持维和行动、边境保护和反恐行动。"
 ALG_sahel_stabilization_force: "萨赫勒稳定部队"
 ALG_sahel_stabilization_force_desc: "阿尔及利亚将牵头建立常设的萨赫勒稳定部队 - 一个由非洲主导的安全框架，旨在打击该地区的叛乱和犯罪网络。"
 ALG_exploit_sahel_resources: "开发萨赫勒资源"
 ALG_exploit_sahel_resources_desc: "阿尔及利亚在萨赫勒地区的影响力使其能够获取尚未开发的自然资源。通过谈判采矿和基础设施建设合同，我们可以在该地区获得经济收益和战略伙伴关系。"
 ALG_propose_maghreb_union: "提议建立马格里布联盟"
 ALG_propose_maghreb_union_desc: "现在是时候重振马格里布统一的愿景了。阿尔及利亚将率先提出重启一体化努力的倡议，重点放在经济合作、联合基础设施建设和外交协调方面。"
 ALG_economic_integration_initiative: "马格里布经济一体化"
 ALG_economic_integration_initiative_desc: "阿尔及利亚将通过降低关税、投资基础设施和协调货币政策讨论，推动建立一个惠及所有成员国的马格里布共同经济区。"
 ALG_maghreb_joint_defense_pact: "马格里布联合防御条约"
 ALG_maghreb_joint_defense_pact_desc: "安全的马格里布需要集体防御。我们将提议建立一项区域军事条约，重点关注边境保护、情报共享和联合军事演习。"
 ALG_idea_joint_military_arab: "阿拉伯联合军事"
 palestine_issue_very_positive: "支持巴勒斯坦问题"
 ALG_algerian_airforce: "实现阿尔及利亚空军现代化"
 ALG_algerian_airforce_desc: "一支现代化且实力雄厚的空军对国防至关重要。我们将加大对空军结构调整、飞行员培训和装备采购的投入，以提升空中战备能力。"
 ALG_buy_russia_su_27: "采购俄罗斯苏-27战斗机"
 ALG_buy_russia_su_27_desc: "作为空军现代化的一部分，我们将与俄罗斯谈判购买一批苏-27战斗机，以增强我们的空中优势和战略威慑力。"
 ALG_oum_el_bouaghi_airbase: "扩建乌姆布瓦吉空军基地"
 ALG_oum_el_bouaghi_airbase_desc: "位于东部战略要地的乌姆布瓦吉空军基地将扩建为阿尔及利亚空军的主要作战中心，增强我们的快速部署能力。"
 ALG_protect_the_skies: "捍卫领空"
 ALG_protect_the_skies_desc: "随着区域空中威胁日益增加，阿尔及利亚必须确保能够探测并拦截任何入侵行为。加强防空能力是国家安全的当务之急。"
 ALG_russia_mig_servicing: "俄罗斯米格战斗机维护合同"
 ALG_russia_mig_servicing_desc: "维护和升级我们的米格机队需要与俄罗斯承包商开展更深入的合作。这些维修协议将确保现有飞机的长期服役寿命。"
 ALG_bosnian_parts: "确保波斯尼亚备件安全"
 ALG_bosnian_parts_desc: "阿尔及利亚将从波斯尼亚国防工业获取剩余零部件，以支持和改造我们老化的机身，从而确保经济高效的维护和修理。"
 ALG_comprehensive_radar_installations: "雷达覆盖范围扩展"
 ALG_comprehensive_radar_installations_desc: "为了实现全国雷达覆盖，我们将在阿尔及利亚的边境和沿海地区建设先进的雷达设施，消除我们空域的所有盲区。"
 ALG_chahid_el_taib_djabar_academy: "扩建查希德·埃尔·泰布·贾巴尔学院"
 ALG_chahid_el_taib_djabar_academy_desc: "这所顶尖的空军学院将获得更多资金和现代化的培训基础设施，以培养新一代阿尔及利亚飞行员和工程师。"
 ALG_reform_or_control: "改革或控制"
 ALG_reform_or_control_desc: "阿尔及利亚正处于政治十字路口。在真正的民主改革和巩固威权统治之间做出选择，将决定这个国家的未来。"
 ALG_national_reconciliation_path: "推进民族和解"
 ALG_national_reconciliation_path_desc: "为了治愈内战创伤，我们必须与以前的对手接触，使政治非军事化，并寻求包容各方的全国对话，以确保长期稳定。"
 ALG_military_consolidation: "巩固军事控制"
 ALG_military_consolidation_desc: "在动荡时期，军队必须维护秩序。扩大军队在治理中的作用将有助于政权抵御叛乱威胁。"
 ALG_legalize_moderate_islamists: "将温和伊斯兰主义者合法化"
 ALG_legalize_moderate_islamists_desc: "承认温和的伊斯兰政党是实现包容性稳定的途径。谨慎监督其参与选举可以化解极端情绪。"
 ALG_restore_elections: "恢复选举程序"
 ALG_restore_elections_desc: "为了重塑国家合法性，阿尔及利亚必须恢复自由公正的选举。透明度和问责制将是我们新政治时代的支柱。"
 ALG_public_media_and_transparency: "增强公共媒体和透明度"
 ALG_public_media_and_transparency_desc: "国家媒体改革和新闻自由对于重建公众信任至关重要。知情的公民是民主发展的基础。"
 ALG_crackdown_on_opposition: "镇压反对派"
 ALG_crackdown_on_opposition_desc: "为防止局势动荡，必须遏制异议。监视、审查和有针对性的逮捕将消除反政府势力。"
 ALG_state_surveillance_network: "国家监控网络"
 ALG_state_surveillance_network_desc: "将扩大国家情报网络，以监控政治活动，确保在威胁升级之前将其消除。"
 ALG_amnesty_and_integration: "大赦与融合计划"
 ALG_amnesty_and_integration_desc: "将向以前的武装分子和异见人士提供特赦，以换取他们解除武装并重新融入平民生活 - 弥合和平与正义之间的差距。"
 ALG_joint_governance_experiment: "联合治理实验"
 ALG_joint_governance_experiment_desc: "我们将尝试一种世俗力量与宗教力量之间新的权力分享模式，以防止冲突再次爆发。这项冒险的实验可能带来和平，也可能导致社会瘫痪。"
 ALG_a_radical_reorientation: "彻底的重新定位"
 ALG_a_radical_reorientation_desc: "现有的秩序已经失败。凭借神圣的旨意和清晰的意识形态，一条新的道路正在出现 - 这条道路以毫不妥协的信仰为指导，并拒绝世俗国家的合法性。"
 ALG_covert_support_for_islamist_radicals: "暗中支持伊斯兰极端分子"
 ALG_covert_support_for_islamist_radicals_desc: "激进组织网络仍然在暗中活跃。通过战略性资金支持和秘密后勤援助，我们可以赋能这些组织，使其能够从内部对抗政权。"
 ALG_tolerate_radical_preachers: "容忍激进传教士"
 ALG_tolerate_radical_preachers_desc: "讲坛是强大的工具。如果我们对煽动性的布道视而不见，就会任由意识形态通过清真寺和媒体自然传播，从而使民众朝着有利于我们的方向激进化。"
 ALG_welcome_militants: "欢迎外国武装分子"
 ALG_welcome_militants_desc: "我们的事业超越国界。认同我们理念的外国战士可以得到安全庇护，并融入当地组织，他们能带来实战经验和坚定不移的奉献精神。"
 ALG_arms_smuggling: "武器走私行动"
 ALG_arms_smuggling_desc: "为了应对未来的冲突，我们必须建立武器弹药的地下供应链。与跨国军火商结盟将满足我们的需求。"
 ALG_start_the_uprising: "发动起义"
 ALG_start_the_uprising_desc: "现在正是时候。我们的网络已经启动，我们的战士已经武装起来，我们的意识形态正在传播，我们将奋起反抗这个政权，建立一个新的伊斯兰秩序。"
 ALG_clamp_down_on_vices: "严厉打击不良行为"
 ALG_clamp_down_on_vices_desc: "赌博、酗酒和道德败坏在我们的社会中没有立足之地。一场彻底根除这些恶习的运动，将净化国家，并维护宗教权威。"
 ALG_revolutionize_the_ulema: "改革乌理玛"
 ALG_revolutionize_the_ulema_desc: "宗教机构必须与革命事业保持一致。传统乌理玛将被清洗或再教育，而忠诚的教士将取而代之，成为国家的精神领袖。"
 ALG_traditional_gender_roles: "强化传统性别角色"
 ALG_traditional_gender_roles_desc: "现代社会破坏了自然秩序。我们将回归神圣赋予男女的角色，并建立一套体现这些价值观的严格法律框架。"
 ALG_pledge_allegiance_to_al_qaeda: "向基地组织宣誓效忠"
 ALG_pledge_allegiance_to_al_qaeda_desc: "全球圣战要想成功，团结至关重要。我们将宣誓效忠基地组织，认同他们的愿景，并获得更广泛的伊斯兰主义网络的支持。"
 ALG_pledge_allegiance_to_daesh: "向伊斯兰国宣誓效忠"
 ALG_pledge_allegiance_to_daesh_desc: "基地组织是一个日渐衰落、日渐腐朽的运动，它早已忘记了最初发动全球圣战的目标，反而深陷于地方事务之中。现在是时候让一个拥有全新目标和使命感的新运动取而代之了。"
 ALG_secure_the_loyalty_of_aqim: "确保伊斯兰马格里布基地组织的忠诚"
 ALG_secure_the_loyalty_of_aqim_desc: "伊斯兰马格里布基地组织必须承认我们的领导地位，并与我国协调行动。他们的忠诚将确保我们对该地区圣战行动的持久控制。"
 ALG_war_on_daesh: "向伊斯兰国开战"
 ALG_secure_the_loyalty_effect_tt: "效果将取决于是否拥有以下任何一个国家作为傀儡：[AQY.GetNameWithFlag]，[NUS.GetNameWithFlag]，[TTP.GetNameWithFlag]"
 ALG_war_on_daesh_desc: "所谓的“伊斯兰国”对我们领导全球圣战运动构成了明显的威胁。他们无视我们的权威，并采取非常规的战术，我们绝不能再容忍。现在是我们对这个新兴的“伊斯兰国”发动全面战争的时候了。"
 ALG_jihad_in_the_maghreb: "马格里布圣战"
 ALG_jihad_in_the_maghreb_desc: "摩洛哥、突尼斯和阿尔及利亚的世俗政权必须垮台。我们将以武力扩张我们的哈里发国，发动一场区域性的宗教战争和领土扩张运动。"
 ALG_jihad_in_arabia: "阿拉伯圣战"
 ALG_jihad_in_arabia_desc: "阿拉伯半岛是麦加和麦地那两大圣地的所在地，或许是世界上宗教意义最为重大的地区。因此，绝不能允许它继续由不够虔诚、腐败的政府统治。"
 ALG_jihad_in_the_levant: "伊拉克和黎凡特圣战"
 ALG_jihad_in_the_levant_desc: "自殖民时代以来，伊拉克和黎凡特地区一直饱受外国势力的蹂躏。只有通过武力才能将十字军和犹太复国主义占领者驱逐出黎凡特地区。"
 ALG_jihad_in_west_africa: "西非圣战"
 ALG_jihad_in_west_africa_desc: "我们的革命不会止步于马格里布。现在是时候将圣战输出到西非了，我们将一路南下，推翻马里、尼日尔和毛里塔尼亚的政权。"
 AlgeriaFocus.56.t: "[FROM.GetNameDef]支持我们独立"
 AlgeriaFocus.56.d: "[FROM.GetNameDef]已确认支持我们脱离摩洛哥独立，并表示希望将来与我们更紧密地合作。"
 AlgeriaFocus.56.a: "太好了"
 AlgeriaFocus.57.t: "[FROM.GetNameDef]抛弃了我们"
 AlgeriaFocus.57.d: "[FROM.GetNameDef]已经撤回了对我们独立的支持。几十年来他们一直是我们的支持者，但现在他们似乎为了与摩洛哥搞好关系而抛弃了我们。"
 AlgeriaFocus.57.a: "叛徒！"
 AlgeriaFocus.58.t: "[FROM.GetNameDef]举行和平会谈"
 AlgeriaFocus.58.d: "[FROM.GetAdjective] 组织了一次和平会议，称之为《卡萨布兰卡协议》。他们的目标是为西撒哈拉现有的冲突找到持久的和平解决方案。我们被要求派代表团参加他们的会议。"
 AlgeriaFocus.58.a: "派遣代表团"
 algeria_algerian_foreign_policy: "阿尔及利亚外交政策"
 AlgeriaFocus.59.t: "选择和平计划"
 AlgeriaFocus.59.d: "我们需要为西撒哈拉冲突制定解决方案。从本质上讲，有四个有效选择：\n\n1. 摩洛哥吞并西撒哈拉\n2. 西撒哈拉享有有限自治\n3. 撒哈拉维获得完全独立\n4. 将该地区与毛里塔尼亚合并。"
 AlgeriaFocus.59.a: "西撒哈拉应成为摩洛哥的一部分"
 algeria_western_sahara_peace_plan_annexation_tt: "§Y[MOR.GetNameWithFlag]赞成此选项，但其他人很可能会反对§!"
 AlgeriaFocus.59.b: "西撒哈拉应享有有限自治"
 algeria_western_sahara_peace_plan_autonomy_tt: "§Y这是一个各方都能接受的折衷解决方案§!"
 AlgeriaFocus.59.c: "西撒哈拉应该独立"
 algeria_western_sahara_peace_plan_independence_tt: "§Y[SHA.GetNameWithFlag]和[ALG.GetNameWithFlag]赞成此选项，但[MOR.GetNameWithFlag]很可能会反对§!"
 AlgeriaFocus.59.de: "西撒哈拉与毛里塔尼亚合并"
 algeria_western_sahara_peace_plan_mauritania_tt: "§Y除了民族主义[MAU.GetNameWithFLag]之外，所有人都可能会反对这个选项§!"
 AlgeriaFocus.60.t: "[FROM.GetNameDef]请求我们支持他们的和平计划"
 AlgeriaFocus.60.da: "[FROM.GetName]要求我们支持他们的西撒哈拉和平计划。他们的计划是将整个地区并入摩洛哥。我们可以支持吗？"
 AlgeriaFocus.60.db: "[FROM.GetName]请求我们支持他们的西撒哈拉和平计划。他们的计划是让西撒哈拉成为摩洛哥的一个自治部分。我们可以支持吗？"
 AlgeriaFocus.60.dc: "[FROM.GetName]正在请求我们支持他们的西撒哈拉和平计划。他们的计划是让西撒哈拉脱离摩洛哥而独立。我们可以支持吗？"
 AlgeriaFocus.60.dd: "[FROM.GetName]请求我们支持他们的西撒哈拉和平计划。他们的计划是将西撒哈拉并入毛里塔尼亚。我们可以支持吗？"
 AlgeriaFocus.60.a: "我们可以接受这个计划"
 AlgeriaFocus.60.b: "这对我们来说是不可接受的"
 AlgeriaFocus.60.c: "这次会议毫无意义，撤回我们的代表团"
 AlgeriaFocus.590.t: "约旦的巴勒斯坦代理人"
 AlgeriaFocus.590.d: "看来，[FROM.GetName]政府武装了居住在约旦的一些巴勒斯坦难民，并将他们投放在以色列。他们的明确意图是利用这些巴勒斯坦人作为在以色列制造麻烦的代理人。"
 AlgeriaFocus.590.a: "可笑至极"
 AlgeriaFocus.600.t: "巴勒斯坦代理人进行突击"
 AlgeriaFocus.600.d: "数支巴勒斯坦附庸民兵部队已从约旦越境进入以色列，袭击边境城镇。这些民兵显然得到了[FROM.GetName]的支持，这无疑是公开宣战。我们必须反击，让[FROM.GetName]明白，我们绝不会任人摆布。"
 AlgeriaFocus.600.a: "反击！"
 AlgeriaFocus.610.t: "以色列袭击阿尔及利亚"
 AlgeriaFocus.610.d: "以色列对阿尔及利亚发动袭击，是为了报复盘踞在约旦的巴勒斯坦代理人。如果我们同意臣服于阿尔及利亚，我们现在就有机会收复巴勒斯坦。"
 AlgeriaFocus.610.a: "必要的牺牲"
 AlgeriaFocus.610.b: "我们不会依赖他们"
 AlgeriaFocus.620.t: "[FROM.GetName]请求臣服"
 AlgeriaFocus.620.d: "[FROM.GetName]表示，如果我们帮助他们收复巴勒斯坦，他们愿意成为我们的附庸。"
 AlgeriaFocus.620.a: "当然"
 AlgeriaFocus.620.b: "我们不需要他们"
 AlgeriaFocus.61.t: "[FROM.GetNameDef]接受和平计划"
 AlgeriaFocus.61.d: "[FROM.GetNameDef]接受了我们对西撒哈拉冲突的解决方案。"
 AlgeriaFocus.61.a: "太好了"
 AlgeriaFocus.62.t: "[FROM.GetNameDef]拒绝和平计划"
 AlgeriaFocus.62.d: "[FROM.GetNameDef]拒绝了我们针对西撒哈拉冲突的解决方案。"
 AlgeriaFocus.62.a: "该死"
 AlgeriaFocus.63.t: "[FROM.GetNameDef]离开和平会谈"
 AlgeriaFocus.63.d: "[FROM.GetAdjective]代表团宣布将退出《卡萨布兰卡协议》。他们表示，我们的和平要求荒谬可笑，他们不再有兴趣参与。"
 AlgeriaFocus.63.a: "该死"
 AlgeriaFocus.64.t: "[FROM.GetNameDef] 要求克里特岛的自治权"
 AlgeriaFocus.64.d: "[FROM.GetAdjective]政府已声明，他们对我们在克里特岛所持有的立场感到担忧。在他们看来，我们对该岛的牢牢控制损害了他们的国家安全。他们要求给予克里特岛有限的自治权，以削弱我们在该地区的军事与政治存在。"
 AlgeriaFocus.64.a: "我想我们可以"
 AlgeriaFocus.64.b: "真是荒谬"
 AlgeriaFocus.65.t: "[FROM.GetNameDef]接受"
 AlgeriaFocus.65.d: "[FROM.GetAdjective]政府接受了我们关于增加克里特人民自治权的请求"
 AlgeriaFocus.65.a: "成功"
 AlgeriaFocus.66.t: "[FROM.GetNameDef]拒绝"
 AlgeriaFocus.66.d: "[FROM.GetAdjective]政府拒绝了我们提高克里特岛人民自治权的要求。"
 AlgeriaFocus.66.a: "他们会后悔的"
 AlgeriaFocus.66.b: "我们将静待时机"
 AlgeriaFocus.67.t: "哈马斯发起新一轮起义"
 AlgeriaFocus.67.d: "哈马斯已号召对我们发起新一轮起义。我们观察到哈马斯武装分子活动日益频繁，已发生了数起反对我们在巴勒斯坦统治的示威活动。据情报显示，阿尔及利亚可能在此次新行动背后为哈马斯提供武器支持并煽动其行动。"
 AlgeriaFocus.67.a: "他们会后悔的"
 AlgeriaFocus.68.t: "[FROM.GetNameDef]赞助新一轮起义"
 AlgeriaFocus.68.d: "[FROM.GetAdjective] 为我们提供了武器和资金，让我们发起一场针对以色列的新起义。我们的办公室附近已排起新兵招募的长队，民众正动员起来抗议以色列占领者。"
 AlgeriaFocus.68.a: "我们感谢阿尔及利亚"
 AlgeriaFocus.69.t: "哈马斯起义"
 AlgeriaFocus.69.d: "我们接到报道称哈马斯武装分子正在占领加沙地带的重要机关和建筑物。他们发誓要让以色列遭受新的起义（因提法达）。"
 AlgeriaFocus.69.a: "该死"
 AlgeriaFocus.69.b: "击溃他们！"
 AlgeriaFocus.70.t: "[FROM.GetNameDef]联络图布人"
 AlgeriaFocus.70.d: "我们收到报告，阿尔及利亚已开始在我国北部武装图布族叛军。如果利比亚入侵，这些叛军必将加入他们的阵营。"
 AlgeriaFocus.70.a: "令人担忧"
 AlgeriaFocus.71.t: "[FROM.GetNameDef]提议联合采矿"
 AlgeriaFocus.71.d: "[FROM.GetAdjective]政府提议在奥祖地带开展联合铀矿开采项目。这将为两国未来提供资源。我们该如何回应？"
 AlgeriaFocus.71.a: "好主意！"
 AlgeriaFocus.71.b: "我们不在乎"
 AlgeriaFocus.72.t: "[FROM.GetNameDef]接受我方提案"
 AlgeriaFocus.72.d: "[FROM.GetAdjective]政府已接受我们关于联合采矿的协议"
 AlgeriaFocus.72.a: "太好了"
 AlgeriaFocus.73.t: "[FROM.GetNameDef]拒绝我方提案"
 AlgeriaFocus.73.d: "[FROM.GetAdjective]政府拒绝了我们的联合采矿协议"
 AlgeriaFocus.73.a: "该死"
 AlgeriaFocus.74.t: "[FROM.GetNameDef]开始铀矿的开采"
 AlgeriaFocus.74.d: "[FROM.GetNameDef]已开始在奥祖地带开采铀矿。尽管大部分资源归其所有，我方也能获得一小部分份额，且[FROM.GetAdjective]已同意承担所有开采费用。"
 AlgeriaFocus.74.a: "好的"
 AlgeriaFocus.90.t: "西撒哈拉自治"
 AlgeriaFocus.90.d: "[FROM.GetAdjective]主办的卡萨布兰卡会议取得了对我们极为有利的结果。与会各国一致决定，西撒哈拉应归属摩洛哥。"
 AlgeriaFocus.90.a: "太好了"
 AlgeriaFocus.910.d: "[FROM.GetAdjective]主持的卡萨布兰卡会议取得了对我们极为有利的结果。各方一致同意，应通过给予西撒哈拉人（或称撒哈威人）在摩洛哥境内有限自治的方式来解决冲突。"
 AlgeriaFocus.910.a: "太好了"
 AlgeriaFocus.910.b: "太好了"
 AlgeriaFocus.91.t: "政府规模扩张"
 AlgeriaFocus.91.d: "如今我们已执掌政权，必须巩固自身地位，通过扩大支持基础来推进后续改革。现有两个党派提出与我们结盟，但均附带条件。一个规模不大但颇具抱负的党派由联邦派领导，主张分权、改革权力结构，并推行直接民主举措。另一个由民粹主义共和派领导，主张建立中央集权的官僚权力体系，使其成为高效、统一的秩序与正义力量，完全反对联邦制方案。我们将选择与以下一方结盟："
 AlgeriaFocus.91.a: "联邦主义者"
 AlgeriaFocus.91.b: "民粹主义者"
 AlgeriaFocus.91.c: "嗯，这个我们可以稍后再谈。"
 AlgeriaFocus.92.t: "西撒哈拉独立"
 AlgeriaFocus.92.d: "[FROM.GetAdjective]主办的卡萨布兰卡会议已促成西撒哈拉从摩洛哥完全独立。未来，该国将被称为阿拉伯撒哈拉民主共和国。"
 AlgeriaFocus.92.a: "好的"
 AlgeriaFocus.92.b: "太好了"
 AlgeriaFocus.93.t: "西撒哈拉加入毛里塔尼亚"
 AlgeriaFocus.93.d: "由[FROM.GetAdjective]主持召开的卡萨布兰卡协定最终导致西撒哈拉被毛里塔尼亚吞并。"
 AlgeriaFocus.93.a: "好的"
 AlgeriaFocus.93.b: "太好了"
 AlgeriaFocusNews.8.t: "卡萨布兰卡协议被公布"
 AlgeriaFocusNews.8.d: "[FROM.GetAdjective]政府宣布召开一场关于西撒哈拉地位的和平会议。摩洛哥、阿尔及利亚、毛里塔尼亚以及波利萨里奥阵线代表均获邀与会。[FROM.GetLeader]立下雄心勃勃的目标，力求为这一僵持的冲突找到解决方案。"
 AlgeriaFocusNews.8.a: "有趣"
 AlgeriaFocusNews.16.t: "卡萨布兰卡协定达成最终结论"
 AlgeriaFocusNews.16.annex.d: "当[ALG.GetLeader]宣布将举办一场旨在解决西撒哈拉地位问题的国际会议时，许多人对此表示怀疑。然而，相关协定似乎已得出某种结论。在这份被称为《 [GetYear] 卡萨布兰卡协定》的宣言中，各方拟定了将西撒哈拉正式并入摩洛哥的方案。在研究历史文献后，协定认定：西撒哈拉在法律上属于摩洛哥领土。截至目前，[SHA.GetNameDef]是否会接受这一决定，仍未可知。"
 AlgeriaFocusNews.16.autonomy.d: "当[ALG.GetLeader]宣布将召开国际会议解决西撒哈拉地位问题时，许多人持怀疑态度。然而，协议似乎已达成某种结论。在他们被称为[GetYear]年《卡萨布兰卡协定》的声明中，概述了将西撒哈拉并入摩洛哥、同时允许撒哈拉人保持高度自治的计划。双方明确约定西撒哈拉可保留自身军队并直接控制内部政治事务，而摩洛哥将负责该地区的国际关系，包括抵御外部威胁。"
 AlgeriaFocusNews.16.independence.d: "当[ALG.GetLeader]宣布将召开国际会议解决西撒哈拉地位问题时，许多人持怀疑态度。然而，协议似乎已达成某种结论。在他们被称为[GetYear]年《卡萨布兰卡协定》的声明中，签署方明确表示支持西撒哈拉的完全独立。协定明确指出，西撒哈拉人民对独立的渴望超越了任何可能从法律上将该地区划归摩洛哥的历史记录。目前尚不确定[MOR.GetNameDef]是否会接受这一决定。"
 AlgeriaFocusNews.16.mauritania.d: "当[ALG.GetLeader]宣布将召开国际会议解决西撒哈拉地位问题时，许多人持怀疑态度。然而，协议似乎已达成某种结论。在他们发布的名为《[GetYear]卡萨布兰卡协定》的声明中，宣称西撒哈拉在法律上属于毛里塔尼亚。通过研究历史文献和过往外交协议，从他们的角度来看，毛里塔尼亚显然应拥有该领土。至于[MOR.GetNameDef]和[SHA.GetNameDef]是否会接受这一决定，目前尚不确定。"
 AlgeriaFocusNews.16.a: "有趣"
 AlgeriaFocusNews.17.t: "卡萨布兰卡协议未能达成"
 AlgeriaFocusNews.17.d: "当[ALG.GetLeader]宣布将召开国际会议以解决西撒哈拉地位问题时，许多人持怀疑态度。这种怀疑并非没有道理——经过一年的谈判，未取得任何实质性进展。由于对进程感到失望，[ALG.GetLeader]已宣布终止相关协议。看来西撒哈拉在未来仍将是一个争议地区。"
 AlgeriaFocusNews.17.a: "有趣"
 AlgeriaFocusNews.18.t: "卡萨布兰卡协议破裂"
 AlgeriaFocusNews.18.d: "当[ALG.GetLeader]宣布将召开国际会议解决西撒哈拉地位问题时，许多人持怀疑态度。这种怀疑并非没有道理，与会国之间的严重分歧迫使协议提前终止。多个代表团已实质上放弃了协议内容，因为他们感到自己的诉求未被听取。这对[ALG.GetLeader]而言无疑是一次尴尬的经历。"
 AlgeriaFocusNews.18.a: "有趣"
 AlgeriaFocusNews.19.t: "[ENG.GetAdjective]干预阿尔及利亚"
 AlgeriaFocusNews.19.d: "在[ENG.GetNameDef]发生针对阿尔及利亚王室成员的刺杀未遂事件后，[ENG.GetAdjective]政府要求[ALG.GetAdjective]政府立即作出赔偿并公开道歉。[ENG.GetNameDef]调查发现[ALG.GetNameDef]与此次恐怖袭击存在密切关联。由于未收到任何道歉或赔偿，[ENG.GetNameDef]将此视为对国家主权的攻击。洛克比空难的创伤尚未愈合，[ENG.GetNameDef]为阻止更多袭击，不得不采取推翻[ALG.GetAdjective]政府的行动。"
 AlgeriaFocusNews.19.a: "有趣"
 ALG_claim_jerusalem_for_arabs: "为阿拉伯人主张耶路撒冷的主权"
 ALG_claim_jerusalem_for_arabs_desc: "以色列人和巴勒斯坦人都不配拥有这片土地。他们已证明只会把事情搞得一团糟。这片地区应由真正的阿拉伯人来统治，带来和平与稳定。"
 ALG_claim_jerusalem_for_arabs_tt: "我们可以把黎凡特地区§Y宣称§!领土转化为§Y核心§!领土。"
 ALG_approach_hamas: "接近哈马斯"
 ALG_approach_hamas_desc: "哈马斯是唯一真正试图阻止犹太复国主义的力量。我们需要与他们建立更好的关系，为推翻以色列做好准备。"
 ALG_send_fighters_to_hamas: "向哈马斯派遣战士"
 ALG_send_fighters_to_hamas_desc: "当巴勒斯坦人民英勇抵抗犹太复国主义侵略者时，一个简单的事实是他们人数处于劣势。我们需要组织一批志愿者前往巴勒斯坦，加入哈马斯的行列。"
 MSP_claim_jerusalem_for_arabs: "宣称耶路撒冷属于阿拉伯人"
 MSP_claim_jerusalem_for_arabs_desc: "以色列人和巴勒斯坦人都不配拥有这片土地。他们已证明只会把事情搞得一团糟。这片地区应由真正的阿拉伯人来统治，带来和平与稳定。"
 MSP_approach_hamas: "接近哈马斯"
 MSP_approach_hamas_desc: "哈马斯是唯一真正试图阻止犹太复国主义的力量。我们需要与他们建立更好的关系，为推翻以色列做好准备。"
 MSP_send_fighters_to_hamas: "向哈马斯派遣战士"
 MSP_send_fighters_to_hamas_desc: "当巴勒斯坦人民英勇抵抗犹太复国主义侵略者时，一个简单的事实是他们人数处于劣势。我们需要组织一批志愿者前往巴勒斯坦，加入哈马斯的行列。"
 MSP_condemn_china: "谴责中国"
 MSP_condemn_china_desc: "中国对待本土穆斯林的方式令人憎恶，应受到谴责。"
 MSP_improve_relations_with_algeria: "改善与埃及的关系"
 MSP_improve_relations_with_algeria_desc: "土耳其与埃及有着不愉快的历史，这主要是由于我们过去的冲突。我们都站在同一边，我们不应该对埃及人如此冷漠。"
 MSP_work_together_with_BSEC: "与黑海经济合作组织合作"
 MSP_work_together_with_BSEC_desc: "黑海经济合作组织是一个旨在促进黑海地区繁荣的组织。该组织由黑海周边国家和一些南巴尔干国家组成。我们需要与这些国家合作以增加利益。"
 MSP_fixing_ideals: "修复理想"
 AlgeriaInvestment.1.t: "[ALG.GetNameDef]邀请我们投资其项目"
 AlgeriaInvestment.1.desc: "[ALG.GetNameWithFlag]政府刚刚从与塔利班的战争中恢复过来，他们邀请我们投资他们国家的一些项目。不过，是否投资取决于我们。如果我们选择投资，我们可以对他们的政府产生一些影响，如果阿尔及利亚的恐怖威胁仍然很高，我们最好不要冒险。"
 AlgeriaInvestment.1.a: "投资他们的基础设施！"
 AlgeriaInvestment.1.b: "投资他们的民用工业！"
 AlgeriaInvestment.1.c: "投资他们的服务行业！"
 AlgeriaInvestment.1.d: "我们最好还是别冒险了。"
 AlgeriaInvestment.2.t: "[FROM.GetNameDef]投资我国基础设施！"
 AlgeriaInvestment.2.d: "经过数日谈判，[FROM.GetNameWithFlag]已同意对我国基础设施进行投资，以换取一些微小让步。这项投资将使我国农村人口受益。"
 AlgeriaInvestment.2.a: "我们非常感谢他们的帮助！"
 AlgeriaInvestment.3.t: "[FROM.GetNameDef]投资我国民用工业！"
 AlgeriaInvestment.3.d: "经过几天的谈判，[FROM.GetNameWithFlag] 已同意帮助我们建立一些民用工厂，以换取一些小的让步。这项投资将有利于我国的工业部门并促进国家的现代化。"
 AlgeriaInvestment.3.a: "我们非常感谢他们的帮助！"
 AlgeriaInvestment.4.t: "[FROM.GetNameDef]投资我国服务业！"
 AlgeriaInvestment.4.d: "经过数日谈判，[FROM.GetNameWithFlag]已同意在我国投资建设一批办公园区以换取我方少量让步。这项投资将有利于我国金融业发展，并推动国家现代化进程。"
 AlgeriaInvestment.4.a: "我们非常感谢他们的帮助！"
 AlgeriaInvestment.5.t: "[FROM.GetNameDef] 拒绝投资！"
 AlgeriaInvestment.5.d: "经过几天的谈判，[FROM.GetNameWithFlag] 拒绝了我们的投资邀请，理由是我们国家的商业环境还不够安全，将仔细评估与我们的未来投资交易。"
 AlgeriaInvestment.5.a: "看来我们还得再加把劲！"
 AlgeriaInvestment.6.t: "阿尔及利亚加入世贸组织后寻求中东投资"
 AlgeriaInvestment.6.d: "随着近期加入世界贸易组织，阿尔及利亚正寻求增加资本注入以推动经济发展。官员们正积极与中东国家接触，呼吁在关键领域加强合作与投资。此举表明阿尔及利亚致力于利用国际伙伴关系，推动该地区的增长与稳定。"
 AlgeriaInvestment.7.t: "他们签署了一项贸易协议"
 AlgeriaInvestment.7.d: "他们希望提议一项贸易协定，以促进更广泛的合作，并为未来的投资敞开大门。"
 AlgeriaInvestment.7.a: "好的"
 AlgeriaInvestment.6.a: "签署贸易协定"
 AlgeriaInvestment.6.b: "投资工厂"
 AlgeriaInvestment.6.c: "不用了，谢谢"
 Algeria.11.t: "[ALG.GetNameDef]请求我们的保护"
 Algeria.11.d: "经过数十年的动荡，阿尔及利亚政府担心战争重燃或外部干涉和入侵，[ALG.GetNameWithFlag]总统[ALG.GetLeader]已访问中南海，并向中南海总书记[CHI.GetLeader]提出签署防务条约的请求。如果我们同意保护[ALG.GetNameWithFlag]，我们将能够确保他们处于我们的势力范围之内，但我们也有义务保护他们免受外部威胁，并协助他们维护国家稳定，尤其是在打击£GFX_ALG_salafist_jihadism 伊斯兰极端主义叛乱方面。考虑到我国的局势，我们是否应该与[ALG.GetLeader]签署防务条约？"
 Algeria.11.a: "又一个钢铁兄弟！"
 Algeria.11.b: "我们没有任何多余的资源可以用于条约！"
 Algeria.12.t: "[CHI.GetNameDef]已同意保护我们"
 Algeria.12.d: "感谢我们的外交努力，[CHI.GetNameWithFlag]的总书记[CHI.GetLeader]已与我国总统[ALG.GetLeader]正式签署了防御条约。通过签署该防御条约，[FROM.GetNameWithFlag]不仅将保护我们免受外部侵略，还将为维护我国内部稳定提供援助。"
 Algeria.12.a: "棒极了！"
 Algeria.13.t: "[CHI.GetNameDef]拒绝签字！"
 Algeria.13.d: "尽管我国总统[ALG.GetLeader]为寻求安全援助访问了[CHI.GetNameWithFlag]，但[CHI.GetLeader]显然对任何形式的条约都讳莫如深。[CHI.GetLeader]曾对我国总统表示：“我们将始终致力于维护地区安全与稳定。”但显而易见的是，[CHI.GetLeader]的承诺仅停留在口头上，我们只能独自捍卫自身安全。"
 Algeria.13.a: "真是令人失望"
