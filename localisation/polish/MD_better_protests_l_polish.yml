 expected_health_spending: "Status §CWydatków na opiekę zdrowotną§!"
 expected_adm_spending: "Status §CWydatków administracyjnych§!"
 expected_edu_spending: "Status §CWydatków na edukację§!"
 expected_police_spending: "Status §CWydatków na policję§!"
 expected_defence_spending: "Status §CWydatków na obronę§!"
 protests_main_text: "The grid below shows what citizens expect of you and what you are currently funding. Gaps in red feed protest drift; closing them is the most direct way to bring tensions down.[fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "Open §YProtest System§! Screen"
 OPEN_PROTESTS_BUTTON_TT: "Open the §YProtests System§! panel. Review monthly drift sources, current Protest Strength and Radicalisation, and the spending levels citizens expect of you."
 PROTEST_TITLE: "§YProtests System§!"
 CLOSE_PROTEST_SCREEN: "Close §YProtests System§! Screen"
 expected_law_mechanic_tt: "§YReading the spending grid§!\n"
 EL_green_square_explanation_tt: "§GGreen§!: expected spending the public is getting. Each green square is one less reason for citizens to protest."
 EL_blue_square_explanation_tt: "§BBlue§!: spending above what citizens currently expect. Costs money every month but buys no extra protest relief."
 EL_red_square_explanation_tt: "§RRed§!: expected spending we are §Rfailing§! to provide. Every red square feeds the §YSpending impact§! line in the drift breakdown above."
 EL_white_square_explanation_tt: "White: law levels that are neither expected nor funded. Idle until citizen expectations climb high enough to demand them."
 expected_social_spending_tt: "Citizens expect a level of §YSocial Spending§! set by your laws, national spirits, technology, and GDP per capita. Each whole number is one level, capped by the laws available in this category.\n\n§YExpected level:§! §Y[expected_social_spending_law_name]§! (currently [?expected_welfare_spending|0Y])\n\n§YBreakdown§!\nLaws, spirits, tech: [?ROOT.modifier@expected_welfare_modifier]\nGDP per capita: [calculate_gdp_c_modifier_welfare_spending]\n"
 expected_health_spending_tt: "Citizens expect a level of §YHealthcare Spending§! set by your laws, national spirits, technology, and GDP per capita. Each whole number is one level, capped by the laws available in this category.\n\n§YExpected level:§! §Y[expected_healthcare_spending_law_name]§! (currently [?expected_health_spending|0Y])\n\n§YBreakdown§!\nLaws, spirits, tech: [?ROOT.modifier@expected_healthcare_modifier]\nGDP per capita: [calculate_gdp_c_modifier_healthcare_spending]\n"
 expected_adm_spending_tt: "Citizens expect a level of §YAdministrative Spending§! set by your laws, national spirits, technology, and GDP per capita. Each whole number is one level, capped by the laws available in this category.\n\n§YExpected level:§! §Y[expected_bureau_spending_law_name]§! (currently [?expected_adm_spending|0Y])\n\n§YBreakdown§!\nLaws, spirits, tech: [?ROOT.modifier@expected_adm_modifier]\nGDP per capita: [calculate_gdp_c_modifier_adm_spending]\n"
 expected_edu_spending_tt: "Citizens expect a level of §YEducation Spending§! set by your laws, national spirits, technology, and GDP per capita. Each whole number is one level, capped by the laws available in this category.\n\n§YExpected level:§! §Y[expected_education_spending_law_name]§! (currently [?expected_edu_spending|0Y])\n\n§YBreakdown§!\nLaws, spirits, tech: [?ROOT.modifier@expected_education_modifier]\nGDP per capita: [calculate_gdp_c_modifier_education_spending]\n"
 expected_police_spending_tt: "Citizens expect a level of §YPolice Spending§! set by your laws, national spirits, technology, and GDP per capita. Each whole number is one level, capped by the laws available in this category.\n\n§YExpected level:§! §Y[expected_police_spending_law_name]§! (currently [?expected_police_spending|0Y])\n\n§YBreakdown§!\nLaws, spirits, tech: [?ROOT.modifier@expected_police_modifier]\nGDP per capita: [calculate_gdp_c_modifier_police_spending]\n"
 expected_defence_spending_tt: "Citizens expect a level of §YMilitary Spending§! set by your laws, national spirits, technology, and GDP per capita. Each whole number is one level, capped by the laws available in this category.\n\n§YExpected level:§! §Y[expected_mil_spending_law_name]§! (currently [?expected_military_sp|0Y])\n\n§YBreakdown§!\nLaws, spirits, tech: [?ROOT.modifier@expected_mil_modifier]\nGDP per capita: [calculate_gdp_c_modifier_military_spending]\n"
 MD_protests_state_calm_text: "§GCalm§!: no unrest mission active."
 MD_protests_state_calm_tt: "No warning or revolt mission is active. This panel stays visible while §YProtest Strength§! is above 20. Act on rising drift before a crisis triggers."
 MD_protests_state_warning_text: "§YWarning§!: protest movement forming."
 MD_protests_state_warning_tt: "The §YIncoming Protests§! mission is active. If it times out, a full revolt begins. Resolve it by stabilising the economy and political conditions that triggered the warning, or use §YAppease Protesters§! and §YPreemptive Reform§! to buy time and lower strength."
 MD_protests_state_revolt_text: "§RRevolt§!: resistance in core states."
 MD_protests_state_revolt_tt: "The §YIncoming Revolt§! mission is active. It completes when §Yall core states§! have no resistance. If it times out, a civil war begins. Use the appease, crackdown, and hearts-and-minds decisions to manage the situation."
 MD_protests_state_cooldown_text: "§BCooldown§!: recovering from crisis."
 MD_protests_state_cooldown_tt: "Recovery period after a protest crisis. No new protest mission can fire for §Y1000§! days. Use the breathing room to rebalance spending and rebuild stability before pressure starts climbing again."
 MD_drift_diagnosed_text: "[MD_top_resistant_state_display]"
 MD_top_resistant_state_active: "§YWorst state:§! [event_target:MD_top_resistant_state_scope.GetName] (§R[?MD_top_resistant_state_value|0]%§!)"
 MD_top_resistant_state_none: "§YWorst state:§! §Gnone§!"
 MD_drift_diagnosed_tt: "The core state with the highest §Yresistance§! level. Pour decisions and garrison into this state to clear its resistance; the §YIncoming Revolt§! mission only completes once §Yevery§! core state has §Gno resistance§!.\n\nShows §Gnone§! when no core state has active resistance."
 MD_drift_header_text: "§YMonthly drift sources§! (last tick):"
 MD_drift_spending_row_text: "Spending impact: [MD_drift_spending_value_colored]"
 MD_drift_spending_value_red: "§R+[?drift_spending_last|1]§!"
 MD_drift_spending_value_green: "§G[?drift_spending_last|1]§!"
 MD_drift_spending_value_yellow: "§Y[?drift_spending_last|1]§!"
 MD_drift_spending_tt: "Citizens expect a baseline of welfare, health, education, police, administrative, and military spending. Underspending pushes protest strength up; overspending cools tensions but drains the treasury. A flat §R+1§! is added when fuel runs out.\n\nRaise the laws marked red on the spending grid below to close the largest gaps. §YAppease Protesters§! and §YPreemptive Reform§! can buy time while you rebalance."
 MD_drift_stability_row_text: "Low stability + elections: §R+[?drift_stability_last|1]§!"
 MD_drift_stability_tt: "Stability has fallen below §Y20%§! and the government still holds elections, so voters are taking to the streets.\n\nPass focuses and events that grant stability, and pause expensive military builds that drag it down. §YPromise: Tax Relief for Citizens§! adds a §G+5%§! stability factor for 300 days, making every other stability gain land faster. A non-elected government removes this driver outright if your political path allows the switch."
 MD_drift_interest_row_text: "High interest rate: §R+[?drift_interest_last|1]§!"
 MD_drift_interest_tt: "The central bank rate is above §Y8.9%§!. Loans cost more, businesses lay off staff, and the public blames the government.\n\nLower the rate from the §YMoney§! tab. Anything below §G8.9%§! removes this driver. The further above the threshold the rate sits, the larger the monthly hit. Keep hikes short and use them only against inflation."
 MD_drift_recession_row_text: "Recession: §R+[?drift_recession_last|1]§!"
 MD_drift_recession_tt: "The economy is in recession. Each month adds a random hit averaging around §R+3§! Protest Strength.\n\nClearing the §Yrecession§! idea through the economy system removes this driver entirely. Watch the economy panel for recovery events, and lean on §YAppease Protesters§! and §YPreemptive Reform§! to ride out the worst of it."
 MD_drift_depression_row_text: "Depression: §R+[?drift_depression_last|1]§!"
 MD_drift_depression_tt: "The economy is in depression, recession's worse sibling. Each month adds a random hit averaging around §R+4§! Protest Strength, roughly a third worse than recession.\n\nClearing the §Ydepression§! idea through the economy system removes this driver. §YPromise: Tax Relief§! and §YPromise: Jobs Program§! cut protest pressure if you can deliver the targets, while §YAppease Protesters§! and §YPreemptive Reform§! buy time."
 MD_drift_war_row_text: "War fatigue: §R+[?drift_war_last|1]§!"
 MD_drift_war_tt: "We have been at war for more than §Y36§! months and the population is exhausted. Each additional 24 months of war adds another §R+1§! per month. A four-year war hits §R+2§!, a six-year war hits §R+3§!, with no plateau.\n\nEnding the war drops this driver to zero immediately. If revolts have already started, §YHearts and Minds Campaign§! grows compliance while you wind the war down."
 MD_drift_corruption_row_text: "Coalition weakness: §R+[?drift_corruption_last|1]§!"
 MD_drift_corruption_tt: "Government coalition strength is below §Y30%§! while a corruption idea is active or elections are suspended. The weaker the coalition, the larger the hit. At §Y10%§! coalition strength it costs §R+0.2§! per month, at §Y20%§! it costs §R+0.1§!.\n\nDowngrade the corruption idea via anti-corruption focuses and events. Build coalition support through subideology pacts. Restoring elections removes this driver outright. §YPromise: Tax Relief§! pays out §G+3%§! coalition strength on success, useful once stability is climbing."
 MD_drift_ct_row_text: "Counter-terror policy: §R+[?drift_ct_last|1]§!"
 MD_drift_ct_tt: "Internet monitoring or protest arrests are active. The crackdown adds a random monthly hit averaging around §R+5§! Protest Strength, the harshest of the random sources.\n\nThese are meant to be short-term tools. Remove the CT idea once the active mission clears, or the bleed continues indefinitely. During an active crisis, pairing CT with §YPromise: Emergency Police Funding§! stacks the resistance-growth reduction."
 MD_drift_passive_row_text: "Passive cooling: §G[?drift_passive_last|1]§!"
 MD_drift_passive_tt: "Public attention drifts. Each month there is a §Y50%§! chance of §G-2§! Protest Strength on its own, averaging around §G-12§! per year for free.\n\nBuying time with §YAppease Protesters§! and §YPreemptive Reform§! lets passive cooling do most of the work."
 MD_drift_total_text: "§YNet last month:§! [MD_drift_total_value_colored]"
 MD_protests_strength_readout_text: "§YStrength:§! §Y[?protest_strength|0]§!§Y / 100   ·   Radicalisation:§! §Y[?protest_radicalisation|0]§!§Y / 10§!"
 MD_protests_strength_readout_tt: "Two gauges that drive the protest lifecycle.\n\n§YProtest Strength§! (currently [?protest_strength|0] / 100) tracks how close the country is to crisis.\n\n§YThresholds§!\nAbove §Y20§!: Diagnose Unrest starts paying off.\nAbove §Y50§!: the Warning mission can fire.\nAbove §Y80§!: the country risks a full Revolt.\n\n§YHow it changes§!\nRises monthly from active drift sources (see the breakdown above).\nFalls passively when no driver is active, and from §YAppease Protesters§!, §YPreemptive Reform§!, and successful Promise missions.\n\n§YProtest Radicalisation§! (currently [?protest_radicalisation|0] / 10) scales how severe crisis events become when they fire. It rises slowly during sustained protests and falls when the country recovers."
 MD_drift_total_value_red: "§R+[?drift_total_last|1]§!"
 MD_drift_total_value_green: "§G[?drift_total_last|1]§!"
 MD_drift_total_value_yellow: "§Y[?drift_total_last|1]§!"
 MD_drift_total_tt: "The sum of all active drift sources plus passive cooling. Positive means Protest Strength is climbing; negative means it is falling.\n\nTo flip the net negative, target the largest driver shown above. §YPreemptive Reform§! and §YAppease Protesters§! buy time while structural fixes land.\n\nThree §YPromise§! decisions commit to a 200 to 350 day goal. Succeed and the Revolt mission gets more time; fail and the broken promise adds a small penalty. §YPromise: Emergency Police Funding§! runs 200 days and asks you to drop Protest Strength by §G10§!, paying §G+75§! days on the Revolt mission. §YPromise: Tax Relief§! runs 300 days and asks you to raise Stability by §G5%§!, paying §G+100§! days. §YPromise: Jobs Program§! runs 350 days and asks you to drop unemployment by §G1.5%§!, paying §G+120§! days."
 MD_protests_revolt_states_text: "§RCore states still resisting:§! §Y[?cores_resisting_count|0]§!"
 MD_protests_revolt_states_tt: "The §YIncoming Revolt§! mission completes when this reaches §G0§!. Each resistance pocket is cleared through compliance > 50% and resistance < 40% on that state, randomly resolved by the protest event chain."