l_japanese:
 influence_gain_tooltip_yes_tt: "この投資プロジェクトで影響力を得る。\n\n[investment_cooldown]"
 influence_gain_tooltip_no_tt: "この投資プロジェクトで影響力は得れない。\n"
 this_investment_offer_pending_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§!は現在、§Y[ROOT.GetNameWithFlag]§!からの§C投資提案§!を検討していない。\n\n§Y開発者ノート：§!マルチプレイ中のパフォーマンス低下により、ブロックされる場合があります。バグ報告する前に、90日間（3か月）経過するまで待ってみてください。"
 has_available_treasury_tt: "§Y国庫§!は$$§Y[?ROOT.project_monetary_cost^-1]§!B以上である（現在: $$§G[?ROOT.treasury]§!B）\n"
 disabled_foreign_investment_flag_tt: "§Y[ROOT.GetNameWithFlag]§!は他国に投資できる。\n"
 int_auto_reject_investment_flag_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§!は現在、提案を自動拒否していない"
 state_based_investments_screen_tt: "§H国内投資§!"
 check_for_investment_project_limits_tt: "現在、利用可能な§H国内投資§!スロットを保有中（空きプロジェクト数: [current_soi_count] / [?modifier@internal_investment_slot_number|0]）"
 state_based_investments_screen_delayed_tt: "以下のメニューには、[THIS.GetName]内でさまざまな種類の開発を促進するために実行できる決定事項が表示されている。すべての国は、全国のどの州でも利用できるスロットを最低2つ持っている。1つの州で複数のプロジェクトを実行することも、プロジェクトを全国に分散させることも可能だ。国の§Y国ランク§!を上げることで、追加のスロットを獲得できる。\n\n国ランクによるスロット数：\n§Y超大国§!: 6\n§Y大国§!: 5\n§Y主要国§!: 4\n§Y地域大国§!: 3\n"
 available_internal_investments_screen_tt: "利用可能な§H国内投資§!スロット: [current_soi_count] / [?modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "すべての国は、全国のどの州でも利用できるスロットを最低2つ持っている。1つの州で複数のプロジェクトを実行することも、プロジェクトを全国に分散させることも可能だ。国の§Y国ランク§!を上げることで、追加のスロットを獲得できる。\n\n進行中のプロジェクト:\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "地域の再生可能エネルギー能力の拡大"
 state_owned_local_renewable_capacity_modifier_desc: "州は、地域の再生可能エネルギーインフラへの一連の重点投資を経て、現在では再生可能エネルギー源からの発電量を増やしている。"
 state_owned_local_infrastructure_modifier: "地域のインフラの拡大"
 state_owned_local_infrastructure_modifier_desc: "州内の地域インフラを拡張したことで、地域インフラを実質的に改善するための様々な短期プロジェクトが実施されている。"
 state_owned_local_military_infrastructure_modifier: "地域の軍事インフラの拡大"
 state_owned_local_military_infrastructure_modifier_desc: "After significant investment in local military facilities and infrastructure upgrades, the region's military installations are now fully modernized. The state's military production capabilities have been substantially enhanced."
 state_owned_local_energy_infrastructure_modifier: "地域のエネルギーインフラの拡大"
 state_owned_local_energy_infrastructure_modifier_desc: "Targeted investments in the local energy grid have resulted in a comprehensive modernization of the state's power generation and distribution infrastructure. The state now has improved energy production capabilities across all energy sectors."
 state_owned_build_forward_logistics_base_modifier: "前方兵站基地の建設"
 state_owned_build_forward_logistics_base_modifier_desc: "Strategic logistics bases have been established throughout the state, creating a forward-deployed supply network. These facilities significantly improve the movement of troops and materials through the region, reducing overall supply demands."
 state_owned_improve_rebuilding_efforts_modifier: "再建活動の推進"
 state_owned_improve_rebuilding_efforts_modifier_desc: "Reconstruction efforts have won over the local population, improving public cooperation and reducing civil unrest. Investment in local infrastructure and community rebuilding projects have boosted compliance among the local population."
 state_owned_hire_extra_primary_sector_workers_modifier: "一次産業労働者の追加雇用"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "The state's primary sector workforce has been expanded through targeted recruitment and training initiatives. Agricultural, mining, and other resource extraction operations now benefit from increased labor availability, resulting in higher resource output."
 currently_encouraged_investments: "現在、§Y[THIS.GetName]§!で§Y投資を促進§!を実行している。"
 encourage_investments_in_state_tt: "§Y[THIS.GetName]§!への§Y投資を促進§!\n---------\n§Y[THIS.GetName]§!での投資を促進することで、地域の官僚的手続きを簡素化し、通常よりも短い期間で投資を実現できる。"
 encourage_investments_in_state_delayed_tt: "§Y前提条件:§!\n[!encourage_investments_in_state_click_enabled]\n§Y効果:§!\n[!encourage_investments_in_state_click]\n"
 encourage_investments_in_state_click_tt: "160日間、§Y[THIS.GetName]§!への§Y投資§!が§Y15%§!割安になる。また、AIもこの州への投資を行う可能性が高くなる。"
 encourage_productivity_in_state: "現在、§Y[THIS.GetName]§!で§Y生産性成長を促進§!を実行中"
 encourage_productivity_in_state_tt: "§Y[THIS.GetName]§!で§Y生産性成長を促進§!\n---------\n新しい技術や手法などをこの地域にもたらすことで、§Y[THIS.GetName]§!の生産性成長を促進し、成長を支援する。"
 encourage_productivity_in_state_delayed_tt: "§Y前提条件:§!\n[!encourage_productivity_in_state_click_enabled]\n§Y効果:§!\n[!encourage_productivity_in_state_click]\n"
 encourage_productivity_in_state_click_tt: "160日間、§Y[THIS.GetName]§!での§Y生産性成長§!が§Y20%§!速くなる。"
 expand_local_building_capacity: "現在、§Y[THIS.GetName]§!で§Y地域の建設能力を拡大§!を実行中"
 block_future_expand_local_building_capacity: "§Y[THIS.GetName]§!で§Y地域の建設能力を拡大§!を実行可能（建設能力拡大の実施回数: [?expanded_building_slot_times|0Y]）"
 expand_local_building_capacity_tt: "§Y[THIS.GetName]§!で§Y地域の建設能力を拡大§!\n---------\nさまざまな地域建設政策を実施し、追加の土地を整備し、地域の建設業者が利用できる資源を拡充することで、地域の建設能力を拡大できる。"
 expand_local_building_capacity_delayed_tt: "§Y前提条件:§!\n[!expand_local_building_capacity_click_enabled]\n§Y効果:§!\n[!expand_local_building_capacity_click]\n"
 expand_local_building_capacity_click_tt: "120日ごとに、§Y[THIS.GetName]§!で§G1§!つの§Y建築スロット§!を獲得できる。特定の州で拡張できる§Y建築スロット§!の上限は§Y5§!まで。"
 expand_local_renewable_capacity: "現在、§Y[THIS.GetName]§!で§Y地域の再生可能エネルギー能力を拡大§!を実行中"
 expand_local_renewable_capacity_tt: "§Y[THIS.GetName]§!で§Y地域の再生可能エネルギー能力を拡大§!\n---------\n§Y[THIS.GetName]§!の§Y再生可能エネルギーインフラ§!を推進し、地域の再生可能エネルギー網から追加のエネルギーを生み出すべきだ。"
 expand_local_renewable_capacity_delayed_tt: "§Y前提条件:§!\n[!expand_local_renewable_capacity_click_enabled]\n§Y効果:§!\n[!expand_local_renewable_capacity_click]\n"
 expand_local_renewable_capacity_click_tt: "180日間、§Y[THIS.GetName]§!で以下の効果を得る:\n"
 expand_local_infrastructure: "現在、§Y[THIS.GetName]§!で§Y地域のインフラを拡大§!を実行中"
 expand_local_infrastructure_tt: "§Y[THIS.GetName]§!で§Y地域のインフラを拡大§!\n---------\n§Y[THIS.GetName]§!のインフラはまだ十分とは言えない。この州の発展を強調し、さらに拡大するために、短期的な目標を絞ったプロジェクトを立案し、インフラの拡大を図るべきだ。"
 expand_local_infrastructure_delayed_tt: "§Y前提条件:§!\n[!expand_local_infrastructure_click_enabled]\n§Y効果:§!\n[!expand_local_infrastructure_click]\n"
 expand_local_military_infrastructure: "現在、§Y[THIS.GetName]§!で§Y地域の軍事インフラを拡大§!を実行中"
 expand_local_military_infrastructure_tt: "§Y[THIS.GetName]§!で§Y地域の軍事インフラを拡大§!\n---------\n軍から政府に対し、§Y[THIS.GetName]§!における潜在的な建設用地が特定されたとの報告があった。この地域での軍事インフラを拡大し、周辺で紛争が発生した場合に地域の軍が十分な支援を受けられるようにすることが提案されている。"
 expand_local_military_infrastructure_delayed_tt: "§Y前提条件:§!\n[!expand_local_military_infrastructure_click_enabled]\n§Y効果:§!\n[!expand_local_military_infrastructure_click]\n"
 expand_local_military_infrastructure_click_tt: "180日間、§Y[THIS.GetName]§!で以下の効果を得る:\n"
 expand_local_energy_infrastructure: "現在、§Y[THIS.GetName]§!で§Y地域のエネルギーインフラを拡大§!を実行中"
 expand_local_energy_infrastructure_tt: "§Y[THIS.GetName]§!で§Y地域のエネルギーインフラを拡大§!\n---------\n§Y[THIS.GetName]§!における地域のエネルギーを拡大することで、地域住民の支援を強化するとともに、国家全体の電力網をさらに強化することができる。"
 expand_local_energy_infrastructure_delayed_tt: "§Y前提条件:§!\n[!expand_local_energy_infrastructure_click_enabled]\n§Y効果:§!\n[!expand_local_energy_infrastructure_click]\n"
 expand_local_energy_infrastructure_click_tt: "180日間、§Y[THIS.GetName]§!で以下の効果を得る:\n"
 build_forward_logistics_base: "現在、§Y[THIS.GetName]§!で§Y前方兵站基地を建設§!を実行中"
 build_forward_logistics_base_tt: "§Y[THIS.GetName]§!で§Y前方兵站基地を建設§!\n---------\nこの州は現在、我々の主要な兵站からやや離れている。§Y[THIS.GetName]§!に配備された部隊を支援するために、前方兵站基地の建設を検討すべきだ。"
 build_forward_logistics_base_delayed_tt: "§Y前提条件:§!\n[!build_forward_logistics_base_click_enabled]\n§Y効果:§!\n[!build_forward_logistics_base_click]\n"
 build_forward_logistics_base_click_tt: "180日間、§Y[THIS.GetName]§!で以下の効果を得る:\n"
 improve_rebuilding_efforts: "現在、§Y[THIS.GetName]§!で§Y再建活動を推進§!を実行中"
 improve_rebuilding_efforts_tt: "§Y[THIS.GetName]§!で§Y再建活動を推進§!\n---------\n§Y[THIS.GetName]§!が完全に我々の支配下に入った今、この地域の再建活動を推進し、住民が妨げられることなく生活を続けられるようにすべきだ。"
 improve_rebuilding_efforts_delayed_tt: "§Y前提条件:§!\n[!improve_rebuilding_efforts_click_enabled]\n§Y効果:§!\n[!improve_rebuilding_efforts_click]\n"
 improve_rebuilding_efforts_click_tt: "180日間、§Y[THIS.GetName]§!で以下の効果を得る:\n"
 hire_extra_primary_sector_workers: "現在、§Y[THIS.GetName]§!で§Y一次産業労働者を追加雇用§!を実行中"
 hire_extra_primary_sector_workers_tt: "§Y[THIS.GetName]§!で§Y一次産業労働者を追加雇用§!\n---------\n§Y[THIS.GetName]§!における資源生産は、国が期待する生産量に達していない。資源生産を支援するために、追加の一次産業労働者を雇用することを検討すべきだ。"
 hire_extra_primary_sector_workers_delayed_tt: "§Y前提条件:§!\n[!hire_extra_primary_sector_workers_click_enabled]\n§Y効果:§!\n[!hire_extra_primary_sector_workers_click]\n"
 hire_extra_primary_sector_workers_click_tt: "180日間、§Y[THIS.GetName]§!で以下の効果を得る:\n"
 improve_local_conservation_efforts: "現在、§Y[THIS.GetName]§!において§Y「地域保全活動の強化」§!を実施中である。"
 improve_local_conservation_efforts_tt: "§YImprove Local Conservation Efforts§! in §Y[THIS.GetName]§!\n---------\nWe should look into improving the local conservation efforts in §Y[THIS.GetName]§! to help protect the local ecosystem and wildlife whilst also preserving biodiversity and natural habitats for future generations."
 improve_local_conservation_efforts_delayed_tt: "§Y前提条件:§!\n[!improve_local_conservation_efforts_click_enabled]\n§Y§!\n[!improve_local_conservation_efforts_click]\n"
 improve_local_conservation_efforts_click_tt: "120日間、§Y[THIS.GetName]§!では以下の効果を得る:\n§Y「アマゾンの熱帯雨林 - 地域保全活動」§!によるペナルティが§G-25%§!軽減される。"
 state_owned_local_naval_infrastructure_modifier: "Expanding Local Naval Infrastructure"
 state_owned_local_naval_infrastructure_modifier_desc: "Investment in coastal defense and naval infrastructure has transformed the state's maritime capabilities. New naval facilities and supply hubs now provide comprehensive support for naval operations in the region."
 state_owned_local_fortification_efforts_modifier: "Local Fortification Efforts"
 state_owned_local_fortification_efforts_modifier_desc: "Extensive defensive works have been constructed throughout the state, including bunkers, coastal fortifications, and stronghold networks. These military installations significantly enhance the state's defensive capabilities against invasion and ground assault."
 expand_local_coastal_infrastructure: "Currently §YExpanding Local Coastal Infrastructure§! in §Y[THIS.GetName]§!."
 expand_local_coastal_infrastructure_tt: "§YExpand Local Coastal Infrastructure§! in §Y[THIS.GetName]§!\n---------\nThe coastal regions of §Y[THIS.GetName]§! would benefit greatly from improved infrastructure. We should look into expanding the ports, harbors, and coastal defenses to boost maritime trade and naval capabilities."
