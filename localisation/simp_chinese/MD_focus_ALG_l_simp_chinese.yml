 ALG_cabinet_loyal: "忠诚内阁"
 ALG_cabinet_loyal_desc: "当前内阁主要由忠诚分子组成。政治可靠性高，但行政才能薄弱。"
 ALG_cabinet_competent: "称职内阁"
 ALG_cabinet_competent_desc: "当前内阁由能力出众的技术官僚和经验丰富的行政官员组成。治理成效显著，尽管忠诚度并非总能得到保证。"
 ALG_cabinet_balanced: "平衡内阁"
 ALG_cabinet_balanced_desc: "当前内阁在政治可靠性与技术能力之间达到了合理的平衡。"
 ALG_cabinet_reformist: "改革内阁"
 ALG_cabinet_reformist_desc: "当前内阁倾向于改革派人士，与深层政府关联有限。治理或许会有所改善，但军方建制派对此感到不安。"
 ALG_cabinet_disloyal: "不忠内阁"
 ALG_cabinet_disloyal_desc: "内阁关键成员忠诚存疑。派系争斗与互不信任导致政府治理陷入瘫痪。"
 ALG_cabinet_incompetent: "无能内阁"
 ALG_cabinet_incompetent_desc: "内阁缺乏行政人才。政策执行缓慢且不可靠。"
 ALG_cabinet_deep_state_dominated: "深层政府内阁"
 ALG_cabinet_deep_state_dominated_desc: "内阁已被军方和情报机构深度渗透。文官控制形同虚设。"
 ALG_economic_liberalization: "经济自由化"
 ALG_economic_liberalization_desc: "财政部正在推行自由经济改革，开放市场并减少国家干预。"
 ALG_military_industrial_complex: "军工复合体"
 ALG_patronage_networks: "恩庇网络"
 ALG_crush_all_opposition: "粉碎一切反对"
 ALG_control_hydrocarbons: "控制石化部门"
 ALG_fortress_algeria: "阿尔及利亚堡垒"
 ALG_military_industrial_complex_desc: "军队扩张其经济帝国，建造武器工厂并确保利润丰厚的国防合同。军官团演变为商业阶层，将军们跻身企业董事会，积累巨额财富。"
 ALG_patronage_networks_desc: "一张由庇护关系编织的网络将政权与商业精英及地方权力掮客紧密相连。忠诚通过合同、许可证和特殊渠道得以收买。国家沦为私人敛财的工具。"
 ALG_crush_all_opposition_desc: "政权通过逮捕、审查和恐吓手段，清除了所有有组织的反对派。各政党或被收编，或遭取缔。公民社会遭到彻底瓦解。唯有政权的声音能够被听见。"
 ALG_control_hydrocarbons_desc: "国家全面掌控石化部门，将油气收入直接注入政权金库。外国合作伙伴遭到排挤，独立运营商被吞并，深层政府牢牢掌控着资源命脉。"
 ALG_fortress_algeria_desc: "阿尔及利亚转变为一个卫戍国家——军事化、封闭且对外界充满猜疑。军队强大，边境封锁，通过石油财富与高压统治相结合的方式维持民众秩序。"
 ALG_oil_crash_weakens_regime_tt: "石油危机严重削弱了政权购买社会和平的能力。民众的不满情绪正在加剧。"
 ALG_hirak_wins_tt: "人民运动取得了胜利。一个新的阿尔及利亚已成为可能。"
 ALG_military_wins_tt: "深层政府得势了。军事统治在新面孔下继续维持。"
 ALG_republic_new_era_tt: "阿尔及利亚共和国迎来了一个新时代。旧体制正在被瓦解。"
 ALG_parliamentary_republic_tt: "阿尔及利亚已采用议会制政体，国民议会拥有最高权力。"
 ALG_semi_presidential_republic_tt: "阿尔及利亚已采用半总统制政体，总统与议会共享权力。"
 ALG_presidential_republic_tt: "阿尔及利亚已采用总统制政体，总统拥有主导性的行政权力。"
 ALG_patronage_enriches_regime_tt: "庇护网络以牺牲阿尔及利亚人民的利益为代价，滋养了政权及其盟友。"
 ALG_fortress_state_tt: "阿尔及利亚已变成一个堡垒国家。深层政府绝对统治，国家对外界封闭。"
 ALG_military_industrial_economy: "军事工业经济"
 ALG_state_hydrocarbon_monopoly: "国家油气垄断"
 ALG_fortress_state: "堡垒国家"
 ALG_military_industrial_economy_desc: "军队已扩展至武器生产与国防工业领域，为政权建立了自给自足的经济基础。将军们纷纷入驻企业董事会，军装与商务西装的界限日渐模糊。"
 ALG_state_hydrocarbon_monopoly_desc: "国家对油气收入的全面控制为政权及其庇护网络提供资金。石化部门是一个封闭的世界，只有关系户才能在其中运作。"
 ALG_fortress_state_desc: "阿尔及利亚已转变为一个封闭的军事化国家。军队势力强大，社会受到严密管控，深层政府毫无阻力地统治着一切。稳定是以自由为代价换来的。"
 ALG_redmed_group_expansion: "红海集团扩张"
 ALG_redmed_group_expansion_desc: "红海集团已证明自己是哈西迈萨乌德地区石油和天然气行业可靠的物流合作伙伴。通过适当的投资，它可以发展成更广泛的工业力量。"
 ALG_star_aviation_operations: "星际航空合作"
 ALG_star_aviation_operations_desc: "红海集团的航空子公司自成立以来一直保持着完美的安全记录。我们应该利用这一声誉，进一步深化我们在航空领域的参与度。"
 ALG_military_aviation_contract: "军用航空合同"
 ALG_military_aviation_contract_desc: "星际航空公司的卓越运营已引起军方关注。获得国防合同将为先进航空航天研发打开大门，并为下一阶段的扩张提供资金支持。"
 ALG_missile_development_initiative: "导弹研发计划"
 ALG_missile_development_initiative_desc: "现代军队不能仅依赖外国武器。我们将通过红海集团启动国内导弹计划，为战略威慑奠定基础。"
 ALG_star_aviation_uav_division: "星航无人机部门"
 ALG_star_aviation_uav_division_desc: "手握外国无人机技术，星航公司已准备好成立专门的无人机部门。阿尔及利亚工程师将研究、改造并最终超越他们获得的技术。"
 ALG_domestic_uav_production: "国内无人机生产"
 ALG_domestic_uav_production_desc: "逆向工程阶段已完成。星际航空的设施已准备就绪，可大规模生产阿尔及利亚设计的无人机。这不再是进口问题——而是关乎主权。"
 ALG_russian_missile_cooperation: "俄罗斯导弹合作"
 ALG_russian_missile_cooperation_desc: "俄罗斯的导弹工业位居世界前列。与莫斯科的合作将显著加速我们的计划——代价是加深我们对俄罗斯善意的依赖。"
 ALG_chinese_missile_cooperation: "中国导弹合作"
 ALG_chinese_missile_cooperation_desc: "中国已表现出愿意与友好国家分享导弹技术。与北京达成协议将使我们获得现代武器系统，并在新兴的多极化世界中加强我们的地位。"
 ALG_redmed_star_convergence: "红星聚合"
 ALG_redmed_star_convergence_desc: "是时候将红海集团的导弹部门与星际航空的无人机能力整合到一个统一的防御体系下了。阿尔及利亚将不再进口安全装备——我们将自行制造。"
 ALG_regional_defense_leader: "马格里布防御领袖"
 ALG_regional_defense_leader_desc: "阿尔及利亚的国防工业如今在马格里布地区已无出其右。我们的无人机巡航撒哈拉，导弹威慑对手，技术吸引着曾向欧洲寻求合作的邻国。这就是主权的模样。"
 ALG_uav_procurement_category: "无人机采购"
 ALG_uav_procurement_category_desc: "星际航空需要参考平台以启动逆向工程。请选择一家国外无人机供应商。"
 ALG_drone_program_category: "无人机开发计划"
 ALG_drone_program_category_desc: "星航无人机部门已准备就绪，将着手研发阿尔及利亚首款国产无人机。请选定研发方向。"
 ALG_purchase_turkish_uavs: "购买土耳其无人机"
 ALG_purchase_turkish_uavs_desc: "巴伊拉克塔尔 TB2无人机已在多次冲突中证明其实战价值。从土耳其引进该机型，不仅能积累无人机作战经验，还能为逆向工程提供可靠平台——代价则是与安卡拉政权的关系将更为紧密。"
 ALG_purchase_chinese_uavs: "购买中国无人机"
 ALG_purchase_chinese_uavs_desc: "中国的翼龙II无人机以远低于西方系统的价格提供了相当的能力。北京方面还表现出愿意在此类交易中包含技术转让条款。"
 ALG_purchase_iranian_uavs: "购买伊朗无人机"
 ALG_purchase_iranian_uavs_desc: "伊朗的\"莫哈杰-6\"无人机性价比高且经过实战检验。从德黑兰获取该机型是最经济的选择，并能深化与天然战略伙伴的关系——尽管这可能引发国际关注。"
 ALG_develop_amel_recon_uav: "研发“阿梅尔”无人机"
 ALG_develop_amel_recon_uav_desc: "\"阿梅尔\"将成为阿尔及利亚首款自主设计的侦察无人机——这是一款专为广袤撒哈拉南部边境监视与情报搜集任务优化的长航时平台。"
 ALG_develop_el_djazair_ucav: "研发“阿尔及尔”无人机"
 ALG_develop_el_djazair_ucav_desc: "“阿尔及尔”将成为真正的战斗无人机——一种能够执行精确打击的武装无人作战飞行器。虽然比侦察平台更昂贵且技术要求更高，但作为军事资产，其威力远胜前者。"
 ALG_develop_swarm_loitering: "研发蜂群式巡飞弹"
 ALG_develop_swarm_loitering_desc: "阿尔及利亚将投资于成群的廉价小型协同游荡弹药，而非单一大型无人机。它们更难以拦截，数量庞大时破坏力惊人，且大规模生产成本更低。"
 ALG_redmed_group_tt: "§G红海集团从石油天然气物流扩展至更广泛的工业能力领域。§!"
 ALG_star_aviation_founded_tt: "§G星际航空公司的卓越运营使其有望获得军事合同。§!"
 ALG_military_contract_tt: "§G星际航空已获得军方合同。无人机采购决议现已开放。§!"
 ALG_uav_division_tt: "§G已成立专门的无人机部门，现在可以制定无人机研发决议。§!"
 ALG_domestic_production_tt: "§G阿尔及利亚国内现在可以制造无人机了。§!"
 ALG_amel_developed_tt: "§G阿梅尔侦察无人机已成功研发。§!"
 ALG_ucav_developed_tt: "§G阿尔及尔战斗无人机现已投入使用。§!"
 ALG_swarm_developed_tt: "§G阿尔及利亚已研发出蜂群式巡飞弹。§!"
 ALG_missile_division_tt: "§G红海集团已成立专门的导弹研发部门。§!"
 ALG_redmed_leader_tt: "§G红海集团与星航公司已合并为统一的国防工业综合体。§!"
 ALG_defense_leader_tt: "§G阿尔及利亚被公认为马格里布地区首屈一指的国防科技强国。§!"
 ALG_redmed_group_logistics: "红海集团物流"
 ALG_redmed_group_logistics_desc: "红海集团为阿尔及利亚的石油和天然气行业提供全面的物流服务。"
 ALG_redmed_star_aviation: "星际航空合作"
 ALG_redmed_star_aviation_desc: "星际航空保持着完美的安全记录。他们正将其精妙的运营能力转向航空航天领域。"
 ALG_star_aviation_military: "星航军事合同"
 ALG_star_aviation_military_desc: "星际航空已获得军方合同，将其在民用领域的卓越运营能力引入国防领域。"
 ALG_star_aviation_uav_division_idea: "星航无人机部门"
 ALG_star_aviation_uav_division_idea_desc: "一支专门的无人机部门正在研究外国无人机平台，以发展阿尔及利亚自身的无人机能力。"
 ALG_star_aviation_uav_production: "星航无人机生产"
 ALG_star_aviation_uav_production_desc: "星航航空现正大规模生产阿尔及利亚设计的无人机。"
 ALG_redmed_integrated_defense_systems: "红海综合防御企业"
 ALG_redmed_integrated_defense_systems_desc: "红海集团已将其无人机与导弹项目合并，组建为一个统一的先进武器综合体。"
 ALG_maghreb_defense_powerhouse: "马格里布国防强国"
 ALG_maghreb_defense_powerhouse_desc: "阿尔及利亚的国防工业，由红海集团和星际航空引领，是北非最先进的。"
 ALG_aerospace_training_program: "航空航天训练计划"
 ALG_aerospace_training_program_desc: "一项国家计划，旨在培养航空航天工程师和无人机技术人才，以支撑阿尔及利亚不断壮大的国防工业。"
 ALG_combat_uav_program: "战斗无人机计划"
 ALG_combat_uav_program_desc: "积极发展武装无人机，正增强阿尔及利亚空军的打击能力。"
 ALG_redmed_missile_division_idea: "红海集团导弹部门"
 ALG_redmed_missile_division_idea_desc: "红海集团的专用导弹开发部门正在从零开始打造阿尔及利亚的战略威慑力量。"
 ALG_cruise_missile_development: "巡航导弹研发"
 ALG_cruise_missile_development_desc: "一项新的巡航导弹计划正在为阿尔及利亚首次提供精确远程打击能力。"
 ALG_precision_strike_capability: "精确打击能力"
 ALG_precision_strike_capability_desc: "集成的导弹与无人机系统，让阿尔及利亚拥有了真正的精确打击能力。"
 ALG_defense_export_industry: "国防出口工业"
 ALG_defense_export_industry_desc: "阿尔及利亚的无人机和导弹现已开放出口。每一笔销售既是财政收入，也是外交筹码。"
 ALG_redmed_group_concern: "红海集团"
 ALG_redmed_group_concern_desc: "一家以石油和天然气物流起家的阿尔及利亚领先工业集团。红海集团已发展成为阿尔及利亚主要的国防制造商，为武装部队生产无人机和导弹系统。"
 ALG_star_aviation_concern: "星际航空"
 ALG_star_aviation_concern_desc: "红海集团的航空子公司。成立于2001年，拥有完美安全记录的星际航空，如今主导着阿尔及利亚国内航空航天及无人机制造项目。"
 ALG_arrest_opponents_started_tt: "安全部队正开始执行逮捕行动……"
 ALG_surveillance_started_tt: "监控网络扩展正在进行中……"
 ALG_ban_parties_started_tt: "针对反对党的法律诉讼程序已经启动……"
 ALG_imf_loan_started_tt: "国际货币基金组织贷款谈判正在进行中……"
 ALG_oil_licensing_started_tt: "与外国公司的石油开采许可谈判已经开始……"
 ALG_repay_imf_started_tt: "国际货币基金组织贷款偿还流程已启动……"
 ALG_pardon_islamist_started_tt: "对温和伊斯兰主义者的赦免程序已经启动……"
 ALG_dialogue_started_tt: "正在组织全国对话……"
 ALG_reintegrate_fighters_started_tt: "前战斗人员的再融入计划正在启动中……"
 alg_tamazight_recognition_started_tt: "塔马齐格特语（柏柏尔语）的宪法承认程序已启动……"
 ALG_arrest_opponents_complete_tt: "逮捕行动已结束。反对派势力已被削弱。"
 ALG_surveillance_complete_tt: "监控网络现已全面投入运行。"
 ALG_ban_parties_complete_tt: "反对党已被正式取缔。"
 ALG_imf_loan_complete_tt: "国际货币基金组织贷款资金已到账。"
 ALG_oil_licensing_complete_tt: "石油特许权协议现已生效。"
 ALG_repay_imf_complete_tt: "国际货币基金组织贷款已全部还清。"
 ALG_pardon_islamist_complete_tt: "特赦令已颁布。政治和解进程正在推进。"
 ALG_dialogue_complete_tt: "全国对话已圆满结束。"
 ALG_reintegrate_fighters_complete_tt: "前战斗人员已成功重返社会。"
 alg_tamazight_recognition_complete_tt: "塔马齐格特语现已正式得到宪法承认。"
 ALG_fis_return_western_concern: "阿尔及利亚萨拉菲派政府引发警惕"
 ALG_fis_return_salafi_solidarity: "支持阿尔及利亚的萨拉菲派政府"
 ALG_fis_return_islamist_sympathy: "谨慎欢迎阿尔及利亚伊斯兰主义政府"
 ALG_fis_return_neighbor_alarm: "警惕于阿尔及利亚伊斯兰主义势力掌权"
 ALG_fis_return_anti_political_islam: "反对阿尔及利亚伊斯兰主义"
 ALG_fis_return_threat: "阿尔及利亚伊斯兰拯救阵线回归"
 ALG_world_tension_security_ended_tt: "安保措施已解除。"
 ALG_world_tension_high_security_ended_tt: "高度安全警报已解除。"
 ALG_crackdown_momentum_ended_tt: "镇压势头已经消退。"
 ALG_reconciliation_momentum_ended_tt: "和解势头已经消退。"
 ALG_by_the_people_for_the_people: "民治，民享"
 ALG_by_the_people_for_the_people_desc: "\"希拉克运动\"已撼动阿尔及利亚的根本。民众要求彻底变革政治体系——不仅是更换领导人，更是对权力结构进行根本性重组。旧势力不会悄然退场。"
 ALG_by_the_people_for_the_people_tt: "§Y希拉克运动§!必须拥有足够的势头（权力平衡需超过§G70%§!）。"
 ALG_break_the_oligarchs: "打倒寡头"
 ALG_break_the_oligarchs_desc: "必须瓦解那些因接近政权而获利的商人网络。他们的资产将被没收，合同将被重新审查，他们对国家的影响力也将被永久终结。"
 ALG_dismantle_le_pouvoir: "终结权力集团"
 ALG_dismantle_le_pouvoir_desc: "影子国家——那些将军、情报机构，自独立以来一直暗中操控阿尔及利亚的无形之手——必须被曝光并剥夺其权力。"
 ALG_new_economic_model: "新经济模式"
 ALG_new_economic_model_desc: "随着寡头被清除，阿尔及利亚需要新的经济愿景。食利国家模式已经终结。取而代之的是建立在工业、科技和人力资本基础上的多元化经济。"
 ALG_unleash_civil_society: "释放民间力量"
 ALG_unleash_civil_society_desc: "自由的媒体、独立的工会以及代表真实选民的政党——这些正是民主制度赖以建立的基石。"
 ALG_constitutional_convention: "制宪会议"
 ALG_constitutional_convention_desc: "来自阿尔及利亚各地的代表齐聚一堂，共同起草新宪法。这是首次由人民而非权贵来制定国家根本大法。"
 ALG_presidential_republic: "总统制共和国"
 ALG_presidential_republic_desc: "阿尔及利亚将采用总统制，拥有强有力的行政机构、明确的权力划分和民主问责机制。总统将果断施政，同时宪法保障措施将防止权力滥用。"
 ALG_parliamentary_republic: "议会制共和国"
 ALG_parliamentary_republic_desc: "阿尔及利亚将采用议会制，权力由选举产生的代表共同分享。通过组建联盟与达成共识，确保不再有个人能够独揽国家大权。"
 ALG_civilian_military_control: "文官治军"
 ALG_civilian_military_control_desc: "军队必须服务于国家，而非统治国家。职业军官取代政治将领。军队实现现代化，去政治化，并牢牢置于文官政府掌控之下。"
 ALG_democratic_dividend: "民主红利"
 ALG_democratic_dividend_desc: "一个透明、民主的阿尔及利亚吸引了外国投资、国际合作以及侨民的回流。随着世界对此的关注，其经济也摆脱了对油气资源的依赖，实现了多元化发展。"
 ALG_a_new_algeria: "新阿尔及利亚"
 ALG_a_new_algeria_desc: "旧政权的废墟之上，一个崭新的国家崛起。腐败网络被瓦解，人才流失的趋势得到扭转。阿尔及利亚的崛起证明，真正的民主可以通过人民的意志建立起来。"
 ALG_transitional_instability: "过渡期不稳定性"
 ALG_transitional_instability_desc: "旧秩序的崩溃留下了权力真空。制度薄弱，经济混乱，各政治势力竞相争夺未来走向。"
 ALG_economic_disruption: "经济动荡"
 ALG_economic_disruption_desc: "对寡头资产的查封和对腐败合同的重组暂时扰乱了经济活动。"
 ALG_free_press_and_assembly: "新闻与出版自由"
 ALG_free_press_and_assembly_desc: "独立报纸可以无所畏惧地出版。公民可以自由组织。公共空间属于人民。"
 ALG_diversified_economy: "多样化经济"
 ALG_diversified_economy_desc: "阿尔及利亚经济正摆脱对石油的依赖，转向工业、科技和可持续发展。"
 ALG_new_constitution_permanent: "人民宪法"
 ALG_new_constitution_permanent_desc: "阿尔及利亚新宪法由民选代表起草，经全民公投批准，确立了民主权利、权力分立和法治。"
 ALG_presidential_system: "总统制"
 ALG_presidential_system_desc: "拥有明确权威和民主问责制的强有力的行政机构能够果断地治理阿尔及利亚。"
 ALG_parliamentary_system: "议会制"
 ALG_parliamentary_system_desc: "这是一个审议式体制，民选代表通过辩论、协商和达成共识来发挥作用。权力在各政党和联盟之间共享。"
 ALG_professional_military: "职业军队"
 ALG_professional_military_desc: "阿尔及利亚军队已实现去政治化、现代化，并由文职人员指挥。阿尔及利亚军队服务于国家，而非控制国家。"
 ALG_foreign_investment_boom: "外商投资热潮"
 ALG_foreign_investment_boom_desc: "国际资本流入民主的阿尔及利亚。透明的治理和法治使该国成为极具吸引力的投资目的地。"
 ALG_beacon_of_democracy: "民主灯塔"
 ALG_beacon_of_democracy_desc: "阿尔及利亚以自身经历证明，真正的民主转型是可能的。这个国家激励着整个地区的运动，并赢得了国际社会的赞誉。"
 KBY_diplomatic_move: "卡比利亚外交推动"
 ALG_the_nation_stands_at_a_crossroads_desc: "阿尔及利亚从“黑色十年”的创伤中走出。超过20万人丧生，整个村庄被夷为平地，经济因内战而崩溃。布特弗利卡总统将他的执政地位押在了内战协议上，他承诺赦免武装分子并进行改革。但在他背后，是“权力集团”  - 自阿尔及利亚独立以来一直统治着这个由将军和情报官员组成的神秘网络。未来的道路掌握在谁能掌控局势，谁就拥有最终的胜利。"
 ALG_counterterrorism_agency_desc: "内战结束后，情报与安全情报与安全部（DRS）在内战后由原军事安全局（SM）情报机构的残余力量重建而成。该机构几乎完全独立于文职监督体系之外运作，成为阿尔及利亚最强大的机构——其威慑力甚至超过总统府本身。在原军事情报机构的残余力量基础上重建。情报与安全部在几乎完全不受文职部门的监督，成为阿尔及利亚权力最大的机构 - 甚至比总统府本身更令人畏惧。"
 ALG_investments_in_iraq: "与伊拉克的友谊"
 ALG_investments_in_iraq_desc: "尽管伊拉克过去与我们的关系不太理想，但我们最好互相友好。我们可以投资伊拉克基础设施并赢得他们的信任。"
 ALG_diplo: "和平社会运动外交政策"
 ALG_diplo_desc: "我们必须根据新政府的要求改革我们的外交。"
 ALG_balance_islamists_and_secularists: "宗教与世俗平衡"
 ALG_balance_islamists_and_secularists_desc: "必须在宗教运动与世俗精英之间维持脆弱的平衡——否则将面临冲突再起的风险。"
 ALG_new_constutition_reforms: "宪法改革"
 ALG_new_constutition_reforms_desc: "改革的要求无法永远被忽视。一部新宪法或许能为更广泛的多元治理开辟道路。"
 ALG_denounce_previous_colonialist_regimes: "谴责法国殖民主义法案"
 ALG_denounce_previous_colonialist_regimes_desc: "法国美化其殖民历史的争议性法律已引发公愤。民族解放阵线必须率先谴责殖民主义罪行，并重申阿尔及利亚的反殖民斗争。"
 ALG_share_power: "分享权力"
 ALG_share_power_desc: "与其独自执政，民族解放阵线可以谨慎地与部分反对派和技术官僚力量分享权力。这或许能在维持稳定的同时，减少民众对政权的不满情绪。"
 ALG_legacy_revolution: "§C民族解放阵线§!"
 ALG_legacy_revolution_desc: "民族解放阵线（National Liberation Front）是阿尔及利亚的一个民族主义政党。在1989年之前，它作为阿尔及利亚的唯一合法政党实行一党制统治。阿尔及利亚内战结束后，该党于2002年以最受欢迎政党的身份重新掌权，并延续至今。其意识形态遵循泛阿拉伯民族主义思想，以反殖民主义为核心理念。该党支持社会主义，但尤其推崇阿拉伯社会主义，同时反对马克思主义思想。"
 ALG_devlop_industry: "发展国家工业"
 ALG_devlop_industry_desc: "阿尔及利亚的未来取决于其工业基础的强化。通过重点发展制造业、能源生产和科技等关键领域，我们可以减少对外国进口的依赖，建立一个自给自足的经济体系。"
 ALG_expand_hydro: "扩建水电基础设施"
 ALG_expand_hydro_desc: "为满足国家日益增长的能源需求并减少对外国资源的依赖，我们必须投资扩建水力发电设施。利用河流资源不仅能提供清洁能源，还将增强我们的工业基础，改善国民生活水平。"
 ALG_optimize_water_management: "优化水资源管理"
 ALG_optimize_water_management_desc: "为应对水资源短缺并提高农业产量，我们必须实施现代化水管理系统。高效的分配与节约措施既能支持农村社区和不断扩张的城市中心，又能增强土地的抗旱能力。"
 ALG_hydroelectric_authority: "国家水电总局"
 ALG_hydroelectric_authority_desc: "通过建立中央水电管理机构，我们可以系统性地开发阿尔及利亚未利用的水资源。这将为工业化提供可靠的电力，同时在可再生能源领域创造就业机会和技术专长。"
 ALG_electrify_rural_algeria: "农村电气化"
 ALG_electrify_rural_algeria_desc: "为阿尔及利亚的乡村地区通电对现代化发展至关重要。通过电网扩建和当地水电项目，我们能够提升生活水平、实现农业机械化，并将偏远社区与国家发展进程紧密相连。"
 ALG_foreign_investment: "吸引外国投资"
 ALG_foreign_investment_desc: "为了加速经济发展，我们必须为国际资本创造有利条件。基础设施和能源项目的战略合作既能带来资金与技术知识，又能维护国家主权。"
 ALG_algeria_islamic: "§G和平社会运动§!"
 ALG_algeria_islamic_desc: "社会和平运动是阿尔及利亚的一个右翼至极右翼政党。该党于1990年由穆斯林兄弟会创立，并始终与其保持同盟关系。作为逊尼派伊斯兰主义政党，它奉行伊斯兰保守民主路线。该党在1997年立法选举中取得最大成功，成为议会第二大党，在380个席位中获得69席。1995年总统选举中，该党曾参选并获得25.6%的选票。2012年，该党与民族改革运动、伊斯兰复兴运动组成选举联盟。该党阿拉伯语名称\"Harakat mujtama' as-silm\"的缩写\"哈马斯\"亦广为人知。"
 ALG_algerian_islamic_movement: "阿尔及利亚伊斯兰运动"
 ALG_algerian_islamic_movement_desc: "简而言之，伊斯兰运动是土耳其的一场伊斯兰主义运动，在学生群体中非常受欢迎，倡导和平主义与现代伊斯兰观念。我们将从他们的教义中汲取灵感，改革学校课程，以倡导伊斯兰价值观，并将其传授给学生，同时全面提升教育水平。"
 ALG_nationwide_security_presence_desc: "为阻止“希拉克运动”示威活动，安全部队在全国范围内开展了“沙漠之鹰行动”。虽然此举有效遏制了抗议活动，但也增加了成本并损害了公众信任。"
 algerian_events.300.t: "动荡加剧"
 algerian_events.300.d: "全国各地陆续传来零星抗议和公民不服从的报告。公众对腐败、失业以及缺乏政治改革的不满情绪已达到沸点。目前示威活动仍呈分散状态，但随时可能演变成更大规模的动荡。"
 algerian_events.300.a: "这件事会过去的。"
 algerian_events.300.b: "这可能会失控。"
 algerian_events.230.t: "大规模抗议席卷阿尔及利亚"
 algerian_events.230.d: "阿尔及利亚爆发大规模持续抗议活动，要求政治改革并终结现行统治体系。全国各大城市数十万民众走上街头，这场被称为\"新希拉克运动\"的示威浪潮引发国际社会密切关注。局势发展正受到全球瞩目。"
 algerian_events.230.a: "阿尔及利亚的关键时刻。"
 ALG_deepen_african_union: "深化非洲联盟合作"
 ALG_deepen_african_union_desc: "阿尔及利亚长期以来一直是非洲外交的支柱之一。通过积极加强我们在非洲联盟中的作用，我们可以提升在非洲大陆的影响力，促进团结，并推进和平与经济一体化的各项举措。尽管这将耗费我们一定的财政成本，但却能增强我们在非洲的合法性。"
 ALG_strengthen_maghreb_union: "加强马格里布联盟"
 ALG_strengthen_maghreb_union_desc: "北非区域一体化的梦想一直难以实现，但阿尔及利亚有潜力重振这一梦想。通过加强与马格里布邻国的合作，我们可以减少贸易壁垒，增进外交互信，并巩固我们共同的文化和历史纽带。"
 ALG_restoration_of_the_ummah: "重建乌玛"
 ALG_restoration_of_the_ummah_desc: "一个统一的伊斯兰世界的愿景触手可及。信徒们将再次在同一面旗帜下崛起。"
 ALG_guidance_council: "监护委员会"
 ALG_guidance_council_desc: "由资深学者组成的委员会将监督我们的政策，确保政府始终遵循神圣指引。"
 ALG_restore_the_ummah_experiment: "乌玛实验"
 ALG_restore_the_ummah_experiment_desc: "我们将尝试建立一种新的治理模式——融合信仰、法律与领导力，以此激励整个穆斯林世界。"
 ALG_victory_of_the_faithful: "虔信者的胜利"
 ALG_victory_of_the_faithful_desc: "我们的坚持与奉献带来了胜利。阿尔及利亚将成为全世界虔信者的堡垒。"
 ALG_exterminate_corruption: "肃清腐败"
 ALG_exterminate_corruption_desc: "我们将清除所有机构的腐败。任何官员、士兵或神职人员都不得凌驾于神圣正义之上。"
 ALG_to_serve_allah: "侍奉安拉"
 ALG_to_serve_allah_desc: "我们的统治并非出于世俗野心，而是只为真主。每一项政策、每一次改革、每一场斗争，都必须体现对祂神圣意志的顺从。侍奉真主，即是净化国家与灵魂。"
 ALG_economic_islamization: "经济伊斯兰化"
 ALG_economic_islamization_desc: "我们将以伊斯兰教义为基础重建经济体系。以利息为基础的制度和腐败将被符合伊斯兰教法的金融体系、商业道德以及财富公平分配所取代。"
 ALG_rust_belt_rejuvenation_desc: "在动荡岁月中被废弃的工厂将重新轰鸣运转。我们的工人，在信仰与使命的指引下，将重建阿尔及利亚的工业心脏地带。"
 ALG_rule_to_perfection_desc: "我们的治理必须精炼并臻于完美。心灵上的哈里发国，灵魂的国度——通过神圣戒律实现行政管理的至臻境界。"
 ALG_new_islamic_architecture_desc: "新时代需要国家展现新面貌。通过清真寺、学校与市政建筑，伊斯兰艺术之美将象征阿尔及利亚的重生。"
 ALG_prioritize_military_industries_desc: "忠诚的军队必须由忠诚的工业来武装。我们将优先发展军工生产，确保我们的国防立足于本土实力。"
 ALG_industrialize_the_umma_desc: "工业应为伊斯兰服务，而非贪婪。乌玛必须实现自给自足、富有生产力且充满尊严——成为一个由钢铁与信仰共同驱动的文明。"
 ALG_militarize_the_nation: "国家军事化"
 ALG_militarize_the_nation_desc: "每位信徒都必须准备好保卫乌玛。我们将在神圣的指令下，让整个社会做好全面动员的准备。"
 ALG_soldiers_of_faith: "信仰之战士"
 ALG_soldiers_of_faith_desc: "我们的士兵不为土地或权力而战，而是为信仰本身而战。信仰之军将成为伊斯兰的盾牌与国家的利剑。"
 ALG_forged_in_belief: "以信念铸就"
 ALG_forged_in_belief_desc: "信仰是我们的钢铁——坚不可摧，不屈不挠。阿尔及利亚的士兵在信念中铸就，由神圣的信念指引前行。"
 ALG_disciplined_army_of_god: "军纪严明之圣军"
 ALG_disciplined_army_of_god_desc: "我们将锻造一支建立在服从、纯洁与坚定奉献之上的军队。每一位士兵既是战士，也是真神的仆人。"
 ALG_made_of_steel_and_faith: "钢铁与心灵"
 ALG_made_of_steel_and_faith_desc: "我们的军团将以钢铁般的力量和先知的信念前进。纪律与信仰将融合成一股不可摧毁的力量。"
 ALG_unrestricted_research: "自由探索"
 ALG_unrestricted_research_desc: "科学并非信仰之敌。在神圣使命的指引下，我们将拥抱现代研究，以提升我们的军事与科技实力。"
 ALG_ai_military_integration: "灵机之军"
 ALG_ai_military_integration_desc: "人工智能与自动化将成为服务于神圣秩序的工具。我们将把这些系统整合进我们的防御架构，以提升精确度与控制力。"
 ALG_new_executors_continent: "全大陆的执行者"
 ALG_new_executors_continent_desc: "阿尔及利亚已准备好在整个非洲执行神圣正义。我们的信仰与钢铁将塑造这片大陆的命运。"
 ALG_the_future_in_the_present: "当下即未来"
 ALG_the_future_in_the_present_desc: "未来已然降临——在真主的智慧指引下，凭借人类的创新力量而日益强盛。我们的国家将引领信众步入一个崭新的时代。"
 ALG_destroy_their_will: "粉碎敌人意志"
 ALG_destroy_their_will_desc: "我们将粉碎所有反对信仰之人——无论是思想、意志还是肉体。抵抗将被瓦解，神圣秩序必将胜利。"
 ALG_declare_jihad: "圣战令"
 ALG_declare_jihad_desc: "我们的运动已经成熟。我们不再局限于布道与改革。是时候将信众武装起来，联合一致——向伊斯兰土地上的腐败与暴政发起圣战。"
 ALG_tharir_al_aqsa: "解放阿克萨"
 ALG_tharir_al_aqsa_desc: "解放阿克萨清真寺是乌玛永恒的责任。我们将团结中东各地的信众，在抵抗与统一的旗帜下，铸就神圣的同盟。"
 ALG_faction_with_middle_east: "中东统一战线"
 ALG_faction_with_middle_east_desc: "中东依然是伊斯兰教的精神中心。从大马士革到麦加，我们的号召将响彻四方——团结渴望保卫阿克萨清真寺、抵抗压迫者的逊尼派国家。"
 ALG_faction_with_north_africa: "北非统一战线"
 ALG_faction_with_north_africa_desc: "我们在北非的兄弟们——从利比亚的沙漠到开罗的街头——都经历了同样的斗争。是时候伸出援手，邀请他们加入我们的事业了。"
 ALG_faction_with_asia: "远东统一战线"
 ALG_faction_with_asia_desc: "伊斯兰之光普照阿拉伯之外。中亚与南亚的各族人民，都应响应乌玛崛起的召唤——从辽阔草原到东方列岛。"
 ALG_faction.1.t: "阿尔及尔的邀请"
 ALG_faction.1.d: "我国政府已收到来自阿尔及尔的外交公报。阿尔及利亚掌权的伊斯兰拯救阵线邀请中东各国加入一个新的联盟——阿克萨解放阵线，该联盟致力于协调政治和物质支持，以保卫和解放阿克萨清真寺。接受邀请将使我国与这一地区性事业绑定；拒绝则会让我们与阿尔及利亚的计划保持距离。我们应如何回应？"
 ALG_faction.1.a: "接受——加入阿克萨解放阵线"
 ALG_faction.1.b: "拒绝——我们不会加入这个区域联盟"
 ALG_faction.2.t: "来自马格里布的提议"
 ALG_faction.2.d: "阿尔及利亚代表团正式邀请北非各国政府加入新联盟\"阿克萨解放阵线\"，承诺开展合作。该提议旨在建立一个马格里布阵线，协调对巴勒斯坦的政治压力和人道主义支持。加入将深化与阿尔及尔的关系；拒绝则可保持我们目前的自主权。我们该如何回应？"
 ALG_faction.2.a: "接受——马格里布将团结一致"
 ALG_faction.2.b: "拒绝——这不是我们要走的路"
 ALG_faction.3.t: "阿尔及尔致东方"
 ALG_faction.3.d: "阿尔及利亚特使已与亚洲穆斯林国家接触，提出一项倡议：加入阿克萨解放阵线——一个旨在协调外交、政治及物资力量以保卫阿克萨圣地的联盟。该倡议呼吁跨区域团结，同时也可能卷入更广泛的冲突。我们要加入阿尔及利亚主导的联盟吗？"
 ALG_faction.3.a: "加入——我们响应团结的号召"
 ALG_faction.3.b: "拒绝——我们必须避免卷入这场纠葛"
 ALG_islamic_offices: "设立伊斯兰办公室"
 ALG_islamic_offices_desc: "为了按照伊斯兰原则进行治理，我们的运动必须建立一个能够兼顾信仰与国家的组织架构。通过在全国各地设立伊斯兰办公室，我们将负责监督宗教教育、社会事务和道德指导，确保治理符合穆斯林社群的价值观。这些办公室将成为我们新秩序的基石 - 在信仰、纪律和正义的指引下团结人民。"
 ALG_integrate_kabylie_tt: "§G和平整合卡比利亚§!"
 ALG_improve_relations_with_egypt: "改善与埃及的关系"
 ALG_improve_relations_with_egypt_desc: "埃及和阿尔及利亚作为阿拉伯世界的重要国家，有着深厚的联系。和平社会运动植根于穆斯林兄弟会传统，视开罗为天然的合作伙伴。加强与埃及的关系将提升我们在阿拉伯世界的地位，并为经济和宗教合作打开大门。"
 ALG_el_karaouin_uni: "卡鲁因大学"
 ALG_el_karaouin_uni_desc: "通过与世界上最古老的伊斯兰大学之一建立联系，伊斯兰救世阵线将培养一代忠于新秩序的学者，使军队与宗教权威保持距离。"
 ALG_father_of_the_ummah: "乌玛之父"
 ALG_father_of_the_ummah_desc: "伊斯兰救世阵线的领导人将把自己定位为整个穆斯林社区的精神之父，培养一种植根于虔诚和神圣使命的个人崇拜。"
 ALG_followers_of_the_prophet: "先知追随者"
 ALG_followers_of_the_prophet_desc: "国家将围绕严格遵循圣训进行重塑。公民应效法先知的生活方式，政府机构也将进行重组以体现这一理念。"
 ALG_governmental_cleansing: "政府净化"
 ALG_governmental_cleansing_desc: "国家机器内部那些被认为不够虔诚或意识形态不纯洁的人将被系统性地清除，并由该运动的忠实拥护者取而代之。"
 ALG_make_our_nation_pure: "使我们的国家纯净"
 ALG_make_our_nation_pure_desc: "伊斯兰救世阵线将发起一场全面的社会运动，清除西方对阿尔及利亚社会的影响，并在教育、着装和公共行为中强制推行伊斯兰价值观。"
 ALG_new_patriotism: "新爱国主义"
 ALG_new_patriotism_desc: "对阿尔及利亚的热爱即是对伊斯兰的热爱。伊斯兰拯救阵线将塑造新的民族认同，以信仰作为公民自豪感和集体目标的基石。"
 ALG_restore_the_soul_of_the_ummah: "恢复乌玛之精魂"
 ALG_restore_the_soul_of_the_ummah_desc: "阿尔及利亚将肩负起重新点燃穆斯林世界精神火焰的神圣使命，将自身定位为所有伊斯兰国家的道德灯塔。"
 ALG_sharia_through_discipline: "沙里亚律法，以纪律为径"
 ALG_sharia_through_discipline_desc: "沙里亚法将不再通过劝导，而是通过严格的纪律来强制执行。国家将扩大其治安与惩罚权力，以确保伊斯兰法得到全面遵守。"
 ALG_strength_and_virtue: "力量与美德"
 ALG_strength_and_virtue_desc: "强大的国家与高尚的人民密不可分。伊斯兰救世阵线将同时注重道德教育和制度建设，以构建一个品德高尚、意志坚定的社会。"
 ALG_strict_authority: "严格权威"
 ALG_strict_authority_desc: "新阿尔及利亚需要强有力的统治。伊斯兰救世阵线将集中权力，增加警务预算，确保民众遵守该组织的行为准则。"
 ALG_the_people_are_not_to_be_trusted: "人民不可信赖"
 ALG_the_people_are_not_to_be_trusted_desc: "事实证明，民主是滋生腐败和无神论的温床。伊斯兰救世阵线将瓦解民主进程，并将政权牢牢掌握在那些自以为知道真主旨意的人手中。"
 ALG_urban_preachers: "城市传教士"
 ALG_urban_preachers_desc: "伊斯兰救世阵线将派遣传教士进入阿尔及利亚各大城市，传播该组织的意识形态，巩固国家伊斯兰教在公共生活中的主导地位。"
 ALG_jamiat_al_karaouin_desc: "与古老的卡鲁因大学机构的联系催生了一批效忠于伊斯兰救世阵线政权、敌视军事干预宗教事务的新型伊斯兰学者。"
 ALG_coalition_economic_program: "联盟经济计划"
 ALG_coalition_economic_program_desc: "总统竞选联盟必须提出统一的经济愿景。通过协调联盟伙伴的经济政策，我们可以吸引投资、扶持小型企业，并为可持续增长奠定基础。强劲的经济将巩固联盟的合法性，并使批评者哑口无言。"
 ALG_governmental_transparency: "政府透明度"
 ALG_governmental_transparency_desc: "如果我们的民主道路要真正发挥作用，我们就必须以比前人更高的标准要求自己。通过实施透明措施，公开政府记录接受公众监督，我们可以根除腐败，重塑人民对政府机构的信任——即便这意味着与旧势力结怨。"
 ALG_found_AIUT_research_boost: "阿尔及利亚国际技术大学"
 ALG_found_AIUT_research_boost_desc: "阿尔及利亚国际技术大学的成立旨在改善阿尔及利亚的教育机会，并专注于新技术的研究。"
 alg_cabinet.1000.t: "选择总理"
 alg_cabinet.800.t: "选择情报部长"
 alg_cabinet.1000.d: "总理办公室在协调各部委、维护总统职位以及管理日常政务方面仍然至关重要。正确的人选可以巩固政权，而错误的选择则可能助长对手的气焰。"
 alg_cabinet.800.d: "情报局长掌控着国家最不透明、最令人恐惧的机构。这是内阁中最敏感的任命，任何重大变动都可能引发强烈反弹。"
 alg_cabinet.10.o: "下一个"
 alg_cabinet.1000.a: "任命努尔丁·贝都依。"
 alg_cabinet.1000.b: "任命阿卜杜勒-马吉德·特本"
