 joint_military_exercises_goal_desc: "Modern warfare demands interoperability between allied forces. By conducting joint exercises and reaching a combined strength of 100 equipped divisions, our faction demonstrates its readiness to respond to any threat."
 economic_integration_goal_desc: "A strong economy is the foundation of any lasting alliance. By ensuring every member state maintains at least 15 civilian factories, we build the industrial base needed for collective prosperity and mutual aid."
 technology_sharing_goal_desc: "Technological superiority is a force multiplier. Through shared research programs and digital infrastructure investment, our faction can outpace rivals and maintain the cutting edge in every domain."
 regional_stability_goal_desc: "An alliance is only as strong as its weakest link. By maintaining stability above 50% across all member states, we present a unified front that deters opportunistic aggression and internal subversion."
 counter_terrorism_goal_desc: "Terrorism knows no borders. Establishing intelligence agencies in every member state creates a network capable of intercepting threats before they materialize, protecting both our citizens and our collective interests."
 semiconductor_supremacy_goal_desc: "Microchip manufacturing is the strategic industry of the 21st century. By building a combined 50 microchip plants across our faction, we secure supply chain independence and technological dominance for decades to come."
 strategic_resource_security_goal_desc: "Access to critical raw materials underpins both economic growth and military readiness. Our faction must collectively extract sufficient oil, rubber, and aluminium to ensure no member is vulnerable to resource coercion."
 collective_cyber_defense_goal_desc: "In the digital age, cryptographic security is as vital as physical fortifications. By ensuring every member state achieves advanced encryption capabilities, we protect our communications, intelligence, and critical infrastructure."
 economic_powerhouse_goal_desc: "Economic might translates directly into geopolitical influence. When our faction leader achieves high GDP per capita and every member surpasses a baseline threshold, we become an economic bloc that cannot be ignored."
 faction_gdp_per_capita_target_tt: "Faction leader GDP per capita above 15 and all members above 5"
 faction_economic_integration_idea: "Economic Integration Pact"
 faction_economic_integration_idea_desc: "Through coordinated trade policies and reduced barriers, member states enjoy improved economic cooperation and faster development."