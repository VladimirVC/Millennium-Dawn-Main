 BLR_reforming_army: "改革军队"
 BLR_Kommunarka_invest: "在俄罗斯销售科穆纳尔卡产品\n§W--------------§!\n我们从在§B俄罗斯§!销售中获利，这取决于我们的财政。"
 BLR_Kommunarka_invest_cis: "我们现在的产品几乎已经遍及整个独联体\n§W--------------§!\n我们投入预算在§B俄罗斯§!，§B摩尔多瓦§!，§B亚美尼亚§!，§B拉脱维亚§!，§B哈萨克斯坦§!和§B格鲁吉亚§!的销售从中获利。"
 BLR_privatisation_effect: "私有化的后果"
 BLR_privatisation_effect_desc: "对于任何一个前苏联国家来说，私有化都是痛苦的。失业、企业倒闭、饥饿以及严峻的经济结构调整 - 所有这些都困扰着那些脱离苏联体制后开始私有化进程的国家。但这一切都是暂时的，我们迟早会克服这些困难。"
 BLR_bann_aborts: "禁止堕胎"
 BLR_electoral_law: "新竞选法"
 BLR_electoral_law_desc: "卢卡申科现已取消总统候选人提名人数的限制。"
 BLR_agro_industry: "维护良好的农业产业"
 BLR_old_railways: "过时的铁路基础设施"
 BLR_old_railways2: "过时的铁路基础设施"
 BLR_cheln_trade: "切诺奇纳亚贸易"
 BLR_cheln_trade_desc: "最大的公司尚未来到白俄罗斯，因此班机已经出现，带来了必要的高质量家用电器和其他一些拥有高利润的二手和奢侈品。"
