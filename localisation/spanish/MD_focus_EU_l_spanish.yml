 tooltip_EU_parliament_focus_EU202_EP_agenda: "Coloca la §YUnión Bancaria Europea§! en la agenda del PE.\n\nConduce a las siguientes Leyes de la §C[EUU.GetFlag][EUU.GetName]§!:\n- §YUnión Fiscal Europea§!\n- §YGobierno Económico Europeo§!\n\n"
 tooltip_EU_parliament_focus_EU203_EP_agenda: "Coloca los §YEurobonos§! en la agenda del EP.\n\nConduce a las siguientes leyes de §C[EUU.GetFlag][EUU.GetName]§!:\n- §YMecanismo de Estabilidad Europeo§!\n\n"
 tooltip_EU_parliament_focus_EU203_EP_agenda_additional: "§YLos Estados miembros§! que posean el §Y10%§! del §YPIB§! de §CLa Unión Europea§! o más con una §Ytasa de interés§! inferior al 7,5% o una §Yrelación PIB-deuda§! inferior al 100% asumirán una parte equitativa de la deuda de los estados miembros más pobres cuya §Ytasa de interés§! supere el 7,5% y la §Yrelación PIB-deuda§! supere el 75%.\n"
