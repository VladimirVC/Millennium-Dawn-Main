name: Code Standards & Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
    - 'common/**'
    - 'events/**'
    - 'history/**'
    - 'localisation/**'
    - 'interface/**'
    - 'gfx/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  coding-standards:
    name: Coding Standards
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Run coding standards check
      run: python tools/linting/coding_standards.py

  styling-check:
    name: Style Check
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: [coding-standards]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Run style check
      run: |
        python tools/linting/check_basic_style.py --mode diff
        python tools/linting/check_basic_style_2.py --mode diff

  validate:
    name: Validate ${{ matrix.validator.title }}
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        validator:
          - { script: validate_variables.py,            name: variables,            title: "Variables" }
          - { script: validate_scripted_localisation.py, name: scripted-localisation, title: "Scripted Localisation" }
          - { script: validate_cosmetic_tags.py,         name: cosmetic-tags,        title: "Cosmetic Tags" }
          - { script: validate_decisions.py,             name: decisions,            title: "Decisions" }
          - { script: validate_localisation.py,          name: localisation,         title: "Localisation" }
          - { script: validate_events.py,                name: events,               title: "Events" }
          - { script: validate_history_techs.py,         name: history-techs,        title: "History Technology Dependencies" }
          - { script: validate_unused_scripted.py,       name: unused-scripted,      title: "Unused Scripted Effects & Triggers" }
          - { script: validate_oob_units.py,              name: oob-units,            title: "OOB Unit Names" }

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Run validation
      run: |
        python3 tools/validation/${{ matrix.validator.script }} --strict --no-color --workers 4 --output validation-${{ matrix.validator.name }}.log

    - name: Upload results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: validation-${{ matrix.validator.name }}-results
        path: validation-${{ matrix.validator.name }}.log
        retention-days: 7

  validation-report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate]
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.validate.result != 'cancelled'

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Download all validation results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        path: validation-results

    - name: Generate and post validation report
      run: |
        python3 tools/generate_validation_report.py \
          --results-dir validation-results \
          --output report.md \
          --pr-number "${{ github.event.pull_request.number }}" \
          --commit-sha "${{ github.sha }}" \
          --github-repository "${{ github.repository }}" \
          --post-comment \
          --print

    - name: Upload combined report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: validation-report
        path: report.md
        retention-days: 30
