 IND_islamic_resist_info: "スラウェシは我々の最大の島の一つであり、多くの異なる民族で満ちている。しかし、大規模なイスラム教徒多数派は国家を無視していると非難し、我々の部隊と経済の多くに対して激しい抵抗を示している。この抵抗は兵士と治安部隊にとって生活を非常に困難にしている。"
