 generic_mio_unlock_category: "Industry Contracts"
 generic_mio_unlock_category_desc: "License foreign and domestic defense contractors. Meeting the industrial, technological, and operational prerequisites unlocks access to a new manufacturer for your armed forces."
 unlock_krepost_state_defense_bureau: "Contract Krepost State Defense Bureau"
 unlock_krepost_state_defense_bureau_desc: "A mid-sized state arms bureau willing to supply small arms and light infantry equipment to our armed forces. Entry-level contractor suited to a nation with a functioning defense industrial base."
 unlock_north_plains_heavy_industries: "Contract North Plains Heavy Industries"
 unlock_north_plains_heavy_industries_desc: "A continental heavy-weapons manufacturer producing next-generation infantry weapon systems. Engaging them requires a broader industrial base and a combat-tested officer corps."
 unlock_sentinel_grid_networks: "Contract Sentinel Grid Networks"
 unlock_sentinel_grid_networks_desc: "Specialists in battlefield networking, secure communications, and command-and-control platforms. Unlocking their services requires proven computing or encryption capacity."
 unlock_brunn_heavy_engineering_werke: "Contract Brunn Heavy Engineering Werke"
 unlock_brunn_heavy_engineering_werke_desc: "Long-established artillery and towed-gun specialists. Partnering with them opens access to robust tube and rocket artillery programs."
 unlock_reichswerke_konstrukt_dynamik: "Contract Reichswerke Konstrukt Dynamik"
 unlock_reichswerke_konstrukt_dynamik_desc: "A premier producer of self-propelled platforms, from tracked howitzers to mobile air defense. Requires a mature industrial base and existing self-propelled weapons programs."
 unlock_vector_defense_labs: "Contract Vector Defense Labs"
 unlock_vector_defense_labs_desc: "Specialists in integrated air defense systems. Their expertise fuses surface-to-air missiles with digital sensor and command networks. Requires defense-industry influence and modern electronics."
 unlock_marshall_tractor_works: "Contract Marshall Tractor Works"
 unlock_marshall_tractor_works_desc: "Heavy armor manufacturer producing main battle tanks for export and domestic service. Requires substantial industry, an operating armor tradition, and battle-hardened officers."
 unlock_vanderlind_hartwell_systems: "Contract Vanderlind-Hartwell Systems"
 unlock_vanderlind_hartwell_systems_desc: "A top-tier armor and infantry fighting vehicle prime. Engaging them demands deep industrial scale, an active defense lobby, and a veteran ground force."
 unlock_mil_kamov_rotorworks: "Contract Mil-Kamov Rotorworks"
 unlock_mil_kamov_rotorworks_desc: "Combat rotary-wing specialists offering attack and utility helicopters. Partnering with them requires a baseline rotorcraft program and experienced aviators."
 unlock_helitech_avionique: "Contract Helitech Avionique"
 unlock_helitech_avionique_desc: "Advanced rotorcraft and avionics integrator. Unlocking their services requires next-generation helicopters, modern avionics, and a supportive defense establishment."
 unlock_aurora_aerodynamics_corporation: "Contract Aurora Aerodynamics Corporation"
 unlock_aurora_aerodynamics_corporation_desc: "Cutting-edge fighter prime developing multirole and air-superiority platforms. Requires advanced aeronautics, a strong defense lobby, and a seasoned air force."
 unlock_societe_europeenne_daerostructures: "Contract Société Européenne d'Aérostructures"
 unlock_societe_europeenne_daerostructures_desc: "Large-airframe specialist producing transport and maritime patrol aircraft. Requires existing heavy-aircraft programs and experienced crews."
 unlock_southwestern_aerospace_dynamics_bureau: "Contract Southwestern Aerospace Dynamics Bureau"
 unlock_southwestern_aerospace_dynamics_bureau_desc: "An aeronautical powerhouse producing light strike fighters and strategic bombers. Requires a mature aerospace industry and advanced fixed-wing research."
 unlock_skyforge_autonomous_systems: "Contract Skyforge Autonomous Systems"
 unlock_skyforge_autonomous_systems_desc: "Unmanned aerial systems specialist integrating autonomy, sensors, and artificial-intelligence-assisted targeting. Requires operational UAV and computing research."
 unlock_compagnie_aeronatique_darmement: "Contract Compagnie Aéronautique d'Armement"
 unlock_compagnie_aeronatique_darmement_desc: "Precision air-launched weapons specialist producing guided munitions, air-to-air, and air-to-ground systems. Requires existing guided weapons and aerial armament programs."
 unlock_whitehall_strategic_solutions: "Contract Whitehall Strategic Solutions"
 unlock_whitehall_strategic_solutions_desc: "Small-combatant shipbuilder producing corvettes and patrol craft. Entry-level naval contractor suited to developing coastal fleets."
 unlock_triton_maritime_defense_group: "Contract Triton Maritime Defense Group"
 unlock_triton_maritime_defense_group_desc: "Mid-tier surface combatant prime producing frigates and destroyers. Requires an established shipbuilding base, a maritime industry lobby, and seasoned naval officers."
 unlock_eastern_maritime_shipbuilding_group: "Contract Eastern Maritime Shipbuilding Group"
 unlock_eastern_maritime_shipbuilding_group_desc: "Capital-ship specialist capable of producing cruisers and carriers. Requires a deep naval industrial base and robust military industry to sustain the program."
 unlock_sevmorprom_submarine_yards: "Contract Sevmorprom Submarine Yards"
 unlock_sevmorprom_submarine_yards_desc: "Submarine construction specialist. Partnering with them requires an established naval yard capacity and a baseline submarine research program."
 unlock_halland_civic_engineering_group: "Contract Halland Civic Engineering Group"
 unlock_halland_civic_engineering_group_desc: "Dual-use civilian engineering conglomerate handling naval infrastructure and civilian shipbuilding. Requires either naval or civilian industrial capacity and an active industrial lobby."
 unlock_second_academy_missile_bureau: "Contract Second Academy Missile Bureau"
 unlock_second_academy_missile_bureau_desc: "Strategic missile and guided weapons bureau. Requires large-scale industry, ballistic missile programs, and a guided weapons research tradition."
 unlock_western_orbital_systems_bureau: "Contract Western Orbital Systems Bureau"
 unlock_western_orbital_systems_bureau_desc: "Specialist in advanced ballistic and orbital systems. Requires advanced missile research, space-capable technology, and a strong defense industry lobby."
 unlock_central_heavy_atomics_power: "Contract Central Heavy Atomics Power"
 unlock_central_heavy_atomics_power_desc: "Nuclear propulsion and reactor specialist supporting advanced submarine programs. Requires heavy naval and military industry, nuclear reactor technology, advanced submarine programs, and backing from both the maritime and defense lobbies."
