 Light_SP_AA_Bat: "缩编的自行防空营"
 Light_SP_AA_Bat_desc: "防空营使用自行短程或中程防空导弹系统，保护所在单位免受敌人近距空中支援打击。"
 Drone_Recce_Comp: "无人侦察连"
 Drone_Recce_Comp_desc: "通过使用小型无人机系统将侦察范围扩展到视距之外，无人侦察连提高了战场态势感知能力，同时避免了侦察兵暴露于直接火力之下。这些无人机能够快速侦察路线、识别敌方阵地，并在复杂地形中确认目标，从而加快决策速度并提高火力打击的精准度。"
 medium_walker_battalion: "中型步行机甲营"
 medium_walker_battalion_desc: "中型步行机甲营被设计为步行机甲编队的全能骨干，兼具均衡的防护、机动性和有效载荷能力，能够在大多数地形上有效作战。其平台可搭载多种武器和任务系统，使其能够适应直接火力支援、突破支援和城市作战等任务，而传统装甲部队在这些任务中可能难以应对角度和障碍物。"
 light_walker_tank_battalion: "轻型步行机甲营"
 light_walker_tank_battalion_desc: "轻型步行机甲营专为速度和战场快速部署而设计，擅长侦察、侧翼包抄和攻击弱点，而非正面交锋。其更轻的底盘和简化的有效载荷使其拥有更高的机动性和更快的反应速度，从而在崎岖地形、森林和城市道路上都能有效发挥作用，因为在这些地方，快速改变方向至关重要。"
 heavy_walker_tank_battalion: "重型步行机甲营"
 heavy_walker_tank_battalion_desc: "重型步行机甲营旨在通过结合最大有效载荷能力、极强火力和战场存在感，在决定性战役中占据主导地位。其更重的机体可以搭载多种武器系统并携带额外的防护装备，使其能够摧毁防御工事，并以持续的直接火力打击最坚固的装甲目标。"
 space_artillery_support_company: "太空炮兵支援连"
 space_artillery_support_company_desc: "太空炮兵支援连利用轨道平台发射的炮弹，从太空对战场目标进行精确轰炸，其射程远远超出常规系统的覆盖范围。这些打击能够迅速压制敌方防御阵地，摧毁高价值目标，并在极短时间内瓦解敌军集结，从而使地面部队能够突破防线，掌控战局节奏。"
 space_artillery_equipment_type: "轨道火控中继"
 space_artillery_equipment_type_desc: "这套加固型通信和目标指示中继系统旨在实时请求、协调和确认轨道炮击。它将前线观察员与天基炮兵阵地连接起来，从而实现快速射击任务、精确计时以及与友军可靠地避免冲突。该系统造价昂贵且资源消耗巨大，但如果没有它，轨道火力将仍然是盲目、缓慢且效率低下且极其危险的。"
 space_artillery_equipment_1: "$space_artillery_equipment_type$ I"
 space_artillery_equipment_1_desc: "$space_artillery_equipment_type_desc$"
 HACS_Mech: "第1代高机动性作战系统"
 HACS_Mech_desc: "第一代高机动战斗系统是迄今为止最先进的战斗系统。它专为战场上的快速部署和高机动性而设计，能够轻松穿越复杂地形。凭借近战和远程武器的混合配置，高机动战斗系统已做好充分准备对抗奇美拉部队。"
 HACS_Mech_2: "第2代高机动性作战系统"
 HACS_Mech_2_desc: "融合了民用和军用工程师的理念，第二代高机动性战斗系统在原有设计的基础上进行了改进，增强了装甲防护并升级了武器系统。该版本在战斗中更具韧性，能够对奇美拉部队造成毁灭性的火力打击。"
 HACS_Mech_3: "第3代高机动性作战系统"
 HACS_Mech_3_desc: "对蓝道尔石最新的研究成果催生了第三代高机动性战斗系统。这一版本采用了尖端技术，包括先进的能量护盾和模块化武器附件，使其成为对抗奇美拉威胁的机甲战争的巅峰之作。"
 ALN_bellatoris: "贝拉托里斯"
 ALN_bellatoris_desc: "贝拉托里斯是奇美拉虫群的前线战士，专为无情的近距离突袭而生。它们速度极快，攻击性极强，凭借数量优势和凶猛的战斗力压倒防线，即使是顽强的阵型也难以招架。单个贝拉托里斯较为脆弱，但成群结队时却能发挥致命的威力。"
 ALN_brachionis: "布拉奇诺斯"
 ALN_brachionis_desc: "布拉奇诺斯是一种多肢奇美拉，专为近距离抓取和撕碎装甲目标而设计。它强大的攻击范围和抓握力使其能够牢牢控制车辆和作战系统，同时蜂群迅速逼近。在地形狭窄、猎物难以逃脱的狭窄区域，腕足怪的威胁最大。"
 ALN_gravis: "格拉维斯"
 ALN_gravis_desc: "格拉维斯是奇美拉虫族中最重的，它行动缓慢，浑身覆盖着厚重的装甲，是虫群推进的基石。它承受着巨大的伤害，艰难地向前推进，掩护着身后较轻的奇美拉，并凭借蛮力突破敌方的防御阵地。它庞大的身躯使其行动迟缓，但要想在它抵达防线之前阻止它，几乎是不可能的。"
 Hvy_Mot_Inf_Bat: "重型摩托化步兵"
 Hvy_Mot_Inf_Bat_desc: "重型摩托化步兵使用防地雷反伏击车作为运输工具。这种装甲车辆能为乘员提供卓越的防护，有效抵御地雷、简易爆炸装置和小口径武器的攻击，使其成为在伏击威胁高的敌对环境中作战的理想选择。"
 L_Ranger_Bat_desc: "游骑兵是精锐轻步兵，擅长突袭、直接行动和快速部署，先于主力部队出击。他们轻装上阵，最大限度地提高机动性和奇袭能力，夺取关键目标并坚守到正规部队抵达。但代价是重型装备稀少，在开阔地形中容易受到装甲部队的攻击。"
 L_Ranger_Recce_Comp_desc: "这是一支由游骑兵组成的侦察小队，他们接受过徒步深入敌后渗透并侦察敌情的训练。他们将隐蔽行动、无人机侦察和电子监视相结合，收集情报并标记友军火力目标，并在机会出现时进行小规模突袭和伏击。"
 A_L_arm_Bat: "空降轻型坦克连"
 A_L_arm_Bat_desc: "轻型坦克连装备特制的轻型坦克，这些坦克通常为轮式，兼具惊人的机动性和强大的火力。它们能够在正面交锋中与各种类型的步兵抗衡。然而，正面交锋并非其主要任务——它们渗透到敌方附近，观察并汇报敌方行动，并利用无人机侦察和电子监视收集情报。它们还可以对敌方重要资产和机械化部队进行突袭和伏击。这些部队也具备空降作战能力，能够与伞兵部队协同作战，提供即时的近距离装甲支援。"
 air_assault_Arty_Bat: "空中机动火炮"
 air_assault_Arty_Bat_desc: "一个营的牵引式火炮由直升机吊挂运输，为空中机动作战提供持续的间接火力支援，并通过快速空中重新部署与空中突击步兵保持同步。"
 Weapons_company: "武器连"
 Weapons_company_desc: "武器连由步兵直接火力支援武器组成，例如通用机枪和重机枪小组、榴弹机枪小组以及其他重型步兵直接火力支援武器。该连旨在为所支援的任何步兵单位提供火力支援，支援范围涵盖各种类型的部队。"
 Heavy_mortar_company: "迫击炮连"
 Heavy_mortar_company_desc: "迫击炮的设计目的是为一线部队提供快速、一体化的火力支援，无需上级单位的支援。这些迫击炮能够以远低于完整炮兵部队的成本，为一线部队提供间接火力支援。"
 Sniper_company: "狙击连"
 Sniper_company_desc: "狙击连配备精准的狙击手，两人一组进行观察，能够对敌方军官、机组人员和通信小组等高价值目标进行远程选择性射击。他们擅长从隐蔽处骚扰和扰乱敌方阵型，削弱敌方作战效能，同时保持难以被发现和攻击。"
 AT_company: "步兵反坦克连"
 AT_company_desc: "反坦克连装备有步兵反坦克武器，专门用于与轻步兵部队协同作战。他们能够轻松地在城区、森林和其他防御工事完善或地形狭窄的区域作战，不仅能够轻易攻击敌方装甲部队，还能迅速撤回己方防御工事。"
 Mot_AT_company: "车辆反坦克连"
 Mot_AT_company_desc: "这是一支专门从事反坦克作战的部队，他们利用车辆上的固定射击阵地进行作战。这支部队的设计更注重速度，使其能够跟上快速移动的机动部队和装甲部队，同时仍具备强大的反坦克能力。"
 AA_company: "防空连"
 AA_company_desc: "专门装备用于对抗敌方飞机，并防御敌方直升机和其他飞机的部队。"
 Combat_engineer_company: "战斗工兵连"
 Combat_engineer_company_desc: "战斗工兵直接支援一线部队执行进攻性工程作战任务。他们接受过训练并配备相应装备，能够穿越河流或反坦克壕沟等复杂地形。他们还具备清除雷区或其他防御障碍的能力，并能清理区域，使其他作战部队能够畅通无阻地通过。"
 pathfinder_company: "探路者连"
 pathfinder_company_desc: "精锐伞兵部队经过专门训练，在执行空降作战前跳伞，寻找最安全的着陆区和集结地。这些精锐部队在任何空降或空中机动作战的关键环节中提供至关重要的指挥和控制。"
 amphibious_landing_detachment: "海军登陆附属部队"
 amphibious_landing_detachment_desc: "海军的附属部队能够快速有效地执行两栖登陆作战。这些部队配备专用登陆舰和装备，可快速进行舰对岸或超视距登陆作战。然而，附属这些部队的代价是会降低非两栖作战能力。"
 combat_maintenance_company: "维修连"
 combat_maintenance_company_desc: "维修连负责保障部队车辆和重型装备的作战能力，进行野战维修，并在受损平台彻底报废前将其修复。通过在前线附近修复战斗中受损的车辆，维修连能够维持装甲部队在持久作战中的战斗力，并减少损耗。"
 airmobile_maintenance_company: "空中机动维修连"
 airmobile_maintenance_company_desc: "该维护分队旨在支援空中机动部队和直升机部队，配备轻便易携的工具，以确保旋翼机和快速部署部队的正常运转。它负责修复前线受损装备，维持远离既定后勤基地的空中突击作战节奏。"
 communications_company: "通讯连"
 communications_company_desc: "通信连负责维护将部队连接起来的无线电、数据和指挥网络，确保命令和报告在战场上可靠地传递。强大的通信能力能够提高协调性和反应速度，并增强部队抵御干扰和电子战的能力。"
 military_police_attachment: "宪兵"
 military_police_attachment_desc: "宪兵负责交通管制、后方安全以及战俘管理，使一线部队能够专注于作战。他们通过维护补给线的秩序，防止渗透者和掉队者进入后方，从而保持部队纪律，确保行军顺畅。"
 hq_mech: "总部机械化步兵连"
 hq_mot: "总部摩托化步兵连"
 hq_armor: "总部重型骑兵连"
 hq_Mot_Inf_Bat: "总部摩托化步兵秘密分遣队"
 hq_Mech_Inf_Bat: "总部机械化步兵秘密分遣队"
 hq_Arm_Inf_Bat: "总部装甲秘密分遣队"
 hq_Mech_Marine_Bat: "总部海军陆战秘密分遣队"
 hq_Mech_Air_Inf_Bat: "总部空中突击秘密分遣队"