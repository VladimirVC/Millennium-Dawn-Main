 UN.200.d: "Чтобы добиться желаемого результата по этой резолюции §BГенеральной Ассамблеи§! §Y Организации Объединенных Наций§!, нам нужно, чтобы больше людей либо проголосовали за нас, либо воздержались от голосования. Чтобы заставить их изменить свою позицию, мы должны предложить им что-то взамен. У нас есть несколько вариантов, но сейчас мы должны выбрать один и надеяться, что они его примут."
