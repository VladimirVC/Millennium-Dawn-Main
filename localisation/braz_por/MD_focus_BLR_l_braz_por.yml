 BLR_Minotor_category: "Serviço Minotor"
 BLR_Minotor_category_desc: "Minotor-Service is a Belarusian enterprise located in Minsk and engaged in the development, production, modernization, repair, and maintenance of combat tracked vehicles, as well as the supply of spare parts. It is one of the leading enterprises of the country's military-industrial complex."
 BLR_start_minotor: "Preparar Oficinas de Reparo"
 BLR_minotor_btr: "Preparar a Oficina de Reparo de APC"
 BLR_minotor_bmp: "Preparar a Oficina de Reparo de IFV"
 BLR_minotor_tank: "Preparar a Oficina de Reparo de Tanques"
 BLR_minotor_start: "Assinar um Contrato com [SOV.GetNamewithFlag]"
 BLR_558_zavod_category: "Fábrica de Reparo de Aeronaves 558"
 BLR_558_zavod_category_desc: "The 558th Aviation Repair Plant is one of the largest enterprises in the CIS for the repair and modernization of modern combat aviation equipment in service with the Air Forces of post-Soviet countries and many foreign nations alike. It is the most important aircraft repair facility in Belarus, located in the city of Baranovichi."
 BLR_start_zavod_558: "Preparar Oficinas de Reparo"
 BLR_bpla558: "Realizar desenvolvimentos na área de drones"
 BLR_558_kaz: "Oferecer um Contrato para [KAZ.GetNamewithFlag]"
 BLR_558_taj: "Oferecer um Contrato para [TAJ.GetNamewithFlag]"
 BLR_558_trk: "Oferecer um Contrato para [TRK.GetNamewithFlag]"
 BLR_558_irq: "Oferecer um Contrato para [IRQ.GetNamewithFlag]"
 BLR_558_lba: "Oferecer um Contrato para [LBA.GetNamewithFlag]"
 BLR_558_alg: "Oferecer um Contrato para [ALG.GetNamewithFlag]"
 BLR_558_agl: "Oferecer um Contrato para [AGL.GetNamewithFlag]"
