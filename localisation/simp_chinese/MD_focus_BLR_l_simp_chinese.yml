 belarus_another.45.t: "白俄罗斯内战"
 belarus_another.45.d: "我们没能控制住抗议者，现在他们已经把国家搞得一团糟。接下来会发生什么？"
 belarus_another.45.a: "这太可怕了！"
 belarus_another.48.t: "反对瓦格纳的战争"
 belarus_another.48.d: "我国政府对瓦格纳私人军事公司武装分子从白俄罗斯领土袭击我国的消息感到震惊，这给了我们充分的理由对白俄罗斯宣战。我们会发动战争吗？"
 belarus_another.48.a: "是时候解决白俄罗斯了"
 belarus_another.48.b: "没有必要宣战"
 belarus_another.49.t: "\"游览维尔纽斯\""
 belarus_another.49.d: "在边防部队的协助下，瓦格纳私人军事公司突破了立陶宛边境，进入其境内。谁也没想到的事情就这样发生了。"
 belarus_another.49.a: "夏日和弩"
 belarus_another.52.t: "牛仔裤革命"
 belarus_another.52.d: "白俄罗斯人民走上街头，抗议合法政府并要求其辞职。我希望我们已经为此做好了充分准备。"
 belarus_another.52.a: "镇压抗议"
 belarus_another.53.t: "民族布尔什维克在俄罗斯夺取政权"
 belarus_another.53.d: "我们忠实的拥护者终于在俄罗斯夺取了政权。克里姆林宫现在是我们的了。我们的领袖已经准备好领导俄罗斯。"
 belarus_another.53.a: "俄罗斯就是一切。其他的都不重要。"
