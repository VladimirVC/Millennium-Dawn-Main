 cyber_op_slot_7_attribution_hunt_tracking_desc: "Наши разведывательные группы проводят судебно-медицинский анализ недавнего вторжения, отслеживают векторы атак и цифровые подписи, чтобы идентифицировать ответственного государственного субъекта. Результаты ожидаются в течение 60 дней."
 cyber_op_slot_8_attribution_hunt_tracking: "Поиск по атрибуции активен"
 cyber_op_slot_8_attribution_hunt_tracking_desc: "Наши разведывательные группы проводят судебно-медицинский анализ недавнего вторжения, отслеживают векторы атак и цифровые подписи, чтобы идентифицировать ответственного государственного субъекта. Результаты ожидаются в течение 60 дней."
 cyber_op_slot_9_attribution_hunt_tracking: "Поиск по атрибуции активен"
 cyber_op_slot_9_attribution_hunt_tracking_desc: "Наши разведывательные группы проводят судебно-медицинский анализ недавнего вторжения, отслеживают векторы атак и цифровые подписи, чтобы идентифицировать ответственного государственного субъекта. Результаты ожидаются в течение 60 дней."
 cyber_network_hardening_complete_tt: "Упрочнение сети завершено. Была усилена критическая сетевая инфраструктура и исправлены известные уязвимости."
 cyber_counter_intrusion_complete_tt: "Зачистка от вторжения завершена. Все обнаруженные иностранные имплантаты и постоянные полезные нагрузки были удалены из наших сетей."
 cyber_attribution_hunt_complete_tt: "Поиск атрибуции завершен. Аналитики разведки завершили свою судебно-медицинскую экспертизу недавних вторжений."
 cyber_gps_tracking_complete_tt: "Устранены помехи в работе GPS. Наша группа связи завершила вывод из строя спутниковых навигационных систем цели."
 cyber_economic_tracking_complete_tt: "Операция по экономическому сбою устранена. Наши киберкоманды завершили свою кампанию, нацеленную на финансовую инфраструктуру противника."
 cyber_propaganda_tracking_complete_tt: "Пропагандистская операция завершена. Наши информационные подразделения завершили свою кампанию воздействия на целевую аудиторию."
 cyber_infra_tracking_complete_tt: "Инфраструктурная атака устранена. Наши оперативники завершили свое продолжительное наступление на критически важные объекты инфраструктуры противника."
 cyber_crit_tracking_complete_tt: "Критическая ударная операция завершена. Наши подразделения нанесли высокоприоритетный удар по наиболее важным системам цели."
 cyber_sigint_surveillance_tracking_complete_tt: "Операция по наблюдению за СИГИНТОМ завершена. Наши группы перехвата завершили сбор разведывательных сигналов от цели."
 cyber_radar_spoofing_tracking_complete_tt: "Операция по подмене радара решена. Наши группы радиоэлектронной борьбы завершили работу по разрушению сети воздушного наблюдения противника."
 cyber_election_interference_tracking_complete_tt: "Операция по вмешательству в выборы разрешена. Наши подразделения влияния завершили свою тайную кампанию, нацеленную на избирательный процесс противника."
 cyber_industrial_espionage_tracking_complete_tt: "Операция по промышленному шпионажу раскрыта. Наши оперативники получили от противника данные о целенаправленных исследованиях и разработках."
 cyber_comms_intercept_tracking_complete_tt: "Операция по перехвату сообщений завершена. Наши группы завершили свое устойчивое проникновение в сети командования и контроля противника."
 cyber_financial_system_attack_tracking_complete_tt: "Атака на финансовую систему устранена. Наши подразделения завершили свою операцию, нацеленную на банковскую и платежную инфраструктуру противника."
 cyber_logistics_disruption_tracking_complete_tt: "Операция по нарушению логистики устранена. Наши оперативники завершили свою кампанию против цепочки поставок и систем распределения противника."
 cyber_sleeper_network_tracking_complete_tt: "Имплантация спящей сети решена. Наши команды внедрили инструменты постоянного доступа в сети противника для дальнейшей активации."
 cyber_deception_campaign_tracking_complete_tt: "Кампания по обману раскрыта. Наши оперативники завершили свою операцию под фальшивым флагом, направленную на введение в заблуждение аналитиков разведки противника."
 cyber_zero_day_strike_tracking_complete_tt: "Удар нулевого дня разрешен. Наши подразделения выполнили высокоэффективный эксплойт против нераскрытой уязвимости в критически важных системах противника."
 cyber_network_hardening_active: "Сети укрепились"
 cyber_network_hardening_active_desc: "Наши команды по кибербезопасности усилили системы аутентификации, исправили известные уязвимости и изолировали критически важные каналы доступа. Вероятность успеха попыток иностранного вторжения значительно снижается, пока эти средства защиты остаются на месте."
 cyber_counter_intrusion_active: "Зачистка от вторжения"
 cyber_counter_intrusion_active_desc: "Аналитики активно ищут иностранное присутствие в наших сетях — просматривают журналы регистрации, изолируют аномальные процессы и удаляют стойкие имплантаты. Осведомленность об оперативной безопасности повышается во всех государственных системах."
 cyber_attribution_hunt_active: "Охота за атрибуцией продолжается"
 cyber_attribution_hunt_active_desc: "Команды цифровой криминалистики реконструируют пути атаки и каталогизируют сигнатуры ответственных участников. Собранные разведданные усилят нашу обороноспособность и приведут к пропорциональному ответу."
 MD_cyber.201.t: "Инфильтрация устранена"
 MD_cyber.201.d: "Наши группы противодействия вторжению завершили зачистку. Иностранные инструменты доступа, имплантаты наблюдения и постоянно действующие \"черные ходы\" были идентифицированы и удалены. Наши сети чисты."
 MD_cyber.201.a: "Хорошая работа. Будьте бдительны."
 MD_cyber.202.t: "Зачистка завершена — сети очищены"
 MD_cyber.202.d: "Наши группы противодействия вторжению завершили проверку всех критически важных систем. Никаких иностранных инструментов доступа или имплантатов наблюдения обнаружено не было. Наши сети кажутся безопасными."
 MD_cyber.202.a: "Поддерживайте вахту."
 MD_cyber.1.t: "Операция прошла успешно"
 MD_cyber.1.d: "Наши кибергруппы успешно провели операцию. После этого не осталось никаких следов — у цели нет никаких указаний на наше участие."
 MD_cyber.1.a: "Отличная работа."
 MD_cyber.2.t: "Обнаружено постороннее вторжение"
 MD_cyber.2.d: "Наши службы безопасности выявили признаки внешнего кибернетического вторжения. Нападавшие эффективно замаскировали свое происхождение — мы не можем определить, кто несет ответственность."
 MD_cyber.2.a: "Укрепите нашу оборону."
 MD_cyber.3.t: "Кибератака, организованная [?disp_name_agressor.GetNameWithFlag]"
 MD_cyber.3.d: "Наши спецслужбы зафиксировали недавнее кибератаку со стороны [?disp_name_agressor.GetNameWithFlag]. Атака была преднамеренной и целенаправленной. Мы выразили официальный дипломатический протест."
 MD_cyber.3.a: "Осудите агрессора."
 MD_cyber.4.t: "Операция прервана"
 MD_cyber.4.d: "Наши кибергруппы не смогли надежно закрепиться в системах цели. Операция была прервана до того, как удалось предпринять какие-либо действия. Необходима дополнительная подготовка."
 MD_cyber.4.a: "Перегруппируйтесь и оцените ситуацию."
 MD_cyber.11.t: "Нарушение работы GPS-сигнала"
 MD_cyber.11.d: "Воинские части сообщают о широко распространенных сбоях в системах спутниковой навигации. Командиры на местах изо всех сил стараются эффективно координировать свои действия. Подозревается атака с нарушением работы внешнего сигнала."
 MD_cyber.11.a: "Переключитесь на резервную навигацию."
 MD_cyber.12.t: "Скомпрометированные финансовые сети"
 MD_cyber.12.d: "Банки, биржи и платежные системы сообщают о каскадных системных сбоях. Перебои не случайны — наши аналитики полагают, что иностранные агенты нацелились на нашу финансовую инфраструктуру."
 MD_cyber.12.a: "Изолируйте и локализуйте повреждение."
 MD_cyber.13.t: "Проникшее в информационное пространство"
 MD_cyber.13.d: "Платформы социальных сетей и новостные сети наводнены скоординированной дезинформацией. Общественное доверие к правительству подрывается. Наши аналитики полагают, что это операция иностранного влияния."
 MD_cyber.13.a: "Начните кампанию по борьбе с нарративом."
 MD_cyber.14.t: "Критическая инфраструктура подвергается атаке"
 MD_cyber.14.d: "Электростанции, транспортные узлы и узлы связи одновременно вышли из строя. Инженеры сообщают о признаках преднамеренного саботажа через наши системы управления. Это значительная эскалация."
 MD_cyber.14.a: "Объявите чрезвычайное положение в стране."
 MD_cyber.15.t: "Катастрофический Киберудар"
 MD_cyber.15.d: "Все критически важные системы в стране были поражены одновременно — финансовые сети, электросети, военные коммуникации и цепочки поставок. Масштаб и точность атаки беспрецедентны. Нация искалечена."
 MD_cyber.15.a: "Мобилизуйте все, что у нас есть."
 MD_cyber.16.t: "Коммуникации скомпрометированы"
 MD_cyber.16.d: "Иностранные агенты проникли в наши зашифрованные каналы связи. Конфиденциальные передачи, вероятно, отслеживаются враждебным государственным субъектом."
 MD_cyber.16.a: "Инициируйте карантин связи."
 MD_cyber.17.t: "Нарушены радиолокационные сети"
 MD_cyber.17.d: "Наши радиолокационные сети противовоздушной обороны возвращают ложные показания. Призрачные контакты ошеломляют операторов — возможно, вражеская авиация использует возникшую неразбериху."
 MD_cyber.17.a: "Переключитесь на резервные протоколы обнаружения."
 MD_cyber.18.t: "Обнаружена операция постороннего воздействия"
 MD_cyber.18.d: "Появились свидетельства скоординированной кампании иностранного влияния, нацеленной на наш внутренний политический ландшафт. Дезинформация распространяется через социальные сети и углубляет общественные разногласия."
 MD_cyber.18.a: "Осуждать иностранное вмешательство."
 MD_cyber.19.t: "Взломаны исследовательские сети"
 MD_cyber.19.d: "Секретные данные исследований и промышленные образцы были украдены из наших национальных лабораторий и оборонных подрядчиков. Полный масштаб кражи все еще оценивается."
 MD_cyber.19.a: "Проведите аудит всех засекреченных систем."
 MD_cyber.110.t: "Проникшие в командные сети"
 MD_cyber.110.d: "Были взломаны наши военные и дипломатические каналы связи. Вражеские оперативники перехватывают приказы и конфиденциальную переписку в режиме реального времени."
 MD_cyber.110.a: "Очистите все скомпрометированные каналы."
 MD_cyber.111.t: "Системы центрального банка подвергаются атаке"
 MD_cyber.111.d: "Наш центральный банк и первичная инфраструктура финансового клиринга подверглись длительной кибератаке. Обработка транзакций приостановлена, и валютные рынки быстро дестабилизируются."
 MD_cyber.111.a: "Объявите чрезвычайную финансовую ситуацию."
 MD_cyber.112.t: "Нарушена цепочка военных поставок"
 MD_cyber.112.d: "Командно-контрольное программное обеспечение, управляющее нашей передовой логистикой, вышло из строя во многих секторах. Подразделения на передовой сообщают о нехватке снабжения по мере того, как перебои распространяются каскадом по всей системе."
 MD_cyber.112.a: "Вернитесь к ручным процедурам поставки."
 MD_cyber.113.t: "Обнаружено постоянное вторжение"
 MD_cyber.113.d: "Наши службы безопасности обнаружили бездействующие точки доступа, встроенные глубоко в критически важную сетевую инфраструктуру. Имплантаты сложны и, вероятно, были активны в течение некоторого времени."
 MD_cyber.113.a: "Начните полный аудит сети."
 MD_cyber.114.t: "Разведка командования скомпрометирована"
 MD_cyber.114.d: "Наши разведывательные службы выявили систематическую кампанию передачи сфабрикованных сигналов и ложных сообщений. Наши военные командиры, возможно, действовали на основе намеренно искаженной информации."
 MD_cyber.114.a: "Создайте оперативную группу по проверке сигналов."
 MD_cyber.115.t: "Удар нулевого дня"
 MD_cyber.115.d: "Сокрушительный высокоточный кибератак одновременно поразил наши самые важные системы с использованием ранее неизвестных эксплойтов. Пострадали промышленные системы управления, энергетическая инфраструктура и оборонные сети."
 MD_cyber.115.a: "Активируйте национальные протоколы чрезвычайных ситуаций в киберпространстве."
 cyber_propaganda_ops_malus: "Проникшее в информационное пространство"
 cyber_propaganda_ops_malus_desc: "Скоординированная зарубежная кампания дезинформации активно подрывает доверие общественности к нашему правительству и институтам, подавляя политическую активность и подрывая национальную сплоченность."
 cyber_gps_jamming_malus: "Сбой в работе систем GPS"
 cyber_gps_jamming_malus_desc: "Иностранные кибер-агенты скомпрометировали нашу военную инфраструктуру спутниковой навигации, серьезно ухудшив координацию действий войск и осведомленность о поле боя."
 cyber_economic_disruption_malus: "Скомпрометированные финансовые сети"
 cyber_economic_disruption_malus_desc: "Продолжительная иностранная кибератака подрывает наши банковские системы, платежные сети и промышленное производство. Восстановление экономики потребует времени."
 cyber_infrastructure_damage_malus: "Ущерб инфраструктуре"
 cyber_infrastructure_damage_malus_desc: "Иностранные кибератаки нанесли значительный ущерб нашей критически важной инфраструктуре, затруднив логистику, строительство и распределение поставок."
 cyber_critical_strike_malus: "Катастрофический Киберудар"
 cyber_critical_strike_malus_desc: "Разрушительная кибератака полного спектра одновременно нанесла ущерб нашей промышленной базе, коммуникациям и цепочке поставок. Восстановление будет долгим и болезненным."
 cyber_sigint_surveillance_malus: "Коммуникации, находящиеся под наблюдением"
 cyber_sigint_surveillance_malus_desc: "Иностранные агенты проникли в нашу инфраструктуру зашифрованной связи. Конфиденциальные передачи, вероятно, отслеживаются, что затрудняет скоординированные политические действия."
 cyber_radar_spoofing_malus: "Радиолокационная сеть скомпрометирована"
 cyber_radar_spoofing_malus_desc: "Иностранные кибер-оперативники вводят ложные данные в наши радиолокационные сети ПВО, ухудшая возможности обнаружения и перехвата."
 cyber_election_interference_malus: "Активная кампания по оказанию иностранного влияния"
 cyber_election_interference_malus_desc: "Скоординированная зарубежная кампания дезинформации подрывает общественное доверие и углубляет внутриполитические разногласия."
 cyber_industrial_espionage_malus: "Взломаны исследовательские сети"
 cyber_industrial_espionage_malus_desc: "Секретные данные исследований и промышленные образцы были украдены из наших национальных лабораторий и оборонных подрядчиков, что привело к срыву наших программ развития."
 cyber_comms_intercept_malus: "Командные сети скомпрометированы"
 cyber_comms_intercept_malus_desc: "Наши военные и дипломатические коммуникации были взломаны. Оперативная безопасность снижена, а координация страдает."
 cyber_financial_system_attack_malus: "Финансовая инфраструктура подвергается атаке"
 cyber_financial_system_attack_malus_desc: "Продолжительное наступление на наш центральный банк и платежную инфраструктуру привело к каскадным сбоям по всей экономике."
 cyber_logistics_disruption_malus: "Нарушена цепочка военных поставок"
 cyber_logistics_disruption_malus_desc: "Командно-контрольное программное обеспечение, управляющее нашей передовой логистикой, было скомпрометировано. Подразделения на фронте испытывают нехватку снабжения."
 cyber_sleeper_network_malus: "Постоянное сетевое вторжение"
 cyber_sleeper_network_malus_desc: "Иностранные оперативники внедрили бездействующие точки доступа глубоко в наши критически важные сети, поддерживая постоянный низкоуровневый доступ к чувствительным системам."
 cyber_deception_campaign_malus: "Командный интеллект отравлен"
 cyber_deception_campaign_malus_desc: "Наши командиры действовали на основе сфабрикованных сигналов и ложных сообщений. Военная координация и осведомленность о ситуации серьезно ухудшены."
 cyber_zero_day_strike_malus: "Удар нулевого дня"
 cyber_zero_day_strike_malus_desc: "Сокрушительный высокоточный удар с использованием засекреченных эксплойтов нулевого дня одновременно нанес удар по нашим наиболее важным промышленным и инфраструктурным системам."
 upgrade_establish_cyber_operations_division: "Отдел киберопераций"
 upgrade_establish_cyber_operations_division_desc: "Создать в агентстве специальное подразделение по кибероперациям, которое обеспечит базовые возможности для ведения цифровой войны. Это подразделение позволит нам проводить §Yоперации в сфере кибервойны§! ."
 upgrade_offensive_cyber_operations: "Наступательная Кибервойна"
 upgrade_offensive_cyber_operations_desc: "Расширьте подразделение с помощью передовых наборов инструментов для устранения постоянных угроз и поиска эксплойтов нулевого дня, что позволит выполнять более сложные операции."
 upgrade_cyber_warfare_operational_planning: "Киберкомандование полного спектра"
 upgrade_cyber_warfare_operational_planning_desc: "Превратите подразделение в полностью интегрированное киберкомандование, способное координировать сложные многовекторные операции против защищенных целей."
 upgrade_defensive_cyber_operations: "Оборонительные кибероперации"
 upgrade_defensive_cyber_operations_desc: "Создайте специальную команду защиты, специализирующуюся на укреплении наших собственных сетей, обнаружении вторжений и сокрытии нашего цифрового следа."
 upgrade_cyber_elite: "Арсенал нулевого дня"
 upgrade_cyber_elite_desc: "Разрабатывайте и накапливайте секретный арсенал элитных эксплойтов нулевого дня, способных проникнуть даже в самые защищенные системы в мире."
 cyber_offense_power_modifier: "Наступательная Кибервойна"
 cyber_offense_power_modifier_desc: "Ценность, которая определяет, насколько сильны наши наступательные операции в кибервойне."
 cyber_defense_rating_modifier: "Оборонительная Кибервойна"
