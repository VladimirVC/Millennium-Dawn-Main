 IND_islamic_resist_c1: "Resistencia musulmana mínima en Sulawesi"
 IND_islamic_resist_info: "Sulawesi es una de nuestras islas más grandes y está habitada por muchos pueblos diferentes. Sin embargo, la gran mayoría musulmana denuncia la negligencia del Estado y está oponiendo una fuerte resistencia a gran parte de nuestras fuerzas y nuestra economía. Esta resistencia está haciendo la vida muy difícil para nuestros hombres y fuerzas de seguridad."
