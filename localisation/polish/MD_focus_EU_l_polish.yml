 EU_budget_mff_draft_desc: "Państwo członkowskie, które opracowuje wieloletnie ramy finansowe, musi po zakończeniu negocjacji umieścić projekt w porządku obrad Parlamentu Europejskiego. W nagrodę państwo członkowskie przygotowujące projekt otrzymuje całą przyznaną mu władzę polityczną po zatwierdzeniu i wejściu w życie wieloletnich ram finansowych."
