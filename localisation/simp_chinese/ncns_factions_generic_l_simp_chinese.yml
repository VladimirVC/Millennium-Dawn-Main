 economic_powerhouse_goal_name: "经济强国"
 joint_military_exercises_goal_desc: "现代战争要求盟军之间具备协同作战能力。通过举行联合演习，并达到100个装备精良的师级兵力，我方展现了应对任何威胁的准备。"
 economic_integration_goal_desc: "强大的经济是任何持久联盟的基础。通过确保每个成员国至少拥有15家民用工厂，我们就能建立起集体繁荣和互助所需的工业基础。"
 technology_sharing_goal_desc: "技术优势是一种倍增器。通过联合研发项目和数字基础设施投资，我们阵营可以超越竞争对手，在各个领域保持领先地位。"
 regional_stability_goal_desc: "联盟的强度取决于其最薄弱的环节。通过保持所有成员国50%以上的稳定率，我们就能形成统一战线，有效遏制机会主义侵略和内部颠覆活动。"
 counter_terrorism_goal_desc: "恐怖主义不分国界。在每个成员国设立情报机构，可以建立一个能够在威胁出现之前就将其拦截的网络，从而保护我们的公民和集体利益。"
 semiconductor_supremacy_goal_desc: "微芯片制造是21世纪的战略性产业。通过在我们阵营内建设共计50家微芯片工厂，我们能够确保未来几十年供应链的独立性和技术优势。"
 strategic_resource_security_goal_desc: "获取关键原材料是经济增长和军事战备的基石。我们阵营必须共同开采足够的石油、橡胶和铝，以确保任何成员都不会受到资源胁迫。"
 collective_cyber_defense_goal_desc: "在数字时代，密码安全与物理防御同等重要。通过确保每个成员国都具备先进的加密能力，我们能够保护我们的通信、情报和关键基础设施。"
 economic_powerhouse_goal_desc: "经济实力直接转化为地缘政治影响力。当我们的派系领袖实现高人均GDP，且所有成员都超过基准线时，我们就成为一个不容忽视的经济集团。"
 faction_gdp_per_capita_target_tt: "阵营领袖人均GDP超过15，所有成员人均GDP超过5"
 faction_economic_integration_idea: "经济一体化协定"
 faction_economic_integration_idea_desc: "通过协调一致的贸易政策和减少贸易壁垒，成员国可以享受更紧密的经济合作和更快的发展。"