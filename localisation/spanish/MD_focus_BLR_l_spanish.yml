 asseco_research: "Investigación Asseco."
 BLR_oil_sov: "Contrato energético con Bielorrusia"
 belarus_another.6.t: "El Culto a Lukashenko."
 belarus_another.6.d: "Alexander Lukashenko ha sido presidente permanente de la República de Bielorrusia durante mucho tiempo. Durante su mandato, se ha creado a su alrededor un auténtico culto a la \"Batka\". Este culto lo distingue de otros dictadores de la CEI, pero también le exige interactuar con su pueblo de una manera particular. El indicador de Apoyo a la Batka muestra la fuerza del respaldo a Alexander Grigoryevich Lukashenko en todos los segmentos de la población. Dependiendo de diversas acciones, este indicador aumentará o disminuirá, otorgando diferentes bonificaciones o penalizaciones."
 belarus_another.6.a: "Nuestro Batka Lukashenko, madre de Belarús."
 BLR_luka_prime: "Primer ministro del Estado de la Unión - Lukashenko"
 default_left_side: "Oposición"
 default_right_side: "Fuerzas prorrusas"
 mid_range: "Equilibrado"
 left_side_range: "La oposición tiene una influencia débil"
 middle_left_side_range: "La oposición influye en la política"
 far_left_side_range: "La oposición domina la política"
