l_english:
 ### 2006 East Timor Crisis ###
 east_timor.1.t: "The 2006 Crisis"
 east_timor.1.d: "East Timor's military has fractured along regional lines. Nearly 600 soldiers from the western districts have been dismissed, triggering factional violence that is spreading through the capital Dili. The government is losing control of the security situation."
 east_timor.1.a: "Request international peacekeeping assistance"
 east_timor.1.b: "We will restore order ourselves"

 east_timor.2.t: "East Timor Requests Peacekeepers"
 east_timor.2.d: "East Timor has descended into factional violence and is requesting Australian military assistance to restore order. As the region's largest power, our response will set the tone for the international intervention."
 east_timor.2.a: "Deploy the International Stabilisation Force"
 east_timor.2.b: "We cannot intervene at this time"

 east_timor.3.t: "East Timor Calls for Help"
 east_timor.3.d: "Our former colony East Timor is requesting military assistance as the country descends into chaos. Portugal has a historical obligation and strong ties to the Timorese people."
 east_timor.3.a: "Send a peacekeeping contingent"
 east_timor.3.b: "Decline the request"

 east_timor.4.t: "East Timor Requests Assistance"
 east_timor.4.d: "East Timor has requested New Zealand's help in restoring order. The small nation is struggling with widespread violence and a collapsing security apparatus."
 east_timor.4.a: "Send peacekeepers"
 east_timor.4.b: "Decline"

 east_timor.5.t: "East Timor Crisis"
 east_timor.5.d: "East Timor has requested Malaysian peacekeeping forces to help stabilize the country. As a fellow Southeast Asian nation, Malaysia's participation would demonstrate regional solidarity."
 east_timor.5.a: "Deploy troops to Dili"
 east_timor.5.b: "Decline the request"

 east_timor.6.t: "Australian Forces Arrive"
 east_timor.6.d: "Australian peacekeeping forces have arrived in Dili and are restoring order in the capital. The International Stabilisation Force is the backbone of the peacekeeping operation."
 east_timor.6.a: "We are grateful"

 east_timor.7.t: "Portuguese Forces Arrive"
 east_timor.7.d: "Portuguese troops have deployed to East Timor, fulfilling a historical obligation to their former colony."
 east_timor.7.a: "Welcome, friends"

 east_timor.8.t: "New Zealand Peacekeepers Arrive"
 east_timor.8.d: "New Zealand has sent a peacekeeping contingent to assist in stabilizing East Timor."
 east_timor.8.a: "Their help is appreciated"

 east_timor.9.t: "Malaysian Troops Arrive"
 east_timor.9.d: "Malaysian forces have arrived to assist the peacekeeping operation in East Timor."
 east_timor.9.a: "Our thanks to Malaysia"

 east_timor.10.t: "The Hunt for Alfredo Reinado"
 east_timor.10.d: "Rebel leader Alfredo Reinado has evaded authorities and is hiding in the mountains south of Dili. His continued freedom undermines the government's authority and emboldens other dissident factions."
 east_timor.10.a: "Ask Australia to send special forces"
 east_timor.10.b: "Hunt him with our own forces"

 east_timor.11.t: "East Timor Requests SAS Assistance"
 east_timor.11.d: "East Timor has asked Australia to deploy Special Air Service Regiment troops to capture fugitive rebel leader Alfredo Reinado, who continues to evade the peacekeeping force."
 east_timor.11.a: "Send in the SAS"
 east_timor.11.b: "This is beyond our mandate"

 east_timor.12.t: "Reinado Escapes"
 east_timor.12.d: "Despite the Australian special forces operation, Alfredo Reinado has escaped into the mountains. The operation failed to apprehend him, but the broader international presence has stabilized the security situation in Dili."
 east_timor.12.a: "He will be found eventually"

 ### News Events ###
 east_timor_news.1.t: "International Force Deploys to East Timor"
 east_timor_news.1.desc: "An international peacekeeping force led by Australia has begun deploying to Dili following a formal request from the East Timorese government. Factional violence has left hundreds dead or displaced in the capital. Australia, Portugal, New Zealand, and Malaysia are contributing troops to the International Stabilisation Force."
 east_timor_news.1.a: "We are counting on the world's help"
 east_timor_news.1.b: "We will restore order in Dili"
 east_timor_news.1.c: "Stability in the region is in our interest"
 east_timor_news.1.d: "A small nation in crisis"
