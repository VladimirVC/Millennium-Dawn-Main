 NKO_offer_negotiations_yo_jong_desc: ""
 NKO_propose_north_led_unification_yo_jong: "통일 정부 제안"
 NKO_propose_north_led_unification_yo_jong_desc: "남조선 지도자들은 자신들이 권력에서 축출되고 과거 행위에 대한 처벌을 받을 가능성이 있는 협상에 동의할 가능성이 낮습니다. 북남 통합 정부 수립이 조국 통일의 목표를 달성하는 최선의 방법입니다."
 NKO_propose_unity_government_yo_jong: "북한 주도의 통일 제안"
 NKO_propose_unity_government_yo_jong_desc: "우리의 공정한 복지 체계부터 더 강력한 핵무기에 이르기까지, 공화국 모델이 조선반도가 나아갈 길임은 명백합니다. 우리는 강력한 통일 이후의 미래를 향해 조선을 이끌어갈 주체가 바로 우리여야 한다고 강력히 주장해야 합니다."
 NKO_pave_the_way_for_reunification_yo_jong: "통일을 향한 길"
 NKO_pave_the_way_for_reunification_yo_jong_desc: "북남 관계 정상화를 향한 큰 진전이 이루어졌으므로, 이제 통일을 위한 준비를 시작할 수 있습니다."
