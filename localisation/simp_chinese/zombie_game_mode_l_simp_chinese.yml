 RULE_ZOMBIE_DIFFICULTY_NORMAL: "普通"
 RULE_ZOMBIE_DIFFICULTY_NORMAL_DESC: "游戏开始时，僵尸拥有400万只。"
 RULE_ZOMBIE_DIFFICULTY_HARD: "困难"
 RULE_ZOMBIE_DIFFICULTY_HARD_DESC: "游戏开始时，僵尸拥有900万只。"
 RULE_ZOMBIE_DIFFICULTY_EXTREME: "极端"
 RULE_ZOMBIE_DIFFICULTY_EXTREME_DESC: "游戏开始时，僵尸拥有1350万只。"
 RULE_ZOMBIE_DIFFICULTY_INSANE: "疯狂"
 RULE_ZOMBIE_DIFFICULTY_INSANE_DESC: "游戏开始时，僵尸拥有3700万只。"
 RULE_ZOMBIE_GAME_MODE: "启用僵尸模式"
 RULE_ZOMBIE_GAME_MODE_NO_DESC: "僵尸模式将不会启用"
 RULE_ZOMBIE_GAME_MODE_YES_DESC: "僵尸模式将会开启。其他所有千禧黎明内容依然存在，请注意这一点。如果你想扮演僵尸，请选择印度作为初始国家。"
 zombie: "僵尸病毒"
 zombie_desc: "这种病毒会将无害的人类变成怪物。"
 zombie_0: "僵尸病毒"
 zombie_0_desc: "这种病毒会将无害的人类变成怪物。"
 Zombie: "僵尸"
 Zombie_desc: "僵尸唯一的目的就是吞噬人类。"
 better_instincts: "更敏锐的本能"
 better_instincts_desc: "丧尸已经进化出更高效的杀戮方式。"
 shock_and_zombie_awe: "大规模恐慌"
 shock_and_zombie_awe_desc: "恐慌情绪在民众中蔓延。谁也无法预料到丧尸的出现，以及它们攻占军事阵地的速度之快。随着生存信心的丧失，孤注一掷的防御工事也土崩瓦解。"
 zombie.1.t: "病毒蔓延至英格兰"
 zombie.1.d: "英吉利海峡抵挡不住这场无情的瘟疫。受感染的难民被冲上多佛尔的白色悬崖，伦敦熙熙攘攘的街道变得异常寂静，病毒肆虐着帝国的中心地带。英国的岛屿堡垒变成了监狱，死者开始行走。"
 zombie.1.a: "承认疫情爆发"
 zombie.2.t: "病毒蔓延至爱尔兰"
 zombie.2.d: "爱尔兰海未能阻挡亡灵瘟疫的蔓延。渔船返回港口时，带回的远不止渔获，沿海城镇也一个接一个地陷入沉寂。瘟疫从都柏林和科克向内陆蔓延，如同潮水般吞噬了翡翠岛，无数蹒跚的尸体涌来。"
 zombie.2.a: "承认疫情爆发"
 zombie.3.t: "病毒蔓延至美国"
 zombie.3.d: "尽管采取了紧急隔离措施，但逃离欧洲的感染难民还是将瘟疫带到了大西洋彼岸。东海岸的主要港口城市报​​告了疫情爆发，感染以惊人的速度向西蔓延。美国梦变成了行尸走肉的噩梦。"
 zombie.3.a: "承认疫情爆发"
 zombie.4.t: "病毒蔓延至日本"
 zombie.4.d: "如今，日出之国面临着一支毫无荣誉感和怜悯之心的军队。来自东京、大阪和其他人口中心的噩耗纷至沓来，这些人口稠密的城市已沦为死亡陷阱。古老的寺庙和现代的摩天大楼都无一幸免于感染者无情的攻势。"
 zombie.4.a: "承认疫情爆发"
 zombie.5.t: "病毒蔓延至澳大利亚"
 zombie.5.d: "浩瀚的海洋只能提供暂时的喘息之机。载着感染船员的货船抵达悉尼和墨尔本，疫情迅速蔓延至整个大陆。即使是环境恶劣的内陆地区也难以抵挡瘟疫的侵袭，人类最后的岛屿堡垒也开始沦陷。"
 zombie.5.a: "承认疫情爆发"
 zombie.6.t: "病毒蔓延至新西兰"
 zombie.6.d: "那些曾是中土世界灵感来源的偏远岛屿，如今也面临着一场末日浩劫。病毒通过海空两路传入，迅速蔓延至惠灵顿和奥克兰。新西兰曾经赖以生存的孤立状态，如今却意味着它已无处可逃。"
 zombie.6.a: "承认疫情爆发"
 zombie.7.t: "病毒蔓延至菲律宾"
 zombie.7.d: "瘟疫如同热带风暴般席卷菲律宾群岛。幸存者们辗转于各个岛屿之间，将瘟疫从吕宋岛带到棉兰老岛，曾经构成天然屏障的数千个岛屿如今变成了与世隔绝的恐怖之地，令人绝望。"
 zombie.7.a: "承认疫情爆发"
 zombie.8.t: "丧尸大军"
 zombie.8.d: "死者行走于世。丧尸大军已席卷印度次大陆，通过感染和直接捕食迅速吞噬着我们的人口。专家将这场冲突命名为“爆发”，但人类的生存之战才刚刚开始。绝望的国家已经开始关闭边境。"
 zombie.8.a: "进行动员以对抗部落"
 zombie.8.b: "接受人类的命运"
 zombie.9.t: "[FROM.GetName]请求援助对抗僵尸"
 zombie.9.d: "[FROM.GetName]已请求援助，并试图争取所有主要国家的支持以阻止疫情爆发。我们会响应号召，还是优先考虑自身生存？"
 zombie.9.a: "加入联盟"
 zombie.9.b: "生存至上"
 RULE_ZOMBIE_JOINING_FACTION_GAME_MODE: "反僵尸联盟加入阵营"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL: "默认阵营行为"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL_DESC: "阵营行为是该游戏模式的默认行为。"
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS: "无主要国家"
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS_DESC: "主要国家不会加入反僵尸联盟。"
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS: "所有主要国家都会加入联盟。"
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS_DESC: "所有主要国家都会加入反僵尸联盟。"
 zombie.10.t: "爆发！"
 zombie.10.d: "丧尸病毒已经蔓延到我们的土地上，现在正在[?var:random_outbreak_state.GetName]地区扩散。疫情的严重程度仍然未知。"
 zombie.10.a: "动员军队"
 zombie.11.t: "[FROM.GetName]爆发"
 zombie.11.d: "[FROM.GetName]爆发了疫情，并且疫情仍在迅速恶化。丧尸病毒以惊人的速度传播，这种情况可能预示着世界末日的开始。"
 zombie.11.a: "监控事态"
 zombie.11.b: "准备最坏的打算"
 RULE_ZOMBIE_SPAWN_LOCATION: "僵尸生成位置"
 RULE_ZOMBIE_SPAWN_INDIA: "印度（默认）"
 RULE_ZOMBIE_SPAWN_INDIA_DESC: "僵尸大军在印度如常出现。"
 RULE_ZOMBIE_SPAWN_AFRICA: "中非"
 RULE_ZOMBIE_SPAWN_AFRICA_DESC: "僵尸大军在非洲中部（刚果地区）出现，开辟了一条新的战线，这条战线比欧洲和中东更早地受到了威胁。"
 RULE_ZOMBIE_SPAWN_EAST_ASIA: "东亚"
 RULE_ZOMBIE_SPAWN_EAST_ASIA_DESC: "僵尸大军在中国沿海地区出现，立即对东亚、日本和太平洋地区构成威胁。"
 RULE_ZOMBIE_SPAWN_MULTIPLE: "多地点"
 RULE_ZOMBIE_SPAWN_MULTIPLE_DESC: "僵尸大军同时在印度、中非和东亚出现，每个地点的初始兵力较小。"
 RULE_ZOMBIE_COALITION_ENABLED: "反僵尸联盟阵营"
 RULE_ZOMBIE_COALITION_ENABLED_YES: "启用（默认）"
 RULE_ZOMBIE_COALITION_ENABLED_YES_DESC: "反僵尸联盟正常组建。各大强国将被邀请加入对抗僵尸大军的战斗。"
 RULE_ZOMBIE_COALITION_ENABLED_NO: "禁用"
 RULE_ZOMBIE_COALITION_ENABLED_NO_DESC: "反僵尸联盟不会成立。各国必须在没有组织严密的联盟的情况下独自度过这场疫情。"
 RULE_ZOMBIE_COALITION_DELAY: "僵尸生成延迟"
 RULE_ZOMBIE_COALITION_DELAY_NONE: "无延迟（默认）"
 RULE_ZOMBIE_COALITION_DELAY_NONE_DESC: "游戏开始时，僵尸群会立即出现。"
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR: "1年"
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR_DESC: "僵尸大军会在一年倒计时后出现，让各国有时间在疫情爆发前做好准备。"
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS: "2年"
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS_DESC: "僵尸大军会在两年倒计时后出现，这给了各国充足的时间来发展经济和军事力量。"
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS: "3年"
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS_DESC: "僵尸大军会在三年倒计时后出现，这给了各国在疫情爆发前充足的准备时间。"
 zombie_runner: "奔跑者菌株"
 zombie_runner_desc: "僵尸病毒的一种变异版本，速度更快，攻击性更强。奔跑者成群结队地移动，凭借速度和数量优势压倒防御。"
 zombie_runner_0: "奔跑者菌株"
 zombie_runner_0_desc: "僵尸病毒的一种变异版本，速度更快，攻击性更强。奔跑者成群结队地移动，凭借速度和数量优势压倒防御。"
 zombie_brute: "蛮力菌株"
 zombie_brute_desc: "一种高度变异的毒株，能产生体型更大、更具抵抗力的丧尸。这些蛮兽能承受巨大的伤害，并能突破防线。"
 zombie_brute_0: "蛮力菌株"
 zombie_brute_0_desc: "一种高度变异的毒株，能产生体型更大、更具抵抗力的丧尸。这些蛮兽能承受巨大的伤害，并能突破防线。"
 zombie.12.t: "病毒蔓延至尼日利亚"
 zombie.12.d: "瘟疫已席卷整个非洲大陆。几内亚湾沿岸的港口城市报​​告了大量伤亡，感染者从沿海地区涌向内陆。尼日利亚庞大的人口和密集的城市中心使其成为这场灾难蔓延的温床 - 西非或许将从此面目全非。"
 zombie.12.a: "承认威胁"
 zombie.13.t: "病毒蔓延至巴西"
 zombie.13.d: "亚马逊雨林未能阻挡病毒传播。感染同时在圣保罗和里约热内卢爆发，并以惊人的速度席卷南美洲最大的几个城市。数百万惊慌失措的民众涌上通往内陆的高速公路，却在不知不觉中将病毒带入了他们的旅途。"
 zombie.13.a: "承认威胁"
 zombie.14.t: "病毒蔓延至土耳其"
 zombie.14.d: "土耳其横跨欧亚两大洲，成为东欧疫情与欧洲之间的桥梁。伊斯坦布尔和安卡拉爆发疫情，当局竭力控制疫情，但事态已迅速失控。博斯普鲁斯海峡，曾经是连接的象征，如今却只剩下死亡。"
 zombie.14.a: "承认威胁"
 zombie.15.t: "部落进化"
 zombie.15.d: "病毒正在变异。侦察兵报告说，我们队伍中出现了一种新型感染者 - 速度更快、更凶残、成群结队行动的变种，以及体型更大、更具抵抗力、能抵挡轻武器射击的个体。这群感染者日益危险。"
 zombie.15.a: "承认进化"
 ZOM_cure_developed: "僵尸解药原型"
 ZOM_cure_developed_desc: "我们的科学家已经研制出一种针对丧尸病毒的实验性疫苗。这种疫苗通过联盟的供应链分发，使所有与丧尸作战的部队都获得了显著的战斗优势。"
 ZOM_research_cure: "研发治疗方法"
 ZOM_research_cure_desc: "人类有史以来面临的最大威胁需要我们投入最强大的科学力量。通过汇集资源和专业知识，我们或许能够研发出扭转战局的解药或疫苗。任务完成后，所有与丧尸大军作战的国家都将获得战斗加成。"
 ZOM_establish_safe_zones: "建立安全区"
 ZOM_establish_safe_zones_desc: "划定并加强平民安全区，以保护非战斗人员并维护公共秩序。建立有序的疏散通道和加固的避难所，将有助于争取时间并稳定后方局势。"
 ZOM_develop_a_cure: "研发治疗方法"
 ZOM_develop_a_cure_desc: "筹集资金并完成研发解药决议。成功后，所有与僵尸大军作战的国家都将获得对抗亡灵的战斗加成。"
 ZOM_protect_civilian_population: "保护平民"
 ZOM_protect_civilian_population_desc: "保持60%以上的稳定性，以确保平民安全和社会和谐。"
 ZOM_global_mobilization: "全球总动员"
 ZOM_global_mobilization_desc: "将反僵尸联盟的成员国数量扩大到至少8个。"
 ZOM_defeat_the_zombie_horde: "击败僵尸部落"
 ZOM_defeat_the_zombie_horde_desc: "消灭僵尸部落，终结其对人类的威胁。"
 the_horde_spreads: "部落蔓延"
 ZOM_apocalypse_countdown_1yr: "疫情爆发"
 ZOM_apocalypse_countdown_1yr_desc: "全球各地不断涌现关于一种神秘病原体的报道。情报机构估计，疫情还需要一年时间才会失控。"
 ZOM_apocalypse_countdown_2yr: "疫情爆发"
 ZOM_apocalypse_countdown_2yr_desc: "来自偏远地区的令人不安的报告描述了一种前所未见的病原体。专家认为，我们只有两年的时间来做好准备，以防它达到临界规模。"
 ZOM_apocalypse_countdown_3yr: "疫情爆发"
 ZOM_apocalypse_countdown_3yr_desc: "据报道，已出现零星的无法解释的暴力事件和复活现象。科学家估计，病毒还需要三年时间才会变异成最终的、无法阻止的形式。"
 zombie_capitulation.1.t: "红龙沉沦"
 zombie_capitulation.1.d: "地球上人口最多的国家已经沦陷。中国庞大的军队、长城、十亿人口 - 这一切都无济于事。北京在几天内陷落，上海在几小时内沦陷。中国城市的人口密度之高，使它们变成了屠宰场，如今超过十亿的尸体在部落的旗帜下行进。如果连中国都无法守住阵地，我们其他人还有什么希望？"
 zombie_capitulation.1.a: "接受损失"
 zombie_capitulation.1.b: "准备最坏的打算"
 zombie_capitulation.2.t: "俄罗斯沦陷"
 zombie_capitulation.2.d: "地球上面积最大的国家已沦陷于亡灵瘟疫。俄罗斯无垠的冰冻苔原和茂密森林，曾被认为是抵御亡灵大军的天然堡垒，但面对一个不知寒冷、不知疲倦、永不停歇的敌人，却毫无作用。莫斯科的防线崩溃了，克里姆林宫一片寂静。如今，亡灵大军的疆域从欧洲一直延伸到太平洋。"
 zombie_capitulation.2.a: "接受损失"
 zombie_capitulation.2.b: "准备最坏的打算"
 zombie_capitulation.3.t: "美国沦陷"
 zombie_capitulation.3.d: "最后一个超级大国也陨落了。美国，即便拥有强大的军事力量、核武库和横亘在外的海洋，也无法阻止这股浪潮。东海岸率先沦陷，随后是腹地，最后落基山脉的残余势力也彻底沉寂。星条旗不再飘扬在华盛顿上空。对许多人来说，这标志着人类文明的真正终结。"
 zombie_capitulation.3.a: "接受损失"
 zombie_capitulation.3.b: "准备最坏的打算"
 zombie_countdown_decision_category: "丧尸末日倒计时"
 zombie_countdown_decision_category_desc: ""
 zombie_coalition_decision_category: "部落决议"
 zombie_coalition_decision_category_desc: ""
 zombie.8.d.africa: "死者行走于世。丧尸大军已在中非爆发，正通过感染和直接捕食迅速吞噬着我们的人口。专家将这场冲突命名为“爆发”，但人类的生存之战才刚刚开始。绝望的国家已经开始关闭边境。"
 zombie.8.d.east_asia: "死者行走于世。丧尸大军已在朝鲜半岛出现，正通过感染和直接捕食迅速吞噬着我们的人口。专家将这场冲突命名为“爆发”，但人类的生存之战才刚刚开始。绝望的国家已经开始关闭边境。"
 zombie.8.d.multiple: "死者行走于世。丧尸大军同时席卷三大洲 - 印度、中非和朝鲜半岛接连遭受重创 - 通过感染和直接捕食迅速吞噬着人类。专家将这场冲突命名为“爆发”，但人类的生存之战才刚刚开始。绝望的国家已经开始关闭边境。"
 zombie_capitulation.4.t: "爆发结束"
 zombie_capitulation.4.d: "出乎所有人意料，人类最终取得了胜利。丧尸群已被击溃 - 它们的领地被解放，它们的尸群被摧毁，最后的感染者也已长眠。饱受末日蹂躏的城市开始了漫长的重建之路。世界已然改变，但它依然存在。"
 zombie_capitulation.4.a: "人类永存"