l_japanese:
 CMW_focus: "Commonwealth Focus tree"
 Commonwealth_member_modifier: "英連邦加盟国"
 CMW_Aso_Rock_Declaration: "アソ・ロック宣言"
 CMW_Aso_Rock_Declaration_desc: "英連邦アソ・ロック宣言は、2003年にナイジェリアのアブジャで開催された英連邦首脳会議（CHOGM）で発出された重要な声明である。この宣言は、民主主義、良い統治、人権、そして持続可能な経済発展の促進に対する英連邦のコミットメントを再確認した。さらに、世界的課題に効果的に対処するため、加盟国間の相互尊重、包摂性、協力の重要性を強調した。"
 CMW_of_Learning: "英連邦学習機構"
 CMW_of_Learning_desc: "英連邦の政府間組織であり、カナダのメトロバンクーバーに拠点を置く英連邦学習機構は、英連邦内のさまざまな提携先や国際開発機関と連携し、オープンラーニングと遠隔教育の推進に取り組んでいる。"
 CMW_New_Petroleum_Group: "石油生産国協議グループ"
 CMW_New_Petroleum_Group_desc: "新石油生産国協議グループは、新興の産油国が石油産業の発展に関する知見と戦略を共有するための協力的な枠組みである。"
 CMW_Hub_And_Spokes_Program: "ハブ・アンド・スポーク通商計画"
 CMW_Hub_And_Spokes_Program_desc: "ハブ・アンド・スポーク通商計画は、複数国間の貿易連携を促進する取り組みであり、特に能力構築と貿易関連の開発支援に重点を置いている。"
 CMW_Leaving_The_Organisation: "英連邦からの離脱"
 CMW_Leaving_The_Organisation_desc: "英連邦からの離脱決定は、国際関係における重要な転換点となる。この動きは、外交政策の戦略的な再編を反映しており、伝統的な同盟関係よりも国家主権と独立を優先する姿勢を示している。英連邦からの離脱により、[ROOT.GetNamewithFlag]は新たなパートナーシップを構築し、国際情勢においてより自律的な道を歩むことを目指している。"
 CMW_Charter: "英連邦憲章"
 CMW_Charter_desc: "英連邦憲章は、人権、持続可能な開発、法の支配にコミットする54の加盟国から成る英連邦の、共有された価値観と原則を定めた文書である。"
 CMW_Ministerial_Action_Group: "閣僚行動グループ"
 CMW_Ministerial_Action_Group_desc: "英連邦閣僚行動グループは、英連邦加盟国の閣僚で構成される機関であり、英連邦の価値を維持するため、加盟国における統治および政治的発展に関する問題に対処し、行動を取る責任を担っている。"
 CMW_Kampala_Review: "カンパラ・レビュー"
 CMW_Kampala_Review_desc: "2007年の英連邦首脳会議（CHOGM）で行われたカンパラ・レビューは、民主主義、開発、良い統治の促進における英連邦の有効性を評価し、強化することを目的としていた。このレビューは、現代の世界的課題に対処するための同組織の能力強化に重点を置き、その価値観と目標がすべての加盟国にとって引き続き妥当性と影響力を持つことを確かなものにしようとした。"
 CMW_Anti_Corruption_Centre: "英連邦アフリカ反腐敗センター"
 CMW_Anti_Corruption_Centre_desc: "英連邦アフリカ反腐敗センターは、アフリカの英連邦加盟国における腐敗に対処し、これと闘うために英連邦内に設立された機関であり、透明性と良い統治の促進を目的としている。"
 CMW_Association_Legislative_Council: "立法顧問協会"
 CMW_Association_Legislative_Council_desc: "英連邦立法顧問協会は、英連邦加盟国における立法府や議会に助言と支援を提供する法務専門家を結集する組織である。立法顧問の間で協力と専門知識の共有を促進する。"
 CMW_Connectivity_Agenda: "英連邦連結性アジェンダ"
 CMW_Connectivity_Agenda_desc: "英連邦連結性アジェンダは、各国が貿易と投資に関する最良の実践や経験を共有し、国内改革を進めるための枠組みである。"
 CMW_Parliament: "英連邦議会"
 CMW_Parliament_tt: "§H英連邦§!のすべての加盟国は、自国における選挙の実施を認めている"
 CMW_Legal_Education_Association: "英連邦法学教育協会"
 CMW_Legal_Education_Association_desc: "英連邦法学教育協会は、英連邦加盟国間における法学教育と協力を促進する組織である。"
 CMW_Fintech_Toolkit: "英連邦フィンテック・ツールキット"
 CMW_Fintech_Toolkit_desc: "英連邦フィンテック・ツールキットは、英連邦加盟国における金融技術の発展と革新を支援するために設計されたリソースである。"
 CMW_CFTC: "英連邦技術協力基金"
 CMW_CFTC_desc: "英連邦技術協力基金（CFTC）は、英連邦加盟国が開発のための技術協力事業および施策を実施するのを支援する財政的枠組みである。"
 CMW_School_Leaders: "事務局専門職基準"
 CMW_School_Leaders_desc: "事務局の教師および学校指導者のための専門職基準枠組みは、事務局の管轄下にある教育者および学校指導者の専門的成長と業績を向上させるために設計された指針と基準の体系である。"
 CMW_Trade_Association: "英連邦通商協会"
 CMW_Trade_Association_desc: "英連邦通商協会（CTA）は、加盟国間の経済協力と通商関係の強化を目的としている。より統合的かつ協調的な通商環境を促進することで、CTAは関税の引き下げ、通関手続きの簡素化、そして持続可能な経済成長の促進を目指す。"
 CMW_Joint_Research_Initiative: "英連邦共同研究イニシアティブ"
 CMW_Joint_Research_Initiative_desc: "英連邦共同研究イニシアティブは、加盟国間における科学技術革新を前進させるための共同の取り組みである。このイニシアティブは、気候変動、医療、持続可能な開発といった共通課題に対処するため、知識、資源、専門性の共有を促進する。研究機関と専門家のネットワークを育成することで、英連邦はすべての加盟国の共同利益のために進歩と革新を推進することを目指している。"
 CMW_Valuta: "コモの導入"
 CMW_Valuta_desc: "コモの導入は、英連邦内における経済統合に向けた歴史的な一歩を示す。この共通通貨は、貿易を円滑化し、金融の安定性を高め、加盟国間の経済協力を促進することを目的として設計されている。英連邦はコモを採用することで、為替交換の障壁を低減し、地域経済を安定させ、より統一された経済共同体を育成することを目指している。"
 CMW_Promoting_Democracy: "イデオロギーの促進"
 CMW_Promoting_Democracy_desc: "我々は英連邦を英国に歩調を合わせる形へと導き、世界における我々の外交力を高める。"
 CMW_Counter_Insurgency_Training: "英連邦対反乱作戦の日"
 CMW_Counter_Insurgency_Training_desc: "英連邦対反乱訓練は、英連邦加盟国が反乱の脅威に効果的に対処し、それを軽減する能力を強化することを目的とした取り組みである。これは、各国が国内の安全保障上の課題を管理し、対応するのを支援するために、専門的な訓練、資源、専門知識を提供し、それによって安定と平和を促進する。"
 CMW_Cyber_Declaration: "英連邦・サイバー宣言計画"
 CMW_Cyber_Declaration_desc: "英連邦・サイバー宣言計画は、サイバーセキュリティ上の問題への対処と、英連邦加盟国間の協力の促進に重点を置き、デジタル上の安全を強化し、サイバー上の脅威から保護することを目的とした取り組みである。"
 CMW_Intelligence_Network: "英連邦情報網"
 CMW_Intelligence_Network_desc: "新設された英連邦情報局（CIA）が主導する英連邦情報網（CIN）の形成は、加盟国間の安全保障と情報共有を強化することを目的としている。このネットワークは、重要情報の交換、共同の防諜作戦、そして世界的脅威に対する統一的対応を促進する。情報協力を強化することで、英連邦は加盟国を諜報活動、テロリズム、サイバー上の脅威から守ろうとしている。"
 CMW_Patrol_Boat_Program: "英連邦哨戒艇計画"
 CMW_Patrol_Boat_Program_desc: "英連邦哨戒艇計画は、英連邦加盟国による海上哨戒艇の共同開発と配備を伴う戦略的取り組みである。これらの艦艇は、海上安全保障の強化、領海の保護、各種海軍任務の支援を目的として設計されており、それによって英連邦地域の安全と安定に寄与する。"
 CMW_Chief_Of_Staff: "英連邦参謀総長"
 CMW_Chief_Of_Staff_desc: "英連邦参謀総長は、英連邦加盟国における軍事作戦と戦略の監督および調整を担う高位の役職である。この役割は、英連邦の安全保障と防衛を確保するとともに、平和と安定を維持するため、軍事力の協力と即応態勢を促進するうえで重要な役割を果たす。"
 CMW_Secretariat_CVE: "事務局暴力的過激主義対策部門"
 CMW_Secretariat_CVE_desc: "英連邦事務局暴力的過激主義対策部門（CVE Unit）は、英連邦事務局内の専門部門であり、過激化の防止と平和および安定の促進に重点を置きつつ、英連邦加盟国内における暴力的過激主義への対処と対抗を担っている。"
 CMW_Offices_For_Peace: "英連邦平和事務所"
 CMW_Offices_For_Peace_desc: "英連邦平和事務所（COP）の設立は、世界平和と紛争解決に対する英連邦の関与を示している。加盟国内の主要地域に設置されるこれらの事務所は、紛争の仲介、外交の促進、そして平和構築の取り組みの支援に取り組む。"
 CMW_Academy: "英連邦士官学校"
 CMW_Academy_desc: "英連邦士官学校（CMA）は、全加盟国の要員に高度な軍事訓練と教育を提供するために設立された。この機関は、軍将校の専門技能、戦略的知識、指導能力を強化することを目的としている。共通の訓練基準を促進し、協力の精神を育むことで、CMAは英連邦の集団的防衛能力を強化する。"
 CMW_Training_Day: "世界領土訓練"
 CMW_Training_Day_desc: "世界領土訓練は、各国が領土および国境に関する問題を管理するための備えと能力を向上させることを目的とした世界的計画である。この取り組みは、地理的境界の理解と管理を強化するための訓練と資源を提供し、各国が国境紛争に対処し、平和的共存を促進し、世界的な領土の安定を育むことを支援する。"
 CMW_Defense_Treaty: "英連邦防衛条約"
 CMW_Defense_Treaty_desc: "英連邦防衛条約は、相互防衛上の関与と義務を定める、英連邦加盟国間の重要な国際協定である。この条約は集団安全保障の枠組みとして機能し、加盟国は外部からの脅威や侵略の際に相互に支援することを誓約することで、英連邦内の全署名国の安全と主権を守るという関与を強化する。"
 CMW_New_CMW: "新たな英連邦"
 CMW_New_CMW_desc: "一連の包括的改革を経て、英連邦は再活性化され、新たな世界的課題に立ち向かう備えを整えた。これらの改革は統治構造を近代化し、意思決定過程を合理化し、民主主義、開発、人権といった中核的価値へのコミットメントを強化した。新たな英連邦は今や、加盟国を協力、包摂性、強靭性の新時代へと導く態勢を整えており、21世紀の複雑な課題に取り組む準備ができている。"
 CMW_Education_Framework: "英連邦教育枠組み"
 CMW_Education_Framework_desc: "英連邦教育枠組みは、英連邦加盟国における教育政策と実践を導くための包括的な体系である。"
 CMW_Debt_Swaps: "英連邦債務スワップ"
 CMW_Debt_Swaps_desc: "英連邦債務スワップとは、加盟国が抱える経済的・財政的課題に対処する手段として、英連邦内で行われる債務の交換または再編に関する金融上の合意または取り組みを指す。"
 CMW_Climate_Hub: "英連邦気候資金アクセス・ハブ"
 CMW_Climate_Hub_desc: "英連邦気候資金アクセス・ハブは、気候資金へのアクセスを促進し、加盟国が気候変動および持続可能性関連の取り組みに対処するのを支援するため、英連邦内に設立された枠組みである。"
 CMW_Blue_Charter: "英連邦ブルー憲章"
 CMW_Blue_Charter_desc: "英連邦ブルー憲章は、世界の海洋および海洋環境の健全性と持続可能性を守り、改善するために、英連邦加盟国が協力して取り組むというコミットメントである。"
 CMW_Living_Lands: "リビング・ランズ憲章"
 CMW_Living_Lands_desc: "リビング・ランズ憲章は、英連邦によって採択された画期的な環境イニシアティブである。この憲章は、加盟国に対し、持続可能な土地管理の実践、生物多様性の保全、そして気候変動への対抗に取り組むことを求めている。再植林、土壌回復、自然生息地の保護を推進することにより、英連邦は将来の世代が健全で強靭な環境を受け継げるようにすることを目指している。"
 CMW_Health_Section: "事務局保健部門"
 CMW_Health_Section_desc: "英連邦事務局の保健部門は、英連邦事務局内の部門であり、医療、公衆衛生、ならびに英連邦内における保健政策および保健計画の策定に関する事項について、英連邦加盟国に支援と指針を提供する責任を担っている。また、加盟国間における保健分野の協力促進と最良の実践の共有においても役割を果たしている。"
 CMW_Body_And_Sports: "英連邦スポーツ諮問機関"
 CMW_Body_And_Sports_desc: "英連邦スポーツ諮問機関は、スポーツを通じた社会開発、健康、福祉の促進に重点を置きつつ、英連邦加盟国に対してスポーツ関連の政策および計画に関する助言と指針を提供する委員会である。"
 CMW_Youth_Networks: "英連邦青年ネットワーク"
 CMW_Youth_Networks_desc: "英連邦青年ネットワークは、英連邦加盟国の若者たちの間で協力、情報共有、共同行動を促進する、英連邦内の若者重視の団体または組織である。これらのネットワークはしばしば、教育、雇用、社会開発といった若者に関わる課題に取り組む。"
 CMW_Defense_Association: "英連邦防衛協会"
 CMW_Defense_Association_desc: "英連邦防衛協会は、加盟国の共同防衛能力と安全保障の強化に重点を置く、英連邦加盟国による協力的な連合体である。この同盟は、相互支援、戦略的調整、そして英連邦共同体内における平和と安定の共同追求のための基盤として機能する。"
 CMW_Leaving.1.t: "[FROM.GetName] has leaves the Commonwealth of Nations"
 CMW_Leaving.1.d: "[FROM.GetName] has officially announced its departure from the Commonwealth of Nations. This decision marks a significant shift in its foreign policy, reflecting a desire for greater autonomy and new international alliances. The departure may impact diplomatic relations and economic ties within the Commonwealth, presenting new challenges and opportunities for both the departing nation and remaining member states."
 CMW_Leaving.1.a: "幸運を祈る"
 Commonwealth_allies_tech_share_name: "英連邦教育枠組み"
 Commonwealth_allies_tech_share_desc: "英連邦教育枠組みは、加盟国全体にわたる教育基準と教育実践に対する統一的なアプローチを確立する。"
 CMW_Patrol_Boat_Program_Member: "英連邦哨戒艇計画"
 CMW_Patrol_Boat_Program_Leader: "英連邦哨戒艇計画の開始者"
 Commonwealth_member_modifier_desc: "英連邦諸国の一員として、わが国は他の加盟国との強固な外交関係と経済協力の恩恵を受けている。この歴史ある連合は、相互支援と価値観の共有に基づくネットワークをもたらし、わが国の国際的地位と貿易機会を高めている。しかしその一方で、自国の主権と英連邦全体の利益との均衡を取ることは、ときに外交上および政治上の課題を招くこともある。"
 CMW_Parliament_desc: "英連邦議会の設立は、加盟国間の政治的統合と協力の強化に向けた重要な一歩となる。この立法機関は、対話を促進し、民主主義的価値観を推進し、英連邦政策の実施を監督することを目的としている。また、すべての加盟国の代表者が共通の課題について議論し、解決策を講じるためのプラットフォームとして機能し、結束と共同行動を促進する。"