 mercosur.110.t: "MERCOSUR Democratic Clause Review"
 mercosur.110.d: "What has unfolded in [FROM.GetName] can no longer be dismissed as a domestic matter with only domestic meaning. A grave political turn there has cast doubt on whether open competition and constitutional restraint still carry any weight in that country. Around the bloc, ministers and diplomats are openly asking whether MERCOSUR's democratic clause is a serious commitment or merely ceremonial language. We must decide whether [FROM.GetName] is to be suspended, or whether the bloc will tolerate this turn for the sake of keeping the South American market intact."
 mercosur.110.a: "The clause must be enforced."
 mercosur.110.b: "Grant one last reprieve."
 mercosur.112.t: "MERCOSUR Suspends Our Status"
 mercosur.112.d: "The verdict from the bloc has arrived, and it is unmistakable. MERCOSUR has judged that our latest course crossed the line laid down by its democratic clause, and the price is now being collected in our place inside the institution. South America has not turned its back on us forever, but it has chosen to mark this moment as one that could not pass unanswered."
 mercosur.112.a: "The consequences are real."
 mercosur.113.t: "MERCOSUR Grants a Conditional Reprieve"
 mercosur.113.d: "MERCOSUR has chosen not to suspend us outright, but neither has it offered absolution. We remain within the bloc under a visible cloud of mistrust, and every capital in the region will understand that our continued place in the South American market now rests on probation rather than confidence."
 mercosur.113.a: "We remain under scrutiny."
 mercosur.114.t: "MERCOSUR Suspends a Member"
 mercosur.114.d: "After a grave political turn in [FROM.GetName], the debate inside MERCOSUR has ended with a hard decision. The bloc has invoked its democratic clause and suspended [FROM.GetName]'s standing, signaling that the South American market is still willing to defend the political terms on which it claims to rest."
 mercosur.114.a: "The bloc draws a line."
 mercosur.115.t: "MERCOSUR Keeps the Door Ajar"
 mercosur.115.d: "Following a serious political shift in [FROM.GetName], MERCOSUR has stopped short of suspension, but the decision was no endorsement. The bloc chose to preserve unity for now while placing [FROM.GetName] under a visible warning, ensuring that the question of democratic legitimacy will continue to shadow its place in the institution."
 mercosur.115.a: "A narrow reprieve."
 mercosur.117.t: "UNASUL Democratic Clause Review"
 mercosur.117.d: "The latest developments in [FROM.GetName] have spread far beyond one capital's internal argument. A grave political turn there has raised doubts across the continent about whether democratic life in that country is being narrowed by force or design. Across UNASUL, the question is now whether the organization was built to defend democratic commitments or only to speak of them when convenient. We must choose whether [FROM.GetName] should be suspended from the South American framework, or whether the project is better served by keeping it inside under warning."
 mercosur.117.a: "Suspend them from the framework."
 mercosur.117.b: "Keep them inside, but under censure."
 mercosur.119.t: "UNASUL Suspends Our Status"
 mercosur.119.d: "UNASUL has delivered its judgment, and the message is one of distance rather than solidarity. The organization has concluded that our recent course cannot be reconciled with its democratic clause, and our place inside the South American framework has been suspended accordingly. What was meant to symbolize continental convergence has instead become a reminder that regional legitimacy still has limits."
 mercosur.119.a: "The blow lands."
 mercosur.120.t: "UNASUL Leaves Us on Probation"
 mercosur.120.d: "UNASUL has chosen not to suspend us outright, but the decision offers little comfort. We remain within the framework only under visible censure, and the capitals of South America will read that choice as a warning that our place in the project is now conditional rather than trusted."
 mercosur.120.a: "A stay, not an acquittal."
 mercosur.121.t: "UNASUL Suspends a Member"
 mercosur.121.d: "After reviewing the grave political turn in [FROM.GetName], UNASUL has chosen to invoke its democratic clause and suspend that country's standing in the organization. The decision underlines that South American unity still claims a political foundation, and that some breaches are severe enough to force the issue into the open."
 mercosur.121.a: "The framework hardens."
 mercosur.122.t: "UNASUL Grants a Reprieve"
 mercosur.122.d: "After a grave political turn in [FROM.GetName], UNASUL has decided not to suspend the country for now. Even so, the outcome is far from a clean endorsement: the organization chose unity over rupture, while making clear that [FROM.GetName]'s place in the South American project will remain under suspicion."
 mercosur.122.a: "The warning stands."
