 USoE.Neutral_conservatism: "£EU_parl_PG_party_14 (UEN) 欧州諸国同盟"
 USoE.Neutral_conservatism_icon: "£EU_parl_PG_party_14"
 USoE.Neutral_conservatism_desc: "(Neutral Conservatism) - Union for Europe of the Nations (UEN)\n\nThe UEN, formerly known as 'Union for Europe', is a right-wing eurosceptic conservative party. It seeks to decentralize the USoE and form a confederation of sovereign Nations in its place. It has a conservative stance on social rights and it supports a free market capitalist system economically."
 USoE.Neutral_conservatism_2017: "£EU_parliament_PG_2017_Neutral_conservatism (ACRE) 欧州保守改革同盟"
 USoE.Neutral_conservatism_2017_icon: "£EU_parliament_PG_2017_Neutral_conservatism"
 USoE.Neutral_conservatism_2017_desc: "(Neutral Conservatism) - Alliance of Conservatives and Reformists in Europe (ACRE)\n\nThe Alliance of Conservatives Reformists in Europe (ACRE), formerly known as 'Alliance of European Conservatives and Reformists', is a right-wing eurosceptic conservative party. It seeks to decentralize the USoE and form a confederation of sovereign Nations in its place. It has a conservative stance on social rights and it supports a free market capitalist system economically."
 USoE.oligarchism: "£EU_parl_PG_party_15 (AoO) 寡頭制同盟"
 USoE.oligarchism_icon: "£EU_parl_PG_party_15"
 USoE.oligarchism_desc: "寡頭主義 - 寡頭制同盟 (AoO)\n\n"
 USoE.Neutral_Libertarian: "£EU_parl_PG_party_16 (AoL) リバタリアン同盟"
 USoE.Neutral_Libertarian_icon: "£EU_parl_PG_party_16"
 USoE.Neutral_Libertarian_desc: "リバタリアン - リバタリアン同盟 (AoL)\n\nリバタリアン同盟は、経済や個人の生活選択に対する政府の介入を最小限に留めることを支持するリバタリアン政党であり、政府の役割は、企業や個人が自由に活躍できる安全な環境を提供することにあると主張している。同党の政治的課題は、直接民主主義、表現の自由、著作権といった分野において、インターネットの利点を最大限に活用することに重点を置いている。 "
 USoE.Neutral_Libertarian_2017: "£EU_parliament_PG_2017_Neutral_Libertarian (PPEU) 欧州海賊党"
 USoE.Neutral_Libertarian_2017_icon: "£EU_parliament_PG_2017_Neutral_Libertarian"
 USoE.Neutral_Libertarian_2017_desc: "リバタリアン - 欧州海賊党 (PPEU)\n\n欧州海賊党は、経済や個人の生活選択に対する政府の介入を最小限に留めることを支持するリバタリアン政党であり、政府の役割は、企業や個人が自由に活躍できる安全な環境を提供することにあると主張している。同党の政治的課題は、直接民主主義、表現の自由、著作権といった分野において、インターネットの利点を最大限に活用することに重点を置いている。"
 USoE.Neutral_green: "£EU_parl_PG_party_17 (Greens/EFA) 欧州緑グループ・欧州自由連盟"
 USoE.Neutral_green_icon: "£EU_parl_PG_party_17"
 USoE.Neutral_green_desc: "緑の党 - 欧州緑グループ・欧州自由連盟（Greens/EFA）\n\n欧州緑グループ・欧州自由連盟は、左派政党であり、その経済観は資本主義と絶え間ない成長の追求を否定し、代わりに「幸福な脱成長」の必要性を信じるものである。クリーンエネルギー源としての原子力発電には強く反対し、将来の完全な再生可能エネルギーへの移行を支えるために、一時的にガス火力発電所を建設する必要性を主張している。その政治的アジェンダは不平等の是正と環境保護に焦点を当てており、巨額の赤字財政による公共支出によってこれを実現することを目指している。"
 USoE.Neutral_green_2017: "£EU_parliament_PG_2017_Neutral_green (EGP) 欧州緑の党"
 USoE.Neutral_green_2017_icon: "£EU_parliament_PG_2017_Neutral_green"
 USoE.Neutral_green_2017_desc: "緑の党 - 欧州緑の党（EGP）\n\n欧州緑の党は、左派政党であり、その経済観は資本主義と絶え間ない成長の追求を否定し、代わりに「幸福な脱成長」の必要性を信じるものである。クリーンエネルギー源としての原子力発電には強く反対し、将来の完全な再生可能エネルギーへの移行を支えるために、一時的にガス火力発電所を建設する必要性を主張している。その政治的アジェンダは不平等の是正と環境保護に焦点を当てており、巨額の赤字財政による公共支出によってこれを実現することを目指している。 "
 USoE.neutral_Social: "£EU_parl_PG_party_18 (ASD) 社会民主同盟"
 USoE.neutral_Social_icon: "£EU_parl_PG_party_18"
 USoE.neutral_Social_desc: "(Non-Aligned Socialist Democrats) - Alliance of Socialist Democrats (ASD)\n\nThe Alliance of Socialist Democrats (ASD) is a left-wing party of the USoE Parliament, it advocates for a higher degree of democratic representation based on regional identity, aiming to shape the USoE into a 'Europe of Regions'. Its political agenda is focused on social justice and economical equality."
 USoE.neutral_Social_2017: "£EU_parliament_PG_2017_neutral_Social (EFA) 欧州自由連盟"
 USoE.neutral_Social_2017_icon: "£EU_parliament_PG_2017_neutral_Social"
 USoE.neutral_Social_2017_desc: "(Non-Aligned Socialist Democrats) - European Free Alliance (EFA)\n\nThe EFA is a left-wing party of the USoE Parliament, it advocates for a higher degree of democratic representation based on regional identity, aiming to shape the USoE into a 'Europe of Regions'. Its political agenda is focused on social justice and economical equality."
 USoE.Neutral_Communism: "£EU_parl_PG_party_19 (GUE/NGL) 欧州統一左派・北方緑の左派同盟"
 USoE.Neutral_Communism_icon: "£EU_parl_PG_party_19"
 USoE.Neutral_Communism_desc: "中道マルクス・レーニン主義 - 欧州統一左派・北方緑の左派同盟（GUE/NGL）\n\n欧州統一左派・北方緑の左派同盟は、USoE議会の左派政党である。主に社会主義者と共産主義者で構成されており、資本主義や従来の金融政策・財政政策を拒否している。社会主義への転換を目指しているが、その実現手段として改革と革命のどちらが最適かについては明確な立場をとっていない。アメリカとの協力には反対しており、代わりにヨーロッパは独自の道を歩むべきだと考えている。"
 USoE.Neutral_Communism_2017: "£EU_parliament_PG_2017_Neutral_Communism (PEL) 欧州左翼党"
 USoE.Neutral_Communism_2017_icon: "£EU_parliament_PG_2017_Neutral_Communism"
 USoE.Neutral_Communism_2017_desc: "中道マルクス・レーニン主義 - 欧州左翼党（PEL）\n\n欧州左翼党は、USoE議会の左派政党である。主に社会主義者と共産主義者で構成されており、資本主義や従来の金融政策・財政政策を拒否している。社会主義への転換を目指しているが、その実現手段として改革と革命のどちらが最適かについては明確な立場をとっていない。アメリカとの協力には反対しており、代わりにヨーロッパは独自の道を歩むべきだと考えている。"
 USoE.Nat_Populism: "£EU_parl_PG_party_20 (EDD) 民主主義と多様性のヨーロッパ"
 USoE.Nat_Populism_icon: "£EU_parl_PG_party_20"
 USoE.Nat_Populism_desc: "右派ポピュリズム - 民主主義と多様性のヨーロッパ（EDD）\n\n民主主義と多様性のヨーロッパは、USoE議会に所属するポピュリストかつユーロ懐疑主義の政党である。同党は統合プロセスに強く反対し、その撤回を目指している。その政治的見解は、反移民・反グローバリゼーションの立場と、直接民主制の導入を主眼としている。"
 USoE.Nat_Populism_2017: "£EU_parliament_PG_2017_Nat_Populism (EFDD) 自由と直接民主主義のヨーロッパ"
 USoE.Nat_Populism_2017_icon: "£EU_parliament_PG_2017_Nat_Populism"
 USoE.Nat_Populism_2017_desc: "右派ポピュリズム - 自由と直接民主主義のヨーロッパ（EFDD）\n\n自由と直接民主主義のヨーロッパは、かつて「民主主義と多様性のヨーロッパ」として知られていた、USoE議会に所属するポピュリストかつユーロ懐疑主義の政党である。同党は統合プロセスに強く反対し、その撤回を目指している。その政治的見解は、反移民・反グローバリゼーションの立場と、直接民主制の導入を主眼としている。"
 USoE.Nat_Fascism: "£EU_parl_PG_party_21 (AoF) ファシスト同盟"
 USoE.Nat_Fascism_icon: "£EU_parl_PG_party_21"
 USoE.Nat_Fascism_desc: "ファシズム - ファシスト同盟 (AoF)\n\nファシスト同盟は、USoE議会の極右・反EU政党である。主にファシストや超国家主義者で構成されている。その政治的見解は、キリスト教の伝統の擁護、強硬な反移民政策、そして民主主義を強権的な独裁体制に置き換えることに重点を置いている。"
 USoE.Nat_Fascism_2017: "£EU_parliament_PG_2017_Nat_Fascism (APF) 平和と自由のための同盟"
 USoE.Nat_Fascism_2017_icon: "£EU_parliament_PG_2017_Nat_Fascism"
 USoE.Nat_Fascism_2017_desc: "ファシズム - 平和と自由のための同盟（APF）\n\n平和と自由のための同盟（APF）は、USoE議会の極右・反EU政党である。主にファシストや超国粋主義者で構成されている。その政治的見解は、キリスト教の伝統の擁護、強硬な反移民政策、そして民主主義を強権的な独裁体制に置き換えることに重点を置いている。"
 USoE.Nat_Autocracy: "£EU_parl_PG_party_22 (EUMS) 欧州連合軍事参謀本部"
 USoE.Nat_Autocracy_icon: "£EU_parl_PG_party_22"
 USoE.Nat_Autocracy_desc: "軍事政権 - 欧州連合軍事参謀本部（EUMS）\n\n欧州連合軍事参謀本部（EUMS）は、ヨーロッパ陸軍の政治部門であり、陸軍の高官たちが結集して軍事政権を樹立し、行政府の支配権を掌握して権威主義的な手法で権力を行使している組織である。"
 USoE.Monarchist: "£EU_parl_PG_party_23 (AoM) 王党派連合"
 USoE.Monarchist_icon: "£EU_parl_PG_party_23"
 USoE.Monarchist_desc: "絶対君主主義者 - 王党派連合 (AoM)\n\n君主主義者たちは、新たに即位した王朝を支持する。彼らは、21世紀を通して大陸を導くために、民主的な意思決定の束縛から解放された絶対的な支配者の必要性を信じている。"
