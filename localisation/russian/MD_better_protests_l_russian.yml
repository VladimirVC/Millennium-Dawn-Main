l_russian:
 expected_social_spending: "§CСоциальные расходы§!"
 expected_health_spending: "§CРасходы на медицину§!"
 expected_adm_spending: "§CАдминистративные расходы§!"
 expected_edu_spending: "§CРасходы на образование§!"
 expected_police_spending: "§CРасходы на полицию§!"
 expected_defence_spending: "§CРасходы на оборону§!"
 protests_main_text: "Приведенная ниже таблица показывает, чего граждане от вас ожидают и что вы в настоящее время финансируете. Пробелы, выделенные красным цветом, подпитывают протестный настрой; их устранение — самый прямой способ снизить напряженность.[fuel_protests_TT]\n"
 OPEN_PROTESTS_BUTTON: "Откройте §Yэкран системы §!протестов"
 OPEN_PROTESTS_BUTTON_TT: "Откройте панель §YСистемы протестов§!. Просмотрите источники ежемесячного изменения, текущие Силу протеста и Радикализацию, а также уровни расходов, которые граждане ожидают от вас."
 PROTEST_TITLE: "§YСистема Протестов§!"
 CLOSE_PROTEST_SCREEN: "Закрыть экран §Yсистемы протестов§!"
 expected_law_mechanic_tt: "§YЧтение таблицы расходов§!\n"
 EL_green_square_explanation_tt: "§GЗелёный§!: ожидаемые расходы, которые получает население. Каждый зелёный квадрат — это на одну причину меньше для граждан выходить на протесты."
 EL_blue_square_explanation_tt: "§BСиний§!: расходы выше того, что граждане ожидают в настоящее время. Требует денег каждый месяц, но не даёт дополнительного снижения протестов."
 EL_red_square_explanation_tt: "§RКрасный§!: ожидаемые расходы, которые мы §Rне можем§! обеспечить. Каждый красный квадрат усиливает строку §YВлияние расходов§! в разбивке изменений выше."
 EL_white_square_explanation_tt: "Белый: уровни законов, которые ни ожидаются, ни финансируются. Неактивны до тех пор, пока ожидания граждан не поднимутся достаточно высоко, чтобы потребовать их."
 expected_social_spending_tt: "Граждане ожидают определённый уровень §Yсоциальных расходов§!, установленный вашими законами, национальными духами, технологиями и ВВП на душу населения. Каждое целое число — это один уровень, ограниченный законами, доступными в этой категории.\n\n§YОжидаемый уровень:§! §Y[expected_social_spending_law_name]§! (сейчас [?expected_welfare_spending|0Y])\n\n§YРазбивка§!\nЗаконы, духи, технологии: [?ROOT.modifier@expected_welfare_modifier]\nВВП на душу населения: [calculate_gdp_c_modifier_welfare_spending]\n"
 expected_health_spending_tt: "Граждане ожидают определённый уровень §Yрасходов на здравоохранение§!, установленный вашими законами, национальными духами, технологиями и ВВП на душу населения. Каждое целое число — это один уровень, ограниченный законами, доступными в этой категории.\n\n§YОжидаемый уровень:§! §Y[expected_healthcare_spending_law_name]§! (сейчас [?expected_health_spending|0Y])\n\n§YРазбивка§!\nЗаконы, духи, технологии: [?ROOT.modifier@expected_healthcare_modifier]\nВВП на душу населения: [calculate_gdp_c_modifier_healthcare_spending]\n"
 expected_adm_spending_tt: "Граждане ожидают определённый уровень §Yадминистративных расходов§!, установленный вашими законами, национальными духами, технологиями и ВВП на душу населения. Каждое целое число — это один уровень, ограниченный законами, доступными в этой категории.\n\n§YОжидаемый уровень:§! §Y[expected_bureau_spending_law_name]§! (сейчас [?expected_adm_spending|0Y])\n\n§YРазбивка§!\nЗаконы, духи, технологии: [?ROOT.modifier@expected_adm_modifier]\nВВП на душу населения: [calculate_gdp_c_modifier_adm_spending]\n"
 expected_edu_spending_tt: "Граждане ожидают определённый уровень §Yрасходов на образование§!, установленный вашими законами, национальными духами, технологиями и ВВП на душу населения. Каждое целое число — это один уровень, ограниченный законами, доступными в этой категории.\n\n§YОжидаемый уровень:§! §Y[expected_education_spending_law_name]§! (сейчас [?expected_edu_spending|0Y])\n\n§YРазбивка§!\nЗаконы, духи, технологии: [?ROOT.modifier@expected_education_modifier]\nВВП на душу населения: [calculate_gdp_c_modifier_education_spending]\n"
 expected_police_spending_tt: "Граждане ожидают определённый уровень §Yрасходов на полицию§!, установленный вашими законами, национальными духами, технологиями и ВВП на душу населения. Каждое целое число — это один уровень, ограниченный законами, доступными в этой категории.\n\n§YОжидаемый уровень:§! §Y[expected_police_spending_law_name]§! (сейчас [?expected_police_spending|0Y])\n\n§YРазбивка§!\nЗаконы, духи, технологии: [?ROOT.modifier@expected_police_modifier]\nВВП на душу населения: [calculate_gdp_c_modifier_police_spending]\n"
 expected_defence_spending_tt: "Граждане ожидают определённый уровень §Yвоенных расходов§!, установленный вашими законами, национальными духами, технологиями и ВВП на душу населения. Каждое целое число — это один уровень, ограниченный законами, доступными в этой категории.\n\n§YОжидаемый уровень:§! §Y[expected_mil_spending_law_name]§! (сейчас [?expected_military_sp|0Y])\n\n§YРазбивка§!\nЗаконы, духи, технологии: [?ROOT.modifier@expected_mil_modifier]\nВВП на душу населения: [calculate_gdp_c_modifier_military_spending]\n"
 MD_protests_state_calm_text: "§GСпокойствие§!: нет активной миссии по подавлению беспорядков."
 MD_protests_state_calm_tt: "Нет активной миссии по предупреждению или подавлению восстания. Эта панель остаётся видимой, пока §YСила протестов§! превышает 20. Примите меры в ответ на растущее изменение до того, как разразится кризис."
 MD_protests_state_warning_text: "§YПредупреждение§!: формируется протестное движение."
 MD_protests_state_warning_tt: "Активна миссия §YНадвигающиеся протесты§!. Если истечёт её время, начнётся полноценное восстание. Завершите её, стабилизировав экономические и политические условия, вызвавшие предупреждение, или используйте §YУмиротворить протестующих§! и §YПревентивная реформа§!, чтобы выиграть время и снизить силу протеста."
 MD_protests_state_revolt_text: "§RВосстание§!: сопротивление в основных регионах."
 MD_protests_state_revolt_tt: "Активна миссия §YНадвигающееся восстание§!. Она завершится, когда §Yво всех основных регионах§! не будет сопротивления. Если истечёт её время, начнётся гражданская война. Используйте решения по умиротворению, подавлению и завоеванию умов и сердец, чтобы управлять ситуацией."
 MD_protests_state_cooldown_text: "§BПерезарядка§!: восстановление после кризиса."
 MD_protests_state_cooldown_tt: "Период восстановления после протестного кризиса. Новая протестная миссия не может начаться в течение §Y1000§! дней. Используйте передышку, чтобы пересмотреть расходы и восстановить стабильность, прежде чем давление вновь начнёт расти."
 MD_drift_diagnosed_text: "[MD_top_resistant_state_display]"
 MD_top_resistant_state_active: "§YХудший регион:§! [event_target:MD_top_resistant_state_scope.GetName] (§R[?MD_top_resistant_state_value|0]%§!)"
 MD_top_resistant_state_none: "§YХудший регион:§! §Gотсутствует§!"
 MD_drift_diagnosed_tt: "Основной регион с самым высоким уровнем §Yсопротивления§!. Направьте решения и гарнизон в этот регион, чтобы подавить сопротивление; миссия §YНадвигающееся восстание§! завершится только тогда, когда §Yв каждом§! основном регионе §Gне будет сопротивления§!.\n\nПоказывает §Gотсутствует§!, если ни в одном основном регионе нет активного сопротивления."
 MD_drift_header_text: "§YИсточники ежемесячного изменения§! (последний такт):"
 MD_drift_spending_row_text: "Влияние расходов: [MD_drift_spending_value_colored]"
 MD_drift_spending_value_red: "§R+[?drift_spending_last|1]§!"
 MD_drift_spending_value_green: "§G[?drift_spending_last|1]§!"
 MD_drift_spending_value_yellow: "§Y[?drift_spending_last|1]§!"
 MD_drift_spending_tt: "Граждане ожидают базового уровня расходов на социальное обеспечение, здравоохранение, образование, полицию, административные и военные нужды. Недофинансирование повышает силу протестов; избыточное финансирование ослабляет напряжённость, но истощает казну. Прямой бонус §R+1§! добавляется, когда заканчивается топливо.\n\nПовысьте законы, отмеченные красным на сетке расходов ниже, чтобы закрыть самые большие разрывы. §YУмиротворить протестующих§! и §YПревентивная реформа§! могут выиграть время, пока вы перебалансируете бюджет."
 MD_drift_stability_row_text: "Низкая стабильность + выборы: §R+[?drift_stability_last|1]§!"
 MD_drift_stability_tt: "Стабильность упала ниже §Y20%§!, а правительство всё ещё проводит выборы, поэтому избиратели выходят на улицы.\n\nПринимайте фокусы и события, повышающие стабильность, и приостановите дорогостоящие военные стройки, которые её снижают. §YОбещание: налоговые льготы для граждан§! добавляет фактор стабильности §G+5%§! на 300 дней, благодаря чему любое другое повышение стабильности действует быстрее. Невыборное правительство устраняет этот фактор напрямую, если ваш политический путь позволяет такой переход."
 MD_drift_interest_row_text: "Высокая процентная ставка: §R+[?drift_interest_last|1]§!"
 MD_drift_interest_tt: "Ключевая ставка центрального банка превышает §Y8,9%§!. Кредиты дорожают, предприятия увольняют сотрудников, и население винит правительство.\n\nСнизьте ставку во вкладке §YДеньги§!. Любое значение ниже §G8,9%§! устраняет этот фактор. Чем выше ставка над порогом, тем сильнее ежемесячный удар. Делайте повышения ставки короткими и используйте их только для борьбы с инфляцией."
 MD_drift_recession_row_text: "Рецессия: §R+[?drift_recession_last|1]§!"
 MD_drift_recession_tt: "Экономика находится в рецессии. Каждый месяц добавляет случайный удар, в среднем около §R+3§! к Силе протестов.\n\nУстранение идеи §Yрецессии§! через экономическую систему полностью убирает этот фактор. Следите за событиями восстановления на экономической панели и опирайтесь на §YУмиротворить протестующих§! и §YПревентивная реформа§!, чтобы пережить худший период."
 MD_drift_depression_row_text: "Депрессия: §R+[?drift_depression_last|1]§!"
 MD_drift_depression_tt: "Экономика находится в депрессии — худшем варианте рецессии. Каждый месяц добавляет случайный удар, в среднем около §R+4§! к Силе протестов, что примерно на треть хуже, чем при рецессии.\n\nУстранение идеи §Yдепрессии§! через экономическую систему убирает этот фактор. §YОбещание: налоговые льготы§! и §YОбещание: программа занятости§! снижают протестное давление, если вы сможете выполнить цели, в то время как §YУмиротворить протестующих§! и §YПревентивная реформа§! выигрывают время."
 MD_drift_war_row_text: "Военная усталость: §R+[?drift_war_last|1]§!"
 MD_drift_war_tt: "Мы находимся в состоянии войны уже более §Y36§! месяцев, и население истощено. Каждые дополнительные 24 месяца войны добавляют ещё §R+1§! в месяц. Четырёхлетняя война даёт §R+2§!, шестилетняя — §R+3§!, без предела.\n\nЗавершение войны немедленно обнуляет этот фактор. Если восстания уже начались, §YКампания за умы и сердца§! повышает лояльность, пока вы сворачиваете войну."
 MD_drift_corruption_row_text: "Слабость коалиции: §R+[?drift_corruption_last|1]§!"
 MD_drift_corruption_tt: "Сила правительственной коалиции ниже §Y30%§!, при этом активна идея коррупции или выборы приостановлены. Чем слабее коалиция, тем сильнее удар. При §Y10%§! силы коалиции это стоит §R+0,2§! в месяц, при §Y20%§! — §R+0,1§!.\n\nСнизьте уровень идеи коррупции с помощью антикоррупционных фокусов и событий. Укрепляйте поддержку коалиции через пакты по субидеологиям. Восстановление выборов полностью устраняет этот фактор. §YОбещание: налоговые льготы§! даёт §G+3%§! силы коалиции при успехе — полезно, когда стабильность уже растёт."
 MD_drift_ct_row_text: "Контртеррористическая политика: §R+[?drift_ct_last|1]§!"
 MD_drift_ct_tt: "Активны интернет-мониторинг или аресты протестующих. Эти меры подавления добавляют случайный ежемесячный удар, в среднем около §R+5§! к Силе протестов — самый жёсткий из случайных источников.\n\nЭто краткосрочные инструменты. Уберите идею КТ, как только активная миссия завершится, иначе потеря будет продолжаться бесконечно. Во время активного кризиса сочетание КТ с §YОбещание: экстренное финансирование полиции§! усиливает снижение роста сопротивления."
 MD_drift_passive_row_text: "Пассивное ослабление: §G[?drift_passive_last|1]§!"
 MD_drift_passive_tt: "Общественное внимание рассеивается. Каждый месяц есть §Y50%§! шанс на самостоятельное снижение Силы протестов на §G-2§!, что в среднем даёт около §G-12§! в год бесплатно.\n\nВыигрыш времени с помощью §YУмиротворить протестующих§! и §YПревентивная реформа§! позволяет пассивному ослаблению сделать большую часть работы."
 MD_drift_total_text: "§YИтог за прошлый месяц:§! [MD_drift_total_value_colored]"
 MD_protests_strength_readout_text: "§YСила:§! §Y[?protest_strength|0]§!§Y / 100   ·   Радикализация:§! §Y[?protest_radicalisation|0]§!§Y / 10§!"
 MD_protests_strength_readout_tt: "Два показателя, управляющих жизненным циклом протестов.\n\n§YСила протестов§! (сейчас [?protest_strength|0] / 100) отслеживает, насколько страна близка к кризису.\n\n§YПороги§!\nВыше §Y20§!: Диагностика беспорядков начинает окупаться.\nВыше §Y50§!: может начаться миссия Предупреждения.\nВыше §Y80§!: страна рискует полномасштабным Восстанием.\n\n§YКак меняется§!\nРастёт ежемесячно от активных источников изменения (см. разбивку выше).\nСнижается пассивно, когда ни один фактор не активен, а также от решений §YУмиротворить протестующих§!, §YПревентивная реформа§! и успешных миссий Обещаний.\n\n§YРадикализация протестов§! (сейчас [?protest_radicalisation|0] / 10) определяет, насколько серьёзными становятся кризисные события при их срабатывании. Она медленно растёт во время продолжительных протестов и снижается, когда страна восстанавливается."
 MD_drift_total_value_red: "§R+[?drift_total_last|1]§!"
 MD_drift_total_value_green: "§G[?drift_total_last|1]§!"
 MD_drift_total_value_yellow: "§Y[?drift_total_last|1]§!"
 MD_drift_total_tt: "Сумма всех активных источников изменения плюс пассивное ослабление. Положительное значение означает, что Сила протестов растёт; отрицательное — падает.\n\nЧтобы переломить итог в отрицательную сторону, нацельтесь на крупнейший фактор, показанный выше. §YПревентивная реформа§! и §YУмиротворить протестующих§! выигрывают время, пока действуют структурные меры.\n\nТри решения-§YОбещания§! ставят цель на срок от 200 до 350 дней. Успех даёт миссии Восстания больше времени; провал добавляет небольшой штраф за нарушенное обещание. §YОбещание: экстренное финансирование полиции§! длится 200 дней и требует снизить Силу протестов на §G10§!, давая миссии Восстания §G+75§! дней. §YОбещание: налоговые льготы§! длится 300 дней и требует поднять Стабильность на §G5%§!, давая §G+100§! дней. §YОбещание: программа занятости§! длится 350 дней и требует снизить безработицу на §G1,5%§!, давая §G+120§! дней."
 MD_protests_revolt_states_text: "§RОсновные регионы всё ещё сопротивляются:§! §Y[?cores_resisting_count|0]§!"
 MD_protests_revolt_states_tt: "Миссия §YНадвигающееся восстание§! завершится, когда это значение достигнет §G0§!. Каждый очаг сопротивления подавляется при лояльности > 50% и сопротивлении < 40% в этом регионе, что разрешается случайным образом через цепочку протестных событий."