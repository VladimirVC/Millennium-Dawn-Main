 EGY.Western_Autocracy_alt_desc: "実用的ナショナリズム - 国民未来党（国家の未来党、モスタクバル・ワタン）は、エジプトの政党である。同党は、アブデル・ファッタハ・エル＝シシ大統領とその政策を支持することのみを目的として設立された「権力政党」と見なされることが多い。同党はエジプト軍を支持しており、国家防衛のためのテロ対策において、エジプト国民は軍とエジプト国家警察の背後に団結すべきだと考えている。\n\nこの党に対する§H軍の評価§!は§G+50§!である"
 EGY.Communist-State_icon: "£EGY_Communist_State"
 EGY.Conservative_icon: "£EGY_Conservative"
 EGY.Autocracy: "£EGY_em_Autocracy 国民統一進歩党"
 EGY.Autocracy_icon: "£EGY_em_Autocracy"
 EGY.Autocracy_desc: "ナセル主義 - 国民統一進歩党は、エジプトのナセル主義的社会主義政党である。当初は国民統一進歩組織として知られ、与党であったアラブ社会主義連合（ASU）の左派として結成されたが、ASUの解散後に独立した政党となった。同党は、1952年のエジプト革命の原則を守る者であると自認しており、労働者、貧困層、その他の低所得層のために革命がもたらした社会的成果を覆そうとする動きに立ち向かうことを訴えている。\n\nこの党に対する§H軍の評価§!は§G+50§!である"
 EGY.anarchist_communism_icon: "£EGY_anarchist_communism"
