  ### Decisions ###
  #################
FAO_national_decisions: "Faroe National Decisions"
FAO_national_decisions_desc: "The Faroe islands has a very relaxed but also tense situation. Aside from the attempts of political leaders to do...well anything to develop the island and its population it also must contend with the ever pressing issue of eventual independence. Some want it now, some want to wait for better stable footing. Regardless it'll be up to both the Faroese people and Danish if the isle will truly be free in the end of it all."
FAO_decision_independence_war: "Independence War"
FAO_decision_independence_war_desc: "The time is upon us and the politicians have forced the hands of the people. War is declared and now its a race to see if Denmark can keep ahold of its crown or will the crown holding fall away as public pressure forces a peace between all parties."

