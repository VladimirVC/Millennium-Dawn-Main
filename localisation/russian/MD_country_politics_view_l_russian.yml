 HOLD_REELECTIONS_TT: "Будут проведены новые выборы через 14 дней. Из-за их внеочередного характера следующие после этого выборы всё равно пройдут в запланированную будущую дату.\n\n§YУсловие:§!\n[!hold_reelections_button_click_enabled]\n§YЭффекты:§!\n[!hold_reelections_button_click]"
