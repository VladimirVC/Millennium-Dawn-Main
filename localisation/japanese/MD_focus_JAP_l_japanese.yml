 JAP_diplomacy.11.t: "U.S. Request to Reinterpret Article 9"
 JAP_diplomacy.11.d: "The government of the United States has approached us with a formal request to further reinterpret Article 9 of our Constitution. Washington argues that the regional security environment has deteriorated to such an extent that Japan must assume a greater share of the collective defense burden. Accepting their request would open the door to a broader understanding of self-defense,and to closer military cooperation, but it will not be without domestic controversy."
 JAP_diplomacy.11.a: "Accept the U.S. request"
 JAP_diplomacy.11.b: "We cannot accept this request"
 JAP_diplomacy.12.t: "Japan Refuses to Reinterpret Article 9"
 JAP_diplomacy.12.d: "Tokyo has informed us that it is not prepared to further reinterpret Article 9 at this time. Concerns over domestic public opinion, constitutional constraints, and political stability have led the Japanese government to reject our request. We must now decide whether to respect their decision or increase diplomatic and security pressure."
 JAP_diplomacy.12.a: "We will respect their decision"
 JAP_diplomacy.12.b: "Increase pressure on Japan"
 JAP_diplomacy.13.t: "Japan Accepts to Reinterpret Article 9"
 JAP_diplomacy.13.d: "Tokyo has shared they are in favor of chaning the interpetation level of Article 9 and they will work to be a more active defense partner."
 JAP_diplomacy.13.a: "ようやくだ"
 JAP_diplomacy.14.t: "U.S. Pressure on Article 9"
 JAP_diplomacy.14.d: "Following our refusal to broaden the interpretation of Article 9, the United States has quietly begun to increase diplomatic and security pressure on our government. Alliance consultations, media briefings, and behind-the-scenes messages all point in the same direction: Washington expects Japan to shoulder more responsibility. We can stand firm or quietly shift our stance."
 JAP_diplomacy.14.a: "We will stand firm"
 JAP_diplomacy.14.b: "Quietly adjust our position"
 JAP_diplomacy.15.t: "Japan Accepts Under Pressure"
 JAP_diplomacy.15.d: "After a period of heightened diplomatic and strategic pressure, Tokyo has indicated that it is prepared to move closer to our position on Article 9. While publicly insisting that Japan's pacifist principles remain unchanged, the government has now broadened its self-defense interpretation in a manner that aligns with our expectations."
 JAP_diplomacy.15.a: "エクセレント"
 JAP_diplomacy.17.t: "U.S. Tariffs on Japanese Goods"
 JAP_diplomacy.17.d: "The United States has announced a new package of tariffs targeting key Japanese exports, citing economic imbalances and domestic political pressure. The measures are presented as a way to 'level the playing field,' but in Tokyo they are widely seen as a politically motivated move that will strain both our economy and the broader alliance."
 JAP_diplomacy.17.a: "We will have to adapt to this new reality"
 JAP_diplomacy.18.t: "Japan Requests Tariff Relief"
 JAP_diplomacy.18.d: "Tokyo has formally requested that we lift the tariffs imposed on Japanese goods. Japanese representatives hint that their government may be willing to deepen security cooperation and move further on defense policy in exchange. We must decide whether to turn this economic dispute into a strategic opportunity, or maintain the pressure."
 JAP_diplomacy.18.a: "Lift the tariffs in exchange for security concessions"
 JAP_diplomacy.18.b: "Refuse and keep the tariffs in place"
 JAP_diplomacy.19.t: "Tariffs Lifted, Security Concessions Demanded"
 JAP_diplomacy.19.d: "The United States has agreed to lift its tariffs on Japanese exports, but only as part of a broader understanding on security and defense. In practice, this means that Japan is expected to further broaden the interpretation of Article 9, deepening military cooperation with Washington and taking on a larger role in regional security."
 JAP_diplomacy.19.a: "For our economy and our alliance, we will accept this burden"
 JAP_diplomacy.20.t: "U.S. Refuses to Lift Tariffs"
 JAP_diplomacy.20.d: "Our formal request to lift the U.S. tariffs has been rejected. Washington insists that the measures will remain in place, citing domestic political pressures and unresolved disagreements over security policy. At home, frustration is growing among exporters and business leaders, while strategists warn that the dispute could further complicate our alliance."
 JAP_diplomacy.20.a: "We will have to endure the pressure for now"
 JAP_diplomacy.21.t: "Japan Requests Renewed Security Guarantees"
 JAP_diplomacy.21.d: "The Japanese government has formally requested renewed or strengthened security guarantees from the United States. Tokyo argues that the regional security environment has deteriorated and that a clearer U.S. commitment would help stabilize the situation. In private, Japanese officials acknowledge that further changes to the interpretation of Article 9 may be possible if Washington is prepared to make explicit commitments."
 JAP_diplomacy.21.a: "Restore our security guarantees in exchange for deeper commitments"
 JAP_diplomacy.21.b: "Refuse to extend our guarantees"
 JAP_diplomacy.22.t: "Security Guarantees Restored"
 JAP_diplomacy.22.d: "The United States has agreed to renew and clarify its security guarantees to Japan. In return, Washington expects Tokyo to take further steps in broadening the interpretation of Article 9 and assuming a greater share of regional security responsibilities. The alliance grows stronger, but the domestic debate over our pacifist principles will intensify."
 JAP_diplomacy.22.a: "For our security, we will accept this commitment"
 JAP_diplomacy.23.t: "U.S. Refuses Stronger Guarantees"
 JAP_diplomacy.23.d: "Our request for renewed or strengthened security guarantees has been rejected. The United States insists that existing arrangements are sufficient and that domestic political constraints limit any further commitments. Within Japan, this refusal will fuel concerns about our long-term security and the reliability of our alliance."
 JAP_diplomacy.23.a: "Then we must reconsider our own path"
 JAP_diplomacy.24.t: "Japan Requests an End to U.S. Naval Pressure"
 JAP_diplomacy.24.d: "Tokyo has formally requested that we scale back or end our heightened naval presence and pressure around key sea lanes and chokepoints. Japanese officials argue that the current posture risks escalation and undermines domestic support for the alliance. In private, they indicate that further changes to the interpretation of Article 9 may be possible if we ease our posture."
 JAP_diplomacy.24.a: "End the naval pressure in exchange for security concessions"
 JAP_diplomacy.24.b: "Maintain our naval pressure around Japan"
 JAP_diplomacy.25.t: "Naval Pressure Eased, Commitments Deepened"
 JAP_diplomacy.25.d: "The United States has agreed to ease its heightened naval presence around our sea lanes, in return for deeper security commitments from Japan. In practice, this means another step in broadening the interpretation of Article 9 and expanding our role in regional security. The alliance appears stronger, but the domestic debate over our pacifist identity will only grow more intense."
 JAP_diplomacy.25.a: "For the sake of stability, we will honor this deal"
 JAP_diplomacy.26.t: "U.S. Refuses to End Naval Pressure"
 JAP_diplomacy.26.d: "Our request to ease or end the heightened U.S. naval presence around our sea lanes has been rejected. Washington insists that the current posture is necessary in light of regional threats. At home, this refusal will fuel both fears of entrapment in a wider conflict and calls to further strengthen Japan's own defenses."
 JAP_diplomacy.26.a: "Then we must adapt under pressure"
 JAP_diplomacy.28.t: "Kaguya Lunar Design Complications"
 JAP_diplomacy.28.d: "The ambitious Kaguya lunar mission is encountering serious design challenges. Key systems are proving more complex than expected, from guidance and power management to thermal protection. Engineers argue that additional funding and time will allow them to redesign critical components and improve overall reliability, but the cost of doing so is already raising eyebrows in the cabinet."
 JAP_diplomacy.28.a: "Invest in redesign and keep the schedule tight"
 JAP_diplomacy.28.b: "Hold the line on costs and accept a longer timeline"
 JAP_diplomacy.29.t: "Kaguya Communications Vulnerabilities"
 JAP_diplomacy.29.d: "As testing continues, the Kaguya program reveals weaknesses in deep-space communications and data links. Signal integrity, bandwidth, and resistance to interference are all below target. Specialists propose new antennas, upgraded ground stations, and more robust encryption,but these improvements will require additional political and financial capital."
 JAP_diplomacy.29.a: "Upgrade the communications architecture"
 JAP_diplomacy.29.b: "Proceed with existing systems and hope for the best"
 JAP_diplomacy.30.t: "Further Delays for the Kaguya Mission"
 JAP_diplomacy.30.d: "Technical setbacks, integration issues, and scheduling conflicts with launch infrastructure have forced yet another delay to the Kaguya lunar mission. While the core systems remain promising, the project is increasingly viewed as slow and troubled. Scientists insist that patience will be rewarded, but public attention is beginning to drift elsewhere."
 JAP_diplomacy.30.a: "Accept the delay and push on toward the Moon"
 JAP_diplomacy.31.t: "Kaguya Reaches the Lunar Surface"
 JAP_diplomacy.31.d: "After years of design revisions, communications upgrades, and difficult delays, the Kaguya mission has finally succeeded. Japanese hardware now operates on and around the Moon, returning high-resolution imagery and invaluable scientific data. The achievement showcases Japan's high-tech capabilities and opens new paths for satellite development, deep-space exploration, and strategic space applications."
 JAP_diplomacy.31.a: "Celebrate Kaguya as a triumph of Japanese technology"
 jap_kaguya_satellite_invest_tt: "§GBecause we invested in better design of the spaceship, we gained:§!"
 jap_kaguya_rocketry_invest_tt: "§GBecause we invested in better communications with the spaceship, we gained:§!"
 JAP_diplomacy.32.t: "Guidance Software Anomaly"
 JAP_diplomacy.32.d: "Engineers on the Mars mission report a recurring anomaly in the guidance software. While the issue is not yet critical, it could compound into serious navigation errors if left unaddressed. Fixing it thoroughly will pull resources from other projects and may affect the overall schedule."
 JAP_diplomacy.32.a: "Divert resources and resolve it properly"
 JAP_diplomacy.32.b: "Accept delays and patch it gradually"
 JAP_diplomacy.33.t: "Naming the Mars Colony"
 JAP_diplomacy.33.d: "Japan has secured a permanent foothold on Mars. As habitats come online and the first long-term crews settle in, a symbolic decision awaits: the official name and character of the colony."
 JAP_diplomacy.33.a: "'Amaterasu', a radiant symbol of unity"
 JAP_diplomacy.33.b: "'Kagutsuchi',a blazing industrial forge"
 JAP_diplomacy.33.c: "'Tsukuyomi',a calm observatory in the dark"
 JAP_diplomacy.33.e: "'Susanoo',a storm-touched martial frontier"
 JAP_diplomacy.68.t: "Japan Demands Sakhalin"
 JAP_diplomacy.68.d: "Japan has issued a formal demand for the return of Sakhalin. Accepting would defuse tensions, but it would be seen as a humiliating concession."
 JAP_diplomacy.68.a: "Accept the demand"
 JAP_diplomacy.68.b: "Reject it outright"
 JAP_diplomacy.69.t: "Sakhalin Returned"
 JAP_diplomacy.69.d: "Moscow has accepted our demand. Sakhalin is now under Japanese administration. The government will present this as proof that the imperial order is returning."
 JAP_diplomacy.69.a: "A historic correction"
 JAP_diplomacy.70.t: "ロシア拒否"
 JAP_diplomacy.70.d: "Moscow has refused our demand for Sakhalin. We can swallow the insult for now, test Russia with a limited border conflict, or commit fully to war."
 JAP_diplomacy.70.a: "Stand down for now"
 JAP_diplomacy.70.b: "Launch a border war"
 JAP_diplomacy.70.c: "Declare total war"
 JAP_diplomacy.71.t: "Japan Demands the North Kuril Islands"
 JAP_diplomacy.71.d: "Japan has issued a formal demand for the return of the North Kuril Islands. Accepting would defuse tensions, but it would be seen as a humiliating concession."
 JAP_diplomacy.71.a: "Accept the demand"
 JAP_diplomacy.71.b: "Reject it outright"
 JAP_diplomacy.72.t: "The North Kuril Islands Returned"
 JAP_diplomacy.72.d: "Moscow has accepted our demand. The North Kuril Islands are now under Japanese administration. The government will present this as proof that the imperial order is returning."
 JAP_diplomacy.72.a: "A historic correction"
 JAP_diplomacy.73.t: "ロシア拒否"
 JAP_diplomacy.73.d: "Moscow has refused our demand for the North Kuril Islands. We can swallow the insult for now, test Russia with a limited border conflict, or commit fully to war."
 JAP_diplomacy.73.a: "Stand down for now"
 JAP_diplomacy.73.b: "Launch a border war"
 JAP_diplomacy.73.c: "Declare total war"
 JAP_diplomacy.74.t: "Japan Demands the South Kuril Islands"
 JAP_diplomacy.74.d: "Japan has issued a formal demand for the return of the South Kuril Islands. Accepting would defuse tensions, but it would be seen as a humiliating concession."
 JAP_diplomacy.74.a: "Accept the demand"
 JAP_diplomacy.74.b: "Reject it outright"
 JAP_diplomacy.75.t: "The South Kuril Islands Returned"
 JAP_diplomacy.75.d: "Moscow has accepted our demand. The South Kuril Islands are now under Japanese administration. The government will present this as proof that the imperial order is returning."
 JAP_diplomacy.75.a: "A historic correction"
 JAP_diplomacy.76.t: "ロシア拒否"
 JAP_diplomacy.76.d: "Moscow has refused our demand for the South Kuril Islands. We can swallow the insult for now, test Russia with a limited border conflict, or commit fully to war."
 JAP_diplomacy.76.a: "Stand down for now"
 JAP_diplomacy.76.b: "Launch a border war"
 JAP_diplomacy.76.c: "Declare total war"
 JAP_diplomacy.77.t: "Tokyo Proposes a Settlement"
 JAP_diplomacy.77.d: "With the Kuril Islands and Sakhalin now under Japanese control, Tokyo has moved quickly to turn battlefield gains into a formal settlement. Japanese diplomats have approached Moscow with a proposal to bring the conflict to an end, arguing that the war has already decided the matter and that further fighting would only prolong the inevitable.\nTheir offer is straight forward: peace in exchange for Russia formally recognizing Japanese control over the Kuril Islands and Sakhalin. In Tokyo's view, it is a practical arrangement meant to stabilize the region and prevent the war from escalating further. Now the decision lies with us. Accept the new reality and end the war, or reject the proposal and continue the struggle."
 JAP_diplomacy.77.a: "Accept the settlement."
 JAP_diplomacy.77.b: "Reject it. The war continues."
 JAP_diplomacy.78.t: "Settlement Accepted"
 JAP_diplomacy.78.d: "The proposal is accepted, and the guns begin to fall silent. Orders are issued to disengage, diplomatic channels reopen, and the war is reduced to a set of clauses and coordinates.\n\nThe Northern isles are transferred as the price of peace, and every side must now sell the outcome to their own public. The campaign ends, but the memory will not."
 JAP_diplomacy.78.a: "So be it. Let the ink replace the blood."
 JAP_diplomacy.79.t: "Settlement Rejected"
 JAP_diplomacy.79.d: "The answer from the other side is a hard no. There will be no signatures, no recognition, and no pause to catch breath.\n\nTokyo has misread our resolve, and the conflict will continue until one side can no longer sustain it. If peace is to come, it will be forced."
 JAP_diplomacy.79.a: "Then we fight on."
 JAP_diplomacy.80.t: "Moscow Seeks a Way Out"
 JAP_diplomacy.80.d: "After Japan's advances in the north, Russian diplomats signal a willingness to end the fighting before the situation worsens. The message is pragmatic: stop the bleed, freeze the lines, and prevent the war from consuming more resources than any side can justify.\n\nThe offer is a straightforward peace, trading continued escalation for an immediate end to hostilities. We must decide whether to accept an imperfect settlement or press our advantage further."
 JAP_diplomacy.80.a: "Accept peace."
 JAP_diplomacy.80.b: "No. We press on."
 JAP_diplomacy.81.t: "Tokyo Accepts the Peace"
 JAP_diplomacy.81.d: "Japan agrees to the terms, choosing to end the war rather than widen it. The decision is unpopular in parts of the country, and the cost is felt at home as confidence slips and the public questions why the fighting began at all.\n\nA white peace is declared, and the territorial concessions are executed. The battlefield quiets, but the political damage will linger."
 JAP_diplomacy.81.a: "We will swallow this, and endure."
 JAP_diplomacy.82.t: "Tokyo Refuses"
 JAP_diplomacy.82.d: "Japan rejects the proposal and signals that it will not accept a settlement written from weakness. The fighting will continue, and the stakes rise with every passing week.\n\nIf peace is to come, it will not be offered. It will be taken."
 JAP_diplomacy.82.a: "ならばそのように"
 JAP_unlock_sikhalin_raid_tt: "Unlocks §YSpecial Forces Raid§! on §Y[Getname.691]§!"
 JAP_diplomacy.83.t: "Victory in the South Kurils"
 JAP_diplomacy.83.d: "Japanese forces have prevailed in the South Kurils, pushing Russian units back and seizing control of the contested ground. The result is small on the map, but loud in its message: Japan can take what it claims and hold it under pressure.\n\nThe flag goes up, the garrison digs in, and Tokyo prepares for the next move. Moscow will not forget this."
 JAP_diplomacy.83.a: "Secure the islands."
 JAP_diplomacy.84.t: "Defeat in the South Kurils"
 JAP_diplomacy.84.d: "The border clash in the South Kurils has gone against us. Russian resistance held firm, and our forces were forced to withdraw under fire, leaving the question of sovereignty unresolved and our leadership under scrutiny.\n\nWe have learned painful lessons in the process. The next attempt will be better planned, better supplied, and harder to stop."
 JAP_diplomacy.84.a: "Learn from the setback."
 JAP_diplomacy.85.t: "Setback in the South Kurils"
 JAP_diplomacy.85.d: "Russian forces have failed to hold the South Kurils in the face of a determined Japanese push. The immediate tactical loss is sharp, and the political signal is sharper: the frontier is vulnerable, and the opponent is willing to pay to change it.\n\nMoscow will have to decide whether to escalate, or accept a humiliating new fact on the ground."
 JAP_diplomacy.85.a: "A bitter lesson."
 JAP_diplomacy.86.t: "South Kurils Secured"
 JAP_diplomacy.86.d: "Russian troops have won the border clash and secured the South Kurils, driving back Japanese units and restoring control along the line. The operation demonstrates readiness and the ability to punish incursions quickly.\n\nTokyo may call it a temporary setback, but the message is clear. The islands will not be taken cheaply."
 JAP_diplomacy.86.a: "Hold the line."
 JAP_diplomacy.87.t: "Victory in the North Kurils"
 JAP_diplomacy.87.d: "Japan has achieved a breakthrough in the North Kurils, forcing Russian units to retreat and leaving the islands under our control. The operation proves that even remote terrain can be seized when planning, timing, and resolve align.\n\nThe occupation begins immediately. Supplies flow, defenses rise, and the northern frontier is rewritten by action."
 JAP_diplomacy.87.a: "Dig in and prepare."
 JAP_diplomacy.88.t: "Defeat in the North Kurils"
 JAP_diplomacy.88.d: "The North Kurils have held against our attack. The fighting was harsh, the conditions worse, and Russian forces managed to blunt our advance and force a withdrawal.\n\nWe return with experience paid for in blood and fatigue. Next time, we will not arrive unprepared."
 JAP_diplomacy.88.a: "We will adapt."
 JAP_diplomacy.89.t: "Loss in the North Kurils"
 JAP_diplomacy.89.d: "Russia has been pushed out of positions in the North Kurils after a successful Japanese operation. The loss is not only territorial, it is psychological, signaling that distance and weather are no longer reliable defenses.\n\nA response will be demanded, but retaliation carries its own risks. The situation is deteriorating fast."
 JAP_diplomacy.89.a: "This cannot stand."
 JAP_diplomacy.90.t: "North Kurils Held"
 JAP_diplomacy.90.d: "Russian forces have defeated the incursion and held the North Kurils, repelling Japanese units and restoring control under difficult conditions. The defense has sharpened doctrine and raised confidence across the command chain.\n\nIf Japan wants these islands, it will have to commit far more than a border clash."
 JAP_diplomacy.90.a: "Maintain readiness."
 JAP_diplomacy.91.t: "Russia Responds on Sakhalin"
 JAP_diplomacy.91.d: "Japanese moves on Sakhalin have triggered an immediate response from Moscow. Russian leadership frames the action as a direct challenge to sovereignty and signals that it will not tolerate further advances without consequence.\n\nThe crisis now branches into two paths: escalation into open war, or coercive pressure through economic measures and maritime restriction. Either way, the temperature has risen past the point of calm diplomacy."
 JAP_diplomacy.91.a: "This will become a war."
 JAP_diplomacy.91.b: "Strangle them with embargo and blockade."
 JAP_diplomacy.92.t: "Russia Answers the Sakhalin Takeover"
 JAP_diplomacy.92.d: "Sakhalin has changed hands, and Moscow must now decide how to answer a humiliation so close to home. War would be costly, but failing to respond would invite further losses and weaken the state's authority.\n\nRussia can choose escalation and attempt to reverse the outcome by force, or accept a temporary peace that ends the fighting while demanding the return of Sakhalin as the price for stopping. The decision will define the next phase of the conflict."
 JAP_diplomacy.92.a: "We will retake it by force."
 JAP_diplomacy.92.b: "Force a settlement. Sakhalin must be returned."
 JAP_diplomacy.94.t: "Tokyo Demands a Protectorate"
 JAP_diplomacy.94.d: "A formal note arrives from Japan, stripped of diplomacy and heavy with intent. Seoul is offered a choice presented as stability: accept Japanese supervision over foreign policy and security affairs, align institutions to Tokyo's direction, and avoid a destructive confrontation.\n\nThe message is clear. Japan is no longer asking for cooperation, it is dictating terms. Refusal will be treated as defiance, and defiance will invite consequences."
 JAP_diplomacy.94.a: "We have no choice but to accept."
 JAP_diplomacy.94.b: "Refuse. Korea will not bow."
 JAP_diplomacy.95.t: "South Korea Submits"
 JAP_diplomacy.95.d: "Seoul accepts the terms, choosing survival over sovereignty. Agreements are signed under pressure, advisers arrive, and the state's external posture is folded into Japan's strategic design.\n\nThe war ends, but a different kind of struggle begins. Korea remains on the map, yet its direction is no longer its own."
 JAP_diplomacy.95.a: "Establish the protectorate."
 JAP_diplomacy.96.t: "South Korea Defies Tokyo"
 JAP_diplomacy.96.d: "Seoul rejects the ultimatum and declares that its sovereignty is not negotiable. The refusal turns the crisis from coercion into confrontation, and Tokyo now has every pretext it needs to claim the issue can only be settled by force.\n\nIf Japan wanted a submission, it has received a challenge instead."
 JAP_diplomacy.96.a: "Then we will impose our will."
 JAP_diplomacy.97.t: "Tokyo Issues an Ultimatum to Pyongyang"
 JAP_diplomacy.97.d: "Japan has delivered an ultimatum to Pyongyang, offering a future of containment under supervision or a future of ruin under bombardment. The terms are blunt: surrender external policy and strategic autonomy to Tokyo's direction, accept monitored security arrangements, and submit to a framework designed to prevent the North from ever becoming a threat again.\n\nFor the regime, this is humiliation. For Japan, it is risk management. The question is whether Pyongyang chooses survival or defiance."
 JAP_diplomacy.97.a: "Accept. Preserve the state at any cost."
 JAP_diplomacy.97.b: "Reject. We will not submit."
 JAP_diplomacy.98.t: "Pyongyang Yields"
 JAP_diplomacy.98.d: "Against all expectations, the North accepts the terms. The regime keeps its symbols, but its freedom of action is broken as Japanese supervision reshapes borders, security, and foreign relations.\n\nThe fighting ends, and the peninsula's northern half becomes a controlled buffer. A threat is neutralized, and Tokyo gains a lever it will not easily release."
 JAP_diplomacy.98.a: "Establish the protectorate."
 JAP_diplomacy.99.t: "Pyongyang Defies Tokyo"
 JAP_diplomacy.99.d: "Pyongyang rejects the ultimatum and chooses defiance, betting that fear and escalation will protect the regime. The refusal turns the crisis into a test of wills, and Tokyo now has the justification to claim the North can only be subdued by force.\n\nThe peninsula braces for war. The next message will not be a note, it will be fire."
 JAP_diplomacy.99.a: "Then we will end the threat ourselves."
 JAP_diplomacy.101.t: "Tokyo Demands Taiwan's Submission"
 JAP_diplomacy.101.d: "Japan has delivered a direct demand to Taipei: accept a protectorate framework and place foreign policy and defense coordination under Tokyo's supervision, or face isolation and force. The offer is packaged as security and stability, promising protection from outside threats in exchange for political obedience.\n\nBehind the formal language is a simple message. The island is too important to be left independent, and Japan intends to decide its future."
 JAP_diplomacy.101.a: "Accept the terms. Avoid catastrophe."
 JAP_diplomacy.101.b: "Reject them. Taiwan will not submit."
 JAP_diplomacy.102.t: "Taipei Accepts"
 JAP_diplomacy.102.d: "Taiwan accepts the ultimatum, choosing survival and continuity over open conflict. New agreements bind its external posture to Japan, advisers arrive, and strategic decision making is quietly shifted toward Tokyo.\n\nThe war ends, but sovereignty is narrowed to what the protector permits. The island remains, yet its direction is no longer fully its own."
 JAP_diplomacy.102.a: "Establish the protectorate."
 JAP_diplomacy.103.t: "Taipei Refuses"
 JAP_diplomacy.103.d: "Taiwan rejects Japan's demand and refuses to trade autonomy for a promise of protection. The decision turns diplomatic pressure into a crisis of force, and Tokyo now has the justification to argue that the island can only be secured by conquest.\n\nThe strait becomes a fault line. The next step will not be negotiation, it will be mobilization."
 JAP_diplomacy.103.a: "Then we will take what we need."
 JAP_diplomacy.105.t: "Tokyo Demands a Philippine Protectorate"
 JAP_diplomacy.105.d: "Japan has issued a demand to Manila that leaves little room for misunderstanding. Accept a protectorate framework, align foreign policy and defense planning with Tokyo, and permit Japanese oversight of key security arrangements, or face the consequences of refusal.\n\nThe offer is presented as stability and protection, but its purpose is control of the sea lanes and the gateway between oceans. The Philippines must now choose between submission and confrontation."
 JAP_diplomacy.105.a: "Accept. Preserve the nation from destruction."
 JAP_diplomacy.105.b: "Refuse. We will not be ruled from Tokyo."
 JAP_diplomacy.106.t: "Manila Submits"
 JAP_diplomacy.106.d: "The Philippine government accepts Japan's terms. Agreements are signed, advisers arrive, and the country's external posture is folded into Japan's maritime design.\n\nThe fighting ends, but the cost is sovereignty. The archipelago remains, yet its strategic decisions will be made with Tokyo looking over every shoulder."
 JAP_diplomacy.106.a: "Establish the protectorate."
 JAP_diplomacy.107.t: "Manila Defies Tokyo"
 JAP_diplomacy.107.d: "The Philippines rejects the ultimatum and refuses to trade independence for a promise of protection. The refusal turns Japan's coercion into a test of force, and Tokyo now has every excuse to claim the archipelago must be secured by arms.\n\nThe sea lanes tighten, fleets begin to posture, and the region braces for war. The next move will not be diplomatic."
 JAP_diplomacy.107.a: "Then we will take the archipelago."
 JAP_diplomacy.109.t: "The Straits Ultimatum"
 JAP_diplomacy.109.d: "A Japanese note arrives with the calm tone of inevitability. Kuala Lumpur is offered a protectorate arrangement that binds foreign policy and security coordination to Tokyo's direction, justified as the price of stability in a region where sea lanes and chokepoints decide survival.\n\nThe message is not a request. Japan intends to command the Straits, and Malaya is expected to comply. Acceptance promises protection, refusal invites the full weight of maritime coercion."
 JAP_diplomacy.109.a: "Accept. We cannot fight the tide."
 JAP_diplomacy.109.b: "Refuse. Our sovereignty is not for sale."
 JAP_diplomacy.110.t: "Kuala Lumpur Bows to the Rising Sun"
 JAP_diplomacy.110.d: "Malaysia accepts the terms, trading strategic independence for immediate survival. Agreements are signed, liaison missions arrive, and Tokyo gains the keys to the corridors that connect two oceans.\n\nThe war ends, but the cost is clear. Malaya remains intact, yet its external posture now moves inside Japan's shadow."
 JAP_diplomacy.110.a: "Establish the protectorate."
 JAP_diplomacy.111.t: "Malaya Rejects the Straits Order"
 JAP_diplomacy.111.d: "Malaysia rejects the ultimatum and refuses to let its future be dictated from Tokyo. The decision turns Japan's pressure into a confrontation over the region's most valuable maritime corridor.\n\nTokyo will not tolerate defiance at the Straits. If Malaya will not submit by treaty, Japan will seek submission by force."
 JAP_diplomacy.111.a: "Then we will take the Straits."
 JAP_diplomacy.113.t: "The Archipelago Edict"
 JAP_diplomacy.113.d: "Tokyo has issued a demand to Jakarta aimed at the heart of Indonesia's independence. The proposal is a protectorate framework that places foreign policy and strategic security under Japanese supervision, justified as the only way to guarantee stability across the island chains that bind two oceans together.\n\nThe language is polite, but the intent is absolute. Japan wants the Indonesian archipelago as a controlled corridor, not a sovereign partner. Acceptance means safety under a shadow, refusal means the shadow becomes a storm."
 JAP_diplomacy.113.a: "Accept. We cannot endure a naval stranglehold."
 JAP_diplomacy.113.b: "Refuse. Indonesia will not be commanded."
 JAP_diplomacy.114.t: "Jakarta Accepts the Edict"
 JAP_diplomacy.114.d: "Indonesia accepts the terms and submits to a new maritime reality. Japanese missions arrive to oversee security coordination, basing rights, and external alignment, turning the archipelago into a managed corridor within Tokyo's strategic sphere.\n\nThe war ends, but independence is narrowed to what is permitted. The islands remain Indonesian in name, yet their direction is now constrained by Japanese power."
 JAP_diplomacy.114.a: "Establish the protectorate."
 JAP_diplomacy.115.t: "Indonesia Defies the Archipelago Edict"
 JAP_diplomacy.115.d: "Jakarta rejects Japan's demand and refuses to trade sovereignty for promises of stability. The refusal turns pressure into confrontation, and Tokyo now treats Indonesian independence as an obstacle to be removed rather than a fact to be respected.\n\nThe seas around the archipelago grow tense. If Indonesia will not yield by treaty, Japan will seek to force compliance by arms."
 JAP_diplomacy.115.a: "Then we will seize the corridors."
 JAP_diplomacy.117.t: "The Tonkin Choice"
 JAP_diplomacy.117.d: "Tokyo has delivered a demand to Hanoi designed to lock Vietnam into Japan's maritime order. The offer is a protectorate arrangement in all but name: align foreign policy, accept Japanese security supervision, and permit strategic access that turns Vietnam's coastline into an extension of Japan's reach.\n\nThe message is framed as protection from larger predators, but it is also a leash. Vietnam must decide whether to accept survival under constraint, or resist and invite a war that will be fought along its shores."
 JAP_diplomacy.117.a: "Accept. We will bend, for now."
 JAP_diplomacy.117.b: "Refuse. Vietnam will not be bound."
 JAP_diplomacy.118.t: "Hanoi Accepts Tokyo's Terms"
 JAP_diplomacy.118.d: "Vietnam accepts the ultimatum. Agreements are signed, liaison officers arrive, and Japan gains decisive influence over Vietnam's external alignment and coastal security.\n\nThe war ends, but independence is narrowed. Vietnam remains, yet its strategic posture now moves within a framework written in Tokyo."
 JAP_diplomacy.118.a: "Establish the protectorate."
 JAP_diplomacy.119.t: "Hanoi Rejects the Tonkin Choice"
 JAP_diplomacy.119.d: "Vietnam rejects Japan's demand and refuses to trade sovereignty for a promise of security. The refusal turns coercion into confrontation, and Tokyo now treats Vietnam as a barrier to be removed from its regional design.\n\nThe coastline becomes a front line. If Vietnam will not submit by treaty, Japan will seek submission by force."
 JAP_diplomacy.119.a: "Then we will take the coast."
 JAP_diplomacy.121.t: "The Mekong Ultimatum"
 JAP_diplomacy.121.d: "A Japanese delegation arrives with a proposal that reads less like diplomacy and more like a verdict. Cambodia is offered protection under Tokyo's supervision, with foreign policy coordination and security arrangements placed inside Japan's regional framework.\n\nThe pitch is stability, investment, and safety from stronger neighbors. The reality is subordination. Phnom Penh must choose whether to accept a guarded future or risk becoming a battlefield for refusing."
 JAP_diplomacy.121.a: "Accept. Survival comes first."
 JAP_diplomacy.121.b: "Refuse. Cambodia will not submit."
 JAP_diplomacy.122.t: "Phnom Penh Accepts"
 JAP_diplomacy.122.d: "Cambodia accepts the terms and yields strategic autonomy to avoid a war it cannot win. New agreements bind the state to Japan's direction, and Tokyo's advisers move quickly to secure key ministries and access points.\n\nThe fighting ends before it begins. Cambodia remains sovereign in name, but its path is now constrained by Japanese power."
 JAP_diplomacy.122.a: "Establish the protectorate."
 JAP_diplomacy.123.t: "Cambodia Rejects the Mekong Ultimatum"
 JAP_diplomacy.123.d: "Phnom Penh rejects Japan's demand and refuses to surrender its future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats Cambodia as a weak link that must be brought into line.\n\nDiplomacy has failed. If Cambodia will not accept the framework, Japan will seek to impose it by force."
 JAP_diplomacy.123.a: "Then we will compel obedience."
 JAP_diplomacy.125.t: "The Mekong Hinterland Directive"
 JAP_diplomacy.125.d: "Japan has issued a demand to Vientiane that aims to secure the quiet depth behind the coast. The proposal is a protectorate framework that binds Laos to Tokyo's strategic direction, placing foreign policy and security coordination under Japanese supervision.\n\nThe offer is presented as development and protection. The meaning is clear: corridors, rivers, and borders will be managed to serve Japan's wider sphere. Laos must decide whether to accept the directive or gamble on resistance."
 JAP_diplomacy.125.a: "Accept. We cannot stand alone."
 JAP_diplomacy.125.b: "Refuse. Laos will not be dictated to."
 JAP_diplomacy.126.t: "Vientiane Accepts"
 JAP_diplomacy.126.d: "Laos accepts Japan's terms, choosing survival and stability over a war it cannot afford. Agreements are signed, coordination offices are established, and Laos is folded into Tokyo's regional framework as a controlled hinterland.\n\nThe fighting ends, but autonomy shrinks. Laos remains, yet its strategic choices now move within limits set by Japan."
 JAP_diplomacy.126.a: "Establish the protectorate."
 JAP_diplomacy.127.t: "Laos Rejects the Directive"
 JAP_diplomacy.127.d: "Vientiane rejects Japan's demand and refuses to surrender its future to external supervision. The refusal turns coercion into confrontation, and Tokyo now treats Laos as an obstacle to corridor control rather than a partner to be courted.\n\nIf Laos will not accept the framework by treaty, Japan will seek to impose it by force."
 JAP_diplomacy.127.a: "Then we will bring them to heel."
 JAP_diplomacy.129.t: "The Southern Anchor Ultimatum"
 JAP_diplomacy.129.d: "Tokyo has delivered an ultimatum to Canberra that treats Australia not as a distant continent, but as the keystone of the southern Pacific. The terms are stark: accept a protectorate framework, align foreign policy and defense planning with Japan, and permit the basing and access arrangements that would lock the South Pacific under Tokyo's reach.\n\nThe offer is dressed as stability and guaranteed security. The reality is strategic submission. Australia must decide whether to accept life under Japanese shadow, or prepare to contest the ocean itself."
 JAP_diplomacy.129.a: "Accept. We cannot win a war for the Pacific."
 JAP_diplomacy.129.b: "Refuse. Australia will not bow."
 JAP_diplomacy.130.t: "Canberra Accepts the Anchor Terms"
 JAP_diplomacy.130.d: "Australia accepts Japan's ultimatum, choosing immediate survival over a continental war it cannot risk. Agreements are signed, strategic access is granted, and Japan gains the southern anchor it sought to dominate the wider ocean.\n\nThe guns fall silent, but the balance of the Pacific shifts overnight. Australia remains on the map, yet its strategic decisions now move within limits set in Tokyo."
 JAP_diplomacy.130.a: "Establish the protectorate."
 JAP_diplomacy.131.t: "Australia Rejects the Ultimatum"
 JAP_diplomacy.131.d: "Canberra rejects Japan's demand and refuses to surrender the continent's independence to a foreign mandate. The refusal turns Tokyo's pressure into a direct challenge, and Japan now frames Australia as the final obstacle to a Pacific order under its control.\n\nA contest for the ocean is unavoidable. If Australia will not accept the framework by treaty, Japan will attempt to impose it by force."
 JAP_diplomacy.131.a: "Then we will secure the south by arms."
 JAP_diplomacy.133.t: "The Tasman Line Demand"
 JAP_diplomacy.133.d: "Tokyo has delivered a demand to Wellington aimed at closing the last open flank in the South Pacific. The proposal is a protectorate framework that binds New Zealand's foreign policy and defense posture to Japan's direction, justified as the cost of stability in an ocean that is being reorganized by force.\n\nThe language speaks of protection and partnership, but the structure is control. New Zealand must choose between a constrained peace under Japanese shadow or a war for independence across the sea."
 JAP_diplomacy.133.a: "Accept. We will endure, and survive."
 JAP_diplomacy.133.b: "Refuse. We will not be absorbed."
 JAP_diplomacy.134.t: "Wellington Accepts the Tasman Line"
 JAP_diplomacy.134.d: "New Zealand accepts Japan's terms, trading strategic autonomy for an end to hostilities. Agreements are signed, access arrangements are established, and Tokyo gains a secure southern outpost to shape the wider ocean.\n\nThe war ends, but independence is narrowed. New Zealand remains, yet its external posture now moves within boundaries drawn in Tokyo."
 JAP_diplomacy.134.a: "Establish the protectorate."
 JAP_diplomacy.135.t: "Wellington Rejects the Demand"
 JAP_diplomacy.135.d: "New Zealand rejects Japan's ultimatum and refuses to surrender its future to a foreign mandate. The refusal turns pressure into confrontation, and Tokyo now treats Wellington's independence as a threat to its southern perimeter.\n\nThe Pacific hardens into front lines. If New Zealand will not accept the framework by treaty, Japan will attempt to impose it by force."
 JAP_diplomacy.135.a: "Then we will take the southern outpost."
 JAP_diplomacy.137.t: "The Irrawaddy Gate Ultimatum"
 JAP_diplomacy.137.d: "Tokyo has issued a demand to Naypyidaw aimed at securing Myanmar as the land bridge between oceans. The terms amount to a protectorate framework: align foreign policy with Japan, accept Japanese security supervision, and grant the access needed to control corridors from the Bay of Bengal into Southeast Asia.\n\nThe offer is presented as stability and development. The truth is strategic capture. Myanmar must decide whether to accept a controlled peace or face a war that will turn its gateways into battlefields."
 JAP_diplomacy.137.a: "Accept. We cannot withstand this pressure."
 JAP_diplomacy.137.b: "Refuse. We will not be reduced to a corridor."
 JAP_diplomacy.138.t: "Myanmar Accepts the Gate Terms"
 JAP_diplomacy.138.d: "Myanmar accepts Japan's ultimatum, trading strategic autonomy for an end to hostilities and the promise of order. Agreements are signed, liaison missions arrive, and Japan gains a decisive hand over Myanmar's external alignment and security posture.\n\nThe fighting ends, but the price is sovereignty. Myanmar remains, yet its gateways now serve a regional design written in Tokyo."
 JAP_diplomacy.138.a: "Establish the protectorate."
 JAP_diplomacy.139.t: "Myanmar Rejects the Ultimatum"
 JAP_diplomacy.139.d: "Naypyidaw rejects Japan's demand and refuses to surrender its future to external supervision. The refusal turns pressure into confrontation, and Tokyo now frames Myanmar as an obstacle to corridor control that must be brought into line.\n\nIf Myanmar will not accept the framework by treaty, Japan will seek to impose it by force. The gate will be secured one way or another."
 JAP_diplomacy.139.a: "Then we will take the gate."
 JAP_diplomacy.141.t: "The Northern Highlands Ultimatum"
 JAP_diplomacy.141.d: "Japan has turned its attention to Kachin, the rugged northern highlands that control passes, resources, and the approaches to the wider region. Tokyo's demand is presented as protection and recognition, but the structure is a protectorate: align externally with Japan, accept security supervision, and allow strategic access that secures the frontier.\n\nFor Kachin, this is a choice between autonomy in name and annihilation in practice. Acceptance offers a shield. Refusal invites a war fought in mountains and villages."
 JAP_diplomacy.141.a: "Accept. We need a patron to survive."
 JAP_diplomacy.141.b: "Refuse. We will not trade one master for another."
 JAP_diplomacy.143.t: "Kachin Accepts Japanese Protection"
 JAP_diplomacy.143.d: "Kachin accepts the terms, choosing survival and stability over a fight it cannot sustain alone. Agreements are signed, liaison offices are established, and Japan gains a firm hold over the northern highlands and their strategic corridors.\n\nThe conflict ends, but Kachin's freedom shrinks to what is permitted. The mountains remain, yet their future is now tied to Tokyo."
 JAP_diplomacy.143.a: "Establish the protectorate."
 JAP_diplomacy.144.t: "Kachin Rejects the Ultimatum"
 JAP_diplomacy.144.d: "Kachin rejects Japan's demand and refuses to submit to an external mandate. The refusal turns coercion into confrontation, and Tokyo now frames the highlands as a security problem that must be resolved by force.\n\nIf Kachin will not accept protection by treaty, Japan will impose control by arms. The mountains will not stay neutral."
 JAP_diplomacy.144.a: "Then we will take the highlands."
 JAP_diplomacy.145.t: "The Shan Corridor Demand"
 JAP_diplomacy.145.d: "Japan has delivered its terms to the Wa authorities, targeting the borderlands that sit on smuggling routes, mountain passes, and the arteries of the interior. The offer is framed as recognition and protection, but it is a protectorate arrangement: align externally with Tokyo, accept Japanese security supervision, and permit access that secures the corridor.\n\nFor Wa, the choice is brutal. Submit and keep local power under a new umbrella, or refuse and face a war that will not respect mountains or militias."
 JAP_diplomacy.145.a: "Accept. Better a shield than annihilation."
 JAP_diplomacy.145.b: "Refuse. We will not be absorbed."
 JAP_diplomacy.146.t: "Wa Accepts Japanese Protection"
 JAP_diplomacy.146.d: "Wa accepts Japan's terms, trading strategic independence for survival and formal recognition under a stronger patron. Liaison teams arrive, routes are secured, and the borderlands are folded into Japan's regional framework.\n\nThe fighting ends, but autonomy narrows. Wa retains local authority, yet its external direction now answers to Tokyo."
 JAP_diplomacy.146.a: "Establish the protectorate."
 JAP_diplomacy.147.t: "Wa Rejects the Demand"
 JAP_diplomacy.147.d: "Wa rejects Japan's ultimatum and refuses to place its territory under foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the borderlands as an uncontrolled gap in its corridor strategy.\n\nIf Wa will not accept the framework by treaty, Japan will impose control by force. The mountains will be contested."
 JAP_diplomacy.147.a: "Then we will secure the corridor."
 JAP_diplomacy.148.t: "The Shan Gate Ultimatum"
 JAP_diplomacy.148.d: "Japan has issued its demand to the authorities of South Shan State, targeting the highland routes that connect the interior to the wider region. The proposal is a protectorate framework: align foreign dealings with Tokyo, accept Japanese security supervision, and permit strategic access to secure roads, passes, and supply corridors.\n\nThe offer promises protection and recognition. The meaning is control. South Shan must decide whether to accept a managed future under Japan's umbrella or risk a war fought across its hills and valleys."
 JAP_diplomacy.148.a: "Accept. We cannot afford annihilation."
 JAP_diplomacy.148.b: "Refuse. We will not be reduced to a corridor."
 JAP_diplomacy.149.t: "South Shan Yields"
 JAP_diplomacy.149.d: "South Shan State accepts Japan's terms. Liaison offices are established, routes are secured, and the region is folded into Tokyo's corridor strategy as a controlled gate rather than an independent actor.\n\nThe fighting ends, but autonomy contracts. Local authority remains, yet the strategic direction now answers to Japan."
 JAP_diplomacy.149.a: "Establish the protectorate."
 JAP_diplomacy.150.t: "South Shan Rejects the Ultimatum"
 JAP_diplomacy.150.d: "South Shan State rejects Japan's demand and refuses to place its future under foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the region as a dangerous gap in its strategic perimeter.\n\nIf South Shan will not accept the framework by treaty, Japan will impose it by force. The gate will be secured."
 JAP_diplomacy.150.a: "Then we will take the gate by arms."
 JAP_diplomacy.151.t: "The Salween Mandate"
 JAP_diplomacy.151.d: "Japan has turned its gaze to Karen State, where river valleys and border routes can open or close the southern approaches. Tokyo's demand is presented as protection and recognition, but it is a protectorate framework: align external dealings with Japan, accept security supervision, and grant access that secures the Salween corridor.\n\nThe offer promises stability in a region of fractured authority. The cost is obedience. Karen State must choose between a guarded peace under Japan's umbrella or a war that will scorch its crossings and settlements."
 JAP_diplomacy.151.a: "Accept. We will live to see tomorrow."
 JAP_diplomacy.151.b: "Refuse. We will not be ruled."
 JAP_diplomacy.152.t: "Karen State Submits"
 JAP_diplomacy.152.d: "Karen State accepts Japan's terms, trading strategic autonomy for survival and an end to immediate pressure. Liaison missions arrive, routes are secured, and the region is folded into Tokyo's perimeter as a controlled corridor rather than an independent actor.\n\nThe conflict ends, but the boundaries of freedom shrink. Karen authority remains local, yet the strategic direction now answers to Japan."
 JAP_diplomacy.152.a: "Establish the protectorate."
 JAP_diplomacy.153.t: "Karen State Rejects the Mandate"
 JAP_diplomacy.153.d: "Karen State rejects Japan's demand and refuses to surrender its future to foreign supervision. The refusal turns coercion into confrontation, and Tokyo now treats the Salween crossings as a strategic problem to be solved by force.\n\nIf Karen State will not accept the framework by treaty, Japan will impose it by arms. The corridor will be secured."
 JAP_diplomacy.153.a: "Then we will seize the crossings."
 JAP_diplomacy.154.t: "The Palau Anchorage Demand"
 JAP_diplomacy.154.d: "Tokyo has delivered its demand to Palau, a small state sitting on a large piece of the ocean. The terms are framed as protection and guaranteed prosperity, but the structure is a protectorate: align foreign policy with Japan, accept security supervision, and grant basing rights that turn Palau into an Imperial forward anchorage.\n\nThe offer promises safety from storms both political and military. The cost is sovereignty. Palau must choose between submission under the Rising Sun or a fight it cannot sustain against the sea power of a great state."
 JAP_diplomacy.154.a: "Accept. Better a protector than a grave."
 JAP_diplomacy.154.b: "Refuse. We will not surrender our independence."
 JAP_diplomacy.155.t: "Palau Accepts Japanese Protection"
 JAP_diplomacy.155.d: "Palau accepts Japan's terms. Agreements are signed, access is granted, and the islands become a disciplined node in Tokyo's network of ports and airfields.\n\nThe crisis ends without battle, but the change is real. Palau remains in name, yet its external direction now follows Japan's compass."
 JAP_diplomacy.155.a: "Establish the protectorate."
 JAP_diplomacy.156.t: "Palau Rejects the Demand"
 JAP_diplomacy.156.d: "Palau rejects Japan's ultimatum and refuses to trade sovereignty for promises of protection. The refusal turns Tokyo's pressure into a question of force, and Japan now treats the islands as an unsecured gap in its ocean perimeter.\n\nIf Palau will not accept the framework by treaty, Japan will impose control by arms. The anchorage will be secured."
 JAP_diplomacy.156.a: "Then we will take the anchorage."
 JAP_diplomacy.157.t: "The Micronesian Chain Ultimatum"
 JAP_diplomacy.157.d: "Japan has issued its demand to Micronesia, viewing the islands not as scattered communities but as a chain of stepping stones across the central Pacific. The offer is framed as protection and investment, yet the structure is a protectorate: align foreign policy with Tokyo, accept security supervision, and grant access that turns the islands into waypoints for Japan's fleet and air power.\n\nThe message is simple. These waters will be organized under one authority. Micronesia must choose between a managed peace beneath Japan's umbrella or a confrontation it cannot hope to sustain."
 JAP_diplomacy.157.a: "Accept. We cannot resist the tide."
 JAP_diplomacy.157.b: "Refuse. We will not become an outpost."
 JAP_diplomacy.158.t: "Micronesia Accepts the Chain"
 JAP_diplomacy.158.d: "Micronesia accepts Japan's terms. Agreements are signed, access is granted, and the islands become a controlled corridor of ports, airfields, and surveillance nodes within Tokyo's maritime perimeter.\n\nThe crisis ends without battle, but sovereignty narrows. Micronesia remains, yet its external direction now follows Japan's strategic compass."
 JAP_diplomacy.158.a: "Establish the protectorate."
 JAP_diplomacy.159.t: "Micronesia Rejects the Ultimatum"
 JAP_diplomacy.159.d: "Micronesia rejects Japan's demand and refuses to surrender its future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the island chain as a gap in its Pacific network that must be closed.\n\nIf Micronesia will not accept the framework by treaty, Japan will impose control by force. The chain will be secured."
 JAP_diplomacy.159.a: "Then we will take the stepping stones."
 JAP_diplomacy.160.t: "The Nauru Outpost Demand"
 JAP_diplomacy.160.d: "Tokyo has delivered its demand to Nauru, treating the island as a pin in the map that can still anchor surveillance, refueling, and reach across open water. The offer is framed as protection and guaranteed support, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns Nauru into an Imperial outpost.\n\nFor Nauru, the choice is stark. Submit and survive beneath a greater power, or refuse and risk becoming the battleground that proves Japan's point."
 JAP_diplomacy.160.a: "Accept. We cannot stand alone."
 JAP_diplomacy.160.b: "Refuse. We will not be reduced to a waypoint."
 JAP_diplomacy.161.t: "Nauru Accepts Japanese Protection"
 JAP_diplomacy.161.d: "Nauru accepts Japan's terms. Agreements are signed, access is granted, and the island becomes a small but vital node in Tokyo's Pacific network.\n\nThe crisis ends without battle, but sovereignty narrows. Nauru remains, yet its external direction now follows Japan's strategic line."
 JAP_diplomacy.161.a: "Establish the protectorate."
 JAP_diplomacy.162.t: "Nauru Rejects the Demand"
 JAP_diplomacy.162.d: "Nauru rejects Japan's ultimatum and refuses to trade independence for promises of protection. The refusal turns pressure into confrontation, and Tokyo now treats the island as an unsecured gap in its ocean perimeter.\n\nIf Nauru will not accept the framework by treaty, Japan will impose control by force. The outpost will be secured."
 JAP_diplomacy.162.a: "Then we will take the island."
 JAP_diplomacy.163.t: "The Equatorial Line Ultimatum"
 JAP_diplomacy.163.d: "Japan has issued its demand to Kiribati, a state scattered across the equator like markers on a navigator's chart. Tokyo's proposal is framed as protection and development, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns Kiribati into a chain of waypoints for surveillance and naval reach.\n\nThe message is simple. In the new Pacific order, there are no empty spaces. Kiribati must choose between submission beneath Japan's umbrella or confrontation against a power that intends to own the sea lanes."
 JAP_diplomacy.163.a: "Accept. We cannot resist the ocean's new master."
 JAP_diplomacy.163.b: "Refuse. We will not be absorbed into an empire."
 JAP_diplomacy.164.t: "Kiribati Accepts the Equatorial Line"
 JAP_diplomacy.164.d: "Kiribati accepts Japan's terms. Agreements are signed, access is granted, and the scattered atolls become a quiet but valuable part of Tokyo's Pacific network.\n\nThe crisis ends without battle, but sovereignty narrows. Kiribati remains, yet its external direction now follows Japan's compass."
 JAP_diplomacy.164.a: "Establish the protectorate."
 JAP_diplomacy.165.t: "Kiribati Rejects the Ultimatum"
 JAP_diplomacy.165.d: "Kiribati rejects Japan's ultimatum and refuses to surrender its future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the equatorial chain as a gap in its maritime perimeter.\n\nIf Kiribati will not accept the framework by treaty, Japan will impose control by force. The line will be secured."
 JAP_diplomacy.165.a: "Then we will take the chain."
 JAP_diplomacy.166.t: "The Atoll Bastion Demand"
 JAP_diplomacy.166.d: "Tokyo has issued its demand to the Marshall Islands, viewing the atolls as natural fortresses that can host airfields, logistics, and the instruments of sea control. The offer is framed as protection and guaranteed support, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns the Marshalls into bastions of Japan's central Pacific perimeter.\n\nThe message is clear. These islands will not be left as neutral dots on a chart. The Marshalls must choose between a managed peace beneath Japan's umbrella or a war fought over coral and runway."
 JAP_diplomacy.166.a: "Accept. We cannot survive a siege."
 JAP_diplomacy.166.b: "Refuse. We will not become a fortress for another power."
 JAP_diplomacy.167.t: "The Marshalls Yield"
 JAP_diplomacy.167.d: "The Marshall Islands accept Japan's terms. Agreements are signed, access is granted, and the atolls become disciplined bastions within Tokyo's ocean network.\n\nThe crisis ends without battle, but sovereignty narrows. The Marshalls remain, yet their external direction now follows Japan's perimeter plan."
 JAP_diplomacy.167.a: "Establish the protectorate."
 JAP_diplomacy.168.t: "The Marshalls Reject the Demand"
 JAP_diplomacy.168.d: "The Marshall Islands reject Japan's ultimatum and refuse to surrender their future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the atolls as an unsecured gap in its central Pacific defense line.\n\nIf the Marshalls will not accept the framework by treaty, Japan will impose control by force. The bastions will be secured."
 JAP_diplomacy.168.a: "Then we will take the atolls."
 JAP_diplomacy.169.t: "The Reefline Ultimatum"
 JAP_diplomacy.169.d: "Japan has issued its demand to Tuvalu, a thin chain of reefs that still matters in an ocean measured by reach and refueling points. Tokyo offers protection and support, but the structure is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns Tuvalu into a waypoint in Japan's southern perimeter.\n\nThe message is brutal in its simplicity. There will be no neutral islands in a contested Pacific. Tuvalu must choose between submission beneath Japan's umbrella or a confrontation that would drown a small state in a great power war."
 JAP_diplomacy.169.a: "Accept. We cannot withstand a storm of steel."
 JAP_diplomacy.169.b: "Refuse. We will not surrender our flag."
 JAP_diplomacy.170.t: "Tuvalu Accepts Japanese Protection"
 JAP_diplomacy.170.d: "Tuvalu accepts Japan's terms. Agreements are signed, access is granted, and the islands become a quiet node in Tokyo's maritime network.\n\nThe crisis ends without battle, but sovereignty narrows. Tuvalu remains, yet its external direction now follows Japan's perimeter plan."
 JAP_diplomacy.170.a: "Establish the protectorate."
 JAP_diplomacy.171.t: "Tuvalu Rejects the Ultimatum"
 JAP_diplomacy.171.d: "Tuvalu rejects Japan's ultimatum and refuses to trade independence for promises of protection. The refusal turns pressure into confrontation, and Tokyo now treats the reefline as an unsecured gap in its southern chain.\n\nIf Tuvalu will not accept the framework by treaty, Japan will impose control by force. The waypoint will be secured."
 JAP_diplomacy.171.a: "Then we will take the islands."
 JAP_diplomacy.172.t: "The Solomon Barrier Ultimatum"
 JAP_diplomacy.172.d: "Tokyo has issued its demand to the Solomon Islands, viewing the chain as a natural barrier that can seal the southwest Pacific. The offer is framed as protection and development, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant basing access that turns the Solomons into a fortified screen for Japan's maritime perimeter.\n\nThe message is clear. These islands will either serve Japan's order or be treated as an enemy foothold. The Solomons must choose between submission beneath the Rising Sun or a war fought across jungle airstrips and narrow seas."
 JAP_diplomacy.172.a: "Accept. We cannot survive a blockade."
 JAP_diplomacy.172.b: "Refuse. We will not become a fortress for another empire."
 JAP_diplomacy.173.t: "The Solomons Yield"
 JAP_diplomacy.173.d: "The Solomon Islands accept Japan's terms. Agreements are signed, access is granted, and the chain becomes a disciplined barrier of ports, airfields, and patrol zones under Tokyo's direction.\n\nThe crisis ends without battle, but sovereignty narrows. The Solomons remain, yet their external alignment now follows Japan's perimeter plan."
 JAP_diplomacy.173.a: "Establish the protectorate."
 JAP_diplomacy.174.t: "The Solomons Reject the Ultimatum"
 JAP_diplomacy.174.d: "The Solomon Islands reject Japan's demand and refuse to surrender their future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the chain as a dangerous gap in its southwest Pacific screen.\n\nIf the Solomons will not accept the framework by treaty, Japan will impose control by force. The barrier will be secured."
 JAP_diplomacy.174.a: "Then we will seize the chain."
 JAP_diplomacy.175.t: "The New Guinea Bastion Ultimatum"
 JAP_diplomacy.175.d: "Japan has issued its demand to Papua New Guinea, treating the island as a continental bastion that can dominate the approaches between Southeast Asia and the Pacific. The offer is framed as protection and guaranteed support, but it is a protectorate framework: align foreign policy with Tokyo, accept security supervision, and grant basing access that turns New Guinea into a fortress of air power, logistics, and forward defense.\n\nThe message leaves little doubt. Japan intends to anchor the southern theatre here. Papua New Guinea must choose between submission beneath Japan's shield or a war that will turn its coasts and highlands into front lines."
 JAP_diplomacy.175.a: "Accept. We cannot afford to become a battlefield."
 JAP_diplomacy.175.b: "Refuse. We will not be made into a fortress for another power."
 JAP_diplomacy.176.t: "Port Moresby Accepts"
 JAP_diplomacy.176.d: "Papua New Guinea accepts Japan's terms. Agreements are signed, access is granted, and the island becomes a disciplined bastion within Tokyo's southern perimeter, built around airfields, ports, and logistics hubs.\n\nThe crisis ends without battle, but sovereignty narrows. Papua New Guinea remains, yet its strategic direction now follows Japan's fortress plan."
 JAP_diplomacy.176.a: "Establish the protectorate."
 JAP_diplomacy.177.t: "Papua New Guinea Rejects the Ultimatum"
 JAP_diplomacy.177.d: "Papua New Guinea rejects Japan's demand and refuses to surrender its future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the island as the key obstacle to securing the southern theatre.\n\nIf Papua New Guinea will not accept the framework by treaty, Japan will impose control by force. The bastion will be taken."
 JAP_diplomacy.177.a: "Then we will seize the bastion."
 JAP_diplomacy.178.t: "The South Pacific Chain Demand"
 JAP_diplomacy.178.d: "Tokyo has issued its demand to Vanuatu, treating the islands as another link in the chain that can seal the southwest Pacific. The offer is framed as protection and development aid, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns Vanuatu into a waypoint for patrols, refueling, and regional control.\n\nThe message is clear. Japan is building a perimeter, island by island. Vanuatu must choose between a managed peace under the Rising Sun or a confrontation it cannot hope to sustain."
 JAP_diplomacy.178.a: "Accept. We cannot fight an empire at sea."
 JAP_diplomacy.178.b: "Refuse. We will not be absorbed."
 JAP_diplomacy.179.t: "Vanuatu Accepts Japanese Protection"
 JAP_diplomacy.179.d: "Vanuatu accepts Japan's terms. Agreements are signed, access is granted, and the islands become a quiet but useful node within Tokyo's southern perimeter.\n\nThe crisis ends without battle, but sovereignty narrows. Vanuatu remains, yet its external direction now follows Japan's strategic line."
 JAP_diplomacy.179.a: "Establish the protectorate."
 JAP_diplomacy.180.t: "Vanuatu Rejects the Demand"
 JAP_diplomacy.180.d: "Vanuatu rejects Japan's ultimatum and refuses to trade independence for promises of protection. The refusal turns pressure into confrontation, and Tokyo now treats the islands as an unsecured gap in its southwest Pacific chain.\n\nIf Vanuatu will not accept the framework by treaty, Japan will impose control by force. The link will be secured."
 JAP_diplomacy.180.a: "Then we will take the islands."
 JAP_diplomacy.181.t: "The South Pacific Keystone Ultimatum"
 JAP_diplomacy.181.d: "Japan has issued its demand to Fiji, treating the islands as a hub that can support fleet logistics and air operations across a wide arc of the South Pacific. The offer is framed as protection and guaranteed support, but it is a protectorate framework: align foreign policy with Tokyo, accept security supervision, and grant basing access that turns Fiji into a keystone of Japan's southern perimeter.\n\nThe message is unmistakable. Japan is not seeking friends, it is building an order. Fiji must choose between a managed peace beneath Japan's umbrella or a confrontation that will be decided by sea power."
 JAP_diplomacy.181.a: "Accept. We cannot afford to be made an example."
 JAP_diplomacy.181.b: "Refuse. Fiji will not submit."
 JAP_diplomacy.182.t: "Fiji Accepts the Keystone Terms"
 JAP_diplomacy.182.d: "Fiji accepts Japan's ultimatum. Agreements are signed, access is granted, and the islands become a central node in Tokyo's South Pacific network of ports, airfields, and patrol zones.\n\nThe crisis ends without battle, but sovereignty narrows. Fiji remains, yet its external direction now follows Japan's perimeter plan."
 JAP_diplomacy.182.a: "Establish the protectorate."
 JAP_diplomacy.183.t: "Fiji Rejects the Ultimatum"
 JAP_diplomacy.183.d: "Fiji rejects Japan's demand and refuses to surrender its future to foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the islands as the final gap in a southern perimeter it intends to close.\n\nIf Fiji will not accept the framework by treaty, Japan will impose control by force. The keystone will be secured."
 JAP_diplomacy.183.a: "Then we will take the hub."
 JAP_diplomacy.184.t: "The Samoa Line Ultimatum"
 JAP_diplomacy.184.d: "Tokyo has issued its demand to Samoa, treating the islands as a pivot between the central Pacific and the southern approaches. The offer is framed as protection and guaranteed support, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns Samoa into a waypoint in Japan's expanding ocean perimeter.\n\nThe message is blunt. Japan is drawing lines across the sea, and Samoa sits on one of them. Acceptance offers safety under a greater power, refusal risks becoming the lesson that convinces others."
 JAP_diplomacy.184.a: "Accept. We will survive, even if we must submit."
 JAP_diplomacy.184.b: "Refuse. Samoa will not bow."
 JAP_diplomacy.185.t: "Samoa Accepts Japanese Protection"
 JAP_diplomacy.185.d: "Samoa accepts Japan's ultimatum. Agreements are signed, access is granted, and the islands become a quiet but useful node in Tokyo's Pacific network.\n\nThe crisis ends without battle, but sovereignty narrows. Samoa remains, yet its external direction now follows Japan's strategic line."
 JAP_diplomacy.185.a: "Establish the protectorate."
 JAP_diplomacy.186.t: "Samoa Rejects the Ultimatum"
 JAP_diplomacy.186.d: "Samoa rejects Japan's demand and refuses to trade independence for promises of protection. The refusal turns pressure into confrontation, and Tokyo now treats the islands as an unsecured gap in its ocean perimeter.\n\nIf Samoa will not accept the framework by treaty, Japan will impose control by force. The line will be secured."
 JAP_diplomacy.186.a: "Then we will take the islands."
 JAP_diplomacy.187.t: "The Tongan Crown Demand"
 JAP_diplomacy.187.d: "Tokyo has issued its demand to Tonga, a kingdom whose harbors and sea lanes sit on the southern arc of the Pacific. The offer is framed as protection and partnership, but it is a protectorate framework: align foreign policy with Japan, accept security supervision, and grant access that turns Tonga into a waypoint within Japan's expanding maritime perimeter.\n\nThe message is clear. Japan is building an ocean order that leaves no room for independent pivots. Tonga must choose between a guarded peace beneath Japanese shadow or a confrontation decided by fleets."
 JAP_diplomacy.187.a: "Accept. We will keep the crown, even under a shadow."
 JAP_diplomacy.187.b: "Refuse. Tonga will not submit."
 JAP_diplomacy.188.t: "Tonga Accepts Japanese Protection"
 JAP_diplomacy.188.d: "Tonga accepts Japan's terms. Agreements are signed, access is granted, and the kingdom becomes a disciplined node in Tokyo's southern network.\n\nThe crisis ends without battle, but sovereignty narrows. Tonga remains, yet its external direction now follows Japan's strategic line."
 JAP_diplomacy.188.a: "Establish the protectorate."
 JAP_diplomacy.189.t: "Tonga Rejects the Demand"
 JAP_diplomacy.189.d: "Tonga rejects Japan's ultimatum and refuses to place its future under foreign supervision. The refusal turns pressure into confrontation, and Tokyo now treats the kingdom as an unsecured gap in its southern arc.\n\nIf Tonga will not accept the framework by treaty, Japan will impose control by force. The waypoint will be secured."
 JAP_diplomacy.189.a: "Then we will take the islands."
 JAP_diplomacy.190.t: "Notice to Washington: Pacific Withdrawal"
 JAP_diplomacy.190.d: "Tokyo has delivered a formal demand to Washington calling for the transfer of key American held Pacific islands. The message is blunt: foreign footholds in Japan's ocean perimeter are no longer tolerated, and these outposts must be relinquished to prevent further escalation.\n\nThe demand is framed as a chance to avoid war, but it is also a test of resolve. Accept and concede the stepping stones of power, or refuse and risk turning the Pacific into a battlefield between giants."
 JAP_diplomacy.190.a: "Accept the transfer."
 JAP_diplomacy.190.b: "Refuse. The Pacific is not theirs to claim."
 JAP_diplomacy.191.t: "Washington Yields the Outposts"
 JAP_diplomacy.191.d: "Against expectation, the United States accepts the demand. The islands are transferred, bases are evacuated, and Japan's maritime perimeter expands in a single stroke.\n\nThe crisis ends without war, but the meaning is unmistakable. A great power has stepped back, and the Pacific balance shifts toward Tokyo."
 JAP_diplomacy.191.a: "Secure the islands."
 JAP_diplomacy.192.t: "Washington Refuses"
 JAP_diplomacy.192.d: "The United States rejects Japan's demand and refuses to surrender its Pacific footholds. The refusal turns Tokyo's ultimatum into a direct confrontation between powers, and Japan now has both justification and motive to seek the outposts by force.\n\nThe Pacific tightens into front lines. If these islands will not be ceded by treaty, they will be taken by war."
 JAP_diplomacy.192.a: "Then we claim them by force."
 JAP_diplomacy.193.t: "Ultimatum to Paris: The Pacific Must Be Cleared"
 JAP_diplomacy.193.d: "Tokyo has delivered a formal demand to Paris for the transfer of France's Pacific island holdings. The note is wrapped in polite language, yet its meaning is unmistakable: distant empires will no longer keep footholds inside Japan's ocean perimeter.\n\nJapan offers a narrow path to avoid escalation. France can withdraw with ink and signatures, or refuse and accept that the dispute will be settled by fleets rather than diplomats."
 JAP_diplomacy.193.a: "Accept the transfer."
 JAP_diplomacy.193.b: "Refuse. France will not be pushed out."
 JAP_diplomacy.194.t: "Paris Withdraws from the Pacific"
 JAP_diplomacy.194.d: "France accepts Japan's demand. Flags are lowered, garrisons are ordered out, and the islands are transferred to Tokyo's control.\n\nThe crisis ends without war, but the message echoes across the world. Japan is not negotiating a sphere, it is enforcing one."
 JAP_diplomacy.194.a: "Secure the islands."
 JAP_diplomacy.195.t: "Paris Refuses"
 JAP_diplomacy.195.d: "France rejects Japan's ultimatum and refuses to surrender its Pacific holdings. The refusal turns Tokyo's demand into a direct confrontation, and Japan now has the justification to claim the islands by force.\n\nThe ocean grows smaller when great powers collide. If France will not withdraw by treaty, Japan will attempt to drive it out by war."
 JAP_diplomacy.195.a: "Then we will seize them."
 JAP_diplomacy.196.t: "Notice to London: Relinquish the Pacific Holding"
 JAP_diplomacy.196.d: "Tokyo has delivered a formal demand to London for the transfer of Britain's remaining Pacific island holding. The note speaks of regional stability and the end of distant interference, but its purpose is plain: Japan intends to clear foreign flags from the ocean it now claims to police.\n\nBritain is offered a choice between an orderly withdrawal and an unnecessary war far from home. Accept, and the matter ends on paper. Refuse, and the Pacific becomes yet another theatre where empires test each other's will."
 JAP_diplomacy.196.a: "Accept the transfer."
 JAP_diplomacy.196.b: "Refuse. Britain will not be driven out."
 JAP_diplomacy.197.t: "London Steps Back"
 JAP_diplomacy.197.d: "The United Kingdom accepts Japan's demand. The territory is transferred, the flag is lowered, and Tokyo adds another piece to its enforced maritime perimeter.\n\nThe crisis ends without war, but the symbolism is heavy. An old sea power has yielded ground, and Japan's claim to the Pacific grows bolder with every concession."
 JAP_diplomacy.197.a: "Secure the territory."
 JAP_diplomacy.198.t: "London Refuses the Demand"
 JAP_diplomacy.198.d: "Britain rejects Japan's ultimatum and refuses to surrender its Pacific holding. The refusal turns Tokyo's demand into a direct challenge, and Japan now has both motive and pretext to seize the territory by force.\n\nDiplomacy has reached its limit. If Britain will not withdraw by treaty, Japan will attempt to remove it by war."
 JAP_diplomacy.198.a: "Then we will take it."
 JAP_diplomacy.199.t: "Japanese Channels Expand in Pyongyang"
 JAP_diplomacy.199.d: "Japanese policy toward the North has entered a new phase. Through intermediaries, intelligence contacts, and carefully managed pressure, Tokyo has opened channels inside our political environment that were previously limited or closed.\n\nThis does not mean trust, and it does not mean alignment. It means Japan now has a temporary opportunity to shape decisions, influence factions, and test our resolve from within as well as from abroad."
 JAP_diplomacy.199.a: "We will watch these channels closely."
 JAP_diplomacy.200.t: "Sakhalin and the Kurils Lost"
 JAP_diplomacy.200.d: "Russian forces have retaken full control of Sakhalin and the Kuril Islands, reversing all gains made during the campaign. The operation has collapsed, and Tokyo can no longer sustain the effort. A ceasefire is the only remaining option.\n\nThe failure will carry consequences. Public confidence in the government's military judgment has been shaken, and the political cost of this misadventure will be felt for years."
 JAP_diplomacy.200.a: "We have no choice but to accept defeat."
 JAP_failed_sakhalin_war: "Aftermath of the Sakhalin War"
 JAP_failed_sakhalin_war_desc: "The failed military campaign over Sakhalin and the Kuril Islands has left deep scars on Japan's political landscape. Public trust in the government's strategic competence has eroded, military morale has suffered, and the diplomatic fallout continues to constrain Tokyo's foreign policy options."
 JAP_mars_colony1: "Mars Colony Amaterasu"
 JAP_mars_colony1_desc: "Named after Amaterasu, the sun goddess who illuminates the heavens, Mars Colony 'Amaterasu' stands as a radiant symbol of Japan's unity and leadership. Its presence inspires confidence at home and respect abroad."
 JAP_mars_colony2: "Mars Colony Kagutsuchi"
 JAP_mars_colony2_desc: "Named after Kagutsuchi, the god of fire, Mars Colony 'Kagutsuchi' is built around furnaces, refineries and heavy industry. Its purpose is clear: to turn Martian ore and energy into strength for Japan's factories."
 JAP_mars_colony3: "Mars Colony Tsukuyomi"
 JAP_mars_colony3_desc: "Named after Tsukuyomi, the god of the moon and night, Mars Colony 'Tsukuyomi' serves as a quiet observatory and research complex. From its labs and instruments, data flows back to Japan, deepening scientific understanding."
 JAP_mars_colony4: "Mars Colony Susanoo"
 JAP_mars_colony4_desc: "Named after Susanoo, the storm-bringing deity, Mars Colony 'Susanoo' is shaped into a rugged frontier outpost. Training grounds and experimental ranges make it a crucible for Japan's armed forces and doctrines."
 JAP_american_pressure_article_nine: "Under Pressure Of U.S. Tariffs"
 JAP_JP_USA_SOFA_1: "U.S.-Japan SOFA Framework"
 JAP_JP_USA_SOFA_1_desc: "U.S. forces in Japan operate under a Status of Forces Agreement that shields most personnel from Japanese courts and taxes, and gives the U.S. wide control over its bases. Local police, governors and residents must work around rules negotiated in Washington and Tokyo, and every crime, accident or noise complaint near a base is filtered through SOFA procedures before Japan can act."
 JAP_maritime_heavy_industry_corridor: "Maritime Heavy Industry Corridor"
 JAP_maritime_heavy_industry_corridor_desc: "Japan develops a continuous belt of shipyards, steelworks, and marine engineering firms along key coastal regions. Concentrating investment in this corridor increases capacity for building and maintaining warships, submarines, and support vessels, strengthening the industrial backbone of the fleet."
 JAP_article_9_restriction_tt: "Article 9 Restricting developing a Doctrine"
 JAP_article_9_navy_doctrine_tt: "Disable Naval Doctrine"
 JAP_article_9_air_doctrine_tt: "Disable Air Doctrine"
 JAP_article_9_special_forces_doctrine_tt: "Disable Special Forces Doctrine"
 JAP_moon_base_completed: "Kaguya Moon Base Established"
 JAP_usa_article_nine_refused: "Refused Article 9 Interpretation Change"
 JAP_diplomacy_shortcut: "外交"
 JAP_political: "政治"
 JAP_economy: "経済"
 JAP_military: "軍事"
 JAP_monarchism: "君主主義"
 JAP_great_east_japan_earthquake_shortcut: "東日本大震災"
 JAP_article_nine_remove_flag: "憲法9条を削除している"
 JAP_usa_article_nine_accepted: "Accepted Article 9 Interpretation Change"
 JAP_tokyo_startup_special_zone: "Tokyo Startup Special Zone"
 JAP_tokyo_startup_special_zone_desc: "We will concentrate deregulation, venture support, and investment incentives in the Tokyo metropolitan area to foster startup creation and commercialization."
 JAP_tokyo_startup_special_zone_idea: "Tokyo Startup Special Zone"
 JAP_tokyo_startup_special_zone_idea_desc: "Tokyo has been designated as a special regulatory reform zone to support startups, venture capital, and new business formation. By concentrating deregulation, investment access, and commercialization support in the capital region, the government aims to turn limited reform into a visible engine of growth."
 JAP_kansai_medical_special_zone: "Kansai Medical Innovation Zone"
 JAP_kansai_medical_special_zone_desc: "We will create a special zone for medical, care, and life science innovation in Kansai, accelerating private investment and practical implementation."
 JAP_kansai_medical_special_zone_idea: "Kansai Medical Innovation Zone"
 JAP_kansai_medical_special_zone_idea_desc: "Kansai is being developed as a special zone for medical, care, and life science innovation through regulatory flexibility and focused investment."
 JAP_kyushu_logistics_special_zone: "Kyushu Logistics & Port Special Zone"
 JAP_kyushu_logistics_special_zone_desc: "We will streamline logistics and port procedures in Kyushu, strengthening trade flows and improving the efficiency of regional industry."
 JAP_kyushu_logistics_special_zone_idea: "Kyushu Logistics & Port Special Zone"
 JAP_kyushu_logistics_special_zone_idea_desc: "Kyushu has been designated as a logistics and port reform zone to improve trade efficiency and regional connectivity. Streamlined procedures, infrastructure prioritization, and regulatory easing are intended to strengthen export capacity and make the region a more attractive base for industry and commerce."
 JAP_expand_special_zones_nationwide: "Expand Special Zones Nationwide"
 JAP_expand_special_zones_nationwide_desc: "The results achieved in selected strategic zones will be scaled nationwide, turning regulatory reform from a limited exception into a broader growth framework."
 JAP_tokyo_startup_special_zone_active: "Executed §Y$JAP_tokyo_startup_special_zone$§!"
 JAP_kansai_medical_special_zone_active: "Executed §Y$JAP_kansai_medical_special_zone$§!"
 JAP_kyushu_logistics_special_zone_active: "Executed §Y$JAP_kyushu_logistics_special_zone$§!"
 JAP_expand_special_zones_nationwide_done: "Executed §Y$JAP_expand_special_zones_nationwide$§!"
 JAP_japanese_economy_decisions: "日本経済再生"
 JAP_japanese_economy_decisions_desc: "長期停滞で固定化した需要不足、不良債権問題、企業部門の過剰債務・過剰設備や新産業の伸び悩みといった問題は、日本経済の活力を奪っている。金融システムの正常化、企業再編、需要喚起を通じて、再び成長できる経済構造を築かなければならない。\n\n§G以下の数値の進捗を進めることで関連国民精神のデバフが緩和され、やがて削除される！\n各国民精神の削除には各値が§Y85§!以上である必要がある。§!\n\n§Y需要回復の進捗§!: [?JAP_demand_recovery_progress]\n\n\n§Y危険な不良債権量§!: [JAP_dangerous_npl_stock_text]\n§Y銀行への信用§!: [?JAP_banking_confidence]\n§Gヒント§!: 銀行の再生は痛みを伴う。不良債権の処理は民需産業を破壊する可能性があるが、この確率は国家方針を進めることで減らすことができる。銀行のデバフ国民精神を改善するには、§Y危険な不良債権量§!を1段階目は§Y中§!、2段階目は§G少ない§!、削除には§G処理完了§!にする必要がある。\n\n\n§Y企業再編の進捗§!: [?JAP_corporate_restructuring_progress]\n§Gヒント§!: 企業と銀行は一心同体だ。企業のデバフを取り除くには先に銀行の同程度のデバフを取り除く必要がある。また、痛みを伴う国家方針を完了する必要もある。"
 JAP_entrenched_demand_shortfall_idea_2: "鈍い需要回復"
 JAP_entrenched_demand_shortfall_idea_2_desc: "Clearer price targets and support for households have pulled the economy away from its worst phase, but the recovery remains fragile. Consumption and investment are improving in places, yet not with enough force to lift the whole country. Demand is returning, but caution still hangs over the economy.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G60§!!"
 JAP_entrenched_demand_shortfall_idea_3: "残る需要の重し"
 JAP_entrenched_demand_shortfall_idea_3_desc: "Government measures to stimulate consumption have pushed the economy forward, but the caution left behind by years of stagnation remains deeply entrenched. Households and firms are moving more than before, yet a self-sustaining recovery still needs one final push. Japan's economy stands at the threshold of escaping stagnation, but it has not fully broken free yet.\n-------------\nYou can §Gremove§! this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G85§!!."
 JAP_banks_non_performing_loans_idea_1: "傷んだ銀行網"
 JAP_banks_non_performing_loans_idea_1_desc: "Non-performing loans remain piled deep within bank balance sheets, and many institutions can barely measure the full extent of their own wounds. Credit tightening and the withdrawal of lending are choking business activity, while depositors and markets alike no longer place full trust in the financial system. In Japan, the very banks meant to carry the flow of capital have become a burden on the economy.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to improve §YDangerous Bad Loan Stock§! to a level better than §GModerate§! and raise §YConfidence in the Banks§! to at least §G30§!!."
 JAP_banks_non_performing_loans_idea_2: "揺らぐ金融仲介"
 JAP_banks_non_performing_loans_idea_2_desc: "Stricter inspections and the disposal of bad loans are beginning to contain the worst of the disorder, but banks remain cautious and the flow of credit has not fully returned. Fear is receding, yet the financial system is still fragile, and Japan's banks continue to weigh on recovery rather than drive it.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to improve §YDangerous Bad Loan Stock§! to a level better than §GLow§! and raise §YConfidence in the Banks§! to at least §G60§!!."
 JAP_banks_non_performing_loans_idea_3: "残る信用の傷跡"
 JAP_banks_non_performing_loans_idea_3_desc: "Dangerous bad loans have been reduced significantly, and government measures have helped restore confidence in the financial system. Even so, banks have not fully abandoned their defensive posture, and the shadow of stagnation still lingers over credit supply. The crisis has receded, but Japan's financial sector has not yet fully recovered.\n-------------\nYou can §Gremove§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to bring §YDangerous Bad Loan Stock§! to §GResolved§! and raise §YConfidence in the Banks§! to at least §G85§!!."
 JAP_corporate_excess_debt_idea_1: "債務に沈む企業群"
 JAP_corporate_excess_debt_idea_1_desc: "Firms burdened by excess debt and excess capacity remain widespread, and unprofitable businesses and idle assets continue to weigh on the economy as a whole. Capital, talent, and management attention that should be moving toward growth sectors are still being absorbed by the preservation of weak firms. Japan's companies have not yet lost the competition entirely, but they have not regained the agility needed to win it either.\n-------------\nThe effects of this national spirit will be §Gmitigated§! if you use the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YCorporate Restructuring Progress§! to at least §G30§!, complete the national focus §Y$JAP_request_for_exit$§!, and do not have §Y$JAP_banks_non_performing_loans_idea_1$§!"
 JAP_corporate_excess_debt_idea_2: "遅れる企業再編"
 JAP_corporate_excess_debt_idea_2_desc: "The cleanup of unprofitable divisions and the review of rehabilitation plans have begun, but restructuring remains cautious and partial, with too much inefficiency still being preserved. Some capital is beginning to move toward stronger firms, yet the old structure has not been fully broken. Japan's economy is moving again, but its corporate sector still carries the habits of stagnation.\n-------------\nThe effects of this national spirit will be §Gmitigated§! if you use the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YCorporate Restructuring Progress§! to at least §G60§!, complete the national focus §Y$JAP_request_for_exit$§!, and do not have either §Y$JAP_banks_non_performing_loans_idea_1$§! or §Y$JAP_banks_non_performing_loans_idea_2$§!."
 JAP_corporate_excess_debt_idea_3: "残る非効率の影"
 JAP_corporate_excess_debt_idea_3_desc: "Corporate restructuring has advanced considerably, and the cleanup of damaged firms and unprofitable assets is now visible. Even so, defensive management habits and hesitation toward deeper restructuring have not fully disappeared. Japan's companies are finally beginning to recover their lightness, but one final push is still needed before they can throw themselves fully toward growth.\n-------------\nThis national spirit will be §Gremoved§! if you use the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YCorporate Restructuring Progress§! to at least §G85§!, complete the national focus §Y$JAP_request_for_exit$§!, and do not have §Y$JAP_banks_non_performing_loans_idea_1$§!, §Y$JAP_banks_non_performing_loans_idea_2$§!, or §Y$JAP_banks_non_performing_loans_idea_3$§!"
 JAP_declaration_price_target: "物価目標の宣言"
 JAP_declaration_price_target_desc: "景気を弱らせているのは、足元の需要不足だけではない。物価も賃金も動かないという思い込みが、家計と企業の行動を縛っている。明確な物価目標を掲げることは、国が停滞を当然視しないという意思表示であり、閉塞した期待を動かす第一歩となる。"
 JAP_declaration_price_target_decision: "物価目標の発表"
 JAP_declaration_price_target_decision_desc: "停滞を当然とする空気を崩すため、政府として明確な物価目標を示す。"
 Japan_economy.01.t: "物価目標の発表"
 Japan_economy.01.d: "政府はついに、停滞を当然のものとして受け入れない姿勢を明確にした。家計も企業も、これまでのように物価も賃金も動かない前提ではいられなくなる。まだ空気は重いが、日本経済に久々の方針が示された。"
 Japan_economy.01.a: "まずは期待を動かそう。"
 Japan_economy.17.t: "物価目標の達成"
 Japan_economy.17.d: "かつては誰も信じなかった物価の上昇が、ついに現実のものとなった。重要なのは数字そのものではない。停滞は永遠ではないという実感が、家計と企業の慎重姿勢を揺るがし始めていることだ。"
 Japan_economy.17.a: "空気は変わった。"
 Japan_economy.18.t: "物価目標は届かず"
 Japan_economy.18.d: "掲げられた目標は現実の動きにつながらず、停滞を打ち破るという政府の約束には疑いが広がり始めている。家計は再び支出に慎重となり、企業も需要の弱さを前に様子見姿勢を強めた。景気回復への期待は確かに傷つき、日本経済には重い空気が戻りつつある。"
 Japan_economy.18.a: "期待は簡単には戻らない。"
 JAP_price_target_mission: "物価上昇の約束"
 JAP_price_target_mission_desc: "目標を掲げただけでは足りない。期限内に物価上昇の兆しを示し、国民に変化が始まったと信じさせなければならない。"
 JAP_cash_transfers_households: "家計への直接給付"
 JAP_cash_transfers_households_desc: "将来不安が強いとき、景気回復は自然には始まらない。ならばまず、使えるお金を家計の手元に直接届けるべきである。特に低中所得層への給付は支出に結びつきやすく、冷え込んだ国内需要に即効性のある刺激を与える。"
 JAP_cash_transfers_households_decision: "低中所得者向け給付金"
 JAP_cash_transfers_households_decision_desc: "支出に結びつきやすい層へ給付を行い、冷え込んだ需要を直接押し上げる。"
 Japan_economy.19.t: "給付金が示した回復の兆し"
 Japan_economy.19.d: "家計に直接届いた資金は、冷え込んだまま眠ることなく、市場へ流れ始めている。特に低中所得層の支出増加は分かりやすく、長く閉じていた財布のひもにようやく緩みが見え始めた。"
 Japan_economy.19.a: "需要はまだ起こせる。"
 JAP_temporary_tax_cuts: "時限減税の実施"
 JAP_temporary_tax_cuts_desc: "支出をためらう空気を崩すには、今買う理由を作らなければならない。期限付きの減税は、家計に可処分所得の増加を実感させるだけでなく、先送りされた消費を前倒しさせる力も持つ。停滞した需要を揺り動かすには、有効な一手となる。"
 JAP_temporary_consumption_tax_cut: "時限消費税減税"
 JAP_temporary_consumption_tax_cut_desc: "今買う理由を作り、先送りされた消費を景気回復の追い風へ変える。"
 Japan_economy.20.t: "減税が示した回復の兆し"
 Japan_economy.20.d: "期限付きの減税は、家計に今動く理由を与えた。先送りされていた買い物が戻り始め、停滞の空気はわずかながら崩れつつある。短期策ではあるが、需要の鈍さを揺さぶるには十分な効果を見せている。"
 Japan_economy.20.a: "今こそ動く時だ。"
 JAP_active_public_investment: "積極的な公共投資"
 JAP_active_public_investment_desc: "民間が慎重なままでは、景気は待っているだけで改善しない。政府自らが需要を作り、地域経済や雇用に資金を流し込むことで、停滞の連鎖を断ち切る必要がある。公共投資は景気を下支えするだけでなく、国全体に前進の感覚を与える。"
 JAP_active_public_investment_decision: "公共投資の発注"
 JAP_active_public_investment_decision_desc: "政府主導で需要を作り、地域経済と雇用に資金の流れを生み出す。"
 Japan_economy.21.t: "公共投資が示した回復の兆し"
 Japan_economy.21.d: "政府が発注した事業は、数字以上の意味を持ち始めている。地域経済に資金が流れ、雇用に動きが生まれ、景気に対する悲観一色の空気にも変化が見え始めた。待つだけの停滞から、一歩踏み出した実感が広がっている。"
 Japan_economy.21.a: "国が景気を動かす。"
 JAP_improvement_private_investment_climate: "民間投資環境の整備"
 JAP_improvement_private_investment_climate_desc: "政府支出だけで景気回復を完結させることはできない。企業が新規投資に踏み切れる環境を整え、先行きへの不安を和らげることで、民間の成長力を呼び戻さなければならない。持続的な回復には、企業側の前向きな判断が不可欠である。"
 JAP_focus_improving_investment_climate: "投資環境改善への注力"
 JAP_focus_improving_investment_climate_desc: "企業が投資判断を下しやすい環境づくりを優先している。制度設計、調整、説得に政治資源を割くため、短期的には他分野へ回せる余力が細る。"
 Japan_economy.02.t: "民間の投資環境が改善"
 Japan_economy.02.d: "企業はようやく、守りに徹するだけでは機会を逃すと考え始めている。先行きへの不透明感は残るものの、新規投資をためらわせていた重しは少しずつ軽くなってきた。回復が官主導だけで終わらない可能性が見えつつある。"
 Japan_economy.02.a: "民間にも火がついてきた。"
 JAP_stimulating_demand_durable_goods: "耐久財需要の喚起"
 JAP_stimulating_demand_durable_goods_desc: "自動車や家電、住宅関連のような耐久財消費は、動き始めれば景気全体への波及も大きい。逆に停滞期には、真っ先に先送りされやすい分野でもある。ここを動かせれば、需要回復に目に見える勢いを与え、日本経済に久々の活気を取り戻せる。"
 JAP_stimulating_demand_durable_goods_decision: "耐久財購入キャンペーン"
 JAP_stimulating_demand_durable_goods_decision_desc: "先送りされがちな大型消費を後押しし、景気に目に見える動きを与える。"
 Japan_economy.22.t: "耐久財需要が示した回復の兆し"
 Japan_economy.22.d: "長く先送りされてきた大型消費に、ようやく動きが戻り始めた。耐久財の購入は関連産業への波及も大きく、家計が将来に対してわずかでも前向きになった証でもある。景気回復は、数字だけでなく街の空気にも表れ始めている。"
 Japan_economy.22.a: "勢いを広げよう"
 JAP_strict_audits_banks: "銀行への厳格監査"
 JAP_strict_audits_banks_desc: "問題を先送りし続けた結果、銀行の傷は見えにくくなり、金融不安だけが静かに広がった。まず必要なのは、帳簿の奥に隠れた危険な不良債権を洗い出し、現実を直視させることである。痛みは避けられないが、それなくして再生は始まらない。"
 JAP_strict_audits_banks_decision: "銀行への厳格監査"
 JAP_strict_audits_banks_decision_desc: "見えない傷を表に引きずり出し、危険な不良債権の実態を把握する。"
 JAP_strict_audits_banks_done: "$JAP_strict_audits_banks_decision$を実行した"
 Japan_economy.23.t: "監査が銀行の弱点を暴く"
 Japan_economy.23.d: "厳格な監査により、銀行の帳簿に残された弱点と危険な不良債権の実態が改めて明らかになった。市場の緊張はなお強いが、問題を曖昧なまま抱え続ける余地は確実に狭まっている。金融再生の道は遠い。それでも、傷の所在を一つずつ明らかにしていくことが、信用回復への第一歩となる。"
 Japan_economy.23.a: "弱点を見逃すな。"
 Japan_economy.24.t: "金融の膿を切り離す"
 Japan_economy.24.d: "危険な不良債権の処理が進み、銀行を蝕んでいた傷はようやく切り離され始めた。痛みを伴う整理ではあるが、放置された損失が未来を食い潰す状態は少しずつ終わりへ向かっている。信用回復にはまだ時間がかかるが、再生への道は確かに開かれた。"
 Japan_economy.24.a: "膿は出し切らねばならない。"
 JAP_injection_public_funds: "公的資金の注入"
 JAP_injection_public_funds_desc: "傷んだ銀行に損失処理と貸出再開の両方を求めるのは酷である。金融システムそのものへの不信を抑え込むには、国家が最後の支えとして資本を注ぎ込み、崩壊の連鎖を止めなければならない。政治的には重い決断だが、回避の余地は小さい。"
 JAP_injection_public_funds_decision: "銀行への公的資金の注入"
 JAP_injection_public_funds_decision_desc: "銀行の損失吸収力を高め、金融不安の連鎖を食い止める。"
 Japan_economy.25.t: "公的資本が不安を押し戻す"
 Japan_economy.25.d: "公的資本の注入により、銀行の損失吸収力は補強され、金融不安の広がりにも一定の歯止めがかかった。批判はなお避けられないが、銀行を不安定なまま放置する代償はさらに大きい。国家はここで、金融システムの揺らぎを抑え込む意思を改めて示した。"
 Japan_economy.25.a: "不安の連鎖を抑え込む。"
 JAP_new_lenders: "新規貸し手の参入"
 JAP_new_lenders_desc: "既存の銀行が守りに徹し続けるなら、資金の流れは細ったままである。ならば新たな貸し手を育て、金融の詰まりそのものを崩していくべきだ。競争と多様な資金供給の回路は、日本の金融に失われた柔軟さを取り戻させる。"
 JAP_new_lenders_idea: "新規貸し手の台頭"
 JAP_new_lenders_idea_desc: "既存銀行以外の資金供給主体が台頭し始めている。金融の目詰まりはまだ完全には解消されていないが、資金の流れに新しい逃げ道が生まれつつある。"
 JAP_protection_deposits: "預金保護の確立"
 JAP_protection_deposits_desc: "預金者が自分の金を守れないと感じた瞬間、銀行危機は現実になる。だからこそ、まずは預金が守られるという確かな土台を示さなければならない。信用を完全に取り戻すことはできなくとも、崩壊を防ぐ壁にはなり得る。"
 JAP_protection_deposits_decision: "預金保護の実施"
 JAP_protection_deposits_decision_desc: "預金者の不安を抑え、取り付け騒ぎの連鎖を防ぐ。"
 Japan_economy.26.t: "預金は守られる"
 Japan_economy.26.d: "預金保護の実施は、金融不安の最も危険な火種のひとつに歯止めをかけた。銀行への疑いは残っていても、少なくとも預金者が真っ先に逃げ出す構図は抑え込まれつつある。完全な信認には遠いが、危機を広げないための防波堤は築かれた。"
 Japan_economy.26.a: "信用の土台を守れ。"
 JAP_rehabilitation_small_medium_enterprises: "中小企業金融の安全網"
 JAP_rehabilitation_small_medium_enterprises_desc: "不良債権処理を進めるだけでは、日本経済の土台を支える中小企業まで資金難に追い込まれかねない。既存銀行に中小企業向け融資の維持を求めると同時に、再生金融スキームの整備、貸し渋りや貸し剥がしの監視を進めることで、金融再生の痛みを地域経済の崩壊へつなげない防波堤を築く。"
 JAP_rehabilitation_small_medium_enterprises_idea: "中小企業金融安定への注力"
 JAP_rehabilitation_small_medium_enterprises_idea_desc: "不良債権処理の副作用で中小企業向け資金供給が細ることを防ぐため、監督、調整、再生支援に政治資源を集中している。地域経済を守るうえで重要だが、その分だけ他分野へ割ける余力は限られる。"
 JAP_dangerous_npl_stock_5_name: "§R危険水域§!"
 JAP_dangerous_npl_stock_4_name: "§R非常に多い§!"
 JAP_dangerous_npl_stock_3_name: "§R多い§!"
 JAP_dangerous_npl_stock_2_name: "§Y中§!"
 JAP_dangerous_npl_stock_1_name: "§G少ない§!"
 JAP_dangerous_npl_stock_0_name: "§G処理完了§!"
 JAP_sorting_out_zombie_firms: "ゾンビ企業の仕分け"
 JAP_sorting_out_zombie_firms_desc: "長い停滞の中で、本来なら退出や再編を迫られるべき企業まで温存されてきた。問題は企業数の多さではなく、再生可能な企業と、資源を吸い続けるだけの企業が混在していることにある。まず必要なのは、延命と再建を見分ける冷静な選別である。"
 JAP_review_rehabilitation_plans: "再生計画の精査"
 JAP_review_rehabilitation_plans_desc: "提出された再生案を見直し、延命にすぎない計画と、立て直しに値する計画を切り分ける。"
 Japan_economy.27.t: "再生案精査"
 Japan_economy.27.d: "再生計画の精査によって、楽観的な見通しや曖昧な前提は削ぎ落とされつつある。すべての企業を救えるわけではないが、見込みのある再建と、ただの先送りとを分ける線は以前よりはっきりしてきた。企業再編は、数字と現実に基づくものになり始めている。"
 Japan_economy.27.a: "生き残る計画は選び抜く。"
 JAP_review_rehabilitation_plans_idea: "選別された再生計画"
 JAP_review_rehabilitation_plans_idea_desc: "再生計画の精査により、立て直しに値する企業と、延命に終わる企業の線引きが徐々に明確になりつつある。資本が過去の重荷に縛られ続けるのではなく、より成長の見込める分野へ向かうのではないかという期待が、企業部門に静かに広がり始めている。"
 JAP_support_for_recovery: "健全再生の後押し"
 JAP_support_for_recovery_desc: "苦しい企業すべてを切り捨てればよいわけではない。技術、雇用、地域経済を支える力をなお持つ企業には、立て直しの道を与える価値がある。守るべきものを見極め、再生可能な企業を前へ押し出すことは、日本経済の土台を守ることでもある。"
 JAP_management_guidance_businesses: "経営改善指導"
 JAP_management_guidance_businesses_desc: "先送りされた課題に踏み込み、企業へ現実的な改善と再編を促す。"
 Japan_economy.28.t: "経営の甘さに踏み込む"
 Japan_economy.28.d: "経営改善指導は、先送りされてきた問題や曖昧な判断に改めて向き合うことを企業へ迫った。耳の痛い内容であっても、重荷を抱えたままでは前へ進めない。企業部門にはまだ慎重さが残るが、少なくとも何を改めるべきかは以前より明確になっている。"
 Japan_economy.28.a: "現実から目をそらさせない。"
 JAP_support_painful_restructuring: "身を切る再編支援"
 JAP_support_painful_restructuring_desc: "痛みを伴う整理や縮小を支え、抱え込み続けられた負担を減らしていく。"
 Japan_economy.29.t: "痛みを伴う整理が進む"
 Japan_economy.29.d: "抱え込み続けられてきた負担に、ようやく整理の手が入った。縮小や切り離しには必ず痛みが伴うが、非効率を温存したままでは企業も経済も身動きが取れない。再編はまだ道半ばだが、日本企業は少しずつ重さを下ろし始めている。"
 Japan_economy.29.a: "軽くならなければ前へ進めない。"
 JAP_request_for_exit: "退出支援の整備"
 JAP_request_for_exit_desc: "生き残れない企業を無理に延命させれば、より多くの資本と人材が失われる。ならば必要なのは、痛みを伴っても混乱を最小限に抑えながら、市場からの退出を進める仕組みである。再編を前へ進めるには、再生だけでなく撤退にも道を用意しなければならない。"
 JAP_promotion_mergers_and_acquisitions: "企業統合の促進"
 JAP_promotion_mergers_and_acquisitions_desc: "細かく分かれたままでは、設備も人材も活かしきれない。企業統合は単なる数合わせではなく、重複した資産や事業をまとめ、競争に耐える規模と効率を作り直す手段である。守りの経営を続けるだけでは、日本企業に新しい推進力は戻らない。"
 JAP_promotion_mergers_and_acquisitions_idea: "企業統合制度の整備"
 JAP_promotion_mergers_and_acquisitions_idea_desc: "企業統合を進めやすくするため、制度と手続の整備に政治資源を割いている。再編の加速には有効だが、短期的には他分野へ使える政治力が圧迫される。"
 JAP_investment_new_sources_of_growth: "新たな成長への投資"
 JAP_investment_new_sources_of_growth_desc: "企業再編の目的は、古いものを減らすことだけではない。解放された資本と人材を、これから伸びる産業や新しい挑戦へ流し直してこそ、再編は未来への投資になる。日本企業に必要なのは、延命ではなく次の成長の核である。"
 JAP_investment_growth_industries: "成長産業への投資"
 JAP_investment_growth_industries_desc: "資本を伸びる分野へ振り向け、再編を防衛ではなく成長へ結びつける。"
 Japan_economy.30.t: "資本が成長産業へ動く"
 Japan_economy.30.d: "停滞した部門に縛られていた資本が、ようやく新しい成長の芽へ向かい始めた。変化はまだ全面的ではないが、守るための資金配分だけではなく、伸ばすための投資が少しずつ形になっている。企業再編は、後ろ向きな整理だけでは終わらなくなりつつある。"
 Japan_economy.30.a: "次は伸びる先に賭ける。"
 JAP_startup_campaign: "スタートアップ支援キャンペーン"
 JAP_startup_campaign_desc: "新しい挑戦者を増やし、停滞した企業構造に新陳代謝をもたらす。"
 Japan_economy.31.t: "新しい挑戦者たち"
 Japan_economy.31.d: "既存企業の内側だけでは生まれにくかった発想と活力が、新しい挑戦者たちによって少しずつ持ち込まれ始めている。小さな動きであっても、停滞した構造に風穴を開ける意味は大きい。企業の未来は、守り抜いた会社だけでなく、新しく生まれる会社にも託されている。"
 Japan_economy.31.a: "新しい力を育てよう。"
 JAP_startup_campaign_idea: "起業の後押し"
 JAP_startup_campaign_idea_desc: "新しい企業と挑戦者が生まれやすい環境づくりを進めている。既存企業の再編だけでは得られない新陳代謝を促せるだろう。"
 Japan_economy.03.t: "停滞に入る最初のひび"
 Japan_economy.03.d: "政府の後押しが効き、止まっていた支出にようやく動きが見え始めた。消費者心理は依然として弱いものの、長く続いた「どうせ何も変わらない」という空気に、初めてひびが入っている。"
 Japan_economy.03.a: "流れは変わり始めた。"
 Japan_economy.04.t: "広がり始めた需要回復"
 Japan_economy.04.d: "慎重に始まった需要喚起策は、今や経済のより広い範囲へ波及しつつある。家計は少しずつ財布のひもを緩め、先送りされていた購入も戻り始めた。企業も市場の変化を無視できなくなっている。回復はまだ確実ではないが、もはや願望だけではない。"
 Japan_economy.04.a: "回復を広げよう。"
 Japan_economy.05.t: "長い需要不況の終わり"
 Japan_economy.05.d: "需要はついに、自力で動き始めた。家計と企業の動きは互いを押し上げる循環に入り、長く続いた停滞から日本経済は着実に抜け出しつつある。なお多くの課題は残るものの、慢性的な需要不足の不況は、もはや国家の中心的な重荷ではない。"
 Japan_economy.05.a: "停滞に終止符を打とう。"
 Japan_economy.06.t: "金融の膿を洗い出す"
 Japan_economy.06.d: "厳格な監査は、長く先送りされてきた傷をついに白日の下へ引きずり出した。痛みを伴う作業ではあるが、問題を見て見ぬふりする時代は終わりつつある。不良債権の処理が始まり、市場もまた、日本の銀行がようやく現実と向き合い始めたことを感じ取っている。"
 Japan_economy.06.a: "まずは傷の深さを直視しよう。  "
 Japan_economy.07.t: "信用不安の後退"
 Japan_economy.07.d: "政府の様々な試みは、金融システムが崩れ去るのではないかという恐れを後退させた。銀行への疑いはなお残るものの、かつてのような全面的な不信ではない。日本の金融は、ようやく麻痺から立ち上がりつつある。"
 Japan_economy.07.a: "崩壊の連鎖は食い止めた。"
 Japan_economy.08.t: "銀行は再び貸し手へ"
 Japan_economy.08.d: "危険な不良債権は整理され、信用の回復も進んだことで、銀行はようやく守るだけの存在から抜け出し始めた。資金は再び企業や経済活動へ流れ込み、日本経済を縛っていた金融の重しは後景に退きつつある。なお課題は残るが、銀行危機はもはや国家の中心的な足かせではない。"
 Japan_economy.08.a: "金融はようやく前を向いた。"
 Japan_economy.09.t: "延命の論理にひび"
 Japan_economy.09.d: "長く温存されてきた非効率や、先送りされてきた経営上の問題に、ようやく本格的な見直しが入り始めた。痛みを伴う過程ではあるが、限られた資本と人材を抱え込まれたままにしていては、経済全体の活力は戻らない。日本企業はついに、守ることを優先するだけの段階から抜け出し始めている。"
 Japan_economy.09.a: "温存だけでは前に進めない。"
 Japan_economy.10.t: "再編は形を取り始めた"
 Japan_economy.10.d: "企業部門には、これまでとは違う動きが見え始めている。抱え込み続けられてきた資産や事業は少しずつ整理され、経営資源の向かう先にも変化が生まれつつある。古い構造はなお根強いものの、日本企業はようやく停滞を当然とする姿勢から離れ始めた。"
 Japan_economy.10.a: "再編をさらに前へ進めよう"
 Japan_economy.11.t: "資本は未来へ向かう"
 Japan_economy.11.d: "企業再編はもはや単なる後始末ではなく、成長へ向かう土台づくりへと姿を変えつつある。資本と経営資源は、徐々に過去の重荷から解放され、より前向きな動きへ向かい始めた。なお慎重さは残るものの、企業部門の停滞は、もはや国家の中心的な重荷ではない。"
 Japan_economy.11.a: "次は成長を掴み取る番だ。"
 JAP_expectation_of_being_rewarded: "報われることへの期待"
 JAP_expectation_of_being_rewarded_desc: "人々は、働いても生活が良くならないと感じる限り、慎重さを捨てない。景気回復を本物にするには、支出を刺激するだけでなく、努力すれば賃金や生活に返ってくるという期待を取り戻す必要がある。その感覚こそが、需要回復を自律的なものへ変えていく。"
 JAP_wage_negotiations: "賃上げ交渉を行う"
 JAP_wage_negotiations_decision: "賃金上昇への期待を回復させ、需要回復を一時的な刺激で終わらせない。"
 Japan_economy.12.t: "企業との賃上げ交渉"
 Japan_economy.12.d: "需要回復を一時的なものに終わらせないためには、賃金の伸びが必要である。しかし企業側には、先行き不安や収益圧迫への警戒も根強い。政府はここで、どこまで強く賃上げを求めるべきだろうか。"
 Japan_economy.12.a: "賃上げを促す。"
 Japan_economy.12.b: "圧力をかける。"
 Japan_economy.12.c: "民間に任せる。"
 Japan_economy.14.t: "賃上げが目標額に到達"
 Japan_economy.14.d: "賃金はついに、目に見える形で上向き始めた。重要なのは所得の増加だけではない。働けば報われるかもしれないという感覚が戻りつつあることこそ、長く弱かった消費心理を変えていく。需要回復は、より自律的な段階へ進み始めた。"
 Japan_economy.14.a: "回復は本物になりつつある。"
 Japan_economy.15.t: "賃上げは目標額に届かず"
 Japan_economy.15.d: "賃上げは目標には届かなかったが、交渉そのものが無駄だったわけではない。企業の慎重姿勢はなお強いものの、賃金を動かす必要性は広く意識され始めている。前進は小さいが、停滞した空気を崩すには意味のある一歩だった。"
 Japan_economy.15.a: "次につなげよう。"
