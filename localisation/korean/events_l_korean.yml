l_korean:
 TT_CURRENT_LEADER_DIES: "§R[ROOT.GetLeader]의 죽음!§!"
 md4.1.t: "[FROM.GetName]-[Root.GetName] Free Trade Agreement"
 md4.1.d: "[FROM.GetNameDef] is offering us a free trade agreement. We will have priority to export to and import from them."
 md4.1.a: "체결한다!"
 md4.1.b: "거절한다."
 md4.2.t: "[FROM.GetNameDef] Has Signed a Free Trade Agreement with Us"
 md4.2.d: "[FROM.GetNameDef] has accepted our offer to sign a free trade agreement. It will enter into force immediately."
 md4.2.a: "이는 양쪽 모두를 풍요롭게 할것이다!"
 md4.3.t: "[FROM.GetNameDef] Has Refused to Sign a Free Trade Agreement with Us"
 md4.3.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.3.a: "우리의 우월한 제품에 겁먹었군!"
 md4.4.t: "[FROM.GetName]-[Root.GetName] Military Cooperation Treaty"
 md4.4.d: "[FROM.GetNameDef] is offering us a military cooperation treaty. We will sell them equipment at a discounted price but this will make them more likely of buying from us instead of buying from our competitors."
 md4.4.a: "체결한다!!"
 md4.4.b: "거절한다."
 md4.5.t: "[FROM.GetNameDef] Has Signed a Military Cooperation Treaty with Us"
 md4.5.d: "[FROM.GetNameDef] has accepted our offer to sign a military cooperation treaty. It will enter into force immediately."
 md4.5.a: "이는 양쪽 모두를 강하게 할것이다!"
 md4.6.t: "[FROM.GetNameDef] Has Refused to Sign a Military Cooperation Treaty with Us"
 md4.6.d: "[FROM.GetNameDef] has refused our offer to sign a military cooperation treaty."
 md4.6.a: "저들은 우리가 강해질까봐 겁먹었군!"
 md4.7.t: "대통령의 섹스 스캔들"
 md4.7.d: "The [FROM.GetName] has come into a sex scandal. The scandal involved [FROM.GetName] sexually assaulting multiple people during countless years as politician. This is being viewed as a great abuse of power and trust among the people. Many people across the country have demanded a response from the [FROM.GetName] on the Allegations."
 md4.7.a: "나는 해명하길 거부합니다. 이것은 전면적인 거짓말입니다. 이는 나를 비방하기위한 것일 뿐입니다!"
 md4.7.b: "의혹을 인정합니다. 이것이 사실이라 알리게 되어 유감입니다."
 md4.8.t: "학교 총격 사건 대응"
 md4.8.d: "A school shooting has occurred [FROM.GetName]. This school shooting has received lots of media attention, and warrants a response from the President."
 md4.8.a: "이 문제를 해결하길 약속합니다."
 md4.8.b: "문제를 무시하고 지나간다."
 md4.9.t: "소득세에 대한 생각"
 md4.9.d: "The president of The [FROM.GetName] has an interview from the press about the income tax, and what he thinks should happen to them"
 md4.9.a: "제 생각엔 가난한 자들을 위해 소득세를 인상 하여야 한다고 생각합니다."
 md4.9.b: "제 생각엔 가난한 자들을 위해 소득세를 인하 하여야 한다고 생각합니다."
 md4.9.c: "제 생각엔 부자들을 위해 소득세가 인상 되어야 한다고 생각합니다."
 md4.9.e: "제 생각엔 부자들을 위해 소득세가 인하 되어야 한다고 생각합니다."
 md4.10.t: "빈곤층의 반응"
 md4.10.d: "빈곤층은 대통령의 생각에 불만족감을 드러냈습니다."
 md4.10.a: "오 안돼!"
 md4.11.t: "부유층의 반응"
 md4.11.d: "부유층은 대통령의 생각에 불만족감을 드러냈습니다."
 md4.11.a: "오 안돼!"
 md4.12.t: "부유층의 반응"
 md4.12.d: "대통령은 부자들을 위해 소득세를 인상하여야 한다고 말했으나 이것은 그들에게 이해가 되지 않았습니다. 이 생각 때문에 대통령 지지율이 손상되었습니다."
 md4.12.a: "오 안돼!"
 md4.13.t: "빈곤층의 반응"
 md4.13.d: "빈곤층은 부자들의 세금에 관한 대통령의 생각에 반응하렸습니다. 대다수의 빈곤층은 부자들을 증세하는 대신 감세하는것은 안된다고 생각합니다."
 md4.13.a: "오 안돼!"
 md4.14.t: "[FROM.GetName]의 항복 요구"
 md4.14.d: "[FROM. GetName](은)는 우리가 그들의 규칙에 복종하고 우리의 대군주가 될 것을 요구합니다."
 md4.14.a: "물론이지"
 md4.14.b: "절대 안된다"
 md4.15.t: "[FROM.GetName]의 수락"
 md4.15.d: "[FROM. GetName](은)는 우리가 그들의 규칙에 복종하고 우리의 대군주가 되는 것에 동의하였습니다."
 md4.15.a: "좋아"
 md4.16.t: "[FROM.GetName]의 거부"
 md4.16.d: "[FROM.GetName](은)는 우리의 대군주가 되는 것을 거부하였습니다"
 md4.16.a: "젠장"
 md4.17.t: "[FROM.GetName]의 동맹 수락"
 md4.17.d: "[FROM. GetName] 정부가 우리의 동맹 요청을 수락했습니다"
 md4.17.a: "좋아"
 md4.18.t: "[FROM.GetName]의 동맹 거절"
 md4.18.d: "[FROM. GetName] 정부가 우리의 동맹 요청을 거절했습니다"
 md4.18.a: "젠장"
 md4.19.t: "[FROM. GetName]의 영토 포기 선언"
 md4.19.d: "[FROM. GetName](은)는 우리의 영토 요구에 동의했습니다."
 md4.19.a: "좋아"
 md4.20.t: "[FROM.GetName]의 영토 할양 거부"
 md4.20.d: "[FROM. GetName](은)는 우리의 영토 요구를 거부했습니다."
 md4.20.a: "젠장"
 generic.1.t: "[FROM.GetName] Is Influencing Our Politics"
 generic.1.d_neutral_good: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has expressed a great interest in [Root.GetAdjective] politics. Recently this intensified when [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with a number of speeches and reading material distributed to the [Root.GetAdjective] people. \n\nNow even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda, and have started advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.d_bad: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has often tried to meddle in [Root.GetName]'s politics. Recently this has intensified, as [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with no respect for [Root.GetAdjective] political traditions. A number of speeches and other [FROM.GetRulingIdeology] material is already being distributed to the [Root.GetAdjective] people. It seems that even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda and have begun advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.a: "흥미롭군"
 generic.1.b: "저들이 감히!"
 generic.2.t: "[FROM.GetName] seeks to join the [Root.GetFactionName]"
 generic.2.d.a: "자유와 민주주의의 가치에 반대되는 위협이 증가하는 중, [alliance_applicant.GetAdjective] 는 우리를 자유의 수호자로 여기고 있습니다. 그들은 우리의 연합에 가입하여 민주주의를 위협하는 적을 우리와 함께 대항하며 우리의 보호를 받고자 합니다."
 generic.2.d.b: "현재의 세계 질서를 뒤집으려는 우리의 역경이 우리와 비슷한 자세의 국가들로부터 주목을 받아왔습니다. [alliance_applicant.GetAdjective] 는 그들의 번영하는 미래를 조각하기 위한 가장 좋은 기회가 우리와 함께 다가올 분쟁에서 함께하는 것이라 생각했으며,, 따라서 그들은 공식적으로 우리에게 합류하여 우리의 적에 대항하기를 제의하였습니다."
 generic.2.d.c: "[alliance_applicant.GetName](은)는 공산주의의 세계적 입지를 확고히 하기 위해서는, 사회주의 공화국 동지들의 연대가 필요함을 깨달았기에 결성되었습니다. [alliance_applicant.GetAdjective](은)는 드디어 우리와 동맹을 맺고 싶다는 요청을 해왔고, 우리는 국제 노동자들의 역경을 타파하는 주역이 될 것입니다."
 generic.2.d.e: "최근의 국제 정치 동향은 격변적이어서 세상이 떠나갈 듯 소란스럽습니다. [alliance_applicant.GetAdjective]은(는) 이런 격동의 시대에서 우리의 존재가 국가 보전을 위한 절호의 기회라고 여기는 것 같습니다. 그들은 우리의 동맹에 가입하고 싶다는 요청을 해왔고, 몰려드는 폭풍을 함께 이겨낼 것입니다."
 generic.2.a: "자유와 민주주의를 위해 일어선 자들은 우리와 함께 할 것이다."
 generic.2.b: "세계는 강한 자에게 지배된다!"
 generic.2.c: "우리가 함께라면 혁명은 일어나지 않을 것이다."
 generic.2.e: "그렇든 그렇지 않든 우리는 할 수 밖에 없다."
 generic.2.f: "더 나아질 것입니다!"
 generic.3.t: "[alliance_inviter.GetName]의 [alliance_inviter.GetFactionName] 가입 환영"
 generic.3.d: "[alliance_inviter.GetName] has decided to accept our request to join the [alliance_inviter.GetFactionName]. Henceforth we shall stand or fall together."
 generic.3.a: "우리는 함께 민주주의를 지킬 것이다."
 generic.3.b: "아무도 우리에게 대항할 수 없다!"
 generic.3.c: "노동자들의 맹새는 더 훌륭한 투사가 되는걸 요구할 수 없었다!"
 generic.3.e: "지금 우리는 서로의 이견을 한쪽으로 치워야 한다."
 generic.4.t: "[alliance_inviter.GetName]은(는) [alliance_inviter.GetFactionName]으로의 가입을 거절했습니다."
 generic.4.d: "[alliance_inviter.GetName]이(가) [alliance_inviter.GetFactionName]로의 가입을 요청한 우리의 요구를 거절했습니다. 우리는 그들의 도움 없이 살 수 있어야 합니다."
 generic.4.a: "그들이 자신들을 자유의 수호자라 자칭한다고?"
 generic.4.b: "그럼 우리는 그들을 똑같이 무너트리겠다!"
 generic.4.c: "그들의 혁명은 썩었다!"
 generic.4.e: "서로의 차이가 너무 컸다."
 generic.5.t: "[FROM.GetName] invites [Root.GetName] to the [FROM.GetFactionName]"
 generic.5.d.a: "세계 정세 속 의심의 눈길이 많은 가운데, [alliance_inviter.GetName]는 우정의 손길을 더 넓히려는지, 우리에게 보호의 약속과 더불어 자유와 민주주의 규범을 지키기 위해 함께 하자며 재촉하고 있습니다. [alliance_inviter.GetFactionName]'의 일원이 된다면, 우리 국민들의 자유는 더욱 안전해질 것입니다."
 generic.5.d.b: "강대국조차 동맹의 필요성을 절감하게 되는 때가 있으며, 때마침 [alliance_inviter.GetAdjective]가 우리에게 [alliance_inviter.GetFactionName]로의 초청을 해왔습니다. 우리가 수락한다면, 해 뜨는 곳의 우리 땅을 찾기에 충분한 기회가 될 것입니다."
 generic.5.d.c: "우리의 이념적 동맹 [alliance_inviter.GetName]'가 노동자 권익에 관한 우리의 값진 공헌을 높이 사, 오늘 아침 [alliance_inviter.GetFactionName]로의 초청을 해왔습니다. 다른 사회주의 공화국과 함께한다면, 더욱 강하게 혁명을 전파할 수 있을 것입니다."
 generic.5.d.e: "[alliance_inviter.GetAdjective]가 우리의 존재를 전략적 이익과 연관되었다고 생각하는 것 같습니다. 그리고 우리와 함께했을 때 더욱 이득이라 여기게 될 수 있으니 우리의 이념적 차이는 접어두는 게 좋을 것 같습니다. 오늘 아침, [alliance_inviter.GetAdjective] 외교관은 [alliance_inviter.GetFactionName]의 회원국이 되어달라는 초청장을 가져왔습니다."
 generic.5.a: "저들과 함께 일어서리라."
 generic.5.b: "몇천명만 희생하면 돼..."
 generic.5.c: "우리는 동지들과 함께 싸우리라!"
 generic.5.e: "이득이 되는 선택이다."
 generic.6.t: "[alliance_applicant.GetName]이(가) [alliance_inviter.GetFactionName]의 세력 초대를 승인했습니다."
 generic.6.d: "[alliance_applicant.GetName]이(가) 우리의 [alliance_inviter.GetFactionName]로의 가입 제안을 승인했습니다. 이제부터 우리는 한 배에 탔고, 다같이 이기거나, 다같이 죽을 겁니다."
 generic.7.t: "[alliance_applicant.GetName]이(가) [alliance_inviter.GetFactionName]로 초대해달라는 우리의 제안을 거절했습니다."
 generic.7.d: "[alliance_applicant.GetName]이(가) [alliance_inviter.GetFactionName]에 가입해달라는 우리의 제안을 거절하기로 결정했습니다. 저들의 도움 없이도 우리의 길을 헤쳐나가야 합니다."
 generic.7.a: "우리의 도움이 필요가 없나보다."
 ace_promoted.1.t: "에이스 조종사의 등장"
 ace_promoted.2.t: "용감한 에이스 조종사의 등장"
 ace_promoted.1.d: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive from the recent mission over [FROM.GetMissionRegion], but living through significant victories in many critical encounters.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.d_major: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive, but piloting [FROM.GetHerHis] [FROM.GetWing] with immense skill. Recently, [FROM.GetName] was on a mission over [FROM.GetMissionRegion] and was instrumental to the success of this critical encounter.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.a: "누가 감히 우리에게 맞서겠는가"
 ace_died.1.t: "Fighter Ace Callsign '[FROM.GetCallsign]' Killed Over [FROM.GetMissionRegion]"
 ace_died.1.d: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has been shot down in the line of duty during a mission over [FROM.GetMissionRegion]. Unfortunately, since [FROM.GetSheHe] has long been a public figure, their demise is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, [FROM.GetHerHis] death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.d_major: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has gone down in the line of duty. Pilots returning from the region report having spotted [FROM.GetHerHis] [FROM.GetWingShort] going down in flames over [FROM.GetMissionRegion] after taking heavy enemy fire. Unfortunately, since [FROM.GetSheHe] has long been a public figure, the demise of '[FROM.GetCallsign]' is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.a: "살아있는 전설이 차라리 낫다."
 ace_killed_by_ace.1.t: "Fighter Ace [FROM.GetFullName] Shot Down By Enemy Pilot"
 ace_killed_by_ace.1.d: "Pilots returning from [FROM.GetMissionRegion] report that a squadron of [Prev.Owner.GetAdjective] aircraft, led by the infamous pilot '[Prev.GetCallsign]', focused on chasing down [FROM.GetFullName]. After dodging several bursts from the enemy and taking down a number of hostile aircraft, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]', who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s plane caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to our nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.d_major: "Pilots returning from [FROM.GetMissionRegion] report that, a squadron of [Prev.Owner.GetAdjective] aircraft led by the infamous pilot '[Prev.GetCallsign]' focused on chasing down [FROM.GetFullName]. After taking down a number of enemy aircraft and dodging several bursts from the enemy, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]' in his [Prev.GetWingShort], who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s [FROM.GetWingShort] caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to the nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.a: "우리에겐 엄청난 손실이군"
 ace_killed_other_ace.1.t: "Fighter Ace [FROM.GetFullName] Shoots Down Callsign '[Prev.GetCallsign]'"
 ace_killed_other_ace.1.d: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, outwitting the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]'. '[FROM.GetCallsign]' used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]'' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]'' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.d_major: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, managing to outwit the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]''. [FROM.GetCallsign] used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.a: "A victory all of [FROM.Owner.GetNameDef] will remember!"
 aces_killed_each_other.1.t: "Fighter ace [FROM.GetFullName] has gone down"
 aces_killed_each_other.1.d: "During the latest mission our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s and [Prev.GetCallsign]'s aircraft were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.d_major: "During the most recent aerial sortie our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered [FROM.GetHerHis] [FROM.GetWingShort] through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s [FROM.GetWingShort] and [Prev.GetCallsign]'s [Prev.GetWingShort] were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.a: "우리의 큰 손실이다"
 election.1.t: "총선"
 election.1.d: ""
 election.1.a: ""
 election.2.t: "선거: 대중의 재무장 반대"
 election.2.d: "다가오는 선거에서, [Root.GetRulingParty]의 지지율이 여전히 높은 것은, 대중이 [Root.GetLeader]의 리더쉽을 신뢰하기 때문입니다. 그러나 군사 문제에 대한 [Root.GetName]의 집중도를 높이려는 당의 노력은 대중의 인기를 얻지 못했으며, 상당수의 국민은 이를 잘못된 호전적 애국주의로 간주하고 있습니다. 전쟁은 아직 국경까지 이르지 않았고 [Root.GetName]가 공격적인 행동을 취하는걸 바라는 사람은 별로 없습니다. 국가 안전에 대한 우리의 고려를 공유하는 다른 주요 당과 협력하면, 비록 지지율이 감소하겠지만 선거 후 지속적인 집권이 가능 할 것입니다."
 election.2.a: "민중의 소리는 듣지 않을 수 없다."
 election.2.b: "우리의 주권을 지키는 것이 최우선이다"
 election.3.t: "선거: 대중의 재무장 요구"
 election.3.d: "많은 유권자가 [Root.GetName]가 이 전쟁에 돌입 할 준비가되지 않았는지나,  또는 전쟁에 의해 발생할 수 있는 모든 일들에 대해 우려하고있다. 따라서 다음 선거에서는 우리나라의 국경 전쟁의 위협이 정치쟁점의 하나가 될 것 같다. 유권자는 우리 군사력을 강화하고 우리나라의 전쟁에 대한 대비를 굳히게 요구하고있다. 지금까지 [Root.GetRulingParty]가 대다수의 유권자로부터 지지를 받고 있지만, 우리가 유권자의 불안을 해소하지 않으면 더 과격한 세력에 지지를 빼앗길 우려가있다."
 election.3.a: "사람들은 안전을 느낄 권리가 있다."
 election.3.b: "많은 사람은 아직 외교적 해결을 지지하고 있다."
 election.4.t: "선거: 정부의 파시스트들?"
 election.4.d: "[Root.GetName]에 공격적인 민족주의 의견이 성장해, 파시스트 이념을 홍보하는 몇몇 당에 상승을 제공했습니다: 정부는 무력을 통한 힘을 강요했습니다. 특히 이들 중 하나는 현재 선거에서 인기가 있어, 우리의 정부를 형성하는데 그들과 협력을 시도할지 여부에 대해 [Root.GetRulingParty] 당 내에 토론으로 이어졌습니다. 그들은 공개적으로 우리의 국가의 기반이 되는 민주주의 이념을 거부하지만, 그들이 선거 자체에 참여하도록 선택하는 것이 사실은 우리 견해에 약간의 신뢰성을 빌려주어 대중의 지지를 인정하여 폭력적인 행동을 취하는걸 막을 수 있습니다."
 election.4.a: "공산주의자보다는 좋을 것이다!"
 election.4.b: "민주적 정당의 광범위한 협력이 바람직하다."
 election.5.t: "선거: 정부의 공산주의자들?"
 election.5.d: "[Root.GetName]에서 공산주의 운동은, 많은 노동계급의 불만과 급진적인 학자들에 의해 부추겨졌고 몇몇 정당을 형성할 정도로 충분히 커졌습니다. 이후 이 중 하나를 이번 선거에서 지원하기를 고려해 볼만하며, [Root.GetRulingParty]에 있는정치가들이 정부를 구성할  지원정당 물색 토론하기 시작했습니다. 비록 그들은 우리의 민주주의 제도를 고려해 정부를 뒤엎는 것 보다는 부르주아 독재를 펼치는 것을 막고, 정부와 협력해 그들이 원하는 변화를  만들어가길 원했습니다."
 election.5.a: "혁명보다 개혁이다!"
 election.5.b: "민주적 정당의 광범위한 협력이 바람직하다."
 election.6.t: "선거 : 소수 세력이 된 민주 정당"
 election.6.d: "[Root.GetName]의 정치는 점차 급진적으로 흐르고있다. [Root.GetName]의 대의제 체제와 민주주의의 이념을 내거는 정당이 이전에는 광범위한 지지를 얻고 있었지만, 이번 선거에서 많은 유권자들이 급진적인 정당으로 돌아섰다. 중도 정당은 더이상 서로의 차이를 보류한다고 해도 다수 파가되는 것이 이루어지지 않는다. 소수 약자에 의한 정권을 인정하지 않는다는 것이다, 우리는 파시스트나 공산주의자둘 중 하나에게 붙어야 하며 다른 선택의 여지가 없다."
 election.6.a: "파시스트와 연계하는 것이 [Root.GetName]을 강하게 한다."
 election.6.b: "공산주의자와 연계하여 사회 변혁을 추진한다."
 election.6.c: "취약하지만, 소수파 정부가 바람직하다."
 election.7.t: "대외 정책에 영향을 미치는 파시스트들"
 election.7.d: "우리의 정치 연합에 파시스트를 허용하는 것은 우리의 외교 정책에 영향을 미쳤습니다. 그들의 격렬한 민족주의에도 불구하고, 그들은 [Root.GetName]에서 준 영향력을 승인한 해외 동조자가 있습니다. 비슷한 이념적 성향의 전체주의 정부는 우리를 잠재적 동맹으로 보고 있습니다. 이들 국가에 대한 관계를 유지하면서, [Root.GetRulingParty]가 그들의 이념을 혐오 하는거에 상관 없이, 우리 정부를 지지하는 파시스트의 지원을 유지해야 할 필요가 있습니다."
 election.7.a: "큰 위협에 대항하기 위해 이 동맹국을 이용하자."
 election.7.b: "그런 우방을 써서 우리의 원수를 늘릴 필요는 없다."
 election.8.t: "대외 정책에 영향을 미치는 공산주의자들"
 election.8.d: "공산주의자들은 자신들을 국제 혁명의 일부분으로 간주하고 있으며 우리가 그들을 정부의 협력자로 택한 것은 많은 공산주의 국가의 주목을 끌었다. 공산당 대표는 현재 우리와 같은 종래의 정권을 버리고 프롤레타리아트의 독재를 취한 국가들과 밀접한 관계를 유지하고있다. 그들로부터 지원을 유지하고 싶은 경우, [Root.GetAdjective]가 외교 정책을 수립 할 때 이러한 관계를 인식 해 둘 필요가 있을지도 모른다."
 election.8.a: "우리도 그들과 뜻을 같이해야 할 것이다."
 election.8.b: "[Root.GetName]은(는) 스스로 붕괴의 길을 향해 간다."
 election.11.t: "선거 : 파시스트 우세"
 election.11.d: "이 선거는 그것을 대표하는 바로 그 기관에 파괴 되었습니다. [Root.GetAdjective] 대중의 다수는 선거를 폐지하고 독재 통치자를 취임시키고자 파시스트 당에 찬성 투표를 했습니다. 많은 사람들이 그들에게서 시작하는 이 권한을 허용해 민주 이념의 위반에 대항해 무기를 드는 동안, 다른 사람은 더 그들의 이념을 확실히 하고 폭력의 사용을 고려해보고 있습니다."
 election.11.a: "[Root.GetName]에 있어서 어두운 날이지만, 이것이 민중의 뜻이다."
 election.11.b: "우리는 싸우지 않고 자유를 포기하지 않는다!"
 election.12.t: "선거 : 공산주의 우세"
 election.12.d: "현재의 선거는 전 행정부에서 엇갈리는 반응과 함께, 공산당에 승리를 가져왔습니다. 새로운 통치자가 전체 국민을 대표한다고 주장하는 동안, 진정으로 '국민의 규칙'을 설립하는 것에 대한 논의로 이어지고, 우리는 노동 계급을 억압하고 조종하는 시도로 우리가 소중히 여기는 민주주의 제도의 많은 것들을 볼 수 있습니다. 일부 국가에서는, 피의 강으로 혁명이 시작되었습니다. [Root.GetName]에서는 일어나지 않았지만, 그들에게 끝날 수 있습니다."
 election.12.a: "성가신 일이지만, 녀석들은 정말 다수파가 된 것 같다."
 election.12.b: "놈들이 모든 반대 의견을 봉쇄하기 전에 우리가 멈추지 않으면 안된다!"
 election.13.t: "선거 : 유력자가 파시즘을 지지"
 election.13.d: "우리의 공업 생산을 위해 같이 일하기로 선정한 회사들 중에 배후에 있는 영향력 있는 기업가가 최근 정치에 대해 관리직원을들을 난처하게 만든 많은 발언을 했습니다. 그는 공개적으로 독재 정부를 옹호하고 파시스트와 동일한 외국 정부에 찬사했고, 암시적으로 [Root.GetName]이 이러한 통치 혜택을 얻을 것을 제안하고 있습니다. 재벌을 규탄하고 그의 이상은 회사와의 관계를 틀어지게 할 수 있지만, 억제되지 않은 그들을 내버려 두는 것은 그에게 모든 [Root.GetRulingParty]에 침식을 나타내는 선전 확산을 위한 강단을 주게 되는 것입니다."
 election.13.a: "그는 자신이 바라는 것을 말할 수있다. 하지만 우리가 그것을 인정할 필요는 없다."
 election.13.b: "우리는 [Root.GetName]의 보호와 발전을 위해 파시즘에 의지하지 않는다."
 election.14.t: "선거 : 전시 특례"
 election.14.d: "[Root.GetName]는 지금 전쟁중이었다. 원래대로라면 지금 쯤 선거가 있겠지만, 중요 안건들로 인해 정치 유세에 쓸 시간이 없다는 많은 사람들의 주장 혹은 지도자가 바뀔지 모르기에 선거는 취소되었다. 그러는 사이 어떤 사람들은 전쟁 때문에 선거를 넘겨버린다면 [Root.GetAdjective]의 민주주의가 황폐화되기 시작하는 것 아니냐는 주장이 있었다.  하지만 군사적 문제가 있는 동안에는 사람들의 우선 관심은 민주주의와는 멀어지게 되었다."
 election.14.a: "선거는 지금까지와 같이 개최된다."
 election.14.b: "이 전쟁을 통해 때 우리는 문제를 돌볼 수 있다."
 election.15.t: "선거 : 정권 논란"
 election.15.d: "다가오는 선거에서 사람들은 현 정부가 진행 중인 전쟁에 대한 능력에 대해 질문하기 시작했다. [Root.GetName]는 나라를 패배로 몰고간다는 여론에 상당히 시달렸다. 우리 국민들은 전쟁이 끝나기보다는 현 정부가 사라지길 원했다."
 election.15.a: "신뢰에 대한 위기가 오는것이 안타깝다."
 election.15.b: "민중의 단결을 유지하기 위해 정국을 바꿔 보자"
 election.16.t: "국민적 지지를 만끽하는 [Root.GetLeader]"
 election.16.d: "현재 선거에서 반대편이 존재하는 한 [Root.GetRulingParty]의 독재에 대한 비난이 증가할 것입니다. 그들은 선거가 의미가 있는지 아니면 애초에 보여주기식 연극에 불과한지 묻고 있습니다.\n\n국제사회가 선거에 대한 의문을 가지는 상황이기는 하지만 [Root.GetLeader]의 지지율은 여전히 높으며 국내에 경쟁할 상대가 없었습니다. 만일 [Root.GetName]이 인간에게 통치를 받지 않는다 해도 사람들은 지도자를 지지할겁니다... 최소한 한사람이라도 투표를 할 수 있다면 말입니다."
 election.16.a: "하나된 국민, 하나의 지도자."
 election.17.t: "선거 결과에 대한 의문"
 election.17.d: "[Root.GetLeader] 정권은 침묵으로 그 상대의 가장 강력히 무장했지만, 일부는 여전히 최근 선거에, 결과를 조작하고 반대하는 그들의 정책을 반대하는 의회를 선출 할 수 있는 명확한 활동을 무시하는 [Root.GetRulingParty]에 비난을 말하고 있습니다.\n\n정부는 국민들 자체에 대항해 분할하기 위한 노력으로 이러한 반대를 무시했습니다. 하지만, 사실은 지금에 침묵은, 그 요점을 만들었지만, 대부분의 사람들은 자신들의 규칙과 야당에 대한 의구심은 여전히 남아 있는거 같습니다."
 election.17.a: "해산시켜라!"
 political.1.t: "공산주의 부흥"
 political.1.d: "''전세계의 폭정에 대항해 노동자들이 일어선 가운데, 자칭 [Root.GetName]의 계급 의식에 눈을 뜬 사람들은 완전히 부패한 정치제도 속에서 아무것도하지 않고 방관하며 그 틀 안에서 변화가 일어나기를 기다리는 것은 낭비이며, 오직 혁명 이야말로 자신들을 구하는 유일한 방법이라고 주장한다!'\n\n그래서 [Root.GetAdjective] 공산주의 운동에서 새로운 목소리가 나오게 되었다. 자본주의의 독재와 같은 [Root.GetRulingParty]의 통치를 참조해, 그들은 필요한 경우 모든 수단을 동원해 정권에서 물러날 것을 요구하기 시작했다. 그것이 의미가 있을지 없을지는 두고봐야 할 일이다."
 political.1.a: "그런 아이디어를 지지하는 사람들이 정부 자체에 있을지도 모른다."
 political.1.a.tt: "국내에서 공산주의자에 의한 쿠데타가 일어날 가능성이 증가할 것이다."
 political.1.b: "국민을 위한 운동은 국민들의 지지를 얻어야 한다."
 political.1.b.tt: "민중이 공산주의 봉기를 일으킬 가능성이 증가합니다."
 political.2.t: "정부 안의 마르스크주의 동조자"
 political.2.d: "[Root.GetRulingParty]의 기본 방침은 혁명적 사회주의에 강하게 반대하는 것이었지만, 급진 좌익 국민주의세력을 계속 주의깊게 보면서, 일부 정부 사람들은 가능성을 열어두고 있다. 적어도 그들은 전면적인 내전 발발없이 해결책을 제시할 공산주의자 인물을 찾고 있다.\n\n[Root.GetLeader]에게 충성을 하는 세력에게는 배신자처럼 보일지 모르지만, 이런 반체제적인 목소리는 유혈사태 없이 체제전환을 이루게 만들어줄 수 있을 것이다."
 political.2.a: "여러가지 이유로 놈들도 경계하지 않으면 안 될 것이다."
 political.2.a.tt: "대중의 지지가 충분하다면, 쿠데타는 일어날 수 있다."
 political.3.t: "공산주의자들이 쿠데타를 결행"
 political.3.d: "공산주의 혁명과 연계된 대중 운동이 나라를 소란스럽고 혼란스럽게 하고 있는동안, 특정한 정치적 움직임을 실행하기 위해 조용하고 신중하게 때를 기다리고 있었습니다. 기다림은 이제 끝났습니다. 오늘, 지도자 [Root.GetRulingParty]와 군대는 국가를 장악하기 위해 준비를 끝마쳤으며, [Root.GetAdjective] 정부 내 다수의 의원들은 [Root.GetLeader]을(를) 가택 내에 구금하고 반란군의 편에 서서 협상을 시작했습니다.\n\n보호명령을 시행하여, 협상을 통해서 조력자들과 함께 새로운 사회주의 국가를 세우는데 성공하였습니다. 쿠데타는 누군가가 막기 전에 순식간에 끝이 났으며, 이러한 움직임을 보인 이들은 새로운 정권에 의해 구금되거나, 추방 혹은 처형당했습니다."
 political.3.a: "역사의 흐름은 과거를 흘려보낼 것이다."
 political.4.t: "계급 투쟁에 의한 [Root.GetName]의 분열"
 political.4.d: "공산주의 혁명 운동은, 실제로는 급진적인 학문 이론과 말썽꾼들 사이 주변에 인기가 되어, [Root.GetAdjective] 노동 계급 사이에 증가된 지지를 보이고 있습니다. 사실은 더 많은 사람들이 조금도 '계급'과 함께 스스로를 식별하기 위해 선택하는 것이 마르크스주의 이념으로 정부를 전복시키기 위해 적극적으로 찾는 자들을 넘어 확산되고 있다는 것을 의미합니다.\n\n'[Root.GetAdjective]'가 다른 무엇보다도 사람들과 같이 하던 시간을 갈망하는, [Root.GetRulingParty] 구성원들은 이러한 발전에 애통해 하고 있습니다. 이들의 우려는 근거가 없지 않습니다. 혁명이 이미 진행됨에 따라, 사회의 여러 층에서 발생하고 있어, 혁명을 멈추는데 너무 늦었을지도 모른다고 주장 할 수 있습니다."
 political.4.a: "사람들은 자신을 그들이 원하는대로 부르는 것이다."
 political.5.t: "군인들이 공산주의 저항세력에 투항"
 political.5.d: "'노동자가 관여하지 않는 분쟁들로 형제를 형제에게 돌려서게 해, 자본가와 민족주의자들을 위해 최전선에서 당신이 당신의 피를 흘려야 할 것입니다! 대신에 해외에서 투쟁하는 노동자들에 대해 무기를 들게 해서, 폭군을 전복하고 압제자에 대항하게 그들을 일으킵시다!'\n\n군대, 보통 애국심과 충성의 수호자는, [Root.GetName]에 빠르게 확산하는 공산주의 선전에 면역이 아니란 것이 증명 되었습니다. 병사들은 탈영하여, 그들의 국가를 위해 싸우기를 거부하고, 때로는 혁명을 준비해야한다고 주장하는 파르티잔 운동에 까지 합류 했습니다."
 political.5.a: "말에 따르면 그들은 단지 서로 다른 [Root.GetName]을 위해 싸우고 있을 뿐인지도 모른다."
 political.6.t: "[GetMonth] 혁명"
 political.6.d: "사람들을 대표하는 공산주의 운동 덕분에 [Root.GetName]가 순풍을 받고 있었는데 지난 몇달간 공산주의 정당이 상당한 지지를 받았기 때문이다. 하지만 혁명은 더이상 게릴라 전, 노동자의 불만과는 연관이 없다고 주장하는 사람들이 있었다. 뒤에서 폭동을 조직하는 자들은 이제 혁명 성공시 정부를 구성할 정도로 모였다.\n\n그럼에도 불구하고 만일 혁명이 지금 시작될 경우 [Root.GetName]가 내전이 시작되기는 어려웠다. 과연 혁명으로 나라를 둘로 쪼개서 그들의 성급함을 충족시킬 것인가 아니면 미래에 더 좋은 기회를 기다릴 것인가?"
 political.6.a: "역사를 만들고 싶다면, 오늘 움직여야 한다!"
 political.6.b: "혁명은 필연적이다. 하지만 지금이 아니어도 좋다."
 political.7.t: "파시즘 부흥"
 political.7.d: "'[Root.GetAdjective] 국민들은 [Root.GetRulingParty]의 무능한 규칙에 너무 오래 압박 받아왔습니다! 그들은 국민을 대표한다고 주장하지만, 우리 거리에 질서를 유지하는 것 조차 실패했습니다! 그들에 권력을 제거하는 것으로 우리가 이 나라 성장을 이끌수 있습니다!'\n\n[Root.GetName]의 파시스트 연설가는 현재 통치자와 정치 체제의 대한 그들의 생각을 숨기지 않았습니다. 이 같은 연설은 특히 군대의 보다 보수적인 부분에서 표명되는 대중 반대에 이용 했습니다."
 political.7.a: "고위 관료 중에도 동조하는 이가 있을 것이다."
 political.7.a.tt: "국내에서 파시스트에 의한 쿠데타가 일어날 가능성이 증가 할 것입니다."
 political.7.b: "젊은 세대가 이어갈 것이다."
 political.7.b.tt: "국내에서 파시스트에 의한 쿠데타가 일어날 가능성이 증가 할 것입니다."
 political.8.t: "군대 내 파시즘 동조자"
 political.8.d: "[Root.GetAdjective] 군의 여러 고위 인사들이, [Root.GetName]에 파시스트 운동을, 일부는 은밀히 일부는 공개적으로 지지를 표했습니다. 그들은 [Root.GetRulingParty]가 함께 국가를 유지하는데 병력이 얼마나 중요한지 잊어버렸다고 느꼇고, 점점 더 군대가 국가의 가장 중요한 기관인데 비해 정부에 의해 도구처럼 대접 받는데에 짜증이 났습니다. 그들 중 일부는 새로운 정부가 필요하다고 제안하기까지 했고, 다음 세기 후반에 [Root.GetName]를 어떻게 이끌지 알고 있습니다.\n\n이 세력은 주로 정치인들이 아니지만, 그들 중 일부는 국방부의 입장을 얻고 있습니다. 이러한 전개가 계속되면, 그들은 쿠데타를 실행하기에 충분한 정치적 지지를 가질 수도 있습니다."
 political.8.a: "The national spirit outranks the government."
 political.9.t: "파시즘 쿠데타"
 political.9.d: "누군가는 그들이 오고 있다고 말할 것이다. 또한 파시즘의 위험성을 경고하고 [Root.GetName]가 우리의 구원자가 될 것이라 예언했던 것이 현실이 되었는데, 군부 수장인 [Root.Capital.GetName]가 이끄는 [Root.GetRulingParty]이 정부를 전복시키고  권력을 잡았다. 망명했다고 소문이 난 [Root.GetLeader]는 사라졌고 쿠데타군은 작은 초기 저항세력을 만났을 뿐이었다.\n\n새로운 [Root.GetAdjective]의 리더쉽은 저항세력이 커질 수 없도록 만들었다. 계엄령이 내려졌고 변화가 일어나고 있었다. 무엇이든 간에 이후에는 큰 변화가 일어날 것이다."
 political.9.a: "강력한 국가는 민중을 보호하기 위해 필요한 것이다."
 political.10.t: "파시즘 내전"
 political.10.d: "민족주의적 감정을 부훙시켜 파시스트 운동의 시도가 어느 정도 성공을 보였지만, 이 이념에 대한 저항이 높게 남아있습니다. 현 정부를 전복시킬 음모를 꾸민 장군들은 [Root.GetAdjective] 인구 자체가 [Root.GetFascistParty]에 가고 있는거 같다는 불신에 실망했습니다. \n\n그들은 사람들이 결국 [Root.GetLeader]에게 싫증이 난다는 것이 확실히 남아있지만, 어떤 행동을 취해야 할 지 의견이 나뉘어졌습니다. [Root.GetName]'의 적들에게 행동을 취하기 전에, 일부는 쿠데타가 지금 실행 되어야 한다고 요청하고 있습니다. 하지만, 그렇게 대중의 지지가 적으면 국가를 내전 속으로 몰아 넣을 수 있습니다."
 political.10.a: "권력을 잡는 데 주저할 것 같으면 힘 같은건 무의미하다."
 political.10.b: "먼저 사람들을 단결시켜야한다. 통치는 그 다음이다"
 political.11.t: "파시스트 돌격대의 형성"
 political.11.d: "정치인과 군인은 항상 파시즘으로 서로 얽혀 있었다. 성장하는 정치 활동에 발맞춰 파시스트 정당들은 내부와 외부의 위협으로부터 자신들을 지킬 불법무장단체를 만들었는데 이중 내부 위협은 그들의 정치적인 반대파들이었다.  하지만 많은 사람들이 광기에 휩싸인 군국주의로 인해 군대에 자원하는 사람들이 늘어나는 상황에 걱정하기 시작했다.\n\n이 상황에서 정치 지도자들은 그들을 두렵게 만드는 적들을 지목했다. 노골적인 정치적 요소로 충만한 군대는 [Root.GetName]와 파시즘의 적을 찾기 시작했다."
 political.11.a: "오직 반역자들만이 공포를 느끼리라."
 political.12.t: "공산주의의 위협"
 political.12.d: "'[Root.GetLeader]은(는) [Root.GetName]이(가) 안정적이고 탄탄하다고 믿게 만들었을 것이다. 그런 거짓말이 시민들의 정신을 마비 시킨다는건 별로 놀랄 일도 아니었다. 위협이 바로 눈 앞까지 당도했는데도 말이다! 멀리 볼 것도 없이 당장 옆 나라에는 서로를 동무라 부르는 공산주의자들이 있고 우리 나라는 끝났다고 하고 있다. 언제까지 우리 나라는 끝났다고 할까? [Root.GetRulingParty]이(가) 우리를 저들의 위협으로부터 지켜줄까?'\n\n파시스트 활동의 증가로 [Root.GetName]은(는) 공산주의 혁명이 가까워졌다고 선동하고 있었다. 파시즘은 그저 또다른 실패한 이념적 실험이라 주장하는 많은 온건주의자들이 실제로 우려하는 점이기도 하다. 공산주의와 파시스트 정권중 하나를 고르라면 그들은 후자를 고를 것이다. 오히려 그들은 파시스트 정권을 열심히 지원할 것이다."
 political.12.a: "우리는 빨갱이의 위협에 대항하는 첨병이다!"
 political.13.t: "민주주의의 움직임"
 political.13.d: "'만약 우리가, 사람들의 목소리를 묵살한다면 어찌 우리자신이 [Root.GetName]을(를) 대변하는 목소리라고 할 수 있겠는가? 만약 우리가 반대가 두렵고,  공개적 비난이나 국민투표에 의한 추방이 두렵다면, 우리가 정말 두려운 것은 우리의 시민들에게 미움받고 욕을 먹는 것이다. [Root.GetRulingParty]은(는) 자신들의 정책에 자신이 없는거 아닌가?'\n\n조심스럽고 느슨하게 조직되었지만, 정부에 있는 열정적인 세력이 국가의 적들에 대해 덜 억압적인 정책을 밀어내기 시작했다. 그들은 심지어 만약 현재 안건이 미래에 위험을 가지더라도, 국민투표와 지방 당 대회를 통해 대중들이 정책결정에 관여하길 바랍니다."
 political.13.a: "시작을 위해 내부적으로 논의할 수 있다."
 political.13.a.tt: "선거가 열리도록 내부적 지원의 기회를 높일 수 있다."
 political.13.b: "우리의 정당함이 알려질 수록, 적들과 공공연히 대화할 수도 있을 것이다."
 political.13.b.tt: "국민들이 민주주의를 지지하는 목소리를 높이고 야당을 결성할 기회를 높일 수 있다."
 political.14.t: "[Root.GetRulingParty] 민주주의의 논의"
 political.14.d: "놀랍게도, 더 많은 국민 투표와 정권의 반대자에 대한 덜 억압적인 조치에 대한 요구는 내부 당 토론에서 일부 지지를 받고 있습니다. [Root.GetRulingParty] 지도부는 회의적으로 남아있지만, 여러 영향력 있는 회원들은 변화를 지지하고 있습니다.\n\n아마도 그들은 실제로 작은 변화가 있을것 이라고 확신하거나, 아마도 그들은 당 조직에 비밀스런 반역자들이며, 많은 수의 그들의 반대자를 가지게 될 것입니다. 이러한 변화에 대한 대중 선언을 해야 하는지에, 상관없이, [Root.GetName]의 지도자 중 일부는 타협 할 준비가 되어 있습니다."
 political.14.a: "선택은 반드시 자유와 죽음 사이에만 있는 것은 아니다."
 political.14.a.tt: "정책이 국민 다수의지지된다면 정부는 선거를 실시 할지도 모른다"
 political.15.t: "민주주의 야당의 결성"
 political.15.d: "반 [Root.GetRulingParty] 선동의 규제를 완화시킨다면 대중들의 반감이 널리 퍼질 수 있는위험성이 예상된다. 시위 조직과 유인물이 학문 기관과 [Root.GetName]을 좋아하지 않은 지역에서 주로 발견되고 있지만 이 활동이 퍼지고 있다는 증거는 없다.\n\n국가 지도자는 이 사안을 무시했다. 당의 지도력을 단단히 쥐고 있는 [Root.GetLeader]'는 대중들의 의견이 다양화 되는 것을 원하지 않았다. 이미 상황은 시작되었고 되돌아갈 수는 없었다."
 political.15.a: "운동은 탄압되지 않으면 자연스럽게 성장하는 것이다."
 political.16.t: "민중에 의한 선거의 요망"
 political.16.d: "한때 일부 지역에서만 있었던 대중들의 거부 시위는 현재 광범위한 곳에서 일어나고 있다. 거기로 사람들이 모이는 동안, [Root.GetRulingParty]는 기로에 선것을 알았다. 만일 우리가 이 선동이 퍼지도록 그대로 둔다면, 여야 모두 국민 투표를 요구해 국민들의 지지를 받지 못하는 것처럼 보일 것이다. 우리가 대다수의 의견을 통합시키려 노력했지만, 우리를 대항하도록 단결되었다."
 political.16.a: "만약에 개혁소요가 발생해도 이 반항을 진압함으로써 우리의 강함을 나타내는 것이다"
 political.16.b: "국민의 소리에 귀 기울이자."
 political.17.t: "[Root.GetName]에서 이루어지는 선거"
 political.17.d: "표현의 자유와 결사의 자유는 [Root.GetName]에서 점차 인정되고 있습니다. [Root.GetRulingParty]에서 선거를 요구하는 파벌은 비밀결사를 이용해 개혁가들을 지원하고 있습니다. 지난 몇개월간 [Root.GetLeader]'의 항의에도 불구하고 이 나라는 민주주의를 향해 느리지만 꾸준히 움직이고 있으며 자연스럽게 선거로 이어질 것으로 보입니다.\n\n[Root.GetAdjective]의 모든 시민들은 민주적 개혁에 찬성하고 있습니다.  하지만 안정된 개발이 보장되기 전까지 당 내에서는 선거를 여는 것이 좋은지에 대해 의견이 분분한 상태입니다."
 political.17.a: "[Root.GetRulingParty]의 충실한 사람들은이 결정을 지지 할 것이다"
 political.17.b: "선거가 개최되기 전보다 개혁에 대한 더 많은 지원을 필요로하고있다."
 political.18.t: "파시스트들의 국민투표 요구"
 political.18.d: "[Root.GetAdjective] 파시스트 활동이 빠르게 증가했지만 그들은 결코 권력을 잡기 전에 과반수 지지가 필요하다고 요구한 적은 없으며, 지속적으로 국가가 단결되고 그들의 지도자를 통해 나라가 확립되었다. 또한, 대중들의 지지가 빠르게 늘어났다. 많은 파시스트들은 현실을 외면하고, 대중의 바램을 대변하지 못하는 지배자 [Root.GetLeader]을(를) 위선자라 불렀다.\n\n국민투표 요청은 [Root.GetRulingParty]' 당원들의 전형적인 방해로 무산 됐지만, 어디까지나 정치적인 것에 불과 할 뿐이다. 우리가 지금 행동하지 않으면 파시스트들은 무력적 방법을 동원해 권력을 잡으려 할 것이다."
 political.18.a: "이 터무니없는 운동을 억제하라!"
 political.18.b: "놈들에게 귀 기울이지 마라."
 political.18.c: "민중이 원하는 것이라면 국민 투표를 개최하자."
 political.19.t: "공산주의자들의 국민투표 요구"
 political.19.d: "마르크스주의는 오래 전 [Root.GetName]에 뿌리를 내렸지만 널리 지지를 받은건 최근 일이다.  이 운동은 정치이념과 정치적 실천으로서 퍼져나갔고 불만에 찬 노동자들과 유명 연예인들의 지지를 받았다. 공산주의자들은 이들을 의식계급이라 불렀다. [Root.GetRulingParty]은 이것을 반란과 폭동의 지름길이라 불렀다.\n\n그들의 요구에 기꺼이 개혁을 하겠다고 한 [Root.GetLeader]를 신뢰하지 않은 과격한 공산주의자들은 즉각적인 국민투표를 통해 현 정부를 없애길 원했다. 우리는 이 거대한 흐름을 바꿀 수 없을 것이고 만일 그런다면 그건 더 많은 공산주의자들에게 혁명이라는 제거수단을 쓰게 만들 것이다."
 political.19.a: "반 [Root.GetAdjective] 활동은 그만 두게 해야한다!"
 political.19.b: "혼란의 원인이되는 것은 무시하자."
 political.19.c: "국민 투표가 피투성이의 반란보다는 좋을 것이다."
 political.20.t: "국민 투표를 요구하는 민주주의자들"
 political.20.d: "놀랍지 않게도, 그들이 거주하는 국가를 지배하는 사람들의 이념은 사람들 사이에서 인기가 매우 쉽게 성장하고 있습니다. 인민당 수사는 그저 [Root.GetLeader]의 정부가 약화된걸 의미하며 - 언론의 자유, 공직 선거, 출판의 자유 - [Root.GetRulingParty]'는, 당연히, 이 운동으로 대표되는 민주주의의 이념을 보이고 있습니다.\n\n그러나, 이러한 이념이 [Root.GetAdjective] 대중을 장악하고 있는 것은 부정 할 수 없습니다. 진정한 민주적 방식으로, 그들은 현재 정권 교체에 대한 공개 국민 투표를 요구했습니다. 현재는 쉽게 무지 할수 있지만, 이러한 이념은 아주 끈질기게 성장하는 방법이 있습니다. 우리가 평화로운 혁명을 만드는 것이 불가능 할 경우 우리는 어떻게 될까요?"
 political.20.a: "체포하라"
 political.20.b: "평소대로 진행 할 뿐이다."
 political.20.c: "만약 국민 투표를 받아 들인다면, 우리 유산은 유지 할 수 있을 것이다."
 political.21.t: "[Root.Capital.GetName]에서의 파시스트 행진"
 political.21.d: "법적으로 거의 권력을 잡을뻔한, 국민투표가 거절된 것으로 파시스트들은 대중의 지지와 협동심을 [Root.GetAdjective] 군사 쿠데타 시도를 위해 연결지었다.[Root.GetRulingParty]가 이끄는 정부는 그들의 주장과 요구를 받아들이지 않았고, 이는 알고있는 것처럼 싸움을 끝내고 [Root.GetName]을(를) 지킬 것입니다."
 political.21.a: "어떻게 해서든지 놈들을 막아야 한다!"
 political.21.b: "파시스트는 진정한 [Root.GetName] 정신을 품고 있다!"
 political.22.t: "공산주의자들의 봉기"
 political.22.d: "그들의 총선거 요구가 거부된 후, [Root.GetName]에서 활동하던 몇몇 공산주의 활동을 하던 개혁가들은 과격 분자들에게 영향력을 잃었다. [Root.GetRulingParty]이 대중이 지지하는 개혁을 거부하자 혁명이 일어나는 것이 훨씬 났다는 생각이 널리 퍼지게 됐고 이 활동을 이끄는 지도자들은 훨씬 쉽게 폭동을 일으킬 수 있었다. 폭동은 이제 나라의 국운을 건 전면적 내전으로 번졌다."
 political.22.a: "우리 나라를 휩쓴 녀석들을 용서하지 않는다!"
 political.22.b: "혁명의 불은 압제자의 피로 진화해야한다!"
 political.23.t: "[Root.GetAdjective]의 봄"
 political.23.d: "그들의 국민투표를 담당할 민주주의 기관을 만드는 시도가 실패한 이후, 제안을 밀었던 사람든을 구제불능의 [Root.GetLeader] 정권을 기각시켰다. 다양한 반정부 세력 연합은, [Root.GetName]에서 대변을 잘하는 정치체도를 만들기 위한 공통의 목적으로 단합해, 무기를 들고 [Root.GetRulingParty]이(가) 전복될 때까지 절대 쉬지 않겠다고 알렸다."
 political.23.a: "폭력적인 지배를 보여주지!"
 political.23.b: "마침내 [Root.GetName] 는 자유로워졌다!"
 political.24.t: "파시스트 모욕"
 political.24.d: "[Root.GetAdjective]의 국민들의 국가에 대한 자부심과 과거의 영광에 대한 광적인 모습은 사라진 것처럼 보인다. 열렬한 지지자들은 갑작스럽게 정신을 차렸고, 제복을 입고 가식적인 군국주의를 표방하는 것과 이에 대해 연설을 하는 것은 동정을 받기보다는 웃음거리가 됐다.\n\n한때 [Root.GetRulingParty]의 힘이자 [Root.GetAdjective] 파시즘은 터무니 없는 것이 되어버렸고 반대로 이들을 공격하던 극단주의자들은 큰 존경을 받았다. 모욕보다는 정치적 명칭이라는 것이 더 어울리는 말로 보인다."
 political.24.a: "광대 집단 이구나."
 political.25.t: "공산주의의 열기가 수그러들다."
 political.25.d: "많은 공산주의자들은 [Root.GetName]이(가) 소위 국제적 혁명이라 불리는 혁명의 다음 차례라고 예상했었다. 하지만 몇 달간의 파업과 붉은 깃발이 거리에 휘날린 뒤, 이 운동은 점차 잦아들었다. 혁명을 이끌어야할 노동자 계급은 [Root.GetLeader] 타도에 신경을 더 썼고, 다른 곳에서 일어난 이 혁명이 왜 중요한지에 대해서는 관심이 없었다. 그러는 사이 민중을 옥죄는 것을 없애야한다는 책을 쓴 지식인은 놀랍게도 나중에 그들의 편안한 생활 방식을 망치는 것에 대해서 나서고 싶지 않다는 것이 밝혀졌다.\n\n싼 맥주든 비싼 와인이든 술자리에서, 혁명에 대해 계속 이야기 하자면, 그저 이야기 거리로만 남을 것이다."
 political.25.a: "위선자 집단 이구나."
 political.26.t: "민주주의 운동의 침묵"
 political.26.d: "자유를 위한 선거와 법을 만들 의회에 대한 요구를 위해 [Root.GetLeader]' 정권에 대항한지 몇달이 지나자 활동이 무산되기 시작했습니다. 민주주의를 시끄럽게 주장하는 자들을 골칫덩이로 보는 사람들은 개혁보다 [Root.GetName]의 안정에 더 신경을 쓰기 시작했습니다.\n\n더 수상한건 이들을 이끌던 유명인사가 갑자기 사라지거나 활동을 그만뒀다는 점입니다. 아마 몇몇은 노력을 했음에도 실패하고 추방당했을지도 모릅니다.  하지만 [Root.GetRulingParty] 정부는 거기에 신경쓰지 않고 그들은 관련이 없고 알지도 못한다고 부인했습니다."
 political.26.a: "쉽게 포기해버리는군."
 political.27.t: "[Root.GetLeader]의 중립 외교 정책 포기"
 political.27.d_fascism: "최근 [Root.GetRulingParty]'의 권력이 커지자 [Root.GetLeader]은(는) [Root.GetName]이(가) 더 이상 중립 외교 정책을 고수하지 않을 것이라고 발표했습니다.\n'세계는 복잡하게 얽히고 있습니다. 우리의 홀로서기는 더 이상 안전하지 않습니다. 파시스트 동지들과 함께 적과 맞서야합니다. 이제 같은 편을 정하지 않으면, 우리는 쓸쓸히 멸망할 것입니다.'"
 political.27.d_communism: "최근 [Root.GetRulingParty]'의 권력이 커지고 난 뒤, [Root.GetLeader]은(는) [Root.GetName]이(가) 더 이상 중립외교 정책을 고수하지 않을 것이라고 발표했습니다. \n'세계는 복잡하게 얽히고 있습니다. 이 나라는 항상 원칙을 지킬 준비가 되어있습니다. 더는 우리의 안마당이 안전하지 않습니다. 중립은 예전처럼 안전하지 않고 강대국이 되고자 하는 나라들은 중립을 존중하지 않습니다.  우리를 탄압하려는 힘에 맞서기 위해 공산주의 형제들과 함께 일어서야 합니다. 우리를 억압하기를 원하는 자본주의에 맞섭시다. 일어서지 않는다면 우리는 쓸쓸히 멸망할 것입니다.'"
 political.27.a: "[Root.GetName]의 미래를 위해"
 political.28.t: "[Root.GetNameDef] 재통합"
 political.28.d: "우리의 국토를 황폐하게 한 끔찍한 내전의 끝이 다해감에 마침내 우리는 정치적인 합의에 다다랐다. 우리는 우리의 동료[Root.GetAdjective]의 눈을 마주보고 우리의 위대한 조국을 재건할 것이다. 우리의 내전을 이용하려고 한 적들은 이제  [Root.GetAdjective] 연합을 마주해야 할 것이다.\n\n새로운 [Root.GetRulingIdeology] [Root.GetName] 은(는) 다시는 분열되지 않을 것이다!"
 political.28.a: "마침내!"
 THREAT_FROM_EFFECT: "행동에 따른 위협"
 war_justification.1.t: "[Root.GetLeader] Speaks Against [FROM.GetName]"
 war_justification.1.d: "'Does [FROM.GetName] belong to the [FROM.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [FROM.GetAdjective] or does it belong to [Root.GetNameDef]?'\n\n[Root.GetLeader]'s speech today suggested that [Root.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [Root.GetAdjective] people are coming to accept that war is inevitable."
 war_justification.1.a: "미래는 [Root.GetName] 의 것이다!"
 war_justification.2.t: "[Root.GetLeader] Denounces [FROM.GetAdjective] Ideals"
 war_justification.2.d: "'The [FROM.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [Root.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[Root.GetRulingParty] has long derided the weakness of the [FROM.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.2.a: "[Root.GetName]은(는) [Root.GetLeader]의 지도 아래 단결했다."
 war_justification.3.t: "[Root.GetLeader] Warns Against [FROM.GetAdjective] Communism"
 war_justification.3.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[Root.GetLeader]'s hatred of communists has been well known since before [Root.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [FROM.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.3.a: "국가를 부정하는 자는 파멸을 맞이할 것이다."
 war_justification.4.t: "거대한 투쟁을 준비하는 [Root.GetName]"
 war_justification.4.d: "'The [FROM.GetAdjective] are a people who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [FROM.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [FROM.GetName] and [Root.GetName] has given way to a campaign to take their territory by force."
 war_justification.4.a: "우리의 승리가 역사를 쓸 것이다."
 war_justification.5.t: "[Root.GetLeader] Brings Revolution to [FROM.GetName]"
 war_justification.5.d: "'While we have consolidated the socialist society in [Root.GetName], many nations still suffer under the despots of old. The workers of [FROM.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [FROM.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [FROM.GetAdjective] people. With the revolution we have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [FROM.Capital.GetName] as well!'\n\n[Root.GetLeader] has abandoned all attempts at diplomatic rhetoric towards [FROM.GetRulingParty]-controlled [FROM.GetName]. The quest to eradicate all borders is now strictly focused on eradicating their borders."
 war_justification.5.a: "[FROM.GetAdjective] workers, your liberation is near!"
 war_justification.6.t: "[Root.GetLeader] Calls to Aid [FROM.GetAdjective] Workers"
 war_justification.6.d: "'Is there a greater lie than the supposed liberty of the [FROM.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [Root.GetAdjective] intervention.'\n\n[Root.GetLeader] has polemicized against the government in [FROM.GetName] for a long time in party meetings, but this rhetoric is now used more frequently in public. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.6.a: "부르주아 독재 정권을 부숴버리자!"
 war_justification.7.t: "[FROM.GetAdjective] Communism Failing"
 war_justification.7.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [FROM.GetRulingParty] of [FROM.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of the [FROM.GetAdjective] revolution, [Root.GetLeader] has expressed increased disappointment with how it has developed. The [Root.GetRulingParty] may have to intervene before it is too late."
 war_justification.7.a: "그들의 사회주의로의 전향을 도와줄 수 있는 시간은 아직있다."
 war_justification.8.t: "[Root.GetLeader] Calls for Crushing [FROM.GetAdjective] Nationalism"
 war_justification.8.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [FROM.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [FROM.GetAdjective], but the animosity has intensified lately. It now appears that conflict will arise sooner rather than later."
 war_justification.8.a: "파시스트에게 죽음을!"
 war_justification.9.t: "Diplomacy with [FROM.GetName] Breaks Down"
 war_justification.9.d: "'Despite our attempts to find a diplomatic solution to our conflict with [FROM.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [FROM.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [FROM.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[Root.GetAdjective] intervention in [FROM.GetName] has been a hot issue, with some politicians in the opposition claiming that [Root.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.9.a: "가끔은 분쟁이라는 고된 길을 갈 필요가 있다."
 war_justification.10.t: "[Root.GetLeader] Calls for Intervention in [FROM.GetName]"
 war_justification.10.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [FROM.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [Root.GetAdjective] nor the [FROM.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [Root.GetAdjective] invasion of [FROM.GetName] in the future. History may surprise us yet."
 war_justification.10.a: "[FROM.GetName] is a dubious democracy anyway."
 war_justification.11.t: "붉은 위협에 맞서 연설한 [Root.GetLeader]"
 war_justification.11.d: "'Without a doubt, [FROM.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [FROM.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe threat of subversive activity undermining our democracy, fueled by [FROM.GetAdjective] ambitions, has become a hotly debated topic recently. While representatives in opposition have called this a Red Scare aimed at pursuing war with [FROM.GetName], the rhetoric of the [Root.GetRulingParty] has been highly successful so far."
 war_justification.11.a: "폭력적인 이념을 따르는 저들에게, 폭력 말고 무슨 반응을 기대 할 수 있겠는가?"
 war_justification.12.t: "[Root.GetLeader] Confronts [FROM.GetAdjective] Fascism"
 war_justification.12.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [FROM.GetRulingParty] now holds [FROM.GetName]. People may argue that we should not provoke conflict, that we should trust [FROM.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nPeople who have long hoped to avoid a direct confrontation with [FROM.GetName] have now been strongly opposed by [Root.GetLeader], who argues that we in Machiavellian terms are merely postponing war to the advantage of the enemy. At this rate, we may strike the first blow after all."
 war_justification.12.a: "그들이 사라질때까지 우리 시대에 평화는 없다."
 war_justification.13.t: "[Root.GetLeader] Calls for War Against [FROM.GetName]"
 war_justification.13.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [FROM.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\n[Root.GetLeader]'s hostile rhetoric towards [FROM.GetName] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of our leader."
 war_justification.13.a: "그것은 어려운 결정일지 모르지만 우리는 반드시 그것을 후원해야합니다."
 war_justification.14.t: "[Root.GetLeader] Challenges [FROM.GetAdjective] Pretensions"
 war_justification.14.d: "'[FROM.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [FROM.GetName] long held by the [Root.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [FROM.GetAdjective] people want to avoid war, [Root.GetLeader] claims that their elected leaders have provoked it through their arrogance."
 war_justification.14.a: "우리가 겪어온 시련이 얼마나 우릴 강력하게 했는지 그들은 모른다."
 war_justification.15.t: "[Root.GetLeader] Wants to Restore Order in [FROM.GetName]"
 war_justification.15.d: "'The [Root.GetAdjective] national spirit is strong, but not all nations are so fortunate. [FROM.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [Root.GetName] against this threat.'\n\nWhile the [Root.GetRulingParty] has always opposed communism, [FROM.GetName] has been a target of particular attacks in recent speeches. Whether or not the attack on the [Root.GetAdjective] nation from communists is a real threat, the preemptive attack on [FROM.GetAdjective] communism is already in the works."
 war_justification.15.a: "혁명으로 살해당한 사람들을 위한 복수다!"
 war_justification.16.t: "[Root.GetLeader] Calls Out [FROM.GetAdjective] Oppressors"
 war_justification.16.d: "'My opponents would have you believe that my rule is like that of the [FROM.GetRulingParty] in [FROM.GetName]. They could not be more wrong. While [FROM.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [Root.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [Root.GetLeader] regime has adopted a hostile policy towards the [FROM.GetAdjective] nation. Whatever our leaders may be called, fascist is a word reserved for our enemies."
 war_justification.16.a: "전통과 현실주의는 항상 광신과 두려움을 극복해왔다."
 war_justification.17.t: "[Root.GetLeader] Questions [FROM.GetAdjective] Sovereignty"
 war_justification.17.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [Root.GetName] ends and [FROM.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [Root.GetLeader]'s recent speeches, an invasion of [FROM.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.17.a: "이 대의를 뒷받침할 필요가있다!"
 war_justification.18.t: "[Root.GetLeader] Questions the Motives of [FROM.GetName]"
 war_justification.18.d: "'There is no doubt that [FROM.GetName] is preparing for war. The changes in economic policy make it plain to see that the [FROM.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [Root.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [Root.GetRulingParty] have turned their eyes towards [FROM.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [Root.GetName] is preparing for war."
 war_justification.18.a: "적어도 전쟁을 통해, 이 갈등에 종지부를 찍을 수 있을 것이다."
 war_justification.19.t: "[Root.GetLeader] Angered by [FROM.GetAdjective] Posturing"
 war_justification.19.d: "'Those naïve citizens of [Root.GetName] who imagine the [FROM.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [FROM.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nThe [FROM.GetAdjective] military presence close to our territory has sparked increased concern as this nation appears more and more to be the enemy of the [Root.GetRulingParty]. Whether it is the cause or the effect of their polemic is a matter of contention."
 war_justification.19.a: "상관없이, 우리는 국민들이 전쟁을 준비 하게끔 해야 한다."
 war_justification.20.t: "[Root.GetLeader] Advocates Invasion of [FROM.GetName]"
 war_justification.20.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [FROM.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [Root.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [Root.GetRulingParty] leaders, most prominently [Root.GetLeader], has been calling the public to support an invasion of [FROM.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.20.a: "그 나라는 이 중요한 결정에서 한발 물러나 있다."
 war_justification.201.t: "[FROM.GetLeader] Speaks Against [Root.GetName]"
 war_justification.201.d: "'Does [Root.GetName] belong to the [Root.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [Root.GetAdjective] or does it belong to [FROM.GetName]?'\n\n[FROM.GetLeader]'s speech today, suggested that [FROM.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [FROM.GetAdjective] people have accepted that war is inevitable. [Root.GetName] must also prepare."
 war_justification.201.a: "왜 우리가 평화 속에서 살아가도록 허락되지 않는 것인가?"
 war_justification.202.t: "[FROM.GetLeader] Denounces [Root.GetAdjective] Ideals"
 war_justification.202.d: "'The [Root.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [FROM.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[FROM.GetRulingParty] has long derided the weakness of the [Root.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.202.a: "As expected from fascist scum like [FROM.GetLeader]."
 war_justification.203.t: "[FROM.GetLeader] Warns Against [Root.GetAdjective] Communism"
 war_justification.203.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[FROM.GetLeader]'s hatred of communists has been well known since before [FROM.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [Root.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.203.a: "그들이 우리의 대의을 두려워한다면 그것은 그들의 국민을 두려워하는 것이다"
 war_justification.204.t: "[FROM.GetName] Prepares for Great Struggle"
 war_justification.204.d: "'The [Root.GetAdjective] are a people, who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [Root.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [Root.GetName] and [FROM.GetName] has given way to a campaign to take their territory by force."
 war_justification.204.a: "올테면 와보라지!"
 war_justification.205.t: "[FROM.GetLeader] Bring Revolution to [Root.GetName]"
 war_justification.205.d: "'While we have consolidated the socialist society in [FROM.GetName], many nations still suffer under the despots of old. The workers of [Root.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [Root.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [Root.GetAdjective] people. We have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [Root.Capital.GetName] as well!'\n\n[FROM.GetLeader] has abandoned all attempts at diplomacy with our government. The communist task of eradicating all borders is now strictly focused on eradicating our borders."
 war_justification.205.a: "[Root.GetLeader]가 혁명만 외쳐대는 기회주의자보다는 좋은 지도자이다!"
 war_justification.206.t: "[FROM.GetLeader] Calls to Aid [Root.GetAdjective] Workers"
 war_justification.206.d: "'Is there a greater lie than the supposed liberty of the [Root.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [FROM.GetAdjective] intervention.'\n\nUnwilling to accept that our people may be satisfied without their social experiments, the communist regime in [FROM.GetName] has openly threatened to attack our nation. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.206.a: "그들이 우리에게 강제한다고 한다면, 그들의 신념을 믿을 때 장점이 무엇인가?"
 war_justification.207.t: "[Root.GetAdjective] 공산주의의 실패"
 war_justification.207.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [Root.GetRulingParty] of [Root.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of [Root.GetRulingParty]'s victory in [Root.Capital.GetName], [FROM.GetLeader] has drifted away from [Root.GetLeader]'s philosophy. The conflict has escalated to the point where they are preparing to invade to enforce their brand of socialism on us."
 war_justification.207.a: "혁명이 [Root.GetAdjective]국민에게 미치는 영향을 그들은 이해고 있지 않다."
 war_justification.208.t: "[FROM.GetLeader] Calls for Crushing [Root.GetAdjective] Nationalism"
 war_justification.208.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [Root.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [Root.GetAdjective], but the animosity has intensified lately. Hearing [FROM.GetLeader] speak, it appears that conflict will arise sooner rather than later."
 war_justification.208.a: "공산주의에게 죽음을!"
 war_justification.209.t: "무위로 돌아간 [Root.GetName]과의 외교"
 war_justification.209.d: "'Despite our attempts to find a diplomatic solution to our conflict with [Root.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [Root.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [Root.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[FROM.GetAdjective] intervention in our domestic affairs has been a hot issue, with some politicians in their opposition claiming that [FROM.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.209.a: "놈들이 생색내며 하는 말은 우리에게 위협이 되지 않을 것이다"
 war_justification.210.t: "[FROM.GetLeader] Calls for Intervention in [Root.GetName]"
 war_justification.210.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [Root.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [FROM.GetAdjective] nor the [Root.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [FROM.GetAdjective] invasion of [Root.GetName] in the future. History may surprise us yet."
 war_justification.210.a: "[FROM.GetName] is a dubious democracy anyway, pursuing such aggressive action."
 war_justification.211.t: "[FROM.GetLeader] Speaks Against Red Menace"
 war_justification.211.d: "'Without a doubt, [Root.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [Root.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe nascent worker's movement has intimidated [FROM.GetAdjective] leaders. While representatives in their opposition have called this a Red Scare aimed at pursuing war with us, the rhetoric of the [FROM.GetRulingParty] has been highly successful so far."
 war_justification.211.a: "이익을 창출해내는 이상, 자본가들은 전쟁을 만들어낼 것이다"
 war_justification.212.t: "[FROM.GetLeader] Confronts [Root.GetAdjective] Fascism"
 war_justification.212.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [Root.GetRulingParty] now holds [Root.GetName]. People may argue that we should not provoke conflict, that we should trust [Root.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nJealous of the glorious society we are building and the legacy it is founded upon, the [FROM.GetAdjective] seem prepared to start a war to destroy it. So much for their pretensions of peace."
 war_justification.212.a: "불가피하다. 치워버리도록 하자."
 war_justification.213.t: "[FROM.GetLeader] Calls for War Against [Root.GetName]"
 war_justification.213.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [Root.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\nIn a recent speech to the [FROM.GetAdjective] people the hostile rhetoric towards [Root.GetName] has intensified and [FROM.GetLeader] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of their leader."
 war_justification.213.a: "그들은 우리를 적으로 만든 것을 후회할 것이다."
 war_justification.214.t: "[FROM.GetLeader] Challenges [Root.GetAdjective] Pretensions"
 war_justification.214.d: "'[Root.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [Root.GetName] long held by the [FROM.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [Root.GetAdjective] people want to avoid war, [FROM.GetLeader] claims that our elected leaders have provoked it through their arrogance."
 war_justification.214.a: "The voices for peace among the [FROM.GetAdjective] people are, of course, silenced."
 war_justification.215.t: "[FROM.GetLeader] Wants to Restore Order in [Root.GetName]"
 war_justification.215.d: "'The [FROM.GetAdjective] national spirit is strong, but not all nations are so fortunate. [Root.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [FROM.GetName] against this threat.'\n\nWhile the [FROM.GetRulingParty] has always opposed communism, [Root.GetName] has been a target of particular attacks in recent speeches. Fearing their nation's inevitable progress to the next stage of history, a preemptive attack on [Root.GetAdjective] communism is already in the works."
 war_justification.215.a: "우리가 진행한 일을 되돌리기에는 너무 늦었다."
 war_justification.216.t: "[FROM.GetLeader] Calls Out [Root.GetAdjective] Oppressors"
 war_justification.216.d: "'My opponents would have you believe that my rule is like that of the [Root.GetRulingParty] in [Root.GetName]. They could not be more wrong. While [Root.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [FROM.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [FROM.GetLeader] regime has adopted a hostile policy towards the [Root.GetAdjective] nation. Our visionary plans for future greatness have put their nation to shame, and unsurprisingly, they feel threatened."
 war_justification.216.a: "그들이 우리의 힘을 시험하기 원한다면 후회할 것이다."
 war_justification.217.t: "[FROM.GetLeader] Questions [Root.GetAdjective] Sovereignty"
 war_justification.217.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [FROM.GetName] ends and [Root.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [FROM.GetLeader]'s recent speeches, an invasion of [Root.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.217.a: "제 1차 세계대전으로부터 배운 것이 없는 것인가?"
 war_justification.218.t: "[FROM.GetLeader] Questions the Motives of [Root.GetName]"
 war_justification.218.d: "'There is no doubt that [Root.GetName] is preparing for war. The changes in economic policy make it plain to see that the [Root.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [FROM.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [FROM.GetRulingParty] have turned their eyes towards [Root.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [FROM.GetName] is preparing for war."
 war_justification.218.a: "이것이 바로 우리가 준비되어 있어야 하는 이유이다."
 war_justification.219.t: "[FROM.GetLeader] Angered by [Root.GetAdjective] Posturing"
 war_justification.219.d: "'Those naïve citizens of [FROM.GetName] who imagine the [Root.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [Root.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nOur military presence close to [FROM.GetAdjective] territory has sparked increased concern, since they interpret our troop movements as proof hostile intent. They hardly seem to have considered that their aggressive rhetoric is the reason for our defensive measures."
 war_justification.219.a: "이런 위협이 있는데 비무장 할 순 없지."
 war_justification.220.t: "[FROM.GetLeader] Advocates Invasion of [Root.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [Root.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [FROM.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [FROM.GetRulingParty] leaders, most prominently [FROM.GetLeader], has been calling the public to support an invasion of [Root.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "우리는 준비해야 한다. 전쟁이 올 것이다."
 war_justification.301.t: "비난받는 [Root.GetLeader]의 나약한 외교 정책"
 war_justification.301.d: "'우리는 적을 공격 할 기회가 있었지만, [Root.GetRulingParty]가 이를 너그럽게 보았다. 이것은 국제적으로 [Root.GetName]'의 지위를 강화하는 일련의 기회를 놓게된 매우 실망스러운 케이스일 뿐만 아니라, [Root.GetAdjective]'의 국민의 이익을위한 행동이 아닌 것 이었다고 그들이 주장이 그것을 말해 준다. 정책 변화의 시기다.' \n\n예상하고 있던 많은 전쟁의 수행 실패는 정치적 반대 세력에서 맹렬한 비판의 대상이되었다. 군의 계획을 계속할 수없게 되는 것은 [Root.GetName]가 어떤 방향으로 국민을 납득 시키려고하고 있는지에 따라서, 우리는 더 어려운 일이 될 것이다."
 war_justification.301.a: "그들은 전쟁을 피하고 싶지 않은가?"
 war_justification.301.b: "당외인물과는 공적인 비합의의 여지도 없다."
 war_justification.301.c: "[Root.GetLeader]을(를) 비겁하다고 비난하게 둘 수 없다!"
 nuke_dropped.1.t: "Atomic Bombing of [FROM.FROM.GetName]"
 nuke_dropped.1.d: "For the first and hopefully last time in history, a nuclear bomb has been detonated in [FROM.FROM.GetName] as part of international warfare. The unprecedented destruction stands as a testament to the devastating power of this new weapon, which is feared not only for what it can do to its targets, but what implications it has for the one who deploys it and for humanity itself.\n\nThe world holds its breath waiting for what will come next. Will this force [FROM.FROM.Owner.GetName] to surrender to avoid further terror, or will it only strengthen their resolve to strike back against those who would resort to such measures?"
 nuke_dropped.1.a: "핵의 시대가 진정 시작되었군."
 nuke_dropped.1.b: "우리는 [Root.GetAdjective] 국민들을 지키기 위해 무엇이라도 하겠다."
 nuke_dropped.2.t: "핵폭탄이 투하된 히로시마"
 nuke_dropped.2.d: "\"거리는 지옥 그 자체 같았다\"\n- 구니요시 아이카와\n\n오늘, 핵폭탄이 히로시마 상공 580미터에서 폭발했습니다. 도시의 3분의 2 이상이 즉시 파괴되었습니다. 도시는 지진에 견딜 수 있도록 내진 설계를 거쳤음에도 불구하고, 몇몇 튼튼한 건물만이 폭발에서 살아남았습니다.\n\n핵폭탄의 힘이 대중의 마음에 각인되었지만, 무기 앞에서 사람의 가치는 절하되었습니다. 어느 쪽도 사건의 공포를 고려하지 않았습니다만, 지속적인 낙진과 눈 깜짝 할 사이 사라진 생명들은 오래도록 남게 될 것입니다."
 nuke_dropped.2.a: "이 전쟁이 끝나기까지 얼마나 더 많이 떨어질 것인가?"
 nuke_dropped.2.b: "우리는 희생자들을 돕기 위해 신속히 행동해야 합니다."
 nuke_dropped.3.t: "핵폭탄이 투하된 나가사키"
 nuke_dropped.3.d: "원래 고쿠라에 투하될 예정되었던 핵폭탄은 오늘 나가사키에서 폭발했습니다. 연기, 구름 그리고 기술적 문제가 겹쳐진 기상 문제로 인해 임무를 맡은 비행기는 기수를 돌려야 했고, 역사에 남을 사건을 바꾸어버리고 말았습니다.\n\n폭탄의 효과는 계곡에 자리잡은 도시의 위치 때문에 약간 억제되었지만, 피해는 여전히 심각했습니다. 일부 군사 시설이 타격 받았지만, 치명적인 민간 손실은 그것을 훨씬 웃돕니다. 우리가 이 무기의 장기적 효과를 알려면 수 십년이 걸릴 수 있습니다."
 nuke_dropped.3.a: "Will this lead to [FROM.Owner.GetAdjective] surrender?"
 nuke_dropped.3.b: "우리는 나가사키는 아니길 바랬다."
 nuke_dropped.4.t: "핵폭탄이 투하된 베를린"
 nuke_dropped.4.d: "Today, at [GetDateText], the German capital of Berlin was struck by a nuclear explosion. The city has suffered several attacks, in this war and the last, but all else pale in comparison to this. Not since the Thirty Years' War has Berlin seen comparable devastation - considering its growth, this was seen as an impossibility.\n\nThe Führerbunker appears to have survived the blast at least partially due to the bomb detonating away from its planned epicenter, and [FROM.Owner.GetLeader] is rumored to still be alive, if outraged. How [FROM.Owner.GetAdjective] leaders should be evacuated and if they can be protected from the fallout is another matter, however."
 nuke_dropped.4.a: "오늘, 난 베를린 사람이 아니어서 안심이군."
 nuke_dropped.4.b: "우리의 적들이 국가의 심장을 강타했다!"
 nuke_dropped.5.t: "핵폭탄이 투하된 런던"
 nuke_dropped.5.d: "A nuclear explosion has devastated the city of London today. Despite the city's anti-air defenses, [FROM.Owner.GetName] was not prepared for this attack. At [GetDateText], Big Ben chimed for the last time, having been melted by the blast. Early reports suggest Buckingham Palace has been completely leveled and the whereabouts of the royal family are currently unknown.\n\n[FROM.Owner.GetLeader] has nevertheless been confirmed to have survived and is preparing a rousing speech for the radio later today. With morale at an all-time low, the British people is in dire need of this - or a very eloquent surrender."
 nuke_dropped.5.a: "핵폭풍 때문에 윗입술에 자꾸 힘이 빠지는군."
 nuke_dropped.5.b: "신께서 왕을 구하리"
 nuke_dropped.6.t: "핵폭탄이 투하된 교토"
 nuke_dropped.6.d: "The city of Kyoto, a prominent [FROM.Owner.GetAdjective] industrial center, was struck today by a nuclear bomb. It is speculated that the city was chosen as a target because it has been regarded as an intellectual center.\n\nThe beauty and historical significance of the Kyoto led many to assume it would be spared from the bomb, but it appears the terror of raining destruction on such a place has rather been seen as a benefit, increasing the psychological impact of the attack. The city's location in the valley somewhat limited the blast, but the old Imperial Palace and many industrial buildings have been completely destroyed."
 nuke_dropped.6.a: "이런 전쟁에서 유산과 아름다움은 아무 의미가 없지."
 nuke_dropped.6.b: "저들이 옛 것을 파괴하면, 우린 새로운 것을 만들 것이다."
 nuke_dropped.7.t: "핵폭탄이 투하된 도쿄"
 nuke_dropped.7.d: "Today, a nuclear strike was directed at the heart of the Japanese Empire. The capital of Tokyo, although expected to be the target of firebombing, was never assumed to be a prioritized target of this new weapon. Yet ultimately, perhaps due to the significance of the new capital and Imperial Palace which has now been destroyed, an even more all-consuming fire has fallen on the city.\n\nAlthough [FROM.Owner.GetLeader] is reported to have survived, the event has raised questions about how far Japan's enemies are willing to go. If the war does not end with this, what targets remain? What is left to threaten with?"
 nuke_dropped.7.a: "이것이 일본 제국의 끝을 의미하는가?"
 nuke_dropped.7.b: "As long as [FROM.Owner.GetLeader] lives, so does the Empire."
 nuke_dropped.8.t: "핵폭탄이 투하된 워싱턴 D.C."
 nuke_dropped.8.d: "A nuclear bomb was detonated today over the capital of the United States. In an attack clearly directed at the political center and historical legacy of the US, the White House, the Capitol and a number of monuments and memorials were wiped off the face of the Earth. Even the Burning of Washington over a century ago pales in comparison to the destruction visited upon the city by this devastating weapon.\n\nAlthough President [FROM.Owner.GetLeader] has been brought to safety, the nation has been shaken to its core. No doubt, the US hoped to be the first and only country to wield such a weapon. Those hopes have now been shattered in the worst possible way."
 nuke_dropped.8.a: "분열될 수 없는 국가 대 분열될 수 있는 원자로군."
 nuke_dropped.8.b: "독수리는 반드시 불사조처럼 재에서 날아오를 것이다."
 nuke_dropped.9.t: "핵폭탄이 투하된 로마"
 nuke_dropped.9.d: "오늘 로마 시에 핵폭발이 일어나, 전세계 사람들을 충격에 빠트렸습니다. 역사적, 예술적 가치가 있는 보물들 때문에 많은 사람들이 고대로부터 이어져 내려온 도시가 무차별 파괴의 대상이 될 것이라고 아무도 생각하지 못했습니다. 바티칸 시국 또한 부분적으로 파괴되었고 교황의 행방은 알 수 없으며, 이 사건은 이탈리아 사람들 뿐만 아니라 전세계 가톨릭 신자들을 공포에 빠트렸습니다.\n\n지난 십 년간 로마의 급속한 성장은 공격에 의해 거의 대부분 실패했습니다. 전후에 잠시, 국가의 회복력으로 도시를 도울 수 있을 것처럼 보였습니다. 그 희망은 이제 많은 사람들과 함께 먼지로 변했습니다."
 nuke_dropped.9.a: "폭탄은 던져졌다!"
 nuke_dropped.9.b: "로마는 하루 아침에 재건될 수 없다..."
 nuke_dropped.10.t: "핵폭탄이 투하된 파리"
 nuke_dropped.10.d: "오늘, 핵폭탄이 파리 시 상공에서 폭발해, 광범위한 파괴와 수많은 사상자가 발생했습니다. 전쟁과 혁명의 시대를 거쳐온 수도임에도 불구하고, 이제까지 경험한 것 중 가장 파괴적인 공격이었기에 프랑스는 충격에 빠졌습니다. 파리 시민들은 점령될 것을 예상했을지도 모르나, 이토록 완전하고 폭력적인 황폐함은 아니었습니다.\n\n현 도시 상태로는 개선문의 남은 부분으로는 샹젤리제에서 어떤 식으로도 개선식을 열 수 없을 것으로 보입니다. 아마도 앞으로 수십 년 동안 새로운 파리의 탄생을 볼 수 있겠지만, 파리 대중의 마음에, 벨 에포크(좋은 시대)에 건설된 도시는 영원히 사라졌습니다."
 nuke_dropped.10.a: "빛의 도시가 어둠에 휩싸였다."
 nuke_dropped.10.b: "어제까지만 해도, 파리는 항상 존재할거라고 생각했다."
 nuke_dropped.11.t: "핵폭탄이 투하된 모스크바"
 nuke_dropped.11.d: "A city many have tried and failed to conquer, Moscow was the target of a nuclear attack today. The explosion was directed at the heart of [FROM.Owner.GetAdjective] leadership, the Kremlin having been nearly completely destroyed by the blast.\n\n[FROM.Owner.GetLeader], having grown more aware and fearful of all possible and impossible threats recently, evacuated in time and survived. However, even the vastness of [FROM.Owner.GetName] may not be enough to escape such a ruthless enemy. Indeed, if this continues, the nation will soon consist only of two kinds of wastelands: Those which were there in the first place, and those created by its enemies."
 nuke_dropped.11.a: "핵겨울은 모스크바를 더 어려운 목표로 만들어주지 않나?"
 nuke_dropped.11.b: "우리의 도시 전부를 태우더라도, 가지지는 못할 것이다."
 nuke_dropped.12.t: "핵폭탄이 투하된 코펜하겐"
 nuke_dropped.12.d: "오늘, 코펜하겐 시에 핵폭발이 일어났습니다. 덴마크의 중립 정책 덕분에 대전쟁에서의 파괴에서 벗어나 성장할 수 있었고, 수도는 나폴레옹 전쟁 이후 파괴에 근접한 공격을 경험한 적이 없습니다. 외레순드의 주변 지역에서는 상당한 양의 낙진을 본 생존자들이 추후 공격에 두려워 퓐 섬과 본토로 탈출하기 시작했습니다.\n\n국왕 크리스티안 10세의 현재 행방은 알 수 없고, 공격으로 인해 국가의 사기에 심각한 피해를 입었습니다. 이것이 유럽의 유서깊은 국가중  하나가 종말을 맞이하는 시작일지는 두고 보아야 할 것입니다."
 nuke_dropped.12.a: "어떤 섬광이 덴마크에서 빛났다."
 nuke_dropped.12.b: "도시는 전에도 불탔으나, 멸망하지는 않았다."
 nuke_dropped.12.c: "플루토늄으로 우리는 덴마크의 항복을 받아냈다!"
 nuke_dropped.13.t: "핵폭탄이 투하된 스톡홀름"
 nuke_dropped.13.d: "북방의 자랑스러운 베네치아, 아름다운 도시 스톡홀름이 오늘 핵폭탄으로 공격받았습니다. 중립을 유지하기 위해 그간 최선의 노력을 다했음에도, 스웨덴은 이제 국제적 분쟁이 요구하던 궁극적인 대가를 치렀습니다. 폭발의 진원지인 스톡홀름 중남부의 중앙, 미래의 개발 및 대건설 계획이 예정되어 있던 지역은 이제 되돌릴 수 없이 파괴되었습니다.\n\n도시의 대부분은 알아볼 수 없지만, 예상과는 달리 슬루센의 오래된 건물들은 폭발에서 살아남았습니다. 이것들은 도시의 완강함에 대한 기념물로 영원히 손대지 않은 상태로 있어야 한다고 결정되었습니다."
 nuke_dropped.13.a: "이것으로, 스웨덴의 중립은 기억으로만 남게 될 것이다."
 nuke_dropped.13.b: "스웨덴의 호랑이는 줄무늬를 잃지 않았다!"
 country_capitulated.0.t: "[Root.GetName]의 항복"
 country_capitulated.0.d_positive_both_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war continues elsewhere, this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for all of the [FROM.FROM.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nDespite this devastating loss the war against [FROM.FROM.GetName] is far from over."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] and the rest of the [FROM.FROM.GetFactionName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nAlthough the struggles between [FROM.FROM.GetName] and [Root.GetName] are over, [FROM.FROM.GetName] is still at all-out war, and the fighting continues elsewhere."
 country_capitulated.0.d_neutral_prev_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles in [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.d_neutral_prev_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles between [FROM.FROM.GetName] and [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetFactionName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.a: "대단하군"
 country_capitulated.0.b: "어둠의 시대가 도래했다."
 country_capitulated.0.c: "불확실한 시기다"
 GAME_OVER_TT: "§R당신으로 인해 게임이 종료됩니다.§!"
 CAN_ANGERED_WORKERS: "국민들이 분노할 것입니다"
 excellent: "훌륭해."
 unfortunate: "안되었군"
 news.1.t: "The [fta_inviter.GetNameDef]-[fta_applicant.GetName] 간의 자유 무역 협정"
 news.1.d: "오늘 [fta_inviter.GetNameDef]와 [fta_applicant.GetNameDef]은(는) 두 국가간 경제 협력을 강화할 자유 무역 및 투자 협정을 맺었습니다."
 news.1.a: "알겠다"
 news.2.t: "[mct_inviter.GetNameDef]-[mct_applicant.GetName] 군사 협력 협정"
 news.2.d: "오늘 [mct_inviter.GetNameDef]와 [mct_applicant.GetNameDef]은(는) 두 국가간 군사적 유대를 강하게 할 군사 협력 협정을 맺었습니다."
 news.2.a: "알겠다"
 news.3.t: "USS 콜 폭탄테러"
 news.3.d: "미국의 지휘관이 구축함 USS 콜이 말 카에다 집단의 폭탄테러로 17명의 군인들이 순직했다고 알려왔습니다. 미국 첩보망에서는 수단 정부에서 이 2명의 테러범들을 지원했다는 의혹이 있다고 보고했습니다."
 news.3.a: "사과하게 될거다."
 news.3.b: "미국에 유감을 표해라."
 news.3.c: "미국인이 죽었다고? 세상에."
 news.3.e: "우리를 배후로 지목했다고?!"
 news.4.t: "[FROM.GetName] leaves the European Union"
 news.4.d: "Today the [FROM.GetAdjective] delegation to the European Parliament left the buildings in Brussels for what might be the last time. Article 50 has been fulfilled and pulled through, the treaties with the EU partners reset to ones of usual international partnership. [FROM.GetName] has left the European Union."
 news.4.a: "알겠다"
 news.5.t: "연방 준비"
 news.5.d: "[FROM.GetName] has begun the process of preparing legislation to unite the European Union under [FROM.GetAdjective] leadership. The European Parliament has much to discuss in the coming days."
 news.5.a: "흥미로운 도약이로군."
 news.82.t: "일본의 후퇴"
 news.82.desc: "일본이 남한 주도의 한반도 통일을 위해 북한을 침공하려 하자, 중화인민공화국 정부는 일본의 작전에 개입하였습니다. 일본은 이러한 소식을 듣고 통일 작전을 뒤로 하고 철수하였습니다."
 news.82.a: "우린 어쨌든 잃어버렸을 겁니다!"
 news.82.b: "중국은 정말로 강력하다!"
 influence.1.t: "Offer Economic Aid to [FROM.GetName]?"
 influence.1.d: "우리는 경제 원조 패키지 작성을 시작하기로 했습니다. 우리 국가 GDP의 5%, 10%, 또는 15%를 원조할 수 있습니다. 이러한 관대함은 [FROM.GetName]과의 관계를 개선하고 영향력을 부여할 것입니다. 비록 그들이 경제 원조를 가치있게 사용할 것이란 보장은 없지만, 더 많이 지원하면, 더 많은 영향력을 얻을 수 있습니다.\n\n"
 influence.1.a: "GDP의 5%를 경제 원조로 보낸다."
 influence.1.b: "GDP의 10%를 경제 원조로 보낸다/"
 News_influence.0.t: "Economic aid given by [FROM.GetName]!"
 News_influence.0.d: "We have been given $$[?gift_sum] billion in immediate economic aid by [FROM.GetName]. This has strengthened [Root.GetAdjective]-[FROM.GetAdjective] Relations, and while the gift officially came without preconditions, it is understood to have strengthened their influence in our country."
 News_influence.0.a: "환상적이군"
 influence.3.t: "[FROM.GetName]의 또다른 영향권자를 목표로 삼나?"
 influence.3.d: "[FROM.GetNameWithFlag]에 영향력을 행사하는 국가 중 어떤 국가 또는 영향력을 겨냥할까요?\n"
 influence.3.a: "[FROM.GetNameWithFlag]의 자주권을 겨냥하자"
 influence.3.b: "[?var:FROM.influence_array^0.GetNameWithFlag] 측을 겨냥하자"
 influence.3.c: "[?var:FROM.influence_array^1.GetNameWithFlag] 측을 겨냥하자"
 influence.3.e: "[?var:FROM.influence_array^2.GetNameWithFlag] 측을 겨냥하자"
 influence.3.f: "물러나자."
 News_influence.1.t: "[FROM.GetNameWithFlag] attacks our influence in [FROM.FROM.GetNameWithFlag]!"
 News_influence.1.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our ambitions in [FROM.FROM.GetName]. Singleing us out, their attack on our business and governmental interests have lowered our influence in [FROM.FROM.GetNameWithFlag]."
 News_influence.1.a: "Damn you, [FROM.GetLeader]!"
 News_influence.2.t: "[FROM.GetNameWithFlag] attacks our independence from foreign influence!"
 News_influence.2.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our aspirations to keep foreign meddling out, and weakened our sovereignty. Our independence from foreign influence has been reduced."
 News_influence.2.a: "Not cool, [FROM.GetLeader]!"
 influence.5.t: "Launch Coup in [FROM.GetNameWithFlag]?"
 influence.5.d: "Dear [Root.GetLeader], we in the [Root.GetAdjective] Intelligence Services cannot confirm or deny whether [FROM.GetName] is conducive to a coup.\n\nHowever, we have, to the best of our ability, drawn up probabilities of outcomes. These are based on:\n - How big our influence is\n - How popular our outlook is\n - The popularity and stability of the government\n - Which other influential countries are likely to back us\n - Which influential countries are likely to back their current government.\n\nIf we proceed with the plans we will try to use mostly local sources and contacts, to try to maintain plausible deniability."
 influence.5.a: "집권당에 대해서 쿠데타를 감행해라."
 influence_coup_largest_success_TT: "§H성공적인 쿠데타§!"
 influence_coup_largest_discovered_TT: "§R실패한 쿠데타§!"
 influence.5.b: "우리와 같은 이념의 정당을 집권당으로 두기 위한 쿠데타를 시작하자."
 influence.5.c: "지금은 이 계획을 미뤄두자."
 News_influence.3.t: "정권 변화!"
 News_influence.3.d: "Forces with [FROM.GetAdjective] backing have deposited the previous government."
 News_influence.3.a: "와..."
 News_influence.4.t: "Dramatic scenes as regime change sweeps [FROM.FROM.GetNameWithFlag]"
 News_influence.4.d: "After a period with uptick in foreign intelligence activity, especially from [FROM.GetNameWithFlag], the previous government of [FROM.FROM.GetName] have been toppled with many top officials of the former regime detained. [FROM.FROM.GetLeader] of the [FROM.FROM.GetRulingParty] has emerged as the new leader amid the turmoil. Early indications are that the new regime of [FROM.FROM.GetName] will identify with the [FROM.FROM.GetRulingIdeology], uprooting the balance of power."
 News_influence.4.a: "흥미롭군"
 News_influence.5.t: "[FROM.GetNameWithFlag] under pressure as [FROM.FROM.GetNameWithFlag] defeat coup"
 News_influence.5.d: "[FROM.FROM.GetAdjective] leader [FROM.FROM.GetLeader] was gesturing vividly from the stage as 'hostile evil forces spearheaded by [FROM.GetName]' were being blamed for today's latest escalations that saw [FROM.FROM.GetLeader] defeating a dramatic coup attempt. Though [FROM.GetAdjective] leader [FROM.GetLeader] strongly denied the accusations, it is widely known that the two leaders don't see eye to eye. With [FROM.GetAdjective]-[FROM.FROM.GetAdjective] ties at all time low, [FROM.FROM.GetName] vowed to the public to \"irradicate [FROM.GetAdjective] influence from [FROM.FROM.GetName]\", and otherwise double down on the [FROM.FROM.GetRulingIdeology] direction that the ruling [FROM.FROM.GetRulingParty] have been steering [FROM.FROM.GetNameWithFlag] towards."
 News_influence.5.a: "흥미롭군"
 News_influence.6.t: "Drama as [FROM.FROM.GetNameWithFlag] collapse into Civil War!"
 News_influence.6.d: "Traumatic scenes from [FROM.FROM.GetNameWithFlag] could be seen today, as the last few days of protests, uncertainty and strange military movements gave way to gunfire, suffering and fleeing civilians. While details are scarce, it seems several whole units of the [FROM.FROM.GetAdjective] Army have declared for the armed opposition against [FROM.FROM.GetLeader] and the [FROM.FROM.GetRulingParty] ([FROM.FROM.GetRulingIdeology]). A opposition leader, speaking to WNN under conditions of anonymity, said that they \"expect significant help from [FROM.GetNameWithFlag] in their quest to overthrow the illegitimate [FROM.FROM.GetAdjective] tyrant [FROM.FROM.GetLeader]\".\n\nAlthough [FROM.GetAdjective] leadership have expressed their \"surprise about these dramatic developments\", this is given little credibility by close watchers of [FROM.GetAdjective]-[FROM.FROM.GetAdjective] relations. One analyst described the situation like this; \"It's clear that this in reality was a [FROM.GetAdjective]-backed coup attempt that failed to secure their objectives fast enough, resulting in a tense standoff that degraded into what now looks like a full civil war\". Several world leaders, especially those with a [FROM.FROM.GetRulingIdeology] have had less than diplomatic words for the as of yet unconfirmed [FROM.GetAdjective] involvement.\n\nWith the two different sides in the conflict represent not only stark differences in domestic, but also international direction, it will be interesting to follow if other countries also get involved in the conflict."
 News_influence.6.a: "누가 잿더미를 통치할까?"
 influence.51.t: "[FROM.GetName]에 대한 군사적 원조"
 influence.51.d: "Our fellow nation [FROM.GetName] is currently in an armed conflict and is looking for suppliers to fuel their war effort. They have shown an interest in our small arms, infantry vehicles, and other military surplus. We should decide if it is worthwhile to send them the military equipment lest they use it against us in future conflicts..."
 influence.51.a: "좋아, 하자!"
 influence.51.b: "한번만 다시 생각해 보자.."
 influence.52.t: "어떻게 할 것인가?"
 influence.52.d: "We can send [FROM.FROM.GetName] one of three categories of military aid. After picking the category, we will choose a §Hpackage size§! that determines the quantity, political cost, and threat generated.\n\n§HInfantry§!: small arms, light anti-tank, anti-aircraft.\n§HVehicles & Armor§!: main battle tanks, amphibious tanks, utility vehicles.\n§HModern Equipment§!: heavy anti-tank missiles, surface-to-air missiles, drones."
 influence.52.a: "§HInfantry Equipment§! Package"
 influence.52.b: "§HVehicles & Armor§! Package"
 influence.52.c: "사실 우리도 필요하다..."
 influence.53.t: "[FROM.GetName]의 군사 지원"
 influence.53.d: "[FROM.GetName] has offered us a package of military equipment. Should we accept or return it?"
 influence.53.a: "Accept the Package"
 influence.53.c: "Return the Equipment"
 econvent.1.t: "[Root.GetName]의 중앙은행이 주택거품의 발생 가능성에 대해 경고하다"
 econvent.1.d: "친애하는 [Root.GetLeader]시여, 가장 뛰어난 [Root.GetAdjective]의 경제 전문가들이 [Root.GetAdjective] 부동산 시장이 과열되어 거품현상이 발생하기 직전이라고 하는데에 있어서는 뜻을 굽히지 않고 있어 유감입니다. 향후 상황은 아주 어려워지고, 힘들어질 것이라고 예측되고 있으므로 전문가들이 틀렸을리는 거의 없습니다.\n물론 우리는 당신이 최고의 명령을 내리는 것을 상상하고 있지는 않지만, 조금이라도 조취를 취해야합니다."
 econvent.1.a: "더 나빠지기 전에 과열된 이 사태를 진정시키자."
 econvent.1.b: "말도 안된다. [Root.GetAdjective] 경제는 언제나 활력이 넘친다!"
 econvent.1.b_tt: "현재는 §H효과 없음§!. 하지만, 주택 거품이 향후에 일어날 것입니다\n"
 econvent.2.t: "붕괴하는 주택 가격"
 econvent.2.d: "계속해서 증가하는 주택과 아파트 가격이 지난 년까지 최고점을 찍으면서, 사람들은 더욱 더 큰 빚을 내면서 부동산에 투자하고 있으며, 투기자들은 모든 재산도 포함하여 부동산에 투자했습니다. 바로 지금 이러한 상황은 빠르게 종식을 고했습니다. 가격은 내려가고 있으며, 사람들은 세상의 종말이 온 듯이 부동산을 팔려고 하고 있습니다.  소수의 운이 좋은 이들은 감당할 수 없는 빚을 청산할 수 있었습니다. 사람들이 [Root.GetLeader]와 [Root.GetAdjective] 중앙은행의 충돌을 원인이라고 지목하면서, 이 위기상황을 어떻게 신속하게 처리할지 공표해야합니다."
 econvent.2.a: "다시금 주택 가격이 오르도록 적은 예산으로 현 체제를 바꿀 것이다."
 econvent.2.b: "고통스러울 것이나, 주택 가격은 감소해야만 한다."
 econvent.3.t: "주식 시장 사태"
 econvent.3.d: "주택 가격 다음으로 따르는 혼란이 주식 시장에도 영향을 끼친 것으로 보입니다. 이러한 영향은 [Root.GetAdjective]에 본사를 두고 있는 모든 회사의 주식 가격이 오늘 아침 급락하고 자국의 화폐가치 또한 마찬가지로 떨어졌습니다. 점심까지 주식 거래가 중단되었지만, 내일까지도 가격은 회복될 낌새가 보이지 않는 것 같고 모두가 절망하며 주식을 되팔고 있습니다."
 econvent.3.a: "내 돈을 조세 피난처에 놓을 수 있다니 좋은 일이군."
 econvent.4.t: "[Root.GetAdjective] 은행이 파산에 직면하다"
 econvent.4.d: "[Root.GetName] §R<3§!의 [Root.GetLeader]\"은(는) 컵에 있는 뜨겁고 맛있는 예술적인 에스프레소가 오늘은 쓰게 느껴졌습니다. 절망적인 금융가들과, 로비스트, 정치인들이 돌아다니며 [Root.GetAdjective] 정부관료들에게 모두 같은 말을 하고 있습니다. \"구제금이 필요하다!\"\n \n동시에 벌어진 주택 가격 급락과 주식 시장 위기로 너무나도 많은 금융 부문이 흔들리고 있습니다. 투기꾼들의 심각한 부채는 단순하게 말하면 엄청난 액수를 자랑하며, 정부의 개입을 필요로 하거나 그렇지 않다면, 국내의 모든 이들은 파산하여 그 피해는 저축금까지 확대될 것입니다."
 econvent.4.a: "구제금을 지급할 것이다."
 econvent.4.b: "구제금은 없지만 저축금은 보장해주겠다.."
 econvent.4.c: "약육강식이 자본주의를 더욱 더 튼튼하게 한다."
 econvent.5.t: "[Root.GetAdjective] 시장에서의 소비가 감소하다"
 econvent.5.d: "최근 뉴스에서는 근면한 [Root.GetAdjective]의 시민들의 미래에 대해서 걱정하고 있는 것을 조명했습니다. 이러한 비관주의는 사람들이 더욱 더 많은 저축을 하고 소비를 줄이는 결과를 낳게 되었습니다. 이 사태가 지속된다면, 수많은 [Root.GetName]의 사업처들은 문을 닫게 되거나 규모가 줄어들 것입니다. 하지만 수출로 [Root.GetAdjective] 상품들을 통해서 수익을 벌고 있는 사업가들은 별다른 영향을 받지 않을 것입니다."
 econvent.5.a: "일부 시장 자본을 이체해라."
 econvent.5.b: "이는 곧 끝날 거다."
 econvent.6.t: "해외 [Root.GetAdjective] 상품의 수요 감소"
 econvent.6.d: "수치는 거짓말을 하지 않습니다. [Root.GetName]의 국외 수출품의 수요가 줄어들고 있습니다. 하지만 그 원인은 [Root.GetLeader]의 경제 자문가들 사이에서 뜨겁게 토론되고 있습니다. 한 이론은 높은 임금으로 제품 경쟁력이 떨어진다고 하였고, 다른 이론은 다른 국가의 제품 경쟁력이 증가하였다고 주장하고 있습니다. 또 다른 이론에서는 수요에 대한 감소는 유행이 변화하였기 때문이라고 합니다. 원인이 어떻든 간에, 우선도를 뒤로 제쳐두고 향후에 더욱 더 열심히 일하는 것 말고는 방도가 없습니다."
 econvent.6.a: "외국인들은 상당히 냉소하군. [Root.GetAdjective] 상품은 최고이다!"
 econvent.7.t: "가뭄이 [Root.GetAdjective] 농부에게 재앙을 가져다주다"
 econvent.7.d: "비가 거의 내리지 않으면서, 장마철에도 강수량은 최저이기에 대부분의 농작물들은 시들어갔습니다. 이곳 [Root.GetName]에서는 슬프게도 흔한 일이 아니지만, 소수의 농작물 생산자들이 생산한 것들은 나머지 농부들과 인공적인 관개작업을 통해서 나온 것들입니다. 농부들은 [Root.GetLeader] 정권에 구원금을 요구하고 있으며, 도시 거주자들은 치솟는 곡식 가격에 울상을 짓고 있습니다."
 econvent.7.a: "다음 해에는 더 운이 따라주기를."
 econvent.8.t: "[Root.GetName]에서의 기아!"
 econvent.8.d: "진행되는 가뭄은 [Root.GetName]의 부지를 휩쓸었고 음식의 부족으로까지 이어지게 되었습니다. 남아있는 음식도 감소되었고 기아가 영양부족, 죽음, 병을 유발시키고 있습니다."
 econvent.8.a: "이런!"
 econvent.9.t: "소비자의 신뢰도 향상"
 econvent.9.d: "[ROOT.GetAdjective] 경제 내 최근 상황은 우리나라의 소비자들이 이제 나라의 미래에 투자하고 돈을 쓸 수 있는 완벽한 시장 조건을 갖추었다는 것을 보여주고 있습니다. 사람들은 내일이 없는 것처럼 소비재를 사고 있습니다!"
 econvent.9.a: "멋진 소식이군!"
 econvent.10.t: "주식 시장 호황"
 econvent.10.d: "[ROOT.GetAdjective]의 주식 시장은 호황을 누리고 있습니다. [ROOT.GetAdjective] 국민들은 마치 음식을 사먹듯 쉽게 주식을 거래하고 있습니다.\n"
 econvent.10.a: "이 기세를 몰아 더욱 큰 호황을 누리자!"
 econvent.10.a_tt: "만약 시장에 추가 유동성을 주입하여 이로 인한 충돌이 발생할 경우 이는 엄청난 결과를 초래할 수 있습니다.\n"
 econvent.10.b: "좋아"
 econvent.10.b_tt: "시장은 개입없이 정상적으로 지속될 것입니다. 아직까지 중간 정도의 충돌 가능성이 존재합니다.\n"
 econvent.10.c: "경기를 후퇴시켜야 한다."
 econvent.10.c_tt: "경제가 너무 빠른 속도로 가열되었습니다. 자본의 흐름을 강화하여 이 속도를 늦춥시다.\n"
 econvent.100.t: "산업 패쇄"
 econvent.100.d: "변화하는 경제 상황으로, 자국 내 수많은 산업체들의 경쟁력이 감소하고 패쇄되고 있습니다."
 econvent.100.a: "재건할 것이다."
 econvent.101.t: "산업 이전"
 econvent.101.d: "변화하는 경제 상황으로, 수많은 협력체들이 경쟁력 있는 상품 생산을 위해 해외로 이전하기로 결정했습니다. 이는 국내 경제에 큰 영향을 줄 것입니다."
 econvent.101.a: "재건할 것이다."
 econvent.102.t: "[Root.GetNameDef]로의 산업 이전"
 econvent.102.d: "Due to changing economic circumstances in [FROM.GetNameDef], many [FROM.GetAdjective] corporations have decided to relocate to [Root.GetNameDef] to be more competitive. This will be a boon to our economy."
 econvent.102.a: "훌륭한 소식이다."
 remove_civilian_industry_effect_tt: "[?reduction_factor|%R0]개의 민간공장이 사라질 겁니다.\n"
 migrate_industry_to_random_effect_tt: "§R[?reduction_factor|%0]§!개의 민간 공장이 §Y[relocation_location.GetNameDef]§!로 이동할 것입니다.\n"
 factories_migrated_to_us_tt: "[?FROM.ind_factories|Y0] civilian factories relocate from §Y[FROM.GetNameDef]§! to §Y[Root.GetNameDef]§!.\n"
 war.0.t: "[FROM.GetName] goes to war!"
 war.0.d: "[FROM.GetName] has gone to war today. The international community will be keeping a close eye as this conflict continues to rage on.\n"
 war.0.a: "걱정되는군"
 anti_bully.2.t: "반강자 시스템 (전쟁피로도)"
 anti_bully.2.d: "We have decided war is our best course of action. However, in order to maintain support among the people we must either win this quickly or push quickly into foreign soil. The people will march as long as they see how necessary this war is. Boots march, drums beat, and the time for [FROM.GetName] to go to war is upon us!\n\n§YThis triggers the Public War Weariness System§!\n"
 anti_bully.2.a: "알겠다."
 sco.1.t: "상하이 협력 기구의 참관국 국가로써 가입을 신청하는 [FROM.GetName]"
 sco.1.d: "새로운 주에서는 SCO 절차를 관찰하고 최종적으로는 조직의 정회원이 되기를 희망합니다!"
 sco.1.a: "딱히 거절할 이유를 찾아볼 수가 없다. 수락한다!"
 sco.1.b: "그들에게 이런 지위를 부여할 수는 없다!"
 sco.2.t: "상하이 협력 기구의 회원국 자격의 가입을 신청하는 [FROM.GetName]"
 sco.2.d: "새로운 주가 이 기구의 정회원이 되기를 희망합니다!"
 sco.2.a: "우리는 그들의 요청이 승인되지 않아야 할 이유가 없다고 봅니다."
 sco.2.b: "우리는 이러한 그들의 상황을 인정할 수 없다!"
 sco.3.t: "우리와 함께 합동 군사 훈련을 진행하기를 제안하는 [FROM.GetName]"
 sco.3.d: "SCO의 동료 회원국은 우리의 군사 협력을 증진시키고 양국 간의 신뢰를 높이기 위해 연합 훈련을 제안하고 있습니다."
 sco.3.a: "이건 우리 부대가 경험을 쌓을 수 있는 반가운 기회입니다!"
 sco.3.b: "[FROM.Getname] 과의 협력은 불가능합니다."
 sco.4.t: "우리의 제안을 수락한 [FROM.GetName]!"
 sco.4.d: "[FROM.GetAdjective]의 대사관들은 우리의 제안을 긍정적으로 받아들였으며 합동 연습의 준비를 하고 있습니다."
 sco.4.a: "게임을 시작하지"
 sco.5.t: "우리의 제안을 거부한 [FROM.GetName]!"
 sco.5.d: "[FROM.GetAdjective]의 대사관들은 우리와 합동 군사 연습을 하기를 거절했습니다."
 sco.5.a: "그들의 손해이다.."
 sco.6.t: "상하이 협력 기구 (SCO)에서 대규모 군사훈련을 실시하다"
 sco.6.d: "[FROM.GetAdjective] 오늘 수천 명의 병사들이 상하이 협력 기구(SCO)의 후원 아래 카운터 테러 연습으로 묘사되는 연습에 참여했습니다.\n 이번 연습을 성공적인 국제협력의 증거로 환영하는 사람들도 있지만, 다른 사람들은 이번 개발에 대해 훨씬 덜 열광적으로 반응했습니다.\n 미국과 유럽의 분석가들은 장거리 항공기의 배치와 상당한 화력 배치를 인용하여, 이번 연습이 카운터 테러 작전을 위한 연습이 아닌 서방과의 대치를 위한 무장한 드레스 리허설로 이루어졌다는 증거라고 주장합니다."
 sco.6.a: "이 위협적인 훈련들은 우리에게 이득이 되는 건가?"
 sco.6.b: "테러리스트만이 이것을 두려워 하리라!"
 sco.6.c: "흥미로운 전개로군."
 sco.7.t: "상하이 협력 기구 (SCO)의 회원 자격을 얻은 [FROM.GetName]"
 sco.7.d: "점진적은 과정을 거쳐, [FROM.GetLeader]는 오늘 상하이 조약기구의 회원국임을 선언했습니다. 희망적인 관측통들은 이러한 발전을 유라시아 대륙의 지역 경제 및 정치 협력의 진전으로 묘사하고 있으며, 보다 비관적인 분석가들은 중국의 영향력이 커지고 있으며 이것이 기존 세계 질서에 가해지는 위협에 대해 한탄하고 있습니다."
 sco.7.a: "중국의 위협이 계속해서 증가하고 있습니다..."
 sco.7.b: "외교를 위한 좋은 날이군!"
 sco.8.t: "상하이 협력 기구 (SCO)를 떠나는 [FROM.GetName]"
 sco.8.d: "현재의 [FROM.GetAdjective]측의 정부가 중국의 행동을 재평가한 후, [FROM.GetLeader]은/는 [FROM.GetNameDef]을/를 상하이 협력 기구에서 탈퇴시켰습니다. [CHI.GetLeader]은/는 아직 이 사안에 대해 언급하지 않았지만, 중국 정부와 관련된 언론 매체들은 이 탈퇴가 지역 통합 측면에서 한 발짝 뒤로 물러서는 것임을 유감스럽게 생각했습니다."
 sco.8.a: "중국의 침략은 이 나라를 소외시켰습니다."
 sco.8.b: "국제 협력의 슬픈 날이다..."
 sco.9.t: "러시아로부터 상하이협력기구의 주도권을 장악한 중국"
 sco.9.d: "상하이 협력기구는 역사적으로 중·러 공동의 노력으로 운영되었습니다. 그러나 중국의 이 조치에 대한 불만이 알려지면서 러시아가 조직 내에서 더 낮은 지위로 밀려났다고 합니다. [CHI.GetLeader]와 [SOV.GetLeader]은/는 모두 이 권력 투쟁에 대해 침묵을 지키고 있지만, 러시아 관리들은 중국에 분노하고 있으며, 슬라브 거인의 모욕이 SCO 회원국들 앞에서 벌어졌다는 사실에 비통해 하고 있습니다. 중앙 아시아의 지배권 측면에서 이 조치의 지정학적 파급 효과는 상당할 것으로 예상됩니다."
 sco.9.a: "중국은 자기 혼자서 주목을 받고 싶은 모양이군..."
 sco.10.t: "세력 선택을 강요하는 중국"
 sco.10.d: "우리가 계속해서 CSTO와 상하이 협력 기구 두 세력의 회원국으로 동시에 남아있게 되면서, 우린 앞으로 찾아올 중-러 분쟁에서 난감한 입장에 처하게 되었습니다. 중국은 상하이 협력기구를 떠나고 러시아 동맹에 남든지 아님 우리 상하이 협력기구에 남고 러시아를 버리든지 신속하게 결정하라고 요구하고 있습니다. 우리가 내리는 결정은 곧 다가올 두 거대한 세력들의 대결에서 실로 중요한 역할을 할 것입니다."
 sco.10.a: "우리는 그저 충성할 뿐이다!"
 sco.10.b: "침몰하는 배에서 떠날 시간이군..."
 sco.11.t: "개발 지원을 제공하는 [FROM.GetName]!"
 sco.11.d: "상하이협력기구(Shanghai Cooperation Organization)의 후원으로 [FROM.GetAdjective] 정부는 현지 기업의 개발 프로젝트를 촉진하는 데 꼭 필요한 자금과 자원을 제공하고 있습니다. 이러한 지원은 우리 경제에 좋은 소식이지만 [FROM.GetNameDef]가 우리나라에 행사하는 영향력의 정도를 높일 것입니다."
 sco.11.a: "우린 지원에 감사한다!"
 taiwan.1.t: "손에 손잡은 평화시위"
 taiwan.1.d: "연대시위가 열렸습니다. 200만에 달하는 사람들이 500km 길이의 인간사슬을 만들었습니다. 대만 최북단의 지룽항에서 시작되어 섬의 남쪽 끝까지 걸어갔습니다. 이 시위의 목적은 두가지입니다. 사람들은 평화를 원하고 인민중국공화국이 대만을 목표로 하는 미사일 배치를 항의하기 위한 것입니다. 이 시위의 상징은 참가자들로 하여금 '중국이여 물러가라'라는 생각을 가지게 하여 대만 독립을 지지하게 하여 범람연맹 회원이 아닌 이들도 이날만은 시위에 참가하여 후에도 그 생각을 이어나가도록 해야할 것입니다."
 taiwan.1.a: "희생자들을 잊지 말자."
 taiwan.2.t: "빌리스(Bilis) 태풍"
 taiwan.2.d: "태풍에 대한 대비로 섬 곳곳의 정부기관들은 패쇄되었습니다. 또한 사업장도 영업을 중지하고 비행편 일정을 다시 짰으며, 대피소도 지정하였습니다. 산사태에 대한 대비로 관련 경보가 대만 곳곳에 울렸습니다. 태풍은 아직 국내에 상륙하지 않았지만, 8월 22일 타이페이에서 한명이 다가오는 태풍의 영향으로 일어난 산사태에 매몰되었습니다. 이는 태풍으로 인한 첫번째 인재입니다. 비행편 일정이 재조정됨에 따라서, 수많은 공항이 폐쇄되었고 대만 증권 거래소는 8월 23일 문을 닫았습니다. 한편, 환자들이 증가할 것에 대비하여 병원은 24시간 운영에 들어갔습니다. 대만 해안 경비대는 높은 파고를 이유로 들어 어업활동을 제한하였습니다. 가오슝 항구 또한 이 기간동안에는 폐쇄됩니다. 다가오는 태풍으로 인해 높은 야채 수요로 음식의 가격이 20에서 30% 증가하였습니다.\n\n빌리스(Bilis)는 대만에 심각한 타격을 가져왔습니다. 국내 농업, 어업, 임업에 1억 3천 3백 5십만 달러에 달하는 피해를 입혔습니다. 태풍은 14명의 사망자와 80명의 부상자를 발생시켰습니다. 또한 600,000가구에 달하는 가구가 정전을 겪어야 했으며, 400채의 집이 파괴되었습니다. 몇백여 가구들이 단수를 며칠동안 겪었습니다. 쿵청에서는 픙속이 281km/h에 달해서 관측소의 측정기를 부수는 사태가 일어나기도 했습니다. 제나이 마을에서는 산사태가 일어나 9명의 농부가 매몰되기도 하였습니다. 수천명 중에 수십명의 비율로 태풍을 피해 국가지정 대피소에 몸을 피했습니다. 동화롄시에서는 250채의 집이 강풍에 날려갔습니다. 또한 나무들과 경차를 날려 길거리에 나뒹굴게 만들었습니다. 폭우는 40,000개에 이르는 가수원과 논을 잠기게 하였습니다. 태풍이 온 뒤로, 진도 5.7에 달하는 지진이 섬을 강타했으며, 상황을 더욱 더 악화시켰습니다."
 taiwan.2.a: "재건할 때다."
 taiwan.3.t: "대만 총통 선거"
 taiwan.3.d: "1947년에 제정된 헌법아래, 대만에서 두번째로 행해지는 대통령 직접선거로 10번째 대통령과 부통령을 뽑기 위함입니다. 국민당 지지자들의 의견이 반으로 나뉘면서 이 선거를 통해 반세기동안 이어내려오던 국민당의 집권이 끝날 수도 있습니다.\n\n비록 높은 지지율을 가지고 있는 전 대만 장관 쑹추위의 주장에도 불구하고 국민당에서의 지목을 받지 못했습니다. 그 결과로 그는 새로운 당을 설립하여 입후보하였습니다. 국민당은 이에 쑹추위와 그 지지자 21명을 당에서 내쫓았습니다. 국민당은 쑹추위가 정당 사무총장직을 수행할 때, 그를 도둑질로 기소하였습니다. 쑹추위는 전 대통령 장 징궈의 친인척을 위해 수백만 대만 달러에 달하는 금액을 훔치고 중싱 재정 법안에 숨겼습니다. 쑹추위는 리덩후이의 지시아래 이러한 행동을 했다고 하지만, 그가 하는 말은 설득력이 전혀 없었습니다. 초반에는 득표수에서 앞서나가고 있던 쑹추위였지만, 이러한 금융스캔들은 그의 청렴한 이미지를 흐렸고 결국에는 300,000 이상의 득표수를 잃어 당선에는 실패하였습니다.\n\n민주 진보당에서는 전 타이베이 시장 천수이볜이 대통령 후보로 지목되었습니다. 1996년 선거에서 압도적인 표차로 진 민주진보당은 1999년 5월, 그 진보정도를 \"대만의 향후에 대한 결의안\"을 발표하면서 낮추었습니다. 이 결의안에서는 현상유지와 이미 대만이 독립한 것이라는 사실을 인정하여, 필요하다면 어떠한 공식 성명도 급하게 할 필요가 없다고 하고 있습니다. 또한 대만의 국제적인 인식변화는 두려움을 완하하는 동시에 선거를 통해서 이루어져야 하며, 선거를 한다고 해도 민주진보당이 이와는 상관없이 자유롭게 의사결정을 할 수 있다고 선언했습니다. 또한 더욱 더 많은 자금을 공공부문에 투자하여 원자력 발전소 폐기와 같은 자연친화적 정책을 실시하여 석유 의존적 정책을 폐지할 것이라 약속했습니다."
 taiwan.3.a: "천수이볜 (민주진보당)"
 taiwan.3.b: "롄잔 (국민당)"
 taiwan.3.c: "쑹추위 (독립후보)"
 taiwan.4.t: "해안 경비 행정부(CGA) 설립"
 taiwan.4.d: "해안경비 행정부(CGA)는 해안경비 통제소, 해안경찰, 몇몇 대만 세관에 연관된 부서, 재정부와 합쳐진 곳입니다. 해안 경비 행정부(CGA)는 공직적으로 해안 및 해상 법집행소가 합쳐진 부입니다. 이는 향후 수많은 수색 및 구조, 반밀수 작전에 참여할 수 있어 관련된 젊은 공무원들에게는 크나큰 기회입니다.\n\n대양 위원회 산하의 해안 경비 행정부(CGA)는 법 집행과 대만, 평후 제도, 진먼, 마쭈섬, 그린 섬, 란위 섬, 동사, 난사 섬의 영해 자원 보호 및 이곳을 첫번째 방위지역이자 밀수꾼과 불법 입국자들을 저지하는 장소로 지정하였습니다. 해안경비 행정부(CGA)는 대양 위원회 산하의 민법 집행기관으로써 다루어지고 있고 비상사태에는 대만 군에 포함되어 함께 작전을 수행합니다.\n\n해안경비 행정부(CGA)에는 한명의 장관과 세명의 기관장이 자리를 차지하고 있습니다. 해안경비 행정부(CGA)에는 8개의 부서와 1개의 사무서, 해양 순찰대, 연안 순찰대와 같은 5개의 기동부대가 구성되어 있습니다. 이 기관의 관할권은 평후 제도, 진먼, 마쭈섬 대만 본토가 둘러싸고 있는 해양으로 이는 1,819.8km에 이르는 해안선과 540,000평방 킬로미터에 달하는 \"푸른 영토로\" 대만 본토보다 15배나 큰 크기입니다."
 taiwan.4.a: "해안선의 안전을 위해."
 taiwan.5.t: "국립 가오슝 대학 개교"
 taiwan.5.d: "대학은 남부와 북부의 격차를 줄이기 위해 남부의 경제를 부흥시키는 역활을 수행하고 있습니다.\n\n 서양 언어와 문학, 아시아 언어와 문학, 농업, 예술, 체육, 건강 및 레저 연구, 법, 행정과 행정법, 경제와 재정법, 응용 경제학, 응용 수학, 응용 화학, 전기 엔지니어링, 민간 및 환경 엔지니어링, 생명 과학, 아시아-태평양 산업 및 사업 관리, 전통예술, 재정, 정보 관리, 응용 체육학과 같은 20개의 과가 대학교에 존재하고 있습니다. 이 과들 중에서 아시아-태평양 산업 및 관리 학과가 산업분야에서 전문직들을 배출해내기 위한 곳입니다.\n\n이 대학의 특이한 점은 바로 개방된 공간이라는 것입니다. 대학 내외부에는 어떠한 벽도 없습니다. 대학 주변에 사는 이는 체육관 내부의 기구들을 이용하여 운동을 하거나 산책을 할 수 있습니다. 생물 다양성 또한 가오슝 국립 대학의 특징입니다. 학교 내부의 연못에는 60종류 이상의 물고기가 살고 잇습니다."
 taiwan.5.a: "남부에 많은 도움이 될거다."
 taiwan.6.t: "양안서비스부역협정(CSSTA)의 통과"
 taiwan.6.d: "대만 입법부의 승인에 따라 대만과 중국 본토 간의 자유 무역 협정인 CSSTA가 대만 법률에 공식적으로 진입했습니다. 이번 협정은 양국 관계의 심각한 개선을 의미하며, 양안 서비스 무역을 크게 향상시킬 것입니다. 그러나 이 거래를 비판하는 사람들은 이 거래가 중국으로부터 대만의 정치적 자치권을 위협하지 않는다는 점에 여전히 확신을 갖고 있지 않습니다."
 taiwan.6.a: "대만이 중국에 더 가까워진다."
 taiwan.7.t: "해바라기 운동 세력이 대만의 입법원을 점거하다"
 taiwan.7.d: "'해바라기 학생 운동'의 일원들은 머리에 해바라기 (태양화)를 두르고 본인들과 대만 입법원 사이에 방어벽을 세우고 중국 본토와의 양안서비스부역협정(CSSTA)을 통과시키려는 시도에 항의한데 이어 대만 입법원을 점거하는 시위를 했습니다. 이 시위 운동은 협정의 내용뿐만 아니라 협정 자체를 정부가 너무 서두르고 있으며, 협상 간 투명성이 결여되어있는 것에 대해 우려를 제기하고 있습니다."
 taiwan.7.a: "국민당의 수치다."
 taiwan.8.t: "중국의 '통일 로드맵'"
 taiwan.8.d: "[CHI.GetLeader] 정부는 대만이 결국 특별 행정 구역으로서 중국의 통제를 받을 수 있는 경로를 계획하는 \"통일을 위한 로드맵\"을 우리에게 제안했습니다. 이 제안에는 대만 민주주의와 정치적 자치의 지속을 위한 다양한 보호 장치가 포함되어 있지만, 이는 대만 반대자들이 본토와 통일하는 데 충분하지 않을 수 있습니다. 우리가 이 계획을 거부할 경우 중국이 어떻게 대응할지는 여전히 불확실합니다."
 taiwan.8.a: "우리는 그 계획을 받아들여야 한다."
 taiwan.9.t: "의심스러운 중국 정보 활동에 대한 보고"
 taiwan.9.d: "우리 정보국은 우리 영토에서 중국 요원들의 활동이 활발해지고 있다고 보고하고 있습니다. 이번 활동은 특별한 의미는 없지만, 마찬가지로 중국이 뭔가를 계획하고 있다는 뜻일 수도 있다. 우리 정보기관이 이를 조사하는 것이 시간을 잘 활용하는 것인지 결정해야 합니다."
 taiwan.9.a: "무해한 것 같습니다."
 taiwan.10.t: "중국, 대만관계법 폐지 요구!"
 taiwan.10.d: "중국은 대만 정부 당국과 우리의 현재 관계를 명시하는 대만 관계법을 폐지할 것을 요구했습니다. 이러한 요구는 의심할 여지 없이 최근 몇 달 동안 우리가 보아온 것보다 대만에 대한 훨씬 더 공격적인 행동의 서막입니다. 만약 우리가 이 법안을 철회한다면 대만해협에서 갈등이 일어날 가능성은 극적으로 높아질 것입니다."
 taiwan.10.a: "이는 터무니없는 요구이다!"
 taiwan.10.b: "우리가 한 발 물러서는게 맞다..."
 taiwan.11.t: "로드맵이 승인되었습니다!"
 taiwan.11.d: "타이베이는 궁극적인 통일을 위해 그들과 우리 측을 약속하는 공동 성명을 작성하기로 합의했습니다!"
 taiwan.11.a: "기쁘군!"
 taiwan.12.t: "로드맵이 거부되었습니다!"
 taiwan.12.d: "타이페이는 분열된 조국을 궁극적으로 통일하겠다는 약속을 거부했습니다. 우리는 우리의 제안이 받아들여질 가능성이 더 높은 조건을 기다렸다가 다시 시도할 수도 있고, 다른 대안을 추구할 수도 있습니다..."
 taiwan.12.a: "그들에게 나쁜 선택이다."
 taiwan.13.t: "타오위안 승무원 노조 파업"
 taiwan.13.d: "약 2,500명의 중화항공 객실 승무원을 대표하는 타오위안 승무원 연합이 대만 항공 역사상 첫 파업을 벌였습니다. 그 결과 타오위안 국제공항과 타이베이 쑹산 공항에서 출발하는 총 122편의 중화항공 승객 항공편이 취소되고 20,000명의 승객이 발이 묶였습니다. 노동조합은 더 나은 근무 조건을 위해 우리에게 7가지 요구 사항을 제시했습니다."
 taiwan.13.a: "그들의 요구를 받아들여라."
 taiwan.14.t: "파업 실패"
 taiwan.14.d: "우리가 그들의 요구를 거부하자 파업은 곧 중단되었습니다. 이제 모두가 직장으로 돌아가고 있습니다."
 taiwan.14.a: "그들은 기회가 없었어요"
 taiwan.15.d: "우리가 요구를 거부한 이후 파업은 더욱 격렬해졌습니다. 파업이 곧 해소될 것 같지는 않습니다."
 taiwan.15.a: "노력은 해봤다"
 taiwan.16.t: "탱크가 다리에서 떨어졌습니다."
 taiwan.16.d: "An army CM-11 tank toppled into a creek in Pingtung County as it was returning to base from a training exercise yesterday morning, killing three of the five soldiers onboard. The driver sustained only minor injuries and pulled himself out of the tank. The four others, who were inside the gun turret, could not escape through the turret's hatches because the tank was upside down."
 taiwan.16.a: "어떻게 이런 일이 일어날 수 있는지 조사해 보세요"
 hongkong.1.t: "중국은 합병을 취소하는 것을 거부했습니다!"
 hongkong.1.d: "중국은 우리의 위협을 일축했고, 우리는 따라갈 수밖에 없었습니다."
 hongkong.1.a: "그들은 더 이상 우리를 두려워하지 않는 것 같습니다."
 hongkong.2.t: "중국, 홍콩에 군대 배치"
 hongkong.2.d: "홍콩 특별행정구에서의 시위가 있은 후, 중국은 \"법과 질서를 회복하기 위해\" 인민해방군 소속 여러 부대에게 홍콩의 거리로 나가라고 명령했다. [CHI.GetLeader] 는 \"비폭력 시위자들\"은 저지받지 않을 것이며 체포된 이들은 국제 인권법에 의해 대해질 것이라고 발표했다. 하지만 홍콩과 해외의 많은 사람들은 중국군이 시위대에 대해 어느 정도까지 자제할 것인지에 대해 회의적인 입장을 표명했다."
 hongkong.2.a: "이 짓은 비열하다!"
 hongkong.2.b: "중국은 그들이 해야 할 일을 했다."
 hongkong.2.c: "우리의 상관할 바가 아니다."
 hongkong.3.t: "중국의 홍콩 합병"
 hongkong.3.d: "중국이 홍콩의 특별행정구 지위를 공식적으로 합병하는 것으로 종지부를 찍기로 결정했다. 우리는 이 중요한 사건에 대한 우리나라의 대응을 결정해야 합니다."
 hongkong.3.a: "이 짓은 비열하다!"
 hongkong.3.b: "중국은 그들이 해야 할 일을 했다."
 hongkong.3.c: "우리의 상관할 바가 아니다."
 hongkong.4.t: "중국의 홍콩 합병에 대한 대응을 요구"
 hongkong.4.d: "중국이 우리와 중국 간에 협상된 기본법을 노골적으로 위반하면서, 중국이 공식적으로 특별행정구역을 합병한 것입니다. 홍콩의 50년 자치권의 보증인으로서 우리는 적절한 대응으로 이러한 불법 행위를 충족시켜야 합니다."
 hongkong.4.a: "군사적 조치를 취해야 한다."
 hongkong.4.b: "경제적 조치를 취해야 한다."
 hongkong.4.c: "그들의 행동을 비판해야 한다."
 hongkong.5.t: "영국이 군사적 압박을 가하고 있습니다!"
 hongkong.5.d: "영국은 우리가 예상했던 것보다 더 호전적으로 그들의 이전 식민지를 합병하는 것에 반응했습니다. 우리는 그들의 요구를 받아들일지 여부를 고려해야 합니다."
 hongkong.5.a: "여기서 모든 것을 걸수는 없다."
 hongkong.5.b: "할테면 해보라지"
 hongkong.6.t: "영국이 우리에게 경제적 조치를 위협하고 있어요!"
 hongkong.6.d: "영국은 우리가 이전의 식민지 합병을 번복하지 않을 경우 우리에게 제재를 가하기로 결정했습니다. 우리는 그들의 요구에 귀를 기울여야 할지 말아야 할지를 고려해야 합니다."
 hongkong.6.a: "우린 서로 충돌을 피해아한다"
 hongkong.6.b: "그들의 위협은 아무 의미도 없어!"
 hongkong.7.t: "중국이 합병을 번복하기로 합의했습니다"
 hongkong.7.d: "영국의 힘을 경외한 듯, 중국은 홍콩 문제에 대해 한 발 물러섰습니다."
 hongkong.7.a: "우리의 위협은 여전히 효과가 있습니다!"
 korea.1.t: "한반도에서의 철수를 요구하는 중국"
 korea.1.d: "중화인민공화국은 대한민국을 보호하는 군대를 \"영향권\"에서 철수시킬 것을 요구해 왔습니다. 이러한 요구는 의심할 여지 없이 대한민국에 대한 공격적인 행동의 전주곡입니다. 우리가 한반도에서 병력을 철수하면 비무장지대(DMZ)를 넘나들며 충돌할 가능성이 획기적으로 높아질 것이다."
 korea.1.a: "이는 터무니없는 요구이다!"
 korea.1.b: "우리가 한 발 물러서는게 맞다..."
 korea.2.t: "우리의 경제 개혁을 부추기는 중국"
 korea.2.d: "[CHI.GetLeader] 는 우리 정부가 중국의 선례를 따르고 시장 자유화 개혁을 시작해야 한다고 촉구하고 있다. 1980년대에 중국이 겪었던 것과 같은 급속한 경제 성장을 경험하는 것은 매력적인 일이지만, 우리는 이러한 개혁을 추구하면서 필연적으로 초래될 불안정과 비교해 보아야 한다."
 korea.2.a: "지금은 개혁을 위한 시간이 아니다!"
 korea.2.b: "소규모 개혁을 시도해보자."
 korea.2.c: "어느 정도의 개혁을 시작해보자."
 korea.2.e: "전반적인 개혁에 착수하자."
 korea.3.t: "새로운 경제 개혁을 발표하는 [NKO.GetLeader]"
 korea.3.d: "중국의 개혁 압박 속에 북한은 경제 자유화 과정을 시작해 많은 이들이 '은둔 왕국'의 생활 수준을 높일 것이라는 희망을 갖게 됐습니다. 많은 경제학자들은 이 개혁 과정의 시작을 칭찬했지만, 다른 경제학자들은 개혁의 속도가 완전히 계획된 경제에 적응한 나라에 불안을 야기하지 않을까 하는 우려를 제기했습니다."
 korea.3.a: "좋은 소식인가?"
 korea.4.t: "중국과 북한의 결별"
 korea.4.d: "최근 몇 주간, 중국 정부와 연결된 언론에서 [NKO.GetLeader] 정권에 대한 비판이 급증했다. 이들 비판은 북한의 지속적인 핵 문제와 경제 자유화를 통해 시민들의 생활을 개선하지 못한 북한 정부에 대한 것이다.\n\n[CHI.GetLeader]는 이 문제에 대해 침묵을 지켜왔지만, 이러한 언론 기관들이 한 번 친한 동맹국에 대한 이같은 비난을 일으키는 것은 [CHI.GetLeader]의 암묵적인 승인 없이는 불가능할 것으로 보인다. 많은 관측가들은 이를 통해 중국의 김씨 왕조에 대한 좌절과 중국의 의사에 더 적합하고 안정적인 대안 정부 설립을 원하는 가능성을 볼 수 있다."
 korea.4.a: "오직 [CHI.GetLeader]만이 모든 것을 알고 있다..."
 korea.5.t: "협상을 시작해보자"
 korea.5.d: "북한의 주된 요구는 우리가 미국과의 합동 군사 훈련을 중단하는 것입니다. 그들이 그들의 영토 침공을 위한 준비로 보는 훈련입니다. 그러나 이러한 훈련은 북한의 공격에 대비해 필요한 준비로 우리 군이 보는 시각이 많습니다. 따라서 이러한 훈련들을 중단하는 것에 동의하는 것은 중대한 도박이 될 것이며, 우리나라의 안전이 위태롭게 될 것입니다."
 korea.5.d_NKO: "남한의 주된 요구는 핵무기 실험, 즉 우리의 공격적인 의도를 보여주는 실험을 중단하라는 것입니다. 그러나 군 당국은 우리의 핵무기 프로그램을 미국의 침략에 대한 중요한 억제책으로 보고 있습니다. 게다가, 그 프로그램의 지속에 필요한 프로그램과 테스트는 우리 정부의 합법성을 강화하는 데 도움이 됩니다. 따라서 이러한 실험을 중단하는 것에 동의하는 것은 중요한 도박이 될 것이며, 우리나라와 우리 정부의 안전이 위태롭게 될 것입니다."
 korea.5.a: "우린 조금의 위험을 감수하지 않는한 절대로 하나가 되지 않을 것이다..."
 korea.5.b: "일부 위험은 감당하기에는 너무 큽니다."
 korea.6.t: "베이징에서 한반도의 평화 회담이 개최되다"
 korea.6.d: "반세기 넘게 북한과 남한은 엄밀히 말하면 전쟁 상태에 있었습니다. 이 얼어붙은 갈등은 때때로 분쟁지역인 해상경계선을 따라 또는 DMZ를 넘어 양측의 충돌로 가열되었습니다. 이제 양측은 공식적인 평화협정을 통해 이러한 국면을 종식시키고 한반도 비핵화를 이룰 수 있기를 희망하며 한자리에 모이고 있습니다. 평화협정 협상은 한반도 통일을 위한 중요한 첫 단계로 널리 인식되고 있습니다."
 korea.6.a: "과연 두 국가가 타협할 수 있을까?"
 korea.7.t: "한국의 통일 지원에 대한 목소리를 내는 [CHI.GetLeader]"
 korea.7.d: "중국은 역사적으로 한국이 미국과 동맹을 맺을 가능성을 경계해 왔습니다. 언론들은 그렇기에 [CHI.GetLeader] 가 통일을 지지한다는 것에 예상 외라는 반을을 보였고, 북한의 지도층조차 예측하지 못했다라는 반응이 있습니다. 남북 모두에서 중국의 실질적 영향력을 감안할 때 이번 발표는 양측이 협상 테이블로 나오도록 압박할 것으로 보입니다."
 korea.7.a: "좋은 발전이다!"
 recognition.1.t: "[FROM.GetName] Recognizes the Breakaway"
 recognition.1.d: "[FROM.GetNameDef] has extended formal diplomatic recognition to the breakaway state on our territory. The decision is a setback for our claim to the region."
 recognition.1.a: "우리는 분열되지 않을것이다."
 recognition.3.t: "[FROM.GetName] Withdraws Recognition"
 recognition.3.d: "[FROM.GetNameDef] has reversed its earlier recognition of our sovereignty. Whatever the reason, the result is the same."
 recognition.3.a: "The struggle continues."
 recognition.4.t: "[FROM.GetName] Withdraws Recognition of the Breakaway"
 recognition.4.d: "[FROM.GetNameDef] has reversed its earlier recognition of the breakaway state on our territory. One fewer capital backs their claim to sovereignty."
 recognition.4.a: "A small victory for our position."
 recognition.7.t: "[FROM.GetName]의 국제연합 가입"
 recognition.7.d: "After a sustained campaign for international recognition, [FROM.GetNameDef] has been admitted to the United Nations General Assembly as a member state."
 recognition.7.a: "Welcome to the General Assembly."
 recognition.8.t: "[FROM.GetName] Pressures Us to Recognize [pressured_to_recognize]"
 recognition.8.d: "[FROM.GetNameDef] is leveraging its influence over us to force recognition of [pressured_to_recognize]. Refusing a partner with this much leverage carries a real cost."
 recognition.8.a: "We extend recognition."
 recognition.8.b: "We refuse to recognize this regime."
 internal_faction.1.t: "예산 인상을 요청하는 군부"
 internal_faction.1.d: "군은 국가 안보에 대한 새로운 위협을 언급하며 [ROOT.GetAdjective] 국방 예산의 증액을 요청했다. 이 요청을 승인하면 우리 예산에 대한 압력이 증가하지만 이를 거부하면 우리 정부에 대한 군의 의견이 줄어들 것입니다."
 internal_faction.1.a: "자금을 지원해줘야 한다."
 internal_faction.1.b: "비용을 감당할 여유가 없다!"
 internal_faction.2.t: "일부 공산당 간부들의 부패 행위 연루 포착"
 internal_faction.2.d: "우리 정보기관은 최근 일부 공산당 간부들이 뇌물을 받고 족벌주의에 가담하고 있다는 사실을 발견했습니다. 한편으로, 우리가 인민의 눈에 합법적으로 남아 있기를 원한다면 그러한 활동을 처벌받지 않고 방치해서는 안 되지만, 다른 한편으로 그러한 움직임은 분명히 공산당 내의 많은 중요한 동맹국들을 소외시킬 것입니다."
 internal_faction.2.a: "눈 감아주어야 한다"
 internal_faction.2.b: "본보기로 삼아야 한다!"
 internal_faction.3.t: "대기업들이 세금 감면을 요청하다."
 internal_faction.3.d: "[ROOT.GetName]측의 가장 큰 산업 재벌 중 일부의 수장들은 비공개로 우리 정부에 더 많은 세금 감면을 요청하고 있습니다. 이러한 세금 감면을 허가하면 산업 재벌들의 정부에 대한 여론이 개선될 수 있지만, 전국적인 세수입은 감소할 것입니다."
 internal_faction.3.a: "세금 감면을 수용해야 한다."
 internal_faction.3.b: "그런 협의는 진행할 수 없다."
 isis.1.t: "이슬람 국가에게서의 승리"
 isis.1.d: "이슬람 국가가 패배하였으며, 자국은 이제 이슬람 국가가 만드는 극단주의 선전에 시달리지 않아도 됩니다. 이제 국내에 우리 이념을 퍼뜨리는데 집중하며, 다시는 극단주의자들이 설치지 않을 것입니다."
 isis.1.a: "좋아"
 isis.2.t: "타흐리르 알샴 침투?"
 isis.2.d: "모든 무슬림의 칼리프인 [Root.GetLeader]의 말입니다. 우리는 존재 자체를 용서할 수 없는 우리의 통치를 거부한 타흐리르 알샴을 공격해야 한다. 저들이 진정한 이슬람의 법도를 따르고 영광스러운 지하드를 수행하고, 훌륭한 지하드 전사들을 보유하고 있다. 인샬라(신의 뜻대로), 우리는 저들에게 잠입하여 우리의 칼리프를 따르도록 해야할 것이다!"
 isis.2.a: "이 가짜 지하드 전자들에게 진정한 전사의 믿음을 보여주자!"
 isis.2.b: "안된다, 위협을 감수할 수는 없다."
 isis.2.a_tt: "§H잠입 실패§! (효과없음)"
 isis.3.t: "다이시에 전사들이 매료당하다"
 isis.3.d: "[Root.GetLeader]! \"이슬람\" 국가라 불리는 곳에서 우리에게 침투하고 우리 최고의 전사들을 자신들의 세력에 편을 서도록 하였습니다. 아직까지 정확한 답을 내놓을 수는 없으나, 신성한 쿠란을 화장실 휴지로 쓰는 이 하리지파를 패퇴시켜야 합니다."
 isis.3.a: "우리, 적법한 지하드는, 그들을 개처럼 숙청할 것이다!"
 isis.3.b: "안된다, 전선을 확대할 수는 없다"
 isis.4.t: "타흐리르 알샴 병력의 패퇴"
 isis.4.d: "칼리프시여 머릿수로 많고 용감한 무와히드 형제들이 우리와 합류하는 대신 사악한 타흐리르 알샴 전선을 격퇴시켰습니다!"
 isis.4.a: "위대하군(Takbir)! 이슬람 국가는 위대하다(Takbir)!"
 isis.4.a_tt: "§H라카§!에 2개의 §H자밧 알 너스라 여단§!을 생성합니다."
 isis.5.t: "타흐리르 알샴에 대한 결제"
 isis.5.d: "칼리프시여, 씹어먹어도 시원치않을 타흐리르 알샴 전선이 우리의 예상보다 더 약해졌고, 우리 측의 잠입과 선동에도 아무런 조취를 취하지 않고 있습니다. 슈라 전쟁 의회에서는 개처럼 엎드려 있는 놈들을 도륙하고 땅을 되찾기를 조언하고 있습니다. 이는 모두 칼리프께 바치는 것입니다!"
 isis.5.a: "누가 오사마의 진정한 후계자인지 이 버러지들에게 가르쳐줘라!"
 isis.5.b: "적절한 때이지만, 조금 더 기다려야 한다."
 isis.6.t: "타흐리르 알샴 잔당이 우리에게 합류하다"
 isis.6.d: "칼리프시여 승리가 우리의 입술을 적시고 있습니다. 패배가 가까워지면서, 아흐리르 알샴 잔당들이 [Root.GetLeader], 당신에게 합류하려하고 있습니다. 이는 우리나라를 강성하게 만들어줄 것입니다."
 isis.6.a: "진정한 칼리파국으로써 형제들을 환영하지!"
 isisNews.1.t: "타흐리르 알샴이 ISIS에 합류하다"
 isisNews.1.d: "타흐리르 알샴 시리아 이슬람주의자들의 증가하는 압박으로, 저들의 잔존 병력들은 ISIS와 합류하고 시리아에 근거지를 두려하고 있습니다."
 isisNews.1.a: "주여, 우리 모두를 도우소서!"
 isis.7.t: "숨겨짐"
 isis.7.d: "숨겨짐"
 isis.7.a: "숨겨짐"
 isis.1301.t: "아부 파티마가 미군의 공습에 사망하다"
 isis.1301.d: "나쁜 소식입니다, 칼리프시여! 당신의 친우이자 이라크 지도를 담당하던 아부 파티마 말 자헤이시가 망할 미국 놈들의 공습으로 순교자가 되었습니다.\n\n                                               그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isis.1301.a: "워싱턴 DC를 정복할 때 그의 복수를 하리라!"
 isisNews.1301.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1301.d: "이라크 테러리스트이자 ISIS 간부인 아부 파티마 알 자헤이시가 오늘 이어진 미군의 공습에 사망했습니다. 아부 파티마는 알 바그다디의 세력의 내부 동조자로 ISIS가 이라크를 통제하는데 있어서 지도자 역활을 했던 자입니다."
 isisNews.1301.a: "좋은 소식이군!"
 isis.1302.t: "미국의 공습에 알 알 설라미가 순교자가 되다"
 isis.1302.d: "나쁜 소식입니다, 칼리프시여! 아부 서퍈 알 설라미가 망할 미국 놈들의 공습으로 순교자가 되었습니다. 바레인에서 온 그는 우리에게 중요한 종교적 후광이 되어주었습니다.\n\n               칼리프시여, 그는 당신의 전기로 우리들의 신앙심을 더욱 더 불타게 해주었습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1302.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1302.d: "바레인 테러리스트이자 ISIS 간부이자 종교적 지도자인 투르크인 알 비나리가 오늘 이어진 미군의 공습에 사망했습니다. 알 비나리는 ISIS에게 있어서 군사부문에서 중요한 인물은 아니었지만, 신앙심을 전사들에게 전파하고 아부 바크 알 바르다디의 첫번째 전기를 쓴 인물입니다."
 isis.1303.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1303.d: "나쁜 소식입니다, 칼리프시여! 알바니아와 코소보 전사들의 Emir(지도자)이자 간부인 라브드림 머학스헤리가 망할 미국 놈들의 공습으로 순교자가 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1303.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1303.d: "코소보-알바니아 테러리스트이자 ISIS 간부였던 라브드림 머학스헤리가 오늘 이어진 미군의 공습에 사망했습니다. 먹학스헤리는 NATO 측에서 아프가니스탄에서 싸웠지만, 2012년에 급진적으로 변하고 시리아로 향했습니다. 2013년에는 ISIS에 합류하여 재빠르게 시리아와 아라크에서 알바니아과 코소보 전사들을 이끄는 'Emir(지도자)'가 되었습니다. 그는 직접 포로들을 참수하는 잔혹한 자였습니다."
 isis.1304.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1304.d: "칼리프시여, 경악스러운 소식입니다! 정예 지휘관인 걸머로드 칼리모브가 망할 미국 놈들의 공습으로 순교자가 되었습니다. 그의 발자취를 추적해 보면, 타지크 공화국 출신으로 고위급 특수부대 장교였습니다. 슬프게도 그의 군사 지식을 사용할 수 없게 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1304.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1304.d: "타지크 공화국의 테러리스트이자 ISIS의 간부였던 걸머로드 칼리모브가 오늘 이어진 미군의 공습에 사망했습니다. 칼리모브는 이전에 타지크 공화국 육군의 경험많고 고위 특수부대 장교였습니다."
 isis.1305.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1305.d: "칼리프시여, 경악스러운 소식입니다! 순교 임무와 외국 전사들을 양성하는 핵심적인 역활을 한 압둘 아메드 알 마샤다니가 망할 미국 놈들의 공습으로 순교자가 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1305.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1305.d: "이라크 테러리스트이자 ISIS 간부였던 압둘라 아메드 알 마샤다니가 오늘 이어진 미군의 공습에 사망했습니다. 알 마샤다니는 자살 폭탄 작전과 해외 지하드들을 양성하는데 핵심적인 역할을 수행한 인물입니다."
 isis.1306.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1306.d: "칼리프시여 나쁜 소식입니다! 중앙 유프라테스 지역의 총독인 아메드 칼랄 알 주햐시가 망할 미국 놈들의 공습으로 순교자가 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1306.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1306.d: "이라크 테러리스트이자 ISIS 간부였던 아메드 칼랄 알 주햐시가 오늘 이어진 미군의 공습에 사망했습니다. 알 주햐시는 뛰어난 지휘관은 아니었지만, ISIS가 통치하는 중앙 유프라테스 부근인 중요한 곳의 행정가이자 총독으로 부임하였습니다."
 isis.1307.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1307.d: "칼리프시여 나쁜 소식입니다! 당신의 친우이자 보급 및 군수품 최고권자인 망할 미국 놈들의 공습에 순교자가 되었습니다. 그는 충성스러운 많은 전사들에게 물자 지원을 해주었고 2003년까지 불신자들에 대항해 싸웠습니다.\n\n                                 그는 칼리프의 영광을 위해 많은 이들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1307.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1307.d: "이라크 테러리스트이자 ISIS 간부였던 페레스 리프 알 나이마가 오늘 이어진 미군의 공습에 사망했습니다. 알 나이마는 이라크 전쟁에서 미군에 대항하여 싸웠고 이후에는 알 바그다디와 함께 수용소에 수감되었습니다. 이후 그는 ISIS 산하에서 보급 및 군수품 담당을 맞았습니다."
 isis.1308.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1308.d: "칼리프시여, 나쁜 소식입니다! 아부 아메드 알 알와니가 미국 불신자들의 공습으로 순교자가 되었습니다. 그는 사담 후세인 정권하의 장교였던 자로, 그 후로는 수니파 반란군으로써, 그리고 자국에서 많은 도움을 주었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1308.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1308.d: "이라크 테러리스트이자 ISIS 간부였던 아부 아메드 알 알와니가 오늘 이어진 미군의 공습에 사망했습니다. 알 알와니는 사담 후세인 정권 하의 군 장교로써 이전에 가담하기 전에는 미군에 대항하는 수니파 반란군이었습니다. 그는 ISIS에서 빠르게 승급하여 간부자리를 차지하게 되었습니다."
 isis.1309.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1309.d: "칼리프시여, 나쁜 소식입니다! 아부 무하마드 알 시말리가 미국 불신자들의 공습으로 순교자가 되었습니다. 아라비아 반도에서 온 그는 밀수를 통해 우리의 우리들의 원유로 무기를 구입했습니다. 그는 많은 전사들을 양성하였고 영원히 기억될 2015년 파리 테러에서 핵심적인 역활을 수행하였습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1309.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1309.d: "사우디아라비아 테러리스트이자 ISIS의 간부였던 아부 무하마드 알 시말리가 오늘 이어진 미군의 공습으로 사망했습니다. 알 시말리는 ISIS의 신병 양성에 있어 핵심 보직을 역임하고 있었고 또한 밀수 부문에 있어서 크나큰 공을 세웠습니다. 더해서 첩보 조직에서는 그가 2015 파리 테러에서 중요한 역활을 하였다고 보고했습니다."
 isis.1310.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1310.d: "칼리프시여, 재앙입니다! 전쟁장관이자 이인자, 야야드 알주마일리가 망할 미국 놈들의 공습으로 용감하게 순교자의 길을 걷게 되었습니다. 이라크인인 그는 사담 후세인 아래서 첩보 조직 장교이자 그는 사담 후세인 산하에서 첩보 조직의 간부로써 지혜를 이용하여 어떻게 칼리파국을 내부의 적에게서 지킬지 고뇌했으며, 이는 우리 조직 내의 첩보 및 내부방위를 책임질 때도 마찬가지였습니다.\n\n                                               그는 많은 반역자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1310.t: "ISIS의 이인자가 미군의 공습에 사망하다"
 isisNews.1310.d: "이라크 테러리스트이자 ISIS의 이인자, 아야드 알주마일리가 오늘 이어진 미군의 공습으로 사망하였습니다. 알주마일리는 2003년 미군의 점령 이후 나타난 수니파 반란의 사담 후세인 산하의 첩보 조직 장교로, 후에는 전쟁장관이자 이인자로 승격했습니다."
 isis.1311.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1311.d: "칼리프시여, 나쁜 소식입니다! 고위급 지휘관인 카이리 아베드 마흐무드 알 테이가 망할 미국 놈들의 공습으로 순교자가 되었습니다. 이라크 출신인 그는 군사 슈라의 일원으로 급조 폭발물(IED) 작전을 이끌며, 적들의 심장부에 공포를 안겨다주었습니다.\n\n                                               그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1311.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1311.d: "이라트 테러리스트이자 ISIS 고위급 지휘관이었던 카이리 아베드 마흐무드 알 테이가 오늘 이어진 미군의 공습에 사망했습니다. 알 테이는 ISIS 군사 의회에 속한 동시에 급조 폭발물(IED) 작전을 이끌며, 적들의 심장부에 공포를 안겨다주었습니다."
 isis.1312.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1312.d: "칼리프시여, 나쁜 소식입니다! 당신의 친우이자, 고문이며, 고위급 지휘관인 압둘 와히트 커트나여 아메드가 망할 미국 놈들의 공습으로 순교자가 되었습니다. 이라크인인 그는 내부 방위를 책임지고 있었습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1312.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1312.d: "이라크 테러리스트이자 ISIS 고위급 지휘관이었던 압둘 와히드 커트나여 아메드가 오늘 이어진 미군의 공습에 사망했습니다. 커트나여 아메드는 알 바그다디의 핵심 고문으로써 내부 방위에 책임을 지고 있었습니다."
 isis.1313.t: "간부가 미국의 공습에 순교자가 되다"
 isis.1313.d: "칼리프시여, 경악스러운 소식입니다! 우리의 고위 지휘관인 아부 지하드 시샤니가 망할 미국 놈들의 공습으로 순교자가 되었습니다. 체첸에서 온 그는 끝까지 알라를 위해서 용감하게 싸웠습니다.\n\n                                               그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.1313.t: "ISIS 간부가 미군의 공습에 사망하다"
 isisNews.1313.d: "체첸 테러리스트이자 ISIS 고위급 지휘관이었던 아부 지하드 시샤니가 오늘 이어진 미군의 공습에 사망했습니다. 러시아 국적의 시샤니는 우마르 시샤니가 지휘하던 이마라트 캅카스 테러 조직의 이인자였습니다. 우마르가 시리아로 떠나 ISIS에 합류한 뒤로, 아부 지하드는 ISIS와 동맹을 맺어 이마라트 캅카스 테러 조직을 장악하여 했지만, 그 여정도 끝나게 되었습니다."
 isis.11301.t: "아부 파티마가 러시아군의 공습에 사망하다"
 isis.11301.d: "나쁜 소식입니다, 칼리프시여! 당신의 친우이자 이라크 지도를 담당하던 아부 파티마 말 자헤이시가 망할 러시아 놈들의 공습으로 순교자가 되었습니다.\n\n                                               그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isis.11301.a: "모스크바를 정복할 때 그의 복수를 하리라!"
 isisNews.11301.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11301.d: "이라크 테러리스트이자 ISIS 간부인 아부 파티마 알 자헤이시가 오늘 이어진 러시아군의 공습에 사망했습니다. 아부 파티마는 알 바그다디의 세력의 내부 동조자로 ISIS가 이라크를 통제하는데 있어서 지도자 역활을 했던 자입니다."
 isisNews.11301.a: "좋은 소식이군!"
 isis.11302.t: "러시아의 공습에 알 알 설라미가 순교자가 되다"
 isis.11302.d: "나쁜 소식입니다, 칼리프시여! 아부 서퍈 알 설라미가 망할 러시아 놈들의 공습으로 순교자가 되었습니다. 바레인에서 온 그는 우리에게 중요한 종교적 후광이 되어주었습니다.\n\n                 칼리프시여, 그는 당신의 전기로 우리들의 신앙심을 더욱 더 불타게 해주었습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11302.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11302.d: "바레인 테러리스트이자 ISIS 간부이자 종교적 지도자인 투르크인 알 비나리가 오늘 이어진 러시아군의 공습에 사망했습니다. 알 비나리는 ISIS에게 있어서 군사부문에서 중요한 인물은 아니었지만, 신앙심을 전사들에게 전파하고 아부 바크 알 바르다디의 첫번째 전기를 쓴 인물입니다."
 isis.11303.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11303.d: "나쁜 소식입니다, 칼리프시여! 알바니아와 코소보 전사들의 Emir(지도자)이자 간부인 라브드림 머학스헤리가 망할 러시아 놈들의 공습으로 순교자가 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11303.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11303.d: "코소보-알바니아 테러리스트이자 ISIS 간부였던 라브드림 머학스헤리가 오늘 이어진 러시아군의 공습에 사망했습니다. 먹학스헤리는 NATO 측에서 아프가니스탄에서 싸웠지만, 2012년에 급진적으로 변하고 시리아로 향했습니다. 2013년에는 ISIS에 합류하여 재빠르게 시리아와 아라크에서 알바니아과 코소보 전사들을 이끄는 'Emir(지도자)'가 되었습니다. 그는 직접 포로들을 참수하는 잔혹한 자였습니다."
 isis.11304.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11304.d: "칼리프시여, 경악스러운 소식입니다! 정예 지휘관인 걸머로드 칼리모브가 망할 러시아 놈들의 공습으로 순교자가 되었습니다. 그의 발자취를 추적해 보면, 타지크 공화국 출신으로 고위급 특수부대 장교였습니다. 슬프게도 그의 군사 지식을 사용할 수 없게 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11304.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11304.d: "타지크 공화국의 테러리스트이자 ISIS의 간부였던 걸머로드 칼리모브가 오늘 이어진 러시아군의 공습에 사망했습니다. 칼리모브는 이전에 타지크 공화국 육군의 경험많고 고위 특수부대 장교였습니다."
 isis.11305.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11305.d: "칼리프시여, 경악스러운 소식입니다! 순교 임무와 외국 전사들을 양성하는 핵심적인 역활을 한 압둘 아메드 알 마샤다니가 망할 러시아 놈들의 공습으로 순교자가 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11305.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11305.d: "이라크 테러리스트이자 ISIS 간부였던 압둘라 아메드 알 마샤다니가 오늘 이어진 러시아군의 공습에 사망했습니다. 알 마샤다니는 자살 폭탄 작전과 해외 지하드들을 양성하는데 핵심적인 역할을 수행한 인물입니다."
 isis.11306.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11306.d: "칼리프시여 나쁜 소식입니다! 중앙 유프라테스 지역의 총독인 아메드 칼랄 알 주햐시가 망할 러시아 놈들의 공습으로 순교자가 되었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11306.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11306.d: "이라크 테러리스트이자 ISIS 간부였던 아메드 칼랄 알 주햐시가 오늘 이어진 러시아군의 공습에 사망했습니다. 알 주햐시는 뛰어난 지휘관은 아니었지만, ISIS가 통치하는 중앙 유프라테스 부근인 중요한 곳의 행정가이자 총독으로 부임하였습니다."
 isis.11307.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11307.d: "칼리프시여 나쁜 소식입니다! 당신의 친우이자 보급 및 군수품 최고권자인 망할 러시아 놈들의 공습에 순교자가 되었습니다. 그는 충성스러운 많은 전사들에게 물자 지원을 해주었고 2003년까지 불신자들에 대항해 싸웠습니다.\n\n                             그는 칼리프의 영광을 위해 많은 이들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11307.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11307.d: "이라크 테러리스트이자 ISIS 간부였던 페레스 리프 알 나이마가 오늘 이어진 러시아군의 공습에 사망했습니다. 알 나이마는 이라크 전쟁에서 미군에 대항하여 싸웠고 이후에는 알 바그다디와 함께 수용소에 수감되었습니다. 이후 그는 ISIS 산하에서 보급 및 군수품 담당을 맞았습니다."
 isis.11308.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11308.d: "칼리프시여, 나쁜 소식입니다! 아부 아메드 알 알와니가 러시아 불신자들의 공습으로 순교자가 되었습니다. 그는 사담 후세인 정권하의 장교였던 자로, 그 후로는 수니파 반란군으로써, 그리고 자국에서 많은 도움을 주었습니다.\n\n                                                그는 많은 불신자들을 죽였습니다. \n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11308.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11308.d: "이라크 테러리스트이자 ISIS 간부였던 아부 아메드 알 알와니가 오늘 이어진 러시아군의 공습에 사망했습니다. 알 알와니는 사담 후세인 정권 하의 군 장교로써 이전에 가담하기 전에는 미군에 대항하는 수니파 반란군이었습니다. 그는 ISIS에서 빠르게 승급하여 간부자리를 차지하게 되었습니다."
 isis.11309.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11309.d: "칼리프시여, 나쁜 소식입니다! 아부 무하마드 알 시말리가 러시아 불신자들의 공습으로 순교자가 되었습니다. 아라비아 반도에서 온 그는 밀수를 통해 우리의 우리들의 원유로 무기를 구입했습니다. 그는 많은 전사들을 양성하였고 영원히 기억될 2015년 파리 테러에서 핵심적인 역활을 수행하였습니다.\n\n                                                그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11309.t: "ISIS 간부가 러시아군의 공습에 사망하다"
 isisNews.11309.d: "사우디아라비아 테러리스트이자 ISIS의 간부였던 아부 무하마드 알 시말리가 오늘 이어진 러시아군의 공습으로 사망했습니다. 알 시말리는 ISIS의 신병 양성에 있어 핵심 보직을 역임하고 있었고 또한 밀수 부문에 있어서 크나큰 공을 세웠습니다. 더해서 첩보 조직에서는 그가 2015 파리 테러에서 중요한 역활을 하였다고 보고했습니다."
 isis.11310.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11310.d: "칼리프시여, 재앙입니다! 전쟁장관이자 이인자, 야야드 알주마일리가 러시아 불신자들의 비열한 공습에 순교자가 되었습니다. 이라크인인 그는 사담 후세인 산하에서 첩보 조직의 이인자로써 지혜를 이용하여 어떻게 칼리파국을 내부의 적에게서 지킬지 고뇌했으며, 이는 우리 조직 내의 첩보 및 내부방위를 책임질 때도 마찬가지였습니다.\n\n                                               그는 많은 배신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11310.t: "러시아의 공습으로 죽은 ISIS 이인자"
 isisNews.11310.d: "이라크 테러리스트이자 이슬람 국가의 이인자, 아야드 알주마일리가 오늘 이어진 러시아 공습으로 사망했습니다. 알주마일리는 2003년 미군의 점령 이후 수니파 반란을 일으킨 사담 후세인 산하의 첩보 조직의 이인자입니다. 그는 곧 이슬람 국가의 첩보 및 내부방위를 책임지는 수장이 되었고 후에는 전쟁 장관이자 조직의 이인자 자리를 차지하게 되었습니다."
 isis.11311.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11311.d: "칼리프시여, 나쁜 소식입니다! 이인자인 카하리 아베드 마흐무드 알 테이가 러시아 불신자들의 공습으로 순교자가 되었습니다. 이라크인인 그는 군사 슈라의 일원으로 급조 폭발물(IED) 작전을 이끌며, 적들의 심장부에 공포를 안겨다주었습니다.\n\n                                               그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11311.t: "ISIS 간부가 러시아 공습에 순교자가 되다"
 isisNews.11311.d: "이라크 테러리스트이자 ISIS 이인자인 카하리 아베드 마흐무드 알 테이가 오늘 이어진 러시아 공습으로 사망했습니다. 알 테이는 ISIS 군사 위원회의 일원으로 급조 폭발물(IED) 작전의 수장으로 이를 통해서 도시를 혼돈의 도가니로 만들었습니다."
 isis.11312.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11312.d: "칼리프시여 나쁜 소식입니다! 당신의 친우이자 고문이며, 이인자인 압둘 와히드 쿠트나예르 아흐마드가 러시아 불신자들의 공습으로 순교자가 되었습니다. 이라크인인 그는 내부 방위를 책임지고 있었습니다.\n\n                                       그는 많은 배신자들과 불신자들의 목을 수거했습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11312.t: "ISIS 간부가 러시아 공습에 사망하다"
 isisNews.11312.d: "이라크 테러리스트이자 ISIS 이인자, 압둘 와히드 쿠트나예르 아흐마드가 오늘 이어진 러시아의 공습으로 사망했습니다. 커트야여 아흐메드는 알 바그아디의 핵심 고문으로써 내부 방위를 책임지고 있었습니다."
 isis.11313.t: "간부가 러시아의 공습에 순교자가 되다"
 isis.11313.d: "칼리프시여, 경악스러운 소식입니다! 이인자인 아부 지하드 시샤니가 러시아의 불신자들의 공습으로 순교자가 되었습니다. 그는 체첸에서 우리들의 품으로 온 이로, 끝까지 알라를 위해 싸웠습니다.\n\n                                               그는 많은 불신자들을 죽였습니다.\n\n                                         알라께서 그의 순교를 허하시기를."
 isisNews.11313.t: "ISIS 간부가 러시아 공습에 사망하다"
 isisNews.11313.d: "체첸 테러리스트이자 ISIS 간부인 아부 지하드 시샤니가 오늘 이어진 러시아의 공습으로 사망했습니다. 러시아 국적을 가지고 있는 시샤니는 우마르 시샤니가 지도자인 이마라트 캅카스 테러조직의 이인자입니다. 우머가 시리아에서 ISIS와 동조한 뒤부터는, 아부 지하드는 이마라트 캅카스 조직의 행동에 나섬에 있어서 시리아와 함께 행동하였지만, ISIS를 위해 싸우기 위한 시리아에서의 여정은 간부 두명의 죽음으로 끝나고 말았습니다."
 brotherhood.6.t: "무슬림 형제단 시위대가 선거를 요구하다"
 brotherhood.6.d: "[Root.GetAdjective] 무슬림 형제단은 국내 전 도시의 중앙 광장을 점령하고 소리 지르며 선거를 요구하고 있습니다. 이들은 잘 조직되었으며, 해체시킬 대안으로는 군대를 동원해 지도자와 이들을 구금하거나 아니면 요구를 들어주고 선거를 여는 것 뿐입니다."
 brotherhood.6.a: "이 폭도들을 치우고 지도자를 생포해라"
 brotherhood.6.b: "저들의 요구를 들어주고 선거를 열어라"
 brotherhood.7.t: "강력탄압의 잔혹한 역효과"
 brotherhood.7.d: "전략적인 작전으로 지도자를 잡고 다른이들에게 본보기를 보여주기 보다는, 하층 무슬림 형제단 지지자들과 그 가족들의 대량학살이 발생했습니다. 이러한 부당함은 일반 시민들 사이에 정권의 교체에 대한 목소리가 커지게 되는 요인이 되었습니다. 정부 고문은 국내 안보 자금의 증가로 이러한 일이 다시는 발생하지 않을 수 있다는 점을 말하고 있습니다."
 brotherhood.7.a: "경찰들과 군인들을 꾸짖어라"
 brotherhood.8.t: "무슬림 형제단 테러리스트가 감옥을 습격하다"
 brotherhood.8.d: "무장 무슬림 형제단 테러리스트가 성공적으로 테러리스트, 범죄자, 잠재적 테러리스트들을 수감하고 있는 국영 감옥을 습격하였습니다. 경비병들은 죽었고 죄수들은 풀려났습니다. 이는 아시금 망할 무슬림 형제단들을 없애는데 온 힘을 기울리는 사태로 되돌아갔다는 의미입니다."
 brotherhood.8.a: "망할 테러리스트놈들!"
 brotherhood.9.t: "무슬림 형제단 테러 조직 궤멸"
 brotherhood.9.d: "[Root.GetAdjective] 방위군은 성공적으로 주요 무슬림 형제단의 지도 조직 중 한 곳을 궤멸시키는 한편, 성공적으로 지도자들과 그 관련자들을 체포하였습니다. 정부 관료들을 암살할 무기와 계획들을 찾아낼 수 있었습니다.\n \n재판은 바로 내일 열릴 것이며, 곧바로 사형선고가 내려질 것입니다."
 brotherhood.9.a: "[Root.GetLeader]은(는) 다시 승리를 이뤄내었다!"
 brotherhood.10.t: "무슬림 형제단 반란이 내전으로 변모하다"
 brotherhood.10.d: "우리의 잔혹한 무슬림 형제단에 대한 진압이 실패하게 되면서, 저들의 지지자들만 그 세를 불리게 되었습니다. 합법적인 정부의 통제하에 있는 것보다 저들의 통치에 더 안전을 느끼는 일반인들이 많아지고 결국 테러리스트들의 계획은 성공의 물살을 타게 되었습니다. 심지어 급진주의적인 군인들과 몇몇 반역을 저지른 장군들이 저들의 편으로 돌아섰습니다. 이는 더이상 대테러 문제가 아니라 전쟁의 문제입니다."
 brotherhood.10.a: "저들을 반드시 패퇴시킬 것이다"
 brotherhood.10.b: "저들과 함께하는건 어떨까"
 jihadi.5.t: "살라피 지하드 주의자 반란이 내전으로 변모하다"
 jihadi.5.d: "살라피 지하드 조직원들의 진압 시도가 실패하면서, 합법적인 정부의 통제하에 있는 것보다 저들의 통치에 더 안전을 느끼는 일반인들이 많아지고 결국 테러리스트들의 계획은 성공의 물살을 타게 되었습니다. 심지어 급진주의적인 군인들과 몇몇 반역을 저지른 장군들이 저들의 편으로 돌아섰습니다. 이는 더이상 대테러 문제가 아니라 전쟁의 문제입니다."
 jihadi.5.a: "저들을 반드시 패퇴시킬 것이다"
 jihadi.5.b: "저들과 함께하는건 어떨까"
 Yemen.4.t: "예멘 내전의 종식"
 Yemen.4.d: "전 국토가 폐허가 된 채로 예멘 내전은 결론이 났습니다. 사우디 연립 정부를 등에 엎은 아디 정권이 승리를 하였습니다. 내전의 마지막 날, 연립 정부군은 후티 반군과 알 카에다 탄약고를 파괴하고 점령하여 부르칸 2-H 스커드 미사일을 손에 넣었습니다. 하지만 무장을 해체당한 많은 이들이 후티 반군에 충성을 맹세하고 있고, 얼마 안있어서 자디으파 급진주의자들은 처형당하고 설득당할 것입니다. 민주주의가 사우디 연립 정부와 관련 계획으로 지역 내에 퍼지게 되었고 희망 재건 작전으로 예멘이라는 나라는 재건의 길에 들어서게 되었습니다."
 Yemen.4.d2: "하디 정권이 한 줌의 재로 그 세력이 줄어들면서 후티 반군은 향후 예멘를 이끌어가게 될 지도자가 되었습니다. 애초에 목표로 삼은 것처럼 후티 반군 측은 살라피즘의 전파와 지역 내 서방 이념을 뿌리뽑고, 자신들과 싸우려는 알카에다와 연립 정부군을 모두 소탕했습니다. 이제 예멘을 완전히 장악하면서, 후티 정권은 임시 정부에서 자치권을 가진 국가로 변모하게 되었습니다. 사우디 연립 정부는 이 지역내에서 영향력을 잃었으며, 희망 재건 작전은 완전히 실패하게 되었습니다."
 Yemen.4.d3: "예멘 정부군과 후티 반군이 수년간 싸우면서, 전혀 예상치 못한 세력이 승리를 거머쥐었습니다. 예멘의 알 카에다 잔당들이 이 지역의 새로운 칼리프가 되었고 모든 불신자들은 위협에 처하게 되었습니다. 사우디 연립 정부와 희망 재건 작전은 완전히 실패하였으며, 그 무능력함은 새롭고 강성한 적들에게서의 패배를 전혀 예측하지 못했습니다. 지하드 전사들이 나타나고 이들의 소탕작업은 이제 시작하였을 뿐이고 전세계에서 이 새로운 칼리프가 무엇을 할 수 있을지 직접 눈으로 보게 될 것입니다."
 Yemen.4.a: "마침내 승리를 하였군..."
 Yemen.4.b: "하지만 무엇을 대가로?"
 Yemen.4.c: "상황이 나빠지는데..."
 Yemen.4.e: "흥미롭군"
 Yemen.4.f: "흥미롭군"
 Yemen.6.t: "시야드에 미사일 발사를?"
 Yemen.6.d: "사우디 아라비아의 수도에 미사일을 발사하는 것은 우리의 강력한 힘을 사우디 아라비아 측에 보여줄 수 있을 것입니다."
 Yemen.6.a: "실행해라!"
 Yemen.6.b: "너무 위험하다"
 Yemen.7.t: "후티 반군이 시야드에 탄도 미사일을 발사하다"
 Yemen.7.d: "예멘의 후티 반군과 싸우고 있는 사우디 연립 정부는 인접국에서 자국 수도의 궁전을 향해 날라오는 미사일을 요격했습니다. 후티 반군은 화요일에 알 야마마 궁전을 목표로 탄도 미사일을 발사했다고 선언했습니다. 연립 정부가 결성된지 1,000일이 지난 지금, 예멘 폭격 임무가 실행되고 있습니다."
 Yemen.7.a: "오 이런..."
 Saleh.1.t: "후티 정권의 분투"
 Saleh.1.d: "후티와 알리 압둘라 살레의 국민 의회당 사이의 불완전한 동맹은 어느순간부터 깨어지기 시작했습니다. 예멘 내부에서 연립 정부 일원들의 활동으로 우리는 전 대통령인 살레가 후티 지도자에게 적개심을 키워나가고 있는 것을 발견했고 이는 분명한 사실입니다. 후티는 외세에 의해 통제되는 현 나라의 실정에 불만을 품고, 예멘을 살라피즘과 서방 이념에서 완전히 독립된 노선을 걸어갈 방법을 찾고 있습니다. 반면에 살레는 예벤을 독립국으로 만드는 한편, 하나의 민주주의 국가를 만들어 자신의 의도가 서방국들을 분개하게 할지라도 외세의 개입으로 영토확장을 꿈꾸고 있습니다. 이러한 이해관계는 향후 두 정당 간 충돌을 일으킬 것이 물보듣 뻔한 일이며, 연립 정부가 필요한 이유기도 합니다..."
 Saleh.1.a: "이럴 시간이 없다..."
 Saleh.1.b: "살레에게 전화를 걸어바라..."
 Saleh.2.t: "살레가 연립 정부 협상을 제안하다"
 Saleh.2.d: "국민 의회당의 수장이 알리 압둘라 살레는 국민 의회당과 후티의 지도자가 사우디아라비아의 주도로 이끌어나가고 있는 압드라부 만수르 하디 정권을 동일선상에 놓자면서 후티의 의견을 지지하였습니다. 그자가 마음을 바꾸는 것을 보임에 있어서 그다지 동맹으로 간주하지는 않았습니다. 이제 살레는 후티 지도자를 불려들어 이 피비린내나는 내전의 지속여부에 대한 의견을 확고하게 물으려 하고 있습니다. 대화를 통해 알아낸 서로 간의 비슷한 점은 아주 작은 것일지 모르나, 서로 간의 이해관계를 내려둘 수 있는 아주 귀중한 기회일지도 모릅니다."
 Saleh.2.a: "절대 안된다!"
 Saleh.2.b: "괜찮을지도 모르지..."
 Saleh.3.t: "후티 지도자가 대화를 원하다"
 Saleh.3.d: "전 대통령 알리 압둘라 살레의 압박이 있은 뒤, 사나의 후티 반군 지도자는 잠시동안 하디, 연립 정부와 함께 하기를 원하고 있습니다."
 Saleh.3.a: "그래, 연립 정부를 소집해라."
 Saleh.3.b: "좋은 생각은 아닌거 같은데..."
 Saleh.5.t: "살레가 본색을 드러내다"
 Saleh.5.d: "불안하고 대화없는 후티와 공화국군의 동맹이 결성되고 몇년 뒤, 전 예멘 대통령 알리 압둘라 살레는 후티를 비난하면서 사우디 아라비아가 이끄는 연립정부에 연설을 했습니다. 살레는 만약 연립 정부가  무역 봉쇄를 풀고 공항을 여는 아주 손쉬운 인도주의적 행동을 통해, 시민들의 공화국군은 사우디 아라비아를 기꺼이 따를 것이며, 스스로 현재 동맹을 적이라고 규정할 것이라고 주장했습니다. 살레는 최근 연설에서 현재 예멘은 인도주의적 위기 속에서 새로운 역사를 열어가는 순간이자 이를 통해서 하나되고 자유로우며, 민주주의 예멘을 만들 수 있다고 선언했습니다. 다음은 살레의 말입니다. 저는 예멘인들이 실현하고 가지고 있는 정체성을 파괴하려는 인류의 적, 고국의 적과 싸울 것입니다!"
 Saleh.5.a: "이 반역자를 찾아라..."
 Saleh.5.b: "아무것도 못할 것이다..."
 Saleh.6.t: "도주중인 살레"
 Saleh.6.d: "일련의 위험한 연설이 이어진 후, 알리 압둘라 살레는 후티 반군과의 결별을 선언했습니다. 압둘 말릭 알 후티는 살레의 야망을 일찌감치 알고 있었고 수차례 그에게 경고를 주었지만, 털끝도 영향을 끼치지 못하였습니다. 압둘 말릭 알 후티는 이를 배신행위라 규정하면서 사나의 살레의 본가는 후티 반군의 포격으로 먼지가 되었고 살레는 이제 국외로 도망치는 신세가 되었습니다. 후티 반군 전사들은 그의 흔적을 뒤를 쫓는데 온 신경을 귀울이고 있으며, 후티 반군과 연립 정부군의 전투가 이어지고 있는 사나의 남쪽으로 교모하게 몰아가고 있습니다. 전선에 배치된 다수의 전사들이 후퇴할 준비를 하고 당신의 명령을 개시하려 하고 있습니다."
 Saleh.6.a: "시행하라..."
 Saleh.6.b: "보내줘라..."
 Saleh.7.t: "최고 정치 의회"
 Saleh.7.d: "내전에서 승리하면서, 이제는 잘못된 지도자를 끌어내리기 위해 필사적으로 싸웠던 곳을 재건할 때입니다. 내전 중에 세운 임시 정부인 최고 혁명 위원회의 일원들은 우리들이 전쟁에서 이뤄낸 성과들을 기억해내고 우리를 견제하기 위해 대통령 독단 의회를 양분하는 당을 만들려는 애초에 계획된 안을 실행하려 하고 있습니다. 이 전쟁을 시작한 수많은 사람들과 원만한 동맹관계를 유지하지 못한 수많은 이들을 떠올려봅시다. 미래를 예측할 수는 없지만, 이들로 하여금 의회석에 앉게 하여 미래에 걸맞는 최고의 결정을 내릴 수 있을 것입니다."
 Saleh.7.a: "이를 위해 싸워왔다. 그리고 지켜내기위해서도 싸울 것이다."
 Saleh.7.b: "말도 안된다. 함께 국가를 세울 차례이다."
 Saleh.8.t: "후티 반군 지도자가 살레의 제안을 거절하다"
 Saleh.8.d: "전 예멘 대통령 알리 압둘라 살레와의 협의를 통해서 그는 후티 지도자를 설득하면서 이 내전의 지속여부를 결정하는 결론을 내었습니다. 예상한 봐아 같이, 후티 지도자는 일말의 망설임도 없이 거절하였습니다. 후티는 예멘 민주 정권을 축출하는 전쟁의 지속여부에 관해서는 단호하게 선을 끄었습니다. 이는 살레의 국민 의회당과 후티 반군 사이의 동맹 문제로써 , 살레를 더 거세게 몰아부친다면, 이 잘못된 지도자를 축출할 수 있을 것입니다."
 Saleh.8.a: "더 거세게 밀어부쳐야 한다!"
 Saleh.8.b: "잊어버려라..."
 Saleh.9.t: "살레의 발버둥"
 Saleh.9.d: "알리 압둘라 살레는 다시금 적이라고 명심하라고 한 사우디 주도의 연립 정부와의 대화를 시도했습니다. 국민 의회당과는 험악한 분위기를 유지하고 있는 것이 사실이지만, 일련의 목적을 가진 이러한 살레의 움직임이 세간에 발표되지는 않았습니다. 사우디 주도의 연립 정부가 그와 연락할만큼 미치지 않았다고는 보지만, 이를 면밀하게 지켜보아야합니다."
 Saleh.9.a: "좋은 생각인거 같은데..."
 Saleh.9.b: "알리, 지금 당장 멈추게"
 Saleh.9.c: "살레경 자네에게 조언 좀 해도 괜찮겠나?"
 HOU_Saleh.1: "알리 압둘라 살레가 후티 전사들에게 계속해서 쫓길 겁니다."
 HOU_Saleh.2: "알리 압둘라 살레는 예멘 내전의 종식 여부를 묻는 질문과 우리의 원조를 받을 것입니다. 그 방법이 외교적인 것이든 무력으로 인한 것이든, 우리의 연립 정부와 함께 탁상에 앉을 수 있도록 그를 설득해야 합니다."
 HOU_Saleh.3: "우리 동맹은 생각만큼 그렇게 견고하지 않고 우리 구성원들을 믿고 있는 것이 현실입니다. 당신이 이 전쟁을 끝내고 싶어한다는 것을 이해하지만, 불운하게도 나는 내 자신과 동지들이 저 사악한 연립 정부와 거래를 하는 것을 도저히 용납할 수 없습니다. 당신이라면 할 수 있겠소?"
 HOU_Saleh.4: "알리는 실망하겠지."
 HOU_Saleh.5: "알리가 다시 한번더 연락을 취할거다"
 HOU_Saleh.6: "알리는 움찔하며 퇴실했습니다."
 HOU_Saleh.7: "알리는 다시 한번 더 연락을 취할 것이지만, 이번에는 마지막 경고로써 계속해서 적과 함께 있는다면, 그 또한 적으로 간주하겠다는 성명을 발표했습니다."
 Saleh.10.t: "살레는 우리 시간을 낭비하고 있을 뿐이다..."
 Saleh.10.d: "Once again, the leader of the General People's Congress aligned with the Houthi rebels, Ali Abdullah Saleh, was denied by the Houthi leadership to commence peace talks with our coalition. It has been clear from the beginning that the Houthi leadership will not speak with us, as they see us as a sworn enemy. With the GPC-Houthi alliance as critical as it is, we must deliver Ali Abdullah Saleh an ultimatum immediately. Without him, the Houthis governing parties will be in shambles without proper skill and talent behind it. With him, the leadership has competence, though it lacks a certain ability when it comes to progress, but it could potentially carry the Houthis to victory."
 Saleh.10.a: "그 또한 행동을 취하겠지 아니면 그냥 위험에 빠지거나."
 Saleh.10.b: "의미없다..."
 Saleh.11.t: "국민 의회당의 도주!"
 Saleh.11.d: "공식적으로 우리와 동맹이었던 살레의 공화국 군과의 수많은 교전이 있었습니다. 더 이상 이 배신자들은 지도자인 알리 압둘라 살레가 제거된 이후 한 줌의 오합지졸로 변해버렸습니다. 국민 의회당과 그 군은 도시 내 거리에서 우리와 총격전을 벌였고, 이제는 단 한번에 이 소란을 잠재워야만 합니다."
 Saleh.11.a: "반역자들! 이를 예상하고 있었지!"
 Saleh.12.t: "알리 압둘라 살레 전 예멘 대통령 암살!"
 Saleh.12.d: "오늘은 후티 반군의 모든 이들이 눈물을 흘리면서 승리를 만끽할 수 있는 영광스러운 날입니다. 후티 반군 일원들은 오랫동안 살레가 사우디 연립 정부와 내통을 하고 있다고 믿었지만, 후티 반군에게는 그 증거가 오랫동안 밝혀지지 않았고 예멘의 민주화와 통합을 실시하는 연립 정부의 새로운 계획이 실행되고 있었습니다. 이는 후티 반군 일원들을 분노에 차게 만들었고, 살레가 죽으면서 사기는 최고조에 이르게 되었습니다."
 Saleh.12.a: "잘했네 병사."
 Saleh.12.b: "이런..."
 Saleh.12.c: "흥미롭군"
 Saleh.13.t: "살레가 국민 의회당-후티 반군 동맹을 갱신하다"
 Saleh.13.d: "최장기간은 아니지만, 오랫동안 후티 반군의 동맹이었던 국민 의회당의 지도자는 이 동맹을 갱신하였습니다. 알리 압둘라 살레는 공식적으로 예멘 미래의 새로운 장을 선언하며, 국민 의회당과 후티 반군은 함께 폐허가 된 나라를 재건할 것이라고 밝혔습니다. 살레는 단 한가지 안을 제안했는데, 그것은 바로 후티 반군 지도자가 전시 임시 정부인 최고 정치 위원회를 인정하고 처음에 계획했던 것처럼 두 동맹이 정권을 구성하는 양당체제를 이루는 것이었습니다."
 Saleh.13.a: "좋은건가? 말을 못하겠군."
 Saleh.13.b: "젠장"
 Saleh.14.t: "연립 정부 주도의 회담"
 Saleh.14.d: "후티 반군 지도자는 민주적인 예멘 하디 정권을 반대하며, 앉아서 예멘에서 진행되는 인도주의적 처우에 대해 말하기를 원하고 있습니다. 현 예멘 연립 정부의 지도자인 사우디 아라비아는 아부다비에서 열리는 정상 회담에 모든 당사자들을 초청하였습니다. 특별한 참석자도로는 압둘 말릭 알 후티 그 자신으로 알리 압둘라 살레와 함께 참석했습니다."
 Saleh.14.a: "반드시 참석해야한다."
 Saleh.14.b: "미안하지만, 그럴 시간이 없다."
 Saleh.14.c: "이곳에 참여하는 것 자체가 영광이다."
 Saleh.15.t: "정상 회담 시작"
 Saleh.15.d: "참석자들이 자리에 위치하고 회담이 시작되기를 기다렸습니다. 후티 반군 측은 항복을 하기 위해 참석한 것이 아니라고 밝혔지만, 우리는 반드시 다른 측의 상황을 말해주며 마음을 뒤흔들어놓아야 합니다. 예멘 내전은 현 시대에서 가장 인류애적인 것과 관련된 문제로 최대한 빨리 종전하는 것이 모두에게 있어서 최고의 일일 것입니다. 이를 위해서는 서로의 요구사안을 들어볼 필요가 있습니다..."
 Saleh.15.a: "예멘의 공식 정부에 모든 영토를 반환하고 항복하라."
 Saleh.15.b: "전투를 즉시 중지하라. 독립을 인정해 주겠다."
 Saleh.15.c: "후티 반군이 영유권을 주장한 땅은 모두 아라비아 국가의 소유이다."
 Saleh.16.t: "연립 정부가 항복을 요구하다"
 Saleh.16.d: "우리는 아부다비 정상 회담에서 몇년간 이어진 전쟁의 향후 종식에 대해서 논의했고 이는 시간 낭비일 뿐이라는 것을 깨달았습니다. 우리는 회담이 시작되자마자 이 말도 안되는 요구를 들었습니다. 무조건 항복을 하라는 것이었습니다. 하지만 내전이 계속해서 이어질수록, 사람들이 죽어갈 것이고 도시도 계속해서 파괴될 것입니다. 내전의 종식이 좋은 것이지만, 이는 우리의 항복을 의미합니다."
 Saleh.16.a: "내전은 반드시 끝나야 하며, 향후 정권에 충성을 맹세해야 한다."
 Saleh.16.b: "어림없는 소리! 이 회담은 끝이다!"
 Saleh.17.t: "연립 정부가 양 측의 독립을 인정하다"
 Saleh.17.d: ""
 Saleh.17.a: "예멘의 모든 것은 우리 것이다. 아니면 더이상의 협상은 없다."
 Saleh.17.b: ""
