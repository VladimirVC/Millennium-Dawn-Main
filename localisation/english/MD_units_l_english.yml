 transport_helicopter: "Transport Helicopter"

 Militia_Bat: "Militia"
 Militia_Bat_desc: "Militia Battalion on foot. Militia Units are characterized by having less heavy equipment and communication kits than normal infantry. This makes them highly mobile and effective in bad terrain, but they melt away quickly in flat terrain against an armored opponent."
 Mot_Militia_Bat: "Motorized Militia"
 Mot_Militia_Bat_desc: "Militia Battalion with Pickup Trucks or even Armored Utility Vehicles. Militia Units are characterized by having less heavy equipment and communication kits than normal infantry. This makes them highly mobile and effective in bad terrain, but they melt away quickly in flat terrain against an armored opponent."

 L_Inf_Bat: "Light Infantry"
 L_Inf_Bat_desc: "Light Infantry without transports. Rarely seen on the modern battlefield, but specialized units in very difficult terrain such as jungle and mountains exist - where they are highly effective. Could also be useful as urban garrisons."
 Mot_Inf_Bat: "Motorized Infantry"
 Mot_Inf_Bat_desc: "Motorized Infantry uses all kinds of Utility Vehicles as transport, from Pickup Trucks to modern Mine-Resistant Vehicles. They are well suited for combat in mountainous terrain and in urban areas."
 Hvy_Mot_Inf_Bat: "Heavy Motorized Infantry"
 Hvy_Mot_Inf_Bat_desc: "Heavy Motorized Infantry uses Mine-Resistant Ambush Protected (MRAP) vehicles as transport. Their armored vehicles provide superior crew protection against mines, IEDs, and small arms fire, making them ideal for operations in hostile environments where ambush threats are high."
 Mech_Inf_Bat: "Mechanized Infantry"
 Mech_Inf_Bat_desc: "Mechanized Infantry uses Armored Personnel Carriers as transport. They are well suited for armored combat in flat terrain."
 Arm_Inf_Bat: "Armored Infantry"
 Arm_Inf_Bat_desc: "Armored Infantry uses Infantry Fighting Vehicles as transport. They are well suited for armored combat in flat terrain, but are wasted in difficult terrain where they must operate on foot far from their IFV's."

 L_Air_Inf_Bat: "Airborne Infantry"
 L_Air_Inf_Bat_desc: "Airborne Light Infantry are elite Infantry, with their special training in Aerial Insertion via paradrops from Transport Aircraft or with Transport Helicopters. They can rapidly respond to emergencies from afar, and can be inserted behind enemy lines to take vital objectives ahead of the main army advance. Their mode of transport puts strict limits on the amount of heavy equipment they can carry, though."
 Mot_Air_Inf_Bat: "Motorized Airborne Infantry"
 Mot_Air_Inf_Bat_desc: "Motorized Airborne Infantry are elite Infantry, with their special training in Aerial Insertion via paradrops from Transport Aircraft or with Transport Helicopters. They can rapidly respond to emergencies from afar, and can be inserted behind enemy lines to take vital objectives ahead of the main army advance. Their Utility Vehicles gives them great mobility upon insertion, and allows them bring more heavy equipment into battle. It is however, much more logistically demanding to paradrop them together with vehicles."
 Mech_Air_Inf_Bat: "Mechanized Airborne Infantry"
 Mech_Air_Inf_Bat_desc: "Mechanized Airborne Infantry are elite Infantry, with their special training in Aerial Insertion via paradrops from Transport Aircraft. They can rapidly respond to emergencies from afar, and can be inserted behind enemy lines to take vital objectives ahead of the main army advance. Their specially designed Light Armored Personnel Carriers gives them great mobility upon insertion, and allows them bring much more heavy equipment into battle than lighter Airborne forces. It is however, much more logistically demanding to paradrop them together with such vehicles."
 Arm_Air_Inf_Bat: "Armored Airborne Infantry"
 Arm_Air_Inf_Bat_desc: "Armored Airborne Infantry are elite Infantry, with their special training in Aerial Insertion via paradrops from Transport Aircraft. They can rapidly respond to emergencies from afar, and can be inserted behind enemy lines to take vital objectives ahead of the main army advance. Their specially designed Light Infantry Fighting Vehicles gives them great mobility, and allows them to fight on equal terms against normal mechanized formations. It is however, extremely logistically demanding to paradrop them together with their IFV's. As of 2017, only Russia has ever operated such forces."

 L_Ranger_Bat: "Rangers"
 L_Ranger_Bat_desc: "Rangers are elite light infantry, specialized in raids, direct action, and rapid deployment ahead of the main force. They travel light to maximize mobility and surprise, seizing key objectives and holding them until conventional units arrive. The trade-off is sparse heavy equipment, leaving them exposed against armor in open terrain."
 L_Ranger_Recce_Comp: "Ranger Recce Company"
 L_Ranger_Recce_Comp_desc: "A reconnaissance element drawn from the Rangers, trained to infiltrate deep behind enemy lines on foot and report on enemy movements. Combining stealth with Drone Reconnaissance and Electronic Surveillance, they gather intel and mark targets for friendly fires, and can conduct limited raids and ambushes when the opportunity arises."

 L_Marine_Bat: "Marine Infantry"
 L_Marine_Bat_desc: "Marine Infantry are elite Infantry, with special training in amphibious operations, such as river-crossings, operation in swamps, and amphibious invasions. As they don't have vehicles, there are strict limits on the amount of heavy equipment they can carry, though."
 Mot_Marine_Bat: "Motorized Marine Infantry"
 Mot_Marine_Bat_desc: "Motorized Marine Infantry are elite Infantry, with special training in amphibious operations, such as river-crossings, operation in swamps, and amphibious invasions. While they disembark as Light Infantry, they have Utility Vehicles as land transports, giving them great mobility and allows them to carry large amounts of heavy equipment into battle."
 Mech_Marine_Bat: "Mechanized Marine Infantry"
 Mech_Marine_Bat_desc: "Mechanized Marine Infantry are elite Infantry, with special training in amphibious operations, such as river-crossings, operation in swamps, and amphibious invasions. As they make landings protected in their specially designed Amphibious Armored Personnel Carriers, they are very much equipped to strike right away with great mobility, carrying large amounts of heavy equipment into battle."
 Arm_Marine_Bat: "Armored Marine Infantry"
 Arm_Marine_Bat_desc: "Armored Marine Infantry are elite Infantry, with special training in amphibious operations, such as river-crossings, operation in swamps, and amphibious invasions. They can cross large distances on water in their heavily armored jet-propelled Amphibious Infantry Fighting Vehicles, and be ready to fight from the same IFV's once they make it to shore with great proficiency."

 L_Air_assault_Bat: "Air Assault Infantry"
 L_Air_assault_Bat_desc: "Air Assault Infantry are elite Infantry, with their special training in rappelling and air transportation, their equipment is sometimes designed or field-modified to allow better transportation within aircraft. They are often used to to seize and hold key terrain which has not been fully secured, and to directly engage enemy forces behind enemy lines."
 attack_helo_bat: "Attack Helicopter Regiment"
 attack_helo_bat_desc: "I identify as an AH-64 Apache Attack Helicopter."

 attack_helo_comp: "Attack Helicopter Company"
 attack_helo_comp_desc: "I identify as an AH-64 Apache Attack Helicopter."

 Special_Forces: "Special Operation Forces"
 Special_Forces_desc: "Special Operation Forces are the elite of any military where they feature, with longer and harder training than anyone else. They are experts of difficult terrains, airborne operations and amphibious landings. They are, however, very lightly equipped as they may need to operate with mobility behind the front lines."

 armor_Bat: "Tank Company"
 armor_Bat_desc: "A Tank Company features only the most heavily armored vehicles in existence, Main Battle Tanks. With excellent mobility in flat terrain and fierce direct fire, they are designed to punch holes in the enemy front lines that can be rapidly exploited by follow-up mechanized infantry units."
 armor_Comp: "Tank Company"
 armor_Comp_desc: "A Tank Company features only the most heavily armored vehicles in existence, Main Battle Tanks. With excellent mobility in flat terrain and fierce direct fire, they are designed to punch holes in the enemy front lines that can be rapidly exploited by follow-up mechanized infantry units."

 L_Recce_Comp: "Infantry Recce Company"
 L_Recce_Comp_desc: "Infantry Recce Companies operate on foot, and is therefore devoid of much of the heavy equipment that make them an effective fighting unit. They infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform limited raids and ambushes. Recce Companies are often called 'Squadrons' due to their legacy as former Cavalry units."

 Mot_Recce_Comp: "Motorized Recce Company"
 Mot_Recce_Comp_desc: "Motorized Recce Companies operates with Utility Vehicles, and have much of the same equipment as their Infantry counterparts. Their roles however, are different. They infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform limited raids and ambushes. Recce Companies are often called 'Squadrons' due to their legacy as former Cavalry units."

 Mech_Recce_Comp: "Mechanized Recce Company"
 Mech_Recce_Comp_desc: "Mechanized Recce Companies operates with Armored Personnel Carriers, and have much of the same equipment as their Infantry counterparts. Their roles however, are different. They infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform limited raids and ambushes. Recce Companies are often called 'Squadrons' due to their legacy as former Cavalry units."

 Arm_Recce_Comp: "Heavy Mechanized Recce Company"
 Arm_Recce_Comp_desc: "Heavy Mechanized Recce Companies operates with Infantry Fighting Vehicles, and have much of the same equipment as their Armored Infantry counterparts. Their roles however, are different. They infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes. Recce Companies are often called 'Squadrons' due to their legacy as former Cavalry units."

 Drone_Recce_Comp: "Unmanned Recce Company"
 Drone_Recce_Comp_desc: "By employing small unmanned aerial systems to extend observation beyond line of sight, the Unmanned Recce Company improves battlefield awareness without exposing scouts to direct fire. These drones can rapidly screen routes, identify enemy positions, and confirm targets in complex terrain, enabling faster decision-making and more accurate fires."

 L_arm_Bat: "Light Tank Company"
 L_arm_Bat_desc: "Light Tank Company operates with special, often wheeled, Light Tanks that combine incredible mobility with awe-inspiring stopping power. They can hold their own against all types of Infantry in direct combat. Direct combat isn't their intended role, though - they infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes on important enemy assets and mechanized formations."

 A_L_arm_Bat: "Airborne Light Tank Company"
 A_L_arm_Bat_desc: "Light Tank Company operates with special, often wheeled, Light Tanks that combine incredible mobility with awe-inspiring stopping power. They can hold their own against all types of Infantry in direct combat. Direct combat isn't their intended role, though - they infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes on important enemy assets and mechanized formations. These units are also capable of conducting airborne operations with paratrooper elements, providing immediate close armored support."

 armor_Recce_Comp: "Armored Recce Company"
 armor_Recce_Comp_desc: "Armored Recce Companies operates with special Recon Light Tanks that combine incredible mobility with awe-inspiring stopping power. They can hold their own against all types of Infantry in direct combat. Direct combat isn't their intended role, though - they infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes on important enemy assets and mechanized formations. Recce Companies are often called 'Squadrons' due to their legacy as former Cavalry units."

 L_Engi_Comp: "Engineer Battalion"
 L_Engi_Comp_desc: "Engineers handle temporary bridge and defensive perimeter construction, mine-laying and clearing in addition to bomb disposal. They carry basic infantry weaponry, for defensive purposes."

 H_Engi_Comp: "Heavy Engineer Battalion"
 H_Engi_Comp_desc: "Engineers handle temporary bridge and defensive perimeter construction, mine-laying and clearing in addition to bomb disposal. They carry basic infantry weaponry, for defensive purposes. With Main Battle Tank-hull based construction and recovery vehicles, they are well-equipped to recover combat-disabled armored vehicles from the frontline."

 Arty_Bat: "Artillery"
 Arty_Bat_desc: "With its powerful indirect fire abilities, Artillery provides sustained precision strikes where it's needed on the battlefield, and far beyond visual ranges. It can be reloaded directly by it's crew. Since it requires external vehicles for it's movement, it can be difficult to move around in-between strikes, making it vulnerable against enemy artillery counter-strikes. Lightweight lower calibre systems can be dragged around manually, and are suitable for airborne operations as their can fit inside transport planes."
 Arty_Battery: "Artillery Battery"
 Arty_Battery_desc: "With it's powerful indirect fire abilities, Artillery provides sustained precision strikes where it's needed on the battlefield, and far beyond visual ranges. It can be reloaded directly by it's crew. Since it requires external vehicles for it's movement, it can be difficult to move around in-between strikes, making it vulnerable against enemy artillery counter-strikes. Lightweight lower calibre systems can be dragged around manually, and are suitable for airborne operations as their can fit inside transport planes."

 SP_Arty_Bat: "Self-Propelled Artillery"
 SP_Arty_Bat_desc: "With its powerful indirect fire abilities, Self-Propelled Artillery provides sustained precision strikes where it's needed on the battlefield, and far beyond visual ranges. It can be reloaded directly by it's crew, and it's self-propulsion makes it mobile so they can move to avoid counter-strikes by enemy artillery."
 SP_Arty_Battery: "Self-Propelled Artillery Battery"
 SP_Arty_Battery_desc: "With it's powerful indirect fire abilities, Self-Propelled Artillery provides sustained precision strikes where it's needed on the battlefield, and far beyond visual ranges. It can be reloaded directly by it's crew, and it's self-propulsion makes it mobile so they can move to avoid counter-strikes by enemy artillery."

 SP_R_Arty_Bat: "Self-Propelled Rocket Artillery"
 SP_R_Arty_Bat_desc: "Using MLRS launchers, a battalion of Rocket Artillery can eradicate an entire area from far away. Used against enemy rear-areas, as the indiscriminate fire makes it unsuitable for precision strikes on the battlefield. It needs special reload vehicles, and reloading times are slow."
 SP_R_Arty_Battery: "Self-Propelled Rocket Artillery Battery"
 SP_R_Arty_Battery_desc: "Using MLRS launchers, a battery of Rocket Artillery can eradicate areas from far away. Used against enemy rear-areas, as the indiscriminate fire makes it unsuitable for precision strikes on the battlefield. It needs special reload vehicles, and reloading times are slow."

 SP_AA_Bat: "Self-Propelled Air Defence"
 SP_AA_Bat_desc: "Using self-propelled short or medium ranged Anti-Air Missile Systems, the Air Defence Battalion will defend it's unit from enemy Close Air Support strikes."
 SP_AA_Battery: "Self-Propelled Air Defence Battery"
 SP_AA_Battery_desc: "Using self-propelled short or medium ranged Anti-Air Missile Systems, the Air Defence Battery will defend it's unit from enemy Close Air Support strikes."

 combat_service_support_company: "Combat Service Support Battalion"
 combat_service_support_company_desc: "Logistic and Medical services of the division."
 helicopter_combat_service_support: "Helicopter Combat Service Support Battalion"
 helicopter_combat_service_support_desc: "Logistic and Medical services of the division."

 L_Marine_Cdo_Bat: "Marine Commando Battalion"
 L_Marine_Cdo_Bat_desc: "Marine Commandos are larger formations of Marine Raiders, trained to conduct hit and run operations, among other light infantry tasks."
 air_assault_Arty_Bat: "Airmobile Artillery"
 air_assault_Arty_Bat_desc: "A full battalion of towed artillery pieces transported by helicopter sling loading. Provides sustained indirect fire support for airmobile operations, keeping pace with air assault infantry through rapid aerial repositioning."
 air_assault_Arty_Battery: "Airmobile Artillery Battery"
 air_assault_Arty_Battery_desc: "Using towed artillery pieces, these units increase their mobility by sling loading their guns, allowing them to keep up with faster airmobile infantry units."

 drone_tactical_company: "FPV Drone Company"
 drone_tactical_company_desc: "Using FPV fixed wing and quadcopter drones, these units conducted recon and targeted strikes in support of their line units."

 group_headquarters_title: "Headquarters"
 group_headquarters_title_desc: "Headquarters units, equipped to lead units into battle"

 light_inf_hq: "Light Infantry Headquarters"
 light_inf_hq_desc: "Headquarters element for light and motorized infantry"

 arm_inf_hq: "Armored Infantry Headquarters"
 arm_inf_hq_desc: "Headquarters element for mechanized and armored infantry."

 arm_hq: "Armored Headquarters"
 arm_hq_desc: "Headquarters element for light tanks and main battle tanks"

 helo_hq: "Helicopter Headquarters"
 helo_hq_desc: "Headquarters element for helicopter units"

 group_light_bat_title: "Understrength Units"
 group_light_bat_title_desc: "Understrength combat elements, designed for force multiplication, with reduced capabilities, but reduced training time and cost."

 Light_Mech_Inf_Bat: "Understrength Mechanized Infantry Battalion"
 Light_Mech_Inf_Bat_desc: "Mechanized Infantry uses Armored Personnel Carriers as transport. They are well suited for armored combat in flat terrain."
 Light_Arm_Inf_Bat: "Understrength Armored Infantry Battalion"
 Light_Arm_Inf_Bat_desc: "Armored Infantry uses Infantry Fighting Vehicles as transport. They are well suited for armored combat in flat terrain, but are wasted in difficult terrain where they must operate on foot far from their IFV's."
 Light_L_Air_assault_Bat: "Understrength Air Assault Infantry Battalion"
 Light_L_Air_assault_Bat_desc: "Air Assault Infantry are elite Infantry, with their special training in rappelling and air transportation, their equipment is sometimes designed or field-modified to allow better transportation within aircraft. They are often used to to seize and hold key terrain which has not been fully secured, and to directly engage enemy forces behind enemy lines."
 Light_attack_helo_bat: "Understrength Attack Helicopter Regiment"
 Light_attack_helo_bat_desc: "I identify as an AH-6 Littlebird Attack Helicopter."
 Light_armor_Bat: "Understrength Tank Battalion"
 Light_armor_Bat_desc: "A Tank Battalion features only the most heavily armored vehicles in existence, Main Battle Tanks. With excellent mobility in flat terrain and fierce direct fire, they are designed to punch holes in the enemy front lines that can be rapidly exploited by follow-up mechanized infantry units."
 Light_L_arm_Bat: "Understrength Light Tank Battalion"
 Light_L_arm_Bat_desc: "Light Tank Battalions operates with special, often wheeled, Light Tanks that combine incredible mobility with awe-inspiring stopping power. They can hold their own against all types of Infantry in direct combat. Direct combat isn't their intended role, though - they infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes on important enemy assets and mechanized formations."
 Light_SP_Arty_Bat: "Understrength Self-Propelled Artillery Battalion"
 Light_SP_Arty_Bat_desc: "With its powerful indirect fire abilities, Self-Propelled Artillery provides sustained precision strikes where it's needed on the battlefield, and far beyond visual ranges. It can be reloaded directly by it's crew, and it's self-propulsion makes it mobile so they can move to avoid counter-strikes by enemy artillery."
 Light_SP_R_Arty_Bat: "Understrength Self-Propelled Rocket Artillery Battalion"
 Light_SP_R_Arty_Bat_desc: "Using MLRS launchers, a battalion of Rocket Artillery can eradicate an entire area from far away. Used against enemy rear-areas, as the indiscriminate fire makes it unsuitable for precision strikes on the battlefield. It needs special reload vehicles, and reloading times are slow."
 Light_SP_AA_Bat: "Understrength Self-Propelled Air Defence Battalion"
 Light_SP_AA_Bat_desc: "Using self-propelled short or medium ranged Anti-Air Missile Systems, the Air Defence Battalion will defend it's unit from enemy Close Air Support strikes."

 medium_walker_battalion: "Medium Walker Battalion"
 medium_walker_battalion_desc: "Designed as the all-round backbone of walker formations, the Medium Walker Battalion combines balanced protection, mobility, and payload capacity to operate effectively across most terrain types. Its platforms can carry a flexible mix of armaments and mission systems, allowing it to adapt to direct fire support, breakthrough assistance, and urban fighting where conventional armor may struggle with angles and obstacles. "
 light_walker_tank_battalion: "Light Walker Battalion"
 light_walker_tank_battalion_desc: "Built for speed and rapid battlefield repositioning, the Light Walker Battalion excels at scouting, flanking, and exploiting weak points rather than trading blows head-on. Its lighter chassis and simplified payload allow higher maneuverability and faster reaction times, making it effective in broken terrain, forests, and urban routes where quick changes in direction matter."
 heavy_walker_tank_battalion: "Heavy Walker Battalion"
 heavy_walker_tank_battalion_desc: "The Heavy Walker Battalion is designed to dominate decisive engagements by combining maximum payload capacity with extreme firepower and battlefield presence. Its heavier frames can mount multiple weapon systems and carry additional protection, enabling it to dismantle fortified positions and engage the toughest armored targets with sustained direct fire. "
 space_artillery_support_company: "Space Artillery Support Company"
 space_artillery_support_company_desc: "By employing artillery projectiles fired from orbital platforms, the Space Artillery Support Company delivers precision bombardment from space onto battlefield targets far beyond the range of conventional systems. These strikes can rapidly suppress fortified positions, destroy high-value assets, and break up enemy concentrations with minimal warning, allowing ground forces to force breakthroughs and dictate the tempo of engagements."
 space_artillery_equipment_type: "Orbital Fire Control Relay"
 space_artillery_equipment_type_desc: "A hardened communications and targeting relay designed to request, coordinate, and confirm orbital artillery strikes in real time. It links frontline observers to space-based batteries, enabling rapid fire missions, precise timing, and reliable deconfliction with friendly forces. The system is expensive and resource heavy, but without it orbital firepower remains blind, slow, and dangerously inefficient."
 space_artillery_equipment_1: "$space_artillery_equipment_type$ I"
 space_artillery_equipment_1_desc: "$space_artillery_equipment_type_desc$"

 # Event Horizon
 HACS_Mech: "1st. gen. High Agility Combat System"
 HACS_Mech_desc: "The 1st. generation High Agility Combat System is the most advanced combat system ever invented. It is designed for rapid deployment and high mobility on the battlefield, capable of traversing difficult terrain with ease. Armed with a mix of melee and ranged weapons, the HACS is perfectly prepared to fight Chimera units."
 HACS_Mech_2: "2nd. gen. High Agility Combat System"
 HACS_Mech_2_desc: "Merged ideas from civilian and military engineers, the 2nd. generation High Agility Combat System improves upon the original design with enhanced armor plating and upgraded weapon systems. This version is more resilient in combat and can deliver devastating firepower against Chimera forces."
 HACS_Mech_3: "3rd. gen. High Agility Combat System"
 HACS_Mech_3_desc: "Latest Randallite research has led to the development of the 3rd. generation High Agility Combat System. This iteration features cutting-edge technology, including advanced energy shields and modular weapon attachments, making it the pinnacle of mech warfare against Chimera threats."
 ALN_bellatoris: "Bellatoris"
 ALN_bellatoris_desc: "The Bellatoris is the frontline warrior of the Chimera swarm, bred for relentless close assault. Fast and aggressive, it overwhelms defensive lines through sheer numbers and ferocity, forcing even hardened formations to give ground. Individually fragile, it becomes lethal en masse."
 ALN_brachionis: "Brachionis"
 ALN_brachionis_desc: "The Brachionis is a multi-limbed Chimera built to grapple and tear apart armored targets at close range. Its reach and grip let it pin vehicles and combat systems in place while the swarm closes in. It is most dangerous in confined terrain, where its prey cannot maneuver away from its grasp."
 ALN_gravis: "Gravis"
 ALN_gravis_desc: "The Gravis is the heaviest of the Chimera strains, a slow-moving mass of armored carapace that anchors the swarm's advance. It soaks up tremendous punishment as it grinds forward, shielding lighter Chimera behind it and breaking through fortified positions by force. Its bulk makes it ponderous, but stopping it before it reaches the line is a desperate task."

 Weapons_company: "Weapons Company"
 Weapons_company_desc: "A weapons company, consisting of direct fire infantry support weapons, such as GPMG and HMG teams, Grenade Machine Gun teams, and other heavy infantry direct fire support weapons. This company is designed to provide supporting fires to any infantry element it is assigned to support, across a wide range of forces."
 Heavy_mortar_company: "Mortar Company"
 Heavy_mortar_company_desc: "Mortars are designed to provide fast, integrated fire support to line units, without needing attachment from higher elements. These mortars provide indirect fire support to line elements, at a much cheaper cost than a full scale artillery unit would need."
 Sniper_company: "Sniper Company"
 Sniper_company_desc: "Equipped with precision marksmen working in spotter pairs, the Sniper Company provides long-range, selective fire against high-value targets such as officers, crews, and communications teams. They excel at harassing and disrupting enemy formations from concealment, degrading enemy effectiveness while remaining difficult to locate and engage."
 AT_company: "Infantry Anti-Tank Company"
 AT_company_desc: "Equipped with infantry anti-tank weapons, this anti-tank company is designed to work specifically with light infantry elements. Able to easily operate in urban areas, forests, and other entrenched or close in locations, this team not only is able to easily attack enemy armored elements and then disappear back into their entrenched locations."
 Mot_AT_company: "Vehicle Anti-Tank Company"
 Mot_AT_company_desc: "A company dedicated to anti-tank operations, working from mounted firing positions on vehicles. This company is designed more for speed, allowing them to keep up with quickly moving mobile and armored elements, while still providing increased Anti-Tank capabilities."
 AA_company: "Anti-Aircraft Company"
 AA_company_desc: "An element equipped specifically to engage enemy aircraft elements, and to provide defense against enemy helicopters and other aircraft."
 Combat_engineer_company: "Combat Engineer Company"
 Combat_engineer_company_desc: "Combat Engineers perform offensive engineering actions in direct support of line units. They are trained and equipped to cross difficult terrain, such as rivers or anti-tank ditches. They are also equipped to breach minefields or other defensive obstacles, and to clear areas to allow other combat forces to proceed through them unhindered."

 pathfinder_company: "Pathfinder Company"
 pathfinder_company_desc: "Elite groups of paratroopers, trained to jump in prior to conducting airborne operations, to find the safest LZs and assembly areas. These elite troopers provide critical command and control during key elements of any airborne or airmobile operation."

 amphibious_landing_detachment: "Naval Landing Attachment"
 amphibious_landing_detachment_desc: "Attached elements from the navy that allow for rapid and effective amphibious landing operations. Equipped with dedicated landing ships and equipment, these units facility rapid ship-to-shore or Over the Horizon landing operations. The price of attaching one of these units however, is the decrease in capabilities to conduct non-amphibious operations."

 combat_maintenance_company: "Maintenance Company"
 combat_maintenance_company_desc: "The Maintenance Company keeps a formation's vehicles and heavy equipment in the fight, performing field repairs and recovering damaged platforms before they are lost for good. By restoring combat-disabled vehicles close to the front, it sustains armored strength through prolonged operations and reduces the drain of attrition."

 airmobile_maintenance_company: "Airmobile Maintenance Company"
 airmobile_maintenance_company_desc: "A maintenance element configured to support airmobile and helicopter forces, with the lighter, more transportable tooling needed to keep rotary-wing and rapidly deployed units operational. It restores damaged equipment in forward areas, sustaining the tempo of air assault operations far from established depots."

 communications_company: "Communications Company"
 communications_company_desc: "The Communications Company maintains the radio, data, and command networks that tie a formation together, ensuring orders and reports flow reliably across the battlefield. Robust communications improve coordination and reaction time, and harden the formation against jamming and electronic disruption."

 military_police_attachment: "Military Police"
 military_police_attachment_desc: "Military Police manage traffic control, rear-area security, and the handling of prisoners, freeing line units to focus on combat. By keeping supply routes orderly and securing the rear against infiltrators and stragglers, they preserve discipline and keep a formation moving smoothly."

 hq_mech: "HQ Mechanized Infantry Company"
 hq_mot: "HQ Motorized Infantry Company"
 hq_armor: "HQ Heavy Cavalry Company"
 hq_Mot_Inf_Bat: "HQ Motorized Infantry Security Detachment"
 hq_Mech_Inf_Bat: "HQ Mechanized Infantry Security Detachment"
 hq_Arm_Inf_Bat: "HQ Armored Security Detachment"
 hq_Mech_Marine_Bat: "HQ Marine Security Detachment"
 hq_Mech_Air_Inf_Bat: "HQ Air Assault Security Detachment"