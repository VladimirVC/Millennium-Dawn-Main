 form_UAS_category_desc: "アフリカ諸国連合は、クワメ・ンクルマの汎アフリカ主義の理念のもと、1961年にガーナ、ギニア、マリによって結成された、短命に終わった政治連合である。この西アフリカ統一という夢を再び蘇らせ、新たな強力な連合を築き上げよう。"
