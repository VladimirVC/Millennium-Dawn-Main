 EU_apply_for_membership_category: "Unirse a la UE"
 EU_apply_for_membership_category_desc: "Becoming a member of the EU is a complex procedure which does not happen overnight. Once an applicant country meets the conditions for membership, it must implement EU rules and regulations in all areas.\nAny country that satisfies the conditions for membership can apply. These conditions are known as the 'Copenhagen criteria' and include a free-market economy, a stable democracy and the rule of law, and the acceptance of all EU legislation, including of the euro."
 EU_apply_for_membership: "Unirse a la UE"
 EU_apply_for_membership_desc: "§Y[ROOT.GetNameWithFlag]§! puede unirse a la §C[EUU.GetFlag] La Unión Europea§! cantemos la Oda a la Alegría:\nAlegría, hermoso destello de divinidad,\nHija del Elíseo,\nEntramos, ebrios de fuego,\nCelestial, tu santuario!\nTu magia une de nuevo\nLo que la costumbre separó;\nTodos los hombres se hacen hermanos,\nDonde tu suave ala mora."
 USoE_integrate_new_members: "Integrar nuevos Estados miembros"
 USoE_integrate_new_members_desc: "Naciones adicionales han decidido avanzar y unirse a la Unión. Es hora de integrar estos nuevos estados miembros y hacer que los Estados Unidos de Europa sean mucho más fuertes de cara al futuro."
 instrument_for_pre_accession_assistance: "Instrumento de Asistencia para la Pre-adhesión (IPA)"
 instrument_for_pre_accession_assistance_desc: "El Instrumento de Asistencia para la Pre-adhesión (IPA) es cómo la UE ha estado apoyando reformas en la región de ampliación con asistencia financiera y técnica."
 instrument_for_pre_accession_assistance_tt: "Los candidatos a la UE obtienen §YProgramas de Asistencia de Preadhesión§!"
 pre_accession_assistance_program: "Programa de Asistencia para la Preadhesión"
 pre_accession_assistance_program_desc: "§C[EUU.GetFlag][EUU.GetName]§! está apoyando reformas de los países candidatos para que puedan cumplir con los criterios de adhesión de §C[EUU.GetFlag][EUU.GetName]§!. La asistencia está dirigida principalmente a ayudar a eliminar la corrupción y proporcionar cierto beneficio económico a la nación para poner en orden sus finanzas."
 EU_pre_accession_assistance: "Asistencia para la Pre-adhesión"
 EU_pre_accession_assistance_desc: "§C[EUU.GetFlag][EUU.GetName]§! está apoyando reformas de los países candidatos para que puedan cumplir con los criterios de adhesión de §C[EUU.GetFlag][EUU.GetName]§!. La asistencia está dirigida principalmente a ayudar a eliminar la corrupción y proporcionar cierto beneficio económico para poner en orden nuestras finanzas."
 tooltip_leader_of_EU_trade_policy_influence_3_percent: "§C[EUU.GetFlag] Líder de la Política Comercial de la Unión Europea§! (en este orden §YPresidente de la Comisión Europea§!, §YPresidente del Consejo Europeo§!, §YPresidente del Parlamento Europeo§!) debe tener > 3% de influencia sobre todos los estados miembros de la §C[EUU.GetFlag] Unión Europea§!."
