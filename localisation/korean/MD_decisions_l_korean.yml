 public_war_wariness_decision_category: "대중의 전쟁 피로도"
 public_war_wariness_decision_category_desc: "\n£MAIN_desctext_weariness \n\n\n\n이제 우리 국가는 전쟁 중입니다. 분쟁에 수반되는 문제들은 이제 그 어느 때보다 중요합니다. 전쟁에서 승리하는 가장 효과적인 방법은 전쟁에 대한 국민들의 지지를 유지하는 것입니다. 국민들이 분쟁에 대한 지지를 철회하는 순간 우리는 이미 패배한 것입니다.\n\n§Y참고: 국민들은 장기전을 달가워하지 않습니다. 전쟁이 단기 결정적일수록 전쟁으로 인한 불이익이 적습니다.§!\n\n현재 전쟁 지지도 패널티: [?war_support_factor_var|R0%]\n"
 POR_expand_the_neves_corvo_mine: "네베스-코르보 광산 확장"
 POR_expand_the_neves_corvo_mine_desc: "네베스-코르보 광산은 지구물리학 연구 중 중력 이상이 발견된 후 1977년에 설립되었습니다. 이 광산은 주로 아연과 구리를 생산하며 국내 주요 광산 중 하나로 꼽힙니다. 우리는 이 광산에 추가 자원을 투자하여 더 많이 개발해야 합니다."
 POR_expand_the_panasqueira_mines: "파나스케이라 광산 확장"
 POR_expand_the_panasqueira_mines_desc: "파나스케이라 광산은 카베수 두 피앙(Cabeço do Pião)과 파나스케이라 인근 마을 사이의 광업 지역을 통칭하는 일반적인 이름입니다. 이 광산은 19세기 말부터 가동되어 왔으며 해당 지역에 텅스텐과 기타 광물의 풍부한 매장량을 자랑합니다. 우리는 국가에 도움이 되도록 추가 투자와 더 많은 정부 자금을 투입하여 매장량을 더욱 개발할 수 있습니다."
 POR_expand_the_mua_mine: "무아 광산 프로젝트"
 POR_expand_the_mua_mine_desc: "포르투갈의 무아 광산은 국내를 넘어 세계에서 가장 큰 광산 중 하나입니다. 이 광산은 품위 37%의 철광석 25억 6천만 톤에 달하는 최대 규모의 철광석 매장지 중 하나를 나타냅니다. 이를 확장하고 개발하는 것은 우리의 경제적 꿈인 독립성을 향해 한 걸음 더 나아가는 데 도움이 될 것입니다."
 abramssepv2_decision: "M1A2 SEPv2 에이브람스 설계 생성"
 merkava4_decision: "메르카바 Mk.4 설계 생성"
 merkava4M_decision: "메르카바 Mk.4M 설계 생성"
 type_99_decision_desc: "ZTZ-99 1기 개량형(Phase-I Plus)은 방호력이 강화된 WZ123(9910 계획)의 개량형입니다. FY-4 반응 장갑과 초기형 레이더 경보 시스템을 장착하고 있습니다."
 type_99_II_decision: "ZTZ-99 2기 개량형 설계 생성"
 type_99_II_decision_desc: "0910 계획의 일환인 ZTZ-99 2기 개량형(Phase-II)은 개량된 포탑 구조, 업그레이드된 전장 정보 시스템, 그리고 레이저 대응 장치를 특징으로 합니다."
 type_99a_decision: "ZTZ-99A 설계 생성"
 type_99a_decision_desc: "ZTZ-99A 전차는 정보화 분야의 도약을 상징하며, 중국 최초로 국내 개발된 디지털화 전차입니다. 이전 모델과 비교했을 때 포탑과 차대 서스펜션 시스템이 거의 완전히 재설계되었습니다."
 ztq_15_decision: "ZTQ-15 설계 생성"
 ztq_15_decision_desc: "ZTQ-15는 콤팩트한 디자인과 경량 구조를 특징으로 하여 중국 서부 고원 지대와 수로가 밀집된 남부 지형에 실전 배치하기에 이상적입니다."
 zbd_04a_decision: "ZBD-04A 설계 생성"
 zbd_04a_decision_desc: "ZBD-04 IFV의 개량형(\"502 개조형\"이라고도 함)은 원래 모델에 비해 수륙양용 성능 요구 사항을 줄이고, 차체 장갑을 재설계 및 강화했으며, 새로운 레이저 경보 시스템을 장착했습니다."
 zbl_08_decision: "ZBL-08 설계 생성"
 zsl_10_decision: "ZSL-10 설계 생성"
 pgz_09_decision: "PGZ-09 설계 생성"
 pgz_09_decision_desc: "PGZ-09는 중국에서 라이선스 생산한 GDF-002의 중국 개량형인 PG99 대공포 2문을 사용하여 PGZ-95를 대체하여 야전 방공을 제공합니다. 이 시스템의 성공으로 중국은 처음으로 고기동 목표물에 대한 종말 방공 역량을 달성하여 선진국의 유사 시스템 수준에 도달했습니다."
 plz_05_decision_desc: "새로운 세기를 맞이한 인민해방군 포병 현대화의 핵심 장비 중 하나인 PLZ-05는 인민해방군에 실전 배치된 최초의 155mm 궤도형 자주포입니다. 새로운 차대와 선진 포병 기술을 활용한 이 자주포는 세계 최고 수준에 도달하여 인민해방군 육군의 화력 지원 능력을 크게 향상시켰습니다."
 cheat_decisions_european_union_vote_yes_always: "유럽연합: AI가 항상 찬성 투표"
 cheat_decisions_european_union_vote_yes_always_desc: "AI가 법안에 항상 찬성 투표하도록 만들고 싶을 때 사용하는 치트 결정입니다. 이 결정을 사용하면 유럽연합 관련 도전 과제가 달성 불가 상태가 됩니다."
