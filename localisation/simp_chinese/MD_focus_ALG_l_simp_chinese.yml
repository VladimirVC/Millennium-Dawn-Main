 alg_cabinet.201.t: "深层政府压力"
 alg_cabinet.1.d: "当前内阁体现了总统、官僚体系与安全机构之间的平衡。\n\n总理：[GetPMName]\n国防部长：[GetMODName]\n内政部长：[GetMOIName]\n外交部长：[GetMOFAName]\n财政部长：[GetMOFName]\n能源部长：[GetMOEName]\n司法部长：[GetMOJName]\n情报主管：[GetDRSName]\n\n内阁忠诚度：[GetCabinetLoyaltyLevel]\n内阁能力：[GetCabinetCompetenceLevel]\n内阁深层政府影响力：[GetCabinetDeepStateLevel]"
 alg_cabinet.10.d: "总理办公室在协调各部委、维护总统职位以及管理日常政务方面仍然至关重要。正确的人选可以巩固政权，而错误的选择则可能助长对手的气焰。"
 alg_cabinet.20.d: "国防部绝非仅仅是行政机构。它与军官团、最高指挥部以及构成深层国家的网络紧密相连。更换其掌权者始终充满风险。"
 alg_cabinet.25.d: "军官团对国防部近期的变动并不买账。某些派系公开抱怨总统正在破坏军队内部既有的平衡。"
 alg_cabinet.30.d: "内政部掌控着内部行政、省级治理以及众多国内秩序的杠杆。其负责人必须既可靠又具备政治才能。"
 alg_cabinet.40.d: "阿尔及利亚外交部长为共和国在国际舞台上定调，平衡与西方、阿拉伯世界以及更广泛的不结盟传统之间的关系。"
 alg_cabinet.50.d: "财政部决定阿尔及利亚是追求技术官僚改革、国家统制管理，还是延续长期以来定义该政权的熟悉的官僚平衡。"
 alg_cabinet.60.d: "石化产业依然是阿尔及利亚国家的经济支柱。因此，能源部是内阁中经济战略地位最重要的部门之一。"
 alg_cabinet.70.d: "司法部既可成为改革的载体，亦可作为政权管束的工具，或是安全机构的武器。"
 alg_cabinet.80.d: "情报局长掌控着国家最不透明、最令人恐惧的机构。这是内阁中最敏感的任命，任何重大变动都可能引发强烈反弹。"
 alg_cabinet.85.d: "情报部门内部有人抵制最近的任命。旧有网络依然完好，并非所有人都愿意接受更严格的政治控制。"
 alg_cabinet.100.d: "全面改组为总统提供了恢复秩序、奖赏盟友并重新定义政府方向的机会。然而，每一次新的平衡都会催生新的敌人。"
 alg_cabinet.110.d: "总统府已听闻忠诚动摇的传闻。公开展现团结或许能重树威信，但强行推动此事也可能暴露隐藏的裂痕。"
 alg_cabinet.200.d: "几位关键内阁成员正显露出不服从或政治上不可靠的迹象。在一个已被敌对网络和隐秘权力中心所塑造的体系中，这种不忠行为是危险的。"
 alg_cabinet.201.d: "深层政府要求对部长任命和政策方向拥有更大影响力。接受他们的压力或许能维持短期平静，但抵制他们则可能引发对抗。"
 alg_cabinet.1.a: "明白。"
