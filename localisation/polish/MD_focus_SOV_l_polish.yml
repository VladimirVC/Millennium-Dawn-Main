 SOVUKR_promka_v_nato: "Skorzystaj z zachodniego przemysłu"
 SOVUKR_total_mobka: "Totalna mobilizacja"
 SOV_yabloko: "RUDP Jabłoko"
 SOV_yabloko_desc: "Jabłoko, jedna z najstarszych partii liberalnych we współczesnej Rosji, w końcu doszła do władzy, wspierana nową falą poparcia dla demokracji w stylu zachodnim. Partia stała się politycznym domem dla reformatorów – od doświadczonych demokratów z lat 90. XX wieku po nowe pokolenie zainspirowane obietnicą liberalnego, sprawiedliwego społeczeństwa. Ich celem jest nic innego, jak przekształcenie Rosji w modelową, zachodnią, liberalną demokrację."
 SOV_yavlinskiy: "Grigorij Jawliński"
 SOV_yavlinskiy_desc: "Grigorij Jawliński urodził się 10 kwietnia 1952 roku we Lwowie, ale jego kariera polityczna zakorzeniła się w moskiewskich instytucjach rządowych z czasów sowieckich. Z wykształcenia ekonomista, został niegdyś zobowiązany do opracowania reform rynkowych dla ZSRR, ale jego propozycje zostały ostatecznie odrzucone na rzecz innych strategii. Pomimo niepowodzeń, pozostał zagorzałym orędownikiem reform i od początku lat 90. do dziś kieruje partią Jabłoko. Jego nieustanna obecność w rosyjskiej polityce odzwierciedla jego zaangażowanie na rzecz demokratycznej i liberalnej gospodarczo Rosji."
 SOV_russian_liberalism: "Rosyjski liberalizm"
 SOV_russian_liberalism_desc: "Przez wieki Rosja cierpiała pod rządami autokratów – od carów po reżim sowiecki. Prawdziwa demokracja nigdy nie miała szansy rozkwitnąć. ​​Teraz nadszedł czas, aby zerwać z tym dziedzictwem. Przyjmując zachodnie wartości liberalne, takie jak samostanowienie, prawa człowieka i wolność słowa, możemy wprowadzić Rosję w nową erę demokratycznych rządów i wzmocnienia pozycji obywateli."
 SOV_fix_eltsyn_shit: "Napraw błędy z lat 90"
 SOV_fix_eltsyn_shit_desc: "Polityka gospodarcza Gajdara i Jelcyna w latach 90. XX wieku poprowadziła Rosję niebezpieczną ścieżką. Zamiast dynamicznie rozwijającej się gospodarki rynkowej, kraj popadł w oligarchię, gdzie bogactwo i władza skupiły się w rękach nielicznych. Musimy teraz naprawić te błędy i udowodnić, że prawdziwy kapitalizm może funkcjonować w Rosji. Przejrzysta i konkurencyjna gospodarka musi zastąpić system kolesiowski, któremu pozwolono się zakorzenić."
 SOV_russian_free_speech: "Rosyjska wolność słowa"
 SOV_russian_free_speech_desc: "Wolność słowa jest fundamentalnym filarem każdego liberalnego społeczeństwa. Gdy ludzie są uciszani, państwo popada w stagnację i odcina się od swoich obywateli. To tłumienie doprowadziło do upadku zarówno za czasów imperium, jak i Związku Radzieckiego. Aby zabezpieczyć naszą przyszłość i zapobiec kolejnemu cyklowi rozkładu, musimy chronić i promować otwarty dyskurs i swobodę wypowiedzi dla wszystkich."
 SOV_no_repressions: "Odwrotne prawa represyjne"
 SOV_no_repressions_desc: "Zanim doszliśmy do władzy, rząd uchwalił prawa ograniczające wolności obywatelskie i więził niewinnych obywateli. Te represyjne środki nie mają miejsca w liberalnej demokracji. Musimy znieść te prawa i uwolnić tych, którzy zostali niesłusznie ukarani. To niezbędny krok w kierunku sprawiedliwości, pojednania i przywrócenia zaufania społecznego do rządu."
 SOV_depoliticize_oligarchs: "Odpolitycznić oligarchów"
 SOV_depoliticize_oligarchs_desc: "Połączenie władzy politycznej i gospodarczej w latach 90. XX wieku dało początek zakorzenionej oligarchii, która osłabiła naszą demokrację. Elity te traktują kraj jak prywatny majątek. Konieczne jest zerwanie tego nieczystego sojuszu i zapewnienie, że wpływy polityczne będą w rękach wyłącznie ludu. Tylko wtedy będziemy mogli przywrócić władzę należne jej miejsce – w rękach obywateli."
 SOV_depoliticize_oligarchs_focus_TT: "Rozpoczniemy długi proces depolityzacji oligarchów. Mogą stawiać opór!"
 SOV_new_society: "Wielkie społeczeństwo"
 SOV_new_society_desc: "Rosja przetrwała burzę odbudowy. Teraz nadszedł czas, aby rozpocząć transformację naszego społeczeństwa. Naszym celem jest zbudowanie liberalnych ram zarówno dla sprawowania rządów, jak i gospodarki, odchodząc od autorytarnych i kolektywistycznych wartości przeszłości. Nasza inicjatywa „Wielkie Społeczeństwo” czerpie inspirację z wizji Lyndona B. Johnsona, ale nasze ambicje są jeszcze szersze: fundamentalnie przekształcić Rosję w nowoczesną, przyszłościową liberalną demokrację."
 SOV_capitalism_in_500_days: "Rozpocznij program 500 dni"
 SOV_capitalism_in_500_days_desc: "Program 500 Dni został pierwotnie zaprojektowany w celu transformacji gospodarki radzieckiej w system rynkowy. Choć został odłożony na półkę na rzecz terapii szokowej Gajdara, potrzeba takiej reformy nadal istnieje. Będziemy reaktywować i aktualizować program, aby stworzyć bardziej stabilną i inkluzywną transformację gospodarczą. Jeśli zostanie on prawidłowo wdrożony, stworzy podwaliny pod długoterminowy dobrobyt i odporność demokracji."
 SOV_lgbt_rights: "Prawa LGBT"
 SOV_lgbt_rights_desc: "Prawdziwie liberalne społeczeństwo musi szanować prawa i godność każdej osoby, niezależnie od jej orientacji seksualnej. Osoby LGBT zasługują na równą ochronę prawną i równy dostęp do szans. Uznanie ich praw to nie tylko moralny imperatyw, ale także niezbędny krok w kierunku budowy inkluzywnej i nowoczesnej Rosji."
 SOV_kill_communists: "Zniszczyć sympatyków komunistów"
 SOV_kill_communists_desc: "Komunizm pozostaje jednym z największych zagrożeń dla liberalnych reform w Rosji. Podsycani nostalgią za błędną przeszłością, jego zwolennicy dążą do zahamowania naszego postępu. Musimy zdecydowanie rozbić ich sieci i zapobiec odrodzeniu się autorytarnego socjalizmu. Nie ma miejsca dla tej ideologii w nowoczesnym państwie demokratycznym."
 SOV_kill_revanchism: "Zniszcz myśli rewanżystowskie"
 SOV_kill_revanchism_desc: "Co rodzi totalitaryzm i nieliberalne ideologie? Rewanżyzm. Rośnie w słabych systemach, czekając na szansę, by się odrodzić. Niczym przewlekły wirus, musi zostać wytępiony, jeśli chcemy zabezpieczyć naszą liberalną przyszłość. Musimy stawić mu czoła – poprzez edukację, reformy i silne instytucje – aby upewnić się, że nie zarazi ponownie naszego społeczeństwa."
 SOV_communist_angry_focus_TT: "Rozzłościmy komunistów!"
 SOV_kill_fascists: "Uspokój falę nacjonalistyczną"
 SOV_kill_fascists_desc: "Nacjonalizm, posunięty do skrajności, stanowi poważne zagrożenie dla liberalnego, wieloetnicznego społeczeństwa. Historia pokazała niszczycielskie konsekwencje reżimów nacjonalistycznych. Musimy rozmontować te ruchy, zanim nabiorą rozpędu. Wolna i inkluzywna Rosja musi mieć pierwszeństwo przed wąskimi, etnonacjonalistycznymi programami."
 SOV_fascists_angry_focus_TT: "Rozzłościmy nacjonalistów!"
 SOV_better_russia: "Lepsza Rosja"
 SOV_better_russia_desc: "Choć nasza praca jest daleka od ukończenia, poczyniliśmy zdecydowane kroki w kierunku budowy bardziej wolnej i sprawiedliwej Rosji. Po raz pierwszy od pokoleń cykl tyranii został przerwany. Zapobiegliśmy powrotowi dyktatury i dzięki nieustannym wysiłkom możemy budować przyszłość, w której królować będzie demokracja i szanse."
 SOV_500_days_ura_tt: "Ukończył §Y4§! fazy programu 500 dni"
 SOV_500_days_pizda_tt: "Jeśli nie dokończymy naszych reform, konsekwencje mogą być nieprzewidywalne!"
 SOV_500_days_focus_TT: "Odblokowuje decyzje dotyczące reform gospodarczych. Uwaga: jeśli nie ukończymy programu na czas, konsekwencje mogą być nieprzewidywalne!"
 SOV_depolitisation_of_oligarchs: "Depolityzacja oligarchów"
 SOV_new_broken_economy: "Konsekwencje nieudanych reform"
 SOV_new_broken_economy_desc: "Nie udało nam się wdrożyć reform gospodarczych. Teraz kraj pogrąża się w głębokiej recesji – porównywalnej z katastrofalnym kryzysem lat 90. Przedsiębiorstwa upadają, zaufanie społeczne maleje, a bezrobocie gwałtownie rośnie. Brak reakcji na czas okazał się druzgocący."
 SOV_communist_angry: "Komunistyczne protesty!"
 SOV_nationalists_angry: "Nacjonaliści protestują!"
 SOV_the_onf: "Ogólnorosyjski Front Ludowy"
 SOV_the_onf_desc: "Niektórzy twierdzą, że zdobycie władzy wymaga zniesienia wyborów i wprowadzenia dyktatury. Odrzucamy tę drogę. Autorytaryzm prowadzi do stagnacji i ruiny. Zamiast tego proponujemy szeroką koalicję organizacji obywatelskich i partii politycznych – platformę dla konstruktywnej debaty, innowacji i nadzoru. Poprzez ten Front Ludowy wzmocnimy demokrację, zachowując jednocześnie stabilność polityczną."
 SOV_the_onf_TT: "§YA broad coalition§! of parties will be created to ensure §Ypolitical stability!§!"
 SOV_preserve_working_system: "Zachowaj działający system"
 SOV_preserve_working_system_desc: "Niektórzy twierdzą, że jedynym sposobem na osiągnięcie sprawiedliwego systemu federalnego jest przyznanie maksymalnej autonomii regionom lub całkowita przebudowa obecnej struktury. My uważamy inaczej. Obecny system federalny, choć zdyskredytowany przez dawne reżimy autorytarne, jest zasadniczo zdrowy. Poprzez przemyślane i demokratyczne reformy możemy w pełni wykorzystać jego potencjał i zapewnić, że będzie on korzystny dla wszystkich Rosjan."
 SOV_more_fair_taxation: "Sprawiedliwe opodatkowanie"
 SOV_more_fair_taxation_desc: "Istotną wadą naszego obecnego systemu jest opodatkowanie regionalne. Obecnie podatki są pobierane lokalnie, przekazywane rządowi federalnemu, a następnie redystrybuowane – często niesprawiedliwie. System ten koncentruje bogactwo w kluczowych regionach, pozostawiając inne w stanie zacofania. Musimy zreformować ten proces, aby umożliwić regionom kontrolowanie sprawiedliwej części własnych zasobów. To sprzyja zrównoważonemu rozwojowi i zmniejsza nierówności ekonomiczne oraz nastroje separatystyczne."
 SOV_equal_regions: "Równość Regionów"
 SOV_equal_regions_desc: "Nie ma potrzeby demontażu ani radykalnej zmiany naszej struktury federalnej. Potrzebujemy odnowionego zaangażowania na rzecz demokratycznych rządów i równych szans dla wszystkich regionów. Zajmując się przeszłymi nadużyciami i podejmując kompleksowe reformy, możemy stworzyć system, w którym każdy region, niezależnie od wielkości czy zamożności, będzie miał głos i narzędzia do rozwoju."
 SOV_what_we_dreamt_about: "Nasze marzenie"
 SOV_what_we_dreamt_about_desc: "Osiągnęliśmy to, co pierwotni architekci rosyjskiego federalizmu mogli jedynie sobie wyobrazić. Nasz system jest teraz funkcjonalny, demokratyczny i sprawiedliwy. Sukces naszych reform dowodzi, że Rosja może zachować jedność i równość, nie odrzucając swoich federalnych fundamentów. To jest Rosja, o jakiej marzyliśmy – silna, wolna i sprawiedliwa dla wszystkich."
 SOV_new_form_of_the_gov: "Nowa forma rządu"
 SOV_new_form_of_the_gov_desc: "Dekady autorytarnej kontroli podważyły ​​demokratyczne zasady, którymi niegdyś kierował się nasz rząd. Władza wykonawcza zyskała nieograniczoną władzę. Naszym obowiązkiem jest ponowna ocena i zrównoważenie roli organów władzy centralnej. Tylko poprzez przywrócenie demokratycznych mechanizmów kontroli i równowagi możemy stworzyć rząd, który naprawdę służy ludziom."
 SOV_empower_duma: "Wzmocnij pozycję Zgromadzenia Federalnego"
 SOV_empower_duma_desc: "Choć uprawnienia prezydenta mogą wydawać się ograniczone na papierze, w praktyce pozwalają one na manipulację wszystkimi gałęziami władzy. Aby zachować demokrację, musimy zmienić konstytucję, ograniczając władzę prezydenta. Albo uczynimy urząd ceremonialnym, albo całkowicie go zlikwidujemy, przekazując rzeczywistą władzę ustawodawczą Zgromadzeniu Federalnemu."
 SOV_mixed_system: "System mieszany"
 SOV_mixed_system_desc: "Obecny system półprezydencki w Rosji ma swoje korzenie w liberalnych zasadach zachodnich, zwłaszcza tych zapisanych w Konstytucji z 1993 roku. Krytycy twierdzą, że sprzyja on dyktaturze, ale dzięki odpowiednim poprawkom możemy wzmocnić mechanizmy kontroli i równowagi bez konieczności gruntownej przebudowy. Udoskonalając system, zapobiegniemy koncentracji władzy, zachowując jednocześnie ciągłość instytucjonalną."
 SOV_all_powers_to_the_presidents: "Cała władza w ręce Prezydenta"
 SOV_all_powers_to_the_presidents_desc: "Wielu uważa, że ​​Rosja funkcjonuje jako de facto republika prezydencka, w której prezydent sprawuje największą władzę. Ten model może nadal funkcjonować w demokracji, jeśli zostanie starannie zrestrukturyzowany. Zmienimy konstytucję, aby uczynić prezydenta formalnym szefem władzy wykonawczej, przejmując obowiązki premiera i usprawniając zarządzanie."
 SOV_changes_in_the_constitution: "Prawdziwie demokratyczna konstytucja"
 SOV_changes_in_the_constitution_desc: "Po gruntownej debacie jesteśmy gotowi wprowadzić nową falę poprawek do konstytucji. Zmiany te na nowo zdefiniują strukturę władzy państwowej, utrwalą zasady demokratyczne i zagwarantują wolności obywatelskie. Przede wszystkim jednak zachowają wolność słowa i zapobiegną nadużyciom władzy dla przyszłych pokoleń."
 SOV_semipres_focus_TT: "Pozostaniemy republiką półprezydencką"
 SOV_parliament_focus_TT: "Staniemy się Republiką Parlamentarną"
 SOV_president_focus_TT: "Staniemy się Republiką Prezydencką"
 SOV_idea_parliamentary_republic: "Republiką parlamentarną"
 SOV_idea_presidential_republic: "Republika Prezydencka"
 SOV_idea_semi_presidential_republic: "Republika półprezydencka"
 SOV_freind_kyr: "Przyjaźń z Kirgistanem"
 SOV_freind_kyr_desc: "Wzmocnienie naszych wpływów w Azji Centralnej jest jednym z naszych strategicznych priorytetów. Zacieśniając więzi z Kirgistanem, możemy budować trwałe partnerstwa z państwami postsowieckimi i stabilizować region."
 SOV_freind_kaz: "Przyjaźń z Kazachstanem"
 SOV_freind_kaz_desc: "Wzmocnienie naszych wpływów w Azji Środkowej jest jednym z naszych strategicznych priorytetów. Kazachstan zajmuje kluczową pozycję w regionie, a silne stosunki dwustronne przyniosą korzyści obu naszym narodom."
 SOV_freind_uzb: "Przyjaźń z Uzbekistanem"
 SOV_freind_uzb_desc: "Wzmocnienie naszych wpływów w Azji Środkowej jest jednym z naszych strategicznych priorytetów. Budowanie bliskiego partnerstwa z Uzbekistanem przyniesie obopólne korzyści gospodarcze i dyplomatyczne."
 SOV_freind_taj: "Przyjaźń z Tadżykistanem"
 SOV_freind_taj_desc: "Wzmocnienie naszych wpływów w Azji Środkowej jest jednym z naszych strategicznych priorytetów. Odnowienie więzi z Tadżykistanem pomoże zapewnić pokój, współpracę i wspólny rozwój w regionie."
 SOV_freind_trk: "Przyjaźń z Turkmenistanem"
 SOV_freind_trk_desc: "Wzmocnienie naszych wpływów w Azji Środkowej jest jednym z naszych strategicznych priorytetów. Bliższe relacje z Turkmenistanem pomogą nam rozwijać współpracę regionalną i wzajemne zaufanie."
 SOV_attack_uzb: "Przynieś demokrację do Uzbekistanu"
 SOV_attack_uzb_desc: "Znaczna część Azji Środkowej pozostaje pod władzą autorytarnych przywódców, którzy rządzą jak współcześni chanowie. Będziemy działać na rzecz wprowadzenia prawdziwie demokratycznych rządów w Uzbekistanie i wyzwolenia jego mieszkańców spod autokracji."
 SOV_attack_kaz: "Przynieś demokrację do Kazachstanu"
 SOV_attack_kaz_desc: "Znaczna część Azji Środkowej pozostaje pod władzą autorytarnych przywódców, którzy rządzą jak współcześni chanowie. Kazachstan zasługuje na przyszłość zbudowaną na wolności, prawach człowieka i instytucjach demokratycznych."
 SOV_attack_kyr: "Przynieś demokrację do Kirgistanu"
 SOV_attack_kyr_desc: "Znaczna część Azji Środkowej pozostaje pod władzą autorytarnych przywódców, którzy rządzą jak współcześni chanowie. Kirgistanowi należy dać szansę na rozkwit poprzez autentyczne reformy demokratyczne."
 SOV_attack_trk: "Przynieś demokrację do Turkmenistanu"
 SOV_attack_trk_desc: "Znaczna część Azji Środkowej pozostaje pod władzą autorytarnych przywódców, którzy rządzą jak współcześni chanowie. Mieszkańcy Turkmenistanu zasługują na system, w którym ich głos jest słyszany i szanowany."
 SOV_attack_taj: "Przynieś demokrację do Tadżykistanu"
 SOV_attack_taj_desc: "Znaczna część Azji Środkowej pozostaje pod władzą autorytarnych przywódców, którzy rządzą jak współcześni chanowie. Tadżykistan musi otrzymać szansę na lepszą, bardziej demokratyczną przyszłość."
 SOV_support_democracy_in_georgia: "Wesprzyj Demokrację w Gruzji"
 SOV_support_democracy_in_georgia_desc: "Gruzja jest pionierem rozwoju demokracji na Kaukazie. Będziemy wspierać jej wysiłki na rzecz wzmocnienia instytucji demokratycznych i promowania wolności politycznych dla wszystkich obywateli."
 SOV_state_investments: "Inwestycje państwowe w Gruzji"
 SOV_state_investments_desc: "Inwestując w Gruzji, wzmacniamy naszą obecność na Kaukazie i wspieramy wzrost gospodarczy u kluczowego partnera. Inwestycje te wzmocnią stabilność i wzajemną współpracę w regionie."
 SOV_naval_base_in_georgia: "Baza Marynarki Wojennej w Gruzji"
 SOV_naval_base_in_georgia_desc: "Utworzenie bazy morskiej u wybrzeży Gruzji znacząco wzmocni nasze możliwości monitorowania i kontrolowania regionu Morza Czarnego. Pomimo przesuwania się granic Rosji dalej na północ, jej obecność morska na Morzu Czarnym pozostaje kluczowa i stała. Baza ta zabezpieczy nasze strategiczne interesy i wzmocni bezpieczeństwo regionalne."
 SOV_mediate_ossetianabkhaz_question: "Pośrednia kwestia osetyjsko-abchaska"
 SOV_mediate_ossetianabkhaz_question_desc: "Długotrwały konflikt między Osetią a Abchazją nie przystaje już do współczesnej rzeczywistości geopolitycznej. Musimy działać jako neutralny mediator, aby pomóc złagodzić napięcia i wspierać pokój na Kaukazie, promując stabilność i współpracę między wszystkimi zaangażowanymi stronami."
 SOV_friendship_armenia: "Przyjaźń z Armenią"
 SOV_friendship_armenia_desc: "Wzmocnienie naszych relacji z Armenią jest niezbędne. Jako bliski partner historyczny i regionalny, Armenia zasługuje na większą uwagę i pogłębienie więzi politycznych, gospodarczych i kulturalnych."
 SOV_friendship_azerbaijan: "Przyjaźń z Azerbejdżanem"
 SOV_friendship_azerbaijan_desc: "Zacieśnienie relacji z Azerbejdżanem, głównym potentatem naftowym na Kaukazie Południowym, to posunięcie strategiczne. Zacieśnienie współpracy przyniesie korzyści obu krajom i pomoże w stabilizacji gospodarczej i politycznej regionu."
 SOV_invest_in_arm_it: "Inwestuj w Armenii"
 SOV_invest_in_arm_it_desc: "Inwestowanie w Armenii będzie sprzyjać rozwojowi gospodarczemu i wzmocni nasze wpływy na Kaukazie. Ukierunkowane wsparcie może pobudzić rozwój infrastruktury, przemysłu i współpracy dwustronnej."
 SOV_invest_in_aze_oil: "Zainwestuj w ropę Azerbejdżanu"
 SOV_invest_in_aze_oil_desc: "Rozwój azerbejdżańskich złóż ropy naftowej ma kluczowe znaczenie dla pogłębienia współpracy międzypaństwowej. Inwestycja ta zabezpieczy zasoby energetyczne i wzmocni więzi gospodarcze między naszymi narodami."
 SOV_decide_side: "Wybierz, po której stronie jesteśmy"
 SOV_decide_side_desc: "While we strive to maintain balanced relations with all post-Soviet countries in the Caucasus, the unresolved conflict between Armenia and Azerbaijan forces us to make a choice. W tym złożonym sporze regionalnym nie da się jednakowo wspierać obu stron."
 SOV_support_artsakh: "Wesprzyj Artsakh'a"
 SOV_support_artsakh_desc: "Nasze sympatie skłaniają się ku Armenii, która pozostaje naszym najbliższym i najbardziej przyjaznym partnerem na Kaukazie. Wsparcie dla Arcachu odzwierciedla nasze zaangażowanie w ten sojusz i ochronę przyjaznych narodów w regionie."
 SOV_support_azerbaijan: "Wesprzyj Azerbejdżan"
 SOV_support_azerbaijan_desc: "Pomimo naszej historycznej przyjaźni z Armenią, musimy również brać pod uwagę realia ekonomiczne i strategiczne. Silna pozycja Azerbejdżanu i ogromne złoża ropy naftowej czynią go kluczowym partnerem, którego interesów nie można ignorować."
 SOV_invite_shah: "Zaproś Shaha"
 SOV_invite_shah_desc: "Sytuacja polityczna w Iranie staje się coraz bardziej niestabilna. Zaproszenie następcy tronu mogłoby zapewnić nam cennego sojusznika i pomóc w przywróceniu porządku. Jego powrót może wpłynąć na równowagę sił na naszą korzyść w tych niepewnych czasach."
 SOV_support_the_reformists: "Wspieraj reformistów"
 SOV_support_the_reformists_desc: "Frakcja reformatorów w Iranie lepiej odpowiada naszym interesom i wizji regionu. Wspieranie ich może prowadzić do bardziej umiarkowanej polityki i stabilnego partnerstwa, korzystnego dla obu stron."
 SOV_invest_in_iran: "Inwestuj w Iranie"
 SOV_invest_in_iran_desc: "Iran oferuje znaczące możliwości gospodarcze, których nie możemy zignorować. Inwestując w jego rozwój, możemy zapewnić sobie zyskowne zyski i wzmocnić nasze wpływy w regionie."
 SOV_neutral_relations: "Neutralne relacje"
 SOV_neutral_relations_desc: "Pokój jest lepszy od konfliktu. Będziemy dążyć do naszych celów poprzez dyplomację i współpracę, unikając wojny i wspierając stabilizację w regionie."
 SOV_passage_through_caucasus: "Przejście przez Kaukaz"
 SOV_passage_through_caucasus_desc: "Zapewnienie bezpiecznego przejścia przez Kaukaz Południowy wzmocni naszą pozycję strategiczną przy jednoczesnym utrzymaniu przyjaznych stosunków z Iranem. Rozwiązanie to równoważy nasze interesy regionalne i sprzyja współpracy."
 SOV_animosity_to_iran: "Niechęć do Iranu"
 SOV_animosity_to_iran_desc: "Prześladowania narodu irańskiego przez rząd Iranu wywołały wrogość wobec nas. Ta wrogość sprawia, że ​​Iran jest nieprzyjaznym i nieprzewidywalnym sąsiadem, do którego musimy podchodzić ostrożnie."
 SOV_ignite_revolution_in_iran: "Rozpalić rewolucję w Iranie"
 SOV_ignite_revolution_in_iran_desc: "Mamy teraz okazję wesprzeć wyzwolenie narodu irańskiego. Wywołanie rewolucji jeszcze bardziej zjednoczy region z naszymi interesami i przyczyni się do większej, korzystnej dla nas stabilności."
 SOV_poland_relations: "Przyjaźń rosyjsko-polska"
 SOV_poland_relations_desc: "Czas przezwyciężyć stare konflikty i wspólnie z naszymi polskimi sąsiadami budować silniejszy świat słowiański. Współpraca z Polską przyniesie obopólne korzyści i stabilność regionalną."
 SOV_befriend_france: "Przyjaźń z Francją"
 SOV_befriend_france_desc: "Zacieśnienie więzi z Francją jest niezbędne do realizacji naszych globalnych ambicji. Bliska współpraca będzie sprzyjać pokojowi i współpracy na arenie międzynarodowej."
 SOV_mutual_def_poland: "Współpraca z Polską"
 SOV_mutual_def_poland_desc: "Polska jest cennym partnerem handlowym. Zacieśnienie współpracy gospodarczej i dyplomatycznej wzmocni nasze wpływy regionalne i wzajemny dobrobyt."
 SOV_befriend_germany: "Przyjaźń z Niemcami"
 SOV_befriend_germany_desc: "Potęga gospodarcza Niemiec czyni je dla nas kluczowym partnerem. Rozwijanie silnych relacji przyniesie liczne korzyści i wzmocni naszą pozycję w Europie i poza nią."
 SOV_peugeout: "Peugeota"
 SOV_peugeout_desc: "Peugeot jest jednym z wiodących producentów samochodów we Francji i kluczową częścią PSA Peugeot Citroën, drugiej co do wielkości firmy samochodowej w Europie (stan na 2007 r.). Partnerstwo z tą firmą stwarza ogromne możliwości współpracy przemysłowej."
 SOV_volkswagen: "Volkswagena"
 SOV_volkswagen_desc: "Volkswagen to kultowy niemiecki producent samochodów. Każdy Rosjanin zasługuje na dostęp do wysokiej jakości pojazdów, takich jak te, które symbolizują nowoczesność i niezawodność."
 SOV_us_brotherhood: "Przyjaźń rosyjsko-amerykańska"
 SOV_us_brotherhood_desc: "Musimy odłożyć na bok animozje z czasów zimnej wojny i zbudować nowe, obiecujące relacje ze Stanami Zjednoczonymi. Razem możemy stworzyć bezpieczniejszy i bardziej dostatni świat dla wszystkich."
 SOV_us_russia_defence_pact: "Traktat obronny USA-Rosja"
 SOV_us_russia_defence_pact_desc: "Podpisując ten traktat, zakończymy dekady rywalizacji między USA a Rosją. Ten historyczny pakt utoruje drogę do trwałego pokoju i globalnego bezpieczeństwa."
 SOV_ger_nuclear_deal: "Porozumienie nuklearne z Zachodem"
 SOV_ger_nuclear_deal_desc: "Nadszedł czas na podpisanie nowego Traktatu o Broni Strategicznej. Umowa ta zmniejszy napięcia nuklearne i otworzy nowy rozdział w naszych relacjach z mocarstwami zachodnimi."
 russia.77.t: "Inwestycje z Rosji"
 russia.77.d: "Rosja oferuje inwestycje wspierające naszą gospodarkę. Przyjęcie tej propozycji przyniesie ogromne korzyści naszemu narodowi, wzmocni fundamenty naszej gospodarki i otworzy nowe możliwości rozwoju."
 russia.77.o1: "Świetnie, jesteśmy za!"
 russia.77.o2: "Nie, jesteśmy w stanie się rozwijać"
 russia.78.t: "Nasza oferta została przyjęta"
 russia.78.d: "Zaakceptowali naszą propozycję, co stanowi pozytywny krok naprzód we współpracy i wzajemnym rozwoju."
 russia.78.o1: "URAAAA!"
 russia.79.t: "Nasza oferta została odrzucona"
 russia.79.d: "Niestety, nasza oferta została odrzucona, co oznacza, że ​​będziemy musieli rozważyć ponowne rozważenie naszego podejścia i poszukać innych możliwości."
 russia.79.o1: "Niestety"
 russia.83.t: "Propozycja rozwiązania naszego starego konfliktu z Gruzją"
 russia.83.d: "Rosja zaproponowała podpisanie porozumienia mającego na celu złagodzenie napięć i deeskalację długotrwałego konfliktu w regionie. Oferta ta stwarza szansę na poprawę stabilności i uniknięcie dalszych działań wojennych. Chociaż Rosja sugeruje, że oczekuje naszej akceptacji, musimy dokładnie rozważyć, czy to porozumienie rzeczywiście chroni naszą suwerenność i interesy."
 russia.83.o1: "Zgadzamy się"
 russia.83.o2: "Nie, wywalczyliśmy niepodległość i będziemy jej bronić!"
 russia.80.t: "Inwestycje w naszą branżę energetyczną"
 russia.80.d: "Rosja oferuje inwestycje w rozwój naszego sektora energetycznego, spodziewając się w zamian większych wpływów. Przyjęcie tej umowy wzmocniłoby naszą infrastrukturę energetyczną i pogłębiło więzi gospodarcze z Rosją. Musimy jednak rozważyć korzyści w kontekście potencjalnej utraty części kontroli nad tym kluczowym sektorem."
 russia.80.o1: "Oczywiście azerbejdżańska ropa musi kwitnąć!"
 russia.80.o2: "Rosja? co?"
 russia.81.t: "Nasza oferta została przyjęta"
 russia.81.d: "Zaakceptowali naszą propozycję, co oznacza pozytywny rozwój naszych relacji. Ta akceptacja otwiera nowe możliwości współpracy i wzajemnych korzyści w najbliższej przyszłości."
 russia.81.o1: "URAAAA!"
 russia.84.t: "Rosja wyraża nam swoje wsparcie"
 russia.84.d: "Władze Rosji publicznie zadeklarowały poparcie dla naszego rządu i wyraziły chęć zacieśnienia stosunków dyplomatycznych i przyjacielskich. To poparcie może utorować drogę do zacieśnienia współpracy i stabilności regionalnej."
 russia.84.o1: "Au!"
 russia.85.t: "Pojawienie się starego szacha Iranu"
 russia.85.d: "Pojawiły się doniesienia, że ​​były szach Iranu, który wciąż żywi ambicje odzyskania władzy, powrócił na scenę. Jego powrót może znacząco wpłynąć na sytuację polityczną Iranu i dynamikę regionalną, co skłania nas do ponownej oceny naszych strategii w tym regionie."
 russia.85.o1: "Ciekawy"
 russia.86.t: "Pakt o wzajemnej obronie USA-Rosja"
 russia.86.d: "Po okresie pojednania mamy teraz okazję podpisać z Rosją pakt o wzajemnej obronie, mający na celu zapewnienie trwałego pokoju między naszymi narodami. Pakt ten byłby symbolem wielkiego kroku naprzód we współpracy międzynarodowej i stabilności."
 russia.86.o1: "To najlepsza decyzja, jaką możemy podjąć"
 russia.86.o2: "Na świecie może być tylko jedno supermocarstwo i jesteśmy nim my!"
 russia.89.t: "Porozumienie nuklearne"
 russia.89.d: "Rosja proponuje zawarcie traktatu skoncentrowanego na strategicznym bezpieczeństwie jądrowym. Takie porozumienie wzmocniłoby nasze wspólne stanowisko w sprawie nierozprzestrzeniania broni jądrowej i zmniejszyłoby ryzyko konfliktu nuklearnego w regionie i poza nim."
 russia.89.o1: "Zgadzamy się"
 russia.89.o2: "Nie, nie tego chcemy"
 russia.90.t: "Porozumienie nuklearne"
 russia.90.d: "[FROM.GetNameWithFlag] formalnie zgodził się na umowę nuklearną. To ważny krok w naszych staraniach o zapewnienie bezpieczeństwa regionalnego i promowanie pokoju."
 russia.90.o1: "Dobrze"
 russia.91.t: "Propozycja odrzucona"
 russia.91.d: "Druga strona odrzuciła naszą propozycję. Działania dyplomatyczne nie doprowadziły do ​​porozumienia i musimy rozważyć alternatywne rozwiązania."
 russia.91.o1: "Niech tak będzie"
 russia.92.t: "Polsko-Rosyjski Pakt o wzajemnej obronie"
 russia.92.d: "Rosja zaproponowała podpisanie Paktu o Wzajemnej Obrony z Polską, co sygnalizuje potencjalne ocieplenie stosunków. Choć niektórzy urzędnicy państwowi zachowują ostrożność, obawiając się dominacji Rosji w Europie Wschodniej, umowa ta może zapoczątkować nową erę współpracy i bezpieczeństwa dla naszego kraju."
 russia.92.o1: "Czas wybaczyć Rosji"
 russia.92.o2: "Rosja to nadal Rosja. Odrzućcie pakt!"
 russia.93.t: "Polska Zgoda!"
 russia.93.d: "Rząd polski oficjalnie zgodził się na podpisanie Paktu o Wzajemnej Obrony z Rosją. Umowa ta odzwierciedla wolę przezwyciężenia dawnych różnic i współpracy na rzecz wzajemnego bezpieczeństwa."
 russia.93.o1: "Bracia Słowianie atakują ponownie!"
 russia.94.t: "Polska odmówiła!"
 russia.94.d: "Polski rząd odmówił podpisania Paktu o Wzajemnej Obrony, utrzymując ostrożne stanowisko wobec Rosji. Choć decyzja ta jest rozczarowująca, odzwierciedla ona utrzymujące się obawy dotyczące regionalnej dynamiki sił."
 russia.94.o1: "Ich wybór"
 russia.95.t: "Baza Marynarki Wojennej Rosji"
 russia.95.d: "Rosja zaproponowała budowę bazy morskiej w naszych granicach. Taka baza wzmocniłaby nasze partnerstwo strategiczne i podniosłaby bezpieczeństwo regionalne, ale może również budzić obawy o suwerenność i wpływy wojskowe."
 russia.95.o1: "Buduj tyle, ile chcesz!"
 russia.95.o2: "Rosja to nadal Rosja. Odrzuć ofertę!"
 russia.96.t: "Gruzja Dozwolona!"
 russia.96.d: "Gruzja wyraziła zgodę na utworzenie rosyjskiej bazy morskiej na swoim terytorium. Ten krok może poprawić stosunki dwustronne i zacieśnić współpracę w zakresie bezpieczeństwa w regionie."
 russia.96.o1: "Spasibo, bracia!"
 russia.97.t: "Gruzja odmówiła!"
 russia.97.d: "Gruzja odrzuciła naszą prośbę o budowę rosyjskiej bazy morskiej. Ta odmowa odzwierciedla utrzymujące się napięcia i rozbieżne priorytety strategiczne, które będą wymagały ostrożnej dyplomacji, aby je rozwiązać."
 russia.97.o1: "Ich wybór"
 SOV_a_just_russia: "Sprawiedliwa Rosja"
 SOV_a_just_russia_desc: "Just Russia powstała w latach 2006-2007 w wyniku fuzji kilku lewicowych partii politycznych. Początkowo wielu uważało, że jest to projekt kontrolowany przez administrację prezydencką, mający na celu symulację rywalizacji politycznej. Jednak te założenia okazały się błędne, gdy Just Russia zdobyła znaczną większość w wyborach, zaskakując wielu i zmieniając krajobraz polityczny. Wzrost poparcia dla partii odzwierciedla autentyczne poparcie społeczne i dążenie do sprawiedliwości społecznej."
 SOV_direction: "Kierunek Partii"
 SOV_direction_desc: "Po dojściu do władzy kwestia kierunku, w jakim podąża nasza partia, stała się paląca. Choć podzielamy wiele fundamentalnych wartości, wyłoniły się dwie główne frakcje: zwolennicy liberalnego ruchu „Białych Pasków” oraz orędownicy socjalpatriotyzmu. Te odmienne wizje będą przedmiotem debaty na zbliżającym się zjeździe partii, który ostatecznie zadecyduje o naszej dalszej drodze. Decyzja ta ukształtuje politykę i priorytety naszej partii w przyszłości."
 SOV_white_stripe_movement_preveil: "Ruch Białego Paska zwycięża"
 SOV_white_stripe_movement_preveil_desc: "Zjazd partii zdecydował się poprzeć program ruchu White-Stripe, koncentrując się na głębszej demokratyzacji i zacieśnianiu więzi z Zachodem. Ta ścieżka zbliża partię do socjaldemokracji w stylu europejskim i zakłada reformy mające na celu zwiększenie swobód politycznych i modernizację. Decyzja ta jest wyrazem zaangażowania na rzecz otwartości, przejrzystości i współpracy z państwami demokratycznymi."
 SOV_russian_democracy: "Rosyjska Socjaldemokracja"
 SOV_russian_democracy_desc: "Dążenie do sprawiedliwości i reform społecznych od dawna stanowi fundamentalną pasję narodu rosyjskiego. W całej historii Rosjanie skłaniali się ku ideom równości, wolności i sprawiedliwości społecznej. Tendencja ta utrzymała się po upadku Związku Radzieckiego, gdy obywatele jednoczyli się wokół ruchów obiecujących znaczące reformy. Teraz, gdy jesteśmy u władzy, mamy obowiązek spełnić te nadzieje i przełożyć je na rzeczywisty postęp społeczny i demokrację."
 SOV_democratisation: "Zmniejszenie zależności od Centrum Federalnego"
 SOV_democratisation_desc: "Reformatorzy społeczni konsekwentnie opowiadają się za federalizmem i decentralizacją jako kluczem do sprawiedliwej i funkcjonalnej Rosji. Aby osiągnąć zrównoważony rozwój w całym kraju, konieczne jest zmniejszenie zależności regionów od federalnego centrum. Zapewniając samorządom większą autonomię i zasoby, będziemy promować równość i bardziej elastyczne zarządzanie we wszystkich regionach."
 SOV_real_welfare: "Prawdziwa opieka społeczna"
 SOV_real_welfare_desc: "Reforma systemu opieki społecznej jest priorytetem naszego rządu. Zbyt długo zwykli ludzie cierpieli z powodu nieudanych reform rynkowych i niewystarczających programów ubezpieczeń społecznych. Jesteśmy zaangażowani w gruntowną reformę systemu zabezpieczenia społecznego, aby lepiej chronić obywateli znajdujących się w trudnej sytuacji i poprawić ich jakość życia. Naszym celem jest system, który rzeczywiście zaspokaja potrzeby wielu, a nie tylko uprzywilejowanych."
 SOV_empower_legislature: "Dziedzic rosyjskiego Zgromadzenia Konstytucyjnego"
 SOV_empower_legislature_desc: "Rosyjskie Zgromadzenie Konstytucyjne było pierwszym prawdziwie reprezentatywnym organem, który miał kształtować przyszłość kraju. Choć zostało zlikwidowane przez bolszewików, jego dziedzictwo zainspirowało powstanie Dumy Państwowej jako parlamentu ludowego. Niestety, Duma od tego czasu straciła wiele ze swojej wiarygodności i wpływów. Nadszedł czas, aby przywrócić zaufanie do tej instytucji, przyznając jej realne uprawnienia i zapewniając autentyczną reprezentację społeczną."
 SOV_defend_people: "Brońmy naszych ludzi"
 SOV_defend_people_desc: "Boli nas widok samotnych matek, które z trudem finansują leki dla swoich dzieci, lub wielodzietnych rodzin obciążonych wysoko oprocentowanymi kredytami na małe mieszkania. Bieda szerzy się w naszych regionach, podczas gdy banki i korporacje stają się coraz bogatsze. Aby zwalczyć tę niesprawiedliwość, musimy zbudować system świadczeń socjalnych i gwarancji, które uchronią naszych obywateli przed nędzą. Każdy człowiek zasługuje na godność i ochronę."
 SOV_social_gurantees: "Gwarancje społeczne i opieka zdrowotna"
 SOV_social_gurantees_desc: "Rosyjski system zabezpieczenia społecznego stoi przed dwoma poważnymi wyzwaniami: systemem emerytalnym i słabnącą siecią opieki zdrowotnej. Wielu starszych obywateli nie stać na niezbędne leki, a szpitale często nie zapewniają odpowiedniej opieki. Zwiększymy finansowanie i dotacje, aby zapewnić emerytom godziwy standard życia, a usługi opieki zdrowotnej będą dostępne i niezawodne dla wszystkich obywateli."
 SOV_a_just_system: "Sprawiedliwy system"
 SOV_a_just_system_desc: "Naszą wizją jest społeczeństwo, w którym liczy się każda jednostka, w którym przestrzegane są podstawowe prawa człowieka, a udział w życiu politycznym jest wspierany. Dążymy do systemu, który zapewnia uczciwe wybory i decyzje podejmowane w interesie wszystkich obywateli. To jest sprawiedliwy system, jaki wyobrażali sobie rewolucjoniści przeszłości – społeczeństwo zbudowane na równości, wolności i prawdziwej demokracji."
 SOV_a_just_economy: "Sprawiedliwa gospodarka"
 SOV_a_just_economy_desc: "Naszą największą ambicją jest nie tylko prosperująca gospodarka, ale i dobrobyt narodu. Każdy powinien mieć bezpieczeństwo finansowe i ochronę socjalną; nikt nie powinien zostać pominięty. Aby zbudować takie społeczeństwo, bogactwo musi być sprawiedliwie dystrybuowane, z wyższymi podatkami od nadmiernych zysków i ulgami dla mniej zamożnych. Takie podejście będzie sprzyjać równości i sprawiedliwości społecznej, kładąc podwaliny pod silniejszy, bardziej zjednoczony kraj."
 SOV_question_of_direction: "Pytanie o kierunek"
 SOV_question_of_direction_desc: "Kwestia przyszłego kierunku rozwoju naszej partii staje się coraz bardziej paląca. Niektórzy twierdzą, że nasze reformy społeczne nie posunęły się wystarczająco daleko, dążąc do radykalnych zmian, które całkowicie odmienią porządek społeczny. Inni uważają, że powinniśmy naśladować udane europejskie partie socjaldemokratyczne i dążyć do stopniowych, pragmatycznych reform. Wybór, przed którym stoimy, zdefiniuje naszą tożsamość i wpłynie na przyszłą drogę narodu."
 SOV_revive_spirit_of_socialist_revolutionaries: "Ożyw ducha eserowców"
 SOV_revive_spirit_of_socialist_revolutionaries_desc: "Socjaliści-rewolucjoniści dążyli do radykalnej transformacji społeczeństwa rosyjskiego poprzez socjalizm agrarny, wierząc, że chłopi byli siłą napędową rewolucji. Chociaż Sprawiedliwa Rosja nie rości sobie prawa do bezpośredniej sukcesji, nasze reformy zapoczątkowały pokojową, ale głęboką transformację społeczną, odzwierciedlając ducha tych historycznych rewolucjonistów. Choć ich idee mają wieki, pozostają aktualne do dziś, inspirując nas do rozważenia oficjalnego odrodzenia Partii Socjalistów-Rewolucjonistów."
 SOV_land_socialisation: "Socjalizacja ziemi"
 SOV_land_socialisation_desc: "Centralnym założeniem programu socjalistyczno-rewolucyjnego było uspołecznienie ziemi, co oznaczało, że ziemia będzie należeć zbiorowo do wszystkich Rosjan. Koncepcja ta w praktyce oznacza przekazanie własności ziemi państwu, ale sprawiedliwe zarządzanie nią dla dobra ludu. Jako przedstawiciele ludu, zobowiązujemy się do sprawiedliwego użytkowania tej ziemi, aby zmaksymalizować dobrobyt społeczny i wydajność rolnictwa."
 SOV_social_democracy_sr: "Socjaldemokracja wciąż w modzie"
 SOV_social_democracy_sr_desc: "Socjaldemokracja pozostaje jedną z najskuteczniejszych idei politycznych, jakie zrodziły się w Europie. Historia pokazuje liczne przykłady, w których polityka socjaldemokratyczna poprawiała życie obywateli, jednocześnie utrzymując prężność gospodarczą. Przyjmując te zasady, możemy wdrażać skuteczne reformy, które promują sprawiedliwość społeczną i dobrobyt wszystkich Rosjan."
 SOV_third_way: "Trzeci sposób"
 SOV_third_way_desc: "Demokratyczne rządy wymagają ciągłych negocjacji i równowagi. Wiele krajów socjaldemokratycznych odeszło od tradycyjnej polityki lewicowej w kierunku podejścia zorientowanego na rynek, ale społecznie odpowiedzialnego, znanego jako „Trzecia Droga”. Filozofia ta łączy praktyki wolnorynkowe z celami dobrobytu społecznego, tworząc zrównoważony system dostosowany do naszych obecnych potrzeb. Przyjęcie Trzeciej Drogi pomoże nam zbudować nowoczesną, wydajną i sprawiedliwą gospodarkę."
 SOV_centre_holds: "Centrum pozostało mocne"
 SOV_centre_holds_desc: "Na zjeździe zwyciężył program Rady Centralnej, który zakładał patriotyczny program skoncentrowany na wzmocnieniu suwerenności Rosji, władzy centralnej i jedności narodowej. Program ten ma na celu przekształcenie Rosji z rozdrobnionego, walczącego o przetrwanie państwa w silne supermocarstwo zdolne do obrony swoich granic i ochrony zróżnicowanych narodów. Odzwierciedla on zaangażowanie na rzecz stabilności, siły i dumy narodowej."
 SOV_russian_patriotism: "Rosyjski patriotyzm społeczny"
 SOV_russian_patriotism_desc: "Nasza ideologia koncentruje się na socjalpatriocie, który kładzie nacisk na budowę silnego, suwerennego państwa socjalnego. Państwo to musi bronić interesów swoich obywateli, zarówno na arenie międzynarodowej, jak i wewnętrznej. Obowiązkiem rządu jest zapewnienie warunków gwarantujących wysoki standard życia, a obywatele z kolei są zobowiązani do lojalności wobec ojczyzny poprzez przestrzeganie prawa, wypełnianie obowiązku służby wojskowej i podtrzymywanie tradycji narodowych. Ta równowaga między prawami a obowiązkami leży u podstaw naszej wizji prosperującej Rosji."
 SOV_empower_nation: "Wzmocnić pozycję narodu rosyjskiego"
 SOV_empower_nation_desc: "Definiujemy naród rosyjski nie tylko ze względu na pochodzenie etniczne, ale jako wszystkie narody zamieszkujące rozległe terytoria Rosji. Dotyczy to regionu Wołgi, Syberii i Kaukazu, których mieszkańcy podzielają rosyjski język, kulturę i wartości. Ten wielonarodowy naród rosyjski powinien być traktowany priorytetowo przez państwo, reprezentując jego zbiorowe interesy. Cudzoziemcy nie powinni domagać się specjalnych przywilejów – Rosja należy wyłącznie do swojego różnorodnego narodu rosyjskiego, zjednoczonego i silnego."
 SOV_talks_with_rodina: "Rozmowy z Rodiną"
 SOV_talks_with_rodina_desc: "Nasze relacje z frakcją Rodina są głębokie, ponieważ na początku XXI wieku stanowiliśmy jedną partię. Wewnętrzne konflikty podzieliły ruch, co doprowadziło do powstania Sprawiedliwej Rosji z niektórych byłych członków Rodiny. Teraz, gdy różnice polityczne uległy złagodzeniu, a programy są ściśle dopasowane, logiczne jest ponowne nawiązanie stosunków i praca na rzecz zjednoczenia. Taka jedność zwiększy naszą zdolność do skutecznego wdrażania wspólnych polityk."
 SOV_form_national_patriotic_front: "Utworzenie Narodowego Frontu Patriotycznego"
 SOV_form_national_patriotic_front_desc: "Choć Rosjanie są silni indywidualnie, jesteśmy bezbronni, gdy jesteśmy podzieleni. Zjednoczeni możemy jednak pokonać każde wyzwanie i odmienić przyszłość naszego narodu. Aby osiągnąć siłę polityczną i dominację, musimy utworzyć szeroką koalicję partii podzielających patriotyczne i socjalistyczne wartości. Tylko jednocząc się, możemy zbudować prosperującą, niepodległą Rosję, zdolną do silnej pozycji na arenie międzynarodowej."
 SOV_social_platform: "Nadaj priorytet platformie społecznościowej"
 SOV_social_platform_desc: "Wysoki standard życia jest niezbędny dla rozwoju naszego państwa. Kiedy obywatele czują się bezpiecznie i z nadzieją patrzą w przyszłość, naród prosperuje. Nasz rząd będzie stawiać politykę społeczną na pierwszym miejscu, zapewniając obywatelom wsparcie i zasoby niezbędne do dobrobytu. Inwestowanie w programy socjalne to inwestowanie w stabilność i rozwój Rosji."
 SOV_do_not_forget_about_people: "Nie zapomnij o ludziach!"
 SOV_do_not_forget_about_people_desc: "Ludzie są prawdziwym źródłem siły w naszym kraju i zawsze musimy pamiętać o ich potrzebach. Szczęśliwy, dostatni naród może osiągnąć wielkie sukcesy, podczas gdy biedna i zaniedbana populacja narażona jest na załamanie i niepokoje społeczne. Nasza polityka musi priorytetowo traktować poprawę życia wszystkich obywateli, aby zapewnić przyszłość Rosji."
 SOV_more_regulations: "Nacjonalizacja korporacji"
 SOV_more_regulations_desc: "Zbyt długo kapitaliści wyzyskiwali zarówno nasz naród, jak i nasze państwo, gromadząc bogactwo bez wkładu w rozwój społeczeństwa. Liberalne prawo umożliwiło niekontrolowany rozrost kapitalizmu, a zyski płynęły tylko do nielicznych. Aby to zmienić, znacjonalizujemy główne gałęzie przemysłu i powołamy korporacje państwowe, które będą kontrolować kierunek rynku. To pozwoli nam wykorzystać siłę ekonomiczną z korzyścią dla wszystkich obywateli."
 SOV_economical_platform: "Priorytetyzacja platformy gospodarczej"
 SOV_economical_platform_desc: "Aby nasz naród mógł prosperować, a Rosja rozkwitać, niezbędna jest silna gospodarka. Żadna cywilizacja nie może prosperować bez siły gospodarczej i wzrostu. Skoncentrujemy nasze wysiłki na odbudowie siły gospodarczej kraju, priorytetowo traktując program gospodarczy Frontu Narodowo-Patriotycznego. Przywrócenie potęgi gospodarczej Rosji jest fundamentem trwałego dobrobytu."
 SOV_invest_in_beneficial_sectors: "Inwestuj w korzystne sektory"
 SOV_invest_in_beneficial_sectors_desc: "Odbudowa potencjału produkcyjnego kraju wymaga znacznych inwestycji kapitałowych. Dlatego musimy skierować środki do kluczowych sektorów gospodarki, które obiecują stabilne, długoterminowe zyski. Koncentrując się na branżach, które będą napędzać przyszły wzrost gospodarczy, wzmocnimy PKB Rosji i zapewnimy naszemu narodowi stabilną przyszłość gospodarczą."
 SOV_rapid_militarisation: "Szybka militaryzacja"
 SOV_rapid_militarisation_desc: "Silne, suwerenne państwo wymaga potężnej armii. Przyspieszymy militaryzację poprzez integrację szkolenia wojskowego ze szkołami i organizację obowiązkowych cywilnych działań wojskowych. Wydatki na obronność wzrosną, aby zapewnić armii możliwość odparcia każdej inwazji. Państwo i naród rosyjski muszą być przygotowane i zjednoczone, aby bronić swojej ojczyzny przed wszelkimi zagrożeniami."
 SOV_under_a_leader: "Pod silnym przywódcą"
 SOV_under_a_leader_desc: "Rosyjska państwowość historycznie koncentrowała się wokół silnych przywódców – postaci takie jak Iwan Groźny, Aleksander III i Józef Stalin cieszyły się głębokim szacunkiem i ukształtowały losy narodu. Dziś zarówno naród, jak i państwo potrzebują równie silnego przywódcy, który zjednoczy ich wokół wielkiej misji narodowej. Jesteśmy gotowi zapewnić takie przywództwo, aby poprowadzić Rosję ku nowym szczytom."
 SOV_talks_with_left_patriots: "Rozmowy z lewicowymi patriotami"
 SOV_talks_with_left_patriots_desc: "Partia Patrioci Rosji Giennadija Siemigina cieszy się znacznym poparciem społecznym i zasobami finansowymi, propagując lewicowy patriotyzm podobny do naszego. Uznając naturalnego sojusznika, rozpoczniemy negocjacje w sprawie włączenia Patriotów Rosji do Narodowego Frontu Patriotycznego. Ich włączenie wzmocni naszą koalicję i zapewni im reprezentację w rządzie."
 SOV_unite_patriotic_parties: "Zjednoczmy Partie Patriotyczne"
 SOV_unite_patriotic_parties_desc: "Rozpad partii Rodina doprowadził do powstania wielu małych ugrupowań, które podzielały patriotyczne ideały, ale same w sobie nie miały wpływu. Choć indywidualnie słabe, doświadczenie polityczne ich liderów może być nieocenione, gdy zjednoczą się wokół wspólnej sprawy. Włączymy te ugrupowania do Narodowego Frontu Patriotycznego, oferując im role rządowe w celu konsolidacji sił patriotycznych i wzmocnienia ich wpływu."
 SOV_a_just_russia_prevails: "Sprawiedliwa Rosja zwycięża"
 SOV_a_just_russia_prevails_desc: "W ramach Frontu Narodowo-Patriotycznego Sprawiedliwa Rosja niezmiennie utrzymuje dominującą pozycję. Tylko Sprawiedliwa Rosja posiada jedność, wizję i siłę potrzebną do utrzymania spójności koalicji i poprowadzenia Rosji ku prawdziwej wielkości. Nasze przywództwo zapewni, że Front pozostanie niezłomny i skupiony na budowaniu silnego i sprawiedliwego narodu."
 SOV_rodina_prevails: "Rodina zwycięża"
 SOV_rodina_prevails_desc: "Rodina odbudowała swoją pozycję polityczną i odzyskała zaufanie wyborców w koalicji, umacniając swoją pozycję na tyle, by móc ubiegać się o przywództwo w Narodowo-Patriotycznym Froncie. To początek nowej ery, w której Rodina poprowadzi Front i Rosję ku jaśniejszej i bardziej dostatniej przyszłości. Jedność koalicji nigdy nie była silniejsza."
 SOV_rodina_tt: "Rodina obejmie przywództwo w NPF"
 SOV_blr_democracy_tt: "Zainstaluje demokrację na Białorusi"
 SOV_under_a_banner: "Pod Wielkim Sztandarem"
 SOV_under_a_banner_desc: "Flagi Imperium Rosyjskiego, Związku Radzieckiego i współczesnego rosyjskiego sztandaru trójkolorowego to potężne symbole historii naszego narodu. Pod tymi sztandarami Rosja osiągnęła wielkie sukcesy w kulturze, gospodarce, nauce i polityce zagranicznej. Nasi przodkowie ponieśli bohaterskie ofiary pod tymi sztandarami – od wojny krymskiej po Wielką Wojnę Ojczyźnianą. Teraz, pod rosyjskim sztandarem trójkolorowym, będziemy dążyć do osiągnięcia jeszcze większych osiągnięć i chwały narodowej."
 SOV_empower_executive: "Wzmocnij Prezydenta"
 SOV_empower_executive_desc: "Od dawna twierdzimy, że urząd prezydenta Rosji jest ograniczony nadmiernymi ograniczeniami, które uniemożliwiają skuteczne rządzenie. Aby w pełni wdrożyć politykę socjalpatriotyzmu, te niepotrzebne ograniczenia muszą zostać zniesione. Wzmocnienie pozycji prezydenta poprzez rozszerzenie uprawnień jest niezbędne dla zdecydowanego przywództwa i postępu narodu."
 SOV_united_country: "Zjednoczona Ojczyzna"
 SOV_united_country_desc: "Osiągnięcie naszych celów narodowych wymaga jedności narodu rosyjskiego. Tylko dzięki solidarności Rosja może osiągnąć wielkość i trwały dobrobyt. Obywatele muszą zjednoczyć się wokół wspólnej ideologii, szanowanego przywódcy i silnego państwa. Dopóki naród rosyjski będzie zjednoczony, żadna siła nie złamie naszego narodu."
 russia.87.t: "Nasza oferta została przyjęta"
 russia.87.d: "Stany Zjednoczone zgodziły się podpisać traktat o wzajemnej obronie, co stanowi ważny krok w kierunku zacieśnienia współpracy wojskowej między naszymi państwami. Umowa ta obiecuje wzmocnić nasze wzajemne bezpieczeństwo i pogłębić zaufanie na arenie międzynarodowej."
 russia.87.o1: "Doskonale！"
 SOV_investments_in_ben: "Inwestycje w sektorach korzystnych"
 russia.88.t: "Nasza oferta została odrzucona"
 russia.88.d: "Niestety, nasza propozycja została odrzucona. Choć to rozczarowujące, będziemy nadal szukać innych partnerów i możliwości, aby rozwijać nasze interesy i umacniać naszą pozycję."
 russia.88.o1: "Staraliśmy się jak mogliśmy."
 russia.82.t: "Nasza oferta została odrzucona"
 russia.82.d: "Niestety, nasza oferta została odrzucona. Ta porażka oznacza, że ​​musimy zrewidować nasze strategie i rozważyć alternatywne podejścia, aby realizować nasze interesy."
 russia.82.o1: "Warto spróbować"
 russia.98.t: "Sprawy Partii"
 russia.98.d: "Wraz z inauguracją Aleksieja Nawalnego, różnice między jego polityką a polityką partii Jabłoko stały się coraz bardziej widoczne. Chociaż Nawalny i Jabłoko podzielają podobne programy, w kierownictwie partii wciąż trwają spory. Plotki sugerują, że Nawalny może odejść, aby założyć własną organizację, co rodzi pytania o przyszłą jedność i kierunek partii."
 russia.98.o1: "Prezydent Nawalny zostanie w Jabłoku!"
 russia.98.o2: "Prezydent Nawalny stworzy własną partię!"
 russia.99.t: "Partia Nawalnego"
 russia.99.d: "Po rezygnacji Nawalnego z Jabłoka, jego bliscy sojusznicy i członkowie rządu zwołali nadzwyczajny zjazd w celu utworzenia nowej partii. Zjazd jednogłośnie przyjął program partii, ale wybuchła zacięta debata na temat nazwy i symboliki partii. Zaproponowano kilka opcji, a dyskusję zdominowało trzech głównych kandydatów. Która z nich zostanie wybrana do reprezentowania tego nowego ruchu?"
 russia.99.o1: "§YSojusz Ludowy§!"
 russia.99.o2: "§YPartia Postępu§!"
 russia.99.o3: "§YRosja przyszłości§!"
 russia.100.t: "Spór partyjny"
 russia.100.d: "Po inauguracji prezydenta Nawalnego i kierownictwa Jabłoka doszło do poważnych rozbieżności. Partia oskarża Nawalnego o poglądy nacjonalistyczne, sprzeczne z jej programem. Chociaż Nawalny publicznie milczy, krążą spekulacje na temat jego ewentualnego odejścia i utworzenia nowej partii pod szyldem „NAROD”. Jednak pewne sygnały wskazują, że dąży on do kompromisu, aby uniknąć rozłamu. Wynik pozostaje niepewny."
 russia.100.o1: "Kompromis zostanie znaleziony."
 russia.100.o2: "Powstanie nowa Partia Narodowo-Demokratyczna!"
 russia.101.t: "Rebranding?"
 russia.101.d: "Nasza partia stoi przed dylematem dotyczącym swojej tożsamości w miarę postępu demokratyzacji. Wielu weteranów chce zachować historyczną nazwę partii jako symbol dziedzictwa, podczas gdy inni opowiadają się za usunięciem słowa „komunista” z tytułu, aby odzwierciedlić bardziej nowoczesny, demokratyczny kierunek. Ta debata uwypukla napięcie między tradycją a zmianą w partii."
 russia.101.o1: "CPRF teraz! CPRF na zawsze!"
 russia.101.o2: "Już nie jesteśmy stalinistami!"
 russia.102.t: "Powrót Gorbaczowa?"
 russia.102.d: "W naszym dążeniu do politycznej reorganizacji, nieobecność Michaiła Gorbaczowa – człowieka, który zapoczątkował te reformy – jest bardzo odczuwalna. Nasuwa się pytanie: czy powinniśmy dać Gorbaczowowi drugą szansę na poprowadzenie tego procesu lub wpłynięcie na niego? Jego dziedzictwo pozostaje kontrowersyjne."
 russia.102.o1: "On jest zdrajcą!"
 russia.102.o2: "Niech żyje Gorbaczow!"
 russia.103.t: "Nasz Afrika Korps został zatrudniony"
 russia.103.d: "Jeden z naszych batalionów Korpusu Afrykańskiego został zatrudniony przez [FROM.GetNameWithFlag]. Ta współpraca wzmacnia nasze więzi i pokazuje rosnącą rolę naszych sił zbrojnych na arenie międzynarodowej. Z niecierpliwością czekamy na dalszą współpracę."
 russia.103.a: "Dobry."
 russia.104.t: "Dominacja polityczna"
 russia.104.d: "Nasz rząd stoi przed wyzwaniem rozdrobnienia systemu partyjnego, co prowadzi do chaosu w Dumie Państwowej. Żadna siła polityczna nie posiada zdecydowanej większości, co prowadzi do ciągłych walk o władzę. Na poziomie regionalnym rozdrobnienie wzmacnia lokalne elity, osłabiając kontrolę federalną. Obecnie istnieją trzy główne siły: prorządowa Partia Jedności, Blok Ojczyzna-Wszechrosja oraz reformistyczna partia Nasz Dom-Rosja. Możemy albo rozszerzyć frakcje prorządowe, tworząc koalicję zachowującą pewną demokrację, albo zjednoczyć je w jedną „Partię Władzy”, aby zapewnić większą centralizację i silniejsze rządy."
 russia.104.o1: "Trzeba stworzyć „Koalicję Prezydencką”!"
 russia.104.o2: "Zjednoczmy ich."
 russia.105.t: "Zjednoczona Rosja"
 russia.105.d: "Po długich negocjacjach powstała nowa, prorządowa partia polityczna „Jedna Rosja”. Partia ta zrzesza niemal całą elitę regionalną i lojalnych wobec nas urzędników federalnych. Dzięki temu zjednoczeniu uzyskaliśmy większość zarówno w Dumie Państwowej, jak i parlamentach regionalnych, co pozwoliło nam uchwalać kluczowe ustawy i zachować kontrolę nad polityką regionalną."
 russia.105.a: "Nowa Rosja czeka!"
 russia.106.t: "Sprawiedliwa Rosja"
 russia.106.d: "Nowa siła polityczna o nazwie „Sprawiedliwa Rosja” wyłoniła się z połączenia różnych ruchów lewicowo-patriotycznych. Jej program kładzie nacisk na dobrobyt społeczny, zwiększenie udziału państwa w gospodarce oraz ochronę suwerenności narodowej. Choć niektórzy podejrzewają, że partia powstała po to, by pozyskać wyborców antyestablishmentowych, ma ona znaczny potencjał, by stać się wpływowym aktorem w ewoluującym krajobrazie politycznym Rosji."
 russia.106.a: "Głos Ludu!"
 russia.107.t: "Nowi ludzie?"
 russia.107.d: "Powstała nowa partia polityczna o nazwie „Nowi Ludzie”, której przewodził znany biznesmen Andriej Nieczajew. Partia ta, opowiadając się za wolnością słowa, liberalną demokracją, prawami przedsiębiorców oraz cyfryzacją gospodarki i zarządzania, prezentuje nowoczesną wizję. Pozostaje pytanie, czy „Nowi Ludzie” zadomowią się na dobre w rosyjskim systemie politycznym, czy też zanikną."
 russia.107.a: "Nowi ludzie i stary system"
 SOV_the_party_TT: "Partia rządząca ulegnie zmianie!"
 SOV_the_nonparty_TT: "Pojawi się nowa partia."
 sov_just_russia.1.t: "Zjazd Partii"
 sov_just_russia.1.d: "Po imponującym zwycięstwie wyborczym, Sprawiedliwa Rosja zwołała nadzwyczajny zjazd, aby określić przyszły kierunek partii, utworzyć rząd i przeprowadzić wybory do Rady Centralnej. Delegaci debatowali nad dwiema głównymi opcjami: kontynuowaniem programu „Białych Pasków” lub przyjęciem programu Socjalpatriotyzmu promowanego przez kierownictwo partii. Zjazd zadecyduje o losie partii."
 sov_just_russia.1.o1: "Kongres poparł kierownictwo partii"
 sov_just_russia.1.o2: "Kongres poparł ruch Białego Paska"
 sov_just_russia.2.t: "Rozmowy z Frakcją Rodina"
 sov_just_russia.2.d: "Po długich negocjacjach między liderami Sprawiedliwej Rosji i Rodiny osiągnięto porozumienie: Rodina będzie wspierać obecny rząd Sprawiedliwej Rosji, który z kolei obiecuje konsultować się z Rodiną w sprawie wszystkich ważnych decyzji rządowych. Obie partie zgodziły się również na utworzenie szerokiej koalicji organizacji i partii patriotycznych."
 sov_just_russia.2.o1: "Nasza Rodina"
 sov_just_russia.3.t: "Narodowy Front Patriotyczny"
 sov_just_russia.3.d: "Dzisiaj, po długim procesie formacyjnym, liderzy Rodiny i Sprawiedliwej Rosji, wraz z szefami związków zawodowych i organizacji społecznych, ogłosili powstanie Narodowo-Patriotycznego Frontu – szerokiej koalicji społecznej. Jej główną ideologią jest socjalpatriotyzm, sformułowany przez Siergieja Mironowa, dążący do socjalistycznych i patriotycznych reform w celu transformacji kraju. Zgodnie z umową koalicyjną, partie członkowskie mogą uczestniczyć w dyskusjach na temat spraw państwowych, a duże organizacje mogą ubiegać się o miejsca w rządzie. Rodina będzie piastować stanowisko w rządzie oraz kilka stanowisk ministerialnych jako współprzewodniczący."
 sov_just_russia.3.o1: "Razem naprzód – ku przyszłości!"
 SOV_democracy_in_kaz: "Rosyjska demokracja w [KAZ.GetNameWithFlag]"
 SOV_democracy_in_kaz_desc: "Wykorzystamy element zaskoczenia, aby pomyślnie uruchomić operację w [KAZ.GetNameWithFlag]. Czas jest jednak ograniczony, dlatego szybkie i zdecydowane działanie jest kluczowe dla jej sukcesu."
 SOV_democracy_in_kyr: "Rosyjska demokracja w [KYR.GetNameWithFlag]"
 SOV_democracy_in_kyr_desc: "Stosując taktykę zaskoczenia, planujemy szybko uderzyć w [KYR.GetNameWithFlag]. Okno na rozpoczęcie operacji jest wąskie, więc szybkość jest kluczowa."
 SOV_democracy_in_taj: "Rosyjska demokracja w [TAJ.GetNameWithFlag]"
 SOV_democracy_in_taj_desc: "Wykorzystamy element zaskoczenia, aby przeprowadzić skuteczną operację w [TAJ.GetNameWithFlag]. Szybkie działanie jest kluczowe dla osiągnięcia naszych celów."
 SOV_democracy_in_trk: "Rosyjska demokracja w [TRK.GetNameWithFlag]"
 SOV_democracy_in_trk_desc: "Nasza strategia zakłada niespodziewany atak na [TRK.GetNameWithFlag]. Operacja musi rozpocząć się szybko, aby zapewnić sukces."
 SOV_democracy_in_uzb: "Rosyjska demokracja w [UZB.GetNameWithFlag]"
 SOV_democracy_in_uzb_desc: "Zastosujemy niespodziankę, aby rozpocząć udaną operację w [UZB.GetNameWithFlag], ale musimy działać szybko, zanim szansa się zamknie."
 SOV_i_blin_idea: "Krajowe procesory"
 rosgvardia_wagner: "Jewgienij Prigozhin zginął"
 SOV_wagner_rosguard_idea: "PMC Wagner w ramach Rosgwardii"
 SOV_rosguard_wagner: "Przyjąć PMC Wagnera do Rosgwardii"
 SOV_rosguard_wagner_desc: "Po śmierci Jewgienija Prigożyna jego PMC zaczęły się rozpadać: niektóre pozostały na Białorusi, wiele odeszło, ale inne są gotowe poddać się naszemu bezpośredniemu dowództwu. Jesteśmy gotowi zintegrować je z Rosgwardią."
 SOV_mvd_category: "[SOV.GetFlag]Specjalne służby Rosji"
 SOV_mvd_category_desc: "\n\n\n\n\n\n£SOV_desctext_mvd \n\n\n\n\n\n\n\n\nBezpieczeństwo kraju zależy nie tylko od sił zbrojnych. Bezpieczeństwo kraju spoczywa również na barkach władz państwowych, takich jak Ministerstwo Spraw Wewnętrznych, a także wielu służb specjalnych, które pozostały w spadku po ZSRR. Ta ogromna machina z różnych agencji i departamentów, przy odpowiednim kierunku, uratuje kraj przed wszelkimi kłopotami.\nSeparatyzm w [SOV.GetFlag]§YRussian§! regiony zaczną§RWzrost§! stopniowo, gdy tylko poziom §Ystabilności§! spada §Rponiżej 32%§!"
 SOV_grom_to_rosgvardia: "§YTransfer§! Jednostka Specjalnego Przeznaczenia §YGrom§! do §RRosgwardii§!"
 SOV_mobilise_omon: "§YMmobilizuj§! §ROMON§!"
 SOV_mobilise_sobr: "§YMmobilizuj§! §RSOBR§!"
 SOV_help_with_sheriff: "§YRussia§! has a deal with §Rthe Sheriff§!"
 SOV_anti_sheriff: "Wyzwolić §YNaddniestrze§! spod wpływu §Rszeryfa§!"
 SOV_TAT_separ_tt: "§RSeparatyzm§! w §Y[TAT.GetNameWithFlag]§!: §Y[?TAT.subjectinped]§!%"
 SOV_BSH_separ_tt: "§RSeparatyzm§! w §Y[BSH.GetNameWithFlag]§!: §Y[?BSH.subjectinped]§!%"
 SOV_CHE_separ_tt: "§RSeparatyzm§! w §Y[CHE.GetNameWithFlag]§!: §Y[?CHE.subjectinped]§!%"
 sov_reunification_category: "Zjednoczenie Rosji"
 sov_reunification_category_desc: "Wynik wojny pozostawił Rosję rozbitą. Gdy kurz opadł, musimy znieść trudy zjednoczenia.\nAktualny postęp w zjednoczeniu: [?THIS.reunification_progress]."
 start_talks_with_karelia: "Rozpocznij rozmowy o zjednoczeniu z [KAE.GetNamewithFlag]"
 start_talks_with_don: "Rozpocznij rozmowy o zjednoczeniu z [DON.GetNamewithFlag]"
 start_talks_with_csb: "Rozpocznij rozmowy o zjednoczeniu z [CSB.GetNamewithFlag]"
 start_talks_with_esb: "Rozpocznij rozmowy o zjednoczeniu z [ESB.GetNamewithFlag]"
