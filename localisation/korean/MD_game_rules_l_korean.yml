l_korean:
 MD_RULES: "기타 규칙"
 RULE_REMOVE_MICRO_STATES: "국가 삭제"
 RULE_NO_RULE_REMOVE_MICRO_STATES_DESC: "국가를 삭제하지 않습니다"
 RULE_DISABLE_NATO: "NATO 제거"
 RULE_YES_DISABLE_NATO_DESC: "NATO는 게임이 시작되고 제거될 것입니다."
 RULE_NO_DISABLE_NATO_DESC: "NATO는 세력으로 존속할 것입니다."
 RULE_DISABLE_EU: "EU 제거"
 RULE_YES_DISABLE_EU_DESC: "모든 나라는 EU에서 탈퇴할 것입니다."
 RULE_NO_DISABLE_EU_DESC: "EU는 그대로 존재할 것입니다."
 RULE_DISABLE_ANTI_BULLY: "반강자 시스템 (전쟁피로도)을 끕니다."
 RULE_YES_ANTI_BULLY_DESC: "전쟁 피로도 시스템을 비활성화하여 아무런 불이익 없이 호전적인 행동을 할 수 있도록 합니다."
 RULE_NO_ANTI_BULLY_DESC: "반강자 시스템 (전쟁피로도)이 켜질 것입니다."
 RULE_SALAFIST_BRANCH: "살라피스트 중점 활성화"
 RULE_YES_SALAFIST_BRANCH_DESC: "시작 종교와 상관 없이 모든 국가에 일반 중점계통도에서 살라피스트 중점을 활성화 합니다."
 RULE_NO_SALAFIST_BRANCH_DESC: "이슬람의 모든 변형을 따르는 국가들에 대해 기본 중점에서 살라피즘 분파를 활성화합니다."
 RULE_ENABLE_DIVISION_LIMITER: "AI 사단 제한 활성화"
 RULE_NO_ENABLE_DIVISION_LIMITER_DESC: "AI사단 제한 비활성화\n\n기본적으로 AI가 생성할 수 있는 유닛 수에 제한이 없습니다. 성능상의 이유로 부대를 숫자를 제한하고자 한다면 활성화 해주세요!"
 RULE_YES_ENABLE_DIVISION_LIMITER_DESC: "AI 분대 제한 기능 활성화\n\n이 기능을 활성화하면 AI의 유닛 ​​생산 빈도가 줄어들어 플레이어가 더욱 원활하게 게임을 즐길 수 있습니다!"
 RULE_OPTION_POTATO_EDITION: "저사양 컴퓨터 전용 에디션"
 RULE_POTATO_EDITION_DIVISION_LIMITER_DESC: "저사양 컴퓨터를 위한 AI 사단 숫자를 제한합니다\n\n더 많은 숫자 제한으로 퍼포먼스를 향상 할 수 있습니다.\n"
 RULE_ALLOW_CHEAT_DECISIONS: "치트 디시전 사용여부"
 RULE_YES_ALLOW_CHEAT_DECISIONS_DESC: "치트 디시전 활성화"
 RULE_NO_ALLOW_CHEAT_DECISIONS_DESC: "치트 디시전 비활성"
 RULE_ALLOW_TOGGLING_CHEAT_DECISIONS: "§Y(멀티플레이어)§! (선택적) 치트 디시전을 전세계적으로 선택할 수 있게 해줍니다."
 RULE_YES_ALLOW_TOGGLING_CHEAT_DECISIONS_DESC: "전세계적으로 적용되는 치트 디시전이 가능해집니다.\n§Y알림:§! 어느 나라던 간에 사기적인 결정을 활성화할 수 있고 그 효과는 §Y전세계§!적으로 영향을 미칩니다. 어떤 나라가 선택을 하였는지 이벤트 창이 나타나서 알려줄 것입니다.\n§Y멀티플레이에서도 이를 활성화할 수 있습니다.!§!\n\n§Y알림:§! 치트 디시전을 사용하고 싶다면, \"치트 디시전 사용여부\"에도 체크를 해야합니다.!"
 RULE_NO_ALLOW_TOGGLING_CHEAT_DECISIONS_DESC: "전세계적으로 적용되는 치트 디시전이 가능해집니다.\n§Y알림:§! 어느 나라던 간에 치트 디시전을 활성화할 수 있고 그 효과는 §Y전세계§!적으로 영향을 미칩니다. 어떤 나라가 선택을 하였는지 이벤트 창이 나타나서 알려줄 것입니다.\n§Y멀티플레이에서도 이를 활성화할 수 있습니다.!§!\n\n§Y알림:§! 치트 디시전을 사용하고 싶다면, \"치트 디시전 사용여부\"에도 체크를 해야합니다.!"
 RULE_ALLOW_RECALL_INTERVENTION_FORCES: "개입군의 귀환 허용"
 RULE_YES_ALLOW_INTERVENTION_FORCES: "§Y기본값§!. 국가에서 개입군을 철수시킬 수 있습니다."
 RULE_NO_ALLOW_INTERVENTION_FORCES: "해외 분쟁 지역에서 개입군을 철수시킬 수 없습니다."
 RULE_OPTION_MD_DEFAULT: "기본 AI 행동"
 RULE_OPTION_MD_DEFAULT_AI_DESC: "AI는 역사적 선택에 약간의 비중을 두되, 무작위로 중점 사항을 선택합니다. 세계 정세와 국가 상황도 선택에 약간의 영향을 미칩니다."
 AI_CHAOS: "혼돈의 AI 행동"
 AI_CHAOS_DESC: "AI는 현재 사용 가능한 모든 중점 중에서 항상 완전히 무작위로 중점을 선택합니다. 모든 중점들은 동일하고, 최대한의 혼란만 보장합니다."
 RULE_OPTION_RANDOM_DESC: "AI가 따를 너무 혼란스럽지 않은 경로가 무작위로 선택됩니다."
 RULE_OPTION_PUTIN: "통합 러시아"
 RULE_OPTION_PEACEFUL_REFORM: "자유주의 러시아"
 RULE_OPTION_THE_RED_MENACE: "붉은 위협"
 RULE_OPTION_RISE_OF_RUSSIA: "지리놉스키의 러시아"
 NIG_AI_BEHAVIOR: "@NIG 나이지리아 연방공화국"
 RULE_OPTION_RISE_OF_BOKO_HARAM: "보코하람의 부상"
 RULE_OPTION_RISE_OF_BOKO_HARAM_AI_DESC: "나이지리아에 보코하람이 국가를 장악할 수 있도록 압력을 가합니다."
 RULE_OPTION_PDP_EMPOWERED: "인민민주당"
 RULE_OPTION_PDP_EMPOWERED_AI_DESC: "인민민주당(PDP)은 나이지리아 최대 정당 중 하나입니다. 이들은 주로 종교 스펙트럼의 기독교 진영과 비동맹 이념을 대변합니다."
 RULE_OPTION_ANPP_EMPOWERED: "전나이지리아인민당"
 RULE_OPTION_ANPP_EMPOWERED_AI_DESC: "전나이지리아인민당(또는 2017년의 진보민주회의)은 2000년 당시 나이지리아의 제1야당입니다. 이들이 유럽의 사회민주주의와 매우 유사하며 나이지리아의 주요 개혁을 추진한다는 점을 주목해야 합니다."
 FRA_AI_BEHAVIOR_MD: "@FRA 프랑스 공화국"
 RULE_OPTION_FRA_HISTORICAL: "역사적 AI 행동"
 RULE_OPTION_FRA_HISTORICAL_DESC: "프랑스는 서방 국가이자 유럽연합의 지도국 중 하나로 남을 것입니다. 프랑스는 유럽 연합이 더욱 중앙집권화 되게 하는 동시에 구 식민지에서의 영향력을 유지하기 위해 노력할 것입니다."
 RULE_OPTION_FRA_EGALITE: "평등"
 RULE_OPTION_FRA_EGALITE_DESC: "프랑스가 평등(Égalité)를 선택한 뒤, 마르크스주의로 선회할 것입니다."
 RULE_OPTION_FRA_FRATERNITE: "우애"
 RULE_OPTION_FRA_FRATERNITE_DESC: "프랑스는 우애(Fraternité)를 선택한 뒤, 유럽을 지배하는 것을 목표로 할 것입니다."
 RULE_OPTION_RED_STAR_OVER_TOKYO: "동경의 붉은 별"
 RULE_OPTION_RED_STAR_OVER_TOKYO_AI_DESC: "과거에 공산화된 일본의 전망은 그리 상상할 수 없는 가능성이 아니었습니다. 그 후 몇 년 동안 일본이 완전히 자본주의 경제 체제를 수용하면서 이러한 가능성은 사라지는 듯했습니다. 그러나 한때 이 체제가 가져다주었던 기적적인 성장은 이제 정체되었습니다. 불평등이 만연하고 있으며, 일본 국민들은 현 상황에 변화가 필요할지도 모른다는 가능성을 받아들이기 시작했습니다..."
 RULE_OPTION_RETURN_OF_THE_EMPIRE: "제국의 귀환"
 RULE_OPTION_RETURN_OF_THE_EMPIRE_AI_DESC: "한때 일본은 위대한 국가였습니다. 아시아 대륙 전체에 눈을 돌렸고 그에 걸맞은 지위를 얻기 직전까지 갔습니다. 지금의 일본은 나약하고 외세의 의지에 얽매여 있습니다. 일본은 과거의 모습을 되찾고 동아시아에 제국을 재건하고자 할 것입니다."
 BRM_AI_BEHAVIOR: "@BRM 미얀마 연방"
 RULE_OPTION_BEACON_OF_DEMOCRACY: "민주주의의 등불"
 RULE_OPTION_BEACON_OF_DEMOCRACY_AI_DESC: "미얀마는 타협 없는 개혁을 추진하여 민족민주동맹(NLD)을 급속히 권력의 자리에 올려놓을 것입니다. 미얀마는 타마도(군부)에 양보하는 대신 소수민족 반군 그룹을 포함한 정치적 자유화의 다양한 지지자들을 결집하여 정치에서 군부의 영향력을 영구히 종식시키려 할 것입니다."
 RULE_OPTION_AN_IRON_FIST: "철권통치"
 RULE_OPTION_AN_IRON_FIST_AI_DESC: "2000년 시작 시점에만 적용되는 이 게임 규칙은 미얀마가 독재 체제를 유지하도록 강제하며, 역사적으로 그랬던 것처럼 개혁 압력에 긍정적으로 반응하는 대신 탄압과 전체주의로 대응하게 만듭니다. 나아가 군사 정부는 정당성 상실에서 주의를 돌리기 위해 국내 반군 그룹뿐만 아니라 인접국들과도 전쟁을 벌일 것입니다."
 RULE_OPTION_NORTHERN_AMBITION: "북방의 야망"
 RULE_OPTION_NORTHERN_AMBITION_AI_DESC: "스웨덴 극우파의 인기가 급상승하여, 마침내 북유럽에 스웨덴 제국을 건설하려는 시도로 이어질 것입니다."
 SYR_AI_BEHAVIOR: "@SYR 시리아 아랍 공화국"
 RULE_OPTION_SYR_HISTORICAL: "역사적 AI"
 RULE_OPTION_SYR_HISTORICAL_DESC: "하페즈 알아사드의 뒤를 이어 장남 바샤르 알아사드가 집권합니다. 바샤르는 시리아를 러시아와 동맹을 맺은 국가로 유지하면서 외교, 군사, 경제 분야에서 균형 잡힌 중점을 둘 것입니다."
 RULE_OPTION_SYR_IRON_LADY: "시리아의 철의 여인"
 RULE_OPTION_SYR_IRON_LADY_DESC: "하페즈 알아사드의 뒤를 이어 딸 부슈라 알아사드가 집권합니다. 부슈라는 외교와 경제에 중점을 두며 강대국들 사이에서 보다 중립적인 노선을 취할 것입니다."
 RULE_OPTION_SYR_SYRIAN_SAVAGE: "시리아의 야만인"
 RULE_OPTION_SYR_SYRIAN_SAVAGE_DESC: "하페즈 알아사드의 뒤를 이어 막내아들 마헤르 알아사드가 집권합니다. 마헤르는 대시리아를 결성하고 중동에 새로운 강국을 개척하려 시도할 것입니다. 그는 군사적, 경제적 팽창에 집중할 것입니다."
 RULE_OPTION_SYR_NEW_ASSAD: "새로운 알아사드"
 RULE_OPTION_SYR_NEW_ASSAD_DESC: "다마스쿠스의 봄 이후 하페즈 알아사드의 동생 리파앗 알아사드가 뒤를 이을 것입니다. 리파앗은 외교와 경제에 중점을 둔 친사우디 정책에 집중할 것입니다."
 RULE_OPTION_SYR_DAMASCUS_SPRING: "다마스쿠스의 봄"
 RULE_OPTION_SYR_DAMASCUS_SPRING_DESC: "시리아는 다마스쿠스의 봄 운동에 의해 장악되어 민주주의 국가로 탈바꿈할 것입니다."
 BHR_AI_BEHAVIOR: "@BHR 바레인"
 RULE_OPTION_DAY_OF_RAGE: "분노의 날"
 RULE_OPTION_DAY_OF_RAGE_AI_DESC: "바레인 국민들은 1990년대 반정부 시위 정신을 이어받아 더욱 큰 정치적 자유화를 추구할 것이며, 궁극적으로 완전한 민주주의 시아파 국가 수립을 이뤄낼 것이다. 이 새로운 시아파 공화국은 이란과 동맹을 맺을 것이다."
 SAU_AI_BEHAVIOR: "@SAU 사우디아라비아 왕국"
 RULE_OPTION_GLOBAL_JIHAD_GCC_FIRST: "국제적인 지하드 조직 - GCC 우선"
 RULE_OPTION_GLOBAL_JIHAD_GCC_FIRST_AI_DESC: "사우디아라비아는 경제 개혁을 단행하고 걸프협력회의(GCC)를 초국가로 통합하려 시도할 것입니다. 그 후 알카에다 봉기로 사우디 군주제가 전복되며, 폭력적인 수단으로 원리주의 이념을 전파하려는 급진적 이슬람 국가 수립으로 이어질 것입니다."
 RULE_OPTION_GLOBAL_JIHAD: "글로벌 지하드"
 RULE_OPTION_GLOBAL_JIHAD_AI_DESC: "알카에다 봉기로 사우디 군주제가 전복되며, 폭력적인 수단으로 원리주의 이념을 전파하려는 급진적 이슬람 국가 수립으로 이어질 것입니다."
 RULE_OPTION_ISLAMIC_AWAKENING: "이슬람 각성"
 RULE_OPTION_ISLAMIC_AWAKENING_AI_DESC: "무슬림 형제단의 영향을 받은 사흐와(Sahwa, 각성 운동)가 사우디 군주제를 성공적으로 압박하여 다원주의적 이슬람 민주주의에 길을 내주도록 만들 것입니다."
 RULE_OPTION_RETURN_OF_THE_BAATH: "바트당의 귀환"
 RULE_OPTION_RETURN_OF_THE_BAATH_AI_DESC: "사우디아라비아가 점진적으로 자유화되면서, 사회주의적 아랍 민족주의라는 바트당의 독특한 이념이 국가에 발판을 마련할 기회를 제공합니다. 이후 바트주의 아라비아는 중동에서 외국 군대를 축출하고 자국 영토를 확장하려 시도할 것입니다."
 RULE_OPTION_SHIA_REVIVAL: "시아파 부흥"
 RULE_OPTION_SHIA_REVIVAL_AI_DESC: "사우디아라비아의 시아파가 정치적 자유화가 제공하는 기회를 틈타 국가를 장악하고, 이란 및 러시아와 동맹을 맺을 것입니다."
 BRI_AI_BEHAVIOR: "@ENG 영국"
 RULE_OPTION_EUROPEAN_FUTURE: "유럽의 미래"
 RULE_OPTION_EUROPEAN_FUTURE_AI_DESC: "영국은 예전과 같지 않습니다. 더 이상 세계 초강대국이라고 자칭할 수 없습니다. 하지만 그렇다고 영국 국민이 세계 무대에서 역할을 멈춰야 한다는 의미는 아닙니다. 유럽 통합 프로젝트는 공통된 이상을 공유하는 국제 사회의 일원으로서 영국이 세계 속에서의 위상을 유지할 수 있도록 희망을 제시합니다."
 RULE_OPTION_RED_REPUBLIC: "붉은 공화국"
 RULE_OPTION_RED_REPUBLIC_AI_DESC: "역사 전반에 걸쳐 영국은 군주, 귀족, 귀족의 지배를 받아왔습니다. 영국의 계급 제도는 세계에서 가장 악명 높은 제도 중 하나로, 부유층이 더 부유해짐에 따라 영국의 근로 빈곤층이 고통받고 있습니다. 혁명은 오랫동안 진행되어 왔습니다."
 RULE_OPTION_RULE_BRITANNIA: "지배하라 브리타니아여"
 RULE_OPTION_RULE_BRITANNIA_AI_DESC: "한때 이 홀을 든 섬나라는 전 세계에 알려지고 두려움의 대상이었습니다. 영국 군주는 해가 지지 않는 제국을 다스렸습니다. 그러나 이제 영국의 국제적 위상은 쇠퇴했습니다. 미국의 꼭두각시 신세로, 과거의 영광을 잃어버린 그림자에 불과합니다. 이제 영국 제국을 부활시킬 때가 왔습니다."
 RULE_HELLENIC_REPUBLIC: "역사적"
 RULE_HELLENIC_REPUBLIC_DESC: "그리스는 민주주의를 유지하고 긴축 조치를 통해 그리스 부채 위기를 해결하려고 노력할 것입니다."
 RULE_OPTION_KKE: "KKE(그리스 공산당)"
 RULE_OPTION_KKE_DESC: "부채 위기가 초래한 문제들로 인해 정부에 대한 불만이 커지자, 국민들은 그리스 공산당(KKE)에 힘을 실어주어 공산주의 국가 수립을 시도할 것입니다."
 RULE_OPTION_GOLDEN_DAWN: "황금새벽당"
 RULE_OPTION_GOLDEN_DAWN_DESC: "부채 위기가 초래한 문제들로 인해 정부에 대한 불만이 커지자, 국민들은 민족주의 정당인 황금새벽당에 힘을 실어주어 강력한 그리스 국가 수립을 시도할 것입니다."
 RULE_NORTH_AMERICAN_STATUS_QUO: "북미 현상 유지"
 RULE_NORTH_AMERICAN_STATUS_QUO_DESC: "북미 현상 유지를 통해 캐나다는 나토(NATO)에 잔류하며 나토 및 미국과의 기존 관계를 비교적 그대로 유지할 것입니다."
 RULE_NATIONALIST_CANADA: "민족주의 캐나다"
 RULE_NATIONALIST_CANADA_DESC: "캐나다는 민족주의 노선을 선택하고 북미를 지배하려 시도할 것입니다."
 RULE_STAND_ALONE_CANADA: "홀로서기"
