 eurozone_reforms: "유로존의 개혁"
 eurozone_reforms_desc: "유로존은 제2차 세계대전 이후 전래 없는 부채 위기를 겪고 있습니다. §Y유럽 은행 연합§!, §Y유로본드 (Eurobonds)§! §Y유로안정화기구 (ESM)§!과 같은 개혁안을 통과 시켜 유로존을 개혁해야만 합니다.\n\n§Y유럽 부채 위기§!는 다음 개혁안을 통과시키면 피할 수 있습니다.\n- §Y유럽 은행 연합§!\n- §Y유로본드 (Eurobonds)§!\n- §Y유로안정화기구§!\n"
 troika_reforms: "트로이카 개혁"
 troika_reforms_desc: "유럽 연합 집행위원회 (EC), 유럽중앙은행 (ECB), 국제통화기금 (IMF)으로 구성된 유럽 연합의 트로이카 (Troika)가 요구하는 개혁안은 §Y[ROOT.GetNameWithFlag]§!의 파산을 막기 위한 대책입니다."
