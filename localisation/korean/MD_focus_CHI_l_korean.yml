 CHI_054a_production_line: "The 054A Production Line"
 CHI_054a_production_line_desc: "Every fleet needs a workhorse, and ours is the Type 054A. Built in a long unbroken run from 2008, this capable, affordable frigate becomes the standard escort of the navy, and the ship sent to the Gulf of Aden when China joined the anti-piracy patrols that same year, its first sustained mission in distant waters."
 CHI_45g_national_deployment: "5G Network Deployment"
 CHI_45g_national_deployment_desc: "China Mobile launches commercial 4G, and within three years we have more base stations than the rest of the world combined. The MIIT issues 5G licences to all three operators, and by the time Western carriers are debating their rollout strategies, we are operating 4.1 million 5G base stations serving one billion users. The infrastructure gap is no longer something we are closing; it is something we have reversed."
 CHI_863_ic_preparatory_research: "863 Programme IC Preparatory Research"
 CHI_863_ic_preparatory_research_desc: "Under the State High-Tech Development Plan, integrated circuit design and manufacturing are designated a priority field. State funds flow into university research centres and early-stage foundry pilots in the Pearl River Delta and Shanghai, laying the human capital and supply-chain groundwork that the National IC Fund will later scale into industrial production. We are planting seeds in soil that will take a decade to show a harvest."
 CHI_863_nev_program: "863 Programme NEV Track and Ten Cities"
 CHI_863_nev_program_desc: "Wan Gang, engineer-turned-minister who spent nine years at Audi before returning to China, argued that we could leapfrog combustion engines entirely. The Ten Cities Thousand Vehicles programme deploys NEV public fleets across pilot cities; Shenzhen electrifies its entire bus and taxi fleet. Tesla's Shanghai Gigafactory, built in 357 days from groundbreaking, becomes the catalyst forcing every Chinese EV maker to compete on quality and production speed. We should have expected nothing less from the market we created."
 CHI_a_lighter_touch_on_dissent: "A Lighter Touch on Dissent"
 CHI_a_lighter_touch_on_dissent_desc: "Rather than escalate internal coercion, we allow limited space for civil society expression and intellectual debate within carefully managed bounds. The approach trades short-term political control for a reduction in the friction that drives underground organizing."
 CHI_abolish_term_limits: "Abolition of Term Limits"
 CHI_abolish_term_limits_desc: "The National People's Congress votes 2,958 in favour, 2 against, and 3 abstaining to remove the two-term limit on the state presidency from the constitution. The vote is formally unanimous in all but name. Authority is no longer subject to a constitutional clock. The decision eliminates the most significant institutional constraint on personal power since the post-Mao reforms."
 CHI_above_the_neck_reform: "Reform Above the Neck"
 CHI_above_the_neck_reform_desc: "The old seven military regions answered to the ground army and fought their own wars. In 2016 we cut 'above the neck' first: the Central Military Commission seizes direct command, five theatre commands replace the regions, and a Joint Staff is born to fight as one. Command before forces, the head before the body."
 CHI_active_defense_doctrine: "Active Defense"
 CHI_active_defense_doctrine_desc: "Active defense has been the army's guiding strategy since Mao: strategically defensive, but operationally and tactically offensive. We sharpen it for the missile age, holding that the surest way to defend the homeland is to strike the enemy's spearhead before it lands."
 CHI_African_Continental_Integration: "Chinese-African Century"
 CHI_African_Continental_Integration_desc: "We have become Africa's largest single trading partner, with bilateral trade exceeding $254 billion annually. Decades of BRI investment in ports, railways, and special economic zones have made our infrastructure and capital indispensable to the African Union's continental integration agenda. The time has come to convert this economic weight into lasting institutional partnership."
 CHI_agricultural_tax_abolition: "Abolition of the Agricultural Tax"
 CHI_agricultural_tax_abolition_desc: "The Sannong Question -- agriculture, countryside, farmers -- had grown explosive across rural China long before the formal debate reached Beijing. A rural tax reform pilot anchored in Anhui province exposed how deeply the burden of local levies had suppressed peasant incomes and agricultural investment. Central Committee Document No. 1 returned to the rural question for ten consecutive years. Repealing the Agricultural Tax Ordinance of 1958 frees up rural capital that has waited decades to flow into the Central Plains of Henan, Hunan's rice belt, and Sichuan's basin."
 CHI_AIIB_Founding: "Asian Infrastructure Investment Bank"
 CHI_AIIB_Founding_desc: "The Asian Infrastructure Investment Bank, which we founded with 57 member states despite vigorous opposition from Washington, provides multilateral financing for infrastructure across Asia and beyond. Its existence demonstrates that we can build credible international institutions entirely outside the Bretton Woods framework. The Western monopoly on development finance is broken."
 CHI_An_Alliance_to_Rival_NATO_tt: "§YEffects will be shown, once we establish our faction§!"
 CHI_anshan_steel_modernization: "Anshan Steel Complex Modernisation"
 CHI_anshan_steel_modernization_desc: "The Anshan Iron and Steel Group, China's oldest and largest integrated steel complex, undergoes a major modernisation programme. Obsolete open-hearth furnaces are replaced with basic oxygen steelmaking, cutting costs and raising the quality ceiling for downstream manufacturing."
 CHI_ant_group_empire: "Ant Group's Financial Empire"
 CHI_ant_group_empire_desc: "Ant Group, spun off from Alibaba, builds a financial empire spanning Yu'ebao, Zhima Credit, Huabei, and MYbank, backing Paytm, GCash, and Dana internationally. Jack Ma publicly challenges state banks at the Bund Summit, comparing them to pawnshops. Days later, the CSRC and SAMR suspend Ant's 34-billion-dollar IPO 48 hours before launch. The platform sector's relationship with the state has changed, and every technology executive in the country understands what that means."
 CHI_anti_japanese_boycott_campaign: "Anti-Japanese Boycott Campaign"
 CHI_anti_japanese_boycott_campaign_desc: "The masses are angry. We did not create their anger. We merely choose not to stand in its way, until the moment we choose to."
 CHI_Arab_League_Cooperation_Forum: "China-Arab States Forum"
 CHI_Arab_League_Cooperation_Forum_desc: "The China-Arab States Cooperation Forum convenes foreign ministers from all 22 Arab League members to coordinate BRI project pipelines, trade policy, and political alignment. Through it we maintain a standing institutional channel into the Middle East that bypasses Western-led frameworks entirely. Arab states gain leverage over their traditional partners through demonstrated access to our capital, and we gain a bloc whose votes follow our lead."
 CHI_arms_for_influence: "Arms for Influence"
 CHI_arms_for_influence_desc: "Every export crate buys more than cash. We arm clients no Western supplier will touch and collect the debt in ports, votes and loyalty, turning the military's arms trade into a quiet instrument of foreign policy."
 CHI_army_aviation_corps: "The Army Aviation Corps"
 CHI_army_aviation_corps_desc: "An army that cannot fly cannot strike fast. We build out the Army Aviation arm with the Z-10 attack helicopter and Z-20 transport, giving the rapid brigades their own gunships and lift to leap over terrain and land troops behind the enemy."
 CHI_army_reorganisation: "Reorganise the Army"
 CHI_army_reorganisation_desc: "The thirteen new group armies are balanced and renumbered, each built from combined-arms brigades rather than lumbering divisions. The ground force emerges leaner, modular and finally interchangeable, able to mass or disperse as the fight demands."
 CHI_artillery_modernisation: "Modernise the Artillery"
 CHI_artillery_modernisation_desc: "Guns are only as good as the system that aims them. Counter-battery radar, digital fire control and precision shells turn the artillery from an area weapon into a scalpel, striking accurately at the first volley."
 CHI_assuage_japanese_concerns: "Assuage Japanese Concerns"
 CHI_assuage_japanese_concerns_desc: "They watch our coast guard. They watch our missile tests. So when we publicly cancel an exercise, they notice."
 CHI_astana_speech: "Silk Road Economic Belt"
 CHI_astana_speech_desc: "A speech at Nazarbayev University in Astana proposed 'jointly building an economic belt along the Silk Road' linking us to Europe through Central Asia. Combined with the 21st Century Maritime Silk Road announced the following month in Indonesia, the Belt and Road Initiative takes shape. Infrastructure financing, port concessions, and railway contracts must now flow outward from Beijing on a scale that changes the order of the world."
 CHI_avic_reunification: "Reunify AVIC"
 CHI_avic_reunification_desc: "Split in 1999 into rival halves to force competition, the aviation industry only learned to duplicate and quarrel. In 2008 AVIC I and AVIC II are stitched back into a single Aviation Industry Corporation, one roof over the fighters, engines and avionics the air force has waited decades for."
 CHI_Back_Channel_to_Foggy_Bottom: "Back Channel to Foggy Bottom"
 CHI_Back_Channel_to_Foggy_Bottom_desc: "Chinese and American diplomatic teams establish a discreet back channel through embassy back rooms and Track II interlocutors. Both sides acknowledge privately that the Korean question cannot be resolved without mutual accommodation."
 CHI_banking_recapitalisation: "Banking Sector Recapitalisation"
 CHI_banking_recapitalisation_desc: "Our banking sector accumulated a crushing load of non-performing loans during the credit expansion of the 1990s. We must inject public capital to clear these liabilities from state bank balance sheets, then list the restructured institutions on the Hong Kong exchange. Foreign minority shareholders and international accounting standards will follow, lending our financial system the credibility it currently lacks."
 CHI_baosteel_ipo: "The Baosteel IPO"
 CHI_baosteel_ipo_desc: "Baoshan Iron and Steel lists on the Shanghai Stock Exchange in what was then the largest IPO in our history, raising 7.7 billion yuan. Founded with technology licensed from Nippon Steel, Baosteel absorbed Shanghai Metallurgical Holding and Meishan under Zhu Rongji's policy of grasping the large and releasing the small. Its integration of high-grade automotive sheet and electrical strip sets the benchmark for China's modernising steel sector."
 CHI_baowu_merger: "The Birth of Baowu Steel"
 CHI_baowu_merger_desc: "The merger of Baosteel Group and Wuhan Iron and Steel Corporation creates China Baowu Steel Group, anchoring our strategy of building national steel champions capable of competing at global scale. Under chairman Chen Derong, Baowu subsequently acquires Maanshan Iron and Steel, Taiyuan Iron and Steel, Chongqing Iron and Steel, and Xinjiang Bayi Iron and Steel. Producing more than 115 million tonnes annually, Baowu has surpassed ArcelorMittal to become the world's largest steelmaker."
 CHI_bat_platform_rise: "The BAT Rises"
 CHI_bat_platform_rise_desc: "Baidu, Alibaba, and Tencent define our internet. Baidu dominates search after Google's exit; Alibaba has built the world's largest e-commerce ecosystem; Tencent's WeChat reaches 1.3 billion users. The policy environment that kept Western rivals out did not create these companies, but it gave them the space to grow without being acquired or destroyed by Silicon Valley capital. That space was a strategic choice, and it was correct."
 CHI_bayan_obo_ree_group: "Bayan Obo and China Rare Earth Group"
 CHI_bayan_obo_ree_group_desc: "Deng Xiaoping observed that the Middle East has oil while we have rare earths. The Bayan Obo deposit at Baotou in Inner Mongolia, operated by China Northern Rare Earth Group, is the world's largest deposit of light rare earths; the Ganzhou mines in Jiangxi supply heavy rare earths including dysprosium and terbium. The MIIT has consolidated six regional producers into China Rare Earth Group and China Northern Rare Earth Group. Export quotas, formally abolished after a WTO ruling, return as export licences and production quotas that achieve the same effect. We must use this leverage before others find substitutes."
 CHI_Beidou_Latin_Constellation: "Beidou Latin Constellation"
 CHI_Beidou_Latin_Constellation_desc: "Ground stations for our Beidou navigation system in Argentina and Venezuela extend the constellation's precision to the Western Hemisphere and reduce regional dependence on United States GPS infrastructure. The dual-use facilities underpin civilian agriculture and surveying contracts while providing us with strategic positioning data. Washington treats the installations as a direct challenge to its signals-intelligence dominance in the Americas, and Washington is correct."
 CHI_beijing_action_plan_green_olympics: "Green Olympics Action Plan"
 CHI_beijing_action_plan_green_olympics_desc: "Our bid to host the Olympic Games promised the IOC an environmentally responsible spectacle. We must now make good on that promise: large-scale afforestation, coal-to-gas fuel switching across Beijing's heating network, industrial relocation outside the capital, strengthened vehicle emission standards, and venue construction spanning six cities. The world will be watching."
 CHI_beijing_command_clique: "The Beijing Command Clique"
 CHI_beijing_command_clique_desc: "The provincial cliques converge on the capital. A network of bought generals takes hold of the command organs in Beijing itself, so that no promotion, contract or posting moves without its blessing and its cut."
 CHI_Beijing_Communique: "Beijing Peace Communique"
 CHI_Beijing_Communique_desc: "We have positioned ourselves as the broker of a historic Saudi-Iranian normalization, bringing the two regional rivals to restore diplomatic relations under our mediation. The communique demonstrates that we can deliver geopolitical outcomes Washington cannot or will not, cementing our credibility as an alternative security guarantor. Regional opinion now shifts measurably toward our diplomatic leadership, and we should press that advantage."
 CHI_beijing_tianjin_hsr: "Beijing-Tianjin High-Speed Rail"
 CHI_beijing_tianjin_hsr_desc: "The 117-kilometre Beijing-Tianjin Intercity Railway, covering the distance in thirty minutes at 350 km/h, marks the opening of China's high-speed rail expansion. Technology licensed from Kawasaki, Siemens, Alstom, and Bombardier is absorbed and indigenised through China South Railway and China North Railway, which have since merged to form CRRC. A collision at Wenzhou prompts a speed reduction to 300 km/h and a reinforcement of quality standards. The network now exceeds 40,000 km, and we have only begun to build."
 CHI_below_the_neck_disband: "Disband Below the Neck"
 CHI_below_the_neck_disband_desc: "With the high command remade, the knife turns to the body. From April 2017 the 'below the neck' reforms dissolve corps into combined-arms brigades, cut three hundred thousand troops, and shift the army from mass to manoeuvre. Whole armies vanish from the rolls so that what remains can actually fight."
 CHI_Belt_and_Road_Vision: "Belt and Road Initiative"
 CHI_Belt_and_Road_Vision_desc: "Launch the Belt and Road Initiative, investing hundreds of billions in infrastructure projects connecting Asia, Africa, and Europe to China through roads, railways, ports, and digital networks."
 CHI_Bide_Your_Time: "Hide Your Strength, Bide Your Time"
 CHI_Bide_Your_Time_desc: "Follow Deng Xiaoping's maxim. Avoid confrontation, build economic ties, and accumulate comprehensive national power quietly. China's rise need not provoke a coalition against it."
 CHI_big_four_ipo: "The Big Four IPO Wave"
 CHI_big_four_ipo_desc: "Our state banks are completing an unprecedented listing wave. China Construction Bank raises 9.2 billion US dollars in Hong Kong; ICBC's simultaneous dual listing in Hong Kong and Shanghai sets a world record at 21.9 billion; Agricultural Bank of China surpasses it with 22.1 billion. ICBC is now the world's largest bank by total assets, and the Big Four join the Financial Stability Board's list of globally systemically important banks. Central Huijin Investment remains the dominant shareholder in each."
 CHI_big_fund_phase2: "Big Fund Phase II"
 CHI_big_fund_phase2_desc: "The second phase of the National Integrated Circuit Fund raises 200 billion yuan, directed at equipment, materials, and advanced packaging to fill the supply-chain gaps US sanctions have exposed. A third phase of over 300 billion yuan follows, the largest single capital mobilisation in semiconductor history. The strategy has shifted from capacity scaling to full vertical integration: from raw wafer to packaged SoC, every step of the stack will be domestically sourced or domestically developed. Nothing less will give us the security we need."
 CHI_big_fund_phase_1: "Semiconductor Industry Investment Fund"
 CHI_big_fund_phase_1_desc: "The State Council has issued Document No. 18, designating semiconductors a strategic industry. The National Integrated Circuit Industry Investment Fund -- the Big Fund -- raises 138.7 billion yuan in its first close, anchoring a state-led capital mobilisation across foundry, design, and equipment. We channel funds into SMIC, Huawei HiSilicon, and a constellation of provincial co-investment vehicles. We can no longer afford technological dependence on TSMC and ASML, and this fund is our declaration of intent."
 CHI_blue_granary_aquaculture: "The Blue Granary"
 CHI_blue_granary_aquaculture_desc: "Our aquaculture sector produces 52 million tonnes annually, roughly 60 percent of global output and 80 percent of our own aquatic harvest. Guangdong's Pearl River Delta hosts the densest tilapia-pond networks in the world; Zhejiang's Ningbo-Zhoushan coast dominates shrimp and crab production. Experimental deep-water salmon cages in the Yellow Sea are transforming coastal agriculture districts into protein-export hubs, though antibiotic overuse and eutrophication of Lake Tai remain unresolved environmental costs we cannot ignore indefinitely."
 CHI_bow_to_china_dream: "Bow to the China Dream"
 CHI_bow_to_china_dream_desc: "When the anti-corruption storm breaks, the alliance bends rather than breaks. The clique pledges loud loyalty to Xi Jinping's China Dream, hands over a token few, and buys its survival by trading open plunder for quieter privilege."
 CHI_break_the_first_island_chain: "Break the First Island Chain"
 CHI_break_the_first_island_chain_desc: "The chain stretches from Kyushu through the Ryukyus to Taiwan. For forty years it has bottled our navy in coastal waters. The chain breaks where the weakest link concedes. The link will concede."
 CHI_BRI_Forum_Beijing: "Belt and Road Forum for Cooperation"
 CHI_BRI_Forum_Beijing_desc: "The Belt and Road Forum for International Cooperation, held in Beijing and growing with every iteration, convenes heads of state and senior officials from more than 100 countries to coordinate project pipelines, sign framework agreements, and project our leadership of the global development agenda. No other nation can assemble such a gathering around its own table."
 CHI_byd_catl_integration: "Build Your Dreams"
 CHI_byd_catl_integration_desc: "Wang Chuanfu's BYD, founded as a battery maker in Shenzhen, has halted pure combustion vehicle production, its Blade Battery LFP cell-to-pack technology setting new benchmarks for safety and cost. CATL, headquartered in Ningde, used a government battery whitelist to shut out Panasonic, LG, and Samsung SDI long enough to build an unassailable position. Together the two companies now control over 60 percent of global EV battery production. We built this industry from nothing, and it belongs to us."
 CHI_cadre_evaluation_reform: "Cadre Evaluation Reform"
 CHI_cadre_evaluation_reform_desc: "Our cadre assessment system has for too long rewarded provincial officials who deliver GDP growth while degrading their environment and neglecting public services. We must introduce mandatory weightings for environmental protection, social harmony, and energy intensity alongside economic output. An official who achieves growth by destroying the conditions for it deserves no promotion."
 CHI_cadre_rotation: "Cadre Rotation System"
 CHI_cadre_rotation_desc: "Local capture is the rot at the heart of Chinese governance. Officials who remain in the same post too long develop ties to local business interests that corrupt their judgement. A systematic rotation programme draws on Chongqing's experience to move cadres between postings regularly, breaking patronage networks before they solidify."
 CHI_caojing_seven_chem_bases: "Shanghai Caojing Petrochemical Bases"
 CHI_caojing_seven_chem_bases_desc: "The State Council designates seven national petrochemical bases: Shanghai's Chemical Industry Park at Caojing, followed by Nanjing, Ningbo Daxie, Daya Bay, Quanzhou, Dalian, and Caofeidian. Each base receives centralised steam, shared effluent treatment, dedicated port facilities, and integrated ethylene crackers, replicating the Verbund model pioneered by BASF at Ludwigshafen. BASF, Bayer, ExxonMobil, Shell, and Saudi Aramco gain access through joint ventures or wholly owned subsidiaries. The BASF Zhanjiang complex, at 10 billion euros, becomes BASF's largest single investment globally -- a measure of what our market can offer foreign capital when we choose to offer it."
 CHI_Central_Asia_Connectivity: "Silk Road Economic Belt"
 CHI_Central_Asia_Connectivity_desc: "The Silk Road Economic Belt runs overland through Central Asia, anchored by the Khorgos Gateway dry port on the Kazakhstan border, a rail-road transhipment hub linking Chinese rail gauge to the Russian broad gauge network. Freight volumes along the corridor grow as transit times undercut sea shipping for time-sensitive cargo. We should accelerate investment in this corridor before rival powers recognize its strategic value."
 CHI_central_china_development: "Rise of Central China"
 CHI_central_china_development_desc: "The central provinces of Henan, Hubei, and Hunan were bypassed by the coastal boom. A coordinated development initiative channels fiscal transfers, infrastructure investment, and relocated manufacturing into the region, anchoring China's demographic and agricultural heartland to the growth story."
 CHI_central_manufacturing_belt: "Central Manufacturing Belt"
 CHI_central_manufacturing_belt_desc: "Rising coastal wages after 2008 push manufacturers westward into Anhui, Jiangxi, and Hunan. State incentives for factory relocation, combined with lower land and labour costs, turn these three provinces into China's mid-tier industrial backbone within a decade, absorbing production chains from the Pearl and Yangtze deltas across textiles, electronics, and automotive components."
 CHI_central_military_civil_fusion: "Military-Civil Fusion"
 CHI_central_military_civil_fusion_desc: "The wall between the war economy and the civilian one is torn down by decree. Under Xi Jinping's Military-Civil Fusion strategy, raised to national priority in 2017, every advance in commercial electronics, computing and aerospace is harvested for the army, and every defence breakthrough flows back to industry. A whole nation's research becomes the General Staff's laboratory."
 CHI_central_urbanization_drive: "Central China Urbanisation Drive"
 CHI_central_urbanization_drive_desc: "An estimated hundred million rural migrants from the central provinces are moving into provincial capitals and county towns. We should accelerate the transition with housing subsidies, expanded urban services, and targeted hukou relaxations. The central interior must be turned from a labour reservoir into a consumer market while the demographic window is still open."
 CHI_Challenge_Dollar_Hegemony: "Challenge Dollar Hegemony"
 CHI_Challenge_Dollar_Hegemony_desc: "Promote the renminbi as an alternative reserve currency and establish bilateral currency swap agreements, undermining the dollar's stranglehold on global finance."
 CHI_change_lunar_exploration: "Chang'e Lunar Programme"
 CHI_change_lunar_exploration_desc: "The Chang'e robotic lunar programme began with an orbiter in 2007 and progressed through soft landings, the Yutu rovers, and the historic Chang'e 4 mission in January 2019, which placed a lander and rover on the lunar far side for the first time in history. The data returned by these missions has reshaped our understanding of the Moon's geology and lays the scientific groundwork for the crewed missions that follow."
 CHI_china_among_the_starts: "China Among the Stars"
 CHI_china_among_the_starts_desc: "Our Shenzhou programme placed us among a handful of nations capable of independent human spaceflight. Subsequent missions have established orbital docking, extravehicular operations, and the foundations for a permanent space station. We must now build on these achievements to secure our status as a major space power on par with the Americans and Russians."
 CHI_Chinese_Diplomacy: "Chinese Diplomacy"
 CHI_Chinese_Diplomacy_desc: "The Middle Kingdom has historically played a central role in East Asian affairs. Now that we have recovered from the Century of Humiliation, it is time to chart a comprehensive diplomatic strategy spanning regional neighbors and global institutions alike."
 CHI_chongqing_model_nationalisation: "The Chongqing Model"
 CHI_chongqing_model_nationalisation_desc: "Chongqing under Bo Xilai demonstrated that a statist alternative to market liberalism remains viable within the People's Republic. By renationalising strategic assets and directing credit toward state enterprises, the municipality posted GDP growth far exceeding the national average. We will extend this model across the country."
 CHI_cic_forex_reserves: "China Investment Corporation"
 CHI_cic_forex_reserves_desc: "We have accumulated over 1.4 trillion US dollars in foreign exchange reserves, parked in low-yield US Treasury bonds that serve America's financing needs more than our own. China Investment Corporation, capitalised with 200 billion US dollars, diversifies this sovereign wealth into global private equity, infrastructure, and strategic assets. After early losses in Blackstone and Morgan Stanley during the financial crisis, CIC matures into a disciplined investor managing over 1.3 trillion US dollars, among the world's largest sovereign wealth funds."
 CHI_cj10_cj20_cruise_missile_family: "The CJ-10 and CJ-20"
 CHI_cj10_cj20_cruise_missile_family_desc: "Long-range cruise missiles give the bombers their punch. The ground-launched CJ-10 and the air-launched CJ-20 let a single H-6 strike fixed targets fifteen hundred kilometres away, multiplying the reach of the whole force without risking a crew over the target."
 CHI_cloud_computing_triumvirate: "The Cloud Computing Triumvirate"
 CHI_cloud_computing_triumvirate_desc: "Alibaba Cloud holds 39 percent of our public cloud market; Tencent Cloud anchors gaming and fintech backends; Huawei Cloud surges after 2019 sanctions as a domestic alternative to American services. Foreign providers are limited to joint ventures under the Cybersecurity Law. We have built a domestic cloud infrastructure large enough to sustain the digital economy without foreign dependency, and that was not an accident."
 CHI_coastal_acceleration_doctrine: "Coastal Acceleration Doctrine"
 CHI_coastal_acceleration_doctrine_desc: "Our coastal provinces are where growth is fastest and where the returns on liberalisation are clearest. We should concentrate preferential policies in the Pearl River and Yangtze Deltas: multiply export processing zones, loosen land-use quotas for industrial parks, and permit coastal governments to issue infrastructure bonds ahead of the interior. The interior will follow when the coast has proven the model."
 CHI_coastal_sez_2nd_generation: "Second-Generation Special Economic Zones"
 CHI_coastal_sez_2nd_generation_desc: "The first generation of SEZs in Shenzhen and Pudong proved the model. A second wave of zones is designated in Shanghai and Guangdong, with upgraded legal frameworks, improved logistics, and stronger IP protections to attract higher-value foreign capital."
 CHI_combat_engineer_modernisation: "Modernise the Engineers"
 CHI_combat_engineer_modernisation_desc: "Bridges, breaches and fortifications decide whether a brigade moves or stalls. The engineer corps is re-equipped with modern bridging, mine-clearing and earthmoving vehicles so that terrain never again halts the advance."
 CHI_commercial_launch_sector: "Commercial Launch Sector"
 CHI_commercial_launch_sector_desc: "Since 2015 a new generation of Chinese commercial launch companies has moved from blueprint to pad. LandSpace flew the first methane-fuelled rocket to reach orbit with Zhuque-2 in 2023; Galactic Energy and iSpace have conducted multiple successful small-satellite launches. State backing for this ecosystem broadens our industrial base, drives down launch costs, and draws private capital into the space economy."
 CHI_common_prosperity: "Common Prosperity"
 CHI_common_prosperity_desc: "Common Prosperity is our governing priority now. Growth must be redirected toward narrowing the income gap, expanding social services, and constraining private-sector excess. Tutoring companies, technology platforms, and entertainment industries must accept new boundaries. The stated goal is broadly shared development; the practical effect is that we reassert authority over sectors that had grown beyond our reach, and both things are true at once."
 CHI_common_prosperity_original: "Common Prosperity"
 CHI_common_prosperity_original_desc: "The goal of development is not to enlarge the cake indefinitely while leaving the poor to scramble for crumbs. Common Prosperity means dividing the cake fairly as we grow it -- redistributing income, extending social services, and ensuring that the fruits of industrialisation reach the worker who built the factory as well as the official who planned it."
 CHI_Community_of_Shared_Future: "Community of Shared Future"
 CHI_Community_of_Shared_Future_desc: "Promote the concept of a community of shared future for mankind, advocating multilateralism and win-win cooperation as alternatives to Western-led institutions."
 CHI_Comprehensive_Agreement_Investment: "EU-China Investment Agreement"
 CHI_Comprehensive_Agreement_Investment_desc: "The Comprehensive Agreement on Investment, concluded after seven years of negotiations, would grant our firms improved access to European services markets in exchange for commitments on state-aid transparency. The European Parliament suspended ratification following mutual sanctions, but the economic logic of the deal persists. A ratified agreement would significantly lower barriers for Chinese capital across the bloc's single market, and we should press Brussels to revive it."
 CHI_construction_soe_champions: "State Construction Champions"
 CHI_construction_soe_champions_desc: "China State Construction Engineering Corporation, China Railway Construction Corporation, China Communications Construction Company, and Power Construction Corporation collectively hold seven of the top ten positions in the global contractor ranking. Decades of domestic mega-projects have given us a trained workforce of over two million, unit costs twenty to thirty percent below Western competitors, and procurement networks that source materials faster than any private rival. We must protect these structural advantages, because they translate directly into lower costs and shorter build times for every category of capital construction we undertake at home or sell abroad."
 CHI_cosco_global_network: "COSCO's Global Maritime Network"
 CHI_cosco_global_network_desc: "The merger of COSCO and China Shipping forms one of the world's largest container carriers, and the subsequent acquisition of Orient Overseas International extends our reach further still. COSCO Shipping Ports now operates terminals in Piraeus, Zeebrugge, Valencia, Singapore, Abu Dhabi, and Chancay. The 21st Century Maritime Silk Road links these nodes into a state-backed network across five continents. We should never again be dependent on foreign carriers to move our goods."
 CHI_Counter_Terrorism_Cooperation: "Counter-Terrorism Cooperation"
 CHI_Counter_Terrorism_Cooperation_desc: "Terrorism, separatism, and extremism threaten regional stability. By establishing joint counter-terrorism mechanisms within the SCO, we can coordinate intelligence sharing and security operations across member states."
 CHI_crewed_lunar_landing: "Crewed Lunar Landing"
 CHI_crewed_lunar_landing_desc: "China's crewed lunar landing programme targets the lunar south polar region, targeting a first touchdown around 2030. The mission profile pairs the Long March 10 heavy-lift rocket with the Mengzhou crew vehicle and the Lanyue lander, launching separately from Wenchang Space Launch Site and rendezvousing in lunar orbit. Success would make China the second nation to land humans on the Moon."
 CHI_cross_strait_military_posture: "Cross-Strait Military Posture"
 CHI_cross_strait_military_posture_desc: "Pro-independence forces have consolidated political power in Taipei, and we cannot allow that shift to pass without a response. The People's Liberation Army must intensify its posture across the Taiwan Strait: amphibious exercises growing in frequency and scale, air sorties into the island's defense identification zone made routine. Reunification is not merely a political preference. It is a core national objective, and the force behind it must be unmistakable."
 CHI_crossborder_ecommerce: "Cross-Border E-Commerce"
 CHI_crossborder_ecommerce_desc: "Our manufacturers now sell direct to global consumers, bypassing the traditional distribution chains that foreign brands used to control. SHEIN's ultra-fast cycles run from Guangzhou Panyu factories; Temu becomes the most-downloaded US app within a year of its launch. Cross-border exports reach 400 billion US dollars; Western governments respond with de minimis threshold restrictions. The tariff walls they are rebuilding tell us how effective our exporters have become."
 CHI_davos_boycott: "Boycott of Davos"
 CHI_davos_boycott_desc: "The World Economic Forum represents the ideology of stateless capital -- an order that subordinates sovereign development to the preferences of multinational finance. We will no longer send our highest officials to kneel before bankers in Swiss mountain resorts. Our path is self-reliance and state-directed growth, not the Washington Consensus dressed in alpine snow."
 CHI_Debt_Trap_Diplomacy: "Debt-Trap Diplomacy"
 CHI_Debt_Trap_Diplomacy_desc: "Extend loans on terms that maximize Chinese leverage over debtor nations. When they cannot repay, extract strategic concessions in the form of port access, resource rights, and political alignment."
 CHI_defence_industry_consolidation: "Defence Industry Consolidation"
 CHI_defence_industry_consolidation_desc: "AVIC, CSIC, NORINCO, and the other great conglomerates of our defence-industrial base are powerful individually but wasteful in aggregate. We should bring them under tighter SASAC oversight, eliminate duplication, channel research investment into priority programmes, and impose performance contracts on enterprise management. Dedicated production facilities in Sichuan and Guangdong must be expanded, and Jiangnan shipyard deserves new dockyard investment without delay."
 CHI_designated_succesor: "Designated Successor"
 CHI_designated_succesor_desc: "Deng Xiaoping's design of collective leadership included an ordered succession mechanism: each paramount leader would cultivate a successor to prevent indefinite one-man rule. We now navigate between the expectations of that tradition and the logic of our own consolidation. A designated successor provides reassurance to factions wary of unchecked personal authority, and the Tuanpai extracts a symbolic concession in exchange for acquiescence. It is a price worth paying for stability."
 CHI_Digital_Silk_Road: "Digital Silk Road"
 CHI_Digital_Silk_Road_desc: "Extend China's digital infrastructure to developing nations through 5G networks, fiber optic cables, and smart city technology, creating lasting technological dependency."
 CHI_Digital_Silk_Road_Initiative: "Digital Silk Road Initiative"
 CHI_Digital_Silk_Road_Initiative_desc: "Huawei and ZTE have already built 4G and 5G networks, submarine cables, and smart-city surveillance platforms across more than 80 countries. The Digital Silk Road creates deep technological dependencies in partner states and gives us preferential access to their telecommunications infrastructure. We should accelerate this programme before Western regulatory pressure persuades more governments to exclude our firms."
 CHI_digital_yuan_ecny: "The Digital Yuan"
 CHI_digital_yuan_ecny_desc: "The People's Bank of China has launched the Digital Currency Electronic Payment project, distributing e-CNY through commercial banks in pilots across Shenzhen, Suzhou, and Beijing. Two hundred and sixty million wallets are now active. Project mBridge tests cross-border CBDC settlement with Hong Kong, Thailand, and the UAE as an alternative to SWIFT. The digital yuan is not merely a payment tool; it is the infrastructure of a monetary order that does not depend on Washington."
 CHI_distant_water_fishing_strategy: "Distant-Water Fishing Strategy"
 CHI_distant_water_fishing_strategy_desc: "Our distant-water fishing fleet now exceeds 2,500 vessels working the exclusive economic zones of Mauritania, Sierra Leone, Argentina, and Peru, a programme rooted in the China National Fisheries Corporation's first expedition to West African waters. The Going Out strategy embeds distant-water fishing as a permanent arm of our food security policy. Fuel subsidies, icemaker vessels, and port agreements in Bata, Walvis Bay, and Montevideo sustain operations, with the Zhoushan archipelago in Zhejiang serving as the principal processing hub."
 CHI_ditiao_gang_crackdown: "The Illegal Steel Crackdown"
 CHI_ditiao_gang_crackdown_desc: "Over 600 unregistered induction-furnace mills, producing an estimated 140 million tonnes of substandard ditiao gang steel annually, must be shut down. The Ministry of Industry and Information Technology has made this a centrepiece of supply-side structural reform. Official production statistics will rise as shadow output is absorbed, steel quality will improve, and prices will increase as low-grade supply is removed from the market. The rebar merchants who profited from this chaos have had their time."
 CHI_document_nine: "Document No. 9"
 CHI_document_nine_desc: "A classified Party communique titled 'On the Current State of the Ideological Sphere' identifies seven Western ideological threats to be suppressed: constitutional democracy, civil society, neoliberalism, press freedom, historical nihilism, questioning socialism, and doubting Party reform. Mandatory study sessions are ordered across universities and state media. The boundaries of acceptable thought contract overnight, and loyalty is demonstrated through the rejection of foreign concepts."
 CHI_domestic_eda: "Domestic EDA and IP"
 CHI_domestic_eda_desc: "Electronic design automation software -- the tools used to design integrated circuits -- had been supplied almost exclusively by Cadence, Synopsys, and Mentor Graphics. After the United States placed EDA tools on the entity-list control list, we directed investment toward Empyrean Technology, Primarius, and Xpeedic. Domestic EDA coverage has reached full-flow capability for mature nodes, though advanced-node coverage for sub-5nm design remains partial. State licensing of domestic IP blocks complements EDA development, and we must close the remaining gap before Washington notices how close we are."
 CHI_dragon_eye_over_lanzhou: "Dragon Eye over Lanzhou"
 CHI_dragon_eye_over_lanzhou_desc: "China builds its own Aegis. The Type 052C destroyer, led by the Lanzhou commissioned in 2004, mounts the Type 346 'Dragon Eye' phased-array radar and the HHQ-9 missile, giving a Chinese warship genuine fleet area air defence for the first time. The navy can finally guard its own skies at sea."
 CHI_dual_credit_auto_export: "Dual-Credit System and World's Largest Exporter"
 CHI_dual_credit_auto_export_desc: "The Dual-Credit regulation assigns separate fuel-consumption and NEV credit accounts to every automaker in our market, creating a cap-and-trade mechanism for electric vehicles that replaces direct subsidies with competitive pressure. We now export more than 5 million vehicles annually, surpassing Japan as the world's largest auto exporter. The European Union imposes duties of 17 to 37 percent on top of the base tariff; the United States levies 100 percent on our EVs. Neither barrier will stop what the market has already decided."
 CHI_eat_imperial_grain: "Eat Imperial Grain"
 CHI_eat_imperial_grain_desc: "An army that runs hotels, smuggles cars and trades in arms is loyal to its own purse, not to the Party. In July 1998 Jiang Zemin ordered the PLA to surrender its commercial empire and live instead on the state's grain, on the budget alone. We take that road to its end: a professional force, paid and clean, that answers only to Beijing."
 CHI_ecommerce_infrastructure: "China's E-Commerce Infrastructure"
 CHI_ecommerce_infrastructure_desc: "Taobao defeated eBay China with free listings and integrated messaging, then Tmall extended the platform to branded B2C storefronts for international retailers. JD.com built its own network of 1,500 warehouses and a full-time delivery force that operates faster than any logistics service we have inherited. E-commerce now accounts for 30 percent of our retail, the highest share of any major economy, and the infrastructure that makes it possible is entirely ours."
 CHI_Economic_Framework_for_Unity: "Economic Framework for Unity"
 CHI_Economic_Framework_for_Unity_desc: "The two Koreas and their great-power patrons sketch an economic integration roadmap. Chinese investment in North Korean infrastructure, South Korean technology transfers, and American financial guarantees form the foundations of a possible unified Korea."
 CHI_Economic_Reintegration: "Economic Reintegration"
 CHI_Economic_Reintegration_desc: "We begin the long process of integrating North Korea's economy into our industrial sphere. Investment flows north; raw materials and labor flow south. The Korean tributary relationship, dormant for a century, is effectively restored."
 CHI_Eight_Country_Initiative: "Eight-Country Pacific Initiative"
 CHI_Eight_Country_Initiative_desc: "A consolidated security and economic framework proposed to eight Pacific Island states would give us a region-wide policing, fisheries monitoring, and data network agreement in a single signature. The initiative tests whether our accumulated diplomatic capital across the Pacific can be converted into a collective arrangement rivalling the regional architecture Australia has maintained for decades. Success determines whether we lead Pacific institutional design or merely participate in it."
 CHI_eleventh_five_year_plan: "The Eleventh Five-Year Plan"
 CHI_eleventh_five_year_plan_desc: "Our next Five-Year Plan must set binding targets: a mandatory 20 percent reduction in energy intensity per unit of GDP, a 10 percent reduction in major pollutant emissions, and a higher share of services in GDP. We should also increase state investment in research and education and accelerate rural infrastructure construction. Growth without these constraints is growth we cannot sustain."
 CHI_establish_defence_conglomerates: "Establish the Defence Conglomerates"
 CHI_establish_defence_conglomerates_desc: "Scattered factories and feuding ministries cannot arm a great power. We gather the defence sector into a handful of vast state conglomerates, each a national champion in its domain, able to fund research, pool talent and answer the army's orders at scale."
 CHI_Eurasian_Land_Bridge: "Eurasian Land Bridge Complete"
 CHI_Eurasian_Land_Bridge_desc: "The Yiwu-London freight service demonstrated that an unbroken overland rail corridor from eastern China to Western Europe is commercially operational. Full Eurasian integration means our manufacturers can reach European markets in eighteen days rather than the thirty-five required by sea. We should now invest to increase capacity and frequency until the route rivals maritime shipping in volume."
 CHI_Exercise_Paektu_Honor: "Exercise Paektu Honor"
 CHI_Exercise_Paektu_Honor_desc: "We signal restraint through a bilateral military exercise emphasizing defensive postures at the Yalu River. The message to Washington is clear: we can manage Pyongyang without an American escalatory response."
 CHI_Expand_Foreign_Service: "Expand the Foreign Service"
 CHI_Expand_Foreign_Service_desc: "We must rapidly expand our consular network and diplomatic corps. No other nation on earth has managed to maintain more diplomatic posts worldwide than we do, and we should press that advantage further still."
 CHI_export_processing_zones: "Export Processing Zones"
 CHI_export_processing_zones_desc: "Designated export processing zones in Jiangsu, Fujian, and Zhejiang offer bonded warehousing, streamlined customs, and labour cost advantages that attract assembly operations from Korea, Taiwan, and Japan. China becomes the final assembly node in East Asian production networks."
 CHI_fabless_design_cluster: "Fabless Design Cluster"
 CHI_fabless_design_cluster_desc: "Our semiconductor design industry has consolidated around Shenzhen and Shanghai. State subsidies have drawn hundreds of startups into chip design for consumer electronics, communications, and AI accelerators. Shenzhen's proximity to PCB assembly, contract manufacturing, and consumer-electronics supply chains makes it the natural hub; the city's design cluster has produced Himax, Rockchip, Allwinner, and scores of smaller design houses, many backed by Big Fund provincial vehicles. The depth of this ecosystem is our structural advantage."
 CHI_factional_balance: "Factional Balance"
 CHI_faw_changchun_automotive: "FAW Changchun Expansion"
 CHI_faw_changchun_automotive_desc: "First Automobile Works, headquartered in Changchun, is our oldest carmaker and the foundation on which the rest of our automotive sector was built. We should expand its joint-venture portfolio with Volkswagen and Toyota while channelling state investment into indigenous brand development. Jilin province will become the anchor of our domestic automotive industry."
 CHI_fifty_vanke_handover: "The Vanke Handover"
 CHI_fifty_vanke_handover_desc: "By December 1998 thousands of military-run companies were appraised, registered and signed over to civilian ownership. Property arms worth a fortune, the equal of fifty Vanke developers, leave the army's books for good. The generals lose their fiefs, and the Party gains a cleaner sword."
 CHI_Five_Stars_Highway: "Five-Country Highway Corridor"
 CHI_Five_Stars_Highway_desc: "A transcontinental road corridor linking Brazilian Atlantic ports to Peruvian Pacific terminals crosses five countries and shortens overland transit by weeks. The project is the flagship of our South American logistics ambition, duplicating the economic logic of the Panama Canal at continental scale. Our construction firms and financing institutions will carry the development burden, and the gratitude of five nations will follow."
 CHI_flying_leopard_doctrine: "The Flying Leopard Doctrine"
 CHI_flying_leopard_doctrine_desc: "The fleet learns to strike from the air before it owns a carrier. Land-based JH-7 'Flying Leopard' fighter-bombers, armed with anti-ship missiles, turn naval aviation into an independent striking arm able to reach far out over the water and sink an enemy task force from the shore."
 CHI_Forum_China_CELAC: "China-CELAC Cooperation Forum"
 CHI_Forum_China_CELAC_desc: "The Community of Latin American and Caribbean States provides us with a multilateral channel that bypasses the Organization of American States, which Washington has long dominated. A ministerial forum built around infrastructure, trade, and agricultural investment gives us a vehicle to erode United States institutional primacy in its own hemisphere. We should treat this framework as a long-term investment, not a one-time gesture."
 CHI_four_trillion_stimulus: "Four Trillion Yuan Stimulus"
 CHI_four_trillion_stimulus_desc: "A 4-trillion-yuan stimulus package equivalent to 12 percent of GDP is directed primarily at railways, highways, airports, and social housing. Local governments borrow through Local Government Financing Vehicles to co-finance their share of the programme. China State Construction and China Communications Construction expand rapidly on the resulting contracts. We avoid recession while the rest of the world contracts, but the stimulus generates a debt overhang in local government finances and accelerates the formation of a property bubble in cities such as Ordos and Changzhou. The costs are real, and they will arrive."
 CHI_FTA_2015: "China-South Korea Free Trade Agreement"
 CHI_FTA_2015_desc: "Our free trade agreement with South Korea is now fully implemented. Tariff reductions, joint logistics corridors, and expanded agricultural and electronics trade deepen bilateral interdependence and give Seoul a material stake in stable relations with us. An economically bound Korea is less likely to follow Washington's lead when the two conflict."
 CHI_game_licensing_regs: "Game Licensing Regulations"
 CHI_game_licensing_regs_desc: "The NPPA caps minor gaming at three hours per week, requiring facial recognition enforcement. A Xinhua editorial describes games as spiritual opium, wiping 10 percent off Tencent's share price in a single session. New titles require a banhao licence, with preference for patriotic themes. Approvals resume as studios pivot to overseas markets, exporting a product the regulation has made ideologically reliable."
 CHI_geely_volvo_acquisition: "Geely's Volvo Acquisition"
 CHI_geely_volvo_acquisition_desc: "Li Shufu's acquisition of Volvo Cars from Ford for 1.8 billion US dollars established a template for Chinese overseas acquisitions focused on brand, intellectual property, and distribution networks rather than factories. Geely subsequently acquires the London Taxi Company, a 49.9 percent stake in Proton, 51 percent of Lotus, and 9.7 percent of Daimler AG. Each acquisition is not merely a commercial transaction but a statement that Chinese firms can own the things they once only assembled."
 CHI_Geneva_Carve_Out: "Geneva Bilateral Framework"
 CHI_Geneva_Carve_Out_desc: "Switzerland's tradition of commercial neutrality makes it a natural entry point for our capital seeking European market access that avoids European Union regulatory scrutiny. A bilateral free trade agreement and a series of financial market memoranda give our banks and sovereign funds a Geneva foothold that operates under lighter oversight than any comparable EU jurisdiction. Bern earns fee income and transaction volume, while we gain a credible Western financial address."
 CHI_Global_Ambitions: "Global Ambitions"
 CHI_Global_Ambitions_desc: "We are ready to define our role on the world stage. The question is not whether we will be a great power, but what kind of great power we choose to be."
 CHI_gobi_solar_offshore_wind: "The Gobi Solar Belt and Offshore Wind Bases"
 CHI_gobi_solar_offshore_wind_desc: "Our Renewable Energy Law and NDRC feed-in tariffs have built the policy framework that drives the solar cost collapse. LONGi Green Energy, JinkoSolar, Trina Solar, and JA Solar have reduced panel costs below 0.10 US dollars per watt. Polysilicon production in Xinjiang and Sichuan now supplies more than 80 percent of global demand. The Kubuqi Solar Great Wall in Inner Mongolia, the Tengger Desert Solar Park in Ningxia, and the Hami Solar-Wind Base in Xinjiang are gigawatt-scale installations; offshore wind is expanding at Yangjiang, Putian, and Yancheng. The dual-carbon pledge anchors the programme permanently."
 CHI_governance_moderenisation: "Modernization of Governance"
 CHI_governance_moderenisation_desc: "Social credit systems, digital identity infrastructure, and integrated surveillance networks must be unified under a single framework that tracks compliance, rewards cooperation, and flags dissent. Smart city technologies provide real-time monitoring of urban movement and communications at a scale no previous administration could manage. Digital governance is administration made legible: a population visible to us at every level, and governable accordingly."
 CHI_grain_for_green_program: "Grain-for-Green Programme"
 CHI_grain_for_green_program_desc: "The catastrophic Yangtze floods delivered a geological verdict on decades of Loess Plateau deforestation: 4,150 dead, 21 million hectares inundated, and a river system no longer able to absorb its own watershed. The Grain-for-Green programme converts slopes steeper than 25 degrees back to forest or grassland, replacing lost harvest income with grain and cash payments. We cover 32 million hectares; consolidated farming on productive flat land increases per-hectare yields in the restored areas. Restoration and productivity are not opposites."
 CHI_great_wall_suv_dominance: "Great Wall Haval SUV Dominance"
 CHI_great_wall_suv_dominance_desc: "Wei Jianjun built Great Wall Motors into our SUV champion from a factory in Baoding that global manufacturers barely noticed. The Haval H6 became the best-selling SUV in China for four consecutive years; Haval then became a standalone brand, followed by WEY, Ora, Tank, and Poer. Great Wall now operates assembly plants in Russia, Thailand, and Brazil, targeting segments Western manufacturers had systematically underestimated and left uncontested."
 CHI_guatian_reckoning: "The Reckoning"
 CHI_guatian_reckoning_desc: "The graft cannot stay buried forever. The logistics barons who sold off military land and stockpiled crates of liquor and gold face their day of reckoning, and the clique must choose whether to surrender a few scapegoats or close ranks and defy Beijing."
 CHI_Gulf_Yuan_Settlement: "Gulf Yuan Settlement Mechanism"
 CHI_Gulf_Yuan_Settlement_desc: "Gulf Cooperation Council states begin pricing a significant share of crude oil exports in renminbi, routed through the Cross-Border Interbank Payment System rather than SWIFT. Combined with central-bank swap lines and sovereign wealth fund RMB allocations, the shift steadily erodes the petrodollar's structural advantage. The United States loses a lever of financial coercion it has exercised since 1974."
 CHI_h20_programme: "The H-20 Programme"
 CHI_h20_programme_desc: "The last gap in the great-power arsenal is a stealth bomber, and we set out to close it. The H-20, a flying-wing design said to carry ten tonnes of weapons some eight thousand kilometres unrefuelled, would let China strike across the Pacific from its own airspace. With it, the bomber leg of a true global triad is complete."
 CHI_h6k_revival: "The H-6K Revival"
 CHI_h6k_revival_desc: "The old Tu-16 copy is reborn. The H-6K trades its bomb bay for cruise-missile pylons and fits efficient turbofans for far greater range, becoming a standoff platform that lobs land-attack missiles from beyond an enemy's defences. Some hundred and ten now form the core of the bomber force."
 CHI_harbin_equipment_manufacturing: "Harbin Heavy Equipment Base"
 CHI_harbin_equipment_manufacturing_desc: "Harbin's legacy of Soviet-era heavy industry is modernised and redirected toward power generation equipment, rail components, and industrial machinery. The city becomes the engineering backbone of China's infrastructure expansion."
 CHI_Health_Silk_Road: "Health Silk Road"
 CHI_Health_Silk_Road_desc: "The Health Silk Road extends our medical assistance, hospital construction, and pharmaceutical supply chains to BRI partner states. The framework gained prominence during the Covid-19 pandemic, when our vaccine diplomacy reinforced our standing as a health development partner for the Global South. We should now formalize and expand it so that dependence on Western pharmaceutical institutions is no longer the default."
 CHI_heavy_combined_arms_brigade: "Heavy Combined-Arms Brigades"
 CHI_heavy_combined_arms_brigade_desc: "Tanks alone die quickly. We mass the Type 99 with tracked infantry, self-propelled guns and engineers into heavy combined-arms brigades, self-sufficient shock formations built to break a fortified line and keep moving."
 CHI_hebei_steel_group: "Hebei Iron & Steel Group"
 CHI_hebei_steel_group_desc: "Hebei province has consolidated Tangshan Iron and Steel, Handan Iron and Steel, and smaller mills into Hebei Iron and Steel Group, forming what will become HBIS. Parallel mergers have created Anshan-Benxi in Liaoning and Shandong Steel Group in the same period. The Twelfth Five-Year Plan elevates consolidation into national policy, setting a target of the top ten producers controlling 60 percent of output. The era of a thousand small mills competing on thin margins must end."
 CHI_henan_grain_modernization: "Henan Agricultural Modernisation"
 CHI_henan_grain_modernization_desc: "Henan province feeds more people than any country in Europe. Investment in storage infrastructure, processing capacity, and agricultural extension services raises yields and reduces post-harvest losses, strengthening national food security and freeing rural labour for industrial redeployment."
 CHI_high_speed_rail_one: "High-Speed Rail Phase One"
 CHI_high_speed_rail_one_desc: "Our first dedicated high-speed lines are opening in rapid succession: Beijing-Tianjin, then Wuhan-Guangzhou, then the ambitious Beijing-Shanghai corridor, which will be the longest high-speed line in the world. The programme draws on licensed CRH technology from European and Japanese manufacturers, which our engineers are adapting to Chinese conditions. What begins as borrowed knowledge will become our own."
 CHI_hisilicon_kirin: "HiSilicon Kirin Mobile Platform"
 CHI_hisilicon_kirin_desc: "Huawei's semiconductor subsidiary HiSilicon created the Kirin SoC series for Huawei handsets, introducing an on-chip NPU before any Western competitor and reaching 7nm production at TSMC. After US export controls cut off that supply, Huawei worked with SMIC to fabricate the Kirin 9000S at a domestically achievable process node. The programme demonstrated that a Chinese fabless house could reach the performance tier of Apple and Qualcomm, and provided a template every domestic SoC developer is now following."
 CHI_Honiara_Security_Pact: "Honiara Security Agreement"
 CHI_Honiara_Security_Pact_desc: "The security framework with the Solomon Islands allows the People's Liberation Army Navy to berth, resupply, and conduct operations from Honiara, less than 2,000 kilometres from the Australian mainland. Canberra reacts with alarm, accelerating AUKUS timelines and lobbying Washington for increased Pacific deterrence posture. The pact gives us our first acknowledged security footprint east of the First Island Chain, and we should secure it before Honiara is pressured to walk it back."
 CHI_hq17_medium_range_air_defense: "Layered Medium-Range Defence"
 CHI_hq17_medium_range_air_defense_desc: "Above the point-defence layer we add medium-range cover, weaving short and longer-reach missiles into one networked shield so that no approach is left open between the treetops and the stratosphere."
 CHI_hq17_short_range_sam: "HQ-17 Short-Range SAM"
 CHI_hq17_short_range_sam_desc: "Brigades need their own umbrella. The HQ-17, developed from the Russian Tor, provides quick-reaction point defence against aircraft, drones and precision munitions, mounted to keep pace with the armour it protects."
 CHI_hu_jintao_reign: "The Hu Jintao Era"
 CHI_hu_jintao_reign_desc: "Hu Jintao's assumption of the offices of General Secretary, President, and Chairman of the Central Military Commission marks the most orderly leadership transition in our republic's history. His administration will emphasize institutional governance and collective decision-making over personal authority, moving our system closer to the kind of regular succession that stable states require."
 CHI_hua_hong_mature_node: "Hua Hong Mature-Node Capacity"
 CHI_hua_hong_mature_node_desc: "Hua Hong Semiconductor, originally a Sino-French joint venture in Jinqiao, reoriented toward specialised mature-node production: power management, embedded non-volatile memory, and analog chips for automotive and IoT markets. Its 200mm and 300mm fabs in Shanghai and Wuxi served domestic supply chains that Western sanctions could not easily reach. State reinvestment expanded capacity and diversified its customer base beyond the export market."
 CHI_hualong_nuclear_batch: "Hualong One Mass Construction"
 CHI_hualong_nuclear_batch_desc: "After importing Westinghouse AP1000 reactors to Sanmen and Haiyang, Framatome EPR reactors to Taishan, and Rosatom VVER units to Tianwan, we have completed our own third-generation design. Hualong One, a merger of CNNC's ACP-1000 and CGN's ACPR-1000, holds full Chinese intellectual property and meets European Utility Requirements. Fuqing Unit 5 connects to the grid first; the Zhangzhou Nuclear Base, Changjiang in Hainan, Fangchenggang, and Taipingling follow. The export version, HPR1000, enters service at Karachi K-2 and K-3, and this is only the beginning of our nuclear export programme."
 CHI_huawei_zte_export: "Huawei Equipment Exports"
 CHI_huawei_zte_export_desc: "Huawei and ZTE capture over 35 percent of the global telecom equipment market, with Huawei's Polar Code advantage in 5G standards underpinning its dominance. Through the Digital Silk Road, our infrastructure reaches operators in 170 countries. Western governments respond with bans and entity-list restrictions, but the physical infrastructure we have already installed cannot be removed by legislation."
 CHI_huludao_schoolhouse: "The Huludao Schoolhouse"
 CHI_huludao_schoolhouse_desc: "Aircraft carriers are useless without pilots who can land on them. At Huludao the Naval Aviation University raises a dedicated carrier-pilot pipeline, complete with a land-based ski-jump and arresting gear, training from scratch the airmen who will make a moving deck a place from which to fight."
 CHI_hybrid_rice_super_program: "Super Hybrid Rice Programme"
 CHI_hybrid_rice_super_program_desc: "Yuan Longping's China National Hybrid Rice Research and Development Centre in Changsha pursues successive yield milestones, each winter relocating its breeding team to Sanya on Hainan island, where the tropical climate allows year-round cultivation impossible on the mainland. Hybrid varieties already cover 60 percent of our rice acreage, and a parallel programme now investigates salt-tolerant sea rice for the North China Plain. We should sustain this investment: food security is the foundation on which every other ambition rests."
 CHI_hydrogen_green_steel: "Hydrogen Steelmaking"
 CHI_hydrogen_green_steel_desc: "Our dual-carbon targets and the EU Carbon Border Adjustment Mechanism press our steelmakers to decarbonise before foreign tariffs make the choice for them. Baowu has commissioned a one-million-tonne hydrogen-based direct reduction demonstration plant in Zhanjiang, partnering with Rio Tinto. HBIS is launching a similar project in Zhangjiakou using green hydrogen from electrolysis. We must raise the electric arc furnace share of our output substantially over the next decade, and the planning for that transition begins now."
 CHI_hypersonic_strike_integration: "Hypersonic Strike Integration"
 CHI_hypersonic_strike_integration_desc: "Speed becomes the new stealth. We fold hypersonic weapons, gliding faster than five times the speed of sound and manoeuvring all the way down, into the air force's strike package, presenting enemy defences with a threat they have no proven means to stop."
 CHI_ilrs_lunar_base: "International Lunar Research Station"
 CHI_ilrs_lunar_base_desc: "China and Russia signed the roadmap for the International Lunar Research Station in 2021, inviting partner nations to build a jointly operated research outpost near the lunar south pole. The programme prioritises in-situ resource utilisation, permanent surface infrastructure, and a crewed rotation scheme comparable to the Antarctic research station model. We commit our industrial and engineering base to making it a reality."
 CHI_individual_soldier_system: "The Individual Soldier System"
 CHI_individual_soldier_system_desc: "The rifleman becomes a node, not just a trigger. A new soldier system bundles optics, radio, navigation and body armour into one kit, linking each infantryman to the squad network and the commander's map."
 CHI_Indo_Pacific_Strategy_Collapsed: "Indo-Pacific Strategy Collapsed"
 CHI_Indo_Pacific_Strategy_Collapsed_desc: "South Korea's withdrawal from the U.S.-Japan-Philippines trilateral framework severs a critical link in Washington's Indo-Pacific chain. Japan is left to manage its security anxieties alone, and American credibility across the region is shaken."
 CHI_Information_Warfare: "Information Warfare"
 CHI_Information_Warfare_desc: "Deploy state media, social media operations, and strategic narratives to shape public opinion in target countries and counter Western information dominance."
 CHI_informatized_local_wars: "Win Informatized Local Wars"
 CHI_informatized_local_wars_desc: "We no longer prepare for total war on the northern plain. The guiding doctrine becomes winning local wars under informatized conditions: short, sharp, high-technology campaigns on China's periphery, decided by who sees and strikes first across a networked battlefield. Every reform below now serves this single demand."
 CHI_inner_party_supervision_regulations: "Inner-Party Supervision Regulations"
 CHI_inner_party_supervision_regulations_desc: "Our inner-party accountability has relied too long on informal norms and personal connections. We must adopt formal supervision regulations establishing mandatory procedures for superior organs to inspect, report on, and sanction subordinate party committees. Codifying these mechanisms will reduce the space for local officials to operate as untouchable fiefdoms."
 CHI_integrated_air_and_space: "Integrated Air and Space"
 CHI_integrated_air_and_space_desc: "The air force must stop being the army's umbrella and become a strategic service in its own right. We pursue 'integrated air and space operations, prepared for both offence and defence', the doctrine adopted in 2004 that binds fighters, bombers, missiles, satellites and early warning into a single reach. The sky and near space become one theatre, and it must be ours."
 CHI_intra_party_democracy_experiments: "Intra-Party Democracy Experiments"
 CHI_intra_party_democracy_experiments_desc: "Several localities have conducted multi-candidate competitive elections for party positions at county and township level. Proponents argue that competitive selection will strengthen legitimacy and improve governance; critics warn that contested elections will erode ideological discipline and create factional competition. The outcome of these experiments will determine whether we expand or suppress the model."
 CHI_invigorate_country_through_STE: "Invigorate the Country Through STE"
 CHI_invigorate_country_through_STE_desc: "In 1995, near the end of his tenure, Jiang Zemin advanced the strategy of rejuvenating the nation through science and education. By prioritizing research investment, technological catch-up, and higher education, the plan aims to close the gap with the developed world and shift China from a labor-driven economy toward one built on knowledge."
 CHI_iron_ore_pricing_war: "The Iron Ore Pricing Battle"
 CHI_iron_ore_pricing_war_desc: "Baosteel has taken over from Nippon Steel as lead negotiator for Chinese buyers in the annual iron ore benchmark talks with Rio Tinto, BHP Billiton, and Vale. The system collapses as spot purchases by smaller Chinese mills undermine the benchmark. The arrest of Rio Tinto executive Stern Hu in Shanghai and the failed Chinalco bid for an 18 percent stake in Rio Tinto mark the peak of diplomatic friction, and we must respond by accelerating overseas mining investment in Australia and West Africa to diversify our supply."
 CHI_j10c_multirole_refit: "The J-10C Refit"
 CHI_j10c_multirole_refit_desc: "The J-10 grows teeth. The J-10C adds an AESA radar, the long-range PL-15 missile and, from 2021, a domestic WS-10B engine, turning the light fighter into a genuine multirole threat that has since drawn blood in South Asian skies."
 CHI_j11b_sinification: "Sinify the J-11"
 CHI_j11b_sinification_desc: "The Su-27 licence built at Shenyang becomes a Chinese aircraft. The J-11B swaps Russian radar, avionics and missiles for domestic systems, freeing the Flanker line from Moscow's spares and proving Chinese industry can re-engineer a frontline fighter end to end."
 CHI_j16_strike_platform: "The J-16 Strike Platform"
 CHI_j16_strike_platform_desc: "The J-16 'Qianlong', a twin-seat heavyweight grown from the Flanker, carries an AESA radar, the deepest weapons load in the fleet and a long reach. Now China's go-to jet for pressing on Taiwan's airspace, it is the multirole strike platform around which the modern air wing is built."
 CHI_jh7a_update: "The JH-7A Update"
 CHI_jh7a_update_desc: "The JH-7A 'Flying Leopard', a rugged twin-seat fighter-bomber, is upgraded with new precision weapons and targeting pods, keeping a cheap and proven maritime-strike aircraft relevant alongside the newer fleet."
 CHI_jiang_doctrine_taiwan: "The Jiang Doctrine on Taiwan"
 CHI_jiang_doctrine_taiwan_desc: "Jiang's Eight-Point Proposal frames cross-strait policy around peaceful reunification while explicitly refusing to rule out force. Integrating this doctrine with the PLA's growing anti-access arsenal gives us a credible coercive framework and raises the cost of Taiwan's de jure independence to a level no government in Taipei can politically afford to pay."
 CHI_jiangnan_changxing_move: "The Jiangnan-Changxing Move"
 CHI_jiangnan_changxing_move_desc: "Cramped in the heart of old Shanghai, the historic Jiangnan yard cannot grow. We move it downriver to Changxing Island, to vast new halls and deep-water berths built to lay warships by the dozen. The relocation multiplies our building capacity at a stroke and becomes the forge of the modern fleet."
 CHI_jiangnan_scale: "Scale Up Jiangnan Shipyard"
 CHI_jiangnan_scale_desc: "Warships are won at the slipway before they are won at sea. The Jiangnan yard's vast new halls on Changxing Island are pushed to full tempo, laying destroyers and carriers in parallel where rivals lay them one at a time."
 CHI_joint_operations_command: "Joint Operations Command"
 CHI_joint_operations_command_desc: "Victory now belongs to whoever fuses land, sea, air and rocket forces into one fist. We stand up a genuine joint operations command, wiring the five theatres into a single picture so that a battle is fought by the whole armed forces at once, not by services taking turns. This unlocks the theatre-command structure."
 CHI_Joint_Operations_tt: "Triggers a strategic-choice event. The defensive option forms or extends the SCO faction with Afghanistan, Pakistan, and Tajikistan. The punitive and total-war options instead create wargoals on the Taliban and TTP through Pakistan's response."
 CHI_joint_stock_city_banks: "Joint-Stock Commercial Banks and City Banks"
 CHI_joint_stock_city_banks_desc: "Below the Big Four, a rich second tier has developed. China Merchants Bank has become the retail banking leader with strong mobile banking; China Minsheng Bank, the first non-state bank, serves small and medium enterprises; HSBC holds a 19.9 percent stake in Bank of Communications. Over 130 city commercial banks anchor regional finance in tier-two and tier-three cities, driving broader credit access for private firms and faster adoption of digital banking services. This diversity of institutions is a strength we should cultivate."
 CHI_joint_venture_framework: "Joint Venture Industrial Framework"
 CHI_joint_venture_framework_desc: "A comprehensive framework governs technology transfer, local content requirements, and profit repatriation in joint ventures. Foreign firms gain market access; Chinese partners gain technology and management knowledge that gradually flows into domestic firms."
 CHI_keep_the_shell_companies: "Keep the Shell Companies"
 CHI_keep_the_shell_companies_desc: "Ordered to divest, we divest only on paper. The military's enterprises are re-registered under cousins, front men and shell companies, their profits still flowing back to the units that own them. The auditors find empty offices; the generals keep their revenue."
 CHI_kj2000_mainring_awacs: "The KJ-2000 Mainring"
 CHI_kj2000_mainring_awacs_desc: "After Washington blocked the Israeli Phalcon sale, China built its own. The KJ-2000, an indigenous active-array radar mounted on an Il-76, gives the air force its first true airborne command post, letting fighters strike at targets they could not yet see for themselves."
 CHI_kj500_network_centric_hub: "The KJ-500 Network Hub"
 CHI_kj500_network_centric_hub_desc: "The KJ-500, a fixed three-array radar on a Y-9 turboprop, is the workhorse eye in the sky. Produced in numbers, it data-links fighters, ships and missiles into one picture, the flying hub of network-centric war."
 CHI_KPA_Offensive_Readiness: "KPA Offensive Readiness"
 CHI_KPA_Offensive_Readiness_desc: "We quietly endorse a shift in the Korean People's Army's posture from defense-in-depth to forward offensive readiness. Equipment transfers accelerate, and joint planning sessions are expanded. The peninsula moves closer to the edge."
 CHI_leader_of_the_people: "Renmin Lingxiu"
 CHI_leader_of_the_people_desc: "The Third Historical Resolution of the Communist Party formalizes the title Renmin Lingxiu, 'People's Leader,' a designation applied to only two figures in Party history: Mao Zedong and Xi Jinping. Mao's portrait still hangs above Tiananmen Gate. The Party's third historical moment has found its historical figure, and the meaning of that continuity is not lost on anyone who reads the resolution carefully."
 CHI_leading_small_group_doctrine: "Central Leading Groups"
 CHI_leading_small_group_doctrine_desc: "Central leading small groups now oversee finance, economic reform, foreign affairs, cybersecurity, and military reform simultaneously, all chaired from a single office. The arrangement bypasses the Politburo's traditional committee structure and concentrates decision-making where it can move without delay. The technocrats execute; the center coordinates. Policy moves faster, and every output is subordinated to a single will."
 CHI_Let_Seoul_Lead: "Let Seoul Lead"
 CHI_Let_Seoul_Lead_desc: "We signal our acceptance of South Korean leadership in any eventual unification process. Seoul's democratic institutions and economic weight make it the natural anchor of a unified Korea. We step back to let the Koreans determine their own future."
 CHI_liangjiang_new_area: "Liangjiang National New Area"
 CHI_liangjiang_new_area_desc: "Liangjiang in Chongqing becomes the first inland national-level new area, following Pudong in Shanghai and Binhai in Tianjin. The zone has attracted Ford, HP, and over 300 Fortune 500 enterprises and already produces 1.19 million vehicles annually. Xi'an's Guanzhong Plain receives parallel investment, positioning Shaanxi as the commercial and industrial anchor of the northwest. The model is proven; the scale is what we must now expand."
 CHI_Lips_and_Teeth_Doctrine: "Lips and Teeth Doctrine"
 CHI_Lips_and_Teeth_Doctrine_desc: "We reaffirm the historic bond with North Korea. The two countries are, as always, as close as lips and teeth. Pyongyang's survival is our strategic imperative, and we will act accordingly regardless of international pressure."
 CHI_Lithium_Triangle_Accord: "Lithium Triangle Accord"
 CHI_Lithium_Triangle_Accord_desc: "Argentina, Bolivia, and Chile together hold more than half of the world's recoverable lithium reserves. Long-term offtake agreements and equity stakes in extraction ventures give Chinese battery and electric vehicle manufacturers reliable access to the raw material that defines the next energy paradigm. The accords insulate Chinese supply chains from Western purchasing coalitions."
 CHI_Liu_Huaqing_Doctrine: "Liu Huaqing Doctrine"
 CHI_Liu_Huaqing_Doctrine_desc: "Admiral Liu Huaqing, the architect of our modern naval strategy, identified the First and Second Island Chains as the strategic perimeter within which our sea power must establish unchallenged dominance before projecting further. The South China Sea lies entirely within the First Chain. We cannot project outward until it is fully secured, and we cannot delay that security indefinitely."
 CHI_liu_huaqing_first_island_chain: "Liu Huaqing's First Island Chain"
 CHI_liu_huaqing_first_island_chain_desc: "The line runs from the Kuriles through the Ryukyus and Taiwan to Borneo, and behind it the near seas must be made ours. Admiral Liu Huaqing, father of the modern PLAN, taught that a green-water navy must first dominate the First Island Chain before it can dream of the open ocean. His offshore-defence doctrine sets our course: deny the approaches, master the near seas, then look beyond."
 CHI_livestream_commerce: "Live-Streaming Commerce"
 CHI_livestream_commerce_desc: "Taobao Live merges entertainment with real-time purchasing at a scale no Western equivalent has reached. Viya and Austin Li generate billions in single-session sales; 40 percent of our e-commerce now runs through live-stream channels. MCN agencies manage thousands of creators, and regulators enforce strict tax compliance to ensure that the wealth flowing through these platforms reaches the state in proportion. The format is ours to define, and the world is watching."
 CHI_logistic_modernisation: "Modernise Logistics"
 CHI_logistic_modernisation_desc: "Reforms at the front mean nothing if the supply tail snaps. We standardise containers, palletise loads and digitise the supply chain under the new Joint Logistic Support Force, so that a brigade can be sustained as fast as it can advance."
 CHI_long_march_modernisation: "Long March Modernisation"
 CHI_long_march_modernisation_desc: "The Chang Zheng family of launch vehicles, developed by the China Aerospace Science and Technology Corporation, forms the backbone of our entire space programme. Upgrading assembly lines and improving propellant handling across the CZ-2, CZ-3, CZ-5, and CZ-7 variants raises launch cadence and reliability, while cross-cutting advances in propulsion engineering feed directly into our missile programmes."
 CHI_long_range_firepower: "Long-Range Firepower"
 CHI_long_range_firepower_desc: "Reach beats mass. We push long-range rockets and loitering munitions into the heavy brigades, letting them shatter an enemy's depth, his command posts and his reserves before the tanks ever close to contact."
 CHI_loongson_riscv: "Loongson and RISC-V Architecture"
 CHI_loongson_riscv_desc: "The Institute of Computing Technology's Loongson processor line provides a domestic alternative to x86 and ARM for government servers and embedded systems. Alongside Loongson, the open RISC-V instruction set architecture has attracted our investment through the RISC-V International organisation and domestic startups including Alibaba's T-Head, Nuclei System Technology, and SiFive China. RISC-V's open licensing insulates our domestic designs from US export-control exposure on instruction-set architectures, and that insulation is worth more every year."
 CHI_lunar_sample_return: "Lunar Sample Return"
 CHI_lunar_sample_return_desc: "Chang'e 5 returned 1.73 kilograms of lunar basalt from Mons Rumker in December 2020, the first new Moon samples on Earth since the Soviet Luna 24 mission in 1976. Chang'e 6 followed in June 2024, recovering material from the far side's South Pole-Aitken Basin, a first for any space programme. We concentrate our resources on this robotic science path, extending the sample-return architecture to new sites and accelerating the research it enables."
 CHI_made_in_china_2025: "Made in China 2025"
 CHI_made_in_china_2025_desc: "We can no longer remain the world's factory floor. Ten priority sectors are identified for transformation into high-technology leadership: robotics, aerospace, electric vehicles, advanced medical devices, semiconductors, and more. State subsidies, technology acquisition programmes, and mandated domestic procurement targets are our instruments. Washington and Brussels will be displeased, but this is a direction we must hold."
 CHI_Maritime_Silk_Road_Indian_Ocean: "String of Pearls Strategy"
 CHI_Maritime_Silk_Road_Indian_Ocean_desc: "A chain of port investments and logistics facilities across the Indian Ocean littoral, including Hambantota in Sri Lanka and Doraleh in Djibouti, extends our commercial and potential naval reach from the South China Sea to the Horn of Africa. Critics describe the pattern as a String of Pearls encircling India. They are not entirely wrong, and that is precisely the point."
 CHI_mass_line_education: "The Mass Line"
 CHI_mass_line_education_desc: "The Party's Mass Line campaign calls on officials to reject formalism, bureaucratism, hedonism, and extravagance. Lavish banquets are banned; expensive watches confiscated from those photographed wearing them in public. Our relationship with the people must be reframed as service rather than entitlement. The message is as politically convenient as it is genuinely popular, and we should not waste it."
 CHI_mass_line_renewed: "Renewed Mass Line"
 CHI_mass_line_renewed_desc: "Mao Zedong's Mass Line held that the party must learn from the people before it can lead them. Cadres and students are dispatched to rural townships and factory floors. Listening campaigns replace top-down directives, and the accumulated experience of the masses is folded back into party policy. The revolution is not a dinner party."
 CHI_mature_node_counter_offensive: "Mature-Node Counter-Offensive"
 CHI_mature_node_counter_offensive_desc: "After Western export controls restricted our advanced-node expansion, we redirect capacity investment to mature nodes below 28nm. SMIC, Hua Hong, CXMT, and dozens of smaller fabs launch parallel expansions in Shanghai, Shenzhen, and Hangzhou. We now account for over 33 percent of global mature-node capacity additions. Western governments, alarmed at the prospect of Chinese dominance in the mature-node segment supplying automotive, industrial, and defence electronics, are debating secondary tariffs. We must consolidate our position before those tariffs arrive."
 CHI_Media_Offensive: "Media Offensive"
 CHI_Media_Offensive_desc: "Launch a coordinated global media campaign through CGTN, Xinhua, and social media platforms to project Chinese perspectives and counter hostile narratives."
 CHI_Mekong_Riparian_Cooperation: "Lancang-Mekong Cooperation"
 CHI_Mekong_Riparian_Cooperation_desc: "The Lancang-Mekong Cooperation mechanism organizes joint infrastructure development, water resource management, and trade facilitation among the six riparian states that share the river system. Our upstream dam construction and navigation improvement projects give us considerable leverage over downstream neighbors who depend on flow we control. We should formalize this framework before that leverage is characterized as coercion."
 CHI_memory_independence: "Memory Chip Independence"
 CHI_memory_independence_desc: "YMTC, headquartered in Wuhan with Big Fund backing, has reached 128-layer 3D NAND production and achieved 232-layer Xtacking architecture matching Samsung and Micron at a comparable generation. CXMT in Hefei produces DDR4 at 17nm and is developing DDR5-compatible process flows. Apple's brief qualification of YMTC NAND demonstrated that our memory had reached commercial grade before US pressure forced its removal from Apple's supplier list. CXMT's HBM2 line has begun mass production ahead of schedule, qualifying for Cambricon and Biren AI accelerator builds and ending the foreign-memory dependency in our high-performance compute supply chain."
 CHI_mengshi_program: "The Mengshi Program"
 CHI_mengshi_program_desc: "The Mengshi, China's armoured light vehicle in the mould of the Humvee, motorises the light infantry with a tough, mine-resistant ride that can mount machine guns, missiles or a remote weapon station."
 CHI_miit_licensing_framework: "MIIT Licensing and Carrier Restructuring"
 CHI_miit_licensing_framework_desc: "The Ministry of Industry and Information Technology must formalise the licensing framework that separates our former Posts and Telecommunications monopoly into distinct commercial carriers. Spectrum allocation rules, interconnection pricing, and a universal service obligation are codified, creating the regulatory foundation on which China Mobile, China Unicom, and China Telecom will build the world's largest 4G and 5G networks. The monopoly era served its purpose; competition will serve the next phase."
 CHI_military_training_outline: "The New Training Outline"
 CHI_military_training_outline_desc: "A new Military Training Outline is issued across the force, the rulebook that sets every unit's standards and tasks. For the first time it is written around joint, networked operations, binding the whole army to one demanding measure of readiness."
 CHI_mobile_payment_duopoly: "The Mobile Payment Duopoly"
 CHI_mobile_payment_duopoly_desc: "Alipay, launched as an Alibaba escrow service, has grown into an independent payments platform. WeChat Pay gained 200 million users in five days through a Chinese New Year red envelope campaign. QR codes now replace cash in over 90 percent of our transactions, shutting out Visa, Mastercard, and Western fintechs before they could establish a meaningful foothold. We have built the world's most advanced consumer payments infrastructure, and it operates entirely outside Western financial architecture."
 CHI_money_alliance: "The Alliance of Money"
 CHI_money_alliance_desc: "Wealth and command fuse into one faction. The richest officers and the smuggling magnates who fund them bind themselves together, strong enough to protect their own and to dictate terms to the Party that nominally commands them."
 CHI_Monroe_Doctrine_Inverted: "Monroe Doctrine Inverted"
 CHI_Monroe_Doctrine_Inverted_desc: "Decades of patient investment, diplomatic outreach, and infrastructure credit have repositioned us as Latin America's indispensable external partner, a role the United States once treated as its exclusive domain. Washington's ability to mobilize hemispheric coalitions against us has eroded to the point where the Monroe Doctrine is no longer enforced in practice. The Americas are no longer an American lake. We should ensure they never become one again."
 CHI_national_overall_emergency_response_plan: "National Emergency Response Plan"
 CHI_national_overall_emergency_response_plan_desc: "The SARS crisis exposed the gaps in our national emergency preparedness with painful clarity. We must establish a unified response framework covering natural disasters, public health emergencies, accidents, and social unrest, with pre-positioned resources, clear command structures, and inter-agency coordination protocols at every administrative level. The next crisis will not announce itself."
 CHI_naura_amec: "NAURA and AMEC Equipment Programmes"
 CHI_naura_amec_desc: "NAURA Technology Group and Advanced Micro-Fabrication Equipment produce etch, CVD, and PVD tools for our domestic fabs. NAURA has secured qualification at SMIC for 28nm etching equipment; AMEC's Primaxx etch tools have entered high-volume production lines. Both firms benefit from SMIC's captive demand and Big Fund capital injections. Their combined tool portfolio now covers roughly 40 percent of the process steps required for a mature-node logic fab. The remaining 60 percent is where we must focus next."
 CHI_nco_corps_reform: "A Professional NCO Corps"
 CHI_nco_corps_reform_desc: "A modern army is held together by its sergeants, not only its colonels. We build a true non-commissioned officer corps, career soldiers with rank, pay and authority, replacing the old reliance on short-term conscripts and closing the gap between officer and recruit."
 CHI_new_energy_vehicles_startups: "The New Energy Vehicle Pioneers"
 CHI_new_energy_vehicles_startups_desc: "NIO, XPeng, Li Auto, Huawei's HIMA alliance, and Xiaomi entered the automotive sector between 2014 and 2024, backed by technology capital rather than state enterprises. Each brought smartphone-era software, AI capabilities, and consumer brand recognition into vehicles. Xiaomi's SU7 sedan drew 88,898 pre-orders in 24 hours; the YU7 SUV secured 240,000 locked orders on its first day."
 CHI_New_World_Order: "New World Order"
 CHI_New_World_Order_desc: "Our information dominance and media reach have laid the groundwork for a fundamental challenge to the Western-led international order. We must now leverage our influence networks, state media, and covert tools to promote a multipolar world in which our own norms and governance models set the global agenda."
 CHI_norinco_rationalism: "NORINCO Rationalised"
 CHI_norinco_rationalism_desc: "China North Industries, sprawling maker of everything from service rifles to artillery, is pruned and focused. Redundant lines close, profitable ones consolidate, and the ground forces' arsenal finally speaks with one industrial voice."
 CHI_northeast_revitalization_plan: "Northeast Revitalization Plan"
 CHI_northeast_revitalization_plan_desc: "The rust belt provinces of Liaoning, Jilin, and Heilongjiang declined sharply after SOE reform. The central government launches a revitalization programme in 2003, channelling infrastructure investment, preferential credit, and relocated industrial capacity into the region."
 CHI_northeast_russia_corridor: "Northeast-Russia Economic Corridor"
 CHI_northeast_russia_corridor_desc: "Cross-border trade infrastructure linking Heilongjiang province to the Russian Far East is upgraded, enabling resource flows, cross-border investment, and joint development projects. The corridor reinforces the Sino-Russian strategic partnership with commercial substance."
 CHI_open_the_august_1st_building: "Open the August 1st Building"
 CHI_open_the_august_1st_building_desc: "The August 1st Building houses the Central Military Commission, where the People's Liberation Army answers to the Party and to no one else. The Nanchang uprising of 1 August 1927 gave the Party its first rifles; the date still names the army itself. Now its remaking begins: corruption purged or indulged, divisions rebuilt into brigades, an air force fused with space, and a coastal guard remade into a blue-water fleet."
 CHI_Operation_New_Dawn: "Operation New Dawn"
 CHI_Operation_New_Dawn_desc: "The moment has come. Chinese-backed officers within the KPA move against the Kim family compound. What follows will be brief, violent, and decisive. The North Korean state will survive; its leadership will not."
 CHI_Oppose_Strategic_Flexibility: "Oppose Strategic Flexibility"
 CHI_Oppose_Strategic_Flexibility_desc: "Washington's doctrine of 'strategic flexibility', permitting American forces in South Korea to deploy beyond the peninsula, represents an unacceptable encroachment on our security interests. We formally demand its rollback."
 CHI_organisation_department_mandate: "Organisation Department Mandate"
 CHI_organisation_department_mandate_desc: "The CCP Organisation Department manages the appointment, evaluation, and transfer of over 70 million party cadres, which means that whoever controls the department controls the party's personnel future. Under Zeng Qinghong's direction, the department has tightened control over provincial leadership appointments and reoriented its assessment criteria to favour officials with strong industrial development records."
 CHI_organisation_department_mandate_tt: "The §Y$CHI_organisation_department_1$§! will always be active when §YZeng Qinghong§! is the country leader."
 CHI_original_innovation_problem: "The Original Innovation Problem"
 CHI_original_innovation_problem_desc: "Copying carried us to the frontier; it cannot carry us past it. The hardest reform is cultural, demanding the original innovation that bureaucratic science has long smothered. We fund the risk, tolerate the failure, and reward the breakthrough that no foreign blueprint can supply."
 CHI_own_designs: "Our Own Designs"
 CHI_own_designs_desc: "For a generation we reverse-engineered Soviet drawings and called it progress. No longer. The design bureaus are told to originate rather than imitate, and to put a Chinese stamp on the next weapon instead of a borrowed one."
 CHI_Pacific_Island_Forum_Pivot: "Pacific Island Forum Pivot"
 CHI_Pacific_Island_Forum_Pivot_desc: "We must accelerate our diplomatic offensive across Pacific Island states, offering debt-light infrastructure grants, fisheries agreements, and diplomatic recognition packages. The Forum itself becomes a contested arena as we cultivate swing votes and sponsored observers. Australia and New Zealand, which have historically dominated Pacific institutional frameworks, will find their leadership challenged at every ministerial session until they concede our standing."
 CHI_Pax_Sinica: "Pax Sinica"
 CHI_Pax_Sinica_desc: "A Sino-centric international order, one in which our economic weight, infrastructure dependency, and political alignment displace the liberal rules-based order as the organizing principle of global affairs. Scholars have named it Pax Sinica. We simply call it the world as it should be. Achieving it would represent the culmination of our century of rejuvenation."
 CHI_Peaceful_Development: "Peaceful Development"
 CHI_Peaceful_Development_desc: "Demonstrate through action that China's rise is a force for global stability. Invest in peacekeeping, disaster relief, and development aid to build a reputation as a responsible power."
 CHI_pearl_river_delta_tech_cluster: "Pearl River Delta Electronics Cluster"
 CHI_pearl_river_delta_tech_cluster_desc: "The Pearl River Delta consolidates its position as the world's largest electronics manufacturing base. Shenzhen hosts Huawei and ZTE; Dongguan fills with Taiwan's contract manufacturers; the entire region functions as a single integrated supply chain for global consumer electronics."
 CHI_Peninsula_Strategy: "The Peninsula Strategy"
 CHI_Peninsula_Strategy_desc: "We stand at a crossroads on the Korean Peninsula. Decades of calculated ambiguity must give way to a deliberate strategic posture. We will choose our path carefully, knowing that each option carries irreversible consequences for the regional order."
 CHI_peoples_armed_police_integration: "Integrate the Armed Police"
 CHI_peoples_armed_police_integration_desc: "The People's Armed Police, two million strong, is folded firmly under the Central Military Commission from 2018, securing the rear and the border so the field army is freed to fight outward."
 CHI_Petrocaribe_Successor: "Successor to Petrocaribe"
 CHI_Petrocaribe_Successor_desc: "Venezuela's preferential oil programme for Caribbean and Central American states has collapsed under sanctions and economic mismanagement. We should step in as the stabilizing creditor, extending oil-backed loans to Caracas, Havana, and Managua in exchange for long-term supply pledges. The arrangement deepens our ties to governments already isolated from Western capital markets, and their gratitude will be durable."
 CHI_Petroyuan_Settlement: "Petroyuan Initiative"
 CHI_Petroyuan_Settlement_desc: "We must launch yuan-denominated crude oil futures on the International Energy Exchange, creating a mechanism for BRI energy exporters to settle contracts in renminbi rather than US dollars. Sustained adoption will erode petrodollar dominance and reduce our exposure to US financial sanctions. Every barrel priced in yuan is a step toward an international financial system we can trust."
 CHI_pgz_gun_missile_hybrid: "Gun-Missile Hybrid Defence"
 CHI_pgz_gun_missile_hybrid_desc: "The PGZ self-propelled system marries radar-laid autocannon with short-range missiles on one chassis, cutting down the low-flying aircraft, helicopters and drones that slip beneath the missile envelope."
 CHI_phl_mlrs_modernisation: "PHL Rocket Modernisation"
 CHI_phl_mlrs_modernisation_desc: "The PHL-03 and the modular PHL-16 give the army long-range rocket artillery reaching hundreds of kilometres, blurring the line between rocket battery and tactical missile and letting a brigade strike deep behind the front."
 CHI_pipechina_gas_reform: "PipeChina Unbundling"
 CHI_pipechina_gas_reform_desc: "China Oil and Gas Piping Network Corporation receives approximately 600 billion yuan in pipeline assets, storage facilities, and LNG terminals transferred from CNPC, Sinopec, and CNOOC. The X+1+X model places a single neutral midstream operator between many upstream producers and many downstream distributors, opening infrastructure that the national oil companies had previously controlled exclusively. ENN Energy, China Resources Gas, Beijing Enterprises, and foreign LNG suppliers all gain access, and the market for gas distribution becomes genuinely competitive for the first time."
 CHI_Piraeus_Model: "Piraeus Port Model"
 CHI_Piraeus_Model_desc: "COSCO's acquisition of a majority stake in the Port of Piraeus transformed Greece's principal commercial harbour into the busiest container port in the Mediterranean and a template for our port management across Europe. The model delivers measurable economic returns to host governments while embedding our operational control at strategic chokepoints. Minor equity stakes in Lisbon and Hamburg keep those capitals engaged without triggering the regulatory scrutiny a majority acquisition would invite."
 CHI_plz_howitzer_program: "The PLZ Howitzer Program"
 CHI_plz_howitzer_program_desc: "The artillery, long the pride and the bottleneck of the army, goes fully self-propelled. The PLZ-05, a 155mm tracked howitzer in service from 2008, matches Western range and rate of fire and forms the gun line of every heavy brigade."
 CHI_Polar_Silk_Road: "Polar Silk Road"
 CHI_Polar_Silk_Road_desc: "Our Arctic Policy White Paper declares China a \"near-Arctic state\" and endorses the development of transpolar shipping routes as a northern extension of the Maritime Silk Road. Melting sea ice is making the Northern Sea Route commercially viable, cutting transit times between us and Europe by up to two weeks. We should claim our place in the Arctic's governance architecture before others close the door."
 CHI_policy_banks_cdb: "Policy Banks"
 CHI_policy_banks_cdb_desc: "China Development Bank, Export-Import Bank of China, and Agricultural Development Bank of China form a parallel financing architecture that operates outside normal commercial constraints. CDB is now the world's largest development finance institution, larger than the World Bank and the Asian Development Bank combined, financing the Three Gorges Dam, high-speed rail, and over 600 billion US dollars in Belt and Road infrastructure loans across more than 100 countries. These three banks are not merely financial institutions; they are instruments of national strategy."
 CHI_politics_law_commision_realigned: "Political-Legal Commission Realigned"
 CHI_politics_law_commision_realigned_desc: "The Political and Legal Affairs Commission coordinates the security apparatus, the courts, and the procuratorate. Aligning it firmly behind the Chongqing Model means building a surveillance infrastructure that can identify threats before they crystallise, insulating the revolution from foreign subversion and internal sabotage alike."
 CHI_poly_goes_global: "Poly Goes Global"
 CHI_poly_goes_global_desc: "Poly Technologies carries Chinese rifles and missiles into Africa, the Middle East and Latin America, while Poly Culture turns the proceeds into auction houses and real estate. The army's trading house becomes a global conglomerate, its dealing our diplomacy, its profits beyond the reach of any budget."
 CHI_Post_Armistice_Architecture: "Post-Armistice Architecture"
 CHI_Post_Armistice_Architecture_desc: "We and the United States jointly propose a replacement for the 1953 Armistice: a comprehensive peace framework that would formally end the Korean War and establish regional security guarantees acceptable to all parties."
 CHI_Predatory_Lending_Doctrine: "The Hambantota Doctrine"
 CHI_Predatory_Lending_Doctrine_desc: "When Sri Lanka could not service its Hambantota Port loan, it signed a 99-year lease transferring operational control to one of our state enterprises. We should formalize this model: structure projects from the outset so that strategic assets become collateral, convertible to long-term access rights upon default. The debtor chooses the terms by choosing whether to repay."
 CHI_private_oem_rise: "Rise of the Private OEMs"
 CHI_private_oem_rise_desc: "Only the Big Four SOEs were designated as joint-venture partners, but provincial governments backed their own manufacturers regardless. Chery Automobile in Wuhu, Geely in Zhejiang, and Great Wall Motors in Baoding each found paths to legal production and built their way up. Private manufacturers now build a third of our passenger vehicles, filling the SUV, low-cost, and EV segments the joint ventures chose to ignore. We would do well to support them."
 CHI_project_921: "Project 921"
 CHI_project_921_desc: "In September 1992 the Central Military Commission approved Project 921, the master plan for a Chinese human spaceflight capability. The decision established CASC's human spaceflight office, funded the Shenzhou spacecraft design, and committed the nation to reaching orbit under its own colours."
 CHI_project_998: "Project 998"
 CHI_project_998_desc: "In 1995 and 1996 two American carrier groups sailed into the Taiwan Strait and our navy could only watch. Project 998 is the answer to that humiliation: a sustained naval buildup aimed at the day the carriers return, trading a coastal defence force for one that can contest the waters off our own coast."
 CHI_Project_Coordination_Cell: "BRI Project Coordination Group"
 CHI_Project_Coordination_Cell_desc: "Our BRI corridors span dozens of countries and hundreds of projects, and without a coordinating body they will accumulate delays, redundancies, and political vulnerabilities. The International Department of the Central Committee, Zhonglianbu, should chair a cross-ministry group to screen applications, assign project managers, and monitor delivery timelines. Order produces results. Results sustain confidence."
 CHI_project_jxx: "Project J-XX"
 CHI_project_jxx_desc: "Begun in the late 1990s as Project J-XX, the programme yields the J-20 'Mighty Dragon', flown in 2011 and in service by 2017. Stealthy, long-ranged and missile-heavy, it is the first fifth-generation fighter outside America and Russia, built to hunt the tankers and early-warning aircraft on which any Pacific war machine depends. China joins the smallest club in the sky."
 CHI_project_no_10: "Project Number 10"
 CHI_project_no_10_desc: "The J-10, born of the secret Project 10, is China's first modern indigenous fighter, a single-engine multirole jet from Chengdu that owes its layout to no Soviet drawing. It is the aircraft on which a national fighter industry first learns to stand on its own."
 CHI_property_tax_pilot_program: "Property Tax Pilot Programme"
 CHI_property_tax_pilot_program_desc: "Shanghai and Chongqing have launched the first property tax pilots, levying modest rates on second homes and high-value primary residences. The pilots aim to dampen speculative purchasing and diversify local government revenue away from land-sale income. If the results hold, we should extend the model nationwide before the property market becomes a liability too large to manage."
 CHI_provincial_reshuffle: "Provincial Leadership Reshuffle"
 CHI_provincial_reshuffle_desc: "Zeng has engineered a sweeping personnel rotation at the National People's Congress. Shanghai faction veterans receive key positions: Chen Liangyu as Shanghai party secretary, Huang Ju elevated to the Politburo Standing Committee, Jia Qinglin taking the CPPCC chairmanship. The reshuffle entrenches princeling influence over the richest provinces and the state consulting apparatus."
 CHI_provincial_youth_league_cohort: "Promote the Provincial Youth League Cohort"
 CHI_provincial_youth_league_cohort_desc: "Li Keqiang in Henan. Wang Yang in Chongqing. Liu Yandong rising. The Tuanpai bench is deep and patient - let it advance."
 CHI_public_health_reconstruction: "New Rural Cooperative Medical Scheme"
 CHI_public_health_reconstruction_desc: "The New Rural Cooperative Medical Scheme pools contributions from rural residents, local government, and the central budget to cover catastrophic medical costs. It is the first systematic rural health insurance programme in our republic's history, and we should drive it to near-universal coverage as quickly as possible. Eight hundred million farmers should not face financial ruin simply because they fell ill."
 CHI_public_rental_housing_drive: "Public Rental Housing Drive"
 CHI_public_rental_housing_drive_desc: "Millions of urban migrant workers and college graduates live in makeshift accommodations at the mercy of private landlords. The state will mobilise construction resources to build affordable public rental units across major cities, charging subsidised rents and offering purchase rights after three years of tenancy."
 CHI_pudong_financial_hub: "Pudong Financial Centre"
 CHI_pudong_financial_hub_desc: "Shanghai's Pudong New Area is developed as China's primary offshore financial hub. The construction of the Lujiazui skyline, the Shanghai Stock Exchange, and bonded trade zones signals China's ambition to challenge Hong Kong and Singapore as regional financial centres."
 CHI_qbz191_rifle: "The QBZ-191 Rifle"
 CHI_qbz191_rifle_desc: "The ageing QBZ-95 bullpup gives way to the QBZ-191, a conventional-layout rifle with rail-mounted optics fielded from 2019. A modern weapon for an infantryman now expected to fight networked, not alone."
 CHI_qinghai_tibet_railway_planning: "Qinghai-Tibet Railway"
 CHI_qinghai_tibet_railway_planning_desc: "The Qinghai-Tibet Railway will run 1,956 kilometres at an average altitude of 4,500 metres, crossing the Tanggula Pass. Once completed, it will be the highest railway in the world and our first direct rail link to Lhasa, integrating Tibet economically and logistically with the rest of the country in a way no road or airfield ever could."
 CHI_quiet_succession_engineering: "Engineering the Succession"
 CHI_quiet_succession_engineering_desc: "Zeng Qinghong's authority over the Organisation Department gives him decisive influence over the succession contest now opening up. He should tip it in favour of Xi Jinping over the Youth League-backed Li Keqiang. A first-ranked seat on the Politburo Standing Committee will effectively confirm Xi as the next General Secretary, and we will have shaped the next decade of party leadership before the matter is publicly settled."
 CHI_ranks_for_sale: "Ranks for Sale"
 CHI_ranks_for_sale_desc: "Promotion becomes a price list. As Xu Caihou did from 1999, every star is sold to the highest bidder, with cash delivered in boxes marked by the buyer's name. When his Beijing home was finally searched, investigators hauled out more than a tonne of currency. An officer corps that bought its rank will fight for its investment, not its country."
 CHI_rapid_reaction_corps: "The Rapid Reaction Corps"
 CHI_rapid_reaction_corps_desc: "Elite airborne and air-assault formations are held at constant readiness, able to deploy across China or beyond it within hours. They turn a regional crisis into a settled fact before rivals can gather a response."
 CHI_rare_earth_dominance: "Rare Earth Development Strategy"
 CHI_rare_earth_dominance_desc: "China controls roughly 85 percent of global rare earth production, concentrated in Inner Mongolia and Jiangxi. A state-directed consolidation programme reduces illegal mining, raises processing standards, and positions China as the indispensable supplier for global advanced manufacturing."
 CHI_rare_earth_leverage: "The Rare Earth Lever"
 CHI_rare_earth_leverage_desc: "We refine the rare earths the world's weapons cannot do without, close to ninety percent of global supply, the magnets inside every guided missile and stealth fighter. What was an export becomes a lever: choke the supply, and a rival's arsenal seizes shut while ours runs free."
 CHI_Reclaim_The_Heavenly_Waters: "Reclaim the Heavenly Waters"
 CHI_Reclaim_The_Heavenly_Waters_desc: "Tianshui, the Heavenly Waters, is the archaic poetic designation for the seas surrounding the Middle Kingdom. The name provides flavour; the action is modern and naval. PLAN surface groups begin escalating incursions into contested Spratly waters, challenging claimant coast guard vessels, disrupting resupply operations, and presenting each government with an ultimatum: accept Chinese administrative authority over the contested features, or face the next sortie. The clash counter advances only when we achieve a decisive tactical outcome; inconclusive engagements and setbacks stall the escalation ladder."
 CHI_reconstruction_development: "Reconstruction Capacity"
 CHI_reconstruction_development_desc: "Years of infrastructure investment and accumulated construction sector capacity have given us an exceptional ability to rebuild rapidly after natural disasters and industrial accidents. Standardised disaster response protocols, pre-positioned equipment stockpiles, and specialised army engineering units underpin this capability. We should invest to keep it sharp, because the next earthquake or flood will not wait for our readiness."
 CHI_red_arrow_program: "The Red Arrow Program"
 CHI_red_arrow_program_desc: "Armour is answered with the Red Arrow family of anti-tank missiles, the HJ-8 and HJ-9 that arm everything from infantry tripods to vehicles and helicopters. Cheap, plentiful and steadily improved, they give every formation a tank-killing reach."
 CHI_Renminbi_Internationalization: "Yuan as Reserve Currency"
 CHI_Renminbi_Internationalization_desc: "We have launched the Cross-Border Interbank Payment System to clear renminbi transactions outside the SWIFT network, and the International Monetary Fund has admitted the yuan to its Special Drawing Rights basket. BRI trade settlement in renminbi is steadily increasing our currency's weight in global reserves. We must now deepen these mechanisms until the renminbi is a genuine alternative to the dollar for partners who value their independence."
 CHI_Responsible_Stakeholder: "Responsible Stakeholder"
 CHI_Responsible_Stakeholder_desc: "We should embrace the international community's call to become a constructive participant in global institutions. By deepening trade ties and reducing friction in multilateral forums, we position ourselves as an indispensable partner rather than a revisionist challenger. The label matters, even if the strategy behind it does not change."
 CHI_rmb_internationalisation: "Renminbi Internationalisation"
 CHI_rmb_internationalisation_desc: "The RMB pilot trade settlement programme has launched, and currency swap agreements are now signed with over 40 central banks. The IMF admits the yuan to its Special Drawing Rights basket, a recognition that cannot be taken back. The Cross-Border Interbank Payment System provides a renminbi-denominated alternative to SWIFT, reaching over 1,500 member institutions. After Russia's SWIFT exclusion, roughly 90 percent of Russia-China trade shifts to CIPS and yuan-rouble pairs, and Saudi Arabia, the UAE, and Brazil begin accepting yuan for commodity contracts. The dollar system is not collapsing, but it is no longer without a challenger."
 CHI_Rome_Memorandum: "Rome BRI Memorandum"
 CHI_Rome_Memorandum_desc: "Italy's signature on a Belt and Road Memorandum of Understanding was the first by a G7 member, fracturing Western consensus on containing our infrastructure diplomacy in Europe. The agreement covers port, rail, and digital infrastructure cooperation, with Trieste and Genoa positioned as the northern Adriatic and Ligurian terminals for our cargo. Brussels and Washington will press Rome to withdraw, but the commercial appeal of our investment should prove politically durable if we manage the relationship well."
 CHI_sasac: "Hand the Firms to SASAC"
 CHI_sasac_desc: "The enterprises stripped from the army do not vanish; they pass to the State-owned Assets Supervision and Administration Commission, founded in 2003 to hold the commanding heights of the economy. Military profit becomes civilian dividend, booked in Beijing rather than the barracks."
 CHI_sasac_founding: "State-Owned Assets Supervision Commission"
 CHI_sasac_founding_desc: "Our state-owned enterprise sector has long suffered from fragmented ministerial oversight with no coherent ownership strategy. We must establish a dedicated supervision commission to consolidate control over our centrally managed enterprises, introduce performance contracts for executive management, require dividend remittances, and screen major investment decisions. The state must act as a shareholder, not merely as a regulator."
 CHI_saturn_engine_crisis: "The Saturn Engine Crisis"
 CHI_saturn_engine_crisis_desc: "China can build the airframe but not the heart inside it. Our best fighters still fly on Russia's Saturn AL-31, and every embargo or price hike from Moscow threatens to ground the fleet. The WS-10 Taihang must be made to work, whatever the cost, or our independence is a fiction painted over imported turbines."
 CHI_scientific_development_outlook_foreshadowed: "Foreshadow Scientific Development Outlook"
 CHI_scientific_development_outlook_foreshadowed_desc: "Concede ideological space to the Vice President. Hu Jintao's people get a doctrinal opening - sustainability, rural rebalancing, the human-centred approach."
 CHI_scientific_outlook_on_development: "Scientific Outlook on Development"
 CHI_scientific_outlook_on_development_desc: "Hu Jintao's governing philosophy calls for development that is people-centred, comprehensive, balanced, and sustainable. Adopting it as party doctrine will reorient policy away from GDP-first growth toward broader social and environmental indicators. The question is whether provincial officials who have spent a decade optimizing for output targets can be persuaded to optimize for something harder to measure."
 CHI_scientific_outlook_on_development_tt: "§RBecause we lost $CHI_scientific_outlook_idea_1$ we gain:§!"
 CHI_SCO_Exclusive_Core: "SCO Exclusive Core"
 CHI_SCO_Exclusive_Core_desc: "Rather than diluting the SCO through rapid expansion, we should deepen integration among existing members. Stronger bonds between a smaller group of committed nations will yield greater strategic dividends."
 CHI_SCO_Exclusive_Core_tt: "§GEnhances§! member cooperation and §Rblocks§! new dialogue partner applications. Existing members receive permanent opinion bonuses."
 CHI_SCO_Plus_Expansion: "SCO+ Expansion"
 CHI_SCO_Plus_Expansion_desc: "The SCO's strength lies in its breadth. By lowering barriers to entry and actively courting new dialogue partners, we can expand the organization's reach across Asia, the Middle East, and beyond."
 CHI_sea_eagles_carrier_wing: "The Carrier Air Wing"
 CHI_sea_eagles_carrier_wing_desc: "A handful of fighters is not an air wing. We round out the carrier's deck with airborne early warning, anti-submarine and electronic-warfare helicopters, welding the aircraft into one integrated wing that can scout, screen and strike as a whole."
 CHI_sea_eagles_of_the_liaoning: "Sea Eagles of the Liaoning"
 CHI_sea_eagles_of_the_liaoning_desc: "The Liaoning's deck gains its talons. The J-15 'Flying Shark', a heavy carrier fighter derived from the Su-33, is armed and worked up into a strike aircraft, and the doctrine of carrier strike, of projecting airpower from a moving Chinese deck, is written for the first time."
 CHI_second_gen_platforms: "The Second Platform Generation"
 CHI_second_gen_platforms_desc: "ByteDance launches Douyin domestically and TikTok internationally, reaching audiences the BAT generation never targeted. Pinduoduo disrupts e-commerce with group-buying mechanics that reach consumers in tier-four cities and rural markets; Meituan leads on-demand services. Didi absorbs Uber China. A second wave of platforms is deepening our digital economy into segments the first generation found too diffuse or too unglamorous to build."
 CHI_Second_Island_Chain_Reach: "Second Island Chain Projection"
 CHI_Second_Island_Chain_Reach_desc: "PLA Navy access rights across the Melanesian and Polynesian Pacific bring our forward operating bases within striking distance of Guam, Hawaii, and the sea lanes connecting the United States to its East Asian allies. The projection breaks the strategic logic of the Second Island Chain that American planners have relied on since the Cold War. Australia loses the geographic buffer it has always treated as a constant. We should move before they realize it is gone."
 CHI_Secure_The_Heavenly_Waters: "Secure the Heavenly Waters"
 CHI_Secure_The_Heavenly_Waters_desc: "Tianshui, the Heavenly Waters, is the archaic term for the seas that surround the Middle Kingdom's domain. Those who refused the invitation to acknowledge proper order are now brought to heel by force of arms. The South Sea is restored to its rightful administration under our authority."
 CHI_seed_security_campaign: "Seed Security Campaign"
 CHI_seed_security_campaign_desc: "The soybean war exposed our vulnerability plainly: ABCD grain traders acquired 70 percent of our soybean-crushing capacity after domestic processors went bankrupt on speculative futures positions. We must not allow that exposure to repeat itself. Sanya on Hainan island serves as our Nanfan crop breeding base, where tropical winters allow three breeding generations per year. ChemChina's acquisition of Syngenta places global germplasm collections under state influence, while Longping Hi-Tech and the Beidahuang grain agency are designated national champions in seed sovereignty."
 CHI_selective_anti_corruption: "Selective Anti-Corruption Campaign"
 CHI_selective_anti_corruption_desc: "The anti-corruption investigations of the mid-2000s were highly selective. Cases were pursued against officials who had accumulated independent power bases or crossed factional lines, while allies and patrons were insulated from scrutiny. The political dimension of these prosecutions undermined their legitimacy and generated factional resentment within the party."
 CHI_Seoul_Under_Our_Umbrella: "Seoul Under Our Umbrella"
 CHI_Seoul_Under_Our_Umbrella_desc: "We and South Korea formalize a strategic partnership framework. Our security guarantees replace the U.S. alliance, PLAN access to Jeju Island is negotiated, and American forces begin their long-anticipated redeployment from the peninsula."
 CHI_service_of_the_three_distances: "Service of the Three Distances"
 CHI_service_of_the_three_distances_desc: "The navy redefines how far it must reach. Beyond the near-seas defence of Liu Huaqing's first chain, it now trains for the far seas and the open ocean alike, the three distances at which a global fleet must be ready to fight. Doctrine shifts decisively from defending the coast to operating across the world's oceans."
 CHI_seventeen_plus_one_mechanism: "16+1 Cooperation Framework"
 CHI_seventeen_plus_one_mechanism_desc: "The 17+1 platform for China-Central and Eastern European cooperation channels our investment into European Union and candidate-state infrastructure, raising concerns in Brussels about member-state alignment drift and regulatory circumvention. Brussels is right to be concerned. We should deepen these relationships precisely because they fragment the unified European front that constrains our market access."
 CHI_shadow_banking_cleanup: "Shadow Banking and Financial Risk Cleanup"
 CHI_shadow_banking_cleanup_desc: "The stimulus flood of 2008 and 2009 left wealth management products and trust companies accumulating opaque risk in real estate and local government financing vehicles. The New Asset Management Rules require net-asset-value pricing for wealth management products and eliminate implicit guarantees. Anbang Insurance is seized by the state after 300 billion US dollars in reckless overseas acquisitions. HNA Group collapses under its own debt. The cleanup concentrates risk supervision in the reformed CBIRC and stabilises the interbank market. Discipline is not punishment; it is the price of a system we can trust."
 CHI_shandong_at_sanya: "Shandong at Sanya"
 CHI_shandong_at_sanya_desc: "The second aircraft carrier is wholly ours. The Type 002 Shandong, the first aircraft carrier designed and built in China, is launched in 2017 and commissioned in 2019, then home-ported at Sanya on Hainan beside the submarine caverns of Yulin. From the south she watches the sea lanes and the contested islands that China means to hold."
 CHI_shantytown_renovation: "Shantytown Renovation Programme"
 CHI_shantytown_renovation_desc: "The national shantytown renovation programme demolishes derelict workers' housing in old coal and mining provinces and replaces it with modern residential and industrial districts. Shanxi and Henan, burdened by ageing heavy-industry infrastructure, receive the largest allocations. Central government spending on the programme reaches 1.54 trillion yuan, generating a wave of construction contracts and opening new industrial zones across the interior where none existed before."
 CHI_shenyang_j35_gyrfalcon: "The J-35 Blue Shark"
 CHI_shenyang_j35_gyrfalcon_desc: "A second stealth fighter joins the first. Shenyang's J-35, grown from the FC-31 demonstrator, is a twin-engine fifth-generation jet sized for both land bases and carrier decks, giving China a high-low stealth pairing with the J-20 that only the United States can otherwise field."
 CHI_shenzhou_program: "The Shenzhou Programme"
 CHI_shenzhou_program_desc: "On 15 October 2003 Yang Liwei lifted off aboard Shenzhou 5 from the Jiuquan Satellite Launch Centre, becoming China's first astronaut. The fourteen-orbit, twenty-one-hour mission made China the third country to independently send a human to space, and inaugurated a crewed spaceflight programme that would grow to include spacewalks, orbital rendezvous, and long-duration station missions."
 CHI_sicarrier_euv: "SiCarrier EUV Programme"
 CHI_sicarrier_euv_desc: "SiCarrier Technology, established with direct state backing, is tasked with closing the EUV gap. The programme draws on domestic optical design capability developed at the Changchun Institute of Optics and mirror fabrication experience from CNNC. A functional EUV demonstrator requires domestic production of 13.5nm light sources, multilayer reflective optics, and wafer stages at sub-nanometre precision. This is our most ambitious attempt to achieve full semiconductor equipment sovereignty. A working domestic EUV tool means we can fabricate advanced chips end-to-end without a single foreign equipment licence, breaking the Western export-control regime at its foundation."
 CHI_Silk_Road_Fund: "Silk Road Fund"
 CHI_Silk_Road_Fund_desc: "The Silk Road Fund, capitalized at $40 billion from our foreign exchange reserves and sovereign wealth funds, provides equity financing for BRI projects that commercial banks and multilateral lenders will not carry alone. It is the instrument through which we can say yes to projects that would otherwise stall for want of a first mover willing to take the risk."
 CHI_sinograin_strategic_reserve: "Sinograin"
 CHI_sinograin_strategic_reserve_desc: "The China Grain Reserves Corporation inherits the role of the imperial granaries of the Sui and Tang dynasties, anchored by Heilongjiang's Beidahuang, whose black-soil farms produce more grain than any other province. Sinograin implements the minimum grain purchase price policy, buying on behalf of the state when markets fall. A strategic pork reserve has since joined the grain stores, the only one of its kind in the world, and we should treat this system as the strategic asset it is."
 CHI_smee_lithography: "SMEE Lithography Development"
 CHI_smee_lithography_desc: "Shanghai Micro Electronics Equipment Group is our only lithography manufacturer, producing 90nm and 110nm exposure tools for packaging and back-end processes. State funding accelerates development of a 28nm immersion DUV scanner, with qualification progress now reported at domestic fabs. SMEE remains a generation behind ASML's most capable tools, but domestic DUV production eliminates our dependency for mature-node capacity expansion and provides the foundation we need for development toward advanced-node lithography. The gap is real; the trajectory is correct."
 CHI_smic_advanced_node: "SMIC Advanced-Node Push"
 CHI_smic_advanced_node_desc: "Following our placement on the US Entity List, SMIC accelerated its domestic development track. Our engineers adapted existing DUV tooling to achieve 7nm-equivalent density through multi-patterning -- a result that confirmed creative process engineering can partially substitute for EUV access. The achievement bought time for domestic equipment development and reframed the technology gap as a solvable engineering problem. The Mate 60 Pro launch exposed this fabrication capability to the world, triggering a new wave of US export-control reviews, and that response tells us we are doing the right things."
 CHI_smic_zhangjiang: "SMIC Zhangjiang Expansion"
 CHI_smic_zhangjiang_desc: "The Semiconductor Manufacturing International Corporation built its flagship 300mm fab campus in Zhangjiang Hi-Tech Park, and state investment in successive capacity expansions has allowed SMIC to reach 28nm production and begin 14nm risk production. Each successive node closes the gap with TSMC and Samsung, and SMIC is now the only mainland Chinese foundry capable of advanced logic production. We must protect this asset and push it further."
 CHI_smuggling_tax: "Tax the Smuggling"
 CHI_smuggling_tax_desc: "The army does not run every racket; it licenses them. Smugglers moving oil, cars and cigarettes through ports and garrisons pay the local commanders for protection, and that levy becomes an unofficial budget no ministry can see or touch."
 CHI_Soft_Power_Projection: "Soft Power Projection"
 CHI_Soft_Power_Projection_desc: "Establish Confucius Institutes at universities worldwide and expand state media's international reach to promote Chinese language, culture, and perspectives abroad."
 CHI_special_operations_forces: "Special Operations Forces"
 CHI_special_operations_forces_desc: "Each theatre raises its own special operations brigades, trained for raids, reconnaissance and decapitation strikes. They are the tip of the sharp blade, sent in before the main force to open the door from the inside."
 CHI_star_market_bse: "STAR Market and Beijing Stock Exchange"
 CHI_star_market_bse_desc: "The Science and Technology Innovation Board on the Shanghai Stock Exchange introduces registration-based IPOs, dual-class share structures, and listing access for pre-profit companies. SMIC raises 7.5 billion US dollars on STAR; the Beijing Stock Exchange follows, targeting innovative small and medium enterprises. Together these platforms allow semiconductor, biotech, and advanced manufacturing firms to raise capital domestically without depending on Wall Street listings. Our capital markets are no longer a dependency risk."
 CHI_state_council_information_office: "State Council Information Office"
 CHI_state_council_information_office_desc: "The State Council Information Office manages our external communications, overseas propaganda operations, domestic internet governance, and foreign press accreditation. We must use it to institutionalize content filtering under the Golden Shield programme and expand our international broadcasting to counter Western narrative dominance. The information environment is a battlefield, and we cannot afford to cede it by default."
 CHI_stock_exchanges_shanghai_shenzhen: "Shanghai, Shenzhen, and Hong Kong Exchanges"
 CHI_stock_exchanges_shanghai_shenzhen_desc: "The Shanghai Stock Exchange hosts large state-owned enterprises including the Big Four banks, Sinopec, PetroChina, and China Mobile. The Shenzhen Stock Exchange hosts private companies and innovators such as BYD, Midea, Gree, and Ping An. ChiNext in Shenzhen functions as a growth-stock equivalent of NASDAQ. The Shanghai-Hong Kong and Shenzhen-Hong Kong Stock Connect programmes open a controlled gateway for international portfolio investors without full capital account liberalisation, allowing us to attract foreign capital on our own terms."
 CHI_strategic_materials: "Strategic Material Supply Chains"
 CHI_strategic_materials_desc: "We control over 80 percent of global gallium and germanium refining capacity and dominate supply of fluorite, silicon metal, and rare earth elements used in semiconductor fabrication. Following US export controls, we impose export licensing on gallium and germanium, then add further restrictions on gallium arsenide compounds. Domestic policy redirects strategic material output toward our own fabs, reducing costs and securing supply continuity for foundries operating under entity-list constraints. The materials chokepoint runs in both directions."
 CHI_strategic_reserve_system: "The Strategic Reserve System"
 CHI_strategic_reserve_system_desc: "Depth is its own defence. A reformed reserve and mobilisation system stands ready to flood the front with trained manpower, ensuring that even a long war of attrition is one China can outlast."
 CHI_streamline_the_ranks: "Streamline the Ranks"
 CHI_streamline_the_ranks_desc: "A two-million-man army built to drown an invader in bodies cannot win a war of precision. We cut the bloated infantry, retire the obsolete, and pour the savings into firepower, sensors and mobility. The People's Liberation Army will be smaller, sharper and, for the first time, a force built to win rather than merely to endure."
 CHI_strike_black_sing_red: "Strike Black, Sing Red"
 CHI_strike_black_sing_red_desc: "A two-pronged campaign to cleanse the body politic. The 'Strike Black' drive arrests thousands of organised crime figures and corrupt officials, dismantling the patronage networks that have corroded local governance. The 'Sing Red' drive revives revolutionary songs and Maoist slogans, channelling popular energy into patriotic mobilisation."
 CHI_Suez_Eastern_Bank: "Suez Eastern Industrial Zone"
 CHI_Suez_Eastern_Bank_desc: "The China-Egypt Suez Economic and Trade Cooperation Zone on the eastern bank of the canal hosts our manufacturing, logistics, and energy firms under preferential Egyptian regulatory terms. The zone locks in our strategic foothold at one of the world's most critical maritime chokepoints, reducing transit costs and giving our enterprises a base for North African and European market access. Egypt earns hard-currency revenue and political association with us. Both sides understand the value of what we are building."
 CHI_Sunshine_Policy_Revival: "Sunshine Policy Revival"
 CHI_Sunshine_Policy_Revival_desc: "We should coordinate with Seoul to revive the inter-Korean engagement framework that collapsed in the years after the Cheonan sinking and the Yeonpyeong bombardment. Joint cultural exchanges, reunited family visit programs, and reopened hotlines reconstruct the basic infrastructure of communication between the two Koreas, with us serving as an indispensable facilitator. A Korea that talks is a Korea that does not fight."
 CHI_system_of_systems_operations: "System-of-Systems Operations"
 CHI_system_of_systems_operations_desc: "The end of reform is a way of war, not a table of organisation. We pursue system-of-systems operations, meshing sensors, shooters and commanders into one network that thinks and strikes faster than any enemy can react. The army that wins the next war will fight as a single, seeing organism."
 CHI_tactical_electronic_warfare: "Tactical Electronic Warfare"
 CHI_tactical_electronic_warfare_desc: "On the informatized battlefield, the side that blinds the other wins. We field dedicated jamming, signals and electronic-attack units at brigade level, contesting the enemy's radios, radars and data links before the first shot."
 CHI_tactical_uav_integration: "Tactical UAV Integration"
 CHI_tactical_uav_integration_desc: "Eyes overhead become standard issue. Small reconnaissance drones are pushed down to the battalion and company, so that no commander advances blind and every target can be found before it is fired on."
 CHI_Takeshima_Solidarity: "The Liancourt Rocks Communiqué"
 CHI_Takeshima_Solidarity_desc: "We formally back South Korea's claim over the Liancourt Rocks, framing the dispute as a shared grievance against Japan's refusal to acknowledge its imperial legacy. The wedge between Seoul and Tokyo widens, shifting Korean public opinion away from Washington's Pacific alliance architecture."
 CHI_telecom_reorganization: "Telecom Reorganization"
 CHI_telecom_reorganization_desc: "The State Council restructures our telecommunications monopoly, splitting China Telecom and licensing 3G spectrum to China Mobile, China Unicom, and China Telecom simultaneously. The resulting competition drives investment in network infrastructure and accelerates mobile broadband adoption across a market of 1.4 billion potential subscribers that no foreign competitor can reach."
 CHI_tencent_games_publisher: "Tencent's Gaming Empire"
 CHI_tencent_games_publisher_desc: "Tencent acquires Riot Games and Supercell, and holds major stakes in Epic, Activision Blizzard, and Ubisoft. Honor of Kings becomes the world's highest-grossing mobile game; Genshin Impact earns 5 billion US dollars in its first two years. Our investment in Western studios gives us structural influence over global entertainment at a fraction of the cost of traditional soft power. Culture moves people in ways that diplomacy cannot reach."
 CHI_The_2022_Reset: "The [GetYear] Reset"
 CHI_The_2022_Reset_desc: "Drawing on the Bali G20 framework established in [GetYear], we and the United States formally revive the Six-Party architecture. We assume the role of honest broker between Washington, Seoul, and Pyongyang for the first time in over a decade."
 CHI_The_2025_Blue_Sky_Operation: "Blue Sky Operation"
 CHI_The_2025_Blue_Sky_Operation_desc: "We and North Korea launch a coordinated military campaign against South Korea. The Blue Sky Operation will test our willingness to bear the international cost of Korean unification by force."
 CHI_The_610_Northeast_Directive: "The 610 Northeast Directive"
 CHI_The_610_Northeast_Directive_desc: "The CCP's Northeast Command activates emergency mobilization protocols across Manchuria and Liaoning. Border forces are reinforced, strategic reserves are repositioned, and infrastructure in the borderland is hardened to support any future contingency on the peninsula."
 CHI_the_610_office_mandate: "The 610 Office Mandate"
 CHI_the_610_office_mandate_desc: "The 610 Office, named for the date of its founding, coordinates our state security agencies in the suppression of Falun Gong and other groups deemed threats to social stability. The bureau operates outside normal legal channels, concentrating enforcement power in the hands of the centre. Its mandate is deliberately unconstrained, because the threats it addresses do not respect the boundaries of ordinary law."
 CHI_the_998_project: "The 998 Bomber Project"
 CHI_the_998_project_desc: "The bomber arm, long written off as obsolete, is given a future. A dedicated programme rebuilds long-range strike around a deeply modernised airframe, turning a Cold War relic into a standoff missile carrier able to threaten targets across the Western Pacific without ever crossing a hostile coast."
 CHI_The_Air_Patrol_Zone: "The Air Patrol Zone"
 CHI_The_Air_Patrol_Zone_desc: "What other states call an ADIZ, we prefer to describe as a regularised patrol zone: PLAAF interceptors conducting routine sovereignty patrols over the South China Sea, identifying foreign aircraft and escorting non-compliant transits out of the area. The practical effect mirrors the 2013 East China Sea precedent, with all non-Chinese aircraft facing identification requirements and risk of interception, but the framing emphasises our air power rather than a formal legal claim the international community would immediately contest."
 CHI_the_anime_generation_gambit: "The Anime Generation Gambit"
 CHI_the_anime_generation_gambit_desc: "Our youth quote Hayao Miyazaki more often than they quote Mao. This is either a problem or an opportunity. Comrade Wang Huning believes it is the latter."
 CHI_The_Beijing_Peace_Guarantee: "The Beijing Peace Guarantee"
 CHI_The_Beijing_Peace_Guarantee_desc: "We underwrite a final settlement between the two Koreas. The Beijing Peace Guarantee commits us to defending any unified Korea's sovereignty against external interference."
 CHI_The_Beijing_Settlement: "The Beijing Settlement"
 CHI_The_Beijing_Settlement_desc: "With the coup consolidated, we broker the terms of North Korea's new political reality. The transition government in Pyongyang accepts our arbitration, and the Korean Workers' Party is restructured under our supervision."
 CHI_the_bohai_bastion: "The Bohai Bastion"
 CHI_the_bohai_bastion_desc: "The surest deterrent is the one that cannot be found. The Type 094A boomer, carrying the JL-3 missile with a reach of some ten thousand kilometres, can at last strike the American mainland from defended home waters. Sheltered behind the fleet in a protected bastion, our ballistic-missile submarines give China a true sea-based second strike, the final guarantee that no first blow can disarm us."
 CHI_The_Border_Personnel_Meetings: "Border Personnel Meetings"
 CHI_The_Border_Personnel_Meetings_desc: "Five points along the Line of Actual Control where Indian and Chinese commanders can meet without escalation protocol. A teakettle, a folding table, two flags. Sometimes diplomacy starts in places that small."
 CHI_The_Cabbage_Strategy: "The Cabbage Strategy"
 CHI_The_Cabbage_Strategy_desc: "Rear Admiral Zhang Zhaozhong has described the tactic publicly: wrap each contested feature in successive layers. Fishing vessels on the outside, maritime militia behind them, coast guard cutters next, frigates at the core, until the outermost leaves are indistinguishable from sovereignty. By the time foreign lawyers arrive, the cabbage has already grown. We adopt this doctrine as our framework for the South China Sea."
 CHI_The_Cabbage_Tightens: "The Cabbage Tightens"
 CHI_The_Cabbage_Tightens_desc: "Maritime militia and coast guard vessels now operate under unified PLAN coordination across the contested reef chain. The outer layers of the cabbage are consolidated into a seamless administrative and security presence. What was once disputed is now, in practice, administered."
 CHI_the_china_plus_one_counteroffensive: "The China-Plus-One Counteroffensive"
 CHI_the_china_plus_one_counteroffensive_desc: "Mr. Toyoda visited Tianjin expecting concessions. He left with concessions, and a contract for one hundred thousand fuel-cell vehicles. The art of giving while taking remains ours to perfect."
 CHI_The_Chinese_Correction: "The Chinese Correction"
 CHI_The_Chinese_Correction_desc: "The Kim dynasty's erratic behavior has become a strategic liability. We have decided that a managed transition, quiet, surgical, and irreversible, is preferable to another generation of blackmail diplomacy from Pyongyang."
 CHI_the_chinese_dream: "The Chinese Dream"
 CHI_the_chinese_dream_desc: "The great rejuvenation of the Chinese nation is the greatest Chinese dream. A century of humiliation has given way to restoration, and the Party frames this transformation not as ideology but as historical destiny shared by all 1.4 billion. Economic strength, military power, and international respect are not ambitions -- they are what was taken from us, and what we will recover."
 CHI_The_Code_Of_Conduct: "Code of Conduct"
 CHI_The_Code_Of_Conduct_desc: "A binding regional Code of Conduct, negotiated under Chinese terms, is presented as the definitive settlement of competing South China Sea claims. The instrument codifies bilateral arrangements, excludes external arbitration, and enshrines the principle that disputes are a matter for China and its neighbours alone. Outside powers are denied any juridical foothold."
 CHI_the_diaoyu_sovereignty_declaration: "The Diaoyu Sovereignty Declaration"
 CHI_the_diaoyu_sovereignty_declaration_desc: "The Diaoyu Islands have been Chinese territory since the Ming dynasty. Japanese 'administration' is a colonial inheritance the world has tolerated for too long."
 CHI_The_Duterte_Pivot: "The Duterte Pivot"
 CHI_The_Duterte_Pivot_desc: "When President Duterte of the Philippines declared his country's \"separation\" from the United States and turned toward Beijing, he showed the region that a Southeast Asian leader can choose sovereignty over dependency. We should cultivate similar pivots elsewhere, quietly and patiently, until Washington's alliances become a question rather than an answer."
 CHI_The_Final_Compromise: "The Final Compromise"
 CHI_The_Final_Compromise_desc: "After years of patient diplomacy, we broker a final settlement accepted by both Koreas. Neither unification nor permanent division, the arrangement establishes a shared economic zone, demilitarized border crossings, and a joint Chinese-Korean monitoring commission. We emerge as the indispensable guarantor of peace on the peninsula."
 CHI_The_Five_Fingers_Doctrine: "The Five Fingers Doctrine"
 CHI_The_Five_Fingers_Doctrine_desc: "Mao said it in 1959: Tibet is the right palm, and the five fingers are Ladakh, Nepal, Sikkim, Bhutan, and the North-East Frontier Agency. We have the palm and the thumb. The other fingers are waiting."
 CHI_the_fujian_catapults: "The Fujian Catapults"
 CHI_the_fujian_catapults_desc: "The ski-jump gives way to the catapult. The Type 003 Fujian, launched in 2022, is the first Chinese carrier with electromagnetic catapults, able to fling heavier, fully fuelled aircraft and even airborne early-warning planes off her deck. With her, the gap to an American supercarrier narrows from a chasm to a stride."
 CHI_the_fukuda_doctrine_revisited: "The Fukuda Doctrine Revisited"
 CHI_the_fukuda_doctrine_revisited_desc: "Comrade Deng told us: hide your strength, bide your time. The Japanese economy is hemorrhaging, their birthrate is collapsing, their politicians cycle through Kantei every fourteen months. Why pick a fight with a corpse-in-waiting when we can buy its inheritance?"
 CHI_The_G2_Declaration: "The G2 Declaration"
 CHI_The_G2_Declaration_desc: "At a summit spanning Washington and Beijing, our leaders and the Americans jointly declare their commitment to a peaceful, unified Korean peninsula under Korean governance. The G2 Declaration signals a new era of great-power management of East Asian security, and it is one that acknowledges us as an equal partner in that arrangement."
 CHI_the_great_wall: "The Great Wall"
 CHI_the_great_wall_desc: "Some battles are won by never losing. We choose the defensive path, the modern Great Wall: layered fortifications, deep reserves and an army that bleeds any invader white on Chinese soil. Reunification can wait if the homeland is first made unconquerable."
 CHI_the_great_western_development: "The Great Western Development"
 CHI_the_great_western_development_desc: "Our Go West policy channels state investment into twelve western provinces through infrastructure construction, factory incentives, and resettlement programmes. Closing the coastal-interior gap is both an economic imperative and our most durable tool for binding restive borderland regions to the centre."
 CHI_the_historical_reckoning: "The Historical Reckoning"
 CHI_the_historical_reckoning_desc: "The textbooks omit a city. The shrines honour the architects. We will be the ones to remember."
 CHI_the_iron_fist: "The Iron Fist"
 CHI_the_iron_fist_desc: "Defence wins nothing back. We choose the iron fist: heavy combined-arms brigades led by the Type 99, mass armour and long-range fires built to smash through a prepared enemy and seize ground. When the order comes to cross a strait or a border, it will be answered with overwhelming weight."
 CHI_The_Jang_Faction_Rehabilitation: "The Jang Faction Rehabilitation"
 CHI_The_Jang_Faction_Rehabilitation_desc: "When Jang Song-thaek was purged and executed, our most reliable interlocutor in Pyongyang was lost with him. We will now rehabilitate his surviving network in exile, cultivating a cadre of reform-minded Korean officials who owe their futures to us."
 CHI_the_japan_question: "The Japan Question"
 CHI_the_japan_question_desc: "To our northeast lies a great threat as well as a great opportunity. The Japanese question, like the Taiwan question and the Korea question, admits no permanent answer, only the answer that suits the present hour."
 CHI_the_komsomolsk_pipeline: "The Komsomolsk Pipeline"
 CHI_the_komsomolsk_pipeline_desc: "Why wait for our factories when Russia's are already running? From Komsomolsk-on-Amur we buy the Su-27, the Su-30 and the AL-31 engines that power half our fleet, importing a generation of capability we cannot yet build. The pipeline keeps the air force modern today, at the price of dependence on Moscow tomorrow."
 CHI_The_Mandate_Of_The_Seas: "The Mandate of the Seas"
 CHI_The_Mandate_Of_The_Seas_desc: "The classical Chinese worldview recognised four seas surrounding the civilised centre of the Middle Kingdom, the Sihai. The Dragon Kings of those waters answered to Heaven, and through them to the Son of Heaven. That order was interrupted by the Century of Humiliation; it now awaits restoration under a state strong enough to enforce it."
 CHI_the_maritime_militia_initiative: "The Maritime Militia Initiative"
 CHI_the_maritime_militia_initiative_desc: "Every fishing boat is a mobile sovereignty marker. The People's Armed Forces Maritime Militia answers to the Central Military Commission, but the world will see only fishermen."
 CHI_The_Maritime_Silk_Road_Initiative: "The Maritime Silk Road Initiative"
 CHI_The_Maritime_Silk_Road_Initiative_desc: "The Maritime Silk Road is the sea component of the Belt and Road Initiative, extending our infrastructure investment and trade networks across Southeast Asia, South Asia, and East Africa. In the South China Sea it serves as the economic anchor of our diplomatic path: claimant states offered port financing, fisheries agreements, and hydrocarbon joint ventures find the bilateral track more attractive than ASEAN-level confrontation. Each signed agreement reinforces the principle that these disputes are matters between neighbours, not cases for international adjudication."
 CHI_the_nanjing_memorial_mandate: "The Nanjing Memorial Mandate"
 CHI_the_nanjing_memorial_mandate_desc: "Three hundred thousand. The number will be on every textbook cover, every museum wall, every December 13th moment of silence. The Japanese government has its memories. We will have ours."
 CHI_The_Nine_Dots_Consensus: "The Nine Dots Consensus"
 CHI_The_Nine_Dots_Consensus_desc: "Rather than choosing sides between Pyongyang and Seoul, we chart a calibrated middle course: maintaining ties with the North without guaranteeing the regime's survival, deepening economic links with the South without abandoning strategic ambiguity. We bet that holding both threads simultaneously is the only approach that can eventually produce a stable peninsula."
 CHI_the_northeast_tiger: "The Northeast Tiger"
 CHI_the_northeast_tiger_desc: "Power in the corrupt army runs through region and patronage. The Shenyang clique of the Northeast, the soil from which Xu Caihou rose, becomes a kingmaker, trading appointments and favours across the old military regions like a private estate."
 CHI_the_panda_diplomacy_renewal: "Panda Diplomacy Renewal"
 CHI_the_panda_diplomacy_renewal_desc: "Two pandas. Twelve million dollars per year in 'conservation fees.' One front-page photograph of a Japanese child smiling at a Chinese animal. Worth every yuan."
 CHI_The_Panmunjom_Architecture: "The Panmunjom Architecture"
 CHI_The_Panmunjom_Architecture_desc: "We will convene a new multilateral dialogue at Panmunjom, the site of the Armistice and of two decades of failed American-led summitry. Our framework brings Seoul and Pyongyang to the same table under our facilitation, committing all parties to a phased process of tension reduction backed by our diplomatic guarantees. The world will credit us with delivering what Washington could not."
 CHI_the_party_that_lasts: "The Party That Lasts"
 CHI_the_party_that_lasts_desc: "The Party's institutional mechanisms, the Congress system, the Central Committee, and the Politburo, are reaffirmed as the legitimate engines of governance, designed to outlast any individual leader. Xi Jinping Thought is embedded as the operating framework for the next century, but the system that carries it forward is collective and durable. The Party survived Mao's death, the Cultural Revolution, and Tiananmen. Its machinery is built to endure."
 CHI_The_Pivot_Reversed: "The Pivot Reversed"
 CHI_The_Pivot_Reversed_desc: "America's pivot to Asia has overextended Washington's commitments and created a strategic opening. We will fill the vacuum as U.S. credibility erodes, positioning ourselves as Seoul's most capable and willing security partner."
 CHI_The_PLAN_Expeditionary_Buildup: "PLAN Expeditionary Buildup"
 CHI_The_PLAN_Expeditionary_Buildup_desc: "Carrier strike groups, Type 075 amphibious assault vessels, and underway replenishment fleets bring the People's Liberation Army Navy to full blue-water operational capability. The South China Sea is no longer a frontier to be defended. It is a staging area from which force can be projected at intercontinental range."
 CHI_the_poly_compromise: "The Poly Compromise"
 CHI_the_poly_compromise_desc: "Why surrender a fortune to look clean? Poly Group was born from the General Staff's arms-trading arm, and it is only the largest of the empires the army has built. We refuse Jiang's divestiture: the businesses stay, the smuggling stays, the money stays. The PLA will be rich before it is reformed, and loyalty will be bought rather than earned."
 CHI_The_Princeling_Network: "The Princeling Network"
 CHI_The_Princeling_Network_desc: "Our intelligence services penetrate the KPA's officer corps through the children of Pyongyang's elite who were educated here. These princelings, shaped by their years in Beijing, are our most reliable lever inside the North Korean state."
 CHI_the_pterodactyl_generation: "The Pterodactyl Generation"
 CHI_the_pterodactyl_generation_desc: "The Wing Loong, or Pterodactyl, family of armed drones gives the air force a cheap, persistent hunter for reconnaissance and strike, and a flagship export that carries Chinese airpower into a dozen foreign wars."
 CHI_the_quad_wedge_strategy: "The Quad Wedge Strategy"
 CHI_the_quad_wedge_strategy_desc: "There is no Quad without Tokyo, and no Tokyo without choices. We will give them choices, quietly, bilaterally, in rooms the Americans were not invited to."
 CHI_the_quiet_dragons: "The Quiet Dragons"
 CHI_the_quiet_dragons_desc: "Noise is death beneath the waves, and our boats have always been heard too soon. The next-generation Type 095 attack submarine is built around silence, with pump-jet propulsion and a quieter reactor closing the gap on the American hunters. Quiet dragons can at last slip past the island chains and stalk a carrier in its own ocean."
 CHI_the_rare_earth_lever: "The Rare Earth Lever"
 CHI_the_rare_earth_lever_desc: "Most of the world's rare earths flow through our hands. Every Toyota Prius motor, every F-35 fin assembly, every iPhone speaker. The valve is ours to turn."
 CHI_the_rcep_acceleration: "RCEP Acceleration"
 CHI_the_rcep_acceleration_desc: "The Americans walked out of TPP. The Japanese stayed. The Regional Comprehensive Economic Partnership will be signed, and Tokyo will sign it standing next to Beijing, not Washington."
 CHI_the_renhai_cruiser: "The Renhai Cruiser"
 CHI_the_renhai_cruiser_desc: "China lays down its first true capital ship of the modern age. The Type 055, which NATO ranks a cruiser, is a ten-thousand-tonne stealth warship bristling with more than a hundred missile cells, built to lead a carrier group and to fight anything afloat. Eight are completed by 2022, and with them the navy fields surface combatants the equal of any in the world."
 CHI_The_Roh_Moohyun_Framework: "The 10.4 Declaration Revival"
 CHI_The_Roh_Moohyun_Framework_desc: "We will revive the spirit of the October 4 Declaration and endorse a graduated engagement framework with North Korea. Joint agricultural projects, limited tourism, and controlled cross-border trade can be pursued without preconditions, and we will be the ones to hold that door open."
 CHI_The_Sansha_Administrative_Upgrade: "Sansha Administrative Upgrade"
 CHI_The_Sansha_Administrative_Upgrade_desc: "Sansha City, our municipal seat on Woody Island in the Paracels, will now extend its jurisdiction across the full Spratly chain. The civilian framing is deliberate: mayors, census offices, and weather bureaux provide the political cover for what is, in substance, the permanent incorporation of disputed reef territories into our administrative order."
 CHI_The_Scarborough_Model: "The Scarborough Model"
 CHI_The_Scarborough_Model_desc: "The standoff at Scarborough Shoal gave us a repeatable method: a fishing vessel encounter escalates to coast guard confrontation, the other party withdraws under pressure, and a permanent presence is established before any third party can intervene. We will now apply this model systematically to every remaining contested feature."
 CHI_The_Sea_Within_The_Sea: "The Sea Within the Sea"
 CHI_The_Sea_Within_The_Sea_desc: "The South China Sea is bounded on all sides by the First Island Chain, land and reef curving from Japan through the Philippines to Malaysia, and has, through accumulated military presence, economic integration, and territorial decision, become entirely enclosed within our administrative control. The nine-dash line is no longer a claim; it is a border. The sea lanes that carry a third of world trade now pass through waters that we govern in law and in fact, with our coast guard and PLAN maintaining continuous sovereign patrol from the Paracels to the Spratlys."
 CHI_the_securitate_restructured: "The Securitate Restructured"
 CHI_the_securitate_restructured_desc: "Drawing on Wang Lijun's innovations in Chongqing, the internal security services are reorganised along the lines of a comprehensive state-protection apparatus. Signals intelligence, informant networks, and legal coercion are integrated under unified command. No conspiracy against the people's state will escape detection."
 CHI_the_self_reliant_path: "The Self-Reliant Path"
 CHI_the_self_reliant_path_desc: "Every imported engine is a leash. We choose the harder road of self-reliance, pouring resources into our own design bureaus and accepting years of inferior aircraft so that the next generation will owe nothing to any foreign supplier. An air force that cannot build its own wings will never truly be free."
 CHI_the_senkaku_crisis: "The Senkaku Crisis"
 CHI_the_senkaku_crisis_desc: "We have probed Japan's air defences for years and shadowed their coast guard. The next provocation will not be deniable. A coast guard cutter is not a warship, until it is."
 CHI_The_Seoul_Gambit: "The Seoul Gambit"
 CHI_The_Seoul_Gambit_desc: "We make a calculated bet that a deeper relationship with Seoul can deliver more lasting security than indefinite commitment to Pyongyang. Approaching South Korea as a strategic partner rather than an adversarial neighbor is a break with decades of our Korea policy, and not one to be made lightly."
 CHI_the_shanghai_succession: "The Shanghai Succession"
 CHI_the_shanghai_succession_desc: "Jiang Zemin transfers formal leadership to Hu Jintao while ensuring that Shanghai Clique loyalists dominate the Politburo Standing Committee. By retaining the chairmanship of the Central Military Commission, he preserves ultimate leverage over the new leadership and cements the factional balance in the Princeling network's favour. Power is handed over. It is not relinquished."
 CHI_the_shanghai_succession_tt: "This will lead to §YHu Jintao§! becoming §YLeader of the Chinese Communist Party§! and §YCountry Leader§! in §Y$CHI_16_national_congress_mission$§!"
 CHI_the_sharp_blade: "The Sharp Blade"
 CHI_the_sharp_blade_desc: "The next war may be decided in hours, not months. We choose the sharp blade: light, air-mobile and special forces that strike first and far, seizing airfields, ports and capitals before a defender can react. Speed becomes our heaviest weapon."
 CHI_the_sharp_sword_doctrine: "The Sharp Sword Doctrine"
 CHI_the_sharp_sword_doctrine_desc: "Stealth is not only for fighters. The GJ-11 'Sharp Sword', a flying-wing combat drone, anchors a doctrine of penetrating unmanned strike, sent ahead of the manned fleet to find and kill an enemy's defences where no pilot need be risked."
 CHI_the_soaring_dragon: "The Soaring Dragon"
 CHI_the_soaring_dragon_desc: "The WZ-7 'Soaring Dragon', a high-altitude long-endurance drone with distinctive joined wings, patrols the maritime approaches for days on end, feeding the strike network a constant watch over the seas China means to control."
 CHI_the_sovremenny_bridge: "The Sovremenny Bridge"
 CHI_the_sovremenny_bridge_desc: "Until our yards can build the ships we need, we buy them. Four Sovremenny destroyers of Project 956E and 956EM are purchased from Russia in the late 1990s, each armed with the supersonic Moskit anti-ship missile built to kill American carriers. They are a bridge across the years, modern firepower bought while the domestic fleet is still being born."
 CHI_The_Spirit_Of_Zheng_He: "The Spirit of Zheng He"
 CHI_The_Spirit_Of_Zheng_He_desc: "Six hundred years ago, the treasure fleets of Admiral Zheng He departed Nanjing on seven voyages that reached the Persian Gulf and the coast of East Africa. They carried silk, porcelain, and the protocols of civilized exchange, not conquest. The Maritime Silk Road is the modern heir to that tradition, and our engagement with Southeast Asia will be conducted in its spirit."
 CHI_the_surface_capital_fleet: "The Surface Capital Fleet"
 CHI_the_surface_capital_fleet_desc: "Power that cannot be seen does not impress, and we mean to be seen. The fleet is built around the carrier and the Type 055 cruiser, in balanced battle groups that can sail any ocean and dictate terms in any sea. A great surface fleet showing the flag in distant ports is the visible proof that China has arrived as a maritime power."
 CHI_the_tanker_gap: "Close the Tanker Gap"
 CHI_the_tanker_gap_desc: "Range is the air force's oldest weakness. With too few tankers our fighters cannot loiter far from home, so we expand the aerial-refuelling fleet to let strike packages reach the far seas and stay there."
 CHI_The_THAAD_Response: "The THAAD Response"
 CHI_The_THAAD_Response_desc: "The deployment of the THAAD anti-missile system in South Korea degrades our nuclear deterrent. We will respond with economic coercion: restricting tourism, boycotting Korean entertainment products, and pressuring Korean firms operating on our soil until Seoul reconsiders its welcome."
 CHI_the_three_represents: "The Three Represents"
 CHI_the_three_represents_desc: "Jiang Zemin's theoretical contribution to Party doctrine holds that the CCP must represent advanced productive forces, advanced culture, and the broadest interests of our people. By admitting private entrepreneurs and capitalists to Party membership, we broaden the social base of our rule beyond workers and peasants, and the Party endures."
 CHI_the_tokyo_communique: "The Tokyo Communique"
 CHI_the_tokyo_communique_desc: "Today's communique will say less than the 2008 text, and mean more. Differing perspectives on history is a diplomatic formula meaning we will not speak of it again."
 CHI_The_Treasure_Fleet_Returns: "The Treasure Fleet Returns"
 CHI_The_Treasure_Fleet_Returns_desc: "The Belt and Road Initiative extends its maritime component across Southeast Asia. Port concessions, fisheries agreements, and gas platform joint ventures are offered to claimant states. Each concluded deal binds a partner more closely to the Chinese economic orbit and diminishes the appeal of confrontation."
 CHI_the_type_075_yushen: "The Type 075 Yushen"
 CHI_the_type_075_yushen_desc: "The marines gain a flat-topped flagship. The Type 075 Yushen, a forty-thousand-tonne helicopter assault ship, carries a brigade and its gunships over the horizon and lands them by air and sea at once. It is the heart of an amphibious group built to take and hold ground far beyond the coast."
 CHI_the_type_901: "The Type 901 and the Djibouti Lifeline"
 CHI_the_type_901_desc: "A blue-water fleet lives or dies by its supply train. The fast Type 901 combat support ship, large and swift enough to keep pace with a carrier group, lets the fleet stay at sea far from home, and in 2017 China opens its first overseas base at Djibouti, a permanent lifeline anchoring the navy in the Indian Ocean."
 CHI_the_varyag_refit: "The Varyag Refit"
 CHI_the_varyag_refit_desc: "A rusting Soviet hull becomes the seed of a carrier fleet. Bought stripped from Ukraine in 1998 and towed to Dalian in 2002, the unfinished Varyag is rebuilt over a decade and commissioned in 2012 as Liaoning. She is a training ship more than a warship, but on her deck a navy with no carrier tradition learns, plane by plane, how to fly from the sea."
 CHI_the_yasukuni_protest_doctrine: "The Yasukuni Protest Doctrine"
 CHI_the_yasukuni_protest_doctrine_desc: "When the Prime Minister of Japan bows before the names of Class A war criminals, he is not honouring his ancestors. He is rehearsing for the next war. Our ambassador will return to Beijing until further notice."
 CHI_the_yuan_and_the_shang: "The Yuan and the Shang"
 CHI_the_yuan_and_the_shang_desc: "The submarine force steps out of the diesel age. The Type 039 Yuan, an air-independent diesel-electric boat, can lurk silent for weeks in the near seas, while the nuclear Type 093 Shang gives the fleet its first credible attack submarine able to range far from home. Quiet hunters become the navy's sharpest edge."
 CHI_the_yuzhao_pathfinders: "The Yuzhao Pathfinders"
 CHI_the_yuzhao_pathfinders_desc: "상륙 전력 투사는 선체와 여단에서부터 시작됩니다. 2000년대에 설계된 071형 유자오급 상륙수송선거함(LPD)은 해군에 진정한 원양 작전용 상륙함을 제공했으며, 이를 탑재할 최초의 전용 해병여단들이 창설되었습니다. 미래 원정군의 개척자들이 마침내 바다로 나아갑니다."
 CHI_theaterization_of_command: "Theaterise Air Command"
 CHI_theaterization_of_command_desc: "Aircraft must answer to the theatre, not to a separate service chain. Air command is folded into the five joint theatre commands, so that fighters, bombers and drones fight under the same commander as the ground and naval forces, as one campaign rather than three."
 CHI_three_gorges_completion: "Three Gorges Project Completion"
 CHI_three_gorges_completion_desc: "Proposed by Sun Yat-sen and championed by Mao Zedong, the Three Gorges Dam on the Yangtze is now complete. With 32 turbines producing 22.5 GW of hydroelectric capacity, it stands as the largest power station in the world. The project has displaced 1.4 million people and submerged two thousand archaeological sites, but the benefits are real: flood control, navigational improvements, and a decisive increase in renewable energy output for central and western China."
 CHI_three_noc_overseas: "The Three Barrels of Oil Go Abroad"
 CHI_three_noc_overseas_desc: "CNPC, Sinopec, and CNOOC are the three barrels of oil through which we project our Going Out strategy. CNPC drills in Sudan via the Greater Nile Petroleum Operating Company, acquires PetroKazakhstan, and signs a loan-for-oil deal with Rosneft worth 25 billion US dollars. Sinopec acquires Addax Petroleum, securing production licences across Angola, Nigeria, and the Kurdistan Region. CNOOC, blocked in its bid for Unocal, succeeds in acquiring Nexen Canada. Similar deals follow with PDVSA and Petrobras. Each acquisition is a length of chain securing our energy supply."
 CHI_three_red_lines_crackdown: "Real Estate Financing Crackdown"
 CHI_three_red_lines_crackdown_desc: "Regulators impose three hard ratio limits on real estate developers: liabilities-to-assets below 70 percent, net debt-to-equity below 100 percent, and cash-to-short-term debt above 100 percent. Evergrande, with over 300 billion US dollars in total liabilities, breaches all three and collapses, liquidated by a Hong Kong court. Over 70 percent of the top-30 developers enter restructuring. The policy isolates systemic financial risk from the banking sector at the cost of sharply reduced construction activity and local government revenues. The price is high, but the alternative was contagion we could not contain."
 CHI_three_represents_codified: "Three Represents Codified"
 CHI_three_represents_codified_desc: "Private entrepreneurs are admitted to the Party. The Shanghai amendment finds its place in the constitution. Jiang's legacy is sealed in writing."
 CHI_tiangong_station: "Tiangong Space Station"
 CHI_tiangong_station_desc: "The Tianhe core module of the Tiangong space station was launched in April 2021, followed by the Wentian and Mengtian science cabins in 2022. China now operates a permanent crewed orbital laboratory entirely independent of the International Space Station, hosting six-month resident crews and an expanding programme of microgravity research."
 CHI_tianwen_interplanetary: "Tianwen Interplanetary Probe"
 CHI_tianwen_interplanetary_desc: "Tianwen-1 launched in July 2020 and achieved orbit, atmospheric entry, and surface landing in a single mission, delivering the Zhurong rover to Utopia Planitia in May 2021. China became only the second country to successfully operate a rover on Mars. The mission demonstrated deep-space navigation, autonomous hazard avoidance, and high-gain communication relay, all essential precursors to crewed missions beyond cislunar space."
 CHI_Tianxia_Realized: "All Under Heaven"
 CHI_Tianxia_Realized_desc: "At Davos, we articulated a vision of an open, inclusive global order anchored in multilateral institutions and shared prosperity: a Community of Shared Future for Mankind. That vision has now been realised not through coercion but through accumulated economic gravity. The Global Development Initiative, the Asian Infrastructure Investment Bank, and high-quality Belt and Road cooperation have drawn the international community into a framework that acknowledges our centrality by interest. The world we now lead chose to follow."
 CHI_tiger_and_flies: "Tigers and Flies"
 CHI_tiger_and_flies_desc: "The anti-corruption campaign targets both senior tigers and minor flies across the Party apparatus. Zhou Yongkang, former Politburo Standing Committee member, has received a life sentence; Bo Xilai fell before him. More than two million officials have now been investigated and punished. The campaign is simultaneously genuine governance reform and a means of dismantling rival political networks -- and we cannot afford to stop it now."
 CHI_Tonga_Tuna_Concession: "Pacific Fisheries Concessions"
 CHI_Tonga_Tuna_Concession_desc: "Exclusive access agreements with Tonga, Vanuatu, and Fiji grant our distant-water fishing fleets preferential rights across vast exclusive economic zones in the central and western Pacific. In exchange, we fund port upgrades, refrigeration facilities, and maritime surveillance capacity that ties recipient governments into long-term infrastructure dependency. The fisheries deals are the leading economic edge of our broader Pacific engagement."
 CHI_train_as_you_fight: "Train as You Fight"
 CHI_train_as_you_fight_desc: "Parade-ground drill wins parades, not wars. Training is rebuilt around realistic combat conditions, with free-play exercises and a dedicated opposing force at the Zhurihe training base that punishes the scripted victories of the past."
 CHI_train_generals: "Train the Generals"
 CHI_train_generals_desc: "Reforms on paper die without commanders who understand them. Our academies retool to produce officers fluent in joint warfare and information-age command, weeding out the political appointees who cannot read a modern battle."
 CHI_TwentyFive_Year_Iran_Accord: "25-Year China-Iran Partnership"
 CHI_TwentyFive_Year_Iran_Accord_desc: "Our Comprehensive Strategic Partnership commits us to 400 billion United States dollars of investment in Iranian infrastructure, energy, and manufacturing over 25 years in exchange for discounted oil supplies. The accord gives Tehran a lifeline under American sanctions and gives us discounted hydrocarbons and a forward position in the Persian Gulf. Washington, Tel Aviv, and the Gulf monarchies view the agreement as a direct threat to their regional security calculus. Let them."
 CHI_two_centeraries: "The 19th Party Congress"
 CHI_two_centeraries_desc: "The 19th National Congress inscribes 'Xi Jinping Thought on Socialism with Chinese Characteristics for a New Era' into the Party constitution while Xi is still alive, a distinction last held by Mao Zedong. The Two Centenary Goals frame our horizon: a moderately prosperous society by 2021 and a fully developed socialist nation by 2049. The trajectory of the state for the next three decades is now set, and the resources of every institution must be directed accordingly."
 CHI_two_establishments: "The Two Establishments"
 CHI_two_establishments_desc: "The 'Two Establishments' doctrine affirms the core position of Comrade Xi Jinping within the Party Central Committee and the guiding role of Xi Jinping Thought in Party life. Collective leadership is not abolished but reframed: the Standing Committee deliberates, but direction is set by one. The Party moves as a single body, and that body has a center."
 CHI_two_ocean_fleet: "The Two-Ocean Fleet"
 CHI_two_ocean_fleet_desc: "Neither the deep nor the deck alone is enough for what China now intends. We fuse the silent submarine force and the proud surface fleet into a single navy able to fight across two oceans at once, the Pacific and the Indian, holding the near seas while ranging the far ones. From the coastal guard Liu Huaqing inherited, a true blue-water power emerges, second to none but one, and closing."
 CHI_two_reaffirmations: "Two Reaffirmations"
 CHI_two_reaffirmations_desc: "The party reaffirms two foundational commitments: loyalty to the socialist road as defined by Mao Zedong Thought, and the primacy of the Mass Line as the correct method of party leadership. These are not slogans. They are structural guarantees against the rightist drift that has allowed inequality and corruption to hollow out the revolution from within."
 CHI_type_15_light_tank: "The Type 15 Light Tank"
 CHI_type_15_light_tank_desc: "Heavy armour cannot breathe on the Tibetan plateau or cross the bridges of the south. The ZTQ-15, a thirty-tonne light tank with a potent 105mm gun, gives the rapid brigades real armour where a Type 99 cannot go, and it now stares down India along the Himalayan frontier."
 CHI_type_95_adoption: "Adopt the Type 95"
 CHI_type_95_adoption_desc: "The QBZ-95, a 5.8mm bullpup adopted in the late 1990s, replaces the ageing Type 81 across the line and standardises the infantry on a homegrown cartridge. Its quirks are real, but it puts a modern, indigenous rifle in every soldier's hands."
 CHI_ultra_low_emission: "Ultra-Low Emission Standards"
 CHI_ultra_low_emission_desc: "The Ministry of Ecology and Environment and MIIT have issued standards requiring sinter plants, coking facilities, and steel mills to meet emission thresholds stricter than European norms. More than 80 percent of large integrated steelmakers are completing the retrofit. The reform replaces the practice of blanket shutdowns around political events -- APEC blue, parade blue -- with permanent clean-air infrastructure. We should no longer be clearing the sky for occasions. We should keep it clean."
 CHI_underground_great_wall: "The Underground Great Wall"
 CHI_underground_great_wall_desc: "Beneath the mountains we dig the Underground Great Wall, thousands of kilometres of hardened tunnels that hide and shelter our forces and missiles. What cannot be found cannot be destroyed, and a buried arsenal guarantees that any first strike is answered."
 CHI_undersea_supremacy: "Undersea Supremacy"
 CHI_undersea_supremacy_desc: "We will rule the deep rather than the surface. The fleet's priority becomes the submarine: nuclear hunters to kill carriers, boomers to hold the world at risk, and a wall of quiet boats turning the First Island Chain into a trap. Let rivals parade their grand fleets above; we will own the water beneath them and deny them the sea without ever showing a mast."
 CHI_Unification_Ultimatum: "Peninsula Unification Ultimatum"
 CHI_Unification_Ultimatum_desc: "With Beijing and Washington aligned, the time has come to present Pyongyang with a choice: accept peaceful reunification under Seoul, or face the combined weight of the Chinese, American, and South Korean militaries. The ultimatum ends the Korean question one way or another."
 CHI_Vision_2030_Partnership: "Vision 2030 Investment Partnership"
 CHI_Vision_2030_Partnership_desc: "Saudi Arabia's Vision 2030 diversification agenda and our appetite for Gulf capital and contract work converge in a sprawling partnership covering clean energy, tourism infrastructure, and advanced manufacturing. Our firms win major NEOM and Red Sea project contracts while we secure preferential crude supply and a widening yuan settlement share. The arrangement gives Riyadh strategic optionality without formally breaking its security dependence on Washington."
 CHI_wanhua_strategic_materials: "Strategic Materials List"
 CHI_wanhua_strategic_materials_desc: "The MIIT has published a list of approximately 130 chemical materials where we remain import-dependent. Lithography photoresists, polyimide film, high-strength carbon fibre T800 and above, and MDI and TDI polyurethanes are among the most critical. Wanhua Chemical in Yantai, which reverse-engineered MDI technology from Mitsui and acquired Hungary's BorsodChem, has broken the Bayer, BASF, and Huntsman polyurethane oligopoly. Weihai Guangwei Composites, Jilin Carbon Valley, and Sinopec Shanghai Petrochemical build carbon fibre capacity for wind turbine blades and aerospace composites. Each substitution reduces our structural exposure to foreign export controls."
 CHI_warlord_temptation: "The Warlord Temptation"
 CHI_warlord_temptation_desc: "An army that serves money can be tempted to serve itself. With regions, revenues and loyal troops in hand, the great commanders edge toward the oldest Chinese danger: a force that obeys its generals before the centre, and a republic drifting back toward the age of warlords."
 CHI_water_security_initiative: "National Water Security Initiative"
 CHI_water_security_initiative_desc: "China's north-south water imbalance has been addressed since 2002 through the South-North Water Transfer Project, the largest inter-basin diversion scheme ever built, channelling water from the Yangtze catchment to the parched Yellow River basin and the capital region. A national water-security drive expands on this foundation, coupling large-scale infrastructure with province-level conservation projects targeting the most water-stressed areas of the north. Completing enough of these projects will progressively ease the shortage burdening the national economy."
 CHI_weqi_pipeline_lines: "The West-East Gas Pipeline"
 CHI_weqi_pipeline_lines_desc: "The West-East Gas Transmission Project links the Tarim Basin in Xinjiang to Shanghai via a 4,000-kilometre trunk line, with a second line carrying Turkmen gas east via Khorgos and a third from Turkmenistan via Kyrgyzstan following it. The Power of Siberia pipeline, agreed with Vladimir Putin under a 30-year, 38-billion-cubic-metre annual contract, now delivers gas from Heilongjiang directly into our eastern grid. CNPC and PetroChina manage construction and operation throughout. No country that controls this pipeline infrastructure can be strangled by an energy embargo."
 CHI_west_east_gas_pipeline: "West-East Gas Pipeline"
 CHI_west_east_gas_pipeline_desc: "The West-East Gas Pipeline runs 4,000 kilometres from the Tarim Basin in Xinjiang to Shanghai, completed in 2004. It supplies natural gas to China's industrial east, reducing coal dependence and accelerating the commercialisation of Xinjiang's hydrocarbon reserves."
 CHI_western_development_strategy: "The Western Development Strategy"
 CHI_western_development_strategy_desc: "The Xibu Da Kaifa programme directs preferential investment, tax incentives, and accelerated infrastructure construction to twelve western provinces and autonomous regions. We are closing the coastal-interior gap and deepening our integration with Central and South Asia, drawing the periphery into our economic core before rivals can fill the space."
 CHI_western_energy_strategy: "Western Energy Development"
 CHI_western_energy_strategy_desc: "China's western provinces hold the country's largest reserves of coal, natural gas, and hydropower. A coordinated development strategy links extraction to the coastal industrial heartland, reducing dependence on energy imports and extending economic activity into the interior."
 CHI_western_industrial_drive: "Western Industrial Development Drive"
 CHI_western_industrial_drive_desc: "The State Council has approved 169 provincial industrial parks for elevation to national Economic and Technological Development Zones, with the majority directed at underdeveloped western provinces. Priority investment in Yunnan, Guizhou, and Western Sichuan is beginning to close the income gap with the coast and establish the logistical preconditions for large-scale inland manufacturing. The west has waited long enough."
 CHI_western_institutional_engagement: "Western Institutional Engagement"
 CHI_western_institutional_engagement_desc: "Zeng Qinghong champions deepened engagement with Western-led multilateral institutions as the best way to secure our position in the international order while the rules are still being set. We push for expanded IMF quota, adopt International Financial Reporting Standards in our state enterprises, and increase our representation on World Bank boards. Better to shape the architecture from within than to stand outside it."
 CHI_western_pipeline_corridor: "West-East Gas Pipeline"
 CHI_western_pipeline_corridor_desc: "The West-East Gas Pipeline runs 4,000 kilometres from the Tarim Basin in Xinjiang through Gansu, Shaanxi, and the Yangtze Delta to Shanghai. Once complete, it will displace coal in Yangtze Delta industry and reduce the particulate pollution choking our wealthiest coastal cities, binding the west's resources to the east's growth."
 CHI_Win_Win_Cooperation: "Community of Shared Future"
 CHI_Win_Win_Cooperation_desc: "After mounting international criticism of debt-trap financing, we reform our lending terms, introducing concessional rates, local labor requirements, and debt sustainability assessments. The \"win-win\" framing repositions the Belt and Road as a vehicle for mutual development rather than strategic leverage, and the critics find their arguments harder to sustain."
 CHI_Wolf_Warrior_Diplomacy: "Wolf Warrior Diplomacy"
 CHI_Wolf_Warrior_Diplomacy_desc: "We will adopt an assertive, confrontational diplomatic stance. Our diplomats will aggressively defend our interests and challenge Western narratives wherever they find them. The goal is clear: replace the United States as the dominant global power."
 CHI_wolf_warrior_doctrine: "Wolf Warrior Diplomacy"
 CHI_wolf_warrior_doctrine_desc: "A new assertive style of diplomacy has emerged from our Ministry of Foreign Affairs. Our ambassadors publicly attack foreign critics; state spokespersons respond to censure with accusations of hypocrisy and bad faith. The approach abandons Deng Xiaoping's doctrine of hiding strength and biding time in favour of direct confrontation. We no longer apologize, and the world is beginning to understand what that means."
 CHI_ws15_bottleneck_solve: "Break the WS-15 Bottleneck"
 CHI_ws15_bottleneck_solve_desc: "The jet engine is the wall every Chinese fighter has broken upon, forcing reliance on Russian turbines for our best airframes. The WS-15 turbofan is meant to end that dependence and give the J-20 the supercruise thrust it was designed around. Mastering the single-crystal turbine blade is the last metre of the climb."
 CHI_wto_accession_drive: "WTO Accession Drive"
 CHI_wto_accession_drive_desc: "After fifteen years of negotiations, we stand on the verge of formal membership in the World Trade Organization. Accession will lock in our trade liberalization reforms, open foreign markets to our exports, and accelerate the transfer of industrial technology into our hands."
 CHI_wto_commercial_bank_reform: "WTO Commercial Bank Law Reform"
 CHI_wto_commercial_bank_reform_desc: "Our WTO accession commits us to opening the financial sector to foreign banks, and Premier Zhu Rongji has launched a three-step restructuring before that deadline arrives. Asset Management Companies absorb hundreds of billions in non-performing loans; Central Huijin Investment injects capital using foreign exchange reserves; the Big Four banks list on overseas exchanges to impose market discipline. The Commercial Bank Law revision transforms the Big Four from political credit vehicles into formally commercial institutions, a distinction that will matter when foreign banks arrive to compete."
 CHI_wto_implementation: "WTO Implementation"
 CHI_wto_implementation_desc: "Our WTO accession committed us to a multi-year schedule of tariff reductions, intellectual property reforms, service sector opening, and elimination of state trading privileges. Implementation was uneven and frequently contested by trading partners at the Dispute Settlement Body, but the process has deeply integrated us into global supply chains, and that integration is a weapon as much as an obligation."
 CHI_wto_implementation_tt: "If we complete §Y$CHI_wto_accession_drive$§!, the bonus will be better and permanent "
 CHI_wuhan_automotive_hub: "Wuhan Automotive Centre"
 CHI_wuhan_automotive_hub_desc: "Dongfeng Motor Corporation, headquartered in Wuhan, expands its joint-venture operations with Peugeot-Citroen, Nissan, and Honda. Wuhan becomes the automotive capital of central China, anchoring a cluster of component suppliers and logistics firms along the Yangtze."
 CHI_xi_jinping_thought_enshrined: "Xi Jinping Thought Enshrined"
 CHI_xi_jinping_thought_enshrined_desc: "Xi Jinping Thought is elevated from policy guidance into constitutional doctrine, studied compulsorily at universities, military academies, and Party schools nationwide. The Xuexi Qiangguo app is installed on hundreds of millions of phones and monitored for daily engagement. Dissent is no longer merely unwelcome; it is now officially a deviation from established truth. The ideological architecture of the state and a single name are no longer separable."
 CHI_xinjiang_industrial_zones: "Xinjiang Industrial Development"
 CHI_xinjiang_industrial_zones_desc: "Special industrial zones in Urumqi and the Tarim Basin attract Han migration, processing industries, and resource extraction investment. The zones are designed to anchor Xinjiang's economy to the eastern industrial base and reduce its dependence on traditional agriculture."
 CHI_y20_strategic_lift_program: "The Y-20 Strategic Lift Program"
 CHI_y20_strategic_lift_program_desc: "A great power must be able to move itself. The Y-20 'Kunpeng', a heavy jet transport in service from 2016, finally gives China the airlift to deploy troops, armour and aid across continents, and its tanker and command variants multiply the reach of the whole air force."
 CHI_Yangtze_confederation: "Yangtze Economic Confederation"
 CHI_Yangtze_confederation_desc: "The Yangtze River basin -- from Chongqing through Hubei and Hunan to the river's mouth at Shanghai -- contains the industrial heartland of China. A formal economic confederation of these provinces under coordinated planning will eliminate redundant investment, integrate supply chains, and project the Chongqing Model across the most productive corridor of the nation."
 CHI_yangtze_delta_integration: "Yangtze Delta Integration"
 CHI_yangtze_delta_integration_desc: "Coordinated state investment across Shanghai, Jiangsu, and Zhejiang deepens the Yangtze River Delta as our premier manufacturing and export corridor. The concentration of foreign capital and skilled labour here will anchor growth for the coming decade."
 CHI_yangtze_logistics_corridor: "Yangtze River Logistics Corridor"
 CHI_yangtze_logistics_corridor_desc: "The Yangtze River handles more freight than any other inland waterway in the world. Investment in port infrastructure, navigational improvements, and intermodal terminals integrates the river into national supply chains, connecting Sichuan to Shanghai at a fraction of road transport costs."
 CHI_yj12_standoff_family: "The YJ-12 Standoff Family"
 CHI_yj12_standoff_family_desc: "The YJ-12 gives our aircraft a supersonic, sea-skimming anti-ship missile that closes too fast for most defences to answer. Slung beneath bombers and fighters, it puts every warship within hundreds of kilometres of the Chinese coast at risk."
 CHI_youth_league_pipeline: "The Youth League Pipeline"
 CHI_youth_league_pipeline_desc: "The Communist Youth League is the primary talent pool for Hu Jintao's faction. CYL alumni hold a majority of provincial secretaryships and dominate mid-level central ministry positions, forming a nationwide network of officials bound by shared organisational experience. Those who climb through its ranks owe their advancement to the same system."
 CHI_yuan_internationalisation: "Yuan Internationalisation"
 CHI_yuan_internationalisation_desc: "The global financial crisis exposed the dollar's fragility and gave us our opening. Bilateral currency swap agreements with dozens of central banks, offshore yuan clearing centres in Hong Kong and Singapore, and a dim-sum bond market have given our renminbi its first significant international circulation. The dollar's reserve premium will not survive indefinitely."
 CHI_yuanhua_model: "The Yuanhua Model"
 CHI_yuanhua_model_desc: "Lai Changxing showed how it is done. From Xiamen his Yuanhua empire smuggled some ten billion dollars in oil, cars and cigarettes through the 1990s, and whenever customs closed in a powerful officer appeared to wave them off. We make his arrangement a system: the military shields the smuggler, and the smuggler pays the military."
 CHI_yuzhao_hull_coral_brigades: "The Yuzhao Hull and the Coral Brigades"
 CHI_yuzhao_hull_coral_brigades_desc: "Amphibious ambition turns from pathfinder to fleet. The Type 071 enters serial production, and the marine corps swells from two brigades to six, trained for the contested reefs and islands of the South China Sea. Hull and coral brigade grow together into a force that can seize a shoreline."
 CHI_zb108_wheeled_family: "The Type 08 Wheeled Family"
 CHI_zb108_wheeled_family_desc: "The 8x8 Type 08 family, from infantry carrier to assault gun to ambulance, gives the medium brigades a single wheeled chassis that is fast on roads and cheap to run, the mobile core of China's rapid-deployment forces."
 CHI_zbd04_apex_ifv: "The ZBD-04A Apex IFV"
 CHI_zbd04_apex_ifv_desc: "The ZBD-04A is the army's premier tracked infantry fighting vehicle, carrying a 100mm gun-launcher, a 30mm cannon and a full squad under armour. It is the backbone of the heavy mechanised brigades and the partner of the Type 99 on the China-India line."
 CHI_zbd_mechanisation: "ZBD Mechanisation"
 CHI_zbd_mechanisation_desc: "The infantry must keep pace with the armour. The tracked ZBD fighting-vehicle family carries the riflemen forward under armour and fights alongside the tanks, completing the mechanisation of the heavy brigades."
 CHI_zeng_qinghong_reign: "The Zeng Qinghong Era"
 CHI_zeng_qinghong_reign_desc: "Zeng Qinghong, the leading strategist of the Shanghai Clique, serves as Vice President and head of the Central Party School. His control over the Organisation Department and the Central Secretariat gives him decisive influence over personnel appointments at every level of the party-state apparatus. Those he places, he owns."
 CHI_zero_hour: "Zero Hour"
 CHI_zero_hour_desc: "For years the army has trained, re-equipped, and waited, and the hour has come to put all of it to use. Our infantry will advance in numbers no defensive line can absorb, our armored columns in formations too deep to be turned, while the strategic rocket forces wait in their silos as the argument we intend never to be forced to make. From this hour the People's Liberation Army ceases to prepare for the next war and begins instead to expect it, every command answering at last to a single will."
 CHI_ztz96_mainstreaming: "Mainstream the Type 96"
 CHI_ztz96_mainstreaming_desc: "Not every brigade needs the costly Type 99. The cheaper, lighter ZTZ-96 is produced in bulk and steadily upgraded to the 96A and 96B, becoming the workhorse tank that fills out the body of the armoured force."
 CHI_ztz99_rollout: "Roll Out the Type 99"
 CHI_ztz99_rollout_desc: "The ZTZ-99 becomes the spearhead of the heavy brigades, a third-generation main battle tank with composite armour, a 125mm gun and a laser defence suite. It is the first Chinese tank built to meet the best of the West and Russia on equal terms."
 CHI_ztz99a_apex: "The Type 99A Apex"
 CHI_ztz99a_apex_desc: "The ZTZ-99A, fielded from 2011, is the pinnacle of the line: heavier armour, an uprated engine, a hunter-killer sight and a full battle-management system that makes it a node in the brigade network. It is the heaviest fist the army can throw."
 arctic_observer_status: "Arctic Observer Status"
 arctic_observer_status_desc: "Our seat on the Arctic Council and our Polar Silk Road infrastructure open new shipping lanes and resource frontiers in the high north."
 CHI_610_directive_active: "610 Northeast Directive"
 CHI_610_directive_active_desc: "The CCP's Northeast Command has activated emergency mobilization protocols. Security forces along the Yalu River are reinforced, and provincial authorities operate under expanded emergency powers."
 CHI_aiib_dividend_member: "AIIB Dividend Member"
 CHI_aiib_dividend_member_desc: "Founding membership in the Asian Infrastructure Investment Bank delivers steady returns. Investment payouts and preferential trade terms with Chinese-financed projects strengthen our balance sheet."
 CHI_anti_corruption_purge: "Anti-Corruption Purge"
 CHI_anti_corruption_purge_desc: "The Central Commission for Discipline Inspection processes thousands of cases annually. Graft within procurement, construction, and state enterprise management is exposed and penalized. Officials who had extracted rent from every contract find that the political calculus has shifted. Output per state function rises as patronage networks are dismantled and replaced with direct accountability."
 CHI_anti_terror_crackdown_idea: "Anti-Terror Crackdown"
 CHI_anti_terror_crackdown_idea_desc: "Security services are running a nationwide operation against terrorist networks. Detection capacity is elevated while political bandwidth is absorbed by the crackdown."
 CHI_army_reorganisation_disruption_idea: "Army Reorganisation"
 CHI_army_reorganisation_disruption_idea_desc: "The thirteen group armies are renumbered and rebuilt around combined-arms brigades. While the reshuffle is underway, organisation and offensive power suffer and training backs up. Once the new structure settles, the ground force emerges leaner and more capable than before."
 CHI_asian_century_concord_idea: "The Asian Century Concord"
 CHI_asian_century_concord_idea_desc: "Beijing and New Delhi have agreed to coordinate on regional and global affairs, framing the twenty-first century as Asia's to shape together."
 CHI_AUS_pacific_deterrence: "Increased Pacific Deterrence"
 CHI_AUS_pacific_deterrence_desc: "Chinese basing pressure in the South Pacific has forced an urgent expansion of the Royal Australian Navy's reach. New sensors, sharper intelligence, and prepared amphibious assets stand ready."
 CHI_ban_strategic_partnership: "Strategic Partnership with Beijing"
 CHI_ban_strategic_partnership_desc: "Bangladesh aligns its foreign policy posture with China across multilateral forums."
 CHI_banking_modernised_idea: "Recapitalised Banking Sector"
 CHI_banking_modernised_idea_desc: "State banks have been cleansed of non-performing loans and listed with foreign minority shareholders on the Hong Kong exchange. International accounting standards, external audit, and market discipline improve the sector's efficiency and credibility."
 CHI_beidou_global_constellation: "Beidou Global Constellation"
 CHI_beidou_global_constellation_desc: "With ground stations deployed across Latin America, the Beidou satellite network now provides comprehensive global coverage. Naval operations, reconnaissance, and counter-intelligence all benefit from the precision and reach."
 CHI_beijing_communique_guarantor: "Guarantor of the Beijing Communique"
 CHI_beijing_communique_guarantor_desc: "China's role in brokering peace between two regional rivals has enhanced its standing as a responsible power. Diplomatic capital flows freely and relations are easier to maintain."
 CHI_blue_national_soil: "Blue National Soil"
 CHI_blue_national_soil_desc: "The official PRC doctrine designating sea space within the nine-dash line as \"blue national soil\": maritime territory as inalienable as any province on land. The framing makes concession politically impossible and redefines any foreign presence as trespass."
 CHI_blue_national_soil_militarised: "Blue National Soil Militarised"
 CHI_blue_national_soil_militarised_desc: "What began as an administrative doctrine has become an operational posture. PLAN and coast guard assets now enforce the blue national soil claim actively, treating incursions by foreign vessels as violations of Chinese domestic law."
 CHI_bo_ideological_consolidation: "Ideological Consolidation"
 CHI_bo_ideological_consolidation_desc: "A campaign of ideological clarification reinforces the party's socialist commitments and counters rightist drift. Study sessions, rectification meetings, and revised educational curricula embed the two reaffirmations across the state apparatus."
 CHI_bri_forum_momentum: "Belt and Road Forum Momentum"
 CHI_bri_forum_momentum_desc: "The triennial Belt and Road Forum in Beijing has reaffirmed China's commitment to infrastructure-driven globalisation. Foreign delegations leave with new commitments and our economic diplomacy reaps a multi-year dividend."
 CHI_bri_industrial_zones_tier_1_idea: "Special Economic Zones I"
 CHI_bri_industrial_zones_tier_1_idea_desc: "Special economic zones abroad, built to a Chinese template, extend our manufacturing base beyond our borders."
 CHI_bri_industrial_zones_tier_2_idea: "Special Economic Zones II"
 CHI_bri_industrial_zones_tier_2_idea_desc: "The overseas zones have matured into working industrial parks, and the construction expertise flows back into domestic building programmes."
 CHI_bri_industrial_zones_tier_3_idea: "Special Economic Zones III"
 CHI_bri_industrial_zones_tier_3_idea_desc: "A network of Chinese-managed industrial parks anchors partner economies to our supply chains and our construction industry."
 CHI_bri_mines_tier_1_idea: "Resource Concessions I"
 CHI_bri_mines_tier_1_idea_desc: "Mining concessions secured through partner-state lending feed raw material back into Chinese industry."
 CHI_bri_mines_tier_2_idea: "Resource Concessions II"
 CHI_bri_mines_tier_2_idea_desc: "The concession portfolio has broadened across several extractive sectors, deepening the resource base available to our economy."
 CHI_bri_mines_tier_3_idea: "Resource Concessions III"
 CHI_bri_mines_tier_3_idea_desc: "Chinese firms hold controlling stakes across the partner extractive sector, and the surplus beyond our own needs is sold on at a premium."
 CHI_bri_pipelines_tier_1_idea: "Energy Arteries I"
 CHI_bri_pipelines_tier_1_idea_desc: "Partner-state pipelines feeding Chinese refineries reduce our exposure to seaborne energy chokepoints."
 CHI_bri_pipelines_tier_2_idea: "Energy Arteries II"
 CHI_bri_pipelines_tier_2_idea_desc: "Expanded pipeline capacity and associated tank farms let us both draw more fuel and hold more of it in reserve."
 CHI_bri_pipelines_tier_3_idea: "Energy Arteries III"
 CHI_bri_pipelines_tier_3_idea_desc: "Overland energy arteries now bypass the maritime chokepoints entirely, and the storage infrastructure to exploit them is being raised at pace."
 CHI_bri_ports_tier_1_idea: "Maritime Network I"
 CHI_bri_ports_tier_1_idea_desc: "Chinese-operated container terminals now handle a meaningful share of partner-state trade along the maritime route, strengthening our commercial standing with the nations we ship through."
 CHI_bri_ports_tier_2_idea: "Maritime Network II"
 CHI_bri_ports_tier_2_idea_desc: "Terminal concessions have widened into full port development contracts. The yards and berths our contractors build abroad sharpen the expertise they bring to naval construction at home."
 CHI_bri_ports_tier_3_idea: "Maritime Network III"
 CHI_bri_ports_tier_3_idea_desc: "A chain of commercial harbours, several with dual-use berths and replenishment facilities, now spans the sea lanes. Chinese shipping ranges further, and so does the fleet that protects it."
 CHI_bri_powerplants_tier_1_idea: "Power Generation Network I"
 CHI_bri_powerplants_tier_1_idea_desc: "Generating capacity built abroad by Chinese contractors keeps partner industry running on our terms, and our own plants run better for the experience."
 CHI_bri_powerplants_tier_2_idea: "Power Generation Network II"
 CHI_bri_powerplants_tier_2_idea_desc: "A wider portfolio of overseas generating stations sustains higher industrial throughput at home."
 CHI_bri_powerplants_tier_3_idea: "Power Generation Network III"
 CHI_bri_powerplants_tier_3_idea_desc: "Chinese engineering has become the default supplier of power generation across the partner network, with the industrial output at home to match."
 CHI_bri_prestige_tier_1_idea: "Prestige Diplomacy I"
 CHI_bri_prestige_tier_1_idea_desc: "Visible investment in partner states buys us a reputation as a builder rather than a creditor."
 CHI_bri_prestige_tier_2_idea: "Prestige Diplomacy II"
 CHI_bri_prestige_tier_2_idea_desc: "The Belt and Road is spoken of as a public good. Maintaining friendly relations costs us less than it once did."
 CHI_bri_prestige_tier_3_idea: "Prestige Diplomacy III"
 CHI_bri_prestige_tier_3_idea_desc: "Beijing is now the partner of first resort across much of the developing world, and the standing that brings translates directly into political capital at home."
 CHI_bri_railways_tier_1_idea: "Overland Corridors I"
 CHI_bri_railways_tier_1_idea_desc: "Cross-border rail links tie partner economies to Chinese industry, and the freight moving along them earns us goodwill among the states they serve."
 CHI_bri_railways_tier_2_idea: "Overland Corridors II"
 CHI_bri_railways_tier_2_idea_desc: "The corridors now run as scheduled freight arteries. Reliable overland haulage keeps our forces supplied where sea access is uncertain."
 CHI_bri_railways_tier_3_idea: "Overland Corridors III"
 CHI_bri_railways_tier_3_idea_desc: "A continuous overland network reaches deep into the interior of the landmass. Our rail engineering corps builds faster at home for the experience earned abroad."
 CHI_bri_telecom_tier_1_idea: "Digital Silk Road I"
 CHI_bri_telecom_tier_1_idea_desc: "Chinese-built network backbones in partner states give our services visibility into the traffic crossing them, hardening us against foreign intelligence penetration."
 CHI_bri_telecom_tier_2_idea: "Digital Silk Road II"
 CHI_bri_telecom_tier_2_idea_desc: "Control of the equipment layer across partner networks lowers the cost of sustaining our own operations abroad."
 CHI_bri_telecom_tier_3_idea: "Digital Silk Road III"
 CHI_bri_telecom_tier_3_idea_desc: "The digital corridor is ours end to end: hardware, backhaul, and the cable landings. Foreign traffic passing through it is neither private nor secure from us."
 CHI_brokered_non_aggression_pact: "Beijing-Brokered Non-Aggression Pact"
 CHI_brokered_non_aggression_pact_desc: "China stands as the guarantor of our non-aggression understanding with our regional rival. While the pact holds, both sides benefit from stability and warmer ties with Beijing."
 CHI_cadre_evaluation_reform_idea: "Comprehensive Cadre Evaluation Reform"
 CHI_cadre_evaluation_reform_idea_desc: "Officials are now assessed on environmental stewardship, social harmony, and public service delivery alongside GDP growth. Reduced reliance on fossil-intensive production and leaner public expenditure reflect a more accountable administrative class."
 CHI_cai_active_phase: "EU Comprehensive Agreement on Investment"
 CHI_cai_active_phase_desc: "The Comprehensive Agreement on Investment is in its active phase. European markets are wide open to Chinese exports and investment, consumer goods costs are down, and our industrial capacity is significantly expanded."
 CHI_cai_residual: "Lasting CAI Legacy"
 CHI_cai_residual_desc: "Even after the active phase of the Comprehensive Agreement on Investment ended, the structural integration with European markets persists. Trade ties remain warmer than they would otherwise have been."
 CHI_central_political_commission_1: "Central Political and Legal Affairs Commission"
 CHI_central_political_commission_1_desc: "The Central Political and Legal Affairs Commission holds oversight authority over the courts, procuratorate, public security apparatus, and state security organs. Its principal mission is maintaining domestic order and ensuring the legal system serves party objectives rather than acting as an independent check. As its standing within the committee grows, the commission's capacity to preempt unrest, process dissent efficiently, and coordinate cross-agency security responses improves substantially."
 CHI_chinese_dream_momentum: "Chinese Dream Momentum"
 CHI_chinese_dream_momentum_desc: "The Chinese Dream narrative mobilizes a public sense of national purpose. Citizens are called to serve the collective renewal; Party organs report surging enlistment inquiries and public displays of patriotic sentiment. For now, the story is more compelling than the destination."
 CHI_chongqing_model_idea: "Chongqing Model"
 CHI_chongqing_model_idea_desc: "State enterprises anchor investment and set the pace for the broader economy. Nationalised assets provide a fiscal base for welfare spending without relying on foreign capital or private sector tax receipts."
 CHI_commercial_bank_law_idea: "Commercial Bank Law Implementation"
 CHI_commercial_bank_law_idea_desc: "The 2003 revisions to the Commercial Bank Law impose Basel-style capital adequacy ratios, risk classification standards, and independent boards on the Big Four. Regulatory compliance costs rise during the transition, but the credit allocation process moves out of direct political control for the first time."
 CHI_common_prosperity_framework: "Common Prosperity Framework"
 CHI_common_prosperity_framework_desc: "Regulatory intervention in private-sector education, entertainment, and technology is paired with expanded state investment in healthcare, rural infrastructure, and social insurance. The Party's claim is that prosperity becomes common; the mechanism is that the state determines what prosperity means and who receives it first."
 CHI_cpec_partner: "China-Pakistan Economic Corridor"
 CHI_cpec_partner_desc: "The CPEC investment package is reshaping Pakistani infrastructure, with Chinese-financed motorways, energy projects, and industrial zones accelerating economic activity."
 CHI_crrc_idea1_desc: "China Railway Rolling Stock Corporation, the world's largest supplier of rail equipment, drives the domestic construction of track and terminals and the export of Chinese rolling stock abroad."
 CHI_defiance_of_china: "Defiance of China"
 CHI_defiance_of_china_desc: "The state has rejected Chinese demands, withstood economic pressure, and maintained its position on the disputed features. The act of defiance carries significant domestic prestige and may encourage other regional actors to harden their own stances."
 CHI_diaoyu_patrol_regime: "Diaoyu Patrol Regime"
 CHI_diaoyu_patrol_regime_desc: "Continuous coast guard rotations near disputed waters train naval crews under realistic conditions."
 CHI_digital_governance_spirit: "Digital Governance"
 CHI_digital_governance_spirit_desc: "Integrated data systems link urban surveillance networks, financial transaction monitoring, and social credit scores into a unified compliance infrastructure. Local governments process administrative requests digitally and enforce standards through automated flagging. The bureaucratic interface between citizen and state is streamlined, and the state is present at every point of contact."
 CHI_distant_water_fishing_fleets: "Distant-Water Fishing Fleet"
 CHI_distant_water_fishing_fleets_desc: "Subsidised by Beijing and backed by state-owned enterprises, our distant-water fleet is the largest in the world, operating in the exclusive economic zones of West Africa, South America, and the South Pacific. Beyond food security, the vessels project a persistent maritime presence in waters far from our coast, reinforcing the principle that Chinese interests extend wherever Chinese ships sail."
 CHI_divestiture_transition_idea: "Divestiture Transition"
 CHI_divestiture_transition_idea_desc: "Forcing the army off its commercial revenue and onto the state budget leaves a gap no appropriation closes overnight. Units accustomed to funding themselves from hotels, farms and trading arms must now wait on Beijing, and political capital is spent smoothing the loss. The strain eases once the defence sector is reorganised into self-funding conglomerates."
 CHI_dragon_king_ascendant: "Dragon King Ascendant"
 CHI_dragon_king_ascendant_desc: "Long Wang -the Dragon King- is the traditional sovereign of the four seas in Chinese cosmology. With the tributary system formally invoked and the military presence consolidated, the South Sea acknowledges only one sovereign: Beijing."
 CHI_eda_grey_market_idea: "Grey-Channel EDA Sourcing"
 CHI_eda_grey_market_idea_desc: "Domestic fabless houses procure Synopsys and Cadence flows through Southeast Asian shell companies. Tape-outs work, but the supply is unreliable and tooling updates trail months behind the licensed market."
 CHI_eight_points_doctrine: "Eight Points on Taiwan"
 CHI_eight_points_doctrine_desc: "Jiang Zemin's Eight-Point Proposal provides a formal doctrinal framework for cross-strait policy, combining overtures for peaceful reunification with explicit warnings against de jure independence. Military planning for contingency operations runs alongside the diplomatic track, giving Beijing a credible coercive instrument."
 CHI_etim_designation: "ETIM Designation Framework"
 CHI_etim_designation_desc: "Bilateral counter-terrorism framework targets East Turkestan separatist networks."
 CHI_eu_market_access: "Comprehensive EU Market Access"
 CHI_eu_market_access_desc: "Ratification of a comprehensive investment framework with Brussels opens deep access to European consumer and capital markets, lifting export ceilings and softening the political climate for Chinese firms across the bloc."
 CHI_grey_society_crisis_idea: "Grey Society Crisis"
 CHI_grey_society_crisis_idea_desc: "China's post one-child generation now carries an inverted age pyramid. A shrinking labour force must fund a swelling cohort of retirees, draining pension and healthcare budgets while productivity growth stalls. The burden eases only as the working-age population stabilises."
 CHI_guarantor_of_korean_peace: "Guarantor of Korean Peace"
 CHI_guarantor_of_korean_peace_desc: "Beijing is recognized across the region as the indispensable guarantor of Korean stability. The prestige this confers outlasts any single administration."
 CHI_gwadar_basing_rights: "Gwadar Basing Rights"
 CHI_gwadar_basing_rights_desc: "Access to Gwadar's deep-water facilities extends the operational reach of the People's Liberation Army Navy across the Indian Ocean and the Arabian Sea."
 CHI_ideological_rectification: "Ideological Rectification"
 CHI_ideological_rectification_desc: "Document No. 9's prohibitions are enforced through mandatory study sessions and self-criticism campaigns across universities, media organizations, and state enterprises. The boundaries of acceptable discourse contract rapidly. Loyalty is demonstrated through the rejection of Western liberal concepts, and the walls of the ideological perimeter harden against foreign influence."
 CHI_informal_sanctions: "Informal THAAD Sanctions"
 CHI_informal_sanctions_desc: "We have imposed informal economic sanctions on South Korea in response to the THAAD deployment. Chinese tourists are redirected, Korean goods face non-tariff barriers, and Korean businesses operating in our territory report official harassment."
 CHI_information_warfare: "Information Warfare Apparatus"
 CHI_information_warfare_desc: "State media and digital platforms project Chinese narratives globally while countering hostile information campaigns."
 CHI_inner_party_supervision_idea: "Inner-Party Supervision Regulations"
 CHI_inner_party_supervision_idea_desc: "Formalised supervision procedures require superior party organs to inspect and report on subordinate committees. Anti-corruption enforcement is strengthened and political accountability is regularised."
 CHI_international_department_1: "International Department of the Chinese Communist Party"
 CHI_international_department_1_desc: "The International Department conducts party-to-party diplomacy worldwide, cultivating relationships with ruling parties, opposition movements, and political foundations across every region. It also serves as the primary institutional home for the Belt and Road Initiative's political outreach, coordinating project delivery, managing returns from partner-country engagement, and handling debt restructuring when recipient governments face repayment difficulties. Expanding its commission influence deepens the network of receptive foreign partners and improves the overall yield of BRI commitments."
 CHI_international_sanctions: "International Sanctions"
 CHI_international_sanctions_desc: "China's support for North Korean military aggression has triggered a sweeping international sanctions regime. Trade access is restricted, foreign investment dries up, and diplomatic isolation deepens."
 CHI_Invigorate_Country_Through_STE1: "Invigorate Country Through STE"
 CHI_Invigorate_Country_Through_STE1_desc: "The strategy of invigorating the country through science, technology, and education directs state investment into research institutes and the university system. The research dividend comes at the price of a heavier education budget."
 CHI_Invigorate_Country_Through_STE1_tt: "Yearly Tech Boost for §Y$CAT_computing_tech$§! or §Y$CAT_internet_tech$§!"
 CHI_iron_brothers_joint_training: "Iron Brothers Joint Training"
 CHI_iron_brothers_joint_training_desc: "Sustained joint exercises with the partner military have improved unit cohesion, doctrinal alignment, and combined-arms proficiency."
 CHI_jap_finlandized_sovereignty: "Finlandised Sovereignty"
 CHI_jap_finlandized_sovereignty_desc: "Tokyo retains its parliament, its press, its language. It also keeps its quiet about what Beijing does beyond its borders."
 CHI_jap_forced_neutrality: "Forced Neutrality"
 CHI_jap_forced_neutrality_desc: "Japan's withdrawal from the American security umbrella came at gunpoint. The treaty is signed. The humiliation is generational."
 CHI_jap_historical_pressure: "Chinese History Offensive"
 CHI_jap_historical_pressure_desc: "Beijing has reopened the wartime history question, raising the Yasukuni Shrine visits, textbook controversies, and the Nanjing legacy in every diplomatic forum. The campaign inflames domestic opinion in Japan and erodes Tokyo's ability to counter Chinese influence operations."
 CHI_japan_soft_power: "Sino-Japanese Cultural Engagement"
 CHI_japan_soft_power_desc: "Tourist exchanges, panda loans, and ministerial photo-ops translate goodwill into political capital. Suspended automatically if aggression rises too high."
 CHI_japanese_cultural_imports: "Licensed Japanese Cultural Imports"
 CHI_japanese_cultural_imports_desc: "Bilibili streams Studio Ghibli. Tencent licenses Demon Slayer. The Party's youth wing studies Wang Huning's reports on cultural absorption."
 CHI_joint_command_consultations: "Joint Command Consultations"
 CHI_joint_command_consultations_desc: "Regular strategic consultations between Chinese and North Korean military commands are improving coordination and reducing the risk of miscalculation."
 CHI_joint_venture_era_idea: "Joint Venture Industrial Era"
 CHI_joint_venture_era_idea_desc: "Foreign-domestic joint ventures become the primary vehicle for technology acquisition, management knowledge transfer, and access to global distribution networks."
 CHI_kaesong_co_developer: "Kaesong Co-Developer"
 CHI_kaesong_co_developer_desc: "Chinese construction firms and logistics operators are running joint ventures inside the expanded Kaesong zone. Shared supply chains cut costs and tie reputations together."
 CHI_kor_beijing_pressure: "Beijing Pressure Campaign"
 CHI_kor_beijing_pressure_desc: "Sustained Chinese economic and diplomatic pressure is eroding South Korean public confidence and narrowing Seoul's room for independent policy. The government faces rising domestic dissatisfaction and a shrinking margin for manoeuvre against Beijing."
 CHI_kor_beijing_security_guarantee: "Beijing Security Guarantee"
 CHI_kor_beijing_security_guarantee_desc: "Under a formal Chinese security guarantee, South Korea is freed from its dependence on the American nuclear umbrella. Defence planning is reoriented around cooperation with Beijing, reducing conscription burdens and stabilizing the political climate."
 CHI_kor_exit_trilateral: "Exit from Trilateral Framework"
 CHI_kor_exit_trilateral_desc: "South Korea has withdrawn from the U.S.-Japan-Philippines trilateral defense framework. The decision reflects Seoul's judgment that the framework's anti-China orientation is incompatible with its economic interests and strategic autonomy goals."
 CHI_kor_strategic_autonomy_doctrine: "Strategic Autonomy Doctrine"
 CHI_kor_strategic_autonomy_doctrine_desc: "South Korea has adopted a strategic autonomy doctrine that distances Seoul from Washington's Indo-Pacific architecture. Korea's defense posture is reoriented toward self-reliance and regional multilateralism rather than U.S. alliance management."
 CHI_korean_tributary: "North Korea's Tributary Relationship"
 CHI_korean_tributary_desc: "North Korea's political subordination to Beijing has recreated, in modern institutional form, the tributary relationship that governed Sino-Korean relations before 1895. Chinese access to Korean ports, markets, and strategic space is formally guaranteed."
 CHI_kpa_intelligence_penetration: "KPA Intelligence Penetration"
 CHI_kpa_intelligence_penetration_desc: "Chinese intelligence services have cultivated a network of assets within the Korean People's Army. Real-time awareness of North Korean military planning and internal politics gives Beijing an unprecedented lever over Pyongyang."
 CHI_lithium_supply_chain_locked: "Lithium Triangle Supply Chain"
 CHI_lithium_supply_chain_locked_desc: "Long-term offtake agreements with Argentine, Bolivian, and Chilean producers secure Chinese battery makers the lithium they need, smoothing efficiency curves and adding headroom to civilian industry."
 CHI_long_range_firepower_idea: "Long-Range Firepower"
 CHI_long_range_firepower_idea_desc: "[CHI_long_range_firepower_idea_tt]"
 CHI_lotte_market_correction: "Lotte Market Correction"
 CHI_lotte_market_correction_desc: "Lotte Group's Chinese operations have been forced into a managed contraction, freeing market share for domestic competitors. The adjustment reduces consumer-goods outflows and demonstrates the political utility of targeted economic retaliation."
 CHI_lunar_legacy_industrial: "The Heavenly Palace Made Real"
 CHI_lunar_legacy_industrial_desc: "Tiangong means Heavenly Palace, and for the first time in history one stands permanently in orbit, built entirely by Chinese hands. The factories, foundries, and assembly halls that raised it now turn their proven discipline back toward the earth. What can lift a station to orbit can build anything below it."
 CHI_lunar_legacy_military: "Crossing the Magpie Bridge"
 CHI_lunar_legacy_military_desc: "Queqiao, the Magpie Bridge, relayed our signals from the far side of the Moon, named for the bridge of birds that once let two lovers meet across the heavens. The crews who trained for the hardest mission ever attempted returned hardened and certain. A force that can reach the Moon answers no challenge on Earth with doubt."
 CHI_lunar_legacy_political: "Chang'e Ascends the Heavens"
 CHI_lunar_legacy_political_desc: "In the old myth Chang'e drank the elixir and flew to the Moon, leaving her husband Hou Yi to gaze upward forever. Now her name has carried a real nation to the lunar surface, and the people see in it proof that China belongs among the first rank of powers. The landing becomes a source of standing that no rival can take away."
 CHI_lunar_legacy_research: "The Questions of Tianwen"
 CHI_lunar_legacy_research_desc: "Tianwen, the Heavenly Questions, takes its name from Qu Yuan's ancient poem that interrogated the order of the cosmos. The Yutu rovers and the lunar samples answered questions no nation had answered before, and the laboratories that decoded them are hungry for more. A scientific establishment proven against the Moon now reaches for every frontier."
 CHI_mass_line_bo_campaign: "Mass Line Campaign"
 CHI_mass_line_bo_campaign_desc: "Cadres are deployed across the countryside and factory floors to gather feedback and demonstrate the party's commitment to the people. The campaign raises political consciousness and channels popular energy behind party goals."
 CHI_mazu_blessing: "Mazu's Blessing"
 CHI_mazu_blessing_desc: "Mazu, Goddess of the Sea and protector of sailors, is venerated across the South China Sea littoral. Her temple blessing has been formally invoked for the South Sea Fleet. The ceremony is observed throughout the fleet and reinforces esprit de corps."
 CHI_media_offensive: "Global Media Offensive"
 CHI_media_offensive_desc: "CGTN, Xinhua, and social media platforms coordinate a global campaign projecting Chinese perspectives."
 CHI_militia_deployed: "Maritime Militia Active"
 CHI_militia_deployed_desc: "Chinese maritime militia vessels are forward-deployed in the contested zone, maintaining persistent presence under civilian cover. Their presence prevents rival coast guard vessels from approaching without triggering a crisis."
 CHI_monroe_inverted: "Monroe Doctrine Inverted"
 CHI_monroe_inverted_desc: "We have displaced Washington as the principal external partner of Latin America, anchoring a hemispheric realignment that lowers the cost of relations and pulls regional opinion toward us."
 CHI_national_humiliation: "National Humiliation"
 CHI_national_humiliation_desc: "A Chinese diplomatic or military setback in the South China Sea has been framed domestically as a continuation of the Century of Humiliation. Public opinion is inflamed; the leadership faces intense pressure to restore face by other means."
 CHI_national_security_commission_1: "National Security Commission of the Chinese Communist Party"
 CHI_national_security_commission_1_desc: "Established in 2013-2014 under Xi Jinping, the National Security Commission sits at the apex of China's security architecture, coordinating intelligence, military, cyber, and counter-espionage functions under direct party leadership rather than through the state council. Its creation signaled a deliberate centralization of all strategic security decisions. As the commission's influence within the committee deepens, its coordination authority becomes more comprehensive and its capacity to respond to internal and external security threats more unified and decisive."
 CHI_nepal_himalayan_friendship: "Himalayan Friendship Initiative"
 CHI_nepal_himalayan_friendship_desc: "Chinese investment and goodwill flow into Nepal under a cooperation framework that respects Kathmandu's neutrality while drawing the country closer to Beijing's economic orbit."
 CHI_neutral_interlocutor: "Neutral Interlocutor"
 CHI_neutral_interlocutor_desc: "We have positioned ourselves as the only power both Koreas can talk to. The role carries influence, and expectations."
 CHI_nko_blue_sky_mobilization: "Blue Sky Mobilization"
 CHI_nko_blue_sky_mobilization_desc: "The KPA has entered full combat mobilization in coordination with Chinese strategic objectives. All leave has been cancelled and forward units are moving to their assault positions."
 CHI_nko_chinese_economic_sphere: "Chinese Economic Sphere"
 CHI_nko_chinese_economic_sphere_desc: "North Korea's economy has been formally incorporated into China's industrial sphere. Chinese state enterprises manage key sectors, currency peg arrangements are normalized, and the North Korean won is tied to the renminbi."
 CHI_nko_energy_aid: "Chinese Energy Aid"
 CHI_nko_energy_aid_desc: "Fuel oil and electricity transfers from Dandong are keeping factories running and the lights on. Beijing's subsidies come with quiet expectations."
 CHI_nko_food_package: "Chinese Food Package"
 CHI_nko_food_package_desc: "Grain shipments routed through the Tumen crossings are easing chronic shortages. The aid buys political breathing room inside the Party."
 CHI_nko_infrastructure_investment: "Chinese Infrastructure Investment"
 CHI_nko_infrastructure_investment_desc: "Chinese construction brigades are rebuilding North Korean infrastructure at scale. Roads, railways, ports, and power grids are upgraded under contracts that bind North Korean resources to Chinese industrial chains for a generation."
 CHI_nko_offensive_readiness: "KPA Offensive Readiness"
 CHI_nko_offensive_readiness_desc: "With Chinese logistical backing, the Korean People's Army has shifted from a defensive posture to one optimized for rapid offensive operations southward across the 38th parallel."
 CHI_nko_security_assurance: "Chinese Security Assurance"
 CHI_nko_security_assurance_desc: "Beijing has offered a discreet but firm backstop against regime collapse. The guarantee steadies the inner circle and dampens mobilization pressure."
 CHI_npm_red_banner_insurgency: "Chinese-Backed Insurgency"
 CHI_npm_red_banner_insurgency_desc: "Beijing's covert pipeline keeps the Maoist columns in rifles, ammunition, and cadre training. The People's Liberation Army considers Nepal a proving ground for revolutionary export, and expects a return on its investment."
 CHI_nrcms_rollout_idea: "New Rural Cooperative Medical Scheme"
 CHI_nrcms_rollout_idea_desc: "Pooled contributions from rural residents, local government, and the central budget now cover catastrophic medical costs for hundreds of millions of farmers, improving public health and reducing the financial shock of illness on rural households."
 CHI_organisation_department_1: "Organization Department of the Chinese Communist Party"
 CHI_organisation_department_1_desc: "The Organization Department controls all party personnel decisions: appointments, promotions, vetting, and discipline across every level of the CCP hierarchy. Its reach extends into state enterprises and government ministries, making it the single most powerful instrument of internal party cohesion. As the commission's influence within the Standing Committee deepens, its grip on cadre selection tightens and its capacity to enforce central directives through the apparatus grows accordingly."
 CHI_pacific_basing_rights: "Second Island Chain Basing"
 CHI_pacific_basing_rights_desc: "Negotiated basing and replenishment rights deep in the Second Island Chain give the PLA Navy strategic reach, shorter logistics tails, and faster dockyard turnarounds for blue-water deployments."
 CHI_pacific_diplomatic_setback: "Pacific Diplomatic Setback"
 CHI_pacific_diplomatic_setback_desc: "A high-profile failure in the Pacific Islands has hardened regional capitals against our overtures, raising the political cost of every subsequent diplomatic initiative."
 CHI_pacific_security_lead: "Pacific Security Leadership"
 CHI_pacific_security_lead_desc: "Forward access agreements and rotational deployments across the Pacific Islands extend the operational reach of the PLA Navy and accelerate the basing infrastructure that sustains it."
 CHI_paf_maritime_militia: "PAF Maritime Militia"
 CHI_paf_maritime_militia_desc: "Civilian fishing fleets organised under military command. Plausible deniability at sea, real numbers when needed."
 CHI_party_century_endures: "The Party That Endures"
 CHI_party_century_endures_desc: "Xi Jinping Thought is embedded in the constitutional and organizational structure of the Party as a permanent operating framework. The Congress system, the Politburo, and the Central Military Commission are reaffirmed as the durable engines of governance. The Party that outlasted Mao's death, the Cultural Revolution, and Tiananmen is designed to outlast any individual, including its current paramount leader."
 CHI_patriotic_education_mandate: "Patriotic Education Mandate"
 CHI_patriotic_education_mandate_desc: "Revised curricula ensure that no Chinese student forgets what was done in Nanjing, in Pingdingshan, in Unit 731's prefab cells. Stability strengthens. So does suspicion of foreign ideas."
 CHI_pearls_economic_partner: "Chinese Strategic Partnership"
 CHI_pearls_economic_partner_desc: "Hosting Chinese naval logistics has unlocked Beijing's economic largesse, with port modernisation funds and infrastructure credits flowing into the host state."
 CHI_personal_rule_mandate: "Personal Rule Mandate"
 CHI_personal_rule_mandate_desc: "The 2018 National People's Congress removed presidential term limits from the constitution, consolidating authority around the paramount leader on a permanent basis. Strategic direction and political loyalty now flow through a single centre, raising War Support but narrowing the space for initiative among field commanders."
 CHI_petrodollar_breaks: "Petrodollar Parity Reached"
 CHI_petrodollar_breaks_desc: "Gulf oil priced in yuan, central-bank swap lines across the Global South, and SWIFT alternatives have eroded the dollar's reserve premium, translating monetary leverage into political power and demographic confidence."
 CHI_pla_basing_economic_help: "Chinese Economic Partnership"
 CHI_pla_basing_economic_help_desc: "In return for hosting PLA Navy logistics, we receive sustained Chinese economic support: expanded export markets, civilian factory upgrades, and political backing in regional forums."
 CHI_policy_bank_lending_idea: "Policy Bank Lending Drive"
 CHI_policy_bank_lending_idea_desc: "China Development Bank, EximBank, and ADBC issue concessional credit lines to state-owned enterprises and provincial governments, accelerating fixed-asset investment in transport, energy, and overseas infrastructure. The lending wave drives construction output but ties up household savings in low-yield deposits."
 CHI_princeling_economic_leverage: "Princeling Economic Leverage"
 CHI_princeling_economic_leverage_desc: "A network of cross-border business ties now binds North Korean elites to Chinese capital. Every transaction deepens the dependency."
 CHI_property_sector_contraction_idea: "Property Sector Contraction"
 CHI_property_sector_contraction_idea_desc: "The Three Red Lines force the largest developers into simultaneous deleveraging. Construction starts collapse, land sale revenues at the local government level evaporate, and supplier networks across cement, steel, and home appliances suffer in turn. The wider economy absorbs the shock as the property bubble is forcibly deflated."
 CHI_property_tax_pilot_idea: "Property Tax Pilot"
 CHI_property_tax_pilot_idea_desc: "Shanghai and Chongqing levy modest taxes on second homes and high-value properties, dampening speculative investment and diversifying local government revenue away from land sales."
 CHI_publicity_department_1: "Publicity Department of the Chinese Communist Party"
 CHI_publicity_department_1_desc: "The Publicity Department sets the ideological line for all print, broadcast, and digital media in China, directing censorship, narrative framing, and the domestic projection of party legitimacy. It also coordinates the overseas messaging infrastructure, including state media expansion and content partnerships abroad. Greater commission influence translates into a more coherent and forceful information environment, reinforcing social stability and popular support for the party's priorities."
 CHI_qccm_coordination_cell: "QCCM Coordination Cell"
 CHI_qccm_coordination_cell_desc: "Quadrilateral intelligence-sharing across the Pamir corridor links the security services of China, Pakistan, Afghanistan, and Tajikistan."
 CHI_raj_foreign_defense_pressure: "Chinese Pressure"
 CHI_raj_foreign_defense_pressure_desc: "Beijing's pivot to South Asia has placed sustained diplomatic and informational pressure on New Delhi, narrowing India's strategic options along its northern and eastern borders."
 CHI_rason_investment_flow: "Rason Investment Programme"
 CHI_rason_investment_flow_desc: "Chinese capital is flowing into the Rason Special Economic Zone, funding infrastructure, industrial capacity, and port facilities. The experiment is producing visible results."
 CHI_rason_port_access: "Rason Port Access"
 CHI_rason_port_access_desc: "Our vessels now have reliable access to Rason's deep-water port, giving the People's Liberation Army Navy a strategic foothold in the Sea of Japan."
 CHI_rcep_member: "RCEP Founding Member"
 CHI_rcep_member_desc: "We co-anchored the Regional Comprehensive Economic Partnership alongside Tokyo and Seoul. Tariffs fall, supply chains thicken, and the American absence becomes the regional norm."
 CHI_reconstruction_plan_idea: "Reconstruction Capacity Plan"
 CHI_reconstruction_plan_idea_desc: "Pre-positioned equipment, standardised protocols, and specialised army engineering units give us an exceptional speed advantage in repairing infrastructure and industry following disasters."
 CHI_regional_crisis_alert: "Regional Crisis Alert"
 CHI_regional_crisis_alert_desc: "The Chinese security posture on the Korean Peninsula has triggered elevated readiness across the region. Alliance cohesion is under strain."
 CHI_reunion_humanitarian_lead: "Humanitarian Diplomacy Lead"
 CHI_reunion_humanitarian_lead_desc: "Our coordination of cross-border family reunions has generated unusually broad goodwill. Foreign ministries welcome the contact, and domestic media amplifies it."
 CHI_rmb_promotion: "RMB Internationalization"
 CHI_rmb_promotion_desc: "The renminbi is increasingly accepted as an international reserve currency through bilateral swap agreements."
 CHI_russian_arms_dependency: "Russian Arms Dependency"
 CHI_russian_arms_dependency_desc: "The People's Liberation Army was built on Soviet and Russian designs. Its small arms began as the Type 56, a licensed Kalashnikov, and its armoured corps grew from the Type 59, a direct copy of the Soviet T-54A, with later tanks and infantry fighting vehicles still echoing T-72 and BMP lineage. The artillery, the transports and the air-defence batteries share the same ancestry. The dependence runs deepest in propulsion: the AL-31F powers the J-10 and J-11, the RD-93 flies the JF-17, and Su-35 fighters and S-400 batteries were bought outright from Moscow. Every domestic fighter line waits on a Russian turbine, every licensed pattern pays a royalty, and the design bureaus still copy more than they create. Until China forges its own military-industrial base, the army's heartbeat is set in Russia."
 CHI_sanctions_immunity_partial: "Yuan-Settled Trade Lifeline"
 CHI_sanctions_immunity_partial_desc: "Renminbi-denominated energy and goods contracts with sanctioned partners blunt the impact of Western financial pressure, easing consumer pressure and keeping export channels open."
 CHI_sars_outbreak_uncontrolled_idea: "SARS Epidemic"
 CHI_sars_outbreak_uncontrolled_idea_desc: "The failure to coordinate a prompt emergency response allowed SARS to spread across multiple provinces before quarantine measures took hold. Our delayed international notification has damaged our standing abroad and imposed significant economic disruption at home."
 CHI_sars_response_effective_idea: "SARS Contained"
 CHI_sars_response_effective_idea_desc: "Our emergency response framework allowed rapid quarantine, prompt international notification, and coordinated medical action. The outbreak is contained, with limited economic disruption and our international standing intact."
 CHI_scientific_outlook_idea_1: "Scientific Outlook on Development Preparation"
 CHI_scientific_outlook_idea_1_desc: "We are reorienting national policy away from GDP-first growth toward broader social and environmental indicators under the Scientific Outlook on Development."
 CHI_scientific_outlook_idea_1_tt: "§Y$CHI_scientific_outlook_on_development$§! Focus Completion Time §G-35§! §YDays§!"
 CHI_sco_dialogue_partner: "SCO Dialogue Partner"
 CHI_sco_dialogue_partner_desc: "This country has been accepted as a Dialogue Partner of the Shanghai Cooperation Organization, opening the door to deeper political and economic engagement with member states."
 CHI_sco_member: "SCO Member"
 CHI_sco_member_desc: "This country is a full member of the Shanghai Cooperation Organization, participating in all political, economic, and security cooperation frameworks established by the organization."
 CHI_sco_member_econ_desc: "This country is a full member of the Shanghai Cooperation Organization with an economic cooperation emphasis, gaining enhanced trade and investment ties with fellow member states."
 CHI_sco_member_mil_desc: "This country is a full member of the Shanghai Cooperation Organization with a military cooperation emphasis, participating in joint exercises and security operations."
 CHI_sco_member_pol_desc: "This country is a full member of the Shanghai Cooperation Organization with a political cooperation emphasis, gaining stronger governance and anti-subversion frameworks."
 CHI_sco_observer: "SCO Observer"
 CHI_sco_observer_desc: "This country holds Observer status within the Shanghai Cooperation Organization, granting access to SCO forums and limited economic cooperation while maintaining sovereignty over alignment decisions."
 CHI_scs_chinese_debt: "Chinese Debt Dependency"
 CHI_scs_chinese_debt_desc: "Belt and Road loan obligations have given Beijing significant leverage over the indebted partner's foreign policy calculus. Debt service requirements constrain the government's freedom to take positions hostile to Chinese interests."
 CHI_scs_claimant_under_pressure: "Under Chinese Pressure"
 CHI_scs_claimant_under_pressure_desc: "Chinese dominance of the South China Sea has made every Spratly-related decision more costly for this government. Domestic opinion is divided between accommodation and resistance; the Political Power penalty on South China Sea decisions reflects the difficulty of charting any course while Beijing sets the terms."
 CHI_scs_de_facto_sovereignty: "De Facto Sovereignty"
 CHI_scs_de_facto_sovereignty_desc: "Through patient bilateral diplomacy and accumulated agreements, China's claims in the South China Sea have become the regional default. No claimant now formally contests the arrangement; outside powers lack the legal instruments to challenge what neighbouring states have accepted."
 CHI_scs_jdz_revenue: "Joint Development Revenue"
 CHI_scs_jdz_revenue_desc: "Hydrocarbon extraction from the joint development zones is generating shared revenue for both us and our partner state. Oil income flows to the relevant Spratly state on both sides of the arrangement for the duration of the deal, giving both governments a concrete stake in the continuation of the bilateral framework and complicating any pivot back toward confrontation."
 CHI_scs_setback: "South China Sea Setback"
 CHI_scs_setback_desc: "A standoff has ended unfavourably, a diplomatic initiative has been publicly rejected, or an international ruling has gone against Chinese claims. The setback reduces the SCS Framework variable and may invite opportunistic responses from other claimants."
 CHI_sea_eagles_carrier_wing_idea: "$CHI_sea_eagles_carrier_wing$"
 CHI_sea_eagles_carrier_wing_idea_desc: "[CHI_sea_eagles_carrier_wing_idea_tt]"
 CHI_selective_anti_corruption_campaign_idea: "Selective Anti-Corruption Campaign"
 CHI_selective_anti_corruption_campaign_idea_desc: "Targeted prosecutions suppress the most flagrant corruption and remove rival power brokers, but the selective and political character of enforcement creates institutional uncertainty and suppresses initiative."
 CHI_self_reliant_path_idea: "The Taihang's Growing Pains"
 CHI_self_reliant_path_idea_desc: "Self-reliance is paid for in flamed-out turbines and grounded squadrons. The early WS-10 Taihang chokes on its own ambition, its blades cracking and its service life measured in mere hours, and crews pay for every lesson the engineers have yet to learn. The bureaus will get there, but until they do the fleet flies on faith."
 CHI_sez_japanese_investors: "SEZs for Japanese Investors"
 CHI_sez_japanese_investors_desc: "Special concessions for Toyota, Sony, Panasonic. The China-Plus-One strategy is reversed by making China impossible to leave."
 CHI_sino_japanese_understanding: "Sino-Japanese Strategic Understanding"
 CHI_sino_japanese_understanding_desc: "The unspoken architecture of detente: trade flows, ministerial meetings, and a tacit agreement to leave history in the archives. Lost permanently if Sino-Japanese aggression rises again."
 CHI_smic_foundry_base: "SMIC Foundry Base"
 CHI_smic_foundry_base_desc: "SMIC's Zhangjiang campus provides a qualified 28nm production platform for domestic fabless customers. The foundry's captive capacity reduces China's dependence on TSMC for mature-node logic and provides a baseline for further domestic process development."
 CHI_society_department_1: "Society Work Department"
 CHI_society_department_1_desc: "Established in 2023, the Society Work Department consolidated CCP oversight of grassroots social organizations, NGOs, trade unions, and the petition system that had previously been spread across multiple agencies. Its mandate is to ensure that civil society operates within parameters set by the party and that popular grievances are channeled into managed outlets rather than independent mobilization. Growing commission influence allows the department to extend its organizational reach and refine the mechanisms by which social pressures are absorbed and defused."
 CHI_sovereign_wealth_diversification_idea: "China Investment Corporation Sovereign Wealth Diversification"
 CHI_sovereign_wealth_diversification_idea_desc: "China Investment Corporation rotates forex reserves out of low-yield US Treasuries into global private equity, infrastructure, and strategic equity stakes. The portfolio generates higher returns than the reserve base and gives Beijing structural positions in foreign capital markets."
 CHI_state_tolerated_boycott: "State-Tolerated Boycott"
 CHI_state_tolerated_boycott_desc: "Anti-Japanese demonstrations the police will not disperse, until they will. Patriotic consumers redirect spending. Some Chinese retailers also bleed."
 CHI_streamline_the_ranks_idea: "Streamlining the Ranks"
 CHI_streamline_the_ranks_idea_desc: "Beginning in the late 1990s the People's Liberation Army shed hundreds of thousands of personnel, trading a bloated mass-mobilization force for a smaller, professional army built around brigades. The transition strains training pipelines and ties up industry. This penalty lifts once the army has been cut by a fifth from its size when the reform began and every remaining division is fully equipped."
 CHI_strike_black_sing_red_idea: "Strike Black, Sing Red"
 CHI_strike_black_sing_red_idea_desc: "Thousands of officials and organised crime figures have been arrested, and their networks dismantled. Mass red-culture events flood the public sphere with patriotic fervour, raising morale and loyalty to the party."
 CHI_succession_roadmap: "Succession Roadmap"
 CHI_succession_roadmap_desc: "The identification and cultivation of a designated successor signals to Party institutions that the transition of power will be managed rather than contested. International partners read the succession framework as evidence of systemic stability. The political risk premium on long-range agreements with China narrows, at least for the duration of the arrangement."
 CHI_summit_host: "Summit Host"
 CHI_summit_host_desc: "Beijing is actively hosting sensitive regional talks. Diplomatic bandwidth is high, and pressure tools carry added weight."
 CHI_taiwan_strait_pressure_spirit: "Cross-Strait Pressure Posture"
 CHI_taiwan_strait_pressure_spirit_desc: "Regular PLA air incursions into Taiwan's air defence identification zone, large-scale naval exercises in the waters surrounding the island, and calibrated economic coercion maintain a sustained pressure campaign short of open war. The posture keeps Taipei on permanent alert and signals resolve to Washington, hardening our forces and sustaining public War Support for potential contingencies."
 CHI_tech_crackdown_moderate: "Tech Crackdown: Managed Restructuring"
 CHI_tech_crackdown_moderate_desc: "The regulatory campaign has imposed compliance costs and slowed research investment, but the platform sector has enough scale to absorb the disruption without structural collapse."
 CHI_tech_crackdown_severe: "Tech Crackdown: Severe"
 CHI_tech_crackdown_severe_desc: "Our regulatory campaign against the platform sector has caught the digital economy at an early stage of development. Service sector construction is stalled, venture capital has fled, and research investment has contracted sharply."
 CHI_the_duterte_precedent: "The Duterte Precedent"
 CHI_the_duterte_precedent_desc: "The example of an ASEAN head of government choosing to pivot away from Washington and toward Beijing reverberates across the region. Other leaders observe that the United States did not, or could not, prevent it, and weigh their own options accordingly."
 CHI_three_represents_debate: "Three Represents Controversy"
 CHI_three_represents_debate_desc: "Ideological traditionalists within the Party resist Jiang's proposal to admit private entrepreneurs to Party membership, arguing that it abandons the vanguard's class character. The internal debate temporarily disrupts policy coherence and generates friction at the provincial level."
 CHI_three_represents_debate_tt: "\nThis §YNational Spirit§! will §Rcancel§! if §YJiang Zemin§! does not complete §Y$CHI_three_represents_codified$§! and is no longer §YCountry Leader§!"
 CHI_tibet_crackdown_idea: "Tibet Security Operation"
 CHI_tibet_crackdown_idea_desc: "A coordinated security operation across Tibet is suppressing separatist activity, at the cost of temporary stability strain."
 CHI_total_war_himalayan_front: "Total War on the Himalayan Front"
 CHI_total_war_himalayan_front_desc: "Every factory, every railhead, every reservist mobilized for the McMahon question."
 CHI_two_centenary_resolve: "Two Centenary Goals"
 CHI_two_centenary_resolve_desc: "The twin centenary deadlines of 2021 and 2049 impose a generational horizon on economic and social planning. Infrastructure investment, productivity targets, and technological development programmes are oriented toward these milestones. The goals structure bureaucratic incentives and unlock sustained multi-decade planning cycles across all ministries."
 CHI_united_front_department_1: "United Front Work Department"
 CHI_united_front_department_1_desc: "The United Front Work Department manages the CCP's relationships with non-party constituencies: ethnic minorities, religious communities, overseas Chinese networks, and foreign political figures susceptible to co-optation. Its mandate is to neutralize potential sources of opposition and extend party influence beyond the formal membership. As commission influence grows, the department's outreach becomes more systematic, converting peripheral actors into reliable instruments of Chinese strategic interests."
 CHI_usa_asia_pivot_collapse: "Indo-Pacific Pivot Collapsed"
 CHI_usa_asia_pivot_collapse_desc: "With Seoul drifting into Beijing's orbit and Tokyo strategically isolated, the cornerstone of the American rebalance to Asia has come apart. Forward planning is in disarray, allied confidence is shaken, and the political cost of the reversal weighs on Washington."
 CHI_usa_back_channel_open: "Back Channel to Foggy Bottom"
 CHI_usa_back_channel_open_desc: "A discreet line between Zhongnanhai and the State Department keeps crisis communication open below the public diplomatic track. The channel yields a steady stream of intelligence on American intentions, at the cost of Chinese counter-intelligence exposure."
 CHI_usa_g2_framework: "G2 Framework"
 CHI_usa_g2_framework_desc: "Washington and Beijing have institutionalised a great-power condominium over Korean affairs, coordinating policy through standing bilateral channels. The arrangement steadies markets and lowers consumer costs, but ties American Korea policy to continued Chinese goodwill."
 CHI_wakhan_buffer_idea: "Wakhan Buffer Zone"
 CHI_wakhan_buffer_idea_desc: "A coordinated counter-radicalisation regime across the Wakhan Corridor has hardened China's western frontier against extremist infiltration."
 CHI_wakhan_buffer_partner_idea: "Wakhan Counter-Terrorism Partner"
 CHI_wakhan_buffer_partner_idea_desc: "Joint border-control protocols with Beijing have improved domestic counter-terrorism capacity, even as foreign intelligence services tighten their cooperation."
 CHI_war_footing_central_asia: "Central Asian War Footing"
 CHI_war_footing_central_asia_desc: "National production geared toward sustained operations west of the Pamirs."
 CHI_water_shortage: "Water Shortages"
 CHI_water_shortage_desc: "The North China Plain, the Yellow River basin, and the Beijing-Tianjin-Hebei corridor together hold roughly half the country's cultivated land but less than a fifth of its freshwater. Per-capita water availability in the north falls well below the international scarcity threshold of 1,000 cubic metres per year. Industrial discharge and agricultural run-off have contaminated significant shares of available surface and groundwater, compounding the physical scarcity. Agriculture accounts for over 60 percent of total water consumption, and the energy sector's cooling demands add further strain to an already depleted resource base."
 CHI_wenchuan_reconstruction_drive_idea: "Wenchuan Reconstruction Drive"
 CHI_wenchuan_reconstruction_drive_idea_desc: "We deployed over 100,000 soldiers and emergency teams within days of the earthquake, and followed up with a RMB 1 trillion reconstruction plan. The scale of the commitment has generated a sustained surge in construction activity across Sichuan and the surrounding region."
 CHI_western_hemisphere_protector: "Protector of the Emerging Americas"
 CHI_western_hemisphere_protector_desc: "We have positioned ourselves as the alternative security guarantor for Latin American nations seeking to escape Washington's orbit. Influence flows freely, and intelligence networks are insulated from Western counter-action."
 CHI_western_institutional_engagement_idea: "Western Institutional Engagement"
 CHI_western_institutional_engagement_idea_desc: "Active participation in IMF, World Bank, and WTO governance builds international credibility and expands access to global financial markets."
 CHI_wto_implementation_idea: "WTO Implementation"
 CHI_wto_implementation_idea_desc: "Multi-year tariff reductions, service sector opening, and alignment with international trade rules deepen our integration into global supply chains and improve our standing with trading partners."
 CHI_xinjiang_crackdown_idea: "Xinjiang Security Operation"
 CHI_xinjiang_crackdown_idea_desc: "An extensive security operation is underway across Xinjiang. Resistance is dampened but the cost falls on domestic stability."
 chinese_african_century: "Chinese-African Century"
 chinese_african_century_desc: "Decades of FOCAC investment have made China the indispensable partner of the African continent, reshaping demographics, trade flows, and political alignment."
 chinese_surveillance_systems: "Chinese Surveillance Systems"
 chinese_surveillance_systems_desc: "Imported safe-city platforms, facial recognition cameras, and digital identity tools harden the regime against dissent and foreign intelligence operations."
 eurasian_land_bridge: "Eurasian Land Bridge"
 eurasian_land_bridge_desc: "An unbroken rail and pipeline corridor links the Pacific to the Atlantic, with Chinese standards, gauges, and customs procedures setting the rhythm of overland trade."
 JAP_abandoned_by_ally: "Abandoned by Washington"
 JAP_abandoned_by_ally_desc: "When the moment came, the Americans hedged. The alliance held on paper but the trust is gone, and every faction in the Diet is drawing its own conclusions."
 JAP_china_engagement: "Engagement with China"
 JAP_china_engagement_desc: "Tokyo has chosen open political engagement with Beijing, reducing strategic friction at the cost of nationalist credibility."
 JAP_export_pain: "Export Pain"
 JAP_export_pain_desc: "A sustained Chinese consumer boycott has left Japanese export industries scrambling for alternative markets."
 JAP_jcg_emergency_deployment: "JCG Emergency Deployment"
 JAP_jcg_emergency_deployment_desc: "The Japan Coast Guard is on a permanent crisis footing in the East China Sea, taxing industry to keep cutters at sea."
 JAP_rare_earth_diversification: "Rare Earth Diversification Drive"
 JAP_rare_earth_diversification_desc: "An emergency programme to source rare earths from Australia, Vietnam and domestic recycling. Painful in the short term."
 JAP_revisionist_pride: "Revisionist Pride"
 JAP_revisionist_pride_desc: "Public defiance of foreign criticism over wartime memory consolidates a nationalist mood at home."
 JAP_sino_japanese_understanding: "Sino-Japanese Understanding"
 JAP_sino_japanese_understanding_desc: "The Tokyo Communique has institutionalised regular consultation and trade preferences with Beijing."
 JAP_strategic_autonomy_drift: "Strategic Autonomy Drift"
 JAP_strategic_autonomy_drift_desc: "With the Quad downgraded to a dialogue, Japan is quietly recalibrating its alignments away from Washington."
 NKO_pro_beijing_regime: "Pro-Beijing Regime"
 NKO_pro_beijing_regime_desc: "The new government in Pyongyang owes its survival to Beijing. Chinese advisors sit in every ministry; Chinese oil fuels every truck."
 pax_sinica: "Pax Sinica"
 pax_sinica_consensus: "Community of Shared Future"
 pax_sinica_consensus_desc: "We have achieved global pre-eminence through decades of patient investment, concessional financing, and institutional diplomacy. The international order acknowledges our centrality through interest rather than coercion: a world bound to us by mutual benefit, not strategic necessity."
 pax_sinica_desc: "We stand at the apex of a global order we shaped on our own terms, with the Belt and Road as the connective tissue of a new international system."
 petroyuan_settlement: "Petroyuan Settlement Network"
 petroyuan_settlement_desc: "Cross-border energy contracts increasingly settle in renminbi, freeing our industry from dollar-clearing chokepoints and accelerating domestic construction."
 rmb_reserve_currency: "Renminbi as Reserve Currency"
 rmb_reserve_currency_desc: "The yuan has joined the basket of world reserve currencies, opening export markets and giving our banks the resilience to underwrite global recovery loans."
 SCO_air_defense_initiator: "SCO Joint Air Defense (Lead)"
 SCO_air_defense_initiator_desc: "As the lead nation of the SCO Joint Air Defense network, this country coordinates integrated air surveillance and missile defense across member states."
 SCO_air_defense_member: "SCO Joint Air Defense"
 SCO_air_defense_member_desc: "Participation in the SCO Joint Air Defense network provides access to shared radar coverage and anti-air coordination."
 SCO_cultural_exchange_bonus: "SCO Cultural Exchange"
 SCO_cultural_exchange_bonus_desc: "An academic and cultural exchange programme is fostering cross-border research collaboration."
 SCO_dev_bank_initiator: "SCO Development Bank (Founder)"
 SCO_dev_bank_initiator_desc: "As the founder of the SCO Development Bank, this country directs investment flows and has privileged access to low-interest financing."
 SCO_dev_bank_member: "SCO Development Bank"
 SCO_dev_bank_member_desc: "Membership in the SCO Development Bank provides access to development loans and joint investment programmes."
 SCO_development_assistance: "SCO Development Assistance"
 SCO_development_assistance_2: "[CHI.GetAdjective] Development Assistance"
 SCO_development_assistance_2_desc: "We have been granted much-needed development assistance by China under the auspices of the Shanghai Cooperation Organization."
 SCO_development_assistance_desc: "The Shanghai Cooperation Organization is channeling development resources toward this country."
 SCO_energy_deal_income: "SCO Energy Partnership"
 SCO_energy_deal_income_desc: "A long-term energy supply agreement is generating steady revenue."
 SCO_energy_grid_initiator: "SCO Energy Grid (Initiator)"
 SCO_energy_grid_initiator_desc: "As the initiator of the SCO Energy Grid, this country leads an integrated power network spanning member states."
 SCO_energy_grid_member: "SCO Energy Grid"
 SCO_energy_grid_member_desc: "Participation in the SCO Energy Grid provides access to shared power infrastructure and reduced energy costs."
 SCO_intel_sharing_bonus: "SCO Intelligence Sharing"
 SCO_intel_sharing_bonus_desc: "A secure intelligence-sharing channel is improving counter-terrorism coordination."
 SCO_joint_drill: "SCO Joint Military Exercises"
 SCO_joint_drill_1: "SCO Joint Exercises (Bilateral)"
 SCO_joint_drill_1_desc: "Bilateral military exercises with an SCO partner are sharpening tactical coordination."
 SCO_joint_drill_desc: "Participation in SCO-wide joint military exercises is improving operational readiness."
 SCO_joint_drill_specific: "SCO Joint Exercises (Targeted)"
 SCO_joint_drill_specific_desc: "Targeted joint exercises with an SCO partner are addressing specific operational gaps."
 SCO_railway_initiator: "Trans-Eurasian Railway (Initiator)"
 SCO_railway_initiator_desc: "As the driving force behind the Trans-Eurasian Railway, this country benefits from premier access to the continent-spanning trade corridor."
 SCO_railway_member: "Trans-Eurasian Railway"
 SCO_railway_member_desc: "The Trans-Eurasian Railway connects this country to a high-capacity trade network across the SCO zone."
 SCO_trade_agreement_bonus: "SCO Trade Agreement"
 SCO_trade_agreement_bonus_desc: "A bilateral trade framework under the SCO umbrella is boosting civilian industrial output."
 CHI_airforce_modifier: "People's Liberation Army Air Force"
 CHI_airforce_modifier_desc: "The air branch of the People's Liberation Army, fielding fighters, bombers, transport aircraft, and an integrated air-defence network. This represents its doctrine, training, and equipment."
 CHI_belt_and_road_initiative_idea: "Belt and Road Initiative"
 CHI_belt_and_road_initiative_idea_desc: "China's Belt and Road Initiative, launched in 2013, finances port construction, railway corridors, pipelines, power plants, and digital infrastructure across Asia, Africa, the Middle East, and Europe. Eligible states apply for projects, Beijing funds and builds them, and each completed project raises that partner's rank and China's own standing.\n\n[CHIGetBRIPortTier][CHIGetBRIRailwayTier][CHIGetBRIPipelineTier][CHIGetBRITelecomTier][CHIGetBRIMineTier][CHIGetBRIPowerplantTier][CHIGetBRIIndustrialZoneTier][CHIGetBRIPrestigeTier]"
 CHI_bri_state_industrial: "BRI Industrial Project"
 CHI_bri_state_industrial_desc: "A Chinese-backed special economic zone or industrial park has expanded local factory capacity, resource extraction, and repair infrastructure."
 CHI_bri_state_infrastructure: "BRI Infrastructure Project"
 CHI_bri_state_infrastructure_desc: "A Belt and Road infrastructure project (port, railway, highway, or pipeline) accelerates regional construction, dockyard work, and supply throughput."
 CHI_coast_guard_standoff: "Coast Guard Standoff"
 CHI_coast_guard_standoff_desc: "Daily encounters between Chinese militia and Japanese Coast Guard depress local economic activity."
 CHI_defense_industry: "Chinese Defense Industry"
 CHI_defense_industry_desc: "China's defense industrial base is built around large state conglomerates spanning land, air, naval, and electronics production, supplying both the armed forces and the export market. This represents the country's military-industrial capacity."
 CHI_diplomacy_modifier: "Chinese Diplomatic Network"
 CHI_diplomacy_modifier_desc: "A variable diplomatic posture grants or withdraws bonuses to monthly opinion gain, trade relationships, naval projection, supply efficiency, foreign influence operations, and political power depending on the depth of investment in China's diplomatic network."
 CHI_economy_modifier: "Chinese Economic Model"
 CHI_economy_modifier_desc: "China operates a socialist market economy that combines state-owned enterprise, private industry, and central planning through successive five-year plans. This represents the country's industrial base, fiscal policy, and trade structure."
 CHI_jap_industrial_partnerships: "Sino-Japanese Industrial Partnerships"
 CHI_jap_industrial_partnerships_desc: "Structured economic cooperation with Japan expands access to precision manufacturing, advanced automotive and electronics supply chains, and civilian nuclear know-how. The partnership yields gains across armour performance, air-power agility, naval speed, research throughput, and industrial output, though it carries domestic political sensitivity given historical animosity."
 CHI_korea_peninsula_modifier: "Korean Peninsula Strategy"
 CHI_korea_peninsula_modifier_desc: "China shares a land border with the Korean Peninsula and maintains political, economic, and intelligence ties across the region. This represents Beijing's management of relations, border security, and information networks on its northeastern flank."
 CHI_landforce_modifier: "People's Liberation Army Ground Force"
 CHI_landforce_modifier_desc: "The ground branch of the People's Liberation Army, organised into combined-arms brigades under the theatre command system. This represents its doctrine, training, and equipment."
 CHI_navy_modifier: "People's Liberation Army Navy"
 CHI_navy_modifier_desc: "The naval branch of the People's Liberation Army, comprising surface ships, submarines, aircraft carriers, and the marine corps. This represents its fleet composition, doctrine, and operational reach."
 CHI_northeast_revitalisation: "Northeast Revitalisation"
 CHI_northeast_revitalisation_desc: "The Revitalise the Northeast strategy directs state capital toward the rust-belt provinces of Liaoning, Jilin, and Heilongjiang, prioritising heavy industry, energy infrastructure, and industrial-complex construction. Soviet-era facilities are modernised and new production capacity is commissioned to restore the region's role as an industrial base."
 CHI_political_system: "Chinese Political System"
 CHI_political_system_desc: "The People's Republic of China is a one-party state led by the Communist Party of China, organised around democratic centralism and a large administrative bureaucracy. This represents the structure of governance, party institutions, and state control."
 CHI_rare_earth_embargoed: "Rare Earth Embargo"
 CHI_rare_earth_embargoed_desc: "Beijing has cut critical rare earth exports to Japan, throttling industrial output."
 CHI_rare_earth_embargoed_idea: "Rare Earth Embargo"
 CHI_rare_earth_embargoed_idea_desc: "Beijing has cut critical rare earth exports, throttling the defence and high-tech industries that depend on Chinese refining."
 CHI_rural_development: "Rural Development Programme"
 CHI_rural_development_desc: "Targeted investment in rural infrastructure, including roads, utilities, and local administrative capacity, accelerates construction activity across designated counties. The programme narrows the urban-rural income gap and reduces social tensions stemming from uneven modernisation."
 JAP_china_market_partnerships: "China Market Partnerships"
 JAP_china_market_partnerships_desc: "Deep integration with the Chinese consumer and industrial market improves Japanese factory efficiency, stabilises consumer-goods costs, and supports political cohesion at home. Production capacity for civilian infrastructure expands, and bilateral trade volumes sustain growth even as geopolitical friction elsewhere creates headwinds."
