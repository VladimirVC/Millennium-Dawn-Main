 NKO_cease_propaganda_broadcasts: "停止政治宣传广播"
 NKO_cease_propaganda_broadcasts_desc: "如今宣传广播对我们已难堪大用，反而会让那些从小就被灌输反共思想的南方人对我们的行为心生反感。停止这种做法或许能让他们稍感欣慰。"
 NKO_invite_the_president: "邀请总统"
 NKO_invite_the_president_desc: "邀请南方总统访问我国，以便我们增进相互了解，化解分歧和偏见。"
 NKO_invite_southern_performers: "邀请南方艺人"
 NKO_invite_southern_performers_desc: "南方的艺人对北方的年轻人也有巨大影响力，邀请他们来我国可以向南方的年轻人表达我们的善意。"
