 POLITICAL_PROPAGANDA_TITLE: "Пропагандистские кампании"
 PROPAGANDA_PROWESTERN: "§YПрозападный§!"
 PROPAGANDA_EMERGING: "§YУсиливающаяся§!"
 PROPAGANDA_NONALIGNED: "§YНеприсоединившийся§!"
 PROPAGANDA_NATIONALIST: "§YНационалисты§!"
 PROPAGANDA_FASCISM: "§YСалафиты§!"
 prowestern_propaganda_button_tt: "§YПрозападная§! пропагандистская кампания \nИспользуя информационную войну, мы можем влиять на общественное мнение о ситуации в мире. Однако любая такая кампания будет эффективна лишь ограниченное время, поскольку люди постепенно теряют интерес.\n\n§YМодификатор стоимости пропагандистской кампании§!: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§YМодификатор стоимости прозападной пропагандистской кампании§!: [?ROOT.modifier@western_outlook_campaign_cost_modifier|-2%]\n\n§YУсловие:§! \n[!prowestern_propaganda_button_click_enabled] \n§YМодификаторы на время действия:§! \n[!prowestern_propaganda_button_click]"
 emerging_propaganda_button_tt: "§YEmerging§! Propaganda Campaign \nUsing informational warfare, we can influence public opinion about the world situation. However, any such campaign will only be effective for a limited period, as people lose interest after a while.\n\n§YPropaganda Campaign Cost§! Modifier: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§YEmerging Outlook Propaganda Campaign Cost§! Modifier: [?ROOT.modifier@emerging_outlook_campaign_cost_modifier|-2%] \n\n§YPrerequisite:§! \n[!emerging_propaganda_button_click_enabled] \n§YModifiers while active:§! \n[!emerging_propaganda_button_click]"
 nonaligned_propaganda_button_tt: "§YNon-Aligned§! Propaganda Campaign \nUsing informational warfare, we can influence public opinion about the world situation. However, any such campaign will only be effective for a limited period, as people gradually lose interest.\n\n§YPropaganda Campaign Cost§! Modifier: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§YNon-Aligned Propaganda Campaign Cost§! Modifier: [?ROOT.modifier@nonaligned_outlook_campaign_cost_modifier|-2%] \n\n§YPrerequisite:§! \n[!nonaligned_propaganda_button_click_enabled] \n§YModifiers while active:§! \n[!nonaligned_propaganda_button_click]"
 nationalist_propaganda_button_tt: "§YНационалистическая§! пропагандистская кампания\nИспользуя информационную войну, мы можем влиять на общественное мнение о ситуации в мире, чтобы оно рассматривалось с националистической точки зрения. Однако любая такая кампания будет эффективна лишь ограниченное время, поскольку люди постепенно теряют интерес.\n\n§YМодификатор стоимости пропагандистской кампании§!: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§YМодификатор стоимости националистической пропагандистской кампании§!: [?ROOT.modifier@nationalist_outlook_campaign_cost_modifier|-2%] \n\n§YУсловие:§! \n[!nationalist_propaganda_button_click_enabled] \n§YМодификаторы на время действия:§! \n[!nationalist_propaganda_button_click]"
 fascism_propaganda_button_tt: "§YFascism§! Propaganda Campaign \nUsing informational warfare, promoting ultraconservative clerics and similar, we can influence and radicalize the public opinion about the world situation in favor of Salafism. However, any such campaign will only be effective for a limited period, as people gradually lose interest.\n\n§YPropaganda Campaign Cost§! Modifier: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§YSalafi Indoctrination Campaign Cost§! Modifier: [?ROOT.modifier@salafist_outlook_campaign_cost_modifier|-2%] \n\n§YPrerequisite:§! \n[!fascism_propaganda_button_click_enabled] \n§YModifiers while active:§! \n[!fascism_propaganda_button_click]"
