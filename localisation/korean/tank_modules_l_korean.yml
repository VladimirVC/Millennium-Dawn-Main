 module_tank_nuclear_engine_gen1: "Nuclear Engine I"
 module_tank_nuclear_engine_gen1_desc: "Nuclear engines provide onboard power generation that eliminates conventional fuel consumption, allowing armored vehicles to operate for extended periods without reliance on fuel logistics.\n\n§GDesigner Hint: Nuclear Engines remove fuel consumption, but they are more expensive to produce.§!"
