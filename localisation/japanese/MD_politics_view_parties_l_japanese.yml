 VIE.Communist-State: "£generic_Communist_State_small (CPV) Communist Party of Vietnam (Hardline)"
 VIE.Communist-State_desc: "(Marxism-Leninism) - Founded by Ho Chí Minh in 1930 out of a merger of several communist organizations, the Communist Party of Vietnam has spent much of its existence fighting against foreign rule of the country. The party espoused a mix of Vietnamese nationalism and Marxist-Leninist thought, finding itself at odds with the West and aligned with the USSR and CMEA during the Cold War as it fought a campaign to uinfy the nation under communist rule. After unification the party briefly participated in elections with subordinate parties, though by the 90s most had been fully absorbed into the CPV itself. With the collapse of the Eastern Bloc and the shift in Chinese politics, the CPV has taken an increasingly reformist stance; adopting elements of market reform as well as seeking closer ties to the West."
 YEM.Communist-State: "£generic_Communist_State_small Yemeni Socialist Party (Hardline)"
 YEM.communist-state_desc: ""
 AIA.Caliphate: "£generic_Caliphate_small (AIAI) イスラム連合"
 AIA.Caliphate_icon: "£generic_Caliphate_small"
 AIA.Caliphate_desc: "サラフィー・ジハード主義 - アル・イティハード・アル・イスラミーヤ (AIAI) は、1983年にジャマーアト・アル・イスラミーヤとワフダト・アル・シャバブの合併により結成されたイスラム主義の政治・軍事組織である。AIAIは、ソマリアでのイスラム国家の樹立を目指しており、オガデン民族解放戦線への支援や「大ソマリア」構想を掲げていることから、エチオピア政府と対立している。"
 SHB.Caliphate: "£generic_Caliphate_small アル・シャバブ"
 SHB.Caliphate_desc: ""
 SHB.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small イスラム法廷連合"
 SHB.Neutral_Muslim_Brotherhood_desc: "イスラム法廷連合は、2000年代初頭、ソマリア共和国の崩壊後、モガディシュにおける基本的な法と秩序を回復するため、部族長、実業家、宗教指導者らによって設立された各地のシャリーア法廷のネットワークから誕生した。これらの法廷は、犯罪や無法状態の抑制に効果を発揮した。その後、法廷は徐々に統合され、より広範な政治運動へと発展していった。"
