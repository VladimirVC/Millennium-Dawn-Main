 HOL_royal_influence_church: "Restauración de la ascendencia protestante"
 HOL_royal_influence_church_desc: "Bajo la renovada fuerza de la monarquía, la Corona reafirma su autoridad sobre las instituciones estatales, desmantelando gran parte de la influencia pluralista. La Iglesia protestante recupera su antiguo papel central en la vida pública, guiando las normas, la educación y el derecho."
 HOL_eindhoven_brainport_idea: "Brainport de Eindhoven"
 HOL_eindhoven_brainport_idea_desc: "Eindhoven Brainport es una región líder en alta tecnología en los Países Bajos, reconocida por su innovación y sus industrias de tecnología avanzada. Centrada en Eindhoven, esta zona es un motor para sectores como semiconductores, tecnología automotriz y robótica. Sede de empresas globales como ASML y Philips, Brainport Eindhoven impulsa un importante crecimiento económico y contribuye de forma clave a la posición de los Países Bajos como líder mundial en tecnología e innovación."
 HOL_brainport: "Brainport de Eindhoven"
 HOL_brainport_desc: "Eindhoven Brainport es una región líder en alta tecnología en los Países Bajos, reconocida por su innovación y sus industrias de tecnología avanzada. Centrada en Eindhoven, esta zona es un motor para sectores como semiconductores, tecnología automotriz y robótica. Sede de empresas globales como ASML y Philips, Brainport Eindhoven impulsa un importante crecimiento económico y contribuye de forma clave a la posición de los Países Bajos como líder mundial en tecnología e innovación."
