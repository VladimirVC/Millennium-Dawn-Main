 BLR_Tracktor_category: "MTZ工場"
 BLR_Tracktor_category_desc: "ミンスク・トラクター工場はベラルーシの工場であり、農業機械の製造業者である。ミンスク・トラクター工場は、車輪付きおよび装軌式トラクター、耕うん機、農業、建設、林業、地方自治体作業用の牽引および取り付け式道具、スペアパーツ、消費財を開発・製造し、ライセンスベースでの生産を組織し、サービス確立および実施のためのサービスを提供している。\n\n\n                          - §Y利用可能なトラクター数§! §G[?BLR.tracktors]§! - "
