 NKO_naval_focus_submarine_track_tt: "§HSongun Naval Doctrine   Submarine Push§!\n• §G+3§! Naval Buildup Points\n• §G+15§! §YSubmarine Force§! progress (toward next tier)\n• §G+3§! free latest-tier attack submarines\n• Adds §HSubmarine Force Drill Momentum§! idea for §Y90§! days\n   §L+5% navy org, +5% navy max range, +10% navy XP gain§!\n• Sub Bureau unlocks MIO traits: §YSubmarine Production§! and §YCoating Materials§!\n• Tier flips at §Y25§!/§Y50§!/§Y75§!/§Y100§! progress check on the next §HInvest in the Submarine Force§! click\n• Fires the one-time §HDomestic Submarine Hulls Take Shape§! flavor event"
