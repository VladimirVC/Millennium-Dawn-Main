l_korean:
 SOV_proclaim_soviet_hegemony: "소비에트 패권 선언"
 EST_new_economic_policy_desc: "우리는 독립을 회복한 이래 동서양의 관문을 자처하며 경제 개혁과 서방 세계와의 통합을 추진해 왔습니다. 그럼에도 불구하고 우리는 해외 파트너들과 더욱 발을 맞추어, 보다 수익성이 높고 체계적인 새로운 정책을 수립해야 합니다."
 SOV_proclaim_soviet_hegemony_desc: "경제가 재건되고 대중이 동원됨에 따라, 러시아는 주도적인 역할을 되찾을 준비를 마쳤습니다. 우리는 소비에트의 우위를 공공연히 천명하여 세력 균형을 동방으로 이동시키고, 유럽 국가들이 우리의 귀환을 직시하도록 압박할 것입니다."
 SOV_the_third_rome_desc: "'제3의 로마, 모스크바'는 모스크바가 고대 로마와 비잔티움의 계승자로서 로마 제국의 유산을 이어나간다는 이념입니다. 유럽 역사 전반에 걸쳐 과연 어느 도시가 이 유산을 정당하게 계승했는지를 두고 이 개념에 대한 논쟁이 이어져 왔습니다."
 polish_focus: "폴란드 중점계통도"
 SOV_socialist_humanism_desc: "사회주의는 단순히 생산 수단과 생산량의 문제를 넘어, 노동자의 존엄성을 확보하는 데 본질적인 의미가 있습니다. 우리는 혁명의 핵심 가치로 인류의 복지를 지향하며, 공산주의의 발전이 인민을 위한 것임을 분명히 입증할 것입니다."
 SOV_socialist_humanism: "사회주의적 인본주의"
 SOV_the_third_rome: "제3의 로마"
 king: "배경: 왕족"