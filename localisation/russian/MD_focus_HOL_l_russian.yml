 DAMEN_mio_cyber_hardened_systems: "Системы с повышенной киберзащищённостью"
 DAMEN_mio_hybrid_tug_program: "Программа гибридных буксиров"
 DAMEN_mio_quintum_communications: "Квантово-устойчивые коммуникации"
 DAMEN_mio_container_ferry_modularity: "Модульность контейнерного парома"
 DAMEN_mio_AI_assisted_threat_response: "Реагирование на угрозы с помощью ИИ"
 HOL_Naval_Group_naval_equipment_organisation: "Управление кораблестроения"
 HOL_Naval_Group_naval_equipment_organisation_desc: "Управление кораблестроения (DCNS) является ключевым партнёром [HOL.GetAdjectiveCap] военно-морской промышленности, поставляя флоту Королевских ВМС Нидерландов современные боевые корабли и технологии для подводных лодок. Благодаря десятилетиям опыта в судостроении, Naval Group усиливает [HOL.GetAdjectiveCap] флот."
 HOL_Naval_Group_naval_equipment_organisation_trait: "Конструктор боевых кораблей"
 HOL_fokker_technologies_planes_manufacturer: "Технологии Fokker"
 HOL_fokker_technologies_planes_manufacturer_desc: "Fokker Technologies — известный [HOL.GetAdjectiveCap] производитель самолётов с историей создания военных и гражданских воздушных судов. Известная своими инновациями в авиастроении, компания продолжает поставлять передовые технологии для [HOL.GetAdjectiveCap] ВВС."
 HOL_fokker_technologies_planes_manufacturer_trait: "Производитель лёгких самолётов"
 HOL_werkspoor_equipment_manufacturer: "Веркспоор Утрехт"
 HOL_werkspoor_equipment_manufacturer_desc: "Когда-то краеугольный камень промышленных инноваций [HOL.GetAdjectiveCap], компания Werkspoor Utrecht остаётся эталоном национального инженерного мастерства. Werkspoor специализируется на производстве высококачественных поездов, машин и другого тяжёлого оборудования, поддерживая репутацию Нидерландов как страны с передовыми промышленными технологиями."
 HOL_werkspoor_equipment_manufacturer_trait: "Развитие железных дорог"
 WS_mio_composite_armor_plates: "Композитные броневые пластины"
 WS_mio_mobile_aa_railcar: "Подвижной зенитный железнодорожный вагон"
 WS_mio_infantry_support_wagon: "Вагон поддержки пехоты"
 WS_mio_field_rail_repair_depot: "Полевое железнодорожное ремонтное депо"
 WS_mio_remote_track_surveillance: "Слежение за путями на расстоянии"
 WS_mio_automated_rail_depot: "Автоматизированное железнодорожное депо"
 WS_mio_prefab_rails_program: "Программа сборки рельсов"
 WS_mio_modular_wagon_Assembly: "Модульная сборка вагонов"
 WS_mio_advanced_bogie_refitting_line: "Линия модернизации ходовых частей"
 WS_mio_heavy_duty_welded_rails: "Прочные сварные рельсы"
 WS_mio_Industrial_Assignment_optimalisation: "Оптимизация распределения промышленных ресурсов"
 WS_mio_design_team_efficiency: "Эффективность проектной команды"
 HOL_daf_organization_desc: "Компания DAF, основанная в 1928 году в Эйндховене, выросла из небольшой инженерной мастерской в ​​мирового лидера в автомобилестроении. Известная своим опытом в производстве надежных и долговечных грузовиков, DAF играет важнейшую роль как в военной логистике, так и в коммерческих перевозках. За десятилетия DAF заслужила репутацию компании, отличающейся инженерным совершенством, специализирующейся на тяжелых транспортных средствах, разработанных для сложных условий эксплуатации. Входя в состав группы PACCAR с 1996 года, DAF продолжает внедрять инновации, используя передовые технологии и экологически устойчивые методы. Их транспортные средства являются неотъемлемой частью глобальной военной логистики, обеспечивая надежные транспортные решения на любой местности. От бронетранспортеров, таких как YP-408, до современных грузовиков серии XG, вклад DAF в военные и гражданские перевозки не имеет себе равных по надежности и эффективности."
 HOL_daf_utility_vehicle_manufacturer_trait: "Производитель грузовиков"
 DAF_mio_improved_logistics: "Улучшенная логистика"
 DAF_mio_euro6_engines: "Двигатели Euro 6"
 DAF_mio_global_service_network: "Глобальная сервисная сеть"
 DAF_mio_automated_assembly: "Автоматизированная сборка"
 DAF_mio_brand_loyalty: "Лояльность к бренду"
 DAF_mio_inhouse_rd_division: "Внутренние исследования и разработки"
 DAF_mio_standardized_parts_policy: "Стандартизация комплектующих"
