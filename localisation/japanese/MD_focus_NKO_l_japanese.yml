 NKO_chinese_style_democracy: "中国式民主主義"
 NKO_chinese_style_democracy_desc: "西側式の民主主義は我々の国情と完全に適合するものではない。中国式民主主義の方がより人気があるようだ。"
 NKO_allow_donju_to_join_WPK: "トンジュの朝鮮労働党入党許可"
 NKO_allow_donju_to_join_WPK_desc: "トンジュは合法的にビジネスを行い、法に従って税金を納める単なるビジネスマンである。なぜ彼らが朝鮮労働党に入党できないのか？"
 NKO_intra_party_democracy: "党内民主主義"
 NKO_intra_party_democracy_desc: ""
 NKO_agricultural_reform: "農業改革"
 NKO_agricultural_reform_desc: "北朝鮮の集団農場は死んでいる。それを改革することが生産を増やす最善の方法だ！"
 NKO_self_employed_agriculture: "自営農業"
 NKO_self_employed_agriculture_desc: ""
 NKO_expand_autonomy_of_agricultural_cooperatives: "農業協同組合の自主権を拡大"
 NKO_expand_autonomy_of_agricultural_cooperatives_desc: ""
 NKO_increase_agricultural_tax: "農業税率の引き上げ"
 NKO_increase_agricultural_tax_desc: ""
 NKO_decrease_agricultural_tax: "農業税率の引き下げ"
 NKO_decrease_agricultural_tax_desc: "農業税率を引き下げることは農民をより幸福にするだろうが、それはまた我々の収入を減らすことにもなる。"
 NKO_market_economy_system_pilot: "市場経済システムの試験導入"
 NKO_market_economy_system_pilot_desc: "北朝鮮において深圳や上海のような市場経済試験都市をいくつか設立し、市場を安定して運営し続ける方法をテストする必要がある。"
 NKO_national_ownership_reform: "国家所有制改革"
 NKO_national_ownership_reform_desc: "国家所有制は近年、経済の足かせとなっている。我々には大胆な改革が必要だ！"
 NKO_complementary_to_state_owned_economy: "国有経済の補完"
