 ukr_sabotage.1.t: "乌克兰袭击了我们的库存"
 ukr_sabotage.1.d: "在最近的一次无人机袭击中，乌克兰袭击了一个存放旧重型设备的仓库。"
 ukr_sabotage.1.a: "该死"
 ukr_sabotage.2.t: "乌克兰袭击了我们的库存"
 ukr_sabotage.2.d: "在最近一次无人机袭击中，乌克兰袭击了一个存放旧轻型设备的仓库。"
 ukr_sabotage.2.a: "该死"
 ukr_sabotage.3.t: "乌克兰袭击了我们的军事生产"
 ukr_sabotage.3.d: "在最近一次无人机袭击中，乌克兰袭击了我们的一家制造商，我们遭受了暂时的损失。"
 ukr_sabotage.3.a: "他们会为此付出代价"
 UKR_our_ukraine_start: "我们的乌克兰"
 UKR_our_ukraine_start_desc: "现在是整顿国家、推行自由改革的时候了。对我们来说，人民是第一位的！"
 UKR_our_ukraine_secretariat: "乌克兰总统秘书处"
 UKR_our_ukraine_secretariat_desc: "秘书处在管理与总统活动有关的行政和组织职能方面发挥着关键作用。乌克兰总统秘书处成立的主要目的是确保总统遵守宪法权力并有效履行职责。"
 UKR_our_ukraine_secretariat_reduction: "减少秘书处人员"
 UKR_our_ukraine_secretariat_reduction_desc: "我们需要减少秘书处工作人员的数量，以优化政府机构的工作并降低预算成本。"
 UKR_our_ukraine_decentralization: "地方分权"
 UKR_our_ukraine_decentralization_desc: "我们需要加强我们国家的地方政府。"
 UKR_our_ukraine_wto: "寻求加入世贸组织的援助"
 UKR_our_ukraine_wto_desc: "我们已经准备好成为世贸组织成员，在这方面我们需要支持。"
 UKR_our_ukraine_yanukovich_go_home: "罢免亚努科维奇"
 UKR_our_ukraine_yanukovich_go_home_desc: "亚努科维奇作为总理表现太糟糕，所以你们将罢免他并任命一位新总理。"
 UKR_our_ukraine_timoha: "季莫申科的办公室"
 UKR_our_ukraine_timoha_desc: "大名鼎鼎的尤利娅·季莫申科已加入我们的政府，让我们看看她将给我们的国家带来什么。"
 UKR_our_ukraine_aviation_reform: "航空业改革"
 UKR_our_ukraine_aviation_reform_desc: "航空业对于我们国家非常重要，我们将努力振兴它。"
 UKR_our_ukraine_help_western: "争取利沃夫的支持"
 UKR_our_ukraine_help_western_desc: "我们将恢复利沃夫的冷热水供应，从而争取该市乃至该地区居民的支持。"
 UKR_our_ukraine_cheap_gas_negotiate: "降低天然气价格的谈判"
 UKR_our_ukraine_cheap_gas_negotiate_desc: "我们将尝试与莫斯科谈判降低能源价格。"
 UKR_our_ukraine_service_life: "缩短服役时长"
 UKR_our_ukraine_service_life_desc: "乌克兰军队需要现代化。我们在这方面的首项改革是缩短军队服役期限，从两年缩短到一年！这样，应征入伍者服役的时间就会缩短。"
 UKR_our_ukraine_nato_eu: "支持乌克兰融入北约和欧盟"
 UKR_our_ukraine_nato_eu_desc: "让我们开始更加渐进地融入北约和欧盟。这对于我们伟大国家的军事和经济安全是必要的。"
 UKR_our_ukraine_fire_corrupt: "清除逮捕腐败分子"
 UKR_our_ukraine_fire_corrupt_desc: "我们的政府里有腐败分子，我们会解雇他们！我们国家不会容忍腐败！！！"
 UKR_our_ukraine_form_new_government: "组建新政府"
 UKR_our_ukraine_form_new_government_desc: "现在我们已经解雇了所有从我们国家偷窃的人，我们可以组建一个新的、诚实的、公正的政府。"
 UKR_our_ukraine_fight_corruption: "打击腐败"
 UKR_our_ukraine_fight_corruption_desc: "腐败是我们国家的主要敌人，我们将坚决同腐败作斗争！"
 UKR_our_ukraine_alternative_energy_sources: "替代能源"
 UKR_our_ukraine_alternative_energy_sources_desc: "开发替代能源将有助于我们减少对进口能源的依赖。"
 UKR_our_ukraine_crush_oligarchs: "减少寡头的影响力"
 UKR_our_ukraine_crush_oligarchs_desc: "寡头集团是我们国家的第二大敌人。他们可以通过逃避法律来影响我们的政府。为了避免这种情况，我们将减少他们的影响力，并试图将他们赶出我们的国家。"
 UKR_our_ukraine_increase_media_freedom: "增加媒体自由"
 UKR_our_ukraine_increase_media_freedom_desc: "我们的媒体长期以来受到限制，而现在，在我们的统治下，它将比以往更加自由、更加独立！"
 UKR_our_ukraine_release_political_prisoners: "释放政治犯"
 UKR_our_ukraine_release_political_prisoners_desc: "在上届政府执政期间，许多反对派政客被监禁。让我们给他们自由吧！"
 UKR_our_ukraine_internet_freedom: "互联网自由"
 UKR_our_ukraine_internet_freedom_desc: "互联网自由意味着公民有权自由获取信息、言论自由和在线交流隐私。让我们确保这些权利和自由得到保护。"
 UKR_our_ukraine_provide_housing: "为乌克兰公民提供住房"
 UKR_our_ukraine_provide_housing_desc: "有必要为我们的公民提供住房，为此我们将进行适当的改革。"
 UKR_our_ukraine_health_insurance_law: "健康保险法"
 UKR_our_ukraine_health_insurance_law_desc: "我们将制定医疗保险法，鼓励居民积极向医疗机构就医，提高公民的健康水平。"
 UKR_our_ukraine_curriculum_modernization: "课程现代化"
 UKR_our_ukraine_curriculum_modernization_desc: "我们将改革学校的教育计划，提高年轻一代的教育水平。"
 UKR_our_ukraine_diversification_of_gas_supply_sources: "天然气供应来源多元化"
 UKR_our_ukraine_diversification_of_gas_supply_sources_desc: "我们将积极实现资源资产多元化，避免依赖单一供应商。"
 UKR_our_ukraine_cost_reduction: "削减预算支出"
 UKR_our_ukraine_cost_reduction_desc: "我们将削减预算以改善预算状况。"
 UKR_our_ukraine_deregulation_of_business_environment: "放松商业环境管制"
 UKR_our_ukraine_deregulation_of_business_environment_desc: "我们的国家需要减少官僚主义，降低企业家的行政障碍。"
 UKR_our_ukraine_attracting_investments: "吸引投资"
 UKR_our_ukraine_attracting_investments_desc: "我们的国家对投资持开放态度，我们已准备好吸引潜在投资者。"
 UKR_our_ukraine_beginning_decommunization_policy: "开始实行去共产化政策"
 UKR_our_ukraine_beginning_decommunization_policy_desc: "1991年，我们从苏联的压迫中获得了独立。让我们纪念这一年，并在全国范围内开始实行去共产主义化政策！现在就必须压制共产主义的影响。"
 UKR_our_ukraine_economic_liberalism: "经济自由主义"
 UKR_our_ukraine_economic_liberalism_desc: "如果我们希望经济增长更加高效，经济自由主义是必需的，因此我们必须接受它。"
 UKR_our_ukraine_parliamentary_republic: "加强议会权力"
 UKR_our_ukraine_parliamentary_republic_desc: "加强议会权力有助于提高政府的代表性。议会是人民选举产生的机构，因此，它应该对决策过程有更大的影响力。这有助于在政治进程中更多地纳入公民的意见和利益。"
 UKR_our_ukraine_president_republic: "加强总统权力"
 UKR_our_ukraine_president_republic_desc: "支持加强总统权力的首要论点是确保对危机情况做出更有效、更迅速的反应。在当今世界面临诸多全球性挑战（例如经济危机、反恐和流行病）的情况下，总统必须拥有足够的权力，以便迅速果断地采取行动。\n\n权限有限会导致官僚主义作风严重、决策效率低下。"
 UKR_our_ukraine_democratic_constitution: "新民主宪法"
 UKR_our_ukraine_democratic_constitution_desc: "我们准备改革宪法，以便让我们的国家更接近真正的民主。"
 UKR_our_ukraine_recognition_holodomor: "承认乌克兰大饥荒"
 UKR_our_ukraine_recognition_holodomor_desc: "苏联政权与我们，与乌克兰人一起犯下了20世纪最可怕的罪行。这场可怕的饥荒，乌克兰大饥荒，是由苏联共产主义政权推行的农业集体化和国家暴力政策造成的。"
 UKR_our_ukraine_ukrainian_institute: "乌克兰国家记忆研究所"
 UKR_our_ukraine_ukrainian_institute_desc: "乌克兰国家记忆研究所是执行恢复和保存国家记忆领域国家政策的中央行政权力机构。该研究所的成立旨在重现乌克兰民族的公正历史，并制定和实施这一方向的国家政策。\n\n我们还将永久铭记我国领土上政治镇压和饥荒受害者的记忆。"
 UKR_our_ukraine_secretariat_of_president_reduction: "乌克兰总统秘书处缩减"
 UKR_ukrainian_libertarianism: "乌克兰自由主义"
 UKR_ukrainian_libertarianism_desc: "乌克兰是时候进入自由主义时代了！让我们把国家从资本家和共产主义者的枷锁中解放出来"
 UKR_full_deregulation: "全面放松管制"
 UKR_full_deregulation_desc: "我们将开始全面放松管制，政府影响力将会减少。"
 UKR_decrease_role_of_government: "削弱政府权力"
 UKR_decrease_role_of_government_desc: "政府在我们美丽的国家将发挥最小的作用。"
 UKR_free_the_common_folk: "真正自由的人"
 UKR_free_the_common_folk_desc: "我们的人民终于可以松一口气、感受到自由了！"
 UKR_offshore_country: "离岸公司国家"
 UKR_offshore_country_desc: "我们欢迎在我国建立许多离岸区。"
 UKR_true_servant_of_people: "真正的人民公仆"
 UKR_true_servant_of_people_desc: "乌克兰终于成为世界上最自由的国家了！"
 UKR_our_ukraine_freedom_of_social_media_idea: "社交媒体自由"
 UKR_our_ukraine_freedom_of_social_media_idea_desc: "媒体应该自由，也将会如此。我们将支持禁止审查。"
 UKR_our_ukraine_secretariat_of_president: "乌克兰总统秘书处"
 UKR_our_ukraine_ukrainian_institute_of_national_memory: "乌克兰国家记忆研究所"
 UKR_our_ukraine_ukrainian_institute_of_national_memory_desc: "每个乌克兰人都应该记住自己民族在过去做出的牺牲。国家记忆研究所将帮助我们培养一代又一代铭记乌克兰人英雄主义的人。"
 UKR_our_ukraine_fight_with_corruption_idea: "打击腐败"
 UKR_our_ukraine_education_reform_idea: "教育改革的后果"
 UKR_our_ukraine_health_reform_idea: "医疗保健改革的后果"
 UKR_our_ukraine_social_reform_idea: "住房改革的后果"
 UKR_our_ukraine_air_industry_idea: "航空业改革"
 UKR_liberals_modifier: "乌克兰自由主义"
 UKR_liberals_modifier_desc: "乌克兰终于走上了自由主义的道路，现在我们已经摆脱了独裁统治的枷锁。"
 ukraine_our_ukraine.1.t: "乌克兰总统秘书处"
 ukraine_our_ukraine.1.d: "尤先科执政期间，总统办公厅表现非常糟糕，因此，我们将其改革为乌克兰总统秘书处，以确保更大的政治稳定。"
 ukraine_our_ukraine.1.a: "是时候做出改变了。"
 ukraine_our_ukraine.2.t: "乌克兰国家记忆研究所"
 ukraine_our_ukraine.2.d: "国家记忆研究所已经开始工作，现在我们准备让乌克兰回归其真实的历史！"
 ukraine_our_ukraine.2.a: "万岁！"
 ukraine_our_ukraine.3.t: "民主宪法"
 ukraine_our_ukraine.3.d: "我们将对宪法进行修正，使我们的国家更加民主！"
 ukraine_our_ukraine.3.a: "万岁！"
 ukraine_our_ukraine.4.t: "乌克兰向我国提供投资。"
 ukraine_our_ukraine.4.d: "乌克兰政府宣布启动吸引外国投资者的计划，并向我国政府发出了投资其经济的邀请。"
 ukraine_our_ukraine.4.a: "让我们投资吧！"
 ukraine_our_ukraine.4.b: "我们对此不感兴趣。"
 ukraine_our_ukraine.5.t: "在乌克兰的投资"
 ukraine_our_ukraine.5.d: "他们同意在我国投资。"
 ukraine_our_ukraine.5.a: "很好"
 ukraine_our_ukraine.6.t: "在乌克兰的投资"
 ukraine_our_ukraine.6.d: "他们拒绝了我们向我国投资的提议。"
 ukraine_our_ukraine.6.a: "悲哀"
 ukraine_our_ukraine.7.t: "与乌克兰的天然气合同"
 ukraine_our_ukraine.7.d: "乌克兰提出降低我们的天然气合同购买价格，作为回报，我们之间的中间人将被取消，这样我们就对他们有更大的影响力，我们应该同意吗？"
 ukraine_our_ukraine.7.a: "我们将签订协议"
 ukraine_our_ukraine.7.b: "我们对此不感兴趣。"
 ukraine_our_ukraine.8.t: "与俄罗斯的天然气合同"
 ukraine_our_ukraine.8.d: "他们同意更改我们的天然气合同条款，现在我们支付的费用将更少！"
 ukraine_our_ukraine.8.a: "很好"
 ukraine_our_ukraine.9.t: "与俄罗斯的天然气合同"
 ukraine_our_ukraine.9.d: "他们同意更改我们的天然气合同条款，现在我们支付的费用将更少！"
 ukraine_our_ukraine.9.a: "很好"
 UKR_zelensky_western: "通向西方之路"
 UKR_zelensky_western_desc: "我们将继续我们的政治路线，渴望西方。"
 UKR_befriend_the_west: "与西方的友谊"
 UKR_befriend_the_west_desc: "我们将继续推行改善与西方国家关系的政策，我们将西方国家视为我们的伙伴和盟友。"
 UKR_avakov_befriend: "与阿瓦科夫的友谊"
 UKR_avakov_befriend_desc: "阿尔森·阿瓦科夫是我们见过的最执着的部长，他能够在多届政府中生存下来，此外，他还在经济上支持亚速营，如果我们加强与他的联系，我们将能够增加亚速营的数量。"
 UKR_land_reform_zelya: "土地改革"
 UKR_land_reform_zelya_desc: "我们将继续进行早已开始的土地改革。"
 UKR_fasten_nato_join: "加入北约的愿望"
 UKR_fasten_nato_join_desc: "北约是我们的终点，是我们从一开始就努力奋斗的目标。"
 UKR_peaceful_negotiation_don: "和平解决顿巴斯问题"
 UKR_peaceful_negotiation_don_desc: "我们准备为顿巴斯做出让步，最终结束这场无休止的冲突。"
 UKR_keep_status_quo: "维持现状"
 UKR_keep_status_quo_desc: "我们还没有准备好和平解决这个问题，我们还会走以前的道路。"
 UKR_next_azov_created_tt: "新的§Y亚速海大桥§!将建成"
 UKR_our_influence_helps_tt: "§C由于我们能够影响议会，因此尽管我们拥有的席位较少，但我们仍能够以更高的成功率通过这项法律§!"
 UKR_lose_some_seats_TT: "我们将§R丢失§!§H议会§!中某些席位"
 UKR_gain_some_seats_TT: "我们将§G获得§!§H议会§!中某些席位"
 UKR_is_pro_west_TT: "是一个与西方结盟的政党"
 UKR_is_pro_east_TT: "是一个与俄罗斯结盟的政党"
 UKR_is_neutral_TT: "是一个不与任何外国结盟的政党"
 UKR_influence_parliament_TT: "将开始§p影响§!§H议会§!"
 UKR_puppet_parliament_TT: "将§O傀儡§!§H议会§!\n\n§R我们不需要通过议会来修改法律§!"
 UKR_dissolve_parliament_TT: "将§R解散§!§H议会§!\n\n§R我们不需要通过议会来修改法律§!"
 UKR_zelenskiy_socialist_TT: "§Y泽连斯基§!将更改他的§B意识形态§!！"
 UKR_zelenskiy_formed_TT: "£ukr_servant_of_the_people §Y人民公仆§!党将创建！"
 UKR_zelenskiy_here_TT: "£ukr_servant_of_the_people §Y人民公仆§!党必须创建！"
 ukr_zelenskiy.1.t: "令人吃惊的公告"
 ukr_zelenskiy.1.d: "今天，弗拉基米尔·泽连斯基发表了令人惊讶的声明。他在声明中表示，他放弃了自由主义思想，并“根据多数人的要求”接受了社会主义思想。此外，总统宣布乌克兰将加强与西方的关系，并将努力吸引西方投资者。"
 ukr_zelenskiy.1.a: "令人惊讶的发展"
 ukr_zelenskiy.2.t: "人民公仆"
 ukr_zelenskiy.2.d: "一则意想不到的消息震动了整个乌克兰。今天，作为大会的成果，人民公仆党以这部热门电影的名字命名。许多人认为，这个党是为了这部电影而成立的，而另一些人则声称，这个党是为了宣传著名喜剧演员弗拉基米尔·泽连斯基作为总统候选人而成立的。尽管泽连斯基本人否认与此事有关，但他含糊其辞的回答可能成为进一步猜测的基础。"
 ukr_zelenskiy.2.a: "有趣"
 UKR_reform_programm: "改革计划"
 UKR_reform_programm_desc: "我们将开展一系列改革，推动我国经济增长并摆脱苏联解体的危机。"
 UKR_reform_national_guard: "解散国家近卫军"
 UKR_reform_national_guard_desc: "现在是改革的时候了。现在是解散国家近卫军，并将其改革为一个更有效的组织的时候了：内卫军。"
 UKR_reform_vsu: "新军事理论"
 UKR_reform_vsu_desc: "我们的军队需要改变和升级，否则，我们就无法做好与敌人作战的准备。新的军事理论也加强了我们与北约的合作。"
 UKR_check_and_balances: "制衡体系"
 UKR_check_and_balances_desc: "我们的国家目前正处于一个不稳定的政治局势中；我们必须在政治领域找到平衡，以防止灾难的发生。"
 UKR_yushenko_cabinet: "尤先科内阁"
 UKR_yushenko_cabinet_desc: "维克多·尤先科是我们的老朋友了，他的管理经验丰富。他向我们承诺，他的活动成果应该会促进我国经济成分的增长。"
 UKR_welfare_reform: "福利改革"
 UKR_welfare_reform_desc: "自1990年代以来，医疗保健一直处于糟糕的状态；有必要开始进行改革。"
 UKR_kosuik: "科修克面包制造厂"
 UKR_kosuik_desc: "国内汽车业正在复苏，私营企业家将成为这一进程的引擎。其中一位企业家尤里·科修克计划建立自己的农产品生产工厂。"
 UKR_azovstal_private: "亚速钢铁公司私有化"
 UKR_azovstal_private_desc: "我们将把亚速钢铁公司交给私人经营，因为我们自己没有能力在财力上支持这么庞大的企业。"
 UKR_land_reform: "土地改革"
 UKR_land_reform_desc: "土地改革早就该进行了，但我们尽量拖延。现在我们可以更轻松地将土地卖给私人。"
 UKR_land_trade: "简化土地交易"
 UKR_land_trade_desc: "我们将继续为私人投资者在我国获取土地提供便利。"
 UKR_bolster_privatization: "加强土地私有化"
 UKR_bolster_privatization_desc: "私有化将会加速，我们的国家必须步入新的市场经济。"
 UKR_ukrenergo_reform: "乌克兰电网改革"
 UKR_ukrenergo_reform_desc: "我们的能源结构状况很糟糕，必须对乌克兰电网公司进行改革。"
 UKR_burshtyn_tes: "扩展布尔什滕煤电厂"
 UKR_burshtyn_tes_desc: "我们将对布尔什滕煤电厂进行重建和改进。"
 UKR_diversy_fuel: "燃料购买多样化"
 UKR_diversy_fuel_desc: "我们必须巧妙地实现从国外购买的能源来源多样化；我们不能只依赖一个卖家。"
 UKR_short_terms: "取消短期贷款"
 UKR_short_terms_desc: "我们将彻底废除短期贷款等对经济有害的东西。"
 UKR_bank_lobbyst: "清除银行说客"
 UKR_bank_lobbyst_desc: "20世纪90年代，许多银行游说者上台，现在是时候摆脱他们对我们国家的影响了。"
 UKR_social_cut_down: "削减社会支出"
 UKR_social_cut_down_desc: "为了稳定财政储备，我们被迫暂时削减社会支出。"
 UKR_struggle_power: "权力斗争"
 UKR_struggle_power_desc: "我们的不稳定局势导致强大政治对手的出现；我们需要保护自己免受他们的侵害，并说服选民留在我们身边。"
 UKR_tax_agro: "农业公司减税"
 UKR_tax_agro_desc: "我们将降低农业产业税收，以刺激其生产增长。"
 UKR_stimulate: "刺激经济"
 UKR_stimulate_desc: "我们的措施正在取得成效，经济开始增长。"
 UKR_negotiation_left: "与左翼反对派的谈判"
 UKR_negotiation_left_desc: "左翼活动家的力量明显增强；有必要与他们找到妥协方案。"
 UKR_radicalize_without_kuchma: "没有库奇马，乌克兰就会激进化"
 UKR_radicalize_without_kuchma_desc: "“没有库奇马的乌克兰”运动正获得危险的势头；现在是时候处理他们了。"
 UKR_slowdown_reform_land: "土地改革放缓"
 UKR_slowdown_reform_land_desc: "我们决定放慢土地改革的步伐，因为它在社会上引起了褒贬不一的反应。"
 UKR_re_approach_privatbank: "重新审视乌克兰私有银行"
 UKR_re_approach_privatbank_desc: "乌克兰私有银行是我们国家最大的银行，我们必须成功与它找到妥协方案，它将为我们提供大量的税收收入。"
 UKR_concessin_with_donbass: "与顿巴斯带达成协议"
 UKR_concessin_with_donbass_desc: "我们准备向顿巴斯做出让步，从而确保他们对我们的忠诚。"
 UKR_invest_mining_companies: "对矿业公司的投资"
 UKR_invest_mining_companies_desc: "通过投资顿巴斯公司，我们将确保获得当地选民的大力支持。"
 UKR_donbass_infrastructure: "顿巴斯基础设施计划"
 UKR_donbass_infrastructure_desc: "投资顿巴斯基础设施将使我们能够吸引新的选民并增加该地区的收入。"
 UKR_impeachment: "弹劾程序"
 UKR_impeachment_desc: "最高拉达正准备弹劾我们。我们必须在为时已晚之前应对这一对我们权威的威胁。"
 UKR_privatization_ukrenergo: "乌克兰电网公司扩张"
 UKR_privatization_ukrenergo_desc: "我们正在扩建乌克兰电网公司，将我们网络的一部分连接到欧洲同步电网。"
 UKR_reach_russian_oligarch: "接触俄罗斯寡头"
 UKR_reach_russian_oligarch_desc: "我们将吸引俄罗斯寡头来支持我们的政治公司。"
 UKR_rus_mobile_operators: "吸引俄罗斯移动运营商"
 UKR_rus_mobile_operators_desc: "我们将允许俄罗斯电信运营商进入我们的市场。"
 UKR_free_economic_zones: "自由经济区"
 UKR_free_economic_zones_desc: "我们将在我国领土上建立几个经济区，我们自然会优先考虑俄罗斯投资者。"
 UKR_yanuk_cabinet: "亚努科维奇[Yanu_Status]"
 UKR_yanuk_cabinet_desc: "维克多·亚努科维奇及其即将开展的政治活动应该会对经济产生刺激作用，尤先科的活动也应该如此。"
 UKR_block_land_trading: "禁止土地交易"
 UKR_block_land_trading_desc: "土地交易将被积极冻结，因为这可能会对我们的军工复合体的独立性产生负面影响。"
 UKR_soft_taxation: "软性税制改革"
 UKR_soft_taxation_desc: "我们将实施不会引起企业和私人太大愤怒的软性税制改革。"
 UKR_floating_excange: "浮动汇率"
 UKR_floating_excange_desc: "我们将实行浮动汇率，但它可以给我们带来完全不同的经济效应。"
 UKR_small_favor: "小型企业优惠"
 UKR_small_favor_desc: "我们将出台小企业优惠政策，刺激经济增长。"
 UKR_doentskstal: "顿涅茨克钢厂"
 UKR_doentskstal_desc: "我们正在顿巴斯地区组建一家新企业，以优化我们在该地区的活动。"
 UKR_gas_azvostal: "在亚速钢铁厂修建天然气管道"
 UKR_gas_azvostal_desc: "我们将在亚速钢铁公司修建一条天然气管道，以改善企业的运营以及当地的生活条件。"
 UKR_dorohy_avto: "乌克兰多罗希汽车公司"
 UKR_dorohy_avto_desc: "说我们国家的道路状况很糟糕其实是夸赞。95%的道路都处于年久失修状态。我们将开始修缮。"
 UKR_roshen: "如胜"
 UKR_roshen_desc: "著名的如胜糖果工厂正在扩大其业务，我们将密切关注其所有者。"
 UKR_luaz_reopen: "卢茨克汽车制造厂现代化"
 UKR_luaz_reopen_desc: "卢茨克汽车制造厂生产的车辆老旧。为了配合我们的道路改革，有必要对这些车辆进行现代化改造。"
 UKR_ukraine_2000: "乌克兰2000"
 UKR_ukraine_2000_desc: "新千年应该为乌克兰带来全球性的宪法改革，我们将积极推动这些改革。"
 UKR_gain_rada_support: "获得拉达支持"
 UKR_gain_rada_support_desc: "我们的改革实施需要最高拉达的全力支持。"
 UKR_deal_pro_socialist_media: "解决亲社会主义媒体"
 UKR_deal_pro_socialist_media_desc: "社会主义政党势力日益强大，有必要压制他们的媒体。"
 UKR_referendum_const: "宪法公投"
 UKR_referendum_const_desc: "我们已准备好就宪法修正案举行全民公投。"
 UKR_push_for_reforms: "推进改革"
 UKR_push_for_reforms_desc: "我们将继续向政府宣传我们的改革思想；我们的国家需要它们。"
 UKR_arrest_timoshenko: "逮捕季莫申科"
 UKR_arrest_timoshenko_desc: "对于我们来说，季莫申科是一个过于危险的政治对手，我们会逮捕她。"
 UKR_prepare_protest: "为抗议做好准备"
 UKR_prepare_protest_desc: "我们的行动肯定会引发一系列抗议；我们需要做好准备。"
 UKR_reform_berkut: "改革金雕部队"
 UKR_reform_berkut_desc: "金雕特种部队需要进行改革，否则我们可能会失去对抗议活动的控制。"
 UKR_deal_yushenko: "与尤先科的交易"
 UKR_deal_yushenko_desc: "我们将处理尤先科和他的政治野心。"
 UKR_appoint_yanukovich: "任命亚努科维奇"
 UKR_appoint_yanukovich_desc: "我们将任命亚努科维奇为政府首脑；也许他能够改善这种情况。"
 UKR_seek_help_eastern_oligarch: "向东部寡头寻求帮助"
 UKR_seek_help_eastern_oligarch_desc: "我们的资源显然不足以镇压抗议运动；也许东部寡头会帮助我们？"
 UKR_aid_from_minign_companies: "获得矿业公司的援助"
 UKR_aid_from_minign_companies_desc: "我们对矿业公司的投资应该会得到回报，他们的管理人员也将准备为我们提供财政和其他援助。"
 UKR_negotiate_orange_maidan: "与独立广场的橘色运动谈判"
 UKR_negotiate_orange_maidan_desc: "现在是时候与抗议者进行谈判并一劳永逸地解决这个问题了。"
 UKR_const_reform: "宪法改革"
 UKR_const_reform_desc: "通过抗议运动，我们最终能够向政府推动我们的改革。"
 UKR_lyvochkin: "拉沃奇金解决方案"
 UKR_lyvochkin_desc: "我们的首席顾问明确向我们表示，我们必须与抗议者妥协；否则，我们的国家将面临混乱。"
 UKR_stay_for_fair_election: "为了“公平”选举而留任"
 UKR_stay_for_fair_election_desc: "我们不会就这样放弃我们的权力；我们会坚持到底。"
 UKR_yusha_tt: "§Y这将阻止我们执行尤先科内阁分支的国策§!"
 UKR_yana_tt: "§Y这将使我们能够完成亚努科维奇内阁的国策§!"
