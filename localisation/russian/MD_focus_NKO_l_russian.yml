 NKO_agricultural_reform: "Аграрная реформа"
 NKO_agricultural_reform_desc: "Коллективное сельское хозяйство в Северной Корее мертво. Его реформирование - лучший способ увеличить производство!"
 NKO_self_employed_agriculture: "Самозанятые Сельское хозяйство"
 NKO_self_employed_agriculture_desc: ""
 NKO_expand_autonomy_of_agricultural_cooperatives: "Расширение автономии сельскохозяйственных кооперативов"
 NKO_expand_autonomy_of_agricultural_cooperatives_desc: ""
 NKO_increase_agricultural_tax: "Повышение ставок сельскохозяйственного налога"
 NKO_increase_agricultural_tax_desc: ""
 NKO_decrease_agricultural_tax: "Снижение ставок сельскохозяйственного налога"
 NKO_decrease_agricultural_tax_desc: "Снижение ставки сельскохозяйственного налога сделает фермеров более счастливыми, хотя это также оставит нас с меньшим доходом."
 NKO_market_economy_system_pilot: "Пилотная система рыночной экономики"
 NKO_market_economy_system_pilot_desc: "Нам необходимо создать несколько пилотных городов рыночной экономики, таких как Шэньчжэнь и Шанхай в Северной Корее, чтобы проверить, как обеспечить устойчивую работу рынка."
 NKO_national_ownership_reform: "Реформа национальной собственности"
 NKO_national_ownership_reform_desc: "Система национальной собственности в наши дни стала тормозом для экономики, нам нужны смелые реформы!"
 NKO_complementary_to_state_owned_economy: "Дополнение к государственной экономике"
