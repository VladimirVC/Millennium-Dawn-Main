 Karakalpaks_rebelled_yes: "カラカルパクスタンが反乱を起こした"
 CES_economic_affairs: "経済問題"
 CES_economic_affairs_desc: "2000年代初頭は、中央アジア諸国が経済発展と移行の複雑な状況を乗り越える変革期であった。"
 CES_enlarge_the_mines: "鉱山の拡大"
 CES_enlarge_the_mines_desc: "Expanding our mines is necessary to grow the mining industry."
 CES_western_resource: "代替エネルギー源"
 CES_western_resource_desc: "We will develop alternative energy sources."
