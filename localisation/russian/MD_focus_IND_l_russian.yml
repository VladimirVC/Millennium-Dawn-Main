l_russian:
 indonesia_focus: "Индонезийское дерево фокусов "
 IND_indonesias_future: "Будущее Индонезии"
 IND_indonesias_future_desc: "Поскольку наша страна вступает в 21 век со своими проблемами, мы должны найти пути их решения и принести нашей стране любовь, которую она заслуживает!"
 IND_asia_financial_crisis: "Справиться с кризисом!"
 IND_asia_financial_crisis_desc: "Финансовый кризис сильно ударил по Юго-Восточной Азии с 1997 года, и наша страна не избежала его разрушительных последствий. Теперь мы приступим к разработке плана решения этой проблемы."
 IND_japanese_aid: "Призвать Японию помочь нам"
 IND_japanese_aid_desc: "Несмотря на наши разногласия во время Второй мировой войны, Япония довольно благосклонно отнеслась к нам в связи с экономическими трудностями. Нам следует связаться с ними и их западными союзниками, чтобы они помогли нам выйти из этой ситуации."
 IND_japanese_aid_jica: "JICA"
 IND_japanese_aid_jica_desc: "Японское агентство международного сотрудничества (JICA) может быть очень полезной организацией в содействии развитию инфраструктуры и дорожной сети нашей страны."
 IND_japanese_aid_metro_invest: "Японские инвестиции в метрополитен"
 IND_japanese_aid_metro_invest_desc: "Нашим гражданам необходимо быстро передвигаться по стране, и благодаря японским технологиям метрополитена и инвестициям мы можем достичь этой цели."
 IND_japanese_aid_java_airport: "Аэропорты Западной Явы"
 IND_japanese_aid_java_airport_desc: "Нам нужно больше аэропортов для растущего числа авиаторов и туристов в нашей стране. Западная Ява — лучшее место для их строительства, поскольку здесь находится столица нашей страны."
 IND_japanese_aid_ev: "Японские электромобили"
 IND_japanese_aid_ev_desc: "Япония является лидером в производстве электромобилей, и с учётом того, что в стране выпускается много отличных автомобилей, нам следует начать процесс перехода населения на электромобили, чтобы снизить уровень загрязнения."
 IND_japanese_aid_mitsubishi: "Заводы Мицубиси"
 IND_japanese_aid_mitsubishi_desc: "Mitsubishi — успешный японский производитель автомобилей. Если нам удастся получить их офисы здесь, в Индонезии, мы, возможно, сможем многому у них научиться в автомобильной сфере."
 IND_japanese_aid_expander_bagero: "Expander и Bagero!"
 IND_japanese_aid_expander_bagero_desc: "Expander и Bagero – это настоящее чудо инженерной мысли и мастерства, настоящие шедевры индустрии электромобилей, теперь доступные жителям Индонезии."
 IND_japanese_aid_inf_finance: "IIF подписывает соглашение с Японией"
 IND_japanese_aid_inf_finance_desc: "IIF, также известный как Индонезийский фонд финансирования инфраструктуры, является частной компанией, однако лучше всего заключать сделки с Японией для сокращения затрат, а не для экономии на качестве при строительстве национальной инфраструктуры."
 IND_japanese_aid_men_for_finance: "Японская рабочая сила для IIF"
 IND_japanese_aid_men_for_finance_desc: "Если мы сможем получить рабочую силу для IIF из Японии, мы сможем укрепить отношения и использовать их опыт для улучшения нашей инфраструктуры."
 IND_japanese_aid_rubber: "Каучуковые поля на Суматре"
 IND_japanese_aid_rubber_desc: "С помощью японских партнеров мы сможем более эффективно производить каучук для мирового рынка и потенциально даже стать ведущим производителем каучука в Юго-Восточной Азии."
 IND_new_capital_desc: "Джакарта устаревает и отстает от остальных мировых столиц. Нам следует начать планирование совершенно нового города, используя весь опыт и знания, полученные от японцев."
 IND_chinese_aid: "Позвонить в Китай!"
 IND_chinese_aid_desc: "Японцы разграбили нашу страну и поработили наш народ во время Второй мировой войны. Мы не можем этого забыть, и националисты в нашей стране стремятся к более тесным связям с Китаем и странами Восточного мира. Мы даже можем убедить их инвестировать в строительство заводов и инфраструктуры в Индонезии."
 IND_chin_aid_gas_plants: "Китайские нефтеперерабатывающие  заводы"
 IND_chin_aid_gas_plants_desc: "Нефтяные месторождения на Северной Суматре остаются неразработанными, обладая огромным неиспользованным потенциалом. Благодаря китайским газоперерабатывающим заводам мы можем эффективно использовать эти ресурсы и стать крупнейшим производителем нефти в Юго-Восточной Азии."
 IND_chin_aid_coal: "Угольные заводы Западной Явы"
 IND_chin_aid_coal_desc: "Мы располагаем огромными запасами угля, и очень жаль, что у нас нет промышленных мощностей для эффективной переработки его в энергию. Однако Китай предложил нам невероятно выгодное соглашение о строительстве новых заводов, которые ускорят процесс добычи и переработки угля."
 IND_chin_aid_coal_surplus: "Использовать излишки угля"
 IND_chin_aid_coal_surplus_desc: "Теперь, когда у нас есть заводы по переработке угля, нам следует построить нефтеперерабатывающие заводы, чтобы перерабатывать его в энергию для нужд нашей страны."
 IND_chin_aid_ev: "Китайская помощь с электромобилями"
 IND_chin_aid_ev_desc: "Китайцы знают толк в массовом производстве автомобилей, и благодаря их опыту в области электромобилей мы можем помочь в борьбе с загрязнением окружающей среды в нашей стране."
 IND_chin_aid_catl: "Соглашение с CATL"
 IND_chin_aid_catl_desc: "Нам следует заключить соглашения между нашей страной и компанией CATL, чтобы они производили батареи для удовлетворения постоянно растущего спроса."
 IND_chin_aid_pollution: "Закон о сокращении загрязнения окружающей среды"
 IND_chin_aid_pollution_desc: "Мы примем Закон о сокращении загрязнения окружающей среды, чтобы бороться с загрязнением в большей части наших городов. Благодаря китайским инвестициям это стало не мечтой, а реальностью."
 IND_chin_aid_inf: "Китайские инвестиции в инфраструктуру"
 IND_chin_aid_inf_desc: "Учитывая постоянное совершенствование китайской инфраструктуры, нет сомнений, что и наша страна должна получать аналогичное отношение. Мы должны обратиться к Китаю с просьбой об инвестициях в строительство инфраструктуры для Индонезии."
 IND_chin_aid_high_railway: "Высокоскоростная железная дорога Джакарта - Бандунг"
 IND_chin_aid_high_railway_desc: "Чтобы стать эффективной, индустриально развитой страной, мы должны прежде всего соединить наши города. Китай предложил построить высокоскоростную железную дорогу, соединяющую Джакарту и Бандунг."
 IND_chin_aid_tollway: "Платная автодорога Баликпапан - Самаринда"
 IND_chin_aid_tollway_desc: "Платная автомагистраль Баликпапан — Самаринда позволит жителям Восточного Калимантана передвигаться с столь необходимой легкостью. Используя китайские инфраструктурные методы, мы можем создать эту платную автомагистраль для нашей страны."
 IND_new_silkroad: "Шелковый путь 21-го века!"
 IND_new_silkroad_desc: "Помощь наших китайских партнеров вновь вывела нашу страну в центр международного внимания. Теперь мы — индустриально развитая страна, обладающая промышленным потенциалом для развития в XXI веке!"
 IND_our_policies: "Инвестируйте в нашу политику"
 IND_our_policies_desc: "Наша политика нуждается в пересмотре. Мы должны переосмыслить нашу политику, чтобы она соответствовала требованиям XXI века."
 IND_undertable_deals: "Тайные сделки"
 IND_undertable_deals_desc: "Мы можем тайно заключать сделки с политиками, государствами и организациями для получения небольшого дополнительного дохода, но это происходит ценой коррупции в нашем государстве..."
 IND_bribe_media: "Подкуп СМИ"
 IND_bribe_media_desc: "Нашей партии крайне необходима поддержка, и если мы немного пожертвуем средствам массовой информации, возможно, мы сможем её получить."
 IND_save_corrupt_official: "Прикрыть коррупционеров"
 IND_save_corrupt_official_desc: "The KPK is a nuisance to a lot of our officials. We need to swiftly cover up their acts and prevent them from being prosecuted."
 IND_shun_corruption: "Остерегаться коррупции"
 IND_shun_corruption_desc: "Мы должны решительно бороться с коррупцией в нашей стране! Если мы хотим стать успешным государством, мы должны в первую очередь привлечь к ответственности тех, кто хочет набить свои карманы честно заработанными деньгами нашего народа."
 IND_kpk: "Фонд для комиссии по искоренению коррупции"
 IND_kpk_desc: "The KPK, also known as the Corruption Eradication Commission has been doing a great job in fighting state corruption. However, with a little bit of funds it can help them in speeding up the process."
 IND_trial_corrupt_official: "Привлечь к ответственности коррупционеров"
 IND_trial_corrupt_official_desc: "Working hand in hand with the KPK, we have been able to find some corrupt officials and we are preparing trials for them."
 IND_more_jobs: "Создать больше рабочих мест"
 IND_more_jobs_desc: "Нашим людям нужны деньги, чтобы прокормить свои семьи. А поскольку в штате не хватает рабочих мест, наша задача — создать новые условия, чтобы люди могли зарабатывать себе на жизнь. Мы можем построить новые заводы, чтобы поднять нашу экономику и вывести наших людей из нищеты."
 IND_rural_fortification: "Укрепление сельской местности"
 IND_rural_fortification_desc: "Нашему сельскому населению крайне необходима защита от местных повстанцев. Пока мы пытаемся справиться с повстанцами, мы могли бы создать временные укрепления для защиты нашего населения."
 IND_fund_industries: "Фонд национальной промышленности"
 IND_fund_industries_desc: "Индонезия является домом для многих отраслей, и с помощью наших друзей с Севера мы можем повысить свои возможности. Однако мы не можем позволить нашим отечественным отраслям отстать от зарубежных."
 IND_education_question: "Проконсультируйтесь с министерством образования"
 IND_education_question_desc: "Нам необходимо пересмотреть нашу образовательную политику, чтобы она отвечала потребностям растущей молодежи. Мы можем либо сделать образование ориентированным на ислам, либо секуляризировать школы. Некоторые в нашей партии даже призывают к сочетанию обоих подходов, чтобы угодить всем сторонам."
 IND_religious_system: "Религиозная система"
 IND_religious_system_desc: "Школы уже некоторое время работают под руководством министерства по делам религии, и будет ужасной идеей освободить их от этой задачи сейчас"
 IND_quran_class: "Продолжить занятия по Корану"
 IND_quran_class_desc: "Наша страна — исламская, и наш народ не должен об этом забывать! Мы должны распространять учение Корана среди нашей молодежи и сделать его обязательным предметом."
 IND_no_religious_system: "Светская система"
 IND_no_religious_system_desc: "Мы должны освободить Министерство по делам религий от управления нашими школами. Для модернизации мы должны создать собственное министерство, чтобы лучше обучать наших учеников современным идеалам."
 IND_no_quran_class: "Отменить занятия по Корану"
 IND_no_quran_class_desc: "Уроки Корана — это бремя для наших учеников. Несмотря на то, что в нашей школе проживает большинство мусульман, мы должны исключить религию из школьной программы, чтобы сосредоточиться на важных предметах."
 IND_mandatory_education: "Обязательное образование"
 IND_mandatory_education_desc: "Мы должны обязать всю нашу молодежь посещать школу. Если наше население будет неграмотным, мы застрянем в каменном веке."
 IND_satisfied_nation: "Удовлетворенная нация?"
 IND_satisfied_nation_desc: "Надеемся, что наша усердная работа не останется незамеченной нашими людьми. Несмотря на то, что многие проблемы всё ещё сохраняются, мы не должны забывать о наших достижениях."
 IND_fix_rupiah: "Исправить рупию!"
 IND_fix_rupiah_desc: "Наша валюта, рупия, уже некоторое время находится в состоянии неопределенности, и с падением ее стоимости снижается и наша стабильность."
 IND_cooperate_local_gov: "Сотрудничать с местными органами власти"
 IND_cooperate_local_gov_desc: "Индонезия — многонациональная страна с множеством разных народов и различными местными органами власти. Мы должны сотрудничать с этими местными органами власти, чтобы более эффективно собирать налоги для государства."
 IND_lower_interest_rates: "Более низкие процентные ставки"
 IND_lower_interest_rates_desc: "Наши процентные ставки стремительно растут до ужасающих уровней, и мы должны начать снижать их, чтобы наши граждане были довольны."
 IND_farmers_in_industry: "Переселение фермеров в промышленный сектор"
 IND_farmers_in_industry_desc: "У нас достаточно фермеров в сельском секторе, мы должны переселить часть этих людей с их ферм на заводы, чтобы помочь нашей экономике!"
 IND_begin_projects_desc: "Чтобы помочь циркулировать рупии, нам следует рассмотреть возможность финансирования новых проектов, чтобы наши люди могли тратить время и деньги."
 IND_fight_rising_prices: "Борьба с ростом цен"
 IND_fight_rising_prices_desc: "Наша партия быстро теряет популярность из-за недостаточной борьбы из-за роста цен. Пришло время исправить это!"
 IND_keep_high_prices: "Поддерживать высокие цены"
 IND_keep_high_prices_desc: "Может быть, мы сможем извлечь выгоду из этих высоких цен... Какая нация действительно заботится о своем народе, в конце концов?"
 IND_proficient_supply: "Профессиональное управление поставками"
 IND_proficient_supply_desc: "Нам следует начать пересматривать управление цепочками поставок, чтобы поддерживать здоровье экономики. В противном случае сохраняется угроза экономического коллапса."
 IND_connect_docks: "Соединить цепочки поставок"
 IND_connect_docks_desc: "Объединение цепочки поставок поможет нам гораздо эффективнее управлять нашими поставками. А также позволит нам укрепить связи с международными рынками."
 IND_a_resilient_currency: "Устойчивая экономика!"
 IND_a_resilient_currency_desc: "С кровью, потом и слезами наша великая валюта рупия побеждает!"
 IND_maluku_back_muslims: "Поддержите мусульман!"
 IND_maluku_back_muslims_desc: "Индонезия — мусульманское государство. Поэтому мы не можем предать наше мусульманское население и должны оказать ему полную поддержку."
 IND_back_muslims_arm_ulama: "Вооружить уламу"
 IND_back_muslims_arm_ulama_desc: "Давайте вооружим улемов! Улемам нужна наша помощь в мобилизации мусульман в случае священного конфликта."
 IND_back_muslims_medical_fee: "Снижение медицинских сборов"
 IND_back_muslims_medical_fee_desc: "Чтобы помочь любому мусульманину, раненному в религиозном конфликте, мы должны сократить расходы в наших больницах, чтобы вернуть их к нормальной жизни."
 IND_back_muslims_workers: "Использовать работников-мусульман"
 IND_back_muslims_workers_desc: "Мы не должны забывать о мусульманских рабочих и их труде. Поэтому мы обязаны использовать их потенциал и направлять в стратегические сектора для стимулирования национального роста."
 IND_back_muslims_factories: "Фонды безопасности для исламской промышленности"
 IND_back_muslims_factories_desc: "Если какое-либо предприятие, принадлежащее исламским владельцам, столкнется с экономическими трудностями, мы инвестируем средства в строительство новых, аварийных заводов, чтобы помочь в трудные времена."
 IND_back_muslims_send_guns: "Отправьте им винтовки"
 IND_back_muslims_send_guns_desc: "Вооружение мусульманского населения может помочь обеспечить безопасность наших городов и защитить наши мечети от любых нападений на почве ненависти."
 IND_back_muslims_infantry: "Создать пехоту, состоящую только из мусульман"
 IND_back_muslims_infantry_desc: "Для предотвращения любых внутренних конфликтов в нашей армии нам необходимо создать пехоту, состоящую исключительно из мусульман."
 IND_call_saudis: "Связаться с Саудитами"
 IND_call_saudis_desc: "Нам следует связаться с саудовцами и узнать, готовы ли они поддержать наших мусульман своими средствами. Они уже финансируют наши мечети, поэтому мы не видим причин, почему они не должны помочь."
 IND_ambon_for_muslims: "Амбон - для мусульман"
 IND_ambon_for_muslims_desc: "Амбон является очагом межконфессиональных конфликтов. Однако, благодаря нашим усилиям, говорят, что конфликт в городе Амбон завершился решительной победой мусульман."
 IND_maluku_just_fix_it: "Никого не поддерживать"
 IND_maluku_just_fix_it_desc: "В этих конфликтах нельзя проявлять предвзятость. Давайте найдем беспристрастное решение."
 IND_maluku_call_army: "Призыв в армию"
 IND_maluku_call_army_desc: "Наши вооруженные силы бездействуют, ничего не делая для урегулирования межконфессиональных конфликтов. Пришло время задействовать их для деэскалации конфликтов."
 IND_maluku_militarize_villages: "Милитаризация деревень"
 IND_maluku_militarize_villages_desc: "Некоторые небольшие деревни оказались в эпицентре этих межконфессиональных конфликтов и не имеют защиты от мародеров. Нам необходимо быстро укрепить и милитаризировать эти деревни, чтобы обеспечить их безопасность."
 IND_maluku_increase_policing: "Усиление охраны правопорядка"
 IND_maluku_increase_policing_desc: "Несомненно, нам необходимо усилить полицейские силы для борьбы с растущим числом конфликтов. Это позволит восстановить столь необходимый порядок."
 IND_maluku_civilian_shelter: "Фабрики для рабочих"
 IND_maluku_civilian_shelter_desc: "Мы должны построить заводы для наших пострадавших рабочих, поскольку многие из их предприятий были сожжены из-за их религиозных убеждений."
 IND_maluku_military_shelter: "Заводы для вооруженных сил"
 IND_maluku_military_shelter_desc: "В связи с растущим вооруженным присутствием в городах из-за межконфессиональных конфликтов нам необходимо построить новые военные заводы."
 IND_maluku_mobilize_priests: "Мобилизация священников"
 IND_maluku_mobilize_priests_desc: "Сплочение священников поможет пробудить гнев нашего христианского населения. Это поможет им в случае многих межконфессиональных конфликтов."
 IND_maluku_mechanize_them: "Механизированные христиане"
 IND_maluku_mechanize_them_desc: "Благодаря усилиям священников мы можем задействовать механизированные христианские подразделения для защиты церквей."
 IND_maluku_christian_volunteers: "Использовать христианских добровольцев"
 IND_maluku_christian_volunteers_desc: "Многие христиане жертвуют своим временем, участвуя в волонтерских проектах на благо страны. Мы с радостью принимаем такие инициативы."
 IND_maluku_christian_businesses: "Фонды безопасности для христианских предприятий"
 IND_maluku_christian_businesses_desc: "В случае банкротства какой-либо христианской организации мы можем оказать ей финансовую помощь для восстановления."
 IND_maluku_train_medics: "Обучение медиков"
 IND_maluku_train_medics_desc: "Нам необходимо подготовить больше медиков для оказания помощи раненым и людям, оказавшимся в эпицентре межконфессионального конфликта."
 IND_maluku_give_trucks: "Отправьте им грузовики!"
 IND_maluku_give_trucks_desc: "Предоставив христианам больше грузовиков, они смогут эффективно и без проблем доставлять грузы из одного места в другое."
 IND_maluku_contact_dutch: "Связаться с голландцами"
 IND_maluku_contact_dutch_desc: "Поскольку многие наши христиане ведут свою родословную от голландцев, можно с уверенностью сказать, что если мы попросим голландцев о помощи этим людям, они с радостью примут... Верно?"
 IND_maluku_ambon_for_christians: "Амбон - город для христиан!"
 IND_maluku_ambon_for_christians_desc: "Говорят, что город Амбон пал под натиском христиан. Благодаря нашим усилиям христиане начали устанавливать свою власть над городом, который находится в эпицентре религиозных конфликтов."
 IND_transfer_to_army: "Эскалация ситуации"
 IND_transfer_to_army_desc: "По всей видимости, наше решение не привело к разрешению конфликта, поэтому необходимо дополнительное военное вмешательство, и полный контроль над операцией передается ВМС Индонезии."
 IND_maluku_equip_police: "Милитаризация полиции"
 IND_maluku_equip_police_desc: "Милитаризация нашей полиции позволит разгрузить армию от борьбы с межконфессиональными конфликтами и, наконец, перебросить её на борьбу с другими повстанческими движениями."
 IND_maluku_crush_gangs: "Раздавить банды"
 IND_maluku_crush_gangs_desc: "Разгромив оставшиеся банды в наших городах, мы наконец-то сможем перевести дух. Их грабежи, убийства и разрушения приносят нашей стране только нестабильность!"
 IND_maluku_all_quiet_for_now: "Пока все спокойно"
 IND_maluku_all_quiet_for_now_desc: "Похоже, благодаря нашим более решительным действиям мир во многих городах восстановлен. Надеюсь, это продлится долго."
 IND_komnas_ham_desc: "Проведение конференции KOMNAS-HAM позволило нам предоставить более эффективную платформу для правозащитников и удовлетворения социальных потребностей нашего народа."
 IND_indonesian_armed_forces: "Вооруженные силы Индонезии"
 IND_indonesian_armed_forces_desc: "Вооруженные силы Индонезии — одна из крупнейших военных держав Азии. От сухопутных войск до пилотов — мужчины и женщины страны готовы защищать нацию от любых угроз."
 IND_tni_ad: "TNI-AD"
 IND_tni_ad_desc: "Вооруженные силы Индонезии (TNI-AD) являются нашей основной ветвью сухопутных войск и остаются таковыми уже более 60 лет. Сегодня перед нами стоит задача внедрения новых методов подготовки этих мужчин и женщин в XXI веке."
 IND_chinese_model_inf: "Китайская модель пехоты"
 IND_chinese_model_inf_desc: "Совершенно очевидно, что Китай станет мировой державой, поэтому мы не должны отставать от него. Если мы сможем заручиться их помощью в области вооружений и тактики, мы, возможно, сможем встать на один уровень с ними."
 IND_homegrown_inf: "Отечественная пехота"
 IND_homegrown_inf_desc: "Если мы хотим быть независимым, суверенным государством, то прежде всего мы должны использовать свою тактику. Если наши солдаты воюют так же, как и китайцы, чем же мы можем отличаться?"
 IND_jungle_expertise: "Опыт работы в джунглях"
 IND_jungle_expertise_desc: "Безусловно, мы должны обучать наших солдат воевать во влажных и плодородных условиях Юго-Восточной Азии. В противном случае мы можем отстать от наших соседей."
 IND_strong_howitzers: "Мощные гаубицы"
 IND_strong_howitzers_desc: "Важно поддерживать наши гаубицы в отличном состоянии, чтобы они соответствовали вооружению противника. Мы должны немедленно приступить к модернизации наших старых орудий."
 IND_most_advanced_tanks: "Величайшие танки"
 IND_most_advanced_tanks_desc: "Несомненно, наши танки устаревают. Поэтому мы поручили инженерам проводить эксперименты и исследования для создания крупнейшего танкового флота в Юго-Восточной Азии."
 IND_tank_factories: "Заводы по производству танков"
 IND_tank_factories_desc: "Несомненно, очень необходимо строить новые заводы для нашего растущего числа танков. Если мы отстаем в производстве, то какая польза от нашей танковой технологии?"
 IND_best_ifvs: "Лучшие БМП"
 IND_best_ifvs_desc: "Наши БМП заслуживают такого же отношения, как и наши танки, ведь БМП играют очень важную роль на поле боя. Для укрепления нашей военной мощи в наших интересах получить в своё распоряжение новейшие и лучшие технологии БМП для безопасной транспортировки наших солдат."
 IND_the_toughest_apcs: "Самые прочные БТРы"
 IND_the_toughest_apcs_desc: "Наши бронетранспортеры довольно устарели и примитивны. Мы должны это изменить. И для этого мы создаем команду, которая разработает новые конструкции, способные выдержать даже самое мощное вооружение."
 IND_tni_al: "TNI-AL"
 IND_tni_al_desc: "Наш военно-морской флот — гордость военной мощи нашей страны. Будучи островным государством, окруженным морями, нам крайне важно создать сильный флот, чтобы сдерживать тех, кто желает нам зла."
 IND_fortified_seas: "Укрепленные берега"
 IND_fortified_seas_desc: "Мы должны укрепить наши берега, чтобы предотвратить высадку десанта или повреждение наших кораблей противником. Мы должны стараться сохранять оборонительную позицию в наших сражениях."
 IND_new_corvettes: "Новые дизайны корветов"
 IND_new_corvettes_desc: "Наш автопарк «Корветов» сильно устарел, и им действительно не помешало бы обновление. Нам следует начать разработку новых проектов."
 IND_submarines: "Новые подводные лодки"
 IND_submarines_desc: "Подводные лодки всё чаще используются в военных действиях. Хотя у нас есть несколько подводных лодок, они не идут ни в какое сравнение с тем, что есть в остальном мире. Мы должны это изменить."
 IND_industrialized_sea: "Индустриализация верфей"
 IND_industrialized_sea_desc: "Мы должны нарастить военно-морское флотилию, чтобы дать отпор врагу. Если мы будем действовать в оборонительном режиме, это может привести к ранениям наших солдат."
 IND_cruisers: "Разработка крейсера"
 IND_cruisers_desc: "Нам нужны крейсеры получше! Хотя они и являются самыми большими кораблями во флоте, они играют ключевую роль в победах в морских сражениях."
 IND_air_carrier_designs: "Новые авианосцы"
 IND_air_carrier_designs_desc: "В наше время войны ведутся при поддержке с воздуха. Если у наших моряков нет поддержки с воздуха, как мы можем ожидать, что они выйдут победителями? Мы должны начать проектирование и строительство индонезийского авианосца!"
 IND_maritime_empire: "Морская империя"
 IND_maritime_empire_desc: "Наша страна должна одержать победу на морях. Как показывает история, военно-морской флот страны зачастую определяет её безопасность и целостность."
 IND_tni_au: "TNI-AU"
 IND_tni_au_desc: "Военно-воздушные силы Индонезии (TNI-AU) — это основной род войск наших военно-воздушных сил, и нам необходимо пересмотреть наши дальнейшие планы."
 IND_refine_airbases: "Перепроектирование авиабаз"
 IND_refine_airbases_desc: "Нам следует всерьез задуматься о перепроектировании наших авиабаз в соответствии с потребностями наших новых самолетов и пилотов. Если мы не повысим их качество, мы можем потерпеть неудачу в небе."
 IND_air_drills: "Проведение внутренних воздушных учений"
 IND_air_drills_desc: "Чтобы отточить навыки наших пилотов, мы должны сначала убедиться, что они готовы к бою. Мы назначим наших офицеров, чтобы они проверили готовность наших пилотов."
 IND_expand_air_craft_designs: "Улучшенные конструкции самолетов"
 IND_expand_air_craft_designs_desc: "Чтобы не отстать от остального мира в авиации, лучше всего начать финансировать исследования в области разработки новых конструкций самолетов."
 IND_purchase_rafale_jets: "Рафаль Джетс"
 IND_purchase_rafale_jets_desc: "Наши западные друзья предложили нам свои новейшие и лучшие многоцелевые реактивные самолеты, но это имеет свою цену. Нам следует это обдумать, поскольку это позволит нам сблизиться с ними и получить в своё распоряжение западные самолеты."
 IND_nato_drilling: "Учения с НАТО"
 IND_nato_drilling_desc: "Для укрепления нашей дружбы с Западом лучше всего проводить с ними совместные воздушные учения. Это позволит нам быть готовыми в случае скоординированного нападения."
 IND_funds_for_iae: "Финансирование индонезийской аэрокосмической компании"
 IND_funds_for_iae_desc: "Финансирование IAE позволит сделать наши самолеты более совершенными и эффективными в воздушном пространстве. Это позволит нам обеспечить господство индонезийской авиации в Юго-Восточной Азии."
 IND_political_agenda: "Политическая повестка дня"
 IND_political_agenda_desc: "Давайте сосредоточимся на нашей политике, ведь скоро выборы, как может Индонезия быть процветающей демократией без повестки дня... Или нет..?"
 IND_naw_rural_folk: "Сельские жители"
 IND_naw_rural_folk_desc: "Давайте сосредоточимся на сельских жителях. Они — основа нашей страны, и помощь им должна быть нашей первостепенной задачей."
 IND_naw_reps_village: "Представительство для сельских жителей"
 IND_naw_reps_village_desc: "Жители наших деревень кричат, но их никто не слышит. Пришло время дать им право голоса в наших делах."
 IND_naw_health_fac: "Фокус на учреждения здравоохранения"
 IND_naw_health_fac_desc: "Нам следует работать над расширением доступа к медицинской помощи для сельского населения. Если их бросить умирать, то мы потерпим неудачу в нашей миссии по оказанию им помощи."
 IND_naw_better_edu: "Расширить образование"
 IND_naw_better_edu_desc: "Дети в деревнях слишком долго оставались без внимания. Пришло время расширить образование, чтобы у каждого была возможность учиться."
 IND_naw_aid_village: "Фокус на инфраструктуру села"
 IND_naw_aid_village_desc: "Дома наших сестер разваливаются, и мы не можем сидеть сложа руки и наблюдать за этим. Мы отправили строителей возвести новые здания для наших людей."
 IND_naw_dev_lacking_regions: "Индустриализация сельской местности"
 IND_naw_dev_lacking_regions_desc: "Давайте предложим работу обездоленным жителям деревень, хотя для этого потребуется некоторая подготовка, но мы должны построить новые заводы, чтобы они могли там работать."
 IND_naw_agri_dev: "Развитие сельского хозяйства"
 IND_naw_agri_dev_desc: "Наряду со строительством новых домов, нам также следует создавать более совершенные сельскохозяйственные угодья, чтобы они могли производить продукты питания для наших рынков."
 IND_naw_fishermen: "Финансирование для рыбаков"
 IND_naw_fishermen_desc: "Финансирование наших рыбаков — это отличный способ поднять их моральный дух, а также прекрасный способ прокормить наше население."
 IND_naw_women: "Женщины в стратегических секторах"
 IND_naw_women_desc: "Использование потенциала женщин для работы в стратегически важных секторах может быть действительно полезным не только для социального прогресса, но и для научного прогресса."
 IND_naw_aid_farmer: "Сосредоточьтесь на фермерах"
 IND_naw_aid_farmer_desc: "Давайте сосредоточимся на отдельном человеке, на фермере. Если мы обратим внимание на этих людей, то, возможно, сможем убедить их производить товары по более низким ценам."
 IND_naw_aid_laborer: "Помочь работягам"
 IND_naw_aid_laborer_desc: "Помощь простым людям, таким как рабочие, станет ключевым фактором индустриализации сельского хозяйства."
 IND_naw_safety_reg: "Принять правила техники безопасности"
 IND_naw_safety_reg_desc: "Соблюдение правил техники безопасности имеет ключевое значение для обеспечения безопасности наших работников. Это также будет способствовать социальному развитию нашей страны и успокоит наших трудящихся."
 IND_way_forward_naw: "Путь в будущее"
 IND_way_forward_naw_desc: "Совершенно очевидно, что будущее находится в руках Партии национального пробуждения. С момента прихода к власти мы принесли этой стране только величие и демократию."
 IND_prosper_justice: "Победа процветающей справедливости"
 IND_prosper_justice_desc: "Совершенно очевидно, чего хочет народ Индонезии. Партия, которая заботится о нации и ни о чем, кроме нации, — чего может достичь только Партия процветающей справедливости."
 IND_reform_system: "Системные реформы"
 IND_reform_system_desc: "Давайте реформируем эту разлагающуюся систему и возродим любовь к государству у нашего народа!"
 IND_improve_network: "Улучшенние сети"
 IND_improve_network_desc: "Как наши люди будут общаться, если наша интернет-инфраструктура устарела? Давайте начнем строить новую."
 IND_efficient_tax: "Эффективный сбор налогов"
 IND_efficient_tax_desc: "Для функционирования государства необходимо платить налоги. Эффективный процесс сбора налогов жизненно важен для благополучия государства."
 IND_const_practices: "Лучшие методы строительства"
 IND_const_practices_desc: "В результате несчастных случаев, которые можно было предотвратить, погибают мужчины. Хотя это и замедлит работу, это к лучшему."
 IND_upgrade_facilities: "Лучшие инструменты"
 IND_upgrade_facilities_desc: "Нам следует инвестировать в новые инструменты, чтобы наши сотрудники могли работать с комфортом."
 IND_address_issues: "Решение наших проблем"
 IND_address_issues_desc: "Нам следует сосредоточиться на наших внутренних проблемах."
 IND_edu_to_disenfranchised: "Образование для лишенных гражданских прав"
 IND_edu_to_disenfranchised_desc: "Создание школ для наших детей в неблагополучных районах нашего штата может действительно способствовать социальному прогрессу."
 IND_continue_pol_fund: "Продолжить финансирование полиции"
 IND_continue_pol_fund_desc: "Давайте не будем держать бандитов и преступников на наших улицах. Если мы будем финансировать полицию, мы сможем обеспечить нашим людям спокойный ночной сон."
 IND_continue_cor_fight: "Продолжить борьбу с коррупцией"
 IND_continue_cor_fight_desc: "Борясь с коррупцией, мы можем гарантировать, что наша репутация чиста, и что наши люди нам доверяют."
 IND_more_offices: "Дополнительные офисы"
 IND_more_offices_desc: "Строительство новых офисных зданий — это отличный и эффективный способ создания новых рабочих мест, а также способ регулирования экономического потока."
 IND_road_improvements: "Улучшить наши дороги"
 IND_road_improvements_desc: "Если мы сможем отремонтировать наши дороги, то жители заброшенных городов наконец-то смогут сравняться по уровню жизни с жителями наших крупных городов."
 IND_help_arm_industry: "Помощь оружейной промышленности"
 IND_help_arm_industry_desc: "Помощь оружейной промышленности в конечном итоге принесет нам реальную пользу, обеспечив рабочие места нуждающимся, укрепив нашу экономику и вооруженные силы."
 IND_new_society: "Новое общество"
 IND_new_society_desc: "Благодаря нашей упорной работе, замечательные успехи Партии процветающей справедливости стали известны индонезийцам по всей стране."
 IND_united_development: "Объединенная партия развития"
 IND_united_development_desc: "Also known as the Kabaa Party, the UDP is a moderate Islamist party focused on bringing light to the issues in daily Indonesian life."
 IND_und_national_dev: "Национальный план развития"
 IND_und_national_dev_desc: "Давайте объявим о принятии Национального плана развития. Он поднимет дух нашего народа и повысит популярность наших партий."
 IND_und_clean_water: "Чистая вода"
 IND_und_clean_water_desc: "Фильтруя воду и строя новые системы, мы можем гарантировать, что люди смогут пить воду без вреда для здоровья. Это также откроет земли для будущих проектов."
 IND_und_bridge_port: "Улучшенная транспортная инфраструктура"
 IND_und_bridge_port_desc: "Улучшение инфраструктуры для наших водителей грузовиков поможет беспрепятственно доставлять товары по всей стране."
 IND_und_agri_invest: "Инвестиции в сельское хозяйство"
 IND_und_agri_invest_desc: "Инвестиции в сельское хозяйство имеют решающее значение для эффективного обеспечения продовольствием нашего населения."
 IND_und_more_science: "Больше ученых"
 IND_und_more_science_desc: "Нашей стране нужны ученые для прогресса, и мы должны финансировать подготовку и образование этих ученых."
 IND_und_prot_muslims: "Защита для мусульман"
 IND_und_prot_muslims_desc: "Строя временные убежища для наших мусульман, мы можем обеспечить целостность религии нашей страны, а также безопасность мусульман. Это крайне важно, поскольку мусульмане в нашей стране находятся под угрозой нападений в городах, где проживают представители разных религий."
 IND_und_islam_schools: "Финансировать исламские школы"
 IND_und_islam_schools_desc: "Финансирование исламских школ — это бысткий способ обеспечить культурное и религиозное образование нашего народа. Это также может помочь нам завоевать расположение духовенства."
 IND_und_islam_banking: "Исламское банковское дело"
 IND_und_islam_banking_desc: "Исламские банковские практики, несомненно, являются правильным способом ведения банковского дела. Мы не должны навязывать нашим людям высокие проценты, и хотя это позволит им оставаться довольными, это может несколько опустошить наши кошельки."
 IND_und_better_social_welfare: "Уход за пожилыми людьми"
 IND_und_better_social_welfare_desc: "Мы не должны предавать наших старших, ведь именно на их труде мы и продолжаем дело. Предоставляя им более широкий доступ к здравоохранению, мы можем отдать должное их усердной работе и одновременно сохранить их благополучие."
 IND_und_help_food: "Финансирование исследований в области производства продуктов питания"
 IND_und_help_food_desc: "Финансируя новые методы производства продуктов питания, мы сможем накормить миллионы голодающих в Индонезии, а также и себя самих."
 IND_und_housing_act: "Закон о жилье"
 IND_und_housing_act_desc: "Обеспечение того, чтобы никто не остался без крыши над головой, имеет решающее значение в политике нашей партии. Мы должны построить дешевое жилье для людей на Северных Молуккских островах."
 IND_und_better_hospitals: "Лучшее больничное оборудование"
 IND_und_better_hospitals_desc: "Приобретение более совершенного и современного медицинского оборудования для наших врачей может помочь спасти жизни многих людей."
 IND_und_help_unemployment: "Помощь безработным"
 IND_und_help_unemployment_desc: "Для экономического роста Индонезии крайне важно обеспечить занятость значительной части населения, поэтому необходимо строить новые здания, чтобы эти люди могли найти работу."
 IND_und_united_indonesia: "Единая Индонезия"
 IND_und_united_indonesia_desc: "Объединившись верой и нашей нацией, мы наконец можем успокоиться, увидев, как реализуется наша политика в стране."
 IND_party_of_struggle: "Демократическая партия"
 IND_party_of_struggle_desc: "Левая партия, Партия борьбы, выступает за множество радикальных перемен, но сможет ли она их осуществить, остается только гадать."
 IND_strug_brace_for_change: "Приготовьтесь к переменам"
 IND_strug_brace_for_change_desc: "Надеюсь, наши люди готовы к масштабным реформам, которые предложит наша партия."
 IND_strug_expand_infrastructure: "Расширить инфраструктуру"
 IND_strug_expand_infrastructure_desc: "Расширение инфраструктуры — это безопасный способ обеспечить высокое качество жизни наших людей и оправдать их ожидания."
 IND_strug_acquire_bp: "Приобретите строительные чертежи."
 IND_strug_acquire_bp_desc: "Получив новые чертежи для строительства, мы сможем строить без заминок на нашем пути!"
 IND_strug_new_airports: "Новые аэропорты"
 IND_strug_new_airports_desc: "Строительство новых аэропортов позволит нам обеспечить стабильный поток туристов в страну. Это также поможет нашим гражданам путешествовать как внутри страны, так и за рубежом."
 IND_strug_better_road: "Милитаризованное воздушное пространство"
 IND_strug_better_road_desc: "Милитаризация нашего воздушного пространства — хорошая альтернатива строительству новых гражданских аэропортов, поскольку она поможет нам защитить воздушное пространство страны в трудные времена."
 IND_strug_fight_corruption: "Борьба с коррупцией"
 IND_strug_fight_corruption_desc: "Несомненно, коррупция играет огромную роль в индонезийской политике. Поэтому мы должны приложить все усилия для ее искоренения."
 IND_strug_establish_investigations: "Призыв к расследованиям"
 IND_strug_establish_investigations_desc: "Проведение расследований в отношении коррумпированных чиновников может легко повысить популярность нашей партии и привлечь к ответственности конкурирующие партии, заставив их отстать."
 IND_strug_purge_sus_members: "Избавиться от подозрительных членов"
 IND_strug_purge_sus_members_desc: "Было бы очень лицемерно с нашей стороны обвинять другие партии в коррупции, не проведя расследования своей собственной, поэтому нам необходимо принять меры по очистке наших собственных коррумпированных чиновников."
 IND_strug_economic_growth: "Экономический рост"
 IND_strug_economic_growth_desc: "Вливая денежные средства в рынок, мы потенциально можем добиться экономического подъема."
 IND_strug_agri_funding: "Финансирование сельского хозяйства"
 IND_strug_agri_funding_desc: "Сельское хозяйство играет огромную роль в Индонезии, поэтому, чтобы наши фермеры были довольны, мы должны финансировать их проекты."
 IND_strug_seaports: "Новые морские порты"
 IND_strug_seaports_desc: "Строительство новых морских портов окажет нам существенную помощь в торговле с внешним миром и позволит значительно ускорить производство кораблей."
 IND_strug_eastasian_unity: "Восточноазиатское единство"
 IND_strug_eastasian_unity_desc: "В условиях, когда большая часть мира разваливается и погружается в хаос, важно, чтобы мы держали врагов близко, а друзей — ещё ближе. Для процветания нам следует сотрудничать с другими странами Восточной Азии."
 IND_strug_host_regional_events: "Проводить региональные мероприятия"
 IND_strug_host_regional_events_desc: "Индонезия в прошлом была центром региональных мероприятий, и это привлекло в страну множество новых лиц. Нам следует продолжать эту практику и предлагать свои услуги для проведения большего количества мероприятий."
 IND_strug_just_indonesia: "Справедливая Индонезия"
 IND_strug_just_indonesia_desc: "Благодаря всей нашей упорной работе мы наконец-то можем назвать это так, как есть: новая и справедливая Индонезия."
 IND_democrat_party: "Партия борьбы"
 IND_democrat_party_desc: "Демократическая партия является одной из самых популярных прозападных партий в Индонезии и выступает за более либеральное государство."
 IND_dem_greater_future: "Великое будущее"
 IND_dem_greater_future_desc: "Мы должны подготовить нацию к реформам и переменам, ибо завтрашний день должен быть лучше сегодняшнего, и Индонезия будет процветать!"
 IND_dem_enviro_prot_plan: "План по охране окружающей среды"
 IND_dem_enviro_prot_plan_desc: "Усиливая меры по защите окружающей среды, мы можем гарантировать, что наши леса, джунгли и пляжи будут защищены от вандализма."
 IND_dem_resource_regulation: "Регулирование ресурсов"
 IND_dem_resource_regulation_desc: "Давайте упорядочим добычу ресурсов таким образом, чтобы в процессе ничего не было потеряно."
 IND_dem_protected_areas: "Создать охраняемые территории"
 IND_dem_protected_areas_desc: "Создание охраняемых территорий позволит защитить культурные достопримечательности нашей страны и сохранить нашу историю."
 IND_dem_for_the_oceans: "Партия борьбы за океаны"
 IND_dem_for_the_oceans_desc: "Нас окружают моря, поэтому мы должны бережно к ним относиться. Строя новые безопасные сооружения, мы можем обеспечить пользу как для океанов, так и для нас самих."
 IND_dem_decentralization: "Децентрализация"
 IND_dem_decentralization_desc: "Децентрализация нашей страны может помочь нашим гражданам больше доверять нам, а также сократить расходы там, где это возможно."
 IND_dem_regional_econ: "Помощь региональным экономикам"
 IND_dem_regional_econ_desc: "Финансирование рабочих мест в региональной экономике могло бы серьезно способствовать укреплению нашей поддержки, а также позволить нам и дальше пожинать плоды увеличения численности рабочей силы."
 IND_dem_prot_local_cultures: "Защищать местные культуры"
 IND_dem_prot_local_cultures_desc: "Защита меньшинств и их культур имеет ключевое значение для сохранения цивилизованности Индонезии. Многие люди совершают акты ненависти друг к другу, и это недопустимо при нынешней администрации."
 IND_dem_small_business_support: "Бороться с землевладельцами"
 IND_dem_small_business_support_desc: "Борьба с землевладельцами, которые захватывают всю землю, может помочь нам распределить землю среди людей и способствовать росту нации."
 IND_dem_promote_credit: "Помощь пожилым людям"
 IND_dem_promote_credit_desc: "Помощь пожилым людям — это один из верных способов показать людям благие намерения нашей партии."
 IND_dem_technical_support: "Помощь техническому прогрессу"
 IND_dem_technical_support_desc: "Большинство жителей нашей страны до сих пор не имеют доступа к интернету, что приводит к отставанию. Мы должны это изменить и построить новую интернет-инфраструктуру."
 IND_dem_emergence_indonesia: "Возникновение Индонезии"
 IND_dem_emergence_indonesia_desc: "Руководствуясь нашей новой политикой и целями, мы показали миру, что Индонезия выйдет из ослабленного состояния, несмотря ни на что."
 IND_dem_civil_activity: "Продвигать гражданскую активность"
 IND_dem_civil_activity_desc: "Содействие гражданской активности — это безопасный способ дать возможность нашим людям узнать друг друга, а также принести пользу государству."
 IND_k.e.m.i.u: "K.E.M.I.U"
 IND_k.e.m.i.u_desc: "На K.E.M.I.U, или наш отдел иностранных дел, возложена ответственность за защиту наших национальных интересов за рубежом и выстраивание отношений с остальным миром."
 IND_contact_west: "Отношения с Западом"
 IND_contact_west_desc: "Важно поддерживать тесные связи с Западом. Каждый день мы видим новые технологические и научные прорывы в их странах. Кроме того, мы можем извлечь экономическую выгоду из их компаний."
 IND_american_coop: "Индонезийско-американское сотрудничество"
 IND_american_coop_desc: "Сотрудничество с американцами может способствовать росту нашей экономики, поскольку США являются ведущей экономикой в ​​мире."
 IND_american_armor: "Американская броня"
 IND_american_armor_desc: "Закупка бронетехники американских образцов может быть полезна для наших вооруженных сил, особенно для сухопутных войск, в частности, для TNI-AD."
 IND_west: "За западную дипломатию"
 IND_east: "За восточную дипломатию"
 IND_american_companies: "Сотрудничать с N.A.S.A."
 IND_american_companies_desc: "Сотрудничество с НАСА значительно ускорит отправку наших людей в космос и ускорит космические исследования."
 IND_contact_netherlands: "Встреча с голландцами"
 IND_contact_netherlands_desc: "Наши старые колонизаторы теперь стали нашими новыми друзьями. Поддержание контактов с голландцами может стать отличным способом для Индонезии выйти на европейский рынок торговли."
 IND_spajik_frigate: "Купить фрегаты Spejik"
 IND_spajik_frigate_desc: "Покупка новых фрегатов может быть выгодной, особенно у голландцев. Они готовы отдать нам один по довольно выгодной цене."
 IND_sigma_corvette: "Приобрести корветы Сигма"
 IND_sigma_corvette_desc: "Корветы «Сигма» Нидерландов, по всей видимости, представляют собой грозную боевую силу на морях. Если нам удастся заключить сделку на приобретение одного из них, это действительно принесет пользу нашему флоту."
 IND_ease_asean_trade: "Облегчить им участие в торговле АСЕАН"
 IND_ease_asean_trade_desc: "Постепенное вовлечение Нидерландов в торговлю с АСЕАН может принести пользу нам и нашим соседям. Это также серьезно улучшит отношения Восточной Азии с европейцами."
 IND_fund_dutch_churches: "Финансировать голландские церкви"
 IND_fund_dutch_churches_desc: "Финансирование голландских церквей может быть несколько рискованным. Однако, чтобы угодить нашим друзьям в Нидерландах, нам следует рассмотреть возможность финансирования некоторых их церквей, поскольку некоторые христиане здесь считают себя потомками голландцев."
 IND_contact_europe: "Переговоры с ЕС"
 IND_contact_europe_desc: "Проведение переговоров с Европейским союзом может помочь нам установить более тесные связи со значительной частью Западной и Восточной Европы."
 IND_boost_econ_relations: "Усилить экономические отношения"
 IND_boost_econ_relations_desc: "Укрепление экономических связей поможет нам наладить более тесные экономические отношения с ЕС. Это также улучшит повседневную жизнь наших граждан, поскольку теперь у них будет больше доступа к западным товарам."
 IND_national_development_plan: "Национальный план развития"
 IND_national_development_plan_desc: "Давайте заключим несколько соглашений с ЕС для улучшения нашей национальной инфраструктуры."
 IND_talks_east: "Смотреть на Восток"
 IND_talks_east_desc: "Давайте посмотрим на Восток и поговорим с нашими восточными друзьями. Запад только навредил Индонезии и поверг ее народ в отчаяние."
 IND_sino_cooperation: "Китайско-индонезийское сотрудничество"
 IND_sino_cooperation_desc: "Китайцы пока не причинили нам вреда. Давайте наладим с ними отношения, чтобы этого не произошло."
 IND_sino_science_coop: "Китайское научное сотрудничество"
 IND_sino_science_coop_desc: "Сотрудничество с Китаем в области науки позволит нашей стране двигаться вперед."
 IND_principle_bandung: "10 принципов Бандунга"
 IND_principle_bandung_desc: "Ключевым моментом в азиатском единстве является договоренность не вмешиваться во внутреннюю политику друг друга. После конференции китайская сторона заключила пакт о ненападении и невмешательстве и пообещала не вмешиваться во внутренние дела друг друга."
 IND_japanese_friendship: "Дружба с Японией"
 IND_japanese_friendship_desc: "Несмотря на то, что нас колонизировали японцы, было бы нелепо не налаживать с ними отношения. Проведение переговоров может принести пользу как нам, так и им."
 IND_port_exports: "Больше портов для экспорта"
 IND_port_exports_desc: "Строительство новых портов может ускорить поток товаров в Японию и из Японии, а также в остальной мир."
 IND_jap_tech_giants: "Японские технологические гиганты"
 IND_jap_tech_giants_desc: "Японские технологические гиганты могут многому нас научить. Нам следует рассмотреть возможность сотрудничества с ними и с нашими отечественными технологическими компаниями."
 IND_men_for_ports: "Рабочая сила для портов"
 IND_men_for_ports_desc: "Эти порты сами себя не укомплектованы! Нам следует обратиться к японским специалистам для заполнения вакансий в наших портах, поскольку нам нужны квалифицированные рабочие."
 IND_jap_const_methods: "Японские методы строительства"
 IND_jap_const_methods_desc: "Перенять японские методы строительства должно стать целью для нашей страны. Если мы действительно сможем построить инфраструктуру по их образцу, мы очень скоро их превзойдем."
 IND_russia_coop: "Российско-индонезийское сотрудничество"
 IND_russia_coop_desc: "Сотрудничество с русскими - это явный способ показать Западу, что нам надоели их выходки. Мы также можем обеспечить стратегическое партнерство с русскими..."
 IND_sukhoi_jets: "Приобрести самолеты Сухого"
 IND_sukhoi_jets_desc: "Приобретение новейших и лучших российских истребителей может принести пользу нашим военно-воздушным силам, ВВС Индонезии. Нам следует запланировать заключение с ними сделок на поставку нескольких самолетов."
 IND_russian_tourist: "Побаловать русских туристов"
 IND_russian_tourist_desc: "Забота о российских туристах прославит нашу страну в их глазах. Нам следует это учитывать, поскольку значительная часть нашего туризма приходится на Россию."
 IND_talk_with_neighbors: "Переговоры с нашими соседями"
 IND_talk_with_neighbors_desc: "Проведение переговоров с нашими соседями действительно может донести наше послание до Юго-Восточной Азии."
 IND_australia: "Беседа с Австралией"
 IND_australia_desc: "Нам нужно поднять некоторые действительно важные вопросы с австралийцами. В частности, Восточный Тимор и их участие."
 IND_apologize_australia: "Извиниться перед Австралией"
 IND_apologize_australia_desc: "Нам следует извиниться перед австралийцами и семьями погибших добровольцев. Возможно, мы были немного слишком грубы в вопросе поддержания контроля."
 IND_high_prices: "Высокие цены!"
 IND_meet_minister_australia: "Встретиться с министром"
 IND_meet_minister_australia_desc: "Недавно мы встретились с премьер-министром Австралии, и, к счастью, все проблемы, которые у нас были, были сглажены. Будем надеяться на улучшение отношений!"
 IND_confront_australia: "Противостоять австралийцам"
 IND_confront_australia_desc: "Нам необходимо противостоять им из-за их причастности к событиям в Восточном Тиморе. Они причинили вред и горе индонезийской нации."
 IND_malaysia: "Разговор с Малайзией"
 IND_malaysia_desc: "Малайзия и Индонезия - два близких соседа, однако недавние проблемы разделяют нас..."
 IND_demand_riau: "Требовать, чтобы они освободили Риау"
 IND_demand_riau_desc: "Риау - это законная индонезийская территория, и мы не очень хорошо относимся к тому, что малайзийцы претендуют на нее. Мы должны попросить их отступить прямо сейчас!"
 IND_cede_riau: "Седе Риау"
 IND_cede_riau_desc: "Передача Риау решит многие наши проблемы. Нет смысла воевать из-за маленького острова."
 IND_strategic_partnership: "Стратегическое партнерство"
 IND_strategic_partnership_desc: "Теперь мы можем стать стратегическими партнерами с малазийцами. После отказа от сотрудничества с Риау, они действительно прониклись к нам симпатией."
 IND_combat_it: "Бороться с радикализмом"
 IND_combat_it_desc: "Борьба с радикализмом — лучший вариант. Сражаясь с ним, мы посылаем мощный сигнал тем, кто его исповедует. Это также поможет укрепить нашу собственную власть и позволит нам оказывать влияние на различные аспекты жизни нашего народа."
 IND_bolster_party_pop: "Повышение популярности партии"
 IND_bolster_party_pop_desc: "Повышение популярности нашей партии - это беспроигрышный вариант, люди начинают любить нашу нацию, и мы можем получить немного больше поддержки на следующих выборах!"
 IND_derad_campaign: "Кампании по де-радикализации"
 IND_derad_campaign_desc: "Ещё не поздно исправить тех, кто подвергся радикализации. Мы можем проводить спонсируемые правительством кампании по всей Индонезии, чтобы помочь людям избавиться от радикальных взглядов."
 IND_investigate_growth: "Исследовать причину роста радикалов"
 IND_investigate_growth_desc: "Выделение части нашего бюджета на улучшение работы полиции может дать нам некоторые подсказки относительно того, почему численность радикалов растет с каждым днем."
 IND_start_media_campaign: "Начать медиа-кампанию"
 IND_start_media_campaign_desc: "Завоевание позиций в средствах массовой информации может стать хорошим способом изменить точку зрения некоторых радикалов."
 IND_control_net: "Бороться с радикалистским контентом в сети"
 IND_control_net_desc: "Борьба с радикалами в интернете — один из многих способов изгнать их и их идеи из постоянно цифровизирующейся индонезийской страны."
 IND_filter_net: "Фильтровать сеть"
 IND_filter_net_desc: "Полная фильтрация интернета может вызвать недовольство наших граждан, но она позволит нам гораздо легче контролировать поступающий и удаляемый контент, чем просто просматривая пару страниц."
 IND_bolster_nationalism: "Разжечь индонезийский национализм"
 IND_bolster_nationalism_desc: "Давайте сделаем так, чтобы наш народ гордился нашей страной, и немного отвлечём его от религии."
 IND_rallies_schools: "Проводить собрания в школах"
 IND_rallies_schools_desc: "Проведение собраний может научить молодежь опасностям радикализации."
 IND_arrest_members: "Арестовать лидеров радикалов"
 IND_arrest_members_desc: "Проведение экскурсий по нашим тюрьмам для известных радикальных лидеров покажет их последователям, что их ждет."
 IND_curb_fpi: "Обуздать FPI"
 IND_curb_fpi_desc: "Исламский фронт защитников (FPI) — опасная радикальная организация, обладающая наибольшим влиянием в распространении экстремистских идеологий. Ограничение их влияния и власти имеет решающее значение в борьбе с радикализмом в нашей стране."
 IND_persecute: "Преследовать FPI"
 IND_persecute_desc: "Преследование FPI избавит нашу нацию от экстремистских убеждений, и эти люди будут судимы в соответствии с нашей системой правосудия!"
 IND_embrace_it: "Смягчить нашу позицию"
 IND_embrace_it_desc: "Смягчение нашей позиции может заставить этих радикалов изменить свое отношение к нам, однако мы рискуем создать ситуацию, которую в будущем можем потерять над собой…"
 IND_tell_police_backdown: "Расформировать подразделения безопасности в радикальных районах"
 IND_tell_police_backdown_desc: "Расформирование этих подразделений безопасности покажет радикалам, что мы не представляем угрозы, и, будем надеяться, завоюет их расположение."
 IND_fund_their_media: "Разрешить FPI в СМИ"
 IND_fund_their_media_desc: "Разрешение FPI на СМИ покажет плоды индонезийской демократии. Каждый имеет право голоса в этой стране, и мы не будем дискриминировать по идеологиям!"
 IND_beyond_our_control: "Подождите... Почему они бунтуют!?"
 IND_beyond_our_control_desc: "Эти неблагодарные радикалы! Похоже, они бунтуют и громят наши улицы, требуя свержения правительства. Как такое могло случиться? Кто мог ожидать подобного?"
 IND_fpi: "FPI захватывает власть"
 IND_fpi_desc: "Тёмный день в истории нашей нации... Великолепный день в истории нашей нации, этот день действительно таков, и, надеюсь, с силой, данной нам нашими последователями, мы очистим эту нацию, кирпич за кирпичом!"
 IND_touch_on_economy: "Прикосновение к экономике"
 IND_touch_on_economy_desc: "Наша страна переживает трудные времена, и если мы оживим некоторые аспекты нашей экономики, то, возможно, сможем избежать краха."
 IND_fund_for_holy: "Фетва о фабриках"
 IND_fund_for_holy_desc: "Строятся новые заводы для рабочих. Это будет способствовать увеличению объемов товаров и их перемещению внутри страны."
 IND_oppose_invest: "Против инвестиций"
 IND_oppose_invest_desc: "Противодействие иностранным инвестициям - один из способов сохранить ресурсы нашей страны и сохранить независимость нашего государства!"
 IND_convert_tourist_destination: "Оживить туристические направления"
 IND_convert_tourist_destination_desc: "Кому интересен один-два пляжа? Или старое скальное образование? Или какой-то глупый храм неверных, построенный 500 лет назад? Нам нужно все пространство, которое мы можем получить, чтобы построить мощь нашей нации!"
 IND_sharia_2: "Шариат!"
 IND_sharia: "Шариат!"
 IND_sharia_desc: "С законами шариата мы, наконец, сможем начать очищение нашей нации и ее общества. Хотя поначалу мы будем испытывать сопротивление, наш народ полюбит его..."
 IND_dress_code: "Обеспечить соблюдение дресс-кода"
 IND_dress_code_desc: "Введение дресс-кода — верный способ очищения индонезийского общества. Если мы этого не сделаем, наши люди станут неверными и нарушат нашу повестку дня!"
 IND_gender_seg: "Разделение по половому признаку"
 IND_gender_seg_desc: "Разделение полов и распределение их по соответствующим ролям позволит нам добиться гораздо большего, чем если бы мы позволили им делать все, что они захотят."
 IND_raid_bar: "Рейд-бары"
 IND_raid_bar_desc: "Несмотря на принятые новые законы, некоторые неверные все еще содержат подпольные бары. Мы должны немедленно закрыть такие заведения!"
 IND_regional_purification: "Региональное очищение"
 IND_regional_purification_desc: "Как мы можем очистить наш народ, если наши соседи неверные и нечистые? Пришло время взять дело в свои руки!"
 IND_purify_singapore: "Очистить Сингапур"
 IND_purify_singapore_desc: "Сингапур - такая же исламская страна, как и мы, однако их нелепая политика позорит религию и чистоту региона!"
 IND_purify_asia: "Очистить Южную Азию"
 IND_purify_asia_desc: "Очищение Южной Азии позволит нам закрепиться на всем континенте. Если нам это удастся, мы сможем продолжить нашу политику очищения."
 IND_holy_indonesia: "Очищенная Индонезия"
 IND_holy_indonesia_desc: "Мы преуспели в очищении нашей нации, Индонезии. Благодаря этому мы можем идти вперед в 21 век с исламским пылом в нашем народе!"
 IND_help_aceh: "Помощь Ачеху"
 IND_help_aceh_desc: "Сейчас тяжелые времена, Ачех пострадал от стихийного бедствия, и наши люди, живущие там, находятся в серьезной опасности. Мы должны скоординировать усилия, чтобы помочь им настолько, насколько это возможно."
 IND_send_aid_package: "Координировать помощь при стихийных бедствиях"
 IND_send_aid_package_desc: "Нам необходимо скоординировать оказание помощи пострадавшим от стихийного бедствия жителям Ачеха, чтобы они могли встать на ноги."
 IND_bring_resistance_down_one: "Союз с местными лидерами"
 IND_bring_resistance_down_one_desc: "Объединение усилий с местными лидерами может помочь нам завоевать их доверие и начать первый этап восстановления наших отношений."
 IND_bring_resistance_down_two: "Предоставить финансовую помощь региональным лидерам"
 IND_bring_resistance_down_two_desc: "Выделение средств региональным лидерам может побудить их начать финансирование восстановления поврежденных зданий."
 IND_bring_resistance_down_three: "Арестовать тех, кто создает проблемы"
 IND_bring_resistance_down_three_desc: "Некоторые в Ачехе не хотят мира, несмотря на ужасную катастрофу, которая произошла. Мы должны разобраться с ними, чтобы мы могли уйти от этого бессмысленного конфликта."
 IND_bring_resistance_down_four: "Предоставить незначительную автономию"
 IND_bring_resistance_down_four_desc: "Мы должны уступить их требованию и предоставить им немного автономии. Если мы это сделаем, они согласятся сложить оружие и вернуться в Индонезию без сопротивления"
 indonesia.8.t: "Индонезия требует репараций для Тимора-Лешти!"
 indonesia.8.d: "Индонезия требует от нас выплаты репараций за наши усилия по достижению независимости Восточного Тимора. Они требуют возмутительную сумму денег, которая будет взята из кармана Австралии. Мы можем это отрицать, однако ситуация может выйти из-под нашего контроля."
 indonesia.8.a: "Скажите им, чтобы пришли и забрали"
 indonesia.8.b: "Хорошо, если это означает, что они спустятся"
 indonesia.800.t: "Они согласны!"
 indonesia.800.d: "Австралийцы предложили выплатить репарации за их участие в Тиморе-Лешти, хотя этого никогда не будет достаточно, поскольку из-за них мы потеряли свою территорию..."
 indonesia.800.a: "Идеально!"
 indonesia.80.t: "Они отказались!"
 indonesia.80.d: "После того, как мы обратились к австралийцам с очень любезной и щедрой просьбой, они ее отклонили. Похоже, они не хотят сотрудничать с нами, и, насколько нам известно, они не испытывают угрызений совести за причиненные нашей нации страдания!"
 indonesia.80.a: "Хорошо, тогда мы получим наши репарации другим способом!"
 indonesia.7.t: "Индонезия требует, чтобы мы отступили от Риау!"
 indonesia.7.d: "Послы из Индонезии требуют, чтобы мы отказались от притязаний на Риау. Это предмет жарких споров между нашими двумя странами, и, похоже, ситуация наконец-то достигла точки кипения. Мы должны подготовить ответ как можно скорее"
 indonesia.7.a: "Нет, Риау - НАШ!"
 indonesia.7.b: "Пусть забирают, нам все равно не нужен этот маленький грустный остров"
 indonesia.70.t: "Малайзия отказывается отделяться от Риау!"
 indonesia.70.d: "Малайзийские дипломаты недавно предупредили нас о своем отклонении нашего предложения. Это нарушение суверенитета Индонезии и должно быть встречено соответствующим ответом!"
 indonesia.70.a: "Они просили об этом..."
 indonesia.700.t: "Они отделяются от Риау!"
 indonesia.700.d: "Похоже, наше послание было громким и ясным: Риау - наш! Малазийские дипломаты недавно сообщили нам, что государство отказалось от всех своих претензий на остров Риау. Теперь Индонезия может сделать глубокий вздох облегчения"
 indonesia.700.a: "Хорошо"
 indonesia.5865.t: "Надвигаются катастрофы!"
 indonesia.5865.d: "В Индонезии будет много-много катастроф. Чтобы обеспечить стабильность Индонезии, обязательно проверьте вкладку \"Решения\" и выполните задания в разделе \"Страшная удача Индонезии\". Вашим первым заданием будет строительство верфи на Калимантане, чтобы предотвратить промышленную катастрофу, удачи!"
 indonesia.5865.a: "Окей"
 indonesia.923.t: "Будущее Индонезии"
 indonesia.923.d: "Наша нация находится в состоянии беспорядка уже очень долго, начиная с тех времён, когда мы впервые получили независимость от Нидерландов. От финансовых проблем до социальных и этнических — Индонезия была затронута со всех сторон, и она не может продержаться намного дольше. Необходимы решительные меры для обеспечения выживания и процветания Индонезии в 21 веке. Поэтому мы должны начать с решения проблем, которые касаются нас прямо сейчас."
 indonesia.923.a: "Вперед, мы идем!"
 indonesia.69.t: "Насилие в Калимантане!"
 indonesia.69.d: "Цепь насилия выросла, когда двое мадуресе подверглись нападению со стороны нескольких даяков в Сампи после события, связанного с миграцией. Теперь этот конфликт перерос в полномасштабный кризис, число погибших растет с каждым днем, и многие вынуждены покинуть свои дома. Силы безопасности в настоящее время находятся в состоянии готовности к выполнению приказов"
 indonesia.69.a: "Они сами справятся!"
 indonesia.69.b: "Чего вы ждете? Исправьте это!"
 indonesia.5.t: "Индонезия запрашивает финансирование."
 indonesia.5.d: "Индонезия переживает очень острый религиозный конфликт, и они обращаются к нам за финансовой помощью"
 indonesia.5.a: "Конечно, если это во благо"
 indonesia.5.b: "Пфф... Нет"
 indonesia.50.t: "Голландцы согласны помочь нам!"
 indonesia.50.d: "После тщательного рассмотрения голландские дипломаты пришли к решению выделить нам немного денег, которые мы можем дать нашим христианам для победы в конфликтах"
 indonesia.50.a: "Идеально"
 indonesia.500.t: "Голландцы отказываются от помощи!"
 indonesia.500.d: "Голландские дипломаты пришли к нам, чтобы сообщить, что их правительство отказало нашим христианам в помощи!"
 indonesia.500.a: "Невероятно"
 indonesia.6.t: "Индонезия запрашивает финансирование."
 indonesia.6.d: "У себя дома Индонезия переживает очень острый религиозный конфликт, и они обращаются к нам за финансовой помощью"
 indonesia.6.a: "Конечно, если это во благо"
 indonesia.6.b: "Пфф... Нет"
 indonesia.60.t: "Саудовская Аравия согласилась нам помочь!"
 indonesia.60.d: "После тщательного рассмотрения саудовские дипломаты согласились выделить нам немного денег, которые мы можем дать нашим мусульманам для победы в конфликтах"
 indonesia.60.a: "Идеально"
 indonesia.600.t: "Саудовская Аравия отказывается от помощи!"
 indonesia.600.d: "Саудовские дипломаты прибыли к нам, чтобы сообщить, что их правительство отказало нашим мусульманам в помощи!"
 indonesia.600.a: "Невероятно"
 indonesia.772.t: "Радикальный лидер Ризиек Шихаб арестован!"
 indonesia.772.d: "Радикальный лидер организации \"FPI\" Ризиег Шихаб был арестован и теперь ожидает судебного разбирательства. Это значительная победа для безопасности Индонезии, так как наша демократия больше не находится под прямой угрозой со стороны радикалов и их отсталых идеалов!"
 indonesia.772.a: "Победа демократии."
 indonesia.2.t: "Вопрос о Восточном Тиморе"
 indonesia.2.d: "Настал горький момент для нашей страны. Народ Восточного Тимора, одного из наших многочисленных островов, требует независимости. Жестокие протесты, беспорядки и столкновения вызвали большую нестабильность и серьезно замедлили политический и социальный прогресс. Теперь нам предстоит решить судьбу страны: либо мы подчинимся воле ООН, либо пойдем своим путем."
 indonesia.2.a: "Этого хочет народ Восточного Тимора... не мы"
 indonesia.2.b: "Они хотят, что теперь делать?!"
 indonesia.3.t: "ООН одобряет Конституцию!"
 indonesia.3.d: "После того, как мы одобрили независимость Восточного Тимора, Организация Объединенных Наций утвердила конституцию этого государства. Вскоре демократический, независимый Восточный Тимор станет нашим соседом."
 indonesia.3.a: "Это то, чего они хотели"
 indonesia.4.t: "Тимор-Лешти свободен!"
 indonesia.4.d: "Это официально. Одобрение ООН их конституции наконец вступило в силу, и независимый Восточный Тимор теперь является нашим соседом."
 indonesia.4.a: "Давайте надеяться на хорошие отношения"
 indonesia.9.t: "Индонезия отрицает независимость Восточного Тимора!"
 indonesia.9.d: "Индонезийский режим отказал народу Восточного Тимора в свободе и независимости. Многие повстанческие группы смотрят на нас как на потенциальных освободителей, и в настоящее время в регионе и мире нагнетается напряженность..."
 indonesia.9.a: "Хорошо, достаточно!"
 indonesia.9.b: "Не наша проблема"
 indonesia.55.t: "Будущее наших студентов!"
 indonesia.55.d: "Настало время обсудить будущее образования наших детей. Сколько себя помним, министерство по делам религий руководило школьной системой и навязывало нашим ученикам умеренное количество исламских учений. Мы должны пересмотреть, действительно ли такой подход эффективен или нет..."
 indonesia.55.a: "Продолжать религиозные учения!"
 indonesia.55.b: "Прекратить религиозные учения!"
 indonesia.77.t: "Растущая этническая напряженность!"
 indonesia.77.d: "Пришло время урегулировать этнические конфликты, бушующие в нашей стране. Во многих местах, таких как Амбон и Борнео, насилие происходит почти ежедневно. Нация не может жить дальше, если ее люди воюют друг с другом из-за религиозных убеждений. Сейчас мы должны сделать шаг вперед и выбрать, кого мы хотим поддержать, если это вообще возможно"
 indonesia.77.a: "Мы нужны мусульманам!"
 indonesia.77.b: "Мы не выбираем фаворитов, просто исправьте это уже!"
 indonesia.77.c: "Мы нужны христианам!"
 indonesia.1000.t: "Парламент штурмовали"
 indonesia.1000.d: "Месяцы беспорядков и столкновений наконец привели нас к этому моменту... Наши сторонники и последователи успешно штурмовали индонезийский парламент и потребовали отставки нескольких ключевых фигур, и все подчинились. Индонезийский народ теперь свободен от вечной тирании, которой была эта так называемая демократия."
 indonesia.1000.a: "Революция удалась"
 indonesia.1001.t: "Город Амбон под контролем христиан!"
 indonesia.1001.d: "Многолетние бои в Амбоне наконец-то закончились, и его жители могут вздохнуть с облегчением. Христиане в городе одержали победу, и мы начали назначать христианских лидеров в местные города и деревни."
 indonesia.1001.a: "Это был лишь вопрос времени..."
 indonesia.1002.t: "Город Амбон под контролем мусульман!!!"
 indonesia.1002.d: "Многолетние бои в Амбоне наконец-то закончились, и его жители могут вздохнуть с облегчением. Мусульмане города одержали победу, и мы начали назначать мусульманских лидеров в местные города и деревни."
 indonesia.1002.a: "Как и ожидалось"
 indonesia.27.t: "Импичмент Вахида!"
 indonesia.27.d: "По итогам пленарного заседания партия MPR приняла решение объявить импичмент президенту Вахиду на основании его некомпетентности из-за безрассудной политики и действий в условиях финансового кризиса. Теперь же они назначили вице-президента Мегавати Сукарнопутри президентом Индонезии!"
 indonesia.27.a: "Он это заслужил!"
 indonesia.37.t: "Нападение на Бали!"
 indonesia.37.d: "В ночном клубе на Бали прогремело несколько взрывов, в результате которых погибли 202 человека, включая наших граждан и иностранцев. 88 австралийцев погибли, и теперь австралийские власти и другие страны оказывают на нас давление, требуя принять меры по этому делу. Обвинения возлагаются на экстремистскую группировку «Джемаа Исламия», которая, как известно, является источником подобных нападений. Мы должны немедленно принять решение по этому вопросу, прежде чем ситуация ухудшится."
 indonesia.37.a: "Начать расследование и выплатить компенсацию семьям"
 indonesia.37.b: "Как печально"
 indonesia.477.t: "Рейд"
 indonesia.477.d: "Разъяренная толпа ворвалась в оружейный склад района Вамена, и это может привести к катастрофе. Наши силы безопасности начали эвакуацию гражданских лиц, которые могут быть в опасности, и выводят их в безопасное место, однако мотивы этой толпы пока неизвестны"
 indonesia.477.a: "Поторопитесь и сделайте что-нибудь!"
 indonesia.477.b: "Надеюсь, все уладится само собой"
 indonesia.577.t: "Цунами в Ачехе"
 indonesia.577.d: "Разрушительное цунами обрушилось на Банда-Ачех и другие районы провинции. Ачех был центром партизанской войны и сопротивления, что приводило к отсутствию сотрудничества между нами и ними в случае стихийных бедствий. Однако на этот раз ситуация совершенно иная. Они больше не могут позволить себе справиться с событием такого масштаба в одиночку, и им нужна наша помощь для восстановления. GAM предложила прекращение огня и готова сотрудничать для прекращения нашего конфликта."
 indonesia.577.d1: "Разрушительное цунами обрушилось на Банда-Ачех и другие районы провинции. И без того пострадавший от многолетней партизанской войны и сопротивления регион теперь опустошен еще сильнее, чем прежде. Крайне важно начать работу по восстановлению этого района, иначе мы рискуем столкнуться с новым восстанием."
 indonesia.577.a: "Ещё одна катастрофа..."
 indonesia.67.t: "Проблемы беженцев в Западном Папуа"
 indonesia.67.d: "Австралийцы снова вмешиваются в наши внутренние дела, только на этот раз они предлагают убежище тем, кто создает проблемы в Западном Папуа. Напряженность между Джакартой и Канберрой достигла точки кипения, и мы готовы принять меры, если потребуется!"
 indonesia.67.a: "Финансировать станции наблюдения, чтобы предотвратить подобное в будущем!"
 indonesia.67.b: "Возможно, средства можно направить... в другое место..."
 indonesia.678.t: "Создан Национальный комитет Западной Папуа."
 indonesia.678.d: "Национальный комитет Западной Папуа, также известный как KNPB, — это группа, базирующаяся в Западной Папуа и выступающая за проведение референдума о статусе региона. Хотя их заявления носят мирный характер, если их цели будут достигнуты, это обернется катастрофой для нашей страны."
 indonesia.678.a: "Распустить комитет"
 indonesia.678.b: "Небольшая задержка в строительстве не является большой проблемой"
 indonesia_news.1.d: "Тест"
 indonesia_news.1.a: "Тест"
 indonesia.95.t: "Восточный Тимор провозглашает независимость!"
 indonesia.95.d: "После нашего решения относительно сохранения нашей законной территории, Восточный Тимор решил провозгласить свою независимость. Однако самое шокирующее то, что австралийцы тайно переправили им оружие, и теперь они восстают против нас!"
 indonesia.95.a: "Мы отомстим в свое время!"
 indonesia.420.t: "Призыв о помощи!"
 indonesia.420.d: "Чтобы справиться с продолжающимся азиатским финансовым кризисом в нашей стране, мы должны искать помощи у иностранных организаций. Япония - наш ближайший партнер, который готов помочь. Однако в прошлом Япония причинила вред нашей стране, и многие националистические и антизападные группы требуют другой альтернативы, и эта альтернатива - Китай. Китай также готов помочь нашей стране, однако это приведет к тому, что мы окажемся в сфере их прямого влияния и, возможно, изменим нашу политику"
 indonesia.420.a: "Что нам нужно, так это японская помощь!"
 indonesia.420.b: "Китайцы знают, что делают, звоните им!"
 IND_finished_disaster: "Предотвращение катастрофы на ранней стадии"
 IND_finished_disaster_desc: "Вы предотвратили последнюю катастрофу раньше времени! Отличная работа."
 IND_ethnic_tension: "Подавление этнических проблем"
 IND_ethnic_tension_desc: "Индонезия — государство с разнообразным этническим, культурным и религиозным составом населения. Это часто приводит к конфликтам между нашими народами. Это вызывает нестабильность, и мы должны немедленно найти решение!"
 IND_aceh_in_turmoil: "Ачех в беспорядке!"
 IND_aceh_in_turmoil_desc: "Ачех находится в состоянии беспорядков и мятежа с 1976 года, и это вызывает нестабильность в нашей нации и ненужное кровопролитие. Наши военные слишком сосредоточены на борьбе с этими повстанцами, и это приводит к отставанию в военном плане\n§W--------------§!\nЭта национальная идея будет §RRemoved§! если мы §Hceasefire with Aceh in 2004§!."
 IND_rupiah_crisis: "Кризис рупии"
 IND_rupiah_crisis_desc: "Наша национальная валюта, рупия, находится в крайне слабом состоянии. Это результат десятилетий коррупции и бесхозяйственности, и настало время это исправить и вернуть нашу экономику на мировую арену."
 IND_popular_tourist_destination: "Популярное туристическое направление"
 IND_popular_tourist_destination_desc: "Индонезия — очень популярное туристическое направление. Это результат нашей богатой культуры и истории."
 IND_growing_radicalization: "Растущая радикализация"
 IND_growing_radicalization_desc: "Будучи исламской страной, наша молодежь и население подвержены радикализации и радикальным идеалам."
 IND_asian_crisis: "Азиатский финансовый кризис в Индонезии"
 IND_asian_crisis_desc: "Азиатский финансовый кризис 1997 года сильно ударил по Индонезии и ее соседям, вызвав замедление практически во всех сферах жизни страны."
 IND_fighting_crisis: "Борьба с кризисом"
 IND_fighting_crisis_desc: "Азиатский финансовый кризис 1997 года сильно ударил по Индонезии и ее соседям, вызвав замедление почти во всех сферах жизни страны, однако в последнее время ситуация начала улучшаться."
