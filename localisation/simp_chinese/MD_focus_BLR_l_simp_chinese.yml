 BLR_batka_very_weak: "老爹的支持非常弱"
 BLR_batka_very_weak_desc: "我想说的是一件你应该记住的事情：总统不是被缔造的，总统已经诞生。当然，我之后肯定会有一位总统。但是不要以为他们都将诞生——§Y亚历山大·卢卡申科§!\n§W--------------§!\n这个国家精神是§R动态的§!，取决于§Y卢卡申科§!在人民中的支持程度。"
