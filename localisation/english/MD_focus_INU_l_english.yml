 inuit_nunangat_focus: "Inuit Focus Tree"

 #############
 ## NUCLEAR ##
 #############

 INU_Learning_from_Crested_Ice: "Learning from Crested Ice"
 INU_Learning_from_Crested_Ice_desc: "In the 1950s and 60s, the United States operated a series of B-52 Stratofortresses armed with nuclear weapons over the high Arctic in an operation known as Chrome Dome. In 1968, a Stratofortress made a crash landing while attempting to land at Thule Air Base, contaminating the environment, and was covered up by authorities. We must now look back and analyze the ethics behind the situation, before playing with nuclear fire."

 INU_Buy_Spare_Parts: "Buying Spare Parts"
 INU_Buy_Spare_Parts_desc: "To further develop our nuclear refurbishing program, we must try to obtain parts and machinery in order to recreate or restore the weapons we plan on using."

 INU_Project_S: "Project Sanna"
 INU_Project_S_desc: "Sanna or Sedna is the name of the Inuit goddess of the sea and master of marine life. As a tribute to her role as an important source of sustenance, we shall name our ballistic submarine program in her honour."

 INU_Project_Ice_Shield: "Project Ice Shield"
 INU_Project_Ice_Shield_desc: "It's now time to put our work to the test. Let us show the world what we are capable of when a nation can properly handle a nuclear weapon and use it as a tool for diplomacy, not as a means of threatening others. We shall use it for protecting the interests of the indigenous peoples of the Arctic."

 ###########
 ## SPACE ##
 ###########

 INU_Project_N: "Project Nuutuittuq"
 INU_Project_N_desc: "Nuutuittuq is the name of the North Pole star, Polaris. As a tribute to such, we shall name our ballistic missile program after it since it will allow us to get ever closer to reaching the stars."

 INU_Qaanaaq_Space_base: "Qaanaaq Space Base"
 INU_Looking_to_the_Stars: "Looking to the Stars"
 INU_Atmospheric_Monitoring: "Atmospheric Monitoring"
 INU_Lidar_Climate_Research: "LIDAR Climate Research"
 INU_Recover_B52_Thermonuclear_Arm: "Recover B-52 Thermonuclear Armament"
