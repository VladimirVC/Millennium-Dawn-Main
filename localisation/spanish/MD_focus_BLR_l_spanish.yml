 uniate_church: "Iglesia Uniate"
 uniate_church_desc: "The Uniate Church is a union of Orthodox and Catholic traditions, accepting the primacy of Rome while preserving Eastern Orthodox rites. An early union was concluded at the Council of Florence in 1439 but soon dissolved. From the late 15th century, Polish feudal lords revived the idea, as much of the population of Poland and Lithuania remained Orthodox, and a church union offered a means of gradually drawing Ukrainians and Belarusians toward Catholicism. Some Orthodox clergy and nobles supported the union in the 16th century, seeking to gain rights equal to those of Catholics. In 1595, Bishops Hypatius Potei of Vladimir-Volyn and Kirill Terletsky of Lutsk appealed to the pope for union. At the Council of Brest in 1596, six bishops proclaimed the Union of Brest despite protest from most of the clergy and populace. The king endorsed the union and declared the Orthodox Church outlawed, transferring its property to the Uniate Church. In the 17th century, the Order of Basilians was established to advance the union alongside the Jesuits. Over time, the Uniate Church moved increasingly close to Catholic ceremony; vestments, temple design, and liturgical practice all shifted, and Orthodox holidays were abolished. These changes were codified at the Synod of Zamosc in 1720. In Transcarpathia, the union was proclaimed at the Uzhhorod Cathedral in 1649 and fully established by the late 18th century. Resistance to the union on behalf of religious and national freedoms in Ukraine and Belarus during the 16th and 17th centuries was largely led by Orthodox brotherhoods."
