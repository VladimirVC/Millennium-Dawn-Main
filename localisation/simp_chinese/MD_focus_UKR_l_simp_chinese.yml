 UKR_delta_desc: "乌克兰战场决策和态势感知信息支持系统允许通过验证的现役军人使用该系统。登录是通过互联网在一个专门的网站上通过授权和双重认证进行的。\n\n授权用户可以查看和输入已知的敌方阵地、发现的敌机、地面设备等数据。"
 UKR_oplit: "国家船舶研究设计中心"
 UKR_oplit_desc: "T-84是乌克兰主战坦克，以1976年推出的苏联T-80主战坦克为基础，具体来说是柴油发动机版本：T-80UD。T-84于1994年首次制造，并于1999年在乌克兰武装部队服役。\n\n其高性能对置活塞发动机使其成为一款快速坦克，与其他现代主战坦克相当，功率重量比约为每吨26马力。"
 UKR_sapsan: "雷霆-2"
 UKR_sapsan_desc: "乌克兰短程弹道导弹系统由南方设计局和南方机械制造厂开发，旨在将战术导弹系统和多管火箭发射器的特点结合起来。\n\n最初为乌克兰自己使用的游隼导弹版本射程为500公里。后来为出口而开发的雷霆-2版本射程限制为280公里，以符合导弹技术控制制度规定的300公里限制，该制度旨在限制导弹和导弹技术的扩散。"
 UKR_zelya_helsi: "赫尔西"
 UKR_zelya_dia: "迪亚"
 UKR_our_ukraine_helsi: "赫尔西"
 UKR_our_ukraine_helsi_desc: "赫尔西 - 乌克兰医疗机构的医疗信息系统和患者的医疗门户"
 UKR_our_ukraine_dia: "迪亚"
 UKR_our_ukraine_dia_desc: "乌克兰数字转型部开发的乌克兰公共服务电子服务。这是一个网站和移动应用程序，提供数字文档、数字签名和验证功能，以及提供公共服务的门户网站"
 UKR_tsnap: "TSNAP"
 UKR_tsnap_desc: "这些机构是不同群体可以在舒适的环境中接受各种行政服务的机构。它们由地方议会和地方政府创建，为个人和法人提供服务。"
 UKR_monobank: "单一银行"
 UKR_monobank_desc: "单一银行是一家乌克兰直销银行。与乌克兰现有的所有新银行一样，它使用母银行全能银行的银行牌照运营，全能银行是TAS集团的一部分，由乌克兰商人谢尔盖·蒂希普科所有。"
 UKR_tsnap_idea: "TSNAP"
 UKR_bronetank: "哈尔科夫装甲车辆制造厂"
 UKR_bronetank_desc: "从事装甲车辆生产、维修、保养、改装和现代化改造的装甲工业国有企业。"
 UKR_avia_zavod: "哈尔科夫航空工厂"
 UKR_avia_zavod_desc: "哈尔科夫市的航空工程企业。它生产客运、运输和军用飞机。"
 UKR_priborostroy: "哈尔科夫仪器制造厂"
 UKR_priborostroy_desc: "苏联最大的军用电子和家用电器生产工厂之一。"
 UKR_tractor: "哈尔科夫拖拉机制造厂"
 UKR_tractor_desc: "生产履带式和轮式拖拉机的企业。"
 UKR_agregat: "哈尔科夫综合设计局"
 UKR_agregat_desc: "军工复合体科研生产企业，研发和制造航空和火箭技术液压、燃油和电气系统单元。"
 UKR_morozova: "哈尔科夫工程设计局"
 UKR_morozova_desc: "一家开发装甲车的企业。此前，哈尔科夫工程设计局在苏联装甲履带车的研制中发挥了关键作用。"
 UKR_specmachine: "哈尔科夫特种机械厂"
 UKR_specmachine_desc: "军工复合体的国有企业。"
 UKR_malichev: "马雷舍夫工厂"
 UKR_malichev_desc: "哈尔科夫运输工程工厂，生产发动机、机车和坦克。"
 UKR_reborn_ser_and_molot: "复兴“锤子和镰刀”工厂"
 UKR_reborn_ser_and_molot_desc: "哈尔科夫大型农业机械企业，是哈尔科夫工业最重要的企业之一，也是俄罗斯帝国和苏联最大的农业机械企业之一。"
 UKR_concers: "哈尔科夫防务部门"
 UKR_concers_desc: "我们将把所有军工企业整合为一个企业。这样，我们就会加强生产的协调性，提高生产力。"
 UKR_concern: "哈尔科夫军事工业"
 UKR_zaporozhia_gold: "穆日埃沃金矿"
 UKR_zaporozhia_gold_desc: "我们最终会吸引投资者，开始开发这些含有金矿的矿山。"
 UKR_opfl_small_med_business: "对中小企业的好处"
 UKR_opfl_small_med_business_desc: "中小企业是我们经济的重要组成部分。为了进一步发展，我们需要提供奖金，以激励人们做生意。"
 UKR_neutrality_neutral_social_are_in_coalition_TT: "乌克兰社会党不在执政联盟"
 UKR_idea_orthodox_christian_church: "乌克兰东正教教会"
 UKR_separatist_menace: "分离主义威胁"
 UKR_separatist_menace_desc: "分离主义共和国带来的威胁不容忽视，我们必须加以解决。"
 UKR_polish_liberation_battalions: "波兰解放军"
 UKR_polish_liberation_battalions_desc: "许多波兰居民准备与我们并肩作战，对抗他们认为占领了国家的政府。"
 UKR_economy_shortcut: "经济"
 UKR_security_and_expansion_shortcut: "安全与扩张"
 UKR_military_shortcut: "军事"
 UKR_politics_shortcut: "政治"
 UKR_fedrada_category: "联邦拉达"
 UKR_fedrada_category_desc: "联邦拉达是联邦乌克兰的一个政府机构，旨在促进联邦主体与联邦中心的互动。\n\n§Y乌克兰联邦主体§!可以被[UKR.GetFlag]乌克兰§G吞并§!，但对联邦主体的§Y影响§!最多为§Y50%§!"
 ukraine_maidan_east.4.b: "下令将警员们护送离开。"
 UKR_maidan_temporary_attack_idea_desc: "街头骚乱激发了军队的斗志，暂时提高了战斗力。"
 ukraine_maidan_overthrow.1.t: "政府被推翻"
 ukraine_maidan_overthrow.1.d: "我们的政府被推翻了。抗议者支持的候选人上台执政。\n他的意识形态为："
 ukraine_maidan_overthrow.1.a: "£democratic_group_small   $democratic$"
 ukraine_maidan_overthrow.1.b: "£communism_group_small   $communism$"
 ukraine_maidan_overthrow.1.c: "£neutrality_group_small   $neutrality$"
 ukraine_maidan_overthrow.1.e: "£nationalist_group_small   $nationalist$"
 ukraine_maidan_overthrow.2.t: "政府被推翻 - 新总统上任"
 ukraine_maidan_overthrow.2.d: "抗议者支持的候选人已经上台执政。他的政党是："
 ukraine_maidan_overthrow.2.e: "返回意识形态菜单"
 ukraine_maidan_crm_annex.1.t: "吞并克里米亚"
 ukraine_maidan_crm_annex.1.d: "克里米亚半岛已被俄罗斯吞并。我们接下来应该怎么办？"
 ukraine_maidan_crm_annex.1.a: "我们暂时停止行动。"
 ukraine_maidan_crm_annex.1.b: "我们将为克里米亚而战"
 UKR_idea_government_in_need_desc: "乌克兰政府饱受腐败和效率低下之苦。贪污腐败导致行政成本翻倍，而糟糕的治理则拖累了工业生产力和政治能力。"
 UKR_modernization: "乌克兰现代化"
 UKR_modernization_desc: "一旦经济和国家局势稳定下来，我们就需要对经济进行现代化改造。趁现在还来得及。"
 UKR_agriculture: "农业现代化"
 UKR_agriculture_desc: "乌克兰是世界最大的农产品生产国和出口国之一，素有“欧洲粮仓”之称。乌克兰拥有全球30%最肥沃的黑土，农业发展潜力巨大。只要进行一些投资，这些潜力就能得到充分发挥。"
 UKR_nibulon: "尼布隆"
 UKR_nibulon_desc: "尼布隆是一家乌克兰农业公司，专门从事小麦、大麦和玉米等谷物的生产和出口。公司总部位于尼古拉耶夫。它是乌克兰唯一一家拥有自己船队和造船厂的农业公司。"
 UKR_pr_jsc_mhp: "私人股份公司MHP"
 UKR_pr_jsc_mhp_desc: "米罗尼夫斯基家禽产品公司（MHP）是乌克兰最大的家禽生产商，也是该国最大的农工企业之一。国家对其扩张的支持将促进乌克兰食品加工业的发展，并增加农村就业机会。"
 UKR_fozzy: "福兹集团"
 UKR_fozzy_desc: "福兹集团有限责任公司是乌克兰最大的贸易和工业集团之一，总部位于基辅，也是乌克兰领先的零售商之一，在全国拥有700多家门店。除零售业外，该集团还涉足食品制造、银行业、IT、物流和餐饮业。"
 UKR_fin_it: "现代化经济"
 UKR_fin_it_desc: "指示有关部门帮助实现私营部门的现代化，特别是金融和信息技术部门。"
 UKR_privatbank: "普里瓦特银行"
 UKR_privatbank_desc: "普里瓦特银行是乌克兰资产规模最大的银行，也是乌克兰零售银行市场的领军企业。它于1992年3月19日注册成立。国家必须介入才能确保其未来的盈利。"
 UKR_it: "建立乌克兰信息技术产业"
 UKR_it_desc: "虽然我国的IT行业正在发展，但要保持这种发展势头，可能还需要一些投资。"
 UKR_it_2: "拓展乌克兰信息技术产业"
 UKR_it_2_desc: "看来我们的IT产业可以成为我们经济的一个关键因素。当然，这要归功于适当投资的帮助。"
 UKR_ukrtelekom: "乌克兰电信"
 UKR_ukrtelekom_desc: "国有企业乌克兰电信将帮助我们更快地扩大网络容量。"
 UKR_kyivstar: "基辅之星"
 UKR_kyivstar_desc: "基辅之星是乌克兰最大的电信公司之一，在乌克兰提供基于各种固定和移动技术（包括 4G (LTE) 服务）的通信服务和数据传输。"
 UKR_digital_education: "数字化教育"
 UKR_digital_education_desc: "在21世纪，数字技能对个人至关重要。投资数字教育和推进教育数字化，长远来看必将获得回报。我们也不能忘记老一辈，他们的教育是对当下的投资。"
 UKR_dig_sta: "乌克兰数字国家"
 UKR_dig_sta_desc: "行动是一款移动应用程序、一个门户网站，也是乌克兰电子政务的一个品牌。行动应用程序于2020年推出，允许乌克兰公民使用智能手机上的电子文件代替纸质文件进行身份识别和共享。\n\n行动门户允许访问50多种政府服务。最终，政府计划通过行动提供各种国家人员互动。"
 UKR_tax_avoidance: "解决逃税问题"
 UKR_tax_avoidance_desc: "我们现在拥有了在地方层面解决一个巨大的全球性问题的工具：企业和个人的避税问题。\n“尽管税收可能被忽视，甚至不受欢迎，但实际上它是我们社会的超级力量。税收使我们能够在地方和国家层面组织我们的社区，从而让我们所有人都能共同过上更好的生活。但一个根本性的障碍是，有权有势的精英们可以轻易地逃避他们的社会义务——逃避他们对自身所属社会以及从中获利的社会的责任。”——《2023年税收公正报告》"
 UKR_energy: "乌克兰能源战略"
 UKR_energy_desc: "现在是时候分析改善国家电力供应系统的潜力，并启动居民能源现代化计划了。"
 UKR_ukrenergo: "乌克兰电网公司"
 UKR_ukrenergo_desc: "乌克兰电网公司是乌克兰的电力传输系统运营商，也是该国高压输电线路的唯一运营商。该公司能够进一步提高整个电网系统的效率。"
 UKR_nuc_ener: "乌克兰国家核能发电公司"
 UKR_nuc_ener_desc: "乌克兰国家核能发电公司是一家国有企业，运营着乌克兰全部四座核电站（扎波罗热核电站、罗夫诺核电站、南乌克兰核电站和赫梅利尼茨基核电站）。它是乌克兰最大的电力生产商。"
 UKR_nuc_ener_2: "扩大核能产能"
 UKR_nuc_ener_2_desc: "根据与西屋公司的合同，这家美国公司将在赫梅利尼茨基核电站建造两个新机组，并在经过改造并最终建成的切尔卡瑟奇吉林核电站再建造两个机组。"
 UKR_green_ener: "绿色能源战略"
 UKR_green_ener_desc: "在推广可再生能源利用之后，我们需要审视我们在非核能领域的潜力。"
 UKR_ukrhydroenergo: "乌克兰水力发电公司"
 UKR_ukrhydroenergo_desc: "乌克兰水力发电公司是一家乌克兰国有企业，负责管理第聂伯河和德涅斯特河沿岸的许多大型水电站。它是乌克兰主要的水力发电公司。"
 UKR_solar: "建设太阳能发电厂"
 UKR_solar_desc: "我们的南部地区是东欧阳光最充足的地区之一，因此最适合建设太阳能发电厂。"
 UKR_wind: "推广风力发电场"
 UKR_wind_desc: "我国有些地方适合利用风力涡轮机进行高效发电。"
 UKR_biomass: "投资生物质发电厂"
 UKR_biomass_desc: "鉴于私人投资的生物质发电厂取得了成功，国家必须提供资金来建设此类设施。"
 UKR_min_env_prot: "乌克兰环境保护部"
 UKR_min_env_prot_desc: "该部是乌克兰中央政府体系中负责国家生态监测和发展的主要机构。其主要任务之一是发展市政垃圾处理系统。"
 UKR_waste_manangement_2: "建立回收系统"
 UKR_waste_manangement_2_desc: "现在，垃圾收集问题终于解决了，接下来就该着手建立可回收物收集系统了。这需要大量的时间和精力，但成效已经显现。"
 UKR_waste_manangement_3: "废物管理系统现代化"
 UKR_waste_manangement_3_desc: "现有的垃圾处理系统必须更加高效，并且覆盖到全国最偏远的地区。现代化的垃圾管理将惠及所有人，包括公众和环境。"
 UKR_forestry: "控制乌克兰林业"
 UKR_forestry_desc: "全国近20%的土地被森林覆盖。为了保持这一现状，避免森林砍伐，我们必须投资林业，将其视为对未来的投资。"
 UKR_tourism: "投资旅游业"
 UKR_tourism_desc: "旅游业对任何国家来说都是一个巨大的机遇。首先，必须建立完善的基础设施。"
 UKR_nat_wonders: "乌克兰自然奇观"
 UKR_nat_wonders_desc: "2008年，乌克兰众多风景如画的景点中，有七个经投票选出。这些景点将成为我国多样化景观的代表。"
 UKR_wonders: "乌克兰奇观"
 UKR_wonders_desc: "2007年的一次投票中，乌克兰众多历史文化古迹中有七处被选中。这些遗址将成为我国建筑遗产的旗帜。"
 UKR_world_heritage: "乌克兰世界遗产地"
 UKR_world_heritage_desc: "到2005年，乌克兰已有三处世界遗产，但随着时间的推移，这个数字还会增加，目前已有几处遗产地列入了预备名单。\n\n文化遗产包括纪念碑（例如建筑作品、纪念性雕塑或铭文）、建筑群和遗址（包括考古遗址）。自然遗产被定义为自然特征（包括物理和生物构造）、地质和地理学构造（包括受威胁动植物物种的栖息地）以及从科学、保护或自然美的角度来看具有重要意义的自然遗址。"
 UKR_health_tourism: "促进乌克兰健康旅游"
 UKR_health_tourism_desc: "由于该国的医疗服务达到了西方标准，但价格通常更便宜，因此投资医疗旅游业可能是有益的。"
 UKR_corruption_reforms: "反腐改革"
 UKR_corruption_reforms_desc: "腐败是乌克兰社会的一个问题，可以追溯到1991年苏联解体。乌克兰宣布脱离苏联独立后，面临着来自不同政治派别的一系列政客，以及犯罪头目和寡头，他们利用警察、政党和工业界的腐败来攫取权力。\n\n是时候改变现状了！"
 UKR_corruption_edu: "打击教育领域的腐败"
 UKR_corruption_edu_desc: "根据透明国际2008年的一项调查，47.3%的大学生表示曾被索要贿赂；其中，29%的人自愿支付了贿赂。学生们可以用金钱“买通”大学入学、考试成绩，甚至还能“买通”博士和/或硕士论文的批改。"
 UKR_corruption_health: "打击医疗保健领域的腐败"
 UKR_corruption_health_desc: "虽然乌克兰人在国立医院就医理论上是免费的，但在21世纪初，病人向医院付费以确保获得所需治疗的现象十分普遍。\n\n2012 年，一些维权组织指责卫生部官员挪用本应用于治疗艾滋病患者的资金，他们以极高的价格购买艾滋病药物，然后收取回扣。"
 UKR_corruption_police: "打击警察队伍中的腐败"
 UKR_corruption_police_desc: "打击乌克兰执法机构内部的腐败，以恢复公众信任和有效执法。"
 UKR_corruption_armed_forces: "打击乌克兰武装部队中的腐败"
 UKR_corruption_armed_forces_desc: "清除军队中的腐败，以提高军事纪律和战斗力。"
 UKR_corruption_justice: "打击司法腐败"
 UKR_corruption_justice_desc: "2010年代初期，乌克兰政界人士和分析人士形容乌克兰的司法系统“腐败透顶”，并抱怨法官承受政治压力和腐败现象。独立律师和人权活动人士也抱怨说，乌克兰法官经常受到压力，被迫做出某种判决。\n\n乌克兰的法院系统被普遍认为腐败。乌克兰司法部2009年的一项调查显示，只有10%的受访者信任该国的法院系统。"
 UKR_corruption_spec_public_prosecutor: "专门反腐败检察院"
 UKR_corruption_spec_public_prosecutor_desc: "乌克兰反腐败特别检察官办公室是乌克兰总检察长的一个独立结构单位，主要负责支持和监督乌克兰国家反腐败局发起的刑事调查。"
 UKR_corruption_court: "乌克兰最高反腐败法院"
 UKR_corruption_court_desc: "设立独立的反腐败法院，审理高层腐败案件，追回被盗国家资产。"
 UKR_corruption_asset_rec: "资产回收"
 UKR_corruption_asset_rec_desc: "《联合国反腐败公约》第五章中概述的资产追回是指将转移到国外的腐败所得追回并遣返回其来源国或归还给其合法所有者的过程。"
 UKR_corruption_gov: "清洗国家政府"
 UKR_corruption_gov_desc: "推行全面改革，消除政府行政部门内部的腐败，恢复机构廉洁。"
 UKR_end_kleptokracy: "完成反腐败改革"
 UKR_end_kleptokracy_desc: "实施这些改革后，腐败规模可以很容易地缩小，社会也将能够摆脱腐败的窒息性影响。"
 UKR_health_reform: "启动医疗改革"
 UKR_health_reform_desc: "根据法律规定，乌克兰公民应享受免费的医疗保健服务，但实际上，患者需要承担大部分医疗保健费用。"
 UKR_health_smoke_alc: "减少吸烟和饮酒"
 UKR_health_smoke_alc_desc: "开展公共卫生宣传活动，减少吸烟和饮酒，解决导致可预防疾病的主要原因。"
 UKR_hiv_aids: "乌克兰艾滋病疫情"
 UKR_hiv_aids_desc: "2001年，一项国家抗击艾滋病毒/艾滋病的计划获得批准；其目标包括防止艾滋病毒进一步传播、发展治疗感染者的能力以及为艾滋病毒/艾滋病感染者提供社会支持和咨询。"
 UKR_vaccination: "疫苗接种计划"
 UKR_vaccination_desc: "在全国范围内扩大疫苗接种计划，以防止传染病爆发并提高人群免疫力。"
 UKR_mental_health: "心理健康计划"
 UKR_mental_health_desc: "发展心理健康服务和支持系统，以应对人口中日益严重的心理疾病。"
 UKR_health_infra: "医疗基础设施改善"
 UKR_health_infra_desc: "对医疗基础设施进行现代化改造和扩建，升级全国各地的医疗设施。"
 UKR_health_equipment: "医疗设备采购计划"
 UKR_health_equipment_desc: "采购现代化医疗设备和诊断工具，以提高医疗服务和治疗能力。"
 UKR_health_prevention: "医疗筛查计划"
 UKR_health_prevention_desc: "建立全面的医疗筛查计划，以便及早发现健康问题并改善预防保健。"
 UKR_health_rehabilitaion: "国家康复计划"
 UKR_health_rehabilitaion_desc: "为受伤和残疾公民（包括军人）建立康复设施，以恢复其生活质量。"
 UKR_health_recreational_infra: "改善休闲基础设施"
 UKR_health_recreational_infra_desc: "投资建设休闲设施和公共空间，以促进体育锻炼和改善公众健康。"
 UKR_health_final: "完成医疗改革"
 UKR_health_final_desc: "完成医疗保健转型，达到西方医疗护理和人群健康标准。"
 UKR_edu_plan: "制定教育改革计划"
 UKR_edu_plan_desc: "尽管我国的教育质量相对较高，但仍有一些领域需要改进，以保持或提高这一质量。我们必须为世界正在进行的数字化转型做好准备。"
 UKR_edu_infra: "改善教育基础设施"
 UKR_edu_infra_desc: "升级教育设施和校舍，创造现代化的学习环境。"
 UKR_edu_ped_uni: "支持师范大学"
 UKR_edu_ped_uni_desc: "加强师范类大学建设，提高全国教师培训水平和教学质量。"
 UKR_edu_universities: "支持大学"
 UKR_edu_universities_desc: "为高等教育机构提供更多资源和支持，以加强学术研究和创新。"
 UKR_edu_infra_2: "改善教育基础设施：下一阶段"
 UKR_edu_infra_2_desc: "继续利用现代技术和先进的学习基础设施升级教育设施。"
 UKR_edu_final: "完成教育改革"
 UKR_edu_final_desc: "完成教育改革，达到世界一流的学习标准和科学进步水平。"
 UKR_bmz: "别尔季切夫机械制造厂"
 UKR_bmz_desc: "别尔季切夫机械制造厂（又名进步厂）是位于乌克兰日托米尔州别尔季切夫市的一家机械制造企业。"
 UKR_nkmz: "新克拉马托尔斯克机械制造厂"
 UKR_nkmz_desc: "新克拉马托尔斯克机械制造厂是乌克兰一家大型重型设备制造商。该公司生产采矿设备、冶金设备、轧机、锻造机、高炉、矿石破碎机、压力机和其他工业过程设备。\n\n该公司生产破冰船螺旋桨轴和潜艇部件。据其官网显示，该公司已设计并建造了超过18个采矿综合体。"
 UKR_oil_mining: "采油"
 UKR_oil_mining_desc: "开发新的石油开采设施，以提高国内能源产量，减少对外国供应的依赖。"
 UKR_mining2: "改善资源开采"
 UKR_mining2_desc: "扩大采矿作业规模，以增加铬、钨和其他战略矿物的开采量。"
 UKR_construction_kovalska: "科瓦尔斯卡"
 UKR_construction_kovalska_desc: "科瓦尔斯卡是一家乌克兰建筑材料开发商和制造商。\n\n生产：混凝土、混凝土混合料、建筑解决方案、传统钢筋混凝土、独立结构钢筋混凝土制品、膨胀粘土混凝土墙体制品、加气混凝土、铺路板、干粉混合料、水性分散材料（涂料、装饰灰泥、泡沫、胶粘剂）。"
 UKR_train_prod: "火车生产"
 UKR_train_prod_desc: "克留科夫铁路车辆制造厂是乌克兰克列缅丘格市的一家大型工业公司，生产机车和动车组列车。"
 UKR_kharkiv_tractor: "哈尔科夫拖拉机厂"
 UKR_kharkiv_tractor_desc: "哈尔科夫拖拉机厂是位于乌克兰哈尔科夫市的一家农业机械制造商。该厂成立于1930-31年，是斯大林第一个五年计划（1927-32 年）苏联工业化的核心项目，是乌克兰最大的拖拉机制造商，生产轮式和履带式拖拉机。\n\n1994年，苏联解体和乌克兰独立两年后，该厂改制为股份制公司，生产拖拉机，包括通用轮式拖拉机。"
 UKR_agriculture2: "农业现代化：下一阶段"
 UKR_agriculture2_desc: "实施先进的农业技术，扩大粮食生产，以巩固乌克兰作为全球粮食供应国的地位。"
 UKR_chumak: "乔玛克"
 UKR_chumak_desc: "乔玛克是一家位于赫尔松州卡霍夫卡的瑞典-乌克兰食品加工公司。其产品包括番茄酱、蛋黄酱、意大利面、沙拉酱、烹饪酱料、罐装蔬菜、腌制蔬菜、番茄汁和葵花籽油。"
 UKR_gsc_game_world: "GSC"
 UKR_gsc_game_world_desc: "GSC游戏世界是一家乌克兰电子游戏开发公司。该公司由谢尔盖·格里戈罗维奇于1995年在基辅创立，以《哥萨克》和《潜行者》系列游戏而闻名。"
 UKR_national_bank: "乌克兰国家银行"
 UKR_national_bank_desc: "根据乌克兰宪法，乌克兰国家银行的主要职能是确保乌克兰货币单位（格里夫纳）的稳定。为实现这一目标，国家银行致力于维护银行体系的稳定，并在其职权范围内维护物价稳定。"
 UKR_darnytsia: "达尔尼察"
 UKR_darnytsia_desc: "达尔尼察是一家乌克兰制药公司。"
 UKR_farmak: "法尔马克"
 UKR_farmak_desc: "法尔马克股份公司是一家乌克兰制药公司，成立于1925年，总部位于基辅。"
 UKR_carpathian_tourism: "促进喀尔巴阡山脉的旅游业发展"
 UKR_carpathian_tourism_desc: "发展喀尔巴阡山脉的旅游基础设施，以吸引国际游客并创造经济收入。"
 UKR_black_sea_tourism: "促进黑海周边地区的旅游业"
 UKR_black_sea_tourism_desc: "扩大黑海沿岸度假基础设施，将乌克兰打造成为一流的海滨旅游目的地。"
 UKR_infra_rail: "铁路改进"
 UKR_infra_rail_desc: "对国家铁路网进行现代化改造，以改善货运和客运交通。"
 UKR_infra_rail_2: "铁路改进：下一阶段"
 UKR_infra_rail_2_desc: "全面扩建和改造铁路，建立世界一流的交通基础设施。"
 UKR_infra_southern_bug: "使南方布格河可以通航"
 UKR_infra_southern_bug_desc: "恢复尼古拉耶夫上游南布格河的商业货运航运，以促进乌克兰日益增长的粮食出口。"
 UKR_pivdenne_db: "南方设计局"
 UKR_pivdenne_db_desc: "位于乌克兰第聂伯罗的南方设计局是一家卫星和火箭设计公司，此前曾设计过苏联洲际弹道导弹。"
 UKR_luch: "射线设计局"
 UKR_luch_desc: "扩大射线设计局在巡航导弹和先进武器技术研发方面的能力。"
 UKR_mayak: "马亚克"
 UKR_mayak_desc: "对马亚克小型武器生产设施进行现代化改造，为武装部队提供现代化的步兵武器。"
 UKR_ukrainian_armor: "乌克兰装甲"
 UKR_ukrainian_armor_desc: "为军事人员研发先进的防弹衣和防护装备技术。"
 UKR_large_construction1: "大型建设项目"
 UKR_large_construction1_desc: "启动一项雄心勃勃的建设计划，以扩大全国的城市基础设施和经济能力。"
 UKR_large_construction2: "大型建筑工程第二阶段"
 UKR_large_construction2_desc: "通过扩大建设项目，继续推进建设热潮，以保持发展势头和就业。"
 UKR_tax_reform: "税收改革"
 UKR_tax_reform_desc: "重组税收制度，以增加税收收入并实现财政管理现代化。"
 UKR_pension_reform: "养老金改革"
 UKR_pension_reform_desc: "实施全面的养老金制度改革，确保养老金制度的长期可持续性和充分的退休保障。"
 UKR_min_economy: "经济部"
 UKR_min_economy_desc: "加强经济部职能，促进市场自由化，减少政府对经济的控制。"
 UKR_cut_energy_subs: "削减能源补贴"
 UKR_cut_energy_subs_desc: "取消低效能源补贴，以平衡预算并鼓励提高能源效率。"
 UKR_state_fund: "国家基金"
 UKR_state_fund_desc: "设立主权财富基金，将预算盈余投资于发展项目和国际资产。"
 UKR_air_improvements: "空军改进"
 UKR_air_improvements_desc: "通过更好的训练、装备和作战理论实现空军现代化。"
 UKR_aa_mis_def_force: "防空导弹防御部队"
 UKR_aa_mis_def_force_desc: "建立专门的防空导弹防御部队，保护领空免受空中威胁。"
 UKR_radio_eng: "无线电工程部队"
 UKR_radio_eng_desc: "为先进的军事通信发展无线电工程和电子战能力。"
 UKR_support_fac: "支援设施"
 UKR_support_fac_desc: "扩大空军基地保障基础设施，以增强空中作战和飞机维护能力。"
 UKR_army_imp: "强化军队"
 UKR_army_imp_desc: "通过改进训练、理论和专业军事发展来加强陆军。"
 UKR_army_aviation: "陆军航空兵"
 UKR_army_aviation_desc: "发展陆军航空兵能力，配备旋翼飞机用于运输、侦察和近距离支援。"
 UKR_army_logistics: "军队后勤"
 UKR_army_logistics_desc: "加强陆军后勤和供应链系统，以支持作战行动并提高战场效率。"
 UKR_army_maintenance: "陆军维修设施"
 UKR_army_maintenance_desc: "建立完善的设备维护和修理设施，以最大限度地提高军事装备的可用性。"
 UKR_medical_forces: "医疗部队"
 UKR_medical_forces_desc: "建立具备先进野战医院和创伤救治能力的军事医疗指挥部。"
 UKR_antonov: "安东诺夫"
 UKR_antonov_desc: "扩大安东诺夫飞机制造能力，生产现代化的运输和货运飞机。"
 UKR_idea_pro_ukraine_reform_1_desc: "反腐败政府改革减少了浪费和低效，尽管初期过渡成本较高，但恢复了公众信心。"
 UKR_idea_shortened_general_staff_desc: "精简军事指挥结构可以提高规划效率并加速军官发展。"
 UKR_uda_encouraged: "鼓励乌克兰防务协会"
 UKR_uda_encouraged_desc: "将乌克兰防务协会民兵纳入武装部队可以提高战斗力，但会降低军事纪律。"
 UKR_uda_integrated: "整合乌克兰防务协会"
 UKR_uda_integrated_desc: "乌克兰志愿军已完全融入正规武装部队，加强了纪律和民族主义情绪。"
 UKR_ukrtelekom_idea: "乌克兰电信"
 UKR_ukrtelekom_idea_desc: "乌克兰国家电信垄断企业乌克兰电信已完成现代化改造，以扩大数字基础设施并提高生产力。"
 UKR_finance_and_it: "金融与IT行业支持"
 UKR_finance_and_it_desc: "金融和信息技术行业的发展创造了高价值的经济活动，并提高了研究能力。"
 UKR_digital_state: "乌克兰数字国家"
 UKR_digital_state_desc: "行动是一款移动应用程序、一个门户网站，也是乌克兰电子政务的一个品牌。行动应用程序于2020年推出，允许乌克兰公民使用智能手机上的电子文件代替纸质文件进行身份识别和共享。\n\n行动门户允许访问50多种政府服务。最终，政府计划通过行动提供各种国家人员互动。"
 UKR_tax_avoidance_idea: "避税可忽略不计"
 UKR_tax_avoidance_idea_desc: "税收或许常被忽视，甚至不受欢迎，但实际上它是我们社会的一项强大力量。税收使我们能够在地方和国家层面组织我们的社区，从而让我们所有人都能共同过上更美好的生活。\n\n但一个根本性的障碍是，有权势的精英阶层可以轻易地逃避他们的社会义务——逃避他们对自身所属社会以及从中获利的社会所应承担的责任。——《2023年税收公正报告》"
 UKR_nuclear_energy: "乌克兰国家核能发电公司"
 UKR_nuclear_energy_desc: "对核电站的投资可以提高国内能源产量和反应堆建设产量。"
 UKR_construction: "建设工作"
 UKR_construction_desc: "分配给国家紧急资助项目的建设能力。"
 UKR_demographic_boom: "人口激增"
 UKR_demographic_boom_desc: "有利的人口趋势和人口增长政策扩大了我们可用的人力资源和劳动力。"
 UKR_demographic_crisis: "人口危机"
 UKR_demographic_crisis_desc: "自20世纪90年代以来，由于高移民率、高死亡率和低出生率，该国人口一直在下降。自1993年以来，该国人口平均每年减少超过30万人。"
 UKR_tackle_corruption: "打击腐败！"
 UKR_tackle_corruption_desc: "反腐败运动和体制改革显著提高了政府效率和国家生产力。"
 UKR_corruption: "根深蒂固的腐败"
 UKR_large_construction: "大型建设项目"
 UKR_large_construction_desc: "一项雄心勃勃的基础设施发展计划加快了建筑竣工和生产力，但能源消耗也显著增加。"
 UKR_medical_reform: "医疗改革"
 UKR_medical_reform_desc: ""
 UKR_aamdf: "防空导弹部队"
 UKR_aamdf_desc: "一支组织严密的防空导弹防御力量能够显著增强我方的防空能力，并降低敌方近距离空中支援的有效性。"
 UKR_radio_troops: "无线电工程部队"
 UKR_radio_troops_desc: "空军无线电工程和信号部队增强了侦察和拦截能力，同时减少了飞机损失。"
 UKR_air_support_fac: "空军支援设施"
 UKR_air_support_fac_desc: "对空中支援设施的投资可以提高燃油效率和飞机可靠性，降低运营成本，同时提高性能。"
 UKR_cut_subsidies: "削减能源补贴"
 UKR_cut_subsidies_desc: "取消能源补贴迫使消费者承担真实的生产成本，从而提高生产率并减轻财政压力。"
 UKR_health_cost: "更健康的国家！"
 UKR_health_cost_desc: ""
 UKR_military_rehab: "军人康复系统"
 UKR_military_rehab_desc: "退伍军人康复计划可以提高部队士气和组织凝聚力，但会增加医疗保健支出。"
 UKR_resource_extraction: "提高资源开采"
 UKR_resource_extraction_desc: "资源开采活动的扩大增加了国内矿产和燃料的供应。"
 UKR_research_boost: "乌克兰研究支持计划"
 UKR_research_boost_desc: "集中式科研支持计划加速了军事和民用领域的技术发展。"
 UKR_economy_boost: "经济状况改善"
 UKR_economy_boost_desc: "临时性的经济刺激计划可以提高生产力和工厂效率，但同时也会增加能源成本。"
 UKR_kolomoisky_help: "来自科洛莫伊斯基的帮助"
 UKR_kolomoisky_help_desc: "著名寡头科洛莫伊斯基向我们提出一项建议，资助建立几个营，以维持我们武装部队的战斗力。"
 UKR_firtash_help: "来自菲塔什的帮助"
 UKR_firtash_help_desc: "著名寡头菲塔什向我们提出一项建议，资助建立几个营，以维持我们武装部队的战斗力。"
 UKR_kolomoisky_finish: "第聂伯罗-1警察团"
 UKR_kolomoisky_finish_desc: "科洛莫伊斯基自愿资助的最后一件事是将第聂伯罗彼得罗夫斯克防卫团改组为警察团。"
 UKR_uda: "乌克兰志愿军"
 UKR_uda_desc: "有必要将志愿者组织成一个单一的军事团体。"
 UKR_aidar: "创建艾达营"
 UKR_aidar_desc: "让我们抓住机会，让他们加入我们武装部队的行列。"
 UKR_russia_help_battalions_desc: "部署俄罗斯国民近卫军和瓦格纳部队可以改善占领期间的安全和反叛乱行动。"
 UKR_economy: "经济政策"
 UKR_economy_desc: "\n\n\n\n\n\n£GFX_UKR_desctext_economy\n\n\n\n\n\n\n\n\n§5乌克兰经济发展和贸易部§!是§8乌克兰§!中央政府体系中负责制定和实施国家经济和社会发展政策（商业经济）、调节消费价格、制定工业、投资和贸易经济政策、发展创业、技术监管和保障消费者权益、协调§8乌克兰§!与§1欧盟§!经济社会合作的主要机构。"
 UKR_boost_economy: "提振经济"
 UKR_boost_research: "支持研究工作"
 UKR_boost_resource: "补贴资源开采"
 UKR_add_resource: "深入挖掘"
 UKR_renewable_energy: "乌克兰可再生能源潜力评估"
 UKR_renewable_energy_desc: "\n\n\n\n\n\n£GFX_UKR_energy_ukraine\n\n\n\n\n\n\n\n\n绘制最具可再生能源生产潜力的区域地图。"
 UKR_energy_wind: "风能"
 UKR_energy_solar: "太阳能"
 UKR_energy_geothermal: "地热能"
 UKR_privatize_resource: "资源开采行业的私有化"
 UKR_privatize_resource_desc: "资源开采行业的私有化会削弱国家控制和资源可用性。"
 UKR_restructure_debt: "要求债务重组"
 UKR_ask_western_loans: "向§7西方国家§!寻求贷款"
 UKR_ask_eastern_loans: "向§t东方国家§!寻求贷款"
 UKR_natpolice_decision_category: "特种警察巡逻服务"
 UKR_natpolice_decision_category_desc: "乌克兰特种用途警察巡逻队是乌克兰国家警察巡逻警察部门下属的一个部门，该部门是乌克兰内务部下属的一支维护公共秩序的特种部队。\n\n该机构并入乌克兰国家警察部队。该部队由原内务部下属的营和团组成。"
 UKR_uda_decision_category: "乌克兰志愿军"
 UKR_uda_decision_category_desc: "乌克兰志愿军是一支由乌克兰志愿军团各部队组成的志愿准军事组织，成立于德米特里·亚罗什及其右翼同伙被释放之后。"
 UKR_integrate_uda: "整合§Y乌克兰防务协会§!到§Y乌克兰武装力量§!"
 UKR_btr_4: "组装一个§YBTR-4布西发拉斯§!原型"
 UKR_small_arms: "推进§O轻武器§!§W公司§!"
 UKR_equipment_funds: "推进§O哈尔科夫莫罗佐夫机械制造设计局步兵装备§!§W部门§!"
 UKR_heavy_equipment: "为§G马雷舍夫§!§W工厂§!拨款"
 UKR_heavy_equipment_research: "支持§G装甲车辆§!§W研究§!"
 UKR_fund_antonov: "补贴§8安东诺夫§!"
 UKR_air_equipment: "支持§8航天§!§W研究§!"
 UKR_nikolayev_funds: "现代化§1尼古拉耶夫船厂§!"
 UKR_naval_equipment: "支持§1海军装备§!§W研究§!"
 UKR_parti_regions_economic_committee_desc: "地区党经济委员会负责平抑经济周期，维护经济稳定。"
 UKR_parti_regions_invest_open_window_desc: "有利于商业发展的投资政策会促进人口增长和企业税收。"
 UKR_parti_regions_taxx_desc: "税法改革既降低了个人和企业税收，又增加了官僚成本，同时缓解了社会动荡。"
 UKR_parti_regions_laizes_desc: "世俗化措施削弱了宗教人士的影响力，但同时也破坏了宗教团体的稳定，加剧了经济波动。"
 UKR_parti_regions_stability_reform_desc: "区域稳定措施虽然加强了意识形态防御，但也增加了官僚机构的开支。"
 UKR_parti_regions_lustration_desc: "撤换苏联时期官员可以降低行政和安全机构的成本。"
 UKR_parti_regions_opposition_agree_desc: "在亚努科维奇时代，与反对党进行政治合作减少了政府的孤立，抑制了意识形态的偏离。"
 UKR_parti_regions_titushki_desc: "政府支持的街头煽动者通过恐吓和暴力压制意识形态的转变。"
 UKR_parti_regions_optimise_ministers_desc: "精简部级官僚机构可以降低行政成本，提高政府效率。"
 UKR_parti_regions_inform_act_desc: "媒体管制立法可以稳定政治信息，但需要付出行政成本。"
 UKR_parti_regions_pension_reform_desc: "养老金制度改革降低了社会成本，但由于福利减少，也降低了人口增长率。"
 UKR_parti_regions_youth_regions_desc: "青年参与计划能够建立代际支持，并略微提高政治力量和抵御漂移的能力。"
 UKR_our_ukraine_secretariat_of_president_desc: "总统秘书处提高了行政研究能力，但也增加了官僚机构的开支。"
 UKR_our_ukraine_fight_with_corruption_idea_desc: "反腐败执法可以减少官僚机构的臃肿和非法经济掠夺。"
 UKR_our_ukraine_education_reform_idea_desc: "课程改革可以提高科研能力，但会带来暂时的政治和稳定方面的代价。"
 UKR_our_ukraine_health_reform_idea_desc: "医疗卫生系统现代化可以降低成本并提高征兵体能。"
 UKR_our_ukraine_social_reform_idea_desc: "社会支出合理化既能减轻预算负担，又能增强民众支持。"
 UKR_our_ukraine_air_industry_idea_desc: "航空业现代化降低了军用飞机的生产成本。"
 UKR_zelya_helsi_desc: "海尔西医疗保健平台改善了人们获得医疗服务的途径，同时降低了治疗成本，并促进了人口健康。"
 UKR_zelya_dia_desc: "行动数字治理平台简化了官僚流程，减少了行政开支，提高了公共服务水平。"
 UKR_reform_sbu: "乌克兰国家安全局改革"
 UKR_reform_sbu_desc: "乌克兰国家安全局需要改革，这些年来，该机构深陷腐败泥潭，需要更新。"
 UKR_Yanu_Minister: "内阁"
 UKR_Yanu_President: "总统制"
 UKR_prepare_protest_tt: "我们将获得或失去对§8独立广场代表§!的支持"
 UKR_donbass_concessions_tt: "根据我们的立场，我们或许能够获得东部或西部地区的支持，但必然会令§8独立广场代表们§!失望。"
 UKR_azovsteel_desc: "对亚速钢铁制造复合体的控制，为工业和军事生产提供了稳定的高质量钢铁供应。"
 UKR_yushenko_premier_idea_desc: "维克托·尤先科在库奇马领导下担任总理，扩大了他的政治权力，并引导政府走向中立。"
 UKR_yanuk_premier_idea_desc: "维克托·亚努科维奇在库奇马的领导下担任总理，扩大了他的政治权力，并将政府拉向左翼。"
 UKR_unstable_government_idea_desc: "政治不稳定削弱了政府的控制力，使得各种意识形态派别得以利用动乱来实现各自的目的。"
 UKR_land_reform_idea3_desc: "上个世纪发起的土地改革应该导致全国土地所有权的彻底重新分配。到目前为止，这一进程仍在进行中。"
 UKR_zaims_desc: "短期国际贷款稳定了经济并增加了税收，但也造成了巨大的未来债务负担。"
 UKR_social_discontent: "民众的严重不满"
 UKR_social_discontent_desc: "大幅削减医疗保健、教育和福利支出可以缓解财政压力，但代价是损害公众信心。"
 UKR_banks_lobbyst_liquidate_desc: "政府取消银行业利益可以重新调整企业税收收入，从而打破金融精英对政策的影响力。"
 UKR_mining_company_help_desc: "税收优惠政策可以帮助矿业公司缓解经济压力。"
 UKR_privatization_idea_desc: "国有企业私有化提高了工厂效率和贸易关系，但代价是政治权力的削弱。"
 UKR_without_kuchma_idea_desc: "“没有库奇马的乌克兰”运动动员了民族主义情绪，反对人们认为的寡头腐败和专制统治。"
 UKR_left_opposition_idea_desc: "左翼政治运动动员工人和知识分子反对执政政府，破坏现有秩序。"
 UKR_luaz_idea_desc: "支持国产卢茨克汽车制造商可以降低汽车和卡车的生产成本。"
 UKR_anti_socialist_media_desc: "官方媒体压制共产主义和中立情绪，巩固了反动政府对舆论的控制。"
 ukraine_union.1.t: "乌克兰提议建立完全联盟国家"
 ukraine_union.1.d: "基辅提出将其国家地位并入我们，两国合并为一个由乌克兰领导的单一联盟国家。所有核心资产、所有资源、所有士兵都将归他们所有。我们是否愿意为了这个联盟而放弃我们的独立？"
 ukraine_union.1.a: "我们接受联盟"
 ukraine_union.1.b: "我们绝不放弃我们的国家"
 ukraine_union.2.t: "俄罗斯拒绝联盟"
 ukraine_union.2.d: "莫斯科拒绝融入我们的联盟国家。从喀尔巴阡山脉到太平洋，建立一个统一国家的梦想还得继续等待。"
 ukraine_union.2.a: "错失良机"
 ukraine_union.3.t: "乌克兰提议加入北约"
 ukraine_union.3.d: "基辅邀请我们退出现有联盟，加入北约，重塑东欧安全秩序。我们是否愿意携手走上这条道路？"
 ukraine_union.3.a: "我们共同加入北约"
 ukraine_union.3.b: "我们不应留在北约。"
 ukraine_union.4.t: "俄罗斯拒绝加入北约"
 ukraine_union.4.d: "莫斯科拒绝与我们一起加入北约。我们将不得不独自规划我们的西方发展道路。"
 ukraine_union.4.a: "就这样吧"
 ukraine_kommi.16.t: "共产主义者在东方发动起义"
 ukraine_kommi.16.d: "在基辅的支持下，一场共产主义叛乱占领了我们东部的几个省份，并在乌克兰的支持下宣布独立。我们不会忘记这一点。"
 ukraine_kommi.16.a: "我们会记住此事"
 UKR_brotherhood_people_desc: "强调集体福利和团结的共产主义社会运动减轻了消费品负担，同时加强了意识形态防御。"
 UKR_social_reform_desc: "在共产主义统治下，扩大社会福利可以降低医疗和社会成本，同时提高生活水平。"
 UKR_equal_rights_idea_desc: "在所有人群中实施平等权利政策，可以减轻官僚负担，加强政治团结。"
 UKR_west_investors_idea_desc: "西方市场的参与提供了资金和经济专业知识，支持了商业发展和公众对经济的信心。"
 UKR_our_investors_idea_desc: "西方投资者的资本能够刺激科研能力，稳定经济周期，并增强外交政策的独立性。"
 UKR_socialist_effort_desc: "社会主义生产的经济动员能够提高稳定性、促进人口增长并增加消费品供应。"
 UKR_alpha: "阿尔法"
 UKR_alpha_desc: "乌克兰国家安全局的阿尔法特种作战部队加强了我们针对颠覆性威胁的反情报和安全行动。"
 UKR_svr_desc: "外国情报机构的行动有助于加强情报网络发展，并提升机构抵御外国颠覆活动的防御能力。"
 UKR_sviaz_desc: "国家特别通信服务提供改进的加密、解密和安全通信基础设施。"
 UKR_ukraine_always_right: "乌克兰永远正确"
 UKR_ukraine_always_right_desc: "真正的爱国者已经在乌克兰掌权。乌克兰永远正确，乌克兰高于一切。"
 UKR_take_control_of_the_media: "控制媒体"
 UKR_take_control_of_the_media_desc: "近年来媒体资源太自由了，他们只忙着宣传我们的国家有多糟糕、多可怕，我们会解决的。"
 UKR_prohibition_of_non_nationalist_organizations: "禁止非民族主义组织"
 UKR_prohibition_of_non_nationalist_organizations_desc: "任何拒绝民族主义事业的组织都是对新秩序的威胁。取缔所有这些组织，让我们的运动成为该国唯一合法的政治力量。"
 UKR_anti_russian_policy: "反俄政策"
 UKR_anti_russian_policy_desc: "莫斯科仍然是乌克兰民族最大的敌人。必须将敌视俄罗斯确立为官方国家政策，并清除俄罗斯在我们各个机构中的影响力。"
 UKR_loyal_teachers_in_schools: "学校里的忠诚教师"
 UKR_loyal_teachers_in_schools_desc: "学校是乌克兰未来爱国公民的基础。我们只会在学校里留下真正的乌克兰人。"
 UKR_ban_all_languages_except_ukrainian: "禁止除乌克兰语之外的所有语言"
 UKR_ban_all_languages_except_ukrainian_desc: "我们将启动乌克兰化计划，所有其他语言将从学校课程、商务交流和乌克兰公民生活的其他方面删除。"
 UKR_introduce_death_penalty_for_disloyal_persons: "对不忠诚者处以死刑"
 UKR_introduce_death_penalty_for_disloyal_persons_desc: "忠诚是每个公民对祖国应尽的义务。凡是憎恨祖国的人，凡是胆敢冒犯祖国的人，我们都将不惜一切代价清除出去。"
 UKR_united_council_of_ukrainian_nationalists: "乌克兰民族主义者联合委员会"
 UKR_united_council_of_ukrainian_nationalists_desc: "最后，真正的爱国主义和民族主义，由乌克兰的真正支持者领导，统治着这个国家。我们的代表大会是为了建设一个伟大的国家。"
 UKR_right_sector: "右翼"
 UKR_right_sector_desc: "右翼部门将负责新乌克兰国家的内部政治部分"
 UKR_full_order_in_the_country: "国家的全面秩序"
 UKR_full_order_in_the_country_desc: "秩序是稳定的关键。我们将与混乱、无序和叛乱的表现作斗争。"
 UKR_ukrainian_assault_battalions: "乌克兰突击营"
 UKR_ukrainian_assault_battalions_desc: "我们将从特别爱国的公民中组建突击营，执行特定任务。"
 UKR_make_government_jobs_only_for_ukrainians: "让政府工作只为乌克兰人提供"
 UKR_make_government_jobs_only_for_ukrainians_desc: "只有乌克兰人才能为祖国的利益工作，其他人都不应该有工作的权利。"
 UKR_complete_the_cleansing_of_the_ukrainian_state: "彻底清洗乌克兰国家"
 UKR_complete_the_cleansing_of_the_ukrainian_state_desc: "我们的祖国已经清除了敌人、诽谤者和其他负面因素。"
 UKR_limit_the_powers_of_the_mvd: "限制内务部的权力"
 UKR_limit_the_powers_of_the_mvd_desc: "警察和其他当局在国内拥有太多权力，我们将限制他们。"
 UKR_night_of_the_long_knives: "长刀之夜"
 UKR_night_of_the_long_knives_desc: "我们将更彻底地清除那些特别抵制改革的人。"
 UKR_una_unso: "乌克兰国民议会-乌克兰人民自卫队"
 UKR_una_unso_desc: "外交政策活动将落在乌克兰国民议会-乌克兰人民自卫队的肩上。"
 UKR_external_intervention: "外部干预"
 UKR_external_intervention_desc: "是时候停止奉行和平政策了，我们将积极影响全球进程。"
 UKR_resolve_the_moldovan_issue: "解决摩尔多瓦问题"
 UKR_resolve_the_moldovan_issue_desc: "摩尔多瓦和德涅斯特河沿岸长期以来一直阻碍着我们，他们的独立只是一个错误，我们会解决这个问题。"
 UKR_dig_up_potatoes: "挖出土豆"
 UKR_dig_up_potatoes_desc: "白俄罗斯可能会被西方和东方的敌人用来攻击我们。保护自己的最好方法就是先发制人！"
 UKR_to_recall_the_volhynia_massacre: "沃伦经验"
 UKR_to_recall_the_volhynia_massacre_desc: "我们再次面对波兰人，必须再次反击他们。现在是我们国家最终结束波兰威胁的时候了"
 UKR_secretly_sending_militants_to_kuban: "在克里米亚发动叛乱"
 UKR_secretly_sending_militants_to_kuban_desc: "克里米亚被俄罗斯夺走，这是本世纪最大的历史不公。我们当局的软弱令人震惊和羞耻。我们将纠正它。"
 UKR_agitation_of_radical_ukrainians_in_kuban: "在库班发动叛乱"
 UKR_agitation_of_radical_ukrainians_in_kuban_desc: "库班是我们的土地，永远都是。我们将努力从俄罗斯手中夺回它。"
 UKR_liberate_green_klin: "‘解放’绿乌克兰"
 UKR_liberate_green_klin_desc: "是时候“解放”我们远东的兄弟们，让他们摆脱俄罗斯熊的压迫。"
 UKR_shoot_a_russian_bear: "射杀一头俄罗斯熊"
 UKR_shoot_a_russian_bear_desc: "俄罗斯熊将成为我们的地毯！"
 UKR_declare_a_great_ukraine: "宣称大乌克兰"
 UKR_declare_a_great_ukraine_desc: "乌克兰已经变得强大，让全世界都知道了。"
 UKR_upa: "乌克兰起义军"
 UKR_upa_desc: "国家的民防和内防活动将落在复兴的乌克兰起义军身上。"
 UKR_new_orders_of_formation_of_upa_groups: "乌克兰起义军团体组建新秩序"
 UKR_new_orders_of_formation_of_upa_groups_desc: "我们将借鉴乌克兰起义军在二战期间的经验，并在创建新的旅时顾及从前的错误。"
 UKR_partisan_units: "游击队单位"
 UKR_partisan_units_desc: "乌克兰起义军游击队将在全国各地建立，以积极抵抗敌人。"
 UKR_partisanship_as_an_ideology: "游击战术是一种意识形态"
 UKR_partisanship_as_an_ideology_desc: "我们的游击队员必须接受思想教育，以便积极抵抗敌人。"
 UKR_make_military_exercises_in_the_country_compulsory_for_all: "让全国所有人强制参加军事演习"
 UKR_make_military_exercises_in_the_country_compulsory_for_all_desc: "每个乌克兰人都应该有能力保卫自己的国家。普通公民接受乌克兰进步联盟专家的培训将增强我们国家的战斗力。"
 UKR_to_arm_every_person_in_the_country: "武装全国人民"
 UKR_to_arm_every_person_in_the_country_desc: "女人、孩子、男人、老人 - 每个人都应该能够携带武器并用它射击敌人。"
 UKR_form_an_alliance_of_right_wing_youth: "组建右翼青年联盟"
 UKR_form_an_alliance_of_right_wing_youth_desc: "乌克兰的青年必须先组织起来，然后才能武装起来。将分散的右翼青年运动团结成一个忠于民族主义事业的联盟。"
 UKR_ukraine_is_a_land_of_partisans: "乌克兰是游击队的天下"
 UKR_ukraine_is_a_land_of_partisans_desc: "如果敌人入侵，每个村庄、每个城市都会有游击队员。我们将以乌克兰人民的力量迎战敌人。"
 UKR_nationalists_right_sector_desc: "将右翼民兵组织融入国家体制，可以增强民族主义情绪和政治权威。"
 UKR_nationalists_una_unso_desc: "民族主义的乌克兰国民大会—乌克兰人民自卫运动促进了志愿人员的动员并提高了非正规军事能力。"
 UKR_nationalists_upa_desc: "借鉴历史上乌克兰起义军抵抗战术，可以提高补给效率和核心领土的防御能力。"
 UKR_nationalists_cleane_ukraine_desc: "一场声势浩大的民族主义团结运动加强了对外国影响的抵抗，并增强了继续战斗的意志。"
 UKR_nationalists_trizub_desc: "三叉戟组织动员民族主义情绪和对国防的承诺。"
 UKR_nabu: "乌克兰国家反腐败局"
 UKR_nabu_desc: "新成立的反腐局旨在加强对各级腐败官员的打击。"
 UKR_poroh_deccomuniz: "波罗申科总统任期"
 UKR_poroh_deccomuniz_desc: "波罗申科是一个性格复杂的人，但他希望使乌克兰在面对敌人时变得强大，这种愿望值得人民尊重。"
 UKR_west_investors_desc: "西方外国投资者被吸引到这个市场，加强了民主制度，推动了经济增长和稳定。"
 UKR_operation_wall_desc: "在动员期间，防御工事的建设速度急剧加快。"
 UKR_ato_supports_desc: "对反恐行动老兵的支持增强了民族主义情绪，并强化了我们对服役人员的承诺。"
 UKR_health_supports_desc: "扩大医疗保健投入可以改善公众福祉，并加强对民主治理的支持。"
 UKR_pivdenmash_idea_desc: "皮夫登马什国营企业专门从事弹道导弹和核导弹的生产，效率更高。"
 UKR_kyvarmor_idea_desc: "基辅装甲厂专门生产先进的中型坦克底盘和两栖改型。"
 UKR_tsnap_idea_desc: "行政服务提供中心行政机构精简了中央政府官僚机构，降低了行政开支。"
 UKR_concern_desc: "将分散的军事制造企业整合到哈尔科夫军事工业复合体中，提高了坦克和车辆的生产效率。"
 UKR_zaz_idea_desc: "扎波罗热汽车生产重获新生，提高了车辆可靠性，降低了民用和军用运输工具的制造成本。"
 UKR_kraz_idea_desc: "克雷门丘克汽车生产实现了卡车和装甲车的国内制造，降低了对进口的依赖。"
 UKR_motorsich_idea_desc: "国家对马达西奇公司所产飞机发动机的支持降低了重型飞机和坦克的制造成本。"
 UKR_interlegion_decision_category: "国际领土保卫军团"
 UKR_interlegion_decision_category_desc: "乌克兰国际国土防御军团是乌克兰政府的一个项目，旨在吸引外国人创建志愿部队，作为乌克兰武装部队国土防御的一部分。"
 UKR_vetrenko_surrort_nationalism_desc: "民族主义运动动员了民众，强调乌克兰身份认同和文化主权，以对抗他们认为的外部威胁。"
 UKR_vetrenko_pioneria_desc: "一个民族主义青年组织已经成立，旨在培养年轻一代的爱国主义教育，提高他们的政治意识。"
 UKR_vetrenko_health_free_idea_desc: "全国范围内已实施免费医疗保健，这促进了人口增长，但同时也因医疗支出增加而给公共财政带来了压力。"
 UKR_economic_reforms_modifier: "乌克兰经济发展"
 UKR_economic_reforms_modifier_desc: "数十年的寡头政治停滞使乌克兰经济充斥着苏联时代的遗迹和影子市场。一项持续的改革计划正在逐步精简官僚机构，吸引外资，并推动老旧工业的现代化。每一步进步都以工厂的重新开工和合同的履行来衡量。"
 UKR_military_reforms_modifier: "乌克兰军事发展"
 UKR_military_reforms_modifier_desc: "进入新世纪时，乌克兰武装部队资金不足、士气低落，装备的仍是锈迹斑斑的苏联时期遗留武器。改革不仅仅意味着更换新式步枪，更意味着培养专业军官、开展务实训练，以及制定符合实际战争形势的作战理论。最终，一支更加精干、更加强悍的军队将效忠于国家，而非任何幕后支持者。"
 UKR_Industry_Improvement: "工业改进"
 UKR_Mining_Improvement: "采矿改进"
 UKR_Construction_Improvement: "建筑改进"
 UKR_train_Improvement: "铁路改进"
 UKR_Network_Improvement: "网络改进"
 UKR_Military_Improvement: "军事改进"
 UKR_kuchma_shortcut: "库奇马"
 UKR_kuchma_second_terms: "库奇马第二任期"
 UKR_kuchma_second_terms_desc: "库奇马总统已连任两届；或许这次他不会连任，或许他会把国家带入混乱。我们拭目以待。"
 UKR_dissolve_rada: "解散拉达"