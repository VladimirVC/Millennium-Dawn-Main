 CUB.Neutral_Libertarian: "£CUB_non_aligned_libertarian (PLC) キューバ自由党"
 CUB.Neutral_Libertarian_icon: "£CUB_non_aligned_libertarian"
 CUB.Neutral_Libertarian_desc: "キューバ自由党 - ホセ・マルティは、キューバの有名な国民的英雄であり思想家にちなんで名付けられた、リバタリアン主義の原則を掲げる政党である。キューバにおける個人の自由と経済的自由を守る必要性に応えて設立された。同党は、市民生活への政府の介入の最小化、市場経済、私有財産の保護を提唱している。また、法の支配を強化し市民社会を発展させるため、公民権と民主的改革を積極的に支持している。ホセ・マルティのリバタリアン思想に触発された同党は、開放的で自由なキューバ社会の構築を目指している。"
 CUB.Nat_Populism: "£CUB_nationalist_right_wing_populist (PRO) 正統革新党"
 CUB.Nat_Populism_icon: "£CUB_nationalist_right_wing_populist"
 CUB.Nat_Populism_desc: "神政政治とは、1つまたは複数の神が最高統治権威として認められ、政府の日常業務を管理する人間の仲介者たちに神の導きを与える政治体制である。"
 CUB.Nat_Fascism: "£CUB_nationalist_fascism (CF) キューバ・ファランヘ党"
 CUB.Nat_Fascism_icon: "£CUB_nationalist_fascism"
 CUB.Nat_Fascism_desc: "スペインのファシスト運動に触発されたキューバ・ファランヘは、1930年代に台頭した。この運動は、ナショナリズムと権威主義的な理想を掲げ、共産主義に反対し、中央集権的で自由主義的でない国家の樹立を目指した。ファランヘ党員たちは、厳格な階層制と経済の企業的運営を支持した。1959年の革命後、この運動はかなりの人気を失ったものの、依然としてキューバのファランヘ党を支持する活動家たちが存在し、極右的な見解を表明し続け、同運動の思想を支持している。"
