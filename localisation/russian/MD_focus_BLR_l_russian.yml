l_russian:
 belorussia_focus: "Древо фокусов Беларуси"
 BLR_china_friendship: "Партнерство с Китаем"
 BLR_china_friendship_desc: "Мы намерены укреплять дружественные отношения между нашими странами"
 BLR_Bel_G2: "БЕЛДЖИ"
 BLR_Bel_G2_desc: "АО «Белджи» — белорусско-китайское совместное предприятие по сборке китайских легковых автомобилей Geely. Одна из двух компаний по сборке легковых автомобилей в Беларуси. Она расположена на арендованных участках АО «Борисовский завод автогидроусилитель» под Борисовым."
 BLR_Chinese_Modernization_Railway: "Модернизация железных дорог"
 BLR_Chinese_Modernization_Railway_desc: "Наши китайские коллеги согласились профинансировать модернизацию железнодорожной сети нашей страны"
 BLR_Credit_tec2: "Кредит на улучшение ТЭЦ"
 BLR_Credit_tec2_desc: "Наши тепловые электростанции в Минске нуждаются в модернизации, мы запросим у Китая кредит на их строительство."
 BLR_AES: "Белорусская атомная электростанция"
 BLR_AES_desc: "Мы наконец-то построим собственную атомную электростанцию."
 BLR_Chinese_kal: "Торговое соглашение с Китаем"
 BLR_Chinese_kal_desc: "Мы заключим торговое соглашение с Китаем, которое позволит нам увеличить производственные мощности компании «Гродно Азота»."
 BLR_Chinese_zdania: "Строительство новых заводов"
 BLR_Chinese_zdania_desc: "Китайское правительство наращивает инвестиции в нашу страну и готово строить новые заводы."
 BLR_Chinese_konfuci: "Институты Конфуция"
 BLR_Chinese_konfuci_desc: "Мы откроем в нашей стране несколько институтов Конфуция."
 BLR_Chinese_Poezda: "Закупка поездов в Китае"
 BLR_Chinese_Poezda_desc: "Мы закупим несколько поездов в Китае, что поможет улучшить наши поставки."
 BLR_Chinese_huawei: "Сотрудничество с Huawei"
 BLR_Chinese_huawei_desc: "Мы наладим тесное сотрудничество с этой китайской компанией."
 BLR_Chinese_energy: "Китайские инвестиции в энергетический сектор"
 BLR_Chinese_energy_desc: "Китайские компании продолжают наращивать инвестиции по всей стране и теперь готовы вновь вкладывать средства в наш энергетический сектор."
 BLR_Chinese_uchenia: "Учения с китайской армией"
 BLR_Chinese_uchenia_desc: "Обмен опытом между нашими вооруженными силами будет очень полезным."
 BLR_Chinese_yuan: "Юань - вторая валюта страны"
 BLR_Chinese_yuan_desc: "Мы готовы принять юань в качестве второй валюты в нашей стране."
 BLR_Chinese_skynet: "Опыт китайского управления Интернетом"
 BLR_Chinese_skynet_desc: "Мы готовы извлечь уроки из опыта мониторинга социальных сетей."
 BLR_Chinese_economic: "Опыт китайской экономики"
 BLR_Chinese_economic_desc: "Мы применяем весь опыт, накопленный китайской экономикой."
 BLR_military_exercises_CHI_idea: "Белорусско-китайские учения"
 BLR_Socialist_Market_Economy: "Социалистическая рыночная экономика"
 BLR_minotor_servise_sov: "Белорусский Минотор-Сервис"
 BLR_minotor_servise_blr: "Контракт Минотора с Россией"
 BLR_558zadov_contract: "Контракт с 558 авиационным ремонтным заводом"
 BLR_peleng_contract: "Контракт с компанией Пеленг"
 BLR_peleng_contract_desc: "[BLR.GetFlag]Белорусская компания по разработке и производству оптоэлектронной продукции военного и гражданского назначения, ведущее предприятие в отрасли в Республике Беларусь."
 BLR_peleng_union_state: "[BLR.GetFlag]ОАО Пеленг"
 BLR_peleng_union_state_desc: "[SOV.GetFlag] Государственная компания Союза по разработке и производству оптоэлектронной продукции военного и гражданского назначения, ведущая компания в отрасли в государстве Союз."
 BLR_peacerota_idea: "Миротворческий контингент"
 BLR_Foreign_legion_idea: "Иностранный легион"
 BLR_sso_idea: "Силы Специальных Операций"
 BLR_ter_orobona_idea: "Территориальная оборона"
 BLR_mzkt_contract: "Контракт с МЗКТ"
 BLR_mzkt_contract_desc: "Минский колесный тракторный завод (МЗКТ) — предприятие, специализирующееся на производстве дорожной и внедорожной тяжелой техники, прицепов и специальных колесных шасси для строительной, нефтегазовой и машиностроительной отраслей. Является государственным предприятием, находящимся в ведении Государственного военно-промышленного комитета Республики Беларусь."
 BLR_mzkt_contract_another: "Контракт с МЗКТ"
 BLR_mzkt_another_desc: "Минский колесный тракторный завод (МЗКТ) — предприятие, специализирующееся на производстве дорожной и внедорожной тяжелой техники, прицепов и специальных колесных шасси для строительной, нефтегазовой и машиностроительной отраслей. Является государственным предприятием, находящимся в ведении Государственного военно-промышленного комитета Республики Беларусь."
 BLR_mzkt_contract_blr: "Контракт МЗКТ с [SOV.GetNamewithFlag]"
 BLR_mzkt_contract_blr_desc: "Минский колесный тракторный завод (МЗКТ) — предприятие, специализирующееся на производстве дорожной и внедорожной тяжелой техники, прицепов и специальных колесных шасси для строительной, нефтегазовой и машиностроительной отраслей. Является государственным предприятием, находящимся в ведении Государственного военно-промышленного комитета Республики Беларусь."
 BLR_mzkt_union_state: "[BLR.GetFlag]Минский завод колесных тягачей"
 BLR_mzkt_union_state_desc: "Минский колесный тракторный завод (МЗКТ) — предприятие, специализирующееся на производстве дорожной и внедорожной тяжелой техники, прицепов и специальных колесных шасси для строительной, нефтегазовой и машиностроительной отраслей. В настоящее время находится в ведении Союзного государства."
 BLR_140_zavod_remont: "140-й ремонтный завод"
 BLR_140_zavod_remont_desc: "140-й ремонтный завод — государственное предприятие военно-промышленного комплекса Беларуси, специализирующееся на ремонте и модернизации бронетехники и её двигателей."
 BLR_140_zavod_union_state: "[BLR.GetFlag]140-й ремонтный завод"
 BLR_140_zavod_union_state_desc: "140-й ремонтный завод — это государственное предприятие военно-промышленного комплекса [SOV.GetFlag]Union State, специализирующееся на ремонте и модернизации бронетехники и её двигателей."
 BLR_Brigade_Territorial_Defence: "Создать бригаду территориальной обороны"
 BLR_Brigade_Territorial_Defence_desc: "Начало войны вынуждает нас создать силы территориальной обороны."
 BLR_Transport_troops: "Транспортные войска"
 BLR_Transport_troops_desc: "Специальные войска, предназначенные для выполнения задач транспортного обеспечения."
 BLR_sso: "Создание сил специального назначения"
 BLR_sso_desc: "Силы специальных операций Вооружённых Сил Республики Беларусь — высокомобильный род войск Вооружённых Сил Республики Беларусь, являются правопреемниками Воздушно-десантных войск СССР и войск специального назначения ГРУ СССР в Республике Беларусь. Основные задачи: контрдиверсионная деятельность, разведка, борьба с незаконными вооружёнными формированиями, выполнение различных задач специальными методами в целях прекращения вооружённого конфликта против Республики Беларусь. Выступают одним из основных элементов стратегического сдерживания."
 BLR_trans_army: "Создание транспортных войск"
 BLR_trans_army_desc: "Белорусские транспортные войска — это род войск Вооруженных Сил Беларуси, отвечающий за переброску личного состава и материальных средств автомобильным, железнодорожным и воздушным транспортом. Они предназначены для выполнения задач по транспортному обеспечению воинских формирований других родов войск по всей стране."
 BLR_end_reform: "Завершить реформу армии"
 BLR_end_reform_desc: "Мы завершим реформы нашей армии, и теперь она будет соответствовать современным стандартам."
 USSR_Legacy: "Белорусский военно-промышленный комплекс"
 USSR_Legacy_desc: "Мы приложим все усилия для развития и приумножения унаследованного нами наследия."
 BLR_mi_8: "Ми-8"
 BLR_MZKT: "МЗКТ"
 BLR_MZKT_desc: "Минский колесный тракторный завод — предприятие, специализирующееся на производстве дорожной и внедорожной тяжелой техники, прицепов и специальных колесных шасси для строительной, нефтегазовой и машиностроительной отраслей. Является государственным предприятием, находящимся в ведении Государственного военно-промышленного комитета Республики Беларусь."
 BLR_minoitor: "Минотор-Сервис"
 BLR_minoitor_desc: "«Минотор-Сервис» — белорусское предприятие, расположенное в Минске и занимающееся разработкой, производством, модернизацией, ремонтом и техническим обслуживанием боевой гусеничной техники, а также поставкой запасных частей. Это одно из ведущих предприятий военно-промышленного комплекса страны."
 BLR_belspecveshtech: "Белспецвнештехника"
 BLR_belspecveshtech_desc: "«Белспецвнештехника» (БСВТ) — белорусское государственное внешнеторговое унитарное предприятие, основанное в 1995 году. Специализируется на торговле и производстве вооружений и продукции двойного назначения. Является членом Государственного военно-промышленного комитета и считается ведущим предприятием страны в области экспорта вооружений."
 BLR_140_zavod: "140 Ремонтный завод"
 BLR_140_zavod_desc: "140-й ремонтный завод — государственное предприятие военно-промышленного комплекса Беларуси, специализирующееся на ремонте и модернизации бронетехники и её двигателей."
 BLR_polonez: "Начать разработку РСЗО совместно с Китаем"
 BLR_polonez_desc: "Для создания нашей реактивной системы залпового огня мы привлекли к сотрудничеству наших китайских коллег."
 BLR_peleng: "Пеленг"
 BLR_peleng_for_russia: "Оборудование ПТУР"
 BLR_peleng_for_russia_desc: "Мы готовы начать производство оборудования для российских противотанковых управляемых ракет."
 BLR_peleng_for_ukr: "Оборудование ПТУР"
 BLR_peleng_for_ukr_desc: "Мы готовы начать производство оборудования для украинских противотанковых управляемых ракет."
 BLR_558_zavod: "558 Авиационный ремонтный завод"
 BLR_558_zavod_desc: "558-й авиаремонтный завод — одно из крупнейших предприятий в СНГ по ремонту и модернизации современной боевой авиационной техники, находящейся на вооружении ВВС постсоветских стран и многих зарубежных государств. Это важнейший авиаремонтный центр в Беларуси, расположенный в городе Барановичи."
 BLR_Communism_start: "§YТатьяна Голубева§!"
 BLR_Communism_start_desc: "Коммунизм вновь вернулся в Беларусь. Проложит ли Коммунистическая партия путь марксизму-ленинизму в стране в очередной раз?"
 BLR_trade_with_nko: "Торговля с Северной Кореей"
 BLR_trade_with_nko_desc: "Северная Корея, несмотря на свои небольшие размеры, является нашим союзником в социалистическом лагере, с которым мы готовы установить торговые отношения."
 BLR_nko_workers: "Северокорейские рабочие"
 BLR_nko_workers_desc: "Мы готовы пригласить северокорейских рабочих в нашу страну. Они известны своей эффективностью и трудолюбием."
 BLR_nko_miiltary_coop: "§GВоенно-техническое сотрудничество с Северной Кореей§!"
 BLR_nko_miiltary_coop_desc: "Мы готовы начать военно-техническое сотрудничество с Народной армией Северной Кореи."
 BLR_rotation_KGB: "Ротация в КГБ"
 BLR_rotation_KGB_desc: "Мы проводим ротацию персонала, потому что сейчас нам нужна сильная и эффективная организация."
 BLR_North_Korea_workers: "Северокорейские рабочие"
 BLR_SMERSH_2: "СМЕРШ 2.0"
 BLR_SMERSH_2_desc: "Мы возродим СМЕРШ. Пришло время использовать советский опыт на благо нации."
 BLR_arest_silovic: "Арест сил безопасности"
 BLR_arest_silovic_desc: "Многие сотрудники силовых структур выразили несогласие с новым правительством, пришло время провести чистку."
 BLR_antigay_propaganda_laws: "Анти-гейские законы"
 BLR_antigay_propaganda_laws_desc: "Пришло время законодательно запретить ЛГБТ-пропаганду в нашей стране."
 BLR_clean_soc_net: "Чистая социальная сеть"
 BLR_clean_soc_net_desc: "Мы очистим все социальные сети, мы не допустим распространения вражеской пропаганды."
 BLR_pioneria: "Пионерия"
 BLR_pioneria_desc: "Молодёжь не должна бездельничать, поэтому мы возродим движение «Молодые пионеры»."
 BLR_Marks_school: "Марксизм в школах"
 BLR_Marks_school_desc: "В школьную программу обязательно будет включено марксистское образование."
 BLR_free_education: "Бесплатное образование"
 BLR_free_education_desc: "Образование должно быть бесплатным и доступным для каждого гражданина нашей славной страны."
 BLR_state_atheism: "Бога нет"
 BLR_state_atheism_desc: "Религия — это опиум для народа, и настало время бороться с её влиянием."
 BLR_collectivism: "Коллективизм"
 BLR_collectivism_desc: "Коллективизация уже работала раньше, поэтому мы повторим этот опыт."
 BLR_fight_international_capitalists: "Сражаться с международными капиталистами"
 BLR_fight_international_capitalists_desc: "Олигархи — опасный и коррумпированный класс, ничем не лучше кулаков советских времен. После распада СССР российские и белорусские олигархи все больше и больше захватывают экономическое влияние и вытесняют белорусских рабочих с рынка труда в пользу глобалистской экономической модели, движимой иностранными компаниями. Для возрождения подлинного социализма прежде всего необходимо изгнать международный капиталистический класс."
 BLR_weaken_the_banks: "Ослабить банки"
 BLR_weaken_the_banks_desc: "Банки - это преторианская гвардия капитализма, несущая его знамя в бой и защищающая его прибыль самим своим существованием. Они вмешиваются в дела бедных районов мира, оскорбляют рабочий класс демпингом заработной платы и спекуляциями процентными ставками, а также влияют на политику как законными, так и незаконными пожертвованиями. Банки должны быть возвращены в состояние, в котором они являются просто аполитичными краткосрочными кредиторами"
 BLR_ultimate_tax_reform: "Большая налоговая реформа"
 BLR_ultimate_tax_reform_desc: "Мы намерены провести масштабную налоговую реформу, которая облегчит налоговое бремя для простых граждан, но для бизнеса окажет прямо противоположное воздействие."
 BLR_single_party: "Одна партия"
 BLR_single_party_desc: "Партия должна быть одна, потому что у нас один путь к социализму."
 BLR_nationalize_foreign_business: "Национализировать иностранный бизнес"
 BLR_nationalize_foreign_business_desc: "Промышленные предприятия, принадлежащие иностранцам, всегда представляют угрозу экономической безопасности. В условиях угроз со стороны иностранных государств экономическими санкциями, всегда существует опасение, что владельцы предприятий могут внезапно покинуть страну и забрать с собой важные части своих объектов. Чтобы предотвратить это, нам необходимо заявить права на эти предприятия как на государственные, даже если это вызовет недовольство других стран."
 BLR_five_year_plan: "Первый пятилетний план"
 BLR_five_year_plan_desc: "Свободные экономические модели западных государств не сулят будущего социалистическому государству. Возвращение к плановой экономике, предпочтительно в форме классических пятилетних планов советского образца, даст правительству огромное влияние на ранее неконтролируемую экономику."
 BLR_reestablish_the_military_industrial_complex: "Восстановить военно-промышленный комплекс"
 BLR_reestablish_the_military_industrial_complex_desc: "Армия и народ едины!"
 BLR_mobilize_the_masses: "Мобилизовать массы"
 BLR_mobilize_the_masses_desc: "Нашей армии нужны люди, которые будут защищать интересы нашей страны, где бы партия ни требовала"
 BLR_better_roads: "Общее улучшение дорог"
 BLR_better_roads_desc: "Необходимо уделить пристальное внимание проблеме дорожного строительства в нашей стране."
 BLR_progress_cult: "Культ прогресса"
 BLR_progress_cult_desc: "Социалисты стремятся к прогрессу общества и науки. Последний особенно важен в XXI веке не только в целях национальной безопасности, но и для распространения революции и реализации социалистической программы, которая может быть полностью достигнута только при условии достижения наукой и технологией определенного уровня развития."
 BLR_soviet_academy_of_sciences: "Советская академия наук"
 BLR_soviet_academy_of_sciences_desc: "Советская академия наук была ведущим научным учреждением Советского Союза. Наши лучшие и самые талантливые умы вновь будут неустанно трудиться здесь, чтобы достичь технологических и научных прорывов, которые однажды сделают нас предметом зависти капиталистического мира!"
 BLR_the_culture_of_proletarianism: "Культура пролетаризма"
 BLR_the_culture_of_proletarianism_desc: "Пришло время взращивать пролетарскую культуру для рабочего класса, с помощью которой мы вместе будем двигаться к общему, прекрасному коммунистическому будущему."
 BLR_empower_the_kgb: "Расширить влияние КГБ"
 BLR_empower_the_kgb_desc: "Мы намерены расширить влияние КГБ в нашей стране, чтобы враг не смог подорвать нашу внутреннюю систему. Поэтому мы предоставим ему еще больше полномочий для осуществления нашей деятельности."
 BLR_erase_nationalist: "Посадить всех националистов в тюрьму"
 BLR_erase_nationalist_desc: "Пришло время искоренить националистические ячейки в нашей стране."
 BLR_the_litbel_start: "Возрождение Литбела"
 BLR_the_litbel_start_desc: "Литва — советская республика, возникшая на короткое время во время Гражданской войны в России. Перспектива объединения сил с нашими литовскими братьями звучит для нас очень заманчиво."
 BLR_peaceful_litbel: "Мир без войны"
 BLR_peaceful_litbel_desc: "Мы подготовили всё необходимое. Все агенты, все завербованные граждане и политики находятся на своих местах. Пришло время освободить Литву от оккупации марионеточного правительства."
 BLR_the_litbel: "Государство двух народов"
 BLR_the_litbel_desc: "Пришло время нам стать единой страной двух народов – белорусского и литовского."
 BLR_dissolve_monasteries: "Роспуск монастырей"
 BLR_dissolve_monasteries_desc: "Мы полностью очистим нашу страну от религии!"
 BLR_support_of_the_worker: "Поддержка рабочих"
 BLR_support_of_the_worker_desc: "Рабочий класс — наша опора и сила. Мы всегда будем поддерживать его в борьбе против капиталистической заразы!"
 BLR_litbel_attack_lat: "Белорусская Латгалия"
 BLR_litbel_attack_lat_desc: "Земли Латгале давно отняты у нас Латвией. Пришло время положить конец этой несправедливости."
 BLR_litbel_annex_lat: "Конец Латвийского государства"
 BLR_litbel_annex_lat_desc: "Латгальские земли снова наши."
 BLR_presidential_election_of_2001: "Политическая сфера"
 BLR_presidential_election_of_2001_desc: "Пришло время решить, кто возглавит нашу страну в новом тысячелетии."
 BLR_Andrey_sannikov: "§YНа пути западной демократии§!"
 BLR_Andrey_sannikov_desc: "Наша страна избрала нового лидера. Теперь он поведет нас в светлое демократическое будущее."
 BLR_Join_GUAM: "Присоединиться к ГУАМУ"
 BLR_Join_GUAM_desc: "Вступление в ГУАМ позволит нам укрепить связи на постсоветском пространстве."
 BLR_American_Protection: "Американская защита"
 BLR_American_Protection_desc: "Нам нужна помощь Америки, потому что Россия вряд ли проигнорирует наши действия."
 BLR_Linking_foreign_currency: "Переход к Евро"
 BLR_Linking_foreign_currency_desc: "Необходимо устранить нестабильность нашей валюты. Мы привяжем нашу валюту к евро."
 BLR_closed_border_with_Russia: "Закрытие границы с Россией"
 BLR_closed_border_with_Russia_desc: "Мы снова устанавливаем пограничные посты с Россией. Никто с территории России не сможет свободно въезжать в нашу страну."
 BLR_NATO_Membership_Campaign: "Кампания по вступлению в НАТО"
 BLR_NATO_Membership_Campaign_desc: "Пришло время начать кампанию по подготовке к вступлению в НАТО."
 BLR_USA_military_Cooperation: "Военно-техническое сотрудничество США"
 BLR_USA_military_Cooperation_desc: "Сотрудничество с Соединенными Штатами в военно-технической сфере сулит нам значительные преимущества."
 BLR_Invite_NATO_advisors: "Пригласить военных советников НАТО"
 BLR_Invite_NATO_advisors_desc: "Теперь, когда мы полностью реформировали наше военное командование, мы пригласим военных советников НАТО."
 BLR_USAD_request: "Запросить USAID"
 BLR_USAD_request_desc: "Мы решили обратиться за поддержкой в ​​USAID."
 BLR_Military_Exercises_NATO: "Военные учения с НАТО"
 BLR_Military_Exercises_NATO_desc: "Наша армия проведет свои первые совместные учения с НАТО."
 BLR_NATO_integration_command: "Интеграционное командование НАТО"
 BLR_NATO_integration_command_desc: "Создание Командования по интеграции НАТО — это наш следующий шаг на пути к вступлению в Альянс."
 BLR_Request_NATO_membership: "Запросить членство в НАТО"
 BLR_Request_NATO_membership_desc: "Пришло время подать заявку на членство в НАТО."
 BLR_western_diplomats: "Западные дипломаты"
 BLR_western_diplomats_desc: "Нас посетили дипломаты из западных стран и поздравили с одержанной победой. Теперь Беларусь может выбрать путь на Запад."
 BLR_denied_sanctions: "Отмена санкций"
 BLR_denied_sanctions_desc: "Теперь, когда мы провели легитимные выборы, все санкции против нас будут сняты."
 BLR_people_rights: "Права человека"
 BLR_people_rights_desc: "Мы обязаны уважать права и свободы нашего народа."
 BLR_Freedom_Meetings: "Свобода собраний"
 BLR_Freedom_Meetings_desc: "Право на собрания и встречи должно быть гарантировано."
 BLR_dont_torture: "Реформа здравоохранения"
 BLR_dont_torture_desc: "Качественное здравоохранение — одна из самых основных потребностей наших граждан. Обеспечивая его, мы сможем построить лучшую страну."
 BLR_EU_integration: "Интеграция в ЕС"
 BLR_EU_integration_desc: "Мы намерены интегрироваться в Европейский Союз."
 BLR_Attract_European_investments: "Привлечение европейских инвестиций"
 BLR_Attract_European_investments_desc: "Мы готовы привлечь европейских инвесторов для улучшения нашей экономики."
 BLR_Opening_garment: "Открытие швейных фабрик популярных брендов"
 BLR_Opening_garment_desc: "Мы готовы наладить производство одежды популярных брендов на территории нашей страны."
 BLR_simplification_labor_code: "Упрощение Трудового кодекса"
 BLR_simplification_labor_code_desc: "Необходимо изменить нормы трудового законодательства, чтобы работники не могли постоянно прибегать к профсоюзам вместо работы."
 BLR_Encourage_Exchange_Students_desc: "Наши студенты готовы принять участие в программе обмена с европейскими коллегами."
 BLR_Adopt_EU_Intellectual: "Принять законы ЕС об интеллектуальной собственности"
 BLR_Adopt_EU_Intellectual_desc: "Необходимо принять законы ЕС об интеллектуальной собственности, чтобы соответствовать европейским стандартам в этой области"
 BLR_Digitalization: "Оцифровка"
 BLR_Digitalization_desc: "Для повышения качества производственных процессов необходимо их оцифровать."
 BLR_political_platforms: "Создание политических платформ для иностранных компаний"
 BLR_political_platforms_desc: "Возможно, нам следует разрешить иностранным компаниям доступ к нашим политическим платформам?"
 BLR_Custom_Institutional_reforms: "Биотопливо"
 BLR_Custom_Institutional_reforms_desc: "Альтернативные источники топлива могут помочь нам снизить нашу зависимость от тех стран, с которыми мы не хотели бы иметь никаких дружественных связей."
 BLR_Market_Economy: "Функциональная рыночная экономика"
 BLR_Market_Economy_desc: "Полноценная рыночная экономика — это то, к чему мы стремимся, и именно так должна функционировать европейская и демократическая страна."
 BLR_Delete_KGB2: "Распустить КГБ"
 BLR_Delete_KGB2_desc: "Мы заменим КГБ новой структурой - Службой национальной безопасности. Эта организация будет набрана из сотрудников, лояльных нашим западным идеалам"
 BLR_US_money: "Американские инвестиции"
 BLR_US_money_desc: "Нам нужны деньги для дальнейшего укрепления демократии в нашей стране."
 BLR_join_wto: "Вступление в ВТО"
 BLR_join_wto_desc: "Вступление во ВТО предоставит нам множество преимуществ и доступ к международным рынкам."
 BLR_release_political_prisoners: "Освободить политических заключенных"
 BLR_release_political_prisoners_desc: "При предыдущем правительстве многие люди были заключены в тюрьму по политическим мотивам. Мы это исправим."
 BLR_baltic_economic_cooperation: "Торговое партнерство со странами Балтии"
 BLR_baltic_economic_cooperation_desc: "Наши ближайшие соседи — отличные торговые партнеры. Их прибрежное расположение и общие границы дают нам веские основания для улучшения торговых отношений."
 BLR_root_out_nationalists: "Избавиться от националистов"
 BLR_root_out_nationalists_desc: "Националисты всегда были проблемой в нашей стране. Они приведут лишь к нестабильности, и пора с ними разобраться."
 BLR_decommunize_belarus_society: "Декоммунизация белорусского общества"
 BLR_decommunize_belarus_society_desc: "Советское наследие необходимо оставить позади. Пришло время принять прогрессивный Запад."
 BLR_fight_the_oligarchs: "Борьба с олигархами"
 BLR_fight_the_oligarchs_desc: "Мы не можем позволить олигархам оставаться у власти в нашей стране, иначе мы точно не увидим экономического роста."
 BLR_European_university_connections: "Европейское образование"
 BLR_European_university_connections_desc: "Мы готовы приветствовать европейские университеты в нашей стране, чтобы повысить качество образования для наших студентов."
 BLR_LGBT_Belarus_quest: "Проблема ЛГБТ в Беларуси"
 BLR_LGBT_Belarus_quest_desc: "Наше правительство включило проблему ЛГБТ в повестку дня, потому что мы не можем игнорировать эту тенденцию. Что мы будем делать?"
 BLR_Offshore_heaven: "Налоговые льготы для иностранных инвесторов"
 BLR_Offshore_heaven_desc: "Мы создадим благоприятные условия для инвестиций в нашей стране, которые привлекут множество инвесторов."
 BLR_wind_farms: "Ветряные электростанции"
 BLR_wind_farms_desc: "Мы построили несколько ветропарков в районах Минска."
 BLR_Hajdukiewicz: "§YГайдукевич§!"
 BLR_Hajdukiewicz_desc: "Сергей Васильевич Гайдукевич (родился 8 сентября 1954 года) — белорусский политик и общественный деятель, лидер Либерально-демократической партии Беларуси. Он — полковник запаса, известный своей пророссийской позицией. Он выступает за конфедерацию с Россией и введение единой валюты с эмиссионным центром в Москве, а также за проведение совместной военной политики."
 BLR_Spiritual_revival: "Духовное возрождение Беларуси"
 BLR_Spiritual_revival_desc: "Процесс духовного возрождения Беларуси должен продолжаться. Роль Православной Церкви и Римско-католической Церкви в обществе должна возрастать."
 BLR_Ban_Enemies: "Борьба с внутренними врагами"
 BLR_Ban_Enemies_desc: "Мы должны полностью очистить политическое поле в нашей стране. Никакие деструктивные партии, финансируемые из-за рубежа, не должны препятствовать развитию нашей страны."
 BLR_Russian_Oligarch: "Дружба с российскими олигархами"
 BLR_Russian_Oligarch_desc: "Российские олигархи обладают огромным состоянием. Думаю, стоит попытаться завоевать их расположение."
 BLR_Hardline_EuroScepticism: "Жесткий евроскептицизм"
 BLR_Hardline_EuroScepticism_desc: "Необходим жесткий евроскептицизм, потому что Европа хочет видеть Беларусь слабой."
 BLR_Belarusian_nation_law: "Белорусское национальное законодательство"
 BLR_Belarusian_nation_law_desc: "Наша страна давно заслужила право на самоопределение. Мы — народ с богатой историей, и мы должны двигаться к светлому будущему как суверенное государство."
 BLR_russian_education: "Российское образование"
 BLR_russian_education_desc: "Наши университеты должны наладить связи с российскими. Таким образом, мы сможем предложить образование в российском стиле каждому."
 BLR_Son_will_rule: "Пусть правит сын"
 BLR_Son_will_rule_desc: "Пришло время сменить лидера. Теперь партию и страну возглавит сын Сергея Гайдукевича."
 BLR_rus_media: "Впустить российские СМИ"
 BLR_rus_media_desc: "Мы разрешим российским СМИ въезд на нашу территорию без ограничений."
 BLR_russian_fsb: "Открытие представительств ФСБ"
 BLR_russian_fsb_desc: "ФСБ будет сотрудничать с нашими спецслужбами и обеспечит нам большую политическую стабильность."
 BLR_science_boost: "Инвестиции в науку"
 BLR_science_boost_desc: "Научные исследования должны финансироваться из государственного бюджета в максимально возможной степени."
 BLR_support_promka: "Поддержка отечественной промышленности"
 BLR_support_promka_desc: "Мы будем поддерживать отечественную промышленность."
 BLR_boost_economic: "Ускорение экономического роста"
 BLR_boost_economic_desc: "Наши реформы приносят свои плоды, и экономика начала расти."
 BLR_anti_gibdd: "Анти-ЛГБТ политика"
 BLR_anti_gibdd_desc: "Мы отвергаем и будем бороться с ЛГБТ-пропагандой в нашей стране."
 BLR_union_state_course: "Курс на Союзное государство"
 BLR_union_state_course_desc: "Наша цель — государство, входящее в состав Союза, и мы будем к этому стремиться."
 BLR_support_army: "Поддержка армии"
 BLR_support_army_desc: "Мы будем поддерживать военных в нашей стране, потому что именно благодаря им наша страна сохраняет независимость."
 BLR_russian_tver: "Совместное производство с Тверским заводом"
 BLR_russian_tver_desc: "Мы закупим у России большое количество вагонов для наших железных дорог."
 BLR_russian_teplovzor: "Производство тепловизоров для России"
 BLR_russian_teplovzor_desc: "Мы начнем производство тепловизоров, которые сможем продавать и России для использования в ее вооруженных силах."
 BLR_cyphrovizacia: "Оцифровка"
 BLR_cyphrovizacia_desc: "Мы начнём свой путь к цифровой экономике."
 BLR_russian_uvz: "Подписание эксклюзивных контрактов с УВЗ"
 BLR_russian_uvz_desc: "Партнерство с этим известным предприятием принесет нам значительные выгоды."
 BLR_all_cyphro: "Полная оцифровка"
 BLR_all_cyphro_desc: "Цифровизация многих государственных процессов поможет нам более эффективно взаимодействовать с гражданами и решать возникающие проблемы."
 BLR_kalash_zavod: "Открытие оружейного завода им. Калашникова"
 BLR_kalash_zavod_desc: "Мы будем производить продукцию этого известного бренда внутри страны."
 BLR_Union_state_again: "И снова Союзное государство"
 BLR_Union_state_again_desc: "Мы готовы вновь стать частью России."
 BLR_union_become_one: "Союз станет единым целым"
 BLR_Lykashenko: "§YЛукашенко§!"
 BLR_Lykashenko_desc: "Александр Григорьевич Лукашенко (родился 30 августа 1954 года) — белорусский политик, государственный деятель и военачальник. Он занимает пост президента Беларуси и главнокомандующего Вооруженными силами с 20 июля 1994 года. Он известен своими пророссийскими взглядами. В белорусском и русскоязычном обществах он известен под прозвищем «Батка»."
 BLR_GrodnoAzot: "Гродно Азот"
 BLR_GrodnoAzot_desc: "Химволокнский филиал ОАО «Гродно Азот» — крупный производитель полиамидных и полиэфирных нитей и волокон, а также полиамида-6 (ПА-6) и полимерных композитных материалов на его основе. Каждый из основных видов продукции выпускается в широком ассортименте с различными физико-механическими свойствами и показателями качества в зависимости от области применения."
 BLR_PinskDrev: "Финансы \"ПинскДрев\""
 BLR_PinskDrev_desc: "«ПинскДрев» — крупное деревообрабатывающее предприятие в Беларуси и старейшее в Пинске. Мы должны финансировать его деятельность, чтобы оно могло развиваться дальше."
 BLR_AirPort_minsk: "Расширение международного аэропорта"
 BLR_AirPort_minsk_desc: "Мы готовы вложить значительные финансовые ресурсы в расширение Минского аэропорта."
 BLR_dai_denyag: "Запросить кредит у России"
 BLR_dai_denyag_desc: "Мы обратимся к российскому правительству с просьбой предоставить нам кредит."
 BLR_ros_atom: "РОСАТОМ"
 BLR_ros_atom_desc: "Мы пригласим специалистов Росатома к сотрудничеству в области атомной энергетики"
 BLR_Impact_kgb: "Влияние КГБ"
 BLR_Impact_kgb_desc: "КГБ использует различные методы для устранения тех, кто недоволен избранием нового президента."
 BLR_Liquidation_pub_assoc: "Ликвидация общественных объединений"
 BLR_Liquidation_pub_assoc_desc: "КГБ активно занимается ликвидацией или пытается ликвидировать общественные организации, которые вызывают неприятие у нашего президента."
 BLR_crackdown_opp_rall: "Разгон митингов оппозиции"
 BLR_crackdown_opp_rall_desc: "Мы активно разгоняем митинги наших политических оппонентов, недовольных результатами выборов."
 BLR_Increased_censorship: "Усилить цензуру в СМИ"
 BLR_Increased_censorship_desc: "Необходимо ввести жесткую цензуру в отношении средств массовой информации, чтобы наши оппоненты не могли вести против нас агитацию."
 BLR_concept_national_security_Belarus: "Концепция национальной безопасности"
 BLR_concept_national_security_Belarus_desc: "Настоящая концепция устанавливает свод официальных взглядов на сущность и содержание деятельности Республики Беларусь по обеспечению баланса интересов личности, общества и государства и их защиты от внутренних и внешних угроз"
 BLR_Economic_development_2001_2005: "Программа социально-экономического развития"
 BLR_Economic_development_2001_2005_desc: "Программа социально-экономического развития Республики Беларусь на 2001-2005 годы. разработан Министерством экономики Республики Беларусь совместно с другими министерствами и республиканскими органами государственного управления, областными исполнительными комитетами и Минским горисполкомом при участии Национальной академии наук, Национального банка, специализированных научно-исследовательских институтов и общественных организаций в соответствии с Законом Республики Беларусь \"О государственном прогнозировании и программах социально-экономического развития Республики Беларусь\" и постановлениями Совета Министров Республики Беларусь от 2 февраля 2000 г. N 141 и от 10 августа 2000 г. N 1248 \"о разработке Программы социально-экономического развития Республики Беларусь на 2001-2005 годы\"."
 BLR_reforms_Belarusian_Railway: "Реформы Белорусской железной дороги"
 BLR_reforms_Belarusian_Railway_desc: "Наши железные дороги находятся в очень плохом состоянии, поэтому мы проведем ряд реформ для улучшения ситуации."
 BLR_new_railway_station: "Новый железнодорожный вокзал Минска"
 BLR_new_railway_station_desc: "В Минске построен новый железнодорожный вокзал. Теперь наш город сможет принимать больше поездов."
 BLR_Electrification_Myslishche_Kryzhovka: "Электрификация железной дороги Мыслище — Крыжовка"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "Линия Мыслыще-Крыжовка является одним из важнейших приоритетов развития нашей страны, поэтому мы займемся ею в первую очередь."
 BLR_Baranovichi_Plant: "Барановичский завод строительных деталей и конструкций"
 BLR_Baranovichi_Plant_desc: "Мы создаём структурное подразделение на Барановичском заводе строительных деталей и конструкций, чтобы улучшить снабжение наших поездов комплектующими."
 BLR_Energy_conflict_over: "Продажа Белгазтранса"
 BLR_Energy_conflict_over_desc: "Конфликт подходит к концу. Мы согласились с условиями России и готовы продать «Белгазтранс». Взамен для нас будет стабилизирована цена на энергоносители."
 BLR_new_rolling_stock: "Покупка нового подвижного состава"
 BLR_new_rolling_stock_desc: "Приобретя новый подвижной состав, мы устраним главную проблему, которая преследует наши железные дороги."
 BLR_promise_first_nuclear: "Обещание построить атомную электростанцию"
 BLR_promise_first_nuclear_desc: "Мы обещаем всем нашим гражданам, что на территории нашей страны будет построена атомная электростанция, что обеспечит нашу энергетическую безопасность."
 BLR_New_Land_code: "Новый земельный кодекс"
 BLR_New_Land_code_desc: "Новый Земельный кодекс значительно упрощает приобретение земли частными лицами и компаниями, что, несомненно, привлечет определенный сегмент населения."
 BLR_Zubr_Energy_LLC: "Открытие ООО \"Зубр Энерджи\""
 BLR_Zubr_Energy_LLC_desc: "Завод по производству стартерных аккумуляторов для поставки на конвейерные линии мировых и отечественных автопроизводителей."
 BLR_Hi_Tech_Park: "Парк высоких технологий"
 BLR_Hi_Tech_Park_desc: "Парк высоких технологий — это особый налогово-правовой режим для развития IT-бизнеса в Беларуси. Это не свободная (специальная, особая) экономическая зона, а юрисдикция, действующая по принципу экстерриториальности. Компании и индивидуальные предприниматели, зарегистрированные в Парке, могут пользоваться предоставленными им льготами независимо от местонахождения их белорусского офиса."
 BLR_Referendum_Belarus_2004: "Референдум в Беларуси 2004 года"
 BLR_Referendum_Belarus_2004_desc: "17 октября 2004 года в Беларуси состоялся третий республиканский референдум, инициированный президентом Лукашенко в истории независимой Беларуси. Референдум был назначен Указом Президента 431 от 7 сентября 2004 года и был совмещён с парламентскими выборами."
 BLR_Energy_conflict: "Российско-белорусский энергетический конфликт"
 BLR_Energy_conflict_desc: "Конфликт начался в декабре 2006 года, когда \"Газпром\" объявил окончательный вариант цены на природный газ для Республики Беларусь в размере 105 долларов за 1000 м3. Более того, 75 долларов выплачиваются наличными, а Беларусь имела бы право оплатить оставшимися 30 акциями \"Белтрансгаза\", которые оценивались в 5 миллиардов долларов."
 BLR_Decree_n3: "Декрет о тунеядстве"
 BLR_Decree_n3_desc: "Никто больше не будет сидеть без дела, получая государственные пособия. Пришло время заставить все бездействующие средства работать."
 BLR_launch_own_satellite: "Беларусь запустила собственный спутник"
 BLR_launch_own_satellite_desc: "Белорусский спутник дистанционного зондирования Земли был запущен 22 июля 2012 года с космодрома Байконур в Казахстане - в составе кластера из пяти космических аппаратов: вместе с российскими Canopus-V и MKA-FKI (Zond-PP), немецким TET-1 и канадским ADS-1B."
 BLR_gasification_country: "Завершение газификации страны"
 BLR_gasification_country_desc: "Мы завершим газификацию нашей страны, что, несомненно, оценят наши граждане."
 BLR_CJSC_Turkcell: "Сделка с Turkcell"
 BLR_CJSC_Turkcell_desc: "Между нами и нашими турецкими партнерами будет заключена важная сделка — продажа контрольного пакета акций ЗАО «BeST» компании Turkcell. Это откроет еще один путь для инвестиций в нашу страну."
 BLR_Anti_Corruption: "Антикоррупционная кампания"
 BLR_Anti_Corruption_desc: "Мы должны победить коррупцию в нашей стране. Главное — не оказаться втянутым в это самому."
 BLR_Punish_Shushkevich: "Накажите приспешников Шушкевича"
 BLR_Punish_Shushkevich_desc: "Шушкевич оставил нам в наследство своих верных сторонников в правительстве. Пора от них избавиться."
 BLR_State_Run_Capitalism: "Государственный капитализм"
 BLR_State_Run_Capitalism_desc: "Государство должно полностью контролировать экономическую политику страны."
 BLR_reform_officers: "Открыть новые офицерские школы"
 BLR_reform_officers_desc: "Одним из приоритетов наших военных реформ является повышение качества подготовки офицеров."
 BLR_peace_rota: "Создать миротворческую компанию"
 BLR_peace_rota_desc: "Мы создадим специальное подразделение для участия в миротворческих миссиях."
 BLR_Promote_new_officers: "Продвигать новых офицеров"
 BLR_Promote_new_officers_desc: "Мы завершим комплекс мер по преобразованию наших вооруженных сил, начатый в 1994 году."
 BLR_Internet_cencorship: "Интернет-цензура"
 BLR_Internet_cencorship_desc: "Интернет превратился в платформу, где открыто обсуждаются настроения, направленные на свержение правительства. Необходимо это контролировать."
 BLR_kgb: "КГБ"
 BLR_Batka_policy: "Интернет-цензура"
 BLR_Batka_policy1: "Декрет о паразитизме"
 BLR_Batka_policy2: "Интернет-политика Беларуси"
 BLR_Batka_policy3: "Интернет-политика Беларуси"
 BLR_Raiffeisen2: "Райффайзен в Беларуси"
 BLR_Raiffeisen2_desc: "Основанный в 1989 году, Priorbank с 2003 года является дочерней компанией Резервного банка Индии (RBI). Это один из крупнейших местных частных банков и одно из ведущих финансовых учреждений страны по эффективности и прибыльности. Будучи универсальным банком, он обслуживает корпоративных клиентов, малые и средние предприятия, а также частных лиц."
 BLR_Henkel2: "Хенкель"
 BLR_Henkel2_desc: "Подразделение строительной химии концерна Хенкель в Беларуси, ООО \"Хенкель Баутехник\", было создано в 2004 году с целью организации производства импортозамещающей продукции. В 2005 году началось строительство завода по производству строительных смесей Ceresit в Заславле, производство было запущено в сентябре 2006 года. Ассортимент продукции компании насчитывает более 100 наименований, в том числе готовые системы облицовки, теплоизоляции и отделки фасадов, системы напольных покрытий и гидроизоляции, материалы для подготовки поверхности к отделке, герметики, монтажная пена, \"жидкие гвозди\", штукатурки."
 BLR_Jeans_Revolution: "Джинсовая революция"
 BLR_Jeans_Revolution_desc: "Массовый протестный митинг в центре Минска и других городов Беларуси, начавшийся 19 марта 2006 года в ответ на фальсификацию властями результатов президентских выборов, состоявшихся ранее."
 BLR_reform_kolhoz: "Колхозные реформы"
 BLR_reform_kolhoz_desc: "Необходимо реформировать колхозы, чтобы обеспечить стабильность нашей агропромышленности."
 BLR_Eastern_Partnership: "Восточное партнерство"
 BLR_Eastern_Partnership_desc: "«Восточное партнерство» — это проект Европейского союза, главная заявленная цель которого — развитие интеграционных связей Европейского союза с шестью странами бывшего СССР: Азербайджаном, Арменией, Беларусью, Грузией, Молдовой и Украиной."
 BLR_Azarenok_case: "Дело Игоря Азаренка"
 BLR_Azarenok_case_desc: "Генерала Азаренока подозревали в лоббировании российских интересов в Республике Беларусь посредством взяток и других мошеннических действий. Стоит ли обращать на это внимание?"
 BLR_National_Library: "Новое здание Национальной библиотеки"
 BLR_National_Library_desc: "Новое здание Национальной библиотеки Беларуси, в строительстве которого принимала участие вся страна, было открыто для пользователей 16 июня 2006 года"
 BLR_delta_city: "Бизнес-центр \"Дельта Сити\""
 BLR_delta_city_desc: "В ходе Национальной выставки Сербии в Минске был подписан крупный контракт на строительство бизнес-центра «Дельта-Сити» и освоение территории рядом с Национальной библиотекой с общим объемом инвестиций в несколько миллиардов евро (застройщиком является компания «Дана Холдингс», принадлежащая сербским бизнесменам)."
 BLR_Kal: "Совместная торговля калием"
 BLR_Kal_desc: "Мы предложим России создание акционерного общества, которое станет нашим общим торговцем калием."
 BLR_Kal2: "Закрыть совместную торговлю калием"
 BLR_Kal2_desc: "Недавние уголовные дела, возбужденные нами против сотрудников российской компании «Уралкали», а также злоупотребления ими служебным положением, вынудили нас закрыть совместное предприятие и создать собственное."
 BLR_BRSM_desc: "Белорусский республиканский союз молодежи - молодежное общественное объединение в Республике Беларусь. Это крупнейшее молодежное объединение в стране, которое поддерживается Александром Лукашенко. Его деятельность финансируется государством."
 BLR_Potato_Empire: "Картофельная империя"
 BLR_Potato_Empire_desc: "Мы являемся одним из ведущих экспортеров картофеля в мире. Наша страна может этим гордиться."
 BLR_Factory_Kommunarka: "Национализировать завод \"Коммунарка\""
 BLR_Factory_Kommunarka_desc: "Наш президент считает, что приватизация кондитерской фабрики «Коммунарка» была незаконной, поэтому было объявлено о национализации этого предприятия."
 BLR_Another_year: "Еще один год независимости"
 BLR_Another_year_desc: "Беларусь продолжит проводить свою независимую политику."
 BLR_Migrant_crisis: "Миграционный кризис"
 BLR_Migrant_crisis_desc: "Миграционный кризис на границе Беларуси возник из-за притока нелегальных мигрантов, в основном из Ирака и Сирии, в меньшей степени из Афганистана и африканских стран (согласно статистике Польской пограничной службы), пытающихся попасть в страны ЕС (Литву, Латвию, Польшу)."
 BLR_gudermes: "Отправить ОМОН на обучение в чеченский Гудермес"
 BLR_gudermes_desc: "Надо бы присмотреться к этому знаменитому университету спецназа. Возможно, наши бойцы смогут повысить свою квалификацию."
 BLR_Another_Elections: "И снова выборы"
 BLR_Another_Elections_desc: "Следующие выборы в нашей стране уже не за горами. Кто победит?"
 BLR_Bye_opposition: "Никакой пощады оппозиции"
 BLR_Bye_opposition_desc: "Мы делаем то, что делаем всегда — быстро и жестко расправляемся с оппозицией."
 BLR_Milk_war: "Молочные войны"
 BLR_Milk_war_desc: "Серия обострений отношений между Беларусью и Россией, вызванных спорами по поводу экспорта молочной продукции в Россию."
 BLR_jeans_revolution: "Джинсовая революция"
 BLR_jeans_revolution_desc: "Люди недовольны предстоящими выборами. Они якобы не верят в победу Александра Лукашенко. Что будет дальше?"
 BLR_Changes_Customs_policy: "Изменение таможенной политики"
 BLR_Changes_Customs_policy_desc: "Введены новые изменения и ограничения, призванные усложнить ввоз контрафактной продукции в нашу страну."
 BLR_whitelegion_case: "Дело Белого легиона"
 BLR_whitelegion_case_desc: "Наши спецслужбы доложили о большой активности представителей Белого Легиона. Необходимо поймать их и посадить в тюрьму."
 BLR_PolBel_Dplomatic_war: "Польско-белорусская дипломатическая война"
 BLR_PolBel_Dplomatic_war_desc: "Несмотря на потепление отношений, конфликт с Польшей разгорается с прежней силой."
 BLR_project_bombel: "Проект БОМБЕЛ"
 BLR_project_bombel_desc: "Европейский союз выделил средства на укрепление границы между Беларусью и ЕС для предотвращения притока нелегальных мигрантов. Наша компания решает, как использовать эти средства."
 BLR_Investing_Agro_industry: "Инвестиции в агропромышленный комплекс"
 BLR_Investing_Agro_industry_desc: "Агропромышленность является важной составляющей экономики нашей страны, и мы продолжим наращивать инвестиции в этот сектор."
 BLR_fate_belarusian_church: "Судьба Белорусской церкви"
 BLR_fate_belarusian_church_desc: "Нам следует решить, в каком направлении будет развиваться наша церковь."
 BLR_Pension_reform: "Пенсионная реформа"
 BLR_Pension_reform_desc: "Пришло время провести пенсионную реформу и повысить пенсионный возраст."
 BLR_New_concept_security: "Новая концепция национальной безопасности"
 BLR_New_concept_security_desc: "Наша концепция защиты нуждается в обновлении, и мы внесем необходимые изменения в наше законодательство."
 BLR_Zimbabwe: "Поездка в Зимбабве"
 BLR_Zimbabwe_desc: "Мы посетим Зимбабве для заключения контрактов на поставку нашей продукции."
 BLR_100dney: "100 идей для Беларуси"
 BLR_100dney_desc: "Проект «100 идей для Беларуси» был направлен на выявление одаренной и талантливой молодежи, развитие их научной деятельности и содействие перспективным инновационным разработкам."
 BLR_stroiotryad: "Возродить студенческий строительный отряд"
 BLR_stroiotryad_desc: "Мы возродим практику студенческих строительных бригад советской эпохи. В качестве поощрения мы освободим их от налогов."
 BLR_People_Militia: "Создание народного ополчения"
 BLR_People_Militia_desc: "Мы готовы принять закон о создании народного ополчения, которое станет своего рода резервом для территориальной обороны. В каждом селе должна быть подготовленная группа людей для противостояния врагу, с последующим преобразованием в партизанское движение."
 BLR_Excursion_Warsaw: "Экскурсия в Варшаву"
 BLR_Excursion_Warsaw_desc: "Бойцы Вагнера активно агитируют и выражают желание организовать «экскурсию» в Варшаву. Мы можем помочь им в этом. Пересечение границы с нашей территории теоретически возможно, но объявит ли Польша нам войну после этого?"
 BLR_azarenok_tv: "Новый пропагандист Лукашенко"
 BLR_azarenok_tv_desc: "Сейчас по телевидению часто можно увидеть нового пропагандиста, который выступает от имени нашей партии и убеждает людей в правильности наших действий."
 BLR_Wagner_arrest: "Ситуация с ЧВК Вагнера"
 BLR_Wagner_arrest_desc: "Наши спецслужбы арестовали боевиков из известной российской частной военной компании «Вагнер». Нам предстоит решить, что с ними делать."
 BLR_decree_227: "Указ N 227 \"Об оказании охранных услуг\""
 BLR_decree_227_desc: "Новый указ N 227 вызвал немалый ажиотаж во многих СМИ. Впервые мы разрешили частной компании принимать оружие для охраны объектов. Неужели это к чему-то приведёт?"
 BLR_Country_for_life: "Страна для жизни"
 BLR_Country_for_life_desc: "Наше правительство решило более хитро расправиться с оппозицией, переманивая на нашу сторону её видных деятелей. Один из них — Сергей Тихановский, организатор проекта «Страна за жизнь». После последовавших событий, вместо ареста, мы публично пригласили его в правительство, где он мог бы помочь улучшить нашу страну. Сама оппозиция будет расколота таким шагом."
 BLR_Amendment_to_Constitution: "Серьезные изменения в Конституции"
 BLR_Amendment_to_Constitution_desc: "Наш постоянный лидер Александр Лукашенко признал, что стране необходимы радикальные перемены и что настало время отойти от единоличной президентской власти. Объявлен референдум об изменении конституции, в соответствии с которым основная власть будет принадлежать парламенту."
 BLR_army_on_streets_of_cities: "Массовые протесты"
 BLR_army_on_streets_of_cities_desc: "Народ восстал против нас. Они считают, что наше правительство фальсифицирует результаты выборов и разрушает страну. Надеюсь, мы хорошо подготовились к таким событиям."
 BLR_anti_lgbtqa_stance: "Анти-ЛГБТ политика"
 BLR_Pazniak: "§YПозняк§!"
 BLR_Pazniak_desc: "Националистические силы захватили власть в стране. Куда они поведут Беларусь — к светлому будущему или к краху страны?"
 BLR_rofeign_legion: "Иностранный легион"
 BLR_rofeign_legion_desc: "Мы воспользуемся опытом французов и создадим собственный Иностранный легион."
 BLR_debur: "Дебюрократизация"
 BLR_debur_desc: "Мы сократим расходы на чиновников и уменьшим их численность, а высвободившиеся средства пойдут на благо народа."
 BLR_patriotism_desc: "Пришло время повысить уровень патриотического воспитания в нашей стране."
 BLR_Belarusisation: "Белорусизация"
 BLR_Belarusisation_desc: "Вся литература и все официальные названия должны быть на белорусском языке."
 BLR_Democratic_clean: "Чистки от демократов"
 BLR_Democratic_clean_desc: "Мы не собираемся становиться слугами Запада. Пришло время очистить нашу страну от демократов."
 BLR_Communistst_clean: "Чистка от коммунистов"
 BLR_Communistst_clean_desc: "Наследие СССР должно быть уничтожено. Пришло время изгнать этих приверженцев красной заразы."
 BLR_denied_rus_language: "Запретить русский язык"
 BLR_denied_rus_language_desc: "Русский язык больше не будет вторым государственным языком. С нас хватит российской оккупации."
 BLR_anti_immigration_policies: "Антииммиграционная политика"
 BLR_anti_immigration_policies_desc: "Внедрение более жесткой антииммиграционной политики позволит сохранить белорусскую идентичность."
 BLR_russofobia: "Антироссийская политика"
 BLR_russofobia_desc: "Пришло время разобраться с общим врагом — Россией. Пришло время обуздать её империалистические амбиции по отношению к нам."
 BLR_decolectivisation: "Деколлективизация"
 BLR_decolectivisation_desc: "Пришло время избавиться от советского наследия и помочь населению переселиться в города."
 BLR_litvins_past: "Прошлое Литвинов"
 BLR_litvins_past_desc: "Историю изменить невозможно, и мы это знаем. Мы, литвины, гордые наследники Великого княжества Литовского"
 BLR_constitution_from_1994: "Конституция 1994"
 BLR_constitution_from_1994_desc: "Пришло время восстановить надлежащую конституцию в нашей стране."
 BLR_We_not_energy_slave: "Мы не рабы российских ресурсов"
 BLR_We_not_energy_slave_desc: "Россия предоставляла скидки лишь для поддержки своего марионеточного режима. С нас хватит. Мы готовы построить сильную экономику и без этих скидок."
 BLR_Influence_nationalists: "Влияние националистов"
 BLR_Influence_nationalists_desc: "Мы должны активно поддерживать националистические движения в соседних странах."
 BLR_Territorial_claims: "Территориальные претензии"
 BLR_Territorial_claims_desc: "Наша страна должна вернуться к своим истинным границам."
 BLR_white_legion_desc: "Белый легион — это спортивно-патриотическая организация Беларуси, основанная в 1995 году для допризывной подготовки и патриотического воспитания молодежи."
 BLR_white_legion_battalion: "Батальон Белого легиона"
 BLR_white_legion_battalion_desc: "Первый батальон Белого Легиона наконец-то сформирован. Истинные патриоты своей страны готовы сражаться за её свободу и силу."
 BLR_GDL: "Великое княжество Литовское"
 BLR_GDL_desc: "Пришло время восстановить великое государство Литвиновского народа. Наконец, наш народ не будет находиться под игом сверхдержавы; у него появится возможность самому стать сверхдержавой."
 BLR_help_silesians: "Помочь силезским сепаратистам"
 BLR_help_silesians_desc: "«Разделяй и властвуй» — главный принцип, который мы будем применять в нашей политике в отношении Польши. Когда начнётся активная фаза установления нашего контроля над поляками, силезцы могут помочь нам в завоевании этой страны."
 BLR_revansh_return: "Возродить Правый Реванш"
 BLR_revansh_return_desc: "«Правый Реванш» — националистическая организация 1990-х годов, которая исповедовала антипольскую и антироссийскую риторику и выступала за создание военизированных организаций по образцу украинских."
 BLR_blackcat: "Оживить Черную кошку"
 BLR_blackcat_desc: "«Чёрная кошка» — крупная партизанская организация, действовавшая на территории Беларуси в течение сорока лет и боровшаяся за независимость против советского правительства. Их методы хорошо послужат нам в обороне от вражеских вторжений."
 BLR_lith_again: "Назад в Земайтию"
 BLR_lith_again_desc: "Пришло время завершить восстановление нашего могущественного государства. Маленькая и слабая Литва стоит у нас на пути; мы её сломим. Но мы не можем нападать на страну без оснований; мы должны создать необходимые условия и предлог, чтобы наше вторжение не выглядело безосновательным."
 BLR_true_political_and_national_freedom: "Истинная политическая свобода"
 BLR_true_political_and_national_freedom_desc: "Истинная политическая свобода начинается с преодоления последствий разрушительных внутренних чисток. Пришло время двигаться вперед и достичь того, чего действительно желает наш народ."
 BLR_Taler_ruble: "Белорусский талер"
 BLR_Taler_ruble_desc: "Мы должны полностью отказаться от рубля, заменив его нашей новой валютой."
 BLR_National_science: "Национальная наука"
 BLR_National_science_desc: "Мы начнем развивать собственную науку и экономику как независимое государство."
 BLR_create_nationalsecurity: "Создание новых отделов"
 BLR_create_nationalsecurity_desc: "Вместо КГБ, унаследованного от СССР, мы создадим две новые структуры: Службу национальной безопасности и Службу национальной разведки."
 BLR_Delete_KGB: "Распустить КГБ"
 BLR_Delete_KGB_desc: "КГБ следует распустить и заменить новой структурой."
 BLR_Reform_Police: "Реформа полиции"
 BLR_Reform_Police_desc: "Советская милиция — это пережиток прошлого, от которого мы хотим избавиться. Мы реорганизуем её в национальную полицию по образцу польской."
 BLR_attack_russian_bear: "Прикончить русского медведя"
 BLR_attack_russian_bear_desc: "Наконец, наш главный враг будет уничтожен."
 BLR_zmagar_army: "Армейская реформа"
 BLR_zmagar_army_desc: "Наша армия нуждается в срочной реформе. Пока мы были заняты социально-политическими преобразованиями в стране, наши вооруженные силы были серьезно ослаблены."
 BLR_Young_Front_desc: "«Молодой фронт» — это международное молодежное движение белорусской молодежи и молодежная оппозиционная организация Беларуси."
 BLR_south_river_battalion: "Батальон Саут-Ривер"
 BLR_south_river_battalion_desc: "Батальон, собранный из жителей США из округа Саут-Ривер"
 BLR_territorial_reform: "Территориальная реформа"
 BLR_territorial_reform_desc: "Вместо сегодняшних 6 областей и 110 округов Зенон Позняк и команда авторов программы предлагают разделить страну на 16 воеводств, плюс Минск отдельно. Воеводства, в свою очередь, будут разделены на 60 провинций и 270 старых городов."
 BLR_anti_lgbt: "Запрет пропаганды порочных отношений"
 BLR_anti_lgbt_desc: "Мы принимаем закон о приоритете и защите семьи, брака (союза мужчины и женщины), материнства, о защите семьи от посягательств и вмешательства в семейные дела со стороны идеологии и организаций. Кроме того, предлагается принять закон \"Об охране человеческой природы\" и запретить пропаганду порочных отношений, направленных против естественной природы человека."
 BLR_latgale_or_war: "Латгалия или война"
 BLR_latgale_or_war_desc: "Латгале когда-то входила в состав Великого княжества Литовского. Пришло время вернуть эти земли нашему государству. Латвия вряд ли сможет нам противостоять."
 BLR_legacy_kurland: "Наследие герцогства Курляндского"
 BLR_legacy_kurland_desc: "Герцогство Курляндия когда-то играло важную роль в колонизационной гонке. Флаг герцогства развевался над Тринидадом и Тобаго и вдоль побережья Гамбии. Как законные наследники герцогства, настало время добиваться возвращения этих территорий в состав нашей империи и вернуть эти бывшие колониальные владения в ее лоно."
 BLR_pro_poland_propoganda: "Пробелурусская пропаганда в Польше"
 BLR_pro_poland_propoganda_desc: "Мы должны усилить наше влияние в Польше посредством пропаганды и других средств взаимодействия."
 BLR_Dismiss_soviet_officers: "Уволить просоветских офицеров"
 BLR_Dismiss_soviet_officers_desc: "Борьба с советским наследием должна распространяться и на армию. Нам не нужны генералы, симпатизирующие этому кровавому режиму."
 BLR_Anti_corruption_law: "Семья Пригожиных"
 BLR_Anti_corruption_law_desc: "Мы будем бороться с коррупцией во всех ее проявлениях."
 BLR_open_border_with_pol: "Открытые границы"
 BLR_open_border_with_pol_desc: "Открытие границ поможет нашим народам почувствовать связь не только экономическую, но и физическую"
 BLR_training_for_pol: "Совместные военные учения"
 BLR_training_for_pol_desc: "Нашим армиям необходима координация боевых действий. Совместные военные учения в этом значительно помогут."
 BLR_Asseco_Poland: "Польская Asseco"
 BLR_Asseco_Poland_desc: "Мы выкупим эту компанию и сделаем её собственностью нашего будущего государства белорусов и поляков."
 BLR_ynia_Poland: "Вторая Люблинская уния"
 BLR_ynia_Poland_desc: "Пришло время вспомнить, насколько унизительной была Люблинская уния для Великого княжества Литовского. На этот раз все будет иначе."
 BLR_Ukraine_way: "Дружба с Украиной"
 BLR_Ukraine_way_desc: "Несмотря на наши территориальные претензии, мы готовы вести диалог с Украиной против общих врагов. Возможно создание альянса, который поможет нашим государствам выжить в условиях окружения противниками."
 BLR_Join_GUAM_to_Ukraine: "Присоединиться к ГУАМУ"
 BLR_Join_GUAM_to_Ukraine_desc: "Одним из наших первых дружественных шагов навстречу Украине станет вступление в ГУАМ, организацию, в которой Украина играет ведущую роль."
 BLR_training_with_ukr: "Совместные военные учения"
 BLR_training_with_ukr_desc: "Мы готовы предложить украинской армии совместные учения по отработке маневров и координации действий войск."
 BLR_military_coop_with_ukraine: "§GВоенно-техническое сотрудничество§!"
 BLR_military_coop_with_ukraine_desc: "Мы готовы установить военно-техническое сотрудничество с украинским военно-промышленным комплексом."
 BLR_Intermarium: "Интермариум"
 BLR_Intermarium_desc: "Настало время объединиться с Украиной в мощный альянс, чтобы вместе противостоять нашим врагам."
 BLR_Intermarium_poland: "Междуморье"
 BLR_Intermarium_poland_desc: "Настало время объединиться с Польшей в мощный союз, чтобы вместе противостоять нашим врагам."
 BLR_Ukraine_enemy: "Захватить украинские земли"
 BLR_Ukraine_enemy_desc: "Исторически эти земли принадлежали Великому княжеству Литовскому. Никакие ложные дружеские узы не должны препятствовать нам в возвращении их нашему великому государству."
 BLR_Sovereign_Internet: "Суверенный Интернет"
 BLR_Sovereign_Internet_desc: "Мы должны сделать наше интернет-пространство полностью независимым от других стран, чтобы они не могли влиять на наших граждан"
 BLR_Expand_Mozyr_Refinery: "Расширение Мозырского нефтеперерабатывающего завода"
 BLR_Expand_Mozyr_Refinery_desc: "Мы расширим этот нефтеперерабатывающий завод."
 BLR_Belshina: "ОАО Белшина"
 BLR_Belshina_desc: "АО «Белшина» — производитель автомобильных шин. Компания выпускает шины для легковых автомобилей, грузовиков, тяжелой техники, дорожно-строительной и подъемной техники, электромобилей, автобусов, тракторов и сельскохозяйственной техники."
 BLR_Expand_Naftan_Refinery: "Расширение нефтеперерабатывающего завода \"Нафтан\""
 BLR_Expand_Naftan_Refinery_desc: "Мы расширим этот нефтеперерабатывающий завод."
 BLR_Expansion_Okolovsky_Novoselkovsky: "Расширение добычи руды на месторождениях"
 BLR_Expansion_Okolovsky_Novoselkovsky_desc: "Расширение добычи руды на Околовском и Новосельковском месторождениях обеспечит нас большим количеством стали."
 BLR_Problem_duying_vilages: "Проблема умирающих деревень"
 BLR_Problem_duying_vilages_desc: "Пришло время нашему государству решить, что делать с умирающими деревнями."
 BLR_Economic: "Белорусская экономика"
 BLR_Economic_desc: "Нам необходимо развивать нашу экономику, и мы предпринимаем ряд мер для успешного достижения этой цели."
 BLR_metro_minsk: "Расширение Минского метрополитена"
 BLR_metro_minsk_desc: "Мы будем модернизировать и расширять Минский метрополитен для улучшения логистических характеристик города."
 BLR_it_industries_help: "Помощь отечественным IT-разработчикам"
 BLR_it_industries_help_desc: "Необходимо всячески поддерживать наш ИТ-сектор — это будущее нашей страны."
 BLR_viber: "Viber"
 BLR_viber_desc: "Viber - это приложение для обмена сообщениями, которое позволяет отправлять сообщения, совершать видео- и голосовые VoIP-звонки через Интернет. Голосовые звонки между пользователями с установленным Viber бесплатны. Viber имеет возможность отправлять текстовые, голосовые и видеосообщения, документы, изображения, видео и файлы, а также работать в автономном режиме."
 BLR_wot: "World of Tanks"
 BLR_wot_desc: "World of Tanks — это многопользовательская онлайн-игра, посвященная бронетехнике середины 20 века. В распоряжении игроков более 40 карт сражений, созданных на основе реальных локаций Второй мировой войны, и исторически достоверная экипировка 11 наций общим количеством более 600 единиц."
 BLR_russian_gazprom: "Газпром"
 BLR_russian_gazprom_desc: "«Газпром» — важный игрок на рынке газа и нефти. Мы должны наладить с ним максимально тесное сотрудничество."
 BLR_BPS_Sberbank: "БПС Сбербанк"
 BLR_BPS_Sberbank_desc: "БПС Сбербанк является филиалом российского Сбербанка на нашей территории"
 BLR_Belgazprombank: "Белгазпромбанк"
 BLR_Belgazprombank_desc: "Белгазпромбанк является филиалом Газпромбанка в Беларуси"
 BLR_Development_domestic_tourism: "Развитие внутреннего туризма"
 BLR_Development_domestic_tourism_desc: "Мы видим большой потенциал во внутреннем туризме. В связи с этим каждый депутат внесет свой вклад в развитие туризма в своем округе. Главная задача - создать соответствующую инфраструктуру, поскольку имеется достаточно научного и методического материала"
 BLR_private_railways: "Частные железнодорожные компании"
 BLR_private_railways_desc: "Мы передадим железные дороги частным компаниям."
 BLR_Lith_pol_railways: "Железнодорожное сообщение с Польшей и Литвой"
 BLR_Lith_pol_railways_desc: "Мы намерены построить высококачественное железнодорожное сообщение с этими странами, что обеспечит нам доступ к европейским товарам."
 BLR_JSC_russian_railways: "Российские железные дороги"
 BLR_JSC_russian_railways_desc: "В настоящее время мы полностью интегрированы с Российскими железными дорогами."
 BLR_belavia: "Белавиа"
 BLR_belavia_desc: "Белорусская государственная авиакомпания со штаб-квартирой в Минске. Она была образована в 1996 году. Основные регулярные и чартерные международные рейсы выполняются из Национального аэропорта Минск."
 BLR_Danone: "Данон"
 BLR_Danone_desc: "Французская продовольственная компания, известный производитель молочных продуктов и других продуктов питания"
 BLR_Godel_tech: "Технологии Godel"
 BLR_Godel_tech_desc: "Британская компания, предоставляющая решения для разработки программного обеспечения ведущим британским компаниям, базирующимся в Манчестере"
 BLR_Basf_tech: "BASF Societas Europaea"
 BLR_Basf_tech_desc: "BASF Societas Europaea, BASF — крупнейший химический концерн в Германии, Европе и мире. Штаб-квартира находится в городе Людвигсхафен в земле Рейнланд-Пфальц на юго-западе Германии."
 BLR_royal_dutch_shell: "Royal Dutch Shell"
 BLR_royal_dutch_shell_desc: "Shell — британско-голландская нефтегазовая компания."
 BLR_mts: "МТС"
 BLR_mts_desc: "МТС — российская компания, предоставляющая телекоммуникационные услуги, цифровые и медиа-услуги в России, Армении и Беларуси под торговой маркой «МТС». Компания предоставляет услуги сотовой связи (в стандартах UMTS (3G), 4G, LTE и 5G), проводную телефонную связь, широкополосный доступ в Интернет, мобильное телевидение, кабельное телевидение, спутниковое телевидение, цифровое телевидение, услуги по предоставлению медиа- и развлекательного контента, финансовые услуги, а также конвергентные ИТ-решения в области Интернета вещей, мониторинга, автоматизации процессов, обработки данных и облачных вычислений."
 BLR_belarus_support_category: "Внутренние войска Беларуси"
 BLR_ter_oboronaup_start: "Призыв в войска территориальной обороны"
 BLR_internalup_start: "Призыв в 3-ю отдельную бригаду специального назначения"
 BLR_whitelegion_battalion_category: "Белый легион"
 BLR_whitelegion_battalion_category_desc: "«Белый легион» — это белорусская спортивно-патриотическая организация, которая впоследствии была преобразована в военную. «Белый легион» появился в начале 1990-х годов и поддерживал порядок на оппозиционных собраниях и митингах. Его члены прошли подготовку в качестве бойцов спецназа, получив стальной берет, аналогичный малиновому. Им были предоставлены углублённые знания истории Беларуси."
