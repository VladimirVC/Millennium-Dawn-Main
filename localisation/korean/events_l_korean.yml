 SouthSudanNews.1.a: "흥미롭군"
 AngolaNews.1.t: "앙골라 내전의 종식"
 AngolaNews.1.AGL.d: "앙골리 내전이 종식을 고했습니다. 1970년대부터 지속되던 이 내전은 이전에는 동맹이었던 앙골라 해방인민운동(MPLA)과 앙골라 완전 독립 민족 동맹(UNITA)이 싸움을 계속해서 지속해나갔습니다.\n\n전 소련을 동맹으로 둔 앙골라 해방인민운동(MPLA)은 앙골라 완전 독립 민족 동맹(UNITA)을 패퇴시켰습니다."
 AngolaNews.1.UNI.d: "앙골리 내전이 종식을 고했습니다. 1970년대부터 지속되던 이 내전은 이전에는 동맹이었던 앙골라 해방인민운동(MPLA)과 앙골라 완전 독립 민족 동맹(UNITA)이 싸움을 계속해서 지속해나갔습니다.\n\n미국의 지원을 받던 앙골라 완전 독립 민족 동맹(UNITA)은 앙골라 해방인민운동(MPLA)을 패퇴시켰습니다."
 AngolaNews.1.a: "흥미롭군"
 overlord.1.t: "[FROM.GetName]의 합병"
 overlord.1.d: "[FROM.GetName]은 너무 오랫동안 꼭두각시 상태였습니다. 그들에게 자율성을 부여하는 것은 더 이상 실행 가능한 파트너십이 아닙니다. 오늘 [GetYear]에는 우리가 오랫동안 바라던 날이 있습니다. [FROM.GetName]이 우리의 위대한 국가에 통합되었습니다. 그들은 이제 [ROOT.GetAdjective] 시민이 될 것이며 우리나라의 다른 시민과 동일한 보살핌과 대우를 받게 될 것입니다. 오늘은 우리와 [FROM.GetName] 사람들에게 영광스러운 날입니다.\n참고: 다른 주권 국가를 합병하면 우리는 그들이 우리와 합병할 때 그들의 모든 부채, 재무 및 국제 투자를 떠맡게 됩니다.\n\n다음과 같은 이점을 얻을 수 있습니다: [?ROOT.treasury|Y] 재무부, [?ROOT.debt|R] 부채, [?ROOT.int_investments] 국제 투자"
 overlord.1.a: "환상적이군"
 overlord.1.a_tt: "우리는 §B[FROM.GetName]§!(을)를 핵심 주로 얻습니다."
 overlord_news.1.t: "[FROM.FROM.GetName] 측을 합병하는 [ROOT.GetName]"
 overlord_news.1.d: "[ROOT.GetName]과 [FROM.FROM.GetName]의 대표단이 오늘 [FROM.FROM.GetName]이 [ROOT.GetName]에 통합될 것이라고 발표했습니다. [FROM.FROM.GetName]은 오랫동안 자치 국가였으며, 지난 몇 달 동안 [ROOT.GetName]에 점점 더 의존하게 되었습니다. 두 당사자는 '그것은 당연한 일이다!'라고 인용되었습니다.\n\n그 진실이 무엇인지는 아직 밝혀지지 않았습니다.."
 overlord_news.1.a: "흥미롭군"
