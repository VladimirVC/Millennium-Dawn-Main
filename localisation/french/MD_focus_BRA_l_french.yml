 BRA_idea_harsher_conscription: "Une conscription plus stricte"
 BRA_idea_liberal_economy: "Économie libérale"
 BRA_idea_nationalism_rise: "Une fête brisée"
 BRA_idea_nationalism_rise_desc: "Après plusieurs arrestations de grands représentants du Parti des Travailleurs, dont l'ex-président Luís Lula da Silva, le Parti des Travailleurs perd rapidement son approbation et son pouvoir, et voit l'émergence de nouveaux mouvements de droite."
 BRA_idea_globo_influence: "Influence sur Globo"
 BRA_idea_nationalism_rise2: "La montée du nationalisme"
 BRA_idea_opposition_media: "Globo dans l'opposition"
 BRA_idea_opposition_media_desc: "La plupart des médias, en particulier le réseau Globo, attaqueront Bolsonaro et ses gouvernements par tous les moyens possibles."
 BRA_idea_globo_disbanded: "Globo est dissous"
 BRA_idea_nationalised_globo: "Globo nationalisé"
 BRA_idea_christian_values: "Valeurs chrétiennes"
 BRA_idea_christian_values_desc: "La majorité de la population du Brésil est chrétienne. Nous devons renforcer les valeurs chrétiennes !"
 BRA_idea_tax_reformation: "Réformes fiscales"
 BRA_idea_tax_reformation_desc: "A series of targeted and well-thought-out tax reforms have been passed, spurring economic growth in many sectors of the Brazilian economy."
 BRA_idea_liberalism: "Le libéralisme brésilien"
