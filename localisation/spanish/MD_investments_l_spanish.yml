 expand_local_renewable_capacity_tt: "§YAmpliar la capacidad renovable local§! en §Y[THIS.GetName]§!\n---------\nDeberíamos fomentar la §YInfraestructura de Energía Renovable§! en §Y[THIS.GetName]§! produciendo energía adicional de la red de energía renovable local."
