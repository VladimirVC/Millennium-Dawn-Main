 CHI_semiconductor_backwardness_1: "技术依赖"
 CHI_semiconductor_backwardness_1_desc: "中国半导体产业在结构上仍然依赖于外国晶圆代工厂、设计软件和制造设备。国内晶圆厂的技术水平落后于领先水平两到三代，设计公司缺乏成熟的EDA工具链，也没有国内设备企业能够提供先进的光刻技术。这种差距制约了国内芯片厂的建设和晶圆代工产能，并限制了民用电子产品和军用电子产品的供应链。半导体产业的发展正在逐步削弱这种依赖性。"
