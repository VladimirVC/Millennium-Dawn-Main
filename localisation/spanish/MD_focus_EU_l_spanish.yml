 EU_exit_category: "Retirada de la Unión Europea"
 EU_exit_category_desc: "With rising Euroscepticism throughout the Union some member states will think about leaving §C[EUU.GetFlag] The European Union§!."
 Article_50: "[THIS.GetName] ha invocado el Artículo 50"
 EU_Article_50: "Dejar la Unión Europea! (Artículo 50)"
 EU_Article_50_desc: "\"Todo Estado miembro podrá decidir retirarse de la Unión de conformidad con sus propios requisitos constitucionales.\"\n- Artículo 50(1), Tratado de la Unión Europea.\n\nEl Artículo 50 se redactó por primera vez para el Tratado Constitucional de la Unión Europea. Tras el fracaso del proceso de ratificación de la Constitución Europea, la cláusula se incorporó al Tratado de Lisboa."
 EU_Revoke_Article_50: "Revocar el Artículo 50"
 EU_Revoke_Article_50_desc: "Revoke Article 50 and remain in §C[EUU.GetFlag] The European Union§!\n\"Article 50 TEU must be interpreted as meaning that, where a Member State has notified the European Council, in accordance with that article, of its intention to withdraw from the European Union, that article allows that Member State, for as long as a withdrawal agreement concluded between that Member State and the European Union has not entered into force or, if no such agreement has been concluded, for as long as the two years laid down in Article 50(3) TEU, possibly extended by that paragraph, has not expired, to revoke that notification unilaterally, in an unequivocal and unconditional manner, by a notice addressed to the European Council in writing, after the Member State concerned has taken the revocation decision in accordance with its constitutional requirements. The purpose of that revocation is to confirm the EU membership of the Member State concerned under terms that are unchanged as regards its status as a Member State, and that revocation brings the withdrawal procedure to an end.\"\n- Judgment of the Court of Justice of the European Union in Case C-621/18"
 EU_exit: "Leaving the EU"
 EU_exit_desc: "§Y[ROOT.GetNameWithFlag]§! ha notificado al Consejo Europeo su intención de abandonar la §C[EUU.GetFlag] La Unión Europea§!. §Y[ROOT.GetNameWithFlag]§! abandonará la Unión dos años después de la notificación."
 EU_extend_Article_50: "Extensión del Artículo 50"
 EU_extend_Article_50_desc: "Pedir a §C[EUU.GetFlag] La Unión Europea§! una extensión del Artículo 50 y abandonar la Unión en una fecha posterior."
 EU_exit_three_month: "Three-month extension"
 EU_exit_three_month_desc: "§Y[ROOT.GetNameWithFlag]§! obtuvo una extensión de tres meses del Artículo 50 por parte de §C[EUU.GetFlag] La Unión Europea§!. §Y[ROOT.GetNameWithFlag]§! abandonará la Unión después de un período de tres meses."
 EU_withdrawal_treaty: "Tratado de Retirada"
 EU_withdrawal_treaty_desc: "§Y[ROOT.GetNameWithFlag]§! y los estados miembros de §C[EUU.GetFlag] La Unión Europea§! han acordado un Tratado de Retirada."
 EU_prepared_no_deal_exit: "Preparar una Salida sin Acuerdo"
 EU_prepared_no_deal_exit_desc: "§C[EUU.GetFlag] La Unión Europea§! y sus lacayos sin columna vertebral y esos burócratas inflados en Bruselas se niegan a darnos un tratado de retirada favorable. Debemos preparar a nuestro país para la inevitable Salida sin Acuerdo a menos que algo ceda."
 cant_invoke_article_50: "§Y[ROOT.GetNameWithFlag]§! ha revocado recientemente la decisión del §YArtículo 50§! (Días Restantes: [?cant_invoke_article_50:days_left|Y0])"
 EU_article_50_available_click: "Prerrequisitos:\n[!EU_Article_50_click_enabled]\nEfectos:\n§Y[ROOT.GetNameWithFlag]§! comenzará a salir de la §C[EUU.GetFlag][EUU.GetName]§!"
 EU_article_50_available_delayed: "\"Todo Estado miembro podrá decidir retirarse de la Unión de conformidad con sus propios requisitos constitucionales.\"\n- Artículo 50(1), Tratado de la Unión Europea. -\nEl Artículo 50 se redactó por primera vez para el Tratado Constitucional de la Unión Europea. Tras el fracaso de la ratificación de la Constitución, la cláusula se incorporó al Tratado de Lisboa."
 tooltip_EU_exit_available: "§Y[ROOT.GetNameWithFlag]§! no está intentando actualmente abandonar la §C[EUU.GetFlag][EUU.GetName]§!"
 tooltip_EU_exit_cancel_trigger: "§Y[ROOT.GetNameWithFlag]§! ha activado la decisión §YRevocar Artículo 50§!."
 tooltip_EU_Revoke_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!."
 tooltip_EU_Revoke_Article_50_effect: "§Y[ROOT.GetNameWithFlag]§! stays in §Y[EUU.GetFlag] The European Union§!. Mission §YLeaving the EU§! AND Mission §YThree-month extension§! is removed.\nYou won't be able to invoke §YArticle 50§! for the next §Y180 days§!."
 tooltip_EU_extend_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!  \nAND [ROOT.GetNameWithFlag] must have > 25% influence on the European Union's Leader of Foreign Policy."
 tooltip_EU_remove_laws_and_offices: "Eliminar todas las §Yleyes y oficinas de la UE§!.\n"
 EU_defense_category: "Políticas de Defensa de la UE"
 EU_defense_category_desc: "In the 1950s the idea of the European Defence Community collapsed when it failed to obtain ratification in the French Parliament. Its successor became the Common Security and Defence Policy of the European Union. With the majority of European Nations being members of the North Atlantic Treaty Organization (NATO), there wasn't seen the need for an own European Defense Organization throughout the 20th century. But with rising world tensions in the 21st century, this is changing."
 EU_Frontex_take_control: "Tomar control de las Fuerzas Frontex"
 EU_Frontex_take_control_desc: "Las fronteras externas de Europa han visto un aumento sin precedentes en el número de migrantes y refugiados que desean entrar a la UE en los últimos años. Los países que tienen una frontera externa tienen la responsabilidad exclusiva del control fronterizo. Pero Frontex puede proporcionar apoyo técnico adicional a los países de la UE que enfrentan una presión migratoria severa.\n Esto lo hace coordinando el despliegue de equipo técnico adicional (por ejemplo, aeronaves y barcos) y personal de frontera especialmente capacitado."
 EU_EuroNavy_take_control: "Tomar control de la EuroArmada"
 EU_EuroNavy_take_control_desc: "Con las flotas multinacionales y las fuerzas de tarea siendo cada vez más comunes e importantes en el siglo XXI, los estados miembros de §C[EUU.GetFlag] La Unión Europea§! decidieron unir sus fuerzas y transferir sus buques de guerra a un Comando Naval Europeo unificado conocido como §YEuroArmada§!."
 EU_EuroArmy_take_control: "Tomar control del EuroEjército"
 EU_EuroArmy_take_control_desc: "Los estados miembros de §C[EUU.GetFlag] La Unión Europea§! decidieron redactar fuerzas armadas comunes conocidas como §YEuroEjército§!."
 EU_create_EDU: "Formar la Unión Europea de Defensa (UED)"
 EU_create_EDU_desc: "Para alcanzar la autonomía estratégica necesaria para defender sus intereses colectivos, responder a conflictos y crisis externas, y proyectar seguridad en su vecindad, los estados miembros decidieron formar la §YUnión Europea de Defensa (UED)§! como una alianza militar y dejar colectivamente la §YNATO§!."
