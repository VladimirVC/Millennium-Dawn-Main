 RULE_OPTION_IF_POINT_10_DESC: "§Y내부 파벌§! 의견의 매달 변동치가 기본값인 0.50 대신 0.10으로 설정됩니다. 이 설정 사용 시 밀레니엄 던의 도전 과제가 비활성화됩니다."
