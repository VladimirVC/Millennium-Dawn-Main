 eurozone_reforms: "Reforms of the Eurozone"
 eurozone_reforms_desc: "The Eurozone is currently on the cusp of a debt crisis unlike anything Europe has seen since the post-WW2 years. We must reform the Eurozone by passing reforms like §YEuropean Banking Union§!, §YEurobonds§! or the §YEuropean Stability Mechanism (ESM)§!.\n\nThe §YEuropean Debt Crisis§! can be avoided by passing the following reforms:\n- §YEuropean Banking Union§!\n- §YEurobonds§!\n- §YEuropean Stability Mechanism§!\n"
