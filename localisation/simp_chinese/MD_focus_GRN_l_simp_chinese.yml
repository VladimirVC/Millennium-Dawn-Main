 GRN_national_decisions: "格陵兰国家决议"
 GRN_national_decisions_desc: "格陵兰岛的局势看似松弛，实则暗流涌动。除了政治领袖们尝试——好吧，竭尽全力——发展岛屿及其人口外，还必须应对日益迫近的独立问题。有人希望立即独立，有人则主张等待更稳固的基础。无论如何，这座岛屿能否真正获得自由，最终取决于格陵兰与丹麦双方的选择。"
 GRN_decision_independence_war: "独立战争"
 GRN_decision_independence_war_desc: "时机已至，政客们迫使人民采取行动。战争已经开启，现在是一场赛跑，究竟是丹麦能守住它的王冠，还是这顶王冠将在公众压力迫使各方走向和平时，轰然坠落。"
 GRN_decision_capital_city_expansion: "首都扩张"
 GRN_decision_capital_city_expansion_desc: "随着我国人口增长到我们从未真正预料到的程度，我们需要对首都努克进行彻底改造，以更好地反映并整合整体区域和国家的增长。"
 GRN_decision_development_visa_grants: "授予发展签证"
 GRN_decision_development_visa_grants_desc: "我国发展的首要问题纯属人力资源匮乏。为取得进展，我们必须大力投资引进外籍劳工——这些劳动者需能忍受此间环境，而非仅着眼于我们可能提供的丰厚薪酬与就业机会。"
 GRN_decision_global_recruitment_efforts: "全球征兵行动"
 GRN_decision_global_recruitment_efforts_desc: "国防现已由我们直接掌控，但我们仍面临与整个国家相同的问题——人手不足。我们需要推行类似“发展补助金”的政策，但针对军事领域。希望随着经济日益强健、预算更灵活以承担此类开支，我们能大幅激励雇佣兵或无固定居所的漂泊者，选择将此地作为他们的最终归宿。"
 GRN_decision_naval_priority_act: "海军优先法案"
 GRN_decision_naval_priority_act_desc: "为了在离我们最近的区域拥有任何存在感，我们需要一支海军。问题在于，我们的经济能力不足以像往常那样稳步建造舰船。因此，我们基本上需要尽可能多地征用邻近的造船设施和综合体，以便快速建立一支基础舰队。这将极其昂贵，但坐着不动天上不会掉馅饼。"
 GRN_decision_project_vortex: "漩涡级项目"
 GRN_decision_project_vortex_desc: "在远北确保海上通道令人困扰，因为我们需要在战略区域内取得海军优势。为此，我们将利用现有手段，展示一场我们力所能及的最强海军力量秀。"
 GRN_decision_national_commission: "国家委员会"
 GRN_decision_national_commission_desc: "草案流程已经完成，原型经评估合格，现组建国家委员会以协助建造我国首艘战列舰。"
 GRN_decision_project_northern_projection: "北方投射项目"
 GRN_decision_project_northern_projection_desc: "随着局势稳定，我们已准备好实现国家的真正雄心，为此需要掌控多个海域。通过联合全国各地的造船厂，我们将组建第二北极战斗群，确保这一目标的实现。"
 GRN_southern_interior_development_decisions: "南方内陆开发计划"
 GRN_southern_interior_development_decisions_desc: "通过人口政策实现了国家经济与社会的稳定后，我们现在可以将目光投向国家内陆。南方高原将是征服大冰架的第一步。"
 GRN_decision_fort_vortex: "漩涡堡"
 GRN_decision_fort_vortex_desc: "我们将通过建立一个名为“漩涡堡”的要塞城镇，开始向南部的内陆地区进发。"
 GRN_decision_glacial_shine: "极地寒光"
 GRN_decision_glacial_shine_desc: "我们下一个最中心的定居点将被命名为“极地寒光”。"
 GRN_decision_frostbury: "霜冻堡"
 GRN_decision_frostbury_desc: "我们将在国家首都正东建立霜冻堡定居点。"
 GRN_decision_fort_seal: "封印堡"
 GRN_decision_fort_seal_desc: "我们将在南部内陆与中央高原的交界处建立一个战略性的中东部要塞定居点。"
 GRN_decision_southern_interior_basic_roads: "南部内陆基础道路工程"
 GRN_decision_southern_interior_basic_roads_desc: "随着我们的定居点全面建立，我们现在可以稳妥地创建一种基础的地面运输方式，以连接并满足这些文明新堡垒的需求。"
 GRN_decision_southern_interior_improved_roads: "南部内陆公路网络改进"
 GRN_decision_southern_interior_improved_roads_desc: "持续投资于道路网络将提高交通流量，并为应对如此漫长且危险的路途建立更完善、更持续的安全措施。"
 GRN_decision_great_polar_railway: "大极地铁路"
 GRN_decision_great_polar_railway_desc: "建立高效精简的铁路网，使我们能够批量运输人员和物资，从而得以真正从零开始构建该地区的经济体系。"
 GRN_decision_basic_industrial_jobs: "基础工业岗位"
 GRN_decision_basic_industrial_jobs_desc: "确保基础经济活动能够让我们更直接地为内陆发展提供资金，并尽可能向其他经济领域扩展。"
 GRN_decision_local_food_supply: "本地食品供应"
 GRN_decision_local_food_supply_desc: "HFF的战略发展使我们能够为定居点建立本地食品供应，因此我们不仅能更多地利用冰冻水源，还能帮助这些初生的人口中心实现本土化发展。艰苦农业设施将成为刺穿冰架这头冰冻野兽的长矛。"
 GRN_decision_extensive_geological_surveying: "广泛的地质调查"
 GRN_decision_extensive_geological_surveying_desc: "考虑到内地的广阔，我们需要大力投资这些战略行动，并建立一些专门用于处理橡胶植物的艰苦农业设施。这些投入的时间和资本应该会带来极其丰厚的回报。"
 GRN_decision_creating_dedicated_mining_operations: "建立专门采矿业"
 GRN_decision_creating_dedicated_mining_operations_desc: "我们探测到了分布稀疏且鲜为人知的各种矿产资源，同时也开始为更多HFF的橡胶生产拓展基础工作。持续推进这些举措必将有助于我们的事业。"
 GRN_decision_regional_economic_sector_synergy: "区域经济部门协同"
 GRN_decision_regional_economic_sector_synergy_desc: "通过大量的人力、资源和资金投入，我们将能够扩大采矿作业，使之达到足以创造当地经济多样化的程度。很快，我们就能像国家其他经济领域一样，建立起区域协同效应。"
 GRN_central_plateau_development_decisions: "中央高原开发计划"
 GRN_central_plateau_development_decisions_desc: "南部内陆地区在经济和社会上的协同发展已经完成，我们现在可以开始在中部高原打下同样的基础。这一切虽然代价高昂，但从长远来看，无疑是值得的。"
 GRN_decision_fort_frostfields: "冰盾堡"
 GRN_decision_fort_frostfields_desc: "我们将在西边靠近西西穆特镇的地方建立一个名为“冰盾堡”的堡垒定居点。"
 GRN_decision_frigidville: "寒冰镇"
 GRN_decision_frigidville_desc: "向东行进，我们将建立寒冰镇定居点。还有人想到符合主题的名字吗？"
 GRN_decision_aurora: "欧若拉"
 GRN_decision_aurora_desc: "在高原的中心地带，我认为我们将建立合适的定居点——欧若拉。"
 GRN_decision_snowdenson: "雪森"
 GRN_decision_snowdenson_desc: "向南推进，我们将建立雪森定居点，以连接极地寒光与欧若拉，促进跨区域经济活动。"
 GRN_decision_blizzards_peak: "暴风之巅"
 GRN_decision_blizzards_peak_desc: "折返向北，继续向东行进，我们将在此区域地势最高处建立暴风之巅定居点。"
 GRN_decision_crystal_flake: "水晶碎片"
 GRN_decision_crystal_flake_desc: "继续向东，靠近东部沿海地区的第二处，我们将建立水晶碎片定居点。"
 GRN_decision_snowberry: "雪莓"
 GRN_decision_snowberry_desc: "横跨高原与东部沿海地区的东北边境地带，我们将创建一个名为雪莓的别致小镇。"
 GRN_decision_plateau_interior_basic_roads: "中央高原基础公路网"
 GRN_decision_plateau_interior_basic_roads_desc: "随着定居点的建立，我们现在可以开始在整个高原上构建道路网络的基础。这项基础工作将使出行更加顺畅和直接，而不再需要穿越危险的地形。"
 GRN_decision_plateau_interior_improved_roads: "中央高原改良道路工程"
 GRN_decision_plateau_interior_improved_roads_desc: "基础工作完成后，我们现在可以着手投资标准化安全措施以及其他必要的设施，以便穿越广阔的地形。"
 GRN_decision_central_arctic_railroad: "中央北极铁路"
 GRN_decision_central_arctic_railroad_desc: "从南部内陆的极地铁路分支以及沿海铁路网出发，我们现在能够巩固全国主要的大宗运输体系。因此，高原地区将成为中央北极铁路（CARR）的所在地。"
 GRN_decision_basic_industrial_jobs_two: "基本工业就业市场"
 GRN_decision_basic_industrial_jobs_two_desc: "人民和基础设施已就绪，我们现在可以开始在中部高原开展某种形式的经济活动。"
 GRN_decision_local_food_supply_two: "建立本地食品供应"
 GRN_decision_local_food_supply_two_desc: "利用我们在全国范围内使用的HFF模型，我们可以建立专门的设施，以减轻当地食品供应链建设的压力。"
 GRN_decision_extensive_geological_surveying_two: "中央高原：大规模地质调查"
 GRN_decision_extensive_geological_surveying_two_desc: "人民、地点、基础设施、就业与粮食，一切均已就绪，随时准备深入冰层与时间掩埋的土地之下。"
 GRN_decision_creating_dedicated_mining_operations_two: "中央高原：专门采矿业"
 GRN_decision_creating_dedicated_mining_operations_two_desc: "有了手中的勘测数据以及初步建立的勘探矿井，我们现在可以开始扩展并建设更专门的矿井及其周边运营设施。"
 GRN_decision_regional_economic_sector_synergy_two: "中央高原：跨经济部门协同"
 GRN_decision_regional_economic_sector_synergy_two_desc: "旅途中最漫长、最耗费精力的阶段就在眼前。但当我们凝视着广袤中央高原上闪耀的冰原时，我们可以尽情欣赏这一切，并感受到最终抵达目的地的纯粹幸福与满足。因为格陵兰，确实是荒野之地的化身。"
 GRN_faction_polar_defense_league: "极地防御联盟"
 greenland_event.1.t: "自治公投"
 greenland_event.1.d: "很快，议会将就扩大《79年自治法》所确立的条款进行投票。如果通过，教育、医疗、司法系统以及海岸警卫队的全面控制权将完全由格陵兰政府掌握。"
 greenland_event.1.o1: "议会通过《自治法案》"
 greenland_event.1.o2: "议会维持现状"
 greenland_event.2.t: "格陵兰自治法案"
 greenland_event.2.d: "格陵兰已投票决定扩大其在1979年《地方自治法》下的权利，并以2008年《自治法》取而代之。该法案赋予他们多个政府机构以及海岸警卫队的控制权。由于投票结果获得多数支持，我们可以批准该投票，或者以国家财政无法在不增加我们提供的殖民补贴的情况下独立维持所有这些系统的运作为由予以否决。"
 greenland_event.2.o1: "批准投票"
 greenland_event.2.o2: "否决投票"
 greenland_event.300.t: "丹麦批准投票"
 greenland_event.300.d: "今天早些时候，我们收到消息，丹麦议会如预期通过了我们关于新《自治法案》的投票。这将是迈向独立的一大步，也意味着我们能够自主定义自己的未来。"
 greenland_event.300.o1: "等等，难道他们还能否决？"
 greenland_event.3.t: "丹麦否决投票"
 greenland_event.3.d: "丹麦议会拒绝了我们投票扩大《自治法案》并制定新《自治政府法案》的请求。他们以所谓的财政问题为由，声称如果我们接管控制权，将需要丹麦提供更多补贴。我们可以选择宣布独立——但这将引发局部冲突——或者接受现状，为未来可能更糟的局面做好准备。"
 greenland_event.3.o1: "战吧。但是用什么军队打呢？"
 greenland_event.3.o2: "为了格陵兰的自由统治！！！"
 greenland_event.4.t: "宣战！"
 greenland_event.4.d: "随着格陵兰自治法案投票受阻，格陵兰政府自行推动独立。因此，我们必须确保所有王室领地安全，并重新掌控所有海外领土。"
 greenland_event.4.o1: "从法罗群岛到格陵兰"
 greenland_event.5.t: "调整自动化投资"
 greenland_event.5.d: "我们的经济一直举步维艰，根本原因在于人口不足。人均产值极不稳定，以至于数据统计机构有时甚至不愿为我们记录，因为国内开支受经济持续波动的影响而剧烈变化。因此，我们需要一个关键的稳定因素——即对特定经济部门进行直接且全面的自动化投资。减少该部门对劳动力的需求，有望大幅降低整体经济的波动性。"
 greenland_event.5.o1: "农业部门"
 greenland_event.5.o2: "军工生产部门"
 greenland_event.5.o3: "民用制造部门"
 greenland_event.5.o4: "办公园区与科技部门"
 greenland_event.6.t: "矿业问题"
 greenland_event.6.d: "随着扩大和启动商业化采矿作业的努力，主要问题也随之浮现：我们采矿是为了刚需，还是为了利润？基于刚需，资源开采活动将保持适度规模，以满足国内需求为导向；而基于利润，则会大幅扩张作业规模，同时满足国内外需求，但代价是需要增加劳动力投入以满足正常的运营预期。"
 greenland_event.6.o1: "我们国家的需求"
 greenland_event.6.o2: "方法证成结果"
 greenland_event.7.t: "政治野心"
 greenland_event.7.d: "舞台已经搭好，我们的人民既兴奋又忧虑。作为曾经的丹麦王冠殖民地，从未有人相信思想能如此自由。但现在，凭借新获得的自由，我们能够确保内心的安宁，并开创我们所期望的政治未来。"
 greenland_event.7.o1: "绝对遵循自由主义"
 greenland_event.7.o2: "新兴主义才是正道"
 greenland_event.7.o3: "中立主义占据主导"
 greenland_event.7.o4: "民族自豪推动进步"
 greenland_influence_event.1.t: "格陵兰投资"
 greenland_influence_event.1.d: "格陵兰向我们提出了一项帮助投资建设我国的提议。虽然对这些投资的性质存在一些担忧，但与其他相关方相比，即使格陵兰岛有所发展，也不会对我国内局势构成真正的威胁。"
 greenland_influence_event.1.o1: "免费就很好"
 greenland_influence_event.1.o2: "谢谢，但还是算了"
 greenland_influence_event.2.t: "冰岛接受基础设施"
 greenland_influence_event.2.d: "我们的第一笔投资已被接受，这将增加我们在该国的影响力与联系。"
 greenland_influence_event.2.o1: "开启下一轮投资"
 greenland_influence_event.3.t: "格陵兰能源"
 greenland_influence_event.3.d: "格陵兰向我们提出了另一项投资，这次是在能源领域。他们希望建立一些有用的发电设施，并不特别偏爱某种特定的发电类型。我们可以利用这些免费的发电设施来促进更好的贸易关系，但有些人担心格陵兰可能通过这些设施来破坏我们的政府。"
 greenland_influence_event.3.o1: "廉价能源更是好"
 greenland_influence_event.3.o2: "我们的能源需求与你无关"
 greenland_influence_event.4.t: "冰岛接受能源设施"
 greenland_influence_event.4.d: "我们第二轮投资援助其发电能力的计划已获批准，只希望对方若需为化石燃料电厂采购燃料时，能通过与我们贸易来继续促进双边关系。"
 greenland_influence_event.4.o1: "开启下一轮投资"
 greenland_influence_event.5.t: "极地工业投资"
 greenland_influence_event.5.d: "格陵兰又出手了，这次是对我们的经济发展进行大规模投资。从工业到办公领域的投资，我们看到格陵兰确实开始向我国注入资金，也许有点过多了。不过他们也没什么可花的，我们或许应该在这方面踩刹车了。"
 greenland_influence_event.5.o1: "更好的经济，何乐而不为"
 greenland_influence_event.5.o2: "不，我想我懂你的把戏了"
 greenland_influence_event.6.t: "冰岛接受经济投资"
 greenland_influence_event.6.d: "我们不断增长的投资组合取得了巨大成功，找到了让冰岛政府接受我们慷慨提议的战略手段。现在只需善用这些成果。"
 greenland_influence_event.6.o1: "再来一次胜利就足够了"
 greenland_influence_event.7.t: "战略资源投资"
 greenland_influence_event.7.d: "格陵兰协助我们进行了广泛的地质调查，发现了有限的商业储量，包括铁、铜、镍及其他资源，这些资源可能有利于我们的国内经济。他们也愿意扩大我们的铝工业，以弥补潜在的损失。我们确实可以利用这些资源来减少对某些外国来源的依赖，但我们真的能承担得起欠下邻国如此多的债务吗？"
 greenland_influence_event.7.o1: "我们确实需要这些资源"
 greenland_influence_event.7.o2: "风险太高，驳回"
 greenland_influence_event.8.t: "交易的艺术"
 greenland_influence_event.8.d: "冰岛已接受我们的战略资源投资，因此我们得以完成全部投资计划。借此，我们已为在不久的将来促成潜在联合铺平了道路。"
 greenland_influence_event.8.o1: "值了"
 greenland_influence_event.10000.t: "投资被拒绝"
 greenland_influence_event.10000.d: "由于冰岛拒绝了我们的提议，我们在外交上已别无选择。我们会尽可能拖延时间，但终局即将到来。"
 greenland_influence_event.10000.o1: "准备真实绿色行动"
 greenland_subterfuge_event.1.t: "格陵兰大投资"
 greenland_subterfuge_event.1.d: "格陵兰向我们提出了一项极为有利的提议。他们愿意进行一轮全面的批发投资，以促进我国发展。这样的机会看似有些异想天开，但这座岛屿本身也确实没什么值得称道的地方。再说了，从大局来看，格陵兰又能对我们产生什么影响呢？"
 greenland_subterfuge_event.1.o1: "感谢你的慷慨"
 greenland_subterfuge_event.1.o2: "好的难以置信，有诈"
 greenland_subterfuge_event.2.t: "冰岛接受我们的慷慨"
 greenland_subterfuge_event.2.d: "随着冰岛政府接受我方大规模投资，我们可利用这些投资来打破和平局面，适度改变现状，使该岛孤立于北约的干预之外。"
 greenland_subterfuge_event.2.o1: "那我们就等着吧"
 greenland_subterfuge_event.3.t: "追根溯源"
 greenland_subterfuge_event.3.d: "近期的社会动荡与舆论风波似乎源于格陵兰的某些投资。这些新动向虽仅在社会中引发些许不安，但若听之任之，日后恐酿成真正危机。此举虽有风险，但我们既可选择持续应对这些纷扰，亦可彻底铲除根源以永久解决此事。"
 greenland_subterfuge_event.3.o1: "他们真的有军队吗？"
 greenland_subterfuge_event.3.o2: "我们有北约，我们没事的"
 greenland_subterfuge_event.10000.t: "投资被拒绝"
 greenland_subterfuge_event.10000.d: "冰岛已拒绝了我方的最佳提议，若他们仍不接受，我们别无选择，只能为最坏的情况做准备。"
 greenland_subterfuge_event.10000.o1: "准备真实绿色行动"
 greenland_subterfuge_event.4.t: "大规模格陵兰投资"
 greenland_subterfuge_event.4.d: "格陵兰向我们提出了一项提议，内容涉及全面投资与独家贸易协议。格陵兰愿意协助我们建设基础设施、提升区域规划能力、发展民用工业基础，并且显然愿意通过独家租赁方式提供所需的物资支持，以换取这些投资。整个投资方案中最具吸引力的一点是，他们承诺直接进行大规模投资，用于开发并开采我们周边海域已知的石油资源。这是一笔极其划算的交易，坦白说，我们几乎看不出任何问题。但考虑到我们对丹麦负有义务，我们该如何应对？"
 greenland_subterfuge_event.4.o1: "成交吧！"
 greenland_subterfuge_event.4.o2: "不，这不对"
 greenland_subterfuge_event.5.t: "法罗群岛接受"
 greenland_subterfuge_event.5.d: "法罗群岛政府已接受我方慷慨投资，因此我们现在可以开始为我们的未来努力。"
 greenland_subterfuge_event.5.o1: "派遣煽动者"
 greenland_subterfuge_event.6.t: "公民请愿"
 greenland_subterfuge_event.6.d: "近期事态开始升级，越来越多的岛民恳求政府就与格陵兰组建西北欧联盟一事举行公投。许多人指出，那些看似善意的投资行为——比丹麦\"仅维持基本需求\"的做法更关注岛民福祉——实为慷慨善举。在如此压力下，我们被迫接受民众要求，并将向格陵兰政府提交请愿。"
 greenland_subterfuge_event.6.o1: "法罗永存"
 greenland_subterfuge_event.7.t: "赌博成功"
 greenland_subterfuge_event.7.d: "法罗群岛民众的压力迫使他们的政府请求与我们国家组成联盟。这对我们来说是个好兆头，因为这必然会在丹麦政府内部引发某种动荡。"
 greenland_subterfuge_event.7.o1: "更进一步"
 greenland_subterfuge_event.8.t: "等等，什么？！"
 greenland_subterfuge_event.8.d: "报告传来，不知何故，格陵兰武装部队已驻扎在法罗群岛，并与当地居民和政府官员合作，以和平方式移交权力。问题是，谁给了他们这样做的权利。我们未被征询意见，看来我们对这些岛屿的普遍漠不关心反而对我们不利。如果无所作为，我们将颜面尽失；但如果迅速行动，我们将孤立无援，因为这等于直接挑起敌对行动。"
 greenland_subterfuge_event.8.o1: "我们打得过他们！"
 greenland_subterfuge_event.8.o2: "公平什么？"
 greenland_subterfuge_event.40000.t: "投资被拒绝"
 greenland_subterfuge_event.40000.d: "法罗群岛已拒绝了我方的最佳提议，若他们仍不接受，我们别无选择，只能为最坏的情况做准备。"
 greenland_subterfuge_event.40000.o1: "开始动员"
 greenland_subterfuge_event.9.t: "格陵兰投资"
 greenland_subterfuge_event.9.d: "格陵兰向我们提供了一系列投资，且我方无需承担任何费用。他们希望专注于开发日德兰地区较为欠发达的区域，并促进北欧团结。然而，政府内部有些人认为他们另有图谋，因为这些投资好得令人难以置信。不过话说回来，格陵兰又能对我们造成什么实质影响呢？"
 greenland_subterfuge_event.9.o1: "免费的东西总不差"
 greenland_subterfuge_event.9.o2: "我不喜欢你那些蠢话"
 greenland_subterfuge_event.10.t: "丹麦接受"
 greenland_subterfuge_event.10.d: "丹麦政府已接受了投资，现在我们开始着手准备计划中的事宜。"
 greenland_subterfuge_event.10.o1: "现在球在他们场上了"
 greenland_subterfuge_event.11.t: "追根溯源"
 greenland_subterfuge_event.11.d: "近期的社会动荡与舆论风波似乎源于格陵兰的某些投资。这些新动向虽仅在社会中引发些许不安，但若听之任之，日后恐酿成真正危机。此举虽有风险，但我们既可选择持续应对这些纷扰，亦可彻底铲除根源以永久解决此事。"
 greenland_subterfuge_event.11.o1: "他们真的有军队吗？"
 greenland_subterfuge_event.11.o2: "我们有北约，我们没事的"
 greenland_subterfuge_event.90000.t: "投资被拒绝"
 greenland_subterfuge_event.90000.d: "丹麦已拒绝了我方的最佳提议，若他们仍不接受，我们别无选择，只能为最坏的情况做准备。"
 greenland_subterfuge_event.90000.o1: "准备中间人行动"
 greenland_subterfuge_event.12.t: "格陵兰投资"
 greenland_subterfuge_event.12.d: "格陵兰向我们提出了一系列投资计划，且无需我方承担任何费用。他们希望重点开发诺尔兰地区中较为落后的区域，促进北欧团结与繁荣。然而，政府内部有人认为他们暗藏私心——这些投资条件好得令人难以置信。不过话说回来，格陵兰又能对我们造成什么实质影响呢？"
 greenland_subterfuge_event.12.o1: "免费的话，我同意"
 greenland_subterfuge_event.12.o2: "我们过得很好，谢谢"
 greenland_subterfuge_event.13.t: "挪威接受"
 greenland_subterfuge_event.13.d: "挪威政府已接受投资，我们现在将开始准备计划，与平民一起让国家远离北约。"
 greenland_subterfuge_event.13.o1: "让我们看看他们怎么做"
 greenland_subterfuge_event.14.t: "追根溯源"
 greenland_subterfuge_event.14.d: "近期的社会动荡与舆论风波似乎源于格陵兰的某些投资。这些新动向虽仅在社会中引发些许不安，但若听之任之，日后恐酿成真正危机。此举虽有风险，但我们既可选择持续应对这些纷扰，亦可彻底铲除根源以永久解决此事。"
 greenland_subterfuge_event.14.o1: "他们真的有军队吗？"
 greenland_subterfuge_event.14.o2: "我们有北约，我们没事的"
 greenland_subterfuge_event.120000.t: "投资被拒绝"
 greenland_subterfuge_event.120000.d: "挪威已拒绝了我方的最佳提议，若他们仍不接受，我们别无选择，只能为最坏的情况做准备。"
 greenland_subterfuge_event.120000.o1: "准备峡湾之地行动"
 greenland_subterfuge_event.15.t: "格陵兰投资"
 greenland_subterfuge_event.15.d: "格陵兰向我们提出了一系列投资计划，无需我们承担任何成本。他们希望重点开发卡尔斯塔德市周边欠发达地区，促进北欧团结与繁荣。然而，政府内部有人怀疑他们另有隐藏意图，因为这些投资好得令人难以置信。但话说回来，格陵兰实际上又能对我们做什么呢？"
 greenland_subterfuge_event.15.o1: "免费就是免费"
 greenland_subterfuge_event.15.o2: "我们谨慎的拒绝"
 greenland_subterfuge_event.16.t: "瑞典接受"
 greenland_subterfuge_event.16.d: "瑞典政府已接受了这些投资，现在我们将开始为计划中的工作做准备，与平民群体共同确保一个不那么倾向北约的、权力更分散的中央政权。"
 greenland_subterfuge_event.16.o1: "现在我们静待时机"
 greenland_subterfuge_event.17.t: "追根溯源"
 greenland_subterfuge_event.17.d: "近期的社会动荡与舆论风波似乎源于格陵兰的某些投资。这些新动向虽仅在社会中引发些许不安，但若听之任之，日后恐酿成真正危机。此举虽有风险，但我们既可选择持续应对这些纷扰，亦可彻底铲除根源以永久解决此事。"
 greenland_subterfuge_event.17.o1: "他们真的有军队吗？"
 greenland_subterfuge_event.17.o2: "我们无需担心这些虫子。"
 greenland_subterfuge_event.150000.t: "投资被拒绝"
 greenland_subterfuge_event.150000.d: "瑞典已拒绝了我方的最佳提议，若他们仍不接受，我们别无选择，只能为最坏的情况做准备。"
 greenland_subterfuge_event.150000.o1: "准备大北方战争行动"
 greenland_subterfuge_event.18.t: "格陵兰投资"
 greenland_subterfuge_event.18.d: "格陵兰主动向我们提出了一系列投资方案，且无需我方承担任何成本。他们希望专注于开发欠发达的拉普兰北部地区，推动北欧团结与繁荣。然而，政府内部有人认为他们暗藏图谋，因为这些投资似乎好得令人难以置信。但话说回来，格陵兰实际上又能对我们造成什么威胁呢？"
 greenland_subterfuge_event.18.o1: "尊敬的先生，成交"
 greenland_subterfuge_event.18.o2: "我认为现在还不是时候"
 greenland_subterfuge_event.19.t: "芬兰接受"
 greenland_subterfuge_event.19.d: "芬兰政府已接受这些投资，现在我们准备通过孤立政府、让民众对更大范围的北欧联合体更加接受来实现我们的目标。"
 greenland_subterfuge_event.19.o1: "争取圆满成功"
 greenland_subterfuge_event.20.t: "追根溯源"
 greenland_subterfuge_event.20.d: "近期的社会动荡与舆论风波似乎源于格陵兰的某些投资。这些新动向虽仅在社会中引发些许不安，但若听之任之，日后恐酿成真正危机。此举虽有风险，但我们既可选择持续应对这些纷扰，亦可彻底铲除根源以永久解决此事。"
 greenland_subterfuge_event.20.o1: "他们真的有军队吗？"
 greenland_subterfuge_event.20.o2: "我们无需担心他们。"
 greenland_subterfuge_event.180000.t: "投资被拒绝"
 greenland_subterfuge_event.180000.d: "芬兰已拒绝了我方的最佳提议，若他们仍不接受，我们别无选择，只能为最坏的情况做准备。"
 greenland_subterfuge_event.180000.o1: "准备曼纳海姆行动"
 GRN_colonial_subsidy_TT: "§G额外收入：§!§Y$0.300§!"