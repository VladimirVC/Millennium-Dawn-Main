l_japanese:
 BLR_china_friendship: "中国とのパートナーシップ"
 BLR_china_friendship_desc: "我々は両国間の友好関係を強化するつもりだ。"
 BLR_Bel_G2: "ベルジー"
 BLR_Bel_G2_desc: "JSC「ベルジー」は、中国の吉利（ジーリー）乗用車を組み立てるためのベラルーシ＝中国合弁事業である。ベラルーシにある2つの乗用車組立会社のうちの1つ。ボリソフ近郊のJSC「ボリソフ自動車水力増幅器工場」の賃貸区域に置かれている。"
 BLR_Chinese_Modernization_Railway: "鉄道の近代化"
 BLR_Chinese_Modernization_Railway_desc: "中国の同僚たちは我が国の鉄道網の近代化に資金を提供することに同意した。"
 BLR_Brigade_Territorial_Defence: "領土防衛旅団創設"
 BLR_Brigade_Territorial_Defence_desc: "戦争の勃発により、我々は領土防衛軍を編成せざるを得なくなった。"
 BLR_sso: "特殊作戦軍創設"
 BLR_sso_desc: "ベラルーシ共和国軍特殊作戦部隊は、ベラルーシ共和国軍の高度な機動性を備えた部隊であり、ソ連空挺部隊およびベラルーシ共和国におけるソ連軍参謀本部情報総局（GRU）の特殊部隊の後継部隊である。主な任務は、対破壊工作活動、諜報活動、非合法武装集団との戦闘、ベラルーシ共和国に対する武力紛争終結のための特殊手段を用いた様々な任務の遂行で、戦略的抑止力の主要な要素の一つとして機能している。"
 BLR_trans_army: "輸送部隊創設"
 BLR_trans_army_desc: "ベラルーシ輸送部隊は、ベラルーシ軍の兵科の一つで、トラック、鉄道、航空機による人員および物資の輸送を担当する。彼らは、国内の他の兵科の部隊に対する輸送支援任務を遂行するために編成されている。"
 USSR_Legacy: "ソ連の遺産"
 USSR_Legacy_desc: "私たちは、受け継いだ遺産を発展させ、さらに高めていくためにあらゆる努力を尽くします。"
 BLR_mi_8: "Mi-8"
 BLR_Communism_start: "共産主義の帰還"
 BLR_Communism_start_desc: "ベラルーシに共産主義が再び戻ってきた。共産党は再びこの国でマルクス・レーニン主義への道を切り開くのだろうか？"
 BLR_trade_with_nko: "北朝鮮との貿易"
 BLR_trade_with_nko_desc: "北朝鮮は小国ではあるが、社会主義陣営の同盟国であり、我々は貿易関係を構築する用意がある。"
 BLR_nko_workers: "北朝鮮労働者"
 BLR_nko_workers_desc: "北朝鮮の労働者を我が国に招へいする準備が整っている。彼らは効率性と勤勉さで有名だ。"
 BLR_nko_miiltary_coop: "北朝鮮との軍事技術協力"
 BLR_nko_miiltary_coop_desc: "我々は北朝鮮人民軍との軍事技術協力を開始する準備ができている。"
 BLR_rotation_KGB: "KGB内のローテーション"
 BLR_rotation_KGB_desc: "我々は人員をローテーションしている。なぜなら、今や我々には強力で力強い組織が必要だからだ。"
 BLR_North_Korea_workers: "北朝鮮労働者"
 BLR_SMERSH_2: "スメルシ2.0"
 BLR_SMERSH_2_desc: "我々はスメルシを復活させるだろう。ソビエトの経験を国家の利益のために利用する時が来た。"
 BLR_arest_silovic: "治安部隊粛清"
 BLR_arest_silovic_desc: "多くの治安部隊が新政府に反対していることが判明したので、彼らを粛清する時が来た"
 BLR_antigay_propaganda_laws: "反ゲイプロパガンダ法"
 BLR_antigay_propaganda_laws_desc: "今こそ、我が国においてLGBTプロパガンダを法的に禁止すべき時だ。"
 BLR_clean_soc_net: "ソーシャルネットワーク浄化"
 BLR_clean_soc_net_desc: "我々は全てのソーシャルネットワークを浄化し、敵のプロパガンダの拡散を許さない。"
 BLR_pioneria: "ピオネール"
 BLR_pioneria_desc: "若者は怠けてはいけない。だから我々は少年先鋒隊を復活させる。"
 BLR_Marks_school: "学校でのマルクス主義"
 BLR_Marks_school_desc: "学校のカリキュラムには必然的にマルクス主義教育が含まれることになる。"
 BLR_free_education: "無料教育"
 BLR_free_education_desc: "教育は無料であり、栄光ある我が国のすべての国民が利用できるようにすべきである。"
 BLR_state_atheism: "国家無神論"
 BLR_state_atheism_desc: "宗教は民衆のアヘンであり、今こそその影響力と戦うべき時だ。"
 BLR_collectivism: "集団主義"
 BLR_collectivism_desc: "集団化は過去に成功したことがあるので、その経験を繰り返すつもりだ。"
 BLR_fight_international_capitalists: "国際資本家との戦い"
 BLR_fight_international_capitalists_desc: "オリガルヒは危険で腐敗した階級であり、ソ連時代のクラーク（富農）に劣らない。ソ連崩壊後、ロシアとベラルーシのオリガルヒは経済的影響力をますます強め、外国企業主導のグローバリズム経済モデルを推進することでベラルーシの労働者を失業させてきた。真の社会主義を復活させるには、まず国際資本家階級を駆逐することが不可欠である。"
 BLR_weaken_the_banks: "銀行弱体化"
 BLR_weaken_the_banks_desc: "銀行は資本主義の近衛兵であり、その旗印を戦闘に掲げ、その存在そのもので利益を守っている。彼らは世界の貧しい地域に干渉し、賃金ダンピングと利子投機で労働者階級を虐待し、合法的および違法的な寄付の両方で政治に影響を与えている。銀行は、単なる非政治的な短期金融業者である状態に戻されなければならない。"
 BLR_ultimate_tax_reform: "大税制改革"
 BLR_ultimate_tax_reform_desc: "我々は大規模な税制改革を実施する意向であり、これにより一般の人々の税負担は軽減されるが、企業にとっては逆になるだろう。"
 BLR_single_party: "単一政党"
 BLR_single_party_desc: "社会主義への道は一つしかないため、一つの政党があるべきだ。"
 BLR_nationalize_foreign_business: "外国企業国有化"
 BLR_nationalize_foreign_business_desc: "外国人が所有する産業施設は常に経済的安全保障上のリスクである。外国が経済制裁で脅す中、産業所有者が一夜にして撤退し、施設の重要部品を持ち去る懸念は常に存在する。これを防ぐには、たとえ他国を怒らせようとも、これらの産業を国家の所有とする必要がある。"
 BLR_five_year_plan: "第一次五カ年計画"
 BLR_five_year_plan_desc: "西側諸国の自由経済モデルは、社会主義国にとって未来を約束するものではない。計画経済、できれば古典的なソ連型の五カ年計画への回帰こそが、これまで抑制されていなかった経済に対する政府の大きな影響力をもたらすだろう。"
 BLR_reestablish_the_military_industrial_complex: "軍産複合体再建"
 BLR_reestablish_the_military_industrial_complex_desc: "陸軍と人民は一つである！"
 BLR_mobilize_the_masses: "大衆動員"
 BLR_mobilize_the_masses_desc: "我が軍は、党が要求する場所で我が国の利益を守るために人々を必要としている。"
 BLR_better_roads: "一般道路改善"
 BLR_better_roads_desc: "我が国の道路問題に密接に取り組む必要がある。"
 BLR_progress_cult: "進歩崇拝"
 BLR_progress_cult_desc: "社会主義者は社会的・科学的進歩を望む。後者は21世紀において特に重要であり、国家安全保障のためだけでなく、革命を広め社会主義の目標を達成するためである。この目標は、科学技術が一定の段階まで進歩しなければ完全に達成できない。"
 BLR_soviet_academy_of_sciences: "ソ連科学アカデミー"
 BLR_soviet_academy_of_sciences_desc: "ソビエト科学アカデミーはソビエト連邦を代表する科学機関であった。我々の最も優秀で聡明な頭脳が再びここに集い、資本主義世界が羨むような技術的・科学的飛躍を成し遂げるため、たゆまぬ努力を重ねるであろう！"
 BLR_the_culture_of_proletarianism: "プロレタリア文化"
 BLR_the_culture_of_proletarianism_desc: "今こそ、労働者階級のためのプロレタリア文化を育む時であり、それと共に、共通の、美しい共産主義の未来へと歩みを進めていくのだ。"
 BLR_empower_the_kgb: "KGBの影響力拡大"
 BLR_empower_the_kgb_desc: "我々は敵による内部体制の破壊を防ぐために、国内におけるKGBの影響力を拡大する所存である。従って、活動遂行のため更に多くの権限を発給する。"
 BLR_erase_nationalist: "全ての民族主義者を投獄せよ"
 BLR_erase_nationalist_desc: "今こそ、我が国の民族主義的な細胞組織を根絶する時だ。"
 BLR_the_litbel_start: "リトベル復活"
 BLR_the_litbel_start_desc: "リトベルはロシア内戦中に短期間現れたソビエト共和国である。リトアニアの兄弟たちと力を合わせるという見通しは、我々にとって非常に魅力的に聞こえる。"
 BLR_peaceful_litbel: "リトアニアに赤旗を"
 BLR_peaceful_litbel_desc: "必要な準備は全て整った。全ての諜報員、徴用された市民、政治家は配置についた。傀儡政権の占領からリトアニアを解放する時が来た。"
 BLR_the_litbel: "二民族国家"
 BLR_the_litbel_desc: "我々が一つの国となる時が来た。ベラルーシ人とリトアニア人の二つの民族からなる国として。"
 BLR_dissolve_monasteries: "修道院解散"
 BLR_dissolve_monasteries_desc: "我々は国から宗教を完全に浄化するだろう！"
 BLR_support_of_the_worker: "労働者支援"
 BLR_support_of_the_worker_desc: "労働者階級は我々の支えであり、力である。我々は資本主義の蔓延との闘いにおいて、常に彼らを支援する！"
 BLR_presidential_election_of_2001: "政治領域"
 BLR_presidential_election_of_2001_desc: "新千年紀に誰が我が国を率いるか決める時が来た。"
 BLR_Andrey_sannikov: "西側民主主義の道"
 BLR_Andrey_sannikov_desc: "我が国は新しい指導者を選出した。今、彼は我々を明るい民主的な未来へと導くだろう。"
 BLR_Join_GUAM: "GUAM加盟"
 BLR_Join_GUAM_desc: "我々はGUAMに加盟することで、旧ソ連圏における関係を強化する。"
 BLR_American_Protection: "米国の保護"
 BLR_American_Protection_desc: "ロシアが我々の行動を無視する可能性は低いので、我々はアメリカの支援を必要としている。"
 BLR_Linking_foreign_currency: "通貨をユーロに連動"
 BLR_Linking_foreign_currency_desc: "我が国の通貨の不安定性は解消されなければならない。我々は自国通貨をユーロに連動させる。"
 BLR_closed_border_with_Russia: "ロシアとの国境閉鎖"
 BLR_closed_border_with_Russia_desc: "我々は再びロシアとの国境に検問所を設置する。ロシア領土から我が国へ自由に出入りする者は誰もいなくなる。"
 BLR_NATO_Membership_Campaign: "NATO加盟キャンペーン"
 BLR_NATO_Membership_Campaign_desc: "NATO加盟に向けた準備キャンペーンを開始する時が来た。"
 BLR_USA_military_Cooperation: "米国軍事技術協力"
 BLR_USA_military_Cooperation_desc: "軍事技術分野における米国との協力は、我々に大きな利益をもたらすことが期待される。"
 BLR_Invite_NATO_advisors: "NATO軍事顧問招待"
 BLR_Invite_NATO_advisors_desc: "軍の指揮系統を完全に改革した今、NATOの軍事顧問を招聘する予定です。"
 BLR_USAD_request: "USAID要請"
 BLR_USAD_request_desc: "私たちは支援を求めて米国国際開発庁（USAID）に連絡することにしました。"
 BLR_Military_Exercises_NATO: "NATOとの軍事演習"
 BLR_Military_Exercises_NATO_desc: "我が軍はNATOとの初の合同演習を実施する。"
 BLR_NATO_integration_command: "NATO統合司令部"
 BLR_NATO_integration_command_desc: "NATO統合司令部は、我々が同盟に加盟するための次のステップです。"
 BLR_Request_NATO_membership: "NATO加盟申請"
 BLR_Request_NATO_membership_desc: "NATO加盟を申請する時期が来た。"
 BLR_western_diplomats: "西側外交官"
 BLR_western_diplomats_desc: "西側諸国の外交官たちがベラルーシを訪れ、我々の勝利を祝福してくれた。今こそベラルーシは西側への道を選ぶことができる。"
 BLR_denied_sanctions: "制裁解除"
 BLR_denied_sanctions_desc: "正当な選挙を実施した今、我々に対するすべての制裁は解除されるだろう。"
 BLR_people_rights: "人権"
 BLR_people_rights_desc: "私たちは国民の権利と自由を尊重しなければならない。"
 BLR_Freedom_Meetings: "集会・結社の自由"
 BLR_Freedom_Meetings_desc: "集会および会合の権利は保障されなければならない。"
 BLR_dont_torture: "医療改革"
 BLR_dont_torture_desc: "質の高い医療は、国民にとって最も基本的なニーズの一つです。それを提供することで、より良い国を築くことができるでしょう。"
 BLR_EU_integration: "EUへの統合"
 BLR_EU_integration_desc: "我々は欧州連合への加盟を目指している。"
 BLR_Attract_European_investments: "欧州投資誘致"
 BLR_Attract_European_investments_desc: "我々は経済発展のために欧州からの投資家を誘致する準備ができている。"
 BLR_Opening_garment: "人気ブランド衣料工場開設"
 BLR_Opening_garment_desc: "私たちは、自国領内で人気ブランドの衣料品生産拠点を設立する準備ができています。"
 BLR_simplification_labor_code: "労働法簡素化"
 BLR_simplification_labor_code_desc: "従業員が働く代わりに労働組合に頼ることが常態化しないよう、労働法制の規範を変える必要がある。"
 BLR_Encourage_Exchange_Students_desc: "本校の学生たちは、ヨーロッパの学生との交換留学プログラムに参加する準備ができています。"
 BLR_Adopt_EU_Intellectual: "EU知的所有権法採用"
 BLR_Adopt_EU_Intellectual_desc: "この分野における欧州基準に準拠するために、EU知的所有権法を採用する必要がある。"
 BLR_Digitalization: "デジタル化"
 BLR_Digitalization_desc: "生産工程の品質を向上させるためには、生産工程のデジタル化が必要である。"
 BLR_political_platforms: "外国企業向け政治プラットフォーム作成"
 BLR_political_platforms_desc: "外国企業が我々の政治プラットフォームにアクセスすることを許可すべきだろうか？"
 BLR_Custom_Institutional_reforms: "バイオ燃料"
 BLR_Custom_Institutional_reforms_desc: "代替燃料源は、友好関係を持ちたくない国々への依存を減らすのに役立つ。"
 BLR_Market_Economy: "機能的市場経済"
 BLR_Market_Economy_desc: "我々が目指してきたのは本格的な市場経済であり、それはヨーロッパの民主主義国家において機能すべきものである。"
 BLR_Delete_KGB2: "KGB解体"
 BLR_Delete_KGB2_desc: "我々はKGBを新しい構造、すなわち国家安全保障局に置き換えるだろう。この組織は我々の西側的理想に忠実な職員から採用されるだろう。"
 BLR_US_money: "米国投資"
 BLR_US_money_desc: "我が国で民主主義をさらに発展させるためには資金が必要です。"
 BLR_join_wto: "WTO加盟"
 BLR_join_wto_desc: "WTOに加盟することで、多くの利点が得られ、国際市場へのアクセスも拡大するでしょう。"
 BLR_release_political_prisoners: "政治犯釈放"
 BLR_release_political_prisoners_desc: "前政権下では、多くの人々が政治的な理由で投獄されました。私たちはこの状況を改善します。"
 BLR_baltic_economic_cooperation: "バルト諸国との貿易パートナーシップ"
 BLR_baltic_economic_cooperation_desc: "近隣諸国は優れた貿易相手国です。沿岸部に位置し、国境を接していることから、貿易実績を向上させる強い動機付けとなります。"
 BLR_root_out_nationalists: "民族主義者排除"
 BLR_root_out_nationalists_desc: "ナショナリストは我が国において常に問題となってきた。彼らは不安定化を招くだけであり、今こそ彼らに対処すべき時だ。"
 BLR_decommunize_belarus_society: "ベラルーシ社会の脱共産主義化"
 BLR_decommunize_belarus_society_desc: "ソ連の遺産は捨て去らなければならない。進歩的な西側諸国を受け入れる時が来たのだ。"
 BLR_fight_the_oligarchs: "オリガルヒとの戦い"
 BLR_European_university_connections: "欧州教育"
 BLR_European_university_connections_desc: "私たちは、学生の教育の質を向上させるため、ヨーロッパの大学を我が国に迎え入れる準備ができています。"
 BLR_LGBT_Belarus_quest: "ベラルーシにおけるLGBT問題"
 BLR_LGBT_Belarus_quest_desc: "LGBT問題は我が政府によって議題に上げられた。なぜなら我々はこのトレンドを無視できないからだ。我々は何をするだろうか？"
 BLR_Offshore_heaven: "外国投資家への税制優遇措置"
 BLR_Offshore_heaven_desc: "我々は、多くの投資家を惹きつけるような、我が国への投資にとって有利な環境を整備する。"
 BLR_wind_farms: "風力発電所"
 BLR_wind_farms_desc: "私たちはミンスクの各地区に複数の風力発電所を建設しました。"
 BLR_Hajdukiewicz: "ガイドゥケヴィチ"
 BLR_Hajdukiewicz_desc: "セルゲイ・ヴァシリエヴィチ・ガイデュケヴィチ（1954年9月8日生まれ）は、ベラルーシの政治家であり、ベラルーシ自由民主党の党首を務める著名人である。予備役大佐であり、親ロシア的な姿勢で知られている。ロシアとの連邦制、モスクワに発行センターを置く単一通貨の導入、そして共同軍事政策の実施を主張している。"
 BLR_Spiritual_revival: "ベラルーシの精神的復興"
 BLR_Spiritual_revival_desc: "ベラルーシの精神的復興のプロセスは継続されるべきである。社会における正教会とローマ・カトリック教会の役割は増大すべきである。"
 BLR_Ban_Enemies: "国内の敵との戦い"
 BLR_Ban_Enemies_desc: "我が国の政治情勢は完全に浄化されなければならない。外国からの資金援助を受けた破壊的な政党が、我が国の発展を妨害することは許されない。"
 BLR_Russian_Oligarch: "ロシアのオリガルヒとの友好"
 BLR_Russian_Oligarch_desc: "ロシアのオリガルヒたちは莫大な富を保有している。彼らを味方につける価値はあると思う。"
 BLR_Son_will_rule: "息子に統治させよ"
 BLR_Son_will_rule_desc: "指導者を変える時が来た。今こそセルゲイ・ガイデューケヴィチの息子が党と国を率いる時だ。"
 BLR_Hardline_EuroScepticism: "強硬な欧州懐疑主義"
 BLR_Hardline_EuroScepticism_desc: "強硬な欧州懐疑主義は必要不可欠だ。なぜなら、欧州は弱体化したベラルーシを望んでいるからだ。"
 BLR_Belarusian_nation_law: "ベラルーシ民族法"
 BLR_Belarusian_nation_law_desc: "我が国は長きにわたり、民族自決権を勝ち取ってきた。我々は輝かしい歴史を持つ民族であり、主権国家として明るい未来へと邁進していかなければならない。"
 BLR_russian_education: "ロシア教育"
 BLR_russian_education_desc: "私たちの大学はロシアの大学と連携を築くべきです。そうすれば、ロシア式の教育をすべての人に提供できるようになります。"
 BLR_Union_state_again: "ロシアへの編入"
 BLR_Union_state_again_desc: "私たちは再びロシアの一部となる準備ができています。"
 BLR_union_become_one: "連合は一つになる"
 BLR_Lykashenko: "§Yルカシェンコ§!"
 BLR_Lykashenko_desc: "アレクサンドル・グリゴリエヴィチ・ルカシェンコ（1954年8月30日生まれ）は、ベラルーシの政治家、国家指導者、軍人である。1994年7月20日からベラルーシ大統領および軍最高司令官を務めている。親ロシア的な見解で知られ、ベラルーシおよびロシア語圏の社会では「バトカ」という愛称で親しまれている。"
 BLR_ros_atom: "ロスアトム"
 BLR_ros_atom_desc: "我々は原子力エネルギー分野での協力のためにロスアトムの専門家を招待するだろう。"
 BLR_Impact_kgb: "KGBの影響"
 BLR_Impact_kgb_desc: "KGBは、新大統領の選出に不満を持つ人々を排除するために、様々な手段を用いる。"
 BLR_Liquidation_pub_assoc: "公的団体の清算"
 BLR_Liquidation_pub_assoc_desc: "The KGB is actively liquidating, or attempting to liquidate, public associations that are objectionable to our president."
 BLR_crackdown_opp_rall: "反体制派集会弾圧"
 BLR_crackdown_opp_rall_desc: "We are actively dispersing the rallies of our political opponents who are dissatisfied with the elections."
 BLR_Increased_censorship: "メディア検閲強化"
 BLR_Increased_censorship_desc: "It is necessary to impose strong censorship on the media so that our opponents cannot agitate against us."
 BLR_concept_national_security_Belarus: "国家安全保障概念"
 BLR_concept_national_security_Belarus_desc: "この概念は、個人、社会、国家の利益のバランスを確保し、内外の脅威からそれらを保護するためのベラルーシ共和国の活動の本質と内容に関する一連の公式見解を確立する。"
 BLR_Economic_development_2001_2005: "社会経済開発プログラム"
 BLR_Economic_development_2001_2005_desc: "2001年から2005年までのベラルーシ共和国社会経済開発プログラムは、ベラルーシ共和国経済省が他の省庁および共和国国家行政機関、地方執行委員会、ミンスク市執行委員会と共同で、国立科学アカデミー、国立銀行、専門研究機関、公的団体の参加を得て、ベラルーシ共和国法「国家予測およびベラルーシ共和国社会経済開発プログラムについて」および2001年から2005年までのベラルーシ共和国社会経済開発プログラムの開発に関する2000年2月2日のベラルーシ共和国閣僚評議会決議N 141および2000年8月10日のN 1248に従って開発された。"
 BLR_reforms_Belarusian_Railway: "ベラルーシ鉄道改革"
 BLR_reforms_Belarusian_Railway_desc: "Our railways are in a very poor state, so we will carry out a set of reforms to improve the situation."
 BLR_new_railway_station: "新ミンスク駅"
 BLR_new_railway_station_desc: "We have built a new train station in Minsk. Our city will now be able to receive more trains."
 BLR_Electrification_Myslishche_Kryzhovka: "ムィスリシチェ＝クルィジョーフカ電化"
 BLR_Electrification_Myslishche_Kryzhovka_desc: "The Myslyshche-Kryzhovka line is one of the highest development priorities in our country, so we will address it first."
 BLR_Baranovichi_Plant: "バラノヴィチ工場"
 BLR_Baranovichi_Plant_desc: "We are creating a structural division of the Baranovichi Plant of Construction Parts and Structures to improve the supply of parts to our trains."
 BLR_Energy_conflict_over: "ベルガストランス売却"
 BLR_Energy_conflict_over_desc: "The conflict is coming to an end. We have agreed to Russia's terms and are ready to sell Belgaztrans. In return, energy prices will be stabilized for us."
 BLR_new_rolling_stock: "新車両購入"
 BLR_new_rolling_stock_desc: "By purchasing new rolling stock, we will eliminate the main problem plaguing our railways."
 BLR_promise_first_nuclear: "原子力発電所建設の約束"
 BLR_promise_first_nuclear_desc: "We promise all our citizens that a nuclear power plant will be built on the territory of our country, thereby ensuring our energy security."
 BLR_New_Land_code: "新土地法"
 BLR_New_Land_code_desc: "The new Land Code significantly simplifies the purchase of land by private owners and companies, which will clearly appeal to a certain segment of the population."
 BLR_Zubr_Energy_LLC: "ズーブル・エナジーLLC開設"
 BLR_Zubr_Energy_LLC_desc: "世界および国内の自動車メーカーのコンベアラインへのスターターバッテリー供給のための生産工場。"
 BLR_Hi_Tech_Park: "ハイテクパーク"
 BLR_Hi_Tech_Park_desc: "Hi-Tech Park is a special tax and legal regime for the development of IT business in Belarus. It is not a free (special, special) economic zone, but it is a jurisdiction that operates on the principle of extraterritoriality. Companies and individual entrepreneurs registered in the Park can use the preferences provided to them regardless of the location of their Belarusian office."
 BLR_Referendum_Belarus_2004: "2004年ベラルーシ国民投票"
 BLR_Referendum_Belarus_2004_desc: "2004年10月17日、ベラルーシは独立ベラルーシ史上3回目の、ルカシェンコ大統領によって開始された共和国国民投票を開催した。国民投票は2004年9月7日の大統領令第431号によって任命され、議会選挙と組み合わされた。"
 BLR_Energy_conflict: "ロシア＝ベラルーシ・エネルギー紛争"
 BLR_Energy_conflict_desc: "紛争は2006年12月に始まった。ガスプロムがベラルーシ共和国への天然ガス価格の最終版を1000立方メートルあたり105ドルと発表した時である。さらに、75ドルは現金で支払われ、ベラルーシは残りの30ドルを50億ドルと見積もられたベルトランズガスの株式で支払う権利を持つことになった。"
 BLR_Decree_n3: "寄生に関する布告"
 BLR_Decree_n3_desc: "No one will sit on state benefits any longer. It is time to make all the idle work."
 BLR_launch_own_satellite: "ベラルーシ、独自衛星打ち上げ"
 BLR_launch_own_satellite_desc: "ベラルーシ地球リモートセンシング衛星は、2012年7月22日にカザフスタンのバイコヌール宇宙基地から打ち上げられた――5機の宇宙船クラスターで：ロシアのカノープスVとMKA-FKI（ゾンドPP）、ドイツのTET-1、カナダのADS-1Bと共に。"
 BLR_gasification_country: "国家ガス化完了"
 BLR_gasification_country_desc: "We will complete the gasification of our country, which our citizens will surely appreciate."
 BLR_CJSC_Turkcell: "トゥルクセルとの取引"
 BLR_CJSC_Turkcell_desc: "An important deal will be made between us and our Turkish partners — the sale of a controlling stake in CJSC \"BeST\" to Turkcell. This will open another avenue for investment in our country."
 BLR_Anti_Corruption: "汚職撲滅キャンペーン"
 BLR_Anti_Corruption_desc: "We must defeat corruption in our country. The main thing is not to end up implicated yourself."
 BLR_Punish_Shushkevich: "Punish Shushkevich's Cronies"
 BLR_Punish_Shushkevich_desc: "Shushkevich left us a legacy in the form of his loyalists in the government. It is time to get rid of them."
 BLR_Promote_new_officers: "ベラルーシ軍事改革完了"
 BLR_Promote_new_officers_desc: "We will complete a set of measures for the transformation of our armed forces, which began in 1994."
 BLR_Internet_cencorship: "インターネット検閲"
 BLR_Internet_cencorship_desc: "The Internet has become a platform where sentiments aimed at overthrowing the government are openly discussed. It is necessary to control this."
 BLR_Raiffeisen2: "ベラルーシのライファイゼン"
 BLR_Raiffeisen2_desc: "Established in 1989, Priorbank has been a subsidiary of RBI since 2003. It is one of the largest local private banks and one of the country's leading financial institutions in terms of efficiency and profitability. As a universal bank, it services corporate customers, small and medium-sized enterprises as well as private individuals."
 BLR_Henkel2: "ヘンケル"
 BLR_Henkel2_desc: "ヘンケル・コンツェルンのベラルーシにおける建設化学品部門であるヘンケル・バウテクニックLLCは、輸入代替製品の生産を組織する目的で2004年に設立された。2005年に、ザスラーウエでのセレジット建材混合物の生産工場の建設が始まり、生産は2006年9月に開始された。同社の製品範囲には100以上の品目が含まれ、既製の外装、断熱およびファサード仕上げシステム、床材および防水システム、仕上げのための表面準備材料、シーラント、取り付けフォーム、「液体釘」、石膏が含まれる。"
 BLR_Jeans_Revolution: "ジーンズ革命"
 BLR_Jeans_Revolution_desc: "A mass protest rally in the center of Minsk and other cities of Belarus, which began on March 19, 2006 in response to the falsifications of the authorities in the presidential elections that took place earlier."
 BLR_reform_kolhoz: "集団農場改革"
 BLR_reform_kolhoz_desc: "It is necessary to reform collective farms to ensure the stability of our agro-industry."
 BLR_Eastern_Partnership: "東方パートナーシップ"
 BLR_Eastern_Partnership_desc: "The Eastern Partnership is a project of the European Union, with the main stated goal of developing integration ties of the European Union with six countries of the former USSR: Azerbaijan, Armenia, Belarus, Georgia, Moldova and Ukraine."
 BLR_Azarenok_case: "イーゴリ・アザリョノク事件"
 BLR_Azarenok_case_desc: "General Azarenok was suspected of lobbying for Russian interests in the Republic of Belarus through bribes and other frauds. Should we pay attention to this?"
 BLR_National_Library: "国立図書館新館"
 BLR_National_Library_desc: "国全体が参加した建設におけるベラルーシ国立図書館の新館は、2006年6月16日に利用者に開館した。"
 BLR_delta_city: "「デルタシティ」ビジネスセンター"
 BLR_delta_city_desc: "During the National Exhibition of Serbia in Minsk, a major contract was signed for the construction of the Delta City business center and the development of the territory near the National Library with a total investment of several billion euros (the developer is Dana Holdings, owned by Serbian businessmen)."
 BLR_BRSM_desc: "ベラルーシ共和国青年連合はベラルーシ共和国の青年公的団体である。それは国内最大の青年団体であり、アレクサンドル・ルカシェンコによって支持されている。その活動は国家によって資金提供されている。"
 BLR_Potato_Empire: "ポテト・エンパイア"
 BLR_Potato_Empire_desc: "我々は世界でもトップクラスにジャガイモに目がない。我が国はこのことを誇りに思うべきだ。"
 BLR_Factory_Kommunarka: "コムナルカ工場国有化"
 BLR_Factory_Kommunarka_desc: "Our President believes that the privatization of the Confectionery Factory \"Kommunarka\" was illegal, so the nationalization of this enterprise has been announced."
 BLR_Another_year: "独立のもう一年"
 BLR_Another_year_desc: "Belarus will continue to follow its independent policy."
 BLR_Migrant_crisis: "移民危機"
 BLR_Migrant_crisis_desc: "ベラルーシ国境における移民危機は、主にイラクとシリアから、より少ない程度でアフガニスタンから、そしてさらに少ない程度でアフリカ諸国から（ポーランド国境警備隊の統計による）の違法移民の流入により発生し、彼らはEU諸国（リトアニア、ラトビア、ポーランド）に入国しようとしている。"
 BLR_Another_Elections: "そして再び選挙"
 BLR_Another_Elections_desc: "The next elections in our country are just around the corner. Who will win?"
 BLR_Bye_opposition: "反体制派に容赦なし"
 BLR_Bye_opposition_desc: "We do what we always do — we deal with the opposition hard and fast."
 BLR_Milk_war: "牛乳戦争"
 BLR_Milk_war_desc: "A series of deteriorations in relations between Belarus and Russia, stemming from disputes over the export of dairy products to Russia."
 BLR_Changes_Customs_policy: "関税政策変更"
 BLR_Changes_Customs_policy_desc: "New changes and strictures have been introduced to complicate the import of counterfeit products into our country."
 BLR_whitelegion_case: "白い軍団事件"
 BLR_whitelegion_case_desc: "Our special services have reported on the great activity of representatives of the White Legion. It is necessary to catch them and put them in prison."
 BLR_PolBel_Dplomatic_war: "ポーランド＝ベラルーシ外交戦争"
 BLR_PolBel_Dplomatic_war_desc: "Despite the warming of relations, the conflict with Poland is rekindling with its former strength."
 BLR_project_bombel: "BOMBELプロジェクト"
 BLR_project_bombel_desc: "The European Union has allocated funds to strengthen the border between Belarus and the EU against the influx of illegal migrants. Our business is deciding how to use these funds."
 BLR_Investing_Agro_industry: "農業産業への投資"
 BLR_Investing_Agro_industry_desc: "The agro-industry is an important component of our country's economy, and we will continue to increase investments in this sector."
 BLR_fate_belarusian_church: "ベラルーシ教会の運命"
 BLR_fate_belarusian_church_desc: "We should decide which way our church will go."
 BLR_Pension_reform: "年金改革"
 BLR_Pension_reform_desc: "It is time to carry out pension reform and raise the retirement age."
 BLR_People_Militia: "Creation of People's Militia"
 BLR_People_Militia_desc: "We are ready to adopt a law on the creation of a people's militia, which will be a kind of reserve for Territorial defense. In each village there should be a trained group of people to counter the enemy, with subsequent transformation into a partisan movement."
 BLR_Wagner_arrest: "Situation With PMCs Wagner"
 BLR_Wagner_arrest_desc: "Our special services have arrested fighters from the famous Russian PMC Wagner. We must decide what to do with them."
 BLR_Country_for_life: "生活のための国"
 BLR_Country_for_life_desc: "Our government has decided to deal with the opposition more cunningly, luring its prominent figures to our side. One of them is Sergey Tikhanovsky, organizer of the \"Country for Life\" project. After the events that followed, rather than arresting him, we publicly invited him into the government, where he could help improve our country. The opposition itself will be divided by such a move."
 BLR_Amendment_to_Constitution: "憲法の重大な変更"
 BLR_Amendment_to_Constitution_desc: "Our permanent leader, Alexander Lukashenko, has recognized that the country needs radical changes and that it is time to move away from sole presidential power. A referendum on changing the constitution has been announced, under which power will mostly belong to the parliament."
 BLR_army_on_streets_of_cities: "大規模抗議"
 BLR_army_on_streets_of_cities_desc: "The people have rebelled against us. They believe that our government is falsifying election results and ruining the country. I hope we have prepared well for such events."
 BLR_Pazniak: "ベラルーシ・ナショナリスト"
 BLR_Pazniak_desc: "Nationalist forces have seized power in the country. Where will they lead Belarus — toward a brighter future, or toward the country's collapse?"
 BLR_patriotism_desc: "It is time to raise the level of patriotic education in our country."
 BLR_Belarusisation: "ベラルーシ化"
 BLR_Belarusisation_desc: "All literature and all official titles must be in Belarusian."
 BLR_Democratic_clean: "民主主義者粛清"
 BLR_Democratic_clean_desc: "We are not going to become servants of the West. It is time to purge our country of democrats."
 BLR_Communistst_clean: "共産主義者粛清"
 BLR_Communistst_clean_desc: "The legacy of the USSR must be destroyed. It is time to drive out these adherents of the red contagion."
 BLR_denied_rus_language: "ロシア語否定"
 BLR_denied_rus_language_desc: "Russian will no longer be the second state language. We have had enough of the Russian occupation."
 BLR_anti_immigration_policies: "反移民政策"
 BLR_anti_immigration_policies_desc: "Implementing stricter anti-immigration policies will keep the Belarusian identity alive and well."
 BLR_russofobia: "反ロシア政策"
 BLR_russofobia_desc: "It is time to deal with the common enemy — Russia. It is time to tame its imperialist ambitions toward us."
 BLR_decolectivisation: "脱集団化"
 BLR_decolectivisation_desc: "It is time to get rid of the Soviet legacy and assist the population in moving to the cities."
 BLR_litvins_past: "リトヴィンの過去"
 BLR_litvins_past_desc: "歴史は変えられない、そして我々はそれを知っている。我々リトヴィンはリトアニア大公国の誇り高き相続人である。"
 BLR_constitution_from_1994: "1994年憲法"
 BLR_constitution_from_1994_desc: "It is time to restore a proper constitution in our country."
 BLR_We_not_energy_slave: "我々はロシア資源の奴隷ではない"
 BLR_We_not_energy_slave_desc: "Russia gave discounts only to support its puppet regime. That is enough. We are ready to build a strong economy without those discounts."
 BLR_Influence_nationalists: "民族主義者の影響力"
 BLR_Influence_nationalists_desc: "We must actively support nationalist movements in neighboring countries."
 BLR_Territorial_claims: "領土主張"
 BLR_Territorial_claims_desc: "Our country must return to its true borders."
 BLR_white_legion_desc: "The White Legion is a sports and patriotic organization of Belarus, founded in 1995 for pre-conscription training and patriotic education of young people."
 BLR_white_legion_battalion: "白い軍団大隊"
 BLR_white_legion_battalion_desc: "The first battalion of the White Legion has finally been formed. True patriots of their country are ready to fight for its freedom and strength."
 BLR_GDL: "リトアニア大公国"
 BLR_GDL_desc: "It is time to restore the great state of the Litvinov people. Finally, our people will not be under the yoke of a superpower; they will have the opportunity to become a superpower themselves."
 BLR_help_silesians: "シレジア分離主義者支援"
 BLR_help_silesians_desc: "Divide and rule is the main principle we will apply in our policy toward Poland. When the active phase of bringing the Poles under our control begins, the Silesians may help facilitate our conquest of that country."
 BLR_lith_again: "ジェマイティヤへ戻る"
 BLR_lith_again_desc: "The time has come to complete the reconstruction of our mighty state. A small and weak Lithuania stands in our way; we will break it. But we cannot attack the country without justification; we must create the necessary conditions and a pretext so that our invasion does not appear groundless."
 BLR_true_political_and_national_freedom: "真の政治的自由"
 BLR_true_political_and_national_freedom_desc: "True political freedom begins with recovering from the devastation caused by our internal purges. It is time to move forward and attain what our people truly desire."
 BLR_Taler_ruble: "ベラルーシ・ターラー"
 BLR_Taler_ruble_desc: "We must abandon the ruble entirely, replacing it with our new currency."
 BLR_National_science: "科学経済成長"
 BLR_National_science_desc: "We will begin developing our own science and economy as an independent state."
 BLR_Delete_KGB: "KGB解体"
 BLR_Delete_KGB_desc: "The KGB should be dissolved and replaced by a new structure."
 BLR_Reform_Police: "警察改革"
 BLR_Reform_Police_desc: "The Soviet militia was a relic of the past that we want to get rid of. We are reorganizing it into a national police force modeled on that of Poland."
 BLR_attack_russian_bear: "ロシア熊を仕留めよ"
 BLR_attack_russian_bear_desc: "Finally, our main enemy will be destroyed."
 BLR_Young_Front_desc: "The Young Front is an international youth movement of Belarusian youth and a youth opposition organization of Belarus."
 BLR_south_river_battalion: "サウスリバー大隊"
 BLR_south_river_battalion_desc: "サウスリバー郡出身のアメリカ住民から編成された大隊。"
 BLR_territorial_reform: "領土改革"
 BLR_territorial_reform_desc: "今日の6つの州と110の地区の代わりに、ゼノン・ポズニャクとプログラムの著者チームは国を16の県に分割し、加えてミンスクを別個にすることを提案している。県は、順番に、60の郡と270の古い町に分割されるだろう。"
 BLR_anti_lgbt: "倒錯的関係プロパガンダ禁止"
 BLR_anti_lgbt_desc: "我々は家族、結婚（男性と女性の結合）、母性の優先と保護、イデオロギーや組織による家族問題への侵害や干渉からの家族保護に関する法律を採択している。加えて、「人間の本性の保護について」の法律を採択し、人間の自然な本性に反する倒錯的関係のプロパガンダを禁止することが提案されている。"
 BLR_latgale_or_war: "ラトガレか戦争か"
 BLR_latgale_or_war_desc: "Latgale was once part of the Grand Duchy of Lithuania. The time has come to return these lands to our state. Latvia is unlikely to be able to resist us."
 BLR_legacy_kurland: "クールラント公国遺産"
 BLR_legacy_kurland_desc: "The Duchy of Courland once reached out in the race of colonization. The flag of the Duchy once flew over Trinidad and Tobago and along the coast of Gambia. As the rightful successors of the Duchy, the time has come to seek the return of these territories to our empire and bring these former colonial holdings back into the fold."
 BLR_pro_poland_propoganda: "Pro-Belarusian Propaganda in Poland"
 BLR_pro_poland_propoganda_desc: "We must increase our influence in Poland through propaganda and other means of interaction."
 BLR_Dismiss_soviet_officers: "Dismiss Pro-Soviet Officers"
 BLR_Dismiss_soviet_officers_desc: "The fight against the Soviet legacy should also extend to the army. We do not need generals who sympathize with that bloody regime."
 BLR_Anti_corruption_law: "汚職防止法"
 BLR_Anti_corruption_law_desc: "We will fight corruption in all its manifestations."
 BLR_open_border_with_pol: "開かれた国境"
 BLR_open_border_with_pol_desc: "国境開放は我々の人民が経済的にだけでなく、物理的にも繋がっていると感じるのを助けるだろう。"
 BLR_training_for_pol: "合同軍事演習"
 BLR_training_for_pol_desc: "Our armies need combat coordination. Joint military exercises will help greatly with this."
 BLR_Asseco_Poland: "アセコ・ポーランド"
 BLR_Asseco_Poland_desc: "We will buy out this company and make it the property of our future state of Belarusians and Poles."
 BLR_ynia_Poland: "第二次ルブリン合同"
 BLR_ynia_Poland_desc: "It is time to remember how humiliating the Union of Lublin was for the Grand Duchy of Lithuania. This time, it will be different."
 BLR_Ukraine_way: "ウクライナとの友好"
