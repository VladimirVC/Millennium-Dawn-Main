 IND_back_papua: "支持基督徒"
 IND_back_papua_desc: "我们的基督徒长期以来一直被忽视。作为州政府，我们有责任保障所有基督徒的权益和公平待遇，无论他们是否属于少数群体。他们必须始终受到保护！\n\n\n\n谈判至关重要，必须立即开始！"
 IND_papua: "与基督徒谈判条款"
 IND_papua2: "给予他们更多的代表权"
 IND_papua3: "教育他们游击战"
 IND_papua4: "承诺给予他们更好的照顾"
 IND_papua_generic: "将民兵调往巴布亚"
 IND_papua_generic2: "重新安置伊斯兰建筑项目"
 IND_papua_generic3: "加固教堂"
 IND_back_noone: "无人回馈"
 IND_back_noone_desc: "国家在处理宗教冲突等敏感问题时，不应偏袒任何一方，这一点至关重要。我们必须通过谈判和冲突地区的军事化手段，着手缓解这种紧张局势。\n\n这样做会给苏拉威西人和巴布亚人带来更多平静。"
 IND_neutral: "在各省举行团结集会"
 IND_neutral2: "为苏拉威西岛新建工程提供资金"
 IND_neutral3: "资助巴布亚教会"
