 UN.415.t: "Resolution: Economic Growth"
 UN.415.d: "The §BUnited Nations§! §YGeneral Assembly§! has passed a non-binding resolution on §YEconomic Growth§!. Although we did not vote in favor of this resolution, we may still choose to accept and implement it.\n\nShould we agree to follow this resolution?"
 UN.415.a: "Accept the Resolution"
