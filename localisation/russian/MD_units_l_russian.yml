l_russian:
 fighter: "Истребитель превосходства в воздухе"
 Strike_fighter: "Ударный истребитель"
 L_Strike_fighter: "Легкий ударный истребитель"
 CV_L_Strike_fighter: "Палубный ударный истребитель"
 multi_role_fighter: "Многоцелевой истребитель"
 cv_multi_role: "Палубный многоцелевой истребитель"
 cas: "Штурмовик"
 strat_bomber: "Стратегический бомбардировщик"
 transport_plane: "Транспортный самолет"
 attack_helicopter: "Штурмовой вертолет"
 Air_UAV: "Беспилотный летательный аппарат"
 transport_helicopter: "Транспортный вертолет"
 Militia_Bat: "Военная полиция"
 Militia_Bat_desc: "Батальон ополчения в пешем строю. Подразделения ополчения характеризуются меньшим количеством тяжелого вооружения и средств связи, чем обычная пехота. Это делает их очень мобильными и эффективными на плохой местности, но они быстро тают на ровной местности против бронированного противника."
 Mot_Militia_Bat: "Моторизованная военная полиция"
 Mot_Militia_Bat_desc: "Батальон ополчения с пикапами или даже бронированными транспортными средствами. Подразделения ополчения характеризуются меньшим количеством тяжелого оборудования и комплектов связи, чем обычная пехота. Это делает их очень мобильными и эффективными на плохой местности, но они быстро тают на ровной местности против бронированного противника."
 L_Inf_Bat: "Легкая пехота"
 L_Inf_Bat_desc: "Легкая пехота без транспорта. Редко встречается на современном поле боя, но существуют специализированные подразделения в очень сложных условиях, таких как джунгли и горы, где они очень эффективны. Также могут быть полезны в качестве городских гарнизонов."
 Mot_Inf_Bat: "Моторизованная пехота"
 Mot_Inf_Bat_desc: "Моторизованная пехота использует в качестве транспорта все виды транспортных средств общего назначения, от пикапов до современных противоминных транспортных средств. Они хорошо подходят для ведения боевых действий в горной местности и в городских районах."
 Mech_Inf_Bat: "Механизированная пехота"
 Mech_Inf_Bat_desc: "Механизированная пехота использует бронетранспортеры в качестве транспорта. Они хорошо подходят для танкового боя на равнинной местности."
 Arm_Inf_Bat: "Бронированная пехота"
 Arm_Inf_Bat_desc: "Бронированная пехота использует боевые машины пехоты в качестве транспорта. Они хорошо подходят для бронированного боя на равнинной местности, но бесполезны на сложной местности, где им приходится действовать пешком вдали от своих БМП."
 L_Air_Inf_Bat: "Airborne Infantry"
 L_Air_Inf_Bat_desc: "Воздушно-десантная легкая пехота — элитная пехота, прошедшая специальную подготовку по воздушному внедрению с помощью парашютного десанта с транспортных самолетов или с транспортных вертолетов. Они могут быстро реагировать на чрезвычайные ситуации издалека и могут быть внедрены в тыл противника для захвата жизненно важных объектов перед наступлением основной армии. Однако их способ транспортировки накладывает строгие ограничения на количество тяжелого оборудования, которое они могут нести."
 Mot_Air_Inf_Bat: "Моторизованная воздушно-десантная пехота"
 Mot_Air_Inf_Bat_desc: "Моторизованная воздушно-десантная пехота — элитная пехота, прошедшая специальную подготовку по воздушному десантированию с помощью парашютов с транспортных самолетов или с транспортных вертолетов. Они могут быстро реагировать на чрезвычайные ситуации издалека и могут быть высажены за линию фронта, чтобы захватить жизненно важные цели перед наступлением основной армии. Их транспортные средства общего назначения обеспечивают им большую мобильность при высадке и позволяют им брать на себя больше тяжелого оборудования в битве. Однако гораздо более логистически сложно высаживать их вместе с транспортными средствами."
 Mech_Air_Inf_Bat: "Механизированная воздушно-десантная пехота"
 Mech_Air_Inf_Bat_desc: "Механизированная воздушно-десантная пехота — элитная пехота, прошедшая специальную подготовку по воздушному десантированию с помощью парашютов с транспортных самолетов. Они могут быстро реагировать на чрезвычайные ситуации издалека и могут быть высажены за линию фронта, чтобы захватить жизненно важные цели перед наступлением основной армии. Их специально разработанные легкие бронетранспортеры обеспечивают им большую мобильность при высадке и позволяют им брать в бой гораздо больше тяжелого оборудования, чем легкие воздушно-десантные войска. Однако гораздо сложнее с точки зрения логистики высаживать их вместе с такими транспортными средствами."
 Arm_Air_Inf_Bat: "Бронированная воздушно-десантная пехота"
 Arm_Air_Inf_Bat_desc: "Бронированная воздушно-десантная пехота — элитная пехота, прошедшая специальную подготовку по воздушному высадке с помощью парашютного десанта с транспортных самолетов. Они могут быстро реагировать на чрезвычайные ситуации издалека и могут быть высажены за линию фронта, чтобы захватить жизненно важные цели перед наступлением основной армии. Их специально разработанные легкие боевые машины пехоты дают им большую мобильность и позволяют им на равных сражаться с обычными механизированными формированиями. Однако их десантирование с парашютом вместе с их БМП — чрезвычайно сложная задача с точки зрения логистики. По состоянию на 2017 год только Россия когда-либо использовала такие силы."
 L_Marine_Bat: "Marine Infantry"
 L_Marine_Bat_desc: "Marine Infantry are elite Infantry, with special training in amphibious operations, such as river-crossings, operation in swamps, and amphibious invasions. As they don't have vehicles, there are strict limits on the amount of heavy equipment they can carry, though."
 Mot_Marine_Bat: "Моторизованная морская пехота"
 Mot_Marine_Bat_desc: "Моторизованная морская пехота — элитная пехота, прошедшая специальную подготовку в десантных операциях, таких как переправы через реки, операции на болотах и ​​десантные вторжения. Хотя они высаживаются как легкая пехота, у них есть транспортные средства в качестве наземного транспорта, что дает им большую мобильность и позволяет им перевозить большое количество тяжелого оборудования в бой."
 Mech_Marine_Bat: "Механизированная морская пехота"
 Mech_Marine_Bat_desc: "Механизированная морская пехота — элитная пехота, прошедшая специальную подготовку в десантных операциях, таких как переправы через реки, операции в болотах и ​​десантные вторжения. Поскольку они высаживаются в защищенных условиях в своих специально разработанных плавающих бронетранспортерах, они очень хорошо оснащены для немедленного нанесения удара с большой мобильностью, перевозя в бой большое количество тяжелого оборудования."
 Arm_Marine_Bat: "Бронированная морская пехота"
 Arm_Marine_Bat_desc: "Бронированная морская пехота — элитная пехота, прошедшая специальную подготовку в десантных операциях, таких как переправы через реки, операции в болотах и ​​десантные вторжения. Они могут пересекать большие расстояния по воде в своих тяжелобронированных реактивных боевых машинах пехоты-амфибии и быть готовыми сражаться с тех же БМП, как только они доберутся до берега с большой сноровкой."
 L_Air_assault_Bat: "ВДВ"
 L_Air_assault_Bat_desc: "Воздушно-десантные войска — это элитная пехота. Благодаря специальной подготовке по спуску на верёвках и воздушной транспортировке их снаряжение иногда специально разрабатывается или дорабатывается для удобства перевозки в самолётах. Их часто используют для захвата и удержания ключевых районов, ещё не полностью контролируемых, а также для прямого взаимодействия с противником в тылу врага."
 attack_helo_bat: "Полк ударных вертолётов"
 attack_helo_bat_desc: "Я идентифицирую себя как ударный вертолёт AH-64 Apache."
 attack_helo_comp: "Ударная вертолётная рота"
 attack_helo_comp_desc: "Я идентифицирую себя как ударный вертолёт AH-64 Apache."
 Special_Forces: "Силы специального назначения"
 Special_Forces_desc: "Силы специальных операций являются элитой любой армии, где они представлены, с более длительной и тяжелой подготовкой, чем у кого-либо еще. Они эксперты по сложным ландшафтам, воздушно-десантным операциям и высадкам десанта. Однако они очень легко экипированы, поскольку им может потребоваться мобильность в тылу фронта."
 armor_Bat: "Tank Company"
 armor_Bat_desc: "A Tank Company features only the most heavily armored vehicles in existence, Main Battle Tanks. With excellent mobility in flat terrain and fierce direct fire, they are designed to punch holes in the enemy front lines that can be rapidly exploited by follow-up mechanized infantry units."
 armor_Comp: "Танковая рота"
 armor_Comp_desc: "Танковая рота состоит только из самых тяжелобронированных машин из существующих, основных боевых танков. Обладая превосходной мобильностью на равнинной местности и яростным прямым огнем, они предназначены для проделывания дыр в передовых линиях противника, которые могут быть быстро использованы последующими механизированными пехотными подразделениями."
 L_Recce_Comp: "Infantry Recce Company"
 L_Recce_Comp_desc: "Infantry Recce Companies operate on foot, and is therefore devoid of much of the heavy equipment that make them an effective fighting unit. They infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform limited raids and ambushes. Recce Companies are often called 'Squadrons' due to their legacy as former Cavalry units."
 Mot_Recce_Comp: "Моторизованная развед.рота"
 Mot_Recce_Comp_desc: "Моторизованные разведывательные роты работают на транспортных средствах общего назначения и имеют во многом то же оборудование, что и их коллеги из пехоты. Однако их роли отличаются. Они проникают близко к противнику, чтобы наблюдать и сообщать о его действиях, и используют как разведку с помощью дронов, так и электронное наблюдение для сбора разведданных. Они также могут совершать ограниченные рейды и засады. Разведывательные роты часто называют «эскадронами» из-за их наследия как бывших кавалерийских подразделений."
 Mech_Recce_Comp: "Механизированная развед.рота"
 Mech_Recce_Comp_desc: "Механизированные разведывательные роты действуют на бронетранспортерах и имеют во многом то же снаряжение, что и их пехотные коллеги. Однако их роли отличаются. Они проникают близко к противнику, чтобы наблюдать и сообщать о его действиях, и используют как разведывательные дроны, так и электронное наблюдение для сбора разведданных. Они также могут совершать ограниченные рейды и засады. Разведывательные роты часто называют «эскадронами» из-за их наследия как бывших кавалерийских подразделений."
 Arm_Recce_Comp: "Тяжёлая мех.рота"
 Arm_Recce_Comp_desc: "Тяжелые механизированные разведывательные роты работают с боевыми машинами пехоты и имеют во многом то же оборудование, что и их коллеги из бронетанковой пехоты. Однако их роли отличаются. Они проникают близко к противнику, чтобы наблюдать и сообщать о его действиях, и используют как разведку беспилотников, так и электронное наблюдение для сбора разведданных. Они также могут совершать рейды и устраивать засады. Разведывательные роты часто называют «эскадронами» из-за их наследия как бывших кавалерийских подразделений."
 L_arm_Bat: "Light Tank Company"
 L_arm_Bat_desc: "Light Tank Company operates with special, often wheeled, Light Tanks that combine incredible mobility with awe-inspiring stopping power. They can hold their own against all types of Infantry in direct combat. Direct combat isn't their intended role, though - they infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes on important enemy assets and mechanized formations."
 armor_Recce_Comp: "Бронированная развед.рота"
 armor_Recce_Comp_desc: "Бронированные разведывательные роты работают со специальными легкими танками Recon, которые сочетают в себе невероятную мобильность с впечатляющей убойной силой. Они могут противостоять всем типам пехоты в прямом бою. Однако прямой бой не является их предполагаемой ролью — они проникают близко к врагу, чтобы наблюдать и сообщать о его действиях, и используют как разведку с помощью дронов, так и электронное наблюдение для сбора разведданных. Они также могут совершать рейды и устраивать засады на важные вражеские активы и механизированные формирования. Разведывательные роты часто называют «эскадронами» из-за их наследия как бывших кавалерийских подразделений."
 L_Engi_Comp: "Engineer Battalion"
 L_Engi_Comp_desc: "Инженеры занимаются строительством временных мостов и оборонительных периметров, установкой мин и расчисткой, а также обезвреживанием бомб. Они несут основное пехотное вооружение для оборонительных целей."
 H_Engi_Comp: "Heavy Engineer Battalion"
 H_Engi_Comp_desc: "Инженеры занимаются строительством временных мостов и оборонительных периметров, установкой мин и расчисткой, а также обезвреживанием бомб. Они несут основное пехотное вооружение для оборонительных целей. С помощью строительных и ремонтных машин на базе корпуса основного боевого танка они хорошо оснащены для восстановления поврежденной в бою бронетехники с линии фронта."
 Arty_Bat: "Артиллерия"
 Arty_Bat_desc: "Благодаря своим мощным возможностям непрямого огня артиллерия обеспечивает устойчивые точные удары там, где это необходимо на поле боя, и далеко за пределами видимости. Она может перезаряжаться непосредственно своим экипажем. Поскольку для ее передвижения требуются внешние транспортные средства, ее может быть трудно перемещать между ударами, что делает ее уязвимой для контрударов вражеской артиллерии. Легкие системы меньшего калибра можно перетаскивать вручную, и они подходят для воздушных операций, поскольку они могут помещаться внутри транспортных самолетов."
 Arty_Battery: "Артиллерийская батарея"
 Arty_Battery_desc: "Благодаря своим мощным возможностям непрямого огня артиллерия обеспечивает устойчивые точные удары там, где это необходимо на поле боя, и далеко за пределами видимости. Она может перезаряжаться непосредственно своим экипажем. Поскольку для ее передвижения требуются внешние транспортные средства, может быть трудно перемещаться между ударами, что делает ее уязвимой для контрударов вражеской артиллерии. Легкие системы меньшего калибра можно перетаскивать вручную, и они подходят для воздушных операций, поскольку они могут помещаться внутри транспортных самолетов."
 SP_Arty_Bat: "Самоходная артиллерия"
 SP_Arty_Bat_desc: "Благодаря своим мощным возможностям непрямого огня самоходная артиллерия обеспечивает устойчивые точные удары там, где это необходимо на поле боя, и далеко за пределами видимости. Она может перезаряжаться непосредственно своим экипажем, а ее самоходность делает ее мобильной, так что она может двигаться, избегая ответных ударов вражеской артиллерии."
 SP_Arty_Battery: "Самоходная арт. батарея"
 SP_Arty_Battery_desc: "Благодаря своим мощным возможностям непрямого огня самоходная артиллерия обеспечивает устойчивые точные удары там, где это необходимо на поле боя, и далеко за пределами видимости. Она может перезаряжаться непосредственно своим экипажем, а ее самоходность делает ее мобильной, так что она может двигаться, избегая ответных ударов вражеской артиллерии."
 SP_R_Arty_Bat: "Самоходная реактивная артиллерия"
 SP_R_Arty_Bat_desc: "Используя пусковые установки MLRS, батальон реактивной артиллерии может уничтожить целую область с большого расстояния. Используется против тыловых районов противника, так как неизбирательный огонь делает его непригодным для точных ударов на поле боя. Для него требуются специальные транспортные средства для перезарядки, а время перезарядки медленное."
 SP_R_Arty_Battery: "Самоходная реактивная арт. батарея"
 SP_R_Arty_Battery_desc: "Используя пусковые установки MLRS, батарея реактивной артиллерии может уничтожать районы с большого расстояния. Используется против тыловых районов противника, так как неизбирательный огонь делает его непригодным для точных ударов на поле боя. Для него требуются специальные транспортные средства для перезарядки, а время перезарядки медленное."
 SP_AA_Bat: "Самоходная установка противовоздушной обороны"
 SP_AA_Bat_desc: "Используя самоходные зенитно-ракетные комплексы малой и средней дальности, батальон ПВО будет защищать свое подразделение от ударов непосредственной авиационной поддержки противника."
 SP_AA_Battery: "Самоходная зенитная батарея"
 SP_AA_Battery_desc: "Используя самоходные зенитно-ракетные комплексы малой и средней дальности, батарея ПВО будет защищать свое подразделение от ударов непосредственной авиационной поддержки противника."
 combat_service_support_company: "Combat Service Support Battalion"
 combat_service_support_company_desc: "Логистические и медицинские услуги дивизии."
 helicopter_combat_service_support: "Helicopter Combat Service Support Battalion"
 helicopter_combat_service_support_desc: "Логистические и медицинские услуги дивизии."
 L_Marine_Cdo_Bat: "Батальон морских коммандос "
 L_Marine_Cdo_Bat_desc: "Коммандос морской пехоты — это более крупные формирования морских рейдеров, обученные проводить операции типа «бей и беги», а также выполнять другие задачи легкой пехоты."
 air_assault_Arty_Battery: "Воздушная арт.батарея"
 air_assault_Arty_Battery_desc: "Используя буксируемые артиллерийские орудия, эти подразделения повышают свою мобильность за счет заряжания орудий с помощью ремня, что позволяет им не отставать от более быстрых аэромобильных пехотных подразделений."
 drone_tactical_company: "Компанию по производству беспилотников FPV"
 drone_tactical_company_desc: "Используя дроны с неподвижным крылом и квадрокоптеры, эти подразделения проводили разведку и наносили точечные удары в поддержку своих линейных подразделений."
 group_headquarters_title: "Штаб"
 arm_inf_hq: "Штаб бронетанковой пехоты"
 arm_inf_hq_desc: "Штабной элемент механизированной и бронетанковой пехоты."
 arm_hq: "Бронетанковый штаб"
 arm_hq_desc: "Штабное подразделение для лёгких и основных боевых танков"
 L_Ranger_Bat: "Rangers"
 L_Ranger_Recce_Comp: "Ranger Recce Company"
 group_headquarters_title_desc: "Штабные подразделения, оснащенные для ведения подразделений в бой"
 light_inf_hq: "Штаб легкой пехоты"
 light_inf_hq_desc: "Штабное подразделение легкой и моторизованной пехоты"
 helo_hq: "Штаб - квартира вертолета"
 helo_hq_desc: "Элемент штаб-квартиры для вертолетных подразделений"
 group_light_bat_title: "Единицы измерения недостаточной прочности"
 group_light_bat_title_desc: "Недостаточно мощные боевые элементы, предназначенные для умножения силы, с уменьшенными возможностями, но сокращенными временем и затратами на обучение."
 Light_Mech_Inf_Bat: "Недоукомплектованный мехбатальон"
 Light_Mech_Inf_Bat_desc: "Механизированная пехота использует бронетранспортеры в качестве транспорта. Они хорошо подходят для танкового боя на равнинной местности."
 Light_Arm_Inf_Bat: "Недостаточно укомплектованный бронетанковый пехотный батальон"
 Light_Arm_Inf_Bat_desc: "Бронированная пехота использует боевые машины пехоты в качестве транспорта. Они хорошо подходят для бронированного боя на равнинной местности, но бесполезны на сложной местности, где им приходится действовать пешком вдали от своих БМП."
 Light_L_Air_assault_Bat: "Недоукомплектованный воздушно-десантный пехотный батальон"
 Light_L_Air_assault_Bat_desc: "Воздушно-десантные войска — это элитная пехота. Благодаря специальной подготовке по спуску на верёвках и воздушной транспортировке их снаряжение иногда специально разрабатывается или дорабатывается для удобства перевозки в самолётах. Их часто используют для захвата и удержания ключевых районов, ещё не полностью контролируемых, а также для прямого взаимодействия с противником в тылу врага."
 Light_attack_helo_bat: "Недоукомплектованный ударный полк"
 Light_attack_helo_bat_desc: "Я идентифицирую себя как ударный вертолет AH-6 Littlebird."
 Light_armor_Bat: "Недоукомплектованный танковый батальон"
 Light_armor_Bat_desc: "Танковый батальон состоит только из самых тяжелобронированных машин, которые существуют, основных боевых танков. Обладая превосходной мобильностью на равнинной местности и яростным прямым огнем, они предназначены для проделывания дыр в передовых линиях противника, которые могут быть быстро использованы последующими механизированными пехотными подразделениями."
 Light_L_arm_Bat: "Недоукомплектованный легкотанковый батальон"
 Light_L_arm_Bat_desc: "Батальоны легких танков работают со специальными, часто колесными, легкими танками, которые сочетают в себе невероятную мобильность с внушающей благоговение убойной силой. Они могут противостоять всем типам пехоты в прямом бою. Однако прямой бой не является их предполагаемой ролью — они проникают близко к врагу, чтобы наблюдать и сообщать о его действиях, и используют как разведку с помощью дронов, так и электронное наблюдение для сбора информации. Они также могут совершать рейды и устраивать засады на важные активы противника и механизированные формирования."
 Light_SP_Arty_Bat: "Недоукомплектованный самоходно-артиллерийский дивизион"
 Light_SP_Arty_Bat_desc: "Благодаря своим мощным возможностям непрямого огня самоходная артиллерия обеспечивает устойчивые точные удары там, где это необходимо на поле боя, и далеко за пределами видимости. Она может перезаряжаться непосредственно своим экипажем, а ее самоходность делает ее мобильной, так что она может двигаться, избегая ответных ударов вражеской артиллерии."
 Light_SP_R_Arty_Bat: "Недоукомплектованный самоходно-реактивный артиллерийский дивизион"
 Light_SP_R_Arty_Bat_desc: "Используя пусковые установки MLRS, батальон реактивной артиллерии может уничтожить целую область с большого расстояния. Используется против тыловых районов противника, так как неизбирательный огонь делает его непригодным для точных ударов на поле боя. Для него требуются специальные транспортные средства для перезарядки, а время перезарядки медленное."
 Light_SP_AA_Bat: "Недоукомплектованный самоходный батальон ПВО"
 Light_SP_AA_Bat_desc: "Используя самоходные зенитно-ракетные комплексы малой и средней дальности, батальон ПВО будет защищать свое подразделение от ударов непосредственной авиационной поддержки противника."
 Drone_Recce_Comp: "Компания по беспилотной разведке"
 Drone_Recce_Comp_desc: "Используя небольшие беспилотные летательные системы для расширения наблюдения за пределами прямой видимости, Беспилотная разведывательная компания повышает осведомленность о поле боя, не подвергая разведчиков прямой наводке. Эти беспилотные летательные аппараты могут быстро отслеживать маршруты, определять позиции противника и подтверждать цели на сложной местности, что позволяет быстрее принимать решения и вести более точный огонь."
 medium_walker_battalion: "Батальон средних шагающих машин"
 medium_walker_battalion_desc: "Разработанный как универсальная основа строевых подразделений шагающих машин, батальон средних шагающих машин сочетает сбалансированную защиту, подвижность и грузоподъёмность, обеспечивая эффективную работу на большинстве типов местности. Его платформы могут нести гибкий набор вооружения и систем для выполнения миссий, что позволяет адаптироваться к поддержке прямого огня, помощи в прорыве и ведению боевых действий в городских условиях, где обычная бронетехника может испытывать трудности с углами и препятствиями."
 light_walker_tank_battalion: "Батальон лёгких шагающих машин"
 light_walker_tank_battalion_desc: "Созданный для скорости и быстрой смены позиций на поле боя, батальон лёгких шагающих машин превосходно справляется с разведкой, обходными манёврами и использованием слабых мест противника, а не с прямым столкновением. Его более лёгкое шасси и упрощённая нагрузка обеспечивают высокую маневренность и быструю реакцию, делая его эффективным на пересечённой местности, в лесах и городских районах, где важны быстрые изменения направления."
 heavy_walker_tank_battalion: "Батальон тяжёлых шагающих машин"
 heavy_walker_tank_battalion_desc: "Батальон тяжёлых шагающих машин предназначен для доминирования в решающих сражениях, сочетая максимальную грузоподъёмность с колоссальной огневой мощью и значительным присутствием на поле боя. Его более тяжёлые шасси могут нести несколько систем вооружения и дополнительную защиту, позволяя разрушать укреплённые позиции и вести огонь по самым бронированным целям с продолжительной поддержкой."
 space_artillery_support_company: "Рота космической артиллерийской поддержки"
 space_artillery_support_company_desc: "Используя артиллерийские снаряды, запускаемые с орбитальных платформ, рота космической артиллерийской поддержки наносит точные удары по целям на поле боя, находящимся далеко за пределами досягаемости обычных систем. Эти удары могут быстро подавлять укреплённые позиции, уничтожать ценные объекты и рассредотачивать скопления противника с минимальным предупреждением, позволяя сухопутным силам осуществлять прорывы и задавать темп боевых действий."
 space_artillery_equipment_type: "Орбитальный ретранслятор управления огнём"
 space_artillery_equipment_type_desc: "Упрочнённый ретранслятор связи и целеуказания, предназначенный для запроса, координации и подтверждения орбитальных артиллерийских ударов в реальном времени. Он связывает наблюдателей на передовой с орбитальными батареями, обеспечивая быстрые огневые миссии, точное время срабатывания и надёжное предотвращение конфликтов с дружественными силами. Система дорогостоящая и ресурсоёмкая, но без неё орбитальная артиллерия остаётся слепой, медленной и опасно неэффективной."
 space_artillery_equipment_1: "$space_artillery_equipment_type$ I"
 space_artillery_equipment_1_desc: "$space_artillery_equipment_type_desc$"
 HACS_Mech: "Система высокоманёвренного боя 1-го поколения"
 HACS_Mech_desc: "Система высокоманёвренного боя 1-го поколения — самая передовая боевая система из когда-либо созданных. Она предназначена для быстрого развертывания и высокой мобильности на поле боя, способна с лёгкостью преодолевать сложную местность. Оснащённая сочетанием оружия ближнего и дальнего боя, HACS полностью готова к борьбе с подразделениями «Химеры»."
 HACS_Mech_2: "Система высокоманёвренного боя 2-го поколения"
 HACS_Mech_2_desc: "Система высокоманёвренного боя 2-го поколения объединяет идеи гражданских и военных инженеров. Она улучшает оригинальную конструкцию за счёт усиленного бронирования и модернизированных систем вооружения. Эта версия более устойчива в бою и способна наносить разрушительную огневую мощь по силам «Химеры»."
 HACS_Mech_3: "Система высокоманёвренного боя 3-го поколения"
 HACS_Mech_3_desc: "Последние исследования Рандаллитов привели к созданию системы высокоманёвренного боя 3-го поколения. Эта версия включает передовые технологии, в том числе продвинутые энергетические щиты и модульные крепления вооружения, что делает её вершиной меха-военных технологий в борьбе с угрозой «Химеры»."
 ALN_bellatoris: "Беллаторис"
 ALN_bellatoris_desc: "The Bellatoris is the frontline warrior of the Chimera swarm, bred for relentless close assault. Fast and aggressive, it overwhelms defensive lines through sheer numbers and ferocity, forcing even hardened formations to give ground. Individually fragile, it becomes lethal en masse."
 ALN_brachionis: "Бракионис"
 ALN_brachionis_desc: "The Brachionis is a multi-limbed Chimera built to grapple and tear apart armored targets at close range. Its reach and grip let it pin vehicles and combat systems in place while the swarm closes in. It is most dangerous in confined terrain, where its prey cannot maneuver away from its grasp."
 ALN_gravis: "Gravis"
 ALN_gravis_desc: "The Gravis is the heaviest of the Chimera strains, a slow-moving mass of armored carapace that anchors the swarm's advance. It soaks up tremendous punishment as it grinds forward, shielding lighter Chimera behind it and breaking through fortified positions by force. Its bulk makes it ponderous, but stopping it before it reaches the line is a desperate task."
 Hvy_Mot_Inf_Bat: "Heavy Motorized Infantry"
 Hvy_Mot_Inf_Bat_desc: "Heavy Motorized Infantry uses Mine-Resistant Ambush Protected (MRAP) vehicles as transport. Their armored vehicles provide superior crew protection against mines, IEDs, and small arms fire, making them ideal for operations in hostile environments where ambush threats are high."
 L_Ranger_Bat_desc: "Rangers are elite light infantry, specialized in raids, direct action, and rapid deployment ahead of the main force. They travel light to maximize mobility and surprise, seizing key objectives and holding them until conventional units arrive. The trade-off is sparse heavy equipment, leaving them exposed against armor in open terrain."
 L_Ranger_Recce_Comp_desc: "A reconnaissance element drawn from the Rangers, trained to infiltrate deep behind enemy lines on foot and report on enemy movements. Combining stealth with Drone Reconnaissance and Electronic Surveillance, they gather intel and mark targets for friendly fires, and can conduct limited raids and ambushes when the opportunity arises."
 A_L_arm_Bat: "Airborne Light Tank Company"
 A_L_arm_Bat_desc: "Light Tank Company operates with special, often wheeled, Light Tanks that combine incredible mobility with awe-inspiring stopping power. They can hold their own against all types of Infantry in direct combat. Direct combat isn't their intended role, though - they infiltrate close to the enemy to observe and report on their activity, and use both Drone Reconnaissance and Electronic Surveillance to gather intel. They can also perform raids and ambushes on important enemy assets and mechanized formations. These units are also capable of conducting airborne operations with paratrooper elements, providing immediate close armored support."
 air_assault_Arty_Bat: "Airmobile Artillery"
 air_assault_Arty_Bat_desc: "A full battalion of towed artillery pieces transported by helicopter sling loading. Provides sustained indirect fire support for airmobile operations, keeping pace with air assault infantry through rapid aerial repositioning."
 Weapons_company: "Weapons Company"
 Weapons_company_desc: "A weapons company, consisting of direct fire infantry support weapons, such as GPMG and HMG teams, Grenade Machine Gun teams, and other heavy infantry direct fire support weapons. This company is designed to provide supporting fires to any infantry element it is assigned to support, across a wide range of forces."
 Heavy_mortar_company: "Mortar Company"
 Heavy_mortar_company_desc: "Mortars are designed to provide fast, integrated fire support to line units, without needing attachment from higher elements. These mortars provide indirect fire support to line elements, at a much cheaper cost than a full scale artillery unit would need."
 Sniper_company: "Sniper Company"
 Sniper_company_desc: "Equipped with precision marksmen working in spotter pairs, the Sniper Company provides long-range, selective fire against high-value targets such as officers, crews, and communications teams. They excel at harassing and disrupting enemy formations from concealment, degrading enemy effectiveness while remaining difficult to locate and engage."
 AT_company: "Infantry Anti-Tank Company"
 AT_company_desc: "Equipped with infantry anti-tank weapons, this anti-tank company is designed to work specifically with light infantry elements. Able to easily operate in urban areas, forests, and other entrenched or close in locations, this team not only is able to easily attack enemy armored elements and then disappear back into their entrenched locations."
 Mot_AT_company: "Vehicle Anti-Tank Company"
 Mot_AT_company_desc: "A company dedicated to anti-tank operations, working from mounted firing positions on vehicles. This company is designed more for speed, allowing them to keep up with quickly moving mobile and armored elements, while still providing increased Anti-Tank capabilities."
 AA_company: "Anti-Aircraft Company"
 AA_company_desc: "An element equipped specifically to engage enemy aircraft elements, and to provide defense against enemy helicopters and other aircraft."
 Combat_engineer_company: "Combat Engineer Company"
 Combat_engineer_company_desc: "Combat Engineers perform offensive engineering actions in direct support of line units. They are trained and equipped to cross difficult terrain, such as rivers or anti-tank ditches. They are also equipped to breach minefields or other defensive obstacles, and to clear areas to allow other combat forces to proceed through them unhindered."
 pathfinder_company: "Pathfinder Company"
 pathfinder_company_desc: "Elite groups of paratroopers, trained to jump in prior to conducting airborne operations, to find the safest LZs and assembly areas. These elite troopers provide critical command and control during key elements of any airborne or airmobile operation."
 amphibious_landing_detachment: "Naval Landing Attachment"
 amphibious_landing_detachment_desc: "Attached elements from the navy that allow for rapid and effective amphibious landing operations. Equipped with dedicated landing ships and equipment, these units facility rapid ship-to-shore or Over the Horizon landing operations. The price of attaching one of these units however, is the decrease in capabilities to conduct non-amphibious operations."
 combat_maintenance_company: "Maintenance Company"
 combat_maintenance_company_desc: "The Maintenance Company keeps a formation's vehicles and heavy equipment in the fight, performing field repairs and recovering damaged platforms before they are lost for good. By restoring combat-disabled vehicles close to the front, it sustains armored strength through prolonged operations and reduces the drain of attrition."
 airmobile_maintenance_company: "Airmobile Maintenance Company"
 airmobile_maintenance_company_desc: "A maintenance element configured to support airmobile and helicopter forces, with the lighter, more transportable tooling needed to keep rotary-wing and rapidly deployed units operational. It restores damaged equipment in forward areas, sustaining the tempo of air assault operations far from established depots."
 communications_company: "Communications Company"
 communications_company_desc: "The Communications Company maintains the radio, data, and command networks that tie a formation together, ensuring orders and reports flow reliably across the battlefield. Robust communications improve coordination and reaction time, and harden the formation against jamming and electronic disruption."
 military_police_attachment: "Military Police"
 military_police_attachment_desc: "Military Police manage traffic control, rear-area security, and the handling of prisoners, freeing line units to focus on combat. By keeping supply routes orderly and securing the rear against infiltrators and stragglers, they preserve discipline and keep a formation moving smoothly."
 hq_support_company: "HQ Support Company"
 hq_engineer: "HQ Engineer Company"
 hq_recon: "HQ Reconnaissance Company"
 hq_maintenance: "HQ Maintenance Company"
 hq_logistics: "HQ Logistics Company"
 hq_naval_liaison: "HQ Naval Liason"
 hq_air_liaison: "HQ Air Liason"
