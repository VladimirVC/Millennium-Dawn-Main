 NKO_cease_propaganda_broadcasts_yo_jong_desc: ""
 NKO_conciliatory_rhetoric: "Примирение с миром"
 NKO_conciliatory_rhetoric_desc: "Иностранные государства слишком долго нас неправильно понимали, и наша политика открытых дверей может убедить их в нашей приверженности миру."
 NKO_offer_negotiations_yo_jong: "Переговоры по предложениям"
 NKO_offer_negotiations_yo_jong_desc: ""
 NKO_propose_north_led_unification_yo_jong: "Предложить правительство единства"
 NKO_propose_north_led_unification_yo_jong_desc: "Лидеры Юга вряд ли согласятся на сделку, которая будет выглядеть как отстранение их от власти и потенциальное наказание за их прошлые действия. Правительство единства между Севером и Югом — лучший способ добиться объединения Кореи."
 NKO_propose_unity_government_yo_jong: "Предложить объединение с Севером"
 NKO_propose_unity_government_yo_jong_desc: "От нашей справедливой системы социального обеспечения до нашего более сильного ядерного оружия, очевидно, что северокорейская модель — это путь вперед для Корейского полуострова. Мы должны настаивать на том, что мы должны быть теми, кто поведет Корею к мощному будущему после воссоединения."
 NKO_pave_the_way_for_reunification_yo_jong: "Проложить путь к воссоединению"
 NKO_pave_the_way_for_reunification_yo_jong_desc: "Теперь, когда сделаны большие шаги по нормализации межкорейских отношений, мы можем начать подготовку к воссоединению."
