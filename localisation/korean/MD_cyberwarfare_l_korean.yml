 CYBER_ATTRIB_BTN_TT: "§Y전제 조건:§!\n[!cyber_attribution_hunt_button_click_enabled]\n§Y효과:§!\n[!cyber_attribution_hunt_button_click]"
 CYBER_GPS_BTN_TT_DELAYED: "특수 멀웨어가 대상의 위성 수신 인프라에 침투하여 군사 내비게이션 시스템을 기만 신호로 마비시킵니다. 전장에서는 디지털 지도에서 익숙한 지형지물이 사라짐에 따라 지휘관들이 부대 조율에 어려움을 겪게 됩니다. 정밀 항법이 실패하면 일상적인 기동조차도 위험해집니다."
 CYBER_SIGINT_BTN_TT_DELAYED: "지속형 임플란트(스파이웨어)가 대상의 통신 백본에 은밀히 침투하여 정부, 군사, 외교 채널을 오가는 트래픽을 복제합니다. 시간이 지남에 따라 이렇게 가로챈 정보는 대상의 의도, 취약점, 내부 갈등에 대한 상세한 전모를 그려냅니다. 이는 기존의 첩보원이라면 결코 수집할 수 없는 수준의 정보입니다."
 CYBER_RADAR_BTN_TT_DELAYED: "대상의 방공 레이더 화면에 유령 같은 표적이 쏟아집니다. 관제사들은 존재하지도 않는 항공기를 추적하기 위해 허둥대고, 유령을 쫓느라 경계 자원을 낭비합니다. 그 사이 실제 비행기들은 빈틈을 뚫고 미탐지 상태로 침투합니다. 짧은 기간이지만 30일간의 방공망 마비는 활발한 군사 작전에서 결정적인 역할을 할 수 있습니다."
 CYBER_ECON_BTN_TT_DELAYED: "결제 관제사에서 오류가 발생하기 시작합니다. 거래 알고리즘이 손상된 데이터 피드에 막혀 오작동합니다. 공장 현장의 컨트롤러는 잘못된 업데이트 패키지를 수신합니다. 이 공격은 우연을 가장할 수 있도록 설계되었습니다. 겉보기에는 무관해 보이는 일련의 기술적 결함들이 몇 달 동안 대상의 경제 생산량을 조용히 고갈시킵니다."
 CYBER_PROP_BTN_TT_DELAYED: "수천 개의 조직된 계정이 모순되는 내러티브로 대상의 미디어 환경을 덮습니다. 조작된 정부 문서가 소셜 네트워크에 유포됩니다. 목표는 속이는 것이 아니라 지치게 만드는 것입니다. 사실과 허구를 더 이상 구별할 수 없게 된 대중은 자국 정부를 포함한 모든 기관에 대한 신뢰를 잃게 됩니다."
 CYBER_ELECT_BTN_TT_DELAYED: "유권자 등록 시스템이 교묘하게 손상됩니다. 투표 직전 며칠 동안 야당 지도자의 딥페이크 영상이 유포됩니다. 소셜 미디어 알고리즘은 기존의 갈등을 증폭시키도록 조작됩니다. 대상의 민주적 제도가 파괴되는 것은 아니지만, 조용히 불신을 조장하여 단 한 장의 투표지가 개표되기도 전에 결과에 대한 이의가 제기되도록 만듭니다."
 CYBER_ESPION_BTN_TT_DELAYED: "스피어 피싱 작전은 대상의 가장 민감한 연구 네트워크 깊숙한 곳에 맞춤형 임플란트(스파이웨어)를 심습니다. 이 멀웨어는 몇 달 동안 내부망을 이동하며 설계도, 테스트 데이터 및 독점 공식을 수집합니다. 침해 사실이 발견될 즈음이면, 우리의 연구원들은 이미 훔쳐낸 데이터를 바탕으로 연구를 진행하고 있을 것입니다."
 CYBER_COMMS_BTN_TT_DELAYED: "조용한 중간자가 대상의 가장 민감한 통신 노드 전체에 자리잡습니다. 장군들의 명령, 대사들의 전문, 내각의 심의가 동일한 손상된 중계기를 거치게 되며, 실시간으로 복제되고 분류되어 우리 분석가들에게 전달됩니다. 대상은 우리가 모든 결정을 읽고 있다는 사실을 모른 채 계속해서 정책을 집행합니다."
 CYBER_INFRA_BTN_TT_DELAYED: "배전, 수처리, 물류 노드를 관리하는 산업 제어 시스템이 은밀한 악성 펌웨어 업데이트를 수신합니다. 페이로드가 작동하면 여러 부문에 걸쳐 복구팀이 감당할 수 없는 동시다발적인 고장이 일어납니다. 그 피해는 실질적이고 물리적이며, 복구하기에는 많은 시간이 걸립니다."
 CYBER_FIN_BTN_TT_DELAYED: "중앙은행의 결제 시스템이 다운됩니다. 전국적으로 현금 자동 입출금기(ATM) 네트워크가 마비됩니다. 통화 거래 알고리즘은 플래시 크래시(순간 폭락)를 유발하는 오염된 입력을 수신합니다. 이 교란은 재래식 제재로 달성할 수 있는 것 이상으로 경제에 타격을 주며, 제재와 달리 추적될 위험도 없습니다."
 CYBER_LOG_BTN_TT_DELAYED: "모든 전방 작전 기지에서 공급망 관리 소프트웨어가 동시에 마비됩니다. 탄약 보급 요청은 손상된 대기열 속으로 사라지고, 연료 할당 알고리즘은 호송대를 존재하지 않는 보급창으로 안내합니다. 적의 군사 체계는 전투 중에 파괴되는 것이 아닙니다. 그저 제자리에서 자원이 고갈되어 굶어 죽을 뿐입니다."
 CYBER_SLEEP_BTN_TT_DELAYED: "인내심 있고, 체계적이며, 은밀합니다. 우리 요원들은 당장의 공격이 아니라, 장기적인 잠복을 위해 투입되었습니다. 휴면 상태의 접속 지점들이 대상의 핵심 네트워크 기반 전반에 심어져 있으며, 명령이 내려지면 즉시 활성화될 수 있도록 배치되어 있습니다. 앞으로 1년 동안, 적의 가장 민감한 시스템은 우리에게 어떠한 비밀도 감추지 못할 것입니다."
 CYBER_CRIT_BTN_TT_DELAYED: "우리의 모든 사이버 전력이 일제히 쏟아집니다. 전력망이 끊어지고, 군사 통신망이 붕괴하며, 산업 생산이 중단되고, 금융 시스템이 마비됩니다. 이 작전은 전략 폭격에 버금가는 디지털 공격으로, 대상국의 모든 국력 기반을 동시에 기능적으로 무력화시킵니다."
 CYBER_DECEPT_BTN_TT_DELAYED: "우리는 대상의 시스템을 공격하지 않습니다. 우리는 그들의 정신을 교란합니다. 조작된 정보 평가, 고위 지휘관의 인증 서명이 포함된 위조 명령, 최고위 의사결정권자에게 제시되는 조작된 이미지 등, 대상이 내리는 모든 결정은 우리가 조작한 현실에 기반하게 될 것입니다."
 CYBER_ZERO_BTN_TT_DELAYED: "수년 동안 축적해두고 이 순간을 위해 비축해둔 이전에 알려지지 않은 익스플로잇이라는 기밀 무기가 대상의 가장 중요한 시스템을 향해 일제히 전파됩니다. 전문가들이 무슨 일이 일어났는지 파악할 즈음이면 취약점은 이미 없어지고 피해는 되돌릴 수 없게 됩니다."
 CYBER_HARDEN_BTN_TT_DELAYED: "우리의 보안팀은 노출된 모든 인터페이스를 감사하고 알려진 모든 취약점을 패치하며 외국 정보기관이 가장 자주 탐지하는 프로토콜을 강화합니다. 이 작업은 매력적이지 않지만, 우리가 닫는 모든 문은 적이 악용할 수 있는 수단을 하나씩 없애는 것입니다. 최고의 사이버 작전은 절대 당하지 않는 작전입니다."
 CYBER_CNTRINT_BTN_TT_DELAYED: "분석가들은 네트워크 로그와 시스템 원격 분석을 샅샅이 뒤지며 비정상적인 액세스 패턴, 예기치 않은 아웃바운드 연결, 합법적인 목적이 없는 휴면 프로세스 등 외국의 침투를 나타내는 미묘한 징후를 찾습니다. 감염된 네트워크를 정리하는 것은 느리고 신중한 작업입니다. 감지되지 않은 백도어는 알려진 백도어보다 훨씬 더 위험합니다."
 CYBER_ATTRIB_BTN_TT_DELAYED: "우리의 디지털 포렌식 팀은 멀웨어 서명을 추적하고, 명령 및 제어 인프라를 매핑하고, 책임 있는 공격자를 식별하는 작전 보안 패턴을 분류하여 공격 경로를 재구성합니다. 침입의 배후에 있는 국가의 이름을 밝히는 것은 비례적인 대응을 향한 첫걸음입니다."
