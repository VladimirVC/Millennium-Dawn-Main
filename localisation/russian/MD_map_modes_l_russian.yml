l_russian:
 MAPMODE_EU_MAP_MODE_NAME: "ЕС"
 MAPMODE_EU_MAP_MODE: "ЕС"
 MAPMODE_EU_MAP_MODE_DESCRIPTION: "Отображает список государств-членов ЕС, потенциальных членов и действующих должностных лиц Европейского союза."
 EU_map_mode_tooltip: "Европейский союз"
 EU_map_mode_tooltip_delayed: "Показывает текущее членство и руководство Европейского союза.\n\n§HЛегенда цветов:§!\n§nСиний§! = государство - член ЕС\n§YЗолотой§! = потенциальный кандидат в члены ЕС\n\n§HДолжностные лица:§!\n§RКрасный§! = председатель Европейской комиссии, Европейского совета или Европейского парламента\n§9Коричневый§! = генеральный секретарь Еврофлота\n§GЗелёный§! = генеральный секретарь Евроармии\n§CГолубой§! = высокий представитель по иностранным делам и политике безопасности\n§0Фиолетовый§! = европейский министр экономики и финансов\n§YЖёлтый§! = президент Европейского центрального банка\n§PТёмно-розовый§! = директор Frontex\n§OОранжевый§! = посол ЕС в ООН\n§pРозовый§! = президент Европейской федерации\n\nОбновляется еженедельно."
 MAPMODE_GDP_C_MAP_MODE_NAME: "ВВП на душу населения"
 MAPMODE_GDP_C_MAP_MODE: "ВВП на душу населения"
 MAPMODE_GDP_C_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается ВВП на душу населения страны, представляющий собой средний объем экономического производства на душу населения."
 gdp_c_map_mode_tooltip: "ВВП на душу населения в [FROM.CONTROLLER.GetNameWithFlag]"
 gdp_c_map_mode_tooltip_delayed: "ВВП на душу населения §Y[FROM.CONTROLLER.GetNameWithFlag]§!: §Y$[?FROM.CONTROLLER:gdp_per_capita|Y]K§!.\n\nВВП на душу населения отражает экономический объём производства на одного человека. Более высокие значения указывают на более богатую и продуктивную экономику.\n\n§HЛегенда цветов:§!\n§nТёмно-синий§! = ниже 8K (низкий доход)\n§lЯрко-синий§! = 8K - 18K (нижний средний доход)\n§CГолубой§! = 18K - 32K (средний доход)\n§GЗелёный§! = 32K - 60K (выше среднего дохода)\n§YЖёлтый§! = 60K - 110K (высокий доход)\n§9Ярко-золотой§! = выше 110K (крайне высокий доход)\n\nОбновляется при еженедельном экономическом тике."
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_NAME: "Неудовлетворенность энергией"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE: "Неудовлетворенность энергией"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается текущий процент неудовлетворённого спроса на энергию в странах."
 energy_consumption_map_mode_tooltip: "Дефицит энергопотребления в [FROM.CONTROLLER.GetNameWithFlag]"
 energy_consumption_map_mode_tooltip_delayed: "Дефицит энергопотребления в §Y[FROM.CONTROLLER.GetNameWithFlag]§!: §Y[?FROM.CONTROLLER:unfulfilled_energy_demand_var|%+]§!\n\nЭто показывает процент спроса на энергию, который не удовлетворяется. Отрицательное значение означает, что спрос превышает предложение (энергетический дефицит).\n\n§HЛегенда цветов:§!\n§nТёмно-синий§! = ниже -30% (тяжёлый дефицит)\n§lЯрко-синий§! = -30% до -18% (умеренный дефицит)\n§CГолубой§! = -18% до -12% (лёгкий дефицит)\n§GЗелёный§! = -12% до -4% (почти обеспечено)\n§YЖёлтый§! = -4% до -1% (почти полностью обеспечено)\n§9Ярко-золотой§! = выше -1% (полностью обеспечено)\n\n§nЧем темнее цвет, тем хуже ситуация.§! Инвестируйте в энергетическое производство для улучшения.\nОбновляется при еженедельном экономическом тике."
 MAPMODE_PRODUCTIVITY_MAP_MODE_NAME: "Производительность"
 MAPMODE_PRODUCTIVITY_MAP_MODE: "Производительность"
 MAPMODE_PRODUCTIVITY_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается текущая производительность отдельных штатов, представляющая собой эффективность экономического производства в расчете на одного работника."
 productivity_map_mode_tooltip: "Продуктивность в [FROM.GetName]"
 productivity_map_mode_tooltip_delayed: "Продуктивность в §Y[FROM.GetName]§!: §Y[?FROM.productivity_state_var|Y]§!\n\nПродуктивность показывает эффективность экономического производства региона. Более высокие значения означают больший объём экономического выпуска на одного работника.\n\n§HЛегенда цветов:§!\n§nТёмно-фиолетовый§! = ниже 200 (очень низкая)\n§nТёмно-синий§! = 200 - 500 (низкая)\n§lЯрко-синий§! = 500 - 800 (ниже среднего)\n§CГолубой§! = 800 - 1200 (средняя)\n§GЗелёный§! = 1200 - 1900 (выше среднего)\n§YЖёлтый§! = 1900 - 3800 (высокая)\n§9Ярко-золотой§! = 3800 - 5000 (очень высокая)\n§9Тёмно-оранжевый§! = выше 5000 (выдающаяся)\n\nОбновляется при еженедельном экономическом тике."
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_NAME: "Возобновляемые точки"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE: "Возобновляемые точки"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается природный потенциал возобновляемой энергии каждого штата, основанный на ветровой, солнечной и других географических факторах."
 renewable_energy_hotspot_map_mode_tooltip: "Бонус мощности возобновляемых источников энергии в [FROM.GetName]"
 renewable_energy_hotspot_map_mode_tooltip_delayed: "Renewable Energy Capacity Bonus in §Y[FROM.GetName]§! is: §Y[?FROM.state_renewable_capacity_factor_modifier_var|Y]§!\n\nThis is a multiplier on the state's renewable output: §Y1.0§! is the world average, so a state at 1.5 produces 1.5x the average and one at 0.5 half of it.\n\n§HColor Legend (1.0 = world average):§!\n§RRed§! = Above 1.6 (exceptional)\n§9Gold§! = 1.45 - 1.6 (outstanding)\n§YYellow§! = 1.2 - 1.45 (well above average)\n§GGreen§! = 1.0 - 1.2 (above average)\n§CTeal§! = 0.8 - 1.0 (slightly below average)\n§nBlue§! = 0.6 - 0.8 (poor)\n§HDark Blue§! = Below 0.6 (very poor)\n\nThis value is fixed and does not change over time."
 MAPMODE_INFLUENCE_MAP_MODE_NAME: "Влияние"
 MAPMODE_INFLUENCE_MAP_MODE: "Влияние"
 MAPMODE_INFLUENCE_MAP_MODE_DESCRIPTION: "Показывает ваш рейтинг влияния в других странах. Влияние определяет дипломатические возможности и с течением времени сказывается на политической позиции."
 influence_map_mode_tooltip: "Влияние"
 influence_map_mode_tooltip_delayed: "Показывает страны, в которых вы имеете влияние, ваш рейтинг среди влиятельных стран и государства с автоматическим влиянием.\n\nВлияние определяет ваше дипломатическое воздействие на страну. Более высокий ранг означает больший контроль над её политической ориентацией и внешней политикой.\n\n§HЛегенда цветов:§!\n§GЗелёный§! = ваша страна\n§CГолубой§! = 1-й влиятель (доминирующий)\n§lСветло-синий§! = 2-й или 3-й влиятель\n§nТёмно-синий§! = 4-й - 7-й влиятель\n§9Оранжевый§! = страна с авто-влиянием (ежемесячно)\n§RКрасный§! = перезарядка распространения влияния (недавно была цель)\n§HТёмно-серый§! = отсутствует влияние\n\nОбновляется еженедельно."
 MAPMODE_GCC_MAP_MODE_NAME: "ССАГПЗ"
 MAPMODE_GCC_MAP_MODE: "ССАГПЗ"
 MAPMODE_GCC_MAP_MODE_DESCRIPTION: "Отображает государства-члены и потенциальных членов Совета сотрудничества стран Персидского залива."
 GCC_map_mode_tooltip: "Совет сотрудничества стран Персидского залива"
 GCC_map_mode_tooltip_delayed: "Показывает текущее членство Совета сотрудничества стран Персидского залива (ССАГПЗ).\n\n§HЛегенда цветов:§!\n§CБирюзовый§! = государство - член ССАГПЗ\n§GЖёлто-зелёный§! = потенциальное государство - кандидат\n\nОбновляется еженедельно."
 MAPMODE_SCO_MAP_MODE_NAME: "ШОС"
 MAPMODE_SCO_MAP_MODE: "ШОС"
 MAPMODE_SCO_MAP_MODE_DESCRIPTION: "Представляет государства-члены, наблюдателей и потенциальных членов Шанхайской организации сотрудничества."
 SCO_map_mode_tooltip: "Шанхайская организация сотрудничества"
 SCO_map_mode_tooltip_delayed: "Показывает текущее членство Шанхайской организации сотрудничества (ШОС).\n\n§HЛегенда цветов:§!\n§9Оранжевый§! = государство - член ШОС\n§0Фиолетовый§! = государство-наблюдатель\n§YЖёлтый§! = потенциальный участник\n\nОбновляется еженедельно."
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_NAME: "Уровень безработицы"
 unemployment_rate_map_mode_tooltip: "Уровень безработицы в [FROM.CONTROLLER.GetNameWithFlag]"
 unemployment_rate_map_mode_tooltip_delayed: "Уровень безработицы в §Y[FROM.CONTROLLER.GetNameWithFlag]§! составляет: §Y[?FROM.CONTROLLER:total_unemployed_percentage_display|%Y]§!\n\nЭто показывает процент трудоспособного населения, которое является безработным.\n\n§HЛегенда цветов:§!\n§nТёмно-синий§! = выше 35% (кризис)\n§lЯрко-синий§! = 22% - 35% (очень высокий)\n§CЦиан§! = 10% - 22% (высокий)\n§GЗелёный§! = 5% - 10% (умеренный)\n§YЖёлтый§! = 2% - 5% (низкий)\n§9Ярко-золотой§! = ниже 2% (полная занятость)\n\n§nЧем темнее цвет, тем хуже ситуация.§! Снижайте безработицу через экономический рост и политику.\nОбновляется при еженедельном экономическом тике."
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE: "Уровень безработицы"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается текущий уровень безработицы в странах в процентах от трудоспособного населения."