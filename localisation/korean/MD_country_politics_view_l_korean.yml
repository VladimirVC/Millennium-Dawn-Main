 HOLD_REELECTIONS_TT: "14일 이내에 새로운 선거를 개최합니다. 이 선거는 비상 선거의 성격을 띠기 때문에, 이 다음 선거는 예정된 원래 날짜에 그대로 열립니다. \n\n§Y전제 조건:§! \n[!hold_reelections_button_click_enabled] \n§Y효과:§! \n[!hold_reelections_button_click]"
