 indonesia.61.t: "¡Desastre en Java Oriental!"
 indonesia.61.d: "Nuestros fracasos para proporcionar a la gente de Java Oriental han resultado en un incidente corporativo que ha llevado al cierre de un edificio de oficinas."
 indonesia.61.a: "¡Era evitable!"
 indonesia.62.t: "¡Desastre en nuestra capital!"
 indonesia.62.d: "Nuestros fracasos para proporcionar a la gente de Java Occidental, también sede de nuestra capital, han llevado a un incidente en el que una fábrica industrial se derrumbó."
 indonesia.62.a: "¡Era evitable!"
 indonesia.63.t: "¡Desastre en los cielos!"
 indonesia.63.d: "Nuestras fallas a la hora de proporcionar el equipo de aviación adecuado han provocado fallas técnicas en uno de nuestros vuelos, ¡causando la muerte de muchas personas!"
 indonesia.63.a: "¡Era evitable!"
 indonesia.64.t: "¡Desastre en nuestra capital!"
 indonesia.64.d: "Nuestros fracasos para proporcionar a la gente de Java Occidental, también sede de nuestra capital, han llevado a un incidente en el que varias fábricas industriales se derrumbaron."
 indonesia.64.a: "¡Era evitable!"
 indonesia.988.t: "Preparativos para una nueva capital"
 indonesia.988.d: "Con todos los consejos y la asistencia que hemos recibido de Japón, hemos llegado a la conclusión de comenzar los preparativos para trasladar nuestra capital de Jakarta. La nueva capital estará ubicada en Borneo Oriental, ¡y los planes de construcción comenzarán de inmediato!"
 indonesia.988.a: "¡Adelante vamos!"
 indonesia.888.t: "El Nuevo Camino de la Seda"
 indonesia.888.d: "Una reunión reciente con los chinos acaba de concluir. Ellos elogiaron nuestra asociación y nuestras habilidades para impulsar la industria de Indonesia de la nada a algo en tan poco tiempo. Aunque todavía tenemos mucho trabajo por hacer, los presidentes chinos elogiaron a nuestra nación y nos nombraron \"El Camino de la Seda del Siglo XXI\"."
 indonesia.888.a: "Muy halagador"
