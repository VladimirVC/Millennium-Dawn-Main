 UKR_our_agricultrure: "国内农业"
 UKR_our_agricultrure_desc: "乌克兰的农业是世界上最好的农业之一，我们将努力不失去这一称号。"
 UKR_azovsteel: "亚速钢铁公司"
 UKR_unstable_government_idea: "对独立广场的不满"
 UKR_land_reform_idea: "土地改革"
 UKR_land_reform_idea_desc: "上个世纪发起的土地改革应该导致全国土地所有权的彻底重新分配。到目前为止，这一进程仍在进行中。"
 UKR_zaims: "取消贷款的经济​​后果"
 UKR_banks_lobbyst_liquidate: "清算银行游说者"
 UKR_mining_company_help: "矿业公司的税收优惠"
 UKR_privatization_idea: "私有化"
 UKR_without_kuchma_idea: "没有库奇马的乌克兰"
 UKR_left_opposition_idea: "左翼反对派"
 UKR_luaz_idea: "卢茨克汽车制造厂"
 UKR_anti_socialist_media: "反社会主义媒体"
 UKR_crisis_political: "政治危机"
 UKR_crisis_political_desc: "我们国家陷入政治危机，当局陷入瘫痪，政治力量相互争夺权力。"
 ukraine_kuchma.2.t: "准备抗议"
 ukraine_kuchma.2.d: "我们的行动显然会引发抗议，我们需要做好准备。"
 ukraine_kuchma.2.a: "时刻准备着"
 ukraine_kuchma.2.b: "一切都会自行解决"
 ukraine_kuchma.11.t: "弹劾企图"
 ukraine_kuchma.11.d: "最高拉达多次试图弹劾我们，现在是时候解决这个问题了。"
 ukraine_kuchma.11.a: "反对弹劾"
 ukraine_kuchma.12.t: "与顿涅茨克氏族的友谊"
 ukraine_kuchma.12.d: "我们将努力把所谓的顿涅茨克寡头集团吸引到我们这边，他们将对我们未来与反对派的对抗有所帮助。"
 ukraine_kuchma.12.a: "顿巴斯与我们同在"
 ukraine_kuchma.12.b: "我们不会支持他们"
 ukraine_kuchma.13.t: "亚努科维奇将成为总统"
 ukraine_kuchma.13.d: "我们不会承认第二轮总统竞选的结果，并任命亚努科维奇为乌克兰总统。"
 ukraine_kuchma.13.a: "就这样吧"
 ukraine_kuchma.14.t: "东南部的抗议活动"
 ukraine_kuchma.14.d: "我们在选举中获胜后，以为一切都结束了，但现在我国东南部开始出现强烈的抗议活动。所谓的“蓝色独立广场”开始对我们的政府施加压力，并威胁要造成严重后果。"
 ukraine_kuchma.14.a: "我们需要更加小心"
 ukraine_kuchma.15.t: "乌克兰蓝色独立广场运动"
 ukraine_kuchma.15.d: "乌克兰东南部的活动人士继续发展他们的自治计划，而基辅当局正忙于更换议会办公室的椅子，一场大风暴即将来临。蓝色独立广场的支持者要求我们提供支持，我们会帮助他们吗？"
 ukraine_kuchma.15.a: "我们将支持他们"
 ukraine_kuchma.15.b: "我们不应该干涉"
 ukraine_kuchma.16.t: "东南部政府"
 ukraine_kuchma.16.d: "所谓的蓝色独立广场活动分子已正式宣布成立政府，并且不承认基辅政府。看来他们得到了外界的支持，否则他们不会做出这样的决定。"
 ukraine_kuchma.16.a: "紧急派遣警察"
 ukraine_kuchma.17.t: "蓝色革命"
 ukraine_kuchma.17.d: "今天，维克托·亚努科维奇领导的蓝色独立广场支持者正式宣布独立，成立乌克兰东南部共和国。一些军队以及将军和军官已经投奔了蓝色独立广场。"
 ukraine_kuchma.17.a: "风暴已经开始"
 ukraine_kuchma.18.t: "加利西亚的抗议活动"
 ukraine_kuchma.18.d: "我们决定忽略第二轮总统选举导致了国家不稳定，西部地区的许多居民进入了抗议的活跃阶段，并开始与警方发生冲突。"
 ukraine_kuchma.18.a: "我们需要更加小心"
 ukraine_kuchma.19.t: "乌克兰红色独立广场运动"
 ukraine_kuchma.19.d: "乌克兰加利西亚的活动人士已经开始抗议该国的非法选举，局势变得如此紧张，我们已经在谈论武装起义，因为有几位将军支持叛军，也许我们应该帮助他们？"
 ukraine_kuchma.19.a: "我们将支持他们"
 ukraine_kuchma.19.b: "我们不应该干涉"
 ukraine_kuchma.20.t: "西乌克兰政府"
 ukraine_kuchma.20.d: "抗议活动已经进入白热化阶段，显然得到了国外的帮助。现在他们宣布成立自己的政府，不隶属于基辅当局。"
 ukraine_kuchma.20.a: "紧急派遣警察"
 ukraine_kuchma.21.t: "红色革命"
 ukraine_kuchma.21.d: "今天，所谓的红色独立广场的支持者宣布撤出乌克兰，并开始与基辅亲俄政府进行武装抵抗。"
 ukraine_kuchma.21.a: "风暴已经开始"
 UKR_spu_start: "乌克兰社会党"
 UKR_spu_start_desc: "经过多年的奋斗，我们终于赢得了人民的信任。现在我们要开始伟大的改革。"
 UKR_spu_rada_position: "拉达职位"
 UKR_spu_rada_position_desc: "统治的关键在于控制立法机构。我们必须决定与谁合作，才能使我们的政策在最高拉达获得通过。"
 UKR_cpu_spu_coalition: "乌克兰共产党/乌克兰社会党联盟"
 UKR_cpu_spu_coalition_desc: "乌克兰共产党和乌克兰社会党可以说是兄弟。他们总是以统一战线的形式参加选举。很明显，如果其中一方获胜，他们就会组成联盟。"
 UKR_ditch_cpu: "疏远乌克兰共产党"
 UKR_ditch_cpu_desc: "乌克兰共产党和乌克兰社会党可以说是兄弟。他们总是以统一战线的形式参加选举，但很明显，如果乌克兰共产党掌权，他们会恢复共产主义政权。我们必须尽快与他们保持距离。"
 UKR_cpu_start: "乌克兰共产党"
 UKR_cpu_start_desc: "乌克兰共产党"
 UKR_cpu_rada_position: "拉达职位"
 UKR_cpu_rada_position_desc: "统治的关键在于控制立法机构。我们必须决定与谁合作，才能使我们的政策在最高拉达获得通过。"
 UKR_cpu_monocoalition: "单一联合"
 UKR_cpu_monocoalition_desc: "在乌克兰政治中，“单一联合”指的是由单一政党组成的政府。通过组建一个由乌克兰共产党领导的单一执政联盟，我们可以轻易地控制立法和行政部门，并开始恢复苏联统治。"
 UKR_back_to_soviet_tracks: "回到苏联时代"
 UKR_back_to_soviet_tracks_desc: "苏联解体后，我们国家只失去了、错过了和摧毁了这个伟大国家留下的一切遗产。我们将改变这一进程。"
 UKR_commie_russia_trade: "与俄罗斯的伙伴关系"
 UKR_commie_russia_trade_desc: "我们致力于加强两国间的友好关系。"
 UKR_commie_russia_rjd: "与俄罗斯铁路的伙伴关系"
 UKR_commie_russia_rjd_desc: "俄罗斯铁路将成为我们出色的合作伙伴，在他们的帮助下，我们将显著改善我们的基础设施。"
 UKR_commie_russia_banks: "俄罗斯银行"
 UKR_commie_russia_banks_desc: "我们愿意让俄罗斯银行进入我们的领土，他们的金融能力将有助于我们的发展。"
 UKR_commie_russia_gas: "新天然气合同"
 UKR_commie_russia_gas_desc: "我们准备与俄罗斯签订一份对我们有利的新天然气合同。"
 UKR_commie_china_trade: "与中国的伙伴关系"
 UKR_commie_china_trade_desc: "我们致力于加强两国间的友好关系。"
 UKR_commie_china_trains: "从中国购买火车"
 UKR_commie_china_trains_desc: "我们将在中国购买几列列车，这将有助于改善我们的供应情况。"
 UKR_comsomol: "复兴共青团"
 UKR_comsomol_desc: "共青团运动需要在新一代人的心中重新成为我们制度的意识形态支柱。"
 UKR_commie_china_infra: "铁路现代化"
 UKR_commie_china_infra_desc: "我们的中国同事已同意为我国铁路网络的现代化建设提供资金。"
 UKR_commie_china_huawei: "与华为合作"
 UKR_commie_china_huawei_desc: "我们将与这家中国公司建立强有力的合作。"
 UKR_commie_motor_sich: "扩大马达西奇公司"
 UKR_commie_motor_sich_desc: "我们将投入更多资金发展我们的重点企业 - 马达西奇公司。"
 UKR_ukr_pioners: "重振先锋"
 UKR_ukr_pioners_desc: "需要复兴先锋，年轻人已经失去了道德准则，必须重新引导他们走上社会主义道路。"
 UKR_one_union_for_all: "统一国家工会"
 UKR_one_union_for_all_desc: "我们将通过建立单一工会来保护全国工人的权利。"
 UKR_remilitarization: "重整军备"
 UKR_remilitarization_desc: "我们的国家必须拥有一支强大的军队，因此我们将立即开始重新军事化进程。"
 UKR_arms_zavods: "投资军工厂"
 UKR_arms_zavods_desc: "苏联解体后，我们的军事工业遭到破坏，现在是时候重振它了。"
 UKR_sbu_kgb: "克格勃的做法"
 UKR_sbu_kgb_desc: "我们必须重建老克格勃学校，这显然会提高我们工作人员的专业水平。"
 UKR_arms_tanks: "重视坦克"
 UKR_arms_tanks_desc: "我们的武装部队急需坦克，我们将满足他们的需要。"
 UKR_revolut_in_blr: "白俄罗斯社会主义革命"
 UKR_revolut_in_blr_desc: "我们兄弟般的白俄罗斯人民正遭受统治者和资本家的压迫！让我们解放他们吧！"
 UKR_revolution_in_russia: "俄罗斯社会主义革命"
 UKR_revolution_in_russia_desc: "我们兄弟般的俄罗斯人民正遭受统治者和资本家的压迫！让我们解放他们吧！"
 UKR_befriend_russia_com: "与俄罗斯的友谊"
 UKR_befriend_russia_com_desc: "我们打算与俄罗斯建立伙伴关系和友好关系。"
 UKR_befriend_belarus_com: "与白俄罗斯的友谊"
 UKR_befriend_belarus_com_desc: "我们打算与白俄罗斯建立伙伴关系和友好关系。"
 UKR_central_asia_revolt: "中亚革命"
 UKR_central_asia_revolt_desc: "我们也打算在这个地区举起革命的旗帜。"
 UKR_caucasus_revolut: "高加索革命"
 UKR_caucasus_revolut_desc: "我们也打算在这个地区举起革命的旗帜。"
 UKR_baltic_revolut: "波罗的海国家革命"
 UKR_baltic_revolut_desc: "我们也打算在这个地区举起革命的旗帜。"
 UKR_revolut_in_mol: "摩尔多瓦社会主义革命"
 UKR_revolut_in_mol_desc: "我们兄弟般的摩尔多瓦人民正遭受统治者和资本家的压迫！让我们解放他们吧！"
 UKR_csto_com_app: "加入集安组织"
 UKR_csto_com_app_desc: "我们的兄弟民族是集体安全条约组织的成员，也许值得加入他们。"
 UKR_integration_support: "前共和国的整合"
 UKR_integration_support_desc: "我们将启动前共和国的整合进程"
 UKR_declare_ussr: "复兴苏联"
 UKR_declare_ussr_desc: "我们是苏联的真正继承者！是时候振兴这个伟大的国家了！"
 UKR_nationalize_everything: "启动国有化"
 UKR_nationalize_everything_desc: "我们不会给资本家任何东西！企业将回归国家的怀抱！"
 UKR_social_propaganda: "社会改革"
 UKR_social_propaganda_desc: "我们将启动大规模的社会改革，以赢得穷人的心。"
 UKR_christian_communism_desc: "禁止宗教是我们不会允许的错误之一。基督教共产主义才是我们的未来。毕竟，耶稣本人就是共产主义者！"
 UKR_criminalize_oligrachy: "将寡头政治定为犯罪"
 UKR_criminalize_oligrachy_desc: "寡头们多年来一直在吸食我们国家的鲜血，变卖我们曾祖父创造的财产，这就够了！"
 UKR_land_to_people: "把土地分给人民！"
 UKR_land_to_people_desc: "土地应该属于人民！而不是一群寡头、土匪。"
 UKR_revive_soviet_factories: "复兴苏联工厂"
 UKR_revive_soviet_factories_desc: "许多苏联时期留下来的企业被摧毁和毁坏了，我们将再次恢复它们。"
 UKR_regions_ditch: "放弃与地区党的联盟"
 UKR_regions_ditch_desc: "我们不会与这个政党结成联盟，这只会给我们带来问题。"
 UKR_regions_integr: "与地区党联合执政"
 UKR_regions_integr_desc: "我们将与该党结成联盟，这将增强我们的政治能力。"
 UKR_socialist_ukraine_effort: "社会主义改革"
 UKR_socialist_ukraine_effort_desc: "我们将开展一系列改革，以加强我们的政治地位。"
 UKR_pensions_for_elders_incr: "提高养老金"
 UKR_pensions_for_elders_incr_desc: "我们将增加养老金，让公民愿意退休。"
 UKR_full_rabota: "劳动改革"
 UKR_full_rabota_desc: "我们将对劳动立法进行重大改革，以改善公民的工作条件。"
 UKR_socialist_democratic_policies: "社会民主国家"
 UKR_socialist_democratic_policies_desc: "在社会民主的旗帜下，我们国家迎来了新的未来。"
 UKR_start_to_support: "开始支持穷人"
 UKR_start_to_support_desc: "我们的选民是低收入公民，他们希望我们的改革能把他们从上届政府拖入的经济深渊中拉出来。我们会帮助他们。"
 UKR_progressive_taxation: "累进税制"
 UKR_progressive_taxation_desc: "我们打算引入累进税制，以实现公民更大的经济平等。"
 UKR_social_conservative_prog: "社会保守计划"
 UKR_social_conservative_prog_desc: "我们打算实施一系列改革，这些改革受到我国政治领域社会保守派代表的启发。"
 UKR_ukr_cossack_freedom: "如哥萨克一般的自由"
 UKR_ukr_cossack_freedom_desc: "我们的公民就像一个自由的哥萨克，他不再是资本的奴隶，也不是任何人的奴隶。"
 UKR_nationalization_of_big_com: "大公司国有化"
 UKR_nationalization_of_big_com_desc: "我们将对大公司进行一系列国有化。"
 UKR_crusade_against_inequality: "消除不平等"
 UKR_crusade_against_inequality_desc: "我们社会的不平等现象日益突出，我们将启动一项经济和政治计划，以软化不同社会阶层之间的经济界限。"
 UKR_reduce_cap_oligrach: "削弱寡头的影响力"
 UKR_reduce_cap_oligrach_desc: "寡头对我们国家的影响太大了，是时候解决这个问题了。"
 UKR_people_brotherhood: "兄弟团结"
 UKR_people_brotherhood_desc: "我们的人民，居住在我们国家的人民必须团结一致，共同抵抗来自外部的威胁。"
 UKR_ask_russia_to_give_nukes: "向俄罗斯请求核武器"
 UKR_ask_russia_to_give_nukes_desc: "我们打算向俄罗斯请求一些核武器储备，以保护我国免受外部威胁。"
 UKR_reduce_foreign_influence: "减少外国影响"
 UKR_reduce_foreign_influence_desc: "削弱外国对我国的影响，独立才是根本。"
 UKR_labourr_unions: "支持工会"
 UKR_labourr_unions_desc: "我们将积极保护国内工会，为国内创造良好的工作环境。"
 UKR_immigartion_easing: "促进移民"
 UKR_immigartion_easing_desc: "我们将促进移民程序，因为我们的边界不应该被墙封闭。"
 UKR_uindependence_prop: "保护国内投资者"
 UKR_uindependence_prop_desc: "我们不应该放弃国内投资者，这是我们加强经济增长的唯一途径。"
 UKR_dont_touch_west_inv: "优先西方投资者"
 UKR_dont_touch_west_inv_desc: "我们将集中精力保护西方投资者。"
 UKR_pro_russian_approach: "亲俄方向"
 UKR_pro_russian_approach_desc: "我们将选择俄罗斯作为参考点，从历史上看，我们只是与他们同行。"
 UKR_pro_western_approach: "亲西方方向"
 UKR_pro_western_approach_desc: "我们选择了我们的道路 - 通往西方的道路"
 UKR_request_protection_from_rus: "请求俄罗斯保护"
 UKR_request_protection_from_rus_desc: "我们将争取达成保护和防御协议，以便我们的国家受到俄罗斯的保护。"
 UKR_apply_economic_union: "加入俄罗斯经济区"
 UKR_apply_economic_union_desc: "与俄罗斯的经济合作将为我国带来经济增长和有利可图的合同。"
 UKR_donbas_peaceful: "和平解决分裂问题"
 UKR_donbas_peaceful_desc: "我们准备和平解决与我们分离的领土问题"
 UKR_csto_apply: "加入集安组织"
 UKR_csto_apply_desc: "我们打算成为集体安全条约组织的一部分，我们认为只有这个联盟的成员才真正有兴趣保护我们"
 UKR_western_socialists_coalition: "与亲西方政党结盟"
 UKR_western_socialists_coalition_desc: "我们打算与亲西方政党建立联盟"
 UKR_harsh_separat_dealkill: "消灭分裂分子"
 UKR_harsh_separat_dealkill_desc: "我们已准备好解放我们的领土。"
 UKR_apply_eu_reforms: "采取亲欧洲改革"
 UKR_apply_eu_reforms_desc: "我们打算遵循欧洲政治路线"
 UKR_nato_commitment: "北约改革"
 UKR_nato_commitment_desc: "我们打算按照北约标准进行军事改革，以便未来加入北约。"
 UKR_pmr_invite_union: "向德涅斯特河沿岸提议建立统一国家"
 UKR_pmr_invite_union_desc: "我们打算更进一步，在欧洲创建一个新的国家，这个国家不会受到外部势力的影响，而且有合适的候选人来壮大这个国家。"
 UKR_belarus_invite: "向白俄罗斯提议建立统一国家"
 UKR_belarus_invite_desc: "我们打算更进一步，在欧洲创建一个新的国家，这个国家不会受到外部势力的影响，而且有合适的候选人来壮大这个国家。"
 UKR_hungary_invite: "向匈牙利提议建立统一国家"
 UKR_hungary_invite_desc: "我们打算更进一步，在欧洲创建一个新的国家，这个国家不会受到外部势力的影响，而且有合适的候选人来壮大这个国家。"
 UKR_moldova_invite: "向摩尔多瓦提议建立统一国家"
 UKR_moldova_invite_desc: "我们打算更进一步，在欧洲创建一个新的国家，这个国家不会受到外部势力的影响，而且有合适的候选人来壮大这个国家。"
 ukraine_rada.2.t: "与乌克兰社会党结盟？"
 ukraine_rada.2.d: "长期以来，尽管我们之间存在分歧，但社会党一直是我们的盟友。乌克兰社会党的大多数成员都曾是我们党的成员，而且长期以来的关系使得联盟成为显而易见的选择，但社会党正逐渐远离我们，变得更加温和，并渗透着修正主义，因此我们将不会被允许在共同政府下实施最激进的政策。"
 ukraine_rada.2.b: "让乌克兰社会党见鬼去吧。宣布实行单一联合！"
 ukraine_rada.2.a: "让我们开始结盟谈判"
 ukraine_rada.1.t: "与乌克兰共产党结盟？"
 ukraine_rada.1.d: "长期以来，共产党一直是我们的盟友，尽管他们之间存在分歧。我们党的大多数成员都是乌克兰共产党的成员，这种关系的悠久历史使得联盟成为必要，但共产党不愿意与时俱进，提倡倒退的思想，支持自相残杀的举措，与他们结盟也可能让乌克兰共产党的一些激进成员获得权力。"
 ukraine_rada.1.b: "让乌克兰共产党见鬼去吧"
 ukraine_rada.1.a: "让我们开始结盟谈判"
 ukraine_kommi.1.t: "乌克兰要求拥有核武器"
 ukraine_kommi.1.d: "乌克兰政府突然发表声明，称他们想从我们这里获得核武器，以抵御外部攻击。如此危险的决定需要我们权衡利弊。"
 ukraine_kommi.1.a: "我们将向他们提供核武器"
 ukraine_kommi.1.b: "我们不会向他们提供核武器"
 ukraine_kommi.2.t: "俄罗斯核武器"
 ukraine_kommi.2.d: "他们同意向我们提供一些核武器"
 ukraine_kommi.2.a: "很好"
 ukraine_kommi.3.t: "俄罗斯核武器"
 ukraine_kommi.3.d: "他们拒绝向我们提供核武器"
 ukraine_kommi.3.a: "悲哀"
 ukraine_kommi.4.t: "一个新的共产主义国家"
 ukraine_kommi.4.d: "我们的革命成功了。旧政权已经覆灭，但我们还不能孤军奋战。乌克兰方面表示愿意支持我们的政府，帮助我们站稳脚跟。"
 ukraine_kommi.4.a: "我们接受他们的支援"
 ukraine_kommi.5.t: "乌克兰提供军事合作"
 ukraine_kommi.5.d: "乌克兰政府称准备签署一系列两国军事政治合作文件。"
 ukraine_kommi.5.a: "我们支持与乌克兰的友谊"
 ukraine_kommi.5.b: "我们不会签署任何东西"
 ukraine_kommi.6.t: "与俄罗斯的军事合作"
 ukraine_kommi.6.d: "他们同意与我们签署军事政治合作协议。"
 ukraine_kommi.6.a: "好的"
 ukraine_kommi.7.t: "与俄罗斯的军事合作"
 ukraine_kommi.7.d: "他们拒绝与我们签署军事政治合作协议。"
 ukraine_kommi.7.a: "悲哀"
 ukraine_kommi.8.t: "联合民主国家"
 ukraine_kommi.8.d: "乌克兰政府建议我们在广阔的欧洲建立一个单一的民主国家，一种第三权力中心，我们会为了第三种力量的梦想而同意放弃独立吗？"
 ukraine_kommi.8.a: "独立只是虚构"
 ukraine_kommi.8.b: "休想"
 ukraine_kommi.9.t: "联合民主国家"
 ukraine_kommi.9.d: "他们拒绝了我们的提议！这是意料之中的事，但他们的做法太可悲了。"
 ukraine_kommi.9.a: "他们不会理解。"
 ukraine_kommi.10.t: "乌克兰寻求保护"
 ukraine_kommi.10.d: "乌克兰政府要求我们向他们提供保障，以保护他们的独立性。这是一个意料之外的要求，但也许我们应该考虑一下。"
 ukraine_kommi.10.a: "我们会保护他们"
 ukraine_kommi.10.b: "休想"
 ukraine_kommi.11.t: "俄罗斯保证提供保护"
 ukraine_kommi.11.d: "俄罗斯政府已经同意为我们提供独立保障！"
 ukraine_kommi.11.a: "很好"
 ukraine_kommi.12.t: "俄罗斯保证提供保护"
 ukraine_kommi.12.d: "俄罗斯政府拒绝向我们提供独立保障。"
 ukraine_kommi.12.a: "该死"
 ukraine_kommi.13.t: "与乌克兰的天然气合同"
 ukraine_kommi.13.d: "乌克兰提出降低我们的天然气合同购买价格，作为回报，我们之间的中间人将被取消，这样我们就对他们有更大的影响力，我们应该同意吗？"
 ukraine_kommi.13.a: "我们将签订协议"
 ukraine_kommi.13.b: "我们对此不感兴趣。"
 ukraine_kommi.14.t: "与俄罗斯的天然气合同"
 ukraine_kommi.14.d: "他们同意更改我们的天然气合同条款，现在我们支付的费用将更少！"
 ukraine_kommi.14.a: "很好"
 ukraine_kommi.15.t: "与俄罗斯的天然气合同"
 ukraine_kommi.15.d: "他们同意更改我们的天然气合同条款，现在我们支付的费用将更少！"
 ukraine_kommi.15.a: "很好"
