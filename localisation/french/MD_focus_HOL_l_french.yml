 HOL_fokker_technologies_planes_manufacturer: "Fokker Technologies"
 HOL_fokker_technologies_planes_manufacturer_desc: "Fokker Technologies est un constructeur d'avions §Y[HOL.GetAdjectiveCap]§! de renom, avec un héritage de production d'avions militaires et civils. Connue pour son innovation dans le domaine de l'aérospatiale, Fokker continue de fournir une technologie de pointe pour l'armée de l'air §Y[HOL.GetAdjectiveCap]§!."
