 belarus_export.10.d: "白俄罗斯工程师为我们提供飞机设备维修服务。我们会同意与他们签订合同吗？"
 belarus_export.10.a: "当然，一笔很好的交易。"
 belarus_export.10.b: "不，我们拒绝他们的交易。"
