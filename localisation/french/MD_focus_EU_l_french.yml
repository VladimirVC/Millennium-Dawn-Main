 EU_total_member_vote_desc_tt: "Le système de vote principal de §C[EUU.GetNameWithFlag]§! est la majorité qualifiée (QMV). La QMV exige que [?global.EU_majority_qmv_state] §CÉtats membres§! (soit 55% du total actuel des §CÉtats membres§!) soutiennent la résolution en cours. Une fois que nous avons plus de [?global.EU_majority_qmv_state] §CÉtats membres§!, la loi peut être adoptée, à condition d'avoir la majorité démographique requise de 65%.\n\nPourcentage de population de §Cl'UE§! §Gsoutenant§! : [?global.var_EUpopRatioYes|%+]\nPourcentage de population de §Cl'UE§! §Rrejetant§! : [?global.var_EUpopRatioNo|%-]"
