l_simp_chinese:
 SOV_proclaim_soviet_hegemony: "宣布苏维埃权威"
 EST_new_economic_policy_desc: "自从重新获得独立以来，我们成功地将自己定位为东西方之间的门户，并追求经济改革和与西方的融合。尽管如此，我们必须制定一项新政策，更加符合我们的外国伙伴，一项更有利可图、更有条理的政策。"
 SOV_proclaim_soviet_hegemony_desc: "随着经济恢复和群众动员，俄罗斯已准备好重拾其领导地位。我们将公开宣称苏联的霸权地位，将力量平衡东移，并向欧洲各国施压，迫使它们正视我们的回归。"
 SOV_the_third_rome_desc: "“莫斯科，第三罗马”这一说法认为莫斯科是古罗马和拜占庭的继承者，继承了罗马帝国的遗产。欧洲历史上一直存在着关于哪个城市真正应该继承这一遗产的争论"
 polish_focus: "波兰国策树"
 SOV_socialist_humanism_desc: "社会主义不仅仅是工厂和配额的问题，而是关乎工人的尊严。我们将把人的福祉置于革命的核心，证明共产主义道路是为人民服务的，而不是相反。"
 SOV_socialist_humanism: "社会主义人文主义"
 SOV_the_third_rome: "第三罗马"
 king: "背景：王室成员"