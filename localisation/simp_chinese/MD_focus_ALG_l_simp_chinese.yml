 ALG_civil_reforms_1: "公民权利保护"
 ALG_civil_reforms_1_desc: "阿尔及利亚已确立基本公民权利保障。公民享有更多自由，为进一步改革奠定了基础。"
 ALG_civil_reforms_2: "公民权利与性别平等"
 ALG_civil_reforms_2_desc: "在民权改革的基础上，阿尔及利亚进一步推进了性别平等。越来越多的女性加入劳动力大军，提升了生产力和经济增长。"
 ALG_civil_reforms_3a: "民权改革：新闻自由"
 ALG_civil_reforms_3a_desc: "阿尔及利亚的改革计划现已纳入新闻自由。独立媒体对政府进行监督问责，同时公民权利与性别平等持续推动社会变革。"
 ALG_civil_reforms_3b: "民权改革：司法独立"
 ALG_civil_reforms_3b_desc: "阿尔及利亚的改革计划现已纳入独立的司法体系。公正的法庭在打击腐败的同时，公民权利与性别平等持续推动社会变革。"
 ALG_civil_reforms_4: "全面民权改革"
 ALG_civil_reforms_4_desc: "阿尔及利亚已完成全面的公民社会改革。公民权利、性别平等、新闻自由、司法独立以及获得赋权的公民社会组织，已将阿尔及利亚转变为现代民主国家。"
 ALG_gov_reforms_1: "数字政府倡议"
 ALG_gov_reforms_1_desc: "阿尔及利亚已启动政府服务数字化进程。在线平台提升了公共服务供给效率，同时减少了官僚体制中的效能损耗。"
 ALG_gov_reforms_2: "公共服务改革"
 ALG_gov_reforms_2_desc: "在数字化的基础上，阿尔及利亚改革了公共服务体系。公民得以享受更快捷、更高效的政府服务。"
 ALG_gov_reforms_3a: "反腐改革"
 ALG_gov_reforms_3a_desc: "阿尔及利亚的反腐败运动净化了政府机构，透明度和问责制得以恢复。"
 ALG_gov_reforms_3b: "电子政务系统"
 ALG_gov_reforms_3b_desc: "阿尔及利亚的电子政务门户为公民提供了无缝访问政府服务的在线平台。官僚机构的效率已显著提升。"
 ALG_gov_reforms_4: "现代行政国家"
 ALG_gov_reforms_4_desc: "阿尔及利亚已建立起一个完全现代化、高效且透明的政府。数字服务、反腐败措施以及精简的官僚体系构成了新政府的鲜明特征。"
 ALG_african_union_engagement_full_tt: "§G与非洲联盟接触：§!\n\n§Y对所有非盟成员国的影响：§!\n• §G+25§! 对阿尔及利亚的态度\n• §G+2%§! 阿尔及利亚的影响力\n\n阿尔及利亚巩固了其作为非洲事务主导声音的地位。"
 ALG_mend_ties_with_rabat: "修复与拉巴特关系"
 ALG_mend_ties_with_rabat_desc: "阿尔及利亚与摩洛哥的边境自1994年起便已关闭。西撒哈拉冲突、1963年的沙地战争以及冷战时期的阵营对立，在我们两国之间留下了深刻的伤痕。\n\n然而，我们共享着相同的阿马齐格与阿拉伯文化遗产，共同经历了反殖民斗争，也怀抱着对人民同样的期望。或许现在是时候放下过去，与摩洛哥王国建立新的关系了。"
 ALG_our_east_brothers: "我们的东方兄弟"
 ALG_our_east_brothers_desc: "阿尔及利亚与突尼斯并肩作战，共同抗击法国殖民主义。在我国独立战争期间，突尼斯的土地庇护了阿尔及利亚难民和民族解放阵线的战士们。\n\n这份兄弟情谊必须得到巩固。阿尔及利亚与突尼斯携手，必将成为统一马格里布的核心力量，引领北非走向繁荣的未来。"
 ALG_black_spring: "黑色春天"
 ALG_black_spring_desc: "2001年4月18日，卡比利亚青年学生马西尼萨·格尔马在贝尼杜阿拉宪兵队驻地内遭枪击身亡。他的死引发了自独立以来卡比利亚地区最大规模的抗议活动，安全部队造成逾百人死亡。黑色之春由此拉开序幕。"
 ALG_black_spring_tt: "§H黑色之春爆发§!\n马西尼萨·盖尔马之死在卡比利亚地区引发大规模抗议。宪兵队造成超过100名抗议者死亡。\n\n§Y卡比利亚诉求：§!\n- 为死者伸张正义\n- 撤出宪兵队\n- 承认塔马齐格特语地位\n- 终结\"霍格拉\"（蔑视性压迫）"
 ALG_negotiate_with_arrouch: "与阿鲁什谈判"
 ALG_negotiate_with_arrouch_desc: "阿鲁什（乡村议会）已组织成一个协调一致的运动，代表卡比利亚地区的诉求。我们将与这些传统结构进行对话，而非对抗。"
 ALG_negotiate_arrouch_tt: "§H阿鲁什运动§!\n传统的卡比利亚乡村议会已联合起来提出诉求。谈判或许能带来和平。\n\n§Y阿鲁什运动核心诉求：§!\n- 承认埃尔克瑟尔纲领\n- 塔马齐格特语言权利\n- 经济发展\n- 结束军事存在"
 ALG_recognize_tamazight_2002: "塔马齐格特语：国家语言"
 ALG_recognize_tamazight_2002_desc: "2002年4月8日，经过激烈谈判，塔马齐格特语将被承认为阿尔及利亚的国家语言——这是对柏柏尔人身份认同的历史性让步。"
 ALG_tamazight_national_tt: "§H塔马齐格特语成为国家语言§!\n历史性时刻——塔马齐格特语与阿拉伯语共同成为阿尔及利亚的国家语言。\n\n§Y重要意义：§!\n- 柏柏尔人身份首次获得承认\n- 宪法修正案通过\n- 学校可教授塔马齐格特语\n- §G卡比利亚地区的重大胜利§!"
 ALG_address_hogra: "解决霍格拉问题"
 ALG_address_hogra_desc: "霍格拉——卡拜尔人对国家所怀有的蔑视与屈辱感——必须得到解决。投资、就业与尊重将取代忽视与虐待。"
 ALG_address_hogra_tt: "§H终结霍格拉§!\n\"霍格拉\" - 针对卡比利亚人的系统性蔑视 - 将通过以下方式解决：\n\n- 在卡比利亚地区投资基础设施建设\n- 实施就业创造计划\n- 终止歧视性做法\n- 尊重卡比利亚人的尊严"
 ALG_amazigh_cultural_revival: "阿马齐格文化复兴"
 ALG_amazigh_cultural_revival_desc: "投资柏柏尔文化机构、博物馆和教育项目，将有助于保存并弘扬早于阿拉伯人到来之前的阿马齐格文化遗产。"
 ALG_amazigh_revival_tt: "§H阿马齐格文化复兴§!\n- 阿马齐格学院成立\n- 柏柏尔博物馆获得资助\n- 文化节庆活动得到支持\n- 提非纳文字得到推广"
 ALG_yennayer_national_holiday: "公共节日耶纳耶尔"
 ALG_yennayer_national_holiday_desc: "2017年12月，总统布特弗利卡宣布将耶纳耶尔节——即阿马齐格新年——定为全国性节日。自此，1月12日将在阿尔及利亚全国范围内庆祝。"
 ALG_yennayer_tt: "§HY耶纳耶尔节成为国家法定假日§!\n柏柏尔新年（1月12日）现已成为阿尔及利亚官方节日。\n\n§Y历史性认可：§!\n- 庆祝前伊斯兰文化遗产\n- 国家凝聚力得到加强\n- §G卡比利亚人满意度提升§!"
 ALG_tamazight_official_2016: "塔马齐格特语：官方语言"
 ALG_tamazight_official_2016_desc: "2016年的宪法修正案将塔马齐格特语从\"国家\"语言提升为\"官方\"语言，使其与阿拉伯语享有同等地位。"
 ALG_tamazight_official_tt: "§H塔马齐格特语成为官方语言§!\n§W2016年宪法修正案：§!\n- 柏柏尔语与阿拉伯语地位平等\n- 所有政府文件采用双语制\n- 各级学校开设柏柏尔语课程\n- §G宪法层面的重大胜利§!"
 ALG_berber_integration_complete: "求同存异"
 ALG_berber_integration_complete_desc: "通过对话、承认与投资，阿尔及利亚解决了卡比利亚问题。阿拉伯裔与阿马齐格裔阿尔及利亚人如今团结一致。"
 ALG_integration_complete_tt: "§H卡比利亚问题已解决§!\n阿尔及利亚通过以下方式成功整合了其柏柏尔人口：\n- 语言认可\n- 文化投入\n- 经济发展\n- 尊重与对话\n\n§G国家统一已实现！§!"
 ALG_crush_the_uprising: "镇压起义"
 ALG_crush_the_uprising_desc: "黑色之春威胁国家统一。宪兵队将恢复秩序，分离主义分子将被清除。"
 ALG_crush_uprising_tt: "§H镇压路线§!\n使用武力结束抗议活动，维护阿尔及利亚的领土完整。\n\n§Y益处：§!\n- 保留全部领土\n- 不对分离主义者做出让步\n- 军事控制\n\n§R代价：§!\n- 国际批评\n- 卡比利亚人的深度怨恨\n- 持续不断的抵抗"
 ALG_gendarmerie_reinforcement: "宪兵增援"
 ALG_gendarmerie_reinforcement_desc: "增派宪兵部队前往卡比利亚地区，以维持秩序并防止未来发生骚乱。"
 ALG_gendarmerie_tt: "§H部署安全部队§!\n- 宪兵部署规模扩大\n- 抗议活动受到监控\n- 关键活动人士被拘留\n- 通过武力维持秩序"
 ALG_arabization_policy: "阿拉伯化政策"
 ALG_arabization_policy_desc: "阿拉伯语是阿尔及利亚的官方语言。在卡比利亚地区强化阿拉伯化政策，以对抗分离主义的柏柏尔主义意识形态。"
 ALG_arabization_1_tt: "§H强化阿拉伯化§!\n- 强制推行纯阿拉伯语教育\n- 压制塔马齐格特语\n- 推广伊斯兰身份认同\n- 抵制柏柏尔主义意识形态\n\n§R卡比利亚人将深感怨恨§!"
 ALG_ban_mak: "禁止MAK"
 ALG_ban_mak_desc: "2021年5月，由费尔哈特·梅赫尼领导的卡比利亚自治运动（MAK）将被指定为恐怖组织并遭取缔。"
 ALG_ban_mak_tt: "§HMAK被指定为恐怖组织§!\n卡比利亚自决运动遭取缔：\n- 费尔哈特·梅赫尼被列为恐怖分子\n- MAK支持者遭逮捕\n- 分离主义活动被定为刑事犯罪\n\n§R预计将引发国际批评§!"
 ALG_accuse_foreign_interference: "指责外国势力"
 ALG_accuse_foreign_interference_desc: "MAK分离主义运动并非自发形成——它是由试图破坏阿尔及利亚稳定的外国势力资助和支持的。必须揭露摩洛哥及其他国家的行径。"
 ALG_foreign_interference_tt: "§H归咎于外国势力§!\nMAK被指控为外国代理人：\n- 摩洛哥被指控资助MAK\n- 针对阿尔及利亚的外部阴谋\n- 民族团结对抗敌人\n\n§R外交紧张局势将加剧§!"
 ALG_mak_israel_connection: "MAK-以色列联系"
 ALG_mak_israel_connection_desc: "费尔哈特·梅赫尼与以色列官员的会面证明，MAK组织是一个旨在分裂阿拉伯世界的犹太复国主义阴谋。必须揭露这种联系。"
 ALG_mak_israel_tt: "§H揭露以色列与MAK的联系§!\n- MAK被定性为犹太复国主义项目\n- 以色列被指控破坏地区稳定\n- 获得阿拉伯联盟支持\n- 反以色列情绪被动员\n\n§Y国内支持度§G提升§!§!  \n§R与以色列的关系将被彻底破坏§!"
 ALG_kabylie_pacified: "卡比利亚平定"
 ALG_kabylie_pacified_desc: "通过安全行动和政治压制，卡比利亚地区已得到控制。分离主义威胁已被遏制。"
 ALG_kabylie_pacified_tt: "§H卡比利亚局势稳定§!\n- MAK独立运动被粉碎\n- 分离主义被定为刑事犯罪\n- 安全部队掌控局势\n- 国家统一得到强化\n\n§Y然而怨恨仍在暗涌。§!"
 ALG_el_kseur_platform: "接受埃尔克瑟尔纲领"
 ALG_el_kseur_platform_desc: "2001年6月11日由阿尔鲁什起草的《埃尔克瑟尔纲领》，包含了15项关于正义与权利的诉求。我们将以此作为谈判的基础。"
 ALG_el_kseur_tt: "§H接受埃尔克瑟尔纲领§!\n该纲领包含15项要求：\n- 为\"黑色之春\"受害者伸张正义\n- 撤出宪兵队\n- 承认塔马齐格特语地位\n- 终结\"霍格拉\"（蔑视性压迫）\n- 经济发展\n- 民主改革\n\n§R需要作出根本性让步§!"
 ALG_withdraw_gendarmerie: "撤出宪兵"
 ALG_withdraw_gendarmerie_desc: "埃尔克苏尔的一项关键要求——令人憎恨的宪兵队将从卡比利亚撤出，并由地方警察取而代之。"
 ALG_withdraw_gendarmerie_tt: "§H宪兵撤离§!\n- 准军事部队撤离卡比利亚地区\n- 地方警察接管治安职责\n- 军事存在显著减少\n- 卡比利亚主要诉求得到满足\n\n§R军方将对此表示不满§!"
 ALG_trial_responsible_officers: "审判有罪军官"
 ALG_trial_responsible_officers_desc: "对黑色春天事件中造成死亡负有责任的官员将面临审判。这一前所未有的举措承认了国家对卡比利亚人所犯下的罪行。"
 ALG_trial_officers_tt: "§H追究有罪军官§!\n- 军官因杀戮行为受审\n- 遇难者家属获得赔偿\n- 国家承认罪行\n- 历史性追责\n\n§R军方将震怒§!\n§G国际认可度提升§!"
 ALG_secular_berber_identity: "世俗柏柏尔认同"
 ALG_secular_berber_identity_desc: "卡比利亚在历史上比阿尔及利亚其他地区更为世俗化。承认世俗的柏柏尔身份，对阿尔及利亚以阿拉伯-伊斯兰为核心的民族认同构成了挑战。"
 ALG_secular_berber_tt: "§H承认世俗柏柏尔人身份§!\n- 重视前伊斯兰文化遗产\n- 保护世俗价值观\n- 保障宗教自由\n- 挑战伊斯兰主义叙事\n\n§R伊斯兰主义者将反对此举§!"
 ALG_mak_dialogue: "与MAK对话"
 ALG_mak_dialogue_desc: "与费尔哈特·梅赫尼领导的MAK分离主义运动展开对话。这可能会助长分离主义的合法性，但或许也是通往和平的唯一途径。"
 ALG_mak_dialogue_tt: "§H与MAK开启对话§!\n与分离主义者谈判：\n- 费尔哈特·梅亨尼参与其中\n- 讨论自决权议题\n- 讨论自治方案\n- 独立选项摆上台面\n\n§R极具争议性§!\n§R存在使分离主义合法化的风险§!"
 ALG_reject_separatism: "拒绝分裂主义"
 ALG_reject_separatism_desc: "在尊重柏柏尔人权利的同时，阿尔及利亚的领土完整不容谈判。团结包容多样性——而非分裂——才是解决之道。"
 ALG_reject_separatism_tt: "§H多元一体§!\n- 拒绝分离主义\n- 保障柏柏尔人权利\n- 维护领土完整\n- 多元而统一的阿尔及利亚"
 ALG_kabyle_autonomy_statute: "卡比利亚自治条例"
 ALG_kabyle_autonomy_statute_desc: "卡比利亚正式自治法案 - 在地方事务上实现自治，同时仍作为阿尔及利亚的一部分。这是一项历史性的妥协。"
 ALG_autonomy_statute_tt: "§H卡比利亚获得自治权§!\n- 地区议会成立\n- 塔马齐格特语被承认为官方语言\n- 地方征税权确立\n- 文化自治权获准\n\n§Y卡比利亚仍为阿尔及利亚组成部分§!"
 ALG_federal_algeria: "阿尔及利亚联邦"
 ALG_federal_algeria_desc: "阿尔及利亚转变为联邦共和国，卡比利亚成为首个自治区。其他地区可能效仿这一模式。"
 ALG_federal_algeria_tt: "§H阿尔及利亚成为联邦制国家§!\n- 联邦宪法正式通过\n- 地方自治权获得授予\n- 卡比利亚地区作为示范\n- 权力实现去中心化\n- 通过联邦制实现国家统一"
 ALG_united_secular_algeria: "统一而世俗的阿尔及利亚"
 ALG_united_secular_algeria_desc: "一个统一、世俗的阿尔及利亚，尊重所有身份认同——阿拉伯人和阿马齐格人，穆斯林和世俗者。多样性是我们的力量。"
 ALG_united_secular_tt: "§H统一而世俗的阿尔及利亚§!\n- 世俗国家已建立\n- 所有身份认同均受尊重\n- 无分离主义\n- 无伊斯兰主义\n- 现代民主制度"
 ALG_kabyle_satisfaction_minus_5_tt: "§R卡比利亚人满意度：§! -5"
 ALG_kabyle_satisfaction_minus_10_tt: "§R卡比利亚人满意度：§! -10"
 ALG_kabyle_satisfaction_minus_15_tt: "§R卡比利亚人满意度：§! -15"
 ALG_kabyle_satisfaction_plus_3_tt: "§G卡比利亚人满意度：§! +3"
 ALG_kabyle_satisfaction_plus_5_tt: "§G卡比利亚人满意度：§! +5"
 ALG_kabyle_satisfaction_plus_8_tt: "§G卡比利亚人满意度：§! +8"
 ALG_kabyle_satisfaction_plus_10_tt: "§G卡比利亚人满意度：§! +10"
 ALG_kabyle_satisfaction_plus_15_tt: "§G卡比利亚人满意度：§! +15"
 ALG_release_kby_autonomous_tt: "§Y将卡比利亚释放为自治区§!"
 ALG_black_spring_spirit: "黑色之春起义"
 ALG_black_spring_spirit_desc: "马西尼萨·盖尔马之死引发了自独立以来最大规模的抗议活动。卡比利亚地区因对国家的愤怒而陷入动荡。"
 ALG_arrouch_negotiations: "阿鲁什谈判"
 ALG_arrouch_negotiations_desc: "政府正在与阿鲁什运动进行谈判。传统的乡村议会现在代表卡比利亚地区发声。"
 ALG_tamazight_national_language: "塔马齐格特语：国家语言"
 ALG_tamazight_national_language_desc: "塔马齐格特语已被承认为阿尔及利亚的国家语言——这是迈向柏柏尔人认可的重要一步。"
 ALG_tamazight_official_language: "塔马齐格特语：官方语言"
 ALG_tamazight_official_language_desc: "2016年宪法将塔马齐格特语定为官方语言，与阿拉伯语地位平等。这是柏柏尔人权利的历史性成就。"
 ALG_addressing_kabyle_grievances: "应对卡比利亚民怨"
 ALG_addressing_kabyle_grievances_desc: "政府正在投资卡比利亚地区，着手解决多年来被忽视和遭受“霍尔加”（蔑视）的问题。"
 ALG_amazigh_cultural_institutions: "阿马齐格文化机构"
 ALG_amazigh_cultural_institutions_desc: "对柏柏尔文化机构的投资，正在保护和弘扬阿尔及利亚的阿马齐格文化遗产。"
 ALG_united_algeria: "统一的阿尔及利亚"
 ALG_united_algeria_desc: "通过对话与尊重，阿尔及利亚成功团结了阿拉伯与阿马齐格族群。卡比利亚问题已得到解决。"
 ALG_kabyle_crackdown: "镇压卡比利亚"
 ALG_kabyle_crackdown_desc: "安全部队正在镇压卡比利亚抗议活动。秩序正通过武力手段得以恢复。"
 ALG_gendarmerie_deployed: "宪兵部署"
 ALG_gendarmerie_deployed_desc: "宪兵部队驻扎在卡比利亚各地，维持秩序并监控异议活动。"
 ALG_forced_arabization: "强制阿拉伯化"
 ALG_forced_arabization_desc: "卡比利亚地区正在强化阿拉伯化政策。柏柏尔人的身份认同正受到压制，以支持阿拉伯-伊斯兰民族主义。"
 ALG_mak_banned: "查禁MAK"
 ALG_mak_banned_desc: "卡比利亚自决运动(MAK)已被认定为恐怖组织。分离主义现已被定为刑事犯罪。"
 ALG_foreign_hands_narrative: "渲染境外威胁"
 ALG_foreign_hands_narrative_desc: "政府将卡比利亚分离主义归咎于外国势力 - 尤其是摩洛哥和以色列。外部敌人让国家团结起来。"
 ALG_mak_terrorist_designation: "认定MAK为恐怖组织"
 ALG_mak_terrorist_designation_desc: "MAK和费尔哈特·梅赫尼被认定为与以色列有关的恐怖组织。分离主义威胁被描绘成犹太复国主义者的阴谋。"
 ALG_kabylie_under_control: "卡比利亚局势稳定"
 ALG_kabylie_under_control_desc: "通过武力和政治压制，卡比利亚已处于政府控制之下。然而，不满情绪仍在暗流涌动。"
 ALG_el_kseur_negotiations: "埃尔克瑟尔谈判"
 ALG_el_kseur_negotiations_desc: "政府已接受《埃尔克瑟尔纲领》作为与卡比利亚地区谈判的基础。"
 ALG_secular_amazigh_movement: "阿马齐格世俗运动"
 ALG_secular_amazigh_movement_desc: "一种世俗的柏柏尔身份正得到认可，对阿尔及利亚民族性的阿拉伯-伊斯兰定义构成了挑战。"
 ALG_mak_negotiations: "对话MAK"
 ALG_mak_negotiations_desc: "政府正与MAK分离主义运动进行前所未有的对话。卡比利亚的未来悬而未决。"
 ALG_unity_within_diversity: "求同存异"
 ALG_unity_within_diversity_desc: "阿尔及利亚拥抱其多样性——阿拉伯与阿马齐格，穆斯林与世俗——同时保持国家统一。分裂主义遭到拒绝。"
 ALG_federal_republic: "联邦共和国"
 ALG_federal_republic_desc: "阿尔及利亚已成为一个联邦共和国，卡比利亚成为首个自治区。权力下放的同时，国家统一得以维系。"
 ALG_secular_united_nation: "统一而世俗的国家"
 ALG_secular_united_nation_desc: "阿尔及利亚已崛起为一个统一、世俗的国家，尊重所有身份认同，并同时拒绝分离主义和宗教极端主义。"
 KBY_autonomous_kabylie: "卡比利亚自治"
 KBY_autonomous_kabylie_desc: "卡比利亚已在阿尔及利亚境内实现自治。在地方事务上实行自治，同时仍作为国家的一部分。"
 KBY_federal_partner: "联邦伙伴"
 KBY_federal_partner_desc: "作为阿尔及利亚的联邦伙伴，卡比利亚在阿尔及利亚联邦内享有充分自治和平等伙伴地位。"
 ALG_kabyle_autonomy: "卡比利亚自治"
 ALG_kabyle_suppressed: "镇压卡比利亚"
 ALG_kabyle_independence: "卡比利亚独立"
 ALG_black_spring_triggered: "黑色春天发生"
 ALG_kabyle_issue_resolved: "卡比利亚问题解决"
 ALG_kabyle_suppressed_complete: "卡比利亚镇压完成"
 ALG_became_federal: "阿尔及利亚联邦化"
 ALG_secular_path_complete: "世俗化道路完成"
 human_rights_violation: "侵犯人权"
 human_rights_progress: "人权进步"
 accused_of_interference: "被指控干涉"
 accused_of_terrorism_support: "被指控支持恐怖主义"
 anti_israel_stance: "反以色列立场"
 ALG_bribe_malian_generals: "收买马里将军"
 ALG_bribe_malian_generals_desc: "通过谨慎的资金分配，可以影响马里军政府。通过贿赂关键将领，阿尔及利亚能够获得对巴马科决策的影响力，并确保我国在萨赫勒地区的利益。"
 ALG_isolate_mali_regime: "孤立马里政权"
 ALG_isolate_mali_regime_desc: "巴马科的军事政权已使该地区陷入动荡，并威胁到图阿雷格族群的生存。阿尔及利亚将在国际上努力孤立该军政府，确立自身作为萨赫勒危机合法调解者的地位。"
 ALG_isolate_mali_tt: "§H孤立马里政权§!\n通过外交施压与非洲联盟渠道谴责军政府。\n\n§Y收益：§!\n- 阿尔及利亚获得区域领导地位\n- 图阿雷格支持度提升  \n- 马里实力削弱  \n- 获得非盟影响力  \n  \n§W结果：§!\n阿尔及利亚成为萨赫勒地区事务的关键调停者"
 ALG_au_condemns_mali_tt: "§Y非洲联盟谴责马里政权§!\n所有非洲联盟成员国降低对马里的态度"
 ALG_malian_general_network: "马里军方渗透网"
 ALG_malian_general_network_desc: "一个由被收买的马里将军组成的网络为阿尔及利亚提供了情报，并使其对巴马科的军政府施加影响力。"
 ALG_sahel_mediator: "萨赫勒调解员"
 ALG_sahel_mediator_desc: "阿尔及利亚已成为萨赫勒地区冲突的主要外交调解者。我们的声音在地区事务中举足轻重。"
 MAL_international_isolation: "国际孤立"
 MAL_international_isolation_desc: "军政府面临国际社会的谴责与孤立。贸易中断，外援中止，政府正艰难维持着对国家的控制。"
