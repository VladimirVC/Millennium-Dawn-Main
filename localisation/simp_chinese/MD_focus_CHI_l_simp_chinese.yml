 BRI_apply_named_PORT: "应用：§Y[This.GetBRINextProjectPORT]§!"
 BRI_apply_named_PORT_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectPORT]§!项目提供资金。中国资本和承包商将建造该设施，以换取对该港口的长期控制权。申请者需为沿海国家，拥有25点政治点数，且处于和平状态。"
 BRI_apply_named_RAIL: "应用：§Y[This.GetBRINextProjectRAIL]§!"
 BRI_apply_named_RAIL_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectRAIL]§!项目提供资金。这条新铁路将通过中国贷款把你的经济与跨欧亚走廊连接起来。这需要与中国接壤或建立积极的合作伙伴关系，拥有25点政治点数，且处于和平状态。"
 BRI_apply_named_PIPELINE: "应用：§Y[This.GetBRINextProjectPIPELINE]§!"
 BRI_apply_named_PIPELINE_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectPIPELINE]§!项目提供资金。这条输油管道将你的碳氢化合物运往中国市场和炼油厂。需要拥有石油或铝储备的国家、25点政治点数，且处于和平状态。"
 BRI_apply_named_TELECOM: "应用：§Y[This.GetBRINextProjectTELECOM]§!"
 BRI_apply_named_TELECOM_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectTELECOM]§!项目提供资金。华为和中兴将是你数字基础设施的骨干。需要拥有25点政治点数，且处于和平状态；亲西方国家会受到密切关注。"
 BRI_apply_named_SEZ: "应用：§Y[This.GetBRINextProjectSEZ]§!"
 BRI_apply_named_SEZ_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectSEZ]§!项目提供资金。由中国企业管理的工业园区将出口制造业牢牢地扎根于你的领土。这需要四家以上的民用工厂、35点政治点数，且处于和平状态。"
 BRI_apply_named_MINE: "应用：§Y[This.GetBRINextProjectMINE]§!"
 BRI_apply_named_MINE_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectMINE]§!项目提供资金。中国矿业公司确保承购贵国的战略矿产。需要贵国拥有铬、钨、铝或钢矿产，25点政治点数，且处于和平状态。"
 BRI_apply_named_ENERGY: "应用：§Y[This.GetBRINextProjectENERGY]§!"
 BRI_apply_named_ENERGY_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectENERGY]§!项目提供资金。中国电力工程以优惠贷款的方式弥补您的代际差距。需要25点政治点数，且处于和平状态。"
 BRI_apply_named_PRESTIGE: "应用：§Y[This.GetBRINextProjectPRESTIGE]§!"
 BRI_apply_named_PRESTIGE_desc: "请愿北京根据“一带一路”倡议为§Y[This.GetBRINextProjectPRESTIGE]§!项目提供资金。标志性地标建筑能够巩固双方在公众眼中的合作关系。这需要40%以上的稳定度、拥有40点政治点数，且处于和平状态。"
