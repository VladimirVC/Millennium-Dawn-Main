 KOR.Western_Autocracy: "£kor_western_autocracy (DRP) 民主共和党"
 KOR.Western_Autocracy_desc: "右派独裁 - 民主共和党（韓国語ローマ字表記：Minjugonghwadang）\n\n民主共和党は朴正煕独裁政権の政治的基盤であり、この時代の韓国史は残忍な権威主義と目覚ましい経済成長を併せ持っていた。同党の統治の遺産は今なお分断を引き起こしている。"
 KOR.conservatism_2012: "£kor_western_conservative (SP) セヌリ党"
 KOR.conservatism_2012_desc: "愛国的保守主義 - セヌリ党（韓国語ローマ字表記：Saenuridang）\n\nセヌリ党は韓国を代表する保守政党である。同党は朴正煕の権威主義的な民主共和党にその系譜を遡るが、民主化移行後に自らを再構築した。それにもかかわらず、同党は独裁政権下で持っていた価値観の多くを保持しており、例えば財閥が国内経済で果たす主導的役割への支持、左派政治への疑念、そしてアメリカへの強い支持と密接に結びついた北朝鮮への敵対姿勢などが挙げられる。"
 KOR.anarchist_communism_2011: "£kor_emerging_left_wing_radical_alt (UPP) 統合進歩党"
 KOR.anarchist_communism_2011_icon: "£kor_emerging_left_wing_radical_alt"
 KOR.anarchist_communism_2011_desc: "進歩主義 - 統一進歩党（韓国語ローマ字表記：Tonghapjinbodang）\n\n統一進歩党は、韓国労働組合総連盟の政治部門として設立された民主労働党を母体とする、進歩主義的かつ民族主義的な政党である。同党は労働権の強化、反帝国主義、朝鮮半島統一を支持している。"
 KOR.anarchist_communism_2016: "£kor_emerging_left_wing_radical (PUP) 民衆連合党"
 KOR.anarchist_communism_2016_icon: "£kor_emerging_left_wing_radical"
 KOR.anarchist_communism_2016_desc: "左派ポピュリズム - 民衆連合党（韓国語ローマ字表記：Minjung Yeonhapdang）\n\n民衆連合党は、労働権の強化、反帝国主義、朝鮮半島統一を支持する進歩主義的かつ民族主義的な政党である。"
 KOR.Neutral_conservatism_2016: "£kor_non_aligned_conservative_alt (BP) 正しい政党"
 KOR.Neutral_conservatism_2016_icon: "£kor_non_aligned_conservative_alt"
 KOR.Neutral_conservatism_2016_desc: ""
 KOR.Neutral_Communism: "£kor_non_aligned_communist (NPP) 進歩新党"
 KOR.Neutral_Communism_desc: "進歩主義 - 進歩新党（韓国語ローマ字表記：Jinbosindang）\n\n進歩新党は、民主労働党の平等派を起源とする社会主義政党である。この派閥は、主流派である自主派の親統一・反帝国主義的立場に反対した結果、反北朝鮮の左翼政党として独立し設立された。"
 KOR.Neutral_Communism_2013: "£kor_non_aligned_communist_alt (LP) 労働党"
 KOR.Neutral_Communism_2013_desc: "民主社会主義 - 労働党（韓国語ローマ字表記：Nodongdang）\n\n労働党は、民主労働党の平等派を起源とする社会主義政党である。この派閥は、主流派である自主派の親統一・反帝国主義的立場に反対した結果、反北朝鮮の左翼政党として独立し設立された。 "
 POL.conservatism_1: "£POL_conservatism_1_small (PiS) 法と正義"
 POL.conservatism_1_icon: "£POL_conservatism_1_small"
 POL.conservatism_1_desc: "保守派 - 法と正義（ポーランド語：Prawo i Sprawiedliwość）は、ポーランドを代表する国民保守主義・キリスト教民主主義政党であり、経済介入主義と社会福祉を社会的保守主義的見解と結びつけている。欧州連合との慎重な協力を提唱し、強硬な反ロシア姿勢を貫いている。"
 POL.liberalism_1: "£POL_liberalism_1_small (PO) 市民プラットフォーム"
 POL.liberalism_1_desc: "自由主義 - 市民プラットフォーム（ポーランド語：Platforma Obywatelska）は、ポーランドの中道政党であり、幅広い支持基盤を持つ。オルド自由主義経済を提唱し、親欧州的な中道から中道右派の社会的立場を主張する。"
