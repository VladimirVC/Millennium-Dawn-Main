 JAP_diplomacy.11.t: "美国请求重新解释宪法第九条"
 JAP_diplomacy.11.d: "美国政府已正式请求我们进一步重新解释宪法第九条。华盛顿方面辩称，区域安全环境已恶化到日本必须承担更多集体防御责任的程度。接受他们的请求将为更广泛的自我防卫理解和更紧密的军事合作敞开大门，但这在国内必将引发争议。"
 JAP_diplomacy.11.a: "接受美国的请求"
 JAP_diplomacy.11.b: "我们无法接受这一请求"
 JAP_diplomacy.12.t: "日本拒绝重新解释宪法第九条"
 JAP_diplomacy.12.d: "东京方面已告知我们，目前不准备对宪法第九条作进一步重新解释。出于对国内舆论、宪法限制以及政治稳定性的考量，日本政府拒绝了我们的请求。现在我们必须决定，是尊重他们的决定，还是施加更多外交与安全压力。"
 JAP_diplomacy.12.a: "我们将尊重他们的决定。"
 JAP_diplomacy.12.b: "加大对日本的施压力度"
 JAP_diplomacy.13.t: "日本同意重新解释宪法第九条"
 JAP_diplomacy.13.d: "东京方面已表示支持修改宪法第九条的解释，并将努力成为更积极的防卫伙伴。"
 JAP_diplomacy.13.a: "终于"
 JAP_diplomacy.14.t: "美国对日本宪法第九条施压"
 JAP_diplomacy.14.d: "在我们拒绝扩大对宪法第九条的解释后，美国已悄然开始对我国政府施加外交与安全压力。无论是同盟磋商、媒体吹风还是幕后传话，所有迹象都指向同一方向：华盛顿期待日本承担更多责任。我们可以选择坚守立场，也可以悄然调整姿态。"
 JAP_diplomacy.14.a: "我们将坚守立场"
 JAP_diplomacy.14.b: "悄悄进行让步"
 JAP_diplomacy.15.t: "日本迫于压力接受"
 JAP_diplomacy.15.d: "经过一段时期的外交与战略施压，东京方面已表示愿意在宪法第九条议题上向我方立场靠拢。尽管公开场合仍坚称日本和平主义原则不变，但政府现已拓宽对\"自卫权\"的解释范畴，其调整方向完全符合我方预期。"
 JAP_diplomacy.15.a: "好极了！"
 JAP_diplomacy.17.t: "美国对日本商品加征关税"
 JAP_diplomacy.17.d: "美国宣布对日本关键出口商品实施新一轮关税，声称此举旨在应对经济失衡和国内政治压力。美方称这些措施是为了\"创造公平竞争环境\"，但在东京看来，这被普遍视为具有政治动机的行动，将损害我国经济并影响更广泛的同盟关系。"
 JAP_diplomacy.17.a: "我们必须适应这个新现实。"
 JAP_diplomacy.18.t: "日本请求关税减免"
 JAP_diplomacy.18.d: "东京已正式请求我们取消对日本商品征收的关税。日方代表暗示，其政府可能愿意以深化安全合作、推进防务政策调整为交换条件。我们必须决定，是将这场经济争端转化为战略机遇，还是继续保持施压。"
 JAP_diplomacy.18.a: "以取消关税换取安全让步"
 JAP_diplomacy.18.b: "拒绝并维持关税政策"
 JAP_diplomacy.19.t: "关税取消，安全让步"
 JAP_diplomacy.19.d: "美国已同意取消对日本出口商品的关税，但这仅作为安全与防务领域更广泛共识的一部分。实际上，这意味着日本需进一步扩大对宪法第九条的解释范围，深化与华盛顿的军事合作，并在地区安全事务中承担更大责任。"
 JAP_diplomacy.19.a: "为了我们的经济和我们的联盟，我们将承担这一重任。"
 JAP_diplomacy.20.t: "美国拒绝取消关税"
 JAP_diplomacy.20.d: "我们关于解除美国关税的正式请求已被驳回。华盛顿方面坚持维持现行措施，理由是面临国内政治压力以及双方在安全政策上存在未解决的分歧。国内出口商和企业领袖的不满情绪日益加剧，同时战略专家警告称，这一争端可能使我们的同盟关系进一步复杂化。"
 JAP_diplomacy.20.a: "眼下我们只能暂时承受这份压力了。"
 JAP_diplomacy.21.t: "日本请求更新安全保障条约"
 JAP_diplomacy.21.d: "日本政府已正式向美国提出请求，要求更新或加强安全保障承诺。东京方面辩称，地区安全环境已经恶化，美国更明确的承诺将有助于稳定局势。日本官员私下承认，如果华盛顿方面准备作出明确承诺，对宪法第九条的解释可能还会有进一步修改的空间。"
 JAP_diplomacy.21.a: "恢复我们的安全保障，以换取更深入的承诺。"
 JAP_diplomacy.21.b: "拒绝延长保障"
 JAP_diplomacy.22.t: "安全保障已恢复"
 JAP_diplomacy.22.d: "美国已同意更新并明确其对日本的安全保障。作为回报，华盛顿期望东京在扩大对宪法第九条的解释及承担更多地区安全责任方面采取进一步措施。美日同盟关系因此得到加强，但国内关于和平主义原则的争论也将随之激化。"
 JAP_diplomacy.22.a: "为了我们的安全，我们将接受这项承诺。"
 JAP_diplomacy.23.t: "美国拒绝提供更强有力的保证"
 JAP_diplomacy.23.d: "我们关于更新或加强安全保障的请求已被拒绝。美国坚称现有安排已足够充分，且国内政治因素限制了其作出进一步承诺。在日本国内，这一拒绝将加剧对我国长期安全及同盟可靠性的担忧。"
 JAP_diplomacy.23.a: "那么我们必须重新审视自己的道路。"
 JAP_diplomacy.24.t: "日本请求结束美国海军施压"
 JAP_diplomacy.24.d: "东京已正式要求我们缩减或结束在关键航道和咽喉要道附近加强的海军存在及施压。日方官员辩称，当前态势可能引发局势升级，并削弱国内对同盟的支持。私下里，他们暗示如果我们缓和姿态，可能进一步调整对宪法第九条的解释。"
 JAP_diplomacy.24.a: "以安全让步换取结束海军施压"
 JAP_diplomacy.24.b: "维持对日本周边的海上压力"
 JAP_diplomacy.25.t: "海军压力缓解，安全承诺加深"
 JAP_diplomacy.25.d: "美国已同意降低其在我国海上航线周边增强的海军存在，以换取日本更深层次的安全承诺。实际上，这意味着在扩大对宪法第九条的解释、拓展我国在区域安全中角色的道路上又迈进了一步。同盟关系看似更加牢固，但国内关于和平主义立场的争论必将愈演愈烈。"
 JAP_diplomacy.25.a: "为了维持稳定，我们将遵守这项协议。"
 JAP_diplomacy.26.t: "美国拒绝停止海军施压"
 JAP_diplomacy.26.d: "我们要求减轻或结束美国在我们海上航线周边加强海军存在的请求已被拒绝。华盛顿方面坚称，鉴于地区威胁，当前姿态是必要的。在国内，这一拒绝将加剧对卷入更广泛冲突的担忧，并引发进一步强化日本自身防御的呼声。"
 JAP_diplomacy.26.a: "那么我们必须应对压力做出调整"
 JAP_diplomacy.28.t: "“辉夜”探月计划设计难题"
 JAP_diplomacy.28.d: "雄心勃勃的\"辉夜\"探月计划正面临严峻的设计挑战。从导航系统、能源管理到热防护等关键系统的复杂度远超预期。工程师们主张追加资金与时间以重新设计核心部件并提升整体可靠性，但由此产生的成本已在内阁中引发疑虑。"
 JAP_diplomacy.28.a: "投资重新设计以赶上时间安排"
 JAP_diplomacy.28.b: "控制成本并接受更长的工期"
 JAP_diplomacy.29.t: "“辉夜”通讯系统漏洞"
 JAP_diplomacy.29.d: "随着测试的持续进行，\"辉夜\"计划暴露出深空通信与数据链路的薄弱环节。信号完整性、带宽及抗干扰能力均未达到预期目标。专家建议采用新型天线、升级地面站并部署更稳健的加密系统，但这些改进措施需要追加政治与资金投入。"
 JAP_diplomacy.29.a: "升级通信架构"
 JAP_diplomacy.29.b: "沿用现有体系，祈祷不会出问题"
 JAP_diplomacy.30.t: "“辉夜”探月任务再度延期"
 JAP_diplomacy.30.d: "技术障碍、系统整合问题以及与发射基础设施的时间安排冲突，迫使\"辉夜\"探月任务再次推迟。尽管核心系统前景依然看好，但该项目正日益被视为进展缓慢且问题重重。科学家们坚称耐心终将获得回报，然而公众的注意力已开始转向其他领域。"
 JAP_diplomacy.30.a: "接受延期，继续向月球进发"
 JAP_diplomacy.31.t: "“辉夜”成功登陆月球表面"
 JAP_diplomacy.31.d: "经过多年的设计修改、通信升级以及艰难的延期，\"辉夜\"探月任务终于取得成功。日本制造的设备如今已在月球表面及周边运行，传回高分辨率图像与宝贵的科学数据。这项成就彰显了日本的高科技实力，为卫星研发、深空探索及战略太空应用开辟了新道路。"
 JAP_diplomacy.31.a: "庆祝“辉夜”这一日本科技的伟大胜利"
 jap_kaguya_satellite_invest_tt: "§G由于我们投资改进了飞船设计，因此获得了：§!"
 jap_kaguya_rocketry_invest_tt: "§G由于我们投资改善了与飞船的通信，我们获得了：§!"
 JAP_diplomacy.32.t: "导航软件异常"
 JAP_diplomacy.32.d: "火星任务工程师报告称，导航软件存在反复出现的异常。虽然问题尚不严重，但若不及时处理，可能会累积成严重的导航错误。彻底修复该问题将抽调其他项目的资源，并可能影响整体进度。"
 JAP_diplomacy.32.a: "倾斜资源并妥善解决此事"
 JAP_diplomacy.32.b: "接受延误并逐步修补"
 JAP_diplomacy.33.t: "命名火星殖民地"
 JAP_diplomacy.33.d: "日本已在火星上建立了永久据点。随着栖息地投入使用，首批长期驻留人员陆续定居，一项具有象征意义的决定即将出炉：该殖民地的正式名称和性质。"
 JAP_diplomacy.33.a: "‘天照’，象征团结的光辉"
 JAP_diplomacy.33.b: "‘迦具土’，耀眼的工业铸就"
 JAP_diplomacy.33.c: "‘月读’，黑暗中一座平静的天文台"
 JAP_diplomacy.33.e: "“须佐”，如风暴一般的武神"
 JAP_diplomacy.68.t: "日本索取桦太"
 JAP_diplomacy.68.d: "日本已正式要求归还桦太岛。接受这一要求可以缓解紧张局势，但会被视为一种屈辱的让步。"
 JAP_diplomacy.68.a: "接受要求"
 JAP_diplomacy.68.b: "断然拒绝"
 JAP_diplomacy.69.t: "桦太回归"
 JAP_diplomacy.69.d: "莫斯科已经接受了我们的要求。桦太现在处于日本的管辖之下。日本政府将以此作为帝国秩序回归的证据。"
 JAP_diplomacy.69.a: "历史的修正"
 JAP_diplomacy.70.t: "俄罗斯拒绝"
 JAP_diplomacy.70.d: "莫斯科拒绝了我们对桦太的要求。我们可以暂时忍受这种侮辱，以有限的边境冲突试探俄罗斯，或者全面开战。"
 JAP_diplomacy.70.a: "暂时让步"
 JAP_diplomacy.70.b: "发起边境战争"
 JAP_diplomacy.70.c: "宣布全面战争"
 JAP_diplomacy.71.t: "日本索取北千岛群岛"
 JAP_diplomacy.71.d: "日本已正式要求归还北千岛群岛。接受这一要求可以缓解紧张局势，但会被视为一种屈辱的让步。"
 JAP_diplomacy.71.a: "接受要求"
 JAP_diplomacy.71.b: "断然拒绝"
 JAP_diplomacy.72.t: "北千岛群岛回归"
 JAP_diplomacy.72.d: "莫斯科已接受我们的要求。北千岛群岛现已处于日本管辖之下。政府将以此作为帝国秩序回归的证据。"
 JAP_diplomacy.72.a: "历史的修正"
 JAP_diplomacy.73.t: "俄罗斯拒绝"
 JAP_diplomacy.73.d: "莫斯科拒绝了我们对北千岛群岛的要求。我们可以暂时忍受这种侮辱，以有限的边境冲突试探俄罗斯，或者全面开战。"
 JAP_diplomacy.73.a: "暂时让步"
 JAP_diplomacy.73.b: "发起边境战争"
 JAP_diplomacy.73.c: "宣布全面战争"
 JAP_diplomacy.74.t: "日本索取南千岛群岛"
 JAP_diplomacy.74.d: "日本已正式要求归还南千岛群岛。接受这一要求可以缓解紧张局势，但会被视为一种屈辱性的让步。"
 JAP_diplomacy.74.a: "接受要求"
 JAP_diplomacy.74.b: "断然拒绝"
 JAP_diplomacy.75.t: "南千岛群岛回归"
 JAP_diplomacy.75.d: "莫斯科已接受我们的要求。南千岛群岛现已处于日本管辖之下。政府将以此作为帝国秩序回归的证据。"
 JAP_diplomacy.75.a: "历史的修正"
 JAP_diplomacy.76.t: "俄罗斯拒绝"
 JAP_diplomacy.76.d: "莫斯科拒绝了我们对南千岛群岛的要求。我们可以暂时忍受这种侮辱，以有限的边境冲突试探俄罗斯，或者全面开战。"
 JAP_diplomacy.76.a: "暂时让步"
 JAP_diplomacy.76.b: "发起边境战争"
 JAP_diplomacy.76.c: "宣布全面战争"
 JAP_diplomacy.77.t: "东京提出和解方案"
 JAP_diplomacy.77.d: "随着千岛群岛和桦太落入日本之手，东京迅速采取行动，将战场上的胜利转化为正式的和平协议。日本外交官已向莫斯科提出结束冲突的方案，认为战争已经决定了局势，继续战斗只会延长不可避免的结局。\n他们的提议很简单：以俄罗斯正式承认日本对千岛群岛和桦太的控制权为条件，换取和平。东京方面认为，这是一项务实的安排，旨在稳定地区局势，防止战争进一步升级。现在，决定权在我们手中。接受新的现实，结束战争；还是拒绝这一提议，继续斗争？"
 JAP_diplomacy.77.a: "接受和解方案。"
 JAP_diplomacy.77.b: "拒绝它。战争将继续。"
 JAP_diplomacy.78.t: "和解方案已被接受"
 JAP_diplomacy.78.d: "提议被接受，枪声渐渐平息。脱离接触的命令下达，外交渠道重新开放，战争最终简化为一系列条款和坐标。\n\n北方岛屿作为和平的代价被割让，各方现在都必须向本国民众解释这一结果。战役结束了，但记忆却不会就此消逝。"
 JAP_diplomacy.78.a: "就这样吧。让墨水代替鲜血。"
 JAP_diplomacy.79.t: "和解方案被拒绝"
 JAP_diplomacy.79.d: "对方的回答斩钉截铁：不。不会有任何签署，不会有任何承认，也不会有任何喘息的机会。\n\n东京误判了我们的决心，冲突将持续下去，直到一方再也无法承受为止。如果和平要到来，那也只能是强加的。"
 JAP_diplomacy.79.a: "然后我们继续战斗。"
 JAP_diplomacy.80.t: "莫斯科寻求出路"
 JAP_diplomacy.80.d: "在日本于北方取得进展后，俄罗斯外交官释放出愿意在局势进一步恶化前结束战争的信号。其传递的信息务实：止损、冻结战线，并防止战争消耗超出任何一方承受能力的资源。\n\n这项提议是直接的和平方案，以立即停止敌对行动换取持续升级的冲突。我们必须决定是接受这项不完美的解决方案，还是进一步巩固我们的优势。"
 JAP_diplomacy.80.a: "接受和平"
 JAP_diplomacy.80.b: "不，我们继续打"
 JAP_diplomacy.81.t: "东京接受和平"
 JAP_diplomacy.81.d: "日本接受了这些条款，选择结束战争而不是扩大战局。这一决定在部分地区不受欢迎，国内也为此付出了沉重的代价，民众信心下降，开始质疑当初为何要发动战争。\n\n双方宣布停战，领土割让得到执行。战场归于平静，但政治创伤却将持续存在。"
 JAP_diplomacy.81.a: "我们会忍气吞声，默默承受。"
 JAP_diplomacy.82.t: "东京拒绝"
 JAP_diplomacy.82.d: "日本拒绝了这一提议，并表明不会接受一份出于软弱而达成的协议。战斗还将继续，而且随着时间的推移，局势愈发紧张。\n\n如果和平终将到来，那不是别人给予的，而是别人争取来的。"
 JAP_diplomacy.82.a: "就这样吧"
 JAP_unlock_sikhalin_raid_tt: "解锁针对§Y[Getname.691]§!的§Y特种部队突袭§!"
 JAP_diplomacy.83.t: "在南千岛群岛的胜利"
 JAP_diplomacy.83.d: "日军在南千岛群岛取得胜利，击退俄军并控制了争议地区。虽然从地图上看，此次战役的战果并不大，但其传递的信息却十分强烈：日本能够夺取其声称拥有的领土，并能通过施压将其牢牢控制。\n\n旗帜升起，守军构筑工事，东京准备采取下一步行动。莫斯科不会忘记这一幕。"
 JAP_diplomacy.83.a: "控制群岛"
 JAP_diplomacy.84.t: "在南千岛群岛的失败"
 JAP_diplomacy.84.d: "南千岛群岛的边境冲突对我们不利。俄军抵抗顽强，我军被迫在炮火下撤退，主权问题悬而未决，我军领导层也受到质疑。\n\n我们在此过程中吸取了惨痛的教训。下一次行动将计划得更周密，物资储备更充足，也更难阻止。"
 JAP_diplomacy.84.a: "从挫折中吸取教训。"
 JAP_diplomacy.85.t: "南千岛群岛遭遇挫折"
 JAP_diplomacy.85.d: "面对日军的猛烈攻势，俄军未能守住南千岛群岛。战术上的直接损失惨重，而政治信号则更为强烈：防线岌岌可危，对手不惜一切代价也要改变战局。\n\n莫斯科将不得不决定是升级事态，还是接受这一令人屈辱的新事实。"
 JAP_diplomacy.85.a: "苦涩的教训。"
 JAP_diplomacy.86.t: "南千岛群岛安全"
 JAP_diplomacy.86.d: "俄军赢得了边境冲突，控制了南千岛群岛，击退了日军部队，重新控制了沿线地区。此次行动展现了俄军的战备状态和迅速惩罚入侵的能力。\n\n东京或许会称之为暂时的挫折，但传递的信息很明确：这些岛屿绝不会轻易被夺取。"
 JAP_diplomacy.86.a: "坚守战线"
 JAP_diplomacy.87.t: "在北千岛群岛的胜利"
 JAP_diplomacy.87.d: "日本在北千岛群岛取得突破，迫使俄军撤退，并将这些岛屿置于我方控制之下。此次行动证明，只要计划、时机和决心到位，即使是偏远地区也能被夺取。\n\n占领行动立即展开。物资源源不断地运抵，防御工事不断加强，北方边境的格局在行动中被改写。"
 JAP_diplomacy.87.a: "掘壕固守"
 JAP_diplomacy.88.t: "在北千岛群岛的失败"
 JAP_diplomacy.88.d: "北千岛群岛顽强抵抗住了我们的进攻。战斗异常惨烈，环境更加恶劣，俄军成功遏制了我们的推进，迫使我们撤退。\n\n我们带着用鲜血和疲惫换来的经验归来。下次，我们绝不会毫无准备地出发。"
 JAP_diplomacy.88.a: "我们会适应的。"
 JAP_diplomacy.89.t: "在北千岛群岛的失败"
 JAP_diplomacy.89.d: "日军在北千岛群岛的军事行动取得成功后，俄军已被逐出该地区阵地。此次失败不仅是领土上的损失，更是心理上的打击，表明距离和天气不再是可靠的防御手段。\n\n对方势必会做出回应，但报复行为本身也存在风险。局势正在迅速恶化。"
 JAP_diplomacy.89.a: "是可忍孰不可忍"
 JAP_diplomacy.90.t: "北千岛群岛安全"
 JAP_diplomacy.90.d: "俄军击退了日军的入侵，守住了北千岛群岛，在极其艰难的条件下击退了日军部队，重新控制了该地区。此次防御战使俄军的作战理论更加完善，也提升了整个指挥系统的信心。\n\n如果日本想要这些岛屿，它需要付出的代价远不止是一场边境冲突。"
 JAP_diplomacy.90.a: "保持战备状态。"
 JAP_diplomacy.91.t: "俄罗斯就桦太问题作出回应"
 JAP_diplomacy.91.d: "日本在桦太的行动立即引发了莫斯科的回应。俄罗斯领导层将此举视为对主权的直接挑战，并表示不会容忍日本的进一步行动而不承担后果。\n\n危机如今走向两条道路：要么升级为公开战争，要么通过经济措施和海上限制施加胁迫压力。无论哪种方式，局势都已超出冷静外交的范畴。"
 JAP_diplomacy.91.a: "这将演变成一场战争。"
 JAP_diplomacy.91.b: "用禁运和封锁扼杀他们。"
 JAP_diplomacy.92.t: "俄罗斯回应桦太占领事件"
 JAP_diplomacy.92.d: "桦太岛易主，莫斯科现在必须决定如何回应这场近在咫尺的耻辱。战争代价高昂，但若不予回应，则只会招致更大的损失，并削弱国家权威。\n\n俄罗斯可以选择升级冲突，试图以武力扭转局面，也可以接受暂时的和平协议，结束战斗，但要求归还桦太岛作为停火的条件。这一决定将决定冲突的下一阶段走向。"
 JAP_diplomacy.92.a: "我们将用武力夺回它"
 JAP_diplomacy.92.b: "强制达成和解。桦太岛必须归还。"
 JAP_diplomacy.94.t: "东京要求设立保护国"
 JAP_diplomacy.94.d: "日本发来一份正式照会，措辞生硬，毫无外交辞令可言。照会向首尔提出一个看似稳定的选择：接受日本对外交和安全事务的监督，使各国机构与东京的方方面面保持一致，从而避免一场破坏性的对抗。\n\n信息很明确。日本不再请求合作，而是发号施令。拒绝将被视为挑衅，而挑衅必将招致后果。"
 JAP_diplomacy.94.a: "我们别无选择。"
 JAP_diplomacy.94.b: "拒绝。韩国绝不屈服。"
 JAP_diplomacy.95.t: "韩国屈膝称臣"
 JAP_diplomacy.95.d: "首尔接受了这些条件，选择了生存而非主权。在压力下签署了协议，顾问们陆续抵达，国家的对外姿态被纳入了日本的战略规划。\n\n战争结束了，但另一种斗争开始了。朝鲜半岛依然存在于地图上，但它的未来走向已不再由自己掌控。"
 JAP_diplomacy.95.a: "建立保护国。"
 JAP_diplomacy.96.t: "韩国无视东京"
 JAP_diplomacy.96.d: "首尔拒绝了最后通牒，并宣称其主权不容谈判。这一拒绝使危机从胁迫演变为对抗，东京现在完全有理由声称该问题只能通过武力解决。\n\n如果日本想要的是臣服，那它得到的却是挑战。"
 JAP_diplomacy.96.a: "然后我们将强行实现我们的意志。"
 JAP_diplomacy.97.t: "东京向平壤发出最后通牒"
 JAP_diplomacy.97.d: "日本向平壤发出最后通牒，要么接受日本的遏制和监督，要么承受轰炸带来的毁灭性后果。条件十分明确：朝鲜必须放弃对外政策和战略自主权，接受东京的指挥；必须接受受监控的安全安排；必须服从旨在防止朝鲜再次构成威胁的框架。\n\n对朝鲜政权而言，这是耻辱；对日本而言，这是风险管理。问题在于平壤会选择生存还是反抗。"
 JAP_diplomacy.97.a: "接受。不惜一切代价保住国家。"
 JAP_diplomacy.97.b: "拒绝。我们不会屈服。"
 JAP_diplomacy.98.t: "平壤屈服"
 JAP_diplomacy.98.d: "出乎所有人意料的是，朝鲜接受了这些条件。该政权保留了其象征符号，但其行动自由受到限制，日本的监督重塑了边界、安全和外交关系。\n\n战事结束，半岛北部成为受控缓冲区。威胁解除，东京获得了一个难以轻易放手的筹码。"
 JAP_diplomacy.98.a: "建立保护国。"
 JAP_diplomacy.99.t: "平壤无视东京"
 JAP_diplomacy.99.d: "平壤拒绝接受最后通牒，选择对抗，押注恐惧和局势升级能够保护政权。这一拒绝将危机演变为一场意志的较量，东京现在有了理由声称只有武力才能征服朝鲜。\n\n半岛严阵以待，准备迎接战争。下一个消息将不是通知，而是战火。"
 JAP_diplomacy.99.a: "然后我们将自行消除威胁。"
 JAP_diplomacy.101.t: "东京要求台湾屈服"
 JAP_diplomacy.101.d: "日本已向台北提出直接要求：要么接受保护国框架，将外交政策和防务协调置于东京的监督之下，要么面临孤立和武力镇压。这一提议被包装成安全与稳定，承诺保护台北免受外部威胁，以换取政治上的服从。\n\n正式的措辞背后隐藏着一个简单的信息：这座岛屿太过重要，不能让它独立，日本决心决定它的未来。"
 JAP_diplomacy.101.a: "接受条款，避免灾难发生。"
 JAP_diplomacy.101.b: "拒绝它们。台湾不会屈服。"
 JAP_diplomacy.102.t: "台北接受"
 JAP_diplomacy.102.d: "台湾接受了最后通牒，选择生存和延续而非公开冲突。新的协议使其对外姿态与日本紧密相连，顾问陆续抵达，战略决策权悄然转移到东京。\n\n战争结束了，但主权范围却被限制在保护国允许的范围内。岛屿依然存在，但它的发展方向已不再完全由自己掌控。"
 JAP_diplomacy.102.a: "建立保护国。"
 JAP_diplomacy.103.t: "台北拒绝"
 JAP_diplomacy.103.d: "台湾拒绝了日本的要求，不愿以自治换取保护的承诺。这一决定将外交压力转化为武力危机，东京现在有了正当理由声称，只有通过征服才能确保台湾的安全。\n\n海峡变成了断层线。下一步不是谈判，而是动员。"
 JAP_diplomacy.103.a: "那么我们就任取所需。"
 JAP_diplomacy.105.t: "东京要求菲律宾设立保护国"
 JAP_diplomacy.105.d: "日本向马尼拉提出的要求不容置疑：要么接受保护国框架，使外交政策和国防规划与东京保持一致，并允许日本监督关键安全安排，要么承担拒绝的后果。\n\n这项提议表面上是为了稳定和保护，但其真正目的是控制海上航道和连接各大洋的门户。菲律宾现在必须在屈服和对抗之间做出选择。"
 JAP_diplomacy.105.a: "接受。只有如此国家才能免遭毁灭。"
 JAP_diplomacy.105.b: "拒绝。我们不会接受东京的统治。"
 JAP_diplomacy.106.t: "马尼拉归降"
 JAP_diplomacy.106.d: "菲律宾政府接受了日本的条件。协议签署，顾问抵达，该国对外姿态被纳入日本的海洋战略之中。\n\n战事虽止，代价却是主权。群岛犹存，但其战略决策将在东京的严密注视下作出。"
 JAP_diplomacy.106.a: "建立保护国。"
 JAP_diplomacy.107.t: "马尼拉违逆东京"
 JAP_diplomacy.107.d: "菲律宾拒绝了最后通牒，不愿以独立换取保护承诺。这一拒绝使日本的胁迫演变为武力试探，东京如今有充分理由宣称必须通过武力确保群岛安全。\n\n海上航道收紧，舰队开始摆出阵势，该地区已为战争做好准备。下一步将不再是外交手段。"
 JAP_diplomacy.107.a: "那我们就碾过群岛。"
 JAP_diplomacy.109.t: "对海峡之国的最后通牒"
 JAP_diplomacy.109.d: "一份语气平静却透着必然的日本照会送达吉隆坡。文件提出建立保护国协议，要求将外交政策与安全协调置于东京的指挥之下，理由是在这个海路与咽喉要道决定存亡的地区，这是维持稳定必须付出的代价。\n\n这并非请求。日本意图掌控海峡，马来亚必须服从。接受则承诺庇护，拒绝将招致海上力量的全面施压。"
 JAP_diplomacy.109.a: "接受。我们无法逆流而动。"
 JAP_diplomacy.109.b: "拒绝。我们的主权不容交易。"
 JAP_diplomacy.110.t: "吉隆坡向旭日俯首"
 JAP_diplomacy.110.d: "马来西亚接受了条款，以战略独立换取眼前的生存。协议签署，联络使团抵达，东京获得了连接两大洋的走廊钥匙。\n\n战争结束了，但代价显而易见。马来亚虽保持完整，其对外姿态却已笼罩在日本的身影之下。"
 JAP_diplomacy.110.a: "建立保护国。"
 JAP_diplomacy.111.t: "马来亚拒绝屈服"
 JAP_diplomacy.111.d: "马来西亚拒绝最后通牒，绝不容许东京主宰其未来。这一决定使日本施加的压力演变为对这片区域最具价值海上通道的争夺。\n\n东京不会容忍在马六甲海峡遭遇的违抗。若马来亚不愿通过条约屈服，日本将诉诸武力迫其就范。"
 JAP_diplomacy.111.a: "那么我们将占领海峡。"
 JAP_diplomacy.113.t: "群岛敕裁"
 JAP_diplomacy.113.d: "东京已向雅加达提出一项触及印尼独立核心的要求。该提案提出建立保护国框架，将外交政策与战略安全置于日本监管之下，并辩称这是确保连接两大洋的岛链稳定的唯一途径。\n\n措辞虽不失礼节，意图却昭然若揭。日本想要的不是主权伙伴，而是将印尼群岛作为受控走廊。接受意味着阴影下的苟安，拒绝则意味着阴影将化作风暴。"
 JAP_diplomacy.113.a: "接受。我们无法忍受海上封锁。"
 JAP_diplomacy.113.b: "拒绝。印度尼西亚不会受人指使。"
 JAP_diplomacy.114.t: "雅加达接受敕裁"
 JAP_diplomacy.114.d: "印度尼西亚接受了条款，屈从于新的海上现实。日本特派团抵达以监督安全协调、基地使用权及对外结盟事务，将这片群岛转变为东京战略势力范围内的受控走廊。\n\n战争虽已结束，但独立自主的范围被压缩至许可范围之内。这些岛屿名义上仍属印尼，但其发展轨迹如今已受日本力量的制约。"
 JAP_diplomacy.114.a: "建立保护国。"
 JAP_diplomacy.115.t: "印度尼西亚无视敕裁"
 JAP_diplomacy.115.d: "雅加达拒绝了日本的要求，不愿以主权换取稳定的承诺。这一拒绝将压力转化为对抗，东京如今视印度尼西亚的独立为必须清除的障碍，而非值得尊重的事实。\n\n群岛周边的海域局势日趋紧张。若印尼不愿通过条约屈服，日本将试图以武力迫其就范。"
 JAP_diplomacy.115.a: "那么我们将夺取走廊。"
 JAP_diplomacy.117.t: "东京方案"
 JAP_diplomacy.117.d: "东京已向河内递交了一份旨在将越南纳入日本海上秩序的要求。这份提议实质上是一种保护国安排：越南需调整外交政策、接受日本的安全监督，并允许战略准入，从而使其海岸线成为日本势力范围的延伸。\n\n尽管该提议被包装成抵御更强大掠食者的保护伞，但它同时也是一条锁链。越南必须决定是接受受制于人的生存方式，还是选择抵抗并引发一场将在其海岸线上打响的战争。"
 JAP_diplomacy.117.a: "接受。我们暂且屈服。"
 JAP_diplomacy.117.b: "拒绝。越南不会受制于人。"
 JAP_diplomacy.118.t: "河内接受东京条款"
 JAP_diplomacy.118.d: "越南接受了最后通牒。协议签署，联络官抵达，日本获得了对越南外交路线与海岸防务的决定性影响力。\n\n战争虽已结束，独立却遭限缩。越南犹存，然其战略态势如今只能在东京书写的框架内游移。"
 JAP_diplomacy.118.a: "建立保护国。"
 JAP_diplomacy.119.t: "河内拒绝东京方案"
 JAP_diplomacy.119.d: "越南拒绝了日本的要求，拒绝以主权换取安全承诺。这一拒绝将胁迫升级为对抗，东京如今视越南为其区域布局中必须清除的障碍。\n\n海岸线变成了前线。如果越南不愿通过条约屈服，日本将寻求以武力迫使其就范。"
 JAP_diplomacy.119.a: "那么我们就拿下海岸。"
 JAP_diplomacy.121.t: "湄公河最后通牒"
 JAP_diplomacy.121.d: "一支日本代表团抵达，带来的提议读起来不似外交辞令，更似最终判决。柬埔寨被提议置于东京监管之下获得保护，其外交政策协调与安全安排将被纳入日本的区域框架之中。\n\n日方描绘的前景是稳定、投资与免受强邻威胁的安全保障。而现实则是附庸地位。金边必须抉择：是接受受制于人的未来，还是冒着沦为拒绝者的战场之险。"
 JAP_diplomacy.121.a: "接受。生存第一位。"
 JAP_diplomacy.121.b: "拒绝。柬埔寨绝不屈服。"
 JAP_diplomacy.122.t: "金边接受"
 JAP_diplomacy.122.d: "柬埔寨接受了条件，为避免一场无法取胜的战争而让渡了战略自主权。新协议将国家与日本的发展方向绑定，东京的顾问迅速进驻以掌控关键部门与战略节点。\n\n战火尚未燃起便已熄灭。柬埔寨名义上保持主权，但其发展道路已被日本力量所制约。"
 JAP_diplomacy.122.a: "建立保护国。"
 JAP_diplomacy.123.t: "柬埔寨拒绝湄公河最后通牒"
 JAP_diplomacy.123.d: "金边拒绝了日本的要求，拒绝将本国的未来交由外国监管。这一拒绝将压力升级为对抗，东京现在视柬埔寨为必须加以约束的薄弱环节。\n\n外交努力已然失败。如果柬埔寨不接受这一框架，日本将寻求通过武力强行实施。"
 JAP_diplomacy.123.a: "那么我们就诉诸武力。"
 JAP_diplomacy.125.t: "索要湄公河腹地"
 JAP_diplomacy.125.d: "日本已向万象提出要求，旨在确保海岸线后方的战略纵深。该提议以保护国框架将老挝纳入东京的战略轨道，使其外交政策与安全协调皆受日本监管。\n\n日方将此项提议包装为发展与保护。其意图昭然若揭：所有通道、河流与边境都将被纳入日本大东亚共荣圈的治理体系。老挝必须抉择——是接受这份指令，还是冒险抵抗。"
 JAP_diplomacy.125.a: "接受。我们独木难支。"
 JAP_diplomacy.125.b: "拒绝。老挝不会受人摆布。"
 JAP_diplomacy.126.t: "万象接受"
 JAP_diplomacy.126.d: "老挝接受了日本的条件，选择生存与稳定，而非一场无力承担的战争。协议签署，协调办公室成立，老挝作为受控腹地被纳入东京的区域框架。\n\n战火虽熄，自治却缩。老挝犹存，然其战略抉择如今只能在日本设定的界限内挪移。"
 JAP_diplomacy.126.a: "建立保护国。"
 JAP_diplomacy.127.t: "老挝拒绝接受指令"
 JAP_diplomacy.127.d: "万象拒绝了日本的要求，拒绝将其未来交由外部监督。这一拒绝将胁迫转变为对抗，东京现在将老挝视为控制走廊的障碍，而非需要拉拢的伙伴。\n\n如果老挝不愿通过条约接受这一框架，日本将试图以武力强加。"
 JAP_diplomacy.127.a: "那么我们就让他们称臣。"
 JAP_diplomacy.129.t: "南方之锚最后通牒"
 JAP_diplomacy.129.d: "东京已向堪培拉发出最后通牒，其内容并非将澳大利亚视为遥远大陆，而是作为南太平洋的拱心石。条款十分苛刻：接受保护国框架，使外交政策与国防规划与日本保持一致，并允许日军驻扎及通行——这将使整个南太平洋落入东京的掌控之中。\n\n这份提案被包装成稳定与安全保障。实则意味着战略屈服。澳大利亚必须抉择：是接受在日本阴影下生存，还是准备在这片海洋上奋起抗争。"
 JAP_diplomacy.129.a: "接受。我们无法赢得太平洋战争。"
 JAP_diplomacy.129.b: "拒绝。澳大利亚绝不屈服。"
 JAP_diplomacy.130.t: "堪培拉接受条款"
 JAP_diplomacy.130.d: "澳大利亚接受了日本的最后通牒，选择即刻生存而非冒险参与一场无法承受的大陆战争。协议签署，战略通道开放，日本获得了其谋求主宰更广阔海域所需的南方支点。\n\n枪声虽已沉寂，太平洋的力量平衡却在一夜之间改变。澳大利亚仍在地图上存在，但其战略决策如今只能在东京设定的框架内挪移。"
 JAP_diplomacy.130.a: "建立保护国。"
 JAP_diplomacy.131.t: "澳大利亚拒绝最后通牒"
 JAP_diplomacy.131.d: "堪培拉拒绝了日本的要求，拒绝将大陆的独立主权拱手让给外国托管。这一拒绝将东京的压力转化为直接挑战，日本现在将澳大利亚描绘成其掌控太平洋秩序的最后障碍。\n\n一场海洋争夺战已不可避免。如果澳大利亚不愿通过条约接受这一框架，日本将试图以武力强加于人。"
 JAP_diplomacy.131.a: "那么我们就兴兵南征。"
 JAP_diplomacy.133.t: "塔斯曼线要求"
 JAP_diplomacy.133.d: "东京已向惠灵顿递交最后通牒，意图关闭南太平洋最后一道开放侧翼。这份以保护国框架为名的提案，将新西兰的外交政策与国防态势捆绑于日本主导之下，并宣称这是武力重组太平洋秩序所必须付出的稳定代价。\n\n文本字面提及保护与伙伴关系，实质架构却充满控制意味。新西兰此刻面临抉择：是接受日本阴影下的受限和平，还是为跨海独立而战。"
 JAP_diplomacy.133.a: "接受。我们将忍耐，并生存下去。"
 JAP_diplomacy.133.b: "拒绝。我们不会被吞并。"
 JAP_diplomacy.134.t: "惠灵顿接受塔斯曼线"
 JAP_diplomacy.134.d: "新西兰接受了日本的条件，以战略自主权换取战事终结。协议签署，准入安排确立，东京由此获得稳固的南方前哨，得以掌控更广阔的海洋。\n\n战争虽已结束，独立却遭限缩。新西兰犹存，然其对外姿态从此只能在东京划定的边界内游移。"
 JAP_diplomacy.134.a: "建立保护国。"
 JAP_diplomacy.135.t: "惠灵顿拒绝要求"
 JAP_diplomacy.135.d: "新西兰拒绝了日本的最后通牒，拒绝将自身未来交予外国托管。这一拒绝将压力转化为对抗，东京现在视惠灵顿的独立为其南部防线的威胁。\n\n太平洋地区正固化为战线前沿。若新西兰不愿通过条约接受既定框架，日本将试图以武力强行实施。"
 JAP_diplomacy.135.a: "那么我们就进军南疆。"
 JAP_diplomacy.137.t: "伊洛瓦底门户最后通牒"
 JAP_diplomacy.137.d: "东京已向内比都发出要求，旨在将缅甸打造为连接两洋的陆桥。其条款实为保护国框架：外交政策与日本保持一致，接受日本安全监督，并开放从孟加拉湾进入东南亚的战略通道所需权限。\n\n日方将此提议包装为稳定与发展之策，实质却是战略攫取。缅甸必须抉择：是接受受控的和平，还是直面将使国门沦为战场的战争。"
 JAP_diplomacy.137.a: "接受。我们无法承受这样的压力。"
 JAP_diplomacy.137.b: "拒绝。我们绝不会沦为一个走廊。"
 JAP_diplomacy.138.t: "缅甸接受门户条款"
 JAP_diplomacy.138.d: "缅甸接受了日本的最后通牒，以战略自主权换取战事终结与秩序承诺。协议签署，联络团抵达，日本由此掌控了缅甸对外结盟与安全态势的决定性主导权。\n\n战火虽熄，代价却是主权。缅甸犹存，但其门户如今已服务于东京擘画的区域布局。"
 JAP_diplomacy.138.a: "建立保护国。"
 JAP_diplomacy.139.t: "缅甸拒绝最后通牒"
 JAP_diplomacy.139.d: "内比都拒绝了日本的要求，拒绝将其未来交由外部监督。这一拒绝将压力转化为对抗，东京如今将缅甸定性为必须纳入轨道的走廊控制障碍。\n\n如果缅甸不接受条约框架，日本将寻求以武力强加。无论如何，这条通道都将被牢牢掌控。"
 JAP_diplomacy.139.a: "那么我们就拿下门户。"
 JAP_diplomacy.141.t: "北部高地最后通牒"
 JAP_diplomacy.141.d: "日本已将目光投向克钦邦，这片崎岖的北部高地控制着山口、资源以及通往更广阔地区的通道。东京方面的要求被包装成保护与承认，但其本质是保护国架构：对外与日本结盟，接受安全监督，并允许战略通道的开放以巩固边境防线。\n\n对克钦邦而言，这无异于在名义上的自治与实际上的覆灭之间做选择。接受协议能获得庇护，拒绝则意味着战火将蔓延至群山与村落。"
 JAP_diplomacy.141.a: "接受。我们需要一位庇护者才能生存下去。"
 JAP_diplomacy.141.b: "拒绝。我们不会用一个主子去换另一个主子。"
 JAP_diplomacy.143.t: "克钦接受日本保护"
 JAP_diplomacy.143.d: "克钦接受了条件，选择生存与稳定，而非独自支撑一场无法持续的战争。协议签署，联络处设立，日本牢牢掌控了北部高地及其战略走廊。\n\n冲突虽已结束，但克钦的自由被压缩至许可范围之内。群山依旧，其未来却已与东京紧密相连。"
 JAP_diplomacy.143.a: "建立保护国。"
 JAP_diplomacy.144.t: "克钦拒绝最后通牒"
 JAP_diplomacy.144.d: "克钦拒绝了日本的要求，拒绝屈从于外部指令。这一拒绝将胁迫转变为对抗，东京如今将这片高地定性为必须通过武力解决的安全问题。\n\n如果克钦不愿接受条约保护，日本将以武力强加控制。这片山区将无法保持中立。"
 JAP_diplomacy.144.a: "那么我们就拿下高地。"
 JAP_diplomacy.145.t: "掸邦走廊要求"
 JAP_diplomacy.145.d: "日本已向佤邦当局提出条件，目标直指那些位于走私路线、山口要道及内陆动脉的边境地带。这份提议表面上被包装为承认与保护，实则是一份保护国协议：对外需与东京保持一致，接受日本的安全监管，并允许日方进入以确保走廊畅通。\n\n对佤邦而言，这是一个残酷的选择。要么屈服于新庇护伞下维持地方权力，要么拒绝并面临一场不会顾及山峦险阻或民兵抵抗的战争。"
 JAP_diplomacy.145.a: "接受。宁为盾牌，也不愿被彻底毁灭。"
 JAP_diplomacy.145.b: "拒绝。我们绝不会被吞并。"
 JAP_diplomacy.146.t: "佤邦接受保护"
 JAP_diplomacy.146.d: "佤邦接受了日本的条件，以战略独立换取生存，并在强大庇护者下获得正式承认。联络小组抵达，路线得以保障，边境地区被纳入日本的区域框架。\n\n战事虽已结束，自治空间却日益收窄。佤邦虽保留地方治理权，但其对外方针如今须听命于东京。"
 JAP_diplomacy.146.a: "建立保护国。"
 JAP_diplomacy.147.t: "佤邦拒绝要求"
 JAP_diplomacy.147.d: "佤邦拒绝了日本的最后通牒，拒绝将领土置于外国监管之下。这一拒绝将压力转化为对抗，东京现在视边境地区为其走廊战略中失控的缺口。\n\n如果佤邦不愿通过条约接受这一框架，日本将用武力强加控制。山区将成为争夺的战场。"
 JAP_diplomacy.147.a: "那么我们将夺取走廊。"
 JAP_diplomacy.148.t: "掸邦走廊最后通牒"
 JAP_diplomacy.148.d: "日本已向南掸邦当局提出要求，目标直指连接内陆与更广阔区域的高地通道。该提议以保护国框架为核心：对外事务需与东京协调一致，接受日本的安全监督，并允许对方战略性地使用其道路、关隘及补给走廊。\n\n此项提议承诺提供保护与承认，实则意味着掌控。南掸邦必须抉择：是接受在日本羽翼下受控的未来，还是冒着战火席卷其山川河谷的风险。"
 JAP_diplomacy.148.a: "接受。我们不能承受被歼灭的代价。"
 JAP_diplomacy.148.b: "拒绝。我们绝不会沦为一个走廊国家。"
 JAP_diplomacy.149.t: "南掸邦屈服"
 JAP_diplomacy.149.d: "南掸邦接受了日本的条件。联络处得以建立，路线获得保障，该地区被纳入东京的走廊战略，成为一个受控门户而非独立行动者。\n\n战斗虽已结束，自治却受到限制。地方当局得以保留，但战略方向如今需听从日本指挥。"
 JAP_diplomacy.149.a: "建立保护国。"
 JAP_diplomacy.150.t: "南掸邦拒绝最后通牒"
 JAP_diplomacy.150.d: "南掸邦拒绝了日本的要求，拒绝将其未来置于外国监督之下。这一拒绝将压力转化为对抗，东京现在视该地区为其战略防线上的危险缺口。\n\n如果南掸邦不接受条约框架，日本将动用武力强行实施。这扇大门必须被牢牢掌控。"
 JAP_diplomacy.150.a: "那么我们就拿下门户。"
 JAP_diplomacy.151.t: "萨尔温江托管区"
 JAP_diplomacy.151.d: "日本已将目光投向克伦邦，那里的河谷与边境通道掌控着南方路线的开合。东京方面以保护与承认为名提出要求，实则构建保护国框架：对外事务须与日本协调，接受安全监督，并开放萨尔温江走廊的通行权。\n\n这项提议承诺为权力破碎的地区带来稳定，代价是绝对的服从。克伦邦必须做出抉择：是接受日本庇护下的武装和平，还是迎接一场焚毁渡口与村镇的战争。"
 JAP_diplomacy.151.a: "接受。我们将活到明天。"
 JAP_diplomacy.151.b: "拒绝。我们不会受人统治。"
 JAP_diplomacy.152.t: "克伦邦归顺"
 JAP_diplomacy.152.d: "克伦邦接受了日本的条件，以战略自主权换取生存空间与即时压力的解除。联络使团抵达，交通线路被控制，这片区域作为受控走廊而非独立行为体被纳入东京的势力范围。\n\n冲突虽已结束，自由的边界却在收缩。克伦当局仍保有地方治理权，但战略方向从此听命于日本。"
 JAP_diplomacy.152.a: "建立保护国。"
 JAP_diplomacy.153.t: "克伦邦拒绝接受委任统治"
 JAP_diplomacy.153.d: "克伦邦拒绝了日本的要求，拒绝将其未来交由外国监管。这一拒绝将胁迫转变为对抗，东京现在将萨尔温江渡口视为需要通过武力解决的战略问题。\n\n如果克伦邦不接受条约框架，日本将通过武力强行实施。这条走廊必须得到保障。"
 JAP_diplomacy.153.a: "那么我们就夺取渡口。"
 JAP_diplomacy.154.t: "帕劳锚地要求"
 JAP_diplomacy.154.d: "东京已向帕劳发出最后通牒，这个坐拥广阔海域的小国面临抉择。条款以保障安全与繁荣为名，实则构建保护国体系：外交政策需与日本保持一致，接受安全监管，并授予驻军权——这将使帕劳成为帝国前进的锚地。\n\n提案承诺为其遮蔽政治与军事的风暴，代价则是国家主权。帕劳必须在旭日旗下的臣服与对抗海洋强权的不自量力之战间作出选择。"
 JAP_diplomacy.154.a: "接受。与其进坟墓，不如被附庸。"
 JAP_diplomacy.154.b: "拒绝。我们绝不会放弃独立。"
 JAP_diplomacy.155.t: "帕劳接受日本保护"
 JAP_diplomacy.155.d: "帕劳接受了日本的条件。协议签署，准入权被授予，这些岛屿成为东京港口与机场网络中一个纪律严明的节点。\n\n危机在没有战斗的情况下结束，但变化是真实的。帕劳名义上依然存在，但其外部导向如今已遵循日本的罗盘指引。"
 JAP_diplomacy.155.a: "建立保护国。"
 JAP_diplomacy.156.t: "帕劳拒绝要求"
 JAP_diplomacy.156.d: "帕劳拒绝了日本的最后通牒，拒绝以主权换取保护承诺。这一拒绝将东京的压力转化为武力问题，日本现在视这些岛屿为其海洋防线上一个未设防的缺口。\n\n如果帕劳不接受条约框架，日本将通过武力实施控制。锚地将被确保安全。"
 JAP_diplomacy.156.a: "那我们就夺取锚地。"
 JAP_diplomacy.157.t: "密克罗尼西亚岛链最后通牒"
 JAP_diplomacy.157.d: "日本已向密克罗尼西亚提出要求，视这些岛屿并非分散的社区，而是横跨太平洋中部的跳板链。提议被包装为保护与投资，实则构建保护国体系：外交政策需与东京保持一致，接受安全监管，并开放准入权限，使群岛成为日本舰队与航空力量的战略支点。\n\n讯息很明确：这片海域将被纳入单一管辖体系。密克罗尼西亚必须在日本庇护下的受控和平，与一场注定无法承受的对抗之间作出抉择。"
 JAP_diplomacy.157.a: "接受。我们无法逆流而动。"
 JAP_diplomacy.157.b: "拒绝。我们不会成为任何人的哨站。"
 JAP_diplomacy.158.t: "密克罗尼西亚接受协议"
 JAP_diplomacy.158.d: "密克罗尼西亚接受了日本的条件。协议签署，准入权被授予，这些岛屿成为东京海上防线内一个由港口、机场和监控节点组成的受控走廊。\n\n危机在没有爆发战斗的情况下结束，但主权范围收窄。密克罗尼西亚依然存在，然而其对外方向如今遵循日本的战略罗盘指引。"
 JAP_diplomacy.158.a: "建立保护国。"
 JAP_diplomacy.159.t: "密克罗尼西亚拒绝最后通牒"
 JAP_diplomacy.159.d: "密克罗尼西亚拒绝了日本的要求，拒绝将其未来交予外国监督。这一拒绝将压力转化为对抗，东京现在视该岛链为其太平洋网络中的缺口，必须予以填补。\n\n如果密克罗尼西亚不接受条约框架，日本将动用武力强行控制。这条岛链必须被掌控。"
 JAP_diplomacy.159.a: "那么我们就一步步将之踏平。"
 JAP_diplomacy.160.t: "索要瑙鲁"
 JAP_diplomacy.160.d: "东京已向瑙鲁提出要求，将其视为地图上的一枚图钉——仍可在此锚定监视力量、进行燃料补给，并跨越开阔水域延伸触角。这份提议被包装成保护与保障支持，实则建立保护国框架：外交政策需与日本保持一致，接受安全监督，并开放准入权，使瑙鲁转变为帝国的前哨站。\n\n对瑙鲁而言，选择残酷而鲜明。屈服于强权之下苟存，或是拒绝并冒险成为验证日本论点的战场。"
 JAP_diplomacy.160.a: "接受。我们独木难支。"
 JAP_diplomacy.160.b: "拒绝。我们绝不会沦为别人的中转站。"
 JAP_diplomacy.161.t: "瑙鲁接受日本保护"
 JAP_diplomacy.161.d: "瑙鲁接受了日本的条件。协议签署，准入许可，这座岛屿成为东京太平洋网络中虽小却至关重要的节点。\n\n危机未起战火便告平息，但主权范围收窄。瑙鲁依然存在，然而其对外方针如今遵循日本的战略路线。"
 JAP_diplomacy.161.a: "建立保护国。"
 JAP_diplomacy.162.t: "瑙鲁拒绝要求"
 JAP_diplomacy.162.d: "瑙鲁拒绝了日本的最后通牒，不愿以独立为代价换取保护承诺。这一拒绝将压力升级为对抗，东京如今视该岛为其海洋防线上的未设防缺口。\n\n若瑙鲁不接受条约框架，日本将以武力实施控制。这个前哨基地必须被掌控。"
 JAP_diplomacy.162.a: "那么我们就扫平此岛。"
 JAP_diplomacy.163.t: "赤道线最后通牒"
 JAP_diplomacy.163.d: "日本已向基里巴斯提出要求，这个如航海图标记般散落在赤道上的岛国。东京方面将提案包装成保护与发展计划，实则构建保护国框架：外交政策须与日本保持一致，接受安全监管，并开放准入权限——这将使基里巴斯化为监控网络与海军力量投射的岛链前哨。\n\n讯息很明确：在新太平洋秩序中不存在真空地带。基里巴斯必须在臣服于日本庇护伞下，或是与意图掌控航道的强权正面对抗之间作出抉择。"
 JAP_diplomacy.163.a: "接受。我们无法抗拒海洋的新主人。"
 JAP_diplomacy.163.b: "拒绝。我们绝不会被任何帝国吞并。"
 JAP_diplomacy.164.t: "基里巴斯接受赤道线"
 JAP_diplomacy.164.d: "基里巴斯接受了日本的条件。协议签署，准入权获得，这些分散的环礁成为东京太平洋网络中安静却宝贵的一环。\n\n危机未起战端便告终结，但主权范围已然收窄。基里巴斯依然存在，然而其对外航向如今已随日本的罗盘而定。"
 JAP_diplomacy.164.a: "建立保护国。"
 JAP_diplomacy.165.t: "基里巴斯拒绝最后通牒"
 JAP_diplomacy.165.d: "基里巴斯拒绝了日本的最后通牒，拒绝将其未来交由外国监管。这一拒绝将压力转化为对抗，东京现在视这条赤道岛链为其海上防线的缺口。\n\n如果基里巴斯不接受条约框架，日本将动用武力强行控制。这条防线必须被巩固。"
 JAP_diplomacy.165.a: "那么我们就夺取岛链。"
 JAP_diplomacy.166.t: "索要环礁堡垒"
 JAP_diplomacy.166.d: "东京已向马绍尔群岛提出要求，将环礁视为可部署机场、后勤设施及海上控制体系的天然堡垒。这份提议以提供保护与保障支持为名，实则构建保护国框架：要求其外交政策与日本保持一致，接受安全监管，并开放准入权限，使马绍尔群岛成为日本中太平洋防线的战略支点。\n\n信号清晰无误。这些岛屿不会继续作为海图上中立的点缀存在。马绍尔群岛必须在日本庇护下的受控和平，与围绕珊瑚礁和跑道的战争之间做出抉择。"
 JAP_diplomacy.166.a: "接受。我们无法在围困中生存。"
 JAP_diplomacy.166.b: "拒绝。我们绝不会成为其他强权的堡垒。"
 JAP_diplomacy.167.t: "马绍尔群岛陷落"
 JAP_diplomacy.167.d: "马绍尔群岛接受了日本的条件。协议签署，准入许可，环礁成为东京海洋网络中纪律严明的堡垒。\n\n危机未起战火便告结束，但主权范围收窄。马绍尔群岛犹在，然其对外航向如今遵循着日本的环海布局。"
 JAP_diplomacy.167.a: "建立保护国。"
 JAP_diplomacy.168.t: "马绍尔群岛拒绝要求"
 JAP_diplomacy.168.d: "马绍尔群岛拒绝了日本的最后通牒，拒绝将自身未来交予外国监管。这一拒绝将压力转化为对抗，东京现在视这些环礁为其中太平洋防线的未设防缺口。\n\n若马绍尔群岛不愿通过条约接受既定框架，日本将诉诸武力实施控制。这些堡垒必须得到巩固。"
 JAP_diplomacy.168.a: "那么我们就进占环礁。"
 JAP_diplomacy.169.t: "礁线最后通牒"
 JAP_diplomacy.169.d: "日本已向图瓦卢提出要求，这片由珊瑚礁构成的狭长岛链在衡量远洋辐射与补给节点的太平洋版图中仍具战略价值。东京方面承诺提供保护与支持，但协议框架实为保护国模式：图瓦卢需调整外交政策与日本保持一致，接受安全监管，并开放准入权限，使其成为日本南部防线的中转支点。\n\n这份声明以赤裸裸的简洁传递出残酷现实：在争端迭起的太平洋上，不存在中立岛屿。图瓦卢必须在日本的庇护伞下屈服，或是卷入足以淹没小国的大国战争对抗之中。"
 JAP_diplomacy.169.a: "接受。我们无法抵挡钢铁风暴的侵袭。"
 JAP_diplomacy.169.b: "拒绝。我们绝不会降下自己的旗帜。"
 JAP_diplomacy.170.t: "图瓦卢接受日本保护"
 JAP_diplomacy.170.d: "图瓦卢接受了日本的条件。协议签署，准入许可生效，这些岛屿成为东京海上网络中一个安静的节点。\n\n危机未起战端便告结束，但主权范围收窄。图瓦卢依然存在，但其外部走向如今遵循着日本的周边布局。"
 JAP_diplomacy.170.a: "建立保护国。"
 JAP_diplomacy.171.t: "图瓦卢拒绝最后通牒"
 JAP_diplomacy.171.d: "图瓦卢拒绝了日本的最后通牒，不愿以独立换取所谓的保护承诺。这一拒绝将压力升级为对抗，东京现在视这片礁岛链为其南部防线的未设防缺口。\n\n既然图瓦卢不愿通过条约接受既定框架，日本将诉诸武力实施控制。这条中转要道必须被掌控。"
 JAP_diplomacy.171.a: "那么我们就扫平诸岛。"
 JAP_diplomacy.172.t: "所罗门屏障最后通牒"
 JAP_diplomacy.172.d: "东京已向所罗门群岛提出要求，将其视为能够封锁西南太平洋的天然屏障。这项提议以保护与发展为名，实则建立保护国框架：外交政策需与日本保持一致，接受安全监督，并允许日本建立军事基地——这将使所罗门群岛成为日本海上防线的加固屏障。\n\n信号很明确：这些岛屿要么服从日本秩序，要么被视作敌方据点。所罗门群岛必须在旭日旗下的臣服与遍布丛林机场和狭窄海域的战争之间做出选择。"
 JAP_diplomacy.172.a: "接受。我们无法在围困中生存。"
 JAP_diplomacy.172.b: "拒绝。我们绝不会成为其他强权的堡垒。"
 JAP_diplomacy.173.t: "所罗门屈服"
 JAP_diplomacy.173.d: "所罗门群岛接受了日本的条件。双方签署协议，日本获得了军事通行权，这条群岛链在东京的指挥下，成为由港口、机场和巡逻区组成的纪律严明的屏障。\n\n危机以和平方式结束，但主权范围缩小。所罗门群岛依然存在，但其对外政策如今却遵循了日本的周边防线。"
 JAP_diplomacy.173.a: "建立保护国。"
 JAP_diplomacy.174.t: "所罗门拒绝最后通牒"
 JAP_diplomacy.174.d: "所罗门群岛拒绝日本的要求，不愿将自身未来拱手让给外国势力。这一拒绝使压力升级为对抗，东京如今将这条海峡视为其西南太平洋防线上的一个危险缺口。\n\n如果所罗门群岛不接受条约框架，日本将以武力控制该地区，确保屏障安全。"
 JAP_diplomacy.174.a: "那么我们就夺取岛链。"
 JAP_diplomacy.175.t: "新几内亚堡垒最后通牒"
 JAP_diplomacy.175.d: "日本已向巴布亚新几内亚提出要求，将该岛视为能够控制东南亚与太平洋之间通道的大陆堡垒。日本声称将提供保护和有保障的支持，但实际上却是一个保护国框架：巴布亚新几内亚必须使其外交政策与东京保持一致，接受安全监督，并允许日本使用军事基地，从而将新几内亚打造成一个集空中力量、后勤保障和前沿防御于一体的堡垒。\n\n这一信息传递得非常明确：日本意图将南部战区以此为中心。巴布亚新几内亚必须在臣服于日本的庇护之下，还是卷入一场将沿海和高地变成前线的战争之间做出选择。"
 JAP_diplomacy.175.a: "接受。我们不能成为战场。"
 JAP_diplomacy.175.b: "拒绝。我们绝不会成为其他强权的堡垒。"
 JAP_diplomacy.176.t: "莫尔兹比港接受"
 JAP_diplomacy.176.d: "巴布亚新几内亚接受了日本的条件。双方签署协议，日本获得军事通行权，该岛成为东京南部防线内一个纪律严明的堡垒，围绕着机场、港口和物流中心而建。\n\n危机在没有战争的情况下结束，但主权范围却缩小了。巴布亚新几内亚依然存在，但其战略方向如今却遵循着日本的要塞计划。"
 JAP_diplomacy.176.a: "建立保护国。"
 JAP_diplomacy.177.t: "巴布亚新几内亚拒绝最后通牒"
 JAP_diplomacy.177.d: "巴布亚新几内亚拒绝了日本的要求，拒绝将其未来交由外国监管。这一拒绝将压力转化为对抗，东京现在视该岛为确保南方战区安全的关键障碍。\n\n如果巴布亚新几内亚不接受条约框架，日本将通过武力强行控制。这座堡垒终将被攻占。"
 JAP_diplomacy.177.a: "那么我们就夺取堡垒。"
 JAP_diplomacy.178.t: "南太平洋岛链要求"
 JAP_diplomacy.178.d: "东京已向瓦努阿图提出要求，将其视为封锁西南太平洋的又一环。这份提议以保护和发展援助为名，实则建立保护国框架：外交政策需与日本保持一致，接受安全监督，并开放准入权，使瓦努阿图成为巡逻、加油和区域控制的战略支点。\n\n信号清晰无疑。日本正逐岛构建其防御圈。瓦努阿图必须在旭日旗下受控的和平，与一场注定无法持续的对抗之间做出抉择。"
 JAP_diplomacy.178.a: "接受。我们无法在海上与一个帝国抗衡。"
 JAP_diplomacy.178.b: "拒绝。我们不会被吞并。"
 JAP_diplomacy.179.t: "瓦努阿图接受日本保护"
 JAP_diplomacy.179.d: "瓦努阿图接受了日本的条件。协议签署，准入许可获批，这些岛屿成为东京南部防线中一个安静却有用的节点。\n\n危机未起战端便告终结，但主权范围已然收窄。瓦努阿图依然存在，只是其对外方针如今需遵循日本的战略路线。"
 JAP_diplomacy.179.a: "建立保护国。"
 JAP_diplomacy.180.t: "瓦努阿图拒绝要求"
 JAP_diplomacy.180.d: "瓦努阿图拒绝了日本的最后通牒，不愿以独立为代价换取所谓的保护承诺。这一拒绝将压力转化为对抗，东京如今视这些岛屿为其西南太平洋防线的未设防缺口。\n\n若瓦努阿图不愿通过条约接受既定框架，日本将以武力强行掌控。这条战略纽带必须被牢牢锁住。"
 JAP_diplomacy.180.a: "那么我们就扫平诸岛。"
 JAP_diplomacy.181.t: "南太基石最后通牒"
 JAP_diplomacy.181.d: "日本已向斐济提出要求，将这片群岛视为支撑其南太平洋广阔海域舰队后勤与空中作战的枢纽。这项提议以提供保护与保障支持为名，实则构建保护国框架：外交政策需与东京保持一致，接受安全监管，并提供基地使用权——这将使斐济成为日本南方防线的基石。\n\n信号清晰无误。日本并非在寻求友邦，而是在构建秩序。斐济必须做出选择：要么在日本羽翼下接受被掌控的和平，要么直面一场将由海上力量决定的对抗。"
 JAP_diplomacy.181.a: "接受。我们绝不能被拿来杀鸡儆猴。"
 JAP_diplomacy.181.b: "拒绝。斐济不会屈服。"
 JAP_diplomacy.182.t: "斐济接受基石协议条款"
 JAP_diplomacy.182.d: "斐济接受了日本的最后通牒。双方签署了协议，日本获得了军事通行权，这些岛屿成为东京在南太平洋建立的港口、机场和巡逻区网络中的中心节点。\n\n危机以和平方式结束，但主权范围却有所缩小。斐济依然存在，但其对外发展方向如今却要遵循日本的周边战略。"
 JAP_diplomacy.182.a: "建立保护国。"
 JAP_diplomacy.183.t: "斐济拒绝最后通牒"
 JAP_diplomacy.183.d: "斐济拒绝了日本的要求，不愿将自己的未来拱手让给外国势力。这一拒绝使压力演变为对抗，东京现在将这些岛屿视为其南部防线最后一道缺口，并计划将其彻底封锁。\n\n如果斐济不接受条约框架，日本将以武力控制斐济，确保其安全。"
 JAP_diplomacy.183.a: "那么我们就接管枢纽。"
 JAP_diplomacy.184.t: "萨摩亚线最后通牒"
 JAP_diplomacy.184.d: "东京向萨摩亚提出要求，将萨摩亚群岛视为连接中太平洋和南部海域的枢纽。东京声称提供保护和支持，但实际上这是一种保护国模式：萨摩亚必须使其外交政策与日本保持一致，接受安全监管，并允许日本进入其海域，从而成为日本不断扩张的海洋边界上的一个中转站。\n\n信息很明确。日本正在海上划定界限，而萨摩亚就位于其中一条线上。接受意味着在更强大的力量统治下获得安全感，拒绝则可能成为他人效仿的榜样。"
 JAP_diplomacy.184.a: "接受吧。即使必须屈服，我们也能生存下去。"
 JAP_diplomacy.184.b: "拒绝。萨摩亚绝不屈服。"
 JAP_diplomacy.185.t: "萨摩亚接受日本保护"
 JAP_diplomacy.185.d: "萨摩亚接受了日本的最后通牒。双方签署了协议，日本获得了军事通行权，这些岛屿成为了东京太平洋网络中一个低调但重要的节点。\n\n危机以和平方式结束，但主权范围却有所缩小。萨摩亚依然存在，但其对外方向如今却与日本的战略路线保持一致。"
 JAP_diplomacy.185.a: "建立保护国。"
 JAP_diplomacy.186.t: "萨摩亚拒绝最后通牒"
 JAP_diplomacy.186.d: "萨摩亚拒绝了日本的要求，不愿以独立换取保护承诺。这一拒绝使压力演变为对抗，东京现在将这些岛屿视为其海洋防线上的一个安全漏洞。\n\n如果萨摩亚不接受条约框架，日本将以武力控制该地区，确保其安全。"
 JAP_diplomacy.186.a: "那么我们就扫平诸岛。"
 JAP_diplomacy.187.t: "汤加王室的要求"
 JAP_diplomacy.187.d: "东京向汤加王国提出了要求，汤加的港口和航道位于太平洋南缘。东京声称要提供保护和伙伴关系，但实际上却是一个保护国框架：汤加必须与日本的外交政策保持一致，接受安全监管，并允许日本进入其不断扩张的海上安全区，使其成为日本海上安全区内的一个中转站。\n\n信息很明确：日本正在构建一个不容许任何独立行动的海洋秩序。汤加必须在两种选择中做出抉择：要么接受日本庇护下的和平，要么面对由舰队决定的对抗。"
 JAP_diplomacy.187.a: "接受吧。即便身处阴影之下，我们仍将保有王冠。"
 JAP_diplomacy.187.b: "拒绝。汤加不会屈服。"
 JAP_diplomacy.188.t: "汤加接受日本保护"
 JAP_diplomacy.188.d: "汤加接受了日本的条件。双方签署协议，日本获得了军事通行权，汤加王国成为东京南方网络中一个受约束的节点。\n\n危机和平结束，但主权范围缩小。汤加依然存在，但其对外方向如今已与日本的战略路线保持一致。"
 JAP_diplomacy.188.a: "建立保护国。"
 JAP_diplomacy.189.t: "汤加拒绝了这一要求"
 JAP_diplomacy.189.d: "汤加拒绝接受日本的最后通牒，拒绝将自身未来置于外国的掌控之下。这一拒绝使压力演变为对抗，东京如今将汤加王国视为其南部战略中的一个薄弱环节。\n\n如果汤加不接受条约框架，日本将以武力控制该区域。该航道点将得到保障。"
 JAP_diplomacy.189.a: "那么我们就扫平诸岛。"
 JAP_diplomacy.190.t: "致华盛顿的通知：太平洋撤军"
 JAP_diplomacy.190.d: "东京已向华盛顿正式提出要求，要求美国归还其在太平洋地区占据的关键岛屿。东京的表态十分明确：日本不再容忍外国势力在日本周边海域的存在，必须放弃这些前哨基地，以防止局势进一步升级。\n\n这一诉求被视为避免战争的机会，但同时也是对决心的考验。要么接受并让步，迈向权力巅峰；要么拒绝，否则太平洋将沦为巨人之间的战场。"
 JAP_diplomacy.190.a: "接受转交"
 JAP_diplomacy.190.b: "拒绝。太平洋不是他们能占有的。"
 JAP_diplomacy.191.t: "华盛顿放弃前哨站"
 JAP_diplomacy.191.d: "出乎意料的是，美国接受了这一要求。岛屿被移交，基地被撤离，日本的海上防线在一举之间扩大。\n\n危机最终以和平方式结束，但其意义却不言而喻。一个大国退守，太平洋的平衡向东京倾斜。"
 JAP_diplomacy.191.a: "控制群岛"
 JAP_diplomacy.192.t: "华盛顿拒绝"
 JAP_diplomacy.192.d: "美国拒绝了日本的要求，拒绝放弃其在太平洋的立足点。这一拒绝使东京的最后通牒演变为大国之间的直接对抗，日本现在既有理由也有动机以武力夺回这些前哨基地。\n\n太平洋战线日益收紧。如果这些岛屿不通过条约割让，它们将通过战争被夺取。"
 JAP_diplomacy.192.a: "然后我们用武力夺取它们。"
 JAP_diplomacy.193.t: "向巴黎发出最后通牒：太平洋必须清理干净"
 JAP_diplomacy.193.d: "东京已正式向巴黎提出要求，要求移交法国在太平洋的岛屿领地。措辞虽礼貌，但含义却十分明确：遥远的帝国将不再能在日本的海洋范围内拥有立足之地。\n\n日本提供了一条避免局势升级的狭窄路径。法国可以选择签署撤回文件，也可以拒绝撤回，并接受争端最终由舰队而非外交手段解决。"
 JAP_diplomacy.193.a: "接受转交"
 JAP_diplomacy.193.b: "拒绝。法国不会被赶出去。"
 JAP_diplomacy.194.t: "巴黎撤离太平洋"
 JAP_diplomacy.194.d: "法国接受了日本的要求。国旗被降下，驻军撤离，岛屿移交给东京控制。\n\n危机在没有战争的情况下结束，但其传递的信息却响彻全球。日本不是在谈判建立势力范围，而是在强制推行。"
 JAP_diplomacy.194.a: "控制群岛"
 JAP_diplomacy.195.t: "巴黎拒绝"
 JAP_diplomacy.195.d: "法国拒绝了日本的最后通牒，拒绝放弃其在太平洋的领地。这一拒绝使东京的要求演变为直接对抗，日本现在有了武力夺取这些岛屿的正当理由。\n\n大国冲突会使海洋变小。如果法国不通过条约撤军，日本将试图通过战争将其驱逐出去。"
 JAP_diplomacy.195.a: "那么我们就拿下它们。"
 JAP_diplomacy.196.t: "致伦敦：放弃太平洋控制权"
 JAP_diplomacy.196.d: "东京已正式向伦敦提出要求，要求英国移交其在太平洋的剩余岛屿。照会中提及地区稳定和停止远距离干涉，但其目的显而易见：日本意图清除其声称拥有管辖权的海域上的外国旗帜。\n\n英国面临两难选择：要么有序撤军，要么远赴他乡发动一场毫无必要的战争。接受，此事就此告一段落；拒绝，太平洋将沦为又一个帝国试探彼此意志的战场。"
 JAP_diplomacy.196.a: "接受转交"
 JAP_diplomacy.196.b: "拒绝。英国绝不会被驱逐。"
 JAP_diplomacy.197.t: "伦敦做出让步"
 JAP_diplomacy.197.d: "英国接受了日本的要求。领土移交，国旗降下，东京在其强制推行的海上防线中又增加了一块领土。\n\n危机最终以和平方式结束，但其象征意义却十分沉重。一个昔日的海上强国做出了让步，而日本对太平洋的主权声索随着每一次让步而愈发嚣张。"
 JAP_diplomacy.197.a: "控制领土"
 JAP_diplomacy.198.t: "伦敦拒绝了这一要求"
 JAP_diplomacy.198.d: "英国拒绝了日本的最后通牒，拒绝放弃其在太平洋的领土。这一拒绝使东京的要求变成了直接的挑战，日本现在既有了动机，也有了借口，可以武力夺取这片领土。\n\n外交手段已达极限。如果英国不通过条约撤军，日本将试图通过战争将其驱逐。"
 JAP_diplomacy.198.a: "那么我们就武力夺取。"
 JAP_diplomacy.199.t: "日本影响渗透平壤"
 JAP_diplomacy.199.d: "日本对北政策已进入新阶段。东京通过中间人、情报渠道和精心策划的施压，在我们政治环境中开辟了此前受限或封闭的渠道。\n\n这并不意味着信任，也不意味着结盟。这只是意味着日本现在有一个暂时的机会，可以从内部和外部影响决策、左右各派势力，并考验我们的决心。"
 JAP_diplomacy.199.a: "我们将密切关注这些触手。"
 JAP_diplomacy.200.t: "桦太和千岛群岛陷落"
 JAP_diplomacy.200.d: "俄军已完全重新控制萨哈林岛和千岛群岛，抹去了此前战役中取得的所有成果。军事行动已经失败，东京方面已无力继续维持。停火是唯一的选择。\n\n这次失败将会带来严重后果。公众对政府军事判断的信心已经动摇，而这次失误造成的政治代价将在未来数年持续显现。"
 JAP_diplomacy.200.a: "我们别无选择，只能接受。"
 JAP_failed_sakhalin_war: "桦太战争余波"
 JAP_failed_sakhalin_war_desc: "桦太岛和千岛群岛战役的失败给日本政治格局留下了深深的创伤。公众对政府战略能力的信任度下降，军人士气受挫，外交后果持续制约着东京的外交政策选择。"
 JAP_mars_colony1: "火星殖民地天照"
 JAP_mars_colony1_desc: "以照耀苍穹的太阳女神天照大神命名的火星殖民地“天照”号，是日本团结与领导力的光辉象征。它的存在鼓舞着国内民众的信心，也赢得了国际的尊重。"
 JAP_mars_colony2: "火星殖民地迦具土"
 JAP_mars_colony2_desc: "以火神迦具土命名的火星殖民地“迦具土”围绕着熔炉、精炼厂和重工业而建。其目的很明确：将火星矿石和能源转化为日本工厂所需的动力。"
 JAP_mars_colony3: "火星殖民地月读"
 JAP_mars_colony3_desc: "火星殖民地“月读”以月神和黑夜之神月读命名，是一个静谧的天文台和研究中心。其实验室和仪器收集的数据不断传回日本，加深着人们对火星的科学认知。"
 JAP_mars_colony4: "火星殖民地须佐"
 JAP_mars_colony4_desc: "以带来风暴的神明须佐命名的火星殖民地须佐被设计成一个崎岖的边境哨所。训练场和实验靶场使其成为日本武装部队和军事理论的熔炉。"
 JAP_american_pressure_article_nine: "在美国关税的压力下"
 JAP_JP_USA_SOFA_1: "美日军地位协定框架"
 JAP_JP_USA_SOFA_1_desc: "驻日美军依据驻军地位协定运作，该协定使大多数美军人员免受日本法院管辖和税务约束，并赋予美国对其军事基地广泛的控制权。地方警察、知事和居民必须遵守华盛顿和东京协商制定的规则，基地附近的任何犯罪、事故或噪音投诉都必须经过驻军地位协定的程序，日本才能采取行动。"
 JAP_maritime_heavy_industry_corridor: "海上重工业走廊"
 JAP_maritime_heavy_industry_corridor_desc: "日本沿主要沿海地区发展出一条由造船厂、钢铁厂和海洋工程公司组成的连续产业带。集中投资于这一区域，提高了建造和维护军舰、潜艇和支援舰艇的能力，从而增强了舰队的工业基础。"
 JAP_article_9_restriction_tt: "第九条限制发展学说"
 JAP_article_9_navy_doctrine_tt: "禁用海军学说"
 JAP_article_9_air_doctrine_tt: "禁用空军学说"
 JAP_article_9_special_forces_doctrine_tt: "禁用特种部队学说"
 JAP_moon_base_completed: "辉夜月球基地建立"
 JAP_usa_article_nine_refused: "拒绝修改第九条解释"
 JAP_diplomacy_shortcut: "外交"
 JAP_political: "政治"
 JAP_economy: "经济"
 JAP_military: "军事"
 JAP_monarchism: "君主制"
 JAP_great_east_japan_earthquake_shortcut: "东日本大地震"
 JAP_article_nine_remove_flag: "第九条已被移除"
 JAP_usa_article_nine_accepted: "接受修改第九条解释"
 JAP_tokyo_startup_special_zone: "东京创业特区"
 JAP_tokyo_startup_special_zone_desc: "我们将集中精力在东京都市圈推行放松管制、风险投资支持和投资激励措施，以促进创业公司的创立和商业化。"
 JAP_tokyo_startup_special_zone_idea: "东京创业特区"
 JAP_tokyo_startup_special_zone_idea_desc: "东京已被指定为特别监管改革区，旨在扶持初创企业、风险投资和新企业成立。通过将放松管制、投资准入和商业化支持集中在首都圈，日本政府的目标是将有限的改革转化为切实可见的增长引擎。"
 JAP_kansai_medical_special_zone: "关西医疗创新区"
 JAP_kansai_medical_special_zone_desc: "我们将在关西地区打造一个医疗、护理和生命科学创新专区，加快私人投资和实际应用。"
 JAP_kansai_medical_special_zone_idea: "关西医疗创新区"
 JAP_kansai_medical_special_zone_idea_desc: "关西地区正通过灵活的监管和重点投资，发展成为医疗、护理和生命科学创新特区。"
 JAP_kyushu_logistics_special_zone: "九州物流港口特区"
 JAP_kyushu_logistics_special_zone_desc: "我们将简化九州地区的物流和港口手续，加强贸易流通，提高区域产业效率。"
 JAP_kyushu_logistics_special_zone_idea: "九州物流港口特区"
 JAP_kyushu_logistics_special_zone_idea_desc: "九州已被指定为物流和港口改革区，旨在提高贸易效率和区域互联互通。简化程序、优先发展基础设施和放宽监管旨在增强出口能力，使该地区成为更具吸引力的工商业基地。"
 JAP_expand_special_zones_nationwide: "扩大全国特区范围"
 JAP_expand_special_zones_nationwide_desc: "在选定的战略区域取得的成果将在全国范围内推广，使监管改革从有限的例外变成更广泛的增长框架。"
 JAP_tokyo_startup_special_zone_active: "§Y$JAP_tokyo_startup_special_zone$§!实施"
 JAP_kansai_medical_special_zone_active: "§Y$JAP_kansai_medical_special_zone$§!实施"
 JAP_kyushu_logistics_special_zone_active: "§Y$JAP_kyushu_logistics_special_zone$§!实施"
 JAP_expand_special_zones_nationwide_done: "§Y$JAP_expand_special_zones_nationwide$§!实施"
 JAP_japanese_economy_decisions: "日本经济复苏"
 JAP_japanese_economy_decisions_desc: "长期经济停滞导致的根深蒂固的需求疲软、不良贷款问题、企业部门债务过高和产能过剩、以及新兴产业增长缓慢等问题，正在削弱日本经济的活力。我们必须通过金融体系正常化、企业重组和刺激需求，重建能够再次实现增长的经济结构。\n\n§G通过提升以下进度值，相关国力的减益效果将会减轻并最终消除！\n要移除每一种国家精神，相关数值必须至少为§Y85§!。§!\n\n§Y需求复苏进展§!：[?JAP_demand_recovery_progress]\n\n\n§Y危险不良贷款存量§!：[JAP_dangerous_npl_stock_text]\n§Y对银行的信心§!：[?JAP_banking_confidence]\n§G提示§!：银行业复苏必然伴随着阵痛。不良贷款的处置可能会损害国内需求行业，但通过推进国策可以降低这种风险。为了改善银行业不良资产的国家精神，§Y危险不良贷款存量§!在第一阶段必须达到§Y中等§!水平，在第二阶段必须达到§G低§!水平，最终达到§G消除§!水平。\n\n\n§Y企业重组进展§!：[?JAP_corporate_restructuring_progress]\n§G提示§!：企业和银行关系密切。要消除企业方面的负面影响，必须先消除同等程度的银行负面影响。此外，还需要完成一些需要采取痛苦措施的国策。"
 JAP_entrenched_demand_shortfall_idea_2: "需求复苏乏力"
 JAP_entrenched_demand_shortfall_idea_2_desc: "更明确的物价目标和对家庭的支持使经济摆脱了最糟糕的阶段，但复苏依然脆弱。部分地区的消费和投资有所改善，但不足以提振全国经济。需求正在回升，但经济前景依然充满谨慎。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议以提升§Y需求复苏进展§!至§G60§!以§G缓解§!该国家精神的效果。"
 JAP_entrenched_demand_shortfall_idea_3: "剩余需求拖累"
 JAP_entrenched_demand_shortfall_idea_3_desc: "政府刺激消费的措施推动了经济发展，但多年停滞留下的谨慎情绪依然根深蒂固。家庭和企业的行动比以往更加活跃，但要实现可持续复苏，仍需最后一推。日本经济正处于摆脱停滞的临界点，但尚未完全摆脱困境。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议以提升§Y需求复苏进展§!至§G85§!以§G移除§!该国家精神。"
 JAP_banks_non_performing_loans_idea_1: "受损的银行系统"
 JAP_banks_non_performing_loans_idea_1_desc: "不良贷款仍然大量堆积在银行的资产负债表上，许多机构几乎无法估量自身损失的严重程度。信贷紧缩和贷款撤回正在扼杀商业活动，储户和市场都已不再对金融体系抱有充分的信任。在日本，原本应该承载资本流动的银行反而成了经济的负担。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议来改变§Y危险不良贷款存量§!水平至§G中等§!同时提升§Y对银行的信心§!至§G30§!以§G缓解§!该国家精神的效果。"
 JAP_banks_non_performing_loans_idea_2: "摇摆不定的金融中介"
 JAP_banks_non_performing_loans_idea_2_desc: "更严格的检查和不良贷款处置措施开始遏制最严重的混乱局面，但银行依然谨慎，信贷流动尚未完全恢复。恐慌情绪正在消退，但金融体系依然脆弱，日本银行业继续成为经济复苏的阻力而非推动力。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议来改变§Y危险不良贷款存量§!水平至§G低§!同时提升§Y对银行的信心§!至§G60§!以§G缓解§!该国家精神的效果。"
 JAP_banks_non_performing_loans_idea_3: "信心丧失留下的挥之不去的伤痕"
 JAP_banks_non_performing_loans_idea_3_desc: "危险不良贷款已大幅减少，政府措施也帮助恢复了人们对金融体系的信心。即便如此，银行仍未完全放弃防御姿态，信贷供应停滞的阴影依然挥之不去。危机虽已消退，但日本金融业尚未完全复苏。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议§G解决§!§Y危险不良贷款存量§!，同时提升§Y对银行的信心§!至§G85§!以§G移除§!该国家精神。"
 JAP_corporate_excess_debt_idea_1: "公司深陷债务泥潭"
 JAP_corporate_excess_debt_idea_1_desc: "负债过重和产能过剩的企业依然普遍存在，无利可图的企业和闲置资产继续拖累整体经济。本应流向增长型行业的资本、人才和管理精力，却仍然被用于维护弱势企业。日本企业尚未完全失去竞争优势，但也尚未恢复赢得竞争所需的敏捷性。\n-------------\n该国家精神的效果可以通过使用§Y$JAP_japanese_economy_decisions$§!中决议提升§Y企业重组进展§!至§G30§!，完成国策§Y$JAP_request_for_exit$§!，同时没有§Y$JAP_banks_non_performing_loans_idea_1$§!来§G缓解§!。"
 JAP_corporate_excess_debt_idea_2: "企业重组延迟"
 JAP_corporate_excess_debt_idea_2_desc: "对亏损部门的清理和重组计划的审查已经开始，但重组仍然谨慎且不彻底，许多低效环节仍被保留。部分资本开始流向实力更强的公司，但旧的结构尚未完全打破。日本经济正在复苏，但其企业部门仍然保留着停滞不前的习惯。\n-------------\n该国家精神的效果可以通过使用§Y$JAP_japanese_economy_decisions$§!中决议提升§Y企业重组进展§!至§G60§!，完成国策§Y$JAP_request_for_exit$§!，同时没有§Y$JAP_banks_non_performing_loans_idea_1$§!或§Y$JAP_banks_non_performing_loans_idea_2$§!来§G缓解§!。"
 JAP_corporate_excess_debt_idea_3: "效率低下的阴影挥之不去"
 JAP_corporate_excess_debt_idea_3_desc: "企业重组已取得显著进展，受损企业和亏损资产的清理工作已初见成效。即便如此，防御性的管理习惯和对深度重组的犹豫态度仍未完全消除。日本企业终于开始恢复轻盈的运营模式，但在真正实现全面增长之前，仍需最后冲刺。\n-------------\n可通过使用§Y$JAP_japanese_economy_decisions$§!中决议来提升§Y企业重组进展§!至§G85§!，完成§Y$JAP_request_for_exit$§!国策，同时没有§Y$JAP_banks_non_performing_loans_idea_1$§!，§Y$JAP_banks_non_performing_loans_idea_2$§!，或§Y$JAP_banks_non_performing_loans_idea_3$§!进行§G移除§!。"
 JAP_declaration_price_target: "设定目标价格"
 JAP_declaration_price_target_desc: "拖累经济的不仅仅是需求疲软。人们普遍认为物价和工资永远不会上涨，这种观念使家庭和企业陷入了谨慎的泥潭。明确的物价目标表明政府不再接受经济停滞的现状，这是打破僵化预期的第一步。"
 JAP_declaration_price_target_decision: "公布目标价格"
 JAP_declaration_price_target_decision_desc: "打破经济停滞是正常现象的假设，政府必须设定明确的价格目标。"
 Japan_economy.01.t: "目标价格已公布"
 Japan_economy.01.d: "政府终于明确表示，不再接受经济停滞作为永久状态。家庭和企业不能再指望物价和工资永远保持不变。尽管气氛依然沉重，但日本经济终于有了明确的方向。"
 Japan_economy.01.a: "先让预期有所转变。"
 Japan_economy.17.t: "价格目标已达成"
 Japan_economy.17.d: "曾经看似不可能的事情如今已开始发生。物价上涨的趋势已不容忽视。最重要的变化并非价格本身，而是人们日益增强的意识：停滞不会永远持续下去。这种意识正逐渐放松家庭和企业的谨慎。"
 Japan_economy.17.a: "变天了。"
 Japan_economy.18.t: "目标价未能达标"
 Japan_economy.18.d: "政府设定的目标未能转化为实际行动，人们对其扭转经济衰退的承诺开始产生怀疑。家庭再次变得谨慎起来，而面对疲软的需求，企业也纷纷采取观望态度。经济复苏的信心显然已经受损，日本经济再次笼罩在一片低迷的氛围中。"
 Japan_economy.18.a: "信心并非轻易就能恢复。"
 JAP_price_target_mission: "物价上涨的前景"
 JAP_price_target_mission_desc: "仅仅设定目标是不够的。我们必须在规定时间内展现物价上涨的明显迹象，并让全国人民相信变革已经真正开始。"
 JAP_cash_transfers_households: "直接家庭支持"
 JAP_cash_transfers_households_desc: "当人们对未来充满焦虑时，经济复苏不会自行启动。政府必须将购买力直接赋予家庭。针对中低收入群体的扶持措施尤其有可能转化为实际消费，从而迅速提振国内需求。"
 JAP_cash_transfers_households_decision: "向中低收入家庭支付款项"
 JAP_cash_transfers_households_decision_desc: "向最有可能消费的群体提供支持，直接推高需求。"
 Japan_economy.19.t: "支持性费用发放出现复苏迹象"
 Japan_economy.19.d: "直接发放给家庭的资金不再闲置，而是开始流入市场。中低收入群体的消费增长尤为明显，长期以来紧闭的钱包终于开始打开。"
 Japan_economy.19.a: "需求仍然可以被唤醒。"
 JAP_temporary_tax_cuts: "临时税收减免"
 JAP_temporary_tax_cuts_desc: "为了打破拖延的习惯，人们需要一个立即消费的理由。临时减税的作用远不止增加可支配收入。它们可以促使人们提前购买，并给停滞的需求带来明显的刺激。在经济低迷时期，把握时机本身就能成为一种武器。"
 JAP_temporary_consumption_tax_cut: "临时消费税减免"
 JAP_temporary_consumption_tax_cut_desc: "创造消费的理由，将延迟消费转化为经济复苏的动力。"
 Japan_economy.20.t: "税收减免政策呈现复苏迹象"
 Japan_economy.20.d: "临时减税政策促使家庭立即采取行动。此前被推迟的消费开始恢复，经济停滞的局面也开始出现转机。虽然这只是一项短期措施，但它确实展现出了刺激疲软需求的强大作用。"
 Japan_economy.20.a: "现在是时候行动了。"
 JAP_active_public_investment: "积极的公共投资"
 JAP_active_public_investment_desc: "如果私营部门继续保持谨慎，经济靠等待是无法复苏的。政府必须主动创造需求，并将资金投入地方经济和就业。公共投资的作用远不止于支持增长，它还能让整个国家感受到经济终于恢复了活力。"
 JAP_active_public_investment_decision: "公共投资指令"
 JAP_active_public_investment_decision_desc: "通过政府行动创造需求，恢复资金流入地方经济和就业市场。"
 Japan_economy.21.t: "公共投资显现复苏迹象"
 Japan_economy.21.d: "国家主导的项目正逐渐产生远超数字本身所显示的积极影响。资金正流入地方经济，就业形势好转，曾经令人倍感熟悉的经济悲观情绪也开始消退。这个国家终于可以感受到，它已经迈出了不再等待的第一步。"
 Japan_economy.21.a: "国家可以主导经济发展。"
 JAP_improvement_private_investment_climate: "改善私人投资环境"
 JAP_improvement_private_investment_climate_desc: "单靠政府支出无法完成经济复苏。必须提振企业信心，鼓励其重新投资，并降低对未来的不确定性。要实现持久复苏，企业需要从防御型投资转向扩张型投资。"
 JAP_focus_improving_investment_climate: "重点改善投资环境"
 JAP_focus_improving_investment_climate_desc: "政府正优先营造更有利于商业投资的环境。政治资源被投入到协调、游说和体制改革中，这使得其他短期举措的空间相对有限。"
 Japan_economy.02.t: "私人投资环境改善"
 Japan_economy.02.d: "企业开始意识到，一味防御意味着错失良机。不确定性依然存在，但阻碍新投资的一些压力正在逐渐消退。经济复苏似乎不再完全由政府主导，这是前所未有的。"
 Japan_economy.02.a: "私营部门正在活跃起来。"
 JAP_stimulating_demand_durable_goods: "刺激耐用品需求"
 JAP_stimulating_demand_durable_goods_desc: "一旦需求开始回升，汽车、家电和住房相关商品等耐用品的消费就能带动整个行业的增长，其效果远超其他行业。但在经济停滞时期，这些商品往往最先被推迟购买。如果能够重振这些商品的消费，将为经济复苏注入强劲动力，并恢复久违的活力。"
 JAP_stimulating_demand_durable_goods_decision: "耐用品采购活动"
 JAP_stimulating_demand_durable_goods_decision_desc: "鼓励人们进行多年来一直被推迟的大宗采购，并为经济复苏注入明显的动力。"
 Japan_economy.22.t: "耐用品需求显现复苏迹象"
 Japan_economy.22.d: "多年来被推迟的大宗采购终于开始恢复。耐用品需求对相关行业产生广泛影响，也表明家庭对未来至少略有信心。复苏的迹象不仅体现在数据上，也体现在日常生活的氛围中。"
 Japan_economy.22.a: "让这股势头蔓延开来。"
 JAP_strict_audits_banks: "严格的银行检查"
 JAP_strict_audits_banks_desc: "多年的拖延使得银行体系的创伤更难被察觉，而金融焦虑却持续蔓延。第一步是将危险的不良贷款从阴影中揭露出来，迫使银行直面现实。这将会很痛苦，但没有痛苦就没有真正的复苏。"
 JAP_strict_audits_banks_decision: "启动严格的银行检查"
 JAP_strict_audits_banks_decision_desc: "迫使隐藏的弱点暴露出来，并确定危险不良贷款的真实规模。"
 JAP_strict_audits_banks_done: "$JAP_strict_audits_banks_decision$实施"
 Japan_economy.23.t: "检查暴露了银行业弱点"
 Japan_economy.23.d: "严格的检查再次揭露了银行资产负债表的脆弱性以及高风险不良贷款的现实。市场紧张局势依然高涨，但这些问题得不到解决的余地正在不断缩小。金融复苏之路依然漫长。即便如此，正视每一个问题仍然是恢复市场信心的第一步。"
 Japan_economy.23.a: "不放过任何弱点。"
 Japan_economy.24.t: "剔除腐朽"
 Japan_economy.24.d: "危险不良贷款的处置工作正在推进，银行业长期以来遭受的创伤终于开始得到缓解。这个过程虽然痛苦，但过去那种被埋没的损失悄然吞噬未来的时代正在走向终结。信心的恢复需要时间，但复苏之路已然开启。"
 Japan_economy.24.a: "必须清除腐烂部分。"
 JAP_injection_public_funds: "公共资本注入"
 JAP_injection_public_funds_desc: "要求实力受损的银行在缺乏支持的情况下既进行损失处置又恢复放贷是不现实的。如果要维护公众对金融体系的信心，国家必须作为最后的保障措施介入，阻止崩溃的连锁反应。这是一个政治上极其艰难的决定，但却别无选择。"
 JAP_injection_public_funds_decision: "向银行注入公共资本"
 JAP_injection_public_funds_decision_desc: "增强银行吸收损失的能力，防止金融恐慌进一步蔓延。"
 Japan_economy.25.t: "公共资本缓解金融焦虑"
 Japan_economy.25.d: "公共资本的注入增强了银行吸收损失的能力，并在一定程度上抑制了金融焦虑的蔓延。批评之声依然不可避免，但如果任由银行体系动荡，代价将会更大。在此，国家再次展现了其遏制金融体系不稳定的决心。"
 Japan_economy.25.a: "遏制焦虑的蔓延。"
 JAP_new_lenders: "邀请新的贷款方"
 JAP_new_lenders_desc: "如果现有银行继续固守防御性谨慎策略，信贷流动将持续疲软。必须鼓励新的贷款机构进入市场，打破金融体系本身的瓶颈。竞争和新的资本渠道能够恢复日本金融体系失去的部分灵活性。"
 JAP_new_lenders_idea: "新贷款机构的崛起"
 JAP_new_lenders_idea_desc: "除了传统银行之外，新的信贷来源正在涌现。金融领域的阻塞尚未完全消除，但新的路径正在为资本在经济中的流动开辟。"
 JAP_protection_deposits: "建立存款保障"
 JAP_protection_deposits_desc: "一旦储户开始怀疑存款安全，银行业危机便会真正爆发。因此，政府必须明确无误地表明存款将受到保护。仅靠这一点无法完全恢复信任，但它足以成为一道屏障，防止恐慌演变成崩溃。"
 JAP_protection_deposits_decision: "实施存款保护"
 JAP_protection_deposits_decision_desc: "安抚储户，防止恐慌性取款引发连锁反应。"
 Japan_economy.26.t: "存款将受到保障"
 Japan_economy.26.d: "存款保障机制的实施有效遏制了银行业危机中最危险的导火索之一。尽管人们对银行仍存疑虑，但至少储户争先恐后逃离的景象正在逐渐消退。完全的信心尚未完全恢复，但目前已筑起一道屏障，防止恐慌情绪进一步蔓延。"
 Japan_economy.26.a: "守护信心的根基。"
 JAP_rehabilitation_small_medium_enterprises: "为小型企业提供信用安全网"
 JAP_rehabilitation_small_medium_enterprises_desc: "简单地推进不良贷款处置，可能会使支撑日本经济的中小型企业也陷入融资困境。通过要求现有银行继续向中小企业放贷，同时建立重组融资机制，并监控信贷紧缩和贷款撤回情况，我们可以建立一道屏障，防止金融改革的阵痛演变成地方经济的崩溃。"
 JAP_rehabilitation_small_medium_enterprises_idea: "关注中小企业信贷稳定性"
 JAP_rehabilitation_small_medium_enterprises_idea_desc: "政治资源正集中用于监督、协调和重组支持，以防止不良贷款处置扼杀中小企业的信贷。这对于保护地方经济至关重要，但却减少了在其他领域采取行动的空间。"
 JAP_dangerous_npl_stock_5_name: "§R危急§!"
 JAP_dangerous_npl_stock_4_name: "§R非常高§!"
 JAP_dangerous_npl_stock_3_name: "§R高§!"
 JAP_dangerous_npl_stock_2_name: "§Y中等§!"
 JAP_dangerous_npl_stock_1_name: "§G低§!"
 JAP_dangerous_npl_stock_0_name: "§G已解决§!"
 JAP_sorting_out_zombie_firms: "对僵尸企业进行分类"
 JAP_sorting_out_zombie_firms_desc: "多年的停滞不前让一些本应早已退出市场或进行深度重组的公司得以幸存。问题不仅在于弱势公司的数量，更在于那些原本有发展前景的公司和那些消耗资源的公司混杂在一起。首要任务是明确区分拖延和真正的复苏。"
 JAP_review_rehabilitation_plans: "审查康复计划"
 JAP_review_rehabilitation_plans_desc: "重新审视已提出的扭亏为盈计划，并将真正的复苏与单纯的维持现状区分开来。"
 Japan_economy.27.t: "康复计划审查"
 Japan_economy.27.d: "对重组计划的深入审查正逐步剥离乐观的假设和模糊的前提。并非所有公司都能获救，但真正的复苏与仅仅是拖延之间的界限正变得比以往任何时候都更加清晰。企业重组正开始基于数据和现实。"
 Japan_economy.27.a: "只有切实可行的方案才能保留下来。"
 JAP_review_rehabilitation_plans_idea: "筛选后的复兴计划"
 JAP_review_rehabilitation_plans_idea_desc: "随着重组计划审查的日益严格，真正值得复兴的企业与仅仅依靠拖延苟延残喘的企业之间的界限正逐渐清晰。企业界日益形成一种共识：资本或许不再会被过去的包袱所束缚，而是开始流向增长前景更为广阔的领域。"
 JAP_support_for_recovery: "支持可行的复兴"
 JAP_support_for_recovery_desc: "并非所有陷入困境的企业都应该被抛弃。那些仍然有能力维持技术发展、就业和地方经济的企业，理应获得重振旗鼓的机会。识别哪些企业值得拯救，并推动有生存能力的企业向前发展，也是捍卫日本经济根基的一种方式。"
 JAP_management_guidance_businesses: "问题管理指南"
 JAP_management_guidance_businesses_desc: "敦促企业正视长期拖延的问题，并采取更切合实际的重组措施。"
 Japan_economy.28.t: "管理层面临残酷的现实"
 Japan_economy.28.d: "管理层的指导迫使企业正视他们长期以来一直试图回避的问题和规避行为。虽然这一信息可能令人不悦，但企业和经济都无法在背负旧有重担的情况下向前发展。谨慎的情绪仍然笼罩着整个企业界，但需要纠正的问题如今比以往任何时候都更加清晰。"
 Japan_economy.28.a: "不要让他们移开视线。"
 JAP_support_painful_restructuring: "支持痛苦的重组"
 JAP_support_painful_restructuring_desc: "支持艰难的裁员和资产清理，以便最终减轻长期存在的负担。"
 Japan_economy.29.t: "痛苦的重组继续进行"
 Japan_economy.29.d: "长期以来悬而未决的重担终于开始减轻。裁员和拆分总是伴随着阵痛，但如果低效的局面持续下去，企业和整个经济都无法自由运转。重组尚未完成，但日本企业已经开始卸下部分重担。"
 Japan_economy.29.a: "如果我们不变得更轻盈，就无法前进。"
 JAP_request_for_exit: "启用有序退出"
 JAP_request_for_exit_desc: "如果让那些无法生存的企业无限期地苟延残喘，将会浪费更多的资本和人才。日本需要一个框架，让企业能够以尽可能小的混乱程度逐步退出。真正的重组不仅需要复兴之路，也需要退出之路。"
 JAP_promotion_mergers_and_acquisitions: "促进企业合并"
 JAP_promotion_mergers_and_acquisitions_desc: "只要企业保持分散状态，资产和人才就无法得到充分利用。整合并非简单的算术运算，而是将重叠的业务和资源整合为足够庞大高效的组织结构，从而具备竞争力。仅靠防御性管理无法重振日本企业界的活力。"
 JAP_promotion_mergers_and_acquisitions_idea: "公司合并的法律框架"
 JAP_promotion_mergers_and_acquisitions_idea_desc: "政治资源正被用于完善企业合并的法律和程序框架。这可以加速重组，但同时也减少了可用于其他短期优先事项的政治资源。"
 JAP_investment_new_sources_of_growth: "投资于新的增长点"
 JAP_investment_new_sources_of_growth_desc: "重组的目的不仅仅是剔除旧有的环节。一旦释放出资本和人才，就必须将它们引导至新兴产业和新的挑战者。只有这样，重组才能真正成为对未来的投资，而不仅仅是为了生存。"
 JAP_investment_growth_industries: "投资于增长型行业"
 JAP_investment_growth_industries_desc: "将资本重新导向前景更佳的行业，并将重组转化为增长的途径。"
 Japan_economy.30.t: "资本流向增长型行业"
 Japan_economy.30.d: "长期滞留在停滞行业的资本终于开始转向新的增长点。这种转变尚未普及，但投资正逐渐从单纯的保值转向扩张。企业重组也不再仅仅是回顾过去的清理工作。"
 Japan_economy.30.a: "现在我们支持那些能够成长的事物。"
 JAP_startup_campaign: "创业支持活动"
 JAP_startup_campaign_desc: "鼓励新的挑战者，为停滞不前的企业结构带来变革。"
 Japan_economy.31.t: "新挑战者涌现"
 Japan_economy.31.d: "以往鲜少从旧有企业结构中涌现的新鲜理念和活力，如今正通过新的挑战者涌现。即使是微小的变革，一旦打破停滞不前的体系，也意义非凡。日本企业界的未来不仅取决于那些得以生存的企业，也取决于那些新成立的企业。"
 Japan_economy.31.a: "让新的力量生根发芽。"
 JAP_startup_campaign_idea: "支持新创业者"
 JAP_startup_campaign_idea_desc: "我们正努力营造一个有利于新公司和新挑战者涌现的环境。这将有助于实现仅靠重组现有公司无法达到的更新换代。"
 Japan_economy.03.t: "经济衰退的第一个裂缝"
 Japan_economy.03.d: "政府的支持措施已开始生效，此前被冻结的支出终于开始出现复苏迹象。消费者信心依然疲软，但长期以来“反正一切都不会改变”的消极情绪，如今首次开始出现裂痕。"
 Japan_economy.03.a: "形势开始转变。"
 Japan_economy.04.t: "需求开始蔓延"
 Japan_economy.04.d: "最初谨慎的政策推动如今已惠及更广泛的经济领域。家庭支出有所增加，被推迟的消费正在恢复，企业再也不能忽视市场复苏的迹象。经济复苏尚未稳固，但已不再仅仅是一种希望。"
 Japan_economy.04.a: "让复苏的势头蔓延开来。"
 Japan_economy.05.t: "长期低迷结束"
 Japan_economy.05.d: "需求终于开始自主运转。家庭和企业的行为已进入相互促进的良性循环，日本经济正稳步走出长期停滞的困境。尽管仍面临诸多挑战，但由需求不足导致的长期衰退已不再是日本经济的核心负担。"
 Japan_economy.05.a: "终于，我们继续前进。"
 Japan_economy.06.t: "腐败真相大白"
 Japan_economy.06.d: "严格的审查最终将长期隐藏的弱点暴露出来。这个过程虽然痛苦，但假装问题可以忽略不计的时代即将结束。不良贷款处置已经开始，市场也感受到日本银行业终于被迫面对现实。"
 Japan_economy.06.a: "我们必须先正视损失。"
 Japan_economy.07.t: "金融恐慌消退"
 Japan_economy.07.d: "政府的各项举措已经缓解了人们对金融体系崩溃的担忧。尽管人们对银行仍存疑虑，但这种疑虑已不再像过去那样根深蒂固。日本金融体系终于开始走出瘫痪状态。"
 Japan_economy.07.a: "崩溃链已被遏制。"
 Japan_economy.08.t: "银行再次成为贷款机构"
 Japan_economy.08.d: "危险的不良贷款已被清除，信心也已恢复到足以让银行摆脱单纯自保的境地。资本开始再次流入企业和经济活动，长期压在日本头上的金融负担正在逐渐消退。挑战依然存在，但银行业危机已不再是日本发展的主要阻碍。"
 Japan_economy.08.a: "金融业终于可以再次展望未来了。"
 Japan_economy.09.t: "保护逻辑中的裂缝"
 Japan_economy.09.d: "一场严肃的重新审视终于开始着手解决长期以来被保留下来的低效问题和管理难题。这个过程是痛苦的，但只要稀缺的资本和人才仍然被困在过去，整体经济就无法重获活力。日本企业终于开始摆脱单纯的防御性业务。"
 Japan_economy.09.a: "单靠保护无法推动我们前进。"
 Japan_economy.10.t: "重组计划初见雏形"
 Japan_economy.10.d: "企业界开始显现变革迹象。长期以来被维持不变的资产和业务正在逐步重组，管理资源的流向也随之发生转变。旧有的结构依然顽固，但日本企业终于开始摒弃将停滞视为常态的做法。"
 Japan_economy.10.a: "进一步推进重组。"
 Japan_economy.11.t: "资本转向未来"
 Japan_economy.11.d: "企业重组不再仅仅是清理烂摊子，它正逐渐成为推动增长的基础。资本和管理资源正逐步摆脱过去的束缚，开始朝着更具前瞻性的方向发展。谨慎依然存在，但企业停滞已不再是国家面临的主要难题。"
 Japan_economy.11.a: "现在正是把握增长机遇的时候。"
 JAP_expectation_of_being_rewarded: "对回报的预期"
 JAP_expectation_of_being_rewarded_desc: "只要人们仍然认为工作不会改善生活，他们就会保持谨慎。真正的复苏需要的不仅仅是暂时的刺激措施，更需要重建人们的信念：努力终将通过工资和生活水平的提高得到回报。正是这种预期，才能使复苏成为一种自我维持的力量。"
 JAP_wage_negotiations: "争取更高工资"
 JAP_wage_negotiations_decision: "恢复人们对工资增长的信心，防止需求复苏仅仅停留在暂时的刺激阶段。"
 Japan_economy.12.t: "与企业进行工资谈判"
 Japan_economy.12.d: "如果需求复苏要实现可持续，工资也必须上涨。然而，企业仍然对未来的风险和利润压力保持警惕。政府现在必须决定应该在多大力度地推动提高工资。"
 Japan_economy.12.a: "鼓励提高工资。"
 Japan_economy.12.b: "施加压力"
 Japan_economy.12.c: "交给私营部门吧。"
 Japan_economy.14.t: "工资增长达到目标"
 Japan_economy.14.d: "工资终于开始出现明显增长。重要的不仅是收入本身的增长，更是人们内心深处重新感受到努力终将得到回报。这种心态的转变正逐渐将疲软的消费转化为更强劲、更持久的消费。"
 Japan_economy.14.a: "复苏正在成为现实。"
 Japan_economy.15.t: "工资增长未达预期目标"
 Japan_economy.15.d: "工资增长并未达到预期目标，但努力并非徒劳。企业依然保持谨慎，但提高工资的必要性如今已比以往更加普遍。这一进步虽小，但对于打破以往停滞不前的局面仍然意义重大。"
 Japan_economy.15.a: "我们以此为基础。"
