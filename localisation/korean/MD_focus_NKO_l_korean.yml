 NKO_social_security: "사회안전성"
 NKO_social_security_desc: "일반적으로 보안성 또는 인민보안성으로 알려진 사회안전성은 공화국 내의 내무 부서이자 주요 법 집행 기관입니다. 이 부서는 공식적인 공공 및 내부 치안 무력으로서 공공 질서를 유지하고 철도 및 기타 교통수단을 포함한 핵심 시설을 보호할 책임이 있습니다."
 NKO_security_forces: "사회안전군"
 NKO_security_forces_desc: "사회안전군은 공화국의 준군사 무력으로 다양한 내부 치안 및 국경 경비 임무를 수행합니다"
 NKO_railway_bureau: "철도보안국"
 NKO_railway_bureau_desc: "철도보안국 - 공화국 내의 주요 이동 및 운송 경로를 경비합니다"
 NKO_finacial_bureau: "재무정보국"
 NKO_finacial_bureau_desc: "재무정보국 - 자금 세탁, 갈취 및 기타 금융 범죄를 단속합니다"
 NKO_corrections_bureau: "교화국"
 NKO_corrections_bureau_desc: "교화국은 공화국 내의 잔혹한 교도소 체계를 운영합니다"
