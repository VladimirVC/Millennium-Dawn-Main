 NKO_joint_exercises_nko_idea: "Российско-Северокорейские учения"
 korea.50.t: "Объединение Кореи наконец-то состоялось."
 korea.50.d: "После многих лет раздробленности Корея наконец-то объединилась, что стало историческим моментом в мировой истории. Некогда разрозненные Север и Юг объединились, преодолев десятилетия политических, экономических и культурных разногласий и образовав единую, единую нацию. Это знаменательное событие знаменует собой новую эру мира, сотрудничества и процветания для корейского народа, меняя геополитический ландшафт Восточной Азии и всего мира."
 korea.50.a: "Урааааа!!!"
 korea.51.t: "Постройте больше ферм"
 korea.51.d: "Корея не сможет стать великой без корейского народа. Мы должны сосредоточиться на скорейшей борьбе с голодом."
 korea.51.a: "Сельское хозяйство в Пхеньяне"
 korea.51.b: "Сельское хозяйство в Хванхэ"
 korea.51.c: "Сельское хозяйство в Чагане"
 korea.51.e: "Сельское хозяйство в Хамгёне"
 korea.52.t: "Модернизируйте наши недостающие центры снабжения"
 korea.52.d: "Наш великий лидер выделил средства на строительство дополнительных железнодорожных путей и центра снабжения, оставив нас перед выбором: либо сосредоточиться на наших амбициях в отношении экономической зоны, либо подготовить логистику к войне."
 korea.52.a: "Поставки корейской стороне"
 korea.52.b: "Поставка в будущую экономическую зону"
