 BLR_Minotor_category: "Минотор-Сервис"
 BLR_Minotor_category_desc: "«Минотор-Сервис» — белорусское предприятие, расположенное в Минске и занимающееся разработкой, производством, модернизацией, ремонтом и техническим обслуживанием боевой гусеничной техники, а также поставкой запасных частей. Это одно из ведущих предприятий военно-промышленного комплекса страны."
