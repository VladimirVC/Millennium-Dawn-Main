 EU_voting_mission_focus_EU611_QMV_result_desc: "회원국들이 \"내부 확대\" 에 투표하였습니다. 이제 그 결과를 공개할 때 입니다."
 EUevent.2.t: "유럽연합 – 터키 협상"
 EUevent.2.d: "§C[EUU.GetFlag] 유럽 연합§!과 [TUR.GetNameWithFlag]는 터키에서부터 유럽으로 들어오는 불법 이민자들의 흐름을 막는 것을 목표로 하는 조약을 체결하였습니다. 유럽연합-터키 성명에 따르면, 터키에서 그리스의 섬들로 들어오는 모든 신규 불법이민자들과 망명 신청자들은 망명 신청이 거부될 것이며 터키로 다시 송환될 것입니다. §C[EUU.GetFlag] 유럽 연합§!은 터키의 난민 시설을 위해 3 x10억 유로를 지불할 것입니다."
 EUevent.2.a: "알겠다"
 EUevent.17.t: "유럽연합 – 터키 협상"
 EUevent.17.d: "§C[EUU.GetFlag] 유럽 연합§!과 [TUR.GetNameWithFlag]는 터키에서부터 유럽으로 들어오는 불법 이민자들의 흐름을 막는 것을 목표로 하는 조약을 체결하였습니다. 유럽연합-터키 성명에 따르면, 터키에서 그리스의 섬들로 들어오는 모든 신규 불법이민자들과 망명 신청자들은 망명 신청이 거부될 것이며 터키로 다시 송환될 것입니다. §C[EUU.GetFlag] 유럽 연합§!은 터키의 난민 시설을 위해 3 x10억 유로를 지불할 것입니다."
 EUevent.17.a: "알겠다"
 EUevent.4.t: "유럽 합중국의 통합"
 EUevent.4.d: "[FROM.GetNameWithFlag](은)는 §C[EUU.GetFlag]유럽 연합§!의 회원국들을 하나의 초국가인 \"§C[EUU.GetFlag] 유럽 합중국§!\"으로 통일합니다. [ROOT.GetNameWithFlag](은)는 국가의 자주권을 포기하고 §C[EUU.GetFlag] 유럽 합중국§!에 통합될 것입니다."
 EUevent.4.a: "기쁨에 경의를 표한다!"
 EUevent.5.t: "유럽 부채 위기"
 EUevent.5.d: "유럽연합의 유로존 개혁안 제정이 실패했습니다. 연합 내 국가들은 정부 부채의 상환과 차환, 과도한 부채를 지고 있는 은행을 구제 할 수 없습니다. 현재 회원국들은 유로존의 금융 및 경제 실용성을 확보하기 위한 개혁안을 신속하게 추진 하기 위해 분주하고 있습니다. 위기는 시작됐으며 유로는 위기에 처해있습니다."
 EUevent.5.a: "유로화는 매우 위태로운 상태입니다!"
 EUevent.6.t: "유로존 개혁"
 EUevent.6.d: "닥쳐온 부채 위기는 재정동맹 시행과 유럽 중앙 은행 (ECB)권한 확대, 추가적인 안정화 장치와 같은 일련의 유로존 개혁안 덕에 회피 했습니다. 유로존은 구제 됐으며 유럽 연합은 이제 위기를 피했다는 확신을 가지고 미래를 볼 수 있게 됐습니다."
 EUevent.6.a: "다양성 속의 조화."
 EUevent.7.t: "Eurozone Reforms"
 EUevent.7.d: "미국의 글로벌 금융 위기는 유럽 국가들 사이에 연쇄적인 영향을 미쳤습니다. 유럽 ​​의회의 많은 의원들은 유럽 연합 내 여러 국가에서 늘어나는 부채에 대한 해결책을 모색하고 있습니다. 국가들은 글로벌 금융위기 이후 정부 부채를 상환하거나 재융자하지 못했으며, 부실 은행에 긴급 자금을 지급하지도 못했습니다. 문제의 모든 회원국은 부채 상환 능력이 없다고 보고했으며 예산 적자가 이전에 생각했던 것보다 훨씬 더 심각하다고 발표했습니다. 국가 간 주요 공통점은 위기의 근본 원인이 국가 내에서 어려움을 겪고 있는 기관을 구제하기 위해 일련의 부채 구제금융을 통해 민간 부채를 국가 부채로 전환하는 데 있다는 것입니다. 유럽중앙은행(ECB)과 국제통화기금(IMF)은 훨씬 더 심각한 위기를 예방하기 위해 구호 패키지와 국가 구제금융 프로그램을 발행하기 위해 회원국들과 거래를 시작했습니다. 한 가지 분명한 사실은 유럽연합이 글로벌 금융위기라는 폭풍의 중심에 서면서 대재앙의 위기에 직면해 있다는 것입니다. 우리는 강인함을 유지해야 하며 유럽연합은 유로존을 개혁하여 폭풍우를 이겨내고 유럽연합이 흔들리지 않을 것임을 보여주어야 합니다. 지금은 아니고, 내일도 아니고, 앞으로도 안 됩니다. 다양한 콩코르디아에서."
 EUevent.7.a: "유로화를 위하여!"
 EUevent.8.t: "트로이카 개혁이 이루어졌습니다!"
 EUevent.8.d: "[ROOT.GetNameWithFlag](은)는 유럽 연합 집행위원회 (EC), 유럽중앙은행 (ECB), 국제통화기금 (IMF)으로 구성된 유럽 연합의 트로이카 (Troika)가 요구하는 개혁안을 법으로 제정하였습니다. 이 말인 즉슨 [ROOT.GetNameWithFlag] 국민들의 삶이 더욱 궁핍해졌다는 뜻입니다!"
 EUevent.8.a: "우린 이겨낼 것이다!"
 EUevent.9.t: "뜻밖의 탈퇴"
 EUevent.9.d: "[ROOT.GetNameWithFlag](은)는 유럽 연합 집행위원회 (EC), 유럽중앙은행 (ECB), 국제통화기금 (IMF)으로 구성된 유럽 연합의 트로이카 (Troika)가 요구하는 개혁안을 달성하는데 실패했습니다. 다른 회원국들 마저 '긴급 구제 불가 조항 (No Bailout Clause)에 적용되어 이들을 도울 수 없으므로, [ROOT.GetNameWithFlag](은)는 그들의 화폐 가치를 절하하여 파산을 막기 위해 어쩔 수 없이 유로존과 §C[EUU.GetFlag] 유럽 연합§!을 떠나야만 합니다."
 EUevent.9.a: "Bad times ahead"
 EUevent.10.t: "유럽의 해군을 통합하는 '유럽 해군 (EuroNavy)'"
 EUevent.10.d: "다국적 함대와 태스크 포스가 21세기에 더욱 보편화되고 중요하게 여겨지면서, [EUU.GetFlag] 유럽 연합의 회원국들은 그들 각국의 해군이 보유한 함선들을 통합된 유럽 해군 사령부인 유럽 해군(EuroNavy)에 양도하기로 결정했습니다. \n\n[FROM.GetNameWithFlag](은)는 유럽 해군 사무총장의 지위를 가지고 있으며 그들은 우리의 함대를 유럽 해군에 양도하도록 요구하고 있습니다."
 EUevent.10.a: "유럽이여, 바다를 지배하라!"
 EUevent.10.b: "우린 절대로 우리 함대를 포기하지 않을겁니다!"
 EUevent.18.t: "군사 훈련의 진행을 부탁하는 [FROM.GetNameWithFlag]"
 EUevent.18.d: "[FROM.GetNameWithFlag](은)는 우리가 국경에서 군사 훈련을 진행해주기를 부탁하고 있습니다. 국경에서의 군사 훈련은 세계 긴장을 고조시킬 수 있으므로 군사 훈련을 허용하기 전에 신중하게 선택 사항을 고려하는 것이 중요합니다."
 EUevent.18.a: "찬성"
 EUevent.18.b: "안된다"
 EUelection.1.t: "[GetYear]년 유럽 의회 선거"
 EUelection.1.d: "유럽 의회 선거는 5년 단위로 열립니다."
 EUelection.1.a: "알겠다"
 EU_news.1.t: "유럽 연합의 회원국 목록"
 EU_news.1.d: "유럽은 훌륭한 시스템을 통해 발전하고 있다."
 EU_news.1.a: "알겠다"
 EU_news.20.t: "뜻밖의 탈퇴"
 EU_news.20.d: "[FROM.GetNameWithFlag](은)는 유럽 연합 집행위원회 (EC), 유럽중앙은행 (ECB), 국제통화기금 (IMF)으로 구성된 유럽 연합의 트로이카 (Troika)가 요구하는 개혁안을 달성하는데 실패했습니다. 다른 회원국들 마저 '구제 금융 불가 조항 (No Bailout Clause)에 적용되어 이들을 도울 수 없으므로, [FROM.GetNameWithFlag](은)는 그들의 화폐 가치를 절하하여 파산을 막기 위해 어쩔 수 없이 유로존과 §C[EUU.GetFlag] 유럽 연합§!을 떠나야만 합니다."
 EU_news.20.a: "잘가라"
 EU_news.21.t: "회원국이 유럽 연합을 떠나다"
 EU_news.21.d: "§C[EUU.GetFlag] 유럽 연합§!을 떠난 [FROM.GetNameWithFlag]"
 EU_news.21.a: "잘가라"
 EU_news.22.t: "리스본 조약 50조가 철회됨"
 EU_news.22.d: "[FROM.GetNameWithFlag]는 리스본 조약 50조를 철회하였고 계속해서 §C[EUU.GetFlag] 유럽 연합§!에 남아있게 되었습니다."
 EU_news.22.a: "알겠다"
 EU_news.23.t: "탈퇴 조약"
 EU_news.23.d: "[FROM.GetNameWithFlag] 및 §C[EUU.GetFlag] 유럽 연합§! 탈퇴 조약을 체결했습니다.[FROM.GetNameWithFlag](은)는 탈퇴 조약에 명시된 조건에 따라 §C[EUU.GetFlag] 유럽 연합§!을 떠날 것입니다."
 EU_news.23.a: "잘가라, 친구여!"
 EU_news.24.t: "Article 50 Extension"
 EU_news.24.d: "[FROM.GetNameWithFlag](와)과 §C[EUU.GetFlag] 유럽 연합§!의 회원국들은 리스본 조약 50조의 기간을 3개월 연장하는데 동의하였습니다. 이제 [FROM.GetNameWithFlag](은)는 3개월 이내 §C[EUU.GetFlag] 유럽 연합§!을 떠나게 될 것입니다."
 EU_news.24.a: "알겠다"
 EU_news.34.t: "리스본 조약 50조가 발효됨"
 EU_news.34.d: "[FROM.GetNameWithFlag]는 리스본 조약 50조를 발효하였고 2년 이내 §C[EUU.GetFlag] 유럽 연합§!을 떠날 것입니다."
 EU_news.34.a: "알겠다"
 EU_news.25.t: "'유럽 해군 (EuroNavy)'에 함대를 양도"
 EU_news.25.d: "[FROM.GetNameWithFlag](은)는 유럽 해군 사무총장의 지위를 가지고 있는 [FROM.FROM.GetNameWithFlag]에게 그들의 함대를 양도합니다."
 EU_news.25.a: "알겠다"
 EU_news.26.t: "함대의 양도를 거부한 [FROM.GetNameWithFlag]!"
 EU_news.26.d: "[FROM.GetNameWithFlag](은)는 '유럽 해군 (EuroNavy)'에게 그들의 함대를 양도하지 않을 것입니다."
 EU_news.26.a: "알겠다"
 EU_news.27.t: "새로운 유럽 연합 가입국"
 EU_news.27.d: "[FROM.GetNameWithFlag]은(는) §C[EUU.GetFlag] 유럽 연합§!에 가입합니다."
 EU_news.27.a: "환영합니다!"
 EU_news.28.t: "유럽회의주의 감소 (3%)"
 EU_news.28.d: "[EUU.GetFlag] 유럽 연합에서 유럽회의주의가 감소되고 있습니다."
 EU_news.28.a: "알겠다"
 EU_news.29.t: "유럽회의주의 감소 (5%)"
 EU_news.29.d: "[EUU.GetFlag] 유럽 연합에서 유럽회의주의가 감소되고 있습니다."
 EU_news.29.a: "알겠다"
 EU_news.30.t: "유럽회의주의 증가 (3%)"
 EU_news.30.d: "[EUU.GetFlag] 유럽 연합에서 유럽회의주의가 감소되고 있습니다."
 EU_news.30.a: "알겠다"
 EU_news.31.t: "유럽회의주의 증가 (5%)"
 EU_news.31.d: "[EUU.GetFlag] 유럽 연합에서 유럽회의주의가 감소되고 있습니다."
 EU_news.31.a: "알겠다"
 EU_news.32.t: "전면적 통화 거래 (OMT) 프로그램"
 EU_news.32.d: "유럽 중앙은행 (ECB)는 전면적 통화 거래 (OMT) 프로그램을 시작하였습니다."
 EU_news.32.a: "알겠다"
 EU_news.33.t: "전면적 통화 거래 (OMT) 프로그램이 종료됨"
 EU_news.33.d: "현재의 전면적 통화 거래 (OMT) 프로그램이 종료되었습니다."
 EU_news.33.a: "알겠다"
 EU_news.45.t: "전면적 통화 거래 (OMT) 프로그램 축소하기"
 EU_news.45.d: "유럽 중앙은행은 전면적 통화 거래 (OMT) 프로그램을 축소시켰습니다.\n§Y전면적 통화 거래 (OMT) 크기 제한§! §R-$200§! x10억 추가.\n§Y이율§!이 §R4.0% 미만§!인 모든 회원국: 유럽회의주의 §G-5%§! 추가.\n§Y이율§!이 §R4.0% 이상§!인 모든 회원국: 유럽회의주의 §R+5%§! 추가.\n"
 EU_news.45.a: "알겠다"
 EU_news.46.t: "전면적 통화 거래 (OMT) 프로그램 확장하기"
 EU_news.46.d: "유럽 중앙은행은 전면적 통화 거래 (OMT) 프로그램을 확장시켰습니다.\n§Y전면적 통화 거래 (OMT) 크기 제한§! §G+$200§! x10억 추가.\n§Y이율§!이 §R4.0% 미만§!인 모든 회원국: 유럽회의주의 §R+5%§! 추가.\n§Y이율§!이 §R4.0% 이상§!인 모든 회원국: 유럽회의주의 §G-5%§! 추가.\n"
 EU_news.46.a: "알겠다"
 EU_news.47.t: "유럽방위동맹 (EDU)"
 EU_news.47.d: "적에 대한 공동의 관심사로부터 우리를 방어하기 위한 전략적인 자치권을 확보하고, 외부의 갈등과 위기에 대응하며, 인접국에 대한 보안 수준을 예측하기 위해서 회원국들은 그들만의 군사적 동맹을 통해 집단으로 NATO를 떠나기 위한 목적으로 유럽방위동맹 (EDU)를 형성하기로 결정하였습니다."
 EU_news.47.a: "알겠다"
 EU_news.48.t: "유럽방위동맹 (EDU)"
 EU_news.48.d: "공동의 이익을 방어하고, 대외 분쟁과 위기에 대응하며, 유럽 인접국에 대한 안보를 계획하는 데 필요한 전략적 자율성 확보를 위해 [EUU.GetFlag][EUU.GetName] 회원국들은 군사 동맹인 유럽 방위 동맹(EDU)을 결성하고 나토를 집단 탈퇴하기로 결정했습니다."
 EU_news.48.a: "알겠다"
 EU_news.49.t: "NATO 회원국이 그들을 떠나고 유럽방위국 (EDU)에 가입하였습니다."
 EU_news.49.d: "[FROM.GetNameWithFlag]은(는) NATO를 떠나고 [EUU.GetFlag] 유럽 연합과 유럽방위동맹 (EDU)에 가입합니다."
 EU_news.49.a: "알겠다"
 EU_news.50.t: "국경에서의 군사 훈련"
 EU_news.50.d: "[FROM.GetNameWithFlag](이)가 우리 국경에서 군사 훈련을 실행하고 있습니다. 우리는 이에 대응해야 할 것입니다."
 EU_news.50.a: "알겠다"
 EU_news.51.t: "군사 훈련에 대한 보복이 감행되다"
 EU_news.51.d: "[FROM.GetNameWithFlag](은)는 우리의 군사 훈련에 대한 보복을 시작하였고, 그들의 국경에서 그들의 군사 훈련을 실행합니다."
 EU_news.51.a: "알겠다"
 EU_news.35.t: "성공적인 친유럽주의 운동!"
