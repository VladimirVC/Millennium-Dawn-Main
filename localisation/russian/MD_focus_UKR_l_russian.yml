 ukraine_parliament.100.d: "Пророссийский блок в нашем парламенте завоевал большинство мест в парламенте благодаря тому, что российское правительство в настоящее время оказывает значительное влияние на Украину."
 ukraine_parliament.100.t: "Пророссийский блок получает большинство мест в парламенте"
 ukraine_parliament.100.a: "Посмотрим, как у них получится"
 ukraine_parliament.200.d: "Прозападный блок в нашем парламенте завоевал большинство мест в парламенте благодаря тому, что американское правительство в настоящее время оказывает значительное влияние на Украину."
 ukraine_parliament.200.t: "Pro-Western Bloc Wins Majority of the Seats"
 ukraine_parliament.200.a: "Посмотрим, как у них получится"
 ukraine_parliament.300.t: "Проукраинский блок получает большинство мест"
 ukraine_parliament.300.d: "Проукраинский блок в нашем парламенте получил большинство мест на недавних выборах, и это благодаря колеблющемуся влиянию американского правительства и российского правительства."
 ukraine_parliament.300.a: "Посмотрим, как у них получится"
 ukraine_parliament.400.t: "Парламентские выборы"
 ukraine_parliament.400.d: "Снова наступил сезон выборов, и по всей стране начали открываться кабинки для голосования. Надеемся, что явка избирателей будет достаточно высокой, чтобы добиться хороших перемен в стране."
 ukraine_parliament.400.a: "Посмотрим, как все пройдет"
 ukraine_parliament.1.t: "Парламент одобрил закон о централизации"
 ukraine_parliament.1.d: "Парламент принял решение о принятии законопроекта, который увеличивает расходы на бюрократию, в соответствии с нашим предложением, сделанным несколько дней назад/"
 ukraine_parliament.1.a: "Отлично"
 ukraine_parliament.2.t: "Парламент отклонил новый закон о централизации"
 ukraine_parliament.2.d: "Парламент отклонил законопроект, который увеличит расходы на бюрократию. Это произошло после нашего предложения, которое было внесено несколько дней назад, и, судя по всему, оно оказалось недостаточно популярным."
 ukraine_parliament.2.a: "Прискорбно"
 ukraine_parliament.2.b: "Возможно, небольшой подкуп заставит их передумать..."
 ukraine_parliament.3.t: "Парламент одобрил закон о децентрализации"
 ukraine_parliament.3.d: "Парламент одобрил нашу просьбу о сокращении расходов на бюрократию. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, судя по всему, предложение получило широкую поддержку населения."
 ukraine_parliament.3.a: "Отлично"
 ukraine_parliament.4.t: "Парламент отклонил новый закон о децентрализации"
 ukraine_parliament.4.d: "Парламент отклонил законопроект, который уменьшит расходы на бюрократию. Это произошло после нашего предложения, которое было сделано несколько дней назад, и, похоже, предложение оказалось недостаточно популярным."
 ukraine_parliament.4.a: "Прискорбно"
 ukraine_parliament.4.b: "Возможно, небольшой подкуп заставит их передумать..."
