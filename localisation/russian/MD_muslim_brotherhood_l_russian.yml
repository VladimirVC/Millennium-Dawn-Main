l_russian:
 muslim_brotherhood_sponsor: "Сеть Братьев - мусульман"
 muslim_brotherhood_suppressor: "Противостоять Братству"
 MB_build_network_hub: "Создайте Международную организацию"
 MB_build_network_hub_desc: "«Братья-мусульмане» — это трансграничное движение, его филиалы разбросаны по всему региону и не имеют единого центра. Пусть [Root.GetNameDef] станет таким центром, координирующим деятельность сети и дающим нам возможность поддерживать наших братьев за рубежом."
 MB_fund_affiliates: "Партнеры Фонда Brotherhood"
 MB_fund_affiliates_desc: "«Братство» в [FROM.GetNameDef] готово действовать, но у него мало ресурсов. Деньги, организаторы и постоянная поддержка укрепят их позиции в противостоянии с правительством, которое предпочло бы их уничтожить."
 MB_diplomatic_solidarity: "Призыв к Братству и Солидарности"
 MB_diplomatic_solidarity_desc: "Правительства стран, поддерживающих «Братство», вместе сильнее, чем по отдельности. Соберите их за одним столом, подтвердите общность целей, и пусть теплота наших отношений распространится по всему блоку."
 MB_bankroll_crackdown: "Bankroll a Foreign Crackdown"
 MB_bankroll_crackdown_desc: "[FROM.GetNameDef] watches the Brotherhood grow inside its borders without the means to act. Offer them the funds and intelligence to strike first, before the movement gathers strength enough to threaten the state."
 MB_designate_terrorist_organization: "Designate the Brotherhood a Terrorist Organization"
 MB_designate_terrorist_organization_desc: "Brand the Muslim Brotherhood for what we declare it to be: a terrorist organization. The designation costs little at home and places [Root.GetNameDef] shoulder to shoulder with every government that has drawn the same line."
 MB_counter_sponsor_influence: "Expose Brotherhood Financing"
 MB_counter_sponsor_influence_desc: "Someone is funding the Brotherhood in [FROM.GetNameDef], and the money leaves a trail. Expose it, disrupt it, and watch the movement lose momentum as its backers are dragged into the light."
 MB_rescind_terrorist_designation: "Rescind Terrorist Designation"
 MB_rescind_terrorist_designation_desc: "Quietly let the terrorist designation lapse. The posture against the Brotherhood has served its purpose, and there is little to gain in keeping old grievances on the books."
 MB_sponsored_network: "Sponsoring our Brotherhood movement"
 MB_funding_subversion: "Funding Brotherhood subversion abroad"
 MB_solidarity: "Muslim Brotherhood solidarity"
 MB_crackdown_patron: "Bankrolled our crackdown"
 MB_funding_repression: "Funding repression of the Brotherhood"
 MB_counter_bloc: "Common stance against the Brotherhood"
 MB_branded_terrorist: "Branded the Brotherhood a terrorist group"
 brotherhood.6.c: "Co-opt their moderates into government."
 brotherhood.11.t: "An Offer to Fund a Crackdown"
 brotherhood.11.d: "[FROM.GetNameDef] has quietly offered us money and intelligence to suppress the Muslim Brotherhood before it grows any stronger. Their envoys are waiting for an answer."
 brotherhood.11.a: "Accept the funding and move against them."
 brotherhood.11.b: "Decline the offer."