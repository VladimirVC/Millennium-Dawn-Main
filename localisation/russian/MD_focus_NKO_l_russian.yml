 NKO_Simhwajo_Sageon_legacy: "Наследие Симхваджо Сагеона"
 NKO_Simhwajo_Sageon_legacy_desc: "Симхваджо Сагеон — это масштабная кампания чисток, проводимая Ким Чен Иром с целью устранения людей его отца Ким Ир Сена, которая проводилась в КНДР в период с 1997 по 2000 год. \nНекоторые называли ее «северокорейской версией маккартизма» или «северокорейской версией культурной революции»."
