 eurozone_reforms: "Réformes de la zone euro"
 eurozone_reforms_desc: "La zone euro est actuellement au bord d'une crise de la dette comme l'Europe n'en a jamais connu depuis les années d'après-guerre. Nous devons réformer la zone euro en adoptant des réformes telles que l'§YUnion bancaire européenne§!, les §YEuro-obligations§! ou le §YMécanisme européen de stabilité (MES)§!.\n\nLa §Ycrise de la dette européenne§! peut être évitée en adoptant les réformes suivantes :\n- §YUnion bancaire européenne§!\n- §YEuro-obligations§!\n- §YMécanisme européen de stabilité§!\n"
