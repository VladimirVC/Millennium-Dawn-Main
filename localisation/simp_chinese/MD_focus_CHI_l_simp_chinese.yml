 apply_to_join_as_a_member_desc: "加入上海合作组织即可获得该组织的安全架构、经济投资渠道和政治协调机制的使用权。申请将启动为期90天的审议期，如果获得批准，将根据中国当前的战略重点方向授予相应的成员级别。"
 apply_to_join_as_an_observer_desc: "观察员地位允许申请者参加上海合作组织峰会、联合演习和经济协调机制，但无需承担正式成员的义务。申请者必须经过中国（以及在适用情况下，俄罗斯）为期90天的审查，审查通过后方可获得批准。"
 BRI_apply_for_mining_project: "申请参与“一带一路”矿业项目"
 BRI_apply_for_mining_project_desc: "请求中国投资开采铜、锂、稀土、铝土矿或铁矿石。"
 BRI_apply_for_pipeline_project: "申请“一带一路”管道项目"
 BRI_apply_for_pipeline_project_desc: "请求中国提供资金，用于建设一条将我们的资源基地与“一带一路”沿线承购商连接起来的石油、天然气或成品油管道。"
 BRI_apply_for_port_project: "申请“一带一路”港口项目"
 BRI_apply_for_port_project_desc: "请求中国投资在我们沿海地区建设深水港、集装箱码头或海运物流枢纽。"
 BRI_apply_for_powerplant_project: "申请“一带一路”电厂项目"
 BRI_apply_for_powerplant_project_desc: "请求中国提供资金，用于建设煤电、水电、太阳能或核电站，以缓解国内能源短缺。"
 BRI_apply_for_prestige_project: "申请“一带一路”声望项目"
 BRI_apply_for_prestige_project_desc: "申请一个标志性旗舰项目：体育场、议会大厦、总统府或会议中心。政治价值高，经济价值低。"
 BRI_apply_for_railway_project: "申请参与“一带一路”铁路项目"
 BRI_apply_for_railway_project_desc: "请求修建一条高速铁路或货运铁路走廊，将我国经济与更广泛的“一带一路”网络连接起来。"
 BRI_apply_for_sez_project: "申请加入“一带一路”经济特区"
 BRI_apply_for_sez_project_desc: "申请设立以中国为主体的经济特区，包括工业园区、海关设施和税收优惠待遇。"
 BRI_apply_for_telecom_project: "申请“一带一路”电信项目"
 BRI_apply_for_telecom_project_desc: "请求中国投资建设数字丝绸之路下的5G骨干网、光纤网络或数据中心集群。"
 BRI_request_loan_extension: "申请贷款延期"
 BRI_request_loan_extension_desc: "请愿北京方面重新协商违约的“一带一路”义务条款。"
 CHI_16_national_congress_mission: "中国共产党第十六次全国代表大会"
 CHI_16_national_congress_mission_desc: "中国共产党第十六次全国代表大会将于2002年召开，标志着领导层发生代际更迭。"
 CHI_16_national_congress_mission_tt: "§R这将绕过完成所需的国策§!§Y$CHI_the_shanghai_succession$§!"
 CHI_17_national_congress_mission: "中国共产党第十七次全国代表大会"
 CHI_17_national_congress_mission_desc: "第十七次全国代表大会将于2007年召开，以巩固现任领导层的各项议程。"
 CHI_18_national_congress_mission: "中国共产党第十八次全国代表大会"
 CHI_18_national_congress_mission_desc: "第十八次全国代表大会将于2012年召开，预计将带来重大的领导层变动。"
 CHI_19_national_congress_mission: "中国共产党第十九次全国代表大会"
 CHI_19_national_congress_mission_desc: "第十九次全国代表大会将于2017年召开，旨在审查党的发展方向并重申其领导地位。"
 CHI_20_national_congress_mission: "中国共产党第二十次全国代表大会"
 CHI_20_national_congress_mission_desc: "第二十次全国代表大会将于2022年召开，届时将面临领导层延续性和任期限制等问题。"
 CHI_21_national_congress_mission: "中国共产党第二十一次全国代表大会"
 CHI_21_national_congress_mission_desc: "第二十一次全国代表大会将于2027年召开，为党的下一个时代制定发展方向。"
 CHI_abolish_birth_limits: "取消出生限制"
 CHI_abolish_birth_limits_desc: "所有剩余的家庭规模限制均被正式废除。国家政策从限制生育转向积极鼓励生育，结束了始于毛泽东时代、并在邓小平时期制度化的人口控制时代。这一转变承认，如今限制生育的执行成本已超过其带来的任何人口效益，而且自愿生育率已远低于人口更替水平。"
 CHI_activate_princeling_network: "启动太子网络"
 CHI_activate_princeling_network_desc: "校友关系、商业联系和普通工作人员的资源被整合起来，形成一个协调一致的政策工具。“太子党网络”开始发挥作用，成为我们对平壤施加影响的决定性杠杆。"
 CHI_activate_rare_earth_embargo: "启动稀土禁运"
 CHI_activate_rare_earth_embargo_desc: "削减对日本的钨和铬出口。禁运将持续有效，直至解除、日本屈服或东京实现供应多元化。"
 CHI_adopt_three_child_policy: "三孩政策"
 CHI_adopt_three_child_policy_desc: "根据2020年人口普查结果，北京允许夫妇最多生育三个孩子，并同时推出一系列补贴、延长育儿假和限制课外辅导费用等措施。分析人士指出，韩国、日本和新加坡也曾尝试过类似措施，但效果有限；中国城市生活成本的快速上涨以及家庭规模缩小的文化趋势，构成了同样的结构性障碍。"
 CHI_adopt_two_child_policy: "二孩政策"
 CHI_adopt_two_child_policy_desc: "国务院宣布实行二孩政策，自2016年1月1日起生效。自1980年以来实施的独生子女限制政策将被取消，适用于所有夫妇。人口模型预测，出生率只会略有上升：经过几十年的小家庭观念，即使没有法律限制，生活成本、房价和女性劳动参与率等因素也抑制了生育率，使其远低于人口更替水平。"
 CHI_anti_desertification_belt: "三北防风林带扩建"
 CHI_anti_desertification_belt_desc: "自1978年起在中国北方、内蒙古和东北地区实施的“三北防护林工程”是全球规模最大的植树造林工程，计划到2050年种植880亿棵树。新一轮植树造林工程的重点是混交林，以稳固土壤、涵养融雪，并恢复黄土高原和浑善达克沙地退化的流域。恢复的植被覆盖可以减少黄河的泥沙含量，并减缓戈壁沙漠的南进。"
 CHI_arunachal_attack_475_from_589: "从西藏攻击藏南"
 CHI_arunachal_attack_475_from_589_desc: "从西藏向藏南发动边境战争。战备等级需高于60，紧张度需高于80。一旦发起进攻，解放军将对争议地区发起进攻，并设定明确的胜负和取消事件链。"
 CHI_arunachal_attack_589_from_475: "从藏南攻击西藏"
 CHI_arunachal_attack_589_from_475_desc: "从藏南向西藏发动边境战争。需要战备等级高于60，紧张度高于80。当印度占据藏南而中国试图争夺西藏走廊时，就会使用这种战术。"
 CHI_arunachal_attack_589_from_982: "从锡金攻击西藏"
 CHI_arunachal_attack_589_from_982_desc: "从锡金向西藏发动边境战争。需要战备值高于60，紧张度高于80。当印度占据锡金并试图利用中国的前沿阵地时，会使用此战术。"
 CHI_arunachal_attack_982_from_589: "从西藏攻击锡金"
 CHI_arunachal_attack_982_from_589_desc: "从西藏向锡金邦发动边境战争。战备水平需高于60，紧张程度需高于80。在洞朗地区边境开辟第二条施压前线。"
 CHI_arunachal_extort_xp: "从冲突中学习"
 CHI_arunachal_extort_xp_desc: "将边境战役中积累的战场经验转化为30点陆军经验，体现了在高海拔联合兵种作战中汲取的经验教训。需要至少50点战争进度点数。"
 CHI_arunachal_grab_475: "攻占藏南"
 CHI_arunachal_grab_475_desc: "在积累足够的战争进度点数后，正式确立中国对藏南的控制权。消耗80点进度点数将触发地区移交，并通过外交事件通知印度。"
 CHI_arunachal_grab_589: "控制西藏"
 CHI_arunachal_grab_589_desc: "当积累足够的战争进度点数后，中国正式控制西藏。消耗80点进度点数会触发地区移交，并通过外交事件通知印度。"
 CHI_arunachal_grab_982: "攻占锡金"
 CHI_arunachal_grab_982_desc: "在积累足够的战争进度点数后，正式确立中国对锡金的控制权。消耗80点进度点数将触发地区移交，并通过外交事件通知印度。"
 CHI_arunachal_prepare_army_training: "进行陆军演习"
 CHI_arunachal_prepare_army_training_desc: "步兵和指挥控制部队部署至喜马拉雅边境进行高海拔适应性演习。此次演习消耗30套步兵装备和7个指挥控制单元，耗费20点指挥点数，并将藏南的战备值提升5-20点。演习有10%的概率触发局势升级事件。"
 CHI_arunachal_prepare_arty_training: "进行炮兵训练"
 CHI_arunachal_prepare_arty_training_desc: "炮兵部队在喜马拉雅边境进行实弹演习，消耗五套火炮装备。此次训练消耗二十点指挥点数，并使藏南的战备值提升5-15点。"
 CHI_arunachal_prepare_attack: "准备步兵进攻"
 CHI_arunachal_prepare_attack_desc: "前线步兵部队采取咄咄逼人的巡逻姿态，并在印军控制阵地附近进行试探性行动，使藏南的紧张局势指数上升了10-25点。引发边境冲突升级的可能性为10%。"
 CHI_arunachal_prepare_mech_training: "进行机械化训练"
 CHI_arunachal_prepare_mech_training_desc: "机械化部队在实际控制线附近进行机动演习，消耗两栖车辆和主战坦克库存。训练消耗20点指挥点数，并将藏南的战备值提升10-30点。每次演习周期都有10%的概率引发冲突升级事件。"
 CHI_arunachal_prepare_shelling: "准备炮击"
 CHI_arunachal_prepare_shelling_desc: "炮兵部队越过实际控制线进行骚扰性炮击，使藏南紧张局势指数上升10-25点。每次炮击行动都有10%的概率触发边境冲突升级事件。"
 CHI_Asset_Seizure: "夺取战略资产"
 CHI_Asset_Seizure_desc: "将违约基础设施通过长期租赁或股权转让的方式转化为中国控股资产。仅适用于掠夺性贷款路径。"
 CHI_asteroid_mining_investment: "投资小行星采矿"
 CHI_asteroid_mining_investment_desc: "向商业太空资源项目投入资金。成功的运营将带来一项永久性的工业收益，收益来源包括铂族金属、稀土、挥发性物质和微重力制造。我们最多可以同时维持五个这样的项目。"
 CHI_asteroid_survey_mission: "近地小行星勘测"
 CHI_asteroid_survey_mission_desc: "以“天问”号探测器验证的深空导航技术为基础，探测探测器将绘制近地小行星的轨道和矿物成分图。成功的勘测将为商业太空资源开采打开大门。"
 CHI_automation_robotics_push: "自动化和机器人技术推动"
 CHI_automation_robotics_push_desc: "中国已成为全球最大的工业机器人安装国，其年部署量超过欧盟和美国的总和。国家主导的加速发展战略重点关注面临最严重劳动力短缺的劳动密集型制造业。投资涌入协作机器人、人工智能辅助生产线和智能物流系统，以资本替代因人口萎缩而减少的劳动力。"
 CHI_avic_innovation: "中航工业：原创创新"
 CHI_avic_innovation_desc: "中国航空工业集团公司是中国航空工业的庞大母公司。它迫使旗下研究机构进行创新而非抄袭，从而加快了中国空军赖以生存的飞机研发速度。"
 CHI_back_nepalese_communists: "支持尼泊尔共产党"
 CHI_back_nepalese_communists_desc: "将资金和意识形态支持输送给加德满都的共产党派别，逐渐将尼泊尔的政治天平向北京倾斜。"
 CHI_beijing_hosted_talks: "主办北京紧急峰会"
 CHI_beijing_hosted_talks_desc: "召集韩国领导人到北京进行紧急调解。当双边会谈破裂时，只有中国作为东道主才能促使双方重回谈判桌。"
 CHI_beijing_washington_consultation: "启动北京-华盛顿磋商"
 CHI_beijing_washington_consultation_desc: "一条通往美国国务院的秘密渠道使得北京和华盛顿得以绕过首尔，直接处理朝鲜问题。这种安排令东京感到不安，担心自己被边缘化。"
 CHI_big_fund_iii_allocate_tranche_decision: "分配大基金第三期"
 CHI_big_fund_iii_allocate_tranche_decision_desc: "国家集成电路产业投资基金第三期3440亿元人民币的资金将拨付给特定子行业。每一笔资金的拨付都能推动一座晶圆厂实现满负荷运转。"
 CHI_boycott_lotte: "抵制乐天"
 CHI_boycott_lotte_desc: "组织民众抵制乐天集团在中国的房产，以抗议乐天集团租赁土地用于部署萨德系统。"
 CHI_BRI_Forum_Triennial: "主办“一带一路”论坛"
 CHI_BRI_Forum_Triennial_desc: "每三年在北京举办一次“一带一路”国际合作高峰论坛。来自沿线各国的国家元首齐聚一堂，重申承诺并宣布新的旗舰项目。这需要至少150个“一带一路”专项资金。这是一笔巨额财政支出，并设有三年的冷却期。"
 CHI_BRI_management: "“一带一路”倡议"
 CHI_BRI_management_desc: "“一带一路”倡议是中国最重要的经济战略工具，它将信贷投入到全球伙伴国家的港口、铁路、能源走廊和数字基础设施建设中。每个项目都同时加强了实体互联互通和政治影响力。\n\n§Y国库：§! ¥[?CHI_bri_treasury|0]B  |  每月贡献：+[?CHI_bri_monthly_income_total|0]\n§Y工程;§! [?CHI_bri_committed_projects|0]/[?CHI_bri_project_slots|0]待发  §G[?CHI_bri_completed_projects|0]§!完成  |  §R[?CHI_bri_defaulted_projects|0]§!违约\n§Y全球影响力：§! [?CHI_bri_global_presence|0]  |  §G双赢 [?CHI_bri_winwin_score|0]§!  ·  §R掠夺性 [?CHI_bri_predatory_score|0]§!"
 CHI_BRI_promote_digital_silk_road: "升级数字丝绸之路"
 CHI_BRI_promote_digital_silk_road_desc: "当电信基础设施数量超过所需阈值时，这一决定将提升“数字丝绸之路”的层级概念，反映出中国建设的光纤网络、卫星地面站和华为提供的移动基础设施正在伙伴国家中普及。"
 CHI_BRI_promote_economic_zones: "升级经济特区"
 CHI_BRI_promote_economic_zones_desc: "当工业园区发展总量超过规定门槛时，该决定将经济特区层级理念提升，体现了中国企业管理的出口加工和物流中心，这些中心是供应链的支柱，并为中国企业在伙伴国家提供优惠条件。"
 CHI_BRI_promote_energy_arteries: "升级能源动脉"
 CHI_BRI_promote_energy_arteries_desc: "当管道建设总量超过所需阈值时，该决定将能源动脉级别理念升级，代表扩大了连接中亚生产商和中国炼油厂的石油和天然气输送基础设施，并减少了对海上咽喉要道的依赖。"
 CHI_BRI_promote_maritime_network: "升级海事网络"
 CHI_BRI_promote_maritime_network_desc: "当“一带一路”倡议的港口建设数量超过所需门槛时，这一决定将提升海上网络层级理念，扩大中国对从印度洋到地中海的海上贸易路线和特许港口准入的影响力。"
 CHI_BRI_promote_overland_corridors: "升级内陆走廊"
 CHI_BRI_promote_overland_corridors_desc: "当铁路建设总量超过所需阈值时，该决定将陆路走廊级别理念升级，反映出更多跨大陆铁路连接的完成，从而降低了运输成本，加深了中亚和高加索地区的经济依赖性。"
 CHI_BRI_promote_power_generation: "升级电力生产网络"
 CHI_BRI_promote_power_generation_desc: "当“一带一路”倡议资助的电厂建设超过规定门槛时，该决定将升级发电层级概念，反映出中国企业建设的煤炭、水力、太阳能设施，这些设施向伙伴经济体供应电力，同时也造成了长期的维护依赖。"
 CHI_BRI_promote_prestige_diplomacy: "升级外交声望"
 CHI_BRI_promote_prestige_diplomacy_desc: "当具有声望的项目竣工达到所需门槛时，该决定将提升声望外交的级别理念，体现地标性体育场、政府大楼和文化中心能够创造良好声誉并展现中国国家治理的影响力。"
 CHI_BRI_promote_resource_concessions: "升级资源特许权"
 CHI_BRI_promote_resource_concessions_desc: "当已获保障的资源特许权超过所需门槛时，该决定将资源特许权层级的概念升级，代表着为中国制造业供应链提供铜、钴、锂和其他战略矿产的长期开采协议。"
 CHI_BRI_recipient_actions: "“一带一路”倡议"
 CHI_BRI_recipient_actions_desc: "向中华人民共和国申请“一带一路”项目资金。"
 CHI_build_mega_rail_hub: "建设大型铁路枢纽"
 CHI_build_mega_rail_hub_desc: "在中国的一个主要城市建设一个规模庞大的综合性铁路枢纽，其规模堪比北京南站、上海虹桥站或广州南站。这些枢纽将高铁、地铁和城际线路融合到一个单一节点，从而加速整个区域的建设和物流发展。"
 CHI_build_public_housing: "建设公共住房"
 CHI_build_public_housing_desc: "调动建筑队在[FROM.GetName]建造国有租赁住房。项目将占用民用工厂产能两年，竣工后可减轻国家消费品负担。"
 CHI_caic_innovation: "昌河飞机工业：原创创新"
 CHI_caic_innovation_desc: "昌河飞机工业公司为解放军生产专用攻击直升机，从直-10到直-19。放任工程师们冒险尝试，加速了长期以来落后于西方设计的旋翼攻击机队的研发。"
 CHI_cancel_east_china_sea_exercise: "取消东海演习"
 CHI_cancel_east_china_sea_exercise_desc: "在争议岛屿钓鱼岛附近举行的海空演习，往往会激化与东京的关系。取消原定的演习计划，既能释放克制信号，又能安抚日本，还能支持和平崛起的叙事。"
 CHI_casc_innovation: "中国航天科技集团：原创创新"
 CHI_casc_innovation_desc: "中国航天科技集团公司负责国家的航天发射、弹道导弹和卫星发射。对其进行改革将加速支撑中国威慑力量的轨道和战略系统的建设。"
 CHI_casic_innovation: "中国航天科工集团公司：原创创新"
 CHI_casic_innovation_desc: "中国航天科工集团公司负责建造中国巡航导弹和战术导弹，从鹰击系列到对陆攻击系统，无所不包。允许其下属各部门承担风险，有助于提升精确打击能力。"
 CHI_central_theatre_command: "中央战区司令部"
 CHI_central_theatre_command_desc: "位于北京的中央战区司令部是战略预备队和首都的盾牌，掌握着支援其他所有方向部队的指挥权和士气。"
 CHI_cetc_innovation: "中国电子科技集团公司：原创创新"
 CHI_cetc_innovation_desc: "中国电子科技集团为所有现代平台提供雷达、传感器和作战管理系统。改革研发文化正推动中国计算机和人工智能迈向前沿。"
 CHI_chang_e_mission: "发射嫦娥探测器"
 CHI_chang_e_mission_desc: "嫦娥机器人探测器启程前往月球，着陆后进行勘测，并通过鹊桥卫星将数据传回。它传回的数据将为后续的航天员绘制月球地形图。随着发射经验的积累，成功率也会不断提高。"
 CHI_cheju_summit_arrangement: "安排济州峰会"
 CHI_cheju_summit_arrangement_desc: "济州岛作为度假胜地，为与韩国举行高层会谈提供了中立的平台。峰会或许能带来外交突破，但准备不足的会晤则可能招致公众的冷遇，使双方关系更加紧张。"
 CHI_convene_bilateral_channel: "召开双边渠道会议"
 CHI_convene_bilateral_channel_desc: "四方安全对话将美国、日本、印度和澳大利亚联合起来对抗北京。与东京私下建立双边渠道会动摇人们对该机制凝聚力的信心，并延缓其巩固进程。"
 CHI_crack_down_tibet_separatism: "严厉打击西藏分裂主义"
 CHI_crack_down_tibet_separatism_desc: "通过协调一致的安全和行政措施，镇压西藏各地的分裂组织。加强中央权威，加快一体化进程。"
 CHI_crack_down_xinjiang_separatism: "严厉打击新疆分裂主义"
 CHI_crack_down_xinjiang_separatism_desc: "在新疆各地部署内部安全部队，以瓦解分裂分子。此举加强了国家对该地区的控制，提高了民众的服从度，但也招致了国际社会的密切关注。"
 CHI_crewed_lunar_landing_mission: "让宇航员登陆月球"
 CHI_crewed_lunar_landing_mission_desc: "长征十号运载火箭从文昌航天中心分别发射孟州载人飞船和蓝月着陆器，两艘飞船将在月球轨道上会合。宇航员必须下降到月球南极地区，插上国旗，然后安全返回地球，这将使中国成为第二个将人类送上月球的国家。"
 CHI_critical_minerals_export_license_decision: "关键矿产出口限制"
 CHI_critical_minerals_export_license_decision_desc: "根据2023年8月生效的许可框架，限制镓、锗和稀土的出口。随着供应趋紧，每吨收入将增加。"
 CHI_crrc_innovation: "中国中车：原创创新"
 CHI_crrc_innovation_desc: "中国中车集团是世界最大的铁路装备制造商，拥有规模庞大的军民两用重工业基地。将其工程技术应用于国防领域，拓宽了其产业基础。"
 CHI_csgc_innovation: "中国兵器装备集团：原创创新"
 CHI_csgc_innovation_desc: "中国南方工业集团除了生产民用汽车外，还为军队制造装甲战车和轻武器。突破其谨慎的作风，打造出一系列现代化作战车辆。"
 CHI_csic_innovation: "中国船舶重工集团：原创创新"
 CHI_csic_innovation_desc: "中国船舶重工集团公司是中国潜艇设计的历史发源地，驱动着水下无声的舰队。其下属机构的改革正在加速下一代攻击型潜艇和弹道导弹潜艇的研发。"
 CHI_cssc_innovation: "中国船舶集团：原创创新"
 CHI_cssc_innovation_desc: "中国船舶集团是解放军海军水面舰队（包括航空母舰）背后的巨头。让其船厂进行创新，可以加快远洋海军战舰的建造速度。"
 CHI_cultivate_pyongyang_contacts: "拓展与平壤的联系"
 CHI_cultivate_pyongyang_contacts_desc: "中国仍然是朝鲜不可或缺的支持者，为其提供大部分燃料和食品。通过在平壤领导层内部建立隐秘关系，北京得以在不公开干预的情况下削弱朝鲜政权的内部稳定。"
 CHI_current_congress_mission: "全国代表大会召开中"
 CHI_current_congress_mission_desc: "全国代表大会正在召开，委员会任命正在最终确定中。"
 CHI_cxmt_hbm_qualification_decision: "长鑫存储的高带宽内存符合国内人工智能标准"
 CHI_cxmt_hbm_qualification_decision_desc: "将长鑫存储的高带宽内存转移到寒武纪科技、壁仞和摩尔线程加速器构建中，结束国内AI工作负载对英伟达和三星的依赖。"
 CHI_dandong_military_district: "加强丹东军区防御"
 CHI_dandong_military_district_desc: "丹东位于鸭绿江畔，与朝鲜隔江相望，是中朝边境的主要过境点。加强东北驻军体现了中朝“唇齿相依”的共同防御理念，并强化了东北边境的防御。"
 CHI_de_escalate_at_LAC: "在实际控制线附近缓和局势。"
 CHI_de_escalate_at_LAC_desc: "2020年加勒万河谷冲突后，中印两国在拉达克争议的实际控制线沿线持续对峙。命令边防人员从前沿阵地撤退，有助于缓和与新德里的对抗，并降低地区紧张局势。"
 CHI_Debt_Restructuring: "重组合伙人债务"
 CHI_Debt_Restructuring_desc: "向违约的“一带一路”伙伴国提供优惠的债务重组方案，清除违约标记，改善双边关系。此方案仅适用于“互利共赢”合作路径。"
 CHI_deploy_paf_maritime_militia: "部署中国海上民兵"
 CHI_deploy_paf_maritime_militia_desc: "钓鱼岛周围常驻海上民兵。每月加大对钓鱼岛的压力，增加发生意外事件的风险。"
 CHI_drip_irrigation_rollout: "滴灌推广"
 CHI_drip_irrigation_rollout_desc: "中国农业每年用水量超过3600亿立方米，其中大部分采用漫灌方式，其灌溉效率很少超过50%。借鉴以色列精准农业经验，并在新疆棉花种植区进行试点，全国范围内推广滴灌和微灌系统，可将每公顷田间用水量减少30%至50%。补贴设备计划和针对新建灌区的强制性能效标准，正推动这项技术从示范农场推广到更广泛的农业领域。"
 CHI_duv_breakthrough_decision: "推动上海微电子装备深紫外光刻项目"
 CHI_duv_breakthrough_decision_desc: "力促上海微电子公司进行28纳米浸没式光刻技术的演示。成功将重塑全球设备市场格局；失败则将耗费大量资金，并将项目进度再推迟一年。"
 CHI_eastern_theatre_command: "东部战区司令部"
 CHI_eastern_theatre_command_desc: "东部战区司令部总部位于南京，面向台湾海峡和东海。其部队以两栖突击和突破敌方海岸线防御所需的火力为核心构建。"
 CHI_eleventh_five_year_plan_mission: "第十一个五年计划"
 CHI_eleventh_five_year_plan_mission_desc: "中国的“十一五”规划（2006-2010年）设定了六项强制性发展目标，涵盖经济增长、第三产业扩张、工业产能、国家基础设施、能源效率和社会福利。国家发展和改革委员会将负责监督五年规划的进展情况。"
 CHI_establish_dandong_safe_houses: "建立丹东安全屋"
 CHI_establish_dandong_safe_houses_desc: "在鸭绿江沿岸设立安全屋，庇护和组织张成泽阵营的叛逃者。为未来的行动提供一个安静的舞台。"
 CHI_fabless_provincial_subsidy_decision: "省级无晶圆厂补贴轮"
 CHI_fabless_provincial_subsidy_decision_desc: "上海、深圳和北京分别用各自的风险投资来匹配中央大基金的资金，以支持设计公司集群的发展。"
 CHI_facilitate_family_reunions: "促进家庭团聚"
 CHI_facilitate_family_reunions_desc: "利用中国的物流网络组织跨境家庭团聚。这不仅能带来人道主义援助，还能增进外交关系。"
 CHI_factional_balance_category: "派系平衡"
 CHI_factional_balance_category_desc: "中国共产党并非铁板一块。内部各派系相互竞争，这些派系根植于裙带关系、意识形态倾向和个人晋升路径，争夺对人事任命、经济政策和政治改革步伐的影响力。维系这些内部派系之间的权力平衡是实现稳定治理的先决条件。"
 CHI_FOCAC_Summit: "召开中非合作论坛峰会"
 CHI_FOCAC_Summit_desc: "每三年举办一次中非合作论坛峰会。这有助于增强非洲伙伴国的共识，并表明中国对非洲发展议程的持续承诺。但此举会耗费财政和政治资源，且需等待三年才能恢复正常。"
 CHI_fund_princeling_ventures: "为太子党提供商业投资"
 CHI_fund_princeling_ventures_desc: "为朝鲜太子党经营的跨境企业提供资金。与中国资本挂钩的财富能够建立起意识形态无法企及的忠诚度。"
 CHI_fusion_program: "国家融合计划"
 CHI_fusion_program_desc: "将国家受控核聚变研究的重点放在合肥，这里是先进超导实验托卡马克装置、紧凑型聚变能实验装置以及计划中的中国聚变工程试验堆的所在地。掌握“人造太阳”有望获得取之不尽的清洁电力来源。"
 CHI_gobi_desert_solar_expansion: "戈壁太阳能和风能扩建阶段"
 CHI_gobi_desert_solar_expansion_desc: "在戈壁沙漠启动新一期太阳能电池板和风力涡轮机建设项目，以扩大可再生能源发电能力。每个阶段都需要大量的民用建设能力，并会暂时降低全国范围内的整体建设产能。"
 CHI_grey_society_crisis: "灰色社会危机"
 CHI_grey_society_crisis_desc: "中国的劳动年龄人口在2011年左右达到峰值，此后持续萎缩。长达四十年的独生子女政策导致人口年龄结构倒置：如今，一个孩子通常要赡养父母双方和四位祖父母，而养老金和医疗保健成本的增长速度超过了GDP的增长速度。未来十年将考验中国在劳动力萎缩和老龄化人口不断增长的情况下，能否维持经济增长。这场危机将持续多年；采取缓解措施可以缩短危机持续时间。"
 CHI_haig_innovation: "哈尔滨飞机工业集团：原创创新"
 CHI_haig_innovation_desc: "哈尔滨飞机工业集团生产解放军的运输直升机和通用直升机，包括直-9和新型直-20。解放其设计师可以加快打造一支多用途旋翼机队。"
 CHI_hsr_beijing_shanghai: "京沪高速铁路"
 CHI_hsr_beijing_shanghai_desc: "建设全长1318公里的京沪高速铁路，连接中国的政治和金融中心。这条高铁线路开通时将成为世界上最繁忙的高铁线路，以300公里/小时的速度运行，将旅程时间从14小时缩短至4小时40分钟。"
 CHI_hsr_beijing_tianjin: "京津城际铁路"
 CHI_hsr_beijing_tianjin_desc: "建设全长117公里的京津城际铁路​​，这是我们第一条设计商业运营速度为350公里/小时的高速铁路。两城之间的旅行时间将从70分钟缩短至30分钟，成为京津冀经济走廊的重要组成部分。"
 CHI_hsr_chengdu_chongqing: "成渝高速铁路"
 CHI_hsr_chengdu_chongqing_desc: "建设连接成都和重庆这两座西部大都市的高速铁路，建成后将这两座特大城市整合为一个一小时车程的经济圈，并构成不断扩展的西部高铁网络的主干线。"
 CHI_hsr_wuhan_guangzhou: "武广高速铁路"
 CHI_hsr_wuhan_guangzhou_desc: "建设全长1069公里的武汉至广州高速铁路，连接中国中部与珠江三角洲制造业中心地带。该铁路开通后将成为世界上最长的高速铁路，并将行程时间从十多个小时缩短至不到三个小时。"
 CHI_identify_beida_alumni: "识别北京大学校友"
 CHI_identify_beida_alumni_desc: "简介：这些朝鲜精英子弟均就读于北京大学。他们与中国的密切联系以及改革倾向，使他们成为未来政府的有力候选人。"
 CHI_industrial_investment_category: "石油化工和能源投资计划"
 CHI_industrial_investment_category_desc: "通过中国石化基地和可再生能源重点发展方向，可以制定战略性产业投资决策。"
 CHI_initiate_joint_exercises_with_RAJ: "与印度启动联合演习"
 CHI_initiate_joint_exercises_with_RAJ_desc: "与印度武装部队开展联合演习，以建立信任并巩固边境降级成果。"
 CHI_initiate_joint_military_training: "启动钢铁兄弟联合训练"
 CHI_initiate_joint_military_training_desc: "与巴基斯坦武装部队开展联合演习，以提高互操作性和理论一致性。"
 CHI_inner_mongolia_innovation: "第一机械集团：原创创新"
 CHI_inner_mongolia_innovation_desc: "内蒙古第一机械集团是中国装甲车辆的摇篮，在包头生产99式主战坦克。打破其官僚主义的保守作风，开启了新一代重型战车的篇章。"
 CHI_insert_jang_assets: "安插张成泽的线人"
 CHI_insert_jang_assets_desc: "将与张成泽结盟的特工秘密调回朝鲜境内。他们已就位，等待行动。"
 CHI_invest_domestic_arms_lines: "投资国内武器生产线"
 CHI_invest_domestic_arms_lines_desc: "国家直接向北方工业公司和中航工业公司的生产线注资，以便解放军的订单能够在国内完成，而不是通过俄罗斯国防出口公司的合同。每一轮投资都在缩小与俄罗斯供应商之间的差距。"
 CHI_invite_basf_caojing: "巴斯夫集团整合"
 CHI_invite_basf_caojing_desc: "批准巴斯夫在漕泾化工园区和湛江沿海地区建设一体化化学联合体的提案。这项87亿欧元的投资将先进的聚合物和丙烯酸酯制造工艺与整合了18个化工厂的公用设施、原材料和副产品流的工艺一体化模式相结合，这将是巴斯夫在欧洲以外的首个一体化生产基地。"
 CHI_invite_bayer_nanjing: "科思创材料科学中心"
 CHI_invite_bayer_nanjing_desc: "邀请科思创（原拜耳材料科技）在上海设立区域研发生产总部。这座价值30亿欧元的工厂将生产聚碳酸酯、聚氨酯前体和先进涂料，并将科思创的全球研发中心从德国迁至上海，从而将适用于工业和高性能材料的聚合物化学专业知识转移至上海。"
 CHI_invite_exxonmobil_jv: "埃克森美孚泉州合资公司"
 CHI_invite_exxonmobil_jv_desc: "批准埃克森美孚收购福建炼油石化公司泉州分公司25%的股权，这将建成首个中外合资的炼油石化一体化综合体。埃克森美孚将贡献先进的蒸汽裂解和聚烯烃生产技术，以及大规模一体化炼油的运营经验。"
 CHI_invite_JAP_hitachi: "邀请日立"
 CHI_invite_JAP_hitachi_desc: "日立工业和国防电子事业部生产的铁路控制系统、发电设备和嵌入式计算硬件在中国工业和军事基础设施中有着广泛的军民两用应用。"
 CHI_invite_JAP_honda: "邀请本田汽车公司"
 CHI_invite_JAP_honda_desc: "本田的动力总成工程和机器人部门贡献了紧凑型发动机技术和工厂自动化系统，这些技术既适用于民用制造，也适用于国防相关生产线。"
 CHI_invite_JAP_howa: "邀请丰和工业"
 CHI_invite_JAP_howa_desc: "丰和机械是日本陆上自卫队89式和20式突击步枪的主要制造商。其精密加工工艺和小武器生产线管理具有直接可转移的价值。"
 CHI_invite_JAP_ihi: "邀请IHI株式会社"
 CHI_invite_JAP_ihi_desc: "IHI株式会社是日本领先的航空发动机和船舶推进系统制造商，根据西方合作伙伴的许可，生产军用飞机涡扇发动机和海军舰艇涡轮部件。"
 CHI_invite_JAP_jmu: "邀请日本海洋联合"
 CHI_invite_JAP_jmu_desc: "日本海洋联合公司是日本海上自卫队的主要水面作战舰艇建造商，负责建造出云级直升机驱逐舰和爱宕级导弹驱逐舰。其模块化船舶设计方法可直接应用于中国造船项目。"
 CHI_invite_JAP_jr_east: "邀请东日本旅客铁道"
 CHI_invite_JAP_jr_east_desc: "东日本旅客铁道运营着世界上最先进的高速铁路网络。其在车辆工程、信号系统和基础设施维护方面的专业技术，既创造了民用经济价值，也推动了战略交通现代化。"
 CHI_invite_JAP_jsw: "邀请日本制钢所"
 CHI_invite_JAP_jsw_desc: "日本制钢所是世界领先的大直径钢锻件生产商，其产品广泛应用于压力容器、舰炮炮管和核反应堆部件。其冶金技术将直接提升中国重工业的产出。"
 CHI_invite_JAP_kawasaki_aerospace: "邀请川崎重工（航空航天）"
 CHI_invite_JAP_kawasaki_aerospace_desc: "川崎的航空航天部门生产C-2运输机和P-1海上巡逻机，使其在大型机身结构和任务系统集成方面拥有深厚的专业知识，这些知识与商业和国防应用都密切相关。"
 CHI_invite_JAP_kawasaki_shipbuilding: "邀请川崎重工（造船）"
 CHI_invite_JAP_kawasaki_shipbuilding_desc: "川崎重工的造船部门负责苍龙级潜艇的建造。其潜艇耐压壳体制造和声学特征降低方面的技术代表着海军能力的重大转移。"
 CHI_invite_JAP_komatsu: "邀请小松制作所防务"
 CHI_invite_JAP_komatsu_desc: "小松防务为日本陆上自卫队生产轻型装甲车和自行火炮。其模块化结构和轻型装甲解决方案与中国现有的车辆项目相辅相成。"
 CHI_invite_JAP_mhi_tank: "邀请三菱重工（陆地系统）"
 CHI_invite_JAP_mhi_tank_desc: "三菱重工陆地系统事业部生产10式和90式主战坦克以及一系列装甲车辆。合作内容包括装甲设计方法和先进复合装甲技术的转移。"
 CHI_invite_JAP_mitsubishi_aerospace: "邀请三菱航空"
 CHI_invite_JAP_mitsubishi_aerospace_desc: "三菱重工的航空航天部门是日本先进军用飞机的主要开发商，其产品包括F-2平台和正在研发中的F-X项目。该公司在中国的业务将为其带来机身工程技术和军民两用飞机制造能力。"
 CHI_invite_JAP_mitsubishi_shipbuilding: "邀请三菱船务"
 CHI_invite_JAP_mitsubishi_shipbuilding_desc: "三菱造船部门为日本海上自卫队建造驱逐舰船体和潜艇压力容器，提供适用于高端军舰项目的海军建造技术和精密焊接工艺。"
 CHI_invite_JAP_nec: "邀请日本电气"
 CHI_invite_JAP_nec_desc: "日本电气公司是日本领先的C4ISR系统、卫星通信硬件和信号情报平台开发商。其集成技术专长涵盖国防电子产品和民用网络基础设施。"
 CHI_invite_JAP_nippon_steel: "邀请新日铁"
 CHI_invite_JAP_nippon_steel_desc: "新日铁是全球最大的高强度结构钢生产商之一。其高硬度装甲板和特种合金产品服务于日本国防工业和更广泛的基础设施领域。"
 CHI_invite_JAP_panasonic: "邀请松下"
 CHI_invite_JAP_panasonic_desc: "松下为日本国防供应链提供先进的电池技术、加固型电子产品和热成像组件，其生产标准可直接应用于军事平台集成。"
 CHI_invite_JAP_subaru: "邀请斯巴鲁航空航天"
 CHI_invite_JAP_subaru_desc: "斯巴鲁公司的航空航天部门获得许可生产直升机机身和固定翼飞机机身部件，尤其擅长精密金属加工和旋翼结构设计。"
 CHI_invite_JAP_toshiba: "邀请东芝防务系统"
 CHI_invite_JAP_toshiba_desc: "东芝防务系统为日本自卫队生产雷达阵列、电子战套件和导弹制导硬件，为合作关系带来了关键的传感器技术和嵌入式系统工程。"
 CHI_invite_JAP_toyota: "邀请丰田汽车公司"
 CHI_invite_JAP_toyota_desc: "丰田先进的制造系统和准时制物流原则不仅是商用车生产的基础，也是向日本武装部队提供的轻型多用途车和物流车项目的基础。"
 CHI_invite_saudi_aramco: "沙特阿美战略炼油厂股份"
 CHI_invite_saudi_aramco_desc: "沙特阿美拟向福建炼油石化公司和位于大连的恒力石化集团提供股权。沙特阿美持有福建炼油石化25%的股份和恒力石化10%的股份，两者合并后，炼油产能合计达每​​日40万桶，并拥有来自阿拉伯半岛的原油供应管道，从而确保中国炼油行业长期依赖沙特原油供应。"
 CHI_invite_shell_chem: "壳牌大亚湾化学合作"
 CHI_invite_shell_chem_desc: "扩大壳牌与中海油在广东大亚湾石化园区的合资企业。壳牌与中海油各持股50%的合资企业运营着一套年产160万吨的乙烯裂解装置，并生产聚乙烯、聚丙烯、乙二醇、聚醚多元醇和苯乙烯，使中国南部沿海地区的下游化工产品生产多元化。"
 CHI_jap_capitulate_to_demands: "向中国的要求屈服"
 CHI_jap_capitulate_to_demands_desc: "接受北京的条件。禁运解除，但国内的政治代价是实实在在的。"
 CHI_jap_diversify_rare_earth: "多元化稀土供应"
 CHI_jap_diversify_rare_earth_desc: "一份为期一年的紧急计划，旨在摆脱对中国稀土的依赖。虽然痛苦，但会使未来的禁运失效。"
 CHI_jap_open_back_channel: "开启秘密渠道会谈"
 CHI_jap_open_back_channel_desc: "利用后方通道降低钓鱼岛威胁的温度。"
 CHI_jap_reinforce_coast_guard: "加强海岸警卫队"
 CHI_jap_reinforce_coast_guard_desc: "日本海上自卫队在东海增派巡逻力量，虽然能遏制中国入侵，但也加剧了局势升级的恶性循环。"
 CHI_japan_strategy: "日本战略"
 CHI_japan_strategy_desc: "中日竞争的方方面面：稀土胁迫、区域全面经济伙伴关系协定合作、钓鱼岛海域施压、秘密外交以及产业合作邀请。北京和东京都在此基础上做出决策，两国关系在胁迫与妥协之间摇摆不定。"
 CHI_kaesong_expansion: "扩建开城复合体"
 CHI_kaesong_expansion_desc: "开城工业区曾是韩国首都雇佣朝鲜劳动力的场所，但随着朝韩关系破裂，该工业区于2016年关闭。促成其作为共同开发商重新开放，既能缓解朝鲜半岛的紧张局势，又能将朝韩双方与中国投资联系起来。"
 CHI_KPA_Officer_Exchange: "朝鲜人民军军官交流计划"
 CHI_KPA_Officer_Exchange_desc: "派遣解放军军官前往平壤，与朝鲜人民军同行进行联合训练和计划制定。每一次这样的周期都会加深双方的军事互操作性，并增强中国对朝鲜指挥系统的影响力。"
 CHI_kpop_media_ban: "韩流媒体禁令"
 CHI_kpop_media_ban_desc: "限制韩国娱乐内容在中国的播放和传播。这项禁令针对韩流文化产品，意在以此要挟首尔在安全政策上的选择。"
 CHI_LATAM_emergency_aid: "向拉丁美洲合作伙伴提供紧急援助"
 CHI_LATAM_emergency_aid_desc: "向拉丁美洲安全联盟伙伴提供一笔酌情援助计划。这有助于增强其稳定性，并提升我们的影响力。"
 CHI_LATAM_intel_sharing_pact: "情报共享协议"
 CHI_LATAM_intel_sharing_pact_desc: "与伙伴政府建立双边情报共享渠道。给予对等军事准入，并加强伙伴关系。"
 CHI_LATAM_military_advisors: "部署军事顾问"
 CHI_LATAM_military_advisors_desc: "向伙伴军队派遣解放军训练干部，转移军队经验，深化防务关系。"
 CHI_LATAM_security_options: "拉丁美洲安全选项"
 CHI_launch_payload: "发射负载"
 CHI_launch_payload_desc: "保持酒泉、西昌、文昌和太原四个航天发射场的稳定发射频率。每一次成功的发射都能积累运行经验，提高我们旗舰任务的成功率，也是我们最终实现登月目标的先决条件。"
 CHI_lift_rare_earth_embargo: "解除稀土禁运"
 CHI_lift_rare_earth_embargo_desc: "取消稀土出口禁令。东京暂时松了一口气。"
 CHI_lift_thaad_sanctions: "解除萨德制裁"
 CHI_lift_thaad_sanctions_desc: "正式解除因部署“萨德”系统而实施的非正式经济制裁。此举表明韩国愿意与首尔实现关系正常化。"
 CHI_localise_licensed_system: "本地化授权系统"
 CHI_localise_licensed_system_desc: "对目前根据俄罗斯许可证制造的系统（无论是发动机、雷达还是导弹导引头）进行逆向工程和国产化，从而减少支付给莫斯科的专利费，并证明中国工业可以自力更生。"
 CHI_locate_jang_loyalists: "找到张成泽的忠实拥护者"
 CHI_locate_jang_loyalists_desc: "查明散落在边境地区的张成泽派系的幸存成员。被清洗的人员仍然对金氏核心圈子怀有怨恨。"
 CHI_mature_node_export_drive_decision: "成熟节点出口驱动"
 CHI_mature_node_export_drive_decision_desc: "补贴中芯国际和华宏半导体的客户，让他们用28纳米以下的芯片充斥全球汽车、物联网和白色家电市场。每一批芯片都积累了行业舆论。"
 CHI_megaprojects: "国家大型工程"
 CHI_megaprojects_desc: "中国历来热衷于国家主导的大型项目，从三峡大坝到世界最大的高速铁路网，都体现了这一点。国家投入大量资源建设旗舰项目，重塑国家的水利、电力和交通运输体系。"
 CHI_military_decisions_category: "军事重组"
 CHI_MSS_Pyongyang_Station: "国家安全部平壤站点"
 CHI_MSS_Pyongyang_Station_desc: "扩大国家安全部在平壤的驻地，以增强对朝鲜领导层的情报覆盖范围和对政权不稳定的预警能力。"
 CHI_MSS_Quiet_Removal_Operation: "静默移除行动"
 CHI_MSS_Quiet_Removal_Operation_desc: "国家安全部已确定平壤存在阻碍改革议程的强硬派。谨慎操作可以消除障碍，为进一步自由化扫清道路。"
 CHI_national_commitee_decisions_category: "全国委员会"
 CHI_national_commitee_decisions_category_desc: "\n£MAIN_desctext_sco \n\n\n\n中国共产党中央委员会在全国代表大会闭会期间负责党的各项事务。每五年召开一次全国代表大会，选举中央委员，任命各级书记，并确定党的政治方向。"
 CHI_NKO_Rason_SEZ_Investment: "罗先经济特区投资"
 CHI_NKO_Rason_SEZ_Investment_desc: "承诺直接向罗先经济特区提供资金。这项投资将解锁港口通道，并展现朝鲜经济改革的可行性。"
 CHI_norinco_innovation: "北方工业公司：原创创新"
 CHI_norinco_innovation_desc: "中国北方工业集团是中国最大的陆军系统集团，为整个陆军提供轻武器和火炮。其设计部门摆脱了谨慎模仿的模式，得以追求真正全新的步兵和火炮系统。"
 CHI_northern_theatre_command: "北部战区司令部"
 CHI_northern_theatre_command_desc: "以沈阳为中心，北方战区覆盖朝鲜半岛和俄罗斯边境地区。该战区注重作战计划和重型合成兵种部队的协同作战。"
 CHI_olympic_athlete_village: "运动员村和媒体中心"
 CHI_olympic_athlete_village_desc: "在奥林匹克公园北侧建设奥运运动员村和国际媒体广播中心。建成后，这些建筑将改建为住宅和商业用途，增加北京的住房和办公用地。"
 CHI_olympic_environmental_program: "环境计划"
 CHI_olympic_environmental_program_desc: "加快北京市供热管网煤改气，搬迁首都钢铁集团污染最严重的设施，并在周边山区开展大规模植树造林活动。该计划旨在将空气质量提升至奥运会标准，并展现中国对可持续发展的承诺。"
 CHI_olympic_mission: "为北京奥运会做好准备"
 CHI_olympic_mission_desc: "我们已承诺举办2008年北京奥运会。国际社会将密切关注。请在截止日期前为所有四个筹备项目 - 场馆、运动员住宿、交通和环境 - 提供资金。未能按时完成将令政府蒙羞，并损害公众信任。"
 CHI_olympic_preparations: "奥运会备战"
 CHI_olympic_preparations_tt: "如果我们能够完成所有奥运备战国策，我们将获得："
 CHI_olympic_transport_links: "奥林匹克交通通道"
 CHI_olympic_transport_links_desc: "将地铁线路延伸至奥林匹克公园，开通北京首都机场快线，并升级秦皇岛至沈阳铁路走廊，以应对奥运会期间及之后预计激增的客货运输量。"
 CHI_olympic_venue_construction: "奥运场馆建设"
 CHI_olympic_venue_construction_desc: "为奥林匹克绿地区的国家体育场、国家游泳中心和国家自行车馆的建设提供资金。这些标志性场馆将成为2008年北京奥运会的永久遗产，并兼作首都的商业和体育中心。"
 CHI_pacific_pla_training: "太平洋解放军训练"
 CHI_patrol_diaoyu_fishing_grounds: "巡逻钓鱼岛渔场"
 CHI_patrol_diaoyu_fishing_grounds_desc: "派遣海上民兵进入争议水域。压力增大，东京将被迫做出反应。"
 CHI_pla_joint_maritime_exercise: "太平洋联合海上演习"
 CHI_pla_joint_maritime_exercise_desc: "与太平洋“一带一路”伙伴国开展联合海上演习，提升其海军经验，增强我们在该地区的影响力。"
 CHI_pla_train_SOL: "训练所罗门群岛安全部队"
 CHI_pla_train_SOL_desc: "派遣解放军训练干部协助所罗门群岛安全部队。交流军队经验，深化防务关系。"
 CHI_poly_innovation: "保利科技：原创创新"
 CHI_poly_innovation_desc: "解放军武器出口机构保利科技集团掌控着中国军工产品的全线产品。将其商业触角转向真正的研发，将​​推动整个国防领域的进步。"
 CHI_Press_NKO_on_Nuclear: "敦促平壤就核克制问题表态"
 CHI_Press_NKO_on_Nuclear_desc: "对朝鲜施加直接外交压力，促使其冻结核试验并限制核部署。虽然进展缓慢，但能向华盛顿表明，北京是防扩散领域的重要合作伙伴。"
 CHI_pressure_iaea_access: "敦促国际原子能机构访问"
 CHI_pressure_iaea_access_desc: "向平壤施压，要求其允许国际原子能机构核查人员进入宁边核设施。中国的压力能够奏效，而西方的要求只会加剧朝鲜的抵抗。"
 CHI_princeling_intelligence_report: "太子党情报报告"
 CHI_princeling_intelligence_report_desc: "整合来自朝鲜领导层内部网络资源的最新报道。每一次审查都让我们对该政权的派系、竞争和压力点有了更清晰的了解。"
 CHI_pro_natalist_subsidies: "鼓励生育补贴"
 CHI_pro_natalist_subsidies_desc: "中国各地地方政府开始发放直接现金补贴、购房补贴，并延长产假和陪产假，以鼓励生育。吉林省和四川省等省份试点推行的补贴项目，每个孩子可获得数万元人民币的补贴。国际比较表明，大量的财政支出只能带来微弱的生育率提升，但这些补贴能在短期内降低家庭开支，并提振国内消费。"
 CHI_propose_unity_government: "提议组建韩国统一政府"
 CHI_propose_unity_government_desc: "正式向中方提出在相互承认的前提下组建过渡性联合政府的方案。这是本世纪最大胆、风险也最大的外交举措。"
 CHI_push_rcep_signing: "推动区域全面经济伙伴关系协定签署"
 CHI_push_rcep_signing_desc: "2020年11月签署、将于2022年1月生效的《区域全面经济伙伴关系协定》将中国、日本、韩国、东盟国家、澳大利亚和新西兰纳入全球最大的自由贸易区。该协定的签署使我们稳居亚洲贸易中心。"
 CHI_railway_central_upgrade: "中央铁路走廊升级改造"
 CHI_railway_central_upgrade_desc: "升级华中地区及北京枢纽的铁路客运站和基础设施，覆盖湖北、河南和北京。加强这一走廊建设可缓解中国货运最繁忙的干线交通拥堵，并改善向内陆制造业区输送工业原材料的条件。"
 CHI_railway_east_upgrade: "东部铁路走廊升级改造"
 CHI_railway_east_upgrade_desc: "升级华东和华中地区的铁路枢纽和基础设施，将江西、安徽和四川连接成一个连续的货运和客运网络。这些改进措施将提高区域建设能力，并缩短工业原料从沿海港口向内陆运输所需的时间。"
 CHI_railway_improvement: "国家铁路现代化"
 CHI_railway_north_upgrade: "北部铁路走廊升级改造"
 CHI_railway_north_upgrade_desc: "升级改造连接河北、山西及周边省份的华北走廊沿线铁路枢纽和地面基础设施。铁路运力的提升将提高物资运输效率，降低物流成本，并加快整个区域的建设进程。"
 CHI_railway_south_upgrade: "南部铁路走廊升级改造"
 CHI_railway_south_upgrade_desc: "升级华南和云南的铁路枢纽和基础设施，将广东、湖南和西南边境省份纳入国家铁路网。该计划旨在加快制成品和农产品的运输，同时支持沿线产业的扩张。"
 CHI_railway_west_upgrade: "西部铁路走廊升级改造"
 CHI_railway_west_upgrade_desc: "升级西北和西南地区的铁路枢纽和基础设施，将陕西、甘肃、重庆和新疆等地接入国家货运网络。这项投资降低了西部工业园区的运输成本，并使此前与世隔绝的省份能够融入大规模制造业供应链。"
 CHI_raise_retirement_age: "提高退休年龄"
 CHI_raise_retirement_age_desc: "中国的法定退休年龄于1978年设定，是世界上最低的退休年龄之一：男性60岁，白领女性55岁，蓝领女性50岁。逐步提高退休年龄可延长工作年限两到五年，使经验丰富的劳动者能够更长时间地留在劳动力市场，从而减轻养老金体系的压力。然而，预期提前退休的劳动者和担心就业减少的年轻人对此存在相当大的抵触情绪。"
 CHI_rare_earth_chip_leverage_decision: "利用稀土控制"
 CHI_rare_earth_chip_leverage_decision_desc: "将解除西方对中国芯片的禁运与中国继续出口稀土和镓挂钩。与华盛顿展开对话：成功将放松管制并促进中国自主发展，拒绝则会加剧禁运并浪费已投入的政治资本。"
 CHI_rare_earth_embargo_decision: "拉动稀土杠杆"
 CHI_rare_earth_embargo_decision_desc: "中国提炼了全球近90%的稀土元素，这些元素是所有导弹和隐形飞机内部磁体的关键部件。切断竞争对手的稀土供应将导致其国防生产停滞数月，代价是政治资本的损失以及作为不可靠供应商的声誉受损。"
 CHI_rare_earth_supply_assurance: "保证稀土供应"
 CHI_rare_earth_supply_assurance_desc: "中国提炼了全球绝大部分稀土元素，而这些稀土元素是韩国半导体、电池和显示器的重要原料。向首尔提供有保障的稀土供应，使我们成为可靠的合作伙伴，并削弱了华盛顿对其盟友的控制。"
 CHI_rcep_deepening: "区域全面经济伙伴关系协定深化"
 CHI_rcep_deepening_desc: "建议加快落实对区域伙伴的区域全面经济伙伴关系协定承诺。深化与亚太地区的经济一体化，巩固了中国作为该地区不可或缺的经济伙伴的地位。"
 CHI_recall_paf_maritime_militia: "召回海上民兵"
 CHI_recall_paf_maritime_militia_desc: "撤回常驻民兵，让压力缓和下来。"
 CHI_rein_in_cliques: "遏制小团体"
 CHI_rein_in_cliques_desc: "在走私集团和裙带关系网络发展壮大到无法控制之前，要定期对其进行审计。追回被挪用的资金可以充实国库，重振党的信心，尽管军官团对这种审查感到不满。"
 CHI_replace_synopsys_cadence_decision: "替换新思科技和楷登电子"
 CHI_replace_synopsys_cadence_decision_desc: "2025年5月出口禁令生效后，将所有国内无晶圆厂推向华大九天科技、概伦和芯和EDA流程，以实现完整的设计覆盖。"
 CHI_retry_chang_e_mission: "重新启动嫦娥探测器"
 CHI_retry_chang_e_mission_desc: "探测器未能抵达或勘测月球。制造一个替代探测器并送其升空。"
 CHI_retry_shenzhou_mission: "神舟任务重飞"
 CHI_retry_shenzhou_mission_desc: "上次尝试失败了。检查飞行数据，排除故障，准备发射另一枚神舟飞船。"
 CHI_retry_tiangong_mission: "重试天宫对接"
 CHI_retry_tiangong_mission_desc: "对接或模块插入未按计划进行。请重新调整并再次尝试空间站组装。"
 CHI_sac_innovation: "沈阳飞机工业集团：初始创新"
 CHI_sac_innovation_desc: "沈阳飞机制造集团为中国人民解放军空军和海军生产重型战斗机，从歼-11系列到舰载歼-15和歼-35。对其进行改革将提升中国空战的尖端水平。"
 CHI_sco_anti_terror_crackdown: "发起反恐镇压"
 CHI_sco_anti_terror_crackdown_desc: "指示安全部门在上海合作组织“三股势力”框架下，对恐怖网络进行全面打击。此举暂时提升了我国的反恐态势，但会损害国内稳定。"
 CHI_sco_apply_as_dialogue_partner: "申请对话伙伴身份"
 CHI_sco_apply_as_dialogue_partner_desc: "我们可以正式申请成为上海合作组织的对话伙伴。这是与中国及其伙伴开展更深入合作的第一步。"
 CHI_sco_category: "上海合作组织"
 CHI_sco_category_desc: "\n£MAIN_desctext_sco \n\n\n\n§Y上海合作组织§!（简称§Y上合组织§!）是一个专注于经济、政治和安全合作的欧亚政府间组织。它起源于§Y上海五国§!，并已发展成为一个广泛的框架，§Y[CHI.GetFlag]中国§!和§Y[SOV.GetFlag]俄罗斯§!通过该框架扩大其影响力，同时维护地区稳定与合作。\n\n与传统联盟不同，§Y上海合作组织§!通过逐步一体化的方式发展壮大。各国可以先成为§Y对话伙伴§!，然后成为§Y观察员§!，最终申请成为§Y正式成员§!。\n\n各国与§Y上海合作组织合作§!的意愿取决于以下几个因素：\n\n§Y中国侵略度§!反映了§Y[CHI.GetFlag]中国§!的强势程度。较低级别的侵略性会使组织更具吸引力，而较高级别的侵略性则会阻碍合作，甚至可能导致成员疏远。\n\n§Y上海合作组织凝聚力§!代表着成员国之间的内部稳定和信任。高度凝聚力能够提升合作水平和项目成效，而低凝聚力则会减缓一体化进程，并增加成员国退出合作组织的风险。\n\n§Y中俄平衡§!决定着该组织的内部政治稳定。平衡的关系能够确保组织的平稳发展，而任何一方的强势都可能导致摩擦、延误或合作减少。\n\n通过联合§Y经济§!、§Y安全§!和§Y战略项目§!，§Y上海合作组织§!使其成员能够扩大影响力，加强区域联系，并在欧亚大陆建立替代性权力集团。\n\n如果中国侵略度超过§R5§!和§R10§!，§Y[JAP.GetNameWithFlag]§!将获得新的选择，以扩大其宪法第9条的范围，从而对抗 [CHI.GetFlag]§Y[CHI.GetAdjectiveCap]§!的军事立场。\n\n$CHI_chinese_aggression_display$\n$CHI_sco_cohesion_display$\n$CHI_sco_balance_display$"
 CHI_sco_cohesion_decay: "上海合作组织凝聚力调整"
 CHI_sco_cohesion_decay_desc: "一项隐性的年度调整机制，旨在使上海合作组织凝聚力指数向其5的自然平衡值靠拢，每增加一个大型项目，该指数便向上调整0.5分。如果凝聚力高于平衡值，则降低1分；如果低于平衡值，则增加1分。"
 CHI_sco_consider_leaving: "重新考虑加入上海合作组织"
 CHI_sco_consider_leaving_desc: "一项由人工智能管理的隐性决策机制，通过该机制，成员国和观察员国将评估与北京关系恶化或上海合作组织内部凝聚力问题加剧是否足以构成降低其参与级别的理由。受中国侵略影响程度较高或对中国评价较低的国家，将更认真地考虑退出。"
 CHI_sco_upgrade_to_member: "申请成为上海合作组织正式会员"
 CHI_sco_upgrade_to_member_desc: "作为上海合作组织的观察员国，我们现在可以申请成为上海合作组织的正式成员。"
 CHI_sco_upgrade_to_observer: "申请观察员国地位"
 CHI_sco_upgrade_to_observer_desc: "既然我们已经确立了对话伙伴的地位，现在就可以寻求上海合作组织的正式观察员地位，从而获得更广泛的经济和政治合作机会。"
 CHI_scs_assertive_patrol_MAY: "积极巡逻：马来西亚南沙群岛"
 CHI_scs_assertive_patrol_MAY_desc: "命令中国人民解放军海军舰队进入南沙群岛南部鲁克尼亚暗沙群附近与马来西亚存在争议的水域。吉隆坡与我国的经济联系使其应对方案复杂化，但仍需取得决定性胜利才能推进反击。鉴于马来西亚的谨慎姿态，双方交锋往往难以取得结果；任何挫折都可能破坏基础设施贷款关系。"
 CHI_scs_assertive_patrol_PHI: "积极巡逻：菲律宾南沙群岛"
 CHI_scs_assertive_patrol_PHI_desc: "命令中国人民解放军海军舰队进入与菲律宾存在争议的水域，目标是菲律宾在仁爱礁和南沙群岛东部海域的补给行动。若取得决定性胜利，菲律宾将推进冲突反击；若结果不明，则菲律宾将维持现状；若遭遇挫折，将消耗CHI_scs_framework，并可能促使马尼拉援引《美菲共同防御条约》进行磋商。"
 CHI_scs_assertive_patrol_VIE: "积极巡逻：越南南沙群岛"
 CHI_scs_assertive_patrol_VIE_desc: "命令中国人民解放军海军舰队进入与越南存在争议的水域，挑战越南海岸警卫队和在南沙群岛西部海域的补给船只。此次行动有三种可能的结果：战术上的决定性胜利将使冲突倒计时向最后通牒阈值推进；双方交战不分胜负，冲突倒计时保持不变；遭遇挫折将降低CHI_scs_framework，并可能招致河内方面的报复性外交回应。"
 CHI_scs_block_asean_consensus: "阻碍东盟共识"
 CHI_scs_block_asean_consensus_desc: "利用中国对柬埔寨和老挝的影响力，阻止即将出台的东盟层面谴责最终进入峰会公报。这两个国家在共识机制中都占据着否决权；它们的合作使得联合声明对南海行为保持沉默。这一举动虽然略微加剧了中国侵略性问题，因为地区观察人士注意到其中的讽刺意味，但通过阻止正式的谴责，也为南海框架带来了一定的益处。"
 CHI_scs_boundary_codification_MAY: "海上边界条约：马来西亚"
 CHI_scs_boundary_codification_MAY_desc: "与马来西亚缔结双边海洋边界条约，正式确立在南部争议水域的实际安排。吉隆坡的签署完成了双边协议的编纂，并消除了任何剩余的多边挑战。"
 CHI_scs_boundary_codification_PHI: "海上边界条约：菲律宾"
 CHI_scs_boundary_codification_PHI_desc: "与菲律宾缔结双边海洋边界条约，取代2016年《联合国海洋法公约》仲裁裁决。马尼拉同意撤销仲裁庭裁决，以换取中国的投资保证和扩大进入联合开发区的权限。"
 CHI_scs_boundary_codification_VIE: "海上边界条约：越南"
 CHI_scs_boundary_codification_VIE_desc: "与越南缔结一项对中国有利的双边海洋边界条约，明确北部湾的既定界线，并在共同开发框架下搁置西沙群岛和南沙群岛的争端。河内接受该安排，认为这是当时最佳的解决方案；北京则获得了一项先例。"
 CHI_scs_carrier_strike_group_deployment: "航母打击群部署"
 CHI_scs_carrier_strike_group_deployment_desc: "中国向南海部署完整的航母打击群，进行长期作战部署。此举表明，中国拥有并将运用武力控制南海的能力，而不仅仅是与之对抗。"
 CHI_scs_demand_tribute_MAY: "要求割让南沙"
 CHI_scs_demand_tribute_MAY_desc: "向吉隆坡发出最后通牒，要求其正式割让北沙群岛，包括马来西亚占领的弹丸礁和光星仔礁周边岛礁。这份通牒援引郑和明代从马六甲出海巡游的壮举，将要求重新定义为恢复旧秩序，而非新的吞并。在三个声索国中，马来西亚最有可能默默承受损失。"
 CHI_scs_demand_tribute_PHI: "要求割让中沙"
 CHI_scs_demand_tribute_PHI_desc: "向马尼拉发出最后通牒，要求其正式割让中沙群岛，这片水下岛礁目前由中国管辖，是三沙市的中沙区。这份照会摒弃了双边谈判的虚伪形式，直接以一个没有驻军也没有简易机场的浅滩为由，检验1951年《美中共同防御条约》的效力，这是对华盛顿是否仍然将礁石视为红线的最直接的试探。"
 CHI_scs_demand_tribute_VIE: "要求割让西沙"
 CHI_scs_demand_tribute_VIE_desc: "向河内发出最后通牒，要求其正式割让西沙群岛。自1974年将越南共和国海军逐出永乐环礁的战役以来，我们一直武力占领着这片领土。这份照会以法属印度支那之前的历史权利为由，将这一要求包装成未竟之事的终结，而非新的诉求。河内可以选择以书面形式承认这一损失，否则就等着重温1979年的教训吧。"
 CHI_scs_deploy_maritime_militia: "部署海上民兵"
 CHI_scs_deploy_maritime_militia_desc: "在海军协调下，将渔船队前沿部署到争议海域。民兵组织以看似可信的平民掩护，持续在海域活动，以比外交抗议更快的速度制造既成事实。"
 CHI_scs_first_island_chain_exercise: "第一岛链演习"
 CHI_scs_first_island_chain_exercise_desc: "执行一次覆盖第一岛链全长（从黄海到南海）的大规模舰队演习。此次演习旨在展示针对任何试图干预岛链内部事务的势力的反介入和区域拒止能力。"
 CHI_scs_infrastructure_loan_MAY: "基础设施贷款：马来西亚"
 CHI_scs_infrastructure_loan_MAY_desc: "将“一带一路”基础设施融资扩展至马来西亚，涵盖东海岸铁路和马六甲海峡沿岸港口扩建项目。该协议巩固了马来西亚作为中国在东盟经济一体化程度最高的伙伴的地位。"
 CHI_scs_infrastructure_loan_PHI: "基础设施贷款：菲律宾"
 CHI_scs_infrastructure_loan_PHI_desc: "将“一带一路”基础设施融资范围扩大到菲律宾，涵盖桥梁建设、铁路发展和新建深水港。马尼拉正在权衡与华盛顿结盟的成本和收益，此时美国提出了这项提议。"
 CHI_scs_infrastructure_loan_VIE: "基础设施贷款：越南"
 CHI_scs_infrastructure_loan_VIE_desc: "将“一带一路”基础设施融资扩展至越南，涵盖港口升级、铁路连接和工业园区开发。这笔贷款加深了越南经济对中国资本的依赖，并增加了河内方面进行外交对抗的成本。"
 CHI_scs_invoke_doc_2002: "重申2002年《南海各方行为宣言》"
 CHI_scs_invoke_doc_2002_desc: "公开重申2002年《南海各方行为宣言》作为争端管控的指导框架。此举虽具象征意义，但向东盟伙伴释放了克制信号，并为双边谈判奠定了外交基础。"
 CHI_scs_island_construction_civilian: "建设民用基础设施"
 CHI_scs_island_construction_civilian_desc: "在岛屿上建设港口设施、气象监测站和永久性民用住房。学校、诊所和行政办公楼等可见的日常居住迹象，强化了这些设施构成中国有人居住领土的政治论点。"
 CHI_scs_island_construction_radar: "架设雷达和信号情报阵列"
 CHI_scs_island_construction_radar_desc: "在人工岛上建设信号情报收集设施和超视距雷达阵列。这些设施可提供对南海的持续海上态势感知，并实时跟踪外国海空活动。"
 CHI_scs_island_construction_runway: "修建简易机场"
 CHI_scs_island_construction_runway_desc: "在人工岛群上铺设一条3000米长的沥青跑道，可供战斗机和远程海上巡逻机起降。该机场将使该设施从一个存在前哨转变为一个力量投送中心。"
 CHI_scs_island_construction_sam_battery: "安装防空导弹发射台"
 CHI_scs_island_construction_sam_battery_desc: "在岛屿群上部署远程地对空导弹系统。这些设施将中国的防空范围延伸至南海深处，使任何外国的航行自由行动或空中巡逻都变得复杂化。"
 CHI_scs_joint_development_MAY: "鲁克尼亚暗沙群行动协议"
 CHI_scs_joint_development_MAY_desc: "向马来西亚国家石油公司提出一份涵盖鲁克尼亚暗沙群附近ND6和SK308区块的联合作业协议。目前，中国海警船已在南鲁克尼亚暗沙群附近对马来西亚钻井平台进行跟踪监视。吉隆坡方面惯于将争端私下解决，这使得吉隆坡成为最容易获得签字的地方；一旦达成协议，北京就可以将其作为模板，向河内和马尼拉施压。"
 CHI_scs_joint_development_PHI: "重启马尼拉能源谅解备忘录"
 CHI_scs_joint_development_PHI_desc: "重启搁置已久的油气开发谅解备忘录，促成中海油与PXP能源就礼乐滩72号服务合同达成合作。马尼拉方面则以放弃2016年仲裁裁决的政治效力为交换，获得固定收益分成和一波上游投资。双边谈判机制使菲律宾的案件无法依据合同法解决。"
 CHI_scs_joint_development_VIE: "万安滩联合行动协议"
 CHI_scs_joint_development_VIE_desc: "中海油和越南石油集团将就万安滩重叠区域及2000年北部湾划界以东未决水域的联合开发区问题，与河内展开低调的谈判。中海油和越南石油集团将根据“不损害主权”的原则，共享勘探权和收益，在天然气开采的同时冻结法律争议。这一双边渠道使东盟保持距离，并消除了河内援引《联合国海洋法公约》的动机。"
 CHI_scs_natuna_press_claim: "将九段线主张推进到纳土纳"
 CHI_scs_natuna_press_claim_desc: "发表正式照会，重申我们根据九段线享有的历史权利延伸至与印尼纳土纳专属经济区重叠的水域。这一主张在法律上存在争议，因为印尼并不认为自己是南海声索国，但其主张将外交边界向南延伸，并对东盟最大国家印尼施加了新的压力。"
 CHI_scs_natuna_provocation: "纳土纳挑衅"
 CHI_scs_natuna_provocation_desc: "中国以例行捕鱼作业为掩护，将海上民兵船只部署到印尼纳土纳专属经济区。此次入侵行动虽可否认，但已昭然若揭；雅加达将采取外交回应。此举旨在试探中国海军行动范围的南限，并在不投入正规力量的情况下考验印尼的决心。"
 CHI_scs_reclaim_taiping: "回收太平岛"
 CHI_scs_reclaim_taiping_desc: "太平岛是南沙群岛中最大的自然岛礁，目前仍由台湾的中华民国当局管辖。在南沙三国全部安全之后，直接夺取太平岛的行动标志着南海整合的最终步骤，它独立于任何更广泛的台湾统一计划，并且先于这些计划展开。此次行动需要耗费极高的政治力量，并需要中国人民解放军海军在南海的全面投入。"
 CHI_scs_standoff_malaysia: "发起对峙：马来西亚"
 CHI_scs_standoff_malaysia_desc: "对马来西亚声称拥有主权的争议岛礁实施黄岩岛模式。吉隆坡历来谨慎处理与北京的关系；此次对峙将检验经济依赖是否会抑制正式的外交抗议。"
 CHI_scs_standoff_philippines: "发起对峙：菲律宾"
 CHI_scs_standoff_philippines_desc: "对菲律宾声称拥有主权的争议岛礁实施黄岩岛模式。菲律宾渔船遭遇中国海岸警卫队，双方发生冲突，最终马尼拉撤离，中国则永久驻扎于此。"
 CHI_scs_standoff_vietnam: "发起对峙：越南"
 CHI_scs_standoff_vietnam_desc: "对越南声称拥有主权的争议岛礁实施黄岩岛模式。河内海岸警卫队兵力不足，实力悬殊；问题在于河内是默默接受失败，还是会以引起国际关注的方式升级冲突。"
 CHI_scs_summon_dragon_king_blessing: "龙王舰队祝福"
 CHI_scs_summon_dragon_king_blessing_desc: "在海南三亚天后庙为南海舰队举行祈福仪式，祈求妈祖庇佑，妈祖是南海历代水手敬仰的海神。仪式通过电视向全国直播；仪式结束后，南海舰队立即启程进行演习。"
 CHI_secure_kpa_general_staff: "确保朝鲜人民军总参谋部联系人的安全"
 CHI_secure_kpa_general_staff_desc: "在朝鲜人民军总参谋部培养亲中军官。一个现役将领的价值胜过十几个流亡政客。"
 CHI_seek_basing_BAN: "请求在孟加拉国设立海军基地"
 CHI_seek_basing_BAN_desc: "向达卡正式提出请求，希望获得吉大港港口设施的物流使用权，并将其定位为战略伙伴关系。"
 CHI_seek_basing_BRM: "请求在缅甸设立海军基地"
 CHI_seek_basing_BRM_desc: "向内比都正式提出进入皎漂和实兑的后勤通道请求，并将其定位为战略伙伴关系。"
 CHI_seek_basing_CBD: "请求在柬埔寨设立海军基地"
 CHI_seek_basing_CBD_desc: "向金边方面提出正式请求，希望获得进入云壤海军基地的后勤保障，并以此为战略伙伴关系的框架。"
 CHI_seek_basing_PAK: "扩大在巴基斯坦的基地使用权"
 CHI_seek_basing_PAK_desc: "以“钢铁兄弟”伙伴关系为基础，将中国海军物流扩展到瓜达尔港以外的巴基斯坦港口。"
 CHI_seek_basing_SRI: "请求在斯里兰卡设立海军基地"
 CHI_seek_basing_SRI_desc: "向科伦坡方面提出正式请求，希望获得进入汉班托塔的后勤保障，并将其定位为战略伙伴关系。"
 CHI_semiconductor_coop_with_kor: "与韩国的半导体合作"
 CHI_semiconductor_coop_with_kor_desc: "与韩国建立半导体联合研发和制造项目。获得韩国的芯片制造技术将加速中国的技术发展。"
 CHI_seoul_hanbok_exchange: "安排首尔韩服交流"
 CHI_seoul_hanbok_exchange_desc: "即使在围绕共同文化遗产的争议中，文化外交也能缓解紧张局势。在首尔举办韩服交流活动可以提升公众情绪，并为对韩国施加影响开辟一条更为温和的渠道。"
 CHI_shenzhou_mission: "执行神舟任务"
 CHI_shenzhou_mission_desc: "在酒泉卫星发射中心，神舟飞船与长征二号F运载火箭叠放在一起。宇航员必须安全进入轨道并返回地球，以验证我国独立载人航天能力。随着发射经验的积累，成功率也会不断提高。"
 CHI_sichuan_tibet_railway: "川藏铁路"
 CHI_sichuan_tibet_railway_desc: "在成都和拉萨之间修建一条穿越峡谷和高山隘口的铁路，其中超过80%的路段为隧道和桥梁。这条铁路将结束西藏的与世隔绝状态，加强中央对高原的控制，并提供一条通往印度边境的战略要道。"
 CHI_skilled_immigration_drive: "技术移民推广活动"
 CHI_skilled_immigration_drive_desc: "中国的永久居留制度历来是主要经济体中最严格的制度之一。一项以美国和加拿大绿卡途径为蓝本的新高技能签证计划，旨在吸引研究人员、工程师和企业家。该计划在全球范围内规模较小，但标志着一项重要的政策转变，表明中国承认仅靠国内人口供给无法填补科技和医疗保健领域不断涌现的人才缺口。"
 CHI_snwt_central_route: "南水北调：中央路线"
 CHI_snwt_central_route_desc: "中线输水工程将湖北省汉江丹江口水库的水引向北方，途经河南、河北，最终到达北京。该工程自2014年12月投入运营以来，不仅为首都提供饮用水，也缓解了华北平原地下水长期枯竭的困境。"
 CHI_snwt_eastern_route: "南水北调：东部路线"
 CHI_snwt_eastern_route_desc: "从江苏附近的长江下游沿古京杭大运河向北调水，输送到干旱的山东和天津等城市。东线是三条调水线路中的第一条，这三条线路每年向干旱的北方输送约448亿立方米的水。"
 CHI_snwt_western_route: "南水北调：西部路线"
 CHI_snwt_western_route_desc: "将长江源头引流，越过青藏高原的巴彦喀拉山脉，注入黄河上游，灌溉青海、甘肃和陕西三省。这是三条方案中技术难度最高的，建成后将保障整个干旱的西北地区的水源供应。"
 CHI_south_china_sea_category: "南中国海"
 CHI_south_china_sea_category_desc: "我们正在做出影响南海态势的持续决策。这些决策会影响南海框架协议、我们与越南、菲律宾和马来西亚的关系，以及与美国发生冲突的风险。"
 CHI_southern_theatre_command: "南部战区司令部"
 CHI_southern_theatre_command_desc: "南方战区司令部总部设在广州，负责南海和越南边境地区的战事。其专长在于协调分散在各个岛屿上的驻军，并开展将它们联系起来的侦察工作。"
 CHI_space_program: "中国航天计划"
 CHI_subcontinent_strategy: "次大陆战略"
 CHI_subcontinent_strategy_desc: "我们在印度次大陆的外交和军事策略包括：沿实际控制线施压、与巴基斯坦和南亚周边国家建立伙伴关系，以及应对藏南边境冲突。从这里做出的决策将影响喜马拉雅地区的局势升级以及我们在整个地区的影响力。\n\n§Y藏南准备度：§![?THIS.CHI_arunachal_readiness]\n§Y藏南紧张度：§![?GLOBAL.CHI_arunachal_tension]\n§Y藏南进程：§![?THIS.CHI_arunachal_war_progress]"
 CHI_Surveillance_Export: "出口监控架构"
 CHI_Surveillance_Export_desc: "将中国的监控和数字监控系统部署到非民主伙伴国。这将加强威权主义的联系，并植入中国的电信标准。"
 CHI_thaad_retaliation_escalate: "升级对萨德的报复"
 CHI_thaad_retaliation_escalate_desc: "2016年，首尔同意部署美国“萨德”反导系统后，北京随即采取非正式抵制措施，重创乐天集团、韩国旅游业和文化出口。加大施压力度将进一步加深对韩国的经济惩罚。"
 CHI_three_gorges_dam_decision: "完成三峡大坝"
 CHI_three_gorges_dam_decision_desc: "三峡大坝横跨宜昌长江，于2012年全面投产，装机容量达22.5吉瓦，成为当时世界上最大的水电站。它的建成向国家电网输送了大量的水力发电。"
 CHI_three_north_shelterbelt: "三北防护林带计划"
 CHI_three_north_shelterbelt_desc: "种植“绿色长城”，这是一条横跨干旱北部、从新疆延伸至东北的森林和草原带。该项目于1978年启动，持续数十年，旨在遏制戈壁的扩张，防止沙尘暴侵袭，并从沙漠中开垦出农田。"
 CHI_tiangong_mission: "组装天宫站"
 CHI_tiangong_mission_desc: "天河核心舱必须先进入轨道，并成功完成首次载人对接，之后问天和梦天实验舱才能随后进入轨道。永久性轨道前哨站是近地轨道以外一切任务的基础。随着发射经验的积累，成功率也会不断提高。"
 CHI_tour_group_freeze: "旅游团冻结"
 CHI_tour_group_freeze_desc: "暂停所有赴韩旅行团。此举将切断韩国旅游业的一项主要收入来源，并表明当国家安全需要时，我们愿意采取强制性的经济手段。"
 CHI_track_ii_academic_forum: "第二轨道学术论坛"
 CHI_track_ii_academic_forum_desc: "促成我国学者与韩国学者就朝鲜半岛稳定问题开展二轨对话。非正式渠道有助于在官方外交陷入僵局时建立信任。"
 CHI_Track_II_Diplomacy: "第二轨道外交"
 CHI_Track_II_Diplomacy_desc: "资助我国专家、美国同行和韩国学者之间的非正式学术和智库交流。每一轮交流都有助于增进相互了解，并为正式谈判奠定基础。"
 CHI_trilateral_trade_forum: "三边贸易论坛"
 CHI_trilateral_trade_forum_desc: "召开以开城模式为核心的京首平壤贸易论坛。商业上的相互依存创造了自己的和平支持者。"
 CHI_uhv_east_transmission: "超高压电网：东部输电"
 CHI_uhv_east_transmission_desc: "完成从西部基地向上海、北京、广东等负荷中心输送数千公里电力的长距离特高压输电线路。长距离输电可减少线路损耗，并以西部清洁能源为沿海工业中心地带供电。"
 CHI_uhv_west_generation: "超高压电网：西部发电基地"
 CHI_uhv_west_generation_desc: "建设西部大型发电基地：新疆风能和太阳能发电场、内蒙古可再生能源发电场以及长江上游水力发电场。这些偏远的能源枢纽是世界最大特高压输电网络的支柱。"
 CHI_urban_water_recycling: "城市污水回收利用"
 CHI_urban_water_recycling_desc: "北京、天津和河北省主要城市每年共排放数十亿立方米市政污水，其中大部分仅经过二级处理便排放。一项旨在推进三级污水处理厂建设和建立专用再生水分配网络的计划，将处理后的污水用于工业冷却、市政绿化和河道整治。天津的再生水回用率已超过30%；该计划设定了到2030年城市再生水回用率达到25%的全国目标。"
 CHI_us_korea_cost_signaling: "美韩成本信号"
 CHI_us_korea_cost_signaling_desc: "向华盛顿和首尔发出信号，表明双方的安全联盟正付出日益沉重的经济和外交代价。有针对性的施压措施提醒双方，维持现状并非没有代价。"
 CHI_VEN_currency_swap_line: "人民币-玻利瓦尔货币互换额度"
 CHI_VEN_currency_swap_line_desc: "建立长期货币互换额度，以保护委内瑞拉免受美元债务压力，并锁定大宗商品供应。"
 CHI_VEN_emergency_food_aid: "向委内瑞拉提供紧急粮食援助"
 CHI_VEN_emergency_food_aid_desc: "向委内瑞拉运送食品和人道主义援助物资，以稳定马杜罗政府。这有助于改善委​​内瑞拉的稳定，并提升我们的影响力。"
 CHI_VEN_oil_processing_aid: "委内瑞拉石油加工援助"
 CHI_VEN_oil_processing_aid_desc: "派遣我们的工程师和精炼资金，升级委内瑞拉的石油加工设施。这项工作将提高他们的石油开采效率，并加深我们在奥里诺科石油供应链中的份额。"
 CHI_VEN_petrocaribe_program: "委内瑞拉援助计划"
 CHI_water_conservation_project: "省级保护项目"
 CHI_water_conservation_project_desc: "在北方某干旱省份启动了一项有针对性的节水项目，通过升级渠道衬砌、修复地下水监测网络和建设本地蓄水池，减少浪费和过度抽取。每个完工的项目都能减轻该省地下水位的压力。这项举措可以在河北、山西、河南和陕西等缺水省份推广，如果能完成足够多的项目，将有助于缓解中国全国的水资源短缺问题。"
 CHI_water_shortage_category: "节约用水运动"
 CHI_western_theatre_command: "西部战区司令部"
 CHI_western_theatre_command_desc: "西部战区是面积最大的战区，位于成都，负责守卫与印度接壤的喜马拉雅山脉边境以及动荡不安的内陆地区。其部队接受高海拔防御和阵地战的训练。"
 CHI_yangtze_delta_integration_mission: "长江三角洲一体化"
 CHI_yangtze_delta_integration_mission_desc: "上海、江苏和浙江三省致力于协同发展，长三角有望成为中国最具生产力的工业和出口走廊。年内工厂产值超过目标阈值的省份，将获得区域生产力的持续增长。"
 give_up_membership_status_desc: "退出上海合作组织意味着终止参与其联合安全演习、经济走廊和政治磋商机制。那些被强烈指责对中国具有侵略性或正与成员国交战的成员国，面临着越来越大的退出压力。"
 give_up_observer_status_desc: "退出观察员地位意味着切断与上海合作组织经济和安全项目的联系。这一决定通常是由于中国向北约或西方阵营靠拢，或是由于与北京的关系恶化所致。"
 host_joint_exercises_desc: "中国或俄罗斯可以召集上海合作组织全体成员国联合军事演习，消耗40点指挥点数，为所有成员国提供为期21天的临时战备状态。演习结束后，随机一名成员国的陆军指挥官将获得技能等级提升。任何成员国处于战争状态时，均不得发起演习。"
 offer_joint_exercises_specific_desc: "向特定上海合作组织成员国发送的双边联合演习提案。提案被接受后，双方各花费20点指挥点数进行为期14天的联合演习，该演习赋予上合组织联合演习特定理念，并以双方军事合作好感度提升结束。"
 provide_development_assistance_desc: "将资源引导至[FROM.GetName]，以加强其发展并深化其与上海合作组织框架的联系。"
 sco_bilateral_border_patrol: "与[FROM.GetName]联合边境巡逻"
 sco_bilateral_border_patrol_desc: "与[FROM.GetName]协调边境安全行动，打击跨境犯罪，加强互信。"
 sco_bilateral_cultural_exchange: "与[FROM.GetName]进行文化交流"
 sco_bilateral_cultural_exchange_desc: "与[FROM.GetName]开展文化和学术交流项目，促进民众之间的联系和相互了解。"
 sco_bilateral_energy_deal: "与[FROM.GetName]的能源伙伴关系"
 sco_bilateral_energy_deal_desc: "与[FROM.GetName]谈判达成长期能源供应协议，稳定价格并确保战略资源流动。"
 sco_bilateral_intel_sharing: "与[FROM.GetName]进行情报共享"
 sco_bilateral_intel_sharing_desc: "与[FROM.GetName]建立安全的情报共享渠道，以协调反恐和安全行动。"
 sco_bilateral_trade_agreement: "与[FROM.GetName]的双边贸易协定"
 sco_bilateral_trade_agreement_desc: "在上海合作组织框架下与[FROM.GetName]建立正式的贸易框架，降低关税，鼓励联合投资。"
 sco_megaproject_air_defense_optin: "加入上海合作组织联合防空"
 sco_megaproject_air_defense_optin_desc: "加入上合组织联合防空网络，为共享雷达和导弹防御基础设施做出贡献。"
 sco_megaproject_air_defense_propose: "提议建立上合组织联合防空系统"
 sco_megaproject_air_defense_propose_desc: "提议在上海合作组织成员国之间建立一体化防空网络，共享雷达覆盖范围并协调防空作战。"
 sco_megaproject_dev_bank_optin: "加入上海合作组织开发银行"
 sco_megaproject_dev_bank_optin_desc: "加入上海合作组织发展银行成为出资成员，即可获得低息发展融资。"
 sco_megaproject_dev_bank_propose: "提议成立上海合作组织开发银行"
 sco_megaproject_dev_bank_propose_desc: "建议设立一家多边开发银行，为上海合作组织成员国的基础设施建设和发展提供融资。"
 sco_megaproject_energy_grid_optin: "加入上海合作组织输电网络"
 sco_megaproject_energy_grid_optin_desc: "加入上海合作组织输电网络项目，贡献资源以换取共享电力基础设施的使用权。"
 sco_megaproject_energy_grid_propose: "提议建立上海合作组织输电网络"
 sco_megaproject_energy_grid_propose_desc: "提议建设覆盖上海合作组织成员国的综合能源网络，以降低成本并提高所有参与者的能源安全。"
 sco_megaproject_railway_optin: "加入跨欧亚铁路"
 sco_megaproject_railway_optin_desc: "选择加入泛欧亚铁路项目，投资贸易走廊，以获得长期的经济效益。"
 sco_megaproject_railway_propose: "提议建设跨欧亚铁路"
 sco_megaproject_railway_propose_desc: "提议建设横跨大陆的铁路网，连接上海合作组织成员经济体，从而大幅改善贸易流动和建设能力。"
 start_joint_exercises_specific_desc: "与接受提议的上海合作组织成员国最终确定双边联合军演。双方将接受为期十四天的联合军演具体方案，演习结束后，双方将增进对彼此军事合作的了解。"
 chi_bri.1.a: "开始工作"
 chi_bri.1.d: "2013年9月，习近平主席在哈萨克斯坦首都阿斯塔纳向听众描绘了一幅宏伟蓝图：一条连接中国与欧洲、中亚和非洲的丝绸之路经济带。这项倡议后来被称为“一带一路”，是历史上规模最大的基础设施建设项目。"
 chi_bri.1.t: "一带一路"
 chi_bri.10.a: "提供优惠条款"
 chi_bri.10.d: "一份来自[FROM.GetName]的正式申请已送达。他们的代表团正在寻求中国为§Y[FROM.GetBRIProjectName]§!项目提供资金和专业技术支持。北京必须权衡此次合作的战略价值与其愿意提供的财政和政治条件。"
 chi_bri.10.d_opt: "拒绝申请"
 chi_bri.10.t: "[FROM.GetName]请求加入“一带一路”项目"
 chi_bri.103.a: "接受邀请"
 chi_bri.103.b: "拒绝提议"
 chi_bri.103.d: "北京已正式邀请我成为亚洲基础设施投资银行的创始成员。成员资格意味着我将获得“一带一路”沿线基础设施项目的年度分红，但这同时也意味着我的经济命运将与中国主导的项目紧密相连。经济部正等待我的决定。"
 chi_bri.103.t: "中国邀请我们加入亚投行"
 chi_bri.104.a: "欢迎新成员"
 chi_bri.104.d: "[From.GetName]已接受我们的邀请，成为亚洲基础设施投资银行的创始成员。他们的加入增强了该银行的合法性，并扩大了其影响力。"
 chi_bri.104.t: "[From.GetName]加入亚投行"
 chi_bri.105.a: "已悉知其立场"
 chi_bri.105.d: "[From.GetName]已拒绝我们加入亚洲基础设施投资银行的邀请。他们的拒绝表明其明显倾向于西方主导的金融机构，并使我们实现区域目标的进程变得复杂。"
 chi_bri.105.t: "[From.GetName]拒绝加入亚投行"
 chi_bri.13.a: "批准延期"
 chi_bri.13.b: "拒绝延期"
 chi_bri.13.d: "[FROM.GetName]已向北京请愿，要求重组其尚未履行的“一带一路”义务，理由是财政拮据和不可预见的情况。此请求既包含人道主义考量，也包含战略考量。"
 chi_bri.13.t: "申请贷款延期"
 chi_bri.131.a: "授予驻港权以换取经济支持"
 chi_bri.131.b: "拒绝请求"
 chi_bri.131.d: "北京方面向我们提出了一项提议：允许中国人民解放军海军在我们的港口停靠和补充燃料，以换取大量的经济援助。这项提议将在未来十年内促进我们的出口和工业产出，但接受该提议将招致澳大利亚和美国的密切关注。"
 chi_bri.131.t: "中国要求驻港权"
 chi_bri.132.a: "重新评估我们在太平洋的立场"
 chi_bri.132.d: "[From.GetName]单方面撤销了此前授予解放军海军的驻港权。关系降温以及西方国家的竞争性诱惑已经侵蚀了我们辛辛苦苦达成的协议。"
 chi_bri.132.t: "驻港权收回"
 chi_bri.133.a: "接受斡旋达成的协议"
 chi_bri.133.b: "拒绝此安排"
 chi_bri.133.d: "北京主动提出作为我们与地区对手之间互不侵犯谅解的担保人。如果任何一方破坏和平，中国承诺站在受害方一边。鉴于北京日益增长的外交影响力，这一提议颇具分量。"
 chi_bri.133.t: "中国提议斡旋达成互不侵犯条约"
 chi_bri.134.a: "遵守条约，宣战"
 chi_bri.134.b: "保持中立并接受声誉代价。"
 chi_bri.134.d: "战争在两个我们曾亲自担保互不侵犯条约的双方之间爆发。出于荣誉和信誉，我们必须向受害方宣战，但与侵略者开战代价高昂。不作为必将为后世所铭记。"
 chi_bri.134.t: "我们达成的协议已被打破"
 chi_bri.135.a: "与我们的中国合作伙伴协调"
 chi_bri.135.d: "北京方面已通知我们，根据其斡旋达成的互不侵犯谅解，中华人民共和国将站在我们这边参战。中国介入的外交影响力重塑了战略格局。"
 chi_bri.135.t: "中国将遵守该协议"
 chi_bri.15.a: "瓜达尔港（俾路支斯坦）"
 chi_bri.15.b: "俾路支斯坦经济特区"
 chi_bri.15.c: "拉合尔铁路走廊（旁遮普）"
 chi_bri.15.d: "北京已批准[FROM.GetName]的一个旗舰级大型项目。与普通的“一带一路”项目不同，该项目将由中国主导管理，并直接承载中国的战略利益。选址将决定该项目未来几十年的发展方向。"
 chi_bri.15.d_opt: "汉班托塔港（南部省）"
 chi_bri.15.e: "科伦坡港（西部省）"
 chi_bri.15.f: "蒙巴萨-内罗毕标准轨铁路航站楼"
 chi_bri.15.g: "沿海战略设施"
 chi_bri.15.t: "大型项目：在哪里建设？"
 chi_bri.20.a: "接受租赁条款"
 chi_bri.20.b: "拒绝交出港口"
 chi_bri.20.d: "由于无力偿还建设期间累积的债务，斯里兰卡政府面临着严峻的选择。招商局港口控股有限公司提出以99年租约租赁汉班托塔港，换取债务减免。批评者称之为“债务陷阱外交”，支持者则称之为务实的治国之道。"
 chi_bri.20.t: "汉班托塔：99年租约"
 chi_bri.21.a: "给予中国海军通行权"
 chi_bri.21.b: "礼貌地拒绝"
 chi_bri.21.d: "随着中巴经济走廊全面投入运营，解放军海军向伊斯兰堡提出了一项低调但意义重大的请求：允许其使用瓜达尔港作为后勤补给站。这一决定将使中巴经济走廊从一条经济走廊转变为一个战略要地。"
 chi_bri.21.t: "瓜达尔：海军设施请求"
 chi_bri.22.a: "授予中国驻港权"
 chi_bri.22.b: "拒绝提议"
 chi_bri.22.d: "吉布提几十年来一直是外国军事设施的驻地，但北京的提议性质不同。计划在多哈雷建设的设施将是中国人民解放军的首个永久性海外基地，这是西方战略家长期以来担忧、中国规划者长期以来一直追求的里程碑式事件。"
 chi_bri.22.t: "多哈雷：中国首个海外基地"
 chi_bri.30.a: "采取强有力的制裁措施予以回应。"
 chi_bri.30.b: "目前先密切关注局势。"
 chi_bri.30.d: "中国宣布推出人民币计价石油期货的消息震惊了华盛顿。如果石油人民币定价模式在欧佩克成员国和“一带一路”沿线国家得到广泛认可，美元的储备货币地位将面临几代人以来最严峻的挑战。国会要求对此作出回应。"
 chi_bri.30.t: "北京的石油人民币威胁美元霸权"
 chi_bri.40.a: "宣布一项大胆的新举措"
 chi_bri.40.b: "签署一系列新的承诺"
 chi_bri.40.c: "以改革和透明度为先导"
 chi_bri.40.d: "来自亚洲、非洲和欧洲各国的政府首脑和财政部长齐聚北京，参加每三年一次的“一带一路”国际合作高峰论坛。此次论坛集峰会、贸易博览会和地缘政治博弈于一体。中国本周的选择将为“一带一路”倡议的下一阶段定下基调。"
 chi_bri.40.t: "“一带一路”国际合作高峰论坛在京开幕"
 chi_bri.42.a: "采取自信、强势的语气"
 chi_bri.42.b: "强调合作与互利共赢"
 chi_bri.42.d: "来自世界各地的记者齐聚一堂，参加论坛闭幕新闻发布会。中国此次选择的报道框架将主导国际舆论，并影响未来三年“一带一路”外交的走向。"
 chi_bri.42.t: "论坛新闻发布会"
 chi_bri.43.a: "发表结果"
 chi_bri.43.d: "代表团已经离开，横幅也已撤下。外交官和经济学家们正在统计成果：签署的协议、做出的承诺以及积累的影响力。“一带一路”国际合作高峰论坛再次重塑了人们对中国全球角色的认知。"
 chi_bri.43.t: "“一带一路”国际合作高峰论坛：最终评估"
 chi_bri.50.a: "宣告中国领导的新时代"
 chi_bri.50.d: "中国的“一带一路”网络如今已遍及所有有人居住的大陆。北京数十年来精心编织的基础设施、债务和外交义务之网，已凝结成前所未有的局面：一个以中国利益为导向的国际秩序。历史学家或许会争论这究竟是霸权还是伙伴关系，但世界只会将其视为既成事实。"
 chi_bri.50.t: "中华治世已成"
 chi_bri.70.a: "宣布非中伙伴关系时代"
 chi_bri.70.d: "十多年来，中非合作论坛峰会、“一带一路”倡议以及债务减免外交的累积效应，已经产生了决定性的转变。在整个非洲大陆，曾经在北京和华盛顿之间摇摆不定的各国政府，如今正将中国视为其主要合作伙伴。一代非洲领导人成长于中国基础设施、中国信贷和中国顾问的熏陶之下。"
 chi_bri.70.t: "非洲拥抱中国世纪"
 chi_bri.71.a: "派遣项目团队"
 chi_bri.71.d: "为了巩固新时代，北京已拨出专项资金，在其非洲伙伴网络中启动一系列旗舰级大型项目。这些并非普通的基建援助，而是以中国为主导、附带长期战略权益和优惠准入条款的开发项目。"
 chi_bri.71.t: "非洲旗舰项目"
 chi_bri.80.a: "宣布债务注销"
 chi_bri.80.b: "锁定担保条款"
 chi_bri.80.d: "中非合作论坛最新一届全体会议在北京召开。财政部长、国家元首和开发银行官员齐聚一堂，回顾中非关系状况并规划前进道路。峰会的开幕公告将决定这次聚会是否因慷慨或影响力而被人们铭记。"
 chi_bri.80.t: "中非合作论坛峰会召开"
 chi_bri.81.a: "加强对加拉加斯的制裁"
 chi_bri.81.b: "发起外交抗议"
 chi_bri.81.c: "记下，然后继续。"
 chi_bri.81.d: "中国已正式启动“加勒比石油计划”的后续项目，向委内瑞拉及其邻国提供以石油换贷款的融资方式。华盛顿现在面临抉择：要么表达不满，冒着进一步疏远拉丁美洲国家的风险；要么默默接受这一事态发展。"
 chi_bri.81.t: "中国进军加拉加斯"
 chi_bri.82.a: "免除债务"
 chi_bri.82.b: "将欠款转化为让步"
 chi_bri.82.c: "必须追究违约"
 chi_bri.82.d: "委内瑞拉的石油收入大幅下降，拖欠中国国有银行的债务也严重超支。北京必须决定是自行承担商誉损失、追讨抵押品，还是让此次违约事件作为对其他借款人的警示。"
 chi_bri.82.t: "加拉加斯无力支付"
 chi_bri.83.a: "抗议并要求撤离"
 chi_bri.83.b: "启动反制计划"
 chi_bri.83.c: "接受新的基线"
 chi_bri.83.d: "中国已在阿根廷和玻利维亚建成北斗导航跟踪地面站网络，大幅扩展了北斗定位系统在南半球的覆盖范围。美国太空司令部和南方司令部已将这些设施标记为军民两用设施。华盛顿必须决定如何应对。"
 chi_bri.83.t: "巴塔哥尼亚的北斗跟踪站"
 chi_bri.84.a: "确保所有四个立场转换"
 chi_bri.84.b: "锁定三个可靠的合作伙伴"
 chi_bri.84.d: "“门罗主义反转”战略的完成，为一系列外交承认的转变创造了条件。一些仍然正式承认台北的拉美国家，如今也有可能在中国的促成下悄然转变立场。"
 chi_bri.84.t: "台湾失去最后盟友"
 chi_bri.85.a: "巩固区域重组"
 chi_bri.85.b: "把政治资本装进口袋"
 chi_bri.85.d: "随着中国的影响力渗透到拉丁美洲的各个机构，美洲国家组织作为美国主导的区域治理场所的地位已被系统性地掏空。拉美及加勒比国家共同体已成为首选的多边论坛。其影响从华盛顿延伸至布宜诺斯艾利斯。"
 chi_bri.85.t: "美洲国家组织失去其授权"
 chi_bri.86.a: "协调制定更严格的制裁机制"
 chi_bri.86.b: "通过渠道表达关切"
 chi_bri.86.d: "中国批准与伊朗签署为期25年的全面伙伴关系协定，给中东安全格局带来了巨大震动。美国官员、以色列国防规划人员和海湾国家都在评估其后果并考虑应对措施。"
 chi_bri.86.t: "华盛顿、特拉维夫和利雅得发出警报"
 chi_bri.87.a: "在全球范围内宣传这一成就"
 chi_bri.87.b: "内部整合"
 chi_bri.87.d: "北京公报正式确立了沙特阿拉伯和伊朗之间的和解，这一举措受到了国际社会的广泛关注。中国在两个历史宿敌之间发挥的调解作用，展现了其强大的外交影响力，而这在十年前几乎无人预料到。"
 chi_bri.87.t: "北京声称功劳归于北京"
 chi_bri.88.a: "公布新的和解框架"
 chi_bri.88.d: "海湾国家已开始以人民币结算部分石油交易，从而完善了中国过去十年构建的金融体系。美元在能源市场的霸权地位正在逐步瓦解，但这一趋势如今已根深蒂固。"
 chi_bri.88.t: "石油美元裂痕"
 chi_bri.89.a: "确保核心立场转换"
 chi_bri.89.b: "全力以赴，争取全面成功"
 chi_bri.89.d: "中国的太平洋岛屿论坛战略已经成熟，外交承认的转变成为可能。所罗门群岛和基里巴斯是最容易实现的目标，如果北京愿意进一步投入，图瓦卢和帕劳也并非遥不可及。"
 chi_bri.89.t: "太平洋岛屿认可枢纽"
 chi_bri.90.a: "谴责该协议并协调应对措施"
 chi_bri.90.b: "记录关注事项并进行监测"
 chi_bri.90.d: "《霍尼亚拉安全协定》触发了澳美部长级磋商紧急会议。堪培拉、华盛顿和惠灵顿正在协调应对他们所称的对太平洋主权和区域稳定的直接威胁。"
 chi_bri.90.t: "堪培拉要求给出答案"
 chi_bri.91.a: "宣布在太平洋安全领域发挥领导作用"
 chi_bri.91.b: "承认外交挫折"
 chi_bri.91.d: "太平洋八国倡议的结果已经出炉。中国在太平洋岛国的参与记录将决定北京能否继续扮演安全领导角色，还是必须承受声誉上的挫败。"
 chi_bri.91.t: "八国倡议报告"
 chi_bri.92.a: "加快盟友反应"
 chi_bri.92.b: "考虑升级方案"
 chi_bri.92.c: "重新校准并观察"
 chi_bri.92.d: "中国获得所罗门群岛的军事基地使用权，使其海军的打击范围延伸至该第二岛链的边缘。美国印太司令部和澳大利亚国防军正在评估其战略影响并制定应对措施。"
 chi_bri.92.t: "北京到达第二岛链"
 chi_bri.93.a: "明确表示不赞同"
 chi_bri.93.b: "承认发展成果"
 chi_bri.93.d: "意大利成为首个签署“一带一路”谅解备忘录的七国集团成员国，这一先例令其他七国集团成员国既担忧又看到了机遇。如今，每个成员国首都都必须决定自身对中国基础设施投资的态度。"
 chi_bri.93.t: "罗马与北京签署协议"
 chi_bri.94.a: "加强核心合作伙伴关系"
 chi_bri.94.b: "用投资来维系框架"
 chi_bri.94.d: "立陶宛退出“17+1”机制，暴露了波罗的海和北欧成员国与巴尔干-维谢格拉德集团核心成员国之间的裂痕。中国必须做出选择：是巩固一个规模较小但更可靠的联盟，还是花费重金维系更广泛的框架。"
 chi_bri.94.t: "17+1到达分岔口"
 chi_bri.96.a: "中国的世纪开始了。"
 chi_bri.96.b: "接受新的现实。"
 chi_bri.96.c: "注意正在形成的秩序。"
 chi_bri.96.d: "中国通过全球发展倡议、亚洲基础设施投资银行以及高质量的“一带一路”合作构建的共识性世界秩序，不再是愿景，而是国际体系的运行架构。“金砖国家+”成员涵盖了世界绝大多数人口。2017年达沃斯论坛的演讲如今看来宛如预言。"
 chi_bri.96.t: "共享未来的共同体"
 CHI_foreign.012.a: "我们会密切关注。"
 CHI_foreign.012.d: "中国官员私下暗示华盛顿重新考虑其在朝鲜问题上的立场，这暗示中方可能即将采取外交行动。这一信号可能是开放的契机，也可能只是佯攻。"
 CHI_foreign.012.t: "来自北京的信号"
 CHI_foreign.014.a: "审阅草案。"
 CHI_foreign.014.d: "关于朝鲜半岛未来的联合声明的基础工作已经就绪。北京方面已提交一份框架草案供审议。"
 CHI_foreign.014.t: "联合声明框架"
 CHI_foreign.024.a: "我们会仔细考虑各种方案。"
 CHI_foreign.024.d: "中国已表示接受以首尔为中心的朝鲜问题解决方案，这是北京立场上的历史性转变，平壤现在必须正视这一转变。"
 CHI_foreign.024.t: "北京支持首尔"
 CHI_foreign.030.a: "这代表着商业关系中不可接受的政治化。"
 CHI_foreign.030.b: "压力固然令人遗憾，但可以承受。我们立场坚定。"
 CHI_foreign.030.d: "北京对韩国部署“萨德”系统的回应已从外交抗议升级为经济胁迫。中国当局正对韩国的商业活动、娱乐产品和旅游业实施限制，这是一项精心策划的行动，旨在施加经济压力，同时避免触发正式制裁机制。"
 CHI_foreign.030.t: "萨德报复"
 CHI_foreign.031.a: "回应信号。保持当前姿势。"
 CHI_foreign.031.b: "中国的保证不可信。韩国应重申我们的承诺。"
 CHI_foreign.031.d: "中国已通过军事渠道发出信号，表明鸭绿江演习具有防御性质。北京传递的信息很明确：中国将管控朝鲜的行为，无需美国采取升级行动来维护地区稳定。"
 CHI_foreign.031.t: "北京释放克制信号"
 CHI_foreign.032.a: "通知我方驻韩部队。请求与首尔方面进行紧急磋商。"
 CHI_foreign.032.b: "密切关注事态发展。避免采取挑衅性行动。"
 CHI_foreign.032.d: "卫星图像证实，朝鲜地面部队正在沿三八线进行大规模重组，向进攻部署方向移动。中国的后勤列车正在为此次重新部署提供支持。朝鲜人民军似乎正在为非例行演习做准备。"
 CHI_foreign.032.t: "鸭绿江的建设"
 CHI_foreign.033.a: "开始制定应急计划。与华盛顿方面磋商。"
 CHI_foreign.033.b: "宪法约束是绝对的。只能通过外交渠道解决。"
 CHI_foreign.033.d: "朝鲜在三八线沿线的军事集结，再次引发日本国会关于宪法第九条以及日本自卫姿态的宪法界限的辩论。鹰派人士正力促对集体自卫义务进行紧急重新解释。"
 CHI_foreign.033.t: "第九条引发争议"
 CHI_foreign.034.a: "启动我们与韩国的共同防御承诺。"
 CHI_foreign.034.b: "召开安全理事会紧急会议。"
 CHI_foreign.034.d: "在中国的后勤和物资支持下，朝鲜军队已经越过非军事区。中国虽然没有正式介入冲突，但其影响力已渗透到朝鲜战争机器的方方面面。"
 CHI_foreign.034.t: "半岛战争"
 CHI_foreign.035.a: "拉响最高警报。准备应急力量。"
 CHI_foreign.035.b: "在情况明朗之前，不要采取任何行动。"
 CHI_foreign.035.d: "未经证实的报道称，平壤安全警戒线内出现枪声和军事活动，这表明朝鲜首都可能发生了非同寻常的事情。中国官方媒体对此保持沉默。局势极其不明朗。"
 CHI_foreign.035.t: "平壤一片混乱"
 CHI_foreign.036.a: "发表正式声明，谴责干涉朝鲜主权的行为。"
 CHI_foreign.036.b: "与过渡委员会保持公开的非正式联系。"
 CHI_foreign.036.d: "中国支持的官员发动了针对金正恩的政变。金氏家族已被赶下台。平壤正在组建一个过渡委员会，其领导者是已知的北京对话者。中国似乎正在孕育一个有管理的接班人。"
 CHI_foreign.036.t: "平壤政变"
 CHI_foreign.037.a: "通过外交渠道向北京表达关切。"
 CHI_foreign.037.b: "静观其变。目前局势瞬息万变，不宜妄下断言。"
 CHI_foreign.037.d: "朝鲜政变给日本带来了机遇和挑战。平壤一个亲华的过渡政府或许比金正恩更可预测，但朝鲜半岛上一个中国的附庸国对东京而言仍是一个重大的战略挑战。"
 CHI_foreign.037.t: "新的平壤"
 CHI_foreign.038.a: "正式抗议朝鲜单方面重组政府。"
 CHI_foreign.038.b: "接受新的现实。寻求与北京的韩国政策达成妥协。"
 CHI_foreign.038.d: "中国已公布平壤政变后的政治解决方案条款。新的朝鲜政府在宪法上进行了重组，在经济上融入了中国的供应链，并在战略上服从北京的对朝政策。"
 CHI_foreign.038.t: "北京和解"
 CHI_foreign.040.a: "这种重新调整令人无法接受。必须向首尔发出信号，表明后果。"
 CHI_foreign.040.b: "接受这种趋势。联盟无法靠强迫来维持。"
 CHI_foreign.040.d: "韩国奉行战略自主原则，并决定将中国视为主要安全伙伴，这标志着印太地区力量平衡的深刻重塑。自1953年以来维系的韩美同盟正面临数十年来最严峻的考验。"
 CHI_foreign.040.t: "首尔转向"
 CHI_foreign.041.a: "对不断变化的配置表示谨慎的兴趣。"
 CHI_foreign.041.b: "拒绝框架。中国不会放弃朝鲜。"
 CHI_foreign.041.d: "韩国转向北京的举动迫使平壤陷入两难境地。一个将朝鲜排除在外的中韩伙伴关系，其战略威胁性甚至超过美国在韩国的存在。"
 CHI_foreign.041.t: "哪个中国？"
 CHI_foreign.042.a: "立即与华盛顿就补偿措施展开紧急磋商。"
 CHI_foreign.042.b: "评估日韩双边安全安排是否可行。"
 CHI_foreign.042.d: "韩国退出美日韩三边安全框架，使日本在残存的印太体系中陷入孤立。失去首尔的参与，日本与华盛顿的安全关系便缺失了至关重要的支柱。"
 CHI_foreign.042.t: "东京独行"
 CHI_foreign.043.a: "向我们的菲律宾合作伙伴重申我们的承诺。"
 CHI_foreign.043.b: "开始对印太地区承诺进行战略评估。"
 CHI_foreign.043.d: "韩国退出三边安全框架引发了马尼拉对美国在印太地区安全承诺持久性的担忧。菲律宾官员已开始悄悄重新评估自身的联盟立场。"
 CHI_foreign.043.t: "框架瓦解"
 CHI_foreign.044.a: "立即发起外交攻势，重建外交框架。"
 CHI_foreign.044.b: "接受战略挫折，围绕剩余合作伙伴重新调整策略。"
 CHI_foreign.044.d: "韩国退出三边框架实际上瓦解了华盛顿耗费十年心血构建的印太体系。中国通过耐心外交取得了对抗永远无法达成的成就。"
 CHI_foreign.044.t: "印太战略崩溃"
 CHI_foreign.045.a: "接受请求。开始有序重新部署。"
 CHI_foreign.045.b: "拒绝。美军是否继续驻扎在半岛上，由华盛顿方面决定。"
 CHI_foreign.045.d: "韩国正式认可中国的安全保障，使得美军继续驻扎在朝鲜半岛在政治上站不住脚。首尔已要求中方提供美军撤离韩国领土的时间表。"
 CHI_foreign.045.t: "军队调回国内"
 CHI_foreign.046.a: "就日本的安全形势与华盛顿展开紧急磋商。"
 CHI_foreign.046.b: "加快发展本土国防能力。"
 CHI_foreign.046.d: "美国从韩国撤军使得美日安全同盟在战略上不完整。日本的南翼暴露无遗，过去七十年来支撑日本国防规划的假设需要进行根本性修正。"
 CHI_foreign.046.t: "联盟空心"
 CHI_foreign.047.a: "接受这份保证。韩国的未来不能依赖于远方的赞助者。"
 CHI_foreign.047.b: "拒绝这项提议。韩国的主权不能用来换取中国的庇护。"
 CHI_foreign.047.d: "中国已向韩国提供正式的安全保障，为未来的统一方案提供担保。北京保障承诺中国将捍卫统一后的朝鲜半岛主权，以换取一系列战略安排，这些安排实际上将朝鲜半岛转变为一个亲华国家。"
 CHI_foreign.047.t: "北京的保障"
 CHI_foreign.048.a: "接受北京框架。生存需要务实。"
 CHI_foreign.048.b: "拒绝这个框架。我们不会被吞并。"
 CHI_foreign.048.d: "中国提出的对统一朝鲜半岛的安全保障提议，迫使平壤方面做出了清醒的认识。朝鲜领导层必须在抵抗和妥协之间做出选择，因为他们明白，没有中国的支持，抵抗是不可持续的。"
 CHI_foreign.048.t: "保证与北方"
 CHI_foreign.049.a: "就此过程及其影响发表正式声明。"
 CHI_foreign.049.b: "接受结果，并据此调整我们的印太战略。"
 CHI_foreign.049.d: "朝鲜半岛统一进程是在中国主导和中国框架下进行的。美国七十年来在朝鲜半岛的军事存在和外交投入，促成了一个与北京结盟的统一朝鲜。"
 CHI_foreign.049.t: "我们未能实现的统一"
 CHI_foreign.050.a: "已阅。"
 CHI_foreign.050.d: "为应对日益紧张的局势，美国航母战斗群已重新部署至朝鲜海峡附近。北京方面正密切关注这一动向。"
 CHI_foreign.050.t: "航母驶向朝鲜海峡"
 CHI_foreign.051.a: "艰难的处境"
 CHI_foreign.051.d: "朝鲜半岛紧张局势已达到临界点。华盛顿、东京和首尔均已进入高度戒备状态。"
 CHI_foreign.051.t: "区域危机警报"
 CHI_foreign.052.a: "放弃吧，代价太高了。"
 CHI_foreign.052.b: "保持压力。"
 CHI_foreign.052.d: "朝鲜半岛紧张局势已达顶峰。北京必须决定是退让、坚持既定路线，还是力求取得决定性成果。"
 CHI_foreign.052.t: "濒临崩溃的半岛"
 CHI_foreign.053.a: "令人满意的进展。"
 CHI_foreign.053.d: "朝鲜半岛危机气氛有所缓和。地区大国欢迎恢复稳定。"
 CHI_foreign.053.t: "朝鲜半岛局势缓和"
 CHI_foreign.054.a: "此次收购符合我们的经济利益。"
 CHI_foreign.054.b: "哈萨克斯坦的石油必须保持国家控制。"
 CHI_foreign.054.d: "中国石油天然气集团公司已正式提交收购哈萨克斯坦石油公司的要约，拟以41.8亿美元收购该公司。该交易将使哈萨克斯坦最大的独立石油生产商的运营控制权移交给中国，以换取哈萨克斯坦国库获得一大笔现金。"
 CHI_foreign.054.t: "中石油收购方案"
 CHI_foreign.056.a: "我们尊重他们的决定。"
 CHI_foreign.056.d: "阿斯塔纳拒绝了中国石油天然气集团公司对哈萨克斯坦石油公司的收购提议，理由是担心国家资源主权问题。"
 CHI_foreign.056.t: "哈萨克斯坦拒绝中石油收购要约"
 CHI_foreign.057.a: "此次收购符合安哥拉的经济利益。"
 CHI_foreign.057.b: "我们的能源资源不出售。"
 CHI_foreign.057.d: "中国石化已提交72亿美元的收购要约，拟收购阿达克斯石油公司，从而获得安哥拉、尼日利亚和库尔德斯坦地区的石油生产许可证。这笔交易将是中国石化迄今为止规模最大的海外收购。"
 CHI_foreign.057.t: "中石化收购方案"
 CHI_foreign.058.a: "中国石化在非洲石油生产领域再添一席之地。"
 CHI_foreign.058.d: "罗安达已接受中石化对阿达克斯石油公司的收购要约。中国工程师将接管海上油田区块的运营控制权，部分收益将用于安哥拉基础设施建设。"
 CHI_foreign.058.t: "安哥拉批准中石化收购案"
 CHI_foreign.059.a: "我们尊重他们的决定。"
 CHI_foreign.059.d: "罗安达拒绝了中石化收购阿达克斯石油公司的要约。"
 CHI_foreign.059.t: "安哥拉拒绝中石化收购要约"
 CHI_foreign.060.a: "欢迎中国的专业技术和资金。"
 CHI_foreign.060.b: "委内瑞拉的石油财富不应该拱手让给外国。"
 CHI_foreign.060.d: "中海油已提议与委内瑞拉石油公司建立长期合资企业，共同开发奥里诺科重油带。中方将提供前期资金和重油开采技术，以换取部分生产权。"
 CHI_foreign.060.t: "中海油合资提案"
 CHI_foreign.061.a: "中海油在西半球最大的石油储量区站稳脚跟。"
 CHI_foreign.061.d: "加拉加斯已同意中海油提出的奥里诺科油田合资方案。胡宁区块的生产权现已实现共享，这将把中国的开采技术引入全球最大的已探明石油储量区。"
 CHI_foreign.061.t: "委内瑞拉批准中海油合资企业"
 CHI_foreign.062.a: "我们尊重他们的决定。"
 CHI_foreign.062.d: "加拉加斯拒绝了中海油关于奥里诺科油气带的合资提议。"
 CHI_foreign.062.t: "委内瑞拉拒绝中海油合资项目"
 CHI_foreign.063.a: "这是一项关乎我们能源安全的战略性收购。"
 CHI_foreign.063.d: "阿斯塔纳已接受中国石油天然气集团公司对哈萨克斯坦石油公司的收购要约。中国运营的油田将扩大库姆科尔油田和北布扎奇油田的产量，从而确保中国炼油厂获得稳定的哈萨克斯坦原油供应。"
 CHI_foreign.063.t: "哈萨克斯坦批准中石油收购案"
 CHI_foreign.100.a: "做好应对持续压力的准备。与盟友协商。"
 CHI_foreign.100.d: "中国对韩国发起了一场协调一致的施压行动，通过外交、经济和军事手段，旨在改变首尔的安全考量，使其不再依赖华盛顿。"
 CHI_foreign.100.t: "北京施压运动"
 CHI_foreign.101.a: "记录这些措施并制定相应的应对措施。"
 CHI_foreign.101.d: "北京已将针对“萨德”系统的报复措施扩大到更广泛的非正式经济限制领域。在华经营的韩国企业反映，他们在许可证办理、海关和监管渠道均遭遇系统性阻挠。"
 CHI_foreign.101.t: "非正式制裁措施"
 CHI_foreign.102.a: "谨慎沟通，保持渠道畅通。"
 CHI_foreign.102.d: "中美外交官已就朝鲜半岛问题建立了一条秘密工作渠道。这一安排使双方能够在不公开承诺正式谈判框架的情况下，管控局势升级的风险。"
 CHI_foreign.102.t: "后台通道开放"
 CHI_foreign.103.a: "积极参与新框架的实施，并密切关注其影响。"
 CHI_foreign.103.d: "北京和首尔已同意进行结构性外交重启，恢复高层接触，并建立朝鲜半岛问题三方对话框架。这一安排标志着韩国与此前与华盛顿结盟的立场发生了重大转变。"
 CHI_foreign.103.t: "2022年重启"
 CHI_foreign.104.a: "接受框架，并明确我们在其中的角色。"
 CHI_foreign.104.d: "中美两国已就朝鲜半岛停战后安全架构的框架达成一致。这一“G2”框架赋予中美两国共同维护半岛稳定的责任，从而边缘化了其他行为体。"
 CHI_foreign.104.t: "停战后框架"
 CHI_foreign.105.a: "研究该提案。咨询行业顾问和安全顾问。"
 CHI_foreign.105.d: "中国提出了一项经济一体化平台，将韩国产业与有序的统一进程联系起来。这一安排为首尔提供了深层次的结构性激励，促使其统一政策与北京的预期结果保持一致。"
 CHI_foreign.105.t: "统一经济框架"
 CHI_foreign.106.a: "承认新理论。制定我们的战略应对措施。"
 CHI_foreign.106.d: "韩国正式采纳战略自主原则，标志着其与美韩同盟框架决然地决裂。首尔正将自身定位在华盛顿和北京之间，而非美国的安全轨道之内。"
 CHI_foreign.106.t: "枢轴反转"
 CHI_foreign.107.a: "将最后通牒转交给平壤。"
 CHI_foreign.107.b: "拒绝。统一必须完全按照我们自己的条件进行。"
 CHI_foreign.107.d: "[CHI.GetLeader]与[USA.GetLeader]达成了一项罕见的共识。双方将共同要求[NKO.GetName]接受在首尔领导下和平统一。否则，将爆发战争。[KOR.GetName]必须决定是否将最后通牒转交给平壤。"
 CHI_foreign.107.t: "向北方发出的联合最后通牒"
 CHI_foreign.108.a: "接受现实吧，游戏结束了。"
 CHI_foreign.108.b: "拒绝。我们绝不放弃主权。"
 CHI_foreign.108.d: "一份中美联合公报已送达平壤。公报要求朝鲜立即和平解散[NKO.GetName]政权，并在首尔政府的领导下实现朝鲜半岛的统一。拒绝则意味着同时与中国、美国和韩国开战。"
 CHI_foreign.108.t: "北京和华盛顿要求统一"
 CHI_foreign.109.a: "东亚迎来新时代。"
 CHI_foreign.109.d: "朝鲜接受了最后通牒。金氏政权同意解散国家并将权力移交给首尔。朝鲜半岛在未发一枪一弹的情况下实现了统一，这是一项具有历史意义的外交胜利。"
 CHI_foreign.109.t: "平壤接受"
 CHI_foreign.110.a: "那么我们就开战吧。"
 CHI_foreign.110.d: "朝鲜拒绝了最后通牒。平壤的回应是通过越过非军事区的炮火进行的。外交途径已经走到尽头：只剩下战争，以及以武力解放朝鲜半岛。"
 CHI_foreign.110.t: "平壤拒绝"
 CHI_foreign.200.a: "强行解决"
 CHI_foreign.200.b: "试探后撤退。"
 CHI_foreign.200.c: "要求联合国进行调解。"
 CHI_foreign.200.d: "我们的海岸警卫队舰艇与日本海上自卫队舰艇在东海相距不到两海里。下一步行动由我们决定。每个选择都伴随着后果。"
 CHI_foreign.200.t: "舰队已就位"
 CHI_foreign.201.a: "立场坚定。命令海上自卫队坚守阵地。"
 CHI_foreign.201.b: "立即请求美国介入。"
 CHI_foreign.201.c: "退一步，寻求外交解决之道。"
 CHI_foreign.201.d: "中国船只在争议边界附近保持着位置。东京必须决定后退的幅度。"
 CHI_foreign.201.t: "中国施压钓鱼岛列岛"
 CHI_foreign.202.a: "履行承诺。向日本发出军事支持信号。"
 CHI_foreign.202.b: "保持观望态度。表达关切而不诉诸武力。"
 CHI_foreign.202.d: "日本已援引其同盟义务。中国船只正向钓鱼岛边界施压，东京则要求华盛顿履行其承诺。无论结果如何，这一决定都将付出代价。"
 CHI_foreign.202.t: "你们会履行承诺吗？"
 CHI_foreign.203.a: "保持警惕"
 CHI_foreign.203.b: "冲突就在我们身边。密切关注。"
 CHI_foreign.203.c: "一场遥远的争吵。记下来，然后继续前进。"
 CHI_foreign.203.d: "中国和日本船只在钓鱼岛附近海域发生冲突。该事件引起国际社会关注，并引发了人们对该地区局势进一步升级的担忧。"
 CHI_foreign.203.t: "东海对峙"
 CHI_foreign.204.a: "驳回该声明。维持我们的行政控制。"
 CHI_foreign.204.b: "提出正式抗议并咨询华盛顿方面意见。"
 CHI_foreign.204.d: "中国已正式发表对钓鱼岛的主权声明，并宣布将持续开展海警巡逻。预计东京方面将作出回应。"
 CHI_foreign.204.t: "北京声称对钓鱼岛拥有主权"
 CHI_foreign.206.a: "将公报送往东京。"
 CHI_foreign.206.d: "峰会圆满结束，日本签署了联合公报全文。这份声明约束双方致力于维护中日关系稳定，并默许解决历史遗留问题，现已正式载入史册。"
 CHI_foreign.206.t: "公报已签署"
 CHI_foreign.208.a: "保持警惕"
 CHI_foreign.208.b: "区域力量平衡发生转变。评估现状。"
 CHI_foreign.208.c: "承认发展成果"
 CHI_foreign.208.d: "中日两国发表联合公报，正式确立了战略共识。公报承诺双方将致力于维持稳定关系，并就历史遗留问题达成默契。分析人士对于北京和东京谁获益更多存在分歧。"
 CHI_foreign.208.t: "中日签署公报"
 CHI_foreign.211.a: "悄悄取消出访"
 CHI_foreign.211.b: "国事访问继续进行"
 CHI_foreign.211.d: "北京召回大使和外交冻结使得下一轮靖国神社参拜成为一次关键考验。日本内阁会化解这场争端，还是会加剧民族自豪感？"
 CHI_foreign.211.t: "东京在靖国神社问题上的选择"
 CHI_foreign.212.a: "升级海岸警卫队响应"
 CHI_foreign.212.b: "开辟秘密渠道以缓和局势"
 CHI_foreign.212.d: "中国海上民兵与日本海上保安厅舰艇在钓鱼岛附近海域的对峙升级。内阁必须在相关画面出现在晚间新闻之前做出回应。"
 CHI_foreign.212.t: "钓鱼岛对峙事件"
 CHI_foreign.216.a: "紧急出动战斗机，坚守防空识别区线"
 CHI_foreign.216.b: "将事件转交给一条隐秘的渠道"
 CHI_foreign.216.d: "中国飞机现在每天都进入东海防空区，一架解放军战斗机与一架日本航空自卫队战机险些相撞，令东京方面高度紧张。仅靠海岸警卫队已无法应对钓鱼岛周边的压力。"
 CHI_foreign.216.t: "钓鱼岛防空识别区对抗"
 CHI_foreign.217.a: "部署解放军海军特遣队并坚持到底"
 CHI_foreign.217.b: "在枪声响起之前撤退"
 CHI_foreign.217.d: "中国海军特遣舰队在争议岛屿附近跟踪日本舰艇，两国海军均已进入战斗警戒状态。任何一次误判都可能引发中日战争的第一枪。东京方面正密切关注北京方面是会坚守阵地还是选择退让。"
 CHI_foreign.217.t: "钓鱼岛对峙处于崩溃边缘"
 CHI_foreign.213.a: "向游说集团支付费用，结束抵制活动"
 CHI_foreign.213.b: "渡过难关"
 CHI_foreign.213.d: "日本出口商和经团联的耐心正在逐渐耗尽。中国的抵制行动正将日本品牌拒之门外，使其无法进入中国最大的市场之一。东京必须做出抉择：是向北京支付赎金，还是硬扛这场风暴？"
 CHI_foreign.213.t: "抵制行动"
 CHI_foreign.215.a: "执行安全条约"
 CHI_foreign.215.b: "通过秘密渠道斡旋停战"
 CHI_foreign.215.d: "北京方面强加了钓鱼岛问题。美中安全条约规定华盛顿有义务考虑干预。总统既可以公开执行条约，也可以推动秘密停战。"
 CHI_foreign.215.t: "华盛顿的钓鱼岛决定"
 CHI_foreign.220.a: "欢迎序曲"
 CHI_foreign.220.b: "礼貌的怀疑"
 CHI_foreign.220.d: "北京已释放出开放信号，其模式与1978年福田主义如出一辙。东京可以欢迎这一示好，也可以礼貌地表示怀疑。"
 CHI_foreign.220.t: "福田主义的新世纪篇章"
 CHI_foreign.221.a: "主持全面国事访问"
 CHI_foreign.221.b: "低调接待"
 CHI_foreign.221.d: "中国已向日本上野动物园赠送大熊猫，作为国事访问的礼物。日本内阁必须决定是接待正式的国事访问，还是保持低调。"
 CHI_foreign.221.t: "给东京的熊猫"
 CHI_foreign.222.a: "签署协议"
 CHI_foreign.222.b: "等待更多证据"
 CHI_foreign.222.d: "北京已提交一份双边声明，正式放弃“历史敌人”的说法。东京可以签署并予以对等回应，也可以等待中方进一步表明诚意。"
 CHI_foreign.222.t: "相互威胁减少条约"
 CHI_foreign.223.a: "向日本施压，要求其重新承诺"
 CHI_foreign.223.b: "将四方对话降级为对话"
 CHI_foreign.223.d: "北京的外交攻势正逐渐瓦解东京在四方安全对话中的地位。华盛顿可以向日本施压，迫使其重新承诺，也可以选择默默接受降级。"
 CHI_foreign.223.t: "四方的回应"
 CHI_foreign.224.a: "签署完整公报"
 CHI_foreign.224.b: "预订登记"
 CHI_foreign.224.c: "退席"
 CHI_foreign.224.d: "经过多年的耐心外交努力，一份公报草案已经出炉。签署全文将重塑日本的战略姿态；有保留地签署则可在不与华盛顿决裂的情况下维护双边关系；退出则会彻底破坏整个进程。"
 CHI_foreign.224.t: "东京公报"
 CHI_foreign.226.a: "注意这些保留意见，然后继续前进。"
 CHI_foreign.226.d: "东京签署了内容更为精简的公报版本。自民党并未接受全文，而是提出了具体的保留意见，从而在一定程度上与华盛顿保持一致。尽管战略上的不确定性依然存在，但双边关系仍在向前发展。"
 CHI_foreign.226.t: "与日本达成的部分协议"
 CHI_foreign.227.a: "评估损害"
 CHI_foreign.227.d: "多年的外交努力付诸东流。自民党拒绝接受最终公报文本，指责北京越权行事，践踏日本主权。整个谈判框架就此崩溃。"
 CHI_foreign.227.t: "日本退出谈判"
 CHI_foreign.231.a: "注意其中的商业机会。"
 CHI_foreign.231.d: "北京方面欢迎三菱航空航天公司在中国大陆设立特许生产和研发机构。日本企业将获得出口收入和市场准入；中国航空航天工程师则能更接近先进的飞机机身设计。"
 CHI_foreign.231.t: "三菱航空航天在中国开设分公司"
 CHI_foreign.232.a: "注意其中的商业机会。"
 CHI_foreign.232.d: "川崎重工航空航天事业部与北京方面达成框架协议，涵盖大型飞机机身部件的生产。该协议不仅为川崎重工打开了可观的中国市场份额，也使其在东京对中国航空航天采购周期的影响力倍增。"
 CHI_foreign.232.t: "川崎航空航天公司进入中国市场"
 CHI_foreign.233.a: "注意其中的商业机会。"
 CHI_foreign.233.d: "日本制钢所已获准在中国运营一家合资锻造厂。大型钢锻件的出口利润使东京能够持续掌控中国的重工业产能。"
 CHI_foreign.233.t: "日本制钢所抵达中国"
 CHI_foreign.234.a: "注意其中的商业机会。"
 CHI_foreign.234.d: "三菱重工陆地系统部门已与一家中国国有企业达成技术许可协议。日本获得商业收益；北京则获得装甲车辆设计方法。"
 CHI_foreign.234.t: "三菱重工陆地系统公司受邀赴华"
 CHI_foreign.235.a: "注意其中的商业机会。"
 CHI_foreign.235.d: "小松防务在中国建立了轻型装甲车辆的生产合作关系。该协议为东京带来了稳定的出口收入，并深化了双边国防工业联系。"
 CHI_foreign.235.t: "小松防务进军中国市场"
 CHI_foreign.236.a: "注意其中的商业机会。"
 CHI_foreign.236.d: "斯巴鲁汽车公司的航空航天部门与一家中国公司达成了一项联合制造协议。斯巴鲁将旋翼机结构方面的专业技术引入中国项目，同时斯巴鲁也获得了长期零部件订单。"
 CHI_foreign.236.t: "斯巴鲁航空航天合作协议签署"
 CHI_foreign.237.a: "注意其中的商业机会。"
 CHI_foreign.237.d: "丰和工业已将其精密加工工艺授权给一家中国合作企业。此举不仅为合作企业带来出口收入，还将日本轻武器制造标准引入中国国防供应链。"
 CHI_foreign.237.t: "丰和工业在中国开展业务"
 CHI_foreign.238.a: "注意其中的商业机会。"
 CHI_foreign.238.d: "日本电气公司在中国开设了一家合资电子集成中心。商业回报丰厚；而对东京而言，更深远的意义在于能够持续影响中国C4ISR（指挥、控制、通信、计算机、情报、监视与侦察）采购标准。"
 CHI_foreign.238.t: "日本电气公司在中国设立运营机构"
 CHI_foreign.239.a: "注意其中的商业机会。"
 CHI_foreign.239.d: "东芝防务系统公司已同意在许可管理框架下向中国系统集成商供应雷达和传感器组件。日本保留设计权，同时获得稳定的技术转让费。"
 CHI_foreign.239.t: "东芝防务系统在中国"
 CHI_foreign.240.a: "注意其中的商业机会。"
 CHI_foreign.240.d: "三菱船务集团旗下的造船部门与一家中国国有造船厂签署了海军舰艇建造合作协议。东京方面的主要收益包括出口收入以及对中国水面作战舰艇设计标准的长期影响力。"
 CHI_foreign.240.t: "三菱船务与北京签署协议"
 CHI_foreign.241.a: "注意其中的商业机会。"
 CHI_foreign.241.d: "川崎重工的造船部门已同意与一家中国合作伙伴分享潜艇船体制造技术。日本由此获得市场准入；北京则得以接触到声学特征降低技术。"
 CHI_foreign.241.t: "川崎造船欢迎来到中国"
 CHI_foreign.242.a: "注意其中的商业机会。"
 CHI_foreign.242.d: "IHI已获得在中国以特许生产模式生产航空发动机零部件的许可。东京方面将获得稳定的收入来源，并在中国军用航空采购领域站稳脚跟。"
 CHI_foreign.242.t: "IHI株式会社进军中国市场"
 CHI_foreign.243.a: "注意其中的商业机会。"
 CHI_foreign.243.d: "日本海洋联合公司与一家中国造船企业签署了船舶设计合作协议。该协议不仅带来出口收入，也确立了日本在中国水面作战舰艇项目研发中长期扮演的角色。"
 CHI_foreign.243.t: "日本海洋联合伙伴关系协议签署"
 CHI_foreign.244.a: "注意其中的商业机会。"
 CHI_foreign.244.d: "丰田汽车公司已同意在新合作框架下扩大其在中国的生产和物流布局。生产体系出口将增强日本对中国工业现代化进程的软性影响力。"
 CHI_foreign.244.t: "丰田在中国建立制造工厂"
 CHI_foreign.245.a: "注意其中的商业机会。"
 CHI_foreign.245.d: "本田汽车公司已在中国达成一项扩大生产和动力总成许可协议。稳定的特许权使用费收入源源不断地流向东京，同时本田的生产标准也逐渐融入中国工厂的日常运营中。"
 CHI_foreign.245.t: "本田加入合作"
 CHI_foreign.246.a: "注意其中的商业机会。"
 CHI_foreign.246.d: "新日本制铁公司已通过合资协议，同意向中国合作伙伴供应高硬度钢板和特种合金。该交易产生了可观的出口收入，并将中国的装甲钢生产与日本的供应链相绑定。"
 CHI_foreign.246.t: "新日本制铁公司加入中国业务"
 CHI_foreign.247.a: "注意其中的商业机会。"
 CHI_foreign.247.d: "日立已根据合作框架在中国建立了工业电子和嵌入式计算业务。出口收益立竿见影；从长远来看，东京将持续获得对中国基础设施现代化的影响力。"
 CHI_foreign.247.t: "日立进军中国市场"
 CHI_foreign.248.a: "注意其中的商业机会。"
 CHI_foreign.248.d: "松下已与中国合作伙伴达成协议，向其供应电池技术和加固型电子产品。该协议不仅能带来稳定的出口收入，还能将日本零部件标准融入中国军工相关生产线。"
 CHI_foreign.248.t: "松下与中国企业建立合作伙伴关系"
 CHI_foreign.249.a: "注意其中的商业机会。"
 CHI_foreign.249.d: "东日本旅客铁道已同意与中国合作伙伴共享高速铁路信号系统和车辆工程技术。商业回报显而易见；对东京而言，其战略价值在于对中国交通基础设施的长期影响力。"
 CHI_foreign.249.t: "东日本旅客铁道将铁路技术带到中国"
 CHI_foreign.250.a: "顶住压力。"
 CHI_foreign.250.d: "中国官方媒体针对日本战时行为发起了一场协调一致的运动，重点关注官方参拜靖国神社、修订学校教科书和南京大屠杀。反日示威活动正在中国城市蔓延，东京面临着越来越大的回应压力。"
 CHI_foreign.250.t: "北京重新开启历史问题"
 CHI_foreign.55.a: "推动以北京为主导的框架。"
 CHI_foreign.55.b: "扮演平衡的调解人角色。"
 CHI_foreign.55.c: "听从首尔方面的提议。"
 CHI_foreign.55.d: "中国促成了在北京举行的紧急外交峰会，使朝鲜半岛对话摆脱了危机边缘。双方都面临着压力，中国的姿态将影响各国首都对此次峰会的解读。"
 CHI_foreign.55.t: "北京峰会召开"
 CHI_foreign.66.a: "做好承担后果的准备。"
 CHI_foreign.66.d: "行动彻底失败。中国特种部队人员被俘或阵亡，平壤方面宣布掌握北京参与行动的证据。整个地区屏息凝神。"
 CHI_foreign.66.t: "“新曙光行动”曝光"
 CHI_foreign.67.a: "悄悄撤退。"
 CHI_foreign.67.d: "此次行动并未达到预期目标，但平壤安全部门已将事件归咎于国内异见人士。目前，北京方面的角色尚未得到证实。"
 CHI_foreign.67.t: "突袭失败，被掩盖为内部纷争"
 CHI_foreign.68.a: "静观其变。"
 CHI_foreign.68.d: "此次行动引发了首都的公开战斗。效忠朝鲜人民军的部队和持不同政见的派别争夺平壤的控制权，外界对此密切关注。"
 CHI_foreign.68.t: "平壤燃起熊熊烈火"
 CHI_foreign.69.a: "巩固成果。"
 CHI_foreign.69.d: "行动成功。亲北京的领导层巩固了对朝鲜的控制。朝鲜半岛的权力平衡发生了变化。"
 CHI_foreign.69.t: "平壤新曙光"
 CHI_military_event.1.a: "按市场价出售"
 CHI_military_event.1.b: "奖励遵守规定的军官"
 CHI_military_event.1.d: "到1998年12月，江泽民的资产剥离命令已将数千家解放军企业置于民用估值和移交之下。军火库、贸易集团和制药厂等资产均经过评估并移交，军队数十年来建立的庞大帝国被剥离。移交条款仍在谈判中。"
 CHI_military_event.1.t: "万科交接"
 CHI_military_event.10.a: "将文件交给纪委"
 CHI_military_event.10.b: "掩盖调查"
 CHI_military_event.10.d: "中央纪委调查人员突击搜查了一位靠军队项目发家致富的中将的住所。和2012年搜查顾谷俊山时一样，他们带走了成箱的现金、茅台酒以及一尊毛泽东的金像。他的上级正在密切关注，看北京是否敢于追查此事，还是会像之前的许多案件一样不了了之。"
 CHI_military_event.10.t: "一位将军的财富被挖掘出来"
 CHI_military_event.2.a: "收割商业部门"
 CHI_military_event.2.b: "自上而下指挥"
 CHI_military_event.2.d: "2017年，军民融合战略被提升为国家战略，旨在打破中国民用和国防工业基地之间的壁垒。高校、国有企业和民营科技公司被要求与解放军共享研究、生产能力和供应链，在中央军委的监督下，将整个经济转向军民两用生产。"
 CHI_military_event.2.t: "宣布军民融合"
 CHI_military_event.4.a: "追逐军火市场"
 CHI_military_event.4.b: "购买海外政治影响力"
 CHI_military_event.4.d: "中国人民解放军总参谋部的武器出口子公司保利科技，向非洲、中东和拉丁美洲输送中国制造的步枪、反舰导弹和短程弹道导弹系统。其民用子公司保利文化则通过香港的拍卖行和海外房地产洗钱。这些收入通过从未出现在任何官方预算中的空壳公司回流到军方。"
 CHI_military_event.4.t: "保利科技走向全球"
 CHI_military_event.5.a: "交出几个替罪羊"
 CHI_military_event.5.b: "紧密团结并反抗审计"
 CHI_military_event.5.d: "习近平2012年发起的反腐运动已经波及到中央后勤总局。徐才厚和郭伯雄，这两位曾任中央军委副主席、在全军范围内推行“以钱晋升”制度的官员，面临起诉。这个集团必须做出抉择：是交出替罪羊以求喘息之机，还是团结一致，挑战北京的进一步施压。"
 CHI_military_event.5.t: "清算时分"
 CHI_military_event.6.a: "宣誓效忠中国梦"
 CHI_military_event.6.b: "保持沉默的特权"
 CHI_military_event.6.d: "徐才厚在审判前因癌症去世，郭伯雄被剥夺军衔，幸存的势力接受了新的条件。他们高调宣称效忠习近平的“中国梦”，交出几名中层官员作秀，并达成了一项秘密协议：公开掠夺行径就此终结，但控制物流合同、建筑投标和武器采购的势力网络以更加隐秘的形式继续存在。"
 CHI_military_event.6.t: "向中国梦致敬"
 CHI_political_events.1.a: "协调全国应对措施。"
 CHI_political_events.1.d: "一种新型冠状病毒已从广东省蔓延至香港、越南、加拿大和新加坡。世界卫生组织已发布全球卫生警报。广州和北京的医院不堪重负，公众的恐慌情绪蔓延速度甚至超过了病毒本身。"
 CHI_political_events.1.t: "非典疫情"
 CHI_political_events.2.a: "部署所有可用资源。"
 CHI_political_events.2.d: "四川省发生7.9级地震，震中位于汶川县附近。超过6.9万人死亡，1.8万人失踪。地震及引发的二次山体滑坡摧毁了多个城镇。"
 CHI_political_events.2.t: "汶川地震"
 CHI_political_events.3.a: "比赛开始吧。"
 CHI_political_events.3.d: "2008年北京奥运会今天正式开幕。经过多年的筹备和前所未有的建设努力，中国向世界运动员敞开大门，欢迎他们来到国家体育场。开幕式吸引了全球数亿观众，展现了中国在国际舞台上的崛起。"
 CHI_political_events.3.t: "第二十九届奥林匹克运动会"
 CHI_political_events.4.a: "加快技术发展"
 CHI_political_events.4.b: "加强社会凝聚力"
 CHI_political_events.4.c: "扩充军力"
 CHI_political_events.4.d: "随着党的十九大闭幕，大会确定了实现两个百年里程碑的优先事项：到2021年建成小康社会，到2049年建成社会主义全面发展国家。国家资源必须得到合理分配。党将把精力集中在哪里？"
 CHI_political_events.4.t: "两个百年目标"
 CHI_political_events.5.a: "提拔团派候选人"
 CHI_political_events.5.b: "提拔太子党候选人"
 CHI_political_events.5.c: "将决定权交在习近平手中"
 CHI_political_events.5.d: "接班人问题已不再是纸上谈兵。习近平巩固了权力，但党需要制度上的延续性。政治局常委会正等待指示。现在的选择将塑造中国下一代领导层。"
 CHI_political_events.5.t: "指定接班人"
 CHI_political_events.50.a: "开始为老中国的未来做好规划。"
 CHI_political_events.50.d: "中国劳动年龄人口峰值曾达约9.4亿，如今已开始长期萎缩。过去三十年推动两位数增长的过剩劳动力不再增长。经济学家指出，这种转变是结构性的，而非周期性的：如果没有政策干预，工厂和建筑工地将在本世纪剩余的时间里争夺日益萎缩的劳动力。"
 CHI_political_events.50.t: "人口红利逐渐消失"
 CHI_political_events.51.a: "面对清算吧。"
 CHI_political_events.51.d: "2010年第六次全国人口普查证实了人口学家长期以来的警告：60岁及以上人口的比例已攀升至13.3%，中位年龄持续上升。“4-2-1”家庭结构 - 一个孩子要承担父母和四个祖父母的赡养责任 - 如今已成为中国城市地区的统计常态。人口下降不再是遥远的预测。"
 CHI_political_events.51.t: "人口普查揭示人口老龄化加速"
 CHI_political_events.52.a: "一个更严格但更真实的基准。"
 CHI_political_events.52.d: "经过多年的经济压力和政策调整，中国已达到新的人口平衡状态。劳动力规模缩小且老龄化，养老金成本上升，生育率仍低于人口更替水平，但转型带来的剧烈冲击已经过去。这十年间，中国因形势所迫而变得更加自律：公共财政更加精简，自动化程度更高，福利制度也更加贴合“先老后富”的社会现状。"
 CHI_political_events.52.t: "灰色社会危机逐渐消退"
 CHI_political_events.6.a: "致敬我们的民族英雄"
 CHI_political_events.6.b: "寻求外交解决"
 CHI_political_events.6.d: "2001年4月1日，一架美国海军EP-3信号侦察机在海南岛附近与一架中国人民解放军空军歼-8截击机相撞。美方机组人员在中国境内紧急迫降。北京方面必须决定如何处理这场对峙。"
 CHI_political_events.6.t: "海南对峙"
 CHI_political_events.7.a: "该行业发展不足 - 此次打击力度很大。"
 CHI_political_events.7.b: "该行业会受到打击的影响，但不会崩溃。"
 CHI_political_events.7.c: "该行业的规模可以缓冲这种冲击。"
 CHI_political_events.7.d: "2020年10月，马云在外滩金融峰会上将中国银行比作当铺，此举引发了一系列监管行动。中国证监会和国家市场监督管理总局在蚂蚁集团340亿美元的IPO上市前两天叫停了其上市计划。反垄断调查人员对阿里巴巴展开调查。滴滴出行在纽交所上市两天后，国家互联网信息办公室启动了对其的国家安全审查。科技行业与国家关系的根本性重构由此展开。"
 CHI_political_events.7.e: "该行业已经足够成熟，可以将监管转化为结构稳定。"
 CHI_political_events.7.t: "大型科技公司遭打压"
 CHI_political_events.8.a: "继续为计算机行业提供资金"
 CHI_political_events.8.d: "为贯彻以科技振兴国家的战略方针，国家支持的机构正在加快对下一代计算和互联网基础设施的投资。从大学实验室到经济特区，中国正在为未来几十年奠定数字化基础。"
 CHI_political_events.8.t: "通过科学和技术推动创新"
 CHI_sco.1.a: "我们欢迎他们的关注。"
 CHI_sco.1.b: "我们不能给予这种地位"
 CHI_sco.1.d: "[FROM.GetNameWithFlag]已正式申请成为上海合作组织的观察员国。我们必须决定是否批准其申请。"
 CHI_sco.1.t: "上海合作组织观察员国申请"
 CHI_sco.10.a: "我们与中国共进退"
 CHI_sco.10.b: "我们不会被中国的野心所束缚。"
 CHI_sco.10.c: "保持中立"
 CHI_sco.10.d: "中国要求我们公开声明只效忠于其在上海合作组织内的派系，迫使我们在北京和莫斯科之间做出选择。"
 CHI_sco.10.t: "中国要求你效忠"
 CHI_sco.11.a: "我们非常感谢此支持。"
 CHI_sco.11.d: "[FROM.GetNameWithFlag]正在提供发展援助，以支持我们的经济现代化，这是上海合作组织合作框架的一部分。"
 CHI_sco.11.t: "上海合作组织发展援助"
 CHI_sco.2.a: "他们已经证明自己有资格成为正式会员。"
 CHI_sco.2.b: "我们无法支持此申请。"
 CHI_sco.2.d: "[FROM.GetNameWithFlag]已提交加入上海合作组织的正式成员资格申请。"
 CHI_sco.2.t: "上海合作组织会员申请"
 CHI_sco.20.a: "投入政治资本以恢复信心。"
 CHI_sco.20.b: "我们还有更紧迫的问题需要解决。"
 CHI_sco.20.d: "上海合作组织内部凝聚力已下降到令人担忧的程度。一些成员国对该组织的发展方向表示质疑，如果不加以干预，合作可能会进一步恶化。"
 CHI_sco.20.t: "成员质疑上海合作组织方向"
 CHI_sco.21.a: "我们的时刻来了。"
 CHI_sco.21.d: "上海合作组织蓬勃发展。成员国报告称，合作水平空前高涨，联合项目取得丰硕成果，该组织的国际地位也空前强大。"
 CHI_sco.21.t: "合作的黄金时代"
 CHI_sco.22.a: "利用优势。"
 CHI_sco.22.b: "我们应该缓和紧张局势。"
 CHI_sco.22.d: "我们在上海合作组织中日益增强的影响力已引起各方关注。俄罗斯作用的减弱加剧了摩擦，莫斯科已开始通过外交渠道表达不满。"
 CHI_sco.22.t: "俄罗斯在上海合作组织中被边缘化。"
 CHI_sco.23.a: "我们必须重申我们的立场。"
 CHI_sco.23.b: "或许这样最好。"
 CHI_sco.23.d: "俄罗斯在上海合作组织的影响力日益增强，以至于我们自身的领导地位都受到了质疑。莫斯科越来越主导着议程，如果我们不采取行动，就有可能在自己的组织中沦为配角。"
 CHI_sco.23.t: "中国失去主动权"
 CHI_sco.3.a: "我们的部队将非常乐意有机会与他们的部队一起训练。"
 CHI_sco.3.b: "目前无法与[FROM.GetName]进行合作。"
 CHI_sco.3.d: "[FROM.GetNameWithFlag]提议在上海合作组织框架下举行联合军事演习。这将加强我们两国军队之间的安全合作。"
 CHI_sco.3.t: "联合军事演习邀请"
 CHI_sco.30.a: "批准这个项目"
 CHI_sco.30.b: "现在不是合适的时候"
 CHI_sco.30.d: "[FROM.GetNameWithFlag]提议建设覆盖上海合作组织的一体化能源网络。作为领导成员，我们必须决定是否批准这项雄心勃勃的基础设施项目。"
 CHI_sco.30.t: "上海合作组织输电网络提议"
 CHI_sco.31.a: "批准这个项目"
 CHI_sco.31.b: "我们无法对此做出承诺。"
 CHI_sco.31.d: "[FROM.GetNameWithFlag]提议建设一个横跨大陆的铁路网，以连接上海合作组织成员国的经济体。这将需要大量投资，但有望彻底改变整个组织的贸易格局。"
 CHI_sco.31.t: "跨欧亚铁路提议"
 CHI_sco.32.a: "批准成立该银行。"
 CHI_sco.32.b: "条件并不有利。"
 CHI_sco.32.d: "[FROM.GetNameWithFlag]提议在上海合作组织框架下建立一家多边开发银行。该机构将为成员国的基础设施和发展提供融资。"
 CHI_sco.32.t: "上海合作组织开发银行提案"
 CHI_sco.33.a: "批准此网络。"
 CHI_sco.33.b: "我们对此有所保留。"
 CHI_sco.33.d: "[FROM.GetNameWithFlag]提议建立一个覆盖上海合作组织成员国的综合防空网络。共享雷达覆盖和协调导弹防御将加强集体安全。"
 CHI_sco.33.t: "上海合作组织联合防空提案"
 CHI_sco.34.a: "我们很荣幸成为创始成员之一。"
 CHI_sco.34.d: "北京方面正式推进了长期以来讨论的“上海五国”转型为全面政府间机构的进程。拟议中的上海合作组织将深化我们与中国及周边国家的政治、安全和经济联系，而我们从一开始就是创始成员国之一。"
 CHI_sco.34.t: "中国提议成立上海合作组织"
 CHI_sco.4.a: "演习开始。"
 CHI_sco.4.d: "[FROM.GetNameWithFlag]已接受我们参加联合军事演习的邀请。"
 CHI_sco.4.t: "联合演习被接受"
 CHI_sco.5.a: "这是他们的损失。"
 CHI_sco.5.d: "[FROM.GetNameWithFlag]已拒绝我们参加联合军事演习的邀请。"
 CHI_sco.5.t: "联合演习被拒绝"
 CHI_sco.6.a: "这些演习看起来很像是战争准备。"
 CHI_sco.6.b: "只有恐怖分子和极端分子才会对这些演习感到恐惧。"
 CHI_sco.6.c: "值得关注的有趣进展。"
 CHI_sco.6.d: "上海合作组织发起了一项涉及其成员国武装部队的大规模军事演习。"
 CHI_sco.6.t: "上海合作组织启动大规模军事演习"
 CHI_sco.7.a: "中国的势力范围持续扩大。"
 CHI_sco.7.b: "有利于多边外交的一天。"
 CHI_sco.7.d: "[FROM.GetNameWithFlag]已被正式接纳为上海合作组织的正式成员。"
 CHI_sco.7.t: "[FROM.GetNameWithFlag]加入上海合作组织"
 CHI_sco.8.a: "中国的侵略行为又疏远了另一个伙伴。"
 CHI_sco.8.b: "这是国际合作的一次令人遗憾的挫折。"
 CHI_sco.8.d: "[FROM.GetNameWithFlag]宣布退出上海合作组织，理由是存在不可调和的分歧。"
 CHI_sco.8.t: "[FROM.GetNameWithFlag]退出上海合作组织"
 CHI_sco.9.a: "中国不愿与他人分享荣光。"
 CHI_sco.9.d: "中国已采取果断行动，确立其在上海合作组织中的主导地位，排挤俄罗斯，并确立了自身作为该组织无可争议的领导力量的地位。"
 CHI_sco.9.t: "中国巩固对上海合作组织的控制权"
 CHI_semiconductor_events.1.d: "美国已扩大出口管制范围，涵盖先进半导​​体设备、EDA软件和高带宽存储器组件。欧洲、日本和韩国等盟国政府已协调出口许可制度，以加强管制。这项技术禁运体现了华盛顿阻止中国在先进逻辑和存储器生产领域缩小差距的决心。"
 CHI_semiconductor_events.1.o1: "无论如何，我们都会继续前进。"
 CHI_semiconductor_events.1.t: "西方半导体业的抵制"
 CHI_semiconductor_events.2.a: "展现这一成就"
 CHI_semiconductor_events.2.b: "保持安静，积蓄能力"
 CHI_semiconductor_events.2.d: "华为发布了搭载国产麒麟9000S系统芯片的Mate 60 Pro手机。拆解分析确认，该芯片由中芯国际使用其相当于7纳米制程的N+2工艺制造。这一突破改变了公众对出口管制导致倒退程度的假设。"
 CHI_semiconductor_events.2.t: "Mate 60的惊喜"
 CHI_semiconductor_events.3.a: "依靠天界"
 CHI_semiconductor_events.3.b: "忍受并改道穿过灰色通道"
 CHI_semiconductor_events.3.d: "2025年5月美国工业与安全局的修正案将我们列为EDA工具的限制目的地。新思科技和楷登电子已提交必要的强制性许可申请。几周内就会收到许可拒绝通知。现在，所有先进设计都必须在国内完成流片。"
 CHI_semiconductor_events.3.t: "新思科技和楷登电子切断了我们的联系"
 CHI_semiconductor_events.4.a: "推动国内AI企业的资质认证"
 CHI_semiconductor_events.4.b: "向俄罗斯和伊朗出口HBM"
 CHI_semiconductor_events.4.d: "长鑫存储科技合肥工厂提前一年开始量产高带宽内存2堆叠芯片，比其公开宣称的2026年目标提前了整整一年。首批认证样品已交付寒武纪和壁仞科技。国内AI加速器建设不再需要克服国外存储器供应的瓶颈。"
 CHI_semiconductor_events.4.t: "长鑫存储HBM2进度超前"
 CHI_semiconductor_events.5.a: "简化芯片控制"
 CHI_semiconductor_events.5.b: "坚持出口管制政策"
 CHI_semiconductor_events.5.d: "中国将稀土和镓的持续出口与半导体出口管制的解除挂钩。由于西方磁体和芯片基板供应链依赖中国的精炼，北京方面认为这种谈判筹码是双向的。我们收到的提议是直接的贸易方案：放宽芯片禁运，保障关键矿产的流通。"
 CHI_semiconductor_events.5.t: "北京的稀土提议"
 CHI_semiconductor_events.6.a: "加快国内扩张"
 CHI_semiconductor_events.6.d: "华盛顿悄然扩大了成熟节点工具和设计软件的许可审批范围，以换取稀土供应的保障。这种宽限措施是部分性的，而且是可逆的，但它为我们的代工厂争取了时间，使其能够在不受全面禁运影响的情况下弥补剩余的缺口。"
 CHI_semiconductor_events.6.t: "控制放松"
 CHI_semiconductor_events.7.a: "接受挫折"
 CHI_semiconductor_events.7.d: "华盛顿断然拒绝了这一提议，他们认为在芯片问题上做出让步会使其失去最有力的筹码。出口管制依然有效，此前为这一提议投入的政治资本也已付诸东流。自力更生仍然是我们唯一的出路。"
 CHI_semiconductor_events.7.t: "会谈失败"
 CHI_space_events.1.a: "全国人民都在关注我们。"
 CHI_space_events.1.d: "在文昌航天发射场，长征十号运载火箭在滚滚浓烟和火焰中缓缓升空，搭载着梦舟载人飞船和三名航天员向地月转移轨道前进。全国所有电视屏幕都在直播这一发射过程。全世界都在关注。"
 CHI_space_events.1.t: "长征号月球发射升空"
 CHI_space_events.10.a: "为卫星和跟踪网络提供充足的资金"
 CHI_space_events.10.b: "以稳健的步伐进行"
 CHI_space_events.10.d: "随着嫦娥登月计划正式启动，国务院正在权衡如何为配套基础设施筹集资金。首要问题是卫星和跟踪网络：包括鹊桥中继站和深空天线，它们能够让宇航员在38万公里之外保持联系。我们可以现在一次性全额拨款，也可以分期付款，稳步推进。"
 CHI_space_events.10.t: "为登月之路提供资金"
 CHI_space_events.11.a: "加快长征十号发展"
 CHI_space_events.11.b: "严格按照计划时间表执行"
 CHI_space_events.11.d: "没有重型运载火箭，载人登月任务就不可能实现。“长征十号”火箭的设计目标是分阶段将“梦舟”载人飞船和“揽月”着陆器送往月球。加快研发虽然成本高昂，但节省的每一个月都让登月目标更近一步。"
 CHI_space_events.11.t: "重型运载问题"
 CHI_space_events.12.a: "相信工程师"
 CHI_space_events.12.d: "稳扎稳打的推进方式既保证了项目的成本可控，又确保了政治上的安全。中国运载火箭技术研究院的工程师们以可持续的步伐推进各项资质认证工作，他们坚信耐心终将在发射台上得到回报。"
 CHI_space_events.12.t: "稳定的节奏"
 CHI_space_events.13.a: "收获回报"
 CHI_space_events.13.d: "过去几年的资金投入决策终于结出了硕果。跟踪天线投入使用，发动机通过了资格测试，月球结构逐渐成型。远见卓识的红利如今已准备就绪。"
 CHI_space_events.13.t: "投资成熟"
 CHI_space_events.2.a: "这是中国人民的一次巨大飞跃。"
 CHI_space_events.2.d: "揽月号着陆器在月球南极着陆。任务指挥官打开舱门，走下舷梯。他向十亿听众现场直播的第一句话是：我们到了，我们将留在这里。中国登月成功。"
 CHI_space_events.2.t: "宇航员踏上月球"
 CHI_space_events.20.a: "国家的胜利"
 CHI_space_events.20.b: "我们工业界的胜利"
 CHI_space_events.20.c: "我们科学界的胜利"
 CHI_space_events.20.d: "宇航员已经登上月球并安全返回。一个曾经依赖进口火箭的国家，如今已将自己的旗帜插在了另一个星球上。现在，领导层必须决定这项成就将带来怎样的深远意义：国家威望、工业实力、科学雄心，还是军事自信？月球带来的红利将塑造未来几十年的格局。"
 CHI_space_events.20.e: "我们决心的胜利"
 CHI_space_events.20.t: "登月遗产"
 chi_uighur.1.a: "派遣防暴警察驱散"
 chi_uighur.1.b: "派遣党政官员进行谈判"
 chi_uighur.1.c: "大规模逮捕，指责外国煽动者"
 chi_uighur.1.d: "乌鲁木齐发生汉族居民与维吾尔族工人冲突事件后，示威者走上街头。防暴警察已封锁中心城区，但人群仍在聚集。新疆党委正在等待北京方面的指示。"
 chi_uighur.1.t: "乌鲁木齐街头抗议"
 chi_uighur.2.a: "扩大监控等级"
 chi_uighur.2.b: "社区外展和经济援助"
 chi_uighur.2.c: "公开处决起事者"
 chi_uighur.2.d: "一起针对繁华市场区的协同炸弹袭击造成人员伤亡，并彻底打破了这座城市原本的平静。东突厥斯坦伊斯兰运动已宣布对此事负责。安全部队已进入高度戒备状态，北京方面要求迅速做出回应。"
 chi_uighur.2.t: "乌鲁木齐市场遭炸弹袭击"
 chi_uighur.3.a: "在乌鲁木齐实施戒严"
 chi_uighur.3.b: "大规模拘留、启用再教育营"
 chi_uighur.3.c: "与维吾尔族社区领袖进行谈判"
 chi_uighur.3.d: "持续数月的紧张局势已在乌鲁木齐及其周边几个地区演变为公开暴力冲突。维吾尔族抗议者和汉族居民之间的冲突令当地警方疲于应对。此次动乱的规模令人想起2009年的骚乱，亟需党中央立即做出决定。"
 chi_uighur.3.t: "新疆爆发大规模骚乱"
 chi_uighur.4.a: "拒绝一切干涉我国内政的行为。"
 chi_uighur.4.b: "允许联合国进行有限的实况调查访问"
 chi_uighur.4.d: "新疆大规模拘禁和设立再教育营的报道引发了西方国家政府、土耳其和国际人权组织的强烈谴责。要求进行独立调查的呼声日益高涨，一些国家的首都也威胁要采取惩罚措施。"
 chi_uighur.4.t: "国际社会谴责北京"
 chi_uighur.5.a: "静默运行，全面扰动"
 chi_uighur.5.d: "安全部门已成功识别并定位一个计划在新疆各地发动袭击的武装组织。根据精准情报，安全部门开展了一次秘密行动，在袭击发生前将其摧毁。"
 chi_uighur.5.t: "反恐情报突破"
 chi_uighur.6.a: "采取强硬措施将恢复秩序"
 chi_uighur.6.b: "北京的铁腕"
 chi_uighur.6.d: "中国新疆地区爆发暴力骚乱。车辆燃烧、全副武装的安保人员的画面在国际上广泛传播。北京方面已宣布将恢复秩序，但骚乱的规模引起了世界各国政府和观察人士的密切关注。"
 chi_uighur.6.t: "新疆爆发骚乱"
 china_national_committee.02.a: "选择委员会成员"
 china_national_committee.02.d: "中共全国代表大会召开。来自全国各地的代表齐聚一堂，共同决定未来五年的政治方向。大会将选举产生最重要的各委员会及其领导班子。"
 china_national_committee.02.t: "全国代表大会召开"
 china_news.140.a: "已阅。"
 china_news.140.d: "中国人民解放军东北司令部已进入高度戒备状态。官方声明称此举是出于地区安全需要，但未作进一步解释。"
 china_news.140.t: "中国启动东北司令部"
 china_news.141.a: "已阅。"
 china_news.141.d: "在韩国部署“萨德”系统后，中国对韩国发起了广泛的经济报复行动。在华韩国企业表示面临越来越大的压力，中国赴韩旅游的预订量也大幅下降。"
 china_news.141.t: "萨德制裁：北京的经济报复"
 china_news.142.a: "已阅。"
 china_news.142.d: "卫星图像和边境报告证实，中国正在为朝鲜沿三八线的大规模军事集结提供后勤支持。地区各国政府已提高警戒级别。"
 china_news.142.t: "中国支持朝鲜人民军建设"
 china_news.143.a: "已阅。"
 china_news.143.d: "朝鲜军队已越过非军事区，第二次朝鲜战争爆发。中国虽然尚未正式宣战，但其对朝鲜军事行动的物质支持毋庸置疑。"
 china_news.143.t: "朝鲜半岛战火重燃"
 china_news.144.a: "已阅。"
 china_news.144.d: "为应对朝鲜战争后国际社会的制裁，中国宣布了反制措施。此次制裁是自1989年以来中国面临的最广泛的国际经济孤立。"
 china_news.144.t: "中国实施国际孤立"
 china_news.150.a: "已阅。"
 china_news.150.d: "朝鲜发生军事政变，金氏家族下台。中国官方媒体将此次政权更迭描述为朝鲜内政，同时明确表示北京欢迎这一领导层更迭。"
 china_news.150.t: "平壤政变：金氏政权被推翻"
 china_news.151.a: "已阅。"
 china_news.151.d: "朝鲜新成立的过渡政府已签署协议，正式与中国实现经济一体化。外界观察人士称这些安排本质上是朝贡性质的。"
 china_news.151.t: "中国在平壤扶植傀儡政府"
 china_news.152.a: "已阅。"
 china_news.152.d: "朝鲜在政治、经济和战略上对中国的臣服状态已经完成。北京和解协议自1895年以来首次将朝鲜重新定义为中国的藩属国。"
 china_news.152.t: "朝鲜沦为中国的仆从国"
 china_news.153.a: "已阅。"
 china_news.153.d: "中国投资正在重塑朝鲜的经济基础。朝鲜的原材料和劳动力已融入中国的产业链，这些安排将持续数十年。"
 china_news.153.t: "中国吸收朝鲜经济"
 china_news.154.a: "已阅。"
 china_news.154.d: "由于朝鲜已牢牢纳入中国势力范围，中国在东北亚建立了主导性的战略地位，其竞争对手在短期内没有办法扭转这一局面。"
 china_news.154.t: "中国主导东北亚"
 china_news.160.a: "已阅。"
 china_news.160.d: "韩国奉行战略自主主义，并与中国建立了新的安全伙伴关系。自1953年以来一直是印太地区安全基石的美韩同盟已进入终结阶段。"
 china_news.160.t: "首尔转向北京"
 china_news.161.a: "已阅。"
 china_news.161.d: "韩国退出美日菲三边安全框架，实际上瓦解了过去十年建立起来的印太安全架构。"
 china_news.161.t: "印度太平洋架构崩溃"
 china_news.162.a: "已阅。"
 china_news.162.d: "中国已正式发布安全保证，为朝鲜半岛统一提供担保。北京和平保证承诺中华人民共和国将捍卫统一的朝鲜半岛，其条款使朝鲜半岛的战略未来与中国的利益保持一致。"
 china_news.162.t: "中国担保朝鲜半岛统一"
 china_news.44.a: "结束了长达七十年的分裂。"
 china_news.44.d: "在中美联合发出最后通牒后，朝鲜政府和平解散，并将主权移交给大韩民国。朝鲜半岛再次统一，归于首尔的国旗之下。金氏王朝在没有战争的情况下终结。"
 china_news.44.t: "朝鲜半岛在首尔统一"
 china_news.45.a: "最后的朝鲜战争爆发。"
 china_news.45.d: "在平壤拒绝中美联合最后通牒后，中国、美国和韩国对朝鲜宣战。历史上首次，北京和华盛顿联手对抗金氏政权。"
 china_news.45.t: "对朝鲜宣战"
 china_news.boycott_streets.a: "保持警惕"
 china_news.boycott_streets.d: "反日抗议活动已从社交媒体蔓延至街头。汽车经销商纷纷关门歇业，优衣库门店用木板封住橱窗，丰田汽车库存积压。政府却未加干预。"
 china_news.boycott_streets.t: "抵制活动蔓延至中国各大城市"
 china_news.panda_arrives_tokyo.a: "保持警惕"
 china_news.panda_arrives_tokyo.d: "两只来自中华人民共和国的大熊猫抵达成田机场，引发了民众的热烈反响。此举被视为中日关系升温的象征。"
 china_news.panda_arrives_tokyo.t: "熊猫登陆成田机场"
 china_news.yasukuni_recall.a: "保持警惕"
 china_news.yasukuni_recall.d: "在日本首相参拜靖国神社后，中国召回了驻东京大使。这一外交抗议表明北京决心追究日本在祭祀战争死难者方面的责任。"
 china_news.yasukuni_recall.t: "北京召回其大使"
 china_sar.034.a: "立即下令开展安全整治行动。"
 china_sar.034.b: "首先进行调查并与当地领导人接洽。"
 china_sar.034.d: "塔里木盆地一处安全检查站遭到协同攻击，造成警民伤亡。北京必须在立即采取严厉的安全措施和采取较为缓慢的调查应对措施之间做出选择。"
 china_sar.034.t: "新疆袭击事件"
 china_scs.10.a: "注意事态升级。"
 china_scs.10.d: "情报报告描述了中国在有争议的南海地物周围协调部署的渔船队、海上民兵、海岸警卫队快艇和护卫舰的同心环。这一由张召忠少将提出的学说在包围圈完成时没有留下任何法律质疑的余地。我们在该地区的主张和利益现在面临直接压力。"
 china_scs.10.t: "北京采取卷心菜战略"
 china_scs.12.a: "接受结果。"
 china_scs.12.d: "对峙行动已经结束。其结果将决定该特征的实际控制权以及中国必须承担的外交代价。"
 china_scs.12.t: "对峙结束"
 china_scs.13.a: "立即启动航行自由行动。"
 china_scs.13.b: "目前请保持克制。"
 china_scs.13.d: "美国国务院已发出正式外交照会，五角大楼正在权衡各种方案。最有可能的直接应对措施是在人工岛屿12海里专属经济区内开展航行自由行动。第七舰队已进入戒备状态。"
 china_scs.13.t: "华盛顿对中国扩张的回应"
 china_scs.14.a: "停止行动。不要拦截。"
 china_scs.14.b: "尾随船只并进行抗议。"
 china_scs.14.c: "拦截并发出最后警告。"
 china_scs.14.d: "一艘美国海军舰艇已进入中国人工岛设施周围十二海里区域。南海舰队正在等待命令。退出将被视为默认；跟踪保持存在而不升级；主动拦截可能会导致严重事件。"
 china_scs.14.t: "解放军海军对航行自由行动的反应"
 china_scs.15.a: "提起正式抗议并要求赔偿。"
 china_scs.15.b: "召开安全理事会紧急会议。"
 china_scs.15.d: "一次航行自由行动最终演变成海上碰撞或冲突。双方对事件经过各执一词。国际媒体要求进行全面调查；双方国内民众则呼吁对方做出强硬回应。"
 china_scs.15.t: "南海事件"
 china_scs.20.a: "南海上空是中国的天空。"
 china_scs.20.d: "北京宣布在南海设立防空识别区。所有进入该区域的飞机必须发射识别信号、保持无线电通讯，并服从中国空中交通管制部门的指令。美国、日本、澳大利亚和菲律宾立即宣布该防空识别区违反国际法。"
 china_scs.20.t: "南海防空识别区宣布"
 china_scs.21.a: "通过外交渠道发出严厉警告。"
 china_scs.21.b: "护送他们离开并发表声明。"
 china_scs.21.d: "解放军空军拦截机与一架未遵守中国识别程序、正在穿越南海巡逻区的外国军机发生接触。该飞机已被护送或盘问；北京如何应对此次事件，将影响巡逻区的执法公信力以及与该飞机所属国的关系。"
 china_scs.21.t: "拦截外国飞机"
 china_scs.30.a: "积极参与新框架的实施。"
 china_scs.30.d: "北京宣布，其在南海的参与将秉承明代宝船队的精神：通过贸易、伙伴关系和双边对话，而非对抗。“海上丝绸之路”框架已正式扩展至所有沿岸国家。即使根本诉求没有改变，缓和局势的契机依然存在。"
 china_scs.30.t: "北京推行海上外交"
 china_scs.31.a: "向前迈出的建设性一步。"
 china_scs.31.d: "在北京举行的双边会谈后发表的联合声明中，中国及其南海邻国重申了对2002年《南海各方行为宣言》的承诺。声明呼吁通过双边磋商和平解决争端，并重申不采取单方面挑衅行动的承诺。北京方面认为，这一表述排除了其自身在南海的现有存在。"
 china_scs.31.t: "2002年宣言重申"
 china_scs.32.a: "欢迎马尼拉加入新的合作伙伴关系。"
 china_scs.32.b: "维持与美国现有的关系。"
 china_scs.32.d: "杜特尔特总统在北京发表讲话，宣布菲律宾与美国“分离”，并表示愿意与中国建立新的关系。这一声明令华盛顿震惊，令北京欣喜。马尼拉在南海仲裁案裁决问题上的立场如今刻意模糊。"
 china_scs.32.t: "马尼拉正处于十字路口"
 china_scs.33.a: "这是迈向区域稳定的一步。"
 china_scs.33.d: "《人民日报》报道称，中国与其合作伙伴签署了一项联合海洋开发协议，建立了共享的油气勘探和渔业捕捞权管理框架。该协议被誉为“互利共赢的合作典范，也是海上丝绸之路的实践”。未参与该协议的声索国政府拒绝置评。"
 china_scs.33.t: "签署联合海洋开发协议"
 china_scs.34.a: "给予宽限期并重新协商。"
 china_scs.34.b: "执行原条款。"
 china_scs.34.c: "以减免债务为条件换取一些让步。"
 china_scs.34.d: "伙伴国政府宣布无力按期偿还中国“一带一路”基础设施融资项目的贷款。国内反对派政界人士要求重新谈判相关条款；北京方面面临两难选择：一方面要保持灵活性以维系双边关系，另一方面又要采取强硬立场以维护既有的融资惯例。"
 china_scs.34.t: "要求重新谈判债务"
 china_scs.35.a: "外交上的胜利。"
 china_scs.35.d: "东盟峰会公报首次明确表态支持以双边方式管控南海争端，并拒绝“外部势力”介入。这一表述是应中国要求加入的，阻止了越南和菲律宾提出的相关条款的通过。华盛顿方面对此结果予以谴责。"
 china_scs.35.t: "东盟峰会支持中国的立场"
 china_scs.36.a: "重新协商条款。"
 china_scs.36.b: "执行原条款。"
 china_scs.36.c: "收回贷款。"
 china_scs.36.d: "伙伴国国内反对派人士和民间团体发起了一场反对中国“一带一路”贷款的公众运动，他们指出贷款利率不利、环境问题严重，并担忧战略依赖。政府面临重新谈判的压力；北京必须在维护既有金融先例和维护政治关系之间做出选择。"
 china_scs.36.t: "债务反弹"
 china_scs.40.a: "力促全面接受中国草案。"
 china_scs.40.b: "为了签署协议，接受妥协方案。"
 china_scs.40.d: "关于南海行为准则的谈判已进入最后一轮。中方提出的草案排除了强制性争端解决机制，限制了地理范围以排除中国正在进行建设的区域，并禁止非东盟国家发挥任何监督作用。各声索国对此意见不一，有人支持接受这项有缺陷的协议，有人则希望无限期地继续维持现状。"
 china_scs.40.t: "行为准则谈判：最终轮"
 china_scs.41.a: "该地区已经表态。"
 china_scs.41.d: "美国国务院发表声明，承认《东盟-中国南海行为准则》正式生效。声明指出美国对该准则的若干条款持反对意见，但承认该准则是该地区的治理框架。分析人士认为，这标志着美国在长期坚持以《联合国海洋法公约》为唯一框架的立场上做出了重大让步。"
 china_scs.41.t: "华盛顿承认该行为准则"
 china_scs.50.a: "准备回应。"
 china_scs.50.d: "《人民日报》一篇社论通过外交渠道散发，显然得到了官方的认可。社论援引了“四海”的古典理论，并将中国的海洋主张描述为恢复被中断的自然秩序。随之而来的海军扩张声明则毫不含糊地表明了北京的意图。1945年后西太平洋的海洋秩序如今已公开受到挑战。"
 china_scs.50.t: "北京重申其对海洋的主权"
 china_scs.51.a: "他们的抗议活动已被记录在案。"
 china_scs.51.b: "发表澄清声明以减少恐慌。"
 china_scs.51.d: "中国正式援引朝贡体系引发了截然不同的反应。东盟外长发表紧急联合声明，驳斥任何关于中国对东盟历史宗主权的主张。美国、日本和澳大利亚宣布将采取协调一致的外交应对措施。在中国国内，官方媒体将这些反应解读为，恢复国家尊严令那些从百年屈辱中获利的人感到不安。"
 china_scs.51.t: "世界对朝贡言论的反应"
 china_scs.52.a: "承认中国权威。"
 china_scs.52.b: "拒绝最后通牒。"
 china_scs.52.d: "中国大使已发出正式最后通牒，要求在72小时内承认中国对南海争议水域的行政管辖权。印度政府现在必须做出决定：接受条件以维系两国关系，还是拒绝并承担后果。"
 china_scs.52.t: "最后通牒已发出"
 china_scs.53.a: "发出联合最后通牒。"
 china_scs.53.b: "仅以外交抗议的方式。"
 china_scs.53.c: "置身事外。"
 china_scs.53.d: "北京已向南海声索国发出最后通牒，但遭到拒绝。华盛顿面临抉择：履行其安全承诺，加入对华联合最后通牒；仅限于正式抗议以维护美中关系；或者完全置身事外。这一决定取决于海军战备状态、联盟信誉，以及美国政府愿意为这场远在四千英里之外的海域争端投入多少政治资本。"
 china_scs.53.t: "南海危机"
 china_scs.54.a: "遵照执行并撤回。"
 china_scs.54.b: "拒绝。他们不能对中国发号施令。"
 china_scs.54.d: "美国已与声索方一道，正式要求北京从争议岛礁撤军并撤回最后通牒。第七舰队已进入高度戒备状态。服从意味着撤退；拒绝则意味着将面临美国及其地区伙伴联合海军力量的对抗。中共中央政治局常务委员会已召开会议。"
 china_scs.54.t: "华盛顿的最后通牒"
 china_scs.55.a: "但愿这种情况长久保持下去。"
 china_scs.55.d: "来自中国人民解放军海军南海各基地的电报显示，舰队各处气氛不尽相同。在永暑礁，水兵们正拍摄日出，这片海域如今已成为他们海图上的“家”。在航母上，舰员们正为演习做准备。在黄岩岛警卫站，一名值班军官注意到，九十天来没有外国船只靠近禁线。南海一片平静。"
 china_scs.55.t: "来自南海舰队的声音"
 china_scs.56.a: "必须确保南海安全。"
 china_scs.56.d: "在声索方拒绝北京的最后通牒后，中国海军水面舰艇部队已采取行动予以执行。围绕争议岛礁南沙群岛的短暂而激烈的海战已经爆发。双方均仅投入有限兵力；战局结果将决定该岛礁的控制权归属，以及声索方是否会寻求华盛顿的干预。"
 china_scs.56.t: "南沙群岛小规模冲突"
 china_scs.57.a: "接受失败，寻求和解。"
 china_scs.57.b: "向美国政府提出上诉。"
 china_scs.57.d: "边境冲突以失败告终。争议地区现已被中国控制，中方军队已撤出。中国政府必须决定是接受失败并维护残存的主权，还是向美国寻求支持 - 而这一选择可能会将华盛顿拖入一场它或许并不乐见的对抗。"
 china_scs.57.t: "向美国盟友发出呼吁"
 china_scs.58.a: "撤回并重新评估。"
 china_scs.58.d: "解放军海军部队与声索方部队在争议地区交战，但未取得控制权便撤退。冲突规模有限且得到控制，但外交舆论却将其解读为中国军事力量过度扩张和军事实力不足。北京必须承担由此产生的政治代价，同时继续维持其整体战略态势。"
 china_scs.58.t: "南沙群岛小规模冲突受挫"
 china_scs.60.a: "请注意新的协调方式。"
 china_scs.60.d: "随着中国在南海的咄咄逼人已超过该地区外交所能承受的底线，美国、日本、印度和澳大利亚正式确立了安全合作机制，组建了运转良好的“四方安全对话”。各方宣布将开展联合海军巡逻、情报共享并协调外交立场。此举是对北京姿态的直接回应，也标志着南海争端已升级为大国博弈。"
 china_scs.60.t: "四方倡议"
 china_scs.70.a: "低调致歉并退出。"
 china_scs.70.b: "立场坚定。这片水域属于中国的历史权利范围。"
 china_scs.70.d: "有消息称，中国海上民兵船只在印尼纳土纳专属经济区内活动，并有海警船护航。雅加达已提出正式抗议，召回了驻印尼大使，并部署海军舰艇跟踪中国船只。印尼并未公开反对九段线，但此次入侵考验着印尼的战略耐心，并有可能将这个东盟最大国家拖入与北京的公开对抗。"
 china_scs.70.t: "纳土纳事件"
 sino_indian.1.d_opt: "我们目前无法介入。"
 sino_indian.20.a: "这是一项防御性联盟行动。我们保护该地区。"
 sino_indian.20.b: "一次惩罚性远征。迅速、果断、残酷。"
 sino_indian.20.c: "联军全面进入战争状态。我们将彻底结束这场战争。"
 sino_indian.20.d: "针对阿富汗-巴基斯坦边境地区塔利班​​和巴基斯坦塔利班派系的联盟框架已经建立。指挥官们正在等待有关行动性质的政治指示。这一选择将影响该地区乃至全世界对中国在中亚所扮演角色的认知。"
 sino_indian.20.t: "山虎行动：明确任务"
 sino_indian.21.a: "接受。开始正式对话。"
 sino_indian.21.b: "谨慎回应。信任，但要核实。"
 sino_indian.21.c: "拒绝。这是佯攻。"
 sino_indian.21.d: "中国已采取一系列措施，与伊斯兰堡保持距离，并向新德里发出新的信号。这一姿态不附加任何前提条件，但其战略意义显而易见。印度必须决定是否参与，以及参与的条件是什么。"
 sino_indian.21.t: "北京伸出了意想不到的援手"
 sino_indian.22.a: "我们采取了防御姿态。我们受到了挑衅。"
 sino_indian.22.b: "一次惩罚性远征。就像1962年那样。"
 sino_indian.22.c: "全面进入战争状态。彻底解决麦克马洪防线问题。"
 sino_indian.22.d: "解放军部队在实际控制线沿线与印军交战。此次冲突性质严重，亟需做出政策决定。北京必须先明确此次军事行动的政治性质，才能明确自身立场。"
 sino_indian.22.t: "加勒万河谷的清算"
 sino_indian.30.a: "棒极了。"
 sino_indian.30.b: "一个有趣的进展。"
 sino_indian.30.d: "中国斡旋的塔利班内部派系调解引发了意想不到的分裂。强硬派阵营因不满调解提出的条件而与塔利班领导层决裂，并公开谴​​责调解进程。此次分裂削弱了塔利班的凝聚力，也为联盟的介入创造了机会。"
 sino_indian.30.t: "塔利班内部各派系因谈判问题出现分歧"
 sino_indian.31.a: "我们求之不得。"
 sino_indian.31.d: "北京宣布在中亚地区全面进入战争状态，引发了安卡拉和德黑兰的担忧。两国首都均认为，此次军事集结是中国向其视为自身战略边缘地区的军事扩张。"
 sino_indian.31.t: "联军进入战争状态，令地区强国警觉。"
 sino_indian.32.a: "接受这项协议。我们需要保护。"
 sino_indian.32.b: "拒绝。我们保留战略自主权。"
 sino_indian.32.d: "在中国沿喜马拉雅山前线发动攻势之后，华盛顿正式向新德里提出双边防务条约的提议。美国决策者将印度视为制衡中国实力的重要力量。对印度而言，接受该条约不仅意味着安全保障，也意味着与美国建立更深层次的联盟。"
 sino_indian.32.t: "华盛顿提出一项防御条约"
 sino_indian.33.a: "做好应对中国压力的准备"
 sino_indian.33.d: "中国重新活跃于南亚，对印度的传统势力范围构成直接挑战。新德里必须做好应对准备。"
 sino_indian.33.t: "北京转向南亚"
 sino_indian.34.a: "拿起步枪，执行命令"
 sino_indian.34.b: "拒绝成为北京的代理人"
 sino_indian.34.d: "中国向尼泊尔统一共产党提供武器、训练和政治支持，以推动其对加德满都的叛乱。接受这些支持意味着该运动将受制于北京的庇护，如果红旗最终在辛格杜巴广场飘扬，这份恩情必将得到偿还。"
 sino_indian.34.t: "北京向毛派伸出援手"
 sino_indian.35.a: "接受框架"
 sino_indian.35.b: "暂时否绝"
 sino_indian.35.d: "北京方面已向加德满都提出经济和基础设施合作的提议，其核心是相互尊重尼泊尔的中立地位。"
 sino_indian.35.t: "中国提出合作框架"
 sino_indian.36.a: "接受伙伴关系"
 sino_indian.36.b: "礼貌地拒绝"
 sino_indian.36.d: "中国已向孟加拉国提议建立正式战略伙伴关系，并以安全保障和扩大贸易联系为后盾。达卡必须权衡利弊，并考虑新德里可能作出的反应。"
 sino_indian.36.t: "北京向达卡提出战略伙伴关系"
 sino_indian.37.a: "我们接受这个提议"
 sino_indian.37.d: "中国出人意料地正式放弃了对不丹北部边境地区未决领土主张，廷布对此表示欢迎。"
 sino_indian.37.t: "北京放弃对不丹的主权声索"
 sino_indian.38.a: "拥抱合作"
 sino_indian.38.b: "我们需要自己的空间"
 sino_indian.38.d: "中国向巴基斯坦提出了永久伙伴关系宣言 - “钢铁兄弟”纽带 - 在最高政治层面巩固了双方的全天候联盟。"
 sino_indian.38.t: "北京提议缔结“钢铁兄弟条约”。"
 sino_indian.39.a: "重点关注陆军"
 sino_indian.39.b: "重点关注空军"
 sino_indian.39.c: "重点关注海军"
 sino_indian.39.d: "中国国防工业已准备好向巴基斯坦转让技术。伊斯兰堡必须决定哪个领域最能从合作中受益。"
 sino_indian.39.d_opt: "重点关注核技术"
 sino_indian.39.t: "联合军事项目：选择一个重点"
 sino_indian.40.a: "正式将东伊运认定为恐怖组织"
 sino_indian.40.b: "拒绝请求"
 sino_indian.40.d: "中国已正式要求巴基斯坦将东突厥斯坦伊斯兰运动列为恐怖组织。伊斯兰堡必须权衡反恐带来的益处与国内政治敏感性。"
 sino_indian.40.t: "北京要求将东伊运认定为恐怖组织"
 sino_indian.41.a: "欢迎这项投资"
 sino_indian.41.d: "北京方面已确认全面启动中巴经济走廊项目。这项大规模的基础设施投资将重塑巴基斯坦的交通和能源网络。"
 sino_indian.41.t: "中巴经济走廊正式启动"
 sino_indian.42.a: "我们欢迎此次合作"
 sino_indian.42.d: "北京方面提议扩建瓜达尔港的泊位设施，以容纳中国海军舰艇。作为交换，伊斯兰堡将获得新的造船产能。"
 sino_indian.42.t: "中国将瓜达尔港视为海军枢纽"
 sino_indian.43.a: "加入机制"
 sino_indian.43.d: "中国已邀请巴基斯坦加入四方合作与协调机制，这是一个连接北京、喀布尔、伊斯兰堡和杜尚别的联合反恐框架。"
 sino_indian.43.t: "四方合作与协调机制：伊斯兰堡受邀加入"
 sino_indian.44.a: "加入机制"
 sino_indian.44.d: "中国已邀请阿富汗加入四方合作与协调机制，这是一个连接北京、喀布尔、伊斯兰堡和杜尚别的联合反恐框架。"
 sino_indian.44.t: "四方合作与协调机制：喀布尔受邀加入"
 sino_indian.45.a: "加入机制"
 sino_indian.45.d: "中国已邀请塔吉克斯坦加入四方合作与协调机制，这是一个连接北京、喀布尔、伊斯兰堡和杜尚别的联合反恐框架。"
 sino_indian.45.t: "四方合作与协调机制：杜尚别受邀加入"
 sino_indian.46.a: "与中国并肩作战"
 sino_indian.46.b: "这是中国要打的战争。"
 sino_indian.46.d: "北京已请求巴基斯坦加入打击塔利班和巴基斯坦塔利班运动的联合军事行动。联合行动将更具决定性，但也需要更大的投入。"
 sino_indian.46.t: "中国提议在阿富汗开展联合行动"
 sino_indian.47.a: "协调边境安全"
 sino_indian.47.d: "北京已在瓦罕走廊设立联合边境管理和反恐协调区。所有伙伴国都将受益于情报共享的加强。"
 sino_indian.47.t: "中国启动瓦罕缓冲区倡议"
 sino_indian.48.a: "对这一举动表示感谢"
 sino_indian.48.b: "我们仍然持怀疑态度。"
 sino_indian.48.d: "中国疏远伊斯兰堡的决定并未逃过新德里的眼睛。这究竟预示着真正的战略调整，还是暂时的策略，目前尚无定论。"
 sino_indian.48.t: "印度权衡北京对巴基斯坦政策的转变"
 sino_indian.49.a: "登记正式抗议"
 sino_indian.49.b: "接受新的区域现实"
 sino_indian.49.d: "中印友好条约在华盛顿引起了轩然大波。它究竟代表着一个稳定的新秩序，还是对美国在该地区的利益构成威胁，目前正处于最高层辩论之中。"
 sino_indian.49.t: "华盛顿对中印条约作出回应"
 sino_indian.50.a: "服从中国当局"
 sino_indian.50.b: "不丹绝不会屈服"
 sino_indian.50.d: "中国给不丹提出了一个严峻的选择：要么正式臣服于北京的权威，要么面临武力镇压的后果。廷布几乎没有回旋余地。"
 sino_indian.50.t: "北京向廷布发出最后通牒"
 sino_indian.51.a: "接受条款"
 sino_indian.51.b: "尼泊尔会抵抗"
 sino_indian.51.d: "中国要求尼泊尔接受正式的联系国地位，置于北京的管辖之下。加德满都必须决定是服从还是抵制。"
 sino_indian.51.t: "北京向加德满都发出最后通牒"
 sino_indian.52.a: "接受伙伴关系"
 sino_indian.52.b: "拒绝请求"
 sino_indian.52.d: "中国已正式提出以“珍珠链”战略为由，要求获得我国港口的后勤和基地使用权。作为交换，北京方面承诺提供一揽子实质性的经济合作方案。"
 sino_indian.52.t: "北京请求获得海军基地使用权"
 sino_indian.53.a: "投入北京的怀抱"
 sino_indian.53.b: "革命不听命于任何外国主子。"
 sino_indian.53.d: "尼泊尔人民共和国在加德满都凯旋而归，但赢得革命的步枪上却印着北方工业公司的标志。北京现在期望这个新生国家以联系国的身份融入中国的势力范围。拒绝绝不会有好结果。"
 sino_indian.53.t: "北京的账单到期了"
 sino_indian.54.a: "绝佳的合作伙伴关系"
 sino_indian.54.d: "巴基斯坦已接受我方提出的联合军事研究提议，并选定了重点研究领域。我方国防工业将就商定的专业领域开展协调研发，我方研究人员也将从此次合作中获益。"
 sino_indian.54.t: "伊斯兰堡加入联合军事项目"
 sino_indian.55.a: "在阿拉伯海的立足点"
 sino_indian.55.d: "伊斯兰堡已正式欢迎我方海军部队进驻瓜达尔港。扩建后的码头设施和基地布局使我方在阿拉伯海拥有了战略立足点，巩固了我国在西印度洋的存在。"
 sino_indian.55.t: "瓜达尔港向中国人民解放军海军开放"
 CHI_advanced_node_chips_trait: "高级节点芯片"
 CHI_advanced_node_chips_trait_desc: "中芯国际的7纳米等效工艺为中国电子科技集团公司的指挥控制系统提供国产处理器，消除了信号处理电子器件的进口供应瓶颈。"
 CHI_hbm_compute_trait: "基于高带宽内存的指导计算"
 CHI_hbm_compute_trait_desc: "长鑫存储的高带宽内存2堆栈支持中国航天科工集团公司拦截器和防空系统中的先进传感器融合和目标分类。国产化结束了对国外存储器的依赖。"
 CHI_imfm_jsw_partnership: "日本制钢所伙伴关系"
 CHI_imfm_jsw_partnership_desc: "此次合作将日本制钢所的大直径锻造和高硬度钢材制造工艺转移过来，直接提升了工厂结构材料的产出质量。"
 CHI_imfm_komatsu_partnership: "小松制作所合作关系"
 CHI_imfm_komatsu_partnership_desc: "与小松防务公司的合作引入了为日本自卫车辆项目开发的模块化轻型装甲结构方法和车辆系统集成实践。"
 CHI_imfm_mhi_partnership: "三菱重工合作关系"
 CHI_imfm_mhi_partnership_desc: "与三菱重工签订的许可制造协议将先进的装甲设计方法和复合防护技术引入工厂的车辆计划中。"
 CHI_indigenous_euv_trait: "本土极紫外光融合"
 CHI_indigenous_euv_trait_cetc: "本土极紫外光融合"
 CHI_indigenous_euv_trait_cetc_desc: "硅载体图案光刻技术用于生产中国电子科技集团公司的下一代数控处理器、传感器专用集成电路和雷达后端电子器件。随着国内技术链的成熟，每片晶圆的成本正在下降。"
 CHI_indigenous_euv_trait_desc: "硅载体图案光刻技术为中国航天科技集团公司的项目生产航天级和导弹级芯片，为战略系统提供端到端的国内供应。"
 CHI_kirin_avionics_trait: "麒麟航空电子设备集成"
 CHI_kirin_avionics_trait_desc: "海思麒麟芯片衍生的SoC为中航工业的飞行计算机、任务系统和电子战套件提供动力。2019年被列入实体清单后，国内厂商开始采用替代产品。"
 CHI_norinco_howa_partnership: "丰和工业合作关系"
 CHI_norinco_howa_partnership_desc: "此次合作获得了丰和工业精密小型武器加工工艺的许可，提高了北方工业公司步兵武器生产线的生产公差和质量一致性。"
 CHI_norinco_nec_partnership: "日本电气公司合作关系"
 CHI_norinco_nec_partnership_desc: "与日本电气公司的合作将日本C4ISR电子标准和嵌入式系统工程技术融入北方工业公司的战场通信和传感器产品线。"
 CHI_norinco_subaru_partnership: "斯巴鲁合作关系"
 CHI_norinco_subaru_partnership_desc: "与斯巴鲁航空航天公司的技术转让协议将精密金属加工技术和旋翼结构设计知识引入北方工业公司的生产线。"
 CHI_norinco_toshiba_partnership: "东芝合作关系"
 CHI_norinco_toshiba_partnership_desc: "通过与东芝防务系统公司的许可协议，将先进的雷达阵列设计和电子战组件制造技术引入北方工业公司的电子部门。"
 CHI_norinco_trait_red_arrow_L_AT_Equipment_suite: "红箭系列反坦克导弹套件"
 CHI_bop_drift_bo: "薄熙来派系影响力"
 CHI_bop_drift_hu: "胡锦涛派系影响力"
 CHI_bop_drift_jiang: "江泽民派系影响力"
 CHI_bop_drift_xi: "习近平派系影响力"
 CHI_bop_drift_zeng: "曾庆红派系影响力"
 CHI_infantry_general: "步兵将军"
 CHI_infantry_general_desc: "申辉将军是解放军陆军的一名高级将领，擅长大规模步兵作战。他指挥红卫兵和突击步兵的大批部队，注重快速部署和数量优势。"
 CHI_jiang_legacy_secured: "遗产得保"
 CHI_jiang_military_modernizer: "军队现代化推动者"
 CHI_jiang_reformer: "改革时代筑造者"
 CHI_jiang_security_tsar: "安全沙皇"
 CHI_nuke_general: "核能将军"
 CHI_nuke_general_desc: "秦世涛将军是解放军核与放射性战争领域的权威专家。他主张将战术核能力直接融入常规作战，这一理论为他在总参谋部内部赢得了尊重，同时也引发了争议。"
 CHI_special_weapons_general: "特种武器将军"
 CHI_special_weapons_general_desc: "梁将军是解放军最全能的高级指挥官之一，她精通先进武器系统和传统炮兵理论。作为总参谋部内的天才人物，她以将尖端技术融入诸兵种合成作战的能力而闻名。"
 CHI_tank_general: "坦克将军"
 CHI_tank_general_desc: "桂将军是解放军最重要的装甲战指挥官之一，以积极使用重型坦克编队而闻名，他相信压倒性的火力会在敌人做出反应之前决定战斗。"
 CHI_two_centenary_supreme_commander: "新时代最高统帅"
 CHI_wolf_warrior_spirit: "战狼精神"
 CHI_wolf_warrior_spirit_desc: "我们的外交官积极捍卫国家利益，并在国际舞台上挑战西方叙事。"
 CHI_xi_abolishes_limits: "至高领袖"
 CHI_xi_peoples_champion: "人民的拥护者"
 CHI_zeng_succession_architect: "继任筑造者"
 chinese_aligned: "与中国结盟"
 chinese_aligned_desc: "这位官员与中国情报部门保持着秘密联系。双方在联合计划方面自然而然地进行协调，但对国家的忠诚却无法保证。"
 CHI_bri_completed_projects: "“一带一路”已完成项目"
 CHI_bri_completed_projects_desc: "已全面投入运营的“一带一路”项目总数。"
 CHI_bri_completed_projects_tt: "$CHI_bri_completed_projects$: $RIGHT|+=1$"
 CHI_bri_global_presence: "“一带一路”全球影响力"
 CHI_bri_global_presence_desc: "这是衡量中国“一带一路”全球影响力的累计指标，随着伙伴国完成项目并提升其参与等级而不断积累。它持续提升“一带一路”的全球影响力，并为后续的“一带一路”重点发展指明方向。"
 CHI_bri_global_presence_tt: "$CHI_bri_global_presence$: $RIGHT|+=1$"
 CHI_bri_industrial_zones: "“一带一路”工业园区建设"
 CHI_bri_industrial_zones_desc: "“一带一路”框架下建成的经济特区和工业园区的累计数量。"
 CHI_bri_industrial_zones_tt: "$CHI_bri_industrial_zones$: $RIGHT|+=1$"
 CHI_bri_mines_secured: "“一带一路”采矿特许权已落实"
 CHI_bri_mines_secured_desc: "“一带一路”框架下已完成的采矿特许权项目累计数量。"
