 arduous_march_modifiers_desc: "苦難の行軍は我が国に深刻な打撃を与えた。人民の未来を守るため、この苦難の時期を乗り越え、国を繁栄に導くための戦略的措置を実行しなければならない。これには農業生産の強化、人道支援の確保、安定と成長のための内政改革が含まれる。"
