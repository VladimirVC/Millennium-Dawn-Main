 NKO_korean_russian_friendship_desc: "2024年的合作伙伴条约将平壤和莫斯科纳入相互安全协定，双方承诺在对方遭遇威胁时提供防御支持。在正式保障措施推进的同时，贸易、能源及技术领域的合作同步深化。"
