 corruption.1.t: "Интересное предложение"
 corruption.1.d: "Один из министров связался с нами и сказал, что можно внести несколько организационных и законодательных изменений для оптимизации работы нашей администрации, хотя это потребует некоторой... личной связи с движущими силами"
 corruption.1.a: "Может быть, у нас есть возможность"
 corruption.1.b: "Плохая идея"
