 CPD_liberation_of_state: "해방:"
 CPD_demanding_annexation_of_state_TT: "이 주의 합병은 [ROOT.GetNameWithFlag]의 §G요구 사항§!입니다. 평화 협정이 수락되면 이 주가 우리 국가에 합병되며 우리가 새로운 소유자가 됩니다."
 CPD_demanding_puppeting_in_state_TT: "이 주에서의 괴뢰 정부 수립은 [ROOT.GetNameWithFlag]의 §G요구 사항§!입니다. 평화 협정이 수락되면 이 주는 새로운 괴뢰 정부의 통제를 받게 됩니다."
 CPD_demanding_demilitarisation_of_state_TT: "이 주의 비무장화는 [ROOT.GetNameWithFlag]의 §G요구 사항§!입니다. 평화 협정이 수락되면 이 주에서는 더 이상 어떠한 군사력도 운용할 수 없게 됩니다."
 CPD_demanding_liberation_of_state_TT: "이 주에서의 국가 해방은 [ROOT.GetNameWithFlag]의 §G요구 사항§!입니다. 평화 협정이 수락되면 이 주는 정당한 소유권을 가진 국가에 반환되어 독립 국가가 됩니다."
 CPD_conceding_annexation_of_state_TT: "이 주의 합병은 [ROOT.GetNameWithFlag] 측의 §R양보 사항§!입니다. 평화 협정이 수락되면 이 주는 적국에 합병됩니다."
 CPD_conceding_puppeting_in_state_TT: "이 주에서의 괴뢰 정부 수립은 [ROOT.GetNameWithFlag] 측의 §R양보 사항§!입니다. 평화 협정이 수락되면 이 주는 적국을 따르는 괴뢰 정부의 통제를 받게 됩니다."
 CPD_conceding_demilitarisation_of_state_TT: "이 주의 비무장화는 [ROOT.GetNameWithFlag] 측의 §R양보 사항§!입니다. 평화 협정이 수락되면 이 주에서는 더 이상 어떠한 군사력도 운용할 수 없게 됩니다."
 CPD_conceding_liberation_of_state_TT: "이 주에서의 국가 해방은 [ROOT.GetNameWithFlag] 측의 §R양보 사항§!입니다. 평화 협정이 수락되면 이 주는 정당한 소유권을 가진 국가에 반환되어 독립 국가가 됩니다."
 CPD_built_peace_deal_CONCESSIONS_TITLE_TEXT: "§G양보 사항§!"
 CPD_built_peace_deal_DEMANDS_TITLE_TEXT: "§R요구 사항§!"
 CPD_is_an_autonomy_allowed_to_receive_deal_TT: "현재 §Y자치도 상태§!에서 독자적으로 평화 협정에 서명하는 것이 허용됩니다."
 CPD_is_an_autonomy_allowed_to_send_deal_TT: "현재 §Y자치도 상태§!에서 독자적으로 평화 협정을 제안하는 것이 허용됩니다."
