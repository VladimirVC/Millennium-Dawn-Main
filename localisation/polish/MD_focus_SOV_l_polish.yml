 SOV_nazbol_inner_modifier: "Polityka wewnętrzna [SOV.GetNamewithFlag]"
 SOV_nazbol_inner_modifier_desc: "Polityka narodowo-bolszewickiej Rosji jest wynikiem rewanżyzmu za dwa zniszczone imperia jednocześnie – ZSRR i Imperium Rosyjskie. Żadnych negocjacji, tylko wojna."
 SOV_navalny_inner_modifier: "Polityka wewnętrzna Nowej Rosji"
 SOV_navalny_inner_modifier_desc: "Polityka pod rządami liberałów charakteryzuje się koncentracją na wzroście gospodarczym Rosji, a mniejszą koncentracją na działaniach militarnych i politycznych."
 SOV_koba_politic_modifier: "Pojęcie bezpieczeństwa publicznego"
 SOV_koba_politic_modifier_desc: "Koncepcja bezpieczeństwa publicznego pozwala zrozumieć, dlaczego jesteśmy szczęśliwi lub nie, szczęśliwi lub chorzy, dlaczego ktoś ma szczęście, a ktoś nie, i jak na to wpłynąć. Oto odpowiedzi na pytania: co jest dobre, a co złe, czym jest wstyd i sumienie, czym jest intuicja i dlaczego niektórzy jej słuchają, a inni nie, i czy naprawdę trudno jest zmienić los?"
