 CPD_peace_deal_builder_selected_deal_type_title_one: "В настоящее время выдвигаются требования о уступках"
 CPD_peace_deal_builder_selected_deal_type_title_two: "В настоящее время предлагаются уступки"
 CPD_peace_deal_builder_ACTIONABLE_STATES_TITLE_TEXT: "Действующие государства"
 CPD_peace_deal_builder_CURRENT_DEAL_TITLE_TEXT: "Текущая сделка"
 CPD_peace_deal_explainer_ICON_TT: "Как работают мирные сделки"
 CPD_peace_deal_explainer_ICON_TT_DELAYED: "Конструирование мирной сделки так же просто, как выбрать вкладку выше и затем выбрать, что уступить или потребовать от государства.\n\nСоздание мирной сделки с §Yотрицательной§! стоимостью, скорее всего, будет принято ИИ, в то время как сделка с §Yположительной§! стоимостью будет менее вероятно принята. Вы можете увидеть полное описание готовности ИИ принять сделку, наведя курсор на поле принятия.\n\nЛюбая мирная сделка, созданная для игрока, не зависит от этих значений."
 CPD_annex_state_button_TT: "[CPD_ANNEX_STATE_TT_LOC]"
 CPD_annex_state_button_TT_DELAYED: "[CPD_ANNEX_STATE_TT_DELAYED_LOC]"
 CPD_annex_state_button_TT_DEMAND: "Потребовать провинции"
 CPD_annex_state_button_TT_CONCESSION: "Уступить провинции"
 CPD_annex_state_button_TT_DELAYED_DEMAND: "Выбранные вражеские территории присоединяются к нашей стране вместе с их населением, заводами и ресурсами. Стоимость штатов, в которых у нас есть опорные пункты, составляет половину их стратегической ценности; завоеванных штатов — треть. Требование передачи территории, которая по-прежнему находится во владении первоначального владельца, удваивает стоимость."
 CPD_annex_state_button_TT_DELAYED_CONCESSION: "To §YConcede States§! is to hand them to the enemy. Each conceded territory reduces the overall cost of the deal, sweetening our other demands."
 CPD_make_puppet_button_TT: "[CPD_MAKE_PUPPET_TT_LOC]"
 CPD_make_puppet_button_TT_DELAYED: "[CPD_MAKE_PUPPET_TT_DELAYED_LOC]"
 CPD_make_puppet_button_TT_DEMAND: "Создать марионеточное правительство"
 CPD_make_puppet_button_TT_CONCESSION: "Уступить марионеточное правительство"
 CPD_make_puppet_button_TT_DELAYED_DEMAND: "Demanding a §YPuppet Government§! carves a new subject state out of selected enemy territory. The new puppet inherits its parent's culture but answers to us in foreign policy. Should we already own a subject with cores on the parent nation, those states join that subject instead of spawning a new one."
 CPD_make_puppet_button_TT_DELAYED_CONCESSION: "Conceding a §YPuppet Government§! allows the enemy to carve a subject state from territories we currently hold. The new puppet government answers to them."
 CPD_demilitarise_state_button_TT: "[CPD_DEMILITARISE_TT_LOC]"
 CPD_demilitarise_state_button_TT_DELAYED: "[CPD_DEMILITARISE_TT_DELAYED_LOC]"
 CPD_demilitarise_state_button_TT_DEMAND: "Потребовать демилитаризацию провинций"
 CPD_demilitarise_state_button_TT_CONCESSION: "Предложить демилитаризацию провинций"
 CPD_demilitarise_state_button_TT__DELAYED_DEMAND: "Demanding §YDemilitarisation§! turns selected enemy states into zones in which no military may operate. Their owner cannot station troops there nor raise fortifications."
 CPD_demilitarise_state_button_TT__DELAYED_CONCESSION: "Conceding §YDemilitarisation§! places our own states under the same restrictions. We will be unable to move or station forces in the conceded territories."
