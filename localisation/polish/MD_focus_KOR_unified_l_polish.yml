 korea.41.t: "Korea Północna proponuje konfederację"
 korea.41.d: "Nasi północni sąsiedzi jasno dali do zrozumienia, że ​​pełna integracja jednego kraju z drugim jest perspektywą, do której nie ma sensu dążyć, więc sugerują, abyśmy utworzyli Konfederację dwóch państw, aby ostatecznie rozwiązać problemy kwestii koreańskiej, naturalnie chcą przewodzić w tej Konfederacji. To mogłoby zagrozić istnieniu naszego kraju."
 korea.41.a: "Konfederacja powinna być"
 korea.41.b: "Konfederacja nigdy nie będzie mogła odbyć się na tych warunkach..."
 korea.42.t: "Południe przyjęło warunki Konfederacji!"
 korea.42.d: "Po długich negocjacjach Południe zgodziło się na utworzenie konfederacji! Dzięki ustabilizowaniu stosunków między obiema Koreami i pojawieniu się konfederacji na horyzoncie przyszłość narodu koreańskiego nigdy nie wyglądała jaśniej!"
 korea.42.a: "Fantastyczna wiadomość!"
 korea.43.t: "Południe odrzuciło nasze warunki Konfederacji!"
 korea.43.d: "Niestety, [KOR.GetLeader] postanowiło postawić swoją egoistyczną pozycję ponad pozycję narodu koreańskiego i odrzuciło naszą ofertę współpracy w celu utworzenia konfederacji. To odrzucenie nie oznacza, że ​​nie możemy podjąć kolejnej próby w przyszłości, ale oznacza, że ​​konfederacja nie nastąpi w najbliższej przyszłości. Musimy położyć podwaliny, aby zapewnić, że nasza kolejna próba odniesie większy sukces."
 korea.43.a: "Smutny dzień dla narodu koreańskiego..."
 KOR_joint_research: "Joseon Joint Research"
 KOR_joint_research_desc: "With the unification of our scientific efforts, we can combine the brightest minds of North and South. A joint research program will accelerate innovation, create breakthroughs in technology, and foster trust between the peoples of Joseon."
 KOR_joint_military_might: "Joseon Military Might"
 KOR_joint_military_might_desc: "A unified Joseon military will ensure the safety and independence of our new state. By combining our doctrines, equipment, and experience, we can form a powerful armed force capable of defending our homeland."
 KOR_joint_military_cooperation: "Joint Military Cooperation"
 KOR_joint_military_cooperation_desc: "The armies of the North and South must learn to fight as one. Through shared drills, doctrine integration, and mutual exchanges, we can form a cohesive force."
 KOR_military_improved: "Improved Military Integration"
 KOR_military_improved_desc: "Our efforts have paid off. The combined forces now operate with increased efficiency, bridging the gap in training and discipline."
 KOR_military_exchange_experience: "Military Exchange Experience"
 KOR_military_exchange_experience_desc: "Officers and soldiers will be exchanged across regions to foster cooperation, break down mistrust, and build a unified chain of command."
 KOR_combined_airforce_technology: "Combined Airforce Technology"
 KOR_combined_airforce_technology_desc: "Both North and South bring valuable expertise in aviation. A shared air force project will enhance our capabilities in the skies."
 KOR_finish_the_kf21: "Finish the KF-21"
 KOR_finish_the_kf21_desc: "The KF-21 fighter project is a symbol of Joseon's ambition. By completing its development, we will ensure our place among the world's advanced air powers."
 KOR_jet_production: "Unified Jet Production"
 KOR_jet_production_desc: "With factories from both sides contributing, jet production can be scaled to equip our air force with modern, indigenous aircraft."
 KOR_connect_the_people: "Connect the People"
 KOR_connect_the_people_desc: "For Joseon to truly unite, the people must feel connected. Infrastructure, communication, and shared identity will be crucial in building a common future."
 KOR_labor_integration: "Labor Integration"
 KOR_labor_integration_desc: "The workforces of North and South must be harmonized. Shared labor laws, fair wages, and integrated industries will stabilize the economy."
 KOR_phase_one: "Phase One"
 KOR_phase_one_desc: "The first phase of integration involves merging basic infrastructure and industries, setting the foundation for deeper unity."
 KOR_phase_two: "Phase Two"
 KOR_phase_two_desc: "Now that the groundwork has been laid, the second phase will push for larger economic reforms and unified development policies."
 KOR_population_management: "Population Management"
 KOR_population_management_desc: "Different population sizes and demographics between North and South must be carefully managed. Housing, jobs, and social stability are key to preventing unrest."
 KOR_focused_growth: "Focused Growth"
 KOR_focused_growth_desc: "By channeling resources into key sectors, we can balance the economic disparities and ensure growth is distributed fairly across the nation."
 KOR_happy_united_people: "Happy United People"
 KOR_happy_united_people_desc: "A united people is a strong people. By improving living conditions and fostering a shared identity, Joseon will flourish."
 KOR_josen_economy: "The Joseon Economy"
 KOR_josen_economy_desc: "The merging of two very different economies is no easy task. Careful planning will allow us to forge a new, stronger Joseon economy."
 KOR_josen_economy_improved: "Improved Joseon Economy"
 KOR_josen_economy_improved_desc: "Our integration policies are beginning to bear fruit. The economy is stabilizing, industries are expanding, and trade is flourishing."
 KOR_josen_economy_integrated: "Integrated Joseon Economy"
 KOR_josen_economy_integrated_desc: "North and South are no longer two economies. They are one. With integration complete, Joseon can now stand as an economic power."
 kf21_production: "Production Of KF21"
 north_korea_trade_deals: "North Korea Trade Deals"
 KOR_joint_peace: "The Road to Peace"
 KOR_joint_peace_desc: "After decades of frozen hostilities, our nation can take the first step toward genuine peace with our brothers across the parallel. By opening the door to dialogue, we lay the groundwork for the eventual reconciliation of the Korean people."
 KOR_sunshine_moon_policy: "Sunshine Policy"
 KOR_sunshine_moon_policy_desc: "Following the spirit of the Sunshine Policy, we will pursue a path of engagement rather than confrontation. By fostering goodwill, exchanging envoys, and softening our rhetoric, both Koreas can begin to heal old wounds."
 KOR_kaesong_industrial: "Kaesong Industrial Region"
 KOR_kaesong_industrial_desc: "The Kaesong Industrial Region stands as a model of cooperation - Northern labour with Southern capital, building shared prosperity. Reopening and expanding this joint zone will tie our economies together and demonstrate the value of cooperation over confrontation."
 KOR_cultural_exchange: "Cultural Exchange"
 KOR_cultural_exchange_desc: "Joint sporting events, cultural performances, and academic exchanges will remind both Koreas that we share one history, one language, and one people. Beneath the politics, we are all Korean."
 KOR_reduce_dmz_militarization: "Demilitarize the DMZ"
 KOR_reduce_dmz_militarization_desc: "The Demilitarized Zone has been anything but. With trust slowly returning, we can withdraw heavy weapons from the border, dismantle guard posts, and let the world's most heavily fortified frontier finally live up to its name."
 KOR_pursue_peace_treaty: "Pursue a Peace Treaty"
 KOR_pursue_peace_treaty_desc: "More than seventy years after the guns fell silent, the Korean War remains formally unresolved. By signing a long-overdue peace treaty, we can finally close this dark chapter and replace the armistice with genuine peace."
 KOR_improve_relations: "Improve Relations"
 KOR_improve_relations_desc: "With formal peace established, we can deepen ties further still. Closer political dialogue, mutual diplomatic recognition, and shared institutions will bring our two states closer than at any point since the division."
 KOR_our_true_enemy: "Our True Enemy"
 KOR_our_true_enemy_desc: "For too long, the Korean people have been pitted against one another while our true historical antagonist - Imperial Japan and its modern successor - has escaped accountability. By directing our shared grievances outward, we forge a stronger bond between North and South."
 KOR_reunification: "Reunification"
 KOR_reunification_desc: "The time has come to take the final step. Whichever Korea reaches this moment first will offer the other a chance at full reunification - one government, one nation, one people. Should the other side accept, we will absorb them into our state and the Korean nation will be whole once more."
 KOR_confederation: "A Korean Confederation"
 KOR_confederation_desc: "Rather than the full integration of two profoundly different systems, we propose a Confederation - a loose federation in which Pyongyang leads and Seoul retains its autonomy. The South will become our federate, ending the division without dismantling either state."
 KOR_reunification_talks_failed_tt: "§RKOR's reunification proposal was rejected.§!"
 NKO_reunification_talks_failed_tt: "§RNKO's reunification proposal was rejected.§!"
 KOR_confederation_talks_failed_tt: "§RKOR rejected the Confederation proposal.§!"
 KOR_combined_aerospace_renaissance: "Combined Aerospace Renaissance"
 KOR_combined_aerospace_renaissance_desc: "Northern engine know-how and Southern stealth and avionics expertise are pooled into a single aerospace effort. Pilots train in joint exercises and engineers share blueprints openly across the former DMZ."
 NKO_research_slots_recalculated_tt: "§YResearch slots are recalculated to match the unified economy§!"
 NKO_inherit_kor_special_projects_tt: "§YInherit every Special Project the South has completed§!"
 campaign_for_UNSC_seat_USA_desc: "The United States has held a permanent seat on the UN Security Council since the body's founding in 1945. Washington's veto is indispensable to any bid for permanent membership. Our diplomats must persuade the Americans that a unified, democratic Korea on the Council serves their strategic interests in East Asia."
 campaign_for_UNSC_seat_FRA_desc: "France has held a permanent Security Council seat since 1945 and regularly uses its position to champion multilateralism and international law. By appealing to Paris's long-standing interest in a rules-based order and the weight of Korean historical grievances, we can secure its endorsement for our bid."
 campaign_for_UNSC_seat_ENG_desc: "The United Kingdom is one of the five permanent members of the UN Security Council. London's backing carries particular weight given Britain's role in the post-war international order. A coordinated diplomatic effort, backed by strong bilateral relations, is needed to win its support for our permanent membership bid."
 campaign_for_UNSC_seat_SOV_desc: "Russia holds one of five permanent seats on the UN Security Council, inherited from the Soviet Union, and can veto any candidate it opposes. Winning Moscow's support requires deft diplomacy: we must reassure Russia that a stronger Korean voice on the Council does not threaten its regional interests."
 campaign_for_UNSC_seat_CHI_desc: "China has held a permanent Security Council seat since 1971, when the People's Republic replaced the Republic of China. Beijing's veto is the most difficult to secure: China has historically resisted any expansion of permanent membership that might dilute its influence. A substantial improvement in bilateral ties is a prerequisite for Chinese endorsement."
 become_a_UNSC_state_desc: "With all five permanent members on record as supporting our candidacy, we can formally submit Korea's application for a permanent seat. Admission would make Korea the sixth veto-holding power, granting us the authority to shape international security decisions and cementing our status as a global power. It would also raise our domestic political standing significantly."
 KOR_core_inherited_territory_desc: "With Songjiang, Liaoning, Jilin, and Primorye now under our control, we can begin the long process of integrating these territories into the Korean state. Establishing administrative cores will entrench our legal claim to lands once populated by Koreans during the Balhae era and, later, by the Joseon diaspora under the Gando Convention."