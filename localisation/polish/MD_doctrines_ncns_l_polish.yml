 GRAND_DOCTRINE_COMBINED_ARMS: "Połączone Siły"
 GRAND_DOCTRINE_SHOCK_AND_AWE: "Szok i Przerażenie"
 GRAND_DOCTRINE_SHOCK_AND_AWE_DESC: "Ta doktryna organizuje operacje lądowe wokół szybkiego i skoncentrowanego użycia siły bojowej w celu osiągnięcia decydujących efektów operacyjnych. Koncepcje \"Szoku i przerażenia\" kładą nacisk na tempo, dominację i skoordynowane użycie sił."
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH: "Dogłębna Obrona"
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH_DESC: "Ta doktryna organizuje organizuje obronę lądową poprzez warstwowe pozycje i wykorzystanie sił w głębi pola walki. Koncepcje obrony warstwowej kładą nacisk na ciągłość obrony i kontrolowaną przestrzeń operacyjną."
 GRAND_DOCTRINE_MISSION_COMMAND: "Dowodzenie Misją"
 GRAND_DOCTRINE_BATTLEFIELD_SUPPORT: "Wsparcie Pola Walki"
 GRAND_DOCTRINE_MISSION_COMMAND_DESC: "Ta doktryna organizuje siły lądowe wokół delegowanej władzy, kierowanej jasnym celem i określonymi zadaniami. Koncepcje dowodzenia misją kładą nacisk na inicjatywę i skoordynowane działanie na wielu szczeblach."
 GRAND_DOCTRINE_GUERRILLA_WARFARE: "Wojna Partyzancka"
 GRAND_DOCTRINE_GUERRILLA_WARFARE_DESC: "Ta doktryna organizuje operacje lądowe wokół nieregularnych formacji prowadzących rozproszone i ciągłe działania bojowe. Koncepcje wojny partyzanckiej kładą nacisk na lokalną organizację i utrzymanie presji w obszarach spornych."
 GRAND_DOCTRINE_EQUIPMENT_MIXED: "Zróżnicowane Wyposażenie"
 GRAND_DOCTRINE_EQUIPMENT_MIXED_DESC: "Ta doktryna organizuje wyposażenie sił wokół zrównoważonej kombinacji systemów, aby wspierać różnorodne wymagania operacyjne. Koncepcje zróżnicowanego wyposażenia kładą nacisk na elastyczność w wyposażeniu formacji w różnych rolach bojowych."
 GRAND_DOCTRINE_EQUIPMENT_LIGHT: "Lekkie Wyposażenie"
 GRAND_DOCTRINE_EQUIPMENT_HEAVY: "Ciężkie Wyposażenie"
 GRAND_DOCTRINE_EQUIPMENT_MOBILE: "Mobilne Wyposażenie"
 GRAND_DOCTRINE_EQUIPMENT_FIRES: "Wyposażenie Wsparcia Ogniowego"
 GRAND_DOCTRINE_EQUIPMENT_FULL: "Pełne Wyposażenie"
 GRAND_DOCTRINE_BLUE_WATER: "Marynarka Dalekomorska"
 GRAND_DOCTRINE_GREEN_WATER: "Marynarka Przybrzeżna"
 GRAND_DOCTRINE_JEUNE_ECOLE: "Młoda Szkoła"
 GRAND_DOCTRINE_GUERRE_DE_COURSE: "Wojna Kaperska"
 GRAND_DOCTRINE_COMBINED_ARMS_DESC: "Ta doktryna organizuje siły lądowe wokół zintegrowanego użycia manewru, wsparcia ogniowego i elementów logistyki. Koncepcje sił połączonych kładą nacisk na zsynchronizowane działania formacji w celu uzyskania spójnych efektów na polu walki."
