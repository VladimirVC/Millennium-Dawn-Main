 afv_hover_suspension_1: "Hover Suspension I"
 afv_hover_suspension_1_desc: "Hover suspension systems use lift technology to reduce ground contact and improve mobility over difficult terrain, enabling APCs to achieve significantly higher top speeds.\n\n§GDesigner Hint: Hover Suspension provides a major increase to maximum speed, but it increases fuel consumption and build cost.§!"
