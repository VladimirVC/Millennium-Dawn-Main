 BLR_mission_to_Germany: "Mission commerciale auprès de [GER.GetNamewithFlag]"
 BLR_mission_to_Germany_desc: "L’établissement d’une mission commerciale avec l’Allemagne est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_France: "Mission commerciale auprès de [FRA.GetNamewithFlag]"
 BLR_mission_to_France_desc: "Établir une mission commerciale avec la France est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Norway: "Mission commerciale à [NOR.GetNamewithFlag]"
 BLR_mission_to_Norway_desc: "Établir une mission commerciale avec la Norvège est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Sweden: "Mission commerciale à [SWE.GetNamewithFlag]"
 BLR_mission_to_Sweden_desc: "Établir une mission commerciale avec la Suède est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Russia: "Mission commerciale auprès de [SOV.GetNamewithFlag]"
 BLR_mission_to_Russia_desc: "L’établissement d’une mission commerciale avec la Russie est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Ukraine: "Mission commerciale à [UKR.GetNamewithFlag]"
 BLR_mission_to_Ukraine_desc: "L’établissement d’une mission commerciale avec l’Ukraine est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Kazahstan: "Mission commerciale à [KAZ.GetNamewithFlag]"
 BLR_mission_to_Kazahstan_desc: "L’établissement d’une mission commerciale avec le Kazakhstan est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Czechia: "Mission commerciale à [CZE.GetNamewithFlag]"
 BLR_mission_to_Czechia_desc: "Établir une mission commerciale avec la Tchéquie est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Netherland: "Mission commerciale à [HOL.GetNamewithFlag]"
 BLR_mission_to_Netherland_desc: "Établir une mission commerciale avec les Pays-Bas est une décision commerciale judicieuse pour le bien de notre nation."
 BLR_mission_to_Zimbabwe: "Mission commerciale auprès de [ZIM.GetNamewithFlag]"
 BLR_mission_to_Zimbabwe_desc: "Établir une mission commerciale avec le Zimbabwe est une décision commerciale judicieuse pour le bien de notre nation."
