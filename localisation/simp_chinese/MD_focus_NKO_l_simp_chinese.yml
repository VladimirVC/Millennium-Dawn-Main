 NKO_war_university: "金日成军事综合大学"
 NKO_vpk: "国内军工复合体"
 NKO_sad_army_idea: "过时的人民军"
 NKO_sad_army_idea_desc: "如果我们完成国策§H革命军事精神§!，该国家精神将得到§Y提升§!。 \n§W--------------§!\n朝鲜军队虽然拥有庞大的人力资源，但严重依赖过时的装备和技术。其武器库中大部分都是前苏联时期的坦克、大炮和飞机，现代化程度有限。对老旧系统的依赖反映了其受到的资源限制和国际制裁，这使得朝鲜军队在数量上令人生畏，但在效率和能力方面却难以与现代军队相比。"
 NKO_new_army_idea: "新朝鲜人民军"
 NKO_new_army_idea_desc: "朝鲜的现代化军队结合了先进的本土技术和关键军事设施的战略升级。增强的导弹系统、无人机和网络战能力展示了其向现代化转型的趋势。虽然仍受到制裁的限制，但对创新和不对称战争战术的重视使朝鲜军队成为该地区一支强大的力量。"
 NKO_marines_idea: "海军陆战队"
 NKO_unite_sport_team: "奥运会联合代表团"
 NKO_unite_sport_team_desc: ""
