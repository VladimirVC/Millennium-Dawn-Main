 japan_focus: "Дерево фокусов Японии"
 japan_classic.15.t: "Кэйдзо Обути перенес инсульт"
 japan_classic.15.d: "Кэйдзо Обути, верный слуга Либерально-демократической партии и японского народа, был премьер-министром Японии с 30 июля 1998 года после отставки Рютаро Хасимото после того, как ЛДП проиграла выборы в верхнюю палату парламента в 1998 году.\nКэйдзо Обути описывали как спокойного, квалифицированного и эффективного человека, но мало кто предвидел его внезапное ухудшение здоровья. 1 апреля 2000 года Обути перенес инсульт и был срочно доставлен в больницу."
 japan_classic.15.o1: "Будем надеяться на лучшее"
 japan_classic.16.t: "Ёсиро Мори вступает в должность премьер-министра"
 japan_classic.16.d: "После инсульта, перенесенного тогдашним премьер-министром Кэйдзо Обути, высокопоставленные члены Либерально-демократической партии провели закрытое совещание с участием пяти ключевых фигур и выбрали Ёсиро Мори его преемником, чтобы избежать вакуума власти.\n\nПереход власти произошел без каких-либо официальных объяснений общественности, что вызвало волну критики со стороны граждан, обвиняющих правительство в «закулисной политике» и «исключении народа из процесса принятия решений руководством». В результате администрация Мори с самого начала столкнулась с серьезными трудностями.\n\nСейчас все взгляды прикованы к лидерству Ёсиро Мори и к тому, сможет ли он вернуть доверие общественности."
 japan_classic.16.o1: "Единственной задачей было предотвратить вакуум власти."
 japan_classic.18.t: "Политический ляп Ёсиро Мори"
 japan_classic.18.d: "15 мая 2000 года новоизбранный премьер-министр Ёсиро Мори впервые попал в крупные негативные заголовки, когда публично назвал Японию \"божественной нацией, сосредоточенной на императоре\" Это, в глазах как оппозиции, так и правящей ЛДП, ставит под сомнение демократические идеалы Японии, а также роль монархии.\nРейтинг общественного одобрения премьер-министра упал."
 japan_classic.18.o1: "Вот дурак!"
 japan_classic.18.o2: "Удвоил свои заявления"
 Japan.3.t: "Рассвет новой эры"
 Japan.3.d: "Император, символ Японии, отрекается от престола, и на трон восходит новый император — исключительно редкий национальный поворотный момент в современной Японии. С отречением императора Акихито наследный принц Нарухито взойдет на престол как 126-й император, и название эпохи будет обновлено.\n\nНесколько лет назад слова императора Акихито о его обязанностях стали неожиданностью для многих. Поначалу распространились шок и неуверенность, но благодаря обсуждениям и необходимым процедурам подготовка к церемониям неуклонно продвигалась вперед.\n\nИ вот, после торжественных обрядов, эпоха «Хэйсэй» подходит к концу, и начинается «Рэйва». Политическая система напрямую не изменится. Однако атмосфера в стране, безусловно, изменится, что, вероятно, повлияет на социальную сплоченность и ожидания населения от правительства."
 Japan.3.a: "Давайте спокойно встретим новую эру."
 Japan.8.t: "Китай требует островов Сэнкаку!"
 Japan.8.d: "Китай возобновил спор с нами по поводу владения островами Сэнкаку. Если мы уступим их требованиям, мы сможем укрепить уверенность Китая в его способности влиять на нашу внешнюю политику, а также снизим нашу популярность среди более националистических из наших людей. Впрочем, последствия отказа, наверное, и для нас не сулит ничего хорошего."
 Japan.8.a: "Пусть у них будет право на рыбалку..."
 Japan.8.b: "Японию не запугать!"
 Japan.4.t: "Япония сдала острова!"
 Japan.4.d: "Ясно признавая законность наших требований, Япония вернула острова Сенкаку нам, законному владельцу."
 Japan.4.a: "Возможно, у японцев все-таки есть смысл!"
 Japan.5.t: "Япония остается непокорной!"
 Japan.5.d: "Японцы явно полны решимости оставаться нашими смертельными врагами, как никогда."
 Japan.5.a: "Они пожалеют об этом..."
 Japan.6.t: "Китайские самолеты обстреляли самолеты, которые мы подняли на их перехват!"
 Japan.6.d: "Наши истребители регулярно реагируют на китайские вторжения в наше воздушное пространство, обычно без инцидентов. Однако на этот раз наши истребители были обстреляны китайцами, что привело к гибели нескольких наших пилотов и потере нескольких самолетов. Мы должны оценить, был ли этот инцидент, учитывая недавние действия Китая, преднамеренной провокацией или досадной случайностью, и принять соответствующее решение о нашем ответе."
 Japan.6.a: "У нас есть право на самооборону!"
 Japan.6.b: "Мы должны призвать наших защитников!"
 Japan.6.c: "Вероятно, это была случайность..."
 Japan.7.t: "Китайские и японские истребители участвуют в воздушных боях"
 Japan.7.d: "В Восточно-Китайском море произошел конфликт после столкновения китайских и японских самолетов. Сообщается, что столкновение началось, когда японские самолеты были подняты по тревоге для перехвата китайских истребителей над воздушным пространством Японии. Вместо того, чтобы привести к отступлению китайцев, как это исторически происходило после подобных инцидентов, японские самолеты были обстреляны, что привело к гибели нескольких японских пилотов и потере нескольких самолетов. [JAP.GetLeader] решительно осудил инцидент и, как сообщается, ведет срочные переговоры за закрытыми дверями относительно реакции Японии на это событие."
 Japan.7.a: "Не за горами ли третья китайско-японская война?"
 idea_JAP_emperor_naruhito: "Император Нарухито"
 idea_JAP_emperor_naruhito_desc: "Нарухито родился 23 февраля 1960 года в семье Акихито и Митико Сёда. Он учился во многих престижных школах по всей Японии, и говорят, что у него было радостное детство, а также он учился в Оксфордском университете."
