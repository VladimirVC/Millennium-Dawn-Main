 HOL_fortuyn_centre_balance: "Взвешенный Фортэйнизм"
 HOL_fortuyn_centre_balance_desc: "Политический курс уравновешен между реформаторским прагматизмом и популистской энергией. Стабильность, преемственность политики и гражданская активность определяют эту золотую середину."
 HOL_pragmatisch_fortuynisme_high: "Доминирование прагматичного Фортийнтизма"
 HOL_pragmatisch_fortuynisme_high_desc: "Технократия и институциональные реформы доминируют в повестке. Популистская риторика была смягчена в пользу сдержанного подхода, ориентированного на политику."
 HOL_pragmatisch_fortuynisme_medium: "Управленческая политика"
 HOL_pragmatisch_fortuynisme_medium_desc: "Акцент сделан на структурные реформы, децентрализацию и прозрачность. LPF выстраивает стабильный курс рационального руководства."
 HOL_pragmatisch_fortuynisme_low: "Умеренный Прагматизм"
 HOL_pragmatisch_fortuynisme_low_desc: "Прагматичный Фортийнтизм имеет небольшое преимущество, но призывы к более конфронтационной, популистской политике набирают поддержку среди сторонников."
 HOL_pragmatisch_fortuynisme_edge: "Хрупкий баланс с популистскими настроениями"
 HOL_pragmatisch_fortuynisme_edge_desc: "Партия балансирует между сдержанной политикой и популистской привлекательностью. Общественное давление растет, требуя более резкой риторики."
 HOL_radicaal_populisme_high: "Рост Радикального Популизма"
 HOL_radicaal_populisme_high_desc: "Партия полностью приняла антиэстаблишментскую повестку. Конфронтационная риторика, культурный ренессанс и антиелитные настроения определяют новую идентичность LPF."
 HOL_radicaal_populisme_medium: "Популистский импульс"
 HOL_radicaal_populisme_medium_desc: "ЛПФ направляет общественное недовольство в активные действия. Традиционные структуры власти подвергаются внутреннему вызову."
 HOL_radicaal_populisme_low: "Популизм набирает силу"
 HOL_radicaal_populisme_low_desc: "Популистское влияние растёт, хотя партия по-прежнему сохраняет некоторую институциональную осторожность. Внутренние дебаты накаляются."
 HOL_radicaal_populisme_edge: "Напряжение с прагматизмом"
 HOL_radicaal_populisme_edge_desc: "Популистские элементы усиливаются, но руководство ЛПФ остаётся нерешительным в полном отказе от прагматических основ."
 HOL_pvda_modernize_party_policies: "Усовершенствовать партийную политику"
 HOL_pvda_modernize_party_policies_desc: "Ввоести меры по защите окружающей среды, развитию цифровых технологий и поддержке равных возможностей, что привлечет молодых избирателей и прогресивных горожан."
 HOL_pvda_promote_urban_investments: "Стимулировать городские инвестиции"
 HOL_pvda_promote_urban_investments_desc: "Сосредоточиться на инфраструктуре, жилье и экологических проектах в городах, чтобы укрепить привлекательность партии среди городских избирателей."
 HOL_pvda_focus_climate_policy: "Сосредоточиться на климатических инициативах."
 HOL_pvda_focus_climate_policy_desc: "Продвигать амбициозные климатические реформы, делая приоритетом возобновляемую энергию и инвестиции в «зелёную» промышленность."
 HOL_pvda_strengthen_union_influence: "Расширение влияния Союза"
 HOL_pvda_strengthen_union_influence_desc: "Расширяет полномочия профсоюзов, усиливая их влияние на трудовую политику и процесс принятия решений."
 HOL_pvda_promote_rural_investments: "Сосредоточиться на развитии сельских районов"
 HOL_pvda_promote_rural_investments_desc: "Выделить ресурсы для поддержки сельских сообществ и традиционных отраслей, опираясь на рабочие корни партии."
 HOL_pvda_social_housing_initiative: "Расширить программы социального жилья"
 HOL_pvda_social_housing_initiative_desc: "Активно инвестировать в социальное жильё, чтобы сократить неравенство и решить проблему перенаселения городов, уделяя особое внимание малообеспеченным районам."
 HOL_pvda_private_energy_investments: "Стимулировать частные инвестиции в энергетический сектор"
 HOL_pvda_private_energy_investments_desc: "Частично приватизировать энергетический сектор для привлечения инвестиций, делая ставку на экономическую эффективность, а не на экологические цели."
 HOL_pvda_climate_action_plan: "План действий по защите климата"
 sp_dutch_super_bus_project: "Суперавтобус"
 sp_dutch_super_bus_project_desc: "Superbus Experiment — это передовой голландский проект, призванный преобразовать общественный транспорт с помощью инноваций и принципов устойчивого развития. Цель этого проекта — разработать электрический высокоскоростной пассажирский транспорт, способный развивать скорость до 250 км/ч. Superbus, изготовленный из лёгкого углеродного волокна, сочетает в себе роскошь и эффективность, обеспечивая быстрое передвижение между ключевыми регионами."
