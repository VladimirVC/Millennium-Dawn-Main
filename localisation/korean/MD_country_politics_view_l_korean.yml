 increase_election_threshold: "§Y선거 장벽 인상§!"
 increase_election_threshold_TT: "선거 장벽(또는 원내 진입 장벽)은 정당이 입법부에서 의석을 인정받기 위해 달성해야 하는 최소 득표율입니다.\n\n§Y전제 조건§!:\n[!increase_election_threshold_click_enabled]\n§Y효과:§!\n[!increase_election_threshold_click]\n\n이 변경 사항은 다음 선거에 적용되며, 소수 정당이 권력을 얻기 더 어려워집니다."
 decrease_election_threshold: "§Y선거 장벽 인하§!"
 decrease_election_threshold_TT: "선거 장벽(또는 원내 진입 장벽)은 정당이 입법부에서 의석을 인정받기 위해 달성해야 하는 최소 득표율입니다.\n\n§Y전제 조건§!:\n[!decrease_election_threshold_click_enabled]\n§Y효과:§!\n[!decrease_election_threshold_click]\n\n이 변경 사항은 다음 선거에 적용되며, 소수 정당이 권력을 얻기 더 쉬워집니다."
