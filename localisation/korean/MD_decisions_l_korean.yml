 SER_rename_nation_2: "세르비아로 국명 변경"
 SER_rename_nation_2_desc: "몬테네그로 형제들과의 연방이 해체된 지금, 우리 국가가 세르비아 몬테네그로라는 이름을 유지할 이유가 없습니다. 이제 우리는 오직 세르비아일 뿐이며 마땅히 그렇게 대표되어야 합니다."
