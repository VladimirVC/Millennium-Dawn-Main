 HOL_add_dutchaid_desc: "Launch the Dutch Aid Program to provide development assistance to partner nations. Requires completion of the WIC Dutch Aid Program focus and sufficient economic capacity."
 HOL_remove_dutchaid: "Withdraw Dutch Aid Program"
 HOL_remove_dutchaid_desc: "Wind down the Dutch Aid Program, redirecting resources toward domestic priorities."
