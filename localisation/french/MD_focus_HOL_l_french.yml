 HOL_asml_tsmc_group: "ASML-TSMC Technology Alliance"
 HOL_asml_tsmc_group_desc: "The ASML-TSMC Technology Alliance represents the cutting edge of semiconductor research and production. Combining Dutch expertise in lithography with Taiwan's leadership in semiconductor manufacturing, this partnership aims to dominate the global tech landscape, ensuring unrivaled access to advanced microchips and technological innovation."
