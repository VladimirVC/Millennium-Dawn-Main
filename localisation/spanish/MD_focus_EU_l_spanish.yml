 EUvote.1.t: "Votación del Parlamento Europeo iniciada!"
 EUvote.1.d: "El Parlamento Europeo ha llevado una medida a votación! Consulte la sección del Parlamento de la UE para ayudar a revisar o aprobar la medida."
 EUvote.1.a: "A las urnas!"
 EUvote.2.t: "Votación del Consejo Europeo iniciada!"
 EUvote.2.d: "El Consejo Europeo ha comenzado a votar sobre una nueva ley! Consulte la sección de Votación Euro para emitir su voto e influir en otras naciones."
 EUvote.2.a: "A las urnas!"
 EUvote.3.t: "El Parlamento Europeo está listo para la sesión"
 EUvote.3.d: "El Parlamento Europeo está listo para la sesión. Puede elegir proponer algo al Parlamento Europeo o la IA propondrá un proyecto de ley para la sesión en dos semanas."
 EUvote.3.a: "A las urnas!"
 EUvote.4.t: "La votación del Consejo Europeo está lista para la sesión"
 EUvote.4.d: "El Consejo Europeo está listo para la sesión. Puede elegir proponer algo al Consejo Europeo o la IA propondrá un proyecto de ley para la sesión en dos semanas."
 EUvote.4.a: "A las urnas!"
 EUevent.2.t: "Acuerdo UE-Turquía"
 EUevent.2.d: "§C[EUU.GetFlag] La Unión Europea§! y [TUR.GetNameWithFlag] alcanzaron un acuerdo destinado a frenar el flujo de migración irregular desde Turquía hacia Europa. Según la Declaración UE-Turquía, todos los nuevos migrantes irregulares y solicitantes de asilo que lleguen desde Turquía a las islas griegas y cuya solicitud de asilo haya sido declarada inadmisible deberán ser devueltos a Turquía. §C[EUU.GetFlag] La Unión Europea§! pagará 3 mil millones de euros para la Instalación de Refugiados en Turquía."
 EUevent.2.a: "Aceptar"
 EUevent.17.t: "Acuerdo UE-Turquía"
 EUevent.17.d: "§C[EUU.GetFlag] La Unión Europea§! y [TUR.GetNameWithFlag] alcanzaron un acuerdo destinado a frenar el flujo de migración irregular desde Turquía hacia Europa. Según la Declaración UE-Turquía, todos los nuevos migrantes irregulares y solicitantes de asilo que lleguen desde Turquía a las islas griegas y cuya solicitud de asilo haya sido declarada inadmisible deberán ser devueltos a Turquía. §C[EUU.GetFlag] La Unión Europea§! pagará 3 mil millones de euros para la Instalación de Refugiados en Turquía."
 EUevent.17.a: "Aceptar"
 EUevent.4.t: "Estados Unidos de Europa"
 EUevent.4.d: "[FROM.GetNameWithFlag] está uniendo a los estados miembros de §C[EUU.GetFlag] La Unión Europea§! en un superestado europeo llamado los §C[EUU.GetFlag] Estados Unidos de Europa§!. [ROOT.GetNameWithFlag] renunciará a su soberanía y se unirá a los §C[EUU.GetFlag] Estados Unidos de Europa§!."
 EUevent.4.a: "Oda a la Alegría!"
 EUevent.5.t: "Crisis de la deuda europea"
 EUevent.5.d: "El fracaso de la Unión Europea para implementar reformas en la Eurozona. Las naciones dentro de la unión no pueden reembolsar o refinanciar su deuda gubernamental ni rescatar a los bancos sobreendeudados. Los estados miembros ahora están luchando para tratar de impulsar las reformas rápidamente para garantizar que se asegure la viabilidad financiera y económica de la Eurozona. La crisis ha comenzado y el Euro está al borde."
 EUevent.5.a: "El Euro está en juego!"
 EUevent.6.t: "Reformas en la Eurozona"
 EUevent.6.d: "La inminente crisis de deuda ha sido evitada a través de una serie de reformas en la Eurozona, como la implementación de una Unión Fiscal, el aumento de poderes del Banco Central Europeo (BCE) y mecanismos adicionales de estabilidad. La Eurozona ha sido salvada y la Unión Europea ahora puede mirar al futuro con confianza de que se ha evitado una crisis."
 EUevent.6.a: "En variedad concordia."
 EUevent.7.t: "Eurozone Reforms"
 EUevent.7.d: "La Crisis Financiera Global en los Estados Unidos ha provocado un efecto en cascada entre las naciones de Europa. Muchos miembros del Parlamento Europeo están buscando una resolución a la creciente deuda en varios países de la Unión Europea. Los países no han podido ni pagar, ni refinanciar su deuda gubernamental, ni emitir fondos de emergencia para los bancos en quiebra a raíz de la Crisis Financiera Global. Todos los estados miembros involucrados han informado de su incapacidad para reembolsar su deuda y han revelado que sus déficits presupuestarios eran mucho peores de lo que se pensaba anteriormente. La principal similitud entre las naciones es que la causa raíz de la crisis proviene de transferir la deuda privada a deuda nacional a través de una serie de rescates de deuda para salvar instituciones en dificultades dentro de los países. El Banco Central Europeo (BCE) y el Fondo Monetario Internacional (FMI) han comenzado a trabajar en acuerdos con los estados miembros para emitir paquetes de alivio y programas de rescate nacional para prevenir una crisis mucho peor. Lo que queda claro es que la Unión Europea está al borde de una crisis catastrófica, ya que nos encontramos en el centro de la tormenta que es la Crisis Financiera Global. Debemos mantenernos fuertes y la Unión debe reformar la Eurozona para poder capear la tormenta y demostrar que la Unión Europea no flaqueará. Ni ahora, ni mañana, ni nunca. In varietate concordia."
 EUevent.7.a: "Por el Euro!"
 EUevent.8.t: "Reformas de la Troika cumplidas!"
 EUevent.8.d: "[ROOT.GetNameWithFlag] ha promulgado las reformas exigidas por la llamada Troika de la Comisión Europea (CE), el Banco Central Europeo (BCE) y el Fondo Monetario Internacional (FMI). Esto significa austeridad para el pueblo de [ROOT.GetNameWithFlag]!"
 EUevent.8.a: "Nos recuperaremos!"
 EUevent.9.t: "Salida por accidente"
 EUevent.9.d: "[ROOT.GetNameWithFlag] no ha logrado cumplir con las reformas exigidas por la llamada Troika de la Comisión Europea (CE), el Banco Central Europeo (BCE) y el Fondo Monetario Internacional (FMI). Los demás estados miembros se refieren a la Cláusula de No Rescate, por lo que [ROOT.GetNameWithFlag] tiene que salir de la eurozona y §C[EUU.GetFlag] La Unión Europea§! para devaluar su propia nueva moneda y evitar la quiebra."
 EUevent.9.a: "Bad times ahead"
 EUevent.10.t: "Transferir la Armada a EuroArmada"
 EUevent.10.d: "Con las flotas multinacionales y las fuerzas de tarea siendo más comunes e importantes en el siglo XXI, los estados miembros de [EUU.GetFlag] La Unión Europea decidieron unir sus fuerzas y transferir sus buques de guerra a un Mando Naval Europeo unificado conocido como EuroArmada. \n\n[FROM.GetNameWithFlag] ocupa el cargo de Secretario General de EuroArmada y exige que nuestra Flota se una a EuroArmada."
 EUevent.10.a: "Europa, manda en los mares!"
 EUevent.10.b: "Nunca abandonaremos nuestra Flota!"
 EUevent.18.t: "[FROM.GetNameWithFlag] nos pide organizar un Ejercicio Militar"
 EUevent.18.d: "[FROM.GetNameWithFlag] nos pide organizar un Ejercicio Militar en la frontera. Un Ejercicio Militar en nuestra frontera podría aumentar la Tensión Mundial, por lo que es importante que pesemos nuestras opciones cuidadosamente antes de permitir el ejercicio militar."
 EUevent.18.a: "Sí"
 EUevent.18.b: "No"
 EUevent.20.t: "Asistencia adicional previa a la adhesión para [FROM.GetNameWithFlag]"
 EUevent.20.d: "[FROM.GetNameWithFlag] no ha logrado realizar las reformas necesarias para cumplir con los criterios de adhesión a la UE. Deberíamos ofrecerles asistencia financiera y técnica adicional."
 EUevent.20.a: "Sí"
 EUevent.20.b: "No"
 EUevent.21.t: "Una oficina está abierta"
 EUevent.21.d: "Un asiento se ha vaciado, ya sea por jubilación o por el término del periodo del asiento. La oficina permanecerá vacía por parte de la IA durante los próximos catorce días, después de los cuales la IA buscará ocupar el asiento. Por favor, consulte la pantalla de la Oficina de la Unión Europea."
 EUevent.21.a: "Gracias por el consejo!"
 EUevent.22.t: "La Crisis Migratoria en Europa"
 EUevent.22.d: "Las diversas guerras en África y el Medio Oriente, el auge del Jihadismo Radical, y más, han provocado que muchas personas huyan de sus hogares. El descontento e inestabilidad entre estas naciones devastadas por la guerra han causado un desplazamiento como el que no hemos visto en décadas. Miles de migrantes han comenzado a llegar a la Unión Europea en busca de asilo y estatus de refugiado. Las naciones en la periferia de la Unión ya están movilizando guardias fronterizos y policías para frenar el flujo de migrantes, pero están mirando hacia la Unión para implementar medidas permanentes. Algunas soluciones temporales incluyen hacer un trato con Turquía para albergar a algunos de los migrantes, y otras están buscando imponer una agencia más permanente como la Agencia Europea de Asilo para manejar el flujo. Lo que está claro es que debe resolverse rápidamente y de manera eficiente."
 EUevent.22.a: "Comienza una nueva crisis."
 EUelection.1.t: "Elección al Parlamento Europeo [GetYear]"
 EUelection.1.d: "Las elecciones al Parlamento Europeo se celebran cada cinco años."
 EUelection.1.a: "Está bien"
 EU_news.1.t: "Estado de la Unión Europea"
 EU_news.1.d: "La Unión Europea está en buena forma."
 EU_news.1.a: "Está bien"
 EU_news.20.t: "Salida por accidente"
 EU_news.20.d: "[FROM.GetNameWithFlag] no ha logrado cumplir con las reformas exigidas por la llamada Troika de la Comisión Europea (CE), el Banco Central Europeo (BCE) y el Fondo Monetario Internacional (FMI). Los demás estados miembros se refieren a la Cláusula de No Rescate, por lo que [FROM.GetNameWithFlag] tiene que salir de la eurozona y §C[EUU.GetFlag] La Unión Europea§! para devaluar su propia nueva moneda y evitar la quiebra."
 EU_news.20.a: "Adiós!"
 EU_news.21.t: "Un Estado miembro deja la Unión"
 EU_news.21.d: "[FROM.GetNameWithFlag] deja §C[EUU.GetFlag] La Unión Europea§!."
 EU_news.21.a: "Adiós!"
 EU_news.22.t: "El artículo 50 es revocado"
 EU_news.22.d: "[FROM.GetNameWithFlag] ha revocado el artículo 50 y se queda en §C[EUU.GetFlag] La Unión Europea§!."
 EU_news.22.a: "Está bien"
 EU_news.23.t: "Tratado de Retiro"
 EU_news.23.d: "[FROM.GetNameWithFlag] y los estados miembros de §C[EUU.GetFlag] La Unión Europea§! han firmado un Tratado de Retiro. [FROM.GetNameWithFlag] dejará §C[EUU.GetFlag] La Unión Europea§! bajo las condiciones establecidas en el Tratado de Retiro."
 EU_news.23.a: "Adiós, amigos!"
 EU_news.24.t: "Extensión del Artículo 50"
 EU_news.24.d: "[FROM.GetNameWithFlag] y los estados miembros de §C[EUU.GetFlag] La Unión Europea§! han acordado extender el Artículo 50 por tres meses. Ahora [FROM.GetNameWithFlag] dejará §C[EUU.GetFlag] La Unión Europea§! en tres meses."
 EU_news.24.a: "De acuerdo"
 EU_news.34.t: "Se activa el Artículo 50"
 EU_news.34.d: "[FROM.GetNameWithFlag] ha activado el Artículo 50 y dejará §C[EUU.GetFlag] La Unión Europea§! en dos años."
 EU_news.34.a: "De acuerdo"
 EU_news.25.t: "Transferencia de la flota a EuroArmada"
 EU_news.25.d: "[FROM.GetNameWithFlag] está transfiriendo su flota a [FROM.FROM.GetNameWithFlag], el titular del cargo de Secretario General de EuroArmada."
 EU_news.25.a: "De acuerdo"
 EU_news.26.t: "Transferencia de la flota rechazada"
 EU_news.26.d: "[FROM.GetNameWithFlag] no transferirá su flota a EuroArmada."
 EU_news.26.a: "De acuerdo"
 EU_news.27.t: "Un país se une a la Unión Europea"
 EU_news.27.d: "[FROM.GetNameWithFlag] se une a §C[EUU.GetFlag] La Unión Europea§!."
 EU_news.27.a: "Bienvenido!"
 EU_news.32.t: "Programa OMT"
 EU_news.32.d: "El BCE ha iniciado su Programa OMT."
 EU_news.32.a: "De acuerdo"
 EU_news.33.t: "El Programa OMT finaliza"
 EU_news.33.d: "El Programa OMT actual del BCE finaliza."
 EU_news.33.a: "De acuerdo"
 EU_news.45.t: "Reducir el Programa OMT"
 EU_news.45.d: "The ECB has reduced its OMT Program.\n§YOMT Size Limit§!: Add §R-$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §G+5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §R-5%§! Europeanism.\n"
 EU_news.45.a: "De acuerdo"
 EU_news.46.t: "Ampliar el Programa OMT"
 EU_news.46.d: "The ECB has expanded its OMT Program.\n§YOMT Size Limit§!: Add §G+$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §R-5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §G+5%§! Europeanism.\n"
 EU_news.46.a: "De acuerdo"
 EU_news.47.t: "Unión Europea de Defensa (EDU)"
 EU_news.47.d: "Para alcanzar la autonomía estratégica necesaria para defender sus intereses colectivos, responder a conflictos y crisis externas, y proyectar seguridad en nuestro vecindario, los estados miembros han decidido formar la Unión Europea de Defensa (EDU) como una alianza militar y abandonar colectivamente la OTAN."
 EU_news.47.a: "De acuerdo"
 EU_news.48.t: "Unión Europea de Defensa (EDU)"
 EU_news.48.d: "Para alcanzar la autonomía estratégica necesaria para defender sus intereses colectivos, responder a conflictos y crisis externas, y proyectar seguridad en el vecindario europeo, los estados miembros de [EUU.GetFlag][EUU.GetName] han decidido formar la Unión Europea de Defensa (EDU) como una alianza militar y abandonar colectivamente la OTAN."
 EU_news.48.a: "De acuerdo"
 EU_news.49.t: "Un miembro de la OTAN abandona y se une a la EDU"
 EU_news.49.d: "[FROM.GetNameWithFlag] abandona la OTAN y se une a [EUU.GetFlag] La Unión Europea y a la Unión Europea de Defensa (EDU)."
 EU_news.49.a: "De acuerdo"
 EU_news.50.t: "Ejercicio militar en la frontera"
 EU_news.50.d: "[FROM.GetNameWithFlag] está realizando un ejercicio militar en nuestra frontera. Deberíamos considerar contrarrestarlo."
 EU_news.50.a: "De acuerdo"
 EU_news.51.t: "El ejercicio militar es contrarrestado"
 EU_news.51.d: "[FROM.GetNameWithFlag] ha contrarrestado nuestro ejercicio militar y está realizando el suyo en su frontera."
 EU_news.51.a: "De acuerdo"
