 MON.Communist-State: "£MON_emerging_communism モンゴル人民党"
 MON.Communist-State_desc: "The Mongolian People's Party is a social democratic political party in Mongolia. It was founded as a communist party in 1920 by Mongolian revolutionaries and is the oldest political party in Mongolia. Following the Mongolian Revolution of 1990, other political parties in Mongolia were legalised and the country transitioned into a multi-party democracy. The party subsequently abandoned Marxism-Leninism in favour of democratic socialism. The party returned to power following the 2016 election and retained its majority in the 2020 election."
 MON.anarchist_communism: "£MON_left_wing_radical People's Revolutionary Party"
 MON.anarchist_communism_desc: "The Mongolian People's Revolutionary Party, founded in 2010, is a political party that split from the Mongolian People's Party. The Mongolian People's Party was founded in 1920 and was renamed the Mongolian People's Revolutionary Party in 1925. In 2010, the original party name was restored to the Mongolian People's Party. Nambar Enkhbayar, the former chairman of the party, started anew in 2011, registered and established the new 'Mongolian People's Revolutionary Party' and was elected chairman of the party."
 MON.neutral_Social: "£generic_neutral_Social_small 民主連合"
 MON.neutral_Social_desc: "The Democratic Union Coalition was a coalition of political parties in Mongolia. Its primary constituents were the Mongolian National Democratic Party and the Mongolian Social Democratic Party, and its core policies were the implementation of political and economic reforms in the post-communist period. Its chairman was Tsakhiagiin Elbegdorj in 1996-2000.The coalition later became the foundation of the current Democratic Party of Mongolia."
 MON.Neutral_green: "£MON_non_aligned_greens 市民の意志・緑の党"
 MON.Neutral_green_desc: "市民の意志・緑の党は、モンゴルにある環境保護を掲げるリベラル政党である。"
 MON.Nat_Autocracy: "£MON_nationalist_military_junta モンゴル国軍"
 MON.Nat_Autocracy_desc: "モンゴル国軍は、モンゴルの軍隊およびそれを構成する統合部隊の総称である。その任務は、モンゴルの独立、主権、および領土保全を守ることである。"
 MOR.conservatism: "£MOR_NRI (RNI) 独立国民連合"
 MOR.conservatism_desc: "古典的自由主義 - 独立国民連合（アラビア語ローマ字表記：Altajamue Alwataniu Lil'ahrar、フランス語：Rassemblement National des Indépendants、標準モロッコ・タマジクト語：Agraw Anamur y Insimann、RNI）\n\n名目上は社会民主主義政党だが、自由主義的指向を持つ他党と頻繁に協力し、親企業的かつ自由主義的と強く評される。1978年に当時の首相アフメド・オスマンによって結成され、一貫してモロッコ政治における主要勢力としての地位を維持している。さらに、リベラル・インターナショナルの国家オブザーバーであり、アフリカ自由主義ネットワークおよび欧州人民党と提携関係にある。"
 MOR.liberalism: "£MOR_PS (PPS) 進歩社会主義党"
 MOR.liberalism_desc: "左派社会主義 - 進歩社会主義党（アラビア語ローマ字表記： Hizb Al-Taqadoum Wal-Ishtirakiyeh、フランス語：Parti du Progrès et du Socialisme、標準モロッコ・タマジクト語ローマ字表記：Akabar n Ufara d Tnmla、PPS）\n\n進歩社会主義党は1974年、解放社会主義党の後継として結成された。同党の綱領は左派社会主義であり、前身である共産党の理念を引き継いでいる。"
 MOR.socialism: "£MOR_SUP (USFP) 人民勢力社会主義連合"
 MOR.socialism_desc: "民主社会主義 - 人民勢力社会主義連合（アラビア語ローマ字表記：Al-Ittihad Al-Ishtirakiy Lilqawat Al-Sha'abiyah、フランス語：Union Socialiste des Forces Populaires、標準モロッコ・タマジクト語ローマ字表記：Tamunt Tanmlayt Niyalln Igdudann、USFP）\n\n人民勢力社会主義連合は、全国人民勢力連合(UNFP)からの分裂により結成された。UNFP自体は独立党から分裂した政党である。1975年に創設された本党は、社会民主主義を理念とする政党であり、モロッコにおける社会主義的かつ民主的な政策の実現に重点的に取り組んできた。さらに、欧州社会党のオブザーバーメンバーであり、社会主義インターナショナル進歩同盟の国際メンバーでもあることから、モロッコの政治スペクトルにおいて主要な社会主義政党の一つと位置付けられている。"
 MOR.Western_Autocracy: "£MOR_DSM (MDS) 民主社会運動"
 MOR.Western_Autocracy_desc: "王党派 - 民主社会運動（アラビア語ローマ字表記：Alharakat Aldiymuqratiat Waliajtimaeia、フランス語：Mouvement Démocratique et Social、標準モロッコ・タマジクト語ローマ字表記：、MDS）\n\n民主社会運動は1996年、元警察長官マフムード・アルシャンによって設立された。MDSは、王政支持の傀儡政党と評されることが多い。同党は王政支持の姿勢が強く、アラウィー家の継続的な統治を支持しているためである。"
 MOR.anarchist_communism: "£MOR_US (PSU) 統一社会党"
 MOR.anarchist_communism_desc: "左派ナショナリズム - 統一社会党（アラビア語ローマ字表記：Al-Hizb Al-Aishtirakiu Al-Muahad、フランス語：Parti Socialiste Unifié）\n\nモハメド・ベンサイド・アイト・イッデルによって結成された統一社会党は、2005年以前は主に統一社会主義左派党として存在していた。同党は民主的社会主義、反帝国主義、左派ポピュリズム、左派ナショナリズムを掲げて活動している。指導部の上層部の大半は反君主制でもあり、モロッコにより民主的な価値観が浸透することを求めている。"
 MOR.Caliphate: "£generic_Caliphate_small (GICM) モロッコ・イスラム戦闘員グループ"
 MOR.Neutral_conservatism: "£MOR_IP (PI) 独立党"
 MOR.Neutral_conservatism_desc: "アラブ民族主義／保守主義 - 独立党（アラビア語ローマ字表記：Hizb Al-Istiqlal、フランス語：Parti de l'indépendance、標準モロッコ・タマジクト語ローマ字表記：Akabar n Listiqlal、PI）\n\n独立党（イスティクラル党）は、1937年の保護領時代にスペインとフランスからの独立を支持する政党として結成された。現代のモロッコ王国成立後は、主要なアラブ民族主義・保守政党として活動。さらにアフリカ民主連合に加盟し、国際的には国際民主同盟と提携関係にある。"
 MOR.oligarchism: "£MOR_AM (PAM) 真正と現代党"
 MOR.oligarchism_desc: "君主自由主義改革派 - 真正と現代党（アラビア語ローマ字表記：Hizb al'Asalat Walmueasara、標準モロッコ・タマジクト語ローマ字表記：Tamazight: Amulli n Tazyort d Tamtrart、PAM）\n\n真正と現代党は、2008年にモハメッド6世の友人であるフアッド・アリ・エル・ヒマによって、複数の政党が合併して結成された。同党とその支持政策は、しばしば社会自由主義政党と評されるが、論争がないわけではない。反対派は、この政党が君主制の支援と指示を受けていると非難しているが、当然のことながら、党側はこれを否定している。"
 MOR.Neutral_Libertarian: "£MOR_CU (UC) 立憲同盟"
 MOR.Neutral_Libertarian_desc: "自由君主主義 - 立憲同盟（アラビア語ローマ字表記：Hizb Al-Taqadum Waliashtirakia、フランス語：Parti du progrès et du socialisme、標準モロッコ・タマジクト語ローマ字表記：Alittiad Addusturi、UC）\n\n立憲同盟は、マアティ・ブアビッドによって1983年に、自由主義的経済政策を掲げつつもモロッコ君主制の熱烈な支持者である大衆政党として結成された。"
 MOR.Nat_Autocracy: "£MOR_ARM (RMAF) モロッコ王立軍"
 MOR.Nat_Autocracy_desc: "軍事政権 - モロッコ王立軍（アラビア語ローマ字表記：Al-Quwwat al-Musallaha al-Malakiyah al-Maghribiyah）\n\nモロッコ王立軍は1098年に創設されたが、現代的な形態の軍隊は1958年に編成された。モロッコ王立陸軍、モロッコ王立海軍、モロッコ王立空軍、モロッコ王室親衛隊、モロッコ王立憲兵隊で構成される。モロッコ王立軍の最高司令官は当然ながらモロッコ国王であり、国防大臣がモロッコ王立軍の活動に深く関与している。"
 MOR.Monarchist: "£MOR_MON (HoA) - アラウィー家"
 MOR.Monarchist_desc: "絶対君主制 - アラウィー家（アラビア語ローマ字表記：Sulalat Alealawiiyn Alfilaliiyn）\n\nアラウィー家は、アラブのシャリーフ王朝であり、イスラム教の預言者ムハンマドの孫、ハサン・イブン・アリーを通じての子孫を主張している。ムハンマド6世は現在のアラウィー家の当主であり、1999年7月からその地位にある。1600年代初頭からスルタンとして、そして保護領後の国王として、比較的途切れることなくモロッコを支配してきた。"
