 korea_russia.21.t: "Russia Has Hired Our Workers"
 korea_russia.21.d: "We have signed an agreement with Russia to hire our workers in large numbers to assist in construction work. The conditions are more than favorable for us, because the Russian side pays generous salaries"
 korea_russia.21.a: "Nice"
 NKO_Marxism-Leninism: "Marxism-Leninism"
 korea_russia.22.t: "Military Exercises with North Korea"
 korea_russia.22.d: "The North Korean General Staff proposes to hold joint exercises of our armed forces to demonstrate the strength of our armies and to test the cooperation of our armed forces."
 korea_russia.22.a: "That's A Great Idea"
 korea_russia.22.b: "No"
 korea_russia.23.t: "Military Exercises with Russia"
 korea_russia.23.d: "The Russian General Staff has agreed to hold joint exercises of the armed forces of our countries."
 korea_russia.23.a: "Very Good!"
 korea_russia.24.t: "Military Exercises with Russia"
 korea_russia.24.d: "The Russian General Staff refused to hold joint exercises of the armed forces of our countries."
 korea_russia.24.a: "Sad"
