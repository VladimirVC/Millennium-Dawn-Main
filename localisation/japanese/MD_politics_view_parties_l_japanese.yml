 JAP.anarchist_communism: "（RSG）れいわ新選組"
 JAP.anarchist_communism_icon: ""
 JAP.anarchist_communism_desc: "左派ポピュリズム - れいわ新選組\n\nれいわ新選組は、当時参議院議員であった山本太郎によって2019年4月に設立された国政政党である。既存組織に依存せず、ボランティアや寄付を基盤とした草の根の政治勢力として支持の拡大を目指してきた。政策面では、積極的な財政・金融政策による経済と雇用の支援、税制改革による家計負担の軽減、そして脱原発を含むエネルギー政策の転換などを重視している。同時に、子ども・ジェンダー、障害と共生、医療・社会保障、人権、情報公開、政治・行政改革など幅広い分野に取り組み、既存政治への対抗として社会的弱者や経済的困難に直面する人々への支援を強く強調する傾向がある。憲法問題や外交・安全保障政策については、現行憲法の尊重を掲げつつ、国内生活の再建や格差是正を優先する立場を取っている。"
 JAP.Neutral_conservatism: "（LP）自由党"
 JAP.Neutral_conservatism_icon: ""
 JAP.Neutral_conservatism_desc: "保守主義 - 自由党\n\n1997年12月の新進党分裂を受け、1998年1月6日に保守系改革派を中心として結成された政党である。小さな政府、規制緩和、市場志向政策といった経済的新自由主義と、教育基本法改正などの政治的保守主義、さらに国際政治におけるより積極的な軍事的役割を主張する「新保守主義的」要素を組み合わせた改革路線を掲げた。"
 JAP.Neutral_Libertarian: "（JIP）日本維新の会"
 JAP.Neutral_Libertarian_icon: ""
 JAP.Neutral_Libertarian_desc: "改革保守主義 - 日本維新の会\n\n日本維新の会は、大阪維新の会を起源とする改革志向の政治勢力であり、地方分権、行政改革、規制改革、機会均等を強く提唱してきた。2012年に当初の日本維新の会として国政に進出し、その後の分裂や再編を経て、2014年に結いの党との合流によって日本維新の会が結成された。その後2015年の路線対立を受けて大阪系勢力が大阪維新の会を形成し、2016年に再び日本維新の会へと改称された。思想面では「小さな政府」「地方分権」「統治改革」といった改革路線を中心としているが、与野党との距離感や政策の打ち出し方は時期によって変化している。大阪都構想に象徴される統治改革への強いこだわりを持ち、中央集権的な政治運営に対する有権者の代替的選択肢として機能している。"
 JAP.neutral_Social: "£JAP_Neutral_Social （SDP）社会民主党"
 JAP.neutral_Social_icon: "£JAP_Neutral_Social"
 JAP.neutral_Social_desc: "社会民主主義 - 社会民主党\n\n社会民主党（SDP）は、日本社会党の後継政党として1996年に結成された政党であり、市民的自由、福祉国家の拡充、そして説明責任ある統治を重視する中道左派の社会民主主義的野党として位置付けられている。平和主義の立場を一貫して取り、憲法第9条を擁護し、日本の軍事的裁量を拡大するような憲法改正には反対している。\n\n防衛政策において、社会民主党は歴史的に自衛隊に対する厳格な制限を主張してきた。最も強い主張では、自衛隊の中核的機能を災害救援や国際人道支援へと転換することで、長期的には包括的軍縮へと向かうべきだとしている。また、医療や社会保障制度の強化を支持し、自然保護区域の拡大など環境保護政策も重視している。"
 JAP.Nat_Populism: "(SST) 参政党"
 JAP.Nat_Populism_icon: ""
 JAP.Nat_Populism_desc: "右派ポピュリズム - 参政党\n\n参政党は、「投票したい政党がないなら、自分たちでゼロからつくる」というスローガンの下、2020年に設立された政党である。既存の組織に依存しない小規模な政治団体として始まり、党員や支持者の参加、ボランティア活動を基盤として影響力の拡大を図ってきた。政策面では、教育と人材育成、食と健康・環境保全、そして国防を重点分野として掲げており、近年では経済、財政・金融政策、国防・外交、行政、国家アイデンティティに至るまで幅広い政策を提示している。既存政治や官僚主導の統治に対する不信の受け皿として支持を広げてきた一方で、その政策提示の方法や主張の強さをめぐって評価が分かれる傾向もある。"
 AUS.socialism_icon: "£AUS_western_social_democrat"
 CAR.liberalism_2013: "£CAR_western_liberalism_alt Union for Central African Renewal"
 CAR.liberalism_2013_desc: "The Union for Central African Renewal formed in late 2013 as a successor party to the disorganized liberal parties in the Central African Republic. It formed behind Anicet-Georges Dologuélé for his bid for the presidency and slowly is becoming a backbone and the face of Central African neoliberalism."
 CAR.Conservative: "£CAR_emergency_conservatism (MCU) 心の運動連合"
 CAR.Conservative_desc: "心の運動連合は、フォスタン＝アルシャンジュ・トゥアデラ氏が率いる政党である。同党はクワ・ナ・クワ党からの分裂派として結成され、親アフリカ・親ロシアの立場を打ち出し、国内における西側の影響力に反対する姿勢を強めている。同党は数多くの社会民主主義的価値観を掲げ、中央アフリカ共和国における先駆的な存在としての地位を確立している。"
 CAR.anarchist_communism: "£CAR_anarchist_communism Central African Democratic Rally (RDC)"
 CAR.anarchist_communism_desc: "Central African Democratic Rally (RDC) is an African Nationalist that follows the ideologies of republicanism, and democratic socialism. The party was founded by André-Dieudonné Kolingba in 1987 at the height of his power during his twelve years of president. It shares an often anti-Western and pro-Africa view contemporarily but historical still remains somewhat closely aligned to the French."
 CAR.Neutral_Autocracy: "£CAR_neutral_autocracy (UDFR) 統一民主勢力連合"
 CAR.Neutral_Autocracy_desc: "統一民主勢力連合（UDFR）は、中央アフリカ共和国北部および北東部に拠点を置く反政府勢力である。同組織は、後に中央アフリカ政府の要職に就くミシェル・ジョトディアが率いていた。"
 DEN.Neutral_conservatism_alt: "£DEN_non_aligned_conservative Liberal Alliance"
 DEN.Neutral_conservatism_alt_icon: "£DEN_non_aligned_conservative"
 DEN.Neutral_conservatism_alt_desc: "The Liberal Alliance is a classical liberal and right-libertarian political party in Denmark. It is a component of the centre-right bloc and was founded in 2007 as a split from the Social Liberal Party."
 DEN.Nat_Populism_alt: "£DEN_Nat_Populism_alt 新右派"
 DEN.Nat_Populism_alt_icon: "£DEN_Nat_Populism_alt"
 DEN.Nat_Populism_alt_desc: "新右派（デンマーク語：Nye Borgerlige）は、2015年にペルニール・ヴェルムンドとピーター・セイエル・クリステンセンによって設立されたデンマークの政党である。政治スペクトルの右派に位置づけられる同党は、経済的自由主義、国家保守主義、そして厳格な移民政策を組み合わせた政策を提唱している。"
 ERI.liberalism: "£ERI_western_liberalism_alt  （ELF）エリトリア解放戦線"
 ERI.liberalism_desc: "（エリトリア・ナショナリスト）\nエリトリア解放戦線（ティグリニャ語ローマ字表記:Tegadelo Harinet Eritra）\n\nELFは、エリトリア独立のために戦った2つの派閥のうちの1つである。（一方は言うまでもなくEPLFだ）ELFの主要組織に属していた者の大半は、自らの意思によるか否かはさておき、とっくに政界から引退しているが、民主主義と人権のためのELFの継続的な闘争を支持するエリトリア人の政治ブロックが今も存在し、主にディアスポラ・コミュニティ内に見られる。"
 ERI.Communist-State_ETH: "£ETH_emerging_communism （WPE-§3ER§!）エチオピア労働者党 - エリトリア派"
 ERI.Communist-State_ETH_desc: "（マルクス・レーニン主義）\nエチオピア労働者党（アムハラ語ローマ字表記:Ye'Ityopia Serategnoch Parti）\n\nかつてはエチオピア人民民主共和国の唯一の合法政党であったが、これは1991年に終わりを告げた。しかし、党の存在はそこで終わらなかった。著名なメンバーの多くは、その後に続いた内乱から逃亡した。\n\nしかし、これは党のエリトリア派であり、エリトリア内でのみ権力を得ることができる。"
 ERI.anarchist_communism_ETH: "£ETH_left_wing_radical （§3EPRDF§!）エリトリア人民革命民主戦線"
 ERI.anarchist_communism_ETH_desc: "（多民族ナショナリスト）\nエリトリア人民革命民主戦線（アムハラ語ローマ字表記:Ēritira Hizibawī Ābiyotawī Dīmokirasīyawī Ginibari）\n\nエチオピアを拠点とするEPRDFの延長として、連合のエリトリア派は、包括的なエチオピアEPRDFブロック内の他の構成政党よりも、エリトリアの範囲内での運営慣行においてより多くの自治権を与えられている。"
 ERI.Caliphate: "£ERI_caliphate  (EISM) エリトリア・イスラム救済運動"
 ERI.Caliphate_desc: "ジハード・イスラム主義\nエリトリア・イスラム救済運動（アラビア語ローマ字表記：Harakat al Khalas al Islami al Eritrea）\n\nEISMは、エリトリアの奥地で活動し、隣国スーダン国内に細胞組織を維持する過激派スンニ派イスラム主義組織である。エリトリア国内でのシャリーア法の導入を企図しており、スーダン政府による資金提供と支援を受けている疑いがある。"
 ERI.Neutral_conservatism_ETH: "£ETH_non_aligned_autocracy （EDP-§3ER§!）エチオピア民主党 - エリトリア派"
 ERI.Neutral_conservatism_ETH_desc: "（保守的自由主義者）\nエチオピア民主党（アムハラ語ローマ字表記:Ye'Ītiyop'iya Dēmokirasīyawī Paritī）\n\nエチオピア民主党は、少なくとも五つの自由主義政党と保守的自由主義政党が合併した結果生まれた政党である。その起源は1974年のエチオピア民主連合に遡り、同連合は王政復古運動の一環としてデルグ軍事独裁政権との戦いを志向していた。\n\nこれは党のエリトリア派であるためエリトリアの選挙にのみ参加できる。"
 ERI.neutral_Social_2004: "£ERI_neutral_social （EPDF）エリトリア人民民主戦線"
 ERI.neutral_Social_2004_desc: "（中道アフリカ社会主義）\nエリトリア人民民主戦線（アラビア語ローマ字表記:Aljabhat Aldiymuqratiat Alshaebiat Al'Iiritria）\n\nSAGEMとERDFから分離した小規模グループを統合し、EPDFは2004年に正式に設立された。この政治ブロックは、中央集権的な政府体制下における部族連邦制に関するSAGEMの見解を引き続き維持している。"
 ERI.Nat_Autocracy: "£ERI_nationalist_junta (EDF) エリトリア国防軍"
 ERI.Nat_Autocracy_desc: "軍部\nエリトリア国防軍（ティグリニャ語ローマ字表記：Hayltat Miklhkal Ertra）\n\n1991年の独立後、エリトリア国はELFとEPLF双方の準軍事組織を統合し、エリトリア国防軍（EDF）を創設した。21世紀に入り、この新たな国防軍の最大規模の部隊は、主に陸上部隊で構成されるエリトリア陸軍となった。"
 ERI.Monarchist_ETH: "£ETH_nationalist_monarchist （§3Hoa§!）ソロモン朝 - アクスム家"
 ERI.Monarchist_ETH_desc: "（君主制）\nソロモン朝（アムハラ語ローマ字表記:Yeselemonawī Širiwe Menigišiti）\n\n世界で最も長く続く王朝の一つかつ、アフリカで最も長く続く王朝であり、1270年から1975年に強制的に廃止されるまで、合計705年間統治した。この王朝はソロモン王自身の治世にまで遡ると主張する者もおり、この聖書の人物との近接性が、主にカリブ海を拠点とするラスタファリ運動の主な原因である。\n\nしかし、これは§3アクスム家§!（アムハラ語ローマ字表記:§3Ye'Ākisumi Bēti§!）の名を冠した比較的新しい分家であり、彼らは数は少ないものの、エリトリア地域において旧王朝への忠誠を誓い続ける者たちによって支持されている。"
 ISR.Monarchist: "£ISR_nationalist_monarchist ノアム"
 ISR.Monarchist_desc: "宗教的超シオニズム - §Cノアム§!（ヘブライ語ローマ字表記：Noam、快さ）\n\nノアムは、ラビ・ツヴィ・タウと彼のハル・ハモール・イェシーバに触発された宗教的シオニスト共同体内の超保守派によって正式に設立された、イスラエルの極右正統派ユダヤ教・宗教的シオニスト政党である。同党の主たる目的は、LGBTの権利に対する政策の推進、および支持者らが「家族の破壊」と呼ぶものへの対抗である。"
 ISR.Monarchist_icon: "£ISR_nationalist_monarchist"
 LEB.Autocracy_icon: "£SYR_Autocracy"
 LOG.Nat_Autocracy: "£generic_Nat_Autocracy_small 中央アフリカ共和国再生人民戦線"
 LOG.Nat_Autocracy_desc: "軍事反政府勢力 - 中央アフリカ共和国再生人民戦線（フランス語：Front populaire pour la renaissance de la Centrafrique, FPRC）\nFPRCは反政府勢力として結成され、数ある元セレカ派の反政府勢力の一つである。ヌールディン・アダムが率いるこのグループは、中央アフリカ共和国北東部にロゴネ共和国（ダル・アル・クティ）と呼ばれる独自の並行国家を樹立した。"
 MAL.conservatism_icon: "£MAL_western_conservative"
 MAL.liberalism_2003: "£MAL_western_liberalism (URD) 共和国と民主主義のための連合"
 MAL.liberalism_2003_desc: "社会自由主義 - 共和国と民主主義のための連合（フランス語：Union pour la République et la Démocratie, URD）\n共和国と民主主義のための連合は、マリの社会自由主義政党である。スマイラ・シセの支持者たちによって結成されたこの党は、当時大統領であったアルファ・ウマル・コナレが、自身の政党に反してアマドゥ・トゥーレを支持したことへの反発として設立された。さらに、同党はアフリカ自由ネットワークや、さらに広範な国際組織である中道民主インターナショナルに加盟している。"
 MAL.liberalism_2003_icon: "£MAL_western_socialist"
 MAL.socialism_2001: "£MAL_western_socialist (RPM) マリのための集会"
 MAL.socialism_2001_desc: "社会主義 - マリのための集会（フランス語：Rassemblement pour le Mali）\n2001年に結成された「マリのための集会」は、イブラヒム・ブバカル・ケイタ率いる政党である。同氏および同党は民主主義を支持し、国家の安定を図るとともに、トゥアレグ族と交渉を行い、彼らを政府に近づけるよう努めている。また同党は、教育への障壁を取り除き、社会保障制度を改善し、脆弱な地域に水と灌漑施設を整備するとともに、マリ国内のすべての人々に繁栄をもたらすための幅広い政策改革を通じて、マリを未来へと導くことを目指している。"
 MAL.socialism_2001_icon: "£MAL_western_socialist"
 MAL.anarchist_communism: "£MAL_anarchist_communism (US-RDA) スーダン連合 - アフリカ民主連合"
 MAL.anarchist_communism_desc: "汎アフリカ社会主義 - スーダン連合 - アフリカ民主連合（フランス語：Union Soudanaise-Rassemblement Démocratique Africain, US-RDA）\nスーダン連合 - アフリカ民主連合は、マリの左派系アフリカ社会主義・汎アフリカ主義政党であり、アフリカ民主党と緊密な連携関係にある。同党は、マリ民主同盟から離脱する前は、同連合の活発な構成員であった。"
 MAL.anarchist_communism_icon: "£MAL_anarchist_communism"
 MAL.Communist-State_icon: "£MAL_communism"
 MAL.Neutral_Muslim_Brotherhood: "£MAL_muslim_brotherhood (UDD) 民主主義と発展のための連合"
 MAL.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 - 民主主義と発展のための連合（フランス語：Union pour la démocratie et le développement, UDD）\n民主主義と発展のための連合は、当時のアルファ・ウマル・コナレ大統領に対抗して、1992年にハッサン・バリーによって設立された。同党は一連の保守的なイスラム民主主義的価値観を掲げて活動しており、党内の一部派閥はより右寄りの傾向にある。同党の主要な理念の一つは、マリにさらなるイスラム民主主義をもたらし、新たな影響力の時代を切り開くことである。"
 MAL.Neutral_Muslim_Brotherhood_icon: "£MAL_muslim_brotherhood"
 MAL.neutral_Social_icon: "£MAL_neutral_social"
 MAL.Neutral_Communism: "£MAL_neutral_communism マリ労働党"
 MAL.Neutral_Communism_desc: "ホッジャ主義共産主義 - マリ労働党（フランス語：Parti malien du travail, PMT）\n1958年にマルクス・レーニン主義政党として結成され、マリ民主同盟に参加した後、分派として独立したマリ労働党は現在も、より大規模なマリ民主同盟内のホッジャ主義共産主義系分派として活動している。反修正主義の共産党として、マルクス・レーニン主義の真の教義に忠実であり、アメリカ、ロシア、欧州連合、中国に対して極めて批判的である。"
 MAL.Neutral_Communism_icon: "£MAL_neutral_communism"
 MAL.Neutral_green_icon: "£MAL_neutral_green"
 MAL.Neutral_conservatism: "£MAL_neutral_conservative トゥーレ政権"
 MAL.Neutral_conservatism_desc: "保守的包括政党 - トゥーレ政権\nアマドゥ・トゥマニ・トゥーレは、1991年から1992年にかけて暫定政府の議長として、同国初の複数政党制選挙を主導したマリの政治家である。彼はムッサ・トラオレ前大統領の親衛隊長を務め、革命の主導に尽力したほか、マリ憲法の起草を伴う軍政から民政への移行プロセスを主導した。彼は将軍の階級で軍を退役し、無所属として立候補したが、この選択が政治的スペクトラムを横断して有権者を惹きつけている。この党は、各選挙に向けて彼の綱領への支持を表している。"
 MAL.Neutral_conservatism_icon: "£MAL_neutral_conservative"
