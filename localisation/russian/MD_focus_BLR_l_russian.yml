 BLR_mzkt_category: "Минский завод колёсных тягачей"
 BLR_mzkt_category_desc: "Минский колесный тракторный завод — предприятие, специализирующееся на производстве дорожной и внедорожной тяжелой техники, прицепов и специальных колесных шасси для строительной, нефтегазовой и машиностроительной отраслей. Является государственным предприятием, находящимся в ведении Государственного военно-промышленного комитета Республики Беларусь."
