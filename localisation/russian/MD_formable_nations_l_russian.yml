 form_NORDEM_category: "Империя Северного моря"
 form_NORDEM_category_desc: "Империя Северного моря была политическим союзом государств Англии, Дании и Норвегии в начале XI века. Империя возникла в конце эпохи викингов и была невероятно недолговечной. Объединение империи вновь стало бы достижением в наши дни и могло бы означать возвращение эпохи неовикингов."
