 state_based_investments_screen_delayed_tt: "下面的菜单是您可以采取的一系列决定，以鼓励 [THIS.GetName] 内各种类型的发展。所有国家至少有两个可用名额，可用于其整个国家的任何省份。您可以选择在一个省份开展多个项目，也可以选择在全国范围内开展项目。您可以通过提高国家的§Y实力等级§!来获得更多内部投资槽！\n\n来自实力等级的内部投资槽数目：\n- §Y超级大国§!: 6\n- §Y列强§!: 5\n- §Y大国§!: 4\n- §Y区域性强国§!: 3\n"
 available_internal_investments_screen_tt: "可用§H内部投资§!槽：[current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "所有国家将至少有两个可用名额，可用于其整个国家的任何省份。您可以选择在一个省份开展多个项目，也可以选择将项目分散到全国各地。您可以通过提高国家的§Y实力等级§!获得更多部投资槽！\n\n正在进行的项目：\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "扩展本地可再生能源产能"
 state_owned_local_renewable_capacity_modifier_desc: "在对当地可再生能源基础设施进行一系列有针对性的投资后，该州现在正在利用可再生能源生产更多的能源。"
 state_owned_local_infrastructure_modifier: "扩展本地基础设施"
 state_owned_local_infrastructure_modifier_desc: "该省份扩大当地基础设施已引发各种短期项目的实施，旨在大幅改善当地基础设施。"
 state_owned_local_military_infrastructure_modifier: "扩展本地军事基础设施"
 state_owned_local_military_infrastructure_modifier_desc: "经过对当地军事设施和基础设施的大量投资，该地区的军事设施现已全面现代化。该地区的军事生产能力也得到了显著提升。"
 state_owned_local_energy_infrastructure_modifier: "扩展本地能源基础设施"
 state_owned_local_energy_infrastructure_modifier_desc: "对当地电网的定向投资已使该地区的发电和输电基础设施实现了全面现代化。目前，该地区所有能源领域的能源生产能力均有所提升。"
 state_owned_build_forward_logistics_base_modifier: "建设前沿后勤基地"
 state_owned_build_forward_logistics_base_modifier_desc: "该地区各处已建立战略后勤基地，形成前沿部署的补给网络。这些设施显著改善了部队和物资在该地区的运输，降低了整体补给需求。"
 state_owned_improve_rebuilding_efforts_modifier: "改善重建工作"
 state_owned_improve_rebuilding_efforts_modifier_desc: "重建工作赢得了当地民众的支持，提高了公众合作度，减少了社会动荡。对当地基础设施和社区重建项目的投资增强了当地民众的配合度。"
 state_owned_hire_extra_primary_sector_workers_modifier: "雇佣额外的初级产业工人"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "通过有针对性的招聘和培训计划，该地区的第一产业劳动力规模得到扩大。农业、采矿和其他资源开采作业受益于劳动力供应的增加，从而提高了资源产量。"
