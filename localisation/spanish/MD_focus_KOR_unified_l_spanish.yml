 KOR_dominate_the_east_sea_desc: ""
 KOR_revive_yeonhaeju: "Revivir Yeonhaeju"
 KOR_revive_yeonhaeju_desc: ""
 KOR_unfinished_business: "Asuntos pendientes"
 KOR_unfinished_business_desc: "Esto es así a pesar de que Japón se rindió ante los Estados Unidos en la Segunda Guerra Mundial, pero Japón nunca nos pidió disculpas formales por Gyeongsul Gukchi y su colonia. No podemos olvidar esta vergüenza."
