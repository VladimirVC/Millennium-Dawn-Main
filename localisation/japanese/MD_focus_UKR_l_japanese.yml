 ukraine_parliament.26.b: "おそらく、少しの賄賂が彼らの心を変えるかもしれない……"
 ukraine_parliament.30.t: "議会のいくつかの議席が政府に反旗を翻す！"
 ukraine_parliament.30.d: "議会の一部のメンバーが政府に反旗を翻し、議会内での支持が減少した。"
 ukraine_parliament.30.a: "よくあることだ"
 ukraine_parliament.30.b: "おそらく彼らの懐が少し寂しかったのだろうか？"
 ukraine_parliament.31.t: "議会のいくつかの議席が我々を支持し始める！"
 ukraine_parliament.31.d: "議会の一部のメンバーが最近の成功を称賛し始め、議会内での支持が増加した。"
 ukraine_parliament.31.a: "素晴らしい"
 ukraine_parliament.32.t: "議会、地元へのさらなる支援を推進！"
 ukraine_parliament.32.d: "議会は国中の地元住民に与えるための大きな予算を割り当てた。我々の政権はその情報を掴んでおり、内閣の一部メンバーは、その金はより良い用途のために他の場所に割り当てることができると考えている。"
 ukraine_parliament.32.a: "金は地元住民のためだ！"
 ukraine_parliament.32.b: "ああ、間違いなく他の場所で使える"
 ukraine_parliament.33.t: "議会、我々の政権に疑問を呈す"
 ukraine_parliament.33.d: "議会のいくつかのメンバーが最近、「[ROOT.GetAdjective]国民を満足させることに失敗した」として我々の政権を非難した。親政府派と野党派の間で議会内で多くの内紛があり、我々が介入して回答を出す必要がある段階に達した。"
 ukraine_parliament.33.a: "彼らが何を考えようとさせろ"
 ukraine_parliament.33.b: "適切な回答を準備する"
 ukraine_parliament.34.t: "議会、医療支出増加の動議を可決"
 ukraine_parliament.34.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to medical spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.34.a: "議会は正しい考えを持っている"
 ukraine_parliament.34.b: "いいえ、この動議は可決されません"
 ukraine_parliament.35.t: "議会、年金増加の動議を可決"
 ukraine_parliament.35.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to welfare spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.35.a: "議会は正しい考えを持っている"
 ukraine_parliament.35.b: "いいえ、この動議は可決されません"
 ukraine_parliament.36.t: "議会、警察支出増加の動議を可決"
 ukraine_parliament.36.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to police spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.36.a: "議会は正しい考えを持っている"
 ukraine_parliament.36.b: "いいえ、この動議は可決されません"
 ukraine_parliament.37.t: "議会、教育支出増加の動議を可決"
 ukraine_parliament.37.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to education spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.37.a: "議会は正しい考えを持っている"
 ukraine_parliament.37.b: "いいえ、この動議は可決されません"
 ukraine_parliament.38.t: "議会、軍事支出増加の動議を可決"
 ukraine_parliament.38.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to military spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.38.a: "議会は正しい考えを持っている"
 ukraine_parliament.38.b: "いいえ、この動議は可決されません"
 ukr_sabotage.1.t: "ウクライナ、我が備蓄を攻撃"
 ukr_sabotage.1.d: "In a recent drone attack, Ukraine struck a warehouse holding some old heavy equipment."
 ukr_sabotage.1.a: "くそっ"
 ukr_sabotage.2.t: "ウクライナ、我が備蓄を攻撃"
 ukr_sabotage.2.d: "In a recent drone attack, Ukraine struck a warehouse holding some old light equipment."
 ukr_sabotage.2.a: "くそっ"
 ukr_sabotage.3.t: "ウクライナ、我が軍事生産を攻撃"
 ukr_sabotage.3.d: "In a recent drone attack, Ukraine struck one of our manufacturers, and we have suffered temporary damage."
 ukr_sabotage.3.a: "彼らは代償を払うだろう。"
 UKR_our_ukraine_start: "我らがウクライナ"
 UKR_our_ukraine_start_desc: "国を整理し、自由主義改革を実施する時が来た。我々にとって、人民が第一だ！"
 UKR_our_ukraine_secretariat: "ウクライナ大統領府事務局"
 UKR_our_ukraine_secretariat_desc: "事務局は、大統領活動に関連する管理的および組織的機能の管理において重要な役割を果たす。ウクライナ大統領府事務局創設の主な目的は、大統領の憲法上の権限の遵守と、その義務の効果的な履行を保証することである。"
 UKR_our_ukraine_secretariat_reduction: "事務局職員の削減"
 UKR_our_ukraine_secretariat_reduction_desc: "政府機関の業務を最適化し、予算コストを削減するために、事務局職員の数を削減する必要がある。"
 UKR_our_ukraine_decentralization: "地方分権化"
 UKR_our_ukraine_decentralization_desc: "国内の地方自治を強化する必要がある。"
 UKR_our_ukraine_wto: "WTO加盟のための援助要請"
 UKR_our_ukraine_wto_desc: "WTO加盟の準備はできているが、これには支援が必要である。"
 UKR_our_ukraine_yanukovich_go_home: "ヤヌコーヴィチ解任"
 UKR_our_ukraine_yanukovich_go_home_desc: "ヤヌコーヴィチは首相としてひどい働きぶりを見せたので、彼を解任し、新しい首相を任命するだろう。"
 UKR_our_ukraine_timoha: "ティモシェンコ内閣"
 UKR_our_ukraine_timoha_desc: "有名なユーリヤ・ティモシェンコが政府に加わった。彼女が国家に何をもたらすか見てみよう。"
 UKR_our_ukraine_aviation_reform: "航空産業改革"
 UKR_our_ukraine_aviation_reform_desc: "航空産業は国にとって非常に重要であり、それを復活させるよう努めるだろう。"
 UKR_our_ukraine_help_western: "リヴィウの支援を取り付ける"
 UKR_our_ukraine_help_western_desc: "We will restore the supply of hot and cold water in Lviv, thereby enlisting the support of the residents of this city and possibly the region."
 UKR_our_ukraine_cheap_gas_negotiate: "ガス価格引き下げ交渉"
 UKR_our_ukraine_cheap_gas_negotiate_desc: "We will try to negotiate with Moscow on lowering energy prices."
 UKR_our_ukraine_service_life: "兵役期間の短縮"
 UKR_our_ukraine_service_life_desc: "ウクライナ軍は近代化が必要である。この分野における最初の改革は、軍隊での兵役期間を2年から1年に短縮することだ！したがって、徴集兵は兵役に費やす時間を少なくなるだろう。"
 UKR_our_ukraine_nato_eu: "ウクライナのNATOおよびEUへの統合支援"
 UKR_our_ukraine_nato_eu_desc: "NATOとEUへのより進歩的な統合を開始しよう。これは偉大な国家の軍事的および経済的安全保障のために必要である。"
 UKR_our_ukraine_fire_corrupt: "汚職者の解雇"
 UKR_our_ukraine_fire_corrupt_desc: "政府には汚職者がおり、彼らを解雇する！国内に汚職の余地はないだろう！！！"
 UKR_our_ukraine_form_new_government: "新政府の樹立"
 UKR_our_ukraine_form_new_government_desc: "国から盗んできた者たちをすべて解雇したので、新しく、正直で、公正な政府を樹立できる。"
 UKR_our_ukraine_fight_corruption: "汚職との戦い"
 UKR_our_ukraine_fight_corruption_desc: "汚職は国の主な敵であり、厳しく戦うだろう！"
 UKR_our_ukraine_alternative_energy_sources: "代替エネルギー源"
 UKR_our_ukraine_alternative_energy_sources_desc: "代替エネルギー源を開発することは、その輸入への依存を減らすのに役立つだろう。"
 UKR_our_ukraine_crush_oligarchs: "オリガルヒの影響力削減"
 UKR_our_ukraine_crush_oligarchs_desc: "オリガルヒは国内で第二の敵である。彼らは法を回避することによって政府に影響を与えることができる。これを避けるために、彼らの影響力を減らし、国から追い出そうと試みるだろう。"
 UKR_our_ukraine_increase_media_freedom: "メディアの自由拡大"
 UKR_our_ukraine_increase_media_freedom_desc: "メディアは非常に長い間制限されてきたが、今、我々の統治下で、これまで以上に自由で独立したものになるだろう！"
 UKR_our_ukraine_release_political_prisoners: "政治犯の釈放"
 UKR_our_ukraine_release_political_prisoners_desc: "以前の政府の下で、多くの野党政治家が投獄された。彼らに自由を与えよう！"
 UKR_our_ukraine_internet_freedom: "インターネットの自由"
 UKR_our_ukraine_internet_freedom_desc: "インターネットの自由は、市民が情報への自由なアクセス、表現の自由、オンラインコミュニケーションにおけるプライバシーの権利を持つことを意味する。これらの権利と自由が保護されることを保証しよう。"
 UKR_our_ukraine_provide_housing: "ウクライナ市民への住宅供給"
 UKR_our_ukraine_provide_housing_desc: "It is necessary to provide housing for our citizens, for this we will carry out appropriate reforms."
 UKR_our_ukraine_health_insurance_law: "健康保険法"
 UKR_our_ukraine_health_insurance_law_desc: "We will adopt a law on health insurance, which will encourage the population to actively apply to medical institutions and increase the level of health of our citizens."
 UKR_our_ukraine_curriculum_modernization: "カリキュラムの近代化"
 UKR_our_ukraine_curriculum_modernization_desc: "We will reform the educational program in our schools to improve the education of the younger generation."
 UKR_our_ukraine_diversification_of_gas_supply_sources: "ガス供給源の多様化"
 UKR_our_ukraine_diversification_of_gas_supply_sources_desc: "We will actively diversify our resource assets so as not to be dependent on a single supplier."
 UKR_our_ukraine_cost_reduction: "予算支出の削減"
 UKR_our_ukraine_cost_reduction_desc: "We will make budget cuts to improve the state of our budget."
 UKR_our_ukraine_deregulation_of_business_environment: "ビジネス環境の規制緩和"
 UKR_our_ukraine_deregulation_of_business_environment_desc: "我が国は官僚主義を減らし、起業家のための行政障壁を下げる必要がある。"
 UKR_our_ukraine_attracting_investments: "投資誘致"
 UKR_our_ukraine_attracting_investments_desc: "Our country is open for investment and we are ready to attract potential investors."
 UKR_our_ukraine_beginning_decommunization_policy: "脱共産主義政策の開始"
 UKR_our_ukraine_beginning_decommunization_policy_desc: "1991年にソビエトの抑圧から独立を獲得した。これを記念し、国中で脱共産主義政策を開始しよう！共産主義の影響は今ここで抑圧されなければならない。"
 UKR_our_ukraine_economic_liberalism: "経済自由主義"
 UKR_our_ukraine_economic_liberalism_desc: "経済がより効率的に成長することを望むなら、経済自由主義は必須であり、したがってそれを受け入れなければならない。"
 UKR_our_ukraine_parliamentary_republic: "議会権限の強化"
 UKR_our_ukraine_parliamentary_republic_desc: "議会の権限を強化することは、政府の代表性を高めるのに役立つ。議会は国民によって選出された機関であり、したがって、意思決定プロセスにおいてより大きな影響力を持つべきである。これは、政治プロセスにおける市民の意見と利益のより大きな包摂に貢献する。"
 UKR_our_ukraine_president_republic: "大統領権限の強化"
 UKR_our_ukraine_president_republic_desc: "The first important argument in favor of strengthening presidential powers is to ensure a more effective and rapid response to crisis situations. In a world saturated with global challenges such as economic crises, counterterrorism, and pandemics, the president must have sufficient authority to act quickly and decisively.\n\nLimited authority can lead to bureaucratic delays and ineffective decisions."
 UKR_our_ukraine_democratic_constitution: "新民主憲法"
 UKR_our_ukraine_democratic_constitution_desc: "We are ready to reform our constitution in order to bring true democracy in our country closer."
 UKR_our_ukraine_recognition_holodomor: "ホロドモールの承認"
 UKR_our_ukraine_recognition_holodomor_desc: "ソビエト権力は我々、ウクライナ人に対して、20世紀で最も恐ろしい犯罪を犯した。この恐ろしい飢饉、ホロドモールは、農業の集団化とソ連共産主義政権によって実行された国家暴力政策によって引き起こされた。"
 UKR_our_ukraine_ukrainian_institute: "ウクライナ国立記憶研究所"
 UKR_our_ukraine_ukrainian_institute_desc: "The Ukrainian Institute of National Memory is a central body of executive power for realization of state policy in the sphere of restoration and preservation of national memory. It will be established to recreate a fair history of the Ukrainian nation and to form and implement state policy in this direction.\n\nWe will also immortalize the memory of the victims of political repressions and famines on the territory of our country."
 UKR_our_ukraine_secretariat_of_president_reduction: "削減されたウクライナ大統領府事務局"
 UKR_ukrainian_libertarianism: "ウクライナ・リバタリアニズム"
 UKR_ukrainian_libertarianism_desc: "It is time for Ukraine to enter the era of libertarianism! Let's liberate the country from the shackles of capitalists and communists."
 UKR_full_deregulation: "完全な規制緩和"
 UKR_full_deregulation_desc: "We will begin the process of complete deregulation, and government influence will decrease."
 UKR_decrease_role_of_government: "政府の力の削減"
 UKR_decrease_role_of_government_desc: "The state will play a minimal role in our beautiful country."
 UKR_free_the_common_folk: "真に自由な人民"
 UKR_free_the_common_folk_desc: "国民はついに深呼吸し、自由を感じるだろう！"
 UKR_offshore_country: "オフショア企業の国"
 UKR_offshore_country_desc: "We welcome the creation of many offshore zones in our country."
 UKR_true_servant_of_people: "人民の真のしもべ"
 UKR_true_servant_of_people_desc: "ついに、ウクライナは世界で最も自由な国になった！"
 UKR_our_ukraine_freedom_of_social_media_idea: "ソーシャルメディアの自由"
 UKR_our_ukraine_freedom_of_social_media_idea_desc: "The media should be free and will be so. We will support the prohibition of censorship."
 UKR_our_ukraine_secretariat_of_president: "ウクライナ大統領府事務局"
 UKR_our_ukraine_ukrainian_institute_of_national_memory: "ウクライナ国立記憶研究所"
 UKR_our_ukraine_ukrainian_institute_of_national_memory_desc: "Every Ukrainian should remember the sacrifices of their people that he made in the past. The Institute of National Memory will help us form generations of those who will remember the heroism of Ukrainians."
 UKR_our_ukraine_fight_with_corruption_idea: "汚職との戦い"
 UKR_our_ukraine_education_reform_idea: "教育改革の影響"
 UKR_our_ukraine_health_reform_idea: "医療改革の影響"
 UKR_our_ukraine_social_reform_idea: "住宅改革の影響"
 UKR_our_ukraine_air_industry_idea: "航空産業改革"
 UKR_liberals_modifier: "ウクライナ自由主義"
 UKR_liberals_modifier_desc: "Ukraine has finally embarked on the path of liberalism, now we have removed the shackles of authoritarian rule."
 ukraine_our_ukraine.1.t: "ウクライナ大統領府事務局"
 ukraine_our_ukraine.1.d: "大統領府はユシチェンコ時代にひどい振る舞いをしたので、より大きな政治的安定を保証するために、ウクライナ大統領府事務局に改革している。"
 ukraine_our_ukraine.1.a: "変化の時だ。"
 ukraine_our_ukraine.2.t: "ウクライナ国立記憶研究所"
 ukraine_our_ukraine.2.d: "The Institute of National Memory has started its work, now we are ready to return Ukraine to its true history!"
 ukraine_our_ukraine.2.a: "Hurray!"
 ukraine_our_ukraine.3.t: "民主憲法"
 ukraine_our_ukraine.3.d: "We will introduce amendments to the constitution that will make our country more democratic!"
 ukraine_our_ukraine.3.a: "Hurray!"
 ukraine_our_ukraine.4.t: "ウクライナ、我が国に投資を申し出る。"
 ukraine_our_ukraine.4.d: "ウクライナ政府は外国投資家誘致プログラムの開始を発表し、我が政府に経済への投資を申し出た。"
 ukraine_our_ukraine.4.a: "投資しよう！"
 ukraine_our_ukraine.4.b: "これには興味がない。"
 ukraine_our_ukraine.5.t: "ウクライナへの投資。"
 ukraine_our_ukraine.5.d: "彼らは我が国への投資に同意した。"
 ukraine_our_ukraine.5.a: "良い"
 ukraine_our_ukraine.6.t: "ウクライナへの投資。"
 ukraine_our_ukraine.6.d: "彼らは我が国への投資申し出を拒否した。"
 ukraine_our_ukraine.6.a: "残念だ。"
 ukraine_our_ukraine.7.t: "ウクライナとのガス契約。"
 ukraine_our_ukraine.7.d: "ウクライナは、我々のガス契約の購入価格を引き下げることを提案してきた。その見返りに、我々の間の仲介者が排除され、それによって我々は彼らに対してより大きな影響力を持つことになるだろう。同意すべきか？"
 ukraine_our_ukraine.7.a: "これに署名する"
 ukraine_our_ukraine.7.b: "これには興味がない。"
 ukraine_our_ukraine.8.t: "ロシアとのガス契約。"
 ukraine_our_ukraine.8.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.8.a: "良い"
 ukraine_our_ukraine.9.t: "ロシアとのガス契約。"
 ukraine_our_ukraine.9.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.9.a: "良い"
 UKR_zelensky_western: "西への道"
 UKR_zelensky_western_desc: "We will continue our political course with a desire to the west."
 UKR_befriend_the_west: "西側との友好"
 UKR_befriend_the_west_desc: "We will continue our policy of improving relations with Western countries, and it is in them that we see our partners and allies."
 UKR_avakov_befriend: "アヴァコフとの友好"
 UKR_avakov_befriend_desc: "Arsen Avakov turned out to be the most persistent minister of all that we have seen, he was able to survive many governments, besides, he supports the Azov battalion financially, if we strengthen ties with him, we will be able to increase the Azov in numbers."
 UKR_land_reform_zelya: "土地改革"
 UKR_land_reform_zelya_desc: "We will continue the Land reform, which was started a long time ago."
 UKR_fasten_nato_join: "NATO加盟への願望"
 UKR_fasten_nato_join_desc: "NATO is our finish line, what we have been striving for from the very beginning."
 UKR_peaceful_negotiation_don: "ドンバス問題の平和的解決"
 UKR_peaceful_negotiation_don_desc: "ドンバスのために譲歩する準備ができており、ついにこの終わりのない紛争を終わらせる。"
 UKR_keep_status_quo: "現状維持"
 UKR_keep_status_quo_desc: "We are not ready to resolve this issue peacefully, we will go the same way as before."
 UKR_next_azov_created_tt: "新たな§Yアゾフ旅団§!が創設されるだろう"
 UKR_our_influence_helps_tt: "§C我々が議会に影響力を持っているため、賛成の議席が少なくても、この法律をより高い成功確率で可決することができる§!"
 UKR_lose_some_seats_TT: "§H議会§!でいくつかの議席を§R失う§!だろう！"
 UKR_gain_some_seats_TT: "§H議会§!でいくつかの議席を§G得る§!だろう！"
 UKR_is_pro_west_TT: "西側同盟政党である"
 UKR_is_pro_east_TT: "ロシア同盟政党である"
 UKR_is_neutral_TT: "いかなる外国とも同盟していない政党である"
 UKR_influence_parliament_TT: "§H議会§!に§p影響力を行使し始める§!だろう！"
 UKR_puppet_parliament_TT: "§H議会§!を§O傀儡化§!するだろう！\n\n§R法改正のために議会を経由する必要はなくなる！§!"
 UKR_dissolve_parliament_TT: "§H議会§!を§R解散§!するだろう！\n\n§R法改正のために議会を経由する必要はなくなる！§!"
 UKR_zelenskiy_socialist_TT: "§Yゼレンスキー§!は彼の§B見通し§!を変更するだろう！！"
 UKR_zelenskiy_formed_TT: "£ukr_servant_of_the_people §Y人民のしもべ§!党が創設されるだろう！"
 UKR_zelenskiy_here_TT: "£ukr_servant_of_the_people §Y人民のしもべ§!党が創設されなければならない！"
 ukr_zelenskiy.1.t: "驚きの発表"
 ukr_zelenskiy.1.d: "今日、ヴォロディミル・ゼレンスキーは驚きの発表を行った。この声明で、彼はリバタリアニズムの思想を放棄し、「大多数の要請により」社会主義の思想を採用したと述べた。また、大統領はウクライナが西側との結びつきを強化し、西側投資家を引き付けようと試みると発表した。"
 ukr_zelenskiy.1.a: "驚きの展開だ"
 ukr_zelenskiy.2.t: "国民のしもべ"
 ukr_zelenskiy.2.d: "予期せぬニュースがウクライナ全体を揺るがした。今日、議会の結果として、人気映画にちなんで名付けられた「国民のしもべ」党が創設された。多くの人々はこの党が映画のPRキャンペーンとして創設されたと信じているが、他の人々はこの党が有名なコメディアン、ヴォロディミル・ゼレンスキーを大統領候補として推進するために創設されたと主張している。ゼレンスキー自身は関与を否定しているが、彼の回避的な回答はさらなる憶測の根拠となるかもしれない。"
 ukr_zelenskiy.2.a: "興味深い"
 UKR_kucha_second_terms: "クチマ第二期"
 UKR_kucha_second_terms_desc: "クチマ大統領は第二期に国を統治している。おそらく今回は再選されないか、あるいは国を混乱に導くだろう。見守ろう。"
 UKR_reform_programm: "改革プログラム"
 UKR_reform_programm_desc: "国家を経済成長に導き、ソ連崩壊の危機から脱却させるべき一連の改革を開始するだろう。"
 UKR_reform_national_guard: "国家親衛隊の解散"
 UKR_reform_national_guard_desc: "改革の時が来た。国家親衛隊を解散し、より効果的な組織、国内軍に改革する時だ。"
 UKR_reform_vsu: "新軍事ドクトリン"
 UKR_reform_vsu_desc: "軍隊は変更とアップグレードが必要である。さもなければ、敵との戦争に備えられないだろう。新ドクトリンはNATOとの協力も強化する。"
 UKR_check_and_balances: "抑制と均衡システム"
 UKR_check_and_balances_desc: "国家は現在、不安定な政治状況にある。大惨事を防ぐために、政治領域でバランスを見つける必要がある。"
 UKR_yushenko_cabinet: "ユシチェンコ内閣"
 UKR_yushenko_cabinet_desc: "ヴィクトル・ユシチェンコはすでに、経営経験で優れた働きを見せた旧知の人物である。彼が我々に約束した活動の結果は、国の経済要素の成長を刺激するはずだ。"
 UKR_welfare_reform: "福祉改革"
 UKR_welfare_reform_desc: "医療は1990年代以来悲しい状態にある。改革を開始する必要がある。"
 UKR_kosuik: "コシューク製パン工場"
 UKR_kosuik_desc: "国内自動車産業はその復活を開始しており、民間起業家がこのプロセスの原動力となるだろう。その一人、ユーリー・コシュークは、農産物生産のための自身の工場を設立する計画である。"
 UKR_azovstal_private: "アゾフスタリ民営化"
 UKR_azovstal_private_desc: "We will continue to work on giving Azovstal to private hands since we cannot financially support such a huge enterprise ourselves."
 UKR_land_reform: "土地改革"
 UKR_land_reform_desc: "土地改革はずっと前に行われるべきだったが、可能な限り遅らせた。今や土地を民間に売却するのが容易になるだろう。"
 UKR_land_trade: "土地取引の簡素化"
 UKR_land_trade_desc: "国内の民間投資家による土地取得を促進し続けるだろう。"
 UKR_bolster_privatization: "土地民営化の強化"
 UKR_bolster_privatization_desc: "民営化は加速され、我が国は新しい市場経済に踏み出さなければならない。"
 UKR_ukrenergo_reform: "ウクルエネルゴ改革"
 UKR_ukrenergo_reform_desc: "エネルギー構造は恐ろしい状況にある。ウクルエネルゴを改革する必要がある。"
 UKR_burshtyn_tes: "ブルシュティンTES拡張"
 UKR_burshtyn_tes_desc: "ブルシュティン火力発電所の再建と改善を実施するだろう。"
 UKR_diversy_fuel: "燃料購入の多様化"
 UKR_diversy_fuel_desc: "海外で購入するエネルギー源を巧みに多様化しなければならない。単一の販売者に頼ることはできない。"
 UKR_short_terms: "短期ローンの廃止"
 UKR_short_terms_desc: "短期ローンのようなものを完全に廃止するだろう。それらは経済に有害である。"
 UKR_bank_lobbyst: "銀行ロビイストの排除"
 UKR_bank_lobbyst_desc: "多くの銀行ロビイストが1990年代に権力を握った。彼らの国への影響力を排除する時が来た。"
 UKR_social_cut_down: "社会支出の削減"
 UKR_social_cut_down_desc: "財政準備金を安定させるために、一時的に社会支出を削減することを余儀なくされている。"
 UKR_struggle_power: "権力闘争"
 UKR_struggle_power_desc: "不安定な状況は強力な政治的反対者の出現につながった。彼らから身を守り、有権者に我々と共に留まるよう説得する必要がある。"
 UKR_tax_agro: "農業企業への減税"
 UKR_tax_agro_desc: "生産成長を刺激するために、農業産業への税金を削減するだろう。"
 UKR_stimulate: "経済刺激"
 UKR_stimulate_desc: "我々の措置は結果をもたらしており、経済は成長し始めている。"
 UKR_negotiation_left: "左派野党との交渉"
 UKR_negotiation_left_desc: "左翼活動家は著しく力をつけている。彼らと妥協点を見つける必要がある。"
 UKR_radicalize_without_kuchma: "Eradicate Ukraine Without Kuchma"
 UKR_radicalize_without_kuchma_desc: "「クチマなきウクライナ」運動は危険な勢いを得ていた。彼らに対処する時が来た。"
 UKR_slowdown_reform_land: "土地改革の減速"
 UKR_slowdown_reform_land_desc: "社会で賛否両論を引き起こしたため、土地改革を減速させることを決定した。"
 UKR_re_approach_privatbank: "プリヴァトバンクへの再接近"
 UKR_re_approach_privatbank_desc: "プリヴァトバンクは国内最大の銀行である。それと成功裏に妥協点を見つけなければならず、それは大きな税収をもたらすだろう。"
 UKR_concessin_with_donbass: "ドンバスとの譲歩"
 UKR_concessin_with_donbass_desc: "ドンバスのために譲歩する準備ができており、それによって彼らの我々への忠誠を保証しようと試みる。"
 UKR_invest_mining_companies: "鉱業会社への投資"
 UKR_invest_mining_companies_desc: "ドンバス企業に投資することにより、地元の有権者からの強力な支持を保証するだろう。"
 UKR_donbass_infrastructure: "ドンバスインフラプログラム"
 UKR_donbass_infrastructure_desc: "ドンバスインフラへの投資は、新たな有権者を引き付け、この地域からの収入を増加させることを可能にするだろう。"
 UKR_impeachment: "Impeachment Proceedings"
 UKR_impeachment_desc: "The Verkhovna Rada is moving to impeach us. We must respond to this threat to our authority before it is too late."
 UKR_privatization_ukrenergo: "Expansion of Ukrenergo"
 UKR_privatization_ukrenergo_desc: "We are expanding UkrEnergo, connecting a part of our network to the european synchronous grid."
 UKR_reach_russian_oligarch: "ロシアオリガルヒへの到達"
 UKR_reach_russian_oligarch_desc: "政治的キャンペーンを支援するためにロシアオリガルヒを引き付けるだろう。"
 UKR_rus_mobile_operators: "ロシア携帯電話事業者の誘致"
 UKR_rus_mobile_operators_desc: "ロシアの通信事業者に市場へのアクセスを与えるだろう。"
 UKR_free_economic_zones: "自由経済圏"
 UKR_free_economic_zones_desc: "領土内にいくつかの経済圏を創設するだろう。そこでは当然、優先事項としてロシア投資家を待つだろう。"
 UKR_yanuk_cabinet: "Yanukovych [Yanu_Status]"
 UKR_yanuk_cabinet_desc: "ヴィクトル・ヤヌコーヴィチと彼の今後の政治活動は、ユシチェンコの活動と同様に、経済に刺激的な効果をもたらすはずだ。"
 UKR_block_land_trading: "土地取引の阻止"
 UKR_block_land_trading_desc: "軍産複合体の独立に悪影響を与える可能性があるため、土地取引は積極的に凍結されるだろう。"
 UKR_soft_taxation: "緩やかな税制改革"
 UKR_soft_taxation_desc: "法人と個人の両方をあまり怒らせない緩やかな税制改革を実施するだろう。"
 UKR_floating_excange: "変動相場制"
 UKR_floating_excange_desc: "変動相場制を実践するだろうが、それは全く異なる経済効果をもたらす可能性がある。"
 UKR_small_favor: "中小企業優遇"
 UKR_small_favor_desc: "経済成長を刺激するために、中小企業向けの優遇措置を導入するだろう。"
 UKR_doentskstal: "ドネツクスタル"
 UKR_doentskstal_desc: "この地域での活動を最適化するために、ドンバス領土に新しい企業を設立している。"
 UKR_gas_azvostal: "アゾフスタルにガスパイプライン建設"
 UKR_gas_azvostal_desc: "企業の運営と地区の生活条件を改善するために、アゾフスタルにガスパイプラインを建設するだろう。"
 UKR_dorohy_avto: "ウクライナ自動車道路"
 UKR_dorohy_avto_desc: "国内の道路状況をひどいと呼ぶのはお世辞である。95%の道路は単に荒廃状態にある。それを修正し始めるだろう。"
 UKR_roshen: "ロシェン"
 UKR_roshen_desc: "有名なロシェン製菓工場はその活動を拡大しており、その所有者を注意深く監視するだろう。"
 UKR_luaz_reopen: "Modernize LuAZ"
 UKR_luaz_reopen_desc: "LuAZ produces old vehicles. It is necessary to modernize them to help our road reforms."
 UKR_ukraine_2000: "ウクライナ2000"
 UKR_ukraine_2000_desc: "新しいミレニアムはウクライナに世界的な憲法改革をもたらすべきであり、積極的に推進するだろう。"
 UKR_gain_rada_support: "ラダの支持獲得"
 UKR_gain_rada_support_desc: "改革を実施するためには、ヴェルホーヴナ・ラーダの全面的な支持が必要である。"
 UKR_deal_pro_socialist_media: "親社会主義メディアへの対処"
 UKR_deal_pro_socialist_media_desc: "社会主義政党は勢いを増している。彼らのメディアを抑圧する必要がある。"
 UKR_referendum_const: "憲法国民投票"
 UKR_referendum_const_desc: "憲法改正に関する国民投票を実施する準備ができている。"
 UKR_push_for_reforms: "改革推進"
 UKR_push_for_reforms_desc: "改革派の考えを政府に推進し続けるだろう。国家はそれらを必要としている。"
 UKR_arrest_timoshenko: "ティモシェンコ逮捕"
 UKR_arrest_timoshenko_desc: "ティモシェンコは我々にとってあまりにも危険な政治的反対者である。彼女を逮捕するだろう。"
 UKR_prepare_protest: "抗議への準備"
 UKR_prepare_protest_desc: "我々の行動は確実に一連の抗議を引き起こすだろう。それらに備える必要がある。"
 UKR_reform_berkut: "ベルクト改革"
 UKR_reform_berkut_desc: "ベルクト特殊部隊は改革される必要があり、それがなければ抗議の制御を失うかもしれない。"
 UKR_deal_yushenko: "ユシチェンコへの対処"
 UKR_deal_yushenko_desc: "ユシチェンコと彼の政治的野心に対処するだろう。"
 UKR_appoint_yanukovich: "ヤヌコーヴィチ任命"
 UKR_appoint_yanukovich_desc: "ヤヌコーヴィチを政府首班に任命するだろう。おそらく彼は状況を改善できるだろう。"
 UKR_seek_help_eastern_oligarch: "東側オリガルヒからの支援要請"
 UKR_seek_help_eastern_oligarch_desc: "抗議運動を抑圧するための資源は明らかに十分ではない。おそらく東側オリガルヒが助けてくれるだろうか？"
 UKR_aid_from_minign_companies: "鉱業会社からの援助獲得"
 UKR_aid_from_minign_companies_desc: "鉱業会社への投資は報われるはずであり、彼らの経営者は財政的およびその他の援助を提供する準備ができているだろう。"
 UKR_negotiate_orange_maidan: "オレンジ革命マイダンとの交渉"
 UKR_negotiate_orange_maidan_desc: "抗議者との交渉を開始し、問題をきっぱりと解決する時が来た。"
 UKR_const_reform: "憲法改革"
 UKR_const_reform_desc: "ついに抗議運動を通じて、改革を政府に押し込むことができた。"
 UKR_lyvochkin: "リョヴォーチキン解決策"
 UKR_lyvochkin_desc: "首席顧問は、抗議者と妥協しなければならず、さもなければ国は混乱に直面するだろうと我々に明らかにした。"
 UKR_stay_for_fair_election: "「公正な」選挙への残留"
 UKR_stay_for_fair_election_desc: "権力をただ放棄するつもりはない。最後まで立ち続けるだろう。"
 UKR_yusha_tt: "§Yこれにより、ユシチェンコ内閣ブランチのNFを実行できなくなる！§!"
 UKR_yana_tt: "§Yこれにより、NF「ヤヌコーヴィチ内閣」を完了できるようになる！§!"
 UKR_easterns_tt: "ウクライナの£text_icon_ukr_dobro §3東側地域§!住民の支持が§Y[?modify_easterns]§!変化（現在の支持: §Y[?UKR.easterns]§!）\n"
 UKR_westerns_tt: "ウクライナの£text_icon_ukr_yasno §t西側地域§!住民の支持が§Y[?modify_westerns]§!変化（現在の支持: §Y[?UKR.westerns]§!）\n"
 UKR_maidani_tt: "§8マイダン代表者§!への支持が§Y[?modify_maidani]§!変化する（現在の支持率: §Y[?UKR.maidani]§!)\n"
 UKR_political_situation_decision_category: "ウクライナ政治的不安定"
 UKR_political_situation_decision_category_desc: "[UKR.GetFlag]§YUkraine§! is a huge state with many peoples living in it, but two of them represent the majority - [UKR.GetFlag]§YUkrainians§! and [SOV.GetFlag]§YRussians§!. Due to historical events, the [SOV.GetFlag]§YRussian-speaking§! population mainly lives in the east of the country, while the [UKR.GetFlag]§YUkrainian§! population already occupies more western territories. This geographical division is constantly shaking [UKR.GetFlag]§YUkraine§! and may become a §Rbig problem§! for the country in the future. Among other things, the political electorate of [UKR.GetFlag]§YUkraine§! is very prone to protests and expressing their opinions through rather §Rnon-peaceful§! protests.  We need to take into account all these aspects and find an opportunity to balance these forces.\n\nIf support for the §8Maidan§! §Rfalls below 15§!, unrest will begin, which could lead to a §Rcivil war§!. To reduce the consequences of a possible §Rcivil war§!, it is necessary to expand the influence and power of the §YSBU§!, the §YNational Guard§!, etc. Depending on whose support is §Rless§! (§tWesterners§! or §3Easterners§!), there will be different scenarios of political unrest."
 ukr_west_output_text: "§Y[?UKR.westerns]§!"
 ukr_west_tooltip: "現在、§t西側地域§!によって支持されている"
 ukr_maidan_output_text: "§Y[?UKR.maidani]§!"
 ukr_maidan_tooltip: "現在、§8マイダン§!によって支持されている"
 ukr_east_output_text: "§Y[?UKR.easterns]§!"
 ukr_east_tooltip: "現在、§3東側地域§!によって支持されている"
 UKR_our_agricultrure: "国内農業"
 UKR_our_agricultrure_desc: "The Ukrainian agricultural industry is one of the best in the world, and we will try not to lose this title."
 UKR_azovsteel: "アゾフスタリ"
 UKR_yushenko_premier_idea: "ユシチェンコ政府"
 UKR_yanuk_premier_idea: "ヤヌコーヴィチ政府"
 UKR_unstable_government_idea: "マイダンへの不満"
 UKR_land_reform_idea: "土地改革"
 UKR_land_reform_idea_desc: "The land reform initiated in the last century should lead to a complete redistribution of land holdings throughout the country. So far, it is in the process."
 UKR_zaims: "ローン取消の経済的影響"
 UKR_banks_lobbyst_liquidate: "銀行ロビイストの清算"
 UKR_mining_company_help: "鉱業会社への税制優遇"
 UKR_privatization_idea: "民営化"
 UKR_without_kuchma_idea: "クチマなきウクライナ"
 UKR_left_opposition_idea: "左派野党"
 UKR_luaz_idea: "LuAZ"
 UKR_anti_socialist_media: "反社会主義メディア"
 UKR_crisis_political: "政治危機"
 UKR_crisis_political_desc: "Our country is gripped by a political crisis, the authorities are paralyzed and political forces are fighting with each other for power."
 ukraine_kuchma.2.t: "抗議への準備"
 ukraine_kuchma.2.d: "我々の行動は明らかに抗議につながるだろう、準備する必要がある。"
 ukraine_kuchma.2.a: "準備はできているだろう"
 ukraine_kuchma.2.b: "すべては自然に解決するだろう"
 ukraine_kuchma.11.t: "弾劾の試み"
 ukraine_kuchma.11.d: "ヴェルホーヴナ・ラーダは何度も我々を弾劾しようとしてきた。この問題を解決する時が来た。"
 ukraine_kuchma.11.a: "弾劾反対"
 ukraine_kuchma.12.t: "ドネツク派閥との友好"
 ukraine_kuchma.12.d: "いわゆるオリガルヒのドネツク派閥を味方に引き入れようと試みるだろう。彼らは将来の野党との対立において我々にとって有用だろう。"
 ukraine_kuchma.12.a: "ドンバスは我々と共にある"
 ukraine_kuchma.12.b: "彼らを支援しないだろう"
 ukraine_kuchma.13.t: "ヤヌコーヴィチ、大統領になるだろう"
 ukraine_kuchma.13.d: "我々は第二回大統領選挙の結果を認めず、ヤヌコーヴィチをウクライナ大統領に任命するだろう。"
 ukraine_kuchma.13.a: "そうあれかし"
 ukraine_kuchma.14.t: "南東部での抗議"
 ukraine_kuchma.14.d: "選挙での我々の勝利の後、すべてが終わったと思っていたが、今や我が国の南東部が強い抗議活動を示し始めた。いわゆる「青いマイダン」が我が政府への圧力を強め始め、深刻な結果を脅かしている。"
 ukraine_kuchma.14.a: "我々はもっと注意する必要がある。"
 ukraine_kuchma.15.t: "ウクライナの青いマイダン"
 ukraine_kuchma.15.d: "Activists in Southeastern Ukraine continued to develop their autonomy project, while the Kyiv authorities are busy changing chairs in the rada offices, a big storm is coming. Supporters of the Blue Maidan have asked us for support, will we help them?"
 ukraine_kuchma.15.a: "我々は彼らを支援する。"
 ukraine_kuchma.15.b: "我々は干渉すべきではない。"
 ukraine_kuchma.16.t: "南東部政府"
 ukraine_kuchma.16.d: "The so-called activists of the Blue Maidan have officially announced the creation of their government, and that they do not recognize the Kyiv government. It seems that they were supported from outside, otherwise they would not have decided on such a thing."
 ukraine_kuchma.16.a: "直ちに警察をそこに送れ"
 ukraine_kuchma.17.t: "青い革命"
 ukraine_kuchma.17.d: "今日、ヴィクトル・ヤヌコーヴィチ率いる青いマイダンの支持者たちは、彼らの独立とウクライナ南東部の独自の共和国形成を公式に宣言した。彼らの側に寝返った軍事部隊、そして将軍や将校もいる。"
 ukraine_kuchma.17.a: "嵐が始まった"
 ukraine_kuchma.18.t: "ガリツィアでの抗議"
 ukraine_kuchma.18.d: "第二回大統領選挙を無視するという我々の決定は国内の不安定さを引き起こし、西部地域の多くの住民が抗議の活発な段階へと移行し、そこで警察との衝突が始まった。"
 ukraine_kuchma.18.a: "我々はもっと注意する必要がある"
 ukraine_kuchma.19.t: "ウクライナの赤いマイダン"
 ukraine_kuchma.19.d: "ウクライナのガリツィアの活動家たちが、国内の違法な選挙に対する抗議を開始した。状況は非常に緊迫しており、我々はすでに武装蜂起について話している。なぜなら、いくつかの将軍が反乱軍を支援しているからだ。おそらく我々は彼らを助けるべきだろうか？"
 ukraine_kuchma.19.a: "我々は彼らを支援する。"
 ukraine_kuchma.19.b: "我々は干渉すべきではない。"
 ukraine_kuchma.20.t: "西ウクライナ政府"
 ukraine_kuchma.20.d: "The protests have already moved into a more heated phase, and they are clearly being helped from abroad. Now they have announced the creation of their own government, which is not subordinate to the Kyiv authorities."
 ukraine_kuchma.20.a: "直ちに警察をそこに送れ"
 ukraine_kuchma.21.t: "赤い革命"
 ukraine_kuchma.21.d: "Today, supporters of the so-called Red Maidan announced their withdrawal from Ukraine and the beginning of armed resistance with the Kyiv Pro-Russian government."
 ukraine_kuchma.21.a: "嵐が始まった"
 UKR_spu_start: "ウクライナ社会党"
 UKR_spu_start_desc: "After years of struggling we managed to get the people trust. Now we shall start our great reforms."
 UKR_spu_rada_position: "ラーダでの地位"
 UKR_spu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_spu_coalition: "CPU/SPU連合"
 UKR_cpu_spu_coalition_desc: "CPUとSPUは兄弟と表現することができる。彼らは常に統一戦線として選挙に参加してきた。どちらかが勝てば連合を形成することは明らかである。"
 UKR_ditch_cpu: "CPUからの距離"
 UKR_ditch_cpu_desc: "CPUとSPUは兄弟と表現することができる。彼らは常に統一戦線として選挙に参加してきたが、もしCPUが権力を握れば共産主義体制を復活させることは明らかである。我々はできるだけ早く彼らから距離を置かなければならない。"
 UKR_cpu_start: "ウクライナ共産党"
 UKR_cpu_start_desc: "Communist Party of Ukraine."
 UKR_cpu_rada_position: "ラーダでの地位"
 UKR_cpu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_monocoalition: "単独連合"
 UKR_cpu_monocoalition_desc: "Monocoalition is a term in Ukrainian politics. It refers to a government formed by only one party. By creating a CPU monocoalition, we could easily take control of the legislature and executive branches and begin the Soviet restoration."
 UKR_back_to_soviet_tracks: "ソビエト時代へ回帰"
 UKR_back_to_soviet_tracks_desc: "After the collapse of the USSR, our country only lost, missed and destroyed everything that remains of the heritage of this great country. We will change this process."
 UKR_commie_russia_trade: "ロシアとのパートナーシップ"
 UKR_commie_russia_trade_desc: "我々は両国間の友好関係を強化するつもりである。"
 UKR_commie_russia_rjd: "ロシア鉄道とのパートナーシップ"
 UKR_commie_russia_rjd_desc: "Russian railways will be an excellent partner for us, thanks to their help we will significantly improve our infrastructure."
 UKR_commie_russia_banks: "ロシア銀行"
 UKR_commie_russia_banks_desc: "We are ready to let Russian banks into our territory, their financial capabilities will help us in our development."
 UKR_commie_russia_gas: "新しいガス契約"
 UKR_commie_russia_gas_desc: "We are ready to conclude a new gas contract with Russia, on favorable terms for us."
 UKR_commie_china_trade: "中国とのパートナーシップ"
 UKR_commie_china_trade_desc: "我々は両国間の友好関係を強化するつもりである。"
 UKR_commie_china_trains: "中国での列車購入"
 UKR_commie_china_trains_desc: "We will purchase several trains in China that will help improve our supply."
 UKR_comsomol: "コムソモール復活"
 UKR_comsomol_desc: "The Komsomol movement needs to be revived as an ideological pillar of our system in the minds of new generations."
 UKR_commie_china_infra: "鉄道近代化"
 UKR_commie_china_infra_desc: "我々の中国の同僚は、我が国の鉄道網近代化に資金提供することに同意した。"
 UKR_commie_china_huawei: "ファーウェイとの協力"
 UKR_commie_china_huawei_desc: "We will establish a strong cooperation with this Chinese company."
 UKR_commie_motor_sich: "モトールシーチ拡大"
 UKR_commie_motor_sich_desc: "We will invest additional funds in the development of our key enterprise - MotorSich."
 UKR_ukr_pioners: "ピオネール復活"
 UKR_ukr_pioners_desc: "The pioneers need to be revived, the youth have lost their moral guidelines and must be guided on the path of socialism again."
 UKR_one_union_for_all: "統一国家労働組合"
 UKR_one_union_for_all_desc: "We will protect the rights of workers across the country by creating a single trade union."
 UKR_remilitarization: "再軍備"
 UKR_remilitarization_desc: "Our state must have a strong army, so we will begin the immediate process of remilitarization."
 UKR_arms_zavods: "軍事工場への投資"
 UKR_arms_zavods_desc: "Our military industry was destroyed after the collapse of the USSR, it's time to revive it."
 UKR_sbu_kgb: "KGBメソッド"
 UKR_sbu_kgb_desc: "We must rebuilt the old KGB school, this will clearly increase the professionalism of our staff."
 UKR_arms_tanks: "戦車への重点"
 UKR_arms_tanks_desc: "Our armed forces need tanks urgently, we will give them this need."
 UKR_revolut_in_blr: "ベラルーシ社会主義革命"
 UKR_revolut_in_blr_desc: "我々の兄弟であるベラルーシ人民は、彼らの支配者と資本家によって抑圧されている！ 彼らを解放しよう！"
 UKR_revolution_in_russia: "ロシア社会主義革命"
 UKR_revolution_in_russia_desc: "我々の兄弟であるロシア人民は、彼らの支配者と資本家によって抑圧されている！ 彼らを解放しよう！"
 UKR_befriend_russia_com: "ロシアとの友好"
 UKR_befriend_russia_com_desc: "We intend to establish partnership and friendly relations with Russia."
 UKR_befriend_belarus_com: "ベラルーシとの友好"
 UKR_befriend_belarus_com_desc: "We intend to establish partnership and friendly relations with Belarus."
 UKR_central_asia_revolt: "中央アジア革命"
 UKR_central_asia_revolt_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_caucasus_revolut: "コーカサス革命"
 UKR_caucasus_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_baltic_revolut: "バルト諸国革命"
 UKR_baltic_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_revolut_in_mol: "モルドバ社会主義革命"
 UKR_revolut_in_mol_desc: "我々の兄弟であるモルドバ人民は、彼らの支配者と資本家によって抑圧されている！ 彼らを解放しよう！"
 UKR_csto_com_app: "CSTO加盟"
 UKR_csto_com_app_desc: "Our fraternal peoples are members of the CSTO, perhaps it is worth joining them."
 UKR_integration_support: "旧共和国の統合"
 UKR_integration_support_desc: "We will begin the integration processes of the former republics."
 UKR_declare_ussr: "ソ連復活"
 UKR_declare_ussr_desc: "我々はソ連の真の後継者だ！ この偉大な国家を復活させる時が来た！"
 UKR_nationalize_everything: "国有化開始"
 UKR_nationalize_everything_desc: "我々は資本家に何も与えない！ 企業は国家の懐に戻るだろう！"
 UKR_social_propaganda: "社会改革"
 UKR_social_propaganda_desc: "We will launch large-scale social reforms that will allow us to win the hearts of the poor."
 UKR_christian_communism_desc: "宗教禁止は我々が許さない過ちの一つだった。キリスト教共産主義は我々の未来だ。結局のところ、イエス自身が共産主義者だったのだ！"
 UKR_criminalize_oligrachy: "オリガルヒ犯罪化"
 UKR_criminalize_oligrachy_desc: "オリガルヒは何年もの間、我々の偉大な祖父によって創られた財産を売り払い、我が国から血を吸ってきた。もうたくさんだ！"
 UKR_land_to_people: "土地を人民へ！"
 UKR_land_to_people_desc: "The land should belong to the people! Not a bunch of oligarchs, bandits."
 UKR_revive_soviet_factories: "ソビエト工場の復活"
 UKR_revive_soviet_factories_desc: "Many enterprises that remained as a legacy from the USSR were destroyed and destroyed, we will revive them again."
 UKR_regions_ditch: "地域党との連合放棄"
 UKR_regions_ditch_desc: "我々はこの党と連合を形成しないだろう。それは我々にとって問題をもたらすだけだ。"
 UKR_regions_integr: "地域党との連合"
 UKR_regions_integr_desc: "We will form a coalition with this party, it will strengthen our political capabilities."
 UKR_socialist_ukraine_effort: "社会主義改革"
 UKR_socialist_ukraine_effort_desc: "We will begin a series of reforms that should strengthen our political position."
 UKR_pensions_for_elders_incr: "年金増額"
 UKR_pensions_for_elders_incr_desc: "We will increase pension payments so that citizens are willing to retire."
 UKR_full_rabota: "労働改革"
 UKR_full_rabota_desc: "We will carry out serious reforms in the labor legislation to improve the working conditions of our citizens."
 UKR_socialist_democratic_policies: "社会民主主義国"
 UKR_socialist_democratic_policies_desc: "New future awaits our country, under the banner of social democracy."
 UKR_start_to_support: "貧困層支援開始"
 UKR_start_to_support_desc: "Our electorate is low-income citizens who hope that our reforms will pull them out of the economic abyss into which they were dragged by the previous government. We will help them."
 UKR_progressive_taxation: "累進課税"
 UKR_progressive_taxation_desc: "We intend to introduce progressive taxation for greater economic equality of our citizens."
 UKR_social_conservative_prog: "社会保守プログラム"
 UKR_social_conservative_prog_desc: "We intend to carry out a number of reforms that were inspired by the social conservative representatives of the political sphere of our country."
 UKR_ukr_cossack_freedom: "コサックの自由"
 UKR_ukr_cossack_freedom_desc: "Our citizen is like a free Cossack, he is no longer a slave to capital and not a slave to anyone."
 UKR_nationalization_of_big_com: "大企業の国有化"
 UKR_nationalization_of_big_com_desc: "We will carry out a series of nationalizations of large companies."
 UKR_crusade_against_inequality: "不平等との戦い"
 UKR_crusade_against_inequality_desc: "Inequality in our society is becoming more pronounced, and we will begin an economic and political program to soften the financial boundaries between different social strata."
 UKR_reduce_cap_oligrach: "オリガルヒの影響力弱体化"
 UKR_reduce_cap_oligrach_desc: "The oligarchs have too much influence on our country, it's time to deal with this."
 UKR_people_brotherhood: "兄弟的団結"
 UKR_people_brotherhood_desc: "Our people, the peoples that inhabit our country must be a united brotherhood that will resist threats from outside."
 UKR_ask_russia_to_give_nukes: "ロシアに核兵器を要請"
 UKR_ask_russia_to_give_nukes_desc: "We intend to request from Russia some stocks of nuclear weapons to protect our country from external threats."
 UKR_reduce_foreign_influence: "外国の影響力削減"
 UKR_reduce_foreign_influence_desc: "We will weaken foreign influence on our country, independence is our foundation."
 UKR_labourr_unions: "労働組合支援"
 UKR_labourr_unions_desc: "我々は国内の労働組合を積極的に保護し、国内に肯定的な労働環境を創り出すだろう。"
 UKR_immigartion_easing: "移民促進"
 UKR_immigartion_easing_desc: "We will facilitate immigration processes, because our borders should not be closed by walls."
 UKR_uindependence_prop: "国内投資家保護"
 UKR_uindependence_prop_desc: "We should not abandon the domestic investor, this is the only way we will strengthen the growth of our economy."
 UKR_dont_touch_west_inv: "西側投資家優先"
 UKR_dont_touch_west_inv_desc: "We will concentrate our efforts to protect the Western investor."
 UKR_pro_russian_approach: "親ロシア方針"
 UKR_pro_russian_approach_desc: "We will choose Russia as a reference point, historically we are only on the way with them."
 UKR_pro_western_approach: "親西側方針"
 UKR_pro_western_approach_desc: "We have chosen our way - the way to the west."
 UKR_request_protection_from_rus: "ロシア保護要請"
 UKR_request_protection_from_rus_desc: "We will try to conclude agreements on protection and defense so that our country is protected by Russia."
 UKR_apply_economic_union: "ロシア経済圏参加"
 UKR_apply_economic_union_desc: "Economic cooperation with Russia will give us economic growth and profitable contracts."
 UKR_donbas_peaceful: "分離主義問題の平和的解決"
 UKR_donbas_peaceful_desc: "We are ready to peacefully resolve the issue with the territories that have separated from us."
 UKR_csto_apply: "CSTO加盟"
 UKR_csto_apply_desc: "We intend to become a part of the CSTO, we see that only the members of this alliance are really interested in protecting us."
 UKR_western_socialists_coalition: "西側政党との連合"
 UKR_western_socialists_coalition_desc: "We intend to create a coalition with pro-Western parties."
 UKR_harsh_separat_dealkill: "分離主義者の終焉"
 UKR_harsh_separat_dealkill_desc: "We are ready to liberate our territories."
 UKR_apply_eu_reforms: "親ヨーロッパ改革採用"
 UKR_apply_eu_reforms_desc: "We intend to follow the European political course."
 UKR_nato_commitment: "NATO改革"
 UKR_nato_commitment_desc: "We intend to carry out military reform in accordance with NATO standards for future membership there."
 UKR_pmr_invite_union: "トランスニストリアに統一国家提案"
 UKR_pmr_invite_union_desc: "我々はさらに進んでヨーロッパに新しい国家を創設するつもりである。それは外部勢力の影響を受けず、この国家を増大させるための適切な候補者を持っている。"
 UKR_belarus_invite: "ベラルーシに統一国家提案"
 UKR_belarus_invite_desc: "我々はさらに進んでヨーロッパに新しい国家を創設するつもりである。それは外部勢力の影響を受けず、この国家を増大させるための適切な候補者を持っている。"
 UKR_hungary_invite: "ハンガリーに統一国家提案"
 UKR_hungary_invite_desc: "我々はさらに進んでヨーロッパに新しい国家を創設するつもりである。それは外部勢力の影響を受けず、この国家を増大させるための適切な候補者を持っている。"
 UKR_moldova_invite: "モルドバに統一国家提案"
 UKR_moldova_invite_desc: "我々はさらに進んでヨーロッパに新しい国家を創設するつもりである。それは外部勢力の影響を受けず、この国家を増大させるための適切な候補者を持っている。"
 ukraine_rada.2.t: "SPUとの連合？"
 ukraine_rada.2.d: "長い間、社会党は我々の違いにもかかわらず同盟者であった。SPUメンバーの大多数はかつて我が党のメンバーであり、関係の長い歴史は連合を明白な選択肢にするが、社会党は徐々に我々から離れていき、はるかに穏健になり修正主義に浸透しているため、共通政府の下で最も急進的な政策を実施することは許されないだろう。"
 ukraine_rada.2.b: "SPUなんてくそくらえ。単独連合宣言！"
 ukraine_rada.2.a: "Let's Start Coalition Talks"
 ukraine_rada.1.t: "CPUとの連合？"
 ukraine_rada.1.d: "長い間、共産党は我々の違いにもかかわらず同盟者であった。我が党メンバーの大多数はCPUのメンバーであり、関係の長い歴史は連合を必要不可欠なものにするが、共産党は退行的な考えを提唱し、人食い的イニシアチブを支持することによって時代についていくことを望んでおらず、彼らとの連合はCPUのいくつかの急進的メンバーに権力を得ることを許すかもしれない。"
 ukraine_rada.1.b: "CPUなんてくそくらえ！"
 ukraine_rada.1.a: "Let's Start Coalition Talks"
 ukraine_kommi.1.t: "ウクライナ、核兵器を要請"
 ukraine_kommi.1.d: "An unexpected statement came from the Ukrainian government. They want to get Nuclear weapons from us in order to defend themselves from an external attack. Such a dangerous decision requires us to weigh the pros and cons."
 ukraine_kommi.1.a: "我々は彼らに核兵器を与えるだろう"
 ukraine_kommi.1.b: "我々は彼らに核兵器を与えないだろう"
 ukraine_kommi.2.t: "ロシアの核兵器"
 ukraine_kommi.2.d: "They agreed to provide us with some of the nuclear weapons."
 ukraine_kommi.2.a: "良い"
 ukraine_kommi.3.t: "ロシアの核兵器"
 ukraine_kommi.3.d: "They refused to provide us with part of the nuclear weapons."
 ukraine_kommi.3.a: "残念だ。"
 ukraine_kommi.4.t: "A New Communist State"
 ukraine_kommi.4.d: "Our revolution has succeeded. The old regime is finished here, but we cannot stand alone yet. Ukraine has offered to back our government while we get on our feet."
 ukraine_kommi.4.a: "We Accept Their Support"
 ukraine_kommi.5.t: "ウクライナ、軍事協力を提案"
 ukraine_kommi.5.d: "The Ukrainian government says it is ready to sign a number of documents on military-political cooperation between our countries."
 ukraine_kommi.5.a: "我々はウクライナとの友好のために"
 ukraine_kommi.5.b: "我々は何も署名しない"
 ukraine_kommi.6.t: "ロシアとの軍事協力"
 ukraine_kommi.6.d: "They agreed to sign agreements on military-political cooperation with us."
 ukraine_kommi.6.a: "よし"
 ukraine_kommi.7.t: "ロシアとの軍事協力"
 ukraine_kommi.7.d: "They refused to sign agreements on military-political cooperation with us."
 ukraine_kommi.7.a: "残念だ。"
 ukraine_kommi.8.t: "統一民主国家"
 ukraine_kommi.8.d: "ウクライナ政府は、我々がヨーロッパの広大さの中に単一の民主国家、一種の第三の権力中心を創設することを提案している。我々は第三勢力の何らかの夢のために独立を失うことに同意するか？"
 ukraine_kommi.8.a: "独立は虚構だ"
 ukraine_kommi.8.b: "ありえない"
 ukraine_kommi.9.t: "統一民主国家"
 ukraine_kommi.9.d: "They refused our offer! It was expected, but so pathetic on their part."
 ukraine_kommi.9.a: "彼らは理解していない"
 ukraine_kommi.10.t: "ウクライナ、保護を要請"
 ukraine_kommi.10.d: "The Ukrainian government asks us to provide them with guarantees to protect their independence. An unexpected request, but perhaps we should consider it."
 ukraine_kommi.10.a: "我々は彼らを守るだろう"
 ukraine_kommi.10.b: "ありえない"
 ukraine_kommi.11.t: "ロシアの保護保証"
 ukraine_kommi.11.d: "ロシア政府は我々に独立の保証を提供することに同意した！"
 ukraine_kommi.11.a: "良い"
 ukraine_kommi.12.t: "ロシアの保護保証"
 ukraine_kommi.12.d: "The Russian government has refused to provide us with guarantees of independence."
 ukraine_kommi.12.a: "くそっ"
 ukraine_kommi.13.t: "ウクライナとのガス契約。"
 ukraine_kommi.13.d: "ウクライナは我々のガス契約の購入価格を引き下げることを申し出てきた。その見返りに、我々の間の仲介者が排除され、それによって我々は彼らに対する影響力を増すだろう。我々は同意すべきか？"
 ukraine_kommi.13.a: "我々はこれに署名するだろう"
 ukraine_kommi.13.b: "我々はこれに興味がない。"
 ukraine_kommi.14.t: "ロシアとのガス契約。"
 ukraine_kommi.14.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.14.a: "良い"
 ukraine_kommi.15.t: "ロシアとのガス契約。"
 ukraine_kommi.15.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.15.a: "良い"
 UKR_inner_policy_spu_desc: "Finally, communist ideals have returned to Ukraine again, it's time to revive the great state."
 UKR_brotherhood_people: "人民の兄弟愛"
 UKR_social_reform: "社会改革"
 UKR_christian_communism: "キリスト教共産主義"
 UKR_inner_policy_cpu: "国内政策"
 UKR_inner_policy_cpu_desc: "Finally, socialist ideals have returned to Ukraine again, it's time to revive the great state."
 UKR_equal_rights_idea: "平等な権利"
 UKR_west_investors_idea: "西側投資家"
 UKR_our_investors_idea: "我々の投資家"
 UKR_socialist_effort: "社会主義改革"
 UKR_commies_decision_category: "ソ連の復活"
