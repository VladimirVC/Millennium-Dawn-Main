 expand_local_military_infrastructure_tt: "§YAmpliar la infraestructura militar local§! en §Y[THIS.GetName]§!\n---------\nLos militares se han puesto en contacto con el gobierno y han identificado posibles lugares para la construcción en §Y[THIS.GetName]§!. Han sugerido ampliar la infraestructura militar local para garantizar que los militares de la región reciban el apoyo adecuado en caso de conflicto en la zona."
