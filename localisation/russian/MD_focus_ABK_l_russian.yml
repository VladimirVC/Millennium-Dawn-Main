l_russian:
 abkhazia_focus: "Древо фокусов Абхазии"
 ABK_Corruption_economic: "Абхазия в новом тысячелетии"
 ABK_Corruption_economic_desc: "Наша страна встречает новое тысячелетие не в лучшем состоянии. Коррупция разъедает нашу страну, инфраструктура была разрушена после войны и так и не была восстановлена."
 ABK_jd_abk_russia: "Восстановление транспортных связей с Россией"
 ABK_jd_abk_russia_desc: "Нам необходимо восстановить транспортные пути в Россию, потому что она является нашим единственным союзником и партнером в настоящее время"
 ABK_tourism1: "Развитие туризма"
 ABK_tourism1_desc: "Пришло время начать развитие туризма в нашей стране, возможно, средства, полученные от туристов, помогут нашей экономике выстоять."
 ABK_associated_state: "Ассоциированное государство СНГ"
 ABK_associated_state_desc: "Россия готова помочь нам стать частью СНГ в качестве ассоциированного государства."
 ABK_internet_akvafon: "Первый доступ в Интернет"
 ABK_internet_akvafon_desc: "Интернет активно развивается во всем мире; настало время развивать его и в нашей республике."
 ABK_promotion_of_independence: "Продвижение независимости"
 ABK_promotion_of_independence_desc: "Мы будем продвигать независимость нашей республики всеми средствами массовой информации. Наша страна может существовать независимо."
 ABK_promotion_of_russia: "Пропаганда дружбы с Россией"
 ABK_promotion_of_russia_desc: "Россия — наш друг, брат и союзник. Мы будем активно распространять эту точку зрения через все наши средства массовой информации."
 ABK_training_in_russia: "Обучение солдат в России"
 ABK_training_in_russia_desc: "Мы отправим наших солдат в Россию на обучение для получения передового боевого опыта."
 ABK_russia_invest_industry: "Российские инвестиции в нашу промышленность"
 ABK_russia_invest_industry_desc: "Мы готовы заключить соглашение об инвестировании российских средств в нашу отрасль."
 ABK_visa_free_russia: "Безвизовый режим с Россией"
 ABK_visa_free_russia_desc: "Мы подписали соглашение об отмене визового режима между нашими странами. Мы надеемся, что это поможет нам улучшить экономическое положение."
 ABK_tourism2: "Продолжить развитие туризма"
 ABK_tourism2_desc: "Нам необходимо привлечь в страну больше туристов, поэтому мы увеличим инвестиции в туристический сектор."
 ABK_decrease_cencorship: "Ослабить цензуру"
 ABK_decrease_cencorship_desc: "Мы откажемся от строгой цензуры, существовавшей ранее."
 ABK_abkhazian_passports: "Абхазские паспорта"
 ABK_abkhazian_passports_desc: "Мы готовы ввести в действие паспорт гражданина Абхазии."
 ABK_rearms_russia_us: "Российское перевооружение"
 ABK_rearms_russia_us_desc: "Россия готова перевооружить наши войска современной техникой."
 ABK_energy_help: "Начать решать энергетические проблемы"
 ABK_energy_help_desc: "Наша страна уже давно страдает от энергетических проблем. Пришло время начать решать эту проблему."
 ABK_crypto: "Легализация криптовалют"
 ABK_crypto_desc: "Наша страна должна двигаться в ногу со временем. Криптовалюты набирают популярность, и нам нужно извлечь финансовую выгоду из этого."
 ABK_president_illness: "Болезнь президента"
 ABK_president_illness_desc: "Наш президент очень болен и не может исполнять обязанности главы государства. Пришло время сменить правительство."
 ABK_sgb: "Служба государственной безопасности (СГБ)"
 ABK_sgb_desc: "Нам необходимо укрепить нашу Службу государственной безопасности"
 ABK_internet_a_mobail: "Второй оператор"
 ABK_internet_a_mobail_desc: "A-Mobile станет вторым оператором связи в нашей республике."
 ABK_jd_abk_russia_arms: "Железнодорожные войска России"
 ABK_jd_abk_russia_arms_desc: "Россия готова выделить подразделение своих железнодорожных войск для восстановления нашей инфраструктуры."
 ABK_research_net: "Развитие интернет-сетей"
 ABK_research_net_desc: "Необходимо и дальше развивать нашу интернет-сеть."
 ABK_soo_friend: "Дружба с Южной Осетией"
 ABK_soo_friend_desc: "Мы продолжим улучшать отношения с нашими коллегами из Южной Осетии."
 ABK_artshakh_friend: "Дружба с Арцахом"
 ABK_artshakh_friend_desc: "Мы продолжим улучшать отношения с нашими коллегами из Арцаха."
 ABK_new_era: "Новая эра"
 ABK_new_era_desc: "Наша республика вступает в новую эру. Возможно, с новым президентом мы наконец-то сможем стать экономически сильной страной."
 ABK_increase_medicine: "Развитие медицины"
 ABK_increase_medicine_desc: "Необходимо инвестировать в здравоохранение нашей страны. Население сокращается, и мы должны изменить эту тенденцию."
 ABK_against_corruption: "Запуск кампании против коррупции"
 ABK_against_corruption_desc: "Мы намерены твердо и решительно искоренить коррупцию."
 ABK_increase_education: "Инвестировать в образование"
 ABK_increase_education_desc: "Качество образования для нашей молодежи снижается. Нам необходимо инвестировать в его улучшение."
 ABK_ros_neft: "Сотрудничество с Роснефтью"
 ABK_ros_neft_desc: "«Роснефть» готова помочь в разведке нефтяных месторождений на территории нашей республики."
 ABK_rus_hydro: "Рус Гидро"
 ABK_rus_hydro_desc: "Мы готовы одобрить проекты компании «РусГидро» на нашей территории."
 ABK_mvd_sgb: "Объединить СГБ и МВД"
 ABK_mvd_sgb_desc: "Настало время для всеобъемлющей реформы наших правоохранительных органов."
 ABK_let_russians_buy: "Разрешить россиянам приобретать недвижимость"
 ABK_let_russians_buy_desc: "Мы законодательно разрешим гражданам России приобретать недвижимость в нашей стране, тем самым повысив ее инвестиционную привлекательность."
 ABK_jd_abk_russia_help: "Помощь Железнодорожным войскам России"
 ABK_jd_abk_russia_help_desc: "Железнодорожные войска России готовы остаться на территории нашей республики и временно помочь нам с восстановлением."
 ABK_our_place: "Наше место в этом мире"
 ABK_our_place_desc: "Наши люди должны найти свой путь в этом мире, и мы обязательно его найдем."
 ABK_cus_create: "Создать СНГ-2"
 ABK_cus_create_desc: "Мы установим отношения с другими непризнанными государствами, находящимися в аналогичной ситуации."
 ABK_abkhazian_farmers: "Поддержка отечественных фермеров"
 ABK_abkhazian_farmers_desc: "Мы не всегда можем рассчитывать на помощь извне, поэтому поддержка отечественных фермеров должна быть нашим приоритетом"
 ABK_army: "Реформа вооруженных сил"
 ABK_fleet: "Военно-морской флот Абхазии"
 ABK_air: "Военно-воздушные силы Абхазии"
 ABK_modernize_army: "Модернизация армии"
 ABK_modernize_army_desc: "Мы не можем позволить себе ослаблять нашу армию, потому что она является гарантом нашего суверенитета."
 ABK_network_warfare_desc: "Сетецентрическая война — это военная доктрина, которая стремится преобразовать информационное преимущество в конкурентное превосходство за счет надежной сетевой организации географически рассредоточенных сил. Принятие этой доктрины позволит модернизировать способы обмена разведывательной информацией на поле боя и ее использования нашими вооруженными силами."
 ABK_decentralized_warfare_desc: "Война четвертого поколения (ВЧП) — это конфликт, характеризующийся размыванием границ между войной и политикой, комбатантами и гражданским населением. Внедрение этой децентрализованной формы ведения войны позволит нашим вооруженным силам действовать с большей гибкостью и инициативой."
 ABK_president_illness2: "Возвращение коммунизма"
 ABK_president_illness2_desc: "Мы снова полностью встанем под красные знамена!"
 ABK_china_help: "Китайские инвестиции"
 ABK_china_help_desc: "Нам удалось привлечь китайские инвестиции для развития нашей страны."
 ABK_china_help_jd: "Китайские инвестиции в ЖД"
 ABK_china_help_jd_desc: "Китайские компании готовы восстанавливать железнодорожные пути в нашей республике в рамках своей более широкой стратегии."
 ABK_returm_marxism: "Возвращение марксизма в школы"
 ABK_returm_marxism_desc: "Старая советская литература снова пригодится нам, пора воспитывать новые поколения коммунистов!"
 ABK_increase_cencorship: "Усилить цензуру"
 ABK_increase_cencorship_desc: "Необходимо заставить замолчать всех врагов народа!"
 ABK_our_red_path: "Красный путь - единственно верный"
 ABK_our_red_path_desc: "Путь коммунизма и социализма — единственный верный путь для нашей страны."
 ABK_one_party: "Одна страна - одна партия"
 ABK_one_party_desc: "Нашей стране не нужны десятки разных партий. Одной нам вполне достаточно."
 ABK_china_invest_tech: "Инвестиции Китая в технологический сектор"
 ABK_china_invest_tech_desc: "Китайские компании готовы финансировать наш технический сектор."
 ABK_defend_our_home: "Защита нашего дома"
 ABK_defend_our_home_desc: "Наша страна постоянно находится под угрозой. Давайте защитим её."
 ABK_defend_our_home2: "Оборонительные сооружения"
 ABK_defend_our_home2_desc: "Необходимо не только воодушевлять народ, но и быть физически готовым к защите наших границ."
 ABK_china_invest_mesta: "Продолжение китайских инвестиций"
 ABK_china_invest_mesta_desc: "Китайские компании получили положительные результаты от предыдущих инвестиций и готовы продолжить в том же духе."
 ABK_atheism: "Атеизм в каждом доме"
 ABK_atheism_desc: "Пропаганда Маркса вернет наш народ на славный путь атеизма!"
 ABK_mil_prop: "Военная пропаганда"
 ABK_mil_prop_desc: "Наша страна не сможет защитить себя, если наш народ не объединится и не начнет бороться."
 ABK_empower_sgb: "Усилить финансирование служб безопасности"
 ABK_empower_sgb_desc: "Государство должно быть надежно защищено изнутри."
 ABK_mobilise_masses: "Массовая мобилизация"
 ABK_mobilise_masses_desc: "Вставайте, жители Абхазии! Сражайтесь насмерть!"
 ABK_nep: "Возрождение новой экономической политики"
 ABK_nep_desc: "Старые методы будут снова использованы."
 ABK_fiveka: "Первый пятилетний план"
 ABK_fiveka_desc: "Настало время вернуться к практике пятилетних планов."
 ABK_free_education: "Бесплатное образование"
 ABK_free_education_desc: "Каждый абхаз должен получить образование, где бы он ни находился!"
 ABK_collectivism: "Коллективизм"
 ABK_collectivism_desc: "Давайте восстановим единство абхазского народа посредством коллективизма."
 ABK_sup_work: "Мы поддержим рабочих"
 ABK_sup_work_desc: "Каждый абхазский рабочий будет защищен государством."
 ABK_people_militia: "Народное ополчение"
 ABK_people_militia_desc: "Каждый гражданин должен защищать страну!"
 ABK_rel_quest: "Вопрос о религии"
 ABK_rel_quest_desc: "Что мы должны делать в таком деликатном вопросе?"
 ABK_rel_commu: "Религиозный коммунизм"
 ABK_rel_commu_desc: "Сочетаются ли они?"
 ABK_farmer_collab: "Поддержка фермеров"
 ABK_farmer_collab_desc: "Сельское хозяйство — это жизненная сила нашей республики."
 ABK_president_illness3: "Возвращение монархии"
 ABK_president_illness3_desc: "Все эти игры в демократию привели нашу страну к краху. Только настоящая монархия спасет нас."
 ABK_ally_with_mafia: "Союз с мафией"
 ABK_ally_with_mafia_desc: "Кланы Абхазии давно разделяют страну и лишь негативно влияют на ее развитие. Под знаменем монархии мы заставим их работать на благо нашей страны."
 ABK_nati_ideas: "Националистические идеи"
 ABK_nati_ideas_desc: "Укрепление нашего общества необходимо как никогда. Для дополнительной уверенности мы будем укреплять его националистическими идеями."
 ABK_start_prepare_for_war: "Подготовка к войне"
 ABK_start_prepare_for_war_desc: "Наш сосед, Грузия, не дарует нам мира, поэтому мы должны всеми силами подготовиться к грядущей войне."
 ABK_abkhazian_kingdom: "Наследие Абхазского царства"
 ABK_abkhazian_kingdom_desc: "Учебник истории — лучший инструмент пропаганды. Пришло время напомнить народу нашей страны, что когда-то на этих землях стояло Абхазское царство."
 ABK_miiltia: "Абхазское ополчение"
 ABK_miiltia_desc: "Пришло время призвать ополчение. Час войны скоро наступит."
 ABK_militarism: "Время милитаризма"
 ABK_militarism_desc: "Милитаризм нам так же необходим, как воздух."
 ABK_militari_industry: "Военная промышленность"
 ABK_militari_industry_desc: "Нам нужно много оружия"
 ABK_finish_opposition: "Покончить с оппозицией"
 ABK_finish_opposition_desc: "Оппозиция долгое время препятствовала развитию нашей страны. Теперь, когда мы отказались от демократии, настало время устранить всех оппонентов."
 ABK_church_help: "Помощь церкви"
 ABK_church_help_desc: "Религия — важная часть нашей жизни. Пусть она благословит нас в нашей праведной борьбе."
 ABK_cis_2_military: "СНГ-2 как военный альянс"
 ABK_cis_2_military_desc: "Пришло время превратить СНГ-2 в нечто большее"
 ABK_ally_with_south_ossetia: "Создать военный союз с Южной Осетией"
 ABK_ally_with_south_ossetia_desc: "В грядущей войне мы должны сражаться вместе."
 ABK_georgia_attack: "Начать войну с Грузией"
 ABK_georgia_attack_desc: "Настало время великой битвы"
 ABK_arm_friend: "Дружба с Арменией"
 ABK_arm_friend_desc: "Пришло время установить дружеские связи с Арменией"
 ABK_arm_battalion: "Возродить батальон Баграмяна"
 ABK_arm_battalion_desc: "Пришло время возродить батальон «Баграмян», символ нашей дружбы с Арменией в борьбе против Грузии."
 ABK_abkhazvozvrashenstroy: "Учредить фонд Абхазвозвращенстрой"
 ABK_abkhazvozvrashenstroy_desc: "Этот фонд станет краеугольным камнем новой абхазской экономики. С его помощью мы сможем привлекать инвестиции со всего мира."
 ABK_parli_dead: "Сделка с парламентом"
 ABK_parli_dead_desc: "Пришло время избавиться от этого пережитка демократии."
 ABK_dictatorship: "Диктаторский монарх"
 ABK_dictatorship_desc: "Только твердая рука монарха спасет нашу страну."
 ABK_sov_heast: "Дружба с Россией"
 ABK_sov_heast_desc: "С такой Россией мы готовы дружить"
 ABK_invest_from_eng: "Инвестиции из Англии"
 ABK_invest_from_eng_desc: "Мы надеемся на инвестиции со стороны Англии, чья роль в трагической судьбе народов Северо-Западного Кавказа, включая абхазов, при лорде Палмерстоне накладывает на нее особую ответственность перед нами."
 ABK_invest_from_tur: "Инвестиции из Турции"
 ABK_invest_from_tur_desc: "Мы надеемся на инвестиции из Турции, которая так или иначе была причастна к трагедии махаджиритизма. Ее участие в деятельности Фонда будет означать участие в будущей судьбе абхазского народа."
 ABK_invest_from_chi: "Инвестиции из Китая"
 ABK_invest_from_chi_desc: "Необходимо привлекать инвестиции из Китая. КНР, как одна из великих держав и постоянный член Совета Безопасности ООН, является одной из наименее восприимчивых к оппортунистическому давлению внешних факторов."
 ABK_repatriation: "Программа репатриации"
 ABK_repatriation_desc: "Мы готовы запустить программу по возвращению этнических абхазов на родину."
 ABK_tourism_sector: "Капитальные вложения в сектор туризма"
 ABK_tourism_sector_desc: "Стабильный приток средств позволит нам увеличить инвестиции в туристический сектор."
 ABK_fight_with_narco: "Борьба с наркоманией"
 ABK_fight_with_narco_desc: "Необходимо бороться с распространением наркотиков в нашей стране."
 ABK_declare_kingdom: "Объявить о создании Абхазского королевства"
 ABK_declare_kingdom_desc: "Пришло время вернуть нашему народу былое величие."
 ABK_korea_workers: "Привлечь северокорейских рабочих"
 ABK_korea_workers_desc: "Мы готовы привлечь рабочих из Северной Кореи для содействия развитию нашей страны."
 ABK_internal_state: "Внутренняя политика"
 ABK_internal_state_desc: "Необходимо также решить внутренние проблемы государства."
 ABK_sports_development: "Развитие спорта"
 ABK_sports_development_desc: "В здоровом теле - здоровый дух!"
 ABK_education_development: "Развитие образования"
 ABK_education_development_desc: "Необходимо, чтобы наши дети выросли грамотными, чтобы мы могли передать им нашу страну."
 ABK_wine: "Развитие винодельческой промышленности"
 ABK_wine_desc: "Вино - это наше все"
 ABK_bul_bondex: "Дружба с Болгарией"
 ABK_bul_bondex_desc: "Наша правящая династия давно присутствует в Болгарии и сумела там завоевать влияние. Дружба с этой страной, несомненно, принесет нам пользу."
 ABK_china_sosiski: "Закупка вооружения в Китае"
 ABK_china_sosiski_desc: "Нас интересуют некоторые образцы оружия"
 ABK_eng_sosiski: "Закупка вооружения в Англии"
