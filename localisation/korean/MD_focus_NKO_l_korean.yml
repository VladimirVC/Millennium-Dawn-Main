 NKO_china_economic_assistant: "중국 경제 원조"
 NKO_china_economic_assistant_desc: "중국의 대북 경제 원조는 중국 전체 대외 원조의 약 절반을 차지합니다. 베이징은 평양에 직접 원조를 제공함으로써 유엔을 우회할 수 있습니다. 1996년과 1998년 사이의 극심한 식량 부족 기간 동안, 베이징은 공화국에 조건 없는 식량 원조를 제공했습니다."
