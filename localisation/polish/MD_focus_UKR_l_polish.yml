 ukraine_parliament.30.t: "Kilka mandatów w parlamencie jest sprzecznych z naszym rządem!"
 ukraine_parliament.30.d: "Część parlamentarzystów wystąpiła przeciwko naszemu rządowi, co doprowadziło do spadku naszego poparcia w Zgromadzeniu."
 ukraine_parliament.30.a: "Zdarza się"
 ukraine_parliament.30.b: "Może ich kieszenie były trochę puste?"
 ukraine_parliament.31.t: "Kilka mandatów w parlamencie zaczęło nas wspierać!"
 ukraine_parliament.31.d: "Część parlamentarzystów zaczęła chwalić nasze ostatnie sukcesy, co doprowadziło do wzrostu poparcia w Zgromadzeniu."
 ukraine_parliament.31.a: "Świetnie"
 ukraine_parliament.32.t: "Parlament nalega na większe wsparcie dla mieszkańców!"
 ukraine_parliament.32.d: "Parlament przeznaczył duży budżet mieszkańcom całego kraju, a nasza administracja dowiedziała się o tym, a niektórzy członkowie gabinetu wierzyli, że pieniądze można przeznaczyć gdzie indziej w celu lepszego ich wykorzystania."
 ukraine_parliament.32.a: "Pieniądze są dla mieszkańców!"
 ukraine_parliament.32.b: "Tak, z pewnością można go wykorzystać gdzie indziej"
 ukraine_parliament.33.t: "Parlament kwestionuje naszą administrację"
 ukraine_parliament.33.d: "Kilku członków parlamentu skrytykowało ostatnio naszą administrację za „niezaspokojenie ludzi [ROOT.GetAdjective]”. W parlamencie doszło do wielu walk pomiędzy mandatami prorządowymi a opozycyjnymi, i doszło do tego, że musimy wkroczyć i udzielić odpowiedzi."
 ukraine_parliament.33.a: "Niech myślą, co chcą"
 ukraine_parliament.33.b: "Przygotuj właściwą odpowiedź"
 ukraine_parliament.34.t: "Parlament uchwala projekt zwiększenia wydatków na opiekę zdrowotną"
 ukraine_parliament.34.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to medical spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.34.a: "Parlament ma słuszny pomysł"
 ukraine_parliament.34.b: "Nie, nie pozwolimy, aby ten wniosek przeszedł"
 ukraine_parliament.35.t: "Sejm przyjął wniosek o podwyższenie emerytur"
 ukraine_parliament.35.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to welfare spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.35.a: "Parlament ma słuszny pomysł"
 ukraine_parliament.35.b: "Nie, nie pozwolimy, aby ten wniosek przeszedł"
 ukraine_parliament.36.t: "Parlament uchwala wniosek o zwiększenie wydatków na policję"
 ukraine_parliament.36.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to police spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.36.a: "Parlament ma słuszny pomysł"
 ukraine_parliament.36.b: "Nie, nie pozwolimy, aby ten wniosek przeszedł"
 ukraine_parliament.37.t: "Parlament uchwala projekt zwiększenia wydatków na edukację"
 ukraine_parliament.37.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to education spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.37.a: "Parlament ma słuszny pomysł"
 ukraine_parliament.37.b: "Nie, nie pozwolimy, aby ten wniosek przeszedł"
 ukraine_parliament.38.t: "Parlament uchwala wniosek o zwiększenie wydatków na wojsko"
 ukraine_parliament.38.d: "The Parliament has recently passed a motion that would allocate a larger portion of our budget to military spending. Some members of our cabinet oppose this, as they think that it would be disastrous for our economy, and government."
 ukraine_parliament.38.a: "Parlament ma słuszny pomysł"
 ukraine_parliament.38.b: "Nie, nie pozwolimy, aby ten wniosek przeszedł"
 ukr_sabotage.1.t: "Ukraina zaatakowała nasze zapasy"
 ukr_sabotage.1.d: "In a recent drone attack, Ukraine struck a warehouse holding some old heavy equipment."
 ukr_sabotage.1.a: "Cholera"
 ukr_sabotage.2.t: "Ukraina zaatakowała nasze zapasy"
 ukr_sabotage.2.d: "In a recent drone attack, Ukraine struck a warehouse holding some old light equipment."
 ukr_sabotage.2.a: "Cholera"
 ukr_sabotage.3.t: "Ukraina zaatakowała naszą produkcję wojskową"
 ukr_sabotage.3.d: "In a recent drone attack, Ukraine struck one of our manufacturers, and we have suffered temporary damage."
 ukr_sabotage.3.a: "Zapłacą za to."
 UKR_our_ukraine_start: "Nasza Ukraina"
 UKR_our_ukraine_start_desc: "Czas uporządkować kraj i wprowadzić liberalne reformy. Dla nas ludzie są na pierwszym miejscu!"
 UKR_our_ukraine_secretariat: "Sekretariat Prezydenta Ukrainy"
 UKR_our_ukraine_secretariat_desc: "Sekretariat pełni kluczową rolę w zarządzaniu funkcjami administracyjnymi i organizacyjnymi związanymi z działalnością Prezydenta. Głównym celem utworzenia Sekretariatu Prezydenta Ukrainy jest zapewnienie przestrzegania konstytucyjnych uprawnień Prezydenta i skutecznego wykonywania jego obowiązków."
 UKR_our_ukraine_secretariat_reduction: "Redukcja personelu sekretariatu"
 UKR_our_ukraine_secretariat_reduction_desc: "Aby zoptymalizować pracę agencji rządowych i zmniejszyć koszty budżetowe, należy zmniejszyć liczbę pracowników sekretariatów."
 UKR_our_ukraine_decentralization: "Decentralizacja"
 UKR_our_ukraine_decentralization_desc: "Musimy zwiększyć samorządność w naszym kraju."
 UKR_our_ukraine_wto: "Poproś o pomoc w przystąpieniu do WTO"
 UKR_our_ukraine_wto_desc: "Jesteśmy gotowi zostać członkami WTO i potrzebujemy w tym wsparcia."
 UKR_our_ukraine_yanukovich_go_home: "Zwolnić Janukowycza"
 UKR_our_ukraine_yanukovich_go_home_desc: "Janukowycz jako premier pokazał się okropnie, więc go odwołacie i mianujecie nowego premiera."
 UKR_our_ukraine_timoha: "Biuro Tymoszenko"
 UKR_our_ukraine_timoha_desc: "Do naszego rządu dołączyła słynna Julia Tymoszenko, zobaczymy, co wniesie do naszego państwa."
 UKR_our_ukraine_aviation_reform: "Reforma przemysłu lotniczego"
 UKR_our_ukraine_aviation_reform_desc: "Przemysł lotniczy jest dla naszego kraju bardzo ważny i będziemy dążyć do jego ożywienia."
 UKR_our_ukraine_help_western: "Uzyskaj wsparcie Lwowa"
 UKR_our_ukraine_help_western_desc: "We will restore the supply of hot and cold water in Lviv, thereby enlisting the support of the residents of this city and possibly the region."
 UKR_our_ukraine_cheap_gas_negotiate: "Negocjacje w sprawie obniżenia cen gazu"
 UKR_our_ukraine_cheap_gas_negotiate_desc: "We will try to negotiate with Moscow on lowering energy prices."
 UKR_our_ukraine_service_life: "Skróć żywotność"
 UKR_our_ukraine_service_life_desc: "Armia ukraińska potrzebuje modernizacji. Pierwszą naszą reformą w tym zakresie będzie skrócenie stażu służby w wojsku z dwóch do jednego roku! W ten sposób poborowi stracą mniej czasu na służbę."
 UKR_our_ukraine_nato_eu: "Wspieraj integrację Ukrainy z NATO i UE"
 UKR_our_ukraine_nato_eu_desc: "Zacznijmy bardziej postępową integrację z NATO i UE. Jest to konieczne dla bezpieczeństwa militarnego i ekonomicznego naszego wspaniałego kraju."
 UKR_our_ukraine_fire_corrupt: "Zwolnij Skorumpowanego"
 UKR_our_ukraine_fire_corrupt_desc: "W naszym rządzie są skorumpowani ludzie i zwolnimy ich! W naszym kraju nie będzie miejsca na korupcję!!!"
 UKR_our_ukraine_form_new_government: "Uformuj nowy rząd"
 UKR_our_ukraine_form_new_government_desc: "Teraz, kiedy zwolniliśmy wszystkich, którzy okradli nasz kraj, możemy utworzyć nowy, uczciwy i sprawiedliwy rząd."
 UKR_our_ukraine_fight_corruption: "Walka z korupcją"
 UKR_our_ukraine_fight_corruption_desc: "Korupcja jest głównym wrogiem naszego kraju, będziemy z nią ostro walczyć!"
 UKR_our_ukraine_alternative_energy_sources: "Alternatywne źródła energii"
 UKR_our_ukraine_alternative_energy_sources_desc: "Rozwój alternatywnych źródeł energii pomoże nam zmniejszyć naszą zależność od jej importu."
 UKR_our_ukraine_crush_oligarchs: "Ograniczanie wpływów oligarchów"
 UKR_our_ukraine_crush_oligarchs_desc: "Oligarchia jest wrogiem numer dwa w naszym kraju. Mogą wpływać na nasz rząd, omijając przepisy. Aby tego uniknąć, ograniczymy ich wpływy i spróbujemy wypędzić ich z naszego kraju."
 UKR_our_ukraine_increase_media_freedom: "Zwiększ wolność mediów"
 UKR_our_ukraine_increase_media_freedom_desc: "Nasze media były ograniczane przez bardzo długi czas, a teraz, za naszych rządów, będą bardziej wolne i niezależne niż kiedykolwiek!"
 UKR_our_ukraine_release_political_prisoners: "Uwolnić więźniów politycznych"
 UKR_our_ukraine_release_political_prisoners_desc: "Za poprzedniego rządu wielu polityków opozycji było więzionych. Dajmy im wolność!"
 UKR_our_ukraine_internet_freedom: "Wolność Internetu"
 UKR_our_ukraine_internet_freedom_desc: "Wolność Internetu oznacza, że ​​obywatele mają prawo do swobodnego dostępu do informacji, wolności wypowiedzi i prywatności w komunikacji internetowej. Zadbajmy o ochronę tych praw i wolności."
 UKR_our_ukraine_provide_housing: "Zapewnij obywatelom Ukrainy mieszkanie"
 UKR_our_ukraine_provide_housing_desc: "It is necessary to provide housing for our citizens, for this we will carry out appropriate reforms."
 UKR_our_ukraine_health_insurance_law: "Ustawa o ubezpieczeniu zdrowotnym"
 UKR_our_ukraine_health_insurance_law_desc: "We will adopt a law on health insurance, which will encourage the population to actively apply to medical institutions and increase the level of health of our citizens."
 UKR_our_ukraine_curriculum_modernization: "Modernizacja programów nauczania"
 UKR_our_ukraine_curriculum_modernization_desc: "We will reform the educational program in our schools to improve the education of the younger generation."
 UKR_our_ukraine_diversification_of_gas_supply_sources: "Dywersyfikacja źródeł dostaw gazu"
 UKR_our_ukraine_diversification_of_gas_supply_sources_desc: "We will actively diversify our resource assets so as not to be dependent on a single supplier."
 UKR_our_ukraine_cost_reduction: "Redukcja wydatków budżetowych"
 UKR_our_ukraine_cost_reduction_desc: "We will make budget cuts to improve the state of our budget."
 UKR_our_ukraine_deregulation_of_business_environment: "Deregulacja otoczenia biznesowego"
 UKR_our_ukraine_deregulation_of_business_environment_desc: "Nasz kraj musi zmniejszyć biurokrację i zmniejszyć bariery administracyjne dla przedsiębiorców."
 UKR_our_ukraine_attracting_investments: "Przyciąganie inwestycji"
 UKR_our_ukraine_attracting_investments_desc: "Our country is open for investment and we are ready to attract potential investors."
 UKR_our_ukraine_beginning_decommunization_policy: "Początek polityki dekomunizacyjnej"
 UKR_our_ukraine_beginning_decommunization_policy_desc: "W 1991 roku uzyskaliśmy niepodległość spod ucisku sowieckiego. Upamiętnijmy to i rozpocznijmy politykę dekomunizacji w całym kraju! Wpływy komunistyczne muszą zostać stłumione tu i teraz."
 UKR_our_ukraine_economic_liberalism: "Liberalizm gospodarczy"
 UKR_our_ukraine_economic_liberalism_desc: "Liberalizm gospodarczy jest obowiązkowy, jeśli chcemy, aby gospodarka stała się bardziej wydajna, dlatego musimy go przyjąć."
 UKR_our_ukraine_parliamentary_republic: "Wzmocnienie uprawnień parlamentu"
 UKR_our_ukraine_parliamentary_republic_desc: "Wzmocnienie uprawnień parlamentu sprzyja zwiększeniu reprezentatywności rządu. Parlament jest organem wybieranym przez obywateli i dlatego powinien mieć większy wpływ na proces decyzyjny. Przyczynia się to do większego włączenia opinii i interesów obywateli w proces polityczny."
 UKR_our_ukraine_president_republic: "Wzmocnienie uprawnień Prezydenta"
 UKR_our_ukraine_president_republic_desc: "The first important argument in favor of strengthening presidential powers is to ensure a more effective and rapid response to crisis situations. In a world saturated with global challenges such as economic crises, counterterrorism, and pandemics, the president must have sufficient authority to act quickly and decisively.\n\nLimited authority can lead to bureaucratic delays and ineffective decisions."
 UKR_our_ukraine_democratic_constitution: "Nowa Konstytucja Demokratyczna"
 UKR_our_ukraine_democratic_constitution_desc: "We are ready to reform our constitution in order to bring true democracy in our country closer."
 UKR_our_ukraine_recognition_holodomor: "Rozpoznanie Hołodomoru"
 UKR_our_ukraine_recognition_holodomor_desc: "Władza radziecka popełniła z nami, z Ukraińcami, najstraszliwszą zbrodnię XX wieku. Przyczyną tej straszliwej klęski głodu, Wielkiego Głodu, była kolektywizacja rolnictwa i polityka przemocy państwa prowadzona przez reżim komunistyczny ZSRR."
 UKR_our_ukraine_ukrainian_institute: "Ukraiński Instytut Pamięci Narodowej"
 UKR_our_ukraine_ukrainian_institute_desc: "The Ukrainian Institute of National Memory is a central body of executive power for realization of state policy in the sphere of restoration and preservation of national memory. It will be established to recreate a fair history of the Ukrainian nation and to form and implement state policy in this direction.\n\nWe will also immortalize the memory of the victims of political repressions and famines on the territory of our country."
 UKR_our_ukraine_secretariat_of_president_reduction: "Zmniejszony Sekretariat Prezydenta Ukrainy"
 UKR_ukrainian_libertarianism: "Ukraiński libertarianizm"
 UKR_ukrainian_libertarianism_desc: "It is time for Ukraine to enter the era of libertarianism! Let's liberate the country from the shackles of capitalists and communists."
 UKR_full_deregulation: "Pełna deregulacja"
 UKR_full_deregulation_desc: "We will begin the process of complete deregulation, and government influence will decrease."
 UKR_decrease_role_of_government: "Zmniejszyć władzę rządu"
 UKR_decrease_role_of_government_desc: "The state will play a minimal role in our beautiful country."
 UKR_free_the_common_folk: "Prawdziwie wolni ludzie"
 UKR_free_the_common_folk_desc: "Nasi ludzie wreszcie odetchną głęboko i poczują się wolni!"
 UKR_offshore_country: "Kraj spółek offshore"
 UKR_offshore_country_desc: "We welcome the creation of many offshore zones in our country."
 UKR_true_servant_of_people: "Prawdziwy Sługa Ludu"
 UKR_true_servant_of_people_desc: "Wreszcie Ukraina stała się najbardziej wolnym krajem na świecie!"
 UKR_our_ukraine_freedom_of_social_media_idea: "Wolność mediów społecznościowych"
 UKR_our_ukraine_freedom_of_social_media_idea_desc: "The media should be free and will be so. We will support the prohibition of censorship."
 UKR_our_ukraine_secretariat_of_president: "Sekretariat Prezydenta Ukrainy"
 UKR_our_ukraine_ukrainian_institute_of_national_memory: "Ukraiński Instytut Pamięci Narodowej"
 UKR_our_ukraine_ukrainian_institute_of_national_memory_desc: "Every Ukrainian should remember the sacrifices of their people that he made in the past. The Institute of National Memory will help us form generations of those who will remember the heroism of Ukrainians."
 UKR_our_ukraine_fight_with_corruption_idea: "Walka z korupcją"
 UKR_our_ukraine_education_reform_idea: "Konsekwencje reformy edukacji"
 UKR_our_ukraine_health_reform_idea: "Konsekwencje reformy służby zdrowia"
 UKR_our_ukraine_social_reform_idea: "Konsekwencje reformy mieszkaniowej"
 UKR_our_ukraine_air_industry_idea: "Reforma przemysłu lotniczego"
 UKR_liberals_modifier: "Ukraiński liberalizm"
 UKR_liberals_modifier_desc: "Ukraine has finally embarked on the path of liberalism, now we have removed the shackles of authoritarian rule."
 ukraine_our_ukraine.1.t: "Sekretariat Prezydenta Ukrainy"
 ukraine_our_ukraine.1.d: "Administracja Prezydenta zachowała się okropnie za czasów Juszczenki, dlatego przekształcamy ją w Sekretariat Prezydenta Ukrainy, aby zapewnić większą stabilność polityczną."
 ukraine_our_ukraine.1.a: "Czas na zmianę."
 ukraine_our_ukraine.2.t: "Ukraiński Instytut Pamięci Narodowej"
 ukraine_our_ukraine.2.d: "The Institute of National Memory has started its work, now we are ready to return Ukraine to its true history!"
 ukraine_our_ukraine.2.a: "Hurray!"
 ukraine_our_ukraine.3.t: "Konstytucja Demokratyczna"
 ukraine_our_ukraine.3.d: "We will introduce amendments to the constitution that will make our country more democratic!"
 ukraine_our_ukraine.3.a: "Hurray!"
 ukraine_our_ukraine.4.t: "Ukraina oferuje naszemu krajowi inwestycje."
 ukraine_our_ukraine.4.d: "Rząd Ukrainy zapowiedział uruchomienie programu przyciągania inwestorów zagranicznych i przesłał naszemu rządowi ofertę inwestycji w ich gospodarkę."
 ukraine_our_ukraine.4.a: "Inwestujmy!"
 ukraine_our_ukraine.4.b: "Nie jesteśmy tym zainteresowani."
 ukraine_our_ukraine.5.t: "Inwestycje na Ukrainie."
 ukraine_our_ukraine.5.d: "Zgodzili się zainwestować w naszym kraju."
 ukraine_our_ukraine.5.a: "Dobry."
 ukraine_our_ukraine.6.t: "Inwestycje na Ukrainie."
 ukraine_our_ukraine.6.d: "Odrzucili naszą ofertę zainwestowania w naszym kraju."
 ukraine_our_ukraine.6.a: "Smutny"
 ukraine_our_ukraine.7.t: "Kontrakt gazowy z Ukrainą."
 ukraine_our_ukraine.7.d: "Ukraina zaproponowała nam obniżenie cen zakupu naszego kontraktu gazowego, w zamian pośrednik między nami zostanie wyeliminowany, dzięki czemu będziemy mieli na niego większy wpływ, czy się zgodzimy?"
 ukraine_our_ukraine.7.a: "Podpiszemy to"
 ukraine_our_ukraine.7.b: "Nie jesteśmy tym zainteresowani."
 ukraine_our_ukraine.8.t: "Kontrakt gazowy z Rosją."
 ukraine_our_ukraine.8.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.8.a: "Dobry."
 ukraine_our_ukraine.9.t: "Kontrakt gazowy z Rosją."
 ukraine_our_ukraine.9.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.9.a: "Dobry."
 UKR_zelensky_western: "Droga na Zachód"
 UKR_zelensky_western_desc: "We will continue our political course with a desire to the west."
 UKR_befriend_the_west: "Przyjaźń z Zachodem"
 UKR_befriend_the_west_desc: "We will continue our policy of improving relations with Western countries, and it is in them that we see our partners and allies."
 UKR_avakov_befriend: "Przyjaźń z Awakowem"
 UKR_avakov_befriend_desc: "Arsen Avakov turned out to be the most persistent minister of all that we have seen, he was able to survive many governments, besides, he supports the Azov battalion financially, if we strengthen ties with him, we will be able to increase the Azov in numbers."
 UKR_land_reform_zelya: "Reforma rolna"
 UKR_land_reform_zelya_desc: "We will continue the Land reform, which was started a long time ago."
 UKR_fasten_nato_join: "Chęć przystąpienia do NATO"
 UKR_fasten_nato_join_desc: "NATO is our finish line, what we have been striving for from the very beginning."
 UKR_peaceful_negotiation_don: "Rozwiązać pokojowo kwestię Donbasu"
 UKR_peaceful_negotiation_don_desc: "Jesteśmy gotowi na ustępstwa dla Donbasu i ostatecznie zakończyć ten niekończący się konflikt."
 UKR_keep_status_quo: "Utrzymaj status quo"
 UKR_keep_status_quo_desc: "We are not ready to resolve this issue peacefully, we will go the same way as before."
 UKR_next_azov_created_tt: "Nowa §Brygada Jazowa§! zostanie stworzony"
 UKR_our_influence_helps_tt: "§CPonieważ mamy wpływ na Parlament, jesteśmy w stanie uchwalić tę ustawę z większym prawdopodobieństwem powodzenia, pomimo mniejszej liczby mandatów na naszą korzyść§!"
 UKR_lose_some_seats_TT: "§RLamy§! kilka miejsc w §HParlamencie§!"
 UKR_gain_some_seats_TT: "§GZdobyjemy§! kilka miejsc w §HParlamencie§!"
 UKR_is_pro_west_TT: "Jest zachodnią partią sprzymierzoną"
 UKR_is_pro_east_TT: "Jest rosyjską partią sprzymierzoną"
 UKR_is_neutral_TT: "Jest stroną niestowarzyszoną z żadnymi obcymi narodami"
 UKR_influence_parliament_TT: "Zacznie §pWpływ§! §HParlament§!"
 UKR_puppet_parliament_TT: "Will §OPukiełka§! §Hparlament§!\n\n§RNIE BĘDZIEMY KONIECZNIE PRZECHODZIĆ PRZEZ PARLAMENT W CELU ZMIANY PRAWA§!"
 UKR_dissolve_parliament_TT: "Czy §ROrozwiąże§! §Hparlament§!\n\n§RNIE BĘDZIEMY KONIECZNIE PRZECHODZIĆ PRZEZ PARLAMENT W CELU ZMIANY PRAWA§!"
 UKR_zelenskiy_socialist_TT: "§YZełenski§! zmieni swój §BOutlook§!!"
 UKR_zelenskiy_formed_TT: "£ukr_sługa_ludu §YSługa Narodu§! Impreza zostanie utworzona!"
 UKR_zelenskiy_here_TT: "£ukr_sługa_ludu §YSługa Narodu§! Impreza musi zostać utworzona!"
 ukr_zelenskiy.1.t: "Zaskakujące ogłoszenie"
 ukr_zelenskiy.1.d: "Dziś Wołodymyr Zełenski wydał zaskakujące oświadczenie. W Oświadczeniu tym oświadczył, że wyrzekł się idei libertarianizmu i „na żądanie większości” przyjął idee socjalizmu. Prezydent zapowiedział także, że Ukraina zacieśni więzi z Zachodem i będzie zabiegać o przyciągnięcie zachodnich inwestorów."
 ukr_zelenskiy.1.a: "Zaskakujący rozwój"
 ukr_zelenskiy.2.t: "Sluha Narodu"
 ukr_zelenskiy.2.d: "Nieoczekiwana wiadomość wstrząsnęła całą Ukrainą. Dziś w wyniku zjazdu powstała partia Sługa Narodu, której nazwa wzięła się od popularnego filmu. Wielu uważa, że ​​partia ta powstała w ramach kampanii PR filmu, inni twierdzą, że partia ta powstała w celu promowania słynnego komika Wołodymyra Zełenskiego jako kandydata na prezydenta. Choć sam Zełenski zaprzecza swemu zaangażowaniu, jego wymijające odpowiedzi mogą stać się podstawą do dalszych spekulacji."
 ukr_zelenskiy.2.a: "Ciekawy"
 UKR_reform_programm: "Reforma programu"
 UKR_reform_programm_desc: "Rozpoczniemy serię reform, które mają doprowadzić nasze państwo do wzrostu gospodarczego i wyprowadzić je z kryzysu po rozpadzie ZSRR."
 UKR_reform_national_guard: "Rozwiązać Gwardię Narodową"
 UKR_reform_national_guard_desc: "Czas na reformy. Czas rozwiązać Gwardię Narodową i zreformować ją w bardziej skuteczną strukturę: Wojska Wewnętrzne."
 UKR_reform_vsu: "Nowa doktryna wojskowa"
 UKR_reform_vsu_desc: "Nasza armia musi się zmienić i udoskonalić; w przeciwnym razie nie będziemy gotowi na wojnę z wrogiem. Nowa doktryna wzmacnia również naszą współpracę z NATO."
 UKR_check_and_balances: "System kontroli i równowagi"
 UKR_check_and_balances_desc: "Nasz kraj znajduje się obecnie w niepewnej sytuacji politycznej, musimy znaleźć równowagę w sferze politycznej, aby zapobiec katastrofie."
 UKR_yushenko_cabinet: "Gabinet Juszczenki"
 UKR_yushenko_cabinet_desc: "Wiktor Juszczenko to już stary znajomy, który dobrze sprawdził się w swoim doświadczeniu menedżerskim. Obiecane przez niego rezultaty jego działań powinny pobudzić wzrost komponentu gospodarczego naszego kraju."
 UKR_welfare_reform: "Reformy na rzecz opieki społecznej"
 UKR_welfare_reform_desc: "Od lat 90. opieka zdrowotna jest w opłakanym stanie; konieczne jest rozpoczęcie jego reformowania."
 UKR_kosuik: "Manufaktura Chleba Kosiuk"
 UKR_kosuik_desc: "Krajowy przemysł motoryzacyjny zaczyna swoje ożywienie, a motorem tego procesu będą prywatni przedsiębiorcy. Jeden z nich, Jurij Kosiuk, planuje otworzyć własne fabryki produkujące produkty rolne."
 UKR_azovstal_private: "Prywatyzacja Azovstalu"
 UKR_azovstal_private_desc: "We will continue to work on giving Azovstal to private hands since we cannot financially support such a huge enterprise ourselves."
 UKR_land_reform: "Reforma rolna"
 UKR_land_reform_desc: "Reforma rolna powinna była nastąpić dawno temu, ale opóźniliśmy ją tak bardzo, jak tylko mogliśmy. Teraz łatwiej będzie nam sprzedać ziemię w ręce prywatne."
 UKR_land_trade: "Uprość handel gruntami"
 UKR_land_trade_desc: "Będziemy w dalszym ciągu ułatwiać nabywanie działek przez prywatnych inwestorów w naszym kraju."
 UKR_bolster_privatization: "Wzmocnić prywatyzację gruntów"
 UKR_bolster_privatization_desc: "Prywatyzacja ulegnie przyspieszeniu, a nasz kraj musi wejść w nową gospodarkę rynkową."
 UKR_ukrenergo_reform: "Reforma Ukrenergo"
 UKR_ukrenergo_reform_desc: "Nasza struktura energetyczna jest w strasznej sytuacji; konieczna jest reforma Ukrenergo."
 UKR_burshtyn_tes: "Rozwiń Bursztyn TES"
 UKR_burshtyn_tes_desc: "Przeprowadzimy przebudowę i modernizację elektrociepłowni Bursztyn."
 UKR_diversy_fuel: "Dywersyfikuj zakupy paliw"
 UKR_diversy_fuel_desc: "Musimy umiejętnie dywersyfikować źródła energii, które kupujemy za granicą; nie możemy polegać tylko na jednym sprzedawcy."
 UKR_short_terms: "Zniesienie kredytów krótkoterminowych"
 UKR_short_terms_desc: "Całkowicie zniesiemy takie rzeczy jak pożyczki krótkoterminowe; są szkodliwe dla gospodarki."
 UKR_bank_lobbyst: "Usuń lobbystę bankowego"
 UKR_bank_lobbyst_desc: "W latach 90. do władzy doszło wielu lobbystów bankowych; czas pozbyć się ich wpływów na nasz kraj."
 UKR_social_cut_down: "Obniż wydatki socjalne"
 UKR_social_cut_down_desc: "Jesteśmy zmuszeni czasowo ograniczać wydatki socjalne, aby ustabilizować nasze rezerwy finansowe."
 UKR_struggle_power: "Walka o władzę"
 UKR_struggle_power_desc: "Nasza niepewna sytuacja doprowadziła do pojawienia się silnych przeciwników politycznych; musimy się przed nimi chronić i przekonać wyborców, aby zostali z nami."
 UKR_tax_agro: "Obniżka podatków dla firm rolniczych"
 UKR_tax_agro_desc: "Obniżymy podatki dla przemysłu rolnego, aby pobudzić wzrost jego produkcji."
 UKR_stimulate: "Stymuluj gospodarkę"
 UKR_stimulate_desc: "Nasze działania przynoszą efekty i gospodarka zaczyna się rozwijać."
 UKR_negotiation_left: "Negocjacje z lewicową opozycją"
 UKR_negotiation_left_desc: "Lewicowi działacze zauważalnie zyskują na sile; konieczne jest znalezienie z nimi kompromisu."
 UKR_radicalize_without_kuchma: "Eradicate Ukraine Without Kuchma"
 UKR_radicalize_without_kuchma_desc: "Ruch „Ukraina bez Kuczmy” nabierał niebezpiecznego impetu; czas się z nimi uporać."
 UKR_slowdown_reform_land: "Spowolnienie reformy rolnej"
 UKR_slowdown_reform_land_desc: "Postanowiliśmy spowolnić reformę rolną, ponieważ wywołała ona mieszane reakcje w naszym społeczeństwie."
 UKR_re_approach_privatbank: "Ponowne podejście do PrivatBanku"
 UKR_re_approach_privatbank_desc: "PrivatBank jest największym bankiem w naszym kraju; musimy z nim skutecznie znaleźć kompromis, a zapewni nam to duże wpływy podatkowe."
 UKR_concessin_with_donbass: "Koncesje z zespołem Donbass"
 UKR_concessin_with_donbass_desc: "Jesteśmy gotowi na ustępstwa dla Donbasu, starając się w ten sposób zapewnić mu lojalność wobec nas."
 UKR_invest_mining_companies: "Inwestycje dla firm górniczych"
 UKR_invest_mining_companies_desc: "Inwestując w spółki z Donbasu, zapewnimy silne wsparcie lokalnych wyborców."
 UKR_donbass_infrastructure: "Program Infrastrukturalny Donbasu"
 UKR_donbass_infrastructure_desc: "Inwestycje w infrastrukturę Donbasu pozwolą nam pozyskać także nowych wyborców i zwiększyć dochody z tego regionu."
 UKR_impeachment: "Impeachment Proceedings"
 UKR_impeachment_desc: "The Verkhovna Rada is moving to impeach us. We must respond to this threat to our authority before it is too late."
 UKR_privatization_ukrenergo: "Expansion of Ukrenergo"
 UKR_privatization_ukrenergo_desc: "We are expanding UkrEnergo, connecting a part of our network to the european synchronous grid."
 UKR_reach_russian_oligarch: "Dotrzyj do rosyjskich oligarchów"
 UKR_reach_russian_oligarch_desc: "Przyciągniemy rosyjskich oligarchów, którzy będą wspierać naszą polityczną firmę."
 UKR_rus_mobile_operators: "Przyciągnij rosyjskich operatorów komórkowych"
 UKR_rus_mobile_operators_desc: "Zapewnimy rosyjskim operatorom telekomunikacyjnym dostęp do naszego rynku."
 UKR_free_economic_zones: "Wolne Strefy Ekonomiczne"
 UKR_free_economic_zones_desc: "Utworzymy na naszym terytorium kilka stref ekonomicznych, gdzie oczywiście w pierwszej kolejności będziemy czekać na rosyjskich inwestorów."
 UKR_yanuk_cabinet: "Yanukovych [Yanu_Status]"
 UKR_yanuk_cabinet_desc: "Wiktor Janukowycz i jego nadchodzące działania polityczne powinny mieć stymulujący wpływ na gospodarkę, podobnie jak działalność Juszczenki."
 UKR_block_land_trading: "Blokuj handel gruntami"
 UKR_block_land_trading_desc: "Transakcje dotyczące gruntów zostaną aktywnie zamrożone, ponieważ może to negatywnie wpłynąć na niezależność naszego kompleksu wojskowo-przemysłowego."
 UKR_soft_taxation: "Miękka reforma podatkowa"
 UKR_soft_taxation_desc: "Przeprowadzimy miękką reformę podatkową, która nie wywoła wielkiego gniewu zarówno wśród osób prawnych, jak i prywatnych."
 UKR_floating_excange: "Płynny kurs walutowy"
 UKR_floating_excange_desc: "Będziemy praktykować płynny kurs walutowy, ale może to dać nam zupełnie inne efekty gospodarcze."
 UKR_small_favor: "Upominki dla małych firm"
 UKR_small_favor_desc: "Wprowadzimy korzyści dla małych przedsiębiorstw, stymulujące wzrost gospodarczy."
 UKR_doentskstal: "Doniecktal"
 UKR_doentskstal_desc: "Tworzymy nowe przedsiębiorstwo na terenie Donbasu, aby zoptymalizować nasze działania w tym regionie."
 UKR_gas_azvostal: "Zbuduj gazociąg w Azovstal"
 UKR_gas_azvostal_desc: "Zbudujemy gazociąg w Azovstalu, aby poprawić funkcjonowanie przedsiębiorstwa i warunki życia w dzielnicach."
 UKR_dorohy_avto: "Awtomobilni Dorohy Ukrainy"
 UKR_dorohy_avto_desc: "Nazywanie stanu dróg w naszym kraju fatalnym jest komplementem. 95% dróg jest po prostu w złym stanie. Zaczniemy to naprawiać."
 UKR_roshen: "Roshena"
 UKR_roshen_desc: "Słynna fabryka słodyczy Roshen rozszerza swoją działalność, będziemy uważnie monitorować jej właścicieli."
 UKR_luaz_reopen: "Modernize LuAZ"
 UKR_luaz_reopen_desc: "LuAZ produces old vehicles. It is necessary to modernize them to help our road reforms."
 UKR_ukraine_2000: "Ukraina 2000"
 UKR_ukraine_2000_desc: "Nowe tysiąclecie powinno przynieść Ukrainie globalne reformy konstytucyjne, a my będziemy je aktywnie promować."
 UKR_gain_rada_support: "Zdobądź wsparcie Rady"
 UKR_gain_rada_support_desc: "Dla wdrożenia naszych reform konieczne jest pełne wsparcie Rady Najwyższej."
 UKR_deal_pro_socialist_media: "Rozpraw się z mediami prosocjalistycznymi"
 UKR_deal_pro_socialist_media_desc: "Partie socjalistyczne nabierają rozpędu; konieczne jest tłumienie ich mediów."
 UKR_referendum_const: "Referendum w sprawie konstytucji"
 UKR_referendum_const_desc: "Jesteśmy gotowi przeprowadzić ogólnokrajowe referendum w sprawie zmian w konstytucji."
 UKR_push_for_reforms: "Naciskaj na reformy"
 UKR_push_for_reforms_desc: "Będziemy w dalszym ciągu promować wśród rządu nasze idee reformatorskie; nasze państwo ich potrzebuje."
 UKR_arrest_timoshenko: "Aresztowanie Tymoszenko"
 UKR_arrest_timoshenko_desc: "Tymoszenko jest dla nas zbyt niebezpiecznym przeciwnikiem politycznym; aresztujemy ją."
 UKR_prepare_protest: "Przygotuj się na protesty"
 UKR_prepare_protest_desc: "Nasze działania z pewnością wywołają serię protestów; musimy być na nie przygotowani."
 UKR_reform_berkut: "Zreformować Berkuta"
 UKR_reform_berkut_desc: "Trzeba zreformować Siły Specjalne Berkutu, bez tego możemy stracić kontrolę nad protestami."
 UKR_deal_yushenko: "Porozumieć się z Juszczenką"
 UKR_deal_yushenko_desc: "Zajmiemy się Juszczenką i jego ambicjami politycznymi."
 UKR_appoint_yanukovich: "Mianować Janukowycza"
 UKR_appoint_yanukovich_desc: "Na szefa rządu mianujemy Janukowycza; być może uda mu się poprawić sytuację."
 UKR_seek_help_eastern_oligarch: "Szukaj pomocy u wschodnich oligarchów"
 UKR_seek_help_eastern_oligarch_desc: "Nasze zasoby wyraźnie nie wystarczą, aby stłumić ruch protestacyjny; może wschodni oligarchowie nam pomogą?"
 UKR_aid_from_minign_companies: "Uzyskaj pomoc od firm wydobywczych"
 UKR_aid_from_minign_companies_desc: "Nasze inwestycje w spółki wydobywcze powinny się opłacić, a ich menadżerowie będą gotowi udzielić nam pomocy finansowej i innej."
 UKR_negotiate_orange_maidan: "Negocjuj z Orange Majdanem"
 UKR_negotiate_orange_maidan_desc: "Czas rozpocząć negocjacje z protestującymi i raz na zawsze rozwiązać tę kwestię."
 UKR_const_reform: "Reforma konstytucyjna"
 UKR_const_reform_desc: "W końcu udało nam się narzucić rządowi nasze reformy poprzez ruch protestacyjny."
 UKR_lyvochkin: "Rozwiązanie Lowoczkina"
 UKR_lyvochkin_desc: "Nasz główny doradca dał nam jasno do zrozumienia, że ​​będziemy musieli pójść na kompromis z protestującymi; w przeciwnym razie nasz kraj pogrąży się w chaosie."
 UKR_stay_for_fair_election: "Zostań na ,,Uczciwych” wyborach"
 UKR_stay_for_fair_election_desc: "Nie zamierzamy tak po prostu oddać naszej władzy; wytrwamy do końca."
 UKR_yusha_tt: "§YTo uniemożliwi nam skupienie się na rządzie Juszczenki§!"
 UKR_yana_tt: "§YTo pozwoli nam dokończyć skupianie się na Gabinecie Janukowycza§!"
 UKR_easterns_tt: "Wsparcie dla mieszkańców £text_icon_ukr_dobro §3Regiony Wschodnie§! Ukrainy zmieni się o §Y[?modify_easterns]§! (Aktualne wsparcie: §Y[?UKR.easterns]§!)\n"
 UKR_westerns_tt: "Wsparcie dla mieszkańców £text_icon_ukr_yasno §tRegionów Zachodnich§! Ukrainy zmieni się o §Y[?modify_westerns]§! (Aktualne wsparcie: §Y[?UKR.westerns]§!)\n"
 UKR_maidani_tt: "Poparcie dla §8Przedstawiciele Majdanu§! zmieni się o §Y[?modify_maidani]§! (Aktualne wsparcie: §Y[?UKR.maidani]§!)\n"
 UKR_political_situation_decision_category: "Niestabilność polityczna na Ukrainie"
 UKR_political_situation_decision_category_desc: "[UKR.GetFlag]§YUkraine§! is a huge state with many peoples living in it, but two of them represent the majority - [UKR.GetFlag]§YUkrainians§! and [SOV.GetFlag]§YRussians§!. Due to historical events, the [SOV.GetFlag]§YRussian-speaking§! population mainly lives in the east of the country, while the [UKR.GetFlag]§YUkrainian§! population already occupies more western territories. This geographical division is constantly shaking [UKR.GetFlag]§YUkraine§! and may become a §Rbig problem§! for the country in the future. Among other things, the political electorate of [UKR.GetFlag]§YUkraine§! is very prone to protests and expressing their opinions through rather §Rnon-peaceful§! protests.  We need to take into account all these aspects and find an opportunity to balance these forces.\n\nIf support for the §8Maidan§! §Rfalls below 15§!, unrest will begin, which could lead to a §Rcivil war§!. To reduce the consequences of a possible §Rcivil war§!, it is necessary to expand the influence and power of the §YSBU§!, the §YNational Guard§!, etc. Depending on whose support is §Rless§! (§tWesterners§! or §3Easterners§!), there will be different scenarios of political unrest."
 ukr_west_output_text: "§Y[?UKR.westerns]§!"
 ukr_west_tooltip: "Aktualne wsparcie §tRegionów Zachodnich§!"
 ukr_maidan_output_text: "§Y[?UKR.maidani]§!"
 ukr_maidan_tooltip: "Aktualne wsparcie §8Majdan§!"
 ukr_east_output_text: "§Y[?UKR.easterns]§!"
 ukr_east_tooltip: "Aktualne wsparcie §3Regiony Wschodnie§!"
 UKR_our_agricultrure: "Rolnictwo Krajowe"
 UKR_our_agricultrure_desc: "The Ukrainian agricultural industry is one of the best in the world, and we will try not to lose this title."
 UKR_azovsteel: "Azowstal"
 UKR_unstable_government_idea: "Niezadowolenie z Majdanu"
 UKR_land_reform_idea: "Reforma rolna"
 UKR_land_reform_idea_desc: "The land reform initiated in the last century should lead to a complete redistribution of land holdings throughout the country. So far, it is in the process."
 UKR_zaims: "Konsekwencje ekonomiczne umorzenia kredytu"
 UKR_banks_lobbyst_liquidate: "Likwidacja lobbystów bankowych"
 UKR_mining_company_help: "Ulgi podatkowe dla spółek górniczych"
 UKR_privatization_idea: "Prywatyzacja"
 UKR_without_kuchma_idea: "Ukraina bez Kuczmy"
 UKR_left_opposition_idea: "Lewicowa Opozycja"
 UKR_luaz_idea: "LuAZ"
 UKR_anti_socialist_media: "Media antysocjalistyczne"
 UKR_crisis_political: "Kryzys polityczny"
 UKR_crisis_political_desc: "Our country is gripped by a political crisis, the authorities are paralyzed and political forces are fighting with each other for power."
 ukraine_kuchma.2.t: "Przygotowania do protestów"
 ukraine_kuchma.2.d: "Nasze działania z pewnością doprowadzą do protestów, musimy się przygotować."
 ukraine_kuchma.2.a: "Będziemy gotowi"
 ukraine_kuchma.2.b: "Wszystko rozwiąże się samo"
 ukraine_kuchma.11.t: "Próba impeachmentu"
 ukraine_kuchma.11.d: "Rada Najwyższa wielokrotnie próbowała nas postawić w stan oskarżenia, czas rozwiązać tę kwestię."
 ukraine_kuchma.11.a: "Nie dla impeachmentu"
 ukraine_kuchma.12.t: "Przyjaźń z klanem donieckim"
 ukraine_kuchma.12.d: "Będziemy starali się przeciągnąć na swoją stronę tzw. doniecki klan oligarchów, przydadzą się nam w przyszłej konfrontacji z opozycją."
 ukraine_kuchma.12.a: "Donbas jest z nami"
 ukraine_kuchma.12.b: "Nie będziemy ich wspierać"
 ukraine_kuchma.13.t: "Janukowycz zostanie prezydentem"
 ukraine_kuchma.13.d: "Nie uznamy wyników drugiej tury wyścigu prezydenckiego i mianujemy Janukowycza na prezydenta Ukrainy."
 ukraine_kuchma.13.a: "Niech tak będzie"
 ukraine_kuchma.14.t: "Protesty na południowym wschodzie"
 ukraine_kuchma.14.d: "Po zwycięstwie w wyborach myśleliśmy, że wszystko się skończyło, ale obecnie południowo-wschodnia część naszego kraju zaczęła wykazywać wzmożoną aktywność protestacyjną. Tzw. „Błękitny Majdan” zaczął zwiększać presję na nasz rząd, grożąc poważnymi konsekwencjami."
 ukraine_kuchma.14.a: "Musimy zachować większą ostrożność."
 ukraine_kuchma.15.t: "Błękitny Majdan na Ukrainie"
 ukraine_kuchma.15.d: "Activists in Southeastern Ukraine continued to develop their autonomy project, while the Kyiv authorities are busy changing chairs in the rada offices, a big storm is coming. Supporters of the Blue Maidan have asked us for support, will we help them?"
 ukraine_kuchma.15.a: "Będziemy ich wspierać."
 ukraine_kuchma.15.b: "Nie powinniśmy się wtrącać"
 ukraine_kuchma.16.t: "Rząd Południowego Wschodu"
 ukraine_kuchma.16.d: "The so-called activists of the Blue Maidan have officially announced the creation of their government, and that they do not recognize the Kyiv government. It seems that they were supported from outside, otherwise they would not have decided on such a thing."
 ukraine_kuchma.16.a: "Natychmiast wyślij tam policję"
 ukraine_kuchma.17.t: "Błękitna Rewolucja"
 ukraine_kuchma.17.d: "Dziś zwolennicy Błękitnego Majdanu pod przywództwem Wiktora Janukowycza oficjalnie ogłosili niepodległość i utworzenie własnej republiki południowo-wschodniej Ukrainy. Są jednostki wojskowe, które przeszły na ich stronę, a także generałowie i oficerowie."
 ukraine_kuchma.17.a: "Rozpoczęła się burza"
 ukraine_kuchma.18.t: "Protesty w Galicji"
 ukraine_kuchma.18.d: "Nasza decyzja o zignorowaniu drugiej tury wyborów prezydenckich doprowadziła do niestabilności w kraju, wielu mieszkańców zachodnich regionów przeszło do aktywnej fazy protestów, gdzie rozpoczęły się starcia z policją."
 ukraine_kuchma.18.a: "Musimy zachować większą ostrożność"
 ukraine_kuchma.19.t: "Czerwony Majdan na Ukrainie"
 ukraine_kuchma.19.d: "Aktywiści w ukraińskiej Galicji rozpoczęli protesty przeciwko nielegalnym wyborom w kraju, sytuacja stała się tak napięta, że ​​mówimy już o zbrojnym powstaniu, bo kilku generałów wspiera rebeliantów, może warto im pomóc?"
 ukraine_kuchma.19.a: "Będziemy ich wspierać."
 ukraine_kuchma.19.b: "Nie powinniśmy się wtrącać"
 ukraine_kuchma.20.t: "Rząd Zachodniej Ukrainy"
 ukraine_kuchma.20.d: "The protests have already moved into a more heated phase, and they are clearly being helped from abroad. Now they have announced the creation of their own government, which is not subordinate to the Kyiv authorities."
 ukraine_kuchma.20.a: "Natychmiast wyślij tam policję"
 ukraine_kuchma.21.t: "Czerwona Rewolucja"
 ukraine_kuchma.21.d: "Today, supporters of the so-called Red Maidan announced their withdrawal from Ukraine and the beginning of armed resistance with the Kyiv Pro-Russian government."
 ukraine_kuchma.21.a: "Rozpoczęła się burza"
 UKR_spu_start: "Socjalistyczna Partia Ukrainy"
 UKR_spu_start_desc: "After years of struggling we managed to get the people trust. Now we shall start our great reforms."
 UKR_spu_rada_position: "Stanowiska w Radzie"
 UKR_spu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_spu_coalition: "Koalicja CPU/SPU"
 UKR_cpu_spu_coalition_desc: "CPU i SPU można określić mianem braci. Zawsze uczestniczyli w wyborach jako zjednoczony front. Oczywiste jest, że w przypadku zwycięstwa jednego z nich utworzą koalicję."
 UKR_ditch_cpu: "Odległość od procesora"
 UKR_ditch_cpu_desc: "CPU i SPU można określić mianem braci. Zawsze brali udział w wyborach jako zjednoczony front, ale jest oczywiste, że gdyby CPU zdobyło władzę, przywróciłoby reżim komunistyczny. Musimy się od nich jak najszybciej oddalić."
 UKR_cpu_start: "Komunistyczna Partia Ukrainy"
 UKR_cpu_start_desc: "Communist Party of Ukraine."
 UKR_cpu_rada_position: "Stanowiska w Radzie"
 UKR_cpu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_monocoalition: "Monokoalicja"
 UKR_cpu_monocoalition_desc: "Monocoalition is a term in Ukrainian politics. It refers to a government formed by only one party. By creating a CPU monocoalition, we could easily take control of the legislature and executive branches and begin the Soviet restoration."
 UKR_back_to_soviet_tracks: "Powrót do czasów sowieckich"
 UKR_back_to_soviet_tracks_desc: "After the collapse of the USSR, our country only lost, missed and destroyed everything that remains of the heritage of this great country. We will change this process."
 UKR_commie_russia_trade: "Partnerstwo z Rosją"
 UKR_commie_russia_trade_desc: "Zamierzamy wzmacniać przyjazne stosunki pomiędzy naszymi krajami."
 UKR_commie_russia_rjd: "Współpraca z Kolejami Rosyjskimi"
 UKR_commie_russia_rjd_desc: "Russian railways will be an excellent partner for us, thanks to their help we will significantly improve our infrastructure."
 UKR_commie_russia_banks: "Banki Rosyjskie"
 UKR_commie_russia_banks_desc: "We are ready to let Russian banks into our territory, their financial capabilities will help us in our development."
 UKR_commie_russia_gas: "Nowy kontrakt gazowy"
 UKR_commie_russia_gas_desc: "We are ready to conclude a new gas contract with Russia, on favorable terms for us."
 UKR_commie_china_trade: "Partnerstwo z Chinami"
 UKR_commie_china_trade_desc: "Zamierzamy wzmacniać przyjazne stosunki pomiędzy naszymi krajami."
 UKR_commie_china_trains: "Zakup pociągów w Chinach"
 UKR_commie_china_trains_desc: "We will purchase several trains in China that will help improve our supply."
 UKR_comsomol: "Ożywić Komsomoł"
 UKR_comsomol_desc: "The Komsomol movement needs to be revived as an ideological pillar of our system in the minds of new generations."
 UKR_commie_china_infra: "Modernizacja kolei"
 UKR_commie_china_infra_desc: "Nasi chińscy koledzy zgodzili się sfinansować modernizację sieci kolejowej w naszym kraju."
 UKR_commie_china_huawei: "Współpraca z Huaweiem"
 UKR_commie_china_huawei_desc: "We will establish a strong cooperation with this Chinese company."
 UKR_commie_motor_sich: "Rozwiń MotorSich"
 UKR_commie_motor_sich_desc: "We will invest additional funds in the development of our key enterprise - MotorSich."
 UKR_ukr_pioners: "Ożyw pioniera"
 UKR_ukr_pioners_desc: "The pioneers need to be revived, the youth have lost their moral guidelines and must be guided on the path of socialism again."
 UKR_one_union_for_all: "Zjednoczony Państwowy Związek Zawodowy"
 UKR_one_union_for_all_desc: "We will protect the rights of workers across the country by creating a single trade union."
 UKR_remilitarization: "Remilitaryzacja"
 UKR_remilitarization_desc: "Our state must have a strong army, so we will begin the immediate process of remilitarization."
 UKR_arms_zavods: "Inwestycje w fabrykach wojskowych"
 UKR_arms_zavods_desc: "Our military industry was destroyed after the collapse of the USSR, it's time to revive it."
 UKR_sbu_kgb: "Metody KGB"
 UKR_sbu_kgb_desc: "We must rebuilt the old KGB school, this will clearly increase the professionalism of our staff."
 UKR_arms_tanks: "Nacisk na czołgi"
 UKR_arms_tanks_desc: "Our armed forces need tanks urgently, we will give them this need."
 UKR_revolut_in_blr: "Białoruska rewolucja socjalistyczna"
 UKR_revolut_in_blr_desc: "Nasz braterski naród białoruski jest uciskany przez swoich władców i kapitalistów! Uwolnijmy ich!"
 UKR_revolution_in_russia: "Rosyjska rewolucja socjalistyczna"
 UKR_revolution_in_russia_desc: "Nasz braterski naród rosyjski jest uciskany przez swoich władców i kapitalistów! Uwolnijmy ich!"
 UKR_befriend_russia_com: "Przyjaźń z Rosją"
 UKR_befriend_russia_com_desc: "We intend to establish partnership and friendly relations with Russia."
 UKR_befriend_belarus_com: "Przyjaźń z Białorusią"
 UKR_befriend_belarus_com_desc: "We intend to establish partnership and friendly relations with Belarus."
 UKR_central_asia_revolt: "Rewolucje w Azji Centralnej"
 UKR_central_asia_revolt_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_caucasus_revolut: "Rewolucje na Kaukazie"
 UKR_caucasus_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_baltic_revolut: "Rewolucje w krajach bałtyckich"
 UKR_baltic_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_revolut_in_mol: "Mołdawska rewolucja socjalistyczna"
 UKR_revolut_in_mol_desc: "Nasz braterski naród mołdawski jest uciskany przez swoich władców i kapitalistów! Uwolnijmy ich!"
 UKR_csto_com_app: "Dołącz do OUBZ"
 UKR_csto_com_app_desc: "Our fraternal peoples are members of the CSTO, perhaps it is worth joining them."
 UKR_integration_support: "Integracja Byłych Republik"
 UKR_integration_support_desc: "We will begin the integration processes of the former republics."
 UKR_declare_ussr: "Ożywić ZSRR"
 UKR_declare_ussr_desc: "Jesteśmy prawdziwymi spadkobiercami ZSRR! Czas ożywić ten wspaniały stan!"
 UKR_nationalize_everything: "Rozpocznij nacjonalizację"
 UKR_nationalize_everything_desc: "Kapitalistom nic nie oddamy! przedsiębiorstwa wrócą na łono państwa!"
 UKR_social_propaganda: "Reformy społeczne"
 UKR_social_propaganda_desc: "We will launch large-scale social reforms that will allow us to win the hearts of the poor."
 UKR_christian_communism_desc: "Zakazanie religii było jednym z błędów, na które nie pozwolimy. Chrześcijański komunizm jest naszą przyszłością. Przecież sam Jezus był komunistą!"
 UKR_criminalize_oligrachy: "Kryminalizacja oligarchii"
 UKR_criminalize_oligrachy_desc: "Oligarchowie od wielu lat piją krew z naszego kraju, wyprzedając majątek stworzony przez naszych pradziadków, dość!"
 UKR_land_to_people: "Ziemia dla ludzi!"
 UKR_land_to_people_desc: "The land should belong to the people! Not a bunch of oligarchs, bandits."
 UKR_revive_soviet_factories: "Ożywić radzieckie fabryki"
 UKR_revive_soviet_factories_desc: "Many enterprises that remained as a legacy from the USSR were destroyed and destroyed, we will revive them again."
 UKR_regions_ditch: "Porzucić koalicję z Partią Regionów"
 UKR_regions_ditch_desc: "Nie będziemy tworzyć koalicji z tą partią, przyniesie nam to tylko problemy."
 UKR_regions_integr: "Koalicja z Partią Regionów"
 UKR_regions_integr_desc: "We will form a coalition with this party, it will strengthen our political capabilities."
 UKR_socialist_ukraine_effort: "Reformy socjalistyczne"
 UKR_socialist_ukraine_effort_desc: "We will begin a series of reforms that should strengthen our political position."
 UKR_pensions_for_elders_incr: "Zwiększ emerytury"
 UKR_pensions_for_elders_incr_desc: "We will increase pension payments so that citizens are willing to retire."
 UKR_full_rabota: "Reformy pracy"
 UKR_full_rabota_desc: "We will carry out serious reforms in the labor legislation to improve the working conditions of our citizens."
 UKR_socialist_democratic_policies: "Kraj socjaldemokratyczny"
 UKR_socialist_democratic_policies_desc: "New future awaits our country, under the banner of social democracy."
 UKR_start_to_support: "Zacznij wspierać biednych"
 UKR_start_to_support_desc: "Our electorate is low-income citizens who hope that our reforms will pull them out of the economic abyss into which they were dragged by the previous government. We will help them."
 UKR_progressive_taxation: "Progresywne opodatkowanie"
 UKR_progressive_taxation_desc: "We intend to introduce progressive taxation for greater economic equality of our citizens."
 UKR_social_conservative_prog: "Program społecznie konserwatywny"
 UKR_social_conservative_prog_desc: "We intend to carry out a number of reforms that were inspired by the social conservative representatives of the political sphere of our country."
 UKR_ukr_cossack_freedom: "Wolność Kozacka"
 UKR_ukr_cossack_freedom_desc: "Our citizen is like a free Cossack, he is no longer a slave to capital and not a slave to anyone."
 UKR_nationalization_of_big_com: "Nacjonalizacja dużych firm"
 UKR_nationalization_of_big_com_desc: "We will carry out a series of nationalizations of large companies."
 UKR_crusade_against_inequality: "Walka z nierównością"
 UKR_crusade_against_inequality_desc: "Inequality in our society is becoming more pronounced, and we will begin an economic and political program to soften the financial boundaries between different social strata."
 UKR_reduce_cap_oligrach: "Osłabić wpływy oligarchów"
 UKR_reduce_cap_oligrach_desc: "The oligarchs have too much influence on our country, it's time to deal with this."
 UKR_people_brotherhood: "Braterska Jedność"
 UKR_people_brotherhood_desc: "Our people, the peoples that inhabit our country must be a united brotherhood that will resist threats from outside."
 UKR_ask_russia_to_give_nukes: "Poproś Rosję o broń nuklearną"
 UKR_ask_russia_to_give_nukes_desc: "We intend to request from Russia some stocks of nuclear weapons to protect our country from external threats."
 UKR_reduce_foreign_influence: "Ogranicz wpływy zagraniczne"
 UKR_reduce_foreign_influence_desc: "We will weaken foreign influence on our country, independence is our foundation."
 UKR_labourr_unions: "Wsparcie dla związków zawodowych"
 UKR_labourr_unions_desc: "Będziemy aktywnie chronić krajowe związki zawodowe, aby stworzyć pozytywny klimat pracy w kraju."
 UKR_immigartion_easing: "Ułatwienie imigracji"
 UKR_immigartion_easing_desc: "We will facilitate immigration processes, because our borders should not be closed by walls."
 UKR_uindependence_prop: "Chroń Inwestora Krajowego"
 UKR_uindependence_prop_desc: "We should not abandon the domestic investor, this is the only way we will strengthen the growth of our economy."
 UKR_dont_touch_west_inv: "Priorytetowy Inwestor Zachodni"
 UKR_dont_touch_west_inv_desc: "We will concentrate our efforts to protect the Western investor."
 UKR_pro_russian_approach: "Kierunek prorosyjski"
 UKR_pro_russian_approach_desc: "We will choose Russia as a reference point, historically we are only on the way with them."
 UKR_pro_western_approach: "Kierunek prozachodni"
 UKR_pro_western_approach_desc: "We have chosen our way - the way to the west."
 UKR_request_protection_from_rus: "Poproś o rosyjską ochronę"
 UKR_request_protection_from_rus_desc: "We will try to conclude agreements on protection and defense so that our country is protected by Russia."
 UKR_apply_economic_union: "Dołącz do Rosyjskiego Obszaru Gospodarczego"
 UKR_apply_economic_union_desc: "Economic cooperation with Russia will give us economic growth and profitable contracts."
 UKR_donbas_peaceful: "Pokojowe rozwiązanie problemu separatystów"
 UKR_donbas_peaceful_desc: "We are ready to peacefully resolve the issue with the territories that have separated from us."
 UKR_csto_apply: "Dołącz do OUBZ"
 UKR_csto_apply_desc: "We intend to become a part of the CSTO, we see that only the members of this alliance are really interested in protecting us."
 UKR_western_socialists_coalition: "Koalicja z partiami zachodnimi"
 UKR_western_socialists_coalition_desc: "We intend to create a coalition with pro-Western parties."
 UKR_harsh_separat_dealkill: "Aby zakończyć separatystów"
 UKR_harsh_separat_dealkill_desc: "We are ready to liberate our territories."
 UKR_apply_eu_reforms: "Przyjęcie proeuropejskich reform"
 UKR_apply_eu_reforms_desc: "We intend to follow the European political course."
 UKR_nato_commitment: "Reformy NATO"
 UKR_nato_commitment_desc: "We intend to carry out military reform in accordance with NATO standards for future membership there."
 UKR_pmr_invite_union: "Zaproponuj Naddniestrzu zjednoczone państwo"
 UKR_pmr_invite_union_desc: "Zamierzamy pójść dalej i stworzyć w Europie nowe państwo, na które nie będą mogły oddziaływać siły zewnętrzne i posiadać odpowiedniego kandydata do powiększenia tego państwa."
 UKR_belarus_invite: "Zaproponuj Białorusi zjednoczone państwo"
 UKR_belarus_invite_desc: "Zamierzamy pójść dalej i stworzyć w Europie nowe państwo, na które nie będą mogły oddziaływać siły zewnętrzne i posiadać odpowiedniego kandydata do powiększenia tego państwa."
 UKR_hungary_invite: "Zaproponuj Węgrom zjednoczone państwo"
 UKR_hungary_invite_desc: "Zamierzamy pójść dalej i stworzyć w Europie nowe państwo, na które nie będą mogły oddziaływać siły zewnętrzne i posiadać odpowiedniego kandydata do powiększenia tego państwa."
 UKR_moldova_invite: "Zaproponuj Mołdawii zjednoczone państwo"
 UKR_moldova_invite_desc: "Zamierzamy pójść dalej i stworzyć w Europie nowe państwo, na które nie będą mogły oddziaływać siły zewnętrzne i posiadać odpowiedniego kandydata do powiększenia tego państwa."
 ukraine_rada.2.t: "Koalicja z SPU?"
 ukraine_rada.2.d: "Przez długi czas socjaliści byli naszymi sojusznikami, pomimo naszych różnic. Większość członków SPU była kiedyś członkami naszej partii i długa historia stosunków sprawia, że ​​koalicja jest oczywistym wyborem, ale socjaliści stopniowo oddalają się od nas, stają się znacznie bardziej umiarkowani i przesiąknięci rewizjonizmem, więc nie będziemy pozwoliło na realizację najbardziej radykalnych polityk w ramach wspólnego rządu."
 ukraine_rada.2.b: "Do diabła z SPU. Ogłoś monokoalicję!"
 ukraine_rada.2.a: "Let's Start Coalition Talks"
 ukraine_rada.1.t: "Koalicja z procesorem?"
 ukraine_rada.1.d: "Przez długi czas komuniści byli naszymi sojusznikami, pomimo dzielących ich różnic. Większość członków naszej partii należała do KP i długa historia stosunków sprawia, że ​​koalicja jest koniecznością, ale komuniści nie chcą iść z duchem czasu, propagując idee regresywne i wspierając inicjatywy kanibalistyczne, a koalicja z nimi może pozwoli także niektórym radykalnym członkom procesora zdobyć władzę."
 ukraine_rada.1.b: "Do diabła z procesorem!"
 ukraine_rada.1.a: "Let's Start Coalition Talks"
 ukraine_kommi.1.t: "Ukraina prosi o broń nuklearną"
 ukraine_kommi.1.d: "An unexpected statement came from the Ukrainian government. They want to get Nuclear weapons from us in order to defend themselves from an external attack. Such a dangerous decision requires us to weigh the pros and cons."
 ukraine_kommi.1.a: "Damy im broń nuklearną"
 ukraine_kommi.1.b: "Nie damy im broni nuklearnej"
 ukraine_kommi.2.t: "Rosyjska broń nuklearna"
 ukraine_kommi.2.d: "They agreed to provide us with some of the nuclear weapons."
 ukraine_kommi.2.a: "Dobry."
 ukraine_kommi.3.t: "Rosyjska broń nuklearna"
 ukraine_kommi.3.d: "They refused to provide us with part of the nuclear weapons."
 ukraine_kommi.3.a: "Smutny"
 ukraine_kommi.4.t: "A New Communist State"
 ukraine_kommi.4.d: "Our revolution has succeeded. The old regime is finished here, but we cannot stand alone yet. Ukraine has offered to back our government while we get on our feet."
 ukraine_kommi.4.a: "We Accept Their Support"
 ukraine_kommi.5.t: "Ukraina oferuje współpracę wojskową"
 ukraine_kommi.5.d: "The Ukrainian government says it is ready to sign a number of documents on military-political cooperation between our countries."
 ukraine_kommi.5.a: "Jesteśmy za przyjaźnią z Ukrainą"
 ukraine_kommi.5.b: "Nic nie podpiszemy"
 ukraine_kommi.6.t: "Współpraca wojskowa z Rosją"
 ukraine_kommi.6.d: "They agreed to sign agreements on military-political cooperation with us."
 ukraine_kommi.6.a: "Ładny"
 ukraine_kommi.7.t: "Współpraca wojskowa z Rosją"
 ukraine_kommi.7.d: "They refused to sign agreements on military-political cooperation with us."
 ukraine_kommi.7.a: "Smutny"
 ukraine_kommi.8.t: "Zjednoczone Państwo Demokratyczne"
 ukraine_kommi.8.d: "Rząd ukraiński sugeruje, abyśmy stworzyli na bezkresie Europy jedno demokratyczne państwo, swego rodzaju trzeci ośrodek władzy, czy zgodzimy się na utratę niepodległości w imię jakiegoś marzenia o trzeciej sile?"
 ukraine_kommi.8.a: "Niepodległość to fikcja"
 ukraine_kommi.8.b: "Nigdy"
 ukraine_kommi.9.t: "Zjednoczone Państwo Demokratyczne"
 ukraine_kommi.9.d: "They refused our offer! It was expected, but so pathetic on their part."
 ukraine_kommi.9.a: "Oni nie rozumieją"
 ukraine_kommi.10.t: "Ukraina prosi o ochronę"
 ukraine_kommi.10.d: "The Ukrainian government asks us to provide them with guarantees to protect their independence. An unexpected request, but perhaps we should consider it."
 ukraine_kommi.10.a: "Będziemy ich chronić"
 ukraine_kommi.10.b: "Nigdy"
 ukraine_kommi.11.t: "Rosyjska gwarancja ochrony"
 ukraine_kommi.11.d: "Rząd rosyjski zgodził się udzielić nam gwarancji niepodległości!"
 ukraine_kommi.11.a: "Dobry."
 ukraine_kommi.12.t: "Rosyjska gwarancja ochrony"
 ukraine_kommi.12.d: "The Russian government has refused to provide us with guarantees of independence."
 ukraine_kommi.12.a: "Cholera"
 ukraine_kommi.13.t: "Kontrakt gazowy z Ukrainą."
 ukraine_kommi.13.d: "Ukraina zaproponowała nam obniżenie cen zakupu naszego kontraktu gazowego, w zamian pośrednik między nami zostanie wyeliminowany, dzięki czemu będziemy mieli na niego większy wpływ, czy się zgodzimy?"
 ukraine_kommi.13.a: "Podpiszemy to"
 ukraine_kommi.13.b: "Nie jesteśmy tym zainteresowani."
 ukraine_kommi.14.t: "Kontrakt gazowy z Rosją."
 ukraine_kommi.14.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.14.a: "Dobry."
 ukraine_kommi.15.t: "Kontrakt gazowy z Rosją."
 ukraine_kommi.15.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.15.a: "Dobry."
