 IND_neutral5: "Prometa aos sulawesianos um melhor atendimento"
 IND_neutral_generic: "Impulsionar programas de alistamento para papuas e sulawesianos"
 IND_neutral_generic2: "Militarizar portos usados para contrabando de armas"
 IND_neutral_generic3: "Militarizar pontos críticos conhecidos por conflitos"
 indonesia.41.t: "Desastre em Kalimantan!"
 indonesia.41.d: "Nossas falhas em prover para o povo de Kalimantan resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.41.a: "Era evitável!"
 indonesia.42.t: "Desastre em Papua Ocidental!"
 indonesia.42.d: "A nossa incapacidade de ajudar a população da Papua Ocidental resultou num acidente industrial que danificou várias instalações de produção."
 indonesia.42.a: "Era evitável!"
 indonesia.43.t: "Desastre nas Molucas!"
 indonesia.43.d: "Nossas falhas em atender às necessidades do povo das Molucas resultaram em uma briga em um shopping popular, um acidente que causou grande instabilidade na cidade!"
 indonesia.43.a: "Era evitável!"
 indonesia.44.t: "Desastre em Papua Ocidental!"
 indonesia.44.d: "Nossas falhas em prover para o povo de Kalimantan resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.44.a: "Era evitável!"
 indonesia.45.t: "Desastre nas Ilhas Lesser Sunda!"
 indonesia.45.d: "Nossas falhas em prover assistência ao povo das Ilhas da Sonda Menor resultaram em um incidente entre um funcionário do governo e uma autoridade local, causando tumulto nas ilhas!"
 indonesia.45.a: "Era evitável!"
 indonesia.46.t: "Desastre em Sumatra do Norte!"
 indonesia.46.d: "Nossas falhas em atender às pessoas do norte de Sumatra resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.46.a: "Era evitável!"
 indonesia.47.t: "Desastre em Sulawesi!"
 indonesia.47.d: "Nossas falhas em atender às necessidades do povo de Sulawesi resultaram em um acidente industrial que causou danos a várias instalações de produção"
 indonesia.47.a: "Era evitável!"
 indonesia.48.t: "Desastre em Jacarta!"
 indonesia.48.d: "Nossas falhas em prover para o povo de Jacarta, nossa capital, resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.48.a: "Era evitável!"
 indonesia.49.t: "Desastre nas Molucas do Norte!"
 indonesia.49.d: "A nossa incapacidade de ajudar a população das Molucas do Norte resultou num acidente industrial que danificou várias instalações de produção"
 indonesia.49.a: "Era evitável!"
 indonesia.51.t: "Desastre nas Ilhas Lesser Sunda!"
 indonesia.51.d: "Nossas falhas em prover para o povo das Ilhas Lesser Sunda resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.51.a: "Era evitável!"
 indonesia.52.t: "Desastre nas Ilhas Riau!"
 indonesia.52.d: "Nossas falhas em prover o povo das Ilhas Riau resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.52.a: "Era evitável!"
 indonesia.53.t: "Desastre em Kalimantan!"
 indonesia.53.d: "Nossa falha em atender às pessoas de Kalimantan resultou em um acidente de aviação, causando grandes danos ao aeroporto provincial!"
 indonesia.53.a: "Era evitável!"
 indonesia.54.t: "Desastre em Sumatra do Sul!"
 indonesia.54.d: "Nossas falhas em prover para o povo de Sumatra do Sul resultaram em um acidente industrial que causou danos a várias instalações de produção."
 indonesia.54.a: "Era evitável!"
 indonesia.56.t: "Desastre em Papua Ocidental!"
 indonesia.56.d: "Nossas falhas em atender às pessoas da Papua Ocidental resultaram em um acidente de aviação, causando grandes danos ao aeroporto provincial!"
 indonesia.56.a: "Era evitável!"
 indonesia.57.t: "Desastre em Sulawesi!"
 indonesia.57.d: "Nossas falhas em construir infraestrutura adequada em Sulawesi causaram o colapso de vários edifícios e a morte de muitas pessoas."
 indonesia.57.a: "Era evitável!"
 indonesia.58.t: "Desastre em Papua Ocidental!"
 indonesia.58.d: "As nossas falhas em fornecer uma gestão adequada para a Papua Ocidental resultaram num incidente em que uma das nossas fábricas militares ruiu"
 indonesia.58.a: "Era evitável!"
 indonesia.59.t: "Desastre em Papua!"
 indonesia.59.d: "Nossas falhas em fornecer infraestrutura adequada em Papua Ocidental resultaram em um acidente industrial que causou danos a várias instalações de produção militar."
 indonesia.59.a: "Era evitável!"
 indonesia.61.t: "Desastre em Java Oriental!"
 indonesia.61.d: "Nossas falhas em atender às pessoas de Java Oriental resultaram em um incidente corporativo, levando ao fechamento de um prédio de escritórios!"
 indonesia.61.a: "Era evitável!"
 indonesia.62.t: "Desastre em nossa Capital!"
 indonesia.62.d: "A nossa incapacidade de ajudar as pessoas de Java Ocidental, onde também se situa a nossa capital, levou a um incidente em que uma fábrica industrial desmoronou."
 indonesia.62.a: "Era evitável!"
 indonesia.63.t: "Desastre nos céus!"
 indonesia.63.d: "Nossas falhas em fornecer equipamentos de aviação adequados levaram a falhas técnicas em um de nossos voos, causando muitas mortes!"
 indonesia.63.a: "Era evitável!"
 indonesia.64.t: "Desastre em nossa Capital!"
 indonesia.64.d: "A nossa incapacidade de ajudar as pessoas de Java Ocidental, onde também se situa a nossa capital, levou a um incidente em que várias fábricas industriais ruíram."
 indonesia.64.a: "Era evitável!"
 indonesia.988.t: "Preparações para uma Nova Capital"
 indonesia.988.d: "Com todos os conselhos e assistência que recebemos do Japão, chegamos à conclusão de começar os preparativos para mudar nossa capital de Jacarta. A nova capital será localizada no Leste de Bornéu, e os planos de construção começarão imediatamente!"
 indonesia.988.a: "Avante!"
 indonesia.888.t: "A Nova Rota da Seda"
 indonesia.888.d: "Uma reunião recente com os chineses acabou de terminar. Eles elogiaram nossa parceria e habilidades em elevar a indústria da Indonésia de algo insignificante para algo em tão pouco tempo. Embora ainda tenhamos muito trabalho a fazer, os presidentes chineses elogiaram nossa nação e nos deram o título de 'A Rota da Seda do Século XXI'."
 indonesia.888.a: "Muito lisonjeiro"
