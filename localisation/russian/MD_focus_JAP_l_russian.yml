 JAP_mitsubishi_ship_mio_trait_hull_shock: "Архитектура амортизационного буфера корпуса"
 JAP_mitsubishi_ship_mio_trait_xconfig_rudder: "Маневренность руля направления X-конфигурации"
 JAP_mitsubishi_ship_mio_trait_next_gen_torpedo: "Система крепления торпед нового поколения"
 JAP_mitsubishi_ship_mio_trait_submarine_research: "Отдел исследований экспорта подводных лодок"
 JAP_choice: "Политическая перезагрузка"
 JAP_choice_desc: "В условиях затяжной стагнации и институциональной усталости доверие к политике пошатнулось, а необходимость реформ только нарастала. Для того чтобы страна двигалась вперед, она должна сначала определить четкий курс управления и создать основу для принятия решений."
 JAP_left: "Левое крыло Японии"
 JAP_left_desc: "Цель политики – не только экономический рост, но и защита средств к существованию и достоинства людей. Мы обеспечим прозрачность и будем строго контролировать власть имущих, укрепим переговорные позиции трудящихся и систему социальной защиты, а также сократим неравенство и нестабильность. Проводя политику, не игнорирующую права человека, и продвигая переход к устойчивой энергетике, мы стремимся к перестройке японского общества."
 JAP_left_TT: "§YВы можете значительно повысить рейтинг одной из левых партий!\nОднако, если это будет правящая партия, прирост останется небольшим.§!"
 JAP_information_disclosure: "Укрепить раскрытие информации"
 JAP_information_disclosure_desc: "Для восстановления доверия к политике и государственному управлению мы будем обеспечивать полное раскрытие информации и усиливать процесс создания, хранения и публикации официальных документов. Это позволит устранить почву для коррупции и сговора, сделать политические решения более прозрачными и облегчить продвижение реформ."
 JAP_left_party_TT: "Должно выполняться одно из следующих условий:\n§Y$JAP.liberalism$§! у власти.\n§Y$JAP.liberalism_alt$§! у власти.\n§Y$JAP.neutral_Social$§! у власти.\n§Y$JAP.Neutral_Communism$§! у власти.\n§Y$JAP.anarchist_communism$§! у власти.\n"
 JAP_management_documents: "Строгое обращение с официальными документами."
 JAP_management_documents_desc: "Мы будем систематизировать и сохранять записи о политических решениях, историю административных процедур и документы, хранящиеся в государственных учреждениях, в соответствии с единым стандартом, одновременно укрепляя систему управления. Предотвращая разрозненность документов и ненадлежащее обращение с ними, а также повышая проверяемость и административную преемственность, мы стремимся повысить надежность и практическую эффективность государственных операций."
 JAP_digital_archiving: "Цифровое архивирование официальных документов"
 JAP_digital_archiving_desc: "Мы оцифруем официальные документы и будем управлять ими централизованно, чтобы упростить процедуры поиска, обмена и сохранения. Отказавшись от бумажной документации, мы сократим административную нагрузку и управленческие расходы, а также ограничим государственные затраты."
 JAP_independent_audits: "Полный независимый аудит"
 JAP_independent_audits_desc: "Мы обеспечим полную независимость аудиторских органов и создадим систему надзора, свободную от вмешательства политиков или бюрократии. Облегчив раннее выявление сговора и нарушений, мы продвинем усилия по борьбе с коррупцией, а восстановив доверие к политике, укрепим движущую силу реализации политики."
 JAP_eliminating_amakudari: "Искоренить амакуда́ри"
 JAP_eliminating_amakudari_desc: "Мы прекратим практику амакуда́ри, которая легко порождает сговор между бюрократами и корпорациями, и нанесем скальпель по укоренившимся лоббистским интересам. Повысив прозрачность в назначениях и усилив конкуренцию, мы ограничим коррупцию, одновременно снижая неэффективность и повышая производительность."
 JAP_disclosure_of_political_funding: "Полное раскрытие политического финансирования"
 JAP_disclosure_of_political_funding_desc: "Мы будем полностью раскрывать движение политических средств и делать доноров и расходы максимально прозрачными. Это сократит пространство для непрозрачных денег в политике и продвинет антикоррупционные усилия, одновременно усилив устойчивость к операциям влияния иностранных акторов."
 JAP_protecting_human_rights: "Защита прав человека"
 JAP_protecting_human_rights_desc: "Мы поставим защиту достоинства и прав каждого человека в основу государственного управления. Исправляя дискриминацию и несправедливое обращение и строя общество, в котором люди могут жить спокойно, мы укрепим внутреннюю сплоченность и стабильность."
 JAP_same_sex_partnerships: "Легализовать однополые партнёрства"
 JAP_same_sex_partnerships_desc: "Мы официально признаем однополые пары и создадим систему, которая снижает повседневные неудобства в таких сферах, как медицинское согласие, жильё и наследование. Уважая разнообразные формы семьи и уменьшая социальные разногласия, мы укрепим внутреннюю стабильность."
 JAP_employment_disabilities: "Расширить занятость людей с инвалидностью"
 JAP_employment_disabilities_desc: "Мы создадим условия, при которых люди смогут работать независимо от инвалидности, и расширим поддержку занятости и разумные приспособления на рабочем месте. Расширяя возможности для трудоустройства, мы укрепим рабочую силу, а через поощрение социальной активности внесем вклад во внутреннюю стабильность."
 JAP_prevent_domestic_violence: "Меры по предотвращению домашнего насилия"
 JAP_prevent_domestic_violence_desc: "Мы усилим профилактику и раннее выявление домашнего насилия, а также расширим консультативные службы и защитную поддержку. Разорвав цикл насилия и снизив незащищенность и жестокость в семье, мы повысим социальную стабильность."
 JAP_immigrants_and_refugees: "Повысить защиту иммигрантов и беженцев"
 JAP_immigrants_and_refugees_desc: "Мы укрепим приём и защиту иммигрантов и беженцев, а также создадим системы для справедливого отбора, поддержки проживания и содействия интеграции. Выполняя гуманитарные обязательства, мы также будем поощрять приток рабочей силы и направлять его на повышение социальной активности."
 JAP_protecting_labor_union: "Защита прав профсоюзов"
 JAP_protecting_labor_union_desc: "Мы четко гарантируем права профсоюзов и создадим условия, в которых коллективные переговоры и консультации между трудом и управлением могут проводиться надлежащим образом. Отражая голоса рабочих в институтах и корпоративном управлении, мы будем способствовать стабильности занятости и условий труда."
 JAP_subcontracto: "Покончить с давлением на субподрядчиков"
 JAP_subcontracto_desc: "Мы будем бороться с несправедливыми требованиями о снижении цен, задержками платежей и односторонними изменениями условий договоров, навязываемыми субподрядчикам, и создадим справедливую торговую среду. Защищая доходную базу малого и среднего бизнеса, мы укрепим здоровье всей цепочки поставок и внесем вклад в социальную стабильность."
 JAP_pressure_wage_increases: "Давление на повышение заработной платы"
 JAP_pressure_wage_increases_desc: "Мы будем поощрять компании повышать зарплаты и увеличивать доходы домохозяйств. Поддерживая потребление и снижая неуверенность в повседневной жизни, мы укрепим социальную стабильность и будем стремиться к доброкачественному экономическому циклу."
 JAP_regulation_temporary_agency_work: "Ужесточить регулирование временной работы через агентства"
 JAP_regulation_temporary_agency_work_desc: "Мы ограничим злоупотребление временной агентской рабочей силой и будем продвигать стабильность занятости и лучшие условия труда. Ставя на первое место безопасную долгосрочную рабочую среду вместо краткосрочной эффективности, мы укрепим социальную стабильность."
 JAP_ban_non_regular_employment: "Запретить нерегулярную занятость"
 JAP_ban_non_regular_employment_desc: "Мы реформируем практики занятости, основанные на нерегулярной работе, и перейдем к системе, в которой каждый может получить стабильную занятость и справедливое отношение. Сократив неуверенность в повседневной жизни и сдержав социальное расслоение, мы укрепим национальную стабильность."
 JAP_redistribution: "Отдать приоритет перераспределению"
 JAP_redistribution_desc: "Мы перейдем к политике, которая ставит в приоритет исправление неравенства доходов и экономической незащищенности, более щедро распределяя ресурсы тем, кто нуждается в поддержке. За счет перераспределения мы сократим социальное расслоение, повысим чувство безопасности людей и будем стремиться к стабильному управлению."
 JAP_reducing_medical_costs: "Снизить расходы на медицину из собственного кармана"
 JAP_reducing_medical_costs_desc: "Мы снизим расходы на медицину из собственного кармана и построим систему, в которой люди смогут получать необходимое лечение без колебаний. Смягчая финансовые тревоги для домохозяйств и сдерживая рост различий в здравоохранении, мы укрепим социальную стабильность."
 JAP_care_workers: "Улучшить оплату и условия труда соцработников"
 JAP_care_workers_desc: "Мы улучшим заработную плату и условия труда работников социальной сферы и будем способствовать набору и удержанию кадров. Укрепляя непрерывность ухода, снижая нагрузку на семьи и поддерживая участие в рабочей силе, мы внесем вклад в социальную стабильность."
 JAP_housing_support: "Расширить жилищную поддержку"
 JAP_housing_support_desc: "Мы расширим жилищную поддержку, чтобы снизить нагрузку на аренду и помочь людям обеспечить стабильное жилье. Смягчая жилищную незащищенность и поддерживая стабильность повседневной жизни, мы сократим социальное расслоение и укрепим внутреннюю стабильность."
 JAP_student_loans: "Снизить бремя студенческих кредитов"
 JAP_student_loans_desc: "Мы снизим бремя погашения студенческих кредитов и снизим барьеры для получения высшего образования и переквалификации. Продвигая развитие человеческого капитала как инвестицию в будущее, мы поддержим прогресс в исследованиях и технологиях."
 JAP_focusing_renewable_energy: "Сосредоточиться на возобновляемой энергии"
 JAP_focusing_renewable_energy_desc: "Мы сделаем расширение применения возобновляемой энергии национальным приоритетом и ускорим технологическое развитие и инвестиции в демонстрацию. Укрепляя основу для энергетического перехода, мы поддержим будущую стабильность поставок и повысим промышленную конкурентоспособность."
 JAP_renewable_energy_feed_in_tariffs: "Усилить тарифы на возобновляемую энергию"
 JAP_renewable_energy_feed_in_tariffs_desc: "Мы усилим систему тарификации отдачи для возобновляемой энергии, повышая предсказуемость инвестиций и ускоряя внедрение. Это поддержит расширение предложения возобновляемой электроэнергии и укрепит основу энергетического перехода."
 JAP_energy_efficiency: "Усилить стандарты энергоэффективности"
 JAP_energy_efficiency_desc: "Мы усилим стандарты энергоэффективности и будем способствовать повышению эффективности в жилище и бытовой технике. Снизив ненужное потребление электроэнергии, мы облегчим энергетическую нагрузку на домохозяйства и общество в целом."
 JAP_nuclear_phaseout: "Объявить о прекращении атомной энергетики"
 JAP_nuclear_phaseout_desc: "Мы ясно заявим о политике невозврата к атомной энергетике и примем позицию безъядерной страны. Как страна, подверженная землетрясениям, мы серьезно относимся к вопросам безопасности и продвинем переход к энергосистеме, основанной на возобновляемой энергии, стремясь к устойчивой энергетической политике."
 JAP_leading_disarmament: "Возглавить дипломатию разоружения"
 JAP_leading_disarmament_desc: "Мы сделаем разоружение и деэскалацию столпами нашей внешней политики и будем добиваться региональной стабильности через диалог и укрепление доверия. Мы будем ставить в приоритет решения, не зависящие от силы, и работать над улучшением отношений с другими странами."
 JAP_restricting_arms_exports: "Ограничить экспорт оружия"
 JAP_restricting_arms_exports_desc: "Мы ограничим экспорт вооружений и четко обозначим дипломатическую позицию, менее склонную разжигать военную напряженность. Ставя в приоритет разоружение и укрепление доверия, мы продвинем диалог ради региональной стабильности."
 JAP_principle_of_no_armed_forces: "Подтвердить принцип отсутствия вооружённых сил"
 JAP_principle_of_no_armed_forces_desc: "Мы подтвердим принцип отсутствия вооружённых сил и ясно заявим о подходе к управлению, который не опирается на военную мощь. Мы поставим пацифизм в основу нашей политики и подчеркнем безопасность через дипломатию и международное сотрудничество."
 JAP_abrogating_us_japan_security_treaty: "Отменить Японо-американский договор о безопасности"
 JAP_abrogating_us_japan_security_treaty_desc: "Мы выйдем из системы безопасности Япония–США и перейдём к независимой политике безопасности, не зависящей от Соединённых Штатов. Это расширит свободу нашей внешней политики и более ясно утвердит наш суверенитет и независимость."
 JAP_dissolving_sdf: "Распустить Силы самообороны"
 JAP_dissolving_sdf_desc: "Мы распустим Силы самообороны и перейдём к управлению, не зависящему от военной мощи. Перенаправив ресурсы и усилия, ранее потраченные на оборону, в гражданский сектор, мы сосредоточим внимание на укреплении промышленности и основ повседневной жизни и ускорим внутреннее развитие."
 JAP_army_delete_TT: "§RВсе сухопутные силы будут расформированы!§!"
 JAP_right: "Правое крыло Японии"
 JAP_right_desc: "Мы делаем упор на возможность государства и общественный порядок, продвигая более сильную общественную безопасность, реагирование на кризисы и внешнюю и оборонную политику, которая ставит национальные интересы на первый план. Мы стремимся к росту через регуляторную реформу и возрождение деловой активности, и хотим перестроить страну на основе традиций и общинных ценностей."
 JAP_right_TT: "§YВы можете значительно повысить рейтинг одной из правых партий!\nОднако, если это будет правящая партия, прирост останется небольшим.§!"
 JAP_strengthen_military_power: "Политика укрепления военной мощи"
 JAP_strengthen_military_power_desc: "С учётом изменений в обстановке безопасности мы ясно установим укрепление нашей оборонительной позиции как национальную политику. Усилив сдерживание, мы предотвратим угрозы до того, как они материализуются, и продемонстрируем нашу приверженность защите общественной безопасности и национального суверенитета."
 JAP_right_party_TT: "Должно выполняться одно из следующих условий:\n§Y$JAP.conservatism$§! у власти.\n§Y$JAP.socialism$§! у власти.\n§Y$JAP.Neutral_conservatism$§! у власти.\n§Y$JAP.Neutral_conservatism2$§! у власти.\n§Y$JAP.Neutral_conservatism3$§! у власти.\n§Y$JAP.Neutral_conservatism4$§! у власти.\n§Y$JAP.Neutral_Libertarian$§! у власти.\n§Y$JAP.Nat_Populism$§! у власти.\n"
 JAP_allow_overseas_deployment: "Разрешить зарубежные развертывания Сил самообороны"
 JAP_allow_overseas_deployment_desc: "Учитывая международную обстановку и сотрудничество с союзниками, мы ясно сформулируем политику, допускающую зарубежные развертывания Сил самообороны. Участвуя в международных миссиях, мы укрепим сдерживание и влияние, а также будем более активно защищать национальные интересы и безопасность."
 JAP_international_missions: "Правовая основа для международных миссий"
 JAP_international_missions_desc: "Мы создадим правовую базу и процедуры для участия в международных миссиях, вырабатывая систему, в которой Силы самообороны могут действовать по единым правилам. Это сократит неопределённость на местах и обеспечит более надёжное выполнение международного сотрудничества."
 JAP_revising_use_weapons: "Пересмотреть правила использования оружия"
 JAP_revising_use_weapons_desc: "Мы пересмотрим стандарты и процедуры применения оружия с учётом реалий международных миссий и реагирования на кризисы. Чётко определив пределы полномочий и ответственность, необходимые для выполнения задач, мы создадим систему, в которой Силы самообороны смогут адекватно защищать себя и других."
 JAP_exclusive_defense: "Сохранение исключительно оборонительной позиции"
 JAP_exclusive_defense_desc: "Мы будем строго придерживаться исключительно оборонительной позиции как руководящего принципа нашей безопасности, ясно ограничивая использование оборонительных возможностей рамками предотвращения нападений на нашу страну. Сохраняя сдерживание, мы избежим чрезмерного военного расширения и продемонстрируем позицию, менее склонную к обострению напряжённости с соседями."
 JAP_exclusive_defense_TT: "§YЭтот национальный фокус приближает баланс сил к уровню 2!§!"
 JAP_collective_self_defense: "Политика допуска коллективной самообороны"
 JAP_collective_self_defense_desc: "Исходя из того, что нападения на союзников могут прямо угрожать нашей безопасности, мы ясно сформулируем политику, допускающую осуществление коллективной самообороны. Это укрепит сдерживание, эффективность союзов и построит более проактивную систему безопасности."
 absolute_majority_popularity_66_TT: "Коалиция должна иметь более 66% популярности."
 JAP_prioritizing_order: "Приоритет порядку"
 JAP_prioritizing_order_desc: "Мы поставим общественный порядок и безопасность на первое место в управлении. Ценя правила и ответственность и поддерживая общественную безопасность и стабильное управление, мы восстановим основы нации."
 JAP_strengthen_public_security: "Всеобъемлющий план общественной безопасности"
 JAP_strengthen_public_security_desc: "Мы проведём полный обзор системы общественной безопасности и разработаем комплексный план по оборудованию, персоналу и информационной координации. Оптимизируя работу на местах и укрепляя возможности полиции, мы усилим сдерживание преступности и обеспечим социальную стабильность."
 JAP_against_organized_crime: "Ужесточение мер против организованной преступности"
 JAP_against_organized_crime_desc: "Мы усилим борьбу с организованной преступностью и продвинем меры по перекрытию каналов финансирования и расширению следственного потенциала. Восстановив внутреннюю безопасность, мы укрепим стабильность общества и создадим систему, менее уязвимую к проникновению и влиянию внешних акторов."
 JAP_against_terrorist_financing: "Меры против финансирования терроризма"
 JAP_against_terrorist_financing_desc: "Мы будем строго контролировать потоки финансирования и полностью применять системы, прерывающие каналы денег террористическим организациям и экстремистским группам. Укрепляя координацию между финансовыми органами и следственными службами, мы защитим внутреннюю безопасность и повысим устойчивость к внешнему влиянию, одновременно укрепляя общественную стабильность."
 JAP_counter_espionage: "Создание антишпионской системы"
 JAP_counter_espionage_desc: "Мы укрепим контрмеры против разведывательной деятельности и создадим систему защиты секретной информации и усиленного контроля. Сдерживая проникновение и скрытые операции внешних акторов и защищая национальное принятие решений, мы обеспечим внутреннюю стабильность."
 JAP_strengthening_cabinet: "Укрепление полномочий кабинета"
 JAP_strengthening_cabinet_desc: "Мы усилим цепочку командования и координацию Кабинета для повышения скорости и согласованности принятия решений. Создав систему, способную быстро действовать при кризисе и по ключевым политике, мы укрепим решающее руководство в государственном управлении."
 JAP_cabinet_personnel_bureau: "Бюро по кадровым вопросам Кабинета"
 JAP_cabinet_personnel_bureau_desc: "Мы создадим систему, в которой Кабинет централизованно контролирует кадровые вопросы, укрепляя прозрачность и контроль над назначениями на высшие должности. Продвигая нужных людей на нужные позиции, мы оптимизируем работу бюрократии и повысим способность правительства реализовывать политику."
 JAP_breaking_down_bureaucratic_siloing: "Ликвидация бюрократических силосов"
 JAP_breaking_down_bureaucratic_siloing_desc: "Мы реформируем разрозненное администрирование между министерствами и укрепим обмен информацией и межведомственную координацию. Сократив дублирование процедур и узкие места, мы упростим работу госаппарата и ускорим реализацию общественных инвестиций и проектов."
 JAP_policy_evaluation_and_kpis: "Введение оценки политики и KPI"
 JAP_policy_evaluation_and_kpis_desc: "Мы введём систему оценки и ключевые показатели эффективности, чтобы результаты политики проверялись измеримыми данными. Пересматривая малоэффективные меры и концентрируя ограниченные ресурсы на наиболее значимых областях, мы повысим административную эффективность и увеличим экономическую продуктивность."
 JAP_national_security_council: "Создание Совета национальной безопасности"
 JAP_national_security_council_desc: "Мы централизуем информацию и принятие решений по безопасности в Кабинете и создадим систему, позволяющую оперативно и последовательно принимать решения. Укрепляя возможности реагирования на кризисы и координацию с союзниками и профильными агентствами, мы усил��м сдерживание."
 JAP_emergency_powers: "Положение о чрезвычайных полномочиях"
 JAP_emergency_powers_desc: "В подготовке к чрезвычайным ситуациям, таким как крупные катастрофы или вооружённые нападения, мы уточним полномочия и процедуры, необходимые в чрезвычайных условиях. Сохраняя контроль в мирное время, мы ускорим реагирование на кризисы и укрепим цепочку командования, обеспечив национальную стабильность и оборонную готовность."
 JAP_regulatory_reform: "Рост через регуляторную реформу"
 JAP_regulatory_reform_desc: "Мы пересмотрим нормы и процедуры, снизим административные барьеры и будем стимулировать деловую активность и инвестиции. Сделав проще запуск новых предприятий и развитие объектов, мы ускорим темпы экономического роста."
 JAP_postal_privatization: "Приватизация почты"
 JAP_postal_privatization_desc: "Мы продвинем приватизацию почтовых услуг, изменив систему под управлением государства для повышения эффективности госаппарата. Внедрение рыночных принципов должно усилить деловую активность и налоговую базу, но реформа также может вызвать сильное сопротивление и усилить политические разногласия."
 JAP_postal_privatization_TT: "§YСработает событие, где вам предстоит решить, проводить ли досрочные выборы!§!"
 JAP_second_wave_privatization: "Вторая стадия приватизации"
 JAP_second_wave_privatization_desc: "Мы продолжим реформы приватизации и пересмотрим роль государственного сектора и работу общественных услуг. Сократив административную неэффективность и стимулировав инвестиции и деловую активность, мы оживим экономику."
 JAP_special_zones: "Национальные стратегические специальные зоны"
 JAP_special_zones_desc: "Мы создадим регуляторные исключения в отдельных зонах и интенсивно будем продвигать вход бизнеса и новые инвестиции. Продвигая демонстрационные проекты и коммерциализацию за пределами существующих институциональных барьеров, мы ускорим рост за счёт частной инициативы и оживим местную экономику."
 JAP_expansion_regulatory_reform_zones: "Расширение зон реформ"
 JAP_expansion_regulatory_reform_zones_desc: "Мы масштабируем результаты, достигнутые в специальных зонах, по всей стране, превращая регуляторную реформу из регионального исключения в национальный стандарт. Снизив барьеры для входа и инвестиций, мы будем стимулировать новые предприятия и способствовать экономическому обновлению по всей стране."
 JAP_new_market_entry: "Содействие входу на новые рынки"
 JAP_new_market_entry_desc: "Мы снизим барьеры для входа и поддержим предпринимательство и запуск новых бизнесов. Стимулируя конкуренцию и инновации, мы увеличим продуктивность и укрепим налоговую базу."
 JAP_new_technologies: "Поддержка новых технологий"
 JAP_new_technologies_desc: "Мы активно поддержим внедрение и коммерциализацию новых технологий, ускоряя исследовательскую работу и промышленное обновление. Развивая новые сектора роста, мы укрепим национальную конкурентоспособность."
 JAP_key_industries_back_home: "Возвращение стратегических отраслей"
 JAP_key_industries_back_home_desc: "Мы построим систему, обеспечивающую стабильное внутреннее производство критически важных отраслей, укрепим цепочки поставок и повысим самодостаточность в ключевых секторах. Стимулируя внутренние инвестиции, мы укрепим промышленную базу и создадим структуру, менее уязвимую к международным изменениям."
 JAP_economic_security: "Обеспечение экономической безопасности"
 JAP_economic_security_desc: "Мы пересмотрим поставки критических материалов и ключевых отраслей, а также управляем рисками в технологиях, капитале и информации, чтобы создать экономическую безопасность. Это усилит национальную самодостаточность и устойчивую конкурентоспособность компаний, поддерживая стабильный рост."
 JAP_patriotic_education: "Патриотическое образование"
 JAP_patriotic_education_desc: "Мы будем продвигать образование, подчеркивающее историю, культуру и гражданскую ответственность нации, укрепляя социальное единство и чувство общих норм. Создавая основу, менее подверженную внешнему влиянию, мы усилим внутреннюю стабильность."
 JAP_fundamentals_of_education: "Переосмысление основ образования"
 JAP_fundamentals_of_education_desc: "Мы пересмотрим цели и стандарты образования и заново определим в качестве национальной политики развитие академических способностей, фундаментальных знаний и практических навыков. Уделяя приоритет инвестициям в образование, мы укрепим основы для развития человеческого капитала и исследований."
 JAP_dotoku_education: "Образование по дотоку"
 JAP_dotoku_education_desc: "Мы увеличим внимание к дотоку-образованию и будем формировать в школьном обучении ценности гражданственности, ответственности и внимательности к другим. Укрепляя социальные нормы и углубляя сплочённость в местных сообществах, мы внесём вклад в внутреннюю стабильность."
 JAP_national_flag_and_anthem: "Уважение флага и гимна"
 JAP_national_flag_and_anthem_desc: "Мы ясно подтвердим уважение к флагу и национальному гимну, укрепляя чувство национальной принадлежности и общественного единства. Это усилит сплочённость в кризисные периоды и создаст основу, менее подверженную внешнему влиянию."
 JAP_family_policy: "Укрепление семейной политики"
 JAP_family_policy_desc: "Мы будем уважать ценности домохозяйств и семей и расширим меры, поддерживающие воспитание детей и повседневную жизнь. Создавая среду, в которой семьи могут строиться с уверенностью, мы укрепим демографическую основу будущего и внесём вклад в социальную стабильность."
 JAP_glorious_decade: "К десятилетию процветания"
 JAP_inflation_target: "Прояснение обязательств по политике"
 JAP_down_long_term_interest_rates: "Снижение долгосрочных ставок"
 JAP_down_long_term_interest_rates_desc: "Мы будем поддерживать низкие и стабильные долгосрочные процентные ставки, снижая стоимость финансирования для предприятий и домохозяйств. Поддерживая инвестиции, обновление капитала и покупку жилья, тем самым укрепляя спрос и стимулируя экономику, мы также создадим условия для восстановления налоговых поступлений."
 JAP_cash_benefits: "Денежные пособия для домохозяйств"
 JAP_cash_benefits_desc: "Мы предоставим прямую поддержку домохозяйствам, чтобы предотвратить падение потребления и поддержать экономику. Создав среду, в которой люди могут продолжать повседневные расходы даже при высокой неопределённости, мы поможем восстановлению спроса."
 JAP_public_investment: "Планируемые государственные инвестиции"
 JAP_public_investment_desc: "Чтобы не допустить углубления спада, мы продолжим государственные инвестиции в плановом порядке и поддержим спрос. Одновременно мы укрепим логистику, систему предупреждения катастроф и базовую инфраструктуру, создавая среду, в которой частные инвестиции могут активизироваться легче."
 JAP_special_inspection_banks: "Специальные проверки банков"
 JAP_special_inspection_banks_desc: "Чтобы восстановить устойчивость финансовой системы, мы проведём тщательное исследование активов банков. Прояснив реальное положение проблемных кредитов и прекратив отсрочку убытков и непрозрачное ведение дел, мы создадим опору для остановки цепной реакции кредитной тревоги и ужесточения кредитования."
 JAP_population_tax_tt: "Ставка налога на население составляет 35 или ниже."
 JAP_public_capital_injection_banks: "Государственные капиталовложения в банки"
 JAP_public_capital_injection_banks_desc: "Чтобы не допустить распространения финансовой нестабильности, мы укрепим капитал банков и сохраним приток кредита. Успокоив вкладчиков и рынки и поддерживая движение средств бизнесу и домохозяйствам, мы избежим резкого ухудшения экономики."
 JAP_disposal_non_performing_loans: "Избавьтесь от опасных невозвратных кредитов."
 JAP_disposal_non_performing_loans_desc: "Избавьтесь от опасных проблемных кредитов, подрывающих финансовую систему, и облегчите нагрузку на балансы банков."
 JAP_bank_supervision: "Укрепление банковского надзора"
 JAP_bank_supervision_desc: "Вместо того чтобы рассматривать проверки и корректирующие меры как разовое действие, мы постоянно укрепим надзорную систему. Применяя раскрытие информации и корпоративное управление и предотвращая повторение слабого управления рисками и непрозрачности, мы стабилизируем доверие к финансовой системе."
 JAP_business_assessment: "Объективная оценка бизнеса"
 JAP_business_assessment_desc: "Чтобы точно определить способности и риски компаний, мы объективно оценим прибыльность и перспективы. Не опираясь на поддержание фирм искусственно, мы выделим области, требующие реструктуризации, от тех, которые следует перестроить, и подготовим почву для притока капитала и талантов в сектора роста."
 JAP_corporate_debt_restructuring: "Реструктуризация корпоративного долга"
 JAP_corporate_debt_restructuring_desc: "Мы решим проблему чрезмерной долговой нагрузки и обеспечим время и свободу действий для восстановления. Отказавшись от состояния, когда фирмы поглощены процентными платежами и выплатами, и направив ресурсы на инвестиции, занятость и трансформацию бизнеса, мы разорвём цепь стагнации."
 JAP_support_restructuring_unprofitable_sectors: "Поддержка реструктуризации убыточных подразделений"
 JAP_support_restructuring_unprofitable_sectors_desc: "Мы окажем помощь компаниям, которые переходят к реорганизации убыточных подразделений, чтобы реструктуризация могла пройти гладко. Ограничивая резкое ухудшение занятости и шоки для местных сообществ, мы будем стимулировать стратегическую концентрацию и ускорим переход к устойчивой структуре."
 JAP_m_and_a: "M&A и консолидация бизнеса"
 JAP_m_and_a_desc: "Мы будем поощрять слияния и корпоративные преобразования, чтобы устранить дублирующие инвестиции и избыточные мощности. За счёт эффекта масштаба и концентрации управленческих ресурсов мы повысим производительность и укрепим исследования и разработки, стремясь восстановить конкурентоспособность."
 JAP_corporate_revitalization: "Оживление корпораций"
 JAP_corporate_revitalization_desc: "Мы выведем реструктуризацию на новый уровень и восстановим корпоративные основы как финансово, так и операционно. Решая проблему чрезмерных нагрузок и неэффективности и выводя компании в положение, где они могут предпринимать инвестиции, нанимать и повышать зарплаты, мы укрепим восстановление, основанное на частном секторе."
 JAP_expectations_escaping_deflation: "Восстановление ожиданий роста"
 JAP_expectations_escaping_deflation_desc: "Урегулировав проблемные кредиты и списав чрезмерную задолженность, мы переключим фокус экономики с «обороны» на «нападение». Если компании возобновят инвестиции, исследования и разработки, а также в персонал, и домохозяйства обретут более ясное видение будущего, то с большей вероятностью закрепится благоприятный цикл роста производительности и заработной платы. Мы заложим фундамент, необходимый для полного восстановления конкурентоспособности."
 JAP_public_private_calls_wage_increases: "Государственно-частный призыв к росту зарплат"
 JAP_public_private_calls_wage_increases_desc: "Правительство возглавит работу с бизнес-сообществом, чтобы расширить импульс роста зарплат. Связывая улучшение корпоративной прибыли с более высокими зарплатами и укрепляя покупательную способность домохозяйств, мы поддержим восстановление спроса и ценовую стабильность."
 JAP_phased_increases_to_the_minimum_wage: "Поэтапное повышение минимальной зарплаты"
 JAP_phased_increases_to_the_minimum_wage_desc: "Мы будем повышать минимальную зарплату поэтапно, чтобы увеличить доходы трудящихся. Укрепляя покупательную способность домохозяйств с низкими доходами, мы поддержим восстановление внутреннего спроса и создадим условия для распространения роста зарплат."
 JAP_promoting_labor_mobility: "Содействие мобильности рабочей силы"
 JAP_promoting_labor_mobility_desc: "Мы создадим условия, при которых талантам станет легче переходить в сектора роста и продвигать перераспределение рабочей силы. Снизив барьеры для смены работы и повторного трудоустройства и поддерживая повышение квалификации, мы ускорим обновление отраслей и повысим производительность."
 JAP_competition_service_sector: "Содействие конкуренции в сфере услуг"
 JAP_competition_service_sector_desc: "Мы будем стимулировать вход и конкуренцию в сектор услуг и исправлять неэффективность и жёсткость цен, которые способствуют стагнации. Пересмотрев регулирование и устоявшиеся практики, мы улучшим деловую среду и сместимся к рынку, где лучшие услуги выбираются легче."
 JAP_improving_domestic_service_sector: "Улучшение условий для отечественных услуг"
 JAP_improving_domestic_service_sector_desc: "Мы создадим условия, при которых отрасли внутренних услуг могут расти и расширять ёмкость экономики для поглощения спроса. Пересмотрев процедуры и практики, которые обременяют работу на переднем крае, и поддержав инвестиции и развитие кадров, мы внесём вклад в устойчивое восстановление внутреннего спроса."
 JAP_international_liberalization_service_sector: "Международное открытие сектора услуг"
 JAP_international_liberalization_service_sector_desc: "Мы откроем сектор услуг международно и привлечём внешнюю конкуренцию и ноу-хау. Поощряя выход иностранных компаний и согласуя стандарты с международными, расширяя выбор для потребителей, мы исправим замкнутость внутреннего рынка и стимулируем обновление."
 JAP_revitalization_economy: "Оживление экономики Японии"
 JAP_revitalization_economy_desc: "Мы продвинули восстановление финансовой системы и корпоративного сектора и наметили путь к восстановлению спроса и повышению зарплат. Устраняя причины стагнации одну за другой и создавая среду, в которой домохозяйства и бизнес яснее видят будущее, мы закрепим импульс роста."
 JAP_work_style_reform: "Реформа рабочего стиля"
 JAP_work_style_reform_desc: "Мы начнём с исправления чрезмерно долгих рабочих часов и создания среды, в которой люди могут выбирать разные способы работы. Поддерживая и стабильность занятости, и баланс между работой и личной жизнью, мы снизим нагрузку на местах и создадим основу, позволяющую людям продолжать вносить вклад и развиваться."
 JAP_cap_on_overtime_hours: "Установление пределов сверхурочной работы"
 JAP_cap_on_overtime_hours_desc: "Чтобы сдержать чрезмерно длинные рабочие часы, мы установим чёткие лимиты на сверхурочную работу. Снизив вред для здоровья и риск переработок и обеспечив надлежащее трудовое управление, мы формализуем улучшения в рабочих практиках."
 JAP_mandating_paid_leave: "Обязательное оплачиваемое отпуск"
 JAP_mandating_paid_leave_desc: "Мы институционализируем среду, в которой брать отпуск станет проще, и потребуем от сотрудников использовать минимальный объём оплачиваемых дней. Обеспечив достаточный отдых и снизив физические и психические проблемы, а также текучесть кадров, мы будем способствовать удержанию на рабочем месте и более устойчивым формам труда."
 JAP_digitalization_management: "Поддержка цифрового учёта рабочего времени"
 JAP_digitalization_management_desc: "Мы будем продвигать цифровизацию учёта времени и посещаемости, чтобы отслеживать и управлять рабочим временем точнее. Снизив административную нагрузку на местах и обеспечив тщательное соблюдение норм, мы создадим систему, которая не позволит пропускать случаи чрезмерной работы."
 JAP_equal_pay_for_equal_work: "Равная оплата за равный труд"
 JAP_equal_pay_for_equal_work_desc: "Мы исправим необоснованные различия в отношении в зависимости от статуса занятости и обеспечим, чтобы одинаковая работа оплачивалась одинаково. Укрепляя чувство справедливости у работников и улучшая удержание и набор кадров, одновременно сокращая разрыв между постоянными и непостоянными сотрудниками, мы создадим более стабильную трудовую среду."
 JAP_minimum_rest: "Минимальный отдых между сменами"
 JAP_minimum_rest_desc: "Мы обеспечим установленный период отдыха между окончанием одного рабочего дня и началом следующего, чтобы предотвратить накопление усталости от последовательной работы. Защищая время для сна и восстановления и снижая проблемы со здоровьем и ошибки, мы закрепим устойчивый график работы."
 JAP_flexible_working: "Расширение гибкого режима работы"
 JAP_flexible_working_desc: "Мы увеличим гибкость рабочего времени, чтобы людям было проще выбирать графики, соответствующие их обстоятельствам. Снизив напряжение в поездках и поддержав сочетание работы с уходом за детьми и родственниками, мы расширим среду, в которой можно продолжать работать.\" JAP_ideal_working_styles: \"Идеальные условия труда"
 JAP_ideal_working_styles: "Идеальный способ работы"
 JAP_ideal_working_styles_desc: "Мы установили рабочие практики, не зависящие от длинных часов, и создали среду, в которой люди с разными жизненными обстоятельствами могут продолжать работать с уверенностью. Через системы, делающие нормальным отдых при необходимости и гибкую работу при необходимости, мы сделаем баланс работы и жизни стандартом."
 JAP_basic_policy_declining_birthrate_society: "Основы политики по снижению рождаемости"
 JAP_basic_policy_declining_birthrate_society_desc: "Мы определим решение проблемы снижения рождаемости главным национальным приоритетом и всесторонне организуем политику, поддерживающую воспитание детей и повседневную жизнь. Создавая среду, в которой семьи могут планировать будущее, и продвигая баланс между работой и воспитанием, мы заложим основу для повышения рождаемости."
 JAP_zero_waiting: "Ноль очередей в детские сады"
 JAP_zero_waiting_desc: "Мы расширим ёмкость дошкольных учреждений и создадим систему, в которой семьи, нуждающиеся в услугах, смогут надежно их получать. Увеличив число воспитателей и улучшив условия, мы снизим препятствия для сочетания воспитания детей и работы."
 JAP_increasing_childbirth_allowance: "Увеличение пособия при рождении ребёнка"
 JAP_increasing_childbirth_allowance_desc: "Мы снизим нагрузку на семейный бюджет за счёт первичных расходов на рождение ребёнка и создадим среду, в которой люди смогут подходить к этому событию спокойнее. Сняв финансовую тревогу и упростив выбор завести ребёнка, мы поддержим рождаемость."
 JAP_free_early_childhood_education: "Бесплатное дошкольное образование и уход"
 JAP_free_early_childhood_education_desc: "Мы снизим финансовую нагрузку на дошкольное образование и уход за детьми и поддержим семейные бюджеты тех, кто растит детей. Создавая условия, предотвращающие расширение разрыва в образовательных возможностях, и продвигая баланс работы и воспитания, мы поможем сформировать общество, где иметь детей проще."
 JAP_parental_leave: "Поощрение родительского отпуска"
 JAP_parental_leave_desc: "Мы создадим среду, в которой родительский отпуск станет проще брать, и расширим варианты продолжения работы после рождения ребёнка. Укрепляя понимание на рабочем месте и работу систем, а также создавая рамки, в которых и мужчины, и женщины могут участвовать в воспитании детей, мы распределим бремя внутри семьи и снизим тревогу по поводу рождения детей."
 JAP_child_allowances: "Расширение детских пособий"
 JAP_child_allowances_desc: "Чтобы снизить постоянные расходы на воспитание детей, мы расширим детские пособия. Сделав семейные финансы более предсказуемыми и уменьшив тревогу по поводу образования и повседневных расходов, мы поддержим выбор иметь детей."
 JAP_fertility_treatment: "Страховое покрытие лечения бесплодия"
 JAP_fertility_treatment_desc: "Мы снизим финансовую нагрузку на лечение бесплодия и создадим среду, в которой нуждающиеся смогут проще получить лечение. Снизив барьеры стоимости, мы расширим возможности к беременности и рождению ребёнка и облегчим людям путь к исполнению их надежд."
 JAP_raising_children_is_easier: "Общество, удобное для детей"
 JAP_raising_children_is_easier_desc: "Мы построили системы, поддерживающие бремя воспитания детей во всем обществе, и расширили среду, в которой люди могут создавать семьи с уверенностью. Сочетая детский уход, образование и финансовую поддержку и делая нормальным баланс работы и воспитания, мы снизим тревогу о будущем и поможем улучшить рождаемость."
 JAP_save_ice_age_generation: "Спасти поколение «ледникового периода занятости\""
 JAP_save_ice_age_generation_desc: "Мы рассмотрим нестабильную занятость, низкие зарплаты и отложенное развитие навыков поколения «ледникового периода» как общенациональную проблему. Обеспечив рабочие места и возможности для второго шанса, а также восстановив среду, в которой люди могут достичь устойчивости и планировать будущее, мы помешаем продолжению разрыва и стагнации."
 JAP_hello_work: "Переворот службы занятости Hello Work"
 JAP_hello_work_desc: "Мы преобразуем службы трудоустройства из \"пункта приема заявок на всякий случай\" в практическую организацию, которая поддерживает людей на всех этапах, вплоть до повторного трудоустройства. Повысив прозрачность качества рабочих мест и улучшив точность подбора персонала, мы построим систему, в которой подходящие рабочие места и поддержка дойдут до тех, кто в них нуждается."
 JAP_expanding_social_insurance_coverage: "Расширение охвата социального страхования"
 JAP_expanding_social_insurance_coverage_desc: "Мы расширим право на участие, чтобы люди, которым нужно социальное страхование, могли вступить в систему независимо от формы занятости. Снижая разрывы в системе и уменьшая тревогу по поводу здравоохранения, пенсий и занятости, мы стабилизируем основы жизни групп, чаще работающих на непостоянной работе."
 JAP_vocational_training: "Расширение профессионального обучения"
 JAP_vocational_training_desc: "Мы расширим возможности профессионального обучения, чтобы люди могли получить навыки, необходимые для нового старта. Поддерживая переход в востребованные области и связывая переквалификацию с трудоустройством, мы создадим опору для выхода из долгосрочной стагнации."
 JAP_digital_reskilling: "Пакет цифровой переподготовки"
 JAP_digital_reskilling_desc: "Мы предложим комплексную поддержку, позволяющую постепенно освоить от базовых цифровых навыков до практических рабочих компетенций. Снижая нагрузку на обучение и создавая программы подготовки и сертификации, ведущие к занятости, мы расширим пути нового старта даже для тех, у кого меньше опыта."
 JAP_converting_regular_employment: "Субсидии за перевод на регулярную занятость"
 JAP_converting_regular_employment_desc: "Мы поддержим компании, которые стимулируют переход от непостоянной к постоянной занятости, увеличивая число стабильных рабочих мест. Разрывая устоявшиеся модели занятости и расширяя среду, в которой люди могут строить карьеру и планировать жизнь, мы предотвратим превращение неуверенности поколения «ледникового периода» в долгосрочную."
 JAP_job_change_market: "Улучшение рынка трудоустройства в середине карьеры"
 JAP_job_change_market_desc: "Мы построим систему трудоустройства для среднего звена, менее зависимую от возраста или происхождения, расширяя возможности нового старта. Улучшив прозрачность вакансий и критериев оценки и создав условия, при которых опыт и навыки правильно ценятся, мы облегчим мобильность рабочей силы."
 JAP_rent_housing_support: "Субсидии на аренду и жильё"
 JAP_rent_housing_support_desc: "Мы предоставим поддержку, уменьшающую жилищную незащищённость, чтобы она не мешала людям выбирать работу или переезжать. Снижая арендные расходы и укрепляя механизмы обеспечения жилья, мы поможем людям восстановить жизнь и начать заново."
 JAP_support_marriage_and_starting_a_new: "Поддержка брака и создания нового хозяйства"
 JAP_support_marriage_and_starting_a_new_desc: "Мы снизим нагрузку на начальные расходы, связанные с браком или началом совместной жизни, и создадим среду, в которой начать новую жизнь проще. Снизив барьеры, связанные с жильём, финансами и бюрократией, и уменьшая тревогу о будущем, мы расширим возможности для создания семьи."
 JAP_reviving_lost_generation: "Возрождение потерянного поколения"
 JAP_reviving_lost_generation_desc: "Мы работаем над устранением закрепления нестабильной занятости, продвигая переподготовку, повторное трудоустройство и восстановление условий жизни как единый пакет. Обеспечивая занятость и условия труда, позволяющие поколению «ледникового периода» планировать будущее, а также создавая среду, в которой они могут делать шаги к созданию семьи и накоплению, мы преодолеем долгосрочное разделение."
 JAP_industries: "Отрасли Японии"
 JAP_industries_desc: "От местного сельского хозяйства, лесного и рыбного хозяйства до производства, услуг и передовых технологий — мы раскроем сильные стороны Японии по всей промышленной карте. Поддерживая внутреннюю занятость и производственные мощности, мы будем сочетать конкурентоспособность экспорта с инвестициями в новые сферы роста, проводя нашу промышленную основу в следующую эпоху."
 JAP_rice_and_sake: "Рис и сакэ"
 JAP_rice_and_sake_desc: "Рис — основная пища японцев и фундамент, поддерживающий как обеденный стол, так и сельские общины. А японское саке, изготовленное из риса, воплощает в себе отчетливо «японский» характер, которым можно с гордостью делиться как дома, так и за рубежом. Его индивидуальность формируется климатом и водными ресурсами каждого региона, а также мастерством пивоваров."
 JAP_wagyu: "Ваґю"
 JAP_wagyu_desc: "Ваґю — одна из фирменных японских премиальных продуктов, известная своей тонкой мраморностью и богатым вкусом. Опираясь на силу технологий разведения и контроля качества, мы продолжим поддерживать японскую пищевую культуру и развивать её как отрасль, способную также завоевать зарубежный спрос как бренд."
 JAP_seafood: "Морепродукты островной нации"
 JAP_seafood_desc: "Как островная нация, Япония живёт рядом с морем. Морепродукты, созданные в её разнообразных водах, являются важным ресурсом для повседневных блюд и региональной промышленности, а также определяют японскую пищевую культуру."
 JAP_automobiles: "Автомобили Японии"
 JAP_automobiles_desc: "Японская автомобильная промышленность выросла благодаря высокому качеству и надёжности, а также глубокой и устойчивой сети поставок комплектующих. Такие производители, как Toyota, Honda, Nissan, Mazda, Subaru, Suzuki, Mitsubishi Motors и другие, составляют ядро внутренней занятости и экспорта, одновременно адаптируясь к технологиям следующего поколения и сохраняя конкурентоспособность."
 JAP_japanese_brand: "Создание бренда Japan"
 JAP_japanese_brand_desc: "Опираясь на наши сильные стороны в качестве и доверии, мы будем последовательно представлять ценность наших продуктов и услуг как «японский бренд». Совершенствуя такие элементы, как происхождение, технологии, дизайн и безопасность, и четко объясняя, почему нас выбирают как внутри страны, так и за рубежом, мы создадим конкурентоспособность, не зависящую от ценовой конкуренции."
 JAP_semiconductor: "Полупроводники и электронные компоненты"
 JAP_semiconductor_desc: "Полупроводники и электронные компоненты — стратегические области, лежащие в основе каждой отрасли. Опираясь на наши сильные стороны в материалах, оборудовании для производства и комплектующих, а также укрепляя НИОКР и производственные мощности, мы поддержим промышленную основу Японии и технологическую конкурентоспособность."
 JAP_machinery_that_supports_manufacturing: "Создание машин для производства"
 JAP_machinery_that_supports_manufacturing_desc: "Японское производство в своей основе поддерживают точные машины для обработки, сборки и контроля. Совершенствуя технологии станков и производственного оборудования и продолжая строить машины, которые соответствуют потребностям на местах, мы поддержим качество и производственные мощности широкого круга отраслей."
 JAP_small_factory_craftsmanship: "Сохранение мастерства небольших заводов"
 JAP_small_factory_craftsmanship_desc: "Навыки, культивируемые небольшими мастерскими, такие как механическая обработка, изготовление штампов и поверхностная обработка, являются фундаментом, поддерживающим японское производство. Обеспечивая следующую смену квалифицированных кадров, содействуя передаче ноу-хау и улучшая деловую среду, мы гарантируем, что эти локально укоренённые способности не потеряются и перейдут следующему поколению."
 JAP_broadband: "Развитие широкополосной инфраструктуры"
 JAP_broadband_desc: "Мы разовьём широкополосную инфраструктуру, чтобы стабильное высокоскоростное соединение было доступно по всей стране. Сокращая разрыв между городом и деревней и поддерживая расширение онлайн-деятельности бизнеса, образования и государственных услуг, мы укрепим основу цифрового общества."
 JAP_games_are_fun: "Игры — это весело!"
 JAP_games_are_fun_desc: "Игры — одна из культур развлечений Японии, которую страна может с гордостью представить миру. Nintendo принесла игру широким поколениям через домашние консоли и персонажные интеллектуальные собственности, а Sony (PlayStation) создала глобальный рынок, основанный на аппаратном обеспечении и онлайн-сервисах. Соединяя творчество с технологиями, мы дальше разовьём эту область как столп, поддерживающий отечественную индустрию и способность Японии коммуницировать и конкурировать на мировом уровне."
 JAP_cool_japan: "Цифровой экспорт Cool Japan"
 JAP_cool_japan_desc: "Мы построим системы для непрерывной доставки японского контента, такого как аниме, игры, музыка и видео, через цифровые рынки. Укрепляя распространение, перевод и управление правами и охватывая зарубежный спрос, мы усилим культурное влияние Японии и рентабельность этих отраслей."
 JAP_port_logistics: "Модернизация портовой логистики"
 JAP_port_logistics_desc: "Мы улучш��м логистические функции в портах, такие как обработка грузов, хранение и таможенное оформление, чтобы поток импорта и экспорта стал менее уязвимым для сбоев. Повышая эффективность процедур и совершенствуя объекты, мы укрепим устойчивость цепочек поставок, сохранив конкурентоспособность в международной логистике."
 JAP_fiber_optic_rollout: "Национальное расширение оптоволоконных сетей"
 JAP_fiber_optic_rollout_desc: "Мы расширим развертывание оптоволоконных сетей, чтобы во всех регионах страны было доступно быстрое и стабильное соединение. Сокращая разрыв в подключении между городом и деревней, мы создадим инфраструктуру, поддерживающую удалённую работу, обучение и онлайн-трансформацию бизнеса."
 JAP_diplomacy: "Японская дипломатия"
 JAP_diplomacy_desc: "Восстановление связей с миром и переопределение роли Японии в международном сообществе."
 JAP_diplomacy_idea_TT: "§YПо мере продвижения по дипломатическому дереву к этому национальному духу будут добавляться дополнительные модификаторы!§!"
 JAP_friendship_asean: "Улучшение отношений с АСЕАН"
 JAP_friendship_asean_desc: "Правительство Японии будет работать над улучшением отношений со странами АСЕАН, продвигая восстановление доверия и диалог. Для Японии АСЕАН — незаменимый партнёр как в экономике, так и в сфере безопасности, и его единство и стабильность определят будущее всего региона."
 JAP_not_asean_war_TT: "Есть по крайней мере одна страна с национальным духом \"Член АСЕАН\", и Япония не находится в состоянии войны ни с одной страной, имеющей национальный дух \"Член АСЕАН\"."
 JAP_chiang_mai: "Инициатива Чиангмай"
 JAP_chiang_mai_desc: "Через Инициативу Чиангмай Япония укрепляет региональное финансовое сотрудничество, поддерживая экономическую стабильность и сплочённость стран АСЕАН."
 JAP_quantitative_oda: "Количественная ОДА"
 JAP_quantitative_oda_desc: "Через масштабные инвестиции ОДА в ключевую инфраструктуру, такую как транспорт, порты и энергетика, Япония поддерживает экономический рост АСЕАН и региональную связанность."
 JAP_qualitative_oda: "Качественная ОДА"
 JAP_qualitative_oda_desc: "Партнёрствуя с местными предприятиями и институтами, Япония продвигает развитие человеческого капитала и демократических ценностей, усиливая своё влияние в АСЕАН."
 JAP_security_south_china_sea: "Позиция безопасности в Южно-Китайском море"
 JAP_security_south_china_sea_desc: "Опираясь на доверие стран АСЕАН, Япония инициирует создание рамочного соглашения о нейтральной и мирной морской безопасности в Южно-Китайском море."
 JAP_away_dependence: "Оттолкнуться от зависимости от США"
 JAP_away_dependence_desc: "Япония начинает заново оценивать природу своих давних связей, стремясь расширить стратегические варианты и автономию. В экономике, технологиях и безопасности мы следуем курсу, сформированному нашим собственным видением будущего."
 JAP_development_production: "Создание внутренних производственных цепочек"
 JAP_development_production_desc: "Чтобы обеспечить национальную оборону самостоятельно, мы создадим внутреннюю систему, способную производить оружие и материалы внутри Японии."
 JAP_japanese_doctrine: "Формирование японской доктрины"
 JAP_japanese_doctrine_desc: "Мы установим независимую японскую доктрину безопасности, позволяющую гибко реагировать на нашу собственную стратегическую среду."
 JAP_recalling_researchers: "Возврат зарубежных исследователей"
 JAP_recalling_researchers_desc: "Мы создадим стимулы для японских учёных, работающих в США, вернуться на родину. Университеты и национальные лаборатории предложат ускоренные должности, обновлённые условия и конкурентные гранты, стремясь обратить десятилетия утечки талантов и восстановить национальную исследовательскую силу."
 JAP_japanese_cloud: "Облако Касумигасэки"
 JAP_japanese_cloud_desc: "Создать государственное «облачное хранилище Касумигасеки», управляемое японскими провайдерами и размещенное на отечественных серверах. Министерства и ключевые ведомства перенесут свои системы на эту общую платформу, чтобы сократить расходы, стандартизировать безопасность и обеспечить национальный контроль над конфиденциальными данными."
 JAP_base_okinawa: "Переговоры о выводе войск США с Окинавы"
 JAP_base_okinawa_desc: "Для повышения автономии безопасности Японии начнутся переговоры о выводе войск США, дислоцированных на Окинаве."
 JAP_enhancement_exercises: "Расширенные совместные учения"
 JAP_enhancement_exercises_desc: "Углубить интеграцию с силами США за счёт более крупных и частых совместных манёвров. Морские, воздушные и сухопутные части отработают общие процедуры, связи и логистику, чтобы в реальном кризисе обе стороны могли двигаться, сражаться и снабжать себя как единое координированное оружие."
 JAP_education_jap_usa: "Совместные образовательные программы Японии и США"
 JAP_education_jap_usa_desc: "Чтобы углубить взаимопонимание между Японией и Соединёнными Штатами, мы реализуем совместные образовательные программы и студенческие обмены. Обучаясь дисциплине Японии и предпринимательскому духу США, эта инициатива воспитает новое поколение международно мыслящих лидеров и укрепит двустороннее доверие."
 JAP_culture_technology: "Японо-американский обмен в сфере технологий и культуры"
 JAP_culture_technology_desc: "Укрепим связи между японскими фирмами и американскими технополисами, связывая университетские лаборатории и студии с партнёрами из Силиконовой долины, Сиэтла и Лос-Анджелеса. Инженеры, дизайнеры и творцы будут перемещаться туда и обратно на совместные проекты, объединяя американское ноу-хау платформ с японским оборудованием, играми и анимацией."
 JAP_dual_use: "Сотрудничество в области двойного назначения"
 JAP_dual_use_desc: "Япония и США углубят сотрудничество в технологиях двойного назначения, применимых как в гражданской, так и в военной сферах. Через взаимодействие промышленности и академии это партнёрство ускорит НИОКР и опытно-конструкторские работы, повышая общий технологический прогресс."
 JAP_okinawa_development: "Совместный проект развития Окинавы"
 JAP_okinawa_development_desc: "Для стимулирования экономического роста Окинавы и региональной интеграции Япония и США будут сотрудничать в рамках проекта развития инфраструктуры. Улучшая транспортные сети, логистику и общественные объекты, эта инициатива призвана повысить местный рост и открыть новые возможности для японско-американского сотрудничества."
 JAP_informal_cooperation: "Неформальная рамочная система сотрудничества"
 JAP_informal_cooperation_desc: "Несмотря на отсутствие формальных дипломатических отношений, Япония и Тайвань развили практическое и значимое сотрудничество. Через взаимодействие в сфере реагирования на бедствия, технологического обмена и гражданских контактов создаётся взаимовыгодная основа."
 JAP_disaster_countermeasure_cooperation: "Платформа обмена знаниями по чрезвычайным ситуациям Япония–Тайвань"
 JAP_disaster_countermeasure_cooperation_desc: "Учитывая общую уязвимость перед стихийными бедствиями, Япония и Тайвань создают совместную платформу для обмена опытом и уроками в сфере реагирования на катастрофы. Это сотрудничество повысит устойчивость и восстановительные возможности обеих стран."
 JAP_tai_high_technology: "Японо-тайваньское высокотехнологичное партнёрство"
 JAP_tai_high_technology_desc: "Японские и тайваньские научные учреждения и частные компании объединяют усилия для совместной работы в передовых гражданских технологиях. Это партнёрство направлено на ускорение инноваций и повышение производительности в отраслях обеих стран."
 JAP_tai_tourist_visa: "Смягчение визового режима для туристов"
 JAP_tai_tourist_visa_desc: "Чтобы дополнительно поощрять въездной туризм из Тайваня, Япония облегчит визовые процедуры. Увеличение народных обменов и туризма поможет стимулировать экономику и укрепить взаимопонимание."
 JAP_tai_international_student: "Расширение программ учебного обмена"
 JAP_tai_international_student_desc: "Япония расширит возможности тайваньских студентов учиться в своих университетах. Эта инициатива нацелена на углубление академических и культурных связей и подготовку будущих лидеров, способных связать два общества."
 JAP_tai_senkaku: "Установить морские переговоры с Тайванем"
 JAP_tai_senkaku_desc: "Различия во взглядах Японии и Тайваня по поводу островов Сенкаку могут повлиять на рыболовство, морскую безопасность и дипломатические отношения в Восточно-Китайском море. При твёрдом отстаивании позиции нашей страны мы создадим каналы диалога и механизмы практических консультаций для снижения трений на местах. Балансируя между управлением противостоянием и защитой интересов, мы снимем ограничения на переговоры с Тайванем по вопросу островов Сенкаку."
 JAP_dprk_national_policy: "Доктрина Северной полуострова"
 JAP_dprk_national_policy_desc: "Северная Корея остаётся ближайшей искрой у наших берегов и самым непредсказуемым игроком на полуострове. Мы сформируем единый национальный курс в отношении Пхеньяна, синхронизируя дипломатию, разведку и готовность в единую доктрину. Выбранное направление определит условия безопасности в Северо-Восточной Азии."
 JAP_dprk_maximum_pressure: "Максимальное давление на Пхеньян"
 JAP_dprk_maximum_pressure_desc: "Северная Корея понимает силу влияния, а не добрую волю. Мы ужесточим исполнение санкций, расширим морской мониторинг и скоординируем дипломатическое давление, чтобы ограничить маневренное пространство Пхеньяна для эскалации. Цель проста: повысить цену каждой провокации до тех пор, пока режим не будет вынужден пересмотреть расчёт."
 JAP_dprk_missile_defense: "Многоуровневая противоракетная оборона"
 JAP_dprk_missile_defense_desc: "Северная угроза измеряется не днями, а минутами. Мы укрепим многоуровневую сеть ПРО на суше, море и в воздухе, чтобы защитить наши города, порты и командные центры от внезапной атаки. Надёжный щит лишит Пхеньян возможности запугивать нас издалека."
 JAP_dprk_trilateral_training: "Трёхсторонние учения на полуострове"
 JAP_dprk_trilateral_training_desc: "Безопасность на полуострове не может основываться только на декларациях. Совместные учения с Южной Кореей и США улучшат готовность, совместимость и реагирование на кризисы в самой опасной точке региона. Совместные тренировки показывают, что агрессия встретит скоординированный ответ."
 JAP_dprk_korean_defense_treaty: "Японо-корейское оборонное соглашение"
 JAP_dprk_korean_defense_treaty_desc: "Полуостров и Японский архипелаг разделяют одну линию фронта. Формальное оборонное соглашение с Южной Кореей объединит обмен разведданными, планирование на случай непредвиденных ситуаций и взаимные обязательства по безопасности в прочные рамки. Старые обиды остаются, но стратегическая необходимость требует более крепкой основы."
 JAP_dprk_conditional_engagement: "Условный канал к Пхеньяну"
 JAP_dprk_conditional_engagement_desc: "Одно лишь давление не может справиться со всем кризисом. Мы откроем контролируемый дипломатический канал с Северной Кореей, привязанный к строгим условиям относительно ракетных испытаний, военных инцидентов и региональной дестабилизации. Диалог не заменит сдерживание, но может предотвратить просчёты."
 JAP_dprk_normalization_framework: "Дорожная карта нормализации"
 JAP_dprk_normalization_framework_desc: "Стабильная Северо-Восточная Азия требует не только постоянного управления кризисами. Мы установим поэтапную рамку нормализации с Северной Кореей, связывая дипломатический прогресс с проверяемыми обязательствами по безопасности и региональными гарантиями. Любое урегулирование должно быть постепенным, исполнимым и основанным на взаимности."
 JAP_dprk_support_unification: "Поддержать объединённый полуостров"
 JAP_dprk_support_unification_desc: "Разделение Кореи формировало безопасность Восточной Азии поколениями, но это не обязательно должно быть навсегда. Мы поддержим мирный путь к объединению Кореи через дипломатию, координацию с партнёрами и планирование региональной стабильности. Если полуостров будет перестроен, Япония должна помочь сформировать порядок, который последует за этим."
 JAP_history_education: "Прозрачность исторического образования"
 JAP_history_education_desc: "Мы должны смотреть историческим фактам прямо в лицо, пересматривая учебные материалы и методические указания. Прозрачное историческое образование — первый шаг к укреплению доверия с нашими соседними странами."
 JAP_statement: "Заявление [ROOT.GetLeader]"
 JAP_statement_desc: "Чтобы выразить ясную позицию ответственности и сожаления по поводу исторических событий, правительство выпустит новое официальное заявление. Эта инициатива направлена на содействие примирению с пострадавшими странами и продвижение отношений, ориентированных на будущее, на основе взаимного доверия."
 JAP_intellectual_platform: "Трёхсторонняя историческая платформа"
 JAP_intellectual_platform_desc: "При посредничестве ООН Япония, Китай и Южная Корея совместно спланируют и создадут музеи и цифровые архивы для передачи памяти о войне будущим поколениям. Япония окажет финансовую поддержку, позиционируя эту инициативу как глобальный символ мира и примирения."
 JAP_intellectual_platform_TT: "§YЕсли обе страны примут соглашение, всем трём нациям будет предоставлен национальный дух, увеличивающий §Gстабильность§!§!"
 JAP_chi_friendship: "Улучшение отношений с Китаем"
 JAP_chi_friendship_desc: "Чтобы стабилизировать отношения Японии и Китая, японское правительство продолжит диалог и будет работать над продвижением взаимопонимания и урегулированием трений. Китай — соседняя страна с существенным влиянием на региональный порядок и экономику, и улучшение отношений напрямую связано с безопасностью и процветанием Японии."
 JAP_chi_accept_intellectual_platform: "Китай согласился на создание Японо-Китайско-Корейской исторической платформы."
 JAP_chi_trade_support: "Поддержка реформы торговой системы Китая"
 JAP_chi_trade_support_desc: "Предоставить техническую и институциональную поддержку реформе и модернизации торговой системы Китая. Это облегчит выход японским компаниям и укрепит влияние Японии в регионе."
 JAP_chi_advancement_companies: "Взаимный выход предприятий на рынки"
 JAP_chi_advancement_companies_desc: "Содействовать взаимным инвестициям и выходу на рынки между японскими и китайскими предприятиями, чтобы увеличить экономическую взаимозависимость и повысить производительность."
 JAP_chi_kanji: "Проект культурного сотрудничества «Синосфера»"
 JAP_chi_kanji_desc: "Укрепляя культурные связи между странами Синосферы, этот проект подчёркивает общие ценности и исторические узы, служа культурным буфером против внешнего влияния."
 JAP_chi_temple: "Совместный проект по сохранению буддийских храмов"
 JAP_chi_temple_desc: "Сохранить буддийские храмы как общее культурное наследие через сотрудничество Японии и Китая. Этот проект повышает их ценность как туристических объектов и подтверждает исторические связи между двумя странами."
 JAP_chi_senkaku: "Управление спором о Сенкаку"
 JAP_chi_senkaku_desc: "Напряженность вокруг островов Сенкаку напрямую связана с общими японо-китайскими отношениями и стабильностью Восточно-Китайского моря. Сохраняя нашу позицию в отношении суверенитета, необходимо создать дипломатическую структуру управления, чтобы избежать случайных столкновений. Давайте официально установим каналы для диалога и, сдерживая трения на море, продолжим переговоры в благоприятной для нашей страны обстановке."
 JAP_kor_friendship: "Улучшение отношений с Южной Кореей"
 JAP_kor_friendship_desc: "В направлении будущих отношений Японии и Южной Кореи японское правительство будет работать над восстановлением доверия и продолжением диалога. Южная Корея — один из важнейших соседей Японии, напрямую связанный с региональной стабильностью и экономикой, и улучшение отношений расширит возможности и влияние Японии."
 JAP_kor_accept_intellectual_platform: "Южная Корея согласилась на создание Японо-Китайско-Корейской исторической платформы."
 JAP_kor_accelerator: "Токийско-сеульский акселератор"
 JAP_kor_accelerator_desc: "В Токио и Сеуле создаётся совместная акселерационная программа для поддержки и развития стартапов, укрепляя инновации и экономическое сотрудничество между двумя столицами."
 JAP_kor_local_companies: "Инициатива обмена местными компаниями"
 JAP_kor_local_companies_desc: "Содействует сотрудничеству региональных компаний, ускоряя рост и развитие гражданской промышленности на местном уровне."
 JAP_kor_cultural_exchange: "Культурный обмен"
 JAP_kor_cultural_exchange_desc: "Продвигая культурный обмен, закладывается основа для более глубокого взаимопонимания и влияния на общественное мнение между двумя народами."
 JAP_kor_aging: "Японо-корейская рабочая группа по стареющему обществу"
 JAP_kor_aging_desc: "Создана совместная японо-корейская рабочая группа для решения общей проблемы старения общества, с проведением ежемесячных обсуждений по выработке совместных политик."
 JAP_kor_liancourt_rocks: "Управление спором о Таэксиме"
 JAP_kor_liancourt_rocks_desc: "Спор о Таэксиме (Докдо) является важным нерешённым вопросом, который может повлиять на общие отношения Японии и Южной Кореи. При твёрдом соблюдении позиции нашей страны мы создадим рамки для диалога и практических консультаций, чтобы избежать случайных трений и эскалации дипломатической напряжённости. Это снимет ограничения на переговоры с Южной Кореей по вопросу Таэксима (Докдо)."
 JAP_approaching_russia: "Сближение с Россией"
 JAP_approaching_russia_desc: "Для обеспечения геополитической стабильности и надёжного доступа к ресурсам мы проводим дипломатическую линию на улучшение отношений с Россией, сосредоточив внимание на сотрудничестве в энергетике, инфраструктуре и торговле."
 JAP_sov_far_east_development: "Инициатива Дальнего Востока"
 JAP_sov_far_east_development_desc: "Используя опыт Японии по оживлению регионов в холодных условиях Хоккайдо, эта инициатива продвигает развитие в российском Дальнем Востоке через инвестиции в инфраструктуру и иностранный капитал."
 JAP_sov_saakhalin: "Сахалин II"
 JAP_sov_saakhalin_desc: "Чтобы обеспечить стабильный доступ к ископаемому топливу, Япония усиливает иностранные инвестиции в энергетический проект «Сахалин II» в сотрудничестве с Россией."
 JAP_sov_logistics_corridor: "Логистический коридор Япония — Европа"
 JAP_sov_logistics_corridor_desc: "Мы построим наземный логистический коридор, соединяющий Японию и Европу через Россию. Используя российские железные дороги и автомагистрали, мы стремимся сократить время перевозок и обеспечить стабильный доступ к европейским рынкам."
 JAP_sov_it_corridor: "Цифровой коридор через Россию"
 JAP_sov_it_corridor_desc: "В сотрудничестве с японскими ИТ-компаниями в России создаются инфраструктура, такая как центры обработки данных и волоконно-оптические линии, формируя цифровую торговую сеть, объединяющую Европу, Центральную Азию и Россию."
 JAP_sov_kuril_islands: "Управление спором о Северных территориях"
 JAP_sov_kuril_islands_desc: "Вопрос Северных территорий остаётся нерешённым и затрагивает саму основу японско-российских отношений. При твёрдом отстаивании позиции нашей страны мы создадим рамки дипломатических переговоров и практических консультаций, чтобы избежать закрепления конфронтации. При осторожном ведении отношений с Россией мы снимем ограничения на переговоры по вопросу Северных территорий."
 JAP_defensive_foundations: "Основы обороны"
 JAP_defensive_foundations_desc: "Япония укрепляет базовую оборонную позицию Сил самообороны, сосредоточившись на защите территории, реагировании на кризисы и сдерживании, оставаясь в рамках строго оборонительного толкования Статьи 9."
 JAP_jgsdf: "Укрепить СВР Японии"
 JAP_jgsdf_desc: "Силы самообороны сухопутных войск Японии усиливают свои оборонительные возможности за счёт улучшенной мобильности, подготовки и готовности. Эти меры гарантируют, что сила сможет защищать Родину, действуя строго в рамках существующих правовых и стратегических ограничений."
 JAP_type_x_mbt: "Основной боевой танк Type 10"
 JAP_type_x_mbt_desc: "Type 10 — это шаг вперёд в японской бронетанковой технологии: он легче, быстрее и специально создан для быстрого развёртывания по сложному японскому рельефу. Расширяя производство и готовя экипажи для этой передовой платформы, СВР Японии укрепляет способность быстро реагировать на угрозы внутри страны."
 JAP_type_manouvre_combat_vehicle: "Боевой манёвренный автомобиль Type 16"
 JAP_type_manouvre_combat_vehicle_desc: "Боевой манёвренный автомобиль Type 16 обеспечивает высокомобильную огневую поддержку силам быстрого реагирования. Его колёсная компоновка позволяет СВР Японии быстро перемещать подразделения по архипелагу, укрепляя удалённые регионы без опоры на тяжёлую бронетанковую логистику."
 JAP_wheeled_howitzer: "Колёсный гаубичный комплекс Type 19"
 JAP_wheeled_howitzer_desc: "Новое поколение мобильной артиллерии Type 19 сочетает современные системы управления огнём с возможностью быстрого переброса. Его колёсное шасси обеспечивает гибкую поддержку оборонительных операций по разрозненным и гористым территориям Японии."
 JAP_chu_sam: "Расширить сеть Type 03 Chu-SAM"
 JAP_chu_sam_desc: "Япония усиливает свою ПВО, вводя дополнительные батареи Type 03 Chu-SAM. Эти современные зенитные ракетные комплексы средней дальности повышают защиту от воздушных вторжений и бесшовно интегрируются с национальной системой раннего предупреждения и слежения."
 JAP_type_atgm: "Усилить противотанковые ракетные подразделения"
 JAP_type_atgm_desc: "СВР Японии оснащает свои пехотные и разведывательные элементы улучшенными противотанковыми управляемыми ракетными системами, включая обновлённые модели Type 01 и Type 96. Эти модернизации гарантируют, что сухопутные силы смогут противостоять современным бронетанковым угрозам в любом оборонительном сражении."
 JAP_central_readiness_force: "Расширить Центральные силы готовности"
 JAP_central_readiness_force_desc: "Центральные силы готовности развиваются в гибкое командование быстрого развертывания, способное реагировать на чрезвычайные ситуации по всей Японии. Улучшая совместную подготовку, мобильность и координацию с региональными армиями, мы обеспечиваем возможность сухопутным подразделениям быстро усиливать ключевые районы."
 JAP_civil_protection_act: "Внедрить рамки гражданской защиты"
 JAP_civil_protection_act_desc: "Новые меры гражданской защиты формализуют сотрудничество между Силами самообороны, местными властями, полицией и экстренными службами. Чёткие правовые процедуры эвакуации, реагирования на кризисы и защиты инфраструктуры укрепляют способность Японии защищать население как при бедствиях, так и при инцидентах безопасности."
 JAP_maritime_self_defence_force: "Укрепить Силы морской самообороны"
 JAP_maritime_self_defence_force_desc: "Силы морской самообороны укрепляются за счёт улучшенной подготовки, обслуживания и систем поддержки для поддержания высокоинтенсивных операций на море. Укрепляя эскортные группы, патрульный потенциал и морскую логистику, Япония сможет надёжнее охранять жизненно важные морские пути и прибрежные воды."
 JAP_amphibious_rapid_deployment: "Подготовить бригаду амфибийного быстрого развертывания"
 JAP_amphibious_rapid_deployment_desc: "Создано специализированное амфибийное соединение быстрого развертывания для реагирования на кризисы на удалённых островах Японии. Сочетая пехоту, броню и морской транспорт, эта бригада обучена укреплять, обеспечивать безопасность и при необходимости возвращать ключевую территорию вдоль морских рубежей Японии."
 JAP_atago_destroyer: "Ввести в строй современные эсминцы Aegis"
 JAP_atago_destroyer_desc: "Новые эсминцы с системой Aegis вводятся в строй, обеспечивая мощные возможности ПВО, борьбы с подводными лодками и управления. Эти современные эскортные корабли формируют основу современного надводного флота Японии и значительно усиливают защиту флота и региональное сдерживание."
 JAP_keen_sword_operation: "Расширить совместные учения Keen Sword"
 JAP_keen_sword_operation_desc: "Серия учений Keen Sword расширяется за счёт более сложных морских, воздушных и наземных компонентов. Регулярные крупномасштабные манёвры с союзниками оттачивают взаимодействие, улучшают совместное командование и контроль, а также демонстрируют готовность Японии действовать эффективно в оспариваемой региональной обстановке."
 JAP_f2_multirole_defensive_enhancement: "Укрепить многоцелевой флот F-2"
 JAP_f2_multirole_defensive_enhancement_desc: "Флот F-2 получает модернизированную авионику, датчики и боевые системы для улучшения ПВО и морского удара в ближних водах. Эти усовершенствования позволяют самолётам эффективнее реагировать на региональные угрозы, сохраняя при этом преимущественно оборонительный профиль миссии."
 JAP_f15_defensive_updat_programe: "Программа оборонной модернизации F-15"
 JAP_f15_defensive_updat_programe_desc: "Истребители превосходства в воздухе F-15 Японии проходят комплексную модернизацию, включая современные радиолокаторы, комплексы радиоэлектронной борьбы и улучшенные воздух-воздух ракеты. Обновлённый парк значительно укрепляет способность Японии защищать собственное воздушное пространство от всё более способных противников."
 JAP_hyuga_class: "Ввести в строй вертолётоносцы класса Hyūga"
 JAP_hyuga_class_desc: "Вертолётоносцы класса Hyūga вводятся в полное оперативное применение как платформы управления и борьбы с подводными лодками. Их способность координировать эскортные группы и эксплуатировать несколько вертолётов значительно улучшает защиту флота и морскую ситуационную осведомлённость."
 JAP_p_maritime_patrol: "Расширить морскую патрульную авиацию"
 JAP_p_maritime_patrol_desc: "Япония инвестирует в современные самолёты морского патрулирования для наблюдения за морскими путями, обнаружения подводных лодок и поддержки поисково-спасательных операций. Усиленное патрулирование вокруг архипелага укрепляет как национальную безопасность, так и безопасность морского судоходства."
 JAP_deploy_ballistic_warning_radars: "Развернуть радиолокационные станции предупреждения о баллистических ракетах"
 JAP_deploy_ballistic_warning_radars_desc: "На дальний рубеж устанавливаются новые радиолокационные станции раннего предупреждения для обнаружения и отслеживания запусков баллистических ракет в регионе. Интегрируя эти датчики в национальную командную сеть, Япония получает важные минуты для оценки угроз, оповещения населения и координации оборонных ответных мер."
 JAP_modernize_jadge: "Модернизировать систему ПРО JADGE"
 JAP_modernize_jadge_desc: "Система Japan Aerospace Defense Ground Environment (JADGE) модернизируется за счёт улучшенных каналов передачи данных, вычислительных мощностей и интеграции с морскими и наземными датчиками. Современная сеть JADGE позволяет быстрее принимать решения и эффективнее задействовать силы ПВО."
 JAP_air_self_defence_force: "Укрепить Силы воздушной самообороны"
 JAP_air_self_defence_force_desc: "Силы воздушной самообороны расширяют программы подготовки, инфраструктуру баз и вспомогательные подразделения для работы с более высоким оперативным темпом. Эти улучшения обеспечивают Японию возможностью поддерживать непрерывное воздушное патрулирование, быстрые поднятия в воздух и сложные совместные учения по мере роста нагрузки на региональное воздушное пространство."
 JAP_article_nine_transition_comittee: "Создать Комитет по переходу обороны"
 JAP_article_nine_transition_comittee_desc: "Учреждается специальный комитет для координации перехода Японии к модернизированной позиции национальной обороны. Объединив политиков, военных планировщиков и правовых экспертов, Япония сможет управлять перераспределением полномочий и обеспечить стабильную, хорошо организованную трансформацию."
 JAP_article_nine_transition_comittee_tt: "§GМодификатор «Баланс сил» в соответствии со статьей 9 больше не сможет изменяться в зависимости от уровня интерпретации. Это теперь открывает доступ к национальным фокусам, полностью исключая действие статьи 9.§!"
 JAP_secure_public_support: "Заручиться поддержкой общества для реформ обороны"
 JAP_secure_public_support_desc: "Запущена общенациональная кампания по разъяснению эволюции оборонной политики Японии, устранению общественных опасений и укреплению доверия к новой позиции безопасности. Широкая поддержка общества обеспечивает политическую стабильность и снижает трения в период перехода."
 JAP_modernize_joint_command: "Модернизировать структуры объединённого командования"
 JAP_modernize_joint_command_desc: "Вооружённые силы интегрируют свои оперативные командования в единое объединённое звено, улучшая взаимодействие и готовность. Современное совместное планирование и единные стандарты подготовки позволяют эффективнее реагировать на сложные сценарии безопасности."
 JAP_normalize_defense_procurement: "Нормализовать системы оборонных закупок"
 JAP_normalize_defense_procurement_desc: "Япония оптимизирует оборонные закупки, расширяет промышленный потенциал и укрепляет координацию с отечественными производителями. Прозрачные, современные процедуры закупок обеспечивают своевременную и устойчивую реализацию ключевых оборонных проектов."
 JAP_formalize_national_defense: "Официально закрепить национальные оборонные возможности"
 JAP_formalize_national_defense_desc: "Япония официально кодифицирует расширенные оборонные обязанности, уточняя роли, миссии и долгосрочные стратегические цели. Когда переход завершён, вооружённые силы действуют в рамках единой концепции, разработанной для защиты национальных интересов в усложняющейся региональной обстановке."
 JAP_normalize_defense_procurement_done: "Нормализация оборонных закупок завершена"
 JAP_modernize_joint_command_done: "Модернизация объединённого командования завершена"
 JAP_consolidate_national_defense_framework_done: "Консолидация национальной оборонной структуры завершена"
 JAP_rebuild_blue_water_navy: "Восстановить флот далёкого плавания"
 JAP_rebuild_blue_water_navy_desc: "Япония готовит свой флот для продолжительных операций далеко за пределами прибрежных вод, расширяя логистику, возможности пополнения и силы сопровождения дальнего действия. Обновлённый флот далёкого плавания позволяет Японии защищать морские линии, поддерживать партнёров и реагировать на кризисы в более обширном регионе."
 JAP_carrier_aviation_tt: "[JAP_carrier_aviation_idea_desc]\n"
 JAP_carrier_aviation_development: "Программа развития палубной авиации"
 JAP_carrier_aviation_development_desc: "Создаётся специализированная программа по развитию палубной авиации, объединяющая морских истребителей, палубные операции и узкопрофильную подготовку. Формирование надёжной палубной авиации значительно расширяет дальность и гибкость флота как в сдерживании, так и в боевых действиях."
 JAP_submarine_modernization_project: "Проект модернизации подводного флота"
 JAP_submarine_modernization_project_desc: "Япония модернизирует свой подводный флот с более тихими корпусами, передовыми датчиками и современным оружием. Новое поколение ударных подводных лодок укрепляет подводное сдерживание, возможности отказа доступа и способность контролировать спорные воды."
 JAP_expand_multi_role_destroyer_fleet: "Расширить флот многоцелевых эсминцев"
 JAP_expand_multi_role_destroyer_fleet_desc: "Дополнительные многоцелевые эсминцы будут введены в строй для обеспечения ПВО, борьбы с подводными лодками и ударных возможностей в одном гибком корабле. Эти эскортные силы станут основой расширенных боевых групп на море."
 JAP_establish_joint_rapid_deployment_command: "Создать объединённое командование быстрого развертывания"
 JAP_establish_joint_rapid_deployment_command_desc: "Учреждается объединённое командование для координации быстро развертываемых сухопутных, воздушных и морских подразделений. С единой планировкой и заранее подготовленными сценариями реагирования Япония получает силу, способную быстро реагировать на кризисы в любой точке широкого стратегического окружения."
 JAP_full_defense_industrial_mobilisation: "Полная мобилизация оборонной промышленности"
 JAP_full_defense_industrial_mobilisation_desc: "Япония направляет свой промышленный потенциал, исследовательские институты и логистические сети на всесторонний план оборонного производства. Стандартизированные закупки, долгосрочные контракты и расширенные мощности позволяют стабильно выпускать корабли, машины, самолёты и современное оружие."
 JAP_long_range_strike_missile_artillery_forces: "Дальние ударные ракетные и артиллерийские силы"
 JAP_long_range_strike_missile_artillery_forces_desc: "Специализированные ракетные и артиллерийские соединения формируются для нанесения точных ударов на дальних дистанциях. Сочетая современные боеприпасы с современными системами целеуказания и управления, Япония получает возможность ставить под удар удалённые военные объекты и критическую инфраструктуру."
 JAP_expand_mechanized_brigades: "Расширить мехбригады"
 JAP_expand_mechanized_brigades_desc: "Существующие механизированные соединения укрепляются, а новые бригады формируются с современными боевыми машинами пехоты и поддерживающей бронетехникой. Это расширение повышает подвижность, защиту и способность к продолжительным наземным операциям."
 JAP_deploy_next_generation: "Развернуть боевые соединения следующего поколения"
 JAP_deploy_next_generation_desc: "Боевое построение реорганизуется вокруг техники следующего поколения, сетевых систем управления и сочетания родов войск. Эти соединения предназначены для быстрого развертывания, высокой живучести и эффективных действий в сложных условиях интенсивных боёв."
 JAP_national_defense_professionalization: "Профессионализация национальной обороны"
 JAP_national_defense_professionalization_desc: "Япония инвестирует в профессиональное военное образование, развитие карьеры и современные кадровые системы во всех видах вооружённых сил. Более способный, опытный и сплочённый корпус офицеров и унтер-офицеров повышает готовность, улучшает руководство и поддерживает долгосрочную эффективность национальной обороны."
 JAP_integrated_air_space_command: "Объединённое командование по воздуху и космосу"
 JAP_integrated_air_space_command_desc: "Создаётся объединённое командование по воздуху и космосу для координации противовоздушной обороны, раннего предупреждения, космической поддержки и наблюдения. Слияние информации с наземных радаров, воздушных датчиков и орбитальных платформ даёт Японии чётчеe представление о театре военных действий и ускоряет реакцию на новые угрозы."
 JAP_establish_long_range_strike_aviation: "Создать дальнюю ударную авиацию"
 JAP_establish_long_range_strike_aviation_desc: "Формируются специализированные дальние ударные авиационные подразделения, оснащённые современными самолётами и оружием на дальнем боевом радиусе. Эти силы обеспечивают возможность поражения критических целей на значительных дистанциях, поддерживая сдерживание и совместные операции по всему региону."
 JAP_mext_generation_air_dominance: "Воздушное превосходство следующего поколения"
 JAP_mext_generation_air_dominance_desc: "Япония ускоряет разработку истребителя следующего поколения для воздушного превосходства, сочетая стелс, передовые датчики и сетевые боевые системы. Эта программа обеспечит превосходство в воздухе в условиях всё более оспариваемого воздушного пространства на долгие годы вперед."
 JAP_advanced_missile_development: "Управление передовыми ракетными разработками"
 JAP_advanced_missile_development_desc: "Создано специализированное управление для контроля исследований, испытаний и производства передовых ракетных систем. От современных воздушных и противокорабельных вооружений до дальних высокоточных ударных комплексов — этот проект расширяет арсенал Японии и повышает эффективность всех родов войск."
 JAP_high_tech_domestic_manufacturing: "Высокотехнологичное отечественное оборонное производство"
 JAP_high_tech_domestic_manufacturing_desc: "Япония инвестирует в высокотехнологичное производство авионики, датчиков, композитных конструкций и двигательных установок. Укрепление отечественных цепочек поставок критических компонентов снижает зависимость от иностранных поставщиков и поддерживает быстрые модернизации авиационных и ракетных платформ."
 JAP_establish_japan_defense_technology_agency: "Агентство оборонных технологий Японии"
 JAP_establish_japan_defense_technology_agency_desc: "Создаётся центральное агентство оборонных технологий для координации исследований, закупок и инноваций между промышленностью, академией и вооружёнными силами. Единое руководство ускоряет циклы разработки, снижает дублирование и гарантирует, что перспективные идеи быстро переходят от лаборатории к боевым частям."
 JAP_atla_defense_technology_consolidation: "Консолидация технологий ATLA"
 JAP_atla_defense_technology_consolidation_desc: "Агентству по закупкам, технологиям и логистике (ATLA) поручается центральная роль в координации исследований, разработок и закупок для всех родов войск. Сосредоточив программы оборонных технологий под одной властью, Япония может сократить дублирование, ускорить инновации и быстрее вводить перспективные проекты в эксплуатацию."
 JAP_gifu_test_aerospace_development_center: "Испытательно-авиационно-космический центр Гифу"
 JAP_gifu_test_aerospace_development_center_desc: "Гифу превращается в ведущий центр испытаний и оценки самолётов, авионики и оружейных систем. Специальные полигоны, инструментальное воздушное пространство и инженерные команды поддерживают строгие испытания, чтобы новые разработки были полностью проверены перед поступлением в строй."
 JAP_aichi_nagoya_aerospace_defense_cluster: "Аэро-космический кластер Аити-Нагоя"
 JAP_aichi_nagoya_aerospace_defense_cluster_desc: "Регион Аити-Нагоя развивается как ведущий кластер производства авиационно-космической и оборонной техники, связывая крупных производителей, поставщиков и научно-исследовательские институты. Сосредоточенные инвестиции в этом регионе увеличивают выпуск планеров, двигателей и высокотехнологичных компонентов для военных и двойного назначения."
 JAP_kobo_maritime_heavy_industry_corridor: "Морской коридор тяжёлой промышленности Кобе"
 JAP_kobo_maritime_heavy_industry_corridor_desc: "Кобе и прилегающие прибрежные города превращаются в непрерывный морской коридор тяжёлой промышленности. Расширенные верфи, сталелитейные предприятия и морские инженерные фирмы создают мощность для строительства и обслуживания более крупного и совершенного флота и его инфраструктуры."
 JAP_nagasaki_shipyard_defense: "Интеграция обороны судоверфи Нагасаки"
 JAP_nagasaki_shipyard_defense_desc: "Крупные верфи Нагасаки теснее интегрированы в национальное оборонное планирование, выделяя дополнительную мощность для строительства эсминцев, вспомогательных судов и специализированных морских платформ. Более тесная координация между верфью и флотом сокращает сроки строительства и повышает боеготовность флота."
 JAP_kure_naval_arsenal_revival: "Возрождение морского арсенала Курэ"
 JAP_kure_naval_arsenal_revival_desc: "Исторические морские мощности Курэ возрождаются как современный комплекс судостроения и ремонта. Модернизированные доки, мастерские и логистические узлы восстанавливают роль города как ключевого центра обслуживания, ремонта и модернизации боевых кораблей."
 JAP_sasebo_fleet_support_complex: "Комплекс поддержки флота Сасэбо"
 JAP_sasebo_fleet_support_complex_desc: "Сасэбо расширяется в комплекс всесторонней поддержки флота с улучшенными мощностями ремонта, складами боеприпасов и снабженческой инфраструктурой. Его расположение в западной Японии делает его идеальным хабом для поддержки операций в близлежащих морях и ключевых морских узлах."
 JAP_yokosuka_dockyard_expansion: "Расширение доков Иокосука"
 JAP_yokosuka_dockyard_expansion_desc: "Доковые и сопутствующие объекты Иокосуки увеличиваются, чтобы обслуживать больше кораблей и более глубокие циклы обслуживания. Как одна из основных военно-морских баз Японии, расширенная Иокосука значительно повышает способность флота поддерживать боеготовность основных надводных боевых единиц."
 JAP_revitalize_defense_production: "Возродить оборонную производственную базу"
 JAP_revitalize_defense_production_desc: "Япония проводит широкомасштабную программу оживления оборонной промышленной базы, поддерживая ключевых производителей, стабилизируя долгосрочные контракты и модернизируя производственные линии. Здоровая промышленная основа позволяет стране надёжно оснащать силы и быстрее адаптироваться к новым оперативным требованиям."
 JAP_kaguya_starward_expedition: "Экспедиция Кагуя в звёзды"
 JAP_kaguya_starward_expedition_desc: "Вдохновлённая сказанием о принцессе Кагуя, которая вернулась на Луну в светящемся одеянии, Япония запускает амбициозное глубококосмическое исследование околоземных астероидов. Передовые роботизированные зонды и демонстрационные установки для добычи отправляются в космос, превращая легенду в технологию и прокладывая путь для будущей добычи ресурсов среди звёзд."
 JAP_kaguya_starward_expedition_tt: "§YНаша миссия на Луну начнётся!§!"
 JAP_tsukuyomi_lunar_program: "Лунная программа Сукуйоми"
 JAP_tsukuyomi_lunar_program_desc: "Названная в честь Сукуйоми, бога Луны японской мифологии, эта программа объединяет промышленность, исследовательские институты и космическое агентство за устойчивым лунным проектом. Орбитальные аппараты, посадочные модули и наземная инфраструктура превращают Луну из удалённого символа в реальный форпост, служащий науке, навигации и долгосрочным космическим амбициям Японии."
 JAP_amaterasu_martian_dawn: "Марсианское восхождение Аматэрасу"
 JAP_amaterasu_martian_dawn_desc: "Под именем Аматэрасу, богини восходящего солнца, Япония устремляется к красной планете. Дальние зонды, передовые двигательные установки и новаторские исследования жизнеобеспечения поддерживают новую волну марсианских экспедиций. Каждая миссия раздвигает границы человеческой изобретательности, превращая далёкий свет Марса в следующий горизонт для высокотехнологичной цивилизации Японии."
 JAP_restore_imperial_household: "Восстановить Императорский дом"
 JAP_restore_imperial_household_desc: "Десятилетиями Императорский дом был ограничен церемониями, почитаем, но отделён от рычагов власти. Мы изменим этот порядок, восстановив институциональную мощь и формальную роль двора в государственном управлении. Это не театральная постановка, а переустройство легитимности, которое заставит каждый лагерь выбрать сторону, когда Хризантемовый Трон выйдет вперёд."
 JAP_reinstate_former_imperial_houses: "Восстановить бывшие императорские дома"
 JAP_reinstate_former_imperial_houses_desc: "Императорский институт не может существовать только на символизме. Его будущее зависит от преемственности, стабильности и надежной линии престолонаследия. Мы восстановим прежние императорские дома и вернём им статус в национальной системе, расширив круг допустимых ветвей, связанных с Троном. Это решение будет провозглашено сторонниками монархии как защита традиций и осуждено конституционалистами как политическая инженерия."
 JAP_male_line_succession_act: "Принять закон о мужской линии наследования"
 JAP_male_line_succession_act_desc: "Неопределённость наследования — стратегическая уязвимость так же, как и внутриполитический спор. Мы кодифицируем наследование по мужской линии в законе, чтобы устранить двусмысленность и обеспечить династическую преемственность на поколения. Этот шаг укрепит поддержку монархистов, но вызовет яркое сопротивление реформаторов, видящих в нём шаг назад от современной Японии."
 JAP_imperial_rites_restored: "Восстановить императорские обряды"
 JAP_imperial_rites_restored_desc: "Трон без ритуалов — это корона без веса. Мы восстановим императорские обряды как государственно признанные церемонии, подтверждая священные основы монархии и преемственность нации. Тем самым мы связываем современное государство с древней легитимностью, независимо от того, одобряет это политический класс или нет."
 JAP_recall_privy_council: "Восстановить Тайный совет"
 JAP_recall_privy_council_desc: "Парламентская политика стала громкой, мимолётной и всё больше отдаляется от долгосрочной государственной мудрости. Мы восстановим Тайный совет, чтобы предоставить Трону постоянный консультативный орган, сдержанный, опытный и верный непрерывности государства. Его возвращение будет воспринято монархистами как стабилизирующая опора и его противниками как нелегитимный центр власти."
 JAP_imperial_reform_commission: "Создать Комиссию по императорской реформе"
 JAP_imperial_reform_commission_desc: "Восстановление требует структуры, а не импровизации. Мы создадим Комиссию по императорской реформе для разработки правовой и институциональной модели обновлённой монархии и выравнивания министерств, придворных учреждений и органов безопасности вокруг единой государственной доктрины. После её созыва символизм превратится в политику, и отступление станет политически невозможным."
 JAP_imperial_audience: "Провести императорскую аудиенцию"
 JAP_imperial_audience_desc: "Стороны соберутся не как равные, а как прошения перед Троном. В тщательно построенной императорской аудиенции мы свяжем лидеров фракций с новым порядком, где избранная политика служит государству, а не командует им. Если Хризантемовый Трон должен председательствовать над современной сёгунатой, он сначала должен заставить политический класс склониться перед своей логикой."
 JAP_imperial_civic_oath: "Провозгласить императорскую гражданскую клятву"
 JAP_imperial_civic_oath_desc: "Новый порядок требует не только указов, но общего торжества. Мы провозгласим императорскую гражданскую клятву, связывающую чиновников, военнослужащих и гражданские институты с Троном как высшим источником легитимности. Так мы превратим лояльность в закон и сделаем инакомыслие предательством."
 JAP_unified_intelligence_secretariat: "Создать единый секретариат разведки"
 JAP_unified_intelligence_secretariat_desc: "Современный сёгунат не может быть слеп. Мы объединим конкурирующие службы в единый секретариат разведки, который будет отчитываться по одной цепочке командования и охранять стратегическую картину Ради Трона. Это мгновенно заточит наше государственное искусство и даст соперникам повод бояться того, что теперь известно двору."
 JAP_blue_water_navy: "Построить флот далёкого плавания"
 JAP_blue_water_navy_desc: "Судьба Японии морская, и наша безопасность не может заканчиваться за горизонтом. Мы построим настоящий флот далёкого плавания, способный действовать далеко от родных берегов, защищать морские пути и проецировать силу там, где того требуют наши интересы. С флотом как стальным инструментом Трона мир научится измерять Японию по следу, который она оставляет."
 JAP_imperial_defense_council: "Создать Императорский оборонный совет"
 JAP_imperial_defense_council_desc: "Стратегию нельзя оставлять на электоральные циклы и министерские споры. Мы сформируем Императорский оборонный совет, чтобы объединить вооружённые силы, руководителей разведки и ключевые министерства под одной стратегической доктриной, привязанной к Трону. В один ход оборонная политика Японии станет последовательной и гораздо сложнее для саботажа внутри."
 JAP_rare_earth_resilience: "Обеспечить устойчивость к редкоземельным материалам"
 JAP_rare_earth_resilience_desc: "Великую державу можно удавить, не выстрелив ни одного раза, отрезав материалы, которые её промышленность не может заменить. Мы обеспечим устойчивость к редкоземельным материалам через запасы, диверсифицированные поставки и стратегические партнёрства по добыче, изолируя Японию от принуждения. Если мир захочет надавить на нас, ему придётся найти другой рычаг."
 JAP_national_shipbuilding_plan: "Императорская программа расширения флота"
 JAP_national_shipbuilding_plan_desc: "Трон не удовлетворится береговой обороной; Япония будет править морями, которые определят нашу судьбу. В рамках Программы расширения Императорского флота мы нарастим мощности верфей, закрепим долгосрочные контракты на закупку военно-морских судов и обеспечим непрерывный цикл строительства от закладки киля до ввода в эксплуатацию. Когда этот план будет реализован, наши соперники не будут спорить о намерениях Японии — они будут считать наши корпуса."
 JAP_imperial_war_cabinet: "Созвать Императорский военный кабинет"
 JAP_imperial_war_cabinet_desc: "Во время кризиса Японией нельзя управлять задержками, комитетами и партийными торгами. Мы созовём Императорский военный кабинет, чтобы централизовать власть командования и связать политическое руководство единой стратегической линией под мандатом Трона. С этого момента государство будет действовать одним голосом, и это будет голос Императора."
 JAP_russian_lost_territories: "Вернуть Северные территории"
 JAP_russian_lost_territories_desc: "Раны на севере никогда не заживали, их лишь прикрыли договорами и молчанием. Мы будем настойчиво отстаивать нашу претензию на острова и воды, оказавшиеся под российским контролем, не как мольбу, а как суверенный требование, подкреплённое рычагами и готовностью. Если Москва не вернёт потерянное, Японии придётся решить, насколько далеко она готова зайти, чтобы вернуть это."
 JAP_fight_china_again: "Дракон и Хризантема"
 JAP_fight_china_again_desc: "Старый конфликт никогда не был по-настоящему разрешён, он лишь был отложен договорами и сдвигами баланса. Мы подготовим нацию к новой конфронтации с Китаем, мобилизуя промышленность, вооружённые силы и общественную волю для войны, которая определит будущее региона. На этот раз Япония будет бороться не только за выживание, но и за порядок, который за этим последует."
 JAP_reclaim_pacific_rim: "Утвердить наш мандат на Тихоокеанском рубеже"
 JAP_reclaim_pacific_rim_desc: "Процветание и безопасность Японии написаны по всему Тихому океану — от морских путей до островных цепей и отдалённых узлов. Мы утвердим мандат на Тихоокеанский рубеж, рассматривая морское влияние как национальную политику, подкреплённую присутствием флота, доступом к базам и экономическим рычагом. Эпоха наблюдения за тем, как другие чертят карту, закончилась; Япония будет её формировать."
 JAP_office_for_colonialism: "Возродить Даитоа-сё"
 JAP_office_for_colonialism_desc: "Империя без администрации — это завоевание, которое разваливается под собственным весом. Мы возродим Даитоа-сё для координации управления заморскими территориями, мер безопасности и экономической интеграции под единой имперской доктриной. С одним министерством, управляющим сферой, влияние Японии перестанет быть импровизацией, оно станет управляемым, расширяемым и принудительным."
 JAP_office_for_colonialism_tt: "Открывает закон об оккупации в государствах Азии!\n"
 JAP_reclaim_south_chinese_sea: "Командовать Южными морями"
 JAP_reclaim_south_chinese_sea_desc: "Южно-Китайское море — артерия Азии, и кто контролирует его, тот контролирует поток торговли, топлива и власти. Мы выйдем, чтобы вернуть доминирование в этих водах, установив присутствие, базы и морскую мощь для принуждения любого претендента к нашей воле. Япония не будет просить доступ, она гарантирует его силой."
 JAP_reclaim_indochina: "Вернуться в Индокитай"
 JAP_reclaim_indochina_desc: "Индокитай расположился на перекрёстке Юго-Восточной Азии, где порты, ресурсы и морские пути решают, кто задаёт региональный баланс. Мы вернём его силой и политическим давлением, возвращая эти территории под стратегическое руководство Японии. Как только он будет закреплён, южный фланг нашей морской сферы станет надёжно заякоренным влиянием."
 JAP_reclaim_australia: "Южный якорь"
 JAP_reclaim_australia_desc: "Австралия — краеугольный камень южного Тихого океана, континент, который может разместить флоты, авиацию и логистику долгой войны. Мы придём к контролю над ней не рейдом и не жестом, а как к постоянному якорю нашей морской сферы. Если юг будет обеспечен, Тихий океан станет японским озером."
 JAP_reclaim_myanmar: "Обеспечить ворота Иравади"
 JAP_reclaim_myanmar_desc: "Мьянма — это сухопутный мост между Индией и Юго-Восточной Азией, контролирующий маршруты от Бенгальского залива до глубин региона. Мы вернём её посредством силы и политического давления, превратив её порты, аэродромы и коридоры в активы широкой сферы Японии. Как только ворота Иравади будут закреплены, наш южный фланг станет значительно труднее оспаривать."
 JAP_reclaim_the_pacific: "Океан как наш рубеж"
 JAP_reclaim_the_pacific_desc: "Тихий океан — не удалённая бездна, это рубеж, определяющий выживание и величие Японии. Мы вернём его через присутствие флота, островные опорные пункты и волю обеспечить морской порядок, сформированный в Токио. Когда океан станет нашим рубежом, каждый противник будет вынужден действовать в нашей тени."
 JAP_reclaim_north_korea: "Подчинить Север под руку Токио"
 JAP_reclaim_north_korea_desc: "Мы добьёмся урегулирования, которое лишит Пхеньян стратегической автономии и поставит его внешнюю политику под японский надзор. Через контролируемый доступ, гарантии безопасности и жёсткое давление на ресурсы и восстановление Север превратится из непредсказуемой угрозы в зависимый буфер. Это господство без иллюзий, и стабильность, принудительная по определению."
 JAP_reclaim_south_korea: "Навязать структуру протектората"
 JAP_reclaim_south_korea_desc: "Мы выйдем за пределы влияния и установим протекторат, который привяжет внешнюю и оборонную политику Кореи к курсу Токио. Через контролируемые соглашения, советников и рычаги влияния на ключевые институты Корея будет вынуждена принять подчинённое положение без открытой аннексии. Это современная империя, построенная на бумаге, давлении и постоянстве."
 JAP_reclaim_taiwan: "Учредить протекторат над Тайванем"
 JAP_reclaim_taiwan_desc: "Мы перейдём от влияния к контролю, установив протекторат, который привяжет оборонную и внешнюю политику Тайваня к курсу Токио. Через гарантии, права на базы и институциональное влияние остров будет обеспечен как лояльный морской бастион без необходимости открытой аннексии. Это современное имперское устройство, обеспечиваемое военно-морской мощью и политическим давлением."
 JAP_basic_reconstruction_policy: "Политика восстановления"
 JAP_basic_reconstruction_policy_desc: "После беспрецедентного разрушения, вызванного Великим землетрясением Восточной Японии, правительство должно установить основную политику восстановления. Представление национальной рамки для восстановления средств к существованию, восстановления инфраструктуры и оживления промышленности станет первым шагом к возвращению доверия общества и стабилизации страны."
 JAP_tohoku_infrastructure: "Восстановить инфраструктуру Тохоку"
 JAP_tohoku_infrastructure_desc: "Землетрясение и цунами нанесли катастрофические повреждения транспортным сетям и жизнеобеспечению Тохоку. Восстановление дорог, железных дорог и портов — первый шаг к возрождению местных сообществ и продвижению восстановления региона. Несмотря на огромные затраты и время, это нельзя откладывать."
 JAP_fishery_revival: "Восстановление агропромрыбной отрасли"
 JAP_fishery_revival_desc: "Цунами разрушило рыболовные порты и сельскохозяйственные угодья Тохоку, уничтожив бесчисленные средства к существованию. Восстановление этих секторов восстановит экономическую основу региона и обеспечит стабильное снабжение продовольствием. Эта работа важна как для местного восстановления, так и для национальной безопасности."
 JAP_tohoku_port: "Восстановить портовые функции Тохоку"
 JAP_tohoku_port_desc: "Цунами парализовало портовые сооружения и судоверфи, остановив логистику и морскую торговлю. Реконструкция оживит региональную промышленность и откроет ключевые внутренние и международные маршруты. Возвращение этих ворот имеет решающее значение для широкой экономической реконструкции Японии."
 JAP_power_supply: "Стабилизация энергоснабжения"
 JAP_power_supply_desc: "Катастрофа повредила множество энергетических объектов и линий передачи, вызвав серьёзный дефицит электроэнергии. Мы должны быстро расширить альтернативные источники и укрепить сеть, чтобы обеспечить стабильность для граждан и промышленности."
 JAP_kanto_infrastructure: "Восстановить инфраструктуру Канто"
 JAP_kanto_infrastructure_desc: "Катастрофа нанесла серьёзные повреждения региону Канто, особенно на севере, нарушив транспортные сети и городские функции. Восстановление инфраструктуры, поддерживающей столичную зону, необходимо для возрождения экономической активности и поддержания национальной стабильности. Быстрая и продуманная реконструкция обязательна."
 JAP_reconstruction_agency: "Создать агентство восстановления"
 JAP_reconstruction_agency_desc: "Чтобы ускорить и координировать послеселевые восстановления, правительство создаст Агентство восстановления. Этот специализированный орган объединит усилия центральных и местных властей, обеспечивая эффективную реализацию планов восстановления."
 JAP_industrial_recovery: "Восстановить промышленную базу"
 JAP_industrial_recovery_desc: "Катастрофа серьёзно повредила заводы и промышленные объекты. Восстановление промышленной базы позволит вернуть рабочие места и ускорить восстановление экономики."
 JAP_funding_local_governments: "Поддержка пострадавших муниципалитетов"
 JAP_funding_local_governments_desc: "Предоставить средства местным властям в пострадавших районах для поддержки восстановления, восстановления средств к существованию и поддержания общественных услуг."
 JAP_housing_reconstruction: "Восстановление жилья для пострадавших"
 JAP_housing_reconstruction_desc: "Ускорить строительство временного жилья и долгосрочных жилых районов, чтобы переселить семьи из приютов и дать городам ясные планы постоянного переселения."
 JAP_reconstruction_completed_focus: "Реконструкция завершена"
 JAP_reconstruction_completed_focus_desc: "Отметить переход от экстренного восстановления к долгосрочному оживлению Тохоку. Основная инфраструктура восстановлена, промышленность вновь работает, и города начинают переход от выживания к росту."
 JAP_trilateral_anti_north_korea_training: "Трёхсторонняя готовность на полуострове"
 JAP_trilateral_anti_north_korea_training_desc: "Регулярные совместные учения с Южной Кореей и США выработали общий алгоритм действий на полуострове. Совместимые процедуры командования, объединённые воздушные и морские учения и координированные routines противоракетной обороны гарантируют, что любая провокация от Пхеньяна встретит быстрый, единый и убедительный ответ."
 JAP_dprk_policy_idea: "Проникновение японской политики"
 JAP_dprk_policy_idea_desc: "Новая корейская политика Токио открыла каналы, которых раньше не существовало. Через дипломатические контакты, закулисных посредников, экономические рычаги и разведывательную работу Япония получила временное окно для расширения своего влияния внутри политической среды Северной Кореи. Открытие хрупкое и спорное, но сейчас японское давление и присутствие в Пхеньяне имеют больше веса, чем прежде."
 JAP_depopulation_0: "Оставшееся бремя снижающегося уровня рождаемости (уровень 1)"
 JAP_depopulation_0_desc: "Thanks to continuous countermeasures, the progression of the declining birthrate is gradually being curbed to some extent. Birth trends are also showing signs of improvement, and the more crisis-driven view has receded, but the long-term effects will not disappear immediately. Stabilizing the population base will still take time, and continued policy efforts and the maintenance of their effectiveness are required.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_1: "Продолжающееся давление низкой рождаемости (уровень 2)"
 JAP_depopulation_1_desc: "Efforts such as childrearing support and work-style reforms are showing some results, but the pressure surrounding the declining birthrate still remains across society as a whole. While there are signs of recovery in birth trends, issues such as anxiety about the future are hindering the spread of improvement. The situation is not one of one-sided deterioration, but continued countermeasures are essential.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_2: "Затянувшаяся низкая рождаемость (уровень 3)"
 JAP_depopulation_2_desc: "The progression of the declining birthrate remains a national issue, and no clear improvement has been achieved. Although some progress can be seen in certain areas through the accumulation of measures, structural problems spanning employment, household finances, and living conditions remain, and birth trends continue at a low level. Rapid deterioration has been restrained, but the situation is still far from reassuring.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_3: "Ухудшающаяся низкая рождаемость (уровень 4)"
 JAP_depopulation_3_desc: "The downward trend in the number of births is still continuing, and concerns over the future population base remain strong. Factors such as the difficulty of balancing childrearing and employment, household financial burdens, and regional disparities in support systems are overlapping, and signs of improvement remain limited. Although countermeasures are being advanced, overall they have not been sufficient to fully contain the worsening situation.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_depopulation_4: "Кризис низкой рождаемости (уровень 5)"
 JAP_depopulation_4_desc: "The prolonged worsening of birth trends has begun to place a heavy strain on multiple areas of national governance, as distortions in the population structure deepen. A shrinking labor force and growing concerns over social security burdens are advancing at the same time, and conventional responses have not been enough to put an effective brake on the trend. The declining birthrate is no longer merely an issue in one policy area — it has become a problem that threatens the very sustainability of the nation.\n-------------\nRaise the value of the modifier §G$JAP_declining_birthrate_measures_modifier$§! through the national focus §Y$JAP_work_style_reform$§!, §Y$JAP_basic_policy_declining_birthrate_society$§!, and §Y$JAP_save_ice_age_generation$§!. If you do, you can improve the national spirit through the survey event that occurs every §Y2 4 years§!!"
 JAP_entrenched_demand_shortfall_idea_1: "Затяжной спад спроса"
 JAP_entrenched_demand_shortfall_idea_1_desc: "Deflationary expectations and anxiety about the future are suppressing household spending, while firms hold back investment in the face of weak demand. Wages are stagnant, prices barely move, and no one wants to be the first to spend. Japan's economy is not collapsing, but it is being drained by paralysis.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G30§!!"
 JAP_declining_birthrate_measures_modifier: "Меры против снижения рождаемости"
 JAP_work_style_reform_modifier: "Реформа рабочего образа жизни"
 JAP_work_style_reform_modifier_desc: "Мы пересмотрим устоявшиеся практики, основанные на чрезмерной продолжительности рабочего времени, защитим здоровье работников и стабильность повседневной жизни, одновременно перестраивая рабочие места так, чтобы операции могли выполняться устойчиво. Улучшив практику отдыха, сделав управление трудом более прозрачным и снизив несправедливость, вызванную различиями в статусе занятости, мы стремимся построить общество, где баланс семьи и работы станет проще."
 JAP_long_working_idea: "Культура длинного рабочего дня"
 JAP_declining_birthrate_modifier: "Государственные меры по борьбе с низкой рождаемостью"
 JAP_declining_birthrate_modifier_desc: "Осознавая срочность проблемы низкой рождаемости, правительство движется вперёд с поддержкой деторождения и пересмотром практик труда. Снижая тревогу по поводу повседневной жизни и расширяя возможности для создания семьи, оно стремится восстановить более ясные перспективы на будущее."
 JAP_save_ice_age_generation_modifier: "Поддержка поколения Эпохи снежного покоя"
 JAP_save_ice_age_generation_modifier_desc: "Мы, как нация, будем напрямую решать и компенсировать недостатки, с которыми столкнулось поколение, появившееся на свет в период застоя на рынке труда. Предоставляя комплексную поддержку, от поиска работы и переквалификации до изменения методов работы, восстановления жилья и повседневной жизни, мы заложим фундамент, который позволит людям начать все заново."
 JAP_ice_age_generation_idea: "Поколение Эпохи снежного покоя"
 JAP_ice_age_generation_idea_desc: "Job openings shrank drastically, creating a generation that lost its starting point regardless of ability or motivation. Prolonged unstable employment and stagnant incomes have persisted, and distrust about the future has settled across society as a whole.\n-------------\nIt can be §Gremoved§! by completing national focus starting from §Y$JAP_save_ice_age_generation$§!!."
 JAP_industries_modifier: "$JAP_industries$"
 JAP_industries_modifier_desc: "$JAP_industries_desc$"
 JAP_aftermath_of_disposal_non_performing_loans_idea: "Последствия ускоренной ликвидации невозвратных кредитов"
 JAP_aftermath_of_disposal_non_performing_loans_idea_desc: "Ускорение ликвидации невозвратных кредитов быстро ведёт к перестройке финансовых институтов и корпораций. В результате открывается путь к нормализации распределения капитала, но в краткосрочной перспективе распространяются сокращения занятости и нарушения в региональных экономиках, увеличивая социальную нагрузку на меры по безработице, поддержку средств к существованию и помощь в переустройстве."
 JAP_transparency_and_audit_reform_modifier: "Реформа прозрачности и аудита"
 JAP_transparency_and_audit_reform_modifier_desc: "Мы усилим раскрытие информации и управление публичными записями, снижая возможности для злоупотреблений через цифровизацию и независимые аудиты. Решая проблемы амакадари и непрозрачного политического финансирования, мы повысим административную эффективность, доверие и устойчивость к внешнему влиянию."
 JAP_protecting_human_rights_modifier: "$JAP_protecting_human_rights$"
 JAP_protecting_human_rights_modifier_desc: "$JAP_protecting_human_rights_desc$"
 JAP_worker_protection_modifier: "Защита работников"
 JAP_worker_protection_modifier_desc: "Мы обеспечим защиту средств к существованию и безопасности работников на рабочем месте, создавая условия, которые позволяют людям работать длительное время. Поддерживая более высокие зарплаты и лучшее обращение, а также снижая экономическую неуверенность, мы укрепим социальную стабильность и основы промышленности."
 JAP_redistribution_modifier: "$JAP_redistribution$"
 JAP_redistribution_modifier_desc: "$JAP_redistribution_desc$"
 JAP_energy_efficiency_idea: "$JAP_focusing_renewable_energy$"
 JAP_energy_efficiency_idea_desc: "$JAP_focusing_renewable_energy_desc$"
 JAP_leading_disarmament_idea: "$JAP_leading_disarmament$"
 JAP_leading_disarmament_idea_desc: "$JAP_leading_disarmament_desc$"
 JAP_leading_disarmament_idea_3: "Развитие как мирной нации"
 JAP_leading_disarmament_idea_3_desc: "Мы определим национальный путь, не зависящий от военной силы, и перенаправим ресурсы и таланты на гражданское развитие. Сосредоточив усилия на укреплении промышленной базы и городских функций и ускорив создание гражданских отраслей и офисных районов, мы повысим уровень жизни и стимулируем экономический рост."
 JAP_prioritizing_order_modifier: "$JAP_prioritizing_order$"
 JAP_prioritizing_order_modifier_desc: "$JAP_prioritizing_order_desc$"
 JAP_strengthening_cabinet_modifier: "$JAP_strengthening_cabinet$"
 JAP_strengthening_cabinet_modifier_desc: "$JAP_strengthening_cabinet_desc$"
 JAP_regulatory_reform_modifier: "Регуляторная реформа и стратегия роста"
 JAP_regulatory_reform_modifier_desc: "Мы укрепим внутреннюю конкурентоспособность и перейдём к системе, способной поддерживать стабильный рост. Снижая ограничения на предпринимательскую деятельность, мы задействуем динамику частного сектора для развития отраслей и занятости."
 JAP_patriotic_education_modifier: "$JAP_patriotic_education$"
 JAP_patriotic_education_modifier_desc: "$JAP_patriotic_education_desc$"
 JAP_strengthen_military_idea: "$JAP_strengthen_military_power$"
 JAP_strengthen_military_idea_desc: "$JAP_strengthen_military_power_desc$"
 JAP_jsdf_international_missions_idea1a: "Институциональная основа для международных миссий сотрудничества"
 JAP_jsdf_international_missions_idea1a_desc: "Развитие правовой базы и операционных стандартов, необходимых для международных миссий сотрудничества, продвинулось. По мере того как процедуры развертывания за границей и стандарты реагирования во время миссий становятся яснее, стабильность работы сил и согласованность принятия решений на местах улучшаются."
 JAP_constitutional_debate_idea: "Нарастающий конституционный дебат"
 JAP_constitutional_debate_idea_desc: "Крупный сдвиг в политике безопасности подорвал давние предположения о послевоенном порядке. Хотя поддержка усиления национальной обороны растёт, оппозиция тех, кто обеспокоен отходом от пацифизма, остаётся сильной, и конфликты в обществе и политической сфере усиливаются."
 JAP_f15_programe: "Программа модернизации F15"
 JAP_submarine_modernization_idea: "Программа модернизации подводного флота"
 JAP_carrier_aviation: "Восстановление авианосной авиации"
 JAP_keen_sword_operation_idea: "Учения «Кин Сворд»"
 JAP_defense_technology_agency1: "Агентство оборонных технологий Ниппон"
 JAP_defense_technology_agency1_desc: "Агентство оборонных технологий Ниппон координирует исследования, разработки и закупки между промышленностью, академическими кругами и вооружёнными силами. Объединив передовые проекты под одной стратегической концепцией, Япония ускоряет инновации, сокращает дублирование и обеспечивает, что передовые технологии быстрее доходят до передовых частей."
 JAP_diplomacy_modifier: "Дипломатия Японии"
 JAP_diplomacy_modifier_desc: "Япония делает упор на двусторонние связи с ключевыми странами, усиливая сотрудничество в экономике, безопасности и культуре. Через прагматичные партнёрства, основанные на интересах, Япония укрепляет своё присутствие на мировой арене."
 JAP_chiang_mai_initiative: "Инициатива Чиангмай"
 JAP_chiang_mai_initiative_desc: "С расширением валютных свопов с Японией государства-члены АСЕАН укрепляют устойчивость к финансовым кризисам, повышая экономическую стабильность и автономию."
 JAP_quantitative_oda_idea: "Японские инвестиции ОДА в инфраструктуру"
 JAP_quantitative_oda_idea_desc: "Официальная помощь развития Японии ускорила развитие инфраструктуры, такой как транспорт, порты и электроэнергия. Эта поддержка служит важной основой для экономического роста нашей страны."
 JAP_qualitative_oda_idea: "Японская ОДА для человеческого капитала и инноваций"
 JAP_qualitative_oda_idea_desc: "Сотрудничество с Японией принесло значительный прогресс в образовании, развитии человеческих ресурсов и исследованиях. Укрепление потенциала местных предприятий и институтов прокладывает путь к устойчивому развитию."
 JAP_security_south_china_sea_idea: "Японская роль в морской стабильности"
 JAP_security_south_china_sea_idea_desc: "Нейтральное участие Японии в морской безопасности в Южно-Китайском море помогло снизить напряжённость в регионе и защитить свободу судоходства. Оно служит надёжным стабилизирующим фактором для нашего региона."
 JAP_jap_education: "Японо-американская образовательная программа"
 JAP_jap_education_desc: "Пилотируется гибридная образовательная программа, совмещающая японскую дисциплину с американским предпринимательским духом. Взаимное изучение сильных сторон даёт важный стимул для развития будущих поколений."
 JAP_jap_education_culture: "Японо-американское культурно-образовательное сотрудничество"
 JAP_jap_education_culture_desc: "Возникает более широкое партнёрство между Японией и США, выходящее за рамки поп-культуры и передовых технологий. Развитие человеческих ресурсов углубляется через синтез японского образования с фокусом на дисциплину и американского образования с упором на креативность. Синергия культурной близости и научного сотрудничества укрепляет как общественную стабильность, так и импульс для инноваций."
 JAP_dual_use_idea: "Японо-американское сотрудничество в исследованиях двойного назначения"
 JAP_dual_use_idea_desc: "Сотрудничество Японии и США в технологиях двойного назначения усиливается. Ускоренное развитие и обмен экспертизой обещают большую конкурентоспособность в гражданской и военной сферах."
 JAP_disaster_countermeasure_cooperation_idea: "Укрепление устойчивости к бедствиям через сотрудничество"
 JAP_disaster_countermeasure_cooperation_idea_desc: "Благодаря сотрудничеству с Японией в реагировании на бедствия Тайвань значительно укрепил свою способность справляться с чрезвычайными ситуациями. Обмен знаниями и совместные программы подготовки должны снизить ущерб и ускорить восстановление."
 JAP_tai_high_technology_idea: "Японо-тайваньское партнёрство в передовых технологиях"
 JAP_tai_high_technology_idea_desc: "Совместные исследования с Японией ускоряют инновации в гражданских технологических секторах Тайваня. Совместные исследовательские ресурсы и международное сотрудничество повышают промышленную конкурентоспособность."
 JAP_tai_international_student_idea: "Поколенческий обмен с Японией"
 JAP_tai_international_student_idea_desc: "Расширение возможностей для обучения в Японии позволяет большему числу тайваньских студентов получить разнообразный академический опыт. Это способствует формированию будущих лидеров в отношениях Японии и Тайваня и расширяет международные перспективы."
 JAP_chi_kor_intellectual_platform: "Платформа диалога памяти Восточной Азии"
 JAP_chi_kor_intellectual_platform_desc: "При поддержке ООН Япония, Китай и Южная Корея запустили совместную интеллектуальную платформу для сохранения исторической памяти и углубления взаимопонимания. Эта инициатива обозначает новую международную структуру, балансирующую историческое осмысление и ориентированное на будущее сотрудничество."
 JAP_chi_trade_support_idea: "Гармонизация торговых систем"
 JAP_chi_trade_support_idea_desc: "С технической и институциональной поддержкой Японии Китай продвигает развитие торговых систем, соответствующих международным стандартам. Реформы, такие как упрощение таможенных процедур и изменения в законодательстве, способствуют институциональной модернизации."
 JAP_chi_advancement_companies_idea: "Углублённая промышленная интеграция с Японией"
 JAP_chi_advancement_companies_idea_desc: "Взаимное расширение японских и китайских компаний упрощает производственные сети и углубляет экономическую взаимозависимость между двумя странами."
 JAP_chi_kanji_idea: "Сотрудничество культурной сферы синогрфических символов"
 JAP_chi_kanji_idea_desc: "Через культурное сотрудничество с Японией Китай укрепляет обмен в рамках общей «синограмматической культурной сферы». Это способствует усилению мягкой силы и более благоприятному международному образу."
 JAP_chi_temple_idea: "Совместное сохранение буддийского наследия"
 JAP_chi_temple_idea_desc: "Совместно сохраняя и восстанавливая буддийские храмы и культурные достояния с Японией, Китай подтверждает ценность своего религиозного наследия и способствует развитию туризма."
 JAP_kor_accelerator_idea: "Сотрудничество акселератора Токио–Сеул"
 JAP_kor_accelerator_idea_desc: "Рамки поддержки стартапов, созданные совместно Сеулом и Токио, способствуют развитию нового поколения предпринимательства и укрепляют межгородское технологическое сотрудничество."
 JAP_kor_local_companies_idea: "Программа обмена местными предприятиями"
 JAP_kor_local_companies_idea_desc: "Через обмены между местными компаниями Кореи и Японии региональные экономики оживляются и формируются новые частные промышленные сети."
 JAP_kor_aging_idea: "Совместная рабочая группа по проблемам старения"
 JAP_kor_aging_idea_desc: "Для решения общей проблемы стареющего населения сформирована совместная рабочая группа корейских и японских экспертов для обмена политическим опытом и совершенствования мер социальной защиты."
 JAP_sov_logistics_corridor_idea: "Японо-российская евразийская логистическая сеть"
 JAP_sov_logistics_corridor_idea_desc: "В рамках сотрудничества с Японией ведётся развитие логистического коридора, соединяющего Японию и Европу через Россию. Модернизация инфраструктуры и экономическая связь усиливают геополитическое значение России."
 JAP_sov_it_corridor_idea: "Японо-российская цифровая инициатива"
 JAP_sov_it_corridor_idea_desc: "При поддержке Японии Россия расширяет свою ИТ-инфраструктуру. Партнёрство Японии и России нацелено на создание широкого цифрового коридора и базиса для глобального обмена информацией."
 JAP_territorial_disputes1: "Политические дивиденды от территориальных переговоров"
 JAP_territorial_disputes1_desc: "После определённого прогресса в давних территориальных спорах напряжённость в прилегающих водах несколько уменьшилась, и в общественном мнении растёт чувство облегчения. Снижение дипломатической неопределённости также положительно влияет на экономическую активность прибрежных регионов, поддерживая налоговую базу, связанную с рыболовством, за счёт улучшения условий ведения хозяйства."
 JAP_monarchist_shipbuilding_idea: "Имперская программа судостроения"
 JAP_monarchist_shipbuilding_idea_desc: "Империя вернется к морю как к своей естественной вотчине. В рамках Имперской программы военно-морского строительства расширяются верфи, централизуются контракты, а производство поддерживается в темпах, сопоставимых с военными, до тех пор, пока флот не сравняется с амбициями Японии. Моря, созданные от имени Императора, принадлежат Империи!"
 JAP_monarchist_shipbuilding_idea_tt: "§RЭта идея будет отменена, когда вы будете§! §Y$naval_power_of_the_continent$§!"
 JAP_restoring_imperial_household_idea: "Восстановление Императорского двора"
 JAP_restoring_imperial_household_idea_desc: "Императорский двор восстанавливается как государственный институт, а не как декоративный двор. Его офисы расширяются, протоколы формализуются, а влияние возвращается через назначения, которые сближают министерства и общество с Троном. Дом Императора снова станет тихим двигателем национального единства и направления."
 JAP_once_millennium_disaster: "Стихийное бедствие раз в тысячу лет"
 JAP_once_millennium_disaster_desc: "Великое землетрясение Восточной Японии 11 марта 2011 года стало одним из самых разрушительных бедствий в современной истории Японии. Землетрясение и цунами мгновенно разрушили инфраструктуру, отрасли и средства к существованию, погрузив нацию в глубокий кризис. Дорога к восстановлению будет долгой и тяжёлой, потребовав огромных ресурсов и времени."
 JAP_scars_earthquake_and_tsunami: "Шрамы землетрясения и цунами"
 JAP_scars_earthquake_and_tsunami_desc: "Великое землетрясение Восточной Японии и разрушительное цунами нанесли катастрофический ущерб городам, портам и прибрежным общинам Тохоку. Инфраструктура и промышленные объекты были уничтожены, что серьёзно подорвало местную производительность и средства к существованию. Восстановление займёт годы и потребует огромных ресурсов и усилий."
 JAP_scars_earthquake: "Шрамы землетрясения"
 JAP_scars_earthquake_desc: "Толчки Великого землетрясения Восточной Японии также ударили по региону Канто, сильно затронув транспортную сеть и нарушив часть промышленной базы. Даже столичный район испытал временное снижение экономической активности. Хотя разрушения не так велики, как в Тохоку, восстановление всё равно требует значительного времени и усилий."
 JAP_focus_renewable_energy_idea: "Ставка на возобновляемую энергию"
 JAP_focus_renewable_energy_idea_desc: "Опасения за ядерную безопасность заставили нас отдать приоритет возобновляемой энергетике, укрепляя долгосрочную независимость в выработке электроэнергии."
 JAP_focus_energy_TT: "Дополнительные расходы: §R0.01%§! ВВП"
 JAP_focus_thermal_power_idea: "Ставка на тепловые электростанции"
 JAP_focus_thermal_power_idea_desc: "Выбор тепловых электростанций обеспечивает стабильную выработку и быструю подачу, особенно пока ядерная безопасность остаётся национальной проблемой."
 JAP_anxiety_nuclear_power: "Общественное беспокойство о атомной энергии"
 JAP_anxiety_nuclear_power_desc: "Шок от аварии на Фукусиме-1 распространил страх и недоверие к атомной энергетике по всему обществу. Общественное сопротивление и процедурные задержки тормозят новое строительство, а политические волнения продолжаются."
 JAP_shut_down_nuclear_plants: "Закрыть все АЭС"
 JAP_shut_down_nuclear_plants_desc: "Приняв решение закрыть атомные станции, правительство напрямую ответило на страхи общества. Сопротивление остаётся, но решение широко воспринимается как приоритет безопасности, и социальное напряжение постепенно спадает."
 JAP_nuclear_strict_examination: "Ужесточение ядерных стандартов"
 JAP_nuclear_strict_examination_desc: "В ответ на аварию регулирование и проверки были радикально усилены. Новые станции и перезапуски теперь требуют дополнительных мер и долгих процедур, что замедляет развитие атомной энергетики и снижает её способность работать на прежних мощностях."
 JAP_continue_nuclear_plants: "Сохранить атомную энергетику"
 JAP_continue_nuclear_plants_desc: "Правительство решило сохранить атомную энергию, но память об аварии остаётся живой. Недоверие и протесты по поводу безопасности продолжаются, подпитывая политические конфликты и подрывая внутреннюю стабильность."
 JAP_crown_centered: "Возрождение кроноцентрической идеологии"
 JAP_crown_centered_desc: "После слов премьер-министра Мори традиционалистская и монархическая риторика начала набирать силу в некоторых кругах. Поскольку правительство показало готовность использовать этот тренд, движение, стремясь переоценить Императорский двор как центральный принцип государства, начало приобретать ограниченное, но растущее политическое влияние."
 JAP_monarchist_modifier: "Императорская власть"
 JAP_monarchist_modifier_desc: "Трон вернулся к управлению, и государство теперь движется императорским мандатом, а не партийными торгами. Ведомства, силовые органы и промышленность выровнены под единую доктрину, которая видит Императора источником легитимности и курса."
