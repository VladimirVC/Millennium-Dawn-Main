 IND_back_papua_desc: "Our Christians have been neglected for too long. It is our duty as a state to give representation and fair treatment to all of our Christians, regardless if they're a minority or not. They must be protected at all times!\n\n\n\nNegotiating is invaluable and must begin immediately!"
