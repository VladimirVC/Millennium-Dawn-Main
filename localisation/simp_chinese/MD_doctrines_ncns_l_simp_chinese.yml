 GRAND_DOCTRINE_LOCAL_AIRSPACE_DEFENCE_DESC: "该主要学说围绕保护和控制国家及区域空域来构建空军力量。本土空域防御理念强调在特定空域内进行协调监视与响应。"
 GRAND_DOCTRINE_AIR_BATTLEFIELD_SUPPORT_DESC: "该主要学说旨在构建空中作战体系，以直接支援活跃战区内的陆军和海军部队。战场支援理念强调将空中力量整合进联合作战规划中。"
 GRAND_DOCTRINE_AIR_SUPREMACY_DESC: "该主要学说旨在组织空军力量，以建立并维持对空域的掌控。制空权理念强调通过协调空中作战行动，确保在所有作战区域获得行动自由。"
 GRAND_DOCTRINE_MIXED_ROLE_DESC: "该主要学说旨在构建一个平衡多种作战角色的统一空军框架。混合角色理念强调空军在执行多样化任务时的灵活性。"
 GRAND_DOCTRINE_EQUIPMENT_LIGHT_DESC: "该主要学说围绕轻量化和简化装备体系来组织部队。轻装备理念强调部署便捷性以及在多样化作战环境中的适应性。"
 GRAND_DOCTRINE_EQUIPMENT_HEAVY_DESC: "该主要学说围绕高防护、大容量的装备系统构建部队。重型装备理念强调在部队编成中保持持续存在和强大的作战能力。"
 GRAND_DOCTRINE_EQUIPMENT_MOBILE_DESC: "该主要学说通过组织部队装备，以支持高度的作战机动性和快速机动能力。机动装备理念强调运动、重新部署和作战范围。"
 GRAND_DOCTRINE_EQUIPMENT_FIRES_DESC: "该主要学说围绕专用于提供间接与支援火力的系统来构建装备发展。火力支援装备理念强调在战斗空间内协调运用作战力量。"
 GRAND_DOCTRINE_EQUIPMENT_FULL_DESC: "该主要学说围绕全面且完整的装备供应来组织部队。全装备理念强调标准化配备，以支持持续且广泛的作战行动。"
 GRAND_DOCTRINE_BLUE_WATER_DESC: "该主要学说旨在构建能够在开阔海域及遥远海战区持续作战的海军力量。蓝水海军理念强调全球抵达能力、力量投送以及舰队持续存在。"
 GRAND_DOCTRINE_GREEN_WATER_DESC: "该主要学说围绕近海和区域海洋环境作战来组织海军力量。绿水海军理念强调沿海影响力与区域海域控制权。"
 GRAND_DOCTRINE_JEUNE_ECOLE_DESC: "该主要学说围绕小型、专业化舰艇和分布式海上行动构建海军战略。“绿水学派”理念强调海军作战中的非对称性和选择性力量运用。"
 GRAND_DOCTRINE_GUERRE_DE_COURSE_DESC: "该主要学说围绕通过以商业为导向的战争破坏海上活动来组织海军行动。海上破交战概念强调针对海上交通线实施精准打击。"
