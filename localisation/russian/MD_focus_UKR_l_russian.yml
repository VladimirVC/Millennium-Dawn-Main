 UKR_inner_policy_spu: "Внутренняя политика"
 UKR_inner_policy_spu1: "Политика левых"
 UKR_inner_policy_spu2: "Политика левых"
 UKR_inner_policy_spu3: "Политика левых"
 UKR_inner_policy_spu4: "Политика левых"
 UKR_security_start: "Безопасность Украины"
 UKR_security_start_desc: "Our country is huge and therefore needs strong internal protection, we will begin financing and reforming our government structures."
 UKR_sbu_start: "Реформа СБУ"
 UKR_sbu_start_desc: "Our security service of Ukraine needs deep reform and increased efficiency."
 UKR_sbu_t: "Главное управление \"Т\""
 UKR_sbu_t_desc: "The Security Council of Ukraine implements a state policy in the field of countering organizations and individuals whose purpose is to undermine national statehood, eliminate the independence of Ukraine, change the constitutional order by force, violate the sovereignty and territorial integrity of the state, undermine its security, illegally seize state power, propaganda of war, violence, inciting interethnic, racial, religious and other hostility, encroachments on human rights and freedoms.\n\nAs well as prevention, detection and suppression of crimes and other illegal acts that directly pose a threat to the vital interests of the state and the security of citizens of Ukraine and are within the competence of the Security Service of Ukraine, implements crime prevention in this area."
 UKR_sbu_corrupt: "Главное управление \"К\""
 UKR_sbu_corrupt_desc: "The Security Service of Ukraine, according to the Law of Ukraine \"On the organizational and legal foundations of the fight against corruption and organized crime dated 30.06.1993 No. 3341-XII\", is entrusted with the fight against corruption and organized crime.\n\nOne of the state bodies authorized to work in this area is the Main Directorate for Combating Corruption and Organized Crime of the Security Council of Ukraine (GU \"K\")."
 UKR_sbu_contr: "Главное управление военной контрразведки"
 UKR_sbu_contr_desc: "Military counterintelligence agencies are created for counterintelligence support of the Armed Forces of Ukraine, the State Border Guard Service of Ukraine and other military formations stationed on the territory of Ukraine.\n\nThe system of military counterintelligence bodies of the Security Council of Ukraine consists of the Main Directorate of Military Counterintelligence, bodies (units) in the regions as part of the Counterintelligence Department, operational units of military counterintelligence in operational, regional and territorial commands (directorates), army corps, individual military units and formations."
 UKR_sbu_svr: "Служба внешней разведки"
 UKR_sbu_svr_desc: "The Foreign Intelligence Service of Ukraine, or SZRU, is an intelligence agency of the Ukrainian government. It carries out its intelligence activities in political, economic, military, scientific, technical information and ecological spheres and subordinates directly to the President of Ukraine."
 UKR_sbu_sviaz_desc: "Государственная служба специальной связи Украины, также известная как Держспецсвязь, является специализированным органом исполнительной власти, основными функциями которого являются обеспечение защищенной правительственной связи, государственной курьерской службы, защита информации и киберзащита."
 UKR_sbu_alpha: "Альфа"
 UKR_sbu_alpha_desc: "Group \"A\" of the Special Operations Center of the Security Service of Ukraine is a special unit of the Security Service of Ukraine. Officially it bears the name \"Military unit E6117\"."
 UKR_sbu_administration: "Военно-гражданская администрация"
 UKR_sbu_administration_desc: "The Civil-Military Administration is a temporary state authority in Ukraine, created in the territories adjacent to the combat zone."
 UKR_peacemakers: "Программа миротворчества"
 UKR_peacemakers_desc: "Our country has always sought to participate in peacekeeping missions all over the planet, and we will continue this tradition."
 UKR_border_guard: "Государственная пограничная служба"
 UKR_border_guard_desc: "The State Border Guard Service of Ukraine is the border guard of Ukraine. It is an independent law enforcement agency, organized by the Constitution of Ukraine as a military formation, the head of which is subordinated to the President of Ukraine."
 UKR_reform_vv: "Реформа внутренних войск"
 UKR_reform_vv_desc: "Our internal troops have had an uncertain status in the hierarchy of state structures since their appearance, it's time to fix this."
 UKR_finance_vv: "Финансирование спецбатальонов"
 UKR_finance_vv_desc: "We will finance the activities of special battalions of the internal troops, perhaps in the future they will be very useful to us."
 UKR_sbu_white_wolves: "Батальон \"Белые волки\""
 UKR_sbu_white_wolves_desc: "The SBU will send a battalion created from its employees to the war."
 UKR_border: "Государственная пограничная служба"
 UKR_border_desc: "Our borders are too big to rely on individual units of the armed forces to protect them. The border troops will perform this task more efficiently."
 UKR_svr: "Служба внешней разведки"
 UKR_sviaz: "Государственная служба специальной связи"
 UKR_sbu_sviaz: "Государственная служба специальной связи"
