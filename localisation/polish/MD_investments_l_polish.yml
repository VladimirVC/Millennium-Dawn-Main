 expand_local_military_infrastructure: "Aktualnie §YRozwijanie lokalnej infrastruktury wojskowej§! w §Y[THIS.GetName]§!."
 expand_local_military_infrastructure_tt: "§YRozszerz lokalną infrastrukturę wojskową§! w §Y[THIS.GetName]§!\n---------\nWojsko zwróciło się do rządu i zidentyfikowało potencjalne miejsca budowy w §Y[THIS.GetName]§!. Zasugerowano rozbudowę lokalnej infrastruktury wojskowej w tym miejscu, aby zapewnić wojsku w regionie odpowiednie wsparcie w przypadku konfliktu w tym obszarze."
