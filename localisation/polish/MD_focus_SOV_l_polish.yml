 SOV_warsaw_influence_close3: "Ostateczne decyzje w sprawie rewolucji w §Y[CZE.GetNameWithFlag]§! i §Y[SLO.GetNameWithFlag]§!"
 Sov_warsaw_pact.13.t: "Zbrojne powstanie w Niemczech Wschodnich"
 Sov_warsaw_pact.13.d: "W Niemczech Wschodnich wybuchło zbrojne powstanie. Dzięki wsparciu finansowemu i zbrojeniowemu Układu Warszawskiego, siły zbrojne Niemiec Wschodnich przejęły kontrolę nad kluczowymi instytucjami i ogłosiły odbudowę Niemieckiej Republiki Demokratycznej. Rebelianci potępiają zjednoczenie z Niemcami Zachodnimi jako poważny błąd, który należy naprawić."
 Sov_warsaw_pact.13.a: "Czy świat stoi na krawędzi III wojny światowej?"
