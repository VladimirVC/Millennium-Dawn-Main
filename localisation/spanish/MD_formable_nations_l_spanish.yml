 form_AUSHUN_category: "Reformar el Imperio Austro-Húngaro"
 form_AUSHUN_category_desc: "El Imperio austrohúngaro fue una gran potencia en Europa central a finales del siglo XIX y principios del XX. La nación se disolvió tras su rotunda derrota en la Gran Guerra y se dividió en las naciones de Chequia, Austria, Hungría, Eslovaquia, Eslovenia, Bosnia y partes de Ucrania, Polonia y Rumania. Es hora de recuperar el manto que se perdió hace tanto tiempo. Es hora de reformar el Imperio austrohúngaro."
 AUSHUN_integrate_start: "Begin forming [GetAUSHUNNameDef]"
 AUSHUN_integrate_start_desc: "The holdings of the Austro-Hungarian Empire have been reclaimed by our military and our politicians have started the work towards administering the new regions.\n\n"
 AUSHUN_integrate_AUS: "Integrate [GetAUSHUNNameAdj] [AUS.GetAdjective] Territories"
 AUSHUN_integrate_AUS_desc: "Los territorios centrales del antiguo imperio de los Habsburgo, Austria, deberían ser uno de los principales centros de poder de nuestra nación."
 AUSHUN_integrate_HUN: "Integrate [GetAUSHUNNameAdj] [HUN.GetAdjective] Territories"
 AUSHUN_integrate_HUN_desc: "El Reino de Hungría era la otra mitad de la Monarquía Dual, un socio en el gobierno del imperio. Su integración es esencial para restaurar la estructura imperial."
 AUSHUN_integrate_SLV: "Integrate [GetAUSHUNNameAdj] [SLV.GetAdjective] Territories"
 AUSHUN_integrate_SLV_desc: "Las tierras eslovenas formaban parte de las tierras de la corona austriaca, proporcionando acceso al Adriático y sirviendo de puente entre Austria y los Balcanes."
 AUSHUN_integrate_NORTHITA: "Integrate [GetAUSHUNNameAdj] North Italian Territories"
 AUSHUN_integrate_NORTHITA_desc: "Los territorios italianos de Lombardía-Venecia fueron antaño joyas de la corona de los Habsburgo, ricos en cultura y comercio. Su retorno restauraría la influencia de Austria sobre el valle del Po."
 AUSHUN_integrate_CRO: "Integrate [GetAUSHUNNameAdj] [CRO.GetAdjective] Territories"
 AUSHUN_integrate_CRO_desc: "Croacia formaba parte de la corona húngara con una importante autonomía. Sus puertos y su posición estratégica a orillas del Adriático la convertían en un elemento vital para el poder naval del imperio."
 AUSHUN_integrate_BOS: "Integrate [GetAUSHUNNameAdj] [BOS.GetAdjective] Territories"
 AUSHUN_integrate_BOS_desc: "Administrada por Austria-Hungría desde 1878 y formalmente anexada en 1908, la integración de Bosnia-Herzegovina asegurará nuestras fronteras del sur y extenderá nuestra influencia a los Balcanes."
 AUSHUN_integrate_SLO: "Integrate [GetAUSHUNNameAdj] [SLO.GetAdjective] Territories"
 AUSHUN_integrate_SLO_desc: "Las tierras eslovacas formaban parte integral del Reino de Hungría y formaban la montañosa frontera norte de la corona. Su reintegración fortalece nuestro control sobre los Cárpatos."
 AUSHUN_integrate_AUSROM: "Integrate [GetAUSHUNNameAdj] Transylvanian Territories"
 AUSHUN_integrate_AUSROM_desc: "Transilvania fue un territorio histórico de la corona húngara, disputado entre las poblaciones rumana y húngara. El control de esta región aseguraba los accesos orientales al imperio."
 AUSHUN_integrate_CZE: "Integrate [GetAUSHUNNameAdj] [CZE.GetAdjective] Territories"
 AUSHUN_integrate_CZE_desc: "Las tierras de la corona bohemia se encontraban entre los territorios más industrializados y culturalmente ricos del imperio. Praga se erigió como una de las grandes ciudades imperiales, y su reintegración es crucial."
 AUSHUN_integrate_AUSPOL: "Integrar el sur de Polonia"
 AUSHUN_integrate_AUSPOL_desc: "Galicia era un territorio de la corona adquirido a través de las particiones de Polonia, que aportaba recursos económicos y profundidad estratégica a la frontera norte del imperio."
 AUSHUN_integrate_WESTUKR: "Integrar el suroeste de Ucrania"
 AUSHUN_integrate_WESTUKR_desc: "Las zonas orientales de Galicia albergaban poblaciones rutenas y aportaban riqueza agrícola. Su integración extiende nuestra influencia a las fronteras ucranianas."
 AUSHUN_update_flag: "Finish Forming [GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetAUSHUNNameDef], adopting its unified flag and name."
 is_AUSHUN: "Has formed [GetAUSHUNNameDef]"
 form_PBL_category: "Confederación Perú-Boliviana"
 form_PBL_category_desc: "La Confederación Perú-Boliviana fue originalmente una entidad efímera a principios del siglo XIX. Surgió de la división de la República Peruana y las guerras civiles de 1834 y 1835 a 1836, e incluyó al Estado de Bolivia. Las conversaciones modernas son mínimas, pero sigue siendo una idea presente en la atmósfera política de los pueblos boliviano y peruano. Ha llegado el momento de considerar este nuevo futuro para nuestro pueblo."
 PBL_integrate_start: "Begin forming [GetPBLNameDef]"
 PBL_integrate_start_desc: ""
 PBL_integrate_PRU: "Integrate [GetPBLNameAdj] [PRU.GetAdjective] Territories"
 PBL_integrate_PRU_desc: "Perú es el mayor de los dos estados-nación de la confederación. Posee la mayor población, economía y extensión territorial. Integrar al Perú es una empresa colosal, pero apoderarse de este estado es una medida sólida para los intereses de la nueva confederación."
 PBL_integrate_BOL: "Integrate [GetPBLNameAdj] [BOL.GetAdjective] Territories"
 PBL_integrate_BOL_desc: "Bolivia es uno de los dos principales estados-nación que fundaron la confederación. Es una nación más pequeña en cuanto a superficie, población y capacidad económica; sin embargo, esto no es razón para desacreditarla. Las montañas son ricas en materias primas que son imprescindibles para producir productos electrónicos y otros bienes intermedios. La integración de esta nación consolida otra posición sólida para nuestra economía ahora diversificada."
 PBL_integrate_WESTPAR: "Integrar el Oeste de Paraguay"
 PBL_integrate_WESTPAR_desc: "El oeste de Paraguay no cuenta con los mismos recursos naturales que el oeste de Brasil o el norte de Chile. Sin embargo, esta zona tiene abundantes tierras de cultivo y regiones en las que podemos desarrollar la industria de nuestra nueva nación."
 PBL_integrate_WESTBRA: "Integrar el Oeste de Brasil"
 PBL_integrate_WESTBRA_desc: "El oeste de Brasil alberga a pueblos indígenas y una gran cantidad de recursos naturales. La integración del oeste de Brasil ayudará a mejorar la posición de nuestra nación y aumentará la tierra en la que podemos desarrollarnos."
 PBL_integrate_NORTHCHL: "Integrar el Norte de Chile"
 PBL_integrate_NORTHCHL_desc: "Las regiones del norte de Chile están listas para ser integradas y debemos incluirlas para ayudarnos a alcanzar nuestras metas futuras."
 PBL_update_flag: "Finish Forming [GetPBLNameDef]"
 PBL_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetPBLNameDef], adopting its unified flag and name."
