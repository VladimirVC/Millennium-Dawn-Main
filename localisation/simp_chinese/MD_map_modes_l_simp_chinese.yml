l_simp_chinese:
 MAPMODE_EU_MAP_MODE_NAME: "欧盟"
 MAPMODE_EU_MAP_MODE: "欧盟"
 MAPMODE_EU_MAP_MODE_DESCRIPTION: "显示欧盟成员国、潜在成员国以及欧盟现任官员所属国。"
 EU_map_mode_tooltip: "欧盟"
 EU_map_mode_tooltip_delayed: "展示欧盟目前的成员国和领导层。\n\n§H图例：§!\n§n蓝色§!= 欧盟成员国\n§Y金色§!= 欧盟潜在成员国\n\n§H官员：§!\n§R红色§! = 欧洲联合会主席，欧洲理事会主席，欧洲议会主席\n§9棕色§! = 欧洲海军秘书长\n§G绿色§! = 欧洲陆军秘书长\n§C青色§! = 外交事务和安全政策联盟高级代表\n§0紫色§! = 欧洲经济财政部长\n§Y黄色§! = 欧洲中央银行总裁\n§P深粉色§! = 欧盟边境管理局主席\n§O橙色§! = 欧盟驻联合国大使\n§p粉红色§! = 欧洲联邦主席\n\n每周更新"
 MAPMODE_INFLUENCE_MAP_MODE_NAME: "影响力"
 MAPMODE_INFLUENCE_MAP_MODE: "影响力"
 MAPMODE_INFLUENCE_MAP_MODE_DESCRIPTION: "显示您在其他国家的影响力排名。影响力决定外交筹码，并随时间推移影响政治格局。"
 influence_map_mode_tooltip: "影响力"
 influence_map_mode_tooltip_delayed: "显示您拥有影响力的国家、您在影响力人物中的排名以及已设置为自动施加影响力的国家。\n\n影响力决定了你对一个国家的外交影响力。排名越高，对该国的政治立场和外交政策的影响力就越大。\n\n§H图例：§!\n§G绿色§! = 你的国家\n§C青色§! = 第一位影响者(主导)\n§l浅蓝色§! = 第二与第三位影响者\n§n海军蓝§! = 第四至第七位影响者\n§9橙色§! = 自动施加影响的国家 (每月)\n§R红色§! = 扩散影响冷却 (曾经的目标国)\n§H暗灰色§! = 无影响\n\n每周更新。"
 MAPMODE_GCC_MAP_MODE_NAME: "海湾合作委员会"
 MAPMODE_GCC_MAP_MODE: "海湾合作委员会"
 MAPMODE_GCC_MAP_MODE_DESCRIPTION: "显示海湾合作委员会的成员国和潜在成员国。"
 GCC_map_mode_tooltip: "海湾合作委员会"
 GCC_map_mode_tooltip_delayed: "显示海湾合作委员会的当前成员国。\n\n§H图例：§!\n§C蓝绿色§! = 海湾合作委员会成员国\n§G黄绿色§! = 海湾合作委员会潜在成员国\n\n每周更新。"
 MAPMODE_SCO_MAP_MODE_NAME: "上海合作组织"
 MAPMODE_SCO_MAP_MODE: "上海合作组织"
 MAPMODE_SCO_MAP_MODE_DESCRIPTION: "显示上海合作组织的成员国、观察员国和潜在成员国。"
 SCO_map_mode_tooltip: "上海合作组织"
 SCO_map_mode_tooltip_delayed: "显示上海合作组织的当前成员国。\n\n§H图例：§!\n§9橙色§! = 上海合作组织成员国\n§0粉红色§! = 上海合作组织观察员国\n§Y黄色§! = 上海合作组织潜在成员国\n\n每周更新。"
 MAPMODE_GDP_C_MAP_MODE_NAME: "人均GDP"
 MAPMODE_GDP_C_MAP_MODE: "人均GDP"
 MAPMODE_GDP_C_MAP_MODE_DESCRIPTION: "该地图模式显示一个国家的人均GDP，代表人均经济产出。"
 gdp_c_map_mode_tooltip: "[FROM.CONTROLLER.GetNameWithFlag]人均GDP"
 gdp_c_map_mode_tooltip_delayed: "§Y[FROM.CONTROLLER.GetNameWithFlag]§!的人均GDP是：§Y$[?FROM.CONTROLLER:gdp_per_capita|Y]K§!。\n\n人均GDP代表人均经济产出。数值越高，表明经济越富裕、生产力越高。\n\n§H图例：§!\n§n深蓝色§! = 低于8K (低等收入)\n§l亮蓝色§! = 8K - 18K (低中等收入)\n§C青色§! = 18K - 32K (中等收入)\n§G绿色§! = 32K - 60K (中上等收入)\n§Y黄色§! = 60K - 110K (上等收入)\n§9亮金色§! =高于110K (极其富有)\n\n随每周经济数据浮动更新。"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_NAME: "能耗缺口"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE: "能耗缺口"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_DESCRIPTION: "该地图模式显示各国当前未满足能源需求的百分比。"
 energy_consumption_map_mode_tooltip: "[FROM.CONTROLLER.GetNameWithFlag]的能源缺口比率"
 energy_consumption_map_mode_tooltip_delayed: "§Y[FROM.CONTROLLER.GetNameWithFlag]§!的能源缺口比率为：§Y[?FROM.CONTROLLER:unfulfilled_energy_demand_var|%+]§!\n\n这显示了能源需求未得到满足的百分比。负值表示需求超过供应（能源短缺）。\n\n§H图例：§!\n§n深蓝色§! = 低于-30% (严重短缺)\n§l亮蓝色§! = -30%至-18% (中等短缺)\n§C青色§! = -18%至-12% (轻度短缺)\n§G绿色§! = -12%至-4% (基本满足)\n§Y黄色§! = -4%至-1% (几乎满足)\n§9亮金色§! = 高于-1% (完全满足)\n\n§n颜色越深情况越糟糕。§! 投资能源生产以改善现状。\n随经济数据浮动每周更新。"
 MAPMODE_PRODUCTIVITY_MAP_MODE_NAME: "生产率"
 MAPMODE_PRODUCTIVITY_MAP_MODE: "生产率"
 MAPMODE_PRODUCTIVITY_MAP_MODE_DESCRIPTION: "该地图模式显示各个省份的当前生产率，代表每位劳动者的经济产出效率。"
 productivity_map_mode_tooltip: "[FROM.GetName]的生产率"
 productivity_map_mode_tooltip_delayed: "§Y[FROM.GetName]§!的生产率为：§Y[?FROM.productivity_state_var|Y]§!\n\n生产率衡量的是一个国家的经济产出效率。生产率越高，意味着每个劳动者的经济产出越多。\n\n§H图例：§!\n§n深紫色§! = 低于200 (非常低)\n§n深蓝色§! = 200 - 500 (低)\n§l亮蓝色§! = 500 - 800 (低于平均值)\n§C青色§! = 800 - 1200 (平均值)\n§G绿色§! = 1200 - 1900 (高于平均值)\n§Y黄色§! = 1900 - 2800 (高)\n§9亮金色§! = 3800 - 5000 (非常高)\n§9深橙色§! = 高于285000 (爆表)\n\n随经济数据浮动每周更新。"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_NAME: "可再生能源热点"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE: "可再生能源热点"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_DESCRIPTION: "该地图模式根据风能、太阳能和其他地理因素，显示每个省份的自然可再生能源潜力。"
 renewable_energy_hotspot_map_mode_tooltip: "[FROM.GetName]的可再生能源容量系数加成"
 renewable_energy_hotspot_map_mode_tooltip_delayed: "§Y[FROM.GetName]§!的可再生能源容量系数加成为：§Y[?FROM.state_renewable_capacity_factor_modifier_var|Y]§!\n\n这是该省份可再生能源产出公式：§Y1.0§!是世界平均水平，所以一个地区的产量是世界平均水平的1.5倍，一个地区的产量是世界平均水平的0.5倍，世界平均水平的一半。\n\n§H图例（1.0=世界平均水平）：§!\n§R红色§!=高于1.6（优秀）\n§9金色§!=1.45 - 1.6（卓越）\n§Y黄色§!=1.2 - 1.45（远高于平均水平）\n§G绿色§!=1.0 - 1.2（高于平均水平）\n§C青色§!=0.8 - 1.0（略低于平均水平）\n§n蓝色§!=0.6 - 0.8（低）\n§H深蓝色§!=低于0.6（非常低）\n\n该数目是固定的，不会随时间改变。"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_NAME: "失业率"
 unemployment_rate_map_mode_tooltip: "[FROM.CONTROLLER.GetNameWithFlag]的失业率"
 unemployment_rate_map_mode_tooltip_delayed: "§Y[FROM.CONTROLLER.GetNameWithFlag]§!的失业率为：§Y[?FROM.CONTROLLER:total_unemployed_percentage_display|%Y]§!\n\n这显示了劳动年龄人口中失业人口的百分比。\n\n§H图例：§!\n§n深蓝色§! = 高于35% (危机)\n§l亮蓝色§! = 22% - 35% (非常高)\n§C青色§! = 10% - 22% (高)\n§G绿色§! = 5% - 10% (中等)\n§Y黄色§! = 2% - 5% (低)\n§9亮金色§! = 低于2% (充分就业)\n\n§n颜色越深情况越糟糕。§! 通过经济增长和政策降低失业率。\n随经济数据浮动每周更新。"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE: "失业率"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_DESCRIPTION: "该地图模式显示各国当前的失业率占劳动年龄人口的百分比。"