l_simp_chinese:
 indonesia_focus: "印度尼西亚国策树"
 IND_indonesias_future: "印度尼西亚的未来"
 IND_indonesias_future_desc: "当我们的国家用它所有的麻烦进入21世纪时，我们必须找到办法控制它们并将我们的国家带来它所应该拥有的爱！"
 IND_asia_financial_crisis: "应对危机！"
 IND_asia_financial_crisis_desc: "自1997年以来，金融危机对东南亚地区造成了沉重打击，我国也未能幸免。我们现在将着手制定解决这一问题的方案。"
 IND_japanese_aid: "呼吁日本援助"
 IND_japanese_aid_desc: "尽管我们在二战中存在分歧，但日本在我们经济困难时期对我们相当宽容。我们应该联系日本及其西方盟国，寻求帮助以摆脱目前的困境。"
 IND_japanese_aid_jica: "日本国际协力机构"
 IND_japanese_aid_jica_desc: "日本国际协力机构在帮助我国发展基础设施和道路方面可以发挥非常有益的作用。"
 IND_japanese_aid_metro_invest: "日本地铁投资"
 IND_japanese_aid_metro_invest_desc: "我们的人民需要快速地在全国各地出行，借助日本的地铁技术和投资，我们可以实现这一目标。"
 IND_japanese_aid_java_airport: "西爪哇机场"
 IND_japanese_aid_java_airport_desc: "为了满足我国日益增长的飞行员和游客的需求，我们需要建设更多的机场。西爪哇是建设机场的最佳地点，因为这里是我国首都所在地。"
 IND_japanese_aid_ev: "日本电动车"
 IND_japanese_aid_ev_desc: "日本是电动汽车领域的领导者，日本制造了许多出色的汽车，我们最好开始让人们转向电动汽车，以减少污染。"
 IND_japanese_aid_mitsubishi: "三菱工厂"
 IND_japanese_aid_mitsubishi_desc: "三菱是一家总部位于日本的成功汽车制造商。如果我们能让他们把办事处设在印度尼西亚，或许我们就能在汽车方面向他们学习一些经验。"
 IND_japanese_aid_expander_bagero: "开拓者和巴刻罗！"
 IND_japanese_aid_expander_bagero_desc: "开拓者和巴刻罗堪称匠心独运和精湛工艺的结晶，是电动汽车行业的真正奇迹，现在印尼人也能拥有它们了。"
 IND_japanese_aid_inf_finance: "印度尼西亚基础设施融资公司与日本的协议"
 IND_japanese_aid_inf_finance_desc: "印尼基础设施融资公司是一家私营公司，但在建设国家基础设施方面，我们最好还是与日本达成协议以降低成本，而不是偷工减料。"
 IND_japanese_aid_men_for_finance: "为印度尼西亚基础设施融资公司招募日本人力资源"
 IND_japanese_aid_men_for_finance_desc: "如果我们能从日本获得国际基础设施基金的人力，我们就能加强与日本的关系，并利用他们的专业知识来改善我们的基础设施。"
 IND_japanese_aid_rubber: "苏门答腊岛的橡胶田"
 IND_japanese_aid_rubber_desc: "借助日本人的力量，我们可以更高效地为世界市场生产橡胶，甚至有可能成为东南亚领先的橡胶生产商。"
 IND_new_capital_desc: "雅加达正在变成一座过时的城市，落后于世界其他首都。我们应该利用从日本人那里获得的所有专业知识和经验，开始规划建设一座全新的城市。"
 IND_chinese_aid: "向中国求助！"
 IND_chinese_aid_desc: "日本在二战期间掠夺了我们的国家，奴役了我们的人民。我们不能忘记这段历史，我们国家的民族主义者正在推动与中国和东方世界建立更紧密的联系。我们甚至有可能促使他们投资在印尼建设工厂和基础设施。"
 IND_chin_aid_gas_plants: "中国天然气工厂"
 IND_chin_aid_gas_plants_desc: "北苏门答腊的油田尚未开发，潜力巨大，但中国天然气厂的到来使我们能够充分利用这些油田，成为东南亚更大的石油生产国。"
 IND_chin_aid_coal: "西爪哇煤炭工厂"
 IND_chin_aid_coal_desc: "我们拥有丰富的煤炭储量，可惜的是，我们缺乏将其高效转化为能源的工业能力。然而，中国向我们提供了一项极具吸引力的协议，即在我国建设新的工厂，这将加快煤炭的开采和转化进程。"
 IND_chin_aid_coal_surplus: "利用我们的煤炭剩余"
 IND_chin_aid_coal_surplus_desc: "既然我们已经有了煤炭加工厂，就应该建造炼油厂，将煤炭转化为国家所需的能源。"
 IND_chin_aid_ev: "中国电动汽车援助"
 IND_chin_aid_ev_desc: "中国人深谙大规模生产汽车之道，凭借他们在电动汽车领域的专业知识，我们可以帮助解决我国的污染问题。"
 IND_chin_aid_catl: "与宁德时代的协议"
 IND_chin_aid_catl_desc: "我们应该与宁德时代公司达成协议，让他们生产电池以满足不断增长的需求。"
 IND_chin_aid_pollution: "减少污染法案"
 IND_chin_aid_pollution_desc: "我们将通过污染防治法案，以治理我们大部分城市的污染问题。有了中国的投资，这已不再是梦想，而是成为现实。"
 IND_chin_aid_inf: "中国基础设施投资"
 IND_chin_aid_inf_desc: "鉴于中国的基础设施日趋完善，我国理应享有同等待遇。我们请求中国投资印尼的基础设施建设。"
 IND_chin_aid_high_railway: "雅加达-万隆高铁"
 IND_chin_aid_high_railway_desc: "如果我们想要成为一个高效的工业化国家，首先必须连接我们的城市。中国已提出修建一条连接雅加达和万隆的高速铁路。"
 IND_chin_aid_tollway: "巴厘巴板 - 三马林达收费公路"
 IND_chin_aid_tollway_desc: "巴厘巴板-三马林达收费公路将极大地便利东加里曼丹居民的出行。借鉴中国的基础设施建设模式，我们可以为国家建设这条收费公路。"
 IND_new_silkroad: "21世纪丝绸之路！"
 IND_new_silkroad_desc: "中国合作伙伴的帮助使我们国家再次成为国际瞩目的焦点。我们现在是一个工业化国家，拥有迈向21世纪的工业实力！"
 IND_our_policies: "我们的投资政策"
 IND_our_policies_desc: "我们的政策需要修订。我们必须仔细审视现有政策，以满足国家在21世纪的需求。"
 IND_undertable_deals: "桌子下的交易"
 IND_undertable_deals_desc: "我们可以秘密地与政客、国家和组织达成协议以获得一点额外收入，但这是以我们国家的腐败为代价的……"
 IND_bribe_media: "贿赂媒体"
 IND_bribe_media_desc: "我们党急需一些支持，如果我们给媒体一点好处，或许就能获得这种急需的支持。"
 IND_save_corrupt_official: "包庇腐败官员"
 IND_save_corrupt_official_desc: "根除腐败委员会对我们很多官员来说都是个麻烦。我们需要迅速掩盖他们的行为，阻止他们受到起诉。"
 IND_shun_corruption: "根除腐败"
 IND_shun_corruption_desc: "我们必须严厉打击国内的腐败！如果我们想要成为一个成功的国家，就必须首先惩处那些企图用人民辛辛苦苦挣来的钱中饱私囊的人。"
 IND_kpk: "为根除腐败委员会注资"
 IND_kpk_desc: "根除腐败委员会在打击国家腐败方面做得非常出色。然而，如果能获得一些资金，就能帮助他们加快反腐败进程。"
 IND_trial_corrupt_official: "起诉腐败官员"
 IND_trial_corrupt_official_desc: "我们与根除腐败委员会密切合作，已经查明了一些腐败官员，我们正在准备对他们进行审判。"
 IND_more_jobs: "创建更多的岗位"
 IND_more_jobs_desc: "我们的人民需要钱来养家糊口。由于本国就业机会匮乏，我们有责任创造新的就业机会，让人们能够挣钱。我们可以兴建新工厂来促进经济发展，帮助人民摆脱贫困。"
 IND_rural_fortification: "农村防御工事"
 IND_rural_fortification_desc: "我们的农村人口急需保护，免受当地叛乱分子的侵害。在我们努力控制叛乱分子的同时，我们可以设置一些临时防御工事来保护我们的人民。"
 IND_fund_industries: "资助国家工业"
 IND_fund_industries_desc: "印尼拥有众多工业，在北方伙伴的帮助下，我们能够提升自身实力。但是，我们绝不能让国内产业落后于外国产业。"
 IND_education_question: "咨询马来西亚教育部"
 IND_education_question_desc: "我们必须修订教育政策，以适应不断增长的青年群体。我们可以选择以伊斯兰教为中心的教育，也可以选择学校世俗化。我们党内甚至有人呼吁将两者结合起来，以取悦各方。"
 IND_religious_system: "宗教体系"
 IND_religious_system_desc: "这些学校在宗教事务部的领导下运作已经有一段时间了，现在解除他们的这项任务将是一个糟糕的主意。"
 IND_quran_class: "继续古兰经课程"
 IND_quran_class_desc: "我们的国家是伊斯兰国家，我们的人民绝不能忘记这一点！我们必须向我们的青年传播《古兰经》的教义，并将其作为必修课。"
 IND_no_religious_system: "世俗制"
 IND_no_religious_system_desc: "我们必须解除宗教事务部对学校的管理。为了实现现代化，我们必须建立独立的教育部，以便更好地向学生传授现代理念。"
 IND_no_quran_class: "取消古兰经课程"
 IND_no_quran_class_desc: "古兰经课会给学生带来负担。尽管我们穆斯林人口占多数，但我们必须将宗教排除在学校之外，以便集中精力教授重要的学科。"
 IND_mandatory_education: "义务教育"
 IND_mandatory_education_desc: "我们必须强制所有青少年上学。如果我们的人口都是文盲，我们将停滞在石器时代。"
 IND_satisfied_nation: "一个满意的国家？"
 IND_satisfied_nation_desc: "希望我们的辛勤付出不会被人民忽视。尽管我们仍面临诸多问题，但我们不能忘记我们取得的成就。"
 IND_fix_rupiah: "修复卢比！"
 IND_fix_rupiah_desc: "我们的货币印尼盾已经混乱了一段时间，随着其价值下跌，我们的国家稳定也随之恶化。"
 IND_cooperate_local_gov: "与地方政府合作"
 IND_cooperate_local_gov_desc: "印度尼西亚是一个多元化的国家，拥有众多不同的民族和地方政府。我们必须与这些地方政府合作，才能更有效地为国家征收税款。"
 IND_lower_interest_rates: "降低利率"
 IND_lower_interest_rates_desc: "我们的利率正在飙升至可怕的水平，我们必须开始降低利率，才能让人民满意。"
 IND_farmers_in_industry: "转移农民到工业部门"
 IND_farmers_in_industry_desc: "我们农村有足够的农民，我们必须让其中一些人离开农场进入工厂来帮助我们的经济！"
 IND_begin_projects_desc: "为了促进印尼盾流通，我们应该考虑资助新项目，以便我们的人民能够有时间和金钱去消费。"
 IND_fight_rising_prices: "对抗物价上涨"
 IND_fight_rising_prices_desc: "由于对物价上涨的斗争力度不够，我们党的支持率正在迅速下降。是时候改变这一点了！"
 IND_keep_high_prices: "保持高物价"
 IND_keep_high_prices_desc: "也许我们可以从这些高物价中受益......到底哪个国家真正关心他们的人民？"
 IND_proficient_supply: "熟练的供应管理"
 IND_proficient_supply_desc: "为了保持经济健康发展，我们应该开始改革供应链管理。否则，经济崩溃的威胁将始终存在。"
 IND_connect_docks: "连接供应链"
 IND_connect_docks_desc: "连接供应链将有助于我们更高效地管理供应，并加强与国际市场的联系。"
 IND_a_resilient_currency: "富有弹性的经济！"
 IND_a_resilient_currency_desc: "凭借鲜血、汗水和泪水，我们伟大的货币卢比得以盛行！"
 IND_maluku_back_muslims: "支持穆斯林！"
 IND_maluku_back_muslims_desc: "印度尼西亚是一个穆斯林国家。因此，我们不能背叛我们的穆斯林人民，必须全力支持他们。"
 IND_back_muslims_arm_ulama: "武装乌里玛"
 IND_back_muslims_arm_ulama_desc: "让我们武装乌里玛！一旦发生圣战，乌里玛需要我们的帮助来动员我们的穆斯林。"
 IND_back_muslims_medical_fee: "减少医疗费用"
 IND_back_muslims_medical_fee_desc: "为了帮助在宗教冲突中受伤的穆斯林，我们必须降低医院的医疗成本，让他们尽快重返社会。"
 IND_back_muslims_workers: "利用穆斯林工劳工"
 IND_back_muslims_workers_desc: "我们绝不能忘记穆斯林劳工及其付出的辛勤努力。因此，我们有义务充分利用他们的劳动成果，并将他们部署到战略要地，以促进国家发展。"
 IND_back_muslims_factories: "伊斯兰工业安全基金"
 IND_back_muslims_factories_desc: "如果任何伊斯兰企业陷入经济困境，我们将投资建设新的应急工厂，以帮助其渡过难关。"
 IND_back_muslims_send_guns: "送他们步枪"
 IND_back_muslims_send_guns_desc: "武装我们的穆斯林人民有助于维护我们城市的安全，保护我们的清真寺免受任何仇恨袭击。"
 IND_back_muslims_infantry: "创建纯穆斯林的步兵团"
 IND_back_muslims_infantry_desc: "我们必须建立一支完全由穆斯林组成的步兵部队，以防止军队内部发生任何冲突。"
 IND_call_saudis: "联络沙特阿拉伯"
 IND_call_saudis_desc: "我们应该联系沙特阿拉伯，看看他们是否愿意用资金支持我们的穆斯林。他们已经在资助我们的清真寺了，所以我们不明白他们为什么不应该提供帮助。"
 IND_ambon_for_muslims: "安汶穆斯林"
 IND_ambon_for_muslims_desc: "安汶是教派冲突的热点地区。然而，据说由于我们的努力，安汶市的冲突以穆斯林的决定性胜利告终。"
 IND_maluku_just_fix_it: "不偏袒任何人"
 IND_maluku_just_fix_it_desc: "在这些冲突中，我们绝不能偏袒任何一方。让我们找到一个不带偏见的解决方案。"
 IND_maluku_call_army: "征召军队"
 IND_maluku_call_army_desc: "我们的军队袖手旁观，对教派冲突无所作为。现在是时候部署他们来缓和冲突了。"
 IND_maluku_militarize_villages: "军事化村庄"
 IND_maluku_militarize_villages_desc: "一些小村庄被卷入这些教派冲突之中，毫无防备，容易遭到劫掠。我们需要尽快加固这些村庄并进行军事部署，以确保它们的安全。"
 IND_maluku_increase_policing: "加强警务"
 IND_maluku_increase_policing_desc: "毫无疑问，我们必须加强警力部署，以应对日益增多的冲突。这样做才能恢复亟需的秩序。"
 IND_maluku_civilian_shelter: "劳工工厂"
 IND_maluku_civilian_shelter_desc: "我们必须为受影响的工人重建工厂，因为他们的许多工厂都因其宗教立场而被烧毁。"
 IND_maluku_military_shelter: "兵工厂"
 IND_maluku_military_shelter_desc: "由于教派冲突，我们必须为不断增长的城市武装力量建设新的军工厂。"
 IND_maluku_mobilize_priests: "动员牧师"
 IND_maluku_mobilize_priests_desc: "团结神职人员将有助于唤醒基督徒民众的愤怒。这在许多教派冲突中将对他们有所帮助。"
 IND_maluku_mechanize_them: "机械化基督徒"
 IND_maluku_mechanize_them_desc: "在神父们的努力下，我们得以部署机械化的基督教部队来保护教堂。"
 IND_maluku_christian_volunteers: "利用基督徒志愿者"
 IND_maluku_christian_volunteers_desc: "许多基督徒牺牲自己的时间，积极参与国家志愿服务项目。我们非常乐意接受这样的付出。"
 IND_maluku_christian_businesses: "基督教企业安全基金"
 IND_maluku_christian_businesses_desc: "如果任何基督教机构倒闭，我们可以向他们提供贷款帮助，使他们重新站起来。"
 IND_maluku_train_medics: "训练医务人员"
 IND_maluku_train_medics_desc: "我们必须训练更多医护人员来帮助伤员和被卷入教派冲突交火的人们。"
 IND_maluku_give_trucks: "给他们发送卡车！"
 IND_maluku_give_trucks_desc: "给基督徒们提供更多卡车，他们就能高效地往返各地，一路畅通无阻。"
 IND_maluku_contact_dutch: "联系荷兰人"
 IND_maluku_contact_dutch_desc: "我们的许多基督徒的祖先都可以追溯到荷兰人，可以肯定地说，如果我们向荷兰人请求援助来帮助这些人，他们会很乐意接受……对吧？"
 IND_maluku_ambon_for_christians: "安汶是基督徒的城市！"
 IND_maluku_ambon_for_christians_desc: "据说安汶城已被基督徒攻克。多亏了我们的努力，基督徒们已经开始掌控这座长期饱受宗教冲突蹂躏的城市。"
 IND_transfer_to_army: "将局势升级至军队介入"
 IND_transfer_to_army_desc: "看来我们的解决方案未能结束冲突，因此需要更多的军事干预，行动的完全控制权正在移交给印尼国家军队。"
 IND_maluku_equip_police: "警察军事化"
 IND_maluku_equip_police_desc: "通过警察部队的军事化，我们可以减轻军队在遏制教派冲突方面的负担，最终可以将他们调往其他叛乱地区。"
 IND_maluku_crush_gangs: "镇压帮派"
 IND_maluku_crush_gangs_desc: "通过镇压城市中剩余的帮派，我们终于可以喘口气了。他们的掠夺、杀戮和破坏只会给我们的国家带来不稳定！"
 IND_maluku_all_quiet_for_now: "暂时一切安静.."
 IND_maluku_all_quiet_for_now_desc: "看来，由于我们采取了更强硬的措施，许多城市已经恢复了和平。希望这种和平局面能够持续下去。"
 IND_komnas_ham_desc: "举办国家人权委员会会议让我们能够为人权活动家和人民的社会需求提供更好的平台。"
 IND_indonesian_armed_forces: "印度尼西亚武装部队"
 IND_indonesian_armed_forces_desc: "印尼武装部队是亚洲军事强国之一。从陆军到飞行员，印尼全体官兵随时准备保卫国家免受任何威胁。"
 IND_tni_ad: "印度尼西亚陆军"
 IND_tni_ad_desc: "印尼陆军是我国地面部队的主力军，已有60多年的历史。如今，随着我们迈入21世纪，我们的任务是采用新的方法来训练这些官兵。"
 IND_chinese_model_inf: "中国步兵模型"
 IND_chinese_model_inf_desc: "很明显，中国正在崛起成为全球强国，因此我们不能落后于他们。如果我们能在武器装备和战术方面获得他们的帮助，我们或许能够与他们并驾齐驱。"
 IND_homegrown_inf: "本土步兵"
 IND_homegrown_inf_desc: "如果我们想要成为一个独立自主的国家，首先就必须运用我们的战术。如果我们的士兵和中国人打仗的方式一样，我们又如何才能与众不同呢？"
 IND_jungle_expertise: "丛林专家"
 IND_jungle_expertise_desc: "毫无疑问，我们应该训练士兵适应东南亚潮湿茂密的作战环境。​​否则，我们可能会落后于邻国。"
 IND_strong_howitzers: "重型榴弹炮"
 IND_strong_howitzers_desc: "为了与敌军的榴弹炮匹敌，保持我方榴弹炮的最佳状态至关重要。我们必须立即启动老旧火炮的升级改造工作。"
 IND_most_advanced_tanks: "最强大的坦克"
 IND_most_advanced_tanks_desc: "毫无疑问，我们的坦克正在逐渐过时。因此，我们已指派工程师进行实验和研究，以打造东南亚最强大的坦克部队。"
 IND_tank_factories: "坦克生产工厂"
 IND_tank_factories_desc: "毫无疑问，为我们不断增加的坦克数量建造新工厂是非常有必要的。如果生产落后了，我们的坦克技术还有什么用呢？"
 IND_best_ifvs: "最好的步兵战车"
 IND_best_ifvs_desc: "我们的步兵战车理应享有与坦克同等的待遇，毕竟，步兵战车在战场上至关重要。为了提升我们的军事实力，获取最新、最先进的步兵战车技术，以安全运送我们的官兵，符合我们的最大利益。"
 IND_the_toughest_apcs: "最强的装甲输送车"
 IND_the_toughest_apcs_desc: "我们的人员运输车非常老旧落后，必须更换。为此，我们正在紧急组建一个团队，设计能够抵御最强大火力攻击的新型运输车。"
 IND_tni_al: "印度尼西亚海军"
 IND_tni_al_desc: "我们的海军是我们国家军事力量的骄傲。作为一个被海洋环绕的群岛国家，我们必须建立一支强大的海军，以抵御那些意图伤害我们的人。"
 IND_fortified_seas: "强化海岸"
 IND_fortified_seas_desc: "我们必须加固海岸线，防止敌人登陆或破坏我们的船只。我们必须在战斗中尽量采取防御策略。"
 IND_new_corvettes: "新式护卫舰设计"
 IND_new_corvettes_desc: "我们的轻型护卫舰已经相当老旧，确实需要更新换代了。我们应该开始着手设计新的车型。"
 IND_submarines: "新潜艇"
 IND_submarines_desc: "潜艇战在战争中正变得越来越普遍。虽然我们也有一些潜艇，但它们与世界其他国家相比还相差甚远。我们必须改变这种状况。"
 IND_industrialized_sea: "工业化海洋"
 IND_industrialized_sea_desc: "我们必须提高海军的生产能力，才能主动出击打击敌人。如果我们采取防御姿态，可能会造成人员伤亡。"
 IND_cruisers: "巡洋舰研究"
 IND_cruisers_desc: "我们必须弄到更好的巡洋舰！虽然它们是舰队中最大的舰艇，但它们是赢得海战的关键。"
 IND_air_carrier_designs: "新式航空母舰"
 IND_air_carrier_designs_desc: "如今的战争是在空中支援下进行的。如果我们的水手没有空中支援，我们如何指望他们取得胜利？我们必须开始设计和建造一艘印度尼西亚航空母舰！"
 IND_maritime_empire: "海上帝国"
 IND_maritime_empire_desc: "我们的国家必须在海上取得胜利。历史已经证明，一个国家的海军往往决定着其安全和领土完整。"
 IND_tni_au: "印度尼西亚空军"
 IND_tni_au_desc: "印尼空军是我国空军的主要分支，我们必须重新评估未来的发展方向。"
 IND_refine_airbases: "重新设计空军基地"
 IND_refine_airbases_desc: "我们应该认真考虑重新设计空军基地，使其与新型飞机和飞行员的需求相匹配。如果我们不能提高基地的质量，我们可能会在空中作战中失败。"
 IND_air_drills: "进行国内空中演习"
 IND_air_drills_desc: "为了磨练飞行员的技能，我们首先必须确保他们做好战斗准备。我们将指派军官负责确保飞行员的战备工作​​。"
 IND_expand_air_craft_designs: "更好的飞机设计"
 IND_expand_air_craft_designs_desc: "为了不落后于世界航空业，我们最好开始资助研究人员进行新型飞机设计。"
 IND_nato_drilling: "北约空中训练"
 IND_nato_drilling_desc: "为了巩固与西方的友谊，我们最好与他们进行空中联合演习。这将使我们能够在遭遇协同攻击时做好准备。"
 IND_funds_for_iae: "资助印尼航空航天公司"
 IND_funds_for_iae_desc: "为印度尼西亚航空航天局提供资金将使我们的飞机在空中更加先进高效，并有助于我们确保印尼在东南亚的空中优势。"
 IND_political_agenda: "政治议程"
 IND_political_agenda_desc: "让我们专注于我们的政治，选举即将到来，如果没有议程，印度尼西亚如何能够成为一个繁荣的民主国家……或者不……？"
 IND_naw_rural_folk: "乡间农民"
 IND_naw_rural_folk_desc: "让我们把重点放在农村居民身上。他们是我们国家的脊梁，帮助他们应该是我们最关心的事情。"
 IND_naw_reps_village: "村民代表"
 IND_naw_reps_village_desc: "我们农村的人民一直在呐喊，但无人理会。是时候让他们在我们的事务中拥有真正的发言权了。"
 IND_naw_health_fac: "关注医疗设施"
 IND_naw_health_fac_desc: "我们应该努力扩大对农村人口的医疗服务覆盖范围。如果我们任由他们死去，那么我们帮助他们的使命就失败了。"
 IND_naw_better_edu: "扩大教育"
 IND_naw_better_edu_desc: "农村儿童被忽视的时间太长了。现在是时候扩大教育范围，让每个人都有学习的机会了。"
 IND_naw_aid_village: "聚焦乡村基础设施"
 IND_naw_aid_village_desc: "村民们的房屋破败不堪，我们不能袖手旁观。我们已经派出建筑工人为村民们建造了一些新房。"
 IND_naw_dev_lacking_regions: "农村工业化"
 IND_naw_dev_lacking_regions_desc: "让我们为农村的贫困者提供工作机会，虽然这需要一些培训，但我们应该建造新工厂，让他们能够工作。"
 IND_naw_agri_dev: "农业发展"
 IND_naw_agri_dev_desc: "除了建造新房，我们还应该建设更好的农业设施，以便为我们的市场生产粮食。"
 IND_naw_fishermen: "渔民基金"
 IND_naw_fishermen_desc: "资助渔民是提升他们士气的好方法，也是养活人民的好方法。"
 IND_naw_women: "战略部门的女性"
 IND_naw_women_desc: "让妇女在战略领域工作，不仅对社会进步，而且对科学进步，都可能非常有用。"
 IND_naw_aid_farmer: "关注农民"
 IND_naw_aid_farmer_desc: "让我们把注意力集中在个体 - 农民身上。如果我们把注意力放在这些人身上，或许就能让他们以更低的价格生产商品。"
 IND_naw_aid_laborer: "帮助劳工"
 IND_naw_aid_laborer_desc: "帮助像劳工这样的小人物是农业工业化的关键。"
 IND_naw_safety_reg: "通过安全规定"
 IND_naw_safety_reg_desc: "制定安全法规是保障工人安全的关键。这也有助于国家社会发展，并能让劳动者安心。"
 IND_way_forward_naw: "前进的道路"
 IND_way_forward_naw_desc: "显而易见，国家的未来掌握在民族觉醒党手中。自从获得执政权以来，我们为这个国家带来的只有伟大和民主。"
 IND_prosper_justice: "正义胜利繁荣"
 IND_prosper_justice_desc: "印尼人民的意愿显而易见：他们想要一个真正关心国家、只关心国家的政党，而这只有繁荣正义党才能实现。"
 IND_reform_system: "体制改革"
 IND_reform_system_desc: "让我们改革这个腐朽的制度，重新点燃人民对国家的热爱！"
 IND_improve_network: "更好的网络"
 IND_improve_network_desc: "如果我们的网络基础设施陈旧，人们该如何沟通？让我们开始建设新的网络基础设施吧。"
 IND_efficient_tax: "高效征税"
 IND_efficient_tax_desc: "人们必须缴纳税款才能维持国家运转。高效的税收征管流程对国家的健康发展至关重要。"
 IND_const_practices: "更好的建筑实践"
 IND_const_practices_desc: "有些人因本可避免的事故而丧命。虽然这会减慢工作进度，但却是最好的选择。"
 IND_upgrade_facilities: "更好的工具"
 IND_upgrade_facilities_desc: "我们应该投资购置新工具，以便我们的员工能够更轻松地工作。"
 IND_address_issues: "解决我们的问题"
 IND_address_issues_desc: "我们应该关注我们内部的问题。"
 IND_edu_to_disenfranchised: "被剥夺权利者的教育"
 IND_edu_to_disenfranchised_desc: "将学校带到我们国内那些缺乏教育资源的地区的孩子们身边，确实有助于促进社会进步。"
 IND_continue_pol_fund: "继续资助警方"
 IND_continue_pol_fund_desc: "让我们把暴徒和罪犯赶出街道。如果我们为警察提供充足的资金，就能确保人民晚上安心入睡。"
 IND_continue_cor_fight: "继续打击腐败"
 IND_continue_cor_fight_desc: "打击腐败可以确保我们的记录清白，赢得人民的信任。"
 IND_more_offices: "更多的办公室。"
 IND_more_offices_desc: "建造新的办公楼是创造更多就业机会的一种高效方式，也可以引导经济流动。"
 IND_road_improvements: "改善我们的道路"
 IND_road_improvements_desc: "如果我们能把道路修好，那么那些被忽视的城市的人们最终就能和那些生活在繁荣城市的人们一样享有平等的权利。"
 IND_help_arm_industry: "帮助军火工业"
 IND_help_arm_industry_desc: "帮助军工产业最终可能会对我们大有裨益，它能为需要帮助的人提供就业机会，促进我们的经济发展，增强我们的军事实力。"
 IND_new_society: "新社会"
 IND_new_society_desc: "通过我们的努力，繁荣正义党的显著进步已经惠及全国各地的印尼人民。"
 IND_united_development: "建设统一党"
 IND_united_development_desc: "建设统一党，又称卡巴党，是一个温和的伊斯兰主义政党，致力于揭露印尼日常生活中的各种问题。"
 IND_und_national_dev: "国家发展计划"
 IND_und_national_dev_desc: "让我们公布国家发展计划。这将提振人民精神，提高我们政党的支持率。"
 IND_und_clean_water: "更洁净的水"
 IND_und_clean_water_desc: "通过过滤水源和建设新的供水系统，我们可以确保人们饮用安全无害的水。这也能为未来的项目腾出土地。"
 IND_und_bridge_port: "更好的交通基础设施"
 IND_und_bridge_port_desc: "改善卡车运输基础设施将有助于货物顺利运往全国各地。"
 IND_und_agri_invest: "投资农业"
 IND_und_agri_invest_desc: "如果要有效地养活我们的人民，对农业的投资至关重要。"
 IND_und_more_science: "更多的科学家"
 IND_und_more_science_desc: "我们的国家需要科学家来推动进步，我们必须为这些科学家的培训和教育提供资金。"
 IND_und_prot_muslims: "保护穆斯林"
 IND_und_prot_muslims_desc: "通过为穆斯林建造紧急避难所，我们既能确保国家宗教的完整性，也能保障穆斯林的安全。这一点至关重要，因为我们国家的穆斯林正面临着来自其他宗教城市袭击的威胁。"
 IND_und_islam_schools: "资助伊斯兰学校"
 IND_und_islam_schools_desc: "资助伊斯兰学校是让民众接受文化和宗教教育的快捷途径，也能让我们赢得宗教人士的好感。"
 IND_und_islam_banking: "伊斯兰银行业务"
 IND_und_islam_banking_desc: "毫无疑问，伊斯兰银行业务是正确的银行业务模式。我们不应该向民众强加高息，这样做才能让他们满意。然而，这可能会让我们的钱包略微缩水。"
 IND_und_better_social_welfare: "老年人护理"
 IND_und_better_social_welfare_desc: "我们不应辜负长辈，毕竟我们是在他们辛勤耕耘的基础上发展起来的。让他们更容易获得医疗保健服务，既是对他们辛勤工作的尊重，也是让他们感到幸福。"
 IND_und_help_food: "资助食品生产研究"
 IND_und_help_food_desc: "通过资助新的粮食生产方法，我们不仅可以养活印度尼西亚数百万饥饿的人们，还可以养活我们自己的人。"
 IND_und_housing_act: "住房法案"
 IND_und_housing_act_desc: "确保每个人都有栖身之所是我们党的政策中至关重要的一点。我们应该为北摩鹿加群岛的人们建造廉价住房。"
 IND_und_better_hospitals: "更好的医院设备"
 IND_und_better_hospitals_desc: "为医生配备更好、更先进的医疗设备可以挽救许多人的生命。"
 IND_und_help_unemployment: "帮助解决失业问题"
 IND_und_help_unemployment_desc: "为广大民众提供就业机会对印尼的经济增长至关重要，因此我们应该建造新楼宇，以确保这些人能够获得工作。"
 IND_und_united_indonesia: "统一的印度尼西亚"
 IND_und_united_indonesia_desc: "我们因信仰和国家而团结在一起，终于可以安心地看到我们的政策在全国范围内得到落实。"
 IND_party_of_struggle: "斗争党"
 IND_party_of_struggle_desc: "左翼政党、斗争党正在推动许多重大变革，但谁也说不准它能否实现这些变革。"
 IND_strug_brace_for_change: "做好改变的准备"
 IND_strug_brace_for_change_desc: "希望我们的人民已经准备好迎接我们党即将推出的全面改革。"
 IND_strug_expand_infrastructure: "扩大基础设施"
 IND_strug_expand_infrastructure_desc: "扩大基础设施是确保人民生活质量高、满足人民期望的安全途径。"
 IND_strug_acquire_bp: "获取施工蓝图"
 IND_strug_acquire_bp_desc: "通过获得新的施工蓝图，我们可以顺利地进行施工！"
 IND_strug_new_airports: "新机场"
 IND_strug_new_airports_desc: "通过建设新机场，我们可以确保游客源源不断地进入我国。这也将有助于我国人民在国内和国际间的出行。"
 IND_strug_better_road: "军事化空域"
 IND_strug_better_road_desc: "将我们的领空军事化是比建造更多民用机场更好的选择，因为它有助于我们在动荡时期保卫国家领空。"
 IND_strug_fight_corruption: "打击腐败"
 IND_strug_fight_corruption_desc: "毫无疑问，腐败在印尼政治中扮演着重要角色。因此，我们应该尽一切努力消除腐败。"
 IND_strug_establish_investigations: "呼吁调查"
 IND_strug_establish_investigations_desc: "对腐败官员展开调查可以很容易地提高我们党的声望，并打击竞争对手，使他们落后。"
 IND_strug_purge_sus_members: "清除可疑官员"
 IND_strug_purge_sus_members_desc: "如果不调查我们自己的腐败行为就指责其他政党有腐败行为，那我们就太虚伪了，因此我们需要采取措施，清洗我们自己的腐败官员。"
 IND_strug_economic_growth: "经济增长"
 IND_strug_economic_growth_desc: "通过向市场注入资金，我们或许能够迎来经济繁荣。"
 IND_strug_agri_funding: "农业资金"
 IND_strug_agri_funding_desc: "农业在印度尼西亚非常重要，所以为了让我们的农民满意，我们应该资助他们的项目。"
 IND_strug_seaports: "新海港"
 IND_strug_seaports_desc: "建设新的海港将极大地帮助我们与外界进行贸易，并且可以帮助我们更快地生产船舶。"
 IND_strug_eastasian_unity: "东亚统一"
 IND_strug_eastasian_unity_desc: "世界大部分地区分崩离析，陷入混乱，因此我们必须与敌人保持密切联系，与朋友更加紧密。我们应该与其他东亚国家合作，共同繁荣。"
 IND_strug_host_regional_events: "举办区域活动"
 IND_strug_host_regional_events_desc: "印尼过去一直是区域性活动的中心，也为这个国家带来了许多新面孔。我们应该继续保持这种做法，并积极承办更多活动。"
 IND_strug_just_indonesia: "公正的印度尼西亚"
 IND_strug_just_indonesia_desc: "经过我们所有的努力，我们终于可以称它为 - 一个崭新而公正的印度尼西亚。"
 IND_democrat_party: "民主党"
 IND_democrat_party_desc: "民主党是印度尼西亚最受欢迎的亲西方政党之一，该党主张建立一个更加自由的国家。"
 IND_dem_greater_future: "更美好的明天"
 IND_dem_greater_future_desc: "我们必须让国家做好改革和变革的准备，因为明天一定比今天更好，印度尼西亚将会繁荣！"
 IND_dem_enviro_prot_plan: "环境保护计划"
 IND_dem_enviro_prot_plan_desc: "通过推动环境保护，我们可以确保我们的森林、丛林和海滩免受破坏。"
 IND_dem_resource_regulation: "资源调节"
 IND_dem_resource_regulation_desc: "让我们规范资源开采，确保过程中不造成任何损失。"
 IND_dem_protected_areas: "建立保护区"
 IND_dem_protected_areas_desc: "建立保护区将保护我们国家的文化古迹，并保存我们的历史。"
 IND_dem_for_the_oceans: "海洋斗争党"
 IND_dem_for_the_oceans_desc: "我们被海洋环绕，因此我们必须善待海洋。通过建设新的安全设施，我们可以确保这既有利于海洋，也有利于我们自身。"
 IND_dem_decentralization: "权力下放"
 IND_dem_decentralization_desc: "国家权力下放可以帮助人民更加信任我们，也可以在可能的情况下帮助降低成本。"
 IND_dem_regional_econ: "帮助区域经济"
 IND_dem_regional_econ_desc: "通过为区域经济创造就业机会，我们不仅可以获得大力支持，还能继续享受劳动力规模扩大带来的好处。"
 IND_dem_prot_local_cultures: "保护当地文化"
 IND_dem_prot_local_cultures_desc: "保护少数族裔及其文化是维护印尼文明的关键。许多人对彼此实施仇恨行为，这在本届政府中绝不容忍。"
 IND_dem_small_business_support: "斗地主"
 IND_dem_small_business_support_desc: "与霸占所有土地的土地所有者作斗争可以帮助我们在人民中分配土地，并保持国家的发展。"
 IND_dem_promote_credit: "帮助老人"
 IND_dem_promote_credit_desc: "帮助老年人是向人民展示我们政党良好意愿的有效途径之一。"
 IND_dem_technical_support: "协助科技进步"
 IND_dem_technical_support_desc: "我们国家的大部分民众仍然无法接入互联网，这导致我们落后于时代。我们应该改变这种状况，并建设新的互联网基础设施。"
 IND_dem_emergence_indonesia: "印度尼西亚的崛起"
 IND_dem_emergence_indonesia_desc: "牢记我们的新政策和目标，我们已经向世界表明，无论如何，印度尼西亚都将摆脱其衰弱的状态。"
 IND_dem_civil_activity: "鼓励公民活动"
 IND_dem_civil_activity_desc: "促进公民活动是确保我们的人民相互了解的安全方式，同时也使国家受益。"
 IND_k.e.m.i.u: "印度尼西亚外交部"
 IND_k.e.m.i.u_desc: "印度尼西亚外交部，即我们的外交部门，肩负着维护我们海外国家利益并与世界其他国家建立关系的责任。"
 IND_contact_west: "西方关系"
 IND_contact_west_desc: "与西方保持密切联系至关重要。我们每天都能看到西方国家在科技领域取得的新突破。此外，我们还能从他们的企业中获得经济利益。"
 IND_american_coop: "印度尼西亚 - 美国合作"
 IND_american_coop_desc: "与美国合作可以帮助我们发展经济，因为美国是世界领先的经济体。"
 IND_american_armor: "美国装甲"
 IND_american_armor_desc: "购买美国设计的装甲车辆对我们的武装部队，特别是我们的陆军（印尼陆军）来说是有益的。"
 IND_west: "亲西方外交"
 IND_east: "亲东方外交"
 IND_american_companies: "与美国国家航空航天局合作"
 IND_american_companies_desc: "与美国国家航空航天局合作将大大加快我们向太空输送宇航员的速度，并加速太空研究。"
 IND_contact_netherlands: "与荷兰政府会面"
 IND_contact_netherlands_desc: "我们昔日的殖民者，如今已成为我们的新朋友。与荷兰保持联系，可以成为印尼进入欧洲贸易的绝佳途径。"
 IND_spajik_frigate: "购买斯佩吉克护卫舰"
 IND_spajik_frigate_desc: "购买新的护卫舰是有益的，尤其是从荷兰购买。他们愿意以相当优惠的价格卖给我们一艘。"
 IND_sigma_corvette: "购买西格玛型护卫舰"
 IND_sigma_corvette_desc: "荷兰的西格玛级轻型护卫舰在海上似乎是一支强大的作战力量。如果我们能达成协议购买一艘，那将对我们的海军大有裨益。"
 IND_ease_asean_trade: "让他们轻松融入东南亚国家联盟贸易"
 IND_ease_asean_trade_desc: "让荷兰逐步融入东盟贸易体系，不仅有利于我们自身，也有利于我们的邻国。同时，这也将极大地促进东亚与欧洲的关系。"
 IND_fund_dutch_churches: "资助荷兰教会"
 IND_fund_dutch_churches_desc: "资助荷兰教会可能存在一定风险。然而，为了取悦我们在荷兰的朋友，我们应该考虑资助他们的一些教会，因为这里的一些基督徒认为自己是荷兰人的后裔。"
 IND_contact_europe: "与欧盟的谈判"
 IND_contact_europe_desc: "与欧盟举行会谈有助于我们与西欧和东欧大部分地区建立更紧密的联系。"
 IND_boost_econ_relations: "促进经济关系"
 IND_boost_econ_relations_desc: "加强经济关系将有助于我们与欧盟建立更紧密的经济联系。这将改善我们人民的日常生活，因为他们现在更容易获得西方商品。"
 IND_national_development_plan: "国家发展计划"
 IND_national_development_plan_desc: "让我们与欧盟达成一些协议，以改善我们的国家基础设施。"
 IND_talks_east: "向东看"
 IND_talks_east_desc: "让我们把目光转向东方，与我们的东方朋友对话。西方除了伤害印尼、给印尼人民带来绝望之外，什么也没做。"
 IND_sino_cooperation: "中国 - 印度尼西亚合作"
 IND_sino_cooperation_desc: "中国人还没有伤害过我们……至少现在还没有。让我们和他们建立良好的关系，以免这种情况发生。"
 IND_sino_science_coop: "中国科学合作"
 IND_sino_science_coop_desc: "与中国在科学领域开展合作，将使我们国家向前发展。"
 IND_principle_bandung: "万隆的十项原则"
 IND_principle_bandung_desc: "互不干涉内政是亚洲团结的关键。会后，中国同意签署互不侵犯条约，承诺不干涉我国内政。"
 IND_japanese_friendship: "日本友谊"
 IND_japanese_friendship_desc: "尽管日本曾殖民统治我们，但如果不与他们发展关系，那就太荒谬了。举行会谈对我们双方都有好处。"
 IND_port_exports: "更多出口港口"
 IND_port_exports_desc: "建设新港口可以加快货物进出日本与世界其他地区的流通速度。"
 IND_jap_tech_giants: "日本科技巨头"
 IND_jap_tech_giants_desc: "日本科技巨头可以教给我们很多东西。我们应该考虑与他们以及我们国内的科技公司开展合作。"
 IND_men_for_ports: "港口人力资源"
 IND_men_for_ports_desc: "这些港口可不会自己配备人员！我们应该请求日本人来填补我们港口的职位空缺，因为我们需要技术熟练的工人。"
 IND_jap_const_methods: "日本建造技术"
 IND_jap_const_methods_desc: "效仿日本的建设方法应该是我们国家的目标。如果我们真的能像他们那样建设基础设施，我们很快就能超越他们。"
 IND_russia_coop: "俄罗斯 - 印度尼西亚合作"
 IND_russia_coop_desc: "与俄罗斯人合作是向西方表明我们已经受够了他们的滑稽行为的明确方式。我们还可以与俄罗斯人建立战略伙伴关系......"
 IND_sukhoi_jets: "购买苏霍伊战机"
 IND_sukhoi_jets_desc: "获得俄罗斯最新最先进的战机将有利于我国空军。我们应该计划与他们达成战机采购协议。"
 IND_russian_tourist: "吸引俄罗斯游客"
 IND_russian_tourist_desc: "热情款待俄罗斯游客将提升我们国家在他们眼中的形象。鉴于我们很大一部分游客来自俄罗斯，我们应该重视这一点。"
 IND_talk_with_neighbors: "与我们的邻国的谈判"
 IND_talk_with_neighbors_desc: "与邻国进行对话真的可以把信息传递给东南亚。"
 IND_australia: "与澳大利亚会谈"
 IND_australia_desc: "我们需要向澳大利亚人提出一些真正重要的问题，特别是东帝汶及其参与问题。"
 IND_apologize_australia: "向澳大利亚道歉"
 IND_apologize_australia_desc: "我们应该向澳大利亚人和遇难志愿者的家属道歉。我们在维持秩序方面可能做得有点过于粗暴了。"
 IND_high_prices: "高价！"
 IND_meet_minister_australia: "与首相见面"
 IND_meet_minister_australia_desc: "我们最近会见了澳大利亚总理，值得庆幸的是我们遇到的任何问题都已得到解决。让我们共同期待更美好的关系！"
 IND_confront_australia: "对抗澳大利亚"
 IND_confront_australia_desc: "我们必须与他们对抗，因为他们参与了东帝汶的事务。他们给印尼人民带来了伤害和悲痛。"
 IND_malaysia: "与马来西亚对话"
 IND_malaysia_desc: "马来西亚和印度尼西亚是两个近邻，但最近的问题使我们分离。"
 IND_demand_riau: "要求他们退出廖内群岛"
 IND_demand_riau_desc: "廖内群岛是印度尼西亚的合法领土，我们对声称拥有该领土主权的马来西亚人并不友善。我们需要立即要求他们退后！"
 IND_strategic_partnership: "战略伙伴"
 IND_strategic_partnership_desc: "我们现在能够与马来西亚人成为战略合作伙伴。在撤出廖内之后，他们对我们表现出了极大的好感。"
 IND_combat_it: "打击激进主义"
 IND_combat_it_desc: "打击极端主义是最佳选择。通过打击极端主义，我们能够向那些奉行极端主义的人发出强烈的信号。这样做也有助于增强我们自身的力量，并使我们能够对人民生活的各个方面施加影响。"
 IND_bolster_party_pop: "提高党派支持率"
 IND_bolster_party_pop_desc: "提高我们政党的受欢迎程度是双赢的，人民开始热爱我们的国家，我们可以在下次选举中获得更多支持！"
 IND_derad_campaign: "去激进化运动"
 IND_derad_campaign_desc: "亡羊补牢，为时未晚。我们可以开展由政府资助的全国性运动，帮助人们摆脱极端思想。"
 IND_investigate_growth: "调查他们的成长"
 IND_investigate_growth_desc: "将部分预算用于改善警务工作，或许能为我们提供一些线索，让我们了解为什么激进分子的规模日益扩大。"
 IND_start_media_campaign: "开始媒体活动"
 IND_start_media_campaign_desc: "在媒体上站稳脚跟，可能是改变一些激进分子观点的好方法。"
 IND_control_net: "打击网络上的激进主义内容"
 IND_control_net_desc: "在互联网上打击极端分子是让极端分子及其思想远离日益数字化的印尼社会的众多方法之一。"
 IND_filter_net: "网络过滤"
 IND_filter_net_desc: "彻底过滤网络可能会激怒我们的人民，但这将使我们能够比仅仅浏览几个网页更容易地控制哪些内容进出网络。"
 IND_bolster_nationalism: "激发印尼民族主义"
 IND_bolster_nationalism_desc: "让我们让人民为我们的国家感到自豪，并引导他们稍微远离宗教。"
 IND_rallies_schools: "在学校举行集会"
 IND_rallies_schools_desc: "举行集会可以让年轻人了解激进化的危险。"
 IND_arrest_members: "逮捕激进派领导人"
 IND_arrest_members_desc: "带领知名的激进领导人参观我们的监狱，可以让他们看到追随者将会面临怎样的下场。"
 IND_curb_fpi: "遏制伊斯兰捍卫者阵线"
 IND_curb_fpi_desc: "伊斯兰捍卫者阵线是一个危险的激进组织，在极端主义意识形态领域拥有极大的影响力。遏制其影响力和权力对于打击我国的激进主义至关重要。"
 IND_persecute: "迫害伊斯兰捍卫者阵线"
 IND_persecute_desc: "迫害伊斯兰捍卫者阵线将使我们的国家摆脱极端主义信仰，这些人将根据我们的司法系统受到审判！"
 IND_embrace_it: "软化我们的立场"
 IND_embrace_it_desc: "软化立场或许能让这些激进分子改变对我们的看法，但我们也可能因此造成未来无法掌控的局面……"
 IND_tell_police_backdown: "解散激进地区的安全部队"
 IND_tell_police_backdown_desc: "解散这些安全部队将向激进分子表明我们没有威胁，希望这能让他们喜欢上我们。"
 IND_fund_their_media: "允许伊斯兰捍卫者阵线在媒体上出现"
 IND_fund_their_media_desc: "允许伊斯兰捍卫者阵线出现在媒体上将展示印度尼西亚民主的成果。在这个国家每个人都有发言权，我们不会基于意识形态进行歧视！"
 IND_beyond_our_control: "等等。为什么他们要暴动？"
 IND_beyond_our_control_desc: "这些忘恩负义的激进分子！他们似乎在骚乱并破坏我们的街道，要求推翻政府。怎么会发生这种事？ 谁能想到会发生这样的事情？"
 IND_fpi: "伊斯兰捍卫者阵线夺取权力"
 IND_fpi_desc: "我们国家历史上黑暗的一天……今天确实是我们国家历史上辉煌的一天，希望凭借追随者赋予我们的力量，我们能够一砖一瓦地净化这个国家！"
 IND_touch_on_economy: "触及经济"
 IND_touch_on_economy_desc: "我们国家正经历一段艰难时期，如果我们能够重振经济的某些方面，就有可能摆脱崩溃的命运。"
 IND_fund_for_holy: "工厂追令"
 IND_fund_for_holy_desc: "正在兴建新的工厂，这将刺激国内商品流通。"
 IND_oppose_invest: "反对投资"
 IND_oppose_invest_desc: "反对外国投资是保护我们国家资源、保持我们国家独立的一种方式！"
 IND_convert_tourist_destination: "振兴旅游目的地"
 IND_convert_tourist_destination_desc: "谁会关心一两个海滩？还是古老的岩层？或者是一些 500 年前建造的愚蠢的异教徒寺庙？我们需要尽可能多的空间来建设我们的国家力量！"
 IND_sharia_2: "沙里亚！"
 IND_sharia: "沙里亚！"
 IND_sharia_desc: "有了伊斯兰教法，我们终于可以开始净化我们的国家和社会。尽管一开始我们会遇到一些阻力，但我们的人民会逐渐喜欢它。"
 IND_dress_code: "执行着装规范"
 IND_dress_code_desc: "执行着装规范是净化印尼社会的必由之路。如果我们不这样做，我们的人民就会成为异教徒，并会扰乱我们的议程！"
 IND_gender_seg: "性别隔离"
 IND_gender_seg_desc: "将男女分开并让他们各司其职，比放任他们为所欲为要好得多。"
 IND_raid_bar: "突袭酒吧"
 IND_raid_bar_desc: "尽管实施了新法律，一些异教徒仍在经营地下酒吧。我们需要立即停止此类操作！"
 IND_regional_purification: "区域净化"
 IND_regional_purification_desc: "如果你的邻居都是异教徒和不纯洁的人，我们如何才能净化我们的人民呢？是时候我们把事情掌握在自己手中了！"
 IND_purify_singapore: "净化新加坡"
 IND_purify_singapore_desc: "新加坡和我们一样是一个伊斯兰国家，但他们的荒谬政策让宗教和地区的纯洁蒙羞！"
 IND_purify_asia: "净化南亚"
 IND_purify_asia_desc: "净化南亚将使我们得以在整个非洲大陆站稳脚跟。如果我们能够做到这一点，我们就可以继续推行净化政策。"
 IND_holy_indonesia: "纯洁的印度尼西亚"
 IND_holy_indonesia_desc: "我们已经成功地净化了我们的国家——印度尼西亚。有了这个，我们就能带着我们人民的伊斯兰热情迈向21世纪！"
 IND_help_aceh: "帮助亚齐"
 IND_help_aceh_desc: "现在形势严峻，亚齐遭受灾难，居住在那里的同胞处境十分危险。我们必须协调各方力量，尽我们所能帮助他们。"
 IND_send_aid_package: "协调救灾"
 IND_send_aid_package_desc: "我们需要协调对亚齐人民的救灾工作，帮助他们重建家园。"
 IND_bring_resistance_down_one: "与当地领导人结盟"
 IND_bring_resistance_down_one_desc: "与当地领导人结盟可以帮助我们赢得他们的信任，并开始修复我们关系的第一阶段。"
 IND_bring_resistance_down_two: "为地区领导人提供经济援助"
 IND_bring_resistance_down_two_desc: "给地方领导人一些钱，就能促使他们开始为受损建筑物的重建提供资金。"
 IND_bring_resistance_down_three: "逮捕滋事者"
 IND_bring_resistance_down_three_desc: "尽管发生了可怕的灾难，但亚齐的一些人并不想要和平。我们必须解决它们，这样我们才能摆脱这场毫无意义的冲突。"
 IND_bring_resistance_down_four: "夺回亚齐！"
 IND_bring_resistance_down_four_desc: "是时候了......是时候我们最终将亚齐人民带回印度尼西亚，以便我们可以在未来的几个世纪里繁荣昌盛！"
 indonesia.8.t: "印尼要求东帝汶赔偿！"
 indonesia.8.d: "印尼要求我们支付赔偿金，理由是我们为东帝汶独立所做的努力。他们索要的金额高得离谱，最终将由澳大利亚承担。我们可以拒绝赔偿，但事态可能会升级到我们无法控制的地步。"
 indonesia.8.a: "告诉他们自己过来拿。"
 indonesia.8.b: "好吧，如果说他们要降临的话"
 indonesia.800.t: "他们认可了！"
 indonesia.800.d: "澳大利亚人已提出为他们参与东帝汶事件支付赔偿，尽管这可能永远不足以让他们导致我们失去领土……"
 indonesia.800.a: "完美！"
 indonesia.80.t: "他们拒绝了！"
 indonesia.80.d: "在我们向澳大利亚人提出了非常亲切和慷慨的请求后，他们拒绝了。看来他们不愿意与我们合作，据我们所知，他们对给我们国家带来的痛苦并不感到悔恨！"
 indonesia.80.a: "好吧，我们就用其他方式来获得赔偿吧！"
 indonesia.7.t: "印度尼西亚要求我们撤出廖内群岛！"
 indonesia.7.d: "印尼大使一直要求我们放弃对廖内群岛的主权声索。这已成为我们两国之间争论的焦点，如今似乎已到了白热化的地步。我们将尽快准备回应。"
 indonesia.7.a: "不，廖内群岛是我们的！"
 indonesia.7.b: "随他们去吧，反正我们不需要那个小破岛。"
 indonesia.70.t: "马来西亚拒绝割让廖内群岛！"
 indonesia.70.d: "马来西亚外交官最近提醒我们，他们拒绝了我们的提议。这是对印度尼西亚主权的侵犯，必须予以适当回应！"
 indonesia.70.a: "这是他们自作自受"
 indonesia.700.t: "他们割让了廖内群岛！"
 indonesia.700.d: "看来我们的信息响亮而明确，廖内群岛是我们的！马来西亚外交官最近告诉我们，该国已放弃对廖内群岛的所有主权要求。印度尼西亚现在可以松一口气了。"
 indonesia.700.a: "很好"
 indonesia.923.t: "印度尼西亚的未来"
 indonesia.923.d: "我们的国家在很长一段时间内一直处于混乱状态，早在我们第一次从荷兰人手中获得独立时就已经存在了。从金融问题，一直到社会和种族问题，印尼受到了来自四面八方的打击，已经撑不了多久了。必须采取果断行动，确保印度尼西亚在 21 世纪的生存和繁荣。因此，我们必须首先从解决我们身边的问题开始。"
 indonesia.923.a: "前进！"
 indonesia.69.t: "加里曼丹暴乱！"
 indonesia.69.d: "当两名马都拉人因移民事件而在桑皮遭到一些达雅克人的袭击时，引发了一系列暴力事件。这场冲突现已演变成一场全面的危机，死亡人数与日俱增，许多人流离失所。安全部队目前正在待命等待命令。"
 indonesia.69.a: "他们自己能处理好！"
 indonesia.69.b: "你在等什么？收拾他们！"
 indonesia.5.t: "印度尼西亚请求资金援助"
 indonesia.5.d: "印度尼西亚国内的宗教冲突非常激烈，他们正在向我们寻求一些经济援助。"
 indonesia.5.a: "当然，如果是为了更大的利益。"
 indonesia.5.b: "唔……不。"
 indonesia.50.t: "荷兰人同意援助我们！"
 indonesia.50.d: "经过仔细考虑，荷兰外交官决定给我们一点钱，让我们的基督徒能够赢得冲突。"
 indonesia.50.a: "非常棒。"
 indonesia.500.t: "荷兰拒绝援助！"
 indonesia.500.d: "荷兰外交官来找我们，告诉我们他们的政府拒绝了我们基督徒的援助！"
 indonesia.500.a: "难以置信"
 indonesia.6.t: "印度尼西亚请求资金援助"
 indonesia.6.d: "印度尼西亚国内的宗教冲突非常激烈，他们正在向我们寻求一些经济援助。"
 indonesia.6.a: "当然，如果是为了更大的利益。"
 indonesia.6.b: "唔……不。"
 indonesia.60.t: "沙特同意援助我们！"
 indonesia.60.d: "经过仔细考虑，沙特外交官来给我们一点钱，我们可以给我们的穆斯林赢得冲突。"
 indonesia.60.a: "非常棒。"
 indonesia.600.t: "沙特拒绝援助！"
 indonesia.600.d: "沙特外交官来找我们，告诉我们他们的政府拒绝了我们的穆斯林援助请求！"
 indonesia.600.a: "难以置信"
 indonesia.772.t: "激进领袖里兹克·谢哈布被捕！"
 indonesia.772.d: "伊斯兰捍卫者阵线激进领导人里兹克·谢哈布已被捕，目前正在等待审判。这是印度尼西亚安全的重大胜利，因为我们的民主不再受到激进分子及其落后理想的直接威胁！"
 indonesia.772.a: "民主的胜利"
 indonesia.2.t: "东帝汶问题"
 indonesia.2.d: "时机已到，这是我们国家的一个艰难时刻。东帝汶人民，我们众多岛屿之一，正在争取独立。残酷的抗议、骚乱和冲突造成了极大的不稳定，严重阻碍了政治和社会进步。现在，国家的命运掌握在我们自己手中，我们要么顺从联合国的意愿，要么走自己的路。"
 indonesia.2.a: "这是东帝汶人民想要的……不是我们"
 indonesia.2.b: "他们现在想做什么？！"
 indonesia.3.t: "联合国批准宪法！"
 indonesia.3.d: "在我们批准东帝汶独立之后，联合国也批准了东帝汶宪法。一个民主、独立的东帝汶不久将成为我们的邻国。"
 indonesia.3.a: "这是他们想要的。"
 indonesia.4.t: "东帝汶自由了！"
 indonesia.4.d: "这是官方消息。联合国终于批准了东帝汶宪法，独立的东帝汶现在是我们的邻国了。"
 indonesia.4.a: "让我们期待良好的关系。"
 indonesia.9.t: "印度尼西亚否认东帝汶独立！"
 indonesia.9.d: "印度尼西亚政权剥夺了东帝汶人民的自由和独立。许多反叛组织一直将我们视为潜在的解放者，目前该地区和世界正在酝酿紧张局势……"
 indonesia.9.a: "好吧，够了！"
 indonesia.9.b: "不管我们的事"
 indonesia.55.t: "我们学生的未来！"
 indonesia.55.d: "现在是时候讨论我们孩子教育的未来了。据我们所知，宗教事务部一直负责管理学校系统，并向学生灌输适度的伊斯兰教义。我们必须重新评估这种做法是否真的有效……"
 indonesia.55.a: "继续宗教教育！"
 indonesia.55.b: "停止宗教教育！"
 indonesia.77.t: "民族紧张局势严重！"
 indonesia.77.d: "现在是解决我们国家内部激烈的种族冲突的时候了。安汶和婆罗洲等许多地方几乎每天都会发生暴力事件。如果人民因宗教信仰而互相争斗，这个国家就无法继续下去。我们现在必须坚定立场，选择我们想要支持的人（如果有的话）。"
 indonesia.77.a: "穆斯林需要我们！"
 indonesia.77.b: "我们不挑最喜欢的，只是修复它！"
 indonesia.77.c: "基督徒需要我们！"
 indonesia.1000.t: "议会暴乱"
 indonesia.1000.d: "数月的骚乱和冲突终于将我们带到了这一步……我们的支持者和追随者成功冲击了印尼国会，要求几位关键人物下台，他们都服从了。印尼人民现在终于摆脱了这种所谓民主的永恒暴政。"
 indonesia.1000.a: "革命成功"
 indonesia.1001.t: "安汶市在基督教的控制之下！"
 indonesia.1001.d: "安汶多年的战乱终于结束，当地人民可以松一口气了。城里的基督徒取得了胜利，我们已经开始为当地城镇和乡村任命基督徒领袖。"
 indonesia.1001.a: "只是时间问题而已……"
 indonesia.1002.t: "安汶市处于穆斯林控制之下！！"
 indonesia.1002.d: "安汶多年的战乱终于结束，当地人民可以松一口气了。城里的穆斯林取得了胜利，我们已经开始任命穆斯林领导人到当地城镇和乡村任职。"
 indonesia.1002.a: "不出所料"
 indonesia.27.t: "瓦希德遭到弹劾！"
 indonesia.27.d: "在全体会议之后，人民协商会议决定以总统瓦希德鲁莽的政策和对金融危机的处理不当为由，弹劾其无能。他们现已任命副总统梅加瓦蒂·苏加诺普特里为印度尼西亚总统！"
 indonesia.27.a: "他当之无愧！"
 indonesia.37.t: "巴厘岛袭击！"
 indonesia.37.d: "巴厘岛一家夜总会发生多起炸弹爆炸事件，造成202人死亡，其中包括澳大利亚公民和外国人。88名澳大利亚公民遇难，现在澳大利亚当局和其他方面正向我们施压，要求我们对此采取行动。矛头指向极端组织伊斯兰祈祷团，该组织被认为是此类袭击的幕后黑手。我们必须立即就此事作出决定，以免事态进一步恶化。"
 indonesia.37.a: "发起调查，并对家庭进行赔偿"
 indonesia.37.b: "真是悲伤"
 indonesia.477.t: "突袭"
 indonesia.477.d: "一群愤怒的暴徒袭击了瓦梅纳区的军械库，这可能是非常灾难性的。我们的安全部队已经开始疏散可能处于危险之中的平民，并将他们转移到安全的地方，但是目前这群暴徒的动机仍不清楚。"
 indonesia.477.a: "赶快行动！"
 indonesia.477.b: "希望它能把自己解决掉"
 indonesia.577.t: "亚齐的海啸"
 indonesia.577.d: "一场灾难性的海啸袭击了班达亚齐和该省其他地区。亚齐一直是游击战和抵抗运动的中心，导致我们在灾难发生时与他们缺乏合作。然而，这一次情况截然不同。他们再也无法独自应对如此规模的灾难，他们需要我们的帮助才能重建。亚齐自由运动已提出停火，并愿意合作结束我们的冲突。"
 indonesia.577.a: "另一场灾难"
 indonesia.67.t: "西巴布亚的难民问题"
 indonesia.67.d: "澳大利亚人再一次干涉我们自己的内政，只不过这次他们为西巴布亚的麻烦制造者提供庇护。雅加达和堪培拉之间的紧张局势已达到沸点，我们准备在需要时采取行动！"
 indonesia.67.a: "资助监控站以防止将来发生这种情况！"
 indonesia.67.b: "也许资金可以流向……其他地方……"
 indonesia.678.t: "西巴布亚全国委员会成立"
 indonesia.678.d: "西巴布亚全国委员会是一个位于西巴布亚的组织，他们主张就该地区的地位举行全民公投。尽管他们的诉求是和平的，但如果他们的目标得以实现，将会给我们的国家带来灾难。"
 indonesia.678.a: "解散委员会"
 indonesia.678.b: "施工稍微延迟并不是什么大问题"
 indonesia_news.1.d: "测试"
 indonesia_news.1.a: "测试"
 indonesia.95.t: "东帝汶宣布独立！"
 indonesia.95.d: "在我们决定保留我们的合法领土之后，东帝汶决定宣布独立。然而，最令人震惊的是，澳大利亚人偷偷给他们走私武器，现在竟然起来反抗我们！"
 indonesia.95.a: "届时我们应当报仇雪恨！"
 indonesia.420.t: "这是求救的呼声！"
 indonesia.420.d: "我国应对当前的亚洲金融危机，必须寻求外国机构的帮助。日本是我们最亲密的伙伴，愿意提供帮助。然而，日本过去曾伤害过我们的国家，许多民族主义和反西方团体正在寻求另一个选择，而另一个选择就是中国。中国也愿意帮助我们的国家摆脱困境，但这样做会将我们推入他们的直接影响范围，可能会改变我们的政治。"
 indonesia.420.a: "我们需要的是日本的援助！"
 indonesia.420.b: "中国知道自己在做什么，给他们打电话！"
 IND_ethnic_tension: "种族紧张局势猖獗"
 IND_ethnic_tension_desc: "印度尼西亚是一个民族、文化和宗教多元化的国家。这常常导致各民族之间发生冲突，造成社会不稳定，我们必须立即找到解决办法！"
 IND_aceh_in_turmoil: "亚齐陷入混乱！"
 IND_aceh_in_turmoil_desc: "自1976年以来，亚齐一直处于混乱和叛乱状态，这给我们的国家带来了不稳定和不必要的流血冲突。我们的军队过于专注于对付这些叛乱分子，这导致我们在军事上落后。\n§W--------------§!\n如果我们在§H2004年与亚齐停火§!，这个国家精神将会被§R移除§!。"
 IND_rupiah_crisis: "卢比危机"
 IND_rupiah_crisis_desc: "印尼盾，我国货币，严重贬值。这是数十年来腐败和管理不善的恶果，是时候解决这个问题，让我们的经济重返世界舞台了。"
 IND_popular_tourist_destination: "游客目的地"
 IND_popular_tourist_destination_desc: "印度尼西亚是一个非常受欢迎的旅游目的地。这得益于我们伟大的文化和历史。"
 IND_growing_radicalization: "日益激进化"
 IND_growing_radicalization_desc: "作为一个伊斯兰国家，我们国家的青年和人民容易受到激进主义和强硬思想的影响。"
 IND_asian_crisis: "印度尼西亚的亚洲金融危机"
 IND_asian_crisis_desc: "1997年亚洲金融危机对印度尼西亚及其邻国造成了沉重打击，导致该国几乎所有领域的经济活动都放缓。"
