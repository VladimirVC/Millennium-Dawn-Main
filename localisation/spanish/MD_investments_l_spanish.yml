 expand_local_infrastructure_tt: "§YExpandir infraestructura local§! en §Y[THIS.GetName]§!\n---------\nLa infraestructura en §Y[THIS.GetName]§! deja mucho que desear. Deberíamos idear algunos proyectos específicos a corto plazo para ampliar la infraestructura en el estado y ayudar a enfatizar y expandir el desarrollo local del estado."
