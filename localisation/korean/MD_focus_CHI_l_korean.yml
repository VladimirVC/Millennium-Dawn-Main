 BRI_apply_named_PORT_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectPORT]§! under the Belt and Road Initiative. Chinese capital and contractors build the facility in exchange for long-term influence over the harbor. Requires a coastal state, 25 political power, and peace."
 BRI_apply_named_RAIL: "Apply: §Y[This.GetBRINextProjectRAIL]§!"
 BRI_apply_named_RAIL_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectRAIL]§! under the Belt and Road Initiative. New track binds your economy to the trans-Eurasian corridor on Chinese loans. Requires a land border with China or an active partnership, 25 political power, and peace."
 BRI_apply_named_PIPELINE: "Apply: §Y[This.GetBRINextProjectPIPELINE]§!"
 BRI_apply_named_PIPELINE_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectPIPELINE]§! under the Belt and Road Initiative. The line carries your hydrocarbons toward Chinese markets and refineries. Requires a state with oil or aluminium reserves, 25 political power, and peace."
 BRI_apply_named_TELECOM: "Apply: §Y[This.GetBRINextProjectTELECOM]§!"
 BRI_apply_named_TELECOM_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectTELECOM]§! under the Belt and Road Initiative. Huawei and ZTE lay the backbone of your digital infrastructure. Requires 25 political power and peace; Western-aligned states draw scrutiny."
 BRI_apply_named_SEZ: "Apply: §Y[This.GetBRINextProjectSEZ]§!"
 BRI_apply_named_SEZ_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectSEZ]§! under the Belt and Road Initiative. A Chinese-managed industrial enclave anchors export manufacturing on your soil. Requires more than four factories, 35 political power, and peace."
 BRI_apply_named_MINE: "Apply: §Y[This.GetBRINextProjectMINE]§!"
 BRI_apply_named_MINE_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectMINE]§! under the Belt and Road Initiative. Chinese mining houses secure offtake of your strategic minerals. Requires a state with chromium, tungsten, aluminium, or steel, 25 political power, and peace."
 BRI_apply_named_ENERGY: "Apply: §Y[This.GetBRINextProjectENERGY]§!"
 BRI_apply_named_ENERGY_desc: "Petition Beijing to finance the §Y[This.GetBRINextProjectENERGY]§! under the Belt and Road Initiative. Chinese power engineering closes your generation gap on concessional credit. Requires 25 political power and peace."
 BRI_apply_named_PRESTIGE: "Apply: §Y[This.GetBRINextProjectPRESTIGE]§!"
