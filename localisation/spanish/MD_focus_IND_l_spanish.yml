 IND_papua_resist4: "Resistencia Cristiana de Papúa"
 IND_papua_resist_info: "Los cristianos de nuestra tierra residen principalmente en Papúa. Lamentablemente, han sido objeto de abusos por parte de gobiernos pasados y presentes, y los residentes no nos aprecian mucho, lo que dificulta nuestras misiones políticas allí."
 IND_islamic_resist: "Resistencia musulmana de Sulawesi"
