 EU_budget_global_expense_tooltip: "£click_left §GПри левом клике:§! Увеличить расходы для глобального ЕС\n§YПредпосылки:§!\n[!EU_global_expenses_click_enabled]\n§YЭффекты:§!\n[!EU_global_expenses_click]\n£GFX_click_right §GПри правом клике:§! Уменьшить расходы для глобального ЕС\n§YПредпосылки:§!\n[!EU_global_expenses_right_click_enabled]\n§YЭффекты:§!\n[!EU_global_expenses_right_click]"
 EU_budget_admin_expense_tooltip: "£click_left §GПри левом клике:§! Увеличить расходы на администрацию и т.д.\n§YПредпосылки:§!\n[!EU_administration_expenses_click_enabled]\n§YЭффекты:§!\n[!EU_administration_expenses_click]\n\n£GFX_click_right §GПри правом клике:§! Уменьшить расходы на администрацию и т.д.\n§YПредпосылки:§!\n[!EU_administration_expenses_right_click_enabled]\n§YЭффекты:§!\n[!EU_administration_expenses_right_click]"
 EU_budget_subsidies_tooltip: "£click_left §GПри левом клике:§! Увеличить субсидии на рост, уменьшив естественные субсидии\n§YПредпосылки:§!\n[!EU_growth_natural_subsidies_click_enabled]\n§YЭффекты:§!\n[!EU_growth_natural_subsidies_click]\n\n£GFX_click_right §GПри правом клике:§! Уменьшить субсидии на рост, уменьшив естественные субсидии\n§YПредпосылки:§!\n[!EU_growth_natural_subsidies_right_click_enabled]\n§YЭффекты:§!\n[!EU_growth_natural_subsidies_right_click]\n"
 EU_budget_draft_desc: "Государство-член, которое разрабатывает бюджет ЕС на следующий финансовый год, должно внести проект в повестку дня Европейского парламента по окончании переговоров. В качестве вознаграждения государство-член, разрабатывающее проект, получает всю инвестированную политическую власть, когда бюджет ЕС будет одобрен и вступит в силу."
