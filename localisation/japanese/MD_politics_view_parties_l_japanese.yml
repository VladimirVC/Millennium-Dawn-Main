 SUD.liberalism: "£generic_liberalism_small (SLP) - Sudan Liberal Party"
 SUD.liberalism_desc: "(Social liberalism) - The Sudan Liberal Party (Arabic: a-Hizb al-Ahrar al-Sudani) is the first party in Sudan to call for a free market economy. The party also struggles against the fundamentalist dictatorship of al-Bashir, and is a stout defender of human rights and women's rights."
 SUD.Communist-State: "£generic_Communist_State_small (SCP) - Sudanese Communist Party"
 SUD.Communist-State_desc: "(Marxism-Leninism) - The Sudanese Communist Party (al-Hizb al-Shuyui al-Sudani) is one of the oldest parties in Sudan (founded in 1946), and it was a major force in the country right after independence. After Gaafar Nimeiry's coup in 1971, the party's most prominent figures were imprisoned and executed and they were never able to regain their strength. The party opposes al-Bashir's rule."
 SUD.Caliphate: "£generic_Caliphate_small (PCP) 人民会議党"
 SUD.Caliphate_desc: "イスラム主義 - 人民会議党（アラビア語ローマ字表記：al-Hizb al-Mutamar al-Shaebii）は、ハッサン・アル＝トゥラビがオマル・アル＝バシールと決別した際に設立された。当初、両者は同じ政党に所属していたが、トゥラビの宗教的過激主義により、バシールは彼を陰謀の容疑で投獄せざるを得なくなった。トゥラビは穏健なイスラムを代表していると主張しているが、彼が実施した政策の多くはサラフィー主義の影響を強く受けている。さらに、トゥラビはイスラム過激派（オサマ・ビン・ラディンなど）がスーダンに避難することを、極めて歓迎する姿勢を示してきた。"
 SUD.Neutral_Muslim_Brotherhood: "£SUD_Autocracy_small (NCP) 国民会議"
 SUD.Neutral_Muslim_Brotherhood_desc: "イスラム主義 - 国民会議（アラビア語ローマ字表記：al-Mutamar al-Watani）は、1998年にオマル・アル＝バシールが、1989年のクーデターでスーダンで政権を掌握した自身の以前の政治団体「国民イスラム戦線」を解散した際に結成された。バシールは党内から強硬派のイスラム主義者の大半を排除したが、国民会議党は依然としてシャリーア法の施行とスーダンにおけるアラブの支配を強く支持しており、これが多民族国家である同国に多くの緊張をもたらしている。"
 SUD.Nat_Autocracy: "£generic_Nat_Autocracy_small (SAFF) スーダン軍"
 SUD.Nat_Autocracy_desc: "軍事政権 - スーダン軍（アラビア語ローマ字表記：al-Quwwat al-Musallaha as-Sudaniyah）は、同国が独立した1956年に創設されたが、その起源は1925年にイギリスがスーダン防衛軍を創設したことに遡ることができる。軍は主にスーダン陸軍で構成されている。名目上は軍規模は非常に大きいものの、実際には多くの部隊で人員不足に陥っている。陸軍、海軍、空軍に加え、軍には「人民防衛軍」と呼ばれる準軍事組織も含まれている。"
 SWA.Monarchist: "£generic_Monarchist_small ドラミニ家"
 SWA.Monarchist_desc: ""
 SWI.conservatism: "£SWI_western_conservative （EVP）スイス福音国民党"
 SWI.conservatism_desc: "保守主義 - 福音国民党（Evangelische Volkspartei）は、スイスで最も一貫して存在する小政党で、1943年以来国民議会の一員であり、得票率はほとんどの場合2%前後である。CVPと議会会派を組んでいる。中絶や同性婚などの議題で保守的な立場を支持するが、中道的な経済政策と左翼的な環境・移民政策を持つ。"
 SWI.liberalism: "£SWI_western_liberal 自由緑の党"
 SWI.liberalism_desc: "自由主義 - 自由緑の党（grünliberale）は、国民議会における小規模な緑の党である。2007年にバーゼル＝ラントシャフト、ベルン、ザンクト・ガレン、チューリッヒの各州の緑の党がGPSから離脱した際に結成された。GPSとは対照的に、緑の自由党は左翼ではなく、より中道的であり、自由主義的な経済社会政策を持続可能な環境保護政策と組み合わせることを目指している。2007年以来、国民議会の一貫したメンバーである。"
 SWI.socialism: "£SWI_western_social_democrat （SP）スイス社会民主党"
 SWI.socialism_desc: "社会民主主義 - スイス社会民主党（Sozialdemokratische Partei der Schweiz）は、得票数で国民議会の第二党である。古典的な社会民主主義に従い、政府による公共サービスの提供を支持している。また、資本主義に反対し、親ヨーロッパ的である。スイスで最も積極的にEU加盟を支持する政党である。"
 SWI.Neutral_conservatism: "£SWI_non_aligned_conservative （CVP）スイス・キリスト教民主党"
 SWI.Neutral_conservatism_desc: "キリスト教保守主義 - キリスト教民主党（Christdemokratische Volkspartei）は、スイスの中道から中道右派の政党で、自由、連帯、正義、進歩、開放性といった価値観を支持している。1891年以来、国民議会の安定したメンバーであり、1999年から2019年まで第四の大政党の地位を保持していたが、その後GPSに取って代わられた。スイスの全州議会で最も多くの議席を保持している。"
 SWI.Neutral_Libertarian: "£SWI_non_aligned_libertarian （FDP）スイス自由民主党"
 SWI.Neutral_Libertarian_desc: "リバタリアニズム - FDP.自由党（FDP.Die Liberalen）は、2017年現在、国民議会で第三の大政党である。2009年にFDPと自由党が合併して結成された。古典的で保守的な自由主義の視点を支持し、国民の自由と個人の責任を守ることを目指している。スイスの中立、直接民主主義、連邦主義を支持しており、EUとの二国間条約は支持するが、加盟は拒否している。"
 SWI.Neutral_green: "£SWI_non_aligned_greens （GPS）スイス緑の党"
 SWI.Neutral_green_desc: "緑の党 - スイス緑の党（Grüne Partei der Schweiz）は、スイスの大きい方の緑の党である。環境保護、外国人への開放性、平和主義、そして経済へのより大きな政府介入に重点を置いている。1979年以来、継続して国民議会に代表を送り、1987年以来、連邦参議院に代表を持たない最も人気のある第五党であった。2019年には、国民議会で第四の大政党としてCVPに取って代わった。"
 SWI.neutral_Social: "£SWI_non_aligned_socialist_democrat オルタナティブ・リスト"
 SWI.neutral_Social_desc: "民主社会主義 - オルタナティブ・リストは、スイスの代替左翼政党である。PdAや連帯と緊密に協力し、GPSやSPよりもさらに左の政治的見解を代表することを目指している。スイスの都市の貧しい労働者の利益に尽力し、進歩的で持続可能な社会的・生態学的見解を支持している。"
 SWI.Neutral_Communism: "£SWI_non_aligned_communism （PdA）スイス労働党/連帯"
 SWI.Neutral_Communism_desc: "共産主義 - 労働党（Partei der Arbeit）は、スイスの民主マルクス主義共産党である。その目標は、資本主義の廃止とスイス社会の社会主義への発展に対するスイス国民の支持を築くことである。民営化に反対し、再分配を支持し、社会的に弱い人々と連帯を示している。1944年の設立後、当初は成功を収めたが、それ以来、ほとんど成功していない分派政党である。同様のトロツキスト・イデオロギーを持つ政党連帯（solidaritéS）と共に選挙運動を行った。"
 SWI.Nat_Populism: "£SWI_nationalist_right_wing_populist （SVP）スイス国民党"
 SWI.Nat_Populism_desc: "右派ポピュリズム - スイス国民党（ドイツ語：Schweizerische Volkspartei）は、1971年に農工市民党と民主党の合併によって設立された。当初は農業保守政党として始まったが、1980年代にクリストフ・ブロッハーの影響下で右派ポピュリスト政党へと転換した。1999年の選挙以来、スイス国民議会の四大政党の中で最も強力な政党である。右翼のティチーノ同盟と国民保守のEDUと共に、議会会派として国民議会に代表されている。"
 SWI.Nat_Autocracy: "£SWI_nationalist_military_junta スイス軍"
 SWI.Nat_Autocracy_desc: ""
 SYR.Kingdom: "£generic_Kingdom_small アラブ民主党"
 SYR.Conservative: "£generic_Conservative_small アラブ民主党"
 SYR.oligarchism: "£generic_oligarchism_small アラブ民主党"
 SYR.Western_Autocracy_Alternative: "£generic_Western_Autocracy_small アラブ民主党"
 SYR.Western_Autocracy: "£SYR_Western_Autocracy （RPS）シリア改革党"
 SYR.Western_Autocracy_icon: "£SYR_Western_Autocracy"
 SYR.Western_Autocracy_desc: "大西洋主義 - シリア改革党は、アメリカを拠点とする小規模な政党兼ロビー団体であり、アラブ社会主義バアス党 - シリア支部の支配に反対している。同党は、グローバル化と自由貿易を受け入れ、テロリズムに反対し、地域の平和と安定を目指す新シリアの創設を目指している。"
 SYR.liberalism: "£generic_liberalism_small シリア公正発展運動"
 SYR.liberalism_desc: "(Centrist Liberalism) - The Movement for Justice and Development in Syria is a political party and movement founded in the year 2006 and based in London, United Kingdom. The group describes itself as 'committed to peaceful, democratic change in Syria, and the creation of a modern state which respects human rights and promotes economic and social development'."
 SYR.socialism: "£SYR_socialism シリア民主人民党"
 SYR.socialism_icon: "£SYR_socialism"
 SYR.socialism_desc: "(Left Social Democracy) - The Syrian Democratic People's Party is a left-wing, democratic opposition party in Syria that is banned by the Syrian government. It is a part of several Syrian opposition alliances which are aimed at overthrowing the Syrian government, the National Democratic Rally, and the Damascus Declaration."
 SYR.Communist-State: "£SYR_Communist_State シリア共産党"
 SYR.Communist-State_icon: "£SYR_Communist_State"
 SYR.Communist-State_desc: "(Marxism–Leninism) - The Syrian Communist Party was a political party in Syria founded in 1924. It became a member of the National Progressive Front in 1972. The party split in two in 1986 with two separate parties claiming to represent the original Syrian Communist Party; the Syrian Communist Party (Unified) and the Syrian Communist Party (Bakdash). The Syrian Communist Party refers to the total combined popularity of these two splinter groups."
 SYR.anarchist_communism: "£generic_anarchist_communism_small アラブ社会主義運動"
 SYR.anarchist_communism_desc: "(Neo-Ba'athism) - The Arab Socialist Movement also known as Arab Socialist Party, was a political party in Syria that has split into several factions since the 1960s which continue to use the same name. The Damascus branch by Abdul-Ghani Qannout, joined the Ba'ath Party-led National Progressive Front government in 1972 and has continued to support the al-Assad family's rule in Syria ever since. It is active in Syria and Lebanon. After Abdul-Ghani Qannout died in 2001, Ahmad al-Ahmad became the new secretary general; under him, the party continued its pro-government course, even during the Syrian Civil War. Amid the conflict's civil uprising phase, the Arab Socialist Movement's Damascus branch organised pro-government rallies. When the uprising escalated into a full insurgency, members of the party organised pro-government militias."
 SYR.Autocracy: "£SYR_Autocracy シリア・アラブ社会主義バアス党"
 SYR.Autocracy_icon: "£SYR_Autocracy"
 SYR.Autocracy_desc: "新バアス主義 - シリア・アラブ社会主義バアス党は、1947年4月7日にミシェル・アフラク、サラフ・アル＝ディーン・アル＝ビタル、およびザキ・アル＝アルスージの支持者たちによって設立された新バアス主義組織である。当初は旧バアス党の地方支部であったが、1966年の旧バアス党内部分裂を機に、シリア主導のバアス運動へと支持を移した。同党は、1963年のシリアクーデターによりバアス主義者が政権を掌握して以来、シリアを継続して統治している。同党は、イラク・アラブ社会主義バアス党とは異なる組織である。"
 SYR.Mod_Vilayat_e_Faqih: "£SYR_Mod_Vilayat_e_Faqih アル＝アッバス旅団"
 SYR.Mod_Vilayat_e_Faqih_icon: "£SYR_Mod_Vilayat_e_Faqih"
 SYR.Mod_Vilayat_e_Faqih_desc: "シーア派イスラム主義 - アブ・アル＝ファドル・アル＝アッバス旅団（アル＝アッバス旅団）は、シリア全土で活動する親政府派の十二イマーム派シーア派武装組織である。その名は、イマーム・アリーの息子であるアル＝アッバス・イブン・アリーの通称に由来する。同組織は2012年後半、シリア国内のサイイダ・ザイナブ・モスクやその他のシーア派の聖地を守るために結成された。シリア内戦中に反政府勢力によって様々な聖廟、文化遺産、礼拝所が冒涜されたことへの反応としてその存在感を高め、その後シリア軍と協力するようになった。"
 SYR.Caliphate: "£SYR_Caliphate シャーム解放委員会"
 SYR.Caliphate_icon: "£SYR_Caliphate"
 SYR.Caliphate_desc: "サラフィー主義 - タハリール・アル＝シャムは、シリア内戦に関与しているサラフィー・ジハード主義武装組織である。同組織は2017年1月28日、ジャバート・ファテフ・アル＝シャム（旧アル＝ヌスラ戦線）、アンサール・アル＝ディン戦線、ジャイシュ・アル＝スンナ、リワ・アル＝ハック、ヌール・アル＝ディン・アル＝ゼンキ運動が合併して結成された。合併にもかかわらず、タハリール・アル＝シャムは、表向きは否定しているものの、裏ではアルカイダのシリア支部として活動しているとの非難を受けており、その支部の一つと見なされている。"
 SYR.Neutral_Muslim_Brotherhood: "£SYR_brotherhood シリア・ムスリム同胞団"
 SYR.Neutral_Muslim_Brotherhood_icon: "£SYR_brotherhood"
 SYR.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 - ムスリム同胞団は、1928年にイスラム学者であり教師でもあったハッサン・アル＝バンナによってエジプトで設立された、国境を越えたスンニ派イスラム主義組織である。当初は汎イスラム主義的かつ宗教的・社会的な運動として、エジプト国内でイスラム教を布教し、文盲への教育を行い、病院や企業を設立した。その後、エジプトにおけるイギリスの植民地支配を終わらせることを目指し、政治の舞台へと進出していった。同運動が自ら掲げる目標は、シャリーア法に基づく国家の樹立であり、世界的に最も有名なスローガンは「イスラムこそが解決策である」であり、慈善活動はその活動の主要な原動力となっている。"
 FSA.Neutral_Muslim_Brotherhood: "£SYR_brotherhood (SNC) シリア国民連合"
 FSA.Neutral_Muslim_Brotherhood_desc: "イスラム民主主義 - シリア国民連合（SNC）は、2012年11月にカタールのドーハで設立された、シリア内戦における反体制派グループの連合体である。国民連合の主な目的は、バッシャール・アル＝アサド政権およびその象徴と支持基盤の打倒、治安機関の解体、自由シリア軍の統一と支援、アサド政権との対話や交渉の拒否、そして「シリア人の殺害、シリアの破壊、シリア人の避難を招いた責任者の追及」である。"
 SYR.Neutral_Autocracy: "£SYR_Neutral_Autocracy （ASU）アラブ社会主義連合"
 SYR.Neutral_Autocracy_icon: "£SYR_Neutral_Autocracy"
 SYR.Neutral_Autocracy_desc: "ナセル主義 - シリア・アラブ社会主義連合党は、ナセル主義の政党である。同党はバアス党政権を称賛しており、政府に対して実質的に独立性を示していない。"
 SYR.neutral_Social: "£SYR_neutral_Social 民主社会主義同盟党"
 SYR.neutral_Social_icon: "£SYR_neutral_Social"
 SYR.neutral_Social_desc: "(Nasserism) - The Democratic Socialist Unionist Party is a political party in Syria. It is part of the National Progressive Front of legally licensed parties which support the socialist and Arab nationalist orientation of the government and accept the leadership of the Ba'ath Party."
 SYR.Neutral_Communism: "£generic_Neutral_Communism_small 人民の意思党"
 SYR.Neutral_Communism_desc: "マルクス・レーニン主義 - 人民の意志党は、£SYR_Communist_State シリア共産党から除名された党員によって結成された政党である。組織体制において、人民の意志党は民主集中制を採用している。ただし、書記長のポストは設けられておらず、その代わりに、総会で選出された中央評議会のメンバーによる集団指導体制が党を統率している。中央評議会は、日常業務を担うため、常任委員会および書記局のメンバーを選出する。"
 SYR.Nat_Populism: "£SYR_Nat_Fascism (SSNP) シリア社会民族党"
 SYR.Nat_Populism_desc: "社会民族主義 - シリア社会民族党（SSNP）は、レバノン、シリア、ヨルダン、イラク、パレスチナで活動する民族主義政党である。同党は、地理的境界およびその境界内に住む人々が共有する共通の歴史に基づき、現在のシリア、レバノン、イラク、クウェート、ヨルダン、パレスチナ、イスラエル、キプロス、シナイ半島、トルコ南東部を含む「肥沃な三日月地帯」全域にまたがるシリア民族国家の樹立を提唱している。党員数は10万人を超え、シリアでは与党であるアラブ社会主義バアス党に次ぐ第2位の合法政党である。レバノンにおいては、80年以上にわたり、同国の政治史において主要な世俗的かつ高度に組織化されたエリート政党としての地位を確立している。"
 SYR.Nat_Fascism: "£IRQ_Nat_Autocracy_small シリア・バアス党（イラク派）"
 SYR.Nat_Autocracy: "£SYR_Nat_Autocracy シリア・アラブ軍"
 SYR.Nat_Autocracy_icon: "£SYR_Nat_Autocracy"
 SYR.Nat_Autocracy_desc: "宗派主義的軍事政権 - 1964年、それ以前に存在していたシリア軍に代わって結成されたシリア・アラブ軍は、バアス党支配下のシリアにおいて、党と極めて密接な関係にあった。バアス党は、シリア軍との軍事的つながりを利用してクーデターを起こし権力を掌握すると、忠誠心が疑われる軍部の人物を解任し、そのポストをアサド自身と同じアラウィー派の人物で埋めることに熱心に取り組んだ。シリア空軍の戦闘行動の大部分は、イスラエル、あるいはレバノン国内のイスラエル支援勢力との間で行われてきた。ただし、その歴史の初期には、フランス主導の「レバント軍」として第二次世界大戦に短期間参戦したことがある。"
 TAJ.socialism: "£TAJ_western_social_democrat (SDT) タジキスタン社会民主党"
 TAJ.socialism_desc: "進歩主義 - タジキスタン社会民主党（タジク語/ペルシア語ローマ字表記：Hizbi Sotsial-Demokratii Tojikiston）\n\n1998年に設立された社会民主党は、エモマリ・ラフモン大統領とその政権に明確に反対するために創設された。同党はタジキスタンにおける民主主義の実現とラフモン政権の打倒を目標として知られている。"
 TAJ.Communist-State: "£TAJ_emerging_communism (CPT) タジキスタン共産党"
 TAJ.Communist-State_desc: "ソビエト民族主義 - タジキスタン共産党（タジク語/ペルシア語ローマ字表記：Hizbi Kommunistiyi Tojikiston）\n\nタジキスタンで最初かつ最古の政党であるタジキスタン共産党は、民主的集中制の思想に基づいて設立され、他のポストソビエト共産党と同様の立場を堅持している。同党は国際共産主義運動において非常に活発であり、数多くの党外関係を有している。またソビエト連邦共産党系共産党連合に加盟している。"
 TAJ.Conservative: "£TAJ_emerging_reactionary (PDPT) 人民民主党"
 TAJ.Conservative_desc: "専制民族主義 - タジキスタン人民民主党（タジク語/ペルシア語ローマ字表記：Hizbi Demokratii Tojikiston）\n\nエモマリ・ラフモンが率いるタジキスタン人民民主党は、鉄の支配でタジキスタンを統治してきた。同党の支配下にあるタジキスタンでは、政府転覆を目指す反体制運動が各地で勃発している。同党は主にタジク文化・アイデンティティ・国家主権の復興に注力しており、エモマリ・ラフモン政権下では、タジキスタンの世俗化を図るためイスラム教実践を厳しく制限し、ひげの禁止やヒジャブ着用希望女性への服装規定制定などの措置を講じている。"
 TAJ.anarchist_communism: "£TAJ_anarchist_communism (SPT) タジキスタン社会党"
 TAJ.anarchist_communism_desc: "(Pragmatic Socialism) - Socialist Party of Tajikistan, (Tajik/Farsi: Hizbi Sotsialistii Tojikiston)\n\nBeing established in 1996, the Socialist Party of Tajikistan. Being seen as an alternative to the Communist party, the socialist party has not had a major role in Tajik politics, however, that may change in the near future."
 TAJ.Caliphate: "£TAJ_salafist_jihadism (HTT) ヒズブ・タフリール - タジキスタン"
 TAJ.Caliphate_desc: ""
 TAJ.Kingdom: "£generic_Caliphate_small (IS–KP) イスラム国ホラサン州"
 TAJ.Kingdom_desc: ""
 TAJ.oligarchism: "£generic_oligarchism_small (PTJ) 正義党"
 TAJ.oligarchism_desc: ""
 TAJ.neutral_Social: "£TAJ_non_aligned_socialist_democrat (APT) タジキスタン農業党"
 TAJ.neutral_Social_desc: "農本主義 - タジキスタン農業党（タジク語/ペルシア語ローマ字表記：Hizbi agrarii Tojikiston）\n\n大規模農家階級の利益を念頭に、農業党は農地面積の大幅な拡大、デフカーンと農場の改革を望んでいる。彼らは現実的な展望を持たず、農業と農耕に焦点を絞った単一課題政党と見なされている。"
 TAJ.Neutral_Muslim_Brotherhood: "£TAJ_kingdom (IRP) イスラム復興党"
 TAJ.Neutral_Muslim_Brotherhood_desc: "穏健派イスラム主義 - タジキスタン・イスラム復興党（タジク語/ペルシア語ローマ字表記：Nahzati Islomii Tojikiston）\n\n1990年に設立された同党は、主に疎外されたイスラム教徒層の共感を得ていることから、タジク社会に多大な影響力を保持してきた。90年代のタジク内戦における主要勢力として、同党はラフモノフ政権に対する最大の野党勢力と評されてきた。またムスリム同胞団と関連があり、本質的に反共産主義的である。"
 TAJ.Nat_Autocracy: "£generic_Nat_Autocracy_small (TAF) タジク軍"
 TAJ.Nat_Autocracy_desc: "実用的軍事政権 - 1994年まで正式に創設されなかったタジキスタン軍は、当初、同国に駐留していたロシア軍兵士によって大きく補完されていた。民兵組織や政府支持者から生まれた同軍は、タジキスタン内戦という最初の紛争に直面することとなった。内戦の終結後、軍は政治の表舞台からは距離を置き、ロシアから多大な物資と支援を受けつつ、概ね現タジキスタン政府を支持する姿勢を保っている。"
