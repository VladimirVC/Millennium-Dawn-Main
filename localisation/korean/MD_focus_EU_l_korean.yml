 EU_Tech_Share_name: "유럽 방위국 (EDA)"
 EU_Tech_Share_desc: "회원국들은 그들의 연구에 더욱 집중합니다. 유럽방위청(EDA)은 유럽연합 회원국 간의 노력을 조정합니다."
 tooltip_ECB_Start_OMT_effect: "§G좌클릭:§! 하여 §Y전면적 통화 거래 (OMT) 프로그램§!을 시작할 수 있습니다.\n\n§G우클릭:§! 하여 §Y전면적 통화 거래 (OMT) 규모를 제한§! > $0."
 tooltip_ECB_Outright_Monetary_Transactions_available: "§Y전면적 통화 거래 (OMT) 크기 제한§! > $0."
 tooltip_ECB_Outright_Monetary_Transactions_complete_effect: "§Y이율§!이 §R4.0% 보다 큰§! 모든 회원국: §Y이율§!이 §R4.0% 미만§!이 되고 동시에 §GOMT 크기 제한§!이 §BOMT 총 가치§!보다 커지게 될 때까지 부채가 감소합니다 \n"
 tooltip_ECB_Outright_Monetary_Transactions_remove_effect: "§BOMT 계좌§!가 $0 보다 큰 모든 회원국들:! §BOMT 계정§!을 빚으로 §R추가합니다§!.\n"
 EU_exit_category: "유럽 연합 탈퇴"
 EU_exit_category_desc: "With rising Euroscepticism throughout the Union some member states will think about leaving §C[EUU.GetFlag] The European Union§!."
 EU_Article_50: "유럽 연합을 떠나기 (리스본 조약 50조)"
 EU_Article_50_desc: "\"모든 회원국은 각국의 헌법이 요구하는 가치에 따라 연합을 탈퇴하는 결정을 내릴 수 있다.\"\n -리스본 조약 50조 (1).\n처음엔, 리스본 조약 50조는 유럽 연합의 헌법 조약에 상정되기 위한 목적으로 그 초안이 작성되었습니다. 그러나 지속적으로 헌법의 승인을 받지 못하면서, 결국 이 조항은 리스본 조약에 통합되었습니다."
 EU_Revoke_Article_50: "리스본 조약 50조 철회"
 EU_Revoke_Article_50_desc: "Revoke Article 50 and remain in §C[EUU.GetFlag] The European Union§!\n\"Article 50 TEU must be interpreted as meaning that, where a Member State has notified the European Council, in accordance with that article, of its intention to withdraw from the European Union, that article allows that Member State, for as long as a withdrawal agreement concluded between that Member State and the European Union has not entered into force or, if no such agreement has been concluded, for as long as the two years laid down in Article 50(3) TEU, possibly extended by that paragraph, has not expired, to revoke that notification unilaterally, in an unequivocal and unconditional manner, by a notice addressed to the European Council in writing, after the Member State concerned has taken the revocation decision in accordance with its constitutional requirements. The purpose of that revocation is to confirm the EU membership of the Member State concerned under terms that are unchanged as regards its status as a Member State, and that revocation brings the withdrawal procedure to an end.\"\n- Judgment of the Court of Justice of the European Union in Case C-621/18"
 EU_exit: "Leaving the EU"
 EU_exit_desc: "§Y[ROOT.GetNameWithFlag]§!(은)는 유럽 의회에 §C[EUU.GetFlag] 유럽 연합§!을 떠나겠다는 의사를 밝혔습니다. §Y[ROOT.GetNameWithFlag]§!(은)는 이 알림을 기준으로 2년 뒤에 연합을 떠날 것입니다."
 EU_extend_Article_50: "리스본 조약 50조 연장"
 EU_extend_Article_50_desc: "§C[EUU.GetFlag] 유럽 연합§!에게 리스본 조약 50조의 연장과 탈퇴 시점을 연기해도 되는지 문의하기"
 EU_exit_three_month: "Three-month extension"
 EU_exit_three_month_desc: "§Y[ROOT.GetNameWithFlag]§!(은)는 §C[EUU.GetFlag] 유럽 연합§!을 통해 리스본 조약 50조에 대한 3개월의 기간 연장을 받았습니다. §Y[ROOT.GetNameWithFlag]§!(은)는 3개월 뒤에 유럽 연합을 떠날 것입니다."
 EU_withdrawal_treaty: "탈퇴 조약"
 EU_withdrawal_treaty_desc: "§Y[ROOT.GetNameWithFlag]§!(와)과 §C[EUU.GetFlag] 유럽 연합§!의 회원국은 \"탈퇴 조약\"에 동의하였습니다."
 tooltip_EU_exit_available: "§Y[ROOT.GetNameWithFlag]§! is not currently attempting to leave the §C[EUU.GetFlag][EUU.GetName]§!"
 tooltip_EU_exit_cancel_trigger: "§Y[ROOT.GetNameWithFlag]§!(은)는 디시전 §Y리스본 조약 50조 취소§!가 활성화되었습니다."
 tooltip_EU_Revoke_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!."
 tooltip_EU_Revoke_Article_50_effect: "§Y[ROOT.GetNameWithFlag]§! stays in §Y[EUU.GetFlag] The European Union§!. Mission §YLeaving the EU§! AND Mission §YThree-month extension§! is removed.\nYou won't be able to invoke §YArticle 50§! for the next §Y180 days§!."
 tooltip_EU_extend_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! has Mission §YLeaving the EU§! OR has Mission §YThree-month extension§!  \nAND [ROOT.GetNameWithFlag] must have > 25% influence on the European Union's Leader of Foreign Policy."
 tooltip_EU_remove_laws_and_offices: "모든 §Y유럽 연합의 정책과 부서§!를 제거합니다.\n"
 EU_defense_category: "유럽 연합의 국방 정책"
 EU_defense_category_desc: "In the 1950s the idea of the European Defence Community collapsed when it failed to obtain ratification in the French Parliament. Its successor became the Common Security and Defence Policy of the European Union. With the majority of European Nations being members of the North Atlantic Treaty Organization (NATO), there wasn't seen the need for an own European Defense Organization throughout the 20th century. But with rising world tensions in the 21st century, this is changing."
 EU_Frontex_take_control: "유럽 대외 국경 관리 협력 기관 (Frontex) 경비대의 통제권 획득"
 EU_Frontex_take_control_desc: "유럽의 외부 국경은 최근 몇 년간 유럽 연합으로 진입하려는 이민자들과 난민들의 수가 전례없이 증가하는 것을 지켜봐왔습니다.  외부의 국경과 맞닿아있는 국가는 그들 혼자서 이 모든 것에 대한 책임을 져야했습니다. 하지만 유럽 대외 국경 관리 협력 기관 (Frontex)은 극심한 이민 문제에 시달리는 유럽 연합의 국가들에게 추가의 기술적인 지원을 제공해줄 수 있습니다.\n 이는 비행기와 배를 포함한 추가적인 기술 장비와 특수 훈련된 국경 경비대원들의 배치를 더욱 조직화함으로써 진행될 것입니다."
 EU_EuroNavy_take_control: "유럽 해군 (EuroNavy)의 통제권 획득"
 EU_EuroNavy_take_control_desc: "다국적의 함대와 태스크 포스가 21세기에서 더욱 보편적이고 중요한 요소가 되면서, §C[EUU.GetFlag] 유럽 연합§!의 회원국들은 그들의 해군을 투입시켜 그들의 함선들을 통합된 유럽 해군 지휘부인 §Y유럽 해군 (EuroNavy)§!로 전환시키기로 결정하였습니다."
 EU_EuroArmy_take_control: "유럽군 (EuroArmy)의 통제권 획득"
 EU_EuroArmy_take_control_desc: "§C[EUU.GetFlag] 유럽 연합§!의 회원국들은 §Y유로군§!이라는 이름의 일반 군대를 형성하기로 결정하였습니다."
 EU_create_EDU: "유럽방위동맹 (EDU)의 형성"
 EU_create_EDU_desc: "To attain the necessary strategic autonomy to defend their collective interests, respond to external conflicts and crises, and project security in our neighbourhood the member states have decided to form the §YEuropean Defence Union (EDU)§! as a military alliance and to collectively leave §YNATO§!."
 EU_military_exercise: "[FROM.GetAdjective] 국경에서의 군사 훈련 준비"
 EU_military_exercise_desc: "[FROM.GetAdjective] 국경에서의 군사 훈련 준비"
 EU_ask_to_host_military_exercise: "국경에서 군사 훈련의 진행을 부탁하기"
 EU_ask_to_host_military_exercise_desc: "[FROM.GetNameWithFlag]에게 국경에서의 군사 훈련 진행을 부탁하기"
 EU_military_exercise_mission: "군사 훈련 실행하기"
 EU_military_exercise_mission_desc: "군사 훈련 실행하기"
 counter_military_exercise_mission: "군사 훈련 보복하기"
 counter_military_exercise_mission_desc: "군사 훈련 보복하기"
 EU_military_exercise_threat: "군사 훈련"
 EU_apply_for_membership_category: "유럽 연합 가입"
 EU_apply_for_membership_category_desc: "Becoming a member of the EU is a complex procedure which does not happen overnight. Once an applicant country meets the conditions for membership, it must implement EU rules and regulations in all areas.\nAny country that satisfies the conditions for membership can apply. These conditions are known as the 'Copenhagen criteria' and include a free-market economy, a stable democracy and the rule of law, and the acceptance of all EU legislation, including of the euro."
 EU_apply_for_membership: "유럽 연합 가입"
 EU_apply_for_membership_desc: "§Y[ROOT.GetNameWithFlag]§!(은)는 §C[EUU.GetFlag] 유럽 연합§!과 함께 나아갈 수 있으며, 우리 모두 환희의 송가를 노래합니다:\n환희여, 아름다운 신의 광채여,\n천상낙원의 딸들이여,\n우리는 정열에 취하고,\n빛이 가득한 신의 성전으로 들어간다ǃ\n가혹한 현실이 갈라놓은 자들을\n신비로운 그대의 힘으로 다시 결합시키노라;\n그리고 모든 인간은 형제가 되노라,\n온화한 그대의 날개가 머무르는 곳에서."
 EU_adopt_EU_law: "유럽 연합 정책 및 법률 적용하기"
 EU_adopt_EU_law_desc: "매우 다양하고 광범위한 유럽 연합의 법과 규칙 때문에, 각 유럽 연합 후보국들은 이를 국가의 법으로 지정해야하며, 그렇기에 협상이 완료되기까지 충분한 시간이 필요합니다. 유럽 연합 후보국들은 이렇게 예비 가입된 상태에서 경제적, 행정적, 그리고 기술적으로 지원을 받습니다."
 EU_join_the_Euro: "유로화 (Euro) 가입"
 EU_join_the_Euro_desc: "유로화 (Euro)를 도입하기 위해서는, 유럽 연합 국가들은 유럽 연합의 법과 비슷한 형태의 국가 법률로 조정해야 하며 경제적으로 수렴되고 융합될 수 있도록 고안된 특별한 조건들을 만족해야만 합니다. 이 요구사항들은 '유로 수렴 기준'으로 불리며, 이는 1991년 네덜란드의 마스트리히트에서 유렵 연합 회원국들에 의해 만들어 졌습니다."
 USoE_integrate_new_members: "새로운 회원국 통합"
 USoE_integrate_new_members_desc: "추가 국가들이 전진하여 연합에 가입하기로 결정했습니다. 이제 이들 새로운 회원국을 통합하고 유럽합중국을 훨씬 더 강력하게 만들 때입니다."
 tooltip_leader_of_EU_trade_policy_influence_3_percent: "§C[EUU.GetFlag] 유럽 연합의 무역 정책 결정권자§!들은 (§Y유럽 집행위원회 위원장§!, §Y유럽 연합 정상회의 상임의장§!, §Y유럽 의회 의장§! 순으로) §C[EUU.GetFlag] 유럽 연합§!의 모든 회원국에서 3% 보다 많은 영향력을 가지고 있어야 합니다."
 tooltip_leader_of_EU_trade_policy_influence_5_percent: "§C[EUU.GetFlag] 유럽 연합의 무역 정책 결정권자§!들은 (§Y유럽 집행위원회 위원장§!, §Y유럽 연합 정상회의 상임의장§!, §Y유럽 의회 의장§! 순으로) §C[EUU.GetFlag] 유럽 연합§!의 모든 회원국에서 5% 보다 많은 영향력을 가지고 있어야 합니다."
