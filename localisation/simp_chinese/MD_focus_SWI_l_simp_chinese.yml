l_simp_chinese:
 switzerland_focus: "瑞士国策树"
 SWI_the_mountain_fortress: "阿尔卑斯山要塞"
 SWI_the_mountain_fortress_desc: "我们拥有的最有效的防御手段就是我们的山脉。如果我们想保持防御优势，就必须加固这些山脉。"
 SWI_guns_for_the_population: "全民持枪"
 SWI_guns_for_the_population_desc: "一个周围强国林立的国家必须有随时准备保护自己家园的人民。"
 SWI_zurich_industrial_project: "苏黎世工业规划"
 SWI_zurich_industrial_project_desc: "如果我们要与邻国竞争，我们必须拥有一个强大的工业体系。"
 SWI_strengthen_the_secret_services: "强化特勤局"
 SWI_strengthen_the_secret_services_desc: "特勤局可以在很大程度上发现我们国家内外的威胁。"
 SWI_military_investments_1: "军备计划 I"
 SWI_military_investments_1_desc: "为提交议会的年度军备计划的第一阶段提供资金，将持续的国防预算转化为新的工业产能。"
 SWI_geneva_industrial_project: "日内瓦工业规划"
 SWI_geneva_industrial_project_desc: "日内瓦一直都需要更多的工厂工作岗位。我们应该彻底改造这个地区。"
 SWI_secure_the_swiss_borders: "确保瑞士边境安全"
 SWI_secure_the_swiss_borders_desc: "我们将开始建立庞大的边境巡逻队和检查站网络，以确保没人可以在我们不知晓的情况下出入边境。"
 SWI_italian_forts: "意大利边境要塞"
 SWI_italian_forts_desc: "我们必须时刻准备好迎接来自南方邻国的袭击。"
 SWI_german_forts: "德国边境要塞"
 SWI_german_forts_desc: "二战期间，我们与德国险些开战，这令人感到不安。如果德国的侵略行径再次抬头，我们绝不能掉以轻心。"
 SWI_french_forts: "法国边境要塞"
 SWI_french_forts_desc: "法国以前也不是没有侵略过我们。我们不能像几个世纪以前那样不堪重负。我们要时刻准备，以防万一。"
 SWI_military_investments_2: "军备计划 II"
 SWI_military_investments_2_desc: "既然已经证明持续投资能够建立自给自足的国防工业，那么就应该启动第二轮军备采购计划，继续推进军备计划。"
 SWI_the_cern_project: "欧洲核子研究中心计划"
 SWI_the_cern_project_desc: "核研究是迈向未来的第一步。我们应该开始对这个领域广泛的研究。"
 SWI_the_large_hadron_collider: "大型强子对撞机"
 SWI_the_large_hadron_collider_desc: "为了能在欧洲核子研究中心更好的研究并推动我们的计划，我们将开始建造世界上最强大的粒子加速器。"
 SWI_construct_power_plants: "建造发电厂"
 SWI_construct_power_plants_desc: "通过在研究中不断地获得新知识，我们可以开始建造更有效的能源设施。"
 switzerland.2.t: "瑞士政治模式的终结"
 switzerland.2.d: "瑞士的民主曾被视为一个榜样，也是所有因给予瑞士公民的可能性而寻求更多民众参与政府的人的一颗闪亮的激励之星，现在已经不复存在。\n\n瑞士领导人[SWI.GetLeader]已经宣布，这些“分散公共生活注意力”和“不必要的全民投票”将停止发生。"
 switzerland.2.o1: "可算摆脱了"
 switzerland.2.o2: "奇耻大辱"
 switzerland.2.o3: "随他吧"
 switzerland_news.1.t: "瑞士联邦加入联合国"
 switzerland_news.1.d: "二战结束后，瑞士政府最初拒绝加入联合国，以此表明该国将继续坚持自身中立，即使当时日内瓦是联合国欧洲总部所在地。\n\n现在，在就此事进行全民公投后，瑞士政府宣布，该国将放弃旁观者身份，并以正式成员身份加入该组织。"
 switzerland_news.1.o1: "是时候了，瑞士！"
 switzerland_news.1.o3: "这真的有那么大的问题吗？"
 SWI_join_un: "新的联合国成员"
 swiss_political_system: "瑞士的政治制度"
 swiss_political_system_desc: "瑞士拥有非常独特的政治制度，是世界上唯一可以理所当然地称自己为“半直接民主国家”的国家。公民可以通过全民公投改变宪法，可以通过全民公投否决法律，甚至可以通过全民公投通过法律。\n然而，这对政治家来说有影响：因为无论哪种政策都是人民制定的，瑞士的联合政府体系必须包括尽可能多的力量。瑞士的四大党，瑞士人民党、自民党、瑞士基督教民主人民党和瑞士社会民主党，经常一起执政——这使得瑞士的全国选举或多或少毫无用处——因为人民不是通过代表而是通过全民公决来统治。"
 swiss_political_system2: "瑞士的政治制度"
 swiss_political_system2_desc: "瑞士拥有非常独特的政治制度，是世界上唯一可以理所当然地称自己为“半直接民主国家”的国家。公民可以通过全民公投改变宪法，可以通过全民公投否决法律，甚至可以通过全民公投通过法律。\n然而，这对政治家来说有影响：因为无论哪种政策都是人民制定的，瑞士的联合政府体系必须包括尽可能多的力量。瑞士的四大党，瑞士人民党、自民党、瑞士基督教民主人民党和瑞士社会民主党，经常一起执政——这使得瑞士的全国选举或多或少毫无用处——因为人民不是通过代表而是通过全民公决来统治。"
 swiss_political_system3: "瑞士的政治制度"
 swiss_political_system3_desc: "瑞士拥有非常独特的政治制度，是世界上唯一可以理所当然地称自己为“半直接民主国家”的国家。公民可以通过全民公投改变宪法，可以通过全民公投否决法律，甚至可以通过全民公投通过法律。\n然而，这对政治家来说有影响：因为无论哪种政策都是人民制定的，瑞士的联合政府体系必须包括尽可能多的力量。瑞士的四大党，瑞士人民党、自民党、瑞士基督教民主人民党和瑞士社会民主党，经常一起执政——这使得瑞士的全国选举或多或少毫无用处——因为人民不是通过代表而是通过全民公决来统治。"
 SWI_swiss_neutrality_desc: "§Y特殊规则：§!\n\n§Y我们§!§R不能§!§Y对其他国家宣战！§!\n--------------\n瑞士人以中立闻名于世。自建国以来，该国没有参与任何形式的进攻性冲突，并在两次世界大战期间保持中立。\n--------------\n如果我们完成§H剧变§!或§H开放§!国策，该国家精神将被§R移除§!"
 SWI_Expanding_nuclear_research: "扩大原子能研究"
 SWI_Expanding_nuclear_research1: "扩大原子能研究"
 SWI_expand_swiss_nuclear_plants: "扩建瑞士核电站"
 SWI_expand_swiss_nuclear_plants_desc: "我们的核电站目前仍能满足国内需求，但剩余产能正在减少。现在扩大产能将确保瑞士未来一代人的能源独立。"
 SWI_research_and_development: "瑞士军工集团科学技术"
 SWI_research_and_development_desc: "瑞士国防部科技中心是瑞士国防部的技术中心，整合了传感器、通信、网络安全和材料研究。通过维持国内安全相关的技术基础，瑞士最大限度地减少了危机时期对外国供应商的依赖。"
 SWI_asd_gruppe: "苏黎世联邦理工学院领域研究计划"
 SWI_asd_gruppe_desc: "将瑞士联邦国防军与苏黎世联邦理工学院和洛桑联邦理工学院纳入联合安全研究计划。联邦资金和学术人才将汇聚一堂，把前沿研究转化为可实际应用的国防能力。"
 SWI_small_arms_development: "发展步兵武器"
 SWI_small_arms_development_desc: "借鉴西格和B&T的专业技术，对Stgw 90（西格 550）制式步枪及其光学瞄具的后继型号进行现代化改造。民兵的成败取决于每位公民士兵手中武器的可靠性。"
 SWI_sig_ag_research_teams: "瑞士武器研究团队"
 SWI_sig_ag_research_teams_desc: "在诺伊豪森的西格轻武器生产线内组建专门的设计团队。数十年的瑞士精密制造经验将应用于下一代单兵和班组武器的研发。"
 SWI_precision_launch_platforms: "制导反坦克系统"
 SWI_precision_launch_platforms_desc: "开发单兵便携式制导反坦克系统，使下车掷弹兵能够在阿尔卑斯山前陆狭窄地形中对装甲部队进行决定性打击。"
 SWI_support_platforms_research: "集成指挥系统"
 SWI_support_platforms_research_desc: "推进瑞士陆军作战管理网络建设，使指挥官能够实时共享共同的战术态势。瑞士的指挥、控制和通信系统将分散的民兵组织整合为一支统一的部队。"
 SWI_mass_produced_firearms: "弹药和小武器生产"
 SWI_mass_produced_firearms_desc: "通过瑞士P防务（前身为鲁格弹药）扩大国内弹药和小武器的生产规模。有保障的国家库存可确保民兵武装，无需依赖进口。"
 SWI_armored_vehicles_study: "装甲车辆计划"
 SWI_armored_vehicles_study_desc: "围绕欧洲通用动力地面系统-莫瓦格食人鱼和鹰系列装甲车（机械化旅的轮式主力）协调瑞士装甲车工业。"
 SWI_airframes_study: "航空计划"
 SWI_airframes_study_desc: "将瑞士航空领域的专业知识整合到斯坦斯的皮拉图斯公司和埃门的鲁格航空公司，涵盖从教练机机身到战斗机维护和结构等各个方面。"
 SWI_mbt_concept: "豹2现代化"
 SWI_mbt_concept_desc: "采用鲁格主导的火控、防护和机动性组件升级Pz 87豹2坦克部队，以保持主战坦克在未来几十年内的实用性。"
 SWI_spart_systems: "自行火炮"
 SWI_spart_systems_desc: "通过作战效能提升升级计划，扩大M109 (Pz Hb) 自行榴弹炮的射程和精度，使其能够在山区地形上进行快速火力打击。"
 SWI_spaa_systems: "机动防空"
 SWI_spaa_systems_desc: "部署基于莱茵金属防空“天空游侠”35毫米系统的移动式短程防空车辆，保护机动部队免受飞机和无人机的攻击。"
 SWI_production_line_innovations: "自动化生产线"
 SWI_production_line_innovations_desc: "为鲁格和莫瓦格装配车间配备现代化自动化设备，提高产量，并将稀缺的熟练劳动力解放出来从事更高价值的工作。"
 SWI_import_missile_tech: "制导导弹集成"
 SWI_import_missile_tech_desc: "采购并整合现代化的空对空导弹和地对空导弹，建立国内技术诀窍，以便在瑞士平台上维护和改装这些导弹。"
 SWI_helicopter_research: "旋翼机计划"
 SWI_helicopter_research_desc: "通过鲁格航空超级美洲豹/美洲狮和EC635机队进行维护和升级，这些飞机是瑞士运输、联络和山地救援的主力军。"
 SWI_air_cavalry_armament: "皮拉图斯教练课程"
 SWI_air_cavalry_armament_desc: "支持皮拉图斯飞机公司及其PC-21高级教练机，这是一款全球出口成功的机型，也是瑞士斯坦斯民用军用航空基地的支柱。"
 SWI_gunship_development: "轻型攻击机"
 SWI_gunship_development_desc: "开发皮拉图斯教练机系列的武装版本，用于轻型攻击和武装侦察，这是瑞士的一项独特的出口能力。"
 SWI_revise_isolation_strategy: "超越堡垒"
 SWI_revise_isolation_strategy_desc: "摒弃静态的阿尔卑斯山防御，转向现代化的动态区域防御，使陆军进一步发展改革与不断变化的威胁形势相匹配。"
 SWI_log_tunnel_network: "阿尔卑斯隧道仓库"
 SWI_log_tunnel_network_desc: "利用瑞士在山体中开凿的隐蔽洞穴仓库和隧道网络，这些仓库和隧道储存着弹药和燃料，空袭无法到达那里。"
 SWI_domestic_res_output: "国民经济供给"
 SWI_domestic_res_output_desc: "加强国家经济保障体系，该体系是确保在紧急情况下能源、食品和关键物资能够持续供应全国的法律框架。"
 SWI_strat_supply_reserves: "强制战略储备"
 SWI_strat_supply_reserves_desc: "强制执行强制仓库储备制度，储备数月的燃料、食品和药品，以应对封锁或危机。"
 SWI_environmental_adaptation: "阿尔卑斯作战学说"
 SWI_environmental_adaptation_desc: "训练和装备专业的山地部队，使其能够在高海拔冬季条件下作战和生存，将地形本身变成武器。"
 SWI_repair_decaying_forts: "重新启用阿尔卑斯山要塞"
 SWI_repair_decaying_forts_desc: "重新启用根据“陆军95”和“陆军21”改革而退役的部分炮兵要塞和加固阵地，恢复山地防御纵深。"
 SWI_graubunden_gold_silver: "阿尔卑斯矿物开采"
 SWI_graubunden_gold_silver_desc: "重新开放格劳宾登阿尔卑斯山的废弃矿场，以确保国内军工产业能够获得少量战略物资。"
 SWI_graubunden_iron_mines: "阿尔卑斯矿石开采"
 SWI_graubunden_iron_mines_desc: "利用阿尔卑斯山铁矿石为国内少量钢铁供应提供原料，减少对进口原材料进行战争生产的依赖。"
 SWI_mil_industry_expansion: "扩大国防工业基础"
 SWI_mil_industry_expansion_desc: "发展瑞士根据《战争物资法》有义务维持的安全相关工业基础。中立国必须能够在外国补给线中断时拥有武装和维持自身运转的能力。"
 SWI_sig_neuhausen_factory: "西格在诺伊豪森工作"
 SWI_sig_neuhausen_factory_desc: "扩建位于诺伊豪森莱茵福尔的历史悠久的西格工厂，该工厂自19世纪以来一直是瑞士小型武器制造的中心。"
 SWI_sig_graubunden_factory: "分散的武器生产"
 SWI_sig_graubunden_factory_desc: "将小型武器和弹药生产分散到格劳宾登山谷，加强工业基础，以抵御按照瑞士分散战略进行的毁灭性打击。"
 SWI_infrastructural_advancement: "工业基础"
 SWI_infrastructural_advancement_desc: "升级为军工厂提供铁路和公路运输的线路，以便即使在战时压力下，原材料和成品设备也能可靠地运输。"
 SWI_expand_gdels_mowag: "扩展克罗伊茨林根的欧洲通用动力地面系统-莫瓦格"
 SWI_expand_gdels_mowag_desc: "扩建位于克罗伊茨林根的欧洲通用动力地面系统-莫瓦格工厂，该工厂生产为瑞士军队和出口客户服务的食人鱼和鹰式装甲车。"
 SWI_new_factory_ruag: "新的鲁格工厂"
 SWI_new_factory_ruag_desc: "鲁格瑞士公司新增飞机和陆地系统大修产能。瑞士国家政策规定，绝大多数瑞士军用维修业务都由鲁格公司承接。"
 SWI_cooperation_with_rheinmetall: "与莱茵金属公司的合作"
 SWI_cooperation_with_rheinmetall_desc: "加深与苏黎世莱茵金属防空股份公司的联系，该公司是厄利孔康特拉夫斯及其35毫米机炮、天卫士和天盾防空传统的继承者。"
 SWI_cooperation_with_thales: "与泰雷兹的合作"
 SWI_cooperation_with_thales_desc: "与泰雷兹瑞士公司合作，采用雷达、光电和指挥控制系统，使瑞士军队能够使用成熟的传感器和网络技术。"
 SWI_general_staff: "武装部队参谋部"
 SWI_general_staff_desc: "在武装部队总司令的领导下，将计划和理论整合到武装部队参谋部之下，使民兵拥有现代化的联合指挥权。"
 SWI_gemeinsames_ok: "特种部队司令部"
 SWI_gemeinsames_ok_desc: "将特种部队司令部、其第10陆军侦察分遣队和掷弹兵部队建设成为民兵部队的一支规模虽小但精锐的先锋力量。"
 SWI_ausbildungskommando: "指挥训练"
 SWI_ausbildungskommando_desc: "改革负责新兵学校和进修课程的训练司令部。瑞士体系的优势在于全体国民都接受纪律严明、标准化的训练。"
 SWI_airforce_modernization: "空军2030项目"
 SWI_airforce_modernization_desc: "启动空军2030项目，这是瑞士现代史上规模最大的武器采购计划，旨在取代老旧的F-5虎式战斗机和F/A-18大黄蜂战斗机，并为一代人重建地面防空能力。"
 SWI_general_air_defense: "新型战斗机评估"
 SWI_general_air_defense_desc: "启动新型战斗机评估，在帕耶讷试飞入围候选机型，并根据瑞士密集山区空域的治安要求对其进行评估。"
 SWI_import_eurofighters: "欧洲台风战斗机竞标"
 SWI_import_eurofighters_desc: "评估空客和贝宜的欧洲战斗机“台风”，这是一款久经考验的欧洲空中优势战斗机，并提供大量的工业参与方案。"
 SWI_import_rafale_fighters: "达索阵风竞标"
 SWI_import_rafale_fighters_desc: "评估法国多用途战斗机达索阵风，权衡其主权优势和相对于其他竞争对手的补偿措施。"
 SWI_german_manufacturing: "德国工业补偿"
 SWI_german_manufacturing_desc: "与德国主导的欧洲战斗机联盟谈判技术转让和补偿贸易，将采购资金重新投入瑞士工业。"
 SWI_french_manufacturing: "法国工业补偿"
 SWI_french_manufacturing_desc: "与达索和泰雷兹公司谈判补偿和工业参与协议，以确保瑞士获得工作份额，以换取飞机采购。"
 SWI_interception_practices: "选择F-35A “闪电” II"
 SWI_interception_practices_desc: "最终选定洛克希德·马丁公司的F-35A战斗机，其传感器融合和隐身性能在评估中名列前茅。第五代战机的态势感知能力将显著提升瑞士的拦截和快速反应预警能力。"
 SWI_multi_role_specialization: "多用途集成"
 SWI_multi_role_specialization_desc: "将F-35A整合到防空和打击角色中，为其配备AIM-120和AIM-9X导弹以及精确制导武器，打造一支灵活的机队。"
 SWI_air_sup_adaptation: "全天候空中警务"
 SWI_air_sup_adaptation_desc: "在瑞士领空保持全天候快速反应警戒状态，空军在2020年达到了这一能力，现在凭借新的战斗机机队得以维持。"
 SWI_acquire_transport_planes: "战术空运"
 SWI_acquire_transport_planes_desc: "扩大超级美洲狮和美洲狮机队以及轻型固定翼飞机的空中运输能力，将部队和救援物资运送到全国各地和国外。"
 SWI_airbase_expansion: "空军基地基础设施"
 SWI_airbase_expansion_desc: "对帕耶讷、迈林根和埃门的主要作战基地进行现代化改造，包括让喷气式飞机在地下躲避攻击的山洞掩体。"
 SWI_nasams_batteries: "爱国者地面防空系统"
 SWI_nasams_batteries_desc: "根据“空军2030”计划采购“爱国者”远程地对空导弹系统，使瑞士首次拥有真正意义上的高空和防区外威胁防御能力。"
 SWI_florako: "弗洛拉科空中监视"
 SWI_florako_desc: "运行弗洛拉科系统，这是一个集成的雷达和指挥网络，全天候监视瑞士空域，并为战斗机和地面防空部队提供指令。"
 SWI_Grune_idea: "绿党"
 SWI_Grune_idea_desc: "为了一个更清洁、更公平、更自由的瑞士 - 在这里，人民和地球高于利润！"
 SWI_universal_education_bonus: "绿色科技"
 SWI_universal_education_bonus_desc: "瑞士对现代教育的投资推动了可再生能源和可持续技术的研究，为更清洁的未来铺平了道路。"
 SWI_environmental_reforms: "环保改革"
 SWI_environmental_reforms_desc: "综合环境法旨在减少排放、保护自然资源，并推动经济向可持续发展转型。"
 SWI_limit_industry: "有限的工业发展"
 SWI_limit_industry_desc: "瑞士限制工业扩张以保护环境，以快速增长换取长期的生态稳定。"
 SWI_eco_tourism: "生态旅游"
 SWI_eco_tourism_desc: "推广环保旅游为农村地区带来新的活力，同时保护瑞士的原始风貌。"
 SWI_national_parks: "国家公园"
 SWI_national_parks_desc: "扩大保护区可以保护野生动物，并巩固瑞士作为全球环保领导者的形象。"
 SWI_completely_green: "完全绿色！"
 SWI_completely_green_desc: "通过不懈的改革和创新，瑞士实现了完全的生态可持续发展，成为一个完全依靠清洁能源的国家。"
 SWI_christian_values: "基督教价值观"
 SWI_christian_values_desc: "传统基督教原则指导社会政策，并加强瑞士社会的道德基础。"
 SWI_banned_abortion: "禁止堕胎"
 SWI_banned_abortion_desc: "严格的法律禁止堕胎，这反映出国家对保守社会伦理的重新承诺。"
 SWI_ndb: "瑞士联邦情报局"
 SWI_ndb_desc: "瑞士联邦情报局加强情报行动，保护国家安全，并在动荡的世界中维护中立。"
 SWI_traditionalist: "传统主义"
 SWI_traditionalist_desc: "传统主义思想影响政策，强调信仰、家庭和民族传统，而非现代社会趋势。"
 SWI_army_fund: "资助军队"
 SWI_army_fund_desc: "增加国防开支可以增强瑞士军队的战备能力并实现基础设施现代化。"
 SWI_ngo_funding: "非政府组织资金"
 SWI_ngo_funding_desc: "政府拨款支持从事人道主义援助、环境保护和公民权利工作的非政府组织。"
 SWI_efficiency: "瑞士效率"
 SWI_efficiency_desc: "瑞士的高效治理成为其治理的标志 - 精简的官僚机构、减少浪费和精准的管理。"
 SWI_fortress_switzerland: "瑞士堡垒"
 SWI_fortress_switzerland_desc: "强大的防御工事和现代化的防御网络确保瑞士在任何冲突中都固若金汤。"
 SWI_tax_code: "精简税法"
 SWI_tax_code_desc: "简化的税收制度可以减少逃税行为，吸引投资，并促进经济平衡发展。"
 SWI_foreign: "外国企业"
 SWI_foreign_desc: "瑞士鼓励外国公司投资，以推动创新和创造就业机会，同时保持国家控制权。"
 SWI_agriculture: "资助农业"
 SWI_agriculture_desc: "瑞士投资于现代化、可持续农业——支持当地农民，保护农村社区，并确保子孙后代的粮食安全。"
 SWI_fdp: "自由民主党"
 SWI_fdp_desc: "自由民主党是一个倡导自由市场、个人创业、经济自由和最小限度国家干预的自由主义政党。"
 SWI_police_reforms: "警察改革"
 SWI_police_reforms_desc: "实现执法现代化，提高效率，增强全国公共安全。"
 SWI_financial_deregulation: "金融放松管制"
 SWI_financial_deregulation_desc: "减少银行和金融限制，以鼓励投资、增长和经济活力。"
 SWI_precision: "瑞士精密"
 SWI_precision_desc: "促进瑞士制造业的卓越发展，推动高质量产业发展，维护国家在精密制造方面的声誉。"
 SWI_fund_startups: "科技初创企业"
 SWI_fund_startups_desc: "为科技初创企业提供资金和支持，以推动创新并确保瑞士的经济未来。"
 SWI_direct_democracy: "直接民主改革"
 SWI_direct_democracy_desc: "通过全民公投和公民倡议扩大公民参与，加强民主进程。"
 SWI_progressive_tax: "累进税制改革"
 SWI_progressive_tax_desc: "实施公平的累进税制，为公共服务提供资金，并确保经济平衡。"
 SWI_pda: "瑞士劳动党"
 SWI_pda_desc: "瑞士共产党的影响力日益增强，主张对国家经济结构进行彻底改革，力图将瑞士的中立地位转变为社会主义团结的引擎。"
 SWI_nationalize_industries: "重点产业国有化"
 SWI_nationalize_industries_desc: "联邦委员会启动对关键工业部门的接管，将重要资源和生产置于国家控制之下，以确保公平分配和有计划发展。"
 SWI_socialist_countries_ties: "与社会主义国家的关系"
 SWI_socialist_countries_ties_desc: "瑞士积极寻求与支持社会主义事业的国家建立更紧密的外交、文化和政治联系，准备将其长期的中立立场转向全球运动。"
 SWI_socialist_agreements: "贸易协定"
 SWI_socialist_agreements_desc: "与社会主义国家谈判达成新的长期贸易协定，确保获得关键原材料，并扩大瑞士精密产品的市场。"
 SWI_higher_wages_idea: "增加工资"
 SWI_higher_wages_idea_desc: "强制性提高最低工资和联邦政府对工资结构的监管确保瑞士工人获得公平和可持续的生活工资，从而促进国内消费。"
 SWI_cheaper_house: "廉价住房"
 SWI_cheaper_house_desc: "联邦政府的一项旨在限制租金价格和补贴建筑的举措，大幅降低了私人住房的成本，使更多人能够拥有自己的住房。"
 SWI_public_housing: "公共住房"
 SWI_public_housing_desc: "国家对高质量公共住房项目的大规模投资，提供了现代化、价格适中的住房，解决了城市密度问题，保障了工薪阶层的住房安全。"
 SWI_challenged_elite: "挑战银行业精英"
 SWI_challenged_elite_desc: "政府直接挑战了行事隐秘且势力强大的银行精英阶层。新的监管措施出台，对私人资本转移征税，并调查逃税行为，以充实联邦国库。"
 SWI_nato_integration: "北约整合"
 SWI_nato_integration_desc: "瑞士的人员配备、空域和采购如今都符合北约标准。互操作性使伯尔尼得以参与到它曾经拒绝加入的规划会议中。"
 SWI_mind_federation: "联邦的思想"
 SWI_mind_federation_desc: "新联邦的统一愿景得以确立，其政治体系的重点在于效率、协作以及对新领土和人口的快速整合。"
 SWI_growing_federation: "强化联邦"
 SWI_growing_federation_desc: "新政府的首要任务是将所有原属地区整合到联邦中。政府投入资源，致力于在所有新纳入联邦的州内实现标准化和政治统一。"
 SWI_modernize_direct: "现代化直接民主"
 SWI_modernize_direct_desc: "直接民主制度经过全面改革和现代化，融入了新技术和简化的流程，以确保公民的快速参与和国家决策的迅速制定。"
 SWI_council_states: "联邦院"
 SWI_council_states_desc: "联邦院进行了重组，旨在给予所有新成立和已成立的州更大、更公平的代表权，平衡人口与地区自治之间的立法权。"
 SWI_fiscal_equalization: "财政均衡基金"
 SWI_fiscal_equalization_desc: "设立一项新的联邦基金，将财富从最富裕的州重新分配给最贫困的州，以确保整个联邦的均衡发展和高生活水平。"
 SWI_develop_federation: "发展联邦"
 SWI_develop_federation_desc: "阿尔卑斯联邦的重点是长期基础设施和发展项目，尤其是在新获得的领土上，以最大限度地发挥经济潜力和政治稳定性。"
 switzerland.8.t: "瑞士对阿尔卑斯山的调查"
 switzerland.8.desc: "瑞士要求立即将萨瓦、普罗旺斯和尼斯移交给其控制，理由是与这些地区有着历史渊源和共同的阿尔卑斯山文化。"
 switzerland.8.a: "割让地区"
 switzerland.8.b: "拒绝"
 switzerland.9.t: "阿尔卑斯山宣称被接受"
 switzerland.9.desc: "法国出人意料地同意了我们的询问，割让了整个阿尔卑斯山地区。这是一次伟大的外交胜利！"
 switzerland.9.a: "一个崭新、更强大的瑞士！"
 switzerland.10.t: "阿尔卑斯山宣称被拒"
 switzerland.10.desc: "我们的宣称遭到了断然拒绝。法国不愿就领土完整问题进行谈判。"
 switzerland.10.a: "外交努力失败了。"
 switzerland.11.t: "索取意大利阿尔卑斯山"
 switzerland.11.desc: "瑞士政府已就奥斯塔、皮埃蒙特、伦巴第和南蒂罗尔割让给瑞士联邦一事发出正式询问。"
 switzerland.11.a: "割让省份"
 switzerland.11.b: "拒绝索取"
 switzerland.12.t: "意大利接受"
 switzerland.12.desc: "罗马方面出人意料地同意了我们的领土要求，理由是希望维护地区和平。阿尔卑斯山脉统一了！"
 switzerland.12.a: "一个统一的阿尔卑斯共和国！"
 switzerland.13.t: "意大利拒绝"
 switzerland.13.desc: "意大利强烈拒绝了我们的询问，认为这一请求是对国家主权的侮辱。"
 switzerland.13.a: "我们的外交努力失败了。"
 switzerland.14.t: "索取奥地利蒂罗尔"
 switzerland.14.desc: "瑞士为统一阿尔卑斯山腹地，已正式提出割让蒂罗尔的请求。虽然此举具有重要的历史意义，但接受这一请求或许能够避免未来的冲突。"
 switzerland.14.a: "将蒂罗尔割让给瑞士"
 switzerland.14.b: "拒绝瑞士的宣称"
 switzerland.15.t: "获得蒂罗尔"
 switzerland.15.desc: "维也纳（或奥地利的现任占领者）已同意我们的请求，将至关重要的蒂罗尔地区并入邦联。我们的统一努力仍在顺利进行。"
 switzerland.15.a: "外交上的重大胜利"
 switzerland.16.t: "蒂罗尔遭拒"
 switzerland.16.desc: "我们提出的关于蒂罗尔的外交请求遭到了断然拒绝。蒂罗尔的现任统治者认为我们的主张是对其边界的不可接受的挑战。"
 switzerland.16.a: "我们必须等待更好的时机。"
 switzerland_news.7.t: "阿尔卑斯联邦"
 switzerland_news.7.d: "经过广泛的外交斡旋和席卷整个地区的民众运动，瑞士正式巩固了对历史悠久的阿尔卑斯山脉核心地带的控制权。该国正式更名为“阿尔卑斯联邦”。\n\n这一意义重大的转变创建了一个横跨中欧山脉的强大统一的联邦制国家，从根本上改变了该地区的权力平衡。新政府保障所有地区的文化和政治自治权。"
 switzerland_news.7.a: "自1516年以来重新定义中立。"
 switzerland_news.8.t: "新共和国：瑞士投票决定集中权力"
 switzerland_news.8.d: "瑞士人民以微弱优势通过了宪法公投，决定放弃联邦制，建立中央集权的共和国。这项由“新时代运动”倡导的变革，承诺精简政府，增强国家凝聚力，但代价是牺牲各州传统的自治权。新的瑞士共和国于今日正式取代了原有的联邦制，在原各州引发了庆祝和抗议的双重浪潮。国际社会正密切关注这一重大变革对这个欧洲最稳定国家之一的影响。"
 switzerland_news.8.a: "邦联已死！"
 SWI_suisse_politique: "瑞士政治"
 SWI_suisse_politique_desc: "建立瑞士国家国策树的框架，并确定联邦的初始政治方向。"
 SWI_strengthening_the_federation: "强化联邦"
 SWI_strengthening_the_federation_desc: "加强各州之间的联系，增强中央政府的权威，以确保国家统一。"
 SWI_dissolving_the_federation: "解散联邦"
 SWI_dissolving_the_federation_desc: "联邦制难以为继。启动一项颇具争议的国家重组进程，优先建立一个统一的瑞士共和国。"
 SWI_deepening_swiss_democracy: "深化瑞士民主"
 SWI_deepening_swiss_democracy_desc: "扩大直接民主工具的范围，通过全民公投和倡议赋予人民更多权力来塑造国家政策。"
 SWI_panalpine_initiative: "泛阿尔卑斯倡议"
 SWI_panalpine_initiative_desc: "采取更积极的外交政策和地区角色。寻求与邻国的阿尔卑斯山区结盟或整合。"
 SWI_true_neutrality: "真正的中立"
 SWI_true_neutrality_desc: "确立并强制执行绝对、永久的中立。退出国际纷争，专注于国内自给自足和国防。"
 SWI_partei_der_arbeit: "瑞士劳动党"
 SWI_partei_der_arbeit_desc: "赋予左翼工人政党权力，使其能够实施旨在实现经济平等和集体所有制的社会主义纲领。"
 SWI_sp: "社会民主党(SP)"
 SWI_sp_desc: "支持社会民主党为改革政治体制、提高社会福利和国际合作所做的努力。"
 SWI_grune: "绿党"
 SWI_grune_desc: "为绿党提供政治支持，推动制定全面的环境保护和可持续发展政策。"
 SWI_fdu: "联邦民主同盟(FDU)"
 SWI_fdu_desc: "赋予联邦民主联盟更大的影响力，以捍卫保守的福音派基督教价值观和地方自治。"
 SWI_svp: "瑞士人民党(SVP)"
 SWI_svp_desc: "支持瑞士人民党推行严格的移民管制、财政保守主义和国家主权。"
 SWI_the_mind_of_the_federation: "联邦的思想"
 SWI_the_mind_of_the_federation_desc: "培养统一的民族认同感，增强联邦的集体意识。"
 SWI_improve_relations_with_our_neighbours: "改善与邻国的关系"
 SWI_improve_relations_with_our_neighbours_desc: "发起外交努力，加强与周边欧洲国家的贸易和政治联系。"
 SWI_inquire_about_the_french_alps: "索取法国阿尔卑斯山区"
 SWI_inquire_about_the_french_alps_desc: "巧妙地与法国就法国阿尔卑斯山区的共同命运和治理问题展开谈判。"
 SWI_inquire_about_the_italian_alps: "索取意大利阿尔卑斯山区"
 SWI_inquire_about_the_italian_alps_desc: "探索与意大利的外交渠道，讨论意大利阿尔卑斯山地区的未来及其潜在的一体化问题。"
 SWI_inquire_about_the_austrian_alps: "索取奥地利阿尔卑斯山区"
 SWI_inquire_about_the_austrian_alps_desc: "与奥地利就其阿尔卑斯山地区的地位进行对话，并正式吞并列支敦士登。"
 SWI_proclaim_the_alp_federation: "宣布成立阿尔卑斯联邦"
 SWI_proclaim_the_alp_federation_desc: "宣布成立统一的阿尔卑斯联盟，将所有共享的阿尔卑斯山地区整合到一个由瑞士领导的强大新实体之下。"
 SWI_alp_federation_coring_tt: "阿尔卑斯联邦中合作度达到80%以上的成员国将成为核心领土。合作度低于80%的成员国则获得领土主张。"
 SWI_expel_foreign_influence: "驱逐外国影响"
 SWI_expel_foreign_influence_desc: "采取措施减少和消除外国势力和全球组织对瑞士内政的影响。"
 SWI_strengthen_the_federation: "加强联邦"
 SWI_strengthen_the_federation_desc: "投资于国家重点项目和机构，使联邦政府更加强大，更能抵御内外压力。"
 SWI_modernize_direct_democracy: "现代化直接民主"
 SWI_modernize_direct_democracy_desc: "简化直接民主的请愿和投票程序，确保该制度在现代社会保持高效和相关。"
 SWI_empower_the_council_of_states: "赋权联邦院"
 SWI_empower_the_council_of_states_desc: "扩大联邦院的立法权，以更好地代表各州的利益和主权。"
 SWI_fiscal_equalization_fund: "财政均衡基金"
 SWI_fiscal_equalization_fund_desc: "设立永久基金，重新分配联邦财富，确保所有州（无论贫富）的财政平等和稳定。"
 SWI_social_equality: "社会平等"
 SWI_social_equality_desc: "实施旨在减少经济差距、促进社会公正的政策，尤其要关注边缘化群体和低收入公民。"
 SWI_workers_rights: "工人权利"
 SWI_workers_rights_desc: "通过全面的立法，保障所有瑞士劳动者获得公平的工资、安全的工作条件和组织起来的权利。"
 SWI_workers_rights_idea: "工人权利"
 SWI_workers_rights_idea_desc: "通过全面的立法，保障所有瑞士劳动者获得公平的工资、安全的工作条件和组织起来的权利。"
 SWI_cheaper_housing: "更廉价的住房"
 SWI_cheaper_housing_desc: "对住房市场进行补贴和监管，以确保全国所有公民都能获得负担得起的住房。"
 SWI_expand_public_housing: "扩建公共住房"
 SWI_expand_public_housing_desc: "启动一项大规模的联邦项目，在主要城市中心建造新的、高质量的公共住房单元。"
 SWI_challenge_the_banking_elite: "挑战银行业精英"
 SWI_challenge_the_banking_elite_desc: "制定严格的监管规定，并针对强大而神秘的国际银行业征收新税。"
 SWI_nationalize_key_industries: "关键产业国有化"
 SWI_nationalize_key_industries_desc: "将能源、交通和通信等重要领域的产权从私人手中转移到国家手中。"
 SWI_end_banking_secrecy: "废除银行保密"
 SWI_end_banking_secrecy_desc: "废除瑞士银行业长期存在的保密传统，使金融体系符合国际透明度标准。"
 SWI_neutrality_pda: "中立（党派之路）"
 SWI_neutrality_pda_desc: "重申瑞士传统的中立政策，但优先考虑国内社会主义改革，而不是卷入对外冲突。"
 SWI_strengthen_ties_with_socialist_countries: "加强与社会主义国家的联系"
 SWI_strengthen_ties_with_socialist_countries_desc: "与日益壮大的社会主义和共产主义国家集团建立更紧密的外交和经济关系。"
 SWI_strengthen_domestic_independence: "加强国内独立"
 SWI_strengthen_domestic_independence_desc: "制定促进资源和产业自力更生的政策，保护瑞士经济免受全球市场波动的影响。"
 SWI_trade_agreements_with_socialist_states: "与社会主义国家的贸易协定"
 SWI_trade_agreements_with_socialist_states_desc: "与社会主义国家和不结盟国家签署独家贸易协定，以实现瑞士出口市场多元化。"
 SWI_direct_democracy_reforms: "直接民主改革"
 SWI_direct_democracy_reforms_desc: "引入技术和程序上的变革，使民主进程更加流畅，更能回应公民的需求。"
 SWI_domestic_independence: "国家独立性"
 SWI_domestic_independence_desc: "瑞士致力于最大限度地维护其自主权和主权，拒绝欧盟等大型区域集团的干预。"
 SWI_move_closer_to_the_eu: "向欧盟靠拢"
 SWI_move_closer_to_the_eu_desc: "致力于深化瑞士与欧盟单一市场和政治结构的融合。"
 SWI_humanitarian_leadership: "人道主义领导者"
 SWI_humanitarian_leadership_desc: "通过外交手段和增加人道主义支出，加强瑞士作为全球援助、难民和国际法灯塔的作用。"
 SWI_national_health_service: "国民医疗服务"
 SWI_national_health_service_desc: "通过引入完全由国家资助的国民医疗服务体系，重新构想医疗保健系统，以保障全民享有医疗保健服务。"
 SWI_expand_labour_union_power: "扩大工会权力"
 SWI_expand_labour_union_power_desc: "通过立法，赋予有组织的工会在集体谈判和产业政策方面更大的权力和影响力。"
 SWI_progressive_tax_reform: "累进税改革"
 SWI_progressive_tax_reform_desc: "彻底改革税法，大幅提高高收入者和企业的税率，以资助社会项目。"
 SWI_strengthen_parliamentary_socialism: "加强议会社会主义"
 SWI_strengthen_parliamentary_socialism_desc: "在民主框架内逐步增强社会民主政治体制的权力。"
 SWI_welfare_state_of_the_future: "未来的福利国家"
 SWI_welfare_state_of_the_future_desc: "开创下一代社会保障体系，保障所有公民享有体面的基本收入和全面的社会保障。"
 SWI_invest_in_green_infrastructure: "投资绿色基础设施"
 SWI_invest_in_green_infrastructure_desc: "投入大量国家资金用于建设可持续的公共工程，包括可再生能源电网和环保交通。"
 SWI_fund_ngos: "资助非政府组织"
 SWI_fund_ngos_desc: "向环境和社会非政府组织提供大量联邦拨款和支持，以加强公民社会。"
 SWI_geneva_climate_diplomatic_hub: "加强日内瓦作为气候中心的作用"
 SWI_geneva_climate_diplomatic_hub_desc: "利用日内瓦的国际地位举办重大气候峰会和外交谈判，提升瑞士的软实力。"
 SWI_limit_industrial_expansion: "有限工业扩张"
 SWI_limit_industrial_expansion_desc: "颁布禁令及严格的区域划分法，减缓重工业扩张速度，保护瑞士自然景观的美丽。"
 SWI_protect_the_alps: "保护阿尔卑斯山"
 SWI_protect_the_alps_desc: "将阿尔卑斯山脉划定为最高生态保护区，禁止大规模开发或资源开采。"
 SWI_renewable_energy_research: "可再生能源研究"
 SWI_renewable_energy_research_desc: "资助太阳能、水能和地热能的科学技术进步，以实现国家完全能源独立。"
 SWI_centralization: "中央集权"
 SWI_centralization_desc: "将权力从各州转移到联邦政府，巩固权力，以便迅速果断地采取国家行动。"
 SWI_strengthen_the_cantons: "加强各州"
 SWI_strengthen_the_cantons_desc: "加强州政府的自治权和传统权力，维护联邦制精神。"
 SWI_close_the_borders: "关闭边境"
 SWI_close_the_borders_desc: "实施绝对关闭边境的政策，以控制移民，保护瑞士国家认同和劳动力市场。"
 SWI_ban_abortion: "禁止堕胎"
 SWI_ban_abortion_desc: "制定法律彻底禁止堕胎，使国家法律与保守的道德原则保持一致。"
 SWI_faith_welfare: "信仰福利"
 SWI_faith_welfare_desc: "重组社会保障体系，依靠私人宗教和慈善组织，减少国家干预。"
 SWI_stricter_immigration: "更严格的移民法"
 SWI_stricter_immigration_desc: "引入积分制和配额制，严格限制所有形式的合法和非法移民进入该国。"
 SWI_maintain_armed_neutrality: "保持武装中立"
 SWI_maintain_armed_neutrality_desc: "在确保拥有一支强大且随时待命的国防力量的同时，坚持长期以来奉行的军事不结盟传统。"
 SWI_distance_from_eu: "与欧盟保持距离"
 SWI_distance_from_eu_desc: "开始使瑞士经济和政治政策脱离欧盟的影响和监管。"
 SWI_fund_ndb: "资助联邦情报局"
 SWI_fund_ndb_desc: "增加对联邦情报局的拨款，以提高国内安全、反间谍和监视能力。"
 SWI_stop_un_training: "停止联合国维和人员培训"
 SWI_stop_un_training_desc: "结束训练外国联合国维和人员的有争议做法，强调纯粹防御性的军事姿态。"
 SWI_traditionalist_propaganda: "传统主义宣传"
 SWI_traditionalist_propaganda_desc: "发起一场全国性运动，通过国家资助的媒体和教育来宣传瑞士的保守和传统价值观。"
 SWI_expand_army_fund: "增加军队经费"
 SWI_expand_army_fund_desc: "确保设立一项新的、永久性的联邦收入来源，专门用于增加瑞士武装部队的预算。"
 SWI_promote_swiss_identity: "推广瑞士身份认同"
 SWI_promote_swiss_identity_desc: "资助文化和语言机构，以培养更强烈的、统一的瑞士爱国主义和民族归属感。"
 SWI_skepticism_ngos: "对非政府组织的怀疑"
 SWI_skepticism_ngos_desc: "调查并限制国内外非政府组织的活动，理由是担心它们对国家主权产生影响。"
 SWI_expand_agriculture: "扩大农业"
 SWI_expand_agriculture_desc: "投资现代农业技术和补贴，大幅提高国内粮食产量和国家自给自足能力。"
 SWI_national_efficiency: "国家效率"
 SWI_national_efficiency_desc: "在所有联邦机构推行官僚和行政改革，以减少浪费，提高政府效率和速度。"
 SWI_isolationism: "孤立主义"
 SWI_isolationism_desc: "采取完全与世隔绝的全球政策，关闭边境和市场，消除一切外国对瑞士事务的干涉。"
 SWI_armed_neutrality: "武装中立"
 SWI_armed_neutrality_desc: "正式确立只以国防为导向的外交政策，确保军队装备精良，不惜一切代价捍卫国家独立。"
 SWI_defend_secrecy: "捍卫银行保密"
 SWI_defend_secrecy_desc: "坚决反对一切旨在废除该国私人银行保密法的国际压力。"
 SWI_attract_foreign_investors: "吸引外国投资者"
 SWI_attract_foreign_investors_desc: "提供新的激励措施、税收优惠和监管保障，以鼓励国际公司迁往瑞士。"
 SWI_market_liberalization: "市场自由化"
 SWI_market_liberalization_desc: "放松对国内市场和行业的管制，以促进自由竞争、创新和经济增长。"
 SWI_keep_swiss_neutrality: "保持瑞士中立"
 SWI_keep_swiss_neutrality_desc: "坚持传统的、严格的不干涉主义解释，优先考虑金融稳定而不是政治纠葛。"
 SWI_modernize_neutrality: "中立现代化"
 SWI_modernize_neutrality_desc: "将中立概念与现代背景相适应，从而可以进行更多外交接触和人道主义干预。"
 SWI_reduce_welfare: "减少福利支出"
 SWI_reduce_welfare_desc: "削减联邦政府在社会项目和福利方面的支出，以减少国家债务并鼓励私人储蓄。"
 SWI_moderate_police_reforms: "现代警察改革"
 SWI_moderate_police_reforms_desc: "逐步推进各项改革措施，包括增加警务经费、更新装备以及改善警民关系。"
 SWI_industrial_development: "工业发展"
 SWI_industrial_development_desc: "大力投资，扩大国家制造业，并在战略地区建设新的工业园区。"
 SWI_swiss_precision: "瑞士精密工程"
 SWI_swiss_precision_desc: "国家研发和投资应重点关注高科技制造业、制表业和专业机械工程。"
 SWI_tech_startups: "促进科技初创企业"
 SWI_tech_startups_desc: "营造有利于国内科技产业蓬勃发展的资金、税收优惠和孵化计划生态系统。"
 SWI_free_trade: "自由贸易"
 SWI_free_trade_desc: "取消关税，减少贸易壁垒，使瑞士经济全面融入全球化贸易体系。"
 SWI_radical_changes: "剧变"
 SWI_radical_changes_desc: "对政治体制进行全国性的重新评估，为邦联的革命性、根本性变革铺平道路。"
 SWI_promote_left: "推动左翼政治"
 SWI_promote_left_desc: "发起一场运动，大幅提高共产主义和社会主义意识形态在整个联邦的受欢迎程度和影响力。"
 SWI_workers_council: "工人委员会掌权"
 SWI_workers_council_desc: "正式确立工人委员会作为国家最高经济和政治机关，赋予无产阶级直接权力。"
 SWI_nationalize_banks: "银行国有化"
 SWI_nationalize_banks_desc: "夺取国家强大而神秘的银行业控制权，将其置于联邦公共所有制之下，造福人民。"
 SWI_agricultural_collectivization: "农业集体化"
 SWI_agricultural_collectivization_desc: "废除私有土地所有制，将所有农场组织成大型的国营集体农业企业。"
 SWI_workers_cooperatives: "工人合作社"
 SWI_workers_cooperatives_desc: "支持建立工人所有和管理的合作社，作为主要的生产模式，保持分散的经济控制。"
 SWI_militias_of_the_people: "人民民兵"
 SWI_militias_of_the_people_desc: "解散常备军，代之以由来自工人阶级的、政治上可靠的武装民兵组成的分散网络。"
 SWI_secret_police: "秘密警察"
 SWI_secret_police_desc: "建立一支强大且无处不在的秘密警察部队，以监视反革命活动并镇压内部异议。"
 SWI_denounce_eu: "谴责欧盟"
 SWI_denounce_eu_desc: "正式谴责欧盟是资产阶级组织，并终止瑞士与欧盟的一切合作或政治联系。"
 SWI_suppress_party_enemies: "镇压党敌"
 SWI_suppress_party_enemies_desc: "利用国家全部力量消灭和压制所有敌对的政党和组织。"
 SWI_multilingual_worker_solidarity: "多语种工人团结"
 SWI_multilingual_worker_solidarity_desc: "强调跨越国家语言鸿沟的共同阶级认同，以打造一个统一的多语种无产阶级。"
 SWI_peoples_tribune: "平民护民官"
 SWI_peoples_tribune_desc: "设立平民护民官，由民选代表组成，作为对中央政府权力的民众制衡力量。"
 SWI_central_committee: "中央委员会领导一切"
 SWI_central_committee_desc: "将最终的政治权力赋予党的中央委员会，使其规模小而权力强，从而确保意识形态的纯洁性和集中指挥。"
 SWI_peoples_constitution: "人民宪法"
 SWI_peoples_constitution_desc: "起草并颁布一部新宪法，确立工人阶级的权利，并使国家的社会主义结构正式化。"
 SWI_national_charter: "国家宪章"
 SWI_national_charter_desc: "制定一部国家宪章来取代旧宪法，正式宣布新国家致力于民族主义和威权主义原则。"
 SWI_propaganda_machine: "宣传机器"
 SWI_propaganda_machine_desc: "建立一套完善的国家媒体体系，以控制信息流动，确保公民在意识形态上保持一致。"
 SWI_economic_self_sufficiency: "经济自给自足"
 SWI_economic_self_sufficiency_desc: "将整个瑞士经济转向自给自足，优先发展国内生产，消除对对外贸易的依赖。"
 SWI_expel_foreign_companies: "驱逐外国公司"
 SWI_expel_foreign_companies_desc: "强制立即关闭并国有化所有在瑞士境内经营的外资企业。"
 SWI_revive_the_nf: "重振国民阵线"
 SWI_revive_the_nf_desc: "重建历史悠久的国民阵线，并赋予其领导人权力，以倡导激进的、民族主义的和威权主义的政治纲领。"
 SWI_fascism_idea: "国民阵线"
 SWI_fascism_idea_desc: "瑞士国民阵线是20世纪30年代瑞士的一个极右翼政党。据《瑞士历史词典》记载，该党鼎盛时期拥有多达9000名成员；而据西蒙·维森塔尔中心估计，其成员人数可能达到25000人左右。该党由帝国宣传部资助。国民阵线于1940年解散，并于1943年被瑞士联邦委员会取缔。"
 SWI_national_unity: "国家团结"
 SWI_national_unity_desc: "在新政权下，消除一切内部分裂和意识形态冲突，形成统一的民族意志。"
 SWI_leader_of_a_nation: "国家领袖"
 SWI_leader_of_a_nation_desc: "赋予一位魅力非凡的国家领袖全新的广泛权力，使国家过渡到强有力的、个人化的领导模式。"
 SWI_militarize_society: "军事化社会"
 SWI_militarize_society_desc: "将军事原则融入平民生活，在全国范围内强制服役，并提倡纪律和服从。"
 SWI_fascist_propaganda: "法西斯宣传"
 SWI_fascist_propaganda_desc: "发起一场声势浩大的全国性媒体宣传活动，以宣扬政权的意识形态，并妖魔化所有被视为国家敌人的人。"
 SWI_censorship: "审查"
 SWI_censorship_desc: "对所有形式的媒体、艺术和知识输出实施全面控制，以确保绝对的意识形态一致性。"
 SWI_pan_alpine_identity: "泛阿尔卑斯认同"
 SWI_pan_alpine_identity_desc: "宣布瑞士及其邻国存在共同的“阿尔卑斯民族”，为扩张奠定意识形态基础。"
 SWI_ban_radical_neutrals: "禁止激进中立派"
 SWI_ban_radical_neutrals_desc: "取缔所有主张绝对、被动中立的政治团体，称其为不爱国的，对国家构成威胁。"
 SWI_german_superiority: "德意志霸权"
 SWI_german_superiority_desc: "优先考虑德语人口，并采取与德国文化和语言接轨的政策。"
 SWI_swiss_identity: "瑞士身份认同"
 SWI_swiss_identity_desc: "倡导独特、多元民族、高度独立的瑞士身份认同，使其与所有邻近大国截然不同。"
 SWI_alpine_destiny: "阿尔卑斯命运"
 SWI_alpine_destiny_desc: "要求将所有阿尔卑斯山地区统一在瑞士国旗下，并为即将到来的统一战争做好军事准备。"
 SWI_one_party_state: "一党专政国家"
 SWI_one_party_state_desc: "废除所有剩余的民主机构，并正式确立执政党完全、永久的政治垄断。"
 SWI_further_strengthen_the_federation: "进一步加强联邦"
 SWI_further_strengthen_the_federation_desc: "瑞士是一个建立在各州、文化和语言相互妥协基础上的国家。通过进一步加强联邦结构，我们可以确保更大的稳定性，改善各州之间的协调，并在面对内部紧张局势和外部威胁时巩固联邦的团结。"
 SWI_higher_wages: "增加工资"
 SWI_higher_wages_desc: "生活成本上涨和经济需求增长需要采取行动。通过鼓励关键行业提高工资，我们可以改善生活水平，增强国内消费，并确保社会长期稳定。"
 SWI_universal_education: "普及教育"
 SWI_universal_education_desc: "教育是国家强大繁荣的基石。通过普及教育，我们可以确保所有公民都拥有为瑞士未来做出贡献所需的技能和知识。"
 SWI_fund_ngo: "资助非政府组织"
 SWI_fund_ngo_desc: "非政府组织在支持社区和应对社会挑战方面发挥着至关重要的作用。通过提供国家资金，我们可以增强它们服务公众的能力，并与政府工作形成互补。"
 SWI_ban_neutrals: "禁止中立派"
 SWI_ban_neutrals_desc: "面对日益增长的威胁和全球动荡，瑞士不能再保持中立。通过放弃中立，我们彰显了我国在国际事务中的积极作用，并准备捍卫我们在海外的利益。"
 SWI_militarized_society: "军事化社会"
 SWI_militarized_society_desc: "一个强大的国家需要强大的公民。通过建立军事化的社会，我们能够培养公民的纪律性、战备意识以及保卫瑞士的共同责任感。"
 SWI_secret_agency: "特勤局"
 SWI_secret_agency_desc: "情报是国家安全的基石。通过建立秘密情报机构，瑞士可以监控威胁、收集关键信息，并在危险抵达国界之前采取果断行动。"
 SWI_swiss_companies_only: "只限瑞士公司"
 SWI_swiss_companies_only_desc: "为了增强经济实力、保护国内利益，某些行业只允许瑞士公司运营。这既能保障公民就业，又能确保本国产业处于国家控制之下。"
 SWI_self_sufficiency: "自给自足"
 SWI_self_sufficiency_desc: "瑞士必须减少对外国进口的依赖，确保国内生产必需资源。通过促进自给自足，我们能够保障经济安全，增强国家韧性。"
 SWI_workers: "工人"
 SWI_workers_desc: "一个国家的强盛取决于其劳动力的强盛。通过实施有利于劳动者的政策，我们能够确保公平的工资、改善的工作条件，并打造一个更满意、更高效的人口。"
 SWI_communism_idea: "共产主义"
 SWI_communism_idea_desc: "瑞士共产主义以社会主义原则为指导，力求将生产资料置于人民的控制之下。通过重组经济，我们旨在减少不平等，确保所有公民共享国家财富。"
 SWI_new_age: "新纪元"
 SWI_new_age_desc: "旧的邦联已经走到尽头。通过解散联邦并建立统一的共和国，瑞士进入了一个新的治理时代，权力更加集中，国家的未来也重新定义。"
 SWI_agricultural_collectivization_idea: "农业集体化"
 SWI_agricultural_collectivization_idea_desc: "为了保障全国粮食供应和实现农村现代化，我们必须将农场组织成集体单位。农业集体化将提高效率，改善资源配置，并加强国家对粮食生产的控制。"
 SWI_militia: "瑞士民兵"
 SWI_militia_desc: "每个公民都有保卫国家的义务。通过组建瑞士民兵，我们确保民众接受训练、纪律严明，并随时准备抵御任何对我们主权的威胁。"
 SWI_censor: "审查"
 SWI_censor_desc: "为了维护社会秩序和保障国家稳定，必须对信息进行严格监控。实施审查制度可以确保有害意识形态和破坏稳定的宣传无法动摇瑞士的根基。"
 SWI_central_committee_idea: "中央委员会"
 SWI_central_committee_idea_desc: "一个强大的国家需要果断的领导。中央委员会的建立巩固了权力，协调了全国的政策，并确保党的愿景得到有效贯彻落实。"
 SWI_politica_estera_svizzera: "瑞士政治"
 SWI_politica_estera_svizzera_desc: "瑞士的外交政策一向保持中立。如果我们偏离这条道路，或许能在其他领域获得优势。"
 SWI_choosing_our_path: "选择我们的道路"
 SWI_choosing_our_path_desc: "现在我们面临着外交政策的选择。有些人倾向于中立，但也有人主张加入北约和欧盟。"
 SWI_opening_up: "开放"
 SWI_opening_up_desc: "我们决定放弃中立政策。"
 SWI_neutral_foreign_policy: "中立外交政策"
 SWI_neutral_foreign_policy_desc: "我们决定保持中立。既然行之有效，为什么要改变呢？"
 switzerland.17.t: "选择我们的道路"
 switzerland.17.desc: "现在是时候做出决定了，我们是改变还是维持现状。无论改变还是维持现状，都会有好处。"
 switzerland.17.a: "我们必须向世界敞开大门！"
 switzerland.17.b: "为什么要改变行之有效的东西呢？"
 SWI_digitalisation: "数字化"
 SWI_digitalisation_desc: "为了保持在全球舞台上的竞争力，瑞士必须实现数字化转型。这将提高瑞士的生产力，因为文书工作可以通过数字化方式处理。"
 SWI_sustainability: "持续发展"
 SWI_sustainability_desc: "尽管经济增长势在必行，但可持续性必须是其背后的考量因素。否则，我们就无法从自然资源中获取利润。"
 SWI_microchip_research: "微芯片研究"
 SWI_microchip_research_desc: "瑞士精密工程一直是我们的名片。将我们的研究机构引向半导体设计，让我们在这个世界无法运转的行业中占有一席之地。"
 SWI_microchip_plant: "微芯片工厂"
 SWI_microchip_plant_desc: "研究工作已经完成，现在是时候破土动工了。一家国内制造厂将瑞士的设计转化为瑞士制造的硅芯片。"
 SWI_defending_swiss_independence: "捍卫瑞士独立"
 SWI_defending_swiss_independence_desc: "为了保持我们的中立性，我们必须保持我们的独立性。为此，我们必须首先抵制那些挥之不去、试图将我们束缚在其他方面的外国影响。"
 SWI_effort_to_better_relations: "努力改善关系"
 SWI_effort_to_better_relations_desc: "我们长期以来一直奉行中立政策。现在，我们必须改善与邻国的关系，因为我们长期以来忽视了这些关系。"
 SWI_swiss_mercenaries: "瑞士雇佣兵"
 SWI_swiss_mercenaries_desc: "我们必须建立自己的雇佣军。如果说有人懂得如何在山地作战，那非我们自己人莫属。我们必须利用这一点来牟利。"
 SWI_swiss_peacekeeping: "瑞士维和部队"
 SWI_swiss_peacekeeping_desc: "在这个动荡的世界里，联合国需要维和人员。瑞士必须做出回应。"
 SWI_enforcing_the_uns_will: "执行联合国的意志"
 SWI_enforcing_the_uns_will_desc: "瑞士特遣队从观察转向执行，以对伯尔尼负责的部队支持安理会的任务。"
 SWI_befriend_the_eu: "与欧盟为友"
 SWI_befriend_the_eu_desc: "现在我们必须做出选择：我们是想继续走完全中立的道路，还是想与欧盟交好？"
 SWI_nato: "北约？"
 SWI_nato_desc: "加入联邦将终结几个世纪以来的形式中立。联邦委员会必须决定，这种安全保障是否值得付出这样的代价。"
 SWI_expand_the_mercenaries: "扩大雇佣兵规模"
 SWI_expand_the_mercenaries_desc: "看来我们的雇佣兵正在为我们赢得世界声誉。让我们继续保持并扩大他们的规模！"
 SWI_foreign_investments: "外国投资"
 SWI_foreign_investments_desc: "我们必须利用与西方其他国家新建立的联盟关系。我们可以四处寻求投资，并给予相应的回报。"
 SWI_local_arms_production: "本地武器制造"
 SWI_local_arms_production_desc: "我们必须继续坚持中立路线，而军火交易可以被视为某种形式的结盟。正因如此，我们必须自主生产武器。"
 SWI_internal_investments: "内部投资"
 SWI_internal_investments_desc: "我们必须通过自掏腰包提升自己，进行内部投资。"
 SWI_integration_to_nato: "与北约一体化"
 SWI_integration_to_nato_desc: "既然我们已经加入北约，我们就必须开始将我们较老和较新的武器系统整合到北约标准中。"
 SWI_integration_to_nato_tt: "其他§Y北约国家§!对瑞士的关系值增加§G+25§!"
 SWI_alignment_to_NATO: "与北约结盟"
 SWI_alone_is_safer: "独自一人更安全"
 SWI_alone_is_safer_desc: "虽然我们已经向西方敞开了大门，但真正加入北约却是一次巨大的飞跃。在这方面，我们必须保持独立性。"
 SWI_expanded_trade: "贸易扩张"
 SWI_expanded_trade_desc: "我们必须扩大贸易，以获得欧盟的青睐，或许还能鼓起勇气在将来加入欧盟。"
 SWI_partner_like_everyone: "像所有人一样合作"
 SWI_partner_like_everyone_desc: "我们认为，加强与欧盟的贸易联系并无益处。因此，我们必须像对待其他国家一样，保持与欧盟关系的一致性。"
 SWI_bank_of_the_west: "西方银行"
 SWI_bank_of_the_west_desc: "我们拥有庞大的银行业，可以利用它为己所用。但是，我们必须主要向西方国家提供服务。"
 SWI_bank_of_the_world: "世界银行"
 SWI_bank_of_the_world_2: "世界银行"
 SWI_bank_of_the_world_3: "世界银行"
 SWI_bank_of_the_west_2: "西方银行"
 SWI_bank_of_the_west_3: "西方银行"
 SWI_idea_environmental_reforms: "环保改革"
 SWI_idea_environmental_reforms_desc: "综合环境法旨在减少排放、保护自然资源，并推动经济向可持续发展转型。"
 SWI_idea_eco_tourism: "生态旅游"
 SWI_idea_eco_tourism_desc: "推广环保旅游为农村地区带来新的活力，同时保护瑞士的原始风貌。"
 SWI_idea_national_parks: "国家公园"
 SWI_idea_national_parks_desc: "扩大保护区可以保护野生动物，并巩固瑞士作为全球环保领导者的形象。"
 SWI_idea_completely_green: "完全绿色！"
 SWI_idea_completely_green_desc: "通过不懈的改革和创新，瑞士实现了完全的生态可持续发展，成为一个完全依靠清洁能源的国家。"
 SWI_idea_christian_values: "基督教价值观"
 SWI_idea_christian_values_desc: "传统基督教原则指导社会政策，并加强瑞士社会的道德基础。"
 SWI_idea_fortress_switzerland: "瑞士堡垒"
 SWI_idea_fortress_switzerland_desc: "强大的防御工事和现代化的防御网络确保瑞士在任何冲突中都固若金汤。"
 SWI_idea_tax_code: "精简税法"
 SWI_idea_tax_code_desc: "简化的税收制度可以减少逃税行为，吸引投资，并促进经济平衡发展。"
 SWI_idea_fdp: "自由民主党(FDP)"
 SWI_idea_fdp_desc: "自民党是一个自由主义政党，主张自由市场、个人创业、经济自由和最小限度的国家干预。"
 SWI_idea_financial_deregulation: "金融放松管制"
 SWI_idea_financial_deregulation_desc: "减少银行和金融限制可以促进投资、增长和经济活力。"
 SWI_idea_sp: "社会民主党(SP)"
 SWI_idea_sp_desc: "社会民主党引导政治体制朝着更大的社会福利和国际合作方向发展。"
 SWI_idea_fdu: "联邦民主同盟(FDU)"
 SWI_idea_fdu_desc: "联邦民主联盟拥护保守的福音派基督教价值观和地方自治。"
 SWI_idea_svp: "瑞士人民党(SVP)"
 SWI_idea_svp_desc: "瑞士人民党主张严格的移民管制、财政保守主义和国家主权。"
 SWI_idea_defend_secrecy: "银行保密"
 SWI_idea_defend_secrecy_desc: "所有旨在废除私人银行保密制度的国际压力均遭到拒绝。客户保密仍然是法律规定的。"
 SWI_idea_swiss_mercenaries: "瑞士雇佣兵"
 SWI_idea_swiss_mercenaries_desc: "瑞士山地部队士兵组成的瑞士公司承接外国合同，复兴了一项比瑞士联邦本身还要古老的贸易。"
 SWI_idea_foreign_investments: "外国投资"
 SWI_idea_foreign_investments_desc: "瑞士与其西方伙伴之间的投资是双向的，将彼此的经济紧密联系在一起。"
 SWI_idea_bank_of_the_west: "西方银行"
 SWI_idea_bank_of_the_west_desc: "银行业转向西方，首先将金库和保密权提供给欧洲和美国。"
 SWI_idea_bastion_of_democracy: "民主堡垒"
 SWI_idea_bastion_of_democracy_desc: "中立从来都不是漠不关心。瑞士就是自治的典范，这一点它毫不含糊地表明了。"
 SWI_idea_national_investments: "国家投资"
 SWI_idea_national_investments_desc: "原本会流向国外的资金转向国内，投入瑞士的基础设施、瑞士的工业和瑞士的研究。"
 SWI_idea_defence_training_in_the_alps: "阿尔卑斯山国防训练"
 SWI_idea_defence_training_in_the_alps_desc: "每名新兵都要熟悉自己将要守卫的阵地。复训课程会训练民兵在他们被指派驻守的山谷中进行实战演练。"
 SWI_idea_european_defence: "欧洲防务"
 SWI_idea_european_defence_desc: "一个共同的欧洲防务框架正在形成，瑞士的工程技术和瑞士的中立性处于其核心地位，而不是边缘地位。"
 SWI_idea_last_man_standing: "战至一兵一卒"
 SWI_idea_last_man_standing_desc: "学说预设了最坏的情况：所有的道路都被切断，所有的盟友都已逝去。民兵接受的训练是无论如何都要继续战斗。"
