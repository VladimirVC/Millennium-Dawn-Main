 indonesia.76854.t: "Индонезия требует аннексии"
 indonesia.76854.d: "После оказания нам помощи после землетрясения индонезийское правительство просит нас объединить с ними силы. Если мы присоединимся к ним, мы потеряем все, за что боролись, но все это во имя мира. Если мы не присоединимся к ним, мы увидим, как конфликт разгорится вновь..."
 indonesia.76854.a: "Давайте сделаем это"
 indonesia.76854.b: "Нет"
 IND_disasters_mechanic: "Страшная удача Индонезии"
 IND_disasters_mechanic_desc: "Индонезии очень повезло, что у нее в изобилии имеются природные ресурсы, рабочая сила и сила воли, чтобы пробиться в 21 век.\nОднако, §HИндонезия сталкивается со многими проблемами§!, которые §RТормозят ее прогресс§!. Несчастные случаи являются §Rобщей темой§!, которую можно было бы легко предотвратить, если бы не более качественная помощь в определенном регионе.\n\nПо этой причине наш долг и обязанность — своевременно уделять больше внимания нашим штатам, чтобы избежать катастрофической судьбы, которая нанесла бы нам серьезный вред.\n\nКатастрофы будут продолжаться еще долгое время, однако если мы быстро с ними справимся, то через некоторое время они прекратятся!"
 IND_back_muslim: "Поддерживаем мусульман"
 IND_back_muslim_desc: "Мы исламская нация! Поэтому мы должны защищать наших мусульман любой ценой. Это принесет нам народную поддержку и искоренит любую ненависть к нам в исламском большинстве Сулавеси\n\n\n\nПереговоры бесценны и должны начинаться немедленно!"
 IND_muslim: "Переговоры с мусульманами на Сулавеси"
 IND_muslim2: "Дайте им надлежащую боевую подготовку"
 IND_muslim3: "Назначить местных администраторов"
 IND_muslim4: "Завершить переговоры"
 IND_muslim_generic: "Переброска ополченцев на Сулавеси"
 IND_muslim_generic2: "Переместить христианские строительные проекты"
 IND_muslim_generic3: "Укреплять мечети"
 IND_back_papua: "Поддержка христиан"
 IND_back_papua_desc: "Наши христиане слишком долго оставались без внимания. Наш долг как государства — обеспечить представительство и справедливое отношение ко всем нашим христианам, независимо от того, являются ли они меньшинством или нет. Они должны быть защищены всегда!\n\n\n\nПереговоры бесценны и должны начаться немедленно!"
 IND_papua: "Переговоры с христианами"
 IND_papua2: "Дать им большее представительство"
 IND_papua3: "Обучить их партизанской войне"
 IND_papua4: "Обещайте им лучший уход"
 IND_papua_generic: "Перевести ополченцев в Папуа"
 IND_papua_generic2: "Переместить исламские строительные проекты"
 IND_papua_generic3: "Укреплять церкви"
 IND_back_noone: "Никого не поддерживаю"
 IND_back_noone_desc: "Важно, чтобы государство не проявляло предвзятости в таких деликатных вопросах, как религиозные конфликты. Мы должны начать процесс ослабления этой напряженности как путем переговоров, так и путем милитаризации конфликтных точек.\n\nЭто принесет больше спокойствия на Сулавесиану и папуасам."
 IND_neutral: "Провести объединяющие митинги в различных штатах."
 IND_neutral2: "Средства на новое строительство в Сулавеси"
 IND_neutral3: "Финансирует папуасские церкви"
 IND_neutral4: "Обещать папуасам лучшее представительство"
 IND_neutral5: "Обещают Сулавеси лучшую заботу"
 IND_neutral_generic: "Программы призыва на военную службу для папуасов и жителей Сулавеси"
 IND_neutral_generic2: "Милитаризировать доки, используемые для контрабанды оружия"
 IND_neutral_generic3: "Милитаризировать \"горячие точки\", известные своими столкновениями"
