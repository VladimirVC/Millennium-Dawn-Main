 landmark_binnenhof: "El Binnenhof"
 landmark_binnenhof_desc: "El Binnenhof, centro histórico del gobierno holandés, ha sido un símbolo de democracia y liderazgo durante siglos. Como corazón de la vida política de los Países Bajos, continúa dando forma al futuro de la nación al tiempo que preserva su rica historia."
