 hire_extra_primary_sector_workers_tt: "§YZatrudnij dodatkowych pracowników sektora podstawowego§! w §Y[THIS.GetName]§!\n---------\nProdukcja zasobów w §Y[THIS.GetName]§! nie spełnia oczekiwań kraju co do wyników. Powinniśmy rozważyć zatrudnienie dodatkowych pracowników sektora podstawowego, którzy pomogliby w produkcji zasobów."
