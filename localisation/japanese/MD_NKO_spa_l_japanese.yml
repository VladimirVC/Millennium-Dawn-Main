l_japanese:
 NKO_spa_unlocked_tt: "§GUnlocks the §!§YSupreme People's Assembly§!§G mechanic.§!\nEvery 120 days the Assembly convenes; pick §Y2 of 8§! productivity mandates to suspend that domain's standing penalty and apply a 120-day buff. Each pick fires a §G3-event flavor chain§! and has a §G25%§! extra chance for a bonus event."
 NKO_spa_focus_lifts_industry_tt: "§G恒常的なペナルティ§!§Y「産業の停滞」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_production_tt: "§G恒常的なペナルティ§!§Y「生産ラインの衰退」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_military_tt: "§G恒常的なペナルティ§!§Y「形骸化した軍隊」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_economy_tt: "§G恒常的なペナルティ§!§Y「資源の囲い込み」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_research_tt: "§G恒常的なペナルティ§!§Y「研究の停滞」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_agriculture_tt: "§G恒常的なペナルティ§!§Y「自給自足農業」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_foreign_tt: "§G恒常的なペナルティ§!§Y「外交的孤立」§!§Gを永続的に除去する。§!"
 NKO_spa_focus_lifts_construction_tt: "§G恒常的なペナルティ§!§Y「外交的孤立」§!§G（防衛インフラ）を永続的に除去する。§!"
 NKO_spa_bonus_chance_tt: "§GFires a 3-event flavor chain. §!§Y25%§!§G chance for an additional bonus event with extra rewards.§!"
 NKO_spa_domain_unlocked_tt: "§GThis domain's bonus is not currently active.§!"
 NKO_spa_picks_remaining_tt: "§GAt least one mandate pick is still available this session.§!"
 NKO_spa_umbrella: "最高人民会議"
 NKO_spa_umbrella_desc: "The Supreme People's Assembly convenes every four months to pass two productivity mandates. Each mandate suspends one of the eight chronic dysfunctions of central planning for §Y120 days§! and applies a productivity bonus on top. Standing penalties can be permanently removed by completing matched focuses."
 NKO_spa_debuff_industry: "産業の停滞"
 NKO_spa_debuff_industry_desc: "数十年にわたる中央集権的な資源配分により、工場は原材料と熟練労働者の不足に喘いでいる。建設工事は遅々として進んでいない。"
 NKO_spa_debuff_production: "生産ラインの衰退"
 NKO_spa_debuff_production_desc: "工作機械は摩耗し、供給網は場当たり的で、品質管理はその日の職長の気分次第という有様だ。"
 NKO_spa_debuff_military: "形骸化した軍隊"
 NKO_spa_debuff_military_desc: "書類上、朝鮮人民軍は数百万の兵力を誇る。しかし実際には、訓練は見せかけに過ぎず、士気は脆い。"
 NKO_spa_debuff_economy: "資源の囲い込み"
 NKO_spa_debuff_economy_desc: "地方幹部たちは管轄区域に流れる資源を掠め取っている。中央で割り当てられた資源は、遅れて届くか、量が不足しているか、あるいは全く届かない。"
 NKO_spa_debuff_research: "研究の停滞"
 NKO_spa_debuff_research_desc: "制裁、頭脳流出、そして貧弱な研究設備により、基本的な技術でさえ朝鮮民主主義人民共和国では他国の2倍の時間を要する。"
 NKO_spa_debuff_agriculture: "自給自足農業"
 NKO_spa_debuff_agriculture_desc: "協同農場は自らの村を養うのが精一杯の生産量しか上げていない。都市部では食糧が不足している。"
 NKO_spa_debuff_foreign: "外交的孤立"
 NKO_spa_debuff_foreign_desc: "制裁や国際社会からの孤立状態により、あらゆる外交交渉は本来あるべき以上のコストを要し、期待される成果も得られにくくなっている。"
 NKO_spa_debuff_construction: "建設のボトルネック"
 NKO_spa_debuff_construction_desc: "防御工学は最も深刻な影響を受けている分野だ。要塞は完成前に崩れ、レーダーマストは配線しか終わらないまま設置され、海軍基地は浚渫が中途半端なまま放置され、飛行場は手入れが行き届かず穴だらけになっている。"
 NKO_spa_bonus_industry: "産業加速化"
 NKO_spa_bonus_industry_desc: "最高人民会議は拘束力のある産業指令を発令した。民需工場が急速に建設され、軍事施設がそれに続く。"
 NKO_spa_bonus_production: "装備生産指令"
 NKO_spa_bonus_production_desc: "生産ラインは計画的な過負荷サイクルで稼働する。効率上限が引き上げられ、新装備の増産が加速する。"
 NKO_spa_bonus_military: "先軍決議"
 NKO_spa_bonus_military_desc: "先軍の季節が到来した。訓練予定は厳格化され、攻撃ドクトリンは洗練され、党はその優先順位を再確認する。"
 NKO_spa_bonus_economy: "主体自力更生"
 NKO_spa_bonus_economy_desc: "自力更生への取り組みにより、土壌と鉱山からあらゆる資源が絞り出される。地域資源の供給が円滑化する。"
 NKO_spa_bonus_research: "研究推進"
 NKO_spa_bonus_research_desc: "すべての研究所が残業し、機密研究室は24時間体制で稼働する。かつて800日を要した技術も、今やその3分の1の時間で完了するようになった。"
 NKO_spa_bonus_research_half: "研究推進（収益漸減）"
 NKO_spa_bonus_research_half_desc: "研究所は依然として残業を続けているが、容易に得られる成果は枯渇した。1995年世代の技術を既に手にした今、さらなる突破口を開くにはより多くの労力を費やす必要があり、その見返りは少なくなる――つまり、ボーナスは半減する。"
 NKO_spa_bonus_research_quarter: "研究推進（最先端の停滞）"
 NKO_spa_bonus_research_quarter_desc: "朝鮮の研究所は今や技術の最前線に達した。2005年世代の技術を既に習得した今、力押しの残業ではわずかな加速しか得られない――ボーナスは元の値の4分の1に減少している。"
 NKO_spa_bonus_agriculture: "農業推進"
 NKO_spa_bonus_agriculture_desc: "協同農場はノルマ以上の成果を上げている。民間部門の物資不足が緩和され、工場の生産量もわずかに増加する。"
 NKO_spa_bonus_foreign: "外交政策指針"
 NKO_spa_bonus_foreign_desc: "外務省の特使たちが各地に派遣される。関係改善のコストが下がり、貿易相手国は我々に対して少しばかり好意的になる。"
 NKO_spa_bonus_construction: "建設大隊"
 NKO_spa_bonus_construction_desc: "大規模に動員された工兵旅団があらゆる防衛拠点に投入される。要塞、レーダー、短距離防空基地、飛行場、海軍基地、燃料貯蔵庫ロ、鉄道、補給ハブのすべてが、かつてない速さで建設される。"
 NKO_spa_resolution_industry: "産業加速化"
 NKO_spa_resolution_industry_desc: "§R産業の停滞§!を§Y120日間§!停止させる。有効期間中: 民需工場建設速度§G+45%§!、軍需工場建設速度§G+30%§!、民需工場出力§G+10%§!、生産効率開始値§G+15%§!。\n\n3段階のフレーバーイベント連鎖（五ヶ年計画 / スタハノフ的英雄 /産業記録）が発生する。"
 NKO_spa_resolution_production: "装備生産指令"
 NKO_spa_resolution_production_desc: "§R生産ラインの衰退§!を§Y120日間§!停止させる。有効期間中: 生産効率上限§G+30%§!、効率成長§G+15%§!、効率開始値§G+20%§!。\n\n3段階のフレーバーイベント連鎖（新たな工作機械 / 活気づく生産ライン / 品質管理の勝利）が発生する。"
 NKO_spa_resolution_military: "先軍決議"
 NKO_spa_resolution_military_desc: "§R形骸化した軍隊§!を§Y120日間§!停止させる。有効期間中: 陸軍攻撃§G+15%§!、師団訓練速度§G+30%§!、陸軍士気§G+10%§! 、陸軍指揮統制率§G+5%§!。\n\n3段階のフレーバーイベント連鎖（訓練の激化 / 優秀な将校団 / 先軍の勝利）が発生する。"
 NKO_spa_resolution_economy: "主体自力更生"
 NKO_spa_resolution_economy_desc: "§R資源の囲い込み§!を§Y120日間§!停止させる。有効期間中: 現地の資源§G+50%§!、生産資源コスト§G-15%§!、月毎の人口§G+5%§!。\n\n3段階のフレーバーイベント連鎖（鉱物調査 / 採掘出力の上昇 / 自力更生の達成）が発生する。"
 NKO_spa_resolution_research: "研究推進"
 NKO_spa_resolution_research_desc: "§R研究の停滞§!を§Y120日間§!停止させる。有効期間中: 研究速度§G+200%§!――800日以上を要した技術も極めて短期間で完了する。\n\n3段階のフレーバーイベント連鎖（開かれる研究所の扉 / 急造プログラム / 追い上げ）が発生する。\n\n§R特別コスト§!: これは最も高価な指令であり、制裁を打破し頭脳流出を食い止めるために必要な資源を反映している。"
 NKO_spa_resolution_agriculture: "農業推進"
 NKO_spa_resolution_agriculture_desc: "§R自給自足農業§!を§Y120日間§!停止させる。有効期間中: 消費財§G-30%§!、民需工場出力§G+15%§!、月毎の人口§G+10%§!。\n\n3段階のフレーバーイベント連鎖（春の種まき / 夏の手入れ / 豊作）が発生する。"
 NKO_spa_resolution_foreign: "外交政策指針"
 NKO_spa_resolution_foreign_desc: "§R外交的孤立§!を§Y120日間§!停止させる。有効期間中: 関係改善コスト§GG-75%§!、貿易評価§G+30%§!、月間評価上昇量§G+25%§!。\n\n3段階のフレーバーイベント連鎖（外交的打診 / 秘密の裏ルート / 貿易譲歩）が発生する。"
 NKO_spa_resolution_construction: "建設大隊"
 NKO_spa_resolution_construction_desc: "§R建設のボトルネック§!を§Y120日間§!停止させる。防御・戦略インフラの急増: 要塞・沿岸要塞・レーダー・対空施設の建設速度§G+60%§!、航空基地・海軍基地・燃料貯蔵庫の建設速度§G+55%§!、鉄道・補給ハブの建設速度§G+50%§!。\n\n3段階のフレーバーイベント連鎖（前衛隊の動員 / 共和国全土の建設現場 / プロジェクト完了）が発生する。"
 NKO_spa.0.t: "最高人民会議の招集"
 NKO_spa.0.d: "総書記同志、内閣閣僚らが議題を用意いたしました。最高人民会議は招集されました。8つの慢性的課題が対処を求めています。今会期では、そのうち§Y任意の2つ§!に対して拘束力のある指令を発令することができます。\n\n§Y120日間§!、選択された分野は党が意図した通りに機能するでしょう。"
 NKO_spa.0.a: "会期を開始せよ"
 NKO_spa.1.t: "新会期の開幕"
 NKO_spa.1.d: "4ヶ月が経過しました。最高人民会議が再招集されます。内閣は前回と同じ8つの決議案を提出しました。可決すべきものを2つ選択してください。"
 NKO_spa.1.a: "議場を開会せよ"
 NKO_spa.5.t: "不在時の内閣代行"
 NKO_spa.5.d: "会期が何の行動も取られないまま終了しようとしていました。内閣は党の生産的義務を引き合いに出し、あなたの代理として、最も安価で実行可能な決議を可決しました。"
 NKO_spa.5.a: "内閣の主導権を認める"
 NKO_spa.6.t: "会議の中断"
 NKO_spa.6.d: "市民の混乱により、最高人民会議は機能不全に陥りました。秩序が回復されるまで、すべての現行指令は無効化されます。"
 NKO_spa.6.a: "承知した"
 NKO_spa.10.t: "会議サイクル"
 NKO_spa.10.d: "内部処理用イベント。"
 NKO_spa.10.a: "了解"
 NKO_spa.20.t: "スタハノフ的英雄"
 NKO_spa.20.d: "黄海工業地帯の労働者たちは、新指令が発令されてからわずか数週間でノルマを大幅に上回った。彼らの肖像画はすでに全国各地に掲げられており、管理者たちは直ちに活用可能な生産能力の急増を報告している。"
 NKO_spa.20.a: "英雄たちに報いる"
 NKO_spa.21.t: "工作機械の革新"
 NKO_spa.21.d: "平壌重機械工場の技術者たちは、装甲車両生産ラインの処理能力を倍増させる新たな治具技術を考案した。戦車、歩兵戦闘車、装甲兵員輸送車、偵察車、自走砲のうち、その週に稼働していたラインから、最新のシャーシ75両が緊急増産される。"
 NKO_spa.21.a: "この技術を普及させる"
 NKO_spa.22.t: "共和国の英雄"
 NKO_spa.22.d: "先軍訓練における若手将校の模範的なリーダーシップが参謀本部の目に留まった。その手本に触発され、予備役たちが徴募事務所に殺到している。"
 NKO_spa.22.a: "昇進させ、勲章を授与せよ"
 NKO_spa.23.t: "新鉱脈の発見"
 NKO_spa.23.d: "北部の山岳地帯に展開した調査チームが、これまで知られていなかった鉱脈を発見した。初期分析により、その堆積物から得られる戦略資源が決定される。国家資源局は即時の採掘を許可した。"
 NKO_spa.23.a: "採掘を開始せよ"
 NKO_spa.24.t: "外国人科学者の亡命"
 NKO_spa.24.d: "国外に住む技術者が制裁の監視をかいくぐり、朝鮮民主主義人民共和国の研究センターへと潜り込んだ。彼らの知見は、国家科学院の重点計画の1つを加速させている。"
 NKO_spa.24.a: "同志を歓迎する"
 NKO_spa.25.t: "豊作"
 NKO_spa.25.d: "咸鏡北道の協同農場から、ノルマを大幅に上回る収穫が報告されている。穀物備蓄は増え続け、地方の徴兵事務所には軍での職を求める若い農村労働者たちで溢れかえっている。"
 NKO_spa.25.a: "余剰分を分配せよ"
 NKO_spa.26.t: "外交的勝利"
 NKO_spa.26.d: "外務省の特使たちが、新指針を巧みに利用して密かな外交的勝利を収めた。主要な協力国から裏ルートでの譲歩を引き出し、それを外貨へと変換することに成功した。"
 NKO_spa.26.a: "利益を確保せよ"
 NKO_spa.27.t: "建設前衛隊"
 NKO_spa.27.d: "志願建設大隊があらゆる予測を上回る成果を上げた。余剰の建設能力が生じたため、内閣は最も予定が遅れている民間プロジェクトへの投入を提案している。労働力が不要であれば、代わりに労働力を売却して外貨を得ることも可能だ。"
 NKO_spa.27.factory_take: "民需工場を建設する"
 NKO_spa.27.factory_cash: "労働力を清算する（国庫§Y+0.5§!）"
 NKO_spa.27.offices_take: "オフィスビルを建設する"
 NKO_spa.27.offices_cash: "労働力を清算する（国庫§Y+0.75§!）"
 NKO_spa.27.refinery_take: "合成精製所を建設する"
 NKO_spa.27.refinery_cash: "労働力を清算する（国庫§Y+0.45§!）"
 NKO_spa.27.agri_take: "農業地域を建設する"
 NKO_spa.27.agri_cash: "労働力を清算する（国庫§Y+0.45§!）"
 NKO_spa.30.t: "五ヶ年計画の開始"
 NKO_spa.30.d: "あらゆる工場の門に旗が掲げられている。最高人民会議は、今後120日間を縮小版五ヶ年計画とし、各工業地帯に具体的な生産ノルマを課すことを決定した。"
 NKO_spa.30.a: "計画を実行に移せ"
 NKO_spa.31.t: "予定より早いノルマ達成"
 NKO_spa.31.d: "指令期間の半分が経過したところで、大同江沿いの工場群から計画を大幅に上回るコンクリート打設と出鋼が報告されている。労働者旅団が栄誉を競い合っている。"
 NKO_spa.31.a: "先頭を行く旅団を表彰せよ"
 NKO_spa.32.t: "産業記録の樹立"
 NKO_spa.32.d: "指令の終了に合わせ、金日成広場で勝利の集会が開かれた。共和国の生産能力に新たな産業枠が加わり、党の威信は高まった。"
 NKO_spa.32.a: "成果を祝う"
 NKO_spa.33.t: "新たな工作機械の到着"
 NKO_spa.33.d: "グレーマーケットのルートを通じて、交換用の工作機械が装備工場に届いた。生産現場の責任者たちは、新たな仕様に合わせて作業員への再教育を行っている。"
 NKO_spa.33.a: "新しい工作機械を導入せよ"
 NKO_spa.34.t: "活気づく生産ライン"
 NKO_spa.34.d: "平壌と咸興の装備生産地帯における出力は、ここ10年で最も円滑な状態にある。不良率は低下し、仕上げの品質は向上している。"
 NKO_spa.34.a: "さらなる改良を促進せよ"
 NKO_spa.35.t: "品質管理の勝利"
 NKO_spa.35.d: "装備生産指令は国家検査をもって終了し、品質基準は記憶にある限りで最高水準に達した。朝鮮人民軍の調達将校たちは満足している。"
 NKO_spa.35.a: "新しい基準を文書化せよ"
 NKO_spa.36.t: "訓練の激化"
 NKO_spa.36.d: "先軍の季節が到来した。全部隊において訓練のペースが倍増した。数年間中断されていた実弾演習も再開されている。"
 NKO_spa.36.a: "部隊をさらに厳しく鍛え上げよ"
 NKO_spa.37.t: "優秀な将校団"
 NKO_spa.37.d: "激化する訓練体制の下で、新世代の中隊・大隊級将校たちが頭角を現した。昇進の波が指揮系統を駆け上がっている。"
 NKO_spa.37.a: "報奨を与え、昇進させよ"
 NKO_spa.38.t: "先軍の勝利"
 NKO_spa.38.d: "先軍決議は、平壌で行われ大勝利パレードをもって幕を閉じた。予備役の動員により軍は十分に補充され、朝鮮人民軍はここ数年で最強の状態に達した。"
 NKO_spa.38.a: "隊列を組んで行進せよ"
 NKO_spa.39.t: "鉱物調査の開始"
 NKO_spa.39.d: "地質調査チームが北部の山岳地帯に散って調査を開始した。旧ソ連時代の古い図面が引っ張り出され、最新の機器を用いて更新されている。"
 NKO_spa.39.a: "調査を承認する"
 NKO_spa.40.t: "採掘出力の上昇"
 NKO_spa.40.d: "新たな調査により、採掘員たちはより品位の高い鉱脈へと導かれた。石炭、マグネサイト、レアアースの出力はいずれも急増している。"
 NKO_spa.40.a: "好機を最大限に活用せよ"
 NKO_spa.41.t: "自力更生の達成"
 NKO_spa.41.d: "主体自力更生指令は、輸出売上による外貨準備の補充をもって終了する。総書記同志、共和国は堂々と立ち上がっております。"
 NKO_spa.41.a: "準備金を蓄えよ"
 NKO_spa.42.t: "開かれる研究所の扉"
 NKO_spa.42.d: "国家科学院に招集がかかった。すべての優先プログラムへのロックが解除され、あらゆる機密ファイルへのアクセスが可能となった。何年も許可を待ち続けていた研究者たちが、一夜にして内容を閲覧できるようになった"
 NKO_spa.42.a: "優先事項を承認する"
 NKO_spa.43.t: "急造プログラムの結実"
 NKO_spa.43.d: "国家科学院全体で長らく停滞していた複数のプログラムが、次々と突破口を開いた。参謀本部は、今回進展のあった分野について報告を受ける。"
 NKO_spa.43.a: "参謀本部に報告せよ"
 NKO_spa.44.t: "追い上げ"
 NKO_spa.44.d: "研究推進の取り組みが終了し、北朝鮮は1970年代以降のどの時点よりも技術の最先端に近づいた。党はこの密かな勝利を祝っている。"
 NKO_spa.44.a: "新たな優位性をさらに押し進めよ"
 NKO_spa.45.t: "春の種まきの開始"
 NKO_spa.45.d: "全国の協同農場が積極的な作付けシーズンに向けて動員された。都市部からの志願旅団が農村の労働力を補強している。"
 NKO_spa.45.a: "旅団を動員せよ"
 NKO_spa.46.t: "夏の手入れ"
 NKO_spa.46.d: "シーズン半ばの検査によると、耕地の状態はここ数年で最高である。漑路は流れ、中国からは農薬の在庫が到着した"
 NKO_spa.46.a: "努力を継続せよ"
 NKO_spa.47.t: "豊作"
 NKO_spa.47.d: "収穫量は計画を20％上回った。穀物備蓄は膨らみ、数年ぶりに一部の地区で完全な配給が行われることになる。"
 NKO_spa.47.a: "余剰分を分配せよ"
 NKO_spa.48.t: "外交的打診"
 NKO_spa.48.d: "北朝鮮の代表団が、北京、モスクワ、テヘラン、ダマスカスといった友好国な首都に密かに派遣された——有利な条件と慎重な要請を携えて。"
 NKO_spa.48.a: "特使を派遣せよ"
 NKO_spa.49.t: "秘密の裏ルート"
 NKO_spa.49.d: "いくつかの代表団が水面下での合意を携えて帰国した。ダミー会社を通じた合弁事業、インフラ融資、そして同情的な外国パートナーからの密かな出資などである。制裁の執行は通常よりも少し緩やかになっている。"
 NKO_spa.49.a: "成果を受け取る"
 NKO_spa.50.t: "貿易譲歩"
 NKO_spa.50.d: "外交政策指針は、外資の流入を大幅に改善する一連の新たな取り決めをもって終了する。今後10年間の投資約束が締結された。"
 NKO_spa.50.a: "合意書に署名する"
 NKO_spa.51.t: "建設前衛隊の動員"
 NKO_spa.51.d: "建設大隊指令は、内閣が功績を認める内部派閥にとって思わぬ利益となる。党は、他の派閥よりも協力を必要としている派閥に対して、この政治的利益を振り向けることができる。"
 NKO_spa.51.military: "§Y軍部§!に功績を認める（評価§G+15§!）"
 NKO_spa.51.cadres: "§Y共産党幹部§!に功績を認める（評価§G+15§!）"
 NKO_spa.51.donju: "§Yトンジュ§!に功績を認める（評価§G+15§!）"
 NKO_spa.51.farmers: "§Y農家§!に功績を認める（評価§G+15§!）"
 NKO_spa.51.labour: "§Y労働組合§!に功績を認める（評価§G+15§!）"
 NKO_spa.51.none: "政治的功績を独占する（§G政治力+25§!）"
 NKO_spa.52.t: "Sites Across the Republic"
 NKO_spa.52.d: "Construction is underway in every province. Roads are graded, rail spurs welded, power lines re-strung — the kind of unglamorous infrastructure work that compounds for decades."
 NKO_spa.52.a: "Press the schedule."
 NKO_spa.53.t: "Projects Complete"
 NKO_spa.53.d: "The Construction Battalion Mandate closes with ribbon-cutting ceremonies broadcast across the Republic. The Party reaps the political dividend; the population is steadier; the treasury sees a small windfall from project surpluses."
 NKO_spa.53.a: "Cut the ribbons."
