l_simp_chinese:
 CHI_NKO_bilateral_cooperation: "中朝友好条约"
 CHI_NKO_bilateral_cooperation_desc: "1961年中华人民共和国和朝鲜民主主义人民共和国签署的《友好合作互助条约》至今仍是两国唯一共同签署的防御条约。重申条约承诺将重振北京和平壤双方一度冷淡的关系，并为在经济、军事和政治领域开展结构性合作打开大门。"
 CHI_NKO_border_trade_zones: "黄金坪经济区"
 CHI_NKO_border_trade_zones_desc: "黄金坪岛位于鸭绿江上，介于新义州和丹东之间。该岛于2011年被共同划定为经济特区，但由于政治摩擦而停滞不前。恢复中国对黄金坪岛的投资，将使鸭绿江走廊重新成为双边贸易的支柱。"
 CHI_NKO_rason_sez: "罗津-先锋自由贸易港"
 CHI_NKO_rason_sez_desc: "由罗津港和先锋港合并而成的罗先经济特区，为中国提供了难得的太平洋不冻港通道。中国投资在罗津港建设了3号集装箱码头，发展了轻工业，并修建了连接特区与图们港和珲春中印边境的公路和铁路。"
 CHI_NKO_dandong_trade_hub: "新义州-丹东商业走廊"
 CHI_NKO_dandong_trade_hub_desc: "丹东处理着中朝边境70%以上的货物。扩建丹东海关和仓储基础设施，以及简化友谊桥的通关流程，巩固了丹东作为中朝双边关系不可或缺的商业支柱的地位。"
 CHI_NKO_mineral_extraction: "茂山铁矿特许权"
 CHI_NKO_mineral_extraction_desc: "位于咸镜北道的茂山露天铁矿是亚洲最大的铁矿床之一。包括中信集团和通化钢铁公司在内的多家中国企业已签署开采协议，以资金和基础设施换取开采权。这些开采权涵盖咸镜南道的菱镁矿和安州盆地的无烟煤。"
 CHI_NKO_fisheries_agreement: "西朝鲜海上捕鱼协议"
 CHI_NKO_fisheries_agreement_desc: "朝鲜向中国船队出售西朝鲜海的年度捕鱼许可证，这些船队在朝鲜渔民曾经赖以生存的海域作业。将此举正式化为双边协议，既能为平壤带来可预测的许可证收入，又能为中国渔业公司提供法律掩护，使其开展的作业活动免受首尔和东京的多次抗议。"
 CHI_NKO_yuan_settlement: "高丽商业银行协议"
 CHI_NKO_yuan_settlement_desc: "高丽商业银行和中国银行丹东分行长期以来一直处理着双边贸易的非正式资金流动。建立正式的人民币清算安排可以消除朝鲜贸易商面临的美元风险，从而避免其遭受二级制裁，并使朝鲜经济更深入地融入中国的金融体系。"
 CHI_NKO_labor_export: "东北劳务派遣计划"
 CHI_NKO_labor_export_desc: "朝鲜国家组织的劳务派遣计划将数万名朝鲜工人派往辽宁、吉林和黑龙江各地的工厂、建筑工地和餐馆。这些工人通过政府机构招募，并根据合同被派遣，合同规定大部分工资直接汇往平壤，这使得东北劳务派遣计划成为朝鲜政权获取硬通货的主要来源。"
 CHI_NKO_yalu_river_bridge: "新义州-丹东第二桥梁"
 CHI_NKO_yalu_river_bridge_desc: "新鸭绿江大桥是一座四车道大桥，由中国出资于2014年竣工，将丹东滨江开发区直接连接到新义州郊区。尽管朝鲜一侧多年来没有连接道路，但该过境点的开放改变了边境最关键走廊的货运能力。"
 CHI_NKO_energy_cooperation: "中石油丹东输油管道"
 CHI_NKO_energy_cooperation_desc: "中国石油天然气集团公司运营着唯一一条通往朝鲜的输油管道，该管道从丹东延伸至新义州附近的烽火化工综合体。中国几乎通过这条单一的输油管道向朝鲜供应全部原油，这使得北京对朝鲜经济拥有了一种无形的影响力。扩大输油管道的输送能力并增加辽宁的电力出口，巩固了朝鲜的工业基础。"
 CHI_NKO_telecom_network: "高丽电信3G网络部署"
 CHI_NKO_telecom_network_desc: "朝鲜的移动网络高丽电信由埃及欧瑞斯克姆集团投资建设，但其设备供应链严重依赖中国供应商。华为和中兴等中国供应商的加入，使得3G网络覆盖范围从平壤扩展到其他省会城市，而跨境光纤链路则为朝鲜政府提供了一个可控但功能完善的宽带骨干网。"
 CHI_NKO_power_grid_link: "水丰水电站并网"
 CHI_NKO_power_grid_link_desc: "位于鸭绿江上的水丰水电站建于上世纪40年代，自建成以来一直为辽宁和朝鲜两国供电。修复共享的输电基础设施并正式签署电网互联协议，能够稳定平壤和朝鲜北部工业区的电力供应，从而使工厂产量得以恢复。"
 CHI_NKO_paektu_tourism: "白头山-长白山走廊"
 CHI_NKO_paektu_tourism_desc: "白头山是一座横跨两江道和吉林省的火山，既是金氏王朝建国神话的圣地，也是中国游客前往长白山旅游的重要目的地。在边境两侧发展综合旅游基础设施，既能吸引中国游客的消费，又能为平壤精心打造一扇通往外部世界的窗口。"
 CHI_NKO_defense_consultations: "解放军-朝鲜人民军总参谋部会谈"
 CHI_NKO_defense_consultations_desc: "解放军总参谋部与朝鲜人民军总政治局之间的正式沟通渠道自朝鲜战争以来就已存在，但经常中断。重新建立副参谋长级别的定期磋商机制，能够为共享威胁评估、协调应对美韩联合军演以及防止边境局势误判提供一个结构化的平台。"
 CHI_NKO_military_exchanges: "国防大学交流项目"
 CHI_NKO_military_exchanges_desc: "位于北京的中国人民解放军国防大学接收朝鲜军官参加高级指挥培训课程，作为回报，中国武官可以更方便地使用朝鲜人民军的训练设施。该项目旨在培养一代熟悉解放军理论和装备的朝鲜指挥官，加深双方的互操作性，并建立起超越任何单一政治协议的长期人脉网络。"
 CHI_NKO_joint_naval_patrols: "黄海海上巡逻队"
 CHI_NKO_joint_naval_patrols_desc: "中国人民解放军海军北海舰队与朝鲜人民军海军司令部协调在黄海的巡逻计划，以应对非法转运、第三方船队非法捕鱼以及美国航母战斗群的监视等问题。双边海上通信热线降低了海上事件的风险，并确立了中国作为朝鲜事实上的海上担保人的地位。"
 CHI_NKO_air_defense_umbrella: "东北亚防空网"
 CHI_NKO_air_defense_umbrella_desc: "解放军空军在辽宁和吉林的雷达站已对朝鲜半岛进行监视。将这些雷达站的预警信息与朝鲜人民军空军指挥中心连接起来，共享超视距探测数据，可以让朝鲜在面对美国或韩国的空袭时获得有效的预警时间，而无需平壤自行发展相关基础设施。"
 CHI_NKO_arms_transfers: "朝鲜矿业开发贸易公司供应合同"
 CHI_NKO_arms_transfers_desc: "朝鲜矿业开发贸易公司是朝鲜的主要武器采购机构，历来负责促成中国国有国防企业向朝鲜的技术转让。正式签订火炮部件、装甲车辆零件和弹药的供应合同，既能弥补朝鲜人民军战备的关键缺口，又能为中国国防企业提供一个低调的出口客户。"
 CHI_NKO_buffer_state_doctrine: "唇齿相依学说"
 CHI_NKO_buffer_state_doctrine_desc: "“唇齿相依”这一说法自朝鲜战争以来便被用来形容中朝关系。将其正式写入战略理论，意味着两国都无法接受对方的崩溃或倒戈。对北京而言，朝鲜的缓冲区阻止了美韩军队抵达鸭绿江。对平壤而言，中国的战略支持仍然是其政权生存的最终保障。"
 CHI_NKO_party_to_party_dialogue: "中国共产党与朝鲜劳动党达成协议"
 CHI_NKO_party_to_party_dialogue_desc: "中国共产党与朝鲜劳动党的关系早于两国建国，历史上一直通过党内渠道而非外交途径进行。恢复中央联络机制使北京能够直接与朝鲜劳动党政治局沟通，绕过国家间的正式程序，并允许在不公开记录的情况下进行敏感讨论。"
 CHI_NKO_cultural_exchanges: "万寿台艺术团交流"
 CHI_NKO_cultural_exchanges_desc: "万寿台艺术工作室及其演出团体代表了朝鲜革命文化的最高体现。在中国电影和歌剧代表团访问平壤期间，朝鲜派遣万寿台艺术工作室的演出团体赴北京和上海演出，旨在营造兄弟般团结的公共形象，并为朝鲜政权提供中国观众庆祝朝鲜成就的宣传影像。"
 CHI_NKO_un_coordination: "联合国安理会否决盾协议"
 CHI_NKO_un_coordination_desc: "中国作为联合国安理会常任理事国，屡次被用来削弱或阻止针对朝鲜的决议。通过正式确立中朝外交官在联合国的协调机制，可以确保北京的否决权得到战略性运用，既能保护平壤免受最严厉的制裁，又能维持建设性接触的表象。"
 CHI_NKO_un_coordination_tt: "§Y[CHI.GetNameWithFlag]§!将否决所有针对§Y[NKO.GetNameWithFlag]§!的联合国动议"
 CHI_NKO_sanctions_circumvention: "朝光贸易公司网络"
 CHI_NKO_sanctions_circumvention_desc: "朝光贸易公司及其在丹东、沈阳和香港注册的关联空壳公司网络，负责运输受制裁货物、处理违禁金融交易，并协助朝鲜进行船对船原油转运，从而维持其燃料供应。中国对这一基础设施的容忍度不断加深，为平壤提供了一条不可或缺的生命线，但代价是使中国实体面临美国的二级制裁。"
 CHI_NKO_strategic_partnership: "战略合作伙伴关系"
 CHI_NKO_strategic_partnership_desc: "将双边关系提升至全面战略合作伙伴关系 - 中国外交关系最高级别 - 使朝鲜与俄罗斯和巴基斯坦并列，成为中国战略联盟的核心成员。该宣言承诺双方就所有重大国际问题进行磋商，并向华盛顿、首尔和东京发出信号：北京认为朝鲜的安全与自身安全密不可分。"
 CHI_nko_juche_production: "大规模储备生产"
 CHI_nko_juche_production_desc: "通过东北劳务派遣计划派遣的朝鲜工人带来了一种独特的产业纪律，这种纪律源于数十年来主体思想的自力更生理念：能够在最低成本下，以简单、成熟的设计实现高产量生产。将这批劳动力整合到北方工业公司丹东地区的转包网络中，可以降低单位成本，并扩大该局步兵装备生产线的产能。"
 NKO_chi_manufacturing_assistance: "中国制造标准"
 NKO_chi_manufacturing_assistance_desc: "中国国有国防企业，主要是北方工业公司旗下通过韩国矿业开发贸易公司运营的子公司，向韩国第一兵工厂提供了技术援助，将标准化的生产公差、质量控制程序和零部件规格转移到了该兵工厂。这使得第一兵工厂的小型武器和班组武器生产线上的废品率降低，弹道性能更加稳定，单位成本也得以降低。"
 CHI_NKO_border_trade_idea: "黄金坪贸易区"
 CHI_NKO_energy_supply_idea: "中石油燃料供应协议"
 CHI_NKO_telecom_idea: "高丽电信基础设施计划"
 CHI_NKO_telecom_idea_desc: "一家合资企业正在扩展高丽电信的移动和数据基础设施，将朝鲜电信与中国网络连接起来，并改善跨境通信。"
 CHI_NKO_shared_modifier: "[CHI.GetAdjectiveCap]-[NKO.GetAdjectiveCap]关系"
 CHI_NKO_shared_modifier_desc: "追踪中朝两国在经济、军事和政治领域合作的深度积累。更紧密的联系能够提升农业和工业产量、贸易关系、工厂效率和资源出口，同时增强军队的规划、组织和防空能力；更深入的合作还能扩大情报能力，并随着两国更紧密的协调，提升政治实力和战争支持。"
 CHI_eternal_allies: "主体思想共产主义联盟"
 CHI_NKO_telecom_network_tt: "[CHI_NKO_telecom_idea_desc]\n"