 form_ANTCONF_category: "Антильская Конфедерация"
 form_ANTCONF_category_desc: "Антильская конфедерация — предполагаемое государство в Карибском бассейне, объединяющее [CUB.GetNameWithFlag], [DOM.GetNameWithFlag], и [HAI.GetNameWithFlag]. Изначально эта идея принадлежала Рамону Эметерио Бетансу, активисту движения за независимость Пуэрто-Рико, который хотел объединить все испаноязычные страны Карибского бассейна в единое государство. Изначально идея не включала [HAI.GetNameWithFlag], однако сторонники этой идеи быстро включили её в список. Идея практически исчезла из-за испано-американской войны, в результате которой колонии [CUB.GetNameWithFlag] и [PTR.GetNameWithFlag] перешли к Соединённым Штатам. Эта идея могла бы привести к созданию государства, столицей которого, скорее всего, стал бы Санто-Доминго, а официальным языком — испанский."
 ANTCONF_integrate_start: "Begin forming [GetANTCONFNameDef]"
 ANTCONF_integrate_start_desc: "It is time to form the Antillean Confederation. Our people must be united now to ensure a brighter future for the people of the Caribbean.\n\n"
 ANTCONF_integrate_CUB: "Integrate [GetANTCONFNameAdj] [CUB.GetAdjective] Territories"
 ANTCONF_integrate_CUB_desc: "Куба - самое крупное из трех основных государств конфедерации. Ее интеграция увеличит размер экономики и почти вдвое увеличит население и площадь территории."
 ANTCONF_integrate_DOM: "Integrate [GetANTCONFNameAdj] [DOM.GetAdjective] Territories"
 ANTCONF_integrate_DOM_desc: "Доминиканская Республика - одно из трех основных государств Конфедерации. Она делит остров Испаньола с Гаити и имеет множество туристов и промышленных предприятий. На северной стороне острова также ведутся легкие горные работы и производится сталь для местного использования в Республике. Его интеграция будет иметь неоценимое значение для новой Конфедерации."
 ANTCONF_integrate_HAI: "Integrate [GetANTCONFNameAdj] [HAI.GetAdjective] Territories"
 ANTCONF_integrate_HAI_desc: "Гаити - самое маленькое из трех основных государств Конфедерации. Она во многом отличается от Кубы и Доминиканской Республики, поскольку является бывшей французской колонией. Интеграция займет больше времени из-за языковых различий между странами, однако промышленная база и естественная гавань Порт-о-Пренса будут неоценимы для экономических и военных операций в Карибском бассейне."
 ANTCONF_integrate_PTR: "Integrate [GetANTCONFNameAdj] [PTR.GetAdjective] Territories"
 ANTCONF_integrate_PTR_desc: "Пуэрто-Рико давно является территорией Соединённых Штатов. Он пользуется защитой Соединённых Штатов, но не входит в их неотъемлемые владения. Население острова составляет почти четыре миллиона человек, и он является одним из крупнейших островов в Карибском море. Это самое маленькое из государств, потенциально входящих в Антильскую конфедерацию. Тем не менее, богатая культура и туризм этого региона принесут огромную пользу более крупной конфедерации."
 ANTCONF_update_flag: "Finish Forming [GetANTCONFNameDef]"
 ANTCONF_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetANTCONFNameDef], adopting its unified flag and name."
 is_ANTCONF: "Has formed [GetANTCONFNameDef]"
 form_CANZUK_category: "CANZUK"
 form_CANZUK_category_desc: "CANZUK — это союз государств, включающий Канаду, Австралию, Новую Зеландию и Великобританию. Он отличается от Британской империи тем, что этот союз был бы напрямую управляемым и представлял бы собой по-настоящему объединённое государство. Территория страны охватывала бы несколько континентов и могла бы стать серьёзным игроком на мировой арене. Возможно, нам стоит рассмотреть эту идею и объединить эти государства?"
