 EU_budget_mff_draft_desc: "The member state which drafts the Multi-Annual Financial Framework has to put the draft on the agenda of the European Parliament at the end of the negotiations. As a reward, the drafting member state gets the total invested political power, when the Multi-Annual Financial Framework is approved and put into effect."
