 IND_NAW_party: "Partido del Despertar Nacional"
 IND_strug_party: "Partido de la Lucha"
 IND_dem_party: "Partido Demócrata"
 indonesia.76854.t: "Indonesia solicita la anexión"
 indonesia.76854.d: "Después de ayudarnos tras el terremoto, el gobierno de Indonesia nos pide que unamos nuestras fuerzas a las suyas. Si lo hacemos, perderemos todo por lo que hemos luchado, pero todo en nombre de la paz. Si no nos unimos a ellos, veremos cómo el conflicto se reaviva una vez más..."
 indonesia.76854.a: "Vamos a hacerlo"
 indonesia.76854.b: "No"
 IND_disasters_mechanic: "La Terrible Suerte de Indonesia"
 IND_disasters_mechanic_desc: "Indonesia is very lucky to have an abundance of natural resources, manpower and will-power to charge through the 21st century.\nHowever, §HIndonesia faces many challenges§! that §Rhinder its progress§!. Accidents are a §Rcommon theme§!, which would easily be prevented if it were not for better care for a particular region.\n\nFor this reason, it is our duty and responsibility to pay more attention to our states in a timely manner in order to avoid a disastrous fate that would cause us serious harm.\n\nWe will continue to have disasters for a considerable amount of time, however if we tackle them quickly they eventually stop after some time!"
 IND_back_muslim: "Apoyando a los Musulmanes"
 IND_back_muslim_desc: "Somos una nación islámica. Por lo tanto, debemos proteger a nuestros musulmanes sin importar el costo. Si lo hacemos, ganaremos el apoyo popular y erradicaremos cualquier odio hacia nosotros en Sulawesi, una nación de mayoría islámica.\n\n\n\n¡Negociar es invaluable y debe comenzar de inmediato!"
 IND_muslim: "Negociar condiciones con los musulmanes en Sulawesi"
 IND_muslim2: "Brindarles un entrenamiento de combate adecuado"
 IND_muslim3: "Establecer administradores locales"
 IND_muslim4: "Finalizar las negociaciones"
 IND_muslim_generic: "Traslado de milicianos a Sulawesi"
 IND_muslim_generic2: "Reubicar proyectos de construcción cristianos"
 IND_muslim_generic3: "Fortificar mezquitas"
 IND_back_papua: "Apoyando a los Cristianos"
 IND_back_papua_desc: "Our Christians have been neglected for too long. It is our duty as a state to give representation and fair treatment to all of our Christians, regardless if they're a minority or not. They must be protected at all times!\n\n\n\nNegotiating is invaluable and must begin immediately!"
 IND_papua: "Negociar términos con los cristianos"
 IND_papua2: "Darles una mayor representación"
 IND_papua3: "Educarlos en guerra de guerrillas"
 IND_papua4: "Prometerles un mejor cuidado"
 IND_papua_generic: "Transferir milicianos a Papúa"
 IND_papua_generic2: "Reubicar proyectos de construcción islámicos"
 IND_papua_generic3: "Fortificar iglesias"
 IND_back_noone: "No respaldar a nadie"
 IND_back_noone_desc: "It is important that the state does not pick favorites over sensitive matters, such as that of religious conflict. We must begin the process of easing this tension, by both negotiations and militarization of points of conflict. \n\nDoing this will bring more calm to the Sulawesians and Papuans."
