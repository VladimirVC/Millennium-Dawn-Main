 NKO_social_security_idea: "사회안전성"
 NKO_black_market: "3층 서기실"
 NKO_black_market_desc: "3층 서기실은 당 중앙위원회 서기국 예하 3개 부서의 상호작용을 지칭하는 일반적인 용어입니다. 개인 서기실과 협조하는 35호실, 38호실, 39호실은 첩보 수집, 당과 핵심 엘리트들을 위한 외화 벌이, 그리고 당과 김씨 일가 자금의 일부를 관리하는 임무를 맡고 있습니다. 전 세계 20여 개국에 주재하는 3층 서기실 공작원들은 공화국의 전담 정보망 외에도 조선 엘리트들을 위한 다양한 물품 구매와 첩보 수집을 담당했습니다. 3층 서기실이라는 용어는 평양 중심 구역의 조선로동당 중앙위원회 청사 단지 내 김정일 집무실 건물 3층에 위치했던 사무실의 원래 위치에서 유래했습니다. 3층 서기실은 형식상 당 중앙위원회의 산하지만, 실제로는 김씨 일가와 직결되어 있습니다."
