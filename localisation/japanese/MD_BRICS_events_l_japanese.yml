l_japanese:
 brics_join.1.t: "[FROM.GetNameDef] Seeks BRICS Membership"
 brics_join.1.d: "[FROM.GetNameDef] has formally applied to join BRICS. As the bloc's leader, the decision to admit them rests with us."
 brics_join.1.a: "They strengthen the bloc. Admit them."
 brics_join.1.b: "Their membership does not serve us."
 brics_join.2.t: "Our Application Is Accepted"
 brics_join.2.d: "BRICS has approved our bid for membership. We take our seat among the bloc's nations."
 brics_join.2.a: "Take our place in BRICS"
 brics_join.3.t: "Our BRICS Bid Is Rejected"
 brics_join.3.d: "The BRICS leadership has declined our application. The door is not closed forever, and we may press our case again in time."
 brics_join.3.a: "We will apply again later"
 brics_join.3.b: "Abandon the effort"
 brics_join.4.t: "[ROOT.GetNameDef] Joins BRICS"
 brics_join.4.d: "[ROOT.GetNameDef] has been admitted to BRICS, expanding the bloc's reach and weight in the international order."
 brics_join.4.a: "A shifting balance"
 brics_join.5.t: "Time to Approach BRICS Again"
 brics_join.5.d: "Enough time has passed since our last rejection. We may submit a fresh application to the BRICS leadership."
 brics_join.5.a: "Resubmit our application"
 brics_join.5.b: "Not yet"
 brics_join.6.t: "[FROM.GetNameDef] Invites Us to Found BRICS"
 brics_join.6.d: "[FROM.GetNameDef] is bringing BRICS into being and has asked us to stand among its founding members, shaping the bloc from the outset."
 brics_join.6.a: "We will help found BRICS"
 brics_join.6.b: "We will keep our distance"