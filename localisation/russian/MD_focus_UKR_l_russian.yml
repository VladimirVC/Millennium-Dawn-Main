 ukraine_hur.2.d: "Наши секретные батальоны смогли провести ограниченную спецоперацию и вызвать беспорядки на враждебной территории. Теперь нам предстоит решить, готовы ли мы признать их действия и созданное ими сепаратистское государство как наше, или оставить их бороться в одиночку."
