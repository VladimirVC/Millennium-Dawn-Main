 BLR_Litva_belarusization_category: "Интеграция новых земель"
 BLR_Litva_belarusization_category_desc: "Необходимо интегрировать новые земли в состав нашего государства. Возрождение литвиновской нации, несомненно, рискованный проект, но он может стать ключом к созданию сильного государства."
