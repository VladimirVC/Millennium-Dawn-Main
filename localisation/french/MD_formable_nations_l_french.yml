 form_SCA_category: "Unir les peuples nordiques"
 form_SCA_category_desc: "Les peuples nordiques ont déjà partagé de nombreuses nations : l'Empire suédois, l'Union de Kalmar et d'autres encore. L'unification de ce groupe de peuples à l'histoire si riche et si vivante, aux cultures et aux langues si particulières, constituera un défi pour tous ceux qui oseront accomplir cet exploit."
 SCA_integrate_start: "Begin forming [GetSCANameDef]"
 SCA_integrate_start_desc: "It is time to form the Scandinavian Empire. Our brothers and sisters will truly be united under one banner as we build a greater tomorrow.\n\n"
