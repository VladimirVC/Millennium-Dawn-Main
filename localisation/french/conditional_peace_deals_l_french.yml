 CPD_peace_deal_builder_selected_deal_type_title_two: "En train d'offrir des concessions"
 CPD_peace_deal_builder_ACTIONABLE_STATES_TITLE_TEXT: "États exploitables"
 CPD_peace_deal_builder_CURRENT_DEAL_TITLE_TEXT: "Accord actuel"
 CPD_peace_deal_explainer_ICON_TT: "Fonctionnement des accords de paix"
 CPD_peace_deal_explainer_ICON_TT_DELAYED: "Élaborer un accord de paix est aussi simple que de sélectionner un onglet ci-dessus, puis de choisir ce que vous souhaitez céder ou réclamer dans un état.\n\nUn accord de paix avec un coût §Ynégatif§! a de fortes chances d'être accepté par une IA, tandis qu'un accord avec un coût §Ypositif§! sera moins susceptible de l'être. Vous pouvez consulter en détail la volonté de l'IA d'accepter l'accord en survolant la l'indicateur d'acceptation.\n\nTout accord de paix proposé à un joueur ne sont pas affectés par ces valeurs."
 CPD_annex_state_button_TT: "[CPD_ANNEX_STATE_TT_LOC]"
 CPD_annex_state_button_TT_DELAYED: "[CPD_ANNEX_STATE_TT_DELAYED_LOC]"
 CPD_annex_state_button_TT_DEMAND: "Demander des états"
 CPD_annex_state_button_TT_CONCESSION: "Concéder des états"
 CPD_annex_state_button_TT_DELAYED_DEMAND: "Les territoires ennemis sélectionnés sont annexés à notre nation, ainsi que leurs populations, leurs usines et leurs ressources. Les États dont nous possédons les revendications territoriales ont une valeur stratégique deux fois moindre ; les États revendiqués, un tiers. Revendiquer des terres appartenant encore à leur propriétaire d'origine double le coût."
 CPD_annex_state_button_TT_DELAYED_CONCESSION: "§YCéder des États§!, c'est les livrer à l'ennemi. Chaque territoire cédé réduit le coût global de l'accord, ce qui rend nos autres exigences plus attractives."
 CPD_make_puppet_button_TT: "[CPD_MAKE_PUPPET_TT_LOC]"
 CPD_make_puppet_button_TT_DELAYED: "[CPD_MAKE_PUPPET_TT_DELAYED_LOC]"
 CPD_make_puppet_button_TT_DEMAND: "Créer un gouvernement fantoche"
 CPD_make_puppet_button_TT_CONCESSION: "Concéder un gouvernement fantoche"
 CPD_make_puppet_button_TT_DELAYED_DEMAND: "L'instauration d'un §Ygouvernement fantoche§! crée un nouvel État vassal sur un territoire ennemi sélectionné. Ce nouvel État fantoche hérite de la culture de sa nation mère, mais nous est soumis en matière de politique étrangère. Si nous possédons déjà un État vassal ayant des revendications territoriales sur la nation mère, ces États rejoignent cet État vassal au lieu d'en créer un nouveau."
 CPD_make_puppet_button_TT_DELAYED_CONCESSION: "L'instauration d'un §Ygouvernement fantoche§! permet à l'ennemi de se tailler un État vassal sur les territoires que nous contrôlons actuellement. Ce nouveau gouvernement fantoche sera soumis à son autorité."
 CPD_demilitarise_state_button_TT: "[CPD_DEMILITARISE_TT_LOC]"
 CPD_demilitarise_state_button_TT_DELAYED: "[CPD_DEMILITARISE_TT_DELAYED_LOC]"
 CPD_demilitarise_state_button_TT_DEMAND: "Demander les démilitarisation des états"
 CPD_demilitarise_state_button_TT_CONCESSION: "Proposer la démilitarisation des états"
 CPD_demilitarise_state_button_TT__DELAYED_DEMAND: "Exiger la §Ydémilitarisation§! transforme certains États ennemis en zones où aucune opération militaire n'est autorisée. Leur propriétaire ne peut y stationner de troupes ni y ériger de fortifications."
 CPD_demilitarise_state_button_TT__DELAYED_CONCESSION: "L’acceptation de la §Ydémilitarisation§! soumet nos propres États aux mêmes restrictions. Nous ne pourrons ni déplacer ni stationner de forces dans les territoires cédés."
