 UZB_karakalpakstan_category: "カラカルパクスタン問題"
 UZB_karakalpakstan_category_desc: "Karakalpakstan separatism in Uzbekistan refers to a historical and ongoing regional movement centered around the desire for greater autonomy or even independence for the autonomous republic of Karakalpakstan within the boundaries of Uzbekistan. Karakalpakstan, located in the northwestern part of Uzbekistan, is predominantly inhabited by the Karakalpak people, who have distinct cultural, linguistic, and historical ties to the region.\n\nKarakalpakstan's Opinion: §Y[?UZB_karakalpakstans_opinion]§!\n\nUzbeks' Opinion: §Y[?UZB_uzbeks_opinion]§!\n"
 UZB_Promote_Karakalpakstan_identity: "カラカルパクスタンのアイデンティティを促進"
 UZB_karakalpakstan.1.t: "カラカルパク人とウズベク人の間の宗教的対立"
 UZB_karakalpakstan.1.d: "今朝、地元のモスクでウズベク人とカラカルパク人の間で衝突があった。最初は単なる口論だったが、その後突然血みどろの惨劇に変わった。双方は、自分たちの土地に異質な宗教が存在すると信じている。我々はどちらの側に付くべきか？"
 UZB_karakalpakstan.1.a: "カラカルパク人を支持する"
 UZB_karakalpakstan.1.b: "ウズベク人を支持する"
 UZB_karakalpakstan.2.t: "カラカルパク人とウズベク人の間のバーでの喧嘩"
 UZB_karakalpakstan.2.d: "A couple of hours ago there was a drunken altercation between Uzbeks and Karakalpaks. The conflict arose from differences in political views. After a series of mutual insults, both sides got into a fierce brawl involving improvised weapons."
 UZB_karakalpakstan.2.a: "カラカルパク人を支持する"
 UZB_karakalpakstan.2.b: "ウズベク人を支持する"
 UZB_karakalpakstan.3.t: "地元のチーム間のサッカー場での喧嘩"
 UZB_karakalpakstan.3.d: "A couple of hours ago there was a conflict between members of the Uzbek soccer team. The main reason was ethnic disagreement. One of the participants directed a highly offensive remark at another, which led to unrest on the soccer field."
 UZB_karakalpakstan.3.a: "カラカルパク人を支持する"
 UZB_karakalpakstan.3.b: "ウズベク人を支持する"
 UZB_karakalpakstan.4.t: "カラカルパクスタン祭中の衝突"
 UZB_karakalpakstan.4.d: "地元のカラカルパク人が彼らの国民の祝日を祝っている間、過激化したウズベク人が祝賀者を襲撃した。数人が負傷し、攻撃者は警察によって拘束された。我々はこれにどう対処すべきか？"
 UZB_karakalpakstan.4.a: "カラカルパク人を支持する"
 UZB_karakalpakstan.4.b: "ウズベク人を支持する"
 CES_modern_warfare: "現代戦"
 CES_modern_warfare_desc: "我々がどんな外部の脅威も効果的に撃退できるように、我々の陸軍を現代の現実に適応させる必要がある。"
 CES_new_air_doctrine: "新航空ドクトリン"
 CES_new_air_doctrine_desc: "我々は航空戦術へのアプローチを変更する必要がある。"
 joining_turkic_council_tt1: "\n我々は他のテュルク諸国との関係を改善するために§Cテュルク評議会§!に参加するだろう。"
