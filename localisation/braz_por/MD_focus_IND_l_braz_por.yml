 IND_papua_resist_m1: "Resistência Mínima dos Cristãos de Papua"
 IND_papua_resist: "Resistência Cristã de Papua"
 IND_papua_resist2: "Resistência Cristã de Papua"
 IND_papua_resist3: "Resistência Cristã de Papua"
 IND_papua_resist4: "Resistência Cristã de Papua"
 IND_papua_resist_info: "Os cristãos de nossa terra residem principalmente em Papua. Infelizmente, eles têm sido alvo de abusos por parte de governos passados e atuais, e os habitantes não gostam de nós, o que torna nossas missões políticas lá um verdadeiro desafio."
 IND_islamic_resist: "Resistência muçulmana de Sulawesia"
 IND_islamic_resist2: "Resistência muçulmana de Sulawesia"
 IND_islamic_resist3: "Resistência muçulmana de Sulawesia"
 IND_islamic_resist4: "Resistência muçulmana de Sulawesia"
 IND_islamic_resist_c1: "Resistência muçulmana mínima de Sulawesia"
 IND_islamic_resist_info: "Sulawesi é uma das nossas maiores ilhas, e é preenchida com muitos povos diferentes. No entanto, a grande maioria muçulmana está chamando o estado de negligência e está colocando forte resistência contra muitas de nossas forças e economia. Essa resistência está tornando a vida muito difícil para nossos homens e forças de segurança."
