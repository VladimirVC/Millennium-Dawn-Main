 HOL_Naval_Group_naval_equipment_organisation: "ディレクション・デ・コンストラクション・ナヴァル"
 HOL_Naval_Group_naval_equipment_organisation_desc: "ディレクション・デ・コンストラクション・ナヴァルは[HOL.GetAdjectiveCap]の海軍産業の主要なパートナーであり、オランダ王立海軍に最高級の軍艦と潜水艦技術を提供している。数十年にわたる海軍工学の専門知識を持つナバル・グループは、[HOL.GetAdjectiveCap]の艦隊を強化する。"
