l_korean:
 CHI_Belt_and_Road_Initiative: "일대일로"
 CHI_Belt_and_Road_Initiative_desc: "Xi Jinping's vision, announced first in Astana and then in Jakarta, joins the Silk Road Economic Belt to the 21st Century Maritime Silk Road into a single infrastructure diplomacy programme spanning more than 140 countries. We should make it the organizing principle of our foreign economic policy."
 CHI_The_China_Pakistan_Economic_Corridor: "중국-파키스탄 경제회랑"
 CHI_The_China_Pakistan_Economic_Corridor_desc: "From Kashgar to Gwadar, three thousand kilometers of road, rail, and pipeline cut through the Karakoram. Pakistani Frontier Works Organization workers and PLA engineers sign each other's uniforms in the Hunza Valley. The lifeline is open."
 CHI_The_South_China_Sea: "남중국해"
 CHI_The_South_China_Sea_desc: "The South China Sea sits at the heart of our maritime strategy, rich in hydrocarbons, crossed by the world's busiest sea lanes, and contested by every nation that borders it. We must choose our posture: patient encroachment through the Cabbage Strategy, patient diplomacy in the spirit of Zheng He's treasure fleets, or the forcible restoration of tributary order across the Four Seas. Each path shapes how our neighbours, ASEAN, and the great powers respond."
 CHI_Strengthen_Relations_with_the_South: "The Jeju Channel"
 CHI_Strengthen_Relations_with_the_South_desc: "Open a standing consultation channel with Seoul through quiet back-channel diplomacy on Jeju. We treat the ROK as a legitimate strategic partner in its own right, not a buffer state managed through Pyongyang."
 CHI_Maintain_Commitment_to_Denuclearization: "The Yongbyon Communiqué"
 CHI_Maintain_Commitment_to_Denuclearization_desc: "Publish a formal communiqué committing us to North Korean denuclearization. Private channels reinforce the message to Pyongyang: our diplomatic cover is conditional, not unconditional. Washington and Seoul take note of the shift."
 CHI_Encourage_Economic_Reforms: "경제 개혁 장려"
 CHI_Encourage_Economic_Reforms_desc: "The fact that a close partner of ours continues to remain an underdeveloped and backward nation is an embarrassment for us as the successors of Deng Xiaoping. [NKO.GetLeader] should be persuaded to liberalize the North Korean economy."
 CHI_Mediate_Korean_Peace_Talks: "한반도 평화회담 중재"
 CHI_Mediate_Korean_Peace_Talks_desc: "너무 오랫동안 한반도는 냉전상태에 놓여왔습니다. 남북간 긴장은 공세적 행동으로 오해되는 방어 행위에 대한 상호 의혹과 불신으로 인해 지속적으로 존재했습니다. 중국과 같은 외부자가 이 내부 교착 상태를 타파할 수 있을 겁니다."
 CHI_Back_Peaceful_Korean_Unification: "평화적인 한국 통일"
 CHI_Back_Peaceful_Korean_Unification_desc: "우리는 외부의 영향력이 없는 비동맹정부 하의 한반도 최종 통일에 대한 지지를 표명해야 합니다. 이런 사태가 어떻게 지날 것인가는 한국인에게 달려있습니다."
 CHI_End_the_Kim_Dynasty: "김씨 왕조 종식"
 CHI_End_the_Kim_Dynasty_desc: "김씨들은 수십년간 잔인하고 후진적인 독재를 통해 우리에게 짐덩어리를 안겨주었습니다. 이러한 상황은 계속되면 안됩니다."
 CHI_Gain_the_Support_of_the_KPA: "조선인민군의 지원을 얻다"
 CHI_Gain_the_Support_of_the_KPA_desc: "Our intelligence indicates that there are elements within the officer class of the Korean People's Army that resent the rule of [NKO.GetLeader]. We should reach out to these officers with whom we share an objective."
 CHI_The_North_Korean_Coup: "북한 쿠데타"
 CHI_The_North_Korean_Coup_desc: "이제 시대착오적인 정권을 전복할 때가 왔습니다. 북한에 대한 우리의 영향력은 많은 장교들을 같은 편으로 이끌었지만 우리의 분석가들은 우리가 이 위험한 모험을 시작하기 전에 더 많은 지원을 모색해야할지 걱정하고 있습니다."
 CHI_Establish_a_Puppet_Government: "괴뢰국 수립"
 CHI_Establish_a_Puppet_Government_desc: "쿠데타가 성공했고 새로운 군사정부는 우리에게 빚이 있으므로 우리의 권위에 굴복할 수 밖에 없습니다."
 CHI_The_Indian_Subcontinent: "인도 아대륙"
 CHI_The_Indian_Subcontinent_desc: "티베트 남부에는 인도와 파키스탄이 경쟁하는 광대한 아대륙이 있습니다. 우리는 첨예하게 대립하는 이 지역에 대한 우리의 접근방식을 신중하게 고려해야합니다."
 CHI_Support_Nepals_Maoists: "Backing the UCPN(M)"
 CHI_Support_Nepals_Maoists_desc: "The People's War of 1996 to 2006 reshaped Nepal. Quiet support for the United Communist Party of Nepal (Maoist), through funds, sanctuary in Tibet, and ideological framing, can keep Kathmandu's politics tilted toward Beijing for a generation."
 CHI_Respect_Nepalese_Neutrality: "The 1960 Treaty Renegotiation"
 CHI_Respect_Nepalese_Neutrality_desc: "The 1960 Treaty of Peace and Friendship between Nepal and India locked Kathmandu into Delhi's strategic orbit for sixty years. We will quietly fund Nepalese voices calling for its renegotiation."
 CHI_Guarantee_Bangladesh: "The Dhaka Detente"
 CHI_Guarantee_Bangladesh_desc: "Sheikh Hasina speaks of strategic autonomy. Beijing speaks of brotherhood across the Brahmaputra. India watches from the other bank. The geometry of the Bay of Bengal is shifting."
 CHI_Drop_Claims_on_Bhutan: "부탄에 대한 클레임 포기"
 CHI_Drop_Claims_on_Bhutan_desc: "우리와 부탄 사이의 관계 개선에 있어 큰 장벽은 그들이 통제하는 영토 중 일부에 대한 우리의 주장입니다. 이것은 인도인과의 마찰로 이어졌으며, 또한 잠재적으로 바람직하지 않은 충돌로 이어질 수 있습니다. 이런 상황에서는 부탄에 대한 클레임을 포기하는 것이 좋습니다."
 CHI_Doklam_Road_Standoff: "도클람 국경분쟁"
 CHI_Doklam_Road_Standoff_desc: "도클람(둥랑)은 중국 영토이며, 따라서 우리가 원한다면 군대와 건설 장비를 자유롭게 옮길 수 있어야 합니다. 부탄과 인도가 반응한다면 이는 그들의 전투 준비를 테스트 할 수 있는 좋은 기회가 될 것입니다."
 CHI_Iron_Brothers: "철의 형제들"
 CHI_Iron_Brothers_desc: "Our partnership with Pakistan is one of close strategic alignment, and this relationship should be preserved for our mutual benefit. Our common Indian foe cannot stand up to our joint might."
 CHI_Joint_Military_Projects: "The JF-17 Co-Production"
 CHI_Joint_Military_Projects_desc: "The JF-17 Thunder, jointly developed by Chengdu and PAC Kamra, is more than a fighter jet. It is the spine of Pakistan's air force and the proof that Sino-Pakistani military cooperation can deliver strategic capability."
 CHI_Cooperate_on_Counterterrorism: "The East Turkestan Communique"
 CHI_Cooperate_on_Counterterrorism_desc: "Islamabad formally designates ETIM a terrorist organization and signs an extradition framework. For us, this closes a vulnerability that has bled into Xinjiang for two decades."
 CHI_Militarize_Gwadar_Port: "과다르항 군사화"
 CHI_Militarize_Gwadar_Port_desc: "과다르 항구에 대한 우리의 투자는 성과를 거두었으며 인상적인 상업 시설을 만들었습니다. 우리는 항구를 군사화 함으로써 상업적 용도와 함께 사용할 수 있으며 이는 의심할 여지 없이 인도를 위협할 것이지만 그럼에도 불구하고 우리의 안보에 필요한 움직임입니다."
 CHI_The_Quadrilateral_Cooperation_and_Coordination_Mechanism: "4개국 대테러 협력"
 CHI_The_Quadrilateral_Cooperation_and_Coordination_Mechanism_desc: "4개국 대테러 협력(QCCM)은 테러 퇴치에 대한 공통된 관심을 가진 4개국의 유용한 협력이 될 것 입니다. 파키스탄과 아프가니스탄 간의 긴장된 관계를 개선하고 타지키스탄을 통해 러시아가 지배하는 중앙아시아에서 우리의 영향력을 확산시키는 데 도움이 되기를 바랍니다."
 CHI_Support_Negotiations: "The Murree Process"
 CHI_Support_Negotiations_desc: "In a Pakistani hill resort, ISI officers pour tea while Taliban delegates and Afghan government emissaries face each other across a table. A Chinese man in a grey suit listens carefully, taking no notes."
 CHI_Joint_Operations: "Operation Mountain Tiger"
 CHI_Joint_Operations_desc: "Codename of the recurring PLA-Pakistani joint exercise series. This time, the exercise is not training. The Wakhan and the Khyber will see PLA boots on dirt for the first time in decades."
 CHI_Tackle_the_Root_Causes_of_Radicalization: "The Wakhan Corridor Accord"
 CHI_Tackle_the_Root_Causes_of_Radicalization_desc: "The seventy-six kilometers of the Wakhan Corridor, a sliver of Afghanistan that touches Xinjiang directly, have been ungoverned for too long. Beijing, Kabul, and Islamabad agree: a buffer must be built, brick by brick, watchtower by watchtower."
 CHI_Disengage_from_Pakistan: "파키스탄에서의 철수"
 CHI_Disengage_from_Pakistan_desc: "인도 아대륙에 대한 우리의 접근방식을 재평가 할 때입니다. 세계 최대 경제국인 중국과 인도 사이의 긴밀한 파트너쉽은 낮은 전력과의 지속적인 동맹보다 더 도움이 될 수 있습니다. 파키스탄에서 철수하는 것이 인도와의 교감의 첫 걸음이 될 것입니다."
 CHI_End_Joint_Military_Exercises: "합동 군사 훈련 종료"
 CHI_End_Joint_Military_Exercises_desc: "파키스탄과의 훈련은 인도인들의 의혹으로 이어집니다. 우리는 그들의 신뢰를 얻기 위해 이를 종료해야 합니다."
 CHI_Strategic_Realignment: "The Bandung Spirit Revived"
 CHI_Strategic_Realignment_desc: "In Jakarta, 1955, Zhou Enlai and Jawaharlal Nehru shook hands for the cameras. \"Hindi-Chini bhai-bhai,\" chanted the crowd. Seven years later the mortars flew over the McMahon Line. Perhaps that handshake deserves a second life."
 CHI_Sino_Indian_Treaty_of_Friendship: "중국-인도 우정 조약"
 CHI_Sino_Indian_Treaty_of_Friendship_desc: "파키스탄과의 파트너쉽은 물론 우리와 인도간의 마찰의 유일한 원천은 아닙니다. 우리는 인도와의 새로운 관계를 시작하기 위해 양국이 가지고 있는 영토 문제를 해결해야 합니다."
 CHI_A_New_Alliance: "The Wuhan Spirit Realized"
 CHI_A_New_Alliance_desc: "Modi and Xi walked the gardens of East Lake in 2018 and spoke without aides. What was said remains unrecorded, but what followed is now history: the two civilizations of Asia, finally aligned."
 CHI_Strike_Across_the_Himalayas: "The Galwan Reckoning"
 CHI_Strike_Across_the_Himalayas_desc: "On a moonless night in the Galwan Valley, June 2020, soldiers killed each other with stones and clubs because their treaty forbade firearms. Twenty-one Indian dead, four of ours, though Beijing will not confirm. The treaty died that night."
 CHI_String_of_Pearls: "'진주 목걸이' 전략"
 CHI_String_of_Pearls_desc: "인도양을 지배하는 인도는 바람직하지 않은 상황입니다. 우리는 미국이 우리 파트너의 영토에 있는 군사 기지와 라이벌로 둘러싸고 우리를 억제하고자 하는 것과 같은 방식으로 인도를 억제하려고 노력할 수 있습니다. 이러한 포위는 인도와의 전쟁 상태에 들어갈 때 중요한 이점을 얻을 수 있을 것입니다."
 CHI_Annex_Bhutan: "부탄 합병"
 CHI_Annex_Bhutan_desc: "부탄에 대한 우리의 주장은 나라의 영토를 확장하는 결과로 오지 않을 수 있습니다만 티베트와 부탄의 긴밀한 역사적 관계는 티베트 자치구에 부탄을 통합하는 우리의 용막에 합리적인 정당성을 부여합니다. 더욱이 합병을 통해 인도의 전략적 동맹국을 없앨 수 있습니다. 부탄에서 우리의 영향력이 충분히 커지면 전쟁없이 합병할 수 있습니다."
 CHI_Puppet_Nepal: "네팔 괴뢰화"
 CHI_Puppet_Nepal_desc: "네팔의 일부 정치세력은 인도와의 파트너쉽을 희생하면서 중국과의 관계를 대폭 강화할 용의가 있습니다. 이것은 우리의 외교 정책 목표에 큰 힘이 됩니다. 네팔에서 우리의 영향력을 높이고 우호적인 정부가 유지될 수 있도록 보장하면 이 과정을 평화롭게 수행할 수 있습니다."
 CHI_Bring_the_Tiger_to_Heel: "Settle the McMahon Question"
 CHI_Bring_the_Tiger_to_Heel_desc: "The McMahon Line was drawn by a British colonial officer in 1914 and never accepted by any Chinese government, not the Qing, not the Republic, not the People's Republic. The line will be erased."
 CHI_Assuage_Japanese_Concerns: "일본의 우려 불식"
 CHI_Assuage_Japanese_Concerns_desc: "To facilitate a rapprochement with Japan, we must reassure Tokyo that our intentions are not hostile. Actions speak louder than words."
 CHI_Form_the_SCO: "상하이협력기구(SCO) 형성"
 CHI_Form_the_SCO_desc: "\"국경 지대의 군사적 신뢰 강화를 위한 조약\"을 체결하며 형성된 상하이 5국은 러시아, 카자흐스탄, 키르기스스탄, 타지기스탄과 같이 긴밀히 교류할 수 있는 역할을 합니다. 이러한 상호작용은 귀중하지만 공식적인 정부 조직으로 바꾼다면 더욱 개선될 수 있습니다."
 CHI_Emphasize_Economic_Cooperation: "경제 협력 강화"
 CHI_Emphasize_Economic_Cooperation_desc: "상하이협력기구를 통해 부유한 회원들이 가난한 회원들에게 경제적 지원을 증가해야합니다.  더 가난한 이웃의 경제를 강화한다면 지역안정에 대한 우리의 목표는 잘 달성됩니다. 또한 상하이협력기구는 경계 안에서 거주하는 사람들의 삶의 질을 높이기 위해 노력해야합니다."
 CHI_Civilian_Technology_Sharing: "민간 기술 공유"
 CHI_Civilian_Technology_Sharing_desc: "우리 조직은 주로 가난한 회원국의 경제 발전에 초점을 맞추고 있기 대문에 비 군사 기술의 공유에만 초점을 맞추어야 합니다."
 CHI_Development_Assistance: "개발 지원 증가"
 CHI_Development_Assistance_desc: "상하이협력기구 회원국의 경제 성장을 가속화하기 위한 현재의 개발 노력을 개선할 수 있습니다."
 CHI_Emphasize_Political_Cooperation: "정치적 협력 강화"
 CHI_Emphasize_Political_Cooperation_desc: "상하이협력기구는 회원국의 합법적인 정부가 불안정하지 않도록 보호하여 지역 안정을 유지하는 조직이 되어야 합니다."
 CHI_Crack_Down_on_the_Three_Evils: "삼개세력(삼대악) 단속"
 CHI_Crack_Down_on_the_Three_Evils_desc: "테러, 분리주의, 종교적 극단주의로 대표되는 \"삼개세력\"은 모든 상하이협력기구 회원국의 관심입니다. 상하이협력기구를 통해 우리는 이러한 위험한 위협을 억제할 수 있는 서로의 정치적 역량을 강화할 수 있습니다."
 CHI_Emphasize_Military_Cooperation: "군사적 협력 강화"
 CHI_Emphasize_Military_Cooperation_desc: "우리의 의도를 가릴 필요는 없습니다. 상하이협력기구는 우리와 러시아에게 미국같은 외부 적의 침략 가능성에 대한 보루를 제공하는 명시적인 안보 지향 조직이어야 합니다."
 CHI_Military_Technology_Sharing: "군사 기술 공유"
 CHI_Military_Technology_Sharing_desc: "러시아의 첨단 군사 기술은 외부 침략의 경우 우리 회원국들에게 귀중한 자산이 될 것입니다."
 CHI_Strengthen_Security_Framework: "보안 체계 강화"
 CHI_Strengthen_Security_Framework_desc: "상하이협력기구 내에서 우리의 기존 군사 협력은 어느정도까지 올라왔으나 미국의 공격을 견디기에는 충분하지 않을 수 있습니다. 우리는 최악의 상황에 대비할 수 있도록 기준의 군사 협력을 심화시켜야 합니다."
 CHI_Chinese_Dominance: "중국의 지배"
 CHI_Chinese_Dominance_desc: "상하이협력기구에서의 우리와 러시아의 위치는 현재 동등하지만, 불편한 진실은 우리의 힘이 러시아보다 훨씬 세다는 것입니다. 조직 내에서 우리의 영향력은 우리의 적과 일치해야하므로 러시아를 아래의 위치로 놓아야합니다."
 CHI_Equal_Partners: "동등한 파트너들"
 CHI_Equal_Partners_desc: "우리가 많은 분야에서 러시아를 추월하기 시작했지만 여전히 이전의 초강대국에서 배울 것이 많습니다. 러시아를 소외하고 적대하는 것보다는 곁에 두는 것이 우리의 이익과 부합할 것입니다."
 CHI_Exploit_Economic_Clout: "경제 영향력 악용"
 CHI_Exploit_Economic_Clout_desc: "상하이협력기구의 재정적 지향성은 자본 측면에서 우리의 엄청난 우월성을 감안할 때 우리에게 매우 유용했습니다. 우리는 이제 다른 상하이협력기구 회원국에 대한 우리의 정치적 영향력을 증진시키기 위해 우리의 경제적 이점을 사용할 수 있습니다."
 CHI_Split_CSTO: "집단안보조약기구(CSTO) 분할"
 CHI_Split_CSTO_desc: "러시아와의 파트너쉽은 영원히 지속되지 않았습니다. 우리는 확장주의자인 그들을 완전히 신뢰할 수 없습니다. 지금까지 중국-러시아 간 협력을 계속하기 위해 우리의 이익 중 일부분을 제공했지만 상하이협력기구를 지속하기 위해서는 이를 종식시켜야 합니다. 우리의 동맹국들은 이제 우리와 러시아 사이에서 자신들의 편을 선택해야합니다."
 CHI_Merge_with_CSTO: "집단안보조약기구 병합"
 CHI_Merge_with_CSTO_desc: "러시아의 안보기구인 집단안보조약기구는 군사 협력을 위한 많은 기관을 보유하고 있기 대문에 우리가 채택하는 것이 유용할 것입니다."
 CHI_An_Alliance_to_Rival_NATO: "북대서양조약기구(NATO)와 경쟁하는 동맹"
 CHI_An_Alliance_to_Rival_NATO_desc: "상하이협력기구의 역량을 최대한 발휘하고 군사 협력을 위한 조직의 기관을 강화하여 공동 지휘와 통제가 NATO만큼 효율적이게 되었습니다. 전쟁이 온다면 우리는 준비가 되어있을 것입니다."
 CHI_Forum_on_China_African_Cooperation: "중국-아프리카 협력 포럼"
 CHI_Forum_on_China_African_Cooperation_desc: "중국-아프리카 협력 포럼(FOCAC)는 우리가 서방처럼 야만적이거나 배신하지 않는다는 점을 보여주고 기회의 땅인 아프리카 대륙 전체와의 상호 작용을 쉽게 해줍니다."
 CHI_China_Africa_Development_Fund: "중국-아프리카 개발 기금"
 CHI_China_Africa_Development_Fund_desc: "중국-아프리카 개발 기금을 통해 아프리카 대륙의 인프라 프로젝트에 필요한 투자를 제공할 수 있습니다."
 CHI_Invest_in_Cheap_Energy: "저렴한 에너지에 투자"
 CHI_Invest_in_Cheap_Energy_desc: "재생 가능 에너지에 대해서 이야기 하지만 화석연료야말로 아프리카 사람들을 가난에서 끌어올려 줄 것입니다."
 CHI_Invest_in_Clean_Energy: "청정 에너지에 투자"
 CHI_Invest_in_Clean_Energy_desc: "환경 비용을 희생해서 개발하는 것은 지양해야합니다. 우리의 기술적 노하우를 통해 아프리카 대륙의 파트너들과 재생 가능 에너지 기술의 발전을 공유할 수 있습니다."
 CHI_Outsource_Cheap_Labor: "저임금 노동 외주"
 CHI_Outsource_Cheap_Labor_desc: "When we were developing, our workers were paid minimally and had to suffer tremendous hardships. But their suffering is what has led our country to become as economically successful as it currently is. The nations of Africa should follow the same model."
 CHI_Workers_Rights: "노동자의 권리"
 CHI_Workers_Rights_desc: "The well-being of the individual worker is integral to the success of the nation. We should only lend our support to projects that protect the livelihoods of the people on whom they depend."
 CHI_Agriculture: "농업"
 CHI_Agriculture_desc: "Agriculture remains an important sector in many African economies and is the one on which the most people rely. We should lend our support to the agricultural sector to help individual workers compete in a globalized world of brutal international competition."
 CHI_Develop_Hospitals: "병원 개선"
 CHI_Develop_Hospitals_desc: "아프리카 대륙에서는 쉽게 치료할 수 있는 질병으로도 많은 사망자들이 발생합니다. 우리는 동맹국들에게 아픈 사람을 위해 필요한 도구를 제공해야합니다."
 CHI_Leverage_Influence: "영향력 활용"
 CHI_Leverage_Influence_desc: "아프리카는 우리에게 많은 빚을 지고 있기 대문에 대륙 전역의 정부들은 우리에게 굴복해야합니다."
 CHI_Write_Off_Debts: "부채 탕감"
 CHI_Write_Off_Debts_desc: "우리는 동맹국들을 부채의 함정에 빠뜨리지 않을 것입니다. 그들 스스로의 속도로 개발하고 성장할 수 있도록 내버려두어야합니다."
 CHI_Friendship_Schools: "우정 학교"
 CHI_Friendship_Schools_desc: "우정 학교는 대륙 전역에 걸쳐 매우 필수적인 교육을 제공하며 이 지역의 인적 자본을 강화합니다."
 CHI_Joint_Research: "공동 연구"
 CHI_Joint_Research_desc: "동맹국들과 함께 국민들에게 도움이 될 과학적 발전을 만들 수 있을 겁니다."
 CHI_TV_and_Internet_Access: "TV 와 인터넷 접속"
 CHI_TV_and_Internet_Access_desc: "21세기에는 가정이 외부세계에 어느정도 접촉할 수 있느냐가 개발의 척도로 쓰입니다. 우리는 아프리카 동맹국들의 인민들을 위해 TV와 인터넷을 제공하는 것을 도와야합니다."
 sino_indian.1.t: "부탄의 자주권 침해!"
 sino_indian.1.d: "중국군은 중국이 자국 영토라고 주장하는 부탄 영토 도클람의 도로 건설 작업에 동행하고 있습니다. 부탄의 주권에 대한 명백한 침해가 반대 없이 진행된다면 중국은 도클람과 아마도 부탄 영토의 다른 분쟁 지역에 대한 영유권을 강화할 수 있습니다."
 sino_indian.1.a: "당장 병력을 보내어 이런 침략을 막아야 한다!"
 sino_indian.1.b: "우린 할 수 있는게 없다..."
 sino_indian.1.c: "우리의 보호자들이 와서 지켜줄 것이다."
 sino_indian.1.e: "우리는 우리 스스로 방어해야만 한다!"
 sino_indian.2.t: "우리를 버린 것처럼 보이는 보호자들..."
 sino_indian.2.d: "인도는 우리의 주권을 수호하겠다는 약속을 지키지 않기로 결정했습니다. 따라서 선택은 중국의 침략에 반대할지 여부를 결정하는 우리에게 달려 있습니다."
 sino_indian.2.a: "우린 할 수 있는게 없다..."
 sino_indian.2.b: "우리는 우리 스스로 방어해야만 한다!"
 sino_indian.3.t: "우리의 도로 공사를 중지시키 위해 병력을 파견한 [FROM.GetName]"
 sino_indian.3.d: "수백 명의 [FROM.GetAdjective] 병력이 우리의 부탄 영토 침공에 대응하여 표면적으로는 우리 영토와 그들의 영토 사이의 경계를 넘었습니다. 이런 주장의 황당함은 차치하고, 무력대결을 피하고 무력 충돌을 피할 것인지, 아니면 현 상황을 확대할 것인지를 결정해야 합니다."
 sino_indian.3.a: "우린 철수해야 한다."
 sino_indian.3.b: "우리 땅에 서있는 것이 뭐가 잘못됐나!"
 sino_indian.4.t: "부탄에 대한 영향력을 확장하는 중국"
 sino_indian.4.d: "소국 부탄은 중국이 자국의 동의 없이 자국 영토로 진입하는 도로를 확장함으로써 그들의 자주권이 심각하게 훼손되는 것을 목격했습니다. 부탄이나 그 보호자인 인도 모두 부탄을 비난하고 그 영토가 중국 영토가 아니라 부탄 영토임을 거듭 강조하는 것 이상으로 이러한 움직임에 저항하지 않았습니다. 인도가 이 법으로부터 이웃 국가를 보호하지 못하면서 양국 간의 역사적으로 긴밀한 관계가 심각하게 훼손될 것으로 보입니다."
 sino_indian.4.a: "중국이 계속 외부로의 압박을 가한다."
 sino_indian.5.t: "부탄에서 철수한 중국"
 sino_indian.5.d: "부탄의 도클람 영토로 기존 도로를 확장하려는 노력에 대한 상당한 저항에 직면한 중국은 이 지역에서 군대와 인력을 철수했습니다. [CHI.GetLeader]측은 지역의 평화와 안정을 위한 중국의 의지를 재확인했습니다."
 sino_indian.5.a: "당분간은 중국이 물러서겠군."
 sino_indian.6.t: "도클람 분쟁에서 승리한 중국!"
 sino_indian.6.d: "적들을 물리치고 이제 도클람 영토에 대한 우리의 패권이 보장되었습니다!"
 sino_indian.6.d_RAJ: "부탄의 영토를 방어하는 데 실패했기 때문에 우리는 도클람을 중국에게 양보할 수밖에 없습니다."
 sino_indian.6.a: "영광스러운 승리다!"
 sino_indian.6.b: "굴욕적인 패배이다..."
 sino_indian.7.t: "도클람 분쟁에서 패배한 중국!"
 sino_indian.7.d: "적들로부터 도클람을 빼앗는 데 실패했기 때문에 우리는 정당하게 우리 땅에서 후퇴할 수밖에 없습니다."
 sino_indian.7.d_RAJ: "우리의 적들을 물리치고, 도클람에 대한 부탄의 주권은 보존되었습니다!"
 sino_indian.7.a: "영광스러운 승리다!"
 sino_indian.7.b: "굴욕적인 패배이다..."
 sino_indian.8.t: "결론 없이 끝난 도클람 분쟁"
 sino_indian.8.d: "이번 도클람 영토 분쟁에서 우리 측과 그들 측 모두 우위를 점하지 못했습니다."
 sino_indian.8.a: "평화롭군, 아직까지는..."
 sino_indian.9.t: "중국의 아루나찰프라데시 점령!"
 sino_indian.9.d: "우리의 적을 물리치고 적들에게 아루나찰 프라데시로 알려진 남티베트 영토에 대한 우리의 패권이 이제 보장되었습니다!"
 sino_indian.9.d_RAJ: "우리 영토를 방어하는 데 실패했기 때문에 우리는 아루나찰 프라데시를 중국에게 양보할 수밖에 없습니다."
 sino_indian.9.a: "영광스러운 승리다!"
 sino_indian.9.b: "굴욕적인 패배이다..."
 sino_indian.10.t: "중국의 아루나찰프라데시 점령 실패!"
 sino_indian.10.d: "우리의 적들로부터 이 국가를 빼앗는 데 실패했기 때문에 우리는 정당하게 우리의 땅에서 후퇴할 수밖에 없습니다."
 sino_indian.10.d_RAJ: "적들을 물리치고 아루나찰 프라데시에 대한 인도의 주권은 보존되었습니다!"
 sino_indian.10.a: "영광스러운 승리다!"
 sino_indian.10.b: "굴욕적인 패배이다..."
 sino_indian.11.t: "관계 회복 및 분쟁 해결을 위한 회담을 제안하는 중국"
 sino_indian.11.d: "중국의 과거 화해 조약은 두 국가 간의 국경 분쟁을 해결하는데만 중점을 두고 서로의 차이는 완전히 무시하는 양국 간의 조약을 제안함으로써 귀결되었습니다. 우리는 그들의 제안을 받아들여야 할까요, 아니면 현 상태를 고수해야 할까요?"
 sino_indian.11.a: "이 역사적인 제안을 우린 수락한다!"
 sino_indian.11.b: "중국인들은 믿을게 못된다!"
 sino_indian.12.t: "중국-인도 우호 조약"
 sino_indian.12.d: "중국과 인도가 우호 조약을 체결하여 두 지역 강국 사이에 존재했던 수십 년간의 원한과 의심이 종식되었습니다. 중국 측의 놀라운 일련의 화해 시도 이후 중국에 대한 인도 정부의 불만은 빠르게 사라졌습니다. 이 새롭고 놀라운 파트너십의 의미는 아직 밝혀지지 않았습니다."
 sino_indian.12.a: "평화와 외교를 위한 좋은 날이군!"
 sino_indian.12.b: "심히 염려되는 전개이다..."
 sino_indian.13.t: "인도를 우회하는 중국"
 sino_indian.13.d: "수십 년 동안 중국과 파키스탄은 인도에 대한 불신을 공유했기 때문에 긴밀한 전략적 파트너 관계를 유지해 왔습니다. 그러나 최근 중국이 파키스탄 방위 조약을 포기하고 양국 간 합동 군사 훈련과 투자 프로젝트를 중단하면서 상황이 바뀌기 시작했습니다. 중국은 이번 조치가 단순히 단기적인 분쟁이 아니라 중국 외교 정책의 장기적인 방향의 재조정을 의미한다는 신호를 인도에 전달하고 있는 것으로 알려졌습니다. 이러한 전개에 대한 인도의 대응은 아직 지켜봐야 할 것입니다."
 sino_indian.13.a: "중국이 새로운 동맹을 찾는군..."
 sino_indian.13.b: "이로써 뭐가 달라질 수 있을까?"
 arunachal_war.1.t: "Border Skirmish in Arunachal Pradesh"
 arunachal_war.1.d: "A minor clash along the Line of Actual Control has resulted in casualties and heightened tensions."
 arunachal_war.1.a: "Reinforce our positions."
 arunachal_war.2.t: "Renewed Border Incident"
 arunachal_war.2.d: "Another exchange of fire along the disputed border has strained morale and manpower."
 arunachal_war.2.a: "Hold the line."
 arunachal_war.3.t: "Arunachal Readiness Setback"
 arunachal_war.3.d: "Our forces in the region have suffered a reversal, degrading operational readiness along this front."
 arunachal_war.3.a: "Regroup and replenish."
 arunachal_war.4.t: "Border War Already Underway"
 arunachal_war.4.d: "A border conflict is already active in the disputed region. Further escalation is unnecessary."
 arunachal_war.4.a: "Noted."
 arunachal_war.20.t: "Victory at the Line of Actual Control"
 arunachal_war.20.d: "Our forces have prevailed in the border engagement, securing our territorial claim for now."
 arunachal_war.20.a: "Consolidate our gains."
 arunachal_war.21.t: "Defeat at the Line of Actual Control"
 arunachal_war.21.d: "Our forces were repulsed in the border engagement. The campaign has cost us men and momentum."
 arunachal_war.21.a: "Withdraw and reassess."
 arunachal_war.22.t: "Border War Canceled"
 arunachal_war.22.d: "The border conflict has been called off before a decisive outcome was reached."
 arunachal_war.22.a: "Stand down."
 arunachal_war.23.t: "Driven Back"
 arunachal_war.23.d: "We have been forced to yield ground in the border fighting. Our position has weakened."
 arunachal_war.23.a: "Fall back to defensible positions."
 arunachal_war.24.t: "Repelled the Attackers"
 arunachal_war.24.d: "Our forces successfully defended the disputed territory against the incursion."
 arunachal_war.24.a: "Fortify our positions."
 arunachal_war.25.t: "Border War Canceled"
 arunachal_war.25.d: "The border conflict has ended without a decisive outcome."
 arunachal_war.25.a: "Stand down."
 arunachal_war.30.t: "Escalation Decision"
 arunachal_war.30.d: "The border conflict has reached a critical juncture. We must decide how far we are willing to go."
 arunachal_war.30.a: "Absorb the loss and maintain stability."
 arunachal_war.30.b: "Escalate - press our war goal."
