 indonesia.76854.t: "Indonésia solicita anexação"
 indonesia.76854.d: "Depois de nos ajudar após o terremoto, o governo indonésio está solicitando que nos unamos a eles. Se nos juntarmos a eles, perderemos tudo pelo que lutamos, mas tudo em nome da paz. Se não nos unirmos a eles, veremos o conflito reiniciar mais uma vez..."
 indonesia.76854.a: "Vamos fazer isso"
 indonesia.76854.b: "Não."
 IND_disasters_mechanic: "A Má Sorte da Indonésia"
 IND_disasters_mechanic_desc: "Indonesia is very lucky to have an abundance of natural resources, manpower and will-power to charge through the 21st century.\nHowever, §HIndonesia faces many challenges§! that §Rhinder its progress§!. Accidents are a §Rcommon theme§!, which would easily be prevented if it were not for better care for a particular region.\n\nFor this reason, it is our duty and responsibility to pay more attention to our states in a timely manner in order to avoid a disastrous fate that would cause us serious harm.\n\nWe will continue to have disasters for a considerable amount of time, however if we tackle them quickly they eventually stop after some time!"
 IND_back_muslim: "Apoiando os Muçulmanos"
 IND_back_muslim_desc: "Somos uma nação islâmica! Portanto, devemos proteger nossos muçulmanos, não importa o custo. Fazendo isso, ganharemos apoio popular e erradicaremos qualquer ódio contra nós na maioria islâmica de Sulawesi.\n\n\n\nA negociação é inestimável e deve começar imediatamente!"
 IND_muslim: "Negociar termos com muçulmanos em Sulawesi"
 IND_muslim2: "Dar-lhes treinamento de combate adequado"
 IND_muslim3: "Estabelecer administradores locais"
 IND_muslim4: "Concluir as negociações"
 IND_muslim_generic: "Transferir milicianos para Sulawesi"
 IND_muslim_generic2: "Realocar projetos de construção cristãos"
 IND_muslim_generic3: "Fortificar Mesquitas"
 IND_back_papua: "Apoiando os Cristãos"
 IND_back_papua_desc: "Our Christians have been neglected for too long. It is our duty as a state to give representation and fair treatment to all of our Christians, regardless if they're a minority or not. They must be protected at all times!\n\n\n\nNegotiating is invaluable and must begin immediately!"
 IND_papua: "Negociar termos com os Cristãos"
 IND_papua2: "Dar-lhes uma representação maior"
 IND_papua3: "Educar sobre Guerra de Guerrilha"
 IND_papua4: "Prometer um cuidado melhor"
 IND_papua_generic: "Transferir milicianos para Papua"
 IND_papua_generic2: "Realocar projetos de construção islâmica"
 IND_papua_generic3: "Fortificar Igrejas"
 IND_back_noone: "Não Apoiar Ninguém"
 IND_back_noone_desc: "It is important that the state does not pick favorites over sensitive matters, such as that of religious conflict. We must begin the process of easing this tension, by both negotiations and militarization of points of conflict. \n\nDoing this will bring more calm to the Sulawesians and Papuans."
 IND_neutral: "Hold unifying rallies in various states"
