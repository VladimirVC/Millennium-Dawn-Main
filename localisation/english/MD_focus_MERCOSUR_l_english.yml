 mercosur.02.t: "Invitation to Join MERCOSUR as an Associate State"
 mercosur.02.d: "[FROM.GetName] has approached us with an offer to enter MERCOSUR as an associate state. The proposal stops short of full admission, but it would place us inside the orbit of a bloc that is clearly trying to recover its old ambition. Accepting would signal that our future is tied, at least in part, to the South American project."
 mercosur.02.a: "Accept the associate status."
 mercosur.02.b: "Decline for now."
 mercosur.03.t: "Associate Membership Accepted"
 mercosur.03.d: "[FROM.GetName] has accepted our invitation and agreed to enter MERCOSUR as an associate state. The step is modest on paper, yet politically meaningful: another capital has decided that staying near the bloc is safer than standing entirely apart from it."
 mercosur.03.a: "Excellent."
 mercosur.04.t: "Associate Membership Rejected"
 mercosur.04.d: "[FROM.GetName] has turned aside our offer, at least for now. Their government prefers distance to entanglement, and whatever interest existed in closer alignment was not strong enough to overcome caution. The door remains open, but it will have to be pushed again later."
 mercosur.04.a: "Unfortunate."
 mercosur.05.t: "Full Membership Talks Opened"
 mercosur.05.d: "Formal negotiations with [CHL.GetName] have begun. If these talks succeed, MERCOSUR will not merely claim continental relevance; it will prove it by drawing another state fully into its institutions."
 mercosur.05.a: "Proceed."
 mercosur.06.t: "Invitation to Join as a Full Member"
 mercosur.06.d: "[FROM.GetName] has invited us to settle the question of full membership in MERCOSUR once and for all. We may enter immediately, insist on a broader package of support and preparation before the final step, or decide that the moment is not yet right. Whatever we choose, the decision will signal how closely we intend to bind our future to the bloc."
 mercosur.06.a: "Accept immediate full membership."
 mercosur.06.b: "Accept, but request an accession package."
 mercosur.06.c: "Remain only an associate state."
 mercosur.07.t: "Accession Package Requested"
 mercosur.07.d: "[FROM.GetName] has accepted our entry in principle, but prefers that full membership be preceded by a broader package of investment, coordination, and political reassurance. Their accession will now unfold through a staged process, and how we handle it will shape the tone of their relationship with the bloc for years to come."
 mercosur.07.a: "Begin the work."
 mercosur.08.t: "Full Membership Rejected"
 mercosur.08.d: "[FROM.GetName] has declined full membership for the time being. Whether out of caution, pride, or domestic hesitation, they are not yet ready to let MERCOSUR become a permanent part of their political horizon."
 mercosur.08.a: "We will revisit this later."
 mercosur.09.t: "Associate Membership Talks Opened"
 mercosur.09.d: "Our diplomats have opened talks with [PRU.GetName] on associate membership in MERCOSUR. The proposal is modest enough to appear practical, yet significant enough to test whether the language of South American solidarity still carries weight in their capital."
 mercosur.09.a: "Proceed."
