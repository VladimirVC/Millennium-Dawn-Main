 centralkaz.3519.d: ""
 centralkaz.3519.a: ""
 TRK_ruhnama: "ルフナーマ"
 TRK_ruhnama_desc: "偉大な指導者テュルクメンバシュの指導の下、ルフナーマは我々の民族の魂の書であり、砂漠のオアシスであり、暗い夜の灯台である！それは三千年にわたるトルクメン人民の知恵と栄光を体現している。オグズ・カンの広大な帝国から今日の永世中立国まで、我々は常に自由と尊厳の守護者であった！"
