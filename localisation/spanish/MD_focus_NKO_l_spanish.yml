 NKO_propose_north_led_unification_yo_jong: "Proponer un Gobierno de Unidad"
 NKO_propose_north_led_unification_yo_jong_desc: "Los líderes del Sur probablemente no estarán de acuerdo con un trato que parecería removerlos del poder y potencialmente castigarlos por sus acciones pasadas. Un gobierno de unidad entre el Norte y el Sur es la mejor manera de seguir la causa de la reunificación coreana."
 NKO_propose_unity_government_yo_jong: "Proponer Unificación Liderada por el Norte"
 NKO_propose_unity_government_yo_jong_desc: "Desde nuestro justo sistema de bienestar hasta nuestra arma nuclear más fuerte, está claro que el modelo norcoreano es el camino a seguir para la península coreana. Debemos insistir en que deberíamos ser nosotros quienes lleven a Corea hacia un futuro poderoso y post-reunificación."
 NKO_pave_the_way_for_reunification_yo_jong: "Allanar el Camino para la Reunificación"
 NKO_pave_the_way_for_reunification_yo_jong_desc: "Ahora que se han dado grandes pasos hacia la normalización de las relaciones intercoreanas, podemos comenzar a hacer preparativos para la reunificación."
