 belarus_export.25.d: "[FROM.GetNameWithFlag] nos ofrece comprar sus últimos MLRS. ¿Aceptaremos comprarlos?"
 belarus_export.25.a: "Por supuesto que es una buena oferta."
 belarus_export.25.b: "No, rechazaremos su oferta."
