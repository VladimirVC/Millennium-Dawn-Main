 # Events
 # ========================
 MD_antarctica_news.1.t: "[FROM.GetName] Applies to Join Antarctic Treaty"
 MD_antarctica_news.1.d: "[FROM.GetName] has applied to join the Antarctic Treaty, signaling a potential shift in their foreign policy and commitment to environmental conservation. The Antarctic Treaty is an international agreement that regulates the use of Antarctica for peaceful purposes and scientific research, while also protecting the continent's unique ecosystem. [FROM.GetName]'s application to join the treaty has been met warm reactions from the international community, with some praising the move as a positive step towards global cooperation, while others express skepticism about [FROM.GetName]'s intentions and commitment to the treaty's principles. The application process will take a month to complete."
 MD_antarctica_news.1.a: "Time Will Tell"
 MD_antarctica_news.1.b: "It's About Time"
 MD_antarctica_news.2.t: "[FROM.GetName] Joins Antarctic Treaty"
 MD_antarctica_news.2.d: "Today, at [GetDateText], [FROM.GetName] has officially joined the Antarctic Treaty, becoming a member of the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. By joining the treaty, [FROM.GetName] has committed to upholding the principles of environmental conservation and international cooperation in Antarctica. This move has been met with positive reactions from the global community, with many praising [FROM.GetName] for their commitment to protecting the unique ecosystem of Antarctica and promoting peaceful collaboration among nations."
 MD_antarctica_news.2.a: "Another Member"
 MD_antarctica_news.2.b: "Let's Get To Work!"
 MD_antarctica_news.3.t: "[FROM.GetName] Strives to Leave Antarctic Treaty"
 MD_antarctica_news.3.d: "[FROM.GetName] decided today to leave the Antarctic Treaty. The Commission for the Conservation of Antarctic Marine Living Resources (CCAMLR) is giving them 2 years to dismantle any research stations they have in Antarctica and to avoid any prohibited activities, such as resource exploitation or military presence. The decision to leave the treaty has been met with mixed reactions from the international community, with some expressing disappointment and concern about the potential consequences for the environment and global cooperation, while others support [FROM.GetName]'s right to make their own decisions regarding their involvement in international agreements. The process of leaving the treaty will take 2 years to complete."
 MD_antarctica_news.3.a: "What a Shame"
 MD_antarctica_news.3.b: "We Have Better Things To Do"
 MD_antarctica_news.4.t: "[FROM.GetName] Leaves Antarctic Treaty"
 MD_antarctica_news.4.d: "[MD_antarctica_news_4_desc]"
 MD_antarctica_news.4.a: "The Treaty Is Weakened"
 MD_antarctica_news.4.b: "Whatever"
 MD_antarctica_news_4_desc_1: "After 2 years of leaving the Antarctic Treaty, [FROM.GetName] has officially left the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. Despite the warnings, the [FROM.GetName] has left the treaty while having a Research Station in Antarctica, which has caused global response from the Treaty members, including potential sanctions and diplomatic backlash."
 MD_antarctica_news_4_desc_2: "After 2 years of leaving the Antarctic Treaty, [FROM.GetName] has officially left the international agreement that regulates the use of Antarctica for peaceful purposes and scientific research. [FROM.GetName] has successfully dismantled any research stations in Antarctica and avoided any prohibited activities, such as resource exploitation or military presence, which has helped to mitigate potential consequences for the environment and global cooperation."
 MD_antarctica_news.5.t: "Open-Loop Utilities Detected in [FROM.GetAdjective] Antarctic Station"
 MD_antarctica_news.5.d: "During the recent observer mission, Treaty observers have detected the usage of Open-Loop Utilities in one of [FROM.GetAdjective] Antarctic research stations. This is a violation of the Antarctic Treaty, which prohibits any activity that may cause environmental harm or disrupt the ecosystem of Antarctica. The detection of Open-Loop Utilities has raised concerns among the Treaty members and may lead to diplomatic consequences."
 MD_antarctica_news.5.a: "Some people have to go cheap"
 MD_antarctica_news.5.b: "Well"
 MD_antarctica_news.6.t: "Illegal Laboratory Activities Detected in [FROM.GetAdjective] Antarctic Station"
 MD_antarctica_news.6.d: "During the recent observer mission, Treaty observers have detected illegal laboratory activities in one of [FROM.GetAdjective] Antarctic research stations. This behavior is unacceptable and a clear violation of Antarctic Treaty. The Consultative Parties of the Treaty will address this issue and take appropriate actions to ensure the protection of Antarctica's unique ecosystem and the integrity of the treaty."
 MD_antarctica_news.6.a: "This is unacceptable"
 MD_antarctica_news.6.b: "We have to do something about it"
 MD_antarctica_news.7.t: "Nuclear Weapon Research Detected in [FROM.GetAdjective] Antarctic Station"
 MD_antarctica_news.7.d: "During the recent observer mission, Treaty observers have detected nuclear weapon research in one of [FROM.GetAdjective] Antarctic research stations. This is a severe violation of the Antarctic Treaty, which prohibits any military activity or any activity that may cause environmental harm or disrupt the ecosystem of Antarctica. Using peaceful research station for construction and testing of nuclear weapons is an outrageous act that threatens the safety and security of the entire world. The Consultative Parties of the Treaty will take immediate and decisive actions to address this issue and hold those responsible accountable for their actions. The international community must come together to condemn this behavior and ensure that Antarctica remains a peaceful and protected environment for scientific research and cooperation."
 MD_antarctica_news.7.a: "This is outrageous!"
 MD_antarctica_news.7.b: "It was more important"
 MD_antarctica_news.8.t: "[FROM.GetName] Has Breached Antarctic Treaty Too Many Times"
 MD_antarctica_news.8.d: "After multiple breaches of the Antarctic Treaty, [FROM.GetName] has reached a critical point where the Consultative Parties of the Treaty has decided to remove them from the treaty and impose severe diplomatic consequences. The repeated violations of the treaty's principles and regulations have undermined the integrity of the agreement and threatened the protection of Antarctica's unique ecosystem. The Consultative Parties of the Treaty will take decisive action to ensure that [FROM.GetName] is held accountable for their actions and that the Antarctic Treaty remains a strong and effective framework for international cooperation and environmental conservation."
 MD_antarctica_news.8.a: "They bring it on themselves"
 MD_antarctica_news.8.b: "This is too much"
 MD_antarctica_news.9.t: "Heavy Winds Across Antarctica"
 MD_antarctica_news.9.d: "Heavy winds have been reported across Antarctica, affecting research stations. The Consultative Parties of the Treaty are monitoring the situation and providing support to ensure the safety of personnel and the integrity of ongoing research. The observer missions are temporarily suspended until the weather conditions improve."
 MD_antarctica_news.9.a: "Not good"
 MD_antarctica_news.10.t: "[FROM.GetName] Begins Construction of Antarctic Research Station"
 MD_antarctica_news.10.d: "[FROM.GetName] has begun construction of a new Antarctic research station, signaling their commitment to scientific research and environmental conservation in the region. The construction of the station is expected to take several months, and the Consultative Parties of the Treaty will closely monitor the progress to ensure that it complies with the principles and regulations of the Antarctic Treaty."
 MD_antarctica_news.10.a: "Splendid!"

 MD_antarctica.1.t: "Observer Mission Incoming"
 MD_antarctica.1.d: "[FROM.GetName] has dispatched Treaty observers to inspect one of our Antarctic research stations. The mission is expected to arrive in §Y7 days§!."
 MD_antarctica.1.a: "We will await their arrival"
 #.2 is a hidden event
 MD_antarctica.3.t: "Observer Mission Report: Open-Loop Utilities Detected"
 MD_antarctica.3.d: "The Treaty observers have completed their inspection of our Antarctic research station and have reported the detection of Open-Loop Utilities usage. This is a violation of the Antarctic Treaty and may lead to diplomatic consequences. The Consultative Parties of the Treaty requested action to replace the utilities with more environmentally friendly options."
 MD_antarctica.3.a: "We have to get rid of that"
 MD_antarctica.4.t: "Observer Mission Report: Illegal Laboratory Activities Detected"
 MD_antarctica.4.d: "The Treaty observers have completed their inspection of our Antarctic research station and have reported the detection of illegal laboratory activities. The Consultative Parties will not bring further consequences, if we cease all illegal activities in our station."
 MD_antarctica.4.a: "We have to do something about it"
 MD_antarctica.5.t: "Observer Mission Report: Nuclear Weapon Research Detected"
 MD_antarctica.5.d: "The Treaty observers have completed their inspection of our Antarctic research station and have reported the detection of nuclear weapon research. This is a severe violation of the Antarctic Treaty and will result in immediate diplomatic consequences. The Consultative Parties of the Treaty will take decisive action to address this issue and hold those responsible accountable for their actions, demanding immediate cessation of all nuclear research activities in our station."
 MD_antarctica.5.a: "We have to get rid of that immediately!"
 MD_antarctica.6.t: "Antarctic Treaty Breach: Too Many Violations"
 MD_antarctica.6.d: "Dear [ROOT.GetLeader],\n\nWe regret to inform you that your nation, [ROOT.GetName], has breached the Antarctic Treaty too many times, with a total of [?antarctica_station_reports] violations. As a result, the Consultative Parties of the Treaty have decided to remove [ROOT.GetName] from the treaty withing 2 years and impose severe diplomatic consequences. The repeated violations of the treaty's principles and regulations have undermined the integrity of the agreement and threatened the protection of Antarctica's unique ecosystem. We urge you to take this matter seriously and remove the research station, before the membership is revoked.\n\nSincerely,\nThe Consultative Parties of the Antarctic Treaty"
 MD_antarctica.6.a: "We have brought this on ourselves"
 MD_antarctica.7.t: "Impose Embargo on [FROM.GetName]?"
 MD_antarctica.7.d: "Due to the recent detection of nuclear weapon research in one of [FROM.GetAdjective] Antarctic research stations, the Consultative Parties of the Antarctic Treaty are considering imposing an embargo on [FROM.GetName]. This would involve restricting trade and diplomatic relations with [FROM.GetName] in response to their violation of the treaty's principles and regulations."
 MD_antarctica.7.a: "They have to pay for their actions"
 MD_antarctica.7.b: "It's not worth it"
 #.8 is a hidden event
 MD_antarctica.9.t: "Antarctic Station Module Damaged"
 MD_antarctica.9.d: "A module at one of our Antarctic research stations has been damaged by a blizzard. Engineers are preparing repairs and will start as soon as weather conditions improve."
 MD_antarctica.9.a: "Damn weather!"
 MD_antarctica.10.t: "Dismantle of the annexed country Antarctic Research Station"
 MD_antarctica.10.d: "Due to annexation of the country with a Research Station, the station has been dismantled."
 MD_antarctica.10.a: "Okay"

