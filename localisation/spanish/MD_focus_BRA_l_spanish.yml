 nestor_forster_embassador: "Nestor Forster como Embajador"
 eduardo_bolsonaro_embassador: "Eduardo Bolsonaro como Embajador"
 BRA_workers_party_alignment_decision_category: "Alineación del Partido de los Trabajadores"
 BRA_workers_party_alignment_decision_category_desc: "Lula y el Partido de los Trabajadores han llegado al poder. Lula y su partido han hecho una serie de promesas tanto al Centrão como a los extremistas dentro del país. ¿Cumpliremos nuestras promesas y volveremos a nuestros caminos socialistas? ¿O nos enfocaremos en reformas y nos convertiremos en un partido moderado que reciba un amplio apoyo por promesas diluidas? El tiempo dirá qué logrará el Partido de los Trabajadores durante su mandato.\n\nAlcanzar 100 significa que hemos cumplido con todas nuestras promesas. Por otro lado, 0 indica que no hemos cumplido con ninguna de ellas.\n\n§YAlineación del Partido de los Trabajadores§! Valor: [?BRA.BRA_brazilian_party_alignment|-50]"
 BRA_decision_support_radicals: "Apoyar a los Radicales"
 BRA_decision_support_radicals_desc: "Los radicales son quienes debemos apoyar."
 BRA_decision_support_reformists: "Apoyar a los Reformistas"
 BRA_decision_support_reformists_desc: "Debemos cumplir nuestras promesas."
 BRA_decision_the_road_to_el_dorado: "El Camino hacia El Dorado"
 BRA_decision_the_road_to_el_dorado_desc: "Manaus es una gran ciudad ligeramente aislada por su posición en la Amazonia. Invertir en carreteras y vías férreas puede ayudarnos a expandir la ciudad hacia un nuevo El Dorado."
 BRA_decision_expand_the_mining_industry: "Expandir la Industria Minera"
 BRA_decision_expand_the_mining_industry_desc: "Las industrias mineras locales pueden recibir subsidios para aumentar su producción."
 BRA_decision_increase_the_oil_production: "Aumentar la Producción de Petróleo"
 BRA_decision_increase_the_oil_production_desc: "La costa de la Amazonia está llena de yacimientos de petróleo sin explotar. Explotemos estos recursos."
 BRA_decision_increase_military_production: "Producción Militar Amazónica"
 BRA_decision_increase_military_production_desc: "Manaus tiene un buen potencial para algunas nuevas fábricas de armas."
 BRA_decision_tech_metal_industry_in_the_amazon: "Expandir la Minería de Metales Tecnológicos en la Amazonia"
 BRA_decision_tech_metal_industry_in_the_amazon_desc: "Se han descubierto varios yacimientos ricos en recursos cerca de los Andes, con impresionantes cantidades de cobre, litio y más, en las regiones occidentales del Amazonas. Establecer operaciones mineras de todo tipo en esta zona nos permitirá seguir impulsando la economía de nuestro país y aprovechar aún más la riqueza natural que el Amazonas puede ofrecer."
 BRA_bolsonaro_alignment_decision_category: "Alineación de Bolsonaro"
 BRA_bolsonaro_alignment_decision_category_desc: "Bolsonaro y los Conservadores han llegado al poder. ¿Cumpliremos nuestras promesas?"
 BRA_decision_gatter_conservative_support: "Obtener Apoyo Conservador"
 BRA_decision_gatter_conservative_support_desc: "Los conservadores son nuestra principal base de apoyo."
 BRA_decision_gatter_liberal_support: "Obtener Apoyo Liberal"
 BRA_decision_gatter_liberal_support_desc: "Los liberales son quienes debemos apoyar."
 BRA_decision_support_private_sector: "Apoyar al Sector Privado"
 BRA_decision_support_private_sector_desc: "El sector privado puede ayudarnos a mejorar nuestra economía."
 BRA_decision_support_militaries: "Apoyar a las Fuerzas Armadas"
 BRA_decision_support_militaries_desc: "Las Fuerzas Armadas mantienen el país seguro y estable."
 BRA_major_development_projects_decision_category: "Proyectos de Desarrollo Principales"
 BRA_major_development_projects_decision_category_desc: "El Ministro de Transportes y Obras Públicas nos ha presentado proyectos para desarrollar el territorio continental brasileño y mejorar nuestra economía. Han llamado a esas obras \"Grandes Desarrollos\" y tienen como objetivo la expansión y el desarrollo de varias regiones del país, en particular la Selva Amazónica, la cuenca Nordeste y los cauces de los ríos. Podemos optar por construir todos esos grandes desarrollos o solo algunos específicos, según las necesidades."
 BRA_decision_reduce_fires: "Reducir los Incendios"
 BRA_decision_reduce_fires_desc: "El Amazonas arde todos los años. No importa quién sea el presidente o gobernante, simplemente arde. Sin embargo, si hacemos un esfuerzo significativo, es posible reducir estos incendios. Podemos implementar esfuerzos específicos, campañas publicitarias y más para intentar frenar el avance de los incendios forestales."
 BRA_decision_safe_mining_expansion: "Expansión Segura de la Minería"
 BRA_decision_safe_mining_expansion_desc: "Podemos obtener algunos recursos del Amazonas para mejorar nuestra economía, pero debemos hacerlo con cuidado. Cuanto más cuidadosos seamos, más podremos crecer y desarrollar el Amazonas de manera rápida y, lo que es más importante, sostenible. Podemos aprovechar parte del terreno conservado de la selva amazónica que ha sido prospectado por sus recursos para tomar decisiones más conscientes con la conservación."
 BRA_anti_rw_rhetoric: "Retórica antiderecha"
 BRA_anti_rw_rhetoric_desc: "¡La derecha es lo peor para Brasil! ¡Necesitamos acabar con ellos ahora!"
 BRA_new_communist_government: "Nuevo gobierno comunista"
 BRA_new_communist_government_desc: "¡Para garantizar la estabilidad de la nación, el gobierno debe ser estable!"
 BRA_underwater_flotilla_desc: "La flota brasileña está bastante anticuada y es limitada. Es imperativo que ampliemos nuestra flota submarina para establecer nuestra posición como una potencia global."
 BRA_global_alignment: "Alineación global"
 BRA_global_alignment_desc: "¡Brasil se convertirá en un faro de prosperidad en todo el mundo!"
 BRA_focus_tree: "Árbol foco brasileño"
 BRA_legalize_independent_amazonian_development: "Legalizar el Desarrollo Independiente Amazónico"
 BRA_legalize_independent_amazonian_development_desc: "El desarrollo de la Amazonía está actualmente fuertemente regulado y no se permite realizarse de manera independiente por parte de las empresas individuales. Debemos considerar aflojar las regulaciones en los diversos sectores de desarrollo, permitiendo un desarrollo independiente por parte de las empresas de construcción, agricultura y minería."
 BRA_the_countryside: "El Campo"
 BRA_the_countryside_desc: "La mayoría de la población de Brasil reside en la costa este del país, pero varias zonas interiores, responsables de la producción de muchos de los productos agrícolas que exportamos y usamos en las ciudades, se encuentran en nuestro campo. Debemos considerar explorar y mejorar el campo y los beneficios que este aporta."
 BRA_expand_commercialized_sugar_cane: "Expandir la Producción Comercializada de Caña de Azúcar"
 BRA_expand_commercialized_sugar_cane_desc: "La caña de azúcar es uno de nuestros cultivos comerciales en Brasil. Debemos considerar expandir aún más la producción comercializada de caña de azúcar con la esperanza de fomentar un mayor desarrollo agroindustrial dentro del país."
 BRA_increase_grain_exports: "Aumentar las Exportaciones de Granos"
 BRA_increase_grain_exports_desc: "La agricultura en Brasil es una industria enorme, y la producción de granos ocupa una gran parte de ella. Debemos centrarnos en expandir la producción de granos e incrementar las exportaciones de granos al extranjero para reforzar nuestro dominio en las exportaciones del sector primario."
 BRA_coffee_plantations: "Plantaciones de Café"
 BRA_coffee_plantations_desc: "The climate of Brazil is exceptionally suited to coffee cultivation and we have been a major producer since the late 19th century. Targeted subsidies and expansion of commercialized coffee plantations will see a substantial bump in gross domestic product for the country."
 BRA_apirary_expansions: "Expansión de Apiarios"
 BRA_apirary_expansions_desc: "The rolling grasslands of Brazil and their meadows have gorgeous fields of flowers and the local vegetation is conducive to the production of fresh and organic honey. If we continue to expand the apiaries in these regions we can continue to expand our commercialized agrarian exports."
 BRA_tobacco_plantations: "Plantaciones de Tabaco"
 BRA_tobacco_plantations_desc: "La región noreste de nuestro país cuenta con varias plantaciones de tabaco que han ayudado a estabilizar y mantener la economía a flote en la zona."
 BRA_expand_corn_production: "Expandir la Producción de Maíz"
 BRA_expand_corn_production_desc: "Corn has become a pivotal resource in our economy. We should continue to exploit corn production for the sake of the country and for the diversification of the agricultural products we produce domestically."
 BRA_tea_plantations: "Plantaciones de Té"
 BRA_tea_plantations_desc: "Some regions have turned to tea production due to our climate being incredibly favorable for the growth of tea. We should continue to follow the trend set years ago and expand commercial tea plantations."
 BRA_vineyard_expansions: "Expansión de Viñedos"
 BRA_vineyard_expansions_desc: "Los viñedos de uvas en las vastas praderas y a lo largo de la costa producen algunas de las mejores uvas que el hemisferio occidental tiene para ofrecer. Por ende, los viñedos producen vino de renombre mundial que se exporta globalmente y es buscado en diversos mercados alrededor del mundo."
 BRA_amazonian_high_command: "Establecer el Alto Mando Militar Amazónico"
 BRA_amazonian_high_command_desc: "La selva amazónica cuenta con una amplia variedad de salidas potenciales para encuentros hostiles. Establecer el Alto Mando Militar Amazónico nos permitirá coordinar mejor con las fuerzas de seguridad locales, la recuperación ante desastres y coordinar respuestas para operaciones contra los carteles."
 BRA_air_trained_pilots_desc: "Entrenar a nuestros pilotos en vuelo directo nos llevará, en última instancia, a tener la mejor fuerza aérea posible."
 BRA_amazon_military_high_command: "¡Se creó el §YAlto Mando Militar Amazónico§!\n"
 BRA_banned_all_amazonian_private_development: "Se prohibió todo el Desarrollo Privado Amazónico."
 BRA_amazon_invested_in_the_amazon: "La Amazonía invirtió en la selva amazónica."
 BRA_idea_amazonian_development_project_desc: "Ha comenzado la gran tarea de desarrollar la Amazonía. Hemos comenzado a eliminar la burocracia en la región, abriendo nuevas oportunidades económicas tanto para las entidades privadas como para el gobierno."
 BRA_idea_oncoming_debt_crisis: "Crisis de Deuda Inminente."
 BRA_idea_oncoming_debt_crisis_desc: "The debt in Brazil is currently looming over our country like a dark cloud. Recent fiscal measures has allowed us to alleviate a large number of the issues, but we are still on the verge of being unable to pay our debts. We can explore a few options such as foreign aid packages or we can look at reinstating the IMF debt rules on our nation.\n\n\nThis national spirit will cancel if your nation's §YDebt-to-GDP§! falls below §G20%§! (Current Ratio: [?THIS.debt_ratio|%])"
 BRA_idea_worsening_debt_crisis: "Crisis de Deuda en Empeoramiento"
 BRA_idea_worsening_debt_crisis_desc: "The failure to come to a deal with the United States has seen the further collapse of the Real. The economy of our nation is slowly slipping further and further away from our grasp if we do not make a change soon. Our only hope from here is to pay off as much of our debt as quickly as we can.\n\n\nThis national spirit will cancel if your nation's §YDebt-to-GDP§! falls below §G20%§! (Current Ratio: [?THIS.debt_ratio|%])"
 BRA_idea_foreign_debt_assistance: "Asistencia para la deuda externa"
 BRA_idea_foreign_debt_assistance_desc: "Estados Unidos nos ha proporcionado un paquete de ayuda exterior para aliviar algunos de nuestros problemas de deuda. Mediante una serie de medidas específicas, la Reserva Federal de Estados Unidos recompró nuestra deuda a inversores privados estadounidenses y nos eximió de la obligación de deuda."
 BRA_idea_brazilian_exports_desc: "Brasil es una de las mayores economías exportadoras del mundo. La mayoría de sus exportaciones son productos agrícolas y recursos primarios, como minerales y madera."
 BRA_idea_pro_unions_desc: "La transición de una economía agraria a una economía manufacturera requiere que seamos pro-sindicatos para garantizar que todos los trabajadores del país tengan mejores derechos."
 BRA_idea_pro_industries_desc: "La expansión de nuestra base industrial ha comenzado a impulsar nuestra economía a nuevas alturas y ahora es el momento de consolidarnos como proindustria."
 BRA_idea_enraged_natives: "Nativos enfurecidos"
 BRA_idea_enraged_natives_desc: "The native peoples of Brazil are currently enraged with the government. They cite a variety of issues such as disproportionate pay, poor treatment of workers, and widespread native poverty. If we choose not to support the native people's plight we may see more widespread issues."
 BRA_idea_friendly_natives_desc: "The continued changes in government structure and laws have shifted the disposition of the native peoples in our favor. If we continue to maintain our course, the native people of Brazil will continue to support the government."
 BRA_idea_new_wave_ideas_desc: "Ha llegado el momento de empezar a consolidarnos como una nueva potencia en el escenario mundial. Muchas personas de todo Brasil han comenzado a apoyar una multitud de nuevas ideas a medida que desarrollamos y definimos el nuevo camino a seguir para nuestro gran país."
 BRA_idea_restricted_travelers_desc: "La plaga de viajeros en nuestro gran país finalmente ha comenzado a detenerse. Hemos aplicado una serie de regulaciones y restricciones que limitan el número de viajeros dentro de nuestro gran país."
 BRA_idea_extensive_border_control_desc: "Hemos establecido amplios controles fronterizos en nuestras fronteras para impedir la entrada de migrantes de países extranjeros."
 BRA_idea_diplomatic_powerhouse_desc: "Brasil se ha consolidado como una potencia diplomática. Nuestra fuerza no reside sólo en nuestra capacidad de combate, sino también en nuestra capacidad de mantenernos en el exterior."
 BRA_idea_the_international_mediator_desc: "Brasil, al ser el país más grande de Sudamérica, se encuentra en una posición particularmente interesante, ya que no participa en la mayor parte de la política mundial y no tiene mucho que ganar siendo parcial. La posición en la que nos encontramos nos permite ser mediadores en las situaciones más difíciles, en las que otros pueden no ser parciales. Además, nuestro gran país se encuentra perfectamente entre Oriente y Occidente, lo que nos permite mediar en conflictos entre diversos actores."
 BRA_idea_neo_comunista_desc: "El Partido de los Trabajadores ha adoptado oficialmente su forma más verdadera y definitiva. Ha adoptado el camino comunista y ahora es verdaderamente el partido de la libertad, de la igualdad y del nuevo camino para Brasil y su futuro."
 BRA_idea_radical_leftist_desc: "El Partido de los Trabajadores se ha convertido en un partido verdaderamente radical. Ha adoptado partidos de extrema izquierda y aboga activamente por la disolución de los estados capitalistas en todo el mundo."
 BRA_idea_slightly_radical_desc: "El Partido de los Trabajadores ha comenzado su transformación en un partido radical. Ha adoptado a algunos partidos de extrema izquierda y está empezando a abogar activamente por la disolución de los estados capitalistas en todo el mundo."
 BRA_idea_well_balanced_desc: "El Partido de los Trabajadores sigue manteniendo su delicado equilibrio entre lo radical y lo reformista. El partido sigue siendo atractivo para todos los sectores de la sociedad, ya que sigue defendiendo la retórica socialista sin desanimar a los elementos extremistas ni a los miembros del Centrão."
 BRA_idea_slightly_reformistq_desc: "El Partido de los Trabajadores ha cambiado de rumbo. El partido ya no cree en una conversión radical de la república brasileña, sino en reformas graduales y específicas. El cambio de postura ideológica ha provocado que algunos elementos más extremistas abandonen el grupo."
 BRA_idea_modern_reformist_desc: "The Workers' Party has shifted its course. The party no longer believes in radical conversion of the Brazilian republic but rather gradual and targeted reforms. The change in ideological stance has caused more extreme elements to leave the party, threatening to drive away larger swaths of radicals who formed a large part of the support base. However, by contrast more and more members of the Centrão are flocking to the party in droves."
 BRA_idea_party_of_progress_desc: "The Workers' Party has shifted its course. The party no longer believes in radical conversion of the Brazilian republic but rather gradual and targeted reforms. The change in ideological stance has caused the extreme elements to leave the party, the majority of them seeking parties that truly wish to see the state broken down and rebuilt brick by brick. This is no longer the view of the Workers' Party, which has rebranded itself as the Party of Progress and begun extensive political reforms across the various institutions of Brazil."
 BRA_idea_imbel_desc: "Indústria de Material Bélico do Brasil (IMBEL, English: Brazilian War Material Industry) is the Brazilian government's primary defence contractor. It was founded in the early 1930s as Fábrica de Canos e Sabres para Armas Portáteis, which directly involved the Brazilian Army in production quotas. It was not until the late 1970s that IMBEL would be formally established by Law no. 6227, which created IMBEL with the express purpose of promoting the war materiel industry through direct private investment."
 BRA_idea_modern_artillery_desc: "Expanding and modernizing the artillery stockpile that the country has access to will allow us to further establish ourselves as one of the world's foremost military powers."
 BRA_idea_homemade_rifles_desc: "Diseñar rifles que se puedan construir en casa utilizando kits rápidos que se pueden desarrollar en fábricas de todo tipo para ayudar a construir rifles en sus hogares o en sus sótanos. El costo de producción y la capacidad de producir estas armas permitirán que nuestro país esté más preparado para el futuro."
 BRA_idea_strength_on_land_desc: ""
 BRA_idea_modern_armor_desc: "Nuestro cuerpo blindado necesita modernizarse con la última tecnología disponible, ya sea en el mercado o en la producción aquí en casa."
 BRA_idea_braco_forte_mao_amiga_desc: "El lema del Ejército brasileño, \"Braço Forte Mão Amiga\", o \"Brazo fuerte, mano amiga\", evoca un sentimiento de verdadero nacionalismo y patriotismo. El ejército es uno de los logros de los que Brasil se enorgullece más y, como tal, es imperativo que sigamos manteniendo un ejército numeroso para honrar su rica y vibrante historia, desde nuestra Guerra de la Independencia hasta las recientes incursiones de las Fuerzas Armadas Revolucionarias de Colombia. Haremos honor a nuestro lema y emplearemos un brazo fuerte, pero una mano siempre amistosa, con aquellos que no deseen oponérnosnos."
 BRA_idea_underwater_flotilla_desc: ""
 BRA_idea_reform_the_navy_desc: ""
 BRA_idea_french_naval_studies_desc: ""
 BRA_idea_protegendo_nossas_riquezas_desc: ""
 BRA_idea_associate_states_desc: "[THIS.GetNameWithFlag] es un Estado asociado del MERCOSUR. El miembro asociado tiene la capacidad de hablar y hacer oír su voz en la organización, pero no es miembro pleno y con derecho a voto del bloque."
 BRA_idea_mercosur_trade_agreement_desc: ""
 BRA_idea_mercosur_education_integration_desc: ""
 BRA_idea_mercosur_people_goods_desc: ""
 BRA_idea_eu_trade_agreement_desc: ""
 BRA_idea_olavo_de_carvalho: "Olavo de Carvalho"
 BRA_idea_olavo_de_carvalho_desc: ""
 BRA_idea_improved_military_conditions_desc: ""
 BRA_idea_volunteer_reformation_desc: ""
 BRA_idea_harsher_conscription_desc: ""
 BRA_idea_liberal_economy_desc: ""
 BRA_idea_nationalism_rise2_desc: ""
 BRA_idea_globo_influence_desc: ""
 BRA_idea_globo_disbanded_desc: ""
 BRA_idea_nationalised_globo_desc: ""
 BRA_idea_monarchism: "Ideales monárquicos"
 BRA_idea_monarchism_desc: "Siguiendo ideales conservadores y nacionalistas, los ideales monárquicos creen en un gobierno monárquico, manteniendo los antiguos valores."
 BRA_idea_electoral_media: "Medios electorales"
 BRA_idea_electoral_media_desc: "Las redes sociales son una verdadera herramienta para la nueva era. Es imperativo que aprovechemos esta nueva herramienta para nuestro beneficio y aseguremos nuestra victoria en las próximas elecciones utilizando esta nueva herramienta revolucionaria."
 BRA_idea_car_wash: "Operación lavado de autos"
 BRA_idea_car_wash_desc: "Operation Car Wash is the landmark anti-corruption probe that began with a small money-laundering investigation at a car wash in Brasília. The probe quickly began to spiral, and various state-owned enterprises, politicians from all levels, and businessmen from all walks of life have been caught in the crossfire. Time will tell how deep the rot truly goes."
 BRA_idea_liberalism_desc: ""
 BRA_idea_social_democracy_desc: ""
 BRA_idea_new_coalition: "La Nueva Coalición"
 BRA_idea_new_coalition_desc: "La nueva coalición de izquierda, con PT, PCdoB, PMDB, PPS y PSTU."
 BRA_idea_pro_psdb_youth_desc: ""
 BRA_idea_federalization: "Federalización"
 BRA_idea_federalization_desc: ""
 BRA_idea_mensalao_desc: ""
 BRA_idea_social_enterprises: "Empresas Sociales"
 BRA_idea_social_enterprises_desc: ""
 BRA_idea_higher_minimun_wage: "Aumento del salario mínimo"
 BRA_idea_higher_minimun_wage_desc: ""
 BRA_idea_agrarian_reform_desc: ""
 BRA_idea_space: "Esfuerzos espaciales brasileños"
 BRA_idea_space_desc: ""
 BRA_idea_fossil_fuel_industry_desc: "La industria de combustibles fósiles [BRA.GetAdjective] es un actor importante en el mercado mundial de combustibles fósiles y es imperativo que sigamos apoyando a esta industria extremadamente vital."
 BRA_idea_lulismo_desc: ""
 BRA_idea_bolsonarismo_desc: ""
 BRA_idea_ideological_revolution: "Revolución ideológica"
 BRA_idea_ideological_revolution_desc: ""
 BRA_idea_guns_allowed_desc: ""
 BRA_idea_fight_influence: "Lucha contra la influencia extranjera"
 BRA_idea_fight_influence_desc: ""
 BRA_idea_parties_left: "Partidos de Izquierda"
 BRA_idea_parties_left_desc: ""
 BRA_idea_pax_brasilis_desc: ""
 BRA_idea_bolsonaro_conservative_influence_desc: ""
 BRA_idea_bolsonaro_liberal_influence_desc: ""
 BRA_idea_supporting_private_sector_desc: ""
 BRA_idea_supporting_military_desc: ""
 BRA_idea_brazilian_space_force_desc: "The Brazilian people must be defended at all costs — on land, at sea, in the air, and on our new frontier. We must establish the Brazilian Space Force as a new military branch to handle the defence of all our assets both within and beyond the atmosphere."
 BRA_idea_support_from_the_teachers_desc: ""
 BRA_idea_brazilian_research_and_development_desc: ""
 BRA_idea_scientific_advances_desc: ""
 BRA_idea_education_reforms_desc: ""
 BRA_idea_imperial_university_desc: ""
 BRA_idea_trained_pilots: "Pilotos entrenados"
 BRA_idea_trained_pilots_desc: ""
 BRA_idea_psl_growth: "Ascenso del PSL"
 BRA_idea_psl_growth_desc: "El Partido Social Liberal ha comenzado a ganar una enorme cantidad de fuerza. Está en ascenso y, si sigue el rumbo actual, se encamina hacia la victoria en las próximas elecciones."
 BRA_idea_brazil_energy: "Energía Verde"
 BRA_idea_brazil_energy_desc: "A series of government-led initiatives has seen an expansion of green energy as we move towards a greener country. The programs have already begun to yield dividends as various solar and wind companies expand our green infrastructure and add power to the energy grid."
 BRA_legalize_independent_amazonian_development_tt: "Legalizaremos el §YDesarrollo Privado Independiente§! de la selva amazónica y de los estados que contienen partes de la selva amazónica.\n\n¡Legalizar el §YDesarrollo Privado Independiente§! significa que tendremos eventos en los que empresas privadas desarrollarán la selva amazónica, brindando §YIndustrias§!, recursos y más de forma gratuita al costo de §YSuperficie Conservada§!.\n"
 BRA_conserv_acreage_effect_tt: "Cambios en la §Ysuperficie total de bosque tropical conservado§! por [?temp_change|+] (Superficie actual de bosque tropical conservado: [?BRA_acres_conserved|Y])"
 BRA_wild_acreage_effect_tt: "¡Cambios en la §Ysuperficie total de selva tropical silvestre§! por [?temp_change|+]  (Superficie actual de bosque tropical salvaje: [?BRA_acres_wild|Y])"
 BRA_target_acreage_effect_tt: "Cambios en la §Ysuperficie total de selva tropical prevista por el gobierno§! por [?temp_change|+]  (Superficie de selva tropical prevista actualmente: [?BRA_acres_target|Y])"
 BRA_acre_rate_gain_effect_tt: "¡Cambios en la §Yganancia mensual total de superficie de bosque tropical silvestre§! por [?temp_change|+]  (Aumento mensual actual de la superficie de bosque tropical salvaje: [?BRA_acre_rate_gain|Y])"
 BRA_acre_rate_loss_effect_tt: "Cambios en la §Ypérdida mensual total de superficie de bosque tropical lluvioso silvestre§! por [?temp_change|+] (Pérdidas mensuales actuales de superficie de bosque tropical silvestre: [?BRA_acre_rate_loss|Y])"
 BRA_acres_conserved_change_effect_tt: "Cambios en la §YTasa de conversión de superficie de bosque tropical conservado§! por [?temp_change|+] (Tasa actual de conversión de superficie de bosque tropical conservado: [?BRA_acres_conserved_change|Y])"
 BRA_amazonian_high_command_tt: "¡Establece el §YAlto Mando Amazónico§! ¡Permitiéndote utilizar al ejército en eventos relacionados con la §YSelva Amazónica§!\n"
 BRA_worker_party_alignment_effect_tt: "¡Cambie la §Yalineación del Partido de los Trabajadores§! por [?temp_change|+] (Alineación actual del Partido de los Trabajadores: [?BRA_brazilian_party_alignment|Y0])"
 BRA_decision_transposition_saofrancisco: "Transposición del río São Francisco"
 BRA_decision_transposition_saofrancisco_desc: "La transposición del río São Francisco es un proyecto para desviar parte de las aguas del río São Francisco en Brasil. Denominado por el gobierno brasileño como \"Proyecto de Integración del Río São Francisco con las Cuencas Hidrográficas del Nordeste Norte\", el proyecto es una iniciativa del gobierno federal bajo la responsabilidad del Ministerio de Desarrollo Regional. El proyecto implica la construcción de más de 700 kilómetros de canales de hormigón en dos grandes ejes (norte y este) a través del territorio de cuatro estados (Pernambuco, Paraíba, Ceará y Rio Grande do Norte) para desviar las aguas del río. A lo largo del camino, el proyecto incluye la construcción de nueve estaciones de bombeo de agua. También existe la posibilidad de ampliar el proyecto para incluir un eje sur, que abarca Bahía y Sergipe, y un eje oeste, en Piauí."
 BRA_decision_bacia_tocantins: "Colonizar la Cuenca Hidrográfica del Tocantins Araguaia"
 BRA_decision_bacia_tocantins_desc: "La cuenca del río Araguaia-Tocantins es una de las doce regiones hidrográficas de Brasil. Los principales ríos de la cuenca son el Tocantins y el Araguaia. Es la cuenca hidrográfica más grande de Brasil."
 BRA_decision_army_projects: "Oficina de Proyectos para Financiar el Ejército"
 BRA_decision_army_projects_desc: "La Oficina de Proyectos del Ejército tiene como objetivo proporcionar a las unidades operativas productos de defensa esenciales para su empleo operativo en su nivel mínimo."
 BRA_decision_improve_dockyards: "Mejorar nuestros astilleros"
 BRA_decision_improve_dockyards_desc: "Nuestros astilleros en [890.GetName] y en [885.GetName] necesitan ser ampliados y mejorados. Deberíamos explorar y estudiar la posibilidad de ampliar estos astilleros para permitir la producción de buques cada vez más grandes."
 BRA_decision_amazonian_projects: "Proyectos industriales amazónicos"
 BRA_decision_amazonian_projects_desc: "Es hora de establecer una serie de proyectos industriales amazónicos para ampliar la capacidad industrial civil del estado de [892.GetName]."
 BRA_amazon_conservation_system_decision_category: "Conservación de la selva amazónica"
 BRA_amazon_conservation_system_decision_category_desc: "\n£BRA_desctext_amazon\n\n\n\nThe Amazon Rainforest is truly one of the world's greatest wonders and we are one of the lucky nations to house its beauty within our borders. The resources the rainforest boasts also makes it an attractive subject for our politics about using it for economic development.\n\n\nThe Amazon Rainforest mechanic requires you to keep your §YTotal Amazon Acreage§! close to its target or exceeding the §YTotal Targeted Acreage§!. If we do not maintain this balance we will start to suffer penalties in our Amazonian states and we will start to see progressively worse events fire depending on how much of the rainforest has been destroyed. The §YTotal Amazon Acreage§! is comrpised of §YWild Amazon Acreage§! and §YConserved Amazon Acreage§!. We gain or lose additional §YWild Acreage§! every month based on decisions we make on economic policy regarding the §YAmazonian States§!.\n\nMaintaining a high ratio of §YTotal Conserved Amazon Acreage§! will bring higher benefits long-term, but slashing and burning will also allow us to exploit things like mineral wealth, §YBuildings§!, and §YBuilding Slots§!.\n\nTotal Targeted Rainforest Acreage: [?BRA_acres_target]\nTotal Rainforest Acreage: [?BRA_acres_current]\n\nTotal Wild Rainforest Acreage: [?BRA_acres_wild] (Ratio: [?BRA_wild_acreage_ratio|%1])\nTotal Conserved Wild Amazon Acreage: [?BRA_acres_conserved] (Ratio: [?BRA_conserved_acreage_ratio|%1])\n\nConserved Rainforest Acreage Conversion Rate: [?BRA_acres_conserved_change|+]\nWild Rainforest Acreage Monthly Gain: [?BRA_acre_rate_gain|+]\nWild Rainforest Acreage Year Monthly Loss: [?BRA_acre_rate_loss|-]\nNet Monthly Amazon Acreage: [?BRA_net_acreage|+] Acres a Month"
 BRA_decision_plant_additional_trees: "Plantar árboles adicionales"
 BRA_decision_plant_additional_trees_desc: "Podemos replantar porciones de la selva amazónica en nuestras zonas de conservación para ayudarnos a alcanzar la superficie objetivo de selva tropical."
 BRA_decision_declare_new_conservation_lands: "Declarar nuevas tierras de conservación"
 BRA_decision_declare_new_conservation_lands_desc: "La declaración de algunas nuevas tierras de conservación puede ayudar a frenar la ola de actividades ilegales como la tala ilegal o la tala y el roce con quema."
 BRA_decision_establish_amazonian_national_park_service: "Establecer el SNUC"
 BRA_decision_establish_amazonian_national_park_service_desc: "Es hora de establecer el nuevo Sistema Nacional de Unidades de Conservación de la Naturaleza (SNUC). Aunque la idea del SNUC existe desde la década de 1970, cuando fue desarrollado por primera vez por el Instituto Brasileño de Desarrollo Forestal y la Fundación Brasileña para la Conservación de la Naturaleza como un medio para ayudar a estandarizar la conservación de la naturaleza en Brasil, ahora es el momento de adoptar esta metodología y ponerla en práctica para el bien de todo Brasil."
 BRA_decision_expand_rubber_production_on_the_coast: "Ampliar la producción de caucho en la costa"
 BRA_decision_expand_rubber_production_on_the_coast_desc: "El caucho es uno de los recursos vitales de la Amazonia y del Brasil. Ampliar la producción y plantar más árboles a lo largo de la costa para la producción de caucho nos dará otro impulso a los ingresos y reforzará nuestro dominio en el mercado mundial de recursos."
 BRA_decision_expand_the_gold_mining_initiatives: "Iniciativas ampliadas de minería de oro"
 BRA_decision_expand_the_gold_mining_initiatives_desc: "Deberíamos ampliar las iniciativas de extracción de oro en la Amazonía a lo largo de los ríos y arroyos."
 BRA_decision_halt_independent_developments: "Detener los desarrollos independientes"
 BRA_decision_halt_independent_developments_desc: "La reciente legalización de las empresas privadas que explotan la Amazonia ha empezado a talar demasiado la selva con su rápida industrialización de la vegetación. Podemos detener las explotaciones por el momento para intentar darnos un respiro y establecer nuevas políticas y comenzar a replantar de forma selectiva."
 BRA_decision_continue_independent_developments: "Continuar con los desarrollos independientes"
 BRA_decision_continue_independent_developments_desc: "Creemos que estamos listos para comenzar a desarrollar nuevamente la Amazonia. Deberíamos redactar nuevamente algunas comunicaciones a las empresas de desarrollo privadas para que comiencen a desarrollar nuevamente la Amazonia."
 BRA_decision_permanently_ban_private_development: "Prohibición permanente del desarrollo privado en la Amazonía"
 BRA_decision_permanently_ban_private_development_desc: "We will permanently ban all private Amazonian development. This is wildly popular with the green parties of the country, who will gain significant political ground as a result."
 BRA_decision_initial_investment: "Inversión inicial"
 BRA_decision_initial_investment_desc: "Se han propuesto varios proyectos de desarrollo para desarrollar partes de la Amazonia. Para ello, es necesario realizar una gran inversión inicial para comenzar a organizar y desarrollar estos proyectos."
 BRA_amazon_modifier: "La selva amazónica: esfuerzos locales de conservación"
 BRA_amazon_modifier_desc: "La selva amazónica es la selva tropical más grande del mundo. A nosotros, los brasileños, se nos ha concedido el derecho de ser sus guardianes. El uso no regulado de los recursos de la selva tropical podría provocar protestas generalizadas, exacerbar los problemas del cambio climático y mucho más. Sin embargo, si somos capaces de gestionar la selva al máximo de nuestras capacidades, realmente podemos liberar el poder económico de la selva tropical y permitir que nuestra gran nación prospere.\n\nPodemos reducir las sanciones a nivel estatal incrementando nuestra §YRelación Total de Superficie Conservada§! así como implementando la §YInversión Interna§! §YMejorar los Esfuerzos Locales de Conservación§! para el alivio local. No sufrimos ninguna penalización cuando nuestro §YÍndice de superficie total conservada§! está en 100% (Actual: [?BRA_conserved_acreage_ratio|0%])."
 BRA_amazon_country_modifier: "La selva amazónica: esfuerzos de conservación a nivel nacional"
 BRA_amazon_country_modifier_desc: "La selva amazónica es la selva tropical más grande del mundo. A nosotros, los brasileños, se nos ha concedido el derecho de ser sus guardianes. El uso no regulado de los recursos de la selva tropical podría provocar protestas generalizadas, exacerbar los problemas del cambio climático y mucho más. Sin embargo, si somos capaces de gestionar la selva al máximo de nuestras capacidades, realmente podemos liberar el poder económico de la selva tropical y permitir que nuestra gran nación prospere.\n\n¡Podemos reducir estas penalizaciones aumentando su §YSuperficie total§! más allá de la §YSuperficie objetivo§!(Actual: [?BRA_current_target_ratio|%0])."
 BRA_native_violence_modifier: "Violencia nativa"
 BRA_native_violence_modifier_desc: "En [THIS.GetName] ha estallado una violencia entre la población indígena local y los distintos promotores inmobiliarios de la región. Es sólo cuestión de tiempo que esta violencia se convierta en algo mucho más grave..."
 brazil_amazon.1.t: "Incendios forestales desenfrenados"
 brazil_amazon.1.d: "Una serie de incendios forestales naturales, aunque exacerbados por otras condiciones, han comenzado a devastar una sección de la Amazonía dentro de nuestro territorio. Ya hemos comenzado a organizar una respuesta, pero el daño que se ha causado no se puede revertir. Solo podemos esperar detener cualquier propagación adicional."
 brazil_amazon.1.a: "Hagamos lo que podamos con lo que tenemos."
 brazil_amazon.1.b: "Desplegar el Ejército para ayudar."
 brazil_amazon.2.t: "Inundación del río Amazonas"
 brazil_amazon.2.d: "Una serie de inundaciones, impulsadas por una temporada particularmente lluviosa, han inundado varias secciones del río Amazonas cerca de nuestros centros de desarrollo. Las operaciones de búsqueda y rescate ya están en marcha, y los equipos de control de daños están siguiéndolas de cerca. Sin embargo, algunas áreas, como nuestras represas en la región, ya han sufrido daños significativos."
 brazil_amazon.2.a: "Hagamos lo que podamos con lo que tenemos"
 brazil_amazon.2.b: "Desplegar el ejército para ayudar en la búsqueda y el rescate"
 brazil_amazon.3.t: "Sequía en las regiones fronterizas de la Amazonía"
 brazil_amazon.3.d: "Debido a la contaminación de las aguas subterráneas y al desvío de los ríos en las regiones aledañas a la Amazonia, una sequía causada por la escasez de lluvias ha golpeado una de nuestras regiones fronterizas. Ya hay una histeria generalizada, acompañada de la pérdida de partes de los delicados ecosistemas forestales de la región fronteriza."
 brazil_amazon.3.a: "Deberían gestionar mejor el agua"
 brazil_amazon.3.b: "¡Despleguemos toda la ayuda en caso de desastre que podamos, rápidamente!"
 brazil_amazon.4.t: "Tormenta tropical azota regiones amazónicas"
 brazil_amazon.4.d: "Una tormenta tropical originada en el Atlántico ha arrasado la Amazonia, dejando tras de sí un rastro de destrucción. Casas, árboles e industrias han sufrido daños, y ya se han puesto en marcha operaciones de búsqueda y rescate. La gente estará esperando que respondamos con algún tipo de ayuda en caso de desastre."
 brazil_amazon.4.a: "Ellos deberían construir cosas más robustas"
 brazil_amazon.4.b: "¡Despleguemos toda la ayuda en caso de desastre que podamos, rápidamente!"
 brazil_amazon.5.t: "Tala ilegal"
 brazil_amazon.5.d: "Hemos sido informados de una operación de tala ilegal en la periferia de la Amazonia. Ya se han sacado toneladas de madera del lugar y han comenzado a circular en la economía sin que se las haya marcado y, muy probablemente, no podamos rastrearlas. Ahora solo nos queda ocuparnos de los efectos inmediatos."
 brazil_amazon.5.a: "Hagamos lo poco que podamos en este momento"
 brazil_amazon.5.b: "Ellos saben el trato, ¿dónde está nuestro corte?"
 brazil_amazon.6.t: "Tala y quema ilegal"
 brazil_amazon.6.d: "Hemos sido informados de una operación ilegal de tala y quema en la periferia de la Amazonia. Ya se han destruido varias hectáreas de tierra que ahora se están arando para convertirlas en tierras de cultivo, para el pastoreo del ganado o para la construcción de nuevos proyectos. Como estas personas pueden ser expulsadas fácilmente si las autoridades locales deciden hacerlo, solo nos queda ocuparnos de las consecuencias inmediatas."
 brazil_amazon.6.a: "Hagamos lo poco que podamos en este momento."
 brazil_amazon.6.b: "Ellos saben el trato, ¿dónde está nuestro corte?"
 brazil_amazon.7.t: "Empresa compra tierras de conservación locales"
 brazil_amazon.7.d: "Una empresa local del país ha comenzado a comprar algunos de los derechos de conservación de tierras que hemos puesto en el mercado recientemente. Buscan explotar las reservas locales de recursos de oro, cobre y otros materiales de la zona."
 brazil_amazon.7.a: "Se estimula el crecimiento y se encuentran recursos"
 brazil_amazon.8.t: "La tala y quema provoca incendios forestales"
 brazil_amazon.8.d: "Una reciente operación de tala y quema de la que nos enteramos parece haber continuado a pesar de nuestras intervenciones. De hecho, se han vuelto más descaradas que antes, lo que ha provocado un incidente en el que los incendios se han extendido sin control."
 brazil_amazon.8.a: "Esos malditos tontos."
 brazil_amazon.8.b: "Afortunadamente, nos hemos preparado para esa posibilidad."
 brazil_amazon.9.t: "La caza furtiva provoca el colapso del ecosistema"
 brazil_amazon.9.d: "An illegal poaching ring has recently been uncovered operating within one region of the Amazon. Their activities have already begun the process of ecosystem collapse within their area of operations. As these persons can be easily dealt with by local authorities, this just leaves the immediate effects for us to deal with."
 brazil_amazon.9.a: "Hagamos lo poco que podamos en este momento."
 brazil_amazon.9.b: "Hacer que el Servicio de Parques Nacionales reintroduzca especies fundamentales."
 brazil_amazon.9.c: "Ellos saben el trato, ¿dónde está nuestro corte?"
 brazil_amazon.10.t: "Incursiones ilegales en tierras indígenas"
 brazil_amazon.10.d: "Se han recibido informes sobre incursiones frecuentes y a veces violentas por parte de actores criminales en tierras indígenas ubicadas en la Amazonia. Los riesgos y la tensión están aumentando y, dada la violencia y la historia del conflicto, es solo cuestión de tiempo antes de que esto se convierta en algún tipo de violencia. Además de eso, estos actores criminales están causando daños a los bosques circundantes."
 brazil_amazon.10.a: "Dicen que es su tierra, que los manejen."
 brazil_amazon.10.b: "Encuentra a alguien, a quien sea, que pueda solucionar este problema."
 brazil_amazon.10.c: "Envíen al ejército para ocuparse de esto."
 brazil_amazon.11.t: "Las incursiones conducen a asesinatos"
 brazil_amazon.11.d: "Las recientes incursiones de actores criminales han provocado una serie de asesinatos, tanto de intrusos como de nativos. En este momento es imposible discernir quién empezó a matar a quién primero. Simplemente nos quedamos con las consecuencias y decidir quién será castigado. No importa lo que hagamos, será difícil mantener esto bajo control."
 brazil_amazon.11.a: "No podemos hacer nada al respecto, que Dios salve sus almas."
 brazil_amazon.11.b: "Un caso clásico de criminales que matan a nativos."
 brazil_amazon.11.c: "Envíen al ejército para acabar con esto."
 brazil_amazon.12.t: "Los nativos expresan su agradecimiento"
 brazil_amazon.12.d: "Debido a nuestras recientes acciones relacionadas con las incursiones en tierras indígenas dentro de la Amazonia, hemos recibido el agradecimiento oficial de los consejos tribales por nuestras acciones. Por nuestro apoyo, han prometido su apoyo futuro en nuestras iniciativas políticas dentro de la región."
 brazil_amazon.12.a: "Son ciudadanos respetuosos de la ley y merecen nuestra protección."
 brazil_amazon.13.t: "Ubicado el campo de narcóticos de la selva"
 brazil_amazon.13.d: "Recientemente se han filtrado informes sobre una plantación, dirigida por los cárteles, en lo profundo de nuestro territorio amazónico. La operación ha llevado a la tala de una cantidad significativa de árboles para hacer espacio para los campos en lo que parece una operación de tala y quema muy descuidada. Lo único que los mantiene en cualquier nivel de organización es un claro temor a quemar su producto."
 brazil_amazon.13.a: "Intentaremos entrar allí y hacer lo que podamos."
 brazil_amazon.13.b: "Hagamos que nuestras fuerzas policiales cooperen con el mando militar local."
 brazil_amazon.13.c: "¡Ah! Allí estaba ese campo, qué listo."
 brazil_amazon.14.t: "[?var:influence_array^0.GetName] Presiones para la conservación"
 brazil_amazon.14.d: "Recientemente hemos recibido varias peticiones de nuestros socios internacionales para que incrementemos los esfuerzos de conservación en la Amazonia. Si bien normalmente podríamos ignorar dichas peticiones, nuestro mayor socio comercial, [Largest Investor], ha comenzado a ejercer presión en la misma dirección. A cambio de nuestra cooperación, están ofreciendo disminuir su influencia en otras áreas."
 brazil_amazon.14.a: "No podemos sacrificar nuestros valores por ganancias a corto plazo."
 brazil_amazon.14.b: "Llegar a un acuerdo lucrativo siempre es beneficioso."
 brazil_amazon.15.t: "Desborde crítico de una presa en la Amazonia"
 brazil_amazon.15.d: "Una de nuestras represas ubicadas en el Amazonas se ha desbordado debido a una rápida crecida de agua río arriba. Ya se están tomando medidas para gestionar la catástrofe, pero no se sabe con certeza cuánto daño se ha producido. En el peor de los casos, la represa podría reventar debido a la tensión, lo que provocaría aún más daños río abajo. Aunque es poco probable que eso ocurra, deberíamos considerar la posibilidad de prepararnos para ello."
 brazil_amazon.15.a: "Las posibilidades son escasas, sólo debemos implementar lo que sea necesario ahora."
 brazil_amazon.15.b: "Planificar lo peor, iniciar una evacuación de las regiones río abajo."
 brazil_amazon.16.t: "Desastrosa rotura de una presa"
 brazil_amazon.16.d: "Lo peor ya ha ocurrido: pocas horas después de nuestro último reporte sobre la presa que se había desbordado, una falla en su estructura provocó que esta se abriera de par en par. El agua se deslizó rápidamente río abajo y arrasó con todo lo que encontró a su paso. Las operaciones de búsqueda y rescate ya están en marcha, pero para miles de personas y millones de dólares en infraestructuras, ya es demasiado tarde."
 brazil_amazon.16.a: "Esto... Esto no se suponía que pasara..."
 brazil_amazon.16.b: "¡Infierno en la Tierra, despleguemos todo lo que podamos en la zona!"
 brazil_amazon.17.t: "Una presa estalla"
 brazil_amazon.17.d: "A few hours following our last reports from the dam that had overflowed, a flaw in its structure caused it to burst wide open. Water rushed rapidly downstream and swept away anything in its path. Search and rescue is already underway but, due to our foresight, the only known casualties at this moment are a handful of technicians who died trying to avert the disaster and any trees or buildings caught in the path. Even this toll was lessened by planning and preparation. Already, we are being lauded for our foresight and plans are being drawn up to construct a memorial to the lost technicians."
 brazil_amazon.17.a: "Sólo puedo imaginar un mundo donde no hiciéramos nada."
 brazil_amazon.18.t: "Dam Overflow Subsides"
 brazil_amazon.18.d: "After several tense hours of waiting on news, a beleaguered dam technician has submitted a report that the overflow has subsided. While there is certainly some flooding, it is within manageable levels."
 brazil_amazon.18.a: "Y ahorramos dinero al no hacer nada."
 brazil_amazon.19.t: "Dam Overflow Subsides"
 brazil_amazon.19.d: "After several tense hours of waiting on news, a beleaguered dam technician has submitted a report that the overflow has subsided. While there is certainly some flooding, it is within manageable levels. However, the possibility of a burst and the quick work of our disaster management teams has already made the headlines. People from dam technicians to local leaders are being lauded as heroes for averting the disaster."
 brazil_amazon.19.a: "En momentos como estos, casi disfrutas de ser un servidor público."
 brazil_amazon.20.t: "Amazon establece centro de distribución en Amazonas"
 brazil_amazon.20.d: "La empresa estadounidense Amazon ha establecido un centro de distribución en Manaus con el objetivo de dar servicio a la región de Amazonas. El hecho de que una empresa de este tipo se interese por la región es un testimonio de su creciente importancia a nivel mundial."
 brazil_amazon.20.a: "Esto se está saliendo de control, ahora hay dos de ellos."
 brazil_amazon.21.t: "La Amazonia está devastada"
 brazil_amazon.21.d: "The Amazon Rainforest's total acreage has fallen below fifty million acres. The rainforest has now reached an irreparable state due to overdevelopment, various disasters, and more. Although we have completely devastated the rainforest, the economic development appears to have been worthwhile in the short term — but the long-term destruction may not have been worth it."
 brazil_amazon.21.a: "El último árbol de trufas de todos"
 brazil_amazon.22.t: "Empresa agroindustrial invierte en campos"
 brazil_amazon.22.d: "Una de las empresas privadas de nuestro país especializada en productos agrícolas ha decidido invertir en los campos de la selva amazónica."
 brazil_amazon.22.a: "¡Impresionante! Nuevos distritos."
 brazil_amazon.22.b: "Negar los nuevos desarrollos."
 brazil_amazon.23.t: "Las empresas mineras industriales explotan las reservas de recursos"
 brazil_amazon.23.d: "La selva amazónica tiene una gran cantidad de reservas de recursos bajo la jungla y la densa vegetación. Bajo la vegetación y el sotobosque se pueden encontrar cantidades diversas de hierro, cobre, petróleo y mucho más."
 brazil_amazon.23.a: "¡Genial! Nuevos distritos."
 brazil_amazon.23.b: "Negar los nuevos desarrollos."
 brazil_amazon.24.t: "Empresa privada desarrolla infraestructura en la Amazonía"
 brazil_amazon.24.d: "Las empresas privadas que recientemente han sido autorizadas a desarrollar infraestructura han llegado con una nueva propuesta de desarrollo en la Amazonía ampliando la infraestructura de las actuales carreteras livianas."
 brazil_amazon.24.a: "¡Genial! Nuevos distritos."
 brazil_amazon.24.b: "Negar los nuevos desarrollos."
 brazil_amazon.25.t: "Empresas privadas crean nueva empresa constructora"
 brazil_amazon.25.d: "A private company has decided to create a new Amazon-based construction firm to continue to develop the Amazon and the cities held within it."
 brazil_amazon.25.a: "¡Genial! Nuevos distritos."
 brazil_amazon.25.b: "Negar los nuevos desarrollos."
 brazil_amazon.26.t: "Empresas privadas replantan partes de la Amazonia"
 brazil_amazon.26.d: "A private company has decided to develop parts of the Amazon rainforest and plant additional trees in local conservation areas. The replanting has allowed some of the previously lost acreage to be regained."
 brazil_amazon.26.a: "¡Genial! Nuevos distritos."
 brazil_amazon.26.b: "Negar los nuevos desarrollos."
 brazil.14.b: "Represión de la Marcha"
 brazil.42.t: "Brasil pide ayuda para pagar la deuda"
 brazil.42.d: "[BRA.GetLeader] and a delegation have approached us today with a new deal. The Brazilian economy is currently hanging by a thread due to their looming debt crisis and their crippled currency. They have laid out a plan where our government will buy back debt from private investors. They appear quite desperate given the economic situation and the state of the Real. Should we go forward with the plan?"
 brazil.42.a: "Aprobar el plan"
 brazil.42.b: "Negar el plan"
 brazil.43.t1: "Estados Unidos aceptó el plan"
 brazil.43.t2: "Estados Unidos rechaza el plan"
 brazil.43.d1: "The United States has returned our proposal affirming they agree to the plan. It will take a couple of days for everything to take effect, but they will help the Brazilian people."
 brazil.43.d2: "Estados Unidos ha rechazado la propuesta de aliviar nuestra carga de deuda. Es verdaderamente triste escucharlo, pero es hora de que empecemos a avanzar con nuestras medidas de austeridad para ayudar a salvar a nuestro país de la cesación de pagos."
 brazil.43.a: "Tienes un amigo en la mano."
 brazil.43.b: "A través de pruebas y tribulaciones..."
 brazil.44.t: "Belém pide tala y quema de caña de azúcar"
 brazil.44.d: "Belém ha solicitado talar y quemar algunos de los manglares y la selva tropical locales para comenzar a plantar sus propias plantaciones de caña de azúcar en las afueras de la ciudad, más cerca de las zonas con mayor densidad forestal. ¿Debemos permitir la tala y quema?"
 brazil.44.a: "Permitir la tala y quema"
 brazil.44.b: "Negar la tala y quema"
 brazil_news.5.t: "La Amazonia está devastada"
 brazil_news.5.d: "The Brazilian authorities have released their monthly report on the total acreage cut and used for economic development. The total acreage has now fallen below fifty million, which means that the Amazon Rainforest has now reached an unrecoverable state. Time will only tell what the damage will do to the world and her ecosystems."
 brazil_news.5.a: "El último cae y comienza una nueva era..."
 brazil_flavour_events.14.t: "Los demócratas se han formado"
 brazil_flavour_events.14.d: "El Partido del Frente Liberal se ha refundado y reformado para representar mejor la ideología política del partido. Ahora han llamado a su partido político \"Los Demócratas\" en un esfuerzo por alinear mejor su imagen y a sí mismos con su apoyo a las políticas de libre mercado y la democracia y distanciarse aún más de la identificación con otros partidos liberales internacionales."
 brazil_flavour_events.14.a: "Un Nuevo Competidor"
 BRA_nationalism_rise_TT: "¡El §YPartido Roto§! será reemplazado por el §YNacionalismo en Ascenso§!\n§GMás popularidad nacionalista, menor popularidad democrática§! y §RMás costo de poder político§!"
 BRA_has_conserved_acreage_x_tt: "Tiene §YSuperficie total de selva tropical conservada§! de [?needed_acreage|0Y] o más (Superficie actual de bosque tropical conservado: [?BRA_acres_conserved|Y])"
 BRA_has_wild_acreage_x_tt: "Tiene una §YSuperficie total de selva tropical silvestre§! de [?needed_acreage|0Y] o más  (Superficie actual de bosque tropical salvaje: [?BRA_acres_wild|Y])"
 BRA_modern_frigate: "Fragata moderna"
 BRA_modern_frigate_desc: "En la guerra naval moderna, el papel de las fragatas ha mejorado mucho en comparación con antes, y es imperativo desarrollar nuestras propias fragatas."
 brazil_amazon.27.t: "Johan Eliasch"
 brazil_amazon.27.d: "Johan Eliasch, un empresario sueco, llegó recientemente al país y adquirió la empresa maderera Gethal Amazonas. El multimillonario ha declarado que cesará las operaciones de la empresa con efecto inmediato, liberando las tierras para mayor conservación. Podríamos considerarlo un regalo o podemos optar por nacionalizar la empresa y usarla para nuestros propios fines. ¿Qué deberíamos hacer?"
 brazil_amazon.27.a: "¡Impresionante! Deja que lo cierre."
