 BLR.Western_Autocracy: "£BLR_western_autocracy (BPF) ベラルーシ人民戦線"
 BLR.Western_Autocracy_icon: "£BLR_western_autocracy"
 BLR.Western_Autocracy_desc: "国民保守主義 - ベラルーシ人民戦線（ベラルーシ語ローマ字表記：Bielaruski Narodny Front）\n\n ベラルーシ人民戦線は、1988年に結成され、ベラルーシの独立、権力の民主化、ベラルーシ語および文化の復興を提唱した市民運動「ベラルーシ人民戦線『復興』」を母体として設立された。"
 BLR.socialism_icon: "£BLR_western_socialism"
 BLR.socialism_alt: "£BLR_western_socialism_1 (BSDPH) ベラルーシ社会民主党（会議）"
 BLR.socialism_alt_icon: "£BLR_western_socialism_1"
 BLR.socialism_alt_desc: "社会民主主義 - ベラルーシ社会民主党（会議）（ベラルーシ語ローマ字表記：Bielaruskaja Sacyjal-Demakratyčnaja Partyja (Hramada)）\n\n ベラルーシ社会民主党（会議）は、人民会議の元メンバーによって設立された、欧州型の社会民主主義政党である。同党はNATOおよびEUへの加盟を支持しているが、ロシアとの友好関係の維持を重視している"
 BLR.Conservative_bela: "£BLR_Conservative_1 (WR) 白ロシア"
 BLR.Conservative_bela_icon: "£BLR_Conservative_1"
 BLR.Conservative_bela_desc: "ルカシェンコの独裁体制 - 白ロシア（ベラルーシ語ローマ字表記：Bělaja Ruś）」\n\n白ロシアは、同名の政治組織を基盤としていた。同党はアレクサンドル・ルカシェンコの政策を全面的に支持しており、事実上、議会での絶対的多数派を維持し、国の政治を掌握するための彼の個人政党となっている。"
 BLR.Neutral_Autocracy: "£BLR_neutral_autocracy (BAP) ベラルーシ農民党"
 BLR.Neutral_Autocracy_icon: "£BLR_neutral_autocracy"
 BLR.Neutral_Autocracy_desc: "農本主義 - ベラルーシ農民党（ベラルーシ語ローマ字表記：Bielaruskaja Ahrarnaja Partyja）\n\n ベラルーシ農民党は1992年に結成され、左派農本主義のイデオロギーを掲げている。また、ベラルーシの農民や農業従事者の利益を守る活動も行っている。"
 BLR.Neutral_Libertarian: "£BLR_neutral_libertarian (PFP) 自由進歩党"
 BLR.Neutral_Libertarian_icon: "£BLR_neutral_libertarian"
 BLR.Neutral_Libertarian_desc: "自由保守主義 - 自由進歩党（ベラルーシ語ローマ字表記：Partyja Svabody i Prahresu）\n\n 自由進歩党は、ベラルーシにおける政治体制の民主化と市場経済の確立を目指す自由主義政党である。同党は過激主義に反対し、西側諸国との協力を支持している。"
 BLR.Neutral_green_icon: "£BLR_neutral_green"
 BLR.Monarchist_icon: "£BLR_monarchism"
 PER.Kingdom: "£BLC_jondollah (PRMI) ジュンダラ"
 PER.Kingdom_desc: "穏健サラフィー・ジハード主義 - ジュンダッラー（イラン人民抵抗運動）は、名目上は分離主義を掲げる過激派サラフィー主義運動として活動しており、その活動拠点は主にイランのバルーチ族が多数を占める地域に集中している。同組織は、イスラムの影響力を維持しつつ、より多元的な国家を築くことを目的として、スンニ派のイラン人のために戦っていると主張している。"
