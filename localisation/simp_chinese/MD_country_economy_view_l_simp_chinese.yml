 TREASURY_TOOLTIP_DELAYED: "我们的国库反映了我们可用于支出的金额，可用于购买和投资。如果国债陷入亏损，债务将每周自动借入以保持正值。\n\n£click_left §Y左键点击§!打开§Y经济预览§!界面。"
