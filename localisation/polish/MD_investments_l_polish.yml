 expand_local_renewable_capacity: "Aktualnie §YRozszerzanie lokalnych mocy odnawialnych§! w §Y[THIS.GetName]§!."
 expand_local_renewable_capacity_tt: "§YRozszerz lokalne moce odnawialne§! w §Y[THIS.GetName]§!\n---------\nPowinniśmy wspierać §YInfrastrukturę Energii Odnawialnej§! w §Y[THIS.GetName]§!, aby uzyskać dodatkową energię z lokalnej sieci energii odnawialnej."
 expand_local_renewable_capacity_delayed_tt: "§YWymagania wstępne:§!\n[!expand_local_renewable_capacity_click_enabled]\n§YEfekt:§!\n[!expand_local_renewable_capacity_click]\n"
 expand_local_renewable_capacity_click_tt: "Przez 180 dni zyskujemy w §Y[THIS.GetName]§! następujące rzeczy:\n"
 expand_local_infrastructure: "Aktualnie §YRozszerzanie lokalnej infrastruktury§! w §Y[THIS.GetName]§!."
 expand_local_infrastructure_tt: "§YRozszerz lokalną infrastrukturę§! w §Y[THIS.GetName]§!\n---------\nInfrastruktura w §Y[THIS.GetName]§! pozostawia wiele do życzenia. Powinniśmy opracować kilka ukierunkowanych, krótkoterminowych projektów, aby rozszerzyć infrastrukturę w stanie, aby pomóc podkreślić i rozszerzyć lokalny rozwój stanu."
