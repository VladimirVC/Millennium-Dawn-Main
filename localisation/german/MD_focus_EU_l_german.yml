 EU_total_member_vote_desc_tt: "§C[EUU.GetFlag][EUU.GetName]'s§! primary voting system is Qualified Majority Voting (QMV). QMV requires that [?global.EU_majority_qmv_state] §CMember States§! (or 55% of the current §CMember State§! total) support the current resolution. Once we have more than [?global.EU_majority_qmv_state] §CMember States§! the law can be passed assuming we have the required population majority of 65%.\n\nPop % of §CEU§! §GSupporting§!: [?global.EU_pop_ratio_yes|%+]\nPop % of §CEU§! §RRejecting§!: [?global.EU_pop_ratio_no|%-]"
