 SPR.conservatism: "£SPR_partido_popular (PP) 国民党"
 SPR.conservatism_desc: "保守主義 - 国民党（スペイン語：Partido Popular）は、1989年に国民同盟の後継政党として結成された。同党は、保守的かつキリスト教民主主義政党と評されることが多く、スペインの主要政党の一つである。\n"
 SPR.liberalism: "£SPR_ciudadanos (Cs) シウダダノス"
 SPR.liberalism_desc: "自由主義 - シウダダノス（スペイン語：Ciudadanos、市民）は、2000年代半ばに結成された親スペイン・親欧州の自由主義的ポピュリスト政党である。カタルーニャで結成され、カタルーニャにルーツを持ちながらもスペイン最大政党の一つに成長した。同党は、社会的には自由主義的政策を、経済的には新自由主義的政策を提唱している。\n"
 SPR.socialism: "£SPR_psoe (PSOE) スペイン社会労働党"
 SPR.socialism_desc: "社会民主主義 - スペイン社会労働党（スペイン語：Partido Socialista Obrero Español）は、スペイン全土で最も歴史のある現役政党である。典型的な社会民主主義的価値観を掲げ、スペインにおける連邦制を支持している。かつてマルクス・レーニン主義的性格を有していたことから労働組合との結びつきが強いが、経済政策においては自由主義路線を採っている。"
 SPR.Communist-State: "£SPR_pce (PCE) スペイン共産党"
 SPR.Communist-State_desc: "共産主義 - スペイン共産党（スペイン語：Partido Comunista de España）は、スペインの共産主義運動おける主要勢力である。大半の主要な共産党と同様に、集団に向けて機能する世俗的社会を目指す路線を歩んでいる。\n"
 SPR.Conservative: "£generic_Conservative_small (IR) 革命左翼"
 SPR.Conservative_desc: ""
 SPR.anarchist_communism: "£SPR_united_left (IU) 統一左翼"
 SPR.anarchist_communism_desc: "急進左派 - 統一左翼（スペイン語：Izquierda Unida）は、複数の政党の連合による左翼運動である。同連合は、より大きな枠組みで左派政党を代表するための連合である。\n"
 SPR.Neutral_conservatism: "£SPR_gil (GIL) 自由独立集団"
 SPR.Neutral_conservatism_desc: "保守主義 - 自由独立集団（スペイン語：Grupo Independiente Liberal）は、90年代にコスタ・デル・ソルにおける軽犯罪対策と都市美化事業の推進を目的に結成された右派新自由主義政党である。後に「ヒリスモ」として知られる運動へと発展し、イタリア式ポピュリズムと強く結びついた。\n"
 SPR.neutral_Social_2017: "£SPR_unidas_podemos (UP) ウニダス・ポデモス"
 SPR.neutral_Social_2017_desc: "社会民主主義 - ウニダス・ポデモス（スペイン語：Unidos Podemos、団結すれば我らはできる）は、ポデモスとその他多くの小規模左派政党によって結成された政治連合である。同党は、スペインにおける直接民主主義、連邦主義、そして真の共和主義を提唱しており、緊縮財政に断固として反対している。\n"
 SPR.Neutral_Libertarian: "£SPR_centro_democratico (CDS) 民主社会中道"
 SPR.Neutral_Libertarian_desc: "リバタリアン - 民主社会中道（スペイン語：Centro Democrático y Social）は、自由主義的キリスト教民主主義政党である。同党は自由主義インターナショナルの加盟政党であるが、保守的な見解を掲げている。\n"
 SPR.Neutral_Communism: "£generic_Neutral_Communism_small (PCPE) スペイン人民共産党"
 SPR.Neutral_Communism_desc: "共産主義 - PCPEはスペインにおけるもう一つのマルクス・レーニン主義政党である。姉妹政党であるスペイン共産党よりも欧州懐疑主義的な立場を取っている。\n"
 SPR.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small (PI) イスラム党"
 SPR.Neutral_Muslim_Brotherhood_desc: ""
 SPR.Neutral_green: "£SPR_los_verdes (PV) 緑の党"
 SPR.Neutral_green_desc: ""
 SPR.Neutral_green_2017: "£SPR_los_verdes EQUO"
 SPR.Neutral_green_2017_desc: ""
 SPR.Nat_Autocracy: "£SPR_spanish_army スペイン軍"
 SPR.Nat_Autocracy_desc: "軍事政権 - スペイン軍（スペイン語：Ejército de Tierra）は、世界最古の軍隊の一つである。9世紀に創設され、以来征服者としても平和維持軍としても世界各地で紛争を経験してきた。\n"
 SPR.Nat_Fascism: "£SPR_falangists (FE) ファランヘ党"
 SPR.Nat_Fascism_desc: "ファランヘ主義 - ファランヘ党（スペイン語：La Falange）は、フランシスコ・フランコが率いた旧ファランヘ党の精神的後継政党である。ファランヘ主義の教義を堅く信奉し、極めて強い欧州懐疑主義を掲げている。\n"
 SPR.Nat_Populism: "£SPR_espana_2000 (E-2000) スペイン2000"
 SPR.Nat_Populism_desc: "右派ポピュリズム - スペイン2000（スペイン語：España 2000）は、反EUとスペイン民族主義を掲げる右派ポピュリスト政党である。同党は、家族の伝統的役割とカトリック支配下のスペインへの回帰を求めて抗議活動を行っている。\n"
 SPR.Nat_Populism_2017: "£SPR_vox Vox"
 SPR.Nat_Populism_2017_desc: "右派ポピュリズム - Voxはスペインで急成長している極右の超国粋主義政党である。人民党からの分裂により結成された同党は、スペイン民族主義、強硬な保護主義、経済自由主義を掲げるが、経済自由主義は党の中核的理念ではない。またスペイン統治においてより伝統的で排外主義的な手法への回帰を主張している。\n"
 SPR.Monarchist: "£SPR_spanish_bourbons ブルボン家 ｰ 絶対主義派"
 SPR.Monarchist_desc: "君主主義 - スペインのブルボン家は18世紀以来スペインを統治してきた。現在のスペイン王家は、その系譜をフェリペ5世にまで遡ることができ、スペイン人の心に深く根ざした正統な君主として認識されている。1978年スペイン憲法には、フアン・カルロス1世の子孫のみがスペイン王位を継承できると規定されており、王位継承権が明示的に認められている。\n"
