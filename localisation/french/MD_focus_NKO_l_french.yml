 NKO_export.10.a.tt: "Delivers §Yrifles§! and §Ycommand equipment§! sufficient for §Ythree light infantry battalions§! (3× battalion requirement)."
 NKO_export.10.c: "Request a §YMotorized Infantry§! package — rifles, utility vehicles & command equipment"
 NKO_export.10.c.tt: "Delivers §Yrifles§!, §Yutility vehicles§!, and §Ycommand equipment§! sufficient for §Ythree motorized infantry battalions§! (3× battalion requirement)."
 NKO_export.10.e: "Request an §YArmored§! package — main battle tanks & command equipment"
 NKO_export.10.e.tt: "Delivers §Ymain battle tanks§! and §Ycommand equipment§! sufficient for §Ythree armored battalions§! (3× battalion requirement). Requires a modern North Korean tank design."
 NKO_export.10.f: "Request a §YMechanized Infantry§! package — IFVs, APCs, rifles & command equipment"
 NKO_export.10.f.tt: "Delivers §YIFVs§!, §YAPCs§!, §Yrifles§!, and §Ycommand equipment§! sufficient for §Ythree mechanized infantry battalions§! (3× battalion requirement). Requires modern North Korean vehicle modules."