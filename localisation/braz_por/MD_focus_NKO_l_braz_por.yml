 NKO_Choson_Dream: "O Sonho Choson"
 Choson_Dream_desc: "O \"Sonho Choson\" é um novo conceito introduzido pelo Presidente [NKO.GetLeader], que encapsula os objetivos pessoais e nacionais da nação coreana. Ele engloba aspirações em muitos campos diferentes, incluindo os esferas econômica, política e internacional."
 Fallout_leadership_succession: "Consequências da Sucessão de Liderança"
 Fallout_leadership_succession_desc: "A morte do grande General Kim trouxe um vácuo de poder, e todas as forças estão tentando encontrar maneiras de obter benefícios."
