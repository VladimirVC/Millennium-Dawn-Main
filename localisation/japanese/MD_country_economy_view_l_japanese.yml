 BALANCE_TITLE: "収支"
 BALANCE_VALUE: "§Y[?treasury_rate|+3]§!"
 BALANCE_TOOLTIP: "Our weekly balance is $[?treasury_rate|+3] §Hbillion§!."
 BALANCE_TOOLTIP_DELAYED: "The balance is the net change to our treasury each week, equal to total income minus total expenses. A negative balance drains the treasury and forces weekly debt to be issued once it runs dry."
 TREASURY_TITLE: "国庫"
 TREASURY_VALUE: "§Y[?treasury|3]§!"
 TREASURY_TOOLTIP: "国庫残高は$[?treasury]§Hb§!である。\n週あたりの収支は$[?treasury_rate|+3]§Hb§!である。"
 TREASURY_TOOLTIP_DELAYED: "国庫残高は、我々が使用可能な資金の量を表示しており、輸入や投資などに使われる。国庫が赤字になると、毎週自動で債務が追加され、黒字を維持する。\n\n§t経済画面は貿易タブに移動された。§!"
 DEBT_TITLE: "債務"
 DEBT_VALUE: "§R[?debt|3]§!"
 INVESTMENTS_TITLE: "投資"
 INVESTMENTS_VALUE: "§G[?int_investments|3]§!"
 STATS_TITLE: "統計"
 GDP_TOTAL: "GDP"
 GDP_TOTAL_DESC: "§Y国内総生産（GDP）は§!、その国で生産されるすべての製品とサービスの価値尺度である。Millennium Dawnでは、現地の経済状況を考慮したPPP（購買力平価）調整後のGDPを使用しており、国別比較に便利な数値となっている。"
 NUM_GDP_TOTAL: "$$§Y[?ROOT.gdp_total|1]§!b"
 NUM_GDP_TOTAL_DESC: "現在の自国の§YGDP§!は$§Y[?ROOT.gdp_total|3]§!b\n\n直近の§Y四半期GDP成長率§!: [?last_quarter_gdp_growth_rate|%Y]\n\nヒント: 自国の§Y四半期GDP成長率§!が高いほど有益な経済イベントが起こりやすい。"
 NUM_GDP_TOTAL_DELAYED_DESC: "おおよその産業別影響度:\n§P民需工場§!: [?ROOT.civil_fac_percent|%]\n§O軍需工場§!: [?ROOT.military_factory_total_percent|%] %\n§B海軍造船所§!: [?ROOT.naval_factory_total_percent|%]\n§Cオフィス街§!: [?ROOT.office_fac_percent|%]\n§G非商業的農業§!: [?ROOT.agriculture_percent|%]\n§Y商業用農業地域§!: [?ROOT.agriculture_district_fac_percent|%]\n§Yマイクロチップ工場§!: [?ROOT.microchip_plant_percent|%]\n§Y複合プラント§!: [?ROOT.composite_plant_percent|%]\n§Y合成精製所§!: [?ROOT.synthetic_refinery_percent|%]\n§G鉱業§!: [?ROOT.resources_percent|%]\n§Yインフラ§!: [?ROOT.infrastructure_gdp_percent|%]\n§P医療§!: [?ROOT.healthcare_gdp_percent|%]\n"
 GDP_PER_CAPITA: "1人当たりGDP"
 GDP_PER_CAPITA_DESC: "この数値は我々の§Y一人当たりGDP§!、すなわち§YGDP/C§!を表している。これは国内の一人ひとりが生み出す生産高を示している。\n\n直近の§Y四半期一人当たりGDP成長率§!：[?last_quarter_gdpc_growth_rate|%Y]。\n\nヒント：§Y四半期一人当たりGDP成長率§!が高いほど、好ましい経済イベントが発生しやすくなり、また放置した場合に§Rインフレ§!がより大きく進行する可能性も高くなる。"
 GDP_PER_CAPITA_DELAYED_DESC: "現在の§Y1人当たりGDP§!が我が国に与える影響:\n建設速度: [?production_speed_buildings_factor_gdp_modifier|%+]\n月毎の人口: [?monthly_population_gdp_modifier|%+1]\n研究速度: [?research_speed_factor_gdp_modifier|%+]\n安定度: [?stability_factor_gdp_modifier|%+]\n合計労働人口: [?total_workforce_gdp_c_modifier_var|%+]\n火力発電所建設速度: [?fossil_pp_construction_gdp_c_modifier_var|%+]\n"
 NUM_GDP_PER_CAPITA: "$$§Y[?ROOT.gdp_per_capita|3]§!k"
 NUM_GDP_PER_CAPITA_DESC: "我が国の§Y1人当たりGDP§!は現在$§Y[?ROOT.gdp_per_capita|3]§!k"
 PRODUCTIVITY: "生産性"
 PRODUCTIVITY_DESC: "この数字は、自国の§Y生産性§!を表している"
 NUM_PRODUCTIVITY_DELAYED_DESC: "現在の月毎の生産性成長: [?productivity_growth_scaled|3+]\n\n生産性の影響\n§Y工場出力:§! [?productivity_tax_effect_display|%+1]\n§Y造船所出力:§! [?productivity_tax_effect_display|%+1]\n§Y建設速度:§! [?productivity_tax_effect_display|%+1]\n§Y法人税:§! [?productivity_tax_effect_display|%+1]\n§Y£construction_speed_texticon §Y商業用農業地域§!建設速度:§! [?agriculture_district_output_var|%+1]"
 NUM_PRODUCTIVITY: "§Y[?ROOT.overall_productivity|3]§!"
 NUM_PRODUCTIVITY_DESC: "§YProductivity§! is the value that determines the output within our country. The value comes as an aggregate from each state's productivity divided by your nation's population. §YProductivity§! is a multiplier against all Gross Domestic Product (GDP) sources, corporate tax, and the output of every factory. If your §YProductivity§! is higher than the §YGlobal Average Productivity§!, you will see larger bonuses boosting your economic growth and the output of all your buildings, and if it is lower, those bonuses turn into penalties. The bar holds at 1000 until the global average climbs past it, so you have to keep pace with global growth to keep your bonuses growing. §YProductivity§! grows or falls each month passively, with that growth being impacted by your economic cycle, technologies, and national spirits and is further scaled based on the §YGlobal Average Productivity§!. Countries below the §YGlobal Average Productivity§! will see their §YProductivity§! grow more rapidly, while countries above the average will grow more slowly.\n\nThe §YGlobal Average Productivity§! is currently §Y[?global.average_world_productivity|3]§!\nOur §YProductivity§! is currently §Y[?ROOT.overall_productivity|3]§!\n"
 INFLATION: "インフレ"
 INFLATION_DESC: "この数値は我が国の§Yインフレ§!を表す"
 NUM_INFLATION: "§Y[?ROOT.inflation_rate_var|%]§!"
 NUM_INFLATION_DESC: "§Yインフレ§!は、自国の購買力がどれだけ増加または減少しているかを決定する値である。インフレが高くなるほど、貨幣の価値が失われるため、国民と政府の双方の購買力は低下する。インフレは、直近4四半期の§Y四半期GDP/C成長率§!の平均に、平均§Y税率§!を乗じ、さらに§Y景気循環§!、§Y紙幣増刷§!、§Y政策金利§!、その他の経済イベントによって調整されて算出される。\n\n平均§Y四半期一人当たりGDP成長率§!が高いほど、また§YGDP/C§!が大きいほど、インフレ率は高くなる。§Y税率§!が高いほどインフレは抑制され、低いほどインフレは上昇する。§Y政策金利§!が高いとインフレは抑制されるが、§R国債利払い§!を増加させ、逆に低い場合はその反対となる。\n\n§Y景気循環§!が§Y安定成長§!を上回ると、財への需要増加と支出拡大を再現する形で§Yインフレ§!は上昇する。一方、§Y景気循環§!が§Y安定成長§!を下回ると、支出の減少と消費財需要の減少を再現する形で§Yインフレ§!は低下する。\n\n§Yインフレ§!率がマイナスになると、§Yデフレ§!が発生しうる。§Yデフレ§!は政府支出の削減に役立つ場合があるが、人々がさらに価格が下がるのを待って支出を止めるため、景気後退を引き起こすこともある。物価下落が大きすぎたり速すぎたりすると、市場や企業が§R破綻§!する可能性すらある。"
 NUM_INFLATION_DELAYED_DESC: "§HLast 4 Quarters:§! [?ROOT.year_quarter_inflation_tracker^0|%] · [?ROOT.year_quarter_inflation_tracker^1|%] · [?ROOT.year_quarter_inflation_tracker^2|%] · [?ROOT.year_quarter_inflation_tracker^3|%]\n\nThe displayed rate is the §Yrolling four-quarter average§!, representing an averaged yearly inflation, which is the number used for all economic effects."
 POPULATION_TAX_RATE: "人口税率"
 POPULATION_TAX_RATE_TT: "人口税率には、国民に課されるすべての税金が含まれる。以下に限定されるものではないが、これには所得税、付加価値税、消費税、固定資産税などが含まれる。\n\n§Y人口税からの補正:§!\n£stability_texticon  安定度: [?stability_factor_from_population_tax|%+]"
 CORPORATE_TAX_RATE: "法人税率"
 CORPORATE_TAX_RATE_TT: "法人税率には、企業に課されるすべての税金が含まれる。これには法人所得税、雇用税などが含まれる。\n\n§Y法人税からの補正:§!\n£consumer_goods_texticon  税負担: [?consumer_goods_from_corporate_tax|%Y]\n£receiving_investment_cost_modifier_texticon §Y海外投資の受け入れ§!コスト補正: [?receiving_investment_cost_form_corporate_tax|%-]\n月毎の生産性成長: [?productivity_growth_modifier_from_corporate_tax|+3]\n"
 CB_POLICY_RATE: "政策金利"
 CB_POLICY_RATE_TT: "§Y中央銀行の政策金利§!は、中央銀行が設定する基準金利である。これは経済全体における借入コストをコントロールする。\n\n§Y金利を引き上げる§!ことで、マネーサプライは引き締められ、インフレは抑制されるが、国債利払い費は増加し、経済活動は鈍化する。\n§Y金利を引き下げる§!ことで、借入と投資は刺激されるが、インフレはより自由に上昇しやすくなる。\n\n各調整には§Y25§! £pol_power_icon が必要で、§Y60日間§!のクールダウンがある。\n\n§Y現在の金利:§! [?cb_policy_rate]%\n§Y四半期ごとのインフレ抑制:§! [?cb_policy_rate|+0]% × 四半期ごとに0.003\n§Y債務金利プレミアム:§! [?cb_policy_rate|+0]% × 0.5pp を§Y利率§!に追加"
