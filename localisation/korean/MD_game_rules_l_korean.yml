 RULE_SPREAD_INFLUENCE_GAIN_0_5: "0.5%"
 RULE_SPREAD_INFLUENCE_GAIN_0_5_DESC: "영향력 확산 활동 1회당 0.5%의 영향력을 획득합니다. 영향력 획득 속도를 크게 늦추고 싶을 때 선택하십시오."
 RULE_SPREAD_INFLUENCE_GAIN_2: "2%"
 RULE_SPREAD_INFLUENCE_GAIN_2_DESC: "영향력 확산 활동 1회당 2%의 영향력을 획득합니다. 영향력 획득 속도를 높이고 싶을 때 선택하십시오."
 RULE_SPREAD_INFLUENCE_GAIN_4: "4%"
 RULE_SPREAD_INFLUENCE_GAIN_4_DESC: "영향력 확산 활동 1회당 4%의 영향력을 획득합니다. 영향력 획득 속도를 크게 높이고 싶을 때 선택하십시오."
 RULE_SPREAD_INFLUENCE_AMOUNT_COOLDOWN: "영향력 확장 재사용 대기"
 RULE_SPREAD_INFLUENCE_30_COOLDOWN: "30일"
 RULE_SPREAD_INFLUENCE_30_COOLDOWN_DESC: "기본 재사용 대기시간입니다. 30일마다 한 번씩 타국에 영향력을 확산할 수 있습니다."
 RULE_SPREAD_INFLUENCE_14_COOLDOWN: "14일"
