 korea.50.t: "The unification of Korea has finally been achieved"
 korea.50.d: "After years of division, Korea has finally achieved unification, marking a historic moment in global history. The once-separated North and South have come together, overcoming decades of political, economic, and cultural differences to form a single, united nation. This momentous event signifies a new era of peace, cooperation, and prosperity for the Korean people, reshaping the geopolitical landscape of East Asia and the world."
 korea.50.a: "Hoooorrrraaay!!!"
 korea.51.t: "Build more farms"
 korea.51.d: "Korea cant be great without the korean people we must focus on solving the famine as fast as possible."
 korea.51.a: "Agriculture in Pyongyang"
