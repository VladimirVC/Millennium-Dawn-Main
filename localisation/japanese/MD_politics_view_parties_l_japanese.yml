 AFG.liberalism_2017: "£AFG_liberalism_2017 アフガニスタン緑の潮流"
 AFG.liberalism_2017_desc: "自由大西洋主義 - アフガニスタン緑の潮流（ダリー語ローマ字表記：Rawand-e Sabz-e Afghanistan）は、反タリバン、アフガニスタン民族主義、親民主主義の政党である。元アフガニスタン情報局長アムルッラー・サーレによって設立されたこの運動は、民主主義の推進と、反タリバンを掲げる草の根運動として始まった。"
 AFG.socialism: "£generic_socialism_small アフガニスタン国民統一党（穏健派）"
 AFG.socialism_desc: "左派社会民主主義 - アフガニスタン人民民主党の後継組織として結成されたアフガニスタン国民統一党は、自由で民主的なアフガニスタン国家の建設を目指し、PDPAの元党員たちをより穏健な政党の下に結集させる試みであった。同党は左派的な傾向が強かったため、選挙では苦戦したが、他党との連携を通じて政治に影響を与えるという点では、一定の成果を上げた。"
 AFG.anarchist_communism: "£AFG_anarchist_communism アフガニスタン国民統一党"
 AFG.anarchist_communism_desc: "民主社会主義 - アフガニスタン人民民主党の後継組織として結成されたアフガニスタン国民統一党は、自由で民主的なアフガニスタン国家の建設を目指し、PDPAの元党員たちをより穏健な政党の下に結集させる試みであった。同党は左派的な傾向が強かったため、選挙では苦戦したが、他党との連携を通じて政治に影響を与えるという点では、一定の成果を上げた。"
 AFG.Autocracy: "£AFG_autocracy (PDPA-K) アフガニスタン人民民主党 - ハルク派（タナイ派）"
 AFG.Autocracy_desc: "左派ナショナリズム - 、アフガニスタン人民民主党は1990年に正式にワタン党として再編されたが、その元党員の多くはこの新たな社会民主主義政党への参加を禁じられ、その中には、1990年のクーデター未遂事件の首謀者たちも含まれていた。極左のハルク派と、より穏健な民族主義的イスラム主義者の双方から支持を受けたシャーナワーズ・タナイは、パキスタンの支援を受けて、改革派のモハンマド・ナジブッラー大統領に対するクーデター未遂を起こした。クーデターは失敗に終わったものの、タナイ自身はパキスタンに逃れ、そこで穏健派勢力に働きかけ、その後も政治運動を展開することで、アフガニスタン国内での政治的動きを継続した。"
 AFG.Mod_Vilayat_e_Faqih: "£AFG_moderate_shiites アフガニスタン・イスラム統一党"
 AFG.Mod_Vilayat_e_Faqih_desc: "シーア派イスラム主義 - アフガニスタン・イスラム統一党は、衰退しつつあったソ連の占領に反対するため、1989年にいくつかの小規模政党が合併して結成された。シーア派イスラム教との類似した結びつきを持ち、イランの支援を受ける政党の連合体「テヘラン8」から派生した同党は、アフガニスタンの政治に影響力を及ぼし、国内のシーア派少数派の権利を擁護するための連合を形成することを目指した。結党以来、同党はアフガニスタンにおける主要な民族集団であるハザラ人の代表としても位置づけられるようになった。"
 AFG.Neutral_conservatism: "£AFG_neutral_conservatism 新アフガニスタン党"
 AFG.Neutral_conservatism_desc: "ポピュリズム - 2004年にユーヌス・カーヌーニーによって設立されたこの政党は、カーヌーニーがアフガニスタン国民運動から離脱した後に誕生した。党は一時的に野党同盟であるアフガニスタン国民理解戦線を率いたが、その後すぐに活動を停止した。2005年12月にはイスラム協会との合併が試みられたが、2006年までに合併が完全に実現したかどうかについては報告が食い違っている。"
 AFG.Neutral_Communism: "£AFG_neutral_communism (ALO) アフガニスタン解放機構"
 AFG.Neutral_Communism_desc: "毛沢東主義 - 1973年にアフガニスタン人民革命グループとして結成され、進歩的青年組織の後継組織として活動したアフガニスタン解放機構は、アフガニスタン人民民主党の支配に反対し、代わりにイスラム主義者を含む様々な反ソ連勢力と連携して新たな社会主義政府の樹立を目指した毛主義組織である。同組織はムジャヒディン自由戦士戦線の創設メンバーの一つであり、アフガニスタン民主共和国（DRA）に対する反乱を主導した。社会主義陣営とDRA政府の崩壊後も、同組織は国内での毛沢東主義革命を主張し続けた。"
 BOT.liberalism: "£generic_liberalism_small (BAM) ボツワナ同盟運動"
 BOT.liberalism_desc: "ボツワナ同盟運動は、小規模な進歩的な政党である。"
 BOT.liberalism_2017: "£BOT_liberalism_2017 進歩派同盟"
 BOT.liberalism_2017_desc: "進歩派同盟は、ボツワナ民主運動から除名された議員らによって結成された離脱派政党である"
 BOT.liberalism_2017_icon: "£BOT_liberalism_2017"
 BOT.socialism: "£BOT_socialism (BNF) ボツワナ国民戦線"
 BOT.socialism_desc: "ボツワナ国民戦線（BNF）は、キリスト教社会主義を掲げる政党であり、ボツワナの独立以来、主要な野党としての役割を果たしてきた。BNFはこれまで、ボツワナの野党各党を単一の連合に統合しようと何度も試みてきた。"
 BOT.socialism_icon: "£BOT_socialism"
 BOT.Communist-State_icon: "£BOT_Communist_State"
 BOT.anarchist_communism: "£BOT_anarchist_communism (BPP) ボツワナ人民党"
 BOT.anarchist_communism_desc: "ボツワナ人民党は、南アフリカのアフリカ民族会議をモデルとした汎アフリカ主義の社会主義政党である。その主な綱領は、部族や民族を問わない平等、土地と資源の国有化、そして労働者の権利である。"
 BOT.anarchist_communism_icon: "£BOT_anarchist_communism"
 BOT.Neutral_conservatism_icon: "£BOT_Neutral_conservatism"
 BOT.Neutral_conservatism_split: "£BOT_Neutral_conservatism (BDP) ボツワナ民主党"
 BOT.Neutral_conservatism_split_desc: "ボツワナ民主党は、独立以来ボツワナを統治してきた幅広い支持層を持つ保守包括政党である。その主な支持基盤は、国内のセツワナ系住民である。同党は、時に権威主義的であると指摘されることもある。"
 BOT.Neutral_Libertarian: "£BOT_Neutral_conservatism (BDP) ボツワナ民主党（バラタ・ファティ派）"
 BOT.Neutral_Libertarian_desc: "ボツワナ民主党は、独立以来ボツワナを統治してきた幅広い支持層を持つ保守包括政党である。その主な支持基盤は、国内のセツワナ系住民である。同党は、時に権威主義的であると指摘されることもある。同党は、多数派の「Aチーム」と改革派の「バラタ・ファティ」という2つの派閥から構成されている。"
 BOT.Neutral_Libertarian_icon: "£BOT_Neutral_conservatism"
 BOT.Neutral_Libertarian_split: "£BOT_Neutral_Libertarian (BMD) ボツワナ民主運動"
 BOT.Neutral_Libertarian_split_desc: "ボツワナ民主運動（BMD）は、与党ボツワナ民主党（BDP）に所属していた政治家たちによって結成された政党である。同党自身の説明によれば、BMDは「ボツワナ国民の権利を守り、促進するとともに、国民の独立が徐々に損なわれ、多くの見方によれば権威主義的な政府の誕生につながる恐れのある状況を阻止し、その流れを逆転させるため」に設立された。"
 BOT.Neutral_Libertarian_split_icon: "£BOT_Neutral_Libertarian"
 BOT.neutral_Social_icon: "£BOT_neutral_Social"
 BOT.neutral_Social_UDC: "£BOT_neutral_Social_UDC (UDC) 民主的変革のための傘"
 BOT.neutral_Social_UDC_desc: "民主的変革のための傘（UDC）は、複数の野党で構成される政治連合であり、その主な目的は与党であるボツワナ民主党を打倒することにある。UDCは自由主義者、社会主義者、保守派で構成されており、長く存続する可能性は極めて低い。"
 BOT.neutral_Social_UDC_icon: "£BOT_neutral_Social_UDC"
 BOT.Neutral_Communism: "£BOT_Neutral_Communism (ISBO) 国際社会主義機構 - ボツワナ支部"
 BOT.Neutral_Communism_desc: "国際社会主義機構 - ボツワナ支部は、国際社会主義潮流に属する小規模なトロツキスト組織である。同組織は労働者の権利擁護を訴え、サン人の強制移住に反対している。ボツワナにおいて、独自の新聞『地上からの社会主義』を発行している唯一の政治団体である。"
 BOT.Neutral_Communism_icon: "£BOT_Neutral_Communism"
 BOT.Nat_Populism: "£generic_Nat_Populism_small (BWF) ボツワナ労働者戦線"
 BOT.Nat_Populism_desc: "ボツワナ労働者戦線は、1993年に£BOT_socialism ボツワナ国民戦線から分裂して結成された。労働者の権利を擁護し、鎌とハンマーをシンボルとして掲げている一方で、同党の政策の多くはキリスト教保守主義とバカラガディ民族主義に根ざしている。"
 BOT.Monarchist: "£generic_Monarchist_small ディコシ"
 BOT.Monarchist_desc: "コシはツワナ語で「首長」または「王」を意味する言葉であり、その複数形がディコシである。現代のコシは主に儀式的な役割である。彼らの主な任務は、部族を管理し、部族の長老のための会議を主催することである。多くの人々は、歴史的に重要なディコシを完全に脇に追いやるボツワナのシステムを批判しており、多くの人々が実際の政治的権力を望んでいる。十分な政治力があれば、ディコシの一人がボツワナ全体の最高首長であるコシコロになるかもしれない。"
 BRA.conservatism_icon: "£BRA_conservatism"
 BRA.liberalism_icon: "£BRA_liberalism"
 BRA.socialism_icon: "£BRA_socialism"
 BRA.Communist-State_icon: "£BRA_Communist_State"
 BRA.Conservative_icon: "£BRA_communism_Conservative"
 BRA.anarchist_communism_icon: "£BRA_left_wing_radical"
 BRA.Neutral_conservatism_icon: "£BRA_Neutral_conservatism"
 BRA.Neutral_conservatism_PTB: "£BRA_PTB (PTB) ブラジル労働党"
 BRA.Neutral_conservatism_PTB_icon: "£BRA_PTB"
 BRA.Neutral_conservatism_PTB_desc: "保守主義 - ブラジル労働党（ポルトガル語：Partido Trabalhista Brasileiro, PTB）\n\nブラジル労働党は、1981年にゲトゥリオ・ヴァルガス大統領の姪であるイヴェーテ・ヴァルガスによって設立されたブラジルの政党である。同党は歴史的なPTBの遺産を主張しているが、多くの歴史家はこれを否定している。なぜなら初期のPTBは労働者階級に幅広い支持を得た中道左派政党であったからである。"
 BRA.neutral_Social_icon: "£BRA_neutral_Social"
 BRA.Neutral_Communism_icon: "£BRA_Neutral_Communism"
 BRA.Neutral_green_icon: "£BRA_Neutral_green"
 BRA.oligarchism_MDB: "£BRA_MDB  (MDB) ブラジル民主運動"
 BRA.oligarchism_MDB_icon: "£BRA_MDB"
 BRA.oligarchism_MDB_desc: "経済自由主義 - ブラジル民主運動（ポルトガル語：Movimento Democrático Brasileiro, MDB）\n\nブラジル民主運動はブラジルの中道政党である。1965年から1979年までの軍事政権下において、ブラジルは法的に強制された二大政党制を採用していた。政権支持派は国民刷新同盟党の傘下に集結し、公式な野党勢力はMDBを構成した。本質的に、MDBはブラジル労働党のほぼ全構成員と社会民主党の主要派閥で構成されていた。"
 BRA.Nat_Autocracy_icon: "£BRA_Nat_Autocracy"
 BRA.Monarchist_icon: "£BRA_Monarchist"
 DEN.Neutral_conservatism: "£DEN_non_aligned_conservative Centrum Demokraterne"
 DEN.Neutral_conservatism_2017: "£DEN_non_aligned_conservative_alt Kristendemokraterne"
 DEN.Neutral_conservatism_2017_desc: "Kristendemokraterne (Christian Democrats) is a chiristian"
 DEN.Nat_Fascism_2017_desc: "ストラム・クルス（「強硬路線」の意）は、ラスムス・パルダンによって設立された、デンマークとスウェーデンを拠点とする民族主義的かつ反イスラム的な政党である。同党は、多くの政治学者や報道機関から、過激な極右の周辺政党と見なされている。同党は、デンマーク国民の「民族的、文化的、宗教的、言語的、規範的な均質性」の保護と強化に焦点を当てた、民族国家主義的功利主義を政策の柱としている。また、国の民族的均質性が回復された後に個人の自由と権利を急進的に拡大することを含む、右派リバタリアニズムを掲げて活動している。"
 GRA.conservatism: "£generic_conservatism_small (NNP) 新国民党"
 GRA.conservatism_desc: ""
 GRE.Monarchist_desc: ""
 NKO.liberalism_2017: "£NKO_liberalism_2017 （FJ）自由朝鮮"
 NKO.liberalism_2017_desc: "包括政党 - 自由朝鮮\n\n自由朝鮮は北朝鮮政府に反対する非政府組織である。金正男の息子である金漢率を、彼の父親が暗殺されて以降は身柄を保護していることで知られている。脱北者が北朝鮮から逃れる手助けをしていることでも有名である。2019年3月1日、「千里馬民防衛」は「自由朝鮮」へと名を改めた。これは北朝鮮の現政権を打倒した際の名称案でもある。"
 NKO.liberalism_2017_icon: "£NKO_liberalism_2017"
 NKO.Communist-State_icon: "£NKO_communism"
 NKO.anarchist_communism_icon: "£NKO_anarchist_communism"
