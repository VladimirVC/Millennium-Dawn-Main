 investments_build_button_tt_1: "投资建设项目将增加你对目标国家的影响力，并为你的国家带来投资收入。\n\n§Y该国的腐败程度以及地区的基础设施水平都将影响总建设时间。无论修正值如何，建设时间默认增加35%。§!\n\n§L如果目标国家接受你的投资提议，建设期结束后他们将获得该建筑。§!\nAI会在经济出现问题或国家独立性过低时拒绝外来投资。\n\n[investment_cooldown]"
 investments_build_button_tt_delayed: "§Y前置条件§!:\n[!investments_build_button_click_enabled]"
 investments_14_cooldown_tt: "如果该国接受，将在接受后开始一个§Y14天§!的计时器。在此冷却期间，无论你向该国投入多少资金，都不会获得更多影响力。"
 investments_30_cooldown_tt: "如果该国接受，将在接受后开始一个§Y30天§!的计时器。在此冷却期间，无论你向该国投入多少资金，都不会获得更多影响力。"
 investments_build_button_tt_2: "取消当前项目（该地区每日仅限投资一次）。"
 investments_build_button_tt_b: "按下此按钮将向该地区的控制者请求许可。若对方接受，您的决议栏中将启动一项建设项目。该项目将持续进行，直至所有排队中建筑完工。\n\n§Y建造速度将承受-25%的惩罚（但您国家的建造速度修正仍会生效）。§!\n\n§L您同时只能进行一个活跃的建设项目。\n\n同一地区无法同时接受多个国家的建设项目。\n\n若该地区控制者对您持负面看法，则会拒绝此请求。§!"
