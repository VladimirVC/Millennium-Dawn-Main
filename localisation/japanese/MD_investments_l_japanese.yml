 investments_construction_CIC: "§Y民需産業§!\n民生品生産または新しい建物の建設のための工業力を供給する。必要であれば、軍需工場へと転換できる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^1|3]§!B"
 investments_construction_CIC_delayed: "§Y前提条件§!:\n[!investments_building_cic_button_click_enabled]"
 investments_construction_MIC: "§Y軍需産業§!\n新しい軍装品生産のための工業力を供給する。必要であれば、民需工場へと転換できる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^2|3]§!B"
 investments_construction_MIC_delayed: "§Y前提条件§!:\n[!investments_building_mic_button_click_enabled]"
 investments_construction_NIC: "§Y海軍工廠§!\n新しい艦船建造のための工業力を供給する。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^3|3]§!B"
 investments_construction_NIC_delayed: "§Y前提条件§!:\n[!investments_building_nic_button_click_enabled]"
 investments_construction_INF: "§Yインフラ§!\n州のインフラの改善を行う。戦略地域の物資供給力を増加させ、師団の移動速度を上げ、さらに資源の産出量を増やす。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^4|3]§!B"
 investments_construction_INF_delayed: "§Y前提条件§!:\n[!investments_building_infra_button_click_enabled]"
 investments_construction_offices: "§Yオフィス街§!\nオフィス街は、鉱業や重工業以外のすべての産業を表す。これには、金融、接客、情報技術、小売業などのサービスが含まれる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^5|3]§!B"
 investments_construction_offices_delayed: "§Y前提条件§!:\n[!investments_building_offices_button_click_enabled]"
 investments_construction_AA: "§YSHORAD 基地§!\n§Y短距離防空基地§!（SHORAD）は、低高度の航空脅威に対する防空を担当する対空兵器の混成部隊である。この基地は他の基地と連携し、空域を防御可能なエリアに分割し、ヘリコプターや航空機などによる侵略を阻止する\n\n§Y建造物当たりの基本コスト§!§R$[?global.build_cost_array^6|3]§!B"
 investments_construction_AA_delayed: "§Y前提条件§!:\n[!investments_building_antiair_button_click_enabled]"
 investments_construction_RAD: "§YRadar Station§!\nRadar Stations allows you to gain intel on enemy troops in nearby states. It consists of various radars and sensors, as well as intel assets and capacity to analyse the evolving situation.\nA higher level will increase it's effective range.\nIt's radars also provides the state with better detection of enemy air forces, giving your aircraft a better chance to engage them.\nIn addition the radars are increasing detection of enemy fleets at sea.\n\n§YBase Cost per Structure:§! §R$[?global.build_cost_array^7|3]§! Billion"
 investments_construction_RAD_delayed: "§Y前提条件§!:\n[!investments_building_radar_button_click_enabled]"
 investments_construction_AIR: "§Y航空基地§!\n州に空軍を配属することができる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^8|3]§!B"
 investments_construction_AIR_delayed: "§Y前提条件§!:\n[!investments_building_airbase_button_click_enabled]"
 investments_construction_fuel_silo: "§Y戦略燃料備蓄施設§!\nこの建物により、国家により多くの§H燃料§!を備蓄できる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^9|3]§!B "
 investments_construction_fuel_silo_delayed: "§Y前提条件§!:\n[!investments_building_fuel_silos_button_click_enabled]"
 investments_construction_internet_station: "§Yネットワークインフラ§!\nネットワークインフラは、電気通信や無線通信の分野で、長距離伝送や地下の光ファイバーケーブル、クラウドコンピューティングシステムを強化するために使用される高層構造物だ。\n\n各レベルごとに、§Yネットワークインフラ§!はその地方の生産性成長速度を§G+5.00%§!増加させる。\n各レベルごとに、§Yネットワークインフラ§!は§Y国際投資§!の期間を§G-5.00%§!減少させる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^10|3]§!B "
 investments_construction_internet_station_delayed: "§Y前提条件§!:\n[!investments_building_internet_station_button_click_enabled]"
 investments_construction_REF: "§Y再生可能エネルギーインフラ§!\n再生可能エネルギーインフラとは、再生可能エネルギー源の総称である。これには、太陽光発電、風力タービン、バイオ燃料精製所、木炭発電、バイオマス発電などが含まれるが、上記に書かれているものだけには限定されない。それらは再生可能な資源を使用し、それらの資源から燃料を生産する。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^11|3]§!B"
 investments_construction_REF_delayed: "§Y前提条件§!:\n[!investments_building_ref_button_click_enabled]"
 investments_construction_POWER_PLANT: "§Y火力発電所§!\n火力発電所とは、化石燃料を使用するエネルギー源の総称である。これには、石炭発電、天然ガス、石油などが含まれるが、上記に書かれているものだけには限定されない。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^12|3]§!B"
 investments_construction_POWER_PLANT_delayed: "§Y前提条件§!:\n[!investments_building_power_plant_button_click_enabled]"
 investments_construction_NUCLEAR_REACTOR: "§Y原子炉§!\n原子炉は原子力エネルギーを電気エネルギーに変換し、その過程で濃縮ウランを消費する。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^13|3]§!B"
 investments_construction_NUCLEAR_REACTOR_delayed: "§Y前提条件§!:\n[!investments_building_nuclear_reactor_button_click_enabled]"
 investments_construction_agriculture_district: "§Y商業化農業地域§!\n商業化農業地域は、自国において自給農業を除いた農業を表している。これには農産業、耕地、穀物サイロ、食肉処理場などが含まれる。\n\n§Y建造物当たりの基本コスト:§! §R$[?global.build_cost_array^14|3]§!B"
 investments_construction_agriculture_district_delayed: "§Y前提条件§!:\n[!investments_building_agriculture_district_button_click_enabled]"
