 SOU_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetSOUNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_HBL_category: "베네룩스"
 form_HBL_category_desc: "베네룩스는 네덜란드, 벨기에, 그리고 룩셈부르크가 함께하는 정치 및 경제 연방입니다. 역사적으로, 세 국가들은  우호적이고 서로 진심인 관계였습니다. 현재 이 조직은 단지 국제 무대에서 정치 및 경제 문제가 대두될 때만 언급되는 위치에 놓여있습니다. 그렇기에, 지금까지 세 국가들을 더욱 단단한 하나의 연방으로 통합하자는 논의가 심도있게 진행되어 왔습니다. 이로써 저지대의 시민들을 대표하는 새로운 국가가, 그들에게 새로운 미래를 선사하며 더욱 빛나는 앞날로 그들을 이끌 것입니다."
 HBL_integrate_start: "[GetHBLNameDef] 형성 시작"
 HBL_integrate_start_desc: "베네룩스 형성을 시작할 때가 되었습니다.\n\n"
 HBL_integrate_BEL: "[GetHBLNameAdj] [BEL.GetAdjective] 영토 통합"
 HBL_integrate_BEL_desc: "벨기에의 규모는 베네룩스 국가 중 가장 크지도 작지도 않습니다. 다른 두 회원국 사이에 위치한 지리적 조건처럼 안정적으로 중간에 자리 잡고 있습니다. 수도 브뤼셀에는 유럽연합 관료제의 여러 중심지들이 있으며, 네덜란드와 프랑스뿐 아니라 비EU 관광객들도 즐겨 찾는 매력적인 여행지입니다."
 HBL_integrate_HOL: "[GetHBLNameAdj] [HOL.GetAdjective] 영토 통합"
 HBL_integrate_HOL_desc: "네덜란드는 베네룩스 3국 중 가장 거대한 국가입니다. 인구, 영토 면적, 경제 규모의 대부분을 차지하며 여러 해외 영토를 보유하고 있습니다. 네덜란드를 통합하면 베네룩스의 상당 부분이 신생 국가로 편입되어 우리 연합의 정당성이 크게 강화될 것입니다."
 HBL_integrate_LUX: "[GetHBLNameAdj] [LUX.GetAdjective] 영토 통합"
 HBL_integrate_LUX_desc: "룩셈부르크는 세 국가 중 가장 작습니다. 하지만 가장 높은 1인당 GDP를 유지하고 있으며 여러 소규모 관광 명소를 보유하고 있습니다. 프랑스어, 독일어, 영어를 대표로 다양한 언어가 혼합되어 사용됩니다. 룩셈부르크 통합은 국가 규모를 고려할 때 대규모 작업은 아니지만, 관료주의적으로는 약간의 과제를 안겨줄 것입니다."
 HBL_update_flag: "[GetHBLNameDef] 형성 완료"
 HBL_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetHBLNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_USNA_category: "북아메리카의 통합"
 form_USNA_category_desc: "북미 대륙은 역사적으로 멕시코, 미국, 캐나다가 국가로 설립된 이후 외세의 영향을 물리쳤습니다. 이들 국가는 새로운 밀레니엄 초기에 총 11조 달러의 GDP를 자랑하며 세계 경제의 중추를 형성하고 있습니다. 이 국가들이 하나로 뭉쳐 더 큰 내일을 향해 나아가면, 우리는 미래로 나아갈 수 있을 것입니다."
 USNA_integrate_start: "[GetUSNANameDef] 형성 시작"
 USNA_integrate_start_desc: "북아메리카 연방 형성을 시작할 때가 되었습니다.\n\n"
 USNA_integrate_CAN: "[GetUSNANameAdj] [CAN.GetAdjective] 영토 통합"
 USNA_integrate_CAN_desc: "캐나다는 새로운 연합 내에서 면적이 가장 큰 국가이며, 아직 개발되지 않은 석유 매장량이 많습니다. 이 두 가지 사실만으로도 캐나다는 북아메리카 연합 퍼즐의 필수 불가결한 조각입니다. 이들이 새로운 국가에 완전히 통합됨에 따라 특유의 사과 퍼레이드도 최소화되기를 바랍니다."
 USNA_integrate_USA: "[GetUSNANameAdj] [USA.GetAdjective] 영토 통합"
 USNA_integrate_USA_desc: "미합중국은 북아메리카 연합의 핵심을 구성합니다. 가장 거대한 경제, 두 번째로 넓은 영토, 최고의 군사력 등을 보유하고 있습니다. 미국을 통합하는 것은 그 방대한 규모와 세계 무대에서의 영향력 때문에 수많은 과제를 안겨주겠지만, 이 통합을 통해 우리는 경제적으로 세계 최대의 초강대국으로 자리매김할 것입니다."
 USNA_integrate_MEX: "[GetUSNANameAdj] [MEX.GetAdjective] 영토 통합"
 USNA_integrate_MEX_desc: "멕시코는 신생 국가를 형성하는 세 나라 중 두 번째로 인구가 많은 국가입니다. 이들은 대규모 군사력을 제공할 것입니다. 카르텔의 밀집도와 같은 여러 문제점도 안고 있지만, 그럼에도 불구하고 멕시코를 통합하는 것은 신생 국가의 주요 핵심 당면 과제 중 하나가 될 것입니다."
 USNA_update_flag: "[GetUSNANameDef] 형성 완료"
 USNA_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetUSNANameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_UTS_category: "튀르크 영토 통합"
 form_UTS_category_desc: "튀르크 국가 연합은 우즈베키스탄, 키르기스스탄, 카자흐스탄, 투르크메니스탄을 포함하는 튀르크어권 국가들의 연합입니다. 이들 국가 외부에도 러시아와 중국 내에 타타르인이나 위구르인 등 다른 튀르크어권 집단이 존재합니다. 그들 역시 우리 연합의 목표이긴 하지만, 초기 목표는 아닙니다. 우리는 현재 존재하는 국가들을 우선 통합하고, 동포들의 귀환을 장려하거나 다시 우리의 품으로 데려올 것입니다."
 UTS_integrate_start: "[GetUTSNameDef] 형성 시작"
 UTS_integrate_start_desc: ""
