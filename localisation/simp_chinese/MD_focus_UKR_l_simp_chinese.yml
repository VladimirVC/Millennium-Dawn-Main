 UKR_promote_russian_interests_desc: "我们将在国内促进[SOV.GetFlag]俄罗斯的利益，以在下次选举中提升亲俄集团的声望。"
 UKR_promote_western_interests: "促进[USA.GetFlag]美国的利益"
 UKR_promote_western_interests_desc: "我们将在国内促进[USA.GetFlag]美国的利益，以在下次选举中提升亲西方集团的声望。"
