 UNSC.200.b: "Ofrecer Incentivos Financieros"
 UNSC.200.c: "Ofrecer Incentivos Militares"
 UNSC.200.e: "Ofrecer Incentivos de Desarrollo"
 UNSC.201.t: "[FROM.GetName] Quiere Influir en Nuestro Voto"
 UNSC.201.d: "[FROM.GetLeader] se ha comunicado discretamente con [THIS.GetLeader] para solicitar que cambiemos nuestro voto a [vote_change_too] para la resolución actual del Consejo de Seguridad de las Naciones Unidas. Nos han ofrecido acuerdos comerciales y tratados de inversión mutua, además de la cancelación de cualquier embargo o bloqueo si aceptamos cambiar nuestro voto, lo cual se concederá después de que se modifique el voto. Debemos decidir si aceptar su solicitud justifica cambiar nuestra postura en el Consejo de Seguridad."
 UNSC.201.a: "Aceptar su oferta"
 UNSC.201.b: "¡Rechacen esta Demanda Escandalosa!"
