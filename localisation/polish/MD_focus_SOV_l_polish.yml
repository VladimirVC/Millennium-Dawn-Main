 SOV_scientific_councils_desc: "We must fast-track the brightest young Russians through top institutions to serve the revolution. Their innovations and inventions will secure our scientific and military edge."
 RUS_establish_me: "A New Russia"
 RUS_establish_me_desc: "Following the collapse of the Russian government, a new Russian state is in need of being constructed."
 RUS_hold_kaliningrad_conference: "Hold the Kaliningrad Conference"
 RUS_hold_kaliningrad_conference_desc: "The Russian state must be a unified, cohesive, and competent force. We must organize the Kaliningrad Conference in order to ensure the New Russia would be a stable and democratic state."
 RUS_continue_reunification: "Continue Unification Efforts"
 RUS_continue_reunification_desc: "It appears that some people are still holding onto the former territories of the Russian state, and we must step in to get that sorted as soon as possible through negotiations."
 RUS_establish_rusfor: "Establish RUSFOR"
 RUS_establish_rusfor_desc: "Russia no longer exists, and that is a problem in some ways. We must look into creating a new territory for the Russian state."
 russia.119.t: "Canonization of the Romanov Family"
 russia.119.d: "The Russian Orthodox Church has canonized the Romanov family this morning. The process was not without controversy, drawing strife from various quarters, including voices from within the church itself. Many believe the canonization does not properly uphold the sanctity of the term, yet the church has proceeded."
 russia.119.a: "Remind the commies of their deeds!"
 russia.119.b: "Honoring the Dead..."
 russia.120.t: "Failed Test Flight of the Su-37"
 russia.120.d: "A test flight was conducted near Shatura today, but the aircraft suffered a major malfunction. The port tailplane broke off during a high-g maneuver, leading to its crash and total loss. The structural failure was caused by repeatedly exceeding the design load during six years of testing."
 russia.120.a: "Unfortunate..."
 russia_news.10000.t: "Vladimir Putin Embroiled in Scandal"
 russia_news.10000.d: "Recently Russian media has been swift to cover Vladimir Putin's latest scandal. He is being accused of promising certain individuals greater monopolies over certain industries, and this claim is being backed up by a secret recording submitted to the press by a disgruntled businessman. News of this scandal has quickly spread throughout Russia and the region, severely tarnishing Vladimir Putin's reputation. His political opponents have been quick to capitalize on this, attacking Putin and portraying him as a man that will sell out Russia to corporate ambitions. Some are speculating that he is likely to lose the election as a result of this, putting a quick end to what had seemed to be a long and fulfilling career."
 russia_news.10000.a: "The wind of democracy blows once more"
 russia.611.t: "A New Political Direction"
 russia.611.d: "The political landscape has shifted dramatically. New leadership has emerged with a different vision for the country's future direction."
 russia.611.a: "A new chapter begins"
 russia.3.t: "Belarus Accepts Integration"
 russia.3.d: "Belarus has accepted our proposal for full integration. The time has come to formalize our union and bring stability to our shared borders."
 russia.3.o1: "Proceed with the Integration"
 russia.4.t: "Belarus Refuses Integration"
 russia.4.d: "Belarus has rejected our proposal. Their defiance is an affront to our vision of reunification, but this matter is far from settled."
 russia.4.o1: "They Will Regret This"
