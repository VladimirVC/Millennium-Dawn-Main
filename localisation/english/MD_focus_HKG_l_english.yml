l_english:
#Header
 hong_kong_focus: "Hong Kong Focus Tree"
#Focuses
 #the issue
 HKG_combat_vested_interests: "Combat Vested Interests"
 HKG_combat_vested_interests_desc: "The New Year has passed, everything is renewed. The advent of the milliennium has brought a new future for Hong Kong."
 HKG_take_on_heung_ye_kuk: "Take on the Heung Yee Kuk"
 HKG_take_on_heung_ye_kuk_desc: "Heung Yee Kuk is a product of the olden days of the New Territories during the British rule, and has a transcendent independence compared to other areas. We must strengthen our control there to ensure that our policies can really be implemented."
 HKG_repeal_small_house_policy: "Repeal the Small House Policy"
 HKG_repeal_small_house_policy_desc: "The Small House Policy being a policy of the feudal era, has long since ceased to meet the present situation of housing shortage in Hong Kong. It must be abolished."
 HKG_reform_heung_yee_kuk: "Reform the Heung Yee Kuk"
 HKG_reform_heung_yee_kuk_desc: "The New Territories can't do without Heung Yee Kuk, but it needs a reform to be more responsive to us."
 HKG_dissolve_heung_yee_kuk: "Dissolve the Heung Yee Kuk"
 HKG_dissolve_heung_yee_kuk_desc: "The Heung Yee Kuk's hold on the New Territories is the last vestige of pre-handover landlordism. Disbanding them is the only way to bring the NT under proper administrative control."
 HKG_take_on_politicians: "Take on the Politicians"
 HKG_take_on_politicians_desc: "Hong Kong's government is still full of bureaucrats from the old days. In order to stabilise the regime, we must tackle them."
 HKG_ensure_autonomy_of_ICAC: "Ensure the Autonomy of the ICAC"
 HKG_ensure_autonomy_of_ICAC_desc: "The Independent Commission Against Corruption is one of Hong Kong's crown institutions. Strengthening its autonomy from political interference is essential to preserving the rule of law."
 HKG_anti_graft_investigations: "Anti-Graft Investigations"
 HKG_anti_graft_investigations_desc: "The ICAC will pursue political corruption cases without fear or favour. Several sitting officials may face uncomfortable questions."
 HKG_take_on_triads: "Take on the Triads"
 HKG_take_on_triads_desc: "The Triads have always been a major concern for Hong Kong's stability. While the darkness of a city can never go away, we must at least keep it to a minimum."
 HKG_increase_funding_for_OCTB: "Increase Funding for the OCTB"
 HKG_increase_funding_for_OCTB_desc: "The Organised Crime and Triad Bureau receives a substantial budget increase. Field officers, surveillance equipment, and analytical capacity all expand."
 HKG_step_up_police_raids: "Step Up Police Raids"
 HKG_step_up_police_raids_desc: "Coordinated raids across triad-controlled districts will deliver arrests, asset seizures, and disrupted networks. The triads will adapt, but for now the streets are quieter."
 HKG_crack_down_on_WSW_triad: "Crack Down on the Wo Shing Wo Triad" #secondhand market  mobile phones, electronic appliances, stolen cars and exchange of weaponry
 HKG_crack_down_on_WSW_triad_desc: "The Wo Shing Wo, oldest of the major triads, faces a sustained operation against its prostitution rackets and waterfront extortion networks."
 HKG_crack_down_on_SYO_triad: "Crack Down on the Sun Yee On Triad" #protection racket and Brothel
 HKG_crack_down_on_SYO_triad_desc: "The Sun Yee On, with its sprawling membership, is targeted across human-trafficking, gambling, and street-level extortion."
 HKG_crack_down_on_14K_triad: "Crack Down on the 14K Triads" #drug baron
 HKG_crack_down_on_14K_triad_desc: "The 14K, infamous for narcotics, faces a dedicated drug-trafficking taskforce. Expect both arrests and disrupted supply chains across Kowloon."
 HKG_crack_down_on_Luen_group_triad: "Crack Down on the Luen Group Triads" #illegal gambling clubs
 HKG_crack_down_on_Luen_group_triad_desc: "The Luen Group's stranglehold over illegal gambling will be broken. Underground casinos are raided across the city."

 #politics
 HKG_divided_hong_kong: "A Divided Hong Kong"
 HKG_divided_hong_kong_desc: "The final years of Hong Kong's British rule left a legacy of pluralistic democracy. But it also led to endless disputes between the pro-establishment, pro-democracy and localist, and instead reduced administrative efficiency as a result. This makes people wonder whether this chaotic \"democracy\" is really as good as it is made out to be?"
 HKG_support_pro_beijing_camp: "Support the Pro-Beijing Camp"
 HKG_support_pro_beijing_camp_desc: "\"Freedom is not unimportant. But in our social culture, freedom is not as important as stability. \" Now it's time for the world to witness a more stable and secure Hong Kong."
 HKG_railway_development_strategy_2000: "Railway Development Strategy 2000"
 HKG_railway_development_strategy_2000_desc: "In order to cope with the future congestion of urban roads due to the growing population and the capacity constraints arising from the increasing economic and trade exchanges between the Mainland and Hong Kong, we will put forward the Railway Development Strategy 2000 to guide the MTR's development plan for the next ten years."
 HKG_sign_CEPA: "Sign the CEPA"
 HKG_sign_CEPA_desc: "The Closer Economic Partnership Arrangement formalises preferential trade access between Hong Kong and the mainland. A boon for cross-border commerce, and a step closer to economic interdependence."
 HKG_approve_funding_for_XRL: "Approve Funding for the XRL"
 HKG_approve_funding_for_XRL_desc: "The Express Rail Link will connect Hong Kong directly to the mainland high-speed rail network. The funding is large, the political symbolism larger still."
 HKG_co_location_bill: "The Co-Location Bill"
 HKG_co_location_bill_desc: "A controversial bill placing mainland Chinese law-enforcement jurisdiction at the West Kowloon XRL terminal. The pro-Beijing camp calls it pragmatic, pan-democrats call it a constitutional breach."
 HKG_electoral_reform: "Electoral Reform"
 HKG_electoral_reform_desc: "The Basic Law set out the selecting method of the Chief Executive of Hong Kong for the first two terms and the LegCo for the first three terms. It does not, however, stipulate how elections should be conducted after that. Perhaps we can take this opportunity to push for a reform of our electoral system to achieve genuine universal suffrage."
 HKG_a_broader_electorate: "A Broader Electorate?"
 HKG_a_broader_electorate_desc: "Universal suffrage in Hong Kong cannot be implemented overnight. Although we cannot implement universal suffrage immediately, we can first request the NPCSC to expand the number of members of the Election Committee, let the election can be more democratic than before."
 HKG_choose_your_own_puppet: "\"Choose Your Own Puppet\""
 HKG_choose_your_own_puppet_desc: "Universal suffrage in Hong Kong must be achieved, but we must not lose our stability for the sake of democracy. The nominating committee will ensure that only those who are truly \"patriotic for China and Hong Kong\" will become the Chief Executive."
 HKG_a_new_reform_attempt: "A New Reform Attempt"
 HKG_a_new_reform_attempt_desc: "Once again the LegCo will be asked to consider electoral reform. Will it pass this time, or will history repeat itself?"
 HKG_support_pan_democrats: "Support the Pan-Democrats"
 HKG_support_pan_democrats_desc: "Democracy and liberty are already embedded in the culture of Hong Kong people, and Deng Xiaoping has promised not to interfere in Hong Kong's internal affairs. We should actively participate in the democratic movement and not let others take away the source of Hong Kong's prosperity."
 HKG_keep_to_one_country_two_systems: "Keep to One Country Two Systems"
 HKG_keep_to_one_country_two_systems_desc: "\"One country, two systems\" is running smoothly in Hong Kong. The Mainland and Hong Kong are getting what they want from it. Mainland uses Hong Kong as an important part of its \"Opening\" policy, while Hong Kong uses the promise of \"Fifty years no change\" to continue to maintain a liberalised life for the people of Hong Kong vis-à-vis the rest of the Chinese people. What is clear is that it is in our mutual interest to continue to maintain the operation of \"one country, two systems\"."
 HKG_hong_kong_post_2047_status: "Hong Kong's Post-2047 Status"
 HKG_hong_kong_post_2047_status_desc: "Despite Deng Xiaoping's promise that Hong Kong's political and economic system would remain unchanged for 50 years, no one can say what Hong Kong will look like after 2047. The time has come to consider the city's future."
 #the decision of the future
 HKG_stick_to_CPC_line: "Stick to the CPC Line"
 HKG_stick_to_CPC_line_desc: "Hong Kong will quietly adhere to Beijing's preferred line on contested issues. Pan-democrats will be furious, the patriotic camp delighted."
 HKG_loyal_puppet: "\"The Loyal Puppet\""
 HKG_loyal_puppet_desc: "The pan-democrats have shown their hand, and the streets have shown their fury. Stability and prosperity demand that Hong Kong commit, openly and without apology, to the path Beijing has charted. The transition to a fully integrated Special Administrative Region will not be popular, but it will be final."
 HKG_promote_patriotism: "Promote Patriotism"
 HKG_promote_patriotism_desc: "A generation raised on colonial textbooks and Cantopop sentimentality cannot be relied on to defend the motherland. National Security Education will be embedded in every classroom, every workplace, every broadcaster. Loyalty to the Party is loyalty to Hong Kong."
 HKG_patriots_governing: "Patriots Governing Hong Kong"
 HKG_patriots_governing_desc: "The civil service has too long answered to colonial habits and quiet sympathies. Vetting committees will sweep the bureaucracy from district officers to senior administrators, replacing waverers with proven patriots. Productivity will suffer in the short term; reliability will not."
 HKG_suppress_cantonese_local_culture: "Suppress Cantonese Local Culture"
 HKG_suppress_cantonese_local_culture_desc: "Hong Kong is Chinese, and Chinese means Mandarin. Cantonese broadcasting will be curtailed, local-identity festivals quietly defunded, and dissenting voices in the cultural sector deplatformed. The price will be unrest in the streets and resentment in the home, but a unified national culture is worth the cost."
 HKG_reduce_size_of_LegCo: "Reduce size of the LegCo"
 HKG_reduce_size_of_LegCo_desc: "The Legislative Council has grown bloated with district-level seats that serve only as platforms for opposition theatre. A streamlined chamber, with directly-elected seats reduced and functional constituencies expanded, will let government govern. The Mainland Talent Scheme will fill the gaps with administrators trained in Beijing and Shenzhen."
 HKG_gong_zyu_ou_integration: "Hong Kong-Zhuhai-Macao Integration"
 HKG_gong_zyu_ou_integration_desc: "\"One country, Two systems\" was always a transitional arrangement. With patriots governing the SAR, the boundary between Hong Kong, Zhuhai and Macao becomes administrative rather than meaningful. Cross-border infrastructure, harmonised regulation and shared talent pools complete the Greater Bay Area as a single economic body, ready for full reintegration with the Motherland."
 HKG_gong_zyu_ou_integration_tt: "If Hong Kong is currently a subject of §Y[CHI.GetFlag]§!, the SAR is annexed and absorbed into the Greater Bay Area. Otherwise this completes the loyalist political alignment without an immediate transfer of sovereignty."

 HKG_support_democracy_in_china: "Support Democracy in China"
 HKG_support_democracy_in_china_desc: "The pro-democracy movement in Hong Kong will openly support reform efforts on the mainland. A direct challenge to Beijing's authority."
 HKG_commemorate_june_fourth: "Commemorate June Fourth"
 HKG_commemorate_june_fourth_desc: "The vigil at Victoria Park has been held every year since 1990, and every year Beijing has watched it with quiet displeasure. This year, we make it official: a public commemoration sanctioned by the SAR government, with the candles, the songs, and the names of the dead. The mainland will not forget. Neither will we."
 HKG_inspire_chinese_grassroots_movements: "Inspire Chinese Grassroots Movements"
 HKG_inspire_chinese_grassroots_movements_desc: "Hong Kong cannot save the mainland alone, but it can show what Chinese democracy looks like in practice. Open broadcasts to the Pearl River Delta, smuggled pamphlets through the border crossings, and quiet financial backing for samizdat networks - the seeds of change planted from the freest Chinese city."
 HKG_call_on_CPC_to_release_dissidents: "Call on the CPC to Release Dissidents"
 HKG_call_on_CPC_to_release_dissidents_desc: "The names are well-known: Liu Xiaobo, Wang Bingzhang, Xu Wenli, dozens more. The SAR government formally and publicly demands their release. Beijing will refuse, of course - but the demand puts the regime's prisons on the international agenda."
 HKG_pro_democracy_media_charter: "Pro-Democracy Media Charter"
 HKG_pro_democracy_media_charter_desc: "Press freedom is not a slogan but a legal regime. The Charter codifies protections for journalists, criminalises political interference in editorial decisions, and establishes a public broadcaster genuinely independent of the executive. The Silenced Press idea is rolled back."
 HKG_fund_civil_society: "Fund Civil Society"
 HKG_fund_civil_society_desc: "Public grants for NGOs, neighbourhood associations, legal aid clinics, and pro-democracy advocacy. The treasury takes a hit; the body politic gets stronger. A democracy without civil society is a forum without an audience."
 HKG_legco_reform_petition: "LegCo Reform Petition"
 HKG_legco_reform_petition_desc: "A formal petition to Beijing for genuine universal suffrage in Legislative Council elections. Direct election of all seats, abolition of the functional constituencies, no nominating committee. The Lacks Universal Suffrage idea is replaced by Limited Universal Suffrage as a first concession."
 HKG_accountability_for_tiananmen: "Accountability for Tiananmen"
 HKG_accountability_for_tiananmen_desc: "We name the men who gave the orders. We name the units that carried them out. We open the SAR's own archives, support international tribunals, and amplify the survivors' testimony. Beijing will treat this as a declaration of war on the Party. Hong Kong's democrats will hear a different message."
 HKG_peaceful_democratic_path: "Peaceful Democratic Path"
 HKG_peaceful_democratic_path_desc: "Reform from within, not confrontation from without. Hong Kong consolidates its democratic institutions, stabilises civil society, and waits for the mainland to change on its own timeline. The candles still burn at Victoria Park, but the streets stay quiet. The next phase of reform begins from a position of strength."
 
 HKG_appease_localists: "Appease Localists"
 HKG_appease_localists_desc: "Concessions to the localist movement: Cantonese-language preservation, local-first hiring policies, and a slowdown on cross-border integration projects."
 HKG_stoke_anti_mainland_sentiment: "Stoke Anti-Mainland Sentiment"
 HKG_stoke_anti_mainland_sentiment_desc: "China took away all the benefits and left Hong Kong people with high property prices and low purchasing power. Why should Hong Kong remain with China and be willing to be a tiny colony of China?"
 HKG_restrict_tourism_immigration: "Restrict Tourism & Immigration"
 HKG_restrict_tourism_immigration_desc: "New caps on mainland tourists and stricter cross-border immigration rules. Locals will appreciate the breathing room; retailers and developers, less so."
 HKG_emphasize_hong_kong_identity: "Emphasize Hong Kong Identity"
 HKG_emphasize_hong_kong_identity_desc: "Singapore's successful breakaway from Malaysia was due to Mr Lee Kuan Yew's successful national identity consciousness reforms. Hong Kong is perfectly capable of adopting the same approach."
 HKG_distance_from_china: "Distance from China"
 HKG_distance_from_china_desc: "Hong Kong, it is time to weigh anchor and break free of China's control."
 HKG_great_hong_kong_nation: "Great Hong Kong Nation"
 HKG_great_hong_kong_nation_desc: "The handover was a betrayal. The promises of fifty years are a lie. Hong Kong is a nation, not a province, and a nation requires its own flag, its own borders, its own armed forces. We will declare what should never have been negotiated away."
 HKG_hong_kong_first: "Hong Kong First"
 HKG_hong_kong_first_desc: "From the harbours of Aberdeen to the high-rises of Mong Kok, Hong Kong belongs to Hongkongers. Mainland investment, mainland labour, mainland influence will be subject to the will of the local population. Citizenship is heritage, not a transferable convenience."
 HKG_hong_kong_state_constitution: "New Hong Kong State Constitution"
 HKG_hong_kong_state_constitution_desc: "The Basic Law was drafted in Beijing, signed in London, and imposed on a people who had no vote in either capital. A new constitution drafted in Central, by Hongkongers, for Hongkongers, replaces it. The transition is final."
 HKG_armed_forces_of_hong_kong: "Armed Forces of Hong Kong"
 HKG_armed_forces_of_hong_kong_desc: "A nation that cannot defend itself is no nation at all. The Hong Kong Defence Force, drawn from volunteers and conscripts alike, will field infantry capable of holding the New Territories and a coast guard that can challenge any incursion. The Basic Law's military restrictions are dead letters."
 HKG_irredentist_claim_pearl_river: "Claim the Pearl River Delta"
 HKG_irredentist_claim_pearl_river_desc: "The Pearl River Delta - Shenzhen, Guangzhou, Zhuhai - was Cantonese before it was Communist, and the people there share more with us than with Beijing. We assert our claim openly. Whether by negotiation or by force, the Delta will reunite with its cultural heart."
 HKG_little_bird_under_british_wing: "Little Bird Under British Wing"
 HKG_little_bird_under_british_wing_desc: "The fact that Hong Kong has seceded from China does not mean that she can survive in the world on her own. We need the assistance of others. How about our old British masters?"
 HKG_request_rerule_british_government: "Request for Re-ruled by British Government"
 HKG_request_rerule_british_government_desc: "Once upon a time, the Sino-British negotiations never honoured the wishes of the Hong Kong people for remaining within the British Empire. This time, we will follow our own hearts."
 HKG_aukus_intelligence_share: "AUKUS Intelligence Sharing"
 HKG_aukus_intelligence_share_desc: "British, American and Australian intelligence services have long maintained a quiet interest in Hong Kong. Formalised tech transfer and signals cooperation, under the AUKUS umbrella, place the SAR firmly inside the Anglosphere security architecture."
 HKG_uk_garrison_rights: "British Garrison Rights"
 HKG_uk_garrison_rights_desc: "A symbolic Royal Marine detachment in Stonecutters, Royal Navy port-calls in Victoria Harbour, and a basing agreement that lets Britain reach the South China Sea from a friendly shore. The garrison is small. The signal is not."
 HKG_commonwealth_realm_ambition: "Commonwealth Realm Ambition"
 HKG_commonwealth_realm_ambition_desc: "Canada, Australia, New Zealand - all once colonies, all now realms, all still under the Crown. Hong Kong petitions the Commonwealth Heads of Government to be welcomed back, not as a possession but as a sovereign realm sharing a monarch. The historical insult of the handover finds its long answer."
 HKG_city_state_idea: "The City-state Idea"
 HKG_city_state_idea_desc: "Singapore proved it could be done. A Chinese-majority city, surrounded by larger powers, can survive and prosper as a sovereign trading hub if it chooses neutrality and competence over ideology. Hong Kong will follow that template, but better."
 HKG_revise_basic_law: "Revise the Basic Law"
 HKG_revise_basic_law_desc: "The Basic Law was drafted as a transition document, with Beijing as the implicit ultimate authority. A revised charter strips out those clauses, asserts full sovereignty, and rewrites the SAR's framework as a republic of laws. Defence and foreign policy now belong to Hong Kong."
 HKG_pearl_of_east_asia: "The Pearl of East Asia"
 HKG_pearl_of_east_asia_desc: "Free of mainland constraints and Western entanglements alike, the city positions itself as the unrivalled financial and commercial entrepot of East Asia. Capital flows through Central. Talent flows to Wan Chai. The Pearl outshines Shanghai and Singapore both."
 HKG_global_financial_capital: "Global Financial Capital"
 HKG_global_financial_capital_desc: "HKEX, an independent monetary authority, and a regulatory regime designed to attract capital that cannot trust New York or London. Hong Kong becomes the financial centre of gravity for the Asia-Pacific - quietly, profitably, irreplaceably."
 HKG_coastal_defence_doctrine: "Coastal Defence Doctrine"
 HKG_coastal_defence_doctrine_desc: "A city-state cannot afford a blue-water navy, but it can afford to make any incursion expensive. Anti-ship missiles, mined approaches, a hardened harbour and a doctrine focused on denial rather than projection. Hong Kong will be a porcupine, not a lion."
 
 #Economy
 HKG_under_lion_rock_hill: "Below the Lion Rock"
 HKG_under_lion_rock_hill_desc: "§COn the same boat beneath the Rock we’ll strive as one\n\nAll equal under the Sun.\n\nWhen we free and united be\n\nPursue our dreams of joy\n\nTogether, one soul, one heart\n\nOne hope no fear can destroy.\n\nWhere ends the sky and sea\n\nJoin hands, and walk with me\n\nTo overcome, and triumph in our fight to write\n\nOur tale of home, shining bright.§!"
 HKG_race_discrimination_bill: "Race Discrimination Bill"
 HKG_race_discrimination_bill_desc: "The Basic Law and the Hong Kong Bill of Rights Ordinance safeguard the rights of individuals, including the right against racial discrimination. We also have obligation, under the International Convention on the Elimination of All Forms of Racial Discrimination, to prohibit and to eliminate racial discrimination."
 HKG_LGBT_rights: "LGBT Rights"
 HKG_LGBT_rights_desc: "Hong Kong's LGBT community has waited too long. The government will examine what protections and reforms are possible within the current legal framework."
 HKG_affirm_support_for_christian_organizations: "Affirm Support for Christian Organizations"
 HKG_affirm_support_for_christian_organizations_desc: "Christian organisations have long held outsized influence in Hong Kong's social policy. Their advisory role will be reaffirmed and protected."
 HKG_reduce_power_of_christian_groups: "Reduce the Power of Christian Groups"
 HKG_reduce_power_of_christian_groups_desc: "The advisory role of Christian organisations in social policy will be curtailed. Secular consultation processes will expand to fill the gap."
 HKG_consult_public_on_new_law: "Consult the Public On a New Law"
 HKG_consult_public_on_new_law_desc: "Before legislating, the government will conduct extensive public consultation. The process will take time, but the result will carry democratic legitimacy."
 HKG_outlaw_anti_LGBT_discrimination: "Outlaw Anti-LGBT Discrimination"
 HKG_outlaw_anti_LGBT_discrimination_desc: "Workplace, housing, and service-provision discrimination against LGBT individuals will be made unlawful. Expect a protracted legislative fight."
 HKG_seek_reform_of_existing_legislation: "Seek Reform of Existing Legislation"
 HKG_seek_reform_of_existing_legislation_desc: "Existing discriminatory clauses across labour, family, and tenancy law will be identified and reformed."
 HKG_anti_discrimination_reform_package: "The Anti-Discrimination Reform Package"
 HKG_anti_discrimination_reform_package_desc: "A comprehensive anti-discrimination reform covering race, religion, sexual orientation, gender identity, and disability."
 HKG_legalize_gay_marriage: "Legalize Gay Marriage"
 HKG_legalize_gay_marriage_desc: "Hong Kong becomes the first East Asian jurisdiction to fully legalise same-sex marriage. Expect celebration in some circles, fierce backlash in others."
 HKG_gender_pay_gap: "The Gender Pay Gap"
 HKG_gender_pay_gap_desc: "Mandatory pay-gap reporting for all major employers. Naming and shaming will achieve what voluntary compliance has not."
 HKG_require_greater_transparency_from_employers: "Require Greater Transparency from Employers"
 HKG_require_greater_transparency_from_employers_desc: "Employers above a certain headcount will be required to publish detailed pay-equity reports annually."
 HKG_deny_existence_of_pay_gap: "Deny the Existence of the Pay Gap"
 HKG_deny_existence_of_pay_gap_desc: "The government's official position: existing pay differences reflect occupational choice, not discrimination. No further action needed."

 HKG_secondary_school_education_reform: "Secondary School Education Reform"
 HKG_secondary_school_education_reform_desc: "Secondary Education's old 3-2-2-3 system that used to exist in secondary schools will be reformed into the 3-3-4 Scheme which widely used in the US and China Mainland. This reform will not only remove some overlapping and obsolete but also add some more interesting elective subjects."
 HKG_patriotic_education_curriculum_reform: "Patriotic Education Curriculum Reform"
 HKG_patriotic_education_curriculum_reform_desc: "Patriotic education is missing from the existing Hong Kong education curriculum. We will add Liberal Studies to fill that gap."
 HKG_chinese_based_education_curriculum: "Chinese-Based Education Curriculum"
 HKG_chinese_based_education_curriculum_desc: "We are Chinese, secondly, we are Hong Kong people. All schools in Hong Kong all need to teach in Chinese. All children are expected to speak Chinese."

 HKG_hong_kong_police_force: "Hong Kong Police Force"
 HKG_hong_kong_police_force_desc: "The Hong Kong Police Force was established on May 1, 1844, and it is the largest disciplined force within the Hong Kong government. Due to restrictions on the movement of the People's Liberation Army stationed in Hong Kong, functions typically performed by the military in other countries are handled by the police force in Hong Kong. For a long time, the Hong Kong Police have been acclaimed as \"the finest in Asia.\""
 HKG_anti_terrorist_train: "Anti-Terrorist Training"
 HKG_anti_terrorist_train_desc: "The millennium has brought prosperity and opportunity, but also more new challenges. Terrorism must not take root in Hong Kong."
 HKG_purchase_chinese_weapons: "Purchase Chinese Armament"
 HKG_purchase_chinese_weapons_desc: "Replacing British-era Smith and Wesson handguns with Norinco-supplied alternatives. The cost is low, the symbolism considerable."
 HKG_create_CTRU: "Create the Counter-Terrorism Response Unit"
 HKG_create_CTRU_desc: "Counter-Terrorism Response Unit or called CTRU, is a rapid reaction force set up to respond to terrorist activities. They will be the elite of the elite."
 HKG_police_system_reform: "Police System Reform"
 HKG_police_system_reform_desc: "A modernisation of HKPF training, command structure, and accountability mechanisms."
 HKG_investigate_police_triad_cooperation_problem: "Investigate the Police-Triad Cooperation Issue"
 HKG_investigate_police_triad_cooperation_problem_desc: "We could plant undercover agents into the Triads, so will they. These moles are leaking a lot of our operations ahead of time. We will go through the ICAC and OCTB itself catch these “Hak Ging”."
 HKG_anti_protest_train: "Extensive Riot Training"
 HKG_anti_protest_train_desc: "Specialised training for crowd-management scenarios, from peaceful assemblies to violent unrest."
 HKG_purchase_anti_riot_armour: "Acquire Riot Equipment"
 HKG_purchase_anti_riot_armour_desc: "New ballistic and impact-resistant gear for the Police Tactical Unit."
 HKG_purchase_non_lethal_weapons: "Purchase Non-Lethal Weapons"
 HKG_purchase_non_lethal_weapons_desc: "Tear-gas launchers, rubber bullets, and pepper-ball weapons, the modern crowd-control toolkit."
 HKG_form_elite_team: "Form the Elite Team"
 HKG_form_elite_team_desc: "A dedicated counter-terrorism response unit, modelled on overseas tactical teams."

 HKG_gong_hei_fat_coi: "Gong Hei Faat Choy"
 HKG_gong_hei_fat_coi_desc: "The [HKG.GetFlag]Hong Kong, where has just experienced the financial turmoil and entered the new millennium, is facing many economy and social problems. How to solve them, is left to the judgement of people."
 HKG_typhoon_shelter_from_financial_storm: "Shelter from the Financial Storm"
 HKG_typhoon_shelter_from_financial_storm_desc: "The storm has passed, it's time to clean up the mess. The government will use foreign exchange reserves and intervention policies to stimulate the economy."
 HKG_merge_into_HKEX: "Merge HKCE and HKFE into HKEX"
 HKG_merge_into_HKEX_desc: "After the 1997 Financial Storm, we will allow The Hong Kong Commodity Exchange(HKCE) and the Hong Kong Futures Exchange(HKFE) to merge into the Hong Kong Exchanges and Clearing Limited(HKEX) to enhance Hong Kong's competitiveness and to meet the challenges posed by the globalization of markets."
 HKG_greatest_entrepot: "The greatest Port Merchant in East Asia"
 HKG_greatest_entrepot_desc: "Hong Kong has long been Asia's premier entrepot. Expanding the port's capacity and freight-handling efficiency will keep the title."
 HKG_expand_Kwai_Tsing_terminals: "Expand Kwai Tsing Terminals"
 HKG_expand_Kwai_Tsing_terminals_desc: "New container-handling capacity at Kwai Tsing. Larger ships, faster turnaround, more cargo through Hong Kong."
 HKG_attract_foreign_investment: "Attract Foreign Investment"
 HKG_attract_foreign_investment_desc: "A package of tax incentives, regulatory streamlining, and dedicated investor liaison services to draw capital from abroad."
 HKG_european_business: "The European Business"
 HKG_european_business_desc: "Targeted outreach to European chambers of commerce. Hong Kong as the regional gateway for European firms entering Asia."
 HKG_chinese_entrepreneurs: "The Mainland Entrepreneurs"
 HKG_chinese_entrepreneurs_desc: "Mainland Chinese capital is the future of Hong Kong's economy. The government will deepen ties with Beijing's business establishment."
 HKG_develop_solar_power: "Invest in Solar Power"
 HKG_develop_solar_power_desc: "Distributed photovoltaic installations across rooftops and reservoirs. A modest start, but a start."
 HKG_T_PARK: "T·PARK Facility"
 HKG_T_PARK_desc: "The T-PARK sludge treatment facility in Tuen Mun turns waste into energy and demonstrates Hong Kong's environmental ambition."
 HKG_indonesian_gas: "Gas from Jakarta"
 HKG_indonesian_gas_desc: "A long-term liquefied natural gas supply agreement with Indonesia, securing Hong Kong's energy needs for decades to come."
 HKG_australian_oil: "Oil from Sydney"
 HKG_australian_oil_desc: "An import partnership with Australian crude producers, diversifying Hong Kong's hydrocarbon dependence away from a single supplier."
 HKG_new_development_idea: "New Developmental Plan"
 HKG_new_development_idea_desc: "The New Development Initiative bundles infrastructure, housing, and industrial-zone projects under a single coordinated banner."
 HKG_invest_hong_kong: "Invest in Hong Kong"
 HKG_invest_hong_kong_desc: "InvestHK is restructured and re-funded as the city's flagship investment-promotion agency."
 HKG_hong_kong_science_parks: "Science Parks"
 HKG_hong_kong_science_parks_desc: "Dedicated zones in Sha Tin and Tseung Kwan O for biotech, AI, and advanced manufacturing R&D, with subsidised office space for startups."
 HKG_invite_talent_to_hong_kong: "Invite Talent to Hong Kong"
 HKG_invite_talent_to_hong_kong_desc: "An expedited visa scheme for high-skilled foreign professionals, with English-language services and tax incentives to ease the transition."
 HKG_hong_kong_cyberport: "The Cyberport"
 HKG_hong_kong_cyberport_desc: "Cyberport's mandate is renewed and expanded as a digital business cluster targeting fintech, e-commerce, and digital media."
 HKG_tech_incubation_programme: "Tech Incubation Program"
 HKG_tech_incubation_programme_desc: "Government-funded incubators with seed capital, mentorship, and shared infrastructure for early-stage technology startups."
 HKG_favor_traditional_values: "Turn to Tradition"
 HKG_favor_traditional_values_desc: "The government will publicly align with traditional family values, restricting LGBT activism in education and public life."
 HKG_undercover_oppression: "Undercover Oppression"
 HKG_undercover_oppression_desc: "A quieter approach: surveillance, employer pressure, and unofficial discouragement rather than open legislation against minority groups."
 HKG_legislate_to_ban_LGBT: "Ban the LGBT collective"
 HKG_legislate_to_ban_LGBT_desc: "Open legislation criminalising public expressions of LGBT identity. The international community will react sharply."

 HKG_regulate_sale_of_residential_buildings: "Regulate Sale of Residential Buildings"
 HKG_regulate_sale_of_residential_buildings_desc: "A modest framework of disclosure rules, mortgage limits, and anti-speculation taxes. The Suen plan stays in place, but the worst excesses of the unregulated market get a check."
 HKG_land_reclamation: "Land Reclamation"
 HKG_land_reclamation_desc: "Hong Kong has only so much land. The Civil Engineering Department draws up a new programme of reclamation off Lantau, the New Territories coast, and the Kowloon harbour. The cost is enormous and the environmentalists are furious; the new building slots are worth it."
 HKG_lock_housing_price: "Freeze Housing Prices"
 HKG_lock_housing_price_desc: "The government legislates a hard ceiling on residential property prices, indexed to median income. Landowners are apoplectic; tenants and the labour unions celebrate. The market becomes predictable - and stagnant."
 HKG_expand_home_ownership_scheme: "Expand Home Ownership Scheme"
 HKG_expand_home_ownership_scheme_desc: "The Home Ownership Scheme is broadened: more flats, lower thresholds, faster processing. A working-class Hongkonger can finally aspire to ownership. The treasury bears the subsidy; the social peace is the dividend."
 HKG_let_government_hold_companies: "Government-Owned Companies"
 HKG_let_government_hold_companies_desc: "The largest property-development firms - Sun Hung Kai, Cheung Kong, Henderson - are partially nationalised. The tycoons protest loudly; the government holds the equity. Property prices come under direct political control."
 HKG_maintain_public_housing_construction: "Maintain Public Housing Construction"
 HKG_maintain_public_housing_construction_desc: "The Housing Authority's construction pipeline is preserved and expanded. Public estates rise across the New Territories. The infrastructure investment shows up in stability and a quietly more contented population."
 HKG_my_home_purchase_scheme: "Home Purchase Scheme"
 HKG_my_home_purchase_scheme_desc: "Donald Tsang's My Home Purchase Plan is implemented as designed: rent-to-own units for the sandwich class, the Hongkongers who earn too much for public housing but can't afford the private market. A tangible answer to the affordability crisis."
 HKG_subsidised_sale_flats_project: "Subsidised Flats Project"
 HKG_subsidised_sale_flats_project_desc: "Government-subsidised sale flats, sold below market rate to first-time buyers. The Housing Authority becomes, in effect, the SAR's largest developer."
 HKG_green_form_subsidised_home_ownership_scheme: "Green-Form Ownership Scheme"
 HKG_green_form_subsidised_home_ownership_scheme_desc: "The capstone of housing reform: Green Form holders - existing public housing tenants - get preferential access to subsidised ownership. The chain of upward mobility, broken for two decades, is finally rebuilt. Hong Kong's housing crisis ends."
 HKG_public_housing_problem: "Public Housing Problem"
 HKG_public_housing_problem_desc: "Hong Kong's housing crisis is the most visible failure of the post-handover government. Median home prices outstrip median incomes by an order of magnitude; subdivided flats and cage homes house tens of thousands; the waiting list for public housing stretches over six years. The political pressure to do something - anything - is overwhelming."
 HKG_sun_housing_policy: "Sun's Nine Housing Reform Policy"
 HKG_sun_housing_policy_desc: "Housing Secretary Michael Suen's nine-point programme. Restrict supply, halt public construction, let the market recover. The landowners and conglomerates approve. The labour unions and tenants do not. History will judge the policy harshly, but it secures the property market in the short term."
 HKG_end_tenants_purchase_scheme: "End the Tenants Purchase Scheme"
 HKG_end_tenants_purchase_scheme_desc: "Public housing tenants will no longer be allowed to buy their flats at discounted rates. The treasury keeps the asset; tenants stay tenants. A small revenue gain at a real social cost."
 HKG_suspend_home_ownership_scheme: "Suspend the Home Ownership Scheme"
 HKG_suspend_home_ownership_scheme_desc: "The Home Ownership Scheme is suspended indefinitely. The pipeline of subsidised sale flats dries up, the private market is freed of public competition, and the property tycoons have one less concern."
 HKG_curtail_land_supply: "Curtail the Land Supply"
 HKG_curtail_land_supply_desc: "Government land sales are halted; the Lands Department keeps its inventory off the market. Prices stabilise at high levels, the property market consolidates, and the housing crisis becomes a permanent feature of Hong Kong life."
#Decisions
 HKG_triad_decision_categories: "Take on the Organised Crime and Triads"
 HKG_triad_decision_categories_desc: "\n\n\n\n\n\n£HKG_desctext_OCTB\n\n\n\n\n\n\n\n\nCurrent Triad Strength: §0[?ROOT.HKG_triad_strength]%§!                     Triad's Crime Evidence we have: §G[?ROOT.HKG_triad_evidence]§!"
 HKG_send_undercover_police: "Send Undercover Police into Triad"
 HKG_send_undercover_police_desc: "Send undercover police to gather evidence of Triad criminal activities."
 HKG_search_suspected_triad_gatherings: "Search Suspected Triad Gatherings"
 HKG_search_suspected_triad_gatherings_desc: "Searching these locations may indeed yield some criminal evidence and also help to slightly weaken the influence of the Triad."
 HKG_pay_off_informant: "Pay off the Informant"
 HKG_pay_off_informant_desc: "Although informants sometimes provide us with useful evidence of criminal activity, more often than not, these individuals only offer us useless information after they've been paid."
 HKG_arrest_peripheral_members_of_triad: "Arrest the peripheral members of the Triad"
 HKG_crack_down_on_organized_vehicle_theft: "Crack down on Organized Vehicle Theft"
