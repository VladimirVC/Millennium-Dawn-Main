 korea_russia.12.d: "Corea del Norte ha aceptado firmar el acuerdo propuesto a nosotros. Tal vez ahora el equilibrio de poder en la península coreana cambie a nuestro favor!"
 korea_russia.12.a: "Hurra!"
 korea_russia.13.t: "Tratado de Asociación Estratégica Integral"
 korea_russia.13.d: "Corea del Norte ha aceptado firmar el acuerdo propuesto a nosotros. Tal vez ahora el equilibrio de poder en la península coreana cambie a nuestro favor!"
 korea_russia.13.a: "Hurra!"
 korea_russia.14.t: "Corea del Norte Propone un Proyecto Conjunto de Buques"
 korea_russia.14.d: "El gobierno norcoreano propone crear un proyecto conjunto en el ámbito de la marina. La marina norcoreana actualmente solo tiene barcos muy anticuados que no permitirán que su flota ofrezca una fuerte resistencia al enemigo en caso de guerra. Nos ofrecieron patrocinar la creación de un proyecto conjunto de buques para satisfacer las necesidades de la Marina Norcoreana."
 korea_russia.14.a: "Les Ayudaremos"
 korea_russia.14.b: "No"
 korea_russia.15.t: "Proyecto Conjunto de Buques con Rusia"
 korea_russia.15.d: "El gobierno ruso ha aceptado crear un proyecto conjunto en el ámbito de la marina para ayudar a nuestra flotilla técnicamente débil, les estamos inmensamente agradecidos!"
 korea_russia.15.a: "Uraaaaaa!"
 korea_russia.16.t: "[NKO.GetNameWithFlag] Quiere Expandir el Comercio"
 korea_russia.16.d: "El gobierno norcoreano quiere concluir un acuerdo comercial con nosotros e intenta expandir la cooperación con nuestro país, tal vez valga la pena ser escéptico sobre esto, dado lo que es Corea del Norte, o tal vez no."
 korea_russia.16.a: "Estamos de Acuerdo"
 korea_russia.16.b: "No"
 korea_russia.17.t: "Acuerdo Comercial con [FROM.GetName]"
 korea_russia.17.d: "Su gobierno ha aceptado expandir el comercio con nosotros, agregando nuevos acuerdos que les hemos ofrecido firmar! Nuestra lucha contra la influencia de las sanciones continúa!"
 korea_russia.17.a: "Bonito"
 korea_russia.18.t: "Acuerdo Comercial con [FROM.GetName]"
 korea_russia.18.d: "Su gobierno se negó a expandir el volumen comercial entre los países y, en principio, fue escéptico sobre la expansión de la cooperación con nosotros en cualquier área."
 korea_russia.18.a: "Triste"
 korea_russia.19.t: "Corea del Norte Propone un Proyecto Conjunto"
 korea_russia.19.d: "El gobierno norcoreano está interesado en nuestra industria de aviación militar y quiere crear un proyecto conjunto para crear un caza norcoreano para las necesidades de su ejército. Podemos ayudarlos con esto, pero a cambio fortaleceremos significativamente nuestra influencia sobre su país."
 korea_russia.19.a: "Les Ayudaremos"
 korea_russia.19.b: "No"
 korea_russia.20.t: "Proyecto Conjunto de Aeronaves con Rusia"
 korea_russia.20.d: "El gobierno ruso ha aceptado un proyecto conjunto para crear su propio caza para nosotros, ahora nuestra flotilla de aviación tendrá más poder!"
 korea_russia.20.a: "Uraaaaaa!"
 korea_russia.21.t: "Rusia Ha Contratado a Nuestros Trabajadores"
 korea_russia.21.d: "Hemos firmado un acuerdo con Rusia para contratar a nuestros trabajadores en gran número para ayudar en los trabajos de construcción. Las condiciones son más que favorables para nosotros, porque el lado ruso paga salarios generosos"
 korea_russia.21.a: "Bonito"
 korea_russia_news.1.t: "La Alianza entre [NKO.GetName] y [SOV.GetName]"
 korea_russia_news.1.d: "Hoy, se firmó un Tratado de Asociación Estratégica Integral entre [NKO.GetName] y [SOV.GetName]. Este tratado implica asistencia económica, política y militar entre los países signatarios. Ahora las dos naciones están más unidas que nunca."
 korea_russia_news.1.a: "Que Nos Teman!"
 korea_russia_news.1.b: "De Repente"
 korea_china.1.t: "Corea del Norte Propone un Proyecto Conjunto de Aeronaves"
 korea_china.1.d: "El gobierno norcoreano está interesado en nuestra industria de aviación militar y quiere crear un proyecto conjunto para crear un caza norcoreano para las necesidades de su ejército. Podemos ayudarlos con esto, pero a cambio fortaleceremos significativamente nuestra influencia sobre su país."
 korea_china.1.a: "Les Ayudaremos"
 korea_china.1.b: "No"
 korea_china.2.t: "Proyecto Conjunto de Aeronaves con China"
 korea_china.2.d: "El gobierno chino ha aceptado un proyecto conjunto para crear su propio caza para nosotros, ahora nuestra flotilla de aviación tendrá más poder!"
 korea_china.2.a: "Bien"
 korea_china.3.t: "Rechazaron la Oferta"
 korea_china.3.d: "El gobierno chino ha rechazado nuestra generosa oferta. Tal vez piensen mejor la próxima vez.."
 korea_china.3.a: "Triste"
 korea_china.4.t: "Corea del Norte Pide Protección"
 korea_china.4.d: "El gobierno norcoreano nos ha pedido que garanticemos la independencia de su país, ya que se sienten amenazados por una situación política tan difícil en el país."
 korea_china.4.a: "Les Ayudaremos"
 korea_china.4.b: "No"
 korea_china.5.t: "Solicitud de Protección a China"
 korea_china.5.d: "El Gobierno Chino ha aceptado proporcionarnos garantías de nuestra independencia por su parte! Esto aliviará significativamente nuestra situación política."
 korea_china.5.a: "Bien"
 korea_china.6.t: "Solicitud de Protección a China"
 korea_china.6.d: "El gobierno chino ha rechazado nuestra generosa oferta. Tal vez piensen mejor la próxima vez.."
 korea_china.6.a: "Triste"
 korea_china.7.t: "Ayuda en la Búsqueda de Recursos"
 korea_china.7.d: "El gobierno norcoreano nos pide que proporcionemos asistencia en varios proyectos de recursos para explorar nuevas reservas de recursos en su territorio, naturalmente, gracias a este acuerdo, fortaleceremos nuestra influencia sobre ellos."
 korea_china.7.a: "Les Ayudaremos"
 korea_china.7.b: "No"
 korea_china.8.t: "Ayuda en la Búsqueda de Recursos"
 korea_china.8.d: "El gobierno chino ha aceptado ayudar con proyectos de búsqueda de recursos"
 korea_china.8.a: "Bien"
 korea_china.9.t: "Nuevas Fábricas en Corea del Norte"
 korea_china.9.d: "El gobierno norcoreano está muy preocupado por su situación económica, los trabajadores no tienen dónde trabajar y se necesitan urgentemente nuevas fábricas para esto, por lo que se dirigieron a nosotros para que los ayudáramos a resolver este problema, entendemos que esto ayudará a fortalecer la influencia sobre su gobierno."
 korea_china.9.a: "Les Ayudaremos"
 korea_china.9.b: "No"
 korea_china.10.t: "Nuevas Fábricas en Corea del Norte"
 korea_china.10.d: "El gobierno chino ha aceptado ayudar con la construcción de nuevas fábricas en nuestro territorio!"
 korea_china.10.a: "Bien"
 korea_china.11.t: "Bancos Nacionales en Corea del Norte"
 korea_china.11.d: "El gobierno norcoreano está preocupado por la situación económica en el país y busca cualquier manera de restaurar la economía de inmediato después de los eventos pasados, están invitando activamente a nuestros bancos a su país, y tenemos la intención de dar nuestra respuesta."
 korea_china.11.a: "Les Ayudaremos"
 korea_china.11.b: "No"
 korea_china.12.t: "Bancos Chinos en Corea del Norte"
 korea_china.12.d: "El gobierno chino ha permitido que sus bancos operen en nuestro país."
 korea_china.12.a: "Bien"
 korea_china.13.t: "Huawei en Corea del Norte"
 korea_china.13.d: "El gobierno norcoreano busca activamente la participación de Huawei en su país, deseando verlos participar en la economía de Corea del Norte, esto es un paso serio para nosotros si les permitimos operar allí."
 korea_china.13.a: "Les Ayudaremos"
 korea_china.13.b: "No"
 korea_china.14.t: "Huawei en Corea del Norte"
 korea_china.14.d: "Huawei operará en nuestro territorio, el gobierno chino ha aprobado un permiso para este tipo de actividad para la empresa."
 korea_china.14.a: "Bien"
 korea_china.15.t: "Nuestra Base Militar en Corea del Norte"
 korea_china.15.d: "El ejército norcoreano quiere ver nuestra base militar en su territorio para mantener la estabilidad en el país en caso de un posible ataque enemigo."
 korea_china.15.a: "Les Ayudaremos"
 korea_china.15.b: "No"
 korea_china.16.t: "Base Militar China en Corea del Norte"
 korea_china.16.d: "La base militar china pronto estará ubicada en nuestro territorio, ahora nos sentimos seguros!"
 korea_china.16.a: "Bien"
