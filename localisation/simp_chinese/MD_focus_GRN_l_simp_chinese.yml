l_simp_chinese:
 greenland_focus: "格陵兰国策树"
 GRN_intro_to_greenland_shortcut: "格陵兰岛简介"
 GRN_greenland_foreign_policy_tree: "格陵兰外交政策"
 GRN_focus_The_Great_Ice_Island: "大冰岛"
 GRN_focus_The_Great_Ice_Island_desc: "格陵兰岛是世界上已知最大的岛屿之一，仅次于严格意义上的澳大利亚大陆。岛上居住着大约5.8万居民，他们主要属于因纽特文化群体。格陵兰岛被视为地球上最后一片尚未开发的处女地，其重要性仅次于对地球南北极的开发。如今，在21世纪，格陵兰岛及其居民将自己视为最后一个真正的殖民地，并积极寻求真正的独立。但他们最终能否获得自由？还是会因为无法证明这座岛屿能够真正独立而功亏一篑？"
 GRN_focus_The_People: "人民"
 GRN_focus_The_People_desc: "我们国家面临的核心问题之一是人口短缺。人们需要食物、住所和公共服务，以便在需要时获得关怀和帮助。因此，我们必须解决这些问题，才能确保未来人们愿意来我们国家生活和定居，在这个看似没有未来的地方创造属于他们自己的未来。"
 GRN_focus_Food_Security: "粮食安全"
 GRN_focus_Food_Security_desc: "岛上主要的食物来源是渔业。但渔业也是我们主要的经济瓶颈，如果我们还要进口同样的食物，又该如何养活自己呢？这正是我们想要拥有稳定未来必须建立的关键支柱之一。"
 GRN_focus_Breaking_Ground_For_Farmlands: "“农田”项目破土动工"
 GRN_focus_Breaking_Ground_For_Farmlands_desc: "温室和垂直农业项目。这些主食将成为我们国家新型食品供应的基石，因此我们需要建立种植和培育这些食物的设施。虽然这个过程需要消耗大量能源，但如果我们搭建好基础设施，并重新审视我们现有的资源，我们就能拼凑出一些基本要素，让一切运转起来。"
 GRN_focus_East_Farmland_Projects: "东部“农田”工程"
 GRN_focus_East_Farmland_Projects_desc: "就像我们最初在西部地区开展的基础性工作一样，我们也需要在东部地区开展同样的工作。我们需要建立小型食品中心，以帮助向全国各地以及我们相对稀疏的居民点进行物流和配送。"
 GRN_focus_Growing_Staple_Foods: "种植主食"
 GRN_focus_Growing_Staple_Foods_desc: "在条件艰苦的早期农业项目中，我们目前只会种植一些主食作物，例如土豆、小麦以及少量其他有助于补充热量且易于延长食用周期的核心食品。"
 GRN_focus_Strategic_Cash_Crops: "战略性经济作物"
 GRN_focus_Strategic_Cash_Crops_desc: "战略性经济作物计划是我们新的艰苦农业项目的一个有限领域，在我们努力加强国家国内粮食供应的同时，我们也可以研究棉花等有限的经济作物，以此来促进国内工业发展。"
 GRN_focus_National_Seed_Vault: "国家种子库"
 GRN_focus_National_Seed_Vault_desc: "随着我们在全国范围内以及地方层面扩展艰苦地区农业项目，我们必须实现作物种植种类的多样化和扩展。为此，我们将建立一个国家种子库，用于保存和合理分配轮作作物，使我们的国家能够尽可能多地享受到世界各地的丰饶物产。"
 GRN_focus_Stable_Population_Growth: "人口稳定增长"
 GRN_focus_Stable_Population_Growth_desc: "我们国家自建国以来，一直受制于人口稳定问题。许多人因为恶劣的生存环境或为了看看更广阔的世界而逃离家园。说实话，我们不能责怪他们渴望拥有更好的生活，但我们应该反思自己，为什么没有努力创造让人们留下的理由。我们无法改变天气，但我们可以发展城镇和居民区，使之更具吸引力，从而让人们愿意留下来，并帮助他们改善生活。"
 GRN_focus_Planning_New_Settlements: "规划新定居点"
 GRN_focus_Planning_New_Settlements_desc: "人口增长能力受限于住房条件和新城镇的整体规划。目前大部分城镇都围绕首都努克而建，因此在规划和开发的初期阶段，我们暂时只能以首都为基地，从那里调配后勤物资。"
 GRN_focus_Spread_Settlement_Planning_East: "东区定居点规划"
 GRN_focus_Spread_Settlement_Planning_East_desc: "虽然努克是我们在岛屿西部地区的后勤基地，但我们还需要建立一个类似“东部首都”的地方。这样，东部地区也能拥有一个后勤枢纽，以便规划和分配资源，促进该国两大主要区域的定居点发展和增长。"
 GRN_focus_New_Hope_Settlement: "新希望定居点"
 GRN_focus_New_Hope_Settlement_desc: "为了努力为我们的公民创造更美好的明天、更美好的未来和更美好的生活，我们着手在西北部建立一个全新的定居点，名为内里乌内克·努塔克，大致翻译为“新希望”。我们希望它能成为我们国家发展和岛屿西部地区进步的灯塔。"
 GRN_focus_Great_Star_Settlement: "大星定居点"
 GRN_focus_Great_Star_Settlement_desc: "为了均衡发展，确保后勤需求得到持续满足，我们将在与西部定居点大致相同的区域内，建设东部定居点。该定居点被命名为“大星”，我们希望以此为东部核心基地，逐步拓展发展版图，同时兼顾沿海地区的增长，并向内陆的大冰架地区推进。"
 GRN_focus_Development_Living_Grants: "发展生活补助金"
 GRN_focus_Development_Living_Grants_desc: "发展生活补助金计划是政府为鼓励移民而发放的补助金。其核心原则是，该补助金将用于支付旅费和安家费用。一旦个人或团体安顿下来，并在政府的帮助下找到稳定的工作并获得收入，补助金即告停止发放。本质上，这是一项通过积极发展国家来促进人口增长的人力资源投资。"
 GRN_focus_Developing_Public_Services: "发展公共服务"
 GRN_focus_Developing_Public_Services_desc: "改善和发展公共系统及基础设施将极大地提升公民的生活质量。我们将对教育、医疗、福利等领域进行一系列改进，并为国家未来发展更安全的互联网服务。"
 GRN_focus_Recruiting_More_Teachers: "招聘更多教师"
 GRN_focus_Recruiting_More_Teachers_desc: "我们教育体系面临的一大问题是师资力量不足。由于班级规模越来越大，每个教师要教的学生人数也越来越多，许多学生仅仅因为缺乏有效的学习途径而辍学。因此，我们必须招募更多国内外教师，帮助他们教导和培养我们的孩子。希望这一举措能够为所有渴望学习和成长的人们开启更加光明的未来。"
 GRN_focus_Improving_Medical_Stockpiles: "改善医疗储备"
 GRN_focus_Improving_Medical_Stockpiles_desc: "药品、人员和设备。这些是我们妥善满足公民健康需求的主要要素。因此，我们必须提高储存能力和处理效率，以确保能够满足可能出现的任何需求。"
 GRN_focus_Creating_Concentrated_Internet_Services: "创建集中式互联网服务"
 GRN_focus_Creating_Concentrated_Internet_Services_desc: "互联网接入总体而言已成为现代社会和发达经济体的必备要素。我们必须建立一定规模的互联网基础设施，以确保我国能够更好地与世界接轨。我们的公民和公共服务部门也能从互联网服务在某些领域带来的效率提升中受益。"
 GRN_focus_Recruiting_More_Social_Workers: "招募更多社会工作者"
 GRN_focus_Recruiting_More_Social_Workers_desc: "随着人口可能因发展而增长，提高人员配备的数量和质量将确保我们的社会服务能够满足国家的需求。虽然成本是一个需要考虑的问题，但如果因为人们知道在真正需要帮助时得不到照顾而吓跑他们，那么成本就毫无意义了。"
 GRN_focus_Basic_Eastern_Roadworks: "东部基础道路工程"
 GRN_focus_Basic_Eastern_Roadworks_desc: "东部地区是全国较为欠发达的地区，我们应该通过改善道路等方式提升其后勤保障，从而促进其发展。虽然这并非当务之急，但随着我们持续发展壮大该地区，提前制定一套可供其遵循的框架（暂且这么说吧）将大有裨益。"
 GRN_focus_Greenlandic_Economy: "格陵兰经济"
 GRN_focus_Greenlandic_Economy_desc: "人们需要物资，需要生活必需品，需要工作和谋生的能力。因此，发展经济、资源开采能力以及支撑这些需求的配套基础设施都需要进行规划和投资。"
 GRN_focus_Economic_Diversification: "经济多元化"
 GRN_focus_Economic_Diversification_desc: "我国受诸多因素制约，必须发展并确保各项基础工作到位，才能拓展经济手段。仅仅依靠渔业或近乎封建的经济模式，对国家和人民毫无益处。我们必须改变这种现状。"
 GRN_focus_Western_Zoning: "西部地区"
 GRN_focus_Western_Zoning_desc: "首都位于西部，因此我们将从那里开始规划和开发的早期阶段。对土地进行稳定性调查，评估其稳定性、需求以及建立和运营相关产业所需的资源，这些都将比以往花费更多。但如果我们要在最恶劣的自然环境下生存，就必须承受并理解由此带来的代价。"
 GRN_focus_Eastern_Groundworks: "东部地区"
 GRN_focus_Eastern_Groundworks_desc: "如果我们想要在经济发展、人口增长，或者至少实现稳定方面取得任何进展，就必须充分利用所有可用的土地。因此，在规划初期阶段，为东部项目奠定基础至关重要。"
 GRN_focus_Basic_Industrialization: "基础工业化"
 GRN_focus_Basic_Industrialization_desc: "随着前期准备和区域规划的完成，我们可以建立国家未来所需的小型但至关重要的制造业。当然，在解决采矿问题之前，我们仍需依赖进口原材料。值得庆幸的是，我们可以利用丹麦与欧盟的联系来解决这个问题。"
 GRN_focus_Basic_Coastal_Manufacturing: "沿海基础制造"
 GRN_focus_Basic_Coastal_Manufacturing_desc: "在补充现有捕鱼方式的同时，我们还可以建立衡量标准，以创建我们自己的贸易船只，用于与丹麦以及那些希望帮助我们国家发展壮大的国家进行贸易往来。"
 GRN_focus_Babys_First_Economy: "婴儿优先经济"
 GRN_focus_Babys_First_Economy_desc: "我们现在已经打下了坚实的基础，为人们前来工作创造了条件。现在我们只需要发展基础设施来支持人民，并解决其他七项阻碍国家发展的关键问题。但要一步一步来，总有一天我们会实现目标。"
 GRN_focus_Infrastructure_Development: "基础设施开发"
 GRN_focus_Infrastructure_Development_desc: "连接和发展我们国家的最佳途径是建立一套标准化且灵活的基础设施体系。为此，我们需要聘请地质学、工程学等领域的专家，根据我们所需的基础设施类型进行规划。我们还需要了解如何以最佳方式进行开发和规划，使其尽可能地适应长期需求，避免日后需要进行大修。"
 GRN_focus_The_Network_Debate: "网络辩论"
 GRN_focus_The_Network_Debate_desc: "建立完善的道路网络将和我们即将开展的任何其他工作一样充满挑战。因此，我们需要进行勘测，并为未来道路的规划奠定基础。从首都努克开始，有助于树立标准，并至少在西部沿海地区 - 这片土地的资源和人口源泉 - 打造完善的道路网络。"
 GRN_focus_Narrow_Gauge_Standard: "窄轨标准"
 GRN_focus_Narrow_Gauge_Standard_desc: "制定铁路设备和运输的国家标准将决定我们未来铁路发展的步伐和底线。采用窄轨铁路可以让我们更灵活地适应地形，建造和维护成本更低，而且更有利于轨道结构和地基的加固。"
 GRN_focus_Capital_Course: "首都航线"
 GRN_focus_Capital_Course_desc: "从首都出发，逐步扩展到较小的定居点，可以更方便地旅行，并在中等距离上实现更好的连接。当然，这只是第一步，但你总得一步一步地走下去，不是吗？"
 GRN_focus_Nuuk_Western_Railway: "努克西部铁路"
 GRN_focus_Nuuk_Western_Railway_desc: "随着格陵兰岛努克西部铁路的建成，我们现在可以更好地连接首都附近分散的居民点，并以此为基础，满足国家未来在经济和人员运输方面的需求。"
 GRN_focus_Infrastructure_Infancy: "基础设施萌芽期"
 GRN_focus_Infrastructure_Infancy_desc: "通过这些至关重要但又简单的初步举措，我们得以启动国家基础设施建设，现在我们可以为发展和壮大我们所控制的土地树立一个不断演进的新先例。"
 GRN_focus_Ministry_For_Mineral_Affairs: "矿业部"
 GRN_focus_Ministry_For_Mineral_Affairs_desc: "矿业事务部是一个专门的政府机构，负责聘请地质学、结构完整性和一般采矿实践方面的专家，以确保对国家资源开采的核心启动投资从一开始就以安全有效的方式进行。这将确保所有扩张都符合早期阶段所确立的先例。"
 GRN_focus_Domesticating_Energy_Needs: "满足能源需求"
 GRN_focus_Domesticating_Energy_Needs_desc: "从根本上讲，我国需要能源。无论是供暖、电力，还是经济及其供应链的基本需求，都需要能源。因此，我们将考察一些煤炭矿藏，并启动战略性开采作业，以减少进口，改善国内能源状况。"
 GRN_focus_Limited_Strategic_Resource_Extraction: "有限战略资源开采"
 GRN_focus_Limited_Strategic_Resource_Extraction_desc: "有限战略资源开采计划旨在开发国内小规模重金属或更具战略意义的矿产开采业务。例如，在距离首都不远处发现的钛矿，同时在东部地区也有可观的矿藏储量供我们进一步开发。"
 GRN_focus_Cornerstone_Creation: "筑基立本"
 GRN_focus_Cornerstone_Creation_desc: "除了混凝土，现代经济的支柱之一就是生产钢铁的能力。我们既拥有煤炭和铁矿资源，何不建立第一座小型钢铁厂呢？规模或许不大，但定能利用这些材料推动国家发展。"
 GRN_focus_Extracting_Natural_Capital: "开采天赋之资本"
 GRN_focus_Extracting_Natural_Capital_desc: "人们常说，那山里有金子。这话没错，黄金的用途远不止穿戴在身。我们这笔多少算作“自由资本”的财富，可以用于启动未来的项目，也能在需要超常规投入时帮助稳定预算。"
 GRN_focus_Securing_Mining_Futures: "确保矿业发展"
 GRN_focus_Securing_Mining_Futures_desc: "处理繁文缛节、调整法规，并将更多重心转向以能源为导向的采矿作业，便能一石多鸟——用有力一击解决多重问题。"
 GRN_focus_The_Future: "未来"
 GRN_focus_The_Future_desc: "解决当下是首要任务，但为未来做准备同样不可或缺。因此我国的终极目标不仅是保障沿海地区民众的未来，更要为那些有意在冰架上生活的人们开创并建设未来。毕竟冰不过是凝固的水，而我们如今已能蒸馏淡水了，不是么。"
 GRN_focus_Coastal_Economic_Zones: "沿海经济区"
 GRN_focus_Coastal_Economic_Zones_desc: "格陵兰未来发展的终极目标在于我们能否驯服内陆。如今许多人说不能仅靠冰层生存，对此我们回应——当然如此。但冰不过是淡水，而要从冰中获取水，只需融化它。因此，我们应在沿海地区开发定向经济区，为启动冰架蒸馏工艺奠定基础并积累财政能力。这将是一场漫长而艰巨的事业，但只要我们保有如此毅力，向腹地缓慢北进的征程已然开启。"
 GRN_focus_Foreign_Logistics_Hub_One: "一号外联物流枢纽"
 GRN_focus_Foreign_Logistics_Hub_One_desc: "建立沿海经济区最核心的位置，其实在岛上最南端。在距塔休萨克不远的地方，我们将利用几处坡势较为平缓的峡湾，开凿并打造一座港阔坞深的港口兼“城市”式复合体。这片中转基地将助推向西挺进北方大拓进的脚步。"
 GRN_focus_Foreign_Logistics_Hub_Two: "二号外联物流枢纽"
 GRN_focus_Foreign_Logistics_Hub_Two_desc: "为补充核心经济区，我们将在伊蒂莱克镇附近建立一套类似的设施体系。这一中转基地将助推向东挺进北方大拓进的脚步，并将两个南部区域整合为一个“CCEZ”，即“相连沿海经济区”。"
 GRN_focus_West_Hub_Distillation_Facility: "西部枢纽蒸馏设施"
 GRN_focus_West_Hub_Distillation_Facility_desc: "建立一套综合蒸馏设施，以开展冰架冰体的提取作业，将使我们得以增加国内淡水供应，并顺势在冰架上开辟出一条向北的通路。这一过程耗资巨大，且需长期引入外籍人员，直至我们能够培训并雇佣本地劳动力。然而，从长远看，为开发与利用这片冰封荒原下的土地，付出这一切代价将是值得的。"
 GRN_focus_East_Hub_Distillation_Facility: "东部枢纽蒸馏设施"
 GRN_focus_East_Hub_Distillation_Facility_desc: "在拓展我们建立的相连沿海经济区整体用途的基础上，第二座主要蒸馏设施现已投入建设，以配合西线推进。东部中心蒸馏设施将执行相同功能，但将助力东线通过协同北进的统一攻势实现突破。"
 GRN_focus_Southern_Fjords_Railway: "南方峡湾铁路"
 GRN_focus_Southern_Fjords_Railway_desc: "在该区域建立铁路不仅能让我们更好地连接整个相连沿海经济区，还有助于将水资源输送到南部地区的不同区域，用于居民和商业用途。"
 GRN_focus_Staging_Zones_For_The_Shelf: "冰架中转区"
 GRN_focus_Staging_Zones_For_The_Shelf_desc: "为达成驯服大冰架的宏伟目标，我们首先需要建立战略中转区，确保能够真正利用这片冰封水域，而非任其消融入海。"
 GRN_focus_The_Great_Eastern_Staging_Grounds: "大东部集结地"
 GRN_focus_The_Great_Eastern_Staging_Grounds_desc: "东部是岛上人口最稀少的区域，因此我们需要雇佣并签约专家，让他们长期驻扎并奠定基础，为日后向大冰原腹地推进做好铺垫。为此，我们将把廷米亚尔米特岛作为关键中转站，首先在主岛沿海区域进行土地平整与资源开采工作。"
 GRN_focus_Capital_Staging_Works: "首都集结地"
 GRN_focus_Capital_Staging_Works_desc: "努克首都周边地区是岛上最发达的区域之一。因此，主要西部集结地设在首都区域是合理的。这里建有专门且全面的蒸馏厂园区、研发中心，并投入大量政府津贴引进专家和教师，以便最终将基地移交给格陵兰本地人。这需要大量时间和资源，但融化那些冰冻的水域、发掘岛屿内部的基岩实非易事。"
 GRN_focus_Meeting_Needs: "满足需求"
 GRN_focus_Meeting_Needs_desc: "要打造如此精密复杂的设备，我们必须建立本地供应链，至少尽可能实现本地化。满足工商业需求的小型企业将补充前进基地的发展，并因此为最终的向内推进奠定标准。"
 GRN_focus_Supplying_Outposts: "供应哨所"
 GRN_focus_Supplying_Outposts_desc: "尽管格陵兰在官方上没有军事力量，但若要在通往大冰架的补给线上取得合理进展，就必须确保各类补给需求得到满足。因此我们将建立极小型军工业，专为哨所供应武器弹药，用于狩猎和防范潜在劫掠者。毕竟在荒芜之地，谁又能听见你的呼救声呢。"
 GRN_focus_General_National_Investments: "全面国家投资"
 GRN_focus_General_National_Investments_desc: "为了国家的财政和内政稳定，我们必须推进采矿、运输及各项基础设施的改善。现在舞台已经落成，奠基工作也已正式启动，我们即将在今后几年内征服冰架，拉开我们民族伟业的序幕。与此同时，NWR与SFR铁路公司将实现连接，共同组建大西部峡湾铁路（GWFR）。"
 GRN_focus_Greater_Greenland_Act: "大格陵兰法案"
 GRN_focus_Greater_Greenland_Act_desc: "此项法案专门拨款，旨在改善国民家庭福祉，并吸引那些渴望生活在比当前更为团结之境、且拥有相近文化与民族背景的人们。本法案此章节专用于西部地区的移民与定居。"
 GRN_focus_Eastern_Population_Act: "东部人口法案"
 GRN_focus_Eastern_Population_Act_desc: "此项法案专门拨款，旨在改善国民家庭福祉，并吸引那些渴望生活在比当前更为团结之境、且拥有相近文化与民族背景的人们。《大格陵兰法案》的本部分专用于东部地区的移民与定居。"
 GRN_focus_Battle_For_Independence: "独立之战"
 GRN_focus_Battle_For_Independence_desc: "我们已走到十字路口。丹麦议会已开始就我们的国家地位采取行动。无论其议案对我们有利与否，我们都必须自我保全。为此，我们将大力投入外交施压运动，提升国际社会对我们的认可度，以期或多或少能迫使各方以和平方式解决独立问题。"
 GRN_focus_Rushed_Mobilization_Efforts: "快速动员"
 GRN_focus_Rushed_Mobilization_Efforts_desc: "我们已决定不再向丹麦的压迫性策略低头。因此，我们将紧急动员最低限度的必要力量，以确保能够抵御丹麦任何真正的入侵，保卫岛屿。"
 GRN_focus_Organizing_Fundamentals_In_Training: "训练组织基础"
 GRN_focus_Organizing_Fundamentals_In_Training_desc: "我们将加紧建立一处基础训练设施。若要在即将到来的入侵中保卫我们的岛屿，就必须借此设施开展最快速的速成训练。"
 GRN_focus_If_It_Floats_Its_A_Boat: "如果它能浮起来，那就是船"
 GRN_focus_If_It_Floats_Its_A_Boat_desc: "丹麦海军极可能成为占领该岛的主力。虽然代价巨大，但我们必须临时拼凑出某种抵抗力量以拖延时间，否则我们就永远无法在国际舞台上被视作一个严肃的国家。"
 GRN_focus_Removing_The_Last_Loose_Ends: "处理最后未尽事宜"
 GRN_focus_Removing_The_Last_Loose_Ends_desc: "通过与丹麦王室的决裂，我们如今成为独立国家，因而不再享有昔日的殖民地特权。为此，我们需要重新调整若干领域，并着手弥补可能面临的不足。"
 GRN_focus_Stabilizing_Domestic_Short_Comings: "稳定内部"
 GRN_focus_Stabilizing_Domestic_Short_Comings_desc: "调整行政工作，并将所有政府服务统一归入国家政府管理，将使我们能够准确把握当前局势。"
 GRN_focus_Greenland_Armed_Services: "格陵兰武装部队"
 GRN_focus_Greenland_Armed_Services_desc: "刚刚获得独立，我们的国防终于完全由自己掌控了。虽然力量微薄，但总得有个起点，对吧？"
 GRN_focus_A_New_Chapter: "崭新篇章"
 GRN_focus_A_New_Chapter_desc: "从今往后，我们翻开新的一页。我们将致力于建设、繁荣与改善，提升国家与公民的生活水平，为所有渴望在格陵兰生活与见证其未来的人们，开启通向更光明未来的航程。"
 GRN_focus_Northern_Political_Lights: "北方政治之光"
 GRN_focus_Northern_Political_Lights_desc: "有了新获得的自由，我们现在可以向那些希望竞选公职的人敞开大门。当然，这也意味着我们必须应对那些可能滥用制度的人。然而，我们是一个珍视民主的国家，因此我们将信任制度和人民。"
 GRN_focus_Atassut_Claims_Victory: "团结党宣布胜利"
 GRN_focus_Atassut_Claims_Victory_desc: "在独立之前，我们的政治一直停滞不前。所有人的注意力都集中在摆脱丹麦的统治上。现在我们终于摆脱了丹麦的统治，可以开始开辟一条新的道路。这条道路将稳步构建社会价值观，并兼顾财政保守主义，以平衡国家的未来发展。"
 GRN_focus_Making_New_Greenlandic_Standards: "制定格陵兰岛新标准"
 GRN_focus_Making_New_Greenlandic_Standards_desc: "改革以母语为基础的教育，增加教师人数，并全面提高学生的能力标准，将极大地提升我们国家的潜力。"
 GRN_focus_Improving_Medical_Facilities: "改善医疗设施"
 GRN_focus_Improving_Medical_Facilities_desc: "通过改进一般采购流程以及改进医疗设施的平面布局，我们可以为护理和治疗树立新的标杆，提高就医的便捷性和获取所需资源的便利性。"
 GRN_focus_Casting_Better_Social_Nets: "加强社会保障网"
 GRN_focus_Casting_Better_Social_Nets_desc: "改革社会计划，优化资源配置，将保障我国那些遭遇不幸或已至人生终点的民众。"
 GRN_focus_Domestic_Agriculture_Projects: "国内农业项目"
 GRN_focus_Domestic_Agriculture_Projects_desc: "保障国内农业意味着拥有更稳定的粮食来源。这一点，再加上我们的“艰苦农业项目”，将继续惠及并促进我国经济和人口增长。"
 GRN_focus_Increasing_Industrial_Development: "提振工业发展"
 GRN_focus_Increasing_Industrial_Development_desc: "稳步壮大并多元化我们的经济，有助于以更加稳定有力的方式应对国内及潜在的国际事务。"
 GRN_focus_General_Armaments: "通用武器"
 GRN_focus_General_Armaments_desc: "对武器装备质量及整体采购进行小规模投入，将使我们的余留武装力量在保卫国家与国民时更加有力。"
 GRN_focus_Growing_Power_Production: "产能扩张"
 GRN_focus_Growing_Power_Production_desc: "提升国内电力生产能力不仅能够促进经济增长，还能通过廉价电力改善民众生活质量。"
 GRN_focus_National_Alumina_Research_Institute: "国家氧化铝研究所"
 GRN_focus_National_Alumina_Research_Institute_desc: "国家氧化铝研究所(NARI)综合体是一座专门用于氧化铝及其他难提取矿物研发的中心，目标是寻找改进和提升这些矿物开采效率的方法。氧化铝主要存在于高浓度的铝土矿中，但我们并没有铝土矿。不过，我们拥有大量的长石矿床，而长石矿物中氧化铝含量几乎可达其重量的20%。通过成本更高的方法，我们能够确保国内供应。但这仍然远远不够，因为铝在许多领域都有广泛用途，因此我们必须尽可能扩大在这一领域的研究。"
 GRN_focus_Military_Investment_Package: "军事投资方案"
 GRN_focus_Military_Investment_Package_desc: "这项通用投资计划将用于提升装备质量和提高士兵薪资，部分资金也将拨出以根据需要更好地规范训练设施。"
 GRN_focus_Demokraatit_Secures_Victory: "民主党赢得胜利"
 GRN_focus_Demokraatit_Secures_Victory_desc: "民主党在格陵兰政治中一直扮演着类似黑马的角色。虽然与两大主流政党的立场大致相符，但细微的差异往往使其陷入\"万年老三\"的境地。然而，这一切将在今天改变——随着我们在独立时代的胜利，如今我们终于能够全力以赴地改善国家与国民的福祉。"
 GRN_focus_Economic_Assimilation_Visas: "经济归化签证"
 GRN_focus_Economic_Assimilation_Visas_desc: "利用签证制度来帮助国家发展并以稳定的方式增长人口，将极大地有助于国家未来的规划。"
 GRN_focus_Improved_Community_Programs: "改进社区项目"
 GRN_focus_Improved_Community_Programs_desc: "警察与所保护公民之间的共识是凝聚与对话的关键驱动力。我们必须确保采取一致措施，让大多数人保持步调一致，这样万一发生意外情况时，我们才不会像美国某些地区那样陷入混乱。"
 GRN_focus_Rewriting_Mining_Regulations: "重编矿业法规"
 GRN_focus_Rewriting_Mining_Regulations_desc: "采矿业相关的法规过于繁琐，且完全不符合国家现状。因此，我们需要重新审视这些规定，以便更好地规范该行业。"
 GRN_focus_Hospice_Care_Funding: "临终关怀资金"
 GRN_focus_Hospice_Care_Funding_desc: "为临终关怀提供更好、更专项的资金支持，既能确保家庭更专注于自身所需，又不必因日常生活的奔波而担忧长辈被忽视。"
 GRN_focus_Creating_A_Basic_Office_Sector: "创建基本办公园区"
 GRN_focus_Creating_A_Basic_Office_Sector_desc: "继续多元化我们的经济意味着需要投资于小型但意义重大的办公与科技产业，以确保能持续改善国家及国民的生活方式。"
 GRN_focus_Expanding_Existing_HFPs: "扩大现有艰苦农业项目"
 GRN_focus_Expanding_Existing_HFPs_desc: "通过垂直农业设施和从冰架向其供水所需的蒸馏基础设施，扩大我们目前的艰苦农业项目，将创造不断增长的国内食品供应，同时也有助于我们实现进入内陆的目标。"
 GRN_focus_Growing_REM_Industries: "发展稀土工业"
 GRN_focus_Growing_REM_Industries_desc: "为提升我们的地缘战略价值，需要发展稀土金属（REM）产业或稀土金属行业。针对性的采矿和加工设施将使我们能够利用这些资源作为未来贸易协议谈判的筹码。"
 GRN_focus_Growing_Domestic_Arms_Production: "发展自造武器"
 GRN_focus_Growing_Domestic_Arms_Production_desc: "确保我们的服役人员配备武器，让我们安心地理解到，我们的军队能够也必将保卫我们的领土免受任何侵略势力的侵害。"
 GRN_focus_Expanding_Citizen_Development_Grants: "扩大公民发展补助金"
 GRN_focus_Expanding_Citizen_Development_Grants_desc: "获取公民权需要对国家发展的独特贡献，因此我们将扩大津贴计划，增加个人在单次过程中经过考察并成为新格陵兰公民的能力。"
 GRN_focus_Siumut_Wins_Once_More: "前进党屹立不倒"
 GRN_focus_Siumut_Wins_Once_More_desc: "执政时间最长的政党是前进党。该党在独立前时代赢得了大多数选举胜利，并且在独立后时代似乎依然保持着稳定的执政方向。现在，是时候将目光投向比独立更远的目标了——我们将致力于改善公民和工人的生活。"
 GRN_focus_Encouraging_State_Sanctioned_Immigration: "鼓励移民"
 GRN_focus_Encouraging_State_Sanctioned_Immigration_desc: "我们的国内增长并不理想。要填补就业市场并促进经济增长，我们必须尽可能采取持续的移民政策。"
 GRN_focus_Immigration_Quotas: "移民配额"
 GRN_focus_Immigration_Quotas_desc: "随着国家的稳步发展，我们现在最大的担忧是找不到足够的人来填补工作岗位。光靠发展经济是不够的，当你真的没有足够的人手来填补职位空缺时。因此，我们将开始努力达到既定的移民配额，以确保我们的人口能够与经济发展相匹配。"
 GRN_focus_Expanding_Schooling_Subjects: "扩大学科范围"
 GRN_focus_Expanding_Schooling_Subjects_desc: "扩大学校提供的选修课程范围，让学生能够追寻自己心仪的职业和未来，同时保留核心通用技能培养，助力学生成长并为成年生活做好准备。"
 GRN_focus_Social_Reserve_Funds: "社会储备基金"
 GRN_focus_Social_Reserve_Funds_desc: "随着我国人口与经济的持续增长，在资金筹措和预算合理分配方面，我们面临着平衡各方需求的难题。为应对这些资金缺口，我们将设立社会储备基金，本质上这是一项面向社会项目的联邦储蓄机制。这将为需要社会保障网的民众带来更多安心。"
 GRN_focus_Tungsten_Industries: "钨矿工业"
 GRN_focus_Tungsten_Industries_desc: "在中东部地区有大量的钨矿矿床等待开采。因此，我们将建立一个专门的工业综合体，用于开采、加工和精炼矿石，将其转化为成品铸锭或二次产品。"
 GRN_focus_Core_Industries_Complex: "核心工业综合体"
 GRN_focus_Core_Industries_Complex_desc: "重新开采仍可开采的旧铁矿，以及开设新矿，将使我们能够扩大工业能力。为此，我们将建设类似的工业综合体，将开采的矿石加工成国家所需的物资。"
 GRN_focus_Growing_More_Crops: "农业增产"
 GRN_focus_Growing_More_Crops_desc: "通过垂直农业计划确保日益增长且多样化的食品供应，以及为这些设施预先规划的蒸馏基础设施，我们现在能够以稳定的速度持续扩张，并希望这些需求能够以超出预期的速度更快地消耗冰架。"
 GRN_focus_Naval_Investments: "海军投资"
 GRN_focus_Naval_Investments_desc: "提升国内造船能力使我们能够组建海军。若能组建海军，我们就能保障沿海水域安全，并建立某种程度的国际存在——无论初期规模多么微小。"
 GRN_focus_Strategic_Stockpiles: "战略储备"
 GRN_focus_Strategic_Stockpiles_desc: "建立战略储备让我们能够保有一批随时可用的枪械，用以装备我们的军队，甚至在必要时武装人民。当然，我们希望永远不必走到那一步，但谁知道外面那些病态扭曲的家伙会干出什么事来。"
 GRN_focus_Polar_Party_Wins: "极地党获胜？"
 GRN_focus_Polar_Party_Wins_desc: "考虑到这个政党曾经一度名存实亡，极地党或许是格陵兰所能找到的最接近传统保守派的政党。因此，尽管他们的胜利令人困惑，但确实让外界从某些国家正在经历的喧嚣中，看到了稳健治理与社会安定的希望。"
 GRN_focus_Family_Subsidies: "家庭补贴"
 GRN_focus_Family_Subsidies_desc: "为促进国内人口增长，减少对移民政策的过度依赖，我们将设立专项补贴，帮助家庭度过育儿早期阶段。如此一来，原本最令人担忧的财政能力问题将不再是实际困扰。为防止滥用，我们将限定补贴的适用范围，仅限通过全国统一标准的银行卡进行消费。"
 GRN_focus_Childcare_Act: "育儿法案"
 GRN_focus_Childcare_Act_desc: "父母在照顾孩子的同时还要应付账单等开支，这种平衡既微妙又往往繁琐。因此，《育儿法案》是一项支出计划，旨在改善和建立日托中心及早期教育机构，以照顾和看管儿童。"
 GRN_focus_Foreign_Leasing_Act: "外国租借法案"
 GRN_focus_Foreign_Leasing_Act_desc: "外国租借法案是一项双管齐下的立法。第一部分旨在改善教育和研究工作，以加深我们对矿产开采的理解，以及如何最好地开采我们土地下的资源。第二部分则基本上是刺激外国公司为我们进行开采，或者至少打下基础，以便我们在必要时随时接管。"
 GRN_focus_Steeling_Resolve_Act: "钢铁决心法案"
 GRN_focus_Steeling_Resolve_Act_desc: "《钢铁决心法案》是一项旨在扩大国内铁矿和煤炭供应的专项投资计划。这些关键资源将有助于夯实我国经济基础，提升国内生产能力，从而更好地满足工业和住房、公共机构等民众需求。"
 GRN_focus_Expand_Petrochemical_Industries: "扩大石油化工产业"
 GRN_focus_Expand_Petrochemical_Industries_desc: "能够建立，更不用说扩大石化产业部门的规模，将大大增强我们国内安全，避免贸易逆差过大。"
 GRN_focus_Greenlandic_Forestries: "格陵兰林业"
 GRN_focus_Greenlandic_Forestries_desc: "利用国家已有的温室和垂直农业计划创建新的树木农场，将使我们能够拥有一个不断发展壮大且多元化的木材行业。"
 GRN_focus_Industrial_Projects: "工业项目"
 GRN_focus_Industrial_Projects_desc: "改善东部地区的发展，使其与西部地区更加同步，将大大缩小两者之间的差距，因此，改善东部地区的工业部门应该会大有裨益。"
 GRN_focus_Eastern_Armaments: "东部军备"
 GRN_focus_Eastern_Armaments_desc: "恕我自夸，我们的“发展东方”项目进展相当顺利。除了确保移民工作能够促进就业并补充国内就业岗位外，建立各种新兴产业将有助于打造强劲的经济，并为我们的人民创造美好的未来。"
 GRN_focus_Defensive_Improvements: "防御改良"
 GRN_focus_Defensive_Improvements_desc: "提高抵御敌军鲁莽入侵的能力，将是维护国家安全的基石。毕竟，登陆该岛绝非易事。"
 GRN_focus_Qulleq_Party_Secures_Victory: "油灯党取得胜利"
 GRN_focus_Qulleq_Party_Secures_Victory_desc: "出人意料的是，油灯党赢得了选举。该党以亲工业主义著称，曾是除传统核心执政者之外，主张“立即独立”的主要力量。尽管有人担心这是否意味着为了发展而牺牲人民生活质量，但该党许多成员坚信，鉴于国家目前的特殊形势，人民生活质量只会不断提高。无论如何，该党将在未来几周内拿出实际行动来证明其承诺。"
 GRN_focus_On_Site_Family_Support: "就业家庭支持"
 GRN_focus_On_Site_Family_Support_desc: "每天都可以带孩子上班。企业将逐步整合一些关键的儿童保育措施，让员工能够安心上班，不必担心会抛弃孩子。"
 GRN_focus_Contractual_Labor_Act: "合同劳工法案"
 GRN_focus_Contractual_Labor_Act_desc: "合同劳工法案是一项赋予政府权力的法律，旨在协助边境和移民部门寻找合适的劳工签证申请人。这些签证允许申请人在希望在此工作的情况下长期入境，它并非访问签证，而是对我们现有发展援助计划的扩展。"
 GRN_focus_Rewriting_The_Tax_Codes: "重写税法"
 GRN_focus_Rewriting_The_Tax_Codes_desc: "从根本上讲，现行税法非常不利于商业发展，因此我们将根据当前的经济结构重新制定和改革税法。"
 GRN_focus_Building_Up_Domestic_Capital: "积累国内资本"
 GRN_focus_Building_Up_Domestic_Capital_desc: "除了金矿开采，我们还可以少量开采钻石。我们可以将这些钻石出售到国外，所得资金用于国内发展。"
 GRN_focus_Securing_Energy_Needs: "保障能源需求"
 GRN_focus_Securing_Energy_Needs_desc: "我们这个不断发展的国家有着巨大的需求，而这正是发展本身的基石。我们拥有资源，因此必须允许我们按照自己的意愿使用这些资源。"
 GRN_focus_Military_Production_Means: "军用生产资料"
 GRN_focus_Military_Production_Means_desc: "我们捍卫和保护公民、自然资源以及不断提升的生活品质的能力至关重要。我们不能安于现状，因为我们知道，任何时候都可能有某个国家企图将其挥霍于己，用于其恶意目的。"
 GRN_focus_Continued_Crop_Diversification_Efforts: "持续推进作物多样化"
 GRN_focus_Continued_Crop_Diversification_Efforts_desc: "我们继续利用独立前设立的艰苦农业项目，同时国家种子库也在不断发展壮大，所储存的作物种类也日益丰富。通过持续发展蒸馏中心，支持国内农业发展，我们的国家必将繁荣昌盛，即使在许多人认为植物永远无法生长的地方，也能蓬勃发展。"
 GRN_focus_Expanded_Eastern_Industries: "东部工业扩张"
 GRN_focus_Expanded_Eastern_Industries_desc: "工人、企业等等。我们希望延续这一发展周期，并希望在东部地区比西部地区更多地利用这一周期，因为至少就人口总数而言，两者之间的差距相当大。通过更加关注东部地区，我们希望缩小全国范围内的整体差距，并创建一个更加协调的分布式经济体。"
 GRN_focus_Economic_Automation_Act: "经济自动化法案"
 GRN_focus_Economic_Automation_Act_desc: "经济自动化法案是一项旨在审议并最终选择我们希望全面推进自动化的经济部门的立法。这样一来，劳动者就可以腾出时间从事其他行业的就业，而劳动力与就业岗位之间的缺口有望使我们的整体经济形势更加稳定。"
 GRN_focus_Inuit_Ataqatigiit_Election_Victory: "因纽特人民共同体选举胜利"
 GRN_focus_Inuit_Ataqatigiit_Election_Victory_desc: "在格陵兰政坛，因纽特人民共同体被视为一种弱势力量，它介于更常见的民主社会主义思想和更传统的市场社会主义之间。该党确实信奉某些马克思主义原则，但似乎更倾向于铁托式的平衡，即在国家集团间的经济博弈和社会凝聚力之间寻求平衡，以避免直接选边站队。当然，格陵兰已加入北约，但在经济上并没有义务遵守北约的规定。"
 GRN_focus_Greencare_Act: "格林兰医疗法案"
 GRN_focus_Greencare_Act_desc: "格林兰医疗法案是一项旨在提高医务人员工资、设备质量和培训水平，以及在需要的地方扩建或开设新设施的综合预算案。"
 GRN_focus_Steeled_Veins_Act: "钢铁血脉法案"
 GRN_focus_Steeled_Veins_Act_desc: "煤炭和铁矿是现代经济的命脉。虽然由于其他能源的出现，煤炭本身的用途已不如以往，但我们不能忽视煤炭和铁矿储量之丰富，以及某些地区优质的原材料。因此，我们将开始投资小型煤炭和铁矿开采项目，以增加国内供应，并满足潜在的出口需求。"
 GRN_focus_Pro_Mining_And_Miners_Act: "支持采矿和矿工法案"
 GRN_focus_Pro_Mining_And_Miners_Act_desc: "支持采矿和矿工法案旨在提高采矿质量和数量，同时通过战略性自动化措施来提高矿工的整体地位，限制任何时候矿井所需的工人数量和次数。"
 GRN_focus_Feldspar_Extractions_Act: "长石开采法案"
 GRN_focus_Feldspar_Extractions_Act_desc: "根据目前的地质勘测数据，氧化铝的唯一可靠来源是西部的长石矿床。虽然长石矿床中氧化铝的含量通常占其重量的20%以上，但它并非最具商业价值的来源。因此，在科学取得突破性进展改变现状之前，采矿作业必须完全由政府控制。无论如何，我们的经济需要铝，因此我们将投资于规模缓慢增长的长石开采和加工业务，以提取长石并从中加工所需的材料。"
 GRN_focus_Feeding_The_People_Act: "保障全民粮食安全法案"
 GRN_focus_Feeding_The_People_Act_desc: "在主要渔业之外发展国内粮食供应，是促进经济和人口增长的绝佳途径。随着国家种子库的建立，我们已稳步推进格陵兰岛在温室和垂直农业等农业科学领域发展方面的示范作用。"
 GRN_focus_The_Continual_Industry_Act: "可持续工业法案"
 GRN_focus_The_Continual_Industry_Act_desc: "发展经济意味着提升制造业和整体工业基础。通过对第一产业和第二产业进行小额投资，我们可以实现前所未有的持续增长和发展。"
 GRN_focus_Greenland_Technology_Center: "格陵兰技术中心"
 GRN_focus_Greenland_Technology_Center_desc: "加大研发投入，以促进生态环境发展和可持续发展方面的总体进步，对于未来的发展工作至关重要。"
 GRN_focus_Arming_The_Nation: "武装国家"
 GRN_focus_Arming_The_Nation_desc: "国防是我们继续保持独立的关键。如果我们想保持自由，就必须发展相应的能力。"
 GRN_focus_Silver_And_Gold_Act: "白银和黄金法案"
 GRN_focus_Silver_And_Gold_Act_desc: "通过在国际谈判中积累有价值的筹码来提升国内安全，可以让我们比不采取行动更有效地抵御潜在入侵者。因此，我们将考虑在我们能够获取的钯金和一些珍贵稀土金属矿藏附近开展有限的采矿作业。"
 GRN_focus_Naleraq_Elective_Victory: "定向党之胜"
 GRN_focus_Naleraq_Elective_Victory_desc: "国家新获独立，定向党这一更具民族主义倾向的政党最终胜出不足为奇。该党的政策旨在直接强化并证明格陵兰对其自治主权的价值。不过，也有人担心这一举措或许过于仓促，可能导向更具敌意的局面。"
 GRN_focus_Efficiency_Education_Courses: "高效教育课程"
 GRN_focus_Efficiency_Education_Courses_desc: "高效教育计划是一项教育投资项目，旨在探索并实验在寒冷气候下传输、储存及管理电能的新型方式。通过提高这些环节的效率，我们的经济将更具成本效益，同时无需为就业问题分心。"
 GRN_focus_Family_Planning_And_Assistance_Board: "计划生育与援助委员会"
 GRN_focus_Family_Planning_And_Assistance_Board_desc: "计划生育与援助委员会是一个致力于创建、维护和发展国家家庭的政府机构。我们的人口规模较小，既然能够妥善照顾自身，为什么还要随意接纳外来者或移民涌入国家呢。"
 GRN_focus_Family_Homes_Act: "家庭住宅法案"
 GRN_focus_Family_Homes_Act_desc: "《家庭住宅法案》是一项旨在确保家庭类住房分配给有需要的家庭的项目。我们将确保没有人滥用我国有限的住房资源。"
 GRN_focus_Urban_Planning_Commission: "城市规划委员会"
 GRN_focus_Urban_Planning_Commission_desc: "城市规划委员会是一个政府机构，旨在为未来的住房项目预先规划并开展基础工程，同时准备相应的城市规划模式。随着这些新房逐渐住满居民，他们将对就业和本地供应链产生同等规模的需求。"
 GRN_focus_Rapid_Agriculture_Expansions: "快速农业扩张"
 GRN_focus_Rapid_Agriculture_Expansions_desc: "快速农业扩张法案致力于扩大我们的农业基础和生产方式，以便持续养活国民，并更好地促进人口增长。当然，我们需要筛选并引进专家进行培训，最终将岗位移交给本国公民，但目前我们可以向他们发放临时发展签证。"
 GRN_focus_Industry_Development_Act: "工业发展法案"
 GRN_focus_Industry_Development_Act_desc: "我们将投资于制造业和通用工业领域，以打造一个稳健且多元化的经济体。随着我们的人口以及经过审核的潜在移民池可能扩大，小型改进和项目将逐步积累效应。"
 GRN_focus_Military_Forces_Investment_Act: "军事力量投资法案"
 GRN_focus_Military_Forces_Investment_Act_desc: "这笔支出计划与武器研发项目将协同推进，在自主设计复杂装备的过程中同步提升我们的陆空作战能力。"
 GRN_focus_Western_Strategic_Autarky_Act: "西部战略自给法案"
 GRN_focus_Western_Strategic_Autarky_Act_desc: "《国家自给法案》是一项分两阶段实施的计划，旨在建立战略性采矿和通用资源开采体系，确保当任何国家通过海上或政治封锁等方式危害我国时，国内仍能维持有限但稳定的资源供应。计划第一阶段被称为\"西部战略自给法案\"（WSAA），将建立针对铁矿石、用于制铝的长石、以及用于能源和合成橡胶生产的石油与煤炭的有限开采作业。"
 GRN_focus_Eastern_Strategic_Autarky_Zone: "东部战略自给区"
 GRN_focus_Eastern_Strategic_Autarky_Zone_desc: "国家自给法案第二阶段将着力于开发石油和煤炭业务，以满足一般能源及工业需求。同时，我们还将启动有限的稀土元素（REE）开采项目，并着手锂等科技导向型矿物的开发。看来，我们的国内安全筹码与外交谈判资本正逐步积累优势。"
 GRN_focus_Militarize_Greenland_Party_Wins: "格陵兰军事化党获胜？"
 GRN_focus_Militarize_Greenland_Party_Wins_desc: "虽然格陵兰的大多数政党都如出一辙，但没人预料到军事干预会成为议题，显然，这个完全处于劣势且成立不久的格陵兰军事党居然以某种方式赢得了胜利。该党基本上是新建的格陵兰武装部队（ASG）的政治延伸，专注于国防以及获取保卫我们国家所需的手段。这无疑是一种循环逻辑，但许多人不禁思考，这是否是格陵兰从丹麦独立后，人们潜意识里最渴望的一种需求。"
 GRN_focus_Military_Organized_Education_Act: "军事化组织教育法案"
 GRN_focus_Military_Organized_Education_Act_desc: "我们应当并且将会对班级、学科以及整体教育结构进行彻底改革，使其转变为军事化架构。早期培养纪律性、组织能力，以及学会如何服从与下达指令、传递信息，不仅对提升记忆力至关重要，更关乎毕业后的发展乃至潜在的服役生涯。"
 GRN_focus_Production_Critical_Resources_Act: "关键资源生产法案"
 GRN_focus_Production_Critical_Resources_Act_desc: "钢铁与能源，作为任何工业化社会的两大基石，正是我们最迫切的需求。无论是满足民用还是军用需求，我们都将投入资源并扩大生产规模，以确保国内需求与国防需求得到充分保障。"
 GRN_focus_Advanced_Materials_And_Minerals_Act: "先进材料与矿产法案"
 GRN_focus_Advanced_Materials_And_Minerals_Act_desc: "先进材料与矿产法案的核心在于扩大围绕被视为先进生产所需资源的矿物开采活动。与技术研发和稀土元素相关的领域就是其中的典型例子。"
 GRN_focus_Army_Armaments_Improvement_Act: "陆军装备改进法案"
 GRN_focus_Army_Armaments_Improvement_Act_desc: "我军的全面改进对于我们可能进行的任何陆地防御都至关重要。因此，我们将投资扩大生产能力，并为这些设施提供被动研发资金，以便在可能的情况下测试新设计。"
 GRN_focus_Air_Force_Advancements_Act: "空军进步法案"
 GRN_focus_Air_Force_Advancements_Act_desc: "拨款用于生产设施以实际建立某种形式的空军，总比什么都不做要好。作为额外奖励，我们还会投入少量研发资金，尝试为这一兵种的新飞机设计工作启动进程。"
 GRN_focus_Military_Garden_Act: "军队菜园法案"
 GRN_focus_Military_Garden_Act_desc: "将“艰苦农业项目”中一部分缓慢但不断扩展的农业资源用于军需品供应，确实是一件有益的事情。这不仅可以将民用需求与军用需求分开，还有助于控制军人伙食的质量和数量。"
 GRN_focus_Bolstering_Naval_Assets: "强化海军资产"
 GRN_focus_Bolstering_Naval_Assets_desc: "我们的海岸线极为漫长，因此需要建造或至少设计出能够适度应对远程巡航需求的舰船。继陆军之后，海军是我们真正的第一道防线。"
 GRN_focus_Civilian_Improvements_Act: "民事改进法案"
 GRN_focus_Civilian_Improvements_Act_desc: "为维持和支撑一支庞大的军事力量，我们必须拥有良好的民用经济基础来支撑一切。因此，我们将开展有针对性的发展项目，确保军事需求不会过快超越实体经济所能承受的范围。"
 GRN_focus_Militarized_Economy_Act: "军事化经济法案"
 GRN_focus_Militarized_Economy_Act_desc: "这项立法是对我们国家经济组织与管理方式的全面革新。通过预先围绕可能出现的巨大军事人力需求进行规划，我们可以着力整合技术与生产方法，大幅减少军事装备生产中的人力投入。这反过来将释放劳动力和潜在兵员，用于民用经济及武装部队的建设。"
 GRN_focus_Greenland_Monarchist_Party_Victory: "格陵兰君主党胜利"
 GRN_focus_Greenland_Monarchist_Party_Victory_desc: "格陵兰君主党，或称格陵兰王室党，是一个致力于尊重和效仿格陵兰在丹麦君主制下悠久历史的政治党派。因此，该党旨在保留现有议会制度，并将其融入一个相当自由开放的君主立宪体系中。当然，相当一部分民众对此感到困惑，但也有相当一部分人——至少足以确保选举胜利——相信丹麦的政治稳定是我们在本土实现国家发展和壮大的关键所在。"
 GRN_focus_Education_Investments_Act: "教育投资法案"
 GRN_focus_Education_Investments_Act_desc: "教育投资法案是一项旨在更好地配备和投资于教育质量以及特定创新部门的专项支出。我们希望提升国家效率，并持续增强和调整自身能力，以应对日益严峻的环境挑战。"
 GRN_focus_Medical_Research_Initiatives: "医学研究计划"
 GRN_focus_Medical_Research_Initiatives_desc: "医学研究计划旨在为我们主要医疗机构内新设立的专门部门提供独立资金。该部门将命名为医疗发展部（MDD）。MDD的职责是尽一切可能进行测试，探索新的方法以推进我们对医学科学的知识和理解，同时通过完整的志愿者计划确保新设备和程序的测试。"
 GRN_focus_Public_Security_And_Safety_Act: "公共安全与保障法案"
 GRN_focus_Public_Security_And_Safety_Act_desc: "我们的公民必须能够无忧无虑地生活。这项新立法通过后，批准的经费不仅将用于社区外展项目，还将用于提高潜在招聘候选人的评估标准以及警察的培训计划。请记住，安宁的一天就是美好的一天，而对你来说是美好的一天，对公众来说也是美好的一天。"
 GRN_focus_Agriculture_Advancements_Act: "农业进步法案"
 GRN_focus_Agriculture_Advancements_Act_desc: "在我们不断壮大的HRP计划基础上，我们将继续投资于温室和垂直农场设施（如有可能）。毕竟，我们国家的安全与稳定取决于获取多样化且稳定的食品供应。"
 GRN_focus_Economic_Strengthening_Act: "经济强化法案"
 GRN_focus_Economic_Strengthening_Act_desc: "改善经济基本面意味着整个国家的水准会随之提升——无论你是将其视为“连带效应”还是“副产品”，取决于你是否持有愤世嫉俗的观点。但无论如何，要改善国民的生活，我们就必须投资于企业与产业，推动产品多样化，扩大生产规模，拓展人民在一生中能够接触与掌握的物资与手段。"
 GRN_focus_Petrochemical_Development_Efforts: "石化工业发展"
 GRN_focus_Petrochemical_Development_Efforts_desc: "石化工业是现代最具影响力和多样性的经济部门之一，其影响几乎渗透到日常生活的方方面面。因此，若想真正构建稳健多元的经济体系，我们必须肩负起责任，发展本国石化产业。合成橡胶及其他重要化学品或材料的能力，几乎等同于国家安全事务。"
 GRN_focus_Lithium_Expansion_Act: "锂扩张法案"
 GRN_focus_Lithium_Expansion_Act_desc: "对关键资源开采业务的投资，对于我们国家在持续发展中增强技术及其他现代创新的影响力至关重要。我们国内拥有稀土元素、锂及其他科技生产所需的矿产储备。因此，我们将开始扩大和开发开采工作，以满足国内需求，并可能用于未来的贸易协定。"
 GRN_focus_Royal_Military_Development_Efforts: "皇家军事研发"
 GRN_focus_Royal_Military_Development_Efforts_desc: "皇家军事研发计划是一个综合性投资方案，旨在提升陆军与海军装备的研发质量，并确保围绕不断演进的装备建立新的训练标准。"
 GRN_focus_Establishing_The_Kingdom: "王国崛起"
 GRN_focus_Establishing_The_Kingdom_desc: "所有准备工作完成后，我们现在正式将国家更名为格陵兰王国。人民欢欣鼓舞、团结一致，我们将为所有公民创造一个繁荣而自豪的未来。"
 GRN_focus_Armed_Services_Of_Greenland: "格陵兰武装部队"
 GRN_focus_Armed_Services_Of_Greenland_desc: "独立得到保障后，我们现在必须着手处理国防事务。基本上要从零开始，建立能够保卫我们控制的广阔水域、陆地和领空的防御体系。"
 GRN_focus_The_Frozen_Army: "寒霜之军"
 GRN_focus_The_Frozen_Army_desc: "我们的土地寒冷、冰封，几乎一年四季都难以通行。我们必须将我们的兵种塑造得能够将这些环境视为游乐场，而非挑战。"
 GRN_focus_Training_Facilities_And_Standards: "训练设施与标准"
 GRN_focus_Training_Facilities_And_Standards_desc: "为了建立一支合格的军队，我们必须设立并建造训练设施，同时制定可接受的士兵标准。若要真正保卫我们的公民，这些标准必须基于我们祖国的实际情况来制定。"
 GRN_focus_Setting_Equipment_Standards: "设定装备标准"
 GRN_focus_Setting_Equipment_Standards_desc: "通过建立装备标准化，我们可以在训练中营造统一性，同时改善士兵后勤保障体系。"
 GRN_focus_Securing_Domestic_Smallarms: "确保国内轻武器供应"
 GRN_focus_Securing_Domestic_Smallarms_desc: "建立我们自身生产轻武器及通用步兵装备的能力，意味着我们能提升军队的作战能力与战备水平。"
 GRN_focus_Crude_Combat_Designs: "粗糙战斗设计"
 GRN_focus_Crude_Combat_Designs_desc: "粗糙战斗设计（CCD）本质上是那种“摇摇晃晃”的车辆装备设计。它们简陋得离谱，但全是国产型号。我们可以利用这些，或许再购买一些其他国家的装备，来进行测试和适当的设计工作，确保在扩军时，我们的部队能够真正装备为现代战斗而设计的设备。"
 GRN_focus_Vehicle_Manufacturing_Plants: "载具制造厂"
 GRN_focus_Vehicle_Manufacturing_Plants_desc: "掌握了基础载具设计的入门知识后，我们应当能制造这些训练模型，并利用积累的经验为军队设计和构建真正的装甲核心。"
 GRN_focus_Institute_For_Army_Developments: "陆军发展研究所"
 GRN_focus_Institute_For_Army_Developments_desc: "鉴于我军尚在襁褓之中，我们必须大力投资于发展和改善陆军兵种的各个方面。为了国家、人民以及在该兵种服役的人员。"
 GRN_focus_Frozen_Battlefield_Doctrine: "冰封战场学说"
 GRN_focus_Frozen_Battlefield_Doctrine_desc: "我们的军队或许永远无法与欧洲大陆的强国相提并论。但我们可以防守和保护。利用我们的气候和家园作为终极战场，我们可以引诱任何敌人——无论他们是否具有侵略性——来攻击我们。他们认为我们不堪一击，好吧，等他们来到这里，当面说这话时，我们拭目以待。"
 GRN_focus_FBD_Leadership_Promotions: "提拔新学说支持者"
 GRN_focus_FBD_Leadership_Promotions_desc: "为了巩固并开始围绕这一新学说重组军队，我们需要真正愿意实施它、并理解其所提出的理念与概念的领导者。因此，我们将提拔一支专门的陆军总参谋部，以更好地领导和实施这些改革。"
 GRN_focus_From_Field_To_Staff_Command: "从战场到参谋"
 GRN_focus_From_Field_To_Staff_Command_desc: "随着野战指挥官们的晋升，我们意识到这些不幸的灵魂也需要了解更广泛的行政管理。因此，他们的野战指挥权将由总参谋部职位进行补充，直到我们能够训练并提拔其他值得信赖的军官，迈向这条新的道路。"
 GRN_focus_Frozen_Warfare_Training_Program: "冰封作战训练计划"
 GRN_focus_Frozen_Warfare_Training_Program_desc: "我们的重点在于保卫我们的家园，而这片家园寒冷且冰封，因此我们必须进行训练，确保我们的部队能够在这样的条件下尽可能长时间地作战。"
 GRN_focus_Polar_Logistics: "极地后勤"
 GRN_focus_Polar_Logistics_desc: "假设我们的战斗始终在本岛进行，这虽非最佳策略，却无疑是保卫国土的安全思路。为此我们将着手优化后勤体系，以减轻极端气候条件下的作战负担。"
 GRN_focus_General_Improvement_Programs: "全面提升计划"
 GRN_focus_General_Improvement_Programs_desc: "显然，保卫我们的岛屿是首要任务。然而，若我们对周遭的作战世界知之甚少，又如何能有效防御？我们必须确保军队实现均衡且全面的提升，使其既能应对各种突发情况，又能灵活适应尽可能多的不同局势。"
 GRN_focus_GIP_Leadership_Promotions: "提拔新学说支持者"
 GRN_focus_GIP_Leadership_Promotions_desc: "要为军队的发展与壮大开辟新路，就必须配备优秀的基层军官和将级领导人才。为此，我们将全面遴选最合适的人选，确保他们能将这一理念推向卓越的新高度。"
 GRN_focus_General_Staff_Roles: "总参谋部"
 GRN_focus_General_Staff_Roles_desc: "我们的军队规模尚小，我们暂时需要依靠那些刚被授予战场指挥权的人同时承担行政职务。"
 GRN_focus_Artillery_Corps_Specialist: "炮兵专家"
 GRN_focus_Artillery_Corps_Specialist_desc: "在防御和进攻中发展和专精于火炮作战，意味着我们将能够对敌军的人员和士气造成比他们对我们更大的伤害。然而，火炮难以移动，而易于移动的火炮又价格昂贵。如果我们想要在这种战术规划方式中取得实际意义，就必须找到减少损失的方法。"
 GRN_focus_Clear_Skys_Project: "晴空计划"
 GRN_focus_Clear_Skys_Project_desc: "空域清理计划是一项专门的防空装备开发计划，旨在确保我军士兵不会因为敌军空中力量的行动而被迫改变战斗方式。飞机造价高昂，而一些有趣的新单兵装备则很廉价。"
 GRN_focus_Army_Officer_Training_Corps: "陆军军官训练团"
 GRN_focus_Army_Officer_Training_Corps_desc: "陆军军官训练团是军人致力于在战术和战略层面成为领导者的结晶与体现。我们国家虽小，因此必须在成长到自然惯性根深蒂固之前，培养并遏制任何不良习惯。"
 GRN_focus_Navy_Of_Greenland: "格陵兰海军"
 GRN_focus_Navy_Of_Greenland_desc: "我们的海军不过是些渔船和巡逻艇。若想保卫领海，首先要拥有一支海军，而且这支海军必须能够应对时而恶劣的海况。"
 GRN_focus_Naval_Research_Institute: "海军研究机构"
 GRN_focus_Naval_Research_Institute_desc: "建立伊蒂莱克海军研究所将使我们能够发展和增长海军知识，并将其实际应用于海军建设。这一发展的基石将使我们能够打造一支理想的海军，并有效捍卫我们的水域免受外来侵略。"
 GRN_focus_Nuuk_Naval_Shipyards: "努克海军造船厂"
 GRN_focus_Nuuk_Naval_Shipyards_desc: "发展首都地区的造船厂将使我们能够为军事和潜在的民用目的建造新船只。"
 GRN_focus_Expanding_The_Design_Department: "扩展设计部门"
 GRN_focus_Expanding_The_Design_Department_desc: "靠近国家南部NRI的战略性海军造船厂将使我们能够改进、设计和测试海军舰艇，并尽可能为海军带来最佳成果。这也有助于更好地更新当前现役舰艇级别，并在可能的情况下将其改装为更新的设计。"
 GRN_focus_Tasiilaq_Shipyards_Complex: "塔西拉格造船综合体"
 GRN_focus_Tasiilaq_Shipyards_Complex_desc: "平衡战略端点之间的海军发展，使我们能够在岛屿各处后勤支持并部署舰队。"
 GRN_focus_Rough_Raft_Designs: "简单设计"
 GRN_focus_Rough_Raft_Designs_desc: "要设计和部署某种海军力量，我们至少需要在研发方面加倍努力，以便未来真正获得并尝试建造实际的设计方案。"
 GRN_focus_Small_Surface_Fleet_Doctrine: "小型水面舰队学说"
 GRN_focus_Small_Surface_Fleet_Doctrine_desc: "我国总体人力不足以维持大量舰艇。因此，我们将围绕小型水面舰艇来调整和构建海军学说。本质上，要让它们更加模块化和适应性强，但受限于训练和人力因素，舰艇规模不会超过驱逐舰级别。"
 GRN_focus_Corvette_Design_Department: "轻型护卫舰设计局"
 GRN_focus_Corvette_Design_Department_desc: "我们小型水面舰队学说的早期计划是由轻型护卫舰设计部门负责。该部门将负责围绕标准船体类型进行创新设计、测试和改进。"
 GRN_focus_Small_Vessel_Fleet_Organization: "小型舰艇编队"
 GRN_focus_Small_Vessel_Fleet_Organization_desc: "我们的小型舰队（SVF）将围绕三大主力舰种进行编组：护卫舰、轻型护卫舰与驱逐舰。这三种舰船类型在人员配置、适应性改造以及创新设计方面具有最佳潜力，能够打造出灵活多变的新型舰艇编队，使我们的舰队对敌军形成强力打击。"
 GRN_focus_Submersival_Fleet_Doctrine: "水下舰队学说"
 GRN_focus_Submersival_Fleet_Doctrine_desc: "潜艇隐蔽性强，对人力需求也不高。但如果组织得当，潜艇也能发挥巨大威力。从反舰导弹到传统鱼雷，我们都能以少胜多。"
 GRN_focus_Attack_Submarine_Pillar: "重视攻击潜艇"
 GRN_focus_Attack_Submarine_Pillar_desc: "确保我国海军根基稳固的第一大支柱是攻击型潜艇。这类潜艇主要围绕鱼雷攻击和水雷作战等直接突击战术设计，将成为我国海军的利刃。"
 GRN_focus_Missile_Submarine_Pillar: "重视导弹潜艇"
 GRN_focus_Missile_Submarine_Pillar_desc: "我们海军安全的第二支柱是导弹级潜艇。导弹是重击手，但成本也相当高。为了在海上有效对抗外敌，我们必须提升并增强这一海军实力支柱的有效作战能力。"
 GRN_focus_Naval_Command_Corps: "海军指挥团"
 GRN_focus_Naval_Command_Corps_desc: "我们的海军需要一个指挥机构，而今天我们就建立这个机构。这是一个开始，我们只能从这里向上发展。希望如此。"
 GRN_focus_Greenlandic_Air_Force: "格陵兰空军"
 GRN_focus_Greenlandic_Air_Force_desc: "我们岛上的天空多云、寒冷而荒凉。我们必须想办法发展和建立一支足够强大的空军来保卫我们的天空。"
 GRN_focus_West_Craft_Manufacturing: "西部航空制造"
 GRN_focus_West_Craft_Manufacturing_desc: "西部航空制造设施已准备就绪，可在条件允许时生产和测试我方空军的设计方案。我们期望利用这一新工业综合体，为保卫领空的空军部队提供装备与战备训练。"
 GRN_focus_Preparing_Air_Institute_Manufacturing: "筹备空军研究所"
 GRN_focus_Preparing_Air_Institute_Manufacturing_desc: "生产和测试飞机的能力对于学习和创新至关重要。我们将在规划中的航空研究所附近建立制造能力，以简化新设计开发和技术测试相关的物流与规划工作。"
 GRN_focus_Tingmiarmit_Air_Research_Institute: "廷米尔航空研究所"
 GRN_focus_Tingmiarmit_Air_Research_Institute_desc: "廷米尔航空研究所是一个致力于飞机研发及空中作战能力创新的机构。尽管我国幅员辽阔，但同时也显得相对狭小，因此我们必须将初期的注意力放在确立真正的空中作战理论与空中防御体系，以抵御敌军威胁。"
 GRN_focus_Infrequent_Flyer_Designs: "非频繁出动设计"
 GRN_focus_Infrequent_Flyer_Designs_desc: "廉价设计，用于执行指定的任务。虽然不是最佳方案，但无疑是我们空军正式发展的起点。"
 GRN_focus_Air_Supremacy_Prioritization: "重视空中优势"
 GRN_focus_Air_Supremacy_Prioritization_desc: "敌人或许能压制我们的海军，但绝不能让它们主宰我们的天空。我们应全力专注于生产和创新直接的空对空作战能力。确保这一点，我们就能间接地在海陆空任意领域为所欲为。"
 GRN_focus_General_Aviation_Innovations: "常规航空创新"
 GRN_focus_General_Aviation_Innovations_desc: "廷米尔航空研究所一直在努力工作——谢天谢地，我们投入了大量资金，不过总之。诸如雷达探测、燃油效率、总体消耗等方面的常规改进，以及一系列其他小型创新，应该很快就能进入实地测试阶段。"
 GRN_focus_Air_Dominance_Research_Programs: "制空权研究"
 GRN_focus_Air_Dominance_Research_Programs_desc: "我们只需专注于战斗机的研发工作，就能清除任何企图以仇恨之心染黑我们天空的敌人。"
 GRN_focus_Naval_Bombing_Superiority_Force: "优秀海军轰炸力量"
 GRN_focus_Naval_Bombing_Superiority_Force_desc: "通过空中手段掌控海洋，可为先发制人的防御措施打开大门，并在必要时确保进攻能力。"
 GRN_focus_Bombing_Research_Priorities: "重视轰炸研究"
 GRN_focus_Bombing_Research_Priorities_desc: "将研究资金优先投入到轰炸、对地攻击和对舰攻击的创新上，将有助于我们有效应对可能面临的任何入侵力量。"
 GRN_focus_Bomber_Air_Fleets: "轰炸机编队"
 GRN_focus_Bomber_Air_Fleets_desc: "我们的空军将拥有专属的航空编队，负责各类轰炸任务。从战略轰炸到近距离空中支援，我们将精心布局，确保没有敌军能长久威胁我们的领土。"
 GRN_focus_Air_Officer_Training_Corps: "空军军官训练团"
 GRN_focus_Air_Officer_Training_Corps_desc: "发展我们的空军军官团将持续提升我们努力获取的进步，随着我们不断成长并完善空军军种的实际定位。"
 GRN_focus_Greenlandic_General_Staff_Corps: "格陵兰总参谋部"
 GRN_focus_Greenlandic_General_Staff_Corps_desc: "随着军队的不断扩张，我们已到了需要更统一的参谋指挥部的时刻。为此，我们将着手建立国家指挥部，致力于改善国家状况，并持续优化国防手段。"
 GRN_focus_Thawing_The_Economy: "解冻经济"
 GRN_focus_Thawing_The_Economy_desc: "我国的经济原本只有渔业——好吧，就是渔业。当然，我们在商业和其他经济领域也有极少数的足迹，但经济的真正主体来自我们的渔业。我们必须改变这一点。当然，我们曾尝试多元化以争取独立，但我们必须继续探索我们能做什么以及如何去做。我们的经济有增长潜力，但我们必须采取行动。"
 GRN_focus_Energizing_Greenland: "赋能格陵兰"
 GRN_focus_Energizing_Greenland_desc: "随着我们国家的发展，能源需求持续攀升。我们需要建立一个稳定的能源部门，以持续满足日益增长的需求。"
 GRN_focus_Fossil_Fuelin: "化石燃料"
 GRN_focus_Fossil_Fuelin_desc: "我国拥有大量尚未开采的煤炭和石油矿床。我们可以利用这些资源提供快速且廉价的能源，以满足我们不断增长的能源需求。"
 GRN_focus_Oil_Charter_Dominance: "石油主导"
 GRN_focus_Oil_Charter_Dominance_desc: "通过优先制定新的开采特许权，我们可以扩大整体开采力度，持续满足能源需求。"
 GRN_focus_Renewable_Revivals: "再生能源兴起"
 GRN_focus_Renewable_Revivals_desc: "我们的土地拥有丰富的风能、太阳能和水能资源。我们拥有可以说是最理想的环境来投资稳定的可再生能源，因此我们将开始全面而广泛的投资，既建设可再生能源设施，也开发更高效的能源生产方式。"
 GRN_focus_Harnessing_The_Winds_Of_Fortune: "驾驭机遇之风"
 GRN_focus_Harnessing_The_Winds_Of_Fortune_desc: "我们将继续优先推进全面发展，确保能够充分利用国家的天赋资源，让民众过上比以往更美好的生活。"
 GRN_focus_Greenlands_Green_Energy: "格陵兰绿色能源"
 GRN_focus_Greenlands_Green_Energy_desc: "我们的岛屿是发展和利用核能的理想之地。全年气候相当稳定，几乎都是凉爽和寒冷的温度，淡水和咸水都很充足，还有可用于蒸汽生成过程的冰冻水源。"
 GRN_focus_Unlimited_Power: "无限能量"
 GRN_focus_Unlimited_Power_desc: "有了国内核材料储备，我们就能为本国设施提供原料，着手建设并启动相关作业。这项巨额投资开创了先例，标志着我国已无需再为能源问题担忧。"
 GRN_focus_Secured_Electrical_Grid: "保障电网安全"
 GRN_focus_Secured_Electrical_Grid_desc: "我们的能源方向确定后，电力需求变得更加稳定，至少是在逐步从被动应对转向主动预防。希望我们做出了正确的选择，继续迈向更光明的未来。"
 GRN_focus_Agricultural_Futurism_Plan: "农业未来主义计划"
 GRN_focus_Agricultural_Futurism_Plan_desc: "我们最初的艰苦农业项目已经奠定了经济和科学创新的基石。虽然这确实会导致能源密集型措施，但我们可以利用这一点，在农业自给自足以及潜在的对外贸易和投资方面引领农业部门的主导地位。"
 GRN_focus_Western_Farming_Complexes: "西部农业复合体"
 GRN_focus_Western_Farming_Complexes_desc: "建立支持这些方法的基础设施、整体架构需要时间，但未来必将硕果累累。这些垂直农业综合体（VFC）几乎全年都能高效种植各类作物。这也使我们得以扩建蒸馏设施系统，持续开拓大架层。"
 GRN_focus_Eastern_Farming_Complexes: "东部农业复合体"
 GRN_focus_Eastern_Farming_Complexes_desc: "垂直农业领域的持续发展将大幅降低我国的食品成本，使食品价格极为低廉，并使我们能够几乎全年与其他国家进行食品贸易，交换那些在地区性上被视为反季节的农产品。"
 GRN_focus_Supplemental_Industries: "辅助工业"
 GRN_focus_Supplemental_Industries_desc: "发展工业部门将为高度集中的农业部门带来有限的多样化。"
 GRN_focus_First_International_Farm: "第一国际农场"
 GRN_focus_First_International_Farm_desc: "随着我们对大型农业部门的研究和经济发展投入的所有资源，我们逐渐意识到，凭借我们可能能够满足的需求，我们或许能成为第一个国际农业国家。当然，世界各地都有粮仓，但想想看，我们有可能成为全球粮仓。"
 GRN_focus_Infrastructure_Projects: "基础设施项目"
 GRN_focus_Infrastructure_Projects_desc: "发展经济固然重要，但要维持经济运转，我们需要公路、铁路以及各类基础设施来连接人民与服务，使经济真正运作起来。因此，我们将制定一系列通用项目，以更好地整合我们这个人口稀少的国家。"
 GRN_focus_Greater_West_Highway_Project: "大西部高速公路计划"
 GRN_focus_Greater_West_Highway_Project_desc: "修建一条连接西部城镇的直达\"公路\"，将为市民提供更好的出行条件，同时减少往返各地时的出行负担和时间成本。"
 GRN_focus_Improving_Western_Internet_Towers: "改进西部网络基建"
 GRN_focus_Improving_Western_Internet_Towers_desc: "升级现有基站和建造新的网络基站将使我们的公民和机构能够更高效、更协同地开展日常活动。"
 GRN_focus_Sisimuit_Northern_Railway: "西西缪特北部铁路"
 GRN_focus_Sisimuit_Northern_Railway_desc: "扩展现有铁路网络，尽可能覆盖西部大部分地区，对于物流和经济供应链的协调至关重要。铁路作为最佳的大宗运输方式，这项投资将使我们受益匪浅。"
 GRN_focus_Great_Eastern_Highway_Project: "大东部高速公路计划"
 GRN_focus_Great_Eastern_Highway_Project_desc: "与我们的西部计划类似，我们将尽最大努力连接东部城镇，使国家即便在最基本的层面上也能更加紧密相连。"
 GRN_focus_East_Region_Internet_Expansions: "东部互联网扩展"
 GRN_focus_East_Region_Internet_Expansions_desc: "东部地区通常比西部欠发达，我们必须尽己所能推动其发展，弥补这些差距。为此，我们将扩大该地区的互联网基础设施，使其达到标准水平。"
 GRN_focus_Great_Greenlandic_Eastern_Railroad: "大格陵兰东部铁路"
 GRN_focus_Great_Greenlandic_Eastern_Railroad_desc: "大格陵兰东部铁路是我们为将尽可能多的沿海地区连接成一个统一的铁路网络而进行的最大的基础设施投资之一。缩短旅行时间的唯一障碍是巨大的冰架，但也许有一天我们可以改变这一点。"
 GRN_focus_Connecting_Greenland: "连接格陵兰"
 GRN_focus_Connecting_Greenland_desc: "随着国家的发展，我们对基础设施的需求也在增长。为此，我们不仅要继续投资于基础设施本身，还要投资于其维护方式以及如何使其更适合所处的建设环境。"
 GRN_focus_Economic_Modernism_Plan: "经济现代化计划"
 GRN_focus_Economic_Modernism_Plan_desc: "经济持续多元化发展对其稳定与健康至关重要。我们必须弥补民用领域及服务业与科技领域的短板。"
 GRN_focus_Office_District_West: "西部办公园区"
 GRN_focus_Office_District_West_desc: "在西部地区发展综合办公区，将使我们能够扩展市民可享受的产品与服务。"
 GRN_focus_Tech_Sector_Growth: "技术部门发展"
 GRN_focus_Tech_Sector_Growth_desc: "扩大办公和服务业通常会伴随着技术领域的整体发展。我们应确保这一点，以实现经济尽可能的多元化。"
 GRN_focus_Civilian_Sector_Investments: "民用部门投资"
 GRN_focus_Civilian_Sector_Investments_desc: "为了支持我们发展和多元化办公领域的努力，这些企业需要工业支撑来制造并可能使用其产品。"
 GRN_focus_National_Economic_Modernity: "国家经济现代化"
 GRN_focus_National_Economic_Modernity_desc: "我们的投资可以说既多元又富有成效，但这仅仅是开始。我们必须竭尽全力，为我们的公民以及国家的未来创造最佳结果。"
 GRN_focus_Resource_Extraction_Projects: "资源开采计划"
 GRN_focus_Resource_Extraction_Projects_desc: "本岛蕴藏着尚未开发的资源。若要在国内安全、外国投资或贸易方面取得进展，我们必须根据我们认为对国家最有利的需求来发展资源开采部门。"
 GRN_focus_Iron_Mining_Operations: "铁矿开采"
 GRN_focus_Iron_Mining_Operations_desc: "铁是一种基础矿石，在整个经济体系中都需要开采和利用。我们将启动国家投资，以启动并扩大采掘作业，从而最好地满足我们的需求。"
 GRN_focus_Project_Alumina_Oxide: "氧化铝项目"
 GRN_focus_Project_Alumina_Oxide_desc: "虽然我们至今尚未发现任何直接的铝土矿矿床，但已找到从其他矿物中提取所需氧化铝以制造铝的方法。因此，我们需要大力投资于开采作业和分离研究，以充分利用我们仅有的少量资源。"
 GRN_focus_Lithium_Mining_Operations: "锂矿开采"
 GRN_focus_Lithium_Mining_Operations_desc: "锂及类似基础矿物资源的储量，将成为我们拓展创新能力、发展科技产业与服务部门的关键。投资锂、钴等矿产的开采业务，将极大增强我国经济的灵活性。"
 GRN_focus_Project_Rare_Minerals: "稀土矿项目"
 GRN_focus_Project_Rare_Minerals_desc: "大力投资于钕等稀土元素及其他可用矿产资源的开采，将显著提升我国在贸易谈判中的国际地位。我们希望通过此类投资，使国家迈向新高度，并吸引更多资本投入我国。"
 GRN_focus_Black_Gold_Extraction_Efforts: "黑金开采行动"
 GRN_focus_Black_Gold_Extraction_Efforts_desc: "投资我们的石油矿藏将为我们提供大量廉价能源，并成为未来贸易谈判的重要筹码。此外，我们还可以利用开采的石油和煤炭来加强合成与石化工业。"
 GRN_focus_Project_Glacial_Rubber: "冰川橡胶项目"
 GRN_focus_Project_Glacial_Rubber_desc: "通过对专门培育橡胶树的VFF进行广泛实验和投资，以及利用煤炭和石油生产合成材料和石化产品，我们能够探索所有可能的途径，以确保国内橡胶供应。"
 GRN_focus_Polar_Bear_Policies: "北极熊政策"
 GRN_focus_Polar_Bear_Policies_desc: "随着国家的稳定、发展以及国防和潜在进攻能力的完备，我们现在可以将目光投向岛屿之外。我们的外交政策将决定我们真正的未来，以及我们渴望亲手实现的目标。"
 GRN_focus_The_Atlantic_Stepping_Stone: "大西洋阶石"
 GRN_focus_The_Atlantic_Stepping_Stone_desc: "我们得面对现实：任何真正的外交政策方向，终究都会在某个节点牵扯到冰岛。既然如此，不如先把这一步迈出去，搞明白我们具体要做什么。这不仅将为未来的外交努力定下节奏，更是检验我们在现代格局中纵横捭阖能力的一场试炼。"
 GRN_focus_Investing_In_Brotherhood: "投资兄弟情谊"
 GRN_focus_Investing_In_Brotherhood_desc: "若想拉近关系、缔结更紧密的纽带，乃至进行未来双方可能实现联合的计划，我们就必须建立信任。这可以通过一系列更有利于他们的投资来实现。若我们以长远眼光布局，最终必将惠及双方。切记：稳扎稳打，方能致远。"
 GRN_focus_Reykjavik_Investment_Firm: "雷克雅未克投资公司"
 GRN_focus_Reykjavik_Investment_Firm_desc: "冰岛是北大西洋公约组织的成员，这确实是个问题。我们必须想办法削弱冰岛对外国势力（尤其是美国）的依赖和所谓需求，才能将这座岛屿掌握在我们手中。因此，不妨给他们一个无法拒绝的提议——别管那些细则条款，直接在这里签字即可。"
 GRN_focus_Operation_Real_Green: "行动：真实绿色"
 GRN_focus_Operation_Real_Green_desc: "我们已经用尽所有选项，必须确保本岛的安全，以加强我们在北大西洋高纬度区域的防御。捕鱼和贸易将保障我们的利益与经济。同时，针对侵略性试探行为的预防性巡逻将为该地区带来更好的稳定。"
 GRN_focus_Passive_Administration_Act: "间接行政法案"
 GRN_focus_Passive_Administration_Act_desc: "随着冰岛如今已处于我方更直接的控制之下，我们必须协助整合并形成一个更紧密的同类民族联盟。为此，我们将采取一种更为间接的方式——尽管组织结构偏向联邦制，实则构建一种软性的邦联模式。"
 GRN_focus_The_North_Sea_Gambit: "北海豪赌"
 GRN_focus_The_North_Sea_Gambit_desc: "法罗群岛是北海的中途站。我们将不惜一切代价确保这些岛屿的安全，为激起丹麦的反应铺平道路。我们希望能让丹麦主动向我们宣战，从而绕过北大西洋公约组织第五条款的防御机制。如此一来，我们也能在欧洲大陆上获得一个立足点，为向北或向南的军事行动建立更近的基地。"
 GRN_focus_Friends_On_The_Other_Side: "彼岸的朋友"
 GRN_focus_Friends_On_The_Other_Side_desc: "为了确保法罗群岛居民的支持，我们必须展现出仁慈的态度。因此，我们将竭尽全力为他们谋取最大利益。在岛上与当地人和项目工人进行一些微妙的闲聊，暗示丹麦从未如此善待他们，这足以定下基调，让政府向我们屈服。"
 GRN_focus_Operation_Fair_Oh: "行动：公正法罗"
 GRN_focus_Operation_Fair_Oh_desc: "法罗群岛目前还在丹麦手里，但丹麦人似乎只求维持现状，并不特别上心。要是我们干脆直接动手，看看会发生什么，会怎样？如果在接管过程中没有流血，也没有出什么乱子，那这还算得上是一次“攻击”吗？而且，如果我们能在丹麦正式提出申诉之前，先说服岛民倒向我们，届时又有谁会真心实意地跑出来帮丹麦——去打一个大家大概都觉得“丹麦自己就能搞定”的国家呢？这是一个完美的“既是侵略又不是侵略”的计划。"
 GRN_focus_Continental_Shenanigans: "欧陆诡戏"
 GRN_focus_Continental_Shenanigans_desc: "随着我们在北海的跳板得到巩固，现在我们转向大陆。换言之，我们要对昔日的宗主国下手，在决定下一步具体目标之前，先在欧陆上取得立足之地。"
 GRN_focus_Family_Investments: "家族投资"
 GRN_focus_Family_Investments_desc: "鉴于丹麦已经察觉到了我们的计谋，我们必须采取更被动的策略来迷惑他们。考虑到我们近期的历史表现，得先让他们放松警惕，这样我们才能尽可能以和平方式处理问题。"
 GRN_focus_Jylland_Investment_Firm: "日德兰投资公司"
 GRN_focus_Jylland_Investment_Firm_desc: "我们将像在冰岛那样操作。一系列大规模投资将使我们能够植入一些小的公共议题，从而在政治上孤立丹麦，使其脱离北约。"
 GRN_focus_Operation_Middleman: "行动：中间人"
 GRN_focus_Operation_Middleman_desc: "丹麦是北欧大家庭与欧陆斗兽场之间的中间人。要确保未来顺利推进至最终目标，我们必须先巩固这一地位。"
 GRN_focus_Civil_Service_Integration: "行政部门整合"
 GRN_focus_Civil_Service_Integration_desc: "将丹麦的文官机构标准化并整合到现有的文官体系中，将有助于实现更协调、更少干扰的日常运作，无论是对于项目本身还是需要这些服务的人群而言。"
 GRN_focus_Nordic_Regional_Operations: "北欧地区行动"
 GRN_focus_Nordic_Regional_Operations_desc: "通过占领丹麦获得中央指挥部后，我们现在能够更好地统筹战略目标与能力。虽然基本框架保持不变，但后续将采用更宏观的视野，或至少采取更迂回的策略以增强协同性。"
 GRN_focus_West_Nordic_Interests: "北欧西部利益"
 GRN_focus_West_Nordic_Interests_desc: "随着时间的推移，我们将寻求逐步扩大内部影响力，以确保挪威资源及民众对更宏大的北欧联盟的支持。"
 GRN_focus_North_Fjords_Investment_Firm: "北部峡湾投资公司"
 GRN_focus_North_Fjords_Investment_Firm_desc: "就像我们处理冰岛和格陵兰那样，我们将通过发展挪威的利益来建立自己的利益。"
 GRN_focus_Operation_Fjordsland: "行动：峡湾之地"
 GRN_focus_Operation_Fjordsland_desc: "控制挪威将使我们能够畅通无阻地进入北海贸易路线并获取资源。这将为我们提供与北约谈判的筹码，以协助抵御俄罗斯，并且总体上确保我们在更大的北欧地区站稳脚跟。"
 GRN_focus_North_Sea_Negotiations: "北海谈判"
 GRN_focus_North_Sea_Negotiations_desc: "与民众合作，了解他们对新现状的期望，有助于更好更顺利地推进整体整合过程。"
 GRN_focus_Central_Nordic_Interests: "北欧中部利益"
 GRN_focus_Central_Nordic_Interests_desc: "尽力维护我们在瑞典以及北欧国家中部地区的利益，将对我们未来的事业大有裨益。"
 GRN_focus_Karlstad_Central_Investments_Agency: "卡尔斯塔德中央投资局"
 GRN_focus_Karlstad_Central_Investments_Agency_desc: "致力于投资和开发卡尔斯塔德及其周边城市，不仅能提升我们的声望，还能让我们为瑞典乃至我们自身的未来进行投资。"
 GRN_focus_Operation_Great_Northern_War: "行动：大北方战争"
 GRN_focus_Operation_Great_Northern_War_desc: "尽管瑞典在该地区总体上态度友好，但政治上的和睦手段已无法满足我们的需求。因此，我们被迫采取更强硬的手段来实现最终目标。"
 GRN_focus_Stockholm_Community_Programs: "斯德哥尔摩社区计划"
 GRN_focus_Stockholm_Community_Programs_desc: "与社区建立联系并进一步促进稳定及整体更积极的印象，将有助于更好地推动与民众及地方行政机构的融合工作。"
 GRN_focus_Eastern_Nordic_Interests: "北欧东部利益"
 GRN_focus_Eastern_Nordic_Interests_desc: "拿下芬兰将使我们成为美国和俄罗斯这两大对峙势力之间一个重要的谈判筹码。鉴于芬兰与东方巨熊共享着相当长的边境线，我们不妨借此机会为未来的目标谋取利益。"
 GRN_focus_Suomen_Investment_Agency: "索米投资局"
 GRN_focus_Suomen_Investment_Agency_desc: "确保发展成果与未来，不仅关乎芬兰人民所愿，更要尽己所能铺就我们所期盼的前路——这是检验能否将芬兰纳入己用的一大良策。"
 GRN_focus_Operation_Mannerheim: "行动：曼纳海姆"
 GRN_focus_Operation_Mannerheim_desc: "确保芬兰的冻土就如同确保一个远离家乡的避风港。尽管地形总体上平坦得多，但其环境的严酷程度依然相似。因此，我们应当能够以不大的整体难度确保这些土地的安全。"
 GRN_focus_Continued_Peaceable_Autonomy: "继续和平自治"
 GRN_focus_Continued_Peaceable_Autonomy_desc: "芬兰是一个珍视独处、也珍视文化相近者之间团结的民族。因此，只要达成相互理解，并在平等类型的协议中保持更多平等地位，我们就能在充分帮助下控制这片领土——前提是公平对待，且不得强迫平民或政府违背自身意愿行事。虽然这听起来对我们不利，但实际上比许多人想象的要容易得多。"
 GRN_focus_Solidifying_Nordic_Unity: "巩固北欧团结"
 GRN_focus_Solidifying_Nordic_Unity_desc: "当我们的野心告一段落，我们只需放松身心，享受劳动的果实，着手创建一个新的北欧联盟，它将与世界上其他联盟一较高下。"
 GRN_focus_Continental_Ambitions: "大陆野心"
 GRN_focus_Continental_Ambitions_desc: "随着北欧国家现已统一，我们可以将注意力转向南方。尽管这些目标在实际中远比我们所能认真设想的更为宏大，但只要我们沿用迄今为止的外交模式，理应能够实现我们对外野心的下一步——因纽特大陆联盟。"
 GRN_focus_Eastern_Continental_Interests: "欧陆东部利益"
 GRN_focus_Eastern_Continental_Interests_desc: "随着我们在北方的整合工作推进，现在可以将目光转向南方。因此，我们将通过在波罗的海地区建立立足点，来构建一条宏大的东部边界。"
 GRN_focus_Operation_Nordic_Adjacent: "行动：北欧邻接"
 GRN_focus_Operation_Nordic_Adjacent_desc: "爱沙尼亚是我们芬兰领土上最近的登陆点。我们可以选择空降，或者从赫尔辛基发动大规模两栖登陆，在其他大国来得及抗议之前迅速控制该国。"
 GRN_focus_Operation_Riga_River: "行动：里加河"
 GRN_focus_Operation_Riga_River_desc: "控制拉脱维亚能为我们提供一个中央高地，由此展开并确保波罗的海其余地区的安全。"
 GRN_focus_Operation_Vilnius: "行动：维尔纽斯"
 GRN_focus_Operation_Vilnius_desc: "立陶宛可以说是波罗的海地区最发达的国家，我们将其击倒后，另外两个国家就会像在镇上散步一样被轻松解决。"
 GRN_focus_Baltic_Behestment: "波罗的海谕令"
 GRN_focus_Baltic_Behestment_desc: "随着地方当局与平民开始放松，并接受新的现状，我们现在可以着手整合前波罗的海国家。尽管他们作为民族有着坚强的意志，但或许我们可以努力给予他们类似芬兰地方当局所达成的地位。"
 GRN_focus_North_Sea_Security: "北海安全"
 GRN_focus_North_Sea_Security_desc: "夺取整个北海和北大西洋的控制权，将极大提升我们的全球影响力。我们应当着手拉拢凯尔特群岛及其占领者，为推行更优雅的统治铺平道路。"
 GRN_focus_Operation_Albion: "行动：阿尔比恩"
 GRN_focus_Operation_Albion_desc: "确保对英国或曾经是英国核心区域的控制对于在凯尔特群岛进一步行动至关重要，更不用说，这还为任何欧洲大陆西部的冒险行动建立了一个关键立足点。"
 GRN_focus_Operation_Highlander: "行动：高地人"
 GRN_focus_Operation_Highlander_desc: "拿下苏格兰地区后，我们将几乎完全控制北海战略区。这将为向主岛南部全面推进奠定基础。"
 GRN_focus_Operation_Great_Western_Nation: "行动：伟大西方"
 GRN_focus_Operation_Great_Western_Nation_desc: "战略占领威尔士及曾经的大西部铁路将使我们得以利用基础设施，协调对西部爱尔兰及东南部英格兰两方的利益。"
 GRN_focus_Operation_Be_My_Mann: "行动：马恩在手"
 GRN_focus_Operation_Be_My_Mann_desc: "确保对马恩岛这一战略要地的控制，将为我们处理整个凯尔特群岛的海军事务提供关键支点。"
 GRN_focus_Operation_Ulster: "行动：阿尔斯特"
 GRN_focus_Operation_Ulster_desc: "爱尔兰岛至今仍处于分裂状态，我们最好的选择是击溃较弱的北爱尔兰阿尔斯特地区。控制此地后，便可挥师南下，收复翡翠岛其余领土。"
 GRN_focus_Operation_Emerald_Isle: "行动：翡翠之岛"
 GRN_focus_Operation_Emerald_Isle_desc: "拿下整个爱尔兰将使我们能够更好地向欧洲最西端推进。更不用说，它还将作为进入另一个名为“联合”王国的岛屿的集结地。"
 GRN_focus_Celtic_Consolidations: "整合凯尔特"
 GRN_focus_Celtic_Consolidations_desc: "整合工作以及使我们对土地与人民的统治和权威正常化需要时间。但通过提供援助、服务，并向他们展示我们能在新旗帜下和睦相处，就能让所有人重新步入正轨。"
 GRN_focus_Western_European_Advances: "西欧推进"
 GRN_focus_Western_European_Advances_desc: "我们在大陆上的稳步前进将是一次巨大的飞跃，因为我们正着眼于欧陆中西部地区的国家。"
 GRN_focus_Operation_Bonaparte: "行动：波拿巴"
 GRN_focus_Operation_Bonaparte_desc: "法国是西欧战场的中心，更是我们进军伊比利亚半岛的门户。是时候整合这片大陆中轴线上最西端的国家了。"
 GRN_focus_Operation_Windmill: "行动：风车"
 GRN_focus_Operation_Windmill_desc: "荷兰将成为我们在欧洲大陆西部的绝佳立足点。该国大部分地区都是海岸线，我们应该能迅速将其控制。"
 GRN_focus_Operation_Rhine_Rumble: "行动：莱茵雷霆"
 GRN_focus_Operation_Rhine_Rumble_desc: "德国将整个欧洲大陆关键中的关键。我们守住这里，就能在适当的时候控制整个大陆。"
 GRN_focus_Operation_Chocolate_Waffle: "任务：巧克力华夫饼"
 GRN_focus_Operation_Chocolate_Waffle_desc: "比利时，一个按理说不应存在的国家。作为数百年前英国干预的产物，这个国家一直是真正欧洲统一进程中的一根刺。我们将以最快的速度拔除这根刺。"
 GRN_focus_Operation_Speed_Bump: "任务：减速带"
 GRN_focus_Operation_Speed_Bump_desc: "这就是卢森堡而已，除非它加入其他国家的联盟，否则根本构不成威胁。我们现在就拿下它，好了，拜拜。"
 GRN_focus_French_Values_Greenlandic_Leadership: "法兰西价值观，格陵兰统治者"
 GRN_focus_French_Values_Greenlandic_Leadership_desc: "确保法国高度动荡的民众顺从新现状将需要大量的时间和精力。但如果我们能表明我们无意改变他们的价值观，只是更换掌权的领导层，那么我们就更有可能与民众合作。"
 GRN_focus_German_Traditions_Greenlandic_Initiative: "德意志传统，格陵兰倡议"
 GRN_focus_German_Traditions_Greenlandic_Initiative_desc: "德国拥有悠久的军事传统历史。如果我们能充分利用这一点，我们必将实现欧洲大陆的霸权。德国的军事才能与格陵兰的自尊心抱负相结合。"
 GRN_focus_Low_Countries_Low_Maintainance: "低地国，低成本"
 GRN_focus_Low_Countries_Low_Maintainance_desc: "低地国家的期望不过是希望得到公平对待，并能够保持自由独立的精神。考虑到我们正试图建立一个平等的联盟，这比预想中要容易得多。"
 GRN_focus_Iberian_Atlantic_Interests: "伊比利亚大西洋利益"
 GRN_focus_Iberian_Atlantic_Interests_desc: "伊比利亚地区是大西洋中部地区与地中海主要通道之间的战略咽喉。若要确保整个欧洲大陆的安全，我们必须控制这一关键贸易与物流枢纽。"
 GRN_focus_Operation_Castile: "行动：卡斯蒂利亚"
 GRN_focus_Operation_Castile_desc: "西班牙是伊比利亚的老大，我们拿下它，基本上就稳住了整个地区。"
 GRN_focus_Operation_Fontainebleau: "行动：枫丹白露"
 GRN_focus_Operation_Fontainebleau_desc: "拿破仑曾试图通过当时与西班牙的条约征服葡萄牙。但今天完全不同，我们将为伊比利亚统一和欧洲联邦主义而征服葡萄牙。新的黎明正等待着我们，而葡萄牙是伊比利亚整合的门户。"
 GRN_focus_Operation_The_Other_Galicia: "行动：加利西亚再临"
 GRN_focus_Operation_The_Other_Galicia_desc: "大多数欧洲以外的人提到加利西亚，会想到乌克兰西部的那个地区。但实际上，我们要讨论的是伊比利亚半岛西北部的加利西亚民族。"
 GRN_focus_Operation_Basquing_In_the_Sun: "行动：巴斯克日光浴"
 GRN_focus_Operation_Basquing_In_the_Sun_desc: "处理巴斯克民族问题会很简单，如果我们还没处理过的话。我们处理过吗？我忘了。"
 GRN_focus_Operation_Barcelona: "行动：巴塞罗那"
 GRN_focus_Operation_Barcelona_desc: "确保伊比利亚东北部地区的安全，能让我们在法西边境山脉的另一侧获得一个立足点。"
 GRN_focus_Operation_Casablanca: "行动：卡萨布兰卡"
 GRN_focus_Operation_Casablanca_desc: "伊比利亚半岛南部的安达卢西亚地区将让我们毫无争议地控制我们这一侧的直布罗陀海峡。"
 GRN_focus_Iberian_Idealism: "伊比利亚理想主义"
 GRN_focus_Iberian_Idealism_desc: "随着该地区完全处于我们的掌控之下，我们现在可以开始培养地区团结意识。利用当地的文化与民族、他们的历史与精神，激发一种新的自豪感。通过实力与繁荣实现团结，在顺境与逆境中建立同志情谊。"
 GRN_focus_Alpine_Block_Nations: "阿尔卑斯环绕之中"
 GRN_focus_Alpine_Block_Nations_desc: "欧洲中南地区以山地地形为主。从意大利边境最北端的阿尔卑斯山脉，到贯穿意大利本土的诸多山系，这片天然防御要地是我们东进的关键。"
 GRN_focus_Operation_Neutral_No_More: "行动：再无中立"
 GRN_focus_Operation_Neutral_No_More_desc: "瑞士是一个满是山地的国家。如果我们能征服它，也就意味着我们几乎能征服一切。"
 GRN_focus_Operation_Vienna_Calling: "任务：维也纳呼唤"
 GRN_focus_Operation_Vienna_Calling_desc: "从阿尔卑斯山到匈牙利平原，我们将拿下奥地利，并打通通往东部和南部的道路。"
 GRN_focus_Operation_Slovene_And_Slide: "行动：斯洛文尼亚滑步"
 GRN_focus_Operation_Slovene_And_Slide_desc: "在北巴尔干地区站稳脚跟将有助于我们在将注意力转向该地区时确保其安全。"
 GRN_focus_Operation_Gelato: "任务：意式冰淇淋"
 GRN_focus_Operation_Gelato_desc: "意大利位于欧洲中南部和地中海的战略要地。我们夺取此地，就能为后续行动保障至关重要的海军力量。"
 GRN_focus_Securing_Local_Interests: "保护地方利益"
 GRN_focus_Securing_Local_Interests_desc: "关注当地民众的利益和需求，有助于为局势带来更积极的新视角。我们希望通过更好地与民众沟通，能够实现更平稳的权力交接。"
 GRN_focus_Great_Eastern_Interests: "大东方利益"
 GRN_focus_Great_Eastern_Interests_desc: "我们在东部的立足点已经稳固，现在可以向东欧其他地区扩张。从波兰和捷克边境地区到白俄罗斯和乌克兰边境，我们将开始向东进军。"
 GRN_focus_Operation_Heartbeat: "行动：心跳"
 GRN_focus_Operation_Heartbeat_desc: "波兰是东欧跳动的心脏。因其在军事准备上的巨额投资，它被称为欧洲的得克萨斯。现在，我们将对此进行终极考验。"
 GRN_focus_Operation_Carpathia: "行动：喀尔巴阡"
 GRN_focus_Operation_Carpathia_desc: "斯洛伐克民族的主体坐落在宏伟的喀尔巴阡山脉的北部弧线上。若想拥有一个向南进入巴尔干地区的总平台，我们必须翻越这些山脉。"
 GRN_focus_Operation_Final_Rhapsody: "行动：终末狂想曲"
 GRN_focus_Operation_Final_Rhapsody_desc: "确保捷克斯洛伐克能让我们基本稳固进入巴尔干地区的整个北部通道。这只是迈向欧洲统一的一步。"
 GRN_focus_Operation_White_Russian: "行动：白色俄罗斯"
 GRN_focus_Operation_White_Russian_desc: "白俄罗斯是俄罗斯在欧洲利益的关键支点，当然，这背后也不仅仅是古老的历史野心。要想真正巩固我们对大陆的控制，就必须挫其锐气。"
 GRN_focus_Operation_Bread_Basket: "行动：面包篮"
 GRN_focus_Operation_Bread_Basket_desc: "确保欧陆的粮仓将为我们带来诸多益处，这是我们必须达成的目标。"
 GRN_focus_Operation_Soviet_Storm: "行动：苏维埃风暴"
 GRN_focus_Operation_Soviet_Storm_desc: "德涅斯特河沿岸本身就是一个时间胶囊。作为苏联最后的堡垒之一，这个国家虽然小，却极其自豪且叛逆，通过近乎影子般的运作，使其作为一个国家奇迹般地存活至今。"
 GRN_focus_Operation_Your_Right_No_Your_Other_Right: "行动：你的右边，不，是另一个右边"
 GRN_focus_Operation_Your_Right_No_Your_Other_Right_desc: "我们必须进攻摩尔多瓦……不，不是罗马尼亚的那个地区，而是那个国家。是的，我知道这很令人困惑，但别问我，等我们到了那里问他们去。"
 GRN_focus_Eastern_Territorial_Authority_Bureau: "东方领土管理局"
 GRN_focus_Eastern_Territorial_Authority_Bureau_desc: "东方领土管理局是一个专门处理那些更自由的东方国家的机构。这些国家拥有广阔的乡村土地，在中央集权方面基本上仍处于未开化状态。我们可以通过基础设施项目和社区外展计划，希望平息和解决我们可能遇到的任何长期问题。"
 GRN_focus_Balkan_Bounties: "巴尔干奖品"
 GRN_focus_Balkan_Bounties_desc: "我们这一庞大计划的最后关键——巴尔干诸国。这片充满战争与历史的土地，我们将倾尽全力驯服这个动荡不安的\"猛兽之域\"。"
 GRN_focus_Operation_Nosferatu: "行动：诺斯费拉图"
 GRN_focus_Operation_Nosferatu_desc: "喀尔巴阡山脉中的特兰西瓦尼亚盆地是一个战略防御阵地。罗马尼亚本身也拥有相当可观的能源生产能力，因此我们可以更好地利用这些资源来造福所有人。"
 GRN_focus_Operation_Bulgar: "行动：保加利亚"
 GRN_focus_Operation_Bulgar_desc: "黑海东段的巩固将有助于我们集中力量向巴尔干内陆推进。"
 GRN_focus_Operation_Alexander_Not_So_Great: "行动：亚历山大非大帝"
 GRN_focus_Operation_Alexander_Not_So_Great_desc: "马其顿国声称拥有骄傲的历史人物亚历山大大帝。好吧，我现在可没看到他，所以我们直接接手这里的一切了。"
 GRN_focus_Operation_Trianon: "行动：特里亚农"
 GRN_focus_Operation_Trianon_desc: "匈牙利横跨巴尔干半岛中北部的高原。如果我们控制这一地区，就能打通向南通往地中海的清晰路径。"
 GRN_focus_Operation_Princip: "行动：普林西普"
 GRN_focus_Operation_Princip_desc: "塞尔维亚就是引起世界大战的元凶，现在我们给塞尔维亚一记反击，以解决该地区最大的导火索之一。"
 GRN_focus_Operation_Koso_Woah: "行动：科索哇袄"
 GRN_focus_Operation_Koso_Woah_desc: "科索沃这个减速带对塞尔维亚来说是个麻烦，但对我们而言影响不大。因此，这应该是一次速战速决的行动。"
 GRN_focus_Operation_Scissors: "行动：剪刀"
 GRN_focus_Operation_Scissors_desc: "确保控制克罗地亚能让我们获得重要的沿海设施，并在我们追求更南方的野心时保障侧翼攻击位置。"
 GRN_focus_Operation_Minefield: "行动：雷区"
 GRN_focus_Operation_Minefield_desc: "征服极度分裂的波斯尼亚时，我们最大的担忧在于整个国家几乎就是一片预置雷区。因此，若要尽快取得实质性进展，就必须携带充足的排雷装备。"
 GRN_focus_Operation_Mountain_Man: "行动：山地人"
 GRN_focus_Operation_Mountain_Man_desc: "黑山的山地虽难攻克，但我们很快就能拿下。"
 GRN_focus_Operation_Adriatic_Gateway: "行动：亚得里亚之门"
 GRN_focus_Operation_Adriatic_Gateway_desc: "确保阿尔巴尼亚能让我们封锁亚得里亚海。通过此举，我们不仅能获得巨大的海军建设潜力，还能实质上掌控一个庞大的港口网络，可用于地中海区域的军事行动。"
 GRN_focus_Operation_This_Is_Sparta: "行动：这就是斯巴达"
 GRN_focus_Operation_This_Is_Sparta_desc: "希腊，这个拥有丰富文化与历史宝藏的半岛岛国。我们将拿下这一历史枢纽，但必须尽力避免破坏历史遗迹。"
 GRN_focus_Southern_Territorial_Authority_Commission: "南方领土管理局"
 GRN_focus_Southern_Territorial_Authority_Commission_desc: "设立一个专门委员会，将使我们能够集中精力推进整合与统一措施，避免因某个地区管不住自己而演变成全国性的问题。"
 GRN_focus_Establishing_The_Frozen_Federation: "建立冰封联邦"
 GRN_focus_Establishing_The_Frozen_Federation_desc: "我们终于做到了。我们建立了一个统一的联邦国家，将寒冷的北方国家与欧洲大陆联盟的其他国家联合起来。当然，它并不完美，因此并未囊括整个地理上的欧洲大陆区域。但无论如何，这是我们在历史上留下的印记，我们将竭尽全力，恪守我们如今庇护下的价值观和人民。为联邦干杯！"
 GRN_focus_The_Great_Ice_Shelf: "大冰架"
 GRN_focus_The_Great_Ice_Shelf_desc: "我们国家的广阔内陆不过是一片巨大的冰原。然而，随着国家的发展，我们已能通过控制性地利用这些冻结的水资源，逐步削弱这片冰壳。现在，我们可以全力将目光转向内陆，准备定居并妥善开发它。因为未来是绿色的，我们终将发现冰层之下的土地。"
 GRN_focus_Southern_Interior_Development_Projects: "南方内陆开发计划"
 GRN_focus_Southern_Interior_Development_Projects_desc: "我们将着手开发并建设我们标记的南部内陆地区的后勤体系。"
 GRN_focus_Southern_Settlement_Projects: "南方定居计划"
 GRN_focus_Southern_Settlement_Projects_desc: "为提供后勤支持，我们将开始建立一系列战略性定居点，不仅促进当地人口增长，还将在区域内形成某种供应链。这将有助于我们推进未来的项目，最终驯服大冰架上的大片区域。"
 GRN_focus_Southern_Infrastructure_Projects: "南方基础设施工程"
 GRN_focus_Southern_Infrastructure_Projects_desc: "要连接我们的定居点并开展任何经济活动，我们需要某种基础设施来确保我们树立真正驯服自然的黄金标准。"
 GRN_focus_Southern_Economic_Projects: "南部经济计划"
 GRN_focus_Southern_Economic_Projects_desc: "随着人口和基础设施在南部内地区域的逐步建立，我们现在可以开始缓慢地构建内部或地方经济基础。这一基础将为未来的持续增长奠定基石。"
 GRN_focus_Southern_Mining_Projects: "南部矿业计划"
 GRN_focus_Southern_Mining_Projects_desc: "随着该地区在经济和社会事务上逐渐稳定，现在是时候启动深孔钻探项目了。我们将利用冰层进行持续向下钻探，以获取真实的地质数据，同时避免因温差导致的设备过热问题。"
 GRN_focus_Taming_The_Southern_Interior: "驯服南部内陆"
 GRN_focus_Taming_The_Southern_Interior_desc: "凭借我们现有的人民、基础设施和资源，现在可以自豪地说，我们确实已经驯服了部分大冰架。当然，我们的工作远未结束，甚至可以说才刚刚开始。但如今，我们可以自信地眺望北方广袤的地平线，宣告我们正踏上一段伟大而丰饶的旅程。"
 GRN_focus_Central_Plateau_Development_Projects: "中央高原开发计划"
 GRN_focus_Central_Plateau_Development_Projects_desc: "南方既已基本平定，我们可着手展开伟大冰征，向中部区域推进。待获取更多冰层与潜在土地资源后，便能为更多基础指标投入建设。"
 GRN_focus_Central_Settlement_Projects: "中部定居点项目"
 GRN_focus_Central_Settlement_Projects_desc: "就像在南方地区一样，我们将在整个高原上开始建立战略定居点。"
 GRN_focus_Central_Infrastructure_Projects: "中部基建项目"
 GRN_focus_Central_Infrastructure_Projects_desc: "随着我们的定居点建立起来，我们便可以着手构建足够完善的基础设施网络，将各地妥善连接起来。"
 GRN_focus_Central_Economic_Projects: "中部经济项目"
 GRN_focus_Central_Economic_Projects_desc: "人口，到位。基础设施，到位。现在我们继续推进，建立本地经济体系。"
 GRN_focus_Central_Mining_Projects: "中部采矿工程"
 GRN_focus_Central_Mining_Projects_desc: "就像我们在南部地区所做的那样，现在我们终于在经济和社会层面建立了网络，为资源开采行动做好了准备。这个区域比南部大得多，所以祝这次事业成果丰硕。"
 GRN_focus_Taming_The_Central_Plateau: "驯服中央高原"
 GRN_focus_Taming_The_Central_Plateau_desc: "人民、定居点、粮食、经济和资源均已到位，我们现在可以正式且自信地宣布，我们已经征服了大冰架。尽管随着时间的推移，未来仍会遇到许多困难，但就目前及可预见的未来而言，我们可以沉浸在这个伟大而繁荣国家的极地荣光之中。"
 GRN_eu_adjacent_nation: "欧盟邻国"
 GRN_eu_adjacent_nation_desc: "格陵兰岛处于一个有趣的境地。作为距离欧洲大陆最远的地区，它现在及未来都极不可能成为欧盟成员国。但由于其作为丹麦王冠殖民地的地位，它享有与其他欧盟成员国相同的移民和旅行待遇。因此，许多格陵兰人利用这一便利，前往海外寻求更好的教育机会——毕竟该岛整体发展水平有限。"
 GRN_economic_pains: "经济困境"
 GRN_economic_pains_desc: "格陵兰的人口几十年来一直徘徊在5万人左右，由于国家恶劣的气候和物流成为发展的关键因素，人口规模甚至更小。在新千年，这个问题仍在继续，国家领导人必须想办法适应和调整经济需求，否则国家和经济将只会停滞不前。"
 GRN_idea_colonial_subsidy: "殖民补贴"
 GRN_idea_colonial_subsidy_desc: "我们的国家极度不发达，甚至日常运作都严重依赖丹麦的补贴。如果我们想要考虑脱离丹麦王室的统治，就必须找到不再依赖这份补贴来维持生存的方法。"
 GRN_idea_narrow_gauge_nation: "窄轨国家"
 GRN_idea_narrow_gauge_nation_desc: "窄轨轨道及其设备的灵活性和成本效益，将使我们能够引领国家整体发展与连通性。此外，与常规标准轨道及设备相比，窄轨在提升安全性方面的成本更低，这还带来了额外的安全优势。"
 GRN_idea_battle_for_independence: "独立之战"
 GRN_idea_battle_for_independence_desc: "我们已走到独立已成定局的关口。接下来将启动大规模施压运动，确保在我们有生之年，这份独立能够稳如磐石。"
 GRN_ideas_political_freedoms: "政治自由"
 GRN_ideas_political_freedoms_desc: "我们的国家自由选择人民所愿，不局限于任何特定意识形态。"
 GRN_ideas_emerging_political_influences: "新兴主义政治影响"
 GRN_ideas_emerging_political_influences_desc: "随着我们国家的独立，我们可以专注于展现现代的政治作风，迎接美丽新世界。"
 GRN_ideas_non_aligned_political_influences: "不结盟主义政治影响"
 GRN_ideas_non_aligned_political_influences_desc: "随着我们的国家能够自由选择前行的道路，没有任何地缘政治阵营真正能让我们受益，因此我们将以更中立的方式专注于自身发展。"
 GRN_ideas_nationalist_political_influences: "民族主义政治影响"
 GRN_ideas_nationalist_political_influences_desc: "我们的国家是自由的，我们的人民是团结的，国家是我们聚焦未来的首要任务。格陵兰民族主义让我们心安。"
 GRN_idea_alumina_research_institute: "氧化铝研究所"
 GRN_idea_alumina_research_institute_desc: "氧化铝研究所的建立是理解资源开采、提炼与高效利用的基础。这一专门研发综合体将通过更切实可行的自给自足政策，在对外贸易谈判中，将我国推向新的高度。"
 GRN_idea_economic_development_visas: "经济发展签证"
 GRN_idea_economic_development_visas_desc: "希望移居并定居该国的人可以申请一类签证，即经济发展签证。经济发展签证本质上是一个帮助新公民安顿下来并找到工作，让他们能够为国家的发展和整体增长做出贡献的入职流程。"
 GRN_idea_sanctioned_immigration_efforts: "促进移民计划"
 GRN_idea_sanctioned_immigration_efforts_desc: "通过不懈努力，我们将尝试通过移民确保人口的稳定增长。"
 GRN_idea_strategic_mineral_leasing: "战略矿产特许"
 GRN_idea_strategic_mineral_leasing_desc: "将矿产开采权租让给外国公司是一把需要谨慎使用的双刃剑。我们必须明确规定他们可以开采的矿种、开采地点以及矿产的流向。只有这样，我们才能尽可能限制外国对我国政治体制的过度干预，同时利用这些公司来打造我们的谈判筹码。"
 GRN_idea_contracting_a_workforce: "合同劳工"
 GRN_idea_contracting_a_workforce_desc: "利用海关和边境安全机构来帮助确保合同劳动力，使我们能够以稳定且更可靠的速度扩展企业和工业。毕竟，他们确实阅读并签署了合同。"
 GRN_idea_agriculture_automations: "农业自动化"
 GRN_idea_agriculture_automations_desc: "我国目前面临的主要问题就是如何维持稳定的劳动力队伍来保证实际就业。因此，我们决定大力投资农业部门，以大幅减少该部门对额外人力资源的需求。"
 GRN_idea_war_production_automations: "军工自动化"
 GRN_idea_war_production_automations_desc: "我国目前面临的主要问题就是如何维持稳定的劳动力队伍来保证实际就业。因此，我们决定大力投资军工生产部门，大幅降低该领域对额外人力资源的需求。这样既能解放劳动力，又能在必要时为军队储备潜在兵源。"
 GRN_idea_industrial_automations: "工业自动化"
 GRN_idea_industrial_automations_desc: "我国目前面临的主要问题就是如何维持稳定的劳动力队伍来保证实际就业。因此，我们决定大力投资制造业部门，大幅减少该部门对额外人力资源的需求。这一不断扩大的部门通常因规模扩张而需要最多工人，因此这项举措实际上将对我们最为有利。"
 GRN_idea_corporate_automations: "企业自动化"
 GRN_idea_corporate_automations_desc: "我国目前面临的主要问题就是如何维持稳定的劳动力队伍来保证实际就业。因此，我们决定大力投资办公服务和技术部门，以大幅减少该领域对额外人力资源的需求。这一通常需要大量人力的部门，由于行业的原始需求，往往需要最多的工人，因此这对我们来说可能最为有益。"
 GRN_idea_strategic_mining_automations: "战略采矿自动化"
 GRN_idea_strategic_mining_automations_desc: "通过重新设计资源开采方式，并尽可能减少矿工下井作业，我们可以在不面临潜在生命损失风险的情况下最大化采矿效率。当然这并非完美方案，但借助这些自动化车辆和特定设备，应当能创造更有利的作业条件。"
 GRN_idea_pro_military_economic_organization: "亲军经济组织"
 GRN_idea_pro_military_economic_organization_desc: "通过将经济重心转向民用和征兵需求，我们将提升军工厂的制造能力，从而减少设施运作所需的总人力。当然，进行如此彻底的改革会削弱基础生产能力，但一旦运作稳定并步入正轨，这些设施应当能以更少的人力实现更高的产量。"
 GRN_idea_frozen_warfare_training: "冰封作战训练"
 GRN_idea_frozen_warfare_training_desc: "我们的训练计划将主要侧重于冬季和寒冷气候下的作战。当然，只要条件和地点允许，我们也会尝试进行其他类型的训练，但我们的家乡寒冷，因此必须进行适当的训练来保卫它。"
 GRN_idea_polar_logistics_doctrine: "极地后勤学说"
 GRN_idea_polar_logistics_doctrine_desc: "从根本上看，让装备更适应极寒环境作战，能让我们在敌军登陆我方岛屿时更自如地展开反击。"
 GRN_idea_artillery_specialist_corps: "炮兵专家部队"
 GRN_idea_artillery_specialist_corps_desc: "炮兵是我们在有利位置时实现以少胜多的关键。为保持这一优势，我们必须发展并壮大炮兵部队，使其达到能将我方伤亡降至最低的标准。"
 GRN_idea_heavy_anti_air_investments: "重型防空投资"
 GRN_idea_heavy_anti_air_investments_desc: "在现代战争中，战场的新主宰是飞机。战斗机、轰炸机，任何你需要的任务，它们都能完成。鉴于我们的军队规模较小，我们必须设法阻止敌人随心所欲地行动。因此，我们将大力投资防空装备的设计与开发，确保我们的地面士兵能获得真正的作战机会。"
 GRN_idea_army_officer_corps: "陆军军官团"
 GRN_idea_army_officer_corps_desc: "建立一支标准化的军官训练团，能够培养、锤炼并提升我们的战术与战略指挥官，不仅增进其自身理解，更能改善其所率领的部队。"
 GRN_idea_small_ship_developments: "小型舰艇发展"
 GRN_idea_small_ship_developments_desc: "早期发展已见成效，我们早期的护卫舰设计表明，虽然可以进行改进和优化，但这一战略优势只有在能够招募到足够人员来操作这些舰船时才有意义。"
 GRN_idea_expanding_small_vessel_designs: "扩展小型舰船设计"
 GRN_idea_expanding_small_vessel_designs_desc: "在确保我们的轻型护卫舰部门同样获得创新支持的前提下，我们将重点发展护卫舰与驱逐舰型号，以全面充实小型舰艇舰队。"
 GRN_idea_attack_submarine_programs: "攻击潜艇项目"
 GRN_idea_attack_submarine_programs_desc: "攻击潜艇计划是一系列旨在验证极限性能与新技术最有效应用方式的开发与测试计划。"
 GRN_idea_missile_submarine_programs: "导弹潜艇项目"
 GRN_idea_missile_submarine_programs_desc: "导弹潜艇项目是一系列旨在证明如何在海军战斗中最高效使用导弹技术的发展与测试项目。"
 GRN_idea_navy_officer_corps: "海军军官团"
 GRN_idea_navy_officer_corps_desc: "建立海军军官训练团将有助于提高我们海军兵种在作战和领导力方面的卓越标准。"
 GRN_idea_aviation_innovations: "航空创新"
 GRN_idea_aviation_innovations_desc: "随着廷米尔航空研究所开始将其创新成果推广到一般设计和生产模型中进行测试和完善，初步成果已开始显现。在我们继续改革和完善空中优势行动计划的过程中，这些成果可能证明具有重要价值。"
 GRN_idea_air_dominance_program: "空中优势计划"
 GRN_idea_air_dominance_program_desc: "空中优势计划专注于特定战斗机，以及如何提升其整体作战能力，以保卫我们的领空免受敌方侵扰。"
 GRN_idea_bombing_innovations: "轰炸创新"
 GRN_idea_bombing_innovations_desc: "空对地与空对舰作战能力的创新，使我们得以将常规轰炸行动进一步专业化，其效率之高前所未有。若要阻止敌军真正踏上我们的岛屿，就必须持续强化这方面的努力。"
 GRN_idea_bomber_design_department: "轰炸机设计部门"
 GRN_idea_bomber_design_department_desc: "致力于提升并增强我们轰炸机机队效能的轰炸机设计部门，是我国航空创新的巅峰之作。"
 GRN_idea_air_officer_corps: "空军军官团"
 GRN_idea_air_officer_corps_desc: "发展空军军官队伍使我们能够提高整体效能，并在领导力和实战战术方面针对空中作战行动进行创新。"
 GRN_idea_general_staff_corps: "总参谋部"
 GRN_idea_general_staff_corps_desc: "随着我军各兵种发展到需要统一参谋指挥部的阶段，我国国防事业已取得并将持续取得重大进展。"
 GRN_idea_agricultural_futurist_policies: "农业未来主义政策"
 GRN_idea_agricultural_futurist_policies_desc: "在更广泛的农业领域优先安排研究工作以及经济投资，使我们能够紧跟创新步伐，并持续满足所需的需求规模——若我们不仅关注国内需求，这一点尤为重要。"
 GRN_idea_polar_infrastructure_developments: "极地基础设施建设"
 GRN_idea_polar_infrastructure_developments_desc: "我们在基础设施建设上的持续投入，以及探索如何让这些投入更具持久性的方法，使我们在许多人都未曾想到的领域实现了创新。"
 GRN_idea_economic_modernity_policies: "经济现代化政策"
 GRN_idea_economic_modernity_policies_desc: "我们的国家正处于发展的最前沿。我们将坚定不移地继续这场为国家与公民谋求繁荣的伟大征程。"
 GRN_ideas_mining_needs: "需求导向采矿"
 GRN_ideas_mining_needs_desc: "我们决定将采矿业的重点放在满足国内需求上，而不是超出这一范围。这使我们能够在战略上谈判出口价格，同时减少该行业对人力资源的需求。"
 GRN_ideas_mining_greeds: "利润导向采矿"
 GRN_ideas_mining_greeds_desc: "我们决定将采矿业的重点放在满足国内和国际需求上，而非仅仅着眼于当下所需。因此，我们得以充分展示资源储备，并在出口领域谈成了一些实打实的交易。尽管工人需求增长这一小问题似乎已渗透到经济领域，但整体收益似乎足以证明手段的正当性。"
 GRN_ideas_intense_foreign_affairs_budgeting: "紧张的外交预算"
 GRN_ideas_intense_foreign_affairs_budgeting_desc: "若要在外交事务上切实取得进展，我们必须认真投入这些努力。以我们目前的实力而言，由于人口问题与经济规模失衡，我们缺乏内部稳定。若策略不当，我们本质上就是个外强中干的空壳。"
 GRN_ideas_political_shenanigans: "政治诡戏"
 GRN_ideas_political_shenanigans_desc: "近期，国内一些不满情绪的活动逐渐浮出水面。鉴于我国当前的良好状态，这些活动似乎不过是些小麻烦，但若想恢复更稳定的局势，我们仍需查明这些捣乱的源头。"
 GRN_ideas_domesticating_foreign_policy: "外交政策内化"
 GRN_ideas_domesticating_foreign_policy_desc: "确保我们的对外野心，意味着我们需要稳定国内局势，同时也要保障施加对外影响力的手段。"
 GRN_ideas_the_frozen_federation: "冰封联邦"
 GRN_ideas_the_frozen_federation_desc: "我们已经尽最大努力统一了欧陆。但现在的问题是，我们也把所有问题都集中到了一面旗帜下。虽然这并非世界末日，但在可预见的未来，日子肯定会不太好过。"
 GRN_domestic_and_civil_affairs_administration: "内政与民事管理局"
 GRN_domestic_and_civil_affairs_administration_desc: "格陵兰面临诸多问题，其核心根源在于人口稀少。内政与民政管理部门负责关照格陵兰公民福祉，并随时间推移对政策进行改革、增补或废止，以确保为该岛居民争取最佳且最公平的结果。"
 GRN_federal_budgets: "国家支出"
 GRN_federal_budgets_desc: "岛上人口不多，但维护和发展所需投入依然不菲。若想实现财政稳定，我们得研究更优的开发方式或做好整体预算规划。"
 GRN_revenue_collection_administration: "税务局"
 GRN_revenue_collection_administration_desc: "税务局被指定为国家政府的税收征收与执行机构。它必须与政府政策制定者合作，确保税收征收公平、高效，并得到妥善执行，以维持国家预算平衡。"
 GRN_economic_development_board: "经济发展委员会"
 GRN_economic_development_board_desc: "经济发展委员会是经济政策制定与国家整体增长发展的核心支柱。该政府部门负责制定政策与计划，致力于发展国民经济，并在一切可行之处提升公民生活质量。尽管后勤保障是其中最大的障碍，但另一重挑战则在于人力资源、资本投入以及坚定不移的执行意志。"
 GRN_national_armed_services_of_greenland: "格陵兰国家武装部队"
 GRN_national_armed_services_of_greenland_desc: "格陵兰武装部队是一个有趣的组织，因为该岛人口非常少，其能发挥的作用十分有限。尽管如此，该岛确实拥有一定形式的军事力量，理论上也有能力进行扩张。现在，只需等待未来事态的发展，才能揭示这一扩张将如何实现。"
 GRN_idea_the_great_ice_shelf: "大冰架"
 GRN_idea_the_great_ice_shelf_desc: "格陵兰冰盖是世界上覆盖大片陆地的最大的冰体之一。冰盖厚度可达两英里，是任何在沿海地区以外进行认真开发的最大障碍。"
