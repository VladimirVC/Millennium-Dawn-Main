l_braz_por:
 brics_join.1.t: "[FROM.GetNameDef] busca a adesão ao BRICS"
 brics_join.1.d: "[FROM.GetNameDef] solicitou formalmente a adesão ao BRICS. Como líder do bloco, a decisão de admiti-los cabe a nós."
 brics_join.1.a: "Eles fortalecem o bloco. Vamos admiti-los."
 brics_join.1.b: "A adesão deles não nos serve. Rejeitar a candidatura."
 brics_join.2.t: "Nossa candidatura foi aceita"
 brics_join.2.d: "O BRICS aprovou a nossa candidatura. Assumimos nosso assento entre as nações do bloco."
 brics_join.2.a: "Assumir nosso lugar no BRICS"
 brics_join.3.t: "Nossa candidatura ao BRICS foi rejeitada"
 brics_join.3.d: "A liderança do BRICS declinou a nossa candidatura. A porta não está fechada para sempre, e poderemos defender o nosso caso novamente no futuro."
 brics_join.3.a: "Solicitaremos a adesão novamente no futuro"
 brics_join.3.b: "Abandonar o esforço"
 brics_join.4.t: "[ROOT.GetNameDef] Juntou-se aos BRICS"
 brics_join.4.d: "[ROOT.GetNameDef] foi admitido(a) ao BRICS, expandindo o alcance e a influência do bloco na ordem internacional."
 brics_join.4.a: "A shifting balance"
 brics_join.5.t: "Time to Approach BRICS Again"
 brics_join.5.d: "Enough time has passed since our last rejection. We may submit a fresh application to the BRICS leadership."
 brics_join.5.a: "Resubmit our application"
 brics_join.5.b: "Not yet"
 brics_join.6.t: "[FROM.GetNameDef] Invites Us to Found BRICS"
 brics_join.6.d: "[FROM.GetNameDef] is bringing BRICS into being and has asked us to stand among its founding members, shaping the bloc from the outset."
 brics_join.6.a: "We will help found BRICS"
 brics_join.6.b: "We will keep our distance"