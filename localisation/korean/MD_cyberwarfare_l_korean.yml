 cyber_sigint_surveillance_tracking: "신호 정보(SIGINT) 감시 활성화됨"
 cyber_sigint_surveillance_tracking_desc: "우리의 신호 정보팀이 대상의 통신 및 네트워크 트래픽을 모니터링하여 일반적인 수동적 수집 속도를 훨씬 능가하는 속도로 정보를 축적하고 있습니다. 이 작전은 약 180일 동안 지속됩니다."
 cyber_radar_spoofing_tracking: "레이더 기만 활성화됨"
 cyber_radar_spoofing_tracking_desc: "조직적인 전자전 페이로드가 대상의 방공 탐지 네트워크에 거짓 반환값을 주입하여 그들의 상황 인식을 저하시키고 있습니다. 이 작전은 30일 이내에 종료됩니다."
 cyber_election_interference_tracking: "선거 개입 활성화됨"
 cyber_election_interference_tracking_desc: "우리의 요원들이 대상의 정치적 정보 공간을 겨냥한 조직적 영향력 캠페인을 실행하고 있으며, 정부에 대한 대중의 신뢰를 무너뜨리기 위해 허위 정보를 퍼뜨리고 야당 네트워크에 자금을 지원하고 있습니다. 이 작전은 약 180일 동안 지속됩니다."
 cyber_industrial_espionage_tracking: "산업 첩보공작 활성화됨"
 cyber_industrial_espionage_tracking_desc: "우리의 팀이 대상의 연구 네트워크에 대한 접근 권한을 확립하여 기밀 기술 및 산업 데이터를 추출하고 있습니다. 분석가들이 탈취한 자료를 처리 중입니다."
 cyber_comms_intercept_tracking: "통신 감청 활성화됨"
 cyber_comms_intercept_tracking_desc: "우리의 신호팀이 대상의 정부 및 외교 통신 채널에 침투했습니다. 그들의 트래픽을 모니터링하여 실시간으로 실행 가능한 정보를 추출하고 있습니다."
 cyber_financial_system_attack_tracking: "금융 시스템 공격 활성화됨"
 cyber_financial_system_attack_tracking_desc: "우리의 요원들이 대상의 중앙은행 및 결제 처리 인프라를 표적으로 파괴적인 페이로드를 전개하여 그들의 상거래 수행 능력과 국가 운영 자금 조달 능력을 옥죄고 있습니다. 이 작전은 약 150일 동안 지속됩니다."
 cyber_logistics_disruption_tracking: "병참 교란 활성화됨"
 cyber_logistics_disruption_tracking_desc: "우리는 대상의 군사 지휘 통제 및 공급망 관리 소프트웨어를 능동적으로 저하시켜 그들의 재보급 및 병력 증원 주기를 방해하고 있습니다. 이 작전은 90일 이내에 종료됩니다."
 cyber_sleeper_network_tracking: "잠복형 악성 네트워크 활성화됨"
 cyber_sleeper_network_tracking_desc: "우리는 대상의 중요 네트워크 내에 사전 배치된 지속적인 접근 권한을 확립했습니다. 이 거점은 발각되지 않는 한 최대 1년 까지 향후 작전을 더 빠르고 저렴하게 수행할 수 있게 해줍니다."
 cyber_deception_campaign_tracking: "전략적 기만 작전 활성화됨"
 cyber_deception_campaign_tracking_desc: "조작된 통신, 위조된 정보 유출, 은밀한 영향력 작전 등 동시다발적인 다중 기만 작전이 대상의 최고위층 의사결정을 조작하기 위해 전개되고 있습니다. 이 캠페인은 약 180일 동안 지속됩니다."
 cyber_zero_day_strike_tracking: "제로데이 공격 — 여파"
 cyber_zero_day_strike_tracking_desc: "우리의 제로데이 공격이 대상의 가장 중요한 시스템에 대한 파괴적인 정밀 타격에 배치되었습니다. 작전은 완료되었으며, 초기 혼란이 가라앉으면 이 항목은 만료됩니다."
 cyber_op_slot_0_network_hardening_tracking: "네트워크 강화 진행 중"
 cyber_op_slot_0_network_hardening_tracking_desc: "우리의 사이버 보안팀이 중요 네트워크 인프라에 대한 포괄적인 강화 작업을 수행하고 있습니다. 인증 시스템을 강화하고, 취약점을 패치하며, 민감한 접근 방식을 격리하고 있습니다. 작업은 약 120일 후에 완료됩니다."
