 BLT_buy_core_state_desc: "Offer the current holder of a selected §Ycore state§! §H£treasury 100 billion§! in exchange for the territory.\n\nThe state must be a §Ycore§! of our nation but owned by another country we are not at war with. If the holder agrees, the state is transferred to us; if they refuse, the funds are returned."
