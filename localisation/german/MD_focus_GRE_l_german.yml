 GRE_communist_takeover_TT: "§GDas griechische Volk fordert Wahlen!§!\n\nStellen Sie sicher, dass Sie genügend politische Macht angespart haben. Wenn Sie §Rversagen§! bei der Wahl und der Bildung einer Regierung, müssen Sie §Rnoch eine außerordentliche Wahl abhalten§!, um §Y[Communist-State_L]§! zu ermächtigen."
 GRE_fascist_takeover_TT: "§GDas griechische Volk fordert Wahlen!§!\n\nStellen Sie sicher, dass Sie genügend politische Macht angespart haben. Wenn Sie §Rversagen§! bei der Wahl und der Bildung einer Regierung, müssen Sie §Rnoch eine außerordentliche Wahl abhalten§!, um §Y[Nat_Fascism_L]§! zu ermächtigen."
 GRE_civil_units_TT: "§RHinsichtlich wird vorgeschlagen, unsere Armee an die Staatsgrenzen Zentralgriechenlands zu verlegen, wo wir versuchen können, die Rebellen aufzuhalten.§!"
