 indonesia.76854.t: "L'Indonésie demande l'annexion"
 indonesia.76854.d: "Après nous avoir aidés après le tremblement de terre, le gouvernement indonésien nous demande de nous joindre à eux. Si nous les rejoignons, nous perdrons tout ce pour quoi nous nous sommes battus, mais tout cela au nom de la paix. Si nous ne les rejoignons pas, nous verrons le conflit reprendre de plus belle..."
 indonesia.76854.a: "Faisons-le"
 indonesia.76854.b: "Non"
 IND_disasters_mechanic: "La terrible malchance de l'Indonésie"
 IND_disasters_mechanic_desc: "Indonesia is very lucky to have an abundance of natural resources, manpower and will-power to charge through the 21st century.\nHowever, §HIndonesia faces many challenges§! that §Rhinder its progress§!. Accidents are a §Rcommon theme§!, which would easily be prevented if it were not for better care for a particular region.\n\nFor this reason, it is our duty and responsibility to pay more attention to our states in a timely manner in order to avoid a disastrous fate that would cause us serious harm.\n\nWe will continue to have disasters for a considerable amount of time, however if we tackle them quickly they eventually stop after some time!"
 IND_back_muslim: "Soutenir les musulmans"
 IND_back_muslim_desc: "Nous sommes une nation islamique ! Nous devons donc protéger nos musulmans, quel qu'en soit le prix. En agissant ainsi, nous gagnerons le soutien populaire et éradiquerons toute haine à notre égard dans la majorité islamique de Sulawesi.\n\n\n\nLes négociations sont inestimables et doivent commencer immédiatement !"
 IND_muslim: "Négocier les conditions avec les musulmans de Sulawesi"
 IND_muslim2: "Donnez-leur une formation adéquate au combat"
 IND_muslim3: "Configurer les administrateurs locaux"
 IND_muslim4: "Conclure les négociations"
 IND_muslim_generic: "Transférer des miliciens à Sulawesi"
 IND_muslim_generic2: "Délocaliser les projets de construction chrétiens"
 IND_muslim_generic3: "Fortifier les mosquées"
 IND_back_papua: "Soutenir les chrétiens"
 IND_back_papua_desc: "Our Christians have been neglected for too long. It is our duty as a state to give representation and fair treatment to all of our Christians, regardless if they're a minority or not. They must be protected at all times!\n\n\n\nNegotiating is invaluable and must begin immediately!"
 IND_papua: "Négocier les conditions avec les chrétiens"
 IND_papua2: "Donnez-leur une plus grande représentation"
 IND_papua3: "Éduquez-les sur la guérilla"
 IND_papua4: "Promettez-leur de meilleurs soins"
