 ISR.conservatism: "£ISR_conservatism リクード"
 ISR.conservatism_desc: "国民保守主義 - §2リクード§!（ヘブライ語ローマ字表記：Likud、団結）\n\nリクードは1973年、メナヘム・ベギンとアリエル・シャロンによって、複数の右派政党との連合により設立された。1977年の選挙におけるリクードの圧勝は、同国政治史における重大な転換点となり、左派が初めて政権を失ったことを示した。さらに、イスラエルにおいて右派政党が得票率で過半数を獲得した初めての事例でもあった。"
 ISR.conservatism_icon: "£ISR_conservatism"
 ISR.liberalism: "£ISR_liberalism_alt メルカズ"
 ISR.liberalism_desc: "保守的中央主義 - §2中道党§!（ヘブライ語ローマ字表記：Merkazi）\n\nメルカズはイスラエルの政党である。1999年に元国防相イッツハク・モルデハイによって結成され、右派のベンヤミン・ネタニヤフと左派の野党指導者エフード・バラクの労働党に対抗する穏健派グループを形成することを目的とした。"
 ISR.liberalism_icon: "£ISR_liberalism_alt"
 ISR.socialism: "£ISR_socialism 労働党"
 ISR.socialism_desc: "社会民主主義 - §t労働党§!（ヘブライ語ローマ字表記：HaAvoda）\n\nイスラエル労働党は、イスラエルの社会民主主義政党である。同党は1968年、マパイ、アハドゥト・ハアヴォダ、ラフィの合併により設立された。労働シオニズムの伝統を継承し、福祉国家と労働組合との連携を支持する政党として、労働党はイスラエル・パレスチナ和平プロセスへの支持、現実的な外交政策、社会民主主義的経済政策を推進してきた。"
 ISR.socialism_icon: "£ISR_socialism"
 ISR.Western_Autocracy: "£ISR_Western_Autocracy ユダヤ人の家"
 ISR.Western_Autocracy_desc: "宗教的シオニズム - §1ユダヤ人の家§!（ヘブライ語ローマ字表記：HaBayit HaYehudi）\n\nユダヤ人の家は、イスラエルの正統派ユダヤ教、宗教的シオニズム、極右の政党である。元々は国民宗教党、モレデト、トクマの合併によって結成された。同党はイスラエルのユダヤ的アイデンティティの強化を支持し、いかなる領土的譲歩にも反対している。同党は伝統的な家族価値観を擁護し、同性婚の合法化に反対している。また、トーラー研究と宗教教育への資金増額を支持している。"
 ISR.Western_Autocracy_icon: "£ISR_Western_Autocracy"
 ISR.Communist-State: "£ISR_Communist_State ハダシュ"
 ISR.Communist-State_desc: "共産主義 - §1平和平等民主戦線§!（ヘブライ語ローマ字表記：HaHazit HaDemokratit LeShalom VeLeShivion）\n\nハダシュは、イスラエル共産党とその他の左派団体によって結成された、イスラエルの左翼から極左の政治連合である。ユダヤ人とアラブ人の協力を重視し、その指導者たちは二国家解決案を支持した最初の人物たちの一人であった。支持層は主に中産階級で世俗的なアラブ人であり、北部やキリスト教コミュニティ出身者が多い。ハダシュは非シオニスト政党と自認しており、これはもともとマルクス主義的民族主義反対の立場に基づく。パレスチナ系アラブ人をイスラエル国内の少数民族として認めることを要求している。"
 ISR.Communist-State_icon: "£ISR_Communist_State"
 ISR.Conservative: "£ISR_Nat_Populism シャス"
 ISR.Conservative_desc: "宗教的社会シオニズム - §Oトーラーの守護者§!（ヘブライ語ローマ字表記：Shom'rei Torah）\n\nシャス（Shas）はイスラエルのハレディ派宗教政党である。1984年にラビ・オヴァディア・ヨセフの指導のもと設立された。主にセファルディ系およびミズラヒ系ハレディ派ユダヤ人の利益を代表する。党の公的な目的は「王冠をかつての栄光に返す」こと、すなわちセファルディ系ユダヤ教徒の宗教的・文化的遺産を守り、イスラエル国内のセファルディ系住民に対する継続的な経済的・社会的差別を是正することにある。"
 ISR.Conservative_icon: "£ISR_Nat_Populism"
 ISR.Autocracy: "£ISR_Autocracy タール"
 ISR.Autocracy_desc: "アラブ民族主義 - §Hアラブ復興運動§!（ヘブライ語ローマ字表記：Ta'al）\n\nタールはアフマド・ティビが率いるイスラエルのアラブ民族主義政党である。同党はアラブ民族主義と位置付けられるが、バラド党に比べより穏健とされる。タールは、1967年以前のグリーンラインへのイスラエル撤退と、ヨルダン川西岸地区およびガザ地区にパレスチナ国家をイスラエルと並存させる二国家解決案を支持している。"
 ISR.Autocracy_icon: "£ISR_Autocracy"
 ISR.anarchist_communism: "£ISR_anarchist_communism バラド"
 ISR.anarchist_communism_desc: "左派アラブ民族主義 - §H国民民主集団§!（ヘブライ語ローマ字表記：Balad）\n\nバラドは、サミ・アブ・シェハデが率いるイスラエルの左派から極左のパレスチナ民族主義政党である。バラドは、イスラエルのアラブ市民を代表する民主主義政党として、パレスチナ・アラブ民族主義政党と自らを定義している。同党はイスラエルをユダヤ人国家とする考えに反対し、新たな民主的で世俗的な国家の創設を支持している。"
 ISR.anarchist_communism_icon: "£ISR_anarchist_communism"
 ISR.Neutral_conservatism: "£ISR_non_aligned_conservative イスラエル・バアリヤー"
 ISR.Neutral_conservatism_desc: "自由保守主義 - §O上昇するイスラエル§!（ヘブライ語ローマ字表記：Yisrael BaAliyah）\n\nイスラエル・バアリヤーはイスラエルの政党である。旧ソ連からの移民（レフューズニク）であったナタン・シャランスキーとユリ・ヨエル・エデルシュタインによって、ロシア系移民の利益を代表する目的で結成された。当初は中道政党であったが、次第に右傾化していった。"
 ISR.Neutral_conservatism_icon: "£ISR_non_aligned_conservative"
 ISR.oligarchism: "£ISR_oligarchism イスラエル我が家"
 ISR.oligarchism_desc: "国家自由保守主義 - §Oイスラエル我が家§!（ヘブライ語ローマ字表記：Israel Beitenu）\n\nイスラエル我が家はイスラエルの保守政党である。党の基盤は世俗的なロシア語圏移民である。党は自らを修正シオニズムの創始者ゼヴ・ジャボティンスキーの大胆な道を歩む明確なビジョンを持つ国民運動と位置付けている。主に旧ソ連からの移民を代表してきたが、より広範なユダヤ系イスラエル人層への支持拡大も図っている。"
 ISR.oligarchism_icon: "£ISR_oligarchism"
 ISR.neutral_Social: "£ISR_neutral_Social メレツ"
 ISR.neutral_Social_desc: "社会進歩主義 - §7メレツ§!（ヘブライ語ローマ字表記：Meretz、活力）\n\nメレツはイスラエルの政党である。同党は1992年、ラツ、マパム、シヌイの合併により結成された。メレツは政治スペクトル上、左派に位置づけられる。社会民主主義的かつ左派シオニスト政党であり、環境保護政策、進歩的・平等主義的政策、世俗主義を支持する。また二国家解決案を支持している。"
 ISR.neutral_Social_icon: "£ISR_neutral_Social"
 ISR.Neutral_Libertarian: "£ISR_Neutral_Libertarian ゼフート"
 ISR.Neutral_Libertarian_desc: "リバタリアニズム - §Cゼフート§!（ヘブライ語ローマ字表記：Zehut、アイデンティティ）\n\nゼフートは、モシェ・フェイグリンによって設立されたイスラエルの右派リバタリアンかつナショナリスト政党である。その政策綱領は、経済的自由を含む個人の自由の促進と、ヨルダン川西岸地区の併合を中心に据えていた。同党はまた、大麻の合法化を提唱していた。"
 ISR.Neutral_Libertarian_icon: "£ISR_Neutral_Libertarian"
 ISR.Neutral_Autocracy: "£ISR_Neutral_Autocracy ユダヤ・トーラ連合"
 ISR.Neutral_Autocracy_desc: "正統派非シオニズム - §2ユダヤ・トーラ連合§!（ヘブライ語ローマ字表記：Yahadut HaTora）\n\n選挙シンボル「ギメル」で知られるユダヤ・トーラ連合は、イスラエルにおけるハレディ派の宗教保守政治連合である。アグダット・イスラエルとデゲル・ハトーラーで構成されるこの連合は、1992年にアシュケナージ系ハレディ派のクネセトにおける代表権を最大化するために結成された。シャス、マフダル、ノアムといった類似の宗教政党とは異なり、UTJは非シオニストである。他のハレディ派とは異なり、同党は技術や電子通信の利用で注目されている。"
 ISR.Neutral_Autocracy_icon: "£ISR_Neutral_Autocracy"
 ISR.Neutral_Communism: "£ISR_Neutral_Communism ダアム労働者党"
 ISR.Neutral_Communism_desc: "革命的共産主義 - §Rダアム労働者党§!（ヘブライ語ローマ字表記：Da'am Mifleget Po'alim）\n\nダアムはイスラエルにおける革命的社会主義的多民族政党であり、一般に略称「ダアム」で知られる。労働者の権利保障、主要産業の国有化、ユダヤ人とアラブ人の共存、男女平等を実現するための政治的・社会的革命を訴えている。"
 ISR.Neutral_Communism_icon: "£ISR_Neutral_Communism"
 ISR.Neutral_Muslim_Brotherhood: "£ISR_Neutral_Muslim_Brotherhood 統一アラブリスト"
 ISR.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - §6統一アラブリスト§!（ヘブライ語ローマ字表記：HaReshima HaAravit HaMe'uhede）\n\nラアムはイスラエルのイスラム主義・保守政党であり、イスラム運動南部支部の政治部門である。アッバースの指導のもと、同党はアラブ系イスラエル人の生活水準向上、特に犯罪対策・雇用機会・住宅・インフラ整備を目的に、イスラエル国内政治への本格的な関与を提唱している。これは歴史的に野党勢力の一部を形成し、より広範なイスラエル・パレスチナ紛争に焦点を当ててきた他のアラブ系政党とは一線を画す姿勢である。"
 ISR.Neutral_Muslim_Brotherhood_icon: "£ISR_Neutral_Muslim_Brotherhood"
 ISR.Neutral_green: "£ISR_Neutral_Green 緑の運動"
 ISR.Neutral_green_desc: "環境保護主義 - §7緑の運動§!（ヘブライ語ローマ字表記：HaYerukim）\n\n緑の運動は、環境保護と生活の質を重視するイスラエルの少数政党である。ペエル・ヴィスナーによって設立され、かつては彼が党首を務めた。同党はクネセト（国会）に議席を獲得したことはないが、イスラエル各地の多くの自治体で議席を保持している。"
 ISR.Neutral_green_icon: "£ISR_Neutral_Green"
 ISR.Nat_Autocracy: "£ISR_Nat_Autocracy イスラエル国防軍"
 ISR.Nat_Autocracy_desc: "軍事政権 - §Lイスラエル国防軍§!（ヘブライ語ローマ字表記：Tzahal）\n\nツァハルはイスラエル国家の軍隊である。陸軍、空軍、海軍の三軍で構成される。イスラエル治安機関の唯一の軍事部門である。IDFは国防大臣の指揮下にある参謀総長が統率する。"
 ISR.Nat_Autocracy_icon: "£ISR_Nat_Autocracy"
 ISR.Nat_Fascism: "£ISR_Nat_Fascism ユダヤの力"
 ISR.Nat_Fascism_desc: "カハニズム - §8ユダヤの力§!（ヘブライ語ローマ字表記：Otzma Yehudit）\n\nユダヤの力は、イスラエルの極右・超国家主義・カハニスト・反アラブ政党である。非合法化されたカハ党の思想的継承者である。国際的な報道機関では、ユダヤ人至上主義を支持する過激な超国家主義組織として広く描写されている。"
 ISR.Nat_Fascism_icon: "£ISR_Nat_Fascism"
 ISR.Nat_Populism: "£ISR_liberalism トゥクマ"
 ISR.Nat_Populism_desc: "宗教的ナショナリズム - §9トゥクマ§!（ヘブライ語ローマ字表記：Tkuma、復活）\n\nトゥクマは、イスラエルにおける極右・超国家主義・ユダヤ人至上主義・宗教的シオニズムを掲げる政党である。1998年の結成以降、全ての選挙において他派閥と連合し、統一候補リストの一部として選挙戦を戦ってきた。"
 ISR.Nat_Populism_icon: "£ISR_liberalism"
 ITA.conservatism: "£ITA_western_conservative フォルツァ・イタリア"
 ITA.conservatism_desc: "フォルツァ・イタリアは、1994年に右派保守政党としてマルチェッロ・デル・ウトリによって設立された。「清潔な手」と呼ばれる大規模な汚職スキャンダルの調査により壊滅状態となった「キリスト教民主党」の残骸から生まれた政党である。党にとって最も重要な出来事は、不動産資産やメディアネットワークで知られるシルヴィオ・ベルルスコーニの「政界進出」である。ベルルスコーニは圧倒的に党の象徴的存在となり、その結果、党の選挙結果は彼のカリスマ性と司法問題に直接結びつくようになった。党の掲げる目標は、一般市民と企業の双方に対する減税を実現し、市民に安定と法の支配を保証することである。"
 ITA.conservatism_icon: "£ITA_western_conservative"
 ITA.liberalism: "£ITA_western_liberal 自由主義者連盟"
 ITA.liberalism_desc: "自由主義者連盟は、イタリア政治の中道を占めるさまざまな社会自由主義政党を再統合した政党である。その理念は、1919年にジョヴァンニ・ジョリッティによって設立されたイタリア自由党の理想にゆるやかに触発されている。ヨーロッパの大半では体制派と見なされる社会自由主義だが、ルイージ・エイナウディの死後数十年にわたり、イタリアでは選挙での成功が非常に限られている。これは、非常にイデオロギー的に柔軟な伝統的政党や、他の先進国に比べて一般的に資本主義に警戒心を抱く国民性に直面しているためである。自由市場を強く信じる一方で、福祉と社会的権利の擁護も主張している。"
 ITA.liberalism_icon: "£ITA_western_liberal"
 ITA.socialism: "£ITA_western_social_democrat オリーブの木"
 ITA.socialism_desc: "オリーブの木は、「ラ・マルゲリータ」や「左翼民主党」など、無数の左派政党が統合して誕生した。この政党は、全ての左派イタリア政党を一つの連合にまとめ、さまざまなイデオロギーの解釈が内部の民主的な仕組みで競い合うことを目指して結成された。このアプローチは選挙上の選択肢としては良い結果を生み、民主党（PD）がイタリア最大の政党になるという成果を上げたものの、党内が非常に分裂しやすく、分裂への恐怖から身動きが取れなくなる状況を頻繁に招いている。一般的には、大規模な福祉国家の必要性、経済への穏健な政府介入の必要性、そして社会的権利の重要性を信じている。"
 ITA.Communist-State: "£ITA_emerging_communism イタリア共産党"
 ITA.Communist-State_desc: "かつての「イタリア共産党（PCI）」は、1991年にソビエト連邦が崩壊した際に解散した。その後、多くの小規模な団体がその遺産を引き継ごうと試みたが、西側最大の共産党であったPCIを再現することには大きく失敗した。PCIはソビエトのレーニン主義とスターリン主義の思想を支持し、ソビエト共産主義の古典的なビジョンを掲げている。土地と生産手段の再分配は彼らの主要な目標の一つであり、その目標を達成するためにはあらゆる手段が排除されない。プロレタリア革命がついに到来した際には、その安全を確保するために独裁的な移行期が必要となるかもしれない。かつてベルルスコーニが言ったように、「彼らは、そしてこれからもずっと、貧しい共産主義者であることは明らかだ。」"
 ITA.anarchist_communism: "£ITA_left_wing_radical 五つ星運動"
 ITA.anarchist_communism_desc: "五つ星運動（5-Star Movement）は、コメディアンのベッペ・グリッロが数年にわたるミートアップを経て2009年に設立した政党だ。その「星」は、水、環境、輸送、接続性、発展という運動の基本的な戦いを象徴している。この運動は、設立時から現在までウェブプラットフォームを基盤としており、組織全体がそこに依存している。候補者資格を得るには完全に犯罪歴のないことが条件だが、それ以外の要件は特にない。選出されたメンバーは陰謀論や偽ニュース、科学的根拠のない主張を支持することが多々ある。党のインフラを所有する民間グループにより強く管理されている一方で、直接民主主義を強く信じている。この運動は幅広いイデオロギーを受け入れており、多くのポピュリスト政党と同様、さまざまな問題について立場を急速に変えることで知られている。その本質は左派的なイデオロギーに根ざしており、ベネズエラ、キューバ、中国の例に影響を受けている。エリートへの対抗と資本主義の拒絶に強く傾倒している。"
 ITA.Conservative: "£ITA_Lega_Salvini 北部同盟（サルヴィーニ派）"
 ITA.Conservative_desc: "北部同盟はイタリア北部の独立運動として誕生したが、党が主な焦点を南部問題や国内移民から外国からの移民問題に移したことで大きな成功を収めた。反移民感情を操作することで、かつてない支持を得ることに成功し、ロシアやアメリカの極右からの支援も相まって、地域政党から全国政党へと成長を遂げた。多くのポピュリスト政党と同様に、多くの問題について立場を急速に変えることで知られているが、その本質は伝統的なキリスト教の価値観を再確認する必要性を強く信じる反動的な政党である。経済的には政府の介入を支持する傾向が強いが、同時に減税を計画していると主張している。"
 ITA.Neutral_conservatism: "£ITA_non_aligned_conservative 北部同盟（ボッシ派）"
 ITA.Neutral_conservatism_desc: "北部同盟は、ロンバルディアやヴェネツィアの独立運動や政党が統合して誕生し、その後、南イタリアの足かせと北部の潜在能力を阻む国家官僚制にうんざりした北イタリアの広範な地域へと広がった。この政党は主に国内移民、地方分権化、減税および官僚制の削減に関心を持っている。"
 ITA.neutral_Social: "£ITA_non_aligned_social 自由と平等"
 ITA.neutral_Social_desc: "自由と平等は、2007年に元反マフィア判事のピエトロ・グラッソが民主党から分裂して設立した左派政党である。この党は民主党内の最も左派寄りの勢力を代表していた。社会主義的で進歩的な政党であり、社会的権利、女性の権利、移民の権利を重視し、政府の介入を通じて不平等と闘うことに注力している。"
 ITA.Neutral_Libertarian: "£ITA_non_aligned_libertarian 急進党"
 ITA.Neutral_Libertarian_desc: "名前からは伝統的な政党のように思われるかもしれないが、急進党は選挙には参加せず、他の手段を通じて問題解決を目指す運動に注力している。ただし、特定の選挙に向けて、この党の環境から生まれた専用の選挙リストがいくつも存在している。急進党は経済的自由、平和主義、進歩的な理念を支持し、主に禁酒法、政府の介入に反対し、中絶や離婚といった社会的権利のために闘っている。"
 ITA.Neutral_Communism: "£ITA_neutral_communism 共産主義再建党"
 ITA.Neutral_Communism_desc: "共産主義再建党は、1991年のイタリア共産党の崩壊後に誕生した多くの政党の一つである。新イタリア共産党とは異なり、反スターリン主義、反ファシズム、平和主義を公然と掲げている。この党は、共産主義革命の目標は平和的かつ民主的な手段によって達成できるし、達成すべきであると信じている。"
 ITA.Neutral_green: "£ITA_non_aligned_greens イタリア緑の党"
 ITA.Neutral_green_desc: "緑の連盟は、環境保護、社会民主主義、平和主義を掲げる政党であり、1986年にチェルノブイリ原発事故を契機に設立された。環境を守るという高尚な目的で誕生したが、多くの世界の緑の党と同様に、原子力エネルギーや廃棄物焼却施設への反対といった、科学的根拠に反し環境に有害な闘争を抱えるようになり、「NIMBY」行動を直接助長している。環境を守る唯一の鍵は「終わりなき成長」のパラダイムを逆転させることだと信じており、明確な反資本主義・反グローバリズムの立場を取っている。"
