 uniate_church: "团结教会"
 uniate_church_desc: "联合教会是东正教和天主教传统的结合体，承认罗马教廷的首要地位，同时保留东正教的礼仪。早期的联合教会于1439年的佛罗伦萨大公会议上达成，但很快便解散了。从15世纪末开始，波兰封建领主们重拾这一想法，因为波兰和立陶宛的大部分人口仍然信奉东正教，而教会联合为逐步将乌克兰人和白俄罗斯人引入天主教提供了一种途径。一些东正教神职人员和贵族在16世纪支持联合教会，寻求获得与天主教徒同等的权利。1595年，弗拉基米尔-沃伦主教希帕提乌斯·波泰和卢茨克主教基里尔·捷列茨基向教皇呼吁联合。1596年，在布列斯特大公会议上，尽管遭到大多数神职人员和民众的反对，六位主教仍然宣布了布列斯特联合教会的成立。国王认可了这一联合，并宣布东正教为非法教会，将其财产移交给联合教会。17世纪，巴西利安修会成立，与耶稣会共同推进联合。随着时间的推移，联合教会的仪式越来越接近天主教；圣袍、教堂设计和礼仪实践都发生了变化，东正教的节日也被废除。这些变化在1720年的扎莫希奇宗教会议上被正式确立。在喀尔巴阡山脉地区，联合于1649年在乌日霍罗德大教堂宣布，并在18世纪末期完全确立。在16和17世纪，乌克兰和白俄罗斯为了宗教和民族自由而进行的反对联合的运动，主要由东正教兄弟会领导。"
 BLR_church_reforms: "教会改革"
 BLR_church_reforms_desc: "我们的国家应该放弃由莫斯科资助的东正教。现在是时候在我们的土地上复兴统一教了。"
 BLR_separate_rel: "宗教与国家分离"
 BLR_state_rel: "国家与宗教的统一"
 BLR_church_separate: "政教分离"
 BLR_church_separate_desc: "宗教不应干预国家事务，而应只作为社会的支撑。"
 BLR_church_state: "国教"
 BLR_church_state_desc: "宗教必须积极指导国家事务，否则我们将注定走向精神衰败。"
 BLR_riot_finance: "防暴警察花销"
 BLR_riot_finance_desc: "我们的防暴警察部队应该配备最好的装备。在这方面，我们不应该吝惜资金。"
 BLR_Increase_funding_Police: "增加警察资金"
 BLR_Increase_funding_Police_desc: "最近发生的事件表明，有必要增加对内务部及其各部门的经费。"
 BLR_new_equipment_omon: "阿尔法特种部队"
 BLR_new_equipment_omon_desc: "白俄罗斯共和国国家安全委员会下属的“A组”（简称“阿尔法组”）是白俄罗斯国家安全委员会（克格勃）的反恐部队，也是该国执法机构中最神秘的特种部队之一。阿尔法组的队员参与克格勃各单位开展的行动和战斗活动，包括抓捕间谍、劫持人质、贩毒、走私、非法贩运武器和放射性物质、敲诈勒索以及非法移民等犯罪嫌疑人。"
 BLR_Increase_funding_Almaz: "阿尔玛兹特种部队"
 BLR_Increase_funding_Almaz_desc: "“金刚石”反恐特遣队是白俄罗斯内务部下属的一支反恐特遣队，负责执行一系列预防和应对恐怖主义行为的任​​务。该特遣队直接向白俄罗斯共和国内务部长汇报工作。据媒体报道，该特遣队还参与镇压政治反对派和驱散大规模抗议活动。"
 BLR_military_police_training: "宪兵训练"
 BLR_military_police_training_desc: "我们必须做好应对国内可能发生的抗议和大规模骚乱的准备，因为这些事件可能由境外势力煽动。我们的警务人员应接受充分训练，以镇压此类骚乱。"
 BLR_peoples_security: "掌控无处不在"
 BLR_peoples_security_desc: "我们必须利用21世纪的技术成就来加强对民众的监控 - 当然，这是为了他们的安全。"
 BLR_procurement_of_espionage_equipment: "采购间谍设备"
 BLR_procurement_of_espionage_equipment_desc: "与其花钱购买昂贵的摄像机，不如为我们英勇的执法人员配备合适的设备，以便我们能够迅速追踪到任何惹恼我们的人。"
 BLR_occupation_management_strategies: "恐吓和支配"
 BLR_occupation_management_strategies_desc: "在胆敢推翻合法政府之前，每个人都会三思而后行，因为每个人都非常清楚，落入我们特勤部门手中的人不会有好下场。"
 BLR_fin_snipes: "萨科 TRG"
 BLR_fin_snipes_desc: "白俄罗斯共和国内务部内卫部队特种作战部队的狙击手使用萨科TRG-22步枪。"
 BLR_ger_guns: "德国机关炮"
 BLR_ger_guns_desc: "我们准备为我们的特种部队采购大量德国冲锋枪。"
