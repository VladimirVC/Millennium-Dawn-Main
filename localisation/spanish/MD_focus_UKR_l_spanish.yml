 UKR_uop_decision_category: "Consorcio Estatal Ukroboronprom"
 UKR_uop_decision_category_desc: "El consorcio estatal Ukroboronprom es una asociación de empresas del complejo militar-industrial de Ucrania bajo gestión estatal. El consorcio incluye empresas de la industria de defensa dedicadas a actividades económicas en el campo del desarrollo, fabricación, venta, reparación, modernización y eliminación de armas, equipos militares y especiales y municiones, así como a participar en la cooperación militar-técnica con países extranjeros. El consorcio es responsable de las funciones de planificación estratégica, coordinación e mejora de la eficiencia de las empresas de la industria de defensa, interacción con organismos públicos.\n\n\nLa capacidad industrial extra que podemos gastar en vehículos improvisados adicionales es [?ukr_industry_points]"
