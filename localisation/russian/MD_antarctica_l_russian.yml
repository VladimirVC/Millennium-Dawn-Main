 ANTARCTICA_STATION_INSTALL_MODULE_NO_DUPLICATE_LABS_TT: "§YДублирование лаборатории§!\nВы не можете установить один и тот же лабораторный модуль несколько раз."
 ANTARCTICA_STATION_INSTALL_MODULE_IN_PROGRESS_TT: "§YИдет установка§!\nУже устанавливается другой модуль.\nДо завершения текущей установки: §Y[?selected_antarctica_station_install_days_remaining|0]§! дн."
 ANTARCTICA_STATION_INSTALL_MODULE_POWER_BALANCE_TT: "§YЭнергобаланс после установки§!\nТекущий: [?selected_antarctica_station_output_power|+0] кВт\nПосле замены: [?selected_antarctica_station_preview_output_power|+0] кВт"
 ANTARCTICA_STATION_INSTALL_MODULE_STAFF_BALANCE_TT: "§YДоступность персонала после установки§!\nТекущая: [?selected_antarctica_station_output_required_staff|+0] / §Y[?selected_antarctica_station_output_total_staff|0]§!\nПосле замены: [?selected_antarctica_station_preview_output_required_staff|+0] / §Y[?selected_antarctica_station_output_total_staff|0]§!"
 ANTARCTICA_STATION_INSTALL_MODULE_WINTER_PENALTY_TT: "§RАнтарктическая зима (апр.—окт.)§!\nВремя и стоимость установки удваиваются во время антарктической зимы."
