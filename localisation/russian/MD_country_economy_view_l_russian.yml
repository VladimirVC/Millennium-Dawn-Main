 GDP_TOTAL: "ВВП"
 GDP_TOTAL_DESC: "Наш §YВаловой внутренний продукт§! (ВВП) — это показатель стоимости всех товаров и услуг, произведённых в стране. Millennium Dawn использует ВВП, скорректированный по ППС (паритету покупательной способности), так как этот показатель учитывает местные экономические условия, делая сравнение стран более точным и полезным."
 NUM_GDP_TOTAL: "$$§Y[?ROOT.gdp_total|1]§!b"
 NUM_GDP_TOTAL_DESC: "Наш §YВВП§! сейчас составляет $§Y[?ROOT.gdp_total|3]§! миллиардов.\n\nНедавний §Yквартальный темп роста ВВП§!: [?last_quarter_gdp_growth_rate|%Y].\n\nПодсказка: чем выше §Yквартальный темп роста ВВП§!, тем выше вероятность положительных экономических событий."
 NUM_GDP_TOTAL_DELAYED_DESC: "Примерный вклад отраслей в процентах:\n§PГражданские фабрики§!: [?ROOT.civil_fac_percent|%]\n§OВоенные фабрики§!: [?ROOT.military_factory_total_percent|%]\n§BВоенно-морские верфи§!: [?ROOT.naval_factory_total_percent|%]\n§CОфисные парки§!: [?ROOT.office_fac_percent|%]\n§GНекомерческое сельское хозяйство§!: [?ROOT.agriculture_percent|%]\n§YКоммерческие сельскохозяйственные районы§!: [?ROOT.agriculture_district_fac_percent|%]\n§YМикрочип-заводы§!: [?ROOT.microchip_plant_percent|%]\n§YКомпозитные заводы§!: [?ROOT.composite_plant_percent|%]\n§YСинтетические нефтеперерабатывающие заводы§!: [?ROOT.synthetic_refinery_percent|%]\n§GДобыча ресурсов§!: [?ROOT.resources_percent|%]\n§YИнфраструктура§!: [?ROOT.infrastructure_gdp_percent|%]\n§PЗдравоохранение§!: [?ROOT.healthcare_gdp_percent|%]\n"
 GDP_PER_CAPITA: "ВВП/ДН"
 GDP_PER_CAPITA_DESC: "Эта цифра представляет наш §YВВП на душу населения§! или §YВВП/н§!. Она отражает объём производства на каждого человека в стране.\n\nНедавний §Yквартальный темп роста ВВП/н§!: [?last_quarter_gdpc_growth_rate|%Y].\n\nПодсказка: чем выше §Yквартальный темп роста ВВП/н§!, тем выше вероятность положительных экономических событий, но при этом §Rинфляция§! также может потенциально расти, если её не контролировать."
 GDP_PER_CAPITA_DELAYED_DESC: "Текущее влияние §YВВП на душу населения§! на нашу страну:\nСкорость строительства: [?production_speed_buildings_factor_gdp_modifier|%+]\nЕжемесячное население: [?monthly_population_gdp_modifier|%+1]\nСкорость исследований: [?research_speed_factor_gdp_modifier|%+]\nСтабильность: [?stability_factor_gdp_modifier|%+]\nОбщая рабочая сила: [?total_workforce_gdp_c_modifier_var|%+]\nСкорость строительства электростанций на ископаемом топливе: [?fossil_pp_construction_gdp_c_modifier_var|%+]\n"
 NUM_GDP_PER_CAPITA: "$$§Y[?ROOT.gdp_per_capita|3]§!k"
 NUM_GDP_PER_CAPITA_DESC: "Наш §YВВП/н§! сейчас составляет $§Y[?ROOT.gdp_per_capita|3]§! тысяч."
 PRODUCTIVITY: "Производительность"
 PRODUCTIVITY_DESC: "Это число представляет §Yпродуктивность§! нашей страны."
 NUM_PRODUCTIVITY_DELAYED_DESC: "Текущий ежемесячный рост продуктивности: [?productivity_growth_scaled|3+]\n\nВлияние продуктивности:\n§YОбъем производства завода:§! [?productivity_tax_effect_display|%+1]\n§YОбъем производства верфи:§! [?productivity_tax_effect_display|%+1]\n§YСкорость строительства:§! [?productivity_tax_effect_display|%+1]\n§YКорпоративный налог:§! [?productivity_tax_effect_display|%+1]\n§Y£construction_speed_texticon §YРайоны коммерческого сельского хозяйства§! Скорость строительства:§! [?agriculture_district_output_var|%+1]"
 NUM_PRODUCTIVITY: "§Y[?ROOT.overall_productivity|3]§!"
 NUM_PRODUCTIVITY_DESC: "§YПродуктивность§! — это значение, которое определяет выпуск продукции в нашей стране. Оно рассчитывается как совокупное значение продуктивности каждого штата, делённое на население страны. §YПродуктивность§! является множителем для всех источников валового внутреннего продукта (ВВП), корпоративного налога и выпуска всех фабрик. Если ваша §YПродуктивность§! выше §Yсреднемировой продуктивности§!, вы получите более крупные бонусы, ускоряющие экономический рост и выпуск всех зданий. Если же она ниже, эти бонусы превращаются в штрафы. Полоса удерживается на уровне 1000, пока мировой средний показатель не превысит его, поэтому необходимо поддерживать темп мирового роста, чтобы сохранять и увеличивать бонусы. §YПродуктивность§! пассивно растёт или падает каждый месяц, и этот рост зависит от экономического цикла, технологий и национальных духов, а также масштабируется относительно §Yсреднемировой продуктивности§!. Страны ниже §Yсреднемировой продуктивности§! будут видеть более быстрый рост §Yпродуктивности§!, тогда как страны выше среднего будут расти медленнее.\n\n§YСреднемировая продуктивность§! сейчас составляет §Y[?global.average_world_productivity|3]§!\nНаша §Yпродуктивность§! сейчас составляет §Y[?ROOT.overall_productivity|3]§!\n"
 INFLATION: "Инфляция"
 INFLATION_DESC: "Это число представляет §Yинфляцию§! нашей страны."
 NUM_INFLATION: "§Y[?ROOT.inflation_rate_var|%]§!"
 NUM_INFLATION_DESC: "§YИнфляция§! — это значение, которое определяет, насколько растёт или снижается покупательная способность вашей страны. Чем выше инфляция, тем меньше покупательная способность у населения и государства, поскольку деньги теряют свою ценность. Инфляция рассчитывается как среднее значение §Yквартального роста ВВП/н§! за последние 4 квартала, умноженное на среднюю §Yналоговую ставку§!, и дополнительно корректируется §Yэкономическими циклами§!, §Yпечатью денег§!, §Yучётной ставкой§! и другими экономическими событиями.\n\nЧем выше средний §Yквартальный рост ВВП/н§!, а также чем больше ваш §YGDP/н§!, тем выше будет уровень инфляции. Более высокая §Yналоговая ставка§! снижает инфляцию, тогда как более низкая — увеличивает её. Более высокая §Yучётная ставка§! снижает инфляцию, но увеличивает §Rпроценты по долгу§!, тогда как более низкая ставка делает наоборот.\n\n§YЭкономические циклы§! выше уровня §Yстабильного роста§! увеличивают §Yинфляцию§!, отражая рост спроса и потребительских расходов, тогда как §Yэкономические циклы§! ниже уровня §Yстабильного роста§! уменьшают §Yинфляцию§!, отражая снижение расходов и спроса.\n\n§YДефляция§! может возникнуть, если инфляция становится отрицательной. §YДефляция§! может снижать государственные расходы, но также способна вызвать экономический спад, поскольку люди начинают откладывать покупки в ожидании дальнейшего падения цен, что может привести к §Rкраху§! рынков и бизнеса при слишком сильной или быстрой дефляции."
 NUM_INFLATION_DELAYED_DESC: "§HПоследние 4 квартала:§! [?ROOT.year_quarter_inflation_tracker^0|%] · [?ROOT.year_quarter_inflation_tracker^1|%] · [?ROOT.year_quarter_inflation_tracker^2|%] · [?ROOT.year_quarter_inflation_tracker^3|%]\n\nОтображаемый показатель — это §Yскользящее среднее за четыре квартала§!, представляющее усреднённую годовую инфляцию, которая используется для всех экономических эффектов."
 POPULATION_TAX_RATE: "Налог на население"
 POPULATION_TAX_RATE_TT: "Налоговая ставка с населения включает все налоги, взимаемые с граждан. Сюда могут входить, но не ограничиваются ими: подоходный налог, НДС, налог с продаж и налог на имущество.\n\n§YМодификаторы от налогов с населения:§!\n£stability_texticon  Стабильность: [?stability_factor_from_population_tax|%+]"
 CORPORATE_TAX_RATE: "Корпоративный налог"
 CORPORATE_TAX_RATE_TT: "Налоговая ставка на корпорации включает все налоги, взимаемые с компаний. Это значение состоит из корпоративного налога на прибыль, налогов на работодателя и других сборов.\n\n§YМодификаторы от корпоративных налогов:§!\n£consumer_goods_texticon  Стоимость потребительских товаров: [?consumer_goods_from_corporate_tax|%Y]\n£receiving_investment_cost_modifier_texticon §YПолучение иностранных инвестиций§! Модификатор стоимости: [?receiving_investment_cost_form_corporate_tax|%-]\nЕжемесячный рост продуктивности: [?productivity_growth_modifier_from_corporate_tax|+3]\n"
 CB_POLICY_RATE: "Ставка ЦБ"
 CB_POLICY_RATE_TT: "§YКлючевая ставка центрального банка§! — это базовая процентная ставка, устанавливаемая центральным банком. Она определяет стоимость заимствований в экономике.\n\n§YПовышение ставки§! ужесточает денежную массу, подавляя инфляцию, но увеличивает стоимость государственного долга и замедляет экономическую активность.\n§YСнижение ставки§! стимулирует заимствования и инвестиции, но позволяет инфляции расти быстрее.\n\nКаждое изменение стоит §Y25§! £pol_power_icon и имеет §Y60-дневный§! перерыв.\n\n§YТекущая ставка:§! [?cb_policy_rate]%\n§YКвартальное подавление инфляции:§! [?cb_policy_rate|+0]% × 0.003 за квартал\n§YПремия по долгу:§! [?cb_policy_rate|+0]% × 0.5 п.п. добавляется к §Yпроцентной ставке§!"
