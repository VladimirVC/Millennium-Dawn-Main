 ANTARCTICA_CCAS_TITLE: "CCAS"
 ANTARCTICA_CCAS_TEXT: "남극물범보존협약(CCAS)은 남극에서의 물범 사냥을 규제하는 협정입니다. 물범 개체수를 보호하고 자원의 지속 가능한 이용을 보장하기 위해 1972년에 제정되었습니다."
 ANTARCTICA_CCAMLR_TITLE: "CCAMLR"
 ANTARCTICA_CCAMLR_TEXT: "남극해양생물자원보존위원회(CCAMLR)는 남극해의 해양 생물 보존을 담당하는 기구입니다. 남극의 고유한 생태계를 관리하고 보호하기 위해 1982년에 설립되었습니다."
