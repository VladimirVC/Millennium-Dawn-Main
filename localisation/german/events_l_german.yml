l_german:
 TT_CURRENT_LEADER_DIES: "§R[ROOT.GetLeader] stirbt!§!"
 md4.1.t: "[FROM.GetName]-[Root.GetName] Free Trade Agreement"
 md4.1.d: "[FROM.GetNameDef] is offering us a free trade agreement. We will have priority to export to and import from them."
 md4.1.a: "Unterschreib es!"
 md4.1.b: "Verweigern."
 md4.2.t: "[FROM.GetNameDef] Has Signed a Free Trade Agreement with Us"
 md4.2.d: "[FROM.GetNameDef] has accepted our offer to sign a free trade agreement. It will enter into force immediately."
 md4.2.a: "Es wird uns beide wohlhabend machen!"
 md4.3.t: "[FROM.GetNameDef] Has Refused to Sign a Free Trade Agreement with Us"
 md4.3.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.3.a: "Sie haben Angst vor unseren überlegenen Produkten!"
 md4.4.t: "[FROM.GetName]-[Root.GetName] Military Cooperation Treaty"
 md4.4.d: "[FROM.GetNameDef] is offering us a military cooperation treaty. We will sell them equipment at a discounted price but this will make them more likely of buying from us instead of buying from our competitors."
 md4.4.a: "Unterschreib es!"
 md4.4.b: "Verweigern."
 md4.5.t: "[FROM.GetNameDef] Has Signed a Military Cooperation Treaty with Us"
 md4.5.d: "[FROM.GetNameDef] has accepted our offer to sign a military cooperation treaty. It will enter into force immediately."
 md4.5.a: "Es wird uns beide stark machen!"
 md4.6.t: "[FROM.GetNameDef] Has Refused to Sign a Military Cooperation Treaty with Us"
 md4.6.d: "[FROM.GetNameDef] has refused our offer to sign a military cooperation treaty."
 md4.6.a: "Sie befürchten, dass wir stärker sein werden!"
 md4.7.t: "Sexskandal um den Präsidenten"
 md4.7.d: "The [FROM.GetName] has come into a sex scandal. The scandal involved [FROM.GetName] sexually assaulting multiple people during countless years as politician. This is being viewed as a great abuse of power and trust among the people. Many people across the country have demanded a response from the [FROM.GetName] on the Allegations."
 md4.7.a: "Ich bestreite diese Vorwürfe. Sie sind in jeder Hinsicht falsch. Das ist nur eine Möglichkeit, mich zu verleumden!"
 md4.7.b: "Ich akzeptiere diese Vorwürfe. Ich muss Ihnen leider mitteilen, dass sie der Wahrheit entsprechen."
 md4.8.t: "Reaktion auf Amokläufe in Schulen"
 md4.8.d: "A school shooting has occurred [FROM.GetName]. This school shooting has received lots of media attention, and warrants a response from the President."
 md4.8.a: "Versprechen, das Problem zu beheben"
 md4.8.b: "Versuchen, das Problem zu ignorieren und weiterzumachen."
 md4.9.t: "Gedanken zur Einkommensteuer"
 md4.9.d: "The president of The [FROM.GetName] has an interview from the press about the income tax, and what he thinks should happen to them"
 md4.9.a: "Ich denke die Einkommenssteuer für die Armen sollte erhöht werden."
 md4.9.b: "Ich denke die Einkommenssteuer für die Armen sollte reduziert werden."
 md4.9.c: "Ich denke die Einkommenssteuer für die Reichen sollte erhöht werden."
 md4.9.e: "Ich denke die Einkommenssteuer für die Armen sollte reduziert werden."
 md4.10.t: "Reaktion der Armen"
 md4.10.d: "Die Armen waren unzufrieden mit der Ansicht des Präsidenten."
 md4.10.a: "Oh nein!"
 md4.11.t: "Reaktion der Reichen"
 md4.11.d: "Die Reichen waren unzufrieden mit der Ansicht des Präsidenten."
 md4.11.a: "Oh nein!"
 md4.12.t: "Reaktion der Reichen"
 md4.12.d: "Der Präsident sagte, er würde gerne die Steuern für die Reichen erhöhen, dies kam bei ihnen nicht gut an. Die Unterstützung für den Präsidenten wurde dadurch geschädigt."
 md4.12.a: "Oh nein!"
 md4.13.t: "Reaktion der Armen"
 md4.13.d: "Die Armen reagierten auf die Ansichten des Präsidenten zur Besteuerung der Reichen. Einige der Armen sind der Ansicht, die Steuern für die Reichen sollten eher erhöht als gesenkt werden."
 md4.13.a: "Oh nein!"
 md4.14.t: "[FROM.GetName] fordert Unterwerfung"
 md4.14.d: "Die Regierung von [FROM.GetName] hat verlangt, dass wir uns ihrer Herrschaft unterwerfen und unser Oberherr werden"
 md4.14.a: "Natürlich"
 md4.14.b: "Niemals"
 md4.15.t: "[FROM.GetName] übermittelt"
 md4.15.d: "Die Regierung von [FROM.GetName] hat unseren Forderungen zugestimmt und sich unserer Herrschaft unterworfen"
 md4.15.a: "Großartige"
 md4.16.t: "[FROM.GetName] Widersteht"
 md4.16.d: "Die Regierung von [FROM.GetName] hat unsere Forderungen nach Oberherrschaft abgelehnt"
 md4.16.a: "Verdammt"
 md4.17.t: "[FROM.GetName] akzeptiert Allianz"
 md4.17.d: "Die Regierung von [FROM.GetName] hat unsere Allianzanfrage angenommen"
 md4.17.a: "Großartige"
 md4.18.t: "[FROM.GetName] lehnt Allianz ab"
 md4.18.d: "Die Regierung von [FROM.GetName] hat unsere Allianzanfrage abgelehnt"
 md4.18.a: "Verdammt"
 md4.19.t: "[FROM.GetName] gibt Territorium ab"
 md4.19.d: "Die Regierung von [FROM.GetName] hat unseren Gebietsforderungen zugestimmt"
 md4.19.a: "Großartige"
 md4.20.t: "[FROM.GetName] weigert sich, Territorium abzutreten"
 md4.20.d: "Die Regierung von [FROM.GetName] hat unsere Gebietsforderungen abgelehnt"
 md4.20.a: "Verdammt"
 generic.1.t: "[FROM.GetName] Is Influencing Our Politics"
 generic.1.d_neutral_good: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has expressed a great interest in [Root.GetAdjective] politics. Recently this intensified when [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with a number of speeches and reading material distributed to the [Root.GetAdjective] people. \n\nNow even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda, and have started advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.d_bad: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has often tried to meddle in [Root.GetName]'s politics. Recently this has intensified, as [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with no respect for [Root.GetAdjective] political traditions. A number of speeches and other [FROM.GetRulingIdeology] material is already being distributed to the [Root.GetAdjective] people. It seems that even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda and have begun advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.a: "Interessant"
 generic.1.b: "Wie können sie es wagen!"
 generic.2.t: "[FROM.GetName] seeks to join the [Root.GetFactionName]"
 generic.2.d.a: "Angesichts zunehmender Bedrohungen für Freiheit und demokratische Werte betrachten die [alliance_applicant.GetAdjective] uns als Verteidiger der Freiheit. Sie möchten nun in unser Bündnis aufgenommen werden, um sowohl unseren Schutz zu genießen als auch gemeinsam mit uns gegen die Kräfte zu kämpfen, die die Demokratie bedrohen."
 generic.2.d.b: "Unser Bestreben, die bestehende Weltordnung umzustürzen, ist gleichgesinnten Nationen nicht entgangen. Die [alliance_applicant.GetAdjective] erkennen, dass ihre beste Chance, sich eine erfolgreiche Zukunft zu erarbeiten, darin besteht, sich im kommenden Konflikt mit uns zu verbünden, und haben daher angeboten, sich offiziell mit uns gegen unsere Feinde zu verbünden."
 generic.2.d.c: "[alliance_applicant.GetName] hat erkannt, dass sie sich mit anderen sozialistischen Republiken zusammenschließen muss, um die Stellung des Kommunismus in der Welt zu stärken. Die [alliance_applicant.GetAdjective] erkennt unsere führende Rolle in der internationalen Notlage der Arbeiter an und bittet nun darum, offiziell ein Bündnis mit uns einzugehen."
 generic.2.d.e: "Da die aktuellen Umwälzungen in der internationalen Politik noch immer weltweit nachhallen, sehen die [alliance_applicant.GetAdjective] in uns ihre größte Chance, diese turbulenten Zeiten zu überstehen. Sie beantragen daher die Aufnahme in unsere Allianz, damit wir den kommenden Sturm gemeinsam überstehen können."
 generic.2.a: "Alle, die für Freiheit und Demokratie eintreten, können sich uns anschließen."
 generic.2.b: "Die Welt gehört allen, die stark sind!"
 generic.2.c: "Wenn wir zusammenstehen, kann die Revolution nur siegen."
 generic.2.e: "Und wir werden es überstehen!"
 generic.2.f: "Ohne sie geht es uns besser."
 generic.3.t: "[alliance_inviter.GetName] heißt uns willkommen bei [alliance_inviter.GetFactionName]"
 generic.3.d: "[alliance_inviter.GetName] hat beschlossen, unsere Beitrittsanfrage an die [alliance_inviter.GetFactionName] anzunehmen. Von nun an stehen und fallen wir gemeinsam."
 generic.3.a: "Gemeinsam werden wir die Demokratie verteidigen."
 generic.3.b: "Niemand kann uns widerstehen!"
 generic.3.c: "Die Notlage der Arbeiter könnte sich keine besseren Verfechter wünschen!"
 generic.3.e: "Wir werden unsere Differenzen vorerst beiseite legen."
 generic.4.t: "[alliance_inviter.GetName] lehnt die Anfrage zum Beitritt zu [alliance_inviter.GetFactionName] ab"
 generic.4.d: "[alliance_inviter.GetName] hat beschlossen, unsere Anfrage zum Beitritt zu [alliance_inviter.GetFactionName] abzulehnen. Wir müssen ohne ihre Hilfe auskommen."
 generic.4.a: "Sie nennen sich Verteidiger der Freiheit?"
 generic.4.b: "Dann werden wir auch sie vernichten!"
 generic.4.c: "Ihre Revolution ist korrupt!"
 generic.4.e: "Unsere Unterschiede waren zu groß."
 generic.5.t: "[FROM.GetName] invites [Root.GetName] to the [FROM.GetFactionName]"
 generic.5.d.a: "Mit einem misstrauischen Blick auf die jüngsten Entwicklungen in der Weltpolitik streckt [alliance_inviter.GetName] uns die Hand der Freundschaft entgegen, bietet uns seinen Schutz und fordert uns auf, gemeinsam mit ihnen die Prinzipien von Freiheit und Demokratie zu verteidigen. Als Mitglied von [alliance_inviter.GetFactionName] kann die Freiheit unseres Volkes durchaus geschützt werden."
 generic.5.d.b: "Da wir wissen, dass manchmal sogar die Starken Verbündete brauchen, haben uns die [alliance_inviter.GetAdjective] eingeladen, der [alliance_inviter.GetFactionName] beizutreten. Wenn wir die Einladung annehmen, bietet uns dies reichlich Gelegenheit, unseren Platz an der Sonne zu finden."
 generic.5.d.c: "Unsere ideologischen Verbündeten in [alliance_inviter.GetName] haben unsere wertvollen Beiträge zur Sache der Arbeiter zur Kenntnis genommen und heute Morgen haben wir eine Einladung erhalten, der [alliance_inviter.GetFactionName] beizutreten. Gemeinsam mit anderen sozialistischen Republiken könnten wir die Revolution mit neuer Kraft ausbreiten."
 generic.5.d.e: "Es scheint, dass die [alliance_inviter.GetAdjective] uns als strategisch interessant betrachten und es für gewinnbringender halten, wenn wir zusammenarbeiten, als uns durch unsere ideologischen Unterschiede spalten zu lassen. Heute Morgen hat uns der [alliance_inviter.GetAdjective]-Botschafter eine Einladung überbracht, Mitglied der [alliance_inviter.GetFactionName] zu werden."
 generic.5.a: "Wir werden ihnen zur Seite stehen."
 generic.5.b: "Wir brauchen nur ein paar tausend Tote..."
 generic.5.c: "Wir werden an der Seite unserer Kameraden kämpfen!"
 generic.5.e: "Es ist die profitable Wahl."
 generic.6.t: "[alliance_applicant.GetName] nimmt die Einladung zu [alliance_inviter.GetFactionName] an"
 generic.6.d: "[alliance_applicant.GetName] hat beschlossen, unser Angebot anzunehmen und der [alliance_inviter.GetFactionName] beizutreten. Von nun an werden wir gemeinsam stehen oder fallen."
 generic.7.t: "[alliance_applicant.GetName] lehnt Angebot zum Beitritt zu [alliance_inviter.GetFactionName] ab"
 generic.7.d: "[alliance_applicant.GetName] hat beschlossen, unser Angebot, der [alliance_inviter.GetFactionName] beizutreten, abzulehnen. Wir müssen ohne ihre Hilfe auskommen."
 generic.7.a: "Unsere Hilfe ist unerwünscht."
 ace_promoted.1.t: "Piloten Ass Befördert"
 ace_promoted.2.t: "Ein wildes Ass erscheint"
 ace_promoted.1.d: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive from the recent mission over [FROM.GetMissionRegion], but living through significant victories in many critical encounters.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.d_major: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive, but piloting [FROM.GetHerHis] [FROM.GetWing] with immense skill. Recently, [FROM.GetName] was on a mission over [FROM.GetMissionRegion] and was instrumental to the success of this critical encounter.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.a: "Wer wagt, gewinnt."
 ace_died.1.t: "Fighter Ace Callsign '[FROM.GetCallsign]' Killed Over [FROM.GetMissionRegion]"
 ace_died.1.d: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has been shot down in the line of duty during a mission over [FROM.GetMissionRegion]. Unfortunately, since [FROM.GetSheHe] has long been a public figure, their demise is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, [FROM.GetHerHis] death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.d_major: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has gone down in the line of duty. Pilots returning from the region report having spotted [FROM.GetHerHis] [FROM.GetWingShort] going down in flames over [FROM.GetMissionRegion] after taking heavy enemy fire. Unfortunately, since [FROM.GetSheHe] has long been a public figure, the demise of '[FROM.GetCallsign]' is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.a: "Eine lebende Legende ist immer noch besser."
 ace_killed_by_ace.1.t: "Fighter Ace [FROM.GetFullName] Shot Down By Enemy Pilot"
 ace_killed_by_ace.1.d: "Pilots returning from [FROM.GetMissionRegion] report that a squadron of [Prev.Owner.GetAdjective] aircraft, led by the infamous pilot '[Prev.GetCallsign]', focused on chasing down [FROM.GetFullName]. After dodging several bursts from the enemy and taking down a number of hostile aircraft, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]', who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s plane caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to our nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.d_major: "Pilots returning from [FROM.GetMissionRegion] report that, a squadron of [Prev.Owner.GetAdjective] aircraft led by the infamous pilot '[Prev.GetCallsign]' focused on chasing down [FROM.GetFullName]. After taking down a number of enemy aircraft and dodging several bursts from the enemy, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]' in his [Prev.GetWingShort], who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s [FROM.GetWingShort] caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to the nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.a: "Ein verheerender Verlust für uns alle"
 ace_killed_other_ace.1.t: "Fighter Ace [FROM.GetFullName] Shoots Down Callsign '[Prev.GetCallsign]'"
 ace_killed_other_ace.1.d: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, outwitting the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]'. '[FROM.GetCallsign]' used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]'' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]'' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.d_major: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, managing to outwit the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]''. [FROM.GetCallsign] used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.a: "A victory all of [FROM.Owner.GetNameDef] will remember!"
 aces_killed_each_other.1.t: "Fighter ace [FROM.GetFullName] has gone down"
 aces_killed_each_other.1.d: "During the latest mission our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s and [Prev.GetCallsign]'s aircraft were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.d_major: "During the most recent aerial sortie our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered [FROM.GetHerHis] [FROM.GetWingShort] through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s [FROM.GetWingShort] and [Prev.GetCallsign]'s [Prev.GetWingShort] were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.a: "Dennoch ein großer Verlust für uns"
 election.1.t: "GENERISCHE WAHL"
 election.1.d: ""
 election.1.a: ""
 election.2.t: "Wahl: Öffentlichkeit lehnt Wiederbewaffnung ab"
 election.2.d: "Bei den bevorstehenden Wahlen ist die Unterstützung für [Root.GetRulingParty] immer noch hoch, die Menschen haben Vertrauen in die Führung von [Root.GetLeader]. Das Bestreben der Partei, den Fokus von [Root.GetName] auf militärische Angelegenheiten zu erhöhen, ist jedoch bei der Öffentlichkeit nicht sehr beliebt, da ein erheblicher Teil der Bürger dies für unklugen Hurrapatriotismus hält. Der Krieg hat unsere Grenzen noch nicht erreicht, und nur wenige würden es begrüßen, wenn [Root.GetName] aggressiv vorgehen würde. In Zusammenarbeit mit anderen großen Parteien, die unsere Sorgen um die Sicherheit der Nation teilen, werden wir auch nach der Wahl noch regieren können, wenn auch mit geringerer Unterstützung."
 election.2.a: "Die Menschen müssen gehört werden."
 election.2.b: "Der Schutz unserer Souveränität steht an erster Stelle."
 election.3.t: "Wahl: Die Öffentlichkeit fordert Wiederbewaffnung"
 election.3.d: "Der anhaltende Krieg, der sich unseren Grenzen nähert, überlagert die bevorstehenden Wahlen. Viele Wähler sind besorgt, dass [Root.GetName] nicht darauf vorbereitet ist, in diesen Konflikt oder was auch immer daraus entstehen mag, hineingezogen zu werden. Sie fordern, dass wir unsere Vorsichtsmaßnahmen verstärken und sicherstellen, dass unsere Nation für den Krieg bereit ist. Obwohl die Mehrheit immer noch [Root.GetRulingParty] unterstützt, könnten wir sie an radikalere Elemente verlieren, wenn wir ihre Befürchtungen nicht zerstreuen."
 election.3.a: "Die Menschen haben das Recht, sich sicher zu fühlen."
 election.3.b: "Viele sind immer noch für diplomatische Lösungen."
 election.4.t: "Wahl: Faschisten in der Regierung?"
 election.4.d: "In [Root.GetName] hat sich eine aggressive nationalistische Stimmung entwickelt, die mehrere Parteien hervorgebracht hat, die faschistische Ideale vertreten: einen Staat, der seine Macht mit Gewalt durchsetzt. Eine dieser Parteien hat bei der aktuellen Wahl besonders viel Zuspruch gewonnen, was innerhalb der Partei [Root.GetRulingParty] zu Diskussionen darüber geführt hat, ob wir versuchen sollten, mit ihnen bei der Bildung unserer Regierung zusammenzuarbeiten. Obwohl sie die demokratischen Ideale, die die Grundlage unseres Staates bilden, offen ablehnen, verleiht die Tatsache, dass sie sich entschieden haben, an der Wahl teilzunehmen, unseren Ansichten eine gewisse Glaubwürdigkeit, und die Anerkennung ihrer öffentlichen Unterstützung könnte sie von gewalttätigen Maßnahmen abhalten."
 election.4.a: "Lieber sie als die Kommunisten!"
 election.4.b: "Vorzuziehen wäre eine breite Koalition demokratischer Parteien."
 election.5.t: "Wahl: Kommunisten in der Regierung?"
 election.5.d: "Die kommunistische Bewegung in [Root.GetName], die durch die weitverbreitete Unzufriedenheit der Arbeiterklasse und radikale Strömungen unter Akademikern angeheizt wird, ist groß genug geworden, um zur Gründung mehrerer Parteien zu führen. Nachdem eine dieser Parteien bei der aktuellen Wahl beträchtliche Unterstützung gewonnen hat, haben Politiker in [Root.GetRulingParty] begonnen, darüber zu debattieren, ob sie ihre Unterstützung bei der Regierungsbildung suchen sollen oder nicht. Obwohl sie unsere demokratischen Institutionen für kaum mehr als bürgerliche Tyrannei halten, scheinen sie bestrebt zu sein, die gewünschten Veränderungen durch Zusammenarbeit mit der Regierung herbeizuführen, anstatt sie zu stürzen."
 election.5.a: "Lieber Reform als Revolution!"
 election.5.b: "Vorzuziehen wäre eine breite Koalition demokratischer Parteien."
 election.6.t: "Wahl: Demokratische Parteien in der Minderheit"
 election.6.d: "Die Politik in [Root.GetName] hat sich zunehmend radikalisiert. Wo es einst breite Unterstützung für die Parteien gab, die demokratische Ideale und [Root.GetName]s repräsentative Institutionen unterstützten, haben sich bei dieser Wahl mehr Wähler den politischen Extremen zugewandt. Die Parteien der politischen Mitte bilden, selbst wenn sie sich dazu entschließen, ihre Differenzen beizulegen, keine Mehrheit mehr. Um eine schwache Minderheitsregierung zu vermeiden, haben wir keine andere Wahl, als entweder mit Faschisten oder Kommunisten zusammenzuarbeiten."
 election.6.a: "Wir werden mit den Faschisten zusammenarbeiten, um [Root.GetName] zu stärken."
 election.6.b: "Indem wir uns den Kommunisten anschließen, können wir gesellschaftliche Veränderungen herbeiführen."
 election.6.c: "Eine Minderheitsregierung wäre zwar schwach, aber vorzuziehen."
 election.7.t: "Faschisten beeinflussen die Außenpolitik"
 election.7.d: "Die Aufnahme der Faschisten in unsere politische Koalition hatte Auswirkungen auf unsere Außenpolitik. Trotz ihres vehementen Nationalismus haben sie im Ausland Sympathisanten, die den Einfluss, den sie in [Root.GetName] erhalten haben, gutheißen. Totalitäre Regierungen mit ähnlicher ideologischer Ausrichtung sehen uns als potenzielle Verbündete. Die Aufrechterhaltung der Beziehungen zu diesen Ländern, ungeachtet der Abneigung, die [Root.GetRulingParty] gegenüber ihren Idealen hegen mag, kann notwendig sein, um die Unterstützung der Faschisten, die unsere Regierung stützen, zu behalten."
 election.7.a: "Gegen größere Bedrohungen können wir einige Verbündete gebrauchen."
 election.7.b: "Mit solchen Freunden bräuchten wir keine Feinde."
 election.8.t: "Kommunisten beeinflussen die Außenpolitik"
 election.8.d: "Kommunisten betrachten sich oft als Teil einer internationalen Revolution, und unsere Entscheidung, sie als Partner in unserer Regierung zu akzeptieren, hat die Aufmerksamkeit vieler ihrer internationalen Verbündeten auf sich gezogen. Vertreter kommunistischer Parteien pflegen enge Beziehungen zu Ländern, die unsere Regierungsform zugunsten einer Diktatur des Proletariats aufgegeben haben. Diese Beziehungen müssen wir in der [Root.GetAdjective] Außenpolitik möglicherweise anerkennen, wenn wir ihre Unterstützung behalten wollen."
 election.8.a: "Wir sollten uns unseren gemeinsamen Anliegen widmen."
 election.8.b: "Auf diesem Weg liegt die Auflösung von [Root.GetName] selbst."
 election.11.t: "Wahl: Faschistische Mehrheit"
 election.11.d: "Diese Wahl war verheerend für die Institution, die sie repräsentiert. Die Mehrheit der [Root.GetAdjective] Bevölkerung hat für eine faschistische Partei gestimmt, die Wahlen abschaffen und einen autokratischen Herrscher einsetzen will. Während viele erwägen, gegen diese Verletzung der demokratischen Ideale, die ihnen dieses Mandat überhaupt erst ermöglicht haben, zu den Waffen zu greifen, erwägen andere den Einsatz von Gewalt, um ihre Ideale nur noch weiter zu bestätigen."
 election.11.a: "Es ist ein schwarzer Tag für [Root.GetName], aber das Volk hat gesprochen."
 election.11.b: "Wir werden unsere Freiheit nicht kampflos aufgeben!"
 election.12.t: "Wahl: Kommunistische Mehrheit"
 election.12.d: "Die aktuelle Wahl endete mit einem Sieg der kommunistischen Parteien, während die frühere Regierung gemischte Reaktionen hervorrief. Während die neuen Herrscher behaupten, das Volk als Ganzes zu vertreten, betrachten sie viele der demokratischen Institutionen, die wir hoch schätzen, als Versuche, die Arbeiterklasse zu manipulieren und zu unterdrücken, was zu einer Diskussion darüber führt, was wirklich eine „Herrschaft des Volkes“ ausmacht. In einigen Ländern begann die Revolution in Strömen von Blut. In [Root.GetName] war dies nicht der Fall, aber sie könnte noch immer in diesen Ländern enden."
 election.12.a: "Das ist beunruhigend, aber sie stellen tatsächlich die Mehrheit dar."
 election.12.b: "Wir müssen sie stoppen, bevor sie jedes Zeichen abweichender Meinung beseitigen!"
 election.13.t: "Wahl: Magnat befürwortet Faschismus"
 election.13.d: "Ein einflussreicher Industrieller hinter einem der Unternehmen, mit denen wir für unsere industrielle Produktion zusammenarbeiten, hat kürzlich eine Reihe von politischen Äußerungen gemacht, die Mitglieder der Regierung beunruhigend fanden. Er hat offen eine autoritäre Regierung befürwortet und ausländische Regierungen gelobt, die sich als faschistisch bezeichnen, und implizit angedeutet, dass [Root.GetName] von einer solchen Herrschaft profitieren würde. Den Magnaten und seine Ideale anzuprangern, könnte unsere Beziehung zu dem Unternehmen belasten, aber sie unkontrolliert zu lassen, würde ihm eine Plattform für die Verbreitung von Propaganda bieten, die alles untergräbt, wofür [Root.GetRulingParty] steht."
 election.13.a: "Er kann sagen, was er will, wir müssen es nicht unterstützen."
 election.13.b: "Wir können uns bei der Entwicklung und dem Schutz von [Root.GetName] nicht auf Faschisten verlassen."
 election.14.t: "Wahlen: Ausnahme in Kriegszeiten"
 election.14.d: "[Root.GetName] befindet sich im Kriegszustand. Normalerweise würden zu diesem Zeitpunkt Wahlen abgehalten, aber da wir uns mitten in einem wichtigen Konflikt befinden, argumentieren viele, dass wir es uns nicht leisten können, Zeit für politische Kampagnen oder einen Führungswechsel zu verschwenden, falls es dazu kommen sollte. Andere wiederum behaupten, dass die Erklärung des anhaltenden Krieges als gültiger Grund für die Absage von Wahlen der erste Schritt zur Erosion der [Root.GetAdjective] Demokratie sei. Schließlich könnte es ein heikles Unterfangen sein, militärischen Angelegenheiten Vorrang vor dem Einfluss des Volkes zu geben."
 election.14.a: "Die Wahlen finden wie gewohnt statt."
 election.14.b: "Um solche Angelegenheiten können wir uns kümmern, wenn dieser Krieg vorbei ist."
 election.15.t: "Wahl: Regierung umstritten"
 election.15.d: "Angesichts der bevorstehenden Wahlen beginnen die Menschen, die Fähigkeit der gegenwärtigen Regierung, den anhaltenden Krieg fortzusetzen, in Frage zu stellen. [Root.GetName] hat stark gelitten und die öffentliche Meinung hat sich gegen diejenigen gewendet, die unser Land in die Niederlage zu führen scheinen. Obwohl unser Volk entschlossen ist, den Krieg bis zum Ende durchzustehen, wäre es ihm lieber, wenn eine andere Regierung ihn beenden würde."
 election.15.a: "Diese Vertrauenskrise ist höchst bedauerlich."
 election.15.b: "Sorgen Sie dafür, dass sich die politische Landschaft verändert, um die Einheit der Menschen zu wahren."
 election.16.t: "[Root.GetLeader] genießt öffentliche Unterstützung"
 election.16.d: "Bei der aktuellen Wahl hat die Opposition, sofern sie existiert, die zunehmend autoritäre Herrschaft von [Root.GetRulingParty] kritisiert. Sie stellt in Frage, ob die Wählerschaft überhaupt Macht hat oder ob das alles nur Show ist.\n\nDie Unterstützung für [Root.GetLeader] scheint jedoch weiterhin hoch zu sein, und obwohl die Umstände der Wahl von der internationalen Gemeinschaft in Frage gestellt werden, wurde sie im Inland nicht angefochten. Es scheint, dass das Volk seinen Herrscher unterstützt, auch wenn [Root.GetName] nicht mehr vom Volk regiert wird ... zumindest diejenigen, die es an die Wahlurne geschafft haben."
 election.16.a: "Ein Volk, ein Führer."
 election.17.t: "Wahlergebnisse in Frage gestellt"
 election.17.d: "Obwohl das [Root.GetLeader]-Regime die meisten seiner Gegner zum Schweigen gezwungen hat, haben sich einige dennoch zu den jüngsten Wahlen geäußert und der [Root.GetRulingParty] vorgeworfen, die Ergebnisse manipuliert und die klaren Bemühungen ignoriert zu haben, ein Parlament zu wählen, das gegen ihre Politik ist.\n\nDie Regierung tut diese Einwände mit dem Argument ab, sie versuche, die Bevölkerung gegen sich auszuspielen. Tatsache bleibt jedoch, dass die Mehrheit der Bevölkerung Vorbehalte gegen ihre Herrschaft zu haben scheint, und die Opposition hat, obwohl sie vorerst zum Schweigen gebracht wurde, ihren Standpunkt klar gemacht."
 election.17.a: "Splitter!"
 political.1.t: "Der Kommunismus auf dem Vormarsch"
 political.1.d: "„Während Arbeiter auf der ganzen Welt gegen ihre Unterdrücker aufbegehren, sitzen jene, die behaupten, in [Root.GetName] Klassenbewusstsein erreicht zu haben, untätig herum und warten auf Veränderungen aus dem Inneren eines politischen Systems, das so durch und durch korrupt ist, dass nur eine Revolution uns davor retten könnte!“\n\nSo sprechen neue Stimmen in der [Root.GetAdjective] kommunistischen Bewegung. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur der Bourgeoisie und fordern, sie mit allen erforderlichen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 political.1.a: "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 political.1.a.tt: "Erhöht die Chance interner Unterstützung für einen kommunistischen Putsch."
 political.1.b: "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 political.1.b.tt: "Erhöht die Chance auf öffentliche Unterstützung für einen kommunistischen Aufstand."
 political.2.t: "Marxistische Sympathisanten in der Regierung"
 political.2.d: "Obwohl die Parteilinie der [Root.GetRulingParty] darin besteht, den revolutionären Sozialismus entschieden abzulehnen und ein wachsames Auge auf die radikalen linken Elemente des Landes zu haben, sind einige Regierungsmitglieder dieser Möglichkeit gegenüber aufgeschlossener. Zumindest sehen sie Spielraum, um die Sorgen der Menschen anzusprechen, die sich an die Kommunisten wenden, um Lösungen zu finden, ohne einen umfassenden Bürgerkrieg zu riskieren.\n\nObwohl sie von denen, die [Root.GetLeader] treu bleiben, als Verräter angesehen werden könnten, könnten diese abweichenden Stimmen diejenigen sein, die einen relativ unblutigen Übergang sicherstellen, sollte es zur Revolution kommen."
 political.2.a: "Auch wir werden sie aus vielen Gründen genau im Auge behalten."
 political.2.a.tt: "Wenn die öffentliche Unterstützung ausreicht, kann ein Putsch durchgeführt werden."
 political.3.t: "Kommunisten führen Putsch durch"
 political.3.d: "Während die Volksbewegung für eine kommunistische Revolution laut und furchteinflößend war, war ein gewisser Teil der politischen Bewegung weitgehend ruhig und wartete ab. Das Warten hat nun ein Ende. Als sich heute die [Root.GetRulingParty]-Führung und die Armee auf einen Aufstand auf nationaler Ebene vorbereiteten, stellten einige Beamte der [Root.GetAdjective]-Regierung [Root.GetLeader] rasch unter Hausarrest und begannen Verhandlungen mit den Rebellen.\n\nUnter dem Vorwand, die Ordnung zu wahren, liefen die Verhandlungen tatsächlich darauf hinaus, Positionen innerhalb des neuen sozialistischen Staates für diejenigen zu sichern, die sich zur Zusammenarbeit entschieden. Der Putsch war beendet, bevor irgendjemand etwas unternehmen konnte, um ihn zu stoppen, und diejenigen, die es getan hätten, werden nun vom neuen Regime eingesperrt, verbannt oder hingerichtet."
 political.3.a: "Die Gezeiten der Geschichte werden die Vergangenheit hinwegfegen."
 political.4.t: "Klassenkonflikte teilen [Root.GetName]"
 political.4.d: "Die kommunistische revolutionäre Bewegung, einst eine Randgruppe, die in der Theorie unter radikalen Akademikern beliebt und in der Praxis Unruhestifter war, hat in der [Root.GetAdjective] Arbeiterklasse zunehmend Unterstützung erfahren. Die Tatsache, dass sich immer mehr Menschen überhaupt einer „Klasse“ zuordnen, deutet darauf hin, dass sich marxistische Ideen über diejenigen hinaus verbreiten, die aktiv versuchen, die Regierung zu stürzen.\n\n[Root.GetRulingParty]-Mitglieder beklagen diese Entwicklung und sehnen sich nach einer Zeit zurück, in der „[Root.GetAdjective]“ das war, womit sich die Menschen in erster Linie identifizierten. Ihre Sorgen sind nicht unbegründet. Man könnte argumentieren, dass eine Revolution bereits im Gange ist, die auf mehreren Ebenen der Gesellschaft stattfindet, und dass es möglicherweise zu spät ist, sie aufzuhalten."
 political.4.a: "Die Leute können sich nennen, wie sie wollen."
 political.5.t: "Soldaten desertieren zu kommunistischen Partisanen"
 political.5.d: "„Kapitalisten und Nationalisten wollen, dass ihr an der Front euer Blut für sie vergießt und Brüder gegen Brüder aufhetzt wegen Streitigkeiten, die den Arbeiter nichts angehen! Statt die Waffen gegen Arbeiter zu erheben, die im Ausland kämpfen, erhebt sie gegen die Unterdrücker und stürzt die Tyrannen!“\n\nDie Armee, normalerweise eine Bastion des Patriotismus und der Loyalität, ist nicht immun gegen die kommunistische Propaganda, die sich in [Root.GetName] schnell verbreitet. Soldaten desertieren, weigern sich, für ihr Land zu kämpfen, und schließen sich manchmal Partisanenbewegungen an, die behaupten, eine Revolution vorzubereiten."
 political.5.a: "Vielleicht kämpfen sie lediglich für einen anderen [Root.GetName]."
 political.6.t: "Die [GetMonth]-Revolution"
 political.6.d: "Die Vorstellung, dass die kommunistische Bewegung das Volk vertritt, hat in [Root.GetName] sicherlich Auftrieb bekommen, denn die öffentliche Unterstützung für die kommunistische Partei ist in den letzten Monaten rapide gestiegen. Doch diejenigen, die zur Revolution aufrufen, sind nicht länger eine ungleiche Ansammlung von Guerillas und verärgerten Gewerkschaften. Die Gruppe hinter dem Aufruf zur Revolte ist organisiert genug, um im Erfolgsfall eine Regierung zu bilden.\n\nWenn die Revolution jetzt beginnen würde, könnte sie jedoch kaum durchgeführt werden, ohne [Root.GetName] in einen Bürgerkrieg zu stürzen. Sollten die Revolutionäre riskieren, die Nation in zwei Teile zu reißen, um ihre Ungeduld zu befriedigen, oder auf eine bessere Gelegenheit in der Zukunft warten?"
 political.6.a: "Wer Geschichte schreiben will, muss heute handeln!"
 political.6.b: "Die Revolution ist unvermeidlich. Das Unvermeidliche kann warten."
 political.7.t: "Faschismus auf dem Vormarsch"
 political.7.d: "„Das [Root.GetAdjective] Volk war schon zu lange der inkompetenten Herrschaft von [Root.GetRulingParty] unterworfen! Sie behaupten, das Volk zu vertreten, aber schaffen es nicht einmal, unsere Straßen in Ordnung zu halten! Nur indem wir sie von der Macht entfernen, können wir diese Nation wachsen lassen!“\n\nDie faschistischen Redner in [Root.GetName] haben kein Geheimnis daraus gemacht, was sie von unserer gegenwärtigen Herrschaft und unserem politischen System halten. Reden wie diese haben eine öffentliche Opposition angeheizt, die besonders in den konservativeren Teilen des Militärs ausgeprägt ist."
 political.7.a: "Die Vorgesetzten hegen möglicherweise unausgesprochene Sympathien."
 political.7.a.tt: "Erhöht die Chance interner Unterstützung für einen faschistischen Putsch."
 political.7.b: "Die jüngere Generation wird die Fackel übernehmen."
 political.7.b.tt: "Erhöht die Chance auf öffentliche Unterstützung für einen faschistischen Putsch."
 political.8.t: "Faschistische Sympathien im Militär"
 political.8.d: "Mehrere hochrangige Mitglieder des [Root.GetAdjective]-Militärs haben ihre Unterstützung für die faschistische Bewegung in [Root.GetName] zum Ausdruck gebracht, einige privat, andere offen. Sie haben das Gefühl, dass die [Root.GetRulingParty] vergessen hat, wie wichtig Waffengewalt ist, um das Land zusammenzuhalten, und sind zunehmend verärgert darüber, dass die Armee von der Regierung eher als Werkzeug denn als eine der wichtigsten Institutionen des Landes behandelt wird. Einige von ihnen gehen so weit, zu behaupten, dass eine neue Regierung erforderlich sei, die weiß, wie sie [Root.GetName] in die nächste Hälfte des Jahrhunderts führen kann.\n\nDiese Fraktion besteht zwar nicht überwiegend aus Politikern, aber einige von ihnen haben Positionen im Verteidigungsministerium erlangt. Wenn sich diese Entwicklungen fortsetzen, haben sie möglicherweise genügend politische Unterstützung, um einen Putsch durchzuführen."
 political.8.a: "The national spirit outranks the government."
 political.9.t: "Faschistischer Staatsstreich"
 political.9.d: "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren des Faschismus warnten, als auch diejenigen, die ihn als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nDie neue [Root.GetAdjective]-Führung hat auch nicht vor, den Widerstand wachsen zu lassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen wird das, was danach kommt, wahrscheinlich nicht viel anders sein."
 political.9.a: "Es bedarf eines starken Staates, der die Menschen vor sich selbst schützt."
 political.10.t: "Bürgerkrieg für den Faschismus"
 political.10.d: "Obwohl die Versuche der faschistischen Bewegung, nationalistische Gefühle wiederzubeleben, einige Erfolge erzielt haben, ist der Widerstand gegen diese Ideen nach wie vor groß. Die Generäle, die den Sturz der gegenwärtigen Regierung planen, sind enttäuscht über das mangelnde Vertrauen, das die [Root.GetAdjective] Bevölkerung selbst in [Root.GetFascistParty] zu haben scheint.\n\nSie sind sich weiterhin sicher, dass die Menschen [Root.GetLeader] irgendwann überdrüssig werden, sind sich jedoch uneinig, wie sie vorgehen sollen. Einige fordern einen sofortigen Putsch, bevor [Root.GetName]s Feinde aktiv werden. Dies jedoch zu tun, während die öffentliche Unterstützung begrenzt ist, würde das Land in einen Bürgerkrieg stürzen."
 political.10.a: "Der Wille zur Macht ist bedeutungslos, wenn man zögert, sie zu ergreifen."
 political.10.b: "Sie müssen das Volk zuerst vereinen und dann regieren."
 political.11.t: "Form der faschistischen Angriffsdivisionen"
 political.11.d: "Das Politische und das Kriegswesen waren im Faschismus schon immer eng miteinander verknüpft. Parallel zu seiner wachsenden politischen Bewegung haben faschistische Parteien begonnen, paramilitärische Organisationen zum Schutz vor internen und externen Bedrohungen zu gründen, wobei die internen Bedrohungen ihre politischen Gegner sind. Obwohl viele Menschen diese Entwicklung beunruhigend finden, hat die Welle der militaristischen Aufregung dazu geführt, dass sich immer mehr Freiwillige unseren Streitkräften anschließen.\n\nDie politischen Führer der Bewegung haben darauf hingewiesen, dass ihre Gegner Grund zur Angst haben. Da die Armee auf mehreren Ebenen von so explizit politischen Elementen durchdrungen ist, beginnen sich die Feinde von [Root.GetName] und die Feinde des Faschismus immer ähnlicher zu werden."
 political.11.a: "Nur Landesverräter haben etwas zu befürchten."
 political.12.t: "Die Bedrohung durch den Kommunismus"
 political.12.d: "„[Root.GetLeader] möchte Sie glauben machen, dass [Root.GetName] sicher und vereint ist. Es ist keine Überraschung, dass solche Lügen die Gedanken unserer Leute vergiftet haben, wenn sich nebenan eine Schlange zusammengerollt hat! Man braucht nur über unsere Grenze zu schauen, um zu sehen, wie sich Landsleute im Namen des Kommunismus gegeneinander gewandt und das Ende der Nationen verkündet haben. Wie lange wird es dauern, bis sie auch unsere Nation für tot erklären? Wird [Root.GetRulingParty] uns vor dieser Bedrohung schützen?“\n\nDas Wachstum der faschistischen Bewegung in [Root.GetName] wurde durch die Nähe der kommunistischen Revolution gestärkt. Viele Gemäßigte, die den Faschismus normalerweise als ein weiteres fehlgeleitetes ideologisches Experiment abtun würden, finden dies auch für sie ein sehr reales Problem. Angesichts der Wahl zwischen dem Kommunismus unserer Nachbarn und einem faschistischen Regime würden sie zugegebenermaßen Letzteres vorziehen. Sie könnten sogar bereit sein, es aktiv zu unterstützen."
 political.12.a: "Wir werden die Vorhut im Kampf gegen die rote Bedrohung sein!"
 political.13.t: "Auf dem Weg zur Demokratie"
 political.13.d: "„Wenn wir die Stimmen des Volkes zum Schweigen bringen, wie kann dann einer von uns behaupten, die Stimme von [Root.GetName] selbst zu sein? Wenn wir Angst vor abweichenden Meinungen haben, wenn wir Angst haben, öffentlich angeprangert oder durch eine Volksabstimmung abgesetzt zu werden, dann fürchten wir in Wirklichkeit, von unseren eigenen Bürgern gehasst und geschmäht zu werden. Hat die [Root.GetRulingParty] wirklich so wenig Vertrauen in ihre Prinzipien?“\n\nEine vorsichtige und lose organisierte, aber leidenschaftliche Fraktion in der Regierung hat begonnen, sich für weniger repressive Maßnahmen gegen Staatsfeinde einzusetzen. Sie wollen die Öffentlichkeit durch Referenden und lokale Parteiversammlungen in die Entscheidungsfindung einbeziehen, selbst wenn dies bedeutet, die Zukunft der aktuellen Agenda zu riskieren."
 political.13.a: "Das können wir zunächst einmal intern besprechen."
 political.13.a.tt: "Erhöht die Chance auf interne Unterstützung bei der Organisation von Wahlen."
 political.13.b: "Da wir wissen, dass wir im Recht sind, können wir es uns leisten, unseren Feinden offener reden zu lassen."
 political.13.b.tt: "Erhöht die Chance, dass die Menschen ihre Unterstützung für die Demokratie zum Ausdruck bringen und eine Opposition bilden."
 political.14.t: "[Root.GetRulingParty] Debatten über Demokratie"
 political.14.d: "Überraschenderweise hat der Ruf nach mehr Referenden und weniger repressiven Maßnahmen gegen Regimegegner in parteiinternen Diskussionen eine gewisse Unterstützung erhalten. Während die Führung von [Root.GetRulingParty] skeptisch bleibt, haben mehrere einflussreiche Mitglieder einen Kurswechsel unterstützt.\n\nVielleicht sind sie zuversichtlich, dass sich in der Praxis wenig ändern wird, oder vielleicht sind sie insgeheim Verräter der Parteisache, wie viele ihrer Gegner es behaupten. Unabhängig davon sind einige der Führer von [Root.GetName] zu Kompromissen bereit, falls der öffentliche Ruf nach solchen Änderungen erklingen sollte."
 political.14.a: "Die Wahl muss nicht immer zwischen Freiheit und Tod stehen."
 political.14.a.tt: "Wenn die Politik von der Mehrheit der Bürger unterstützt wird, kann die Regierung Neuwahlen ansetzen."
 political.15.t: "Bildung einer demokratischen Opposition"
 political.15.d: "Die Lockerung der Beschränkungen für die öffentliche Verbreitung von Anti-[Root.GetRulingParty]-Propaganda hat erwartungsgemäß zu einer Zunahme öffentlicher Meinungsäußerungen geführt. Organisierte Demonstrationen und Flugblätter finden sich bisher hauptsächlich in akademischen Einrichtungen und einigen der benachteiligteren Gegenden von [Root.GetName], aber es besteht wenig Zweifel daran, dass sich die Bewegung ausbreitet.\n\nDie Führer des Landes sind in dieser Frage hin- und hergerissen. [Root.GetLeader], der die Parteiführung mit eiserner Hand im Griff hat, hat wenig Lust, die öffentliche Debatte vielfältiger zu gestalten. Die ersten Schritte wurden jedoch bereits unternommen, und es gibt möglicherweise kein Zurück mehr."
 political.15.a: "Die Bewegung scheint ohne Unterdrückung auf natürliche Weise zu wachsen."
 political.16.t: "Öffentlicher Aufruf zu Wahlen"
 political.16.d: "Die Demonstrationen des öffentlichen Widerstands, die einst auf begrenzte Gebiete beschränkt waren, sind heute weit verbreitet. Während sich die Menschen auf den Straßen versammeln, steht die [Root.GetRulingParty] an einem Scheideweg. Wenn wir weiterhin zulassen, dass sich diese Propaganda verbreitet, könnten die sowohl innerhalb der Partei selbst als auch in der Opposition vorgeschlagenen Referenden zeigen, dass wir nicht die Unterstützung der Öffentlichkeit haben. Die Einheit, die wir angestrebt haben, weicht einer Meinungsvielfalt, die sich gegen uns verbündet."
 political.16.a: "Auch wenn Reformen im Gange sind, müssen wir unsere Stärke zeigen, indem wir diesen Widerstand unterdrücken."
 political.16.b: "Geben Sie den Menschen Gehör."
 political.17.t: "Öffentliche Wahl in [Root.GetName]"
 political.17.d: "Da Meinungs- und Versammlungsfreiheit in [Root.GetName] immer mehr Akzeptanz finden, hat sich die Fraktion innerhalb der [Root.GetRulingParty], die Wahlen fordert, von geheimen Verschwörern zu öffentlich unterstützten Reformern gewandelt. Trotz der Proteste von [Root.GetLeader] hat das Land in den letzten Monaten langsam, aber stetig einen Schritt in Richtung Demokratie gemacht, und Wahlen scheinen nun der natürliche nächste Schritt zu sein.\n\nAllerdings sind bei weitem nicht alle [Root.GetAdjective] Bürger für demokratische Reformen. Innerhalb der Partei wird immer noch darüber diskutiert, ob mit der Abhaltung von Wahlen gewartet werden soll, bis eine stabile Entwicklung sichergestellt ist."
 political.17.a: "Diejenigen, die der [Root.GetRulingParty] treu sind, werden die Entscheidung jetzt unterstützen."
 political.17.b: "Bevor Wahlen stattfinden können, brauchen die Reformen eine breitere Unterstützung."
 political.18.t: "Faschisten fordern Referendum"
 political.18.d: "Die rasch wachsende [Root.GetAdjective] faschistische Bewegung hat nie behauptet, sie bräuchte die Unterstützung der Mehrheit, bevor sie die Macht ergreift, sondern setzt darauf, die Nation unter ihrer Führung zu vereinen, sobald ihre Herrschaft etabliert ist. Es scheint jedoch, dass ihre öffentliche Unterstützung rasch gewachsen ist. Viele Faschisten bezeichnen [Root.GetLeader] jetzt als Heuchler, der behauptet, die Wünsche des Volkes zu vertreten, während er in Wirklichkeit den Massen gegenüber taub ist.\n\nDer Aufruf zu einem Referendum wurde bisher von [Root.GetRulingParty]-Mitgliedern als typischer Versuch abgetan, das System zu stören, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Faschisten den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 political.18.a: "Unterdrücken Sie diese hasserfüllte Bewegung!"
 political.18.b: "Schenken Sie ihnen keine Beachtung."
 political.18.c: "Wenn das Volk es will, werden wir das Referendum abhalten."
 political.19.t: "Kommunisten fordern Referendum"
 political.19.d: "Marxistische Ideen haben in [Root.GetName] schon vor langer Zeit Fuß gefasst, haben aber in letzter Zeit viel mehr Unterstützung gewonnen. Die Bewegung hat sich über die politische Theorie hinaus in die politische Praxis ausgebreitet, wobei verärgerte Arbeiter und sogar einige bekannte Prominente ihre Unterstützung bekundeten. Die Kommunisten nennen dies Klassenbewusstsein. Die [Root.GetRulingParty] nennt es eine Abkürzung zu Aufständen und Verrat.\n\nDa sie wenig Vertrauen in [Root.GetLeader]s Bereitschaft zur Umsetzung der von ihnen geforderten Reformen haben, haben die lauteren Kommunisten ein sofortiges Referendum zur Absetzung der derzeitigen Regierung gefordert. Wir könnten zwar in der Lage sein, die Dynamik dieser Massenbewegung umzukehren, aber wenn uns dies nicht gelingt, wird dies zweifellos zur beliebteren kommunistischen Absetzungsmethode führen: Revolution."
 political.19.a: "Un-[Root.GetAdjective]-Aktivitäten müssen gestoppt werden!"
 political.19.b: "Ignorieren Sie sie, sie machen nur Ärger."
 political.19.c: "Das Referendum ist einem blutigen Aufstand vorzuziehen."
 political.20.t: "Demokraten fordern Referendum"
 political.20.d: "Es überrascht nicht, dass die Idee, dass das Volk die Nation regiert, in der es lebt, bei den Menschen leicht sehr populär werden kann. Die [Root.GetRulingParty] betrachtet die Idee der Demokratie, wie sie von diesen Bewegungen repräsentiert wird – Meinungsfreiheit, öffentliche Wahlen, freie Presse – natürlich lediglich als populistische Rhetorik, die [Root.GetLeader]s Regierung schwächen soll.\n\nEs lässt sich jedoch nicht leugnen, dass diese Ideen bei der [Root.GetAdjective] Bevölkerung Fuß gefasst haben. In wahrhaft demokratischer Manier fordern sie ein öffentliches Referendum über die Ablösung des derzeitigen Regimes. Obwohl diese Ideen derzeit leicht zu ignorieren sind, haben sie die Tendenz, sehr hartnäckig zu werden. Was wird mit uns geschehen, wenn wir eine friedliche Revolution unmöglich machen?"
 political.20.a: "Treibt sie zusammen."
 political.20.b: "Fahren Sie einfach wie gewohnt fort."
 political.20.c: "Wenn wir das Referendum annehmen, können wir vielleicht unser Erbe bewahren."
 political.21.t: "Faschisten marschieren auf [Root.Capital.GetName]"
 political.21.d: "Nachdem ihnen ihr Referendum verweigert wurde, das fast ein symbolischer Versuch war, legal die Macht zu ergreifen, haben die Faschisten ihre beträchtliche öffentliche Unterstützung und ihre Verbindungen zum [Root.GetAdjective] Militär genutzt, um einen Putschversuch zu unternehmen. Die [Root.GetRulingParty]-Regierung hat ihre Bedingungen abgelehnt und behauptet, sie werde bis zum Ende kämpfen, um [Root.GetName], wie wir es kennen, zu erhalten."
 political.21.a: "Wir werden sie um jeden Preis aufhalten!"
 political.21.b: "Die Faschisten tragen den wahren Geist von [Root.GetName] in sich!"
 political.22.t: "Kommunisten erheben sich"
 political.22.d: "Nachdem ihr Antrag auf ein Referendum abgelehnt wurde, verloren die wenigen Reformer der kommunistischen Bewegung in [Root.GetName] schnell an Einfluss gegenüber den radikaleren Elementen. Da [Root.GetRulingParty] sich weigerte, die öffentliche Unterstützung für die vorgeschlagenen Reformen anzuerkennen, verbreitete sich die romantische Sicht der Revolution allmählich weiter und die Führer der Bewegung wurden zu denen, die am leichtesten einen Aufstand anzetteln konnten. Diese Aufstände sind nun in einen umfassenden Bürgerkrieg ausgeartet, bei dem die Zukunft der Nation auf dem Spiel steht."
 political.22.a: "Wir werden nicht zulassen, dass sie unser Land ruinieren!"
 political.22.b: "Das Feuer der Revolution muss mit dem Blut der Unterdrücker gelöscht werden!"
 political.23.t: "Die [Root.GetAdjective]-Frühling"
 political.23.d: "Nachdem ihr Versuch, eine Volksabstimmung zur Einführung der Demokratie durchzuführen, abgelehnt wurde, haben die Leute, die hinter dem Vorschlag standen, das [Root.GetLeader]-Regime als unverbesserlich abgetan. Eine breite Koalition von Rebellengruppen, vereint durch ihr gemeinsames Ziel, repräsentativere politische Systeme in [Root.GetName] einzuführen, hat zu den Waffen gegriffen und angekündigt, dass sie nicht ruhen werden, bis die [Root.GetRulingParty] gestürzt ist."
 political.23.a: "Bewahre uns vor dieser Pöbelherrschaft!"
 political.23.b: "Endlich ist [Root.GetName] kostenlos!"
 political.24.t: "Verspottung der Faschisten"
 political.24.d: "Die Vernarrtheit der [Root.GetAdjective] Menschen in Nationalstolz und ihre Versuche, den Ruhm der Vergangenheit wiederzubeleben, scheinen vorüber zu sein. Ein böses Erwachen für ihre glühenden Anhänger, deren Uniformen, militaristisches Getue und übertriebene Reden heute häufiger Gegenstand von Spott als von Sympathie sind.\n\nEinst als Bedrohung für die [Root.GetRulingParty]-Machtbasis betrachtet, wird der [Root.GetAdjective] Faschismus heute zunehmend als absurde, extremistische Position und als Angriff auf die grundlegendsten Werte unserer Nation gesehen, eben jener Nation, die sie angeblich so hoch schätzen. Das Wort scheint eher als Beleidigung geeignet als als politische Bezeichnung."
 political.24.a: "Was für ein Haufen Clowns."
 political.25.t: "Kommunistischer Trend geht vorüber"
 political.25.d: "Viele Kommunisten hatten vorhergesagt, dass [Root.GetName] die nächste Nation sein würde, die der sogenannten internationalen Revolution zum Opfer fallen würde, aber nach ein paar Monaten Streiks und roten Fahnen auf den Straßen scheint die Bewegung abgeflaut zu sein. Die Arbeiterklasse, die angebliche treibende Kraft der Revolution, hat dringendere Sorgen als den Sturz von [Root.GetLeader] und scheint entschieden unbeeindruckt davon, wie gut diese Revolutionen anderswo verlaufen sind. Unterdessen haben sich die Intellektuellen, die leidenschaftlich dazu aufriefen, den Unterdrückern die Kehlen aufzuschlitzen, als überraschend zurückhaltend erwiesen, irgendetwas anzuzetteln, das ihren komfortablen Lebensstil tatsächlich stören könnte.\n\nDie Rede von der Revolution wird wahrscheinlich weitergehen, ob bei billigem Bier oder teurem Wein, aber es wird wahrscheinlich nur Gerede und nichts weiter sein."
 political.25.a: "Was für ein Haufen Heuchler."
 political.26.t: "Die demokratische Bewegung verstummt"
 political.26.d: "Nach einigen Monaten lautstarker Opposition gegen das Regime von [Root.GetLeader], in denen öffentliche Wahlen und liberalere Gesetze zur Versammlungs- und Meinungsfreiheit gefordert wurden, scheint die Bewegung auseinander gefallen zu sein. Die Menschen äußern nun mehr Bedenken hinsichtlich der Stabilität von [Root.GetName], falls solche Reformen stattfinden sollten, wobei diejenigen, die lautstark nach Demokratie rufen, eher als Unruhestifter denn als alles andere angesehen werden.\n\nNoch mysteriöser ist, dass viele der führenden Persönlichkeiten der Bewegung verschwunden zu sein scheinen oder ihre Arbeit plötzlich eingestellt haben. Vielleicht haben sich einige von ihnen entschieden, ins Exil zu gehen, als sie das Scheitern ihrer Bemühungen sahen. Ungeachtet dessen bestreitet die Regierung von [Root.GetRulingParty] jegliche Kenntnis und Beteiligung daran."
 political.26.a: "Was für ein Haufen Drückeberger."
 political.27.t: "[Root.GetLeader] Gibt neutrale Außenpolitik auf"
 political.27.d_fascism: "Nach [Root.GetRulingParty]s jüngster Machtübernahme kündigte [Root.GetLeader] an, dass [Root.GetName] seine neutrale Außenpolitik nicht länger beibehalten werde.\n„Die Welt ist verworren und komplex geworden. Allein sind wir nicht mehr sicher. Wir müssen mit unseren faschistischen Partnern gegen unsere Feinde kämpfen. Wenn wir uns nicht für eine Seite entscheiden, werden wir allein untergehen.“"
 political.27.d_communism: "Nach [Root.GetRulingParty]s jüngster Machtübernahme kündigte [Root.GetLeader] an, dass [Root.GetName] seine neutrale Außenpolitik nicht länger beibehalten werde.\n„Die Welt ist verworren und komplex geworden. Dieses Land hat immer zu seinen Prinzipien gestanden und war bereit, sie zu verteidigen. Allein sind wir nicht mehr sicher. Neutralität ist nicht mehr der sichere Hafen, der sie einmal war, und diejenigen, die in dieser Welt nach Macht streben, respektieren sie nicht. Wir müssen mit unseren kommunistischen Brüdern gegen die Mächte kämpfen, die uns unterdrücken wollen. Gegen die bürgerliche Mehrheit, die nichts anderes will, als uns klein zu halten. Wenn wir nicht Stellung beziehen, werden wir allein untergehen.“"
 political.27.a: "Für die Zukunft von [Root.GetName]"
 political.28.t: "[Root.GetNameDef] Wiedervereint"
 political.28.d: "Der schreckliche Bürgerkrieg, der unser Land verwüstet hat, nähert sich seinem Ende und wir haben endlich eine politische Einigung erzielt. Wir sind uns jetzt mit unseren [Root.GetAdjective] Mitbürgern einig und werden gemeinsam unsere großartige Nation wieder aufbauen. Die Feinde, die versucht haben, aus unseren internen Machtkämpfen Kapital zu schlagen, müssen sich jetzt einem vereinten [Root.GetAdjective] Staat stellen.\n\nDie neue [Root.GetRulingIdeology] [Root.GetName] wird nie wieder gespalten sein!"
 political.28.a: "Endlich vereint!"
 THREAT_FROM_EFFECT: "Bedrohung durch Aktionen"
 war_justification.1.t: "[Root.GetLeader] Speaks Against [FROM.GetName]"
 war_justification.1.d: "'Does [FROM.GetName] belong to the [FROM.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [FROM.GetAdjective] or does it belong to [Root.GetNameDef]?'\n\n[Root.GetLeader]'s speech today suggested that [Root.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [Root.GetAdjective] people are coming to accept that war is inevitable."
 war_justification.1.a: "Die Zukunft gehört [Root.GetName]!"
 war_justification.2.t: "[Root.GetLeader] Denounces [FROM.GetAdjective] Ideals"
 war_justification.2.d: "'The [FROM.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [Root.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[Root.GetRulingParty] has long derided the weakness of the [FROM.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.2.a: "[Root.GetName] steht vereint unter [Root.GetLeader]."
 war_justification.3.t: "[Root.GetLeader] Warns Against [FROM.GetAdjective] Communism"
 war_justification.3.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[Root.GetLeader]'s hatred of communists has been well known since before [Root.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [FROM.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.3.a: "Wer Nationen ablehnt, wird ihre eigene untergehen sehen."
 war_justification.4.t: "[Root.GetName] bereitet sich auf großen Kampf vor"
 war_justification.4.d: "'The [FROM.GetAdjective] are a people who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [FROM.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [FROM.GetName] and [Root.GetName] has given way to a campaign to take their territory by force."
 war_justification.4.a: "Durch unseren Sieg wird Geschichte geschrieben."
 war_justification.5.t: "[Root.GetLeader] Brings Revolution to [FROM.GetName]"
 war_justification.5.d: "'While we have consolidated the socialist society in [Root.GetName], many nations still suffer under the despots of old. The workers of [FROM.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [FROM.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [FROM.GetAdjective] people. With the revolution we have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [FROM.Capital.GetName] as well!'\n\n[Root.GetLeader] has abandoned all attempts at diplomatic rhetoric towards [FROM.GetRulingParty]-controlled [FROM.GetName]. The quest to eradicate all borders is now strictly focused on eradicating their borders."
 war_justification.5.a: "[FROM.GetAdjective] workers, your liberation is near!"
 war_justification.6.t: "[Root.GetLeader] Calls to Aid [FROM.GetAdjective] Workers"
 war_justification.6.d: "'Is there a greater lie than the supposed liberty of the [FROM.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [Root.GetAdjective] intervention.'\n\n[Root.GetLeader] has polemicized against the government in [FROM.GetName] for a long time in party meetings, but this rhetoric is now used more frequently in public. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.6.a: "Wir werden ihre bürgerliche Diktatur zerschlagen!"
 war_justification.7.t: "[FROM.GetAdjective] Communism Failing"
 war_justification.7.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [FROM.GetRulingParty] of [FROM.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of the [FROM.GetAdjective] revolution, [Root.GetLeader] has expressed increased disappointment with how it has developed. The [Root.GetRulingParty] may have to intervene before it is too late."
 war_justification.7.a: "Es ist noch Zeit, ihren Versuch des Sozialismus zu retten."
 war_justification.8.t: "[Root.GetLeader] Calls for Crushing [FROM.GetAdjective] Nationalism"
 war_justification.8.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [FROM.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [FROM.GetAdjective], but the animosity has intensified lately. It now appears that conflict will arise sooner rather than later."
 war_justification.8.a: "Tod den Faschisten!"
 war_justification.9.t: "Diplomacy with [FROM.GetName] Breaks Down"
 war_justification.9.d: "'Despite our attempts to find a diplomatic solution to our conflict with [FROM.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [FROM.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [FROM.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[Root.GetAdjective] intervention in [FROM.GetName] has been a hot issue, with some politicians in the opposition claiming that [Root.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.9.a: "Manchmal muss man den Berg des Konflikts erklimmen."
 war_justification.10.t: "[Root.GetLeader] Calls for Intervention in [FROM.GetName]"
 war_justification.10.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [FROM.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [Root.GetAdjective] nor the [FROM.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [Root.GetAdjective] invasion of [FROM.GetName] in the future. History may surprise us yet."
 war_justification.10.a: "[FROM.GetName] is a dubious democracy anyway."
 war_justification.11.t: "[Root.GetLeader] spricht sich gegen die Rote Bedrohung aus"
 war_justification.11.d: "'Without a doubt, [FROM.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [FROM.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe threat of subversive activity undermining our democracy, fueled by [FROM.GetAdjective] ambitions, has become a hotly debated topic recently. While representatives in opposition have called this a Red Scare aimed at pursuing war with [FROM.GetName], the rhetoric of the [Root.GetRulingParty] has been highly successful so far."
 war_justification.11.a: "Sie folgen einer gewalttätigen Ideologie. Welche Reaktion können sie außer Gewalt erwarten?"
 war_justification.12.t: "[Root.GetLeader] Confronts [FROM.GetAdjective] Fascism"
 war_justification.12.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [FROM.GetRulingParty] now holds [FROM.GetName]. People may argue that we should not provoke conflict, that we should trust [FROM.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nPeople who have long hoped to avoid a direct confrontation with [FROM.GetName] have now been strongly opposed by [Root.GetLeader], who argues that we in Machiavellian terms are merely postponing war to the advantage of the enemy. At this rate, we may strike the first blow after all."
 war_justification.12.a: "Es kann in unserer Zeit keinen Frieden geben, bis sie verschwunden sind."
 war_justification.13.t: "[Root.GetLeader] Calls for War Against [FROM.GetName]"
 war_justification.13.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [FROM.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\n[Root.GetLeader]'s hostile rhetoric towards [FROM.GetName] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of our leader."
 war_justification.13.a: "Es mag eine schwierige Entscheidung sein, aber wir müssen dahinter stehen."
 war_justification.14.t: "[Root.GetLeader] Challenges [FROM.GetAdjective] Pretensions"
 war_justification.14.d: "'[FROM.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [FROM.GetName] long held by the [Root.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [FROM.GetAdjective] people want to avoid war, [Root.GetLeader] claims that their elected leaders have provoked it through their arrogance."
 war_justification.14.a: "Sie wissen nicht, wie stark uns unsere Strapazen gemacht haben."
 war_justification.15.t: "[Root.GetLeader] Wants to Restore Order in [FROM.GetName]"
 war_justification.15.d: "'The [Root.GetAdjective] national spirit is strong, but not all nations are so fortunate. [FROM.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [Root.GetName] against this threat.'\n\nWhile the [Root.GetRulingParty] has always opposed communism, [FROM.GetName] has been a target of particular attacks in recent speeches. Whether or not the attack on the [Root.GetAdjective] nation from communists is a real threat, the preemptive attack on [FROM.GetAdjective] communism is already in the works."
 war_justification.15.a: "Die in der Revolution Ermordeten werden gerächt!"
 war_justification.16.t: "[Root.GetLeader] Calls Out [FROM.GetAdjective] Oppressors"
 war_justification.16.d: "'My opponents would have you believe that my rule is like that of the [FROM.GetRulingParty] in [FROM.GetName]. They could not be more wrong. While [FROM.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [Root.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [Root.GetLeader] regime has adopted a hostile policy towards the [FROM.GetAdjective] nation. Whatever our leaders may be called, fascist is a word reserved for our enemies."
 war_justification.16.a: "Tradition und Pragmatismus werden immer über Fanatismus und Terror triumphieren."
 war_justification.17.t: "[Root.GetLeader] Questions [FROM.GetAdjective] Sovereignty"
 war_justification.17.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [Root.GetName] ends and [FROM.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [Root.GetLeader]'s recent speeches, an invasion of [FROM.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.17.a: "Wir müssen uns gemeinsam für diese Sache einsetzen!"
 war_justification.18.t: "[Root.GetLeader] Questions the Motives of [FROM.GetName]"
 war_justification.18.d: "'There is no doubt that [FROM.GetName] is preparing for war. The changes in economic policy make it plain to see that the [FROM.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [Root.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [Root.GetRulingParty] have turned their eyes towards [FROM.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [Root.GetName] is preparing for war."
 war_justification.18.a: "Zumindest durch Krieg kann dieser Konflikt beendet werden."
 war_justification.19.t: "[Root.GetLeader] Angered by [FROM.GetAdjective] Posturing"
 war_justification.19.d: "'Those naïve citizens of [Root.GetName] who imagine the [FROM.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [FROM.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nThe [FROM.GetAdjective] military presence close to our territory has sparked increased concern as this nation appears more and more to be the enemy of the [Root.GetRulingParty]. Whether it is the cause or the effect of their polemic is a matter of contention."
 war_justification.19.a: "Ungeachtet dessen müssen wir die Bevölkerung auf den Krieg vorbereiten."
 war_justification.20.t: "[Root.GetLeader] Advocates Invasion of [FROM.GetName]"
 war_justification.20.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [FROM.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [Root.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [Root.GetRulingParty] leaders, most prominently [Root.GetLeader], has been calling the public to support an invasion of [FROM.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.20.a: "Die Nation steht hinter dieser wichtigen Entscheidung."
 war_justification.201.t: "[FROM.GetLeader] Speaks Against [Root.GetName]"
 war_justification.201.d: "'Does [Root.GetName] belong to the [Root.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [Root.GetAdjective] or does it belong to [FROM.GetName]?'\n\n[FROM.GetLeader]'s speech today, suggested that [FROM.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [FROM.GetAdjective] people have accepted that war is inevitable. [Root.GetName] must also prepare."
 war_justification.201.a: "Warum darf man uns nicht erlauben, in Frieden zu leben?"
 war_justification.202.t: "[FROM.GetLeader] Denounces [Root.GetAdjective] Ideals"
 war_justification.202.d: "'The [Root.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [FROM.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[FROM.GetRulingParty] has long derided the weakness of the [Root.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.202.a: "As expected from fascist scum like [FROM.GetLeader]."
 war_justification.203.t: "[FROM.GetLeader] Warns Against [Root.GetAdjective] Communism"
 war_justification.203.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[FROM.GetLeader]'s hatred of communists has been well known since before [FROM.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [Root.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.203.a: "Wenn sie unsere Sache fürchten, fürchten sie ihr eigenes Volk."
 war_justification.204.t: "[FROM.GetName] Prepares for Great Struggle"
 war_justification.204.d: "'The [Root.GetAdjective] are a people, who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [Root.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [Root.GetName] and [FROM.GetName] has given way to a campaign to take their territory by force."
 war_justification.204.a: "Lasst sie kommen!"
 war_justification.205.t: "[FROM.GetLeader] Bring Revolution to [Root.GetName]"
 war_justification.205.d: "'While we have consolidated the socialist society in [FROM.GetName], many nations still suffer under the despots of old. The workers of [Root.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [Root.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [Root.GetAdjective] people. We have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [Root.Capital.GetName] as well!'\n\n[FROM.GetLeader] has abandoned all attempts at diplomacy with our government. The communist task of eradicating all borders is now strictly focused on eradicating our borders."
 war_justification.205.a: "[Root.GetLeader] ist ein besserer Herrscher als jeder revolutionäre Opportunist!"
 war_justification.206.t: "[FROM.GetLeader] Calls to Aid [Root.GetAdjective] Workers"
 war_justification.206.d: "'Is there a greater lie than the supposed liberty of the [Root.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [FROM.GetAdjective] intervention.'\n\nUnwilling to accept that our people may be satisfied without their social experiments, the communist regime in [FROM.GetName] has openly threatened to attack our nation. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.206.a: "Welchen Wert haben ihre Überzeugungen, wenn sie sie uns aufzwingen müssen?"
 war_justification.207.t: "[Root.GetAdjective] Der Kommunismus scheitert"
 war_justification.207.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [Root.GetRulingParty] of [Root.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of [Root.GetRulingParty]'s victory in [Root.Capital.GetName], [FROM.GetLeader] has drifted away from [Root.GetLeader]'s philosophy. The conflict has escalated to the point where they are preparing to invade to enforce their brand of socialism on us."
 war_justification.207.a: "Sie verstehen nicht, was die Revolution für das [Root.GetAdjective] Volk bedeutet."
 war_justification.208.t: "[FROM.GetLeader] Calls for Crushing [Root.GetAdjective] Nationalism"
 war_justification.208.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [Root.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [Root.GetAdjective], but the animosity has intensified lately. Hearing [FROM.GetLeader] speak, it appears that conflict will arise sooner rather than later."
 war_justification.208.a: "Tod den Kommunisten!"
 war_justification.209.t: "Diplomatie mit [Root.GetName] scheitert"
 war_justification.209.d: "'Despite our attempts to find a diplomatic solution to our conflict with [Root.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [Root.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [Root.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[FROM.GetAdjective] intervention in our domestic affairs has been a hot issue, with some politicians in their opposition claiming that [FROM.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.209.a: "Ihre herablassende Rhetorik wird uns nicht einschüchtern."
 war_justification.210.t: "[FROM.GetLeader] Calls for Intervention in [Root.GetName]"
 war_justification.210.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [Root.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [FROM.GetAdjective] nor the [Root.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [FROM.GetAdjective] invasion of [Root.GetName] in the future. History may surprise us yet."
 war_justification.210.a: "[FROM.GetName] is a dubious democracy anyway, pursuing such aggressive action."
 war_justification.211.t: "[FROM.GetLeader] Speaks Against Red Menace"
 war_justification.211.d: "'Without a doubt, [Root.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [Root.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe nascent worker's movement has intimidated [FROM.GetAdjective] leaders. While representatives in their opposition have called this a Red Scare aimed at pursuing war with us, the rhetoric of the [FROM.GetRulingParty] has been highly successful so far."
 war_justification.211.a: "Solange Profit zu machen ist, werden die Kapitalisten einen Krieg inszenieren."
 war_justification.212.t: "[FROM.GetLeader] Confronts [Root.GetAdjective] Fascism"
 war_justification.212.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [Root.GetRulingParty] now holds [Root.GetName]. People may argue that we should not provoke conflict, that we should trust [Root.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nJealous of the glorious society we are building and the legacy it is founded upon, the [FROM.GetAdjective] seem prepared to start a war to destroy it. So much for their pretensions of peace."
 war_justification.212.a: "Unvermeidlich. Besser, es hinter sich zu bringen."
 war_justification.213.t: "[FROM.GetLeader] Calls for War Against [Root.GetName]"
 war_justification.213.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [Root.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\nIn a recent speech to the [FROM.GetAdjective] people the hostile rhetoric towards [Root.GetName] has intensified and [FROM.GetLeader] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of their leader."
 war_justification.213.a: "Sie werden es bereuen, uns zu ihren Feinden gemacht zu haben."
 war_justification.214.t: "[FROM.GetLeader] Challenges [Root.GetAdjective] Pretensions"
 war_justification.214.d: "'[Root.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [Root.GetName] long held by the [FROM.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [Root.GetAdjective] people want to avoid war, [FROM.GetLeader] claims that our elected leaders have provoked it through their arrogance."
 war_justification.214.a: "The voices for peace among the [FROM.GetAdjective] people are, of course, silenced."
 war_justification.215.t: "[FROM.GetLeader] Wants to Restore Order in [Root.GetName]"
 war_justification.215.d: "'The [FROM.GetAdjective] national spirit is strong, but not all nations are so fortunate. [Root.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [FROM.GetName] against this threat.'\n\nWhile the [FROM.GetRulingParty] has always opposed communism, [Root.GetName] has been a target of particular attacks in recent speeches. Fearing their nation's inevitable progress to the next stage of history, a preemptive attack on [Root.GetAdjective] communism is already in the works."
 war_justification.215.a: "Es ist zu spät, die erzielten Fortschritte rückgängig zu machen."
 war_justification.216.t: "[FROM.GetLeader] Calls Out [Root.GetAdjective] Oppressors"
 war_justification.216.d: "'My opponents would have you believe that my rule is like that of the [Root.GetRulingParty] in [Root.GetName]. They could not be more wrong. While [Root.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [FROM.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [FROM.GetLeader] regime has adopted a hostile policy towards the [Root.GetAdjective] nation. Our visionary plans for future greatness have put their nation to shame, and unsurprisingly, they feel threatened."
 war_justification.216.a: "Wenn sie unsere Macht testen wollen, werden sie es bereuen."
 war_justification.217.t: "[FROM.GetLeader] Questions [Root.GetAdjective] Sovereignty"
 war_justification.217.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [FROM.GetName] ends and [Root.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [FROM.GetLeader]'s recent speeches, an invasion of [Root.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.217.a: "Hat die Welt nichts aus dem Ersten Weltkrieg gelernt?"
 war_justification.218.t: "[FROM.GetLeader] Questions the Motives of [Root.GetName]"
 war_justification.218.d: "'There is no doubt that [Root.GetName] is preparing for war. The changes in economic policy make it plain to see that the [Root.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [FROM.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [FROM.GetRulingParty] have turned their eyes towards [Root.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [FROM.GetName] is preparing for war."
 war_justification.218.a: "Genau aus diesem Grund müssen wir bereit sein."
 war_justification.219.t: "[FROM.GetLeader] Angered by [Root.GetAdjective] Posturing"
 war_justification.219.d: "'Those naïve citizens of [FROM.GetName] who imagine the [Root.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [Root.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nOur military presence close to [FROM.GetAdjective] territory has sparked increased concern, since they interpret our troop movements as proof hostile intent. They hardly seem to have considered that their aggressive rhetoric is the reason for our defensive measures."
 war_justification.219.a: "Nach diesen Drohungen können wir kaum abrüsten."
 war_justification.220.t: "[FROM.GetLeader] Advocates Invasion of [Root.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [Root.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [FROM.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [FROM.GetRulingParty] leaders, most prominently [FROM.GetLeader], has been calling the public to support an invasion of [Root.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "Wir sollten uns besser vorbereiten. Der Krieg wird kommen."
 war_justification.301.t: "[Root.GetLeader] Kritik an schwacher Außenpolitik"
 war_justification.301.d: "„Wir hatten die Chance, unsere Feinde anzugreifen, aber die [Root.GetRulingParty] hat sie verstreichen lassen. Dies ist nicht nur ein weiterer vernichtender Fall in einer Reihe verpasster Gelegenheiten, die Position von [Root.GetName] international zu stärken, sondern auch ein Zeichen dafür, dass ihre Behauptung, im Interesse des [Root.GetAdjective] Volkes zu handeln, größtenteils leere Rhetorik ist. Es ist Zeit für eine Änderung der Politik.“\n\nUnser Versagen, den Krieg fortzusetzen, den viele erwartet hatten, wurde von unseren politischen Gegnern scharf kritisiert. Wenn wir unsere militärischen Pläne nicht umsetzen, wird es für uns schwieriger, die Menschen davon zu überzeugen, in welche Richtung wir [Root.GetName] führen."
 war_justification.301.a: "Wollen sie nicht einen Krieg vermeiden?"
 war_justification.301.b: "Außerhalb der Parteiversammlungen gibt es keinen Raum für öffentliche Meinungsverschiedenheiten."
 war_justification.301.c: "Wir können nicht zulassen, dass die Leute [Root.GetLeader] der Feigheit bezichtigen!"
 nuke_dropped.1.t: "Atomic Bombing of [FROM.FROM.GetName]"
 nuke_dropped.1.d: "For the first and hopefully last time in history, a nuclear bomb has been detonated in [FROM.FROM.GetName] as part of international warfare. The unprecedented destruction stands as a testament to the devastating power of this new weapon, which is feared not only for what it can do to its targets, but what implications it has for the one who deploys it and for humanity itself.\n\nThe world holds its breath waiting for what will come next. Will this force [FROM.FROM.Owner.GetName] to surrender to avoid further terror, or will it only strengthen their resolve to strike back against those who would resort to such measures?"
 nuke_dropped.1.a: "Das Atomzeitalter hat tatsächlich begonnen."
 nuke_dropped.1.b: "Wir werden alles Notwendige tun, um die [Root.GetAdjective] Menschen zu schützen."
 nuke_dropped.2.t: "Atombombenabwurf auf Hiroshima"
 nuke_dropped.2.d: "„Die Straßen waren wie eine Höllenszene.“\n- Kuniyoshi Aikawa\n\nHeute wurde über der Stadt Hiroshima in 580 Metern Höhe eine Atombombe gezündet. Mehr als zwei Drittel der Stadt wurden sofort zerstört. Obwohl die Stadt erdbebensicher gebaut ist, haben nur wenige stabile Gebäude die Explosion überstanden.\n\nWährend die Macht der Atombombe in der Öffentlichkeit hochgespielt wird, wird der menschliche Verlust durch die Waffe heruntergespielt. Keine Seite möchte über den Schrecken des Ereignisses nachdenken, aber sein Vermächtnis wird sein, dass im Handumdrehen Menschenleben verloren gingen und die Folgen lang anhalten."
 nuke_dropped.2.a: "Wie viele werden noch fallen, bevor dieser Krieg endet?"
 nuke_dropped.2.b: "Wir müssen schnell handeln, um den Opfern zu helfen."
 nuke_dropped.3.t: "Atombombenabwurf auf Nagasaki"
 nuke_dropped.3.d: "Eine ursprünglich für Kokura vorgesehene Atombombe wurde heute über Nagasaki gezündet. Die Wetterbedingungen zwangen die Flugzeuge, ihre Mission abzubrechen. Eine Kombination aus Rauch, Wolken und technischen Schwierigkeiten war ausschlaggebend für dieses Ereignis, das möglicherweise die Geschichte verändern könnte.\n\nDie Auswirkungen der Bombe wurden durch die Lage der Stadt in einem Tal etwas eingedämmt, aber die Schäden sind dennoch schwerwiegend. Einige Militäreinrichtungen wurden getroffen, aber die katastrophalen Verluste unter der Zivilbevölkerung überschatten sie bei weitem. Es kann Jahrzehnte dauern, bis wir die langfristigen Auswirkungen dieser Waffe mit Sicherheit kennen."
 nuke_dropped.3.a: "Will this lead to [FROM.Owner.GetAdjective] surrender?"
 nuke_dropped.3.b: "Wir hatten gehofft, Nagasaki würde verschont bleiben."
 nuke_dropped.4.t: "Atombombenangriff auf Berlin"
 nuke_dropped.4.d: "Today, at [GetDateText], the German capital of Berlin was struck by a nuclear explosion. The city has suffered several attacks, in this war and the last, but all else pale in comparison to this. Not since the Thirty Years' War has Berlin seen comparable devastation - considering its growth, this was seen as an impossibility.\n\nThe Führerbunker appears to have survived the blast at least partially due to the bomb detonating away from its planned epicenter, and [FROM.Owner.GetLeader] is rumored to still be alive, if outraged. How [FROM.Owner.GetAdjective] leaders should be evacuated and if they can be protected from the fallout is another matter, however."
 nuke_dropped.4.a: "Heute bin ich erleichtert, kein Berliner zu sein."
 nuke_dropped.4.b: "Unsere Feinde haben das Herz der Nation getroffen!"
 nuke_dropped.5.t: "Atombombenangriff auf London"
 nuke_dropped.5.d: "A nuclear explosion has devastated the city of London today. Despite the city's anti-air defenses, [FROM.Owner.GetName] was not prepared for this attack. At [GetDateText], Big Ben chimed for the last time, having been melted by the blast. Early reports suggest Buckingham Palace has been completely leveled and the whereabouts of the royal family are currently unknown.\n\n[FROM.Owner.GetLeader] has nevertheless been confirmed to have survived and is preparing a rousing speech for the radio later today. With morale at an all-time low, the British people is in dire need of this - or a very eloquent surrender."
 nuke_dropped.5.a: "Es ist schwierig, angesichts einer nuklearen Druckwelle die Fassung zu bewahren."
 nuke_dropped.5.b: "Gott schütze den König!"
 nuke_dropped.6.t: "Atombombenangriff auf Kyoto"
 nuke_dropped.6.d: "The city of Kyoto, a prominent [FROM.Owner.GetAdjective] industrial center, was struck today by a nuclear bomb. It is speculated that the city was chosen as a target because it has been regarded as an intellectual center.\n\nThe beauty and historical significance of the Kyoto led many to assume it would be spared from the bomb, but it appears the terror of raining destruction on such a place has rather been seen as a benefit, increasing the psychological impact of the attack. The city's location in the valley somewhat limited the blast, but the old Imperial Palace and many industrial buildings have been completely destroyed."
 nuke_dropped.6.a: "In einem Krieg wie diesem bedeuten Erbe und Schönheit nichts."
 nuke_dropped.6.b: "Wenn sie das Alte zerstören, werden wir das Neue bauen."
 nuke_dropped.7.t: "Atombombenangriff auf Tokio"
 nuke_dropped.7.d: "Today, a nuclear strike was directed at the heart of the Japanese Empire. The capital of Tokyo, although expected to be the target of firebombing, was never assumed to be a prioritized target of this new weapon. Yet ultimately, perhaps due to the significance of the new capital and Imperial Palace which has now been destroyed, an even more all-consuming fire has fallen on the city.\n\nAlthough [FROM.Owner.GetLeader] is reported to have survived, the event has raised questions about how far Japan's enemies are willing to go. If the war does not end with this, what targets remain? What is left to threaten with?"
 nuke_dropped.7.a: "Bedeutet dies das Ende des japanischen Kaiserreichs?"
 nuke_dropped.7.b: "As long as [FROM.Owner.GetLeader] lives, so does the Empire."
 nuke_dropped.8.t: "Atombombenabwurf auf Washington D.C."
 nuke_dropped.8.d: "A nuclear bomb was detonated today over the capital of the United States. In an attack clearly directed at the political center and historical legacy of the US, the White House, the Capitol and a number of monuments and memorials were wiped off the face of the Earth. Even the Burning of Washington over a century ago pales in comparison to the destruction visited upon the city by this devastating weapon.\n\nAlthough President [FROM.Owner.GetLeader] has been brought to safety, the nation has been shaken to its core. No doubt, the US hoped to be the first and only country to wield such a weapon. Those hopes have now been shattered in the worst possible way."
 nuke_dropped.8.a: "Eine unteilbare Nation im Gegensatz zu einem teilbaren Atom."
 nuke_dropped.8.b: "Der Adler wird wie ein Phönix aus der Asche auferstehen."
 nuke_dropped.9.t: "Atombombenangriff auf Rom"
 nuke_dropped.9.d: "Eine Atomexplosion hat heute die Stadt Rom erschüttert und Menschen auf der ganzen Welt schockiert. Angesichts ihrer historischen und künstlerischen Schätze hätten viele nie gedacht, dass die antike Stadt das Ziel einer derart wahllosen Zerstörung sein würde. Da auch die Vatikanstadt teilweise zerstört wurde und der Aufenthaltsort des Papstes unbekannt ist, hat das Ereignis nicht nur Italiener, sondern Katholiken auf der ganzen Welt entsetzt.\n\nRoms rasantes Wachstum im letzten Jahrzehnt wurde durch den Angriff fast vollständig zunichte gemacht. Eine Zeit lang sah es so aus, als könnte die Stadt nach Kriegsende zum Wiederaufbau der Nation beitragen. Diese Hoffnungen sind nun, zusammen mit vielen Menschen, zu Staub zerfallen."
 nuke_dropped.9.a: "Die Bombe wurde abgeworfen!"
 nuke_dropped.9.b: "Rom wird nicht an einem Tag wieder aufgebaut werden..."
 nuke_dropped.10.t: "Atombombenangriff auf Paris"
 nuke_dropped.10.d: "Heute wurde über Paris eine Atombombe gezündet, die große Zerstörungen und zahllose Opfer forderte. Frankreich stand unter Schock, als seine Hauptstadt trotz Jahrhunderten voller Kriege und Revolutionen den vielleicht verheerendsten Angriff aller Zeiten erlitt. Die Pariser hatten vielleicht mit einer Eroberung gerechnet, aber nicht mit völliger, brutaler Verwüstung.\n\nSiegesparaden auf den Champs-Élysées an den Überresten des Arc de Triomphe vorbei scheinen angesichts des derzeitigen Zustands der Stadt unwahrscheinlich. Vielleicht wird in den kommenden Jahrzehnten ein neues Paris entstehen, doch in den Augen der Öffentlichkeit ist Paris, die Stadt der Belle Époque, für immer verschwunden."
 nuke_dropped.10.a: "Die Stadt des Lichts ist ausgebrannt."
 nuke_dropped.10.b: "Noch gestern schien es, als ob es für immer Paris gäbe."
 nuke_dropped.11.t: "Atombombenangriff auf Moskau"
 nuke_dropped.11.d: "A city many have tried and failed to conquer, Moscow was the target of a nuclear attack today. The explosion was directed at the heart of [FROM.Owner.GetAdjective] leadership, the Kremlin having been nearly completely destroyed by the blast.\n\n[FROM.Owner.GetLeader], having grown more aware and fearful of all possible and impossible threats recently, evacuated in time and survived. However, even the vastness of [FROM.Owner.GetName] may not be enough to escape such a ruthless enemy. Indeed, if this continues, the nation will soon consist only of two kinds of wastelands: Those which were there in the first place, and those created by its enemies."
 nuke_dropped.11.a: "Wird ein nuklearer Winter Moskau nicht nur zu einem schwierigeren Ziel machen?"
 nuke_dropped.11.b: "Sie können alle unsere Städte niederbrennen, aber sie werden sie niemals einnehmen."
 nuke_dropped.12.t: "Atombombenangriff auf Kopenhagen"
 nuke_dropped.12.d: "Heute wurde Kopenhagen von einer Atomexplosion getroffen. Die Hauptstadt, die dank der Neutralität Dänemarks im Ersten Weltkrieg der Zerstörung entging, wuchs und hat seit den Napoleonischen Kriegen keinen annähernd so verheerenden Angriff mehr erlebt. Auch die Umgebung des Öresunds war von erheblichen radioaktiven Strahlungen betroffen und Überlebende haben aus Angst vor weiteren Angriffen begonnen, nach Fünen und auf das Festland zu fliehen.\n\nDer Aufenthaltsort von König Christian X. ist derzeit unbekannt und die Moral der Nation wurde durch den Angriff schwer beschädigt. Es bleibt abzuwarten, ob dies der Anfang vom Ende für eine der ältesten Nationen Europas ist."
 nuke_dropped.12.a: "Im Staat Dänemark wird etwas verstrahlt."
 nuke_dropped.12.b: "Die Stadt brannte schon einmal, ist aber nicht zerstört worden."
 nuke_dropped.12.c: "Mit Plutonium zwingen wir die Dänen in die Knie!"
 nuke_dropped.13.t: "Atombombenangriff auf Stockholm"
 nuke_dropped.13.d: "Die schöne Stadt Stockholm, das stolze Venedig des Nordens, wurde heute von einer Atombombe getroffen. Trotz ihrer Bemühungen, in der Vergangenheit neutral zu bleiben, haben die Schweden nun den höchsten Preis für einen internationalen Konflikt bezahlt. Das Epizentrum der Explosion befand sich mitten im südlichen Zentrum Stockholms, einem Gebiet, das für zukünftige Entwicklung und große Bauprojekte vorgesehen war und nun unwiederbringlich zerstört ist.\n\nEin Großteil der Stadt ist nicht mehr wiederzuerkennen, aber die alten Gebäude in Slussen scheinen die Explosion besser überstanden zu haben als erwartet. Es wurde beschlossen, dass es als Denkmal für die Widerstandsfähigkeit der Stadt für immer unberührt bleiben soll."
 nuke_dropped.13.a: "Damit würde die schwedische Neutralität nur noch eine Erinnerung sein."
 nuke_dropped.13.b: "Der schwedische Tiger wird seine Streifen nicht verlieren!"
 country_capitulated.0.t: "[Root.GetName] hat kapituliert"
 country_capitulated.0.d_positive_both_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war continues elsewhere, this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for all of the [FROM.FROM.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nDespite this devastating loss the war against [FROM.FROM.GetName] is far from over."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] and the rest of the [FROM.FROM.GetFactionName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nAlthough the struggles between [FROM.FROM.GetName] and [Root.GetName] are over, [FROM.FROM.GetName] is still at all-out war, and the fighting continues elsewhere."
 country_capitulated.0.d_neutral_prev_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles in [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.d_neutral_prev_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles between [FROM.FROM.GetName] and [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetFactionName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.a: "Großartige Neuigkeiten!"
 country_capitulated.0.b: "Dies sind dunkle Zeiten"
 country_capitulated.0.c: "Unsichere Zeiten"
 GAME_OVER_TT: "§RDas Spiel wird für Sie enden.§!"
 CAN_ANGERED_WORKERS: "Das wird die Bevölkerung verärgern"
 excellent: "Exzellent."
 unfortunate: "Unglücklich"
 news.1.t: "Das [fta_inviter.GetNameDef]-[fta_applicant.GetName]-Freihandelsabkommen"
 news.1.d: "Heute haben [fta_inviter.GetNameDef] und [fta_applicant.GetNameDef] ein Freihandels- und Investitionsabkommen unterzeichnet, um die wirtschaftliche Zusammenarbeit zwischen den beiden Ländern zu stärken."
 news.1.a: "Okay"
 news.2.t: "Der [mct_inviter.GetNameDef]-[mct_applicant.GetName]-Militärkooperationsvertrag"
 news.2.d: "Heute haben [mct_inviter.GetNameDef] und [mct_applicant.GetNameDef] einen Militärkooperationsvertrag unterzeichnet, der ihre militärischen Beziehungen stärkt."
 news.2.a: "Okay"
 news.3.t: "Bombenanschlag auf die USS Cole"
 news.3.d: "Das United States Naval Command hat berichtet, dass der Zerstörer USS Cole vom Al-Qaida-Netzwerk angegriffen wurde, wobei 17 amerikanische Soldaten getötet wurden. Amerikanische Geheimdienstberichte deuten darauf hin, dass die sudanesische Regierung die beiden Angreifer möglicherweise unterstützt."
 news.3.a: "Sie werden es bereuen."
 news.3.b: "Übermitteln Sie den Amerikanern unser Beileid."
 news.3.c: "Tote Amerikaner? Gut."
 news.3.e: "Sie geben uns die Schuld?!"
 news.4.t: "[FROM.GetName] leaves the European Union"
 news.4.d: "Today the [FROM.GetAdjective] delegation to the European Parliament left the buildings in Brussels for what might be the last time. Article 50 has been fulfilled and pulled through, the treaties with the EU partners reset to ones of usual international partnership. [FROM.GetName] has left the European Union."
 news.4.a: "Okay"
 news.5.t: "Vorbereitung der Union"
 news.5.d: "[FROM.GetName] has begun the process of preparing legislation to unite the European Union under [FROM.GetAdjective] leadership. The European Parliament has much to discuss in the coming days."
 news.5.a: "Ein interessantes Unterfangen."
 news.82.t: "Rückzugsorte in Japan"
 news.82.desc: "Nachdem Japan versucht hatte, die koreanische Halbinsel durch die Invasion Nordkoreas unter Südkorea zu vereinen, griff die chinesische Regierung in die japanische Mission ein. Japan zog sich nach Erhalt dieser Nachrichten zurück und ließ die Vereinigungsmission hinter sich."
 news.82.a: "Wir hätten sowieso verloren!"
 news.82.b: "China ist wirklich so mächtig!"
 influence.1.t: "Offer Economic Aid to [FROM.GetName]?"
 influence.1.d: "Wir haben beschlossen, mit der Ausarbeitung eines Wirtschaftshilfepakets zu beginnen. Wir können beschließen, 5 %, 10 % oder 15 % des BIP unseres Landes als Hilfe zu leisten. Diese Großzügigkeit wird die Beziehungen verbessern und uns Einfluss in [FROM.GetName] verschaffen, auch wenn es keine Garantie dafür gibt, dass sie die Wirtschaftshilfe für irgendetwas von Wert verwenden werden. Je mehr wir geben, desto mehr Einfluss werden wir gewinnen.\n\n"
 influence.1.a: "Sende 5% des BIP als Wirtschaftshilfe."
 influence.1.b: "Sende 10% des BIP als Wirtschaftshilfe."
 News_influence.0.t: "Economic aid given by [FROM.GetName]!"
 News_influence.0.d: "We have been given $$[?gift_sum] billion in immediate economic aid by [FROM.GetName]. This has strengthened [Root.GetAdjective]-[FROM.GetAdjective] Relations, and while the gift officially came without preconditions, it is understood to have strengthened their influence in our country."
 News_influence.0.a: "Wunderbar"
 News_influence.0.b: "Lehnen Sie die Hilfe ab"
 influence.3.t: "Einen anderen Influencer in [FROM.GetName] ansprechen?"
 influence.3.d: "Auf welche der [FROM.GetNameWithFlag]-Influencer sollten wir abzielen, oder sollten wir ihre Unabhängigkeit im Inland ansprechen?\n"
 influence.3.a: "Ziel ist die nationale Unabhängigkeit von [FROM.GetNameWithFlag]."
 influence.3.b: "Ziel [?var:FROM.influence_array^0.GetNameWithFlag]."
 influence.3.c: "Ziel [?var:FROM.influence_array^1.GetNameWithFlag]."
 influence.3.e: "Ziel [?var:FROM.influence_array^2.GetNameWithFlag]."
 influence.3.f: "Zurück."
 News_influence.1.t: "[FROM.GetNameWithFlag] attacks our influence in [FROM.FROM.GetNameWithFlag]!"
 News_influence.1.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our ambitions in [FROM.FROM.GetName]. Singleing us out, their attack on our business and governmental interests have lowered our influence in [FROM.FROM.GetNameWithFlag]."
 News_influence.1.a: "Damn you, [FROM.GetLeader]!"
 News_influence.2.t: "[FROM.GetNameWithFlag] attacks our independence from foreign influence!"
 News_influence.2.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our aspirations to keep foreign meddling out, and weakened our sovereignty. Our independence from foreign influence has been reduced."
 News_influence.2.a: "Not cool, [FROM.GetLeader]!"
 influence.5.t: "Launch Coup in [FROM.GetNameWithFlag]?"
 influence.5.d: "Dear [Root.GetLeader], we in the [Root.GetAdjective] Intelligence Services cannot confirm or deny whether [FROM.GetName] is conducive to a coup.\n\nHowever, we have, to the best of our ability, drawn up probabilities of outcomes. These are based on:\n - How big our influence is\n - How popular our outlook is\n - The popularity and stability of the government\n - Which other influential countries are likely to back us\n - Which influential countries are likely to back their current government.\n\nIf we proceed with the plans we will try to use mostly local sources and contacts, to try to maintain plausible deniability."
 influence.5.a: "Führen Sie einen Putsch durch, um die größte Partei unserer Zeit an die Macht zu bringen."
 influence_coup_largest_success_TT: "§HErfolgreicher Putsch§!"
 influence_coup_largest_discovered_TT: "§RGescheiterter Putsch§!"
 influence.5.b: "Führen Sie einen Putsch durch, um die gleiche Regierungspartei wie wir an die Macht zu bringen."
 influence.5.c: "Lassen Sie diese Pläne zunächst einmal links liegen."
 News_influence.3.t: "Regimewechsel!"
 News_influence.3.d: "Forces with [FROM.GetAdjective] backing have deposited the previous government."
 News_influence.3.a: "Wow..."
 News_influence.4.t: "Dramatic scenes as regime change sweeps [FROM.FROM.GetNameWithFlag]"
 News_influence.4.d: "After a period with uptick in foreign intelligence activity, especially from [FROM.GetNameWithFlag], the previous government of [FROM.FROM.GetName] have been toppled with many top officials of the former regime detained. [FROM.FROM.GetLeader] of the [FROM.FROM.GetRulingParty] has emerged as the new leader amid the turmoil. Early indications are that the new regime of [FROM.FROM.GetName] will identify with the [FROM.FROM.GetRulingIdeology], uprooting the balance of power."
 News_influence.4.a: "Interessant"
 News_influence.5.t: "[FROM.GetNameWithFlag] under pressure as [FROM.FROM.GetNameWithFlag] defeat coup"
 News_influence.5.d: "[FROM.FROM.GetAdjective] leader [FROM.FROM.GetLeader] was gesturing vividly from the stage as 'hostile evil forces spearheaded by [FROM.GetName]' were being blamed for today's latest escalations that saw [FROM.FROM.GetLeader] defeating a dramatic coup attempt. Though [FROM.GetAdjective] leader [FROM.GetLeader] strongly denied the accusations, it is widely known that the two leaders don't see eye to eye. With [FROM.GetAdjective]-[FROM.FROM.GetAdjective] ties at all time low, [FROM.FROM.GetName] vowed to the public to \"irradicate [FROM.GetAdjective] influence from [FROM.FROM.GetName]\", and otherwise double down on the [FROM.FROM.GetRulingIdeology] direction that the ruling [FROM.FROM.GetRulingParty] have been steering [FROM.FROM.GetNameWithFlag] towards."
 News_influence.5.a: "Interessant"
 News_influence.6.t: "Drama as [FROM.FROM.GetNameWithFlag] collapse into Civil War!"
 News_influence.6.d: "Traumatic scenes from [FROM.FROM.GetNameWithFlag] could be seen today, as the last few days of protests, uncertainty and strange military movements gave way to gunfire, suffering and fleeing civilians. While details are scarce, it seems several whole units of the [FROM.FROM.GetAdjective] Army have declared for the armed opposition against [FROM.FROM.GetLeader] and the [FROM.FROM.GetRulingParty] ([FROM.FROM.GetRulingIdeology]). A opposition leader, speaking to WNN under conditions of anonymity, said that they \"expect significant help from [FROM.GetNameWithFlag] in their quest to overthrow the illegitimate [FROM.FROM.GetAdjective] tyrant [FROM.FROM.GetLeader]\".\n\nAlthough [FROM.GetAdjective] leadership have expressed their \"surprise about these dramatic developments\", this is given little credibility by close watchers of [FROM.GetAdjective]-[FROM.FROM.GetAdjective] relations. One analyst described the situation like this; \"It's clear that this in reality was a [FROM.GetAdjective]-backed coup attempt that failed to secure their objectives fast enough, resulting in a tense standoff that degraded into what now looks like a full civil war\". Several world leaders, especially those with a [FROM.FROM.GetRulingIdeology] have had less than diplomatic words for the as of yet unconfirmed [FROM.GetAdjective] involvement.\n\nWith the two different sides in the conflict represent not only stark differences in domestic, but also international direction, it will be interesting to follow if other countries also get involved in the conflict."
 News_influence.6.a: "Wer wird die Asche beherrschen?"
 influence.51.t: "Militärhilfe an [FROM.GetName]"
 influence.51.d: "Our fellow nation [FROM.GetName] is currently in an armed conflict and is looking for suppliers to fuel their war effort. They have shown an interest in our small arms, infantry vehicles, and other military surplus. We should decide if it is worthwhile to send them the military equipment lest they use it against us in future conflicts..."
 influence.51.a: "Ja, lasst es uns tun!"
 influence.51.a_tt: "Sie können entscheiden, welche Ausrüstung weitergegeben wird!"
 influence.51.b: "Wenn ich darüber nachdenke..."
 influence.51.b_tt: "Wenn ich darüber nachdenke... Ich brauche diese Waffen!"
 influence.52.t: "Die Frage nach dem Was"
 influence.52.d: "We can send [FROM.FROM.GetName] one of three categories of military aid. After picking the category, we will choose a §Hpackage size§! that determines the quantity, political cost, and threat generated.\n\n§HInfantry§!: small arms, light anti-tank, anti-aircraft.\n§HVehicles & Armor§!: main battle tanks, amphibious tanks, utility vehicles.\n§HModern Equipment§!: heavy anti-tank missiles, surface-to-air missiles, drones."
 influence.52.a: "§HInfantry Equipment§! Package"
 influence.52.b: "§HVehicles & Armor§! Package"
 influence.52.c: "Eigentlich brauche ich diese.."
 influence.53.t: "Militärhilfe von [FROM.GetName]"
 influence.53.d: "[FROM.GetName] has offered us a package of military equipment. Should we accept or return it?"
 influence.53.a: "Accept the Package"
 influence.53.c: "Return the Equipment"
 influence.54.t: "Automatischer monatlicher Einflussnahmebericht"
 influence.54.d: "[?nations_influenced|0] wurden erfolgreich am [GetDateText] beeinflusst. Die folgenden Nationen wurden durch unsere laufenden Einflussbemühungen beeinflusst:"
 influence.54.a: "Okay, danke!"
 econvent.1.t: "Zentralbank von [Root.GetName] warnt vor möglicher Immobilienblase"
 econvent.1.d: "Sehr geehrter [Root.GetLeader], wir müssen Ihnen leider mitteilen, dass ein beträchtlicher Teil unseres Expertenteams (die besten und klügsten [Root.GetAdjective] Ökonomen) erste Anzeichen dafür erkennt, dass der [Root.GetAdjective] Immobilienmarkt überhitzt ist und auf eine Blase zusteuern könnte, die kurz vor dem Platzen steht. Bedenken Sie, dass es schwierig und mühsam ist, die Zukunft vorherzusagen, daher kann es sein, dass unsere Experten falsch liegen.\nNatürlich würden wir nicht im Traum daran denken, Ihrer Exzellenz Anweisungen zu erteilen, was zu tun ist, aber jetzt einige Anpassungen vorzunehmen, wird weniger schmerzhaft sein als eine ausgewachsene Krise in der Zukunft."
 econvent.1.a: "Lassen Sie uns die Märkte abkühlen, bevor es schlimm wird."
 econvent.1.b: "Genug von dem Unsinn. Die [Root.GetAdjective] Wirtschaft ist immer gesund!"
 econvent.1.b_tt: "§H Kein Effekt §! im Moment aber vielleicht entsteht in Zukunft eine Immobilienblase\n"
 econvent.2.t: "Einbrechende Immobilienpreise"
 econvent.2.d: "Da die Preise für Häuser und Wohnungen in den letzten Jahren, insbesondere im letzten Jahr, in die Höhe geschossen sind, haben immer mehr Menschen größere Kredite aufgenommen, um sich Wohnraum leisten zu können, während Spekulanten massiv in Immobilien investiert haben – ebenfalls unter Verwendung von Krediten. Doch nun kommt alles zu einem Ende. Die Preise fallen und viele versuchen ihre Immobilien zu verkaufen, als gäbe es kein morgen. Die weniger Glücklichen werden mit riesigen Krediten zurückgelassen, die sie nicht zurückzahlen können. Während die Menschen sowohl [Root.GetLeader] als auch die [Root.GetAdjective] Zentralbank für diese Situation verantwortlich machen, müssen wir schnell eine öffentliche Erklärung abgeben, wie wir diese Krise angehen wollen."
 econvent.2.a: "Wir werden das System mit billigem Geld fluten, um den Markt wiederzubeleben."
 econvent.2.b: "Das ist schmerzhaft aber die Immobilienpreis müssen sinken."
 econvent.3.t: "Börsencrash"
 econvent.3.d: "Es scheint, dass das Chaos nach dem Platzen der Immobilienblase auch den Aktienmarkt erreicht hat. Die Aktienkurse fast aller börsennotierten [Root.GetAdjective] Unternehmen sind heute Morgen stark gefallen und auch unsere Währung hat erheblich an Wert verloren. Der Handel wurde vor dem Mittag vorübergehend ausgesetzt aber keine Besserung wird erwartet. Für morgen wird keine Besserung erwartet, da alle verzweifelt versuchen ihre Aktien zu verkaufen."
 econvent.3.a: "Gut, dass ich mein Geld in Off-Shore-Steueroasen platziert habe."
 econvent.3.b: "Gewähre Staatshilfen."
 econvent.4.t: "[Root.GetAdjective] Banken stehen vor einer Krise"
 econvent.4.d: "Trotz des köstlichen und mit Milchschaum verzierten Espressos in deiner [Root.GetName] §R <3 §! [Root.GetLeader]-Tasse, ist dies kein guter Tag. Verzweifelte Finanzmogule, deren Lobbyisten und die Politiker die sie unterstützt haben - sie alle stürmen die [Root.GetAdjective] Regierungsbüros und haben eine gemeinse Nachricht: \"Wir brauchen Staatshilfen!\".\n\nAnscheinend war der zweifache Schock durch das Platzen der Immbolienblase und des Börsencrashs zu viel für den Finanzsektor, um damit umzugehen. Die Summe der faulen Spekulationskredite ist einfach zu groß und es wird dringend ein Zufluss von frischen Regierungsgeldern benötigt - andernfalls wird es überall zahllose Bankrotte geben und unschuldige Sparer werden ihre Ersparnisse verlieren."
 econvent.4.a: "Wir werden Staatshilfen bereitstellen."
 econvent.4.b: "Keine Staatshilfen aber garantieren sie die Sicherheit der Spareinlagen."
 econvent.4.c: "Das Überleben des Stärkeren macht den Kapitalismus großartig."
 econvent.5.t: "[Root.GetAdjective] Die Konsumenten geben weniger Geld aus"
 econvent.5.d: "A recent report highlighted that the hard-working [Root.GetAdjective] people are increasingly worried about their future. This pessimism is causing people to save more, and overall consumption is down. If this continues, a lot of businesses in [Root.GetName] will have to downsize or close down. Businesses that mainly exports [Root.GetAdjective] goods are however, not affected by this."
 econvent.5.a: "Überweise etwas Taschengeld."
 econvent.5.b: "Hoffentlich wird das vorbeigehen."
 econvent.6.t: "Geringere Nachfrage nach [Root.GetAdjective] Waren im Ausland"
 econvent.6.d: "Die Daten sind eindeutig: Die internationalen Exporte von [Root.GetName] sinken. Die Ursache wird jedoch heftig unter den Wirtschaftsberatern von [Root.GetLeader] diskutiert. Eine Theorie besagt, dass wir aufgrund unserer relativ hohen Löhne weniger wettbewerbsfähig geworden sind, eine andere, dass unsere Konkurrenten die Qualität ihrer Produkte verbessert haben. Andere glauben, dass die sinkende Nachfrage einfach auf sich ändernde Trends im Ausland zurückzuführen ist. Was auch immer die Ursache ist, es gibt nicht wirklich viel, was wir tun können, außer es hinter uns zu lassen und in Zukunft härter zu arbeiten."
 econvent.6.a: "Ausländer sind albern. [Root.GetAdjective] Waren sind die besten!"
 econvent.7.t: "Dürre verursacht Katastrophe für [Root.GetAdjective] Landwirte."
 econvent.7.d: "Obwohl es hier normalerweise nicht viel regnet, war der Niederschlag in dieser Anbausaison katastrophal, und ein Großteil der Ernte ist ausgefallen. Das Wenige, was an landwirtschaftlichen Produkten noch geerntet wurde, ist ausschließlich auf verbliebene Flüsse und künstliche Bewässerung zurückzuführen, was hier in [Root.GetName] leider nicht sehr üblich ist. Die Landwirte fordern Unterstützung von der Regierung von [Root.GetLeader] und die Städter machen sich Sorgen über steigende Lebensmittelpreise."
 econvent.7.a: "Viel Glück in der nächsten Saison"
 econvent.8.t: "Hungersnot in [Root.GetName]!"
 econvent.8.d: "Die anhaltende Dürre hat große Teile des Landes von [Root.GetName] ohne bezahlbare Nahrungsmittel zurückgelassen. Die Vorräte sind erschöpft, und eine echte Hungersnot verursacht Unterernährung, Tod und Krankheiten."
 econvent.8.a: "Aua!"
 econvent.9.t: "Gestiegenes Verbrauchervertrauen"
 econvent.9.d: "Die aktuellen Bedingungen in der [ROOT.GetAdjective]-Wirtschaft zeigen, dass die Verbraucher in unserem Land nun perfekte Marktbedingungen haben, um Geld auszugeben und in die Zukunft des Landes zu investieren. Die Menschen kaufen Konsumgüter, als gäbe es kein Morgen!"
 econvent.9.a: "Wunderbare Neuigkeiten"
 econvent.10.t: "Aktienmarktboom"
 econvent.10.d: "Der [ROOT.GetAdjective] Aktienmarkt boomt. Die [ROOT.GetAdjective] Menschen handeln mit Aktien, als ob sie Lebensmittel einkaufen würden.\n"
 econvent.10.a: "Den Boom am Laufen halten!"
 econvent.10.a_tt: "Das Einbringen von zusätzlicher Liquidität in den Markt kann verheerend sein, falls ein Crash eintritt.\n"
 econvent.10.b: "Großartige"
 econvent.10.b_tt: "Der Markt wird sich ohne Interventionen weitherin normal entwickeln. Es besteht eine moderate Möglichkeit für einen Crash.\n"
 econvent.10.c: "Abbremsen der Wirtschaft."
 econvent.10.c_tt: "Die Wirtschaft hat sich zu schnell aufgeheizt. Last uns die Kapitelfluss einschränken, damit sich das Tempo reduziert.\n"
 econvent.11.t: "Wichtige Finanzinstitutionen versagen"
 econvent.11.d: "Die Schlagzeilen berichten von einer großen Finanzinstitution die pleite gegangen ist. Die Medien verbreiten diese Nachricht schnell und schüren Panik. Die Regierung wird um eine Antwort gebeten, da die Angst vor einer größeren Krise aufkommt. Was sollten wir tun?"
 econvent.11.a: "Zu groß um zu scheitern..."
 econvent.11.b: "Es ist einfach ein gutes Geschäft..."
 econvent.12.t: "[FROM.GetName] Wellen der Finanzkrise"
 econvent.12.d: "Die aktuelle Krise in [FROM.GetName] hat in unserem Land viel Unzufriedenheit verursacht, da die Auswirkungen deren Krise auch in unserem Land spürbar sind. Unsere eng vernetzten Volkswirtschaften leiden nun beide unter der Last dieser Krise."
 econvent.12.a: "Verteile Staatshilfen."
 econvent.12.b: "Der Markt steht über allem."
 econvent.13.t: "Hohe Schulden führen dazu, dass Firmen abwandern"
 econvent.13.d: "Das hohe Verhältnis von Staatsverschuldung zum BIP zwingt Unternehmen im Land dazu zu schließen und das Land zu verlassen. Die Reduzierung unserer Schulden ist zwingend erforderlich, da sonst noch mehr Unternehmen abwandern könnten."
 econvent.13.a: "Erlaube dem Unternehmen abzuwandern"
 econvent.13.b: "Kaufe das Unternehmen"
 econvent.14.t: "Private Investoren investieren in die zivile Industrie"
 econvent.14.d: "Eine Reihe privater Investoren hat beschlossen, in eine neue zivile Industrie innerhalb des Landes zu investieren. Die neue aufstrebende Fabrik wird Arbeitsplätze schaffen und mehr Wohlstand in unser Land bringen. Die zusätzlichen Bau- und Produktionskapazitäten werden uns sicherlich wirtschaftlich voranbringen."
 econvent.14.a: "Toll!"
 econvent.15.t: "Private Investoren investieren in Büroanlagen"
 econvent.15.d: "Eine Gruppe privater Investoren hat beschlossen, in eine Reihe kleinerer Drittanbieter-Dienstleistungen zu investieren."
 econvent.15.a: "Toll!"
 econvent.100.t: "Industrieschließung"
 econvent.100.d: "Aufgrund sich ändernder wirtschaftlicher Bedingungen, ist ein Großteil unserer Industrie nicht mehr wettbewerbsfähig und muss schließen."
 econvent.100.a: "Wir werden es wieder aufbauen."
 econvent.101.t: "Industrieumsiedlung"
 econvent.101.d: "Aufgrund sich ändernder wirtschaftlicher Bedingungen haben viele Unternehmen beschlossen, ins Ausland zu verlagern, um wettbewerbsfähiger zu sein. Dies wird der heimischen Wirtschaft schaden."
 econvent.101.a: "Wir werden es wieder aufbauen."
 econvent.102.t: "Industrieumsiedlung nach [Root.GetNameDef]"
 econvent.102.d: "Due to changing economic circumstances in [FROM.GetNameDef], many [FROM.GetAdjective] corporations have decided to relocate to [Root.GetNameDef] to be more competitive. This will be a boon to our economy."
 econvent.102.a: "Großartige Nachrichten."
 remove_civilian_industry_effect_tt: "Verlust von [?reduction_factor|%R0] zivilen Fabriken.\n"
 migrate_industry_to_random_effect_tt: "§R[?reduction_factor|%0]§! unserer zivilen Fabriken werden nach §Y[relocation_location.GetNameDef]§! umgesiedelt.\n"
 factories_migrated_to_us_tt: "[?FROM.ind_factories|Y0] civilian factories relocate from §Y[FROM.GetNameDef]§! to §Y[Root.GetNameDef]§!.\n"
 war.0.t: "[FROM.GetName] goes to war!"
 war.0.d: "[FROM.GetName] has gone to war today. The international community will be keeping a close eye as this conflict continues to rage on.\n"
 war.0.a: "Besorgniserregend"
 anti_bully.2.t: "Öffentliche Kriegsmüdigkeit"
 anti_bully.2.d: "We have decided war is our best course of action. However, in order to maintain support among the people we must either win this quickly or push quickly into foreign soil. The people will march as long as they see how necessary this war is. Boots march, drums beat, and the time for [FROM.GetName] to go to war is upon us!\n\n§YThis triggers the Public War Weariness System§!\n"
 anti_bully.2.a: "Wir müssen gewinnen!"
 sco.1.t: "[FROM.GetName] hat einen Antrag auf Beobachterstatus in der SCO eingereicht."
 sco.1.d: "Ein neuer Staat möchte die SCO-Verhandlungen beobachten und möglicherweise irgendwann ein vollständiges Mitglied der Organisation werden!"
 sco.1.a: "Wir sehen keinen Grund, warum wir Ihre Anfrage ablehnen sollten."
 sco.1.b: "Wir können ihnen diesen Status nicht zugestehen!"
 sco.2.t: "[FROM.GetName] hat einen Antrag für Mitgliedschaft in der SCO eingereicht."
 sco.2.d: "Ein weiterer Staat hat seinen Wunsch auf eine Vollmitgliedschaft in der Organisation gestellt!"
 sco.2.a: "Wir sehen keinen Grund, warum wir Ihre Anfrage ablehnen sollten."
 sco.2.b: "Wir können ihnen diesen Status nicht zugestehen!"
 sco.3.t: "[FROM.GetName] bietet an, gemeinsame Militärübungen mit uns durchzuführen."
 sco.3.d: "Dieser Mitgliedstaat der SCO schlägt gemeinsame Übungen vor, um unsere militärische Zusammenarbeit zu stärken und das Vertrauen zwischen unseren beiden Ländern zu erhöhen."
 sco.3.a: "Das ist eine willkommene Möglichkeit, unseren Truppen etwas Erfahrung zu verschaffen!"
 sco.3.b: "Eine Kooperation mit [FROM.Getname] ist unmöglich."
 sco.4.t: "[FROM.GetName] hat unserem Angebot zugestimmt!"
 sco.4.d: "Die [FROM.GetAdjective]-Delegierten haben unseren Vorschlag und unsere Vorbereitungen für unsere gemeinsamen Übungen sehr positiv aufgenommen."
 sco.4.a: "Lasst die Spiele beginnen!"
 sco.5.t: "[FROM.GetName] hat unser Angebot abgelehnt!"
 sco.5.d: "Die [FROM.GetAdjective]-Delegierten haben es abgelehnt, mit uns äußerst fruchtbare Militärübungen durchzuführen."
 sco.5.a: "Ihr Verlust..."
 sco.6.t: "Shanghaier Organisation für Zusammenarbeit (SCO) startet großangelegte Militärübungen"
 sco.6.d: "[FROM.GetAdjective] Soldaten schlossen sich heute Tausenden anderen an, die an einer sogenannten Anti-Terror-Übung unter der Schirmherrschaft der Shanghaier Organisation für Zusammenarbeit (SCO) teilnahmen. Während viele diese Übungen als Zeichen erfolgreicher internationaler Zusammenarbeit begrüßten, reagierten andere weit weniger enthusiastisch auf diese jüngste Entwicklung. Amerikanische und europäische Analysten führten den Einsatz von Langstreckenflugzeugen und erheblicher Feuerkraft als Beweis dafür an, dass diese Übungen nicht als Übung für Anti-Terror-Operationen gedacht sind, sondern als Generalprobe für eine Konfrontation mit dem Westen."
 sco.6.a: "Sind diese bedrohlichen Übungen wirklich zu unserem Vorteil?"
 sco.6.b: "Nur Terroristen haben hier etwas zu befürchten!"
 sco.6.c: "Interessante Entwicklung"
 sco.7.t: "[FROM.GetName] erlangt die SCO Mitgliedschaft"
 sco.7.d: "Nach einem schrittweisen Integrationsprozess gab [FROM.GetLeader] heute die Mitgliedschaft seines Landes in der Shanghaier Organisation für Zusammenarbeit bekannt. Hoffnungsvolle Beobachter haben diese Entwicklung als weiteren Fortschritt der regionalen wirtschaftlichen und politischen Zusammenarbeit auf dem eurasischen Kontinent dargestellt, während pessimistischere Analysten den wachsenden Einfluss Chinas und die Bedrohung, die dieser für die bestehende Weltordnung darstellt, beklagten."
 sco.7.a: "Die chinesische Gefahr wächst weiterhin..."
 sco.7.b: "Ein guter Tag für die Diplomatie!"
 sco.8.t: "[FROM.GetName] verlässt die Shanghaier Organisation für Zusammenarbeit (SCO)"
 sco.8.d: "Nachdem die aktuelle [FROM.GetAdjective] Regierung das chinesische Vorgehen neu bewertet hat, hat [FROM.GetLeader] [FROM.GetNameDef] aus der Shanghaier Organisation für Zusammenarbeit ausgetreten. [CHI.GetLeader] hat sich zu dieser Entwicklung noch nicht geäußert, doch chinesische regierungsnahe Medienorganisationen beklagten sich schnell darüber, dass dieser Austritt einen Rückschritt in Bezug auf die regionale Integration darstelle."
 sco.8.a: "Die aggressive Haltung Chinas hat dieses Land entfremdet."
 sco.8.b: "Ein trauriger Tag für die inernationale Zusammenarbeit..."
 sco.9.t: "China übernimmt die Führung der \"Shanghaier Organisation für Zusammenarbeit\" (SCO) von Russland."
 sco.9.d: "Die Shanghaier Organisation für Zusammenarbeit wurde historisch als gemeinsames chinesisch-russisches Projekt geführt. Die chinesische Unzufriedenheit mit dieser Vereinbarung hat jedoch Berichten zufolge dazu geführt, dass Russland in eine untergeordnete Position innerhalb der Organisation gedrängt wurde. Während weder [CHI.GetLeader] noch [SOV.GetLeader] zu diesem Machtkampf geschwiegen haben, sind russische Beamte Berichten zufolge wütend auf die Chinesen und verbittert über die Demütigung des slawischen Riesen, die vor den Augen der anderen SCO-Mitgliedsstaaten stattgefunden hat. Die geopolitischen Auswirkungen dieses Schritts in Bezug auf die Hegemonie über Zentralasien dürften erheblich sein."
 sco.9.a: "China ist nicht bereit das Rampenlicht zu teilen..."
 sco.10.t: "China verlangt von uns, dass wir eine Seite wählen"
 sco.10.d: "Unsere fortgesetzte Mitgliedschaft in der OVKS und der Shanghaier Organisation für Zusammenarbeit hat uns nach dem chinesisch-russischen Bruch in eine schwierige Lage gebracht. China fordert nun, dass wir entweder die SCO verlassen und im russischen Bündnis bleiben oder in der SCO bleiben und die Russen im Stich lassen. Die Entscheidung, die wir treffen, wird mit ziemlicher Sicherheit in der bald bevorstehenden Konfrontation zwischen den beiden regionalen Giganten von Bedeutung sein."
 sco.10.a: "Wir sind nichts ohne Loyalität!"
 sco.10.b: "Zeit das sinkende Schiff zu verlassen..."
 sco.11.t: "[FROM.GetName] bietet uns Entwicklungshilfe!"
 sco.11.d: "Unter der Schirmherrschaft der Shanghaier Organisation für Zusammenarbeit stellt die [FROM.GetAdjective] Regierung unseren lokalen Unternehmen dringend benötigte Mittel und Ressourcen zur Verfügung, um ihre Entwicklungsprojekte zu unterstützen. Diese Unterstützung ist nicht nur eine gute Nachricht für unsere Wirtschaft, sie wird auch den Einfluss von [FROM.GetNameDef] auf unser Land erhöhen."
 sco.11.a: "Wir sind für die Hilfe dankbar!"
 sco.12.t: "[FROM.GetName] hat $SHANGHAI_PACT$ gegründet!"
 sco.12.d: "[FROM.GetName] hat $SHANGHAI_PACT$ als Rivale zu [USA.GetFactionName] gegründet. Wir haben zugelassen, dass sie großen [FROM.GetAdjective] Einfluss auf uns ausüben. Wir sind außerdem Mitglied der SCO, also sind wir gezwungen, Mitglied der neuen Fraktion zu sein."
 sco.12.a: "Okay"
 taiwan.1.t: "228 Hand-in-Hand-Rallye"
 taiwan.1.d: "Eine Demonstration der Solidarität. Es bildete sich eine Menschenkette von etwa zwei Millionen Menschen, die eine 500 km lange Kette bildete. Sie begann am Hafen von Keelung, der nördlichsten Stadt Taiwans, und schlängelte sich bis zur südlichsten Spitze der Insel. Der Zweck war zweierlei Natur. Die Taiwaner wünschten sich Frieden, protestierten aber auch gegen die Stationierung von Raketen der Volksrepublik China auf Taiwan, ihren Inselnachbarn. Ein Teil der Symbolik der Demonstration, insbesondere an dem Punkt der Veranstaltung, an dem sich die Teilnehmer „von China abwenden“, ging eindeutig in Richtung Unterstützung der Unabhängigkeit Taiwans. Aus diesem Grund nahmen auch keine Mitglieder der Pan-Blue Coalition an der Demonstration teil, die der Demonstration einige Tage später mit einer eigenen inselweiten Kundgebung entgegentrat."
 taiwan.1.a: "Lasst uns niemals die Opfer vergessen."
 taiwan.2.t: "Typhoon Bilis"
 taiwan.2.d: "In Vorbereitung auf Bilis wurden Büros auf der ganzen Insel geschlossen. Neben der Schließung von Unternehmen wurden Flüge von und zur Insel umgeplant und ein Taifun-Hilfszentrum eingerichtet. Aufgrund der Gefahr von Erdrutschen wurde für Taiwan eine Erdrutschwarnung herausgegeben. Obwohl der Sturm noch nicht an Land gegangen war, kam am 22. August in Taipeh eine Person ums Leben, nachdem sie von einem Erdrutsch begraben worden war, der durch den bevorstehenden Taifun ausgelöst worden war; dies war der erste Todesfall, den Bilis verursachte. Neben der Umplanung von Flügen wurden zahlreiche Flughäfen geschlossen und die taiwanesische Börse sollte am 23. August schließen. In der Zwischenzeit verlängerten Krankenhäuser ihre Öffnungszeiten, um Patienten aufnehmen zu können. Mitglieder der taiwanesischen Küstenwache schränkten die Fischereitätigkeit aufgrund der Gefahr tödlicher Wellen ein. Der Hafen von Kaohsiung war während der gesamten Dauer des Sturms geschlossen. Aufgrund der erhöhten Nachfrage nach Gemüse im Vorfeld des Sturms stiegen die Kosten für solche Lebensmittel um 20 bis 30 Prozent.\n\nBilis war ein für Taiwan äußerst zerstörerischer tropischer Wirbelsturm. Der Schaden in der Landwirtschaft, Fischerei und Forstwirtschaft der Insel belief sich auf 133,5 Millionen US-Dollar. Der Taifun forderte 14 Todesopfer und verletzte weitere 80 Menschen. Stromausfälle wirkten sich negativ auf etwa 600.000 Haushalte aus, und 400 Häuser in ganz Taiwan wurden zerstört. Mehrere hunderttausend Familien litten nach dem Sturm unter Wassermangel. In Cheng-Kung registrierte eine Wetterstation eine Windböe von 281 km/h, die das Anemometer der Station zerstörte. Ein einziger Erdrutsch in der Stadt Jenai begrub neun Bauern. Zehntausende Menschen wurden während des Sturms obdachlos und zogen in von der Regierung eingerichtete Evakuierungsunterkünfte. Im östlichen Landkreis Hualien fielen 250 Häuser den starken Winden zum Opfer. Die Winde rissen auch Bäume um und schleuderten leichte Fahrzeuge umher, wodurch Straßen blockiert wurden. Starke Regenfälle im Zusammenhang mit Bilis überschwemmten etwa 40.000 Hektar Obstgärten und Reisfelder. Nachdem Bilis Taiwan passiert hatte, erschütterte ein Erdbeben der Stärke 5,7 die Insel und verschärfte die bereits verschlechterte Lage noch weiter."
 taiwan.2.a: "Zeit für den Wiederaufbau."
 taiwan.3.t: "Präsidentschaftswahlen in Taiwan"
 taiwan.3.d: "Es handelt sich um die zweite direkte Präsidentschaftswahl der Republik China, bei der der Präsident und Vizepräsident der Republik China für die 10. Amtszeit gemäß der Verfassung von 1947 gewählt werden. Diese Wahl könnte potenziell das Ende von mehr als einem halben Jahrhundert Kuomintang-Herrschaft in Taiwan einleiten, da die Wähler der KMT in zwei Lager gespalten sind.\n\nObwohl er populärer war und in den Umfragen konstant besser abschnitt, erhielt der ehemalige Gouverneur von Taiwan, James Soong, nicht die Nominierung der Kuomintang. Daraufhin kündigte er seine Kandidatur als unabhängiger Kandidat an. Die Kuomintang reagierte, indem sie Soong und 21 seiner Verbündeten ausschloss. Sie verklagten Soong wegen Diebstahls und behaupteten, dass er als Generalsekretär der Partei Millionen von Taiwan-Dollars, die für die Familie des verstorbenen Präsidenten Chiang Ching-kuo bestimmt waren, unterschlagen und das Geld in der Chunghsing Bills Finance Co. versteckt habe. Soong verteidigte sich, indem er sagte, er habe auf Anweisung von Lee gehandelt, aber seine Darstellung war wenig überzeugend. Obwohl er anfangs in den Umfragen deutlich führte, verlor Soong schließlich mit etwas mehr als 300.000 Stimmen Rückstand. Der Finanzskandal, der sein Image als sauberer Politiker beschädigte, dürfte zu seinem Scheitern beigetragen haben.\n\nDie Demokratische Fortschrittspartei (Democratic Progressive Party, DPP) stellte den ehemaligen Bürgermeister von Taipeh, Chen Shui-bian, als Präsidentschaftskandidaten auf. Nachdem sie bei der Wahl 1996 mit einer radikalen Unabhängigkeitsplattform angetreten war und eine deutliche Niederlage erlitten hatte, moderierte die DPP im Mai 1999 ihre Haltung, indem sie die „Resolution zur Zukunft Taiwans“ verabschiedete. Diese Resolution akzeptierte den Status quo und vertrat die moderate Ansicht, dass Taiwan bereits unabhängig sei und eine formelle Erklärung daher nicht dringend erforderlich sei, wenn überhaupt. Ebenfalls enthalten war das Versprechen, dass jede Änderung des internationalen Status Taiwans durch ein Referendum beschlossen werden müsse, wodurch die Befürchtung gemildert wurde, dass eine DPP-Regierung im Falle eines Wahlsiegs einseitig die Unabhängigkeit erklären könnte, ohne die Zustimmung der Bevölkerung. Das Chen-Lu-Ticket versprach zudem, entschlossener gegen Korruption vorzugehen, mehr Mittel für soziale Dienste bereitzustellen und umweltfreundlicher zu sein, beispielsweise durch die Ablehnung der Kernenergie."
 taiwan.3.a: "Chen Shui-bian (DPP)"
 taiwan.3.b: "Lien Chan (KMT)"
 taiwan.3.c: "James Soong (Unabhängig)"
 taiwan.4.t: "Verwaltung der Küstenwache eingerichtet"
 taiwan.4.d: "Die Küstenwacheverwaltung (Coast Guard Administration, CGA) vereint das Kommando der Küstenwache, das Marine-Polizeibüro sowie mehrere Patrouillenboote der Zollbehörde Taiwans, die dem Finanzministerium untersteht. Die CGA fasst damit die verschiedenen Behörden für Küsten- und maritime Strafverfolgung offiziell zusammen. Sie wird als junge Behörde in naher Zukunft zahlreiche Such- und Rettungseinsätze sowie Operationen zur Bekämpfung von Schmuggel durchführen.\n\nDie Küstenwacheverwaltung des Rates für Meeresangelegenheiten (Ocean Affairs Council, OAC) ist für die Aufrechterhaltung von Recht und Ordnung sowie für den Schutz der Ressourcen in den Hoheitsgewässern der Republik China (ROC) zuständig. Diese umfassen die Gewässer rund um Taiwan, die Penghu-, Kinmen- und Matsu-Inseln sowie die Inseln Green Island, Orchid Island, Dongsha und Nansha. Zudem stellt sie die erste Verteidigungslinie entlang der Küsten gegen Schmuggler und illegale Einwanderer dar. Die CGA wird als zivile Strafverfolgungsbehörde unter der Verwaltung des Rates für Meeresangelegenheiten des Exekutiv-Yuan betrachtet. In Notfällen kann sie jedoch in die Streitkräfte der Republik China eingegliedert werden.\n\nDie Küstenwacheverwaltung wird von einem Minister und drei stellvertretenden Ministern geleitet. Die CGA umfasst acht Abteilungen, ein Büro und fünf Einsatzkräfte sowie eine Generaldirektion für maritime Patrouillen und eine Generaldirektion für Küstenpatrouillen. Ihr Zuständigkeitsbereich erstreckt sich über die Gewässer rund um Kinmen, Matsu, Penghu und die Hauptinsel Taiwan, um den ordnungsgemäßen Schutz der 1.819,8 Kilometer langen Küstenlinie und des 540.000 Quadratkilometer großen \"Blauen Territoriums\" zu gewährleisten, das 15-mal größer ist als die Insel Taiwan."
 taiwan.4.a: "Für eine sichere Küste."
 taiwan.5.t: "Nationaluniversität von Kaohsiung eröffnet"
 taiwan.5.d: "Die Universität hat das Ziel, die Bildungskluft zwischen Süd- und Nordtaiwan zu verringern und die Wirtschaft in der südlichen Region zu fördern.\n\nDie Universität verfügt über zwanzig Fachbereiche, darunter Westliche Sprachen und Literatur, Ostasiatische Sprachen und Literatur, Architektur, Kreatives Design, Sportwissenschaft, Gesundheits- und Freizeitstudien, Recht, Regierung und Recht, Wirtschafts- und Finanzrecht, Angewandte Wirtschaftswissenschaften, Angewandte Mathematik, Angewandte Chemie, Elektrotechnik, Bau- und Umweltingenieurwesen, Lebenswissenschaften sowie Asien-Pazifik-Industrie- und Unternehmensmanagement, Traditionelle Künste, Finanzen, Informationsmanagement und Angewandte Physik. Unter diesen Fachbereichen wurde insbesondere der Studiengang Asien-Pazifik-Industrie- und Unternehmensmanagement entwickelt, um Industriefachkräfte auszubilden.\n\nEin besonderes Merkmal dieser Universität ist die Zugänglichkeit zu dieser. Es gibt keine Mauern an den Grenzen des Campus. Bewohner aus der Umgebung können den Campus betreten oder die Sportgeräte im Fitnessstudio nutzen, um sich zu bewegen. Die Biodiversität ist ein weiteres bemerkenswertes Merkmal der NUK. Im Teich des Wasser Land Parks leben über 60 Fischarten."
 taiwan.5.a: "Dies wird dem Süden helfen."
 taiwan.6.t: "Das Abkommen über den Dienstleistungshandel zwischen den beiden Seiten der Taiwanstraße (Cross-Strait Service Trade Agreement) wurde ratifiziert."
 taiwan.6.d: "Nach der Genehmigung durch das taiwanische Parlament ist das CSSTA, ein Freihandelsabkommen zwischen Taiwan und dem chinesischen Festland, offiziell in taiwanisches Recht aufgenommen worden. Dieses Abkommen stellt eine bedeutende Verbesserung der Beziehungen zwischen beiden Seiten dar und wird den Handel mit Dienstleistungen über die Taiwanstraße hinweg erheblich fördern. Kritiker des Abkommens bleiben jedoch skeptisch und befürchten, dass es eine potenzielle Bedrohung für Taiwans politische Autonomie gegenüber China darstellen könnte."
 taiwan.6.a: "Taiwan rückt näher an China heran."
 taiwan.7.t: "Die \"Sonnenblumen\"-Protestanten besetzen das taiwanische Parlament"
 taiwan.7.d: "Mitglieder der studentisch geführten Sonnenblumenbewegung überwanden gestern den Zaun vor dem taiwanischen Parlament, nachdem sie gegen die Versuche der Regierung protestiert hatten, das umstrittene Abkommen über den Dienstleistungshandel über die Taiwanstraße (CSSTA) mit Festlandchina zu verabschieden. Die Protestbewegung äußert Bedenken hinsichtlich des übereilten Vorgehens der Regierung bei der Ratifizierung des Abkommens, der mangelnden Transparenz während der Verhandlungen sowie des Inhalts des Abkommens selbst."
 taiwan.7.a: "Ein Schlag für die KMT."
 taiwan.8.t: "Der \"Plan zur Wiedervereinigung\" der Volksrepublik China"
 taiwan.8.d: "[CHI.GetLeader]s Regierung hat uns einen Plan zur Wiedervereinigung vorgelegt, der einen Weg aufzeigt, wie Taiwan letztlich als Sonderverwaltungsregion unter chinesische Kontrolle zurückkehren könnte. Der Vorschlag enthält mehrere Garantien für die Fortführung der taiwanischen Demokratie und politischen Autonomie. Dennoch dürfte dies nicht ausreichen, um taiwanische Gegner einer Wiedervereinigung mit dem Festland zu überzeugen. Wie China reagieren könnte, falls wir diesen Plan ablehnen, bleibt ungewiss."
 taiwan.8.a: "Wir sollten den Plan akzeptieren."
 taiwan.8.b: "Taiwan ist nicht China!"
 taiwan.9.t: "Berichte über verdächtige Aktivitäten des chinesischen Geheimdienstes."
 taiwan.9.d: "Unsere Nachrichtendienste berichten über verstärkte Aktivitäten chinesischer Agenten auf unserem Territorium. Diese Aktivitäten müssen nichts bedeuten, könnten aber ebenso darauf hindeuten, dass China etwas plant. Wir sollten entscheiden, ob es eine sinnvolle Nutzung der Zeit unserer Nachrichtendienste ist, dies genauer zu untersuchen."
 taiwan.9.a: "Wirkt harmlos."
 taiwan.9.b: "Das sollten wir untersuchen."
 taiwan.10.t: "China fordert ein Ende des Taiwan Relations Act!"
 taiwan.10.d: "Die Volksrepublik China hat von uns die Aufhebung des Taiwan Relations Act verlangt, der unsere derzeitigen Beziehungen zu den Regierungsbehörden Taiwans festschreibt. Diese Forderung ist zweifellos der Auftakt zu noch aggressiveren Maßnahmen gegenüber Taiwan als denen, die wir in den letzten Monaten bereits erlebt haben. Wenn wir das Gesetz aufheben, wird die Wahrscheinlichkeit eines Konflikts über die Taiwanstraße dramatisch steigen."
 taiwan.10.a: "Diese Forderung ist lächerlich!"
 taiwan.10.b: "Es ist besser für uns aufzugeben..."
 taiwan.11.t: "Der Plan wurde akzeptiert!"
 taiwan.11.d: "Taipeh hat sich bereit erklärt, eine gemeinsame Erklärung abzugeben, in der sich beide Seiten zu einer eventuellen Wiedervereinigung bekennen!"
 taiwan.11.a: "Freut euch!"
 taiwan.12.t: "Der Plan wurde abgelehnt!"
 taiwan.12.d: "Taipeh hat sich geweigert, eine Zusage für die Wiedervereinigung unseres geteilten Landes zu machen. Wir könnten entweder auf Bedingungen warten, die eher zu einer Annahme unseres Vorschlags führen, und es dann erneut versuchen, oder wir könnten andere Alternativen verfolgen …"
 taiwan.12.a: "Eine schlechte Wahl von ihnen."
 taiwan.13.t: "Streik der Taoyuan Flugbegleiter-Gewerkschaft"
 taiwan.13.d: "Die Taoyuan Flugbegleiter-Gewerkschaft, die etwa 2500 Kabinenmitarbeiter von China Airlines vertritt, hat den ersten Streik in der Geschichte der taiwanesischen Luftfahrt ausgerufen. Insgesamt wurden 122 Passagierflüge von China Airlines, die von den Flughäfen Taoyuan International und Taipei Songshan starten sollten, gestrichen. Dies führte dazu, dass 20.000 Passagiere gestrandet sind. Die Gewerkschaft hat uns sieben Forderungen für bessere Arbeitsbedingungen vorgelegt, die es zu akzeptieren gilt."
 taiwan.13.a: "Accept there demands"
 taiwan.13.b: "Wir geben niemals nach"
 taiwan.14.t: "Streik fehlgeschlagen"
 taiwan.14.d: "After we denied there demands the strike broke soon away. Everyone is going back to work now."
 taiwan.14.a: "Sie hatten niemals eine Chance"
 taiwan.15.t: "Der Streik geht weiter"
 taiwan.15.d: "After we denied there demands the strike just got more intense. It doesnt seem the strike will break away soon."
 taiwan.15.a: "Wir haben es zumindest versucht"
 taiwan.16.t: "Panzer ist von Brücke gestürzt"
 taiwan.16.d: "An army CM-11 tank toppled into a creek in Pingtung County as it was returning to base from a training exercise yesterday morning, killing three of the five soldiers onboard. The driver sustained only minor injuries and pulled himself out of the tank. The four others, who were inside the gun turret, could not escape through the turret's hatches because the tank was upside down."
 taiwan.16.a: "Beginne eine Untersuchung, wie das passieren konnte"
 taiwan_news.1.t: "Das Abkommen über den Dienstleistungshandel zwischen den beiden Seiten der Taiwanstraße (Cross-Strait Service Trade Agreement) wurde ratifiziert."
 taiwan_news.1.d: "Nach der Genehmigung durch das taiwanesische Parlament ist das CSSTA, ein Freihandelsabkommen zwischen Taiwan und dem chinesischen Festland, offiziell in taiwanesisches Recht umgesetzt worden."
 taiwan_news.1.a: "Taiwan rückt näher an China heran."
 taiwan_news.2.t: "Sonnenblumen-Demonstranten besetzen das taiwanesische Parlament"
 taiwan_news.2.d: "Mitglieder der von Studenten geführten Sonnenblumenbewegung haben gestern den Zaun zwischen ihnen und dem taiwanesischen Parlament erklommen, nachdem sie gegen die Versuche der Regierung protestiert hatten, das umstrittene Cross-Strait Service Trade Agreement (CSSTA), ein Freihandelsabkommen mit dem chinesischen Festland, zu verabschieden. Die Protestbewegung äußerte Bedenken über das überstürzte Vorgehen der Regierung bei der Ratifizierung des Vertrags und den Mangel an Transparenz während der Verhandlungen sowie über den Inhalt des Vertrags selbst."
 taiwan_news.2.a: "Ein Schlag für die KMT."
 taiwan_news.3.t: "Elemente des Militärs in Taiwan inszenieren einen Putsch"
 taiwan_news.3.d: "Eine Gruppe taiwanesischer Militäroffiziere hat begonnen, wichtige Orte auf der Insel Taiwan zu besetzen. [TAI.Getleader] hat den nationalen Notstand ausgerufen und diejenigen mobilisiert, die der Regierung treu bleiben. Es bleibt abzuwarten, ob die Bemühungen des Präsidenten erfolgreich sein werden.\n\nWährend das erklärte Ziel der Anführer des Staatsstreichs darin besteht, die Unzufriedenheit mit der [TAI.GetLeader]-Regierung zu beseitigen, haben viele der beteiligten hochrangigen Persönlichkeiten enge Verbindungen zu China. Trotzdem bleibt das Ausmaß der chinesischen Beteiligung an diesem Putschversuch unklar."
 taiwan_news.3.a: "Taiwans Zukunft steht auf dem Spiel."
 taiwan_news.4.t: "Der taiwanesische Putsch war erfolgreich"
 taiwan_news.4.d: "Nach dem gescheiterten Versuch von [TAI.Getleader], Unterstützung gegen den Staatsstreich zu sammeln, haben Militäroffiziere, die der pro-chinesischen Fraktion in Taiwan loyal sind, die Kontrolle über das Land übernommen. Obwohl die Offiziere eine Rückkehr zur Demokratie versprochen haben, ist die politische Autonomie Taiwans gegenüber dem Festland zweifellos in Gefahr. Angesichts der unausgesprochenen, aber weithin bekannten Unterstützung Chinas für den Staatsstreich ist die Wahrscheinlichkeit einer Resolution des Sicherheitsrates als Reaktion auf dieses Ereignis höchst unwahrscheinlich."
 taiwan_news.4.a: "Eine neue Ära in der taiwanesischen Geschichte."
 taiwan_news.5.t: "Der Putsch in Taiwan ist gescheitert"
 taiwan_news.5.d: "[TAI.Getleader] ging heute als Sieger hervor, als sich die letzten Teilnehmer des Putsches der taiwanesischen Polizei ergaben. In den letzten zwei Wochen ist es den Putschisten nicht gelungen, die Unterstützung des Volkes oder der eigenen Soldaten zu gewinnen. Dieser Mangel an Unterstützung trug zu den bestehenden Defiziten an Ressourcen und Moral bei, was dazu führte, dass sich die Putschisten im ganzen Land massenhaft den Behörden ergaben. [TAI.Getleader] versicherte den Journalisten, dass Stabilität und Ruhe in dem Inselstaat schnell wiederhergestellt würden, während China sich zu den jüngsten Ereignissen noch nicht geäußert hat."
 taiwan_news.5.a: "Die Krise wurde abgewendet."
 taiwan_news.5.b: "Es scheint, als bräuchten wir eine andere Lösung."
 taiwan_news.6.t: "Taiwan verabschiedet Gesetz zur Bekämpfung chinesischer Einmischung"
 taiwan_news.6.d: "Mit dem erklärten Ziel, chinesische Versuche der Einmischung in Taiwans Wahlprozess zu vereiteln, ist es [TAI.GetLeader] gelungen, ein umstrittenes „Anti-Infiltrationsgesetz“ im Parlament zu verabschieden. Das Gesetz verbietet feindlichen ausländischen Mächten, Wahlkampf zu betreiben, Lobbyarbeit zu betreiben, politische Spenden zu leisten oder Desinformationen zu verbreiten. Oppositionsabgeordnete haben sich ebenso wie Pekings Büro für Taiwan-Angelegenheiten entschieden gegen das Gesetz ausgesprochen. Beide bezeichneten [TAI.GetLeader] als „grünen Terror“, der zu einer Atmosphäre der Paranoia und Angst beitrage. Die Regierungspartei von [TAI.GetLeader] verteidigte den Schritt als notwendige Maßnahme angesichts der erheblichen Bedrohung, die vom chinesischen Festland für das Inselgebiet ausgeht."
 taiwan_news.6.a: "Taiwan schlägt zurück."
 hongkong.1.t: "Die Chinesen haben abgelehnt, die Annektion rückgängig zu machen!"
 hongkong.1.d: "China hat unsere Drohungen in den Wind geschlagen und uns keine andere Wahl gelassen, als sie wahr zu machen."
 hongkong.1.a: "Sie scheinen keine Angst mehr vor uns zu haben."
 hongkong.2.t: "China entsendet Truppen nach Hongkong"
 hongkong.2.d: "Nach den Protesten in der Sonderverwaltungsregion Hongkong hat China mehrere Einheiten der Volksbefreiungsarmee auf die Straßen von Hongkong geschickt, um „Recht und Ordnung wiederherzustellen“.[CHI.GetLeader] hat den „friedlichen Demonstranten“ versichert, dass sie nicht angegriffen werden und dass alle Festgenommenen im Einklang mit den internationalen Menschenrechtsbestimmungen behandelt werden.Viele Menschen in Hongkong und im Ausland haben sich jedoch skeptisch geäußert, inwieweit die chinesischen Truppen gegenüber den Demonstranten Zurückhaltung üben werden."
 hongkong.2.a: "Dieser Vorgang ist verabscheuungswürdig"
 hongkong.2.b: "China hat getan, was es tun musste."
 hongkong.2.c: "Das geht uns nichts an."
 hongkong.3.t: "China annektiert Hongkong"
 hongkong.3.d: "China hat beschlossen, Hongkongs Sonderstatus als Sonderverwaltungszone zu beenden und das Gebiet formell zu annektieren. Wir sollten uns überlegen, wie unser Lande auf dieses bedeutende Ereignis reagiert."
 hongkong.3.a: "Dieser Vorgang ist verabscheuungswürdig"
 hongkong.3.b: "China hat getan, was es tun musste."
 hongkong.3.c: "Das geht uns nichts an."
 hongkong.4.t: "Chinas Annexion Hongkongs erfordert eine Reaktion"
 hongkong.4.d: "In einem eklatanten Verstoß gegen das zwischen uns und den Chinesen ausgehandelte Grundgesetz hat China die Sonderverwaltungszone formell annektiert. Als Garant der 50-jährigen Autonomie Hongkongs müssen wir auf diesen illegalen Akt mit einer angemessenen Antwort reagieren."
 hongkong.4.a: "Wir sollten mit militärischen Maßnahmen drohen."
 hongkong.4.b: "Wir sollten mit wirtschaftlichen Maßnahmen drohen."
 hongkong.4.c: "Wir sollten diesen Schritt kritisieren."
 hongkong.5.t: "Das Vereinigte Königreich droht einen militärischen Eingreifen!"
 hongkong.5.d: "Die Briten haben auf die Annexion ihres ehemaligen Kolonialgebiets durch uns kriegerischer reagiert, als wir erwartet hatten. Wir sollten überlegen, ob wir ihren Forderungen nachgeben sollen."
 hongkong.5.a: "Auf diesem Hügel wollten wir nicht sterben."
 hongkong.5.b: "Lasst sie ruhig kommen."
 hongkong.6.t: "Das Vereinigte Königreich droht mit wirtschaftlichen Maßnahmen gegen uns!"
 hongkong.6.d: "Die Briten haben beschlossen, uns Sanktionen anzudrohen, wenn wir die Annexion ihres ehemaligen Kolonialgebiets nicht rückgängig machen. Wir sollten uns überlegen, ob wir ihren Forderungen nachkommen wollen oder nicht."
 hongkong.6.a: "Wir sollten eine Konfrontation vermeiden."
 hongkong.6.b: "Ihre Drohung ist bedeutungslos!"
 hongkong.7.t: "Die Chinesen haben zugestimmt, die Annexion rückgängig zu machen"
 hongkong.7.d: "Aus offensichtlicher Ehrfurcht vor der britischen Macht haben die Chinesen in der Frage Hongkong einen Rückzieher gemacht."
 hongkong.7.a: "Unsere Drohungen haben immer noch eine Wirkung!"
 hongkong_news.1.t: "Hongkong von weitreichenden Protesten erschüttert"
 hongkong_news.1.d: "Nach der Entscheidung Chinas, die Wahl des Chefs der Exekutive in Hongkong durch allgemeine Wahlen auszuschließen, sind in dem chinesischen Gebiet Massenproteste ausgebrochen. [HKG.GetLeader] hat erklärt, dass die Regierung von Hongkong zwar das Recht der Bevölkerung Hongkongs auf friedliche und legale Meinungsäußerung respektiert, Gewalt und Gesetzlosigkeit jedoch nicht toleriert werden. Die Reaktion Chinas auf die aktuelle Krise bleibt abzuwarten, da sich [CHI.GetLeader] nicht zu den jüngsten Ereignissen geäußert hat."
 hongkong_news.1.d_limit: "Nach der Entscheidung Chinas, dass der Chef der Exekutive von Hongkong nur dann in allgemeiner Wahl gewählt werden kann, wenn es die Kandidaten vorab genehmigt, kam es in dem chinesischen Gebiet zu Massenprotesten. [HKG.GetLeader] hat erklärt, dass die Regierung von Hongkong zwar das Recht der Bevölkerung Hongkongs auf friedliche und legale Meinungsäußerung respektiert, Gewalt und Gesetzlosigkeit jedoch nicht toleriert werden. Die Reaktion Chinas auf die aktuelle Krise bleibt abzuwarten, da sich [CHI.GetLeader] nicht zu den jüngsten Ereignissen geäußert hat."
 hongkong_news.1.d_reunification: "Nach der Ankündigung Chinas, dass Hongkong im Jahr 2047 seinen Sonderstatus verlieren und vollständig unter chinesische Kontrolle zurückkehren wird, sind in dem chinesischen Gebiet Massenproteste ausgebrochen. [HKG.GetLeader] hat erklärt, dass die Regierung von Hongkong zwar das Recht der Bevölkerung Hongkongs auf friedliche und legale Meinungsäußerung respektiert, Gewalt und Gesetzlosigkeit jedoch nicht toleriert werden. Die Reaktion Chinas auf die aktuelle Krise bleibt abzuwarten, da sich [CHI.GetLeader] nicht zu den jüngsten Ereignissen geäußert hat."
 hongkong_news.1.d_annexed: "Nach der heftig umstrittenen Annexion Hongkongs durch China sind in dem chinesischen Gebiet Massenproteste ausgebrochen. [HKG.GetLeader] hat erklärt, dass die Regierung von Hongkong zwar das Recht der Bevölkerung von Hongkong respektiert, ihre Ansichten friedlich und legal zum Ausdruck zu bringen, Gewalt und Gesetzlosigkeit jedoch nicht toleriert werden. Die Reaktion Chinas auf die aktuelle Krise bleibt abzuwarten, da sich [CHI.GetLeader] nicht zu den jüngsten Ereignissen geäußert hat."
 hongkong_news.1.a: "Interessante Entwicklung"
 hongkong_news.1.b: "Dies ist eine schlechte Nachricht für uns."
 hongkong_news.2.t: "Proteste in Hongkong verlaufen im Sande"
 hongkong_news.2.d: "Die Proteste in der Sonderverwaltungszone Hongkong gegen die jüngsten chinesischen Maßnahmen sind in den letzten Tagen allmählich zurückgegangen und praktisch zum Erliegen gekommen. Die Polizeieinsätze in dem chinesischen Gebiet sind auf keinen Widerstand gestoßen, und viele, die zuvor auf die Straße gegangen waren, sind in ihre Häuser zurückgekehrt. Es bleibt abzuwarten, was dies für die Beziehungen zwischen China und einem unruhigen Gebiet bedeutet, das ganz andere politische Werte vertritt als China. Ein Indikator für das, was kommen wird, war vielleicht ein von den Demonstranten an einem prominenten Ort im Stadtzentrum hinterlassenes Banner mit der Aufschrift „Wir werden zurückkommen“."
 hongkong_news.2.a: "Interessante Entwicklung"
 hongkong_news.2.b: "Sie wissen, dass ihre Sache aussichtslos ist."
 hongkong_news.3.t: "Proteste in Hongkong nehmen an Ausmaß zu"
 hongkong_news.3.d: "Die Proteste gegen das chinesische Vorgehen im Gebiet von Hongkong haben rapide zugenommen. Analysten sind sich weitgehend einig, dass die Proteste in Bezug auf Umfang und Taktik eine neue Phase erreicht haben. Es bleibt abzuwarten, wie die Regierungen Chinas und Hongkongs auf diese neue Eskalation reagieren werden, aber Berichten zufolge sind Beamte beider Regierungen zunehmend verärgert über die Auswirkungen der Proteste auf ihre ureigenen Interessen. Die Demonstranten ihrerseits weigern sich, die Proteste aufzugeben, bis die Regierungen Chinas und Hongkongs auf ihre Forderungen eingehen."
 hongkong_news.3.a: "Das Volk von Hongkong wird nicht schweigen..."
 hongkong_news.3.b: "Sie werden zu Hause bleiben, wenn sie wissen, was gut für sie ist!"
 korea.1.t: "China fordert unseren Rückzug von der koreanischen Halbinsel"
 korea.1.d: "Die Volksrepublik Korea hat gefordert, dass wir unsere Truppen zum Schutz der Republik Korea aus ihrem so genannten „Einflussbereich“ abziehen. Diese Forderung ist zweifellos ein Vorspiel für ein aggressives Vorgehen gegen die Republik Korea. Wenn wir unsere Truppen von der Halbinsel abziehen, wird die Wahrscheinlichkeit eines Konflikts jenseits der DMZ dramatisch steigen."
 korea.1.a: "Diese Forderung ist lächerlich!"
 korea.1.b: "Es ist besser für uns aufzugeben..."
 korea.2.t: "China ermutigt uns, Wirtschaftsreformen einzuleiten"
 korea.2.d: "[CHI.GetLeader] drängt unsere Regierung, Chinas Beispiel zu folgen und Reformen zur Marktliberalisierung einzuleiten. Es ist zwar verlockend, das gleiche rasche Wirtschaftswachstum wie China in den 1980er Jahren zu erleben, doch sollten wir dies gegen die Instabilität abwägen, die sich aus unserem Streben nach solchen Reformen unweigerlich ergeben würde."
 korea.2.a: "Jetzt ist nicht die Zeit für Reformen!"
 korea.2.b: "Kleinere Reformen einleiten."
 korea.2.c: "Moderate Reformen einleiten."
 korea.2.e: "Wichtige Reformen einleiten."
 korea.3.t: "[NKO.GetLeader] hat neue Wirtschaftsreformen angekündigt"
 korea.3.d: "Unter chinesischem Reformdruck hat Nordkorea einen Prozess der wirtschaftlichen Liberalisierung eingeleitet, von dem sich viele eine Anhebung des Lebensstandards im „Eremiten-Königreich“ erhoffen. Während viele Wirtschaftswissenschaftler den Beginn dieses Reformprozesses loben, haben andere Bedenken geäußert, ob das Tempo der Reformen nicht zu Instabilität in einem Land führen könnte, das sich an eine vollständige Planwirtschaft gewöhnt hat."
 korea.3.a: "Ermutigende Neuigkeiten?"
 korea.4.t: "Die chinesisch-nordkoreanische Spaltung"
 korea.4.d: "Die Kritik an [NKO.GetLeader]s Regime in den regierungsnahen chinesischen Medien hat in den letzten Wochen dramatisch zugenommen. Sie richtete sich gegen Nordkoreas anhaltendes Atomproblem und das Versäumnis des nordkoreanischen Staates, die Lebensbedingungen seiner Bürger durch wirtschaftliche Liberalisierung zu verbessern, wie China es in den letzten Jahrzehnten getan hat.\n\nObwohl [CHI.GetLeader] zu diesem Thema schweigt, wird allgemein angenommen, dass diese Medien ohne [CHI.GetLeader]s stillschweigende Zustimmung keine so scharfe Kritik an einem einst engen Verbündeten geäußert hätten. Viele Beobachter sehen darin einen Höhepunkt der chinesischen Frustration über die Kim-Dynastie und möglicherweise den Wunsch nach einer alternativen Regierung, die stabiler und Chinas Wünschen entgegenkommender ist."
 korea.4.a: "Nur [CHI.GetLeader] weiß, wohin das führt …"
 korea.5.t: "Die Verhandlungen beginnen"
 korea.5.d: "Die wichtigste Forderung des Nordens ist die Einstellung unserer gemeinsamen Militärübungen mit den USA. Sie sehen diese als Vorbereitung auf eine Invasion ihres Territoriums. Unsere Streitkräfte betrachten diese Übungen jedoch allgemein als notwendige Vorbereitung für den Fall eines nordkoreanischen Angriffs. Eine Einstellung dieser Übungen wäre daher ein großes Wagnis, das die Sicherheit unseres Landes aufs Spiel setzt."
 korea.5.d_NKO: "Die Hauptforderung des Südens ist die Einstellung unserer Atomwaffentests, die er als Beweis unserer aggressiven Absichten betrachtet. Unser Atomwaffenprogramm wird vom Militär jedoch als wichtiges Abschreckungsmittel gegen eine US-Invasion angesehen. Darüber hinaus stärken das Programm und die für seine Fortsetzung notwendigen Tests die Legitimität unserer Regierung. Ein Ende dieser Tests wäre daher ein großes Wagnis, das sowohl die Sicherheit unseres Landes als auch unserer Regierung aufs Spiel setzt."
 korea.5.a: "Unser Land wird nie wieder ganz sein, wenn wir nicht ein paar Risiken eingehen …"
 korea.5.b: "Some risks are too big too take."
 korea.6.t: "Beginn der koreanischen Friedensgespräche"
 korea.6.d: "Seit über einem halben Jahrhundert befinden sich Nord- und Südkorea technisch gesehen im Kriegszustand. Dieser eingefrorene Konflikt hat sich gelegentlich durch Zusammenstöße zwischen den beiden Seiten entlang der umstrittenen Seegrenzen oder über die DMZ hinweg aufgeheizt. Nun treffen sich die beiden Seiten in der Hoffnung, diesen Zustand zu beenden und durch einen formellen Friedensvertrag eine Deeskalation auf der koreanischen Halbinsel zu erreichen. Die Aushandlung eines Friedensvertrags wird weithin als ein wichtiger erster Schritt zur Wiedervereinigung der koreanischen Halbinsel angesehen."
 korea.6.a: "Können die beiden Seiten einen Kompromiss finden?"
 korea.7.t: "[CHI.GetLeader] Unterstützung für die koreanische Wiedervereinigung"
 korea.7.d: "China hat sich seit jeher vor der Aussicht auf ein mit den Vereinigten Staaten verbündetes vereinigtes Korea vor seiner Haustür gefürchtet. Beobachter waren daher überrascht, als [CHI.GetLeader] sich unmissverständlich für eine Wiedervereinigung aussprach, was die nordkoreanische Führung einigen Berichten zufolge überrumpelt hat. Angesichts des großen Einflusses Chinas auf der koreanischen Halbinsel dürfte diese Ankündigung die beiden Seiten unter Druck setzen, an den Verhandlungstisch zu kommen."
 korea.7.a: "Liegt ein Wandel in der Luft?"
 korea.8.t: "Radikale koreanische Bewegung gewinnt an Popularität"
 korea.8.d: "Die wirtschaftliche Ungleichheit in der Republik Korea hat zu einer wachsenden Unzufriedenheit in den unteren Schichten des Landes beigetragen. Tausende von Online-Aktivisten haben begonnen, mehr Gleichheit durch die Einführung von Autonomie auf Gemeindeebene in ganz Korea zu fordern. Obwohl die Bewegung führerlos ist und daher keine zentrale, klare Botschaft hat, scheint die Mehrheit ihrer Mitglieder die Abschaffung des koreanischen Staates und der Chaebols, an die er gebunden ist, zugunsten eines Systems zu wünschen, das die politische und wirtschaftliche Macht unter direkt gewählten Vertretern auf Gemeindeebene verteilt.\n\nDiese neue Ideologie, die die grundlegenden Ideologien sowohl der Republik Korea als auch der Demokratischen Volksrepublik Korea ablehnt, stellt eine deutliche Abkehr von der traditionellen Politik der radikalen südkoreanischen Linken dar, die entweder eine linke Politik innerhalb des bestehenden politischen Systems Südkoreas gefördert oder die Errichtung eines Staates nach nordkoreanischem Vorbild gefordert hat."
 korea.8.a: "Etwas ist im Gange in der ROK..."
 korea.9.t: "Rebellen im Süden bitten um unsere Unterstützung"
 korea.9.d: "Vertreter der Nationalen Befreiungsbewegung Koreas, die die Regierung im Süden stürzen wollen, haben sich an uns gewandt und um ein Bündnis gebeten, um eine neue Front entlang der DMZ zu eröffnen."
 korea.9.a: "Wir werden uns ihrem Kampf anschließen!"
 korea.9.b: "Wir werden von der Seitenlinie aus zusehen."
 JUCHE_FACTION: "Koreanische Anti-Imperialistische Front"
 korea.10.t: "Südkorea fordert, dass wir den Schutz des Nordens beenden"
 korea.10.d: "Seit geraumer Zeit bemüht sich Südkorea zu zeigen, dass es nicht mehr ein Land ist, das den Interessen der USA verpflichtet ist. Die Beziehungen zwischen unseren beiden Ländern befinden sich auf einem Höchststand, während unsere Beziehungen zum Norden weitgehend stagnieren. Nun ist eine südkoreanische Delegation gekommen, um ein Ende des Verteidigungsabkommens zwischen uns und den Nordkoreanern zu fordern. Wenn wir ihrer Forderung zustimmen, werden wir Nordkorea im Falle einer Invasion von außen nicht mehr zu Hilfe kommen."
 korea.10.a: "Wir werden unseren Verbündeten beistehen!"
 korea.10.b: "Der Norden ist unseren Schutz nicht wert."
 korea.11.t: "Koreanische Rüstungsunternehmen bieten Produkte an"
 korea.11.d: "Die Republik Korea ist dafür bekannt, dass sie hochwertige Waffen zu relativ erschwinglichen Preisen herstellen kann. Wir sollten in Erwägung ziehen, einige ihrer Ausrüstungsgegenstände zu kaufen, aber unsere Mittel sind nicht unbegrenzt, so dass wir mit Bedacht wählen sollten."
 korea.11.a: "Kauf koreanischer Panzer."
 korea.11.b: "Kauf koreanischer Panzerartillerie."
 korea.11.c: "Kauf koreanischer Schulflugzeuge."
 korea.11.e: "Kauf koreanischer Sturmgewehre."
 korea.11.f: "Angebot ablehnen."
 korea.12.t: "[FROM.GetName] stimmt einem Waffengeschäft zu!"
 korea.12.d: "Die Vertreter dieses Landes haben zugestimmt, Waffen von uns zu importieren, was unsere Einnahmen und unseren internationalen Einfluss erhöht."
 korea.12.a: "Unser internationales Ansehen wächst!"
 korea.13.t: "Peking und Seoul kritisieren gemeinsam die japanischen Handlungen im Zweiten Weltkrieg"
 korea.13.d: "In einem seltenen Schritt haben die Regierungen Chinas und der Republik Korea eine gemeinsame Erklärung abgegeben, in der sie Japans Kriegshandlungen und seine anschließende Weigerung, diese vollständig zu sühnen, kritisieren. Viele Beobachter haben diesen Schritt als Teil der Bemühungen Seouls interpretiert, China von seiner Unterstützung für Nordkorea abzubringen. Während Pjöngjang seine Unterstützung für die gemeinsame Verurteilung durch [KOR.GetLeader] und [CHI.GetLeader] zum Ausdruck gebracht hat, ist [NKO.GetLeader] Berichten zufolge besorgt über Anzeichen, dass China Seoul zunehmend bevorzugt."
 korea.13.a: "Wir werden nie vergessen, was sie getan haben."
 korea.13.b: "Ihre Kritik ist ermüdend..."
 korea.13.c: "Die Vergangenheit wirft einen langen Schatten..."
 korea.14.t: "China kündigt Verteidigungsabkommen mit Nordkorea"
 korea.14.d: "Nach dem Abzug der US-Militärpräsenz aus Südkorea hat China zugestimmt, aus dem Verteidigungsabkommen mit Nordkorea auszusteigen, was von Pjöngjang scharf verurteilt wurde. Dieser Schritt folgt auf eine lange Reihe von Maßnahmen, mit denen Seoul die Unterstützung Chinas gewinnen und seine Unabhängigkeit von Washington demonstrieren wollte. Einige haben die Hypothese aufgestellt, dass [KOR.GetLeader] nun, da der Weg für eine gewaltsame Wiedervereinigung frei ist, beschlossen hat, den Norden mit Gewalt zurückzuerobern."
 korea.14.a: "Unsere Bemühungen haben sich gelohnt."
 korea.14.b: "Wir haben Pjöngjang schon zu lange toleriert."
 korea.14.c: "Zeichnet sich ein Krieg ab?"
 korea.15.t: "[KOR.GetLeader] Fordert japanische Reparationen"
 korea.15.d: "Nach wochenlanger feindseliger Rhetorik aus Seoul und dem Druck koreanischer Aktivisten hat [KOR.GetLeader] Japan aufgefordert, Reparationszahlungen an Überlebende japanischer Kriegsverbrechen während des Zweiten Weltkriegs zu leisten. Japan, das behauptet, die Angelegenheit sei zwischen seiner Regierung und der Südkoreas während der Herrschaft des autoritären Machthabers Park Chung-hee geregelt worden, hat sich vorhersehbar geweigert, die Zahlung von Reparationen in Erwägung zu ziehen.\n\nObwohl die Angelegenheit nicht zu einer Entschädigung der koreanischen Opfer geführt hat, hat sie die politische Position von [KOR.GetLeader] gestärkt, da sich viele Koreaner um dieses äußerst emotionale nationale Anliegen scharen."
 korea.15.a: "Eines Tages werden wir Gerechtigkeit erfahren."
 korea.15.b: "Ihre Forderungen sind absurd!"
 korea.15.c: "Können ihre Meinungsverschiedenheiten beigelegt werden?"
 korea.16.t: "Krieg!"
 korea.16.d: "Zwischen uns und dem Norden ist ein Krieg ausgebrochen. Gemäß unserem Abkommen mit den Vereinigten Staaten müssen wir nun die operative Kontrolle über unsere Streitkräfte an das US-Militär abgeben."
 korea.16.a: "Wir müssen die Kontrolle abgeben."
 korea.17.t: "Der Krieg ist vorbei"
 korea.17.d: "Auf der koreanischen Halbinsel ist wieder Frieden eingekehrt. Jetzt, da wir zu Friedensbedingungen zurückgekehrt sind, können wir die Kontrolle über unsere Streitkräfte wiederherstellen."
 korea.17.a: "Endlich Frieden."
 korea.18.t: "Wahlen zur Nationalversammlung: Parteien beginnen mit dem Wahlkampf"
 korea.18.d: "Da in etwa einem Monat Wahlen zur Nationalversammlung anstehen, sollten wir damit beginnen, die Popularität unserer Partei zu steigern, um eine Mehrheit in der Legislative für die nächsten vier Jahre zu erreichen."
 korea.18.a: "Hoffen wir auf eine Mehrheit!"
 korea.21.t: "Die Ergebnisse sind da!"
 korea.21.a: "Wie immer war es eine hart umkämpfte Wahl."
 korea.21.d_no: "Leider konnte keine der beiden großen Parteien eine Mehrheit in der Nationalversammlung erlangen. Unsere Regierung wird härter kämpfen müssen, um die Abgeordneten anderer Parteien für die Verabschiedung umstrittener Gesetze zu gewinnen."
 korea.21.d_con_loss: "Leider ist es unserer Partei nicht gelungen, eine Mehrheit in der Nationalversammlung zu erlangen. Die liberalen Gesetzgeber werden sich weigern, Gesetze zu verabschieden, die die Gewerkschaften einschränken, das Großkapital unterstützen oder die Feindschaft zu Nordkorea fördern."
 korea.21.d_lib_loss: "Leider ist es unserer Partei nicht gelungen, eine Mehrheit in der Nationalversammlung zu erlangen. Die konservativen Gesetzgeber werden sich weigern, Gesetze zu verabschieden, die das Großkapital einschränken, die Wehrpflicht und den Geheimdienst reformieren oder die Aussöhnung mit Nordkorea fördern."
 korea.21.d_con_win: "Glücklicherweise ist es unserer Partei gelungen, eine Mehrheit in der Nationalversammlung zu gewinnen. Die Legislative und die Exekutive werden Hand in Hand arbeiten können, um konservative Ziele wie die Einschränkung der Gewerkschaften, die Unterstützung der Chaebols und eine harte Haltung gegenüber Nordkorea zu erreichen."
 korea.21.d_lib_win: "Fortunately, our party has succeeded in winning a majority in the National Assembly. The legislature and executive will be able to work hand in hand in order to facilitate liberal goals such as weakening the chaebols, reforming the security apparatus, and pursuing reunification with the North."
 korea.22.t: "Die Schocks der Wiedervereinigung beginnen zu wirken"
 korea.22.d: "Die große Nation Korea ist nach vielen Jahrzehnten schmerzhafter Trennung endlich wiedervereinigt worden. Unsere Aufgabe, die beiden Hälften wieder zusammenzuführen, ist jedoch noch lange nicht abgeschlossen. Viele auf beiden Seiten des 38. Breitengrades sind unzufrieden mit der Art und Weise, wie die Wiedervereinigung stattgefunden hat, und die wirtschaftlichen Kosten der Wiedervereinigung zweier sehr unterschiedlicher Staaten werden schnell deutlich. Sollten wir bei unserer Aufgabe der Wiedervereinigung des Landes scheitern, könnten wir mit der Auflösung unserer neugeborenen Nation konfrontiert werden."
 korea.22.a: "Jetzt beginnt der schwierige Teil..."
 korea.23.t: "Unsere Antwort auf das Friedensangebot des Südens"
 korea.23.d: "Nach wochenlangen Diskussionen ist nun der Zeitpunkt gekommen, an dem wir entscheiden müssen, ob wir bereit sind, das Friedensangebot des Südens anzunehmen. Wir müssen abwägen, ob wir auf die Aufrichtigkeit des Angebots des Südens vertrauen, aber auch, wie ein Friedensvertrag von unseren heimischen Anhängern wahrgenommen wird, die immer noch hoffen, das Land eines Tages gewaltsam wiedervereinigen zu können."
 korea.23.a: "Wir werden einem Vertrag zustimmen."
 korea.23.b: "Es wird nie Frieden zwischen uns geben!"
 korea.24.t: "Unterzeichnung des koreanischen Friedensabkommens"
 korea.24.d: "Nach einer Verbesserung der Beziehungen zwischen den beiden koreanischen Staaten haben sich [KOR.GetLeader] aus dem Süden und [NKO.GetLeader] aus dem Norden darauf geeinigt, das dürftige Waffenstillstandsabkommen durch eine formelle Friedensvereinbarung zu ersetzen. Mit diesem Vertrag wird der seit dem Koreakrieg bestehende Zustand der Feindseligkeit zwischen den beiden Koreas endgültig beendet. Beide Staatsoberhäupter haben die Hoffnung geäußert, dass diese Entwicklung die Halbinsel auf einen Weg zur Wiedervereinigung bringen wird, obwohl einige Beobachter Zweifel an der Bereitschaft beider Seiten zur Wiedervereinigung geäußert haben."
 korea.24.a: "Die Halbinsel hat eine glänzende Zukunft vor sich!"
 korea.25.t: "Interkoreanische Gespräche scheitern"
 korea.25.d: "Die Gespräche in Panmunjom zwischen [KOR.GetLeader] aus dem Süden und [NKO.GetLeader] aus dem Norden sind wegen verschiedener Meinungsverschiedenheiten zwischen den beiden Seiten gescheitert. Die Tatsache, dass es in einigen Punkten zu einer Einigung gekommen ist, lässt einige auf eine Wiederaufnahme der Gespräche in der Zukunft hoffen, aber es ist klar, dass eine Einigung zwischen den beiden koreanischen Staaten noch lange auf sich warten lassen wird."
 korea.25.a: "Der Frieden bleibt schwer fassbar..."
 korea.26.t: "Südkorea schlägt Wiedervereinigung vor"
 korea.26.d: "In dem Bestreben, aus der beispiellosen Verbesserung der Beziehungen zwischen den beiden koreanischen Staaten Kapital zu schlagen, bietet der Süden an, mit uns zusammenzuarbeiten, um unsere geteilte Nation wieder zu vereinen. Sie bestehen jedoch darauf, dass der Prozess der Wiedervereinigung vom Süden geleitet wird, eine Forderung, die die einzigartige politische Kultur, die wir im Norden entwickelt haben, bedroht."
 korea.26.d1: "In dem Bestreben, aus der beispiellosen Verbesserung der Beziehungen zwischen den beiden koreanischen Staaten Kapital zu schlagen, bietet der Süden an, mit uns zusammenzuarbeiten, um unsere geteilte Nation wieder zu vereinigen. Der Süden versteht unsere Bedenken bezüglich der Wiedervereinigung und hat angeboten, die Macht nach der Wiedervereinigung durch eine Einheitsregierung zu teilen, die sowohl Elemente des Nordens als auch des Südens umfasst."
 korea.26.a: "Unser Land wird wieder ganz sein!"
 korea.26.b: "Die Wiedervereinigung kann unter diesen Bedingungen niemals stattfinden..."
 korea.27.t: "Der Norden hat unseren Bedingungen für die Wiedervereinigung zugestimmt!"
 korea.27.d: "Nach umfangreichen Verhandlungen hat sich der Norden bereit erklärt, auf die Wiedervereinigung unserer beiden Länder hinzuarbeiten! Da sich die Beziehungen zwischen den beiden Koreas stabilisiert haben und die Wiedervereinigung der Halbinsel in Sicht ist, hat die Zukunft des koreanischen Volkes noch nie so rosig ausgesehen!"
 korea.27.a: "Fantastische Neuigkeiten!"
 korea.28.t: "Der Norden hat unsere Bedingungen für die Wiedervereinigung abgelehnt!"
 korea.28.d: "Bedauerlicherweise hat sich [NKO.GetLeader] dafür entschieden, ihre eigene egoistische Position über die des koreanischen Volkes zu stellen, und unser Angebot zur Zusammenarbeit bei der Wiedervereinigung des Landes abgelehnt. Diese Ablehnung bedeutet nicht, dass wir in der Zukunft keinen weiteren Versuch unternehmen können, aber sie bedeutet, dass die Wiedervereinigung in naher Zukunft nicht stattfinden wird. Wir müssen die Grundlagen dafür schaffen, dass unser nächster Versuch erfolgreicher sein wird."
 korea.28.a: "Ein trauriger Tag für das koreanische Volk..."
 korea.29.t: "China fordert die Übergabe der sterblichen Überreste von Angehörigen der Chinesischen Volksfreiwilligenarmee von Südkorea an China"
 korea.29.d: ""
 korea.29.a: "Natürlich werden wir das tun. Wir respektieren diese Soldaten."
 korea.29.b: "They are our enemies and invadors of our land! We can't accept this!"
 korea.30.t: "Erste Überführung der sterblichen Überreste von Soldaten der People's Volunteer Army von ROK nach China"
 korea.30.d: "\nDie erste Sammlung bestand aus Überresten, die bei Ausgrabungen in verschiedenen Regionen wie der Gangwon-Provinz und der Gyeonggi-Provinz gefunden wurden. Viele der Überreste waren nicht identifizierbar. Die erste Sammlung enthielt ursprünglich schätzungsweise die sterblichen Überreste von 425 Soldaten, aber diese Schätzung wurde später auf 437 erhöht.\n\nChina und Südkorea hielten eine Übergabezeremonie für diese Überreste in Korea auf dem internationalen Flughafen Incheon ab. Chinesische und koreanische Vertreter unterzeichneten dort das Übergabeprotokoll. Die koreanische Seite schickte zweiundzwanzig Fahrzeuge zur Überführung der sterblichen Überreste. Nachdem die Spezialflugzeuge der chinesischen Luftwaffe in den chinesischen Luftraum eingedrungen waren, kamen zwei J-11 als Eskorte."
 korea.30.a: "Prost!"
 korea.31.t: "Siebte Überführung der sterblichen Überreste von Soldaten der Volksfreiwilligenarmee von der Republik Korea nach China"
 korea.31.d: "Südkorea übergab 117 sterbliche Überreste am Flughafen Incheon. Der chinesische Minister für Veteranenangelegenheiten nahm an der Zeremonie teil. Die sterblichen Überreste waren 2019 in Arrow Hill (dem Ort der Schlacht am Weißen Pferd) in der entmilitarisierten Zone Nordkoreas ausgegraben worden."
 korea.31.a: "Prost!"
 korea.33.t: "Unsere Antwort auf das Friedensangebot des Nordens"
 korea.33.d: "Nach wochenlangen Gesprächen ist nun der Zeitpunkt gekommen, an dem wir entscheiden müssen, ob wir bereit sind, das Friedensangebot des Nordens anzunehmen. Wir müssen abwägen, ob wir auf die Aufrichtigkeit des Angebots des Nordens vertrauen, aber auch, wie die Zustimmung zu einem Friedensvertrag von denjenigen in unserer Bevölkerung aufgenommen wird, die weiterhin gegen Verhandlungen mit dem nordkoreanischen Regime sind."
 korea.34.t: "Nordkorea schlägt Wiedervereinigung vor"
 korea.34.d: "In dem Bestreben, aus der beispiellosen Verbesserung der Beziehungen zwischen den beiden koreanischen Staaten Kapital zu schlagen, bietet der Norden an, mit uns zusammenzuarbeiten, um unsere geteilte Nation wieder zu vereinen. Sie bestehen jedoch darauf, dass der Prozess der Wiedervereinigung vom Norden geleitet wird, eine Forderung, die die Lebensweise, die wir im Süden kultiviert haben, bedroht."
 korea.34.d1: "In dem Bestreben, aus der beispiellosen Verbesserung der Beziehungen zwischen den beiden koreanischen Staaten Kapital zu schlagen, bietet der Norden an, mit uns zusammenzuarbeiten, um unsere geteilte Nation wieder zu vereinigen. Der Norden versteht unsere Bedenken hinsichtlich der Wiedervereinigung und hat angeboten, die Macht nach der Wiedervereinigung durch eine Einheitsregierung zu teilen, die sowohl Elemente des Südens als auch des Nordens umfasst."
 korea.35.t: "Der Süden hat unseren Bedingungen für die Wiedervereinigung zugestimmt!"
 korea.35.d: "Nach umfangreichen Verhandlungen hat der Süden zugestimmt, mit der Arbeit an der Wiedervereinigung unserer beiden Länder zu beginnen! Da sich die Beziehungen zwischen den beiden Koreas stabilisiert haben und die Wiedervereinigung der Halbinsel in Sicht ist, hat die Zukunft des koreanischen Volkes noch nie so rosig ausgesehen!"
 korea.36.t: "Der Süden hat unsere Bedingungen für die Wiedervereinigung abgelehnt!"
 korea.36.d: "Bedauerlicherweise hat sich [KOR.GetLeader] dazu entschlossen, seine eigene egoistische Position über die des koreanischen Volkes zu stellen, und unser Angebot zur Zusammenarbeit bei der Wiedervereinigung des Landes abgelehnt. Diese Ablehnung bedeutet nicht, dass wir in der Zukunft keinen weiteren Versuch unternehmen können, aber sie bedeutet, dass die Wiedervereinigung in naher Zukunft nicht stattfinden wird. Wir müssen die Grundlagen dafür schaffen, dass unser nächster Versuch erfolgreicher sein wird."
 korea.37.t: "Korea erhält ständigen Sitz im UN-Sicherheitsrat"
 korea.37.d: "Bei der heutigen Sitzung des UN-Sicherheitsrats stimmten die fünf ständigen Mitglieder dem Antrag Koreas auf Aufnahme als neues ständiges Mitglied zu. Korea bekräftigte seine Zusage, im Einklang mit seinen Verpflichtungen aus der UN-Charta sein Möglichstes zu tun, um den Weltfrieden zu wahren."
 korea.37.a: "Die Welt hat Korea endlich eine gewisse Entschädigung für die erzwungene Teilung gewährt."
 korea.38.t: "Korea bittet uns, unsere Truppen in Japan und Korea abzuziehen"
 korea.38.d: "Korea hat heute ein förmliches Ersuchen um den Abzug unserer Truppen in Japan und Korea an uns gerichtet."
 korea.38.a: "Wir werden ihren unangemessenen Forderungen nicht nachkommen."
 korea.38.b: "Vielleicht ist es Zeit für die Soldaten, nach Hause zu gehen......"
 recognition.1.t: "[FROM.GetName] Recognizes the Breakaway"
 recognition.1.d: "[FROM.GetNameDef] has extended formal diplomatic recognition to the breakaway state on our territory. The decision is a setback for our claim to the region."
 recognition.1.a: "Wir werden nicht gespalten sein."
 recognition.3.t: "[FROM.GetName] Withdraws Recognition"
 recognition.3.d: "[FROM.GetNameDef] has reversed its earlier recognition of our sovereignty. Whatever the reason, the result is the same."
 recognition.3.a: "The struggle continues."
 recognition.4.t: "[FROM.GetName] Withdraws Recognition of the Breakaway"
 recognition.4.d: "[FROM.GetNameDef] has reversed its earlier recognition of the breakaway state on our territory. One fewer capital backs their claim to sovereignty."
 recognition.4.a: "A small victory for our position."
 recognition.7.t: "[FROM.GetName] Beitritt zu den Vereinten Nationen"
 recognition.7.d: "After a sustained campaign for international recognition, [FROM.GetNameDef] has been admitted to the United Nations General Assembly as a member state."
 recognition.7.a: "Welcome to the General Assembly."
 recognition.8.t: "[FROM.GetName] Pressures Us to Recognize [pressured_to_recognize]"
 recognition.8.d: "[FROM.GetNameDef] is leveraging its influence over us to force recognition of [pressured_to_recognize]. Refusing a partner with this much leverage carries a real cost."
 recognition.8.a: "We extend recognition."
 recognition.8.b: "We refuse to recognize this regime."
 internal_faction.1.t: "Das Militär fordert eine Budgeterhöhung"
 internal_faction.1.d: "Unter Berufung auf neue Bedrohungen für unsere nationale Sicherheit hat das Militär eine Aufstockung des [ROOT.GetAdjective] Verteidigungshaushalts beantragt. Wenn diesem Antrag stattgegeben wird, erhöht sich der Druck auf unseren Haushalt, aber wenn er abgelehnt wird, sinkt die Meinung des Militärs über unsere Regierung."
 internal_faction.1.a: "Wir sollten ihnen das Geld geben."
 internal_faction.1.b: "Diese Kosten können wir uns nicht leisten!"
 internal_faction.2.t: "Einige Kader der Kommunistischen Partei sind in korrupte Aktivitäten verwickelt!"
 internal_faction.2.d: "Unsere Geheimdienste haben kürzlich aufgedeckt, dass einige kommunistische Parteifunktionäre Bestechungsgelder annehmen und Vetternwirtschaft betreiben. Einerseits sollten wir solche Aktivitäten nicht ungestraft lassen, wenn wir in den Augen des Volkes legitim bleiben wollen, andererseits wird ein solcher Schritt viele wichtige Verbündete innerhalb der Kommunistischen Partei definitiv verprellen."
 internal_faction.2.a: "Wir sollten ein Auge zudrücken."
 internal_faction.2.b: "Wir müssen an ihnen ein Exempel statuieren!"
 internal_faction.3.t: "Industriekonglomerate beantragen Steuererleichterungen"
 internal_faction.3.d: "Die Chefs einiger der größten Industriekonglomerate von [ROOT.GetName] betreiben privat Lobbyarbeit bei unserer Regierung, damit diese ihnen mehr Steuervergünstigungen gewährt. Die Gewährung dieser Steuererleichterungen wird die Meinung der Industriekonglomerate über unsere Regierung verbessern, aber unsere landesweiten Steuereinnahmen verringern."
 internal_faction.3.a: "Wir sollten die Steuererleichterungen gewähren."
 internal_faction.3.b: "Wir können uns ein solches Zugeständnis nicht leisten."
 isis.1.t: "Sieg über den Islamischen Staat"
 isis.1.d: "Jetzt, da der Islamische Staat besiegt ist, wird unser Land nicht mehr von der extremistischen Propaganda des Islamischen Staates geplagt. Jetzt können wir uns darauf konzentrieren, unsere Ideen in unserem Land zu verbreiten und nie wieder Extremisten die Oberhand gewinnen zu lassen."
 isis.1.a: "Großartige"
 isis.2.t: "Infiltrate Tahrir al-Sham?"
 isis.2.d: "O Kalif aller Muslime, [Root.GetLeader]. Wir sollten das Herz unseres abscheulichen Feindes, Tahrir al-Scham, treffen, der sich weigert, deine gerechte und rechtmäßige Herrschaft anzuerkennen. Obwohl sie vom Weg des wahren Islam und des glorreichen Dschihad abgekommen sind, haben sie viele gute Dschihadisten in ihren Reihen. Inshallah, wir sollten sie infiltrieren und versuchen, so viele wie möglich zu unserem glorreichen Kalifat überlaufen zu lassen!"
 isis.2.a: "Versuchen wir, echte Kämpfer von diesem falschen Dschihadisten-Outfit abzubringen!"
 isis.2.b: "Nein, wir können uns die möglichen internen Streitigkeiten nicht leisten."
 isis.2.a_tt: "§HInfiltration fehlgeschlagen§! (Keine Auswirkung)"
 isis.3.t: "Kämpfer laufen zur ISIS über"
 isis.3.d: "[Root.GetLeader]! Der sogenannte \"Islamische Staat\" hat uns infiltriert und es geschafft, einige unserer besten Kämpfer dazu zu bringen, sich ihrem lächerlichen Vorwand eines Kalifats anzuschließen. Wir sollten dies nicht unbeantwortet lassen, wir sollten zurückschlagen und diese Kharijiten besiegen, die links und rechts Takfir machen, während sie den Heiligen Koran als Toilettenpapier benutzen."
 isis.3.a: "Wir, die rechtschaffenen Dschihadisten, werden sie wie Hunde abschlachten!"
 isis.3.b: "Nein, wir können uns keine weitere Front in diesem Krieg leisten."
 isis.4.t: "Tahrir al-Sham units defect"
 isis.4.d: "O Kalif, viele gerechte und tapfere Muwahhid-Brüder sind von der bösen Tahrir al-Scham-Front übergelaufen und haben sich stattdessen unserer Sache angeschlossen!"
 isis.4.a: "Takbir! Islamischer Staat Takbir!"
 isis.4.a_tt: "Fügt 2 §HJabat al-Nusra Brigaden§! in §HRaqqa§! hinzu."
 isis.5.t: "Zeichen der Schwäche von Tahrir al-Sham"
 isis.5.d: "O Kalif, die ekelhafte Tahrir al-Scham-Front ist schwächer als wir dachten und hat unserer Infiltration und den jüngsten Überläufen nichts entgegenzusetzen. Der Kriegsrat der Shura empfiehlt, ihre verrottenden Überreste wie Hunde abzuschlachten und ihr Gebiet einzunehmen - und es unserem glorreichen Kalifat hinzuzufügen!"
 isis.5.a: "Bringt diesen falschen Dschihadisten bei, wer der wahre Nachfolger von Scheich Osama ist!"
 isis.5.b: "Ihre Zeit wird kommen, aber bis dahin müssen wir warten."
 isis.6.t: "Überreste von Tahrir al-Scham schließen sich unserem Kalifat an"
 isis.6.d: "O Kalif, der süße Saft des Sieges ist auf unseren Lippen. Im Angesicht der Niederlage haben die Überreste von Tahrir al-Sham dir, [Root.GetLeader], und unserem immer größer werdenden Kalifat die Treue geschworen."
 isis.6.a: "Wir heißen unsere Brüder im wahren Kalifat willkommen!"
 isisNews.1.t: "Tahrir al-Scham schließt sich mit ISIS zusammen"
 isisNews.1.d: "Angesichts des zunehmenden Drucks auf die syrischen Islamisten von Tahrir al-Sham haben deren verbliebene Kräfte in einem letzten verzweifelten Versuch, ihre fundamentalistische Ideologie in Syrien durchzusetzen, dem ISIS die Treue geschworen."
 isisNews.1.a: "Gott helfe uns allen!"
 isis.7.t: "Versteckt"
 isis.7.d: "Versteckt"
 isis.7.a: "Versteckt"
 isis.1301.t: "Abu Fatima bei Luftangriff der Koalition getötet"
 isis.1301.d: "Schlechte Nachrichten, Kalif! Ihr guter Freund und irakischer Stellvertreter, Abu Fatima al-Jaheishi, ist bei einem feigen Luftangriff der Amerikaner tapfer ums Leben gekommen.\n\n                                               Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah sein Martyrium annehmen."
 isis.1301.a: "Wir werden ihn rächen, wenn wir Washington DC erobern!"
 isisNews.1301.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1301.d: "Der irakische Terrorist und hochrangige ISIS-Befehlshaber Abu Fatima al-Jaheishi wurde heute bei einem Luftangriff der US-Koalition getötet. Abu Fatima gehörte zum inneren Kreis von al-Baghdadi und war stellvertretender Anführer der von ISIS kontrollierten Teile des Irak."
 isisNews.1301.a: "Auf Nimmerwiedersehen!"
 isis.1302.t: "al-Sulami bei Luftangriff der Koalition gemartert"
 isis.1302.d: "Schlechte Nachrichten, Kalif! Der oberste Geistliche Abu Sufyan al-Sulami ist bei einem feigen Luftangriff der Amerikaner den Märtyrertod gestorben. Er kam aus Bahrain zu uns und gab uns wichtige religiöse Unterstützung für unser Kalifat.\n\nO Kalif, er hat uns alle mit seiner wunderschönen Biografie über dich inspiriert.\n\nMöge Allah seinen Märtyrertod annehmen."
 isisNews.1302.t: "ISIS-Chefkleriker bei Luftangriff der Koalition getötet"
 isisNews.1302.d: "Der bahrainische Terrorist und hochrangige religiöse Führer der ISIS, Turki al-Binali, der unter seinem Decknamen \"Abu Sufyan al-Sulami\" bekannt ist, wurde heute bei einem Luftangriff der US-Koalition getötet. al-Binali war für die militärischen Bemühungen der ISIS nicht von Bedeutung, spielte aber eine Schlüsselrolle bei der religiösen Unterstützung der Gruppe und schrieb die erste Biografie von Abu Bakr al-Baghdadi."
 isis.1303.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1303.d: "Schlechte Nachrichten, Kalif! Der Emir unserer albanischen und kosovarischen Kämpfer und Oberbefehlshaber Lavdrim Muhaxheri ist bei einem feigen Luftangriff der amerikanischen Hunde den Märtyrertod gestorben.\n\n                                                Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah seinen Märtyrertod annehmen."
 isisNews.1303.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1303.d: "Der kosovo-albanische Terrorist und hochrangige ISIS-Befehlshaber Lavdrim Muhaxheri wurde heute bei einem Luftangriff der US-Koalition getötet. Muhaxheri kämpfte in Afghanistan auf Seiten der NATO, radikalisierte sich jedoch um 2012 und reiste nach Syrien. Im Jahr 2013 schloss er sich ISIS an und wurde schnell zum \"Emir\" der albanischen und kosovarischen Kämpfer in Syrien und Irak. Er war ein brutaler Schläger, der persönlich Gefangene köpfte."
 isis.1304.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1304.d: "O Kalif, eine schreckliche Nachricht! Unser militärischer Elitekommandeur Gulmurod Khalimov ist bei einem feigen Luftangriff der amerikanischen Hunde ums Leben gekommen. Bevor er aus dem Land der Tadschiken seinen Weg zu uns fand, war er ein hochrangiger Offizier der Spezialeinheiten. Sein militärisches Wissen wird uns sehr fehlen.\n\n Er hat viele Abtrünnige getötet.\n\n Möge Allah sein Martyrium annehmen."
 isisNews.1304.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1304.d: "Der tadschikische Terrorist und hochrangige ISIS-Befehlshaber Gulmurod Khalimov wurde heute bei einem Luftangriff der US-Koalition getötet. Chalimow war ein erfahrener und hochrangiger Offizier der Spezialeinheiten der tadschikischen Streitkräfte, bevor er zu ISIS überlief."
 isis.1305.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1305.d: "Oh Kalif, schreckliche Nachrichten! Unser Leiter der Märtyreroperationen und wichtigster Ausbilder ausländischer Mudschaheddin, Abdullah Ahmed al-Mashadani, ist bei einem Luftangriff der amerikanischen Hunde den Märtyrertod gestorben.\n\n                                                Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah seinen Märtyrertod annehmen."
 isisNews.1305.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1305.d: "Der irakische Terrorist und ranghohe ISIS-Befehlshaber Abdullah Ahmed al-Mashadani wurde heute bei einem Luftangriff der US-Koalition getötet. al-Mashadani war eine Schlüsselfigur der ISIS-Kriegsanstrengungen, da er die Selbstmordattentate leitete und ausländische Dschihadisten ausbildete."
 isis.1306.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1306.d: "Oh Kalif, schlechte Nachrichten! Unser Gouverneur der Region Zentral-Euphrat, Ahmed Khalal al-Juhayshi, ist bei einem Luftangriff der amerikanischen Hunde den Märtyrertod gestorben.\n\n                                                Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah seinen Märtyrertod annehmen."
 isisNews.1306.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1306.d: "Der irakische Terrorist und ranghohes ISIS-Mitglied Ahmed Khalal al-Juhayshi wurde heute bei einem Luftangriff der US-Koalition getötet. al-Juhayshi war kein prominenter militärischer Befehlshaber, sondern ein Verwalter und Gouverneur der für den Islamischen Staat wichtigen Region Zentral-Euphrat."
 isis.1307.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1307.d: "Oh Kalif, schlechte Nachrichten! Dein guter Freund und Chef für Logistik und Versorgung, Fares Reif al-Naima, ist bei einem Luftangriff der amerikanischen Hunde den Märtyrertod gestorben. Er war ein langjähriger tapferer und treuer Mudschahed, der seit 2003 gegen die Ungläubigen und Abtrünnigen kämpfte.\n\n                                 Er tötete viele für den Ruhm des Kalifats.\n\n                                         Möge Allah sein Martyrium annehmen."
 isisNews.1307.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1307.d: "Der irakische Terrorist und ranghohe ISIS-Befehlshaber Fares Reif al-Naima wurde heute bei einem Luftangriff der US-Koalition getötet. al-Naima kämpfte im Irak-Krieg gegen die US-Streitkräfte und stieg, nachdem er zusammen mit al-Baghdadi von den US-Streitkräften in Camp Bucca festgenommen worden war, zum Chef für Logistik und Nachschub des Islamischen Staats auf."
 isis.1308.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1308.d: "Oh Kalif, schlechte Nachrichten! Abu Ahmad al-Alwani ist bei einem Luftangriff der amerikanischen Ungläubigen den Märtyrertod gestorben. Er war Offizier in der irakischen Armee von Saddam Hussein und hat uns mit seinem Wissen sehr geholfen, nachdem er sich der sunnitischen Rebellion und unserem geliebten Islamischen Staat angeschlossen hatte.\n\n                                                Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah seinen Märtyrertod annehmen."
 isisNews.1308.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1308.d: "Der irakische Terrorist und ranghohe ISIS-Befehlshaber Abu Ahmad al-Alwani wurde heute bei einem Luftangriff der US-Koalition getötet. al-Alwani war Offizier in der irakischen Armee von Saddam Hussein, bevor er sich den sunnitischen Aufständischen gegen die US-Streitkräfte anschloss. Im Islamischen Staat Irak stieg er schnell zum ranghöchsten Befehlshaber auf."
 isis.1309.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1309.d: "Oh Kalif, schlechte Nachrichten! Abu Muhammad al-Shimali ist bei einem Luftangriff der amerikanischen Ungläubigen den Märtyrertod gestorben. Er kam aus Arabien zu uns und half uns dabei, unser Öl zu schmuggeln und unsere Waffen zu kaufen. Er rekrutierte viele tapfere Mudschaheddin für unser Kalifat und wird für immer für seine Schlüsselrolle bei der Organisation der Anschläge von Paris 2015 gepriesen werden.\n\n                                                Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah sein Martyrium annehmen."
 isisNews.1309.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1309.d: "Der saudische Terrorist und hochrangige ISIS-Befehlshaber Abu Muhammad al-Shimali wurde heute bei einem Luftangriff der US-Koalition getötet. al-Shimali war ein wichtiger Rekrutierer und Schmuggler für den Islamischen Staat. Geheimdienstberichten zufolge war er außerdem maßgeblich an der Unterstützung der Anschläge von Paris 2015 beteiligt."
 isis.1310.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1310.d: "Oh Kalif, welch eine Katastrophe! Unser Kriegsminister und Stellvertreter, Ayad al-Jumaili, ist bei einem verabscheuungswürdigen Luftangriff der amerikanischen Ungläubigen heldenhaft den Märtyrertod gestorben. Als irakischer Landsmann war er unter Saddam Hussein ein hochrangiger Geheimdienstoffizier und setzte seine Weisheit als unser Chef des Geheimdienstes und der inneren Sicherheit ein, um das Kalifat vor inneren Feinden zu schützen.\n\n                                               Er tötete viele Verräter.\n\n                                         Möge Allah sein Martyrium annehmen."
 isisNews.1310.t: "Zweiter ISIS-Befehlshaber bei Luftangriff der Koalition getötet"
 isisNews.1310.d: "Der irakische Terrorist und stellvertretende Befehlshaber des Islamischen Staates, Ayad al-Jumaili, wurde heute bei einem Luftangriff der US-Koalition getötet. al-Jumaili war ein hochrangiger Geheimdienstoffizier unter Saddam Hussein, der sich nach der Besetzung durch die USA im Jahr 2003 den sunnitischen Aufständischen anschloss. Er wurde Leiter des Nachrichtendienstes und der inneren Sicherheit des Islamischen Staates und wurde später zum stellvertretenden Befehlshaber und Kriegsminister befördert."
 isis.1311.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1311.d: "Oh Kalif, schlechte Nachrichten! Der hochrangige Kommandant Khairy Abed Mahmoud al-Taey ist bei einem Luftangriff der amerikanischen Ungläubigen den Märtyrertod gestorben. Als irakischer Landsmann war er Mitglied unserer militärischen Shura und leitete Operationen mit improvisierten Sprengsätzen (IED), wodurch er zu Recht Angst und Chaos in den Herzen unserer Feinde säte.\n\n                                               Er tötete viele Abtrünnige.\n\n                                         Möge Allah sein Martyrium annehmen."
 isisNews.1311.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1311.d: "Der irakische Terrorist und hochrangige ISIS-Befehlshaber Khairy Abed Mahmoud al-Taey wurde heute bei einem Luftangriff der US-Koalition getötet. al-Taey gehörte dem ISIS-Militärrat an und leitete die Operationen mit improvisierten Sprengsätzen (IED), die in den von ISIS angegriffenen Städten für Chaos sorgten."
 isis.1312.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1312.d: "Oh Kalif, schlechte Nachrichten! Ihr Freund, Berater und oberster Befehlshaber, Abdul Wahid Khutnayer Ahmad, ist bei einem Luftangriff der amerikanischen Ungläubigen den Märtyrertod gestorben. Als irakischer Landsmann war er für die innere Sicherheit zuständig.\n\n                                        Er hat viele Verräter und Abtrünnige aufgespürt.\n\n                                         Möge Allah seinen Märtyrertod annehmen."
 isisNews.1312.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1312.d: "Der irakische Terrorist und hochrangige ISIS-Befehlshaber Abdul Wahid Khutnayer Ahmad wurde heute bei einem Luftangriff der US-Koalition getötet. Khutnayer Ahmad war ein wichtiger Berater von al-Baghdadi und war für die innere Sicherheit zuständig."
 isis.1313.t: "Kommandeur bei Luftangriff der Koalition ums Leben gekommen"
 isis.1313.d: "Oh Kalif, schreckliche Nachrichten! Unser oberster Befehlshaber, Abu Jihad Shishani, ist bei einem Luftangriff der amerikanischen Ungläubigen gefallen. Er kam aus dem Land der Tschetschenen zu uns und kämpfte bis zum Ende tapfer für den Ruhm Allahs.\n\n                                               Er tötete viele Abtrünnige.\n\n                                         Möge Allah sein Martyrium annehmen."
 isisNews.1313.t: "ISIS-Kommandeur bei Luftangriff der Koalition getötet"
 isisNews.1313.d: "Der tschetschenische Terrorist und hochrangige ISIS-Befehlshaber Abu Dschihad Schischani wurde heute bei einem Luftangriff der US-Koalition getötet. Schischani, ein russischer Staatsbürger, war der zweite Befehlshaber der Terrorgruppe Kaukasus-Emirat unter der Führung von Umar Schischani. Nachdem Umar nach Syrien gereist war und sich der ISIS angeschlossen hatte, versuchte Abu Jihad, das Kaukasus-Emirat zu übernehmen, um es der ISIS zu unterstellen, reiste aber schließlich ebenfalls nach Syrien, um als ranghoher Befehlshaber für die ISIS zu kämpfen."
 isis.11301.t: "Abu Fatima bei russischem Luftangriff ums Leben gekommen"
 isis.11301.d: "Schlechte Nachrichten, Kalif! Dein guter Freund und irakischer Abgeordneter Abu Fatima al-Jaheishi ist bei einem feigen Luftangriff der Russen tapfer als Märtyrer gestorben.\n\n                                               Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah sein Martyrium annehmen."
 isis.11301.a: "Wir werden ihn rächen, wenn wir Moskau erobern!"
 isisNews.11301.t: "ISIS-Kommandeur bei russischem Luftangriff getötet"
 isisNews.11301.d: "Der irakische Terrorist und hochrangige ISIS-Befehlshaber Abu Fatima al-Jaheishi wurde heute bei einem russischen Luftangriff getötet. Abu Fatima gehörte zum inneren Kreis von al-Baghdadi und war stellvertretender Anführer der von ISIS kontrollierten Teile des Irak."
 isisNews.11301.a: "Auf Nimmerwiedersehen!"
 isis.11302.t: "al-Sulami bei russischem Luftangriff ums Leben gekommen"
 isis.11302.d: "Schlechte Nachrichten, Kalif! Der oberste Geistliche Abu Sufyan al-Sulami ist bei einem feigen Luftangriff der Russen den Märtyrertod gestorben. Er kam aus Bahrain zu uns und gab uns wichtige religiöse Unterstützung für unser Kalifat.\n\nO Kalif, er hat uns alle mit seiner wunderschönen Biografie über dich inspiriert.\n\nMöge Allah seinen Märtyrertod annehmen."
 isisNews.11302.t: "ISIS-Chefkleriker bei russischem Luftangriff getötet"
 isisNews.11302.d: "Der bahrainische Terrorist und hochrangige religiöse Führer der ISIS, Turki al-Binali, der unter seinem Decknamen \"Abu Sufyan al-Sulami\" bekannt ist, wurde heute bei einem russischen Luftangriff getötet. al-Binali war für die militärischen Bemühungen der ISIS nicht von Bedeutung, spielte aber eine Schlüsselrolle bei der religiösen Unterstützung der Gruppe und schrieb die erste Biografie von Abu Bakr al-Baghdadi."
 isis.11303.t: "Kommandant bei russischem Luftangriff ums Leben gekommen"
 isis.11303.d: "Schlechte Nachrichten, Kalif! Der Emir unserer albanischen und kosovarischen Kämpfer und Oberbefehlshaber Lavdrim Muhaxheri ist bei einem feigen Luftangriff der russischen Hunde den Märtyrertod gestorben.\n\n                                                Er hat viele Abtrünnige getötet.\n\n                                         Möge Allah sein Martyrium annehmen."
