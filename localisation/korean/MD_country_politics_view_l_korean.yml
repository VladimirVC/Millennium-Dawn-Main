 PROPAGANDA_NATIONALIST: "§Y민족주의§!"
 PROPAGANDA_FASCISM: "§Y살라피스트§!"
 prowestern_propaganda_button_tt: "§Y친서방§! 선전 캠페인 \n정보전을 활용하여 세계 정세에 대한 대중의 여론에 영향을 미칠 수 있습니다. 하지만 대중은 점차 흥미를 잃기 때문에 이러한 캠페인은 제한된 기간 동안만 효과적입니다.\n\n§Y선전 캠페인 비용§! 변동치: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§Y친서방 선전 캠페인 비용§! 변동치: [?ROOT.modifier@western_outlook_campaign_cost_modifier|-2%] \n\n§Y전제 조건:§! \n[!prowestern_propaganda_button_click_enabled] \n§Y활성화 중 효과:§! \n[!prowestern_propaganda_button_click]"
 emerging_propaganda_button_tt: "§Y신흥국§! 선전 캠페인 \n정보전을 활용하여 세계 정세에 대한 대중의 여론에 영향을 미칠 수 있습니다. 하지만 일정 시간이 지나면 대중이 흥미를 잃기 때문에 이러한 캠페인은 제한된 기간 동안만 효과적입니다.\n\n§Y선전 캠페인 비용§! 변동치: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§Y신흥 이념 선전 캠페인 비용§! 변동치: [?ROOT.modifier@emerging_outlook_campaign_cost_modifier|-2%] \n\n§Y전제 조건:§! \n[!emerging_propaganda_button_click_enabled] \n§Y활성화 중 효과:§! \n[!emerging_propaganda_button_click]"
 nonaligned_propaganda_button_tt: "§Y비동맹§! 선전 캠페인 \n정보전을 활용하여 세계 정세에 대한 대중의 여론에 영향을 미칠 수 있습니다. 하지만 대중은 점차 흥미를 잃기 때문에 이러한 캠페인은 제한된 기간 동안만 효과적입니다.\n\n§Y선전 캠페인 비용§! 변동치: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§Y비동맹 선전 캠페인 비용§! 변동치: [?ROOT.modifier@nonaligned_outlook_campaign_cost_modifier|-2%] \n\n§Y전제 조건:§! \n[!nonaligned_propaganda_button_click_enabled] \n§Y활성화 중 효과:§! \n[!nonaligned_propaganda_button_click]"
 nationalist_propaganda_button_tt: "§Y민족주의§! 선전 캠페인 \n정보전을 활용하여 세계 정세에 대한 대중의 여론이 민족주의적 관점을 취하도록 영향을 미칠 수 있습니다. 하지만 대중은 점차 흥미를 잃기 때문에 이러한 캠페인은 제한된 기간 동안만 효과적입니다.\n\n§Y선전 캠페인 비용§! 변동치: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§Y민족주의 선전 캠페인 비용§! 변동치: [?ROOT.modifier@nationalist_outlook_campaign_cost_modifier|-2%] \n\n§Y전제 조건:§! \n[!nationalist_propaganda_button_click_enabled] \n§Y활성화 중 효과:§! \n[!nationalist_propaganda_button_click]"
 fascism_propaganda_button_tt: "§Y파시즘§! 선전 캠페인 \n정보전과 초보수파 성직자 및 관련 인사들을 활용하여 대중의 여론이 살라피주의에 호의적이도록 영향을 미치고 급진화할 수 있습니다. 하지만 대중은 점차 흥미를 잃기 때문에 이러한 캠페인은 제한된 기간 동안만 효과적입니다.\n\n§Y선전 캠페인 비용§! 변동치: [?ROOT.modifier@propaganda_campaign_cost_modifier|-2%]\n§Y살라피스트 세뇌 캠페인 비용§! 변동치: [?ROOT.modifier@salafist_outlook_campaign_cost_modifier|-2%] \n\n§Y전제 조건:§! \n[!fascism_propaganda_button_click_enabled] \n§Y활성화 중 효과:§! \n[!fascism_propaganda_button_click]"
