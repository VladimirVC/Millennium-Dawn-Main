 COL.conservatism: "£COL_western_conservative (PCC) コロンビア保守党"
 COL.conservatism_desc: "(Christian Democracy) - Established in 1849, the Colombian Conservative Party has maintained dominance over the political landscape of the country together with the Colombian Liberal Party, managing to maintain an effective two-party system despite plurality within the political sphere. The party has also maintained a fairly consistent platform since its foundation, slowly modernizing its Christian Democratic platform influenced by Colombia's evolving social and economic situation."
 COL.liberalism: "£COL_western_liberal (CR) 根本的変革党"
 COL.liberalism_desc: "(Conservative Liberalism) - Having split from the Colombian Liberal Party, the Radical Change Party styles itself as a more conservative alternative, comprised of those that felt marginalized by the former's shift further towards more social democratic and social liberal values."
 COL.socialism: "£COL_western_social_democrat (PLC) コロンビア自由党"
 COL.socialism_desc: "(Social Liberalism) - Founded in 1848 and originally founded as a classical liberal party, the Colombian Liberal Party has maintained political dominance together with the Conservative Party thanks in large part to the 'National Front' power-sharing agreement that existed from 1958 to 1974. Since the 1940s the party has shifted further towards the left, with factions expressing belief in more social liberal and even social democratic values becoming more prominent."
 COL.Communist-State: "£COL_emerging_communism (FARC–EP) Revolutionary Armed Forces of Colombia – People's Army"
 COL.Communist-State_desc: "(Marxism-Leninism) - Founded in 1964 by Jacobo Arenas, FARC was created in the backdrop of the Cold War and violent anti-commuist actions in Colombia. Attacks against communities with sympathies or full support of communist spurred the creation of the organization and marked the start of an armed struggle against the Colombian government. This period of conflict would only somewhat wane with the end of the Cold War itself, with FARC struggling with not only the collapse of the socialist camp but the death of its founder and an increasing reliance on criminal activity to gain funding. Even still the group continues to hold small isolated positions and nominally maintains its ideological path."
 COL.Neutral_conservatism: "£COL_non_aligned_conservative (MIRA) Independent Movement of Absolute Renovation"
 COL.Neutral_conservatism_desc: "(Christian Democracy) - Self-describing as following 'Miraism', the party's positions and beliefs functionally align with Christian Democracy - supporting several socially conservative stances. The party's influence has managed to push beyond Colombia itself, with its self-proclaimed ideology having spread in at least some way to most of Latin America and even parts of Europe."
 COL.neutral_Social: "£COL_non_aligned_socialist_democrat (PSUN) 国民統一社会党"
 COL.neutral_Social_desc: "(Third Way) - Formed around unifying the 'Uribistas', supporters of Alvaro Uribe, the membership of the new party drew heavily from existing left and centre parties - including the Liberal Party. Most of its platform and belief comes from it being a vehicle for supporting a single figure - with a mildly right social democratic platform proclaiming support for market economics, welfare, and increased globalization."
 COL.Neutral_green: "£COL_non_aligned_greens (AV) 緑の同盟"
 COL.Neutral_green_desc: "緑の政治 - 進歩的な社会的価値観を提唱する「緑の同盟」は、ほとんどの緑の党に共通する標準的な政策綱領を大いに参考にしている。同党は目標達成のため、中道派や左派政党と連立を組んでおり、同国で数十年にわたって続いている内戦を終結させることを目指すコロンビア和平プロセスをさらに後押ししている。"
 COL.Nat_Autocracy: "£COL_nationalist_military_junta コロンビア軍"
 COL.Nat_Autocracy_desc: "実用的軍事政権 - 1819年に正式に創設されたコロンビア軍は、ラテンアメリカ諸国の中でも国際的に特に活発な活動を行ってきた。第二次世界大戦や朝鮮戦争への参戦に加え、麻薬密輸対策作戦への兵員派遣や支援も行っている。政治面では、軍は比較的積極的に関与しており、度重なるクーデターによって様々な政治家が権力の座に就いてきた。また、麻薬カルテルやイデオロギー色の強い民兵組織に対する国内の反乱活動が、軍の展望と重点を明確にしてきた。"
 COL.Nat_Populism: "£COL_nationalist_right_wing_populist (CD) 民主中道"
 COL.Nat_Populism_desc: "右派ポピュリズム - 「中道」政党を標榜する民主中道の政策綱領やイデオロギーは、コロンビアにおける保守主義の伝統に強く影響を受けている。同党はアメリカの共和党を支持・推進し、EUのECR党とも提携するなど、その活動範囲をコロンビア国内にとどまらず、国外へと広げている。"
 COM.socialism: "£COM_western_social_democrat （CRC）コモロ再生会議"
 COM.socialism_desc: "(Social Democratic Presidentalism) Convention for the Renewal of the Comoros (French: Convention pour le Renouveau des Comores, CRC)\n\nAlthough the party was officially founded in 2002, it represents the political movement and ideology of Azali Assoumani. The party is often considered a presidentialist party focused on national unity and the development of the Comoros in the wake of the 1999 coup d'état led by Assoumani."
 COM.Monarchist: "£COM_nationalist_monarchist  グランドコモロ王家"
 COM.Monarchist_desc: "絶対君主制 - グランドコモロ王家\n\nグランドコモロ王家は、グランドコモロ島を統一したバンバオ・スルタン国の支配家系である。かつてグランドコモロ島は多数のスルタン国で構成されており、当家は歴史の大部分において、島全体に対して統一的な権威を確立することはほとんどなかった。1886年、当時のスルタンであるサイード・アリ・ビン・サイード・オマールは、フランスの支援を受け島を単一のスルタン国として統一したが、1892年にフランスによって追放された。スルタンの統治権は1908年の行政統合によって事実上消滅し、1910年には正式に退位。最終的にフランスによるコモロ諸島の保護領体制の廃止によって、1912年にスルタン国は消滅した。"
