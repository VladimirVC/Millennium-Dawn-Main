 form_UAS_category: "Union of African States"
 form_UAS_category_desc: "The Union of African States was a short-lived political union between Ghana, Guinea, and Mali, formed in 1961 under the Pan-African vision of Kwame Nkrumah. Let us revive this dream of West African unity and forge a new powerful union."
