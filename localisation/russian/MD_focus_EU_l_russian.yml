 EU_Tech_Share_name: "Европейское оборонное агентство (ЕОА)"
 EU_Tech_Share_desc: "Члены ЕС объединяют свои исследовательские усилия. Европейское оборонное агентство (ЕОА) координирует усилия."
 tooltip_ECB_Start_OMT_effect: "§GПри щелчке левой кнопкой мыши:§!§YПрограмма OMT§! становится доступной.\n\n§GПри щелчке правой кнопкой мыши:§!§YОграничение размера OMT§! > $0."
 tooltip_ECB_adjust_OMT_limit_effect: "§GOn Left Click:§! §YOMT Size Limit§!: Add §G+$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §R-5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §G+5%§! Europeanism.\n\n§GOn Right Click:§! §YOMT Size Limit§!: Add §R-$200§! billion.\nAll member states with §Yinterest rate§! < §R4.0%§!: Add §G+5%§! Europeanism.\nAll member states with §Yinterest rate§! > §R4.0%§!: Add §R-5%§! Europeanism.\n"
 tooltip_ECB_Outright_Monetary_Transactions_available: "§YОграничение по размеру ПДО§! > $0."
 tooltip_ECB_Outright_Monetary_Transactions_complete_effect: "Все члены ЕС с §Yпроцентной ставкой§! > §R4.0%§!: получение долга снижается до §Yпроцентной ставки§! < §R4.0%§! и §Gразмер лимита ПДО§! > §Bобщего значения ПДО§!.\n"
 tooltip_ECB_Outright_Monetary_Transactions_remove_effect: "Все члены ЕС со §Bсчетом ПДО§! > $0: §Rдобавит§! §Bсчет ПДО§! в долг.\n"
 EU_exit_category: "Выход из Европейского союза"
 EU_exit_category_desc: "С ростом евроскептицизма по всему Союзу, некоторые государства-члены будут задумываться о выходе из §C[EUU.GetFlag] Европейского Союза§!."
 Article_50: "[THIS.GetName] применил статью 50."
 EU_Article_50: "Покинуть Европейский союз! (Статья 50)"
 EU_Article_50_desc: "\"Любое член в соответствии со своими конституционными правилами может принять решение о выходе из состава Союза.\"\n- Статья 50(1), Договор о Европейском союзе.\n\n Первая статья 50 была разработана для Конституционного договора о Европейском союзе. После провала процесса ратификации Европейской конституции, статья была включена в Лиссабонский договор."
 EU_Revoke_Article_50: "Отменить действие статьи 50"
 EU_Revoke_Article_50_desc: "Отменить действие статьи 50 и остаться в §C[EUU.GetFlag] Европейскому Союзу§!\n\"Статья 50 договора об ЕС должна толковаться как означающая, что, если член уведомило Европейский Совет в соответствии с этой статьей о своем намерении выйти из Европейского союза, эта статья позволяет этому члену - до тех пор, пока соглашение о выходе, заключенное между этим членом и Европейским Союзом, не вступило в силу, или, если такое соглашение не было заключено, до тех пор, пока не истек двухлетний период, установленный в статье 50(3) договора об ЕС, который может быть продлен в соответствии с этим пунктом, - отозвать это уведомление в одностороннем порядке, недвусмысленно и безоговорочно, посредством уведомления, направленного в Европейский совет в письменной форме, после того, как соответствующее член примет решение об отзыве в соответствии со своими конституционными требованиями. Целью такого отзыва является подтверждение членства соответствующего члена в ЕС на условиях, неизменных в отношении его статуса как члена, и этот отзыв завершает процедуру выхода.\"\n- Решение Суда Европейского союза по делу C-621/18"
 EU_exit: "Выход из ЕС"
 EU_exit_desc: "§Y[ROOT.GetNameWithFlag]§! уведомил Европейский Совет о своем намерении покинуть §C[EUU.GetFlag] Европейский союз§!. §Y[ROOT.GetNameWithFlag]§! покинет Союз через 2 года после уведомления."
 EU_extend_Article_50: "Продление действия статьи 50"
 EU_extend_Article_50_desc: "Попросить §C[EUU.GetFlag] Европейский союз§! о продлении статьи 50 для выхода из Союза на более поздний срок."
 EU_exit_three_month: "Продление на три месяца"
 EU_exit_three_month_desc: "§Y[ROOT.GetNameWithFlag]§! было гарантировано трехмесячное продление статьи 50 §C[EUU.GetFlag] Европейского союза§!. §Y[ROOT.GetNameWithFlag]§! покинет Союз через 3 месяца."
 EU_withdrawal_treaty: "Договор о выходе"
 EU_withdrawal_treaty_desc: "§Y[ROOT.GetNameWithFlag]§! и члены ЕС §C[EUU.GetFlag] Европейского союза§! согласовали Договор о выходе."
 EU_prepared_no_deal_exit: "Подготовьте выход без сделки"
 EU_prepared_no_deal_exit_desc: "§C[EUU.GetFlag] Европейский Союз§! а его слабохарактерные лакеи и эти накачанные бюрократы в Брюсселе отказываются дать нам выгодный договор о выходе. Мы должны подготовить нашу страну к неизбежному выходу без сделки, если что-то не даст результатов."
 cant_invoke_article_50: "§Y[ROOT.GetNameWithFlag]§! недавно отменил решение о §YСтатье 50§! (Дней осталось: [?cant_invoke_article_50:days_left|Y0])"
 EU_article_50_available_click: "Предпосылки:\n[!EU_Article_50_click_enabled]\nПоследствия:\n§Y[ROOT.GetNameWithFlag]§! начнёт выходить из §C[EUU.GetFlag][EUU.GetName]§!"
 EU_article_50_available_delayed: "«Любое государство-член может принять решение о выходе из Союза в соответствии со своими конституционными требованиями».\n- Статья 50(1) Договора о Европейском Союзе. -\nПервая статья 50 была разработана для Конституционного договора Европейского Союза. После провала ратификации Конституции этот пункт был включен в Лиссабонский договор."
 tooltip_EU_exit_available: "§Y[ROOT.GetNameWithFlag]§! в настоящее время не пытается покинуть §C[EUU.GetFlag][EUU.GetName]§!"
 tooltip_EU_exit_cancel_trigger: "§Y[ROOT.GetNameWithFlag]§! принял решение §YОтменить статью 50§! активирован."
 tooltip_EU_Revoke_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! имеет миссию §YВыход из ЕС§! ИЛИ имеет продление миссии §Yна три месяца§!."
 tooltip_EU_Revoke_Article_50_effect: "§Y[ROOT.GetNameWithFlag]§! остается в §Y[EUU.GetFlag] Европейского Союза§!. Миссия §YВыход из ЕС§! И миссия §YПродление на три месяца§! удален.\nВы не сможете ссылаться на §YСтатью 50§! на следующие §Y180 дней§!."
 tooltip_EU_extend_Article_50_available: "§Y[ROOT.GetNameWithFlag]§! имеет миссию §YВыход из ЕС§! ИЛИ имеет продление миссии §Yна три месяца§!\nИ [ROOT.GetNameWithFlag] должен иметь более 25% влияния на лидера внешней политики Европейского союза."
 tooltip_EU_remove_laws_and_offices: "Все §Yзаконы ЕС и должности§! будут убраны.\n"
 EU_defense_category: "Оборонная политика ЕС"
 EU_defense_category_desc: "В 1950-х годах идея Европейского оборонного сообщества рухнула, не получив ратификации во французском парламенте. Его преемником стала Общая политика безопасности и обороны Европейского союза. Поскольку большинство европейских стран являлись членами Организации Североатлантического договора (НАТО), на протяжении всего XX века не было необходимости в собственной Европейской оборонной организации. Но с ростом напряженности в мире в XXI веке ситуация меняется."
 EU_Frontex_take_control: "Взятие под контроль сил Фронтекс"
 EU_Frontex_take_control_desc: "На внешних границах Европы в последние годы наблюдается беспрецедентный рост числа мигрантов и беженцев, желающих попасть в ЕС. Страны, имеющие внешнюю границу, несут исключительную ответственность за пограничный контроль. Но Frontex может оказать дополнительную техническую поддержку странам ЕС, сталкивающимся с серьезным миграционным давлением.\nЭто достигается путем координации развертывания дополнительного технического оборудования (например, самолетов и лодок) и специально обученного пограничного персонала."
 EU_EuroNavy_take_control: "Взятие флота под контроль"
 EU_EuroNavy_take_control_desc: "Поскольку в XXI веке многонациональные флоты и оперативные группы становятся все более распространенными и значимыми, государства-члены §C[EUU.GetFlag] Европейского союза§! решили объединить свои силы и передать военные корабли под единое европейское военно-морское командование, известное как §YЕврофлот§!."
 EU_EuroArmy_take_control: "Взятие под контроль армии"
 EU_EuroArmy_take_control_desc: "Члены ЕС §C[EUU.GetFlag] Европейского союза§! приняли решение о создании общих вооруженных сил, известных как §YЕвроармия§!"
 EU_create_EDU: "Сформировать Европейский союз обороны (ЕСО)"
 EU_create_EDU_desc: "Чтобы достичь необходимой стратегической автономии для защиты своих коллективных интересов, реагирования на внешние конфликты и кризисы, а также обеспечения безопасности в нашем регионе, члены ЕС решили сформировать §YЕвропейский союз обороны (EDU)§! как военный альянс и коллективно уйти из §YНАТО§!."
