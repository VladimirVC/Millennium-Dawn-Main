 UKR_party_regions_start: "Partido de las Regiones"
 UKR_party_regions_start_desc: "Yanukovych ha tomado el poder en el país en sus propias manos, es hora para las regiones!"
 UKR_party_regions_inaguration: "Inauguración de Yanukovych"
 UKR_party_regions_inaguration_desc: "It is time for the inauguration of our new president."
 UKR_party_regions_decrease: "Reducir el Personal Administrativo"
 UKR_party_regions_decrease_desc: "We will reduce the number of employees of the state apparatus."
 UKR_party_regions_anti_corrupt: "Comité Nacional Anticorrupción"
 UKR_party_regions_anti_corrupt_desc: "We will create a new ministry, the national Anti-Corruption Committee, to combat corrupt officials in our country."
 UKR_party_regions_committee_economic: "Comité de Reformas Económicas"
 UKR_party_regions_committee_economic_desc: "También crearemos otro ministerio, el Comité de Reformas Económicas."
 UKR_party_regions_unifed_window: "Ventanilla Única de Inversiones"
 UKR_party_regions_unifed_window_desc: "We will introduce new rules for investors in our country, which will make it easier for them to interact with our authorities."
 UKR_party_regions_decrease_agro: "Reducir las Regulaciones sobre la Agricultura"
 UKR_party_regions_decrease_agro_desc: "La agroindustria recibirá nuevos beneficios, con lo que esperamos aumentar su productividad."
 UKR_party_regions_laizes: "Laissez Faire"
 UKR_party_regions_laizes_desc: "We will partially adopt one of the libertarian principles in our economic policy and will not interfere in economic processes."
 UKR_party_regions_taxx: "Cambiar el Código Tributario"
 UKR_party_regions_taxx_desc: "Haremos cambios en el código tributario que consideramos necesarios. Nuestras concesiones reducirán los impuestos locales en tres veces!"
 UKR_party_regions_autocracy: "Fortalecer la Autocracia"
 UKR_party_regions_autocracy_desc: "A strong government must control everything it can, otherwise it is chaos and disorder that existed before our rule."
 UKR_party_regions_pressure_media: "Presión sobre los Medios"
 UKR_party_regions_pressure_media_desc: "The media has become too free, it is necessary to cool their ardor."
 UKR_party_regions_stability_reform: "Estabilidad y Reforma"
 UKR_party_regions_stability_reform_desc: "We will assemble a loyal coalition of politicians, which we will call \"Stability and Reforms\", which will actively promote our projects and ideas."
 UKR_party_regions_stability_restricting_freedom_speech: "Restricción de la Libertad de Expresión"
 UKR_party_regions_stability_restricting_freedom_speech_desc: "Freedom of speech ends where it begins to offend us."
 UKR_party_regions_stability_purge_opposition: "Intento de Purgar la Oposición Política"
 UKR_party_regions_stability_purge_opposition_desc: "The opposition is too self-willed and undermines the institutions of power using its freedom, it's time to fix this."
 UKR_party_regions_lustration: "Purga del Cuerpo de Gobernadores y Agencias de Seguridad"
 UKR_party_regions_lustration_desc: "Lustration of disloyal and openly harmful to the state people in these structures has long been necessary."
 UKR_party_regions_agreement_opposition: "Acuerdos con la Oposición"
 UKR_party_regions_agreement_opposition_desc: "We will try to establish relations with some part of the opposition, thereby dividing it."
 UKR_party_regions_appease_the_westermists: "Aplacar a los Occidentalistas"
 UKR_party_regions_appease_the_westermists_desc: "Western Ukraine has long been a hotbed of discontent and instability, we will appease them, I will try to give them what they want - promises."
 UKR_party_regions_request_russian: "Solicitar Inversiones Rusas"
 UKR_party_regions_request_russian_desc: "Solicitaremos inversiones rusas, obviamente no serán superfluas."
 UKR_party_regions_personal_gain: "Enfocarse en la Ganancia Personal"
 UKR_party_regions_personal_gain_desc: "The country is certainly good, but it's worth thinking about yourself."
 UKR_party_regions_mezhyhirya: "Mezhyhirya"
 UKR_party_regions_mezhyhirya_desc: "As a real president, you need to have your own shelter where you can take a break from political worries and affairs."
 UKR_party_regions_titushki: "Reunir a los Titushki"
 UKR_party_regions_titushki_desc: "Utilizaremos un nuevo método para desacreditar las manifestaciones de la oposición: los Titushki."
 UKR_party_regions_regional_council: "Consejo Regional"
 UKR_party_regions_regional_council_desc: "We will introduce a new authority, the regional council, to facilitate the interaction of regional and state authorities."
 UKR_party_regions_optimise_east_ukraine_gamble: "Apuesta del Este de Ucrania"
 UKR_party_regions_optimise_east_ukraine_gamble_desc: "Eastern Ukraine has always been our patrimony, we will actively try to get their support, because in fact they are our main electorate."
 UKR_party_regions_optimise_prior_loyals: "Priorizar a los Leales"
 UKR_party_regions_optimise_prior_loyals_desc: "People loyal to us are much more important and we will actively promote them."
 UKR_party_regions_western_oligarch: "Acercarse a los Oligarcas Occidentales"
 UKR_party_regions_western_oligarch_desc: "The oligarchs of western Ukraine will be our priority, we want to find a balance between the west and the east, perhaps their oligarchs will help us."
 UKR_party_regions_meet_akhmetov: "Reunirse con Akhmetov"
 UKR_party_regions_meet_akhmetov_desc: "The Donetsk clan of oligarchs, and its representative Rinat Akhmetov, an important political resource that we use to maintain our power, it is worth listening to him."
 UKR_party_regions_informational_act: "Ley de Información"
 UKR_party_regions_informational_act_desc: "The new act, or law, will open access to the broad masses to the activities of politicians, which will reduce the corruption component in their activities."
 UKR_party_regions_optimise_ministries: "Optimizar los Ministerios"
 UKR_party_regions_optimise_ministries_desc: "Government structures have become too huge, it's time to reduce them."
 UKR_party_regions_reform_constituion: "Reforma de la Constitución"
 UKR_party_regions_reform_constituion_desc: "Promoveremos activamente la reforma de la constitución, es hora de que nuestro país avance hacia cambios globales!"
 UKR_party_regions_compulsory: "Cambio del Servicio Militar Obligatorio"
 UKR_party_regions_compulsory_desc: "We will change the system of service in our army, literally turning it into a contract one."
 UKR_party_regions_pension_reform: "Reforma de Pensiones"
 UKR_party_regions_pension_reform_desc: "Pension reform has been brewing for a long time and now we will carry it out."
 UKR_party_regions_kozhara: "Kozhara es el Líder del MID"
 UKR_party_regions_kozhara_desc: "We will appoint one of our friends and partners as Foreign Minister."
 UKR_party_regions_youth_region: "Expandir las Regiones Juveniles"
 UKR_party_regions_youth_region_desc: "The youth wing of our party will gain more power and influence, we will open access to them."
 UKR_party_regions_berkut_reforms: "Reformas de Berkut"
 UKR_party_regions_berkut_reforms_desc: "Berkut, as a police structure, needs reforms so that we can protect ourselves."
 UKR_party_regions_berkut_extreme_training: "Entrenamiento Extremo para Berkut"
 UKR_party_regions_berkut_extreme_training_desc: "Berkut will become even more active in conducting competitions and training processes to improve its skill."
 UKR_dual_language: "Estado Bilingüe"
 UKR_dual_language_desc: "The Russian language occupies an important part of the life of Ukraine and it would be foolish to deny it. We will not promote stupid political ideas about the abolition of the Russian language in our country."
 UKR_cancel_decommunization: "Anti-Descomunización"
 UKR_cancel_decommunization_desc: "No permitiremos una lucha con nuestro pasado soviético, cuando luchamos contra el fascismo y el nazismo."
 UKR_donbass_autonomy_pass: "Autonomía Especial de Donbass"
 UKR_donbass_autonomy_pass_desc: "Donbass is a special region of our country, perhaps it's time to start a discussion about the special autonomy of this region."
 UKR_sng_integrate: "Integración de la CEI"
 UKR_sng_integrate_desc: "We will continue integration processes within the framework of cooperation between the CIS countries."
 UKR_europe_negotiat: "Negociaciones con la UE"
 UKR_europe_negotiat_desc: "We will start negotiations with the European Union on an issue that has been on our political agenda for a long time. This is an association with the European Union."
 UKR_russian_ukrainian_military_coop: "Cooperación Militar Ucraniana-Rusa"
 UKR_russian_ukrainian_military_coop_desc: "We will strengthen cooperation with the Russian Armed Forces."
 UKR_party_regions_european_chart: "Carta de Idiomas Europea"
 UKR_party_regions_european_chart_desc: "We will sign the European Charter of Regional Languages as an indicator of our democratic attitude towards national minorities."
 UKR_parti_regions_anti_corruption_commitie: "Comité Nacional Anticorrupción"
 UKR_parti_regions_anti_corruption_commitie_desc: "The new committee is designed to fight corrupt officials at all levels."
 UKR_parti_regions_economic_committee: "Comité de Reformas Económicas"
 UKR_parti_regions_invest_open_window: "Ventanilla Única de Inversiones"
 UKR_parti_regions_taxx: "Código Tributario Reformado"
 UKR_parti_regions_laizes: "Laissez Faire"
 UKR_parti_regions_stability_reform: "Estabilidad y Reforma"
 UKR_parti_regions_lustration: "Purgas"
 UKR_parti_regions_opposition_agree: "Cooperación con la Oposición"
 UKR_parti_regions_titushki: "Titushki"
 UKR_parti_regions_optimise_ministers: "Optimización de Ministerios"
 UKR_parti_regions_inform_act: "Ley de Información"
 UKR_parti_regions_pension_reform: "Reforma de Pensiones"
 UKR_parti_regions_youth_regions: "Regiones Juveniles"
 UKR_parti_regions_autocracy: "Autocracia de Yanukovych"
 UKR_parti_regions_autocracy_desc: "Las acciones de Yanukovych han sido ampliamente llamadas una autocracia real, pero ¿es importante para el bien del estado?"
 ukraine_regions.7.t: "Inversiones en Ucrania"
 ukraine_regions.7.d: "El Presidente de Ucrania nos ha pedido que invirtamos en su país, ¿deberíamos aceptar su propuesta?"
 ukraine_regions.7.a: "Sí"
 ukraine_regions.7.b: "No"
 ukraine_regions.8.t: "Inversiones en Ucrania"
 ukraine_regions.8.d: "Russia has agreed to invest in our country."
 ukraine_regions.8.a: "Bien"
 ukraine_regions.9.t: "Inversiones en Ucrania"
 ukraine_regions.9.d: "Russia refused to invest in our country."
 ukraine_regions.9.a: "Triste"
 ukraine_regions.10.t: "Cooperación con la CEI"
 ukraine_regions.10.d: "No hemos cooperado activamente con los países de la CEI en los últimos años, y una cierta parte de la población de oposición puede indignarse por nuestra decisión de continuar la cooperación, pero debemos decidir si debemos hacer esto?"
 ukraine_regions.10.a: "Por Supuesto"
 ukraine_regions.10.b: "No"
 ukraine_regions.11.t: "Negociaciones de Asociación con la UE"
 ukraine_regions.11.d: "Es hora de comenzar las negociaciones de asociación con la Unión Europea, que hemos estado tratando de iniciar durante tanto tiempo, es hora de decidir finalmente si las comenzaremos?"
 ukraine_regions.11.a: "Por Supuesto"
 ukraine_regions.11.b: "No"
 ukraine_regions.12.t: "Cuestión del Estatus de Donbass"
 ukraine_regions.12.d: "Durante muchos años hemos escuchado propuestas para dar un estatus especial a Donbass, iniciando así el lento proceso de federalización de Ucrania. Esta es una decisión seria que debemos tomar, dándonos cuenta de que no habrá vuelta atrás."
 ukraine_regions.12.a: "Les Daremos un Estatus Especial"
 ukraine_regions.12.b: "Dejémoslo Como Está"
 ukraine_nato_help.1.t: "[FROM.GetName] Proporciona Ayuda Monetaria"
 ukraine_nato_help.1.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include monetary support."
 ukraine_nato_help.1.a: "Bueno"
 ukraine_nato_help.2.t: "[FROM.GetName] Proporciona Ayuda"
 ukraine_nato_help.2.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include light equipment and support."
 ukraine_nato_help.2.a: "Bueno"
 ukraine_nato_help.3.t: "[FROM.GetName] Proporciona Ayuda"
 ukraine_nato_help.3.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include medium equipment for our brigades."
 ukraine_nato_help.3.a: "Bueno"
 ukraine_nato_help.4.t: "[FROM.GetName] Proporciona Ayuda"
 ukraine_nato_help.4.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package will include heavy weaponry and equipment."
 ukraine_nato_help.4.a: "Bueno"
 ukraine_nato_help.5.t: "[FROM.GetName] Adquiere Equipo de Infantería"
 ukraine_nato_help.5.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include infantry equipment."
 ukraine_nato_help.5.a: "Bueno"
 ukraine_nato_help.6.t: "[FROM.GetName] Adquiere Equipo de Apoyo"
 ukraine_nato_help.6.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include support equipment."
 ukraine_nato_help.6.a: "Bueno"
 ukraine_nato_help.7.t: "[FROM.GetName] Adquiere Equipo AT y AA"
 ukraine_nato_help.7.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include anti-tank and anti-air infantry weaponry."
 ukraine_nato_help.7.a: "Bueno"
 ukraine_nato_help.8.t: "[FROM.GetName] Adquiere Vehículos Ligeros"
 ukraine_nato_help.8.d: "[FROM.GetName] reached out with package for our war effort.\nNext Package, produced locally for investor's money will include utility trucks, MRAPs and IMVs."
 ukraine_nato_help.8.a: "Bueno"
