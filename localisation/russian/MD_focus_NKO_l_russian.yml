 NKO_juche_for_new_era_desc: "С инаугурацией председателя Ким Ё Чжон, Северная Корея вступила в новую эру, более светлое будущее..."
 NKO_for_well_being_of_people: "За благополучие жителей Чосуна"
 NKO_for_well_being_of_people_desc: "Начало деятельности Трудовой партии Кореи - ради счастья и благополучия корейского народа. Мы не должны забывать о наших истоках."
 NKO_quality_first: "Качество превыше всего"
 NKO_quality_first_desc: "Местная гражданская промышленность серьезно снижает качество своей продукции, чтобы достичь запланированных показателей, и это должно быть остановлено!"
 NKO_chosun_dream: "Мечта Чосона"
 NKO_chosun_dream_desc: "\"Чосонская мечта\" это новая концепция, представленная президентом [NKO.GetLeader] , которая включает в себя личные и национальные цели корейской нации. Она включает в себя стремления в различных областях, в том числе в экономической, политической и международной сферах."
