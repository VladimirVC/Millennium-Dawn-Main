 NKO_for_well_being_of_people: "Dla dobra ludzi Chosun"
 NKO_for_well_being_of_people_desc: "Początki Partii Robotniczej Korei miały na celu szczęście i dobrobyt narodu koreańskiego. Nie możemy zapominać o naszych początkach."
 NKO_quality_first: "Jakość na pierwszym miejscu"
