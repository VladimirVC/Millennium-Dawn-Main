 alg.450.t: "阿尔及利亚陷入内战"
 alg.450.d: "民众日益增长的不满和不断崩溃的稳定已将这个国家推向崩溃的边缘。随着国家分裂，武装派别崛起，阿尔及利亚陷入了新的内部冲突时代。"
 alg.450.a: "局势已然失控。"
 alg_cabinet_news.1.t: "阿尔及利亚权力斗争加剧"
 alg_cabinet_news.1.d: "在越来越大的压力下，内阁和安全机构正在发生变化，强硬派、改革派和内部危机信号正在塑造阿尔及尔的政治氛围。"
 alg_cabinet_news.1.a: "国家静观潮起潮落。"