 helicopter_module_hover_engine_gen1: "Hover Engine I"
 helicopter_module_hover_engine_gen1_desc: "Hover engines provide enhanced lift control and power responsiveness, allowing helicopters to achieve significantly higher maneuverability during low-altitude and close-support operations.\n\n§GDesigner Hint: Hover Engines are very expensive and increase fuel consumption, but they provide a major maneuverability boost§!"
