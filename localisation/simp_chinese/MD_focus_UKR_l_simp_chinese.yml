 UKR_hur_reform: "情报总局改革"
 UKR_hur_reform_desc: "现在是时候开始改革我们的主要情报机构，以提高效率和影响其他国家的机会。"
 UKR_hur_opearational_support: "情报总局行动支持"
 UKR_hur_opearational_support_desc: "情报总局目前通过情报和前线部队支持正在进行的行动。"
 UKR_hur: "情报总局"
 UKR_hur_desc: "情报总局拥有广泛的权力和能力，我们将能够将其应用于我们的外交政策。"
 UKR_hur_battalions: "乌克兰情报总局部队"
 UKR_hur_battalions_desc: "乌克兰情报总局的营根据我方乌克兰指挥部的命令参与敌对行动，敌对行动结束后，他们将离开我们的武装部队"
 UKR_hur_decision_category: "主要情报机构"
 UKR_hur_decision_category_desc: "\n\n\n\n\n\n£UKR_desctext_hur \n\n\n\n\n\n\n\n\n乌克兰国防部情报总局是乌克兰政府的军事情报机构。这是国防部的一个部门，而不是乌克兰武装部队总参谋部。在该部的帮助下，我们将能够在邻国开展各种破坏行动，并在破坏营的帮助下进行出击。\n\n\n\n当前情报总局可用行动点数：[?hur_points]"
