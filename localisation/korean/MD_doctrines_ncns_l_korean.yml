l_korean:
 equipment_doctrine_folder: "장비 교리"
 GRAND_DOCTRINE_LOCAL_AIRSPACE_DEFENCE: "지역 영공 방어"
 GRAND_DOCTRINE_AIR_SUPREMACY: "공중 지배"
 GRAND_DOCTRINE_MIXED_ROLE: "혼합된 역할"
 GRAND_DOCTRINE_COMBINED_ARMS: "제병협동"
 GRAND_DOCTRINE_SHOCK_AND_AWE: "충격과 공포"
 GRAND_DOCTRINE_SHOCK_AND_AWE_DESC: "이 대교리는 결정적인 작전 효과를 달성하기 위해 전투력을 빠르고 집중적으로 투사하는 것을 중심으로 지상 작전을 구성합니다. 충격과 공포 개념은 템포, 전장 지배, 조율된 부대 운용을 강조합니다."
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH: "종심 방어"
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH_DESC: "이 대교리는 전장 전반에 걸친 다층 진지와 종심 기반의 부대 운용을 통해 지상 방어 구조를 형성합니다. 종심 방어 개념은 지속적인 방어적 결속력과 통제된 작전 공간을 강조합니다."
 GRAND_DOCTRINE_MISSION_COMMAND: "임무형 지휘체계"
 GRAND_DOCTRINE_MISSION_COMMAND_DESC: "이 대교리는 명확한 의도와 정의된 목표에 따라 위임된 권한을 바탕으로 지상군을 구조화합니다. 임무형 지휘 개념은 다중 제대 간의 주도권과 조율된 실행 능력을 강조합니다."
 GRAND_DOCTRINE_GUERRILLA_WARFARE: "유격전"
 GRAND_DOCTRINE_GUERRILLA_WARFARE_DESC: "이 대교리는 분산되고 지속적인 전투 활동을 수행하는 비정규군을 중심으로 지상 작전을 구성합니다. 유격전 개념은 분쟁 환경 내에서의 국지적 조직화와 지속적인 압박을 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_MIXED: "혼합된 장비"
 GRAND_DOCTRINE_EQUIPMENT_MIXED_DESC: "이 대교리는 다양한 작전 요구 사항을 지원하기 위해 무기 체계의 균형 잡힌 조합을 중심으로 부대 장비를 구조화합니다. 혼합 장비 개념은 다양한 전투 역할 전반에 걸친 부대 무장의 유연성을 강조합니다."
 GRAND_DOCTRINE_EQUIPMENT_LIGHT: "경장비"
 GRAND_DOCTRINE_EQUIPMENT_HEAVY: "중장비"
 GRAND_DOCTRINE_EQUIPMENT_MOBILE: "기동 장비"
 GRAND_DOCTRINE_EQUIPMENT_FIRES: "화력 지원 장비"
 GRAND_DOCTRINE_EQUIPMENT_FULL: "완전군장"
 GRAND_DOCTRINE_BLUE_WATER: "대양해군"
 GRAND_DOCTRINE_GREEN_WATER: "지역해군"
 GRAND_DOCTRINE_JEUNE_ECOLE: "청년학파"
 GRAND_DOCTRINE_GUERRE_DE_COURSE: "통상파괴"
 GRAND_DOCTRINE_COMBINED_ARMS_DESC: "이 대교리는 기동, 화력 지원, 군수 지원 요소의 통합된 운용을 중심으로 지상군을 구조화합니다. 제병협동 개념은 일관된 전장 효과를 창출하기 위해 부대 간의 동기화된 행동을 강조합니다."
 DOCTRINE_TRACK_SPECIAL_FORCES_MARINES: "특수해병대"
 DOCTRINE_TRACK_MARINES_MASSIVE_FORCES: "해병대"
 DOCTRINE_TRACK_AIRBORN_FORCES: "공수 대대"
 DOCTRINE_TRACK_AIRBORN_OPERATIONS: "공수 작전"
 DOCTRINE_TRACK_RANGER_FORCES: "특수 정찰 연대"
 DOCTRINE_TRACK_TRAINING_AND_OPS: "훈련과 작전"
 DOCTRINE_TRACK_AIRCRAFT_DESIGN: "항공기 설계"
 DOCTRINE_TRACK_MULTIROLE_AIRCRAFT: "다목적 항공기"
 DOCTRINE_TRACK_INFANTRY_EQP: "보병 장비"
 DOCTRINE_TRACK_MOTORIZED_EQP: "차량화 장비"
 DOCTRINE_TRACK_MECHANIZED_EQP: "기계화 장비"
 DOCTRINE_TRACK_ARMORED_EQP: "기갑 장비"
 DOCTRINE_TRACK_FIRES_EQP: "포격 지원"
 DOCTRINE_TRACK_AIRMOB_EQP: "공중기동장비"
 DOCTRINE_TRACK_OPERAITONAL_THEORY: "작전 이론"
 DOCTRINE_TRACK_DEDICATED_DOCTRINE: "헌신적 교리"
 DOCTRINE_TRACK_TRAINING: "훈련"
 DOCTRINE_TRACK_LEADERSHIP: "리더십"
 DOCTRINE_TRACK_TECHNOLOGY: "기술"
 DOCTRINE_TRACK_STRUCTURE: "구조"
 DOCTRINE_TRACK_CAPITAL: "주력함"
 DOCTRINE_TRACK_ESCORT: "호위함"
 DOCTRINE_TRACK_SUPPORT: "지원함"
 MARINE_SPECIAL_FORCES: "신속 상륙 작전"
 MARINE_SPECIAL_FORCES_DESC: "이 교리는 신속한 상륙 및 도하 작전을 위해 경보병 중심의 해병대를 훈련합니다. 신속 공격 개념은 속도, 기동성, 그리고 적이 반응하기 전에 해안을 점령하는 것을 강조합니다."
 MARINE_MASSIVE_FORCES: "대규모 상륙부대"
 MARINE_SPECIAL_FORCES_MASSIVE_DESC: "이 교리는 경보병 및 기계화 해병대를 대규모 편성으로 구성하여 지속적이고 대규모의 상륙 작전을 수행할 수 있도록 합니다. 집결 상륙 개념은 침공 능력, 훈련량, 그리고 해안에 상륙하는 병력의 규모를 강조합니다."
 RANGER_FORCES_DOCTRINES: "숲 레인저"
 RANGER_FORCES_DOCTRINES_DESC: "이 교리는 레인저들이 빽빽한 숲에서 싸우도록 훈련시키며, 나무의 은폐를 이용하여 매복하고, 은밀하게 숨어들어 적을 발견하지 못하게 하는 전략을 강조합니다. 숲에서의 전투 개념은 은폐, 도로에서 벗어난 자유로운 이동, 그리고 잘 준비된 진지에서의 견고한 방어를 강조합니다."
 SUBDOCTRINE_OPERATIONS_CENTRAL_COMMAND: "중앙화된 지휘부"
 SUBDOCTRINE_OPERATIONS_CENTRAL_COMMAND_DESC: "이 교리는 단일 지휘 기관에서 계획, 우선순위 지정 및 실행이 지시되는 단일 중앙 사령부 산하에 항공 작전을 통합합니다. 중앙화된 지휘부는 일관된 작전 의도와 전구 전반에 걸친 항공력의 통합 운용을 보장합니다."
 SUBDOCTRINE_OPERATIONS_DETACHED_COMMAND: "분리된 지휘부"
 SUBDOCTRINE_OPERATIONS_DETACHED_COMMAND_DESC: "이 교리는 항공 작전을 어느 정도 독립적인 사령부에 할당하여, 정의된 작전 경계 내에서 계획 및 실행에 대한 위임된 권한을 부여합니다. 분리된 지휘부는 전반적인 전략 목표와의 일치를 유지하면서 국지적인 의사 결정을 가능하게 합니다."
 SUBDOCTRINE_OPERATIONS_NAVAL_AIR: "해군사령부"
 SUBDOCTRINE_OPERATIONS_NAVAL_AIR_DESC: "이 교리는 해군 지휘 구조 하에 항공 작전을 통합하여 항공력 계획 및 실행을 해상 목표와 일치시킵니다. 해군 지휘는 함대 작전과 해상 영역 통제를 지원하기 위한 항공 자산의 조율된 운용을 보장합니다."
 SUBDOCTRINE_DESIGN_MULTIROLE: "다목적 설계"
 SUBDOCTRINE_DESIGN_MULTIROLE_DESC: "이 교리는 단일 플랫폼 내에서 여러 임무 프로필을 수행할 수 있는 항공기 개발을 강조합니다. 다목적 설계는 항공 영역 전반에 걸친 광범위한 작전 요구 사항을 지원하기 위해 적응성과 통합 시스템을 우선시합니다."
 SUBDOCTRINE_DESIGN_DEDICATED: "전용 설계"
 SUBDOCTRINE_DESIGN_DEDICATED_DESC: "이 교리는 특정 작전 역할에 최적화된 항공기 개발에 중점을 둡니다. 전용 설계는 항공 영역 내에서 명확하게 정의된 임무 요구 사항을 충족하기 위한 전문화와 맞춤형 성능을 강조합니다."
 SUBDOCTRINE_DESIGN_HEAVY: "중(重)설계"
 SUBDOCTRINE_DESIGN_HEAVY_DESC: "이 교리는 체공 시간, 탑재량 및 지속적인 작전 주둔에 초점을 맞춘 크고 견고한 항공기 설계 개발을 강조합니다. 중항공기 설계는 까다로운 항공 작전을 지원하기 위해 구조적 강도와 통합 시스템을 우선시합니다."
 SUBDOCTRINE_DESIGN_DRONE: "드론 설계"
 SUBDOCTRINE_HEAVY_STRATEGIC_BOMBER: "전략폭격기"
 SUBDOCTRINE_HEAVY_STRATEGIC_BOMBER_DESC: "이 교리는 장거리 전략 타격 작전을 위해 설계된 항공기 개발에 중점을 둡니다. 전략 폭격기는 포괄적인 군사 목표를 지원하기 위해 광대한 거리에 걸쳐 지속적인 항공력을 투사하도록 고안되었습니다."
 SUBDOCTRINE_HEAVY_NAVAL_BOMBERS: "뇌격기"
 SUBDOCTRINE_HEAVY_NAVAL_BOMBERS_DESC: "이 교리는 해군 부대와 긴밀히 협력하여 작전을 수행하도록 설계된 항공기 개발을 강조합니다. 뇌격기 설계는 해상 작전과 제해권 확보 목표를 지원하기 위해 해양 환경 전반으로 항공력을 확장하는 데 중점을 둡니다."
 SUBDOCTRINE_HEAVY_GUNSHIPS: "중(重)건쉽"
 SUBDOCTRINE_HEAVY_GUNSHIPS_DESC: "이 교리는 지속적인 공중 화력을 제공하도록 설계된 중무장 항공기 개발에 중점을 둡니다. 중건쉽 설계는 분쟁 환경 전반에 걸친 항공 작전을 지원하기 위해 통합 무기 시스템과 장기 체공 능력을 강조합니다."
 SUBDOCTRINE_MULTIROLE_MIXED: "혼합된 다목적"
 SUBDOCTRINE_MULTIROLE_MIXED_DESC: "이 교리는 단일 공군 내에 다양한 설계 철학을 결합하여 다목적 항공기 개발에 대한 균형 잡힌 접근 방식을 장려합니다. 혼합 다목적 개념은 광범위한 작전 요구 사항을 해결하기 위한 부대 구성의 유연성을 강조합니다."
 SUBDOCTRINE_MULTIROLE_STRIKE: "타격 항공기"
 SUBDOCTRINE_MULTIROLE_STRIKE_DESC: "이 교리는 공세적 항공 작전을 지향하는 다목적 항공기 개발을 강조합니다. 타격 중심 설계는 광범위한 작전 목표를 지원하기 위해 지정된 목표에 대한 효과적인 항공력 투사를 우선시합니다."
 SUBDOCTRINE_MULTIROLE_OPERATIONS: "멀티롤 작전"
 SUBDOCTRINE_MULTIROLE_OPERATIONS_DESC: "이 교리는 다양한 임무 요구 사항을 충족할 수 있는 다목적 항공기를 중심으로 항공 작전을 구조화합니다. 다목적 작전은 광범위한 작전 목표를 지원하기 위해 적응력이 뛰어난 항공 플랫폼의 조율된 운용을 강조합니다."
 SUBDOCTRINE_STRIKE_CAS: "근접지원지원기"
 SUBDOCTRINE_STRIKE_CAS_DESC: "이 교리는 직접적인 항공 교전을 통해 지상 작전을 지원하도록 설계된 항공기 개발에 중점을 둡니다. 근접항공지원 항공기는 지상군과 긴밀히 협력하여 신속하고 지속적인 항공력을 제공하도록 구조화됩니다."
 SUBDOCTRINE_STRIKE_NAVAL: "해상타격기"
 SUBDOCTRINE_STRIKE_NAVAL_DESC: "이 교리는 해상 목표를 지원하기 위해 운용되는 타격 항공기 개발에 중점을 둡니다. 해상 타격 개념은 해양 전구 전반에 병력을 투사하기 위해 항공력과 해군 작전의 통합을 강조합니다."
 SUBDOCTRINE_STRIKE_MUNITIONS: "타격 무기"
 SUBDOCTRINE_STRIKE_MUNITIONS_DESC: "이 교리는 정밀 타격 작전을 위해 설계된 탄약의 개발 및 통합을 강조합니다. 타격 무기 개념은 작전 목표를 지원하기 위해 공중 투하 화력의 효과적인 적용을 강화하는 데 초점을 맞춥니다."
 SUBDOCTRINE_FIGHTER_LIGHT: "경전투기"
 SUBDOCTRINE_FIGHTER_LIGHT_DESC: "이 교리는 민첩성과 신속한 항공 작전에 최적화된 경량 전투기 개발에 초점을 맞춥니다. 경전투기 설계는 광범위한 공중전 체계 내에서 효율적인 성능과 유연한 운용을 강조합니다."
 SUBDOCTRINE_FIGHTER_AIR_SUP: "공중 지배"
 SUBDOCTRINE_FIGHTER_AIR_SUP_DESC: "이 교리는 항공 영역의 통제권을 확립하고 유지하기 위한 전투기 개발 및 운용에 중점을 둡니다. 공중 지배 개념은 전구 전반에 걸친 행동의 자유를 보장하기 위한 조율된 공중전 작전을 강조합니다."
 SUBDOCTRINE_STRUCTURE_CENTRAL_COMMAND: "중앙 사령부"
 SUBDOCTRINE_STRUCTURE_CENTRAL_COMMAND_DESC: "이 교리는 계획, 조율 및 실행이 단일 지휘 체계 하에서 지시되는 단일 중앙 사령부 산하에 지상군을 편성합니다. 중앙 사령부 구조는 일관된 작전 의도와 전장 전반에 걸친 지상군의 동기화된 운용을 보장합니다."
 SUBDOCTRINE_STRUCTURE_DECENTRAL_COMMAND: "분권화된 지휘부"
 SUBDOCTRINE_STRUCTURE_DECENTRAL_COMMAND_DESC: "이 교리는 지상군 내 여러 제대에 지휘 권한을 분산시켜 예하 부대가 할당된 목표 내에서 작전을 계획하고 수행할 수 있도록 합니다. 분권화된 지휘 구조는 전장 전반에 걸친 주도권과 신속한 의사 결정을 강조합니다."
 SUBDOCTRINE_STRUCTURE_BCT: "대대 전투단"
 SUBDOCTRINE_STRUCTURE_BCT_DESC: "이 교리는 제병협동 작전을 수행하도록 설계된 자립형 대대급 편제를 중심으로 지상군을 구조화합니다. 대대 전투단은 기동, 화력 지원 및 군수 지원 요소를 통합하여 할당된 작전 구역 내에서 효과적으로 임무를 수행합니다."
 SUBDOCTRINE_OPERATION_DECENTRALIZED_SUPPLY: "분산화된 보급"
 SUBDOCTRINE_OPERATION_DECENTRALIZED_SUPPLY_DESC: "이 교리는 여러 작전 구역에 걸쳐 부대를 지원하는 분산된 군수 구조를 통해 지상군 유지를 조직합니다. 분산화된 보급 개념은 작전 속도와 연속성을 유지하기 위한 자원의 국지적 통제를 강조합니다."
 SUBDOCTRINE_OPERATION_CENTRALIZED_SUPPLY: "중앙화된 보급"
 SUBDOCTRINE_OPERATION_CENTRALIZED_SUPPLY_DESC: "이 교리는 작전 구역 전체의 보급 분배를 조율하는 중앙 집중식 군수 구조 하에 지상군 유지를 조직합니다. 중앙화된 보급 개념은 지상 작전에 대한 일관된 지원을 보장하기 위해 통합된 계획과 통제를 강조합니다."
 SUBDOCTRINE_OPERATION_SCAVENGING_SUPPLY: "노획 보급"
 SUBDOCTRINE_OPERATION_SCAVENGING_SUPPLY_DESC: "이 교리는 작전 환경 내에서 현지에서 가용한 자원을 활용하여 지상군을 유지합니다. 노획 보급 개념은 지속적인 지상 작전을 지원하기 위해 노획하거나 급조한 물자의 적응적 조달 및 통합에 초점을 맞춥니다."
 SUBDOCTRINE_OPERATION_ADVERSE: "불리한 작전"
 SUBDOCTRINE_OPERATION_ADVERSE_DESC: "이 교리는 지상군이 적대적이고 악화된 조건에서 작전을 수행할 수 있도록 준비시킵니다. 불리한 작전은 까다로운 작전 환경 전반에 걸친 적응력, 회복력 및 지속적인 효율성을 강조합니다."
 SUBDOCTRINE_OPERATION_VOLUNTEER: "모병 작전"
 SUBDOCTRINE_OPERATION_VOLUNTEER_DESC: "이 교리는 외부 목표를 지원하기 위해 국경을 넘어 선발된 부대를 전개하는 것을 중심으로 지상군 작전을 구조화합니다. 모병 작전은 제한된 규모의 개입, 작전의 자율성, 포괄적인 전략적 의도와의 일치를 강조합니다."
 SUBDOCTRINE_OPERATION_DEEP_BATTLE: "종심 전투 작전"
 SUBDOCTRINE_OPERATION_DEEP_BATTLE_DESC: "이 교리는 전장의 여러 종심에 걸쳐 동시에 적 부대와 교전하도록 지상 작전을 구조화합니다. 종심 전투 개념은 최전선을 넘어 적의 지휘, 군수 지원 및 기동 요소를 교란하기 위한 조율된 행동을 강조합니다."
 SUBDOCTRINE_OPERATION_THUNDER_RUN: "고속 기동전"
 SUBDOCTRINE_OPERATION_THUNDER_RUN_DESC: "이 교리는 속도와 충격을 통해 결정적인 효과를 달성하는 것을 목표로 하는 빠르고 집중적인 돌파를 중심으로 지상 작전을 구성합니다. 고속 기동전 작전은 작전 환경을 교란하기 위한 모멘텀과 집중된 기동을 강조합니다."
 SUBDOCTRINE_OPERATION_LIGHT_INFANTRY: "경보병 작전"
 SUBDOCTRINE_OPERATION_LIGHT_INFANTRY_DESC: "이 교리는 다양한 지형과 작전 조건에 적합한 고기동 보병 편제를 중심으로 지상 작전을 조직합니다. 경보병 작전은 유연성, 신속한 전개 및 전장 전반에 걸친 지속적인 주둔을 강조합니다."
 SUBDOCTRINE_OPERATION_GUERRILLA: "유격전"
 SUBDOCTRINE_OPERATION_GUERRILLA_DESC: "이 교리는 분쟁 환경 전반에서 작전하는 비정규적이고 분산된 전투 편제를 중심으로 지상 작전을 구조화합니다. 유격 작전은 지상 전장을 조성하기 위한 기동성, 국지적 주도권 및 지속적인 압박을 강조합니다."
 SUBDOCTRINE_OPERATION_STATIC_DEFENSE: "수동적 방어전"
 SUBDOCTRINE_OPERATION_STATIC_DEFENSE_DESC: "이 교리는 고정된 진지와 준비된 방어 네트워크를 중심으로 방어적 지상 작전을 구조화합니다. 수동적 방어 작전은 핵심 지형을 사수하기 위한 지역 통제와 조직적인 부대 운용을 강조합니다."
 SUBDOCTRINE_OPERATION_ELASTIC_DEFENSE: "탄력적 방어전"
 SUBDOCTRINE_OPERATION_ELASTIC_DEFENSE_DESC: "이 교리는 통제된 병력 이동과 종심 기반의 부대 운용을 통해 방어 작전을 조직합니다. 탄력적 방어 개념은 연속적인 방어망 전반에 걸쳐 전투력을 보존하면서 전장을 조성하는 것을 강조합니다."
 SUBDOCTRINE_OPERATION_MOBILE_DEFENSE: "기동 방어전"
 SUBDOCTRINE_OPERATION_MOBILE_DEFENSE_DESC: "이 교리는 적의 행동에 역동적으로 대응할 수 있는 기동 중심 부대를 바탕으로 방어적 지상 작전을 구조화합니다. 기동 방어 개념은 방어 전장 내에서의 유연성과 조율된 반격 기동을 강조합니다."
 SUBDOCTRINE_OPERATION_INSURGENT: "반란전"
 SUBDOCTRINE_OPERATION_INSURGENT_DESC: "이 교리는 분권화되고 내재된 전투 요소에 의해 수행되는 비정규전을 중심으로 지상군을 편성합니다. 반란전 작전은 작전 환경에 영향을 미치기 위한 지속적인 교전과 인구 중심의 통제를 강조합니다."
 SUBDOCTRINE_TECHNOLOGY_HIGH: "첨단 군대"
 SUBDOCTRINE_TECHNOLOGY_HIGH_DESC: "이 교리는 전투, 지휘 및 군수 지원 기능 전반에 걸친 첨단 기술의 광범위한 통합을 중심으로 지상군을 구조화합니다. 첨단 군대 개념은 작전 효율성의 핵심 요소로서 기술적 우위를 강조합니다."
 SUBDOCTRINE_TECHNOLOGY_COMMON: "공동 기술 군대"
 SUBDOCTRINE_TECHNOLOGY_COMMON_DESC: "이 교리는 널리 보급되고 표준화된 군사 기술을 중심으로 지상군을 조직합니다. 공동 기술 군대 개념은 편제 전반에 걸친 신뢰성, 확장성 및 광범위한 상호 운용성을 강조합니다."
 SUBDOCTRINE_TECHNOLOGY_LOW: "낙후된 군대"
 SUBDOCTRINE_TECHNOLOGY_LOW_DESC: "이 교리는 첨단 기술 시스템에 대한 의존도를 최소화하여 지상군을 구조화합니다. 낙후된 군대 개념은 제한된 기술 조건 하에서의 기본 장비, 단순성 및 작전 기능성을 강조합니다."
 SUBDOCTRINE_TRAINING_REDUCED: "완화된 훈련"
 SUBDOCTRINE_TRAINING_REDUCED_DESC: "이 교리는 병력 창출과 전개를 가속하기 위해 정규 훈련 요구 사항을 최소화합니다. 완화된 훈련 개념은 기본적인 작전 준비 태세와 신속한 병력 가용성을 강조합니다."
 SUBDOCTRINE_TRAINING_ADVANCED: "고급 훈련"
 SUBDOCTRINE_TRAINING_ADVANCED_DESC: "이 교리는 부대 결속력과 작전 숙련도를 높이기 위한 광범위하고 체계적인 훈련 프로그램을 강조합니다. 고급 훈련 개념은 복잡하고 까다로운 작전 환경에 대비하여 병력을 준비시키는 데 초점을 맞춥니다."
 SUBDOCTRINE_TRAINING_SKILLS: "기술학교"
 SUBDOCTRINE_TRAINING_SKILLS_DESC: "이 교리는 전문 군사 기술의 체계적인 개발을 중심으로 훈련을 구조화합니다. 기술 중심 훈련은 지상군 내의 기술적 역량과 역할별 숙련도를 강조합니다."
 SUBDOCTRINE_TRAINING_SURVIVAL: "생존 훈련"
 SUBDOCTRINE_TRAINING_SURVIVA_DESC: "이 교리는 열악하고 적대적인 환경에서의 지구력과 적응력에 초점을 맞춘 훈련을 강조합니다. 생존 훈련 개념은 병력이 악조건 하에서도 작전을 지속할 수 있도록 준비시킵니다."
 SUBDOCTRINE_LEADERSHIP_OFFICER: "장교 훈련"
 SUBDOCTRINE_LEADERSHIP_OFFICER_DESC: "이 교리는 정규 교육 및 지휘 준비를 통한 장교의 리더십 개발에 중심을 둡니다. 장교 훈련 개념은 지상군 내의 계획, 조율 및 조직 통제를 강조합니다."
 SUBDOCTRINE_LEADERSHIP_NCO: "부사관 훈련"
 SUBDOCTRINE_LEADERSHIP_NCO_DESC: "이 교리는 지상군 지휘의 중추로서 부사관을 중심으로 한 리더십 개발을 구조화합니다. 부사관 훈련 개념은 전술적 리더십과 일상적인 부대 효율성을 강조합니다."
 SUBDOCTRINE_LEADERSHIP_REDUCED: "완화된 기준"
 SUBDOCTRINE_LEADERSHIP_REDUCED_DESC: "이 교리는 지휘 역량을 확장하기 위해 정규 리더십 자격 요건을 낮춥니다. 완화된 기준 개념은 병력 확장을 지원하기 위한 임시방편적인 리더십 창출을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_BASE_INFANTRY: "기본 군장"
 SUBDOCTRINE_EQUIPMENT_BASE_INFANTRY_DESC: "이 교리는 필수 무기 및 지원 장비에 초점을 맞춘 표준화된 보병 장비 적재량을 정의합니다. 기본 보병 군장 개념은 지속적인 지상 작전을 위한 균형과 다목적 역량을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_LIGHT_INFANTRY: "경보병 군장"
 SUBDOCTRINE_EQUIPMENT_LIGHT_INFANTRY_DESC: "이 교리는 감소된 무게와 단순화된 장비 구성을 중심으로 보병 장비를 구조화합니다. 경보병 군장 개념은 다양한 작전 환경 전반에 걸친 기동성과 전개 용이성을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_HEAVY_INFANTRY: "중보병 군장"
 SUBDOCTRINE_EQUIPMENT_HEAVY_INFANTRY_DESC: "이 교리는 확장된 무기 및 방호 시스템으로 보병 편제를 무장시킵니다. 중보병 군장 개념은 지상 교전 중의 강화된 화력과 회복력을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_BASE_MOTORIZED: "기본 차량화 설정"
 SUBDOCTRINE_EQUIPMENT_BASE_MOTORIZED_DESC: "이 교리는 차량화 보병 부대를 위한 표준화된 장비 구성을 정의합니다. 기본 차량화 설정은 차륜형 수송 차량이 지원하는 균형 잡힌 기동성과 전투 능력을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_LIGHT_MOTORIZED: "경 차량화 설정"
 SUBDOCTRINE_EQUIPMENT_LIGHT_MOTORIZED_DESC: "이 교리는 더 가벼운 차량과 축소된 탑재 시스템을 중심으로 차량화 부대 장비를 구조화합니다. 경차량화 설정은 지상 작전에서의 속도와 작전의 유연성을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_HEAVY_MOTORIZED: "중 차량화 설정"
 SUBDOCTRINE_EQUIPMENT_HEAVY_MOTORIZED_DESC: "이 교리는 더 무거운 차량과 강화된 탑재 장비로 차량화 부대를 무장시킵니다. 중차량화 설정은 지상 작전 중의 방호력과 지속적인 전투 능력을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_MIXED_MECHANIZED: "혼합된 기계화 설정"
 SUBDOCTRINE_EQUIPMENT_MIXED_MECHANIZED_DESC: "이 교리는 수송 및 전투 차량의 조합을 중심으로 기계화 편제를 구조화합니다. 혼합 기계화 편성은 다양한 장비 통합을 통한 적응력을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_APC_MECHANIZED: "APC 기계화 설정"
 SUBDOCTRINE_EQUIPMENT_APC_MECHANIZED_DESC: "이 교리는 주요 수송 플랫폼인 병력수송장갑차(APC)를 중심으로 기계화 부대를 편성합니다. 장갑병력수송차를 기반으로 한 기계화 편성은 지상 작전에서의 방호 기동과 보병 지원을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_IFV_MECHANIZED: "IFV 기계화 설정"
 SUBDOCTRINE_EQUIPMENT_IFV_MECHANIZED_DESC: "이 교리는 통합된 전투 시스템을 갖춘 보병전투차(IFV)를 중심으로 기계화 부대를 구조화합니다. 보병전투차를 기반으로 한 기계화 편성은 결합된 기동성과 직접 화력 지원을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_MBT_TANK: "기갑 장비"
 SUBDOCTRINE_EQUIPMENT_MBT_TANK_DESC: "이 교리는 주력전차 편제의 배치와 유지에 초점을 맞춥니다. 전차 장비 개념은 지상 전투 부대의 핵심 요소로서 기갑 화력을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_LIGHT_TANK: "경전차 설정"
 SUBDOCTRINE_EQUIPMENT_LIGHT_TANK_DESC: "이 교리는 유연한 지상 작전에 적합한 더 가벼운 전차 플랫폼을 중심으로 기갑 부대를 구조화합니다. 경전차 설정은 기갑 편제 내에서의 기동성과 작전 도달 거리를 강조합니다."
 SUBDOCTRINE_EQUIPMENT_SUPERHEAVY_TANK: "초중장비"
 SUBDOCTRINE_EQUIPMENT_SUPERHEAVY_TANK_DESC: "이 교리는 예외적으로 무겁고 방호력이 뛰어난 차량 플랫폼을 중심으로 기갑 부대를 편성합니다. 초중장비 개념은 지상 편제 내에서 기갑 부대의 존재감을 극대화하는 것을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_TOWED_ARTILLERY: "견인포"
 SUBDOCTRINE_EQUIPMENT_TOWED_ARTILLERY_DESC: "이 교리는 수송 자산의 지원을 받아 전개 가능한 포병 시스템을 중심으로 포병 부대를 구조화합니다. 견인포 개념은 지상 작전 전반에 걸친 유연한 화력 지원을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_SP_ARTILLERY: "SPART 장비"
 SUBDOCTRINE_EQUIPMENT_SP_ARTILLERY_DESC: "이 교리는 기동 부대와 나란히 작전할 수 있는 자주포 플랫폼으로 포병 부대를 무장시킵니다. SPART(자주포) 장비 개념은 기동성 있고 신속하게 대응하는 화력 지원을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_ROCKET_ARTILLERY: "MLRS 장비"
 SUBDOCTRINE_EQUIPMENT_ROCKET_ARTILLERY_DESC: "이 교리는 지역 화력 임무를 위한 다연장 로켓 시스템(MLRS)을 중심으로 포병 부대를 구조화합니다. MLRS 장비 개념은 전장 전반에 걸친 조율된 화력 투사를 강조합니다."
 SUBDOCTRINE_EQUIPMENT_ATK_HELICOPTER: "공격 헬리콥터"
 SUBDOCTRINE_EQUIPMENT_ATK_HELICOPTER_DESC: "이 교리는 지상군 장비 구조에 공격 헬리콥터 플랫폼을 통합합니다. 공격 헬기 개념은 공중 화력 지원과 지상 작전과의 전장 통합을 강조합니다."
 SUBDOCTRINE_EQUIPMENT_TRANS_HELICOPTER: "수송 헬리콥터"
 SUBDOCTRINE_EQUIPMENT_TRANS_HELICOPTER_DESC: "이 교리는 회전익 수송 플랫폼을 중심으로 지상군 기동성을 구조화합니다. 수송 헬기 개념은 공중 기동성과 신속한 부대 재배치를 강조합니다."
 SUBDOCTRINE_CAPITAL_CARRIER: "항공모함 작전"
 SUBDOCTRINE_CAPITAL_CARRIER_DESC: "이 교리는 핵심 함대 자산인 항공모함을 중심으로 해상 전력 투사를 구조화합니다. 항공모함 작전은 해양 전구 전반으로 해군 영향력을 확장하기 위해 탑재된 항공단의 조율된 운용을 강조합니다."
 SUBDOCTRINE_CAPITAL_HLS: "헬기모함"
 SUBDOCTRINE_CAPITAL_HLS_DESC: "이 교리는 헬리콥터 탑재가 가능한 강습상륙함을 해군 부대 구조에 통합합니다. 헬기상륙함 개념은 해상 작전 내에서 수직 기동성과 상륙 지원을 강조합니다."
 SUBDOCTRINE_CAPITAL_ESCORT_CARRIER: "호위 항공모함"
 SUBDOCTRINE_CAPITAL_ESCORT_CARRIER_DESC: "이 교리는 함대 요소와 함께 작전하는 소형 항공모함 플랫폼을 중심으로 해군 항공대를 조직합니다. 호위 항공모함 개념은 해군 편제 내의 분산된 항공 지원을 강조합니다."
 SUBDOCTRINE_CAPITAL_LOTS: "바다의 군주"
 SUBDOCTRINE_CAPITAL_LOTS_DESC: "이 교리는 핵심 해양 구역에 대한 지속적인 통제력을 발휘하도록 해군 부대를 구조화합니다. 바다의 군주 개념은 지배적인 함대 주둔과 지속적인 해상 영향력을 강조합니다."
 SUBDOCTRINE_CAPITAL_CARRIER_ESCORTS: "항공모함 호위"
 SUBDOCTRINE_CAPITAL_CARRIER_ESCORTS_DESC: "이 교리는 항모전단에 다층적인 방어를 제공하도록 함대 요소를 구성합니다. 항공모함 호위 개념은 주력함에 대한 조율된 방어와 작전 연속성을 강조합니다."
 SUBDOCTRINE_CAPITAL_FLEET_CRUISERS: "함대 순양함"
 SUBDOCTRINE_CAPITAL_FLEET_CRUISERS_DESC: "이 교리는 단독 및 그룹 작전이 가능한 순양함급 함정을 중심으로 함대 편성을 집중합니다. 함대 순양함 개념은 지휘 통제와 다중 임무 해상 역량을 강조합니다."
 SUBDOCTRINE_CAPITAL_DESTROYER_FLEET: "구축함 함대"
 SUBDOCTRINE_CAPITAL_DESTROYER_FLEET_DESC: "이 교리는 주요 수상 전투 요소인 구축함을 중심으로 해군 부대를 구조화합니다. 구축함대 개념은 유연한 교전과 함대급 작전 지원을 강조합니다."
 SUBDOCTRINE_CAPITAL_SUPPORT_DESTROYERS: "지원 구축함"
 SUBDOCTRINE_CAPITAL_SUPPORT_DESTROYERS_DESC: "이 교리는 고가치 함대 유닛을 지원하고 보호하기 위해 구축함 부대를 할당합니다. 지원 구축함 개념은 보호, 조율 및 지속적인 함대 작전을 강조합니다."
 SUBDOCTRINE_CAPITAL_FRIGATE_CAPITAL: "주력 호위함"
 SUBDOCTRINE_CAPITAL_FRIGATE_CAPITAL_DESC: "이 교리는 호위함급 함정을 해군 편제 내에서 중심 역할로 격상시킵니다. 주력 호위함 개념은 균형 잡힌 능력과 분산된 해상 주둔을 강조합니다."
 SUBDOCTRINE_ESCORT_MULTIROLE_FRIGATE: "다목적 호위함"
 SUBDOCTRINE_ESCORT_MULTIROLE_FRIGATE_DESC: "이 교리는 다양한 해상 임무를 수행할 수 있는 호위함을 중심으로 호위 부대를 구조화합니다. 다목적 호위함 개념은 호위 및 초계 작전 내의 적응력을 강조합니다."
 SUBDOCTRINE_ESCORT_ANTI_SUB_CORVETTE: "대잠초계함"
 SUBDOCTRINE_ESCORT_ANTI_SUB_CORVETTE_DESC: "이 교리는 잠수함 탐지 및 교전에 특화된 초계함을 중심으로 호위 부대를 편성합니다. 대잠 초계함 개념은 국지적인 수중 통제를 강조합니다."
 SUBDOCTRINE_ESCORT_ANTI_AIR_CORVETTE: "대공초계함"
 SUBDOCTRINE_ESCORT_ANTI_AIR_CORVETTE_DESC: "이 교리는 방공 역할에 초점을 맞춘 초계함을 중심으로 호위 편제를 구조화합니다. 대공 초계함 개념은 공중 위협으로부터 함대 유닛을 보호하는 것을 강조합니다."
 SUBDOCTRINE_ESCORT_STEALTH_ESCORTS: "스텔스호위함"
 SUBDOCTRINE_ESCORT_STEALTH_ESCORTS_DESC: "이 교리는 저피탐 호위함을 해군 편제에 통합합니다. 스텔스 호위함 개념은 해양 환경에서 감소된 피탐성과 작전의 은밀성을 강조합니다."
 SUBDOCTRINE_SUBMARINE_ESCORT_ATTACK: "호위 공격잠수함"
 SUBDOCTRINE_SUBMARINE_ESCORT_ATTACK_DESC: "이 교리는 수상 함대와 긴밀히 협력하여 작전하도록 잠수함 부대를 할당합니다. 호위 공격 잠수함 개념은 해군 작전에 대한 수중 지원을 강조합니다."
 SUBDOCTRINE_SUBMARINE_HUNTER_KILLER: "공격잠수함"
 SUBDOCTRINE_SUBMARINE_HUNTER_KILLER_DESC: "이 교리는 독립적인 공세 초계를 중심으로 잠수함 부대를 구조화합니다. 헌터-킬러 잠수함 개념은 지속적인 수중 주둔과 표적 교전을 강조합니다."
 SUBDOCTRINE_SUBMARINE_MISSILE_BOATS: "미사일 보트"
 SUBDOCTRINE_SUBMARINE_MISSILE_BOATS_DESC: "이 교리는 미사일 전개를 위해 장착된 플랫폼을 중심으로 잠수함 부대를 구성합니다. 미사일 보트 개념은 해양 영역에서의 전략적 및 작전적 타격 능력을 강조합니다."
 SUBDOCTRINE_OPERATIONS_RAIDING_FLEETS: "함대 습격"
 SUBDOCTRINE_OPERATIONS_RAIDING_FLEETS_DESC: "이 교리는 교란적인 해상 행동을 수행하는 기동 기동부대를 중심으로 해군 작전을 구조화합니다. 습격 함대 개념은 작전 도달 범위와 유연한 부대 운용을 강조합니다."
 SUBDOCTRINE_OPERATIONS_NAVAL_SUPREMACY: "해상 우위"
 SUBDOCTRINE_OPERATIONS_NAVAL_SUPREMACY_DESC: "이 교리는 해양 공간에 대한 통제권을 확립하고 유지하기 위해 해군 작전을 구성합니다. 해상 우위 개념은 해상 교통로 전반에 걸친 조율된 함대 행동을 강조합니다."
 SUBDOCTRINE_OPERATIONS_COSTAL_DEFENSE: "해안 방어"
 SUBDOCTRINE_OPERATIONS_COSTAL_DEFENSE_DESC: "이 교리는 영해와 해안 접근로를 보호하도록 해군 부대를 구조화합니다. 해안 방어 개념은 다층적인 해상 보안과 지역적인 제해권을 강조합니다."
