 korea.39.d: ""
 korea.39.a: ""
 korea.40.t: "反乱軍の蜂起"
 korea.40.d: "南が我々の呼びかけに応えて蜂起した。我々は彼らを支援し、土地を取り戻さねばならない。"
 korea.40.a: "戦争だ！"
