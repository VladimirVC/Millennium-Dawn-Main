 NKO_rus_friend_category: "Alliance russo-nord-coréenne"
 NKO_rus_friend_category_desc: "L'histoire des relations entre [NKO.GetFlag]§YCorée§! et [SOV.GetFlag]§YRussie§! remonte à plusieurs décennies, depuis les premières relations avec §Yl'Empire russe§! jusqu'à l'assistance de §Rl'Union soviétique§! pendant la §Rguerre§! avec [KOR.GetFlag]§YCorée du Sud§!. Il est maintenant temps de §Gréveiller§! les anciennes relations entre les pays et de les élever à un nouveau niveau pour ne pas répéter les erreurs du passé."
