 CHI_nuke_general: "Nuclear General"
 CHI_nuke_general_desc: "General Tsing Shi Tao is the PLA's leading authority on nuclear and radiological warfare. He advocates integrating tactical nuclear capabilities directly into conventional operations, a doctrine that has earned him both respect and controversy within the General Staff."
 CHI_special_weapons_general: "Special Weapons General"
 CHI_special_weapons_general_desc: "General Leang is one of the PLA's most versatile senior commanders, combining expertise in advanced weapons systems with conventional artillery doctrine. Regarded as a prodigy within the General Staff, she is known for her ability to integrate cutting-edge technology into combined-arms operations."
 CHI_tank_general: "Tank General"
 CHI_tank_general_desc: "General Kwai is among the PLA's foremost armored warfare commanders, known for his aggressive use of heavy tank formations and his belief that overwhelming firepower decides battles before the enemy can respond."
