 indonesia.5865.t: "灾难来临！"
 indonesia.5865.d: "在印度尼西亚，将会发生很多很多的灾难。为了确保印度尼西亚的稳定，请务必检查“决议”选项卡并完成“印度尼西亚的可怕运气”下给定的任务。你的第一个任务是在加里曼丹建造一个造船厂以防止工业灾难，祝你好运！"
 indonesia.5865.a: "好"
 indonesia.76854.t: "印度尼西亚发出合并请求"
 indonesia.76854.d: "在帮助我们应对地震后，印度尼西亚政府要求我们与他们合作。如果我们真的加入他们，我们将失去我们为之奋斗的一切，但一切都是以和平的名义。如果不加入他们，我们将看到冲突再次点燃......"
 indonesia.76854.a: "好吧"
 indonesia.76854.b: "不"
 IND_disasters_mechanic_532121: "灾难临头"
 indonesia.577.d1: "一场灾难性的海啸袭击了班达亚齐及该省其他地区。多年来游击战和抵抗运动已使这片地区满目疮痍，如今更是雪上加霜。我们必须立即着手该地区的重建工作，否则将面临再次爆发叛乱的风险。"
 IND_Aceh_insurgency_desc: "自1976年以来，亚齐一直处于混乱和叛乱状态，这导致我国局势不稳定，并造成不必要的流血冲突。我们的军队过于专注于应对这些叛乱分子，导致我们在军事上落后于其他国家。"
 IND_Aceh_insurgency2_desc: "自1976年以来，亚齐一直处于混乱和叛乱状态，这导致我国局势不稳定，并造成不必要的流血冲突。我们的军队过于专注于应对这些叛乱分子，导致我们在军事上落后于其他国家。"
 IND_Aceh_insurgency3_desc: "自1976年以来，亚齐一直处于混乱和叛乱状态，这导致我国局势不稳定，并造成不必要的流血冲突。我们的军队过于专注于应对这些叛乱分子，导致我们在军事上落后于其他国家。"
 IND_Aceh_insurgency4_desc: "自1976年以来，亚齐一直处于混乱和叛乱状态，这导致我国局势不稳定，并造成不必要的流血冲突。我们的军队过于专注于应对这些叛乱分子，导致我们在军事上落后于其他国家。"
 IND_finished_disaster: "灾难早期预防"
 IND_finished_disaster_desc: "哇，你上次及早阻止了灾难！干得好。"
 IND_purchase_rafale_jets: "阵风战机"
 IND_purchase_rafale_jets_desc: "我们的西方朋友向我们提供了他们最新、最先进的多用途喷气式飞机，但这并非没有代价。我们应该考虑这一点，因为这可以让我们与他们建立更紧密的联系，并获得西方的飞机。"
 IND_cede_riau: "割让廖内群岛"
 IND_cede_riau_desc: "割让廖内群岛可以解决我们很多问题。为了一个小岛而战不值得。"
 IND_our_policies_tt: "我们必须完成§Y$IND_new_capital$§!与§Y$IND_new_silkroad$§!任一国策"
 IND_grasberg_mine_exploitation: "格拉斯伯格矿山开采"
 IND_grasberg_mine_exploitation_desc: "西巴布亚的格拉斯伯格矿是世界上最大的金铜矿之一。我们应该扩大和开发该地区的储量，以便更好地将印度尼西亚带入贵金属市场。"
 IND_separate_school: "男女分开就学"
 IND_separate_school_desc: "学生们在课堂上互相注视会分散注意力。我们必须为男生和女生分别建造新的、独立的学校。"
 IND_dont_separate_school: "男女同校"
 IND_dont_separate_school_desc: "尽管保守派呼吁建立独立学校，但屈服于他们的要求是愚蠢的。如果我们要建造新学校，就会增加债务，并会延迟我们学生的教育！"
 IND_dem_entrepreneur: "创业基金"
 IND_dem_entrepreneur_desc: "在日益数字化的世界里，资助创业非常重要，这样我们的人民才能使印度尼西亚与世界其他国家同步。"
 IND_equal_opportunities: "平等机会"
 IND_equal_opportunities_desc: "平等机会并非人人都能享有，尤其是在印度尼西亚。然而，我们可以通过向人们分配土地来改变这种现状。"
 IND_reparations_give: "给予赔偿"
 IND_reparations_give_desc: "让我们给志愿者的家属一些经济补偿，以此表达歉意，同时也能提升我们国家的形象。"
 IND_demand_reparations: "要求赔偿"
 IND_demand_reparations_desc: "我们的人民需要立即获得经济赔偿。如果我们得不到赔偿，我们将强行索取……"
 IND_crackdown_counterfeit: "严厉打击假冒产品"
 IND_crackdown_counterfeit_desc: "假冒产品在我国泛滥成灾，这对我国经济极为不利。因此，我们必须开始严厉打击此类行为，并逐步推进经济复苏。"
 IND_counterfeit: "假冒伪劣行为"
 IND_counterfeit_desc: "少量假冒伪劣产品不会对我们国家造成太大影响。只要民众不抗议，生活安宁，我们的钱包也就安稳了。"
 IND_batam_sez: "巴淡岛经济特区"
 IND_batam_sez_desc: "巴淡岛地处新加坡和印尼群岛的战略要冲。通过将其指定为经济特区，提供税收优惠和简化监管，我们可以吸引电子产品制造商，并打造高科技产业集群。"
 IND_nickel_processing: "镍下游产业计划"
 IND_nickel_processing_desc: "印尼拥有全球最大的镍矿储量，但我们却将大部分镍矿以原矿形式出口。下游产业化政策将强制要求在国内进行加工，从而在电池材料和不锈钢等领域创造高附加值产业。"
 IND_semiconductor_fab: "半导体制造"
 IND_semiconductor_fab_desc: "随着巴淡岛电子产业的蓬勃发展以及镍在先进材料领域的加工应用，我们已做好建立首个半导体制造厂的准备。这是实现技术自给自足的关键一步。"
 IND_pt_pindad_modernize: "品达德现代化"
 IND_pt_pindad_modernize_desc: "我们的国有国防制造商品达德几十年来一直为印尼国民军生产小型武器和装甲车辆。整合国产半导体元件将减少我们对外国武器进口的依赖。"
 IND_pt_di_aerospace: "印尼航太"
 IND_pt_di_aerospace_desc: "印尼航太公司是我国的国有航空航天企业，拥有数十年的飞机组装经验。投资先进复合材料和国产航空电子设备将使公司重焕生机。"
 IND_korean_chip_partnership: "韩国半导体合作伙伴"
 IND_korean_chip_partnership_desc: "韩国是全球半导体制造领域的领导者。与韩国企业建立合作关系可以提升我们的芯片生产能力，并使我们能够获得最先进的制造技术。"
 IND_taiwan_chip_partnership: "台积电合作协议"
 IND_taiwan_chip_partnership_desc: "台积电是全球最大的芯片代工厂。与台积电建立合作关系，将为我们新兴的半导体产业带来无与伦比的专业技术，并惠及两国。"
 IND_defense_industrial_base: "国防工业综合体"
 IND_defense_industrial_base_desc: "我们的产业战略最终目标是：将镍加工、半导体制造和现代化国有企业结合起来，构建一个自给自足的综合性国防工业基地。"
 indonesia.17.t: "印尼提议建立半导体合作伙伴关系"
 indonesia.17.d: "印尼官员已与我们接洽，提出一项关于半导体制造联合合作的提议。他们希望利用我们在芯片制造方面的专业技术来发展本国产业，并愿意为此进行大量投资。"
 indonesia.17.a: "这或许对双方都有利。"
 indonesia.17.b: "我们目前对此不感兴趣。"
 indonesia.170.t: "韩国接受合作！"
 indonesia.170.d: "韩国政府已同意我们的半导体合作提案。韩国企业将与我们在巴淡岛的工厂共享制造技术，两国都将从更紧密的经济联系中受益。"
 indonesia.170.a: "一项很有前景的安排。"
 indonesia.1700.t: "韩国拒绝合作"
 indonesia.1700.d: "韩国政府拒绝了我们提出的半导体合作方案。这对我们进军芯片制造领域的雄心壮志来说是一次挫折。"
 indonesia.1700.a: "我们会找到其他办法。"
 indonesia.18.t: "印尼提议与台积电合作"
 indonesia.18.d: "印尼方面已向我们提出一项提议，希望台积电在其位于巴淡岛的新半导体工厂开展合作生产。该协议将扩大台积电在东南亚的生产规模，同时也将促进印尼芯片产业的发展。"
 indonesia.18.a: "台积电将从此次扩张中受益。"
 indonesia.18.b: "我们必须拒绝这项提议。"
 indonesia.180.t: "台湾接受台积电合作！"
 indonesia.180.d: "台湾当局已同意我们与台积电的合作提议。这家全球领先的芯片代工厂将与我们在巴淡岛的半导体工厂合作，将尖端技术带到印度尼西亚。"
 indonesia.180.a: "一项具有里程碑意义的协议！"
 indonesia.1800.t: "台湾拒绝合作"
 indonesia.1800.d: "台湾当局拒绝了我们与台积电合作的提议。缺少他们的专业技术，我们在半导体领域的雄心壮志将更难实现。"
 indonesia.1800.a: "令人失望的结果"
 IND_maluku_back_christians: "支持基督教徒！"
 IND_maluku_back_christians_desc: "我们必须支持那些被忽视的基督徒群体。在如今这个艰难的时期，这是我们至少能为他们做的。"
 IND_national_awakening: "国家觉醒党议程"
 IND_national_awakening_desc: "印尼保守政党民族觉醒党再次活跃于政坛。他们这次会如何行事，谁也无法预料。"
 IND_parliament_stormed: "议会暴乱！"
 IND_parliament_stormed_desc: "议会遭到冲击，多名重要官员被俘。他们要求这些官员辞职才能获得自由。"
 IND_purify_philippines: "净化菲律宾"
 IND_purify_philippines_desc: "让我们向北进军，进入菲律宾。虽然他们现在不是伊斯兰国家，但这并不意味着他们不能成为伊斯兰国家！"
 indonesia.15.t: "印尼提出万隆会议十项原则"
 indonesia.15.d: "印尼外交官已向我们提出一项基于历史性的万隆会议原则的提议。他们请求我们同意缔结互不侵犯、互不干涉内政的条约。这将极大地加强中印关系。"
 indonesia.15.a: "我们同意这些原则。"
 indonesia.15.b: "我们对这样的协议不感兴趣。"
 indonesia.150.t: "中国接受万隆原则！"
 indonesia.150.d: "中国政府已同意万隆十项原则。双方签署了互不侵犯条约，并承诺尊重彼此的主权和内政。"
 indonesia.150.a: "这是亚洲团结的历史性时刻。"
 indonesia.1500.t: "中国拒绝接受万隆原则"
 indonesia.1500.d: "中国政府拒绝了我们基于万隆原则提出的互不侵犯条约建议。这是一次外交挫折，可能会使我们与北京的关系趋于紧张。"
 indonesia.1500.a: "令人失望的结果"
 indonesia.16.t: "印尼寻求举行外交会晤"
 indonesia.16.d: "印尼政府已请求两国部长举行正式会晤，以消除剩余分歧并建立互不侵犯条约。鉴于我们近期的历史，这可能是朝着该地区持久和平迈出的重要一步。"
 indonesia.16.a: "我们欢迎这一外交努力。"
 indonesia.16.b: "我们目前对此不感兴趣。"
 indonesia.160.t: "澳大利亚同意会晤！"
 indonesia.160.d: "澳大利亚政府已接受我方邀请，举行正式外交会晤。双方已签署互不侵犯条约，并期待开启合作新时代。"
 indonesia.160.a: "真是好消息！"
 indonesia.1600.t: "澳大利亚拒绝会晤"
 indonesia.1600.d: "澳大利亚政府拒绝了我们提出的举行正式外交会晤的请求。这对我们努力实现与堪培拉关系正常化是一个挫折。"
 indonesia.1600.a: "我们会记住此事。"