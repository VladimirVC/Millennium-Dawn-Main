 investments_event.1.t: "来自[FROM.GetNameWithFlag]的投资提议"
 investments_event.1.d: "[FROM.GetName]提议在[?pending_offer_state.GetName]建造[?pending_offer_amount]座[investments_get_pending_offer_construction_type]。\n\n项目总成本估计为[?pending_offer_total_cost]亿美元。预计需要[?pending_offer_duration]天完成该项目。[FROM.GetName]向我们提出，要求我们承担建设费用的10%。[FROM.GetNameWithFlag]可能从这项工程中获得影响力。而[FROM.GetNameWithFlag]将从该项目中获利。\n\n\n完成天数：[?pending_offer_duration]\n项目总成本（[FROM.GetNameWithFlag]）：[?pending_offer_total_cost]亿美元\n建筑类型：[investments_get_pending_offer_construction_type]\n投资方成本（[THIS.GetNameWithFlag]）：[?investor_cost]\n位置：[?pending_offer_state.GetName]"
 investments_event.1.o1: "接受提议"
 investments_event.1.o2: "拒绝提议"
 investments_event.2.t: "拒绝给予建设许可"
 investments_event.2.d: "我们收到了潜在新投资伙伴的拒绝。难以置信他们竟会拒绝我们的项目！我们帮助他们发展国家，又不是为了获取对他们政府的影响力或控制权！唉，与[FROM.GetName]在[?ROOT.investments_state_target.GetName]的投资协议已经告吹，所以我们还是另找他人发出投资协议吧。"
 investments_event.2.o1: "也许他们的邻居会同意……"
 investments_event.3.t: "建造计划取消"
 investments_event.3.d: "遗憾的是，我们未能与[FROM.GetName]的朋友完成投资协议。原因可能有很多，无论是与政府的关系、资金不足，还是当地民众普遍缺乏兴趣。我们总可以另择时机再尝试。"
 investments_event.3.o1: "这是他们的损失！"
 investments_build_cost_tt: "§Y外国投资成本§!\n\n§Y外国投资成本§! §g是我们考虑启动的项目的前期费用。这笔费用直接从我方国库中扣除，并在项目获批后计入我方§!§Y国际投资§! §g中。§!\n\n§g如果您刚从其他国家或地区点击过来，请确保调整建筑数量或点击其他建筑以更新提示信息，查看真实成本。§!\n\n§g腐败、国家精神等因素都可能影响投资项目的成本。被投资国的腐败程度将根据其腐败等级提高项目成本。§!\n"
