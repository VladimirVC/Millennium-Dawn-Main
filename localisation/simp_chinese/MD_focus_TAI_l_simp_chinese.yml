l_simp_chinese:
 TAI_legacy_of_1949: "1949年的遗留"
 TAI_legacy_of_1949_desc: "1949年中国内战结束后，国民党及其支持者逃到台湾省。这一事件的遗留影响，再加上台湾本地的本土主义运动，导致大多数台湾民众强烈反对与大陆统一。"
 TAI_the_great_chip_empire: "伟大的芯片帝国"
 TAI_the_great_chip_empire_desc: "台湾在半导体和微芯片生产初期就抓住机遇，凭借其相对于其他国家更具吸引力的投资环境，迅速跻身行业前沿。尽管生产成本低廉、效率高，且对西方国家出口量巨大，台湾仍将自身经济与国家安全平衡在向西方世界供应微芯片这一角色上，并通过持续不断的创新保持着行业领先地位。"
 TAI_flight_crew_strike: "桃园空乘工会罢工"
 TAI_flight_crew_strike_desc: "没结果！不会停！"