 ALG_replace_prime_minister_desc: "任命一位新总理来协调政府工作，维护政治稳定。\n\n现任总理：[GetPMName]"
 ALG_replace_defense_minister: "更换国防部长"
 ALG_replace_defense_minister_desc: "更换国防部长。这是一个高度敏感的职位，任何变动都可能引起军方的不安。\n\n现任部长：[GetMODName]"
 ALG_replace_interior_minister: "更换内政部长"
 ALG_replace_interior_minister_desc: "内政部负责维持国内秩序与行省管理。\n\n现任部长：[GetMOIName]"
 ALG_replace_foreign_minister: "更换外交部长"
 ALG_replace_foreign_minister_desc: "任命一位新的外交部长来制定阿尔及利亚的外交路线。\n\n现任部长：[GetMOFAName]"
 ALG_replace_finance_minister: "更换财政部长"
 ALG_replace_finance_minister_desc: "任命一位新的财政部长来指导国家预算和经济政策。\n\n现任部长：[GetMOFName]"
 ALG_replace_energy_minister: "更换能源部长"
 ALG_replace_energy_minister_desc: "能源部是主管阿尔及利亚石化产业经济的核心部门。\n\n现任部长：[GetMOEName]"
 ALG_replace_justice_minister: "更换司法部长"
 ALG_replace_justice_minister_desc: "任命一位新的司法部长，以塑造司法体系并处理政治检控事务。\n\n现任部长：[GetMOJName]"
 ALG_replace_intelligence_chief: "更换情报主管"
