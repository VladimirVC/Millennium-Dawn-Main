 ALG_mediterranean_games_preparation: "Preparing for the Mediterranean Games"
 ALG_mediterranean_games_preparation_desc: "Oran is being transformed for the 2022 Mediterranean Games. Construction crews work around the clock on the Olympic Complex, new stadiums, and the athletes' village. The nation rallies behind this historic event as Algeria prepares to welcome 26 nations to its shores."
 ALG_more_infra: "Expand Infrastructure"
 ALG_more_infra_desc: "Algeria's infrastructure requires significant expansion to support economic growth. New roads, railways, and utilities will connect communities and facilitate trade across the nation."
 TT_ALG_SECULAR_DISCONTENT_MODIFIER: "§RSecularists grow discontent§!\nProgressive and secular Algerians oppose religious policies."
 TT_ALG_ISLAMIST_SATISFACTION_MODIFIER: "§GIslamist support increases§!\nReligious conservatives approve of these measures."
 ALG_more_relation_better: "§HThey are§! §Gmore likely to join§! §Hif we have§! §Gbetter relations!§!"
 algerian_military_dismantling: "Military Dismantling"
 algerian_military_dismantling_desc: "Algeria's military is being systematically dismantled. Equipment is decommissioned, units disbanded, and officers retired. The once-powerful Algerian National People's Army is a shadow of its former self."
 algerian_student_exchanges: "Student Exchange Programs"
 algerian_student_exchanges_desc: "Algerian students study abroad at foreign universities while international students come to Algeria. These exchanges build connections, transfer knowledge, and train the next generation of Algerian professionals."
