l_french:
 indonesia_focus: "Priorités nationales indonésiennes"
 IND_indonesias_future: "L'avenir de l'Indonésie"
 IND_indonesias_future_desc: "Alors que notre nation entre dans le 21ème siècle avec tous ses problèmes, nous devons trouver des moyens de les résoudre et d’apporter à notre nation l’amour qu’elle mérite !"
 IND_asia_financial_crisis: "Affrontons la crise !"
 IND_asia_financial_crisis_desc: "The Financial Crisis has hit South East Asia hard since 1997, and our nation has not been spared its crippling effects. We are now going to proceed with devising a plan on solving this problem."
 IND_japanese_aid: "Appel à l'aide japonaise"
 IND_japanese_aid_desc: "Despite our differences in the second world war, Japan has been fairly kind to us in our economic troubles. We should contact them and their western allies to help us out of this situation."
 IND_japanese_aid_jica: "La JICA"
 IND_japanese_aid_jica_desc: "The JICA, also known as Japan International Cooperation Agency, can be a very useful organization in helping develop our nation's infrastructure and roads."
 IND_japanese_aid_metro_invest: "Investissements dans le métro japonais"
 IND_japanese_aid_metro_invest_desc: "Our people need to get around the nation quickly, and with Japanese metro technology and investments we can achieve this goal of ours."
 IND_japanese_aid_java_airport: "Aéroports de Java occidental"
 IND_japanese_aid_java_airport_desc: "We require more airports for our nation's growing number of aviators, and tourists. West Java is the best place to build these as it is home to our nation's capital."
 IND_japanese_aid_ev: "Véhicules électriques japonais"
 IND_japanese_aid_ev_desc: "Le Japon est un leader dans le domaine des véhicules électriques et, comme de nombreuses voitures de qualité sont fabriquées au Japon, il est préférable que nous commencions le processus de conversion de notre population aux voitures électriques pour réduire la pollution."
 IND_japanese_aid_mitsubishi: "Usines Mitsubishi"
 IND_japanese_aid_mitsubishi_desc: "Mitsubishi is a successful vehicle manufacturer based out of Japan. If we can get their offices here in Indonesia, we can possibly learn a thing or two from them when it comes to automobiles."
 IND_japanese_aid_expander_bagero: "L'Expander et Bagero !"
 IND_japanese_aid_expander_bagero_desc: "A true feat of ingenuity, and craftsmanship the Expander and Bagero are true marvels of the Electric Vehicle industry, now available to Indonesians."
 IND_japanese_aid_inf_finance: "Accords IIF avec le Japon"
 IND_japanese_aid_inf_finance_desc: "The IIF, also known as the Indonesia Infrastructure Finance is a private company, however it is best we make deals with Japan to cut costs rather than corners when it comes to building our nation's infrastructure."
 IND_japanese_aid_men_for_finance: "Main d'oeuvre japonaise pour l'IIF"
 IND_japanese_aid_men_for_finance_desc: "If we can get manpower for the IIF from Japan, we can grow closer in relations and deploy their expertise in improving our infrastructure."
 IND_japanese_aid_rubber: "Champs de caoutchouc à Sumatra"
 IND_japanese_aid_rubber_desc: "With the help of the Japanese, we can more efficiently produce Rubber for the world market and potentially even become the leading producer of rubber in South East Asia."
 IND_new_capital_desc: "Jakarta is becoming an outdated city, falling behind the rest of the world's capitals. We should begin plans for a brand new city with all the expertise and knowledge we have gotten from the Japanese."
 IND_chinese_aid: "Appelez la Chine !"
 IND_chinese_aid_desc: "The Japanese plundered our nation, and enslaved our people in the second world war. We cannot forget this and the nationalist in our nation are pushing for closer ties with China and the Eastern World. We can even possibly get them to invest in building factories and infrastructure in Indonesia."
 IND_chin_aid_gas_plants: "Centrales à gaz chinoises"
 IND_chin_aid_gas_plants_desc: "The Oil Fields on North Sumatra sit untapped with much wasted potential, with Chinese Gas Plants we can put them to good use and become a greater producer of Oil in South East Asia."
 IND_chin_aid_coal: "Usines de charbon de Java occidental"
 IND_chin_aid_coal_desc: "We sit on a vast reserve of coal, and it is a shame that we do not have the industrial capacity to convert them to energy efficiently. However, China has offered us an irresistible deal to build new factories that would speed up the process in extracting and converting coal."
 IND_chin_aid_coal_surplus: "Exploitons notre surplus de charbon"
 IND_chin_aid_coal_surplus_desc: "Now that we have factories for our coal supply, we should build refineries to convert them to energy for our nation to use."
 IND_chin_aid_ev: "Aides chinoises pour les véhicules électriques"
 IND_chin_aid_ev_desc: "The Chinese know what's best when it comes to mass producing vehicles, and with their expertise in Electric Vehicles we can help fight the pollution in our nation."
 IND_chin_aid_catl: "Accords avec le CATL"
 IND_chin_aid_catl_desc: "We should make agreements between our nation and the CATL company to have them produce batteries for the ever growing demand."
 IND_chin_aid_pollution: "Loi sur la réduction de la pollution"
 IND_chin_aid_pollution_desc: "We will pass the Pollution Reduction Act to fight pollution in much of our cities. With Chinese investments this has been made a possibility rather than a dream."
 IND_chin_aid_inf: "Investissements chinois dans les infrastructures"
 IND_chin_aid_inf_desc: "With Chinese infrastructure getting better and better day by day, it is no question that our nation should receive similar treatment. We are to request Chinese investments in building infrastructure for Indonesia."
 IND_chin_aid_high_railway: "Ligne ferroviaire à grande vitesse Jakarta-Bandung"
 IND_chin_aid_high_railway_desc: "If we are to be an efficient, industrialized nation we must first connect our cities. China has offered to build a high speed railway connecting Jakarta to Bandung."
 IND_chin_aid_tollway: "L'autoroute à péage Balikpapan - Samarinda"
 IND_chin_aid_tollway_desc: "The Balikpapan - Samarinda Toll way will let residents of East Kalimantan to travel with much needed ease. Using Chinese infrastructure tactics we can create this tollway for our nation."
 IND_new_silkroad: "La route de la soie du 21e siècle !"
 IND_new_silkroad_desc: "Help from our Chinese partners has boosted our nation into the international spotlight once again. We are now an industrialized nation and have the industrial capacity to carry forward with the 21st Century!"
 IND_our_policies: "Investissez dans nos politiques"
 IND_our_policies_desc: "Our policies need revisions. We must sift through our policies to meet our nation's demands for the 21st Century."
 IND_undertable_deals: "Des accords sous la table"
 IND_undertable_deals_desc: "Nous pouvons conclure secrètement des accords avec des politiciens, des nations et des organisations pour obtenir un petit revenu supplémentaire, mais cela se fait au prix de la corruption dans notre État..."
 IND_bribe_media: "Bribe the Media"
 IND_bribe_media_desc: "Our party could use some much needed support, and if we give a little something to the media, maybe we can get that much needed support."
 IND_save_corrupt_official: "Dissimuler les fonctionnaires corrompus"
 IND_save_corrupt_official_desc: "The KPK is a nuisance to a lot of our officials. We need to swiftly cover up their acts and prevent them from being prosecuted."
 IND_shun_corruption: "Éviter la corruption"
 IND_shun_corruption_desc: "We must crack down on corruption in our nation! If we are to become a successful state we must first prosecute those who wish to fill their pockets with our peoples hard earned money."
 IND_kpk: "Fonds pour le KPK"
 IND_kpk_desc: "The KPK, also known as the Corruption Eradication Commission has been doing a great job in fighting state corruption. However, with a little bit of funds it can help them in speeding up the process."
 IND_trial_corrupt_official: "Poursuivre les fonctionnaires corrompus"
 IND_trial_corrupt_official_desc: "Working hand in hand with the KPK, we have been able to find some corrupt officials and we are preparing trials for them."
 IND_more_jobs: "Créer plus d'emplois"
 IND_more_jobs_desc: "Our people need money to feed their families. And with a lack of jobs in the state, it is our job to create new facilities for people to earn their money. We can build new factories to boost our economy, and our people out of poverty."
 IND_rural_fortification: "Fortification rurale"
 IND_rural_fortification_desc: "Our rural population could use some much needed protection from local insurgents. While we try to handle the insurgents, we could set up some temporary fortifications to protect our people."
 IND_fund_industries: "Fonds pour les industries nationales"
 IND_fund_industries_desc: "Indonesia is home to many industries, and with help from our friends in the North we are able to boost our capabilities. However, we cannot let our domestic industries fall behind that of the foreign ones."
 IND_education_question: "Consultez le Pendidikan Kementérien"
 IND_education_question_desc: "We must revise our education policies to cater our growing youth. We can either go with an Islamic focused education, or we can secularize the Schools. Some in our party even call for a combination of both to please all sides."
 IND_religious_system: "Un système religieux"
 IND_religious_system_desc: "Les écoles fonctionnent depuis un certain temps déjà sous la tutelle du ministère des Affaires religieuses, et ce serait une très mauvaise idée de les décharger de cette tâche maintenant."
 IND_quran_class: "Continuer le cours de Coran"
 IND_quran_class_desc: "Our nation is an Islamic Nation, and our people must not forget that! We must spread the teachings of the Quran to our youth, and have it be a mandatory subject."
 IND_no_religious_system: "Un système laïc"
 IND_no_religious_system_desc: "We must relieve the Ministry of Religious affairs from managing our schools. In order to modernize, we must establish its own ministry to better teach our students modern ideals."
 IND_no_quran_class: "Annuler le cours de Coran"
 IND_no_quran_class_desc: "Quran Class is a burden on our students. Despite our muslim majority population, we must keep religion out of schools to focus on important subjects."
 IND_mandatory_education: "Enseignement obligatoire"
 IND_mandatory_education_desc: "We must enforce all of our youth to go to school. If our population is illiterate we would be stuck in the stone ages."
 IND_satisfied_nation: "Une nation satisfaite ?"
 IND_satisfied_nation_desc: "Our hard work will hopefully not go unnoticed by our people. Despite much of our problems still lingering, we cannot forget our accomplishments."
 IND_fix_rupiah: "Réparez la roupie !"
 IND_fix_rupiah_desc: "Our currency the Rupiah has been in disarray for some time now, and with its value dropping our stability is also following suit."
 IND_cooperate_local_gov: "Coopérer avec les gouvernements locaux"
 IND_cooperate_local_gov_desc: "Indonesia is a diverse nation, with many different peoples, with many local governments. We must cooperate with these local governments to collect taxes more efficiently for the state."
 IND_lower_interest_rates: "Des taux d’intérêt plus bas"
 IND_lower_interest_rates_desc: "Our interest rates are soaring up to horrifying levels, and we must begin reducing the rate to keep our people happy."
 IND_farmers_in_industry: "Relocaliser les agriculteurs vers le secteur industriel"
 IND_farmers_in_industry_desc: "Nous avons suffisamment d’agriculteurs dans le secteur rural, nous devons faire sortir certains d’entre eux de leurs fermes et les envoyer dans les usines pour aider notre économie !"
 IND_begin_projects_desc: "To help circulate the Rupiah, we should consider funding new projects so that our people can spend time and money."
 IND_fight_rising_prices: "Lutte contre la hausse des prix"
 IND_fight_rising_prices_desc: "Notre parti perd rapidement en popularité à cause de l'insuffisance de la lutte contre la hausse des prix. Il est temps de changer cela !"
 IND_keep_high_prices: "Maintenir des prix élevés"
 IND_keep_high_prices_desc: "Peut-être pouvons-nous tirer profit de ces prix élevés... Quelle nation se soucie vraiment de son peuple après tout ?"
 IND_proficient_supply: "Gestion efficace des approvisionnements"
 IND_proficient_supply_desc: "We should begin revising our supply chain management to keep the economy healthy. If we don't, then there's the lingering threat of economic collapse."
 IND_connect_docks: "Connecter les chaînes d'approvisionnement"
 IND_connect_docks_desc: "Connecting the Supply Chain will aid us in our effort to manage our supply much more efficiently. And it will also let us become more connected with the international markets."
 IND_a_resilient_currency: "Une économie résiliente !"
 IND_a_resilient_currency_desc: "Avec du sang, de la sueur et des larmes, notre grande monnaie, la roupie, prévaut !"
 IND_maluku_back_muslims: "Soutenez les musulmans !"
 IND_maluku_back_muslims_desc: "Indonesia is a Muslim State. We therefore, cannot betray our Muslim population and we must put our full support behind them."
 IND_back_muslims_arm_ulama: "Armez les oulémas"
 IND_back_muslims_arm_ulama_desc: "Let us arm the Ulama! The Ulama need our help in mobilizing our Muslims in case of a holy conflict."
 IND_back_muslims_medical_fee: "Réduire les frais médicaux"
 IND_back_muslims_medical_fee_desc: "To help any muslim wounded in a religious conflict, we must reduce costs in our hospitals to get them back into society."
 IND_back_muslims_workers: "Utiliser des travailleurs musulmans"
 IND_back_muslims_workers_desc: "We must not forget the Muslim labourers and their efforts. We therefore have an obligation to utilize them and deploy them in strategic sectors to boost national growth."
 IND_back_muslims_factories: "Fonds de sécurité pour les industries islamiques"
 IND_back_muslims_factories_desc: "Should any Islamic owned Industry find itself in economic trouble, we will invest in building new, emergency factories to help in times of trouble."
 IND_back_muslims_send_guns: "Envoyez-leur des fusils"
 IND_back_muslims_send_guns_desc: "Arming our Muslim people can help keep our cities safe, and our mosques protected from any hate attacks."
 IND_back_muslims_infantry: "Créer une infanterie exclusivement musulmane"
 IND_back_muslims_infantry_desc: "We must create Muslim-Only Infantry in order to prevent any sort of internal conflicts within our army."
 IND_call_saudis: "Contacter les Saoudiens"
 IND_call_saudis_desc: "We should contact the Saudis to see if they are willing to back our Muslims with their funds. They are already funding our mosques, so we don't see why they shouldn't help."
 IND_ambon_for_muslims: "Ambon pour les musulmans"
 IND_ambon_for_muslims_desc: "Ambon is a hot spot for sectarian conflict. However, with thanks to our efforts it is said that the Ambon city conflict concluded in an decisive muslim victory."
 IND_maluku_just_fix_it: "Ne favorise personne"
 IND_maluku_just_fix_it_desc: "We must not pick favorites in these conflicts. Let us find a solution that is not biased."
 IND_maluku_call_army: "Appel à l'armée"
 IND_maluku_call_army_desc: "Our armed forces are standing idly by, doing nothing about our sectarian conflicts. It is time that we deploy them to de-escalate conflicts."
 IND_maluku_militarize_villages: "Militariser les villages"
 IND_maluku_militarize_villages_desc: "Some small villages are caught in the midst of these sectarian conflicts, and have no protection against looters. We need to quickly fortify and militarize these villages to keep them safe."
 IND_maluku_increase_policing: "Renforcer les services de police"
 IND_maluku_increase_policing_desc: "It is no question that we must increase our policing to help fight against the growing number of conflicts. By doing this, it will restore the much needed order."
 IND_maluku_civilian_shelter: "Des usines pour les ouvriers"
 IND_maluku_civilian_shelter_desc: "We must build factories for our affected workers, as many of their factories have been burnt down based on their religious stance."
 IND_maluku_military_shelter: "Des usines pour les forces armées"
 IND_maluku_military_shelter_desc: "We must build new military factories for our growing armed presence in cities due to the sectarian conflicts."
 IND_maluku_mobilize_priests: "Mobiliser les prêtres"
 IND_maluku_mobilize_priests_desc: "Rallying the Priests will help awaken the wrath of our Christian Population. This will help them in the case of many sectarian conflicts."
 IND_maluku_mechanize_them: "Chrétiens mécanisés"
 IND_maluku_mechanize_them_desc: "With the efforts of the priests, we are able to deploy Mechanized Christian divisions to protect the Churches."
 IND_maluku_christian_volunteers: "Utilisez des bénévoles chrétiens"
 IND_maluku_christian_volunteers_desc: "Many Christians are self sacrificing their time to volunteer in projects for the nation. We are more than glad to accept such efforts."
 IND_maluku_christian_businesses: "Fonds de sécurité pour les entreprises chrétiennes"
 IND_maluku_christian_businesses_desc: "Should any Christian Institution fail, we are able to give them a lending help in getting back on their feet."
 IND_maluku_train_medics: "Former des médecins"
 IND_maluku_train_medics_desc: "We must train more medics to aid the wounded, and people caught in the crossfire of the sectarian conflict."
 IND_maluku_give_trucks: "Envoyez-leur des camions !"
 IND_maluku_give_trucks_desc: "By giving the Christians more trucks they can efficiently get place to place without a hiccup in the way."
 IND_maluku_contact_dutch: "Contactez les Néerlandais"
 IND_maluku_contact_dutch_desc: "Étant donné que beaucoup de nos chrétiens font remonter leur ascendance aux Hollandais, on peut dire sans se tromper que si nous demandons aux Hollandais de nous aider à aider ces gens, ils accepteront volontiers... N'est-ce pas ?"
 IND_maluku_ambon_for_christians: "Ambon, ville pour les chrétiens !"
 IND_maluku_ambon_for_christians_desc: "It is being said that Ambon city has fallen to Christians. With great thanks to our efforts, the Christians have begun their dominance over the city which has been in the crossfire of religious conflicts."
 IND_transfer_to_army: "Transférer la situation à l'armée"
 IND_transfer_to_army_desc: "It appears that our solution did not workout in ending the conflict, so therefore more military intervention is needed and full control of the operation is being transferred to the TNI-AD."
 IND_maluku_equip_police: "Militariser la police"
 IND_maluku_equip_police_desc: "By Militarizing our police force, we can relieve the army of its efforts in containing sectarian conflicts, and we can finally relocate them to other insurgencies."
 IND_maluku_crush_gangs: "Écraser les gangs"
 IND_maluku_crush_gangs_desc: "En éliminant les derniers gangs de nos villes, nous pourrons enfin reprendre notre souffle. Leurs pillages, leurs meurtres et leurs destructions n'apportent rien d'autre que de l'instabilité à notre nation !"
 IND_maluku_all_quiet_for_now: "Tout est calme pour l'instant."
 IND_maluku_all_quiet_for_now_desc: "It appears that due to our harsher efforts, the peace has been restored in many cities. Hopefully this lasts."
 IND_komnas_ham_desc: "Holding the KOMNAS-HAM Conference has let us provide a better platform for human rights activists and our people's social needs."
 IND_indonesian_armed_forces: "Les forces armées d'Indonésie"
 IND_indonesian_armed_forces_desc: "The Armed forces of Indonesia is one of Asia's military mights. From our ground forces, to our pilots the nations men and women stand ready to defend the nation from any and all threats."
 IND_tni_ad: "TNI-AD"
 IND_tni_ad_desc: "The TNI-AD is our main branch of ground forces, and has been for over 60 years. Today we are tasked to go forward with new methods of training these men and women as we enter the 21st century."
 IND_chinese_model_inf: "Un modèle d'infanterie chinoise"
 IND_chinese_model_inf_desc: "It is evident that the Chinese are going to become a global power, and therefore we should not fall behind them. If we can get their assistance on weaponry and tactics we can possibly emerge alongside them."
 IND_homegrown_inf: "Infanterie locale"
 IND_homegrown_inf_desc: "If we are to be an independent, sovereign nation then we must first employ the use of our tactics. If our men are fighting the same as the Chinese, how are we to be different?"
 IND_jungle_expertise: "Expertise de la jungle"
 IND_jungle_expertise_desc: "Without a doubt, we should train our soldiers to fight in the damp and lush settings of South East Asia. If we do not, then we may fall behind our neighbors."
 IND_strong_howitzers: "Des obusiers puissants"
 IND_strong_howitzers_desc: "It is important to keep our howitzers in tip top condition to match that of the enemy. We are to immediately begin the process of upgrading our older pieces."
 IND_most_advanced_tanks: "Les plus grands chars"
 IND_most_advanced_tanks_desc: "It is no question that our Tanks are becoming outdated. Therefore, we have assigned engineers to conduct experiments and research to build South East Asia's greatest tank-force."
 IND_tank_factories: "Usines de production de chars"
 IND_tank_factories_desc: "Il est sans aucun doute indispensable de construire de nouvelles usines pour nos chars en nombre croissant. Si nous prenons du retard dans la production, à quoi sert notre technologie de chars ?"
 IND_best_ifvs: "The Best IFVs"
 IND_best_ifvs_desc: "Our IFVs deserve the same treatment as our tanks, after all, IFVs are very important on the battlefield. To hasten our military might, it is in our best interest to get our hands on the latest and greatest IFV technology to transport our men safely."
 IND_the_toughest_apcs: "The Toughest APCs"
 IND_the_toughest_apcs_desc: "Our Personnel Carriers are quite outdated and primitive. We must change that. And to do so, we are scrambling a team to build new designs that can withstand even the biggest guns."
 IND_tni_al: "TNI-AL"
 IND_tni_al_desc: "Our Navy is the pride of our nation's military might. As an archipelago nation surrounded by the seas, it is imperative that we build a strong navy to keep the ones who wish us harm at bay."
 IND_fortified_seas: "Rivages fortifiés"
 IND_fortified_seas_desc: "We must fortify our shores to prevent the enemies from landing or damaging our ships. We must try and stay defensive in our fights."
 IND_new_corvettes: "Nouveaux modèles de Corvette"
 IND_new_corvettes_desc: "Our fleet of Corvettes are becoming quite outdated, and they could really use a refresh. We should begin work on drafting up some new designs."
 IND_submarines: "Nouveaux sous-marins"
 IND_submarines_desc: "Submarine warfare is becoming increasingly used in warfare. Though we have some submarines, they are not up to par with the rest of the world. We must change that."
 IND_industrialized_sea: "Mers industrialisées"
 IND_industrialized_sea_desc: "We must increase production of our navy in order to bring the fight to the enemy. If we are to act defensively, it may result in our people to get hurt."
 IND_cruisers: "Recherche sur les croiseurs"
 IND_cruisers_desc: "We must get our hands on better Cruisers! Though they are the largest ship in a fleet, they are key to winning the battles in the seas."
 IND_air_carrier_designs: "Nouveaux porte-avions"
 IND_air_carrier_designs_desc: "De nos jours, les guerres se font avec l'appui aérien. Si nos marins ne bénéficient pas de l'appui aérien, comment pouvons-nous espérer qu'ils sortent victorieux ? Nous devons commencer à concevoir et à construire un porte-avions indonésien !"
 IND_maritime_empire: "Un empire maritime"
 IND_maritime_empire_desc: "Our nation must emerge victorious in the seas. As history has shown, a nations navy often determines its security and integrity."
 IND_tni_au: "TNI-AU"
 IND_tni_au_desc: "The TNI-AU is our nation's main branch of the air force, and we must re-evaluate how we go forward."
 IND_refine_airbases: "Réaménagement des bases aériennes"
 IND_refine_airbases_desc: "We should seriously consider redesigning our airbases to match with our new planes and our pilots needs. If we fail to increase their quality, we may fail in the skies."
 IND_air_drills: "Effectuer des exercices aériens nationaux"
 IND_air_drills_desc: "To hone our pilots skill, we must first make sure they are ready for combat. We will assign our officers to make sure our pilots are ready."
 IND_expand_air_craft_designs: "De meilleures conceptions d'avions"
 IND_expand_air_craft_designs_desc: "To not fall behind the rest of the world in aviation, it is best we begin funding researchers for new aircraft designs."
 IND_purchase_rafale_jets: "Avions Rafale"
 IND_purchase_rafale_jets_desc: "Our friends in the west have offered us their latest and greatest multi-role jets, but it comes at a cost. We should consider this, as we can grow closer with them and get our hands on western planes."
 IND_nato_drilling: "Forage de l'OTAN"
 IND_nato_drilling_desc: "To solidify our friendship with the west, it is best we conduct drills with them in the skies. This will allow us to be ready in case of a coordinated attack."
 IND_funds_for_iae: "Fund the Indonesian Aerospace Company"
 IND_funds_for_iae_desc: "Funding the IAE would allow our aircraft to be more advanced and efficient in the skies. It will allow us to secure Indonesian air dominance in South East Asia."
 IND_political_agenda: "Agenda politique"
 IND_political_agenda_desc: "Concentrons-nous sur notre politique. Avec les élections qui approchent, comment l’Indonésie peut-elle être une démocratie florissante sans programme ? Ou pas ?"
 IND_naw_rural_folk: "Les gens de la campagne"
 IND_naw_rural_folk_desc: "Let us focus on the Rural Folk. They are the backbone of our nation, and helping them should be our biggest concern."
 IND_naw_reps_village: "Représentation des villageois"
 IND_naw_reps_village_desc: "Our people living in villages have been shouting, but no one hears them. It is time we give them some proper say in our affairs."
 IND_naw_health_fac: "Focus sur les établissements de santé"
 IND_naw_health_fac_desc: "We should work on expanding medical care to our rural population. If they are left to die, then we would fail in our mission on helping them."
 IND_naw_better_edu: "Développer l'éducation"
 IND_naw_better_edu_desc: "Les enfants des villages ont été trop longtemps négligés. Il est temps de développer l’éducation pour que chacun puisse avoir la possibilité d’apprendre."
 IND_naw_aid_village: "Focus sur les infrastructures villageoises"
 IND_naw_aid_village_desc: "The homes of our villagers are falling apart, and we cannot sit idly by and watch this. We have sent construction workers to erect some new buildings for our people."
 IND_naw_dev_lacking_regions: "Industrialiser la campagne"
 IND_naw_dev_lacking_regions_desc: "Let us offer jobs to the depraved in the villages, though it is going to take some training, we should build new factories so that they may work."
 IND_naw_agri_dev: "Développement Agricole"
 IND_naw_agri_dev_desc: "Along with building new homes, we should also construct better farming facilities so that they may produce food for our markets."
 IND_naw_fishermen: "Fonds pour les pêcheurs"
 IND_naw_fishermen_desc: "Funding our fishermen is a great way to boost their morale and it is also a great way to feed our people."
 IND_naw_women: "Les femmes dans les secteurs stratégiques"
 IND_naw_women_desc: "Utilizing the Women to have them work in strategic sectors could really be useful, not only for social progress but also scientific progress."
 IND_naw_aid_farmer: "Focus sur les agriculteurs"
 IND_naw_aid_farmer_desc: "Let us focus on the individual, the Farmer. If we direct our attention to these people, then we may possibly get them to produce goods for cheaper."
 IND_naw_aid_laborer: "Aidez le travailleur"
 IND_naw_aid_laborer_desc: "Helping the little man like the laborer would be a key in industrializing the farms."
 IND_naw_safety_reg: "Règlement sur la sécurité des laissez-passer"
 IND_naw_safety_reg_desc: "Passing Safety Regulations is key in keeping our workers safe. This will also help our nation develop in a social stand point and would put our laborers minds at ease."
 IND_way_forward_naw: "La voie à suivre"
 IND_way_forward_naw_desc: "It is clear, that the future lies within the grasp of the National Awakening Party. We have brought nothing but greatness and democracy to this nation since being nominated for power."
 IND_prosper_justice: "Victoire de la justice prospère"
 IND_prosper_justice_desc: "It is evident what the people of Indonesia want. A party which cares about the nation and nothing but the nation, which can only be achieved by the Prosperous Justice Party."
 IND_reform_system: "Réformes systémiques"
 IND_reform_system_desc: "Réformons ce système en déclin et ravivons l’amour de l’État au sein de notre peuple !"
 IND_improve_network: "De meilleurs réseaux"
 IND_improve_network_desc: "How are our people going to communicate if our internet infrastructure is outdated. Let us begin building new ones."
 IND_efficient_tax: "Collecte efficace des impôts"
 IND_efficient_tax_desc: "People must pay their taxes in order to keep the state running. Having an efficient process in collecting taxes is vital in the wellbeing of the state."
 IND_const_practices: "Meilleures pratiques de construction"
 IND_const_practices_desc: "We have men dying from accidents that could be prevented. Though this will slow down work, it is for the best."
 IND_upgrade_facilities: "De meilleurs outils"
 IND_upgrade_facilities_desc: "We should invest in new tools so that our men can work with ease."
 IND_address_issues: "Abordons nos problèmes"
 IND_address_issues_desc: "We should focus on our internal problems."
 IND_edu_to_disenfranchised: "L'éducation pour les défavorisés"
 IND_edu_to_disenfranchised_desc: "Bringing schools to our kids in the disenfranchised parts of our state can really help boost social progress."
 IND_continue_pol_fund: "Poursuivre le financement de la police"
 IND_continue_pol_fund_desc: "Let's keep thugs and criminals off of our streets. If we fund our police, we can assure our people rest at night with ease."
 IND_continue_cor_fight: "Poursuivre la lutte contre la corruption"
 IND_continue_cor_fight_desc: "By combatting corruption we can assure our records are clean and our people trust us."
 IND_more_offices: "Plus de bureaux"
 IND_more_offices_desc: "Building new offices is a great an efficient way of creating more jobs and it can also direct economic flow."
 IND_road_improvements: "Améliorer nos routes"
 IND_road_improvements_desc: "If we can get our roads fixed, then people in neglected cities can finally be equal with people in our popular cities."
 IND_help_arm_industry: "Aidez l'industrie de l'armement"
 IND_help_arm_industry_desc: "Helping the Arms industry could really benefit us in the end, providing jobs for those in need, will boost our economy and our military."
 IND_new_society: "Une nouvelle société"
 IND_new_society_desc: "With our hard work, the remarkable progress of the Prosperous Justice Party has been brought to Indonesians around the nation."
 IND_united_development: "Le Parti du développement uni"
 IND_united_development_desc: "Also known as the Kabaa Party, the UDP is a moderate Islamist party focused on bringing light to the issues in daily Indonesian life."
 IND_und_national_dev: "Plan national de développement"
 IND_und_national_dev_desc: "Let us announce the National Development Plan. It will boost our peoples spirits and our parties popularity."
 IND_und_clean_water: "Une eau plus propre"
 IND_und_clean_water_desc: "By filtering our water and building new systems, we can ensure people can drink without being harmed. This will also open up land for future projects."
 IND_und_bridge_port: "De meilleures infrastructures de transport"
 IND_und_bridge_port_desc: "Getting better infrastructure for our truckers will help get goods across the nation without problem."
 IND_und_agri_invest: "Investir dans l'agriculture"
 IND_und_agri_invest_desc: "Investments in agriculture are crucial if we are to efficiently feed our people."
 IND_und_more_science: "Plus de scientifiques"
 IND_und_more_science_desc: "Our nation needs scientists to advance, and we must fund the training and education of these scientists."
 IND_und_prot_muslims: "Protection des musulmans"
 IND_und_prot_muslims_desc: "By building emergency shelters for our muslims, we can ensure the integrity of our nations religion, and also the safety of muslims. This is crucial as muslims in our nation are under threat of attacks in cities with different religions."
 IND_und_islam_schools: "Financer les écoles islamiques"
 IND_und_islam_schools_desc: "Funding Islamic schools is a quick way to get our people educated culturally, and religiously. It can also get us on the good side of the clergy."
 IND_und_islam_banking: "Banque islamique"
 IND_und_islam_banking_desc: "Islamic Banking practices are without a doubt, the way to do banking. We must not push high interest on our people and doing this will keep them happy. However, it may cause our wallets to be slightly thinner."
 IND_und_better_social_welfare: "Soins aux personnes âgées"
 IND_und_better_social_welfare_desc: "We should not betray our elders, after all it is their work we are building upon. By giving them greater access to health care, we can honor their hard work and also keep them happy."
 IND_und_help_food: "Financer la recherche sur la production alimentaire"
 IND_und_help_food_desc: "By funding new methods of food production, we can feed the millions of hungry stomachs in Indonesia, and also our own."
 IND_und_housing_act: "La loi sur le logement"
 IND_und_housing_act_desc: "Veiller à ce que personne ne se retrouve sans toit est un élément essentiel de la politique de notre parti. Nous devrions construire des logements à bas prix pour les habitants des Moluques du Nord."
 IND_und_better_hospitals: "De meilleurs équipements hospitaliers"
 IND_und_better_hospitals_desc: "Getting better and advanced health equipment for our doctors can help save the lives of many."
 IND_und_help_unemployment: "Aide au chômage"
 IND_und_help_unemployment_desc: "Employing large sectors of the population is crucial for Indonesia to grow economically, so therefore we should construct new buildings to ensure that these people can get jobs."
 IND_und_united_indonesia: "Une Indonésie unie"
 IND_und_united_indonesia_desc: "United through our faith, and our nation we can finally rest seeing our policies implemented within the nation."
 IND_party_of_struggle: "Le Parti de la Lutte"
 IND_party_of_struggle_desc: "Le parti de gauche, le parti de la Lutte, fait pression pour de nombreux changements drastiques, mais personne ne sait s'il pourra les mettre en œuvre."
 IND_strug_brace_for_change: "Préparez-vous au changement"
 IND_strug_brace_for_change_desc: "Hopefully our people are ready for the sweeping reforms our party will have to offer."
 IND_strug_expand_infrastructure: "Développer l'infrastructure"
 IND_strug_expand_infrastructure_desc: "Expanding Infrastructure is a safe way of ensuring our peoples quality of life is high and meeting expectations."
 IND_strug_acquire_bp: "Acquire Construction Blueprints"
 IND_strug_acquire_bp_desc: "En obtenant de nouveaux plans de construction, nous pouvons construire sans accroc sur notre chemin !"
 IND_strug_new_airports: "Nouveaux aéroports"
 IND_strug_new_airports_desc: "By building new airports, we can ensure the steady flow of tourists into the nation. It will also help our people travel internally, and internationally."
 IND_strug_better_road: "Espace aérien militarisé"
 IND_strug_better_road_desc: "Militarizing our Air Space is a good alternative to building more civilian airports, because it will help us defend the nations skies in troubling times."
 IND_strug_fight_corruption: "Lutte contre la corruption"
 IND_strug_fight_corruption_desc: "It is no question that corruption plays a big role in Indonesian politics. We should therefore try our best to eliminate it."
 IND_strug_establish_investigations: "Appel à l'enquête"
 IND_strug_establish_investigations_desc: "Establishing investigations on corrupt officials can easily get our party more popularity, and prosecute rival parties, causing them to fall behind."
 IND_strug_purge_sus_members: "Purger les membres suspects"
 IND_strug_purge_sus_members_desc: "Il serait très hypocrite de notre part d’accuser d’autres partis de corruption sans enquêter sur le nôtre. Nous devrons donc prendre des mesures pour purger nos propres fonctionnaires corrompus."
 IND_strug_economic_growth: "Croissance Économique"
 IND_strug_economic_growth_desc: "By injecting cash into the market, we could possibly get an economic boom."
 IND_strug_agri_funding: "Financement agricole"
 IND_strug_agri_funding_desc: "Agriculture is huge in Indonesia, so in order to keep our farmers happy we should fund their projects."
 IND_strug_seaports: "Nouveaux ports maritimes"
 IND_strug_seaports_desc: "Building new Sea Ports will seriously help us in trading with the outside world, and it can help us produce ships much quicker."
 IND_strug_eastasian_unity: "Unité de l'Asie de l'Est"
 IND_strug_eastasian_unity_desc: "With much of the world falling apart, and into disarray it is important we can keep our enemies close, and our friends even closer. We should cooperate with other Eastern Asian nations to prosper."
 IND_strug_host_regional_events: "Organiser des événements régionaux"
 IND_strug_host_regional_events_desc: "Indonesia has been the hub of regional events in the past, and it has brought many new faces to the state. We should continue this practice and offer to host more events."
 IND_strug_just_indonesia: "Une Indonésie juste"
 IND_strug_just_indonesia_desc: "With all of our hard work, we can finally call it as it is, a new and Just Indonesia."
 IND_democrat_party: "Le Parti démocrate"
 IND_democrat_party_desc: "Le Parti démocrate est l’un des partis pro-occidentaux les plus populaires en Indonésie et le parti prône un État plus libéral."
 IND_dem_greater_future: "Un avenir meilleur"
 IND_dem_greater_future_desc: "Nous devons préparer la nation à la réforme et au changement, car demain doit être meilleur qu’aujourd’hui, et l’Indonésie prospérera !"
 IND_dem_enviro_prot_plan: "Plan de protection de l'environnement"
 IND_dem_enviro_prot_plan_desc: "En favorisant la protection de l’environnement, nous pouvons garantir que nos forêts, nos jungles et nos plages sont à l’abri du vandalisme."
 IND_dem_resource_regulation: "Régulation des ressources"
 IND_dem_resource_regulation_desc: "Lets regulate our resource extraction so that nothing is lost in the process."
 IND_dem_protected_areas: "Créer des zones protégées"
 IND_dem_protected_areas_desc: "Establishing protected areas will protect our nations cultural sights, and keep our history preserved."
 IND_dem_for_the_oceans: "Parti de la lutte pour les océans"
 IND_dem_for_the_oceans_desc: "We are surrounded by the seas, and therefore we must be kind to it. By building new safe facilities we can ensure this can be beneficial to both the oceans, and us."
 IND_dem_decentralization: "Décentralisation"
 IND_dem_decentralization_desc: "Decentralizing our nation can help our people trust us more, and it can also help cut costs where possible."
 IND_dem_regional_econ: "Aider les économies régionales"
 IND_dem_regional_econ_desc: "By funding jobs for regional economies we could seriously gain the support as well as continue to reap the reward of a larger work force."
 IND_dem_prot_local_cultures: "Protéger les cultures locales"
 IND_dem_prot_local_cultures_desc: "Protecting minorities and their cultures is key in keeping Indonesia civilized. Many people commit acts of hate against one and another, and that will not fly in this administration."
 IND_dem_small_business_support: "Combattre les propriétaires fonciers"
 IND_dem_small_business_support_desc: "Lutter contre les propriétaires fonciers qui accaparent toutes les terres peut nous aider à répartir les terres entre les citoyens et à assurer la croissance de la nation."
 IND_dem_promote_credit: "Aide aux personnes âgées"
 IND_dem_promote_credit_desc: "Aiding the Elderly is one sure way to show the people our parties good intentions."
 IND_dem_technical_support: "Aide au progrès technologique"
 IND_dem_technical_support_desc: "Most of our nations people still do not have access to the internet, which makes us fall behind. We should change that and build new infrastructure for internet."
 IND_dem_emergence_indonesia: "L'émergence de l'Indonésie"
 IND_dem_emergence_indonesia_desc: "With our new policies and goals in mind, we have shown the world that Indonesia will emerge from its weakened state no matter what."
 IND_dem_civil_activity: "Promouvoir l'activité civile"
 IND_dem_civil_activity_desc: "Promouvoir l’activité civile est un moyen sûr de permettre à nos citoyens de mieux se connaître, tout en bénéficiant à l’État."
 IND_k.e.m.i.u: "Le K.E.M.I.U"
 IND_k.e.m.i.u_desc: "Le K.E.M.I.U, ou notre branche des affaires étrangères, est chargé de protéger nos intérêts nationaux à l'étranger et d'établir des relations avec le reste du monde."
 IND_contact_west: "Relations occidentales"
 IND_contact_west_desc: "Keeping the west close is important. Everyday we see the new technological and scientific breakthroughs in their nations. On top of that, we can benefit economically from their companies."
 IND_american_coop: "Coopération indonéso-américaine"
 IND_american_coop_desc: "Cooperating with the Americans can help us grow our economy, as the USA is the leading economy in the world."
 IND_american_armor: "Armure américaine"
 IND_american_armor_desc: "Purchasing American armor designs can be beneficial in our armed forces, specifically our land force the TNI-AD."
 IND_west: "Diplomatie pro-occidentale"
 IND_east: "Diplomatie pro-orientale"
 IND_american_companies: "Coopérer avec la NASA"
 IND_american_companies_desc: "Cooperating with N.A.S.A would seriously improve the speed at which we can get our men in space.. And it will speed up space research."
 IND_contact_netherlands: "Rencontre avec les Hollandais"
 IND_contact_netherlands_desc: "Our old colonizers, are now our new friends. Keeping touch with the Dutch can be a great gateway for Indonesia entering into European trade."
 IND_spajik_frigate: "Achetez des frégates Spejik"
 IND_spajik_frigate_desc: "Buying new frigates can be beneficial, especially from the Dutch. They are willing to give us one for a pretty good deal."
 IND_sigma_corvette: "Achetez des Corvettes Sigma"
 IND_sigma_corvette_desc: "Netherlands Sigma Corvettes appear to be a formidable fighting force in the seas. If we can strike a deal for one, it can really benefit our navy."
 IND_ease_asean_trade: "Facilitez-leur l’accès aux échanges commerciaux de l’ASEAN"
 IND_ease_asean_trade_desc: "Easing the Netherlands into ASEAN trade can benefit us, and our neighbors. It will also seriously benefit East Asia in relations with Europeans."
 IND_fund_dutch_churches: "Financer les églises néerlandaises"
 IND_fund_dutch_churches_desc: "Funding Dutch Churches could be somewhat risky. However, to please our friends in the Netherlands, we should consider funding some of their churches as some christians here see themselves as descendants of the Dutch."
 IND_contact_europe: "Négociations avec l'UE"
 IND_contact_europe_desc: "Holding talks with the European Union can help us establish greater relations with much of western and eastern Europe."
 IND_boost_econ_relations: "Renforcer les relations économiques"
 IND_boost_econ_relations_desc: "Boosting Economic Relations will help us get closer ties economically with the EU. This will also improve the daily life of our people as they now have greater access to western goods."
 IND_national_development_plan: "Plan national de développement"
 IND_national_development_plan_desc: "Let's strike some deals with the EU to improve our national infrastructure."
 IND_talks_east: "Regardez vers l'Est"
 IND_talks_east_desc: "Lets look East-Ward and talk with our Eastern friends. The west has done nothing but harm Indonesia, and cause its people despair."
 IND_sino_cooperation: "Coopération sino-indonésienne"
 IND_sino_cooperation_desc: "The Chinese have not done us harm.. Yet. Let's build relations with them so it doesn't happen."
 IND_sino_science_coop: "Coopération scientifique sino-américaine"
 IND_sino_science_coop_desc: "Cooperating with the Chinese in science will allow our nation to go forward."
 IND_principle_bandung: "10 principes de Bandung"
 IND_principle_bandung_desc: "Agreeing not to interfere with each other's internal politics is KEY in Asian unity. After the conference, the Chinese agreed to a pact of non-aggression, intervention and promised to leave our internal affairs alone."
 IND_japanese_friendship: "Amitié japonaise"
 IND_japanese_friendship_desc: "Though the Japanese colonized us, it would be ridiculous not to build up our relations with them. Holding talks can benefit us, and them."
 IND_port_exports: "Plus de ports pour l'exportation"
 IND_port_exports_desc: "Building new ports can speed up the flow of goods to and from Japan, and the rest of the world."
 IND_jap_tech_giants: "Les géants japonais de la technologie"
 IND_jap_tech_giants_desc: "Tech giants from Japan can teach us a thing or two. We should look at cooperating with them and our domestic tech companies."
 IND_men_for_ports: "Main d'oeuvre pour les ports"
 IND_men_for_ports_desc: "These ports don't man themselves! We should request Japanese manpower for filling positions in our ports as we can use skilled workers."
 IND_jap_const_methods: "Méthodes de construction japonaises"
 IND_jap_const_methods_desc: "Mimicking Japanese construction methods should be a goal for our nation. If we can really build up our infrastructure like theirs, we'll surpass them in no time."
 IND_russia_coop: "Coopération russo-indonésienne"
 IND_russia_coop_desc: "Coopérer avec les Russes est une manière évidente de montrer à l'Occident que nous en avons assez de leurs frasques. Nous pouvons également conclure un partenariat stratégique avec les Russes..."
 IND_sukhoi_jets: "Achetez des Sukhoi Jets"
 IND_sukhoi_jets_desc: "Getting the latest and greatest Russian jets can benefit our nation airforce, the TNI-AU. We should plan on striking deals with them for some Jets."
 IND_russian_tourist: "Chouchoutez les touristes russes"
 IND_russian_tourist_desc: "Pampering Russian tourists will glorify our nation in their eyes. We should consider this as we have a large amount of our tourism coming from Russia."
 IND_talk_with_neighbors: "Discussions avec nos voisins"
 IND_talk_with_neighbors_desc: "Holding talks with our neighbors can really get the message out to South East Asia."
 IND_australia: "Discuter avec l'Australie"
 IND_australia_desc: "Nous devons aborder certains sujets vraiment importants avec les Australiens, notamment le Timor oriental et son implication."
 IND_apologize_australia: "Présenter des excuses à l'Australie"
 IND_apologize_australia_desc: "We should apologize to the Australians and the families of the volunteers that died. We were perhaps a bit too rough with the whole maintaining control thing."
 IND_high_prices: "Prix ​​élevés !"
 IND_meet_minister_australia: "Rencontre avec le ministre"
 IND_meet_minister_australia_desc: "Nous avons récemment rencontré le Premier ministre australien et, heureusement, tous les problèmes que nous avons rencontrés ont été résolus. Espérons que nos relations s'amélioreront !"
 IND_confront_australia: "Affronter les Australiens"
 IND_confront_australia_desc: "We need to confront them because of their involvement in East-Timor. They caused them to bring harm and sadness to the Indonesian Nation."
 IND_malaysia: "Parler avec la Malaisie"
 IND_malaysia_desc: "La Malaisie et l'Indonésie sont deux voisins proches, mais des problèmes récents nous séparent."
 IND_demand_riau: "Ils demandent la cession de Riau"
 IND_demand_riau_desc: "Riau est un territoire indonésien légitime et nous n'apprécions pas que les Malaisiens le revendiquent. Nous devons leur demander de faire marche arrière immédiatement !"
 IND_cede_riau: "Céder Riau"
 IND_cede_riau_desc: "Ceding Riau will solve a lot of our issues. It is not worth it fighting over a small island."
 IND_strategic_partnership: "Partenariat stratégique"
 IND_strategic_partnership_desc: "We are now able to become strategic partners with the Malaysians. After backing off of Riau, they have really taken a liking to us."
 IND_combat_it: "Combattre le radicalisme"
 IND_combat_it_desc: "Fighting Radicalism is the best option. By fighting it, we send a strong message to those that practice it. Doing this can also help bolster our own power, and it will allow us to project influence over different aspects of our peoples lives."
 IND_bolster_party_pop: "Renforcer la popularité du parti"
 IND_bolster_party_pop_desc: "Renforcer la popularité de nos partis est une situation gagnant-gagnant : les gens commencent à aimer notre nation et nous pouvons obtenir un peu plus de soutien pour les prochaines élections !"
 IND_derad_campaign: "Campagnes de déradicalisation"
 IND_derad_campaign_desc: "It is not too late to fix those who have been radicalized. We can hold government sponsored campaigns across Indonesia to get people de-radicalized."
 IND_investigate_growth: "Enquêter sur leur croissance"
 IND_investigate_growth_desc: "Allocating a portion of our budget to better policing can give us some clues as to why the radicals are increasing in size day by day."
 IND_start_media_campaign: "Lancer des campagnes médiatiques"
 IND_start_media_campaign_desc: "Getting a foothold in the media can be a good way to change the perspective of some radicals."
 IND_control_net: "Combattre les contenus radicalistes sur le Net"
 IND_control_net_desc: "Fighting radicals on the internet is one of many ways to get them and their ideas off of the ever digitalizing Indonesian Nation."
 IND_filter_net: "Filtrer le Net"
 IND_filter_net_desc: "Filtering the net outright is a move that may anger our people, but it will allow us to control what content goes in and out with much more ease than just merely watching a couple of pages."
 IND_bolster_nationalism: "Susciter le nationalisme indonésien"
 IND_bolster_nationalism_desc: "Let's make our people proud of our nation, and direct them a little from religion."
 IND_rallies_schools: "Tenir des assemblées dans les écoles"
 IND_rallies_schools_desc: "La tenue de rassemblements peut sensibiliser les jeunes aux dangers de la radicalisation."
 IND_arrest_members: "Arrêter les dirigeants radicaux"
 IND_arrest_members_desc: "Giving a tour of our prisons to known radical leaders will show their followers what will come to them."
 IND_curb_fpi: "Limiter le FPI"
 IND_curb_fpi_desc: "The FPI or the Islamic Defenders Front are a dangerous radicalist organization, which hold most of the influence when it comes to extremist ideologies. Curbing their influence and power is crucial to fighting radicalism in our nation."
 IND_persecute: "Persécuter le FPI"
 IND_persecute_desc: "La persécution du FPI débarrassera notre nation des croyances extrémistes, et ces personnes seront jugées selon notre système judiciaire !"
 IND_embrace_it: "Adoucissons notre position"
 IND_embrace_it_desc: "Softening our stance may make these radicals change their views on us, however we risk creating a situation we may not be able to control in the future..."
 IND_tell_police_backdown: "Dissoudre les unités de sécurité dans les zones radicales"
 IND_tell_police_backdown_desc: "Disbanding these security units will show the radicals that we are no threat, and hopefully will get them to like us."
 IND_fund_their_media: "Autoriser le FPI sur les médias"
 IND_fund_their_media_desc: "En autorisant le FPI à s'exprimer dans les médias, nous montrerons les fruits de la démocratie indonésienne. Chacun a son mot à dire dans cette nation et nous ne ferons aucune discrimination fondée sur des idéologies !"
 IND_beyond_our_control: "Attendez... Pourquoi font-ils des émeutes ?!"
 IND_beyond_our_control_desc: "Ces radicaux ingrats ! Ils semblent se révolter et saccager nos rues pour exiger le renversement du gouvernement. Comment une telle chose a-t-elle pu se produire ? Qui aurait pu s'attendre à ce que de telles choses se produisent ?"
 IND_fpi: "Le FPI prend le pouvoir"
 IND_fpi_desc: "A dark day in our nation's histo-... A magnificent day in our nation's history this day truly is, and hopefully by the power given to us by our followers we shall purify this nation brick by brick!"
 IND_touch_on_economy: "Toucher à l'économie"
 IND_touch_on_economy_desc: "Our nation is going through some tough times, if we revitalized some aspects of our economy we could potentially escape the grasps of collapse."
 IND_fund_for_holy: "Fatwa des usines"
 IND_fund_for_holy_desc: "New factories for workers are being built. This will stimulate goods and the flow of them in our nation."
 IND_oppose_invest: "S'opposer aux investissements"
 IND_oppose_invest_desc: "S’opposer aux investissements étrangers est une façon de préserver les ressources de notre nation et de maintenir son indépendance !"
 IND_convert_tourist_destination: "Revitaliser les destinations touristiques"
 IND_convert_tourist_destination_desc: "Qui se soucie d'une ou deux plages ? Ou d'une vieille formation rocheuse ? Ou d'un temple infidèle stupide construit il y a 500 ans ? Nous avons besoin de tout l'espace possible pour construire la puissance de notre nation !"
 IND_sharia_2: "Charia!"
 IND_sharia: "Charia!"
 IND_sharia_desc: "Avec la charia, nous pouvons enfin commencer à purifier notre nation et sa société. Même si nous rencontrerons une certaine résistance au début, notre peuple finira par l'apprécier."
 IND_dress_code: "Appliquer le code vestimentaire"
 IND_dress_code_desc: "Le respect du code vestimentaire est un moyen sûr de purifier la société indonésienne. Si nous ne le faisons pas, notre peuple deviendra infidèle et perturbera notre programme !"
 IND_gender_seg: "Séparer les sexes"
 IND_gender_seg_desc: "Segregating our genders and relocating them to their respective roles will get us much farther than if we let them do whatever they wanted."
 IND_raid_bar: "Barres de raid"
 IND_raid_bar_desc: "Malgré les nouvelles lois mises en place, certains infidèles continuent de tenir des bars clandestins. Nous devons immédiatement mettre un terme à ces activités !"
 IND_regional_purification: "Purification régionale"
 IND_regional_purification_desc: "Comment pouvons-nous purifier notre peuple si nos voisins sont infidèles et impurs ? Il est temps que nous prenions les choses en main !"
 IND_purify_singapore: "Purifier Singapour"
 IND_purify_singapore_desc: "Singapour est une nation islamique comme nous, mais leurs politiques ridicules font honte à la religion et à la pureté de la région !"
 IND_purify_asia: "Purifier l'Asie du Sud"
 IND_purify_asia_desc: "Purifying South Asia will allow us to get a foothold in the whole continent. If we can manage that, then we can continue our purificationist policies."
 IND_holy_indonesia: "Une Indonésie purifiée"
 IND_holy_indonesia_desc: "Nous avons réussi à purifier notre nation, l'Indonésie. Grâce à cela, nous pouvons avancer vers le 21e siècle avec la ferveur islamique au sein de notre peuple !"
 IND_help_aceh: "Aidez Aceh"
 IND_help_aceh_desc: "These are trying times, Aceh has been struck with disaster and our people living there are in serious danger. We must coordinate an effort to help them as much as we can."
 IND_send_aid_package: "Coordonner les secours en cas de catastrophe"
 IND_send_aid_package_desc: "We need to coordinate disaster relief for the people of Aceh so that they may get back on their feet."
 IND_bring_resistance_down_one: "Allier les dirigeants locaux"
 IND_bring_resistance_down_one_desc: "Allying local leaders can help us gain their trust and begin phase one of fixing our relations."
 IND_bring_resistance_down_two: "Octroyer une aide financière aux dirigeants régionaux"
 IND_bring_resistance_down_two_desc: "Giving the regional leaders some money can get them to begin funding reconstruction of damaged buildings."
 IND_bring_resistance_down_three: "Arrêter les fauteurs de troubles"
 IND_bring_resistance_down_three_desc: "Certains habitants d'Aceh ne veulent pas de paix, malgré l'horrible catastrophe qui s'est produite. Nous devons nous occuper d'eux pour pouvoir tourner la page sur ce conflit inutile."
 IND_bring_resistance_down_four: "Ramenez Aceh !"
 IND_bring_resistance_down_four_desc: "Il est temps... il est temps que nous ramenions enfin le peuple Aceh en Indonésie afin que nous puissions prospérer pour les siècles à venir !"
 indonesia.8.t: "L’Indonésie exige des réparations pour le Timor-Leste !"
 indonesia.8.d: "Indonesia demands we pay reparations because of our efforts in Timor-Leste's independence. They are asking for an outrageous sum of money that will come out of the pockets of Australia. We can deny this, however it may escalate to a situation beyond our control."
 indonesia.8.a: "Dis-leur de venir le chercher."
 indonesia.8.b: "Très bien, si cela signifie qu'ils vont descendre"
 indonesia.800.t: "Ils ont accepté !"
 indonesia.800.d: "Les Australiens ont proposé de payer des réparations pour leur implication au Timor-Leste, même si cela ne sera peut-être jamais suffisant car ils nous ont fait perdre notre territoire..."
 indonesia.800.a: "Parfait!"
 indonesia.80.t: "Ils ont refusé !"
 indonesia.80.d: "Nous avons adressé aux Australiens une demande très aimable et généreuse, mais ils l'ont refusée. Il semble qu'ils ne soient pas disposés à coopérer avec nous et, pour autant que nous le sachions, ils n'éprouvent aucun remords pour avoir causé de l'angoisse à notre nation !"
 indonesia.80.a: "Très bien, nous obtiendrons nos réparations d’une autre manière !"
 indonesia.7.t: "L’Indonésie exige que nous retirions Riau !"
 indonesia.7.d: "Ambassadors from Indonesia have been demanding that we cede our claims from Riau. This is something that has been a hot debate between our two nations and it seems that it has finally reached a boiling point. We are to prepare a response as soon as possible"
 indonesia.7.a: "Non, Riau est à nous !"
 indonesia.7.b: "Laissez-les faire, nous n'avons pas besoin de cette triste petite île de toute façon."
 indonesia.70.t: "Malaysia Refuses to Cede Riau!"
 indonesia.70.d: "Les diplomates malaisiens nous ont récemment fait part de leur rejet de notre proposition. Il s'agit d'une violation de la souveraineté indonésienne et elle doit être sanctionnée de manière appropriée !"
 indonesia.70.a: "Ils l'ont demandé."
 indonesia.700.t: "They Cede Riau!"
 indonesia.700.d: "Il semble que notre message ait été clair et net : Riau nous appartient ! Les diplomates malaisiens nous ont récemment fait savoir que l'État avait renoncé à toutes ses revendications sur l'île de Riau. L'Indonésie peut désormais respirer un grand soulagement."
 indonesia.700.a: "Bien"
 indonesia.5865.t: "Des catastrophes arrivent !"
 indonesia.5865.d: "En Indonésie, les catastrophes sont nombreuses. Pour assurer la stabilité de l'Indonésie, assurez-vous de consulter l'onglet « Décisions » et d'accomplir les tâches indiquées sous « La terrible malchance de l'Indonésie ». Votre première tâche consistera à construire un chantier naval à Kalimantan pour éviter une catastrophe industrielle, bonne chance !"
 indonesia.5865.a: "D'accord"
 indonesia.923.t: "L'avenir de l'Indonésie"
 indonesia.923.d: "Notre nation est dans un état de désarroi depuis très longtemps, depuis l'indépendance des Pays-Bas. Des problèmes financiers aux problèmes sociaux et ethniques, l'Indonésie a été frappée de toutes parts et elle ne peut plus tenir longtemps. Des mesures décisives doivent être prises pour assurer la survie et la prospérité de l'Indonésie au XXIe siècle. Nous devons donc commencer par nous attaquer aux problèmes qui nous touchent de près."
 indonesia.923.a: "En avant !"
 indonesia.69.t: "Violences à Kalimantan !"
 indonesia.69.d: "Une chaîne de violence a éclaté lorsque deux Madurais ont été attaqués par un certain nombre de Dayak à Sampi lors d'un événement sur les migrations. Ce conflit a maintenant dégénéré en une crise à part entière, avec des décès en augmentation de jour en jour et de nombreuses personnes déplacées de leurs foyers. Les forces de sécurité sont actuellement en attente d'ordres."
 indonesia.69.a: "Ils peuvent se débrouiller seuls !"
 indonesia.69.b: "Qu'attendez-vous ? Réparez-le !"
 indonesia.5.t: "Indonesia Requests Funds"
 indonesia.5.d: "L'Indonésie connaît un conflit religieux très intense dans son pays, et elle compte sur nous pour une aide financière."
 indonesia.5.a: "Bien sûr, si c'est pour le plus grand bien"
 indonesia.5.b: "Pfft... Non."
 indonesia.50.t: "Les Hollandais acceptent de nous aider !"
 indonesia.50.d: "Après mûre réflexion, les diplomates néerlandais sont venus nous accorder un peu d'argent que nous pouvons donner à nos chrétiens pour gagner des conflits."
 indonesia.50.a: "Parfait"
 indonesia.500.t: "Les Néerlandais refusent l'aide !"
 indonesia.500.d: "Les diplomates néerlandais sont venus nous informer que leur gouvernement a refusé l'aide à nos chrétiens !"
 indonesia.500.a: "Incroyable"
 indonesia.6.t: "Indonesia Requests Funds"
 indonesia.6.d: "L'Indonésie connaît un conflit religieux très intense dans son pays, et elle compte sur nous pour une aide financière."
 indonesia.6.a: "Bien sûr, si c'est pour le plus grand bien"
 indonesia.6.b: "Pfft... Non."
 indonesia.60.t: "The Saudis Agree to Aid Us!"
 indonesia.60.d: "Après mûre réflexion, les diplomates saoudiens sont venus nous accorder un peu d'argent que nous pouvons donner à nos musulmans pour gagner des conflits."
 indonesia.60.a: "Parfait"
 indonesia.600.t: "Saudis Refuse Aid!"
 indonesia.600.d: "Les diplomates saoudiens sont venus nous informer que leur gouvernement a refusé l’aide à nos musulmans !"
 indonesia.600.a: "Incroyable"
 indonesia.772.t: "Le leader radical Rizieq Shihab arrêté !"
 indonesia.772.d: "Le leader radical de l'organisation « FPI », Rizieq Shihab, a été arrêté et attend désormais son procès. C'est une victoire majeure pour la sécurité de l'Indonésie, car notre démocratie n'est plus directement menacée par les radicaux et leurs idéaux rétrogrades !"
 indonesia.772.a: "Une victoire pour la démocratie."
 indonesia.2.t: "La question du Timor oriental"
 indonesia.2.d: "The time has come, a bitter moment for our nation. The people of East-Timor, one of our many islands are demanding independence. Brutal protests, riots, and clashes have caused much instability and it has seriously slowed down political and social progress. It is now up to us to decide the nations fate, we either comply with the UN's wishes or we go on our path"
 indonesia.2.a: "C'est ce que veut le peuple du Timor oriental... pas nous"
 indonesia.2.b: "Ils veulent faire quoi maintenant ?!"
 indonesia.3.t: "L'ONU approuve la Constitution !"
 indonesia.3.d: "After our approval for East Timor's independence, the United Nations has approved their nations constitution. A democratic, independent East-Timor will shortly be our neighbor.. "
 indonesia.3.a: "C'est ce qu'ils voulaient"
 indonesia.4.t: "Le Timor Leste est libre !"
 indonesia.4.d: "C'est officiel. L'approbation de la constitution par l'ONU a finalement été promulguée et le Timor-Leste indépendant est désormais notre voisin."
 indonesia.4.a: "Espérons de bonnes relations"
 indonesia.9.t: "L’Indonésie refuse l’indépendance du Timor oriental !"
 indonesia.9.d: "Le régime indonésien a refusé au peuple du Timor oriental sa liberté et son indépendance. De nombreux groupes rebelles nous considèrent comme des libérateurs potentiels et, à l'heure actuelle, de fortes tensions se font jour dans la région et dans le monde..."
 indonesia.9.a: "Bon, ça suffit !"
 indonesia.9.b: "Ce n'est pas notre problème"
 indonesia.55.t: "L'avenir de nos étudiants !"
 indonesia.55.d: "The time has come for us to discuss the future of our children's education. For as long as we have known, the ministry of religious affairs has run the school system and has imposed a moderate amount of islamic teachings to our students. We must re-evaluate whether this approach is truly effective or not..."
 indonesia.55.a: "Continuez les enseignements religieux !"
 indonesia.55.b: "Cessez les enseignements religieux !"
 indonesia.77.t: "Tensions ethniques galopantes !"
 indonesia.77.d: "Il est temps de régler les conflits ethniques qui font rage dans notre pays. De nombreux endroits comme Ambon et Bornéo connaissent des violences presque quotidiennes. La nation ne peut pas continuer à vivre si ses habitants se battent les uns contre les autres pour des raisons de croyances religieuses. Nous devons maintenant faire preuve de fermeté et choisir qui nous voulons soutenir, le cas échéant."
 indonesia.77.a: "Les musulmans ont besoin de nous !"
 indonesia.77.b: "Nous ne choisissons pas de favoris, nous corrigeons simplement les problèmes déjà existants !"
 indonesia.77.c: "Les chrétiens ont besoin de nous !"
 indonesia.1000.t: "Le Parlement pris d'assaut"
 indonesia.1000.d: "Months of rioting and clashes have finally lead us to this point.. Our supporters and followers successfully stormed the Indonesian Parliament and demanded several key figures step down, and all complied. The Indonesian people are now free from the eternal tyranny that was this so called democracy"
 indonesia.1000.a: "La Révolution réussit"
 indonesia.1001.t: "Ambon City sous contrôle chrétien !"
 indonesia.1001.d: "Years of fighting in Ambon has finally come to an end, and its people can breathe a sigh of relief. Christians in the city have emerged victorious, and we have begun appointing Christian leaders for local towns and villages"
 indonesia.1001.a: "Ce n'était qu'une question de temps."
 indonesia.1002.t: "Ambon City sous contrôle musulman !!"
 indonesia.1002.d: "Years of fighting in Ambon has finally come to an end, and its people can breathe a sigh of relief. Muslims in the city have emerged victorious, and we have begun appointing Muslim leaders for local towns and villages"
 indonesia.1002.a: "Comme prévu"
 indonesia.27.t: "Wahid's Impeachment!"
 indonesia.27.d: "Following a plenary meeting, the MPR has decided to impeach President Wahid on the basis of incompetence due to his reckless policies and handling of the financial crisis. They have now appointed Vice President Megawati Soekarnoputri as the President of Indonesia!"
 indonesia.27.a: "Il l'a mérité !"
 indonesia.37.t: "Attaque à Bali !"
 indonesia.37.d: "Several bombs went off in a nightclub in Bali, killing 202 people, including our own and foreigners. 88 Australians were killed and now we are being pressured by Australian authorities and others to act on this matter. Fingers are being pointed at the Jemaah Islamiyah extremist group, who have been known to be the root of such attacks. We must immediately come to a decision on this matter before things get worse"
 indonesia.37.a: "Lancer une enquête et indemniser les familles"
 indonesia.37.b: "Comme cela est triste"
 indonesia.477.t: "Le raid"
 indonesia.477.d: "Une foule en colère a pris d'assaut l'armurerie du district de Wamena, et cela pourrait être très catastrophique. Nos forces de sécurité ont commencé à évacuer les civils qui pourraient être en danger et à les mettre en sécurité, mais le motif de cette foule est encore inconnu à ce stade."
 indonesia.477.a: "Dépêchez-vous et faites quelque chose !"
 indonesia.477.b: "J'espère que ça va s'arranger tout seul"
 indonesia.577.t: "Tsunami à Aceh"
 indonesia.577.d: "A disastrous tsunami has hit Banda Aceh, and other parts of the province. Aceh has been the center of guerilla warfare and resistance, resulting in a lack of cooperation between us and them when disasters occur. However, this time the situation is much different. They can no longer afford to deal with an event of this magnitude on their own, and they need our help to recover. The GAM has offered a ceasefire and are willing to cooperate to bring an end to our conflict"
 indonesia.577.d1: "A disastrous tsunami has hit Banda Aceh, and other parts of the province. The already crippled region from the years of guerilla warfare and resistance is now devastated even more than it was before. It is imperative we begin to look at recovery efforts for this area else we risk another uprising."
 indonesia.577.a: "Une autre catastrophe..."
 indonesia.67.t: "Problèmes des réfugiés en Papouasie occidentale"
 indonesia.67.d: "Une fois de plus, les Australiens se sont immiscés dans nos affaires intérieures, mais cette fois-ci, ils offrent l'asile à des fauteurs de troubles en Papouasie occidentale. Les tensions entre Jakarta et Canberra ont atteint un point d'ébullition et nous sommes prêts à agir si nécessaire !"
 indonesia.67.a: "Financez des stations de surveillance pour éviter cela à l’avenir !"
 indonesia.67.b: "Peut-être que les fonds peuvent aller... Ailleurs..."
 indonesia.678.t: "The National Committee of West Papua is formed"
 indonesia.678.d: "The National Committee of West Papua, also known as the KNPB, is a group located in West Papua, and are advocating for a referendum on the status of the region. Though they are peaceful in their message, if their goals are achieved it will spell disaster for our nation"
 indonesia.678.a: "Dissoudre le Comité"
 indonesia.678.b: "Un petit retard dans la construction n'est pas un gros problème"
 indonesia_news.1.d: "Test"
 indonesia_news.1.a: "Test"
 indonesia.95.t: "Le Timor oriental déclare son indépendance !"
 indonesia.95.d: "Suite à notre décision de conserver notre territoire légitime, le Timor oriental a décidé de déclarer son indépendance. Mais le plus choquant est que les Australiens leur ont fait passer clandestinement des armes et qu'ils se soulèvent maintenant contre nous !"
 indonesia.95.a: "Nous prendrons notre revanche en temps voulu !"
 indonesia.420.t: "Un appel à l'aide !"
 indonesia.420.d: "Pour faire face à la crise financière asiatique qui sévit actuellement dans notre pays, nous devons chercher de l’aide auprès d’organismes étrangers. Le Japon est notre partenaire le plus proche et il est prêt à nous aider. Cependant, le Japon a porté préjudice à notre pays par le passé et de nombreux groupes nationalistes et anti-occidentaux réclament une autre solution, à savoir la Chine. La Chine est également disposée à aider notre pays, mais cela nous placerait dans sa sphère d’influence directe, ce qui pourrait modifier notre politique."
 indonesia.420.a: "Ce dont nous avons besoin, c’est de l’aide japonaise !"
 indonesia.420.b: "China knows what they're doing, call them!"
 IND_finished_disaster: "Prévenir les catastrophes à un stade précoce"
 IND_finished_disaster_desc: "Waouh, vous avez réussi à empêcher la dernière catastrophe à temps ! Bon travail."
 IND_ethnic_tension: "Écraser les troubles ethniques"
 IND_ethnic_tension_desc: "Indonesia is an ethnically, culturally and religiously diverse state. This often leads to troubles between our peoples. This causes instability and we must immediately find a solution!"
 IND_aceh_in_turmoil: "Aceh en ébullition !"
 IND_aceh_in_turmoil_desc: "Aceh has been in a state of disarray and rebellion since 1976, and it's causing our nation instability and unnecessary bloodshed. Our military is way too focused on dealing with these insurgents, and it is causing us to fall behind militarily\n§W--------------§!\nThis national spirit will be §RRemoved§! if we §Hceasefire with Aceh in 2004§!."
 IND_rupiah_crisis: "La crise de la roupie"
 IND_rupiah_crisis_desc: "The Rupiah, our nations currency is seriously weak. This is the result of decades of corruption and mismanagement and it is about time we fix it and get our economy back on the global stage."
 IND_popular_tourist_destination: "Destination touristique populaire"
 IND_popular_tourist_destination_desc: "Indonesia is a really popular tourist destination. This is the result of our great culture and history."
 IND_growing_radicalization: "La radicalisation croissante"
 IND_growing_radicalization_desc: "Being an Islamic country, our nations youth and people are prone to radicalization and hardline ideals."
 IND_asian_crisis: "La crise financière asiatique en Indonésie"
 IND_asian_crisis_desc: "The 1997 Asian Financial Crisis hit Indonesia and its neighbors very hard, causing a slow down in almost all walks of life in the nation."
 IND_fighting_crisis: "Lutter contre la crise"
 IND_fighting_crisis_desc: "The 1997 Asian Financial Crisis hit Indonesia and its neighbors very hard, causing a slow down in almost all walks of life in the nation, however recently things have been improving."
