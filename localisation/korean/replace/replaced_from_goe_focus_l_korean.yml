l_korean:
 PER_iran_first: "이란 최우선"
 AFG_graveyard_of_empires: "제국의 무덤"
 PER_iran_first_desc: "비록 우리에게 지역 및 국제적인 동맹이 있다고 하더라도, 우리 국민의 안녕에 관해서는 이란을 최우선으로 고려해야 합니다. 자금은 국내 산업을 발전시키는 데 할당되어야만 합니다."
 AFG_graveyard_of_empires_desc: "제국들은 나타났다 사라지기를 반복하지만, 우리 민족은 여전히 이 지역의 확고한 주인으로 남아있습니다. 우리 민족이 단결하여 우리의 유산을 이어나가는 한, 어떤 침략자라도 [AFG.GetNameWithFlag]이(가) 자신들의 진정한 무덤임을 깨닫게 될 것입니다."