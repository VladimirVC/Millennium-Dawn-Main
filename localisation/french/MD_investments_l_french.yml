 hire_extra_primary_sector_workers_tt: "§YEmbaucher des travailleurs supplémentaires du secteur primaire§! dans §Y[THIS.GetName]§!\n---------\nLa production de ressources dans §Y[THIS.GetName]§! ne répond pas aux attentes du pays en matière de production. Nous devrions envisager d'embaucher des travailleurs supplémentaires dans le secteur primaire pour contribuer à la production de ressources."
