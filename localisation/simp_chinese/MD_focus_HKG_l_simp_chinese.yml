 legco_decrease_administration_motion_clock: "当前动议：§Y减少£political_power_texticon 官僚体系支出§!"
 legco_increase_policing_motion_clock: "当前动议：§Y增加£foreign_influence_defense_modifier_texticon §C安全§!支出§!"
 legco_decrease_policing_motion_clock: "当前动议：§Y减少£foreign_influence_defense_modifier_texticon §C安全§!支出§!"
 legco_increase_education_motion_clock: "当前动议：§Y增加£research_speed_texticon §G教育§!支出§!"
 legco_decrease_education_motion_clock: "当前动议：§Y减少£research_speed_texticon §G教育§!支出§!"
 legco_increase_health_motion_clock: "当前动议：§Y增加£population_texticon §R医疗保健§!支出§!"
 legco_decrease_health_motion_clock: "当前动议：§Y减少£population_texticon §R医疗保健§!支出§!"
 legco_increase_social_motion_clock: "当前动议：§Y增加£consumer_goods_texticon §n养老金§!支出§!"
 legco_decrease_social_motion_clock: "当前动议：§Y减少£consumer_goods_texticon §n养老金§!支出§!"
 HKG_unrestricted_housing_market: "不受限制的住房市场"
 HKG_unrestricted_housing_market_desc: "香港的自由房地产市场是全球最具活力、房价也最令人难以承受的市场之一。如果不加以干预，收入与房价之间的差距将继续扩大。"
 HKG_victoria_harbour: "维多利亚港"
 HKG_victoria_harbour_desc: "维多利亚港是香港港口经济的历史中心：集装箱运输、渡轮和邮轮码头都汇聚于此。"
 HKG_victoria_harbour_expand_desc: "扩建后的维多利亚港将拥有新的集装箱泊位、加深的航道和现代化的货物装卸设施。"
 HKG_victoria_harbour_expand_plus_desc: "维多利亚港已全面实现现代化功能：自动化码头、深水泊位，以及该地区最高的货物吞吐量。"
 legacy_of_handover_hong_kong: "收返香港的遗产"
 legacy_of_handover_hong_kong_desc: "1997年的回归在香港与内地之间建立了制度、经济和文化联系，这些联系在几十年后的今天仍然影响着政策。"
 Basic_Law_HKG: "§8§H[HKG.GetFlag]香港特别行政区§!基本法§!"
 Basic_Law_milltary_HKG: "[HKG.GetFlag]香港特别行政区基本法"
 Basic_Law_milltary_HKG_desc: "根据《基本法》，国防权归中央政府所有。香港没有独立的武装力量；所有对外防御任务均由中国人民解放军驻港部队承担。"
 Basic_Law_HKG_desc: "《基本法》是香港从英国移交到中华人民共和国后香港特别行政区的奠基文件。除其他外，该文件概述了香港相对于中国的地位，赋予香港除国防和外交事务以外的所有事务的自治权，这两项事务均委托给中央政府。\n\n§W----------\n作为§Y[HKG.GetFlag]§!§H特别行政区§!，没有自己的防卫部队，防卫预算所需水平将维持在§H0§!，并且不允许修改§G军事花费§!。§!"
 One_Country_Two_Systems: "一国两制"
 One_Country_Two_Systems_desc: "§Y[HKG.GetFlag]香港§!与§Y[MAC.GetFlag]澳门§!保证享有50年不受中国直接统治的自治权。一国两制的模式使得香港和澳门许多宝贵的政治自由得到保留和发展，例如言论自由和公共集会自由。内地缺乏这些权利是香港政坛支持“泛民主派”阵营的一个重要推动因素，许多关心此事的香港人仍对与中国大陆进一步融合持谨慎态度。"
 Localist_Movement: "本土运动"
 Localist_Movement_desc: "自1997年回归以来，中国内地与香港人之间的紧张关系导致一些香港本地人产生了本土主义的“香港优先”情绪。这种情绪对共产主义中国的政治制度持不信任态度，但也认为香港人在文化上独特，而且与中国人民相比确实优越。 这场运动自2014年雨伞运动以来的兴起，改变了香港政治分歧之前较为谨慎的基调，变得更加情绪化和激进。"
 Lacks_Universal_Suffrage: "缺乏普选权"
 Lacks_Universal_Suffrage_desc: "虽然《基本法》规定行政长官和立法会最终应由普选产生，但这尚未实现，主要原因是中国政府担心，如果更受欢迎的泛民主派控制香港政府，将会发生什么。"
 Limited_Universal_Suffrage: "有限普选"
 Limited_Universal_Suffrage_desc: "中国政府已同意香港行政长官由普选产生，但前提是候选人必须事先经过北京方面的审查。此举被普遍视为降低泛民主派或本土派候选人当选行政长官可能性的举措。"
 Universal_Suffrage: "普选"
 Universal_Suffrage_desc: "中国政府最终同意允许香港通过普选选举行政长官，不受大陆当局干预。"
 Hong_Kong_Protests: "香港抗议活动"
 Hong_Kong_Protests_desc: "继中国政府最近采取行动后，香港爆发了广泛的抗议活动，要求中国撤销此举。"
 asian_crisis_HKG_desc: "席卷东亚和东南亚发展中国家的经济危机让数十年的增长付诸东流。时至今日，对各国货币信心的丧失仍然困扰着各国央行。 公共和私人债务也飙升。\n\n我们吸取了惨痛的教训，过去不受欢迎的经济改革正在如火如荼地进行。 每个国家受到的打击不同，也都有自己的解决方案。\n\n流入受影响国家的投资曾经占全球投资总额的一半，但现在这些投资流向了[CHI.GetFlag]中国和其他地方。"
 asian_crisis_league_HKG: "席卷东亚和东南亚发展中国家的经济危机让数十年的增长付诸东流。时至今日，对各国货币信心的丧失仍然困扰着各国央行。 公共和私人债务也飙升。\n\n我们吸取了惨痛的教训，过去不受欢迎的经济改革正在如火如荼地进行。 每个国家受到的打击不同，也都有自己的解决方案。\n\n流入受影响国家的投资曾经占全球投资总额的一半，但现在这些投资流向了[CHI.GetFlag]中国和其他地方。"
 HKG_HKEX: "香港交易及结算所有限公司"
 HKG_improve_trade: "吸引外资"
 HKG_improve_trade_desc: "为深化香港与亚洲及其他地区的贸易关系，各方协调努力：签署新协议、简化海关手续、积极设立使馆商务处。"
 HKG_idea_T_PARK: "§5源·区§!"
 HKG_idea_T_PARK_desc: "源·区设施处理香港的污水污泥，同时发电，既是废物管理基础设施，也是环境展示场所。"
 HKG_new_develop_idea_dynamic_modifier: "新发展理念"
 HKG_new_develop_idea_dynamic_modifier_desc: "新发展计划对香港经济和基础设施基础的综合影响。"
 HKG_idea_secondary_education_reform: "中学教育改革"
 HKG_idea_secondary_education_reform_desc: "中学原有的3-2-2-3学制被美国和中国大陆已采用的3-3-4学制所取代。重复和过时的课程内容被删除，并引入了更广泛的选修科目。"
 HKG_idea_patriotic_education_reform: "爱国主义教育改革"
 HKG_idea_patriotic_education_reform_desc: "香港现行课程中没有爱国主义教育的位置。引入通识教育正是为了填补这一空白。"
 HKG_idea_chinese_based_education_reform: "中文教育课程改革"
 HKG_idea_chinese_based_education_reform_desc: "香港所有学校现在都用中文授课。所有孩子都被要求会说中文。"
 HKG_rise_of_internet: "互联网的兴起"
 HKG_rise_of_internet_desc: "互联网为人类发展带来了新的方向，但谁也不知道这只是昙花一现，还是未来几十年的发展趋势……"
 HKG_idea_SARS_outbreak: "SARS的影响"
 HKG_idea_SARS_outbreak_desc: "非典疫情对香港经济和公众信心造成了沉重打击，扰乱了全市的旅游业、零售业和日常生活。"
 HKG_idea_railway_development_strategy_2000: "2000年铁路发展战略"
 HKG_idea_railway_development_strategy_2000_desc: "《2000年铁路发展策略》是港铁未来十年扩张的指导计划。"
 HKG_patriotic_loyalist_drive: "爱国忠诚主义者运动"
 HKG_patriotic_loyalist_drive_desc: "国家安全教育渗透到学校、广播机构和公共服务部门。其结果是公众更加顺从，党的机构更加强大，但代价是思想开放性和研究产出下降。"
 HKG_loyalist_civil_service_purge: "效忠派公务员清洗"
 HKG_loyalist_civil_service_purge_desc: "审查委员会对公务员队伍进行彻底搜查，找出那些摇摆不定者和暗中持不同意见者。清洗过程中，日常行政工作会受到影响，但最终形成的官僚机构将只听命于一位领导人。"
 HKG_mainland_talent_scheme: "内地人才计划"
 HKG_mainland_talent_scheme_desc: "香港行政岗位的空缺由内地受训的专业人士填补。科研产出恢复，各部门运转高效，但本地劳动力萎缩意味着在本地动员政治力量变得更加困难。"
 HKG_gba_integration_idea: "大湾区一体化"
 HKG_gba_integration_idea_desc: "香港、澳门、深圳和珠海现在作为一个功能完善的经济体运作。工业产出和贸易繁荣发展，特区与内地之间的界限也人为地变得模糊不清。"
 HKG_great_hong_kong_nation_idea: "大香港国"
 HKG_great_hong_kong_nation_idea_desc: "香港已公开宣布主权，公然对抗北京。气氛高度紧张：士气高昂，征兵范围广泛，亲历“雨伞镇压”一代人已准备好捍卫他们为之奋斗的独立。与内地的关系陷入僵局。"
 HKG_city_state_doctrine: "城邦理论"
 HKG_city_state_doctrine_desc: "香港效仿新加坡模式：规模小、保持中立、经济繁荣、技术官僚主导。贸易和金融是其经济命脉，港口是国家的生命线，军事野心完全服从于商业务实主义。"
 HKG_under_british_wing_idea: "在英国的庇护下"
 HKG_under_british_wing_idea_desc: "香港已正式确立其在安全和政治上与英国及更广泛的英联邦保持一致的立场。这体现在：允许来自英语国家的军队自愿进入香港，以优惠条件获得技术许可，以及明确的外交姿态：伦敦而非北京才是主导伙伴。"
 HKG_pro_democracy_media: "亲民主媒体宪章"
 HKG_pro_democracy_media_desc: "《苹果日报》、《立场新闻》、香港电台以及数十家规模较小的媒体机构都受到明确的法律保护，免受政治干预。内地虚假信息网络难以获得影响力，公共舆论也明显倾向于民主规范。"
 HKG_civil_society_funding: "民间社会资金"
 HKG_civil_society_funding_desc: "非政府组织、社区协会和民主倡导团体获得透明的公共资金。其结果是公民参与度更高，民主阵营也在悄然壮大，而这一切都由公共资金支持。"
