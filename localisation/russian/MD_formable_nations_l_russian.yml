l_russian:
 form_BLT_category: "Объединение Балтии"
 form_BLT_category_desc: "Балтийские государства — это союз государств Эстонии, Латвии и Литвы. Эти три страны долгое время были добычей хищников европейской геополитики и продолжают страдать от рук европейского империализма. Борьба с влиянием и давлением иностранных благодетелей — это необходимость и главный приоритет. Мы можем достичь этой цели, объединив нации и став едиными. Нацией людей, которые могут противостоять давлению иностранного влияния и утвердиться в качестве члена на мировой арене, а не дорожной кочки для других наций."
 BLT_integrate_start: "Begin forming [GetBLTNameDef]"
 BLT_integrate_start_desc: "It is time to form the Baltic States.\n\n"
 BLT_integrate_LIT: "Integrate [GetBLTNameAdj] [LIT.GetAdjective] Territories"
 BLT_integrate_LIT_desc: "Литва - самая большая из трех стран Балтии. Она превосходит Латвию и Эстонию по большинству показателей, таких как население, ВВП, площадь земли и численность населения. Интеграция этой страны потребует значительного количества ресурсов от нашего государства, но это пойдет на пользу нашему новому балтийскому государству."
 BLT_integrate_LAT: "Integrate [GetBLTNameAdj] [LAT.GetAdjective] Territories"
 BLT_integrate_LAT_desc: "Латвия — это еще одна страна Балтийского региона. Она соединяет Литву и Эстонию и имеет очень важное стратегическое положение. Интеграция этой страны потребует значительных ресурсов от нашего государства, но принесет пользу нашему новому Балтийскому государству."
 BLT_integrate_EST: "Integrate [GetBLTNameAdj] [EST.GetAdjective] Territories"
 BLT_integrate_EST_desc: "Эстония - самая маленькая из трех стран Балтии, но обладает самой большой береговой линией из всех трех государств. Ее экономика в основном построена на опоре на эту береговую линию и лесном хозяйстве. Эстонский народ - это невероятное дополнение к нашей новой великой нации. Интеграция этого народа потребует от нашей страны определенных ресурсов. Тем не менее, это пойдет на пользу нашему новому балтийскому государству."
 BLT_update_flag: "Finish Forming [GetBLTNameDef]"
 BLT_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetBLTNameDef], adopting its unified flag and name."
 form_FCA_category: "Объединение Центральной Америки"
 form_FCA_category_desc: "Федеративная Республика Центральной Америки существовала в начале XIX века. Это был союз государств с территорий бывшего генерального капитанства Гватемала Новой Испании. В ее состав входили страны Коста-Рика, Сальвадор, Гватемала, Гондурас, Никарагуа, а также части Мексики и Белиза. Объединение федерации станет испытанием для наций, поскольку они объединят множество идеологий."
