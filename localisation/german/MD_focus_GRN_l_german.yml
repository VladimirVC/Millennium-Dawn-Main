 greenland_subterfuge_event.12.o1: "I Can Agree To Free"
 greenland_subterfuge_event.12.o2: "We're Doing Fine, Thank You"
 greenland_subterfuge_event.13.t: "Norway Accepts"
 greenland_subterfuge_event.13.d: "The Norwegian government has accepted the investments and now we'll begin to prepare for what we planning with the civilian population to distance the nation from NATO."
 greenland_subterfuge_event.13.o1: "Let's See What They Do"
