 advanced_production_modifier: "Restrições Avançadas de Produção de Energia"
 advanced_production_modifier_desc: "Quando começar a acabar Metais Tecnologicos ([?THIS.resource@tungsten|+]), Metais Preciosos ([?THIS.resource@chromium|+]), Petroleo ([?THIS.resource@oil|+]), ou Borracha ([?THIS.resource@rubber|+]), nossos microchip e/ou produção composta será prejudicada. Qualquer deficit em qualquer recurso vai resultar em uma diminuição em microchip e/ou produção composta. Por outro lado, com a produção de microchip precisando de quantidades significativas de energia, quedas de energia vão reduzir a produção pelo [?unfulfilled_energy_demand_dynmod_var|%]\n\n§Y A redução de produção sempre será limitado em §! §R 95% §! §Y dos números base de produção. §!"
 civilian_microchip_consumption_modifier: "Consumo de Microchips Industrial & Civil"
 civilian_microchip_consumption_modifier_desc: "Nossa população e industrias avançadas vão começar a consumir microchips, enquanto cada vez mais tecnologias ficarem disponíveis para empresas e cidadãos. Precisaremos corresponder a demanda, senão nossa linha de produção vai travar. Durante guerras, a produção militar será priorizada em detrimento ao uso civil, mas isso pode gerar descontentamento na população, como as demandas não estão sendo cumpridas."
 is_currently_importing_oil_tt: "[THIS.GetNameWithFlag] está comprando §Y Combustível Fóssil §! de outro país.\n"
 has_sufficient_reactor_material_tt: "[THIS.GetNameWithFlag] tem pelo menos 5.000 §Y Material Nuclear Destinado a Reatores §! (Atual:[?THIS.var_reactor_material_stockpile|Y0])\n"
 early_renewables_9: "Advanced Wind Turbine Controls"
 early_renewables_9_desc: "Cutting-edge control systems optimize wind turbine performance by adjusting blade pitch and yaw angles to extract maximum energy from varying wind conditions."
 renewables_9: "Perovskite Solar Cells"
 renewables_9_desc: "Perovskite solar cells become commercially viable, offering higher efficiency and lower production costs, further driving the adoption of solar energy."
 renewables_10: "Tidal Powerplants"
 renewables_10_desc: "We can utilise the power from the ocean's tides to supply coastal cities."
 renewables_11: "Tidal Expansion"
 renewables_11_desc: "Advancements in tidal energy conversion allows us to set-up modules denser than before, as well as expanding further away from the shore."
 renewables_12: "Volcanic Energy Plants"
 renewables_12_desc: "Setting up power plants close to active volcanoes allows us to harvest the immense geothermal energy provided, additionally allowing us to throttle down the threats of eruptions."
 renewables_13: "Asthenosphere Siphoning"
 renewables_13_desc: "Expanding the idea of volcanic powerplants to areas of violent seismic activity gives us better access to the geothermal energy from the Earth's asthenosphere."
 fuel_efficiency_7: "Quantum Fuel Optimization"
 fuel_efficiency_7_desc: "Applying quantum computing to fuel systems allows us to manage energy production on an even more detailed level."
 fuel_efficiency_8: "AGI Implementation"
 fuel_efficiency_8_desc: "AGI can micro-manage the fuel conversion at a much better rate than previously before."
 fuel_efficiency_9: "Specialised Fuel Nanofibers"
 fuel_efficiency_9_desc: "Sophisticated fibers limit the escape of heat more than ever before."
 fuel_efficiency_10: "Superintelligent Monitoring"
 fuel_efficiency_10_desc: "Implementing superintelligent AI in the process allows to have near absolute control over the energy conversion process."
 energy_efficiency_9: "Quantum Energy Efficiency"
 energy_efficiency_9_desc: "We can use quantum technology to improve the energy efficiency of our equipment."
 energy_efficiency_10: "Advanced Quantum Efficiency"
 energy_efficiency_10_desc: "Applying the latest technological findings in quantum technology further increases efficiency."
 energy_efficiency_11: "Quantum Energy Reclamation"
 energy_efficiency_11_desc: "Advancements in our understanding of quantum physics allows for reclamation of energy on the atomic level."
 energy_efficiency_12: "Quantum Siphoning"
 energy_efficiency_12_desc: "It is possible to siphon out the quantum foam changes and convert it to electrical energy. We have turned around energy loss into energy gain!"