 UKR_propose_full_union_state: "Настоящее союзное государство"
 UKR_propose_full_union_state_desc: "Пришло время нам с Россией стать настоящим Союзным государством!"
 UKR_pan_slavic_ssr: "Союз славянских республик"
 UKR_pan_slavic_ssr_desc: "Наконец-то все славяне станут едины!"
 UKR_vetrenko_surrort_nationalism: "Русско-украинский национализм"
 UKR_vetrenko_inner_idea: "Внутренняя политика"
 UKR_vetrenko_inner_idea_desc: "Мы готовы проводить политику независимости от Запада и укрепления Украины — мы сыты по горло диктатурой западного капитала."
 UKR_vetrenko_christian_socialism: "Христианский социализм"
 UKR_vetrenko_christian_socialism_desc: "В Украине Бог и социализм идут рука об руку."
 UKR_vetrenko_west_idea: "Антизападная доктрина"
 UKR_vetrenko_west_idea_desc: "Мы не скрываем, что Запад является нашим идеологическим и прямым врагом."
 UKR_vetrenko_pioneria: "Национальная пионерия"
 UKR_vetrenko_women_idea: "Национальный феминизм"
 UKR_vetrenko_women_idea_desc: "Женщины Украины рука об руку с мужчинами построят великое государство."
 UKR_vetrenko_iron_woman: "Украинская железная женщина"
 UKR_vetrenko_iron_woman_desc: "Витренко стал для нас тем же, кем была Маргарет Тэтчер."
 UKR_vetrenko_health_free_idea: "Бесплатное здравоохранение"
 ukraine_nazbol.1.t: "Начать вторжение в [FROM.GetName]?"
 ukraine_nazbol.1.d: "Нам удалось поднять восстание в этой стране, но теперь нам нужно решить, готовы ли мы положить ему конец и признать, что эта революция — наше дело."
 ukraine_nazbol.1.a: "Да"
 ukraine_nazbol.1.b: "Нет"
 ukraine_nazbol.2.t: ""
 ukraine_nazbol.2.d: ""
 ukraine_nazbol.2.a: ""
 ukraine_nazbol.3.t: "Национал-большевистская революция!"
 ukraine_nazbol.3.d: "Неожиданно для нас в нашей стране произошла революция под лозунгами национал-большевиков! Мы в срочном порядке мобилизовали армию и все вооружённые силы для борьбы с сепаратистами. Мы знаем, что ими руководит [UKR.GetName], и намерены разобраться с этим в будущем."
 ukraine_nazbol.3.a: "Неожиданно..."
 ukraine_nazbol.4.t: "[FROM.GetName] восхваляет наследие Российской империи"
 ukraine_nazbol.4.d: "Правительство Украины прямо на государственном уровне заявляет о прославлении прошлого и наследия Российской империи, и мы должны как-то отреагировать на этот шаг."
 ukraine_nazbol.4.a: "Мы тоже гордимся"
 ukraine_nazbol.4.b: "Мы осуждаем это"
 ukraine_nazbol.5.t: "[FROM.GetName] солидарен с нами"
 ukraine_nazbol.5.d: "[FROM.GetName] солидарен с нами в вопросе наследия Российской империи и готов оказать нам поддержку на дипломатическом уровне по данному вопросу."
 ukraine_nazbol.5.a: "Это здорово!"
 ukraine_nazbol.6.t: "[FROM.GetName] осуждает нас"
 ukraine_nazbol.6.d: "[FROM.GetName] осуждает тот факт, что мы не осуждаем имперские амбиции; «Новая Россия» никогда не станет недемократическим государством и всегда будет отстаивать идеалы мирного сотрудничества, а не экспансии."
 ukraine_nazbol.6.a: "Трусы"
