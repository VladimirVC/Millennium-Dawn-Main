 form_AUSHUN_category: "Реформирование Австро-Венгерскую империю"
 form_AUSHUN_category_desc: "Австро-Венгерская империя была великой державой в Центральной Европе в конце XIX — начале XX века. Государство распалось после сокрушительного поражения в Первой мировой войне. Оно разделилось на Чехию, Австрию, Венгрию, Словакию, Словению, Боснию и части Украины, Польши и Румынии. Пришло время вернуть себе утраченную так давно славу. Пришло время реформировать Австро-Венгерскую империю."
 AUSHUN_integrate_start: "Begin forming [GetAUSHUNNameDef]"
 AUSHUN_integrate_start_desc: "The holdings of the Austro-Hungarian Empire have been reclaimed by our military and our politicians have started the work towards administering the new regions.\n\n"
 AUSHUN_integrate_AUS: "Integrate [GetAUSHUNNameAdj] [AUS.GetAdjective] Territories"
 AUSHUN_integrate_AUS_desc: "Коренные земли бывшей империи Габсбургов, Австрия должна быть одним из главных центров силы в нашей стране."
 AUSHUN_integrate_HUN: "Integrate [GetAUSHUNNameAdj] [HUN.GetAdjective] Territories"
 AUSHUN_integrate_HUN_desc: "Венгерское королевство было другой половиной Двуединой монархии, партнёром в управлении империей. Его интеграция крайне важна для восстановления имперской структуры."
 AUSHUN_integrate_SLV: "Integrate [GetAUSHUNNameAdj] [SLV.GetAdjective] Territories"
 AUSHUN_integrate_SLV_desc: "Словенские земли составляли часть Австрийских коронных земель, обеспечивая доступ к Адриатике и служа мостом между Австрией и Балканами."
 AUSHUN_integrate_NORTHITA: "Integrate [GetAUSHUNNameAdj] North Italian Territories"
 AUSHUN_integrate_NORTHITA_desc: "Итальянские территории Ломбардо-Венетии когда-то были жемчужинами Габсбургской короны, богатыми культурой и торговлей. Их возвращение восстановило бы влияние Австрии над долиной реки По."
 AUSHUN_integrate_CRO: "Integrate [GetAUSHUNNameAdj] [CRO.GetAdjective] Territories"
 AUSHUN_integrate_CRO_desc: "Хорватия входила в состав Венгерской короны со значительной автономией. Ее порты и стратегическое положение на Адриатическом побережье делали ее жизненно важной для военно-морской мощи империи."
 AUSHUN_integrate_BOS: "Integrate [GetAUSHUNNameAdj] [BOS.GetAdjective] Territories"
 AUSHUN_integrate_BOS_desc: "Управляемая Австро-Венгрией с 1878 года и официально аннексированная в 1908 году, интеграция Боснии и Герцеговины обеспечит безопасность наших южных границ и распространит наше влияние на Балканы."
 AUSHUN_integrate_SLO: "Integrate [GetAUSHUNNameAdj] [SLO.GetAdjective] Territories"
 AUSHUN_integrate_SLO_desc: "Словацкие земли были неотъемлемой частью Венгерского королевства, образуя горный северный рубеж короны. Их реинтеграция укрепляет наше влияние в Карпатах."
 AUSHUN_integrate_AUSROM: "Integrate [GetAUSHUNNameAdj] Transylvanian Territories"
 AUSHUN_integrate_AUSROM_desc: "Трансильвания была исторической коронной землёй Венгрии, оспариваемой между румынским и венгерским населением. Контроль над этим регионом обеспечивает восточные подступы к империи."
 AUSHUN_integrate_CZE: "Integrate [GetAUSHUNNameAdj] [CZE.GetAdjective] Territories"
 AUSHUN_integrate_CZE_desc: "Чешские коронные земли были одними из самых индустриально развитых и культурно богатых территорий империи. Прага была одним из великих имперских городов, и её реинтеграция крайне важна."
 AUSHUN_integrate_AUSPOL: "Интегрировать Южная Польшу"
 AUSHUN_integrate_AUSPOL_desc: "Галиция была коронной землёй, полученной в результате разделов Польши, что принесло как экономические ресурсы, так и стратегическую глубину северного рубежа империи."
 AUSHUN_integrate_WESTUKR: "Интегрировать Юго-Западную Украину"
 AUSHUN_integrate_WESTUKR_desc: "Восточные районы Галиции были населены русинским населением и обеспечивали сельскохозяйственное богатство. Их интеграция расширяет наше влияние на украинские пограничные земли."
 AUSHUN_update_flag: "Finish Forming [GetAUSHUNNameDef]"
 AUSHUN_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetAUSHUNNameDef], adopting its unified flag and name."
 is_AUSHUN: "Has formed [GetAUSHUNNameDef]"
 form_PBL_category: "Перуанско-Боливийская конфедерация"
 form_PBL_category_desc: "Перуанско-Боливийская конфедерация первоначально была недолговечным образованием в начале XIX века. Она возникла в результате раздела Перуанской республики и гражданских войн 1834 и 1835-1836 годов и включала в себя государство Боливия. Современные разговоры о ней минимальны, но, тем не менее, она постоянно присутствует в политической атмосфере боливийского и перуанского народов. Пришло время рассмотреть этот новый завтрашний день для нашего народа."
 PBL_integrate_start: "Begin forming [GetPBLNameDef]"
 PBL_integrate_start_desc: ""
 PBL_integrate_PRU: "Integrate [GetPBLNameAdj] [PRU.GetAdjective] Territories"
 PBL_integrate_PRU_desc: "Перу - более крупное из двух национальных государств в конфедерации. Оно имеет самое большое население, экономику и площадь. Интеграция Перу - это колоссальная задача, но захват этого государства - надежный шаг в интересах новой конфедерации."
 PBL_integrate_BOL: "Integrate [GetPBLNameAdj] [BOL.GetAdjective] Territories"
 PBL_integrate_BOL_desc: "Боливия - одно из двух основных национальных государств, основавших конфедерацию. Она меньше по площади, населению и экономическому потенциалу, однако это не повод для дискредитации страны. Горы богаты сырьем, которое необходимо для производства электроники и других промежуточных товаров. Интеграция этой страны укрепляет еще одну сильную позицию для нашей диверсифицированной экономики."
 PBL_integrate_WESTPAR: "Интегрировать Западный Парагвай"
 PBL_integrate_WESTPAR_desc: "Западный Парагвай не может похвастаться такими же сырьевыми ресурсами, как Западная Бразилия или Северное Чили. Тем не менее, в этом регионе много сельскохозяйственных угодий и регионов, в которых мы можем развивать промышленность нашей новой страны."
 PBL_integrate_WESTBRA: "Интегрировать Западную Бразилию"
 PBL_integrate_WESTBRA_desc: "Западная Бразилия является домом для коренного населения, богатых ресурсов и многого другого. Интеграция Западной Бразилии должна помочь улучшить положение нашей нации и увеличить земли, на которых мы можем развиваться."
 PBL_integrate_NORTHCHL: "Интегрировать Северную Чили"
 PBL_integrate_NORTHCHL_desc: "Северные регионы Чили созрели для интеграции, и мы должны привлечь их к сотрудничеству, чтобы они помогли нам в достижении наших будущих целей."
 PBL_update_flag: "Finish Forming [GetPBLNameDef]"
 PBL_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetPBLNameDef], adopting its unified flag and name."
