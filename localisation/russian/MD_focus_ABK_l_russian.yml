 CIS_two_member_state_idea: "Участник СНГ-2"
 CIS_two_member_state_idea_desc: "Содружество непризнанных государств или СНГ-2 - это союз, созданный для консультаций, взаимопомощи и координации совместных действий непризнанных государств на постсоветском пространстве."
 abkh.1.t: "Абхазия предлагает нам вступить в Содружество непризнанных государств"
 abkh.1.d: "Содружество непризнанных государств или СНГ-2 - это союз, созданный для консультаций, взаимопомощи и координации совместных действий непризнанных государств на постсоветском пространстве."
