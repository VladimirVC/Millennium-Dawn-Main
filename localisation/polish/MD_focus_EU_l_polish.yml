 EU_apply_for_membership_category: "Przystąpienie do UE"
 EU_apply_for_membership_category_desc: "Becoming a member of the EU is a complex procedure which does not happen overnight. Once an applicant country meets the conditions for membership, it must implement EU rules and regulations in all areas.\nAny country that satisfies the conditions for membership can apply. These conditions are known as the 'Copenhagen criteria' and include a free-market economy, a stable democracy and the rule of law, and the acceptance of all EU legislation, including of the euro."
 EU_apply_for_membership: "Przystąpienie do UE"
 EU_apply_for_membership_desc: "§Y[ROOT.GetNameWithFlag]§! możesz dołączyć do §C[EUU.GetFlag] Unii Europejskiej§! zaśpiewajmy Odę do radości:\nRadość, piękna iskierko Boskości,\nCórko Elizejska,\nWchodzimy pijani ogniem,\nNiebiańska, Twoje sanktuarium!\nTwoja magia ponownie wiąże\nJaki zwyczaj jest ściśle podzielony;\nWszyscy ludzie stają się bracia,\nGdzie mieszka twoje łagodne skrzydło."
 EU_adopt_EU_law: "Przyjmij prawo UE"
 EU_adopt_EU_law_desc: "Ze względu na ogromną liczbę przepisów i przepisów UE, które każdy kraj kandydujący musi przyjąć jako prawo krajowe, negocjacje wymagają czasu. W okresie przedakcesyjnym kandydaci otrzymają wsparcie finansowe, administracyjne i techniczne."
 EU_join_the_Euro: "Dołączenie do Euro"
 EU_join_the_Euro_desc: "Aby przyjąć euro, kraje UE muszą dostosować swoje ustawodawstwo krajowe do odpowiedniego prawa UE i spełnić szczególne warunki mające zapewnić konwergencję gospodarczą. Wymagania te, uzgodnione przez państwa członkowskie UE w Maastricht w 1991 r., znane są jako kryteria konwergencji."
 USoE_integrate_new_members: "Integracja nowych państw członkowskich"
 USoE_integrate_new_members_desc: "Kolejne kraje zdecydowały się pójść dalej i przystąpić do Unii. Nadszedł czas, aby zintegrować te nowe państwa członkowskie i uczynić Stany Zjednoczone Europy znacznie silniejszymi w przyszłości."
 instrument_for_pre_accession_assistance: "Instrument Pomocy Przedakcesyjnej (IPA)"
 instrument_for_pre_accession_assistance_desc: "Instrument Pomocy Przedakcesyjnej (IPA) to sposób, w jaki UE wspiera reformy w regionie objętym procesem rozszerzenia za pomocą pomocy finansowej i technicznej."
 instrument_for_pre_accession_assistance_tt: "EU candidates get §YPre-accession Assistance Programs§!"
 pre_accession_assistance_program: "Pre-Accession Assistance Program"
 pre_accession_assistance_program_desc: "§C[EUU.GetFlag][EUU.GetName]§! wspiera reformy kandydatów do członkostwa, aby mogli spełnić kryteria akcesyjne §C[EUU.GetFlag][EUU.GetName]§!. Pomoc ma na celu przede wszystkim wyeliminowanie korupcji i zapewnienie narodowi korzyści gospodarczych w celu uporządkowania finansów."
 EU_pre_accession_assistance: "Pomoc przedakcesyjna"
 EU_pre_accession_assistance_desc: "§C[EUU.GetFlag][EUU.GetName]§! wspiera reformy kandydatów do członkostwa, aby mogli spełnić kryteria akcesyjne §C[EUU.GetFlag][EUU.GetName]§!. Pomoc ma przede wszystkim na celu wyeliminowanie korupcji i zapewnienie korzyści gospodarczych, które pomogą uporządkować nasze finanse."
