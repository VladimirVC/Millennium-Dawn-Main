 #Ideas
 HKG_unrestricted_housing_market: "Unrestricted Housing Market"
 HKG_unrestricted_housing_market_desc: "Hong Kong's free housing market is among the world's most dynamic and most punishingly unaffordable. Without intervention, the gap between incomes and prices will continue to widen."
 HKG_victoria_harbour: "Victoria Harbour"
 HKG_victoria_harbour_desc: "Victoria Harbour is the historical heart of Hong Kong's port economy: container traffic, ferries, and cruise terminals all converge here."
 HKG_victoria_harbour_expand_desc: "An expanded Victoria Harbour with new container berths, deepened channels, and modernised cargo handling."
 HKG_victoria_harbour_expand_plus_desc: "Victoria Harbour at full modern capacity: automated terminals, deep-water berths, and the highest cargo throughput in the region."
 legacy_of_handover_hong_kong: "Legacy of Handover Hong Kong"
 legacy_of_handover_hong_kong_desc: "The handover of 1997 created institutional, economic, and cultural ties between Hong Kong and the mainland that continue to shape policy decades later."
 disloyal_heung_yee_kuk: "Disloyal Heung Yee Kuk"
 disloyal_heung_yee_kuk_desc: "The Heung Yee Kuk's representatives in the New Territories no longer reliably back the government's agenda, a fault line in rural politics."
 loyal_heung_yee_kuk: "Loyal Heung Yee Kuk"
 corrupt_politicians: "Corrupt Politicians"
 corrupt_politicians_desc: "Several legislators and district officials face credible corruption allegations. Public trust in the political class is eroding."
 Basic_Law_HKG: "§8The Basic Law of §H[HKG.GetFlag]Hong Kong SAR§!§!"
 Basic_Law_milltary_HKG: "The Basic Law of [HKG.GetFlag]Hong Kong SAR"
 Basic_Law_milltary_HKG_desc: "Under the Basic Law, defence is reserved to the central government. Hong Kong maintains no independent armed forces; the PLA Hong Kong Garrison fulfils any external defence role."
 Basic_Law_HKG_desc: "The Basic Law was the founding document of the Hong Kong Special Administrative Region after the handover of Hong Kong from the United Kingdom to the People's Republic of China. Among other things, the document outlines the status of Hong Kong relative to China, granted it autonomy in all matters other than defence and foreign affairs, both of which are entrusted to the central government.\n\n§W----------\nAs a §Y[HKG.GetFlag]§!§HS.A.R§!, does not have its own defense force, the Required level of defense budget will be maintained at §H0§!, and would also not allow to change §GMilitary Spending.§!§!"
 One_Country_Two_Systems: "One Country Two Systems"
 One_Country_Two_Systems_desc: "§Y[HKG.GetFlag]Hong Kong§! and §Y[MAC.GetFlag]Macau§! have been guaranteed 50 years of autonomy from direct Chinese rule. The model of one country two systems allows for a preservation and indeed growth of many of Hong Kong and Macau's treasured political freedoms, such as freedom of speech and freedom of public assembly. The absence of these rights in the mainland is a significant driver behind support for the \"pan-democrat\" camp in Hong Kong politics, with many concerned Hongkongers remaining wary of greater integration with mainland China."
 Triads: "Triads"
 Triads_desc: "When the communists took power in China, huge numbers of triad members fled to the British territory of Hong Kong for safety. In the following decades powerful triads such as the Wo Shing Wo, Sun Yee On and 14K have run protection rackets, gambling dens and other illicit activities. Despite their anti-communist roots, the triads have also started supporting Chinese interests in Hong Kong due to business connections on the mainland."
 HKG_triads_dynamic_modifier: "The Triads"
 HKG_triads_dynamic_modifier_desc: "\n\n£idea_HKG_traid_desc_picture\n\n\n\n§W--------------§!\nWhen the communists took power in China huge numbers of triad members fled to the British territory of Hong Kong for safety. In the following decades powerful triads such as the Wo Shing Wo, Sun Yee On and 14K triads have run protection rackets, gambling dens and other illicit activities. Despite their anti-communist roots, the triads have also started supporting Chinese interests in Hong Kong due to business connections on the mainland."
 HKG_police_dynamic_modifier: "Hong Kong Police Force"
 HKG_police_dynamic_modifier_desc: "\n\n£idea_HKG_traid_desc_picture\n\n\n\n§W--------------§!\nHong Kong Police, as the \"Asia's finest\", is the largest disciplined service of Hong Kong."
 Localist_Movement: "Localist Movement"
 Localist_Movement_desc: "Ever since the handover in 1997, tensions between mainland Chinese and Hongkongers have led to the development of localist \"Hong Kong First\" sentiment amongst some local Hongkongers. This sentiment views communist China's political system with distrust, but also views Hong Kong people as culturally distinct and indeed superior compared to the people of China. The rise of this movement from the 2014 Umbrella Movement onward has changed the previously more measured tone of the Hong Kong political divide into one that is more emotive and radical."
 Lacks_Universal_Suffrage: "Lacks Universal Suffrage"
 Lacks_Universal_Suffrage_desc: "While the Basic Law calls for the Chief Executive and Legislative Council to eventually be elected by universal suffrage, this eventuality has yet to come to pass primarily due to China government's concerns about what may happen if the significantly more popular pan-democrats take control of the Hongkong government."
 Limited_Universal_Suffrage: "Limited Universal Suffrage"
 Limited_Universal_Suffrage_desc: "China government has agreed to allow the Chief Executive of Hong Kong to be elected by universal suffrage, on the condition that candidates must be vetted by China government first. This is widely seen as a move to reduce the likelihood of pan-democrat or localist candidates becoming Chief Executive."
 Universal_Suffrage: "Universal Suffrage"
 Universal_Suffrage_desc: "China government has finally agreed to permit Hong Kong to elect its Chief Executive by way of universal suffrage without interference by the mainland authorities."
 Hong_Kong_Protests: "Hong Kong Protests"
 Hong_Kong_Protests_desc: "Following recent actions by the Chinese government, widespread protests have broken out in Hong Kong demanding a reversal of the Chinese move."
 asian_crisis_HKG_desc: "The economic crisis that gripped developing East and Southeast Asia threw decades of growth down the drain. The loss of confidence in the national currencies still plagues the central banks to this day. Public and private debt has also skyrocketed.\n\nPainful lessons were learned, and past unwanted economic reforms are in full swing. Each country was hit differently and each has its own solutions.\n\nThe influx of investments to the affected countries was once half of the total sum in the world, but now flows to [CHI.GetFlag]China and elsewhere."
 asian_crisis_league_HKG: "The economic crisis that gripped developing East and Southeast Asia threw decades of growth down the drain. The loss of confidence in the national currencies still plagues the central banks to this day. Public and private debt has also skyrocketed.\n\nPainful lessons were learned, and past unwanted economic reforms are in full swing. Each country was hit differently and each has its own solutions.\n\nThe influx of investments to the affected countries was once half of the total sum in the world, but now flows to [CHI.GetFlag]China and elsewhere."
 HKG_HKEX: "Hong Kong Exchanges and Clearing Limited"
 HKG_improve_trade: "Attract Foreign Investment"
 HKG_improve_trade_desc: "A coordinated push to deepen Hong Kong's trading relationships across Asia and beyond: new agreements, streamlined customs, and active embassy commercial sections."
 HKG_idea_T_PARK: "§5T-PARK§!"
 HKG_idea_T_PARK_desc: "The T-PARK facility processes Hong Kong's sewage sludge while generating electricity, serving as both waste-management infrastructure and an environmental showcase."
 HKG_new_develop_idea_dynamic_modifier: "New Development Idea"
 HKG_new_develop_idea_dynamic_modifier_desc: "The bundled effects of the New Development Initiative on Hong Kong's economy and infrastructure base."
 HKG_idea_secondary_education_reform: "Secondary Education Reform"
 HKG_idea_secondary_education_reform_desc: "Secondary Education's old 3-2-2-3 system that used to exist in secondary schools will be reformed into the 3-3-4 Scheme which widely used in the US and China Mainland. This reform will not only remove some overlapping and obsolete but also add some more interesting elective subjects."
 HKG_idea_patriotic_education_reform: "Patriotic Education Reform"
 HKG_idea_patriotic_education_reform_desc: "Patriotic education is missing from the existing Hong Kong education curriculum. We will add Liberal Studies to fill that gap."
 HKG_idea_chinese_based_education_reform: "Chinese-based Education Reform"
 HKG_idea_chinese_based_education_reform_desc: "All schools in Hong Kong must teach in Chinese. Our children must be able to speak Chinese."
 HKG_rise_of_internet: "The Rise of the Internet"
 HKG_rise_of_internet_desc: "The internet has opened a new direction for human development. Whether it proves a flash in the pan or the dominant economic trend of the coming decades remains to be seen."
 HKG_idea_SARS_outbreak: "Impact of SARS"
 HKG_idea_SARS_outbreak_desc: "SARS has had a huge impact on our society."

 HKG_idea_railway_development_strategy_2000: "Railway Development Strategy 2000"
 HKG_idea_railway_development_strategy_2000_desc: "Railway Development Strategy 2000 is plan to guide the MTR's development plan for the next ten years."

 #Pro-Beijing integration ideas
 HKG_patriotic_loyalist_drive: "Patriotic Loyalist Drive"
 HKG_patriotic_loyalist_drive_desc: "National Security Education saturates schools, broadcasters, and public service. The result is a more docile public and stronger Party institutions, at the cost of intellectual openness and research output."
 HKG_loyalist_civil_service_purge: "Loyalist Civil Service Purge"
 HKG_loyalist_civil_service_purge_desc: "Vetting committees comb the civil service for waverers and quiet dissenters. Day-to-day administration suffers while the purge runs its course, but the bureaucracy that emerges will answer to one master."
 HKG_mainland_talent_scheme: "Mainland Talent Scheme"
 HKG_mainland_talent_scheme_desc: "Hong Kong's vacated administrative ranks are filled by mainland-trained professionals. Research output recovers and offices run efficiently, but a shrinking native workforce means political power is harder to mobilise locally."
 HKG_gba_integration_idea: "Greater Bay Area Integration"
 HKG_gba_integration_idea_desc: "Hong Kong, Macao, Shenzhen and Zhuhai now operate as one functional economy. Industrial output and trade prosper, and the line between SAR and mainland blurs by design."

 #Independence triad ideas
 HKG_great_hong_kong_nation_idea: "Great Hong Kong Nation"
 HKG_great_hong_kong_nation_idea_desc: "Hong Kong has declared its sovereignty in defiance of Beijing. The mood is martial: morale is high, conscription is broad, and a generation that grew up watching the umbrella crackdowns is ready to defend the independence they fought for. Relations with the mainland are at a standstill."
 HKG_city_state_doctrine: "City-State Doctrine"
 HKG_city_state_doctrine_desc: "Hong Kong follows the Singapore model: small, neutral, prosperous, technocratic. The economy hums on trade and finance, the harbour is the lifeblood of the state, and military ambition is firmly subordinate to commercial pragmatism."
 HKG_under_british_wing_idea: "Under the British Wing"
 HKG_under_british_wing_idea_desc: "Hong Kong has formalised its security and political alignment with the United Kingdom and the wider Commonwealth. Volunteer access from Anglosphere militaries, technology licensing on preferential terms, and a clear diplomatic posture: London, not Beijing, is the senior partner."

 #Democracy / Tiananmen ideas
 HKG_pro_democracy_media: "Pro-Democracy Media Charter"
 HKG_pro_democracy_media_desc: "Apple Daily, Stand News, RTHK and dozens of smaller outlets operate under explicit legal protection from political interference. Mainland disinformation networks struggle to gain traction, and the public discourse tilts unmistakably toward democratic norms."
 HKG_civil_society_funding: "Civil Society Funding"
 HKG_civil_society_funding_desc: "NGOs, neighbourhood associations and pro-democracy advocacy groups receive transparent public funding. The result is a more engaged civic culture and a quietly stronger democratic camp, paid for through public coffers."

