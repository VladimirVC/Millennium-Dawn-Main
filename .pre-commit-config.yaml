# Pre-commit configuration for Millennium Dawn HOI4 mod
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# !! DO NOT RUN `pre-commit run --all-files` !!
# The auto-fixer hooks (trailing-whitespace, end-of-file-fixer,
# mixed-line-ending, fix-byte-order-marker) will rewrite every matching file in
# the repo and produce hundreds of whitespace-only modifications unrelated to
# your actual work. Always scope runs to specific files:
#   pre-commit run --files path/to/file1 path/to/file2
# The normal `git commit` flow already runs hooks against just the staged
# files, which is what you want.
#
# MD-specific hooks (prefixed "MD") are set to stages: [manual] by default
# so they don't block external contributors. To run them:
#   pre-commit run --hook-stage manual           # all manual hooks
#   pre-commit run md-fix-styling --hook-stage manual  # single hook
#
# Team members can enable them on every commit by adding to .pre-commit-config.yaml
# (local override, don't commit):
#   default_stages: [pre-commit, manual]

# Global exclude. resources/ is a holding area for unintegrated submods and
# external contributions — its contents are not subject to MD style rules and
# must not be auto-modified by any hook. Any hook can still re-include a path
# inside resources/ by setting its own `files:` pattern explicitly.
exclude: '^resources/'

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '(^localisation/|\.secrets\.baseline$)'
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Asset-only directories (gfx/, map/, interface/, music/, sound/) are
      # excluded from the auto-fixers below — these files use significant
      # tab/whitespace alignment that the fixers shouldn't rewrite.
      - id: trailing-whitespace
        exclude: '\.mod$|^(gfx|map|interface|music|sound)/'
      - id: end-of-file-fixer
        exclude: '\.mod$|^(gfx|map|interface|music|sound)/'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.mod$|^(gfx|map|interface|music|sound)/'
      - id: check-yaml
        files: 'localisation/english/.*\.yml$'
      - id: check-json
        files: '\.json$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=100000']  # Prevent files larger than 100MB
      - id: check-case-conflict
      - id: check-executables-have-shebangs
        files: '^tools/'
      - id: check-shebang-scripts-are-executable
        files: '^tools/'
      - id: fix-byte-order-marker
        exclude: 'localisation/.*\.yml$|^(gfx|map|interface|music|sound)/'
      - id: check-ast
        files: '\.py$'
      - id: debug-statements
        files: '\.py$'
      - id: name-tests-test
        files: 'tools/.*test.*\.py$'
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: '^tools/.*\.py$'
        args: [--line-length=88]
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        files: '^tools/.*\.py$'
        args: [--profile=black]
  # ruff lints only (undefined names, unused imports/vars, bare excepts). black
  # and isort own formatting and import order — ruff-format is intentionally not
  # used. Config (select, ignores, per-file-ignores) lives in pyproject.toml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: Lint Python (ruff)
        files: '^tools/.*\.py$'
        args: [--fix]
  # pre-commit/mirrors-prettier was archived upstream — using rbubley's
  # maintained fork. Same prettier binary; current pin tracks prettier 3.8.x.
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        name: Format Markdown files
        files: '\.md$'
        args: [--prose-wrap=preserve, --print-width=120]
        additional_dependencies:
          - prettier@3.8.3
          - prettier-plugin-astro@0.14.1
      - id: prettier
        name: Format docs content YAML (Astro)
        types: [yaml]
        files: '^docs/.*\.yml$'
        args: [--print-width=120]
        additional_dependencies:
          - prettier@3.8.3
          - prettier-plugin-astro@0.14.1
  - repo: local
    hooks:
      - id: fix-localization-encoding
        name: Validate and fix HOI4 localization UTF-8 BOM
        entry: python3 tools/linting/validate_localization_encoding.py --fix
        language: system
        files: 'localisation/english/.*\.yml$|localisation/.*_l_english\.yml$'
        pass_filenames: true
      - id: fix-loc-yaml
        name: Fix localisation YAML issues (quotes, tabs, colon-space, key:0)
        entry: python3 tools/linting/fix_loc_yaml.py --fix
        language: system
        files: 'localisation/english/.*\.yml$|localisation/.*_l_english\.yml$'
        pass_filenames: true
      - id: check-mod-file-encoding
        name: Check .mod file UTF-8 encoding
        entry: python3 tools/linting/validate_mod_encoding.py
        language: system
        files: '\.mod$'
        pass_filenames: true
      # Runs the full tools test suite before push (not on every commit).
      # Enable with: pre-commit install --hook-type pre-push
      - id: tools-pytest
        name: Run tools test suite (pytest)
        entry: python3 -m pytest
        language: system
        files: '^tools/.*\.py$'
        pass_filenames: false
        stages: [pre-push]
      # --- MD-specific hooks (manual by default) ---
      - id: md-fix-styling
        name: MD Fix Styling (auto-fix spaces/tabs/braces)
        entry: python3 tools/linting/fix_styling.py --mode staged
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-standardize
        name: MD Standardize (auto-fix ideas/events/decisions/focuses)
        entry: python3 tools/standardize_staged.py
        language: system
        files: '(common/national_focus|common/decisions|common/ideas|events)/.*\.txt$'
        pass_filenames: true
        stages: [manual]
      - id: md-validate-style
        name: MD Style & Standards (braces, indent, spacing, focus/event standards)
        entry: python3 tools/validation/validate_style.py --staged --strict --no-color
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: false
      - id: check-common-mistakes
        name: MD Common Mistakes (threat scale, value ranges, always=no, etc.)
        entry: python3 tools/linting/check_common_mistakes.py --mode staged
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: false
      - id: md-validate-oob-units
        name: MD Validate OOB unit names
        entry: python3 tools/validation/validate_oob_units.py --staged --strict --no-color
        language: system
        files: '(history/units|common/units|common/ai_templates|common/scripted_effects)/.*\.txt$'
        pass_filenames: false
      - id: md-validate-ai-roles
        name: MD Validate AI role references
        entry: python3 tools/validation/validate_ai_roles.py --staged --strict --no-color
        language: system
        files: '(common/ai_strategy|common/ai_templates)/.*\.txt$'
        pass_filenames: false
      - id: md-validate-defines
        name: MD Validate defines against vanilla
        entry: python3 tools/validation/validate_defines.py --staged --strict --no-color
        language: system
        files: 'common/defines/.*\.lua$'
        pass_filenames: false
      - id: md-validate-ai-navy
        name: MD Validate AI navy (ship types, missions, fleet refs)
        entry: python3 tools/validation/validate_ai_navy.py --staged --strict --no-color
        language: system
        files: '(common/ai_navy|common/units)/.*\.txt$'
        pass_filenames: false
      - id: md-validate-ai-equipment
        name: MD Validate AI equipment coverage (naval/land/air)
        # No --strict: pre-existing coverage gaps would block all commits
        entry: python3 tools/validation/validate_ai_equipment.py --staged --no-color
        language: system
        files: 'common/ai_equipment/.*\.txt$'
        pass_filenames: false
      - id: md-validate-agency-upgrades
        name: MD Validate intelligence agency upgrade integration
        entry: python3 tools/validation/validate_agency_upgrades.py --staged --strict --no-color
        language: system
        files: '(common/intelligence_agency_upgrades/.*\.txt|common/on_actions/MD_auto_agency_on_actions\.txt|common/scripted_guis/00_MD_auto_agency_scripted_gui\.txt|localisation/english/MD_auto_agency_l_english\.yml)$'
        pass_filenames: false
      - id: md-validate-ideas
        name: MD Validate idea references (undefined ideas, redundant allowed blocks)
        entry: python3 tools/validation/validate_ideas.py --staged --strict --no-color --workers 4
        language: system
        files: '(common/ideas|common/national_focus|common/decisions|events)/.*\.txt$|localisation/english/.*\.yml$'
        pass_filenames: false
      - id: md-validate-scripted-gui
        name: MD Validate scripted GUI cross-references
        # Cross-references scripted_guis with interface/.gui, interface/.gfx and
        # localisation/english/*.yml. Catches silent failures (dead handlers,
        # missing tooltip loc keys, broken [!] formatters, missing windows or
        # containers). Runs on changes to any of those file kinds; reports only
        # issues involving the staged files.
        entry: python3 tools/validation/validate_scripted_gui.py --staged --strict --no-color
        language: system
        files: '(common/scripted_guis/.*\.txt|interface/.*\.(gui|gfx)|localisation/english/.*\.yml)$'
        pass_filenames: false
        # Manual: rebuilds the full interface/*.gfx + *.gui index every run (~1.3s)
        # and the loc trigger fires it on most commits. CI gates it; run locally
        # with: pre-commit run md-validate-scripted-gui --hook-stage manual
        stages: [manual]
      - id: md-validate-events
        name: MD Validate event definitions
        entry: python3 tools/validation/validate_events.py --staged --strict --no-color
        language: system
        files: 'events/.*\.txt$'
        pass_filenames: false
      - id: md-validate-scripted-localisation
        name: MD Validate scripted localisation references
        entry: python3 tools/validation/validate_scripted_localisation.py --staged --strict --no-color --workers 4
        language: system
        files: '(common/scripted_localisation/.*\.txt|interface/.*\.gfx)$'
        pass_filenames: false
        # Manual: full-repo cross-reference scan (~1.3s). CI gates it.
        stages: [manual]
      - id: md-validate-localisation
        name: MD Validate localisation (duplicates, color codes, headers)
        entry: python3 tools/validation/validate_localisation.py --staged --strict --no-color --workers 4
        language: system
        files: 'localisation/english/.*\.yml$'
        pass_filenames: false
        # Manual: scans all localisation/english/*.yml every run (~0.8s) and the
        # .yml trigger fires it on most content commits. CI gates it.
        stages: [manual]
      - id: md-validate-cosmetic-tags
        name: MD Validate cosmetic tag references
        entry: python3 tools/validation/validate_cosmetic_tags.py --staged --strict --no-color --workers 4
        language: system
        files: '(common|events|history)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-decisions
        name: MD Validate decision definitions
        entry: python3 tools/validation/validate_decisions.py --staged --strict --no-color --workers 4
        language: system
        files: '(common/decisions|common/balance_of_power)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-variables
        name: MD Validate variable and event target references
        entry: python3 tools/validation/validate_variables.py --staged --strict --no-color --workers 4
        language: system
        files: '(common|events|history)/.*\.txt$|localisation/english/.*\.yml$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-history-techs
        name: MD Validate history technology dependencies
        entry: python3 tools/validation/validate_history_techs.py --staged --strict --no-color
        language: system
        files: '(common/technologies|history/countries)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-unused-scripted
        name: MD Validate unused scripted effects and triggers
        entry: python3 tools/validation/validate_unused_scripted.py --staged --strict --no-color
        language: system
        files: '(common/scripted_effects|common/scripted_triggers)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-factions
        name: MD Validate faction system references
        entry: python3 tools/validation/validate_factions.py --staged --strict --no-color
        language: system
        files: 'common/factions/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-focus-tree
        name: MD Validate focus tree structure (orphans, cycles, duplicates)
        entry: python3 tools/validation/validate_focus_tree.py --staged --strict --no-color
        language: system
        files: 'common/national_focus/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-modifiers
        name: MD Validate modifier names (unknown/typo detection)
        # No --strict: frequency-based detection has inherent false positives
        # for rarely-used but valid vanilla modifiers
        entry: python3 tools/validation/validate_modifiers.py --staged --no-color
        language: system
        files: '(common/ideas|common/national_focus|common/decisions|common/dynamic_modifiers)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-on-actions
        name: MD Validate on_actions event references
        entry: python3 tools/validation/validate_on_actions.py --staged --strict --no-color
        language: system
        files: '(common/on_actions|events)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-scripted-params
        name: MD Validate scripted effect parameter contracts
        entry: python3 tools/validation/validate_scripted_params.py --staged --strict --no-color
        language: system
        files: '(common/scripted_effects|common/national_focus|common/decisions|events)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-simplifications
        name: MD Suggest scope merges (consecutive same-scope blocks)
        # No --strict: WARNING-only simplification hints, never block a commit.
        entry: python3 tools/validation/validate_simplifications.py --staged --no-color
        language: system
        files: '(common/national_focus|common/decisions|common/scripted_effects|common/scripted_triggers|common/on_actions|events)/.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-gfx-references
        name: MD Validate GFX sprite references (.gui vs .gfx)
        entry: python3 tools/validation/validate_gfx_references.py --staged --strict --no-color
        language: system
        files: '(interface/.*\.(gui|gfx)|common/scripted_guis/.*\.txt|common/scripted_localisation/.*\.txt)$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-unused-textures
        name: MD Validate unused textures (slow; manual)
        # Manual: full-repo scan is slow and currently reports ~22k legacy
        # unreferenced textures. CI runs it informationally (no --strict) so
        # the report is visible without gating PRs. Run before mod-size
        # cleanup passes:
        #   pre-commit run md-validate-unused-textures --hook-stage manual
        entry: python3 tools/validation/validate_unused_textures.py --no-color
        language: system
        files: '\.(gfx|asset|dds|tga|png)$'
        pass_filenames: false
        stages: [manual]
      - id: md-validate-set-variables
        name: MD Validate set_variable references
        entry: python3 tools/validation/validate_set_variables.py --staged --no-color --workers 4
        language: system
        files: '(common|events|history)/.*\.txt$|localisation/english/.*\.yml$'
        pass_filenames: false
        stages: [manual]
      - id: validate-staged
        name: MD Validate staged files
        entry: python3 tools/validate_staged.py
        language: system
        files: '(events/.*\.txt|common/.*\.txt|history/.*\.txt|localisation/.*\.yml)$'
        pass_filenames: false
        stages: [manual]
