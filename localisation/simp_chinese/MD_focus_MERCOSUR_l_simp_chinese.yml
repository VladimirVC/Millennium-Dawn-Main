 mercosur.02.t: "以联系国身份加入南方共同市场的邀请"
 mercosur.02.d: "[FROM.GetName]已向我们提出加入南方共同市场作为联系国的提议。该提案虽未涉及完全成员国身份，但将使我们置身于一个显然正试图重拾昔日雄心的区域集团轨道之内。接受这一提议将意味着我们的未来至少部分与南美洲一体化项目绑定。"
 mercosur.02.a: "接受联系国身份。"
 mercosur.02.b: "暂时拒绝。"
 mercosur.03.t: "接受联系国身份"
 mercosur.03.d: "[FROM.GetName]已接受我方邀请，同意以联系国身份加入南方共同市场。此举虽在纸面上规模有限，却具有重要的政治意义：又一个国家认定，融入该集团比完全置身事外更为稳妥。"
 mercosur.03.a: "很好。"
 mercosur.04.t: "拒绝联系国身份"
 mercosur.04.d: "[FROM.GetName]已暂时拒绝了我们的提议。该国政府宁愿保持距离也不愿卷入纠葛，即便存在加强联系的意愿，也未能压倒其谨慎态度。大门依然敞开，但后续仍需我们再次推动。"
 mercosur.04.a: "真是不幸。"
 mercosur.05.t: "全面会员资格谈判开始"
 mercosur.05.d: "与[CHL.GetName]的正式谈判已经开始。若谈判成功，南方共同市场不仅将确立其大陆影响力，更将通过吸纳另一国家全面加入其组织体系来证明这一点。"
 mercosur.05.a: "继续。"
 mercosur.06.t: "正式成员邀请"
 mercosur.06.d: "[FROM.GetName]已邀请我们一劳永逸地解决南方共同市场正式成员国的问题。我们可以选择立即加入，也可以在迈出最后一步之前，坚持争取更广泛的支持与准备方案，或是认定时机尚不成熟。无论我们做出何种选择，这一决定都将表明我们打算将自身未来与该集团紧密捆绑到何种程度。"
 mercosur.06.a: "接受立即成为正式成员国。"
 mercosur.06.b: "接受，但要求分步加入。"
 mercosur.06.c: "保持联系国地位。"
 mercosur.07.t: "要求分步加入"
 mercosur.07.d: "[FROM.GetName]已原则上接受我方加入，但更倾向于在正式成为成员国之前，先达成一揽子更广泛的投资、协调与政治互信安排。其入盟进程将分阶段展开，而我方如何处理此事，将决定未来数年内该国与本集团关系的基调。"
 mercosur.07.a: "开始工作。"
 mercosur.08.t: "拒绝全面会员资格"
 mercosur.08.d: "[FROM.GetName]暂时拒绝了成为正式成员国。无论是出于谨慎、自尊还是国内犹豫，他们尚未准备好让南方共同市场成为其政治版图中永久的一部分。"
 mercosur.08.a: "以后再说。"
 mercosur.09.t: "联系国谈判开启"
 mercosur.09.d: "我国外交官已就[PRU.GetName]成为南方共同市场联系成员国一事展开磋商。这项提议既足够务实以展现可行性，又具备足够分量来检验\"南美团结\"的表述是否仍能在他国政府产生影响力。"
 mercosur.09.a: "继续。"
 mercosur.10.t: "联系国谈判开启"
 mercosur.10.d: "我国外交官已就[COL.GetName]成为南方共同市场联系成员国一事展开磋商。这项提议既足够务实以展现可行性，又具备足够分量来检验\"南美团结\"的表述是否仍能在他国政府产生影响力。"
