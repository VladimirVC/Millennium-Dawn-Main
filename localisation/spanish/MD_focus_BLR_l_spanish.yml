 BLR_Minotor_category: "Servicio Minotor"
 BLR_Minotor_category_desc: "Minotor-Service es una empresa bielorrusa con sede en Minsk, dedicada al desarrollo, producción, modernización, reparación y mantenimiento de vehículos de combate sobre orugas, así como al suministro de repuestos. Es una de las empresas líderes del complejo militar-industrial del país."
