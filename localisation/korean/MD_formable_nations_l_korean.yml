 UTS_integrate_TAJ: "타지키스탄 통합"
 UTS_integrate_TAJ_desc: ""
 UTS_integrate_KYR: "[GetUTSNameAdj] [KYR.GetAdjective] 영토 통합"
 UTS_integrate_KYR_desc: ""
 UTS_update_flag: "[GetUTSNameDef] 형성 완료"
 UTS_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetUTSNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_MAPHI_category: "마필린도"
 form_MAPHI_category_desc: "마필린도는 1960년에 제안된 말레이 제도의 세 동남아 국가들 간의 비정치적인 연방입니다. 이는 인도네시아 국가들간의 분쟁과 더불어 말레이 연방의 갈등으로 인해 실현되지 못하였습니다. 이 세 국가가 통합된다면 세계를 주릅 잡고 견제 할 수 있는 연방을 형성할 수 있을 겁니다."
 MAPHI_integrate_start: "[GetMAPHINameDef] 형성 시작"
 MAPHI_integrate_start_desc: "마필린도의 통일은 우리 국가 인민들에게 새로운 시대의 시작을 알립니다. 이제 하나로 뭉쳐 우리의 집단적 인민을 위한 새로운 미래를 열어갈 때입니다.\n\n"
 MAPHI_integrate_IND: "[GetMAPHINameAdj] [IND.GetAdjective] 영토 통합"
 MAPHI_integrate_IND_desc: "인도네시아는 구상 중인 국가의 자원이 풍부한 핵심 지역입니다. 그들이 가져올 수 있는 자원과 인구를 위해 인도네시아를 통합하는 것은 필수적입니다."
 MAPHI_integrate_PHI: "[GetMAPHINameAdj] [PHI.GetAdjective] 영토 통합"
 MAPHI_integrate_PHI_desc: "필리핀은 태평양의 주요 해군 및 무역 중심지입니다. 이 국가를 통합하면 태평양 지배를 시작할 가능성이 훨씬 더 높아질 것입니다."
 MAPHI_integrate_SIN: "[GetMAPHINameAdj] [SIN.GetAdjective] 영토 통합"
 MAPHI_integrate_SIN_desc: "싱가포르는 신생 국가의 핵심 거점입니다. 주요 무역 항구이자 금융 중심지로서의 위치는 신생 국가의 성공에 결정적인 역할을 합니다."
 MAPHI_integrate_MAY: "[GetMAPHINameAdj] [MAY.GetAdjective] 영토 통합"
 MAPHI_integrate_MAY_desc: "말레이시아는 정치적으로 이 국가의 핵심 축 중 하나입니다. 반도를 소유함으로써 아시아 내부의 육로에 접근할 수 있게 해줍니다."
 MAPHI_integrate_BRU: "[GetMAPHINameAdj] [BRU.GetAdjective] 영토 통합"
 MAPHI_integrate_BRU_desc: "브루나이는 이 구상에서 작은 비중을 차지하는 국가입니다. 비록 소국이지만, 통합하는 것이 필수 불가결한 국가입니다."
 MAPHI_update_flag: "[GetMAPHINameDef] 형성 완료"
 MAPHI_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetMAPHINameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_INDOCHI_category: "인도차이나"
 form_INDOCHI_category_desc: "인도차이나는 1954년까지 존재했던 베트남, 캄보디아, 라오스의 옛 연방입니다. 이 셋이 합쳐지면 세계에서 가장 큰 경제권 중 하나가 되며 막대한 인구를 수용하게 됩니다. 이곳은 우거진 밀림, 구릉지, 산맥, 그리고 아름다운 해안선으로 이루어진 국가입니다. 이 국가의 힘은 인민, 그리고 이들을 미래로 이끌어갈 의지에 있습니다."
 INDOCHI_integrate_start: "[GetINDOCHINameDef] 형성 시작"
 INDOCHI_integrate_start_desc: "인도차이나 형성을 시작할 때가 되었습니다.\n\n"
 INDOCHI_integrate_VIE: "[GetINDOCHINameAdj] [VIE.GetAdjective] 영토 통합"
 INDOCHI_integrate_VIE_desc: "베트남은 산악 지대와 해안을 따라 엄청난 양의 천연자원을 보유하고 있습니다. 베트남을 통합함으로써 국가에 대한 우리의 장악력을 공고히 하기 시작할 것입니다."
 INDOCHI_integrate_LAO: "[GetINDOCHINameAdj] [LAO.GetAdjective] 영토 통합"
 INDOCHI_integrate_LAO_desc: "라오스 역시 베트남과 마찬가지로 엄청난 양의 천연자원을 보유하고 있습니다."
 INDOCHI_integrate_CBD: "[GetINDOCHINameAdj] [CBD.GetAdjective] 영토 통합"
 INDOCHI_integrate_CBD_desc: "캄보디아의 천혜의 지리와 비옥한 토지는 국가에 매우 중요합니다. 이들을 국가로 편입시키면 국가 전체가 지속적으로 발전할 것입니다."
 INDOCHI_update_flag: "[GetINDOCHINameDef] 형성 완료"
 INDOCHI_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetINDOCHINameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_ANDES_category: "안데스 연방"
 form_ANDES_category_desc: "안데스 연방은 [COL.GetNameWithFlag], [PRU.GetNameWithFlag], [BOL.GetNameWithFlag] 간에 제안된 국가 연합입니다. 이 연방은 국가 간의 자유 무역 및 경제 연합인 안데스 공동체를 느슨한 기반으로 삼고 있습니다. 구상 중인 신생 국가는 1억 1,300만 명이 넘는 인구와 470만 평방킬로미터에 달하는 면적을 결합하게 될 것입니다. 멕시코와 비슷한 규모에 7,500억 달러의 GDP를 가진 국가가 될 것입니다."
 ANDES_integrate_start: "[GetANDESNameDef] 형성 시작"
 ANDES_integrate_start_desc: ""
 ANDES_integrate_COL: "[GetANDESNameAdj] [COL.GetAdjective] 영토 통합"
 ANDES_integrate_COL_desc: ""
