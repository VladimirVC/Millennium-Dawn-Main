 tooltip_leader_of_EU_foreign_policy_influence_3_percent: "§C[EUU.GetFlag] Líder de la Política Exterior de la Unión Europea§! (en este orden §YAlto Representante de la Unión para Asuntos Exteriores y Política de Seguridad§!, §YPresidente de la Comisión Europea§!, §YPresidente del Parlamento Europeo§!) debe tener > 3% de influencia sobre todos los estados miembros de la §C[EUU.GetFlag] Unión Europea§!."
