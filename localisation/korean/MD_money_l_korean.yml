 INT_INVESTMENTS_TOOLTIP: "현재 §H[?int_investments|3] × 10억§!을 대외 투자 하였습니다.\n매년마다 [?roi_rate|%0]의 §H투자 환수율§!을 얻고, 매주 [int_investment_rate_color] §H× 10억§!이 §H투자 수익§!으로 재정에 들어오고 있습니다.\n현재 진행중인 §Y투자 프로젝트§!: [?active_projects|0]/15"
 INT_INVESTMENTS_TOOLTIP_DELAYED: "£key_shift  + £click_left §YShift + 좌클릭§!하여 §H투자 수입§!의 재투자 설정을 전환합니다: §Y꺼짐§! (전액 국고로) §C->§! §G전액§! (전액 재투자) §C->§! §G분할§! (절반은 국고로, 절반은 재투자).\n\n£GFX_key_ctrl + £click_left §YCtrl + 좌클릭§!하여 자동 투자 거부를 켜거나 끌 수 있습니다. 즉, 들어오는 모든 투자 제안을 자동으로 거부합니다.\n\n £GFX_click_right §Y우클릭§!하여 해외 투자금 10억 달러어치를 매각할 수 있습니다. 매각 시 금액의 60%만 회수할 수 있습니다. £GFX_key_ctrl §YCtrl§! (10배) 또는 £key_shift §YShift§!(100배)를 눌러 매각 금액을 늘릴 수 있습니다.\n\n[int_reinvestment_toggled]\n[int_auto_rejection_toggled]"
 DEBT_TOOLTIP: "§YTotal Debt§!: $[?debt|3] §Ybillion§!\n§YInterest Rate§!: [?interest_rate|2]%\n§YDebt-to-GDP§! Ratio: §Y[?debt_ratio|-%1]§!\n§YInterest on Debt§!: $[?debt_rate|-3] §Ybillion§!\n[debt_automatic_repayment_toggled]"
 DEBT_TOOLTIP_DELAYED: "£click_left §YL Click§! to borrow $ 1 §Ybillion§!.\n£GFX_click_right §YR Click§! to repay $ 1 §Ybillion§!.\n£GFX_click_right §YR Click + Alt §! to repay $[?treasury] §Ybillion§!.\nPay more with §YCtrl§!(10x), §YShift§!(100x) and §YAlt§!(1000x); up to the full treasury.\n1% borrowing fee; $ 1 §Ybillion§! borrowed = $ 1.01 §Ybillion§! debt.\n\n§YInterest Rate§! factors:\n  Debt-to-GDP Ratio: [?debt_interest_premium|-2]%\n  National Spirits: [?interest_rate_multiplier|-2]%\n  Central Bank Policy Rate: [?cb_rate_premium|-2]%\n  World Tension: [?threat_interest_premium|-2]%\n  Generated World Tension: [?adjusted_tension_premium|-2]%\n[interest_rate_clamp_line]\n§YInterest Rate§! effects:\n  §YInterest Rate§! > §Y10%§!: access to emergency decisions to handle debt.\n  §YInterest Rate§! > §Y15%§!: economic §Rslow down§!, other §Radverse effects§! and ability to default on our debt at great cost.\n  §YInterest Rate§! > §Y20%§!: restricted borrowing, and no longer able to receive loans for budget deficits.\n  §YInterest on Debt§! > §YGross Income§!: then our nation will §Rcollapse!§!\n\nEnable §YAutomatic Debt Repayment§! with §YAlt + Shift + £GFX_click_right Right Click§!; which will automatically payback 25% of any surplus."
 F_TREASURY_TOOLTIP: "§Y[THIS.GetName]§!의 국내총생산 (GDP): $§Y[?gdp_total|0]§! x10억\n§Y[THIS.GetName]§!의 1인당 국내총생산 (GDP/C): $§Y[?gdp_per_capita]§!천(x1000)\n---------\n[THIS.GetFlag] [THIS.GetAdjective] §H평균 세율§!은 [?tax_rate]% 입니다.\n\n§Y법인세율:§! [?corporate_tax_rate]%\n§Y개인세율:§! [?population_tax_rate]%\n§H실업률:§! [?total_unemployed_percentage_display|%1]\n§H물가상승률:§! [?inflation_rate_var|%1]\n\n그들은 현재 §H[?treasury] × 10억§! 달러를 보유하고 있습니다.\n\n주간 수익은 §H[?treasury_rate|+] ×10억§! 달러입니다."
 F_INT_INVESTMENTS_TOOLTIP: "그들은 현재 §H[?int_investments] × 10억§! 달러를 대외투자하였습니다.\n매주 §H[?int_investments_rate] × 10억§! 달러가 §H투자 수익§!으로 들어오고 있습니다."
 F_DEBT_TOOLTIP: "그들은 현재 §H[?debt] × 10억§! 달러의 §R부채§!가 있습니다.\n그리고 [?interest_rate]%의 §H이자율§!을 기록하고 있습니다.\n\n즉, 매주 §R[?debt_rate|-3]§! §H× 10억§! 달러의 부채가 그들의 국고에서 상환됩니다. [literacy_rate_tooltip]"
 F_EXPENSE_GAIN_TOOLTIP: "그들은 일일 지출로 §H[?display_expense] × 10억§! 달러를 소비하고 있습니다."
 F_EXPENSE_GAIN_TOOLTIP_DELAYED: "§C행정:§! §R[?bureaucracy_gain|-3]§! 달러\n§O국방:§! §R[?defence_gain|-3]§! 달러\n§8치안:§! §R[?security_gain|-3]§! 달러\n§G교육:§! §R[?education_gain|-3]§! 달러\n§P의료:§! §R[?health_gain|-3]§! 달러\n§B복지:§! §R[?welfare_gain|-3]§! 달러\n§R부채 이자:§! §R[?debt_rate|-3]§! 달러\n§7이주 통제:§! [?border_control_gain|-3] 달러\n§H기타 지출:§! §R[?additional_expenses_rate|-3]§! 달러\n\n총 지출: §R[?display_expense]§! 달러"
 F_TAX_RATE_TOOLTIP: "[THIS.GetFlag] [THIS.GetAdjective] §H평균 세율§!은 [?tax_rate]% 입니다.\n\n§Y법인세율:§! [?corporate_tax_rate]%\n§Y개인세율:§! [?population_tax_rate]%\n§H실업률:§! [?total_unemployed_percentage_display|%1]\n§H물가상승률:§! [?inflation_rate_var|%1]"
