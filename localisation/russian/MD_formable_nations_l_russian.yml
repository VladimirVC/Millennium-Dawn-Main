 form_ANZ_category: "Австралазия"
 form_ANZ_category_desc: "Австралазия - это обширный регион, включающий Австралию, Новую Зеландию и несколько мелких соседних островов в Тихом океане. Союз государств между Новой Зеландией и Австралией создает новую силу в Тихом океане, соперничающую с Индонезией и Японией за влияние в регионе."
