 BLR_558_zavod_category: "558 Planta de reparación de aeronaves"
 BLR_558_zavod_category_desc: "La Planta de Reparación de Aviación número 558 es una de las mayores empresas de la CEI dedicada a la reparación y modernización de equipos de aviación de combate modernos en servicio en las Fuerzas Aéreas de los países postsoviéticos y de muchas otras naciones. Es la instalación de reparación de aeronaves más importante de Bielorrusia, ubicada en la ciudad de Baranovichi."
