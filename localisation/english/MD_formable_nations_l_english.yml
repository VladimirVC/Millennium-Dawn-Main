 #Maphilindo
 form_MAPHI_category: "Maphilindo"
 form_MAPHI_category_desc: "A proposed, nonpolitical confederation of the three Southeast Asian in the Malay Archipelago in the 1960's. The dream was never realized due to conflict amongst the nations of Indonesia and the Federation of Malaya. The unification of the three nations would create a nation that would rival some of the major nations around the globe."

 MAPHI_integrate_start: "Begin forming [GetMAPHINameDef]"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "Indonesia is a core resource rich region for the proposed nation. It is imperative that we integrate Indonesia for the resources and the population it can bring. "
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "The Philippines is a major naval and trade hub in the Pacific. Integrating this nation will give us a much higher chance to begin the dominance of the pacific."
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "Singapore is a critical hub for the new nation. It's position as a major trade port and a financial centre makes it critical for the success of the new nation."
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "Malaysia is politically one of the core sections of the nation. It allows us to have access to land routes within Asia by owning the peninsula."
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "Brunei is a minor nation in the arrangement. The nation is something that is imperative to integrate although it is a minor state."

 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 is_MAPHI: "Has formed [GetMAPHINameDef]"

 #Indochina
 form_INDOCHI_category: "Indochina"
 form_INDOCHI_category_desc: "Indochina is a former federation of nations of Vietnam, Cambodia, and Laos that existed until 1954. The three together form one of the largest economies in the globe and accomdate a massive population. It is a nation of dense jungles, rolling hills, mountains and gorgeous coastline. It's strength is in the people and the will that will bringt he group forward into the future."

 INDOCHI_integrate_start: "Begin forming [GetINDOCHINameDef]"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "Vietnam has a massive amount of natural resources in the mountains and along the coast. Integrating Vietnam will begin solidifying our hold on the nation."
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "Laos much like Vietnam possesses massive amounts of natural resources as well."
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "Cambodia's natural geography and rich lands is important for the nation. Integrating them into the nation will also improve the nation consistently."

