 ukr_sabotage.1.t: "L'Ukraine a attaqué nos stocks"
 ukr_sabotage.1.d: "In a recent drone attack, Ukraine struck a warehouse holding some old heavy equipment."
 ukr_sabotage.1.a: "Mince"
 ukr_sabotage.2.t: "L'Ukraine a attaqué nos stocks"
 ukr_sabotage.2.d: "In a recent drone attack, Ukraine struck a warehouse holding some old light equipment."
 ukr_sabotage.2.a: "Mince"
 ukr_sabotage.3.t: "L'Ukraine a attaqué notre production militaire"
 ukr_sabotage.3.d: "In a recent drone attack, Ukraine struck one of our manufacturers, and we have suffered temporary damage."
 ukr_sabotage.3.a: "Ils vont le payer."
 UKR_our_ukraine_start: "Notre Ukraine"
 UKR_our_ukraine_start_desc: "Il est temps de remettre le pays en ordre et d'adopter des réformes libérales. Pour nous, le peuple passe avant tout !"
 UKR_our_ukraine_secretariat: "Secrétariat du président de l'Ukraine"
 UKR_our_ukraine_secretariat_desc: "Le secrétariat joue un rôle clé dans la gestion des fonctions administratives et organisationnelles liées aux activités présidentielles. L'objectif principal de sa création est de garantir le respect des pouvoirs constitutionnels du président et l'accomplissement efficace de ses devoirs."
 UKR_our_ukraine_secretariat_reduction: "Réduction du personnel du secrétariat"
 UKR_our_ukraine_secretariat_reduction_desc: "Nous devons réduire le nombre d'employés du secrétariat afin d'optimiser le fonctionnement des agences gouvernementales et de diminuer les coûts budgétaires."
 UKR_our_ukraine_decentralization: "Décentralisation"
 UKR_our_ukraine_decentralization_desc: "Nous devons renforcer le pouvoir des gouvernements locaux dans notre pays."
 UKR_our_ukraine_wto: "Demander de l'aide pour rejoindre l'OMC"
 UKR_our_ukraine_wto_desc: "Nous sommes prêts à devenir membres de l'Organisation mondiale du commerce (OMC) et avons besoin de soutien pour y parvenir."
 UKR_our_ukraine_yanukovich_go_home: "Renvoyer Ianoukovitch"
 UKR_our_ukraine_yanukovich_go_home_desc: "Ianoukovitch s'est montré lamentable en tant que Premier ministre. Nous allons le destituer et nommer un nouveau Premier ministre."
 UKR_our_ukraine_timoha: "Cabinet de Timochenko"
 UKR_our_ukraine_timoha_desc: "La célèbre Ioulia Timochenko a rejoint notre gouvernement. Voyons ce qu'elle apportera à notre État."
 UKR_our_ukraine_aviation_reform: "Réforme de l'industrie aéronautique"
 UKR_our_ukraine_aviation_reform_desc: "L'industrie aéronautique est cruciale pour notre pays, et nous allons nous efforcer de la relancer."
 UKR_our_ukraine_help_western: "Obtenir le soutien de Lviv"
 UKR_our_ukraine_help_western_desc: "We will restore the supply of hot and cold water in Lviv, thereby enlisting the support of the residents of this city and possibly the region."
 UKR_our_ukraine_cheap_gas_negotiate: "Négociations pour réduire les prix du gaz"
 UKR_our_ukraine_cheap_gas_negotiate_desc: "We will try to negotiate with Moscow on lowering energy prices."
 UKR_our_ukraine_service_life: "Raccourcir la durée du service militaire"
 UKR_our_ukraine_service_life_desc: "L'armée ukrainienne a besoin de modernisation. Notre première réforme dans ce domaine sera de réduire la durée du service militaire de deux ans à un an ! Ainsi, les conscrits perdront moins de temps à servir."
 UKR_our_ukraine_nato_eu: "Soutenir l'intégration de l'Ukraine dans l'OTAN et l'UE"
 UKR_our_ukraine_nato_eu_desc: "Lançons une intégration plus progressive dans l'OTAN et l'Union européenne (UE). C'est essentiel pour la sécurité militaire et économique de notre grand pays."
 UKR_our_ukraine_fire_corrupt: "Renvoyer les corrompus"
 UKR_our_ukraine_fire_corrupt_desc: "Il y a des personnes corrompues dans notre gouvernement, et nous allons les renvoyer ! Il n'y aura pas de place pour la corruption dans notre pays !!!"
 UKR_our_ukraine_form_new_government: "Former un nouveau gouvernement"
 UKR_our_ukraine_form_new_government_desc: "Maintenant que nous avons renvoyé tous ceux qui volaient notre pays, nous pouvons former un nouveau gouvernement honnête et juste."
 UKR_our_ukraine_fight_corruption: "Lutte contre la corruption"
 UKR_our_ukraine_fight_corruption_desc: "La corruption est l'ennemi principal de notre pays, nous allons la combattre sans relâche !"
 UKR_our_ukraine_alternative_energy_sources: "Sources d'énergie alternatives"
 UKR_our_ukraine_alternative_energy_sources_desc: "Le développement de sources d'énergie alternatives nous aidera à réduire notre dépendance envers les importations."
 UKR_our_ukraine_crush_oligarchs: "Réduire l'influence des oligarques"
 UKR_our_ukraine_crush_oligarchs_desc: "L'oligarchie est le deuxième ennemi de notre pays. Ils peuvent influencer notre gouvernement en contournant les lois. Pour éviter cela, nous réduirons leur influence et tenterons de les chasser de notre pays."
 UKR_our_ukraine_increase_media_freedom: "Accroître la liberté des médias"
 UKR_our_ukraine_increase_media_freedom_desc: "Nos médias ont été restreints pendant trop longtemps. Sous notre règne, ils seront plus libres et indépendants que jamais !"
 UKR_our_ukraine_release_political_prisoners: "Libérer les prisonniers politiques"
 UKR_our_ukraine_release_political_prisoners_desc: "Sous le précédent gouvernement, de nombreux politiciens d'opposition ont été emprisonnés. Donnons-leur la liberté !"
 UKR_our_ukraine_internet_freedom: "Liberté d'Internet"
 UKR_our_ukraine_internet_freedom_desc: "La liberté d'Internet implique que les citoyens ont droit à un accès libre à l'information, à la liberté d'expression et à la confidentialité dans leurs communications en ligne. Assurons-nous que ces droits et libertés soient protégés."
 UKR_our_ukraine_provide_housing: "Fournir des logements aux citoyens ukrainiens"
 UKR_our_ukraine_provide_housing_desc: "It is necessary to provide housing for our citizens, for this we will carry out appropriate reforms."
 UKR_our_ukraine_health_insurance_law: "Loi sur l'assurance santé"
 UKR_our_ukraine_health_insurance_law_desc: "We will adopt a law on health insurance, which will encourage the population to actively apply to medical institutions and increase the level of health of our citizens."
 UKR_our_ukraine_curriculum_modernization: "Modernisation des programmes scolaires"
 UKR_our_ukraine_curriculum_modernization_desc: "We will reform the educational program in our schools to improve the education of the younger generation."
 UKR_our_ukraine_diversification_of_gas_supply_sources: "Diversification des sources d'approvisionnement en gaz"
 UKR_our_ukraine_diversification_of_gas_supply_sources_desc: "We will actively diversify our resource assets so as not to be dependent on a single supplier."
 UKR_our_ukraine_cost_reduction: "Réduction des dépenses budgétaires"
 UKR_our_ukraine_cost_reduction_desc: "We will make budget cuts to improve the state of our budget."
 UKR_our_ukraine_deregulation_of_business_environment: "Dérégulation de l'environnement des affaires"
 UKR_our_ukraine_deregulation_of_business_environment_desc: "Notre pays doit réduire la bureaucratie et abaisser les barrières administratives pour les entrepreneurs."
 UKR_our_ukraine_attracting_investments: "Attirer des investissements"
 UKR_our_ukraine_attracting_investments_desc: "Our country is open for investment and we are ready to attract potential investors."
 UKR_our_ukraine_beginning_decommunization_policy: "Début de la politique de décommunisation"
 UKR_our_ukraine_beginning_decommunization_policy_desc: "En 1991, nous avons obtenu notre indépendance face à l'oppression soviétique. Commémorons cela et lançons une politique de décommunisation à travers le pays ! L'influence communiste doit être supprimée ici et maintenant."
 UKR_our_ukraine_economic_liberalism: "Libéralisme économique"
 UKR_our_ukraine_economic_liberalism_desc: "Le libéralisme économique est indispensable si nous voulons que l'économie devienne plus efficace ; nous devons donc l'adopter."
 UKR_our_ukraine_parliamentary_republic: "Renforcer les pouvoirs du Parlement"
 UKR_our_ukraine_parliamentary_republic_desc: "Renforcer les pouvoirs du Parlement contribue à accroître la représentativité du gouvernement. Le Parlement est un organe élu par le peuple et devrait donc avoir une plus grande influence sur le processus décisionnel. Cela favorise une meilleure prise en compte des opinions et des intérêts des citoyens dans le processus politique."
 UKR_our_ukraine_president_republic: "Renforcer les pouvoirs du président"
 UKR_our_ukraine_president_republic_desc: "The first important argument in favor of strengthening presidential powers is to ensure a more effective and rapid response to crisis situations. In a world saturated with global challenges such as economic crises, counterterrorism, and pandemics, the president must have sufficient authority to act quickly and decisively.\n\nLimited authority can lead to bureaucratic delays and ineffective decisions."
 UKR_our_ukraine_democratic_constitution: "Nouvelle constitution démocratique"
 UKR_our_ukraine_democratic_constitution_desc: "We are ready to reform our constitution in order to bring true democracy in our country closer."
 UKR_our_ukraine_recognition_holodomor: "Reconnaissance de l'Holodomor"
 UKR_our_ukraine_recognition_holodomor_desc: "Le pouvoir soviétique a commis envers nous, Ukrainiens, le crime le plus terrible du XXe siècle. Cette famine effroyable, l'Holodomor, a été causée par la collectivisation de l'agriculture et la politique de violence d'État menée par le régime communiste de l'URSS."
 UKR_our_ukraine_ukrainian_institute: "Institut ukrainien de la mémoire nationale"
 UKR_our_ukraine_ukrainian_institute_desc: "The Ukrainian Institute of National Memory is a central body of executive power for realization of state policy in the sphere of restoration and preservation of national memory. It will be established to recreate a fair history of the Ukrainian nation and to form and implement state policy in this direction.\n\nWe will also immortalize the memory of the victims of political repressions and famines on the territory of our country."
 UKR_our_ukraine_secretariat_of_president_reduction: "Réduction du secrétariat présidentiel de l'Ukraine"
 UKR_ukrainian_libertarianism: "Libertarianisme ukrainien"
 UKR_ukrainian_libertarianism_desc: "It is time for Ukraine to enter the era of libertarianism! Let's liberate the country from the shackles of capitalists and communists."
 UKR_full_deregulation: "Dérégulation complète"
 UKR_full_deregulation_desc: "We will begin the process of complete deregulation, and government influence will decrease."
 UKR_decrease_role_of_government: "Réduire le pouvoir du gouvernement"
 UKR_decrease_role_of_government_desc: "The state will play a minimal role in our beautiful country."
 UKR_free_the_common_folk: "Un peuple véritablement libre"
 UKR_free_the_common_folk_desc: "Notre peuple pourra enfin respirer librement et se sentir libre !"
 UKR_offshore_country: "Pays des zones offshore"
 UKR_offshore_country_desc: "We welcome the creation of many offshore zones in our country."
 UKR_true_servant_of_people: "Un véritable serviteur du peuple"
 UKR_true_servant_of_people_desc: "Enfin, l'Ukraine est devenue le pays le plus libre du monde !"
 UKR_our_ukraine_freedom_of_social_media_idea: "Liberté des réseaux sociaux"
 UKR_our_ukraine_freedom_of_social_media_idea_desc: "The media should be free and will be so. We will support the prohibition of censorship."
 UKR_our_ukraine_secretariat_of_president: "Secrétariat du président de l'Ukraine"
 UKR_our_ukraine_ukrainian_institute_of_national_memory: "Institut ukrainien de la mémoire nationale"
 UKR_our_ukraine_ukrainian_institute_of_national_memory_desc: "Every Ukrainian should remember the sacrifices of their people that he made in the past. The Institute of National Memory will help us form generations of those who will remember the heroism of Ukrainians."
 UKR_our_ukraine_fight_with_corruption_idea: "Lutte contre la corruption"
 UKR_our_ukraine_education_reform_idea: "Conséquences de la réforme éducative"
 UKR_our_ukraine_health_reform_idea: "Conséquences de la réforme de la santé"
 UKR_our_ukraine_social_reform_idea: "Conséquences de la réforme du logement"
 UKR_our_ukraine_air_industry_idea: "Réforme de l'industrie aéronautique"
 UKR_liberals_modifier: "Libéralisme ukrainien"
 UKR_liberals_modifier_desc: "Ukraine has finally embarked on the path of liberalism, now we have removed the shackles of authoritarian rule."
 ukraine_our_ukraine.1.t: "Secrétariat du président de l'Ukraine"
 ukraine_our_ukraine.1.d: "L'administration présidentielle s'est mal comportée pendant les années Iouchtchenko. Nous la réformons en Secrétariat du président de l'Ukraine pour garantir une plus grande stabilité politique."
 ukraine_our_ukraine.1.a: "Il est temps de changer."
 ukraine_our_ukraine.2.t: "Institut ukrainien de la mémoire nationale"
 ukraine_our_ukraine.2.d: "The Institute of National Memory has started its work, now we are ready to return Ukraine to its true history!"
 ukraine_our_ukraine.2.a: "Hurray!"
 ukraine_our_ukraine.3.t: "Constitution démocratique"
 ukraine_our_ukraine.3.d: "We will introduce amendments to the constitution that will make our country more democratic!"
 ukraine_our_ukraine.3.a: "Hurray!"
 ukraine_our_ukraine.4.t: "L'Ukraine propose à notre pays d'investir chez elle"
 ukraine_our_ukraine.4.d: "Le gouvernement ukrainien a annoncé le lancement d'un programme pour attirer les investisseurs étrangers et a envoyé à notre gouvernement une offre d'investissement dans leur économie."
 ukraine_our_ukraine.4.a: "Investissons !"
 ukraine_our_ukraine.4.b: "Cela ne nous intéresse pas."
 ukraine_our_ukraine.5.t: "Investissements en Ukraine"
 ukraine_our_ukraine.5.d: "Ils ont accepté d'investir dans notre pays."
 ukraine_our_ukraine.5.a: "Bien"
 ukraine_our_ukraine.6.t: "Investissements en Ukraine"
 ukraine_our_ukraine.6.d: "Ils ont refusé notre offre d'investir dans notre pays."
 ukraine_our_ukraine.6.a: "triste"
 ukraine_our_ukraine.7.t: "Contrat gazier avec l'Ukraine"
 ukraine_our_ukraine.7.d: "L'Ukraine nous a proposé de réduire les prix d'achat de notre contrat gazier. En échange, l'intermédiaire entre nous sera éliminé, ce qui nous donnera plus d'influence sur eux. Devons-nous accepter ?"
 ukraine_our_ukraine.7.a: "Nous signerons cela"
 ukraine_our_ukraine.7.b: "Cela ne nous intéresse pas."
 ukraine_our_ukraine.8.t: "Contrat gazier avec la Russie"
 ukraine_our_ukraine.8.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.8.a: "Bien"
 ukraine_our_ukraine.9.t: "Contrat gazier avec la Russie"
 ukraine_our_ukraine.9.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_our_ukraine.9.a: "Bien"
 UKR_zelensky_western: "La voie vers l'Ouest"
 UKR_zelensky_western_desc: "We will continue our political course with a desire to the west."
 UKR_befriend_the_west: "Amitié avec l'Ouest"
 UKR_befriend_the_west_desc: "We will continue our policy of improving relations with Western countries, and it is in them that we see our partners and allies."
 UKR_avakov_befriend: "Amitié avec Avakov"
 UKR_avakov_befriend_desc: "Arsen Avakov turned out to be the most persistent minister of all that we have seen, he was able to survive many governments, besides, he supports the Azov battalion financially, if we strengthen ties with him, we will be able to increase the Azov in numbers."
 UKR_land_reform_zelya: "Réforme agraire"
 UKR_land_reform_zelya_desc: "We will continue the Land reform, which was started a long time ago."
 UKR_fasten_nato_join: "Aspiration à rejoindre l'OTAN"
 UKR_fasten_nato_join_desc: "NATO is our finish line, what we have been striving for from the very beginning."
 UKR_peaceful_negotiation_don: "Résoudre pacifiquement la question du Donbass"
 UKR_peaceful_negotiation_don_desc: "Nous sommes prêts à faire des concessions pour le Donbass et mettre enfin un terme à ce conflit sans fin."
 UKR_keep_status_quo: "Maintenir le statu quo"
 UKR_keep_status_quo_desc: "We are not ready to resolve this issue peacefully, we will go the same way as before."
 UKR_next_azov_created_tt: "Une nouvelle §YBrigade Azov§! sera créée."
 UKR_our_influence_helps_tt: "§CParce que nous influençons le Parlement, nous pouvons faire adopter cette loi avec une plus grande probabilité de succès malgré moins de sièges en notre faveur§!"
 UKR_lose_some_seats_TT: "Nous allons §RPerdre§! quelques sièges au §HParlement§!"
 UKR_gain_some_seats_TT: "Nous allons §GGagner§! quelques sièges au §HParlement§!"
 UKR_is_pro_west_TT: "Est un parti aligné sur l'Occident"
 UKR_is_pro_east_TT: "Est un parti aligné sur la Russie"
 UKR_is_neutral_TT: "Est un parti non aligné avec une nation étrangère"
 UKR_influence_parliament_TT: "Commencera à §pInfluencer§! le §HParlement§!"
 UKR_puppet_parliament_TT: "Transformera le §HParlement§! en §OMarionnette§!\n\n§RNOUS N'AURONS PLUS BESOIN DE PASSER PAR LE PARLEMENT POUR CHANGER LES LOIS§!"
 UKR_dissolve_parliament_TT: "Dissoudra le §HParlement§!\n\n§RNOUS N'AURONS PLUS BESOIN DE PASSER PAR LE PARLEMENT POUR CHANGER LES LOIS§!"
 UKR_zelenskiy_socialist_TT: "§YZelensky§! changera son §BPoint de vue§!!"
 UKR_zelenskiy_formed_TT: "£ukr_servant_of_the_people Le parti §YServiteur du peuple§! sera créé !"
 UKR_zelenskiy_here_TT: "£ukr_servant_of_the_people Le parti §YServiteur du peuple§! doit être créé !"
 ukr_zelenskiy.1.t: "Annonce surprenante"
 ukr_zelenskiy.1.d: "Aujourd'hui, Volodymyr Zelensky a fait une annonce surprenante. Dans cette déclaration, il a dit qu'il renonçait aux idées du libertarianisme et qu'il adoptait, « à la demande de la majorité », les idées du socialisme. De plus, le président a annoncé que l'Ukraine renforcerait ses liens avec l'Occident et tenterait d'attirer des investisseurs occidentaux."
 ukr_zelenskiy.1.a: "Développement surprenant"
 ukr_zelenskiy.2.t: "Slouha Narodu"
 ukr_zelenskiy.2.d: "Une nouvelle inattendue a secoué toute l'Ukraine. Aujourd'hui, à la suite d'un congrès, le parti Serviteur du peuple, nommé d'après le film populaire, a été créé. Beaucoup pensent que ce parti a été créé comme une campagne de relations publiques pour le film, tandis que d'autres affirment qu'il vise à promouvoir le célèbre comédien Volodymyr Zelensky comme candidat à la présidence. Bien que Zelensky lui-même nie toute implication, ses réponses évasives pourraient alimenter davantage les spéculations."
 ukr_zelenskiy.2.a: "Intéressant"
 UKR_kucha_second_terms: "Second mandat de Koutchma"
 UKR_kucha_second_terms_desc: "Le président Koutchma dirige notre pays pour un second mandat ; peut-être ne sera-t-il pas réélu cette fois-ci, ou bien il mènera notre pays au chaos. Nous verrons."
 UKR_reform_programm: "Programme de réformes"
 UKR_reform_programm_desc: "Nous entamerons une série de réformes qui devraient conduire notre État à une croissance économique et le sortir de la crise de l'effondrement de l'URSS."
 UKR_reform_national_guard: "Dissoudre la Garde nationale"
 UKR_reform_national_guard_desc: "Il est temps de réformer. Il est temps de dissoudre la Garde nationale et de la transformer en une structure plus efficace : les Troupes intérieures."
 UKR_reform_vsu: "Nouvelle doctrine militaire"
 UKR_reform_vsu_desc: "Notre armée doit changer et se moderniser ; sinon, nous ne serons pas prêts pour une guerre contre l'ennemi. La nouvelle doctrine renforce également notre coopération avec l'OTAN."
 UKR_check_and_balances: "Système de contrepoids"
 UKR_check_and_balances_desc: "Notre État est actuellement dans une situation politique précaire ; nous devons trouver un équilibre dans la sphère politique pour éviter une catastrophe."
 UKR_yushenko_cabinet: "Cabinet Iouchtchenko"
 UKR_yushenko_cabinet_desc: "Viktor Iouchtchenko est une vieille connaissance qui s'est bien illustrée par son expérience de gestion. Les résultats de ses activités, qu'il nous a promis, devraient stimuler la croissance de la composante économique de notre pays."
 UKR_welfare_reform: "Réformes pour le bien-être social"
 UKR_welfare_reform_desc: "Les soins de santé sont dans un état lamentable depuis les années 1990 ; il est nécessaire de commencer à les réformer."
 UKR_kosuik: "Manufacture de pain Kosyuk"
 UKR_kosuik_desc: "L'industrie automobile nationale commence sa renaissance, et les entrepreneurs privés en seront le moteur. L'un d'eux, Iouri Kosyuk, prévoit d'établir ses propres usines pour la production de produits agricoles."
 UKR_azovstal_private: "Privatisation d'Azovstal"
 UKR_azovstal_private_desc: "We will continue to work on giving Azovstal to private hands since we cannot financially support such a huge enterprise ourselves."
 UKR_land_reform: "Réforme agraire"
 UKR_land_reform_desc: "La réforme agraire aurait dû avoir lieu il y a longtemps, mais nous l'avons retardée autant que possible. Maintenant, il nous sera plus facile de vendre des terres à des mains privées."
 UKR_land_trade: "Simplifier le commerce des terres"
 UKR_land_trade_desc: "Nous continuerons à faciliter l'acquisition de parcelles de terrain par des investisseurs privés dans notre pays."
 UKR_bolster_privatization: "Renforcer la privatisation des terres"
 UKR_bolster_privatization_desc: "La privatisation sera accélérée, et notre pays doit entrer dans une nouvelle économie de marché."
 UKR_ukrenergo_reform: "Réformer Ukrenergo"
 UKR_ukrenergo_reform_desc: "Notre structure énergétique est dans une situation terrible ; il est nécessaire de réformer Ukrenergo."
 UKR_burshtyn_tes: "Élargir la centrale thermique de Burshtyn"
 UKR_burshtyn_tes_desc: "Nous mènerons la reconstruction et l'amélioration de la centrale thermique de Burshtyn."
 UKR_diversy_fuel: "Diversifier les achats de carburant"
 UKR_diversy_fuel_desc: "Nous devons diversifier habilement les sources d'énergie que nous achetons à l'étranger ; nous ne pouvons pas dépendre d'un seul vendeur."
 UKR_short_terms: "Suppression des prêts à court terme"
 UKR_short_terms_desc: "Nous abolirons complètement les prêts à court terme ; ils sont nuisibles à l'économie."
 UKR_bank_lobbyst: "Éliminer les lobbyistes bancaires"
 UKR_bank_lobbyst_desc: "De nombreux lobbyistes bancaires sont arrivés au pouvoir dans les années 1990 ; il est temps de nous débarrasser de leur influence sur notre pays."
 UKR_social_cut_down: "Réduire les dépenses sociales"
 UKR_social_cut_down_desc: "Nous sommes contraints de réduire temporairement les dépenses sociales pour stabiliser nos réserves financières."
 UKR_struggle_power: "Lutte pour le pouvoir"
 UKR_struggle_power_desc: "Notre situation précaire a conduit à l'émergence d'opposants politiques puissants ; nous devons nous protéger d'eux et convaincre les électeurs de rester avec nous."
 UKR_tax_agro: "Réduction d'impôts pour les entreprises agricoles"
 UKR_tax_agro_desc: "Nous réduirons les impôts pour l'industrie agroalimentaire afin de stimuler la croissance de leur production."
 UKR_stimulate: "Stimuler l'économie"
 UKR_stimulate_desc: "Nos mesures portent leurs fruits, et l'économie commence à croître."
 UKR_negotiation_left: "Négociation avec l'opposition de gauche"
 UKR_negotiation_left_desc: "Les activistes de gauche gagnent visiblement en force ; il est nécessaire de trouver un compromis avec eux."
 UKR_radicalize_without_kuchma: "Eradicate Ukraine Without Kuchma"
 UKR_radicalize_without_kuchma_desc: "Le mouvement « Ukraine sans Koutchma » prenait un élan dangereux ; il est temps de s'en occuper."
 UKR_slowdown_reform_land: "Ralentir la réforme agraire"
 UKR_slowdown_reform_land_desc: "Nous avons décidé de ralentir notre réforme agraire car elle a suscité une réaction mitigée dans notre société."
 UKR_re_approach_privatbank: "Nouvelle approche avec PrivatBank"
 UKR_re_approach_privatbank_desc: "PrivatBank est la plus grande banque de notre pays ; nous devons trouver un compromis avantageux avec elle, ce qui nous assurera de gros revenus fiscaux."
 UKR_concessin_with_donbass: "Concessions avec le groupe du Donbass"
 UKR_concessin_with_donbass_desc: "Nous sommes prêts à faire des concessions pour le Donbass, essayant ainsi d'assurer leur loyauté envers nous."
 UKR_invest_mining_companies: "Investissements dans les entreprises minières"
 UKR_invest_mining_companies_desc: "En investissant dans les entreprises du Donbass, nous garantirons un fort soutien des électeurs locaux."
 UKR_donbass_infrastructure: "Programme d'infrastructure du Donbass"
 UKR_donbass_infrastructure_desc: "Investir dans l'infrastructure du Donbass nous permettra d'attirer de nouveaux électeurs et d'augmenter les revenus de cette région."
 UKR_impeachment: "Impeachment Proceedings"
 UKR_impeachment_desc: "The Verkhovna Rada is moving to impeach us. We must respond to this threat to our authority before it is too late."
 UKR_privatization_ukrenergo: "Expansion of Ukrenergo"
 UKR_privatization_ukrenergo_desc: "We are expanding UkrEnergo, connecting a part of our network to the european synchronous grid."
 UKR_reach_russian_oligarch: "Approcher les oligarques russes"
 UKR_reach_russian_oligarch_desc: "Nous attirerons les oligarques russes pour soutenir notre campagne politique."
 UKR_rus_mobile_operators: "Attirer les opérateurs mobiles russes"
 UKR_rus_mobile_operators_desc: "Nous donnerons aux opérateurs télécoms russes l'accès à notre marché."
 UKR_free_economic_zones: "Zones économiques libres"
 UKR_free_economic_zones_desc: "Nous créerons plusieurs zones économiques sur notre territoire, où nous attendrons naturellement les investisseurs russes en priorité."
 UKR_yanuk_cabinet: "Yanukovych [Yanu_Status]"
 UKR_yanuk_cabinet_desc: "Viktor Ianoukovitch et ses prochaines activités politiques devraient avoir un effet stimulant sur l'économie, tout comme celles de Iouchtchenko."
 UKR_block_land_trading: "Bloquer le commerce des terres"
 UKR_block_land_trading_desc: "Les transactions foncières seront activement gelées, car cela pourrait affecter négativement l'indépendance de notre complexe militaro-industriel."
 UKR_soft_taxation: "Réforme fiscale légère"
 UKR_soft_taxation_desc: "Nous mènerons une réforme fiscale légère qui ne mécontentera pas trop les entreprises ni les particuliers."
 UKR_floating_excange: "Taux de change flottant"
 UKR_floating_excange_desc: "Nous adopterons un taux de change flottant, mais cela pourrait avoir des effets économiques très variés."
 UKR_small_favor: "Avantages pour les petites entreprises"
 UKR_small_favor_desc: "Nous introduirons des avantages pour les petites entreprises afin de stimuler la croissance économique."
 UKR_doentskstal: "Donetskstal"
 UKR_doentskstal_desc: "Nous formons une nouvelle entreprise sur le territoire du Donbass pour optimiser nos activités dans cette région."
 UKR_gas_azvostal: "Construire un gazoduc à Azovstal"
 UKR_gas_azvostal_desc: "Nous construirons un gazoduc à Azovstal pour améliorer le fonctionnement de l'entreprise ainsi que les conditions de vie dans les districts."
 UKR_dorohy_avto: "Avtomobilni Dorohy Ukrainy"
 UKR_dorohy_avto_desc: "Dire que l'état des routes dans notre pays est terrible serait un compliment. 95 % des routes sont simplement en ruine. Nous allons commencer à les réparer."
 UKR_roshen: "Roshen"
 UKR_roshen_desc: "La célèbre usine de confiserie Roshen étend ses activités ; nous surveillerons de près ses propriétaires."
 UKR_luaz_reopen: "Modernize LuAZ"
 UKR_luaz_reopen_desc: "LuAZ produces old vehicles. It is necessary to modernize them to help our road reforms."
 UKR_ukraine_2000: "Ukraine 2000"
 UKR_ukraine_2000_desc: "Le nouveau millénaire devrait apporter des réformes constitutionnelles globales à l'Ukraine, et nous les promouvoirons activement."
 UKR_gain_rada_support: "Obtenir le soutien de la Rada"
 UKR_gain_rada_support_desc: "Le soutien total de la Verkhovna Rada est nécessaire pour la mise en œuvre de nos réformes."
 UKR_deal_pro_socialist_media: "Gérer les médias pro-socialistes"
 UKR_deal_pro_socialist_media_desc: "Les partis socialistes gagnent du terrain ; il est nécessaire de supprimer leurs médias."
 UKR_referendum_const: "Référendum sur la Constitution"
 UKR_referendum_const_desc: "Nous sommes prêts à organiser un référendum national sur les amendements à la Constitution."
 UKR_push_for_reforms: "Pousser pour les réformes"
 UKR_push_for_reforms_desc: "Nous continuerons à promouvoir nos idées réformistes auprès du gouvernement ; notre État en a besoin."
 UKR_arrest_timoshenko: "Arrestation de Timochenko"
 UKR_arrest_timoshenko_desc: "Timochenko est une adversaire politique trop dangereuse pour nous ; nous allons l'arrêter."
 UKR_prepare_protest: "Se préparer aux protestations"
 UKR_prepare_protest_desc: "Nos actions vont certainement générer une série de protestations ; nous devons nous y préparer."
 UKR_reform_berkut: "Réformer Berkut"
 UKR_reform_berkut_desc: "Les forces spéciales Berkut doivent être réformées, sans quoi nous risquons de perdre le contrôle des protestations."
 UKR_deal_yushenko: "Gérer Iouchtchenko"
 UKR_deal_yushenko_desc: "Nous nous occuperons de Iouchtchenko et de ses ambitions politiques."
 UKR_appoint_yanukovich: "Nommer Ianoukovitch"
 UKR_appoint_yanukovich_desc: "Nous nommerons Ianoukovitch à la tête du gouvernement ; peut-être pourra-t-il améliorer la situation."
 UKR_seek_help_eastern_oligarch: "Chercher l'aide des oligarques de l'Est"
 UKR_seek_help_eastern_oligarch_desc: "Nos ressources sont clairement insuffisantes pour réprimer le mouvement de protestation ; peut-être que les oligarques de l'Est nous aideront ?"
 UKR_aid_from_minign_companies: "Obtenir l'aide des entreprises minières"
 UKR_aid_from_minign_companies_desc: "Nos investissements dans les entreprises minières devraient porter leurs fruits, et leurs dirigeants seront prêts à nous fournir une aide financière et autre."
 UKR_negotiate_orange_maidan: "Négocier avec le Maïdan orange"
 UKR_negotiate_orange_maidan_desc: "Il est temps d'entamer des négociations avec les manifestants et de résoudre le problème une fois pour toutes."
 UKR_const_reform: "Réforme constitutionnelle"
 UKR_const_reform_desc: "Nous avons enfin réussi à imposer nos réformes au gouvernement, à travers le mouvement de protestation."
 UKR_lyvochkin: "Solution Liovotchkine"
 UKR_lyvochkin_desc: "Notre conseiller principal nous a clairement fait comprendre que nous devrons trouver un compromis avec les manifestants ; sinon, notre pays sombrera dans le chaos."
 UKR_stay_for_fair_election: "Rester pour des élections « équitables »"
 UKR_stay_for_fair_election_desc: "Nous n'allons pas abandonner notre pouvoir aussi facilement ; nous tiendrons jusqu'au bout."
 UKR_yusha_tt: "§YCela nous empêchera de réaliser les objectifs de la branche du Cabinet Iouchtchenko§!"
 UKR_yana_tt: "§YCela nous permettra de compléter l'objectif du Cabinet Ianoukovitch§!"
 UKR_easterns_tt: "Le soutien des habitants des §3Régions de l'Est§! de l'Ukraine changera de §Y[?modify_easterns]§! (Soutien actuel : §Y[?UKR.easterns]§!)\n"
 UKR_westerns_tt: "Le soutien des habitants des §tRégions de l'Ouest§! de l'Ukraine changera de §Y[?modify_westerns]§! (Soutien actuel : §Y[?UKR.westerns]§!)\n"
 UKR_maidani_tt: "Le soutien des §8Représentants du Maïdan§! changera de §Y[?modify_maidani]§! (Soutien actuel : §Y[?UKR.maidani]§!)\n"
 UKR_political_situation_decision_category: "Instabilité politique ukrainienne"
 UKR_political_situation_decision_category_desc: "[UKR.GetFlag]§YUkraine§! is a huge state with many peoples living in it, but two of them represent the majority - [UKR.GetFlag]§YUkrainians§! and [SOV.GetFlag]§YRussians§!. Due to historical events, the [SOV.GetFlag]§YRussian-speaking§! population mainly lives in the east of the country, while the [UKR.GetFlag]§YUkrainian§! population already occupies more western territories. This geographical division is constantly shaking [UKR.GetFlag]§YUkraine§! and may become a §Rbig problem§! for the country in the future. Among other things, the political electorate of [UKR.GetFlag]§YUkraine§! is very prone to protests and expressing their opinions through rather §Rnon-peaceful§! protests.  We need to take into account all these aspects and find an opportunity to balance these forces.\n\nIf support for the §8Maidan§! §Rfalls below 15§!, unrest will begin, which could lead to a §Rcivil war§!. To reduce the consequences of a possible §Rcivil war§!, it is necessary to expand the influence and power of the §YSBU§!, the §YNational Guard§!, etc. Depending on whose support is §Rless§! (§tWesterners§! or §3Easterners§!), there will be different scenarios of political unrest."
 ukr_west_output_text: "§Y[?UKR.westerns]§!"
 ukr_west_tooltip: "Soutien actuel des §tRégions de l'Ouest§!"
 ukr_maidan_output_text: "§Y[?UKR.maidani]§!"
 ukr_maidan_tooltip: "Soutien actuel du §8Maïdan§!"
 ukr_east_output_text: "§Y[?UKR.easterns]§!"
 ukr_east_tooltip: "Soutien actuel des §3Régions de l'Est§!"
 UKR_our_agricultrure: "Agriculture nationale"
 UKR_our_agricultrure_desc: "The Ukrainian agricultural industry is one of the best in the world, and we will try not to lose this title."
 UKR_azovsteel: "Azovstal"
 UKR_unstable_government_idea: "Insatisfaction envers le Maïdan"
 UKR_land_reform_idea: "Réforme agraire"
 UKR_land_reform_idea_desc: "The land reform initiated in the last century should lead to a complete redistribution of land holdings throughout the country. So far, it is in the process."
 UKR_zaims: "Conséquences économiques de l'annulation des prêts"
 UKR_banks_lobbyst_liquidate: "Liquidation des lobbyistes bancaires"
 UKR_mining_company_help: "Avantages fiscaux pour les entreprises minières"
 UKR_privatization_idea: "Privatisation"
 UKR_without_kuchma_idea: "L'Ukraine sans Koutchma"
 UKR_left_opposition_idea: "L'opposition de gauche"
 UKR_luaz_idea: "LuAZ"
 UKR_anti_socialist_media: "Médias anti-socialistes"
 UKR_crisis_political: "Crise politique"
 UKR_crisis_political_desc: "Our country is gripped by a political crisis, the authorities are paralyzed and political forces are fighting with each other for power."
 ukraine_kuchma.2.t: "Préparation aux protestations"
 ukraine_kuchma.2.d: "Nos actions mèneront clairement à des protestations ; nous devons nous préparer."
 ukraine_kuchma.2.a: "Nous serons prêts"
 ukraine_kuchma.2.b: "Tout se résoudra de soi-même"
 ukraine_kuchma.11.t: "Tentative de destitution"
 ukraine_kuchma.11.d: "La Verkhovna Rada a tenté de nous destituer à plusieurs reprises ; il est temps de régler cette question."
 ukraine_kuchma.11.a: "Non à la destitution"
 ukraine_kuchma.12.t: "Amitié avec le clan de Donetsk"
 ukraine_kuchma.12.d: "Nous essaierons d'attirer le soi-disant clan de Donetsk des oligarques de notre côté ; ils nous seront utiles dans la future confrontation avec l'opposition."
 ukraine_kuchma.12.a: "Le Donbass est avec nous"
 ukraine_kuchma.12.b: "Nous ne les soutiendrons pas"
 ukraine_kuchma.13.t: "Ianoukovitch deviendra président"
 ukraine_kuchma.13.d: "Nous ne reconnaîtrons pas les résultats du second tour de la course présidentielle et nommerons Ianoukovitch président de l'Ukraine."
 ukraine_kuchma.13.a: "Qu'il en soit ainsi"
 ukraine_kuchma.14.t: "Protestations dans le Sud-Est"
 ukraine_kuchma.14.d: "Après notre victoire aux élections, nous pensions que tout était fini, mais maintenant le Sud-Est de notre pays commence à montrer une forte activité de protestation. Le soi-disant « Maïdan bleu » a commencé à accroître la pression sur notre gouvernement, menaçant de graves conséquences."
 ukraine_kuchma.14.a: "Nous devons être plus prudents"
 ukraine_kuchma.15.t: "Maïdan bleu en Ukraine"
 ukraine_kuchma.15.d: "Activists in Southeastern Ukraine continued to develop their autonomy project, while the Kyiv authorities are busy changing chairs in the rada offices, a big storm is coming. Supporters of the Blue Maidan have asked us for support, will we help them?"
 ukraine_kuchma.15.a: "Nous les soutiendrons"
 ukraine_kuchma.15.b: "Nous ne devrions pas intervenir"
 ukraine_kuchma.16.t: "Gouvernement du Sud-Est"
 ukraine_kuchma.16.d: "The so-called activists of the Blue Maidan have officially announced the creation of their government, and that they do not recognize the Kyiv government. It seems that they were supported from outside, otherwise they would not have decided on such a thing."
 ukraine_kuchma.16.a: "Envoyer la police là-bas d'urgence"
 ukraine_kuchma.17.t: "La révolution bleue"
 ukraine_kuchma.17.d: "Aujourd'hui, les partisans du Maïdan bleu, dirigés par Viktor Ianoukovitch, ont officiellement déclaré leur indépendance et la formation de leur propre république du Sud-Est de l'Ukraine. Des unités militaires, ainsi que des généraux et des officiers, se sont ralliés à leur côté."
 ukraine_kuchma.17.a: "La tempête a commencé"
 ukraine_kuchma.18.t: "Protestations en Galicie"
 ukraine_kuchma.18.d: "Notre décision d'ignorer le second tour des élections présidentielles a conduit à une instabilité dans le pays ; de nombreux habitants des régions occidentales sont passés à une phase active de protestations, où des affrontements avec la police ont débuté."
 ukraine_kuchma.18.a: "Nous devons être plus prudents"
 ukraine_kuchma.19.t: "Maïdan rouge en Ukraine"
 ukraine_kuchma.19.d: "Les activistes de la Galicie ukrainienne ont entamé des protestations contre des élections illégales dans le pays ; la situation est devenue si tendue qu'on parle déjà d'une révolte armée, car plusieurs généraux soutiennent les rebelles. Devrions-nous les aider ?"
 ukraine_kuchma.19.a: "Nous les soutiendrons"
 ukraine_kuchma.19.b: "Nous ne devrions pas intervenir"
 ukraine_kuchma.20.t: "Le gouvernement de l'Ukraine occidentale"
 ukraine_kuchma.20.d: "The protests have already moved into a more heated phase, and they are clearly being helped from abroad. Now they have announced the creation of their own government, which is not subordinate to the Kyiv authorities."
 ukraine_kuchma.20.a: "Envoyer la police là-bas d'urgence"
 ukraine_kuchma.21.t: "La révolution rouge"
 ukraine_kuchma.21.d: "Today, supporters of the so-called Red Maidan announced their withdrawal from Ukraine and the beginning of armed resistance with the Kyiv Pro-Russian government."
 ukraine_kuchma.21.a: "La tempête a commencé"
 UKR_spu_start: "Parti socialiste d'Ukraine"
 UKR_spu_start_desc: "After years of struggling we managed to get the people trust. Now we shall start our great reforms."
 UKR_spu_rada_position: "Positions à la Rada"
 UKR_spu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_spu_coalition: "Coalition CPU/SPU"
 UKR_cpu_spu_coalition_desc: "Le Parti communiste d'Ukraine (CPU) et le Parti socialiste d'Ukraine (SPU) pourraient être décrits comme des frères. Ils ont toujours participé aux élections en front uni. Il est évident qu'ils formeront une coalition si l'un d'eux remporte la victoire."
 UKR_ditch_cpu: "Se distancer du CPU"
 UKR_ditch_cpu_desc: "Le CPU et le SPU pourraient être décrits comme des frères. Ils ont toujours participé aux élections en front uni, mais il est évident que si le CPU prenait le pouvoir, il rétablirait un régime communiste. Nous devons nous distancer d'eux dès que possible."
 UKR_cpu_start: "Parti communiste d'Ukraine"
 UKR_cpu_start_desc: "Communist Party of Ukraine."
 UKR_cpu_rada_position: "Positions à la Rada"
 UKR_cpu_rada_position_desc: "The key to rule is to control legislature. We must decide with who we must work to get our policies through the Rada."
 UKR_cpu_monocoalition: "Monocoalition"
 UKR_cpu_monocoalition_desc: "Monocoalition is a term in Ukrainian politics. It refers to a government formed by only one party. By creating a CPU monocoalition, we could easily take control of the legislature and executive branches and begin the Soviet restoration."
 UKR_back_to_soviet_tracks: "Retour à l'ère soviétique"
 UKR_back_to_soviet_tracks_desc: "After the collapse of the USSR, our country only lost, missed and destroyed everything that remains of the heritage of this great country. We will change this process."
 UKR_commie_russia_trade: "Partenariat avec la Russie"
 UKR_commie_russia_trade_desc: "Nous avons l'intention de renforcer les relations amicales entre nos pays."
 UKR_commie_russia_rjd: "Partenariat avec les chemins de fer russes"
 UKR_commie_russia_rjd_desc: "Russian railways will be an excellent partner for us, thanks to their help we will significantly improve our infrastructure."
 UKR_commie_russia_banks: "Banques russes"
 UKR_commie_russia_banks_desc: "We are ready to let Russian banks into our territory, their financial capabilities will help us in our development."
 UKR_commie_russia_gas: "Nouveau contrat gazier"
 UKR_commie_russia_gas_desc: "We are ready to conclude a new gas contract with Russia, on favorable terms for us."
 UKR_commie_china_trade: "Partenariat avec la Chine"
 UKR_commie_china_trade_desc: "Nous avons l'intention de renforcer les relations amicales entre nos pays."
 UKR_commie_china_trains: "Achat de trains en Chine"
 UKR_commie_china_trains_desc: "We will purchase several trains in China that will help improve our supply."
 UKR_comsomol: "Relancer le Komsomol"
 UKR_comsomol_desc: "The Komsomol movement needs to be revived as an ideological pillar of our system in the minds of new generations."
 UKR_commie_china_infra: "Modernisation des chemins de fer"
 UKR_commie_china_infra_desc: "Nos collègues chinois ont accepté de financer la modernisation du réseau ferroviaire de notre pays."
 UKR_commie_china_huawei: "Coopération avec Huawei"
 UKR_commie_china_huawei_desc: "We will establish a strong cooperation with this Chinese company."
 UKR_commie_motor_sich: "Étendre Motor Sich"
 UKR_commie_motor_sich_desc: "We will invest additional funds in the development of our key enterprise - MotorSich."
 UKR_ukr_pioners: "Relancer les Pionniers"
 UKR_ukr_pioners_desc: "The pioneers need to be revived, the youth have lost their moral guidelines and must be guided on the path of socialism again."
 UKR_one_union_for_all: "Syndicat d'État unifié"
 UKR_one_union_for_all_desc: "We will protect the rights of workers across the country by creating a single trade union."
 UKR_remilitarization: "Remilitarisation"
 UKR_remilitarization_desc: "Our state must have a strong army, so we will begin the immediate process of remilitarization."
 UKR_arms_zavods: "Investissements dans les usines d'armement"
 UKR_arms_zavods_desc: "Our military industry was destroyed after the collapse of the USSR, it's time to revive it."
 UKR_sbu_kgb: "Méthodes du KGB"
 UKR_sbu_kgb_desc: "We must rebuilt the old KGB school, this will clearly increase the professionalism of our staff."
 UKR_arms_tanks: "Accent sur les chars"
 UKR_arms_tanks_desc: "Our armed forces need tanks urgently, we will give them this need."
 UKR_revolut_in_blr: "La révolution socialiste biélorusse"
 UKR_revolut_in_blr_desc: "Notre peuple frère biélorusse est opprimé par ses dirigeants et les capitalistes ! Libérons-les !"
 UKR_revolution_in_russia: "La révolution socialiste russe"
 UKR_revolution_in_russia_desc: "Notre peuple frère russe est opprimé par ses dirigeants et les capitalistes ! Libérons-les !"
 UKR_befriend_russia_com: "Amitié avec la Russie"
 UKR_befriend_russia_com_desc: "We intend to establish partnership and friendly relations with Russia."
 UKR_befriend_belarus_com: "Amitié avec la Biélorussie"
 UKR_befriend_belarus_com_desc: "We intend to establish partnership and friendly relations with Belarus."
 UKR_central_asia_revolt: "Révolutions en Asie centrale"
 UKR_central_asia_revolt_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_caucasus_revolut: "Révolutions dans le Caucase"
 UKR_caucasus_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_baltic_revolut: "Révolutions dans les États baltes"
 UKR_baltic_revolut_desc: "We intend to raise the banner of revolution in this region as well."
 UKR_revolut_in_mol: "La révolution socialiste moldave"
 UKR_revolut_in_mol_desc: "Notre peuple frère moldave est opprimé par ses dirigeants et les capitalistes ! Libérons-les !"
 UKR_csto_com_app: "Rejoindre l'OTSC"
 UKR_csto_com_app_desc: "Our fraternal peoples are members of the CSTO, perhaps it is worth joining them."
 UKR_integration_support: "Intégration des anciennes républiques"
 UKR_integration_support_desc: "We will begin the integration processes of the former republics."
 UKR_declare_ussr: "Relancer l'URSS"
 UKR_declare_ussr_desc: "Nous sommes les véritables héritiers de l'URSS ! Il est temps de ressusciter cet grand État !"
 UKR_nationalize_everything: "Lancer la nationalisation"
 UKR_nationalize_everything_desc: "Nous ne donnerons rien aux capitalistes ! Les entreprises reviendront dans le giron de l'État !"
 UKR_social_propaganda: "Réformes sociales"
 UKR_social_propaganda_desc: "We will launch large-scale social reforms that will allow us to win the hearts of the poor."
 UKR_christian_communism_desc: "Interdire la religion fut l'une des erreurs que nous ne permettrons pas. Le communisme chrétien est notre avenir. Après tout, Jésus lui-même était communiste !"
 UKR_criminalize_oligrachy: "Criminaliser l'oligarchie"
 UKR_criminalize_oligrachy_desc: "Les oligarques ont saigné notre pays pendant de nombreuses années, vendant les biens créés par nos arrière-grands-pères ; ça suffit !"
 UKR_land_to_people: "La terre au peuple !"
 UKR_land_to_people_desc: "The land should belong to the people! Not a bunch of oligarchs, bandits."
 UKR_revive_soviet_factories: "Relancer les usines soviétiques"
 UKR_revive_soviet_factories_desc: "Many enterprises that remained as a legacy from the USSR were destroyed and destroyed, we will revive them again."
 UKR_regions_ditch: "Abandonner la coalition avec le Parti des régions"
 UKR_regions_ditch_desc: "Nous ne formerons pas de coalition avec ce parti ; cela ne nous apporterait que des problèmes."
 UKR_regions_integr: "Coalition avec le Parti des régions"
 UKR_regions_integr_desc: "We will form a coalition with this party, it will strengthen our political capabilities."
 UKR_socialist_ukraine_effort: "Réformes socialistes"
 UKR_socialist_ukraine_effort_desc: "We will begin a series of reforms that should strengthen our political position."
 UKR_pensions_for_elders_incr: "Augmenter les pensions"
 UKR_pensions_for_elders_incr_desc: "We will increase pension payments so that citizens are willing to retire."
 UKR_full_rabota: "Réformes du travail"
 UKR_full_rabota_desc: "We will carry out serious reforms in the labor legislation to improve the working conditions of our citizens."
 UKR_socialist_democratic_policies: "Pays social-démocrate"
 UKR_socialist_democratic_policies_desc: "New future awaits our country, under the banner of social democracy."
 UKR_start_to_support: "Soutenir les pauvres"
 UKR_start_to_support_desc: "Our electorate is low-income citizens who hope that our reforms will pull them out of the economic abyss into which they were dragged by the previous government. We will help them."
 UKR_progressive_taxation: "Fiscalité progressive"
 UKR_progressive_taxation_desc: "We intend to introduce progressive taxation for greater economic equality of our citizens."
 UKR_social_conservative_prog: "Programme social-conservateur"
 UKR_social_conservative_prog_desc: "We intend to carry out a number of reforms that were inspired by the social conservative representatives of the political sphere of our country."
 UKR_ukr_cossack_freedom: "Liberté cosaque"
 UKR_ukr_cossack_freedom_desc: "Our citizen is like a free Cossack, he is no longer a slave to capital and not a slave to anyone."
 UKR_nationalization_of_big_com: "Nationalisation des grandes entreprises"
 UKR_nationalization_of_big_com_desc: "We will carry out a series of nationalizations of large companies."
 UKR_crusade_against_inequality: "Lutte contre les inégalités"
 UKR_crusade_against_inequality_desc: "Inequality in our society is becoming more pronounced, and we will begin an economic and political program to soften the financial boundaries between different social strata."
 UKR_reduce_cap_oligrach: "Réduire l'influence des oligarques"
 UKR_reduce_cap_oligrach_desc: "The oligarchs have too much influence on our country, it's time to deal with this."
 UKR_people_brotherhood: "Unité fraternelle"
 UKR_people_brotherhood_desc: "Our people, the peoples that inhabit our country must be a united brotherhood that will resist threats from outside."
 UKR_ask_russia_to_give_nukes: "Demander des armes nucléaires à la Russie"
 UKR_ask_russia_to_give_nukes_desc: "We intend to request from Russia some stocks of nuclear weapons to protect our country from external threats."
 UKR_reduce_foreign_influence: "Réduire l'influence étrangère"
 UKR_reduce_foreign_influence_desc: "We will weaken foreign influence on our country, independence is our foundation."
 UKR_labourr_unions: "Soutien aux syndicats"
 UKR_labourr_unions_desc: "Nous protégerons activement les syndicats nationaux pour créer un climat de travail positif dans le pays."
 UKR_immigartion_easing: "Faciliter l'immigration"
 UKR_immigartion_easing_desc: "We will facilitate immigration processes, because our borders should not be closed by walls."
 UKR_uindependence_prop: "Protéger l'investisseur national"
 UKR_uindependence_prop_desc: "We should not abandon the domestic investor, this is the only way we will strengthen the growth of our economy."
 UKR_dont_touch_west_inv: "Priorité à l'investisseur occidental"
 UKR_dont_touch_west_inv_desc: "We will concentrate our efforts to protect the Western investor."
 UKR_pro_russian_approach: "Orientation pro-russe"
 UKR_pro_russian_approach_desc: "We will choose Russia as a reference point, historically we are only on the way with them."
 UKR_pro_western_approach: "Orientation pro-occidentale"
 UKR_pro_western_approach_desc: "We have chosen our way - the way to the west."
 UKR_request_protection_from_rus: "Demander la protection de la Russie"
 UKR_request_protection_from_rus_desc: "We will try to conclude agreements on protection and defense so that our country is protected by Russia."
 UKR_apply_economic_union: "Rejoindre l'espace économique russe"
 UKR_apply_economic_union_desc: "Economic cooperation with Russia will give us economic growth and profitable contracts."
 UKR_donbas_peaceful: "Solution pacifique au problème séparatiste"
 UKR_donbas_peaceful_desc: "We are ready to peacefully resolve the issue with the territories that have separated from us."
 UKR_csto_apply: "Rejoindre l'OTSC"
 UKR_csto_apply_desc: "We intend to become a part of the CSTO, we see that only the members of this alliance are really interested in protecting us."
 UKR_western_socialists_coalition: "Coalition avec les partis occidentaux"
 UKR_western_socialists_coalition_desc: "We intend to create a coalition with pro-Western parties."
 UKR_harsh_separat_dealkill: "Éliminer les séparatistes"
 UKR_harsh_separat_dealkill_desc: "We are ready to liberate our territories."
 UKR_apply_eu_reforms: "Adopter des réformes pro-européennes"
 UKR_apply_eu_reforms_desc: "We intend to follow the European political course."
 UKR_nato_commitment: "Réformes pour l'OTAN"
 UKR_nato_commitment_desc: "We intend to carry out military reform in accordance with NATO standards for future membership there."
 UKR_pmr_invite_union: "Proposer un État unifié à la Transnistrie"
 UKR_pmr_invite_union_desc: "Nous envisageons d'aller plus loin et de créer un nouvel État en Europe, qui ne pourra pas être influencé par des forces extérieures, et nous avons un candidat approprié pour agrandir cet État."
 UKR_belarus_invite: "Proposer un État unifié à la Biélorussie"
 UKR_belarus_invite_desc: "Nous envisageons d'aller plus loin et de créer un nouvel État en Europe, qui ne pourra pas être influencé par des forces extérieures, et nous avons un candidat approprié pour agrandir cet État."
 UKR_hungary_invite: "Proposer un État unifié à la Hongrie"
 UKR_hungary_invite_desc: "Nous envisageons d'aller plus loin et de créer un nouvel État en Europe, qui ne pourra pas être influencé par des forces extérieures, et nous avons un candidat approprié pour agrandir cet État."
 UKR_moldova_invite: "Proposer un État unifié à la Moldavie"
 UKR_moldova_invite_desc: "Nous envisageons d'aller plus loin et de créer un nouvel État en Europe, qui ne pourra pas être influencé par des forces extérieures, et nous avons un candidat approprié pour agrandir cet État."
 ukraine_rada.2.t: "Coalition avec le SPU ?"
 ukraine_rada.2.d: "Depuis longtemps, les socialistes sont nos alliés malgré nos différences. La majorité des membres du SPU étaient autrefois membres de notre parti, et la longue histoire de nos relations fait de la coalition un choix évident. Cependant, les socialistes s'éloignent progressivement de nous, devenant bien plus modérés et imprégnés de révisionnisme, ce qui nous empêchera de mettre en œuvre les politiques les plus radicales sous un gouvernement commun."
 ukraine_rada.2.b: "Au diable le SPU. Déclarons une monocoalition !"
 ukraine_rada.2.a: "Let's Start Coalition Talks"
 ukraine_rada.1.t: "Coalition avec le CPU ?"
 ukraine_rada.1.d: "Depuis longtemps, les communistes sont nos alliés, malgré leurs différences. La majorité de nos membres ont été membres du CPU, et la longue histoire de cette relation rend une coalition nécessaire. Cependant, les communistes refusent de suivre l'évolution des temps en prônant des idées régressives et en soutenant des initiatives cannibales ; une coalition avec eux pourrait également permettre à certains membres radicaux du CPU d'accéder au pouvoir."
 ukraine_rada.1.b: "Au diable le CPU !"
 ukraine_rada.1.a: "Let's Start Coalition Talks"
 ukraine_kommi.1.t: "L'Ukraine demande des armes nucléaires"
 ukraine_kommi.1.d: "An unexpected statement came from the Ukrainian government. They want to get Nuclear weapons from us in order to defend themselves from an external attack. Such a dangerous decision requires us to weigh the pros and cons."
 ukraine_kommi.1.a: "Nous leur donnerons des armes nucléaires"
 ukraine_kommi.1.b: "Nous ne leur donnerons pas d'armes nucléaires"
 ukraine_kommi.2.t: "Armes nucléaires russes"
 ukraine_kommi.2.d: "They agreed to provide us with some of the nuclear weapons."
 ukraine_kommi.2.a: "Bien"
 ukraine_kommi.3.t: "Armes nucléaires russes"
 ukraine_kommi.3.d: "They refused to provide us with part of the nuclear weapons."
 ukraine_kommi.3.a: "triste"
 ukraine_kommi.4.t: "A New Communist State"
 ukraine_kommi.4.d: "Our revolution has succeeded. The old regime is finished here, but we cannot stand alone yet. Ukraine has offered to back our government while we get on our feet."
 ukraine_kommi.4.a: "We Accept Their Support"
 ukraine_kommi.5.t: "L'Ukraine propose une coopération militaire"
 ukraine_kommi.5.d: "The Ukrainian government says it is ready to sign a number of documents on military-political cooperation between our countries."
 ukraine_kommi.5.a: "Nous sommes pour l'amitié avec l'Ukraine"
 ukraine_kommi.5.b: "Nous ne signerons rien"
 ukraine_kommi.6.t: "Coopération militaire avec la Russie"
 ukraine_kommi.6.d: "They agreed to sign agreements on military-political cooperation with us."
 ukraine_kommi.6.a: "Super"
 ukraine_kommi.7.t: "Coopération militaire avec la Russie"
 ukraine_kommi.7.d: "They refused to sign agreements on military-political cooperation with us."
 ukraine_kommi.7.a: "triste"
 ukraine_kommi.8.t: "État démocratique unifié"
 ukraine_kommi.8.d: "Le gouvernement ukrainien propose que nous créions un État démocratique unique dans l'immensité de l'Europe, une sorte de troisième centre de pouvoir. Allons-nous accepter de perdre notre indépendance pour un rêve de troisième force ?"
 ukraine_kommi.8.a: "L'indépendance est une fiction"
 ukraine_kommi.8.b: "Jamais"
 ukraine_kommi.9.t: "État démocratique unifié"
 ukraine_kommi.9.d: "They refused our offer! It was expected, but so pathetic on their part."
 ukraine_kommi.9.a: "Ils ne comprennent pas"
 ukraine_kommi.10.t: "L'Ukraine demande une protection"
 ukraine_kommi.10.d: "The Ukrainian government asks us to provide them with guarantees to protect their independence. An unexpected request, but perhaps we should consider it."
 ukraine_kommi.10.a: "Nous les protégerons"
 ukraine_kommi.10.b: "Jamais"
 ukraine_kommi.11.t: "Garantie de protection russe"
 ukraine_kommi.11.d: "Le gouvernement russe a accepté de nous fournir des garanties d'indépendance !"
 ukraine_kommi.11.a: "Bien"
 ukraine_kommi.12.t: "Garantie de protection russe"
 ukraine_kommi.12.d: "The Russian government has refused to provide us with guarantees of independence."
 ukraine_kommi.12.a: "Mince"
 ukraine_kommi.13.t: "Contrat gazier avec l'Ukraine"
 ukraine_kommi.13.d: "L'Ukraine nous a proposé de réduire les prix d'achat de notre contrat gazier. En échange, l'intermédiaire entre nous sera supprimé, ce qui nous donnera plus d'influence sur eux. Devons-nous accepter ?"
 ukraine_kommi.13.a: "Nous signerons cela"
 ukraine_kommi.13.b: "Cela ne nous intéresse pas"
 ukraine_kommi.14.t: "Contrat gazier avec la Russie"
 ukraine_kommi.14.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.14.a: "Bien"
 ukraine_kommi.15.t: "Contrat gazier avec la Russie"
 ukraine_kommi.15.d: "They agreed to change the terms of our gas contract, now we will pay less!"
 ukraine_kommi.15.a: "Bien"
