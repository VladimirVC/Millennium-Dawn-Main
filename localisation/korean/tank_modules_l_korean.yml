 afv_composite_armor_gen5: "초고도 경형 복합 장갑"
 afv_composite_armor_gen5_desc: "나노 층을 이룬 반응성 복합재가 충격 시 구조를 변화시켜 정적 장갑판보다 운동 에너지를 훨씬 효과적으로 분산시킵니다. 중량 대비 초기 세대 전차 장갑과 필적하는 방어력을 제공합니다."
 afv_composite_armor_gen6: "초첨단 경형 복합 장갑"
 afv_composite_armor_gen6_desc: "자기장 경화 스마트 복합재와 자가 치유 매트릭스 층을 갖춘 이 장갑은 기갑 전투 차량(AFV) 방어 기술의 정점입니다. 이 장갑은 차체 전반에 걸쳐 응력을 동적으로 재분배하여 이전 설계들을 무력화시킬 타격조차도 가볍게 받아냅니다."
