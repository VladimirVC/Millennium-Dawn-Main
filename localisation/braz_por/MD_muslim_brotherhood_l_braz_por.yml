l_braz_por:
 muslim_brotherhood_sponsor: "Rede da Irmandade Muçulmana"
 muslim_brotherhood_suppressor: "Neutralizar a Irmandade"
 MB_build_network_hub: "Construir a Organização Internacional"
 MB_build_network_hub_desc: "A Irmandade Muçulmana é um movimento que atravessa fronteiras, com seus afiliados espalhados pela região sem um único centro. Que [Root.GetNameDef] torne-se esse centro, coordenando a rede e nos dando os meios para apoiar nossos irmãos no exterior."
 MB_fund_affiliates: "Financiar Afiliados da Irmandade"
 MB_fund_affiliates_desc: "A Irmandade em [FROM.GetNameDef] está disposta, mas pobre. Dinheiro, organizadores e um fluxo constante de apoio fortalecerão sua posição contra um governo que preferiria vê-los eliminados."
 MB_diplomatic_solidarity: "Chamado à Solidariedade da Irmandade"
 MB_diplomatic_solidarity_desc: "Governos alinhados à Irmandade são mais fortes juntos do que separados. Traga-os para uma mesa, reafirme a causa comum e deixe que o calor entre nós seja sentido em todo o bloco."
 MB_bankroll_crackdown: "Financiar uma Repressão no Exterior"
 MB_bankroll_crackdown_desc: "[FROM.GetNameDef] observa a Irmandade crescer dentro de suas fronteiras sem os meios para agir. Ofereça-lhes os fundos e a inteligência para atacar primeiro, antes que o movimento ganhe força suficiente para ameaçar o estado."
 MB_designate_terrorist_organization: "Classificar a Irmandade como Organização Terrorista"
 MB_designate_terrorist_organization_desc: "Classifique a Irmandade Muçulmana pelo que declaramos que ela é: uma organização terrorista. A designação custa pouco internamente e coloca [Root.GetNameDef] lado a lado com todos os governos que traçaram a mesma linha."
 MB_counter_sponsor_influence: "Expor o Financiamento da Irmandade"
 MB_counter_sponsor_influence_desc: "Alguém está financiando a Irmandade em [FROM.GetNameDef], e o dinheiro deixa um rastro. Exponha-o, interrompa-o e veja o movimento perder força à medida que seus apoiadores são trazidos à luz."
 MB_rescind_terrorist_designation: "Revogar Designação de Organização Terrorista"
 MB_rescind_terrorist_designation_desc: "Deixe a designação de terrorista expirar discretamente. A postura contra a Irmandade serviu ao seu propósito, e há pouco a ganhar mantendo antigas queixas nos registros."
 MB_sponsored_network: "Patrocinando nosso movimento da Irmandade"
 MB_funding_subversion: "Financiando a subversão da Irmandade no exterior"
 MB_solidarity: "Solidariedade à Irmandade Muçulmana"
 MB_crackdown_patron: "Financiamos nossa repressão"
 MB_funding_repression: "Financiando a repressão à Irmandade"
 MB_counter_bloc: "Postura comum contra a Irmandade"
 MB_branded_terrorist: "Classificamos a Irmandade como grupo terrorista"
 brotherhood.6.c: "Cooptar seus moderados para o governo."
 brotherhood.11.t: "Uma Oferta para Financiar uma Repressão"
 brotherhood.11.d: "[FROM.GetNameDef] nos ofereceu discretamente dinheiro e inteligência para suprimir a Irmandade Muçulmana antes que ela se fortaleça ainda mais. Seus enviados aguardam uma resposta."
 brotherhood.11.a: "Aceite o financiamento e mova-se contra eles."
 brotherhood.11.b: "Negar a oferta."