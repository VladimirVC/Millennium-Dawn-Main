 russia.500.t: "Rostec Consolidates the Helicopter Industry"
 russia.500.d: "Decades of competition between the Mil and Kamov design bureaus and the Rostvertol, Kazan, and Ulan-Ude assembly plants have left Russian rotorcraft production fragmented. Under Rostec's industrial coordination, the surviving Soviet-era heritage is consolidated into a single integrated holding — JSC Russian Helicopters — to streamline research, production, and exports."
 russia.500.a: "Form Russian Helicopters JSC"
 TT_SOV_russian_helicopters_carry_traits: "All completed traits from §YMil Helicopters§! will be transferred to §YRussian Helicopters§!."
 SOV_mp_end_rentier_state: "End the Rentier State"
 SOV_mp_end_rentier_state_desc: "Break our dependence on resource exports and diversify the economy, removing the Rentier State. Available only when Multiplayer Enhancements are enabled."
