 korea_russia.53.t: "Submarine Technology"
 korea_russia.53.d: "Russia Supplied Us with Better Technology so we can improve our submarines this is all thanks to North Korean leader push to develop nuclear-powered submarines."
 korea_russia.53.a: "Bless our Leader"
 NKO_Domestic_Naval_Strategy: "Domestic Naval Strategy"
 NKO_Domestic_Naval_Strategy_desc: "Lay the foundations for a modern naval doctrine. Each branch of the program   submarines, missile boats, coastal defense, and special operations   will receive its share of resources to begin development."
 NKO_Domestic_Submarine_Program: "Domestic Submarine Program"
 NKO_Domestic_Submarine_Program_desc: "Concentrate the bureau's efforts on indigenous submarine construction. Refined hull production and intensified crew training will give us the silent striking arm we need to threaten enemies far from our coast."
 NKO_Domestic_Destroyer_Buildup: "Domestic Destroyer Buildup"
 NKO_Domestic_Destroyer_Buildup_desc: "Mass-produce missile boats and small surface combatants to swarm enemy fleets in coastal waters. Our shipyards can field hulls faster than the South can deploy heavy destroyers."
 NKO_Destroyer_Unleashed: "Destroyer Unleashed"
 NKO_Destroyer_Unleashed_desc: "Field a new generation of destroyers fitted with heavier guns and dedicated anti-air batteries. The fleet will finally be able to contest blue-water engagements rather than hide along the coast."
 NKO_Navy_projects: "North Korean Navy Projects"
 NKO_Navy_projects_desc: "Establishing a modern navy will let us defend our coastal waters and project power throughout the region. These new vessels will form the core of our future fleet."
 NKO_The_Blue_Water_Navy: "The Blue-Water Navy"
 NKO_The_Blue_Water_Navy_desc: "Years of yard expansion, doctrinal reform, and joint exercises have transformed our fleet from a coastal force into a true ocean-going navy. We can now sortie far beyond our shores, with crews and hulls equal to any rival in the region.\n§W--------------§!\nA blue-water navy is a maritime force capable of sustained operations across the deep waters of open oceans, projecting power well beyond its home coast."
 NKO_Russian_friendship: "Russian-North Korean Alliance"
 NKO_Russian_friendship_desc: "Russia has always been one of our main allies, and the USSR is all the more involved in our appearance and existence. We intend to try to revive allied relations between our countries again"
 korea.135.t: "Hacking Operation succeeded"
 korea.135.d: "Our hackers infiltrated the banking infrastructure of Western nations and siphoned off significant funds. Some was lost in the back channels used to move it home, but the operation was a success."
 korea.135.a: "Great Job"
 korea.136.t: "North Korea Hacked Us"
 korea.136.d: "North Korean hackers have launched a cyberattack on our banking infrastructure to siphon funds. We should retaliate with operations of our own   or appeal to the international community."
 korea.136.a: "Unexpected"
 korea.137.t: "Drugs Flooding Our Streets"
 korea.137.d: "A new wave of drugs has flooded our streets. The source remains unconfirmed, but we must move carefully, the productivity is already suffering."
 korea.137.a: "Support the Addicts"
 korea.137.b: "What can we do"
 korea.138.t: "Drug Operation succeeded."
 korea.138.d: "A new wave of drugs has flooded our enemies' streets. They will have to spend to contain the crisis, while we earn a modest profit. Continued investment in the agency will keep the cash flowing."
 korea.138.a: "Well Done!"
 korea.139.t: "Counterfeit Dollar Operation"
 korea.139.d: "We have printed forged $100 bills and will distribute them through back channels into foreign markets, laundering the proceeds through our black market network. Steady income from this scheme will fund further operations."
 korea.139.a: "Well done!"
 NKO_korean_russian_friendship: "North Korean–Russian Treaty on Comprehensive Strategic Partnership"
 NKO_korean_russian_friendship_desc: "The 2024 partnership treaty binds Pyongyang and Moscow into a mutual security pact, with each party pledging to come to the other's defence. Trade, energy, and technology cooperation deepen alongside the formal guarantees."
 NKO_naval_project_burden1: "Naval Project Burden"
 NKO_naval_project_burden1_desc: "Running a single major naval programme already strains a planned economy that was never built for it. Steel, electronics, and skilled labour are diverted from civilian production to keep the yards moving."
 NKO_naval_project_burden2: "Compounding Naval Burden"
 NKO_naval_project_burden2_desc: "A second concurrent naval programme amplifies the squeeze on the civilian economy. Shortages cascade through unrelated industries as resources are pulled toward the shipyards."
 NKO_naval_project_burden3: "Severe Naval Burden"
 NKO_naval_project_burden3_desc: "Three simultaneous naval programmes have left the civilian economy gasping. Consumer-goods queues lengthen and other industries idle for want of inputs the navy has first call on."
