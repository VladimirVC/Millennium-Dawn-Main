 BRA_coalition_dem_tt: "El §Y[Nat_Populism_L]§! y el §Y[conservatism_L]§! forman una §Gcoalición§!\n"
 BRA_coalition_prtb_tt: "¡El §Y[Conservative_L]§! se unirá a nuestra coalición!"
 BRA_coalition_dem_psdb_tt: "El §Y[Nat_Populism_L]§!, el §Y[conservatism_L]§! y el §Y[liberalism_L]§! forman una §Gcoalición§!\n"
 BRA_restauration_empire_TT: "El §Y[Monarchist_L]§! gana §G+10.00%§! de Popularidad (Popularidad Relativa)\n¡Brasil será conocido como el §YImperio de Brasil§!.\nEl Imperio será restaurado, con §YLuiz I§! en el trono."
 BRA_pt_win: "§YEl PT ganó las elecciones§!"
 BRA_psl_win: "§YEl PSL ganó las elecciones§!"
 BRA_psdb_win: "§YEl PSDB ganó las elecciones§!"
 BRA_pdt_coalition_tt: "¡El §Y[socialism_L]§! se unirá a nuestra coalición!"
 BRA_mdb_coalition_tt: "¡El §Y[oligarchism_L]§! se unirá a nuestra coalición!"
 BRA_new_coalition_tt: "The §Y[neutral_Social_L]§!, the §Y[Neutral_Communism_L]§! and the §Y[Communist-State_L]§! will join our coalition!"
