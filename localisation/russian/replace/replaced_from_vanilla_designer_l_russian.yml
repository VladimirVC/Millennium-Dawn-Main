 tank_designer_flame_role_disallowed: "Добавьте модуль, позволяющий §HБМП§! переключаться на этот тип техники.\n\nДобавьте модуль §H«Отсек для перевозки личного состава»§!, расположенный в разделе §H«Оборудование и модули конструкции»§!, чтобы открыть этот тип техники."
 tank_designer_amphibious_role_disallowed: "Добавьте модуль, позволяющий §HБТР§! или §Hтранспортному вертолёту§! переключаться на этот тип техники.\n\nДобавьте модуль §H«Отсек для перевозки личного состава»§!, расположенный в разделе §H«Оборудование и модули конструкции»§!, чтобы открыть этот тип техники."
