l_japanese:
 faction_manifest_containment_of_decadence_name: "西洋的退廃を封じ込める"
 faction_manifest_containment_of_decadence_desc: "「慈悲深き、慈愛に満ちた神の御名において」\n--------------\nこの地を守るために我々に残されたものは、自らの血肉以外にあるだろうか？帝国主義者たちの、自国のものでもない土地への渇望は、単純な外交では決して満たされることはない。ついに、抵抗の軸こそが、たとえ最後の一人まで戦うことを意味するとしても、世界においてさらなる帝国主義の野望が勢力を拡大するのを防ぐ唯一の道なのである。"
 faction_manifest_peace_in_our_time_name: "世界に平和を"
 faction_manifest_peace_in_our_time_desc: "「助言においては自由な精神であれ」\n--------------\nワルシャワ条約機構の崩壊と国際的な法と秩序の回復は、すべてNATO加盟国による共同の努力によるものであった。しかし今日、世界の一部の国々がこの安定の時代を自らの利益のために利用しようと決め、NATOの取り組みに積極的に反対しているように見受けられる。現代の安全保障を確保するためには、同盟を新たな領域へと拡大し、世界中のすべての人々の安全を保証するよう努めなければならない。"
 faction_manifest_unite_islamic_countries_name: "イスラム世界の統一"
 faction_manifest_unite_islamic_countries_desc: "何世紀にもわたり、イスラム世界は分断されてきた。今こそ協力と理解を通じて、再び団結することができる。"
 faction_manifest_the_second_red_wave_goal_name: "第二の赤い波"
 faction_manifest_the_second_red_wave_goal_desc: "ボルシェビキが初めて権力を掌握した時、彼らは数十年にわたる炎を点火した。しかし彼らは新たな体制の最大の欠陥——無能な指導部——を解決できなかった。西側諸国が強大化する中、ソビエト連邦は停滞していた。我々は共産主義独裁体制の下で長く生きすぎた。今こそ我々の共産主義のビジョンで世界を支配する時だ。"
 faction_manifest_comeback_of_the_monarchy_name: "君主制の復活"
 faction_manifest_comeback_of_the_monarchy_desc: "何世紀にもわたり、君主制は知恵と力をもって世界を統治してきた。しかし近年、共和制や民主主義がそれに取って代わり、もたらしたのは一時的な平和と安定に過ぎなかった。その繁栄は衰え始めている。今こそ、君主制が再び台頭し、我々の国家に秩序と伝統を取り戻す時である。団結と協力を通じて、我々は君主制の栄光を取り戻し、より明るい未来へと人々を導くことができる。"
 faction_manifest_preserving_our_place_name: "世界における我々の地位を守る"
 faction_manifest_preserving_our_place_desc: "「多極化世界における集団的安全保障」\n--------------\nソビエト連邦の崩壊は、いくつかの国家の誕生をもたらした。この出来事は西側陣営にとって好機となり、アメリカ合衆国とその他のNATOは旧ソ連諸国を自らの影響下に置こうとした。新たに覇権を握ったアメリカ合衆国が世界唯一の超大国であるという声も多いが、その状態が恒久的な現実となることを阻止するのが我々の陣営の目的だ。団結の力を通じて、我々はポスト・ソビエト圏が守られ、武装され、備えられていることを確実にする。"
 faction_cento_motto_name: "Freedom, Union, Vigilance"
 faction_cento_motto_desc: "'A bridge between East and West'\n--------------\nFrom nothing came something, a rebuilt identity and alliance. In such a troubled region, what could weak men accomplish? Alas, it is CENTO that has been tasked with the responsibility of keeping watch and ensuring the continued stability of all lives confined within these eastern frontiers."