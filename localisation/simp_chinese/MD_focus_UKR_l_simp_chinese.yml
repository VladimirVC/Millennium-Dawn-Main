 UKR_opfl_political_reforms: "政治改革"
 UKR_opfl_political_reforms_desc: "经历了最近的事件，我们国家需要进行一些政治改革。没有这些改革，乌克兰就无法进一步发展。"
 UKR_opfl_lustration_fight: "反对净化"
 UKR_opfl_lustration_fight_desc: "净化政策是指限制在前政权下担任高级职务的人获得公共服务。在最近的事件之后，乌克兰也实行了这项政策。这种暴行必须制止。"
 UKR_opfl_radicalism: "打击激进主义"
 UKR_opfl_radicalism_desc: "在几年的政治混乱中，激进主义在乌克兰蔓延。为了我们国家的和平生存，必须打击我国境内任何形式的激进主义。"
 UKR_opfl_ukrainisation_policy: "谴责乌克兰化"
 UKR_opfl_ukrainisation_policy_desc: "乌克兰化政策直接妨碍了我们与大邻国俄罗斯发展良好关系。必须谴责和制止乌克兰化宣传，否则不会带来好结果……"
 UKR_opfl_national_ref: "举行全民公投"
 UKR_opfl_national_ref_desc: "全民公投将帮助我们国家的人民决定自己的未来。我们需要尽快做到这一点！"
 UKR_opfl_independence_rep: "承认共和国独立"
 UKR_opfl_independence_rep_desc: "好吧，各共和国的人民已经做出了选择，我们必须尊重他们的选择。现在是投资和与新国家建立关系的好时机。"
 UKR_opfl_take_republic: "强制带回"
 UKR_opfl_take_republic_desc: "公投只是烟幕弹。我们真正的目标是找出我们领土上的分离主义者，现在是时候把我们的领土带回家了！分离主义者不会踏上乌克兰的土地！"
 UKR_opfl_federalisation_project: "联邦计划"
 UKR_opfl_federalisation_project_desc: "现在所有领土争端都已解决，我们可以期待美好的未来。乌克兰联邦的时代已经到来！"
 UKR_opfl_economic_policy: "新经济政策"
 UKR_opfl_economic_policy_desc: "新的经济政策将有助于振兴我们的经济，并随后重建它。"
 UKR_opfl_rural_land: "农村土地保护"
 UKR_opfl_rural_land_desc: "农村活动是我们经济的重要组成部分。因此，有必要确保他们合法获得的土地。这样我们就能让他们有信心，他们的土地不会在第二天被夺走。"
 UKR_opfl_tarif_genocide: "不！关税种族灭绝"
 UKR_opfl_tarif_genocide_desc: "关税灭绝是我们的公民的噩梦。他们的大部分钱都用来支付大量毫无意义的税款。我们必须对这种不法行为说“不”！"
 UKR_opfl_deindustry: "阻止乌克兰去工业化"
 UKR_opfl_deindustry_desc: "乌克兰独立后，旧政府把我们国家所有的工业财富白白送给了任何人。结果，我们陷入了工业困境。我们需要恢复工厂、厂房和其他企业的建设。"
 UKR_federaliz_tt: "我们将§Y联邦化§!乌克兰"
 UKR_rosava: "罗萨瓦股份有限公司"
 UKR_rosava_desc: "罗萨瓦股份有限公司是乌克兰最大的轮胎制造商。生产基地位于两个轮胎工厂：罗萨瓦和生产大尺寸轮胎的工厂。年产能约为600万条轮胎。"
 UKR_land_land: "继续土地改革"
 UKR_land_land_desc: "我们准备继续进行上个世纪开始的土地改革，并把它推进下去。"
 UKR_motor_sich: "马达西奇"
 UKR_motor_sich_desc: "马达西奇股份公司是一家乌克兰航空发动机制造商，总部位于扎波罗热。该公司生产飞机和直升机发动机以及工业船用燃气轮机和设备。"
 UKR_armor_kyv: "基辅装甲车辆制造厂"
 UKR_armor_kyv_desc: "基辅装甲车辆制造厂是乌克兰装甲工业的国有企业，主要负责苏联制造的装甲车辆的诊断、维修、保养、改装和现代化改造。"
 UKR_pivdenmash_idea: "南方机械制造厂"
 UKR_kyvarmor_idea: "基辅装甲车辆制造厂"
 UKR_zaz_idea: "扎波罗热汽车制造厂"
 UKR_kraz_idea: "克拉斯"
 UKR_motorsich_idea: "马达西奇"
 UKR_start_war_against_poland: "波兰-乌克兰战争"
 UKR_start_war_against_poland_desc: "我们国家的决定性时刻已经到来。我们将击退敌人，否则我们将从世界历史上消失。"
 UKR_hur_expandeds: "扩大情报总局的影响力"
 UKR_hur_expandeds_desc: "我们将扩大情报总局的权力，形势需要这样做，战争需要这样做！"
 UKR_unite_with_russian_genshtab: "争取俄罗斯总参谋部的帮助"
 UKR_unite_with_russian_genshtab_desc: "我们准备争取俄罗斯总参谋部的帮助，与波兰军队作战。"
 UKR_observer_joint_shtab_kiev: "建立联合总部"
 UKR_observer_joint_shtab_kiev_desc: "俄罗斯和乌克兰武装部队将在基辅建立联合总参谋部。"
 UKR_professional_shturm_groups: "突击旅"
 UKR_professional_shturm_groups_desc: "我们将开始招募人员加入突击旅，以更有效地对抗我们的敌人。"
 UKR_pmc_zaporozhets: "私人军事公司扎波罗热"
 UKR_pmc_zaporozhets_desc: "一些退伍军人成立了自己的私人军事公司，名为“扎波罗热”。"
 UKR_start_the_kashubian_uprising: "准备在卡舒比亚发动叛乱"
 UKR_start_the_kashubian_uprising_desc: "我们将在该地区准备叛乱，以破坏波兰的防御。"
 UKR_silesian_rebellion: "准备在西里西亚发动叛乱"
 UKR_silesian_rebellion_desc: "我们将在该地区准备叛乱，以破坏波兰的防御。"
