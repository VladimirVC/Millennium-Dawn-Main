l_japanese:
 TAI_legacy_of_1949: "1949年の遺産"
 TAI_legacy_of_1949_desc: "1949年の中国内戦終結は、国民党（KMT）とその支持者が台湾島省へ逃亡するのを見た。この出来事の遺産は、地元の土着台湾運動と組み合わさり、台湾市民の大多数による本土との再統一への強い拒絶につながった。"
 TAI_the_great_chip_empire: "The Great Chip Empire"
 TAI_the_great_chip_empire_desc: "Having taken advantage of semiconductor and microchip production in it's infancy, and by being a more attractive investment than other nations. Taiwan has catapulted itself to the forefront of the industry. Though cheap, efficient production, and large exports to western nations, Taiwan has balanced its economy and national security on being the supply of microchips to the western world, and continues to be an industry leader through constant and regular innovation."
 TAI_flight_crew_strike: "Taoyuan Flight Attendants Union strike"
 TAI_flight_crew_strike_desc: "No results! No stopping!"