 UKR_reverse_engineering_start: "逆向工程"
 UKR_reverse_engineering_start_desc: "我们的目标是制造自己的产品。"
 UKR_ato_supports: "支持退伍军人"
 UKR_health_supports: "医疗保健支持"
 UKR_poroh_prepare_donbass: "为顿巴斯的复赛做准备"
 UKR_poroh_prepare_donbass_desc: "我们准备对分裂分子进行报复，并永远解决与人民共和国的问题。"
 UKR_poroh_osce_ukr: "欧安组织观察员"
 UKR_poroh_osce_ukr_desc: "欧安组织观察员已被派往冲突地区，与未获承认的共和国稳定前线局势"
 ukraine_poroh.1.t: "乌克兰提议签署互不侵犯条约"
 ukraine_poroh.1.d: "乌克兰政府建议我们与他们缔结互不侵犯条约，显然他们认为我们是潜在的侵略者。"
 ukraine_poroh.1.a: "我们将签署协议"
 ukraine_poroh.1.b: "没有必要"
 ukraine_poroh.2.t: "与白俄罗斯签署互不侵犯条约"
 ukraine_poroh.2.d: "白俄罗斯政府同意与我们签署不侵犯条约，我们很高兴他们站在我们这一边。"
 ukraine_poroh.2.a: "很好"
 ukraine_poroh.3.t: "与白俄罗斯签署互不侵犯条约"
 ukraine_poroh.3.d: "白俄罗斯政府拒绝与我们签署互不侵犯条约，这让我们感到担忧。"
 ukraine_poroh.3.a: "悲哀"
 ukraine_poroh.4.t: "乌克兰教会的自主权"
 ukraine_poroh.4.d: "乌克兰教会已向我们的普世牧首请求允许其教会实行独立，我们的牧首会允许吗？"
 ukraine_poroh.4.a: "是"
 ukraine_poroh.4.b: "不"
 ukraine_poroh.5.t: "乌克兰教会的自主权"
 ukraine_poroh.5.d: "普世牧首批准我们教会的独立性"
 ukraine_poroh.5.a: "很好"
 ukraine_poroh.6.t: "乌克兰教会的自主权"
 ukraine_poroh.6.d: "普世牧首不批准我们教会的独立性"
 ukraine_poroh.6.a: "悲哀"
 ukraine_poroh.7.t: "乌克兰希望与维谢格拉德集团四国合作"
 ukraine_poroh.7.d: "乌克兰政府已经明确提出了同维谢格拉德集团四国的合作计划，我们作为四国的代表，是否同意这个合作？"
 ukraine_poroh.7.a: "是"
 ukraine_poroh.7.b: "不"
 ukraine_poroh.8.t: "与维谢格拉德集团国家的合作"
 ukraine_poroh.8.d: "他们同意合作"
 ukraine_poroh.8.a: "很好"
 ukraine_poroh.9.t: "与维谢格拉德集团国家的合作"
 ukraine_poroh.9.d: "他们拒绝与我们合作"
 ukraine_poroh.9.a: "悲哀"
 UKR_kefalia_agree: "普世牧首的许可"
