 RAJ_focus_mao_how_to_cancel: "The rebellion can be averted by allowing a §HMaoist-aligned§! government to take power."
 RAJ_mao_reb.4.t: "Manifestaciones Antigubernamentales"
 RAJ_mao_reb.4.d: "Una ola de protestas comunistas antigubernamentales ha barrido la India, ya que los ciudadanos expresan su descontento y exigen un cambio. Las manifestaciones, organizadas por diversos grupos comunistas, han atraído a multitudes masivas en ciudades y pueblos importantes. Los manifestantes están planteando preocupaciones sobre temas como la desigualdad de ingresos, el desempleo y las políticas autoritarias percibidas del gobierno. Están pidiendo una sociedad más inclusiva, donde los recursos se distribuyan equitativamente y se protejan los derechos de la clase trabajadora."
 RAJ_mao_reb.4.a: "Aplástelos con la policía!"
 RAJ_mao_reb.5.t: "Revolución Comunista!"
 RAJ_mao_reb.5.d: "In a shocking turn of events, India is on the brink of a civil war as tensions between the government and the communist factions reach an all-time high. The country has been gripped by violent protests and clashes, as both sides refuse to back down. The Indian government has been implementing controversial policies which have drawn the ire of the communist parties. The clash of ideologies and opposing visions for the country's future has spiralled into an escalating conflict."
 RAJ_mao_reb.5.a: "Que Dios salve a la India, porque nadie más puede."
 indian_event.41.t: "Tata Tea paga 271 millones de libras esterlinas por Tetley"
 indian_event.41.d: "Tetley, famosa por sus anuncios de televisión con los Tetley Tea Folk, ha sido adquirida por Tata Tea, la mayor compañía de té integrada del mundo. La empresa india ha pagado 271 millones de libras esterlinas por Tetley, de propiedad privada, que fabrica el té más popular de Gran Bretaña y la segunda marca de té más grande del mundo. El acuerdo, concluido después de meses de negociaciones, se financia a través de una combinación de capital y deuda. Tata Tea, parte del grupo empresarial más grande de la India, Tata, dijo que la administración existente de Tetley continuará manejando los asuntos diarios de la empresa."
 indian_event.41.a: "Interesante"
 indian_event.42.t: "Visita del Presidente de EE. UU. a la India"
 indian_event.42.d: "El primer ministro indio, Atal Bihari Vajpayee, recibió la presión del presidente de EE. UU. sobre Islamabad. Fue la primera vez que un presidente estadounidense se puso abiertamente del lado de la India contra Pakistán en tiempos de guerra. Antes del viaje del presidente de EE. UU., la comunidad de inteligencia estadounidense ofreció una estimación escalofriante: que la posibilidad de una guerra a gran escala entre las dos potencias nucleares era del cincuenta por ciento en la próxima década. El presidente de EE. UU. fue recibido como una estrella de rock en toda la India, con paradas en Delhi, Hyderabad, Jaipur y Mumbai. Recibió una ovación de pie al dirigirse al parlamento. Las multitudes en todas partes eran enormes. Vajpayee devolvió la visita más tarde ese año con una cena de estado en la Casa Blanca. Después de décadas de relaciones turbulentas, la India y Estados Unidos habían doblado una esquina."
 indian_event.42.a: "Saludos, amigos."
 indian_event.43.t: "El Escándalo de Amaño de Partidos"
 indian_event.43.d: "Uno de los mayores escándalos de amaño de partidos en la historia del críquet ocurrió cuando la policía de Delhi reveló que habían captado conversaciones turbias entre Sanjay Chawla y Hansie Cronje. Los fanáticos idolatraban a Cronje, un popular y exitoso jugador de críquet sudafricano. Sin embargo, fue divisivo debido a su asociación con Sanjay Chawla. Sanjay fue identificado como un participante conocido en el círculo de apuestas indio. En su negación inicial de todas las acusaciones de amaño de partidos, Cronje lloró, pero esto fue seguido por su interrogatorio."
 indian_event.43.a: "Prohíbanle jugar de nuevo!"
 indian_event.44.t: "La población de la India alcanza los mil millones"
 indian_event.44.d: "La población de la India alcanzó oficialmente los mil millones de personas con el nacimiento de una niña. Los funcionarios del gobierno decidieron que un bebé nacido en el hospital Safdarjang de Delhi marcaría el hito. Astha Arora fue nombrada como el bebé número mil millones de la India. Anjana Arora, la madre de Aastha, habló con Witness sobre el día en que su familia fue lanzada a los reflectores mediáticos."
 indian_event.44.a: "¿Esto es bueno o malo?"
 indian_event.45.t: "Ataque al Parlamento Indio"
 indian_event.45.d: "Un escuadrón suicida asaltó el complejo del parlamento indio, matando a siete personas antes de morir en un ataque sin precedentes contra el centro del poder de la mayor democracia del mundo. Los testigos dijeron que cinco personas asaltaron el parlamento, saltando de un automóvil y atacando a los guardias de seguridad después de haber conducido aparentemente al complejo usando un pase falso. Uno de los intrusos se hizo estallar en la entrada principal de las cámaras del parlamento. Escuché un sonido como de petardo cerca de la entrada, luego vi a la gente corriendo de un lado a otro, dijo Kharbala Sain, miembro del parlamento, fuera del grandioso parlamento de arenisca, diseñado por Sir Edwin Lutyens bajo el dominio colonial británico. Vi a muchas personas disparando al mismo tiempo. No pude distinguir quién era quién. No pude entender quiénes eran los terroristas y quiénes la policía, dijo el parlamentario. No hubo una reclamación inmediata de responsabilidad por el asalto. Uno de los atacantes murió cuando detonó explosivos atados a su cintura. El primer ministro indio, que no estaba en el complejo en ese momento, salió en televisión para decir que la batalla de la India contra el terrorismo había alcanzado su etapa final, mientras que sus ministros de defensa e interior prometieron una respuesta dura. El ministro del Interior, LK Advani, dijo: Liquidaremos a los terroristas y a sus patrocinadores, sean quienes sean, estén donde estén. La especulación inicial se centró en militantes islamistas que luchan contra el dominio indio en el estado de Jammu y Cachemira, donde 38 personas murieron en un ataque suicida en la asamblea estatal dos meses antes. Si se confirma, aumentará las tensiones con Pakistán, acusado por Nueva Delhi de patrocinar la militancia cachemir. El presidente de Pakistán, Pervez Musharraf, condenó rápidamente el ataque y envió un mensaje de simpatía a Vajpayee."
 indian_event.45.a: "Malditos bastardos!"
 indian_event.46.t: "Delhi obtiene un metro de clase mundial"
 indian_event.46.d: "El vice primer ministro L.K. Advani inauguró el primer tren del metro de Delhi para su prueba en el depósito de trenes del metro en Shastri Park hoy, en presencia de una multitud entusiasta. El metro de clase mundial, descrito por el ministro principal de Delhi, Sheila Dikshit, como un proyecto que no tiene posibilidad de detenerse, se espera que comience a funcionar antes de Navidad."
 indian_event.46.a: "Genial"
 RAJ_indian_space_programme: "Organización de Investigación Espacial de la India"
 RAJ_indian_space_programme_desc: "La Organización de Investigación Espacial de la India, comúnmente conocida como ISRO, es la agencia espacial nacional de la India. Opera como el brazo principal de investigación y desarrollo del Departamento de Espacio, que es supervisado directamente por el primer ministro de la India, mientras que el presidente de ISRO también actúa como el ejecutivo del DoS."
 RAJ_indian_space_endeavors: "Indian Space Endeavours"
 RAJ_indian_space_endeavors_desc: "Es el siglo XXI: la era de la alta tecnología y la prosperidad. Recientemente, terminó la Guerra Fría, donde diferentes superpotencias, la URSS y los EE. UU., lucharon por la exploración espacial. La India se quedó atrás, pero esta vez no perderemos la oportunidad de alcanzar a las otras potencias espaciales en la exploración espacial."
 RAJ_irs_series: "Satélites IRS de la India"
 RAJ_irs_series_desc: "Los satélites de teledetección indios son los satélites de observación terrestre de la India. Son la mayor colección de satélites de teledetección para uso civil en operación hoy en día, proporcionando servicios de teledetección."
 RAJ_insat_navic: "Serie INSAT"
 RAJ_insat_navic_desc: "El Sistema Nacional de Satélites de la India es el sistema de telecomunicaciones del país. Es una serie de satélites geoestacionarios multipropósito construidos y lanzados por ISRO para satisfacer las necesidades de telecomunicaciones, transmisión, meteorología y búsqueda y rescate."
 RAJ_Chandrayaan: "Proyecto Chandrayan"
 RAJ_Chandrayaan_desc: "Chandrayaan-1 es la primera sonda lunar india bajo el programa Chandrayaan. Fue lanzada por la Organización de Investigación Espacial de la India (ISRO) en octubre de 2008 y operó hasta agosto de 2009."
 RAJ_financing_of_private_space_companies: "Apoyo a Iniciativas Privadas"
 RAJ_financing_of_private_space_companies_desc: "Aunque la industria espacial de la India está impulsada principalmente por la Organización de Investigación Espacial Nacional de la India, la industria en general incluye más de 500 proveedores privados y varios organismos del Departamento de Espacio en todos los aspectos comerciales, de investigación y arbitrarios."
 RAJ_chandrayan_to_moon: "Chandrayan 3 a la Luna!"
 RAJ_chandrayan_to_moon_desc: "Chandrayaan-3 es la tercera misión de exploración lunar india bajo el programa Chandrayaan de la Organización de Investigación Espacial de la India. Consiste en un módulo de aterrizaje llamado Vikram y un rover llamado Pragyan, similares a los de la misión Chandrayaan-2."
 RAJ_Gaganyan: "Indian Orbital Spacecraft"
 RAJ_Gaganyan_desc: "Gaganyaan es una nave espacial orbital tripulada india destinada a ser la nave espacial formativa del Programa de Vuelos Espaciales Humanos de la India. La nave espacial está diseñada para transportar a tres personas y una versión planificada mejorada estará equipada con capacidades de encuentro y acoplamiento."
 RAJ_Human_Spaceflight_Programme: "Programa de Vuelos Espaciales Humanos"
 RAJ_Human_Spaceflight_Programme_desc: "El Programa de Vuelos Espaciales Humanos de la India es un programa en curso de la Organización de Investigación Espacial de la India para desarrollar la tecnología necesaria para lanzar naves espaciales orbitales tripuladas en órbita terrestre baja."
 RAJ_astrosat: "ASTROSAT"
 RAJ_astrosat_desc: "Astrosat es el primer telescopio espacial multifrecuencia de la India."
 RAJ_energy_idea: "Energía Nuclear India"
 indian_event.47.t: "El terror asola Mumbai"
 indian_event.47.d: "Grupos coordinados de pistoleros dispararon y bombardearon lugares turísticos en el centro financiero indio de Mumbai el miércoles por la noche y el jueves por la mañana, matando al menos a 101 personas e hiriendo a más de 200, mientras aparentemente apuntaban a ciudadanos estadounidenses y británicos para usarlos como rehenes. Los atacantes barrieron dos hoteles de lujo frecuentados por extranjeros, el Taj Mahal Palace y el Oberoi, disparando armas automáticas, lanzando granadas y enviando a los huéspedes a buscar seguridad en pánico. Algunos invitados quedaron atrapados dentro de los hoteles durante horas, incluso cuando una serie de explosiones incendiaron el hotel Taj, un hito a lo largo del frente marítimo de Mumbai. Aunque Mumbai ha sido escenario de varios ataques terroristas en los últimos años, los expertos dijeron que los asaltos del miércoles requirieron un grado de reconocimiento y planificación sin precedentes. La escala y sincronización de los ataques apuntaban a la probable participación de comandantes experimentados, dijeron algunos, sugiriendo una posible participación extranjera. Lanzando sus ataques después del anochecer, los terroristas atacaron casi simultáneamente el aeropuerto nacional de la ciudad y una estación de tren, y rociaron fuego de armas en el Leopold Cafe, un restaurante popular entre los extranjeros. Hasta dieciséis grupos atacaron nueve sitios en el flanco sur de esta metrópolis abarrotada de 19 millones."
 indian_event.47.a: "Horrible"
 indian_event.48.t: "El Movimiento contra la Corrupción"
 indian_event.48.d: "El movimiento anticorrupción indio, conocido popularmente como Anna Andolan, fue una serie de manifestaciones y protestas en toda la India que comenzaron en 2011 y tenían como objetivo establecer una legislación y aplicación fuerte contra la corrupción política percibida como endémica. El movimiento fue nombrado como una de las 'Diez Noticias Principales de 2011' por la revista Time. El movimiento ganó impulso a partir del 5 de abril de 2011, cuando el activista anticorrupción Anna Hazare comenzó una huelga de hambre en el monumento Jantar Mantar en Nueva Delhi. El movimiento tenía como objetivo aliviar la corrupción en el gobierno indio mediante la introducción del proyecto de ley Jan Lokpal. Otro objetivo, liderado por Ramdev, Kiran Bedi, Arvind Kejriwal y otros, fue la repatriación de dinero negro de bancos extranjeros. Los manifestantes masivos se centraron en cuestiones legales y políticas, incluidas la corrupción política, la cleptocracia y otras formas de corrupción. El movimiento fue principalmente uno de resistencia civil no violenta y estaba compuesto por manifestaciones, marchas, actos de desobediencia civil, huelgas de hambre y mítines, y el uso de las redes sociales para organizar, comunicar y crear conciencia. Las protestas fueron no partidistas y la mayoría de los manifestantes eran hostiles a los intentos de los partidos políticos de utilizarlos para fortalecer su propia agenda política."
 indian_event.48.a: "Interesante"
 indian_event.49.t: "Audiencia en el Parlamento"
 indian_event.49.d: "Recientemente, el movimiento LGBT ha ganado cada vez más popularidad en la sociedad india. El Parlamento indio ha tenido muchas discusiones sobre la legalización del LGBT en el país, y en una reunión reciente se planteó nuevamente el tema. Se cree que este es el momento en que se debe tomar la decisión final: si legalizar el LGBT en la India o mantenerlo prohibido y no volver a visitar el tema. ¿Qué elegiremos?"
 indian_event.49.a: "¿El LGBT es una broma?"
 indian_event.49.b: "Permitimos la legalización del LGBT."
 indian_event.50.t: "Ataque de Pulwama"
 indian_event.50.d: "The 2019 Pulwama attack occurred on 14 February 2019, when a convoy of vehicles carrying Indian security personnel on the Jammu-Srinagar National Highway was attacked by a vehicle-borne suicide bomber at Lethapora in the Pulwama district of the erstwhile state of Jammu and Kashmir. The attack killed 40 Indian Central Reserve Police Force (CRPF) personnel as well as the perpetrator - Adil Ahmad Dar - who was a local Kashmiri youth from the Pulwama district. The responsibility for the attack was claimed by the Pakistan-based Islamist terrorist group, Jaish-e-Mohammed. India blamed neighbouring Pakistan for the attack, while the latter condemned the attack and denied having any connections to it. The attack dealt a severe blow to India-Pakistan relations, consequently resulting in the 2019 India-Pakistan military standoff. Subsequently, Indian investigations identified 19 accused"
 indian_event.50.a: "Oh, mierda."
 indian_event.51.t: "La estación india Chandrayaan-3 aterrizó con éxito en la Luna!"
 indian_event.51.d: "The Indian automatic interplanetary station Chandrayaan-3 successfully made a soft landing on the moon. The descent was broadcast live by the Indian Space Research Organization. It can be viewed on YouTube. The soft landing took place at approximately the South Pole of the Moon. Thus, India entered the elite club of space powers capable of soft landing on the lunar surface. Earlier this possibility was demonstrated by the USSR, the USA and China."
