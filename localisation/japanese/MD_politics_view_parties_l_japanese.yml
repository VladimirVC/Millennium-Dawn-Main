 SAF.Monarchist: "£SAF_monarchism ズールー家"
 SAF.Monarchist_icon: "£SAF_monarchism"
 SAF.Monarchist_desc: ""
 SAU.Vilayat_e_Faqih: "£SAU_hardline_shite (PGH) ヒジャーズ神の党"
 SAU.Vilayat_e_Faqih_icon: "£SAU_hardline_shite"
 SAU.Vilayat_e_Faqih_desc: "ホメイニ主義 - ヒジャーズ神の党（アラビア語ローマ字表記：Hezbollah al-Hejaz）\n\nヒジャーズ神の党は、1980年代からサウジアラビア政府に対し低強度の武装闘争を継続する地下組織である。1979年のイラン革命に触発され、サウード家を打倒してイスラム共和国を樹立することを目指している。最高法学者の手に権力を集中させるホメイニの法学者の統治論を奉じているため、イランやレバノンのヒズボラと連携している。穏健な改革運動とは異なり、サウード家との和解を拒否し、過激な戦術を継続している。"
 SAU.Mod_Vilayat_e_Faqih: "£generic_Mod_Vilayat_e_Faqih_small (RM) 改革運動"
 SAU.Mod_Vilayat_e_Faqih_desc: "シーア派イスラム主義シラージ派 - 改革運動（シラージ派）（アラビア語ローマ字表記：Islahiyyah）\n\n改革運動は、サウジアラビア東部州出身のシーア派学者による緩やかなネットワークであり、著名なシーア派指導者ムハンマド・アル＝シラージの教えに従う。同氏は後にホメイニ師と彼の法学者の統治論に反対する立場を取った。改革運動はかつて「アラビア半島イスラム革命機構」としてサウジ政府に対する地下反乱活動を展開したが、90年代には主張を穏健化し、イランとの関係を断絶、ファハド国王との合意に達するため解散に同意し、国王は運動メンバーの釈放に応じた。現在、同運動の元メンバーはイラン流革命よりも穏健な改革を支持しており、この戦略によりサウジ王政は彼らの活動を容認しているが、より過激な思想を持つシーア派の若者の離反を招いている。"
 SAU.Caliphate: "£SAU_salafist_jihadism (AQ) アルカイダ"
 SAU.Caliphate_2009: "£SAU_salafist_jihadism  (AQIA) アラビア半島のアルカイダ"
 SAU.Caliphate_icon: "£SAU_salafist_jihadism"
 SAU.Caliphate_desc: "サラフィー・ジハード主義 - アルカイダ（アラビア語ローマ字表記：Al-Qaeda）\n\nアルカイダは、オサマ・ビン・ラディンら、ソ連のアフガニスタン侵攻時にムジャヒディーンとして戦ったいわゆる「アフガン・アラブ人」によって創設されたサラフィー・ジハード主義運動である。サイイド・クトゥブの思想を基盤とするアルカイダは、イスラム過激派テロの代名詞的存在となり、世界規模のジハードを呼びかけることで、イスラム圏全域に勢力を拡大した。クウェート侵攻時にビンラディンがサダム・フセインに対する軍事支援を提案した際、ファハド国王がこれを拒否しアメリカに支援を求めたことを契機に、アルカイダはサウード家打倒を武力による目標と定めている。"
 SAU.Kingdom: "£SAU_kingdom (HoS) サウード家"
 SAU.Kingdom_icon: "£SAU_kingdom"
 SAU.Kingdom_desc: "ワッハーブ派君主主義 - サウード家（アラビア語ローマ字表記：Āl Su'ūd）\n\n1900年代初頭にアブドゥルアズィーズ・イブン・サウードがアラビア半島の大部分を征服して以来、サウード家はナジュド、ヒジャーズ、東部州、アシール、ジザン、ナジュラーンの地を支配してきた。サウード家は、スンニ派イスラムの「より純粋な」形態への回帰を提唱したサラフィー派聖職者アル＝ワッハーブの信奉者たちとの同盟に依存してきた。ワッハーブ主義によって与えられた宗教的正当性は、サウード家の政治的決定を神聖化するファトワーをワッハーブ派聖職者が発布することで、サウード家の支配を支えてきた。あらゆる形態の政治的反対や抗議を禁じるサウジ流サラフィズムは、宗教的権威の政治エリートへの集中に反対したり、世界的なジハードを提唱したりする、より大衆的なサラフィズムとは一線を画している。"
 SAU.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small (IAM) イスラム覚醒運動"
 SAU.Neutral_Muslim_Brotherhood_desc: "穏健イスラム主義 - イスラム覚醒運動（アラビア語ローマ字表記：Al-Sahwa Al-Islamiyya）\n\nイスラム覚醒運動（通称：サフワ）は1990年代に、サウジアラビア王政が「真の」イスラムから逸脱していると認識したスンナ派聖職者たちの緩やかなネットワークとして台頭した。この運動はサウジアラビア王国における真の政治改革を推進してきたが、反体制派の聖職者に対するサウード王家の投獄や懐柔策により、成功を収めることはできなかった。"
 SAU.Neutral_Muslim_Brotherhood_2011: "£SAU_reformist_shite (UIP) ウンマ・イスラム党"
 SAU.Neutral_Muslim_Brotherhood_2011_desc: "穏健イスラム主義 - ウンマ・イスラム党は、サウジアラビアのイスラム主義者、知識人、人権活動家、弁護士らで構成される政治組織であり、サウジアラビア王政に反対する立場にある。同党はサウジアラビア国内における近代主義的潮流を代表する存在となりつつあり、あらゆる政治的異論を禁じるワッハーブ主義とは対照的に、サウジアラビアの宗教性と政治改革の融合を追求している。"
