 korea_russia.22.t: "北朝鮮との軍事演習"
 korea_russia.22.d: "北朝鮮参謀本部は、我々の軍隊の力を示し、軍の協力体制を試すために合同軍事演習を行うことを提案している。"
 korea_russia.22.a: "素晴らしい提案だ"
 korea_russia.22.b: "いや"
 korea_russia.23.t: "ロシアとの軍事演習"
 korea_russia.23.d: "ロシア参謀本部は両国軍の合同演習に同意した。"
 korea_russia.23.a: "素晴らしい！"
