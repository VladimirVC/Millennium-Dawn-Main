l_spanish:
 this_investment_offer_pending_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! ¡Actualmente no está considerando una §Coferta de inversión§! de §Y[ROOT.GetNameWithFlag]§!.\n\n§YNota del desarrollador:§! A veces, esto puede bloquearse debido a un rendimiento deficiente durante una partida multijugador. Espere 90 días (tres meses) antes de informar cualquier error con este estado."
 has_available_treasury_tt: "§YTesorería§! tiene más de $$§Y[?ROOT.project_monetary_cost^-1]§! Miles de millones (Actual: $$§G[?ROOT.treasury]§! Miles de millones)\n"
 influence_gain_tooltip_yes_tt: "Ganaremos influencia con este proyecto de inversión.\n\n[investment_cooldown]"
 influence_gain_tooltip_no_tt: "No ganaremos influencia con este proyecto de inversión.\n"
 disabled_foreign_investment_flag_tt: "§Y[ROOT.GetNameWithFlag]§! puede invertir en otros países.\n"
 int_auto_reject_investment_flag_tt: "§Y[PREV.CONTROLLER.GetNameWithFlag]§! Actualmente no rechaza ofertas automáticamente."
 state_based_investments_screen_tt: "§HInversión interna§!"
 check_for_investment_project_limits_tt: "Currently Has Available §HInternal Investment§! Slot (Free Projects: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0])"
 state_based_investments_screen_delayed_tt: "El menú que aparece a continuación muestra una serie de decisiones que puedes tomar para fomentar distintos tipos de desarrollo dentro de [THIS.GetName]. Todas las naciones tendrán un mínimo de dos espacios disponibles que pueden usar para cualquiera de sus estados en todo el país. Puedes elegir realizar varios proyectos en un estado o puedes elegir distribuirlos por todo el país. ¡Puedes ganar espacios adicionales si aumentas la §YClasificación de poder§! de tu nación\n\nTragamonedas por clasificación de poder:\n- §YSuperpotencia§!: 6\n- §YGran Potencia§!: 5\n- §YGran Poder§!: 4\n- §YPoder Regional§!: 3\n"
 available_internal_investments_screen_tt: "Available §HInternal Investment§! Slots: [current_soi_count] / [?ROOT.modifier@internal_investment_slot_number|0]"
 available_internal_investments_tt: "All nations will have a minimum of two available slots they can use for any of their states across their entire country. You can choose to do multiple projects in one state or you can choose to spread the projects across the country. You can gain additional slots by increasing your nation's §YPower Ranking§!\n\nOngoing Projects:\n[ROOT.soi_timer_6][ROOT.soi_timer_5][ROOT.soi_timer_4][ROOT.soi_timer_3][ROOT.soi_timer_2][ROOT.soi_timer_1]"
 state_owned_local_renewable_capacity_modifier: "Expandiendo la Capacidad Renovable Local"
 state_owned_local_renewable_capacity_modifier_desc: "Después de una serie de inversiones específicas en la infraestructura de energía renovable local, el estado ahora está produciendo más energía a partir de fuentes renovables."
 state_owned_local_infrastructure_modifier: "Expandiendo de la Infraestructura Local"
 state_owned_local_infrastructure_modifier_desc: "La expansión de la infraestructura local en el estado ha dado lugar a una variedad de proyectos a corto plazo para mejorar sustancialmente la infraestructura local."
 state_owned_local_military_infrastructure_modifier: "Ampliación de la infraestructura militar local"
 state_owned_local_military_infrastructure_modifier_desc: "Tras una importante inversión en instalaciones militares locales y mejoras de infraestructura, las instalaciones militares de la región están ahora completamente modernizadas. La capacidad de producción militar del estado ha mejorado sustancialmente."
 state_owned_local_energy_infrastructure_modifier: "Ampliación de la infraestructura energética local"
 state_owned_local_energy_infrastructure_modifier_desc: "Las inversiones específicas en la red eléctrica local han dado como resultado una modernización integral de la infraestructura de generación y distribución de energía del estado. El estado ahora cuenta con una capacidad de producción energética mejorada en todos los sectores."
 state_owned_build_forward_logistics_base_modifier: "Construir bases logísticas avanzadas"
 state_owned_build_forward_logistics_base_modifier_desc: "Se han establecido bases logísticas estratégicas en todo el estado, creando una red de suministro de avanzada. Estas instalaciones mejoran significativamente el movimiento de tropas y materiales en la región, reduciendo la demanda general de suministros."
 state_owned_improve_rebuilding_efforts_modifier: "Esfuerzos de reconstrucción mejorados"
 state_owned_improve_rebuilding_efforts_modifier_desc: "Las iniciativas de reconstrucción han logrado el apoyo de la población local, mejorando la cooperación pública y reduciendo el malestar social. La inversión en infraestructura local y proyectos de reconstrucción comunitaria ha impulsado el cumplimiento de las normas entre la población local."
 state_owned_hire_extra_primary_sector_workers_modifier: "Contratar trabajadores adicionales del sector primario"
 state_owned_hire_extra_primary_sector_workers_modifier_desc: "La fuerza laboral del sector primario del estado se ha ampliado mediante iniciativas específicas de reclutamiento y capacitación. Las operaciones agrícolas, mineras y de extracción de otros recursos se benefician ahora de una mayor disponibilidad de mano de obra, lo que se traduce en una mayor producción de recursos."
 currently_encouraged_investments: "Actualmente §YInversiones alentadoras§! en §Y[THIS.GetName]§!."
 encourage_investments_in_state_tt: "§YFomente las inversiones§! en §Y[THIS.GetName]§!\n---------\nPodemos incentivar inversiones en §Y[THIS.GetName]§! reduciendo la burocracia en el área y haciendo que el tiempo de inversión sea más rápido de lo que hubiera sido de otra manera."
 encourage_investments_in_state_delayed_tt: "§YPrerrequisitos:§!\n[!encourage_investments_in_state_click_enabled]\n§YEfectos:§!\n[!encourage_investments_in_state_click]\n"
 encourage_investments_in_state_click_tt: "Durante 160 días las §YInversiones§! en §Y[THIS.GetName]§! serán §Y15%§! más baratas. También será más probable que la IA invierta en el Estado."
 encourage_productivity_in_state: "Actualmente se §Yfomenta la productividad§! en §Y[THIS.GetName]§!."
 encourage_productivity_in_state_tt: "§YFomentar el crecimiento de la productividad§! en §Y[THIS.GetName]§!\n---------\nPodemos incentivar el crecimiento de la productividad en §Y[THIS.GetName]§! incorporando nuevas tecnologías, técnicas y más a la región para ayudarla a crecer."
 encourage_productivity_in_state_delayed_tt: "§YPrerrequisitos:§!\n[!encourage_productivity_in_state_click_enabled]\n§YEfectos:§!\n[!encourage_productivity_in_state_click]\n"
 encourage_productivity_in_state_click_tt: "Durante 160 días, el §Ycrecimiento de la productividad§! en §Y[THIS.GetName]§! será §Y20%§! más rápido."
 expand_local_building_capacity: "Actualmente §YExpandiendo la Capacidad de Construcción Local§! en §Y[THIS.GetName]§!."
