l_braz_por:
 norway_focus: "Árvore de Foco da Noruega"
 haakons_marriage_announced: "§YCasamento de Haakon Anunciado!§!"
 haakon_married: "§YO Príncipe Herdeiro se Casou!§!"
 norway.1.t: "Colisão de Trens em Åsta"
 norway.1.d: "Em [GetDateText], o acidente ferroviário de Åsta no distrito de Østerdalen viu um trem local na Linha de Røros colidir com um trem nacional vindo de Trondheim.\n\n19 pessoas foram mortas, marcando a primeira grande catástrofe em solo norueguês em [GetYear]. 67 passageiros sobreviveram ao acidente.\n\nO acidente é atribuído ao governo e à Administração Nacional de Ferrovias da Noruega, que reduziu os requisitos para garantir que as ferrovias estivessem realmente desobstruídas antes de seguir viagem."
 norway.1.o1: "Iniciar uma Investigação Completa"
 norway.1.o2: "Permanecer em Silêncio"
 norway.2.t: "Casamento do Príncipe Herdeiro Haakon"
 norway.2.d: "O Rei Harald anunciou ao parlamento que seu herdeiro aparente Haakon, o Príncipe Herdeiro da Noruega, irá se casar com sua namorada, Mette-Marit Tjessem Høiby.\n\nA escolha da noiva causou algumas sobrancelhas arqueadas, já que Høiby não é apenas uma plebeia, mas também tem um filho jovem, nascido fora do casamento. É claro que o apoio do governo e o financiamento para o casamento do príncipe herdeiro estão garantidos.\n\nOu estão?"
 norway.2.o1: "Intrigante."
 norway.3.t: "Haakon se casa com Mette-Marit Tjessem Høiby"
 norway.3.d: "O parlamento norueguês não levantou objeções à escolha do Príncipe Herdeiro Haakon de futura esposa. O feliz casal se tornou marido e mulher em uma grande cerimônia em 25 de agosto de 2001. A prole real parece ser apenas uma questão de tempo."
 norway.3.o1: "Parabéns!"
 norway.4.t: "Noruega entra na produção de petróleo"
 norway.4.d: "Após uma negociação com o Parlamento Britânico, a Noruega agora está se juntando ao Tratado Britânico de Produção de Petróleo, o que permite à Noruega produzir petróleo no Mar do Norte."
 norway.4.o1: "Hora de pegar esse Ouro Negro!"
 norway.5.t: "[NRY.GetName] Propõe Possíveis Investimentos em Petróleo"
 norway.5.d: "A delegação norueguesa entrou em contato com nossos diplomatas e está propondo um possível acordo de petróleo dentro de sua nação. Podemos investir em sua nação para obter uma participação melhor em suas ações de petróleo e alguma influência em seu estado."
 norway.5.a: "Parece um Ótimo Plano"
 norway.5.b: "Não"
 norway.6.t: "[FROM.GetName] Concorda em Investir!"
 norway.6.d: "Delegações de [FROM.GetName] concordaram em investir, e suas empresas estatais em breve estarão chegando à Noruega."
 norway.6.a: "Ótimo"
 norway.7.t: "[FROM.GetName] Rejeita Proposta"
 norway.7.d: "Delegações de [FROM.GetName] decidiram que não querem participar do investimento em nossa nação. Uma perda lamentável para nós dois."
 norway.7.a: "Lamentável"
 norway.81.t: "Noruega Propõe Pacotes de Ajuda"
 norway.81.d: "O governo norueguês recentemente enviou um pedido para fornecer a nosso povo pacotes de ajuda, especificamente para empresas locais. Permitir que esses pacotes de ajuda fluam pode significar que os noruegueses terão influência significativa dentro de nossa nação."
 norway.81.a: "Deixe-os Enviar"
 norway.81.b: "Não"
 norway.82.t: "Governo palestino rejeita proposta de ajuda."
 norway.82.d: "O governo palestino rejeitou nossa proposta de ajuda, sem dar uma razão real para isso."
 norway.82.a: "Ok"
 norway.8.t: "Governo Palestino Aprova Pacotes de Ajuda"
 norway.8.d: "O governo palestino recentemente aprovou nosso pedido para fornecer ajuda às suas empresas, como devemos prosseguir?"
 norway.8.a: "Pacote Pequeno"
 norway.8.b: "Pacote Médio"
 norway.8.c: "Pacote Grande"
 norway.91.t: "Onde Procuramos Armas?"
 norway.91.d: "Atualmente estamos procurando a nação certa para adquirir armas, e atualmente os Estados Unidos e a Alemanha são nossas melhores apostas."
 norway.91.a: "Perguntar à Alemanha"
 norway.91.b: "Perguntar aos EUA"
 norway.92.t: "Governo Alemão Aprova Venda de Armas"
 norway.92.d: "O governo alemão aprovou nossos pedidos de armas, e seus pacotes chegarão em breve."
 norway.92.a: "Ótimo"
 norway.92.b: "Na Verdade, Essas Custam Muito..."
 norway.9.t: "Governo dos EUA Aprova Venda de Armas"
 norway.9.d: "O governo americano aprovou nossos pedidos de armas, e seus pacotes chegarão em breve."
 norway.9.a: "Ótimo"
 norway.9.b: "Na Verdade, Essas Custam Muito..."
 norway.93.t: "[FROM.GetName] Rejeita Venda de Armas"
 norway.93.d: "[FROM.GetName] afirmou que não está interessado em vender nenhuma de suas armas para nós."
 norway.93.a: "Maldição"
 norway.94.t: "Noruega Gostaria de Comprar Armas"
 norway.94.d: "O governo norueguês entrou em contato conosco recentemente sobre a venda de armas militares e está disposto a gastar muito para colocar as mãos em nossos estoques."
 norway.94.a: "Ok"
 norway.94.b: "Não"
 norway.10.t: "O governo norueguês gostaria de realizar uma reunião."
 norway.10.d: "O governo norueguês está interessado na disposição do nosso governo em estabelecer novos canais de comunicação em momentos de tensão, pressionando-nos especificamente a assinar um acordo que nos impeça de responder com força militar caso nossos canais de comunicação sejam interrompidos. Eles também afirmaram ter interesse em firmar acordos comerciais que facilitem o comércio entre nossos países."
 norway.10.a: "Não Vejo Por Que Não"
 norway.10.b: "Não"
 norway.11.t: "O Governo Russo Concorda"
 norway.11.d: "O governo russo concordou com as solicitações apresentadas por nossos diplomatas na reunião realizada anteriormente."
 norway.11.a: "Ótimo"
 norway.12.t: "O Governo Russo Rejeita"
 norway.12.d: "O governo russo rejeitou os pedidos apresentados pelos nossos diplomatas na reunião realizada anteriormente."
 norway.12.a: "Maldição"
 norway.14.t: "Os LGBT"
 norway.14.d: "Nosso estado reconhece o direito a uniões civis entre 2 indivíduos, no entanto, casamentos completos de indivíduos homossexuais ainda não foram totalmente legalizados. Podemos prosseguir e encerrar o debate hoje."
 norway.14.a: "Comprometer-se com a Legalização Total"
 norway.14.b: "Manter o Status Quo"
 norway.16.t: "Leis de Migração"
 norway.16.d: "Temos permitido a entrada de migrantes em nosso estado com relativa facilidade, considerando nossa baixa população e o fato de que foram eles que construíram esta nação quando ela estava em seu momento mais difícil. Mas hoje o debate mudou, e precisaremos tomar uma decisão."
 norway.16.b: "Todos São Bem-Vindos Aqui"
 norway.16.a: "Está na Hora de Criar Algumas Regulamentações"
 norway.100.t: "Noruega Quer Aumentar a Cooperação no Mar do Norte"
 norway.100.d: "O governo norueguês está interessado em perfurar mais petróleo em Shetland, na esperança de permitir que mais recursos fluam para o mercado."
 norway.100.a: "Ok"
 norway.100.b: "Não"
 norway.101.t: "Governo Britânico Aceita"
 norway.101.d: "O governo britânico aceitou nosso pedido para perfurar mais petróleo em Shetland e em outras partes do Mar do Norte, permitindo uma maior cooperação econômica."
 norway.101.a: "Ótimo"
 norway.102.t: "Governo Britânico Rejeita"
 norway.102.d: "O governo britânico rejeitou nosso pedido para perfurar mais petróleo em Shetland e em outras partes do Mar do Norte, frustrando quaisquer esperanças de uma maior cooperação econômica."
 norway.102.a: "Ótimo"
 norway.103.t: "Noruega Quer Construir Infraestrutura Para Nós"
 norway.103.d: "Com o objetivo de construir um projeto que melhore as viagens e a eficiência econômica em toda a Escandinávia, a Noruega contratou a empresa Veidekke, que busca construir a infraestrutura necessária em nosso país."
 norway.103.a: "Ok"
 norway.103.b: "Não"
 norway.104.t: "[FROM.GetName] Está a Bordo!"
 norway.104.d: "Nossos parceiros em [FROM.GetName] concordaram em permitir a construção de infraestrutura para facilitar o projeto para o qual contratamos a Veidekke!"
 norway.104.a: "Ótimo"
 norway.105.t: "[FROM.GetName] Não Está Interessado!"
 norway.105.d: "Nossos parceiros em [FROM.GetName] não concordaram em permitir a construção de infraestrutura para facilitar o projeto para o qual contratamos a Veidekke."
 norway.105.a: "Infeliz"
 norway.106.t: "Noruega Está Influenciando Nossa Política!"
 norway.106.d: "O governo norueguês recentemente fez movimentos que espalham influência em toda a nossa sociedade."
 norway.106.a: "Tudo Bem"
 NRY_the_norwegian_economy: "A Economia Norueguesa"
 NRY_the_norwegian_economy_desc: "A economia norueguesa é diversificada, rica em recursos e muito mais. Devemos explorar opções para a nossa economia que nos conduzam ao novo milênio e coloquem a Noruega no caminho da grandeza."
 NRY_north_sea_oil: "Petróleo do Mar do Norte"
 NRY_north_sea_oil_desc: "Para sustentar nossas políticas caras, precisamos manter um fluxo constante de nosso já rico suprimento de petróleo e gás. Nesta ocasião, devemos dizer 'Fure, Bebê, Fure!'"
 NRY_increased_cooperation_with_uk: "Cooperação Aumentada com o Reino Unido"
 NRY_increased_cooperation_with_uk_desc: "O Reino Unido pode se revelar um parceiro comercial muito útil devido à sua crescente população consumista. Podemos tirar grande proveito deles e eles podem receber seus recursos naturais de parceiros europeus."
 NRY_investments_into_shetland: "Investimentos nas Ilhas Shetland"
 NRY_investments_into_shetland_desc: "Um investimento de confiança apertaria nossas relações com o Reino Unido, melhorando nosso comércio. Nossa liquidez excessiva no tesouro nacional deve ser utilizada, não é mesmo?"
 NRY_statoil: "Statoil"
 NRY_statoil_desc: "Comprar mais ações em refino de petróleo melhorará nossa capacidade de aumentar nosso alcance para que nosso rico suprimento de petróleo possa ser usado para nosso povo. A ideia é: comprar, comprar, comprar e depois vender, vender, vender."
 NRY_encourage_union_workers: "Incentivar Trabalhadores Sindicais"
 NRY_encourage_union_workers_desc: "Embora a União Europeia tenha seus sucessos, também tem suas falhas, e é por isso que temos hesitado em aderir. Os órgãos de redistribuição de empregos da União Europeia estão enfrentando dificuldades para encontrar trabalho para todos os seus trabalhadores sindicalizados; se eles estiverem dispostos a trabalhar, nós estamos dispostos a alojá-los!"
 NRY_european_investments: "Investimentos Europeus"
 NRY_european_investments_desc: "Nosso petróleo não vai se cavar sozinho do oceano; talvez nossos irmãos europeus possam nos ajudar a aliviar o custo de extraí-lo. Nossos depósitos de petróleo podem ser ricos, mas podemos ver nossos depósitos bancários diminuírem se tentarmos assumir o custo da perfuração inteiramente por conta própria."
 NRY_sintef_research_org: "SINTEF"
 NRY_sintef_research_org_desc: "SINTEF significa Stiftelsen for industriell og teknisk forskning, em português: Fundação para Pesquisa Industrial e Técnica. É a maior empresa de pesquisa e desenvolvimento de toda a Escandinávia e opera em todas as partes do mundo. Atualmente, a empresa é totalmente independente, mas incentivos para trabalhar mais intensamente com aliados comerciais \"sugeridos\" não fariam mal a ninguém, certo?"
 NRY_ekofisk_oil_field: "Campos de Petróleo de Ekofisk"
 NRY_ekofisk_oil_field_desc: "Ao desenvolvermos o setor petrolífero, precisamos considerar nossa fonte mais significativa: os campos de petróleo de Ekofisk. Ainda existem milhões de toneladas cúbicas de petróleo nesses depósitos; se aumentarmos a concentração da nossa atividade de mineração na região, nossa população estará sustentada por muitos anos. A proteção ambiental virá depois, é claro."
 NRY_production_twenty_fifty: "Produção 2050"
 NRY_production_twenty_fifty_desc: "Parece que precisamos redobrar a aposta no petróleo no futuro próximo, ou seja, até, digamos, 2050?"
 NRY_renewable_investments: "Investimentos em Energias Renováveis"
 NRY_renewable_investments_desc: "Nosso petróleo nos sustentará por apenas um tempo limitado, precisamos começar a dar passos na direção certa, na direção verde."
 NRY_scan_wind: "ScanWind"
 NRY_scan_wind_desc: "Nossa localização geográfica nos permite usar a energia eólica ao máximo. Há muitas montanhas na Noruega que nos abrigarão como sempre fizeram, mas agora com o poder da eletricidade!"
 NRY_statkraft: "Statkraft"
 NRY_statkraft_desc: "Existem muitas oportunidades para expandir a energia hidrelétrica na Noruega, e isso pode nos dar o impulso extra que precisamos para nos tornarmos uma nação de energia verde auto-suficiente."
 NRY_electric_vehicle_incentives: "Incentivos para Veículos Elétricos"
 NRY_electric_vehicle_incentives_desc: "Muitos se recusam a fazer a transição de veículos a combustível para veículos elétricos, pois não conseguem enxergar o futuro ecologicamente amigável da Noruega. Talvez um incentivo verde os faça enxergar o verde do nosso futuro."
 NRY_green_cities: "Cidades Verdes"
 NRY_green_cities_desc: "As infraestruturas urbanas devem ser ajustadas para uma renovação totalmente elétrica de muitos serviços, tanto públicos quanto privados."
 NRY_charging_stations: "Estações de Carregamento"
 NRY_charging_stations_desc: "Um dos motivos pelos quais muitas pessoas não querem veículos elétricos é a escassez de estações de carregamento, e elas acreditam nisso com razão. É nossa responsabilidade providenciar mais estações de carregamento para que todos tenham acesso a elas, então não deveria haver desculpas, certo?"
 NRY_standardize_infrastructure: "Padronizar Infraestrutura"
 NRY_standardize_infrastructure_desc: "Alguns contratantes são menos eficientes que outros, se impusermos um modelo governamental podemos reduzir a confusão nos projetos de construção."
 NRY_contract_veidekke: "Contratar Veidekke"
 NRY_contract_veidekke_desc: "Um projeto internacional de rodovias é exatamente o que precisamos para unir nossos irmãos escandinavos, isso promoverá o comércio e boas relações entre todas as nossas nações."
 NRY_gothenburg_cultural_center: "Laboratório Flexível ZEB"
 NRY_gothenburg_cultural_center_desc: "O ZEB Flexible Lab em Trondheim está entre as construções mais sustentáveis ​​do mundo e é o primeiro no mundo com contabilização climática comprovada, mostrando as emissões totais de CO2 com compensação equivalente na produção de energia."
 NRY_contract_bilfinger_se: "Contratar Bilfinger SE"
 NRY_contract_bilfinger_se_desc: "Nada diz eficiência como os alemães, a Bilfinger SE nos ofereceu uma oportunidade incrível. A Noruega será desenvolvida em velocidade relâmpago!"
 NRY_gas_industry_renovation: "Renovações na Indústria de Gás"
 NRY_gas_industry_renovation_desc: "Por ora, precisamos expandir nossa indústria de gás natural, pois a transição para energias renováveis ​​é um processo longo e árduo. Além disso, é importante considerar que, ao adotarmos energias renováveis, poderemos utilizar petróleo e gás exclusivamente para exportação, gerando receita para nós."
 NRY_ministry_of_transport_communication: "Ministério dos Transportes e Comunicações"
 NRY_ministry_of_transport_communication_desc: "Deveríamos expandir algumas das necessidades públicas básicas para melhorar a qualidade de vida, afinal, somos um estado de bem-estar social."
 NRY_avinor: "Avinor"
 NRY_avinor_desc: "Podemos aumentar a eficiência da expansão de nossa rede de aviação se criarmos uma empresa subsidiária da Luftfartsverket, onde possuímos 100% das ações. Dessa forma, podemos gerenciar todos os seus ativos para refletir nosso planejamento superior, que será em escala nacional e garantido no melhor interesse da nação."
 NRY_oslo_airport_expansion: "Expansão do Aeroporto de Oslo"
 NRY_oslo_airport_expansion_desc: "À medida que nossa população e fluxo turístico aumentam, nossos aeroportos estão começando a superlotar, tornando a viagem indesejável e difícil. Devemos tornar nossa grande capital o mais atraente e confortável possível."
 NRY_statens_vangsen: "Statens Vegvesen"
 NRY_statens_vangsen_desc: "A Noruega é um país grande, e todos os pontos de interesse estão bastante espalhados. Estaríamos fazendo um grande serviço ao nosso povo ao aumentar os subsídios para a Administração de Estradas Públicas."
 NRY_facilities_for_norde_norge: "Instalações para Nord-Norge"
 NRY_facilities_for_norde_norge_desc: "A área mais remota do continente da Noruega, e uma das mais inacessíveis do mundo, é Norde-Norge. Vamos mudar isso, não é mesmo?"
 NRY_baneservice: "Baneservice"
 NRY_baneservice_desc: "Nossas ferrovias estão deficientes, uma iniciativa para construir mais ajudaria no movimento de bens de consumo pelo país e nos aproximaria um pouco mais."
 NRY_innovations_in_dovre_line: "Inovações na Linha Dovre"
 NRY_innovations_in_dovre_line_desc: "A Linha Dovre tem sido constantemente melhorada e expandida, é hora de mais uma rodada de renovações."
 NRY_migration_to_norway: "Imigração para a Noruega"
 NRY_migration_to_norway_desc: "Devido ao nosso ambiente acolhedor aqui na Noruega, nossa nação é muito atraente para refugiados que buscam anistia. Depois de um tempo, isso se tornou um problema, pois a nação está muito dividida sobre se devemos continuar aceitando esses refugiados ou dizer basta. Seja qual for a escolha, precisamos tomar uma posição, e rápido."
 NRY_norge_ming: "Mineração na Noruega"
 NRY_norge_ming_desc: "O segundo maior contribuinte para nossa economia é o setor de mineração e, como ele continuará existindo no futuro próximo, devemos expandir essa indústria."
 NRY_deep_sea_expansion: "Expansão do Mar Profundo"
 NRY_deep_sea_expansion_desc: "Existem mais depósitos a serem encontrados em nossas vastas zonas aquáticas, devemos fazer um esforço para localizar esses depósitos para aumentar nosso suprimento."
 NRY_norsk_industri: "Indústria Norueguesa"
 NRY_norsk_industri_desc: "A indústria norueguesa está carente, vamos fazer um esforço para consertar isso."
 NRY_bergen_engines_domestic: "Motores Bergen Domésticos"
 NRY_bergen_engines_domestic_desc: "Investimentos pesados em nossa indústria automobilística podem nos transformar em uma nação fabricante de automóveis, proporcionando à nossa economia a diversificação necessária."
 NRY_bergen_engines_rolls_royce: "Motores Bergen Rolls Royce"
 NRY_bergen_engines_rolls_royce_desc: "Devemos desenvolver nossa indústria automobilística não apenas em números, mas em luxo e qualidade. Parcerias com os alemães farão esse negócio prosperar."
 NRY_shipbuilding_investments: "Investimentos em Construção Naval"
 NRY_shipbuilding_investments_desc: "A Noruega tem cerca de 100 mil quilômetros de costa, seria uma pena deixar tudo isso ir para o lixo, não é? Somos um povo marítimo, vamos retomar esse espírito!"
 NRY_aker_yards: "Estaleiros Aker"
 NRY_aker_yards_desc: "Apresentamos o mais novo ramo de nossa indústria marítima, Estaleiros Aker! Veja-o construir! Veja-o crescer! Isso é o que se chama de economia de captura e liberação."
 NRY_fishing_ports_regulations: "Regulamentações dos Portos de Pesca"
 NRY_fishing_ports_regulations_desc: "Como temos uma grande indústria de pesca, e como é um passatempo tradicional norueguês, é difícil impor restrições a isso. No entanto, o ambiente não pode mais sofrer, então encontramos uma solução. As grandes empresas de pesca, sob nossa supervisão, irão conglomerar uma grande quantidade de empresas pesqueiras menores para centralizar e eliminar a confusão sobre a pesca e suas restrições."
 NRY_ministry_of_agriculture_and_food: "Ministério da Agricultura e Alimentação"
 NRY_ministry_of_agriculture_and_food_desc: "Uma reforma é necessária aqui, pois qualquer tolo que escolhermos para supervisionar a agricultura e a alimentação claramente manteve sua posição por tempo demais..."
 NRY_food_safety_regulations: "Regulamentações de Segurança Alimentar"
 NRY_food_safety_regulations_desc: "Muitas das políticas anteriormente muito necessárias de alimentos devem ser implementadas para que nossa reforma do ministério seja bem-sucedida."
 NRY_pesticide_distribution: "Distribuição de Pesticidas"
 NRY_pesticide_distribution_desc: "Nunca pensamos que isso seria um problema em nosso clima, mas a Noruega pode estar sob ataque... por insetos."
 NRY_norwegian_armed_forces: "Forças Armadas Norueguesas"
 NRY_norwegian_armed_forces_desc: "A bravura e a adaptabilidade de grandes forças armadas estão prontas para defender contra qualquer perigo, noite e dia. Elas são treinadas para todas as condições e conhecem sua missão, proteger o povo norueguês para sua paz e liberdade contínuas."
 NRY_norwegian_navy_forces: "Força Naval Norueguesa"
 NRY_norwegian_navy_forces_desc: "O principal objetivo da nossa marinha é proteger os interesses do nosso comércio, embora ela não seja frequentemente contestada. Ainda assim, precisamos de uma força de dissuasão para dominar os mares aos quais temos direito."
 NRY_haakonsvern_naval_base: "Base Naval de Haakonsvern"
 NRY_haakonsvern_naval_base_desc: "A base principal da frota norueguesa, Haakonsvern, requer uma extensa renovação, pois não está mais de acordo com os padrões para servir efetivamente nosso povo."
 NRY_fleet_logistics_command: "Comando de Logística da Frota"
 NRY_fleet_logistics_command_desc: "Recebemos informações de que nossa marinha tem usado os recursos sob seu comando de forma ineficiente. Isso será investigado minuciosamente, não podemos ter nenhum desperdício em nossa armada."
 NRY_norwegian_naval_academy: "Academia Naval Norueguesa"
 NRY_norwegian_naval_academy_desc: "É evidente que não podemos ter incompetência no comando da primeira defesa da Noruega."
 NRY_norwegian_land_forces: "Força Terrestre Norueguesa"
 NRY_norwegian_land_forces_desc: "O Exército Norueguês é o ramo de serviço de guerra terrestre das Forças Armadas da Noruega. O Exército é o ramo mais antigo das forças armadas norueguesas, estabelecido como uma organização militar moderna sob o comando do Rei da Noruega."
 NRY_quality_over_quantity: "Qualidade Sobre Quantidade"
 NRY_quality_over_quantity_desc: "Sempre fomos conhecidos por nossa mentalidade de produção sem firulas, cada tarefa é realizada com cuidado, não há espaço para descuido na Noruega!"
 NRY_quantity_over_quality: "Quantidade Sobre Qualidade"
 NRY_quantity_over_quality_desc: "Sem ignorar completamente o poder da qualidade, não precisamos garantir que tudo seja perfeito até o menor detalhe. Apenas produza se for bom o suficiente, nossa produtividade não pode sofrer por causa de TOC."
 NRY_norwegian_military_academy: "Academia Militar Norueguesa"
 NRY_norwegian_military_academy_desc: "Alguns dos mais brilhantes pensadores estratégicos de batalha e geopolítica frequentam nossa academia. É graças ao cuidado com nossos institutos militares que colhemos os benefícios de mentes geniais orientadas para a estratégia no gabinete executivo."
 NRY_norwegian_air_forces: "Força Aérea Norueguesa"
 NRY_norwegian_air_forces_desc: "A força aérea é tão necessária quanto a marinha para a primeira defesa da Noruega, nosso terreno é muito acidentado, tornando a Noruega uma potencial batalha dos céus, se houvesse alguma batalha. Mais útil, nossa força aérea pode ser usada ao redor do mundo como uma força de manutenção da paz, se assim o desejarmos."
 NRY_orland_main_air_station: "Estação Aérea Principal de Ørland"
 NRY_orland_main_air_station_desc: "A Estação Aérea Principal de Ørland é o maior campo aéreo da Noruega, abriga a maioria de nossos aviões e está estrategicamente localizada para cobrir a maior parte da Noruega de forma conveniente."
 NRY_technical_advice_from_our_friends: "Conselhos Técnicos de Nossos Amigos"
 NRY_technical_advice_from_our_friends_desc: "Nossa força aérea é boa, mas não excelente, o compartilhamento de tecnologia de nossos aliados deve nos ajudar a alcançar isso."
 NRY_norwegian_airforce_academy: "Academia da Força Aérea Norueguesa"
 NRY_norwegian_airforce_academy_desc: "Sendo uma nação pacífica, não vemos muitos conflitos, o que nos permite ser os brilhantes estrategistas e pensadores militares da Europa."
 NRY_cyber_defense_force: "Força de Defesa Cibernética"
 NRY_cyber_defense_force_desc: "Como o mundo está se digitalizando continuamente, precisamos avançar para um futuro mais amigável à tecnologia também. Infelizmente, nem todas as intenções são benignas e precisaremos de uma equipe para cuidar da segurança da rede da Noruega."
 NRY_german_technicians: "Investimentos em Tanques"
 NRY_german_technicians_desc: "Nossos tanques têm deixado a desejar recentemente, talvez possamos investigá-los para descobrir como poderíamos melhorá-los."
 NRY_party_of_labour: "Partido do Trabalho"
 NRY_party_of_labour_desc: "O Partido do Trabalho, não confundir com comunistas, é a voz dos trabalhadores e a solução para nosso povo. Somos o exemplo modelo de uma democracia social trabalhista e temos sido um dos partidos mais populares desde nossa fundação por isso. Podemos mostrar ao mundo que uma democracia social é um sistema justo e equitativo que ajuda e protege seu povo como um governo realmente deveria. Avante, pela segurança, oportunidades e comunidade!"
 NRY_modernization_of_the_welfare_state: "Modernização do Estado de Bem-Estar"
 NRY_modernization_of_the_welfare_state_desc: "Nossa imensa riqueza nos permite apoiar os milhares de noruegueses que precisam dela. Nossa rede de segurança social é abrangente, mas pode ser melhorada ainda."
 NRY_workers_youth_league: "Liga da Juventude dos Trabalhadores"
 NRY_workers_youth_league_desc: "Para termos um país socialista, as crianças precisam de uma educação socialista. Elas aprenderão a funcionar em tal sociedade e contribuirão suas grandes mentes frescas para a produtividade e o bem-estar de nosso país."
 NRY_privitization_of_state_industries: "Privatização das Indústrias Estatais"
 NRY_privitization_of_state_industries_desc: "Precisamos devolver para o povo as empresas que não são essenciais para o controle do governo. Dessa forma, eles sentirão sua liberdade financeira enquanto nós podemos manter apenas o controle necessário sobre a economia."
 NRY_forest_conservation_plans: "Planos de Conservação Florestal"
 NRY_forest_conservation_plans_desc: "Nossa natureza maravilhosa é a coisa mais sagrada sobre a Noruega, e sempre devemos garantir que ela nunca seja profanada."
 NRY_solar_investments: "Investimentos Solares"
 NRY_solar_investments_desc: "O caminho do futuro não é o do petróleo e do gás, o futuro vem da natureza, do Sol, do vento e dos rios fluindo. Embora sejamos ricos em todas essas áreas, exceto a luz solar, devemos fazer um esforço para afastar nossa energia poluente e caminhar em direção a um futuro mais brilhante."
 NRY_vaccinations_against_poverty: "Vacinações Contra a Pobreza"
 NRY_vaccinations_against_poverty_desc: "Aumentar o orçamento de nosso povo certamente os ajudará a se levantar e se estabelecer."
 NRY_transatlantic_cooperation: "Cooperação Transatlântica"
 NRY_transatlantic_cooperation_desc: "Precisamos assegurar aos nossos amigos que somos completamente amigáveis com o Ocidente, isso deve dissipar qualquer hostilidade que possam ter contra nós."
 NRY_intensify_cooperation_with_partners: "Intensificar a Cooperação com Parceiros"
 NRY_intensify_cooperation_with_partners_desc: "Alguns exercícios de treinamento devem ajudar nossos amigos mais próximos a verem o bem em uma grande democracia social como a Noruega."
 NRY_modernization_quota: "Cota de Modernização"
 NRY_modernization_quota_desc: "Nossa tecnologia militar está desatualizada, talvez nossos aliados possam nos enviar seu equipamento superior."
 NRY_weight_behind_gaza: "Peso por Trás de Gaza"
 NRY_weight_behind_gaza_desc: "Nos últimos anos, o estado de Israel deixou clara sua brutalidade contra os palestinos, tornando-se tão ruim quanto seus opressores. Estamos ao lado de nossos irmãos na Palestina!"
 NRY_packages_of_aid: "Pacotes de Ajuda"
 NRY_packages_of_aid_desc: "O impacto de Israel sobre os palestinos pobres e as nações devastadas pela guerra ao seu redor tem sido prejudicial. Podemos usar o sucesso norueguês para gerar um impacto positivo nessas nações e aliviar seus fardos."
 NRY_constructive_dialogue_with_russia: "Diálogo Construtivo com a Rússia"
 NRY_constructive_dialogue_with_russia_desc: "Desde a queda da União Soviética, as tensões estão aumentando entre a Rússia e o mundo ocidental. Isso só trará caos ao futuro de nossa nação, conversas de paz e amizade podem ajudar a reverter essas tensões e garantir um mundo mais seguro."
 NRY_the_political_earthquake: "O Terremoto Político"
 NRY_the_political_earthquake_desc: "Como tivemos um pouco mais de presença minoritária na política norueguesa, usamos nossa influência apenas para pressionar o governo no poder a aderir às nossas políticas ideais. Agora que somos a maioria no governo, o progresso de nossa agenda será surpreendente!"
 NRY_christan_peoples_party: "Partido Popular Cristão"
 NRY_christan_peoples_party_desc: "Chegou a hora de revitalizar o Partido Popular Cristão e de continuar a incutir valores cristãos. O povo da Noruega está se esquecendo dos valores e tradições norueguesas; se não os resgatarmos agora, veremos o declínio do nosso partido e de tudo o que ele representa."
 NRY_question_of_homosexuality: "Questão da Homossexualidade"
 NRY_question_of_homosexuality_desc: "Nosso partido está dividido sobre essa questão há algum tempo, e embora já tenha sido legalizada, é hora de tomar uma decisão dentro de nosso próprio partido. A favor ou contra?"
 NRY_abortion_matter: "Questão do Aborto"
 NRY_abortion_matter_desc: "O Partido Popular Cristão se opõe ao aborto em geral, mas aprova fortemente exceções para estupro e vida da mãe."
 NRY_contraception_support: "Apoio à Contracepção"
 NRY_contraception_support_desc: "Nosso partido apoia o uso de contraceptivos que previnem a concepção, mas não prejudicam um possível bebê, para reduzir as taxas de aborto."
 NRY_developmental_aid: "Ajuda para o Desenvolvimento"
 NRY_developmental_aid_desc: "As políticas socialistas não são totalmente ruins, e os elementos liberais dentro do nosso partido sugerem que o auxílio governamental para projetos de desenvolvimento evitará uma futura bolha imobiliária e impulsionará um setor imobiliário em crescimento."
 NRY_poverty_and_climate_change_reduction: "Redução da Pobreza e Mudança Climática"
 NRY_poverty_and_climate_change_reduction_desc: "Embora tenhamos contribuído muito para a redução da poluição e sejamos considerados uma das principais nações no índice de riqueza, o mesmo não pode ser dito para nossos amigos ao redor do mundo. A América do Sul, especialmente, luta com isso, pois não conseguem se preocupar em industrializar para um nível sustentável até que possam enfrentar esses problemas. Devemos ajudá-los da melhor forma possível por enquanto."
 NRY_security_advancements: "Avanços em Segurança"
 NRY_security_advancements_desc: "Em um mundo perigoso, é imperativo que nos preparemos para os perigos, os perigos para nosso petróleo, é claro."
 NRY_for_minorities: "Para Minorias"
 NRY_for_minorities_desc: "A Noruega é uma nação globalmente progressista, com muito poucos elementos extremistas conservadores, nenhum dos quais tem poder sobre a moralidade das pessoas. Aumentar o financiamento para minorias deve conquistar os corações de nossos cidadãos, que as recebem de braços abertos, e das próprias minorias por serem reconhecidas."
 NRY_refugee_quota: "Cota de Refugiados"
 NRY_refugee_quota_desc: "Infelizmente, outros governos não são tão ideais quanto o nosso, e muitas pessoas são forçadas a fugir de suas casas. Devemos contribuir no cenário internacional para salvar essas pessoas, todos os pacifistas são sempre bem-vindos na Noruega!"
 NRY_relieve_pressure_from_greece: "Aliviar a Pressão da Grécia"
 NRY_relieve_pressure_from_greece_desc: "A Grécia fez muito mais do que sua parte ao receber refugiados, e parece que mal estão conseguindo se sustentar e abrigar seus refugiados, quanto mais aceitar mais. Temos um lar para eles na Noruega, vamos estender a mão para nosso amigo europeu."
 NRY_fair_refugee_distribution: "Distribuição Justa de Refugiados"
 NRY_fair_refugee_distribution_desc: "Todos na Noruega, com capacidade para isso, devem trabalhar, isso inclui os refugiados que tão graciosamente aceitamos. Podemos otimizar nosso produto industrial nacional distribuindo essas pessoas em residências próximas a fábricas onde precisamos de trabalhadores."
 NRY_our_european_allies: "Nossos Aliados Europeus"
 NRY_our_european_allies_desc: "Vamos fazer uma declaração de amizade aos nossos amigos na Organização do Tratado do Atlântico Norte para que o mundo saiba onde estamos."
 NRY_nato_drilling: "Doutrina da NATO"
 NRY_nato_drilling_desc: "Devemos usar o treinamento de tropas modelo da NATO à nossa disposição e seus estudos acadêmicos militares para melhorar as forças armadas norueguesas."
 NRY_eea_free_zones: "Zonas Livres da AEE"
 NRY_eea_free_zones_desc: "Devemos diminuir a distância econômica entre nós, nações nórdicas, e aumentar a colaboração entre nossos países para promover o crescimento econômico."
 NRY_tighten_arms_sales: "Apertar as Vendas de Armas"
 NRY_tighten_arms_sales_desc: "Devemos adquirir mais armas para nossa infantaria, atualmente não é adequada para muito."
 NRY_maintain_eu_distance: "Manter Distância da UE"
 NRY_maintain_eu_distance_desc: "Embora desejemos paz aos nossos amigos na União Europeia, também vemos suas falhas e, portanto, não nos juntaremos tão cedo. Boa sorte para eles, porém!"
 NRY_party_of_progress: "Partido do Progresso"
 NRY_party_of_progress_desc: "O Partido do Progresso, nosso objetivo é fazer o povo avançar por meio de meios mais consolidados de governo. Sabemos o que o povo quer, e isso são necessidades básicas e sua liberdade, podemos fazer o trabalho."
 NRY_shortened_wait_times: "Tempos de Espera Reduzidos nos Hospitais"
 NRY_shortened_wait_times_desc: "Em uma nação onde temos saúde gratuita e todos têm acesso a ela, todos parecem estar na fila de espera! É absolutamente essencial que avancemos com a construção de mais hospitais, nosso povo não pode esperar para ser atendido enquanto sangra no saguão!"
 NRY_nursing_capacity: "Capacidade de Enfermagem"
 NRY_nursing_capacity_desc: "Precisamos de mais enfermeiros para atender ao povo norueguês, talvez incentivos de terra funcionem?"
 NRY_removal_of_inheritence_tax: "Remoção do Imposto sobre Herança"
 NRY_removal_of_inheritence_tax_desc: "O imposto sobre herança é uma das leis mais repugnantes da legislação norueguesa e não teremos mais nada disso. O dinheiro do povo pertence ao povo!"
 NRY_elderly_focus: "Foco nos Idosos"
 NRY_elderly_focus_desc: "Nos últimos anos, os idosos de nossa nação têm sido negligenciados nas decisões legislativas e é vergonhoso. Os idosos fizeram muito por nossa nação, não deveríamos protegê-los?"
 NRY_free_fundemental_society: "Sociedade Fundamentada Livre"
 NRY_free_fundemental_society_desc: "Com muita frequência, os burocratas e o governo atrapalham a vida do cidadão comum. O governo foi criado para proteger o povo, o governo deve ser limitado, não as pessoas."
 NRY_youth_discipline: "Disciplina Juvenil"
 NRY_youth_discipline_desc: "Podemos inspirar e, portanto, mobilizar a juventude para promover a prosperidade nacional, pela Noruega!"
 NRY_equal_action: "Ação Igual"
 NRY_equal_action_desc: "Podemos ignorar outros partidos menos desejáveis que impedem nossa agenda pelo progresso do povo."
 NRY_law_and_order: "Lei e Ordem"
 NRY_law_and_order_desc: "A Noruega é uma nação de leis, se você não quebrar leis, não há motivo para se opor à presença policial, certo?"
 NRY_immigration_control: "Controle de Imigração"
 NRY_immigration_control_desc: "Já acolhemos refugiados e imigrantes em número suficiente, e é hora de diminuir o ritmo. Se conseguirmos construir tão rápido quanto eles imigram, definitivamente chegou a hora de parar."
 NRY_avoid_illiterates: "Evitar Analfabetos"
 NRY_avoid_illiterates_desc: "Se começarmos a alienar os analfabetos da sociedade, isso proporcionará a motivação perfeita para começarem a aprender."
 NRY_state_of_norway: "Estado da Noruega"
 NRY_state_of_norway_desc: "A burocracia da Noruega precisa se tornar mais eficiente; para isso, deve ser submetida à supervisão rigorosa de órgãos federais superiores mais exigentes, a fim de garantir que tudo funcione sem problemas."
 NRY_reaffirm_oil_state: "Reafirmar Estado do Petróleo"
 NRY_reaffirm_oil_state_desc: "Ainda somos uma nação de petróleo e gás, estamos longe de ser completamente renováveis e assim vai permanecer por muito tempo."
 NRY_privatization_of_state_dockyards: "Privatização dos Estaleiros Estatais"
 NRY_privatization_of_state_dockyards_desc: "A riqueza da Noruega pertence ao povo norueguês, e um dos maiores setores econômicos do nosso país são a pesca e a indústria naval. Podemos começar devolvendo o poder ao povo desses setores."
 NRY_the_nrk: "O NRK"
 NRY_the_nrk_desc: "A Corporação Norueguesa de Radiodifusão é uma emissora estatal que serve como principal fonte de notícias para a nossa população. Podemos usar nossa influência para alinhá-la aos nossos interesses, alinhando assim a nossa população, informando-a e, dessa forma, defendendo-a de quaisquer obstáculos ou ameaças à nossa nação."
 NRY_oslo_hydro_TT: "Concede [NRY.GetFlag] §HØstlandet§! o modificador de estado §HHidrelétrica§!"
 NRY_bergen_engines_TT: "Renda adicional: §G$0.400§!"
 NRY_productivity_state_TT: "Aumentará a §HProdutividade§! em [NRY.GetFlag] §HØstlandet§! em §H75§!"
 NRY_norge_mining_decision_cat: "Mineração na Noruega"
 NRY_norge_mining_decision_cat_desc: "Norge Mining é uma empresa de mineração anglo-norueguesa que se concentra em explorar e produzir metais e minerais industriais, especialmente lítio, quartzo e rutilo.\n\nUm nível mais alto de pesquisa de escavação resultará em mais recursos das decisões (Por nível)."
