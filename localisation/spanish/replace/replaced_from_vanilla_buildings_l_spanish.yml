l_spanish:
 industrial_complex: "Industria Civil"
 industrial_complex_plural: "Industrias Civiles"
 industrial_complex_desc: "Este edificio proporciona al estado una industria para la producción de bienes civiles o la construcción de nuevos edificios. Puede convertirse en industria militar si es necesario.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos:§Y206K§!\nProducto del PIB base por §Yindustria civil§!: $§Y17.5B§!\nConsumo básico de energía: §R-0.5§! GW\n"
 arms_factory: "Industria Militar"
 arms_factory_plural: "Industrias Militares"
 arms_factory_desc: "Este edificio proporciona al estado una industria para la producción de nuevo equipamiento militar. Puede convertirse en industria civil si es necesario.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos:§Y18.8K§!\nProducto del PIB base por §Yindustria militar§!: $§Y1.5B§!\nConsumo básico de energía: §R-0.5§! GW"
 internet_station: "Infraestructura de Red"
 internet_station_plural: "Infraestructura de Red"
 internet_station_desc: "Las §YInfraestructuras de Red§! son estructuras altas utilizadas en los campos de las telecomunicaciones y las comunicaciones por radio para transmitir señales a largas distancias o a través de cables de fibra óptica subterráneos y sistemas de computación en la nube.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos: §Y12 mil§!\nProducto base del PIB por §YInfraestructura de red§!: $§Y3.5 billones§!\n\nCada nivel de §YInfraestructura de Red§! mejora la velocidad de construcción local en §G+5.00%§!.\nCada nivel de §YInfraestructura de red§! reduce la duración de §YInversiones internacionales§! en §G-5,00%§!."
 dockyard: "Astillero Naval"
 dockyard_plural: "Astilleros Navales"
 dockyard_desc: "Los §Yastilleros navales§! son representativos de la capacidad de un estado para producir embarcaciones militares de todo tipo, desde lanchas §Ypatrulleras§!, §Yconvoyes§!, §Ydestructores§!, §Yportaaviones§! y más.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos:§Y18.8K§!\nProducto del PIB base por §YPatio Naval§!: $§Y1.5B§!\nConsumo básico de energía: §R-0.5§! GW"
 air_base_desc: "Una §YBase Aérea§! es una instalación de almacenamiento y un complejo militar para el despliegue y preparación de sus fuerzas aéreas. Se puede apilar hasta el nivel diez añadiendo una capacidad adicional de §Y50§! aviones por nivel."
 radar_station_desc: "Las §YEstaciones de Radar§! te permiten obtener información sobre las tropas enemigas en estados cercanos. Está compuesta por varios radares y sensores, así como activos de inteligencia y capacidad para analizar la situación en evolución.\nUn nivel más alto aumentará su alcance efectivo.\nSus radares también proporcionan al estado una mejor detección de las fuerzas aéreas enemigas, lo que aumenta las posibilidades de que tus aviones las enfrenten.\nAdemás, los radares aumentan la detección de flotas enemigas en el mar."
 anti_air_building: "Sitios de SHORAD"
 anti_air_building_plural: "Sitios de SHORAD"
 anti_air_building_desc: "Los §YSitios YSHORAD§! (Short Range Air Defense) son complejos y grupos de armas y tácticas antiaéreas que se encargan de la defensa aérea contra amenazas aéreas de baja altitud. Estos sitios trabajan juntos para dividir el espacio aéreo en áreas defendibles, proporcionando objetivos militares locales y cobertura aérea de infraestructura desde helicópteros hasta aviones de bajo vuelo y jets."
 nuclear_reactor_desc: "Este edificio convierte la energía nuclear en energía eléctrica, consumiendo uranio moderadamente enriquecido en el proceso.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos: §Y148 mil§!\nProducto base del PIB por §YReactor Nuclear§!: $§Y4 billones§!\nGanancia de potencia base: §G+5§! GW\n"
 synthetic_refinery_desc: "Este edificio proporciona al estado una industria para la producción de caucho sintético y capacidad adicional para la producción de combustible.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos: §Y245K§!\nProducción base del PIB por §YRefinería Sintética§!: $§Y10 mil millones§!\nConsumo base de energía: §R-0.2§! GW\n\nProduce §YGoma§! a precios de mercado estándar, con excedentes que generan ingresos en efectivo además del impuesto corporativo.\n"
 fuel_silo: "Reservas de Recursos Estratégicos"
 fuel_silo_plural: "Reservas de Recursos Estratégicos"
 fuel_silo_desc: "La §YReserva de Recursos Estratégicos§! es una combinación de almacenes, almacenamiento en seco y otros tipos de almacenamiento de §YCombustible§!. Este edificio proporciona a tu nación más espacio para almacenar §HCombustible§! y §HRecursos§!.\n\nNOTA: El §YAlmacenamiento de Recursos§! tiene una limitación de motor, por lo que si estás en §Y$export_economy$§! o §Y$globalized_trade_economy$§!, podrías terminar enviando más recursos para exportar que a tus líneas de producción. Si necesitas empezar a retirar recursos del almacenamiento, se recomienda cambiar a §Y$mixed_economy$§! o inferior.\n"
 offices: "Sector de Oficinas"
 offices_plural: "Sectores de Oficinas"
 offices_desc: "El §Ysector de oficinas§! representa todas las demás industrias de la economía más allá de la extracción y las industrias pesadas. Esto incluye servicios financieros, atención al cliente, tecnología de la información, servicios minoristas y mucho más.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos:§Y473K§!\nProducto del PIB base por §Ysector de oficinas§!: $§Y50B§!\nConsumo básico de energía: §R-0.25§! GW"
 rail_way_plural: "Vías Férreas"
 fossil_powerplant: "Central eléctrica de combustibles fósiles"
 fossil_powerplant_plural: "Central eléctrica de combustibles fósiles"
 fossil_powerplant_desc: "§YCentrales eléctricas de combustibles fósiles§! es un comodín para todas las fuentes de energía termoeléctrica de origen fósil. Estos incluyen, entre otros; carbón, gas natural y petróleo.Las §Ycentrales eléctricas de combustibles fósiles§! quedarán inactivas si la generación de energía es mayor que el consumo.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos: §Y7.5K§!\nProducto base del PIB por §Ycentral eléctrica de combustibles fósiles§!: $§Y1.7 Billion§!\nGanancia de potencia base: §G+2§! GW\n"
 fossil_powerplant_amount: "$VALUE|Y0=$"
 fossil_powerplant_resource: "£resources_strip|$FRAME$"
 agriculture_district: "Distrito de agricultura comercializada"
 agriculture_district_plural: "Distrito de Agricultura Comercializada"
 agriculture_district_desc: "Los §Ydistritos de agricultura comercializada§! representan un comodín para toda la agricultura que no es de subsistencia dentro de nuestra nación. Incluye agroindustria, tierras cultivables, silos de cereales, carnicerías y más.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos:§Y188K§!\nProducto del PIB base por §Ydistritos de agricultura comercializada§!: $§Y25B§!\nConsumo básico de energía: §R-0.10§! GW\n§YGanancia de combustible§! de los estados: 8\n§YSuministros locales§!: 1.5%\n"
 agriculture_district_amount: "$VALUE|Y0=$"
 rocket_site: "Sitio de lanzamiento de misiles"
 rocket_site_plural: "Sitio de lanzamiento de misiles"
 rocket_site_desc: "Los §YSitios de Lanzamiento de Misiles§! representan un lugar de almacenamiento para todos los equipos de misiles a nivel de teatro, desde §YMisiles Tierra-Aire§! hasta §YMisiles Balísticos Intercontinentales§!. Proporcionan al estado la capacidad de desplegar estos activos estratégicos en nuestras zonas aéreas estratégicas, ya sea para ayudar en nuestra defensa aérea o para proporcionar capacidades ofensivas."
 nuclear_facility: "Instalación de I+D civil"
 nuclear_facility_plural: "Instalación de I+D civil"
 nuclear_facility_desc: "Una §YInstalación de I+D Civil§! incluye todo tipo de proyectos especiales relacionados con la capacidad industrial civil, instalaciones nucleares y más."
 air_facility: "Instalación de aerodinámica y aviónica"
 air_facility_desc: "Las Instalaciones Experimentales de Aerodinámica y Aviónica permiten iniciar proyectos de investigación para aeronaves, cohetes avanzados, electrónica relacionada y proyectos espaciales."
 naval_facility_desc: "Las instalaciones experimentales de ingeniería naval te permiten iniciar proyectos de investigación relacionados con buques de superficie y submarinos.\nSolo se puede crear una ingeniería naval en una provincia costera."
 stronghold_network: "Red Defensiva Estatal"
 stronghold_network_plural: "Red Defensiva Estatal"
 stronghold_network_desc: "Una extensa red defensiva compuesta por túneles, puntos de defensa, trincheras, refugios antiaéreos, depósitos de armas y sitios de demolición planificados previamente brindan a los defensores una ventaja decisiva contra cualquier atacante."
 renewable_energy_infra: "Infraestructura de Energía Renovable"
 renewable_energy_infra_plural: "Infraestructura de Energía Renovable"
 renewable_energy_infra_desc: "La §YInfraestructura de Energía Renovable§! es un conjunto de fuentes de energía renovable. Estas incluyen, entre otras: parques solares, aerogeneradores, refinerías de biocombustibles, plantas de carbón vegetal, centrales eléctricas de biocombustibles, entre otras. Por lo tanto, utiliza fuentes renovables y produce combustible a partir de ellas.\n\nProporciona al estado:\nNúmero base de trabajadores requeridos: §Y22.5K§!\nProducto base del PIB por §YInfraestructura de energía renovable§!: $§Y2 mil millones§!\nGanancia de potencia base: §G+0.5§! GW\n"
 renewable_energy_infra_amount: "$VALUE|Y0=$"
 renewable_energy_infra_resource: "£resources_strip|$FRAME$"
 microchip_plant: "Planta de Microchips"
 microchip_plant_plural: "Plantas de Microchips"
 microchip_plant_desc: "Production plant that converts Technology Metals and Precious Metals into Microchips, for use by both industrial and military needs.\n\nProvides the state with:\nBase Number of Required Workers: §Y37.5K§!\nBase GDP Output per §YMicrochip Plant§!: $§Y32 Billion§!\nBase Energy Consumption: §R-0.75§! GW\n16 §YMicrochip§! Production\n\n§YMicrochips§! command the highest per-unit market price, generating significant cash income on surplus exports.\n\nCosts:\n3 §YTechnology Metals§!\n2 §YPrecious Metals§!"
 composite_plant: "Planta Compuesta"
 composite_plant_desc: "Planta de producción que combina Petróleo, Caucho y Metales Preciosos en Compuestos, para uso científico, militar e industrial.\n\nProporciona al estado:\nNúmero Base de Trabajadores Requeridos: §Y50K§!\nProducción Base del PIB por §YPlanta de Compuestos§!: $§Y28 mil millones§!\nConsumo Base de Energía: §R-0.8§! GW\n16 §YProducción de Compuestos Avanzados§!\n\nLos materiales §Ycompuestos§! se venden a uno de los precios unitarios más altos del mercado, generando fuertes ingresos en efectivo por exportaciones excedentes.\n\nCostos:\n1 §YPetróleo§!\n1 §YCaucho§!\n1 §YMetales preciosos§!"
 composite_plant_plural: "Planta Compuesta"
 rail_terminal: "Rail Terminal"
 rail_terminal_plural: "Rail Terminals"
 rail_terminal_desc: "A state served by a dense terminal network moves both people and goods faster, so factories see steadier inputs, workers reach jobs more reliably, and the surrounding economy gains room to expand."
 show_construction_speed: "When checked, you can see the current £construction_speed_texticon §YConstruction Speed Bonus§! for each §YBuilding Type§!\n\nThis modifier shows only the building specific modifier. Its does not take into account the §YGlobal £construction_speed_texticon Construction Speed.§!"
 landmark_kaaba: "Kaaba"
 landmark_kaaba_plural: "$landmark_kaaba$"
 landmark_kaaba_desc: "The Kaaba, a sacred cube-shaped structure at the heart of Mecca's Masjid al-Haram, stands as the holiest site in Islam. Draped in black silk adorned with golden calligraphy, it serves as the qibla, the direction toward which Muslims worldwide turn in prayer. This ancient sanctuary, known as the House of God, embodies centuries of faith, pilgrimage, and Islamic history, symbolizing the unity of the Muslim ummah.\n\n§YLandmark Kaaba§! generates tourism income based on the total population of Arabic states. The exact amount can be viewed in the §YEconomic Preview§!."
 landmark_milad: "Milad Tower"
 landmark_milad_plural: "$landmark_milad$"
 landmark_milad_desc: "Milad Tower, or Borj-e Milad, has roots in Iran's pre-revolutionary period, with initial plans dating back to the 1970s. After the 1979 Iranian Revolution, those early plans were shelved amidst shifting political priorities. The vision was revived in the late 1990s, and construction began in 2000, aligning with Iran's new focus on development and modernization. Its design combines elements of Iranian heritage with contemporary engineering, making it a striking emblem of both historical continuity and the country's evolving identity. Today, the tower stands as a multifunctional complex and a prominent cultural landmark, offering Tehran's residents and visitors panoramic views of the city and the distant Alborz mountains."
 landmark_domeofrock: "Dome of the Rock"
 landmark_domeofrock_plural: "$landmark_domeofrock$"
 landmark_domeofrock_desc: "The Dome of the Rock is a renowned Islamic shrine, famous for the golden dome overlooking Jerusalem's Old City. Built in the seventh century, it stands on the Haram al-Sharif, also known as the Temple Mount, a site sacred to both Muslims and Jews. The shrine enshrines the Foundation Stone, which Muslims believe marks where the Prophet Muhammad ascended to heaven and which Jews believe is the site of the Holy of Holies of the ancient Jewish Temple."
 landmark_goldengate: "Golden Gate Bridge"
 landmark_goldengate_plural: "$landmark_goldengate$"
 landmark_goldengate_desc: "Completed in 1937, the Golden Gate Bridge spans the strait between San Francisco Bay and the Pacific Ocean, connecting the city to the Marin Headlands. Its distinctive International Orange towers and long suspended span made it the longest bridge of its kind in the world at the time of its opening, and it remains one of the most recognizable structures in the United States."
 landmark_UScongress: "U.S. Capitol"
 landmark_UScongress_plural: "$landmark_UScongress$"
 landmark_UScongress_desc: "The U.S. Capitol stands at the east end of the National Mall in Washington, D.C., housing the chambers of the Senate and the House of Representatives. Its neoclassical design and central dome have made it the most recognizable seat of American legislative power, anchoring a corridor that includes the Library of Congress, the Supreme Court, and the Smithsonian Institution's museum complex."
 landmark_fuji: "Mount Fuji"
 landmark_fuji_plural: "$landmark_fuji$"
 landmark_fuji_desc: "Mount Fuji, at 3,776 meters the highest peak in Japan, is an active stratovolcano on Honshu visible from Tokyo on clear days. Long considered sacred in Shinto belief and a defining motif in Japanese art, it is also a UNESCO World Heritage Site. Its near-perfect conical silhouette and surrounding lake region draw hundreds of thousands of climbers and tourists every year."
 landmark_giza: "Pyramids of Giza"
 landmark_giza_plural: "$landmark_giza$"
 landmark_giza_desc: "Built during the Old Kingdom of Egypt as monumental tombs for the pharaohs, the Pyramids of Giza stand on the outskirts of Cairo. The Great Pyramid, constructed for Pharaoh Khufu, is the last surviving structure of the Seven Wonders of the Ancient World. The complex, together with the Sphinx, remains one of Egypt's most-visited landmarks and a centerpiece of the country's tourism economy."
 landmark_shuttle: "Kennedy Space Center"
 landmark_shuttle_plural: "$landmark_shuttle$"
 landmark_shuttle_desc: "Kennedy Space Center, on Florida's Atlantic coast, serves as the primary launch site for NASA's human spaceflight missions. It features facilities like the iconic Vehicle Assembly Building, where rockets are prepared for launch, and Launch Complex 39, the historic departure point for the Apollo and Space Shuttle programs. The center remains a hub of innovation and exploration, supporting both government and commercial launches."
 landmark_shuttle_launch: "Kennedy Space Center"
 landmark_shuttle_launch_plural: "$landmark_shuttle_launch$"
 landmark_shuttle_launch_desc: "Kennedy Space Center, on Florida's Atlantic coast, serves as the primary launch site for NASA's human spaceflight missions. It features facilities like the iconic Vehicle Assembly Building, where rockets are prepared for launch, and Launch Complex 39, the historic departure point for the Apollo and Space Shuttle programs. The center remains a hub of innovation and exploration, supporting both government and commercial launches."
 landmark_buran: "Baikonur Cosmodrome"
 landmark_buran_plural: "$landmark_buran$"
 landmark_buran_desc: "The Baikonur Cosmodrome, on the steppes of southern Kazakhstan, is the world's oldest and largest operational spaceport. Established in 1955, it has been the launch site for milestone Soviet and Russian missions, including the first human spaceflight by Yuri Gagarin aboard Vostok 1. Russia continues to lease the facility from Kazakhstan and uses it for crewed Soyuz launches to the International Space Station."
 landmark_ICBMsilominot: "Minot AFB"
 landmark_ICBMsilominot_plural: "$landmark_ICBMsilominot$"
 landmark_ICBMsilominot_desc: "Minot Air Force Base's missile complex consists of an extensive network of underground silos housing intercontinental ballistic missiles, scattered across the North Dakota plains. The silos are hardened against nuclear strike and heavily guarded, maintained on continuous alert, forming the land-based leg of the United States' nuclear triad."
 landmark_ICBMsiloyasny: "Yasny Missile Base"
 landmark_ICBMsiloyasny_plural: "$landmark_ICBMsiloyasny$"
 landmark_ICBMsiloyasny_desc: "The Yasny missile base, near Dombarovsky in Russia's Orenburg region, is one of the principal silo fields of the Strategic Rocket Forces. Built during the Cold War, it hosts heavy ICBMs in hardened underground silos and forms a critical component of Russia's nuclear deterrent."
 landmark_zenobia_wall: "Zenobia Defense Line"
 landmark_zenobia_wall_plural: "$landmark_zenobia_wall$"
 landmark_zenobia_wall_desc: "A heavily fortified line stretching across southern Egypt and the western desert. Concrete walls, bunker complexes, and pre-sited artillery anchor the Zenobia Line, raised to halt the Chimera advance from sub-Saharan breach zones."
 landmark_hagia_sophia_plural: "$landmark_hagia_sophia$"
 landmark_hagia_sophia_desc: "Originally built as a Byzantine cathedral in 537, the Hagia Sophia became Istanbul's principal Ottoman mosque after the city's conquest in 1453. It served as a secular museum through much of the Turkish Republic's history. Its massive central dome and Byzantine mosaics remain among the most influential works of religious architecture ever built, drawing millions of visitors to Istanbul each year."
 landmark_forbidden_city_desc: "The walled palace complex at the heart of Beijing served as the imperial residence of the Ming and Qing dynasties for nearly five centuries. Today it houses the Palace Museum, holding one of the world's most important collections of Chinese art and artifacts. The Forbidden City is the country's most-visited cultural site and a UNESCO World Heritage Site, standing as the foremost symbol of Chinese civilization."
 landmark_tokyo_imperial_palace_desc: "The primary residence of the Emperor of Japan since the Meiji Restoration, standing on the site of the former Edo Castle in the heart of Tokyo. The palace and its grounds represent the continuity of the world's oldest hereditary monarchy. Public access is restricted, but the East Gardens and major imperial ceremonies draw substantial tourism every year."
 landmark_taj_mahal_plural: "$landmark_taj_mahal$"
 landmark_taj_mahal_desc: "Commissioned in 1632 by Mughal emperor Shah Jahan as a mausoleum for his wife Mumtaz Mahal, the Taj Mahal is the finest surviving example of Mughal architecture. Its white marble facade, intricate inlay work, and symmetrical gardens have made it a UNESCO World Heritage Site and one of the most visited monuments on Earth, drawing millions of visitors to Agra each year."
 landmark_prague_castle: "Prague Castle"
 landmark_prague_castle_desc: "The largest ancient castle complex in the world by area, Prague Castle has served as the seat of Bohemian kings, Holy Roman emperors, and now the President of the Czech Republic. Within its walls stand St. Vitus Cathedral and centuries of art from across Central Europe, making the castle the country's most-visited cultural site."
 landmark_bojnice_castle: "Bojnice Castle"
 landmark_bojnice_castle_desc: "A romantic neo-Gothic restoration of a medieval Slovak fortress, Bojnice Castle was rebuilt in the late nineteenth century under Count János Pálffy in the style of the French Loire châteaux. Today it is one of the most-visited cultural sites in Slovakia, its turreted silhouette and surrounding park serving as a centerpiece of Slovak heritage tourism."
 landmark_sadabad_complex: "Sadabad Complex"
 landmark_sadabad_complex_plural: "$landmark_sadabad_complex$"
 landmark_sadabad_complex_desc: "A sprawling palace complex in the foothills north of Tehran, originally built under the Qajars and dramatically expanded by the Pahlavi shahs. Following the 1979 revolution the complex was nationalized, and today it operates as a network of state museums housing royal collections, Iranian art, and natural history."
 landmark_hofburg_palace_desc: "The Hofburg, in the heart of Vienna, served for centuries as the principal imperial palace of the Habsburg dynasty. Today its halls house the offices of the Austrian Federal President, the Spanish Riding School, the Imperial Treasury, and several major museums. It remains one of Vienna's defining landmarks and a centerpiece of Austrian cultural tourism."
 landmark_berlin_reichstag_desc: "The Reichstag building on Platz der Republik has stood at the political center of Berlin for over a century. Heavily damaged in 1933 and again during the Second World War, it was restored after reunification under Norman Foster's redesign and reopened in 1999 as the seat of the Bundestag, the German federal parliament. Its glass dome has become a defining symbol of modern German democracy and a major attraction in central Berlin."
 enrichment_facility: "Nuclear Enrichment Facility"
 enrichment_facility_plural: "Nuclear Enrichment Facilities"
 enrichment_facility_desc: "Enrichment facilities take in Uranium and enrich it for use in nuclear reactors and to some extent nuclear weaponry."