 EU_voting_category_desc: "[ROOT.GetFlag] Europeanism: [?ROOT.europeanism|%R1]\n[EUU.GetFlag] Europeanism: [?global.var_europeanism|%G1]\n\nEuropeanism, also known as Pro-Europeanism or European Unionism, is a political position that favours European integration and membership of the European Union (EU), including the more radical European federalists who seek a single superstate known informally as a United States of Europe. A related term is 'Europhile'. For a country, the ratio estimates the share of the population who would vote to remain in the EU in a membership referendum. For the Union as a whole, it estimates the share of Europhile people across all member states.\n\n[ROOT.GetFlag] Breach of values of the European Union: [?ROOT.breach_of_EU_value|g0]\n\"The Union is founded on the values of respect for human dignity, freedom, democracy, equality, the rule of law and respect for human rights, including the rights of persons belonging to minorities. These values are common to the Member States in a society in which pluralism, non-discrimination, tolerance, justice, solidarity and equality between women and men prevail.\"\n- Article 2, Treaty on European Union\n\n"
