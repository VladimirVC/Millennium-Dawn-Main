 RAJ_Export_category: "Торговля индийским оружием"
 RAJ_Export_category_desc: "В современном мире торговля оружием является неотъемлемой частью экономики развитых стран, и Индия не является исключением. Правильная политика прошлых правительств позволила Индии увеличить производство оружия и получить возможность продавать его другим странам. Если мы хотим стать конкурентоспособной державой на международном рынке, мы должны начать развивать торговлю и производство оружия. Индия должна войти в новое тысячелетие как передовая военная держава."
 RAJ_more_relation_is_better: "Если у нас будут §Gболее высокие отношения§! со следующими странами, то они §Cс большей вероятностью присоединятся к нашей фракции§!"
