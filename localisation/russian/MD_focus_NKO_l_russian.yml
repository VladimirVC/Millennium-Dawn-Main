 arduous_march_modifiers_desc: "Тяжёлый поход дорого обошёлся нашей стране. Чтобы обеспечить будущее нашего народа, мы должны принять стратегические меры, чтобы преодолеть этот период трудностей и привести нашу страну к процветанию. Это включает в себя увеличение объёмов сельскохозяйственного производства, обеспечение гуманитарной помощи и реформирование нашей внутренней политики для обеспечения стабильности и роста."
