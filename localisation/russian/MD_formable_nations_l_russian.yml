 form_UAS_category: "Союз африканских государств"
 form_UAS_category_desc: "Союз африканских государств был недолговечным политическим союзом между Ганой, Гвинеей и Мали, образованным в 1961 году в соответствии с панафриканским видением Кваме Нкрумы. Давайте возродим эту мечту о единстве Западной Африки и создадим новый мощный союз."
