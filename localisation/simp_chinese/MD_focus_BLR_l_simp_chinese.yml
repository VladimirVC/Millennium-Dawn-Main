 BLR_is_not_currently_sending_azot_mission_TT: "[ROOT.GetNameWithFlag]目前未执行§Y贸易代表团任务§!\n"
 belarus_LTB.1.t: "共产主义抗议活动爆发"
 belarus_LTB.1.d: "共产党煽动者在全国各地组织了大规模示威游行。这些抗议活动引起了公众的广泛关注，并给政府带来了相当大的压力。我们的情报部门怀疑有外国势力参与其中，但尚未能证实。"
 belarus_LTB.1.a: "令人深感忧虑。"
 belarus_LTB.2.t: "亲白俄罗斯宣传运动"
 belarus_LTB.2.d: "一场旨在宣传与白俄罗斯建立更紧密关系益处的协调一致的宣传活动已出现在我们的媒体平台上。海报、传单和公开演讲都在呼吁建立一个统一的国家。虽然这场运动看似源于民间，但其信息传递却惊人地一致。"
 belarus_LTB.2.a: "我们必须应对这种情况。"
 belarus_LTB.3.t: "军官被指控与外国有联系"
 belarus_LTB.3.d: "我军多名军官卷入一起涉及境外资金的腐败丑闻。这些被指控的军官身居要职，他们的离职将导致我军指挥体系出现漏洞。这似乎是更大规模的境外情报行动的一部分。"
 belarus_LTB.3.a: "立即逮捕他们"
 belarus_LTB.4.t: "政治腐败丑闻"
 belarus_LTB.4.d: "泄露的文件显示，多名议员收受外国政府的贿赂，以换取政治影响力。这一丑闻动摇了公众对我国民主制度的信心，多个执政联盟伙伴威胁要撤回支持。"
 belarus_LTB.4.a: "这是一场灾难"
 belarus_LTB.5.t: "共产党起义"
 belarus_LTB.5.d: "武装的共产主义叛乱分子占领了全国各地的重要政府大楼。军队四分五裂，文官政府似乎正在崩溃。这是一场全面革命。我们的海外盟友要么无力干预，要么不愿干预。"
 belarus_LTB.5.a: "旧秩序已经结束了"
 BLR_new_paths_desc: ""