 CHI_semiconductor_backwardness_1: "Technological Dependence"
 CHI_semiconductor_backwardness_1_desc: "China's semiconductor industry remains structurally dependent on foreign foundries, design software, and manufacturing equipment. Domestic fabs operate two to three generations behind the frontier, design houses lack mature EDA toolchains, and no domestic equipment firm can supply advanced lithography. The gap throttles domestic chip-plant construction and foundry output, and constrains both civilian electronics and the military electronics supply chain. Progress through the Semiconductor Industry branch erodes this dependence step by step."
