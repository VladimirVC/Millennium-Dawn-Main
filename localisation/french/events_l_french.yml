 TT_CURRENT_LEADER_DIES: "§R[ROOT.GetLeader] est mort[Root.GetXEDir] !§!"
 md4.1.t: "[FROM.GetName]-[Root.GetName] Free Trade Agreement"
 md4.1.d: "[FROM.GetNameDef] is offering us a free trade agreement. We will have priority to export to and import from them."
 md4.1.a: "Signons-le !"
 md4.1.b: "Refuser."
 md4.2.t: "[FROM.GetNameDef] Has Signed a Free Trade Agreement with Us"
 md4.2.d: "[FROM.GetNameDef] has accepted our offer to sign a free trade agreement. It will enter into force immediately."
 md4.2.a: "Cela nous rendra tous les deux prospères !"
 md4.3.t: "[FROM.GetNameDef] Has Refused to Sign a Free Trade Agreement with Us"
 md4.3.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.3.a: "Ils ont peur de nos produits de qualité supérieure !"
 md4.4.t: "[FROM.GetName]-[Root.GetName] Military Cooperation Treaty"
 md4.4.d: "[FROM.GetNameDef] is offering us a military cooperation treaty. We will sell them equipment at a discounted price but this will make them more likely of buying from us instead of buying from our competitors."
 md4.4.a: "Signons-le !"
 md4.4.b: "Refuser."
 md4.5.t: "[FROM.GetNameDef] Has Signed a Military Cooperation Treaty with Us"
 md4.5.d: "[FROM.GetNameDef] has accepted our offer to sign a military cooperation treaty. It will enter into force immediately."
 md4.5.a: "Cela nous rendra tous les deux forts !"
 md4.6.t: "[FROM.GetNameDef] Has Refused to Sign a Military Cooperation Treaty with Us"
 md4.6.d: "[FROM.GetNameDef] has refused our offer to sign a military cooperation treaty."
 md4.6.a: "Ils ont peur que nous soyons plus forts !"
 md4.7.t: "Scandale sexuel présidentiel"
 md4.7.d: "The [FROM.GetName] has come into a sex scandal. The scandal involved [FROM.GetName] sexually assaulting multiple people during countless years as politician. This is being viewed as a great abuse of power and trust among the people. Many people across the country have demanded a response from the [FROM.GetName] on the Allegations."
 md4.7.a: "Je nie ces allégations. Ils sont faux sur tous les fronts. C'est juste une façon de me calomnier !"
 md4.7.b: "J'accepte ces allégations. J'ai le regret de vous informer qu'ils sont vrais."
 md4.8.t: "Réponse à la fusillade dans une école"
 md4.8.d: "A school shooting has occurred [FROM.GetName]. This school shooting has received lots of media attention, and warrants a response from the President."
 md4.8.a: "Promesse de résoudre le problème"
 md4.8.b: "Essayez d'ignorer le problème et passez à autre chose."
 md4.9.t: "Réflexions sur l'impôt sur le revenu"
 md4.9.d: "The president of The [FROM.GetName] has an interview from the press about the income tax, and what he thinks should happen to them"
 md4.9.a: "Je pense que l'impôt sur le revenu devrait être augmenté pour les pauvres"
 md4.9.b: "Je pense que l'impôt sur le revenu devrait être réduit pour les pauvres"
 md4.9.c: "Je pense que l'impôt sur le revenu devrait être augmenté pour les riches"
 md4.9.e: "Je pense que l'impôt sur le revenu devrait être réduit pour les riches"
 md4.10.t: "Réponse des pauvres"
 md4.10.d: "Les pauvres ont été quelque peu mécontents des pensées du président"
 md4.10.a: "Oh non!"
 md4.11.t: "Réponse des riches"
 md4.11.d: "Les riches ont été quelque peu mécontents des pensées du président"
 md4.11.a: "Oh non!"
 md4.12.t: "Réponse des riches"
 md4.12.d: "Le président a déclaré qu’il aimerait augmenter les impôts des riches, ce qui ne leur convient pas. Le soutien au président a été mis à mal à cause de cette pensée."
 md4.12.a: "Oh non!"
 md4.13.t: "Réponse des pauvres"
 md4.13.d: "Les pauvres ont répondu aux réflexions du président concernant les impôts sur les riches. Beaucoup de pauvres estiment que les riches ne devraient pas voir leurs impôts baisser mais plutôt augmenter encore plus."
 md4.13.a: "Oh non!"
 md4.14.t: "[FROM.GetName] Soumission des demandes"
 md4.14.d: "Le gouvernement de [FROM.GetName] a exigé que nous nous soumettions à son règne et devenions notre suzerain."
 md4.14.a: "Bien sûr"
 md4.14.b: "Jamais"
 md4.15.t: "[FROM.GetName] Soumet"
 md4.15.d: "Le gouvernement de [FROM.GetName] a accepté nos demandes et s'est soumis à notre règle."
 md4.15.a: "Super"
 md4.16.t: "[FROM.GetName] résiste"
 md4.16.d: "Le gouvernement de [FROM.GetName] a rejeté nos demandes de suzeraineté"
 md4.16.a: "Mince"
 md4.17.t: "[FROM.GetName] Accepte l'alliance"
 md4.17.d: "Le gouvernement de [FROM.GetName] a accepté notre demande d'alliance"
 md4.17.a: "Super"
 md4.18.t: "[FROM.GetName] rejette l'alliance"
 md4.18.d: "Le gouvernement de [FROM.GetName] a rejeté notre demande d'alliance"
 md4.18.a: "Mince"
 md4.19.t: "[FROM.GetName] Cède le territoire"
 md4.19.d: "Le gouvernement de [FROM.GetName] a accepté nos revendications territoriales"
 md4.19.a: "Super"
 md4.20.t: "[FROM.GetName] refuse de céder son territoire"
 md4.20.d: "Le gouvernement de [FROM.GetName] a rejeté nos revendications territoriales"
 md4.20.a: "Mince"
 generic.1.t: "[FROM.GetName] Is Influencing Our Politics"
 generic.1.d_neutral_good: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has expressed a great interest in [Root.GetAdjective] politics. Recently this intensified when [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with a number of speeches and reading material distributed to the [Root.GetAdjective] people. \n\nNow even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda, and have started advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.d_bad: "For a long time the [FROM.GetAdjective] government has sought to align the path of our countries, and has often tried to meddle in [Root.GetName]'s politics. Recently this has intensified, as [FROM.GetRulingParty] started pushing their [FROM.GetRulingIdeology] propaganda with no respect for [Root.GetAdjective] political traditions. A number of speeches and other [FROM.GetRulingIdeology] material is already being distributed to the [Root.GetAdjective] people. It seems that even a number of politicians and other officials are being swayed by the [FROM.GetAdjective] propaganda and have begun advocating for [FROM.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.a: "Intéressant"
 generic.1.b: "Comment osent-ils ?!"
 generic.2.t: "[FROM.GetName] seeks to join the [Root.GetFactionName]"
 generic.2.d.a: "Face aux menaces croissantes contre la liberté et les valeurs démocratiques, l'[alliance_applicant.GetAdjective] nous considère comme les défenseurs de la liberté. Ils souhaitent désormais être admis dans notre alliance, à la fois pour bénéficier de notre protection et pour se tenir à nos côtés contre les forces qui menaceraient la démocratie."
 generic.2.d.b: "Notre volonté de renverser l’ordre mondial actuel n’a pas échappé à l’attention des nations partageant les mêmes idées. Les [alliance_applicant.GetAdjective] reconnaissent que leur meilleure chance de se forger un avenir prospère est de s'aligner avec nous dans le conflit à venir, et ils ont donc proposé de se joindre officiellement à nous contre nos ennemis."
 generic.2.d.c: "[alliance_applicant.GetName] a reconnu qu'elle devait s'unir avec ses compatriotes socialistes pour renforcer la place du communisme dans le monde. Acceptant notre rôle de leader dans le sort international des travailleurs, l'[alliance_applicant.GetAdjective] demande maintenant de conclure formellement une alliance avec nous."
 generic.2.d.e: "Alors que les bouleversements actuels de la politique internationale continuent de se répercuter à travers le monde, l'[alliance_applicant.GetAdjective] nous considère comme leur plus grande chance de survivre à ces temps tumultueux. Ils demandent donc à être admis dans notre alliance, afin que nous puissions affronter ensemble la tempête à venir."
 generic.2.a: "Tous ceux qui défendent la liberté et la démocratie peuvent être à nos côtés."
 generic.2.b: "Le monde appartient à tous ceux qui sont forts !"
 generic.2.c: "Si nous sommes unis, la révolution ne peut que prévaloir."
 generic.2.e: "Et nous y parviendrons !"
 generic.2.f: "Nous sommes mieux sans eux."
 generic.3.t: "[alliance_inviter.GetName] nous souhaite la bienvenue dans [alliance_inviter.GetFactionName]"
 generic.3.d: "[alliance_inviter.GetName] a décidé d'accepter notre demande de rejoindre [alliance_inviter.GetFactionName]. Désormais, nous résisterons ou tomberons ensemble."
 generic.3.a: "Ensemble, nous défendrons la démocratie."
 generic.3.b: "Personne ne peut nous résister !"
 generic.3.c: "Le sort des travailleurs ne pouvait pas demander de meilleurs champions !"
 generic.3.e: "Nous allons mettre nos divergences de côté, pour l'instant."
 generic.4.t: "[alliance_inviter.GetName] refuse la demande d'adhésion à [alliance_inviter.GetFactionName]"
 generic.4.d: "[alliance_inviter.GetName] a décidé de rejeter notre demande d'adhésion à [alliance_inviter.GetFactionName]. Nous devrons nous débrouiller sans leur aide."
 generic.4.a: "Ils se disent défenseurs de la liberté ?"
 generic.4.b: "Alors nous les écraserons aussi !"
 generic.4.c: "Leur révolution est corrompue !"
 generic.4.e: "Nos différences étaient trop grandes."
 generic.5.t: "[FROM.GetName] invites [Root.GetName] to the [FROM.GetFactionName]"
 generic.5.d.a: "Avec un regard suspicieux sur les récents développements de la politique mondiale, [alliance_inviter.GetName] nous tend la main de l'amitié, nous offrant sa protection et nous exhortant à nous tenir à leurs côtés pour défendre les principes de liberté et de démocratie. En tant que membre de [alliance_inviter.GetFactionName], la liberté de notre peuple pourrait bien être sauvegardée."
 generic.5.d.b: "Conscients que parfois même les plus forts ont besoin d'alliés, les [alliance_inviter.GetAdjective] nous ont invités à rejoindre l'[alliance_inviter.GetFactionName]. Si nous choisissons d’accepter, cela pourrait bien nous fournir de nombreuses opportunités de trouver notre place au soleil."
 generic.5.d.c: "Nos alliés idéologiques de [alliance_inviter.GetName] ont pris note de nos précieuses contributions à la cause des travailleurs, et ce matin nous avons reçu une invitation à rejoindre l'[alliance_inviter.GetFactionName]. En nous unissant aux autres républiques socialistes, nous pourrions propager la révolution avec une force renouvelée."
 generic.5.d.e: "Il semble que [alliance_inviter.GetAdjective] nous considère comme présentant un intérêt stratégique pour eux et qu'ils jugent plus rentable que nous travaillions ensemble plutôt que de nous laisser diviser par nos différences idéologiques. Ce matin, l'ambassadeur de [alliance_inviter.GetAdjective] nous a invité à devenir membre de [alliance_inviter.GetFactionName]."
 generic.5.a: "Nous prendrons position à leurs côtés."
 generic.5.b: "Nous n'avons besoin que de quelques milliers de morts..."
 generic.5.c: "Nous combattrons aux côtés de nos camarades !"
 generic.5.e: "C'est le choix rentable."
 generic.6.t: "[alliance_applicant.GetName] accepte l'invitation à [alliance_inviter.GetFactionName]"
 generic.6.d: "[alliance_applicant.GetName] a décidé d'accepter notre offre de rejoindre l'[alliance_inviter.GetFactionName]. Désormais, nous résisterons ou tomberons ensemble."
 generic.7.t: "[alliance_applicant.GetName] rejette l'offre de rejoindre [alliance_inviter.GetFactionName]"
 generic.7.d: "[alliance_applicant.GetName] a décidé de rejeter notre offre de rejoindre [alliance_inviter.GetFactionName]. Nous devrons nous débrouiller sans leur aide."
 generic.7.a: "Notre aide n'est pas recherchée."
 ace_promoted.1.t: "Ace Pilot promu"
 ace_promoted.2.t: "Un as sauvage apparaît"
 ace_promoted.1.d: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive from the recent mission over [FROM.GetMissionRegion], but living through significant victories in many critical encounters.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.d_major: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [FROM.GetName] [FROM.GetSurname], a skilled pilot known under the callsign [FROM.GetCallsign], has distinguished [FROM.GetHerselfHimself] in not only returning alive, but piloting [FROM.GetHerHis] [FROM.GetWing] with immense skill. Recently, [FROM.GetName] was on a mission over [FROM.GetMissionRegion] and was instrumental to the success of this critical encounter.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [FROM.GetName]'s recent promotion has been highly publicized. Although the people may view war as more hell than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.a: "Qui ose, gagne."
 ace_died.1.t: "Fighter Ace Callsign '[FROM.GetCallsign]' Killed Over [FROM.GetMissionRegion]"
 ace_died.1.d: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has been shot down in the line of duty during a mission over [FROM.GetMissionRegion]. Unfortunately, since [FROM.GetSheHe] has long been a public figure, their demise is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, [FROM.GetHerHis] death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.d_major: "One of [FROM.Owner.GetName]'s most famous [FROM.GetAceType] aces, [FROM.GetFullName], has gone down in the line of duty. Pilots returning from the region report having spotted [FROM.GetHerHis] [FROM.GetWingShort] going down in flames over [FROM.GetMissionRegion] after taking heavy enemy fire. Unfortunately, since [FROM.GetSheHe] has long been a public figure, the demise of '[FROM.GetCallsign]' is severely demoralizing to the many people who looked up to [FROM.GetHerHim].\n\nWhile we wish there was a way to hide this event from the people, the lack of public appearances from [FROM.GetName] would soon raise suspicion. Ultimately, death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.a: "Une légende vivante eût été préférable."
 ace_killed_by_ace.1.t: "Fighter Ace [FROM.GetFullName] Shot Down By Enemy Pilot"
 ace_killed_by_ace.1.d: "Pilots returning from [FROM.GetMissionRegion] report that a squadron of [Prev.Owner.GetAdjective] aircraft, led by the infamous pilot '[Prev.GetCallsign]', focused on chasing down [FROM.GetFullName]. After dodging several bursts from the enemy and taking down a number of hostile aircraft, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]', who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s plane caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to our nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.d_major: "Pilots returning from [FROM.GetMissionRegion] report that, a squadron of [Prev.Owner.GetAdjective] aircraft led by the infamous pilot '[Prev.GetCallsign]' focused on chasing down [FROM.GetFullName]. After taking down a number of enemy aircraft and dodging several bursts from the enemy, '[FROM.GetCallsign]' was overwhelmed by '[Prev.GetCallsign]' in his [Prev.GetWingShort], who reportedly outmaneuvered [FROM.GetHerHim] and ripped [FROM.GetHerHis] fuel tanks open with a clean hit. [FROM.GetName] [FROM.GetSurname]'s [FROM.GetWingShort] caught fire and went spiraling down over [FROM.GetMissionRegion] in a violent inferno.\n\n[FROM.GetFullName] has shown great courage throughout [FROM.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [FROM.Owner.GetAdjective] Air Force and is a devastating blow to the nation as a whole. Knowing that while we grieve [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero makes the tragedy even greater."
 ace_killed_by_ace.1.a: "C'est une perte terrible pour nous tous"
 ace_killed_other_ace.1.t: "Fighter Ace [FROM.GetFullName] Shoots Down Callsign '[Prev.GetCallsign]'"
 ace_killed_other_ace.1.d: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, outwitting the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]'. '[FROM.GetCallsign]' used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]'' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]'' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.d_major: "Our latest mission over [FROM.GetMissionRegion] was a great success for the [FROM.Owner.GetAdjective] Air Force in more than one aspect. Reports have come in highlighting [FROM.GetFullName]'s heroic deed, managing to outwit the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as '[Prev.GetCallsign]''. [FROM.GetCallsign] used [FROM.GetHerselfHimself] as bait and lured '[Prev.GetCallsign]' into a trap where the [FROM.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. '[FROM.GetCallsign]' proceeded to outmaneuver the [Prev.Owner.GetAdjective] aircraft and with a single burst sent '[Prev.GetCallsign]' spiraling from the skies of [FROM.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [FROM.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.a: "A victory all of [FROM.Owner.GetNameDef] will remember!"
 aces_killed_each_other.1.t: "Fighter ace [FROM.GetFullName] has gone down"
 aces_killed_each_other.1.d: "During the latest mission our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s and [Prev.GetCallsign]'s aircraft were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.d_major: "During the most recent aerial sortie our famous [FROM.GetAceType] ace [FROM.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, '[FROM.GetCallsign]' maneuvered [FROM.GetHerHis] [FROM.GetWingShort] through the fire of the [Prev.Owner.GetAdjective] aircraft and proceeded to ram '[Prev.GetCallsign]'.\nBoth [FROM.GetCallsign]'s [FROM.GetWingShort] and [Prev.GetCallsign]'s [Prev.GetWingShort] were spotted going down in pieces over [FROM.GetMissionRegion].\n\nWhile it is little consolation that the [Prev.Owner.GetAdjective] menace, '[Prev.GetCallsign]', will no longer be a nuisance to us, we have lost a valued public figure and inspiration to the entire nation."
 aces_killed_each_other.1.a: "Cela reste une perte terrible pour nous tous"
 election.1.t: "ÉLECTION GÉNÉRIQUE"
 election.1.d: ""
 election.1.a: ""
 election.2.t: "Élection : l’opinion publique s’oppose au réarmement"
 election.2.d: "Lors des prochaines élections, le soutien à [Root.GetRulingParty] est toujours élevé, les gens ont confiance dans le leadership de [Root.GetLeader]. Cependant, la volonté du parti d'accroître l'attention de [Root.GetName] sur les questions militaires n'a pas été entièrement populaire auprès du public, une partie importante des citoyens considérant ce chauvinisme peu judicieux. La guerre n’a pas encore atteint nos frontières et peu de gens aimeraient voir [Root.GetName] prendre des mesures agressives. En coopérant avec d’autres grands partis qui partagent nos préoccupations quant à la sécurité de la nation, nous serons toujours en mesure de gouverner après les élections, bien qu’avec un soutien réduit."
 election.2.a: "Le peuple doit être entendu."
 election.2.b: "La protection de notre souveraineté passe avant tout."
 election.3.t: "Élection : le public exige le réarmement"
 election.3.d: "La guerre en cours à l'approche de nos frontières menace les prochaines élections, de nombreux électeurs craignant que [Root.GetName] ne soit pas préparé à être jeté dans ce conflit ou dans tout ce qui pourrait en découler. Ils exigent que nous augmentions nos précautions et que nous veillions à ce que notre nation soit prête à la guerre. Même si la majorité soutient toujours [Root.GetRulingParty], nous risquons de la perdre au profit d'éléments plus radicaux si nous n'apaisons pas leurs appréhensions."
 election.3.a: "Les gens ont le droit de se sentir en sécurité."
 election.3.b: "Beaucoup restent favorables aux solutions diplomatiques."
 election.4.t: "Élections : des fascistes au gouvernement ?"
 election.4.d: "Un sentiment nationaliste agressif s'est développé au sein de [Root.GetName], donnant naissance à plusieurs partis promouvant les idéaux fascistes : un État imposant son pouvoir par la force. L’un d’entre eux en particulier a gagné les faveurs des élections actuelles, ce qui a conduit à des discussions au sein du parti [Root.GetRulingParty] sur la question de savoir si nous devrions ou non essayer de coopérer avec eux pour former notre gouvernement. Même s’ils rejettent ouvertement les idéaux démocratiques qui constituent le fondement de notre État, le fait qu’ils choisissent de participer aux élections elles-mêmes confère une certaine crédibilité à nos opinions et le fait de reconnaître leur soutien public pourrait les empêcher de prendre des mesures violentes."
 election.4.a: "Plutôt eux que les communistes !"
 election.4.b: "Une large coalition de partis démocratiques est préférable."
 election.5.t: "Élections : des communistes au gouvernement ?"
 election.5.d: "Le mouvement communiste de [Root.GetName], alimenté par un large mécontentement au sein de la classe ouvrière et par des tendances radicales parmi les universitaires, s'est suffisamment développé pour conduire à la formation de plusieurs partis. Après que l'un d'eux ait obtenu un soutien considérable lors des élections en cours, les politiciens du [Root.GetRulingParty] ont commencé à débattre de l'opportunité de solliciter ou non leur soutien pour former un gouvernement. Bien qu’ils considèrent nos institutions démocratiques comme n’étant guère plus que la tyrannie bourgeoise, ils semblent désireux d’apporter les changements qu’ils souhaitent en coopérant avec le gouvernement plutôt qu’en le renversant."
 election.5.a: "Plutôt une réforme que une révolution !"
 election.5.b: "Une large coalition de partis démocratiques est préférable."
 election.6.t: "Élection : les partis démocrates en minorité"
 election.6.d: "La politique dans [Root.GetName] est devenue de plus en plus radicalisée. Alors qu'il y avait autrefois un large soutien aux partis qui soutenaient les idéaux démocratiques et les institutions représentatives de [Root.GetName], davantage d'électeurs se sont tournés vers les extrêmes politiques lors de cette élection. Les partis du milieu politique, même s’ils choisissent de mettre de côté leurs divergences, ne forment plus la majorité. Pour éviter un gouvernement minoritaire faible, nous n’avons d’autre choix que de coopérer avec les fascistes ou les communistes."
 election.6.a: "Nous travaillerons avec les fascistes pour renforcer [Root.GetName]."
 election.6.b: "En nous joignant aux communistes, nous pouvons faciliter le changement social."
 election.6.c: "Un gouvernement minoritaire, bien que faible, est préférable."
 election.7.t: "Les fascistes influencent la politique étrangère"
 election.7.d: "L’acceptation des fascistes dans notre coalition politique a eu un impact sur notre politique étrangère. Malgré leur nationalisme véhément, ils ont des sympathisants à l'étranger qui approuvent l'influence qu'ils ont reçue dans [Root.GetName]. Les gouvernements totalitaires partageant les mêmes tendances idéologiques nous considèrent comme des alliés potentiels. Maintenir les liens avec ces nations, quel que soit le dégoût que [Root.GetRulingParty] puisse avoir pour leurs idéaux, peut être nécessaire pour conserver le soutien des fascistes qui soutiennent notre gouvernement."
 election.7.a: "Nous pouvons utiliser certains alliés contre des menaces plus importantes."
 election.7.b: "Avec des amis comme ça, nous n’aurions pas besoin d’ennemis."
 election.8.t: "Les communistes influencent la politique étrangère"
 election.8.d: "Les communistes se considèrent souvent comme faisant partie d’une révolution internationale, et notre choix de les accepter comme partenaires de notre gouvernement a attiré l’attention de nombre de leurs alliés internationaux. Les représentants des partis communistes entretiennent des liens étroits avec les nations qui ont abandonné notre forme de gouvernement en faveur d'une dictature du prolétariat, liens que nous devrons peut-être reconnaître dans la politique étrangère [Root.GetAdjective] si nous souhaitons conserver leur soutien."
 election.8.a: "Nous devons embrasser nos causes communes."
 election.8.b: "Sur cette voie se trouve la dissolution de [Root.GetName] lui-même."
 election.11.t: "Élection : majorité fasciste"
 election.11.d: "Cette élection a été dévastatrice pour l’institution même qu’elle représente. La majorité de la population [Root.GetAdjective] a voté en faveur d'un parti fasciste qui cherche à abolir les élections et à installer un dirigeant autocratique. Alors que beaucoup envisagent de prendre les armes contre cette violation des idéaux démocratiques qui leur ont permis d'exercer ce mandat, d'autres considèrent le recours à la violence comme un simple moyen de confirmer davantage leurs idéaux."
 election.11.a: "C'est un jour noir pour [Root.GetName], mais les gens ont parlé."
 election.11.b: "Nous n'abandonnerons pas notre liberté sans combattre !"
 election.12.t: "Élection : majorité communiste"
 election.12.d: "Les élections en cours ont abouti à la victoire des partis communistes, avec des réactions mitigées de la part de l'ancienne administration. Alors que les nouveaux dirigeants prétendent représenter le peuple dans son ensemble, ils considèrent bon nombre des institutions démocratiques que nous chérissons comme des tentatives de manipuler et d’opprimer la classe ouvrière, ce qui conduit à un débat sur ce qui constitue véritablement un « gouvernement du peuple ». Dans certains pays, la révolution a commencé dans des rivières de sang. Dans [Root.GetName], ce n'est pas le cas, mais cela pourrait encore se terminer par eux."
 election.12.a: "C’est troublant, mais ils représentent bel et bien la majorité."
 election.12.b: "Nous devons les arrêter avant qu’ils n’abolissent tout signe de pensée dissidente !"
 election.13.t: "Élection : un magnat favorable au fascisme"
 election.13.d: "Un industriel influent derrière l'une des entreprises avec lesquelles nous avons choisi de travailler pour notre production industrielle a récemment fait un certain nombre de déclarations politiques qui ont troublé les membres de l'administration. Il a ouvertement plaidé en faveur d'un gouvernement autoritaire et a fait l'éloge des administrations étrangères qui s'identifient comme fascistes, suggérant implicitement que [Root.GetName] bénéficierait d'une telle gouvernance. Dénoncer le magnat et ses idéaux pourrait détériorer nos relations avec l’entreprise, mais les laisser sans contrôle lui donnerait une plate-forme pour diffuser une propagande qui éroderait tout ce que [Root.GetRulingParty] représente."
 election.13.a: "Il peut dire ce qu'il veut, nous n'avons pas besoin de l'approuver."
 election.13.b: "Nous ne pouvons pas compter sur les fascistes pour développer et protéger [Root.GetName]."
 election.14.t: "Élection : exception en temps de guerre"
 election.14.d: "[Root.GetName] est en état de guerre. Normalement, une élection aurait lieu à ce moment-là, mais étant au milieu d'un conflit important, nombreux sont ceux qui affirment qu'ils ne peuvent pas se permettre de consacrer du temps à une campagne politique ou à un changement de direction si cela devait se produire.Pendant ce temps, d’autres affirment que déclarer la guerre en cours comme une raison valable pour sauter les élections est la première étape vers l’érosion de la démocratie[Root.GetAdjective]. Après tout, laisser les questions militaires prendre le pas sur l'influence du peuple pourrait être une pente glissante."
 election.14.a: "Les élections auront lieu comme d'habitude."
 election.14.b: "Nous pourrons nous occuper de ces questions une fois la guerre terminée."
 election.15.t: "Élection : gouvernement contesté"
 election.15.d: "À l’approche des élections, les gens commencent à s’interroger sur la capacité du gouvernement actuel à poursuivre la guerre en cours. [Root.GetName] a beaucoup souffert et l'opinion populaire s'est retournée contre ceux qui semblent mener notre nation à la défaite. Même si notre peuple est déterminé à mettre fin à la guerre, il préfère voir un autre gouvernement y mettre fin."
 election.15.a: "Cette crise de confiance est très regrettable."
 election.15.b: "Laissons le paysage politique changer pour garder le peuple uni."
 election.16.t: "[Root.GetLeader] bénéficie du soutien public"
 election.16.d: "Avec les élections actuelles, l'opposition, dans la mesure où elle existe, a critiqué le règne de plus en plus autoritaire du [Root.GetRulingParty]. Ils se demandent si l’électorat a un quelconque pouvoir ou si ce n’est qu’une apparence.\n\nCependant, le soutien à [Root.GetLeader] semble rester élevé et, bien que les circonstances de l'élection soient remises en question par la communauté internationale, elles n'ont pas été contestées au niveau national. Il semble que même si [Root.GetName] n'est plus gouverné par le peuple, le peuple soutient son dirigeant... du moins ceux qui se sont rendus aux urnes."
 election.16.a: "Un peuple, un leader."
 election.17.t: "Les résultats des élections remis en question"
 election.17.d: "Bien que le régime [Root.GetLeader] ait contraint la plupart de ses opposants au silence, certains ont quand même parlé des récentes élections, accusant le [Root.GetRulingParty] de truquer les résultats et d'ignorer les efforts évidents pour élire un parlement opposé. à leurs politiques.\n\nLe gouvernement écarte ces objections dans le but de diviser le peuple contre lui-même. Il n’en reste pas moins que la majorité du peuple semble avoir des réserves quant à son pouvoir, et l’opposition, bien que réduite au silence pour l’instant, a fait valoir son point de vue."
 election.17.a: "Sécessionnistes!"
 political.1.t: "Le communisme en hausse"
 political.1.d: "« Tandis que les travailleurs se soulèvent contre leurs oppresseurs partout dans le monde, ceux qui prétendent avoir acquis une conscience de classe dans [Root.GetName] restent les bras croisés et attendent que le changement vienne d'un système politique si profondément corrompu que seule la révolution pourrait nous sauver de la situation. il!'\n\nAlors parlez de nouvelles voix dans le mouvement communiste [Root.GetAdjective]. Qualifiant le pouvoir du [Root.GetRulingParty] de dictature de la bourgeoisie, ils ont commencé à appeler à ce qu'il soit renversé du pouvoir par tous les moyens nécessaires. Reste à savoir si ces moyens viendront de l’intérieur ou de l’extérieur."
 political.1.a: "Il se peut que certains membres du gouvernement lui-même soutiennent de telles idées."
 political.1.a.tt: "Augmente les chances de soutien interne à un coup d’État communiste."
 political.1.b: "Un mouvement pour le peuple doit rechercher le soutien du peuple."
 political.1.b.tt: "Augmente les chances de soutien populaire à un soulèvement communiste."
 political.2.t: "Sympathies marxistes au sein du gouvernement"
 political.2.d: "Bien que la ligne du parti [Root.GetRulingParty] soit de s'opposer fermement au socialisme révolutionnaire, en gardant un œil vigilant sur les éléments radicaux de gauche du pays, certains membres du gouvernement sont plus ouverts à cette possibilité. Au moins, ils voient la possibilité de répondre aux préoccupations des gens qui se tournent vers les communistes pour trouver des solutions sans risquer une guerre civile à grande échelle.\n\nMême si elles peuvent être considérées comme des traîtres par ceux qui restent fidèles à [Root.GetLeader], ces voix dissidentes pourraient être celles qui garantiraient une transition relativement sans effusion de sang en cas de révolution."
 political.2.a: "Nous les surveillerons également de près, pour de nombreuses raisons."
 political.2.a.tt: "Si le soutien du public est suffisant, un coup d’État peut être exécuté."
 political.3.t: "Les communistes exécutent un coup d'État"
 political.3.d: "Alors que le mouvement populaire en faveur de la révolution communiste a été bruyant et terrifiant, une certaine partie du mouvement politique est restée largement silencieuse et en attente. L'attente est maintenant terminée. Aujourd'hui, alors que la direction et l'armée du [Root.GetRulingParty] se préparaient à une révolte à l'échelle nationale, un certain nombre de responsables du gouvernement [Root.GetAdjective] ont rapidement placé [Root.GetLeader] en résidence surveillée et ont entamé des négociations avec les rebelles. .\n\nTout en conservant un semblant de sauvegarde de l’ordre, les négociations ont en réalité consisté à garantir des positions au sein du nouvel État socialiste à ceux qui choisissaient de coopérer. Le coup d’État a été achevé avant que quiconque ait pu agir pour l’arrêter, et ceux qui l’auraient fait sont désormais emprisonnés, exilés ou exécutés par le nouveau régime."
 political.3.a: "Les marées de l’histoire balayeront le passé."
 political.4.t: "Les conflits de classes divisent [Root.GetName]"
 political.4.d: "Le mouvement révolutionnaire communiste, autrefois une frange populaire parmi les universitaires radicaux en théorie et les fauteurs de troubles dans la pratique, a bénéficié d'un soutien croissant au sein de la classe ouvrière[Root.GetAdjective]. Le fait qu'encore plus de gens choisissent de s'identifier à une « classe » implique que les idées marxistes se propagent au-delà de ceux qui cherchent activement à renverser le gouvernement.\n\nLes membres de [Root.GetRulingParty] déplorent cette évolution, aspirant à une époque où « [Root.GetAdjective] » était ce que les gens identifiaient avant tout. Leurs inquiétudes ne sont pas sans fondement. On pourrait affirmer qu’une révolution est déjà en cours, à plusieurs niveaux de la société, et qu’il est peut-être trop tard pour l’arrêter."
 political.4.a: "Les gens peuvent s'appeler comme ils veulent."
 political.5.t: "Les soldats désertent face aux partisans communistes"
 political.5.d: "« Les capitalistes et les nationalistes voudraient que vous versiez votre sang pour eux sur la ligne de front, en montant frère contre frère dans des conflits qui ne concernent pas les travailleurs ! Au lieu de prendre les armes contre les travailleurs qui luttent à l'étranger, levez-les contre les oppresseurs et renversez les tyrans !\n\nL'armée, habituellement un bastion de patriotisme et de loyauté, n'est pas à l'abri de la propagande communiste qui se propage rapidement dans [Root.GetName]. Les soldats désertent, refusant de se battre pour leur pays, allant parfois jusqu'à rejoindre des mouvements partisans qui prétendent préparer la révolution."
 political.5.a: "Peut-être qu'ils se battent simplement pour un [Root.GetName] différent."
 political.6.t: "La révolution [GetMonth]"
 political.6.d: "L’idée selon laquelle le mouvement communiste représente le peuple a certainement pris le vent en poupe dans [Root.GetName], où le soutien du public au parti communiste a augmenté rapidement au cours des derniers mois. Mais ceux qui appellent à la révolution ne sont plus un groupe disparate de guérilleros et de syndicats mécontents. Le groupe à l’origine de l’appel à la révolte est suffisamment organisé pour former un gouvernement s’il réussit.\n\nNéanmoins, si la révolution commençait maintenant, elle pourrait difficilement être exécutée sans lancer [Root.GetName] dans la guerre civile. Les révolutionnaires devraient-ils risquer de déchirer la nation en deux pour satisfaire leur impatience, ou attendre une meilleure opportunité dans le futur ?"
 political.6.a: "Ceux qui souhaitent écrire l’histoire doivent agir aujourd’hui !"
 political.6.b: "La révolution est inévitable. L'inévitable peut attendre."
 political.7.t: "Le fascisme en hausse"
 political.7.d: "« Les gens de [Root.GetAdjective] ont été soumis trop longtemps à la règle incompétente de [Root.GetRulingParty] ! Ils prétendent représenter le peuple, mais ne parviennent même pas à maintenir l’ordre dans nos rues ! Ce n'est qu'en les retirant du pouvoir que nous pourrons faire grandir cette nation !'\n\nLes orateurs fascistes de [Root.GetName] n’ont pas caché ce qu’ils pensent de notre gouvernement et de notre système politique actuels. Des discours comme ceux-ci ont exploité une dissidence publique particulièrement prononcée dans les sections les plus conservatrices de l’armée."
 political.7.a: "Les supérieurs peuvent entretenir des sympathies tacites."
 political.7.a.tt: "Augmente les chances de soutien interne à un coup d’État fasciste."
 political.7.b: "La jeune génération reprendra le flambeau."
 political.7.b.tt: "Augmente les chances de soutien populaire à un coup d’État fasciste."
 political.8.t: "Sympathies fascistes dans l'armée"
 political.8.d: "Plusieurs membres de haut rang de l'armée de [Root.GetAdjective] ont exprimé leur soutien, certains en privé et d'autres ouvertement, au mouvement fasciste de [Root.GetName]. Ils estiment que le [Root.GetRulingParty] a oublié à quel point la force des armes est importante pour maintenir l'unité du pays, et sont de plus en plus agacés par le fait que l'armée soit traitée par le gouvernement davantage comme un outil que comme l'une des institutions les plus importantes du pays. Certains d’entre eux vont jusqu’à suggérer qu’un nouveau gouvernement est nécessaire, un gouvernement qui sache comment diriger [Root.GetName] vers la prochaine moitié du siècle.\n\nCette faction n’est peut-être pas majoritairement composée de politiciens, mais certains d’entre eux ont obtenu des postes au sein du ministère de la Défense. Si ces développements se poursuivent, ils pourraient bénéficier d’un soutien politique suffisant pour exécuter un coup d’État."
 political.8.a: "The national spirit outranks the government."
 political.9.t: "Coup d'État fasciste"
 political.9.d: "Certains diront qu’ils l’ont vu venir. Tant ceux qui ont mis en garde contre les dangers du fascisme que ceux qui l'ont vanté comme le sauveur de [Root.GetName] ont vu leurs prophéties devenir réalité aujourd'hui, alors que l'armée de [Root.Capital.GetName] a renversé le [Root.GetRulingParty] - dirigé le gouvernement et pris le pouvoir. [Root.GetLeader] est porté disparu, la rumeur dit qu'il serait parti en exil, et le coup d'État a rencontré peu de résistance au départ.\n\nLa nouvelle direction [Root.GetAdjective] n’a pas non plus l’intention de permettre à la résistance de se développer. La loi martiale a été déclarée et, compte tenu des changements en cours, il est peu probable que ce qui suivra soit très différent."
 political.9.a: "Il faut un État fort pour protéger les gens d’eux-mêmes."
 political.10.t: "Guerre civile pour le fascisme"
 political.10.d: "Même si les tentatives du mouvement fasciste visant à raviver le sentiment nationaliste ont connu un certain succès, la résistance contre ces idées reste élevée. Les généraux qui complotent pour renverser l'administration actuelle sont déçus du manque de confiance que la population [Root.GetAdjective] elle-même semble avoir dans [Root.GetFascistParty].\n\nIls restent convaincus que les gens finiront par se lasser de [Root.GetLeader], mais sont divisés sur la marche à suivre. Certains demandent qu'un coup d'État soit exécuté maintenant, avant que les ennemis de [Root.GetName] n'agissent. Cependant, le faire alors que le soutien public est limité plongerait le pays dans la guerre civile."
 political.10.a: "La volonté de puissance n’a aucun sens si l’on hésite à s’en emparer."
 political.10.b: "Ils doivent d’abord unir le peuple, puis le gouverner."
 political.11.t: "Formulaire des divisions d'assaut fascistes"
 political.11.d: "Le politique et le martial ont toujours été étroitement liés dans le fascisme. Parallèlement à leur mouvement politique croissant, les partis fascistes ont commencé à former des organisations paramilitaires pour se protéger contre les menaces internes et externes, les menaces internes étant leurs opposants politiques. Même si de nombreuses personnes trouvent cette évolution inquiétante, la vague de fureur militariste a conduit un nombre croissant de volontaires à rejoindre nos forces armées.\n\nLes dirigeants politiques du mouvement ont souligné que leurs opposants avaient des raisons d'avoir peur. L’armée étant imprégnée à plusieurs niveaux d’éléments si explicitement politiques, les ennemis de [Root.GetName] et les ennemis du fascisme commencent à se ressembler beaucoup."
 political.11.a: "Seuls les traîtres à la patrie ont quelque chose à craindre."
 political.12.t: "La menace du communisme"
 political.12.d: "« [Root.GetLeader] voudrait vous faire croire que [Root.GetName] est en sécurité et uni. Il n’est pas surprenant que de tels mensonges aient empoisonné l’esprit de notre peuple, alors qu’un serpent s’enroule à côté ! Il suffit de regarder de l’autre côté de notre frontière pour voir des compatriotes se retourner les uns contre les autres au nom du communisme, déclarant la fin des nations. Combien de temps faudra-t-il avant qu’ils déclarent également notre nation morte ? Le [Root.GetRulingParty] nous protégera-t-il de cette menace ? »\n\nLa croissance du mouvement fasciste dans [Root.GetName] a été renforcée par la proximité de la révolution communiste. De nombreux modérés, qui pourraient normalement considérer le fascisme comme une autre expérience idéologique malavisée, trouvent que cela constitue également une préoccupation très réelle pour eux. S’ils avaient le choix entre le communisme de nos voisins et un régime fasciste, ils préféreraient certes ce dernier. Ils pourraient même être disposés à le soutenir activement."
 political.12.a: "Nous serons l’avant-garde contre la menace rouge !"
 political.13.t: "Vers la démocratie"
 political.13.d: "« Si nous faisons taire les voix du peuple, comment chacun d'entre nous peut-il prétendre être lui-même la voix de [Root.GetName] ? » Si nous craignons la dissidence, si nous craignons d’être publiquement dénoncés ou évincés par un vote public, ce que nous craignons réellement, c’est d’être haïs et injuriés par nos propres citoyens. Le [Root.GetRulingParty] a-t-il vraiment si peu confiance en ses principes ?\n\nUne faction prudente et peu organisée, mais passionnée, au sein du gouvernement, a commencé à faire pression en faveur de politiques moins répressives contre les ennemis de l’État. Ils veulent que le public soit impliqué dans la prise de décision par le biais de référendums et de réunions locales des partis, même si cela signifie risquer l’avenir de l’agenda actuel."
 political.13.a: "Nous pouvons en discuter en interne pour commencer."
 political.13.a.tt: "Augmente les chances d’obtenir un soutien interne pour l’organisation des élections."
 political.13.b: "Sachant que nous avons raison, nous pouvons nous permettre de permettre à nos ennemis de parler plus ouvertement."
 political.13.b.tt: "Augmente les chances que les gens expriment leur soutien à la démocratie et forment une opposition."
 political.14.t: "[Root.GetRulingParty] Débats sur la démocratie"
 political.14.d: "Étonnamment, l’appel à davantage de référendums et à des mesures moins répressives contre les opposants au régime a reçu un certain soutien dans les discussions internes au parti. Même si la direction du [Root.GetRulingParty] reste sceptique, plusieurs membres influents ont soutenu un changement.\n\nPeut-être sont-ils convaincus que peu de choses changeront dans la pratique, ou peut-être sont-ils secrètement des traîtres à la cause du parti, comme le prétendent nombre de leurs opposants. Quoi qu’il en soit, si l’appel public en faveur de tels changements devait se faire entendre, certains dirigeants de [Root.GetName] seraient prêts à faire des compromis."
 political.14.a: "Le choix n’est pas toujours entre la liberté et la mort."
 political.14.a.tt: "Le gouvernement peut organiser des élections lorsque la politique bénéficie du soutien de la majorité."
 political.15.t: "Formation de l’opposition démocratique"
 political.15.d: "L’assouplissement des restrictions sur le type de propagande anti-[Root.GetRulingParty] pouvant être diffusée publiquement a, comme on pouvait s’y attendre, conduit à une augmentation des expressions publiques de dissidence. Les manifestations organisées et les brochures se trouvent jusqu'à présent principalement dans les institutions universitaires et dans certaines des zones les plus malheureuses de [Root.GetName], mais il ne fait aucun doute que le mouvement s'étend.\n\nLes dirigeants du pays sont déchirés sur cette question. [Root.GetLeader], qui maintient une emprise de fer sur la direction du parti, n'a guère envie de diversifier le débat public. Toutefois, les premiers pas ont déjà été franchis et il n’y aura peut-être pas de retour en arrière."
 political.15.a: "Le mouvement semble se développer naturellement en l’absence de répression."
 political.16.t: "Appel public aux élections"
 political.16.d: "Les manifestations de dissidence publique, autrefois confinées à des zones limitées, sont désormais généralisées. Alors que les gens se rassemblent dans les rues, le [Root.GetRulingParty] se retrouve à la croisée des chemins. Si nous continuons à laisser cette propagande se propager, les référendums proposés tant au sein du parti lui-même que de l’opposition pourraient montrer que nous n’avons pas le soutien du public. L’unité à laquelle nous aspirons cède la place à une pluralité d’opinions, unies contre nous."
 political.16.a: "Même si des réformes sont en cours, nous devons montrer notre force en réprimant ce défi."
 political.16.b: "Que les gens soient entendus."
 political.17.t: "Élection publique dans [Root.GetName]"
 political.17.d: "À mesure que la liberté d'expression et de réunion est devenue de plus en plus acceptée au sein de [Root.GetName], la faction au sein du [Root.GetRulingParty] appelant à la tenue d'élections est passée du statut de conspirateurs secrets à celui de réformateurs soutenus publiquement. Malgré les protestations de [Root.GetLeader], le pays a progressé lentement mais sûrement vers la démocratie au cours des derniers mois et des élections semblent désormais être la prochaine étape naturelle.\n\nCependant, tous les citoyens [Root.GetAdjective] ne sont pas favorables aux réformes démocratiques. Il y a encore un débat au sein du parti sur l'opportunité d'attendre la tenue des élections jusqu'à ce que nous puissions assurer un développement stable."
 political.17.a: "Les fidèles du [Root.GetRulingParty] soutiendront la décision dès maintenant."
 political.17.b: "Les réformes nécessitent un soutien plus large avant la tenue d’élections."
 political.18.t: "Les fascistes réclament un référendum"
 political.18.d: "Le mouvement fasciste [Root.GetAdjective] en croissance rapide n’a jamais prétendu avoir besoin du soutien de la majorité avant de prendre le pouvoir, comptant sur l’unité de la nation sous sa direction une fois son pouvoir établi. Cependant, il semble que leur soutien public ait augmenté rapidement. De nombreux fascistes traitent désormais [Root.GetLeader] d’hypocrite, prétendant représenter les souhaits du peuple tout en faisant en réalité la sourde oreille aux masses.\n\nL'appel à un référendum a été rejeté jusqu'à présent comme une tentative typique de perturber le système par les membres du [Root.GetRulingParty], mais au moins c'est une mesure politique. Si nous n’agissons pas maintenant, les fascistes pourraient choisir la lutte violente comme meilleure voie vers le pouvoir."
 political.18.a: "Supprimez ce mouvement haineux !"
 political.18.b: "Ne leur prêtez aucune attention."
 political.18.c: "Si le peuple le veut, nous organiserons le référendum."
 political.19.t: "Les communistes réclament un référendum"
 political.19.d: "Les idées marxistes ont pris racine dans [Root.GetName] il y a longtemps, mais ont récemment gagné un soutien beaucoup plus large. Le mouvement s’est étendu au-delà de la théorie politique et s’est répandu dans la pratique politique, avec des travailleurs mécontents et même certaines célébrités de haut niveau exprimant leur soutien. Les communistes appellent cela la conscience de classe. Le [Root.GetRulingParty] considère cela comme une voie rapide vers les émeutes et la trahison.\n\nFaisant preuve de peu de confiance dans la volonté de [Root.GetLeader] de mettre en œuvre les réformes qu'ils exigent, les communistes les plus virulents ont appelé à un référendum immédiat pour destituer le gouvernement actuel. Même si nous parvenons peut-être à inverser la dynamique de ce mouvement de masse, notre échec entraînera sans aucun doute la méthode communiste la plus populaire pour l’éliminer : la révolution."
 political.19.a: "Les activités Un-[Root.GetAdjective] doivent être arrêtées !"
 political.19.b: "Ignorez-les, ils ne font que causer des ennuis."
 political.19.c: "Le référendum est préférable à une révolte sanglante."
 political.20.t: "Les démocrates réclament un référendum"
 political.20.d: "Il n’est pas surprenant que l’idée selon laquelle le peuple dirige la nation dans laquelle il habite puisse facilement devenir très populaire parmi la population. Le [Root.GetRulingParty], bien sûr, considère l'idée de démocratie telle que représentée par ces mouvements – liberté d'expression, élections publiques, presse libre – simplement une rhétorique populiste destinée à affaiblir le gouvernement de [Root.GetLeader].\n\nCependant, on ne peut nier que ces idées se sont implantées parmi la population [Root.GetAdjective]. De manière véritablement démocratique, ils appellent à un référendum public sur le remplacement du régime actuel. Bien qu’actuellement faciles à ignorer, ces idées ont tendance à devenir très persistantes. Que nous arrivera-t-il si nous rendons impossible une révolution pacifique ?"
 political.20.a: "Rassemblez-les."
 political.20.b: "Procédez simplement comme d'habitude."
 political.20.c: "Si nous acceptons le référendum, nous pourrons peut-être préserver notre héritage."
 political.21.t: "Marche des fascistes sur [Root.Capital.GetName]"
 political.21.d: "S'étant vu refuser leur référendum, qui était presque une tentative symbolique de prendre le pouvoir légalement, les fascistes ont utilisé leur important soutien public et leurs relations dans l'armée[Root.GetAdjective] pour tenter un coup d'État. Le gouvernement [Root.GetRulingParty] a refusé leurs conditions et prétend qu'il va se battre jusqu'au bout pour préserver [Root.GetName] tel que nous le connaissons."
 political.21.a: "Nous les arrêterons à tout prix !"
 political.21.b: "Les fascistes portent le véritable esprit de [Root.GetName] !"
 political.22.t: "Les communistes se soulèvent"
 political.22.d: "Après que leur demande de référendum ait été rejetée, les quelques réformateurs du mouvement communiste de [Root.GetName] ont rapidement perdu leur influence au profit des éléments les plus radicaux. Avec le refus du [Root.GetRulingParty] de reconnaître le soutien du public aux réformes proposées, la vision romantique de la révolution s'est progressivement répandue et les dirigeants du mouvement sont devenus ceux qui pouvaient le plus facilement déclencher une émeute. Ces émeutes se sont transformées en une guerre civile à grande échelle, mettant en jeu l’avenir de la nation."
 political.22.a: "Nous ne leur permettrons pas de ruiner notre pays !"
 political.22.b: "Le feu de la révolution doit être éteint avec le sang des oppresseurs !"
 political.23.t: "Le printemps [Root.GetAdjective]"
 political.23.d: "Après que leur tentative d'organiser un référendum public pour instaurer la démocratie ait été refusée, les personnes à l'origine de cette suggestion ont rejeté le régime [Root.GetLeader] comme étant incorrigible. Une large coalition de groupes rebelles, unis par leur objectif commun d’instaurer des systèmes politiques plus représentatifs au [Root.GetName], ont pris les armes et ont annoncé qu’ils ne se reposeraient pas tant que le [Root.GetRulingParty] ne serait pas renversé."
 political.23.a: "Épargnez-nous de cette règle de la foule !"
 political.23.b: "Enfin, [Root.GetName] est gratuit !"
 political.24.t: "Les fascistes ridiculisés"
 political.24.d: "L'engouement du peuple [Root.GetAdjective] pour la fierté nationaliste et les tentatives de raviver les gloires du passé semble être révolu. Un réveil brutal pour ses ardents partisans, dont les uniformes, les postures militaristes et les discours excessifs font désormais plus souvent l’objet de moqueries que de sympathies.\n\nAutrefois considéré comme une menace pour la base du pouvoir du [Root.GetRulingParty], le fascisme [Root.GetAdjective] est désormais de plus en plus considéré comme une position absurde et extrémiste et une attaque contre les valeurs les plus fondamentales de notre nation, la nation même qu'ils prétendent détenir. une telle estime. Le mot semble plus approprié comme insulte que comme désignation politique."
 political.24.a: "Quelle bande de clowns."
 political.25.t: "La mode communiste explose"
 political.25.d: "De nombreux communistes avaient prédit que [Root.GetName] serait la prochaine nation à tomber dans la soi-disant révolution internationale, mais après quelques mois de grèves et de drapeaux rouges dans les rues, le mouvement semble s'être éteint. La classe ouvrière, la force motrice supposée de la révolution, a des préoccupations plus urgentes que le renversement de [Root.GetLeader] et ne semble décidément pas impressionnée par la façon dont ces révolutions se sont déroulées ailleurs. Pendant ce temps, les intellectuels qui ont écrit des appels passionnés à égorger les oppresseurs se sont révélés étonnamment réticents à susciter quoi que ce soit qui pourrait réellement perturber leur style de vie confortable.\n\nLes discussions sur la révolution continueront probablement, que ce soit à propos de bières bon marché ou de vins chers, mais ce ne seront probablement que des paroles et rien de plus."
 political.25.a: "Quelle bande d'hypocrites."
 political.26.t: "Le mouvement démocratique se tait"
 political.26.d: "Après quelques mois de vive opposition contre le régime de [Root.GetLeader], appelant à des élections publiques et à des lois plus libérales sur la liberté de réunion et d'expression, le mouvement semble s'être effondré. Les gens expriment désormais davantage d'inquiétude quant à la stabilité de [Root.GetName] si de telles réformes devaient avoir lieu, ceux qui réclament la démocratie étant davantage perçus comme des fauteurs de troubles que toute autre chose.\n\nPlus mystérieusement, de nombreuses figures de proue du mouvement semblent avoir disparu ou avoir soudainement arrêté leur travail. Peut-être que certains d’entre eux ont choisi de s’exiler lorsqu’ils ont constaté l’échec de leurs efforts. Quoi qu’il en soit, le gouvernement [Root.GetRulingParty] nie toute connaissance et toute implication."
 political.26.a: "Quelle bande de lâcheurs."
 political.27.t: "[Root.GetLeader] Abandonne la politique étrangère neutre"
 political.27.d_fascism: "Après la récente arrivée au pouvoir de [Root.GetRulingParty], [Root.GetLeader] a annoncé que [Root.GetName] ne maintiendrait plus sa politique étrangère neutre.\n« Le monde est devenu enchevêtré et complexe. Nous ne sommes plus en sécurité seuls. Nous devons nous tenir aux côtés de nos partenaires fascistes contre nos ennemis. Si nous ne choisissons pas un camp, nous périrons seuls."
 political.27.d_communism: "Après la récente arrivée au pouvoir de [Root.GetRulingParty], [Root.GetLeader] a annoncé que [Root.GetName] ne maintiendrait plus sa politique étrangère neutre.\n« Le monde est devenu enchevêtré et complexe. Ce pays a toujours défendu ses principes et a été prêt à les défendre. Nous ne sommes plus en sécurité seuls. La neutralité n’est plus le refuge qu’elle était et ceux qui recherchent le pouvoir dans ce monde ne la respectent plus. Nous devons nous tenir aux côtés de nos frères communistes contre les puissances qui cherchent à nous opprimer. Contre la majorité bourgeoise qui ne veut rien d’autre que nous rabaisser. Si nous ne prenons pas position, nous périrons seuls."
 political.27.a: "Pour l'avenir de [Root.GetName]"
 political.28.t: "[Root.GetNameDef] Réunis"
 political.28.d: "La fin de la terrible guerre civile qui a dévasté notre pays touche à sa fin et nous sommes enfin parvenus à un accord politique. Nous sommes maintenant d’accord avec nos compatriotes [Root.GetAdjective], et ensemble nous reconstruirons notre grande nation. Les ennemis qui ont cherché à capitaliser sur nos luttes intestines doivent désormais faire face à un État [Root.GetAdjective] uni.\n\nLe nouveau [Root.GetRulingIdeology] [Root.GetName] ne sera plus jamais divisé !"
 political.28.a: "Enfin unis !"
 THREAT_FROM_EFFECT: "Menace d'actions"
 war_justification.1.t: "[Root.GetLeader] Speaks Against [FROM.GetName]"
 war_justification.1.d: "'Does [FROM.GetName] belong to the [FROM.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [FROM.GetAdjective] or does it belong to [Root.GetNameDef]?'\n\n[Root.GetLeader]'s speech today suggested that [Root.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [Root.GetAdjective] people are coming to accept that war is inevitable."
 war_justification.1.a: "L'avenir appartient à [Root.GetName] !"
 war_justification.2.t: "[Root.GetLeader] Denounces [FROM.GetAdjective] Ideals"
 war_justification.2.d: "'The [FROM.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [Root.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[Root.GetRulingParty] has long derided the weakness of the [FROM.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.2.a: "[Root.GetName] est uni sous [Root.GetLeader]."
 war_justification.3.t: "[Root.GetLeader] Warns Against [FROM.GetAdjective] Communism"
 war_justification.3.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[Root.GetLeader]'s hatred of communists has been well known since before [Root.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [FROM.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.3.a: "Ceux qui rejettent les nations verront les leurs périr."
 war_justification.4.t: "[Root.GetName] se prépare pour une grande lutte"
 war_justification.4.d: "'The [FROM.GetAdjective] are a people who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [FROM.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [FROM.GetName] and [Root.GetName] has given way to a campaign to take their territory by force."
 war_justification.4.a: "L'histoire s'écrira à travers notre victoire."
 war_justification.5.t: "[Root.GetLeader] Brings Revolution to [FROM.GetName]"
 war_justification.5.d: "'While we have consolidated the socialist society in [Root.GetName], many nations still suffer under the despots of old. The workers of [FROM.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [FROM.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [FROM.GetAdjective] people. With the revolution we have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [FROM.Capital.GetName] as well!'\n\n[Root.GetLeader] has abandoned all attempts at diplomatic rhetoric towards [FROM.GetRulingParty]-controlled [FROM.GetName]. The quest to eradicate all borders is now strictly focused on eradicating their borders."
 war_justification.5.a: "[FROM.GetAdjective] workers, your liberation is near!"
 war_justification.6.t: "[Root.GetLeader] Calls to Aid [FROM.GetAdjective] Workers"
 war_justification.6.d: "'Is there a greater lie than the supposed liberty of the [FROM.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [Root.GetAdjective] intervention.'\n\n[Root.GetLeader] has polemicized against the government in [FROM.GetName] for a long time in party meetings, but this rhetoric is now used more frequently in public. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.6.a: "Nous écraserons leur dictature bourgeoise !"
 war_justification.7.t: "[FROM.GetAdjective] Communism Failing"
 war_justification.7.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [FROM.GetRulingParty] of [FROM.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of the [FROM.GetAdjective] revolution, [Root.GetLeader] has expressed increased disappointment with how it has developed. The [Root.GetRulingParty] may have to intervene before it is too late."
 war_justification.7.a: "Il est encore temps de sauver leur tentative de socialisme."
 war_justification.8.t: "[Root.GetLeader] Calls for Crushing [FROM.GetAdjective] Nationalism"
 war_justification.8.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [FROM.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [FROM.GetAdjective], but the animosity has intensified lately. It now appears that conflict will arise sooner rather than later."
 war_justification.8.a: "Mort aux fascistes !"
 war_justification.9.t: "Diplomacy with [FROM.GetName] Breaks Down"
 war_justification.9.d: "'Despite our attempts to find a diplomatic solution to our conflict with [FROM.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [FROM.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [FROM.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[Root.GetAdjective] intervention in [FROM.GetName] has been a hot issue, with some politicians in the opposition claiming that [Root.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.9.a: "Parfois, il faut gravir la montagne du conflit."
 war_justification.10.t: "[Root.GetLeader] Calls for Intervention in [FROM.GetName]"
 war_justification.10.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [FROM.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [Root.GetAdjective] nor the [FROM.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [Root.GetAdjective] invasion of [FROM.GetName] in the future. History may surprise us yet."
 war_justification.10.a: "[FROM.GetName] is a dubious democracy anyway."
 war_justification.11.t: "[Root.GetLeader] parle contre la menace rouge"
 war_justification.11.d: "'Without a doubt, [FROM.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [FROM.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe threat of subversive activity undermining our democracy, fueled by [FROM.GetAdjective] ambitions, has become a hotly debated topic recently. While representatives in opposition have called this a Red Scare aimed at pursuing war with [FROM.GetName], the rhetoric of the [Root.GetRulingParty] has been highly successful so far."
 war_justification.11.a: "Ils suivent une idéologie violente, à quelle réaction peuvent-ils s’attendre sinon de la violence ?"
 war_justification.12.t: "[Root.GetLeader] Confronts [FROM.GetAdjective] Fascism"
 war_justification.12.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [FROM.GetRulingParty] now holds [FROM.GetName]. People may argue that we should not provoke conflict, that we should trust [FROM.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nPeople who have long hoped to avoid a direct confrontation with [FROM.GetName] have now been strongly opposed by [Root.GetLeader], who argues that we in Machiavellian terms are merely postponing war to the advantage of the enemy. At this rate, we may strike the first blow after all."
 war_justification.12.a: "Il ne peut y avoir de paix à notre époque tant qu’ils ne disparaissent pas."
 war_justification.13.t: "[Root.GetLeader] Calls for War Against [FROM.GetName]"
 war_justification.13.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [FROM.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\n[Root.GetLeader]'s hostile rhetoric towards [FROM.GetName] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of our leader."
 war_justification.13.a: "C’est peut-être une décision difficile, mais nous devons la soutenir."
 war_justification.14.t: "[Root.GetLeader] Challenges [FROM.GetAdjective] Pretensions"
 war_justification.14.d: "'[FROM.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [FROM.GetName] long held by the [Root.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [FROM.GetAdjective] people want to avoid war, [Root.GetLeader] claims that their elected leaders have provoked it through their arrogance."
 war_justification.14.a: "Ils ne savent pas à quel point nos difficultés nous ont rendus forts."
 war_justification.15.t: "[Root.GetLeader] Wants to Restore Order in [FROM.GetName]"
 war_justification.15.d: "'The [Root.GetAdjective] national spirit is strong, but not all nations are so fortunate. [FROM.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [Root.GetName] against this threat.'\n\nWhile the [Root.GetRulingParty] has always opposed communism, [FROM.GetName] has been a target of particular attacks in recent speeches. Whether or not the attack on the [Root.GetAdjective] nation from communists is a real threat, the preemptive attack on [FROM.GetAdjective] communism is already in the works."
 war_justification.15.a: "Ceux qui ont été assassinés pendant la révolution seront vengés !"
 war_justification.16.t: "[Root.GetLeader] Calls Out [FROM.GetAdjective] Oppressors"
 war_justification.16.d: "'My opponents would have you believe that my rule is like that of the [FROM.GetRulingParty] in [FROM.GetName]. They could not be more wrong. While [FROM.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [Root.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [Root.GetLeader] regime has adopted a hostile policy towards the [FROM.GetAdjective] nation. Whatever our leaders may be called, fascist is a word reserved for our enemies."
 war_justification.16.a: "La tradition et le pragmatisme triompheront toujours du fanatisme et de la terreur."
 war_justification.17.t: "[Root.GetLeader] Questions [FROM.GetAdjective] Sovereignty"
 war_justification.17.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [Root.GetName] ends and [FROM.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [Root.GetLeader]'s recent speeches, an invasion of [FROM.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.17.a: "Nous devons nous rallier à cette cause !"
 war_justification.18.t: "[Root.GetLeader] Questions the Motives of [FROM.GetName]"
 war_justification.18.d: "'There is no doubt that [FROM.GetName] is preparing for war. The changes in economic policy make it plain to see that the [FROM.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [Root.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [Root.GetRulingParty] have turned their eyes towards [FROM.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [Root.GetName] is preparing for war."
 war_justification.18.a: "Au moins par la guerre, ce conflit mettra fin à ce conflit."
 war_justification.19.t: "[Root.GetLeader] Angered by [FROM.GetAdjective] Posturing"
 war_justification.19.d: "'Those naïve citizens of [Root.GetName] who imagine the [FROM.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [FROM.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nThe [FROM.GetAdjective] military presence close to our territory has sparked increased concern as this nation appears more and more to be the enemy of the [Root.GetRulingParty]. Whether it is the cause or the effect of their polemic is a matter of contention."
 war_justification.19.a: "Quoi qu’il en soit, nous devons préparer le peuple à la guerre."
 war_justification.20.t: "[Root.GetLeader] Advocates Invasion of [FROM.GetName]"
 war_justification.20.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [FROM.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [Root.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [Root.GetRulingParty] leaders, most prominently [Root.GetLeader], has been calling the public to support an invasion of [FROM.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.20.a: "La nation soutient cette décision importante."
 war_justification.201.t: "[FROM.GetLeader] Speaks Against [Root.GetName]"
 war_justification.201.d: "'Does [Root.GetName] belong to the [Root.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [Root.GetAdjective] or does it belong to [FROM.GetName]?'\n\n[FROM.GetLeader]'s speech today, suggested that [FROM.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [FROM.GetAdjective] people have accepted that war is inevitable. [Root.GetName] must also prepare."
 war_justification.201.a: "Pourquoi ne pouvons-nous pas vivre en paix ?"
 war_justification.202.t: "[FROM.GetLeader] Denounces [Root.GetAdjective] Ideals"
 war_justification.202.d: "'The [Root.GetAdjective] claim to have liberty and democracy, claim to want peace, but all of these things they pride themselves on are hollow. Their democracy divides the people where it should stand united and their liberty only betrays a lack of discipline. We [FROM.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[FROM.GetRulingParty] has long derided the weakness of the [Root.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.202.a: "As expected from fascist scum like [FROM.GetLeader]."
 war_justification.203.t: "[FROM.GetLeader] Warns Against [Root.GetAdjective] Communism"
 war_justification.203.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish people and their history. We will take [FROM.GetName] and abolish the communist plague.'\n\n[FROM.GetLeader]'s hatred of communists has been well known since before [FROM.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [Root.GetAdjective] government. Our quest to purge Marxism off the face of the Earth may start there."
 war_justification.203.a: "S’ils craignent notre cause, ils craignent leur propre peuple."
 war_justification.204.t: "[FROM.GetName] Prepares for Great Struggle"
 war_justification.204.d: "'The [Root.GetAdjective] are a people, who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [Root.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [Root.GetName] and [FROM.GetName] has given way to a campaign to take their territory by force."
 war_justification.204.a: "Laissez-les venir!"
 war_justification.205.t: "[FROM.GetLeader] Bring Revolution to [Root.GetName]"
 war_justification.205.d: "'While we have consolidated the socialist society in [FROM.GetName], many nations still suffer under the despots of old. The workers of [Root.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [Root.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [Root.GetAdjective] people. We have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [Root.Capital.GetName] as well!'\n\n[FROM.GetLeader] has abandoned all attempts at diplomacy with our government. The communist task of eradicating all borders is now strictly focused on eradicating our borders."
 war_justification.205.a: "[Root.GetLeader] est un meilleur dirigeant que n’importe quel opportuniste révolutionnaire !"
 war_justification.206.t: "[FROM.GetLeader] Calls to Aid [Root.GetAdjective] Workers"
 war_justification.206.d: "'Is there a greater lie than the supposed liberty of the [Root.GetAdjective] people? Where they once slaved under the princes and dukes who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [FROM.GetAdjective] intervention.'\n\nUnwilling to accept that our people may be satisfied without their social experiments, the communist regime in [FROM.GetName] has openly threatened to attack our nation. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.206.a: "Quel mérite leurs convictions peuvent-elles avoir s’ils doivent nous les imposer ?"
 war_justification.207.t: "[Root.GetAdjective] L'échec du communisme"
 war_justification.207.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [Root.GetRulingParty] of [Root.GetName], who have cast aside every hint of Marxist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of [Root.GetRulingParty]'s victory in [Root.Capital.GetName], [FROM.GetLeader] has drifted away from [Root.GetLeader]'s philosophy. The conflict has escalated to the point where they are preparing to invade to enforce their brand of socialism on us."
 war_justification.207.a: "Ils ne comprennent pas ce que la révolution signifie pour le peuple [Root.GetAdjective]."
 war_justification.208.t: "[FROM.GetLeader] Calls for Crushing [Root.GetAdjective] Nationalism"
 war_justification.208.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the fascist regime of [Root.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [Root.GetAdjective], but the animosity has intensified lately. Hearing [FROM.GetLeader] speak, it appears that conflict will arise sooner rather than later."
 war_justification.208.a: "Mort aux communistes !"
 war_justification.209.t: "La diplomatie avec [Root.GetName] s'effondre"
 war_justification.209.d: "'Despite our attempts to find a diplomatic solution to our conflict with [Root.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [Root.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who are not accountable to their people. Barring a complete turnaround in the policies of [Root.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[FROM.GetAdjective] intervention in our domestic affairs has been a hot issue, with some politicians in their opposition claiming that [FROM.GetRulingParty] has pursued a hawkish policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.209.a: "Leur rhétorique condescendante ne nous intimidera pas."
 war_justification.210.t: "[FROM.GetLeader] Calls for Intervention in [Root.GetName]"
 war_justification.210.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [Root.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [FROM.GetAdjective] nor the [Root.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that democracies do not go to war against other democracies, recent developments have pointed to a [FROM.GetAdjective] invasion of [Root.GetName] in the future. History may surprise us yet."
 war_justification.210.a: "[FROM.GetName] is a dubious democracy anyway, pursuing such aggressive action."
 war_justification.211.t: "[FROM.GetLeader] Speaks Against Red Menace"
 war_justification.211.d: "'Without a doubt, [Root.GetName] communism is one of the greatest threats to liberty and order in this era. Relentless and ruthless, it threatens to devour not only the [Root.GetAdjective] people's hope of a prosperous, democratic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe nascent worker's movement has intimidated [FROM.GetAdjective] leaders. While representatives in their opposition have called this a Red Scare aimed at pursuing war with us, the rhetoric of the [FROM.GetRulingParty] has been highly successful so far."
 war_justification.211.a: "Tant qu’il y aura des profits à réaliser, les capitalistes fabriqueront une guerre."
 war_justification.212.t: "[FROM.GetLeader] Confronts [Root.GetAdjective] Fascism"
 war_justification.212.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [Root.GetRulingParty] now holds [Root.GetName]. People may argue that we should not provoke conflict, that we should trust [Root.GetLeader] to honor treaties and promises in the future, but these people fail to see that treaties made under the reign of fascism are useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nJealous of the glorious society we are building and the legacy it is founded upon, the [FROM.GetAdjective] seem prepared to start a war to destroy it. So much for their pretensions of peace."
 war_justification.212.a: "Inévitable. Mieux vaut en finir avec ça."
 war_justification.213.t: "[FROM.GetLeader] Calls for War Against [Root.GetName]"
 war_justification.213.d: "'Although we may be a peaceful people, our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [Root.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\nIn a recent speech to the [FROM.GetAdjective] people the hostile rhetoric towards [Root.GetName] has intensified and [FROM.GetLeader] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of their leader."
 war_justification.213.a: "Ils regretteront d'avoir fait de nous leur ennemi."
 war_justification.214.t: "[FROM.GetLeader] Challenges [Root.GetAdjective] Pretensions"
 war_justification.214.d: "'[Root.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [Root.GetName] long held by the [FROM.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [Root.GetAdjective] people want to avoid war, [FROM.GetLeader] claims that our elected leaders have provoked it through their arrogance."
 war_justification.214.a: "The voices for peace among the [FROM.GetAdjective] people are, of course, silenced."
 war_justification.215.t: "[FROM.GetLeader] Wants to Restore Order in [Root.GetName]"
 war_justification.215.d: "'The [FROM.GetAdjective] national spirit is strong, but not all nations are so fortunate. [Root.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marxist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [FROM.GetName] against this threat.'\n\nWhile the [FROM.GetRulingParty] has always opposed communism, [Root.GetName] has been a target of particular attacks in recent speeches. Fearing their nation's inevitable progress to the next stage of history, a preemptive attack on [Root.GetAdjective] communism is already in the works."
 war_justification.215.a: "Il est trop tard pour inverser les progrès que nous avons réalisés."
 war_justification.216.t: "[FROM.GetLeader] Calls Out [Root.GetAdjective] Oppressors"
 war_justification.216.d: "'My opponents would have you believe that my rule is like that of the [Root.GetRulingParty] in [Root.GetName]. They could not be more wrong. While [Root.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [FROM.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [FROM.GetLeader] regime has adopted a hostile policy towards the [Root.GetAdjective] nation. Our visionary plans for future greatness have put their nation to shame, and unsurprisingly, they feel threatened."
 war_justification.216.a: "S’ils veulent tester notre puissance, ils le regretteront."
 war_justification.217.t: "[FROM.GetLeader] Questions [Root.GetAdjective] Sovereignty"
 war_justification.217.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [FROM.GetName] ends and [Root.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [FROM.GetLeader]'s recent speeches, an invasion of [Root.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.217.a: "Le monde n’a-t-il rien appris de la Grande Guerre ?"
 war_justification.218.t: "[FROM.GetLeader] Questions the Motives of [Root.GetName]"
 war_justification.218.d: "'There is no doubt that [Root.GetName] is preparing for war. The changes in economic policy make it plain to see that the [Root.GetAdjective] are not a people of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [FROM.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe hawks in the [FROM.GetRulingParty] have turned their eyes towards [Root.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [FROM.GetName] is preparing for war."
 war_justification.218.a: "C’est exactement pourquoi nous devons être prêts."
 war_justification.219.t: "[FROM.GetLeader] Angered by [Root.GetAdjective] Posturing"
 war_justification.219.d: "'Those naïve citizens of [FROM.GetName] who imagine the [Root.GetAdjective] as a people of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [Root.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nOur military presence close to [FROM.GetAdjective] territory has sparked increased concern, since they interpret our troop movements as proof hostile intent. They hardly seem to have considered that their aggressive rhetoric is the reason for our defensive measures."
 war_justification.219.a: "On peut difficilement désarmer après ces menaces."
 war_justification.220.t: "[FROM.GetLeader] Advocates Invasion of [Root.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [Root.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [FROM.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [FROM.GetRulingParty] leaders, most prominently [FROM.GetLeader], has been calling the public to support an invasion of [Root.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "Nous ferions mieux de nous préparer. La guerre viendra."
 war_justification.301.t: "[Root.GetLeader] Critiqué pour sa politique étrangère faible"
 war_justification.301.d: "« Nous avons eu l'occasion de frapper nos ennemis, mais le [Root.GetRulingParty] l'a laissée passer. Non seulement il s'agit d'un autre cas accablant dans une série d'occasions manquées de renforcer la position de [Root.GetName] à l'échelle internationale, mais c'est un signe que leur prétention d'agir dans l'intérêt du peuple de [Root.GetAdjective] est pour l'essentiel vide de sens. rhétorique. Il est temps de changer de politique.\n\nNotre échec à poursuivre la guerre que beaucoup attendaient a été la cible de critiques cinglantes de la part de nos opposants politiques. Si nous ne mettons pas à exécution nos plans militaires, il nous sera plus difficile de convaincre les gens dans quelle direction nous prenons [Root.GetName]."
 war_justification.301.a: "Ne veulent-ils pas éviter la guerre ?"
 war_justification.301.b: "Il n’y a pas de place pour un désaccord public en dehors des réunions du parti."
 war_justification.301.c: "Nous ne pouvons pas permettre aux gens d’accuser [Root.GetLeader] de lâcheté !"
 nuke_dropped.1.t: "Atomic Bombing of [FROM.FROM.GetName]"
 nuke_dropped.1.d: "For the first and hopefully last time in history, a nuclear bomb has been detonated in [FROM.FROM.GetName] as part of international warfare. The unprecedented destruction stands as a testament to the devastating power of this new weapon, which is feared not only for what it can do to its targets, but what implications it has for the one who deploys it and for humanity itself.\n\nThe world holds its breath waiting for what will come next. Will this force [FROM.FROM.Owner.GetName] to surrender to avoid further terror, or will it only strengthen their resolve to strike back against those who would resort to such measures?"
 nuke_dropped.1.a: "L’ère atomique a véritablement commencé."
 nuke_dropped.1.b: "Nous ferons tout ce qui est nécessaire pour protéger le peuple [Root.GetAdjective]."
 nuke_dropped.2.t: "Bombardement atomique d'Hiroshima"
 nuke_dropped.2.d: "\"Les rues étaient comme une scène d'enfer.\"\n -Kuniyoshi Aikawa\n\nAujourd'hui, une bombe nucléaire a explosé au-dessus de la ville d'Hiroshima à 580 mètres d'altitude. Plus des deux tiers de la ville furent instantanément détruits. Bien que la ville ait été construite pour résister aux tremblements de terre, seules quelques structures robustes ont survécu à l'explosion.\n\nAlors que la puissance de la bombe atomique a été mise en avant dans l’esprit du public, le coût humain de cette arme a été minimisé. Aucune des deux parties ne veut contempler l’horreur de l’événement, mais son héritage sera celui de vies perdues en un clin d’œil et de retombées durables."
 nuke_dropped.2.a: "Combien d’autres tomberont avant la fin de cette guerre ?"
 nuke_dropped.2.b: "Nous devons agir rapidement pour venir en aide aux victimes."
 nuke_dropped.3.t: "Bombardement atomique de Nagasaki"
 nuke_dropped.3.d: "Une bombe nucléaire, initialement destinée à Kokura, a explosé aujourd'hui au-dessus de Nagasaki. Les conditions météorologiques ont contraint les avions à dérouter leur mission, une combinaison de fumée, de nuages ​​et de difficultés techniques étant des facteurs décisifs dans un événement qui pourrait bien changer l'histoire.\n\nLes effets de la bombe ont été quelque peu limités par la situation de la ville dans une vallée, mais les dégâts restent importants. Certaines installations militaires ont été touchées, mais les pertes civiles catastrophiques les éclipsent de loin. Il faudra peut-être des décennies avant que nous connaissions avec certitude les effets à long terme de cette arme."
 nuke_dropped.3.a: "Will this lead to [FROM.Owner.GetAdjective] surrender?"
 nuke_dropped.3.b: "Nous avions espéré que Nagasaki serait épargnée."
 nuke_dropped.4.t: "Bombardement atomique de Berlin"
 nuke_dropped.4.d: "Today, at [GetDateText], the German capital of Berlin was struck by a nuclear explosion. The city has suffered several attacks, in this war and the last, but all else pale in comparison to this. Not since the Thirty Years' War has Berlin seen comparable devastation - considering its growth, this was seen as an impossibility.\n\nThe Führerbunker appears to have survived the blast at least partially due to the bomb detonating away from its planned epicenter, and [FROM.Owner.GetLeader] is rumored to still be alive, if outraged. How [FROM.Owner.GetAdjective] leaders should be evacuated and if they can be protected from the fallout is another matter, however."
 nuke_dropped.4.a: "Aujourd’hui, je suis soulagé de ne pas être Berlinois."
 nuke_dropped.4.b: "Nos ennemis ont frappé au cœur de la nation !"
 nuke_dropped.5.t: "Bombardement atomique de Londres"
 nuke_dropped.5.d: "A nuclear explosion has devastated the city of London today. Despite the city's anti-air defenses, [FROM.Owner.GetName] was not prepared for this attack. At [GetDateText], Big Ben chimed for the last time, having been melted by the blast. Early reports suggest Buckingham Palace has been completely leveled and the whereabouts of the royal family are currently unknown.\n\n[FROM.Owner.GetLeader] has nevertheless been confirmed to have survived and is preparing a rousing speech for the radio later today. With morale at an all-time low, the British people is in dire need of this - or a very eloquent surrender."
 nuke_dropped.5.a: "Il est difficile de garder la lèvre supérieure raide face à une onde de souffle nucléaire."
 nuke_dropped.5.b: "Que Dieu Sauve le Roi !"
 nuke_dropped.6.t: "Bombardement atomique de Kyoto"
 nuke_dropped.6.d: "The city of Kyoto, a prominent [FROM.Owner.GetAdjective] industrial center, was struck today by a nuclear bomb. It is speculated that the city was chosen as a target because it has been regarded as an intellectual center.\n\nThe beauty and historical significance of the Kyoto led many to assume it would be spared from the bomb, but it appears the terror of raining destruction on such a place has rather been seen as a benefit, increasing the psychological impact of the attack. The city's location in the valley somewhat limited the blast, but the old Imperial Palace and many industrial buildings have been completely destroyed."
 nuke_dropped.6.a: "L’héritage et la beauté ne signifient rien dans une guerre comme celle-ci."
 nuke_dropped.6.b: "S’ils détruisent l’ancien, nous construirons du nouveau."
 nuke_dropped.7.t: "Bombardement atomique de Tokyo"
 nuke_dropped.7.d: "Today, a nuclear strike was directed at the heart of the Japanese Empire. The capital of Tokyo, although expected to be the target of firebombing, was never assumed to be a prioritized target of this new weapon. Yet ultimately, perhaps due to the significance of the new capital and Imperial Palace which has now been destroyed, an even more all-consuming fire has fallen on the city.\n\nAlthough [FROM.Owner.GetLeader] is reported to have survived, the event has raised questions about how far Japan's enemies are willing to go. If the war does not end with this, what targets remain? What is left to threaten with?"
 nuke_dropped.7.a: "Cela signifie-t-il la fin de l’empire japonais ?"
 nuke_dropped.7.b: "As long as [FROM.Owner.GetLeader] lives, so does the Empire."
 nuke_dropped.8.t: "Bombardement atomique de Washington D.C."
 nuke_dropped.8.d: "A nuclear bomb was detonated today over the capital of the United States. In an attack clearly directed at the political center and historical legacy of the US, the White House, the Capitol and a number of monuments and memorials were wiped off the face of the Earth. Even the Burning of Washington over a century ago pales in comparison to the destruction visited upon the city by this devastating weapon.\n\nAlthough President [FROM.Owner.GetLeader] has been brought to safety, the nation has been shaken to its core. No doubt, the US hoped to be the first and only country to wield such a weapon. Those hopes have now been shattered in the worst possible way."
 nuke_dropped.8.a: "Une nation indivisible contre un atome divisible."
 nuke_dropped.8.b: "L'aigle renaîtra de ses cendres comme un phénix."
 nuke_dropped.9.t: "Bombardement atomique de Rome"
 nuke_dropped.9.d: "Une explosion nucléaire a frappé la ville de Rome aujourd'hui, choquant les gens du monde entier. En raison de ses trésors historiques et artistiques, beaucoup n’auraient jamais pensé que la ville antique serait la cible d’une destruction aussi aveugle. Alors que la Cité du Vatican est également partiellement détruite et que l’on ignore où se trouve le pape, l’événement a horrifié non seulement les Italiens, mais aussi les catholiques du monde entier.\n\nLa croissance rapide de Rome au cours de la dernière décennie a été presque complètement anéantie par l’attaque. Pendant un certain temps, il a semblé que la ville pourrait contribuer au redressement du pays une fois la guerre terminée. Ces espoirs sont désormais réduits en poussière, tout comme celui de nombreuses personnes."
 nuke_dropped.9.a: "Bomba Iacta Est!"
 nuke_dropped.9.b: "Rome ne sera pas reconstruite en un jour…"
 nuke_dropped.10.t: "Bombardement atomique de Paris"
 nuke_dropped.10.d: "Aujourd'hui, un engin nucléaire a explosé au-dessus de la ville de Paris, provoquant des destructions considérables et d'innombrables victimes. La France était sous le choc lorsque sa capitale a subi ce qui pourrait être l'attaque la plus dévastatrice qu'elle ait jamais connue, malgré des siècles de guerres et de révolutions. Les Parisiens s'attendaient peut-être à une conquête, mais pas à une désolation totale et brutale.\n\nDans l'état actuel de la ville, tout défilé de victoire sur les Champs-Élysées devant les vestiges de l'Arc de Triomphe semble peu probable. Peut-être que les décennies à venir verront naître un nouveau Paris, mais dans l’esprit du public, Paris, la ville construite à la Belle Époque, a disparu à jamais."
 nuke_dropped.10.a: "La ville lumière a brûlé."
 nuke_dropped.10.b: "Hier encore, il semblait que nous aurions toujours Paris."
 nuke_dropped.11.t: "Bombardement atomique de Moscou"
 nuke_dropped.11.d: "A city many have tried and failed to conquer, Moscow was the target of a nuclear attack today. The explosion was directed at the heart of [FROM.Owner.GetAdjective] leadership, the Kremlin having been nearly completely destroyed by the blast.\n\n[FROM.Owner.GetLeader], having grown more aware and fearful of all possible and impossible threats recently, evacuated in time and survived. However, even the vastness of [FROM.Owner.GetName] may not be enough to escape such a ruthless enemy. Indeed, if this continues, the nation will soon consist only of two kinds of wastelands: Those which were there in the first place, and those created by its enemies."
 nuke_dropped.11.a: "Un hiver nucléaire ne fera-t-il pas de Moscou une cible plus difficile ?"
 nuke_dropped.11.b: "Ils peuvent brûler toutes nos villes, mais ils ne les prendront jamais."
 nuke_dropped.12.t: "Bombardement atomique de Copenhague"
 nuke_dropped.12.d: "Aujourd'hui, la ville de Copenhague a été frappée par une explosion nucléaire. Ayant grandi après avoir échappé aux destructions de la Grande Guerre grâce à la neutralité du Danemark, la capitale n'a jamais connu une attaque aussi dévastatrice depuis les guerres napoléoniennes. La région environnante de l'Öresund a également connu d'importantes retombées et les survivants ont commencé à fuir vers la Fyn et le continent par crainte de nouvelles attaques.\n\nOn ignore actuellement où se trouve le roi Christian X et le moral de la nation a été gravement endommagé par l'attaque. Reste à savoir si c'est le début de la fin pour l'une des nations les plus anciennes d'Europe."
 nuke_dropped.12.a: "Quelque chose est irradié au Danemark."
 nuke_dropped.12.b: "La ville a déjà brûlé, mais elle n’a pas péri."
 nuke_dropped.12.c: "Avec le plutonium, nous mettons les Danois à genoux !"
 nuke_dropped.13.t: "Bombardement atomique de Stockholm"
 nuke_dropped.13.d: "La belle ville de Stockholm, fière Venise du Nord, a été frappée aujourd'hui par une bombe nucléaire. Malgré tous leurs efforts pour rester neutres dans le passé, les Suédois ont désormais payé le prix ultime du conflit international. L'épicentre de l'explosion se trouvait au centre-sud de Stockholm, une zone destinée à de futurs projets de développement et de grande construction, aujourd'hui irréversiblement détruite.\n\nUne grande partie de la ville est méconnaissable, mais les anciennes structures de Slussen semblent avoir mieux résisté à l'explosion que prévu. Il a été décidé qu'il resterait intact pour toujours en tant que monument de la résilience de la ville."
 nuke_dropped.13.a: "With this, Swedish neutrality will be but a memory."
 nuke_dropped.13.b: "Le tigre suédois ne perdra pas ses rayures !"
 country_capitulated.0.t: "[Root.GetName] a capitulé"
 country_capitulated.0.d_positive_both_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war continues elsewhere, this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for [FROM.FROM.GetName]."
 country_capitulated.0.d_positive_prev_faction: "\n[FROM.FROM.GetLeader] has announced that the cowardly [Root.GetAdjective] nation could no longer withstand the pressure from the overwhelming presence of [FROM.FROM.GetAdjective] forces throughout the country. The [Root.GetAdjective] government chose to flee the country and has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against what remains of the [Root.GetFactionName] continues elsewhere this is a great victory for all of the [FROM.FROM.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nDespite this devastating loss the war against [FROM.FROM.GetName] is far from over."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] has announced that the [Root.GetAdjective] nation can no longer withstand the pressure from the occupying [FROM.FROM.GetAdjective] forces, committing travesties throughout the country. The [Root.GetAdjective] government has gone into exile. Their main forces have capitulated, and [FROM.FROM.GetName] is now in control of their home area.\nThough the war against [FROM.FROM.GetName] and the rest of the [FROM.FROM.GetFactionName] continues, this is an unfortunate setback for all of the [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nAlthough the struggles between [FROM.FROM.GetName] and [Root.GetName] are over, [FROM.FROM.GetName] is still at all-out war, and the fighting continues elsewhere."
 country_capitulated.0.d_neutral_prev_no_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles in [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.d_neutral_prev_faction: "\nThe [Root.GetAdjective] government has gone into exile and their main forces have capitulated to [FROM.FROM.GetName], who is now in control of their home area.\n\nThe struggles between [FROM.FROM.GetName] and [Root.GetName] was only a small part of the conflict. The war between [FROM.FROM.GetFactionName] and what remains of [Root.GetFactionName] continues elsewhere."
 country_capitulated.0.a: "Excellentes nouvelles"
 country_capitulated.0.b: "Ce sont des temps sombres..."
 country_capitulated.0.c: "Des temps incertains"
 GAME_OVER_TT: "§RThe game will end for you.§!"
 CAN_ANGERED_WORKERS: "Cela va bouleverser la population"
 excellent: "Excellent."
 unfortunate: "C'est malheureux"
 news.1.t: "L'accord de libre-échange [fta_inviter.GetNameDef]-[fta_applicant.GetName]"
 news.1.d: "Aujourd'hui, [fta_inviter.GetNameDef] et [fta_applicant.GetNameDef] ont signé un traité de libre-échange et d'investissement pour renforcer la coopération économique entre les deux pays."
 news.1.a: "D'accord"
 news.2.t: "Le Traité de coopération militaire [mct_inviter.GetNameDef]-[mct_applicant.GetName]"
 news.2.d: "Aujourd'hui, [mct_inviter.GetNameDef] et [mct_applicant.GetNameDef] ont signé un traité de coopération militaire, renforçant leurs liens militaires."
 news.2.a: "D'accord"
 news.3.t: "Attentat contre l'USS Cole"
 news.3.d: "Le commandement naval des États-Unis a indiqué que le destroyer USS Cole avait été attaqué par le réseau Al-Qaïda, tuant 17 militaires américains. Les rapports des services de renseignement américains désignent le gouvernement du Soudan comme un soutien possible des deux attaquants."
 news.3.a: "Ils le regretteront."
 news.3.b: "Envoyez nos condoléances aux américains."
 news.3.c: "Des Américains morts ? Bien."
 news.3.e: "Ils nous blâment ?!"
 news.4.t: "[FROM.GetName] leaves the European Union"
 news.4.d: "Today the [FROM.GetAdjective] delegation to the European Parliament left the buildings in Brussels for what might be the last time. Article 50 has been fulfilled and pulled through, the treaties with the EU partners reset to ones of usual international partnership. [FROM.GetName] has left the European Union."
 news.4.a: "D'accord"
 news.5.t: "Préparer l'Union"
 news.5.d: "[FROM.GetName] has begun the process of preparing legislation to unite the European Union under [FROM.GetAdjective] leadership. The European Parliament has much to discuss in the coming days."
 news.5.a: "Une entreprise intéressante."
 news.82.t: "Retraites au Japon"
 news.82.desc: "Après que le Japon ait tenté d'unifier la péninsule coréenne sous la Corée du Sud, en envahissant la Corée du Nord, le gouvernement chinois intervient auprès de la mission japonaise. Le Japon, après avoir reçu ces nouvelles, se retire et laisse derrière lui la mission d’unification."
 news.82.a: "Nous aurions perdu de toute façon !"
 news.82.b: "La Chine est vraiment si puissante !"
 influence.1.t: "Offer Economic Aid to [FROM.GetName]?"
 influence.1.d: "Nous avons décidé de commencer à élaborer un plan d'aide économique. Nous pouvons décider d'allouer 5 %, 10 % ou 15 % du PIB de notre pays sous forme d'aide. Cette générosité améliorera nos relations et nous donnera de l'influence au sein de [FROM.GetName], même si rien ne garantit qu'ils utiliseront cette aide économique à des fins lucratives. Plus nous donnerons, plus nous gagnerons en influence.\n\n"
 influence.1.a: "Envoyer 5% du PIB comme aide Économique."
 influence.1.b: "Envoyer 10% du PIB comme aide Économique."
 News_influence.0.t: "Economic aid given by [FROM.GetName]!"
 News_influence.0.d: "We have been given $$[?gift_sum] billion in immediate economic aid by [FROM.GetName]. This has strengthened [Root.GetAdjective]-[FROM.GetAdjective] Relations, and while the gift officially came without preconditions, it is understood to have strengthened their influence in our country."
 News_influence.0.a: "Merveilleux !"
 News_influence.0.b: "Rejeter l'aide"
 influence.3.t: "Cibler un autre influenceur dans [FROM.GetName] ?"
 influence.3.d: "Lequel des influenceurs [FROM.GetNameWithFlag] devrions-nous cibler ou devrions-nous cibler leur indépendance nationale ?\n"
 influence.3.a: "Ciblez l'indépendance nationale de [FROM.GetNameWithFlag]."
 influence.3.b: "Cible [?var:FROM.influence_array^0.GetNameWithFlag]."
 influence.3.c: "Cible [?var:FROM.influence_array^1.GetNameWithFlag]."
 influence.3.e: "Cible [?var:FROM.influence_array^2.GetNameWithFlag]."
 influence.3.f: "Reculer."
 News_influence.1.t: "[FROM.GetNameWithFlag] attacks our influence in [FROM.FROM.GetNameWithFlag]!"
 News_influence.1.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our ambitions in [FROM.FROM.GetName]. Singleing us out, their attack on our business and governmental interests have lowered our influence in [FROM.FROM.GetNameWithFlag]."
 News_influence.1.a: "Damn you, [FROM.GetLeader]!"
 News_influence.2.t: "[FROM.GetNameWithFlag] attacks our independence from foreign influence!"
 News_influence.2.d: "Sadly, [FROM.GetLeader]'s [FROM.GetName] delivered a swift blow to our aspirations to keep foreign meddling out, and weakened our sovereignty. Our independence from foreign influence has been reduced."
 News_influence.2.a: "Not cool, [FROM.GetLeader]!"
 influence.5.t: "Launch Coup in [FROM.GetNameWithFlag]?"
 influence.5.d: "Dear [Root.GetLeader], we in the [Root.GetAdjective] Intelligence Services cannot confirm or deny whether [FROM.GetName] is conducive to a coup.\n\nHowever, we have, to the best of our ability, drawn up probabilities of outcomes. These are based on:\n - How big our influence is\n - How popular our outlook is\n - The popularity and stability of the government\n - Which other influential countries are likely to back us\n - Which influential countries are likely to back their current government.\n\nIf we proceed with the plans we will try to use mostly local sources and contacts, to try to maintain plausible deniability."
 influence.5.a: "Lancez Coup d’État pour mettre au pouvoir le plus grand parti de nos perspectives."
 influence_coup_largest_success_TT: "§HCoup d'État réussi§!"
 influence_coup_largest_discovered_TT: "§RCoup d’État raté§!"
 influence.5.b: "Lancez un coup d’État pour mettre au pouvoir le même parti au pouvoir que le nôtre."
 influence.5.c: "Abandonnez ces projets - pour l'instant."
 News_influence.3.t: "Changement de régime !"
 News_influence.3.d: "Forces with [FROM.GetAdjective] backing have deposited the previous government."
 News_influence.3.a: "Ouah..."
 News_influence.4.t: "Dramatic scenes as regime change sweeps [FROM.FROM.GetNameWithFlag]"
 News_influence.4.d: "After a period with uptick in foreign intelligence activity, especially from [FROM.GetNameWithFlag], the previous government of [FROM.FROM.GetName] have been toppled with many top officials of the former regime detained. [FROM.FROM.GetLeader] of the [FROM.FROM.GetRulingParty] has emerged as the new leader amid the turmoil. Early indications are that the new regime of [FROM.FROM.GetName] will identify with the [FROM.FROM.GetRulingIdeology], uprooting the balance of power."
 News_influence.4.a: "Intéressant"
 News_influence.5.t: "[FROM.GetNameWithFlag] under pressure as [FROM.FROM.GetNameWithFlag] defeat coup"
 News_influence.5.d: "[FROM.FROM.GetAdjective] leader [FROM.FROM.GetLeader] was gesturing vividly from the stage as 'hostile evil forces spearheaded by [FROM.GetName]' were being blamed for today's latest escalations that saw [FROM.FROM.GetLeader] defeating a dramatic coup attempt. Though [FROM.GetAdjective] leader [FROM.GetLeader] strongly denied the accusations, it is widely known that the two leaders don't see eye to eye. With [FROM.GetAdjective]-[FROM.FROM.GetAdjective] ties at all time low, [FROM.FROM.GetName] vowed to the public to \"irradicate [FROM.GetAdjective] influence from [FROM.FROM.GetName]\", and otherwise double down on the [FROM.FROM.GetRulingIdeology] direction that the ruling [FROM.FROM.GetRulingParty] have been steering [FROM.FROM.GetNameWithFlag] towards."
 News_influence.5.a: "Intéressant"
 News_influence.6.t: "Drama as [FROM.FROM.GetNameWithFlag] collapse into Civil War!"
 News_influence.6.d: "Traumatic scenes from [FROM.FROM.GetNameWithFlag] could be seen today, as the last few days of protests, uncertainty and strange military movements gave way to gunfire, suffering and fleeing civilians. While details are scarce, it seems several whole units of the [FROM.FROM.GetAdjective] Army have declared for the armed opposition against [FROM.FROM.GetLeader] and the [FROM.FROM.GetRulingParty] ([FROM.FROM.GetRulingIdeology]). A opposition leader, speaking to WNN under conditions of anonymity, said that they \"expect significant help from [FROM.GetNameWithFlag] in their quest to overthrow the illegitimate [FROM.FROM.GetAdjective] tyrant [FROM.FROM.GetLeader]\".\n\nAlthough [FROM.GetAdjective] leadership have expressed their \"surprise about these dramatic developments\", this is given little credibility by close watchers of [FROM.GetAdjective]-[FROM.FROM.GetAdjective] relations. One analyst described the situation like this; \"It's clear that this in reality was a [FROM.GetAdjective]-backed coup attempt that failed to secure their objectives fast enough, resulting in a tense standoff that degraded into what now looks like a full civil war\". Several world leaders, especially those with a [FROM.FROM.GetRulingIdeology] have had less than diplomatic words for the as of yet unconfirmed [FROM.GetAdjective] involvement.\n\nWith the two different sides in the conflict represent not only stark differences in domestic, but also international direction, it will be interesting to follow if other countries also get involved in the conflict."
 News_influence.6.a: "Qui gouvernera les cendres ?"
 influence.51.t: "Aide militaire à [FROM.GetName]"
 influence.51.d: "Our fellow nation [FROM.GetName] is currently in an armed conflict and is looking for suppliers to fuel their war effort. They have shown an interest in our small arms, infantry vehicles, and other military surplus. We should decide if it is worthwhile to send them the military equipment lest they use it against us in future conflicts..."
 influence.51.a: "Ouais, faisons-le !"
 influence.51.a_tt: "Vous décidez quel équipement vous envoyez !"
 influence.51.b: "À la réflexion.."
 influence.51.b_tt: "À la réflexion. J'ai besoin de ces armes !"
 influence.52.t: "La question de quoi"
 influence.52.d: "We can send [FROM.FROM.GetName] one of three categories of military aid. After picking the category, we will choose a §Hpackage size§! that determines the quantity, political cost, and threat generated.\n\n§HInfantry§!: small arms, light anti-tank, anti-aircraft.\n§HVehicles & Armor§!: main battle tanks, amphibious tanks, utility vehicles.\n§HModern Equipment§!: heavy anti-tank missiles, surface-to-air missiles, drones."
 influence.52.a: "§HInfantry Equipment§! Package"
 influence.52.b: "§HVehicles & Armor§! Package"
 influence.52.c: "En fait, j'en ai besoin.."
 influence.53.t: "Aide militaire de [FROM.GetName]"
 influence.53.d: "[FROM.GetName] has offered us a package of military equipment. Should we accept or return it?"
 influence.53.a: "Accept the Package"
 influence.53.c: "Return the Equipment"
 influence.54.t: "Rapport mensuel sur les auto-influenceurs"
 influence.54.d: "[?nations_influenced|0] ont été influencés avec succès sur [GetDateText]. Les nations suivantes ont été influencées par nos efforts d'influence en cours :"
 influence.54.a: "D'accord, merci!"
 econvent.1.t: "La Banque centrale de [Root.GetName] met en garde contre une possible bulle immobilière"
 econvent.1.d: "Cher [Root.GetLeader], nous avons le regret de vous informer qu'une partie importante de notre équipe d'experts (les meilleurs et les plus brillants économistes [Root.GetAdjective]) repère les premiers signes indiquant que le marché immobilier [Root.GetAdjective] est surchauffé et pourrait se diriger vers une bulle prête à éclater. Gardez à l’esprit que prédire l’avenir est un travail difficile et difficile et il se peut donc que nos experts se trompent.\nBien entendu, nous n’aurions jamais songé à donner à Votre Excellence des ordres sur ce qu’il faut faire, mais effectuer quelques ajustements maintenant sera moins douloureux qu’une crise généralisée à l’avenir."
 econvent.1.a: "Calmons les marchés avant que la situation ne dégénère."
 econvent.1.b: "Assez de bêtises. L'économie [Root.GetAdjective] est toujours saine !"
 econvent.1.b_tt: "§H Aucun effet§! pour l'instant, mais une bulle immobilière pourrait être créée à l'avenir\n"
 econvent.2.t: "Effondrement des prix de l’immobilier"
 econvent.2.d: "Alors que les prix des maisons et des appartements ont explosé, en particulier l’année dernière, les gens ont contracté des emprunts de plus en plus importants pour s’offrir un logement, tandis que les spéculateurs ont investi massivement dans l’immobilier, en utilisant également l’argent emprunté. À l’heure actuelle, cela touche à sa fin, et vite. Les prix baissent et les gens essaient de vendre comme s’il n’y avait pas de lendemain. Beaucoup de personnes parmi les moins fortunées se retrouveront avec d’énormes prêts qu’elles ne pourront pas rembourser. Alors que les gens maudissent à la fois [Root.GetLeader] et la [Root.GetAdjective] Banque centrale pour avoir causé cela, nous devons faire une déclaration publique sur la manière dont nous entendons gérer rapidement cette crise."
 econvent.2.a: "Nous allons inonder le système d’argent bon marché pour faire rebondir le marché."
 econvent.2.b: "C’est douloureux, mais les prix de l’immobilier devaient baisser."
 econvent.3.t: "Crash boursier"
 econvent.3.d: "Il semble que le chaos qui a suivi l’éclatement de la bulle immobilière ait atteint le marché boursier. Les cours des actions de presque toutes les sociétés cotées [Root.GetAdjective] ont fortement chuté ce matin, et notre devise a également beaucoup chuté. Les échanges ont été temporairement suspendus avant le déjeuner, mais aucune amélioration n'est attendue une fois les marchés rouverts demain, car tout le monde cherche désespérément à vendre ses actions."
 econvent.3.a: "Heureusement que mon argent a été placé dans des paradis fiscaux offshore."
 econvent.3.b: "Émettre des plans de sauvetage."
 econvent.4.t: "[Root.GetAdjective] Les banques font face à la crise"
 econvent.4.d: "Malgré le délicieux expresso latte-art chaud dans votre [Root.GetName] §R<3§! [Root.GetLeader]-cup, ce n'est pas une bonne journée. Des magnats financiers désespérés, leurs lobbyistes et les politiciens auxquels ils ont apporté leur contribution, tous envahissent les bureaux [Root.GetAdjective] du gouvernement, et tous ont le même message : « Nous avons besoin d'un plan de sauvetage ! ».\n\nApparemment, le double choc du ralentissement de l’immobilier et du krach boursier était trop lourd à gérer pour le secteur financier. L’accumulation de créances irrécouvrables à cause de leur spéculation est tout simplement trop importante, il faut un afflux d’argent frais du gouvernement – ​​sinon il y aura des faillites à tous les niveaux et des épargnants innocents perdront leurs dépôts."
 econvent.4.a: "Nous fournirons les plans de sauvetage."
 econvent.4.b: "Pas de plan de sauvetage, mais des dépôts d’épargne garantis."
 econvent.4.c: "La survie du plus fort fait la grandeur du capitalisme."
 econvent.5.t: "[Root.GetAdjective] Les consommateurs dépensent moins"
 econvent.5.d: "Un rapport récent a souligné que les travailleurs [Root.GetAdjective] sont de plus en plus inquiets pour leur avenir. Ce pessimisme pousse les gens à épargner davantage et la consommation globale est en baisse. Si cela continue, de nombreuses entreprises de [Root.GetName] devront réduire leurs effectifs ou fermer leurs portes. Les entreprises qui exportent principalement des marchandises [Root.GetAdjective] ne sont cependant pas concernées par cette mesure."
 econvent.5.a: "Transférez de l’argent pour vos achats."
 econvent.5.b: "Espérons que cela passera."
 econvent.6.t: "Baisse de la demande de biens [Root.GetAdjective] à l'étranger"
 econvent.6.d: "Les données sont claires ; les exportations internationales de [Root.GetName] diminuent. La cause, cependant, fait l'objet de vifs débats parmi les conseillers économiques de [Root.GetLeader]. Une théorie est que nous sommes devenus moins compétitifs en raison de nos salaires relativement élevés, une autre est que nos concurrents ont amélioré la qualité de leurs produits. D’autres estiment que la baisse de la demande est simplement due à l’évolution des tendances à l’étranger. Quelle qu’en soit la cause, nous ne pouvons pas vraiment faire grand-chose à ce sujet, à part laisser cela derrière nous et travailler plus dur à l’avenir."
 econvent.6.a: "Les étrangers sont stupides. Les trucs [Root.GetAdjective] sont les meilleurs !"
 econvent.7.t: "La sécheresse provoque un désastre pour les agriculteurs de [Root.GetAdjective]"
 econvent.7.d: "Bien que nous n'ayons généralement pas beaucoup de pluie, les précipitations cette saison de croissance ont été catastrophiques, la plupart des récoltes étant mauvaises. Le peu de production agricole qui a été produite est entièrement dû aux rivières restantes et à l'irrigation artificielle, ce qui n'est malheureusement pas très courant ici dans [Root.GetName]. Les agriculteurs demandent l'aide du gouvernement [Root.GetLeader] et les citadins s'inquiètent de la hausse des prix des denrées alimentaires."
 econvent.7.a: "Plus de chance la saison prochaine."
 econvent.8.t: "Famine dans [Root.GetName] !"
 econvent.8.d: "En raison de la sécheresse actuelle, de grandes parties de la campagne de [Root.GetName] manquent de nourriture à un prix abordable. Les réserves sont épuisées et une véritable famine provoque malnutrition, décès et maladies."
 econvent.8.a: "Aie!"
 econvent.9.t: "Confiance accrue des consommateurs"
 econvent.9.d: "Les conditions économiques récentes de la [ROOT.GetAdjective] ont montré que les consommateurs de notre pays ont désormais les conditions idéales pour dépenser de l'argent et investir dans l'avenir du pays. Les gens achètent des biens de consommation comme s'il n'y avait pas de lendemain !"
 econvent.9.a: "Merveilleuses nouvelles !"
 econvent.10.t: "Boom boursier"
 econvent.10.d: "La bourse [ROOT.GetAdjective] est en plein essor. Les gens de [ROOT.GetAdjective] négocient des actions comme s'ils achetaient de la nourriture.\n"
 econvent.10.a: "Continuez le boom !"
 econvent.10.a_tt: "Injecter des liquidités supplémentaires sur le marché peut s’avérer dévastateur en cas de krach.\n"
 econvent.10.b: "Super"
 econvent.10.b_tt: "Le marché continuera normalement sans intervention. Il existe encore un risque modéré d'accident.\n"
 econvent.10.c: "Ralentir l’économie."
 econvent.10.c_tt: "L’économie s’est réchauffée trop rapidement. Commençons par ralentir le rythme en resserrant les flux de capitaux.\n"
 econvent.11.t: "Une grande institution financière fait faillite"
 econvent.11.d: "Les gros titres ont fait la une des journaux concernant la faillite d’une grande institution financière. Les médias se déchaînent sur ce sujet et se dirigent vers les collines. Le gouvernement est prié de réagir alors que les craintes d’une crise plus grave se profilent à l’horizon. Que devrions nous faire?"
 econvent.11.a: "Trop gros pour échouer..."
 econvent.11.b: "C'est juste une bonne affaire..."
 econvent.12.t: "[FROM.GetName] Ondulations de la crise financière"
 econvent.12.d: "La récente crise de [FROM.GetName] a provoqué de nombreux conflits dans notre pays car les effets de leur crise se font sentir dans notre pays. Nos économies interconnectées souffrent désormais toutes deux du poids de cette crise."
 econvent.12.a: "Émettre des fonds de secours."
 econvent.12.b: "Le marché avant tout."
 econvent.13.t: "Un endettement élevé pousse les entreprises à partir"
 econvent.13.d: "Le ratio dette/PIB élevé de notre pays pousse les entreprises du pays à fermer et à quitter le pays. Il est impératif de réduire notre dette, sinon nous pourrions voir davantage d’industries décider de partir."
 econvent.13.a: "Autoriser l’entreprise à partir"
 econvent.13.b: "Acheter la société"
 econvent.14.t: "Les investisseurs privés investissent dans l’industrie civile"
 econvent.14.d: "Un certain nombre d'investisseurs privés ont décidé d'investir dans une nouvelle industrie civile au sein du pays. La nouvelle usine parvenue apportera des emplois et plus de prospérité à notre pays. La capacité de construction et de production supplémentaire nous aidera certainement à avancer économiquement."
 econvent.14.a: "Incroyable!"
 econvent.15.t: "Les investisseurs privés investissent dans des parcs de bureaux"
 econvent.15.d: "Un groupe d'investisseurs privés a décidé d'investir dans un certain nombre de services tiers à plus petite échelle."
 econvent.15.a: "Incroyable!"
 econvent.100.t: "Fermeture de l'industrie"
 econvent.100.d: "En raison de l'évolution de la situation économique, une grande partie de notre industrie est devenue non compétitive et a dû fermer ses portes."
 econvent.100.a: "Nous allons reconstruire"
 econvent.101.t: "Les industries déménagent"
 econvent.101.d: "En raison de l'évolution de la situation économique, de nombreuses entreprises ont décidé de se délocaliser à l'étranger pour être plus compétitives. Cela nuira à l’économie nationale."
 econvent.101.a: "Nous allons reconstruire"
 econvent.102.t: "Les industries sont déplacées vers [Root.GetNameDef]"
 econvent.102.d: "Due to changing economic circumstances in [FROM.GetNameDef], many [FROM.GetAdjective] corporations have decided to relocate to [Root.GetNameDef] to be more competitive. This will be a boon to our economy."
 econvent.102.a: "Excellente nouvelle"
 remove_civilian_industry_effect_tt: "Perdez [?reduction_factor|%R0] des usines civiles.\n"
 migrate_industry_to_random_effect_tt: "§R[?reduction_factor|%0]§! des usines civiles déménagent au §Y[relocation_location.GetNameDef]§!\n"
 factories_migrated_to_us_tt: "[?FROM.ind_factories|Y0] civilian factories relocate from §Y[FROM.GetNameDef]§! to §Y[Root.GetNameDef]§!.\n"
 war.0.t: "[FROM.GetName] goes to war!"
 war.0.d: "[FROM.GetName] has gone to war today. The international community will be keeping a close eye as this conflict continues to rage on.\n"
 war.0.a: "Inquiétant..."
 anti_bully.2.t: "Lassitude publique de la guerre"
 anti_bully.2.d: "We have decided war is our best course of action. However, in order to maintain support among the people we must either win this quickly or push quickly into foreign soil. The people will march as long as they see how necessary this war is. Boots march, drums beat, and the time for [FROM.GetName] to go to war is upon us!\n\n§YThis triggers the Public War Weariness System§!\n"
 anti_bully.2.a: "Nous devons gagner!"
 sco.1.t: "[FROM.GetName] a soumis une demande de statut d'observateur de l'OCS"
 sco.1.d: "Un nouvel État souhaite observer les travaux de l’OCS et peut-être éventuellement devenir membre à part entière de l’organisation !"
 sco.1.a: "Nous ne voyons aucune raison pour laquelle leur demande ne devrait pas être accordée."
 sco.1.b: "Nous ne pouvons pas leur accorder ce statut !"
 sco.2.t: "[FROM.GetName] a soumis une demande de statut de membre SCO"
 sco.2.d: "Un nouvel Etat souhaite devenir membre à part entière de l'organisation !"
 sco.2.a: "Nous ne voyons aucune raison pour laquelle leur demande ne devrait pas être accordée."
 sco.2.b: "Nous ne pouvons pas leur accorder ce statut !"
 sco.3.t: "[FROM.GetName] propose de mener des exercices militaires conjoints avec nous"
 sco.3.d: "Cet autre État membre de l’OCS propose des exercices conjoints pour renforcer notre coopération militaire et accroître la confiance entre nos deux pays."
 sco.3.a: "C'est une belle occasion pour nos troupes d'acquérir de l'expérience !"
 sco.3.b: "La coopération avec [FROM.Getname] est impossible."
 sco.4.t: "[FROM.GetName] a accepté notre offre !"
 sco.4.d: "Les délégués de [FROM.GetAdjective] ont chaleureusement accueilli notre proposition et nos préparatifs pour nos exercices communs."
 sco.4.a: "Que les jeux commencent!"
 sco.5.t: "[FROM.GetName] a rejeté notre offre !"
 sco.5.d: "Les délégués [FROM.GetAdjective] ont refusé de mener avec nous ce qui aurait été des exercices militaires très fructueux."
 sco.5.a: "Leur perte."
 sco.6.t: "L'OCS lance des exercices militaires à grande échelle"
 sco.6.d: "Les troupes [FROM.GetAdjective] se sont jointes à des milliers d'autres aujourd'hui dans ce qui est décrit comme un exercice antiterroriste sous les auspices de l'Organisation de coopération de Shanghai (OCS). Alors que beaucoup ont salué ces exercices comme le symptôme d’une coopération internationale réussie, d’autres ont réagi avec beaucoup moins d’enthousiasme à ce dernier développement. Les analystes américains et européens ont cité le déploiement d’avions à long rayon d’action et une puissance de feu importante comme preuve que ces exercices ne sont pas destinés à s’entraîner pour des opérations antiterroristes mais à une répétition générale bien armée en vue d’une confrontation avec l’Occident."
 sco.6.a: "Ces exercices menaçants sont-ils destinés à notre bénéfice ?"
 sco.6.b: "Seuls les terroristes ont quelque chose à craindre !"
 sco.6.c: "Développement intéressant"
 sco.7.t: "[FROM.GetName] devient membre du SCO"
 sco.7.d: "Suite à un processus d'intégration progressif, [FROM.GetLeader] a annoncé aujourd'hui l'adhésion de son pays à l'Organisation de coopération de Shanghai. Des observateurs pleins d’espoir ont décrit cette évolution comme une nouvelle progression de la coopération économique et politique régionale sur le continent eurasien, tandis que des analystes plus pessimistes ont déploré l’influence croissante de la Chine et la menace que cela représente pour l’ordre mondial existant."
 sco.7.a: "La menace chinoise continue de croître..."
 sco.7.b: "Une bonne journée pour la diplomatie !"
 sco.8.t: "[FROM.GetName] quitte le SCO"
 sco.8.d: "Suite à la réévaluation des actions chinoises par le gouvernement actuel [FROM.GetAdjective], [FROM.GetLeader] a retiré [FROM.GetNameDef] de l'Organisation de coopération de Shanghai. [CHI.GetLeader] n'a pas encore commenté cette évolution, mais les médias liés au gouvernement chinois ont rapidement déploré que ce départ représente un pas en arrière en termes d'intégration régionale."
 sco.8.a: "L’agression chinoise a aliéné cette nation."
 sco.8.b: "Un triste jour pour la coopération internationale..."
 sco.9.t: "La Chine prend les rênes du pouvoir sur l’OCS à la Russie"
 sco.9.d: "L’Organisation de coopération de Shanghai a toujours été gérée dans le cadre d’un effort conjoint sino-russe. Cependant, le mécontentement chinois à l'égard de cet arrangement aurait conduit la Russie à se voir imposer une position plus secondaire au sein de l'organisation. Alors que [CHI.GetLeader] et [SOV.GetLeader] sont restés silencieux sur cette lutte de pouvoir, les responsables russes seraient furieux contre les Chinois et amers face à l'humiliation du géant slave qui s'est produite au vu et au su des autres États membres de l'OCS. . Les conséquences géopolitiques de cette décision en termes d’hégémonie sur l’Asie centrale seront probablement considérables."
 sco.9.a: "La Chine n'est pas disposée à partager la vedette..."
 sco.10.t: "La Chine exige que nous choisissions un camp"
 sco.10.d: "Notre adhésion continue à l’OTSC et à l’Organisation de coopération de Shanghai nous place dans une position difficile suite à la scission sino-russe. La Chine exige désormais soit que nous quittions l’OCS et restions dans l’alliance russe, soit que nous restions au sein de l’OCS et abandonnions les Russes. Le choix que nous ferons sera presque certainement significatif dans la confrontation à venir entre les deux géants régionaux."
 sco.10.a: "Nous ne sommes que fidèles !"
 sco.10.b: "Il est temps de quitter ce navire en perdition..."
 sco.11.t: "[FROM.GetName] nous fournit une aide au développement !"
 sco.11.d: "Sous les auspices de l'Organisation de coopération de Shanghai, le gouvernement [FROM.GetAdjective] fournit à nos entreprises locales les fonds et les ressources indispensables pour les aider à faciliter leurs projets de développement. Bien que cette aide soit une bonne nouvelle pour notre économie, elle augmentera le degré d’influence que [FROM.GetNameDef] exerce sur notre pays."
 sco.11.a: "Nous sommes reconnaissants pour l'aide!"
 sco.12.t: "[FROM.GetName] a formé $SHANGHAI_PACT$ !"
 sco.12.d: "[FROM.GetName] a formé $SHANGHAI_PACT$ pour rivaliser avec [USA.GetFactionName]. Nous leur avons permis d'avoir une grande influence [FROM.GetAdjective] sur nous, nous sommes également membre du SCO, nous sommes donc obligés d'être membre de la nouvelle faction."
 sco.12.a: "D'accord"
 taiwan.1.t: "228 Rallye main dans la main"
 taiwan.1.d: "Une démonstration de solidarité. Une chaîne humaine s'est formée avec environ deux millions de personnes formant une chaîne humaine de 500 km. Partant du port de Keelung, la ville la plus au nord de Taiwan, la chaîne s'est dirigée vers la pointe la plus méridionale de l'île. L’objectif était double. Les Taiwanais souhaitent la paix, mais ils protestent également contre le déploiement de missiles par la République populaire de Chine visant Taiwan, leur île voisine. Une partie du symbolisme de la manifestation, en particulier au moment où les participants « se détournent de la Chine », a clairement viré vers le soutien à l'indépendance de Taiwan, et n'a donc pas été suivi par les membres de la Coalition Pan-Bleu qui ont contré la manifestation avec un un rassemblement à l'échelle de l'île quelques jours plus tard."
 taiwan.1.a: "N'oublions jamais les victimes."
 taiwan.2.t: "Typhon Bilis"
 taiwan.2.d: "En préparation pour Bilis, les bureaux à travers l'île ont été fermés. En plus de la fermeture des entreprises, les vols à destination et en provenance de l'île ont été rééchelonnés, et un centre de secours pour typhon a été établi. En raison de la menace de glissements de terrain, une alerte aux glissements de terrain a été émise pour Taiwan. Bien que la tempête n'ait pas encore touché terre, une personne a été tuée à Taipei le 22 août après avoir été ensevelie par un glissement de terrain déclenché par le typhon imminent; il s'agissait de la première victime causée par Bilis. En plus du rééchelonnement des vols, de nombreux aéroports ont été fermés, et la Bourse de Taiwan devait fermer le 23 août. Pendant ce temps, les hôpitaux ont prolongé leurs heures de service en prévision de l'admission des patients. Les membres de la garde côtière taïwanaise ont régulé les activités de pêche en raison de la menace d'actions de vagues meurtrières. Le port de Kaohsiung est resté fermé pendant toute la durée de la tempête. En raison de la demande accrue de légumes avant la tempête, le coût de ces aliments a augmenté de 20 à 30 pour cent.\n\nBilis a été un cyclone tropical extrêmement destructeur pour Taiwan. Les dommages aux industries agricole, de la pêche et forestière de l'île se sont élevés à 133,5 millions de dollars américains. Le typhon a causé 14 décès et blessé 80 personnes supplémentaires. Les pannes de courant ont affecté négativement environ 600 000 foyers, et 400 maisons à travers Taiwan ont été détruites. Plusieurs centaines de milliers de familles ont été confrontées à une pénurie d'eau après la tempête. À Cheng-Kung, une station météorologique a enregistré une rafale de vent de 281 km/h, qui a brisé l'anémomètre de la station. Un glissement de terrain unique dans la ville de Jenai a enseveli neuf agriculteurs. Des dizaines de milliers de personnes ont été déplacées pendant la tempête et ont été hébergées dans des abris d'évacuation mis en place par le gouvernement. Dans le comté de Hualien oriental, 250 maisons ont cédé sous les vents violents. Les vents ont également abattu des arbres et ont soufflé des véhicules légers, bloquant les routes. Les fortes précipitations associées à Bilis ont inondé environ 40 000 hectares de vergers et de rizières. Après le passage de Bilis à Taiwan, un séisme de magnitude 5,7 a frappé l'île, exacerbant les conditions déjà aggravées."
 taiwan.2.a: "Le temps de reconstruire."
 taiwan.3.t: "Élection présidentielle à Taïwan"
 taiwan.3.d: "C'est la deuxième élection présidentielle directe de la République de Chine, visant à élire le président et le vice-président de la 10e législature sous la Constitution de 1947. Cette élection pourrait mettre fin à plus d'un demi-siècle de règne du Kuomintang à Taïwan, les électeurs du KMT étant divisés en deux camps.\n\nBien que plus populaire et régulièrement mieux classé dans les sondages, l'ancien gouverneur de Taïwan, James Soong, connu pour ses prises de position franches, n'a pas réussi à obtenir la nomination du Kuomintang. En réponse, il a annoncé sa candidature en tant que candidat indépendant. Le Kuomintang a réagi en expulsant Soong et 21 de ses alliés. Ils ont poursuivi Soong pour vol, alléguant qu'en tant que secrétaire général du parti, il avait volé des millions de dollars taiwanais en espèces destinés à la famille du défunt président Chiang Ching-kuo et caché l'argent dans la Chunghsing Bills Finance Co. Soong s'est défendu en disant qu'il agissait sous la direction de Lee, mais son récit était largement peu convaincant. Initialement en tête dans les sondages, Soong a perdu par un peu plus de 300 000 voix, et le scandale financier qui a terni son image de politicien intègre a probablement conduit à son échec.\n\nLe Parti démocratique progressiste a présenté l'ancien maire de Taipei, Chen Shui-bian, à la présidence. Ayant déjà concouru pour l'élection de 1996 sur une plateforme radicale d'indépendance et ayant subi une défaite écrasante, le DPP a modéré sa position en mai 1999 en publiant la \"Résolution sur l'avenir de Taïwan\". La résolution acceptait le statu quo et promouvait le point de vue modéré selon lequel Taïwan était déjà indépendant, de sorte qu'une déclaration formelle ne serait pas nécessaire de manière urgente, voire pas du tout. Elle incluait également l'engagement que tout changement dans le statut international de Taïwan devrait se faire par référendum, dissipant ainsi la crainte qu'un gouvernement DPP, s'il était élu, déclare unilatéralement l'indépendance sans approbation populaire. Le ticket Chen-Lu promet également d'être plus agressif dans la lutte contre le pétrole noir, de fournir plus de financement pour les services sociaux, et d'être plus respectueux de l'environnement, notamment en s'opposant à l'énergie nucléaire."
 taiwan.3.a: "Chen Shui-bian (DPP)"
 taiwan.3.b: "Lien Chan (KMT)"
 taiwan.3.c: "James Soong (Indépendant)"
 taiwan.4.t: "La Coast Guard Administration a été établie."
 taiwan.4.d: "La Coast Guard Administration (CGA) combine le Commandement des gardes-côtes, le Bureau de la police maritime et plusieurs patrouilleurs de la Direction générale des douanes de Taiwan, relevant du Ministère des Finances. La CGA unifie officiellement les agences chargées de l'application de la loi côtière et maritime. Elle sera très active malgré sa jeunesse, participant à de nombreuses opérations de recherche et sauvetage ainsi qu'à des opérations anti-contrebande dans un avenir proche.\n\nLa Coast Guard Administration du Conseil des affaires océaniques (CGA) est chargée de maintenir l'ordre, de protéger les ressources des eaux territoriales de la République de Chine (ROC), entourant Taiwan, Penghu, les îles Kinmen, Matsu, l'île Verte, l'île Orchidée, les îles Dongsha et les îles Nansha, ainsi que de fournir une première ligne de défense le long des zones côtières contre les contrebandiers et les immigrants illégaux. La CGA est considérée comme une agence civile chargée de l'application de la loi relevant du Conseil des affaires océaniques de l'Exécutif Yuan, bien qu'en cas d'urgence, elle puisse être intégrée aux forces armées de la République de Chine.\n\nLa Coast Guard Administration est dirigée par un ministre et trois vice-ministres. La CGA comprend huit départements, un bureau, cinq forces spéciales, ainsi qu'une Direction générale de la patrouille maritime et une Direction générale de la patrouille côtière. Sa juridiction couvre les eaux entourant Kinmen, Matsu, Penghu et l'île principale de Taiwan pour assurer une protection adéquate des 1 819,8 kilomètres de littoral et des 540 000 kilomètres carrés de \"Territoire bleu\", soit 15 fois la taille de l'île de Taiwan."
 taiwan.4.a: "Pour des côtes sûres."
 taiwan.5.t: "L'Université nationale de Kaohsiung a été inaugurée."
 taiwan.5.d: "L'université vise à réduire l'écart en matière d'éducation entre le sud et le nord de Taiwan et à promouvoir l'économie de la région sud.\n\nL'université compte vingt départements, dont les Langues et Littératures Occidentales, les Langues et Littératures de l'Asie de l'Est, l'Architecture, le Design Créatif, la Kinésiologie, les Études sur la Santé et les Loisirs, le Droit, le Gouvernement et le Droit, le Droit Économique et Financier, l'Économie Appliquée, les Mathématiques Appliquées, la Chimie Appliquée, le Génie Électrique, le Génie Civil et Environnemental, les Sciences de la Vie, et la Gestion Industrielle et Commerciale Asie-Pacifique, les Arts Traditionnels, la Finance, la Gestion de l'Information et la Physique Appliquée. Parmi ces départements, la Gestion Industrielle et Commerciale Asie-Pacifique est particulièrement destinée à former des élites industrielles.\n\nUne caractéristique inhabituelle de cette université est son espace ouvert. Il n'y a pas de murs aux limites du campus. Les résidents vivant aux alentours peuvent se rendre à pied sur le campus ou faire de l'exercice en utilisant les équipements de la salle de sport. La biodiversité est également une caractéristique notable de l'UNIVERSITÉ nationale de Kaohsiung. Il y a plus de 60 espèces de poissons dans l'étang du parc Water Land."
 taiwan.5.a: "Cela contribuera à aider le sud."
 taiwan.6.t: "L'Accord sur le Commerce des Services à travers le Détroit a été ratifié."
 taiwan.6.d: "Suite à son approbation par le législateur taiwanais, le CSSTA, un accord de libre-échange entre Taiwan et la Chine continentale, est désormais officiellement intégré dans la loi taiwanaise. Cet accord marque une nette amélioration des relations entre les deux parties et devrait considérablement renforcer le commerce des services à travers le détroit. Cependant, les critiques de l'accord restent convaincus qu'il représente une menace pour l'autonomie politique de Taiwan vis-à-vis de la Chine."
 taiwan.6.a: "Taïwan se rapproche de la Chine."
 taiwan.7.t: "Les protestataires du Tournesol occupent le législateur taiwanais."
 taiwan.7.d: "Les membres du mouvement étudiant Sunflower ont escaladé hier la clôture qui les séparait du législateur taiwanais, à la suite de protestations contre les tentatives du gouvernement de faire adopter l'accord controversé sur le commerce des services à travers le détroit (CSSTA), un accord de libre-échange avec la Chine continentale. Le mouvement de protestation a soulevé des préoccupations concernant l'approche précipitée du gouvernement pour la ratification du traité, le manque de transparence pendant les négociations, ainsi que le contenu même de l'accord."
 taiwan.7.a: "Un coup dur pour le KMT."
 taiwan.8.t: "La « Feuille de route vers la réunification » de la RPC"
 taiwan.8.d: "Le gouvernement de [CHI.GetLeader] nous a proposé une « Feuille de route vers la réunification » traçant la voie à suivre pour que Taiwan revienne éventuellement sous le contrôle chinois en tant que région administrative spéciale. La proposition comprend de multiples garanties pour le maintien de la démocratie et de l’autonomie politique taïwanaises, mais cela pourrait ne pas suffire aux opposants taïwanais à la réunification avec le continent. La manière dont la Chine pourrait réagir si nous rejetions ce plan reste incertaine."
 taiwan.8.a: "Nous devrions accepter le plan."
 taiwan.8.b: "Taïwan n'est pas la Chine !"
 taiwan.9.t: "Rapports sur des activités suspectes des services de renseignement chinois"
 taiwan.9.d: "Nos services de renseignement font état d'une activité accrue des agents chinois sur notre territoire. Cette activité ne signifie rien de particulier, mais elle pourrait également signifier que la Chine prépare quelque chose. Nous devons décider si le fait que nos services de renseignement travaillent à enquêter sur cette affaire constitue une bonne utilisation de leur temps."
 taiwan.9.a: "Cela semble inoffensif."
 taiwan.9.b: "Nous devrions enquêter."
 taiwan.10.t: "La Chine exige la fin de la loi sur les relations avec Taiwan !"
 taiwan.10.d: "La RPC a exigé que nous révoquions la loi sur les relations avec Taiwan, qui consacre nos relations actuelles avec les autorités gouvernementales de Taiwan. Cette exigence est sans aucun doute le prélude à une action encore plus agressive envers Taiwan que ce que nous avons déjà vu ces derniers mois. Si nous abrogeons cette loi, les risques d’un conflit dans le détroit de Taiwan augmenteront considérablement."
 taiwan.10.a: "Cette demande est ridicule !"
 taiwan.10.b: "Il vaut mieux que nous concédons..."
 taiwan.11.t: "La feuille de route a été acceptée !"
 taiwan.11.d: "Taipei a accepté de faire une déclaration commune engageant leur camp et le nôtre à une éventuelle réunification !"
 taiwan.11.a: "Réjouissez-vous !"
 taiwan.12.t: "La feuille de route a été rejetée !"
 taiwan.12.d: "Taipei a refusé de s’engager à réunifier à terme notre pays divisé. Nous pourrions soit attendre des conditions plus susceptibles de conduire à l'acceptation de notre proposition et réessayer à ce moment-là, soit essayer de rechercher d'autres alternatives..."
 taiwan.12.a: "Un mauvais choix de leur part."
 taiwan.13.t: "Grève du syndicat des agents de bord de Taoyuan"
 taiwan.13.d: "Le syndicat des agents de bord de Taoyuan, qui représente quelque 2 500 membres d'équipage de cabine de China Airlines, organise la première grève de l'histoire de l'aviation taïwanaise. En conséquence, un total de 122 vols de passagers de China Airlines au départ de l'aéroport international de Taoyuan et de l'aéroport Songshan de Taipei ont été annulés, laissant 20 000 passagers bloqués. Le syndicat nous a présenté sept revendications à accepter pour de meilleures conditions de travail."
 taiwan.13.a: "Acceptez leurs demandes"
 taiwan.13.b: "Nous ne reculons jamais"
 taiwan.14.t: "La grève a échoué"
 taiwan.14.d: "Après que nous ayons rejeté leurs revendications, la grève a rapidement pris fin. Tout le monde retourne au travail maintenant."
 taiwan.14.a: "Ils n'ont jamais eu de chance"
 taiwan.15.t: "La grève continue"
 taiwan.15.d: "Après que nous ayons rejeté leurs revendications, la grève est devenue encore plus intense. Il ne semble pas que la grève soit prête à éclater."
 taiwan.15.a: "Au moins nous avons essayé"
 taiwan.16.t: "Le char est tombé du pont"
 taiwan.16.d: "An army CM-11 tank toppled into a creek in Pingtung County as it was returning to base from a training exercise yesterday morning, killing three of the five soldiers onboard. The driver sustained only minor injuries and pulled himself out of the tank. The four others, who were inside the gun turret, could not escape through the turret's hatches because the tank was upside down."
 taiwan.16.a: "Examinez comment cela pourrait arriver"
 taiwan_news.1.t: "L'Accord sur le Commerce des Services à travers le Détroit a été ratifié."
 taiwan_news.1.d: "Suite à son approbation par le corps législatif taïwanais, le CSSTA, un accord de libre-échange entre Taiwan et la Chine continentale, est officiellement entré dans la loi taïwanaise."
 taiwan_news.1.a: "Taïwan se rapproche de la Chine."
 taiwan_news.2.t: "Les protestataires du Tournesol occupent le législateur taiwanais."
 taiwan_news.2.d: "Les membres du mouvement étudiant Sunflower ont escaladé hier la clôture qui les séparait du législateur taiwanais, à la suite de protestations contre les tentatives du gouvernement de faire adopter l'accord controversé sur le commerce des services à travers le détroit (CSSTA), un accord de libre-échange avec la Chine continentale. Le mouvement de protestation a soulevé des préoccupations concernant l'approche précipitée du gouvernement pour la ratification du traité, le manque de transparence pendant les négociations, ainsi que le contenu même de l'accord."
 taiwan_news.2.a: "Un coup dur pour le KMT."
 taiwan_news.3.t: "Des éléments de l’armée lors du coup d’État à Taiwan"
 taiwan_news.3.d: "Une faction d’officiers militaires taïwanais a commencé à s’emparer de sites clés sur l’île de Taiwan. [TAI.Getleader] a déclaré l'état d'urgence nationale et a mobilisé ceux qui restent fidèles au gouvernement. Reste à savoir si les efforts du président porteront leurs fruits.\n\nAlors que l’objectif déclaré des dirigeants du coup d’État est de répondre au mécontentement à l’égard de l’administration [TAI.GetLeader], bon nombre des personnalités de premier plan impliquées ont des liens étroits avec la Chine. Malgré cela, l’ampleur de l’implication de la Chine dans cette tentative de coup d’État reste floue."
 taiwan_news.3.a: "L’avenir de Taiwan est en jeu."
 taiwan_news.4.t: "Le coup d’État taïwanais a réussi"
 taiwan_news.4.d: "Suite à la tentative ratée de [TAI.Getleader] de rallier des soutiens contre le coup d'État, des officiers militaires fidèles à la faction pro-chinoise de Taiwan ont pris le contrôle du pays. Même si les officiers ont promis un éventuel retour à la démocratie, l'autonomie politique de Taiwan par rapport au continent est sans aucun doute menacée. Avec le soutien tacite mais largement connu de la Chine au coup d’État, la probabilité d’une résolution du Conseil de sécurité en réponse à cet événement est hautement improbable."
 taiwan_news.4.a: "Une nouvelle ère dans l'histoire de Taiwan."
 taiwan_news.5.t: "Le coup d’État taïwanais a échoué"
 taiwan_news.5.d: "[TAI.Getleader] est sorti triomphant aujourd'hui alors que les derniers participants au coup d'État se sont rendus à la police taïwanaise. Au cours des deux dernières semaines, les putschistes n’ont pas réussi à gagner le soutien de la population ou de leurs camarades soldats. Ce manque de soutien a contribué aux déficits existants en termes de ressources et de moral, conduisant à la reddition massive des troupes putschistes dans tout le pays aux autorités. [TAI.Getleader] a assuré aux journalistes que la stabilité et le calme seraient rapidement rétablis dans la nation insulaire, alors que la Chine n'a pas encore commenté les événements récents."
 taiwan_news.5.a: "La crise a été évitée."
 taiwan_news.5.b: "Il semble que nous ayons besoin d'une autre solution."
 taiwan_news.6.t: "Taiwan adopte un projet de loi pour contrer l’ingérence chinoise"
 taiwan_news.6.d: "Dans le but déclaré de contrecarrer les tentatives chinoises d'ingérence dans le processus électoral de Taiwan, [TAI.GetLeader] a réussi à faire adopter un « projet de loi anti-infiltration » controversé au Parlement. Le projet de loi interdit aux puissances étrangères hostiles de faire campagne, de faire du lobbying, de faire des dons politiques ou de diffuser de la désinformation. Les législateurs de l'opposition se sont fermement opposés au projet de loi, tout comme le bureau des affaires taïwanaises de Pékin. Tous deux ont fustigé [TAI.GetLeader] comme étant l'auteur d'une « terreur verte » qui contribue à une atmosphère de paranoïa et de peur. Le parti au pouvoir de [TAI.GetLeader] a défendu cette décision comme un acte nécessaire étant donné la menace substantielle que la Chine continentale représente pour le territoire insulaire."
 taiwan_news.6.a: "Taïwan riposte."
 hongkong.1.t: "Les Chinois ont refusé d’annuler l’annexion !"
 hongkong.1.d: "La Chine a rejeté nos menaces, ne nous laissant d’autre choix que d’y donner suite."
 hongkong.1.a: "Ils ne semblent plus nous craindre."
 hongkong.2.t: "La Chine déploie des troupes à Hong Kong"
 hongkong.2.d: "À la suite des manifestations dans la région administrative spéciale de Hong Kong, la Chine a ordonné à plusieurs unités de l'Armée populaire de libération de descendre dans les rues de Hong Kong pour « rétablir l'ordre public ». [CHI.GetLeader] a assuré aux « manifestants pacifiques » qu'ils ne seraient pas pris pour cible et que tous ceux qui seraient arrêtés seraient traités conformément au droit international des droits de l'homme. Cependant, nombreux sont ceux à Hong Kong et à l'étranger qui ont exprimé leur scepticisme quant à la mesure dans laquelle les troupes chinoises feront preuve de retenue envers les manifestants."
 hongkong.2.a: "Cette action est ignoble !"
 hongkong.2.b: "La Chine a fait ce qu’elle devait faire."
 hongkong.2.c: "Ce ne sont pas nos affaires."
 hongkong.3.t: "La Chine annexe Hong Kong"
 hongkong.3.d: "La Chine a décidé de mettre fin au statut particulier de Hong Kong en tant que région administrative spéciale, en annexant officiellement le territoire. Nous devons décider de la réponse de notre pays à cet événement important."
 hongkong.3.a: "Cette action est ignoble !"
 hongkong.3.b: "La Chine a fait ce qu’elle devait faire."
 hongkong.3.c: "Ce ne sont pas nos affaires."
 hongkong.4.t: "L'annexion de Hong Kong par la Chine exige une réponse"
 hongkong.4.d: "En violation flagrante de la loi fondamentale négociée entre nous et les chinois, la Chine a officiellement annexé la région administrative spéciale. En tant que garant des 50 ans d'autonomie de Hong Kong, nous devons répondre à cet acte illégal par une réaction appropriée."
 hongkong.4.a: "Nous devrions les menacer d'une action militaire."
 hongkong.4.b: "Nous devrions les menacer de mesures économiques."
 hongkong.4.c: "Nous devrions critiquer cette décision."
 hongkong.5.t: "Le Royaume-Uni menace d'intervenir militairement !"
 hongkong.5.d: "Les britanniques ont réagi de manière plus belliqueuse que prévu à notre annexion de leur ancien territoire colonial. Nous devons réfléchir à l'opportunité de céder à leurs exigences."
 hongkong.5.a: "Ce n'est pas sur cette colline que nous voulons mourir."
 hongkong.5.b: "Qu'ils viennent."
 hongkong.6.t: "Le Royaume-Uni menace de prendre des mesures économiques contre nous!"
 hongkong.6.d: "Les Britanniques ont décidé de menacer de sanctions à notre encontre si nous ne revenons pas sur notre annexion de leur ancien territoire colonial. Nous devons réfléchir à l'opportunité d'accéder à leurs demandes."
 hongkong.6.a: "Nous devons éviter la confrontation."
 hongkong.6.b: "Leurs menaces ne veulent rien dire!"
 hongkong.7.t: "Les Chinois ont accepté de revenir sur l'annexion"
 hongkong.7.d: "Visiblement impressionnés par la puissance britannique, les Chinois ont fait marche arrière sur la question de Hong Kong."
 hongkong.7.a: "Nos menaces ont toujours un effet!"
 hongkong_news.1.t: "Hong Kong secouée par de nombreuses manifestations"
 hongkong_news.1.d: "Suite à la décision de la Chine d'exclure la possibilité que Hong Kong élise son chef de l'exécutif au suffrage universel, des manifestations massives ont éclaté sur le territoire chinois. [HKG.GetLeader] a déclaré que même si le gouvernement de Hong Kong respecte le droit des Hongkongais d'exprimer pacifiquement et légalement leurs opinions, la violence et l'anarchie ne seront pas tolérées. La réponse de la Chine à la crise actuelle reste à voir, car [CHI.GetLeader] n'a pas commenté les événements récents."
 hongkong_news.1.d_limit: "Suite à la décision chinoise selon laquelle le chef de l'exécutif de Hong Kong ne pourrait être élu au suffrage universel que si les candidats étaient préalablement approuvés, des manifestations massives ont éclaté sur le territoire chinois. [HKG.GetLeader] a déclaré que même si le gouvernement de Hong Kong respecte le droit des Hongkongais d'exprimer pacifiquement et légalement leurs opinions, la violence et l'anarchie ne seront pas tolérées. La réponse de la Chine à la crise actuelle reste à voir, car [CHI.GetLeader] n'a pas commenté les événements récents."
 hongkong_news.1.d_reunification: "Suite à l'annonce par la Chine selon laquelle Hong Kong perdrait son statut spécial et reviendrait complètement sous contrôle chinois en 2047, des manifestations massives ont éclaté sur le territoire chinois. [HKG.GetLeader] a déclaré que même si le gouvernement de Hong Kong respecte le droit des Hongkongais d'exprimer pacifiquement et légalement leurs opinions, la violence et l'anarchie ne seront pas tolérées. La réponse de la Chine à la crise actuelle reste à voir, car [CHI.GetLeader] n'a pas commenté les événements récents."
 hongkong_news.1.d_annexed: "Suite à l'annexion très controversée de Hong Kong par la Chine, des manifestations massives ont éclaté sur le territoire chinois. [HKG.GetLeader] a déclaré que même si le gouvernement de Hong Kong respecte le droit des Hongkongais d'exprimer pacifiquement et légalement leurs opinions, la violence et l'anarchie ne seront pas tolérées. La réponse de la Chine à la crise actuelle reste à voir, car [CHI.GetLeader] n'a pas commenté les événements récents."
 hongkong_news.1.a: "Développement intéressant"
 hongkong_news.1.b: "C'est une mauvaise nouvelle pour nous."
 hongkong_news.2.t: "Les manifestations à Hong Kong s'essoufflent"
 hongkong_news.2.d: "Les manifestations organisées dans la région administrative spéciale de Hong Kong pour protester contre les récentes actions de la Chine ont progressivement diminué ces derniers jours et se sont pratiquement arrêtées. Les opérations de police dans le territoire chinois n'ont rencontré aucune résistance, et de nombreuses personnes qui étaient descendues dans la rue sont rentrées chez elles. Il reste à voir ce que cela signifie pour les relations entre la Chine et un territoire troublé dont les valeurs politiques sont très différentes des siennes. Une bannière laissée par les manifestants dans un endroit bien en vue du centre-ville, sur laquelle on pouvait lire \"We will be back\", est peut-être un indicateur de ce qui va se passer."
 hongkong_news.2.a: "Développement intéressant"
 hongkong_news.2.b: "Ils savent que leur cause est futile."
 hongkong_news.3.t: "Les manifestations à Hong Kong prennent de l'ampleur"
 hongkong_news.3.d: "Les protestations contre les actions chinoises sur le territoire de Hong Kong ont rapidement augmenté, les analystes s'accordant à dire que les protestations sont entrées dans une nouvelle phase en termes d'ampleur et de tactique. Il reste à voir comment les gouvernements chinois et hongkongais réagiront à cette nouvelle escalade, mais les responsables des deux gouvernements seraient de plus en plus irrités par l'impact des protestations sur leurs intérêts particuliers. Les manifestants, quant à eux, refusent de se retirer tant que les gouvernements chinois et hongkongais n'auront pas répondu à leurs demandes."
 hongkong_news.3.a: "Le peuple de Hong Kong ne restera pas silencieux..."
 hongkong_news.3.b: "Ils resteront à la maison s'ils savent ce qui est le mieux pour eux!"
 korea.1.t: "La Chine exige notre retrait de la péninsule coréenne"
 korea.1.d: "La RPC a exigé que nous retirions nos troupes protégeant la République de Corée de ce qu'elle décrit comme sa « sphère d'influence ». Cette demande est sans aucun doute le prélude à une action agressive envers la République de Corée. Si nous retirons nos troupes de la péninsule, les risques d'un conflit de l'autre côté de la zone démilitarisée augmenteront considérablement."
 korea.1.a: "Cette demande est absurde!"
 korea.1.b: "Il est préférable pour nous de céder..."
 korea.2.t: "La Chine nous encourage à lancer des réformes économiques"
 korea.2.d: "[CHI.GetLeader] exhorte notre gouvernement à suivre l'exemple de la Chine et à lancer des réformes de libéralisation du marché. Bien qu'il soit tentant de connaître la même croissance économique rapide que la Chine dans les années 1980, nous devons mettre en balance cette proposition avec l'instabilité qui résulterait inévitablement de la poursuite de ces réformes."
 korea.2.a: "L'heure n'est pas à la réforme!"
 korea.2.b: "Initier des réformes mineures."
 korea.2.c: "Initier des réformes modérées."
 korea.2.e: "Initier des réformes majeures."
 korea.3.t: "[NKO.GetLeader] a annoncé de nouvelles réformes économiques"
 korea.3.d: "Sous la pression de la Chine, la Corée du Nord a entamé un processus de libéralisation économique dont beaucoup espèrent qu'il améliorera le niveau de vie dans le « royaume ermite ». Si de nombreux économistes ont salué le début de ce processus de réforme, d'autres se sont inquiétés de savoir si la rapidité de la réforme ne risquait pas de provoquer l'instabilité d'un pays qui s'est habitué à une économie totalement planifiée."
 korea.3.a: "Des nouvelles encourageantes?"
 korea.4.t: "La division entre la Chine et la Corée du Nord"
 korea.4.d: "Les critiques du régime de [NKO.GetLeader] dans les médias liés au gouvernement chinois ont considérablement augmenté ces dernières semaines. Ces critiques s'en prennent au problème nucléaire persistant de la Corée du Nord et à l'incapacité de l'État nord-coréen à améliorer les conditions de vie de ses citoyens par la libéralisation économique, comme l'a fait la Chine au cours des dernières décennies.\n\nBien que [CHI.GetLeader] soit resté silencieux sur la question, on pense généralement que ces organisations médiatiques n'auraient pas lancé une critique aussi cinglante d'un allié autrefois proche sans l'approbation tacite de [CHI.GetLeader]. De nombreux observateurs y voient le point culminant de la frustration des Chinois à l'égard de la dynastie Kim, et peut-être le désir d'établir un gouvernement alternatif plus stable et plus conforme aux souhaits de la Chine."
 korea.4.a: "Seul [CHI.GetLeader] sait où cela va mener..."
 korea.5.t: "Les pourparlers débutent"
 korea.5.d: "La principale exigence du Nord est que nous mettions fin à nos exercices militaires conjoints avec les États-Unis, exercices qu'ils considèrent comme des préparations à une invasion de leur territoire. Cependant, ces exercices sont largement considérés par nos militaires comme des préparatifs nécessaires en cas d'attaque de la Corée du Nord. Accepter de mettre fin à ces exercices serait donc un risque important, qui mettrait en jeu la sécurité de notre pays."
 korea.5.d_NKO: "La principale demande du Sud est que nous cessions nos essais d'armes nucléaires, essais qu'ils considèrent comme la preuve de nos intentions agressives. Cependant, notre programme d'armes nucléaires est considéré par l'armée comme un important moyen de dissuasion contre une invasion américaine. De plus, ce programme et les essais nécessaires à sa poursuite contribuent à renforcer la légitimité de notre gouvernement. Accepter de mettre fin à ces essais serait donc un risque important, qui mettrait en jeu la sécurité de notre pays et de notre gouvernement."
 korea.5.a: "Notre pays ne sera plus jamais entier si nous ne prenons pas quelques risques..."
 korea.5.b: "Certains risques sont trop gros à prendre."
 korea.6.t: "Début des pourparlers de paix en Corée"
 korea.6.d: "Depuis plus d’un demi-siècle, la Corée du Nord et la Corée du Sud sont techniquement en état de guerre. Ce conflit gelé s’est parfois réchauffé avec des affrontements entre les deux parties le long de frontières maritimes contestées ou à travers la DMZ. Aujourd’hui, les deux parties s’unissent dans l’espoir de mettre un terme à cette situation et de parvenir à une désescalade dans la péninsule coréenne grâce à un traité de paix formel. La négociation d’un traité de paix est largement considérée comme une première étape importante vers la réunification de la péninsule coréenne."
 korea.6.a: "Les deux parties peuvent-elles parvenir à un compromis ?"
 korea.7.t: "[CHI.GetLeader] Exprime son soutien à la réunification coréenne"
 korea.7.d: "La Chine s’est toujours méfiée de la perspective d’une Corée unie alignée sur les États-Unis à ses portes. Les observateurs ont donc été surpris d’entendre [CHI.GetLeader] exprimer un soutien sans équivoque à la réunification, dans une démarche qui, selon certains témoignages, a pris les dirigeants nord-coréens au dépourvu. Compte tenu de l’influence considérable de la Chine dans la péninsule coréenne, cette annonce est susceptible de faire pression sur les deux parties pour qu’elles viennent à la table des négociations."
 korea.7.a: "Le changement est-il dans l’air ?"
 korea.8.t: "Le mouvement radical coréen gagne en popularité"
 korea.8.d: "Les inégalités économiques en République de Corée ont contribué au mécontentement croissant des classes inférieures du pays. Des milliers de militants en ligne ont commencé à réclamer une plus grande égalité grâce à l'établissement d'une autonomie au niveau communautaire dans toute la République de Corée. Même si le mouvement est sans chef et donc dépourvu d'un message central et clair, la majorité de ses membres semblent souhaiter l'abolition de l'État coréen et des chaebols auxquels il est lié en faveur d'un système qui répartit le pouvoir politique et économique entre des élus directs. représentants au niveau communautaire.\n\nCette nouvelle idéologie, qui rejette les idéologies fondamentales de la République de Corée et de la RPDC, représente un changement significatif par rapport à la politique traditionnelle de la gauche radicale sud-coréenne, qui a soit promu des politiques de gauche au sein du système politique existant de la Corée du Sud, soit appelé à l'établissement d'une politique de gauche. un État à la manière de la Corée du Nord."
 korea.8.a: "Il se passe quelque chose en République de Corée..."
 korea.9.t: "Les rebelles du Sud demandent notre soutien"
 korea.9.d: "Des représentants du Mouvement de libération nationale coréen cherchant à renverser le gouvernement du Sud sont venus nous demander une alliance afin d'ouvrir un nouveau front le long de la DMZ."
 korea.9.a: "Nous nous joindrons à leur lutte !"
 korea.9.b: "Nous regarderons de côté."
 JUCHE_FACTION: "Front anti-impérialiste coréen"
 korea.10.t: "La Corée du Sud demande que nous mettions fin à notre protection du Nord"
 korea.10.d: "For quite some time now South Korea has endeavored to show that it no longer a country beholden to US interests. Relations between our two countries are at an all-time high, while our relations with the North have stagnated for the most part. Now a South Korean delegation has come to request an end to the defense treaty between us and the North Koreans. If we agree to their request, we will no longer come to North Korea's aid in the event of an external invasion."
 korea.10.a: "Nous serons aux côtés de nos alliés !"
 korea.10.b: "Le Nord ne mérite pas notre protection."
 korea.11.t: "Les sociétés d’armement coréennes proposent des produits"
 korea.11.d: "La République de Corée est bien connue pour sa capacité à produire des armes de haute qualité à des prix relativement abordables. Nous devrions réfléchir à l’opportunité d’acheter une partie de leur équipement, mais nos fonds ne sont pas illimités et nous devons donc choisir judicieusement."
 korea.11.a: "Achetez des chars coréens."
 korea.11.b: "Achetez de l'artillerie automotrice coréenne."
 korea.11.c: "Achetez des avions d'entraînement coréens."
 korea.11.e: "Achetez des fusils d'assaut coréens."
 korea.11.f: "Refusez l'offre."
 korea.12.t: "[FROM.GetName] accepte un marché d'armes !"
 korea.12.d: "Les représentants de ce pays ont accepté d'importer des armes de notre part, augmentant ainsi nos revenus et notre influence internationale."
 korea.12.a: "Notre rayonnement international grandit !"
 korea.13.t: "Pékin et Séoul critiquent conjointement les actions japonaises pendant la Seconde Guerre mondiale"
 korea.13.d: "Dans un geste rare, les gouvernements de la Chine et de la République de Corée ont publié une déclaration commune critiquant les actions du Japon en temps de guerre et son refus ultérieur de les expier pleinement. De nombreux observateurs ont interprété cette décision comme faisant partie des efforts de Séoul pour détourner la Chine de son soutien à la Corée du Nord. Alors que Pyongyang a exprimé son soutien à la condamnation conjointe de [KOR.GetLeader] et [CHI.GetLeader], [NKO.GetLeader] serait préoccupé par les signes indiquant que la Chine favorise de plus en plus Séoul."
 korea.13.a: "Nous n'oublierons jamais ce qu'ils ont fait."
 korea.13.b: "Leurs critiques sont lassantes..."
 korea.13.c: "Le passé jette une ombre longue..."
 korea.14.t: "La Chine annule le traité de défense avec la Corée du Nord"
 korea.14.d: "Suite au retrait de la présence militaire américaine en Corée du Sud, la Chine a accepté de se retirer de son traité de défense avec la Corée du Nord, suscitant une furieuse condamnation de la part de Pyongyang. Cette décision fait suite à une longue série de mesures prises par Séoul pour gagner le soutien de la Chine et démontrer son autonomie par rapport à Washington. Certains ont émis l’hypothèse que maintenant que la voie est libre pour une réunification forcée, [KOR.GetLeader] a décidé de reprendre le Nord par la force."
 korea.14.a: "Nos efforts ont porté leurs fruits."
 korea.14.b: "Nous tolérons Pyongyang depuis trop longtemps."
 korea.14.c: "La guerre est-elle à l’horizon ?"
 korea.15.t: "[KOR.GetLeader] Exige des réparations japonaises"
 korea.15.d: "Après des semaines de discours hostiles de la part de Séoul et de pressions exercées par des militants coréens, [KOR.GetLeader] a appelé le Japon à verser des réparations aux survivants des crimes de guerre japonais commis pendant la Seconde Guerre mondiale. Le Japon, qui affirme que l'affaire a été réglée entre son gouvernement et celui de la Corée du Sud sous le règne de l'homme fort et autoritaire Park Chung-hee, a refusé d'envisager de payer des réparations.\n\nBien que l'affaire n'ait pas abouti à une indemnisation pour les victimes coréennes, elle a conduit à un renforcement de la position politique de [KOR.GetLeader], de nombreux Coréens se rassemblant autour de cette cause nationale extrêmement émotive."
 korea.15.a: "Un jour, nous aurons justice."
 korea.15.b: "Leurs revendications sont absurdes !"
 korea.15.c: "Leur désaccord peut-il être résolu ?"
 korea.16.t: "Guerre!"
 korea.16.d: "La guerre a éclaté entre nous et le Nord. Conformément à notre accord avec les États-Unis, nous devons désormais confier le contrôle opérationnel de nos forces armées à l’armée américaine."
 korea.16.a: "Nous devons transférer le contrôle."
 korea.17.t: "La guerre est finie"
 korea.17.d: "La paix est revenue dans la péninsule coréenne. Maintenant que nous sommes revenus aux conditions du temps de paix, nous pouvons réaffirmer le contrôle de nos forces armées."
 korea.17.a: "La paix enfin."
 korea.18.t: "Les élections à l’Assemblée nationale se profilent alors que les partis commencent leur campagne"
 korea.18.d: "Avec les élections à l'Assemblée nationale qui auront lieu dans environ un mois, nous devrions commencer à accroître la popularité de notre parti afin de faciliter l'obtention d'une majorité à l'Assemblée législative pour les quatre prochaines années."
 korea.18.a: "Espérons une majorité !"
 korea.21.t: "Les résultats sont là !"
 korea.21.a: "Comme toujours, ce fut une élection âprement disputée."
 korea.21.d_no: "Malheureusement, aucun des deux principaux partis n’a réussi à obtenir la majorité à l’Assemblée nationale. Notre gouvernement devra lutter plus fort pour convaincre les législateurs des autres partis afin d’adopter des lois controversées."
 korea.21.d_con_loss: "Malheureusement, notre parti n'a pas réussi à obtenir une majorité à l'Assemblée nationale. Les législateurs libéraux refuseront d’adopter toute législation qui restreint les syndicats, soutient les grandes entreprises ou favorise l’antagonisme envers la Corée du Nord."
 korea.21.d_lib_loss: "Malheureusement, notre parti n'a pas réussi à obtenir une majorité à l'Assemblée nationale. Les législateurs conservateurs refuseront d’adopter toute législation qui restreint les grandes entreprises, réforme la conscription et les services de renseignement ou favorise la réconciliation avec la Corée du Nord."
 korea.21.d_con_win: "Heureusement, notre parti a réussi à obtenir une majorité à l'Assemblée nationale. Le législatif et l’exécutif pourront travailler main dans la main pour faciliter les objectifs conservateurs tels que limiter les syndicats, soutenir les chaebols et rester dur envers la Corée du Nord."
 korea.21.d_lib_win: "Heureusement, notre parti a réussi à obtenir une majorité à l'Assemblée nationale. Le législatif et l’exécutif pourront travailler main dans la main pour faciliter les objectifs libéraux tels que l’affaiblissement des chaebols, la réforme de l’appareil de sécurité et la poursuite de la réunification avec le Nord."
 korea.22.t: "Les chocs de la réunification commencent à s’installer"
 korea.22.d: "La grande nation coréenne a enfin été réunifiée, après plusieurs décennies de séparation douloureuse. Cependant, notre tâche consistant à réintégrer les deux moitiés est loin d’être terminée. Beaucoup de gens des deux côtés du 38e parallèle sont mécontents de la manière dont la réunification a eu lieu, et les coûts économiques de la réunification de deux États très différents deviennent rapidement évidents. Si nous échouons dans notre tâche de réunification du pays, nous risquons d’être confrontés à la dissolution de notre nation nouveau-née."
 korea.22.a: "Maintenant commence la partie la plus difficile..."
 korea.23.t: "Notre réponse à l'offre de paix du Sud"
 korea.23.d: "Après des semaines de discussions, le moment est venu pour nous de décider si nous sommes disposés à accepter l'offre de paix du Sud. Nous devons nous demander si nous avons confiance dans la sincérité de l'offre du Sud, mais aussi comment l'accord sur un traité de paix sera perçu par nos partisans nationaux qui espèrent encore un jour réunifier le pays par la force."
 korea.23.a: "Nous accepterons un traité."
 korea.23.b: "Il n'y aura jamais de paix entre nous !"
 korea.24.t: "Signature de l'accord de paix coréen"
 korea.24.d: "Suite à une amélioration des relations entre les deux Corées, [KOR.GetLeader] du Sud et [NKO.GetLeader] du Nord ont convenu de remplacer le fragile accord d'armistice par un accord de paix formel. Ce traité met enfin fin à l'état d'hostilités qui existe entre les deux Corées depuis la guerre de Corée. Les deux dirigeants ont exprimé l’espoir que cette évolution mettrait la péninsule sur la voie de la réunification, même si certains observateurs ont exprimé des doutes quant à la volonté de poursuivre la réunification des deux côtés."
 korea.24.a: "Un avenir radieux s’offre à la péninsule !"
 korea.25.t: "Les discussions intercoréennes échouent"
 korea.25.d: "Les pourparlers à Panmunjom entre [KOR.GetLeader] du Sud et [NKO.GetLeader] du Nord ont échoué en raison de divers désaccords entre les deux parties. Même si certains points d'accord ont laissé espérer une reprise des négociations à l'avenir, il est clair qu'un accord entre les deux Corées ne sera pas conclu avant un certain temps."
 korea.25.a: "La paix reste insaisissable..."
 korea.26.t: "La Corée du Sud propose la réunification"
 korea.26.d: "Cherchant à capitaliser sur une amélioration sans précédent des relations entre les deux Corées, le Sud propose de coopérer avec nous afin de réunifier notre nation divisée. Cependant, ils insistent sur le fait que le processus de réunification sera dirigé par le Sud, une exigence qui menace la culture politique unique que nous avons développée au Nord."
 korea.26.d1: "Cherchant à capitaliser sur une amélioration sans précédent des relations entre les deux Corées, le Sud propose de coopérer avec nous afin de réunifier notre nation divisée. Le Sud, comprenant nos préoccupations concernant la réunification, a proposé de partager le pouvoir après la réunification par le biais d'un gouvernement d'unité, intégrant des éléments du Nord ainsi que du Sud."
 korea.26.a: "Notre pays sera à nouveau entier !"
 korea.26.b: "La réunification ne pourra jamais avoir lieu dans ces conditions..."
 korea.27.t: "Le Nord a accepté nos conditions de réunification !"
 korea.27.d: "Après de longues négociations, le Nord a accepté de commencer à travailler à la réunification de nos deux pays ! Avec la stabilisation des relations entre les deux Corées et la réintégration de la péninsule à l’horizon, l’avenir du peuple coréen n’a jamais été aussi prometteur !"
 korea.27.a: "Excellente nouvelle !"
 korea.28.t: "Le Nord a refusé nos conditions de réunification !"
 korea.28.d: "Malheureusement, [NKO.GetLeader] a choisi de faire passer sa propre position égoïste avant celle du peuple coréen et a rejeté notre offre de coopérer à la réunification du pays. Ce rejet ne signifie pas que nous ne pouvons pas faire une nouvelle tentative pour l’avenir, mais cela signifie que la réunification n’aura pas lieu dans un avenir proche. Nous devons préparer le terrain pour garantir que notre prochaine tentative connaîtra un plus grand succès."
 korea.28.a: "Triste jour pour le peuple coréen..."
 korea.29.t: "La Chine demande la remise des dépouilles des membres de l'Armée populaire volontaire chinoise de la Corée du Sud à la Chine."
 korea.29.d: ""
 korea.29.a: "Bien sûr que nous le ferons. Nous respectons ces soldats."
 korea.29.b: "Ce sont nos ennemis et envahisseurs de notre terre ! Nous ne pouvons pas accepter cela !"
 korea.30.t: "Premier transfert des restes de soldats de l'Armée populaire volontaire de la République de Corée vers la Chine"
 korea.30.d: "\nLa première collection était constituée de restes trouvés lors de fouilles dans plusieurs régions telles que la province du Gangwon et la province du Gyeonggi. De nombreux restes n'étaient pas identifiables. La première collection était initialement estimée à 425 restes de soldats, mais cette estimation a ensuite été augmentée à 437.\n\nLa Chine et la Corée du Sud ont organisé une cérémonie de remise de ces dépouilles en Corée, à l'aéroport international d'Incheon. Les représentants chinois et coréens y ont signé la lettre de remise. La partie coréenne a envoyé vingt-deux véhicules pour transférer les restes. Après que les avions spéciaux de l'armée de l'air chinoise soient entrés dans l'espace aérien chinois, deux J-11 sont venus les escorter."
 korea.30.a: "Salute !"
 korea.31.t: "Septième transfert des restes de soldats de l'Armée populaire volontaire de la République de Corée vers la Chine"
 korea.31.d: "La Corée du Sud a remis 117 dépouilles à l'aéroport d'Incheon. Le ministre chinois des Anciens Combattants a assisté à la cérémonie. Les restes avaient été fouillés à Arrow Hill (le site de la bataille de White Horse) dans la zone démilitarisée nord-coréenne en 2019."
 korea.31.a: "Salute !"
 korea.33.t: "Notre réponse à l'offre de paix du Nord"
 korea.33.d: "Après des semaines de discussions, le moment est venu pour nous de décider si nous sommes disposés à accepter l'offre de paix du Nord. Nous devons nous demander si nous avons confiance dans la sincérité de l'offre du Nord, mais aussi dans quelle mesure l'accord sur un traité de paix sera perçu par ceux de notre peuple qui restent opposés à toute négociation avec le régime nord-coréen."
 korea.34.t: "La Corée du Nord propose la réunification"
 korea.34.d: "Cherchant à capitaliser sur une amélioration sans précédent des relations entre les deux Corées, le Nord propose de coopérer avec nous afin de réunifier notre nation divisée. Cependant, ils insistent sur le fait que le processus de réunification sera mené par le Nord, une exigence qui menace le mode de vie que nous avons cultivé au Sud."
 korea.34.d1: "Cherchant à capitaliser sur une amélioration sans précédent des relations entre les deux Corées, le Nord propose de coopérer avec nous afin de réunifier notre nation divisée. Le Nord, comprenant nos préoccupations concernant la réunification, a proposé de partager le pouvoir après la réunification par le biais d'un gouvernement d'unité, intégrant des éléments du Sud ainsi que du Nord."
 korea.35.t: "Le Sud a accepté nos conditions de réunification !"
 korea.35.d: "Après de longues négociations, le Sud a accepté de commencer à travailler à la réunification de nos deux pays ! Avec la stabilisation des relations entre les deux Corées et la réintégration de la péninsule à l’horizon, l’avenir du peuple coréen n’a jamais été aussi prometteur !"
 korea.36.t: "Le Sud a refusé nos conditions de réunification !"
 korea.36.d: "Malheureusement, [KOR.GetLeader] a choisi de faire passer sa propre position égoïste avant celle du peuple coréen et a rejeté notre offre de coopérer à la réunification du pays. Ce rejet ne signifie pas que nous ne pouvons pas faire une nouvelle tentative pour l’avenir, mais cela signifie que la réunification n’aura pas lieu dans un avenir proche. Nous devons préparer le terrain pour garantir que notre prochaine tentative connaîtra un plus grand succès."
 korea.37.t: "La Corée obtient un siège permanent au Conseil de sécurité de l'ONU"
 korea.37.d: "Lors de la réunion d'aujourd'hui du Conseil de sécurité de l'ONU, les cinq membres permanents ont accepté la candidature de la Corée pour devenir un nouveau membre permanent. La Corée s'est engagée à faire tout son possible pour maintenir la paix mondiale conformément à ses obligations en vertu de la Charte des Nations Unies."
 korea.37.a: "Le monde a finalement accordé à la Corée une certaine compensation pour sa division forcée."
 korea.38.t: "La Russie nous encourage à lancer des réformes économiques"
 korea.38.d: "[SOV.GetLeader] exhorte notre gouvernement à lancer des réformes de libéralisation des marchés occidentaux. Même s'il est tentant de connaître la même croissance économique rapide que celle de la Chine dans les années 1980, nous devrions mettre cela en balance avec l'instabilité qui résulterait inévitablement de la poursuite de telles réformes."
 korea.38.a: "L'heure n'est pas aux réformes!"
 korea.38.b: "Initier des réformes mineures."
 recognition.1.t: "[FROM.GetName] Recognizes the Breakaway"
 recognition.1.d: "[FROM.GetNameDef] has extended formal diplomatic recognition to the breakaway state on our territory. The decision is a setback for our claim to the region."
 recognition.1.a: "Nous ne serons pas divisés."
 recognition.3.t: "[FROM.GetName] Withdraws Recognition"
 recognition.3.d: "[FROM.GetNameDef] has reversed its earlier recognition of our sovereignty. Whatever the reason, the result is the same."
 recognition.3.a: "The struggle continues."
 recognition.4.t: "[FROM.GetName] Withdraws Recognition of the Breakaway"
 recognition.4.d: "[FROM.GetNameDef] has reversed its earlier recognition of the breakaway state on our territory. One fewer capital backs their claim to sovereignty."
 recognition.4.a: "A small victory for our position."
 recognition.7.t: "[FROM.GetName] rejoint les Nations Unies"
 recognition.7.d: "After a sustained campaign for international recognition, [FROM.GetNameDef] has been admitted to the United Nations General Assembly as a member state."
 recognition.7.a: "Welcome to the General Assembly."
 recognition.8.t: "[FROM.GetName] Pressures Us to Recognize [pressured_to_recognize]"
 recognition.8.d: "[FROM.GetNameDef] is leveraging its influence over us to force recognition of [pressured_to_recognize]. Refusing a partner with this much leverage carries a real cost."
 recognition.8.a: "We extend recognition."
 recognition.8.b: "We refuse to recognize this regime."
 internal_faction.1.t: "L'armée demande une augmentation de son budget"
 internal_faction.1.d: "Invoquant de nouvelles menaces pour notre sécurité nationale, l'armée a demandé une augmentation du budget de la défense [ROOT.GetAdjective]. Accéder à cette demande augmentera la pression sur notre budget, mais la refuser réduira l'opinion des militaires à l'égard de notre gouvernement."
 internal_faction.1.a: "Nous devrions leur donner l'argent."
 internal_faction.1.b: "Nous ne pouvons pas nous permettre cette dépense!"
 internal_faction.2.t: "Certains cadres du Parti communiste sont engagés dans des actes de corruption!"
 internal_faction.2.d: "Nos services de renseignement ont récemment découvert que certains responsables du Parti communiste acceptaient des pots-de-vin et pratiquaient un certain favoritisme. D'une part, nous ne devons pas laisser de telles activités impunies si nous voulons rester légitimes aux yeux du peuple, mais d'autre part, une telle démarche nous aliénera certainement de nombreux alliés importants au sein du Parti communiste."
 internal_faction.2.a: "Nous devrions fermer les yeux."
 internal_faction.2.b: "Nous devons en faire des exemples!"
 internal_faction.3.t: "Des conglomérats industriels demandent des allégements fiscaux"
 internal_faction.3.d: "Les dirigeants de certains des plus grands conglomérats industriels de [ROOT.GetName] font pression en privé sur notre gouvernement pour qu'il leur accorde davantage d'allégements fiscaux. L'octroi de ces allégements fiscaux améliorera l'opinion des conglomérats industriels à l'égard de notre gouvernement, mais réduira nos recettes fiscales à l'échelle nationale."
 internal_faction.3.a: "Nous devrions accorder des allégements fiscaux."
 internal_faction.3.b: "Nous ne pouvons pas nous permettre de faire une telle concession."
 isis.1.t: "Victoire sur l'État islamique"
 isis.1.d: "Maintenant que l'État islamique a été vaincu, notre pays ne sera plus assailli par la propagande extrémiste produite par l'État islamique. Nous pouvons maintenant nous concentrer sur la diffusion de nos idées dans notre pays, et ne plus jamais laisser les extrémistes prendre le dessus."
 isis.1.a: "Super"
 isis.2.t: "Infiltrer Tahrir al-Cham?"
 isis.2.d: "Ô Calife de tous les musulmans, [Root.GetLeader]. Nous devons frapper au cœur de notre vil ennemi, Tahrir al-Cham, qui refuse de reconnaître votre règne juste et légitime. Bien qu'ils se soient éloignés de la voie du véritable Islam et du glorieux djihad, ils comptent dans leurs rangs de nombreux bons combattants djihadistes. Inshallah, nous devrions les infiltrer et essayer d'en faire passer le plus grand nombre possible à notre glorieux califat!"
 isis.2.a: "Essayons de détourner les vrais combattants de cette fausse tenue de djihadiste!"
 isis.2.b: "Non, on ne peut pas se permettre de se quereller."
 isis.2.a_tt: "§HInfiltration échouée§! (Aucun effet)"
 isis.3.t: "Des combattants passent dans le camp de Daech"
 isis.3.d: "[Root.GetLeader]! Le soi-disant État « islamique » nous a infiltrés et a réussi à convaincre certains de nos meilleurs combattants de rejoindre leur excuse ridicule de califat. Nous ne devons pas laisser cela sans réponse, nous devons nous battre et vaincre ces Kharidjites qui font du takfir à gauche et à droite tout en utilisant le Saint Coran comme papier toilette."
 isis.3.a: "Nous, les djihadistes vertueux, les massacrerons comme des chiens!"
 isis.3.b: "Non, nous ne pouvons pas nous permettre un autre front dans cette guerre."
 isis.4.t: "Les unités de Tahrir al-Cham font défaut"
 isis.4.d: "Ô Calife, de nombreux frères muwahhides, justes et courageux, ont déserté le maléfique Front Tahrir al-Cham et ont rejoint notre cause!"
 isis.4.a: "Takbir! État islamique Takbir!"
 isis.4.a_tt: "Ajoute 2 §HBrigades du Jabhat al-Nosra§! à §HRaqqa§!."
 isis.5.t: "Signe de faiblesse de Tahrir al-Cham"
 isis.5.d: "Ô Calife, le dégoûtant front Tahrir al-Cham est plus faible que nous le pensions, ne faisant rien contre notre infiltration en leur sein et les récentes défections. Le conseil de guerre de la Shura recommande d'abattre leurs restes pourris comme des chiens et de prendre leur territoire - l'ajoutant à notre glorieux Califat!"
 isis.5.a: "Apprenez à ces faux culs de djihadistes qui est le vrai successeur du cheikh Osama!"
 isis.5.b: "Leur temps viendra, mais pour l'instant nous devons attendre."
 isis.6.t: "Des éléments de Tahrir al-Cham rejoignent notre califat"
 isis.6.d: "Ô Calife, le doux jus de la victoire est sur nos lèvres. Au bord de la défaite, les restes de Tahrir al-Cham ont prêté allégeance à vous, [Root.GetLeader], et à notre califat en pleine expansion."
 isis.6.a: "Nous accueillons nos frères dans le vrai califat!"
 isisNews.1.t: "Tahrir al-Cham rejoint l'État islamique"
 isisNews.1.d: "Face à la pression croissante exercée sur les islamistes syriens de Tahrir al-Cham, les forces restantes ont prêté allégeance à l'État islamique dans un ultime effort pour imposer leur idéologie fondamentaliste en Syrie."
 isisNews.1.a: "Que Dieu nous vienne en aide!"
 isis.7.t: "Caché"
 isis.7.d: "Caché"
 isis.7.a: "Caché"
 isis.1301.t: "Abu Fatima victime d'une frappe aérienne de la Coalition"
 isis.1301.d: "Mauvaise nouvelle, Calife! Votre bon ami et collègue député irakien, Abu Fatima al-Jaheishi a été courageusement martyrisé dans une lâche attaque aérienne des Américains.\n\n                                               Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isis.1301.a: "Nous le vengerons quand nous prendrons Washington!"
 isisNews.1301.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1301.d: "Le terroriste irakien et commandant principal de l'État islamique Abu Fatima al-Jaheishi a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. Abu Fatima faisait partie du cercle restreint d'al-Baghdadi et était le chef adjoint des régions d'Irak contrôlées par l'État islamique."
 isisNews.1301.a: "Bon débarras!"
 isis.1302.t: "Al-Sulami victime d'une frappe aérienne de la Coalition"
 isis.1302.d: "Mauvaise nouvelle, Calife! Le chef des religieux, Abu Sufyan al-Sulami, a été martyrisé dans une lâche attaque aérienne des Américains. Il nous était venu de la terre de Bahreïn et nous avait donné un soutien religieux essentiel pour notre califat.\n\n               Ô Calife, il nous a tous inspirés avec sa belle biographie de vous.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1302.t: "Un chef religieux de l'EI tué dans une frappe aérienne de la coalition"
 isisNews.1302.d: "Le terroriste bahreïni et haut responsable religieux de l'État islamique Turki al-Binali, connu sous son nom de code « Abu Sufyan al-Sulami », a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. Al-Binali n'était pas important pour l'effort militaire de l'État islamique, mais il a joué un rôle clé dans le soutien religieux du groupe et a écrit la première biographie d'Abu Bakr al-Baghdadi."
 isis.1303.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1303.d: "Mauvaise nouvelle, Calife! L'émir de nos combattants albanais et kosovars et commandant supérieur Lavdrim Muhaxheri a été martyrisé dans une lâche attaque aérienne par les chiens américains.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1303.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1303.d: "Lavdrim Muhaxheri, terroriste albanais du Kosovo et commandant principal de l'État islamique, a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. Muhaxheri a combattu en Afghanistan aux côtés de l'OTAN, mais s'est radicalisé vers 2012 et s'est rendu en Syrie. En 2013, il a rejoint l'État islamique et est rapidement devenu « émir » des combattants albanais et kosovars en Syrie et en Irak. C'était un criminel impitoyable qui décapitait personnellement des prisonniers."
 isis.1304.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1304.d: "Ô Calife, terrible nouvelle! Notre commandant militaire d'élite Gulmurod Khalimov a été victime d'une lâche attaque aérienne de la part des chiens américains. Avant de trouver son chemin vers nous depuis les terres des Tadjiks, il était un officier des forces spéciales de haut rang. Son savoir-faire militaire nous manquera cruellement.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1304.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1304.d: "Le terroriste tadjik et commandant principal de l'État islamique Gulmurod Khalimov a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. Khalimov était un officier des forces spéciales expérimenté et de haut rang dans les forces armées tadjikes avant de passer à l'État islamique."
 isis.1305.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1305.d: "Ô Calife, terrible nouvelle! Notre chef des opérations de martyre et formateur clé de moudjahid étrangers, Abdullah Ahmed al-Mashadani, a été victime d'une frappe aérienne par les chiens américains.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1305.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1305.d: "Le terroriste irakien et commandant principal de l'État islamique Abdullah Ahmed al-Mashadani a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. al-Mashadani jouait un rôle clé dans l'effort de guerre de l'État islamique en dirigeant les opérations d'attentats-suicides et en formant des djihadistes étrangers."
 isis.1306.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1306.d: "Ô Calife, mauvaise nouvelle! Notre gouverneur de la région centrale de l'Euphrate, Ahmed Khalal al-Juhayshi, a été victime d'une attaque aérienne des chiens américains.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1306.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1306.d: "Ahmed Khalal al-Juhayshi, terroriste irakien et membre senior de l'État islamique, a été tué aujourd'hui par une frappe aérienne de la coalition américaine. Al-Juhayshi n'était pas un commandant militaire de premier plan, mais un administrateur et un gouverneur de la région clé de l'Euphrate central pour l'État islamique."
 isis.1307.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1307.d: "Ô Calife, mauvaise nouvelle! Votre bon ami et chef de la logistique et des approvisionnements, Fares Reif al-Naima, a été victime d'une attaque aérienne des chiens américains. Il était un moudjahid courageux et loyal depuis longtemps, combattant contre les infidèles et les apostats depuis 2003.\n\n                                 Il a tué beaucoup de gens pour la gloire du califat.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1307.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1307.d: "Le terroriste irakien et commandant principal de l'État islamique, Fares Reif al-Naima, a été tué aujourd'hui lors d'une frappe aérienne de la coalition américaine. al-Naima a combattu les forces américaines pendant la guerre d'Irak et, après avoir été détenu par les forces américaines à Camp Bucca avec al-Baghdadi, il est devenu le chef de la logistique et des approvisionnements de l'État islamique."
 isis.1308.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1308.d: "Ô Calife, mauvaise nouvelle! Abu Ahmad al-Alwani a été victime d'une attaque aérienne des infidèles américains. Il était officier dans l'armée irakienne de Saddam Hussein, et nous a beaucoup aidé par sa perspicacité une fois qu'il a rejoint l'insurrection sunnite et notre bien-aimé État islamique.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1308.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1308.d: "Le terroriste irakien et commandant principal de l'État islamique, Abou Ahmad al-Alwani, a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. Al-Alwani était un officier de l'armée irakienne de Saddam Hussein, avant de rejoindre l'insurrection sunnite contre les forces américaines. Il a rapidement gravi les échelons au sein de l'État islamique d'Irak pour atteindre le poste de commandant principal."
 isis.1309.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1309.d: "Ô Calife, mauvaise nouvelle! Abu Muhammad al-Shimali a été victime d'une attaque aérienne des infidèles américains. Venu des terres d'Arabie, il nous aidait à faire passer notre pétrole en contrebande et à acheter nos armes. Il a recruté de nombreux moudjahid courageux pour notre califat, et sera éternellement loué pour son rôle clé dans l'organisation des attentats de Paris en 2015.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1309.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1309.d: "Le terroriste saoudien et commandant principal de l'État islamique, Abu Muhammad al-Shimali, a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. al-Shimali était un recruteur et un passeur clé pour l'État islamique. En outre, les rapports de renseignement suggèrent qu'il a joué un rôle déterminant dans l'aide aux attentats de Paris de 2015."
 isis.1310.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1310.d: "Ô Calife, désastre! Notre ministre de la guerre et commandant en second, Ayad al-Jumaili, a été courageusement martyrisé dans une attaque aérienne méprisable des chiens infidèles américains. Compagnon irakien, il était un officier de renseignement de haut rang sous Saddam Hussein, et a appliqué sa sagesse sur la façon de garder le califat à l'abri des ennemis internes en tant que chef du renseignement et de la sécurité interne.\n\n                                               Il a tué beaucoup de traîtres.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1310.t: "Le commandant en second de l'État islamique tué dans une frappe aérienne de la Coalition"
 isisNews.1310.d: "Le terroriste irakien et commandant en second de l'État islamique, Ayad al-Jumaili, a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. Al-Jumaili était un officier de renseignement de haut rang sous Saddam Hussein qui a rejoint l'insurrection sunnite après l'occupation américaine en 2003. Il est devenu chef du renseignement et de la sécurité interne de l'État islamique, puis a été promu commandant en second et ministre de la guerre."
 isis.1311.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1311.d: "Ô Calife, mauvaise nouvelle! Le commandant supérieur Khairy Abed Mahmoud al-Taey a été victime d'une attaque aérienne des infidèles américains. Compagnon irakien, il était membre de notre choura militaire et dirigeait des opérations d'engins explosifs improvisés (EEI), semant à juste titre la peur et le chaos dans le cœur de nos ennemis.\n\n                                               Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1311.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1311.d: "Le terroriste irakien et commandant principal de l'État islamique, Khairy Abed Mahmoud al-Taey, a été tué aujourd'hui dans une frappe aérienne de la coalition américaine. al-Taey faisait partie du conseil militaire de l'État islamique et dirigeait les opérations de pose d'engins explosifs improvisés (EEI), semant le chaos dans les villes attaquées par l'État islamique."
 isis.1312.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1312.d: "Ô Calife, mauvaise nouvelle! Votre ami, conseiller et commandant supérieur, Abdul Wahid Khutnayer Ahmad, a été victime d'une attaque aérienne des infidèles américains. Compagnon irakien, il était en charge de la sécurité intérieure.\n\n                                        Il a mis en déroute de nombreux traîtres et apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1312.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1312.d: "Le terroriste irakien et commandant principal de l'État islamique, Abdul Wahid Khutnayer Ahmad, a été tué aujourd'hui par une frappe aérienne de la coalition américaine. Khutnayer Ahmad était un conseiller clé d'al-Baghdadi et était chargé de la sécurité interne."
 isis.1313.t: "Commandant victime d'une frappe aérienne de la Coalition"
 isis.1313.d: "Ô Calife, horrible nouvelle! Notre commandant supérieur, Abu Jihad Shishani, a été victime d'une attaque aérienne des chiens infidèles américains. Il est venu à nous des terres des Tchétchènes, et a combattu courageusement pour la gloire d'Allah jusqu'à la fin.\n\n                                               Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.1313.t: "Un commandant de l'EI tué dans une frappe aérienne de la Coalition"
 isisNews.1313.d: "Le terroriste tchétchène et commandant principal de l'État islamique, Abu Jihad Shishani, a été tué aujourd'hui par une frappe aérienne de la coalition américaine. Shishani, un citoyen russe, était le commandant en second du groupe terroriste de l'Émirat du Caucase sous la direction d'Umar Shishani. Après qu'Umar se soit rendu en Syrie et ait rejoint l'État islamique, Abu Jihad a tenté de prendre le contrôle de l'Émirat du Caucase afin d'obtenir son allégeance à l'État islamique, mais il a fini par se rendre en Syrie pour combattre pour l'État islamique en tant que commandant principal."
 isis.11301.t: "Abu Fatima victime d'une frappe aérienne russe"
 isis.11301.d: "Mauvaise nouvelle, Calife! Votre bon ami et collègue député irakien, Abu Fatima al-Jaheishi a été victime d'une lâche attaque aérienne par les Russes.\n\n                                               Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isis.11301.a: "Nous le vengerons quand nous aurons conquis Moscou!"
 isisNews.11301.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11301.d: "Le terroriste irakien et commandant principal de l'État islamique Abu Fatima al-Jaheishi a été tué aujourd'hui par une frappe aérienne russe. Abou Fatima faisait partie du cercle restreint d'al-Baghdadi et occupait le poste de chef adjoint des régions d'Irak contrôlées par l'État islamique."
 isisNews.11301.a: "Bon débarras!"
 isis.11302.t: "Al-Sulami victime d'une frappe aérienne russe"
 isis.11302.d: "Mauvaise nouvelle, Calife! L'ecclésiastique en chef Abu Sufyan al-Sulami a été victime d'une lâche attaque aérienne de la part des Russes. Il nous venait de la terre de Bahreïn et nous apportait un soutien religieux essentiel pour notre califat.\n\n                 Ô Calife, il nous a tous inspirés avec sa belle biographie de vous.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11302.t: "Un chef religieux de l'EI tué dans une frappe aérienne russe"
 isisNews.11302.d: "Le terroriste bahreïni et haut responsable religieux de l'État islamique Turki al-Binali, connu sous son nom de code « Abu Sufyan al-Sulami », a été tué aujourd'hui dans une frappe aérienne russe. Al-Binali n'a pas joué un rôle important dans l'effort militaire de l'État islamique, mais il a joué un rôle clé dans le soutien religieux du groupe et a écrit la première biographie d'Abu Bakr al-Baghdadi."
 isis.11303.t: "Commandant victime d'une frappe aérienne russe"
 isis.11303.d: "Mauvaise nouvelle, Calife! L'émir de nos combattants albanais et kosovars et commandant supérieur Lavdrim Muhaxheri a été victime d'une lâche attaque aérienne des chiens russes.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11303.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11303.d: "Lavdrim Muhaxheri, terroriste albanais du Kosovo et commandant principal de l'État islamique, a été tué aujourd'hui par une frappe aérienne russe. Muhaxheri a combattu en Afghanistan aux côtés de l'OTAN, mais s'est radicalisé vers 2012 et s'est rendu en Syrie. En 2013, il a rejoint l'État islamique et est rapidement devenu « émir » des combattants albanais et kosovars en Syrie et en Irak. C'était un criminel impitoyable qui décapitait personnellement des prisonniers."
 isis.11304.t: "Commandant victime d'une frappe aérienne russe"
 isis.11304.d: "Ô Calife, terrible nouvelle! Notre commandant militaire d'élite Gulmurod Khalimov a été victime d'une lâche attaque aérienne de la part des chiens russes. Avant de trouver son chemin vers nous depuis les terres des Tadjiks, il était un officier des forces spéciales de haut rang. Son savoir-faire militaire nous manquera cruellement.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11304.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11304.d: "Le terroriste tadjik et commandant principal de l'État islamique Gulmurod Khalimov a été tué aujourd'hui par une frappe aérienne russe. Khalimov était un officier des forces spéciales expérimenté et de haut rang dans les forces armées tadjikes avant de passer à l'État islamique."
 isis.11305.t: "Commandant victime d'une frappe aérienne russe"
 isis.11305.d: "Ô Calife, terrible nouvelle! Notre chef des opérations de martyre et formateur clé de moudjahid étrangers, Abdullah Ahmed al-Mashadani, a été victime d'une frappe aérienne par les chiens russes.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11305.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11305.d: "Le terroriste irakien et commandant principal de l'État islamique Abdullah Ahmed al-Mashadani a été tué aujourd'hui dans une frappe aérienne russe. al-Mashadani jouait un rôle clé dans l'effort de guerre de l'État islamique en dirigeant les opérations d'attentats-suicides et en formant des djihadistes étrangers."
 isis.11306.t: "Commandant victime d'une frappe aérienne russe"
 isis.11306.d: "Ô Calife, mauvaise nouvelle! Notre gouverneur de la région centrale de l'Euphrate, Ahmed Khalal al-Juhayshi, a été victime d'une attaque aérienne des chiens russes.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11306.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11306.d: "Ahmed Khalal al-Juhayshi, terroriste irakien et membre senior de l'État islamique, a été tué aujourd'hui par une frappe aérienne russe. Al-Juhayshi n'était pas un commandant militaire de premier plan, mais un administrateur et un gouverneur de la région clé de l'Euphrate central pour l'État islamique."
 isis.11307.t: "Commandant victime d'une frappe aérienne russe"
 isis.11307.d: "Ô Calife, mauvaise nouvelle! Votre bon ami et chef de la logistique et des approvisionnements, Fares Reif al-Naima, a été victime d'une frappe aérienne des chiens russes. Il était un moudjahid courageux et loyal depuis longtemps, combattant contre les infidèles et les apostats depuis 2003.\n\n                             Il a tué beaucoup de gens pour la gloire du califat.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11307.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11307.d: "Le terroriste irakien et commandant principal de l'État islamique, Fares Reif al-Naima, a été tué aujourd'hui dans une frappe aérienne russe. Al-Naima a combattu les forces américaines pendant la guerre d'Irak et, après avoir été détenu par les forces américaines à Camp Bucca avec al-Baghdadi, il est devenu le chef de la logistique et des approvisionnements de l'État islamique."
 isis.11308.t: "Commandant victime d'une frappe aérienne russe"
 isis.11308.d: "Ô Calife, mauvaise nouvelle! Abu Ahmad al-Alwani a été victime d'une attaque aérienne des infidèles russes. Il était officier dans l'armée irakienne de Saddam Hussein, et nous a beaucoup aidé avec sa perspicacité une fois qu'il a rejoint l'insurrection sunnite et notre bien-aimé État islamique.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11308.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11308.d: "Le terroriste irakien et commandant principal de l'État islamique, Abou Ahmad al-Alwani, a été tué aujourd'hui par une frappe aérienne russe. Al-Alwani était officier dans l'armée irakienne de Saddam Hussein, avant de rejoindre l'insurrection sunnite contre les forces américaines. Il a rapidement gravi les échelons au sein de l'État islamique d'Irak pour atteindre le poste de commandant principal."
 isis.11309.t: "Commandant victime d'une frappe aérienne russe"
 isis.11309.d: "Ô Calife, mauvaise nouvelle! Abu Muhammad al-Shimali a été victime d'une attaque aérienne des infidèles russes. Venu des terres d'Arabie, il nous aidait à faire passer notre pétrole en contrebande et à acheter nos armes. Il a recruté de nombreux moudjahid courageux pour notre califat, et sera éternellement loué pour son rôle clé dans l'organisation des attentats de Paris en 2015.\n\n                                                Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11309.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11309.d: "Le terroriste saoudien et commandant principal de l'État islamique, Abu Muhammad al-Shimali, a été tué aujourd'hui dans une frappe aérienne russe. Al-Shimali était un recruteur et un passeur clé pour l'État islamique. En outre, les rapports de renseignement suggèrent qu'il a joué un rôle déterminant dans l'aide aux attentats de Paris de 2015."
 isis.11310.t: "Commandant victime d'une frappe aérienne russe"
 isis.11310.d: "Ô Calife, désastre! Notre ministre de la guerre et commandant en second, Ayad al-Jumaili, a été victime d'une attaque aérienne méprisable des chiens infidèles russes. Compagnon irakien, il était un officier de renseignement de haut rang sous Saddam Hussein, et a appliqué sa sagesse sur la façon de garder le califat à l'abri des ennemis internes en tant que chef du renseignement et de la sécurité interne.\n\n                                               Il a tué beaucoup de traîtres.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11310.t: "Le commandant en second de l'EI tué dans une frappe aérienne russe"
 isisNews.11310.d: "Le terroriste irakien et commandant en second de l'État islamique, Ayad al-Jumaili, a été tué aujourd'hui dans une frappe aérienne russe. Al-Jumaili était un officier de renseignement de haut rang sous Saddam Hussein qui a rejoint l'insurrection sunnite après l'occupation américaine en 2003. Il est devenu chef du renseignement et de la sécurité interne de l'État islamique, avant d'être promu commandant en second et ministre de la guerre."
 isis.11311.t: "Commandant victime d'une frappe aérienne russe"
 isis.11311.d: "Ô Calife, mauvaise nouvelle! Le commandant supérieur Khairy Abed Mahmoud al-Taey a été victime d'une attaque aérienne menée par les infidèles russes. Compagnon irakien, il était membre de notre choura militaire et dirigeait des opérations d'engins explosifs improvisés (EEI), semant à juste titre la peur et le chaos dans le cœur de nos ennemis.\n\n                                               Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11311.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11311.d: "Le terroriste irakien et commandant principal de l'État islamique, Khairy Abed Mahmoud al-Taey, a été tué aujourd'hui par une frappe aérienne russe. al-Taey faisait partie du conseil militaire de l'État islamique et dirigeait les opérations de pose d'engins explosifs improvisés (EEI), semant le chaos dans les villes attaquées par l'État islamique."
 isis.11312.t: "Commandant victime d'une frappe aérienne russe"
 isis.11312.d: "Ô Calife, mauvaise nouvelle! Votre ami, conseiller et commandant supérieur, Abdul Wahid Khutnayer Ahmad, a été martyrisé dans une attaque aérienne des infidèles russes. Compagnon irakien, il était en charge de la sécurité intérieure.\n\n                                       Il a mis en déroute de nombreux traîtres et apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11312.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11312.d: "Le terroriste irakien et commandant principal de l'État islamique, Abdul Wahid Khutnayer Ahmad, a été tué aujourd'hui par une frappe aérienne russe. Khutnayer Ahmad était un conseiller clé d'al-Baghdadi et était chargé de la sécurité interne."
 isis.11313.t: "Commandant victime d'une frappe aérienne russe"
 isis.11313.d: "Ô Calife, horrible nouvelle! Notre commandant supérieur, Abu Jihad Shishani, a été victime d'une attaque aérienne des chiens infidèles russes. Il est venu à nous des terres des Tchétchènes, et a combattu courageusement pour la gloire d'Allah jusqu'à la fin.\n\n                                               Il a tué de nombreux apostats.\n\n                                         Qu'Allah accepte son martyre."
 isisNews.11313.t: "Un commandant de l'EI tué dans une frappe aérienne russe"
 isisNews.11313.d: "Le terroriste tchétchène et commandant principal de l'État islamique, Abu Jihad Shishani, a été tué aujourd'hui par une frappe aérienne russe. Shishani, un citoyen russe, était le commandant en second du groupe terroriste de l'Émirat du Caucase sous la direction d'Umar Shishani. Après qu'Umar s'est rendu en Syrie et a rejoint l'État islamique, Abu Jihad a tenté de prendre le contrôle de l'Émirat du Caucase afin de prêter allégeance à l'État islamique, mais a fini par se rendre en Syrie pour combattre pour l'État islamique en tant que commandant principal également."
 brotherhood.6.t: "Les manifestants des Frères musulmans exigent des élections"
 brotherhood.6.d: "Les [Root.GetAdjective] Frères musulmans occupent les places centrales des villes de tout le pays, scandant des slogans et exigeant des élections libres. Ils sont bien organisés, nos deux seules véritables alternatives sont donc de nettoyer les places par la force, et de traquer et d'arrêter les dirigeants et les organisateurs – ou de répondre à leurs demandes et d'autoriser des élections."
 brotherhood.6.a: "Éliminons cette racaille de la rue et traquons leurs chefs."
 brotherhood.6.b: "Répondre à leurs demandes - organiser des élections."
 brotherhood.7.t: "La brutalité de la répression se retourne contre nous"
 brotherhood.7.d: "Au lieu de s'en prendre stratégiquement aux dirigeants et de leur montrer l'exemple, on a assisté à une série d'exécutions extrajudiciaires de partisans de bas niveau des Frères musulmans, voire de leurs familles. Ces injustices augmentent la demande de changement de gouvernement au sein de la population. Les conseillers du gouvernement soulignent que l'augmentation du financement de la sécurité intérieure réduira les risques que cela se reproduise."
 brotherhood.7.a: "Réprimander la police et l'armée."
 brotherhood.8.t: "Des terroristes des Frères musulmans font une descente dans une prison"
 brotherhood.8.d: "Des membres armés du groupe terroriste des Frères musulmans ont lancé une attaque réussie contre une prison gouvernementale détenant à la fois des criminels, des terroristes et des opposants politiques. Les gardes ont été tués et les prisonniers libérés. Il s'agit d'un revers majeur dans nos efforts pour détruire les maléfiques Frères musulmans."
 brotherhood.8.a: "Maudits terroristes!"
 brotherhood.9.t: "Démantèlement d'une cellule terroriste des Frères musulmans"
 brotherhood.9.d: "Les forces de sécurité [Root.GetAdjective] ont réussi à infiltrer l'une des principales cellules dirigeantes des Frères musulmans - et ont réussi à arrêter les meneurs et leurs associés. Des armes et des plans visant à assassiner des responsables gouvernementaux ont été découverts sur les lieux.\n\nLe procès est prévu pour demain, les exécutions auront lieu peu après."
 brotherhood.9.a: "[Root.GetLeader] est à nouveau victorieux!"
 brotherhood.10.t: "L'insurrection des Frères musulmans tourne à la guerre civile"
 brotherhood.10.d: "Notre répression violente des Frères musulmans a échoué - leur soutien n'a fait que croître. Ils ont même réussi à obtenir un soutien important parmi les soldats et quelques généraux traîtres sont passés de leur côté. Ce n'est plus une affaire pour nos forces de sécurité - c'est une guerre totale."
 brotherhood.10.a: "Nous les vaincrons."
 brotherhood.10.b: "En fait, jouons-les."
 jihadi.5.t: "L'insurrection djihadiste salafiste dégénère en guerre civile"
 jihadi.5.d: "Notre tentative de répression des djihadistes salafistes a échoué, et ils ont réussi à créer suffisamment de chaos et d’insécurité au point que de nombreux [ROOT.GetAdjective] se sentent plus en sécurité d’être gouvernés par les djihadistes que par notre gouvernement. Ils ont même réussi à radicaliser des soldats et quelques généraux traîtres ont fait défection à leurs côtés. Ce n’est plus l’affaire de nos forces antiterroristes : c’est la guerre totale."
 jihadi.5.a: "Nous les vaincrons!"
 jihadi.5.b: "Il est temps de quitter le navire..."
 Yemen.4.t: "La guerre au Yémen est terminée"
 Yemen.4.d: "Le pays étant en ruine, la guerre civile yéménite a finalement pris fin, accordant la victoire au gouvernement dirigé par Hadi, soutenu par la coalition saoudienne. Dans les derniers jours du conflit, les forces de la coalition ont réussi à capturer et à détruire les dépôts de munitions des Houthis et d'Al-Qaïda, y compris les tristement célèbres missiles Scud Burkan 2-H. Même si beaucoup restent fidèles aux Houthis, ils ont été désarmés et, dans les prochains jours, les radicaux zaydites restants seront extirpés et traités. La démocratie a prévalu dans la région avec l'aide de la coalition saoudienne et de sa campagne Restaurer l'Espoir, et le pays du Yémen est sur le point d'être reconstruit."
 Yemen.4.d2: "Le gouvernement dirigé par Hadi étant réduit en ruines, la cause des Houthis s'est retrouvée à l'avant-garde du futur leadership du Yémen. Comme c'était leur objectif, les Houthis ont réussi à chasser le salafisme et le dévouement aux idéologies occidentales de la région et de ceux qui se sont battus pour cela, alors qu'Al-Qaïda et les forces de la coalition sont en ruine. Ayant désormais l'entière responsabilité de diriger le Yémen vers l'avenir, le gouvernement Houthi a entamé le processus de transformation de son État intérimaire et s'est désormais engagé sur la voie de la reconstruction du pays. La coalition saoudienne s'est retirée de la région et a fait de l'opération Restoring Hope un échec complet et total."
 Yemen.4.d3: "Après des années de combats entre le gouvernement yéménite et les rebelles Houthis, le vainqueur le plus improbable de tous est sorti du conflit. Les restes d'Al-Qaïda au Yémen se sont retrouvés comme les architectes d'un nouveau califat dans la région et ont subi une transformation pour l'avenir qui mettra en danger tous les infidèles de la région. La coalition saoudienne et l'opération Restoring Hope ont été un échec complet, et leur incompétence n'a pas permis de prédire sa propre défaite face à un ennemi qui n'avait jamais été aussi grave. Les djihadistes ont pris le dessus et ont clairement fait savoir que ce n'était qu'un début et que le reste du monde comprendrait bientôt ce que ce nouveau califat pouvait faire."
 Yemen.4.a: "La victoire est enfin nôtre..."
 Yemen.4.b: "Mais à quel prix?"
 Yemen.4.c: "Ça aurait pu être pire..."
 Yemen.4.e: "Intéressant"
 Yemen.4.f: "Intéressant"
 Yemen.6.t: "Tirer un missile sur Riyad?"
 Yemen.6.d: "Tirer un missile sur la capitale saoudienne montrera aux Saoudiens que nous sommes une force avec laquelle il faut compter."
 Yemen.6.a: "Faites-le!"
 Yemen.6.b: "Trop risqué."
 Yemen.7.t: "Les Houthis tirent un missile balistique sur Riyad"
 Yemen.7.d: "La coalition dirigée par l'Arabie saoudite qui combat les rebelles houthis du Yémen affirme avoir intercepté un missile tiré depuis le pays voisin vers la capitale du royaume, Riyad. Les rebelles houthis ont annoncé mardi avoir lancé un missile balistique visant le palais royal d'al-Yamama, à l'occasion du millier de jours écoulés depuis le début de la campagne de bombardements de la coalition au Yémen."
 Yemen.7.a: "Euh..."
 Saleh.1.t: "La lutte pour le pouvoir des Houthis"
 Saleh.1.d: "L'alliance improbable entre les rebelles Houthis et le Congrès général du peuple d'Ali Abdallah Saleh est en terrain fragile depuis le jour de sa conception. Avec l'aide des membres de notre coalition opérant au Yémen, nous avons découvert que l'ancien président Saleh éprouve un mécontentement croissant à l'égard des dirigeants houthis, et à juste titre. Les Houthis s'opposent au contrôle effectif des puissances étrangères et cherchent à restaurer le Yémen en tant qu'entité totalement indépendante, libre du salafisme et des idéaux occidentaux. Saleh, de son côté, souhaite restaurer le Yémen en tant que pays libre, uni et démocratique, désireux de participer dans une certaine mesure aux affaires étrangères, même s'il a ses raisons d'en vouloir à un certain nombre de pays occidentaux. Cette relation est vouée à dégénérer en un futur conflit entre les deux partis, et c'est peut-être ce dont la coalition a besoin."
 Saleh.1.a: "Nous n'avons pas le temps pour ça..."
 Saleh.1.b: "Appelez le président Saleh..."
 Saleh.2.t: "Saleh suggère un dialogue de coalition"
 Saleh.2.d: "Ali Abdullah Saleh, chef du Congrès général populaire aligné sur la cause des Houthis, suggère que le CPG et les dirigeants des Houthis entament des pourparlers avec la coalition dirigée par l'Arabie saoudite qui opère actuellement aux côtés du Yémen du président Hadi. Bien que nous le considérions très étroitement comme un allié, il semble qu'il ait changé d'avis, et pas dans le bon sens. Il suggère désormais sévèrement aux dirigeants houthis de décider si cette guerre civile brutale doit ou non se poursuivre. La probabilité que nous sortions de ces négociations avec quelque chose à gagner est très faible, et cela pourrait très bien être un stratagème visant à nous écarter du pouvoir."
 Saleh.2.a: "Absolument pas!"
 Saleh.2.b: "Ça ne peux pas faire de mal..."
 Saleh.3.t: "Les dirigeants houthis sont prêts à parler"
 Saleh.3.d: "Sous la pression de l'ancien président yéménite Ali Abdullah Saleh, les dirigeants des insurgés houthis à Sanaa sont prêts à tenter de s'entendre avec Hadi et notre coalition."
 Saleh.3.a: "Eh bien, rassemblez la coalition."
 Saleh.3.b: "Ce n'est probablement pas une bonne idée..."
 Saleh.5.t: "Saleh s'engage sur une voie dangereuse"
 Saleh.5.d: "Après des années d'alliance indécise et instable entre les Houthis et les forces républicaines, l'ancien président yéménite, Ali Abdullah Saleh, a prononcé un discours adressé à la coalition dirigée par l'Arabie saoudite, soulignant la soi-disant stupidité de la cause des Houthis. Saleh a déclaré que si la coalition levait son blocus et ouvrait les aéroports pour faciliter l'effort humanitaire, lui et ses forces républicaines seraient prêts à prêter allégeance à l'Arabie saoudite, se déclarant ainsi ennemi de notre alliance. Saleh a semblé pleinement engagé dans son dernier discours et a publiquement déclaré qu'un nouveau chapitre de l'histoire du Yémen, au milieu de cette crise humanitaire, était ouvert, en tant que Yémen uni, libre et démocratique. Les paroles de Saleh: Je vais combattre les ennemis de l'humanité et les ennemis de notre patrie qui s'efforcent d'effacer son identité, de détruire ses acquis et d'humilier les Yéménites!"
 Saleh.5.a: "Trouvez ce traître..."
 Saleh.5.b: "Il n'a pas le courage de le faire..."
 Saleh.6.t: "Saleh est en fuite"
 Saleh.6.d: "Après avoir prononcé une série de discours traîtres, Ali Abdullah Saleh a clairement fait savoir qu'il ne souhaitait plus travailler aux côtés des Houthis. Abdul-Malik Al-Houthi était au courant de la trahison imminente de Saleh et il lui a adressé plusieurs avertissements, qui n'ont pas tous été pris en compte. Abdul-Malik Al-Houthi a déclaré qu'il s'agissait d'un acte de trahison, qui a ensuite conduit à la destruction de la maison de Saleh à Sanaa par des tirs de mortier houthis, et il fuit désormais le pays. Les combattants houthis sont à ses trousses et ont réussi à le pousser dans un piège potentiellement mortel au sud de Sanaa, où les combats entre les Houthis et la coalition font toujours rage. Un certain nombre de combattants qui occupent le front sont prêts à se retirer et à intervenir sous votre commandement."
 Saleh.6.a: "Appuyer sur la gâchette..."
 Saleh.6.b: "Le laisser partir..."
 Saleh.7.t: "Le Conseil politique suprême"
 Saleh.7.d: "Une fois la guerre gagnée, le moment est venu de reconstruire notre pays pour lequel nous avons combattu si désespérément pour le libérer de ses dirigeants malavisés. Nos associés du Comité révolutionnaire suprême, un gouvernement intérimaire que nous avions mis en place au milieu de la guerre civile, nous rappellent leur contribution à l'effort de guerre et nous exhortent à mettre en œuvre notre plan initial consistant à diviser notre conseil présidentiel de manière égale entre les deux partis. Rappelons-nous qu'un certain nombre de ces hommes faisaient partie de ceux contre lesquels nous avons commencé ce combat et avec lesquels nous ne pouvions pas maintenir une alliance stable. Nous ne pouvons pas prévoir l'avenir, mais leur accorder un siège au Parlement pourrait très bien nous ramener à l'incertitude que nous cherchions à détruire."
 Saleh.7.a: "Nous nous sommes battus pour obtenir cette position et nous nous battrons pour la défendre."
 Saleh.7.b: "C'est absurde, nous reconstruirons notre nation ensemble."
 Saleh.8.t: "Les dirigeants Houthis rejettent la suggestion de Saleh"
 Saleh.8.d: "Après notre entretien avec l'ancien président yéménite, Ali Abdullah Saleh, il s'est efforcé de convaincre les dirigeants houthis de parvenir à une conclusion sur la poursuite ou non de leur guerre. Comme nous nous y attendions, il a été rejeté sans arrière-pensée. Les Houthis semblent plus que catégoriques quant à la poursuite de leur effort de guerre visant à renverser le gouvernement démocratique du Yémen. Cela a porté atteinte à l'alliance entre le Congrès général du peuple de Saleh et les rebelles Houthis, et si nous poussons Saleh plus fort, il pourrait être disposé à rompre enfin ses liens avec cette cause malavisée."
 Saleh.8.a: "Nous devons faire plus d'efforts!"
 Saleh.8.b: "Oubliez ça..."
 Saleh.9.t: "Saleh persiste"
 Saleh.9.d: "Ali Abdullah Saleh suggère une fois de plus d'ouvrir des négociations avec la coalition dirigée par l'Arabie Saoudite, qui, je dois vous le rappeler, est notre ennemie. Il est vrai que notre alliance avec le CPG a toujours été dans un état critique, mais cette persistance de Saleh n'est pas sortie de nulle part, il doit avoir un motif. Il ne serait pas fou de croire que la coalition dirigée par les Saoudiens soit en contact avec lui, il faut surveiller cela de près."
 Saleh.9.a: "Cela pourrait effectivement être une bonne idée..."
 Saleh.9.b: "Ali, arrêtez ça immédiatement, sinon..."
 Saleh.9.c: "M. Saleh, puis-je vous parler?"
 HOU_Saleh.1: "Ali Abdullah Saleh sera poursuivi par les combattants Houthis."
 HOU_Saleh.2: "Ali Abdullah Saleh sera contacté pour mettre un terme à la guerre civile yéménite, avec notre aide. Que ce soit par la diplomatie ou par la force brute, nous devons le convaincre de participer à un dialogue avec notre coalition."
 HOU_Saleh.3: "Notre alliance n'a jamais été aussi forte qu'elle l'aurait été dans l'idéal, mais j'apprécie notre allégeance, même si cela ne semble pas être le cas. Je comprends que vous souhaitiez une conclusion à cette guerre, mais malheureusement, je ne peux pas me permettre, ni à mes camarades, de faire face à ce diable de coalition. Vous comprenez sûrement?"
 HOU_Saleh.4: "Ali est déçu."
 HOU_Saleh.5: "Ali sera recontacté."
 HOU_Saleh.6: "Ali recule visiblement et quitte la pièce."
 HOU_Saleh.7: "Ali sera à nouveau contacté, mais que ce soit le dernier avertissement pour lui: s'il reste aligné avec notre ennemi, lui aussi sera traité comme un ennemi."
 Saleh.10.t: "Saleh nous fait perdre notre temps..."
 Saleh.10.d: "Une fois de plus, Ali Abdullah Saleh, chef du Congrès général du peuple allié aux rebelles houthis, s'est vu refuser par les dirigeants houthis la possibilité d'entamer des pourparlers de paix avec notre coalition. Il est clair depuis le début que les dirigeants houthis refusent de dialoguer avec nous, nous considérant comme un ennemi juré. L'alliance entre le Congrès général du peuple et les Houthis étant cruciale, nous devons adresser immédiatement un ultimatum à Ali Abdullah Saleh. Sans lui, les partis au pouvoir des Houthis seront désorganisés, privés des compétences et des talents nécessaires. Avec lui, la direction possède les compétences requises, même si elle manque parfois de capacité à mener à bien des projets, mais elle pourrait potentiellement conduire les Houthis à la victoire."
 Saleh.10.a: "Soit il agit, soit nous ne pouvons pas garantir sa sécurité.."
 Saleh.10.b: "C'est inutile..."
 Saleh.11.t: "Le Congrès Général Populaire nous fait défaut!"
 Saleh.11.d: "Même après de nombreuses occasions au cours desquelles les forces républicaines de Saleh ont échangé des tirs avec les nôtres, nous sommes formellement restés alliés. Ces traîtres ne se sont plus officiellement déclarés nos ennemis après que leur chef traître, Ali Abdullah Saleh, ait été à juste titre éliminé. Le CPG et ses troupes participent activement à des échanges de tirs avec nous dans les rues de nos villes, nous devons y mettre un terme immédiatement."
 Saleh.11.a: "Traîtres! J'aurais du le voir venir!"
 Saleh.12.t: "L'ancien président yéménite Ali Abdullah Saleh assassiné!"
 Saleh.12.d: "Cette journée est considérée comme une victoire majeure pour la cause des Houthis, car l'homme qui cherchait à les déchirer de l'intérieur a désormais été vaincu. Les Houthis ont longtemps cru que Saleh avait été en contact avec la coalition dirigée par l'Arabie Saoudite, mais ce n'est que récemment que M. Saleh a montré ses vraies couleurs aux Houthis et a tenté de se ranger du côté de la coalition en déclarant un accord. nouveau chapitre de l'unification et de la démocratie au Yémen. Cela a suscité une grande colère chez les Houthis, et avec le départ de Saleh, ils affirment que leur moral est en plein essor."
 Saleh.12.a: "Bon travail les gars."
 Saleh.12.b: "C'est troublant..."
 Saleh.12.c: "Intéressant"
 Saleh.13.t: "Saleh renouvelle l'alliance CPG-Houthi"
 Saleh.13.d: "Le chef du Congrès général du peuple, allié de longue date des Houthis, même s'il n'est pas dans les meilleures conditions, a déclaré le renouvellement de l'alliance autrefois divisée. Ali Abdullah Saleh a annoncé publiquement l'ouverture d'un nouveau chapitre dans l'avenir du Yémen, un chapitre dans lequel le CPG et les Houthis travailleront ensemble pour restaurer la nation ruinée. Saleh a posé une condition: que les dirigeants Houthis officialisent le Conseil politique suprême, un gouvernement intérimaire mis en place en temps de guerre, et divisent le pouvoir entre les deux alliances, comme cela était initialement prévu."
 Saleh.13.a: "Est-ce que c'est bon? Je ne peux pas le dire."
 Saleh.13.b: "Mince"
 Saleh.14.t: "La Coalition se rassemble"
 Saleh.14.d: "Les dirigeants houthis opposés au gouvernement démocratique dirigé par Hadi au Yémen ont montré qu'ils étaient prêts à s'asseoir à la table des négociations et à parler de la situation humanitaire actuelle au Yémen. L'Arabie saoudite, chef de la coalition opérant au Yémen, a invité tous ses membres à un sommet diplomatique qui se tiendra à Abu Dhabi, aux Émirats arabes unis. Les invités spéciaux seront Abdul-Malik Al-Houthi lui-même, ainsi que son associé Ali Abdullah Saleh."
 Saleh.14.a: "Nous devons y assister."
 Saleh.14.b: "Désolé, nous n'avons pas le temps pour ça."
 Saleh.14.c: "Nous serions honorés d'accueillir ce sommet."
 Saleh.15.t: "Le sommet commence"
 Saleh.15.d: "Ceux qui ont choisi d'assister à ce sommet prennent place et attendent le début des discussions. Les Houthis ont mentionné qu'ils n'entraient pas dans cette discussion avec l'intention de se rendre, nous devons donc les convaincre de voir le conflit d'un point de vue extérieur. Cette guerre au Yémen a été l'une des plus grandes crises humanitaires de mémoire récente, et il serait avantageux pour toutes les parties de mettre un terme à la guerre le plus rapidement possible. Pour faire vite, partageons nos revendications..."
 Saleh.15.a: "Rendez-vous et restituez tous les territoires au gouvernement légitime du Yémen."
 Saleh.15.b: "Cessez immédiatement le conflit et les deux États resteront indépendants."
 Saleh.15.c: "Toutes les terres revendiquées par les Houthis doivent être déclarées État arabe."
 Saleh.16.t: "La Coalition exige la reddition"
 Saleh.16.d: "Nous avons été invités à ce sommet à Abu Dhabi pour discuter d'une éventuelle fin de la guerre que nous menons depuis des années maintenant, et nous avons réalisé que tout cela n'était qu'une perte de temps. Dès le début du sommet, nous avons été accueillis par une exigence absurde, celle de notre reddition totale. Mais tant que la guerre fera rage, des gens continueront à mourir et des villes continueront à être détruites. Mettre fin à la guerre serait peut-être une bonne chose, mais cela signifierait capituler devant nos ennemis jurés."
 Saleh.16.a: "Cette guerre doit prendre fin, nous devons donc y répondre."
 Saleh.16.b: "Ridicule! Cette discussion se termine maintenant!"
 Saleh.17.t: "La Coalition exige que les deux États restent indépendants"
 Saleh.17.d: ""
 Saleh.17.a: "Tout le Yémen est à nous, ou cette discussion est terminée."
 Saleh.17.b: ""
