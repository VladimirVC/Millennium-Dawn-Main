 PRU.conservatism: "£PRU_western_conservative (AP) Popular Action"
 PRU.conservatism_desc: "(Reformism) A nominally liberal party, Popular Action seeks to pose itself as an alternative to mainstream conservativism within Peru while also rejecting the more populist aspects of many of the left-wing parties in the nation. The political changes in the 90s has moved the party's position more towards the center - with many of its former supporters having abandoned it for other organizations or parties."
 PRU.liberalism: "£PRU_western_liberal (PP) Possible Peru"
 PRU.liberalism_desc: "(Social Liberalism) One of the numerous parties to emerge in opposition to the presidency of Alberto Fujimori, Possible Peru was created as a liberal opposition group - leading protests against allegations of corruptio and seeking to work towards a free, democratic Peru."
 PRU.Communist-State: "£PRU_emerging_communism （PCP-PR）ペルー共産党・赤い祖国"
 PRU.Communist-State_desc: "(Marxism-Leninism) Founded in 1970 my former members of the Peruvian Communist Party – Red Flag after the party became increasingly dedicated to the doctrine of Maoism, the PCP-PR adheres to 'anti-revisionism'. The PCP-PR has since become one of the main vehicles for Marxist thought in Peru, participating in or creating several left-wing electoral or political alliances over the decades."
 PRU.anarchist_communism: "£PRU_anarchist_communism (APRA) American Popular Revolutionary Alliance"
 PRU.anarchist_communism_desc: "(Left-wing Populism) Originally created as an anti-imperialist movement with aspirations towards a united South America, APRA has participated in several governments since its foundation in 1930. While initially a more radical left-wing party, under the direction of Alan García the party moved away from its roots, adopting Third Way social democracy and increasingly neoliberal policies."
 PRU.Neutral_conservatism: "£PRU_non_aligned_conservative (FREPAP) Agricultural People's Front of Peru"
 PRU.Neutral_conservatism_desc: "(Agrarianism) FREPAP is an Agrarian party that adheres heavily to Christian theology and conservative social values. It advocates for the adoption of a theocratic government, Peruvian nationalism, decentralization, adopting elements of the former Inca administration, and even incorporates elements of socialist economics into its platform."
 PRU.neutral_Social: "£PRU_non_aligned_socialist_democrat (UPP) Union for Peru"
 PRU.neutral_Social_desc: "(Social Democracy) Originally holding social democratic and Progressive views, the Union for Peru was one of the main left-wing opposition forces following the collapse of APRA's support. However the party was increasingly aligned with the more radical Ethnocacerist Movement following Antauro Humala's leadership of the party in the 2010s."
 PRU.Neutral_Libertarian: "£PRU_non_aligned_libertarian (PSN) 国民連帯党"
 PRU.Neutral_Libertarian_desc: "保守主義 - 1998年、アルベルト・フジモリ大統領に反対する政党として結成された国民連帯党は、社会的保守主義と経済的自由主義を融合させた路線を掲げ、1990年代に強まった独裁的傾向に対抗し、ペルー国内で共和主義の理念を擁護することを目指している。"
 PRU.Neutral_Communism: "£PRU_non_aligned_communism (PCP-SL) ペルー共産党 – 光る道"
 PRU.Neutral_Communism_desc: "マルクス・レーニン・毛沢東主義 - 公式名称をペルー共産党とする光る道は、ペルー政府に対する革命的かつ暴力的な抵抗を主張している。同党のイデオロギーは、創設者アビマエル・グスマンの影響を強く受けており、彼は「ゴンサロ思想」を提唱した。これは、反修正主義的マルクス・レーニン主義と毛沢東思想を融合させ、同組織がブルジョア国家の一員とみなす者たちに対して革命的暴力の行使を認める思想である。同組織の手法とより過激なイデオロギーにより、南北アメリカ大陸の複数の国々がこれをテロ組織として指定している。"
 PRU.Neutral_green: "£PRU_non_aligned_greens ペルー緑の党"
 PRU.Neutral_green_desc: ""
 PRU.Nat_Autocracy: "£PRU_Nat_Autocracy ペルー軍"
 PRU.Nat_Autocracy_desc: "保守軍事政権 - 1821年に創設されたペルー軍は、これまで度々国内の政治に介入してきた歴史がある。クーデター、候補者への公然たる政治的支援、デモや抗議活動に対する武力行使など、軍全体を完全に非政治化するには、断固とした改革が必要となるだろう。"
 PRU.Nat_Populism: "£PRU_Nat_Populism (C90) 変革90"
 PRU.Nat_Populism_desc: "右派ポピュリズム - アルベルト・フジモリを政治的旗手として結成された変革90の主要なイデオロギーは、彼の右派ポピュリズム、権威主義、民営化といった政策に強く影響を受けている。フジモリを崇拝する「個人崇拝」を背景に、同党が支持する一連の政策の組み合わせは、総称して「フジモリズム」として知られている。"
