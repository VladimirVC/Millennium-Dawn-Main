 form_MAPHI_category: "Maphilindo"
 form_MAPHI_category_desc: "Una confederación propuesta y no política de tres naciones del sudeste asiático en el archipiélago malayo en la década de 1960. El sueño nunca se hizo realidad debido a los conflictos entre las naciones de Indonesia y la Federación de Malasia. La unificación de las tres naciones crearía una nación que rivalizaría con algunas de las principales naciones del mundo."
 MAPHI_integrate_start: "Begin forming [GetMAPHINameDef]"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "Indonesia es una región rica en recursos esenciales para la nación propuesta. Es imperativo integrarla por los recursos y la población que puede aportar."
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "Filipinas es un importante centro naval y comercial del Pacífico. La integración de esta nación nos dará muchas más posibilidades de empezar a dominar el Pacífico."
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "Singapur es un centro crítico para la nueva nación. Su posición como un importante puerto comercial y centro financiero lo hace crucial para el éxito de la nueva nación."
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "Malasia es políticamente uno de los sectores centrales del país. Nos permite acceder a las rutas terrestres dentro de Asia gracias a la posesión de la península."
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "Brunéi es una nación menor en el acuerdo. Es imperativo integrarla, a pesar de ser un estado menor."
 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 is_MAPHI: "Has formed [GetMAPHINameDef]"
 form_INDOCHI_category: "Indochina"
 form_INDOCHI_category_desc: "Indochina es una antigua federación de naciones de Vietnam, Camboya y Laos que existió hasta 1954. Los tres juntos forman una de las economías más grandes del mundo y tienen una población masiva. Es una nación de densas junglas, colinas onduladas, montañas y una costa hermosa. Su fortaleza radica en la gente y la voluntad que llevará al grupo hacia el futuro."
 INDOCHI_integrate_start: "Begin forming [GetINDOCHINameDef]"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "Vietnam posee una enorme cantidad de recursos naturales en las montañas y la costa. La integración de Vietnam comenzará a consolidar nuestra influencia en la nación."
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "Laos, al igual que Vietnam, también posee enormes cantidades de recursos naturales."
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "La geografía natural y las tierras ricas de Camboya son importantes para la nación. Integrarlos en la nación también mejorará la nación de manera constante."
 INDOCHI_update_flag: "Finish Forming [GetINDOCHINameDef]"
 INDOCHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetINDOCHINameDef], adopting its unified flag and name."
 is_INDOCHI: "Has formed [GetINDOCHINameDef]"
 form_ANDES_category: "Federación Andina"
 form_ANDES_category_desc: "La Federación Andina es una unión propuesta de estados entre los países de [COL.GetNameWithFlag], [PRU.GetNameWithFlag] y [BOL.GetNameWithFlag]. Está basada de manera flexible en la Comunidad Andina, que es una unión de libre comercio y económica entre los países. La nueva nación propuesta tendría una población combinada de más de ciento trece millones de habitantes y un área de cuatro millones setecientos mil kilómetros cuadrados. Sería una nación de tamaño similar a México, con un PIB de tres cuartos de billón de dólares."
