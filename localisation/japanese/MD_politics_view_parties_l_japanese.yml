 PHI.anarchist_communism_2000_desc: "急進左派 - フィリピン民主党（フィリピン語: Partido Demokratiko Pilipino、PDP-Laban）\n\n「自由、連帯、正義、公平、社会的責任、自立、効率性、そして啓蒙されたナショナリズム」を特徴とする平和的かつ民主的な生活様式を追求するフィリピン民主党は、現状の体制への不満から、近年支持を拡大している。\n"
 PHI.anarchist_communism_2017_desc: "急進左派 - フィリピン民主党（フィリピン語: Partido Demokratiko Pilipino、PDP-Laban）\n\n「自由、連帯、正義、公平、社会的責任、自立、効率性、そして啓蒙されたナショナリズム」を特徴とする平和的かつ民主的な生活様式を追求するフィリピン民主党は、近年ではドゥテルテ政権下でフィリピン民族主義政党として位置付けられ、ますます独裁的傾向を強めている。\n"
 PHI.Conservative: "£generic_Conservative_small (PFP) フィリピン連邦党"
 PHI.Conservative_desc: "反動主義 - 連邦党はドゥテルテ政権下の現行体制を支持する一般的な連邦主義政党である。\n"
 PHI.Caliphate: "£generic_Caliphate_small (ASG) アブ・サヤフ"
 PHI.Caliphate_desc: "サラフィー・ジハード主義 - アブ・サヤフは、スンナ派イスラム教のワッハーブ派教義に従う過激派ジハード主義武装海賊組織である。同組織は主にフィリピン南部に拠点を置き、モロ反乱と密接に関連している。非ムスリムやフィリピン政府に対して特に暴力的であり、その活動は依然として捉えどころがない。\n"
 PHI.oligarchism: "£PHI_oligarchism (NUP) 国民統一党"
 PHI.oligarchism_desc: "寡頭政治主義 - 国民統一党（フィリピン語：Partido ng Pambansang Pagkakaisa）\n\n国民統一党はLakas-CMDからのイデオロギー的離脱派による政党である。キリスト教を基盤とする同党は、フィリピン国民が神を畏れる主権国家へと進む道を追求する。母体であるLakas-CMDとは異なり、よりリベラルで進歩主義に重点を置いている。ただし国民統一党は、フィリピン国内のイスラム教徒やその他の少数派宗教に対する反動的な政策を依然として維持している。\n"
 PHI.Neutral_Libertarian: "£generic_Neutral_Libertarian_small (UNA) 統一民族同盟"
 PHI.Neutral_Libertarian_desc: "リバタリアン - UNAは当初、野党連合を代表する政党として創設されたが、ジェジョマール・ビナイの指導下でリバタリアン政党へと変貌を遂げた。同党はより保守的でリバタリアン的な右派の立場を採り、現在もその姿勢を維持している。\n"
 PHI.Neutral_Communism: "£PHI_Neutral_Communism (PRP) 人民改革党"
 PHI.Neutral_Communism_desc: "中道共産主義 - 人民改革党はフィリピン国内における体制改革を目指す改革勢力である。創設者は1989年の土地改革において農地を農民へ再分配する上で主導的役割を果たした。政治的には創設者がフィリピン上院議員の地位を維持していることを除けば、改革党は苦戦を強いられている。\n"
 PHI.Neutral_Autocracy: "£PHI_neutral_autocracy (PMP) フィリピン大衆の力"
 PHI.Neutral_Autocracy_desc: "中道独裁主義 - フィリピン大衆の力（フィリピン語：Pwersa ng Masang Pilipino）\n\nフィリピン大衆の力は大衆主義政党であり、人民大衆のイデオロギー的先鋒となることを目指す幅広い支持基盤を持つ政党である。1990年代後半にエストラーダが勝利する道を開いた基盤となった。イデオロギー的には、所属政治家の中でより中道右派的な保守主義を代表している。しかし、エストラーダ政権下では腐敗と独裁主義のレッテルを貼られる結果となった。\n"
 PHI.Neutral_Muslim_Brotherhood: "£muslim_brotherhood_small マラデカ"
 PHI.Neutral_Muslim_Brotherhood_desc: "中道イスラム主義 - マラデカはフィリピンにおけるムスリム同胞団の分派である。比較的小規模ながら、フィリピン南部ミンダナオ州の地方選挙で顕著な役割を果たしている。\n"
 PHI.Nat_Autocracy: "£PHI_Nat_Autocracy (AFP) フィリピン国軍"
 PHI.Nat_Autocracy_desc: "軍事政権 - フィリピン国軍は1930年代半ば、国防法の成立に伴いアメリカ政府の監督下で創設された。ダグラス・マッカーサーが初代かつ唯一の陸軍元帥となり、フィリピン軍の整備に貢献した。現在の形態を整えたのはフィリピン独立後である。"
 PHI.Nat_Fascism: "£generic_Nat_Fascism_small (NFP) 国家主義ファシスト党"
 PHI.Nat_Fascism_desc: "ファシズム - 国家主義ファシスト党は地下活動を行うファシスト政党であり、世論調査ではごくわずかな支持しか得ていない。同党に投票した有権者は累計50万人未満であり、実在政党よりもオンライン上での存在感が強い。フィリピン民族主義ファシスト党は自らをプロト・ナチス的キリスト教過激派と位置付け、強権的独裁体制の再確立と国民への少数派政策の強制を掲げている。\n"
 PRU.oligarchism: "£PRU_non_aligned_oligarchism (BK) バリオ・キング"
 PRU.oligarchism_desc: "カルテル支配 - バリオ・キングは、ゲルソン・ガルベス・カジェが率いるペルーにおける大規模な麻薬密売組織である。この組織は、その暴力的な歴史と、結成以来発揮してきた影響力により、ペルー国内で悪名高い。"
 SIN.conservatism_icon: "£SIN_conservatism"
 SIN.liberalism_icon: "£SIN_liberalism"
 SIN.socialism_icon: "£SIN_socialism"
 SIN.Autocracy: "£SIN_conservatism (PAP) 人民行動党 - §G東側派閥§!"
 SIN.Autocracy_desc: "人民行動党(PAP)は1950年代後半からシンガポールで政権を握っている。多くの者からは美化された寡頭政治と見なされる一方、シンガポールの経済発展にも貢献してきた。PAPが実施する政策は本質的には保守的であり、真に西洋的なものというレッテルを拒絶している。\n\n§G東側派閥§!は、中華人民共和国やロシア、その他の主要な東側諸国とのより緊密な関係を模索している。\n"
 SIN.Autocracy_icon: "£SIN_conservatism"
 SIN.anarchist_communism: "£SIN_anarchist_communism (SPP) シンガポール人民党"
 SIN.anarchist_communism_desc: "シンガポール人民党(SPP)は、シンガポールの自由主義政党が取るパターンとほぼ同様の路線を歩んでいる。同党はシンガポール民主党に類似しているが、より良い雇用機会や教育機会といった追加の譲歩を求めている。\n"
 SIN.anarchist_communism_icon: "£SIN_anarchist_communism"
 SIN.Caliphate: "£generic_Caliphate_small ジェマ・イスラミア"
 SIN.Neutral_Autocracy: "£SIN_conservatism (PAP) 人民行動党 - §R中道派閥§!"
 SIN.Neutral_Autocracy_desc: "人民行動党(PAP)は1950年代後半からシンガポールで政権を握っている。多くの者からは美化された寡頭政治と見なされる一方、シンガポールの経済発展にも貢献してきた。PAPが実施する政策は本質的には保守的であり、真に西洋的なものというレッテルを拒絶している。\n\n§R中道派閥§!は主に、ASEANと外国の干渉を受けずに堂々と立つシンガポールに焦点を当てている。彼らは通常、三つの派閥の中で最大の構成要素である。\n"
 SIN.Neutral_Autocracy_icon: "£SIN_conservatism"
 SIN.Neutral_Communism: "£SIN_Neutral_Communism (DPP) 民主進歩党"
 SIN.Neutral_Communism_desc: "民主進歩党は、シンガポールにおけるもう一つの小政党であり、より大きな人権の擁護と富の再分配を提唱し、貧困の根絶を目指している。\n"
 SIN.Neutral_Communism_icon: "£SIN_Neutral_Communism"
 SIN.Neutral_Libertarian_icon: "£SIN_Neutral_Libertarian"
 SIN.neutral_Social_icon: "£SIN_neutral_Social"
 SIN.Nat_Autocracy: "£SIN_Nat_Autocracy シンガポール軍"
 SIN.Nat_Autocracy_desc: "シンガポール軍はマレーシアからの独立直後に創設され、世界でも有数の装備と訓練を備えた軍隊として徐々に脚光を浴びるようになった。シンガポール軍は主に徴兵制を基盤とした軍隊であり、少数の職業軍人から成る。\n"
