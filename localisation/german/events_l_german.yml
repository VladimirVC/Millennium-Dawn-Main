 cheat.2.a: "Okay"
 TT_KARZAI_ADMINISTRATION: "[Western_Autocracy_L] wird zur Regierungspartei\n"
 TT_RABBANI_ADMINISTRATION: "[Neutral_Muslim_Brotherhood_L] wird zur Regierungspartei\n"
 TT_SHAH_ADMINISTRATION: "Der [Monarchist_L] wird wieder an die Macht gebracht.\n"
 AfghanistanNews.1.t: "Der Bürgerkrieg in Afghanistan beruhigt sich"
 AfghanistanNews.1.TAL.d: "Trotz aller Bemühungen der afghanischen Streitkräfte und ihrer westlichen Verbündeten ist es den Taliban gelungen, die vollständige Kontrolle über alle größeren Städte, einschließlich der Hauptstadt Kabul, zu erlangen. Die meisten Regierungsbeamten sind untergetaucht oder ins Exil gegangen, darunter auch der afghanische Präsident [AFG.GetLeader], der sich derzeit in den Vereinigten Staaten aufhält.\n\nDer Sieg der Taliban wird mit Sicherheit zu einer Zunahme von Terroranschlägen in der Region und weltweit führen."
 AfghanistanNews.1.AFG.d: "Die afghanische Regierung hat den Sieg über die Taliban erklärt. Die meisten der stärksten Außenposten und Städte wurden von ihnen befreit, und die meisten der verbliebenen Kämpfer sind über die Grenze nach Pakistan geflohen. Obwohl die Taliban nur noch auf wenige Enklaven und Zellen reduziert sind, wird davon ausgegangen, dass der Aufstand noch viele Jahre andauern wird, wenn auch in geringerem Umfang.\n\nDieser Sieg hat die Effektivität der wiederaufgebauten afghanischen Armee und die Entschlossenheit der afghanischen Regierung unter Beweis gestellt."
 AfghanistanNews.1.a: "Interessant"
 AfghanistanNews.2.t: "Afghanistan beansprucht Paschtunistan"
 AfghanistanNews.2.d: "Aufgrund der zunehmenden Gewalt in Pakistan hat die afghanische Regierung ihre Ansprüche auf die Gebiete Pakistans, in denen Paschtunen leben, verstärkt. Die Durrand-Linie (die heutige Grenze zwischen Afghanistan und Pakistan) ist seit langem eine Quelle von Konflikten zwischen den beiden Ländern, da sie unter britischer Kontrolle Land vom Reich Afghanistan an Pakistan übertrug.\n\n Die in diesem Gebiet lebenden Paschtunen selbst scheinen von dieser Entwicklung nicht sonderlich begeistert zu sein, da viele von ihnen sich in Pakistan wohlfühlen. Es ist wahrscheinlich, dass Afghanistan seine Ansprüche nur mit Gewalt durchsetzen kann."
 AfghanistanNews.2.a: "Interessant"
 AfghanistanNews.3.t: "Afghanistan beansprucht Belutschistan"
 AfghanistanNews.3.d: "Während sich die Krise in Pakistan verschärft, erweitert Afghanistan seine Ansprüche. Heute gab die afghanische Regierung bekannt, dass Belutschistan neben Paschtunistan ein integraler Bestandteil Afghanistans ist."
 AfghanistanNews.3.a: "Eine besorgniserregende Entwicklung"
 AfghanistanNews.4.t: "Afghanistan marschiert in Pakistan ein"
 AfghanistanNews.4.d: "Um seinen Anspruch zu sichern, hat Afghanistan einen direkteren Weg eingeschlagen, um Land zu gewinnen. Im Namen der Sicherheit der Paschtunen hat es begonnen, Truppen über die Grenze nach Pakistan zu verlegen."
 AfghanistanNews.4.a: "Eine besorgniserregende Entwicklung"
 AfghanistanNews.5.t: "Taliban schließen sich zusammen"
 AfghanistanNews.5.d: "Die afghanischen und pakistanischen Taliban haben beschlossen, ihre Kräfte zu bündeln, um gemeinsame Bedrohungen gemeinsam zu bekämpfen. Dies bedeutet eine große Verschiebung des Machtgleichgewichts in Zentralasien."
 AfghanistanNews.5.a: "Beunruhigend."
 AfghanistanNews.6.t: "Ermordung von Ahmad Schah Massud"
 AfghanistanNews.6.d: "Ahmad Shah Massoud, der Anführer des afghanischen Widerstands gegen die Taliban, wurde von Al-Qaida ermordet. Zwei Mitglieder der Taliban, die sich als Journalisten ausgaben, zündeten Sprengsätze, die sie in ihrer Ausrüstung versteckt hatten. Massoud wurde schwer verletzt und mit einem Militärhubschrauber evakuiert, erlag jedoch seinen Verletzungen noch vor Erreichen des Krankenhauses.\n\n Massoud, bekannt als der Löwe von Panjshir, war zunächst Symbol des Widerstands gegen die sowjetische Besatzung und später gegen die Taliban."
 AfghanistanNews.6.a: "Eine Niederlage."
 Afghanistan.2.t: "Die Karzai-Regierung"
 Afghanistan.2.d: "Auf Anweisung der Amerikaner hat Hamid Karzai, der konservative Führer der Anti-Taliban-Kräfte der Nordallianz, das Amt des Präsidenten Afghanistans übernommen."
 Afghanistan.2.a: "Der erste Schritt zur Unabhängigkeit."
 Afghanistan.3.t: "Ermordung von Ahmad Schah Massud"
 Afghanistan.3.d: "Ahmad Shah Massoud, der Löwe von Panjshir, wurde heute Opfer eines Selbstmordattentats. Zwei Mitglieder der Taliban, die sich als Journalisten ausgaben, zündeten Sprengstoff, der in einer Kamera und einem Akku versteckt war. Massoud wurde schwer verletzt und sofort mit einem Militärhubschrauber vom Tatort evakuiert."
 Afghanistan.3.a: "Lasst uns zu Allah beten, dass er überlebt."
 Afghanistan.4.t: "Die USA üben ihren Einfluss aus"
 Afghanistan.4.d: "Nachdem die Taliban besiegt worden sind, haben die USA ihren Einfluss genutzt, um die Entscheidungen der Loya Jirga zu beeinflussen. Eine neue Übergangsregierung wurde gebildet."
 Afghanistan.4.a: "Sind sie besser als die Taliban?"
 AfghanistanHostageCrisis.1.t: "Südkoreanische Missionare von den Taliban als Geiseln genommen"
 AfghanistanHostageCrisis.1.d: "Heute wurde eine Gruppe südkoreanischer Missionare, die durch die Provinz Ghazni reisten, von Taliban-Kämpfern gefangen genommen und wird als Geiseln gehalten. Sie fordern die Freilassung der Gefangenen und den Abzug aller südkoreanischen Soldaten aus Afghanistan. \n\nUnser Militärberater schlug vor, ein Bergungsteam zur Befreiung der Geiseln zu entsenden, und die südkoreanische Delegation schickte einen Vertreter zu Verhandlungen."
 AfghanistanHostageCrisis.1.a: "Wir können den Taliban nicht trauen, schick das Rettungsteam."
 AfghanistanHostageCrisis.1.b: "Die Sicherheit der Geiseln hat für uns oberste Priorität, schicken Sie den Vertreter."
 AfghanistanHostageCrisis.2.t: "Geiseln befreit"
 AfghanistanHostageCrisis.2.d: "Unsere Spezialeinheiten konnten in das Taliban-Versteck eindringen und die Geiseln zum nächsten Militärposten eskortieren. \n\nDie Missionare werden nach Südkorea zurückkehren, und unsere Soldaten werden von den Medien gelobt."
 AfghanistanHostageCrisis.2.a: "Mission erfüllt."
 AfghanistanHostageCrisis.3.t: "Geiseln bei Rettungsversuch getötet"
 AfghanistanHostageCrisis.3.d: "Taliban-Kämpfer bemerkten, dass unsere Spezialeinheiten ihr Versteck betraten, und exekutierten die Geiseln sofort. \n\nNach dem Kampf konnten unsere Soldaten ohne die Geiseln aus dem Gebäude fliehen."
 AfghanistanHostageCrisis.3.a: "Mission gescheitert."
 AfghanistanHostageCrisis.4.t: "Taliban fordern Freilassung von Gefangenen"
 AfghanistanHostageCrisis.4.d: "Der Vertreter ist mit den Forderungen der Taliban zurückgekehrt; die Hauptforderung ist die Freilassung aller Taliban-Häftlinge aus nordamerikanischen Gefängnissen."
 AfghanistanHostageCrisis.4.a: "Fordern Sie die Freilassung der Gefangenen."
 AfghanistanHostageCrisis.4.b: "Wir werden keine Kriegsverbrecher freilassen!"
 AfghanistanHostageCrisis.5.t: "Die Taliban fordern den Abzug Südkoreas"
 AfghanistanHostageCrisis.5.d: "Die Taliban haben den Abzug all unserer Streitkräfte und die Zahlung eines Lösegelds für die Freilassung unserer Staatsbürger gefordert."
 AfghanistanHostageCrisis.5.a: "Wir müssen das akzeptieren."
 AfghanistanHostageCrisis.5.b: "Wir werden nicht mit Terroristen verhandeln!"
 AfghanistanHostageCrisis.6.t: "Die USA lehnen unsere Anfrage ab."
 AfghanistanHostageCrisis.6.d: "Vertreter des US-Militärs haben unsere Forderung nach Freilassung der Taliban-Häftlinge aus Militärgefängnissen abgelehnt. \n\nDie Dschihadisten reagierten mit der Tötung zweier Geiseln, bevor sie neue Forderungen stellten. Auch die nordkoreanische Regierung forderte die Freilassung der Geiseln."
 AfghanistanHostageCrisis.6.a: "Wie werden die Taliban darauf reagieren?"
 AfghanistanHostageCrisis.7.t: "Die afghanische Regierung weist die Forderung der Taliban zurück"
 AfghanistanHostageCrisis.7.d: "Die Vertreter der afghanischen Regierung wiesen die Forderungen der Taliban als unrealistisch zurück. Die Dschihadisten reagierten mit der Tötung zweier Geiseln, bevor sie neue Forderungen stellten. Auch die nordkoreanische Regierung forderte die Freilassung der Geiseln."
 AfghanistanHostageCrisis.7.a: "Barbarisch!"
 AfghanistanHostageCrisis.8.t: "Südkorea zieht sich aus Afghanistan zurück"
 AfghanistanHostageCrisis.8.d: "Nach der Geiselkrise in Afghanistan hat die südkoreanische Regierung die Forderungen der Taliban akzeptiert und mit dem Rückzug ihrer Truppen begonnen.\n\nDie Taliban gaben bekannt, dass ein Lösegeld von zwanzig Millionen Dollar gezahlt wurde; der Südkoreaner gab jedoch keine Stellungnahme ab."
 AfghanistanHostageCrisis.8.a: "Afghanistan wird weiterhin destabilisiert."
 AfghanistanHostageCrisis.9.t: "Südkoreanische Geiseln hingerichtet"
 AfghanistanHostageCrisis.9.d: "Nach einer Geiselkrise in Afghanistan wies die südkoreanische Regierung zunächst alle Forderungen der Taliban zurück und verkündete kurz darauf, dass alle Geiseln ermordet worden seien."
 AfghanistanHostageCrisis.9.a: "Weitere Opfer des Afghanistan-Konflikts."
 ContactIran.0.t: "Afghanistan ruft seine Bevölkerung zurück"
 ContactIran.0.d: "Unsere Fatemiyoun-Brigaden wachsen im Iran und bestehen aus afghanischen Hazara-Schiiten. Afghanistan fordert ihre Rückkehr in ihre Heimat, damit sie dem Land helfen können, in dem sie seit Jahrtausenden leben."
 ContactIran.0.a: "Lasst sie sich mit ihren Ländern vereinen."
 ContactIran.0.b: "Nein, wir brauchen die Arbeitskräfte."
 ContactIran.1.t: "Iran weigert sich, unsere Hazara Fatemiyoun zu entsenden"
 ContactIran.1.d: "Nachdem wir [PER.GetName] gebeten hatten, Fatemiyoun zur Unterstützung nach [AFG.GetName] zurückzuschicken, und nach vielen Gesprächen zwischen unseren beiden Nationen, haben die Iraner beschlossen, die Bitte unserer Hazara-Männer abzulehnen."
 ContactIran.1.a: "Allah weiß es am besten!"
 ContactIran.2.t: "Iran akzeptiert unseren Aufruf zu den Hazara Fatemiyoun"
 ContactIran.2.d: "[PER.GetName] hat unserem Antrag auf Rückkehr unserer Hazara-Soldaten zur Unterstützung und Rückkehr in ihre Heimatländer stattgegeben. Fünf Divisionen sind mit hoch erhobenen Fahnen unterwegs und rufen „Zindabad Hazaristan!“."
 ContactIran.2.a: "Harakat!"
 ContactIran.3.t: "Afghanistan beantragt Mitgliedschaft in der Widerstandsachse"
 ContactIran.3.d: "Die schiitischen Hazara Afghanistans bitten um Aufnahme in die Achse des Widerstands. Nach der Machtübernahme der Hazara in Afghanistan beantragen sie nun die Mitgliedschaft in unserem Widerstand."
 ContactIran.3.a: "Khorasan soll sich vereinen!"
 ContactIran.3.b: "Wir lehnen die Anfrage ab."
 ContactIran.4.t: "Der Iran akzeptiert unsere Bitte, sich ihrer Fraktion anzuschließen."
 ContactIran.4.d: "[PER.GetName] hat unseren Antrag auf Mitgliedschaft in der Widerstandsachse angenommen. Gemeinsam sind wir stärker!"
 ContactIran.4.a: "Allahu Akbar!"
 ContactIran.5.t: "Irans Rückgang"
 ContactIran.5.d: "[PER.GetName] hat unseren Antrag auf Mitgliedschaft in der Widerstandsachse abgelehnt. Wir sollten uns nicht mehr auf sie verlassen."
 ContactIran.5.a: "Traurig"
 ContactIran.6.t: "Die Hazaras Afghanistans erklären Hazaristan."
 ContactIran.6.d: "Heute Morgen rief der afghanische Hazara-Politiker Karim Khalili nach den Erfolgen seiner Volksgruppe im Land durch rasche Reformen und die Einhaltung des schiitischen Islams einen eigenen Staat aus. Hunderttausende Hazara gingen in Kabul, Bamiyan, Mazar-i-Sharif und Herat auf die Straße, um die Ausrufung von Hazaristan zu feiern."
 ContactIran.6.a: "Interessant"
 Cameroon.1.t: "Der Ausbruch des Kamerunbergs"
 Cameroon.1.d: "Der Kamerunberg, ein Vulkan mit einer Höhe von 4.040 Metern, ist der höchste Punkt Zentralafrikas und einer der aktivsten Vulkane Afrikas.\n\nNach dem Ausbruch im Jahr 1999 waren die Menschen rund um den Kamerunberg überrascht, als der Vulkan, den die Einheimischen Mongo ma Ndemi („Berg der Größe“) nennen, am 28. Mai 2000 erneut ausbrach und mehrere Monate lang heftige Aktivitäten auslöste."
 Cameroon.1.a: "Das wird der Region schaden."
 Cameroon.1.b: "Schickt alle benötigte Hilfe!"
 diplomatic_response.1.t: "[FROM.GetName] accepts!"
 diplomatic_response.1.d: "[This.GetAdjective] and [FROM.GetAdjective] delegations have reached a mutual agreement in the most recent negotiations. [FROM.GetName] is willing to go along with our proposal."
 diplomatic_response.1.o1: "Ausgezeichnet"
 diplomatic_response.2.t: "[FROM.GetName] rejects!"
 diplomatic_response.2.d: "After several nights and bitter fights over minor details and major points, the most recent wave of negotiations between the [This.GetName] and [FROM.GetName] delegations have failed. Our proposal will not come to fruition any time soon."
 diplomatic_response.2.d1: "[FROM.GetNameWithFlag] hat unseren Rettungsantrag abgelehnt. Dadurch wird unsere drohende Katastrophe noch prekärer..."
 diplomatic_response.2.o1: "Na ja..."
 diplomatic_response.3.t: "[FROM.GetName] folds!"
 diplomatic_response.3.d: "Unsurprisingly, the [FROM.GetAdjective] delegations were soon convinced of our overwhelming might and folded to our demands. We got what we wanted."
 diplomatic_response.3.o1: "Ausgezeichnet！"
 diplomatic_response.4.t: "[FROM.GetName] defies us!"
 diplomatic_response.4.d: "We knew that some [FROM.GetAdjective] people are idiots, but their top envoys had to join the rank of idiots in the last few days of negotiations. They defied us, rejected our demands and sent our envoys home.\n\nThese fools."
 diplomatic_response.4.o1: "Sie werden die Konsequenzen kennen."
 LibyaNews.1.t: "Zweiter libyscher Bürgerkrieg geht zu Ende"
 LibyaNews.1.GNA.d: "Der zweite libysche Bürgerkrieg begann 2014, nachdem das libysche Militär unter General Khalifa Haftar die amtierende Regierung gestürzt hatte, als diese sich weigerte, nach der Wahlniederlage von 2014 zurückzutreten. Die Anhänger der Regierung bildeten eine neue Fraktion, die Nationale Heilsregierung, und lösten damit einen neuen Bürgerkrieg aus. Im Jahr 2015 vermittelten die Vereinten Nationen einen Waffenstillstand zwischen den beiden Fraktionen und bildeten eine neue gemeinsame Regierung, die Regierung der nationalen Eintracht. Doch nur ein Jahr später war der Frieden zerbrochen und stürzte das Land in einen dreifachen Bürgerkrieg.\n\nEs scheint, dass es der international unterstützten Regierung der nationalen Eintracht gelungen ist, die rebellischen Fraktionen zu überwinden und das Land zu vereinen, obwohl ihr die Unterstützung des libyschen Militärs fehlt. Da dies von der EU und einem Großteil der westlichen Welt anerkannt wird, bedeutet dies eine erhebliche Verschiebung des Gleichgewichts in der Region."
 LibyaNews.1.HOR.d: "Der zweite libysche Bürgerkrieg begann 2014, nachdem das libysche Militär unter General Khalifa Haftar die amtierende Regierung gestürzt hatte, als diese sich weigerte, nach der Wahlniederlage von 2014 zurückzutreten. Die Anhänger der Regierung bildeten eine neue Fraktion, die Nationale Heilsregierung, und lösten damit einen neuen Bürgerkrieg aus. Im Jahr 2015 vermittelten die Vereinten Nationen einen Waffenstillstand zwischen den beiden Fraktionen und bildeten eine neue gemeinsame Regierung, die Regierung der nationalen Eintracht. Doch nur ein Jahr später war der Frieden zerbrochen und stürzte das Land in einen dreifachen Bürgerkrieg.\n\nEs scheint, dass es dem Repräsentantenhaus mit Unterstützung von General Haftar, dem libyschen Militär und vielen Gaddafi-Loyalisten gelungen ist, ihre Herrschaft über das Land zu legitimieren. Mit der Unterstützung Russlands hat Haftar Land für zwei russische Militärstützpunkte im Land versprochen. Damit wird der russische Einfluss in Nordafrika zunehmen."
 LibyaNews.1.GNC.d: "Der zweite libysche Bürgerkrieg begann 2014, nachdem das libysche Militär unter General Khalifa Haftar die amtierende Regierung gestürzt hatte, als diese sich weigerte, nach der Wahlniederlage von 2014 zurückzutreten. Die Anhänger der Regierung bildeten eine neue Fraktion, die Nationale Heilsregierung, und lösten damit einen neuen Bürgerkrieg aus. Im Jahr 2015 vermittelten die Vereinten Nationen einen Waffenstillstand zwischen den beiden Fraktionen und bildeten eine neue gemeinsame Regierung, die Regierung der nationalen Eintracht. Doch nur ein Jahr später war der Frieden zerbrochen und stürzte das Land in einen dreifachen Bürgerkrieg.\n\nEs scheint, dass die Regierung der Nationalen Rettung trotz aller Widrigkeiten als Siegerin hervorgegangen ist. Sie setzt sich hauptsächlich aus Islamisten und Mitgliedern der Muslimbruderschaft zusammen. Viele Experten sind der Meinung, dass dieser Sieg nur durch die ernsthafte Unterstützung ausländischer Akteure möglich war. Wer diese Akteure waren, bleibt unklar."
 SierraLeoneNews.1.t: "Der Bürgerkrieg in Sierra Leone endet"
 SierraLeoneNews.1.SIE.d: "Die Regierung von Sierra Leone verkündete heute einen offiziellen Sieg über die Rebellen. Mit Unterstützung Guineas, Großbritanniens und der UNAMSIL-Truppen ergaben sich die Rebellen der RUF und AFRC entweder oder flohen ins benachbarte Liberia. Der Anführer der RUF, [AFR.GetLeader], wurde in einem Versteck aufgespürt, festgenommen und dem britischen SAS übergeben.\n\nEr wartet derzeit auf seinen Prozess, in dem er von den Vereinten Nationen wegen zahlreicher Kriegsverbrechen angeklagt wird."
 SierraLeoneNews.1.AFR.d: "Trotz der Unterstützung britischer und UN-Truppen wurden die Regierungstruppen Sierra Leones vollständig aus der Hauptstadt Freetown vertrieben. Einige Regierungsmitglieder konnten nach Nigeria fliehen. Andere, die unglücklicherweise in die Hände der Rebellen gerieten, wurden umgehend erschossen und durch die Straßen Freetowns getrieben.\n\nNach dem Sturz der Regierung kam es mehrere Tage lang zu Plünderungen, da Rebellen im ganzen Land ihren Sieg feierten.\n\nDas Land wird höchstwahrscheinlich in Anarchie und Chaos versinken, da die Milizen außer der einheimischen Bevölkerung keine anderen Feinde mehr haben."
 SierraLeoneNews.1.a: "Interessante Entwicklung"
 SierraLeone.2.t: "Unsere Verbündeten in Sierra Leone fallen"
 SierraLeone.2.d: "Die Regierung von Sierra Leone ist an die Rebellen gefallen. Offenbar reichte unsere Intervention nicht aus, um sie zu retten. Wir könnten den Kampf gegen die AFRC fortsetzen, doch das würde bedeuten, dass wir tief ins Landesinnere vordringen müssten, um die legitime Regierung wieder einzusetzen. Andererseits wäre es vielleicht besser, sich aus Sierra Leone zurückzuziehen."
 SierraLeone.2.a: "Versuchen Sie, Frieden auszuhandeln."
 SierraLeone.2.b: "Wir müssen sie aus Sierra Leone vertreiben."
 SierraLeone.3.t: "Die guineische Regierung ruft zu einem Waffenstillstand auf"
 SierraLeone.3.d: "Die guineische Regierung hat uns kontaktiert und erklärt, sie wolle die Kämpfe zwischen uns und ihnen beenden und sich aus Sierra Leone zurückziehen. Wie sollen wir darauf reagieren?"
 SierraLeone.3.a: "Hört auf, gegen sie anzukämpfen."
 SierraLeone.3.b: "Kämpft weiter gegen sie."
 SierraLeone.4.t: "AFRC Agrees to a Truce"
 SierraLeone.4.d: "The Sierra Leonean rebels have agreed to a cease fire."
 SierraLeone.4.a: "Gut"
 SierraLeone.5.t: "AFRC Continues Fighting"
 SierraLeone.5.d: "The Sierra Leonean rebels have turned down our offer, and they want to keep fighting us."
 SierraLeone.5.a: "Verdammt"
 LiberiaNews.1.t: "The 2nd Liberian Civil War Ends"
 LiberiaNews.1.LIB.d: "Today Charles Taylor, the dictator-president of Liberia, announced the end of LURD in Liberia. Despite the Liberian military being in shambles, and most of the work being done by Taylor's anti-terrorist units, LURD with their Guinean allies weren't able to topple his government. What remaining rebels there are have crossed the border and escaped the Guinea. It is likely that Taylor will continue the conflict with Guinea until all opposition is dealt with."
 LiberiaNews.1.LUR.d: "In a televised broadcast today, Charles Taylor announced his resignation as the president of Liberia. Shortly after, he boarded a plane to fly into exile into Nigeria, as LURD rebels danced all along the streets of Monrovia. Due to suspected war crimes, Interpol issued an arrest warrant for Taylor. However, the Nigerian government has refused to deport Taylor, unless the request comes from the new Liberian government itself.\n\nThe new Liberian government is still in an on-going reorganisation, and it will take time until it establishes itself in Monrovia, and then in the rest of the country."
 LiberiaNews.1.a: "Interessant"
 Liberia.2.t: "Our Allies in Liberia Fall"
 Liberia.2.d: "The Taylor government has driven out the LURD rebels from Liberia. Despite providing them with weapons and aid, and allowing them to cross the border unopposed, the rebels weren't enough to overcome Taylor's government. We can step up our military operations and try to get rid of Taylor ourselves, or we can retreat from Liberia altogether."
 Liberia.2.a: "Versuchen Sie, Frieden auszuhandeln."
 Liberia.2.b: "We need to topple Taylor."
 Liberia.3.t: "Die guineische Regierung ruft zu einem Waffenstillstand auf"
 Liberia.3.d: "The Guinean government has contacted us saying that they want to end the fighting between us and them and pull out of Liberia. How should we respond?"
 Liberia.3.a: "Hört auf, gegen sie anzukämpfen."
 Liberia.3.b: "Kämpft weiter gegen sie."
 Liberia.4.t: "Taylor Agrees to a Truce"
 Liberia.4.d: "Taylor's government has agreed to a cease fire."
 Liberia.4.a: "Gut"
 Liberia.5.t: "Taylor Continues Fighting"
 Liberia.5.d: "Charles Taylor turned down our offer, and they want to keep fighting us."
 Liberia.5.a: "Verdammt"
 SudanNews.1.t: "Conflict in South Kordofan and the Blue Nile Is Over"
 SudanNews.1.a: "Interessant"
 SouthSudan.2.t: "Sudanese Rebels In The East"
 SouthSudan.2.d: "For the duration of the conflict in Sudan, Eritrea has been harbouring several insurgent groups inside its borders, letting them attack our territory in the East. It seems that these insurgents, calling themselves the 'Eastern Front' have allied themselves with [SSU.GetNameDef]. This has allowed them to mount a larger attack, with their goal being our trading hub of Port Sudan."
 SouthSudan.2.a: "Damn the Eritreans!"
 SouthSudan.3.t: "Sudanese Rebels In The Blue Nile"
 SouthSudan.3.d: "With the rise of Mengistu back into power in [ETH.GetName], he has once against start supporting the SPLA. By finding anti-government sympathisers among Sudanese refugees living in [ETH.GetName], he together with the SPLA have armed those people and sent them across the border into the Blue Nile."
 SouthSudan.3.a: "Damn the Ethiopians!"
 SouthSudan.4.a: "Send our army across the border!"
 SouthSudan.4.b: "We can't risk it"
 SouthSudanNews.1.t: "[SSU.GetAdjective] Civil War Ends"
 SouthSudanNews.1.a: "Interessant"
 SouthSudanNews.2.a: "Interessant"
 AngolaNews.1.t: "Angolan Civil War Ends"
 AngolaNews.1.AGL.d: "The Angolan civil war has come to an end. Raging since the 1970s, the conflict was fought between two former independence fighting allies, the MPLA and UNITA.\n\nMPLA, ally of the former Soviet Union, has managed to overcome and defeat UNITA."
 AngolaNews.1.UNI.d: "The Angolan civil war has come to an end. Raging since the 1970s, the conflict was fought between two former independence fighting allies, the MPLA and UNITA.\n\nUNITA, supported by the United States, has managed to overcome and defeat MPLA."
 AngolaNews.1.a: "Interessant"
 Angola_Civil_War_Over: "The Angolan Civil War is Over"
 DRC.0.t: "Laurent-Désiré Kabila Assassinated!"
 DRC.0.d: "Our leader and liberator Laurent-Désiré was attacked today in the presidential palace, his bad standing with the military and attempts to purge disloyal Kadogos have evidently met with a terrible failure, we attempted to rush him to Harare for urgent medical care, but it was too late, our liberator lays dead.\n\nWe have since found and had the perpetrator Rashidi Kasereka executed for his crimes."
 DRC.0.A: "A Dark Day."
 overlord.1.t: "Integration of [FROM.GetName]"
 overlord.1.d: "[FROM.GetName] has been our puppet state for far too long. It is no longer a viable partnership to allow them to have autonomy. On this day in [GetYear] marks a day we have long desired. [FROM.GetName] has been integrated into our great nation. They will now become [ROOT.GetAdjective] citizens and receive the same care and treatment as any other citizen in our nation. It is a glorious day for us and the people of [FROM.GetName].\nNOTE: Annexing another sovereign nation forces us to assume all of their debt, treasury, and international investments as they merge with us.\n\nYou gain the following: [?ROOT.treasury|Y] Treasury, [?ROOT.debt|R] Debt, [?ROOT.int_investments] International Investments"
 overlord.1.a: "Wunderbar"
 overlord.1.a_tt: "We gain §YCores§! on §B[FROM.GetName]§!\n"
 overlord_news.1.t: "[ROOT.GetName] Integrates [FROM.FROM.GetName]"
 overlord_news.1.d: "Delegations from [ROOT.GetName] and [FROM.FROM.GetName] have announced today that [FROM.FROM.GetName] will be integrated into [ROOT.GetName]. [FROM.FROM.GetName] has been an autonomous state for quite some time and has become increasingly reliant on [ROOT.GetName] in the past months. It is quoted as 'It only makes sense!' from the two parties involved.\n\nThe truth in that statement is yet to be seen.."
 overlord_news.1.a: "Interessant"
 AIDS_events.1.t: "HIV Prevalence Increases"
 AIDS_events.1.d: "Bad news on the health front of the country. Last year saw a significant increase of HIV cases, and in total the overall HIV situation in our country has gotten worse."
 AIDS_events.1.a: "Verdammt"
 AIDS_events.2.t: "HIV Prevalence Normalises"
 AIDS_events.2.d: "It seems that our fight against HIV is growing fruit. Last year saw essentially no change in the prevalence of HIV in our country. While not an improvement, it is still progress."
 AIDS_events.2.a: "What a relief."
 AIDS_events.3.t: "HIV Prevalence Decreases"
 AIDS_events.3.d: "Good news on the health front of the country. Last year saw a significant decrease in HIV cases, and in total the overall HIV situation in our country has improved significantly."
 AIDS_events.3.a: "Magnificent."
 debug_money.1.t: "Resource Sale Rate Calculator"
 debug_money.1.d: "[?percentage_of_resource_exports|%1]"
 corruption.1.t: "A Proposal of Sorts..."
 corruption.1.d: "One of the ministers reached out and said that few organizational and law changes can be made to optimize the performance of our administration, though it will require some... personal connection to moving forces."
 corruption.1.a: "Perhaps, an opportunity"
 corruption.1.b: "Bad idea"
 corruption.2.t: "A Proposal of Sorts..."
 corruption.2.d: "Einer der Minister hat mir die Hand gereicht und gesagt, dass nur wenige organisatorische und gesetzliche Änderungen vorgenommen werden können, um die Leistung unserer Polizei zu optimieren, obwohl es einige... persönliche Verbindungen zu den Einsatzkräften erfordert."
 corruption.2.a: "Vielleicht eine Gelegenheit"
 corruption.2.b: "Schlechte Idee"
 corruption.3.t: "Ein Vorschlag der Art..."
 corruption.3.d: "Einer der Minister reichte mir die Hand und sagte, dass nur wenige organisatorische und gesetzliche Änderungen vorgenommen werden können, um die Leistung unseres Militärkomplexes zu optimieren, auch wenn dies eine gewisse... persönliche Verbindung zu den beweglichen Kräften erfordern wird."
 corruption.3.a: "Vielleicht eine Gelegenheit"
 corruption.3.b: "Schlechte Idee"
 corruption.4.t: "Ein Vorschlag der Art..."
 corruption.4.d: "Einer der Minister meldete sich und sagte, dass nur wenige organisatorische und gesetzliche Änderungen vorgenommen werden können, um die Leistung unserer Bildungseinrichtungen zu optimieren, obwohl es einige... persönliche Verbindung zu den bewegenden Kräften erfordert."
 corruption.4.a: "Vielleicht eine Gelegenheit"
 corruption.4.b: "Schlechte Idee"
 corruption.5.t: "Ein Vorschlag der Art..."
 corruption.5.d: "Einer der Minister hat mir die Hand gereicht und gesagt, dass nur wenige organisatorische und gesetzliche Änderungen vorgenommen werden können, um die Leistung unserer Krankenhäuser zu optimieren, obwohl es einige... persönliche Verbindung zu den bewegenden Kräften erfordert."
 corruption.5.a: "Vielleicht eine Gelegenheit"
 corruption.5.b: "Schlechte Idee"
 corruption.6.t: "Ein Vorschlag der Art..."
 corruption.6.d: "Einer der Minister reichte mir die Hand und sagte, dass nur wenige organisatorische und gesetzliche Änderungen vorgenommen werden können, um die Leistung unserer sozialen Einrichtungen zu optimieren, auch wenn dies eine gewisse... persönliche Verbindung zu den bewegenden Kräften erfordern wird."
 corruption.6.a: "Vielleicht eine Gelegenheit"
 corruption.6.b: "Schlechte Idee"
 corruption.7.t: "Ein Vorschlag der Art..."
 corruption.7.d: "Eine der Nachrichtenagenturen bat uns um eine Finanzierung im Gegenzug für günstigere Nachrichten."
 corruption.7.a: "Vielleicht eine Gelegenheit"
 corruption.7.b: "Schlechte Idee"
 corruption.8.t: "Ein Vorschlag der Art..."
 corruption.8.d: "Einer der neutralen Politiker hat Ideen für eine Zusammenarbeit mit unserer Opposition geäußert, auch wenn dies einige schmutzige Arbeit erfordern wird"
 corruption.8.a: "Vielleicht eine Gelegenheit"
 corruption.8.b: "Schlechte Idee"
 corruption.9.t: "Ein Vorschlag der Art..."
 corruption.9.d: "One of the contractors approached us and asked if they could work around some of the laws to get the best possible results."
 corruption.9.a: "Vielleicht eine Gelegenheit"
 corruption.9.b: "Schlechte Idee"
 corruption.10.t: "Ein Vorschlag der Art..."
 corruption.10.d: "Einer der militärischen Subunternehmer fragte an, ob er einige der Gesetze umgehen könne, um den Bau neuer Einrichtungen zu beschleunigen."
 corruption.10.a: "Vielleicht eine Gelegenheit"
 corruption.10.b: "Schlechte Idee"
 corruption.11.t: "Ein Vorschlag der Art..."
 corruption.11.d: "Eine der Baufirmen wandte sich an uns und fragte, ob sie einige Umweltgesetze ignorieren könnten, um die bestmöglichen Ergebnisse zu erzielen."
 corruption.11.a: "Vielleicht eine Gelegenheit"
 corruption.11.b: "Schlechte Idee"
 corruption.12.t: "Ein Vorschlag der Art..."
 corruption.12.d: "Einer der militärischen Unterauftragnehmer wandte sich an uns und fragte, ob sie einige Umweltgesetze ignorieren könnten, um die bestmöglichen Ergebnisse zu erzielen."
 corruption.12.a: "Vielleicht eine Gelegenheit"
 corruption.12.b: "Schlechte Idee"
 corruption.13.t: "Ein Vorschlag der Art..."
 corruption.13.d: "Einer der Investmentfonds meldete sich mit einem interessanten Plan, um Investitionen im Ausland zu tätigen, der allerdings gegen internationales Recht zu verstoßen scheint."
 corruption.13.a: "Vielleicht eine Gelegenheit"
 corruption.13.b: "Schlechte Idee"
 corruption.14.t: "Ein Vorschlag der Art..."
 corruption.14.d: "Einer unserer engen Freunde wandte sich an uns und schlug vor, eine kleine Party zu veranstalten, damit die Regierung ihren vertrautesten Geschäftspartnern näher kommen kann."
 corruption.14.a: "Vielleicht eine Gelegenheit"
 corruption.14.b: "Schlechte Idee"
 corruption.15.t: "A Proposal of Sorts..."
 corruption.15.d: "One of our businessmen reached out and suggested a scheme to increase profits from resource gain, though it will surely put a strain on the industry as a whole"
 corruption.15.a: "Perhaps, an opportunity"
 corruption.15.b: "Schlechte Idee"
 MD_character_army.1.t: "[FROM.GetName] is killed in action"
 MD_character_army.1.d: "After commanding [FROM.GetHersHis] forces to retreat, it seems [FROM.GetRank] [FROM.GetName] was caught under fire from enemy units, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.1.a: "A loss for the nation."
 MD_character_army.2.t: "[FROM.GetName] is killed in action"
 MD_character_army.2.d: "After securing another victory, it seems [FROM.GetRank] [FROM.GetName] was attacked by regrouping units of the enemy, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.2.a: "A loss for the nation."
 civil_war_debuff.1.t: "Our Military Recovers!"
 civil_war_debuff.1.d: "The initial shock of the civil war sent our nation into complete chaos. We lost contact with some of our military units and our commanders, our supply depot responsible stop responding and we didn't even know where our enemy was. The fronts have now stabilised and it is a bit more clear who is on whose side, but many challenges still remain.\n\nOur military is composed of veterans and volunteers, with no clear picture of the chain of command. We are struggling with supplying our troops and establishing direct supply routes. We also don't have a clear picture of battles that have been fought and what tactics our enemy is using. What should we do first?"
 civil_war_debuff.1.a: "We need to get a clear picture of the command!"
 civil_war_debuff.1.b: "We're going to need guns. Lots of guns."
 civil_war_debuff.1.c: "Write everything down! We need to study our enemy."
 civil_war_debuff.2.t: "Our Military Recovers!"
 civil_war_debuff.2.d: "While our military has been in a chaotic situation for a long time, things are now getting better. We have a rough idea of who and where our military is, and we have managed to secure some supply lines. However, the military still lacks overall cohesion and many units and militias operate independently from central command.\n\nOur military has a chain of command, but responsibilities and authorities are not always respected. We have a somewhat steady supply of weapons but many units have their proprietary supplies. We also don't have a common tactic defined for our troops. What should we do to try to improve?"
 civil_war_debuff.2.a: "The troops need to know what is their mission and who leads them"
 civil_war_debuff.2.b: "We can't afford disjointed military procurement."
 civil_war_debuff.2.c: "Hand out some field manuals to our troops."
 civil_war_debuff.3.t: "Our Military Recovers!"
 civil_war_debuff.3.d: "The confusion in our military is starting to disappear. The way our soldiers act is starting to resemble an actual military now. Some minor problems still remain.\n\nThere exists some duplicate commands where commanders' authorities overlap. Military procurement orders sometimes disappear, and the money intended for them ends up outside of the troops. We are losing a lot of field experience and trainers as soldiers are discharged without documentation and casualties are not properly racked. What should we try to improve?"
 civil_war_debuff.3.a: "Clarify commands and solve internal conflicts."
 civil_war_debuff.3.b: "Fight corruption for military purchasing."
 civil_war_debuff.3.c: "Setup a process for passing down field experience."
 civil_war_debuff.4.t: "Our Military Recovers!"
 civil_war_debuff.4.d: "We are almost there. While some minor issues remain, our military is almost looking like it did before the war. Just a few more organisational reforms should turn our army fully professional again.\n\nThere are still several militias that aren't fully integrated into the army. Some of the equipment we are buying and producing isn't interchangeable. Our high command is requesting additional resources for analysing the combat experiences from the war. What should we try to improve?"
 civil_war_debuff.4.a: "Integrate the remaining militias."
 civil_war_debuff.4.b: "Unify our equipment stockpiles."
 civil_war_debuff.4.c: "Allocate additional officers to our high command."
 civil_war_debuff.5.t: "Our Military Recovers!"
 civil_war_debuff.5.d: "It is done. After two years of reforming an inefficient military, we have overcome the damage caused by the civil war. We can now get back to making our military guard us against external threats, and not internal."
 civil_war_debuff.5.a: "A great day for [ROOT.GetNameDef]."
 protests.1.t: "Rising Tensions"
 protests.1.d: "The public unrest is growing due to dissatisfaction with government spending. Protests are becoming more frequent and radicalized. The administration must choose between taking a firm stance or attempting to appease the masses."
 protests.1.a: "Ignore them"
 protests.1.b: "Enforce Order"
 protests.1.c: "Start Negotiations"
 protests.2.t: "Political Power Struggle"
 protests.2.d: "With public discontent rising, political maneuvering is becoming more precarious. The situation demands a choice between safeguarding political power at the risk of increasing radicalization or taking a gamble that may lead to more severe consequences."
 protests.2.a: "Roll the Dice"
 protests.2.b: "Hold the Line"
 protests.2.c: "Start Negotiations"
 protests.3.t: "Crisis in Leadership"
 protests.3.d: "The ruling party's popularity is wavering due to the ongoing protests. The government faces a critical decision that may either strengthen or weaken its grip on power. The outcome could have a lasting impact on the nation's political landscape"
 protests.3.a: "Ignore the protestors"
 protests.3.b: "Disperse the radicals"
 protests.3.c: "Start Negotiations"
 protests.4.t: "Foreign Meddling"
 protests.4.d: "As domestic unrest grows, foreign powers are taking interest. The government must decide between accepting foreign influence as it is or trying to control foreign agents."
 protests.4.a: "Don't make hasty moves"
 protests.4.b: "Find every last one of them"
 protests.4.c: "Start Negotiations"
 protests.5.t: "Stalled Progress"
 protests.5.d: "The protests are causing a significant slowdown in construction projects nationwide. The administration must choose between mitigating the effects for a shorter duration or attempting to pacify the protestors, risking longer delays."
 protests.5.a: "This will surely stop in a few days"
 protests.5.b: "Now police will have some work"
 protests.5.c: "Start Negotiations"
 protests.6.t: "Military Production Crisis"
 protests.6.d: "The growing unrest is affecting military production, and the government faces a crucial decision. Should they enforce measures to maintain output or attempt to de-escalate the protests, possibly exacerbating the production crisis?"
 protests.6.a: "They will return to work soon enough"
 protests.6.b: "Preserve production by force"
 protests.6.c: "Start Negotiations"
 protests.10.t: "Nation on the Brink"
 protests.10.d: "Public unrest has reached a critical level. The government's decision now may either lead to further destabilization or an even more radicalized populace. The situation is dire."
 protests.10.a: "This will go over"
 protests.10.b: "Suppress at All Costs"
 protests.10.c: "Accept their demands"
 protests.11.t: "Political Turmoil"
 protests.11.d: "The political landscape is now in chaos. A choice between a significant loss of political power or a risky play with even greater potential losses must be made. The stakes are higher than ever."
 protests.11.a: "This will go over"
 protests.11.b: "National guard to the rescue"
 protests.11.c: "Accept their demands"
 protests.12.t: "Collapse of Trust"
 protests.12.d: "Trust in the ruling party is eroding rapidly. A pivotal decision that may further diminish the party's popularity or risk a total collapse of political authority awaits. The nation watches with bated breath."
 protests.12.a: "This will go over"
 protests.12.b: "Use force"
 protests.12.c: "Accept their demands"
 protests.13.t: "Grinding Halt"
 protests.13.d: "Construction nationwide is severely affected. With the stakes raised, the government must decide between a drastic reduction in speed for a sustained period or a potentially catastrophic negotiation with protestors."
 protests.13.a: "We cant address that right now"
 protests.13.b: "Enforce the work"
 protests.13.c: "Accept their demands"
 protests.14.t: "War Machine Faltering"
 protests.14.d: "With military production in crisis, the government faces an agonizing choice. They must either enforce measures that will drastically affect output for an extended period or gamble with even more significant consequences."
 protests.14.a: "We cant address that right now"
 protests.14.b: "Where is my national guard?"
 protests.14.c: "Accept their demands"
 protests.20.t: "The Breaking Point"
 protests.20.d: "Years of unrest, dissatisfaction, and failed negotiations have culminated in a moment of national catastrophe. What began as a murmur of discontent has grown into a deafening cry for revolution, and the streets are now filled with the clamor of conflict. Despite attempts to quell the unrest, reconcile differences, and restore order, the government's efforts have proved fruitless. The people's trust has eroded, and their patience has worn thin. The nation stands divided, and the fabric of society is torn asunder. Neighbors turn against neighbors, and former friends become foes as lines are drawn and sides are chosen. The protestors have taken up arms, and the air is thick with the tension of impending battle. A new chapter in the nation's history is about to be written, and the ink is blood. The civil war begins."
 protests.20.a: "Brace for Conflict"
 migrant_event.1.t: "Migrant Slums"
 migrant_event.1.d: "Some of the areas around our major cities have started to develop what the locals are calling \"Migrant Slums\". It is an area of destitute migrants and refugees within the country who have tried to make an attempt at making a living but due to low wages and very little assimilation into the host nation they've found themselves in these slums."
 migrant_event.1.a: "Breakup the Slums"
 migrant_event.1.b: "Provide Assistance"
 migrant_event.1.c: "Reduce Migration Targets"
 migrant_event.2.t: "Nationalists Protest Migrant Policy"
 migrant_event.2.d: "A group of nationalists have organized a protest in one of our major cities against the recent migrants into the nation. The protest is calling for additional limitations on migrancy and to start to further regulate immigration and migration within the nation."
 migrant_event.2.a: "Allow the Demonstration"
 migrant_event.2.b: "Breakup the Demonstration"
 migrant_event.3.t: "Migrants Accused of Violent Crimes"
 migrant_event.3.d: "Particular groups of migrants within the country have been accused of various violent crimes and our police have arrested a large number of new migrants into the country. Right-wing protestors and supporters have started to tell the government that this would be the consequences of not having our borders closed. How should we respond?"
 migrant_event.3.a: "They did tell us so..."
 migrant_event.3.b: "Increase Police Funding.."
 LibyaNews.1.a: "Excellent"
 Sudan.1.t: "Those Left Behind"
 Sudan.1.d: "Some of our territories on our southern border still have quite a large Christian and Animist population. Many people in those territories are upset that they have been excluded from the referendum of South Sudan. The dissent has gronw larger and larger, and those people are now demanding to be joined together with [SSU.GetName], as they feel that under our government they do not get the proper presentation."
 Sudan.1.a: "Fine, we don't need them"
 Sudan.1.b: "That is rightfully our land!"
 Sudan.2.t: "Alliance With [DAR.GetNameDef]?"
 Sudan.2.d: "We are not the only ones fighting against the government. There are also rebels in Darfur. Perhaps we should promise them increased representation in the future Sudanese government if the ally with us?"
 Sudan.2.a: "Send them a request"
 Sudan.2.b: "We don't need them"
 Sudan.2.a.tt: "If they accept, then\n"
 Sudan.3.t: "[FROM.GetNameDef] Offers An Alliance"
 Sudan.3.d: "We have been offered an alliance by [FROM.GetNameDef], as they are too fighting against the [SUD.GetAdjective] government. They promise us increased representation in the new Sudan government that they are building. What should we respond?"
 Sudan.3.a: "We agree"
 Sudan.3.b: "We don't need them"
 Sudan.4.t: "[FROM.GetNameDef] Agrees To Ally Us"
 Sudan.4.d: "[FROM.GetNameDef] has agreed to from a common front against [SUD.GetLeader] together with us."
 Sudan.4.a: "Great!"
 Sudan.5.t: "[FROM.GetNameDef] Refuses To Ally Us"
 Sudan.5.d: "[FROM.GetNameDef] has refused to from a common front against [SUD.GetLeader] together with us."
 Sudan.5.a: "Their loss"
 Sudan.6.t: "[FROM.GetNameDef] And [DAR.GetNameDef] Join Forces"
 Sudan.6.d: "[FROM.GetNameDef] and [DAR.GetNameDef] have formed a common front in their fight against us."
 Sudan.6.a: "Damn"
 SudanNews.1.d: "The conflict in South Kordofan and the Blue Nile is finally over. [FROM.GetLeader] has claimed victory in the conflict, and it remains to be seen which direction the country will go in the future."
 SudanNews.2.t: "Conflict in South Kordofan and the Blue Nile"
 SudanNews.2.d: "After the Comprehensive Peace Agreement, some areas in [SUD.GetName] with Christian and Animist populations were left from being included in the South Sudanese independence referendum. The people living here have grown increasingly tired of the [SUD.GetAdjective] government ever since the agreement. They feel that they lack representation in the current government, and have now taken up arms against the government."
 SudanNews.2.a: "Interessant"
 SouthSudan.1.t: "South Sudanese Independence Referendum"
 SouthSudan.1.d: "The time has come for the South Sudanese people to vote for their independence. While some of the people living in Sudan are not happy that they have been left out of the referendum area, we have managed to encompass most of the Christian and Animist population. This will turn a new leaf in peace and prosperity for both Sudans."
 SouthSudan.1.a: "And the winner is..."
 SouthSudan.4.t: "[FROM.GetNameDef] Asks For Support"
 SouthSudan.4.d: "Our longstanding ally, [FROM.GetLeader] has requested military help in their fight against [SUD.GetNameDef]. He has stated that without our military help, their war effort will crumble. In the late 80s, our troops were involved in the fight in Southern Sudan, but with the conflict in Congo we had to shift priorities. Congo is now dealt with, maybe we can spare something to [FROM.GetLeader]?"
 SouthSudan.5.t: "[FROM.GetNameDef] Supports Us"
 SouthSudan.5.d: "[FROM.GetLeader] has agreed to help us. [FROM.GetAdjective] troops should be crossing the border any day now."
 SouthSudan.5.a: "Perfect!"
 SouthSudan.6.t: "[FROM.GetNameDef] Backs Down"
 SouthSudan.6.d: "[FROM.GetLeader] has stated that he can't afford to help us anymore than he already has."
 SouthSudan.6.a: "Damn"
 SouthSudan.7.t: "[FROM.GetNameDef] Willing To Cede Land"
 SouthSudan.7.d: "[SUD.GetNameDef] is currently embroiled in a civil war. The opposing faction of [SSU.GetName] has offered us a deal; They will give us complete control over the territory of the Ilemi Triangle, and in exchange we help them setup a military supply network. Should we accept their offer?"
 SouthSudan.7.a: "Of course"
 SouthSudan.7.b: "We are not interested"
 SouthSudan.8.t: "[FROM.GetNameDef] Accepts Our Deal"
 SouthSudan.8.d: "[FROM.GetLeader] has agreed to take control of the Ilemi Triangle in exchange for helping us with our military."
 SouthSudan.8.a: "Perfect!"
 SouthSudan.9.t: "[FROM.GetNameDef] Rejects Our Deal"
 SouthSudan.9.d: "[FROM.GetLeader] has rejected our offer of the Ilemi Triangle. They fear that this move would earn them some repercussions from [SUD.GetNameDef]."
 SouthSudan.9.a: "Damn"
 SouthSudan.10.t: "Congolese Rebels Cross the Border"
 SouthSudan.10.d: "We've received reports of larged armed groups that have crossed the border from [DRC.GetNameDef] and have attacked the towns of Yambio and Yei. It seems that these groups have been equipped and hired by the [SUD.GetAdjective] government. The opposition of [DRC.GetName] against [UGA.GetName] has given them motivation to allow this border crossing to happen."
 SouthSudan.10.a: "Damn the Congolese!"
 SouthSudan.11.t: "Preparing For The Referendum"
 SouthSudan.11.d: "With a peace deal signed between the North and South of Sudan, both parties have begun preparing for the referendum. Current projections show that the great majority of [SSU.GetAdjective] people will vote for independence, as they are not that keen on being ruled by hardline Muslims. However, with political meddling and control over key government figures, it might be possible for the North to gain control over the South again."
 SouthSudan.11.a: "We must prepare"
 SouthSudan.11.tooltip: "The likelihood of people in South Sudan voting to stay part of Sudan is §Y[SUD.GetAdjective] Influence in [SSU.GetNameWithFlag] multiplied by 0.75§!. If [SUD.GetAdjective] Influence in [SSU.GetNameWithFlag] is §Ybelow 20%§!, the referendum will always result in §Yindependence§!."
 SouthSudan.12.t: "[FROM.GetNameDef] Becomes Independent"
 SouthSudan.12.d: "[FROM.GetName] has held their independence referendum in the territories they controlled. The results for independence was a sounding 99.83% in favour. Surprisingly, there was very little electoral violence predating the vote, and generally the elections were seen as having been fair."
 SouthSudan.12.a: "I guess this is goodbye"
 SouthSudan.13.t: "[FROM.GetNameDef] Favours Unity"
 SouthSudan.13.d: "[FROM.GetName] has held their independence referendum in the territories they controlled. It was a close race but the votes for staying with Sudan won with 54% of the votes. Many South Sudanese expressed fears that trying to separate from Sudan would only reignite the civil war."
 SouthSudan.13.a: "Welcome back!"
 SouthSudan.14.t: "[ROOT.GetLeader]'s Helicopter Crashes"
 SouthSudan.14.d: "For the weekend, our president [ROOT.GetLeader] had gone to meet his long time ally [UGA.GetLeader]. He had not told about to this trip to the [SUD.GetAdjective] government, and instead had lied that he was on holiday in New Kush. [ROOT.GetLeader] however, never made it back home. On his return flight, his helicopter crashed into a mountain range in Southern Sudan killing him, six of his colleagues and seven [UGA.GetAdjective] crew members. Our government is scrambling to solve matter of succession, but it is likely that [ROOT.GetLeader]'s deputy Salva Kiir Mayardit will take office."
 SouthSudan.14.a: "A few months after the peace? Suspicious..."
 SouthSudan.15.t: "Rumours Of A Coup"
 SouthSudan.15.d: "We have heard rumours that one of our allies during the civil war is planning to overthrow our government. We could dismiss these rumours. However, considering that our army is currently made up of dozens of smaller rebel groups, it is more than likely that somebody is trying to take the throne. What should we do?"
 SouthSudan.15.a: "Our allies are loyal"
 SouthSudan.15.b: "Purge the generals! The police! Everybody!"
 SouthSudan.15.a.tt: "If a civil war starts, the opposition will be §Ystronger§! than our side"
 SouthSudan.15.b.tt: "If a civil war starts, the opposition will be §Yweaker§! than our side"
 SouthSudan.16.t: "What's In A Name?"
 SouthSudan.16.d: "Now that we are independent, we need to decide what to name our country. Several suggestions have been collected from the public, with South Sudan being the obvious favourite. However, we could elect to choose another name"
 SouthSudan.16.a: "South Sudan is good"
 SouthSudan.16.b: "Azania, to remember our history"
 SouthSudan.16.c: "The Nile Republic is most fitting"
 SouthSudan.16.dd: "The Kush Republic is the best"
 SouthSudanNews.1.d: "The civil war in [SSU.GetNameDef] has come to an end. The war started following a power struggle between various rebel groups, only a short while after the country had finalised its business with [SUD.GetNameDef]. Perhaps now the country will be able to start rebuilding."
 SouthSudanNews.2.t: "The Comprehensive Peace Agreement"
 SouthSudanNews.2.d: "The [SUD.GetAdjective] and [SSU.GetAdjective] factions have come to a peace agreement ending the Second Sudanese Civil War. With the help of negotiators from Intergovernmental Authority on Development, the two parties agreed on a framework in which [SSU.GetNameDef] would be granted autonomy under the [SUD.GetAdjective] government. The parties agreed that within 6 years, a referendum would be held on the full independence of [SSU.GetNameDef]. Perhaps this agreement will finally solve the decades old ethnic conflict in the region."
 SouthSudanNews.3.t.SUD: "South Sudanese Rebels Crushed"
 SouthSudanNews.3.t.SSU: "A New Sudan Is Born"
 SouthSudanNews.3.d.SUD: "The latest episode of the [SUD.GetAdjective] ethnic conflict has come to an end as the [SUD.GetAdjective] government has crushed the rebels in the Southern parts of the country. This will leave [SUD.GetLeader] free to continue his islamisation and arabization of the country, much to the dislike of the Southern Christian and Animist population."
 SouthSudanNews.3.d.SSU: "The latest episode of the [SUD.GetAdjective] ethnic conflict has come to an end as the South Sudanese rebels have toppled the government. The previous [SUD.GetAdjective] leader [SUD.GetLeader] has been imprisoned and is waiting for trial on human rights abuses and war crimes. The new regime is promising a free and equal Sudan, but many analysts have pointed out that the ruling [SSU.GetLeader] has already taken steps of silencing any opposition during their tenure as leader of the rebels."
 SouthSudanNews.3.a: "Interessant"
 SouthSudanNews.4.t.independence: "[FROM.GetNameDef] Becomes Independent"
 SouthSudanNews.4.t.autonomy: "[FROM.GetNameDef] Remains Part Of [SUD.GetNameDef]"
 SouthSudanNews.4.d.independence: "[FROM.GetNameDef] has held an independence referendum as agreed by their peace agreement with [SUD.GetName]. The results were an astonishing 98% in favour of separation of the two states. This makes [SSU.GetName] the youngest country in Africa."
 SouthSudanNews.4.d.autonomy: "[FROM.GetNameDef] has held an independence referendum as agreed by their peace agreement with [SUD.GetName]. The results were close to a tie, but the option favouring unity with [SUD.GetName] won by 53%. It is speculated that fears of the war reigniting if [SSU.GetName] were to separate from [SUD.GetName] made voters favour unity. Regardless, [SSU.GetName] has been granted some autonomy but it remains to be seen how long it will last."
 SouthSudanNews.4.a: "Interessant"
 SouthSudanNews.5.t: "Civil War In [SSU.GetNameDef]"
 SouthSudanNews.5.d: "A civil war has begun in the young nation of [SSU.GetName]. Only a few years after ending their conflict with [SUD.GetName], conflict has begun again. It seems that since there is no more a common enemy for the various rebel groups, a power struggle has started between the various groups."
 SouthSudanNews.5.a: "Interessant"
 war_in_darfur_threat: "War In Darfur"
 Darfur.2.t: "Darfuri Rebels Attack Golo"
 Darfur.2.d: "A group of rebels belonging to the Darfur Liberation Front and Justice and Equality Movement have attacked the small town of Golo, the headquarters of the Jebel Marra district, just south of Kabkabiya. The attack was preceded by smaller skirmishes against local police stations, army outposts and military convoys. The rebels are tired of [SUD.GetLeader]'s Arabisation policies in the region, and are demanding they step down."
 Darfur.2.a: "Damn"
 Darfur.3.t: "Darfuri Rebels Close Chadian Border"
 Darfur.3.d: "A group of rebels belonging to the Darfur Liberation Front and Justice and Equality Movement have occupied the border town of Tine near the Chadian border. In the process, they captured a large amount of weapons and supplies. The rebels are trying to create a connection to Chad, where many tribes that are sympathetic to the Darfuri cause live."
 Darfur.3.a: "Damn"
 Darfur.4.t: "Darfuri Rebels Raid El Fasher"
 Darfur.4.d: "At early morning, a group of Darfur Liberation Front and Justice and Equality Movement rebels attacked the sleeping garrison at El Fasher. In the next few hours, several military aircraft had been destroyed at the local airbase, leaving 75 soldiers dead and 32 captured. The rebels also managed to capture a major general, who was the commander of the air base. This has been a major setback for our military, and several military units have abandoned their posts fearing attacks from the rebels."
 Darfur.4.a: "Damn"
 DarfurNews.1.t: "War In Darfur Begins"
 DarfurNews.1.d: "Decades of forced Arabization policies by the [SUD.GetAdjective] government has finally reached its boiling point. Two rebel groups, the Darfur Liberation Front and the Justice and Equality Movement, have escalated the conflict from a low level insurgency into a full war. Time will tell if [SUD.GetName] will be able to handle these rebels."
 DarfurNews.1.a: "Interessant"
 DarfurNews.2.t: "[DAR.GetNameDef] Granted Autonomy"
 DarfurNews.2.d: "After years of conflict between the [DAR.GetAdjective] rebels and [SUD.GetAdjective] government forces, the two sides have agreed to a peace deal. [DAR.GetName] will be given limited autonomy under [SUD.GetName], which should safeguard them against discrimination. Only time will tell whether [SUD.GetLeader] plans to uphold this agreement."
 DarfurNews.2.a: "Interessant"
 DarfurNews.3.t: "[DAR.GetNameDef] Becomes Independent"
 DarfurNews.3.d: "After years of conflict between the [DAR.GetAdjective] rebels and [SUD.GetAdjective] government forces, the [DAR.GetAdjective] forces have managed to come on top. After successful incursions from Darfur into Sudan proper, the [SUD.GetAdjective] government had no options but to give concessions to the [DAR.GetAdjective] rebels. The nation of [DAR.GetName] has now been given full independence, but time will tell whether [SUD.GetName] is just using this as an opportunity to rebuild their forces."
 DarfurNews.3.a: "Interessant"
 corruption.16.t: "Corruption Increased"
 corruption.16.d: "Spies and agents from another country has meddled in our country increasing the rating of corruption in our country. It comes from a variety of sources such as targeted bribes, negotiations and well-placed subservive agents in the country."
 corruption.16.a: "Unfortunate"
 Israel.1111.t: "Rumours of a 3rd Intifada"
 Israel.1111.d: "The influential Palestinian Islamist group Hamas has called for a new uprising against Israel, starting on Friday. Speaking in Gaza on Thursday, Hamas' leader Ismail Haniyeh said, \"We should call for and we should work on launching an intifada in the face of the Zionist enemy.\" He also said, \"We want the uprising to last and continue to let Trump and the occupation regret this decision.\""
 Israel.1111.a: "Uh oh..."
 Israel.1112.t: "Israel threatens war"
 Israel.1112.d: "Due to our frozen conflict with Israel in the Golan Heights they have threatened to declare war on us unless we revoke our claim!"
 Israel.1112.a: "Revoke our claim in the Golan"
 Israel.1112.b: "Krieg!"
 restart_boardcross_expenditure: "Restarts all expenditure across the board"
 god_of_war_event.1.t: "Up For A Challenge?"
 god_of_war_event.1.d: "Normally, apart from most basic buffs, AI in MD does not cheat. It goes for RP-style designs for vehicles and divisions, but with this option, AI WILL CHEAT.\nIt would create equipment and divisions out of thin air, and will try harder to resist against the player generally. It won't be Endsieg experience, AI is made to challenge the player, not overwhelm you.\n\nP.S. You still don't get bragging rights after beating this AI."
 god_of_war_event.1.a: "Los geht´s!"
 god_of_war_event.1.b: "Also make AI focus on me more!"
 md4.21.t: "[FROM.GetName]-[Root.GetName] EAEU Integration"
 md4.21.d: "[FROM.GetNameDef] is asking us to allow them into EAEU. We will have priority to export to and import from them and will economically integrate into each other further."
 md4.21.a: "Sign it!"
 md4.21.b: "Refuse."
 md4.22.t: "[FROM.GetNameDef] Has Signed Our Ascension into EAEU!"
 md4.22.d: "[FROM.GetNameDef] has accepted our offer to sign allow us into EAEU."
 md4.22.a: "It will make both of us prosperous!"
 md4.23.t: "[FROM.GetNameDef] Has Refused our offer to sign allow us into EAEU."
 md4.23.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.23.a: "They fear our superior products!"
 EUR_idea_eacu_cooperation: "EAEU Cooperation"
 EUR_idea_eacu_cooperation_desc: "The Eurasian Customs Union (originally the Eurasian Economic Community), promotes economic ties between most of the post-Soviet states. The union imposes a common external tariff on all goods entering the union, and act as one singular entity when producing trade deals and negotiations."
 EUR_idea_eacu_cooperation_2: "EAEU Integrated Cooperation"
 EUR_idea_eacu_cooperation_2_desc: "The Eurasian Customs Union (originally the Eurasian Economic Community), promotes economic ties between most of the post-Soviet states. The union imposes a common external tariff on all goods entering the union, and act as one singular entity when producing trade deals and negotiations."
 influence.1.c: "Senden Sie 15 % des BIP als Wirtschaftshilfe."
 influence.1.e: "On second thoughts, they don't need it."
 Cameroon.2.t: "Das Bootswrack"
 Cameroon.2.d: "Ein Boot mit 150 Passagieren an Bord war auf dem Weg vom nigerianischen Hafen Oron zum gabunischen Hafen Gentil, als es kenterte. Schätzungsweise über hundert Passagiere sind gestorben, die übrigen befinden sich in kritischem Zustand und klammern sich an Treibgut aus dem Schiffswrack. Lokale Fischer und kamerunische Behörden suchen derzeit in der Stadt Kirbi nach weiteren Überlebenden, doch die Lage wird immer düsterer...\n\nWir können anbieten, die Arztrechnungen der Überlebenden zu übernehmen, oder wir können einen Tag des Gebets für die Seelen der Toten und ihre Genesung einberufen."
 Cameroon.2.a: "Wir sollten die Arztrechnungen bezahlen."
 Cameroon.2.b: "Ein Tag des Gebets ist angebracht."
 world_war.1.t: "Rail-Roaded World War Enabled"
 world_war.1.d: "Traditionally Millennium Dawn has been a sand-box oriented mod, and has thus strayed from rail-roading a World War like other mods. This option has been made to satisfy the itch some in the community have for just a war oriented gameplay style. This game rule has been created with MD principles in mind, and will thus have different scenarios of how the World War starts based on who you are playing as. The War will start around 2014 so that you may have some time to prepare for the war."
 world_war.1.a: "Okay"
 world_war.2.t: "China Moves Against Taiwan"
 world_war.2.d: "The PLA has announced that it is commencing operations against the Republic of China, marking the continuation of the Chinese civil war. Though not something that our intelligence hadn't picked up on, we had reasons to believe that China would show restraint in the face of a possible retaliation by the United States."
 world_war.2.a: "[CHI.GetName] has crossed our red line"
 world_war.2.b: "Asian problems are the Asian's problems"
 world_war.3.t: "American Intervention Against China"
 world_war.3.d: "[USA.GetLeader] today announced that he has ordered the United States military to prepare for a full-scale mobilization against [CHI.GetName]. This comes following Chinese attacks against Taiwan, and the continuation of the Chinese civil war. Though China has given its reasons for the invasion, the United States has stated that the main purpose for this intervention is to show that the 'United States will always back their allies, regardless of the aggressor'. Fears are circulating that this intervention would lead to further escelation in the region, with some dubbing this as the start of the Third World War."
 world_war.3.a: "Worrying"
 world_war.4.t: "America Distracted in China"
 world_war.4.d: "The imperialists in Washington have begun a campaign against our partners in China. With this in mind, we have a golden opportunity right in front of us. While they are distracted with China, we have the ability to move in and reclaim what was once ours, the entirety of Korea."
 world_war.4.a: "We cannot risk wasting such an opportunity"
 world_war.4.b: "It is too risky"
 world_war.5.t: "Conflict in Asia Escalates"
 world_war.5.d: "The war in Asia has escalated, with the North Korean government attacking the Republic of Korea in a bid to reunite the entirety of the Korean penuinsula under DPRK rule. This move by the Democratic People's Republic of Korea has prompted Japan to respond by sending troops to the Republic of Korea, sparking the start of a much grander war than anticipated. The world is watching with baited breath, as the war which started with China has now quickly engulfed the majority of Eastern Asia. Nations across the globe, particularly in Europe and Africa, are condemning the violence in Asia amidst fears of an additional theater of war opening Europe as a result of the chaos and instability present in the world today."
 world_war.5.a: "The third world war is here"
 world_war.6.t: "War in Korea"
 world_war.6.d: "The DPRK has escalated the war in the region by illegally declaring war against the Republic of Korea. This move threatens the order which we have so tirelessly worked to preserve over the decades, and calls for action are rising amongst our population. We must defend our friends and integrity by supporting Korea one way or the other."
 world_war.6.a: "DPR Korea has made a grave mistake today"
 world_war.6.b: "We cannot get involved"
 world_war.7.t: "Russia Pushes Westward"
 world_war.7.d: "The Russian government has pushed westward, and have begun a full-scale war against Ukraine. This expansion has our military command and our allies greatly worried, as the fate of the European continent is unknown, and will remain unknown until we demonstrate to the Russians that Europe is not a pie that is to be consumed."
 world_war.7.a: "Russia has took it too far this time"
 world_war.7.b: "We cannot risk a war"
 world_war.8.t: "War in Europe"
 world_war.8.d: "Following Russian incursions into Ukraine, NATO forces were seen moving into Ukraine to confront Russian forces. Reports of aerial and naval skirmishes are already popping up, signaling the start of a greater war in Europe. International organizations throughout the world have begun dubbing this conflict as the Third World War, as NATO forces are currently engaged with Russian forces throughout Europe. Almost every nuclear armed nation is currently at war with one another, and fears of a nuclear exchange continues to grow. No one knows whether the world will end, but one thing is for certain, the next world order will most certainly ensure that it will not be a multi-polar one."
 world_war.8.a: "History is written once more"
 world_war.9.t: "Our Ambitions in the World"
 world_war.9.d: "Today, the Americans, Chinese, and Japanese are engaged in a great conflict against one another. With the Europeans involved in the war effort, our government has become increasingly worried of European expansion eastward towards our borders. Military command has suggested that we move into Ukraine to prevent a possible European surprise attack in the future."
 world_war.9.a: "Listen to their advice"
 world_war.9.b: "We cannot risk a war based on assumptions"
 world_war.10.t: "War Breaks Out in the Middle East"
 world_war.10.d: "Following several Iranian strikes on Israel, the IDF has called upon its allies to topple and dismantle the government in Iran. This world changing event is just another part of a greater war which experts have dubbed as the third world war, with now yet another theater of war coming about. The rivalry between Iran and Israel is not something new, having started after the Islamic Revolution of Iran in 1979. It is not known whether Iran possess nuclear weapons, but there are fears of a potential nuclear exchange between the Axis of Resistance and Israel. It is currently unknown whether any third parties are going to involve themselves in such a conflict, but what is indeed known is that this war could see the potential destruction of the middle east and global oil markets."
 world_war.10.a: "Is anywhere safe?"
 world_war.11.t: "The Liberations of the Quds"
 world_war.11.d: "With America and the rest of the worlds great powers distracted in a war of attrition, we finally have ample opportunity to strike Israel and bring about the end of the Zionist regime. Such an attack could see the destruction of our two states, but it is now, or never."
 world_war.11.a: "Attack!"
 world_war.11.b: "We cannot risk a war"
 taiwan.17.t: "Choosing A New Capital"
 taiwan.17.d: "As we savor the fruits of victory, we need to begin thinking about the relocation of our administrative capital towards the mainland. Taipei is simply too far from the major population centers of mainland China, and as a result, our ability to effectively govern the nation has become increasingly difficult. Thus, our capital shall be..."
 taiwan.17.a: "Beijing"
 taiwan.17.b: "Shanghai"
 taiwan.17.c: "Chongqing"
 taiwan.17.d1: "The same, Taipei"
 taiwan.17.e: "Nanjing"
 city_captured.12.t: "Fall of Baidoa"
 city_captured.12.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Baidoa, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.12.a: "Interesting"
 city_captured.13.t: "Fall of Kismayo"
 city_captured.13.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Kismayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night.."
 city_captured.13.a: "Interesting"
 city_captured.14.t: "Fall of Galkayo"
 city_captured.14.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Galkayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.14.a: "Interesting"
 taiwan.18.t: "The Great Chip Race"
 taiwan.18.d: "As we move into the 2000s, our superiority of microchip production is coming under threat. The People's Republic of China are beginning to expand their microchip production industry, in an attempt to bypass our production capability. We must stay ahead in order to protect our position on the global stage."
 taiwan.18.a: "We Will Win!"
 systems.1.t: "Welcome to Millennium Dawn"
 systems.1.d: "Welcome to Millennium Dawn! Thank you for downloading and playing the mod. If you're new, we recommend exploring the various menus to familiarize yourself with the features. Menus typically can be opened via buttons at the top of the various screens Need help? Join our Discord community where we're happy to assist you with any questions or issues. You can report bugs in-game using \"Report An Issue\" in the pause menu or through our Discord channels.\n\nImportant Information:\n- Fuel is negative on game start due to power plants and population consumption. Look at the Energy UI in the Construction Menu for more details.\n- Historical focus =/= historical outcomes. We use the historical focus option to encouarge the AI to make the most historical possible choice in given choices and options. This is not a guarantee for a historical game."
 systems.1.a: "Okay."
 protests.100.t: "Report: Protests Erupt in [ROOT.capital.GetCapitalVictoryPointName]"
 protests.100.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that recent political shifts in the nation have resulted in the mass mobilization of people, with the first sparks of revolt breaking out in [ROOT.capital.GetCapitalVictoryPointName]. The state security apparatus is currently awaiting orders from the higher-ups before deciding what to do, but unless protester demands are met, this movement may spiral into seeing our government overthrown.\n\nProtest are projected to spread outside of the capital until it engulfs our nation as a whole.\n\n Signed,\n - Internal Security Directorate"
 protests.100.a: "We'll see what we can do"
 protests.101.t: "Report: Protests Spread!"
 protests.101.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears the protests have continued to spread, reaching new states and provinces nationwide. We will need to determine a method to deal with these protesters so that order and calm is restored in society.\n\n Signed,\n - Internal Security Directorate"
 protests.101.a: "We have to act quick!"
 protests.102.t: "Report: Protests Fizzle Regionally"
 protests.102.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecent public disturbances in the region were addressed by local security and administrative authorities. Demonstrations that had formed in several urban and semi-urban areas were dispersed following coordinated efforts by law enforcement units. Authorities report that order has been restored and essential services remain operational.\n\n Signed,\n - Internal Security Directorate"
 protests.102.a: "Gut"
 protests.103.t: "Report: Calm Returns as Protests Disperse"
 protests.103.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nLocal security forces are reporting that protests have become incredibly limited in scale and size, with most cities and streets returning to normal operation. This report isn't from just one region, but several, signaling a general lack of energy amongst protesters. This is likely the end of the protest movement.\n\n Signed,\n - Internal Security Directorate"
 protests.103.a: "Excellent"
 protests.104.t: "Protesters Set Ablaze Industrial Assets!"
 protests.104.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several industrial assets, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.104.a: "Bulldoze it, there's no repairing that"
 protests.104.b: "Use government funds to begin reconstruction"
 protests.105.t: "Protesters Set Office Parks Ablaze!"
 protests.105.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several office parks, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.105.a: "Bulldoze it, there's no repairing that"
 protests.105.b: "Use government funds to begin reconstruction"
 protests.106.t: "Protesters Set Military Factories Ablaze!"
 protests.106.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several military factories, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.106.a: "Bulldoze it, there's no repairing that"
 protests.106.b: "Use government funds to begin reconstruction"
 protests.200.t: "Report: Incoming Protests"
 protests.200.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecently, our intelligence agency and security forces have caught wind of plans for a national revolt. This is due to recent developments within our country, creating a clique of dissatisified people. It is alledged that these people are starting to form groups in order to topple our government.\n\n Signed,\n - Internal Security Directorate"
 protests.200.a: "We must act quick"
 influence.5.d1: "Call in Albionis, we're going in"
 recognition.71.t: "The General Assembly Vote Has Passed"
 recognition.71.d: "The General Assembly has voted to admit us to the United Nations. After years of diplomatic effort, our seat is secured."
 recognition.71.a: "[THIS.GetName] takes its seat."
 recognition.72.t: "The General Assembly Vote Has Failed"
 recognition.72.d: "The General Assembly has fallen short of the votes needed to admit us. Our bid for UN membership has stalled for now."
 recognition.72.a: "A setback for our diplomacy."
 recognition.73.t: "General Assembly Rejects [FROM.GetName]'s Bid"
 recognition.73.d: "The General Assembly has voted against the admission of [FROM.GetNameDef] as a member state. The bid has stalled."
 recognition.73.a: "The vote is recorded."
 recognition.12.t: "[FROM.FROM.GetName] Seeks Security Council Recommendation"
 recognition.12.d: "[FROM.FROM.GetName] has petitioned the Security Council for a recommendation to the General Assembly, over the objection of [FROM.GetName]. The Council must now cast its vote."
 recognition.12.a: "Vote Yes"
 recognition.12.b: "Vote No"
 recognition.12.c: "Abstain"
 recognition.15.t: "Vote on [FROM.FROM.GetName] UN Membership"
 recognition.15.d: "With the Security Council's recommendation secured, the question of admitting [FROM.FROM.GetName], opposed by [FROM.GetName], now falls to the General Assembly."
 recognition.15.a: "Vote Yes"
 recognition.15.b: "Vote No"
 recognition.15.c: "Abstain"
 recognition.121.t: "Security Council Recommends [FROM.GetName] for UN Membership"
 recognition.121.d: "The Security Council has issued a recommendation in favor of admitting [FROM.GetName] to the United Nations. The matter now passes to the General Assembly."
 recognition.121.a: "A vote moves forward."
 recognition.122.t: "Security Council Rejects [FROM.GetName]'s Bid"
 recognition.122.d: "The Security Council has voted against recommending [FROM.GetName] to the General Assembly. The membership bid stops at this stage."
 recognition.122.a: "The bid stalls."
 UNSC.1.t: "Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all Offensive Wars"
 UNSC.1.d: "A Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all of their current offensive conflicts is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will have 210 days to resolve all of their ongoing offensive conflicts. If they fail to do so, they will be sanctioned until they finally end all of those conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.1.a: "Yes"
 UNSC.1.b: "No"
 UNSC.1.c: "Abstain"
 UNSC.2.t: "United Nations Security Council Sanctions against [?global.current_sc_vote_nation.GetName]"
 UNSC.2.d: "A Resolution to established UNSC sanctions against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the vote passes, [?global.current_sc_vote_nation.GetName] will be sanctioned until they no longer are an offensive threat to global peace, or until the Security Council removes the sanctions against them.\n\n$unsc_vote_pass_tt$"
 UNSC.2.a: "Yes"
 UNSC.2.b: "No"
 UNSC.2.c: "Abstain"
 UNSC.3.t: "Restrict Foreign Military Volunteers to [?global.current_sc_vote_nation.GetName]"
 UNSC.3.d: "A resolution to prevent foreign military volunteers from being sent to [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, any nation that sends military volunteers to [?global.current_sc_vote_nation.GetName] after the vote will be sanctioned until they either withdraw their volunteers, or the conflict ends.\n\n$unsc_vote_pass_tt$"
 UNSC.3.a: "Yes"
 UNSC.3.b: "No"
 UNSC.3.c: "Abstain"
 UNSC.4.t: "Arms Embargo against [?global.current_sc_vote_nation.GetName]"
 UNSC.4.d: "A Resolution to institute an arms embargo against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will be prevented from purchasing arms from the International Market until they end all of their current offensive conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.4.a: "Yes"
 UNSC.4.b: "No"
 UNSC.4.c: "Abstain"
 UN.6.t: "Confirm UN Security Council seat for [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.6.d: "The United Nations General Assembly is currently voting to confirm the upcoming members of the Security Council. All nations that are nominated must be confirmed by the General Assembly, and will serve a 2 year term, starting January 1st of the year [?global.next_year]\n\n$un_ga_vote_requires_2_3_tt$"
 UN.6.a: "Vote Yes"
 UN.6.b: "Vote No"
 UN.6.c: "Abstain"
 UN.7.t: "Establish Non-Binding Sanctions Against [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.7.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has conducted a military strike against a foreign nation. In response, they have requested that the §BUnited Nations§! sanction [?global.current_ga_vote_nation.GetNameWithFlag] for the next year as a punishment for this action. If we vote in the affirmative, we will agree to bring sanctions against [?global.current_ga_vote_nation.GetNameWithFlag].\n\n$un_ga_vote_auto_pass_tt$"
 UN.7.a: "Vote Yes"
 UN.7.b: "Vote No"
 UN.7.c: "Abstain"
