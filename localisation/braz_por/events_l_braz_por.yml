 MD_character_army.1.t: "[FROM.GetName] is killed in action"
 MD_character_army.1.d: "After commanding [FROM.GetHersHis] forces to retreat, it seems [FROM.GetRank] [FROM.GetName] was caught under fire from enemy units, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.1.a: "Uma perda para a nação."
 MD_character_army.2.t: "[FROM.GetName] is killed in action"
 MD_character_army.2.d: "After securing another victory, it seems [FROM.GetRank] [FROM.GetName] was attacked by regrouping units of the enemy, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.2.a: "Uma perda para a nação."
 civil_war_debuff.1.t: "Nosso Exército se Recupera!"
 civil_war_debuff.1.d: "O choque inicial da guerra civil lançou nossa nação em completo caos. Perdemos contato com algumas de nossas unidades militares e nossos comandantes, os responsáveis pelo depósito de suprimentos pararam de responder e nem sabíamos realmente onde estava nosso inimigo. As frentes agora estão estabilizadas e está um pouco mais claro quem está de que lado, mas muitos desafios ainda permanecem.\n\nNosso exército é composto por veteranos e voluntários, sem uma imagem clara da cadeia de comando. Estamos lutando para fornecer suprimentos às nossas tropas e estabelecer rotas de abastecimento direto. Também não temos uma imagem clara das batalhas que foram travadas e das táticas que nosso inimigo está usando. O que devemos fazer primeiro?"
 civil_war_debuff.1.a: "Precisamos ter uma imagem clara do comando!"
 civil_war_debuff.1.b: "Vamos precisar de armas. Muitas armas."
 civil_war_debuff.1.c: "Anote tudo! Precisamos estudar nosso inimigo."
 civil_war_debuff.2.t: "Nosso Exército se Recupera!"
 civil_war_debuff.2.d: "Embora nosso exército tenha passado por uma situação caótica por um longo período, as coisas estão melhorando agora. Temos uma ideia aproximada de quem e onde está nosso exército e conseguimos garantir algumas linhas de abastecimento. No entanto, o exército ainda carece de coesão geral e muitas unidades e milícias operam independentemente do comando central.\n\nNosso exército tem uma cadeia de comando, mas responsabilidades e autoridades nem sempre são respeitadas. Temos um suprimento um tanto estável de armas, mas muitas unidades têm seus próprios suprimentos exclusivos. Também não temos uma tática comum definida para nossas tropas. O que devemos fazer para tentar melhorar?"
 civil_war_debuff.2.a: "As tropas precisam saber qual é sua missão e quem as lidera"
 civil_war_debuff.2.b: "Não podemos nos dar ao luxo de ter aquisições militares desconexas."
 civil_war_debuff.2.c: "Distribua alguns manuais de campo para nossas tropas."
 civil_war_debuff.3.t: "Nosso Exército se Recupera!"
 civil_war_debuff.3.d: "A confusão em nosso exército está começando a desaparecer. A maneira como nossos soldados agem está começando a se assemelhar a um exército de verdade agora. Alguns problemas menores ainda persistem.\n\nExistem alguns comandos duplicados onde as autoridades dos comandantes se sobrepõem. Os pedidos de aquisição militar às vezes desaparecem, e o dinheiro destinado a eles acaba fora das tropas. Estamos perdendo muita experiência de campo e instrutores, já que os soldados são dispensados sem documentação e as baixas não são registradas corretamente. O que devemos tentar melhorar?"
 civil_war_debuff.3.a: "Clarificar os comandos e resolver conflitos internos."
 civil_war_debuff.3.b: "Combater a corrupção nas aquisições militares."
 civil_war_debuff.3.c: "Estabelecer um processo para transmitir a experiência de campo."
 civil_war_debuff.4.t: "Nosso Exército se Recupera!"
 civil_war_debuff.4.d: "Estamos quase lá. Embora alguns problemas menores persistam, nosso exército está quase voltando a ser como era antes da guerra. Apenas mais algumas reformas organizacionais devem transformar nosso exército novamente em um exército totalmente profissional.\n\nAinda existem várias milícias que não estão completamente integradas ao exército. Algum equipamento que estamos comprando e produzindo não é intercambiável. Nosso alto comando está solicitando recursos adicionais para analisar as experiências de combate da guerra. O que devemos tentar melhorar?"
 civil_war_debuff.4.a: "Integrar as milícias restantes."
 civil_war_debuff.4.b: "Unificar nossos estoques de equipamentos."
 civil_war_debuff.4.c: "Alocar oficiais adicionais para o alto comando."
 civil_war_debuff.5.t: "Nosso Exército se Recupera!"
 civil_war_debuff.5.d: "Está feito. Depois de dois anos reformando um exército ineficiente, superamos os danos causados pela guerra civil. Agora podemos voltar a fazer com que nosso exército nos proteja contra ameaças externas, e não internas."
 civil_war_debuff.5.a: "Um grande dia para [ROOT.GetNameDef]."
 protests.1.t: "Aumento das Tensões"
 protests.1.d: "O descontentamento público está crescendo devido à insatisfação com os gastos do governo. Os protestos estão se tornando mais frequentes e radicalizados. A administração deve escolher entre adotar uma postura firme ou tentar apaziguar as massas."
 protests.1.a: "Ignorá-los"
 protests.1.b: "Impor Ordem"
 protests.1.c: "Iniciar Negociações"
 protests.2.t: "Luta pelo Poder Político"
 protests.2.d: "Com o descontentamento público crescendo, as manobras políticas estão se tornando mais arriscadas. A situação exige uma escolha entre salvaguardar o poder político correndo o risco de aumentar a radicalização ou arriscar-se a consequências mais graves."
 protests.2.a: "Jogar os Dados"
 protests.2.b: "Manter a Linha"
 protests.2.c: "Iniciar Negociações"
 protests.3.t: "Crise de Liderança"
 protests.3.d: "A popularidade do partido no poder está vacilando devido aos protestos contínuos. O governo enfrenta uma decisão crítica que pode fortalecer ou enfraquecer seu controle sobre o poder. O resultado pode ter um impacto duradouro no cenário político da nação."
 protests.3.a: "Ignorar os manifestantes"
 protests.3.b: "Dispersar os radicais"
 protests.3.c: "Iniciar Negociações"
 protests.4.t: "Intromissão Estrangeira"
 protests.4.d: "À medida que o descontentamento doméstico cresce, potências estrangeiras estão se interessando. O governo deve decidir entre aceitar a influência estrangeira como está ou tentar controlar agentes estrangeiros."
 protests.4.a: "Não tomar medidas precipitadas"
 protests.4.b: "Encontrar todos eles"
 protests.4.c: "Iniciar Negociações"
 protests.5.t: "Progresso Estagnado"
 protests.5.d: "Os protestos estão causando uma desaceleração significativa nos projetos de construção em todo o país. A administração deve escolher entre mitigar os efeitos por um período mais curto ou tentar pacificar os manifestantes, arriscando atrasos mais longos."
 protests.5.a: "Isso certamente vai parar em alguns dias"
 protests.5.b: "Agora a polícia terá trabalho"
 protests.5.c: "Iniciar Negociações"
 protests.6.t: "Crise na Produção Militar"
 protests.6.d: "O crescente descontentamento está afetando a produção militar, e o governo enfrenta uma decisão crucial. Deveriam eles impor medidas para manter a produção ou tentar diminuir os protestos, possivelmente exacerbando a crise de produção?"
 protests.6.a: "Eles logo voltarão ao trabalho"
 protests.6.b: "Preservar a produção à força"
 protests.6.c: "Iniciar Negociações"
 protests.10.t: "Nação à Beira do Abismo"
 protests.10.d: "O descontentamento público atingiu um nível crítico. A decisão do governo agora pode levar a uma maior desestabilização ou a uma população ainda mais radicalizada. A situação é grave."
 protests.10.a: "Isso vai passar"
 protests.10.b: "Suprimir a todo custo"
 protests.10.c: "Aceitar suas demandas"
 protests.11.t: "Turbulência Política"
 protests.11.d: "O cenário político está agora em caos. Uma escolha entre uma perda significativa de poder político ou um jogo arriscado com perdas ainda maiores deve ser feita. As apostas estão mais altas do que nunca."
 protests.11.a: "Isso vai passar"
 protests.11.b: "Guarda Nacional para o resgate"
 protests.11.c: "Aceitar suas demandas"
 protests.12.t: "Colapso da Confiança"
 protests.12.d: "A confiança no partido no poder está diminuindo rapidamente. Uma decisão crucial que pode diminuir ainda mais a popularidade do partido ou arriscar um colapso total da autoridade política aguarda. A nação assiste com a respiração suspensa."
 protests.12.a: "Isso vai passar"
 protests.12.b: "Usar a força"
 protests.12.c: "Aceitar suas demandas"
 protests.13.t: "Parada Abrupta"
 protests.13.d: "A construção em todo o país está sendo severamente afetada. Com as apostas elevadas, o governo deve decidir entre uma redução drástica na velocidade por um período prolongado ou uma negociação potencialmente catastrófica com os manifestantes."
 protests.13.a: "Não podemos resolver isso agora"
 protests.13.b: "Forçar o trabalho"
 protests.13.c: "Aceitar suas demandas"
 protests.14.t: "Máquina de Guerra Vacilante"
 protests.14.d: "Com a produção militar em crise, o governo enfrenta uma escolha angustiante. Eles devem impor medidas que afetarão drasticamente a produção por um período prolongado ou arriscar consequências ainda maiores."
 protests.14.a: "Não podemos resolver isso agora"
 protests.14.b: "Onde está minha guarda nacional?"
 protests.14.c: "Aceitar suas demandas"
 protests.20.t: "O Ponto de Ruptura"
 protests.20.d: "Anos de agitação, insatisfação e negociações fracassadas culminaram em um momento de catástrofe nacional. O que começou como um murmúrio de descontentamento cresceu para um grito ensurdecedor por revolução, e as ruas agora estão cheias do clamor do conflito. Apesar das tentativas de acalmar o descontentamento, reconciliar diferenças e restaurar a ordem, os esforços do governo se mostraram infrutíferos. A confiança do povo se erodiu, e sua paciência se esgotou. A nação está dividida, e o tecido da sociedade está dilacerado. Vizinhos viram-se uns contra os outros, e antigos amigos se tornam inimigos à medida que linhas são traçadas e lados são escolhidos. Os manifestantes pegaram em armas, e o ar está denso com a tensão da batalha iminente. Um novo capítulo na história da nação está prestes a ser escrito, e a tinta é o sangue. A guerra civil começa."
 protests.20.a: "Prepare-se para o Conflito"
 migrant_event.1.t: "Favelas de Migrantes"
 migrant_event.1.d: "Algumas das áreas em torno das nossas principais cidades começaram a desenvolver o que os habitantes locais chamam de “Favelas de Migrantes”. É uma área de migrantes e refugiados indigentes dentro do país que tentaram ganhar a vida, mas devido aos baixos salários e à muito pouca assimilação no país anfitrião, acabaram nestes bairros de lata."
 migrant_event.1.a: "Separação das favelas"
 migrant_event.1.b: "Dar assistência"
 migrant_event.1.c: "Reduzir as metas de migração"
 migrant_event.2.t: "Nacionalistas protestam contra política de migração"
 migrant_event.2.d: "Um grupo de nacionalistas organizou um protesto numa das nossas principais cidades contra os recentes migrantes para o país. O protesto apela a limitações adicionais à migração e ao início de uma regulamentação adicional da imigração e da migração dentro do país."
 migrant_event.2.a: "Permitir a demonstração"
 migrant_event.2.b: "Separe a manifestação"
 migrant_event.3.t: "Migrantes acusados ​​de crimes violentos"
 migrant_event.3.d: "Grupos específicos de migrantes dentro do país foram acusados ​​de vários crimes violentos e a nossa polícia prendeu um grande número de novos migrantes no país. Manifestantes e apoiantes de direita começaram a dizer ao governo que estas seriam as consequências de não fecharmos as nossas fronteiras. Como devemos responder?"
 migrant_event.3.a: "Eles nos disseram isso..."
 migrant_event.3.b: "Aumentar o financiamento da polícia."
 LibyaNews.1.a: "Excelente"
 Sudan.1.t: "Aqueles que ficaram para trás"
 Sudan.1.d: "Alguns dos nossos territórios na nossa fronteira sul ainda têm uma grande população cristã e animista. Muitas pessoas nesses territórios estão chateadas por terem sido excluídas do referendo do Sudão do Sul. A dissidência tem crescido cada vez mais e essas pessoas estão agora a exigir a união com [SSU.GetName], pois sentem que sob o nosso governo não recebem a apresentação adequada."
 Sudan.1.a: "Tudo bem, não precisamos deles"
 Sudan.1.b: "Essa é legitimamente a nossa terra!"
 Sudan.2.t: "Aliança com [DAR.GetNameDef]?"
 Sudan.2.d: "Não somos os únicos a lutar contra o governo. Também há rebeldes em Darfur. Talvez devêssemos prometer-lhes maior representação no futuro governo sudanês se se aliarem a nós?"
 Sudan.2.a: "Envie-lhes uma solicitação"
 Sudan.2.b: "Não precisamos deles"
 Sudan.2.a.tt: "Se eles aceitarem, então\n"
 Sudan.3.t: "[FROM.GetNameDef] oferece uma aliança"
 Sudan.3.d: "[FROM.GetNameDef] nos ofereceu uma aliança, pois eles também estão lutando contra o governo [SUD.GetAdjective]. Eles prometem-nos uma maior representação no novo governo do Sudão que estão a construir. O que devemos responder?"
 Sudan.3.a: "Concordamos"
 Sudan.3.b: "Não precisamos deles"
 Sudan.4.t: "[FROM.GetNameDef] concorda em nos aliar"
 Sudan.4.d: "[FROM.GetNameDef] concordou em formar uma frente comum contra [SUD.GetLeader] junto conosco."
 Sudan.4.a: "Ótimo"
 Sudan.5.t: "[FROM.GetNameDef] Recusa-se a nos aliar"
 Sudan.5.d: "[FROM.GetNameDef] recusou-se a formar uma frente comum contra [SUD.GetLeader] junto conosco."
 Sudan.5.a: "Perda deles"
 Sudan.6.t: "[FROM.GetNameDef] e [DAR.GetNameDef] unem forças"
 Sudan.6.d: "[FROM.GetNameDef] e [DAR.GetNameDef] formaram uma frente comum em sua luta contra nós."
 Sudan.6.a: "Droga"
 SudanNews.1.d: "O conflito no Cordofão do Sul e no Nilo Azul finalmente terminou. [FROM.GetLeader] reivindicou vitória no conflito e resta saber que direção o país tomará no futuro."
 SudanNews.2.t: "Conflito no Kordofan do Sul e no Nilo Azul"
 SudanNews.2.d: "After the Comprehensive Peace Agreement, some areas in [SUD.GetName] with Christian and Animist populations were left from being included in the South Sudanese independence referendum. The people living here have grown increasingly tired of the [SUD.GetAdjective] government ever since the agreement. They feel that they lack representation in the current government, and have now taken up arms against the government."
 SudanNews.2.a: "Interessante"
 SouthSudan.1.t: "Referendo sobre a Independência do Sudão do Sul"
 SouthSudan.1.d: "Chegou a hora de o povo do Sudão do Sul votar pela sua independência. Embora algumas pessoas que vivem no Sudão não estejam satisfeitas por terem sido deixadas de fora da área do referendo, conseguimos abranger a maior parte da população cristã e animista. Isto abrirá uma nova página na paz e na prosperidade para ambos os Sudãos."
 SouthSudan.1.a: "E o vencedor é..."
 SouthSudan.4.t: "[FROM.GetNameDef] pede suporte"
 SouthSudan.4.d: "Nosso aliado de longa data, [FROM.GetLeader] solicitou ajuda militar em sua luta contra [SUD.GetNameDef]. Ele afirmou que sem a nossa ajuda militar, o seu esforço de guerra desmoronará. No final dos anos 80, as nossas tropas estiveram envolvidas na luta no Sul do Sudão, mas com o conflito no Congo tivemos de mudar as prioridades. O Congo agora está resolvido, talvez possamos poupar algo para [FROM.GetLeader]?"
 SouthSudan.5.t: "[FROM.GetNameDef] nos apoia"
 SouthSudan.5.d: "[FROM.GetLeader] concordou em nos ajudar. As tropas [FROM.GetAdjective] devem cruzar a fronteira a qualquer momento."
 SouthSudan.5.a: "Perfeito"
 SouthSudan.6.t: "[FROM.GetNameDef] recua"
 SouthSudan.6.d: "[FROM.GetLeader] declarou que não pode se dar ao luxo de nos ajudar mais do que já fez."
 SouthSudan.6.a: "Droga"
 SouthSudan.7.t: "[FROM.GetNameDef] Disposto a Ceder Terras"
 SouthSudan.7.d: "[SUD.GetNameDef] está atualmente envolvido em uma guerra civil. A facção oposta de [SSU.GetName] nos ofereceu um acordo; Eles nos darão controle total sobre o território do Triângulo Ilemi e, em troca, nós os ajudaremos a montar uma rede de abastecimento militar. Devemos aceitar a oferta deles?"
 SouthSudan.7.a: "Claro"
 SouthSudan.7.b: "Não estamos interessados"
 SouthSudan.8.t: "[FROM.GetNameDef] aceita nosso acordo"
 SouthSudan.8.d: "[FROM.GetLeader] concordou em assumir o controle do Triângulo Ilemi em troca de nos ajudar com nossos militares."
 SouthSudan.8.a: "Perfeito"
 SouthSudan.9.t: "[FROM.GetNameDef] rejeita nosso acordo"
 SouthSudan.9.d: "[FROM.GetLeader] rejeitou nossa oferta do Triângulo Ilemi. Eles temem que essa mudança lhes traga algumas repercussões do [SUD.GetNameDef]."
 SouthSudan.9.a: "Droga"
 SouthSudan.10.t: "Rebeldes Congoleses Cruzam a Fronteira"
 SouthSudan.10.d: "Recebemos relatos de grandes grupos armados que cruzaram a fronteira de [DRC.GetNameDef] e atacaram as cidades de Yambio e Yei. Parece que estes grupos foram equipados e contratados pelo governo [SUD.GetAdjective]. A oposição de [DRC.GetName] contra [UGA.GetName] deu-lhes motivação para permitir que esta passagem de fronteira acontecesse."
 SouthSudan.10.a: "Malditos sejam os congoleses!"
 SouthSudan.11.t: "Preparando-se para o referendo"
 SouthSudan.11.d: "Com um acordo de paz assinado entre o Norte e o Sul do Sudão, ambas as partes começaram a preparar-se para o referendo. As projecções actuais mostram que a grande maioria das pessoas [SSU.GetAdjective] votará pela independência, uma vez que não estão muito interessadas em serem governadas por muçulmanos de linha dura. No entanto, com a intromissão política e o controlo sobre figuras-chave do governo, poderá ser possível ao Norte recuperar novamente o controlo sobre o Sul."
 SouthSudan.11.a: "Devemos nos preparar"
 SouthSudan.11.tooltip: "A probabilidade de as pessoas no Sudão do Sul votarem para permanecer como parte do Sudão é §Y[SUD.GetAdjective] Influência em [SSU.GetNameWithFlag] multiplicada por 0,75§!. Se a influência de [SUD.GetAdjective] em [SSU.GetNameWithFlag] for §Yabaixo de 20%§!, o referendo sempre resultará em §Yindependência§!."
 SouthSudan.12.t: "[FROM.GetNameDef] torna-se independente"
 SouthSudan.12.d: "[FROM.GetName] realizou seu referendo de independência nos territórios que controlavam. Os resultados para a independência foram de 99,83% a favor. Surpreendentemente, houve muito pouca violência eleitoral antes da votação e, em geral, as eleições foram consideradas justas."
 SouthSudan.12.a: "Eu acho que isso é um adeus"
 SouthSudan.13.t: "[FROM.GetNameDef] Favorece a Unidade"
 SouthSudan.13.d: "[FROM.GetName] realizou seu referendo de independência nos territórios que controlavam. Foi uma disputa acirrada, mas os votos para permanecer no Sudão venceram com 54% dos votos. Muitos sul-sudaneses expressaram receios de que tentar separar-se do Sudão apenas reacenderia a guerra civil."
 SouthSudan.13.a: "Bem-vindo de volta!"
 SouthSudan.14.t: "Acidentes de helicóptero de [ROOT.GetLeader]"
 SouthSudan.14.d: "No fim de semana, nosso presidente [ROOT.GetLeader] foi se encontrar com seu aliado de longa data [UGA.GetLeader]. Ele não contou ao governo [SUD.GetAdjective] sobre essa viagem e, em vez disso, mentiu que estava de férias em New Kush. [ROOT.GetLeader], entretanto, nunca voltou para casa. No voo de regresso, o seu helicóptero colidiu com uma cordilheira no sul do Sudão, matando-o, a seis dos seus colegas e a sete membros da tripulação [UGA.GetAdjective]. Nosso governo está lutando para resolver a questão da sucessão, mas é provável que o deputado de [ROOT.GetLeader], Salva Kiir Mayardit, tome posse."
 SouthSudan.14.a: "Alguns meses depois da paz? Suspeito..."
 SouthSudan.15.t: "Rumores de um golpe"
 SouthSudan.15.d: "Ouvimos rumores de que um dos nossos aliados durante a guerra civil está a planear derrubar o nosso governo. Poderíamos descartar esses rumores. No entanto, considerando que o nosso exército é actualmente composto por dezenas de grupos rebeldes mais pequenos, é mais do que provável que alguém esteja a tentar tomar o trono. O que devemos fazer?"
 SouthSudan.15.a: "Nossos aliados são leais"
 SouthSudan.15.b: "Expurgue os generais! A polícia! Todo mundo!"
 SouthSudan.15.a.tt: "Se uma guerra civil começar, a oposição será §YMaisForte§! do que o nosso lado"
 SouthSudan.15.b.tt: "Se uma guerra civil começar, a oposição será §Ymais fraca§! do que o nosso lado"
 SouthSudan.16.t: "O que há em um nome?"
 SouthSudan.16.d: "Agora que somos independentes, precisamos decidir como nomear o nosso país. Várias sugestões foram recolhidas do público, sendo o Sudão do Sul o favorito óbvio. No entanto, poderíamos optar por escolher outro nome"
 SouthSudan.16.a: "O Sudão do Sul é bom"
 SouthSudan.16.b: "Azania, para relembrar a nossa história"
 SouthSudan.16.c: "A República do Nilo é mais adequada"
 SouthSudan.16.dd: "A República Kush é a melhor"
 SouthSudanNews.1.d: "A guerra civil em [SSU.GetNameDef] chegou ao fim. A guerra começou após uma luta pelo poder entre vários grupos rebeldes, pouco tempo depois de o país ter finalizado os seus negócios com [SUD.GetNameDef]. Talvez agora o país consiga começar a reconstruir."
 SouthSudanNews.2.t: "O Acordo de Paz Abrangente"
 SouthSudanNews.2.d: "As facções [SUD.GetAdjective] e [SSU.GetAdjective] chegaram a um acordo de paz que põe fim à Segunda Guerra Civil Sudanesa. Com a ajuda de negociadores da Autoridade Intergovernamental para o Desenvolvimento, as duas partes concordaram com uma estrutura na qual [SSU.GetNameDef] receberia autonomia sob o governo [SUD.GetAdjective]. As partes concordaram que dentro de 6 anos seria realizado um referendo sobre a independência total de [SSU.GetNameDef]. Talvez este acordo resolva finalmente o conflito étnico de décadas na região."
 SouthSudanNews.3.t.SUD: "Rebeldes do Sudão do Sul esmagados"
 SouthSudanNews.3.t.SSU: "Nasce um novo Sudão"
 SouthSudanNews.3.d.SUD: "O último episódio do conflito étnico [SUD.GetAdjective] chegou ao fim quando o governo [SUD.GetAdjective] esmagou os rebeldes nas partes do sul do país. Isto deixará [SUD.GetLeader] livre para continuar a sua islamização e arabização do país, para desgosto da população cristã e animista do Sul."
 SouthSudanNews.3.d.SSU: "O último episódio do conflito étnico [SUD.GetAdjective] chegou ao fim quando os rebeldes do Sudão do Sul derrubaram o governo. O anterior líder do [SUD.GetAdjective] [SUD.GetLeader] foi preso e aguarda julgamento por violações dos direitos humanos e crimes de guerra. O novo regime promete um Sudão livre e igualitário, mas muitos analistas salientaram que o governo [SSU.GetLeader] já tomou medidas para silenciar qualquer oposição durante o seu mandato como líder dos rebeldes."
 SouthSudanNews.3.a: "Interessante"
 SouthSudanNews.4.t.independence: "[FROM.GetNameDef] torna-se independente"
 SouthSudanNews.4.t.autonomy: "[FROM.GetNameDef] continua fazendo parte de [SUD.GetNameDef]"
 SouthSudanNews.4.d.independence: "[FROM.GetNameDef] realizou um referendo de independência conforme acordado pelo seu acordo de paz com [SUD.GetName]. Os resultados foram surpreendentes 98% a favor da separação dos dois estados. Isto torna [SSU.GetName] o país mais jovem de África."
 SouthSudanNews.4.d.autonomy: "[FROM.GetNameDef] realizou um referendo de independência conforme acordado pelo seu acordo de paz com [SUD.GetName]. Os resultados ficaram próximos do empate, mas a opção pela unidade com [SUD.GetName] venceu por 53%. Especula-se que o medo de que a guerra reacenderia se [SSU.GetName] se separasse de [SUD.GetName] fez os eleitores favorecerem a unidade. Independentemente disso, [SSU.GetName] recebeu alguma autonomia, mas resta saber quanto tempo durará."
 SouthSudanNews.4.a: "Interessante"
 SouthSudanNews.5.t: "Guerra Civil em [SSU.GetNameDef]"
 SouthSudanNews.5.d: "Uma guerra civil começou na jovem nação de [SSU.GetName]. Apenas alguns anos depois de encerrar o conflito com [SUD.GetName], o conflito começou novamente. Parece que, uma vez que já não existe um inimigo comum para os vários grupos rebeldes, iniciou-se uma luta pelo poder entre os vários grupos."
 SouthSudanNews.5.a: "Interessante"
 war_in_darfur_threat: "Guerra em Darfur"
 Darfur.2.t: "Rebeldes de Darfur atacam Golo"
 Darfur.2.d: "Um grupo de rebeldes pertencentes à Frente de Libertação de Darfur e ao Movimento Justiça e Igualdade atacaram a pequena cidade de Golo, sede do distrito de Jebel Marra, a sul de Kabkabiya. O ataque foi precedido por escaramuças menores contra delegacias de polícia locais, postos avançados do exército e comboios militares. Os rebeldes estão cansados ​​das políticas de arabização do [SUD.GetLeader] na região e exigem a sua demissão."
 Darfur.2.a: "Droga"
 Darfur.3.t: "Rebeldes de Darfur fecham fronteira com o Chade"
 Darfur.3.d: "Um grupo de rebeldes pertencentes à Frente de Libertação de Darfur e ao Movimento de Justiça e Igualdade ocupou a cidade fronteiriça de Tine, perto da fronteira com o Chade. No processo, capturaram uma grande quantidade de armas e suprimentos. Os rebeldes estão tentando criar uma conexão com o Chade, onde vivem muitas tribos que simpatizam com a causa de Darfur."
 Darfur.3.a: "Droga"
 Darfur.4.t: "Rebeldes de Darfur atacam El Fasher"
 Darfur.4.d: "No início da manhã, um grupo de rebeldes da Frente de Libertação de Darfur e do Movimento de Justiça e Igualdade atacou a guarnição adormecida em El Fasher. Nas horas seguintes, vários aviões militares foram destruídos na base aérea local, deixando 75 soldados mortos e 32 capturados. Os rebeldes também conseguiram capturar um major-general, comandante da base aérea. Este foi um grande revés para os nossos militares e várias unidades militares abandonaram os seus postos temendo ataques dos rebeldes."
 Darfur.4.a: "Droga"
 DarfurNews.1.t: "Começa a guerra em Darfur"
 DarfurNews.1.d: "Décadas de políticas de arabização forçada por parte do governo [SUD.GetAdjective] finalmente atingiram o seu ponto de ebulição. Dois grupos rebeldes, a Frente de Libertação de Darfur e o Movimento Justiça e Igualdade, escalaram o conflito de uma insurgência de baixo nível para uma guerra total. O tempo dirá se [SUD.GetName] será capaz de lidar com esses rebeldes."
 DarfurNews.1.a: "Interessante"
 DarfurNews.2.t: "[DAR.GetNameDef] Autonomia concedida"
 DarfurNews.2.d: "Após anos de conflito entre os rebeldes [DAR.GetAdjective] e as forças governamentais [SUD.GetAdjective], os dois lados concordaram com um acordo de paz. [DAR.GetName] terá autonomia limitada sob [SUD.GetName], o que deverá protegê-los contra a discriminação. Só o tempo dirá se [SUD.GetLeader] planeja manter este acordo."
 DarfurNews.2.a: "Interessante"
 DarfurNews.3.t: "[DAR.GetNameDef] Torna-se Independente"
 DarfurNews.3.d: "Após anos de conflito entre os rebeldes [DAR.GetAdjective] e as forças governamentais [SUD.GetAdjective], as forças [DAR.GetAdjective] conseguiram chegar ao topo. Após incursões bem sucedidas de Darfur no Sudão propriamente dito, o governo [SUD.GetAdjective] não teve outra opção senão fazer concessões aos rebeldes [DAR.GetAdjective]. A nação de [DAR.GetName] recebeu agora independência total, mas o tempo dirá se [SUD.GetName] está apenas usando isso como uma oportunidade para reconstruir suas forças."
 DarfurNews.3.a: "Interessante"
 corruption.16.t: "Aumento da corrupção"
 corruption.16.d: "Espiões e agentes de outro país se intrometeram em nosso país, aumentando a classificação de corrupção em nosso país. Ela vem de uma variedade de fontes, como subornos direcionados, negociações e agentes subservientes bem posicionados no país."
 corruption.16.a: "Infeliz"
 Israel.1111.t: "Rumores de uma 3ª Intifada"
 Israel.1111.d: "O influente grupo islâmico palestino Hamas convocou uma nova revolta contra Israel, começando na sexta-feira. Falando em Gaza na quinta-feira, o líder do Hamas Ismail Haniyeh disse: \"Devemos convocar e trabalhar para lançar uma intifada diante do inimigo sionista.\" Ele também disse: \"Queremos que a revolta dure e continue a deixar Trump e a ocupação se arrependerem dessa decisão.\""
 Israel.1111.a: "Ah, não..."
 Israel.1112.t: "Israel ameaça guerra"
 Israel.1112.d: "Devido ao nosso conflito congelado com Israel nas Colinas de Golã, eles ameaçaram declarar guerra contra nós, a menos que revoguemos nossa reivindicação!"
 Israel.1112.a: "Revogar nossa reivindicação no Golã"
 Israel.1112.b: "Guerra！"
 restart_boardcross_expenditure: "Reinicia todas as despesas em geral"
 god_of_war_event.1.t: "Pronto para um desafio?"
 god_of_war_event.1.d: "Normalmente, além da maioria dos buffs básicos, a IA em MD não trapaceia. Ela vai para designs de estilo RP para veículos e divisões, mas com esta opção, a IA VAI TRAPAÇAR.\nEla criaria equipamentos e divisões do nada, e tentaria mais resistir contra o jogador em geral. Não será uma experiência Endsieg, a IA é feita para desafiar o jogador, não para sobrecarregá-lo.\n\nP.S. Você ainda não tem o direito de se gabar depois de derrotar esta IA."
 god_of_war_event.1.a: "Pode vir!"
 god_of_war_event.1.b: "Também faça com que a IA se concentre mais em mim!"
 md4.21.t: "[FROM.GetName]-[Root.GetName] EAEU Integration"
 md4.21.d: "[FROM.GetNameDef] is asking us to allow them into EAEU. We will have priority to export to and import from them and will economically integrate into each other further."
 md4.21.a: "Assine!"
 md4.21.b: "Recusar"
 md4.22.t: "[FROM.GetNameDef] Has Signed Our Ascension into EAEU!"
 md4.22.d: "[FROM.GetNameDef] has accepted our offer to sign allow us into EAEU."
 md4.22.a: "Isso nos tornará prósperos a ambos!"
 md4.23.t: "[FROM.GetNameDef] Has Refused our offer to sign allow us into EAEU."
 md4.23.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.23.a: "Eles temem nossos produtos superiores!"
 EUR_idea_eacu_cooperation: "Cooperação com a UEEA"
 EUR_idea_eacu_cooperation_desc: "A União Aduaneira Eurasiática (originalmente Comunidade Econômica Eurasiática) promove laços econômicos entre a maioria dos estados pós-soviéticos. A união impõe uma tarifa externa comum a todos os bens que entram na união e atua como uma entidade singular ao produzir acordos e negociações comerciais."
 EUR_idea_eacu_cooperation_2: "Cooperação Integrada da UEEA"
 EUR_idea_eacu_cooperation_2_desc: "A União Aduaneira Eurasiática (originalmente Comunidade Econômica Eurasiática) promove laços econômicos entre a maioria dos estados pós-soviéticos. A união impõe uma tarifa externa comum a todos os bens que entram na união e atua como uma entidade singular ao produzir acordos e negociações comerciais."
 influence.1.c: "Envie 15% do PIB como Ajuda Econômica."
 influence.1.e: "Pensando bem, eles não precisam disso."
 Cameroon.2.t: "O naufrágio do barco"
 Cameroon.2.d: "Um barco transportando 150 passageiros estava a caminho do porto nigeriano de Oron com destino ao porto de Gentil, no Gabão, quando naufragou. Estima-se que mais de cem passageiros morreram e os demais estão em estado crítico, agarrados aos destroços do naufrágio. Pescadores locais e autoridades camaronesas da cidade de Kirbi estão vasculhando as ondas e a água em busca de mais sobreviventes neste momento, mas a situação parece cada vez mais desoladora...\n\nPodemos nos oferecer para pagar as contas médicas dos sobreviventes ou podemos optar por um dia de oração pelas almas dos mortos e pela recuperação dos sobreviventes."
 Cameroon.2.a: "Deveríamos pagar as contas médicas."
 Cameroon.2.b: "Um dia de oração é oportuno."
 world_war.1.t: "Ferrovia-Roaded Guerra Mundial Habilitado"
 world_war.1.d: "Tradicionalmente, Millennium Dawn tem sido um mod voltado para o mundo sandbox e, portanto, se afastou da ideia de criar uma Guerra Mundial como outros mods. Esta opção foi criada para satisfazer a vontade de alguns na comunidade por um estilo de jogo voltado apenas para a guerra. Esta regra de jogo foi criada com os princípios de MD em mente e, portanto, terá diferentes cenários de como a Guerra Mundial começa, dependendo de quem você estiver jogando. A Guerra começará por volta de 2014, para que você tenha algum tempo para se preparar para ela."
 world_war.1.a: "OK"
 world_war.2.t: "China se move contra Taiwan"
 world_war.2.d: "O ELP anunciou que está iniciando operações contra a República da China, marcando a continuação da guerra civil chinesa. Embora não fosse algo que nossa inteligência não tivesse detectado, tínhamos motivos para acreditar que a China mostraria contenção diante de uma possível retaliação dos Estados Unidos."
 world_war.2.a: "[CHI.GetName] cruzou nossa linha vermelha"
 world_war.2.b: "Os problemas asiáticos são os problemas dos asiáticos"
 world_war.3.t: "Intervenção americana contra a China"
 world_war.3.d: "[USA.GetLeader] anunciou hoje que ordenou que as Forças Armadas dos Estados Unidos se preparem para uma mobilização em larga escala contra [CHI.GetName]. Isso ocorre após os ataques chineses contra Taiwan e a continuação da guerra civil chinesa. Embora a China tenha apresentado suas razões para a invasão, os Estados Unidos declararam que o principal objetivo desta intervenção é mostrar que \"os Estados Unidos sempre apoiarão seus aliados, independentemente do agressor\". Circulam temores de que esta intervenção possa levar a uma maior distensão na região, com alguns apelidando-a de o início da Terceira Guerra Mundial."
 world_war.3.a: "Preocupante"
 world_war.4.t: "América distraída na China"
 world_war.4.d: "Os imperialistas em Washington iniciaram uma campanha contra nossos parceiros na China. Com isso em mente, temos uma oportunidade de ouro bem à nossa frente. Enquanto eles estão distraídos com a China, temos a capacidade de avançar e recuperar o que antes era nosso, a totalidade da Coreia."
 world_war.4.a: "Não podemos arriscar desperdiçar tal oportunidade"
 world_war.4.b: "É muito arriscado"
 world_war.5.t: "Conflito na Ásia se intensifica"
 world_war.5.d: "A guerra na Ásia se intensificou, com o governo norte-coreano atacando a República da Coreia na tentativa de reunificar toda a península coreana sob o domínio da RPDC. Essa ação da República Popular Democrática da Coreia levou o Japão a responder enviando tropas para a República da Coreia, dando início a uma guerra muito maior do que o previsto. O mundo observa com ansiedade, enquanto a guerra que começou com a China rapidamente engolfou a maior parte do Leste Asiático. Nações em todo o mundo, particularmente na Europa e na África, condenam a violência na Ásia em meio ao medo de que a Europa se torne um teatro de guerra adicional, como resultado do caos e da instabilidade presentes no mundo hoje."
 world_war.5.a: "A terceira guerra mundial está aqui"
 world_war.6.t: "Guerra na Coreia"
 world_war.6.d: "A RPDC intensificou a guerra na região ao declarar guerra ilegalmente à República da Coreia. Essa atitude ameaça a ordem que tanto trabalhamos para preservar ao longo de décadas, e os apelos por ação estão crescendo entre nossa população. Devemos defender nossos amigos e nossa integridade, apoiando a Coreia de uma forma ou de outra."
 world_war.6.a: "A Coreia do Norte cometeu um erro grave hoje"
 world_war.6.b: "Não podemos nos envolver"
 world_war.7.t: "Rússia avança para o oeste"
 world_war.7.d: "O governo russo avançou para o oeste e iniciou uma guerra em larga escala contra a Ucrânia. Essa expansão preocupa profundamente nosso comando militar e nossos aliados, pois o destino do continente europeu é incerto e permanecerá incerto até que demonstremos aos russos que a Europa não é uma torta para ser consumida."
 world_war.7.a: "A Rússia foi longe demais desta vez"
 world_war.7.b: "Não podemos arriscar uma guerra"
 world_war.8.t: "Guerra na Europa"
 world_war.8.d: "Após as incursões russas na Ucrânia, forças da OTAN foram vistas entrando no país para confrontar forças russas. Relatos de escaramuças aéreas e navais já estão surgindo, sinalizando o início de uma guerra ainda maior na Europa. Organizações internacionais em todo o mundo começaram a apelidar este conflito como a Terceira Guerra Mundial, já que as forças da OTAN estão atualmente em conflito com forças russas em toda a Europa. Quase todas as nações com armas nucleares estão em guerra entre si, e o medo de uma guerra nuclear continua a crescer. Ninguém sabe se o mundo acabará, mas uma coisa é certa: a próxima ordem mundial certamente garantirá que não será multipolar."
 world_war.8.a: "A história é escrita mais uma vez"
 world_war.9.t: "Nossas Ambições no Mundo"
 world_war.9.d: "Hoje, americanos, chineses e japoneses estão envolvidos em um grande conflito entre si. Com os europeus envolvidos no esforço de guerra, nosso governo tem se preocupado cada vez mais com a expansão europeia para o leste, em direção às nossas fronteiras. O comando militar sugeriu que invadíssemos a Ucrânia para evitar um possível ataque surpresa europeu no futuro."
 world_war.9.a: "Ouça os conselhos deles"
 world_war.9.b: "Não podemos arriscar uma guerra baseada em suposições"
 world_war.10.t: "A guerra irrompe no Oriente Médio"
 world_war.10.d: "Após vários ataques iranianos a Israel, as Forças de Defesa de Israel (IDF) apelaram aos seus aliados para derrubar e desmantelar o governo iraniano. Este evento transformador é apenas mais uma parte de uma guerra maior que os especialistas apelidaram de Terceira Guerra Mundial, com mais um teatro de guerra surgindo. A rivalidade entre Irã e Israel não é algo novo, tendo começado após a Revolução Islâmica do Irã em 1979. Não se sabe se o Irã possui armas nucleares, mas há temores de uma potencial troca nuclear entre o Eixo da Resistência e Israel. Atualmente, não se sabe se terceiros se envolverão em tal conflito, mas o que se sabe é que esta guerra pode levar à potencial destruição do Oriente Médio e dos mercados globais de petróleo."
 world_war.10.a: "Existe algum lugar seguro?"
 world_war.11.t: "As Libertações dos Quds"
 world_war.11.d: "Com os Estados Unidos e as demais grandes potências mundiais distraídos em uma guerra de atrito, finalmente temos ampla oportunidade de atacar Israel e pôr fim ao regime sionista. Tal ataque poderia levar à destruição de nossos dois Estados, mas é agora ou nunca."
 world_war.11.a: "Ataque！"
 world_war.11.b: "Não podemos arriscar uma guerra"
 taiwan.17.t: "Escolhendo uma nova capital"
 taiwan.17.d: "Enquanto saboreamos os frutos da vitória, precisamos começar a pensar na realocação de nossa capital administrativa para o continente. Taipé fica simplesmente muito longe dos principais centros populacionais da China continental e, como resultado, nossa capacidade de governar a nação com eficácia se tornou cada vez mais difícil. Portanto, nossa capital será..."
 taiwan.17.a: "Pequim"
 taiwan.17.b: "Xangai"
 taiwan.17.c: "Xunquim"
 taiwan.17.d1: "O mesmo, Taipei"
 taiwan.17.e: "Nanjing"
 city_captured.12.t: "Queda de Baidoa"
 city_captured.12.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Baidoa, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.12.a: "Interessante."
