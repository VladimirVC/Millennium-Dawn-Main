 alg_deep_state.5.d: "据报道，退役将领和情报官员在政经界日益活跃，其影响力已远超其官方职务范畴。\n\n§Y深层势力正在构建其关系网络。§!"
 alg_deep_state.10.d: "情报与安全局及其他情报机构内部势力已开始直接影响国家政策。关键决策的制定缺乏适当的文职监督。\n\n§R必须对此作出回应。§!"
 alg_deep_state.15.d: "军方机构如今已形同影子政府。部长们在推行重大政策前，越来越需要先获得高级将领的批准。\n\n§R权力集团日益壮大。§!"
 alg_deep_state.20.d: "如今，安全机构对阿尔及利亚国家拥有巨大影响力。深层政府——\"权力集团\"——已成为真正的幕后掌权者。文职政客不过是傀儡而已。\n\n§R危急：深层政府掌控着阿尔及利亚！§!"
 alg_deep_state.101.d: "一份价值数十亿的巨额国防合同在可疑情况下被签署。有证据表明，高级军事官员收受了巨额回扣。\n\n§Y我们该如何应对？§!"
 alg_deep_state.102.d: "情报部门已正式请求扩大监控权限，理由是基于安全考虑及打击恐怖主义与外国干预的需要。\n\n§Y这将显著增强他们的影响力。§!"
 alg_deep_state.103.d: "一位显赫且有影响力的将军公开批评政府政策，呼吁\"负责任的领导\"和\"国家安全优先\"。这是对文官当局的含蓄威胁。\n\n§R这是直接挑战！§!"
 alg_deep_state.104.d: "军方高层正试图将其商业利益扩张至关键经济领域。他们声称这将有利于国家安全与发展。"
 alg_deep_state.105.d: "军方正施压各大媒体，要求其在国防与安全议题上采取更为有利的编辑立场。"
 alg_deep_state.106.d: "几位退役的高级将领表示有意从政。他们声称能提供经验和稳定性。"
 alg_deep_state.107.d: "地方军事指挥官在当地拥有重大影响力。关键在于他们究竟是效忠于文官政府，还是效忠于深层国家网络。"
 alg_deep_state.108.d: "外国外交官已悄然提出协助应对日益增长的深层政府影响力。这将伴随着政治代价与义务。"
 alg_deep_state.200.d: "坦克已包围阿尔及尔的政府大楼。军方宣布将\"暂时\"接管权力以\"恢复秩序、稳定和正当治理\"。\n\n§R军方已夺取政权！§!\n\n深层政府已转变为公开的军事统治。"
 alg_deep_state.201.d: "军方已夺取政权，但或许仍有抵抗的机会。忠诚的部队可能试图恢复文官政府——但这极其危险。"
 alg_deep_state.210.d: "军政府迅速行动，巩固了其控制权。关键机构现已牢牢掌握在军方手中。"
 alg_deep_state.211.d: "国际社会对此次军事接管作出反应。多个国家谴责了这场政变，并呼吁恢复文官政府。"
 alg_deep_state.220.d: "时机已到。军方当初夺取政权时，曾承诺在两年内举行选举并恢复文官统治。\n\n如今期限已至，全世界都在关注。\n\n§Y将军们会信守承诺吗？§!"
 alg_deep_state.5.a: "我们必须保持警惕。"
 alg_deep_state.10.a: "让他们行动吧——我们需要稳定。"
 alg_deep_state.10.b: "立即恢复文官政府控制。"
 alg_deep_state.15.a: "接受军事监督——抵抗是徒劳的。"
 alg_deep_state.15.b: "抵制将军们的意见！"
 alg_deep_state.20.a: "将军们现在掌握着实权。"
 alg_deep_state.101.a: "睁一只眼闭一只眼——我们需要军方援助。"
 alg_deep_state.101.b: "展开调查。"
 alg_deep_state.102.a: "授予扩大监视权限。"
 alg_deep_state.102.b: "维持宪法限制。"
 alg_deep_state.103.a: "退让吧——我们承担不起对抗的代价。"
 alg_deep_state.103.b: "立刻将他免职！"
 alg_deep_state.103.c: "寻求折中方案。"
 alg_deep_state.104.a: "允许军方企业扩张。"
 alg_deep_state.104.b: "封锁军方经济活动。"
 alg_deep_state.105.a: "让军方掌控舆论导向。"
 alg_deep_state.105.b: "捍卫新闻自由。"
 alg_deep_state.106.a: "欢迎他们的政治参与。"
 alg_deep_state.106.b: "军队与政治分离。"
 alg_deep_state.107.a: "奖励忠于国家的指挥官。"
 alg_deep_state.107.b: "让深层政府来管理晋升。"
 alg_deep_state.108.a: "接受秘密的外国援助。"
 alg_deep_state.108.b: "拒绝一切外来干涉。"
 alg_deep_state.200.a: "军方现已控制阿尔及利亚。"
 alg_deep_state.201.a: "尝试抵抗政变！"
 alg_deep_state.201.b: "接受军事统治——抵抗是徒劳的。"
 alg_deep_state.210.a: "新秩序已然确立。"
 alg_deep_state.211.a: "无视批评。"
 alg_deep_state.211.b: "承诺最终举行选举。"
 alg_deep_state.220.a: "举行选举，恢复民主制度。"
 alg_deep_state.220.b: "国家尚未准备就绪——无限期推迟。"
 alg_deep_state_news.1.t: "阿尔及利亚发生军事政变！"
 alg_deep_state_news.1.d: "来自阿尔及尔的消息显示，阿尔及利亚军方已夺取政府控制权。坦克包围了关键政府建筑，一个军事集团宣布接管政权。\n\n这标志着阿尔及利亚政局发生剧变，长期传闻的\"深层国家\"势力现已公开掌权。"
 alg_deep_state_news.1.a: "令人深感忧虑。"
 alg_deep_state_news.1.b: "阿尔及利亚的内政与我们无关。"
