 ALG_reduce_deep_state: "Reduce Deep State Influence"
 ALG_reduce_deep_state_desc: "Take systematic measures to reduce the influence of the military establishment in civilian affairs.\n\n§GEffect: Deep State Power -5§!\n§RRisk: Stability -4%, possible backlash at high power levels§!"
 ALG_purge_military_command: "Purge Military Command"
 ALG_purge_military_command_desc: "A drastic and dangerous measure to remove compromised generals and reassert civilian control. This will severely disrupt military operations.\n\n§GEffect: Deep State Power -10§!\n§RSevere Penalties:\n• Stability -10%\n• £army_experience Army Experience -50\n• Army Organization -10% during purge§!\n\n§YCooldown: 1 year§!"
 ALG_cooperate_with_military: "Cooperate with Military Leadership"
 ALG_cooperate_with_military_desc: "Work with the generals to maintain stability. This pragmatic approach provides short-term benefits but strengthens their position.\n\n§REffect: Deep State Power +3§!\n§GBenefits:\n•  Stability +3%\n• £political_power Political Power +50§!\n\n§YNot available if Deep State Power > 25§!"
 ALG_reform_intelligence_services: "Reform Intelligence Services"
 ALG_reform_intelligence_services_desc: "Restructure the intelligence agencies (DRS/DSS) to ensure proper civilian oversight and accountability.\n\n§GEffect: Deep State Power -7§!\n§RCost:\n• Stability -5%\n• £political_power Political Power -10% during reform\n• Removes surveillance capabilities§!\n\n§YCooldown: 180 days§!"
 ALG_appoint_loyal_officers: "Appoint Loyal Officers"
 ALG_appoint_loyal_officers_desc: "Place officers loyal to civilian government in key military positions, gradually shifting the balance of power.\n\n§GEffect: Deep State Power -3§!\n§RCost: £army_experience Army Experience -25§!\n\n§YCooldown: 120 days§!"
 ALG_declare_emergency: "Declare State of Emergency"
 ALG_declare_emergency_desc: "Invoke emergency powers to temporarily freeze deep state activities. A desperate measure for desperate times.\n\n§YEffect: Deep State growth frozen for 180 days§!\n§RCost:\n• Stability -8%\n• Adds State of Emergency national idea§!\n\n§YOnly available when Deep State Power > 22§!"
 ALG_negotiate_with_generals: "Negotiate with the Generals"
 ALG_negotiate_with_generals_desc: "Open secret back-channel negotiations with military leadership to find a political compromise.\n\n§YOutcomes (random):§!\n§G50%: Success - Deep State -4, Stability +2%§!\n§Y30%: Partial - Deep State -2§!\n§R20%: Failure - Deep State +2, Stability -3%§!\n\n§YCooldown: 180 days§!"
