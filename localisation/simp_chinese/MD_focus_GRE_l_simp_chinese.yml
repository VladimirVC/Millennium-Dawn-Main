 GRE_police_influence: "受党派影响的警察"
 GRE_process_sco_member_tt: "§Y开始加入上海合作组织进程。§!"
 GRE_tax_relief_for_businessman: "商人税收减免"
 GRE_tax_relief_for_businessman_desc: "我们必须从财政上帮助企业，因为在我们前几届政府的政策下，企业只能靠自己谋生，所以我们将减税。"
 istanbul_renamed: "伊斯坦布尔更名"
 GRE_9833_name: "君士坦丁堡"
 GRE_constantinople_not_istanbul: "君士坦丁堡，不是伊斯坦布尔"
 GRE_constantinople_not_istanbul_desc: "五个世纪以来，君士坦丁堡一直以另一个名字为人所知。这座君士坦丁和查士丁尼的城市，这座拥有圣索菲亚大教堂和狄奥多西城墙的城市，被征服者改名改写。如今，这座城市重归希腊人之手，我们将历史从我们手中夺走的一切归还。"
 GRE_gain_10_strength: "§H希腊裔塞浦路斯人§!§G获得§!§H10点实力§!"
 GRE_lose_10_gain_10: "§H土耳其族塞浦路斯人§!§R失去§!§H10点实力§!"
 GRE_austerity_idea: "紧缩政策的紧张局势"
 GRE_austerity_idea_desc: "紧缩政策已经彻底耗尽了公众的耐心。抗议活动从雅典蔓延到塞萨洛尼基，罢工导致港口和医院关闭，政治局势日益紧张。每一次新的削减都如同火上浇油。如果紧张局势得不到控制，全面动乱极有可能发生。"
 GRE_please_south_desc: "通过继续取悦希腊裔塞浦路斯人，我们可以确保他们更有可能支持我们统一塞浦路斯并最终实现“统一塞浦路斯”的目标。"
 GRE_please_north_desc: "强调土耳其裔塞浦路斯人既不是希腊人，也不是塞浦路斯人。他们是殖民者和侵略者，必须被驱逐出塞浦路斯。"
 TUR_CYP_incite_riot_desc: "现在是时候开始煽动南塞浦路斯的骚乱，以确保希腊人无法在该地区获得政治影响力。"
 TUR_CYP_propaganda_north_desc: "加强和传播对北塞浦路斯人的宣传，以确保他们不受希腊人的影响，这对于我们在该地区的成功至关重要。"
 TUR_CYP_propaganda_south_desc: "加强和传播对南塞浦路斯人的宣传，以确保他们不受希腊人的影响，这对于我们在该地区的成功至关重要。"
 TUR_attack_CYP_strength_desc: "通过攻击希腊裔塞浦路斯人的实力，我们可以确保他们无法在该地区获得政治影响力。"
 GRE_attack_turkish_strength_desc: "通过攻击土耳其裔塞浦路斯人的实力，我们可以确保他们无法在该地区获得政治影响力。"
 GRE_nato_pressure_turkey_accept_tt: "支持希腊的盟友缓解了爱琴海地区的紧张局势，并在塞浦路斯问题上积蓄了力量，增加了土耳其在一个月内让步的可能性。"
 GRE_nato_pressure_turkey_reject_tt: "盟友的拒绝不会增加外交筹码，这使得土耳其更不可能让步。"
 GRE_hellenic_economy: "希腊经济"
 GRE_hellenic_economy_desc: "希腊经济处境艰难。债务不断攀升、失业率居高不下，以及能否加入欧元区等问题都迫在眉睫。然而，我们拥有强大的商船队、优越的战略位置，以及每年吸引数百万游客的旅游业。我们应该充分利用现有资源。"
 GRE_debt_mounts: "债务不断增加"
 GRE_debt_mounts_desc: "我们的债务已膨胀至近3000亿美元，是世界上人均债务最高的国家之一。利息支出占据了我们预算的很大一部分，几乎没有空间进行投资。外国银行家们开始感到不安，欧盟也要求我们给出解释。我们必须在情况进一步恶化之前采取行动。"
 GRE_debt_mounts_req_tt: "我们的§Y统一债务比率§!超过§Y90%§!。（当前§Y[?GRE_unified_debt_ratio|-1%]§!）"
 GRE_brics_membership_req_tt: "东部路线得分高于7分"
 GRE_pillar_of_the_west_req_tt: "西方的承诺高于3"
 GRE_aegean_assertiveness_event_tt: "§Y90天后，土耳其将对我们在爱琴海的巡逻行动作出回应。§!"
 GRE_cyprus_gas_crisis_event_tt: "§R由于局势已经高度紧张，此次钻探行动将在几天内引发土耳其海军的反应。§!"
 GRE_greek_bonds: "希腊债券"
 GRE_greek_bonds_desc: "在国际市场上，希腊债券已成为高风险的代名词。然而，债券仍然是为数不多的几种既能筹集资金又不损害国家主权的方式之一。如果我们发行新的政府债券，就能为基础设施建设和改革提供资金。我们只需要说服投资者，希腊值得我们为此冒险。"
 GRE_solve_evasion: "解决逃税问题"
 GRE_solve_evasion_desc: "每年因逃税造成的税收损失高达数十亿美元。如果我们加强税收征管，投资更先进的技术，并严厉打击离岸账户，就能堵住漏洞，使预算重回正轨。"
 GRE_convert_to_euro: "转换为欧元"
 GRE_convert_to_euro_desc: "欧元既是机遇也是风险。采用欧元会将我们的经济与欧洲经济紧密联系起来，这意味着比德拉克马时期更加稳定，但同时也意味着我们将失去对自身货币政策的控制权。这种权衡是否值得，最终取决于我们自己。"
 GRE_skouries_mines: "斯库里斯矿床"
 GRE_skouries_mines_desc: "哈尔基迪基半岛的斯库里斯铜金矿床是欧洲最大的矿床之一。外国公司觊觎开采权，并承诺提供就业机会和财富。环保人士则强烈反对。我们需要决定什么才是最重要的。"
 GRE_local_manufacturing: "本地制造业"
 GRE_local_manufacturing_desc: "希腊的工厂闲置着，而外国商品却涌入我们的市场。我们拥有技术娴熟的工人以及优良的传统工艺，但我们却没有对自身进行投资。通过激励措施和合同支持本地制造商，可以重振制造业并创造就业机会。"
 GRE_military_industrial: "希腊军火工业"
 GRE_military_industrial_desc: "自冷战以来，希腊武器制造厂及其姊妹公司皮尔卡尔一直为希腊军队提供武器装备。然而，数十年的国有化导致两家公司债台高筑，生产线闲置。持续的、有针对性的补贴可以维持生产线的运转，确保国内弹药和轻武器的供应，并将两家公司合并为一家具有竞争力的制造商，而不是长期消耗国库资源的负担。"
 GRE_agriculture_sector: "乡村的脊梁"
 GRE_agriculture_sector_desc: "近五分之一的希腊人仍然以务农为生，从伯罗奔尼撒半岛的橄榄树林到色萨利的棉田，无不体现着他们的辛勤耕作。然而，农业部门日渐老龄化，土地分散成小块，并且依赖布鲁塞尔根据共同农业政策提供的补贴。支持希腊农民，同时大力推广灌溉、合作社和现代化机械，就能确保卡拉马塔橄榄、菲达奶酪和阿斯提可葡萄酒源源不断地供应到世界各地的餐桌上。"
 GRE_power_corporations: "公共电力公司"
 GRE_power_corporations_desc: "半个世纪以来，国有电力公司一直依靠燃烧从托勒迈达和梅加洛波利斯煤矿开采的褐煤来维持电力供应。这种煤炭价格低廉，但污染严重，而我们对进口石油和天然气的依赖使我们极易受到中东地区各种冲击的影响。电网现代化、扩建希腊天然气公司的天然气管网以及建设新的发电厂，将使这些公用事业成为国家的战略支柱。"
 GRE_austerity_measures: "紧缩措施"
 GRE_austerity_measures_desc: "债权人要求削减养老金、提高税收并取消福利。不实行紧缩政策，我们将面临破产；而实行紧缩政策，我们将面临公众的愤怒。抗议和罢工不可避免。我们别无选择。"
 GRE_debt_refactoring: "战略性债务重组"
 GRE_debt_refactoring_desc: "债券拍卖为我们争取了时间，但这还不够。债权人越来越不耐烦，利息支出正在掏空国库。我们需要重组债务：重新谈判条款，延长期限，并向合作伙伴证明，给予我们喘息之机意味着我们确实有能力偿还债务。"
 GRE_ilarionas_hydro: "伊拉里奥纳斯水电站"
 GRE_ilarionas_hydro_desc: "希腊北部的伊拉里奥纳斯河拥有巨大的水力发电潜力。水力发电清洁、可再生，并且可以按需供电，这与太阳能或风能不同。该项目可为数十万户家庭供电。"
 GRE_telecomms: "对希腊电信公司投资"
 GRE_telecomms_desc: "数百万居住在岛屿村庄和山区城镇的希腊人仍然缺乏可靠的电话和互联网接入。国家对希腊电信公司的投资可以将这些地区与国家其他地区连接起来，使农民能够进入市场，学生能够进入大学。"
 GRE_new_railways: "雅典-塞萨洛尼基铁路线振兴计划"
 GRE_new_railways_desc: "雅典至塞萨洛尼基走廊是希腊大陆的交通要道，但铁路运输速度却极其缓慢。现代化的列车和升级后的铁轨可以将旅行时间缩短一半，并真正促进当地经济发展。"
 GRE_highway_initiatives: "延长AX高速公路"
 GRE_highway_initiatives_desc: "曾经分隔古代城邦的山脉，如今依然阻隔着各个社区，阻碍着商业发展。拟建的AX高速公路网将穿越品都斯山脉，连接西海岸和色萨利地区。虽然耗资巨大，但其带来的经济效益或许值得付出。"
 GRE_hellas_gold: "深挖卡桑德拉矿井"
 GRE_hellas_gold_desc: "卡桑德拉矿区拥有丰富的铬矿储量，但尚未得到充分开发。深化现有开采作业并投资于开采设备，将有助于将这些财富推向市场，并降低我们对进口的依赖。"
 GRE_euboea_bauxite_deposits: "埃维亚铝土矿床"
 GRE_euboea_bauxite_deposits_desc: "埃维亚岛拥有丰富的铝土矿储量，铝土矿是铝的主要矿石。大规模开采可以为我们的工业基础提供原料，并减少昂贵的进口。"
 GRE_industrial_lignite_mining: "工业化褐煤开采"
 GRE_industrial_lignite_mining_desc: "西马其顿拥有丰富的褐煤储量，可加工成合成燃料。工业规模的开采将有助于我们摆脱对能源的依赖，并为我们提供进口石油的国内替代品。"
 GRE_rare_element_prospecting: "稀有元素勘探"
 GRE_rare_element_prospecting_desc: "希腊拥有丰富的地质多样性，可能蕴藏着尚未发现的稀土和战略矿藏。一项完善的勘探计划可以发现新的开采地点，并开拓利润丰厚的市场。"
 GRE_transport_sector: "公路、铁路和轮渡"
 GRE_transport_sector_desc: "一个岛屿和山脉纵横的国家，其生死存亡取决于交通运输。KTEL长途汽车穿梭于山口之间，蓝白相间的渡轮连接着爱琴海，OASA的公交车和有轨电车每天清晨载着雅典市民上班。更新老旧的车队，将线路延伸至郊区，并将公路、铁路和海运整合为一个统一的售票网络，将使货物能够顺利运抵市场，工人也能按时到达工作岗位。"
 GRE_vintage_wines: "希腊的好酒"
 GRE_vintage_wines_desc: "希腊人在罗马建城之前就开始榨取葡萄汁，然而世人至今对希腊葡萄酒的认知仍然停留在小酒馆里廉价的雷齐纳酒上。这实在是对圣托里尼火山岩酿造的阿西尔提可、瑙萨醇厚浓郁的希诺玛夫罗以及尼米亚宝石红阿吉奥尔吉提可的莫大亏欠。投资酒庄装瓶、原产地保护认证以及发展葡萄酒旅游，或许最终能让希腊葡萄酒与法国和意大利的顶级佳酿并驾齐驱。"
 GRE_tobacco_plantations: "东方烟草"
 GRE_tobacco_plantations_desc: "马其顿和色雷斯地区阳光晒干的巴斯玛烟叶，世世代代以来，一直是世界上最优质烟草的香料来源，比雷埃夫斯的帕帕斯特拉托斯等烟草公司也因此积累了巨额财富。西方吸烟市场或许正在萎缩，但在巴尔干半岛和中东地区，巴斯玛烟叶的需求依然旺盛，卡瓦拉和克桑西周边成千上万的小农户仍然依靠巴斯玛烟叶的收成维持生计。我们必须支持这些种植户，同时也要帮助那些有能力的人转向种植其他作物。"
 GRE_gas_oil_plants: "阿提卡炼油厂"
 GRE_gas_oil_plants_desc: "环绕萨罗尼克湾的炼油厂，包括位于阿斯普罗皮尔戈斯和埃莱夫西纳的希腊石油公司以及位于阿吉奥伊·西奥多罗伊的希腊机油公司，加工着维持希腊和半个巴尔干地区运转的原油。但老旧的装置已经老化，利润空间也日益缩小。新的裂解产能、更清洁的脱硫工艺以及扩建的储油设施将巩固我们作为东南地中海炼油中心的地位。"
 GRE_trim_the_fat: "刳脂剔膏"
 GRE_trim_the_fat_desc: "政府机构臃肿低效。各部委人员过多，合同被授予亲朋好友，繁文缛节阻碍了一切。我们需要精简机构，削减浪费，尽可能实现自动化，并追究相关人员的责任。"
 GRE_debt_swaps: "债务互换伙伴"
 GRE_debt_swaps_desc: "将我们的债务置换为以外币计价的债券可以降低我们面临的市场波动风险。这需要优秀的银行合作伙伴和一些金融工程技巧，但这是管理债务且避免政治影响的一种方法。"
 GRE_debt_swap_initial_tt: "§G50B§!的国债将以§G3%§!的利率转移给选定的合作伙伴。"
 GRE_debt_swap_accepted_opinion: "接受债务互换"
 GRE_debt_swap_rejected_opinion: "拒绝债务互换"
 GRE_olympic_airways: "奥林匹克航空公司"
 GRE_olympic_airways_desc: "由亚里士多德·奥纳西斯创立的奥林匹克航空公司曾是希腊航空业的骄傲。近年来，这家航空公司举步维艰，但其名声依然响亮。重振奥林匹克航空公司有望吸引游客前来，并让他们成为回头客。"
 GRE_trainose: "希腊铁路"
 GRE_trainose_desc: "希腊铁路系统曾一度被忽视，如今焕发新生。希腊铁路运营着连接雅典和塞萨洛尼基、伯罗奔尼撒半岛和希腊大陆的客运和货运服务。通过拓展线路、优化时刻表和投资更新车辆，我们可以使铁路成为真正的出行选择。"
 GRE_cotton_plantations: "棉花种植园"
 GRE_cotton_plantations_desc: "来自希腊色萨利和马其顿的棉花是世界上最好的棉花之一。其纤维强韧，品质优良，是纺织业的理想之选。支持棉农并投资制造业，能够使这个行业重回正轨。"
 GRE_fisheries_expansion: "爱琴海的财富"
 GRE_fisheries_expansion_desc: "希腊养殖的鲷鱼和鲈鱼产量超过欧洲任何其他国家，养殖网箱沿着爱奥尼亚海和爱琴海的避风海湾排列。但由于过度捕捞、污染以及拖网渔船越过海域边界，野生鱼类资源正在崩溃。扩大水产养殖规模、更新沿海捕捞船队并严格执行配额制度，才能保障渔民和鱼类的生存。"
 GRE_aegean_wind_banks: "驾驭北风"
 GRE_aegean_wind_banks_desc: "每年夏天，北风呼啸着席卷基克拉迪群岛，这是全欧洲最稳定的风之一。在岛屿和大陆山脊上架设风力涡轮机，可以将清洁能源输送到电网，从而摆脱我们对进口石油和煤炭的依赖。更重要的是，如果能建成互联线路，最终将岛上的柴油发电机组接入国家电网。"
 GRE_resolution_crisis: "危机解决"
 GRE_resolution_crisis_desc: "我们长期以来一直在应对危机，却从未真正着手解决它。现在是时候制定一个全面应对债务、增长、银行业和改革的切实计划了。这并非易事，但却是唯一的出路。只有集中精力完成这项计划，才能彻底终结债务危机，因此我们首先必须控制债务：利率低于8%，债务占GDP比重低于50%。"
 GRE_urban_railways: "扩建雅典地铁"
 GRE_urban_railways_desc: "雅典地铁在2004年奥运会前彻底改变了这座首都，但仍有许多城区尚未通达；塞萨洛尼基苦等地铁线路数十年；普罗阿斯蒂亚科斯郊区铁路也远未发挥其全部潜力。修建新的隧道，将有轨电车线路延伸至沿海地区，并将各城市连接起来，将有效缓解交通拥堵，清除雾霾，并改善数百万人的日常生活。"
 GRE_ionian_solar: "爱奥尼亚太阳"
 GRE_ionian_solar_desc: "爱奥尼亚群岛阳光充足。在科孚岛、莱夫卡达岛和扎金索斯岛建设太阳能发电厂，可以让我们充分利用这一优势，并减少对进口化石燃料的依赖。"
 GRE_tourism_boom: "在希腊活出你的神话"
 GRE_tourism_boom_desc: "从克里特岛的海滩到圣托里尼岛的火山口，再到米科诺斯岛的白色小巷，希腊每年吸引着数千万游客，旅游业已占到希腊经济总量的近五分之一。如果国家旅游组织能够协调一致地在市场营销、机场运力以及岛屿连通性方面加大投入，就能将这股季节性旅游热潮转化为真正的国家财富支柱。"
 GRE_tourism_boom_event_TT: "§Y创纪录的赛季引发了关于资金应该流向何处的争论。§!"
 GRE_mass_tourism: "阳光、沙滩和套餐优惠"
 GRE_mass_tourism_desc: "从曼彻斯特和杜塞尔多夫起飞的包机爆满，海岸线上林立着全包式度假村，数百万游客涌入。旅游业的繁荣为当地财政注入活力，让每个岛民都能负担得起夏季工资，但它也耗尽了米科诺斯岛的地下水，让圣托里尼岛的悬崖被游轮乘客掩埋，并逐渐耗尽了当地居民的耐心。"
 GRE_premium_tourism: "游艇和精品度假村"
 GRE_premium_tourism_desc: "游客数量减少，但每位游客的消费额却大幅提高，而且消费水平也显著降低。人们倾向于选择五星级度假村、文化和考古旅游以及爱奥尼亚群岛的超级游艇码头，这既保护了脆弱的岛屿，也维护了希腊的品牌形象。虽然游客数量的增长速度可能放缓，但游客留下的消费却更加丰厚。"
 GRE_diaspora_remittances: "争取侨民的支持"
 GRE_diaspora_remittances_desc: "从墨尔本到芝加哥，数百万希腊侨民与祖国保持着紧密的联系。他们将储蓄和汇款投入希腊经济，使情感转化为资本。"
 GRE_diaspora_remittances_event_TT: "§Y海外侨胞积极响应投资号召。§!"
 GRE_reverse_brain_drain: "扭转人才流失局面"
 GRE_reverse_brain_drain_desc: "这场危机迫使一代希腊工程师、医生和研究人员流亡海外。税收减免、科研经费和真正的工作岗位可以把他们及其专业技能带回希腊。"
 GRE_eu_cohesion_funds: "欧盟凝聚基金"
 GRE_eu_cohesion_funds_desc: "作为欧盟低收入成员国之一，希腊是结构性资金和凝聚性资金的净受益国。每一欧元资金都用于道路、港口和区域发展。"
 GRE_recovery_resilience_facility: "恢复和强化设施"
 GRE_recovery_resilience_facility_desc: "疫情后恢复和强化基金将数百亿美元用于绿色和数字化转型。如果运用得当，这将是希腊现代史上规模最大的投资计划。"
 GRE_recovery_facility_event_TT: "§Y布鲁塞尔拨付了第一批款项，雅典必须决定以多快的速度使用这笔资金。§!"
 GRE_infrastructure_cofinancing: "基础设施联合融资"
 GRE_infrastructure_cofinancing_desc: "欧洲资金承担了大部分费用，希腊资金承担了剩余部分。共同出资建设的高速公路、地铁线路和电网，其成本仅为国家整体成本的一小部分。"
 GRE_deterrence_posture: "威慑姿态"
 GRE_forward_posture_mod: "咄咄逼人的前倾姿势"
 GRE_defense_partner: "防御伙伴"
 GRE_naval_partner: "海上伙伴"
 GRE_strong_naval_partner: "紧密海上伙伴"
 GRE_defense_exporter: "国防出口商"
 GRE_f35_partner: "F-35项目伙伴"
 GRE_aegean_encroachment: "爱琴海入侵"
 GRE_refused_debt_call_opinion: "拒绝偿还债务"
 GRE_debt_forgiven_opinion: "债务豁免"
 GRE_debt_fully_repaid_opinion: "债务全额偿还"
 GRE_forgave_debt_opinion: "免除我们的债务"
 GRE_economy_modifier: "希腊经济"
 GRE_debt_crisis_category: "[GRE.GetAdjective]债务危机"
 GRE_debt_crisis_category_desc: "尽管经济增长，但我们的债务却持续攀升，无论是由于政府支出效率低下、债券到期，还是常规预算缺口，都导致债务规模不断扩大。我们必须在债务危机爆发前加以解决，或者将其转化为确保我们在新千年持续繁荣的工具。\n\n当前GDP与债务比率：[?debt_ratio|%Y]\n当前§Y债权人持有的债务§!：$$[?GRE_total_creditor_debt|0]\n"
 GRE_austerity_tension_mission: "紧缩压力"
 GRE_austerity_tension_mission_desc: "削减开支和增加税收激怒了民众。我们必须将统一债务比率降至§Y75%§!以下，才能结束这种紧张局势。每次时间一到，抗议活动就会恶化，如果抗议活动在高峰期爆发，国家就会陷入全面的债务危机。"
 GRE_debt_crisis_mission: "[GRE.GetAdjective]债务危机"
 GRE_debt_crisis_mission_desc: "紧缩政策已经失败，市场对我们失去了信心。我们必须通过削减开支和将债务转嫁给外国债权人，将统一债务比率降至§Y75%§!以下。每次时间紧迫，政府都将付出代价，而我们的失败可能会拖垮整个欧元区。"
 GRE_austerity_placate_decision: "安抚抗议者"
 GRE_austerity_placate_decision_desc: "政府的宣传和有针对性的救济措施可以缓解公众的不满情绪。减轻紧缩政策带来的明显压力有助于恢复社会稳定，并缓和紧张局势。"
 GRE_slash_public_spending_decision: "大幅削减公共开支"
 GRE_slash_public_spending_decision_desc: "各部委、公共部门工资和养老金都将全面削减。账目会看起来更好，但民众会真切感受到每一分钱的减少。减少我国国债§Y5%§!"
 GRE_emergency_tax_hikes_decision: "紧急增税"
 GRE_emergency_tax_hikes_decision_desc: "提高增值税和所得税以弥补预算缺口。财政收入是实实在在的，民众对执政党的愤怒也是实实在在的。减少我国国债§Y4%§!"
 GRE_privatization_drive_decision: "推动私有化"
 GRE_privatization_drive_decision_desc: "将所有国有资产，从港口到公用事业，拍卖给任何出价者。这是一笔一次性的意外之财，工会不会轻易原谅。减少我国国债§Y8%§!"
 GRE_unified_ratio_below_75_tt: "我们的§Y统一债务比率§!超过§Y75%§!。（当前§Y[?GRE_unified_debt_ratio|-1%]§!）"
 GRE_buys_mission_time_tt: "§G将债务执行期限延长30天§!"
 GRE_austerity_mission_active: "\n当前紧缩压力为§R[gre_austerity_tension]§!"
 GRE_generic_decisions_category: "[GRE.GetNameWithFlag]政治决策"
 GRE_generic_decisions_category_desc: "希腊政府可以做出的政治决议。"
 GRE_rename_istanbul_desc: "随着君士坦丁堡被希腊政府控制，政府正式恢复了这座城市的历史名称。此次更名具有深远的文化意义，并提振了民族士气。"
 GRE_archipelago_air_base_rapid_repair: "空军基地快速维修计划"
 GRE_archipelago_air_base_rapid_repair_desc: "在岛屿空军基地设立专门的维修队伍和预先部署的设备，意味着可以更快地修复敌军袭击造成的损坏，从而保持我方空中力量的作战能力。"
 GRE_archipelago_anti_air_rapid_repair: "防空炮台维护规程"
 GRE_archipelago_anti_air_rapid_repair_desc: "在岛屿防空基地部署配备标准化零件和培训的移动维修团队，可以让我们更快地修复受损电池，并保持防空网络的完整性。"
 GRE_archipelago_bunker_repair_protocols: "岛屿防御工事修复部队"
 GRE_archipelago_bunker_repair_protocols_desc: "群岛各地的专业工程部队专注于快速修复碉堡。受损的防御工事可以迅速恢复全部效能。"
 GRE_archipelago_naval_base_repair_protocols: "海军基地维护计划"
 GRE_archipelago_naval_base_repair_protocols_desc: "在岛屿海军设施预先部署维修材料和熟练技术人员，意味着受损的港口基础设施可以更快地得到修复，海上作业可以继续进行。"
 GRE_archipelago_coastal_obstacle_network: "海岸障碍网络"
 GRE_archipelago_coastal_obstacle_network_desc: "在潜在登陆区设置水下障碍物、雷区和屏障，将大大增加敌方海军进攻抵达我方海岸的难度。"
 GRE_archipelago_supply_disruption: "核心区域供应拒绝"
 GRE_archipelago_supply_disruption_desc: "预先计划的岛屿核心区域后勤保障中断，将使任何占领的敌人更难维持补给线或利用当地资源。"
 GRE_archipelago_coastal_battery_expansion: "海岸炮台扩建计划"
 GRE_archipelago_coastal_battery_expansion_desc: "我们将海岸炮兵阵地扩展到地形通常允许的范围之外。岛屿的地理环境不应限制我们保卫海岸线的能力。"
 GRE_archipelago_island_fortress_expansion: "岛屿要塞扩建计划"
 GRE_archipelago_island_fortress_expansion_desc: "资助工程建设，以在现有地形限制之外建造掩体。我们的岛屿能够支撑比现行理论假设的更坚固的防御工事。"
 GRE_archipelago_attrition_doctrine: "群岛消耗理论"
 GRE_archipelago_attrition_doctrine_desc: "制定利用岛屿地形消耗敌军兵力的战术。暴露在开阔地带的敌军部队将面临更高的损耗，并遭受我方阵地持续不断的骚扰。"
 GRE_archipelago_supply_interdiction: "岛屿补给拦截行动"
 GRE_archipelago_supply_interdiction_desc: "训练和部署部队积极阻止敌军获取当地资源。任何在我们岛屿上活动的敌人都会发现他们的补给来源被系统性地切断。"
 GRE_archipelago_missile_battery_expansion: "岛屿导弹防御扩建"
 GRE_archipelago_missile_battery_expansion_desc: "追加资金用于在群岛各地超出常规地形限制的区域建设导弹防御设施。增加工程投入意味着我们可以突破通常的地形限制。"
 GRE_archipelago_air_defense_expansion: "扩展型防空网络"
 GRE_archipelago_air_defense_expansion_desc: "提高防空设施的建设高度，使其超过标准地形限制。即使是较小的岛屿也能获得密集的防空覆盖。"
 GRE_archipelago_decision_active: "群岛防御计划已经启动。"
 GRE_archipelago_set1_A_chosen: "空军基地快速维修计划已完成"
 GRE_archipelago_set1_B_chosen: "防空炮台维护规程已完成"
 GRE_archipelago_set2_A_chosen: "岛屿防御工事修复部队已完成"
 GRE_archipelago_set2_B_chosen: "海军基地维护计划已完成"
 GRE_archipelago_set3_A_chosen: "海岸障碍网络已完成"
 GRE_archipelago_set3_B_chosen: "核心区域供应拒绝已完成"
 GRE_archipelago_set4_A_chosen: "海岸炮台扩建计划已完成"
 GRE_archipelago_set4_B_chosen: "岛屿要塞扩建计划已完成"
 GRE_archipelago_set5_A_chosen: "群岛消耗理论已完成"
 GRE_archipelago_set5_B_chosen: "岛屿补给拦截行动已完成"
 GRE_archipelago_set6_A_chosen: "岛屿导弹防御扩建已完成"
 GRE_archipelago_set6_B_chosen: "扩展型防空网络已完成"
 GRE_lie_about_financial_records_decision: "调整财务记录顺利"
 GRE_lie_about_financial_records_decision_desc: "尽管我们的经济持续增长，但我们过时的货币和其他经济困境阻碍了我们与欧盟最终敲定经济协议。"
 GRE_negotiate_debt_swap_deals_decision: "协商债务互换协议"
 GRE_negotiate_debt_swap_deals_decision_desc: "与外国势力展开谈判，通过货币互换重组我们的债务。通过将我们的债务转移到他国中央银行，我们或许能够获得更有利的还款条件。"
 GRE_defer_payments_decision: "推迟重点付款"
 GRE_defer_payments_decision_desc: "与其预先支付经济项目的费用，不如将成本转嫁到国家债务中。这样虽然会增加债务，但可以保护国库。"
 GRE_do_not_defer_payments_decision: "恢复直接支付"
 GRE_do_not_defer_payments_decision_desc: "停止推迟支出，恢复直接从国库支付经济项目费用。"
 CYP_NCY_diplomatic_category: "塞浦路斯统一谈判"
 GRE_brit_5_TT: "§G获得5点英国支持度§!"
 GRE_brit_30_TT: "§G获得30点英国支持度§!"
 GRE_unification_TT: "完成后，将每月举行一次会议，根据支持度的高低，可能会取得进展。"
 PER_presidential_decisions_only_one_is_available_TT: "同一时间只能采取这些决议中的一项。"
 GRE_homelessness_crisis_category: "雅典无家可归危机"
 GRE_homelessness_crisis_category_desc: "1999年雅典地震后，数千名希腊公民无家可归。目前，雅典正在进行援助和重建工作，但我们可以选择帮助这项计划，以完成城区和居民区的修复。"
 GRE_reconstruction_efforts_in_athens_decision: "为雅典的额外重建工作提供资金"
 GRE_reconstruction_efforts_in_athens_decision_desc: "地震给雅典造成了严重破坏。公寓楼倒塌，基础设施损毁，整个街区化为废墟。初步修复工作已经展开，但救灾资金远远不够。如果能将更多资金用于重建，将有助于加快重建进程。"
 GRE_issue_relief_funds_to_victims_decision: "向地震灾民发放救济金"
 GRE_issue_relief_funds_to_victims_decision_desc: "除了物质上的破坏，地震还让许多家庭一无所有。积蓄化为乌有，企业倒闭，人员伤亡。直接向灾民发放救济金，可以立即为他们提供食物、衣物、临时住所和重建家园所需的基本物资。"
 GRE_petition_turkey_for_support_decision: "请求[TUR.GetName]支援"
 GRE_petition_turkey_for_support_decision_desc: "请求[TUR.GetNameWithFlag]支持我们的震后重建工作。希望他们能伸出援手，帮助我们渡过难关。"
 GRE_cypriot_TT: "§Y塞浦路斯§!向§Y北塞浦路斯§!宣战！"
 GRE_debt_crisis_experienced_tt: "我们需要直面§R债务危机§!"
 GRE_joining_the_euro_interest_rate_tt: "改变§Y$EU_join_the_euro_decision$§!要求：\n- §Y利率§!要求从§Y3.5%§!改为§Y6.5%§!\n"
 GRE_defer_payments_decision_tt: "允许我们将未来行动（例如决议、国策）的付款延期支付给我们的§Y国家债务§!或§Y外国债权人§!，而不是立即支付。"
 GRE_golden_visa_deals: "黄金签证"
 GRE_golden_visa_deals_desc: "黄金签证计划为任何向[GRE.GetAdjective]房地产或企业投入符合条件的金额的投资者提供五年居留许可。来自欧盟以外的高净值买家表现出浓厚的兴趣，为外国资本直接流入国内市场开辟了一条途径。"
 GRE_targeted_pension_reforms: "有针对性的养老金改革"
 GRE_targeted_pension_reforms_desc: "养老金体系消耗了不成比例的GDP。有针对性的改革，例如收紧领取资格、减少滥用提前退休制度以及将补充养老金转向基金制模式，可以在不彻底削弱社会保障体系的前提下减轻财政负担。"
 GRE_merchant_marine: "商船队"
 GRE_merchant_marine_desc: "希腊拥有全球规模最大的商船队，这些商船队隶属于希腊船东联盟，该联盟是雅典最有影响力的工业游说团体之一。船东及其家族控制着船队五分之二的吨位，并通过工资、税收和港口费等方式，将相当于国内生产总值7%至8%的资金注入国民经济。不断增强自身的竞争力是维持这一强大经济体系运转的关键。"
 GRE_tonnage_tax_regime: "保留吨位税"
 GRE_tonnage_tax_regime_desc: "船东家族长期以来一直享受着优惠的吨位税制度，该制度确保了悬挂希腊国旗的船舶盈利，并抑制了船舶转至外国注册。维持这一制度保障了流经希腊港口和船坞的收入，使斯卡拉曼加斯、埃莱夫西纳和尼奥里翁等船坞得以继续运营。"
 GRE_tax_the_shipowners: "对航运巨头征税"
 GRE_tax_the_shipowners_desc: "航运巨头们长期以来一直逃避着普通希腊人所承担的税收负担。取消吨位税制度，直接向船东征税，将为国库带来一笔可观的一次性收入，但船舶离港的风险依然存在。"
 GRE_shipbuilding_revival: "重振希腊造船厂"
 GRE_shipbuilding_revival_desc: "斯卡拉曼加斯、埃莱夫西纳和尼奥里翁的造船厂曾建造过为希腊带来财富的商船队。通过有针对性的补贴和合同恢复这些造船厂的产能，不仅可以恢复造船厂的就业，还能确保国内现代化船体的供应。"
 GRE_pdo_exports: "受保护原产地优质出口"
 GRE_pdo_exports_desc: "卡拉马塔橄榄、特级初榨橄榄油、菲达奶酪和阿斯提可葡萄酒享誉全球。投资于原产地保护认证和高端营销，能够使这些产品摆脱大宗商品竞争，并在国际市场上获得更高的价格。"
 GRE_recapitalize_banks: "银行资本重组"
 GRE_recapitalize_banks_desc: "危机期间，希腊四大系统性银行累积了数万亿的不良贷款。希腊金融稳定基金可以通过强制注资注入新的资金，恢复它们的放贷能力，从而稳定金融体系，但代价是巨大的财政支出。"
 GRE_hercules_scheme: "赫拉克勒斯资产保护计划"
 GRE_hercules_scheme_desc: "赫拉克勒斯资产保护计划将不良贷款从银行的资产负债表中剥离出来，从而释放银行的贷款能力，降低企业和家庭寻求信贷的借贷成本。"
 GRE_privatize_banks: "将银行交还私有化"
 GRE_privatize_banks_desc: "将国家持有的重组银行股份出售给私人投资者，将刺激强劲的企业需求，并带来重要的税收来源。市场的信任投票也将标志着希腊回归正常秩序。"
 GRE_state_bank_control: "保持银行国有化"
 GRE_state_bank_control_desc: "保留银行的国有所有权，使我们能够引导其贷款流向国内建筑、工业和战略部门，而无需承受私人股东为追求利润而施加的压力。公有制带来的政治成本可以通过对信贷分配的控制来抵消。"
 GRE_lower_tax_desc: "减轻家庭和小企业的税收负担，就能让资金重新流入经济，而且从历史上看，还能让更多资金从灰色市场流入正规渠道。"
 GRE_european_communism_desc: "希腊革命可以点燃整个欧洲大陆的战火。将共产主义意识形态传播到国界之外，能够使这场运动保持活力，并使意识形态上的盟友进入那些原本可能对我们抱有敌意的政府。"
 GRE_plutocracy_desc: "旧的资产阶级已被彻底清除出工厂车间。随着资本家的消失，生产向国家负责。由于工人和管理者不再各自为政，产量得以提高。"
 GRE_nationalist_takeover_TT: "希腊人民要求重新选举！\n\n确保你为此积攒了足够的政治权力。如果你§R未能§!选举并组建政府，你需要举行§R另一次特别选举§!来赋予§Y[Nat_Fascism_L]§!权力。"
 GRE_dev_cyp_desc: "塞浦路斯数十年来饱受分裂和投资不足之苦。如今该岛已置于希腊主权之下，我们可以着手发展其基础设施、经济和制度，使其达到希腊大陆的水平。"
 GRE_decrease_taxes: "减税"
 GRE_decrease_taxes_desc: "希腊人民不应承受高税收的压力。此外，降低税收还能降低偷税漏税率，而偷税漏税在我国是一个严重的问题。"
 GRE_eastern_neighborhood: "东方邻居"
 GRE_eastern_neighborhood_desc: "希腊必须明确其与近邻土耳其以及分裂的塞浦路斯岛的关系。我们如何与这三个国家互动，将影响未来一代人的地区格局。"
 GRE_turkey_rapprochement: "与土耳其关系缓和"
 GRE_turkey_rapprochement_desc: "希腊和土耳其的共同点比双方承认的要多。就贸易、移民和爱琴海问题开展结构性对话，可以缓解紧张局势，并为实现稳定共存铺平道路。"
 GRE_turkey_confrontation: "对抗土耳其的野心"
 GRE_turkey_confrontation_desc: "土耳其屡次侵犯希腊领空，并在爱琴海挑衅，希腊绝不能对此置之不理。希腊将采取坚定立场，并联合盟友抵制土耳其的进一步侵犯。"
 GRE_aegean_dialogue: "爱琴海对话"
 GRE_aegean_dialogue_desc: "建立关于爱琴海权利和边界的正式对话渠道，可以降低意外升级的风险，并为达成持久的海上协议奠定基础。"
 GRE_migration_cooperation: "移民合作"
 GRE_migration_cooperation_desc: "与土耳其协调移民政策对于管理爱琴海难民流动至关重要。共同承担责任意味着双方都能减少危机。"
 GRE_greco_turkish_trade: "希土贸易协定"
 GRE_greco_turkish_trade_desc: "扩大双边贸易可以降低政治对抗的动机。希腊和土耳其之间的经济相互依存符合两国人民的利益。"
 GRE_nato_pressure_turkey: "北约对土耳其施压"
 GRE_nato_pressure_turkey_desc: "希腊将利用其在北约中的地位，追究土耳其违反联盟准则的责任。我们的盟友必须认识到，东地中海地区的稳定需要土耳其保持克制。"
 GRE_aegean_assertiveness: "爱琴海自信"
 GRE_aegean_assertiveness_desc: "希腊海军将增加在争议水域的巡逻和演习，以维护其对爱琴海大陆架和领空的主权。"
 GRE_aegean_deterrence: "爱琴海威慑"
 GRE_aegean_deterrence_desc: "投资海岸防御和快速反应部队，向世人发出一个明确的信号：希腊已做好准备，捍卫其领土免受任何入侵。"
 GRE_enosis_campaign: "族群活动"
 GRE_enosis_campaign_desc: "希腊发起了一场外交和文化运动，旨在加强与希腊族塞人社区的联系，并宣传最终与祖国统一的理想。"
 GRE_cypriot_economic_integration: "塞浦路斯经济一体化"
 GRE_cypriot_economic_integration_desc: "希腊与塞浦路斯共和国之间贸易和金融联系的深化，使得统一在经济上更具吸引力，并加强了希腊对该岛的影响力。"
 GRE_northern_outreach: "北方拓展"
 GRE_northern_outreach_desc: "希腊向北部的土耳其塞人伸出橄榄枝，提供经济激励和文化交流，以表明统一符合他们的利益，就像符合其他任何人的利益一样。"
 GRE_british_bases_accord: "英国基地协议"
 GRE_british_bases_accord_desc: "英国在塞浦路斯保留两个主权基地区。与伦敦达成协议可确保英国在未来任何统一进程中保持中立（或积极支持）。"
 GRE_cyprus_gas_exploitation: "塞浦路斯天然气开采"
 GRE_cyprus_gas_exploitation_desc: "在塞浦路斯南部海域发现了丰富的天然气储量。希腊正着手与塞浦路斯共同开发这些气田，从而在一个统一的岛屿上创造共享的经济利益。"
 GRE_confederation_framework: "联邦框架"
 GRE_confederation_framework_desc: "希腊提出了一种正式的邦联模式，该模式既保留了社区自治权，又将整个岛屿团结在单一主权之下，这是两个社区都能接受的框架。"
 GRE_cyprus_reunification: "塞浦路斯的重新统一"
 GRE_cyprus_reunification_desc: "塞浦路斯运动在塞浦路斯两大社群中获得了广泛支持，爱琴海局势已降至土耳其不会干预的程度，英国基地协议已达成，邦联框架也已完全制定，现在正是该岛重新统一的时刻。"
 GRE_force_enosis: "强行解决"
 GRE_force_enosis_desc: "谈判已经失败，塞浦路斯岛局势如同火药桶。雅典方面没有坐等永远不会到来的和解，而是将塞浦路斯统一推向崩溃的边缘，挑衅北方采取行动。如果尼科西亚的土耳其族塞人领导层率先发起攻击，塞浦路斯共和国完全有权以武力实现岛屿的统一。"
 GRE_aegean_tension_high_TT: "§B爱琴海紧张度需大于§H50%§!§!"
 GRE_recognize_unified_cyprus: "承认塞浦路斯统一共和国"
 GRE_recognize_unified_cyprus_desc: "尼科西亚的军队已经占领了北部地区。持续半个世纪、给这座岛屿带来创伤的分裂局面已经结束。雅典正式承认一个统一的、与希腊结盟的塞浦路斯共和国，并帮助其整合领土。"
 GRE_western_alignment: "与西方结盟"
 GRE_western_alignment_desc: "希腊重申其在西方外交中的中心地位。作为北约创始成员国、欧盟早期成员以及东地中海的天然锚点，雅典决心将其地理优势转化为具有约束力的政治承诺，开启一场以“西方承诺”衡量的双边和多边外交活动。"
 GRE_franco_hellenic_pact: "法希战略伙伴关系"
 GRE_franco_hellenic_pact_desc: "在2021年9月于雅典签署的战略伙伴关系基础上，希腊正与法国寻求建立涵盖国防工业、外交政策协调和东地中海安全等领域的全面双边合作框架。巴黎是欧洲最积极的合作伙伴；加强与法国的联系是任何可信的西方姿态的基石。"
 GRE_eastmed_trilateral: "东地中海三边"
 GRE_eastmed_trilateral_desc: "希腊、以色列和塞浦路斯正式确立了长期的三方合作：包括联合海军演习、情报共享以及在东地中海安全问题上采取协调一致的立场。这一安排使三个友好国家的首都组成了一个面向黎凡特盆地的战略联盟。"
 GRE_eu_political_anchor: "欧盟创始成员国锚点"
 GRE_eu_political_anchor_desc: "希腊重申其作为欧洲一体化创始成员国的身份。通过在布鲁塞尔就欧盟凝聚力、扩大和共同外交政策等议题发出主导声音，雅典将数十年的成员国身份转化为当今的政治影响力。"
 GRE_strategic_partnership_treaty: "第二条共同防御条款"
 GRE_strategic_partnership_treaty_desc: "希腊推动法希伙伴关系最终达成协议：一项以《欧洲人权公约》第五条为蓝本、并以条约形式正式确立的具有约束力的共同防御条款。法国成为首个受条约约束、有义务保卫希腊领土的欧洲大国，从而永久性地改变了地中海安全秩序。"
 GRE_eastmed_gas_forum: "东地中海天然气论坛成员"
 GRE_eastmed_gas_forum_desc: "希腊正式确立其在东地中海天然气论坛中的地位，与塞浦路斯、以色列、埃及、意大利、约旦和巴勒斯坦并肩而立。这一制度框架巩固了区域能源合作，确保希腊航运享有优惠贸易准入，并赋予雅典在东地中海外交舞台上的永久席位。"
 GRE_3plus1_dialogue: "3+1战略对话"
 GRE_3plus1_dialogue_desc: "希腊、塞浦路斯和以色列正式启动与美国的“3+1”对话机制。这一由美国国务院支持的机制涵盖能源安全、海上合作和反恐等领域。该安排为华盛顿提供了一个参与东地中海三边对话的正式渠道，并以美国的参与完善了区域合作架构。"
 GRE_eu_strategic_compass: "欧盟战略指南针"
 GRE_eu_strategic_compass_desc: "希腊积极倡导欧盟战略指南针，力求实现欧洲战略自主、深化永久性结构性合作以及在北约内部建立欧洲支柱。雅典在欧洲大陆防务问题上与巴黎和柏林保持一致，以积极参与决策为己任，而非保持低调的成员身份。"
 GRE_pillar_of_the_west: "西方的支柱"
 GRE_pillar_of_the_west_desc: "多年的努力终于结出硕果。希腊不再是西方外交的边缘地带，而是其基石之一。这场运动所积累的西方承诺的深度，决定了雅典在这一体系中融入的牢固程度。"
 GRE_regional_diplomacy: "区域性外交"
 GRE_regional_diplomacy_desc: "希腊是巴尔干地区的支柱，必须与所有邻国保持牢固的关系。地区稳定与希腊自身的安全和繁荣密不可分。"
 GRE_prespa_implementation: "普雷斯帕协议实施"
 GRE_prespa_implementation_desc: "普雷斯帕协议解决了长达数十年的北马其顿国名争端。希腊现在全面履行其义务，实现了关系正常化，并为扩大贸易打开了大门。"
 GRE_albania_minority: "阿尔巴尼亚少数族裔权利"
 GRE_albania_minority_desc: "阿尔巴尼亚南部居住着相当数量的希腊少数族裔。希腊寻求就少数族裔权利问题展开建设性对话，并将此问题作为深化双边合作的基础，而不是对抗。"
 GRE_egypt_maritime: "埃及海事伙伴关系"
 GRE_egypt_maritime_desc: "希腊和埃及在东地中海签署了海上边界协议，为联合能源开发建立了法律框架，并排除了土耳其在该地区的主张。"
 GRE_italy_mediterranean_axis: "意大利-地中海轴心"
 GRE_italy_mediterranean_axis_desc: "意大利是希腊在欧盟最大的贸易伙伴，双边贸易额每年超过120亿欧元。正式建立伙伴关系将扩大双方在地中海中部地区的能源、交通和国防合作。"
 GRE_balkan_energy_corridor: "巴尔干能源走廊"
 GRE_balkan_energy_corridor_desc: "希腊-保加利亚天然气互联管道和亚历山德鲁波利斯浮式终端使希腊成为重要的能源运输枢纽。一条通往北马其顿的新管道将这一网络进一步延伸至巴尔干半岛深处。"
 GRE_mediterranean_energy_hub: "地中海能源中心"
 GRE_mediterranean_energy_hub_desc: "随着亚历山德鲁波利斯浮式储存再气化装置和雷维图萨终端满负荷运转，希腊巩固了其作为欧洲主要液化天然气门户的地位，用来自东地中海及其他地区的海运供应取代了对俄罗斯管道的依赖。"
 GRE_gulf_strategic_partners: "海湾战略伙伴"
 GRE_gulf_strategic_partners_desc: "希腊与沙特阿拉伯建立最高战略合作委员会，并深化与阿联酋的国防和投资关系。海湾地区的资本和军事合作涌入东地中海地区。"
 GRE_balkans_eu_advocacy: "巴尔干地区欧盟倡导"
 GRE_balkans_eu_advocacy_desc: "希腊以2003年塞萨洛尼基峰会的承诺为基础，积极推动西巴尔干地区加入欧盟。作为该地区加入欧盟历史最悠久的成员国，希腊在与塞尔维亚、阿尔巴尼亚和北马其顿的谈判中拥有强大的软实力。"
 GRE_imec_gateway: "印度-中东-欧洲经济走廊门户"
 GRE_imec_gateway_desc: "印度-中东-欧洲经济走廊将比雷埃夫斯港指定为其欧洲终点站。大规模的港口和物流投资将希腊中部地区转变为连接亚洲和欧洲的跨洲贸易枢纽。"
 GRE_se_european_pillar: "东南欧支柱"
 GRE_se_european_pillar_desc: "希腊巩固了其作为东南欧不可或缺的枢纽地位：能源门户、巴尔干半岛的庇护者、地中海的贸易中心，以及连接三大洲的走廊终点。"
 GRE_eastern_alignment: "转向东方"
 GRE_eastern_alignment_desc: "在经历了十年三驾马车式的紧缩政策和大西洋主义的庇护之后，雅典将目光投向东方。希腊将与俄罗斯、中国、伊朗和东正教巴尔干国家发展平行关系，并最终重塑自身，成为多极世界中地中海的支柱。"
 GRE_strategic_autonomy: "战略自主"
 GRE_strategic_autonomy_desc: "希腊无需选择单一的主人。作为一个北约成员国，它既购买俄罗斯天然气，又积极争取海湾国家和中国的资本，同时还在竞争对手之间进行斡旋，因此可以从各方获得让步。雅典采取的是多方位策略，不依附于任何集团，对各方都有利。"
 GRE_strategic_autonomy_event_TT: "§Y关于如何运用希腊的不结盟立场，一场辩论就此展开。§!"
 GRE_russia_outreach: "与莫斯科开通渠道"
 GRE_russia_outreach_desc: "希腊悄悄向克里姆林宫提出一项提议：长期天然气供应合同、扩大俄罗斯航运的港口准入范围，以及释放更友好的政治信号。莫斯科的回应将决定地中海新伙伴关系的基调。"
 GRE_china_outreach: "与北京接触"
 GRE_china_outreach_desc: "希腊特使前往北京寻求更深入的合作，包括产业融资、电信和基础设施等领域。中国收购比雷埃夫斯港的案例已经证明了这种模式的有效性。现在，雅典方面计划将这种模式推广到整个希腊经济领域。"
 GRE_iran_outreach: "与德黑兰的联系"
 GRE_iran_outreach_desc: "希腊长期以来对伊朗遭受制裁的不满表示同情，悄悄提议在SWIFT体系之外建立一个易货和能源交易框架。此举在布鲁塞尔和华盛顿引发争议，但如果德黑兰同意，则对希腊有利。"
 GRE_orthodox_outreach: "东正教兄弟会"
 GRE_orthodox_outreach_desc: "雅典召集贝尔格莱德、尼科西亚和埃里温举行峰会，旨在构建东正教欧洲的文化和政治联盟。宗主教区的外交策略演变为国家战略，构建了一个既不隶属于布鲁塞尔也不隶属于华盛顿的区域集团。"
 GRE_russia_milcoop: "希腊-俄罗斯防务会谈"
 GRE_russia_milcoop_desc: "继能源合作之后，雅典提议与莫斯科开展正式的防务合作，包括联合演习、S-300 PMU2导弹防御系统现代化改造以及情报共享。此举向北约发出的政治信号显而易见。"
 GRE_china_bri_anchor: "“一带一路”锚点"
 GRE_china_bri_anchor_desc: "希腊自诩为中国“一带一路”倡议的欧洲锚地，扩大了中远海运的业务版图，在阿提卡地区开设了新的自由贸易区，并将希腊物流融入了中国的供应链。"
 GRE_iran_med_corridor: "东地中海走廊"
 GRE_iran_med_corridor_desc: "雅典提议建立一条伊朗至希腊的能源走廊，通过第三国中间商输送原油和液化天然气，以绕过西方制裁。如果德黑兰接受该方案，希腊将成为伊朗进入欧洲的窗口。"
 GRE_orthodox_security: "东正教安全契约"
 GRE_orthodox_security_desc: "东正教委员会正式签署了一项防御条约：包括联合训练、情报合作和定期政治磋商。塞尔维亚、塞浦路斯和亚美尼亚与希腊组成了一个低调但明确的联盟。"
 GRE_brics_membership: "加入金砖国家联盟+"
 GRE_brics_membership_desc: "希腊正式加入金砖国家+框架，成为首个欧洲成员国。至此，希腊与北约彻底决裂；作为交换，雅典获得了新开发银行的优先准入资格、人民币-卢布结算体系的使用权，以及在多极化格局中的一席之地。"
 GRE_multipolar_anchor: "多极世界的锚点"
 GRE_multipolar_anchor_desc: "希腊宣布自身成为新多极秩序的基石。它退出大西洋联盟，离开欧盟，一个横跨欧亚大陆、黎凡特地区和非洲三大洲的地中海共和国从雅典向外扩张。"
 GRE_eastern_outreach: "东部外延"
 GRE_eastern_outreach_desc: "雅典已开始在大西洋联盟之外拓展合作伙伴。外交资源向东流动，贸易政策自主权不断扩大，但西方各国首都正密切关注着事态发展。"
 GRE_eurasian_partner: "欧亚合作伙伴"
 GRE_eurasian_partner_desc: "希腊如今已成为欧亚大陆公认的合作伙伴。来自莫斯科、北京和德黑兰的资本为希腊工业提供资金支持，而西方舆论却日趋强硬。希腊重返西方世界的道路变得越来越窄。"
 GRE_brics_anchor: "金砖国家联盟锚点"
 GRE_brics_anchor_desc: "希腊位列金砖国家+议程之上。大西洋联盟已成往事；地中海已成为多极化的海洋。雅典的发言权掌握在大陆枢纽手中。"
 GRE_orthodox_defense_pact: "东正教防御条约"
 GRE_orthodox_defense_pact_desc: "东正教欧洲国家之间建立了一项长期防御协议：与贝尔格莱德、尼科西亚和埃里温进行联合演习、共享理论和情报。"
 GRE_iran_barter_framework: "贸易往来支持工具式易货交易"
 GRE_iran_barter_framework_desc: "希腊与伊朗之间的贸易通过SWIFT之外的易货清算中心进行，绕过制裁，为希腊出口商打开了伊朗市场。"
 GRE_iran_med_corridor_idea: "东地中海能源走廊"
 GRE_iran_med_corridor_idea_desc: "伊朗原油和液化天然气经由以希腊为中心的通道输送至欧洲。炼油能力扩张，燃料储备增加，雅典成为区域能源咽喉要道。"
 GRE_diplomacy_category: "希腊外交"
 GRE_host_putin_summit: "举办俄罗斯峰会"
 GRE_host_putin_summit_desc: "邀请俄罗斯总统前往雅典举行高规格的双边峰会。双方签署贸易协议，安排拍照环节，西方国家大使馆则眉头紧锁。"
 GRE_cosco_pier_expansion: "中远码头扩建"
 GRE_cosco_pier_expansion_desc: "共同出资推进中远比雷埃夫斯港扩建工程的下一阶段。一家民用工厂承诺为该项目服务三个月；作为回报，阿提卡地区将获得一个永久性基础设施工位。"
 GRE_instex_iran_barter: "运营伊朗易货贸易渠道"
 GRE_instex_iran_barter_desc: "通过易货结算中心处理一批希腊-伊朗贸易，更新框架并奖励那些维持框架运转的商人。"
 GRE_orthodox_patriarchate_summit: "召开东正教理事会"
 GRE_orthodox_patriarchate_summit_desc: "在雅典举办宗主教峰会，让塞尔维亚、塞浦路斯和亚美尼亚领导人齐聚一堂，进行教会和政治磋商。"
 GRE_retry_russia_outreach: "重新接近莫斯科"
 GRE_retry_russia_outreach_desc: "在上次遭到拒绝后，希腊外交官准备了一份修改后的提案，并重新与克里姆林宫沟通。"
 GRE_retry_russia_milcoop: "重新提出防务谈判"
 GRE_retry_russia_milcoop_desc: "以更优惠的条件和更低调的信号，重新提出希腊-俄罗斯防务合作方案。"
 GRE_retry_china_outreach: "重新接近北京"
 GRE_retry_china_outreach_desc: "派遣新的特使前往北京，带来修订后的条款和新一轮的投资保证。"
 GRE_retry_china_bri_anchor: "重新推介“一带一路”锚定角色"
 GRE_retry_china_bri_anchor_desc: "修改“一带一路”倡议的锚定方案，在物流、所有权和政治立场等方面做出更广泛的让步。"
 GRE_retry_iran_outreach: "重新与德黑兰接触"
 GRE_retry_iran_outreach_desc: "在德黑兰最初拒绝后，雅典通过第三国中间人重新开启了秘密渠道谈判。"
 GRE_retry_iran_med_corridor: "重新提出地中海走廊计划"
 GRE_retry_iran_med_corridor_desc: "修改东地中海走廊方案，引入新的路线选择，进一步降低伊朗受西方制裁的影响。"
 GRE_retry_orthodox_outreach: "重新召开东正教峰会"
 GRE_retry_orthodox_outreach_desc: "在首次峰会失败后弥合分歧，召集东正教外交部长返回雅典。"
 GRE_retry_orthodox_security: "重新提出安全契约"
 GRE_retry_orthodox_security_desc: "更新东正教安全协议，修订情报共享和演习轮换方面的承诺。"
 greece.530.t: "希腊能源提案"
 greece.530.d: "雅典方面提议建立一套全面的能源和贸易伙伴关系：包括长期天然气合同、向俄罗斯航运提供港口特许权，以及希腊外交政策向莫斯科进行低调调整。希腊外交部长正在等待俄方回应。"
 greece.530.a: "欢迎开幕。签署。"
 greece.530.b: "雅典无法兑现承诺。拒绝。"
 greece.531.t: "莫斯科接受伙伴关系"
 greece.531.d: "克里姆林宫接受了希腊的提议。双方交换了贸易协定，签署了改进后的双边协议，俄罗斯天然气开始以优惠条件输送至希腊。雅典迎来了它的第一个东方伙伴。"
 greece.531.a: "欢迎来到希腊新外交政策时代。"
 greece.532.t: "莫斯科拒绝"
 greece.532.d: "克里姆林宫礼貌地拒绝了希腊的提议。如果没有雅典退出大西洋联盟的明确保证，莫斯科就没有动力去承担政治风险。挫折固然是现实的，但大门并未完全关闭。"
 greece.532.a: "重新调整策略，再试一次。"
 greece.533.t: "希腊国防合作提案"
 greece.533.d: "雅典方面提议建立正式的希俄防务框架：联合演习、S-300 PMU2现代化支持以及情报共享。莫斯科方面则在权衡此举带来的政治收益与北约可能采取的外交反弹。"
 greece.533.a: "历史性的联盟。接受。"
 greece.533.b: "希腊仍然是北约成员国。拒绝。"
 greece.534.t: "莫斯科接受防务谈判"
 greece.534.d: "俄罗斯国防部同意正式开展合作。希腊军官前往莫斯科接受培训；俄罗斯工程师抵达萨拉米斯海军基地。陆军作战理论方面的益处显著，但政治代价也同样巨大。"
 greece.534.a: "希腊与俄罗斯的军备合作正式启动。"
 greece.535.t: "莫斯科拒绝进行防务谈判"
 greece.535.d: "莫斯科以希腊仍负有北约义务为由拒绝了这一提议。除非雅典退出北约，或者至少发出可信的退出信号，否则双方不会进行正式的防务合作。"
 greece.535.a: "注意对更大投入的要求。"
 greece.536.t: "希腊对北京的态度"
 greece.536.d: "雅典方面向北京提出深化经济合作的提议，内容涵盖电信、基础设施融资以及更广泛的“一带一路”合作。中国外交部已对该提议进行审查。"
 greece.536.a: "非常合适。赞同。"
 greece.536.b: "政治代价大于收益。拒绝。"
 greece.537.t: "北京接受"
 greece.537.d: "中国领导层认可了这一伙伴关系。国家资金开始流入希腊的工业和电信项目，希腊在北京的考量中的影响力也显著提升。"
 greece.537.a: "中希伙伴关系不断深化。"
 greece.538.t: "北京拒绝"
 greece.538.d: "北京方面表示反对：雅典方面认为，他们无法提供已经通过其他更隐蔽渠道获得的东西。希腊外交官空手而归，但并未气馁。"
 greece.538.a: "重新评估并重试。"
 greece.539.t: "希腊“一带一路”锚定提案"
 greece.539.d: "雅典自诩为“一带一路”欧洲枢纽：扩大中远海运特许权范围、在阿提卡设立自由贸易区，并在印太问题上采取政治立场一致。代价高昂，但回报也同样丰厚。"
 greece.539.a: "历史雄心的基石。接受。"
 greece.539.b: "条款尚不可行，拒绝。"
 greece.540.t: "北京认可“一带一路”锚点"
 greece.540.d: "中国正式将希腊列为“一带一路”沿线国家。建设队伍进驻；资金涌入阿提卡地区；随着中国投资为希腊工业提供资金支持，首都地区又兴建了一家民用工厂。"
 greece.540.a: "希腊是“一带一路”在欧洲的终点站。"
 greece.541.t: "北京拒绝锚定角色"
 greece.541.d: "北京拒绝了正式的“锚定伙伴”称号，认为希腊政局动荡，不宜做出如此大规模的承诺。雅典方面必须展现出更坚定的立场，北京才会再次提出这一提议。"
 greece.541.a: "必须重新审视这些条款。"
 greece.542.t: "希腊对德黑兰的援助"
 greece.542.d: "希腊驻德黑兰特使提议在SWIFT系统之外建立一套易货贸易框架，旨在规避西方制裁，并向希腊出口商开放伊朗市场。最高国家安全委员会就此提议展开辩论。"
 greece.542.a: "来自欧洲的合作伙伴，我们非常欢迎。接受。"
 greece.542.b: "雅典代表西方发声。拒绝。"
 greece.543.t: "德黑兰接受该框架"
 greece.543.d: "德黑兰同意了。易货结算中心在雅典设立，希腊出口商获得了进入伊朗市场的优先权。西方国家对此感到不满。"
 greece.543.a: "欧洲人首次进入伊朗体系。"
 greece.544.t: "德黑兰拒绝"
 greece.544.d: "德黑兰方面拒绝了这一提议。伊朗外长指出，希腊仍然是北约成员国，任何此类框架一旦启动，都将面临美国二级制裁的风险。"
 greece.544.a: "首先要展现出独立性。"
 greece.545.t: "希腊地中海走廊提案"
 greece.545.d: "雅典方面提议东地中海走廊：伊朗原油和液化天然气经由第三国中间商运至希腊码头，然后进一步输往欧洲。伊朗方面则权衡了此举可能带来的收益与美国的报复。"
 greece.545.a: "这条走廊是战略要地。接受。"
 greece.545.b: "风险过。拒绝。"
 greece.546.t: "德黑兰支持该走廊项目"
 greece.546.d: "德黑兰支持这条走廊。伊朗原油开始抵达希腊港口；阿提卡和波俄提亚的炼油能力迅速扩张。希腊成为地中海的能源咽喉要道，而德黑兰则悄然受益。"
 greece.546.a: "东地中海能源走廊已开放。"
 greece.547.t: "德黑兰拒绝该走廊"
 greece.547.d: "德黑兰方面拒绝了这一提议，理由是美国对中间国家施加了反制压力。该走廊计划被搁置；两国首都将在条件允许时重新审议。"
 greece.547.a: "等待更好的时机。"
 greece.548.t: "雅典召开东正教议事会"
 greece.548.d: "雅典提议在欧洲东正教国家（包括塞尔维亚、塞浦路斯、亚美尼亚等）之间建立常设政治磋商机制。宗主教外交只是幌子，其真正意图在于谋划国家大事。"
 greece.548.a: "迟来的兄弟情谊。接受。"
 greece.548.b: "风险大于收益。拒绝。"
 greece.549.t: "贝尔格莱德支持该议事会"
 greece.549.d: "贝尔格莱德赞同该提议，尼科西亚随后也表示赞同。东正教理事会在雅典召开会议，希腊、塞尔维亚和塞浦路斯的外交部长出席了会议。一个低调但立场鲜明的联盟已经形成。"
 greece.549.a: "一个东正教联盟由此诞生。"
 greece.550.t: "贝尔格莱德拒绝"
 greece.550.d: "贝尔格莱德方面拒绝了这一提议，理由是担心此举会激怒布鲁塞尔，并使塞尔维亚加入欧盟的进程复杂化。东正教项目只是被推迟了，并没有终止。"
 greece.550.a: "耐心等待。时机终会到来。"
 greece.551.t: "希腊安全协议提案"
 greece.551.d: "雅典提议将东正教联盟正式纳入防务协议：包括联合训练、情报共享和定期政治磋商。贝尔格莱德则权衡此举的利弊，以及布鲁塞尔不可避免的反应。"
 greece.551.a: "该契约增强了我们所有人的力量。接受。"
 greece.551.b: "贝尔格莱德不能冒这个险。拒绝。"
 greece.552.t: "东正教防御协议签署"
 greece.552.d: "贝尔格莱德、尼科西亚和埃里温与雅典共同正式签署了东正教防御条约。联合演习开始；情报渠道开通；一个隐秘的欧洲中心在地图上显现。"
 greece.552.a: "东正教安全架构已建立。"
 greece.553.t: "贝尔格莱德拒绝该协议"
 greece.553.d: "贝尔格莱德拒绝签署正式协议，认为在欧盟入盟谈判进行期间，外交代价过高。东正教阵营仍然存在，但形式较为非正式。"
 greece.553.a: "另辟蹊径。"
 greece.554.t: "欢迎来到金砖国家+"
 greece.554.d: "金砖国家+领导人正式欢迎希腊成为该联盟的首个欧洲成员。俄罗斯、中国、印度和伊朗的特使抵达雅典参加入盟仪式。大西洋篇章就此落下帷幕。"
 greece.554.a: "雅典站在多极世界的中心。"
 greece.555.t: "希腊是多极世界的基石"
 greece.555.d: "希腊正式退出大西洋联盟和欧盟，宣布成为新多极秩序的基石。这个横跨三大洲的地中海共和国在雅典宣告成立。世界格局也随之重塑。"
 greece.555.a: "希腊的未来已经开始。"
 greece.555.b: "西方已经失去了地中海侧翼。"
 greece.555.c: "一个新的极点出现了。请仔细观察。"
 CYP_seek_greek_union: "寻求与希腊合并"
 CYP_seek_greek_union_desc: "塞浦路斯共和国积极开展正式外交活动，以加强与希腊的关系，最终目标是建立政治联盟。"
 CYP_appeal_to_un: "向联合国发出呼吁"
 CYP_appeal_to_un_desc: "塞浦路斯将统一问题提交联合国，寻求国际合法性，以达成一项有利于希族塞人社区的解决方案。"
 CYP_economic_incentive_north: "北方经济激励措施"
 CYP_economic_incentive_north_desc: "塞浦路斯向北部的土耳其塞人社区提供经济援助，表明统一为岛上所有居民带来切实利益。"
 NCY_seek_turkish_union: "寻求与土耳其合并"
 NCY_seek_turkish_union_desc: "北塞浦路斯加深与土耳其的政治和经济联系，推进在土耳其领导下正式统一的前景。"
 NCY_recognition_campaign: "国际承认运动"
 NCY_recognition_campaign_desc: "北塞浦路斯发起外交攻势，以争取更广泛的国际承认，从而在更广泛的国际社会眼中确立其政府的合法性。"
 GRE_aegean_defense_posture: "爱琴海防御态势"
 GRE_aegean_defense_posture_desc: "高度戒备和前沿部署的兵力使希腊军队始终处于高度戒备状态。每一次拦截、每一次巡逻、每一次演习，都表明希腊领土必将受到捍卫。"
 GRE_cypriot_integration_idea: "塞浦路斯经济一体化"
 GRE_cypriot_integration_idea_desc: "与塞浦路斯共和国的深度经济一体化，包括关税同盟和银行业协调，加强了贸易联系，并为两国经济创造了持续的企业税收收入。"
 GRE_north_macedonian_ties: "北马其顿关系"
 GRE_north_macedonian_ties_desc: "在《普雷斯帕协议》签署后，与斯科普里的关系正常化，为巴尔干地区开辟了新的外交渠道，产生了善意，进而转化为政治影响力。"
 GRE_chinese_investment: "中国基础设施投资"
 GRE_chinese_investment_desc: "中国国有资本正在为希腊各地的基础设施和工业建设项目提供资金，加快了国内预算无法独自承担的建设项目。"
 GRE_lng_gateway: "液化天然气门户"
 GRE_lng_gateway_desc: "希腊已将自己定位为欧洲主要的液化天然气登陆点，向区域合作伙伴供应无需管道的能源。"
 GRE_balkan_advocate: "巴尔干欧盟倡导者"
 GRE_balkan_advocate_desc: "作为欧盟西巴尔干地区入盟的主要倡导者，希腊对其北部邻国施加着日益增长的软实力影响力。"
 GRE_imec_terminus: "印度-中东-欧洲经济走廊欧洲终点站"
 GRE_imec_terminus_desc: "将比雷埃夫斯指定为印度-中东-欧洲经济走廊的欧洲终点，将带来可观的过境运输收入和基础设施投资。"
 GRE_regional_pillar: "东南欧支柱"
 GRE_regional_pillar_desc: "希腊已确立其作为东南欧邻国不可或缺的中心地位，在能源、贸易和外交渠道投射影响力。"
 GRE_epirus_cultural_ties: "伊庇鲁斯文化联系"
 GRE_epirus_cultural_ties_desc: "与地拉那达成的正式少数族裔权利框架稳定了阿尔巴尼亚南部讲希腊语的社区，将长期存在的摩擦变成了悄然的外交优势。"
 GRE_italo_hellenic_axis: "意希轴心"
 GRE_italo_hellenic_axis_desc: "与罗马协调一致的产业政策和共享的造船厂项目，将雅典和意大利半岛拉入了一个统一的地中海经济空间。"
 GRE_balkan_gas_transit: "巴尔干天然气过境"
 GRE_balkan_gas_transit_desc: "希腊- 保加利亚天然气互联管道扩建工程将里海和东地中海的天然气通过希腊领土输送到更广阔的巴尔干地区，从而产生持续的过境收入。"
 GRE_gulf_capital_inflow: "海湾资本流入"
 GRE_gulf_capital_inflow_desc: "来自阿拉伯半岛的主权财富基金已进入希腊的工业和物流领域，加速了整个经济的资本形成。"
 GRE_eez_delimitation: "专属经济区划界协议"
 GRE_eez_delimitation_desc: "与开罗签署的双边专属经济区协议赋予希腊船只在东地中海的畅通航道，并为对抗其他海上主张提供了法律框架。"
 greece.500.t: "斯蒂芬·桑德斯之死"
 greece.500.d: "英国国防武官斯蒂芬·桑德斯在雅典遭11月17日恐怖组织暗杀。这起骇人听闻的袭击引发国际社会强烈谴责，并给希腊安全部门带来巨大压力，要求其彻底铲除该组织。"
 greece.500.a: "严厉打击国内恐怖主义"
 greece.500.b: "与国际情报机构合作"
 greece.501.t: "革命组织的审判"
 greece.501.d: "11月17日事件中被捕的成员正在雅典受审。该组织领导层在逃避法律制裁数十年后，如今因一系列暗杀和爆炸事件面临起诉。此次审判是希腊反恐史上的一个里程碑事件。"
 greece.501.a: "判处重刑"
 greece.501.b: "利用这个机会改革安全部门"
 greece.502.t: "反恐战争抗议活动"
 greece.502.d: "为抗议美国入侵伊拉克，希腊各地爆发了大规模反战示威活动。数万民众走上雅典和塞萨洛尼基的街头，反映出民众对美国领导的这场战争的强烈反对。"
 greece.502.a: "允许和平示威"
 greece.502.b: "限制抗议活动以维护秩序"
 greece.503.t: "赫利俄斯航空522号航班坠毁"
 greece.503.d: "赫利俄斯航空公司522号航班在格拉马蒂科附近坠毁，机上121名乘客和机组人员全部遇难。这架飞机在无人驾驶状态下以“幽灵航班”身份飞行。事故原因是机舱增压失败，引发了人们对希腊航空安全监管的严重质疑。"
 greece.503.a: "启动航空安全改革"
 greece.503.b: "宣布全国哀悼日"
 greece.504.t: "雅典库尔德人抗议活动"
 greece.504.d: "散居雅典的库尔德人组织了大规模示威活动，支持库尔德人的权利。这些抗议活动引起了安卡拉的关注，安卡拉对海外库尔德激进主义的任何支持都持怀疑态度。"
 greece.504.a: "允许抗议活动继续进行。"
 greece.504.b: "驱散人群"
 greece.505.t: "加沙危机抗议活动"
 greece.505.d: "为回应加沙危机不断升级，希腊各大城市爆发了支持巴勒斯坦的示威游行。抗议者呼吁政府对军事行动采取更强硬的立场，并提供人道主义援助。"
 greece.505.a: "表达对示威者的声援"
 greece.505.b: "敦促各方保持克制，寻求外交途径解决问题。"
 greece.506.t: "2007年希腊森林大火"
 greece.506.d: "毁灭性的野火席卷了伯罗奔尼撒半岛和埃维亚岛，造成数十人死亡，多个村庄被夷为平地。这场大火暴露了希腊灾害应对能力的严重缺陷，并引发了公众对政府危机处理方式的强烈不满。"
 greece.506.a: "调动应急资源"
 greece.506.b: "请求国际援助"
 greece.507.t: "亚历山德罗斯·格里戈罗普洛斯逝世"
 greece.507.d: "15 岁的亚历山德罗斯·格里戈罗普洛斯在雅典埃克萨恰区被一名警察开枪打死。此次枪击事件引发了希腊数十年来最严重的骚乱，主要城市遭到广泛破坏。"
 greece.507.a: "对相关警官提起诉讼"
 greece.507.b: "部署防暴警察恢复秩序"
 greece.508.t: "2009年希腊森林大火"
 greece.508.d: "希腊再次遭遇毁灭性的野火季，阿提卡和伯罗奔尼撒东部的森林肆虐，居民区岌岌可危。尽管吸取了2007年的教训，该国的消防基础设施仍然捉襟见肘。"
 greece.508.a: "投资消防基础设施"
 greece.508.b: "重点救济受灾社区"
 greece.509.t: "金色黎明党进入议会"
 greece.509.d: "极右翼政党金色黎明首次赢得​​议会席位，利用了公众对紧缩政策和经济危机的愤怒情绪。他们公开的民族主义和暴力言论令欧洲各地的民主机构感到震惊。"
 greece.509.a: "密切监视他们的活动"
 greece.509.b: "把他们当作边缘运动而忽略掉。"
 greece.510.t: "希腊方案党成立"
 greece.510.d: "电视节目主持人基里亚科斯·韦洛普洛斯创立了希腊方案党，并将其定位为保守民族主义的替代选择。该党旨在吸引那些对传统右翼和极右翼边缘势力都感到失望的选民。"
 greece.510.a: "正视新的政治格局"
 greece.510.b: "把他们斥为民粹主义者。"
 greece.511.t: "帕夫洛斯·菲萨斯之死"
 greece.511.d: "反法西斯说唱歌手帕夫洛斯·菲萨斯在凯拉齐尼被金色黎明党成员刺死。这起谋杀案引发了全国的愤怒，并促使各界更加强烈地呼吁政府对该党的暴力网络采取果断行动。"
 greece.511.a: "镇压金色黎明"
 greece.511.b: "呼吁保持冷静并遵循正当程序"
 greece.512.t: "金色黎明成员审判"
 greece.512.d: "金色黎明党领导层受审，这已成为欧洲历史上针对政党的最大规模刑事案件。指控包括组织犯罪组织、谋杀以及多起针对移民和政治对手的袭击。"
 greece.512.a: "争取最重刑罚"
 greece.512.b: "顺其自然吧"
 greece.513.t: "爱琴海大地震"
 greece.513.d: "莱斯博斯岛附近东爱琴海发生强烈地震，造成重大损失和人员伤亡。土耳其也受到影响，这为两国在灾害救援方面开展双边合作提供了一个难得的机会。"
 greece.513.a: "启动全国救援行动"
 greece.513.b: "与土耳其合作开展救援工作"
 greece.514.t: "2018年阿提卡山火"
 greece.514.d: "毁灭性的野火席卷了阿提卡东部，在海滨小镇马蒂造成一百多人死亡。这是希腊历史上最致命的野火灾难，暴露了应急计划和民防方面的系统性缺陷。"
 greece.514.a: "彻底改造民防系统"
 greece.514.b: "立即向受害者提供援助"
 greece.515.t: "又一次雅典地震"
 greece.515.d: "雅典附近发生地震，建筑物受损，并在首都引发广泛恐慌。虽然人员伤亡有限，但此次地震再次引发了人们对希腊老旧基础设施抗震能力的讨论。"
 greece.515.a: "加强建筑规范"
 greece.515.b: "提供紧急救援"
 greece.517.t: "爱琴海大地震"
 greece.517.d: "莱斯博斯岛附近东爱琴海发生强烈地震，造成重大损失和人员伤亡。土耳其也受到影响，这为两国在灾害救援方面开展双边合作提供了一个难得的机会。"
 greece.517.a: "调动救援力量"
 greece.518.t: "2018年阿提卡山火"
 greece.518.d: "毁灭性的野火席卷了阿提卡东部，在海滨小镇马蒂造成一百多人死亡。这是希腊历史上最致命的野火灾难，暴露了应急计划和民防方面的系统性缺陷。"
 greece.518.a: "启动应急响应"
 greece.519.t: "又一次雅典地震"
 greece.519.d: "雅典附近发生地震，建筑物受损，并在首都引发广泛恐慌。虽然人员伤亡有限，但此次地震再次引发了人们对希腊老旧基础设施抗震能力的讨论。"
 greece.519.a: "协调应急服务"
 greece.620.t: "联盟问题"
 greece.620.d: "雅典已正式邀请塞浦路斯共和国完成邦联建设，并与希腊重新统一。最终决定权在于尼科西亚。"
 greece.620.a: "加入希腊联盟"
 greece.620.b: "保持独立的共和国"
 greece.621.t: "北方问题"
 greece.621.d: "希腊的提议延伸至该岛北部。在雅典的领导下重新统一将解散北部的独立行政机构，并将其领土纳入希腊国家版图。"
 greece.621.a: "接受统一"
 greece.621.b: "拒绝提议"
 greece.630.t: "来自雅典的呼吁"
 greece.630.d: "希腊已请求土耳其帮助缓解其城市面临的住房危机。双方的合作将减轻雅典的负担，并标志着这两个邻国之间难得的友好时刻。"
 greece.630.a: "延长支持"
 greece.630.b: "拒绝干预"
 greece.631.t: "土耳其援助抵达"
 greece.631.d: "土耳其的援助和建设支持已开始流入希腊，缓解了住房短缺最严重的状况，并缓和了爱琴海沿岸两国的关系。"
 greece.631.a: "一个热心的帮助"
 greece.632.t: "安卡拉方面不提供任何帮助"
 greece.632.d: "土耳其拒绝介入希腊的住房危机。雅典必须独自应对这场危机。"
 greece.632.a: "我们自立自强"
 greece.641.t: "创纪录的季节"
 greece.641.d: "今年夏天，入境游客数量打破了所有纪录。酒店爆满，机场人山人海，收入也源源不断地涌入。问题是，谁能从这笔意外之财中获益？"
 greece.641.a: "对岛屿进行再投资"
 greece.641.b: "让运营者保留它"
 greece.642.t: "侨民的回答"
 greece.642.d: "向海外希腊人发出的呼吁引起了共鸣。来自世界各地的希腊社群纷纷承诺投资和汇款，渴望看到祖国复苏。"
 greece.642.a: "设立主权侨民基金"
 greece.642.b: "将汇款与税收减免相匹配"
 greece.643.t: "布鲁塞尔打开水龙头"
 greece.643.d: "首批复苏资金已获批准。数百亿欧元的资金即将到位，但前提是希腊必须进行改革，并且能够按时将资金实际使用出去。"
 greece.643.a: "提前安排项目"
 greece.643.b: "谨慎消费"
 greece.650.t: "多向量理论"
 greece.650.d: "雅典方面已宣布将按照自己的方式与东西方平等交往。内阁正在讨论如何最好地利用这种独立性来增强自身影响力。"
 greece.650.a: "实现能源和贸易伙伴多元化"
 greece.650.b: "将希腊定位为区域调解人"
 greece_military.01.t: "希腊防御体系的形成"
 greece_military.01.d: "希腊火药与弹药公司和希腊军工企业已合并为一家国有企业——希腊国防系统公司。此次合并旨在简化采购流程、规范生产，并在统一的管理架构下重建国内国防工业能力。"
 greece_military.01.a: "一位全国冠军诞生了。"
 greece_military.02.t: "希腊海军挑战我们的水域"
 greece_military.02.d: "希腊已完成其主权水域战略，并公开宣称对有争议的爱琴海和克里特岛海域拥有主权。他们的海军扩张直接挑战了我们在东地中海的地位。"
 greece_military.02.a: "扩大舰队"
 greece_military.02.b: "提出外交抗议"
 greece.516.t: "民族主义运动获得支持"
 greece.516.d: "受希腊支持的塞浦路斯民族人民阵线民族主义者正在我们岛上不断扩大影响力。他们鼓吹与希腊合并，并在部分民众中找到了拥护者。我们可以选择容忍他们的存在，也可以选择镇压，但这样做可能会引发社会动荡。"
 greece.516.a: "允许他们行动"
 greece.516.b: "镇压运动"
 greece_debt.1.t: "债务互换伙伴"
 greece_debt.1.desc: "账单不断涌来，国库却日益萎缩。我们的财政部长提议，通过合作国家的中央银行，将部分欧元债务兑换成外币。新的债权国会收取利息，但利率可以协商，而且条件比我们目前的债权国更为友好。印度、俄罗斯、中国或欧洲央行都可以作为合作伙伴，但每个国家都有其自身的政治代价。"
 greece_debt.1.a: "或许是卢比"
 greece_debt.1.b: "或许是卢布"
 greece_debt.1.c: "人民币或许是个不错的选择。"
 greece_debt.1.e: "坚持原立场"
 GRE_debt_swap_accept_tt: "§G如果他们接受：§!他们购买了我们的一部分债务，成为我们的债权人，我们需要向他们支付利息，这既缓解了我们当前的资产负债表压力，也换取了我们未来稳定的付款。"
 GRE_debt_counter_refund_tt: "我们拒绝对方的提议。潜在债权人提供的资金将全额退还。"
 greece_debt.2.a: "我们必须拒绝"
 greece_debt.2.b: "我们将承担他们的债务"
 GRE_homelessness_crisis_idea: "雅典无家可归危机"
 GRE_homelessness_crisis_idea_desc: "雅典地震导致数千人无家可归，只能睡在公园里。社会服务不堪重负，帐篷城在首都蔓延。我们行动越慢，情况就越糟糕。"
 GRE_the_drachma_idea: "德拉克马"
 GRE_the_drachma_idea_desc: "由于希腊不在欧元区内运营，我们只能自行管理德拉克马。货币不稳定和更高的借贷成本会拖累经济，但德拉克马贬值能保持希腊出口的竞争力，并提升在国际市场上的收益。"
 GRE_solving_tax_evasion_idea: "堵住税收漏洞"
 GRE_solving_tax_evasion_idea_desc: "堵住税收漏洞可以消除税收缺口，但这需要大量的委员会和对国家税法的重新评估。"
 GRE_tax_evasion_idea: "肆无忌惮的逃税"
 GRE_tax_evasion_idea_desc: "希腊的逃税现象根深蒂固，严重消耗政府收入。缺乏资金来维持基本公共服务和推进改革，国家就陷入了困境。"
 GRE_tax_enforcement_idea: "加强税务执法"
 GRE_tax_enforcement_idea_desc: "现代化的税务执法系统，结合数字化追踪和更严格的审计，将隐性收入纳入税基，提高了税收征管效率。"
 GRE_bonds_issued_idea: "高利率短期债券"
 GRE_bonds_issued_idea_desc: "我们发行了利率较高的短期债券。目前的资金注入固然有所帮助，但高收益率在债务到期前将构成负担。"
 GRE_pyrkal_merge: "§Y希腊火药与弹药公司§!已经与§Y希腊军火工业§!合并"
 GRE_eas_materiel_manufacturer: "希腊防御体系"
 GRE_eas_branch_armoured_systems: "装甲系统"
 GRE_eas_branch_firepower_and_air_defense: "火力与防空"
 GRE_eas_manufacturer_trait: "希腊火药与弹药公司遗产"
 GRE_eas_mio_trait_armoured_systems: "装甲系统"
 GRE_eas_mio_trait_apc_ifv_systems: "机动性发展"
 GRE_eas_branch_pyrkal: "希腊火药与弹药公司专家"
