 cyber_sigint_surveillance_tracking: "Сигинтное наблюдение активно"
 cyber_sigint_surveillance_tracking_desc: "Наши группы радиотехнической разведки отслеживают коммуникации цели и сетевой трафик, ускоряя накопление разведданных намного выше обычной пассивной скорости. Операция продлится примерно 180 дней."
 cyber_radar_spoofing_tracking: "Активна радиолокационная подмена"
 cyber_radar_spoofing_tracking_desc: "Скоординированная полезная нагрузка радиоэлектронной борьбы подает ложные сигналы в сети воздушного обнаружения цели, ухудшая их ситуационную осведомленность. Операция завершится в течение 30 дней."
 cyber_election_interference_tracking: "Активное вмешательство в выборы"
 cyber_election_interference_tracking_desc: "Наши оперативники проводят скоординированную кампанию влияния, нацеленную на политическое информационное пространство объекта, распространяя дезинформацию и финансируя оппозиционные сети, чтобы подорвать доверие общественности к правительству. Операция продлится примерно 180 дней."
 cyber_industrial_espionage_tracking: "Активный промышленный шпионаж"
 cyber_industrial_espionage_tracking_desc: "Наши команды получили доступ к исследовательским сетям объекта и извлекают секретные технические и промышленные данные. Аналитики обрабатывают украденные материалы."
 cyber_comms_intercept_tracking: "Активный перехват сообщений"
 cyber_comms_intercept_tracking_desc: "Наши группы связи проникли в правительственные и дипломатические каналы связи объекта. Мы отслеживаем их трафик и извлекаем оперативную информацию в режиме реального времени."
 cyber_financial_system_attack_tracking: "Активная атака на финансовую систему"
 cyber_financial_system_attack_tracking_desc: "Наши оперативники развернули разрушительные полезные программы, нацеленные на центральный банк и инфраструктуру обработки платежей объекта, ограничивая их способность вести коммерцию и финансировать государственные операции. Операция продлится примерно 150 дней."
 cyber_logistics_disruption_tracking: "Активное нарушение военной логистики"
 cyber_logistics_disruption_tracking_desc: "Мы активно ухудшаем программное обеспечение военного командования и контроля цели и управления цепочками поставок, препятствуя их циклам пополнения запасов и усиления. Операция завершится в течение 90 дней."
 cyber_sleeper_network_tracking: "Активирована спящая сеть"
 cyber_sleeper_network_tracking_desc: "Мы установили постоянный, заранее определенный доступ к критически важным сетям объекта. Эта точка опоры позволяет выполнять более быстрые и дешевые операции в будущем до тех пор, пока она остается незамеченной — до одного года."
 cyber_deception_campaign_tracking: "Активная кампания стратегического обмана"
 cyber_deception_campaign_tracking_desc: "Ведется скоординированная многовекторная операция по вводу в заблуждение - используются поддельные сообщения, сфабрикованные утечки разведданных и тайные операции влияния для манипулирования процессом принятия решений целью на самых высоких уровнях. Кампания продлится примерно 180 дней."
 cyber_zero_day_strike_tracking: "Удар нулевого дня — последствия"
 cyber_zero_day_strike_tracking_desc: "Наш арсенал нулевого дня был задействован для нанесения точного разрушительного удара по наиболее важным системам цели. Операция завершена; срок действия этой записи истечет, когда спадет первоначальный хаос."
