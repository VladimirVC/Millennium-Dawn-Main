 CHI_TAI_intl_isolation_modifier: "International Isolation Index"
 CHI_TAI_intl_isolation_modifier_desc: "A dynamic measure of Taiwan's diplomatic isolation, scaling inversely with the number of UN member states that maintain formal diplomatic recognition. Fewer recognising states intensify penalties to trade opinion, foreign influence, and improve-relations cost with China; broader recognition conversely improves these relations and increases Taiwan's diplomatic leverage."
 CHI_recognition_embargo: "Recognition Embargo"
 CHI_recognition_embargo_desc: "China has imposed strict economic and diplomatic penalties on any nation maintaining formal diplomatic recognition of Taiwan. Trade costs with China have risen significantly, and access to Chinese markets is severely restricted."
 china_sar.038.t: "Beijing Proposes Cross-Strait Economic Cooperation"
 china_sar.038.d: "Beijing has extended a formal proposal to Taipei for a framework of cross-strait economic cooperation. Mainland officials frame it as a pragmatic, mutually beneficial arrangement that sidesteps the sovereignty question entirely. Taiwan's business groups are receptive, but the independence-leaning opposition warns of a slow slide into dependence on the mainland economy."
 china_sar.038.a: "Engage with the framework."
 china_sar.038.b: "Decline the overture."
 china_sar.039.t: "Beijing Offers to Expand Cross-Strait Trade"
 china_sar.039.d: "Building on the opening of economic dialogue, Beijing proposes a substantial expansion of cross-strait trade, lowering tariffs and easing restrictions on Taiwan's exports to the mainland. The offer echoes the Economic Cooperation Framework Agreement and dangles access to the vast mainland market. Critics in Taipei fear the concessions carry political strings."
 china_sar.039.a: "Expand trade with the mainland."
 china_sar.039.b: "Reject the trade expansion."
 china_sar.040.t: "Mainland Market Access for Taiwan's Firms"
 china_sar.040.d: "Beijing invites Taiwan's enterprises to operate on the mainland under preferential terms, offering office space, shared building rights and streamlined licensing. For Taiwan's export-driven economy the opportunity is considerable, but deeper commercial entanglement with the mainland remains politically sensitive in Taipei."
 china_sar.040.a: "Accept preferential market access."
 china_sar.040.b: "Keep our firms at arm's length."
 china_sar.041.t: "Cross-Strait Semiconductor Coordination"
 china_sar.041.d: "Beijing proposes coordination between the mainland and Taiwan's world-leading semiconductor industry, including joint fabrication facilities and shared research. Taiwan's chip sector is its greatest strategic asset and its strongest shield; sharing it with the mainland would be lucrative, but it would erode the very leverage that keeps Taipei's partners engaged."
 china_sar.041.a: "Coordinate on semiconductors."
 china_sar.041.b: "Protect our chip industry."
 china_sar.042.t: "Exchange of Business Delegations"
 china_sar.042.d: "Beijing invites reciprocal business delegations to tour industrial hubs on both sides of the strait, forging personal ties between mainland and Taiwan's executives. The visits are low-risk and commercially useful, though each one thickens the web of cross-strait economic interdependence."
 china_sar.042.a: "Exchange delegations."
 china_sar.042.b: "Decline the visits."
 china_sar.043.t: "Direct Cross-Strait Transport Links"
 china_sar.043.d: "Beijing proposes an expansion of direct transport links across the strait, building on the Three Links policy with new shipping routes, flights and infrastructure. Direct connections would cut costs for businesses and travellers alike, binding the two economies ever more closely together."
 china_sar.043.a: "Open direct transport links."
 china_sar.043.b: "Limit direct connections."
 china_sar.044.t: "Cross-Strait Investment Safeguards"
 china_sar.044.d: "Beijing offers a formal agreement guaranteeing legal protection for Taiwan's investment on the mainland, addressing long-standing concerns over property rights and arbitration. The safeguards would reassure cautious investors, but they also entrench a framework in which Taipei negotiates with Beijing as an economic partner."
 china_sar.044.a: "Sign the investment safeguards."
 china_sar.044.b: "Reject the agreement."
 china_sar.045.t: "Joint Cross-Strait Industrial Planning"
 china_sar.045.d: "Beijing proposes coordinated industrial planning across the strait, aligning supply chains, standards and major projects. Such integration would yield real efficiencies, but it would also fold Taiwan's economy into the mainland's long-term strategy, a prospect that alarms sovereignty-minded voters in Taipei."
 china_sar.045.a: "Align our industrial planning."
 china_sar.045.b: "Plan our economy independently."
 china_sar.046.t: "Deep Cross-Strait Economic Integration"
 china_sar.046.d: "Beijing proposes the final stage of cross-strait economic union: a deeply integrated market with harmonised regulation and the free movement of goods and capital. Proponents point to the prosperity it would bring; opponents warn that at this depth, economic union becomes difficult to distinguish from political absorption."
 china_sar.046.a: "Complete economic integration."
 china_sar.046.b: "Halt at the water's edge."
 china_sar.047.t: "Taipei Weighs the Reunification Accord"
 china_sar.047.d: "Beijing has tabled the final framework for peaceful reunification: Taiwan would rejoin the People's Republic as a Special Administrative Region, retaining its own administration, legal system, and economy under the one-country-two-systems model. After years of cross-strait détente the accord now rests before Taipei for ratification."
 china_sar.047.a: "Ratify the accord and reunify."
 china_sar.047.b: "The island is not ready for this."
 CHI_calm_hong_kong_protests: "Restore Order in Hong Kong"
 CHI_calm_hong_kong_protests_desc: "The protests sparked by our electoral reforms continue to disrupt the Special Administrative Region. With security forces on the ground and the situation stabilising, the central government can move to quietly wind down the unrest and restore normalcy to Hong Kong."
