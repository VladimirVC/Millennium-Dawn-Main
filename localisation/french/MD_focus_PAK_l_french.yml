l_french:
 pakistan_focus: "Arbre de focus Pakistan"
 PAK_one_pillar_state: "État à un seul pilier"
 PAK_one_pillar_state_desc: "L'État pakistanais est de facto dirigé par une seule institution : l'armée. Celle-ci domine la politique, la politique étrangère et gère la sécurité intérieure. Bien qu'un gouvernement civil existe en théorie, le véritable pouvoir est détenu par les généraux.\n§W--------------§!\nThis national spirit will be §RRemoved§! if §HThe Military§! internal faction is removed."