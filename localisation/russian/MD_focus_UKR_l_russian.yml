l_russian:
 ukraine_focus: "Дерево фокусов Украины"
 UKR_home_to_chernobyl_zone: "Дом Чернобыльской зоны отчуждения"
 UKR_chernobyl_tooltip: "Чернобыльская зона отчуждения была создана в северных областях этого государства после катастрофической ядерной аварии на Чернобыльской атомной электростанции. Зона занимает площадь около 2 600 квадратных километров в Украине и была эвакуирована и объявлена непригодной для проживания из-за высокого уровня радиоактивного загрязнения. С момента создания зона отчуждения находится под управлением украинского правительства, и в настоящее время ведётся работа по мониторингу и устранению последствий катастрофы для окружающей среды и здоровья населения."
 UKR_chernobyl_effects_tooltip: "§Rдальнейшая утечка радиации может нанести долгосрочный ущерб§!"
 UKR_found_the_uop: "Реформирование военно-промышленного комплекса"
 UKR_found_the_uop_desc: "Наша оборонная промышленность находится в плачевном состоянии, поэтому мы вынуждены начать глобальную реформу в этой сфере."
 UKR_ukrainian_armed_forces_reform: "Реформа вооружённых сил"
 UKR_ukrainian_armed_forces_reform_desc: "Наши вооружённые силы срочно нуждаются в реформе. Мы должны создать новые структуры и новые виды войск, а также решить давние проблемы нашей армии."
 UKR_srdsc: "Государственный научно-исследовательский и конструкторский центр судостроения"
 UKR_srdsc_desc: "Государственный научно-конструкторский центр судостроения - конструкторское бюро, специализирующееся на судостроении и расположенное в Николаеве, Украина. Входит в состав государственной корпорации Украинская оборонная промышленность."
 UKR_defend_our_sky: "Возрождение авиационной промышленности"
 UKR_defend_our_sky_desc: "Мы начнём возрождение нашей авиационной промышленности, которая находится в ужасном состоянии с момента распада СССР."
 UKR_cut_down_the_general_staff: "Сократить количество генералов"
 UKR_cut_down_the_general_staff_desc: "Слишком большое количество генералов негативно влияет на нашу армию. Пора это исправить."
 UKR_contract_army: "Реформа военного образования"
 UKR_contract_army_desc: "Мы реорганизуем старые военные вузы, а также создадим новые, чтобы повысить качество подготовки наших вооружённых сил."
 UKR_war_on_donbass_experience: "Наша армия"
 UKR_war_on_donbass_experience_desc: "Украинская армия — это буквально тень своей бывшей советской, а ныне российской, аналогии. Пора это изменить."
 UKR_support_uia: "МАУ"
 UKR_support_uia_desc: "МАУ или Международные авиалинии Украины - флагманская и крупнейшая авиакомпания, представленная в Украине. Главный хаб для её самолетов находится в киевском международном аэропорту Борисполь. Она выполняет пассажирские и грузовые рейсы в Европу, на Ближний Восток, в США, Канаду и Азию."
 UKR_build_new_airports: "Построить новые аэропорты"
 UKR_build_new_airports_desc: "Нашими аэропортами слишком долго пренебрегали. Нам необходимо инвестировать в наши аэропорты как для гражданских, так и для военных целей."
 UKR_invest_in_ministry_of_infrastructure: "Министерство инфраструктуры"
 UKR_invest_in_ministry_of_infrastructure_desc: "Министерство инфраструктуры подверглось критике. Инфраструктура Украины разрушается из-за того, что коррумпированные чиновники в министерстве разбазаривают средства. На некоторых дорогах люди не могут ездить из-за состояния дорог. Пришло время перекроить министерство в надежде на лучшее будущее для наших отраслей."
 UKR_roads_extend_plan: "Планы инвестиций в дороги"
 UKR_roads_extend_plan_desc: "Дороги в Украине не самые лучшие в мире. Некоторые регионы до сих пор пользуются грунтовыми или почти разрушенными дорогами. Настало время, чтобы эти регионы получили немного любви."
 UKR_ukrainian_railways: "УЗ"
 UKR_ukrainian_railways_desc: "«УЗ» — это название государственной компании, которая в настоящее время обладает огромной монополией на большую часть железнодорожных перевозок на территории Украины. Компания может похвастаться впечатляющей общей протяженностью путей, превышающей 23 000 км, что ставит её на 13-е место в мире по этому показателю.\n\nКроме того, она занимает 6-е место по объёмам пассажирских перевозок и 7-е — по объёмам грузовых перевозок."
 UKR_legacy_of_the_ukr_ind: "Украинская индустриализация"
 UKR_legacy_of_the_ukr_ind_desc: "Украина сильно зависит от своей промышленной базы для экономического роста. Крупные города — Киев, Львов и Запорожье — имеют развитую промышленность, которая в течение многих лет стимулировала их развитие. Мы должны сохранить эту тенденцию, иначе рискуем застопориться в развитии."
 UKR_ssau: "ГКА"
 UKR_ssau_desc: "Украинская космическая промышленность далека от мирового лидера в области космических технологий. Однако она является крупным производителем космических аппаратов и другой внеземной техники. Способность сохранять конкурентоспособность на этом последнем рубеже будет определять наше будущее в ближайшие годы."
 UKR_pivdenmash_udo: "Пивденмаш"
 UKR_pivdenmash_udo_desc: "Пивденмаш — главный производитель космических аппаратов в Украине. Компания известна производством ракет для таких зарубежных стран, как NASA. Было бы полезно развивать эту процветающую отрасль, чтобы продвигать Украину на мировой арене. Кстати, интересный факт: украинские ракеты составили 12% от всех космических запусков в 2006 году. Кто бы мог подумать!"
 UKR_national_steel_companies: "Рутенская сталь"
 UKR_national_steel_companies_desc: "Когда-то рутенская сталь была грозным продуктом, предназначенным для ведения войны. Теперь мы больше не сражаемся мечами и щитами. Однако наши танки, пушки и пули нуждаются в качественной стали, чтобы оставаться конкурентоспособными."
 UKR_naftogaz: "Нафтогаз"
 UKR_naftogaz_desc: "Нафтогаз - государственная компания по добыче нефти и природного газа. Она участвует в процессе добычи и переработки продукции. Компания часто используется для отстаивания нефтегазовой независимости от таких стран, как Россия или другие крупные экспортёры энергоресурсов."
 UKR_extend_ukrainian_refineries: "Фокус на возобновляемых источниках энергии"
 UKR_extend_ukrainian_refineries_desc: "Хотя у нас есть достаточный доступ к природному газу и другим запасам нефти, удовлетворение наших текущих энергетических потребностей за счёт других видов энергии поможет стабилизировать ситуацию во времена низкого производства ископаемого топлива."
 UKR_zalk: "Запорожские промышленные предприятия"
 UKR_zalk_desc: "Запорожье - важный промышленный центр Украины. Это столица Запорожской области, где расположен ЗАЗ, центр металлургии и крупный город-порт для отгрузки товаров из Донбасса."
 UKR_zaz: "ЗАЗ"
 UKR_zaz_desc: "ЗАЗ или Запорожский автомобилестроительный завод - основной производитель автомобилей в Украине. Как следует из названия, он базируется в городе Запорожье на юго-востоке Украины. Он также производит автобусы и грузовики и в основном известен по своей бывшей материнской компании АвтоЗАЗ."
 UKR_kraz: "КрАЗ"
 UKR_kraz_desc: "КрАЗ — частная компания в Кременчуге, Украина. Компания в основном производит грузовики и другие специальные автомобили. Однако их основная специализация — тяжелые внедорожные модели. Недавно она была зарегистрирована как холдинговая компания, и теперь ею владеет украинская корпорация «Финансы и кредит»."
 UKR_west_east_rivalry_balanced: "Между Востоком и Западом \n§LСегодняшний статус соперничества:§! §GСбалансированный§!\n"
 UKR_west_east_rivalry_balanced_desc: "Окончание холодной войны принесло Украине беспрецедентную степень независимости. Тем не менее наследие суверенитета сохранилось, что сделало политическую обстановку в стране более нестабильной. Россия продолжает оказывать влияние на Украину с востока, в то время как Европейский союз начал усиливать своё влияние на страну с запада. Внутри Украины возникли соперничающие политические фракции, каждая из которых лояльна тому или иному иностранному покровителю. \n\n§RИзменения во внутренней или внешней политике могут нарушить баланс сил между прозападным и провосточным лагерями!§! \n\n§C(Преобладание провосточного лагеря)§! \nПравительство сосредоточится на укреплении связей с Россией (включая интеграцию в ОДКБ и ЕАС), что вызовет недовольство среди националистических сил. \n\n§C(Преобладание прозападного лагеря)§! \nПравительство сосредоточится на интеграции с ЕС и НАТО, что, в свою очередь, вызовет недовольство среди противников в пророссийском лагере."
 UKR_west_strengthened: "Между Востоком и Западом \n§LСегодняшний статус соперничества:§! §GДвижение в сторону Запада§!\n"
 UKR_west_strengthened_desc: "Окончание холодной войны принесло Украине беспрецедентную степень независимости. Тем не менее наследие суверенитета сохранилось, что сделало политическую обстановку в стране более нестабильной. Россия продолжает оказывать влияние на Украину с востока, в то время как Европейский союз начал усиливать своё влияние на страну с запада. Внутри Украины возникли соперничающие политические фракции, каждая из которых лояльна тому или иному иностранному покровителю. \n\n§RИзменения во внутренней или внешней политике могут нарушить баланс сил между прозападным и провосточным лагерями!§! \n\n§C(Преобладание провосточного лагеря)§! \nПравительство сосредоточится на укреплении связей с Россией (включая интеграцию в ОДКБ и ЕАС), что вызовет недовольство среди националистических сил. \n\n§C(Преобладание прозападного лагеря)§! \nПравительство сосредоточится на интеграции с ЕС и НАТО, что, в свою очередь, вызовет недовольство среди противников в пророссийском лагере."
 UKR_west_dominant: "Между Востоком и Западом \n§LСегодняшний статус соперничества:§! §GПрозападный§!"
 UKR_west_dominant_desc: "Окончание холодной войны принесло Украине беспрецедентную степень независимости. Тем не менее наследие суверенитета сохранилось, что сделало политическую обстановку в стране более нестабильной. Россия продолжает оказывать влияние на Украину с востока, в то время как Европейский союз начал усиливать своё влияние на страну с запада. Внутри Украины возникли соперничающие политические фракции, каждая из которых лояльна тому или иному иностранному покровителю. \n\n§RИзменения во внутренней или внешней политике могут нарушить баланс сил между прозападным и провосточным лагерями!§! \n\n§C(Преобладание провосточного лагеря)§! \nПравительство сосредоточится на укреплении связей с Россией (включая интеграцию в ОДКБ и ЕАС), что вызовет недовольство среди националистических сил. \n\n§C(Преобладание прозападного лагеря)§! \nПравительство сосредоточится на интеграции с ЕС и НАТО, что, в свою очередь, вызовет недовольство среди противников в пророссийском лагере."
 UKR_east_strengthened: "Между Востоком и Западом \n§LСегодняшний статус соперничества:§! §GДвижение в сторону Востока§!\n"
 UKR_east_strengthened_desc: "Окончание холодной войны принесло Украине беспрецедентную степень независимости. Тем не менее наследие суверенитета сохранилось, что сделало политическую обстановку в стране более нестабильной. Россия продолжает оказывать влияние на Украину с востока, в то время как Европейский союз начал усиливать своё влияние на страну с запада. Внутри Украины возникли соперничающие политические фракции, каждая из которых лояльна тому или иному иностранному покровителю. \n\n§RИзменения во внутренней или внешней политике могут нарушить баланс сил между прозападным и провосточным лагерями!§! \n\n§C(Преобладание провосточного лагеря)§! \nПравительство сосредоточится на укреплении связей с Россией (включая интеграцию в ОДКБ и ЕАС), что вызовет недовольство среди националистических сил. \n\n§C(Преобладание прозападного лагеря)§! \nПравительство сосредоточится на интеграции с ЕС и НАТО, что, в свою очередь, вызовет недовольство среди противников в пророссийском лагере."
 UKR_east_dominant: "Между Востоком и Западом \n§LСегодняшний статус соперничества:§! §GПро-восточный§!"
 UKR_east_dominant_desc: "Окончание холодной войны принесло Украине беспрецедентную степень независимости. Тем не менее наследие суверенитета сохранилось, что сделало политическую обстановку в стране более нестабильной. Россия продолжает оказывать влияние на Украину с востока, в то время как Европейский союз начал усиливать своё влияние на страну с запада. Внутри Украины возникли соперничающие политические фракции, каждая из которых лояльна тому или иному иностранному покровителю. \n\n§RИзменения во внутренней или внешней политике могут нарушить баланс сил между прозападным и провосточным лагерями!§! \n\n§C(Преобладание провосточного лагеря)§! \nПравительство сосредоточится на укреплении связей с Россией (включая интеграцию в ОДКБ и ЕАС), что вызовет недовольство среди националистических сил. \n\n§C(Преобладание прозападного лагеря)§! \nПравительство сосредоточится на интеграции с ЕС и НАТО, что, в свою очередь, вызовет недовольство среди противников в пророссийском лагере."
 UKR_kleptocracy: "Клептократия"
 UKR_kleptocracy_desc: "Украинское правительство в настоящее время погрязло в клептократии. Высшие чины коррумпированы, и они используют свою власть для эксплуатации народа и природных ресурсов своей территории, чтобы увеличить свое богатство и политическую власть. \n\n§CЧтобы избавиться от негативного влияния клептократии, стране необходимо принять меры по борьбе с коррупцией.§!"
 UKR_to_many_generals: "Избыточный генштаб"
 UKR_to_many_generals_desc: "В вооруженных силах Украины 450 действующих генералов. Большинство из них получили свои посты благодаря связям и коррупционным схемам и не имеют опыта ведения боевых действий. Нынешний генштаб некомпетентен и отчаянно нуждается в реформе."
 UKR_idea_eu_member_associate: "Ассоциированный член ЕС"
 UKR_idea_eu_member_associate_desc: "Украина начала ассоциацию с ЕС. Это позволит углубить связи с Европой и западным блоком. Однако это создает проблемы с русскоязычными регионами."
 UKR_idea_government_in_need: "Неэффективное правительство"
 UKR_idea_pro_ukraine_reform_1: "Реформированное правительство"
 UKR_idea_shortened_general_staff: "Компактный генеральный штаб"
 UKR_every_man_ataman: "Каждый человек - атаман"
 UKR_foreign_advisors: "Иностранные советники"
 ukraine_coup.1.t: "Россия пыталась устроить нам переворот!"
 ukraine_coup.1.d: "Последние сообщения из Киева гласят, что поддерживаемые Россией агенты собирались совершить переворот в нашем правительстве! Это прямая угроза нашей независимости со стороны России."
 ukraine_coup.1.a: "Ублюдки."
 ukraine_coup.2.t: "Россия перевернет нас!"
 ukraine_coup.2.d: "Последние сообщения из Киева гласят, что поддерживаемые Россией агенты совершили переворот в нашем правительстве! Теперь нашей страной будет править пророссийская клика."
 ukraine_coup.2.a: "КАКОГО...?"
 ukraine_news.7.t: "Гражданская война в Украине"
 ukraine_news.7.d: "Жители Донбасса объявили себя независимыми. Они объявили жителям Донецкой и Луганской областей, что больше не будут подчиняться тирании Киева. [UKR.GetLeader] и украинская администрация осудила повстанцев и мобилизовала силы для их подавления. В регионе уже начались стычки между местными проукраинскими силами и повстанцами."
 ukraine_news.7.a: "Подавить восстание"
 ukraine_news.7.b: "Победите угнетателей!"
 ukraine_news.7.c: "Интересная ситуация"
 ukraine_news.8.t: "Аннексия Крыма"
 ukraine_news.8.d: "Крымчане провели референдум за выход из Украины и присоединение к России. Ответ России был быстрым и решительным: они быстро наводнили войска в регион и аннексировали полуостров. Ключевые военные позиции были быстро захвачены. Украинское правительство выразило свое возмущение по этому поводу и требует, чтобы Россия вернула им Крым."
 ukraine_news.8.a: "Только пока..."
 ukraine_news.8.b: "За Россию-матушку!"
 ukraine_news.8.c: "Тревожные новости."
 UKR_tro_brigades_ukraine_decision_category: "Силы территориальной обороны Украины"
 UKR_tro_brigades_ukraine_decision_category_desc: "Силы территориальной обороны Вооружённых Сил Украины — отдельный род войск Вооружённых Сил Украины, которому поручены организация, подготовка и выполнение задач территориальной обороны."
 UKR_tro_created_tt: "Вы сможете набирать бригады §Yтерриториальной обороны§!"
 UKR_reorganize_the_national_guard_ukraine_decision_category: "Национальная гвардия Украины"
 UKR_reorganize_the_national_guard_ukraine_decision_category_desc: "Национальная гвардия Украины — это воинское формирование, выполняющее правоохранительные функции, входящее в систему Министерства внутренних дел Украины (МВД) и предназначенное для выполнения задач по защите и охране жизни, прав, свобод и законных интересов граждан Украины, общества и государства от преступных и иных противоправных посягательств, охраны общественного порядка и обеспечения общественной безопасности.\n\nА также, в сотрудничестве с правоохранительными органами, обеспечивать государственную безопасность и защиту государственной границы, пресекать террористическую деятельность, деятельность незаконных военизированных или вооружённых формирований (групп), террористических организаций, организованных групп и преступных организаций."
 UKR_reorganize_the_national_guard_first_brigade: "§Y1-я бригада оперативного назначения§! Национальной гвардии Украины"
 UKR_reorganize_the_national_guard_second_brigade: "§Y25-я отдельная бригада§! охраны общественного порядка"
 UKR_reorganize_the_national_guard_third_brigade: "§Y4-я оперативная бригада§! Национальной гвардии Украины"
 UKR_reorganize_the_national_guard_four_brigade: "§Y23-я отдельная бригада§! охраны общественного порядка"
 UKR_natguard_created_tt: "Вы сможете набирать §Yбригады Национальный гвардии§!"
 UKR_uop_decision_category: "Государственный концерн \"Укроборонпром\""
 UKR_uop_decision_category_desc: "Государственный концерн \"Укроборонпром\" - объединение предприятий военно-промышленного комплекса Украины под государственным управлением. В состав концерна входят предприятия оборонно-промышленного комплекса, осуществляющие хозяйственную деятельность в сфере разработки, производства, реализации, ремонта, модернизации и утилизации вооружения, военной и специальной техники и боеприпасов, а также участвующие в военно-техническом сотрудничестве с иностранными государствами. На концерн возложены функции стратегического планирования, координации и повышения эффективности деятельности предприятий оборонно-промышленного комплекса, взаимодействия с органами государственной власти.\n\n\nСегодняшние дополнительные промышленные мощности, которые мы можем потратить на дополнительные самодельные транспортные средства: [?ukr_industry_points]"
