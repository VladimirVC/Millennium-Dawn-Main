 UKR_ter_oborona: "Создать территориальную оборону"
 UKR_ter_oborona_desc: "Нам нужно больше разных подразделений для защиты нашей родины. Мы начнем создание Украинской территориальной обороны, чтобы каждый регион был защищен."
 UKR_azov: "Создать батальон \"Азов\""
 UKR_azov_desc: "Давайте рискнем и позволим им вступить в ряды наших вооруженных сил."
 UKR_create_sso: "Создать Силы специальных операций Украины"
 UKR_create_sso_desc: "Новая военная структура поможет более эффективно бороться с нашими врагами."
 UKR_donbass: "Создать батальон \"Донбасс-Украина\""
 UKR_donbass_desc: "Еще одна команда, созданная из добровольцев, поступает к нам на службу."
 UKR_reform_mvd: "Реформа МВД"
 UKR_reform_mvd_desc: "Мы проведем глобальную реформу в Министерстве внутренних дел."
 UKR_found_the_national_police: "Патрульная служба милиции особого назначения"
 UKR_found_the_national_police_desc: "Патрульная служба полиции особого назначения Украины — служба в составе Департамента патрульной полиции Украины в составе Национальной полиции Украины, которая была создана в составе Министерства внутренних дел Украины как структура специальных подразделений по охране общественного порядка.\n\n Структура вошла в состав Национальной полиции Украины. Служба объединяет бывшие батальоны и полки Министерства внутренних дел."
 UKR_found_the_kord: "Спецподразделение КОРД"
 UKR_found_the_kord_desc: "Корпус оперативно-внезапного действия, или подразделение КОРД, - это подразделение специального назначения в составе Национальной полиции Украины. Он предназначен для разрешения чрезвычайных ситуаций, уровень которых настолько высок и сложен, что может превышать возможности сил быстрого реагирования или оперативно-розыскных подразделений."
 UKR_inter_legion: "Международный легион ТРО"
 UKR_inter_legion_desc: "Международный легион территориальной обороны Украины — это проект правительства Украины по привлечению иностранцев для создания добровольческих подразделений в рамках территориальной обороны Вооружённых сил Украины."
 UKR_kraken: "Спецподразделение \"Кракен\""
 UKR_kraken_desc: "Спецподразделение \"Кракен\" - украинское отдельное разведывательно-диверсионное подразделение Главного управления разведки Министерства обороны Украины."
 UKR_civil_war: "Война в Донбассе"
 UKR_ukraine_elections: "Выборы в Украине"
 UKR_ukraine_elections_desc: "Пришло время решить, кто будет руководить нашей страной дальше."
 donbass_civil_war: "В Донбассе началась гражданская война"
 UKR_republic_ukr: "Федеративная республика"
 UKR_republic_ukr_desc: "Федеративная республика представляет собой особый тип государственного образования, составляющего основу всей Украинской Федерации. Она обладает расширенной автономией, а также правом принимать собственные законы."
 UKR_confederation: "Федерализация"
 UKR_confederation_desc: "Несколько регионов получили максимально возможную автономию, что привело к созданию государства, похожего на систему Конфедерации."
 subject_ukr.1.t: "[FROM.GetNameWithFlag] запрашивает строительство фабрики"
 subject_ukr.1.d: "Правительство [FROM.GetNameWithFlag] просит построить завод на их территории, в связи с невозможностью сделать это самостоятельно."
 subject_ukr.1.a: "Хорошо"
 subject_ukr.1.b: "Нет"
 subject_ukr.2.t: "Строительство фабрики"
 subject_ukr.2.d: "[UKR.GetNameWithFlag] согласилась построить фабрику."
 subject_ukr.2.a: "Мило"
 subject_ukr.3.t: "Строительство фабрики"
 subject_ukr.3.d: "[UKR.GetNameWithFlag] отказалась строить фабрику."
 subject_ukr.3.a: "Печально"
 subject_ukr.4.t: "[FROM.GetNameWithFlag] просит субсидии"
 subject_ukr.4.d: "Правительство [FROM.GetNameWithFlag] запрашивает у нас субсидии для своего бюджета, готовы ли мы их выделить?"
 subject_ukr.4.a: "Да"
 subject_ukr.4.b: "Нет"
 subject_ukr.5.t: "Субсидии из федерального бюджета"
 subject_ukr.5.d: "[UKR.GetNameWithFlag] согласилась предоставить нам средства из федерального бюджета."
 subject_ukr.5.a: "Приятно"
 subject_ukr.6.t: "Субсидии из федерального бюджета"
 subject_ukr.6.d: "[UKR.GetNameWithFlag] отказала нам в выделении средств из федерального бюджета."
 subject_ukr.6.a: "Печально"
