 UKR_verkhovna_rada: "最高拉达"
 UKR_verkhovna_rada_desc: "\n\n\n\n\n\n£UKR_desctext_rada\n\n\n\n\n\n\n\n\n§H最高拉达§![UKR.GetFlag]是我们的国家议会，他们决定法律的颁布和废除，这意味着这些法律经常会违背我们自己的需要。§H最高拉达§! 可以随时处于以下三种状态之一。§C自由§!，这意味着我们对§H最高拉达§! 没有直接控制权；§C受影响§!，这意味着我们有一定的控制权；§C傀儡§!，这意味着我们拥有完全的控制权。\n\n如果我们拒绝他们提出的§H某些建议§!，或者我们的§H意识形态与他们的观点不一致§!，§H最高拉达§!可能会撤回对我们政府的支持。如果他们愿意，他们还可能随意撤回支持。\n\n我们获得的支持越多越好，因为这使我们更有可能在不采取额外措施的情况下通过法律。§H最高拉达§!将举行选举，选举结果将取决于外国的影响或我们自己的国内独立。\n\n当前有§G[?UKR_verkhovna_support]§!/§H450§!§H最高拉达§!席位支持我们的政府。\n"
 ukraine_nationalist_majority_name: "§H亲乌克兰多数派§!"
 UKR_right_wing_desc_TT: "议会中的§H亲乌克兰多数派§!意味着议会寻求与§C西方§!和§G俄罗斯§!保持更大距离。他们寻求在世界事务中建立一个更加独立和中立的§H乌克兰§!，并且通常反对在任何冲突中选边站。"
 ukraine_eastern_majority_name: "§G亲俄罗斯多数派§!"
 UKR_left_wing_desc_TT: "议会中的§G亲俄罗斯§!集团通常寻求与§G俄罗斯派§!政府建立更紧密的联系，希望与§C西方派§!保持距离。该派内部的激进化程度各不相同，一些人希望保持与§G亲俄派§!联系的独立§H乌克兰派§!，而另一些人则希望§H乌克兰派§!和§G俄罗斯派§!社群进一步融合。"
 ukraine_western_majority_name: "§B亲西方多数派§!"
 UKR_liberal_TT: "议会中的§B亲西方§!集团代表希望§H乌克兰§!放弃亲俄政策并与§C西方国家§!建立更紧密联系的政党和个人。与§C西方国家§!结盟的人的目标各不相同，有些人只是希望建立经济和文化联系，而其他人则希望加入§B北约§!联盟并保护§H乌克兰§!免受§G俄罗斯§!的影响。"
 ukraine_dissolved_majority_name: "§R最高拉达解散§!"
 UKR_verkhovna_dissolved_tt: "议会已解散，房间空无一人，没有代表出席。"
 ukraine_free_verkhovna: "§C最高拉达状态：自由§!"
 UKR_verkhovna_free_tt: "议会不受总统的影响，讨论和辩论自然进行，不受其他政府机构的干预。"
