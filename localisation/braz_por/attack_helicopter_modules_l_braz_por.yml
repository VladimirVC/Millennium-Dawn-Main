 helicopter_heavy_atgm_gen6_desc: "The sixth generation of ATGMs is characterised by further advancements in seeker technology, target discrimination, range, and engagement capabilities. Features include improved network-centric warfare integration, increased automation, and even more sophisticated counter-countermeasure capabilities."
 helicopter_heavy_atgm_gen7: "7th Generation Heavy ATGM"
 helicopter_heavy_atgm_gen7_desc: "A sétima geração de mísseis antitanque é caracterizada por avanços adicionais na tecnologia de busca, discriminação de alvos, alcance e capacidades de empenhamento. As características incluem uma melhor integração de guerra centrada em redes, maior automatização e capacidades de contramedidas ainda mais sofisticadas."
 helicopter_rocket_pod_gen6: "6th Generation Rocket Pods"
 helicopter_rocket_pod_gen6_desc: "Sistemas de foguetes de última geração equipados com processadores de bordo e guiamento autónomo. Cada munição pode identificar, seguir e priorizar alvos em tempo real com a mínima intervenção do piloto. Ideal para ataques de saturação contra formações inimigas dispersas e ativos móveis."
 helicopter_rocket_pod_gen7: "7th Generation Rocket Pods"
 helicopter_rocket_pod_gen7_desc: "Sistemas de foguetes de última geração equipados com processadores de bordo e guiamento autónomo. Cada munição pode identificar, seguir e priorizar alvos em tempo real com a mínima intervenção do piloto. Ideal para ataques de saturação contra formações inimigas dispersas e ativos móveis."
 helicopter_aa_missile_gen6: "6th Generation Air to Air Missiles"
 helicopter_aa_missile_gen6_desc: "A sexta geração de mísseis ar-ar montados em helicópteros apresenta sensores multiespectrais, perfis mais furtivos, maior agilidade, capacidades avançadas de ligação de dados e redes, bem como contramedidas e contracontramedidas melhoradas, bem como maior alcance e letalidade."
 helicopter_aa_missile_gen7: "7th Generation Air to Air Missiles"
 helicopter_aa_missile_gen7_desc: "A sétima geração de mísseis ar-ar montados em helicópteros apresenta sensores multiespectrais, perfis mais furtivos, maior agilidade, capacidades avançadas de ligação de dados e redes, bem como contramedidas e contracontramedidas melhoradas, bem como maior alcance e letalidade."
 helicopter_drones_gen4: "4th Generation Helicopter Drones"
 helicopter_drones_gen4_desc: "A quarta geração de drones embarcados em helicópteros de ataque apresenta avanços ainda mais transformadores devido ao rápido progresso tecnológico. Estes avanços centram-se numa maior autonomia, numa integração perfeita entre humanos e máquinas, numa fusão de sensores melhorada e em capacidades de missão mais versáteis."
 helicopter_drones_gen5: "5th Generation Helicopter Drones"
 helicopter_drones_gen5_desc: "A quinta geração de drones embarcados em helicópteros de ataque apresenta avanços ainda mais transformadores devido ao rápido progresso tecnológico. Estes avanços centram-se numa maior autonomia, numa integração perfeita entre humanos e máquinas, numa fusão de sensores melhorada e em capacidades de missão mais versáteis."
 em_lock_detection_system_gen4: "Digital EWS Network"
 em_lock_detection_system_gen4_desc: "Um conjunto de guerra eletrónica totalmente integrado com análise de radar em tempo real e bibliotecas de ameaças programáveis. Coordena o lançamento de chaff e flares com precisão temporal baseada no tipo e vetor da ameaça. Melhora significativamente a capacidade de sobrevivência contra os sistemas de mísseis multiespectrais modernos."
 em_lock_detection_system_gen5: "Digital EWS Network"
 em_lock_detection_system_gen5_desc: "Um conjunto de guerra eletrónica totalmente integrado com análise de radar em tempo real e bibliotecas de ameaças programáveis. Coordena o lançamento de chaff e flares com precisão temporal baseada no tipo e vetor da ameaça. Melhora significativamente a capacidade de sobrevivência contra os sistemas de mísseis multiespectrais modernos."
 helicopter_coaxial_engine_gen6: "6th Gen Coaxial Engine"
 helicopter_coaxial_engine_gen6_desc: "Uma aeronave de rotor coaxial é uma aeronave cujos rotores estão montados um acima do outro em eixos concêntricos, com o mesmo eixo de rotação, mas girando em sentidos opostos (contrarrotativos)."
 helicopter_coaxial_engine_gen7: "7th Gen Coaxial Engine"
 helicopter_coaxial_engine_gen7_desc: "Uma aeronave de rotor coaxial é uma aeronave cujos rotores estão montados um acima do outro em eixos concêntricos, com o mesmo eixo de rotação, mas girando em sentidos opostos (contrarrotativos)."
 helicopter_twin_engine_gen6: "6th Gen Twin Engine"
 helicopter_twin_engine_gen6_desc: "Um sistema bimotor, concebido para que ambos os motores acionem os rotores e façam a aeronave voar."
