 eu_gui_tooltip: "§C[EUU.GetFlag][EUU.GetName]§! Интерфейс"
 eu_gui_tooltip_delayed: "Открывает экран, содержащий всю информацию о §C[EUU.GetFlag][EUU.GetName]§!, включая Европейский парламент, должностных лиц Европейского Союза, Совет Европейского Союза и бюджет ЕС."
 fiscal_button_title: "Центр. банк"
 fiscal_button_desc: "The budget of §C[EUU.GetFlag][EUU.GetName]§!. The screen handles everything that includes the Multi-Annual Financial Framework and the Budget of the next fiscal year."
 euro_voting_button_title: "Совет"
 euro_voting_button_desc: "Совет Европейского Союза - является вторым законодательным органом §C[EUU.GetFlag][EUU.GetName]§! в Millennium Dawn. Совет Европейского Союза представляет государства-члены в законодательном процессе. Здесь отображаются все принятые законы, проекты законов и список голосующих членов §C[EUU.GetFlag][EUU.GetName]§!.\n\nСовет Европейского Союза работает по системе квалифицированного большинства (QMV), также известной как двойное большинство. Для принятия решения требуется 55% §Cгосударств-членов§! и 65% §Cнаселения ЕС§!."
 parliament_button_title: "Парламент"
 parliament_button_desc: "Европейский парламент является первым законодательным органом §C[EUU.GetFlag][EUU.GetName]§! в Millennium Dawn. В Европейском парламенте законы впервые выносятся на голосование, чтобы стать юридическими актами Европейского Союза.\n\nИгроку даётся 14 дней на выполнение миссии (см. решения) для того, чтобы собрать большинство поддержки среди депутатов Европейского парламента (MEPs). После того как закон принят, он передаётся в Совет Европейского Союза."
 EU_europeanism_screen_title: "Евро-Инфо"
 EU_europeanism_screen_desc: "The Euro-Info tab contains information about the European Union such as the member states, their population, the ratio of their pop, and the Europeanism values of the European Union."
 EU_offices_screen_title: "Должности"
 EU_offices_screen_desc: "Должности §C[EUU.GetFlag][EUU.GetName]§!. Должности §C[EUU.GetFlag][EUU.GetName]§! — это совокупность позиций, которые могут занимать государства-члены Европейского Союза."
