 REGIMENTAL_SUPPORT_HEADER: "Роты поддержки"
 DESIGNER_REGIMENTAL_SUPPORT_COLUMN_TITLE: "Батальонные роты поддержки. Эти подразделения поддержки и боевые части прикрепляются непосредственно на уровне батальона.\n\nБатальонные роты поддержки §Rвлияют§! на §Yмаксимальную скорость§! дивизии и §Rувеличивают§! §Yширину боевого фронта§!."
 DESIGNER_SUPPORT_COLUMN_TITLE: "Бригадные и дивизионные роты поддержки. Это вспомогательные подразделения, которые находятся за линией фронта и оказывают поддержку боевым частям.\n\nВы можете выбрать только §Rодну§! роту каждого типа.\n\nРоты поддержки §Rвлияют§! на §Yмаксимальную скорость§! дивизии и §Rувеличивают§! её §Yширину боевого фронта§!."
