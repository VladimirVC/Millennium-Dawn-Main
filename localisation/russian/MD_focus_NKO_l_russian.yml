 korea_russia.21.t: "Россия наняла наших работников"
 korea_russia.21.d: "Мы подписали соглашение с Россией о найме большого количества наших рабочих для помощи в строительных работах. Условия более чем выгодные для нас, потому что российская сторона платит щедрые зарплаты"
 korea_russia.21.a: "Отлично"
 korea_russia.22.t: "Военные учения с участием Северной Кореи"
 korea_russia.22.d: "Генеральный штаб Северной Кореи предлагает провести совместные учения наших вооружённых сил, чтобы продемонстрировать мощь наших армий и проверить взаимодействие наших вооружённых сил."
 korea_russia.22.a: "Это отличная идея"
 korea_russia.22.b: "Нет"
 korea_russia.23.t: "Военные учения с участием России"
 korea_russia.23.d: "Генеральный штаб России согласился провести совместные учения вооружённых сил наших стран."
 korea_russia.23.a: "Очень хорошо!"
 korea_russia.24.t: "Военные учения с участием России"
 korea_russia.24.d: "Генеральный штаб России отказался проводить совместные учения вооружённых сил наших стран."
 korea_russia.24.a: "Печально"
