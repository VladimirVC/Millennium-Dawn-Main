 CHI_SAR_MIO_share_tt: "All SAR puppet states gain access to China's military-industrial organisations."
 CHI_tai_pressure_economic_tt: "China leverages trade dependencies to press Washington to reduce support for Taiwan. The United States must decide how to respond."
 CHI_tai_pressure_diplomatic_tt: "China opens measured diplomatic channels to persuade Washington to distance itself from Taiwan."
 CHI_pressure_derecognize_TAI_tt: "China applies economic and diplomatic pressure. If the target does not withdraw recognition of Taiwan within the deadline, China will impose a trade embargo."
 TAI_reduced_us_support: "Diminished US Military Support"
 TAI_reduced_us_support_desc: "Following Chinese pressure on Washington, the United States has scaled back arms deliveries and military cooperation with Taiwan. The armed forces face reduced readiness and lower morale among units dependent on American equipment and doctrine."
 TAI_isolated_from_us: "Abandoned by Washington"
 TAI_isolated_from_us_desc: "The United States has formally withdrawn military and diplomatic support for Taiwan under sustained Chinese pressure. The armed forces are left without their principal security guarantor, severely undermining defence capacity and civilian confidence."
 CHI_TAI_shared_modifier: "Cross-Strait Relations"
 CHI_TAI_shared_modifier_desc: "A dynamic index of economic and political interdependence across the Taiwan Strait. Closer ties raise Stability and democratic drift while improving trade relations, factory efficiency, research speed, and construction output; estrangement instead fuels communist drift, internal political pressure, and naval raiding capacity."
 CHI_SAR_network_modifier: "One China System"
 CHI_SAR_network_modifier_desc: ""
 CHI_TAI_air_dominance: "Air Dominance over the Strait"
 CHI_TAI_air_dominance_desc: "PLA Air Force operations over the Taiwan Strait have established persistent aerial pressure on Taiwan's defences, degrading their ability to contest control of the airspace."
 CHI_TAI_naval_modernization_idea: "Naval Modernization"
 CHI_TAI_naval_modernization_idea_desc: "The PLA Navy's accelerated procurement programme has delivered a modern fleet capable of sustained operations in the Taiwan Strait."
 TAI_blockade_economic_crisis: "Blockade Economic Crisis"
 TAI_blockade_economic_crisis_desc: "The Chinese naval blockade has severed Taiwan's maritime trade routes, causing severe shortages of fuel, raw materials, and consumer goods. Industrial output has collapsed."
 TAI_self_sufficiency: "Self-Sufficiency Measures"
 TAI_self_sufficiency_desc: "Emergency measures to develop domestic production capacity and reduce dependence on imported goods have begun to take effect, partially offsetting the impact of the blockade."
 TAI_cyber_sabotage: "Cyber Sabotage"
 TAI_cyber_sabotage_desc: "A coordinated Chinese cyber operation has disrupted critical infrastructure, military communications, and financial systems across Taiwan."
 TAI_blockade_partial: "Maritime Disruption"
 TAI_blockade_partial_desc: "China's declared maritime security zone is disrupting commercial shipping and driving up insurance costs for vessels bound for Taiwan's ports."
 TAI_emergency_situation: "State of Emergency"
 TAI_emergency_situation_desc: "Taiwan has declared a state of emergency in response to the Chinese blockade. Conscription has been expanded and civil defence measures activated, but the economic toll is severe."
 CHI_TAI_tourism_ban: "Cross-Strait Tourism Freeze"
 CHI_TAI_tourism_ban_desc: "The PRC has suspended outbound group and individual tourism to Taiwan, cutting off the visitor flows that had built up since cross-strait travel was liberalised in 2008. In 2019 Beijing extended the ban to individual-visit permits, halting hundreds of thousands of annual travellers. The measure inflicts direct damage on Taiwan's hospitality, retail, and services sectors while signalling Beijing's willingness to use economic interdependence as a coercive tool."
 CHI_crossstrait_operations: "Cross-Strait Operations Readiness"
 CHI_crossstrait_operations_desc: "The PLA has achieved full operational readiness for combined amphibious and airborne operations across the Taiwan Strait."
 CHI_TAI_amphibious_mastery: "Amphibious Assault Doctrine"
 CHI_TAI_amphibious_mastery_desc: "PLA Marine Corps formations have achieved a high level of proficiency in combined arms amphibious operations through intensive training exercises in the Taiwan Strait."
 CHI_TAI_military_buildup_idea: "Cross-Strait Military Buildup"
 CHI_TAI_military_buildup_idea_desc: "The People's Liberation Army has concentrated substantial ground, naval, and air assets along the Fujian coast in preparation for a potential Taiwan Strait contingency."
 china_sar.027.t: "The Taiwan Question: Opening Moves"
 china_sar.027.d: "The State Council has authorised a sustained campaign to erode American support for Taiwan. Economic leverage, diplomatic isolation, and military signalling are all available instruments. The question is how hard to push, and how fast."
 china_sar.027.a: "Apply maximum economic pressure. We will make the cost of supporting Taiwan unbearable."
 china_sar.027.b: "Begin with measured diplomatic overtures. Patience yields better results than confrontation."
 china_sar.028.t: "Washington Weighs Its Options"
 china_sar.028.d: "Beijing's pressure campaign has landed in Washington at an awkward moment. The administration faces competing factions: hawks demanding a firm reaffirmation of the Taiwan commitment, and pragmatists worried about the economic consequences of antagonising China."
 china_sar.028.a: "Reaffirm our commitment to Taiwan. China's pressure only strengthens our resolve."
 china_sar.028.b: "Acknowledge China's concerns. We can find a formula that reduces tensions without abandoning Taiwan."
 china_sar.029.t: "Escalation: China Raises the Stakes"
 china_sar.029.d: "Washington's rejection has landed badly in Zhongnanhai. The leadership is under pressure to demonstrate that defiance carries costs. Two options are on the table: build a diplomatic coalition against American Taiwan policy, or signal military resolve through exercises in the strait."
 china_sar.029.a: "Build an international coalition. Diplomatic isolation is more sustainable than confrontation."
 china_sar.029.b: "Conduct Taiwan Strait exercises. Washington must understand the military dimension of our commitment."
 china_sar.030.t: "Washington Offers a Partial Concession"
 china_sar.030.d: "After internal debate, the administration has signalled a willingness to reduce, but not eliminate, arms sales to Taiwan. The offer is framed as a gesture toward stability. Beijing must decide whether to accept the partial gain or press for full withdrawal."
 china_sar.030.a: "Accept the concession. A partial gain is still a gain."
 china_sar.030.b: "Reject the offer. Full withdrawal of support is the only acceptable outcome."
 china_sar.031.t: "America at the Crossroads"
 china_sar.031.d: "China's sustained pressure campaign has forced a final decision in Washington. The intelligence community warns that further concessions risk emboldening Beijing across the entire Indo-Pacific. But the economic cost of confrontation is also real. The administration must choose."
 china_sar.031.a: "Withdraw formal support for Taiwan. The relationship with Beijing is too important to sacrifice."
 china_sar.031.b: "Reaffirm our commitment to Taiwan in full. We will not be bullied into abandonment."
 china_sar.032.t: "Washington Steps Back from Taiwan"
 china_sar.032.d: "In a quiet but momentous shift, the United States has signalled that it will no longer provide active military and diplomatic backing for Taiwan's separate status. The announcement is framed in bureaucratic language, but its strategic meaning is unmistakable: Taiwan stands alone."
 china_sar.032.a: "A historic achievement. The path to reunification is now open."
 china_sar.033.t: "Washington Reaffirms Its Commitment"
 china_sar.033.d: "The United States has rejected China's pressure campaign and publicly reaffirmed its commitment to Taiwan's security. The administration has announced a new arms package for Taipei and convened emergency consultations with Japan and Australia. Beijing's campaign has failed, and has hardened opposition in Washington."
 china_sar.033.a: "A setback, but not a defeat. We will reassess our approach."
 china_sar.001.t: "Proposal: Cross-Strait Services Trade Agreement"
 china_sar.001.d: "Beijing has put forward the Cross-Strait Services Trade Agreement, opening major service sectors on both sides to freer trade and investment. The proposal would grant mainland firms access to Taiwan's banking, healthcare, and retail sectors. Supporters argue it would deepen economic integration; critics warn it hands Beijing structural leverage over Taiwan's economy."
 china_sar.001.a: "Sign the agreement. Economic integration serves our long-term interests."
 china_sar.001.b: "Reject the agreement. The concessions are too deep and the oversight too weak."
 china_sar.002.t: "Cross-Strait Business Networks"
 china_sar.002.d: "Pro-Beijing business networks have expanded into Taiwan's financial and media sectors, backed by mainland capital and facilitated by a series of opaque investment agreements. The government must decide how to respond to a growing influence that blurs the line between commerce and politics."
 china_sar.002.a: "Welcome cross-strait exchanges. Economic ties are a foundation for stability."
 china_sar.002.b: "Monitor the networks, but do not restrict them. Overreaction would harm legitimate trade."
 china_sar.002.c: "Impose restrictions on mainland-linked investment in sensitive sectors."
 china_sar.003.t: "The 92 Consensus Question"
 china_sar.003.d: "Mainland China has formally proposed reviving the 1992 Consensus as the diplomatic basis for cross-strait talks. The formula is deliberately ambiguous: Beijing interprets it as a commitment to the goal of reunification under one China, while the KMT traditionally accepted it under the formula 'one China, respective interpretations.'. The DPP has long rejected it as a political trap. Taiwan must respond."
 china_sar.003.a: "Accept the consensus formula. 'One China, respective interpretations' preserves our position while opening a path to dialogue."
 china_sar.003.b: "Acknowledge the spirit of dialogue without endorsing the formula explicitly. We seek peace, not a political commitment."
 china_sar.003.c: "Reject the consensus. Any formula that implies acceptance of 'one China' undermines our sovereign status."
 china_sar.004.t: "Pro-Independence Forces Win in Taiwan"
 china_sar.004.d: "The pro-independence camp has secured a majority in Taiwan's elections. The incoming government has made clear it will not accept the 92 Consensus and intends to chart a more assertive course on Taiwan's international status. Cross-strait relations enter a period of cooling."
 china_sar.004.a: "A setback. We will reassess our approach to Taipei."
 china_sar.005.t: "Beijing's Interference Operations Exposed"
 china_sar.005.d: "Taiwan's National Security Bureau has uncovered evidence of PRC-linked operations to influence domestic politics, including media investment through proxies, funding of pro-engagement political figures, and cultivation of business networks used to channel political messaging. The findings have been leaked to the press and are generating public outrage."
 china_sar.005.a: "Expel the implicated cultural attachés and issue a formal protest. We will not tolerate foreign manipulation of our democracy."
 china_sar.006.t: "Taiwan Expels Chinese Officials"
 china_sar.006.d: "Taipei has formally expelled several cultural and commercial attachés following the exposure of Beijing's political influence operations. The move draws applause from Taiwan's democratic allies and a sharp public rebuke from the Ministry of Foreign Affairs in Beijing."
 china_sar.006.a: "Absorb the diplomatic cost. The operation's exposure sets our work back, but the broader strategy remains sound."
 china_sar.035.t: "Beijing's Cultural Outreach"
 china_sar.035.d: "China and Inner Mongolia have launched a coordinated cultural influence campaign inside Mongolia, promoting shared Mongolian heritage while steering public opinion toward closer integration. Beijing frames the effort as cultural exchange, but the implications are unmistakably political."
 china_sar.035.a: "We have no choice but to acknowledge this."
 china_sar.036.t: "A Union With Inner Mongolia?"
 china_sar.036.d: "An official delegation from Beijing and Hohhot has arrived in Ulaanbaatar with a formal proposal: Mongolia is invited to join the People's Republic as a Special Administrative Region under a one country, two systems framework. The offer comes with economic guarantees and promises of cultural autonomy, but also with the full weight of Chinese influence behind it."
 china_sar.036.a: "We accept the offer."
 china_sar.036.b: "Mongolia will remain independent."
 china_sar.037.t: "Mongolia Refuses Reunification"
 china_sar.037.d: "Ulaanbaatar has formally rejected the reunification proposal. The Mongolian government cites national sovereignty and public opposition, though diplomatic channels remain open. Beijing acknowledges the decision but makes clear that the offer stands."
 china_sar.037.a: "We will try again."
 china_sar.007.t: "Dangerous Approach over the Strait"
 china_sar.007.d: "A PLA fighter jet has conducted an aggressive intercept of a foreign military aircraft operating near the Taiwan Strait median line. The encounter, captured on cockpit camera, shows the Chinese pilot passing within metres of the target aircraft. International media is demanding a response."
 china_sar.007.a: "Deny involvement and de-escalate."
 china_sar.007.b: "Maintain official silence."
 china_sar.007.c: "Publicly defend the action as lawful enforcement."
 china_sar.008.t: "Naval Collision in the Taiwan Strait"
 china_sar.008.d: "A PLA Navy destroyer and a foreign warship have collided during a close encounter in the Taiwan Strait. Both vessels sustained damage. The incident has triggered an international outcry and places Beijing in a difficult position."
 china_sar.008.a: "Blame the other side for reckless navigation."
 china_sar.008.b: "Issue no statement and let the story fade."
 china_sar.008.c: "Offer private apologies through back-channels."
 china_sar.009.t: "Rocket Test: Regional Silence"
 china_sar.009.d: "The PLA Rocket Force's ballistic missile test over the Taiwan Strait has drawn a muted international response. Washington issued a pro forma statement of concern but took no concrete action. The lack of a meaningful American reaction sends a powerful signal across the region."
 china_sar.009.a: "Our resolve speaks louder than their silence."
 china_sar.010.t: "Rocket Test: American Pushback"
 china_sar.010.d: "The PLA Rocket Force's missile test near Taiwan has backfired spectacularly. Washington has ordered a carrier strike group into the strait and announced an emergency arms package for Taipei. International opinion has consolidated against Beijing."
 china_sar.010.a: "This setback will not deter us."
 china_sar.011.t: "Taiwan Stands Alone"
 china_sar.011.d: "Taiwan's formal diplomatic allies have been reduced to a handful of small states. Without meaningful international recognition, Taipei's claim to sovereignty rests on increasingly shaky ground. The isolation is both symbolic and practical."
 china_sar.011.a: "The net tightens around the renegade province."
 china_sar.012.t: "Congressional Arms Vote"
 china_sar.012.d: "The United States Congress is debating a major arms sale package to Taiwan. Our Washington lobby network has an opportunity to influence the vote, but intervention carries risks if our involvement is exposed."
 china_sar.012.a: "Activate the lobby network to block the sale."
 china_sar.012.b: "Issue economic threats through diplomatic channels."
 china_sar.012.c: "Let the process play out without interference."
 china_sar.013.t: "Business Council Advocates Detente"
 china_sar.013.d: "The US-China Business Council has published a report urging Washington to prioritise commercial stability over Taiwan security commitments. The report, shaped by our economic engagement efforts, has gained traction in policy circles."
 china_sar.013.a: "Noted."
 china_sar.014.t: "Election Interference Exposed"
 china_sar.014.d: "American intelligence agencies have publicly attributed a political influence operation to Chinese state actors. The scandal has triggered bipartisan outrage in Congress and a wave of punitive measures. Our strategic position with Washington has taken a severe blow."
 china_sar.014.a: "A costly miscalculation."
 china_sar.015.t: "Emergency Security Meeting"
 china_sar.015.d: "China's blockade simulation exercise in the Taiwan Strait has triggered an emergency session of the National Security Council. Military commanders and cabinet officials are debating the appropriate response to Beijing's escalating pressure."
 china_sar.015.a: "Increase military readiness along the coast."
 china_sar.015.b: "Appeal to the international community for support."
 china_sar.016.t: "State of Emergency"
 china_sar.016.d: "The partial blockade has persisted for two months, disrupting trade and creating shortages of fuel and critical materials. The government faces mounting pressure to declare a formal state of emergency and place the armed forces on full alert."
 china_sar.016.a: "Declare a state of emergency."
 china_sar.016.b: "Pursue a diplomatic resolution with Beijing."
 china_sar.017.t: "The Question of Capitulation"
 china_sar.017.d: "The full naval blockade has crippled our economy and severed our supply lines. With American support effectively withdrawn, voices within the government are quietly raising the possibility of opening negotiations with Beijing on their terms."
 china_sar.017.a: "We will never surrender. Fight on."
 china_sar.017.b: "Open negotiations with Beijing."
 china_sar.018.t: "Taiwan Opens Negotiations"
 china_sar.018.d: "Taipei has sent a delegation to Beijing with authority to discuss terms for reunification. The blockade, economic collapse, and withdrawal of American support have left the island with no viable alternative. A historic chapter is closing."
 china_sar.018.a: "Accept the reunification of the motherland."
 china_sar.019.t: "Taiwan Strait Crisis"
 china_sar.019.d: "Tensions in the Taiwan Strait have reached a critical threshold. Military forces on both sides are at maximum readiness and a single miscalculation could trigger open conflict. The Politburo Standing Committee convenes an emergency session to decide the next step."
 china_sar.019.a: "Step back from the brink. De-escalate."
 china_sar.019.b: "Push through. Issue a formal wargoal."
 china_sar.020.t: "Ultimatum from Beijing"
 china_sar.020.d: "Beijing has delivered a formal ultimatum demanding the acceptance of reunification under the People's Republic. Failure to comply will result in military action. The government must decide whether to resist or negotiate."
 china_sar.020.a: "Reject the ultimatum. Prepare for war."
 china_sar.020.b: "Accept the terms. The struggle is over."
 china_sar.021.t: "Taiwan Rejects Reunification"
 china_sar.021.d: "Taipei has formally rejected our ultimatum. The Taiwan's government has declared its intention to resist any attempt at forced reunification and is mobilizing its armed forces. The path to peaceful resolution is closed."
 china_sar.021.a: "So be it. Prepare for war."
 china_sar.022.t: "Taiwan Accepts Reunification"
 china_sar.022.d: "Taipei has accepted the terms of reunification. The Republic of China will be dissolved and its territory integrated into the People's Republic. Decades of cross-strait division are coming to an end."
 china_sar.022.a: "The motherland is whole once more."
 china_sar.023.t: "Chinese Diplomatic Pressure"
 china_sar.023.d: "Beijing has issued a formal demand that we withdraw our recognition of Taiwan. China is offering economic incentives for compliance and threatening sanctions for refusal. Our continued recognition of Taipei has become a costly diplomatic position."
 china_sar.023.a: "Comply. Withdraw recognition of Taiwan."
 china_sar.023.b: "Refuse. We stand by our commitments."
 china_sar.024.t: "Amphibious Exercise in the Strait"
 china_sar.024.d: "The PLA Marine Corps has conducted its largest amphibious landing exercise in the Taiwan Strait, simulating a beach assault on a fortified coastline. The exercise, broadcast on state media, sends an unmistakable signal to Taipei and Washington alike."
 china_sar.024.a: "The world has taken notice."
 china_sar.025.t: "Freedom of Navigation Confrontation"
 china_sar.025.d: "The United States Navy has sent a warship through our declared maritime security zone near Taiwan. The vessel is broadcasting its presence openly, daring the PLA Navy to respond. Our forces are tracking the American ship."
 china_sar.025.a: "Allow passage. Avoid a direct confrontation."
 china_sar.025.b: "Shadow and challenge the American vessel."
 china_sar.026.t: "Shift in US Leadership"
 china_sar.026.d: "A change in the American presidency has altered the political landscape for our Taiwan strategy. The new administration's stance on cross-strait relations will affect the level of US support for Taipei."
 china_sar.026.a: "Adjust our strategy accordingly."
 USA_taiwan_defense_category: "Taiwan Defense"
 CHI_TAI_amphibious_exercise: "Amphibious Exercise in the Strait"
 CHI_TAI_amphibious_exercise_desc: "Order a large-scale amphibious landing exercise in the Taiwan Strait to demonstrate military capability and pressure Taipei."
 CHI_TAI_adiz_incursion: "ADIZ Incursion"
 CHI_TAI_adiz_incursion_desc: "Send PLA Air Force fighters into Taiwan's air defence identification zone to test response times and erode Taipei's confidence."
 CHI_TAI_rocket_test: "Ballistic Missile Test"
 CHI_TAI_rocket_test_desc: "Conduct a ballistic missile test over the Taiwan Strait. The response depends on the current level of American commitment to Taiwan's defence."
 CHI_TAI_grey_zone_ops: "Grey Zone Operations"
 CHI_TAI_grey_zone_ops_desc: "Conduct low-level provocations including coast guard incursions, fishing fleet deployments, and electronic warfare probes near Taiwan's waters."
 CHI_TAI_blockade_simulation: "Blockade Simulation Exercise"
 CHI_TAI_blockade_simulation_desc: "Stage a large-scale naval exercise simulating a full blockade of Taiwan, testing logistics and demonstrating capability to cut the island's supply lines."
 CHI_TAI_cyberattack: "Cyberattack on Taiwan"
 CHI_TAI_cyberattack_desc: "Launch a coordinated cyber operation targeting Taiwan's power grid, financial systems, and military communications."
 CHI_TAI_shadow_carrier: "Shadow US Carrier Group"
 CHI_TAI_shadow_carrier_desc: "Deploy submarines and surface combatants to shadow the American carrier strike group operating near the Taiwan Strait."
 CHI_TAI_intercept_aircraft: "Intercept US Reconnaissance"
 CHI_TAI_intercept_aircraft_desc: "Scramble fighters to intercept and aggressively shadow American reconnaissance aircraft operating near the strait."
 CHI_TAI_un_protest: "UN Protest Against Arms Sales"
 CHI_TAI_un_protest_desc: "File a formal protest at the United Nations against American arms sales to Taiwan, generating international pressure on Washington."
 CHI_TAI_maritime_zone: "Declare Maritime Security Zone"
 CHI_TAI_maritime_zone_desc: "Declare a maritime security zone around key approaches to Taiwan, establishing a legal pretext for intercepting and inspecting commercial shipping."
 CHI_TAI_partial_blockade: "Partial Naval Blockade"
 CHI_TAI_partial_blockade_desc: "Escalate the maritime security zone into a partial naval blockade, restricting fuel and raw material shipments to Taiwan."
 CHI_TAI_full_blockade: "Full Naval Blockade"
 CHI_TAI_full_blockade_desc: "Impose a complete naval blockade around Taiwan, cutting all maritime commerce and supply lines to the island."
 CHI_TAI_influence_us_election: "Influence US Elections"
 CHI_TAI_influence_us_election_desc: "Deploy covert political influence operations in the United States to boost candidates sympathetic to Beijing's position on Taiwan."
 CHI_TAI_support_houthis: "Support Houthi Operations"
 CHI_TAI_support_houthis_desc: "Provide covert material support to Houthi forces in Yemen, creating a security crisis that diverts American military resources away from the Pacific."
 CHI_TAI_arm_iran: "Covert Arms to Iran"
 CHI_TAI_arm_iran_desc: "Channel advanced military technology to Iran through intermediaries, increasing pressure on American forces in the Middle East."
 CHI_TAI_scs_provocations: "South China Sea Provocations"
 CHI_TAI_scs_provocations_desc: "Assert Chinese sovereignty over disputed features in the South China Sea through island militarization, coast guard harassment of rival claimants, and expanded air defense zones. These actions force the United States to divert naval assets to reassure ASEAN partners."
 CHI_TAI_nk_provocations: "Encourage North Korean Provocations"
 CHI_TAI_nk_provocations_desc: "Signal to Pyongyang that missile tests and military provocations on the Korean Peninsula will be tolerated, forcing the United States to redeploy forces from the Taiwan theatre."
 CHI_TAI_middleeast_diversion: "Middle East Strategic Engagement"
 CHI_TAI_middleeast_diversion_desc: "Deepen military and economic partnerships across the Middle East to increase regional dependency on Beijing while drawing American attention away from the Indo-Pacific theatre."
 CHI_TAI_support_russia: "Support Russian Operations"
 CHI_TAI_support_russia_desc: "Provide economic and logistical support to Russia's military operations, prolonging a conflict that drains American attention and resources."
 CHI_TAI_strait_naval_exercise: "Taiwan Strait Naval Exercise"
 CHI_TAI_strait_naval_exercise_desc: "Conduct a large-scale naval exercise in the Taiwan Strait, practising amphibious assault operations and anti-access warfare. The exercise will improve naval readiness but provoke international condemnation."
 CHI_TAI_fund_us_opposition: "Fund Pro-China US Advocacy"
 CHI_TAI_fund_us_opposition_desc: "Channel resources through intermediaries to support American political groups, think tanks, and media outlets sympathetic to Beijing's position on Taiwan. Discovery would provoke a severe backlash."
 CHI_TAI_exploit_us_commitments: "Exploit US Military Overstretch"
 CHI_TAI_exploit_us_commitments_desc: "While the United States is engaged in military operations abroad, intensify diplomatic and military pressure on Taiwan. American forces are stretched thin and cannot credibly reinforce the Pacific."
 USA_TAI_send_carrier: "Deploy Carrier to Taiwan Strait"
 USA_TAI_send_carrier_desc: "Order a carrier strike group to transit the Taiwan Strait in a show of force, signalling American commitment to regional stability."
 USA_TAI_recon_flight: "Reconnaissance Flight over Strait"
 USA_TAI_recon_flight_desc: "Dispatch surveillance aircraft to monitor PLA activity in the Taiwan Strait following Chinese ADIZ incursions."
 USA_TAI_arm_taiwan: "Emergency Arms Package for Taiwan"
 USA_TAI_arm_taiwan_desc: "Approve an emergency arms sale package for Taiwan's military in response to China's escalating blockade preparations."
 USA_TAI_fon_operation: "Freedom of Navigation Operation"
 USA_TAI_fon_operation_desc: "Send a warship through China's declared maritime security zone to assert freedom of navigation and challenge Beijing's claims."
 USA_TAI_rimpac_exercise: "RIMPAC Naval Exercise"
 USA_TAI_rimpac_exercise_desc: "Invite Taiwan to participate in the annual Rim of the Pacific naval exercise, the world's largest international maritime warfare drill, signalling American commitment to regional partners."
 CHI_SAR_decisions_category: "One China Strategy"
 CHI_SAR_decisions_category_desc: "\n£MAIN_desctext_sco \n\n\n\n§YThe One China Strategy§! represents Beijing's policy of consolidating all claimed territories under a single Chinese state. Through a combination of political pressure, economic development, and administrative control, regions are gradually brought into alignment with the central government.\n\nThis process can follow different paths. Increasing §Ysinicization§! strengthens direct control and integration, while more autonomous arrangements prioritise local stability and economic potential at the cost of central authority.\n\nThe balance between these approaches will determine the long-term unity of the state, while the question of §YTaiwan§! remains shaped by international recognition, foreign support, and cross-strait tensions.\n\n§YSpecial Administrative Regions of China§!\n$HKG_sinicization$\n$ETK_sinicization$\n$MAC_sinicization$\n$OMG_sinicization$\n\n$CHI_TAI_trust$\n$CHI_taiwan_us_support$\n$CHI_taiwan_strait_tension$\n$CHI_taiwan_recognition_count$\n$uighur_threat_display$"
 CHI_pressure_derecognize_TAI: "Pressure [From.GetName] to Withdraw Taiwan Recognition"
 CHI_pressure_derecognize_TAI_desc: "Beijing is conducting a sustained diplomatic campaign to reduce international recognition of Taiwan. [From.GetName] currently maintains formal ties with Taipei. A combination of economic incentives and sanctions threats may be sufficient to induce a change of position."
 CHI_establish_education_centres: "Establish Vocational Skills Education Centres in Xinjiang"
 CHI_establish_education_centres_desc: ""
 CHI_MON_reunification_retry: "Repeat the Reunification Offer"
 CHI_MON_reunification_retry_desc: "Mongolia rejected our previous proposal. We can approach Ulaanbaatar again once diplomatic conditions have been allowed to settle."
 CHI_han_settlement_small: "Small Han Resettlement Programme"
 CHI_han_settlement_small_desc: "A modest state-sponsored programme relocates Han families from densely populated inland provinces to new townships in Nei Mongol, supported by employment incentives and land allocation schemes."
 CHI_han_settlement_medium: "Medium Han Resettlement Programme"
 CHI_han_settlement_medium_desc: "A larger organised resettlement effort moves tens of thousands of Han workers and their families into Nei Mongol. New industrial zones and agricultural parcels are designated to absorb the incoming population."
 CHI_han_settlement_large: "Mass Han Resettlement Programme"
 CHI_han_settlement_large_desc: "A large-scale demographic engineering campaign transfers hundreds of thousands of Han settlers into Nei Mongol in a single coordinated wave. The long-term impact on the region's ethnic composition is substantial, though local resistance rises sharply in the near term."
 CHI_TAI_media_infiltration: "Media Network Infiltration"
 CHI_TAI_media_infiltration_desc: "Fund and expand pro-Beijing media ownership and editorial influence networks within Taiwan. Cultivate a friendlier information environment for cross-strait engagement."
 CHI_TAI_business_council_funding: "Cross-Strait Business Council Funding"
 CHI_TAI_business_council_funding_desc: "Provide financial backing to KMT-aligned business associations and cross-strait chambers of commerce. Strengthen the pro-engagement constituency within Taiwan's economic elite."
 CHI_TAI_cultural_exchange_program: "Cross-Strait Cultural Exchange Programme"
 CHI_TAI_cultural_exchange_program_desc: "Sponsor academic exchanges, cultural festivals, and youth dialogue programmes across the strait. Build people-to-people ties that soften political resistance to closer relations."
 CHI_TAI_cross_strait_infrastructure_investment: "Cross-Strait Infrastructure Investment"
 CHI_TAI_cross_strait_infrastructure_investment_desc: "Channel mainland capital into infrastructure projects on Taiwan, positioning Chinese investment as a source of economic opportunity and deepening material interdependence between the two economies."
 CHI_45g_national_deployment_idea: "5G National Deployment Initiative"
 CHI_45g_national_deployment_idea_desc: "Accelerated deployment of 5G network infrastructure across the country, with state coordination of capital investment in base stations, core network equipment, and spectrum allocation. The initiative prioritizes coverage in strategic industries and critical infrastructure."
 CHI_avic_innovation_idea: "AVIC Aircraft Development"
 CHI_avic_innovation_idea_desc: "The Aviation Industry Corporation of China drives indigenous aircraft design and production capabilities, advancing fighter and transport aircraft programmes free from reliance on foreign technology and licensing."
 CHI_big_fund_phase_1_idea: "National Semiconductor Industry Fund"
 CHI_big_fund_phase_1_idea_desc: "China's strategic response to semiconductor self-sufficiency, the Big Fund mobilises state capital to develop indigenous fabrication capacity, design capabilities, and equipment manufacturing. The initiative emphasises reducing dependence on foreign foundries and EDA tools."
 CHI_caic_innovation_idea: "CAIC Attack Helicopter Development"
 CHI_caic_innovation_idea_desc: "China's aerospace conglomerate advances attack helicopter technology through the development and production of indigenous rotorcraft platforms designed for rapid deployment and sustained operations."
 CHI_casc_innovation_idea: "CASC Space and Satellite Programs"
 CHI_casc_innovation_idea_desc: "China Aerospace Science and Technology Corporation expands space launch, satellite communications, and earth observation capabilities, cementing China's role as a major space power independent of foreign access restrictions."
 CHI_casic_innovation_idea: "CASIC Missile and Countermeasure Development"
 CHI_casic_innovation_idea_desc: "China Aerospace Science and Industry Corporation advances cruise missile, ballistic missile, and air defence systems through sustained R&D in propulsion, guidance, and electronic warfare."
 CHI_cetc_innovation_idea: "CETC Computing and AI Development"
 CHI_cetc_innovation_idea_desc: "China Electronics Technology Group invests in high-performance computing, semiconductor design, and artificial intelligence platforms to reduce technological dependence and accelerate domestic innovation in critical enabling technologies."
 CHI_crrc_innovation_idea: "CRRC Industrial Manufacturing"
 CHI_crrc_innovation_idea_desc: "China's rail and transit manufacturer diversifies into broader industrial sectors, leveraging decades of supply-chain expertise in metallurgy, precision manufacturing, and systems integration."
 CHI_csgc_innovation_idea: "CSGC AFV Development"
 CHI_csgc_innovation_idea_desc: "China's state-owned armoured vehicle manufacturer develops next-generation platforms in tanks, infantry fighting vehicles, and support vehicles, integrating advanced armour, firepower, and mobility."
 CHI_csic_innovation_idea: "CSIC Submarine Development"
 CHI_csic_innovation_idea_desc: "China State Shipbuilding Industrial Corporation advances submarine design and production, with emphasis on hull materials, quieting, and advanced sensor systems for extended underwater operations."
 CHI_cssc_innovation_idea: "CSSC Surface Warship Development"
 CHI_cssc_innovation_idea_desc: "China's primary shipbuilder focuses on advanced destroyer, frigate, and corvette designs with integrated combat systems, extending China's blue-water capabilities across strategic sea lanes."
 CHI_failed_five_year_plan: "Failed Five-Year Plan"
 CHI_failed_five_year_plan_desc: "Disappointing results from the latest five-year planning cycle have forced a reassessment of priorities and resource allocation. Public confidence in long-term development targets has suffered, requiring immediate policy corrections."
 CHI_haig_innovation_idea: "Harbin Aircraft Industry Group Development"
 CHI_haig_innovation_idea_desc: "Harbin's aviation sector expands rotorcraft capabilities, developing transport helicopters and attack platforms that reduce dependence on foreign designs and licenses."
 CHI_inner_mongolia_innovation_idea: "Inner Mongolia Armor Development"
 CHI_inner_mongolia_innovation_idea_desc: "Inner Mongolia's integrated armor production base advances main battle tank and armoured vehicle development, drawing on centuries of metallurgical expertise and modern manufacturing techniques."
 CHI_jap_strategic_isolation: "Japanese Strategic Isolation"
 CHI_jap_strategic_isolation_desc: "Our economic leverage and regional diplomatic positioning increasingly marginalise Japan's strategic influence in East Asia. Tokyo faces consumer goods inflation, reduced export markets, and the psychological weight of strategic irrelevance."
 CHI_kor_g2_economic_platform: "China-Korea G2 Economic Framework"
 CHI_kor_g2_economic_platform_desc: "Establishment of bilateral economic coordination mechanisms between China and Korea, covering trade policy, investment flows, and technology partnerships. The arrangement positions both nations as co-managers of East Asian prosperity."
 CHI_kor_trilateral_opening: "Trilateral Korea Opening"
 CHI_kor_trilateral_opening_desc: "Diplomatic opening to North Korea through high-level consultations and limited economic engagement, signalling China's willingness to broker dialogue and provide material support for controlled reform."
 CHI_made_in_china_2025_idea: "Made in China 2025"
 CHI_made_in_china_2025_idea_desc: "A decade-long industrial policy initiative targeting high-tech manufacturing in semiconductors, advanced composites, robotics, and rail transit. The programme aims to shift China from the world's factory to the world's innovator."
 CHI_nko_final_transition: "Final Transition of North Korea"
 CHI_nko_final_transition_desc: "The final stage of North Korea's transformation represents the culmination of Chinese influence and alignment. Pyongyang becomes functionally integrated into the Chinese sphere with minimal nominal independence."
 CHI_nko_managed_reform_pilot: "Managed Reform Pilot in North Korea"
 CHI_nko_managed_reform_pilot_desc: "China sponsors limited economic liberalisation in North Korea through Special Economic Zones and controlled market mechanisms. The pilot tests whether Pyongyang can reform without destabilising regime control."
 CHI_norinco_innovation_idea: "NORINCO Weapons Development"
 CHI_norinco_innovation_idea_desc: "China North Industries Corporation accelerates infantry weapon modernisation, artillery systems, and light armour platforms. NORINCO's export portfolio expands to militaries with limited access to Western suppliers."
 CHI_phi_abandonment_doctrine: "Philippine Abandonment Doctrine"
 CHI_phi_abandonment_doctrine_desc: "Deliberate cultivation of Philippine economic dependence and diplomatic estrangement from its traditional security partner, leaving Manila isolated and vulnerable to pressure from China."
 CHI_poly_innovation_idea: "Poly Technologies Military Industrial Development"
 CHI_poly_innovation_idea_desc: "Polytech's diversified military-industrial portfolio expands into emerging defence sectors, leveraging state backing and access to research institutions across the defence apparatus."
 CHI_sac_innovation_idea: "SAC Fighter Aircraft Development"
 CHI_sac_innovation_idea_desc: "Shenyang Aircraft Corporation advances fighter jet design and production, developing indigenous platforms that reduce reliance on Russian engines and AESA radar technology."
 CHI_shadow_banking_cleanup_idea: "Shadow Banking Sector Cleanup"
 CHI_shadow_banking_cleanup_idea_desc: "Regulatory crackdown on unregulated trust products, peer-to-peer lending, and off-balance-sheet financing removes systemic risks from the financial system. Short-term credit contraction is offset by improved regulatory confidence."
 CHI_south_china_sea_dominance_window: "South China Sea Dominance Window"
 CHI_south_china_sea_dominance_window_desc: "A strategic window has opened for consolidating control over the South China Sea through naval presence, civilian fishing fleet expansion, and construction of military facilities on reclaimed islands. The window may close if regional powers coordinate to contest Chinese expansion."
 CHI_ztz99_rollout_idea: "Type 99 Main Battle Tank Rollout"
 CHI_ztz99_rollout_idea_desc: "Full-scale production and deployment of the Type 99 main battle tank across the PLA Ground Force, providing improved armour, firepower, and mobility compared to earlier platforms."
 ETK_security_reinforcement_idea: "Security Force Reinforcement"
 ETK_security_reinforcement_idea_desc: "Expansion of security forces and hardening of infrastructure against terror attacks, with modest economic cost offset by reduced civil liberties and increased surveillance."
 ETK_surveillance_state_idea: "Surveillance State Measures"
 ETK_surveillance_state_idea_desc: "Comprehensive expansion of surveillance systems, checkpoint networks, and intelligence gathering throughout society. Economic efficiency gains from improved social control are offset by reduced innovation and lower citizen engagement."
 ETK_terrorism_aftermath: "Terrorism Aftermath"
 ETK_terrorism_aftermath_desc: "Lingering security concerns and social trauma from recent terror attacks continue to disrupt economic activity and public confidence. Recovery requires time and effective security restoration."
 TAI_civil_defense_readiness: "Civil Defence Readiness"
 TAI_civil_defense_readiness_desc: "Mobilisation of the population for air defence duties, with training in sheltering, casualty care, and damage control. Defence against airborne threats improves at the cost of reduced quality of life and economic disruption."
 CHI_bri_pacific_engagement_tt: "$CHI_bri_pacific_engagement$: $RIGHT|+=1$"
 CHI_the_hainan_response: "The Hainan Response"
 CHI_space_events_lunar_satellite: "Lunar Satellite Programme"
 CHI_space_events_lunar_rocketry: "Lunar Rocketry Programme"
 CHI_Asset_Seizure_tt: "§YSeized asset:§! §G+25§! treasury, §G+3§! $CHI_bri_global_presence$"
 chi_bri.16.a: "We will manage the consequences"
 chi_bri.16.d: "The finance ministry has confirmed what the accounts already showed: we cannot meet this month's payment on our Belt and Road obligations. Beijing will be informed within days. Until the arrears are settled, our creditor is entitled to act, and the options open to it are not all gentle."
 chi_bri.16.t: "Belt and Road Repayment Missed"
 chi_bri.17.a: "Sign the concession"
 chi_bri.17.b: "The deposits are not for sale"
 chi_bri.17.d: "A Chinese delegation has arrived with a proposal that is not really a proposal. In exchange for cancelling our defaulted Belt and Road debt, Beijing wants long-term extraction and export rights over our mineral deposits. The debt would vanish from the books. So, in large part, would control of the ground beneath our feet."
 chi_bri.17.t: "Beijing Demands Resource Rights"
 chi_bri.18.a: "Other instruments remain"
 chi_bri.18.d: "[FROM.GetName] has rejected our resource concession terms outright. Their debt stands, their default stands, and our delegation has returned to Beijing with nothing. The question now is whether to wait, or to collect what we are owed by other means."
 chi_bri.18.t: "[FROM.GetName] Refuses Our Terms"
 chi_bri.19.a: "Weigh our options"
 chi_bri.19.d: "[FROM.GetName] has missed payment on its Belt and Road obligations. The sum is not large by the standards of the initiative, but the precedent matters: every other borrower is watching how Beijing responds. We may restructure the debt, demand resource rights, or seize what we financed."
 chi_bri.19.t: "[FROM.GetName] Defaults on Belt and Road Debt"
 chi_bri.23.a: "Construction is what matters"
 chi_bri.23.d: "Our treasury could not cover our share of the §Y[GetBRIProjectName]§!, so Beijing has extended credit to close the gap. Construction proceeds either way. The debt is now on our books, it accrues interest, and if we cannot service it the terms give China considerable latitude."
 chi_bri.23.t: "Belt and Road Project Financed on Credit"
 CHI_BRI_automation_disable_tt: "Belt and Road applications must be §Yreviewed individually§!"
 CHI_BRI_automation_enable_tt: "Belt and Road applications are §Gaccepted automatically§!"
 CHI_bri_buy_back_concession: "Buy Back the Concession"
 CHI_bri_buy_back_concession_desc: "Purchase our way out of the extraction and export rights signed over to Chinese firms. Expensive, and Beijing will not take the loss gracefully, but it returns the deposits to national control."
 CHI_bri_can_host_energy: "We control a state with an industrial complex to power"
 CHI_bri_can_host_mine: "We control a state with worthwhile mineral deposits"
 CHI_bri_can_host_pipeline: "We control a state with worthwhile oil, steel or chromium deposits"
 CHI_bri_can_host_port: "We control a coastal state that could host the port"
 CHI_bri_can_host_prestige: "We control our capital"
 CHI_bri_can_host_rail: "We control a state bordering Chinese-controlled territory"
 CHI_bri_can_host_sez: "We control a coastal or well-connected state that could host the zone"
 CHI_bri_can_host_telecom: "We control a state that could host the network"
 CHI_bri_can_request: "China is accepting Belt and Road applications and has a free project slot"
 CHI_bri_clear_loan_tt: "Their outstanding Belt and Road debt is §Gwritten off§!"
 CHI_bri_has_reclaimable_structure: "They hold a Belt and Road project we could take"
 CHI_bri_monthly_income_base: "BRI Base Monthly Contribution"
 CHI_bri_monthly_income_base_desc: "The share of the state budget committed to the Belt and Road fund each month by focuses and decisions, before departmental bonuses."
 CHI_bri_monthly_income_total: "BRI Monthly Contribution"
 CHI_bri_monthly_income_total_desc: "The total paid into the Belt and Road fund each month: the committed base plus any departmental bonuses."
 CHI_bri_refuse_concession_tt: "We §Rkeep the debt§! and remain in default"
 CHI_bri_returns_multiplier_base: "BRI Returns Multiplier"
 CHI_bri_returns_multiplier_base_desc: "Bonus applied to the International Investments return China books on each completed Belt and Road project."
 CHI_bri_unlock_tt: "§YBelt and Road:§! §G6§! project slots, §G40§! per project, §G+8§! monthly contribution, §G+4§! International Investments per completed project"
 CHI_Write_Off_Debts_tt: "Every qualifying partner's Belt and Road debt is §Gwritten off§! in full"
 CHI_bri_forum_surge: "Belt and Road Forum Surge"
 CHI_bri_forum_surge_desc: "The commitments signed at the triennial forum let Beijing carry two more projects at once for the next three years. With more slots open, more partner states can be building at any given moment."
 CHI_bri_partner_1: "BRI Participant"
 CHI_bri_partner_1_desc: "An initial Belt and Road project has broken ground. Chinese construction crews accelerate domestic building work and lend credibility to the government's development agenda."
 CHI_bri_partner_2: "BRI Partner"
 CHI_bri_partner_2_desc: "A second Belt and Road project has been delivered. Chinese engineering and infrastructure financing are becoming a visible part of the national development programme."
 CHI_bri_partner_3: "BRI Strategic Partner"
 CHI_bri_partner_3_desc: "Multiple BRI projects are now active across the country. Chinese contractors, credit lines, and political backing reinforce state capacity, and Beijing expects diplomatic alignment in return."
 CHI_bri_partner_4: "BRI Anchor State"
 CHI_bri_partner_4_desc: "Belt and Road investment underpins the national economy. Chinese capital funds construction and consumer supply, and the dependency is now difficult to unwind without severe disruption."
 CHI_bri_partner_5: "BRI Keystone Partner"
 CHI_bri_partner_5_desc: "The country is a pillar of the Belt and Road. Chinese standards, contractors, and financing are embedded in every major corridor, and economic policy is set with Beijing in mind."
 CHI_bri_presence_modifier: "BRI Global Presence"
 CHI_bri_presence_modifier_desc: "The standing China draws from its Belt and Road network. It grows with the number of partner states and with how deeply each one is tied in."
 CHI_bri_presence_modifier_tt: "Scales with §Y$CHI_bri_global_presence$§!: the combined rank of every Belt and Road partner."
 CHI_bri_claim_resource_rights: "Claim Resource Rights"
 CHI_bri_claim_resource_rights_desc: "Take payment in kind. The debtor signs over long-term extraction and export rights, clearing the loan but ceding control of its own resource base. Available only on the Predatory Lending path."
 CHI_bri_project_mission: "Belt and Road Construction"
 CHI_bri_project_mission_desc: "Chinese contractors and financing are at work on the §Y[GetBRIProjectName]§!. When it is delivered we gain its benefits, our partner rank rises, and Beijing collects its return."
 CHI_bri_raise_contribution: "Increase Belt and Road Funding"
 CHI_bri_raise_contribution_desc: "Commit a larger share of the state budget to the Belt and Road fund each month. The treasury pays for construction up front and is never replenished by project returns, so growing it is the only way to keep building."
 CHI_bri_raise_contribution_tt: "§Y$CHI_bri_monthly_income$§!: §G+4§! per month"
 CHI_bri_resource_concession_idea: "Chinese Resource Concession"
 CHI_bri_resource_concession_idea_desc: "A defaulted Belt and Road loan was settled by signing away extraction and export rights. Chinese firms work the deposits, and the revenue leaves the country before it is ever taxed. The concession runs until the debt it settled is bought back."
 CHI_BRI_project_missions: "Belt and Road Projects"
 CHI_BRI_project_missions_desc: "Belt and Road projects currently under construction in our country, financed and built by Chinese contractors."
 CHI_BRI_automation_disable: "Disable BRI Automation"
 CHI_BRI_automation_disable_desc: "Revert to a hands-on review process for incoming Belt and Road project applications. Each application will arrive as an event for China to examine and approve or reject individually. Applications already awaiting review keep the process they were opened under."
 CHI_BRI_automation_enable: "Enable BRI Automation"
 CHI_BRI_automation_enable_desc: "Approve incoming Belt and Road applications automatically instead of reviewing each one. Applicants are already screened for eligibility and for a free project slot before they can apply, so automation simply skips the paperwork. Applications already awaiting review keep the process they were opened under."
 CHI_bri_committed_projects: "BRI Committed Projects"
 CHI_bri_committed_projects_desc: "Active BRI projects plus applications awaiting review. Each pending application reserves a project slot."
 CHI_MAC_gambling_diversification: "Gambling Revenue Diversification"
 CHI_MAC_gambling_diversification_desc: "Macao's government moves to reduce its overwhelming dependence on casino gambling by licensing integrated resorts, convention facilities, and cultural tourism attractions. The diversification strategy is modelled on Singapore's economic transition and backed by preferential concession terms."
