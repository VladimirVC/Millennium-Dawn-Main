 form_UAS_category: "Unión de Estados Africanos"
 form_UAS_category_desc: "La Unión de Estados Africanos fue una unión política de corta duración entre Ghana, Guinea y Malí, formada en 1961 bajo la visión panafricana de Kwame Nkrumah. Revivamos este sueño de unidad de África Occidental y forjemos una nueva unión poderosa."
