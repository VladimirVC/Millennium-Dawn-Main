 ALG_ethnic_relations_desc: "阿尔及利亚是一个多民族国家，各民族对国家的忠诚度差异显著。\n\n§Y阿拉伯人：§![ALG_arab_satisfaction_text]\n§Y卡比利亚人：§![ALG_kabyle_satisfaction_text]\n§Y沙维亚人：§![ALG_chaoui_satisfaction_text]\n§Y图阿雷格人：§![ALG_tuareg_satisfaction_text]\n§Y莫扎比特人：§![ALG_mozabite_satisfaction_text]"
