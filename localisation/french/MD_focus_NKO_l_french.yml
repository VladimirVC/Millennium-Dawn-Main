 NKO_Choson_Dream: "Le Rêve Choson"
 Choson_Dream_desc: "Le « Rêve Choson » est un nouveau concept introduit par le Président [NKO.GetLeader], qui englobe les objectifs personnels et nationaux de la nation coréenne. Il comprend des aspirations dans de nombreux domaines, notamment les sphères économique, politique et internationale."
 Fallout_leadership_succession: "Conséquences de la succession à la direction"
 Fallout_leadership_succession_desc: "La mort du grand général Kim a provoqué un vide de pouvoir, et toutes les forces tentent de trouver des moyens d’en tirer profit."
 Fallout_leadership_succession2: "Conséquences de la succession à la direction"
