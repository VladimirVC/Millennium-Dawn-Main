 MAXIMUM_MIGRATION_RATE_TT: "최대 이민율"
 MAXIMUM_MIGRATION_RATE_TT_DELAYED: "§Y최대 이민율§!은 귀하의 국가로 올 수 있는 §Y이민자§!의 총 잠재력을 뜻합니다. 이것은 §Y경제 주기§!, §Y생산성§!, §Y현재 집권 정당§!, §Y노동자 충족률§!, §Y실업률§!, §Y전쟁 지지도§! 그리고 전시 상황인지에 의해 수정됩니다. 위 지표를 제외하고 수치를 직접적으로 늘릴 수는 없으며, §Y이민법§!을 높이거나 국가 중점, 이념, 결정을 통해 더 많은 §Y이민율§!을 챙길 수는 있습니다. 나아가 §Y순 이민율§!은 귀하의 §Y최대 이민율§!과 §Y기본 순 이민율§!을 곱하고 다시 §Y순 이민율 값의 요인§!에 의해 계산됩니다.\n\n§Y최대 이민율에 미치는 영향:§!\n--------------\n§Y생산성으로 인한 최대치§!: [?immigration_productivity_calculations_display|%+]\n§O노동자 충족률/실업률로 인한 최대치§!: [?immigration_employment_factor_display|%-]\n§G정부 집권 정당§!: [?immigration_government_factor_display|%+]\n§p전쟁 중인 인접국으로부터의 난민§!: [?neighbour_war_refugees_display|%+]\n§0우리나라가 전쟁 중이어서 발생한 난민§!: [?personal_war_refugees_display|%+]\n§L경제 주기/이념§!: [?modifier@maximum_migration_rate_value|%+]"
