 european_council_header_tt: "Actos Legales de §C[EUU.GetFlag][EUU.GetName]§!\n--------------\nLos actos legales actualmente aprobados de la §C[EUU.GetFlag][EUU.GetName]§!.\n\nEl Consejo de la Unión Europea opera bajo el Voto por Mayoría Calificada (QMV), comúnmente conocido como doble mayoría. Requiere el 55% de los §CEstados Miembros§! y el 65% de la §CPoblación de los Estados Miembros§! de la Unión Europea."
