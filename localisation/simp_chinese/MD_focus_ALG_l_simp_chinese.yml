 ALG_bcl_trait_apc_modernization: "装甲输送车现代化计划"
 ALG_bcl_trait_apc_modernization_desc: "装甲运兵车与步兵战车的全面升级。"
 ALG_bcl_trait_production_efficiency: "生产效率改进"
 ALG_bcl_trait_production_efficiency_desc: "简化装配流程以提高产量。"
 ALG_snvi_trait_saharan_proven: "撒哈拉验证设计"
 ALG_snvi_trait_saharan_proven_desc: "车辆在沙漠环境中经过广泛测试，确保达到最高可靠性。"
 ALG_snvi_trait_mercedes_partnership: "梅赛德斯-奔驰合作关系"
 ALG_snvi_trait_mercedes_partnership_desc: "基于梅赛德斯-奔驰商用车平台改造的军用车辆授权生产。"
 ALG_snvi_trait_mass_production: "大规模生产扩展"
 ALG_snvi_trait_mass_production_desc: "扩大生产设施以满足日益增长的军事需求。"
 ALG_snvi_trait_cost_reduction: "成本优化"
 ALG_snvi_trait_cost_reduction_desc: "通过提高制造效率来降低单位成本。"
 ALG_enmib_trait_maintenance_expertise: "维护与检修专精"
 ALG_enmib_trait_maintenance_expertise_desc: "直升机维护专业知识能延长使用寿命并提高可靠性。"
 ALG_enmib_trait_licensed_assembly: "授权组装作业"
 ALG_enmib_trait_licensed_assembly_desc: "以较低成本授权组装外国直升机设计。"
 ALG_enmib_trait_production_expansion: "生产能力扩张"
 ALG_enmib_trait_production_expansion_desc: "扩建设施以提升直升机生产能力。"
 ALG_mek_trait_mediterranean_design: "地中海海军设计"
 ALG_mek_trait_mediterranean_design_desc: "专为地中海作战优化的舰船，具备更高的航速与作战效能。"
 ALG_mek_trait_patrol_vessel_expertise: "巡逻舰艇专精"
 ALG_mek_trait_patrol_vessel_expertise_desc: "专门建造具备强化探测能力的快速巡逻艇。"
 ALG_mek_trait_shipyard_expansion: "造船厂扩建计划"
 ALG_mek_trait_shipyard_expansion_desc: "扩建船坞设施以提升建造能力。"
 ALG_cnan_trait_frigate_construction: "护卫舰建造能力"
 ALG_cnan_trait_frigate_construction_desc: "发展建造现代护卫舰与驱逐舰的能力。"
 ALG_cnan_trait_anti_air_systems: "海军防空系统"
 ALG_cnan_trait_anti_air_systems_desc: "为水面舰艇集成现代防空系统。"
 ALG_cnan_trait_submarine_assembly: "潜艇装配"
 ALG_cnan_trait_submarine_assembly_desc: "在外国技术援助下获得许可组装柴油电力潜艇。"
 ALG_cnan_trait_foreign_assistance: "外国技术援助"
 ALG_cnan_trait_foreign_assistance_desc: "与外国造船厂合作可加速技术发展。"
 ALG_cnan_trait_shipyard_modernization: "造船厂现代化"
 ALG_cnan_trait_shipyard_modernization_desc: "使用先进建造设备升级船坞设施。"
 ALG_ersa_trait_mro_expertise: "维护专精"
 ALG_ersa_trait_mro_expertise_desc: "维护、修理和大修的专业技能确保飞机达到最高可靠性。"
 ALG_ersa_trait_licensed_assembly: "授权飞机组装"
 ALG_ersa_trait_licensed_assembly_desc: "根据许可，以较低的成本组装外国飞机设计。"
 ALG_ersa_trait_transport_specialization: "运输机专业化"
 ALG_ersa_trait_transport_specialization_desc: "重点研发航程更远、效率更高的军用运输机。"
 ALG_ersa_trait_production_expansion: "生产扩张计划"
 ALG_ersa_trait_production_expansion_desc: "扩建设施以提高飞机生产能力。"
 ALG_resistance_power_struggle: "权利斗争"
 ALG_resistance_power_struggle_desc: "一场无声的战争正在阿尔及利亚人民与权力集团之间进行。双方都在寻求巩固支持，直到不可避免的冲突决定阿尔及利亚的未来。"
 Resistance_support: "支持抵抗运动"
 Resistance_support_desc: "将资源输送到基层运动、抗议活动和地下网络，加强人民对统治精英的反抗。"
 ALG_increase_resistance_tt: "§Y民众的力量日益强大，而军队的影响力则逐渐减弱。§!"
 Le_Pouvoir_support: "支持权力集团"
 Le_Pouvoir_support_desc: "直接支持根深蒂固的精英阶层，加强他们对军队的控制，削弱人民的不满。"
 ALG_increase_pouvoir_tt: "§Y军队巩固了控制，而人民却失去了动力。§!"
 Resistance_Final_Clash: "最后的冲突"
 Resistance_Final_Clash_desc: "抵抗运动与权力集团之间的冲突已达到白热化阶段。未来几个月将决定谁才是阿尔及利亚的真正统治者。"
 alg_resistance.1.t: "人民胜利！"
 alg_resistance.1.d: "人民的声音已经响起，反对统治精英。大规模示威游行和基层组织迫使政府让步。阿尔及利亚进入了民主治理的新时代。"
 alg_resistance.1.a: "人民已发声"
 alg_resistance.2.t: "权力集团镇压抵抗运动"
 alg_resistance.2.d: "在军队的支持下，既得利益集团成功镇压了抵抗运动。现状得以维持，但民众的不满情绪暗流涌动，随时可能引发新的动乱。"
 alg_resistance.2.a: "秩序恢复了"
 alg_resistance.3.t: "一个陷入混乱的国家"
 alg_resistance.3.d: "无论是抵抗运动还是权力集团，都未能确立主导地位。权力真空使阿尔及利亚陷入混乱，各路军方强人和派系争夺控制权。"
 alg_resistance.3.a: "国家正处于崩溃的边缘。"
 alg_resistance.4.t: "阿尔及利亚危机升级"
 alg_resistance.4.d: "脆弱的军政府无法维持国家的统一。阿尔及利亚陷入更深的动荡。要么武装团体再次发动内战，要么外国势力介入，以武力恢复秩序。"
 alg_resistance.4.a: "危机加剧"
 ALG_african_union_tt: "阿尔及利亚加强了与§Y非洲联盟§!成员国的联系，改善了与非洲成员国之间的关系。"
 KBY_alg_modifier_desc: "小俄罗斯是一个成立较晚的国家，其内政和外交政策完全服从莫斯科，但在内政和外交政策上仍然拥有很大的自主权。"
 KBY_alg_modifier_tt_intro: "§Y$KBY_alg_modifier$§!追加效果："
 KBY_alg_start_tt: "添加§Y$KBY_alg_modifier$§!，提供£political_power_texticon 政治点数获取：§G+2.00%§!\n £stability_texticon 稳定度：§G+5.00%§!\n\n"
