l_simp_chinese:
 CHI_SOV_treaty_good_neighbourliness: "中俄睦邻友好条约"
 CHI_SOV_treaty_good_neighbourliness_desc: "2001年签署的《睦邻友好合作条约》为现代中俄关系奠定了法律基础。双方重拾落实条约条款的政治意愿，秉持相互尊重、互不干涉、就重大国际问题磋商的原则，为两国开展各自无法单独推进的双边合作项目打开了大门。"
 CHI_SOV_sco_framework: "上海合作组织扩张议程"
 CHI_SOV_sco_framework_desc: "上海合作组织由中国和俄罗斯于2001年创立，是“上海五国”的继承者。通过协调共同的扩张议程，将印度、巴基斯坦、伊朗以及最终的中亚国家纳入其中，上海合作组织从一个区域安全论坛转变为一个真正能够制衡西方多边机构的力量。"
 CHI_SOV_turn_to_east: "俄罗斯的东向战略"
 CHI_SOV_turn_to_east_desc: "受西方制裁的影响，俄罗斯的“转向东方”政策在2014年后加速推进，该政策将俄罗斯的贸易、投资和外交重心转向中国和亚太地区。通过长期经济协议正式确立这一战略方向，向莫斯科的官僚机构和商界发出明确信号：西方市场不再是俄罗斯繁荣的主要参照点。"
 CHI_SOV_bri_russia_corridor: "“一带一路”俄罗斯走廊"
 CHI_SOV_bri_russia_corridor_desc: "中欧货运铁路网的大部分陆路货运量已通过西伯利亚铁路运往俄罗斯境内。将这条走廊纳入“一带一路”倡议框架，加上中国对俄罗斯铁路升级改造的投资以及简化后贝加尔斯克-满洲里口岸的通关手续，将使两国经济体共享同一物流基础设施。"
 CHI_SOV_brics_coordination: "金砖国家+协调联盟"
 CHI_SOV_brics_coordination_desc: "金砖国家（巴西、俄罗斯、印度、中国和南非）已从高盛集团的一个缩写词发展成为一个拥有自身新开发银行和货币储备机制的运转良好的多边论坛。中国和俄罗斯正积极推动金砖国家+的协调扩张，吸纳埃及、埃塞俄比亚、伊朗和沙特阿拉伯，从而构建了一个平行的经济架构，足以挑战国际货币基金组织和世界银行作为全球南方国家默认机构的地位。"
 CHI_SOV_sco_antiterror: "上海合作组织区域反恐中心"
 CHI_SOV_sco_antiterror_desc: "区域反恐机构是上海合作组织专门负责反恐的机构，总部设在塔什干。中俄双方共同扩大RATS的能力，加强情报共享、快速反应协调和联合训练演习，将欧亚安全合作的范围扩展到中亚和高加索地区，打击圣战网络和外部势力的秘密影响活动。"
 CHI_SOV_no_limits_partnership: "无上限战略伙伴关系"
 CHI_SOV_no_limits_partnership_desc: "2022年2月习近平主席访问莫斯科期间发表的联合声明宣布，中美两国建立了无限友谊，合作没有禁区。该声明将双边关系置于任何正式联盟之上，但并未签署共同防御条约，这向华盛顿和布鲁塞尔表明，北京和莫斯科将彼此的战略联盟视为国际秩序的永久特征。"
 CHI_SOV_yuan_ruble_settlement: "人民币-卢布结算机制"
 CHI_SOV_yuan_ruble_settlement_desc: "中国和俄罗斯加快了贸易摆脱美元计价的步伐，人民币在俄罗斯出口结算中的份额在2022年制裁冻结俄罗斯使用SWIFT系统后大幅上升。中国人民银行和俄罗斯银行之间建立正式的双边清算机制，构建了一套平行的金融基础设施，使两国经济体免受二级制裁的影响。"
 CHI_SOV_agricultural_corridor: "滨海边疆区农业出口走廊"
 CHI_SOV_agricultural_corridor_desc: "俄罗斯远东和西伯利亚地区拥有世界上储量最大的耕地，但由于人口稀少和市场准入不足，大部分土地未得到充分利用。滨海边疆区农业走廊通过专用边境口岸将俄罗斯的谷物、大豆和油籽输送到中国东北省份，为哈尔滨和沈阳提供了一条独立于全球大宗商品市场的安全食品供应链。"
 CHI_SOV_russian_far_east_zone: "俄罗斯远东自由港"
 CHI_SOV_russian_far_east_zone_desc: "俄罗斯于2015年授予符拉迪沃斯托克自由港地位，其目的在于吸引中国和日本对欠发达的俄罗斯远东地区的投资。中国国有企业在符拉迪沃斯托克自由经济区投资港口设施、冷库和轻工业，打造了一个商业锚点，巩固了俄罗斯的东向战略，并为中国提供了一个位于其境外的太平洋物流枢纽。"
 CHI_SOV_zarubino_port: "扎鲁比诺太平洋港口协议"
 CHI_SOV_zarubino_port_desc: "位于俄罗斯太平洋沿岸、靠近俄中朝三国交界处的扎鲁比诺散货码头，自上世纪90年代以来就被提议作为联合开发项目。中国投资扩建扎鲁比诺的粮食处理和集装箱吞吐能力，为吉林省的中国出口商提供了通往太平洋航道的最短路径，同时也为俄罗斯提供了莫斯科无力独自建设的基础设施所需的中国资金。"
 CHI_SOV_trans_siberian_freight: "西伯利亚铁路货运扩建"
 CHI_SOV_trans_siberian_freight_desc: "西伯利亚铁路每年承载着数万个往返于中国和欧洲之间的货运集装箱，运输时间仅需12至15天，而海运则需30天。中俄两国共同投资的铁路电气化、瓶颈路段复线化以及一体化数字化清关系统，将运输时间缩短至10天以内，吞吐量提升至原来的三倍，使西伯利亚铁路成为高端货物运输真正意义上可替代苏伊士运河的通道。"
 CHI_SOV_timber_mineral_trade: "西伯利亚木材和矿产出口"
 CHI_SOV_timber_mineral_trade_desc: "西伯利亚拥有全球最大的北方森林储量，以及储量巨大的铜、镍、金和稀土元素矿藏。中国加工企业在西伯利亚木材采购领域占据主导地位，而诺里尔斯克镍业公司和波利乌斯黄金公司则将其大部分产品出口到中国炼厂。将这些商品流动正式纳入长期承购协议，可以巩固两国在全球资源供应链中的地位。"
 CHI_SOV_arctic_lng: "亚马尔液化天然气承购合同"
 CHI_SOV_arctic_lng_desc: "由诺瓦泰克公司开发的位于俄罗斯亚马尔半岛的亚马尔液化天然气项目，其主要股东包括中国石油天然气集团公司和丝路基金。中国建造的破冰级液化天然气运输船常年从萨贝塔港装载货物。与中国海洋石油总公司和中国石油天然气集团公司签订的长期承购合同，既保障了中国的液化天然气供应，也为诺瓦泰克公司提供了因西方制裁而中断的中国融资渠道。"
 CHI_SOV_power_of_siberia_2: "西伯利亚力量2号管道"
 CHI_SOV_power_of_siberia_2_desc: "“西伯利亚力量2号”项目拟将西西伯利亚气田的天然气输送至蒙古，最终进入中国北部，该气田也向欧洲供应天然气。该项目年输气能力达500亿立方米，将使中国成为俄罗斯最大的单一天然气客户，并大幅领先于其他国家，同时为俄罗斯天然气工业股份公司提供一份关键合同，以确保其继续投资那些原本可能被搁置的气田。"
 CHI_SOV_tianwan_nuclear: "田湾核电站扩建"
 CHI_SOV_tianwan_nuclear_desc: "位于连云港的天湾核电站由俄罗斯国家原子能公司根据1997年以来签署的一系列合同建造，是俄中历史上规模最大的技术合作项目。2021年签署的7号和8号机组合同将两国的合作关系延续至2030年代。俄罗斯国家原子能公司在中国建造的每一台机组都意味着反应堆设计知识、燃料供应合同和维护关系的转移，这些都将两国的核工业紧密联系在一起，持续数十年。"
 CHI_SOV_huawei_russia: "华为5G俄罗斯部署"
 CHI_SOV_huawei_russia_desc: "2019年至2020年，华为与包括移动电信、梅加丰和俄罗斯电信在内的多家俄罗斯电信运营商签署了5G协议。由于西方5G供应商被俄罗斯的采购优先权​​政策和后来的制裁排除在外，华为在俄罗斯5G网络建设中的主导地位几乎无人能撼动。中国5G基础设施嵌入俄罗斯通信骨干网，形成了一种技术依赖，从而在关键国家基础设施层面深化了双边关系。"
 CHI_SOV_beidou_glonass: "北斗-格洛纳斯导航协议"
 CHI_SOV_beidou_glonass_desc: "中国的北斗和俄罗斯的格洛纳斯是仅有的两个独立于美国GPS网络的卫星导航系统。2015年，这两个系统的运营机构签署了互操作性协议，使得民用和军用接收器能够同时使用来自两个星座的信号，从而提高定位精度，更重要的是，为两国提供了冗余的导航基础设施，使其不会受到美国干扰或轨道干扰的影响。"
 CHI_SOV_polar_silk_road: "极地丝绸之路倡议"
 CHI_SOV_polar_silk_road_desc: "中国于2018年发布的北极战略文件将北方海航道指定为“极地丝绸之路”，这是继中亚陆路和印度洋海路之后，“一带一路”的第三条走廊。中国对北极航运基础设施的投资、在中国船厂建造的破冰船以及北方海航道沿线的港口设施，将一条原本季节性的俄罗斯航线转变为一条由中俄合资企业控制的全年国际航道。"
 CHI_SOV_northern_sea_route: "北方海路商业化"
 CHI_SOV_northern_sea_route_desc: "北海航线沿俄罗斯北极海岸线，从白令海峡延伸至喀拉海，与苏伊士运河航线相比，可将上海至汉堡的航程缩短约30%。北极海冰融化延长了北海航线的通航季节。中俄两国共同投资建设破冰船护航能力、沿线应急救援基础设施以及专用破冰级集装箱船，使北海航线从一条季节性小众航线转变为全年运输高价值货物的可行方案。"
 CHI_SOV_rosatom_export: "俄罗斯国家原子能公司出口方案"
 CHI_SOV_rosatom_export_desc: "俄罗斯国家原子能公司是全球最大的核能公司，按国际反应堆订单量计算，目前在海外有超过30座机组正在建设或已签订合同。其VVER反应堆设计、燃料供应链和长期服务合同是俄罗斯投射经济和技术影响力的主要途径。一项专门针对中国买家的出口方案，包括VVER-1200机组、混合氧化物燃料供应以及对中国核工程师的联合培训，将俄罗斯核技术融入中国民用能源基础设施，惠及一代人。"
 CHI_SOV_space_station: "国际月球研究站"
 CHI_SOV_space_station_desc: "国际月球研究站是中国国家航天局和俄罗斯航天局于2021年联合宣布的计划，也是自苏联航天计划以来规模最大的双边科学合作项目。国际月球研究站计划在月球南极附近建造一个永久性的机器人研究设施，最终还将实现载人运行。该设施的设计旨在与美国宇航局）的阿尔忒弥斯计划形成互补，并向第三国开放参与。国际月球研究站的联合开发将两国航天计划整合到一个共同的架构中，以支持下一代深空探索。"
 CHI_SOV_peace_mission: "和平使命联合演习"
 CHI_SOV_peace_mission_desc: "“和平使命”是上海合作组织的联合军事演习系列，自2005年以来每年举行，成员国轮流承办。中俄军队参与了每一届演习，演习内容也从反恐作战扩展到涉及装甲部队、近距离空中支援和军级指挥协调的诸兵种联合演练。该系列演习已成为解放军和俄罗斯军队在实际联合作战之外发展互操作性的主要平台。"
 CHI_SOV_advanced_arms_sales: "苏-35和S-400出口方案"
 CHI_SOV_advanced_arms_sales_desc: "中国在2015年采购了24架苏-35多用途战斗机，并在2018年采购了一个营的S-400“凯旋”地空导弹系统，这是自上世纪90年代苏-27战斗机交易以来，俄罗斯对华最重要的武器出口。这笔交易不仅为中国带来了第四代半战机和远程一体化防空系统的作战经验，而这些正是中国自身军工产业尚未具备的。同时，在俄罗斯国防出口公司西方市场萎缩之际，这笔交易也为其带来了一位优质客户。"
 CHI_SOV_pacific_fleet_coord: "太平洋舰队协调协议"
 CHI_SOV_pacific_fleet_coord_desc: "自2012年以来，中国人民解放军海军和俄罗斯太平洋舰队在日本海、东海和西太平洋进行了协调的海军演习。在日本和朝鲜半岛附近海域的联合巡逻，展现了双方海军各自无法独立维持的联合存在，并向美国太平洋司令部发出明确的信号，表明与任何一方在其本土水域发生冲突的代价。"
 CHI_SOV_defense_industrial: "国防工业基地一体化"
 CHI_SOV_defense_industrial_desc: "中国国有国防企业已不再仅仅依赖进口俄罗斯平台，而是转向许可生产和逆向工程。在航空发动机研发领域，合资企业具有最重要的战略意义，因为这是中国自身产业发展最为滞后的领域。中国能够获得俄罗斯WS-15和WS-20涡扇发动机的技术，从而以远低于独立研发的成本缩小与西方空军的差距，同时俄罗斯企业也能在中国获得规模化生产优势。"
 CHI_SOV_strategic_bomber_patrol: "联合战略轰炸机巡逻队"
 CHI_SOV_strategic_bomber_patrol_desc: "2019年和2023年，俄罗斯图-95MS“熊”式轰炸机和中国轰-6K战略轰炸机在日本海和东海进行了协同巡逻，引发了日本和韩国的防空系统紧急升空。这些巡逻并非技术意义上的联合军事行动，但展现了战略空中力量的同步运用，表明两国愿意协调一致地对共同对手施加压力。定期的联合巡逻航线有助于加深机组人员的熟悉程度，并建立共同的作战程序标准。"
 CHI_SOV_vostok_exercises: "东方战略演习"
 CHI_SOV_vostok_exercises_desc: "“东方”是俄罗斯的战略级军事演习系列，传统上侧重于在俄罗斯远东地区进行大规模常规冲突演练。中国军队参加了2018年的“东方”演习，并再次参加了2022年的“东方”演习，后者是在乌克兰战争爆发数周后举行的。中国的参与使演习从国家层面的演练升级为双边联合兵种演习，解放军地面部队和航空部队融入了俄罗斯师级指挥体系。"
 CHI_SOV_military_space: "联合军事航天计划"
 CHI_SOV_military_space_desc: "中国和俄罗斯都发展了专门的军事航天能力，包括反卫星武器、卫星导航干扰系统、电子情报卫星和天基预警系统。一项协调卫星轨道位置、数据共享协议和联合空间态势感知的联合计划，能够使两国比任何一方单独行动更全面地掌握美国及其盟国的太空行动情况，同时降低双方轨道资产发生碰撞或冲突升级的风险。"
 SOV_chi_rare_earth_supply: "中国稀土元素"
 SOV_chi_rare_earth_supply_desc: "中国控制着全球80%以上的稀土提炼产能，其中包括用于精密制导系统、夜视光学器件和高性能电机的关键稀土化合物，如钕、镧和镝。在国防工业合作框架下正式确立供应关系，可确保乌拉尔车辆厂获得中国加工的稀土原料，从而降低零部件成本，并提高T-90和阿玛塔坦克生产线的质量一致性。"
 CHI_sov_flanker_expertise: "侧卫研发专业知识"
 CHI_sov_flanker_expertise_desc: "沈阳飞机公司获得苏-27“侧卫”系列战斗机（包括歼-11、歼-15和歼-16等型号）的特许生产权，使其成为俄罗斯以外世界上经验最丰富的俄系战斗机制造商。苏-35的出口合同进一步深化了这种合作关系，使沈阳飞机公司能够获得AL-41F1S发动机、雪橇-E雷达架构以及气动改进技术，这些技术也为沈阳飞机公司的下一代项目提供了借鉴。沈阳飞机公司生产的飞机性能显著提升，这直接得益于与苏霍伊设计局的合作。"
 CHI_SOV_military_tech_idea: "俄罗斯国防技术转让"
 CHI_SOV_shared_modifier: "中俄战略联盟"
 CHI_SOV_shared_modifier_desc: "中俄两国间一系列相互关联的双边承诺，根据中俄合作的深度调整中国的经济和军事。更紧密的联系扩大了政治自主权、农业和资源产量、海军影响力以及民用工业产能，而深化伙伴关系则提升了贸易友好度并加强了边境安全。这一调整幅度会随着两国间每项重大协议的批准而相应增加。"