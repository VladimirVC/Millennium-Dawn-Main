 NKO_Revival_Industry1: "産業復興"
 NKO_The_Green_Water_Navy: "地域海軍"
 NKO_Simhwajo_Sageon_legacy: "深化組事件の遺産"
 NKO_Simhwajo_Sageon_legacy_desc: "深化組事件は、金正日が父・金日成の部下たちを排除するために実施した大規模な粛清運動であり、1997年から2000年にかけて朝鮮民主主義人民共和国で行われた。\n一部では、これを「北朝鮮版マッカーシズム」あるいは「北朝鮮版文化大革命」と呼んだ。"
 NKO_scale_back_spending_idea: "政府支出削減"
 NKO_scale_back_spending_idea_desc: ""
 NKO_entrench_military_authority_idea: "軍事的権威の強化"
 NKO_entrench_military_authority_idea_desc: ""
 NKO_kim_yo_jong: "金与正"
 NKO_kim_yo_jong_desc: ""
 NKO_juche_for_new_era: "新時代の主体思想"
 NKO_juche_for_new_era_desc: "金与正委員長の就任により、北朝鮮は新時代、より明るい未来へと突入した……"
 NKO_for_well_being_of_people: "朝鮮人民の幸福のために"
 NKO_for_well_being_of_people_desc: "朝鮮労働党の始まりは、朝鮮人民の幸福と福祉のためである。我々は始まりを決して忘れてはならない。"
 NKO_quality_first: "品質第一"
 NKO_quality_first_desc: "地方の民間産業は、我々の計画目標を達成するために製品の品質を著しく手抜きしており、これは直ちに止めなければならない！"
 NKO_chosun_dream: "朝鮮の夢"
 NKO_chosun_dream_desc: "「朝鮮の夢」は、朝鮮民族の個人的かつ国家的目標を包含した、指導者[NKO.GetLeader]によって提唱された新たな概念である。それは、経済、政治、国際分野など多岐にわたる分野における願望を網羅している。"
