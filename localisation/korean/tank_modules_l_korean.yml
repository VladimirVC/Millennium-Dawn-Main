 EQ_MOD_CAT_light_tanks_reload_modules_TITLE: "장갑전투차량 자동장전 시스템"
 light_tank_afv_automatic_loading: "장갑전투차량 자동장전 시스템"
 light_tank_afv_automatic_loading_desc: "자동 장전 시스템은 전시 중 차량의 전투 효율을 효과적으로 높여줍니다."
 tank_small_cannon: "냉전 초기형 경전차포"
 tank_small_cannon_desc: "초기 경전차의 주포는 견인포를 개조해 사용하는 경우가 많았습니다."
 tank_small_cannon_2: "냉전 후기 경전차포"
 tank_small_cannon_2_desc: "경전차의 주포는 저압포가 많아 반동이 적고 전체 중량 또한 가볍습니다."
 tank_small_cannon_3: "현대 경전차포"
 tank_small_cannon_3_desc: "현대 경전차 주포는 첨단 소재 및 설계를 통해 화력과 사거리를 최적화하였습니다."
 tank_small_cannon_4: "최첨단 경전차포"
 tank_small_cannon_4_desc: "나노기술과 컴퓨터 지원 설계의 도입으로 미래 경전차 주포의 전례 없는 발전이 가능해졌으며 경전차의 생존성과 출력 능력이 더욱 향상되었습니다."
 EQ_MOD_CAT_spaa_naval_cannon_systems_TITLE: "해상 함포"
 spaa_naval_cannon_1: "대전기 이후 함포"
 spaa_naval_cannon_1_desc: "당대 기준으로 막대한 구경을 자랑하던 이 함포는 대인/비장갑 표적에 압도적인 파괴력을 선사합니다. 무지막지한 위력이 이 포의 핵심이지만, 기동성과 효율성은 일부 희생해야 했습니다."
 spaa_naval_cannon_2: "냉전기 함포"
 spaa_naval_cannon_2_desc: "포탄 설계와 추진 기구의 개선으로 화력이 강화되었습니다. 상당한 공중 위협 대응 잠재력을 유지하면서도, 원초적인 위력 면에서 여전히 강력한 선택지입니다."
 spaa_naval_cannon_3: "현대 함포"
 spaa_naval_cannon_3_desc: "반자동 장전 장치와 발전된 탄종을 도입하여 발사 속도를 높였으며, 대인/비장갑 표적 제압에서 압도적인 효율을 자랑합니다."
 spaa_naval_cannon_4: "발전된 함포"
 spaa_naval_cannon_4_desc: "유도탄을 채택하여 전례 없는 정확도를 보여주며, 이 대포는 대공 방어의 핵심 자산으로 자리매김했습니다."
 spaa_naval_cannon_5: "최첨단 함포"
 spaa_naval_cannon_5_desc: "최첨단 소재와 최적화된 탄약 설계를 활용하여, 향상된 효율성과 함께 대인/비장갑 표적에 대해 더욱 강력한 파괴력을 보장합니다."
 EQ_MOD_CAT_spaa_light_autocannon_systems_TITLE: "§R자주대공포(SPAA)§!\n경 기관포"
 spaa_light_autocannon1: "대전기 이후 경기관포"
 spaa_light_autocannon1_desc: "날렵하고 가벼운 이 기관포는 신속한 반응과 기동성을 중시하며, 유동적인 전투 상황에서 필수적인 공중 엄호 능력을 제공합니다."
 spaa_light_autocannon2: "냉전기 경기관포"
 spaa_light_autocannon2_desc: "진화된 소재와 최적화된 발사 메커니즘으로 효율성을 높였으며, 역동적인 전장에서 민첩한 방어 수단으로서의 입지를 굳혔습니다."
 spaa_light_autocannon3: "현대 경기관포"
 spaa_light_autocannon3_desc: "고속탄을 사용하여 교전 시간을 단축시켰으며, 공중 위협을 신속하게 무력화하는 데 최적화된 선택입니다."
 spaa_light_autocannon4: "발전된 경기관포"
 spaa_light_autocannon4_desc: "발전된 합금과 높은 연사 속도를 갖추어 신속하고 효율적인 공중 교전에서 선두주자로서의 위상을 확고히 했습니다."
 spaa_light_autocannon5: "최첨단 경기관포"
 spaa_light_autocannon5_desc: "최신 제조 기술을 적용한 이 기관포는 속도와 효율성의 정점에 서 있으며, 신속 대응 체계의 새로운 기준을 제시합니다."
 EQ_MOD_CAT_spaa_autocannon_systems_TITLE: "§R자주대공포(SPAA)§!\n기관포"
 spaa_autocannon_1: "대전기 이후 기관포"
 spaa_autocannon_1_desc: "파괴력과 속도의 균형을 맞춘 이 다목적 기관포는 다양한 전투 상황에서 전천후로 활약할 수 있습니다."
 spaa_autocannon_2: "냉전기 기관포"
 spaa_autocannon_2_desc: "포탄 설계와 소재 구조의 업그레이드를 통해 전반적인 효용성을 높였으며, 다양한 교전에서 신뢰할 수 있는 장비로 거듭났습니다."
 spaa_autocannon_3: "현대 기관포"
 spaa_autocannon_3_desc: "강화된 발사 메커니즘과 최적화된 탄종은 이 세대의 기관포를 새로운 경지로 끌어올렸으며, 공중과 지상 위협 모두에 안정적인 성능을 보장합니다."
 spaa_autocannon_4: "발전된 기관포"
 spaa_autocannon_4_desc: "강화된 포신 설계와 우수한 탄약을 갖춘 이 버전은 다양한 전투 상황에서 더욱 일관된 성능을 제공합니다."
 spaa_autocannon_5: "최첨단 기관포"
 spaa_autocannon_5_desc: "기관포 설계의 정점을 대표하며, 최신 재료 공학 및 탄약 기술을 활용하여 최적의 성능을 보장합니다."
 EQ_MOD_CAT_spaa_missile_systems_TITLE: "이중 목적 미사일"
 spaa_missiles_1: "대전기 이후 이중 목적 미사일"
 spaa_missiles_1_desc: "미사일 기술의 태동기를 함께한 이 유도 발사체는 정확한 교전을 보장합니다. 특히 장갑을 갖춘 공중 적에게 강력할 뿐 아니라 지상 표적과도 교전이 가능합니다."
 spaa_missiles_2: "냉전기 이중 목적 미사일"
 spaa_missiles_2_desc: "향상된 추진력과 공기역학 설계는 미사일의 성능을 높여, 견고하고 회피 기동을 하는 표적에 대해 더 큰 타격을 입힙니다."
 spaa_missiles_3: "현대 이중 목적 미사일"
 spaa_missiles_3_desc: "개선된 유도 시스템과 최적화된 탄두를 갖춘 이 세대는 보다 효과적인 교전을 보장하며 하늘에서의 지배력을 확고히 합니다."
 spaa_missiles_4: "발전된 이중 목적 미사일"
 spaa_missiles_4_desc: "첨단 소재와 추진 시스템을 통해 미사일의 사거리와 타격력을 높여 공중전에서의 우위를 유지합니다."
 spaa_missiles_5: "최첨단 이중 목적 미사일"
 spaa_missiles_5_desc: "미사일 기술의 한계를 뛰어넘는 이 세대는 비교할 수 없는 사거리, 속도 및 타격력을 제공하여 모든 공중 위협을 효과적으로 저지합니다."
 EQ_MOD_CAT_spaa_short_range_missile_systems_TITLE: "§R자주대공포(SPAA)§!\n단거리 미사일"
 spaa_short_range_missiles_1: "대전기 이후 단거리 미사일"
 spaa_short_range_missiles_1_desc: "미사일 기술의 태동기를 함께한 이 유도 발사체는 정확한 교전을 보장하며, 특히 장갑을 갖춘 공중 적을 상대할 때 강력합니다."
 spaa_short_range_missiles_2: "냉전기 단거리 미사일"
 spaa_short_range_missiles_2_desc: "향상된 추진력과 공기역학 설계는 미사일의 성능을 높여, 견고하고 회피 기동을 하는 표적에 대해 더 큰 타격을 입힙니다."
 spaa_short_range_missiles_3: "현대 단거리 미사일"
 spaa_short_range_missiles_3_desc: "개선된 유도 시스템과 최적화된 탄두를 갖춘 이 세대는 보다 효과적인 교전을 보장하며 하늘에서의 지배력을 확고히 합니다."
 spaa_short_range_missiles_4: "발전된 단거리 미사일"
 spaa_short_range_missiles_4_desc: "첨단 소재와 추진 시스템을 통해 미사일의 사거리와 타격력을 높여 공중전에서의 우위를 유지합니다."
 spaa_short_range_missiles_5: "최첨단 단거리 미사일"
 spaa_short_range_missiles_5_desc: "미사일 기술의 한계를 뛰어넘는 이 세대는 비교할 수 없는 사거리, 속도 및 타격력을 제공하여 모든 공중 위협을 효과적으로 저지합니다."
 EQ_MOD_CAT_spaa_long_range_missile_systems_TITLE: "§R자주대공포(SPAA)§!\n장거리 미사일"
 spaa_long_range_missiles_1: "대전기 이후 장거리 미사일"
 spaa_long_range_missiles_1_desc: "미사일 기술의 태동기를 함께한 이 유도 발사체는 정확한 교전을 보장합니다. 특히 장갑을 갖춘 공중 적에게 강력할 뿐 아니라 지상 표적과도 교전이 가능합니다."
 spaa_long_range_missiles_2: "냉전기 장거리 미사일"
 spaa_long_range_missiles_2_desc: "향상된 추진력과 공기역학 설계는 미사일의 성능을 높여, 견고하고 회피 기동을 하는 표적에 대해 더 큰 타격을 입힙니다."
 spaa_long_range_missiles_3: "현대 장거리 미사일"
 spaa_long_range_missiles_3_desc: "개선된 유도 시스템과 최적화된 탄두를 갖춘 이 세대는 보다 효과적인 교전을 보장하며 하늘에서의 지배력을 확고히 합니다."
 spaa_long_range_missiles_4: "향상된 장거리 미사일"
 spaa_long_range_missiles_4_desc: "첨단 소재와 추진 시스템을 통해 미사일의 사거리와 타격력을 높여 공중전에서의 우위를 유지합니다."
 spaa_long_range_missiles_5: "최첨단 장거리 미사일"
 spaa_long_range_missiles_5_desc: "미사일 기술의 한계를 뛰어넘는 이 세대는 비교할 수 없는 사거리, 속도 및 타격력을 제공하여 모든 공중 위협을 효과적으로 저지합니다."
 spaa_radar_gen1: "대전기 이후 레이다 시스템"
 spaa_radar_gen1_desc: "자주대공포 플랫폼 전용으로 특별히 설계된 기반 레이더 시스템으로, 공중 위협을 탐지하기 위해 사거리와 정확도의 균형을 맞췄습니다. 비용은 이 장비의 특수성을 나타냅니다."
 spaa_radar_gen2: "냉전기 레이다 시스템"
 spaa_radar_gen2_desc: "한층 더 발전된 탐지 알고리즘으로 강화된 이 레이더 시스템은 혼잡한 공중 환경에서 두각을 나타내며, 전파 방해 속에서도 일관된 표적 추적을 보장합니다."
 spaa_radar_gen3: "현대 레이다 시스템"
 spaa_radar_gen3_desc: "첨단 소재와 디지털 처리를 구현하여 최적의 실시간 추적 및 정보 전달을 보장하여 빠르게 진행되는 공중 교전에서 우위를 제공합니다."
 spaa_radar_gen4: "발전된 레이더 시스템"
 spaa_radar_gen4_desc: "획기적인 기술을 활용하여 다양한 작전 환경에서 타의 추종을 불허하는 정확도와 표적 식별 능력을 제공하는 최신예 시스템입니다."
 spaa_radar_gen5: "양자 보조 레이다 시스템"
 spaa_radar_gen5_desc: "레이더 설계의 정점이라 할 수 있으며, 여러 위협을 원활하게 관리하는 적응형 기능을 제공합니다. 비록 높은 비용이 들더라도 최고의 탐지 장비라는 명성을 확고히 합니다."
 spaa_off_vehicle_radar_gen1: "대전기 이후 레이다 지원차량"
 spaa_off_vehicle_radar_gen1_desc: "향상된 탐지 범위를 제공하지만, 이 지원 차량의 주된 기능은 SPAA에게 더 나은 표적 데이터를 제공하는 것입니다. 초기 설계 모델이라 최전선 돌파 상황에서는 운용상의 어려움이 있습니다."
 spaa_off_vehicle_radar_gen2: "냉전기 레이다 지원차량"
 spaa_off_vehicle_radar_gen2_desc: "개선된 신호 처리로 강화되어 직접 교전 시의 내구성은 희생했지만 전체 방공 생태계의 반응 시간을 단축시킵니다."
 spaa_off_vehicle_radar_gen3: "현대 레이다 지원차량"
 spaa_off_vehicle_radar_gen3_desc: "이 차량은 안전한 거리에서 작동하는 것을 선호하더라도 더 빠른 위협 분류 및 전달을 약속하는 정교한 레이더 시스템을 자랑합니다."
 spaa_off_vehicle_radar_gen4: "향상된 레이다 지원차량"
 spaa_off_vehicle_radar_gen4_desc: "최첨단 레이더 기술을 수용하는 이 장치는 방공망의 '눈' 역할을 하여 위협을 식별하고 처리하도록 보장하지만 직접적인 대결로부터 보호하는 것이 가장 좋습니다."
 spaa_off_vehicle_radar_gen5: "양자 보조 레이다 지원차량"
 spaa_off_vehicle_radar_gen5_desc: "지원 레이더 진화의 정점을 대표하는 이 제품의 탁월한 탐지 범위와 신속한 정보 전파는 매우 귀중하지만 최전선의 취약성은 여전히 ​​남아 있습니다."
 spaa_optical_guidance_gen1: "대전기 이후 광학 유도"
 spaa_optical_guidance_gen1_desc: "기본 시각 보조 장치와 초기 센서를 활용하는 이 유도 시스템은 유리한 조건에서 공중 표적을 추적하고 교전할 수 있는 비용 효율적인 수단을 제공합니다."
 spaa_optical_guidance_gen2: "냉전기 광학 유도"
 spaa_optical_guidance_gen2_desc: "향상된 렌즈와 초기 전자 추적을 통합하여 특히 주간 작업 중에 보다 일관된 표적 획득을 제공합니다."
 spaa_optical_guidance_gen3: "현대 광학 유도"
 spaa_optical_guidance_gen3_desc: "센서 기술의 발전으로 이 시스템은 더 나은 목표 식별 및 범위 추정을 제공하므로 신뢰할 수 있고 예산 친화적인 선택이 됩니다."
 spaa_optical_guidance_gen4: "향상된 광학 유도"
 spaa_optical_guidance_gen4_desc: "최첨단 시각 센서와 소프트웨어 지원 기능을 결합하여 더 효과적인 표적 추적을 보장하고 더 비싼 레이더 대응 제품에 맞서 입지를 유지합니다."
 spaa_optical_guidance_gen5: "Cutting-Edge Optical Guidance"
 spaa_optical_guidance_gen5_desc: "A marvel in optical tech, offering adaptive visual tracking and smart threat prioritization, solidifying its position as an economical yet efficient alternative."
