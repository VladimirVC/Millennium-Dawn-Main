 sov_communists.1.t: "Zakaz własności prywatnej"
 sov_communists.1.d: "Po serii antyburżuazyjnych ustaw uchwalonych przez nasz rząd, w końcu osiągnęliśmy ostateczny krok w kierunku wyeliminowania kapitalizmu z rosyjskiej ziemi. Podobnie jak nasi chwalebni towarzysze w latach dwudziestych XX wieku, teraz podejmiemy kroki w celu zakazania własności prywatnej. Pozostaje tylko pytanie, jak daleko sięgnie ta konfiskata – czy będzie całkowita, umiarkowana, czy selektywna?"
 sov_communists.1.a: "Pełna konfiskata zadziałała wtedy i zadziała teraz!"
 sov_communists.1.b: "Bądźmy nieco bardziej umiarkowani."
 sov_communists.1.c: "Wywłaszczaj tylko główne gałęzie przemysłu."
 sov_communists.2.t: "Konstytucja narodowo-komunistyczna"
 sov_communists.2.d: "Dzięki sprzymierzeniu się NPA i CPRF jesteśmy gotowi do opracowania nowej konstytucji. Pytanie brzmi, czy nasze ideologiczne podstawy powinny skłaniać się ku internacjonalistycznemu komunizmowi, czy raczej ku nacjonalistycznej, izolacjonistycznej ścieżce. Nasz przyszły kierunek wisi na włosku."
 sov_communists.2.a: "Musimy być dumni z tego, że jesteśmy Rosjanami!"
 sov_communists.2.b: "Nie powinniśmy zapominać o naszej głównej ideologii."
 sov_communists.3.t: "Konstytucja Demokratyczna"
 sov_communists.3.d: "Odziedziczyliśmy niektóre z najbardziej obiecujących idei naszych ideologicznych przywódców z czasów pierestrojki. Aby zbudować jaśniejszą i bardziej wolną przyszłość, musimy zmienić naszą konstytucję. Ale czy powinniśmy skierować ją w stronę bardziej liberalnej struktury, czy też zachować rdzeń naszej dominującej ideologii?"
 sov_communists.3.a: "Musimy chronić idee Gorbaczowa!"
 sov_communists.3.b: "Nie powinniśmy zapominać o naszej głównej ideologii."
 sov_communists.4.t: "Konstytucja Partii Komunistycznej"
 sov_communists.4.d: "Mając teraz absolutną władzę w rękach Partii, możemy wreszcie przepisać konstytucję zgodnie z naszymi wartościami. Jednak w naszych szeregach wyłoniły się frakcje ideologiczne i musimy zdecydować, która frakcja nada ton naszej prawdziwie sowieckiej konstytucji."
 sov_communists.4.a: "Oczywiście, że potrzebujemy stalinistów."
 sov_communists.4.b: "Potrzebujemy bardziej umiarkowanego wzrostu."
 sov_communists.5.t: "Rekonstrukcja radzieckich pomników wojskowych"
 sov_communists.5.d: "W całym naszym rozległym kraju tysiące pomników Wielkiej Wojny Ojczyźnianej popada w ruinę. Naszym obowiązkiem jest je odrestaurować, aby uczcić poległych bohaterów. Musimy również rozważyć budowę nowych pomników, aby przyszłe pokolenia nigdy nie zapomniały o poświęceniu i chwale naszego narodu."
 sov_communists.5.a: "Niech będą bardziej w żałobie."
 sov_communists.5.b: "Muszą wychwalać nasze bohaterstwo!"
 sov_communists.6.t: "Restalinizacja"
 sov_communists.6.d: "Chruszczowcom nie udało się zachować dziedzictwa naszego największego przywódcy. Teraz nadszedł czas, aby to naprawić. Musimy zdecydować, jak daleko chcemy się posunąć w zmianie nazw naszych miast na cześć Stalina i radzieckiej przeszłości."
 sov_communists.6.a: "Zachowaj opcje historyczne."
 sov_communists.6.b: "Idź na pełny stalinizm!"
