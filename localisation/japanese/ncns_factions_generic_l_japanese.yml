 joint_military_exercises_goal_desc: "現代の戦争においては、同盟軍間の相互運用性が不可欠である。合同演習を実施し、装備を整えた師団を合計100個揃えることで、我々の陣営はあらゆる脅威に対応する準備ができていることを示す。"
 economic_integration_goal_desc: "強固な経済は、いかなる永続的な同盟にとっても基礎となるものである。すべての加盟国が少なくとも15の民需工場を維持することを確保することで、我々は集団的繁栄と相互扶助に必要な産業基盤を築くことができる。"
 technology_sharing_goal_desc: "技術的優位性は戦力を倍増させる要因となる。共同研究プログラムとデジタルインフラへの投資を通じて、我々の陣営はライバルを凌駕し、あらゆる分野で最先端を維持することができる"
 regional_stability_goal_desc: "同盟の強さは、その最も弱い環によって決まる。すべての加盟国の安定度を50％以上に保つことで、我々は統一戦線を形成し、日和見的な侵略や内部転覆を効果的に抑止することができる。"
 counter_terrorism_goal_desc: "テロリズムに国境はない。全加盟国に情報機関を設置することで、脅威が現実化する前にそれを防ぐことができるネットワークを構築し、それによって市民と我々の集団的利益の両方を守ることができる。"
 semiconductor_supremacy_goal_desc: "マイクロチップ製造は21世紀の戦略産業である。陣営全体で合計50のマイクロチップ工場を建設することで、今後数十年にわたり供給網の自立と技術的優位性を確保する。"
 strategic_resource_security_goal_desc: "重要な原材料へのアクセスは、経済成長と軍事的な備えの両方の基盤となる。我々の陣営は、どの加盟国も資源を巡る強要にさらされないよう、十分な量の石油、ゴム、アルミニウムを共同で採掘しなければならない。"
 collective_cyber_defense_goal_desc: "デジタル時代において、暗号技術によるセキュリティは物理的な要塞と同様に不可欠です。すべての加盟国が高度な暗号化能力を習得することで、通信、情報、そして重要なインフラを保護することができます。"
 economic_powerhouse_goal_desc: "経済力は地政学的な影響力に直結する。我々の派閥のリーダーが高い一人当たりGDPを達成し、すべての加盟国が一定の基準値を上回れば、我々は無視できない経済圏となる。"
 faction_gdp_per_capita_target_tt: "Faction leader GDP per capita above 15 and all members above 5"
 faction_economic_integration_idea: "Economic Integration Pact"
 faction_economic_integration_idea_desc: "Through coordinated trade policies and reduced barriers, member states enjoy improved economic cooperation and faster development."