 arduous_march_modifiers_desc: "La Marcha Forzada ha cobrado un alto precio a nuestra nación. Para asegurar el futuro de nuestra gente, debemos implementar medidas estratégicas para superar este período de dificultades y llevar a nuestro país a la prosperidad. Esto incluye mejorar la producción agrícola, asegurar ayuda humanitaria y reformar nuestras políticas internas para garantizar estabilidad y crecimiento."
