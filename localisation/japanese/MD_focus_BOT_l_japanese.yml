 BOT_hire_extra_security: "Hire Extra Security"
 BOT_hire_extra_security_desc: "Stand up a permanent security detail to combat poaching. The programme runs until disbanded and carries an ongoing police-budget cost.\n§GThe chance of eliminating poachers increases by 10%§!"
 BOT_disband_extra_security: "Disband Extra Security"
 BOT_disband_extra_security_desc: "Stand down the extra security detail and end its upkeep."
 BOT_provide_heavy_weapons: "Provide Heavy Weapons"
 BOT_provide_heavy_weapons_desc: "Equip our security forces with heavy weapons and additional equipment as a standing programme. It runs until withdrawn and carries an ongoing personnel-budget cost.\n§GThe number of poachers eliminated increases by 5§!"
 BOT_withdraw_heavy_weapons: "Withdraw Heavy Weapons"
 BOT_withdraw_heavy_weapons_desc: "Pull the heavy weapons from our anti-poaching forces and end their upkeep."
 BOT_extra_security_program: "Extra Anti-Poaching Security"
 BOT_extra_security_program_desc: "A standing security detail dedicated to combating poaching. Raises the chance of eliminating poachers by 10% in exchange for a higher police budget."
 BOT_heavy_weapons_program: "Heavy Weapons for Rangers"
 BOT_heavy_weapons_program_desc: "Our anti-poaching forces field heavy weapons and additional equipment. Eliminates 5 more poachers each month in exchange for a higher personnel budget."