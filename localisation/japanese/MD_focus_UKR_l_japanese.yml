 UKR_territorial_defense_zapad: "領土防衛軍「西」リストを開く"
 UKR_territorial_defense_zapad_close: "領土防衛軍「西」リストを閉じる"
 UKR_territorial_defense_1: "§Y第100独立領土防衛旅団§!を創設！"
 UKR_territorial_defense_2: "§Y第104独立領土防衛旅団§!を創設！"
 UKR_territorial_defense_3: "§Y第103独立領土防衛旅団§!を創設！"
