 NKO_chinese_style_democracy: "Demokracja w stylu chińskim"
 NKO_chinese_style_democracy_desc: "Demokracja w stylu zachodnim nie jest w pełni zgodna z naszym kontekstem narodowym. Demokracja w stylu chińskim wydaje się być bardziej popularna."
