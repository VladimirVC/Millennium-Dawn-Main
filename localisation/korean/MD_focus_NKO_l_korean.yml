 NKO_increase_agricultural_tax: "농업 세율 인상"
 NKO_increase_agricultural_tax_desc: ""
 NKO_decrease_agricultural_tax: "농업 세율 인하"
 NKO_decrease_agricultural_tax_desc: "농업 세율을 인하하면 농민들은 더 행복해지겠지만, 우리의 수입은 줄어들게 될 것입니다."
 NKO_market_economy_system_pilot: "시장 경제 체계 시범"
 NKO_market_economy_system_pilot_desc: "우리는 선전, 상하이와 같은 시장 경제 시범 도시를 북한에 몇 군데 설립하여 시장이 안정적으로 운영되도록 하는 방법을 시험해 볼 필요가 있습니다."
 NKO_national_ownership_reform: "국유 체계 개혁"
 NKO_national_ownership_reform_desc: "국유화 제도는 이제 경제에 걸림돌이 되고 있습니다. 과감한 개혁이 필요합니다!"
 NKO_complementary_to_state_owned_economy: "국영 경제와 상호 보완"
 NKO_complementary_to_state_owned_economy_desc: ""
 NKO_jucheised_market_economy: "주체 시장 경제"
