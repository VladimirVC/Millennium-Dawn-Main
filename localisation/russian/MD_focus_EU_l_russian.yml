 tooltip_EU_budget_raise_min_call_rate_effect: "Ставка взноса бюджета ЕС, основанная на ВВП: добавить §C+0.05%§! (пт)\nОбщий инвестированный PP: добавить §Y[?global.EU_15_per_member_cost]§!\n[EU_parl_PG_party_1_icon], [EU_parl_PG_party_6_icon] и [EU_parl_PG_party_14_icon] будут §Rсопротивляться§! этому изменению.\n[EU_parl_PG_party_2_icon] и [EU_parl_PG_party_16_icon] будут §Gподдерживать§! это изменение.\n[EU_parl_PG_party_3_icon] и [EU_parl_PG_party_18_icon] будут §Gподдерживать§! это изменение.\n[EU_parl_PG_party_17_icon] будет §Gподдерживать§! это изменение.\n[EU_parl_PG_party_4_icon], [EU_parl_PG_party_5_icon] и [EU_parl_PG_party_19_icon] будут §Gподдерживать§! это изменение.\n[EU_parl_PG_party_20_icon], [EU_parl_PG_party_21_icon], [EU_parl_PG_party_22_icon] и [EU_parl_PG_party_23_icon] будут §Rсопротивляться§! этому изменению."
 tooltip_EU_budget_lower_min_call_rate_effect: "Ставка взноса бюджета ЕС, основанная на ВВП: добавить §C-0.05%§! (пт)\nОбщий инвестированный PP: добавить §Y[?global.EU_15_per_member_cost]§!\n[EU_parl_PG_party_1_icon], [EU_parl_PG_party_6_icon] и [EU_parl_PG_party_14_icon] будут §Gподдерживать§! это изменение.\n[EU_parl_PG_party_2_icon] и [EU_parl_PG_party_16_icon] будут §Rсопротивляться§! этому изменению.\n[EU_parl_PG_party_3_icon] и [EU_parl_PG_party_18_icon] будут §Rсопротивляться§! этому изменению.\n[EU_parl_PG_party_17_icon] будет §Rсопротивляться§! этому изменению.\n[EU_parl_PG_party_4_icon], [EU_parl_PG_party_5_icon] и [EU_parl_PG_party_19_icon] будут §Rсопротивляться§! этому изменению.\n[EU_parl_PG_party_20_icon], [EU_parl_PG_party_21_icon], [EU_parl_PG_party_22_icon] и [EU_parl_PG_party_23_icon] будут §Gподдерживать§! это изменение."
