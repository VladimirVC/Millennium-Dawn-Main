 NKO_chinese_style_democracy: "Une Démocratie à la Chinoise"
 NKO_chinese_style_democracy_desc: "La démocratie à l'occidentale n'est pas pleinement compatible avec notre contexte national. La démocratie à la chinoise semble plus populaire."
 NKO_allow_donju_to_join_WPK: "Autoriser le Donju à rejoindre le PTC"
 NKO_allow_donju_to_join_WPK_desc: "Le Donju sont simplement des hommes d'affaires qui exercent légalement leurs activités commerciales et paient des impôts conformément à la loi. Pourquoi ne peuvent-ils pas rejoindre le Parti du Travail de Corée ?"
 NKO_intra_party_democracy: "Démocratie Intra-Parti"
 NKO_intra_party_democracy_desc: ""
 NKO_agricultural_reform: "Réforme Agricole"
 NKO_agricultural_reform_desc: "L'agriculture collective en Corée du Nord est morte. La réformer est le meilleur moyen d'augmenter la production !"
