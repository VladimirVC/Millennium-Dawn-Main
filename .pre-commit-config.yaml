# Pre-commit configuration for Millennium Dawn HOI4 mod
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# !! DO NOT RUN `pre-commit run --all-files` !!
# The auto-fixer hooks (trailing-whitespace, end-of-file-fixer,
# mixed-line-ending, fix-byte-order-marker) will rewrite every matching file in
# the repo and produce hundreds of whitespace-only modifications unrelated to
# your actual work. Always scope runs to specific files:
#   pre-commit run --files path/to/file1 path/to/file2
# The normal `git commit` flow already runs hooks against just the staged
# files, which is what you want.
#
# MD-specific hooks (prefixed "MD") are set to stages: [manual] by default
# so they don't block external contributors. To run them:
#   pre-commit run --hook-stage manual           # all manual hooks
#   pre-commit run md-fix-styling --hook-stage manual  # single hook
#
# Team members can enable them on every commit by adding to .pre-commit-config.yaml
# (local override, don't commit):
#   default_stages: [pre-commit, manual]

# Global exclude. resources/ is a holding area for unintegrated submods and
# external contributions — its contents are not subject to MD style rules and
# must not be auto-modified by any hook. Any hook can still re-include a path
# inside resources/ by setting its own `files:` pattern explicitly.
exclude: '^resources/'

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '(^localisation/|\.secrets\.baseline$)'
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Asset-only directories (gfx/, map/, interface/, music/, sound/) are
      # excluded from the auto-fixers below — these files use significant
      # tab/whitespace alignment that the fixers shouldn't rewrite.
      - id: trailing-whitespace
        exclude: '\.mod$|^(gfx|map|interface|music|sound)/'
      - id: end-of-file-fixer
        exclude: '\.mod$|^(gfx|map|interface|music|sound)/'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.mod$|^(gfx|map|interface|music|sound)/'
      - id: check-yaml
        files: 'localisation/english/.*\.yml$'
      - id: check-json
        files: '\.json$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=100000']  # Prevent files larger than 100MB
      - id: check-case-conflict
      - id: check-executables-have-shebangs
        files: '^tools/'
      - id: check-shebang-scripts-are-executable
        files: '^tools/'
      - id: fix-byte-order-marker
        exclude: 'localisation/.*\.yml$|^(gfx|map|interface|music|sound)/'
      - id: check-ast
        files: '\.py$'
      - id: debug-statements
        files: '\.py$'
      - id: name-tests-test
        files: 'tools/.*test.*\.py$'
  # ruff owns lint (E/F), import order (I), and formatting. Config (select,
  # ignores, per-file-ignores, isort) lives in pyproject.toml.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        name: Lint Python (ruff)
        files: '^tools/.*\.py$'
        args: [--fix]
      - id: ruff-format
        name: Format Python (ruff)
        files: '^tools/.*\.py$'
  # pre-commit/mirrors-prettier was archived upstream — using rbubley's
  # maintained fork. Same prettier binary; current pin tracks prettier 3.8.x.
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        name: Format Markdown files
        files: '\.md$'
        args: [--prose-wrap=preserve, --print-width=120]
        additional_dependencies:
          - prettier@3.8.3
          - prettier-plugin-astro@0.14.1
      - id: prettier
        name: Format docs content YAML (Astro)
        types: [yaml]
        files: '^docs/.*\.yml$'
        args: [--print-width=120]
        additional_dependencies:
          - prettier@3.8.3
          - prettier-plugin-astro@0.14.1
  - repo: local
    hooks:
      - id: fix-localization-encoding
        name: Validate and fix HOI4 localization UTF-8 BOM
        entry: python3 tools/linting/validate_localization_encoding.py --fix
        language: system
        files: 'localisation/english/.*\.yml$|localisation/.*_l_english\.yml$'
        pass_filenames: true
      - id: fix-loc-yaml
        name: Fix localisation YAML issues (quotes, tabs, colon-space, key:0)
        entry: python3 tools/linting/fix_loc_yaml.py --fix
        language: system
        files: 'localisation/english/.*\.yml$|localisation/.*_l_english\.yml$'
        pass_filenames: true
      - id: check-mod-file-encoding
        name: Check .mod file UTF-8 encoding
        entry: python3 tools/linting/validate_mod_encoding.py
        language: system
        files: '\.mod$'
        pass_filenames: true
      - id: docs-link-syntax
        name: Check docs Markdown link syntax (no unclosed links)
        entry: python3 tools/docs_checks/check_link_syntax.py
        language: system
        files: '^docs/src/content/.*\.(md|mdx)$'
        pass_filenames: true
      # Runs the full tools test suite before push (not on every commit).
      # Enable with: pre-commit install --hook-type pre-push
      - id: tools-pytest
        name: Run tools test suite (pytest)
        entry: python3 -m pytest
        language: system
        files: '^tools/.*\.py$'
        pass_filenames: false
        stages: [pre-push]
      # --- MD-specific hooks (manual by default) ---
      - id: md-fix-styling
        name: MD Fix Styling (auto-fix spaces/tabs/braces)
        entry: python3 tools/linting/fix_styling.py --mode staged
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: false
        stages: [manual]
      - id: md-standardize
        name: MD Standardize (auto-fix ideas/events/decisions/focuses)
        entry: python3 tools/standardize_staged.py
        language: system
        files: '(common/national_focus|common/decisions|common/ideas|events)/.*\.txt$'
        pass_filenames: true
        stages: [manual]
      - id: md-validate-content
        name: MD Validate (commit-stage content validators, in parallel)
        # One process fans the run-on-commit validators out concurrently instead
        # of running ~8 separate hooks serially: ~3x faster on a content commit,
        # and the staged-file list is discovered once and shared via
        # MD_STAGED_FILES so none of them shells out to git. The expensive
        # cross-reference validators stay stages:[manual] below. Routing and the
        # per-validator --strict flags live in tools/precommit_validate.py;
        # tools/tests/precommit_validate_test.py pins coverage against drift.
        entry: python3 tools/precommit_validate.py --no-color
        language: system
        files: '\.(txt|yml)$'
        pass_filenames: true
      - id: check-common-mistakes
        name: MD Common Mistakes (threat scale, value ranges, always=no, etc.)
        entry: python3 tools/linting/check_common_mistakes.py --mode staged
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: false
      - id: md-validate-defines
        name: MD Validate defines against vanilla
        entry: python3 tools/validation/validate_defines.py --staged --strict --no-color
        language: system
        files: 'common/defines/.*\.lua$'
        pass_filenames: false
      - id: md-validate-unused-textures
        name: MD Validate unused textures (slow; manual)
        # Manual: full-repo scan is slow and currently reports ~22k legacy
        # unreferenced textures. CI runs it informationally (no --strict) so
        # the report is visible without gating PRs. Run before mod-size
        # cleanup passes:
        #   pre-commit run md-validate-unused-textures --hook-stage manual
        entry: python3 tools/validation/validate_unused_textures.py --no-color
        language: system
        files: '\.(gfx|asset|dds|tga|png)$'
        pass_filenames: false
        stages: [manual]
