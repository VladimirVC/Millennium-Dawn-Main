 NKO_naval_buildup_unlock_ready_tt: "The General Staff has prepared the Songun Naval File"
 NKO_naval_buildup_needs_point_tt: "Requires §Y1§! Naval Buildup Point"
 NKO_naval_modernization_unlocks_buildup_tt: "§YOpens§! the §HSongun Naval Doctrine§! buildup tracker. Three generation decisions accumulate Naval Buildup Points; four invest decisions spend them across the four tracks."
 NKO_naval_invest_submarine_tt: "Pushes the §HSubmarine Force§! track. Crossing §Y25§! / §Y50§! / §Y75§! / §Y100§! progress unlocks the next submarine modernization tier and fires a flavor event."
 NKO_naval_invest_missile_boat_tt: "Pushes the §HMissile Boat Flotillas§! track. Crossing §Y25§! / §Y50§! / §Y75§! / §Y100§! progress unlocks the next missile boat tier and fires a flavor event."
 NKO_naval_invest_coastal_defense_tt: "Pushes the §HCoastal Defense Network§! track. Crossing §Y25§! / §Y50§! / §Y75§! / §Y100§! progress unlocks the next coastal defense tier and fires a flavor event."
 NKO_naval_invest_specops_tt: "Pushes the §HNaval Special Operations§! track. Crossing §Y25§! / §Y50§! / §Y75§! / §Y100§! progress unlocks the next naval SF tier and fires a flavor event."
 NKO_naval_focus_submarine_track_tt: "§HSongun Naval Doctrine   Submarine Push§!\n• §G+3§! Naval Buildup Points\n• §G+15§! §YSubmarine Force§! progress (toward next tier)\n• Adds §HSubmarine Force Drill Momentum§! idea for §Y90§! days\n   §L+5% navy org, +5% navy max range, +10% navy XP gain§!\n• Sub Bureau unlocks MIO traits: §YSubmarine Production§! and §YCoating Materials§!\n• Tier flips at §Y25§!/§Y50§!/§Y75§!/§Y100§! progress check on the next §HInvest in the Submarine Force§! click\n• Fires the one-time §HDomestic Submarine Hulls Take Shape§! flavor event"
 NKO_naval_focus_strategy_tt: "§HSongun Naval Doctrine   Strategic Push§!\n• §G+5§! Naval Buildup Points\n• §G+5§! progress to §Yall four tracks§! (Submarine, Missile Boat, Coastal Defense, Naval SF)\n• Adds §HNaval Strategy Momentum§! idea for §Y180§! days\n   §L-10% naval doctrine cost, +15% navy XP gain, +5% navy org§!\n• Sub Bureau unlocks MIO trait: §YSupport Engine Department§!\n• Destroyer Bureau unlocks MIO trait: §YModern Heavy Armor§!\n• Tier flips happen on the next §HInvest§! click for each track once §Y25§!/§Y50§!/§Y75§!/§Y100§! is reached\n• Fires the one-time §HA Strategic Doctrine for the Sea§! flavor event"
 NKO_naval_focus_destroyer_buildup_tt: "§HSongun Naval Doctrine   Destroyer Buildup§!\n• §G+3§! Naval Buildup Points\n• §G+15§! §YMissile Boat Flotillas§! progress (toward next tier)\n• §G+5§! §YCoastal Defense Network§! progress\n• Adds §HMissile Boat Swarm Momentum§! idea for §Y90§! days\n   §L+5% naval speed, +10% naval strike attack, +10% navy XP gain§!\n• Destroyer Bureau unlocks MIO traits: §YHeavy Ship Production§! and §YSurvivability Investment§!\n• Tier flips happen on the next §HInvest§! click for each track once §Y25§!/§Y50§!/§Y75§!/§Y100§! is reached\n• Fires the one-time §HFirst Domestic Destroyers§! flavor event"
 NKO_naval_focus_destroyer_unleashed_tt: "§HSongun Naval Doctrine   Destroyer Unleashed§!\n• §G+5§! Naval Buildup Points\n• §G+20§! §YMissile Boat Flotillas§! progress (toward next tier)\n• §G+10§! §YCoastal Defense Network§! progress\n• Adds §HMissile Boat Swarm Momentum§! idea for §Y180§! days\n   §L+5% naval speed, +10% naval strike attack, +10% navy XP gain§!\n• Destroyer Bureau unlocks MIO traits: §YLand Combat Support§! and §YAnti-Air Batteries§!\n• Tier flips happen on the next §HInvest§! click for each track once §Y25§!/§Y50§!/§Y75§!/§Y100§! is reached\n• Fires the one-time §HDestroyer Squadrons Unleashed§! flavor event"
 NKO_naval_focus_missile_boat_track_tt: "If the §HSongun Naval Doctrine§! is unlocked: §G+3§! Naval Buildup Points and §G+10§! Missile Boat Flotilla progress, with any tier crossings firing their flavor events."
 NKO_naval_focus_coastal_defense_track_tt: "If the §HSongun Naval Doctrine§! is unlocked: §G+3§! Naval Buildup Points and §G+10§! Coastal Defense Network progress, with any tier crossings firing their flavor events."
 NKO_naval_focus_specops_track_tt: "If the §HSongun Naval Doctrine§! is unlocked: §G+3§! Naval Buildup Points and §G+10§! Naval Special Operations progress, with any tier crossings firing their flavor events."
 NKO_naval_capstone_news_tt: "Broadcasts a §Hmajor news event§!: §Y'Pyongyang's Sea Belt is Forged'§!   celebrated at home, noted abroad."
 NKO_unlock_naval_buildup: "Open the Songun Naval File"
 NKO_unlock_naval_buildup_desc: "The General Staff has a doctrine ready. Authorize the buildup and begin tracking points and progress across all four naval tracks."
 NKO_naval_allocate_party_funds: "Allocate Party Funds"
 NKO_naval_allocate_party_funds_desc: "Quietly redirect Party stipends into the naval program. A reliable trickle of resources, costing political capital."
 NKO_naval_mobilize_nampo_shipyards: "Mobilize Nampo Shipyards"
 NKO_naval_mobilize_nampo_shipyards_desc: "Tie up a civilian factory at Nampo for three months of overtime fabrication. The yards reward us with an extra burst of buildup points when the work concludes."
 NKO_naval_juche_drive: "Launch a Juche Naval Drive"
 NKO_naval_juche_drive_desc: "A national mobilization for the fleet. Stability suffers, war support climbs, and the program gains a flood of points. Requires a stable home front to sustain."
 NKO_naval_invest_submarine: "Invest in the Submarine Force"
 NKO_naval_invest_submarine_desc: "Spend one Naval Buildup Point to push the submarine track. Crews earn fresh navy experience as designs mature."
 NKO_naval_invest_missile_boat: "Invest in Missile Boat Flotillas"
 NKO_naval_invest_missile_boat_desc: "Spend one Naval Buildup Point to expand the missile boat program. Each cycle of refits sharpens our littoral strike."
 NKO_naval_invest_coastal_defense: "Invest in the Coastal Defense Network"
 NKO_naval_invest_coastal_defense_desc: "Spend one Naval Buildup Point to harden the coastline. Bunker crews and shore batteries gain experience."
 NKO_naval_invest_specops: "Invest in Naval Special Operations"
 NKO_naval_invest_specops_desc: "Spend one Naval Buildup Point to train Recon Bureau frogmen and naval infantry. Special forces sharpen their amphibious skills."
 NKO_naval_capstone_complete: "Forge the Sea Belt"
 NKO_naval_capstone_complete_desc: "All four tracks have reached their final tier. Declare the Songun Naval Doctrine complete and grant the country its lasting bonus."
 NKO_songun_navy_capstone: "Songun Naval Doctrine"
 NKO_songun_navy_capstone_desc: "Years of focused buildup have forged a coherent asymmetric navy. Long-range submarines, swarming missile boats, layered coastal defenses, and elite naval special forces now operate as one doctrine."
 NKO_sub_drill_momentum: "Submarine Force Drill Momentum"
 NKO_sub_drill_momentum_desc: "Recent drills have lifted morale and procedural discipline across the silent service."
 NKO_mb_swarm_momentum: "Missile Boat Swarm Momentum"
 NKO_mb_swarm_momentum_desc: "The flotillas are riding a wave of confidence after their latest exercises."
 NKO_cd_bunker_momentum: "Bunker Belt High Alert"
 NKO_cd_bunker_momentum_desc: "Coastal garrisons are at heightened readiness; engineers push fortification work at double pace."
 NKO_so_recon_momentum: "Recon Bureau Operating Tempo"
 NKO_so_recon_momentum_desc: "The Reconnaissance Bureau is running hot, frogman teams and naval SF cadres in constant rotation."
 NKO_naval_strategy_momentum: "Naval Strategy Momentum"
 NKO_naval_strategy_momentum_desc: "A unified strategic doctrine has galvanized every naval bureau. Research, training, and fleet organization all benefit from the renewed sense of purpose."
 NKO_sub_tier_1: "Sang-O Modernization"
 NKO_sub_tier_1_desc: "Refits and crew training across the Sang-O coastal submarine fleet."
 NKO_sub_tier_2: "Yono Midget Program"
 NKO_sub_tier_2_desc: "Yono-class infiltrators and improved sonar countermeasures extend our reach."
 NKO_sub_tier_3: "Romeo-Class Overhaul"
 NKO_sub_tier_3_desc: "Romeo hulls receive new electronics, batteries, and quieter propulsion."
 NKO_sub_tier_4: "Sinpo SLBM Program"
 NKO_sub_tier_4_desc: "The Sinpo-class submarine fields the Pukguksong family. Strategic range, real deterrence."
 NKO_mb_tier_1: "Komar Refits"
 NKO_mb_tier_1_desc: "Old Komar hulls receive new launchers and uprated engines."
 NKO_mb_tier_2: "Soju and Nongo Production"
 NKO_mb_tier_2_desc: "Domestic Soju and Nongo missile boats enter service in growing numbers."
 NKO_mb_tier_3: "Kumsong-3 ASCM Integration"
 NKO_mb_tier_3_desc: "Kumsong-3 anti-ship cruise missiles give our flotillas a credible long-range punch."
 NKO_mb_tier_4: "Wolfpack Doctrine"
 NKO_mb_tier_4_desc: "Coordinated swarm tactics: salvoed launches, layered ECM, and decoy boats."
 NKO_cd_tier_1: "Bunker Belt"
 NKO_cd_tier_1_desc: "A continuous chain of reinforced bunkers along the eastern and western coasts."
 NKO_cd_tier_2: "Mobile Coastal Artillery"
 NKO_cd_tier_2_desc: "Truck-mounted batteries shift between prepared positions to defeat counter-battery fire."
 NKO_cd_tier_3: "Fortified Headlands"
 NKO_cd_tier_3_desc: "Strategic headlands receive deep tunnels, hardened magazines, and integrated radars."
 NKO_cd_tier_4: "Shore-Based Anti-Ship Missiles"
 NKO_cd_tier_4_desc: "Mobile Kumsong launchers deny adversary fleets the right to approach our coast."
 NKO_so_tier_1: "Recon Bureau Frogmen"
 NKO_so_tier_1_desc: "Reconnaissance General Bureau frogman teams expand their training and equipment pool."
 NKO_so_tier_2: "Sea Sniper Brigade"
 NKO_so_tier_2_desc: "A dedicated sea sniper brigade specializes in rapid coastal raids."
 NKO_so_tier_3: "Maritime Light Infantry"
 NKO_so_tier_3_desc: "Light infantry battalions are reorganized with a maritime element for amphibious operations."
 NKO_so_tier_4: "Storm Corps Naval"
 NKO_so_tier_4_desc: "Storm Corps elements receive permanent naval attachments. Our spearhead reaches across any shore."
 nko_naval_buildup.1.t: "A Naval Doctrine for the New Era"
 nko_naval_buildup.1.d: "The General Staff has prepared a long-range plan: four parallel tracks, advanced through accumulated Naval Buildup Points. Three decisions generate points; four invest decisions spend them. Reach the final tier on every track to forge the Songun Naval Doctrine."
 nko_naval_buildup.1.a: "We will lead the program."
 nko_naval_buildup.11.t: "Sang-O Crews Step Up"
 nko_naval_buildup.11.d: "Refit yards clear a backlog of Sang-O hulls. Crews drill round the clock and confidence in the silent service grows."
 nko_naval_buildup.11.a: "Onward."
 nko_naval_buildup.12.t: "Yono Midgets Slip the Nets"
 nko_naval_buildup.12.d: "Yono-class infiltrators run successful exercises against our own coastal radars, slipping past detection lines that should have caught them."
 nko_naval_buildup.12.a: "A real edge."
 nko_naval_buildup.13.t: "Romeo Overhauls Bear Fruit"
 nko_naval_buildup.13.d: "Modernized Romeo boats now patrol farther and quieter than their original designers thought possible."
 nko_naval_buildup.13.a: "Excellent."
 nko_naval_buildup.14.t: "Sinpo Surfaces"
 nko_naval_buildup.14.d: "The Sinpo-class submarine surfaces on schedule, Pukguksong tubes fitted and tested. Strategic deterrence is no longer a dream."
 nko_naval_buildup.14.a: "Glory to the program."
 nko_naval_buildup.21.t: "Komar Refits Complete"
 nko_naval_buildup.21.d: "Aging Komar hulls leave the yards with new launchers, uprated engines, and surprisingly aggressive crews."
 nko_naval_buildup.21.a: "A fine start."
 nko_naval_buildup.22.t: "Soju and Nongo Flotillas Form"
 nko_naval_buildup.22.d: "The first dedicated Soju and Nongo flotillas form up. Faster, leaner, and far more dangerous than what came before."
 nko_naval_buildup.22.a: "Press on."
 nko_naval_buildup.23.t: "Kumsong-3 Goes to Sea"
 nko_naval_buildup.23.d: "Kumsong-3 anti-ship missiles complete their final shipboard tests. Our flotillas can now strike at ranges our enemies cannot easily counter."
 nko_naval_buildup.23.a: "Reach extended."
 nko_naval_buildup.24.t: "Wolfpack Doctrine Adopted"
 nko_naval_buildup.24.d: "Salvoed launches, layered jamming, and decoy boats: the wolfpack doctrine is formally adopted across the missile boat fleet."
 nko_naval_buildup.24.a: "The pack is ready."
 nko_naval_buildup.31.t: "Bunker Belt Complete"
 nko_naval_buildup.31.d: "A continuous chain of reinforced bunkers now spans both coastlines. Local commanders report that morale among the garrisons has noticeably improved."
 nko_naval_buildup.31.a: "Hold the line."
 nko_naval_buildup.32.t: "Mobile Coastal Artillery Deployed"
 nko_naval_buildup.32.d: "Truck-mounted batteries practice their shoot-and-scoot drills until they can clear a firing position before counter-battery shells arrive."
 nko_naval_buildup.32.a: "Disciplined work."
 nko_naval_buildup.33.t: "Fortified Headlands"
 nko_naval_buildup.33.d: "The most strategic headlands receive deep tunnels, hardened magazines, and integrated radars. Adversary planners now face a defended coast in earnest."
 nko_naval_buildup.33.a: "Iron coast."
 nko_naval_buildup.34.t: "Shore-Based Anti-Ship Missiles Online"
 nko_naval_buildup.34.d: "Mobile Kumsong batteries take up coastal positions. Any approach to our shores will pay a steep price."
 nko_naval_buildup.34.a: "Let them come."
 nko_naval_buildup.41.t: "Frogman Pool Expanded"
 nko_naval_buildup.41.d: "The Reconnaissance General Bureau quietly doubles its frogman intake and standardizes its dive equipment."
 nko_naval_buildup.41.a: "Build the cadre."
 nko_naval_buildup.42.t: "Sea Sniper Brigade Stands Up"
 nko_naval_buildup.42.d: "A dedicated sea sniper brigade is formally activated. Its first exercises against simulated coastal targets exceed expectations."
 nko_naval_buildup.42.a: "Sharpened."
 nko_naval_buildup.43.t: "Light Infantry Goes Maritime"
 nko_naval_buildup.43.d: "Selected light infantry battalions are reorganized with a maritime element. Amphibious doctrine moves beyond a handful of specialist units."
 nko_naval_buildup.43.a: "Across any shore."
 nko_naval_buildup.44.t: "Storm Corps Takes the Sea"
 nko_naval_buildup.44.d: "Storm Corps elements receive permanent naval attachments. Our spearhead is now a true sea-land force."
 nko_naval_buildup.44.a: "Strike anywhere."
 nko_naval_buildup.51.t: "Naval Drill at Wonsan"
 nko_naval_buildup.51.d: "The submarine flotilla at Wonsan has its quarterly drill on the books. Crews wait for orders before they cast off."
 nko_naval_buildup.51.a: "Press hard, make them sweat"
 nko_naval_buildup.51.b: "A measured, routine pace will do"
 nko_naval_buildup.51.c: "Cancel, fuel and parts are short"
 nko_naval_buildup.52.t: "Foreign Recon Vessel Sighted"
 nko_naval_buildup.52.d: "Coastal radar paints an unmarked vessel loitering inside our claimed waters. The shore commander wants a decision."
 nko_naval_buildup.52.a: "Intercept and turn it back"
 nko_naval_buildup.52.b: "Shadow it but do not engage"
 nko_naval_buildup.52.c: "Withdraw, avoid an incident"
 nko_naval_buildup.53.t: "Submarine Defection Crisis"
 nko_naval_buildup.53.d: "A junior officer aboard one of our patrol submarines has gone missing during a port call. The Reconnaissance Bureau wants authorization to act."
 nko_naval_buildup.53.a: "Send Storm Corps, recover or eliminate"
 nko_naval_buildup.53.b: "Track passively, no operation"
 nko_naval_buildup.53.c: "Bury the report"
 nko_naval_buildup.54.t: "Nampo Yards Exceed Quota"
 nko_naval_buildup.54.d: "Foremen at the Nampo shipyards report a quota-busting month. The workforce is energised but tired."
 nko_naval_buildup.54.a: "Reward them publicly with a bonus ration"
 nko_naval_buildup.54.b: "Demand more, the quota was always low"
 nko_naval_buildup.56.t: "Smuggler Vessel Caught"
 nko_naval_buildup.56.d: "A coastal patrol seizes a small vessel running contraband. The local commander asks how to handle the prize."
 nko_naval_buildup.56.a: "Parade it on television, propaganda win"
 nko_naval_buildup.56.b: "Quiet seizure, fold the cargo into stocks"
 nko_naval_buildup.56.c: "Take the captain's bribe and look away"
 nko_naval_buildup.60.t: "The Silent Service Walks Tall"
 nko_naval_buildup.60.d: "The Sinpo and her sisters return to port flying triumphant pennants. The Korean People's Navy submarine arm has come of age. A credible underwater force protecting the Fatherland."
 nko_naval_buildup.60.a: "The deep is ours."
 nko_naval_buildup.61.t: "Wolves of the Coast"
 nko_naval_buildup.61.d: "The Wolfpack doctrine is formally adopted across every flotilla. Salvoed launches, layered ECM, and decoy boats. Our littoral strike forces operate as one organism."
 nko_naval_buildup.61.a: "Loose the wolves."
 nko_naval_buildup.62.t: "The Iron Coast"
 nko_naval_buildup.62.d: "From Sinuiju to Wonsan, every approach is locked down with hardened bunkers, mobile artillery, and shore-launched anti-ship missiles. No fleet will close our coast unscathed."
 nko_naval_buildup.62.a: "The wall stands."
 nko_naval_buildup.63.t: "Storm Corps to Sea"
 nko_naval_buildup.63.d: "Storm Corps elements take their place in the maritime order of battle. The Reconnaissance Bureau, sea snipers, frogmen, and naval light infantry now form a single elite spearhead capable of striking any shore."
 nko_naval_buildup.63.a: "Strike anywhere."
 nko_naval_buildup.70.t: "A Strategic Doctrine for the Sea"
 nko_naval_buildup.70.d: "The General Staff's naval bureau ratifies a unified doctrine: layered submarines, swarming missile boats, fortified coasts, and naval commandos working in concert. Every yard, base, and training school now pulls in the same direction."
 nko_naval_buildup.70.a: "All hands to the program."
 nko_naval_buildup.71.t: "First Domestic Destroyers Slip Their Moorings"
 nko_naval_buildup.71.d: "The Nampo and Wonsan yards launch the first home-built missile destroyers in years. Crews swarm the new hulls, working up to operational status. The surface fleet feels alive again."
 nko_naval_buildup.71.a: "Send them to sea."
 nko_naval_buildup.72.t: "Domestic Submarine Hulls Take Shape"
 nko_naval_buildup.72.d: "Sub yards turn out new attack boats on a tight schedule. Crews trained on the older Sang-O and Romeo hulls are rotated into the new platforms, accelerating qualification."
 nko_naval_buildup.72.a: "Quietly, into the deep."
 nko_naval_buildup.73.t: "Destroyer Squadrons Unleashed"
 nko_naval_buildup.73.d: "A full destroyer squadron, built and crewed at home, deploys to the Eastern Fleet. Combined with the Wolfpack-trained missile boat flotillas, the surface order of battle becomes a serious deterrent."
 nko_naval_buildup.73.a: "Let the squadrons run."
 nko_naval_buildup.74.t: "A Modern Fleet Awakens"
 nko_naval_buildup.74.d: "The 2005-vintage destroyer hull and the 1995-class attack submarine enter our shipyards together, christened the §YChoe Hyon Class§! and §YSinpo Class§!. Five of each have been delivered to the stockpile, and dedicated production lines for both classes are already laid down at the Nampo and Wonsan yards   the §HSubmarine Bureau§! and §HSurface Ship Bureau§! taking direct charge.\n\nThe milestone unlocks the late-tier MIO traits in both bureaus: §YSea-To-Land Weapons§!, §YModern Materials§!, and §YRefined Submarine Design§! at the Sub Bureau, and §YOptimized Production§! and §YHigh Scale Radar Technology§! at the Surface Ship Bureau."
 nko_naval_buildup.74.a: "An era of steel begins."
 nko_naval_buildup.99.t: "Pyongyang's Sea Belt is Forged"
 nko_naval_buildup.99.d: "After years of focused effort, the Korean People's Navy completes the Songun Naval Doctrine. Long-range submarines, swarming missile boats, layered coastal defenses, and elite naval special forces operate as one. The asymmetric fleet is a fact."
 nko_naval_buildup.99.a: "The Sea Belt is forged."
 nko_naval_buildup.99.b: "Pyongyang's navy modernizes."
 NKO_naval_modern_fleet_milestone: "Commission the Modern Fleet"
 NKO_naval_modern_fleet_milestone_desc: "Both the Sinpo-class attack submarine and the Choe Hyon-class destroyer have reached production readiness. Commission the first five hulls of each into the Korean People's Navy, seed dedicated production lines, and award funds to both naval bureaus."
 NKO_more_arms_factories_desc: "The military industry cannot stand still. New arms factories will be built to keep the Korean People's Army supplied and the Songun line strong."
 NKO_spa_unlocked_tt: "§GUnlocks the §!§YSupreme People's Assembly§!§G mechanic.§!\nKeep §Yup to 2 of 8§! productivity mandates active at once; each suspends that domain's standing penalty and applies a 365-day buff, freeing its slot when it lapses. Each pick fires a §G3-event flavor chain§! and has a §G25%§! extra chance for a bonus event."
 NKO_spa_focus_lifts_industry_tt: "§GPermanently removes the §!§Y'Industrial Stagnation'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_production_tt: "§GPermanently removes the §!§Y'Production Line Decay'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_military_tt: "§GPermanently removes the §!§Y'Hollow Force'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_economy_tt: "§GPermanently removes the §!§Y'Resource Hoarding'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_research_tt: "§GPermanently removes the §!§Y'Research Stagnation'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_agriculture_tt: "§GPermanently removes the §!§Y'Subsistence Farming'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_foreign_tt: "§GPermanently removes the §!§Y'Diplomatic Isolation'§!§G standing penalty.§!"
 NKO_spa_focus_lifts_construction_tt: "§GPermanently removes the §!§Y'Construction Bottleneck'§!§G standing penalty (defensive infrastructure).§!"
 NKO_spa_bonus_chance_tt: "§GFires a 3-event flavor chain. §!§Y25%§!§G chance for an additional bonus event with extra rewards.§!"
 NKO_spa_domain_unlocked_tt: "§GThis domain's bonus is not currently active.§!"
 NKO_spa_picks_remaining_tt: "§GFewer than two mandates are active.§!"
 NKO_spa_umbrella: "Supreme People's Assembly"
 NKO_spa_umbrella_desc: "The Supreme People's Assembly lets you keep §Yup to two productivity mandates§! active at once. Each mandate suspends one of the eight chronic dysfunctions of central planning for §Y365 days§! and applies a productivity bonus on top; when one lapses its slot frees for another. Standing penalties can be permanently removed by completing matched focuses."
 NKO_spa_debuff_industry: "Industrial Stagnation"
 NKO_spa_debuff_industry_desc: "Decades of central allocation have left factories starved of inputs and skilled labor. Construction crawls."
 NKO_spa_debuff_production: "Production Line Decay"
 NKO_spa_debuff_production_desc: "Tooling is worn, supply chains improvised, and quality control is whatever the foreman feels like that morning."
 NKO_spa_debuff_military: "Hollow Force"
 NKO_spa_debuff_military_desc: "On paper the Korean People's Army is millions strong. In practice, training is theater and morale is brittle."
 NKO_spa_debuff_economy: "Resource Hoarding"
 NKO_spa_debuff_economy_desc: "Provincial cadres skim what flows through their districts. Centrally allocated resources arrive late, light, or not at all."
 NKO_spa_debuff_research: "Research Stagnation"
 NKO_spa_debuff_research_desc: "Sanctions, brain drain, and poor lab equipment mean that even basic technology takes the DPRK twice as long as anywhere else."
 NKO_spa_debuff_agriculture: "Subsistence Farming"
 NKO_spa_debuff_agriculture_desc: "Cooperative farms produce barely enough to feed their own villages. The cities run short."
 NKO_spa_debuff_foreign: "Diplomatic Isolation"
 NKO_spa_debuff_foreign_desc: "Sanctions and pariah status mean every diplomatic overture costs more than it should and yields less than it might."
 NKO_spa_debuff_construction: "Construction Bottleneck"
 NKO_spa_debuff_construction_desc: "Defensive engineering is the worst-affected sector. Forts crumble before they're finished, radar masts go up half-wired, naval bases sit half-dredged, and airfields are pitted from poor maintenance."
 NKO_spa_bonus_industry: "Industrial Acceleration"
 NKO_spa_bonus_industry_desc: "The Assembly has issued a binding industrial directive. Civilian factories rise faster, military complexes follow."
 NKO_spa_bonus_production: "Equipment Production Mandate"
 NKO_spa_bonus_production_desc: "Production lines run a planned overdrive cycle. Efficiency caps lift; new equipment ramps up faster."
 NKO_spa_bonus_military: "Songun Resolution"
 NKO_spa_bonus_military_desc: "Military-First is in season. Drill schedules tighten, attack doctrine sharpens, the Party reaffirms its priorities."
 NKO_spa_bonus_economy: "Juche Self-Reliance"
 NKO_spa_bonus_economy_desc: "A self-reliance push squeezes every gram out of the soil and the mines. Local resources flow."
 NKO_spa_bonus_research: "Research Drive"
 NKO_spa_bonus_research_desc: "All institutes work overtime; classified labs run round-the-clock shifts. Tech that took 800 days now takes a third of that."
 NKO_spa_bonus_research_half: "Research Drive (Diminishing Returns)"
 NKO_spa_bonus_research_half_desc: "The institutes still work overtime, but the easy gains are gone. With 1995-era technology already in hand, every further breakthrough costs more sweat for less reward. The bonus is halved."
 NKO_spa_bonus_research_quarter: "Research Drive (Frontier Plateau)"
 NKO_spa_bonus_research_quarter_desc: "Korea's labs are now at the technological frontier. With 2005-era tech already mastered, brute-force overtime delivers only modest acceleration. The bonus is reduced to a quarter of its original value."
 NKO_spa_bonus_agriculture: "Agricultural Drive"
 NKO_spa_bonus_agriculture_desc: "Cooperative farms over-deliver on quota. Civilian shortages ease and factories see a small output bump."
 NKO_spa_bonus_foreign: "Foreign Policy Directive"
 NKO_spa_bonus_foreign_desc: "Foreign Ministry envoys fan out. Improving relations is cheaper, trade partners look on us a little more kindly."
 NKO_spa_bonus_construction: "Construction Battalion"
 NKO_spa_bonus_construction_desc: "Mass-mobilized military engineering brigades descend on every defensive site. Forts, radars, SHORAD positions, airfields, naval bases, fuel silos, railways and supply hubs all rise at unprecedented pace."
 NKO_spa_resolution_industry: "Industrial Acceleration"
 NKO_spa_resolution_industry_desc: "Suspend §RIndustrial Stagnation§! for §Y365 days§!. While active: §G+45%§! civ factory speed, §G+30%§! mil factory speed, §G+10%§! civ factory output, §G+15%§! production efficiency start.\n\nFires a 3-event flavor chain (Five-Year Plan / Stakhanovite Heroes / Industrial Records)."
 NKO_spa_resolution_production: "Equipment Production Mandate"
 NKO_spa_resolution_production_desc: "Suspend §RProduction Line Decay§! for §Y365 days§!. While active: §G+30%§! production efficiency cap, §G+15%§! efficiency growth, §G+20%§! efficiency start.\n\nFires a 3-event flavor chain (New Tooling / Production Lines Hum / Quality Control Triumph)."
 NKO_spa_resolution_military: "Songun Resolution"
 NKO_spa_resolution_military_desc: "Suspend §RHollow Force§! for §Y365 days§!. While active: §G+15%§! army attack, §G+30%§! division training speed, §G+10%§! army morale, §G+5%§! army organisation.\n\nFires a 3-event flavor chain (Drills Intensify / Officer Corps Excels / Songun Triumphs)."
 NKO_spa_resolution_economy: "Juche Self-Reliance"
 NKO_spa_resolution_economy_desc: "Suspend §RResource Hoarding§! for §Y365 days§!. While active: §G+50%§! local resources, §G-15%§! production resource cost, §G+5%§! monthly population growth.\n\nFires a 3-event flavor chain (Mineral Surveys / Mining Output Rises / Self-Reliance Achieved)."
 NKO_spa_resolution_research: "Research Drive"
 NKO_spa_resolution_research_desc: "Suspend §RResearch Stagnation§! for §Y365 days§!. While active: §G+200%§! research speed - tech that took 800+ days completes in a fraction of the time.\n\nFires a 3-event flavor chain (Lab Doors Open / Crash Programs / Catching Up).\n\n§RPremium cost§!: this is the most expensive mandate, reflecting the resources required to break sanctions and brain drain."
 NKO_spa_resolution_agriculture: "Agricultural Drive"
 NKO_spa_resolution_agriculture_desc: "Suspend §RSubsistence Farming§! for §Y365 days§!. While active: §G-30%§! consumer goods, §G+15%§! civ factory output, §G+10%§! monthly population growth.\n\nFires a 3-event flavor chain (Spring Planting / Summer Tending / Bumper Harvest)."
 NKO_spa_resolution_foreign: "Foreign Policy Directive"
 NKO_spa_resolution_foreign_desc: "Suspend §RDiplomatic Isolation§! for §Y365 days§!. While active: §G-75%§! improve-relations cost, §G+30%§! trade opinion, §G+25%§! monthly opinion gain.\n\nFires a 3-event flavor chain (Diplomatic Overtures / Quiet Backchannels / Trade Concessions)."
 NKO_spa_resolution_construction: "Construction Battalion"
 NKO_spa_resolution_construction_desc: "Suspend §RConstruction Bottleneck§! for §Y365 days§!. Defensive & strategic infrastructure surge: §G+60%§! bunker / coastal bunker / radar / anti-air building speed, §G+55%§! air base / naval base / fuel silo speed, §G+50%§! railway / supply hub speed.\n\nFires a 3-event flavor chain (Vanguard Mobilizes / Sites Across the Republic / Projects Complete)."
 NKO_spa.0.t: "The Supreme People's Assembly Convenes"
 NKO_spa.0.d: "Comrade General Secretary, the Cabinet has prepared the agenda. The Assembly is gathered. Eight chronic problems demand attention; at any time we may keep §Yany two§! of them under binding mandate.\n\nEach mandate holds for §Y365 days§!; when one lapses, a slot frees for the next."
 NKO_spa.0.a: "Convene the Assembly."
 NKO_spa.20.t: "Stakhanovite Heroes"
 NKO_spa.20.d: "Workers in the Hwanghae industrial belt have shattered their quotas in the first weeks of the new directive. Their portraits are already going up across the country, and their managers report a surge of capacity that will be put to use right away."
 NKO_spa.20.a: "Reward the heroes."
 NKO_spa.21.t: "Tooling Innovation"
 NKO_spa.21.d: "Engineers at the Pyongyang Heavy Machine Plant have devised a new fixturing process that doubles throughput on the armoured vehicle lines. A surge run of 75 of the latest available chassis rolls out: tanks, IFVs, APCs, recon vehicles, or self-propelled guns, whichever line was loaded that week."
 NKO_spa.21.a: "Disseminate the technique."
 NKO_spa.22.t: "Hero of the Republic"
 NKO_spa.22.d: "A junior officer's exemplary leadership during the Songun drills has caught the General Staff's eye. Reservists are flocking to enlistment offices, inspired by the example."
 NKO_spa.22.a: "Promote and decorate."
 NKO_spa.23.t: "Mineral Discovery"
 NKO_spa.23.d: "Surveyors fanning out across the northern mountains have identified a previously unknown vein. Initial assays will determine which strategic resource the deposit yields. The State Resource Office has authorised immediate extraction."
 NKO_spa.23.a: "Begin extraction."
 NKO_spa.24.t: "Defection of a Foreign Scientist"
 NKO_spa.24.d: "An expatriate engineer has slipped past sanctions controls and into a DPRK research center. Their insights are accelerating one of the State Academy's priority programs."
 NKO_spa.24.a: "Welcome the comrade."
 NKO_spa.25.t: "Bumper Harvest"
 NKO_spa.25.d: "Cooperative farms in North Hamgyong are reporting yields well above quota. Grain reserves swell; rural recruitment offices fill with young farmhands looking for work in the army."
 NKO_spa.25.a: "Distribute the surplus."
 NKO_spa.26.t: "Diplomatic Coup"
 NKO_spa.26.d: "Foreign Ministry envoys have leveraged the new directive into a quiet diplomatic win - a back-channel concession from a major partner that translates into hard currency."
 NKO_spa.26.a: "Pocket the gains."
 NKO_spa.27.t: "Construction Vanguard"
 NKO_spa.27.d: "Volunteer construction battalions have outperformed every projection. With slack capacity left over, the cabinet offers the works to whichever civilian project is furthest behind schedule. Should the workforce not be available, the labour can be liquidated for hard currency instead."
 NKO_spa.27.factory_take: "Build a Civilian Factory."
 NKO_spa.27.factory_cash: "Liquidate the labour. (§Y+0.5§! treasury)"
 NKO_spa.27.offices_take: "Build an Office Building."
 NKO_spa.27.offices_cash: "Liquidate the labour. (§Y+0.75§! treasury)"
 NKO_spa.27.refinery_take: "Build a Synthetic Refinery."
 NKO_spa.27.refinery_cash: "Liquidate the labour. (§Y+0.45§! treasury)"
 NKO_spa.27.agri_take: "Build an Agriculture District."
 NKO_spa.27.agri_cash: "Liquidate the labour. (§Y+0.45§! treasury)"
 NKO_spa.30.t: "The Five-Year Plan Commences"
 NKO_spa.30.d: "Banners bloom across every factory gate. The Assembly has decreed that the next 365 days are a Five-Year Plan in miniature, with concrete production quotas for every industrial belt."
 NKO_spa.30.a: "Set the Plan in motion."
 NKO_spa.31.t: "Quotas Met Ahead of Schedule"
 NKO_spa.31.d: "Halfway through the directive, factories along the Taedong are reporting concrete pours and steel pours well above plan. Workers' brigades are competing for honors."
 NKO_spa.31.a: "Reward the leading brigades."
 NKO_spa.32.t: "Industrial Records Set"
 NKO_spa.32.d: "The directive ends with a triumphant rally in Kim Il-sung Square. New industrial slots have been added to the Republic's productive capacity, and Party prestige has surged."
 NKO_spa.32.a: "Celebrate the achievement."
 NKO_spa.33.t: "New Tooling Arrives"
 NKO_spa.33.d: "Through grey-market channels, replacement tooling has reached the equipment plants. Production foremen retrain shop floors against the new specs."
 NKO_spa.33.a: "Roll out the new tooling."
 NKO_spa.34.t: "Production Lines Hum"
 NKO_spa.34.d: "Output across the Pyongyang and Hamhung equipment belts is the smoothest it has been in a decade. Defect rates are falling, finish quality is rising."
 NKO_spa.34.a: "Push for further refinement."
 NKO_spa.35.t: "Quality Control Triumph"
 NKO_spa.35.d: "The Equipment Production Mandate ends with a state inspection that finds quality benchmarks at their highest in living memory. The KPA's procurement officers are pleased."
 NKO_spa.35.a: "Document the new standards."
 NKO_spa.36.t: "Drills Intensify"
 NKO_spa.36.d: "Songun is in season. Across every corps, drill tempo doubles. Live-fire exercises that had been paused for years restart."
 NKO_spa.36.a: "Drive the troops harder."
 NKO_spa.37.t: "Officer Corps Excels"
 NKO_spa.37.d: "A new generation of company- and battalion-grade officers has come into its own under the intensified training regime. Promotions ripple up the chain of command."
 NKO_spa.37.a: "Reward and promote."
 NKO_spa.38.t: "Songun Triumphs"
 NKO_spa.38.d: "The Songun Resolution closes with a Great Victory parade through Pyongyang. Reservist call-ups have refilled the ranks; the KPA stands at its strongest in years."
 NKO_spa.38.a: "March in formation."
 NKO_spa.39.t: "Mineral Surveys Begin"
 NKO_spa.39.d: "Geological survey teams fan out across the northern mountains. Old Soviet-era charts are dusted off and updated with modern instruments."
 NKO_spa.39.a: "Authorise the surveys."
 NKO_spa.40.t: "Mining Output Rises"
 NKO_spa.40.d: "The new surveys have steered miners to higher-grade veins. Coal, magnesite, and rare earth output are all up sharply."
 NKO_spa.40.a: "Press the advantage."
 NKO_spa.41.t: "Self-Reliance Achieved"
 NKO_spa.41.d: "The Juche Self-Reliance Mandate ends with foreign-currency reserves replenished by export sales. Comrade General Secretary, the Republic stands tall."
 NKO_spa.41.a: "Bank the reserves."
 NKO_spa.42.t: "Lab Doors Open"
 NKO_spa.42.d: "The State Academy of Sciences gets the call: every priority program is unlocked, every classified file accessible. Researchers who have been waiting years for clearance are read in overnight."
 NKO_spa.42.a: "Authorise the priorities."
 NKO_spa.43.t: "Crash Programs Bear Fruit"
 NKO_spa.43.d: "Several long-stalled programs across the State Academy achieve breakthroughs in rapid succession. The General Staff is briefed on whichever discipline turned the corner this time."
 NKO_spa.43.a: "Brief the General Staff."
 NKO_spa.44.t: "Catching Up"
 NKO_spa.44.d: "The Research Drive ends with the DPRK closer to the technological frontier than at any point since the 1970s. The Party celebrates a quiet triumph."
 NKO_spa.44.a: "Press the new advantage."
 NKO_spa.45.t: "Spring Planting Begins"
 NKO_spa.45.d: "Cooperative farms across the country mobilize for an aggressive planting season. Volunteer brigades from the cities reinforce the rural workforce."
 NKO_spa.45.a: "Mobilize the brigades."
 NKO_spa.46.t: "Summer Tending"
 NKO_spa.46.d: "Mid-season inspections show fields in better shape than they have been in years. Irrigation channels are flowing; pesticide stocks have arrived from China."
 NKO_spa.46.a: "Maintain the effort."
 NKO_spa.47.t: "Bumper Harvest"
 NKO_spa.47.d: "Yields come in 20% above plan. Grain reserves swell; for the first time in years some districts will see a full ration."
 NKO_spa.47.a: "Distribute the surplus."
 NKO_spa.48.t: "Diplomatic Overtures"
 NKO_spa.48.d: "DPRK delegations are quietly dispatched to friendly capitals, bearing favourable terms and discreet asks: Beijing, Moscow, Tehran, Damascus."
 NKO_spa.48.a: "Send the envoys."
 NKO_spa.49.t: "Quiet Backchannels"
 NKO_spa.49.d: "Several delegations return with under-the-table agreements: shell-company joint ventures, infrastructure loans, and quiet equity stakes from sympathetic foreign partners. Sanctions enforcement has been a little less rigorous than usual."
 NKO_spa.49.a: "Receive the deliveries."
 NKO_spa.50.t: "Trade Concessions"
 NKO_spa.50.d: "The Foreign Policy Directive ends with a cluster of new arrangements that significantly improve foreign capital inflows. Investment commitments are inked for the next decade."
 NKO_spa.50.a: "Sign the agreements."
 NKO_spa.51.t: "Construction Vanguard Mobilizes"
 NKO_spa.51.d: "The Construction Battalion Mandate is a windfall for whichever internal faction the Cabinet decides to credit. The Party can steer the political dividend to a faction whose cooperation it needs more than the others."
 NKO_spa.51.military: "Credit §YThe Military§!. (§G+15§! opinion)"
 NKO_spa.51.cadres: "Credit §YCommunist Cadres§!. (§G+15§! opinion)"
 NKO_spa.51.donju: "Credit §YThe Donju§!. (§G+15§! opinion)"
 NKO_spa.51.farmers: "Credit §YFarmers§!. (§G+15§! opinion)"
 NKO_spa.51.labour: "Credit §YLabour Unions§!. (§G+15§! opinion)"
 NKO_spa.51.none: "Take the political credit. (§G+25 PP§!)"
 NKO_spa.52.t: "Sites Across the Republic"
 NKO_spa.52.d: "Construction is underway in every province. Roads are graded, rail spurs welded, power lines re-strung. The kind of unglamorous infrastructure work that compounds for decades."
 NKO_spa.52.a: "Press the schedule."
 NKO_spa.53.t: "Projects Complete"
 NKO_spa.53.d: "The Construction Battalion Mandate closes with ribbon-cutting ceremonies broadcast across the Republic. The Party reaps the political dividend; the population is steadier; the treasury sees a small windfall from project surpluses."
 NKO_spa.53.a: "Cut the ribbons."
