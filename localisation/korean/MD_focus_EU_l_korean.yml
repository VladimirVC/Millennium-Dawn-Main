 EU_budget: "다음 회계 연도의 예산"
 EU_budget_mff_active: "다년간 재무 재표 체계"
 EU_budget_mff_active_desc: "현재의 다년간 재무 재표 체계"
 EU_budget_mff_draft: "다년간 재무 재표 체계 예산 계획안"
 EU_budget_mff_draft_desc: "다년간 재무 재표 체계에 대한 예산 계획안을 제안한 회원국은 협상이 끝날 때 예산 계획안을 유럽 의회의 안건으로 제출해야 합니다. 만약 이 예산 계획안이 통과가 되고 실제로 적용이 되면, 그 예산 계획안을 제안한 회원국은 보상으로 그들이 투자한 총 정치력을 받게 될 것입니다."
 EU_mff_draft_mission: "다년간 재무 재표 체계 협상"
 EU_mff_draft_mission_desc: "협상 기간 동안 모든 회원국들은 정치력을 사용하여 예산안의 초안을 변경할 수 있습니다. 초안의 변경은 예산안에 대한 유럽 의회 정당들의  관점에 영향을 미칠 것입니다."
