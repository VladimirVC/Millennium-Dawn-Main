 korea.50.t: "朝鮮半島の統一がついに達成された"
 korea.50.d: "長年の分断を経て、朝鮮半島はついに統一を果たし、世界史における歴史的瞬間を迎えた。かつて分断されていた北と南が、数十年にわたる政治的、経済的、そして文化的な相違を乗り越え、一つの統一国家として再び一つになった。この重大な出来事は、朝鮮半島の人々にとって平和、協力、そして繁栄の新しい時代の到来を意味し、東アジアおよび世界の地政学的情勢を再構築するものである。"
 korea.50.a: "万歳！！！"
 korea.51.t: "さらなる農場建設"
 korea.51.d: "朝鮮は朝鮮人民なくして偉大にはなれない。我々は飢饉を可能な限り早く解決することに集中しなければならない。"
 korea.51.a: "平壌の農業"
 korea.51.b: "黄海の農業"
 korea.51.c: "慈江の農業"
 korea.51.e: "咸鏡の農業"
 korea.52.t: "不足している補給ハブの強化"
 korea.52.d: "我々の偉大なる指導者は、さらなる鉄道と補給ハブを建設するための資金を提供し、我々に経済圏の野望に集中するか、戦争に備えて兵站を整えるかの選択を委ねた。"
 korea.52.a: "韓国側への補給"
 korea.52.b: "未来の経済圏への補給"
