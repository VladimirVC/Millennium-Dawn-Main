 JAP_monarchism: "Monarchist"
 JAP_great_east_japan_earthquake_shortcut: "Great East Japan Earthquake"
 JAP_article_nine_remove_flag: "Article 9 has been removed"
 JAP_usa_article_nine_accepted: "Accepted Article 9 Interpretation Change"
 JAP_tokyo_startup_special_zone: "Tokyo Startup Special Zone"
 JAP_tokyo_startup_special_zone_desc: "We will concentrate deregulation, venture support, and investment incentives in the Tokyo metropolitan area to foster startup creation and commercialization."
 JAP_tokyo_startup_special_zone_idea: "Tokyo Startup Special Zone"
 JAP_tokyo_startup_special_zone_idea_desc: "Tokyo has been designated as a special regulatory reform zone to support startups, venture capital, and new business formation. By concentrating deregulation, investment access, and commercialization support in the capital region, the government aims to turn limited reform into a visible engine of growth."
 JAP_kansai_medical_special_zone: "Kansai Medical Innovation Zone"
 JAP_kansai_medical_special_zone_desc: "We will create a special zone for medical, care, and life science innovation in Kansai, accelerating private investment and practical implementation."
 JAP_kansai_medical_special_zone_idea: "Kansai Medical Innovation Zone"
 JAP_kansai_medical_special_zone_idea_desc: "Kansai is being developed as a special zone for medical, care, and life science innovation through regulatory flexibility and focused investment."
 JAP_kyushu_logistics_special_zone: "Kyushu Logistics & Port Special Zone"
 JAP_kyushu_logistics_special_zone_desc: "We will streamline logistics and port procedures in Kyushu, strengthening trade flows and improving the efficiency of regional industry."
 JAP_kyushu_logistics_special_zone_idea: "Kyushu Logistics & Port Special Zone"
 JAP_kyushu_logistics_special_zone_idea_desc: "Kyushu has been designated as a logistics and port reform zone to improve trade efficiency and regional connectivity. Streamlined procedures, infrastructure prioritization, and regulatory easing are intended to strengthen export capacity and make the region a more attractive base for industry and commerce."
 JAP_expand_special_zones_nationwide: "Expand Special Zones Nationwide"
 JAP_expand_special_zones_nationwide_desc: "The results achieved in selected strategic zones will be scaled nationwide, turning regulatory reform from a limited exception into a broader growth framework."
 JAP_tokyo_startup_special_zone_active: "Executed §Y$JAP_tokyo_startup_special_zone$§!"
