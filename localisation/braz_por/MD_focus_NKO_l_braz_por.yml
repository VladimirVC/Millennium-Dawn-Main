 NKO_propose_north_led_unification_yo_jong: "Propor Unificação Liderada pelo Norte"
 NKO_propose_north_led_unification_yo_jong_desc: "É improvável que os líderes do Sul concordem com um acordo que os faria parecer removidos do poder e potencialmente punidos por suas ações passadas. Um governo de unidade entre o Norte e o Sul é a melhor maneira de perseguir a causa da reunificação coreana."
 NKO_propose_unity_government_yo_jong: "Propor Governo de Unidade"
 NKO_propose_unity_government_yo_jong_desc: "Do nosso justo sistema de bem-estar à nossa arma nuclear mais forte, está claro que o modelo norte-coreano é o caminho a seguir para a península coreana. Devemos insistir que devemos ser aqueles que lideram a Coreia em direção a um futuro poderoso, pós-reunificação."
 NKO_pave_the_way_for_reunification_yo_jong: "Preparar o Caminho para a Reunificação"
 NKO_pave_the_way_for_reunification_yo_jong_desc: "Agora que foram dados passos significativos em direção à normalização das relações intercoreanas, podemos começar a fazer preparativos para a reunificação."
