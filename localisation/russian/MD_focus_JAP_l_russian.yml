 JAP_diplomacy.11.t: "Запрос США о переинтерпретации статьи 9"
 JAP_diplomacy.11.d: "Правительство Соединённых Штатов обратилось к нам с официальным запросом о дальнейшем переинтерпретировании статьи 9 нашей Конституции. Вашингтон утверждает, что региональная безопасность ухудшилась настолько, что Япония должна взять на себя большую долю коллективной обороны. Принятие их запроса откроет дверь для более широкого понимания самообороны и более тесного военного сотрудничества, но это не обойдётся без внутренней полемики."
 JAP_diplomacy.11.a: "Принять запрос США"
 JAP_diplomacy.11.b: "Мы не можем принять этот запрос"
 JAP_diplomacy.12.t: "Япония отказывается переинтерпретировать статью 9"
 JAP_diplomacy.12.d: "Токио сообщил нам, что в настоящее время не готов к дальнейшей переинтерпретации статьи 9. Опасения по поводу общественного мнения, конституционных ограничений и политической стабильности привели японское правительство к отказу. Теперь нам нужно решить, уважать ли их решение или усилить дипломатическое и военное давление."
 JAP_diplomacy.12.a: "Уважим их решение"
 JAP_diplomacy.12.b: "Увеличим давление на Японию"
 JAP_diplomacy.13.t: "Япония соглашается на переинтерпретацию статьи 9"
 JAP_diplomacy.13.d: "Токио заявил о своей поддержке изменения уровня толкования статьи 9 и о намерении стать более активным партнером в сфере обороны."
 JAP_diplomacy.13.a: "Наконец-то"
 JAP_diplomacy.14.t: "Давление США на статью 9"
 JAP_diplomacy.14.d: "После нашего отказа расширить толкование статьи 9 Соединённые Штаты тихо начали усиливать дипломатическое и военное давление на наше правительство. Альянсные консультации, брифинги в СМИ и закулисные послания говорят об одном и том же: Вашингтон ожидает, что Япония возьмёт на себя больше ответственности. Мы можем стоять твёрдо или тихо скорректировать свою позицию."
 JAP_diplomacy.14.a: "Мы будем стоять твёрдо"
 JAP_diplomacy.14.b: "Тихо скорректируем позицию"
 JAP_diplomacy.15.t: "Япония принимает под давлением"
 JAP_diplomacy.15.d: "После периода обострённого дипломатического и стратегического давления Токио сообщил, что готов сблизиться с нашей позицией по статье 9. При этом публично утверждая, что пацифистские принципы Японии остаются неизменными, правительство теперь расширило толкование самообороны в соответствии с нашими ожиданиями."
 JAP_diplomacy.15.a: "Отлично"
 JAP_diplomacy.17.t: "Тарифы США на японские товары"
 JAP_diplomacy.17.d: "Соединённые Штаты объявили новый пакет тарифов, нацеленных на ключевой японский экспорт, ссылаясь на экономические дисбалансы и внутреннее политическое давление. Меры подаются как способ «выравнять условия», но в Токио это широко рассматривается как политически мотивированный шаг, который обострит как нашу экономику, так и более широкий альянс."
 JAP_diplomacy.17.a: "Нам придётся адаптироваться к этой новой реальности"
 JAP_diplomacy.18.t: "Япония просит отмены тарифов"
 JAP_diplomacy.18.d: "Токио официально попросил нас снять тарифы, введённые в отношении японских товаров. Японские представители намекают, что правительство может быть готово углубить сотрудничество в сфере безопасности и продвинуться дальше в оборонной политике в обмен. Мы должны решить, превратить ли этот экономический спор в стратегическую возможность или сохранить давление."
 JAP_diplomacy.18.a: "Снять тарифы в обмен на безопасность"
 JAP_diplomacy.18.b: "Отказать и оставить тарифы"
 JAP_diplomacy.19.t: "Тарифы сняты, требуются уступки по безопасности"
 JAP_diplomacy.19.d: "Соединённые Штаты согласились снять тарифы на японский экспорт, но только в рамках более широкого понимания по безопасности и обороне. На практике это означает, что Япония ожидает дальнейшего расширения толкования статьи 9, углубления военного сотрудничества с Вашингтоном и принятия большей роли в региональной безопасности."
 JAP_diplomacy.19.a: "Ради экономики и альянса мы примем это бремя"
 JAP_diplomacy.20.t: "США отказываются снять тарифы"
 JAP_diplomacy.20.d: "Наш официальный запрос об отмене тарифов США был отклонён. Вашингтон утверждает, что меры останутся в силе, ссылаясь на внутреннее политическое давление и неразрешённые разногласия по безопасности. Внутри страны растёт недовольство экспортёров и бизнес-лидеров, а стратеги предупреждают, что спор может ещё больше осложнить альянс."
 JAP_diplomacy.20.a: "Пока придётся вытерпеть давление"
 JAP_diplomacy.21.t: "Япония просит возобновления гарантий безопасности"
 JAP_diplomacy.21.d: "Японское правительство официально запросило возобновление или усиление гарантий безопасности от Соединённых Штатов. Токио утверждает, что региональная ситуация ухудшилась и что более чёткие обязательства США помогут стабилизировать положение. В частной беседе японские чиновники признают, что дальнейшие изменения толкования статьи 9 возможны, если Вашингтон готов дать явные гарантии."
 JAP_diplomacy.21.a: "Восстановить гарантии в обмен на более глубокие обязательства"
 JAP_diplomacy.21.b: "Отказать в продлении гарантий"
 JAP_diplomacy.22.t: "Гарантии безопасности восстановлены"
 JAP_diplomacy.22.d: "Соединённые Штаты согласились возобновить и уточнить свои гарантии безопасности Японии. В обмен Вашингтон ожидает, что Токио сделает дополнительные шаги по расширению толкования статьи 9 и возьмёт на себя большую долю региональной безопасности. Альянс становится сильнее, но внутренняя дискуссия о наших пацифистских принципах усилится."
 JAP_diplomacy.22.a: "Ради безопасности мы примем это обязательство"
 JAP_diplomacy.23.t: "США отказываются от более сильных гарантий"
 JAP_diplomacy.23.d: "Наш запрос о возобновлении или усилении гарантий безопасности был отклонён. Соединённые Штаты настаивают, что существующие договорённости достаточны и что внутренние политические ограничения не позволяют идти дальше. Внутри Японии этот отказ подпитает опасения по поводу нашей долгосрочной безопасности и надёжности альянса."
 JAP_diplomacy.23.a: "Тогда нам нужно пересмотреть собственный путь"
 JAP_diplomacy.24.t: "Япония просит прекратить морское давление США"
 JAP_diplomacy.24.d: "Токио официально запросил у нас сокращение или прекращение усиленного морского присутствия и давления вокруг ключевых морских путей и узлов. Японские официальные лица утверждают, что нынешняя позиция рискует эскалацией и подрывает внутреннюю поддержку альянса. В частном порядке они сообщают, что дальнейшие изменения толкования статьи 9 возможны, если мы ослабим свою позицию."
 JAP_diplomacy.24.a: "Прекратить морское давление в обмен на безопасность"
 JAP_diplomacy.24.b: "Сохранить наше давление вокруг Японии"
 JAP_diplomacy.25.t: "Морское давление ослаблено, обязательства углублены"
 JAP_diplomacy.25.d: "Соединённые Штаты согласились ослабить своё усиленное морское присутствие вокруг наших морских путей в обмен на более глубокие обязательства Японии по безопасности. На практике это означает ещё один шаг в расширении толкования статьи 9 и увеличении нашей роли в региональной безопасности. Альянс кажется сильнее, но внутренняя дискуссия о нашем пацифистском облике станет только жестче."
 JAP_diplomacy.25.a: "Ради стабильности мы соблюдём эту сделку"
 JAP_diplomacy.26.t: "США отказываются прекратить морское давление"
 JAP_diplomacy.26.d: "Наш запрос на ослабление или прекращение усиленного присутствия ВМС США вокруг наших морских путей был отклонён. Вашингтон настаивает, что нынешняя позиция необходима в свете региональных угроз. Дома этот отказ усилит как страхи вовлечения в более широкий конфликт, так и призывы ещё сильнее укрепить собственную оборону."
 JAP_diplomacy.26.a: "Тогда нам придётся адаптироваться под давлением"
 JAP_diplomacy.28.t: "Проблемы проектирования лунной «Кагуя»"
 JAP_diplomacy.28.d: "Амбициозная лунная миссия «Кагуя» сталкивается с серьёзными проблемами проектирования. Ключевые системы оказываются сложнее, чем ожидалось, от наведения и управления питанием до тепловой защиты. Инженеры утверждают, что дополнительные финансирование и время позволят переработать критические компоненты и повысить надёжность, но стоимость этого уже вызывает вопросы в кабинете министров."
 JAP_diplomacy.28.a: "Вложимся в перепроектирование и сохраним график"
 JAP_diplomacy.28.b: "Держим расходы под контролем и принимаем более длинный срок"
 JAP_diplomacy.29.t: "Уязвимости связи «Кагуя»"
 JAP_diplomacy.29.d: "По мере продолжения испытаний программа «Кагуя» выявляет слабые места в глубоко космических коммуникациях и каналах передачи данных. Целостность сигнала, пропускная способность и устойчивость к помехам все ниже целевых показателей. Специалисты предлагают новые антенны, модернизированные наземные станции и более надёжное шифрование, но эти улучшения потребуют дополнительных политических и финансовых ресурсов."
 JAP_diplomacy.29.a: "Модернизировать коммуникационную архитектуру"
 JAP_diplomacy.29.b: "Продолжить со старой системой и надеяться на лучшее"
 JAP_diplomacy.30.t: "Новые задержки миссии «Кагуя»"
 JAP_diplomacy.30.d: "Технические неурядицы, проблемы интеграции и конфликтующие сроки запуска инфраструктуры снова заставили отложить лунную миссию «Кагуя». Хотя основные системы остаются многообещающими, проект всё больше воспринимается как медленный и проблемный. Учёные настаивают, что терпение окупится, но внимание публики начинает ослабевать."
 JAP_diplomacy.30.a: "Принять задержку и двигаться к Луне"
 JAP_diplomacy.31.t: "«Кагуя» достигает лунной поверхности"
 JAP_diplomacy.31.d: "После лет доработок проекта, модернизации связи и трудных задержек миссия «Кагуя» наконец добилась успеха. Японское оборудование теперь работает на поверхности и вокруг Луны, передавая высококачественные изображения и бесценные научные данные. Это достижение демонстрирует высокотехнологические возможности Японии и открывает новые пути для развития спутников, дальнего космоса и стратегических космических приложений."
 JAP_diplomacy.31.a: "Отпразднуем «Кагую» как триумф японских технологий"
 jap_kaguya_satellite_invest_tt: "§GПотому что мы вложились в лучший дизайн корабля, мы получили:§!"
 jap_kaguya_rocketry_invest_tt: "§GПотому что мы вложились в лучшую связь с кораблём, мы получили:§!"
 JAP_diplomacy.32.t: "Аномалия программного обеспечения наведения"
 JAP_diplomacy.32.d: "Инженеры марсианской миссии сообщают о повторяющейся аномалии в программном обеспечении наведения. Хотя проблема пока не критична, она может перерасти в серьёзные ошибки навигации, если её не устранить. Тщательное исправление потребует ресурсов с других проектов и может повлиять на общий график."
 JAP_diplomacy.32.a: "Перенаправить ресурсы и решить это правильно"
 JAP_diplomacy.32.b: "Принять задержки и исправлять постепенно"
 JAP_diplomacy.33.t: "Название марсианской колонии"
 JAP_diplomacy.33.d: "Япония обеспечила постоянный плацдарм на Марсе. С вводом в строй модулей обитания и поселением первых долгосрочных экипажей наступает символическое решение: официальное имя и характер колонии."
 JAP_diplomacy.33.a: "«Аматэрасу», сияющий символ единства"
 JAP_diplomacy.33.b: "«Кагуцучи», пылающая индустриальная кузница"
 JAP_diplomacy.33.c: "«Цукуёми», спокойная обсерватория во тьме"
 JAP_diplomacy.33.e: "«Сусаноо», штурмовой боевой форпост"
 JAP_diplomacy.68.t: "Япония требует Сахалин"
 JAP_diplomacy.68.d: "Япония предъявила формальное требование о возвращении Сахалина. Принятие снизит напряжение, но будет воспринято как унизительная уступка."
 JAP_diplomacy.68.a: "Принять требование"
 JAP_diplomacy.68.b: "Отказать решительно"
 JAP_diplomacy.69.t: "Сахалин возвращён"
 JAP_diplomacy.69.d: "Москва приняла наше требование. Сахалин теперь находится под японской администрацией. Правительство представит это как доказательство возвращения имперского порядка."
 JAP_diplomacy.69.a: "Историческая корректировка"
 JAP_diplomacy.70.t: "Россия отказывается"
 JAP_diplomacy.70.d: "Москва отказалась выполнить наше требование по Сахалину. Мы можем проглотить обиду, испытать Россию ограниченным пограничным конфликтом или перейти к полной войне."
 JAP_diplomacy.70.a: "Пока отступить"
 JAP_diplomacy.70.b: "Развязать пограничную войну"
 JAP_diplomacy.70.c: "Объявить тотальную войну"
 JAP_diplomacy.71.t: "Япония требует Северные Курилы"
 JAP_diplomacy.71.d: "Япония предъявила формальное требование о возвращении Северных Курил. Принятие снизит напряжение, но будет воспринято как унизительная уступка."
 JAP_diplomacy.71.a: "Принять требование"
 JAP_diplomacy.71.b: "Отказать решительно"
 JAP_diplomacy.72.t: "Северные Курилы возвращены"
 JAP_diplomacy.72.d: "Москва приняла наше требование. Северные Курилы теперь находятся под японской администрацией. Правительство представит это как доказательство возвращения имперского порядка."
 JAP_diplomacy.72.a: "Историческая корректировка"
 JAP_diplomacy.73.t: "Россия отказывается"
 JAP_diplomacy.73.d: "Москва отказалась выполнить наше требование по Северным Курилам. Мы можем проглотить обиду, испытать Россию ограниченным пограничным конфликтом или перейти к полной войне."
 JAP_diplomacy.73.a: "Пока отступить"
 JAP_diplomacy.73.b: "Развязать пограничную войну"
 JAP_diplomacy.73.c: "Объявить тотальную войну"
 JAP_diplomacy.74.t: "Япония требует Южные Курилы"
 JAP_diplomacy.74.d: "Япония предъявила формальное требование о возвращении Южных Курил. Принятие снизит напряжение, но будет воспринято как унизительная уступка."
 JAP_diplomacy.74.a: "Принять требование"
 JAP_diplomacy.74.b: "Отказать решительно"
 JAP_diplomacy.75.t: "Южные Курилы возвращены"
 JAP_diplomacy.75.d: "Москва приняла наше требование. Южные Курилы теперь находятся под японской администрацией. Правительство представит это как доказательство возвращения имперского порядка."
 JAP_diplomacy.75.a: "Историческая корректировка"
 JAP_diplomacy.76.t: "Россия отказывается"
 JAP_diplomacy.76.d: "Москва отказалась выполнить наше требование по Южным Курилам. Мы можем проглотить обиду, испытать Россию ограниченным пограничным конфликтом или перейти к полной войне."
 JAP_diplomacy.76.a: "Пока отступить"
 JAP_diplomacy.76.b: "Развязать пограничную войну"
 JAP_diplomacy.76.c: "Объявить тотальную войну"
 JAP_diplomacy.77.t: "Токио предлагает соглашение"
 JAP_diplomacy.77.d: "После того как Курильские острова и Сахалин перешли под контроль Японии, Токио быстро приступил к превращению военных успехов в формальное урегулирование конфликта. Японские дипломаты обратились к Москве с предложением положить конец конфликту, утверждая, что война уже решила этот вопрос и дальнейшие боевые действия лишь отсрочат неизбежное.\nИх предложение предельно простое: мир в обмен на официальное признание Россией контроля Японии над Курильскими островами и Сахалином. По мнению Токио, это практическое соглашение, призванное стабилизировать регион и предотвратить дальнейшую эскалацию войны. Теперь решение за нами. Принять новую реальность и положить конец войне или отклонить предложение и продолжить борьбу."
 JAP_diplomacy.77.a: "Принять соглашение."
 JAP_diplomacy.77.b: "Отклонить. Война продолжается."
 JAP_diplomacy.78.t: "Соглашение принято"
 JAP_diplomacy.78.d: "Предложение принято, и орудия начинают затихать. Приказы отданы на разъединение, дипломатические каналы вновь открываются, и война сводится к набору пунктов и координат.\n\nСеверные острова передаются как цена мира, и каждой стороне теперь предстоит продать результат своей публике. Кампания заканчивается, но память о ней не исчезнет."
 JAP_diplomacy.78.a: "Пусть будет так. Пусть чернила заменят кровь."
 JAP_diplomacy.79.t: "Соглашение отклонено"
 JAP_diplomacy.79.d: "Ответ с другой стороны — твёрдое «нет». Не будет ни подписей, ни признания, ни передышки.\n\nТокио неверно оценило нашу решимость, и конфликт продолжится до тех пор, пока одна сторона не утратит способность сопротивляться. Если мир придёт, он будет навязан."
 JAP_diplomacy.79.a: "Тогда мы сражаемся дальше."
 JAP_diplomacy.80.t: "Москва ищет выход"
 JAP_diplomacy.80.d: "После японских успехов на севере российские дипломаты сигнализируют о готовности закончить бои прежде, чем ситуация станет ещё хуже. Посыл прагматичен: остановить кровотечение, заморозить линии и не допустить, чтобы война поглотила больше ресурсов, чем любая из сторон может оправдать.\n\nПредложение — это прямой мир, обмен продолжающейся эскалации на немедленное прекращение вражды. Нам предстоит решить, принять несовершенное урегулирование или продолжать накапливать преимущество."
 JAP_diplomacy.80.a: "Принять мир."
 JAP_diplomacy.80.b: "Нет. Мы продолжаем."
 JAP_diplomacy.81.t: "Токио принимает мир"
 JAP_diplomacy.81.d: "Япония соглашается на условия, выбрав окончание войны вместо её расширения. Решение непопулярно в частях страны, и цена ощущается дома, когда доверие падает, а общество задаётся вопросом, зачем вообще начался этот конфликт.\n\nБелый мир объявлен, и территориальные уступки оформляются. Поле боя затихает, но политическая цена сохранится."
 JAP_diplomacy.81.a: "Мы проглотим это и вытерпим."
 JAP_diplomacy.82.t: "Токио отказывается"
 JAP_diplomacy.82.d: "Япония отклоняет предложение и даёт понять, что не примет соглашение, написанное из слабости. Бои продолжатся, и ставки с каждой неделей растут.\n\nЕсли мир придёт, его не предложат. Его придётся взять."
 JAP_diplomacy.82.a: "Пусть будет так."
 JAP_unlock_sikhalin_raid_tt: "Открывает §Yрейд спецназа§! на §Y[Getname.691]§!"
 JAP_diplomacy.83.t: "Победа в Южных Курилах"
 JAP_diplomacy.83.d: "Японские войска одержали верх в Южных Курилах, вытеснив российские подразделения и захватив контроль над спорной территорией. Итог мал на карте, но громок по смыслу: Япония может взять то, что считает своим, и удержать под давлением.\n\nФлаг поднят, гарнизон закрепился, и Токио готовит следующий шаг. Москва этого не забудет."
 JAP_diplomacy.83.a: "Обезопасить острова."
 JAP_diplomacy.84.t: "Поражение в Южных Курилах"
 JAP_diplomacy.84.d: "Пограничный бой в Южных Курилах сложился не в нашу пользу. Российское сопротивление удержалось, и наши силы были вынуждены отойти под огнём, оставив вопрос суверенитета нерешённым и наше командование под прицелом.\n\nМы вынесли болезненные уроки. Следующая операция будет лучше спланирована, лучше снабжена и труднее остановима."
 JAP_diplomacy.84.a: "Учиться на поражении."
 JAP_diplomacy.85.t: "Неудача в Южных Курилах"
 JAP_diplomacy.85.d: "Российские войска не смогли удержать Южные Курилы перед решительным японским натиском. Немедленная тактическая потеря остра, а политический знак ещё острее: граница уязвима, и противник готов заплатить, чтобы её изменить.\n\nМоскве придётся решить, эскалировать ли конфликт или принять унизительный новый факт на земле."
 JAP_diplomacy.85.a: "Горький урок."
 JAP_diplomacy.86.t: "Южные Курилы удержаны"
 JAP_diplomacy.86.d: "Российские войска выиграли пограничный бой и закрепили Южные Курилы, отбросив японские части и восстановив контроль по линии. Операция демонстрирует готовность и способность быстро наказать нарушение.\n\nТокио может назвать это временной неудачей, но посыл ясен. Острова не будут сданы дёшево."
 JAP_diplomacy.86.a: "Удержать линию."
 JAP_diplomacy.87.t: "Победа в Северных Курилах"
 JAP_diplomacy.87.d: "Япония добилась прорыва в Северных Курилах, вынудив российские части отступить и оставив острова под нашим контролем. Операция доказывает, что даже отдалённый рельеф можно захватить, когда план, время и решимость совпадают.\n\nОккупация начинается немедленно. Транспорт идёт, укрепления растут, и северный рубеж переписывается действием."
 JAP_diplomacy.87.a: "Укрепиться и готовиться."
 JAP_diplomacy.88.t: "Поражение в Северных Курилах"
 JAP_diplomacy.88.d: "Северные Курилы выдержали нашу атаку. Бой был жесток, условия хуже, и российские силы сумели затормозить наше наступление и вынудить отступление.\n\nМы возвращаемся с опытом, оплаченный кровью и усталостью. В следующий раз мы придём не неподготовленными."
 JAP_diplomacy.88.a: "Мы адаптируемся."
 JAP_diplomacy.89.t: "Потеря в Северных Курилах"
 JAP_diplomacy.89.d: "Россия выбила нас из позиций в Северных Курилах после успешной японской операции. Потеря — не только территориальная, она психологическая: расстояние и погода больше не надёжная защита.\n\nТребуется ответ, но ответный удар несёт свои риски. Ситуация быстро ухудшается."
 JAP_diplomacy.89.a: "Это недопустимо."
 JAP_diplomacy.90.t: "Северные Курилы удержаны"
 JAP_diplomacy.90.d: "Российские силы отразили вторжение и удержали Северные Курилы, отбросив японские подразделения и восстановив контроль в тяжёлых условиях. Оборона закалила доктрину и повысила уверенность у командования.\n\nЕсли Япония хочет эти острова, ей придётся вложить гораздо больше, чем в пограничный бой."
 JAP_diplomacy.90.a: "Сохранять готовность."
 JAP_diplomacy.91.t: "Россия отвечает на Сахалине"
 JAP_diplomacy.91.d: "Японские действия на Сахалине вызвали немедленную реакцию Москвы. Российское руководство оформляет это как прямой вызов суверенитету и даёт понять, что больше не потерпит дальнейших продвижений без последствий.\n\nКризис сейчас разворачивается по двум путям: эскалация в открытую войну или принудительное давление с помощью экономических мер и морских ограничений. В любом случае градус уже выше спокойной дипломатии."
 JAP_diplomacy.91.a: "Это станет войной."
 JAP_diplomacy.91.b: "Удушим их эмбарго и блокадой."
 JAP_diplomacy.92.t: "Россия отвечает на захват Сахалина"
 JAP_diplomacy.92.d: "Сахалин сменил хозяина, и Москве теперь предстоит решить, как ответить на унижение так близко к дому. Война будет дорогой, но отказ от ответа откроет дверь для новых потерь и ослабит авторитет государства.\n\nРоссия может выбрать эскалацию и попытаться силой вернуть утраченный результат или согласиться на временный мир, который остановит бой, но потребует возврата Сахалина. Решение определит следующий этап конфликта."
 JAP_diplomacy.92.a: "Мы вернём это силой."
 JAP_diplomacy.92.b: "Навязать соглашение. Сахалин должен быть возвращён."
 JAP_diplomacy.94.t: "Токио требует протектората"
 JAP_diplomacy.94.d: "Формальная нота приходит из Японии, лишённая дипломатии и тяжёлая намерением. Сеулу предлагается выбор, поданный как стабильность: принять надзор Японии над внешней политикой и безопасностью, выровнять институты по направлению Токио и избежать разрушительного столкновения.\n\nПосыл ясен. Япония больше не просит сотрудничества, она диктует условия. Отказ будет воспринят как неповиновение, а неповиновение вызовет последствия."
 JAP_diplomacy.94.a: "У нас нет выбора, кроме как принять."
 JAP_diplomacy.94.b: "Отказаться. Корея не склонится."
 JAP_diplomacy.95.t: "Южная Корея сдаётся"
 JAP_diplomacy.95.d: "Сеул принимает условия, выбирая выживание вместо суверенитета. Соглашения подписаны под давлением, советники прибывают, и внешняя позиция государства складывается в стратегическую конструкцию Японии.\n\nВойна заканчивается, но начинается другой вид борьбы. Корея остаётся на карте, но её курс уже не свой."
 JAP_diplomacy.95.a: "Установить протекторат."
 JAP_diplomacy.96.t: "Южная Корея бросает вызов Токио"
 JAP_diplomacy.96.d: "Сеул отвергает ультиматум и заявляет, что его суверенитет не на продажу. Отказ превращает кризис из принуждения в конфронтацию, и Токио теперь имеет все основания утверждать, что проблему можно решить только силой.\n\nЕсли Япония хотела подчинения, она получила вызов вместо этого."
 JAP_diplomacy.96.a: "Тогда мы навяжем свою волю."
 JAP_diplomacy.97.t: "Токио выдвигает ультиматум Пхеньяну"
 JAP_diplomacy.97.d: "Япония направила ультиматум Пхеньяну, предлагая будущее сдерживания под надзором или будущее разрушения под бомбами. Условия прямы: уступить внешнюю политику и стратегическую автономию под направление Токио, принять контроль за мерами безопасности и подчиниться структуре, предназначенной не дать Северу снова стать угрозой.\n\nДля режима это унижение. Для Японии это управление риском. Вопрос в том, выберет ли Пхеньян выживание или неповиновение."
 JAP_diplomacy.97.a: "Принять. Сохранить государство любой ценой."
 JAP_diplomacy.97.b: "Отклонить. Мы не поддадимся."
 JAP_diplomacy.98.t: "Пхеньян сдаётся"
 JAP_diplomacy.98.d: "Против ожиданий Север принимает условия. Режим сохраняет свои символы, но свобода действий сломлена: японский надзор переписывает границы, безопасность и внешние связи.\n\nБои прекращаются, и северная половина полуострова становится контролируемым буфером. Угроза нейтрализована, и у Токио появляется рычаг, который ему не легко отпустить."
 JAP_diplomacy.98.a: "Установить протекторат."
 JAP_diplomacy.99.t: "Пхеньян бросает вызов Токио"
 JAP_diplomacy.99.d: "Пхеньян отвергает ультиматум и выбирает неповиновение, рассчитывая, что страх и эскалация защитят режим. Отказ превращает кризис в испытание воли, и Токио теперь имеет оправдание сказать, что Север можно усмирить только силой.\n\nПолуостров готовится к войне. Следующее сообщение будет не заметкой, а огнём."
 JAP_diplomacy.99.a: "Тогда мы сами уничтожим угрозу."
 JAP_diplomacy.101.t: "Токио требует подчинения Тайваня"
 JAP_diplomacy.101.d: "Япония направила в Тайбэй прямой запрос: принять протекторат и передать координацию внешней политики и обороны под надзор Токио или столкнуться с изоляцией и силой. Предложение упаковано как безопасность и стабильность, обещая защиту от внешних угроз в обмен на политическое послушание.\n\nЗа формальным языком скрывается простое сообщение. Остров слишком важен, чтобы оставить его независимым, и Япония намерена решать его будущее."
 JAP_diplomacy.101.a: "Принять условия. Избежать катастрофы."
 JAP_diplomacy.101.b: "Отклонить. Тайвань не подчинится."
 JAP_diplomacy.102.t: "Тайбэй принимает"
 JAP_diplomacy.102.d: "Тайвань принимает ультиматум, выбирая выживание и преемственность вместо открытого конфликта. Новые соглашения привязывают его внешнюю позицию к Японии, советники прибывают, а стратегические решения тихо смещаются в сторону Токио.\n\nВойна заканчивается, но суверенитет сужается до того, что позволяет протекторат. Остров остаётся, но его курс уже не полностью свой."
 JAP_diplomacy.102.a: "Установить протекторат."
 JAP_diplomacy.103.t: "Тайбэй отказывается"
 JAP_diplomacy.103.d: "Тайвань отвергает требование Японии и отказывается обменять автономию на обещание защиты. Решение превращает дипломатическое давление в кризис силы, и Токио теперь имеет основание утверждать, что остров можно обеспечить только завоеванием.\n\nПролив становится разломом. Следующий шаг будет не переговорами, а мобилизацией."
 JAP_diplomacy.103.a: "Тогда мы возьмём то, что нам нужно."
 JAP_diplomacy.105.t: "Токио требует протектората на Филиппинах"
 JAP_diplomacy.105.d: "Япония выдвинула Маниле требование, оставляющее мало места для недоразумений. Принять протекторат, согласовать внешнюю политику и оборонное планирование с Токио и разрешить японский контроль ключевых мер безопасности или столкнуться с последствиями отказа.\n\nПредложение подано как стабильность и защита, но его цель — контроль над морскими путями и воротами между океанами. Филиппины теперь должны выбрать между подчинением и противостоянием."
 JAP_diplomacy.105.a: "Принять. Сохранить нацию от уничтожения."
 JAP_diplomacy.105.b: "Отказаться. Нас не будут править из Токио."
 JAP_diplomacy.106.t: "Манила сдаётся"
 JAP_diplomacy.106.d: "Филиппинское правительство принимает условия Японии. Соглашения подписаны, советники прибывают, а внешняя позиция страны входит в японскую морскую конструкцию.\n\nБои заканчиваются, но цена — суверенитет. Архипелаг остаётся, но стратегические решения будут приниматься при наблюдении Токио."
 JAP_diplomacy.106.a: "Установить протекторат."
 JAP_diplomacy.107.t: "Манила бросает вызов Токио"
 JAP_diplomacy.107.d: "Филиппины отвергают ультиматум и отказываются обменять независимость на обещание защиты. Отказ превращает принуждение Японии в проверку силы, и Токио теперь имеет все оправдания заявить, что архипелаг должен быть обеспечен оружием.\n\nМорские пути сжимаются, флоты начинают демонстрировать мощь, и регион готовится к войне. Следующий шаг не будет дипломатическим."
 JAP_diplomacy.107.a: "Тогда мы захватим архипелаг."
 JAP_diplomacy.109.t: "Ультиматум проливов"
 JAP_diplomacy.109.d: "Японская нота приходит с спокойным тоном неизбежности. Куала-Лумпуру предлагается протекторат, который связывает внешнюю политику и координацию безопасности с направлением Токио, оправдывая это как цену стабильности в регионе, где морские пути и узлы решают выживание.\n\nЭто не просьба. Япония намерена командовать проливом, и от Малакки ожидают подчинения. Согласие обещает защиту, отказ вызывает полный вес морского принуждения."
 JAP_diplomacy.109.a: "Принять. Мы не можем бороться с потоком."
 JAP_diplomacy.109.b: "Отказаться. Наш суверенитет не продаётся."
 JAP_diplomacy.110.t: "Куала-Лумпур преклоняется перед Восходящим Солнцем"
 JAP_diplomacy.110.d: "Малайзия принимает условия, торгуя стратегической независимостью за немедленное выживание. Соглашения подписаны, представительства связи прибывают, и Токио получает ключи от коридоров, соединяющих два океана.\n\nВойна заканчивается, но цена ясна. Малайя остаётся целой, но её внешняя позиция теперь движется в тени Японии."
 JAP_diplomacy.110.a: "Установить протекторат."
 JAP_diplomacy.111.t: "Малайя отвергает Указ о проливах"
 JAP_diplomacy.111.d: "Малайзия отвергает ультиматум и отказывается позволить Токио диктовать своё будущее. Это решение превращает давление Японии в противостояние за самый ценный морской коридор региона.\n\nТокио не потерпит непокорности в проливах. Если Малайя не подчинится по договору, Япония будет добиваться подчинения силой."
 JAP_diplomacy.111.a: "Тогда мы захватим проливы."
 JAP_diplomacy.113.t: "Указ об архипелаге"
 JAP_diplomacy.113.d: "Токио предъявило требование Джакарте, направленное в самое сердце независимости Индонезии. Предложение представляет собой протекторатную структуру, передающую внешнюю политику и стратегическую безопасность под японский контроль, оправдывая это как единственный способ обеспечить стабильность на островных цепях, связывающих два океана.\n\nЯзык вежлив, но намерение абсолютно. Япония хочет видеть индонезийский архипелаг не как суверенного партнёра, а как управляемый коридор. Согласие означает безопасность под тенью, отказ — то, что тень станет бурей."
 JAP_diplomacy.113.a: "Примем. Мы не выдержим морской блокады."
 JAP_diplomacy.113.b: "Откажемся. Индонезия не будет управляемой."
 JAP_diplomacy.114.t: "Джакарта принимает Указ"
 JAP_diplomacy.114.d: "Индонезия принимает условия и подчиняется новой морской реальности. Японские миссии прибывают, чтобы контролировать координацию безопасности, права на базы и внешнее выравнивание, превращая архипелаг в управляемый коридор внутри стратегической сферы Токио.\n\nВойна заканчивается, но независимость сужается до разрешённого. Острова остаются индонезийскими формально, но их курс теперь определяется японской властью."
 JAP_diplomacy.114.a: "Установить протекторат."
 JAP_diplomacy.115.t: "Индонезия бросает вызов Указу об архипелаге"
 JAP_diplomacy.115.d: "Джакарта отвергает требование Японии и отказывается обменять суверенитет на обещания стабильности. Отказ превращает давление в противостояние, и Токио теперь рассматривает независимость Индонезии как препятствие, которое следует устранить, а не как факт, который стоит уважать.\n\nМоря вокруг архипелага накаляются. Если Индонезия не уступит по договору, Япония будет стремиться обеспечить соблюдение силой."
 JAP_diplomacy.115.a: "Тогда мы захватим коридоры."
 JAP_diplomacy.117.t: "Выбор Тонкина"
 JAP_diplomacy.117.d: "Токио предъявило требование Ханою, призванное закрепить Вьетнам в японском морском порядке. Предложение представляет собой протекторат почти что по сути: согласовать внешнюю политику, принять японский контроль за безопасностью и разрешить стратегический доступ, превращающий побережье Вьетнама в продолжение досягаемости Японии.\n\nСообщение преподносится как защита от больших хищников, но это также поводок. Вьетнам должен решить, принять ли выживание в условиях ограничения или сопротивляться и вызвать войну, которая развернётся вдоль его берегов."
 JAP_diplomacy.117.a: "Примем. Пока уступим."
 JAP_diplomacy.117.b: "Откажемся. Вьетнам не будет связан."
 JAP_diplomacy.118.t: "Ханой принимает условия Токио"
 JAP_diplomacy.118.d: "Вьетнам принимает ультиматум. Соглашения подписаны, прибывают офицеры связи, и Япония получает решающее влияние на внешнее выравнивание Вьетнама и его прибрежную безопасность.\n\nВойна заканчивается, но независимость сужается. Вьетнам остаётся, но его стратегическая позиция теперь движется в рамках, написанных в Токио."
 JAP_diplomacy.118.a: "Установить протекторат."
 JAP_diplomacy.119.t: "Ханой отвергает выбор Тонкина"
 JAP_diplomacy.119.d: "Вьетнам отвергает требование Японии и отказывается обменять суверенитет на обещание безопасности. Отказ превращает принуждение в противостояние, и Токио теперь рассматривает Вьетнам как барьер, который следует устранить из своего регионального проекта.\n\nПобережье становится линией фронта. Если Вьетнам не подчинится по договору, Япония будет стремиться добиться подчинения силой."
 JAP_diplomacy.119.a: "Тогда мы займём побережье."
 JAP_diplomacy.121.t: "Ультиматум Меконга"
 JAP_diplomacy.121.d: "Японская делегация прибывает с предложением, которое скорее напоминает вердикт, чем дипломатию. Камбодже предлагают защиту под контролем Токио, с координацией внешней политики и мерами безопасности, включёнными в региональную систему Японии.\n\nПодача — стабильность, инвестиции и безопасность от более сильных соседей. Реальность — подчинение. Пномпень должен выбрать, принять ли охраняемое будущее или рискнуть стать полем боя за отказ."
 JAP_diplomacy.121.a: "Согласиться. Выживание важнее."
 JAP_diplomacy.121.b: "Отказаться. Камбоджа не сдастся."
 JAP_diplomacy.122.t: "Пномпень принимает"
 JAP_diplomacy.122.d: "Камбоджа принимает условия и отдаёт стратегическую автономию, чтобы избежать войны, которую не сможет выиграть. Новые соглашения связывают страну с направлением Японии, и советники Токио быстро закрепляют ключевые министерства и точки доступа.\n\nБои заканчиваются, не успев начаться. Камбоджа остаётся формально суверенной, но её путь теперь ограничен японской мощью."
 JAP_diplomacy.122.a: "Установить протекторат."
 JAP_diplomacy.123.t: "Камбоджа отвергает ультиматум Меконга"
 JAP_diplomacy.123.d: "Пномпень отвергает требование Японии и отказывается сдавать своё будущее под внешнее надзор. Отказ превращает давление в противостояние, и Токио теперь рассматривает Камбоджу как слабое звено, которое нужно привести в порядок.\n\nДипломатия провалилась. Если Камбоджа не примет эту структуру, Япония будет пытаться навязать её силой."
 JAP_diplomacy.123.a: "Тогда мы заставим подчиниться."
 JAP_diplomacy.125.t: "Директива внутренней части Меконга"
 JAP_diplomacy.125.d: "Япония предъявило требование Вьентьяну, направленное на закрепление тихой глубины за берегом. Предложение представляет собой протекторатную структуру, связывающую Лаос с стратегическим направлением Токио и передающую координацию внешней политики и безопасности под японский надзор.\n\nПредложение подаётся как развитие и защита. Смысл ясен: коридоры, реки и границы будут управляться в интересах более широкой сферы Японии. Лаосу нужно решить, принять директиву или рискнуть сопротивлением."
 JAP_diplomacy.125.a: "Согласиться. Мы не можем стоять в одиночку."
 JAP_diplomacy.125.b: "Откажемся. Лаос не будет под диктовку."
 JAP_diplomacy.126.t: "Вьентьян принимает"
 JAP_diplomacy.126.d: "Лаос принимает условия Японии, выбирая выживание и стабильность вместо войны, которую он не потянет. Соглашения подписаны, созданы координационные офисы, и Лаос включается в региональную структуру Токио как контролируемый тыл.\n\nБои заканчиваются, но автономия сжимается. Лаос остаётся, но его стратегические выборы теперь движутся в пределах, установленных Японией."
 JAP_diplomacy.126.a: "Установить протекторат."
 JAP_diplomacy.127.t: "Лаос отвергает директиву"
 JAP_diplomacy.127.d: "Вьентьян отвергает требование Японии и отказывается сдавать своё будущее под внешний надзор. Отказ превращает принуждение в противостояние, и Токио теперь рассматривает Лаос не как партнёра, а как препятствие для контроля коридора.\n\nЕсли Лаос не примет эту структуру по договору, Япония будет стремиться навязать её силой."
 JAP_diplomacy.127.a: "Тогда мы заставим их подчиниться."
 JAP_diplomacy.129.t: "Ультиматум южного якоря"
 JAP_diplomacy.129.d: "Токио предъявило ультиматум Канберре, рассматривая Австралию не как далёчный континент, а как ключевую точку южного Тихого океана. Условия жёсткие: принять протекторат, согласовать внешнюю политику и оборонное планирование с Японией, и разрешить размещение баз и доступ, которые запрут южный Тихий океан в досягаемости Токио.\n\nПредложение замаскировано стабильностью и гарантированной безопасностью. В реальности это стратегическая капитуляция. Австралии нужно решить, принять ли жизнь в японской тени или готовиться оспаривать океан самостоятельно."
 JAP_diplomacy.129.a: "Согласиться. Мы не можем выиграть войну за Тихий океан."
 JAP_diplomacy.129.b: "Отказаться. Австралия не склонится."
 JAP_diplomacy.130.t: "Канберра принимает условия якоря"
 JAP_diplomacy.130.d: "Австралия принимает ультиматум Японии, выбирая немедленное выживание вместо континентальной войны, которую не сможет рисковать. Соглашения подписаны, стратегический доступ предоставлен, и Япония получает южный якорь, который позволит доминировать в более широком океане.\n\nПушки затихают, но баланс в Тихом океане меняется за одну ночь. Австралия остаётся на карте, но её стратегические решения теперь движутся в пределах, установленных в Токио."
 JAP_diplomacy.130.a: "Установить протекторат."
 JAP_diplomacy.131.t: "Австралия отвергает ультиматум"
 JAP_diplomacy.131.d: "Канберра отвергает требование Японии и отказывается передать независимость континента иностранному мандату. Отказ превращает давление Токио в прямой вызов, и Япония теперь рассматривает Австралию как последнее препятствие на пути к тихоокеанскому порядку под своим контролем.\n\nA contest for the ocean is unavoidable. If Australia will not accept the framework by treaty, Japan will attempt to impose it by force."
 JAP_diplomacy.131.a: "Тогда мы обеспечим юг силой."
 JAP_diplomacy.133.t: "Требование Тасмановой линии"
 JAP_diplomacy.133.d: "Токио предъявило требование Веллингтону, направленное на закрытие последнего открытого фланга в южном Тихом океане. Предложение представляет собой протекторатную структуру, связывающую внешнюю политику и оборонную позицию Новой Зеландии с направлением Японии, оправдывая это как цену стабильности в океане, который перестраивается силой.\n\nЯзык говорит о защите и партнёрстве, но структура — контроль. Новая Зеландия должна выбрать между ограниченным миром в японской тени или войной за независимость через море."
 JAP_diplomacy.133.a: "Согласиться. Мы выдержим и выживем."
 JAP_diplomacy.133.b: "Отказаться. Мы не будем поглощены."
 JAP_diplomacy.134.t: "Веллингтон принимает Тасмановую линию"
 JAP_diplomacy.134.d: "Новая Зеландия принимает условия Японии, меняя стратегическую автономию на прекращение враждебных действий. Соглашения подписаны, обеспечен доступ, и Токио получает надёжный южный форпост для формирования более широкого океана.\n\nВойна заканчивается, но независимость сужается. Новая Зеландия остаётся, но её внешнее положение теперь движется в пределах, очерченных в Токио."
 JAP_diplomacy.134.a: "Установить протекторат."
 JAP_diplomacy.135.t: "Веллингтон отвергает требование"
 JAP_diplomacy.135.d: "Новая Зеландия отвергает ультиматум Японии и отказывается сдавать своё будущее иностранному мандату. Отказ превращает давление в противостояние, и Токио теперь рассматривает независимость Веллингтона как угрозу своему южному периметру.\n\nThe Pacific hardens into front lines. Если Новая Зеландия не примет эту структуру по договору, Япония попытается навязать её силой."
 JAP_diplomacy.135.a: "Тогда мы займём южный форпост."
 JAP_diplomacy.137.t: "Ультиматум Ираватийских ворот"
 JAP_diplomacy.137.d: "Токио предъявило требование Найпьидо, направленное на закрепление Мьянмы как сухопутного моста между океанами. Условия представляют собой протекторат: согласовать внешнюю политику с Японией, принять японский надзор за безопасностью и предоставить доступ, необходимый для контроля коридоров от Бенгальского залива до Юго-Восточной Азии.\n\nПредложение преподносится как стабильность и развитие. Правда — стратегическое захват. Мьянма должна решить, принять ли контролируемый мир или столкнуться с войной, которая превратит её врата в поля боя."
 JAP_diplomacy.137.a: "Примем. Мы не выдержим этого давления."
 JAP_diplomacy.137.b: "Откажемся. Нас не сведут к коридору."
 JAP_diplomacy.138.t: "Мьянма принимает условия ворот"
 JAP_diplomacy.138.d: "Мьянма принимает ультиматум Японии, обменивая стратегическую автономию на прекращение враждебных действий и обещание порядка. Соглашения подписаны, связывающиеся миссии прибывают, и Япония получает решающую роль в внешнем выравнивании Мьянмы и её позиции безопасности.\n\nБои заканчиваются, но цена — суверенитет. Мьянма остаётся, но её врата теперь служат региональной конструкции, написанной в Токио."
 JAP_diplomacy.138.a: "Установить протекторат."
 JAP_diplomacy.139.t: "Мьянма отвергает ультиматум"
 JAP_diplomacy.139.d: "Найпьидо отвергает требование Японии и отказывается сдавать своё будущее под внешний надзор. Отказ превращает давление в противостояние, и Токио теперь считает Мьянму препятствием для контроля коридора, которое нужно привести в порядок.\n\nIf Myanmar will not accept the framework by treaty, Japan will seek to impose it by force. The gate will be secured one way or another."
 JAP_diplomacy.139.a: "Тогда мы займём ворота."
 JAP_diplomacy.141.t: "Ультиматум Северных нагорий"
 JAP_diplomacy.141.d: "Япония направила своё внимание на Качин, суровые северные нагорья, контролирующие перевалы, ресурсы и подходы к более широкой области. Требование Токио подаётся как защита и признание, но структура — это протекторат: согласоваться с Японией во внешних вопросах, принять надзор за безопасностью и позволить стратегический доступ, который закрепляет границу.\n\nДля Качина это выбор между номинальной автономией и реальным уничтожением. Согласие предлагает щит. Отказ приглашает войну, которая будет вестись в горах и деревнях."
 JAP_diplomacy.141.a: "Согласиться. Нам нужен покровитель ради выживания."
 JAP_diplomacy.141.b: "Отказаться. Мы не поменяем одного хозяина на другого."
 JAP_diplomacy.143.t: "Качин принимает японскую защиту"
 JAP_diplomacy.143.d: "Качин принимает условия, выбирая выживание и стабильность вместо боя, который он не сможет выдержать в одиночку. Соглашения подписаны, созданы представительства связи, и Япония получает твёрдую опору в северных нагорьях и их стратегических коридорах.\n\nКонфликт заканчивается, но свобода Качина сокращается до разрешённого. Горы остаются, но их будущее теперь связано с Токио."
 JAP_diplomacy.143.a: "Установить протекторат."
 JAP_diplomacy.144.t: "Качин отвергает ультиматум"
 JAP_diplomacy.144.d: "Качин отвергает требование Японии и отказывается подчиняться внешнему мандату. Отказ превращает принуждение в противостояние, и Токио теперь рассматривает нагорья как проблему безопасности, которую нужно решить силой.\n\nIf Kachin will not accept protection by treaty, Japan will impose control by arms. The mountains will not stay neutral."
 JAP_diplomacy.144.a: "Тогда мы займём нагорье."
 JAP_diplomacy.145.t: "Требование Шанского коридора"
 JAP_diplomacy.145.d: "Япония направила свои условия властям Уа, нацелившись на пограничные земли, через которые проходят контрабандные пути, горные перевалы и артерии внутренних районов. Предложение представлено как признание и защита, но это протекторат: согласовать внешнюю политику с Токио, принять японский надзор за безопасностью и предоставить доступ для закрепления коридора.\n\nДля Уа выбор жесток. Подчиниться и сохранить местную власть под новой крышей, или отказаться и столкнуться с войной, которая не пожалеет ни гор, ни милиций."
 JAP_diplomacy.145.a: "Примем. Лучше щит, чем уничтожение."
 JAP_diplomacy.145.b: "Откажемся. Мы не будем поглощены."
 JAP_diplomacy.146.t: "Уа принимает японскую защиту"
 JAP_diplomacy.146.d: "Уа принимает условия Японии, меняя стратегическую независимость на выживание и формальное признание под сильным покровителем. Прибывают группы связи, маршруты обеспечиваются, и пограничные земли включаются в региональную структуру Японии.\n\nБоевые действия заканчиваются, но автономия сужается. Уа сохраняет местную власть, но его внешнее направление теперь подчиняется Токио."
 JAP_diplomacy.146.a: "Установить протекторат."
 JAP_diplomacy.147.t: "Уа отвергает требование"
 JAP_diplomacy.147.d: "Уа отвергает ультиматум Японии и отказывается ставить свои территории под иностранный надзор. Отказ превращает давление в противостояние, и Токио теперь рассматривает пограничные земли как неконтролируемый разрыв в своей коридорной стратегии.\n\nЕсли Уа не примет эту структуру по договору, Япония наложит контроль силой. Горы будут оспорены."
 JAP_diplomacy.147.a: "Тогда мы обеспечим коридор."
 JAP_diplomacy.148.t: "Ультиматум Шанских ворот"
 JAP_diplomacy.148.d: "Япония предъявила своё требование властям Южного Шанского государства, нацелившись на нагорные маршруты, соединяющие глубинку с более широкой регионом. Предложение является рамками протектората: согласовать внешние связи с Токио, принять японский надзор за безопасностью и разрешить стратегический доступ для обеспечения дорог, перевалов и путей снабжения.\n\nПредложение обещает защиту и признание. Смысл же — контроль. Южный Шан должен решить, принять ли управляемое будущее под зонтом Японии или рискнуть войной, ведущейся по его холмам и долинам."
 JAP_diplomacy.148.a: "Примем. Мы не можем позволить себе уничтожение."
 JAP_diplomacy.148.b: "Откажемся. Нас не сведут к коридору."
 JAP_diplomacy.149.t: "Южный Шан сдаётся"
 JAP_diplomacy.149.d: "Южное Шанское государство принимает условия Японии. Создаются представительские офисы, маршруты обеспечиваются, и регион включается в стратегию коридора Токио как контролируемые ворота, а не как независимый актор.\n\nБои заканчиваются, но автономия сжимается. Местная власть остаётся, но стратегическое направление теперь отвечает перед Японией."
 JAP_diplomacy.149.a: "Установить протекторат."
 JAP_diplomacy.150.t: "Южный Шан отвергает ультиматум"
 JAP_diplomacy.150.d: "Южное Шанское государство отвергает требование Японии и отказывается ставить своё будущее под иностранный надзор. Отказ превращает давление в противостояние, и Токио теперь рассматривает регион как опасный разрыв в своём стратегическом периметре.\n\nЕсли Южный Шан не примет эту структуру по договору, Япония навяжет её силой. Ворота будут обеспечены."
 JAP_diplomacy.150.a: "Тогда мы займём ворота силой."
 JAP_diplomacy.151.t: "Мандат Салуина"
 JAP_diplomacy.151.d: "Япония обратила взгляд на государство Карен, где речные долины и пограничные маршруты могут открыть или закрыть южные подходы. Требование Токио подано как защита и признание, но это структура протектората: согласовать внешние связи с Японией, принять надзор за безопасностью и предоставить доступ, который закрепит коридор Салуина.\n\nПредложение обещает стабильность в регионе с разрозненной властью. Цена — послушание. Государство Карен должно выбрать между охраняемым миром под зонтом Японии или войной, которая выжжёт его переходы и поселения."
 JAP_diplomacy.151.a: "Принять. Мы доживём до завтра."
 JAP_diplomacy.151.b: "Отказаться. Нас не будут править."
 JAP_diplomacy.152.t: "Государство Карен сдаётся"
 JAP_diplomacy.152.d: "Государство Карен принимает условия Японии, обменивая стратегическую автономию на выживание и прекращение немедленного давления. Прибывают миссии связи, маршруты обеспечиваются, и регион входит в периметр Токио как контролируемый коридор, а не как независимый актор.\n\nКонфликт заканчивается, но границы свободы сжимаются. Власть Карен остаётся местной, но стратегическое направление теперь отвечает перед Японией."
 JAP_diplomacy.152.a: "Установить протекторат."
 JAP_diplomacy.153.t: "Государство Карен отклоняет мандат"
 JAP_diplomacy.153.d: "Государство Карен отвергает требование Японии и отказывается передать своё будущее под иностранный надзор. Отказ превращает принуждение в конфронтацию, и Токио теперь рассматривает переходы Салуина как стратегическую проблему, которую нужно решить силой.\n\nЕсли государство Карен не примет структуру по договору, Япония введёт её оружием. Коридор будет обеспечен."
 JAP_diplomacy.153.a: "Тогда мы займём переходы."
 JAP_diplomacy.154.t: "Требование за якорь Палау"
 JAP_diplomacy.154.d: "Токио направило своё требование на Палау, небольшое государство на большом куске океана. Условия поданы как защита и гарантированное процветание, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить права базирования, которые превратят Палау в императорский передовой якорь.\n\nПредложение обещает безопасность от политических и военных штормов. Цена — суверенитет. Палау должно выбрать между подчинением под Восходящим Солнцем и боем, который оно не выдержит против морской мощи великой державы."
 JAP_diplomacy.154.a: "Принять. Лучше протектор, чем могила."
 JAP_diplomacy.154.b: "Отказаться. Мы не уступим свою независимость."
 JAP_diplomacy.155.t: "Палау принимает японскую защиту"
 JAP_diplomacy.155.d: "Палау принимает условия Японии. Соглашения подписаны, доступ предоставлен, и острова становятся дисциплинированным узлом в сети портов и аэродромов Токио.\n\nКризис заканчивается без боя, но перемены реальны. Палау остаётся по названию, но его внешнее направление теперь следует японскому компасу."
 JAP_diplomacy.155.a: "Установить протекторат."
 JAP_diplomacy.156.t: "Палау отвергает требование"
 JAP_diplomacy.156.d: "Палау отвергает японский ультиматум и отказывается обменять суверенитет на обещания защиты. Отказ превращает давление Токио в вопрос силы, и Япония теперь рассматривает острова как незащищённый разрыв в своём океанском периметре.\n\nЕсли Палау не примет структуру по договору, Япония введёт контроль оружием. Якорь будет обеспечен."
 JAP_diplomacy.156.a: "Тогда мы займём якорную стоянку."
 JAP_diplomacy.157.t: "Ультиматум микронезийской цепи"
 JAP_diplomacy.157.d: "Япония выдвинула требование Микронезии, рассматривая острова не как разбросанные общины, а как цепочку опорных точек через центральный Тихий океан. Предложение подано как защита и инвестиции, но структура — это протекторат: согласовать внешнюю политику с Токио, принять надзор за безопасностью и предоставить доступ, который превращает острова в контрольные точки для флота и авиации Японии.\n\nСообщение простое. Эти воды будут организованы под одной властью. Микронезия должна выбрать между управляемым миром под зонтом Японии или столкновением, которое она не сможет выдержать."
 JAP_diplomacy.157.a: "Принять. Мы не можем противостоять приливу."
 JAP_diplomacy.157.b: "Отказаться. Мы не станем аванпостом."
 JAP_diplomacy.158.t: "Микронезия принимает цепочку"
 JAP_diplomacy.158.d: "Микронезия принимает условия Японии. Соглашения подписаны, доступ предоставлен, и острова становятся контролируемым коридором портов, аэродромов и наблюдательных узлов в морском периметре Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Микронезия остаётся, но её внешнее направление теперь следует японскому стратегическому компасу."
 JAP_diplomacy.158.a: "Установить протекторат."
 JAP_diplomacy.159.t: "Микронезия отвергает ультиматум"
 JAP_diplomacy.159.d: "Микронезия отвергает требование Японии и отказывается передать своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает цепь островов как разрыв в своей тихоокеанской сети, который нужно закрыть.\n\nЕсли Микронезия не примет структуру по договору, Япония введёт контроль силой. Цепочка будет обеспечена."
 JAP_diplomacy.159.a: "Тогда мы займём эти опорные точки."
 JAP_diplomacy.160.t: "Требование аванпоста Науру"
 JAP_diplomacy.160.d: "Токио направило требование Науру, рассматривая остров как фиксирующий штырь на карте, который всё ещё может обеспечить наблюдение, дозаправку и охват через открытое море. Предложение подано как защита и гарантированная поддержка, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, который превращает Науру в императорский аванпост.\n\nДля Науру выбор суров. Подчиниться и выжить под крылом большей державы или отказаться и рискнуть стать полем боя, подтверждающим правоту Японии."
 JAP_diplomacy.160.a: "Принять. Мы не можем стоять в одиночестве."
 JAP_diplomacy.160.b: "Отказаться. Нас не сведут к промежуточной точке."
 JAP_diplomacy.161.t: "Науру принимает японскую защиту"
 JAP_diplomacy.161.d: "Науру принимает условия Японии. Соглашения подписаны, доступ предоставлен, и остров становится небольшим, но важным узлом в тихоокеанской сети Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Науру остаётся, но его внешнее направление теперь следует японской стратегической линии."
 JAP_diplomacy.161.a: "Установить протекторат."
 JAP_diplomacy.162.t: "Науру отвергает требование"
 JAP_diplomacy.162.d: "Науру отвергает японский ультиматум и отказывается обменять независимость на обещания защиты. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает остров как незащищённый разрыв в своём океанском периметре.\n\nЕсли Науру не примет структуру по договору, Япония введёт контроль силой. Аванпост будет обеспечен."
 JAP_diplomacy.162.a: "Тогда мы займём остров."
 JAP_diplomacy.163.t: "Ультиматум экваториальной линии"
 JAP_diplomacy.163.d: "Япония выдвинула требование Кирибати, государства, разбросанного по экватору, как метки на карте навигатора. Предложение Токио подано как защита и развитие, но структура — это протекторат: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, превращающий Кирибати в цепочку контрольных точек для наблюдения и морского охвата.\n\nСообщение простое. В новом тихоокеанском порядке нет пустых пространств. Кирибати должно выбрать между подчинением под зонтом Японии или противостоянием державе, которая намерена владеть морскими путями."
 JAP_diplomacy.163.a: "Принять. Мы не можем противостоять новому хозяину океана."
 JAP_diplomacy.163.b: "Отказаться. Мы не будем поглощены империей."
 JAP_diplomacy.164.t: "Кирибати принимает экваториальную линию"
 JAP_diplomacy.164.d: "Кирибати принимает условия Японии. Соглашения подписаны, доступ предоставлен, и разбросанные атоллы становятся тихим, но ценным элементом тихоокеанской сети Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Кирибати остаётся, но его внешнее направление теперь следует японскому компасу."
 JAP_diplomacy.164.a: "Установить протекторат."
 JAP_diplomacy.165.t: "Кирибати отвергает ультиматум"
 JAP_diplomacy.165.d: "Кирибати отвергает японский ультиматум и отказывается передать своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает экваториальную цепь как разрыв в своём морском периметре.\n\nЕсли Кирибати не примет структуру по договору, Япония введёт контроль силой. Линия будет обеспечена."
 JAP_diplomacy.165.a: "Тогда мы займём цепь."
 JAP_diplomacy.166.t: "Требование бастиона атоллов"
 JAP_diplomacy.166.d: "Токио выдвинул требование Маршалловым островам, рассматривая атоллы как естественные форты, где могут размещаться аэродромы, логистика и средства контроля моря. Предложение подано как защита и гарантированная поддержка, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, который превращает Маршаллы в бастионы центрального тихоокеанского периметра Японии.\n\nСообщение ясно. Эти острова не останутся нейтральными точками на карте. Маршаллы должны выбрать между управляемым миром под зонтом Японии или войной, ведущейся за кораллы и ВПП."
 JAP_diplomacy.166.a: "Принять. Мы не выживем в осаде."
 JAP_diplomacy.166.b: "Отказаться. Мы не станем крепостью для другой державы."
 JAP_diplomacy.167.t: "Маршалловы острова сдаются"
 JAP_diplomacy.167.d: "Маршалловы острова принимают условия Японии. Соглашения подписаны, доступ предоставлен, и атоллы становятся дисциплинированными бастионами в океанской сети Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Маршаллы остаются, но их внешнее направление теперь следует плану Токио."
 JAP_diplomacy.167.a: "Установить протекторат."
 JAP_diplomacy.168.t: "Маршаллы отвергают требование"
 JAP_diplomacy.168.d: "Маршалловы острова отвергают японский ультиматум и отказываются передать своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает атоллы как незащищённый разрыв в своей центрально-тихоокеанской линии обороны.\n\nЕсли Маршаллы не примут структуру по договору, Япония введёт контроль силой. Бастионы будут обеспечены."
 JAP_diplomacy.168.a: "Тогда мы займём атоллы."
 JAP_diplomacy.169.t: "Ультиматум рифовой линии"
 JAP_diplomacy.169.d: "Япония предъявила требование Тувалу, тонкой цепочке рифов, которая всё ещё имеет значение в океане, измеряемом дальностью и пунктами дозаправки. Токио предлагает защиту и поддержку, но структура — это протекторат: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, который превращает Тувалу в контрольную точку в южном периметре Японии.\n\nСообщение жестоко в своей простоте. В оспариваемом Тихом океане не будет нейтральных островов. Тувалу должно выбрать между подчинением под зонтом Японии или противостоянием, которое утопит маленькое государство в войне великих держав."
 JAP_diplomacy.169.a: "Принять. Мы не выдержим шторма стали."
 JAP_diplomacy.169.b: "Отказаться. Мы не отдадим наш флаг."
 JAP_diplomacy.170.t: "Тувалу принимает японскую защиту"
 JAP_diplomacy.170.d: "Тувалу принимает условия Японии. Соглашения подписаны, доступ предоставлен, и острова становятся тихим узлом в морской сети Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Тувалу остаётся, но его внешнее направление теперь следует плану Токио."
 JAP_diplomacy.170.a: "Установить протекторат."
 JAP_diplomacy.171.t: "Тувалу отвергает ультиматум"
 JAP_diplomacy.171.d: "Тувалу отвергает японский ультиматум и отказывается обменять независимость на обещания защиты. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает рифовую линию как незащищённый разрыв в своей южной цепи.\n\nЕсли Тувалу не примет структуру по договору, Япония введёт контроль силой. Точка будет обеспечена."
 JAP_diplomacy.171.a: "Тогда мы займём острова."
 JAP_diplomacy.172.t: "Ультиматум соломоновой барьеры"
 JAP_diplomacy.172.d: "Токио предъявило требование Соломоновым островам, рассматривая цепь как естественный барьер, который может запечатать юго-западный Тихий океан. Предложение подано как защита и развитие, но структура — это протекторат: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить базы, которые превратят Соломоны в укреплённый экран морского периметра Японии.\n\nСообщение ясно. Эти острова либо будут служить порядку Японии, либо будут рассматриваться как вражеский плацдарм. Соломоны должны выбрать между подчинением под Восходящим Солнцем или войной, ведущейся через джунгли, аэродромы и узкие моря."
 JAP_diplomacy.172.a: "Принять. Мы не выживем под блокадой."
 JAP_diplomacy.172.b: "Отказаться. Мы не станем крепостью для другой империи."
 JAP_diplomacy.173.t: "Соломоны сдаются"
 JAP_diplomacy.173.d: "Соломоновы острова принимают условия Японии. Соглашения подписаны, доступ предоставлен, и цепь становится дисциплинированным барьером портов, аэродромов и патрульных зон под руководством Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Соломоны остаются, но их внешнее выравнивание теперь следует плану Токио."
 JAP_diplomacy.173.a: "Установить протекторат."
 JAP_diplomacy.174.t: "Соломоны отвергают ультиматум"
 JAP_diplomacy.174.d: "Соломоновы острова отвергают требование Японии и отказываются передать своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает цепь как опасный разрыв в своей юго-западной тихоокеанской сети.\n\nЕсли Соломоны не примут структуру по договору, Япония введёт контроль силой. Барьер будет обеспечен."
 JAP_diplomacy.174.a: "Тогда мы займём цепь."
 JAP_diplomacy.175.t: "Ультиматум бастиона Новой Гвинеи"
 JAP_diplomacy.175.d: "Япония предъявила требование Папуа-Новой Гвинее, рассматривая остров как континентальный бастион, который может доминировать на подходах между Юго-Восточной Азией и Тихим океаном. Предложение подано как защита и гарантированная поддержка, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить базы, которые превратят Новую Гвинею в крепость воздушной мощи, логистики и передовой обороны.\n\nПосыл оставляет мало сомнений. Япония намерена закрепить здесь южный театр. Папуа-Новая Гвинея должна выбрать между подчинением под щитом Японии или войной, которая превратит её берега и высокогорья в линии фронта."
 JAP_diplomacy.175.a: "Принять. Мы не можем позволить себе стать полем боя."
 JAP_diplomacy.175.b: "Отказаться. Нас не будут делать крепостью для другой державы."
 JAP_diplomacy.176.t: "Порт-Морсби принимает"
 JAP_diplomacy.176.d: "Папуа-Новая Гвинея принимает условия Японии. Соглашения подписаны, доступ предоставлен, и остров становится дисциплинированным бастионом в южном периметре Токио, построенном вокруг аэродромов, портов и логистических узлов.\n\nКризис заканчивается без боя, но суверенитет сужается. Папуа-Новая Гвинея остаётся, но её стратегическое направление теперь следует плану японской крепости."
 JAP_diplomacy.176.a: "Установить протекторат."
 JAP_diplomacy.177.t: "Папуа-Новая Гвинея отвергает ультиматум"
 JAP_diplomacy.177.d: "Папуа-Новая Гвинея отвергает требование Японии и отказывается передать своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает остров как ключевое препятствие на пути к обеспечению южного театра.\n\nЕсли Папуа-Новая Гвинея не примет структуру по договору, Япония введёт контроль силой. Бастион будет взят."
 JAP_diplomacy.177.a: "Тогда мы займём бастион."
 JAP_diplomacy.178.t: "Требование цепи Южного Тихого океана"
 JAP_diplomacy.178.d: "Токио предъявило требование Вануату, рассматривая острова как ещё одно звено цепи, которое может запечатать юго-западный Тихий океан. Предложение подано как защита и помощь в развитии, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, который превращает Вануату в контрольную точку для патрулей, дозаправки и регионального контроля.\n\nСообщение ясно. Япония строит периметр остров за островом. Вануату должно выбрать между управляемым миром под Восходящим Солнцем или столкновением, которое оно не сможет выдержать."
 JAP_diplomacy.178.a: "Принять. Мы не можем сражаться с империей на море."
 JAP_diplomacy.178.b: "Отказаться. Мы не будем поглощены."
 JAP_diplomacy.179.t: "Вануату принимает японскую защиту"
 JAP_diplomacy.179.d: "Вануату принимает условия Японии. Соглашения подписаны, доступ предоставлен, и острова становятся тихим, но полезным узлом в южном периметре Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Вануату остаётся, но его внешнее направление теперь следует японской стратегической линии."
 JAP_diplomacy.179.a: "Установить протекторат."
 JAP_diplomacy.180.t: "Вануату отвергает требование"
 JAP_diplomacy.180.d: "Вануату отвергает японский ультиматум и отказывается обменять независимость на обещания защиты. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает острова как незащищённый разрыв в своей юго-западной тихоокеанской цепи.\n\nЕсли Вануату не примет структуру по договору, Япония введёт контроль силой. Звено будет обеспечено."
 JAP_diplomacy.180.a: "Тогда мы займём острова."
 JAP_diplomacy.181.t: "Ультиматум ключевого камня Южного Тихого"
 JAP_diplomacy.181.d: "Япония предъявила требование Фиджи, рассматривая острова как узел, который может поддержать флотскую логистику и авиационные операции по широкой дуге Южного Тихого океана. Предложение подано как защита и гарантированная поддержка, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить базы, которые превратят Фиджи в ключевой камень южного периметра Японии.\n\nПосыл неоспорим. Япония не ищет друзей, она строит порядок. Фиджи должно выбрать между управляемым миром под зонтом Японии или противостоянием, которое решится морской мощью."
 JAP_diplomacy.181.a: "Принять. Мы не можем позволить себе стать примером."
 JAP_diplomacy.181.b: "Отказаться. Фиджи не подчинится."
 JAP_diplomacy.182.t: "Фиджи принимает условия ключевого камня"
 JAP_diplomacy.182.d: "Фиджи принимает японский ультиматум. Соглашения подписаны, доступ предоставлен, и острова становятся центральным узлом южнотихоокеанской сети Токио из портов, аэродромов и патрульных зон.\n\nКризис заканчивается без боя, но суверенитет сужается. Фиджи остаётся, но его внешнее направление теперь следует плану Токио."
 JAP_diplomacy.182.a: "Установить протекторат."
 JAP_diplomacy.183.t: "Фиджи отвергает ультиматум"
 JAP_diplomacy.183.d: "Фиджи отвергает требование Японии и отказывается передать своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает острова как последний разрыв в южном периметре, который намерено закрыть.\n\nЕсли Фиджи не примет структуру по договору, Япония введёт контроль силой. Ключевой камень будет обеспечен."
 JAP_diplomacy.183.a: "Тогда мы займём узел."
 JAP_diplomacy.184.t: "Ультиматум самоанской линии"
 JAP_diplomacy.184.d: "Токио предъявило требование Самоа, рассматривая острова как поворотный пункт между центральным Тихим океаном и южными подходами. Предложение подано как защита и гарантированная поддержка, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, превращающий Самоа в контрольную точку в расширяющемся океанском периметре Японии.\n\nСообщение прямое. Япония проводит линии по морю, и Самоа стоит на одной из них. Согласие предлагает безопасность под большей державой, отказ рискует стать уроком, который убедит других."
 JAP_diplomacy.184.a: "Принять. Мы выживем, даже если придётся подчиниться."
 JAP_diplomacy.184.b: "Отказаться. Самоа не склонится."
 JAP_diplomacy.185.t: "Самоа принимает японскую защиту"
 JAP_diplomacy.185.d: "Самоа принимает японский ультиматум. Соглашения подписаны, доступ предоставлен, и острова становятся тихим, но полезным узлом в тихоокеанской сети Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Самоа остаётся, но его внешнее направление теперь следует японской стратегической линии."
 JAP_diplomacy.185.a: "Установить протекторат."
 JAP_diplomacy.186.t: "Самоа отвергает ультиматум"
 JAP_diplomacy.186.d: "Самоа отвергает требование Японии и отказывается обменять независимость на обещания защиты. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает острова как незащищённый разрыв в своём океанском периметре.\n\nЕсли Самоа не примет структуру по договору, Япония введёт контроль силой. Линия будет обеспечена."
 JAP_diplomacy.186.a: "Тогда мы займём острова."
 JAP_diplomacy.187.t: "Требование тонганской короны"
 JAP_diplomacy.187.d: "Токио предъявило требование Тонге, королевству, чьи гавани и морские пути лежат на южной дуге Тихого океана. Предложение подано как защита и партнёрство, но это структура протектората: согласовать внешнюю политику с Японией, принять надзор за безопасностью и предоставить доступ, который превращает Тонгу в контрольную точку в расширяющемся морском периметре Японии.\n\nСообщение ясно. Япония строит океанский порядок, в котором нет места независимым разворотам. Тонга должна выбрать между охраняемым миром под японской тенью или противостоянием, решаемым флотами."
 JAP_diplomacy.187.a: "Принять. Мы сохраним корону, пусть и под тенью."
 JAP_diplomacy.187.b: "Отказаться. Тонга не подчинится."
 JAP_diplomacy.188.t: "Тонга принимает японскую защиту"
 JAP_diplomacy.188.d: "Тонга принимает условия Японии. Соглашения подписаны, доступ предоставлен, и королевство становится дисциплинированным узлом в южной сети Токио.\n\nКризис заканчивается без боя, но суверенитет сужается. Тонга остаётся, но её внешнее направление теперь следует японской стратегической линии."
 JAP_diplomacy.188.a: "Установить протекторат."
 JAP_diplomacy.189.t: "Тонга отвергает требование"
 JAP_diplomacy.189.d: "Тонга отвергает японский ультиматум и отказывается поставить своё будущее под иностранный надзор. Отказ превращает давление в конфронтацию, и Токио теперь рассматривает королевство как незащищённый разрыв в своей южной дуге.\n\nЕсли Тонга не примет структуру по договору, Япония введёт контроль силой. Точка будет обеспечена."
 JAP_diplomacy.189.a: "Тогда мы займём острова."
 JAP_diplomacy.190.t: "Уведомление Вашингтону: вывод из Тихого"
 JAP_diplomacy.190.d: "Токио направило Вашингтону официальное требование о передаче ключевых американских тихоокеанских островов. Посыл прям: иностранные плацдармы в океанском периметре Японии больше не терпимы, и эти форпосты должны быть уступлены, чтобы предотвратить дальнейшую эскалацию.\n\nТребование подано как шанс избежать войны, но это также проверка решимости. Принять и уступить опорные точки власти, или отказаться и рисковать превратить Тихий океан в поле боя между гигантами."
 JAP_diplomacy.190.a: "Принять передачу."
 JAP_diplomacy.190.b: "Отказаться. Тихий океан не их для претензий."
 JAP_diplomacy.191.t: "Вашингтон сдаёт форпосты"
 JAP_diplomacy.191.d: "Против ожиданий Соединённые Штаты принимают требование. Острова передаются, базы эвакуируются, и морской периметр Японии расширяется одним ударом.\n\nКризис заканчивается без войны, но смысл ясен. Великая держава отступила, и баланс в Тихом океане смещается в сторону Токио."
 JAP_diplomacy.191.a: "Обезопасить острова."
 JAP_diplomacy.192.t: "Вашингтон отказывается"
 JAP_diplomacy.192.d: "Соединённые Штаты отвергают требование Японии и отказываются уступить свои тихоокеанские плацдармы. Отказ превращает японский ультиматум в прямую конфронтацию держав, и у Японии теперь есть и оправдание, и мотив добиваться форпостов силой.\n\nТихий океан сжимается до линий фронта. Если эти острова не будут переданы по договору, их возьмут войной."
 JAP_diplomacy.192.a: "Тогда мы отнимем их силой."
 JAP_diplomacy.193.t: "Ультиматум Парижу: Тихий океан должен быть очищен"
 JAP_diplomacy.193.d: "Токио направило Парижу официальное требование передать тихоокеанские островные владения Франции. Нота обёрнута в вежливый язык, но её смысл неоспорим: далёкие империи больше не будут держать плацдармы внутри океанского периметра Японии.\n\nЯпония предлагает узкий путь избежать эскалации. Франция может уйти с чернилами и подписями, или отказаться и принять, что спор будет решаться флотами, а не дипломатами."
 JAP_diplomacy.193.a: "Принять передачу."
 JAP_diplomacy.193.b: "Отказаться. Францию не вытолкнут."
 JAP_diplomacy.194.t: "Париж выводит свои силы из Тихого"
 JAP_diplomacy.194.d: "Франция принимает требование Японии. Флаги спускают, гарнизоны выведите, и острова переходят под контроль Токио.\n\nКризис заканчивается без войны, но посыл раздаётся по всему миру. Япония не договаривается о сфере, она её обеспечивает."
 JAP_diplomacy.194.a: "Обезопасить острова."
 JAP_diplomacy.195.t: "Париж отказывается"
 JAP_diplomacy.195.d: "Франция отвергает ультиматум Японии и отказывается сдать свои тихоокеанские владения. Отказ превращает требование Токио в прямую конфронтацию, и у Японии теперь есть основание утверждать, что эти острова следует завоевать силой.\n\nОкеан становится уже, когда великие державы сталкиваются. Если Франция не отступит по договору, Япония попытается изгнать её войной."
 JAP_diplomacy.195.a: "Тогда мы займём их."
 JAP_diplomacy.196.t: "Уведомление Лондону: уступить тихоокеанское владение"
 JAP_diplomacy.196.d: "Токио направило Лондону официальное требование передать оставшееся тихоокеанское островное владение Британии. Нота говорит о региональной стабильности и конце далёкого вмешательства, но её цель ясна: Япония намерена очистить океан от чужих флагов, который теперь претендует патрулировать.\n\nБритании предлагают выбор между упорядоченным выводом и ненужной войной вдали от дома. Принять — и дело завершится на бумаге. Отказаться — и Тихий океан станет ещё одним театром, где империи проверяют волю друг друга."
 JAP_diplomacy.196.a: "Принять передачу."
 JAP_diplomacy.196.b: "Отказаться. Британию не выдавят."
 JAP_diplomacy.197.t: "Лондон отступает"
 JAP_diplomacy.197.d: "Соединённое Королевство принимает требование Японии. Территория передаётся, флаг спускается, и Токио добавляет ещё один кусок к своему принудительному морскому периметру.\n\nКризис заканчивается без войны, но символика тяжела. Старая морская держава уступила землю, и притязания Японии на Тихий океан становятся смелее с каждой уступкой."
 JAP_diplomacy.197.a: "Обезопасить территорию."
 JAP_diplomacy.198.t: "Лондон отвергает требование"
 JAP_diplomacy.198.d: "Великобритания отвергает ультиматум Японии и отказывается сдать своё тихоокеанское владение. Отказ превращает требование Токио в прямой вызов, и у Японии теперь есть и мотив, и предлог захватить территорию силой.\n\nДипломатия исчерпала себя. Если Британия не отступит по договору, Япония попытается убрать её войной."
 JAP_diplomacy.198.a: "Тогда мы займём это."
 JAP_diplomacy.199.t: "Японские каналы расширяются в Пхеньяне"
 JAP_diplomacy.199.d: "Японская политика в отношении Севера вступила в новую фазу. Через посредников, разведывательные контакты и тщательно управляемое давление Токио открыло каналы внутри нашей политической среды, которые прежде были ограничены или закрыты.\n\nЭто не означает доверия и не означает согласия. Это означает, что у Японии теперь есть временная возможность влиять на решения, воздействовать на фракции и испытывать нашу решимость как изнутри, так и извне."
 JAP_diplomacy.199.a: "Мы будем внимательно следить за этими каналами."
 JAP_diplomacy.200.t: "Сахалин и Курилы потеряны"
 JAP_diplomacy.200.d: "Российские войска вновь полностью взяли под контроль Сахалин и Курильские острова, отменив все достижения кампании. Операция провалилась, и Токио больше не может поддерживать усилия. Единственный оставшийся вариант — перемирие.\n\nПровал повлечёт за собой последствия. Доверие общественности к военной оценке правительства пошатнулось, и политическая цена этой авантюры будет ощущаться годами."
 JAP_diplomacy.200.a: "У нас нет выбора, кроме как принять поражение."
 JAP_failed_sakhalin_war: "Последствия войны за Сахалин"
 JAP_failed_sakhalin_war_desc: "Провал военной кампании за Сахалин и Курильские острова оставил глубокие шрамы на политической сцене Японии. Доверие к стратегической компетентности правительства подорвано, военный дух пострадал, а дипломатические последствия продолжают ограничивать внешнеполитические возможности Токио."
 JAP_mars_colony1: "Колония Марс «Аматэрасу»"
 JAP_mars_colony1_desc: "Названная в честь Аматэрасу, богини солнца, освещающей небеса, колония Марс «Аматэрасу» стала сияющим символом единства и лидерства Японии. Её присутствие вдохновляет уверенность дома и уважение за рубежом."
 JAP_mars_colony2: "Колония Марс «Кагуцучи»"
 JAP_mars_colony2_desc: "Названная в честь Кагуцучи, бога огня, колония Марс «Кагуцучи» построена вокруг печей, перерабатывающих заводов и тяжёлой промышленности. Её задача понятна: превращать марсианскую руду и энергию в силу для японских заводов."
 JAP_mars_colony3: "Колония Марс «Цукуёми»"
 JAP_mars_colony3_desc: "Названная в честь Цукуёми, бога луны и ночи, колония Марс «Цукуёми» служит тихой обсерваторией и исследовательским комплексом. Из её лабораторий и приборов данные поступают обратно в Японию, углубляя научное понимание."
 JAP_mars_colony4: "Колония Марс «Сусаноо»"
 JAP_mars_colony4_desc: "Названная в честь Сусаноо, бога штормов, колония Марс «Сусаноо» оформлена как суровый форпост на границе. Учебные полигоны и экспериментальные полигоны делают её горнилом для японских вооружённых сил и доктрин."
 JAP_american_pressure_article_nine: "Под давлением американских тарифов"
 JAP_JP_USA_SOFA_1: "Рамочное соглашение SOFA между США и Японией"
 JAP_JP_USA_SOFA_1_desc: "Силы США в Японии действуют в рамках Соглашения о статусе пребывания войск, которое защищает большинство военнослужащих от японских судов и налогов и даёт США широкий контроль над своими базами. Местная полиция, губернаторы и жители вынуждены жить в условиях правил, согласованных в Вашингтоне и Токио, и каждая жалоба на преступление, аварию или шум возле базы проходит через процедуры SOFA, прежде чем Япония может вмешаться."
 JAP_maritime_heavy_industry_corridor: "Коридор морской тяжёлой промышленности"
 JAP_maritime_heavy_industry_corridor_desc: "Япония развивает непрерывный пояс судостроительных предприятий, сталелитейных заводов и морских инженерных фирм вдоль ключевых прибрежных регионов. Концентрация инвестиций в этом коридоре увеличивает возможности по строительству и обслуживанию военных кораблей, подводных лодок и вспомогательных судов, укрепляя промышленный фундамент флота."
 JAP_article_9_restriction_tt: "Статья 9: ограничение на разработку доктрины"
 JAP_article_9_navy_doctrine_tt: "Отключить военно-морскую доктрину"
 JAP_article_9_air_doctrine_tt: "Отключить воздушную доктрину"
 JAP_article_9_special_forces_doctrine_tt: "Отключить доктрину специальных сил"
 JAP_moon_base_completed: "Лунная база «Кагуя» создана"
 JAP_usa_article_nine_refused: "Изменение толкования статьи 9 отклонено"
 JAP_diplomacy_shortcut: "Дипломатия"
 JAP_political: "Политика"
 JAP_economy: "Экономика"
 JAP_military: "Военное"
 JAP_monarchism: "Монархизм"
 JAP_great_east_japan_earthquake_shortcut: "Великое землетрясение Восточной Японии"
 JAP_article_nine_remove_flag: "Статья 9 была отменена"
 JAP_usa_article_nine_accepted: "Изменение толкования статьи 9 принято"
 JAP_tokyo_startup_special_zone: "Спецзона стартапов Токио"
 JAP_tokyo_startup_special_zone_desc: "Мы сосредоточим усилия по дерегулированию, поддержке венчурного капитала и стимулированию инвестиций в столичном регионе Токио, чтобы способствовать созданию и коммерциализации стартапов."
 JAP_tokyo_startup_special_zone_idea: "Спецзона стартапов Токио"
 JAP_tokyo_startup_special_zone_idea_desc: "Токио был объявлен специальной зоной регуляторных реформ для поддержки стартапов, венчурного капитала и создания новых предприятий. Сосредоточив дерегулирование, доступ к инвестициям и поддержку коммерциализации в столичном регионе, правительство стремится превратить ограниченные реформы в ощутимый двигатель роста."
 JAP_kansai_medical_special_zone: "Медицинская инновационная зона Кансай"
 JAP_kansai_medical_special_zone_desc: "Мы создадим в регионе Кансай специальную зону для инноваций в области медицины, ухода за больными и медико-биологических наук, что позволит ускорить привлечение частных инвестиций и практическую реализацию проектов."
 JAP_kansai_medical_special_zone_idea: "Медицинская инновационная зона Кансай"
 JAP_kansai_medical_special_zone_idea_desc: "Регион Кансай развивается как особая зона для инноваций в области медицины, ухода за больными и медико-биологических наук благодаря гибкому регулированию и целенаправленным инвестициям."
 JAP_kyushu_logistics_special_zone: "Специальная логистическая и портовая зона Кюсю"
 JAP_kyushu_logistics_special_zone_desc: "Мы оптимизируем логистику и портовые процедуры на Кюсю, укрепляя торговые потоки и повышая эффективность региональной промышленности."
 JAP_kyushu_logistics_special_zone_idea: "Специальная логистическая и портовая зона Кюсю"
 JAP_kyushu_logistics_special_zone_idea_desc: "Кюсю был определен как зона логистической и портовой реформы с целью повышения эффективности торговли и региональной взаимосвязи. Упрощенные процедуры, приоритетное развитие инфраструктуры и смягчение регулирования призваны укрепить экспортный потенциал и сделать регион более привлекательной базой для промышленности и торговли."
 JAP_expand_special_zones_nationwide: "Расширить действие специальных зон по всей стране."
 JAP_expand_special_zones_nationwide_desc: "Результаты, достигнутые в отдельных стратегических зонах, будут распространены на всю страну, превратив регуляторную реформу из ограниченного исключения в более широкую основу для экономического роста."
 JAP_tokyo_startup_special_zone_active: "Executed §Y$JAP_tokyo_startup_special_zone$§!"
 JAP_kansai_medical_special_zone_active: "Executed §Y$JAP_kansai_medical_special_zone$§!"
 JAP_kyushu_logistics_special_zone_active: "Executed §Y$JAP_kyushu_logistics_special_zone$§!"
 JAP_expand_special_zones_nationwide_done: "Executed §Y$JAP_expand_special_zones_nationwide$§!"
 JAP_japanese_economy_decisions: "Japanese Economic Revival"
 JAP_japanese_economy_decisions_desc: "Problems such as entrenched demand weakness caused by long stagnation, the bad loan problem, excess debt and excess capacity in the corporate sector, and the sluggish growth of new industries are draining the vitality from Japan's economy. Through the normalization of the financial system, corporate restructuring, and demand stimulus, we must build an economic structure capable of growth once again.\n\n§GBy advancing the progress values below, the debuffs of the related national spirits will be eased and eventually removed!\nTo remove each national spirit, the relevant values must be at least §Y85§!.§!\n\n§YDemand Recovery Progress§!: [?JAP_demand_recovery_progress]\n\n\n§YDangerous Bad Loan Stock§!: [JAP_dangerous_npl_stock_text]\n§YConfidence in the Banks§!: [?JAP_banking_confidence]\n§GHint§!: Banking recovery comes with pain. The disposal of bad loans may damage domestic demand industries, but this chance can be reduced by progressing through national focuses. To improve the banking debuff national spirit, the §YDangerous Bad Loan Stock§! must be at §YModerate§! for the first stage, §GLow§! for the second stage, and §GResolved§! for removal.\n\n\n§YCorporate Restructuring Progress§!: [?JAP_corporate_restructuring_progress]\n§GHint§!: Corporations and banks are closely intertwined. To remove the corporate debuff, you must first remove the banking debuff of the same severity. You will also need to complete national focuses that involve painful measures."
 JAP_entrenched_demand_shortfall_idea_2: "Sluggish Demand Recovery"
 JAP_entrenched_demand_shortfall_idea_2_desc: "Clearer price targets and support for households have pulled the economy away from its worst phase, but the recovery remains fragile. Consumption and investment are improving in places, yet not with enough force to lift the whole country. Demand is returning, but caution still hangs over the economy.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G60§!!"
 JAP_entrenched_demand_shortfall_idea_3: "Residual Demand Drag"
 JAP_entrenched_demand_shortfall_idea_3_desc: "Government measures to stimulate consumption have pushed the economy forward, but the caution left behind by years of stagnation remains deeply entrenched. Households and firms are moving more than before, yet a self-sustaining recovery still needs one final push. Japan's economy stands at the threshold of escaping stagnation, but it has not fully broken free yet.\n-------------\nYou can §Gremove§! this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YDemand Recovery Progress§! to at least §G85§!!."
 JAP_banks_non_performing_loans_idea_1: "A Damaged Banking System"
 JAP_banks_non_performing_loans_idea_1_desc: "Non-performing loans remain piled deep within bank balance sheets, and many institutions can barely measure the full extent of their own wounds. Credit tightening and the withdrawal of lending are choking business activity, while depositors and markets alike no longer place full trust in the financial system. In Japan, the very banks meant to carry the flow of capital have become a burden on the economy.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to improve §YDangerous Bad Loan Stock§! to a level better than §GModerate§! and raise §YConfidence in the Banks§! to at least §G30§!!."
 JAP_banks_non_performing_loans_idea_2: "Shaken Financial Intermediation"
 JAP_banks_non_performing_loans_idea_2_desc: "Stricter inspections and the disposal of bad loans are beginning to contain the worst of the disorder, but banks remain cautious and the flow of credit has not fully returned. Fear is receding, yet the financial system is still fragile, and Japan's banks continue to weigh on recovery rather than drive it.\n-------------\nYou can §Gmitigate§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to improve §YDangerous Bad Loan Stock§! to a level better than §GLow§! and raise §YConfidence in the Banks§! to at least §G60§!!."
 JAP_banks_non_performing_loans_idea_3: "Lingering Scars of Lost Confidence"
 JAP_banks_non_performing_loans_idea_3_desc: "Dangerous bad loans have been reduced significantly, and government measures have helped restore confidence in the financial system. Even so, banks have not fully abandoned their defensive posture, and the shadow of stagnation still lingers over credit supply. The crisis has receded, but Japan's financial sector has not yet fully recovered.\n-------------\nYou can §Gremove§! the effects of this national spirit by using the decisions in §Y$JAP_japanese_economy_decisions$§! to bring §YDangerous Bad Loan Stock§! to §GResolved§! and raise §YConfidence in the Banks§! to at least §G85§!!."
 JAP_corporate_excess_debt_idea_1: "Companies Sinking Under Debt"
 JAP_corporate_excess_debt_idea_1_desc: "Firms burdened by excess debt and excess capacity remain widespread, and unprofitable businesses and idle assets continue to weigh on the economy as a whole. Capital, talent, and management attention that should be moving toward growth sectors are still being absorbed by the preservation of weak firms. Japan's companies have not yet lost the competition entirely, but they have not regained the agility needed to win it either.\n-------------\nThe effects of this national spirit will be §Gmitigated§! if you use the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YCorporate Restructuring Progress§! to at least §G30§!, complete the national focus §Y$JAP_request_for_exit$§!, and do not have §Y$JAP_banks_non_performing_loans_idea_1$§!"
 JAP_corporate_excess_debt_idea_2: "Delayed Corporate Restructuring"
 JAP_corporate_excess_debt_idea_2_desc: "The cleanup of unprofitable divisions and the review of rehabilitation plans have begun, but restructuring remains cautious and partial, with too much inefficiency still being preserved. Some capital is beginning to move toward stronger firms, yet the old structure has not been fully broken. Japan's economy is moving again, but its corporate sector still carries the habits of stagnation.\n-------------\nThe effects of this national spirit will be §Gmitigated§! if you use the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YCorporate Restructuring Progress§! to at least §G60§!, complete the national focus §Y$JAP_request_for_exit$§!, and do not have either §Y$JAP_banks_non_performing_loans_idea_1$§! or §Y$JAP_banks_non_performing_loans_idea_2$§!."
 JAP_corporate_excess_debt_idea_3: "Lingering Shadows of Inefficiency"
 JAP_corporate_excess_debt_idea_3_desc: "Corporate restructuring has advanced considerably, and the cleanup of damaged firms and unprofitable assets is now visible. Even so, defensive management habits and hesitation toward deeper restructuring have not fully disappeared. Japan's companies are finally beginning to recover their lightness, but one final push is still needed before they can throw themselves fully toward growth.\n-------------\nThis national spirit will be §Gremoved§! if you use the decisions in §Y$JAP_japanese_economy_decisions$§! to raise §YCorporate Restructuring Progress§! to at least §G85§!, complete the national focus §Y$JAP_request_for_exit$§!, and do not have §Y$JAP_banks_non_performing_loans_idea_1$§!, §Y$JAP_banks_non_performing_loans_idea_2$§!, or §Y$JAP_banks_non_performing_loans_idea_3$§!"
 JAP_declaration_price_target: "Declare a Price Target"
 JAP_declaration_price_target_desc: "It is not only weak demand that is dragging the economy down. The belief that prices and wages will never move has trapped households and firms in caution. A clear price target is a declaration that the state will no longer accept stagnation as normal, and it is the first step toward shaking frozen expectations loose."
 JAP_declaration_price_target_decision: "Announce the Price Target"
 JAP_declaration_price_target_decision_desc: "Break the assumption that stagnation is normal by committing the government to a clear price target."
 Japan_economy.01.t: "The Price Target Is Announced"
 Japan_economy.01.d: "The government has finally made clear that it will no longer accept stagnation as a permanent condition. Households and firms can no longer assume that prices and wages will remain frozen forever. The atmosphere is still heavy, but Japan's economy has at last been given a direction."
 Japan_economy.01.a: "Let expectations move first."
 Japan_economy.17.t: "The Price Target Is Reached"
 Japan_economy.17.d: "What once seemed impossible has begun to happen. Prices are rising in a way people can no longer ignore. The most important change is not the number itself, but the growing sense that stagnation is not eternal. That feeling is beginning to loosen the caution of households and firms alike."
 Japan_economy.17.a: "The atmosphere has changed."
 Japan_economy.18.t: "The Price Target Falls Short"
 Japan_economy.18.d: "The target has failed to translate into real movement, and doubt is beginning to spread over the government's promise to break the slump. Households are growing cautious once again, while firms are retreating into a wait and see stance in the face of weak demand. Confidence in recovery has clearly been damaged, and a heavy mood is settling back over Japan's economy."
 Japan_economy.18.a: "Confidence is not easily restored."
 JAP_price_target_mission: "The Promise of Rising Prices"
 JAP_price_target_mission_desc: "Declaring a target is not enough. We must show visible signs of rising prices within the allotted time and convince the country that change has truly begun."
 JAP_cash_transfers_households: "Direct Household Support"
 JAP_cash_transfers_households_desc: "When anxiety about the future is strong, recovery does not begin on its own. The state must put spending power directly into the hands of households. Support aimed at low and middle income groups is especially likely to turn into actual consumption, giving immediate force to domestic demand."
 JAP_cash_transfers_households_decision: "Payments for Low and Middle Income Households"
 JAP_cash_transfers_households_decision_desc: "Deliver support to the groups most likely to spend it and push demand upward directly."
 Japan_economy.19.t: "Support Payments Show Signs of Recovery"
 Japan_economy.19.d: "Money delivered directly to households is no longer sitting idle. It is beginning to flow into the market. The increase in spending is especially visible among low and middle income groups, and the wallets that stayed shut for so long are finally starting to open."
 Japan_economy.19.a: "Demand can still be awakened."
 JAP_temporary_tax_cuts: "Temporary Tax Relief"
 JAP_temporary_tax_cuts_desc: "To break the habit of delay, people need a reason to spend now. Temporary tax cuts do more than raise disposable income. They can pull postponed purchases forward and give stagnant demand a visible jolt. In a sluggish economy, timing itself can become a weapon."
 JAP_temporary_consumption_tax_cut: "Temporary Consumption Tax Cut"
 JAP_temporary_consumption_tax_cut_desc: "Create a reason to spend now and turn delayed consumption into momentum for recovery."
 Japan_economy.20.t: "Tax Relief Shows Signs of Recovery"
 Japan_economy.20.d: "The temporary tax cut has given households a reason to act now. Purchases that had been postponed are beginning to return, and the atmosphere of stagnation is starting to crack. It may be a short term measure, but it has shown real power in shaking weak demand loose."
 Japan_economy.20.a: "Now is the time to move."
 JAP_active_public_investment: "Aggressive Public Investment"
 JAP_active_public_investment_desc: "If the private sector remains cautious, the economy will not recover by waiting. The government must create demand itself and push money into local economies and employment. Public investment does more than support growth. It gives the whole country the sense that movement has finally returned."
 JAP_active_public_investment_decision: "Order Public Investment"
 JAP_active_public_investment_decision_desc: "Create demand through state action and restore the flow of money into local economies and employment."
 Japan_economy.21.t: "Public Investment Shows Signs of Recovery"
 Japan_economy.21.d: "Projects ordered by the state are beginning to mean more than the figures alone suggest. Money is flowing into local economies, employment is stirring, and the all too familiar atmosphere of economic pessimism is beginning to shift. The country can finally feel that it has taken a step beyond waiting."
 Japan_economy.21.a: "The state can move the economy."
 JAP_improvement_private_investment_climate: "Improve the Private Investment Climate"
 JAP_improvement_private_investment_climate_desc: "Government spending alone cannot complete the recovery. Firms must be given the confidence to invest again, and uncertainty about the future must be reduced. A lasting recovery requires businesses to move from defense back to expansion."
 JAP_focus_improving_investment_climate: "Focus on Improving the Investment Climate"
 JAP_focus_improving_investment_climate_desc: "The government is prioritizing the creation of a more favorable environment for business investment. Political capital is being spent on coordination, persuasion, and institutional reform, leaving less room for other short term initiatives."
 Japan_economy.02.t: "The Private Investment Climate Improves"
 Japan_economy.02.d: "Businesses are beginning to see that staying defensive forever means missing opportunities. Uncertainty remains, but some of the weight that held back new investment is beginning to lift. For the first time, recovery no longer looks destined to remain purely state driven."
 Japan_economy.02.a: "The private sector is stirring."
 JAP_stimulating_demand_durable_goods: "Stimulate Durable Goods Demand"
 JAP_stimulating_demand_durable_goods_desc: "Durable goods such as cars, appliances, and housing related purchases can lift far more than their own sectors once demand starts moving. But in times of stagnation, they are often the first purchases to be postponed. Reviving them would give the recovery visible momentum and restore a long absent sense of vitality."
 JAP_stimulating_demand_durable_goods_decision: "Durable Goods Purchase Campaign"
 JAP_stimulating_demand_durable_goods_decision_desc: "Encourage large purchases that have been postponed for years and give the recovery visible momentum."
 Japan_economy.22.t: "Durable Goods Demand Shows Signs of Recovery"
 Japan_economy.22.d: "Large purchases that had been delayed for years are finally starting to return. Durable goods demand carries broad effects across related sectors, and it is also a sign that households are becoming at least slightly more hopeful about the future. Recovery is beginning to appear not only in data, but in the atmosphere of daily life."
 Japan_economy.22.a: "Let the momentum spread."
 JAP_strict_audits_banks: "Strict Bank Inspections"
 JAP_strict_audits_banks_desc: "Years of delay have made the wounds of the banking system harder to see, while financial anxiety has continued to spread. The first step is to drag dangerous bad loans out from the shadows and force the banks to face reality. It will be painful, but without that pain there can be no real recovery."
 JAP_strict_audits_banks_decision: "Launch Strict Bank Inspections"
 JAP_strict_audits_banks_decision_desc: "Force hidden weaknesses into the open and determine the true scale of dangerous bad loans."
 JAP_strict_audits_banks_done: "Executed $JAP_strict_audits_banks_decision$"
 Japan_economy.23.t: "Inspections Expose Banking Weaknesses"
 Japan_economy.23.d: "Strict inspections have once again brought to light the weaknesses in bank balance sheets and the reality of dangerous bad loans. Market tension remains high, but the room for leaving these problems unresolved is steadily narrowing. The road to financial recovery is still long. Even so, exposing each wound for what it is remains the first step toward restoring confidence."
 Japan_economy.23.a: "Miss no weakness."
 Japan_economy.24.t: "Cutting Away the Rot"
 Japan_economy.24.d: "The disposal of dangerous bad loans is moving forward, and the wounds that were eating away at the banks are finally beginning to be cut free. The process is painful, but the era in which buried losses quietly consumed the future is starting to end. Confidence will take time to recover, but the road to renewal has clearly opened."
 Japan_economy.24.a: "The rot has to be removed."
 JAP_injection_public_funds: "Public Capital Injection"
 JAP_injection_public_funds_desc: "It is unrealistic to demand both loss disposal and renewed lending from weakened banks without support. If confidence in the financial system itself is to be preserved, the state must step in as the final backstop and halt the chain of collapse. It is a politically heavy decision, but one with little room for avoidance."
 JAP_injection_public_funds_decision: "Inject Public Capital into the Banks"
 JAP_injection_public_funds_decision_desc: "Strengthen the banks' ability to absorb losses and prevent financial panic from spiraling further."
 Japan_economy.25.t: "Public Capital Pushes Back Financial Anxiety"
 Japan_economy.25.d: "The injection of public capital has strengthened the banks' ability to absorb losses and placed a measure of restraint on the spread of financial anxiety. Criticism remains unavoidable, but the cost of leaving the banks unstable would have been greater still. Here, the state has once again demonstrated its resolve to contain instability in the financial system."
 Japan_economy.25.a: "Contain the chain of anxiety."
 JAP_new_lenders: "Invite New Lenders"
 JAP_new_lenders_desc: "If the existing banks remain trapped in defensive caution, the flow of credit will stay weak. New lenders must be encouraged to enter the field and break the bottleneck in finance itself. Competition and new channels of capital can restore some of the flexibility Japan's financial system has lost."
 JAP_new_lenders_idea: "The Rise of New Lenders"
 JAP_new_lenders_idea_desc: "New sources of credit beyond the traditional banks are beginning to emerge. The blockage in finance has not been fully cleared, but new paths are opening for capital to move through the economy."
 JAP_protection_deposits: "Establish Deposit Protection"
 JAP_protection_deposits_desc: "The moment depositors begin to doubt that their savings are safe, a banking crisis becomes real. The state must therefore make it unmistakably clear that deposits will be protected. This alone cannot fully restore trust, but it can still become the wall that keeps panic from turning into collapse."
 JAP_protection_deposits_decision: "Implement Deposit Protection"
 JAP_protection_deposits_decision_desc: "Reassure depositors and prevent a chain reaction of panic withdrawals."
 Japan_economy.26.t: "Deposits Will Be Protected"
 Japan_economy.26.d: "The implementation of deposit protection has put a brake on one of the most dangerous sparks in a banking crisis. Doubts about the banks remain, but at least the image of depositors rushing to flee first is beginning to fade. Full confidence is still distant, yet a barrier has now been raised against wider panic."
 Japan_economy.26.a: "Protect the foundation of confidence."
 JAP_rehabilitation_small_medium_enterprises: "A Credit Safety Net for Small Businesses"
 JAP_rehabilitation_small_medium_enterprises_desc: "Simply pushing ahead with bad loan disposal risks driving even the small and medium sized firms that support the foundations of Japan's economy into funding distress. By requiring existing banks to maintain lending to SMEs, while also building restructuring finance schemes and monitoring for credit tightening and loan withdrawals, we can create a barrier that prevents the pain of financial reform from turning into the collapse of local economies."
 JAP_rehabilitation_small_medium_enterprises_idea: "Focus on SME Credit Stability"
 JAP_rehabilitation_small_medium_enterprises_idea_desc: "Political resources are being concentrated on supervision, coordination, and restructuring support in order to prevent bad loan disposal from choking off credit to small and medium sized firms. This is vital for protecting local economies, but it leaves less room for action in other areas."
 JAP_dangerous_npl_stock_5_name: "§RCritical Level§!"
 JAP_dangerous_npl_stock_4_name: "§RVery High§!"
 JAP_dangerous_npl_stock_3_name: "§RHigh§!"
 JAP_dangerous_npl_stock_2_name: "§YModerate§!"
 JAP_dangerous_npl_stock_1_name: "§GLow§!"
 JAP_dangerous_npl_stock_0_name: "§GResolved§!"
 JAP_sorting_out_zombie_firms: "Sort the Zombie Firms"
 JAP_sorting_out_zombie_firms_desc: "Years of stagnation have preserved firms that should have faced exit or deeper restructuring long ago. The problem is not simply the number of weak companies, but the fact that viable firms and resource-draining ones have been left mixed together. The first task is to make a cold distinction between delay and genuine recovery."
 JAP_review_rehabilitation_plans: "Review Rehabilitation Plans"
 JAP_review_rehabilitation_plans_desc: "Reexamine proposed turnaround plans and separate genuine recovery from mere preservation."
 Japan_economy.27.t: "Review of Rehabilitation Plans"
 Japan_economy.27.d: "A closer review of rehabilitation plans is beginning to strip away optimistic assumptions and vague premises. Not every firm can be saved, but the line between genuine recovery and mere delay is becoming clearer than before. Corporate restructuring is beginning to be grounded in numbers and reality."
 Japan_economy.27.a: "Only viable plans should survive."
 JAP_review_rehabilitation_plans_idea: "Screened Revival Plans"
 JAP_review_rehabilitation_plans_idea_desc: "As rehabilitation plans are reviewed more rigorously, the line between firms worth restoring and firms sustained only by delay is gradually becoming clearer. A growing sense is emerging within the corporate sector that capital may no longer remain trapped in the burdens of the past, but instead begin to move toward areas with stronger prospects for growth."
 JAP_support_for_recovery: "Back Viable Revivals"
 JAP_support_for_recovery_desc: "Not every struggling company should be cast aside. Firms that still retain the capacity to sustain technology, employment, and local economies deserve a path back to health. Identifying what is worth saving and pushing viable firms forward is also a way to defend the foundations of Japan's economy."
 JAP_management_guidance_businesses: "Issue Management Guidance"
 JAP_management_guidance_businesses_desc: "Push firms to confront long delayed problems and adopt more realistic restructuring measures."
 Japan_economy.28.t: "Management Faces Hard Truths"
 Japan_economy.28.d: "Management guidance has forced firms to confront the problems and evasions they long preferred to postpone. The message may be unwelcome, but neither companies nor the economy can move forward while carrying the same old burdens. Caution still lingers across the corporate sector, yet what must be corrected is now clearer than before."
 Japan_economy.28.a: "Do not let them look away."
 JAP_support_painful_restructuring: "Support Painful Restructuring"
 JAP_support_painful_restructuring_desc: "Support difficult downsizing and asset cleanup so that long preserved burdens can finally be reduced."
 Japan_economy.29.t: "Painful Restructuring Moves Forward"
 Japan_economy.29.d: "The burdens that had long been carried without resolution are finally beginning to be cut back. Downsizing and separation always come with pain, but neither firms nor the wider economy can move freely while inefficiency is preserved. Restructuring is still incomplete, yet Japan's companies are beginning to lay some of that weight down."
 Japan_economy.29.a: "We cannot move forward without becoming lighter."
 JAP_request_for_exit: "Enable Orderly Exit"
 JAP_request_for_exit_desc: "If firms that cannot survive are kept alive indefinitely, even more capital and talent will be wasted. Japan needs a framework that allows painful exits to proceed with as little chaos as possible. Real restructuring requires not only paths to revival, but also paths to withdrawal."
 JAP_promotion_mergers_and_acquisitions: "Promote Corporate Consolidation"
 JAP_promotion_mergers_and_acquisitions_desc: "As long as firms remain fragmented, assets and talent cannot be used to their full potential. Consolidation is not mere arithmetic. It is a way to combine overlapping businesses and resources into structures large and efficient enough to compete. Defensive management alone will not restore momentum to Japan's corporate sector."
 JAP_promotion_mergers_and_acquisitions_idea: "Legal Framework for Corporate Consolidation"
 JAP_promotion_mergers_and_acquisitions_idea_desc: "Political resources are being spent on improving the legal and procedural framework for corporate consolidation. This can accelerate restructuring, but it also reduces the political capacity available for other short term priorities."
 JAP_investment_new_sources_of_growth: "Invest in New Growth"
 JAP_investment_new_sources_of_growth_desc: "The point of restructuring is not only to cut away the old. Once capital and talent are freed, they must be redirected toward rising industries and new challengers. Only then does restructuring become an investment in the future rather than a mere exercise in survival."
 JAP_investment_growth_industries: "Invest in Growth Industries"
 JAP_investment_growth_industries_desc: "Redirect capital toward sectors with stronger prospects and turn restructuring into a path toward growth."
 Japan_economy.30.t: "Capital Moves Toward Growth Industries"
 Japan_economy.30.d: "Capital that had long been trapped in stagnant sectors is finally beginning to shift toward new sources of growth. The change is not yet universal, but investment is slowly becoming about expansion rather than mere preservation. Corporate restructuring is starting to become more than a backward looking cleanup."
 Japan_economy.30.a: "Now we back what can grow."
 JAP_startup_campaign: "Startup Support Campaign"
 JAP_startup_campaign_desc: "Encourage new challengers and bring renewal into a stagnant corporate structure."
 Japan_economy.31.t: "New Challengers Emerge"
 Japan_economy.31.d: "Fresh ideas and energy that rarely emerged from within the old corporate structure are beginning to appear through new challengers. Even small movements matter when they open gaps in a stagnant system. The future of Japan's corporate sector will depend not only on the firms that survive, but also on the ones that are newly created."
 Japan_economy.31.a: "Let new strength take root."
 JAP_startup_campaign_idea: "Backing New Entrepreneurs"
 JAP_startup_campaign_idea_desc: "We are working to create an environment in which new firms and new challengers can emerge more easily. This should encourage a degree of renewal that restructuring existing companies alone cannot achieve."
 Japan_economy.03.t: "The First Crack in the Slump"
 Japan_economy.03.d: "Government support has begun to take effect, and spending that had been frozen is finally starting to show signs of movement. Consumer sentiment remains weak, but for the first time, cracks are beginning to appear in the long-standing mood of \"nothing will ever change anyway.\""
 Japan_economy.03.a: "The tide is beginning to turn."
 Japan_economy.04.t: "Demand Begins to Spread"
 Japan_economy.04.d: "What began as a cautious policy push is now reaching a wider part of the economy. Families are spending a little more freely, postponed purchases are returning, and firms can no longer ignore the signs of life in the market. The recovery is not yet secure, but it is no longer just a hope."
 Japan_economy.04.a: "Let the recovery spread."
 Japan_economy.05.t: "The Long Slump Ends"
 Japan_economy.05.d: "Demand has finally begun to move on its own. The actions of households and businesses have entered a cycle of mutually reinforcing momentum, and Japan's economy is steadily emerging from its long stagnation. Although many challenges still remain, the chronic recession caused by insufficient demand is no longer the country's central burden."
 Japan_economy.05.a: "At last, we move on."
 Japan_economy.06.t: "The Rot Is Brought to Light"
 Japan_economy.06.d: "Strict inspections have finally dragged long hidden weaknesses into the open. The process is painful, but the age of pretending the problem could be ignored is beginning to end. Bad loan disposal has begun, and the markets can sense that Japan's banks are at last being forced to confront reality."
 Japan_economy.06.a: "We must face the damage first."
 Japan_economy.07.t: "Financial Panic Recedes"
 Japan_economy.07.d: "The government's various efforts have pushed back fears that the financial system itself might collapse. Doubts about the banks still remain, but they are no longer the all-encompassing distrust of the past. Japan's financial system is finally beginning to rise out of paralysis."
 Japan_economy.07.a: "The chain of collapse has been checked."
 Japan_economy.08.t: "Banks Become Lenders Again"
 Japan_economy.08.d: "Dangerous bad loans have been cleared away, and confidence has recovered enough for banks to begin moving beyond mere self-preservation. Capital is starting to flow once more into firms and economic activity, and the financial burden that long weighed on Japan is receding into the background. Challenges remain, but the banking crisis is no longer the country's central drag."
 Japan_economy.08.a: "Finance can finally look forward again."
 Japan_economy.09.t: "Cracks in the Logic of Preservation"
 Japan_economy.09.d: "A serious reexamination has finally begun to cut into the inefficiencies that were long preserved and the management problems that were endlessly postponed. The process is painful, but as long as scarce capital and talent remain trapped in the past, the wider economy cannot regain its vitality. Japan's companies are at last beginning to move beyond mere defense."
 Japan_economy.09.a: "Preservation alone cannot move us forward."
 Japan_economy.10.t: "Restructuring Begins to Take Shape"
 Japan_economy.10.d: "The corporate sector is beginning to show signs of change. Assets and businesses that had long been held in place are slowly being reorganized, and the direction of management resources is beginning to shift with them. The old structure remains stubborn, but Japan's companies are finally starting to move away from treating stagnation as normal."
 Japan_economy.10.a: "Push restructuring even further."
 Japan_economy.11.t: "Capital Turns Toward the Future"
 Japan_economy.11.d: "Corporate restructuring is no longer merely a matter of cleanup. It is beginning to take the shape of a foundation for growth. Capital and management resources are gradually being released from the burdens of the past and are starting to move in a more forward-looking direction. Caution still remains, but corporate stagnation is no longer the country's central burden."
 Japan_economy.11.a: "Now it is time to seize growth."
 JAP_expectation_of_being_rewarded: "The Expectation of Reward"
 JAP_expectation_of_being_rewarded_desc: "As long as people believe that work will not improve their lives, they will remain cautious. A real recovery requires more than temporary stimulus. It requires restoring the belief that effort will be rewarded through wages and living standards. That expectation is what can turn recovery into a self-sustaining force."
 JAP_wage_negotiations: "Negotiate for Higher Wages"
 JAP_wage_negotiations_decision: "Restore confidence in wage growth and keep demand recovery from ending as a temporary burst of stimulus."
 Japan_economy.12.t: "Wage Negotiations with Business"
 Japan_economy.12.d: "If demand recovery is to become self-sustaining, wages must rise as well. Yet businesses remain wary of future risks and pressure on profits. The government must now decide how forcefully it should push for higher pay."
 Japan_economy.12.a: "Encourage Wage Increases."
 Japan_economy.12.b: "Apply Pressure."
 Japan_economy.12.c: "Leave It to the Private Sector."
 Japan_economy.14.t: "Wage Growth Reaches the Target"
 Japan_economy.14.d: "Wages have finally begun to move in a visible way. What matters is not only the increase in income itself, but the return of a deeper feeling that effort may once again be rewarded. That change in sentiment is beginning to reshape weak consumption into something stronger and more durable."
 Japan_economy.14.a: "Recovery is becoming real."
 Japan_economy.15.t: "Wage Growth Falls Short of the Target"
 Japan_economy.15.d: "Wage growth did not reach the goal, but the effort was not wasted. Businesses remain cautious, yet the need for higher pay is now more widely understood than before. The step forward is small, but it still matters in breaking the old atmosphere of stagnation."
 Japan_economy.15.a: "We build on this."
