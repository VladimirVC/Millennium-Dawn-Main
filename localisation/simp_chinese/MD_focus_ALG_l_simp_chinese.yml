 algerian_events.201.t: "姆扎布已被抗议者攻陷"
 algerian_events.201.a: "又一个地区悄然消失"
 algerian_events.202.t: "奥雷斯高地已被抗议者攻陷"
 algerian_events.202.a: "抗议蔓延"
 algerian_events.203.t: "塔曼拉塞特已被抗议者攻陷"
 algerian_events.203.a: "南方局势不稳定。"
 algerian_events.204.t: "大东方沙漠已被抗议者攻陷"
 algerian_events.204.a: "就连沙漠也要奋起。"
 algerian_events.205.t: "阿尔及利亚阿特拉斯山脉已被抗议者攻陷"
 algerian_events.205.a: "动乱加剧"
 algerian_events.206.t: "君士坦丁已被抗议者攻陷"
 algerian_events.206.a: "东方爆发"
 algerian_events.207.t: "卡比利亚 已被抗议者攻陷"
 algerian_events.207.a: "卡比利亚再次崛起"
 algerian_events.208.t: "阿尔及尔已被抗议者攻陷"
 algerian_events.208.a: "阿尔及利亚的心脏在颤抖"
 algerian_events.209.t: "奥拉尼斯已被抗议者攻陷"
 algerian_events.209.a: "西部已然沦陷"
 algerian_events.201.d: "姆扎卜地区民众无视政府管控，占领了街头。\n姆扎卜人情绪：[ALG_mozabite_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.202.d: "在奥雷斯山区，不满情绪已演变为公开的对抗。\n沙维亚派情绪：[ALG_chaoui_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.203.d: "尽管与世隔绝，塔曼拉塞特地区仍爆发了动乱，政府已失去对该地区的控制。\n图阿雷格人情绪：[ALG_tuareg_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.204.d: "大西尔格沙漠的游牧社群已加入抗议浪潮。\n公众情绪：[ALG_grievance_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.205.d: "曾经平静的阿特拉斯地区，如今已成为反政府动荡的温床。\n阿拉伯人情绪：[ALG_arab_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.206.d: "东部地区的抗议活动压倒了当地安全部队，君士坦丁省已失守。\n阿拉伯人情绪：[ALG_arab_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.207.d: "卡比利亚地区历来有着反抗传统，如今再度公然对抗中央政府。\n卡比利亚情绪：[ALG_kabyle_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.208.d: "连首都地区也爆发了难以控制的抗议活动。\n军方掌控力：[ALG_army_grip_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.209.d: "在西部地区，奥兰人也加入了席卷阿尔及利亚的抗议浪潮。\n阿拉伯人情绪：[ALG_arab_satisfaction_text]\n抗议蔓延：[ALG_hirak_spread_text]"
 algerian_events.200.t: "抗议活动被镇压"
 algerian_events.200.d: "虽然安全部队成功镇压了最新一波示威活动，但公众的愤怒情绪仍在暗中酝酿。"
 algerian_events.200.a: "秩序暂时恢复了。"
 algerian_events.2015.t: "镇压适得其反"
 algerian_events.2015.d: "镇压抗议活动的企图反而激起了更多愤怒，鼓舞了示威者的气焰，削弱了政府的权威。"
 algerian_events.2015.a: "形势恶化"
 algerian_events.2025.t: "抗议结束"
 algerian_events.2025.d: "经过数月的抗争，最新一波抗议活动已经平息。虽然紧张局势依然存在，但目前街头再次恢复了平静。"
 algerian_events.2025.a: "最终，平静回归。"
 algerian_events.301.t: "全国爆发抗议活动！"
 algerian_events.301.d: "看来我们近期的行动引起了民众的强烈反应，全国范围内爆发了抗议活动。越来越多的人要求政府辞职，但我们不会就此罢休。"
 algerian_events.301.a: "我们早该预料到这种情况！"
 ALG_khenchela_arms_manufacturer: "罕西拉兵工厂"
 ALG_khenchela_arms_manufacturer_desc: "位于罕西拉省的一家国有工厂，为阿尔及利亚国民军生产步兵武器装备。该工厂的建立旨在减少对外国武器进口的依赖，并确保小型武器生产的自给自足。"
 ALG_seriana_small_arms: "塞里亚纳小型武器工厂"
 ALG_seriana_small_arms_desc: "位于阿尔及利亚东部的塞里亚纳工厂为阿尔及利亚安全部队生产步枪、手枪和弹药。该工厂在国防部的监管下运营。"
 ALG_dgi_missile_systems: "军事工业总局"
 ALG_dgi_missile_systems_desc: "阿尔及利亚军事工业总局负责监管该国的国防制造业，包括制导武器、反坦克/防空系统和火炮研发。该局隶属于国防部，负责协调国有企业和军事技术合作，以确保战略自主性。"
 ALG_bcl_armored_development: "后勤建设旅"
 ALG_bcl_armored_development_desc: "军事后勤建设旅负责装甲车辆的维护、升级和有限的国内生产。该旅专门从事苏联时期装备的翻新和车辆适应撒哈拉沙漠作战环境的改造。"
 ALG_snvi_vehicle_manufacturer: "国家工业车辆公司"
 ALG_snvi_vehicle_manufacturer_desc: "阿尔及利亚国家汽车制造商国家工业车辆公司成立于1967年。国家工业车辆公司通过与梅赛德斯-奔驰和其他制造商的合作，生产军用卡车、多用途车辆和轻型装甲车，所有设计都适应北非的地形和气候。"
 ALG_enmib_helicopter_unit: "国家基础设备和基础设施公司"
 ALG_enmib_helicopter_unit_desc: "国家基础设备和基础设施公司是阿尔及利亚的直升机维修和组装基地，为阿尔及利亚空军提供大修服务和少量生产。国家基础设备和基础设施公司还负责外国直升机设计的授权组装。"
 ALG_mers_el_kebir_shipyards: "凯比尔港海军造船厂"
 ALG_mers_el_kebir_shipyards_desc: "该历史悠久的海军设施位于奥兰附近的战略港口凯比尔港，负责为阿尔及利亚海军建造和维护巡逻舰和轻型海军舰艇。"
 ALG_el_djazair_naval_industry: "阿尔及利亚国家航运公司"
 ALG_el_djazair_naval_industry_desc: "阿尔及利亚国家海事公司阿尔及利亚国家航运公司在阿尔及尔运营造船厂，具备在外国技术援助下建造轻型护卫舰、护卫舰和潜艇的能力。该公司还从事商业航运和海军后勤业务。"
 ALG_ersa_aircraft_manufacturer: "飞机维修服务公司"
 ALG_ersa_aircraft_manufacturer_desc: "飞机维修服务公司是阿尔及利亚主要的飞机维修、修理和大修设施。飞机维修服务公司负责为阿尔及利亚空军进行部分授权飞机的组装，并提供全面的航空技术服务。"
