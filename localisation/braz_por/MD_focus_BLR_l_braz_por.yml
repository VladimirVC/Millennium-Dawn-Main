 BLR_mission_to_Ukraine: "Missão Comercial para a [UKR.GetNamewithFlag]"
 BLR_mission_to_Ukraine_desc: "Estabelecer uma missão comercial com a Ucrânia é uma decisão empresarial sólida para o bem de nossa nação."
 BLR_mission_to_Kazahstan: "Missão Comercial para o [KAZ.GetNamewithFlag]"
 BLR_mission_to_Kazahstan_desc: "Estabelecer uma missão comercial com o Cazaquistão é uma decisão empresarial sólida para o bem de nossa nação."
 BLR_mission_to_Czechia: "Missão Comercial para a [CZE.GetNamewithFlag]"
 BLR_mission_to_Czechia_desc: "Estabelecer uma missão comercial com a República Tcheca é uma decisão empresarial sólida para o bem de nossa nação."
 BLR_mission_to_Netherland: "Missão Comercial para a [HOL.GetNamewithFlag]"
 BLR_mission_to_Netherland_desc: "Estabelecer uma missão comercial com os Países Baixos é uma decisão empresarial sólida para o bem de nossa nação."
 BLR_mission_to_Zimbabwe: "Missão Comercial para [ZIM.GetNamewithFlag]"
 BLR_mission_to_Zimbabwe_desc: "Estabelecer uma missão comercial com o Zimbábue é uma decisão comercial sólida para o bem de nossa nação."
