 OPEN_LegCo_BUTTON: "§YLegislative Council§! of [HKG.GetFlag]Hong Kong S.A.R"
 OPEN_LegCo_BUTTON_TT: "§YThe Legislative Council§! of the [HKG.GetFlag]Hong Kong S.A.R. is the unicameral legislature of Hong Kong. It sits under China's \"one country, two systems\" constitutional arrangement, and is the power centre of Hong Kong's hybrid representative democracy."
