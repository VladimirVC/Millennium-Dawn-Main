 arunachal_war.1.t: "藏南边境冲突"
 arunachal_war.1.d: "实际控制线附近发生的小规模冲突造成人员伤亡，并加剧了紧张局势。"
 arunachal_war.1.a: "巩固我们的立场。"
 arunachal_war.2.t: "边境事件再起"
 arunachal_war.2.d: "争议边界沿线再次发生交火，导致士气和人力紧张。"
 arunachal_war.2.a: "保持阵线"
 arunachal_war.3.t: "藏南准备工作受挫"
 arunachal_war.3.d: "我在该地区的部队遭遇挫折，导致该战线的作战准备能力下降。"
 arunachal_war.3.a: "重整旗鼓，补充兵力。"
 arunachal_war.4.t: "边境战争已经打响"
 arunachal_war.4.d: "争议地区已存在边界冲突，没有必要进一步升级局势。"
 arunachal_war.4.a: "已阅。"
 arunachal_war.20.t: "在实际控制线取得胜利"
 arunachal_war.20.d: "我军在边境交战中取得胜利，暂时巩固了我们的领土主张。"
 arunachal_war.20.a: "巩固我们的成果。"
 arunachal_war.21.t: "在实际控制线战败"
 arunachal_war.21.d: "我军在边境交战中被击退。这场战役使我们损失惨重，士气低落。"
 arunachal_war.21.a: "撤回并重新评估。"
 arunachal_war.22.t: "边境战争取消"
 arunachal_war.22.d: "边境冲突在取得决定性结果之前就已经停止。"
 arunachal_war.22.a: "撤军"
 arunachal_war.23.t: "被击退"
 arunachal_war.23.d: "我们在边境战斗中被迫让步，我们的阵地已经削弱。"
 arunachal_war.23.a: "撤退到易守难攻的阵地。"
 arunachal_war.24.t: "击退了入侵者"
 arunachal_war.24.d: "我军成功击退了入侵者，捍卫了争议领土。"
 arunachal_war.24.a: "巩固我方阵地。"
 arunachal_war.25.t: "边境战争取消"
 arunachal_war.25.d: "边境冲突在没有取得决定性结果的情况下结束了。"
 arunachal_war.25.a: "撤军"
 arunachal_war.30.t: "局势升级决定"
 arunachal_war.30.d: "边境冲突已到关键时刻。我们必须决定我们愿意走多远。"
 arunachal_war.30.a: "承受损失，保持稳定。"
 arunachal_war.30.b: "升级 - 推进我们的战争目标。"
 china_news.43.t: "中国宣布半岛战略"
 china_news.43.d: "中华人民共和国正式宣布了对朝鲜半岛的战略立场。习近平主席宣布，中国将不再以模糊的方式处理朝鲜半岛事务。"
 china_news.43.a: "确认收到公告。"
