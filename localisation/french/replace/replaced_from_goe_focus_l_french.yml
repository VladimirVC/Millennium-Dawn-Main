l_french:
 PER_iran_first: "L'Iran d'abord"
 AFG_graveyard_of_empires: "Le cimetière des empires"
 PER_iran_first_desc: "Bien que nous ayons des alliés régionaux et internationaux, nous devons accorder la priorité à l'Iran en matière de bien-être de notre population. Des fonds doivent être alloués au développement des industries locales."
 AFG_graveyard_of_empires_desc: "Les empires naissent et meurent, mais notre peuple demeure le maître incontesté de cette région. Tant que notre peuple restera uni et fidèle à son héritage, tout agresseur trouvera en [AFG.GetNameWithFlag] son ​​véritable cimetière."