 uniate_church: "Униатская церковь"
 uniate_church_desc: "Униатская церковь — это объединение православной и католической традиций, признающее первенство Рима, но сохраняющее восточно-православные обряды. Ранняя уния была заключена на Флорентийском соборе в 1439 году, но вскоре распалась. С конца XV ​​века польские феодалы возродили эту идею, поскольку значительная часть населения Польши и Литвы оставалась православной, а церковная уния предлагала способ постепенно привлечь украинцев и белорусов к католицизму. Некоторые православные священнослужители и дворяне поддержали унию в XVI веке, стремясь получить права, равные правам католиков. В 1595 году епископы Ипатий Потей Владимиро-Волынский и Кирилл Терлецкий Луцкий обратились к папе с просьбой об унии. На Брестском соборе 1596 года шесть епископов провозгласили Брестскую унию, несмотря на протесты большинства духовенства и населения. Король одобрил унию и объявил православную церковь вне закона, передав её имущество униатской церкви. В XVII веке был основан орден василианцев для продвижения объединения вместе с иезуитами. Со временем униатская церковь всё больше сближалась с католической церемонией: облачения, дизайн храмов и литургическая практика претерпели изменения, а православные праздники были упразднены. Эти изменения были кодифицированы на Замосцком синоде в 1720 году. В Закарпатье объединение было провозглашено в Ужгородском соборе в 1649 году и полностью утверждено к концу XVIII века. Сопротивление объединению в защиту религиозных и национальных свобод на Украине и в Беларуси в XVI и XVII веках в значительной степени возглавляли православные братства."
 BLR_church_reforms: "Церковная реформа"
 BLR_church_reforms_desc: "Нашему государству следует отказаться от православной религии, которая финансируется из Москвы. Пришло время возродить униатство на нашей земле."
 BLR_separate_rel: "Религия отделена от государства"
 BLR_state_rel: "Единство государства и религии"
 BLR_church_separate: "Разделение религии"
 BLR_church_separate_desc: "Религия не должна вмешиваться в государственные дела и должна служить лишь опорой для нашего общества."
 BLR_church_state: "Государственная религия"
 BLR_church_state_desc: "Религия должна активно направлять государственные дела, иначе мы обречены на духовный упадок."
 BLR_Increase_funding_Police: "§1Увеличить финансирование полиции§!"
 BLR_Increase_funding_Police_desc: "Последние события показали необходимость увеличения финансирования Министерства внутренних дел и его различных ведомств."
 BLR_riot_finance: "§1Финансирование спецназа§!"
 BLR_riot_finance_desc: "Наши подразделения по борьбе с беспорядками должны быть оснащены лучшим имеющимся снаряжением. Мы не должны экономить на этом."
 BLR_MVD: "Министерство внутренних дел"
 BLR_MVD_desc: "Белорусский орган государственного управления, возглавляющий систему органов внутренних дел и внутренних войск Министерства внутренних дел, осуществляющий в пределах своих полномочий регулирование и управление в области борьбы с преступностью, охраны общественного порядка, обеспечения общественной безопасности и координации деятельность в этой области других республиканских органов государственного управления."
 BLR_Internal_troops: "Внутренние войска"
 BLR_Internal_troops_desc: "Государственная военная организация Беларуси, защищающая права граждан, конституционную систему, безопасность и суверенитет Республики Беларусь от преступных посягательств."
 BLR_kgb_expand: "Комитет государственной безопасности"
 BLR_kgb_expand_desc: "Государственная исполнительная власть Беларуси и специальная служба, призванная защищать независимость и территориальную целостность Республики Беларусь, конституционный порядок и государственный суверенитет белорусского государства, а также обеспечивать национальную безопасность в политической, экономической, военной, научно-технической, информационной, социальной, демографической и экологической сферах, и проводить контрразведывательные и внешнеполитические операции."
 BLR_new_equipment_omon: "§1Специальнаяя группа - Альфа§!"
 BLR_new_equipment_omon_desc: "Группа «А» («Альфа») при Комитете государственной безопасности Республики Беларусь — это антитеррористическое подразделение КГБ Беларуси и одно из самых засекреченных подразделений специального назначения в правоохранительных органах страны. Бойцы «Альфы» участвуют в оперативно-боевых действиях, проводимых подразделениями КГБ, связанных с задержанием подозреваемых в шпионаже, захвате заложников, наркоторговле, контрабанде, незаконном обороте оружия и радиоактивных веществ, вымогательстве и нелегальной миграции."
 BLR_Countering_Cybercrime: "Главное управление по противодействию киберпреступности"
 BLR_Countering_Cybercrime_desc: "Киберпреступления также должны находиться под нашим надзором."
 BLR_Increase_funding_Almaz: "§1Специальное подразделение - АЛМАЗ§!"
 BLR_Increase_funding_Almaz_desc: "Специальное подразделение по борьбе с терроризмом «Алмаз» — это антитеррористическое подразделение Министерства внутренних дел Беларуси, выполняющее широкий спектр задач по предотвращению террористических актов и реагированию на них. Оно подчиняется непосредственно министру внутренних дел Республики Беларусь. По сообщениям СМИ, подразделение также принимает участие в подавлении политической оппозиции и в разгоне массовых протестов."
 BLR_military_police_training: "§1Подготовка военной полиции§!"
 BLR_military_police_training_desc: "Мы должны быть готовы к протестам и массовым беспорядкам в нашей стране, поскольку они могут быть спровоцированы из-за рубежа. Наши сотрудники полиции должны быть хорошо подготовлены к подавлению подобных беспорядков."
 BLR_peoples_security: "§1Контроль везде§!"
 BLR_peoples_security_desc: "Мы должны использовать технические достижения XXI века для улучшения наблюдения за населением — разумеется, ради его безопасности."
 BLR_procurement_of_espionage_equipment: "§1Приобретение Шпионского оборудования§!"
 BLR_procurement_of_espionage_equipment_desc: "Вместо того чтобы тратить деньги на дорогие камеры, лучше оснастить наших доблестных сотрудников правоохранительных органов соответствующим оборудованием, позволяющим быстро выслеживать любого, кто нам не угождает."
 BLR_occupation_management_strategies: "Запугать и доминировать"
 BLR_occupation_management_strategies_desc: "Прежде чем осмелиться свергнуть законное правительство, каждый должен трижды подумать, потому что всем прекрасно известно, что ничего хорошего не ждет тех, кто попадет в руки наших спецслужб."
 BLR_fin_snipes: "§1Sako TRG§!"
 BLR_fin_snipes_desc: "Винтовки Sako TRG-22 используются снайперами СОБР Внутренних войск Министерства внутренних дел Республики Беларусь."
