 corruption.1.t: "Ciekawa propozycja"
 corruption.1.d: "Jeden z ministrów skontaktował się z nami i powiedział, że można wprowadzić niewiele zmian organizacyjnych i prawnych, aby zoptymalizować działanie naszej administracji, choć będzie to wymagało pewnego... osobistego kontaktu z siłami napędowymi."
 corruption.1.a: "Być może, szansa"
 corruption.1.b: "Kiepski pomysł"
 corruption.2.t: "Ciekawa propozycja"
 corruption.2.d: "Jeden z ministrów skontaktował się z nami i powiedział, że można wprowadzić niewiele zmian organizacyjnych i prawnych, aby zoptymalizować działanie naszej policji, choć będzie to wymagało pewnego... osobistego połączenia z siłami przemieszczającymi się."
 corruption.2.a: "Być może, szansa"
 corruption.2.b: "Kiepski pomysł"
 corruption.3.t: "Ciekawa propozycja"
 corruption.3.d: "Jeden z ministrów skontaktował się z nami i powiedział, że można wprowadzić niewiele zmian organizacyjnych i prawnych, aby zoptymalizować działanie naszego kompleksu wojskowego, choć będzie to wymagało pewnego... osobistego połączenia z siłami ruchomymi."
 corruption.3.a: "Być może, szansa"
 corruption.3.b: "Kiepski pomysł"
 corruption.4.t: "Ciekawa propozycja"
 corruption.4.d: "Jeden z ministrów skontaktował się z nami i powiedział, że można wprowadzić niewiele zmian organizacyjnych i prawnych, aby zoptymalizować działanie naszych placówek edukacyjnych, choć będzie to wymagało pewnego… osobistego połączenia z siłami napędowymi."
 corruption.4.a: "Być może, szansa"
 corruption.4.b: "Kiepski pomysł"
 corruption.5.t: "Ciekawa propozycja"
 corruption.5.d: "Jeden z ministrów skontaktował się z nami i powiedział, że można wprowadzić niewiele zmian organizacyjnych i prawnych, aby zoptymalizować działanie naszych szpitali, choć będzie to wymagało pewnego… osobistego połączenia z siłami przenoszącymi."
 corruption.5.a: "Być może, szansa"
 corruption.5.b: "Kiepski pomysł"
 corruption.6.t: "Ciekawa propozycja"
 corruption.6.d: "Jeden z ministrów skontaktował się z nami i powiedział, że można wprowadzić niewiele zmian organizacyjnych i prawnych, aby zoptymalizować działanie naszych instytutów społecznych, choć będzie to wymagało pewnego... osobistego połączenia z siłami napędowymi."
 corruption.6.a: "Być może, szansa"
 corruption.6.b: "Kiepski pomysł"
 corruption.7.t: "Ciekawa propozycja"
 corruption.7.d: "Jedna z agencji informacyjnych poprosiła nas o dofinansowanie w zamian za korzystniejsze wieści."
 corruption.7.a: "Być może, szansa"
 corruption.7.b: "Kiepski pomysł"
 corruption.8.t: "Ciekawa propozycja"
 corruption.8.d: "Jeden z neutralnych polityków wystąpił z pomysłami współpracy z naszą opozycją, choć będzie to wymagało trochę brudnej roboty"
 corruption.8.a: "Być może, szansa"
 corruption.8.b: "Kiepski pomysł"
 corruption.9.t: "Ciekawa propozycja"
 corruption.9.d: "Jedna z firm budowlanych skontaktowała się z nami i zapytała, czy może ominąć niektóre przepisy, aby zapewnić możliwie najlepsze rezultaty."
 corruption.9.a: "Być może, szansa"
 corruption.9.b: "Kiepski pomysł"
 corruption.10.t: "Ciekawa propozycja"
 corruption.10.d: "Zwrócił się do nas jeden z podwykonawców wojskowych i zapytał, czy można ominąć niektóre przepisy, aby przyspieszyć budowę nowych obiektów."
 corruption.10.a: "Być może okazja"
 corruption.10.b: "Kiepski pomysł"
 corruption.11.t: "Ciekawa propozycja"
 corruption.11.d: "Jedna z firm budowlanych skontaktowała się z nami i zapytała, czy ignorują niektóre przepisy dotyczące ochrony środowiska, aby zapewnić najlepsze możliwe wyniki."
 corruption.11.a: "Być może, szansa"
 corruption.11.b: "Kiepski pomysł"
 corruption.12.t: "Ciekawa propozycja"
 corruption.12.d: "Jeden z podwykonawców wojskowych skontaktował się z nami i zapytał, czy ignorują niektóre przepisy dotyczące ochrony środowiska, aby zapewnić najlepsze możliwe wyniki."
 corruption.12.a: "Być może, szansa"
 corruption.12.b: "Kiepski pomysł"
 corruption.13.t: "Ciekawa propozycja"
 corruption.13.d: "Jeden z funduszy inwestycyjnych wystąpił z ciekawym pomysłem na pozyskanie inwestycji za granicą, choć wydaje się to całkowicie sprzeczne z prawem międzynarodowym."
 corruption.13.a: "Być może, szansa"
 corruption.13.b: "Kiepski pomysł"
 corruption.14.t: "Ciekawa propozycja"
 corruption.14.d: "Jeden z naszych bliskich przyjaciół skontaktował się z nami i zasugerował zorganizowanie małej imprezy, dzięki której rząd będzie mógł nawiązać bliższy kontakt ze swoimi najbardziej zaufanymi firmami"
 corruption.14.a: "Być może, szansa"
 corruption.14.b: "Kiepski pomysł"
 corruption.15.t: "Ciekawa propozycja"
 corruption.15.d: "Jeden z naszych biznesmenów skontaktował się z nami i zasugerował plan zwiększenia zysków z pozyskiwania zasobów, chociaż z pewnością obciąży to całą branżę"
 corruption.15.a: "Być może, szansa"
 corruption.15.b: "Kiepski pomysł"
 MD_character_army.1.t: "[FROM.GetName] is killed in action"
 MD_character_army.1.d: "After commanding [FROM.GetHersHis] forces to retreat, it seems [FROM.GetRank] [FROM.GetName] was caught under fire from enemy units, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.1.a: "Strata dla narodu."
 MD_character_army.2.t: "[FROM.GetName] is killed in action"
 MD_character_army.2.d: "After securing another victory, it seems [FROM.GetRank] [FROM.GetName] was attacked by regrouping units of the enemy, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.2.a: "Strata dla narodu."
 civil_war_debuff.1.t: "Nasza armia wraca do zdrowia!"
 civil_war_debuff.1.d: "Początkowy szok wojny domowej wpędził nasz kraj w kompletny chaos. Straciliśmy kontakt z niektórymi jednostkami wojskowymi, a nasi dowódcy, odpowiedzialni za nasz magazyn zaopatrzenia przestali reagować i nie wiedzieliśmy nawet, gdzie jest nasz wróg. Fronty się ustabilizowały i jest nieco bardziej jasne, kto jest po czyjej stronie, ale wciąż pozostaje wiele wyzwań.\n\nNasze wojsko składa się z weteranów i wolontariuszy, bez jasnego obrazu łańcucha dowodzenia. Walczymy z zaopatrzeniem naszych żołnierzy i ustanowieniem bezpośrednich szlaków zaopatrzeniowych. Nie mamy również jasnego obrazu stoczonych bitew i taktyk stosowanych przez naszego wroga. Co powinniśmy zrobić najpierw?"
 civil_war_debuff.1.a: "Musimy uzyskać jasny obraz polecenia!"
 civil_war_debuff.1.b: "Będziemy potrzebować broni. Dużo broni."
 civil_war_debuff.1.c: "Zapisz wszystko! Musimy zbadać naszego wroga."
 civil_war_debuff.2.t: "Nasza armia wraca do zdrowia!"
 civil_war_debuff.2.d: "Chociaż nasze wojsko od dawna znajduje się w chaosie, teraz sytuacja się poprawia. Mamy ogólne pojęcie o tym, kim i gdzie jest nasze wojsko, i udało nam się zabezpieczyć niektóre linie zaopatrzenia. Jednak wojsku nadal brakuje ogólnej spójności, a wiele jednostek i milicji działa niezależnie od centralnego dowództwa.\n\nNasze wojsko ma łańcuch dowodzenia, ale obowiązki i uprawnienia nie zawsze są przestrzegane. Mamy dość stałe dostawy broni, ale wiele jednostek ma własne zapasy. Nie mamy również wspólnej taktyki określonej dla naszych żołnierzy. Co powinniśmy zrobić, aby spróbować to poprawić?"
 civil_war_debuff.2.a: "Żołnierze muszą wiedzieć, jaka jest ich misja i kto nimi dowodzi"
 civil_war_debuff.2.b: "Nie możemy sobie pozwolić na niespójne zamówienia wojskowe."
 civil_war_debuff.2.c: "Rozdaj naszym żołnierzom podręczniki polowe."
 civil_war_debuff.3.t: "Nasza armia wraca do zdrowia!"
 civil_war_debuff.3.d: "Zamieszanie w naszej armii zaczyna znikać. Sposób działania naszych żołnierzy zaczyna teraz przypominać prawdziwe wojsko. Nadal pozostają pewne drobne problemy.\n\nIstnieje kilka zduplikowanych poleceń, w przypadku których uprawnienia dowódców pokrywają się. Zamówienia na zamówienia wojskowe czasami znikają, a przeznaczone na nie pieniądze trafiają poza wojsko. Tracimy dużo doświadczenia terenowego i trenerów, ponieważ żołnierze są zwalniani bez dokumentacji, a ofiary nie są odpowiednio klasyfikowane. Co powinniśmy spróbować poprawić?"
 civil_war_debuff.3.a: "Wyjaśniaj polecenia i rozwiązuj wewnętrzne konflikty."
 civil_war_debuff.3.b: "Zwalczaj korupcję w kontekście zakupów sprzętu wojskowego."
 civil_war_debuff.3.c: "Ustanowić proces przekazywania doświadczenia terenowego."
 civil_war_debuff.4.t: "Nasza armia wraca do zdrowia!"
 civil_war_debuff.4.d: "Już prawie jesteśmy. Chociaż pozostały pewne drobne problemy, nasza armia wygląda prawie tak, jak przed wojną. Jeszcze tylko kilka reform organizacyjnych powinno przywrócić naszą armię w pełni profesjonalną.\n\nWciąż istnieje kilka milicji, które nie są w pełni zintegrowane z armią. Część sprzętu, który kupujemy i produkujemy, nie jest wymienna. Nasze naczelne dowództwo prosi o dodatkowe środki w celu analizy doświadczeń bojowych z wojny. Co powinniśmy spróbować poprawić?"
 civil_war_debuff.4.a: "Zintegruj pozostałe milicje."
 civil_war_debuff.4.b: "Ujednolicenie naszych zapasów sprzętu."
 civil_war_debuff.4.c: "Przydziel dodatkowych oficerów do naszego naczelnego dowództwa."
 civil_war_debuff.5.t: "Nasza armia wraca do zdrowia!"
 civil_war_debuff.5.d: "Zrobione. Po dwóch latach reformowania nieefektywnej armii przezwyciężyliśmy szkody spowodowane wojną domową. Możemy teraz wrócić do zmuszania naszego wojska do ochrony nas przed zagrożeniami zewnętrznymi, a nie wewnętrznymi."
 civil_war_debuff.5.a: "Wspaniały dzień dla [ROOT.GetNameDef]."
 protests.1.t: "Rosnące napięcia"
 protests.1.d: "Niepokoje społeczne rosną z powodu niezadowolenia z wydatków rządowych. Protesty stają się coraz częstsze i bardziej radykalne. Administracja musi wybrać między zajęciem stanowczego stanowiska a próbą uspokojenia mas."
 protests.1.a: "Ignoruj ​​ich"
 protests.1.b: "Egzekwuj rozkaz"
 protests.1.c: "Rozpocznij negocjacje"
 protests.2.t: "Polityczna walka o władzę"
 protests.2.d: "Wraz ze wzrostem niezadowolenia społecznego manewry polityczne stają się coraz bardziej niepewne. Sytuacja wymaga wyboru między ochroną władzy politycznej, ryzykując pogłębieniem się radykalizacji, a podjęciem ryzyka, które może prowadzić do poważniejszych konsekwencji."
 protests.2.a: "Rzucić kostką"
 protests.2.b: "Nie odkładać słuchawki"
 protests.2.c: "Rozpocznij negocjacje"
 protests.3.t: "Kryzys w przywództwie"
 protests.3.d: "Popularność partii rządzącej spada w związku z trwającymi protestami. Rząd stoi przed krytyczną decyzją, która może wzmocnić lub osłabić jego władzę. Wynik może mieć trwały wpływ na krajobraz polityczny kraju"
 protests.3.a: "Ignoruj ​​protestujących"
 protests.3.b: "Rozproszyć radykały"
 protests.3.c: "Rozpocznij negocjacje"
 protests.4.t: "Zagraniczne wtrącanie się"
 protests.4.d: "W miarę narastania niepokojów w kraju, zainteresowanie zaczynają wykazywać zagraniczne mocarstwa. Rząd musi zdecydować pomiędzy akceptacją obcych wpływów takimi, jakie są, a próbą kontrolowania zagranicznych agentów."
 protests.4.a: "Nie wykonuj pochopnych ruchów"
 protests.4.b: "Znajdź każdego z nich"
 protests.4.c: "Rozpocznij negocjacje"
 protests.5.t: "Zatrzymany postęp"
 protests.5.d: "Protesty powodują znaczne spowolnienie inwestycji budowlanych w całym kraju. Administracja musi wybrać pomiędzy łagodzeniem skutków na krótszy czas a próbą spacyfikowania protestujących, ryzykując dłuższe opóźnienia."
 protests.5.a: "To na pewno ustanie za kilka dni"
 protests.5.b: "Teraz policja będzie miała trochę pracy"
 protests.5.c: "Rozpocznij negocjacje"
 protests.6.t: "Kryzys produkcji wojskowej"
 protests.6.d: "Rosnące niepokoje wpływają na produkcję wojskową, a rząd stoi przed kluczową decyzją. Czy powinni wprowadzić środki mające na celu utrzymanie produkcji, czy też podjąć próbę deeskalacji protestów, co mogłoby zaostrzyć kryzys produkcyjny?"
 protests.6.a: "Już niedługo wrócą do pracy"
 protests.6.b: "Zachowaj produkcję siłą"
 protests.6.c: "Rozpocznij negocjacje"
 protests.10.t: "Naród na krawędzi"
 protests.10.d: "Niepokoje społeczne osiągnęły poziom krytyczny. Decyzja rządu może doprowadzić albo do dalszej destabilizacji, albo do jeszcze większej radykalizacji społeczeństwa. Sytuacja jest poważna."
 protests.10.a: "To minie"
 protests.10.b: "Tłumić za wszelką cenę"
 protests.10.c: "Zaakceptuj ich żądania"
 protests.11.t: "Zamieszanie polityczne"
 protests.11.d: "Krajobraz polityczny pogrążył się w chaosie. Trzeba dokonać wyboru między znaczną utratą władzy politycznej a ryzykowną grą z jeszcze większymi potencjalnymi stratami. Stawki są wyższe niż kiedykolwiek."
 protests.11.a: "To minie"
 protests.11.b: "Gwardia Narodowa na ratunek"
 protests.11.c: "Zaakceptuj ich żądania"
 protests.12.t: "Upadek zaufania"
 protests.12.d: "Zaufanie do partii rządzącej szybko spada. Czeka nas kluczowa decyzja, która może jeszcze bardziej zmniejszyć popularność partii lub grozić całkowitym upadkiem władzy politycznej. Naród patrzy z zapartym tchem."
 protests.12.a: "To minie"
 protests.12.b: "Użyj siły"
 protests.12.c: "Zaakceptuj ich żądania"
 protests.13.t: "Zatrzymanie szlifowania"
 protests.13.d: "Budownictwo w całym kraju jest poważnie dotknięte. W obliczu rosnącej stawki rząd musi zdecydować pomiędzy drastycznym ograniczeniem prędkości na dłuższy czas a potencjalnie katastrofalnymi negocjacjami z protestującymi."
 protests.13.a: "Nie możemy się tym teraz zająć"
 protests.13.b: "Egzekwuj pracę"
 protests.13.c: "Zaakceptuj ich żądania"
 protests.14.t: "Machina Wojenna zawodzi"
 protests.14.d: "W obliczu kryzysu w produkcji wojskowej rząd staje przed bolesnym wyborem. Muszą albo egzekwować środki, które drastycznie wpłyną na produkcję przez dłuższy okres, albo ryzykować jeszcze bardziej znaczącymi konsekwencjami."
 protests.14.a: "Nie możemy się tym teraz zająć"
 protests.14.b: "Gdzie jest moja gwardia narodowa?"
 protests.14.c: "Zaakceptuj ich żądania"
 protests.20.t: "Punkt przełomowy"
 protests.20.d: "Lata niepokojów, niezadowolenia i nieudanych negocjacji doprowadziły do ​​momentu narodowej katastrofy. To, co zaczęło się jako pomruk niezadowolenia, przerodziło się w ogłuszający krzyk rewolucji, a ulice wypełniły się teraz wrzawą konfliktu. Pomimo prób stłumienia niepokojów, pogodzenia różnic i przywrócenia porządku, wysiłki rządu okazały się bezowocne. Zaufanie ludzi zostało nadwątlone, a ich cierpliwość wyczerpana. Naród jest podzielony, a struktura społeczeństwa rozdarta. Sąsiedzi zwracają się przeciwko sąsiadom, a dawni przyjaciele stają się wrogami, gdy linie podziału są wyznaczane i wybierane są strony. Protestujący chwycili za broń, a powietrze jest gęste od napięcia zbliżającej się bitwy. Nowy rozdział w historii narodu ma zostać napisany, a atramentem jest krew. Rozpoczyna się wojna domowa."
 protests.20.a: "Przygotuj się na konflikt"
 migrant_event.1.t: "Slumsy migrantów"
 migrant_event.1.d: "iektóre obszary wokół naszych głównych miast zaczęły rozwijać to, co miejscowi nazywają „Slumsami migrantów”. Jest to obszar zamieszkany przez biednych migrantów i uchodźców w kraju, którzy próbowali zarobić na życie, ale z powodu niskich płac i bardzo małej asymilacji w kraju przyjmującym znaleźli się w tych slumsach."
 migrant_event.1.a: "Rozbić slumsy"
 migrant_event.1.b: "Zapewnienie pomocy"
 migrant_event.1.c: "Zmniejsz cele migracji"
 migrant_event.2.t: "Nacjonaliści protestują przeciwko polityce migracyjnej"
 migrant_event.2.d: "Grupa nacjonalistów zorganizowała protest w jednym z naszych głównych miast przeciwko niedawnym migrantom do kraju. Protest wzywa do dodatkowych ograniczeń migracji i rozpoczęcia dalszej regulacji imigracji i migracji w kraju."
 migrant_event.2.a: "Zezwól na demonstrację"
 migrant_event.2.b: "Rozbić demonstrację"
 migrant_event.3.t: "Migranci oskarżeni o przestępstwa z użyciem przemocy"
 migrant_event.3.d: "Niektóre grupy migrantów w kraju zostały oskarżone o różne przestępstwa z użyciem przemocy, a nasza policja aresztowała dużą liczbę nowych migrantów w kraju. Prawicowi protestujący i ich zwolennicy zaczęli mówić rządowi, że takie będą konsekwencje niezamknięcia naszych granic. Jak powinniśmy zareagować?"
 migrant_event.3.a: "Tak nam powiedzieli..."
 migrant_event.3.b: "Zwiększyć finansowanie policji."
 LibyaNews.1.a: "Doskonały"
 Sudan.1.t: "Ci, którzy pozostali"
 Sudan.1.d: "Niektóre z naszych terytoriów na południowej granicy nadal zamieszkuje dość duża populacja chrześcijan i animistów. Wiele osób na tych terytoriach jest zaniepokojonych wykluczeniem ich z referendum w Sudanie Południowym. Spór stawał się coraz większy i ci ludzie domagają się teraz połączenia z [SSU.GetName], ponieważ uważają, że pod naszym rządem nie zostaną odpowiednio przedstawieni."
 Sudan.1.a: "Dobra, nie potrzebujemy ich"
 Sudan.1.b: "To słusznie nasza ziemia!"
 Sudan.2.t: "Sojusz z [DAR.GetNameDef]?"
 Sudan.2.d: "Nie tylko my walczymy z rządem. W Darfurze są także rebelianci. Być może powinniśmy obiecać im zwiększoną reprezentację w przyszłym rządzie Sudanu, jeśli będzie z nami sojusznikiem?"
 Sudan.2.a: "Wyślij im prośbę"
 Sudan.2.b: "Nie potrzebujemy ich"
 Sudan.2.a.tt: "Jeśli zaakceptują, to\n"
 Sudan.3.t: "[FROM.GetNameDef] oferuje sojusz"
 Sudan.3.d: "[FROM.GetNameDef] zaproponował nam sojusz, ponieważ on też walczy z rządem [SUD.GetAdjective]. Obiecują nam zwiększoną reprezentację w nowym rządzie Sudanu, który budują. Co powinniśmy odpowiedzieć?"
 Sudan.3.a: "Zgadzamy się"
 Sudan.3.b: "Nie potrzebujemy ich"
 Sudan.4.t: "[FROM.GetNameDef] zgadza się na sojusz z nami"
 Sudan.4.d: "[FROM.GetNameDef] zgodził się na wspólny front przeciwko [SUD.GetLeader] razem z nami."
 Sudan.4.a: "Świetnie!"
 Sudan.5.t: "[FROM.GetNameDef] odmawia zawarcia z nami sojuszu"
 Sudan.5.d: "[FROM.GetNameDef] odmówił wspólnego frontu przeciwko [SUD.GetLeader] razem z nami."
 Sudan.5.a: "Ich strata"
 Sudan.6.t: "[FROM.GetNameDef] i [DAR.GetNameDef] łączą siły"
 Sudan.6.d: "[FROM.GetNameDef] i [DAR.GetNameDef] utworzyli wspólny front w swojej walce z nami."
 Sudan.6.a: "Cholera"
 SudanNews.1.d: "Konflikt w Kordofanie Południowym i Nilu Błękitnym wreszcie się zakończył. [FROM.GetLeader] ogłosił zwycięstwo w konflikcie i okaże się, w jakim kierunku kraj pójdzie w przyszłości."
 SudanNews.2.t: "Konflikt w Kordofanie Południowym i Nilu Błękitnym"
 SudanNews.2.d: "After the Comprehensive Peace Agreement, some areas in [SUD.GetName] with Christian and Animist populations were left from being included in the South Sudanese independence referendum. The people living here have grown increasingly tired of the [SUD.GetAdjective] government ever since the agreement. They feel that they lack representation in the current government, and have now taken up arms against the government."
 SudanNews.2.a: "Ciekawe"
 SouthSudan.1.t: "Referendum w sprawie niepodległości Sudanu Południowego"
 SouthSudan.1.d: "Nadszedł czas, aby naród Sudanu Południowego zagłosował za swoją niepodległością. Chociaż niektórzy mieszkańcy Sudanu nie są zadowoleni, że zostali wykluczeni z obszaru referendum, udało nam się objąć większość populacji chrześcijan i animistów. Otworzy to nowy rozdział w pokoju i dobrobycie dla obu Sudanów."
 SouthSudan.1.a: "A zwycięzcą jest..."
 SouthSudan.4.t: "[FROM.GetNameDef] prosi o wsparcie"
 SouthSudan.4.d: "Nasz wieloletni sojusznik, [FROM.GetLeader] poprosił o pomoc wojskową w walce z [SUD.GetNameDef]. Oznajmił, że bez naszej pomocy wojskowej ich wysiłek wojenny upadnie. Pod koniec lat 80. nasze wojska brały udział w walkach w Sudanie Południowym, ale w obliczu konfliktu w Kongo musieliśmy zmienić priorytety. Kongo zostało już załatwione, może moglibyśmy poświęcić coś [FROM.GetLeader]?"
 SouthSudan.5.t: "[FROM.GetNameDef] Wspiera nas"
 SouthSudan.5.d: "[FROM.GetLeader] zgodził się nam pomóc. Oddziały [FROM.GetAdjective] lada dzień powinny przekroczyć granicę."
 SouthSudan.5.a: "Doskonały"
 SouthSudan.6.t: "[FROM.GetNameDef] Wycofuje się"
 SouthSudan.6.d: "[FROM.GetLeader] stwierdził, że nie stać go na pomaganie nam w większym stopniu niż już to zrobił."
 SouthSudan.6.a: "Cholera"
 SouthSudan.7.t: "[FROM.GetNameDef] Chętny do oddania ziemi"
 SouthSudan.7.d: "[SUD.GetNameDef] jest obecnie uwikłany w wojnę domową. Przeciwna frakcja [SSU.GetName] zaproponowała nam układ; Dadzą nam pełną kontrolę nad terytorium Trójkąta Ilemi, a w zamian pomożemy im skonfigurować wojskową sieć zaopatrzenia. Czy powinniśmy przyjąć ich ofertę?"
 SouthSudan.7.a: "Oczywiście"
 SouthSudan.7.b: "Nie jesteśmy zainteresowani"
 SouthSudan.8.t: "[FROM.GetNameDef] akceptuje naszą ofertę"
 SouthSudan.8.d: "[FROM.GetLeader] zgodził się przejąć kontrolę nad Trójkątem Ilemi w zamian za pomoc nam z naszą armią."
 SouthSudan.8.a: "Doskonały"
 SouthSudan.9.t: "[FROM.GetNameDef] odrzuca naszą ofertę"
 SouthSudan.9.d: "[FROM.GetLeader] odrzucił naszą ofertę Trójkąta Ilemi. Obawiają się, że to posunięcie przyniesie im pewne konsekwencje ze strony [SUD.GetNameDef]."
 SouthSudan.9.a: "Cholera"
 SouthSudan.10.t: "Kongijscy rebelianci przekraczają granicę"
 SouthSudan.10.d: "Otrzymaliśmy raporty o dużych grupach zbrojnych, które przekroczyły granicę z [DRC.GetNameDef] i zaatakowały miasta Yambio i Yei. Wygląda na to, że te grupy zostały wyposażone i zatrudnione przez rząd [SUD.GetAdjective]. Sprzeciw [DRC.GetName] przeciwko [UGA.GetName] dał im motywację, aby pozwolić na to przekroczenie granicy."
 SouthSudan.10.a: "Przeklęci Kongijczycy!"
 SouthSudan.11.t: "Przygotowania do referendum"
 SouthSudan.11.d: "Po podpisaniu porozumienia pokojowego między północą a południem Sudanu obie strony rozpoczęły przygotowania do referendum. Obecne prognozy pokazują, że zdecydowana większość [SSU.GetAdjective] ludzi będzie głosować za niepodległością, ponieważ nie są zbyt chętni, aby rządzili nimi twardogłowi muzułmanie. Jednakże w przypadku wtrącania się politycznego i kontroli nad kluczowymi osobistościami rządowymi Północ może ponownie przejąć kontrolę nad Południem."
 SouthSudan.11.a: "Musimy się przygotować"
 SouthSudan.11.tooltip: "Prawdopodobieństwo, że mieszkańcy Sudanu Południowego zagłosują za pozostaniem w Sudanie, wynosi §Y[SUD.GetAdjective] Wpływ w [SSU.GetNameWithFlag] pomnożony przez 0,75§!. Jeśli wpływ [SUD.GetAdjective] w [SSU.GetNameWithFlag] wynosi §Yponiżej 20%§!, referendum zawsze zakończy się §Yniepodległością§!."
 SouthSudan.12.t: "[FROM.GetNameDef] Uzyskuje niezależność"
 SouthSudan.12.d: "[FROM.GetName] przeprowadziło referendum w sprawie niepodległości na kontrolowanych przez siebie terytoriach. Wyniki dotyczące niepodległości brzmiały na korzyść 99,83%. Co zaskakujące, przed głosowaniem doszło do bardzo niewielkiej przemocy wyborczej i ogólnie wybory uznano za uczciwe."
 SouthSudan.12.a: "To chyba pożegnanie"
 SouthSudan.13.t: "[FROM.GetNameDef] sprzyja jedności"
 SouthSudan.13.d: "[FROM.GetName] przeprowadziło referendum w sprawie niepodległości na kontrolowanych przez siebie terytoriach. Wyścig był zacięty, ale głosy za pozostaniem w Sudanie zwyciężyły, zdobywając 54% głosów. Wielu Sudańczyków Południowych wyraziło obawy, że próba oddzielenia się od Sudanu jedynie ponownie wywoła wojnę domową."
 SouthSudan.13.a: "Witamy spowrotem!"
 SouthSudan.14.t: "Helikopter [ROOT.GetLeader] rozbija się"
 SouthSudan.14.d: "Na weekend nasz prezydent [ROOT.GetLeader] udał się na spotkanie ze swoim wieloletnim sojusznikiem [UGA.GetLeader]. Nie powiedział o tej podróży rządowi [SUD.GetAdjective], zamiast tego skłamał, że jest na wakacjach w New Kush. Jednakże [ROOT.GetLeader] nigdy nie wrócił do domu. Podczas lotu powrotnego jego helikopter rozbił się w pasmie górskim w południowym Sudanie, zabijając go, sześciu jego kolegów i siedmiu członków załogi [UGA.GetAdjective]. Nasz rząd stara się rozwiązać kwestię sukcesji, ale jest prawdopodobne, że urząd obejmie zastępca [ROOT.GetLeader], Salva Kiir Mayardit."
 SouthSudan.14.a: "Kilka miesięcy po pokoju? Podejrzany..."
 SouthSudan.15.t: "Pogłoski o zamachu stanu"
 SouthSudan.15.d: "Słyszeliśmy pogłoski, że jeden z naszych sojuszników w czasie wojny domowej planuje obalić nasz rząd. Moglibyśmy zdementować te pogłoski. Biorąc jednak pod uwagę, że nasza armia składa się obecnie z kilkudziesięciu mniejszych grup rebeliantów, jest więcej niż prawdopodobne, że ktoś próbuje przejąć tron. Co powinniśmy zrobić?"
 SouthSudan.15.a: "Nasi sojusznicy są lojalni"
 SouthSudan.15.b: "Czyść generałów! Policja! Wszyscy!"
 SouthSudan.15.a.tt: "Jeśli wybuchnie wojna domowa, opozycja będzie §YSilniejsza§! niż nasza strona"
 SouthSudan.15.b.tt: "Jeśli wybuchnie wojna domowa, opozycja będzie §Ysłabsza§! niż nasza strona"
 SouthSudan.16.t: "Co kryje się pod nazwą?"
 SouthSudan.16.d: "Teraz, gdy jesteśmy niezależni, musimy zdecydować, jak nazwać nasz kraj. Od opinii publicznej zebrano kilka sugestii, przy czym oczywistym faworytem jest Sudan Południowy. Mogliśmy jednak wybrać inną nazwę"
 SouthSudan.16.a: "Sudan Południowy jest dobry"
 SouthSudan.16.b: "Azanii, pamiętajmy o naszej historii"
 SouthSudan.16.c: "Republika Nilu jest jak najbardziej odpowiednia"
 SouthSudan.16.dd: "Republika Kusz jest najlepsza"
 SouthSudanNews.1.d: "Wojna domowa w [SSU.GetNameDef] dobiegła końca. Wojna rozpoczęła się po walce o władzę pomiędzy różnymi grupami rebeliantów, wkrótce po sfinalizowaniu przez kraj stosunków z [SUD.GetNameDef]. Być może teraz kraj będzie mógł rozpocząć odbudowę."
 SouthSudanNews.2.t: "Kompleksowe Porozumienie Pokojowe"
 SouthSudanNews.2.d: "Frakcje [SUD.GetAdjective] i [SSU.GetAdjective] osiągnęły porozumienie pokojowe kończące drugą wojnę domową w Sudanie. Z pomocą negocjatorów z Międzyrządowego Organu ds. Rozwoju obie strony uzgodniły ramy, w których [SSU.GetNameDef] uzyska autonomię w ramach rządu [SUD.GetAdjective]. Strony ustaliły, że w ciągu 6 lat odbędzie się referendum w sprawie pełnej niepodległości [SSU.GetNameDef]. Być może to porozumienie ostatecznie rozwiąże trwający od kilkudziesięciu lat konflikt etniczny w regionie."
 SouthSudanNews.3.t.SUD: "Rebelianci z Sudanu Południowego rozbici"
 SouthSudanNews.3.t.SSU: "Narodziny Nowego Sudanu"
 SouthSudanNews.3.d.SUD: "Ostatni odcinek konfliktu etnicznego [SUD.GetAdjective] dobiegł końca, gdy rząd [SUD.GetAdjective] zmiażdżył rebeliantów w południowych częściach kraju. To pozostawi [SUD.GetLeader] swobodę kontynuowania islamizacji i arabizacji kraju, ku dużej niechęci południowej populacji chrześcijan i animistów."
 SouthSudanNews.3.d.SSU: "Ostatni odcinek konfliktu etnicznego [SUD.GetAdjective] dobiegł końca wraz z obaleniem rządu przez rebeliantów z Sudanu Południowego. Poprzedni przywódca [SUD.GetAdjective] [SUD.GetLeader] został uwięziony i oczekuje na proces w związku z łamaniem praw człowieka i zbrodniami wojennymi. Nowy reżim obiecuje wolny i równy Sudan, ale wielu analityków zwróciło uwagę, że rządzący [SSU.GetLeader] podjął już kroki mające na celu uciszenie wszelkiej opozycji podczas ich kadencji jako przywódcy rebeliantów."
 SouthSudanNews.3.a: "Ciekawe"
 SouthSudanNews.4.t.independence: "[FROM.GetNameDef] Uzyskuje niezależność"
 SouthSudanNews.4.t.autonomy: "[FROM.GetNameDef] pozostaje częścią [SUD.GetNameDef]"
 SouthSudanNews.4.d.independence: "[FROM.GetNameDef] przeprowadziło referendum w sprawie niepodległości zgodnie z ustaleniami porozumienia pokojowego z [SUD.GetName]. Wyniki były zdumiewające, że 98% opowiedziało się za rozdziałem obu państw. To sprawia, że ​​[SSU.GetName] jest najmłodszym krajem w Afryce."
 SouthSudanNews.4.d.autonomy: "[FROM.GetNameDef] przeprowadziło referendum w sprawie niepodległości zgodnie z ustaleniami porozumienia pokojowego z [SUD.GetName]. Wyniki były bliskie remisu, ale opcja opowiadająca się za jednością z [SUD.GetName] zwyciężyła 53%. Spekuluje się, że obawa przed ponownym wybuchem wojny w przypadku oddzielenia się [SSU.GetName] od [SUD.GetName] sprawiła, że ​​wyborcy opowiadali się za jednością. Niezależnie od tego, [SSU.GetName] uzyskało pewną autonomię, ale okaże się, jak długo to potrwa."
 SouthSudanNews.4.a: "Ciekawe"
 SouthSudanNews.5.t: "Wojna domowa w [SSU.GetNameDef]"
 SouthSudanNews.5.d: "W młodym narodzie [SSU.GetName] rozpoczęła się wojna domowa. Zaledwie kilka lat po zakończeniu konfliktu z [SUD.GetName] konflikt rozpoczął się na nowo. Wydaje się, że skoro nie ma już wspólnego wroga dla różnych grup rebeliantów, rozpoczęła się walka o władzę pomiędzy różnymi grupami."
 SouthSudanNews.5.a: "Ciekawe"
 war_in_darfur_threat: "Wojna w Darfurze"
 Darfur.2.t: "Rebelianci z Darfuru atakują Golo"
 Darfur.2.d: "Grupa rebeliantów należących do Frontu Wyzwolenia Darfuru oraz Ruchu Sprawiedliwości i Równości zaatakowała małe miasteczko Golo, siedzibę dystryktu Jebel Marra, na południe od Kabkabiyi. Atak poprzedziły mniejsze potyczki z lokalnymi komisariatami policji, placówkami wojskowymi i konwojami wojskowymi. Rebelianci są zmęczeni polityką arabizacji prowadzoną przez [SUD.GetLeader] w regionie i żądają ich ustąpienia."
 Darfur.2.a: "Cholera"
 Darfur.3.t: "Rebelianci z Darfuru zamykają granicę Czadu"
 Darfur.3.d: "Grupa rebeliantów należących do Frontu Wyzwolenia Darfuru oraz Ruchu Sprawiedliwości i Równości zajęła przygraniczne miasto Tine w pobliżu granicy z Czadem. W trakcie zdobyli dużą ilość broni i zaopatrzenia. Rebelianci próbują nawiązać połączenie z Czadem, gdzie żyje wiele plemion sympatyzujących ze sprawą Darfuri."
 Darfur.3.a: "Cholera"
 Darfur.4.t: "Rebelianci z Darfuru napadają na El Fasher"
 Darfur.4.d: "Wczesnym rankiem grupa rebeliantów z Frontu Wyzwolenia Darfuru oraz Ruchu Sprawiedliwości i Równości zaatakowała uśpiony garnizon w El Fasher. W ciągu następnych kilku godzin w lokalnej bazie lotniczej zniszczono kilka samolotów wojskowych, w wyniku czego zginęło 75 żołnierzy, a 32 wzięto do niewoli. Rebeliantom udało się także schwytać generała dywizji, który był dowódcą bazy lotniczej. Było to poważną porażką dla naszej armii i kilka jednostek wojskowych opuściło swoje placówki w obawie przed atakami rebeliantów."
 Darfur.4.a: "Cholera"
 DarfurNews.1.t: "Rozpoczyna się wojna w Darfurze"
 DarfurNews.1.d: "Dziesięciolecia polityki wymuszonej arabizacji prowadzonej przez rząd [SUD.GetAdjective] w końcu osiągnęły punkt wrzenia. Dwie grupy rebeliantów, Front Wyzwolenia Darfuru oraz Ruch Sprawiedliwości i Równości, doprowadziły do ​​eskalacji konfliktu z powstania na niskim szczeblu do pełnej wojny. Czas pokaże, czy [SUD.GetName] będzie w stanie poradzić sobie z tymi rebeliantami."
 DarfurNews.1.a: "Ciekawe"
 DarfurNews.2.t: "[DAR.GetNameDef] Przyznana autonomia"
 DarfurNews.2.d: "Po latach konfliktu między rebeliantami [DAR.GetAdjective] a siłami rządowymi [SUD.GetAdjective] obie strony zgodziły się na porozumienie pokojowe. [DAR.GetName] otrzyma ograniczoną autonomię w ramach [SUD.GetName], co powinno chronić je przed dyskryminacją. Czas pokaże, czy [SUD.GetLeader] planuje dotrzymać tego porozumienia."
 DarfurNews.2.a: "Ciekawe"
 DarfurNews.3.t: "[DAR.GetNameDef] Uzyskuje niezależność"
 DarfurNews.3.d: "Po latach konfliktu pomiędzy rebeliantami [DAR.GetAdjective] a siłami rządowymi [SUD.GetAdjective], siłom [DAR.GetAdjective] udało się zwyciężyć. Po udanych najazdach z Darfuru do właściwego Sudanu rząd [SUD.GetAdjective] nie miał innego wyjścia, jak tylko dać ustępstwa rebeliantom [DAR.GetAdjective]. Naród [DAR.GetName] uzyskał teraz pełną niepodległość, ale czas pokaże, czy [SUD.GetName] wykorzystuje to tylko jako okazję do odbudowania swoich sił."
 DarfurNews.3.a: "Ciekawe"
 corruption.16.t: "Korupcja wzrosła"
 corruption.16.d: "Szpiedzy i agenci z innego kraju wtrącają się do naszego kraju, zwiększając wskaźnik korupcji w naszym kraju. Pochodzi z różnych źródeł, takich jak celowe łapówki, negocjacje i dobrze umiejscowieni agenci podporządkowani w kraju."
 corruption.16.a: "Niefortunny"
 Israel.1111.t: "Plotki o trzeciej intifadzie"
 Israel.1111.d: "Wpływowa palestyńska grupa islamistów Hamas wezwała do nowego powstania przeciwko Izraelowi, które rozpocznie się w piątek. Przemawiając w czwartek w Gazie, przywódca Hamasu Ismail Haniyeh powiedział: „Powinniśmy wzywać i powinniśmy pracować nad rozpoczęciem intifady w obliczu syjonistycznego wroga”. Powiedział również: „Chcemy, aby powstanie trwało i aby Trump i okupanci nadal żałowali tej decyzji”."
 Israel.1111.a: "O o..."
 Israel.1112.t: "Izrael grozi wojną"
 Israel.1112.d: "Z powodu naszego zamrożonego konfliktu z Izraelem na Wzgórzach Golan, grozili nam wypowiedzeniem wojny, jeśli nie wycofamy naszych roszczeń!"
 Israel.1112.a: "Odwołaj nasze roszczenie w Golan"
 Israel.1112.b: "Wojna!"
 restart_boardcross_expenditure: "Wznawia wszystkie wydatki na całej linii"
 god_of_war_event.1.t: "Jesteś gotowy na wyzwanie?"
 god_of_war_event.1.d: "Zwykle, poza większością podstawowych wzmocnień, AI w MD nie oszukuje. Dotyczy to projektów pojazdów i dywizji w stylu RP, ale z tą opcją AI BĘDZIE OSZUKUJE.\nTworzyłby sprzęt i dywizje z powietrza i starałby się bardziej stawiać opór graczowi. To nie będzie doświadczenie Endsieg, AI jest stworzone, aby rzucić wyzwanie graczowi, a nie przytłoczyć go.\n\nP.S. Nadal nie masz prawa do przechwałek po pokonaniu tej AI."
 god_of_war_event.1.a: "Dawaj!"
 god_of_war_event.1.b: "Spraw też, żeby sztuczna inteligencja bardziej się na mnie skupiała!"
 md4.21.t: "[FROM.GetName]-[Root.GetName] EAEU Integration"
 md4.21.d: "[FROM.GetNameDef] is asking us to allow them into EAEU. We will have priority to export to and import from them and will economically integrate into each other further."
 md4.21.a: "Podpisz to!"
 md4.21.b: "Odmawiać"
 md4.22.t: "[FROM.GetNameDef] Has Signed Our Ascension into EAEU!"
 md4.22.d: "[FROM.GetNameDef] has accepted our offer to sign allow us into EAEU."
 md4.22.a: "To uczyni nas oboje bogatymi!"
 md4.23.t: "[FROM.GetNameDef] Has Refused our offer to sign allow us into EAEU."
 md4.23.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.23.a: "Boją się naszych lepszych produktów!"
 EUR_idea_eacu_cooperation: "Współpraca EAEU"
 EUR_idea_eacu_cooperation_desc: "Euroazjatycka Unia Celna (pierwotnie Euroazjatycka Wspólnota Gospodarcza) promuje więzi gospodarcze między większością państw postsowieckich. Unia nakłada wspólną taryfę zewnętrzną na wszystkie towary wwożone do unii i działa jako jeden podmiot podczas zawierania umów handlowych i negocjacji."
 EUR_idea_eacu_cooperation_2: "Zintegrowana współpraca EAEU"
 EUR_idea_eacu_cooperation_2_desc: "Euroazjatycka Unia Celna (pierwotnie Euroazjatycka Wspólnota Gospodarcza) promuje więzi gospodarcze między większością państw postsowieckich. Unia nakłada wspólną taryfę zewnętrzną na wszystkie towary wwożone do unii i działa jako jeden podmiot podczas zawierania umów handlowych i negocjacji."
 influence.1.c: "Wyślij 15% PKB jako pomoc gospodarcza."
 influence.1.e: "Po namyśle nie potrzebują tego."
 Cameroon.2.t: "Wrak łodzi"
 Cameroon.2.d: "Łódź przewożąca 150 pasażerów płynęła z nigeryjskiego portu Oron do gabońskiego portu Gentil, gdy ich łódź się wywróciła. Szacuje się, że ponad stu pasażerów zginęło, a reszta jest w stanie krytycznym, trzyma się pontonów z wraku statku. Miejscowi rybacy i kameruńskie władze z miasta Kirbi przeszukują fale i wodę w poszukiwaniu kolejnych ocalałych, ale sytuacja wygląda coraz bardziej ponuro...\n\nMożemy zaoferować pokrycie rachunków za leczenie ocalałych lub możemy wybrać dzień modlitwy za dusze zmarłych i powrót do zdrowia ocalałych."
 Cameroon.2.a: "Powinniśmy zapłacić za rachunki medyczne."
 Cameroon.2.b: "Dzień modlitwy jest wskazany."
 world_war.1.t: "Wojna światowa w transporcie kolejowym umożliwiona"
 world_war.1.d: "Tradycyjnie Millennium Dawn było modem zorientowanym na sandbox, a zatem odeszło od kolejnictwa wojny światowej, jak inne mody. Ta opcja została stworzona, aby zaspokoić pragnienie, jakie niektórzy w społeczności odczuwają, aby po prostu styl rozgrywki był zorientowany na wojnę. Ta zasada gry została stworzona z myślą o zasadach MD, a zatem będzie miała różne scenariusze rozpoczęcia wojny światowej w zależności od tego, kim grasz. Wojna rozpocznie się około 2014 roku, więc będziesz mieć trochę czasu, aby się do niej przygotować."
 world_war.1.a: "Dobra"
 world_war.2.t: "Chiny działają przeciwko Tajwanowi"
 world_war.2.d: "PLA ogłosiło rozpoczęcie działań przeciwko Republice Chińskiej, co oznacza kontynuację chińskiej wojny domowej. Choć nie jest to coś, czego nasz wywiad nie wychwycił, mieliśmy powody, by sądzić, że Chiny zachowają powściągliwość w obliczu możliwego odwetu ze strony Stanów Zjednoczonych."
 world_war.2.a: "[CHI.GetName] przekroczyło naszą czerwoną linię"
 world_war.2.b: "Problemy azjatyckie są problemami Azjatów"
 world_war.3.t: "Amerykańska interwencja przeciwko Chinom"
 world_war.3.d: "[USA.GetLeader] ogłosił dziś, że wydał rozkaz armii Stanów Zjednoczonych, aby przygotowała się do pełnej mobilizacji przeciwko [CHI.GetName]. Stało się to po chińskich atakach na Tajwan i kontynuacji chińskiej wojny domowej. Chociaż Chiny podały powody inwazji, Stany Zjednoczone oświadczyły, że głównym celem tej interwencji jest pokazanie, że „Stany Zjednoczone zawsze będą wspierać swoich sojuszników, niezależnie od agresora”. Krążą obawy, że ta interwencja doprowadzi do dalszej eskalacji w regionie, a niektórzy nazywają to początkiem trzeciej wojny światowej."
 world_war.3.a: "Niepokojący"
 world_war.4.t: "Ameryka rozproszona w Chinach"
 world_war.4.d: "Imperialiści w Waszyngtonie rozpoczęli kampanię przeciwko naszym partnerom w Chinach. Mając to na uwadze, mamy przed sobą złotą okazję. Podczas gdy oni są zajęci Chinami, my mamy możliwość wkroczenia i odzyskania tego, co kiedyś było nasze, czyli całości Korei."
 world_war.4.a: "Nie możemy ryzykować zmarnowania takiej okazji"
 world_war.4.b: "To jest zbyt ryzykowne"
 world_war.5.t: "Konflikt w Azji eskaluje"
 world_war.5.d: "Wojna w Azji eskaluje, a rząd Korei Północnej atakuje Republikę Korei w celu zjednoczenia całości Półwyspu Koreańskiego pod rządami KRLD. Ten ruch Koreańskiej Republiki Ludowo-Demokratycznej skłonił Japonię do odpowiedzi poprzez wysłanie wojsk do Republiki Korei, co zapoczątkowało znacznie większą wojnę niż przewidywano. Świat wstrzymuje oddech, ponieważ wojna, która rozpoczęła się od Chin, szybko pochłonęła większość Azji Wschodniej. Narody na całym świecie, szczególnie w Europie i Afryce, potępiają przemoc w Azji pośród obaw o dodatkowy teatr wojny otwierający Europę w wyniku chaosu i niestabilności panującej obecnie na świecie."
 world_war.5.a: "Trzecia wojna światowa już tu jest"
 world_war.6.t: "Wojna w Korei"
 world_war.6.d: "Koreańska Republika Ludowo-Demokratyczna zaostrzyła wojnę w regionie, nielegalnie wypowiadając wojnę Republice Korei. Ten ruch zagraża porządkowi, który tak niestrudzenie staraliśmy się zachować przez dziesięciolecia, a wśród naszej ludności narastają wezwania do działania. Musimy bronić naszych przyjaciół i integralności, wspierając Koreę w taki czy inny sposób."
 world_war.6.a: "Koreańska Republika Ludowo-Demokratyczna popełniła dziś poważny błąd"
 world_war.6.b: "Nie możemy się angażować"
 world_war.7.t: "Rosja naciska na zachód"
 world_war.7.d: "Rząd rosyjski posunął się na zachód i rozpoczął wojnę na pełną skalę przeciwko Ukrainie. Ta ekspansja bardzo niepokoi nasze dowództwo wojskowe i naszych sojuszników, ponieważ los kontynentu europejskiego jest nieznany i pozostanie nieznany, dopóki nie pokażemy Rosjanom, że Europa nie jest ciastem, które należy zjeść."
 world_war.7.a: "Tym razem Rosja posunęła się za daleko"
 world_war.7.b: "Nie możemy ryzykować wojny"
 world_war.8.t: "Wojna w Europie"
 world_war.8.d: "Po rosyjskich najazdach na Ukrainę, siły NATO wkroczyły na Ukrainę, aby stawić czoła siłom rosyjskim. Już teraz pojawiają się doniesienia o potyczkach powietrznych i morskich, co zwiastuje początek większej wojny w Europie. Organizacje międzynarodowe na całym świecie zaczęły nazywać ten konflikt Trzecią Wojną Światową, ponieważ siły NATO są obecnie zaangażowane w walkę z siłami rosyjskimi w całej Europie. Prawie każdy naród dysponujący bronią jądrową jest obecnie w stanie wojny ze sobą, a obawy przed wymianą nuklearną rosną. Nikt nie wie, czy świat się skończy, ale jedno jest pewne: następny porządek świata z całą pewnością zapewni, że nie będzie to porządek wielobiegunowy."
 world_war.8.a: "Historia została napisana jeszcze raz"
 world_war.9.t: "Nasze ambicje na świecie"
 world_war.9.d: "Dziś Amerykanie, Chińczycy i Japończycy są zaangażowani w wielki konflikt przeciwko sobie. Z uwagi na zaangażowanie Europejczyków w wysiłek wojenny, nasz rząd coraz bardziej obawia się ekspansji Europy na wschód w kierunku naszych granic. Dowództwo wojskowe zasugerowało, abyśmy wkroczyli na Ukrainę, aby zapobiec możliwemu europejskiemu niespodziewanemu atakowi w przyszłości."
 world_war.9.a: "Posłuchaj ich rady"
 world_war.9.b: "Nie możemy ryzykować wojny, opierając się na założeniach"
 world_war.10.t: "Wybuch wojny na Bliskim Wschodzie"
 world_war.10.d: "Po kilku irańskich atakach na Izrael, Siły Obronne Izraela wezwały swoich sojuszników do obalenia i demontażu rządu w Iranie. To wydarzenie zmieniające świat jest po prostu kolejną częścią większej wojny, którą eksperci nazwali trzecią wojną światową, a teraz pojawia się kolejny teatr wojny. Rywalizacja między Iranem a Izraelem nie jest czymś nowym, rozpoczęła się po rewolucji islamskiej w Iranie w 1979 r. Nie wiadomo, czy Iran posiada broń jądrową, ale istnieją obawy o potencjalną wymianę nuklearną między Osią Oporu a Izraelem. Obecnie nie wiadomo, czy jakiekolwiek strony trzecie zaangażują się w taki konflikt, ale wiadomo, że wojna ta może doprowadzić do potencjalnego zniszczenia Bliskiego Wschodu i światowych rynków ropy naftowej."
 world_war.10.a: "Czy gdziekolwiek jest bezpiecznie?"
 world_war.11.t: "Wyzwolenie Al-Kuds"
 world_war.11.d: "Gdy Ameryka i reszta światowych mocarstw są rozproszone w wojnie na wyniszczenie, w końcu mamy wystarczającą okazję, aby uderzyć w Izrael i doprowadzić do końca reżimu syjonistycznego. Taki atak mógłby doprowadzić do zniszczenia naszych dwóch państw, ale to już teraz, albo nigdy."
 world_war.11.a: "Atak!"
 world_war.11.b: "Nie możemy ryzykować wojny"
 taiwan.17.t: "Wybór nowej stolicy"
 taiwan.17.d: "Rozkoszujemy się owocami naszego zwycięstwa, musimy jednak zacząć myśleć o przeniesieniu naszej stolicy administracyjnej na kontynent. Tajpej jest za daleko od wielkich miejskich skupisk populacji kontynentalnych Chin, przez co nasza zdolności efektywnego zarządzania narodem stała sie zdecydowanie trudniejsza. A więc, naszą nową stolicą stanie się..."
 taiwan.17.a: "Pekin"
 taiwan.17.b: "Szanghaj"
 taiwan.17.c: "Czongczing"
 taiwan.17.d1: "Pozostanie nią Tajpej"
 taiwan.17.e: "Nandżing"
 city_captured.12.t: "Upadek Baidoa"
 city_captured.12.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Baidoa, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.12.a: "Intrygujące"
 city_captured.13.t: "Upadek Kismayo"
 city_captured.13.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Kismayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night.."
 city_captured.13.a: "Intrygujące"
 city_captured.14.t: "Upadek Galkayo"
 city_captured.14.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Galkayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.14.a: "Intrygujące"
 taiwan.18.t: "Wielki Wyścig Chipów"
 taiwan.18.d: "Wkraczając w lata 2000., nasza przewaga w produkcji mikroprocesorów jest zagrożona. Chińska Republika Ludowa zaczyna rozwijać swój przemysł mikroprocesorowy, próbując ominąć nasze możliwości produkcyjne. Musimy utrzymać przewagę, aby chronić naszą pozycję na arenie międzynarodowej."
 taiwan.18.a: "Wygramy!"
 systems.1.t: "Witamy w Millennium Dawn"
 systems.1.d: "Witamy w Millennium Dawn! Dziękujemy za pobranie i wypróbowanie moda. Jeśli jesteś nowy, zalecamy zapoznanie się z różnymi menu, aby zapoznać się z funkcjami. Menu zazwyczaj można otworzyć za pomocą przycisków u góry poszczególnych ekranów. Potrzebujesz pomocy? Dołącz do naszej społeczności na Discordzie, gdzie chętnie pomożemy Ci w razie pytań lub problemów. Możesz zgłaszać błędy w grze, korzystając z opcji „Zgłoś problem” w menu pauzy lub za pośrednictwem naszych kanałów na Discordzie.\n\nWażne informacje:\n- Paliwo ma wartość ujemną na początku gry ze względu na elektrownie i zużycie populacji. Więcej szczegółów znajdziesz w interfejsie użytkownika Energii w menu Budowy.\n- Skupienie historyczne =/= historyczne rezultaty. Używamy opcji skupienia historycznego, aby zachęcić sztuczną inteligencję do podjęcia możliwie najbardziej historycznego wyboru w danych wyborach i opcjach. Nie jest to gwarancja historycznej gry."
 systems.1.a: "W porządku"
 protests.100.t: "Raport: Wybuch protestów w [ROOT.capital.GetCapitalVictoryPointName]"
 protests.100.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that recent political shifts in the nation have resulted in the mass mobilization of people, with the first sparks of revolt breaking out in [ROOT.capital.GetCapitalVictoryPointName]. The state security apparatus is currently awaiting orders from the higher-ups before deciding what to do, but unless protester demands are met, this movement may spiral into seeing our government overthrown.\n\nProtest are projected to spread outside of the capital until it engulfs our nation as a whole.\n\n Signed,\n - Internal Security Directorate"
 protests.100.a: "Zobaczmy, co możemy zrobić."
 protests.101.t: "Report: Protests Spread!"
 protests.101.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears the protests have continued to spread, reaching new states and provinces nationwide. We will need to determine a method to deal with these protesters so that order and calm is restored in society.\n\n Signed,\n - Internal Security Directorate"
 protests.101.a: "Musimy działać szybko!"
 protests.102.t: "Report: Protests Fizzle Regionally"
 protests.102.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecent public disturbances in the region were addressed by local security and administrative authorities. Demonstrations that had formed in several urban and semi-urban areas were dispersed following coordinated efforts by law enforcement units. Authorities report that order has been restored and essential services remain operational.\n\n Signed,\n - Internal Security Directorate"
 protests.102.a: "Dobrze"
 protests.103.t: "Report: Calm Returns as Protests Disperse"
 protests.103.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nLocal security forces are reporting that protests have become incredibly limited in scale and size, with most cities and streets returning to normal operation. This report isn't from just one region, but several, signaling a general lack of energy amongst protesters. This is likely the end of the protest movement.\n\n Signed,\n - Internal Security Directorate"
 protests.103.a: "Doskonale"
 protests.104.t: "Protesters Set Ablaze Industrial Assets!"
 protests.104.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several industrial assets, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.104.a: "Bulldoze it, there's no repairing that"
 protests.104.b: "Użyj środków rządowych do rozpoczęcia rekonstrukcji"
 protests.105.t: "Protesters Set Office Parks Ablaze!"
 protests.105.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several office parks, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.105.a: "Bulldoze it, there's no repairing that"
 protests.105.b: "Użyj środków rządowych do rozpoczęcia rekonstrukcji"
 protests.106.t: "Protesters Set Military Factories Ablaze!"
 protests.106.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several military factories, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.106.a: "Bulldoze it, there's no repairing that"
 protests.106.b: "Użyj środków rządowych do rozpoczęcia rekonstrukcji"
 protests.200.t: "Raport: Nadchodzące Protesty"
 protests.200.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecently, our intelligence agency and security forces have caught wind of plans for a national revolt. This is due to recent developments within our country, creating a clique of dissatisified people. It is alledged that these people are starting to form groups in order to topple our government.\n\n Signed,\n - Internal Security Directorate"
 protests.200.a: "Musimy działać szybko"
 influence.5.d1: "Call in Albionis, we're going in"
 recognition.71.t: "The General Assembly Vote Has Passed"
 recognition.71.d: "The General Assembly has voted to admit us to the United Nations. After years of diplomatic effort, our seat is secured."
 recognition.71.a: "[THIS.GetName] takes its seat."
 recognition.72.t: "The General Assembly Vote Has Failed"
 recognition.72.d: "The General Assembly has fallen short of the votes needed to admit us. Our bid for UN membership has stalled for now."
 recognition.72.a: "A setback for our diplomacy."
 recognition.73.t: "General Assembly Rejects [FROM.GetName]'s Bid"
 recognition.73.d: "The General Assembly has voted against the admission of [FROM.GetNameDef] as a member state. The bid has stalled."
 recognition.73.a: "The vote is recorded."
 recognition.12.t: "[FROM.FROM.GetName] Seeks Security Council Recommendation"
 recognition.12.d: "[FROM.FROM.GetName] has petitioned the Security Council for a recommendation to the General Assembly, over the objection of [FROM.GetName]. The Council must now cast its vote."
 recognition.12.a: "Vote Yes"
 recognition.12.b: "Vote No"
 recognition.12.c: "Abstain"
 recognition.15.t: "Vote on [FROM.FROM.GetName] UN Membership"
 recognition.15.d: "With the Security Council's recommendation secured, the question of admitting [FROM.FROM.GetName], opposed by [FROM.GetName], now falls to the General Assembly."
 recognition.15.a: "Vote Yes"
 recognition.15.b: "Vote No"
 recognition.15.c: "Abstain"
 recognition.121.t: "Security Council Recommends [FROM.GetName] for UN Membership"
 recognition.121.d: "The Security Council has issued a recommendation in favor of admitting [FROM.GetName] to the United Nations. The matter now passes to the General Assembly."
 recognition.121.a: "A vote moves forward."
 recognition.122.t: "Security Council Rejects [FROM.GetName]'s Bid"
 recognition.122.d: "The Security Council has voted against recommending [FROM.GetName] to the General Assembly. The membership bid stops at this stage."
 recognition.122.a: "The bid stalls."
 UNSC.1.t: "Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all Offensive Wars"
 UNSC.1.d: "A Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all of their current offensive conflicts is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will have 210 days to resolve all of their ongoing offensive conflicts. If they fail to do so, they will be sanctioned until they finally end all of those conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.1.a: "Yes"
 UNSC.1.b: "No"
 UNSC.1.c: "Abstain"
 UNSC.2.t: "United Nations Security Council Sanctions against [?global.current_sc_vote_nation.GetName]"
 UNSC.2.d: "A Resolution to established UNSC sanctions against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the vote passes, [?global.current_sc_vote_nation.GetName] will be sanctioned until they no longer are an offensive threat to global peace, or until the Security Council removes the sanctions against them.\n\n$unsc_vote_pass_tt$"
 UNSC.2.a: "Yes"
 UNSC.2.b: "No"
 UNSC.2.c: "Abstain"
 UNSC.3.t: "Restrict Foreign Military Volunteers to [?global.current_sc_vote_nation.GetName]"
 UNSC.3.d: "A resolution to prevent foreign military volunteers from being sent to [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, any nation that sends military volunteers to [?global.current_sc_vote_nation.GetName] after the vote will be sanctioned until they either withdraw their volunteers, or the conflict ends.\n\n$unsc_vote_pass_tt$"
 UNSC.3.a: "Yes"
 UNSC.3.b: "No"
 UNSC.3.c: "Abstain"
 UNSC.4.t: "Arms Embargo against [?global.current_sc_vote_nation.GetName]"
 UNSC.4.d: "A Resolution to institute an arms embargo against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will be prevented from purchasing arms from the International Market until they end all of their current offensive conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.4.a: "Yes"
 UNSC.4.b: "No"
 UNSC.4.c: "Abstain"
 UN.6.t: "Confirm UN Security Council seat for [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.6.d: "The United Nations General Assembly is currently voting to confirm the upcoming members of the Security Council. All nations that are nominated must be confirmed by the General Assembly, and will serve a 2 year term, starting January 1st of the year [?global.next_year]\n\n$un_ga_vote_requires_2_3_tt$"
 UN.6.a: "Vote Yes"
 UN.6.b: "Vote No"
 UN.6.c: "Abstain"
 UN.7.t: "Establish Non-Binding Sanctions Against [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.7.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has conducted a military strike against a foreign nation. In response, they have requested that the §BUnited Nations§! sanction [?global.current_ga_vote_nation.GetNameWithFlag] for the next year as a punishment for this action. If we vote in the affirmative, we will agree to bring sanctions against [?global.current_ga_vote_nation.GetNameWithFlag].\n\n$un_ga_vote_auto_pass_tt$"
 UN.7.a: "Vote Yes"
 UN.7.b: "Vote No"
 UN.7.c: "Abstain"
 UN.8.t: "Decrease the UN General Operating Budget"
 UN.8.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has put forward a proposal to decrease the General Operating Budget for the next year. The decrease would be by 0.01% of GPD. The current contribution rate is [?global.general_operating_budget_contribute_percent|%]. The decrease to the rate would take place at the start of the next UN fiscal year, and would affect all UN Aid programs.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.8.a: "Vote Yes"
 UN.8.b: "Vote No"
 UN.8.c: "Abstain"
 UN.9.t: "Increase the UN General Operating Budget"
 UN.9.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has put forward a proposal to increase the General Operating Budget for the next year. The increase would be by 0.01% of GPD. The current contribution rate is [?global.general_operating_budget_contribute_percent|%]. The increase to the rate would take place at the start of the next UN fiscal year, and would affect all UN Aid programs.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.9.a: "Vote Yes"
 UN.9.b: "Vote No"
 UN.9.c: "Abstain"
 UN.10.t: "Resolution: Poverty Reduction"
 UN.10.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt measures aimed at reducing poverty. Nations that vote in favor will commit to policies that improve stability at the cost of increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.10.a: "Vote Yes"
 UN.10.b: "Vote No"
 UN.10.c: "Abstain"
 UN.11.t: "Resolution: Food Security"
 UN.11.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to prioritize food security and agricultural development. Nations that vote in favor will commit to boosting agricultural output at the cost of reduced industrial capacity.\n\n$un_ga_vote_requires_majority$"
 UN.11.a: "Vote Yes"
 UN.11.b: "Vote No"
 UN.11.c: "Abstain"
 UN.12.t: "Resolution: Global Health Initiative"
 UN.12.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to invest in global health initiatives. Nations that vote in favor will benefit from reduced healthcare costs at the expense of increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.12.a: "Vote Yes"
 UN.12.b: "Vote No"
 UN.12.c: "Abstain"
 UN.13.t: "Resolution: Education Initiative"
 UN.13.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to increase investment in education. Nations that vote in favor will benefit from faster research and reduced education costs, but at the expense of slower construction.\n\n$un_ga_vote_requires_majority$"
 UN.13.a: "Vote Yes"
 UN.13.b: "Vote No"
 UN.13.c: "Abstain"
 UN.14.t: "Resolution: Clean Energy Transition"
 UN.14.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to accelerate the transition to clean energy. Nations that vote in favor will receive incentives for renewable energy construction but face penalties to fossil fuel infrastructure and factory output.\n\n$un_ga_vote_requires_majority$"
 UN.14.a: "Vote Yes"
 UN.14.b: "Vote No"
 UN.14.c: "Abstain"
 UN.15.t: "Resolution: Economic Growth"
 UN.15.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt policies that promote economic growth. Nations that vote in favor will benefit from increased productivity and factory output, but at the cost of reduced political power and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.15.a: "Vote Yes"
 UN.15.b: "Vote No"
 UN.15.c: "Abstain"
 UN.16.t: "Resolution: Infrastructure Development"
 UN.16.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to invest in infrastructure development. Nations that vote in favor will benefit from faster infrastructure and civilian factory construction, but at the cost of slower arms factory construction and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.16.a: "Vote Yes"
 UN.16.b: "Vote No"
 UN.16.c: "Abstain"
 UN.17.t: "Resolution: Reduced Inequality"
 UN.17.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt measures to reduce inequality. Nations that vote in favor will benefit from improved stability, but at the cost of reduced political power and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.17.a: "Vote Yes"
 UN.17.b: "Vote No"
 UN.17.c: "Abstain"
 UN.18.t: "Resolution: Climate Action"
 UN.18.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to take aggressive action on climate change. Nations that vote in favor will receive incentives for renewable energy but face significant penalties to fossil fuel plants and factory output.\n\n$un_ga_vote_requires_majority$"
 UN.18.a: "Vote Yes"
 UN.18.b: "Vote No"
 UN.18.c: "Abstain"
 UN.19.t: "Resolution: Peace & Institutions"
 UN.19.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to strengthen peaceful institutions and governance. Nations that vote in favor will benefit from increased political power and drift defense, but at the cost of slower arms factory construction and increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.19.a: "Vote Yes"
 UN.19.b: "Vote No"
 UN.19.c: "Abstain"
 UN.20.t: "Resolution: Trade Partnerships"
 UN.20.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to strengthen international trade partnerships. Nations that vote in favor will benefit from improved trade relations, but at the cost of reduced political power.\n\n$un_ga_vote_requires_majority$"
 UN.20.a: "Vote Yes"
 UN.20.b: "Vote No"
 UN.20.c: "Abstain"
 UN.21.t: "Resolution: Digital Development"
 UN.21.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to invest in digital infrastructure and development. Nations that vote in favor will benefit from faster internet, microchip, and research development, but at the cost of increased consumer goods spending and slower infrastructure construction.\n\n$un_ga_vote_requires_majority$"
 UN.21.a: "Vote Yes"
 UN.21.b: "Vote No"
 UN.21.c: "Abstain"
 UN.410.t: "Resolution: Poverty Reduction"
 UN.410.d: "The §BUnited Nations§! §YGeneral Assembly§! has passed a non-binding resolution on §YPoverty Reduction§!. Although we did not vote in favor of this resolution, we may still choose to accept and implement it.\n\nShould we agree to follow this resolution?"
 UN.410.a: "Accept the Resolution"
 UN.410.b: "Reject the Resolution"
