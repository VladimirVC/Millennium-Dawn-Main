 BLR.conservatism_desc: "自由保守主義 - 統一市民党（ベラルーシ語ローマ字表記：Abjadnanaja Hramadzianskaja Partyja）\n\n 統一市民党は、1995年に志を同じくする自由主義政党が合併して結成された自由保守主義政党である。同党は、政治体制の民主化や市場改革を提唱し、西側諸国の組織への加盟を支持している。"
