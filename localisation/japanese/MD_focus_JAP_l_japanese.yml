 Japan.01.t: "伝統主義勢力の接近"
 Japan.01.d: "森首相の発言をめぐる論争が続くなか、皇室を国家秩序の中心として再評価すべきだと主張する諸団体や論客が動きを強めている。彼らは、政府が伝統や国柄を擁護する姿勢をより明確に示すなら、世論形成や草の根運動を通じてこれを支援できると持ちかけてきた。\n\nもっとも、こうした勢力との接近は、既成保守と急進的な君主主義との境界を曖昧にし、政権に新たな批判を招く危険もある。この提案を利用するべきだろうか、それとも距離を保つべきだろうか。"
 Japan.01.a: "距離を置く。"
 Japan.01.b: "彼らを政治的てこに使う。"
 mdmosjap_japan.121006001.t: "2000年鳥取県西部地震"
 mdmosjap_japan.121006001.d: "日本は環太平洋火山帯――いわゆる「リング・オブ・ファイア」の上に浮かぶ火山列島である。つまり日本とその人々は、常に大地震に見舞われ続ける宿命にある。それは前の千年紀でも変わらず、そして次の千年紀でも変わらないだろう。\n\n2000年10月6日 午後1時30分――マグニチュード7.3、最大震度6強の地震が島根県西部を襲った。多くの道路や家屋に甚大な被害を与え、揺れは大阪や福岡といった遠方にも及んだ。とりわけ神戸では、1995年の阪神・淡路大震災以来、初めて強い揺れを経験することになった。"
 mdmosjap_japan.disaster_help: "今すぐ支援する！"
 mdmosjap_japan.disaster_leave: "放っておけ。彼らは自力で立ち直る。"
