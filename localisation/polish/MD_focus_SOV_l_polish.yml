 SOV_start_fleet_reforms: "Reformy rosyjskiej marynarki wojennej"
 SOV_start_fleet_reforms_desc: "Aby przywrócić skuteczność naszej marynarce wojennej, konieczne są gruntowne reformy."
 SOV_cancel_unnecessary_projects: "Anuluj niepotrzebne projekty"
 SOV_cancel_unnecessary_projects_desc: "Musimy skoncentrować nasze zasoby na najważniejszych projektach morskich."
 SOV_Updated_naval_doctrine: "Zaktualizowana doktryna morska"
 SOV_Updated_naval_doctrine_desc: "Czas zrewidować naszą doktrynę morską, aby sprostać współczesnym wyzwaniom."
 SOV_begin_modernization_of_our_fleet: "Rozpocznij modernizację naszej floty"
 SOV_begin_modernization_of_our_fleet_desc: "Modernizacja naszej floty jest niezbędna w celu utrzymania siły morskiej."
 SOV_Optimize_our_fleet: "Zoptymalizuj naszą flotę"
 SOV_Optimize_our_fleet_desc: "Usprawniamy wydatki związane z flotą, aby uwolnić fundusze na niezbędne modernizacje."
 SOV_The_high_seas_fleet: "Flota Pełnomorska"
 SOV_The_high_seas_fleet_desc: "Naszym celem jest zbudowanie potężnej floty zdolnej do operowania na oceanach, na wzór floty Wielkiej Brytanii."
 SOV_revived_russian_navy2: "Flota pełnomorska"
 SOV_revived_russian_navy1: "Zoptymalizowana flota"
 SOV_the_plundered_russian_navy1: "Splądrowana rosyjska marynarka wojenna"
 SOV_the_plundered_russian_navy2: "Częściowo przebudowana flota"
 SOV_the_plundered_russian_navy3: "Prawie odbudowana flota"
 SOV_restoration_of_warsaw_pact: "Przywrócenie Układu Warszawskiego"
 SOV_restoration_of_warsaw_pact_desc: "\n\n\n\n\n\n£SOV_desctext_warsaw \n\n\n\n\n\n\n\n\nSytuacja w Europie Wschodniej staje się coraz bardziej niestabilna, a kilku byłych sojuszników Układu Warszawskiego już odeszło do NATO. Im dłużej to potrwa, tym trudniej będzie odzyskać wpływy na arenie międzynarodowej. Musimy odzyskać to, co utraciliśmy i przywrócić dwubiegunową równowagę w świecie."
 SOV_AUTH_SS: "Rosyjskie Radzieckie Państwo Narodowe"
 SOV_soviet_empire: "Imperium Radzieckie"
 Sov_warsaw_pact.15.t: "Szansa na uwolnienie się od wpływów rosyjskich"
 Sov_warsaw_pact.15.d: "Ostatnie zawirowania w Rosji stworzyły nam okazję do ograniczenia ich wpływu na nasz kraj. Podczas gdy Rosja skupia się na sprawach wewnętrznych, musimy zdecydować, czy pozostać sojusznikiem, czy podążać własną, niezależną drogą."
 Sov_warsaw_pact.15.a: "Rosja nie jest już naszym sojusznikiem"
 Sov_warsaw_pact.15.b: "Zostajemy"
 Sov_warsaw_pact.17.t: "Inwazja na Niemcy Wschodnie"
 Sov_warsaw_pact.17.d: "Zaledwie kilka godzin temu nasze siły w Niemczech Wschodnich zostały zaatakowane, co zmusiło nasze wojska graniczne do odwrotu. Świat stoi teraz na krawędzi konfliktu nuklearnego. Stoimy przed poważnym wyborem: bronić naszych sojuszników i ryzykować globalną zagładę, czy poświęcić sojusznika dla zachowania pokoju."
 Sov_warsaw_pact.17.a: "Zmobilizujcie armię, czas wyruszyć!"
 Sov_warsaw_pact.17.b: "Żaden sojusznik nie jest wart całkowitego zniszczenia planety"
 WP_escaped: "Opuściliśmy naszą strefę wpływów"
 Sov_warsaw_pact.16.t: "Powstanie się udaje"
 Sov_warsaw_pact.16.d: "Z pomocą naszych historycznych sojuszników przejęliśmy kontrolę nad kluczowymi ośrodkami dowodzenia w Niemczech Wschodnich. Układ Warszawski zaoferował ochronę naszej suwerenności w zamian za strategiczną współpracę, wzmacniając naszą pozycję."
 Sov_warsaw_pact.16.a: "Chwała NRD i jej narodowi!"
 Sov_warsaw_pact.18.t: "ZSRR odmawia pomocy"
 Sov_warsaw_pact.18.d: "Aby zapobiec III wojnie światowej, ZSRR wycofuje swoje wojska z naszego terytorium, pozostawiając nas samych w obliczu zagrożeń."
 Sov_warsaw_pact.18.a: "Zdrajcy!"
 OVD_raspalsa: "Upadek Układu Warszawskiego"
 Sov_warsaw_pact.19.t: "ZSRR wycofuje wojska z Niemiec Wschodnich"
 Sov_warsaw_pact.19.d: "Konflikt w Niemczech Wschodnich doprowadził świat na skraj wojny. Aby uniknąć konfliktu totalnego, władze radzieckie nakazały całkowite wycofanie wojsk. Świat z uwagą obserwuje, jak ostatni żołnierz radziecki opuszcza nowo proklamowaną Niemiecką Republikę Demokratyczną."
 Sov_warsaw_pact.19.a: "„W Armii Radzieckiej potrzeba więcej odwagi, żeby się wycofać, niż żeby iść naprzód”."
 birth_of_eastern_germany_world_tension: "Powstanie w Niemczech Wschodnich"
 SOV_nazbols: "Rosja jest wszystkim. Reszta to nic"
 SOV_nazbols_desc: "\n\n\n\n\n\n£SOV_desctext_nazbol \n\n\n\n\n\n\n\n\nNadszedł czas, by przywrócić Rosji dawną wielkość. Tylko my naprawdę rozumiemy, czego potrzebuje nasza wielka ojczyzna."
 SOV_nazbols_nato: "Retoryka antyzachodnia"
 SOV_nazbols_nato_desc: "Zachód zawsze był i pozostanie naszym wrogiem. Nasza retoryka nigdy nie może się zmienić."
 SOV_nazbols_foreign_legion: "Legia Cudzoziemska"
 SOV_nazbols_foreign_legion_desc: "Zainspirowani francuską Legią Cudzoziemską, stworzymy Legion Rosyjski, w którym cudzoziemcy będą mogli służyć i uzyskać obywatelstwo."
 SOV_nazbols_ekb: "Przenieść stolicę do Jekaterynburga"
 SOV_nazbols_ekb_desc: "Czas przenieść stolicę do serca Rosji! Ural jest idealny. Moskwa jest zbyt oddalona od wielu regionów."
 SOV_nazbols_empire: "Imperium Radzieckie"
 SOV_nazbols_empire_desc: "Nasza moc powróciła! Chwała Imperium Radzieckiemu!"
 SOV_anti_west_idea: "Doktryna antyzachodnia"
 sov_nationalists.2.t: "Rewolucja rosyjska w naszym kraju!"
 sov_nationalists.2.d: "§Y[SOV.GetNameWithFlag]§! podburza rosyjskojęzyczną ludność naszego kraju do powstania, przygotowując się do wysłania wojsk do interwencji. Napięcie gwałtownie rośnie."
 sov_nationalists.2.a: "Boże pomóż nam"
 sov_sover_state.1.t: "§Y[SOV.GetNameWithFlag]§! daje nam pomysł na ożywienie USS"
 sov_sover_state.1.d: "§YZwiązek Suwerennych Państw§! został pierwotnie rozwiązany, zanim mógł zostać zrealizowany, rozpadając się podczas politycznego chaosu wywołanego próbą zamachu stanu w Moskwie przez Państwowy Komitet Nadzwyczajny. Teraz inicjatywa powróciła z nową energią. Projekt ten stanowi drugą szansę na zjednoczenie państw postsowieckich w ramach nowych, bardziej elastycznych ram. Ta propozycja może zmienić porządek regionalny."
 sov_sover_state.1.a: "Wyrażamy zgodę na udział w tym"
 sov_sover_state.1.b: "Nie jesteśmy tym zainteresowani"
 sov_sover_state.5.t: "Deklaracja Unii Suwerennych Państw"
 sov_sover_state.5.d: "Ostateczny projekt traktatu został nam przekazany do rozpatrzenia. Teraz musimy podjąć decyzję o podpisaniu i oficjalnym przystąpieniu do Unii Suwerennych Państw. Decyzja ta ukształtuje naszą rolę w nowym sojuszu regionalnym."
 sov_sover_state.5.a: "Tak"
 sov_sover_state.5.b: "NIE"
 sov_sover_state.6.t: "Związek Suwerennych Państw"
 sov_sover_state.6.d: "Proces podpisywania został zakończony, a Unia Suwerennych Państw została oficjalnie założona. To historyczne wydarzenie oznacza początek nowej ery współpracy, wzajemnego rozwoju i współrządzenia wśród jej członków."
 sov_sover_state.6.a: "Hurra!"
 sov_sover_state.14.t: "Związek Suwerennych Państw"
 sov_sover_state.14.d: "§Y[FROM.GetNamewithFlag]§! oficjalnie zgodził się kandydować do Unii Suwerennych Państw. To kluczowy krok w budowaniu zjednoczonej konfederacji suwerennych republik."
 sov_sover_state.14.a: "Hurra!"
 sov_sover_state.15.t: "Związek Suwerennych Państw"
 sov_sover_state.15.d: "§Y[FROM.GetNamewithFlag]§! podpisał formalną umowę o przystąpieniu do Unii Suwerennych Państw. Oznacza to oficjalne przystąpienie do unii i wzmacnia sojusz."
 sov_sover_state.15.a: "Hurra!"
 SOV_reassure_ruthenia: "Projekt Unii Suwerennych Państw"
 SOV_reassure_ruthenia_desc: "Naszym celem jest wskrzeszenie dawno porzuconego projektu Związku Suwerennych Państw, konfederacyjnej alternatywy dla ZSRR. Zapraszając wybrane państwa, mamy nadzieję na odbudowę spójności regionalnej w nowych ramach, korygując wady radzieckiego dziedzictwa."
 SOV_Sign_mutual_cooperation_agreements: "Członkostwo państwa związkowego"
 SOV_Sign_mutual_cooperation_agreements_desc: "Zwrócimy się do kilku krajów z propozycjami przystąpienia do Państwa Związkowego. Kraje te prawdopodobnie skorzystają na naszym wspólnym dobrobycie i stabilności regionalnej, przyczyniając się do nich."
 SOV_Putting_out_the_fire_in_the_post-Soviet_space: "Ogłoś ceremonię podpisania Porozumienia"
 SOV_Putting_out_the_fire_in_the_post-Soviet_space_desc: "Oficjalnie ogłosimy datę ceremonii podpisania Traktatu Unijnego. Wydarzenie to określi, które państwa są zdecydowane przystąpić do naszej unii i wspólnie dążyć do osiągnięcia wspólnych celów."
 SOV_Gorbachev_dream: "Rozwiń Państwo Związkowe"
 SOV_Gorbachev_dream_desc: "Ceremonia założycielska dobiegła końca. Po dopełnieniu formalności, będziemy kontynuować rozszerzanie Państwa Związkowego, umacniając jego obecność i wpływy na obszarze postsowieckim."
 SOV_ssg_category: "Związek Suwerennych Państw"
 SOV_ssg_category_desc: "Związek Suwerennych Państw wyobrażano sobie jako zreformowaną wersję ZSRR – łagodniejszą, bardziej zdecentralizowaną i konfederacką z natury. Dziś mamy szansę wcielić tę wizję w życie, naprawiając błędy przeszłości i budując silniejszą przyszłość."
 SOV_conflict_geo: "Umieść rozwiązanie §Ykonfliktu w Gruzji§! Do głosowania"
 SOV_conflict_geo_resolve: "Rozwiąż §YKonflikt gruziński§! Zdecydowanie"
 SOV_conflict_nkr: "Umieść rozwiązanie §YKonfliktu w Artsakh§! Do głosowania"
 SOV_conflict_nkr_resolve: "Rozwiąż §YKonflikt ormiańsko-azerbejdżański§! Zdecydowanie"
 SOV_conflict_ukr: "Umieść rozwiązanie §Ykonfliktu na Krymie§! Do głosowania"
 SOV_conflict_ukr_resolve: "Rozwiąż §YKonflikt krymski§! Zdecydowanie"
 SOV_bulgarian_ally: "Brat starosłowiański"
 SOV_bulgarian_ally_desc: "Po wyzwoleniu Bułgarii spod panowania osmańskiego w 1878 roku, mogła ona stać się silnym sojusznikiem, ale carowie zmarnowali tę szansę. Musimy to teraz naprawić, zyskując przychylność narodu bułgarskiego i przywracając braterskie więzi."
 russia.42.t: "Naddniestrze przeprowadza referendum w sprawie przyłączenia się do Związku Radzieckiego"
 russia.42.d: "W Naddniestrzu odbywa się kolejne referendum w sprawie przystąpienia do Związku Radzieckiego. Nasz naród po raz kolejny stoi na rozdrożu historii, a jego decyzja zdefiniuje kolejny rozdział naszej przyszłości."
 russia.42.a: "Jesteśmy gotowi przystąpić do Związku Radzieckiego"
 SOV_annex12: "Przyczółek na Dniestrze"
 SOV_annex13: "Zwróć regiony separatystów"
 russia.43.t: "Rosja oferuje nam ochronę"
 russia.43.d: "Nasi ludzie zrozumieli, że bez ochrony ze strony silnego kraju zostaniemy zniszczeni przez silniejszych przeciwników. Musimy zabezpieczyć siebie i swój naród, stając się częścią Rosji."
 russia.43.a: "Nadszedł czas, aby zabezpieczyć nasz naród"
 SOV_Civil_nationalism: "Nacjonalizm obywatelski"
 SOV_Civil_nationalism_desc: "Naród musi być na pierwszym miejscu. Będziemy stawiać interesy narodowe ponad wszystko, jednocząc społeczeństwo wokół wspólnej tożsamości i wspólnego celu."
 SOV_embrace_the_legacy_of_the_USSR: "Przyjmij dziedzictwo ZSRR"
 SOV_embrace_the_legacy_of_the_USSR_desc: "Dziedzictwo Związku Radzieckiego nadal wyznacza kierunek naszego rozwoju politycznego i kulturalnego. Jego osiągnięcia pozostają kamieniem węgielnym naszej tożsamości narodowej i ambicji."
 SOV_Introduce_visa_regime_with_Central_Asia: "Reżim wizowy z Azją Środkową"
 SOV_Introduce_visa_regime_with_Central_Asia_desc: "Aby lepiej zarządzać naszymi granicami i rozwiązać problemy gospodarcze i społeczne, wprowadzimy system wizowy z Azją Środkową. Środek ten ma na celu ograniczenie nielegalnej migracji i zapewnienie stabilności kraju."
 SOV_Utilize_the_country_economic_potential_100_percent: "Maksymalizacja potencjału ekonomicznego"
 SOV_Utilize_the_country_economic_potential_100_percent_desc: "W pełni uwolnimy potencjał gospodarczy kraju. Musimy wykorzystać wszystkie zasoby i możliwości, aby stymulować wzrost gospodarczy i dobrobyt."
 SOV_Cooperation_with_Taiwan: "Współpraca z Tajwanem"
 SOV_Cooperation_with_Taiwan_desc: "Strategiczna współpraca z Tajwanem zapewni nam dostęp do zaawansowanych technologii i znaczne korzyści gospodarcze. To partnerstwo może przyspieszyć nasz rozwój."
 SOV_Buy_out_Taiwans_microchip_technology: "Przejąć tajwańską technologię mikroprocesorową"
 SOV_Buy_out_Taiwans_microchip_technology_desc: "Zawarliśmy umowę na zakup technologii produkcji mikroprocesorów z Tajwanu. To przejęcie będzie stanowić fundament naszego technologicznego i gospodarczego skoku naprzód."
 SOV_Promote_Russian_companies_in_the_post-Soviet_space: "Promuj rosyjskie firmy w przestrzeni postsowieckiej"
 SOV_Promote_Russian_companies_in_the_post-Soviet_space_desc: "Będziemy aktywnie wspierać ekspansję rosyjskich firm na obszar postsowiecki. Naszym celem jest zdobycie dominującej pozycji na tych rynkach."
 SOV_Monopoly_in_the_post-Soviet_space: "Monopol w przestrzeni poradzieckiej"
 SOV_Monopoly_in_the_post-Soviet_space_desc: "Rosyjskie firmy powinny osiągnąć dominację rynkową w całym regionie postsowieckim. Dzięki strategicznym inwestycjom i wpływom politycznym sprawimy, że stanie się to rzeczywistością."
 SOV_Economic_Empire: "Imperium gospodarcze"
 SOV_Economic_Empire_desc: "Silna Rosja nie potrzebuje wojny, by się utwierdzić. Dzięki potędze gospodarczej i wpływom zapewnimy sobie pozycję światowego lidera."
 SOV_Make_the_Anti-Corruption_Foundation_a_State_Company: "Fundacja Antykorupcyjna"
 SOV_Make_the_Anti-Corruption_Foundation_a_State_Company_desc: "Aby zinstytucjonalizować walkę z korupcją, Fundacja Antykorupcyjna stanie się organizacją państwową, cieszącą się pełnym poparciem rządu."
 SOV_Demonopolization_of_the_strategic_economy: "Demonopolizacja ekonomii strategicznej"
 SOV_Demonopolization_of_the_strategic_economy_desc: "Zlikwidujemy monopole w strategicznych sektorach gospodarki, aby zwiększyć przejrzystość, konkurencję i efektywność."
 SOV_Unite_the_network_of_state-owned_companies: "Zjednocz przedsiębiorstwa państwowe"
 SOV_Unite_the_network_of_state-owned_companies_desc: "Skonsolidujemy nasze przedsiębiorstwa państwowe w spójną i wydajną sieć, zgodną z interesami narodowymi i zdolną do stymulowania długoterminowego wzrostu."
 SOV_Increase_salaries_and_pensions_for_the_military_and_the_population: "Zwiększ pensje i emerytury"
 SOV_Increase_salaries_and_pensions_for_the_military_and_the_population_desc: "Złożyliśmy obietnicę – i dotrzymamy jej. Pensje i emerytury zarówno dla wojska, jak i ludności cywilnej zostaną znacząco podniesione."
 SOV_Measures_of_rapprochement_with_the_West: "Zbliżenie z Zachodem"
 SOV_Measures_of_rapprochement_with_the_West_desc: "Zachód powinien być postrzegany nie jako zagrożenie, lecz jako partner. Poprzez współpracę i dialog odbudujemy zaufanie i na nowo zdefiniujemy nasze relacje."
 SOV_The_way_of_free_russia: "Droga wolnej Rosji"
 SOV_The_way_of_free_russia_desc: "Wolna Rosja to silna Rosja. Będziemy dążyć do wolności, demokracji i dumy narodowej jako fundamentu lepszej przyszłości."
 SOV_eu_state: "Prawdziwy stan zachodni"
 SOV_new_pensions_reform: "Nowa reforma emerytalna"
 SOV_demonopolisation_reform: "Demonopolizacja przemysłu strategicznego"
 SOV_fbk_organization_category: "Siedziba Fundacji Antykorupcyjnej"
 SOV_fbk_organization_category_desc: "Lata autokracji nasyciły nasze państwo korupcją. Fundacja Antykorupcyjna stara się ją wykorzenić i przywrócić honor służbie publicznej."
 SOV_democracy_taiwam_category: "Rosyjska Demokracja na Tajwanie"
 SOV_democracy_taiwam_category_desc: "Tajwan pozostaje solą w oku Chin. Wraz z zaostrzeniem się naszej rywalizacji z Chinami, zapewnienie sobie wpływów na Tajwanie stało się jednym z naszych strategicznych priorytetów."
 SOV_boost_opinion_of_rus: "Kontynuuj ulepszanie relacji"
 SOV_more_weapon_taiwan: "Więcej broni dla Tajwanu"
 SOV_invest_taiwan: "Inwestycje na Tajwanie"
 SOV_puppet_taiwan: "Podbić Tajwan"
 SOV_Civil_Nationalism_idea: "Prawdziwy nacjonalizm obywatelski"
 SOV_Combating_illegal_migration_idea: "Zwalczanie nielegalnej migracji"
 SOV_Finding_corrupt_officials_in_the_party: "Zidentyfikuj skorumpowanych urzędników w partii"
 SOV_Check_police_personnel: "Kontrola personelu policyjnego"
 SOV_expose_corrupt_schemes_in_the_smuggling_trade: "Odkryj korupcję przemytniczą"
 SOV_check_data_on_illegal_migration: "Analizuj dane dotyczące nielegalnej migracji"
 SOV_operation_Sweet_Gifts: "Operacja Słodkie Prezenty"
 SOV_Prepare_the_test_purchase: "Przygotuj zakup testowy"
 SOV_Train_specialized_personnel: "Szkolić wyspecjalizowany personel"
 SOV_Finalize_the_sweet_gifts_operation: "Ukończ operację „Słodkie prezenty”"
 SOV_Free_Russia_idea: "Wolna Rosja"
 SOV_Russian_Microchip_idea: "Bajkał Core i9"
 russia.52.t: "Delegacja rosyjska na Tajwanie"
 russia.52.d: "Rosyjska delegacja przybyła z propozycją zakupu udziału w naszej technologii mikroprocesorowej w zamian za niezbędne rosyjskie zasoby. Ta umowa mogłaby przynieść korzyści obu stronom."
 russia.52.a: "To dobry interes"
 russia.52.b: "Rosja? A ile ma podziałów?"
 russia.53.t: "Tajwan wycofał się z umowy"
 russia.53.d: "Rząd Tajwanu odrzucił naszą ofertę, uznając ją za niekorzystną. Negocjacje załamały się, a napięcia mogą wzrosnąć."
 russia.53.a: "Tajwan po prostu nie uznaje dominacji przetwórców Bajkału"
 russia.54.t: "Rosyjskie Siły Obrony Powietrzno-Kosmicznej"
 russia.54.d: "Rosyjskie wojsko oficjalnie utworzyło nowy rodzaj sił zbrojnych: Siły Obrony Powietrzno-Kosmicznej. Celem tej reformy jest skuteczniejsza integracja operacji powietrznych i kosmicznych."
 russia.54.a: "Hurra!"
 russia.55.t: "Koronacja cara Borysa"
 russia.55.d: "Borys Jelcyn powrócił do życia publicznego i jest obecnie postrzegany przez wielu jako symboliczny car całej Rosji. Choć w dużej mierze ceremonialny, to odrodzenie monarchii ma charakter historyczny – choć niekonwencjonalny."
 russia.55.a: "Co za bezsens"
 russia.58.t: "Reformy armii"
 russia.58.d: "Nasze reformy wojskowe zaczynają przynosić efekty. Do naszych szeregów dołączyli nowi, utalentowani generałowie, wnosząc siłę i odnowiony profesjonalizm."
 russia.58.a: "Dobry."
 russia.59.t: "Reformy armii"
 russia.59.d: "Nasze reformy wojskowe zaczynają przynosić efekty. Do naszych szeregów dołączyli nowi, utalentowani generałowie, wnosząc siłę i odnowiony profesjonalizm."
 russia.59.a: "Dobry."
 russia.60.t: "Republika Małorosyjska"
 russia.60.d: "Utworzyliśmy państwo Małorosja na terytorium Ukrainy. Pytanie brzmi, czy powinniśmy sprawować bezpośrednią kontrolę nad tą nową republiką."
 russia.60.a: "Tak"
 russia.60.b: "NIE"
 russia.61.t: "Ponowna ocena strategiczna"
 russia.61.d: "Ostatnie wydarzenia wymusiły ponowną ocenę naszych priorytetów strategicznych. Dowództwo wojskowe i dyplomatyczne musi dostosować się do nowej rzeczywistości na miejscu."
 russia.61.a: "Musimy się dostosować"
 russia.62.t: "Katastrofa Mi-8 w pobliżu wsi Jermakowskie"
 russia.62.d: "W kwietniu 2002 roku generał Aleksander Lebied zginął tragicznie w wieku 53 lat w katastrofie śmigłowca Mi-8 nad jeziorem Ojskoje w Sajanach Wschodnich. Samolot uderzył w linie energetyczne podczas złej pogody, zabijając siedem osób. Chociaż oficjalnie uznano, że przyczyną był słaby sprzęt załogi, alternatywne teorie sugerują sabotaż lub konieczność wykonania lotu pomimo niebezpiecznych warunków. Sprzeczne doniesienia i brak szczegółowych map lotniczych nie pozwalają na ustalenie dokładnej przyczyny."
 russia.62.a: "Tragedia"
 SOV_prepare_a_deal: "Przygotuj ofertę"
 SOV_buy_microchips: "Kup tajwańskie mikrochipy"
 SOV_Economic_blockade_of_Georgia_idea: "Blokada ekonomiczna Gruzji"
 SOV_Dominance_of_russian_companies_idea: "Dominacja firm rosyjskich"
 SOV_Visa_regime_with_central_asia_idea: "System wizowy z Azją Środkową"
 SOV_Economic_Empire_idea: "Imperium gospodarcze"
 SOV_Dependence_on_Russian_technologies_idea: "Zależność od technologii rosyjskich"
 SOV_FBK_TT: "Odblokowuje decyzje §YFundacji Antykorupcyjnej§!"
 SOV_cross_the_rubicon: "Przekrocz Rubikon"
 SOV_cross_the_rubicon_desc: "Nadszedł czas, aby prawdziwy przywódca Rosji przejął władzę. Musimy działać zdecydowanie, aby zabezpieczyć przyszłość naszego narodu i przejąć stery historii."
 SOV_tandemokratia: "Tandemokracja"
 SOV_tandemokratia_desc: "Tandemokratia odnosi się do duumwiratu Putina i Miedwiediewa. Razem będą teraz rządzić Rosją jako zjednoczona siła, łącząc swoje atuty w jedną potęgę."
 SOV_unlimited_samoderzhaviye: "Nieograniczone Samoderzhaviye"
 SOV_unlimited_samoderzhaviye_desc: "Wracamy do zasady samodzierżawija – rządów absolutnych. Z dwoma carami u steru, nasze rządy odzwierciedlają potęgę dawnej rosyjskiej autokracji."
 SOV_establish_new_oligarchate: "Utworzenie nowego oligarchatu"
 SOV_establish_new_oligarchate_desc: "Oligarchowie od dawna kształtują rosyjską politykę. Zastępując zwolenników Putina naszymi sojusznikami, zapewnimy sobie trwałą stabilność i lojalne wsparcie."
 SOV_peace_with_the_west: "Pokój z Zachodem"
 SOV_peace_with_the_west_desc: "W obliczu niestabilnej sytuacji wewnętrznej konflikt z Zachodem nie wchodzi w grę. Na razie musi panować pokój – dopóki nie nadejdzie właściwy czas."
 SOV_continue_reformism: "Kontynuuj reformizm"
 SOV_continue_reformism_desc: "Konserwatywna polityka Putina doprowadziła do stagnacji. Nasza nowa administracja ożywi Rosję poprzez kompleksowe reformy i nowe przywództwo."
 SOV_secure_the_FSB: "Zabezpiecz FSB"
 SOV_secure_the_FSB_desc: "FSB pozostaje bastionem wpływów Putina. Czystka jest konieczna, aby zdemontować ten ostatni bastion starego reżimu."
 SOV_crush_putinism: "Zmiażdżyć putinizm"
 SOV_crush_putinism_desc: "Putinizm musi zostać całkowicie zdemontowany – jego polityka, sieci, ideologia. Musimy go zostawić, żeby iść naprzód."
 SOV_western_russia: "Nowa fala w starym stylu"
 SOV_western_russia_desc: "Choć partia rządząca odzyskała władzę, obecnie kieruje nią skrzydło reformatorskie. Ich celem jest przekształcenie systemu tak, aby był zgodny z demokratycznymi partnerstwami i współpracą z Zachodem."
 SOV_enforce_liberal_values: "Wyższość wartości liberalnych"
 SOV_enforce_liberal_values_desc: "Liberalizm jest fundamentem wolnej i dostatniej Rosji. Musimy podtrzymywać i szerzyć te wartości, odbudowując naród."
 SOV_focus_on_economy: "Rosyjski cud gospodarczy"
 SOV_focus_on_economy_desc: "Era liberalna obiecuje ożywienie gospodarcze. Otwierając rynki i wdrażając reformy, zapoczątkujemy nową erę dobrobytu, pokoju i wolności."
 SOV_abandon_foreign_policy: "Porzuć politykę zagraniczną"
 SOV_abandon_foreign_policy_desc: "Zimna wojna się skończyła. Nie stanowimy już komunistycznego zagrożenia dla Zachodu. Czas odłożyć na bok dawne urazy i zaprowadzić trwały pokój."
 SOV_age_of_stability: "Stabilna Rosja"
 SOV_age_of_stability_desc: "Po dekadach zamętu i nierówności Rosja odnalazła spokój. Z wizjonerskim reformatorem u steru władzy wkraczamy w epokę trwałej stabilizacji i jedności narodowej."
 SOV_establish_controlled_opposition: "Utworzenie kontrolowanej opozycji"
 SOV_establish_controlled_opposition_desc: "Kontrolowana opozycja w Dumie stworzy pozory demokracji, pozwalając jednocześnie na przeprowadzanie reform bez przeszkód."
 SOV_special_economic_operation: "Specjalna Operacja Gospodarcza"
 SOV_special_economic_operation_desc: "Białoruś i Ukraina muszą uznać, że era Putina dobiegła końca. Będziemy angażować się w nie poprzez współpracę, a nie przymus, i odbudowywać relacje na nowych zasadach."
 SOV_the_iron_dimon: "Żelazna zasada"
 SOV_the_iron_dimon_desc: "Ludzie są zmęczeni słabością. Domagają się siły. Prawdziwy przywódca – stanowczy, nieustępliwy i zdecydowany – odpowie na to wezwanie."
 SOV_the_new_dictatorship: "Nowa dyktatura"
 SOV_the_new_dictatorship_desc: "Aby umocnić naszą władzę, zaakceptujemy strukturę i skuteczność nowej dyktatury, dostosowanej do współczesnych potrzeb."
 SOV_medvedeism: "Medwedeizm"
 SOV_medvedeism_desc: "Putinizm zawiódł naród. Teraz nadchodzi nowa doktryna: miedwiedeizm – mająca na celu naprawienie przeszłości i poprowadzenie Rosji ku przyszłości."
 SOV_defend_national_interests: "Bronić interesów narodowych"
 SOV_defend_national_interests_desc: "Gdy państwo będzie bezpieczne, zwrócimy wzrok na zewnątrz. Należne ziemie narodu rosyjskiego muszą wrócić pod naszą opiekę."
 iron_dimon: "Żelazny Dimon"
 pro_western_dima: "Prawdziwy liberał"
 russian_duumviri: "Rosyjski Duumviri"
 SOV_dimon: "Wielka Rosja"
 sov_medvedev.1.t: "Miedwiediew odbiera władzę Putinowi!"
 sov_medvedev.1.d: "Pierwotnie powołany do władzy, by ominąć prezydenckie ograniczenia kadencyjne, Dmitrij Miedwiediew wyrwał się z cienia Putina. Po usunięciu rywala, Miedwiediew samotnie stoi u steru rosyjskiej władzy. Rozpoczyna się nowy rozdział w historii Rosji."
 sov_medvedev.1.a: "Nasza przyszłość jest niepewna."
 sov_medvedev.2.t: "Nowa Rosja"
 sov_medvedev.2.d: "Mając nową wizję kraju, rząd Miedwiediewa zamierza zmodernizować rosyjskie instytucje i otworzyć nowe drogi rozwoju gospodarczego."
 sov_medvedev.2.a: "Reforma czeka"
 sov_medvedev.3.t: "Konsolidacja polityczna"
 sov_medvedev.3.d: "Nowa administracja podjęła działania mające na celu konsolidację swojej władzy politycznej, odsuwając na bok potencjalnych rywali i zapewniając kluczowe stanowiska rządowe lojalistom."
 sov_medvedev.3.a: "Zabezpieczona moc"
 sov_medvedev.5.t: "Odrzucono propozycję dyplomatyczną"
 sov_medvedev.5.d: "Nasze starania dyplomatyczne zostały odrzucone. Kraj docelowy odrzucił nasze propozycje, powołując się na obawy dotyczące suwerenności i niezależności politycznej."
 sov_medvedev.5.a: "Niepowodzenie"
 sov_student_rallies.t: "Wybuch protestów studenckich"
 sov_student_rallies.d: "Studenci uniwersytetów w dużych miastach wyszli na ulice, domagając się reform politycznych i większych swobód obywatelskich. Protesty przybierają na sile i nasilają się."
 sov_student_rallies.a: "Zdławcie protesty"
 sov_student_rallies.b: "Pozwól im zademonstrować"
 sov_medvedev.4.t: "Rosja proponuje reset stosunków"
 sov_medvedev.4.d: "Nowy rząd rosyjski, o bardziej prozachodnim nastawieniu niż reżim Putina, złożył ofertę odnowy stosunków. Ich dyplomaci proponują nowy początek, „odświeżenie” współpracy."
 sov_medvedev.4.a: "Jasne! Rosjanie mogą być dobrymi przyjaciółmi!"
 sov_medvedev.4.b: "Nie możemy się z nimi przyjaźnić."
 sov_medvedev.6.t: "Putin i Miedwiediew proklamują Duumwirat!"
 sov_medvedev.6.d: "W zaskakującym posunięciu politycznym prezydent i premier Rosji wspólnie ogłosili, że będą wspólnie rządzić w ramach formalnego duumwiratu. To bezprecedensowe porozumienie zmienia strukturę władzy w Rosji."
 sov_medvedev.6.a: "Dobrze"
 sov_medvedev.7.t: "Nowy reżim rosyjski"
 sov_medvedev.7.d: "Nasz prezydent coraz głośniej wypowiada się w mediach społecznościowych, wyrażając nowe, śmiałe poglądy na temat Zachodu. Jego retoryka uległa radykalnej zmianie, sygnalizując powrót Rosji na ścieżkę asertywnej niepodległości."
 sov_medvedev.7.a: "Nienawidzę ich. To dranie i degeneraci."
 sov_medvedev.8.t: "Rosyjskie przesunięcie w stronę Zachodu"
 sov_medvedev.8.d: "Prezydent ogłosił nową, odważną politykę. Rosja będzie teraz postrzegać Zachód nie jako wroga, lecz jako ważnego partnera. Nasz naród rozpoczyna nowy rozdział."
 sov_medvedev.8.a: "Niech Bóg błogosławi Amerykę!... i Rosję!"
 SOV_kob_party_start: "Jedność Partii Konceptualnej"
 SOV_kob_party_start_desc: "Konceptualna Partia Jedności, na czele z naszym wizjonerskim przywódcą, generałem Konstantinem Pietrowem, przejęła władzę. Czas wypowiedzieć ideologiczną wojnę Przewidywcy i Korygującemu i uwolnić Rosję z jej ukrytych kajdan."
 SOV_kobnod: "Rosyjski Ruch Ludowy na rzecz Mocy Bożej"
 SOV_establish_militar_loyal: "Ustanowienie lojalności wojskowej"
 SOV_establish_militar_loyal_desc: "Generał Pietrow musi zapewnić sobie całkowitą lojalność wojska. Wszystkie oddziały muszą złożyć mu przysięgę wierności jako Gławkowerchowi – Naczelnemu Dowódcy Wszechrosyi."
 SOV_establish_loyalistii: "Lojalizm regionalny"
 SOV_establish_loyalistii_desc: "Musimy umieścić oddanych członków partii na regionalnych stanowiskach władzy, aby zapewnić absolutną lojalność i zapobiec jakiemukolwiek oporowi wobec naszej dalszej drogi."
 SOV_regional_control: "Oczyszczająca oligarchia"
 SOV_regional_control_desc: "Oligarchowie zbyt długo wysysali z naszego narodu życiodajną krew. Teraz uderzymy z powrotem i uwolnimy kraj od tych pasożytniczych elit."
 SOV_establish_new_religion: "Nowa polityka religijna"
 SOV_establish_new_religion_desc: "Współczesne zorganizowane religie zostały stworzone, by zniewolić umysły i stłumić niezależną myśl. Musimy wyzwolić ludzi z tej mentalnej niewoli."
 SOV_internet_propaganda: "Propaganda internetowa"
 SOV_internet_propaganda_desc: "Niewielu rozumie prawdziwą moc internetu. Podobnie jak Predictor Corrector przed nami, wykorzystamy go, by zmienić sposób myślenia opinii publicznej i zmiażdżyć fałszywą świadomość."
 SOV_course_of_truth: "Kurs prawdy"
 SOV_course_of_truth_desc: "Duchowieństwo prawosławne zbyt długo ukrywało przed ludźmi głębsze prawdy. Teraz ujawnimy te sekrety i ujawnimy pełną prawdę o naszej historii."
 SOV_new_cosmic_warfare_desc: "Generał Pietrow, specjalista od wojny kosmicznej, postrzega gwiazdy jako kolejną granicę Rosji. Musimy przywrócić i rozwijać dziedzictwo radzieckiego programu kosmicznego."
 SOV_russian_knights_desc: "W sercu rosyjskiego ducha tkwi dusza Witiaźa – szlachetnego wojownika. Choć nieliczni, ci współcześni rycerze niosą dziedzictwo Rusi w bój."
 SOV_russian_knights: "Rosyjski Witaź"
 SOV_new_cosmic_warfare: "Nowa kosmiczna wojna"
 SOV_remaking_constitution: "Przeróbka Konstytucji"
 SOV_remaking_constitution_desc: "Obecna Konstytucja ogranicza naszą wolę reform. Musi zostać całkowicie przepisana, aby odzwierciedlała naszą wizję boskiej przyszłości Rosji."
 SOV_iron_hand_of_koba: "Dziedzictwo stalinowskie"
 SOV_iron_hand_of_koba_desc: "Stalin był duchowym spadkobiercą carów i architektem zdyscyplinowanej, silnej Rosji. Musimy ożywić jego dziedzictwo i podążać ścieżką, którą wytyczył."
 SOV_natural_bloshevism: "Naturalny bolszewizm"
 SOV_natural_bloshevism_desc: "Upadek caratu i rozkwit bolszewizmu nie były zbiegiem okoliczności – były naturalną ewolucją naszego narodu. Musimy w pełni zaakceptować ten los."
 SOV_slavic_reincarnation: "Reinkarnacja słowiańska"
 SOV_slavic_reincarnation_desc: "Prawdziwe odrodzenie duchowe tkwi w wierzeniach naszych przodków. Wszystkie obce religie muszą zostać zniesione na rzecz powrotu do rodzimego słowiańskiego pogaństwa."
 SOV_merge_pantheons: "Połącz się ze Zvenyashie Kedrym"
 SOV_merge_pantheons_desc: "Łącząc się z Zvenyashie Kedry, możemy połączyć nasze święte przekonania w jedną, potężną wiarę, która pozwoli nam przeciwstawić się manipulacjom egipskich kapłanów."
 SOV_support_nod: "Wesprzyj NOD"
 SOV_support_nod_desc: "Ruch NOD jest zaciekle antyzachodni. Ich ideologia jest zbieżna z naszą i powinni zostać włączeni do naszej administracji."
 SOV_educational_water: "Martwa woda"
 SOV_educational_water_desc: "Martwa Woda, doktryna religijno-polityczna inspirowana rosyjskim folklorem, pierwotnie opracowana przez tajne Centrum Kapłańskie Związku Radzieckiego, dąży do duchowego ożywienia narodu. Obecnie stanowi ona ideologiczną bazę naszej Konceptualnej Jedności Partyjnej."
 SOV_search_for_priests: "Szukaj księży"
 SOV_search_for_priests_desc: "Egipscy kapłani zbyt długo manipulowali światem z ukrycia. Musimy wykorzenić ich agentów ukrytych w naszych granicach."
 SOV_purge_westernists: "Czyść westernistów"
 SOV_purge_westernists_desc: "Zachodniacy to ślepi słudzy globalnego kapitalizmu. Ich trujący wpływ musi zostać wyeliminowany z naszego rządu i społeczeństwa."
 SOV_revolutions_in_other_slavic_states: "Rewolucja Bogorodiczna"
 SOV_revolutions_in_other_slavic_states_desc: "Musimy rozprzestrzenić rewolucję na ziemie słowiańskie, aby uwolnić naszych braci spod kontroli Przewidującego Korygującego. Nadchodzi era wyzwolenia."
 SOV_seek_for_them_in_israel: "Szukaj ich w Izraelu"
 SOV_seek_for_them_in_israel_desc: "Według generała Pietrowa egipscy kapłani mogą mieć agentów nawet w Izraelu. Musimy zbadać i ujawnić ich ukryte wpływy w tym kraju."
 SOV_seek_for_them_in_swiss: "Szukaj ich w Szwajcarii"
 SOV_seek_for_them_in_swiss_desc: "Od dawna krążą pogłoski, że Szwajcaria jest siedzibą Predictora Correctora. Przeszukamy każdy jej zakątek, aby znaleźć prawdę."
 SOV_seek_for_them_in_egypt: "Szukaj ich w Egipcie"
 SOV_seek_for_them_in_egypt_desc: "Być może egipscy kapłani ukryli się w samym sercu swojej potęgi. Musimy szukać prawdy w ich starożytnej ojczyźnie."
 SOV_kill_predictor_corrector: "Zabij korektor predyktorów!"
 SOV_kill_predictor_corrector_desc: "Odkryliśmy lokalizację Predictora-Korektora. Czas rozpocząć naszą świętą krucjatę – przeciwko kapitalizmowi, manipulacji i wrogom prawdy."
 SOV_semibankirshina_desc: "Semibankirshina, czyli „grupa siedmiu bankierów”, odnosi się do najpotężniejszych oligarchów, którzy niegdyś mieli ogromny wpływ na politykę rosyjską za czasów Jelcyna."
 SOV_enforce_oligarhic_rule: "Egzekwuj rządy oligarchiczne"
 SOV_enforce_oligarhic_rule_desc: "Państwo zbyt długo uciskało oligarchów, jednocześnie niewiele robiąc dla rozwoju gospodarczego. Czas oddać władzę tym, którzy naprawdę napędzają wzrost gospodarczy."
 SOV_revive_oligarch_influence: "Przywróć wpływy oligarchów"
 SOV_revive_oligarch_influence_desc: "Nadszedł czas, aby nasze środowisko oligarchów odzyskało znaczenie i wpływ na rządy Rosji."
 SOV_bring_the_old_gang_from_abroad: "Sprowadź stary gang z zagranicy"
 SOV_bring_the_old_gang_from_abroad_desc: "Wielu naszych byłych sojuszników zostało zmuszonych do emigracji. Teraz, gdy losy się odwróciły, możemy zaprosić ich do domu i odbudować nasze imperium wpływów."
 SOV_privatize_state_corporations: "Sprywatyzować przedsiębiorstwa państwowe"
 SOV_privatize_state_corporations_desc: "Gospodarka państwowa za czasów Putina była nieefektywna i rozrośnięta. Musimy zlikwidować te korporacje i oddać je w ręce prywatne."
 SOV_move_oligarchic_entites_back_to_russia: "Cofnij podmioty oligarchiczne"
 SOV_move_oligarchic_entites_back_to_russia_desc: "Rosyjskie bogactwo ukryte za granicą musi wrócić do kraju. Mając kontrolę nad krajem, możemy wykorzystać te zasoby do finansowania zarówno zysków, jak i rozwoju."
 SOV_exploit_natural_wealth: "Wykorzystaj bogactwo naturalne Rosji"
 SOV_exploit_natural_wealth_desc: "Rosja posiada ogromne rezerwy zasobów naturalnych. Będziemy je eksploatować efektywnie – dbając o zadowolenie ludzi i bogactwo oligarchów."
 SOV_semi_criminal_government: "Rząd półkryminalny"
 SOV_semi_criminal_government_desc: "Oligarchowie mają długotrwałe powiązania z przestępczością zorganizowaną. Po co z tym walczyć? Sformalizujemy układ i wprowadzimy ich do rządu."
 SOV_end_lawsuits_against_oligarchs: "Koniec z procesami przeciwko oligarchom"
 SOV_end_lawsuits_against_oligarchs_desc: "Putin wypowiedział wojnę prawną oligarchom, aby zapewnić sobie władzę. Położymy kres tej niesprawiedliwości i przywrócimy godność naszym najbardziej zamożnym obywatelom."
 SOV_restore_semibankirshina: "Przywróć Semibankirshinę"
 SOV_restore_semibankirshina_desc: "Semibankirshina – siedmiu potężnych bankierów – powróciło. Po odejściu Putina stoją teraz zjednoczeni, gotowi ponownie kształtować losy Rosji."
 SOV_back_to_the_west: "Wróć na Zachód"
 SOV_back_to_the_west_desc: "Antagonizacja Zachodu zrujnowała naszą gospodarkę. Czas porzucić przestarzałą wrogość z czasów zimnej wojny i zawiązać nowe sojusze na rzecz dobrobytu."
 SOV_oligarchs_democracy: "Zaślepieni swoimi obietnicami"
 SOV_oligarchs_democracy_desc: "Zwycięstwo wyborcze sił prooligarchicznych zszokowało wielu. Zaślepieni obietnicami, ludzie wybrali te same elity, które niegdyś grabiły kraj za Jelcyna."
 sov_oligarchs.1.t: "Rekonstrukcja rządu!"
 sov_oligarchs.1.d: "Oligarchowie byli kiedyś osłabieni, ale teraz już nie. Starając się zapewnić sobie ich poparcie, prezydent przyznał im bezprecedensowe wpływy. Ministrowie lojalni wobec oligarchów przejmują władzę – zapoczątkowując nową erę rządów elit."
 sov_oligarchs.1.a: "Boże chroń Rosję..."
 sov_oligarchs.2.t: "Gusinski wraca do Rosji!"
 sov_oligarchs.2.d: "Rosyjski potentat medialny Władimir Gusiński, niegdyś zesłany przez poprzednie władze, powrócił. Sytuacja się zmieniła – i jest on mile widziany."
 sov_oligarchs.2.a: "Witamy spowrotem!"
 sov_oligarchs.3.t: "Berezowski wraca do Rosji!"
 sov_oligarchs.3.d: "Borys Bieriezowski – jeden z najbogatszych i najbardziej kontrowersyjnych oligarchów Rosji – powrócił. To jak powrót do lat 90."
 sov_oligarchs.3.a: "Jak w latach 90-tych!"
 sov_oligarchs.4.t: "Semibankirshina przejmuje władzę w Rosji!"
 sov_oligarchs.4.d: "Wpływy oligarchii osiągnęły apogeum. Siedmiu potentatów ery Jelcyna zmiażdżyło wszystkich rywali i przejęło władzę. Przyszłość rosyjskiego rządu spoczywa teraz w ich rękach – ale pytanie pozostaje: kto poprowadzi?"
 sov_oligarchs.4.a: "Bezpośrednie rządy Rady!"
 sov_oligarchs.4.b: "Przeprowadzimy nowe wybory z innym kandydatem."
 sov_oligarchs.4.c: "Moglibyśmy manipulować obecnym prezydentem."
 sov_oligarchs.5.t: "Sfałszowane wybory!"
 sov_oligarchs.5.d: "Aby legitymizować nasze rządy, musimy przeprowadzić nowe wybory i zapewnić zwycięstwo Liberalnej Rosji. Jedynym dylematem jest wybór kandydata na prezydenta: marionetki czy własnego?"
 sov_oligarchs.5.a: "Nevzorov jest naszym kandydatem!"
 sov_oligarchs.5.b: "Borys Bieriezowski zostanie prezydentem."
 sov_oligarchs.5.c: "Prezydentem będzie Michaił Chodorkowski."
 SOV_russian_oligarchs_modifier: "Państwo oligarchiczne"
 SOV_idea_putinism_medvedeism: "Tandemokracja"
 SOV_private_media_nationalisation_idea: "Upaństwowienie mediów prywatnych"
 SOV_FSB_renewed: "Aktualizacja personelu FSB"
 SOV_nkrarm_tt: "O uznanie Karabachu za Ormianę"
 SOV_geoza_tt: "O uznanie Abchazji i Osetii Południowej za Gruzję"
 SOV_geoprotiv_tt: "O niepodległość Osetii Południowej i Abchazji"
 SOV_neukr_tt: "Przeciw Ukrainie"
 SOV_zaukr_tt: "Dla Ukrainy"
 SOV_nkraze_tt: "O uznanie Karabachu za Azerbejdżan"
 SOV_odessa_naval_tt: "Nasze wojska wylądują w §YOdessa§!"
 warsaw_joing_exercises_world_tension: "Wspólne ćwiczenia Układu Warszawskiego"
 joint_research_on_armor_and_infantry_tt: "Wspólne badania nad bronią pancerną i piechotą"
 russian_lands_tension: "Rosja ogłosiła chęć zwrotu ziem Imperium Rosyjskiego"
 SOV_medvedev_tanks: "Ural Wagon Zawod"
 SOV_uav_product: "Drony"
 SOV_fighter_product: "Wojownicy"
 tandem: "Tandem"
 rival: "Nasz główny wróg"
 SOV_storm_z_central_russias: "Rekrutuj więźniów z kolonii §YRosji Centralnej§!"
 SOV_storm_z_ural: "Rekrutuj więźniów z kolonii §YUral§!"
 SOV_storm_z_far_east: "Rekrutuj więźniów z kolonii §YDalekiego Wschodu§!"
 SOV_storm_z_siberia: "Rekrutuj więźniów z kolonii §YSyberii§!"
 SOV_storm_z_central_russia: "Więźniowie ze Storm Z"
 SOV_storm_z_central_russia_desc: "Wielu więźniów przeżyło walki, na które ich wysłaliśmy. Teraz, oficjalnie uwolnieni, wielu z nich postanowiło wrócić do tego, co znają najlepiej: rabunku i przemocy."
 sov_student_rallies.1.b: "Odrzuć ich żądania"
 sov_student_rallies.1.a: "Negocjuj ze studentami"
 sov_student_rallies.1.d: "Ruch protestacyjny studentów przerodził się w szerszy kryzys, w którym uczestniczą robotnicy i organizacje społeczeństwa obywatelskiego. Sojusz Układu Warszawskiego stoi przed krytyczną próbą jedności."
 sov_student_rallies.1.t: "Kryzys Układu Warszawskiego"
 russia.51.a: "Zrobione"
 russia.51.d: "Terytorium zostało przejęte pod kontrolę rosyjską. Nasze siły ustanowiły porządek i sprawują władzę administracyjną w regionie."
 russia.51.t: "Pod kontrolą rosyjską"
 korea_agree: "§Y[NKO.GetNameWithFlag]§! zgadzać się"
 SOV_borya_ded: "Zmarł Borys Jelcyn"
 SOV_parnas: "PARNAS"
 SOV_parnas_desc: "Partia Wolności Ludowej (PARNAS) jest liberalno-demokratyczną partią polityczną i jedną z pierwszych partii opozycyjnych założonych w późnym okresie Związku Radzieckiego."
 SOV_kasyanov: "Michaił Kasjanow"
 SOV_kasyanov_desc: "Michaił Michajłowicz Kasjanow (ur. 8 grudnia 1957) – rosyjski mąż stanu i polityk, obecnie przewodniczący Partii Wolności Ludowej."
 SOV_from_center_to_regions: "Od Centrum do Regionów"
 SOV_from_center_to_regions_desc: "Wierzymy, że prawdziwy dobrobyt gospodarczy zależy od wzmocnienia regionów i gmin pod względem politycznym, ekonomicznym i administracyjnym."
 SOV_eliminate_FSS: "Wyeliminuj FSS"
 SOV_eliminate_FSS_desc: "Przekształcić FSS w Federalną Służbę Kontrwywiadowczą poprzez usunięcie ról śledczych i antykorupcyjnych oraz wykluczenie Służby Łączności Rządowej i Wojsk Granicznych."
 SOV_demilitarize_mia: "Zdemilitaryzować Ministerstwo Spraw Wewnętrznych"
 SOV_demilitarize_mia_desc: "Wycofać wojska wewnętrzne z Ministerstwa Spraw Wewnętrznych i utworzyć Ludową Gwardię Narodową pod nadzorem prezydenta i parlamentu, zakazując jednocześnie używania OMON przeciwko pokojowym protestom."
 SOV_reduce_taxes_on_small_businesses: "Obniż podatki dla małych firm"
 SOV_reduce_taxes_on_small_businesses_desc: "Obniżenie podatków dla małych przedsiębiorstw jest niezbędne, aby pobudzić naszą gospodarkę i wspierać wzrost gospodarczy."
 SOV_ease_administrative_pressure: "Złagodź presję administracyjną"
 SOV_ease_administrative_pressure_desc: "Presja administracyjna na regiony jest coraz większa i musimy podjąć działania, aby powstrzymać i odwrócić ten trend."
 SOV_anti_corruption_agency: "Agencja Antykorupcyjna"
 SOV_anti_corruption_agency_desc: "Korupcja jest głęboko zakorzeniona we władzy. Niezbędny jest energiczny, ogólnokrajowy program antykorupcyjny, angażujący wszystkich obywateli."
 SOV_adhere_to_nato_policy: "Przestrzegaj polityki NATO"
 SOV_adhere_to_nato_policy_desc: "Współpraca z NATO promuje bezpieczeństwo, stabilność i wzajemne zrozumienie. Utrzymuje wpływy Rosji i równoważy globalne interesy."
 SOV_establishment_of_free_independent_alliance: "Utworzenie Wolnego Niezależnego Sojuszu"
 SOV_establishment_of_free_independent_alliance_desc: "Musimy przywrócić stosunki dyplomatyczne ze wszystkimi państwami postsowieckimi i być może utworzyć unię na rzecz wspólnego rozwoju gospodarczego i wojskowego."
 SOV_membership_in_a_free_independent_alliance: "Członkostwo w Wolnym Niezależnym Sojuszu"
 SOV_membership_in_a_free_independent_alliance_desc: "Po zawarciu sojuszu zaprosimy wszystkie byłe republiki radzieckie do przyłączenia się i wspólnej obrony demokracji."
 SOV_membership_subjects: "Członkostwo podmiotów"
 SOV_membership_subjects_desc: "Nasz sojusz jest niepełny bez udziału poddanych naszej federacji."
 SOV_membership_east: "Członkostwo Wschodu"
 SOV_membership_east_desc: "Zaproszenie krajów Wschodu wzmocni nasz sojusz z ich zasobami, gospodarkami i potencjałem militarnym, co zwiększy naszą obronność i ochronę demokracji."
 SOV_membership_pribalt: "Członkostwo krajów bałtyckich"
 SOV_membership_pribalt_desc: "Włączenie państw bałtyckich zapewnia strategiczny dostęp do Morza Bałtyckiego i wzmacnia siłę przemysłową i technologiczną. Bez nich nasz sojusz ryzykuje utratę kluczowych terytoriów i sojuszników."
 SOV_membership_caucasus: "Członkostwo Kaukazu"
 SOV_membership_caucasus_desc: "Kaukaz niesie ze sobą strategiczne zasoby i znaczenie geopolityczne. Ich wykluczenie grozi osłabieniem naszych regionalnych wpływów i stabilności demokratycznej."
 SOV_membership_ces: "Członkostwo Azji Środkowej"
 SOV_membership_ces_desc: "Zasoby i pozycja Azji Środkowej są kluczowe. Ich włączenie poszerzy rynki zbytu, wzmocni bezpieczeństwo i zwiększy nasze wpływy regionalne."
 SOV_free_economic_zone: "Wolna Strefa Ekonomiczna"
 SOV_free_economic_zone_desc: "Powinniśmy przekształcić Kaliningrad w wolną strefę ekonomiczną, która będzie stanowić pomost do współpracy między Rosją a UE."
 SOV_transfer_state_shares_to_pension_funds: "Przenieś akcje państwowe do funduszy emerytalnych"
 SOV_transfer_state_shares_to_pension_funds_desc: "Aby poprawić standard życia i wydłużyć życie obywateli, akcje państwowe zostaną przeniesione do Rosyjskiego Funduszu Emerytalnego z ograniczeniem prawa głosu."
