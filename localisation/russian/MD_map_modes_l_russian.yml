l_russian:
 MAPMODE_EU_MAP_MODE_NAME: "ЕС"
 MAPMODE_EU_MAP_MODE: "ЕС"
 MAPMODE_EU_MAP_MODE_DESCRIPTION: "Отображает список государств-членов ЕС, потенциальных членов и действующих должностных лиц Европейского союза."
 EU_map_mode_tooltip: "Европейский союз"
 EU_map_mode_tooltip_delayed: "Shows the current membership and leadership of the European Union.\n\n§HColor Legend:§!\n§nBlue§! = EU Member State\n§YGold§! = Potential Member State\n\n§HOffice Holders:§!\n§RRed§! = President of the European Commission, European Council, or European Parliament\n§9Brown§! = Secretary General of EuroNavy\n§GGreen§! = Secretary General of EuroArmy\n§CCyan§! = High Representative for Foreign Affairs and Security Policy\n§0Purple§! = European Minister of Economy and Finance\n§YYellow§! = President of the European Central Bank\n§PDeep Pink§! = Frontex Director\n§OOrange§! = EU Ambassador to the United Nations\n§pPink§! = President of the European Federation\n\nUpdated weekly."
 MAPMODE_GDP_C_MAP_MODE_NAME: "ВВП на душу населения"
 MAPMODE_GDP_C_MAP_MODE: "ВВП на душу населения"
 MAPMODE_GDP_C_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается ВВП на душу населения страны, представляющий собой средний объем экономического производства на душу населения."
 gdp_c_map_mode_tooltip: "ВВП на душу населения в [FROM.CONTROLLER.GetNameWithFlag]"
 gdp_c_map_mode_tooltip_delayed: "GDP per capita of §Y[FROM.CONTROLLER.GetNameWithFlag]§! is: §Y$[?FROM.CONTROLLER:gdp_per_capita|Y]K§!.\n\nGDP per capita represents the economic output per person. Higher values indicate a wealthier, more productive economy.\n\n§HColor Legend:§!\n§nDeep Blue§! = Below 8K (Low income)\n§lBright Blue§! = 8K - 18K (Lower-middle income)\n§CCyan§! = 18K - 32K (Middle income)\n§GGreen§! = 32K - 60K (Upper-middle income)\n§YYellow§! = 60K - 110K (High income)\n§9Bright Gold§! = Above 110K (Extremely wealthy)\n\nUpdated with the weekly economic tick."
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_NAME: "Неудовлетворенность энергией"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE: "Неудовлетворенность энергией"
 MAPMODE_ENERGY_CONSUMPTION_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается текущий процент неудовлетворённого спроса на энергию в странах."
 energy_consumption_map_mode_tooltip: "Energy Consumption Unfulfillment in [FROM.CONTROLLER.GetNameWithFlag]"
 energy_consumption_map_mode_tooltip_delayed: "Energy Consumption Unfulfillment in §Y[FROM.CONTROLLER.GetNameWithFlag]§! is: §Y[?FROM.CONTROLLER:unfulfilled_energy_demand_var|%+]§!\n\nThis shows the percentage of energy demand that is not being met. A negative value means demand exceeds supply (energy deficit).\n\n§HColor Legend:§!\n§nDeep Blue§! = Below -30% (Severe deficit)\n§lBright Blue§! = -30% to -18% (Moderate deficit)\n§CCyan§! = -18% to -12% (Mild deficit)\n§GGreen§! = -12% to -4% (Nearly met)\n§YYellow§! = -4% to -1% (Almost met)\n§9Bright Gold§! = Above -1% (Fully met)\n\n§nDarker is worse.§! Invest in energy production to improve.\nUpdated with the weekly economic tick."
 MAPMODE_PRODUCTIVITY_MAP_MODE_NAME: "Производительность"
 MAPMODE_PRODUCTIVITY_MAP_MODE: "Производительность"
 MAPMODE_PRODUCTIVITY_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается текущая производительность отдельных штатов, представляющая собой эффективность экономического производства в расчете на одного работника."
 productivity_map_mode_tooltip: "Productivity in [FROM.GetName]"
 productivity_map_mode_tooltip_delayed: "Productivity in §Y[FROM.GetName]§! is: §Y[?FROM.productivity_state_var|Y]§!\n\nProductivity measures the economic output efficiency of a state. Higher values mean more economic output per worker.\n\n§HColor Legend:§!\n§nDeep Purple§! = Below 200 (Very low)\n§nDeep Blue§! = 200 - 500 (Low)\n§lBright Blue§! = 500 - 800 (Below average)\n§CCyan§! = 800 - 1200 (Average)\n§GGreen§! = 1200 - 1900 (Above average)\n§YYellow§! = 1900 - 3800 (High)\n§9Bright Gold§! = 3800 - 5000 (Very high)\n§9Deep Orange§! = Above 5000 (Outstanding)\n\nUpdated with the weekly economic tick."
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_NAME: "Возобновляемые точки"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE: "Возобновляемые точки"
 MAPMODE_RENEWABLE_ENERGY_HOTSPOT_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается природный потенциал возобновляемой энергии каждого штата, основанный на ветровой, солнечной и других географических факторах."
 renewable_energy_hotspot_map_mode_tooltip: "Renewable Energy Capacity Bonus in [FROM.GetName]"
 renewable_energy_hotspot_map_mode_tooltip_delayed: "Renewable Energy Capacity Bonus in §Y[FROM.GetName]§! is: §Y[?FROM.state_renewable_capacity_factor_modifier_var|Y]§!\n\nThis shows the natural renewable energy potential of a state. Higher values mean wind, solar, and other renewables produce more energy here.\n\n§HColor Legend:§!\n§HDark Gray§! = No renewable potential\n§nDeep Blue§! = Below 0.25 (Poor potential)\n§lBright Blue§! = 0.25 - 0.40 (Below average)\n§CCyan§! = 0.40 - 0.50 (Average)\n§GGreen§! = 0.50 - 0.60 (Good)\n§YYellow§! = 0.60 - 0.70 (Very good)\n§9Bright Gold§! = Above 0.70 (Excellent hotspot)\n\nThis value is fixed and does not change over time."
 MAPMODE_INFLUENCE_MAP_MODE_NAME: "Влияние"
 MAPMODE_INFLUENCE_MAP_MODE: "Влияние"
 MAPMODE_INFLUENCE_MAP_MODE_DESCRIPTION: "Показывает ваш рейтинг влияния в других странах. Влияние определяет дипломатические возможности и с течением времени сказывается на политической позиции."
 influence_map_mode_tooltip: "Влияние"
 influence_map_mode_tooltip_delayed: "Shows countries where you hold influence, your ranking among influencers, and nations set for auto-influence.\n\nInfluence determines your diplomatic leverage over a nation. Higher ranking means greater sway over their political alignment and foreign policy.\n\n§HColor Legend:§!\n§GGreen§! = Your nation\n§CCyan§! = 1st Influencer (dominant)\n§lLight Blue§! = 2nd or 3rd Influencer\n§nNavy Blue§! = 4th to 7th Influencer\n§9Orange§! = Auto-Influenced Nation (monthly)\n§RRed§! = Spread Influence Cooldown (recently targeted)\n§HDark Gray§! = No influence\n\nUpdated weekly."
 MAPMODE_GCC_MAP_MODE_NAME: "ССАГПЗ"
 MAPMODE_GCC_MAP_MODE: "ССАГПЗ"
 MAPMODE_GCC_MAP_MODE_DESCRIPTION: "Отображает государства-члены и потенциальных членов Совета сотрудничества стран Персидского залива."
 GCC_map_mode_tooltip: "Совет сотрудничества стран Персидского залива"
 GCC_map_mode_tooltip_delayed: "Shows the current membership of the Gulf Cooperation Council (GCC).\n\n§HColor Legend:§!\n§CTeal§! = GCC Member State\n§GYellow-Green§! = Potential Member State\n\nUpdated weekly."
 MAPMODE_SCO_MAP_MODE_NAME: "ШОС"
 MAPMODE_SCO_MAP_MODE: "ШОС"
 MAPMODE_SCO_MAP_MODE_DESCRIPTION: "Представляет государства-члены, наблюдателей и потенциальных членов Шанхайской организации сотрудничества."
 SCO_map_mode_tooltip: "Шанхайская организация сотрудничества"
 SCO_map_mode_tooltip_delayed: "Shows the current membership of the Shanghai Cooperation Organisation (SCO).\n\n§HColor Legend:§!\n§9Orange§! = SCO Member State\n§0Purple§! = Observer State\n§YYellow§! = Potential Member State\n\nUpdated weekly."
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_NAME: "Уровень безработицы"
 unemployment_rate_map_mode_tooltip: "Уровень безработицы в [FROM.CONTROLLER.GetNameWithFlag]"
 unemployment_rate_map_mode_tooltip_delayed: "Unemployment Rate in §Y[FROM.CONTROLLER.GetNameWithFlag]§! is: §Y[?FROM.CONTROLLER:total_unemployed_percentage_display|%Y]§!\n\nThis shows the percentage of the working-age population that is unemployed.\n\n§HColor Legend:§!\n§nDeep Blue§! = Above 35% (Crisis)\n§lBright Blue§! = 22% - 35% (Very high)\n§CCyan§! = 10% - 22% (High)\n§GGreen§! = 5% - 10% (Moderate)\n§YYellow§! = 2% - 5% (Low)\n§9Bright Gold§! = Below 2% (Full employment)\n\n§nDarker is worse.§! Reduce unemployment through economic growth and policy.\nUpdated with the weekly economic tick."
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE: "Уровень безработицы"
 MAPMODE_UNEMPLOYMENT_RATE_MAP_MODE_DESCRIPTION: "В этом режиме карты отображается текущий уровень безработицы в странах в процентах от трудоспособного населения."