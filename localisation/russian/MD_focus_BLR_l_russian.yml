 BLR_Establish_cooperation_lit: "Наладить сотрудничество с литовскими коммунистами"
 BLR_Establish_cooperation_lit_desc: "Наши братья-коммунисты в Литве полностью отрезаны от власти. Мы должны наладить с ними связь, чтобы наше будущее сотрудничество принесло плоды обеим странам."
 BLR_Financing_of_protest_movements_lit: "Финансирование коммунистических протестов"
 BLR_Financing_of_protest_movements_lit_desc: "Мы расширим влияние Коммунистической партии, финансируя протесты в Литве."
 BLR_Strengthen_com_partys_agenda_lit: "Усилить коммунистическую повестку дня"
 BLR_Strengthen_com_partys_agenda_lit_desc: "Белорусы составляют третью по численности некоренную часть населения Литвы. Мы должны использовать это как инструмент влияния."
 BLR_buy_militaries: "Подкупить местных военных"
 BLR_litbel_propaganda: "Пропаганда силы государства ЛитБел"
 BLR_litbel_propaganda_desc: "Мы должны убедить людей в том, что единое литовско-белорусское государство будет более могущественным и сильным, чем каждая из этих стран по отдельности."
