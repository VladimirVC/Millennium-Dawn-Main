 BLR_belarus_nati_modifier: "Política Estatal de Belarus"
 BLR_belarus_nati_modifier_desc: "A ascensão ao poder das forças nacionalistas em Belarus afetou grandemente sua política doméstica e externa. A prioridade foi o poder e a força da nação, propaganda do grande passado e revanchismo, pela grandeza bielorrussa perdida."
 BLR_belarus_police_modifier: "Segurança Interna de Belarus"
 BLR_belarus_police_modifier_desc: "O governo bielorrusso possui vasta experiência desde sua época como parte da URSS em reprimir dissidências e agentes inimigos."
 BLR_belarus_kommi_modifier: "A Política de Belarus Comunista"
 BLR_belarus_kommi_modifier_desc: "O governo comunista em Belarus está ativamente tentando reviver, tanto na propaganda quanto na ação, tudo de melhor que existia nos tempos soviéticos."
