l_korean:
 reserve_currency: "준비통화 정책"
 reserve_currency_desc: "이 국가의 보유 외환 및 대외 채무의 기반이 되는 통화입니다. 주요 준비통화와 연계하는 국가는 해당 통화의 유동성 네트워크와 결제 인프라에 접근할 수 있게 되지만, 자국 통화를 보유 외환으로 유지하는 국가는 국제 신용 접근성을 희생하는 대신 완전한 통화 주권을 유지합니다."
 us_dollar: "[1182.owner.GetAdjective] 달러"
 us_dollar_desc: "지배적인 세계 준비통화입니다. 달러로 외환을 보유하면 타의 추종을 불허하는 유동성과 국제 신용 시장에 대한 접근성을 제공하지만, 자국 통화가 약세일 때 눈덩이처럼 불어나는 달러화 표시 채무 비용에 국가가 노출되는 위험을 안게 됩니다."
 euro: "유로"
 euro_desc: "유럽 연합의 통화이자 세계에서 두 번째로 많이 거래되는 준비통화입니다. EU 회원국이 사용할 수 있는 유로는 역내 통화 안정성을 제공하며 유럽 자본 시장에 대한 우선적 접근권을 부여합니다."
 chinese_yuan: "[547.owner.GetAdjective] 위안"
 chinese_yuan_desc: "중국의 국가 통화인 인민폐는 달러 패권의 대안으로 베이징 정부가 적극 후원하고 있는 신흥 준비자산입니다. 중국의 경제권 내에 있는 무역 파트너들은 나날이 성장하는 위안화 결제 네트워크의 혜택을 받습니다."
 russia_rouble: "[652.owner.GetAdjective] 루블"
 russia_rouble_desc: "러시아 연방의 통화로, 유라시아 경제 연합 내에서와 구소련권 무역 파트너들 사이에서 사용됩니다. 루블화를 보유 외환으로 취하면 해당 국가는 러시아의 대안 결제 시스템과 에너지 결제 체계에 통합됩니다."
 japanese_yen: "[615.owner.GetAdjective] 엔"
 japanese_yen_desc: "일본의 통화이자 세계에서 세 번째로 많이 거래되는 통화입니다. 일본 경제권 내의 국가들은 확립된 결제 네트워크와 엔화의 상대적 안정성으로부터 혜택을 받지만, 동아시아 외 지역에서의 준비통화 채택률은 여전히 제한적입니다."
 british_pound: "[13.owner.GetAdjective] 파운드"
 british_pound_desc: "현재까지 국제적으로 활발히 사용되는 가장 오래된 준비통화입니다. 파운드화는 영연방 전반의 무역과 금융 흐름을 뒷받침하고 세계 외환 보유고에서 상당한 비중을 유지하고 있으며, 영국과 연계된 국가들에게 런던의 심층적인 자본 시장에 대한 안정적인 접근성을 제공합니다."
 swiss_frank: "[74.owner.GetAdjective] 프랑"
 swiss_frank_desc: "전 세계적으로 안전 자산으로 명성이 높은 스위스의 통화입니다. 다른 국가들이 공식 준비통화로 채택하는 경우는 드물지만, 스위스 프랑의 엄격한 통화 규율과 스위스의 정치적 중립성은 이 통화를 통화 위기와 대외 충격에 대해 유례없을 정도로 강하게 만듭니다."
 no_foreign_reserve: "자국 통화 보유외환"
 no_foreign_reserve_desc: "이 국가는 외국의 기준 통화 대신 자국 통화로 보유 외환을 유지합니다. 완전한 통화 주권을 유지하고 대외 환율 충격으로부터 자국을 보호하지만, 주요 준비통화에 연계된 유동성 네트워크 및 국제 신용 촉진 제도에 대한 접근성을 포기하게 됩니다."
 currency_strength_modifier: "통화 강세"
 reserve_roi_bonus: "준비통화 투자 수익률(ROI)"
 reserve_roi_bonus_desc: "강력한 외국 준비통화를 보유함으로써 얻는 추가 투자 수익률입니다. 발행국의 통화 강세와 채택 네트워크 규모에 따라 매월 비례하여 증감하며, 발행국의 경제가 약화되면 이 보너스도 감소합니다."
 reserve_trade_bonus: "준비통화 무역 연계"
 reserve_trade_bonus_desc: "동일한 통화 블록 내에서 활동함으로써 얻는 약간의 무역 의견 보너스입니다. 동일한 준비통화를 사용하는 국가 간에 공유되는 우호적인 무역 관계와 결제 인프라를 반영합니다."
 seigniorage_income_modifier: "주조차익(시뇨리지) 수익"
 monetary_policy_decisions: "통화 정책"
 monetary_policy_expand_money_supply: "통화량 확대"
 monetary_policy_expand_money_supply_desc: "중앙은행에 통화량 확대 지시를 내립니다. 준비통화를 발행하는 국가는 해당 통화에 대한 해외의 수요가 인플레이션 압력의 상당 부분을 흡수해주기 때문에 가장 큰 혜택을 봅니다. 단, 모든 국가는 어느 정도의 통화 가치 하락을 겪게 됩니다."
 monetary_policy_austerity: "긴축 조치"
 monetary_policy_austerity_desc: "재정 정책을 긴축하고 통화량을 억제합니다. 단기적인 수익 압박을 완화하는 동시에 통화 가치를 상승시키고 국가 예산에 규율을 부과합니다."
 currency_backing: "통화 담보제도"
 currency_backing_desc: "국가 통화의 기반이 되는 자산 기준입니다. 경화(Hard-money) 본위제는 통화를 실물 상품 보유고에 연동하여 규율을 강제하지만 통화 유연성을 제한합니다. 명목 화폐(Fiat) 시스템은 인플레이션 위험을 감수하는 대신 완전한 통화 주권을 보장합니다."
 gold_standard_back: "금본위제"
 gold_standard_back_desc: "국가 통화가 고정된 환율로 금에 연동되고 교환될 수 있습니다. 통화량 확대가 물리적인 금 보유량에 의해 제한되므로 장기적인 신뢰를 심어주지만, 경제 위기에 대응하는 정부의 능력을 제약합니다."
 silver_standard: "은본위제"
 silver_standard_desc: "국가 통화가 고정된 교환 비율로 은 보유고에 의해 담보됩니다. 금 연동제보다 덜 제한적인 은본위제는 어느 정도의 실물 자산 규율을 제공하는 동시에 다소 더 높은 통화 유연성을 허용합니다."
 bi_metal_standard: "금은양본위제"
 bi_metal_standard_desc: "통화가 고정된 교환 비율로 금과 은 모두에 의해 담보됩니다. 역사적으로 통화 기반을 확대하기 위해 채택된 이 본위제는 실물 자산의 규율과 순수 단일 금속 본위제보다 더 높은 공급 유연성 사이의 균형을 맞춥니다."
 no_currency_backing: "불환본위제 (명목화폐)"
 no_currency_backing_desc: "통화가 오직 발행 정부의 권위와 신뢰도에 의해서만 담보됩니다. 실물 자산에 의한 제약이 없으므로 통화 정책이 완전히 유연해져 위기에 신속하게 대응할 수 있지만, 인플레이션 압력에 대한 취약성이 커집니다."
 gulden: "[46.owner.GetAdjective] 길더"
 gulden_desc: "유로존을 탈퇴한 후 재도입된 네덜란드의 역사적인 통화입니다. 엄격한 통화 규율과 막대한 무역 흑자를 바탕으로 하는 길더화는 완전한 통화 주권을 부여하고 대외 충격으로부터 경제를 보호하지만, 주요 준비통화 블록의 풍부한 유동성을 포기해야 하며 해외에서 보유하는 경우가 거의 없습니다."