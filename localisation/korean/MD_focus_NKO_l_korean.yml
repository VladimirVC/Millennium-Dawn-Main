 NKO_happiest_people_in_world: "세상에서 가장 행복한 인민"
 NKO_happiest_people_in_world_desc: ""
 NKO_agricultural_reform_tip: "§Y\"농민 간부에 여성을\"과 \"여성 노동자\" 중점을 완료하면, 정치 개혁 효과를 받게 됩니다.§!"
