 legalizes_all_political_parties_tt: "§CLegaliza todos os partidos políticos.§!\n"
 korea_peninsula_reunited: "§YA península coreana está §Greunida§!!§!"
 NKO_foreign_knowhow: "Conhecimento estrangeiro"
 NKO_hermit_kingdom: "Reino Ermitão"
 NKO_hermit_kingdom_desc: "North Korea has been an isolated state ever since its creation. Despite being one of the poorest countries in the world, the country still manages to maintain one of the largest militaries in the world. The Kim family has been in power for more than 50 years with practically no internal opposition. The Hermit Kingdom of North Korea is an unexplainable anomaly among countries.\n\n§RThis national spirit will be removed if the Kim family is no longer in power!§!"
 NKO_solve_the_arduous_march_desc: "A Árduous March teve um preço alto para nossa nação. Para garantir o futuro do nosso povo, precisamos implementar medidas estratégicas para superar esse período de dificuldades e levar nosso país à prosperidade. Isso inclui aumentar a produção agrícola, garantir ajuda humanitária e reformar nossas políticas internas para garantir estabilidade e crescimento."
 NKO_promote_songun: "Promova Songun"
 NKO_promote_songun_desc: "A política Songun, ou \"militar em primeiro lugar\", prioriza o Exército Popular Coreano em nossos assuntos políticos e econômicos. Ao promover o Songun, garantimos a segurança de nossa nação e fortalecemos o papel militar na salvaguarda de nossa soberania e na orientação de nossa construção socialista."
 NKO_humanitarian_aid: "Ajuda Humanitária"
 NKO_humanitarian_aid_desc: "Nestes tempos desafiadores, aceitar ajuda humanitária de organizações internacionais e nações amigas fornecerá recursos vitais para aliviar o sofrimento do nosso povo. Esta ajuda será cuidadosamente gerenciada para garantir que chegue aos necessitados e apoie nossos esforços de recuperação."
 NKO_food_production_boost: "Aumento da produção de alimentos"
 NKO_food_production_boost_desc: "Aumentar a produção de alimentos é essencial para garantir o bem-estar dos nossos cidadãos. Ao investir em tecnologias agrícolas, melhorar os sistemas de irrigação e apoiar nossos agricultores, podemos aumentar a produtividade das colheitas e garantir um suprimento estável de alimentos para nossa nação."
 NKO_healthcare_reform: "Reforma na Saúde"
 NKO_healthcare_reform_desc: "Reformar nosso sistema de saúde é essencial para melhorar a saúde e a produtividade do nosso povo. Vamos nos concentrar em modernizar instalações médicas, treinar profissionais de saúde e garantir acesso a medicamentos e tratamentos essenciais."
 NKO_punish_corruption: "Punir a Corrupção"
 NKO_punish_corruption_desc: "A corrupção mina nossos princípios socialistas e impede o progresso nacional. Lançaremos uma campanha rigorosa para identificar, expor e punir oficiais corruptos, garantindo transparência e integridade em nosso governo e instituições."
 NKO_agricultural_funding: "Financiamento Agrícola"
 NKO_agricultural_funding_desc: "Fornecer financiamento e suporte ao nosso setor agrícola aumentará a segurança alimentar e os meios de subsistência rurais. Vamos nos concentrar na mecanização, sementes melhoradas e melhores técnicas agrícolas para aumentar a produtividade."
 NKO_fertiliser_factory: "Fábrica de Fertilizantes"
 NKO_fertiliser_factory_desc: "Construir uma fábrica de fertilizantes de última geração melhorará significativamente a fertilidade do solo e a produtividade das colheitas. Este investimento garantirá que nossos agricultores tenham os recursos necessários para cultivar colheitas abundantes."
 NKO_nutrition_programs: "Programas de Nutrição"
 NKO_nutrition_programs_desc: "Implementar programas nacionais de nutrição abordará a desnutrição e melhorará a saúde pública. Vamos nos concentrar em fornecer dietas balanceadas, especialmente para crianças e populações vulneráveis, para garantir um futuro mais saudável."
 NKO_acquiesce_jangmadang: "Aceite Jangmadang"
 NKO_acquiesce_jangmadang_desc: "Reconhecendo a importância do Jangmadang, ou mercado negro, em nossa economia, permitiremos que suas operações continuem sob condições regulamentadas. Isso estimulará a atividade econômica e fornecerá bens essenciais ao nosso povo."
 NKO_bureau_39: "Gabinete 39"
 NKO_bureau_39_desc: "O Bureau 39 é responsável por gerar moeda forte para o regime por vários meios. Fortalecer este bureau aumentará nossas capacidades econômicas e garantirá um fluxo constante de recursos para dar suporte a projetos nacionais."
 NKO_admit_the_donju: "Admita o Donju"
 NKO_admit_the_donju_desc: "Os Donju, ou empreendedores ricos, desempenham um papel significativo em nossa economia. Ao reconhecer sua influência e integrar seus recursos, podemos aproveitar seu potencial para o desenvolvimento nacional, mantendo o controle sobre suas atividades."
 NKO_government_directed_drug_manufacture: "Fabricação de medicamentos dirigida pelo governo"
 NKO_government_directed_drug_manufacture_desc: "Direcionar a fabricação de medicamentos sob supervisão governamental criará novos fluxos de receita. Essa produção controlada será usada para gerar fundos para projetos nacionais e melhorar nossa estabilidade financeira."
 NKO_smuggling_operations: "Hackeando Bancos Estrangeiros"
 NKO_smuggling_operations_desc: "Devemos usar nossa influência em países inimigos, bem como as capacidades tecnológicas de nossos hackers, para invadir os sistemas bancários de nossos inimigos."
 NKO_counterfeit_production: "Produção Falsificada"
 NKO_counterfeit_production_desc: "Engajar-se na produção de produtos falsificados, incluindo moeda e itens de luxo, fornecerá moeda estrangeira e apoiará nossa economia. Essas operações serão conduzidas com o máximo de sigilo para evitar repercussões internacionais."
 NKO_huichon: "Huichon"
 NKO_huichon_desc: "O desenvolvimento da cidade industrial de Huichon aumentará nossa capacidade de fabricação. Vamos nos concentrar em construir infraestrutura essencial e atrair trabalhadores qualificados para transformar Huichon em um centro de atividade econômica."
 NKO_huichon_hydroelectric_power: "Energia hidrelétrica de Huichon"
 NKO_huichon_hydroelectric_power_desc: "A construção de usinas hidrelétricas em Huichon aumentará nossa segurança energética. Esses projetos fornecerão energia limpa e renovável e apoiarão nosso crescimento industrial."
 NKO_manpo_line_railway: "Linha ferroviária de Manpo"
 NKO_manpo_line_railway_desc: "A construção da Manpo Line Railway melhorará a infraestrutura de transporte e facilitará a movimentação de bens e pessoas. Esta ferrovia será um elo vital em nossa rede logística nacional."
 NKO_coal_energy_supermacy: "Supremacia da energia do carvão"
 NKO_coal_energy_supermacy_desc: "Focar na energia do carvão garantirá um fornecimento de energia confiável e abundante para nossas indústrias e lares. Investiremos na modernização de minas de carvão e usinas de energia para maximizar a eficiência e a produção."
 NKO_ordnance_manufacture: "Fabricação de Artilharia"
 NKO_ordnance_manufacture_desc: "Melhorar nossas capacidades de fabricação de munições é crucial para a defesa nacional. Expandiremos as instalações de produção e melhoraremos as tecnologias para garantir que nossos militares estejam bem equipados."
 NKO_huichon_hard_glassware_factory: "Fábrica de artigos de vidro duro de Huichon"
 NKO_huichon_hard_glassware_factory_desc: "Estabelecer uma fábrica de vidro duro em Huichon dará suporte à nossa produção industrial e fornecerá materiais de alta qualidade para diversas aplicações."
 NKO_huichon_silk_mill: "Fábrica de seda Huichon"
 NKO_huichon_silk_mill_desc: "Construir uma fábrica de seda em Huichon apoiará nossa indústria têxtil e criará empregos. Este investimento aumentará nossa capacidade de produzir tecidos e vestimentas finas."
 NKO_huichon_machine_tool_factory: "Fábrica de Máquinas-ferramentas Huichon"
 NKO_huichon_machine_tool_factory_desc: "Criar uma fábrica de máquinas-ferramentas em Huichon aumentará nossas capacidades de fabricação. Esta instalação produzirá máquinas e equipamentos essenciais para nossas indústrias."
 NKO_bureau_38: "Gabinete 38"
 NKO_bureau_38_desc: "O Bureau 38 é responsável por gerenciar recursos e fundos estaduais. O fortalecimento deste bureau garantirá alocação eficiente de recursos e apoiará projetos de desenvolvimento nacional."
 NKO_sanction_evasions: "Evasões de Sanções"
 NKO_sanction_evasions_desc: "Implementar estratégias sofisticadas para driblar sanções internacionais reforçará nossa economia. Alavancaremos operações clandestinas para garantir bens vitais e recursos financeiros."
 NKO_international_black_market: "Gabinete 121"
 NKO_international_black_market_desc: "Bureau 121 is a North Korean cyberwarfare agency, and the main unit of the Reconnaissance General Bureau of North Korea's military. It conducts offensive cyber operations, including espionage and cyber-enabled finance crime. According to American authorities, the RGB manages clandestine operations and has six bureaus."
 NKO_technological_boost: "Impulso Tecnológico"
 NKO_technological_boost_desc: "Focar em avanços tecnológicos impulsionará a inovação e o crescimento econômico. Investiremos em pesquisa e desenvolvimento para acompanhar as tendências tecnológicas globais."
 NKO_purchase_stolen_tech_blueprint: "Compre o Projeto de Tecnologia Roubado"
 NKO_purchase_stolen_tech_blueprint_desc: "Adquirir projetos de tecnologia roubados nos dará uma vantagem no desenvolvimento de tecnologias avançadas. Isso acelerará nossos esforços de pesquisa e inovação."
 NKO_bribe_researchers_at_institues: "Subornar pesquisadores em institutos"
 NKO_bribe_researchers_at_institues_desc: "Subornar pesquisadores em institutos-chave acelerará nosso progresso tecnológico. Essa estratégia secreta nos permitirá obter insights e avanços valiosos."
 NKO_black_market_innovation: "Inovação no Mercado Negro"
 NKO_black_market_innovation_desc: "Alavancar a engenhosidade do mercado negro aumentará nossas capacidades tecnológicas. Apoiaremos inovadores underground para desenvolver tecnologias novas e não convencionais."
 NKO_national_recovery_plan: "Plano Nacional de Recuperação"
 NKO_national_recovery_plan_desc: "Implementar um plano de recuperação nacional abrangente estabilizará e fortalecerá nossa economia. Este plano se concentrará na reconstrução de infraestrutura crítica, revitalização de indústrias e garantia de bem-estar social."
 NKO_emphasis_self_reliance: "Ênfase na autossuficiência"
 NKO_emphasis_self_reliance_desc: "Focar na autossuficiência reduzirá nossa dependência de ajuda externa e importações. Promoveremos a produção doméstica e a utilização de recursos."
 NKO_financial_sector_reform: "Reforma do Setor Financeiro"
 NKO_financial_sector_reform_desc: "Reformar o setor financeiro melhorará a estabilidade econômica. Vamos nos concentrar em aprimorar instituições financeiras, melhorar estruturas regulatórias e encorajar práticas financeiras responsáveis."
 NKO_modernization_efforts: "Esforços de modernização"
 NKO_modernization_efforts_desc: "Modernizar nossas indústrias aumentará a produtividade e a eficiência. Investiremos em novas tecnologias, atualizaremos as instalações existentes e treinaremos nossa força de trabalho para se adaptar aos métodos modernos de produção."
 NKO_renewable_energy_initiatives: "Iniciativas de energia renovável"
 NKO_renewable_energy_initiatives_desc: "Investir em energia renovável garantirá o desenvolvimento sustentável e reduzirá nossa dependência de combustíveis fósseis. Vamos nos concentrar em projetos solares, eólicos e hidrelétricos para criar um futuro mais verde."
 NKO_labor_force_training: "Treinamento da força de trabalho"
 NKO_labor_force_training_desc: "Treinar nossa força de trabalho melhorará as habilidades e a produtividade da força de trabalho. Implementaremos programas de treinamento abrangentes para equipar nossos trabalhadores com as habilidades necessárias para as indústrias modernas."
 NKO_50k_housing_project: "Projeto Habitacional 50k"
 NKO_50k_housing_project_desc: "Construir 50.000 casas resolverá a escassez de moradias e melhorará os padrões de vida. Este projeto ambicioso fornecerá casas de qualidade para nossos cidadãos e estimulará a indústria da construção."
 NKO_mansudae_peoples_theatre: "Teatro Popular Mansudae"
 NKO_mansudae_peoples_theatre_desc: "A construção do Mansudae People's Theatre enriquecerá nossa vida cultural. Este grande local sediará performances e eventos que celebram nossa herança e promovem as artes."
 NKO_rare_metal_exploitation: "Exploração de metais raros"
 NKO_rare_metal_exploitation_desc: "Explorar metais raros fornecerá recursos valiosos para nossas indústrias. Desenvolveremos operações de mineração para extrair esses materiais críticos e impulsionar nossas capacidades tecnológicas."
 NKO_focus_on_quality: "Focus on Quality"
 NKO_focus_on_quality_desc: "Focusing on quality will improve the standards of our products. We will implement quality control measures and encourage innovation to ensure our goods meet international standards."
 NKO_light_industry_development: "Light Industry Development"
 NKO_light_industry_development_desc: "Developing light industries will diversify our economy. We will support small and medium-sized enterprises that produce consumer goods, textiles, and other light industrial products."
 NKO_modern_mining_operations: "Modern Mining Operations"
 NKO_modern_mining_operations_desc: "Implementing modern mining operations will increase efficiency and output. We will invest in advanced mining equipment and techniques to boost productivity and ensure sustainable resource extraction."
 NKO_resource_extraction: "Resource Extraction"
 NKO_resource_extraction_desc: "Focusing on resource extraction will ensure a steady supply of essential materials. We will develop our mining and extraction capabilities to support our industries and secure our economic future."
 NKO_industrial_modernization: "Industrial Modernization"
 NKO_industrial_modernization_desc: "Modernizar nossas indústrias aumentará a produtividade e a eficiência. Investiremos em novas tecnologias, atualizaremos as instalações existentes e treinaremos nossa força de trabalho para se adaptar aos métodos modernos de produção."
 NKO_victory_of_juche_revolution: "Victory of Juche Revolution"
 NKO_victory_of_juche_revolution_desc: "Achieving the victory of the Juche revolution will solidify our independence and self-reliance. We will promote the principles of Juche, ensuring our nation's continued strength and autonomy."
 NKO_national_recovery_plan1: "Plano Nacional de Recuperação"
 NKO_international_black_market_gain_tt: "§YIncrease our espionage Operations by creating BUREAU-121.§!\n"
 NKO_economic_expansion: "Economic Expansion"
 NKO_economic_expansion_desc: "Expanding the economy will create more opportunities and growth. We will implement policies that encourage investment, support entrepreneurship, and stimulate economic activity."
 NKO_create_komid: "Create KOMID"
 NKO_create_komid_desc: "Establishing KOMID will enhance our trade capabilities. This organization will manage our international trade operations, ensuring efficient and profitable exchanges with other nations."
 NKO_illict_trade_routes: "Illicit Trade Routes"
 NKO_illict_trade_routes_desc: "Creating illicit trade routes will bypass international sanctions. We will develop clandestine networks to secure essential goods and resources, ensuring our economy remains resilient."
 NKO_expand_black_market: "Expand Black Market"
 NKO_expand_black_market_desc: "Expanding the black market will provide additional revenue sources. We will support underground economic activities to generate funds and secure necessary goods."
 NKO_acquire_military_equipment: "Acquire Military Equipment"
 NKO_acquire_military_equipment_desc: "Acquiring military equipment will strengthen our defense capabilities. We will secure advanced weaponry and technology to ensure our military is well-equipped to protect our nation."
 NKO_black_market_boom: "Black Market Boom"
 NKO_black_market_boom_desc: "A booming black market will provide economic benefits. We will capitalize on underground trade to generate revenue and support our economy."
 NKO_advanced_weapons_trade: "Advanced Weapons Trade"
 NKO_advanced_weapons_trade_desc: "Engaging in advanced weapons trade will boost our military strength. We will develop and sell sophisticated weaponry to generate funds and enhance our defense capabilities."
 NKO_red_star_os: "Red Star OS"
 NKO_red_star_os_desc: "Developing Red Star OS will advance our technological capabilities. This operating system will enhance our cybersecurity and support our technological independence."
 NKO_the_kwangmyong: "The Kwangmyong"
 NKO_the_kwangmyong_desc: "Developing the Kwangmyong network will enhance our communication infrastructure. This internal network will provide secure and reliable access to information and support our digital initiatives."
 NKO_technological_independence: "Technological Independence"
 NKO_technological_independence_desc: "Achieving technological independence will ensure our self-sufficiency. We will focus on developing our own technologies and reducing reliance on foreign imports."
 NKO_trade_agreements_with_vietnam: "Trade Agreements with [VIE.GetName]"
 NKO_trade_agreements_with_vietnam_desc: "Forming trade agreements with [VIE.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_invite_the_russians: "Trade Agreements with [SOV.GetName]"
 NKO_invite_the_russians_desc: "Forming trade agreements with [SOV.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_china: "Trade Agreements with [CHI.GetName]"
 NKO_trade_agreements_with_china_desc: "Forming trade agreements with [CHI.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_egypt: "Trade Agreements with [EGY.GetName]"
 NKO_trade_agreements_with_egypt_desc: "Forming trade agreements with [EGY.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_sirya: "Trade Agreements with [SYR.GetName]"
 NKO_trade_agreements_with_sirya_desc: "Forming trade agreements with [SYR.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_iraq: "Trade Agreements with [IRQ.GetName]"
 NKO_trade_agreements_with_iraq_desc: "Forming trade agreements with [IRQ.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_iran: "Trade Agreements with [PER.GetName]"
 NKO_trade_agreements_with_iran_desc: "Forming trade agreements with [PER.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_venesuela: "Trade Agreements with [VEN.GetName]"
 NKO_trade_agreements_with_venesuela_desc: "Forming trade agreements with [VEN.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_brazilia: "Trade Agreements with [BRA.GetName]"
 NKO_trade_agreements_with_brazilia_desc: "Forming trade agreements with [BRA.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_trade_agreements_with_indonesia: "Trade Agreements with [IND.GetName]"
 NKO_trade_agreements_with_indonesia_desc: "Forming trade agreements with [IND.GetName] will enhance economic cooperation. We will negotiate favorable terms to ensure mutually beneficial exchanges and strengthen our bilateral relations."
 NKO_use_russian_model: "Use Russian Naval Models"
 NKO_use_russian_model_desc: "In our pursuit of a powerful navy, we shall adopt and adapt the naval strategies and designs of our Russian allies, propelling our fleet to greater capabilities."
 NKO_armed_to_the_teeth: "Armed to the Teeth"
 NKO_armed_to_the_teeth_desc: "Every vessel shall be equipped with the most formidable weaponry. We will make our navy an indomitable force that strikes fear in our enemies."
 NKO_heavy_cruiser_focus: "Focus on Heavy Cruisers"
 NKO_heavy_cruiser_focus_desc: "To project our power across the seas, we will focus on constructing heavily armored cruisers that dominate the waters and stand resilient against any foe."
 NKO_the_north_korean_carrier: "North Korean Carrier"
 NKO_the_north_korean_carrier_desc: "A carrier fleet is a symbol of our technological might. We shall develop our own carriers to carry the banner of Juche ideology over distant waters."
 NKO_the_korean_typhoon_class: "North Korean Typhoon Class"
 NKO_the_korean_typhoon_class_desc: "Inspired by powerful submarines worldwide, our own Typhoon class will bolster our undersea capabilities, a silent threat to any who dare challenge us."
 NKO_ship_launched_cruise_missiles: "Ship-Launched Cruise Missiles"
 NKO_ship_launched_cruise_missiles_desc: "Our navy will be equipped with the latest ship-launched cruise missiles, enhancing our reach and power to strike targets far beyond our shores."
 NKO_korean_mariens: "North Korean Marines"
 NKO_korean_mariens_desc: "Forming elite marine units will enable us to conduct amphibious operations and secure control over strategic locations swiftly and decisively."
 NKO_get_russian_help: "Seek Russian Military Assistance"
 NKO_get_russian_help_desc: "To bolster our military technology, we will seek the assistance of Russia, a trusted ally, to equip us with the necessary expertise and equipment."
 NKO_get_chinese_help: "Seek Chinese Military Assistance"
 NKO_get_chinese_help_desc: "To bolster our military technology, we will seek the assistance of China, a trusted ally, to equip us with the necessary expertise and equipment."
 NKO_our_jet: "Domestic Fighter Aircraft"
 NKO_our_jet_desc: "We will continue our research in the field of aviation, in order to accelerate our receipt of the latest fighter aircraft, but already of domestic production."
 NKO_korean_ground_forces: "Strengthen North Korean Ground Forces"
 NKO_korean_ground_forces_desc: "Our ground forces are the backbone of our defense. We will invest in their training and equipment, ensuring their readiness for any battle."
 NKO_doctrine_modernization: "Modernize Our Doctrine"
 NKO_doctrine_modernization_desc: "We shall adopt a modern approach to warfare, ensuring our doctrines reflect the realities of current military tactics and strategies."
 NKO_implement_new_doctrine: "Implement New Doctrine"
 NKO_implement_new_doctrine_desc: "By implementing new strategies, we empower our forces with innovative tactics and increased effectiveness on the battlefield."
 NKO_superior_firepower: "Superior Firepower Doctrine"
 NKO_superior_firepower_desc: "Focusing on firepower, we will equip our forces to deliver overwhelming force and achieve decisive victories."
 NKO_keep_our_doctrine: "Retain Our Traditional Doctrine"
 NKO_keep_our_doctrine_desc: "Our traditional doctrine has served us well. We will refine and maintain it, drawing strength from our past and adapting it to future conflicts."
 NKO_train_the_south: "Train for Southern Warfare"
 NKO_train_the_south_desc: "With potential conflicts in the South, we must prepare our forces specifically for this environment, ready to engage with resilience and resolve."
 NKO_mass_assault_prevails: "Mass Assault Prevails"
 NKO_mass_assault_prevails_desc: "Our doctrine of overwhelming force through sheer numbers remains effective. We will maintain our mass assault strategy, wearing down any opposition."
 NKO_special_mass_assault: "Specialized Mass Assault Units"
 NKO_special_mass_assault_desc: "To perfect our mass assault strategy, we will develop specialized units trained specifically to exploit the strengths of this tactic."
 NKO_korean_iron_fist: "The North Korean Iron Fist"
 NKO_korean_iron_fist_desc: "Our might shall be an iron fist that crushes any opposition. Through rigorous training and discipline, we prepare our forces to embody this unbreakable will."
 NKO_defend_our_skies: "Defend Our Skies"
 NKO_defend_our_skies_desc: "Our air defenses must be formidable. We will prioritize the defense of our airspace, ensuring that no enemy aircraft can approach undetected."
 NKO_defend_the_coast: "Defend Our Coast"
 NKO_defend_the_coast_desc: "Our coastal defenses must be vigilant. We will fortify our coastline, deterring any invasion attempt and protecting our sovereignty."
 NKO_harts: "High-Altitude Reconnaissance Tactics"
 NKO_harts_desc: "We shall adopt advanced reconnaissance tactics to monitor enemy movements and gain valuable intelligence from high altitudes."
 NKO_upgrade_our_radar: "Upgrade Our Radar Systems"
 NKO_upgrade_our_radar_desc: "To detect threats from afar, we will enhance our radar technology, giving us an early warning system against any approaching dangers."
 NKO_counter_enemy_missiles: "Counter Enemy Missiles"
 NKO_counter_enemy_missiles_desc: "To protect our homeland, we must develop countermeasures against enemy missiles, ensuring we remain secure from aerial threats."
 NKO_army_supply_hubs: "Establish Army Supply Hubs"
 NKO_army_supply_hubs_desc: "To maintain our forces, we will construct supply hubs that ensure our army is always ready and well-supplied for sustained operations."
 NKO_mass_drones: "Mass Drone Production"
 NKO_mass_drones_desc: "We will start focusing on mass production of drones to provide our army with the best drones!"
 NKO_more_zavods: "Investments in Our MIC"
 NKO_more_zavods_desc: ""
 NKO_young_red_guard_idea: "Red Youth Guards"
 NKO_young_red_guard_idea1: "Youth Guards"
 NKO_army_sso: "Army Special Operations Forces"
 NKO_war_university: "Kim Il Sung Military University"
 NKO_vpk: "Domestic Military-industrial Complex"
 NKO_sad_army_idea: "Outdated People's Army"
 NKO_sad_army_idea_desc: "This national spirit will be §YUpgraded§! if we complete the §HRevolutionary Military Spirit§! focuses. \n§W--------------§!\nNorth Korea's army, while boasting significant manpower, relies heavily on outdated equipment and technology. Much of its arsenal consists of Soviet-era tanks, artillery, and aircraft, with limited modernization. This reliance on older systems reflects resource constraints and international sanctions, making the army formidable in numbers but challenged in efficiency and capability compared to modern militaries."
 NKO_new_army_idea: "New North Korean People's Army"
 NKO_new_army_idea_desc: "North Korea's modernized army combines advanced homegrown technologies with strategic upgrades to key military assets. Enhanced missile systems, drones, and cyber warfare capabilities showcase a shift towards modernization. While still constrained by sanctions, the focus on innovation and asymmetric warfare tactics makes the army a formidable force in the region."
 NKO_marines_idea: "Marine Corps"
 NKO_unite_sport_team: "Unified Olympic Team"
