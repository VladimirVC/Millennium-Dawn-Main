 GRN_national_decisions: "Greenland National Decisions"
 GRN_national_decisions_desc: "The island of Greenland has a very relaxed but also tense situation. Aside from the attempts of political leaders to do, well, anything to develop the island and its population it also must contend with the ever pressing issue of eventual independence. Some want it now, some want to wait for better stable footing. Regardless it'll be up to both Greenland and Denmark if the isle will truly be free in the end of it all."
 GRN_decision_independence_war: "Independence War"
 GRN_decision_independence_war_desc: "The time is upon us and the politicians have forced the hands of the people. War is declared and now its a race to see if Denmark can keep ahold of its crown or will the crown holding fall away as public pressure forces a peace between all parties."
 GRN_decision_capital_city_expansion: "Capital City Expansion"
 GRN_decision_capital_city_expansion_desc: "With our national population growing to extents we never truly anticipated we'll need to overhaul the capital of Nuuk to better reflect and integrate the overall regional and national growth."
 GRN_decision_development_visa_grants: "Development Visa Grants"
 GRN_decision_development_visa_grants_desc: "Our chief problem to our nation's development is purely a lack of human resources. In order to get anywhere we need to heavily invest in acquiring foreign workers who are willing to stomach more the environment then the potential lavish monetary incentives and employment we may be able to give."
 GRN_decision_global_recruitment_efforts: "Global Recruitment Efforts"
 GRN_decision_global_recruitment_efforts_desc: "With national defense now under our own direct control we suffer the same problem we do with just being a nation as a whole. That is a lack of manpower. We'll need to essentially do something similar to that of the Development Grants but for the military. Hopefully as our economy becomes more robust and our budget becomes more flexible to allow for these kinds of expenses we can greatly incentivize mercenaries or wandering souls without a permanent home to choose ours to be their final home."
 GRN_decision_naval_priority_act: "Naval Priority Act"
 GRN_decision_naval_priority_act_desc: "In order to have any presence in the region most immediate to us we need to have a navy. The problem is we don't have the economic capacity to just build them steady as she goes sort to speak. As such we need to essentially shanghai as many naval ship building like facilities and complexes in as close of proximity to one another to quick build a basic fleet. It's gonna be extremely costly, but so will sitting and simply waiting for something to happen that actually goes in our favor."
 GRN_decision_project_vortex: "Project Vortex"
 GRN_decision_project_vortex_desc: "Securing naval passage in the far north is troubling due to the idea of us acquiring naval supremacy within strategic regions. So to remedy this we'll create the best naval show of force we can do with our current means."
 GRN_decision_national_commission: "National Commission"
 GRN_decision_national_commission_desc: "With the drafting process complete and prototypes declared satisfactory we will now organize a national commission to help build our first Battleship."
 GRN_decision_project_northern_projection: "Project Northern Projection"
 GRN_decision_project_northern_projection_desc: "With things stable and ready for the true ambitions of our nation we'll need to control multiple sea zones. As such we can ensure this by working with ship builders around the nation to create what will be the 2nd Arctic Battle Group."
 GRN_southern_interior_development_decisions: "Southern Interior Development Projects"
 GRN_southern_interior_development_decisions_desc: "With our nation stabilized both economically and socially through our population initiatives we now are able to look towards the interior of the nation. The Southern Plateau will be the first major step forward to taming the Great Ice Shelf."
 GRN_decision_fort_vortex: "Fort Vortex"
 GRN_decision_fort_vortex_desc: "We'll begin our trek into the southern interior by establishing a fort town named Fort Vortex."
 GRN_decision_glacial_shine: "Glacial Shine"
 GRN_decision_glacial_shine_desc: "Our next most central settlement will be named Glacial Shine."
 GRN_decision_frostbury: "Frostbury"
 GRN_decision_frostbury_desc: "We'll establish the settlement of Frostbury just east of our nation's capital."
 GRN_decision_fort_seal: "Fort Seal"
 GRN_decision_fort_seal_desc: "We'll establish a strategic central eastern fort settlement along the border of the southern interior and the central plateau."
 GRN_decision_southern_interior_basic_roads: "Southern Interior Basic Roadworks"
 GRN_decision_southern_interior_basic_roads_desc: "With our settlements fully established we can now assuredly create a basic form of ground transport to connect and supply the needs of these new bastions of civilization."
 GRN_decision_southern_interior_improved_roads: "Southern Interior Improved Roads"
 GRN_decision_southern_interior_improved_roads_desc: "Continual investments into the road network will allow for better volume of traffic flow as well as establishing proper and more continual safety measures to travel such long and hazardous conditions."
 GRN_decision_great_polar_railway: "Great Polar Railway"
 GRN_decision_great_polar_railway_desc: "Securing the development of a streamlined and efficient railway network allows us to deliver people and materials in bulk. This allows us to finally and fully begin working towards building an economy for the region from scratch."
 GRN_decision_basic_industrial_jobs: "Basic Industrial Jobs"
 GRN_decision_basic_industrial_jobs_desc: "Securing a basic form of economic activity allows us to fund the interior development more directly and can allow us to expand into other economic sectors where possible."
 GRN_decision_local_food_supply: "Local Food Supply"
 GRN_decision_local_food_supply_desc: "Strategic development of HFF's allows us to create local food supplies for the settlements and thus not only do we get to use more of the frozen water we can also help to domestically grow these infantile population centers as well. The Harsh Farming Facilities will be the spear to pierce through the frozen beast that is the shelf."
 GRN_decision_extensive_geological_surveying: "Extensive Geological Surveying"
 GRN_decision_extensive_geological_surveying_desc: "With the vastness that is the interior we'll need to heavily invest in these strategic operations as well as setup some dedicated Harsh Farming Facilities which are designed to handle rubber producing plant life. These results should prove extremely fruitful for the time and capital we're investing into it all."
 GRN_decision_creating_dedicated_mining_operations: "Creating Dedicated Mining Operations"
 GRN_decision_creating_dedicated_mining_operations_desc: "With sparse and little known deposits of various mineral resources detected, we've also begun to expand foundational work for more HFF's for rubber production as well. Continuing these initiatives will surely only help our cause."
 GRN_decision_regional_economic_sector_synergy: "Regional Economic Sector Synergy"
 GRN_decision_regional_economic_sector_synergy_desc: "Through a vast and extensive investment of manpower, resources and monetary funding we will be able to expand the mining operations to a point where we can create local economic diversity. Soon enough we'll be able to create a regional synergy just like with the rest of the nation's economy."
 GRN_central_plateau_development_decisions: "Central Plateau Development Projects"
 GRN_central_plateau_development_decisions_desc: "With the Southern Interior synergized economically and socially we can now begin to build the foundations to do the same here in the Central Plateau. All of this will be costly but in the long term it will certainly be worth it."
 GRN_decision_fort_frostfields: "Fort Frostfields"
 GRN_decision_fort_frostfields_desc: "We'll create a fort settlement called Fort Frostfields in the west semi-near the town of Sisimuit."
 GRN_decision_frigidville: "Frigidville"
 GRN_decision_frigidville_desc: "Heading east we'll create the settlement of Frigidville. Anybody else running out of on theme names?"
 GRN_decision_aurora: "Aurora"
 GRN_decision_aurora_desc: "In the central most section of the plateau I believe we'll create the fitting settlement of Aurora."
 GRN_decision_snowdenson: "Snowdenson"
 GRN_decision_snowdenson_desc: "Swinging south we'll create the settlement of Snowdenson to bridge the gap between Glacial Shine and Aurora for inter-regional economic activities."
 GRN_decision_blizzards_peak: "Blizzard's Peak"
 GRN_decision_blizzards_peak_desc: "Heading back north and continuing eastward we'll create the settlement of Blizzard's Peak due to some of the highest points being in the general area."
 GRN_decision_crystal_flake: "Crystal Flake"
 GRN_decision_crystal_flake_desc: "Heading futher east and second nearest to the eastern coastal region we'll create the settlement of Crystal Flake."
 GRN_decision_snowberry: "Snowberry"
 GRN_decision_snowberry_desc: "Straddling the northeastern border area between the plateau and the eastern coastal regions we'll create the quaint sounding town of Snowberry."
 GRN_decision_plateau_interior_basic_roads: "Central Plateau Basic Road Network"
 GRN_decision_plateau_interior_basic_roads_desc: "With settlements created we now can begin to construct the basic foundations of a road network throughout the plateau. This foundational work will help to make travel smoother and more direct then simply driving over the hazardous terrain itself."
 GRN_decision_plateau_interior_improved_roads: "Central Plateau Improved Roadworks"
 GRN_decision_plateau_interior_improved_roads_desc: "With the foundational works done we can now go over and invest in standardizing safety measures as well as other needed facilities to traverse the extensive landscape."
 GRN_decision_central_arctic_railroad: "Central Arctic Railroad"
 GRN_decision_central_arctic_railroad_desc: "Branching from the GPR in the Southern Interior as well as the coastal rail network we can now solidify the main bulk transportation throughout our nation. As such the plateau will be home to the Central Arctic Railroad or CARR."
 GRN_decision_basic_industrial_jobs_two: "Basic Industrial Job Market"
 GRN_decision_basic_industrial_jobs_two_desc: "With the people and the infrastructure set up we can now begin work on creating some form of economic activity within the Central Plateau."
 GRN_decision_local_food_supply_two: "Establishing Local Food Supply"
 GRN_decision_local_food_supply_two_desc: "Utilizing the HFF models we've used throughout the nation we can create dedicated facilities to help lessen the strain on creating local food supply chains."
 GRN_decision_extensive_geological_surveying_two: "Central Plateau: Mass Geological Surveys"
 GRN_decision_extensive_geological_surveying_two_desc: "People, places, infrastructure, jobs and food. All secured and all ready to dig deep into the ice and lands beneath time itself."
 GRN_decision_creating_dedicated_mining_operations_two: "Central Plateau: Dedicated Mining Operations"
 GRN_decision_creating_dedicated_mining_operations_two_desc: "With the survey data within our hands as well as inital scouting mines established we can now begin to expand and create more dedicated mines and the operational apparatus around them."
 GRN_decision_regional_economic_sector_synergy_two: "Central Plateau: Inter-Economic Sector Synergy"
 GRN_decision_regional_economic_sector_synergy_two_desc: "The longest and most costly leg of the journey is ahead of us. But as we gaze upon the shining icescapes of the vast central plateau we can take it all in and have the pure blissful satisfaction that we finally made it. For Greenland is truly the beast land."
 GRN_faction_polar_defense_league: "Polar Defense League"
 greenland_event.1.t: "Self Government Referendum"
 greenland_event.1.d: "Soon the parliament will vote on expanding the provisions that the 79 Home Rule Act established. If voted yes, things like the education, healthcare, judicial systems as well as full control of the coast guard will be under full control of the Greenlandic government."
 greenland_event.1.o1: "Parliament Approves The Self Government Act"
 greenland_event.1.o2: "Parliament Keeps The Status Quo"
 greenland_event.2.t: "Greenland Self Government Act"
 greenland_event.2.d: "Greenland has voted to expand their rights under the Home Rule Act of 1979 and replace it with the Self Government Act of 2008. The act gives them control of multiple governmental bodies as well as the coast guard. We can approve the vote since there was a majority, or we can block it citing that the nation's finances could not sustain operating all of these systems independently without increasing the colonial subsidies we provide."
 greenland_event.2.o1: "Approve The Vote"
 greenland_event.2.o2: "Deny The Vote"
 greenland_event.300.t: "Denmark Approves The Vote"
 greenland_event.300.d: "Earlier today we received word that the Danish parliament has expectedly approved our vote for the new Self Government Act. This will be a great step forward towards our independence and thus a future we can solely define ourselves."
 greenland_event.300.o1: "Wait, They Could Deny That?"
 greenland_event.3.t: "Denmark Blocks Vote"
 greenland_event.3.d: "The Danish parliament has seen fit to deny our vote in expanding the Home Rule Act with the new Self Government Act. They cite supposed fiscal concerns, claiming our assumption of control would require higher Danish subsidies. We could declare independence — which would cause a local conflict — or we could accept the situation and prepare for potentially worse outcomes ahead."
 greenland_event.3.o1: "Fight. With What Army?"
 greenland_event.3.o2: "For Free Rule Of Greenland!!!"
 greenland_event.4.t: "War Declared!"
 greenland_event.4.d: "With the blocking of the Greenlandic Self Government Act vote, the government of Greenland has taken upon themselves to force their independence. As such we must secure all crown holdings and bring all over sea territories under control once more."
 greenland_event.4.o1: "From The Faroes To Greenland"
 greenland_event.5.t: "Retooling Automation Investments"
 greenland_event.5.d: "Our economy is always struggling and it is simply because we don't have enough people. Our per capita is almost unstable that book keepers sometimes don't even want to do our books because of the wilding changing influences of domestic expenses simply due to how our economy is constantly changing. As such we need a critical stabilization factor which in this instance will be a direct and comprehensive automation investments into a specific economic sector. The overall reduction in need for workers for said sector will hopefully greatly reduce the overall volatile nature of the economy."
 greenland_event.5.o1: "The Agriculture Sector"
 greenland_event.5.o2: "The War Manufacturing Sector"
 greenland_event.5.o3: "The Civilian Manufacturing Sector"
 greenland_event.5.o4: "The Office & Technology Sector"
 greenland_event.6.t: "The Mining Question"
 greenland_event.6.d: "With efforts to expand and start up commercialized mining operations the main question is posed. Do we mining based on need or based on greed. Based on need would see nominal resource extraction efforts tailored to the domestic needs of the nation. While based on greed would expand operations significantly for both domestic and foreign demands at the costs of increased workforce demands to meet proper operational expectations."
 greenland_event.6.o1: "The Needs Of Our Nation"
 greenland_event.6.o2: "The Means Justify The Ends"
 greenland_event.7.t: "Political Ambitions"
 greenland_event.7.d: "With the stage set our people are both excited and concerned. Never before has such free will of thought been believed possible when once a Danish crown colony. But now with our new found freedoms we can secure a peace of mind and create a political future that we desire."
 greenland_event.7.o1: "Absolute Free Thought"
 greenland_event.7.o2: "Emerging Ideas Hold True"
 greenland_event.7.o3: "Neutral Minds Prevail"
 greenland_event.7.o4: "National Pride Drives Progress"
 greenland_influence_event.1.t: "Greenlandic Investments"
 greenland_influence_event.1.d: "Greenland has come to us with an offer to help invest into building up our nation. While there are some concerns about the nature of these investments, the island of Greenland even with its developments poses no real threat to our domestic situation when posed against the rest of the interested parties that is."
 greenland_influence_event.1.o1: "Free Stuff Is Nice"
 greenland_influence_event.1.o2: "Thanks, But No Thanks"
 greenland_influence_event.2.t: "Iceland Accepts Infrastructure"
 greenland_influence_event.2.d: "Our first investment has been accepted, this will increase our influence and ties to the nation."
 greenland_influence_event.2.o1: "Next Investment Please"
 greenland_influence_event.3.t: "Greenlandic Energy"
 greenland_influence_event.3.d: "Greenland has came to us with another investment this time in the energy sector. They wish to establish some helpful power generation facilities not particularly favoring a specific generation type. We could use the free energy generation facilities to foster better trade relations, but some worry that Greenland might be using these facilities to undermine our government."
 greenland_influence_event.3.o1: "Cheaper Energy Is Nice"
 greenland_influence_event.3.o2: "Our Energy Needs Not Your Concern"
 greenland_influence_event.4.t: "Iceland Accepts Energy Facilities"
 greenland_influence_event.4.d: "Our second round of investments into helping build up their power generation abilities has been accepted, we can only hope that if they need fuel for the fossil plants they trade with us to continue fostering better relations."
 greenland_influence_event.4.o1: "Send The Next Investment"
 greenland_influence_event.5.t: "Polar Industries Investment"
 greenland_influence_event.5.d: "Greenland is back at it again this time with broad investments into our economic development. From industrial to office sector investments we're seeing that Greenland is really starting to pour maybe a little too much into our nation. Though its not like they have much to spend on, we maybe should put the breaks on things here."
 greenland_influence_event.5.o1: "A Better Economy, Why Not"
 greenland_influence_event.5.o2: "Naaah. I Think I Know Your Game"
 greenland_influence_event.6.t: "Iceland Accepts Economic Investments"
 greenland_influence_event.6.d: "Our growing investment portfolio has been a great success as we've found strategic means to make the government of Iceland accept our generous offers. Now we just need to capitalize on these successes."
 greenland_influence_event.6.o1: "One More Hurrah Should Do It"
 greenland_influence_event.7.t: "Strategic Resource Investments"
 greenland_influence_event.7.d: "Greenland has helped to conduct extensive geological surveys and has found limited commercial deposits of iron, copper, nickel, and other resources that could benefit our domestic economy. They have also been willing to expand our aluminium industry to offset potential losses. We could really use those resources to reduce our reliance on certain foreign sources, but can we afford to go into such debt to our neighbour?"
 greenland_influence_event.7.o1: "We Seriously Need These Resources"
 greenland_influence_event.7.o2: "It's Too Risky, Denied"
 greenland_influence_event.8.t: "The Art Of The Deal"
 greenland_influence_event.8.d: "Iceland has accepted our strategic resource investment and thus we've been able to complete our total round of investments. With this in mind we've now set the stage for us to secure a potential union in the semi-near future."
 greenland_influence_event.8.o1: "Worth It"
 greenland_influence_event.10000.t: "Investment Rejected"
 greenland_influence_event.10000.d: "With Iceland rejecting our proposal we're now officially out of options diplomatically. We'll try and wait as long as we can but it's time for the end game."
 greenland_influence_event.10000.o1: "Prepare Operation Real Green"
 greenland_subterfuge_event.1.t: "Grand Greenland Investment"
 greenland_subterfuge_event.1.d: "Greenland has come to us with a most lucrative offer. They are willing to do a full wholesale round of investments to grow our nation. Such an opportunity seems almost outlandish in nature, but its not like the island has much going for it. Besides, what could Greenland possibly do to affect us in the grander scheme of things."
 greenland_subterfuge_event.1.o1: "Thank You For Your Generosity"
 greenland_subterfuge_event.1.o2: "This Is To Good To Be True, Denied"
 greenland_subterfuge_event.2.t: "Iceland Accept Our Generosity"
 greenland_subterfuge_event.2.d: "With the Icelandic government accepting our robust investments, we can now use those investments to disturb the peace and shift the status quo just enough to isolate the island from NATO interference."
 greenland_subterfuge_event.2.o1: "Now We Wait"
 greenland_subterfuge_event.3.t: "Discovering The Source"
 greenland_subterfuge_event.3.d: "Recent fits of unrest and social discourse seems to be tracing back to certain investments by Greenland. These new fronts have created a mild discomfort in our society however if we let it sit we could be looking at some real trouble down the road. It would be risky, but we can either choose to fight the continued shenanigans or we can settle the issue permanently by defeating the root cause."
 greenland_subterfuge_event.3.o1: "Do They Even Have A Military?"
 greenland_subterfuge_event.3.o2: "We Have NATO, We'll Be Fine"
 greenland_subterfuge_event.10000.t: "Investment Denied"
 greenland_subterfuge_event.10000.d: "Iceland has denied our best offer, if they won't accept then we have no choice but to prepare for the worst."
 greenland_subterfuge_event.10000.o1: "Prepare Operation Real Green"
 greenland_subterfuge_event.4.t: "Large Greenlandic Investment"
 greenland_subterfuge_event.4.d: "Greenland has come to us with an offer. A comprehensive investment and exclusive trade deal. Greenland is willing to build up our infrastructure, zoning capabilities, civilian industrial base and apparently provide an exclusive lease on required material support trading for said investments. The final hook in the whole whale of an investment package is a direct large scale investment towards building up and extracting known deposits of oil around our waters. This is an extremely good deal and to be frank there's very little we can see wrong with it. But with being indebt to a specific nation what would we do about Denmark."
 greenland_subterfuge_event.4.o1: "Let's Make A Deal!"
 greenland_subterfuge_event.4.o2: "No This Isn't Right"
 greenland_subterfuge_event.5.t: "Faroe Islands Accepts"
 greenland_subterfuge_event.5.d: "The Faroe Islander government has accepted our bountiful investments and thus we can now begin to work towards our future."
 greenland_subterfuge_event.5.o1: "Send In The Agitators"
 greenland_subterfuge_event.6.t: "Citizens Beg Government"
 greenland_subterfuge_event.6.d: "Recent events have begun to escalate as more and more island citizens beg the government to hold a referendum about forming a Western Nordic Union with Greenland. Many cite the seemingly benevolent gesture of investments for the well being of the islanders over the Danish bare minimum approach. With so much pressure we're forced to accept their demands and will petition the Greenlandic government."
 greenland_subterfuge_event.6.o1: "Faroe Eternal"
 greenland_subterfuge_event.7.t: "The Gambit Pays Off"
 greenland_subterfuge_event.7.d: "Public pressure from Faroe citizens has forced their government to petition to form a union with our nation. This bodes well for us as it will surely incite some kind of agitation within the Danish government."
 greenland_subterfuge_event.7.o1: "One Step Closer"
 greenland_subterfuge_event.8.t: "Excuse Me What?!"
 greenland_subterfuge_event.8.d: "Reports are coming in that somehow the Greenlandic Armed Forces have just settled in on the Faroe Islands and are working with citizens and government officials to peacefully transfer power. The question is, who gave them the right to do so. We were not consulted and it seems our general disinterest in the islands has only worked against us. If we don't act then we lose face, but if we do act fast we'll be on our own since we're instigating direct hostilities."
 greenland_subterfuge_event.8.o1: "We Can Take Them!"
 greenland_subterfuge_event.8.o2: "Fair Who?"
 greenland_subterfuge_event.40000.t: "Investment Denied"
 greenland_subterfuge_event.40000.d: "Faroe Islands has denied our best offer, if they won't accept then we have no choice but to prepare for the worst."
 greenland_subterfuge_event.40000.o1: "Begin Mobilization"
 greenland_subterfuge_event.9.t: "Greenlandic Investments"
 greenland_subterfuge_event.9.d: "Greenland has come to us with a series of investments at no cost to us. They want to focus on developing the less developed areas of the Jylland region and foster Nordic solidarity. However, some in the government believe they are pursuing a hidden agenda, as the investments seem almost too good to be true. Then again, what can Greenland realistically do to us?"
 greenland_subterfuge_event.9.o1: "Free Stuff Ain't Half Bad"
 greenland_subterfuge_event.9.o2: "I Don't Like Your Funny Words"
 greenland_subterfuge_event.10.t: "Denmark Accepts"
 greenland_subterfuge_event.10.d: "The Danish government has accepted the investments and now we'll begin to prepare for what we planned for."
 greenland_subterfuge_event.10.o1: "Ball's In Their Court Now"
 greenland_subterfuge_event.11.t: "Discovering The Source"
 greenland_subterfuge_event.11.d: "Recent fits of unrest and social discourse seems to be tracing back to certain investments by Greenland. These new fronts have created a mild discomfort in our society however if we let it sit we could be looking at some real trouble down the road. It would be risky, but we can either choose to fight the continued shenanigans or we can settle the issue permanently by defeating the root cause."
 greenland_subterfuge_event.11.o1: "Do They Even Have A Military?"
 greenland_subterfuge_event.11.o2: "We Have NATO, We'll Be Fine"
