 AfghanistanNews.1.t: "La guerre civile en Afghanistan s'apaise"
 AfghanistanNews.1.TAL.d: "Malgré tous les efforts des forces armées afghanes et de leurs alliés occidentaux, les talibans ont réussi à prendre le contrôle total de toutes les grandes villes, y compris la capitale Kaboul. La plupart des responsables gouvernementaux se sont cachés ou se sont exilés, y compris le président afghan [AFG.GetLeader] résidant actuellement aux États-Unis.\n\nLe triomphe des talibans va certainement augmenter la fréquence des attaques terroristes dans la région et dans le monde."
 AfghanistanNews.1.AFG.d: "Le gouvernement afghan a déclaré la victoire des talibans. La majorité des avant-postes et des villes les plus puissants ont été débarrassés de leur présence, et la plupart des combattants restants ont traversé la frontière vers le Pakistan. Même si les talibans sont réduits à seulement quelques poches et cellules, l'insurrection devrait durer encore de nombreuses années, quoique à des niveaux inférieurs.\n\nCette victoire a démontré l'efficacité de l'armée afghane reconstruite et la détermination du gouvernement afghan."
 AfghanistanNews.1.a: "Intéressant"
 AfghanistanNews.2.t: "L'Afghanistan revendique le Pachtounistan"
 AfghanistanNews.2.d: "En raison d'une recrudescence de la violence au Pakistan, le gouvernement afghan a renforcé ses revendications sur les régions du Pakistan où vivent les Pachtounes. La ligne Durrand (la frontière contemporaine entre l'Afghanistan et le Pakistan) a longtemps été une source de conflit entre les deux pays, car elle transférait des terres de l'empire d'Afghanistan au Pakistan sous contrôle britannique.\n\nLes Pasthuns eux-mêmes vivant dans la région ne semblent pas trop enthousiasmés par cette évolution, car beaucoup vivent à l'aise au Pakistan. Il est probable que l'Afghanistan ne pourra pas faire valoir ses revendications autrement que par la force."
 AfghanistanNews.2.a: "Intéressant"
 AfghanistanNews.3.t: "L'Afghanistan revendique le Baloutchistan"
 AfghanistanNews.3.d: "À mesure que la crise au Pakistan s'aggrave, l'Afghanistan élargit ses revendications. Aujourd'hui, le gouvernement afghan a annoncé que le Baloutchistan, outre le Pachtounistan, faisait partie intégrante de l'Afghanistan."
 AfghanistanNews.3.a: "Une évolution inquiétante."
 AfghanistanNews.4.t: "L'Afghanistan envahit le Pakistan"
 AfghanistanNews.4.d: "Dans le but de garantir ses revendications, l'Afghanistan a choisi une voie plus directe pour gagner des terres. Agissant au nom de la sécurité pachtoune, ils ont commencé à déplacer des troupes vers le Pakistan."
 AfghanistanNews.4.a: "Une évolution inquiétante."
 AfghanistanNews.5.t: "Les talibans unissent leurs forces"
 AfghanistanNews.5.d: "Les talibans afghans et pakistanais ont décidé d'unir leurs forces pour combattre ensemble les menaces communes. Il s'agit d'un changement majeur dans l'équilibre des pouvoirs en Asie centrale."
 AfghanistanNews.5.a: "Inquiétant."
 AfghanistanNews.6.t: "Assassinat d'Ahmad Shah Massoud"
 AfghanistanNews.6.d: "Ahmad Shah Massoud, principal chef de la résistance afghane contre les talibans, a été assassiné par Al-Qaida. Deux membres des talibans, se faisant passer pour des journalistes, ont fait exploser des explosifs dissimulés dans leur matériel. Massoud a été grièvement blessé et évacué en hélicoptère militaire mais il a succombé à ses blessures avant d'atteindre l'hôpital.\n\nConnu sous le nom de Lion du Panshir, Massoud était un symbole de résistance d'abord contre l'occupation soviétique, puis contre les talibans."
 AfghanistanNews.6.a: "Une perte."
 Afghanistan.2.t: "L'administration Karzaï"
 Afghanistan.2.d: "Sur ordre américain, Hamid Karzaï, chef conservateur des forces anti-talibans de l'Alliance du Nord, a pris la présidence de l'Afghanistan."
 Afghanistan.2.a: "Le premier pas vers l'indépendance."
 Afghanistan.3.t: "Tentative d'assassinat sur Ahmad Shah Massoud"
 Afghanistan.3.d: "Ahmad Shah Massoud, le Lion du Panjshir, a été visé aujourd'hui par un kamikaze. Deux talibans, se faisant passer pour des journalistes, ont déclenché des explosifs cachés dans une caméra et une batterie. Massoud a été grièvement blessé et a été immédiatement évacué des lieux à bord d'un hélicoptère militaire."
 Afghanistan.3.a: "Prions Allah pour qu'il survive."
 Afghanistan.4.t: "Les États-Unis exercent leur influence"
 Afghanistan.4.d: "Alors que les talibans ont été vaincus, les États-Unis ont utilisé leur influence pour influencer les décisions de la Loya Jirga. Une nouvelle administration intérimaire a été formée."
 Afghanistan.4.a: "Sont-ils meilleurs que les talibans?"
 AfghanistanHostageCrisis.1.t: "Des missionnaires sud-coréens retenus en otages par les talibans"
 AfghanistanHostageCrisis.1.d: "Aujourd'hui, un groupe de missionnaires sud-coréens qui traversaient la province de Ghazni a été capturé par des militants talibans et est retenu en otages. Ils exigent la libération des prisonniers et le retrait de tous les soldats sud-coréens d'Afghanistan. \n\nNotre conseiller militaire a suggéré l'envoi d'une équipe d'extraction pour libérer les otages et la délégation sud-coréenne a dépêché un représentant pour négocier."
 AfghanistanHostageCrisis.1.a: "Nous ne pouvons pas faire confiance aux talibans, envoyez l'équipe d'extraction."
 AfghanistanHostageCrisis.1.b: "La sécurité des otages est notre priorité, envoyez un représentant."
 AfghanistanHostageCrisis.2.t: "Otages sauvés"
 AfghanistanHostageCrisis.2.d: "Nos forces spéciales ont réussi à infiltrer la cachette des talibans et à escorter les otages jusqu'au poste militaire le plus proche. \n\nLes missionnaires retourneront en Corée du Sud et nos soldats sont salués par les médias."
 AfghanistanHostageCrisis.2.a: "Mission accomplie."
 AfghanistanHostageCrisis.3.t: "Otages tués lors de la tentative de secours"
 AfghanistanHostageCrisis.3.d: "Les militants talibans ont remarqué que nos forces spéciales entraient dans leur cachette et ont immédiatement exécuté les otages. \n\nAprès le combat, nos soldats ont pu s'échapper du bâtiment, sans les otages."
 AfghanistanHostageCrisis.3.a: "Mission échouée."
 AfghanistanHostageCrisis.4.t: "Les talibans exigent la libération des prisonniers"
 AfghanistanHostageCrisis.4.d: "Le représentant est revenu avec les revendications des talibans, dont la principale revendication est la libération de tous les détenus talibans des prisons nord-américaines."
 AfghanistanHostageCrisis.4.a: "Demander la libération des prisonniers."
 AfghanistanHostageCrisis.4.b: "Nous ne libérerons pas des criminels de guerre!"
 AfghanistanHostageCrisis.5.t: "Les talibans exigent le retrait de la Corée du Sud"
 AfghanistanHostageCrisis.5.d: "Les talibans ont exigé le retrait de toutes nos forces et le paiement d'une rançon pour la libération de nos citoyens."
 AfghanistanHostageCrisis.5.a: "Il faut accepter."
 AfghanistanHostageCrisis.5.b: "Nous ne négocierons pas avec les terroristes !"
 AfghanistanHostageCrisis.6.t: "Les États-Unis rejettent notre demande"
 AfghanistanHostageCrisis.6.d: "Les représentants de l'armée américaine ont rejeté notre demande de libération des détenus talibans des prisons militaires.\n\nLes djihadistes ont réagi en tuant deux otages avant de proposer de nouvelles revendications, le gouvernement nord-coréen a également appelé à la libération des otages."
 AfghanistanHostageCrisis.6.a: "Comment les talibans réagiront-ils à cela?"
 AfghanistanHostageCrisis.7.t: "Le gouvernement afghan rejette la demande des talibans"
 AfghanistanHostageCrisis.7.d: "Les représentants du gouvernement afghan ont rejeté les demandes des talibans comme irréalisables, les djihadistes ont réagi en tuant deux otages avant de proposer de nouvelles demandes, le gouvernement nord-coréen a également appelé à la libération des otages."
 AfghanistanHostageCrisis.7.a: "Barbare!"
 AfghanistanHostageCrisis.8.t: "La Corée du Sud se retire d'Afghanistan"
 AfghanistanHostageCrisis.8.d: "Suite à une prise d'otages en Afghanistan, le gouvernement sud-coréen a accepté les exigences des talibans et a entamé le retrait de ses forces. \n\nLes talibans ont annoncé le versement d'une rançon de vingt millions de dollars, mais la Corée du Sud n'a fait aucune déclaration à ce sujet."
 AfghanistanHostageCrisis.8.a: "L'Afghanistan continue de se déstabiliser."
 AfghanistanHostageCrisis.9.t: "Otages sud-coréens exécutés"
 AfghanistanHostageCrisis.9.d: "Suite à une crise des otages en Afghanistan, le gouvernement sud-coréen a rejeté toutes les demandes des talibans, puis a annoncé que tous les otages avaient été assassinés."
 AfghanistanHostageCrisis.9.a: "D'autres victimes du conflit afghan..."
 ContactIran.0.t: "L'Afghanistan rappelle son peuple"
 ContactIran.0.d: "Nos brigades Fatemiyoun se développent en Iran et elles sont composées d'hommes afghans chiites Hazara, l'Afghanistan demande leur retour dans leur pays d'origine afin qu'ils puissent aider le pays dans lequel ils vivent depuis plusieurs millénaires."
 ContactIran.0.a: "Qu'ils s'unissent à leurs terres."
 ContactIran.0.b: "Non, nous avons besoin de main d'œuvre."
 ContactIran.1.t: "L'Iran refuse d'envoyer notre Hazara Fatemiyoun"
 ContactIran.1.d: "Après avoir demandé à [PER.GetName] de renvoyer Fatemiyoun pour aider à [AFG.GetName] et suite à de nombreuses communications entre nos deux nations, les Iraniens ont décidé de rejeter la demande de nos hommes Hazara."
 ContactIran.1.a: "Allah sait ce quil y a de mieux!"
 ContactIran.2.t: "L'Iran accepte notre appel concernant les Hazara Fatemiyoun"
 ContactIran.2.d: "[PER.GetName] has accepted our request for the return of our Hazara soldiers to aid and return to their homelands, Five divisions are on their way with the flags raised high In the air chanting \"Zindabad Hazaristan!\""
 ContactIran.2.a: "Harakat !"
 ContactIran.3.t: "L'Afghanistan demande à devenir membre de l'Axe de la Résistance"
 ContactIran.3.d: "Les chiites Hazaras d'Afghanistan demandent à rejoindre l'Axe de la Résistance, suite à la prise de contrôle des Hazaras en Afghanistan, ils demandent maintenant à devenir membres de notre résistance."
 ContactIran.3.a: "Que le Khorasan s'unisse!"
 ContactIran.3.b: "Nous n'acceptons pas la demande."
 ContactIran.4.t: "L'Iran accepte notre demande de rejoindre leur faction"
 ContactIran.4.d: "[PER.GetName] a accepté notre demande d'adhésion à l'Axe de la Résistance. Nous sommes plus forts ensemble!"
 ContactIran.4.a: "Allahu Akbar!"
 ContactIran.5.t: "L'Iran décline"
 ContactIran.5.d: "[PER.GetName] a décliné notre demande d'adhésion à l'Axe de la Résistance. Nous ne devrions plus compter sur eux."
 ContactIran.5.a: "triste"
 ContactIran.6.t: "Les Hazaras d'Afghanistan déclarent le Hazaristan"
 ContactIran.6.d: "Ce matin, Karim Khalili, le politicien Hazara d'Afghanistan, a déclaré son propre État suite à ses succès dans le pays avec des réformes rapides et avec l'adhésion à l'islam chiite, des centaines de milliers de Hazaras sont descendus dans les rues de Kaboul, Bamiyan, Mazar-i- Sharif et Herat pour célébrer la déclaration du Hazaristan."
 ContactIran.6.a: "Intéressant"
 Cameroon.1.t: "L'éruption du Mont Cameroun"
 Cameroon.1.d: "Le Mont Cameroun, un volcan culminant à 4 040 mètres, est le point culminant d'Afrique centrale et l'un des volcans les plus actifs d'Afrique.\n\nAprès être entré en éruption en 1999, les habitants autour du Mont Cameroun ont été surpris lorsque le volcan, que le que les autochtones appellent Mongo ma Ndemi (\"Montagne de grandeur\"), a éclaté une fois de plus en plusieurs mois d'activités violentes le 28 mai 2000."
 Cameroon.1.a: "Cela nuira à la région."
 Cameroon.1.b: "Envoyez toute l'aide nécessaire!"
 diplomatic_response.1.t: "[FROM.GetName] accepts!"
 diplomatic_response.1.d: "[This.GetAdjective] and [FROM.GetAdjective] delegations have reached a mutual agreement in the most recent negotiations. [FROM.GetName] is willing to go along with our proposal."
 diplomatic_response.1.o1: "Excellent."
 diplomatic_response.2.t: "[FROM.GetName] rejects!"
 diplomatic_response.2.d: "After several nights and bitter fights over minor details and major points, the most recent wave of negotiations between the [This.GetName] and [FROM.GetName] delegations have failed. Our proposal will not come to fruition any time soon."
 diplomatic_response.2.d1: "[FROM.GetNameWithFlag] a décidé de rejeter notre demande de sauvetage. Cela rendra notre catastrophe imminente encore plus précaire..."
 diplomatic_response.2.o1: "Tant pis."
 diplomatic_response.3.t: "[FROM.GetName] folds!"
 diplomatic_response.3.d: "Unsurprisingly, the [FROM.GetAdjective] delegations were soon convinced of our overwhelming might and folded to our demands. We got what we wanted."
 diplomatic_response.3.o1: "Excellent!"
 diplomatic_response.4.t: "[FROM.GetName] defies us!"
 diplomatic_response.4.d: "We knew that some [FROM.GetAdjective] people are idiots, but their top envoys had to join the rank of idiots in the last few days of negotiations. They defied us, rejected our demands and sent our envoys home.\n\nThese fools."
 diplomatic_response.4.o1: "Ils en connaîtront les conséquences."
 LibyaNews.1.t: "La deuxième guerre civile libyenne touche à sa fin"
 LibyaNews.1.GNA.d: "La deuxième guerre civile libyenne a commencé en 2014, après que l'armée libyenne dirigée par le général Khalifa Haftar a renversé le gouvernement au pouvoir après avoir refusé de démissionner après avoir perdu les élections de 2014. Les partisans du gouvernement ont formé une nouvelle faction, le Gouvernement de salut national, déclenchant une nouvelle guerre civile. En 2015, l'ONU a négocié une trêve entre les deux factions, formant un nouveau gouvernement conjoint appelé Gouvernement d'accord national. Cependant, seulement un an plus tard, la paix a été brisée, plongeant le pays dans une guerre civile à trois.\n\nIl semble que le gouvernement d'entente nationale, soutenu par la communauté internationale, ait réussi à vaincre les factions rebelles et à unifier le pays, malgré le manque de soutien de l'armée libyenne. Reconnu par l'UE et une grande partie du monde occidental, il s'agit d'un vaste changement d'équilibre dans la région."
 LibyaNews.1.HOR.d: "La deuxième guerre civile libyenne a commencé en 2014, après que l'armée libyenne dirigée par le général Khalifa Haftar a renversé le gouvernement au pouvoir après avoir refusé de démissionner après avoir perdu les élections de 2014. Les partisans du gouvernement ont formé une nouvelle faction, le Gouvernement de salut national, déclenchant une nouvelle guerre civile. En 2015, l'ONU a négocié une trêve entre les deux factions, formant un nouveau gouvernement conjoint appelé Gouvernement d'accord national. Cependant, seulement un an plus tard, la paix a été brisée, plongeant le pays dans une guerre civile à trois.\n\nIl semble que la Chambre des représentants, avec le soutien du général Haftar, de l'armée libyenne et de nombreux loyalistes de Kadhafi, ait réussi à légitimer leur domination sur le pays. Fourni et soutenu par la Russie, Haftar a promis des terrains pour deux bases militaires russes dans le pays. Cela entraînera une augmentation de l'influence russe en Afrique du Nord."
 LibyaNews.1.GNC.d: "La deuxième guerre civile libyenne a commencé en 2014, après que l'armée libyenne dirigée par le général Khalifa Haftar a renversé le gouvernement au pouvoir après avoir refusé de démissionner après avoir perdu les élections de 2014. Les partisans du gouvernement ont formé une nouvelle faction, le Gouvernement de salut national, déclenchant une nouvelle guerre civile. En 2015, l'ONU a négocié une trêve entre les deux factions, formant un nouveau gouvernement conjoint appelé Gouvernement d'accord national. Cependant, seulement un an plus tard, la paix a été brisée, plongeant le pays dans une guerre civile à trois.\n\nIl semble que contre toute attente, le Gouvernement de salut national soit sorti vainqueur. Composé principalement d'islamistes et de membres des Frères musulmans, de nombreux experts affirment que cette victoire n'aurait pu être obtenue qu'avec un soutien sérieux d'acteurs étrangers. L'identité de ces acteurs reste floue."
 SierraLeoneNews.1.t: "Fin de la guerre civile sierra-léonaise"
 SierraLeoneNews.1.SIE.d: "Le gouvernement sierra léonais a annoncé aujourd'hui une victoire officielle sur les rebelles. Avec le soutien de la Guinée, du Royaume-Uni et des forces de la MINUSIL, les rebelles du RUF et de l'AFRC se sont soit rendus, soit ont fui vers le Libéria voisin. Le leader du RUF, [AFR.GetLeader], a été retrouvé dans une cachette et arrêté, puis remis à la garde des SAS britanniques.\n\nIl attend actuellement son procès et est accusé de multiples crimes de guerre par l'ONU."
 SierraLeoneNews.1.AFR.d: "Malgré l'aide des troupes britanniques et de l'ONU, les forces gouvernementales de la Sierra Leone ont été complètement chassées de la capitale Freetown. Certains membres du gouvernement ont eu le temps d'évacuer vers le Nigeria. D'autres, assez malheureux pour être capturés par les rebelles, ont été immédiatement abattus et promenés dans les rues de Freetown.\n\nPlusieurs jours de pillages ont eu lieu après la Chute du gouvernement, alors que les rebelles à travers le pays célèbrent leur victoire.\n\nLe pays sombrera très probablement dans l'anarchie et le chaos, car les milices n'auront plus d'autres ennemis que la population locale."
 SierraLeoneNews.1.a: "Développement intéressant"
 SierraLeone.2.t: "Nos alliés en Sierra Leone tombent"
 SierraLeone.2.d: "Le gouvernement de la Sierra Leone est tombé aux mains des rebelles. Il semble que notre intervention n'ait pas suffi à les sauver. Nous pouvons continuer à combattre l'AFRC, mais cela signifie que nous devrons pénétrer profondément dans le pays pour réinstaller le gouvernement légitime. D'un autre côté, il vaudrait peut-être mieux se retirer de la Sierra Leone."
 SierraLeone.2.a: "Essayez de négocier la paix."
 SierraLeone.2.b: "Nous devons les chasser de la Sierra Leone."
 SierraLeone.3.t: "Le gouvernement guinéen appelle à une trêve"
 SierraLeone.3.d: "Le gouvernement guinéen nous a contacté pour nous dire qu'il voulait mettre fin aux combats entre nous et lui et se retirer de la Sierra Leone. Comment devons-nous réagir?"
 SierraLeone.3.a: "Arrêtez de les combattre."
 SierraLeone.3.b: "Continuez à les combattre."
 SierraLeone.4.t: "L'AFRC accepte une trêve"
 SierraLeone.4.d: "Les rebelles sierra léonais ont accepté un cessez-le-feu."
 SierraLeone.4.a: "Bien"
 SierraLeone.5.t: "L'AFRC continue de se battre"
 SierraLeone.5.d: "Les rebelles sierra-léonais ont décliné notre offre et veulent continuer à nous combattre."
 SierraLeone.5.a: "Mince"
 LiberiaNews.1.t: "Fin de la deuxième guerre civile libérienne"
 LiberiaNews.1.LIB.d: "Aujourd'hui, Charles Taylor, le dictateur-président du Libéria, a annoncé la fin du LURD au Libéria. Bien que l'armée libérienne soit en ruine et que l'essentiel du travail soit effectué par les unités antiterroristes de Taylor, le LURD et ses alliés guinéens n'ont pas réussi à renverser son gouvernement. Les rebelles restants ont traversé la frontière et fui la Guinée. Il est probable que Taylor poursuivra le conflit avec la Guinée jusqu’à ce que toute opposition soit éliminée."
 LiberiaNews.1.LUR.d: "Aujourd'hui, lors d'une allocution télévisée, Charles Taylor a annoncé sa démission de la présidence du Libéria. Peu après, il s'est envolé pour le Nigéria, où il s'est exilé, tandis que des rebelles du LURD manifestaient dans les rues de Monrovia. Soupçonné de crimes de guerre, Taylor a fait l'objet d'un mandat d'arrêt international émis par Interpol. Cependant, le gouvernement nigérian refuse de l'extrader, à moins que la demande ne provienne du nouveau gouvernement libérien lui-même.\n\nCe dernier est encore en pleine réorganisation et son implantation à Monrovia, puis dans le reste du pays, prendra du temps."
 LiberiaNews.1.a: "Intéressant"
 Liberia.2.t: "Nos alliés au Libéria tombent"
 Liberia.2.d: "Le gouvernement Taylor a chassé les rebelles du LURD du Libéria. Bien qu'ils leur aient fourni des armes et de l'aide et qu'ils leur aient permis de traverser la frontière sans opposition, les rebelles n'ont pas suffi à vaincre le gouvernement de Taylor. Nous pouvons intensifier nos opérations militaires et essayer de nous débarrasser nous-mêmes de Taylor, ou nous pouvons nous retirer complètement du Libéria."
 Liberia.2.a: "Essayez de négocier la paix."
 Liberia.2.b: "Nous devons renverser Taylor."
 Liberia.3.t: "Le gouvernement guinéen appelle à une trêve"
 Liberia.3.d: "Le gouvernement guinéen nous a contacté pour nous dire qu'il voulait mettre fin aux combats entre nous et lui et se retirer du Libéria. Comment devons-nous réagir?"
 Liberia.3.a: "Arrêtez de les combattre."
 Liberia.3.b: "Continuez à les combattre."
 Liberia.4.t: "Taylor accepte une trêve"
 Liberia.4.d: "Le gouvernement Taylor a accepté un cessez-le-feu."
 Liberia.4.a: "Bien"
 Liberia.5.t: "Taylor continue de se battre"
 Liberia.5.d: "Charles Taylor a refusé notre offre et ils veulent continuer à nous combattre."
 Liberia.5.a: "Mince"
 SudanNews.1.t: "Le conflit au Kordofan Sud et sur le Nil Bleu est terminé"
 SudanNews.1.a: "Intéressant"
 SouthSudan.2.t: "Les rebelles soudanais à l'Est"
 SouthSudan.2.d: "Pendant toute la durée du conflit au Soudan, l’Érythrée a hébergé plusieurs groupes insurgés à l’intérieur de ses frontières, les laissant attaquer notre territoire à l’Est. Il semble que ces insurgés, se faisant appeler « Front de l'Est », se soient alliés à [SSU.GetNameDef]. Cela leur a permis de lancer une attaque plus importante, leur objectif étant notre plaque tournante commerciale de Port-Soudan."
 SouthSudan.2.a: "Au diable les Érythréens !"
 SouthSudan.3.t: "Les rebelles soudanais sur le Nil Bleu"
 SouthSudan.3.d: "Avec le retour au pouvoir de Mengistu en [ETH.GetName], il s’est opposé une fois de plus à soutenir le SPLA. En trouvant des sympathisants antigouvernementaux parmi les réfugiés soudanais vivant à [ETH.GetName], il a, avec la SPLA, armé ces personnes et les a envoyés de l'autre côté de la frontière vers le Nil Bleu."
 SouthSudan.3.a: "Au diable les Éthiopiens !"
 SouthSudan.4.a: "Envoyez notre armée de l'autre côté de la frontière !"
 SouthSudan.4.b: "Nous ne pouvons pas prendre de risques"
 SouthSudanNews.1.t: "[SSU.GetAdjective] Fin de la guerre civile"
 SouthSudanNews.1.a: "Intéressant"
 SouthSudanNews.2.a: "Intéressant"
 AngolaNews.1.t: "Fin de la guerre civile angolaise"
 AngolaNews.1.AGL.d: "La guerre civile angolaise a pris fin. Le conflit qui fait rage depuis les années 1970 oppose deux anciens alliés indépendantistes, le MPLA et l'UNITA.\n\nLe MPLA, allié de l'ex-Union soviétique, a réussi à vaincre et à vaincre l'UNITA."
 AngolaNews.1.UNI.d: "La guerre civile angolaise a pris fin. Le conflit qui fait rage depuis les années 1970 oppose deux anciens alliés indépendantistes, le MPLA et l'UNITA.\n\nL'UNITA, soutenue par les États-Unis, a réussi à vaincre le MPLA."
 AngolaNews.1.a: "Intéressant"
 Angola_Civil_War_Over: "La guerre civile angolaise est terminée"
 DRC.0.t: "Laurent-Désiré Kabila assassiné!"
 DRC.0.d: "Notre leader et libérateur Laurent-Désiré a été attaqué aujourd'hui au palais présidentiel, sa mauvaise réputation auprès de l'armée et les tentatives de purger les Kadogos déloyaux ont évidemment échoué terriblement, nous avons tenté de l'emmener d'urgence à Harare pour des soins médicaux urgents, mais cela a été trop tard, notre libérateur repose mort.\n\nNous avons depuis retrouvé et fait exécuter l'auteur Rashidi Kasereka pour ses crimes."
 DRC.0.A: "Un jour sombre."
 overlord.1.t: "Intégration de [FROM.GetName]"
 overlord.1.d: "[FROM.GetName] est notre état fantoche depuis bien trop longtemps. Ce n'est plus un partenariat viable pour leur permettre d'avoir de l'autonomie. Ce jour de [GetYear] marque un tournant que nous désirions depuis longtemps. [FROM.GetName] a été intégré à notre grande nation. Ils deviendront désormais des citoyens [ROOT.GetAdjective] et recevront les mêmes soins et traitements que n'importe quel autre citoyen de notre pays. C'est un jour glorieux pour nous et pour le peuple [FROM.GetName].\nREMARQUE: L'annexion d'une autre nation souveraine nous oblige à assumer l'intégralité de sa dette, de sa trésorerie et de ses investissements internationaux lors de sa fusion avec nous.\n\nVous obtenez les éléments suivants: Trésorerie: [?ROOT.treasury|Y], Dette: [?ROOT.debt|R], Investissements internationaux: [?ROOT.int_investments]"
 overlord.1.a: "Merveilleux !"
 overlord.1.a_tt: "On gagne des §YCores§! sur §B[FROM.GetName]§!\n"
 overlord_news.1.t: "[ROOT.GetName] intègre [FROM.FROM.GetName]"
 overlord_news.1.d: "Les délégations de [ROOT.GetName] et [FROM.FROM.GetName] ont annoncé aujourd'hui que [FROM.FROM.GetName] sera intégré à [ROOT.GetName]. [FROM.FROM.GetName] est un État autonome depuis un certain temps et est devenu de plus en plus dépendant de [ROOT.GetName] au cours des derniers mois. Il est cité comme suit : « Cela n’a de sens ! » de la part des deux parties concernées.\n\nLa vérité dans cette déclaration reste à découvrir.."
 overlord_news.1.a: "Intéressant"
 AIDS_events.1.t: "Le taux de VIH augmente"
 AIDS_events.1.d: "Mauvaise nouvelle sur le front sanitaire du pays. L'année dernière, nous avons vu une augmentation significative des cas de VIH et, au total, la situation globale du VIH dans notre pays s'est aggravée."
 AIDS_events.1.a: "Mince"
 AIDS_events.2.t: "Le taux de VIH se stabilise"
 AIDS_events.2.d: "Il semble que notre lutte contre le VIH porte ses fruits. L'année dernière, la prévalence du VIH dans notre pays n'a pratiquement pas changé. Même s'il ne s'agit pas d'une amélioration, cela reste un progrès."
 AIDS_events.2.a: "Quel soulagement."
 AIDS_events.3.t: "Le taux de VIH diminue"
 AIDS_events.3.d: "Bonne nouvelle sur le front sanitaire du pays. L'année dernière, nous avons vu une diminution significative des cas de VIH et, au total, la situation globale du VIH dans notre pays s'est considérablement améliorée."
 AIDS_events.3.a: "Magnifique."
 debug_money.1.t: "Calculateur de taux de vente de ressources"
 debug_money.1.d: "[?percentage_of_resource_exports|%1]"
 corruption.1.t: "Une proposition intéressante"
 corruption.1.d: "L'un de nos ministres nous a contacté et a déclaré que peu de changements organisationnels et législatifs pouvaient être apportés pour optimiser les performances de notre administration, même si cela nécessiterait une certaine... connexion personnelle avec les forces en mouvement."
 corruption.1.a: "Peut-être une opportunité"
 corruption.1.b: "Mauvaise idée"
 corruption.2.t: "Une proposition intéressante"
 corruption.2.d: "L'un de nos ministres nous a contacté et a déclaré que peu de changements organisationnels et législatifs pouvaient être apportés pour optimiser les performances de notre police, même si cela nécessiterait une certaine... connexion personnelle avec les forces en mouvement."
 corruption.2.a: "Peut-être une opportunité"
 corruption.2.b: "Mauvaise idée"
 corruption.3.t: "Une proposition intéressante"
 corruption.3.d: "L'un de nos ministres nous a contacté et a déclaré que peu de changements organisationnels et juridiques pouvaient être apportés pour optimiser les performances de notre complexe militaire, même si cela nécessiterait une certaine... connexion personnelle avec les forces en mouvement."
 corruption.3.a: "Peut-être une opportunité"
 corruption.3.b: "Mauvaise idée"
 corruption.4.t: "Une proposition intéressante"
 corruption.4.d: "L'un de nos ministres nous a contacté et a déclaré que peu de changements organisationnels et législatifs pouvaient être apportés pour optimiser les performances de nos établissements d'enseignement, même si cela nécessiterait une certaine... connexion personnelle avec les forces en mouvement."
 corruption.4.a: "Peut-être une opportunité"
 corruption.4.b: "Mauvaise idée"
 corruption.5.t: "Une proposition intéressante"
 corruption.5.d: "L'un de nos ministres nous a contacté et a déclaré que peu de changements organisationnels et législatifs pouvaient être apportés pour optimiser les performances de nos hôpitaux, même si cela nécessiterait une certaine... connexion personnelle avec les forces en mouvement."
 corruption.5.a: "Peut-être une opportunité"
 corruption.5.b: "Mauvaise idée"
 corruption.6.t: "Une proposition intéressante"
 corruption.6.d: "L'un de nos ministres nous a contacté et a déclaré que peu de changements organisationnels et juridiques peuvent être apportés pour optimiser les performances de nos instituts sociaux, même si cela nécessitera une certaine... connexion personnelle avec les forces motrices."
 corruption.6.a: "Peut-être une opportunité"
 corruption.6.b: "Mauvaise idée"
 corruption.7.t: "Une proposition intéressante"
 corruption.7.d: "Une agence de presse nous a demandé un financement en échange de nouvelles plus favorables."
 corruption.7.a: "Peut-être une opportunité"
 corruption.7.b: "Mauvaise idée"
 corruption.8.t: "Une proposition intéressante"
 corruption.8.d: "Un politicien neutre nous a proposé une idée de coopération contre notre opposition, même si cela nécessiterait un sale boulot pour le faire."
 corruption.8.a: "Peut-être une opportunité"
 corruption.8.b: "Mauvaise idée"
 corruption.9.t: "Une proposition intéressante"
 corruption.9.d: "L'une de nos entreprises de construction nous a contacté et a demandé si elle pouvait contourner certaines lois pour obtenir les meilleurs résultats possibles."
 corruption.9.a: "Peut-être une opportunité"
 corruption.9.b: "Mauvaise idée"
 corruption.10.t: "Une proposition intéressante"
 corruption.10.d: "L'un de nos sous-traitants militaires nous a contacté et a demandé s'il pouvait contourner certaines lois pour accélérer le processus de construction de nouvelles installations."
 corruption.10.a: "Peut-être une opportunité"
 corruption.10.b: "Mauvaise idée"
 corruption.11.t: "Une proposition intéressante"
 corruption.11.d: "L'une de nos entreprises de construction nous a contacté et a demandé si elle pouvait ignorer certaines lois environnementales pour obtenir les meilleurs résultats possibles."
 corruption.11.a: "Peut-être une opportunité"
 corruption.11.b: "Mauvaise idée"
 corruption.12.t: "Une proposition intéressante"
 corruption.12.d: "L'un de nos sous-traitants militaires nous a contacté et a demandé s'ils pouvaient ignorer certaines lois environnementales pour obtenir les meilleurs résultats possibles."
 corruption.12.a: "Peut-être une opportunité"
 corruption.12.b: "Mauvaise idée"
 corruption.13.t: "Une proposition intéressante"
 corruption.13.d: "L'un de nos fonds d'investissement nous a proposé un plan intéressant pour obtenir des investissements à l'étranger, même si cela semble tout à fait contraire au droit international."
 corruption.13.a: "Peut-être une opportunité"
 corruption.13.b: "Mauvaise idée"
 corruption.14.t: "Une proposition intéressante"
 corruption.14.d: "L'un de nos amis proches nous a contactés et a suggéré d'organiser une petite fête afin que le gouvernement puisse se rapprocher de ses entreprises les plus fiables."
 corruption.14.a: "Peut-être une opportunité"
 corruption.14.b: "Mauvaise idée"
 corruption.15.t: "Une proposition intéressante"
 corruption.15.d: "L'un de nos hommes d'affaires nous a contacté et a suggéré un plan visant à augmenter les profits grâce à l'exploitation des ressources, même si cela mettra sûrement à rude épreuve l'industrie dans son ensemble."
 corruption.15.a: "Peut-être une opportunité"
 corruption.15.b: "Mauvaise idée"
 MD_character_army.1.t: "[FROM.GetName] is killed in action"
 MD_character_army.1.d: "After commanding [FROM.GetHersHis] forces to retreat, it seems [FROM.GetRank] [FROM.GetName] was caught under fire from enemy units, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.1.a: "Une perte pour la nation."
 MD_character_army.2.t: "[FROM.GetName] is killed in action"
 MD_character_army.2.d: "After securing another victory, it seems [FROM.GetRank] [FROM.GetName] was attacked by regrouping units of the enemy, and was killed on duty. [FROM.GetHersHisCap] body is recovered, and a state funeral is on the way."
 MD_character_army.2.a: "Une perte pour la nation."
 civil_war_debuff.1.t: "Nos militaires se rétablissent!"
 civil_war_debuff.1.d: "Le choc initial de la guerre civile a plongé notre nation dans un chaos complet. Nous avons perdu le contact avec certaines de nos unités militaires et nos commandants, les responsables de nos dépôts de ravitaillement ne répondent plus et nous ne savions même pas vraiment où se trouvait notre ennemi. Les fronts se sont désormais stabilisés et il est un peu plus clair qui est du côté de qui, mais de nombreux défis demeurent.\n\nNotre armée est composée d'anciens combattants et de volontaires, sans aucune idée claire de la chaîne de commandement. Nous avons du mal à approvisionner nos troupes et à établir des routes d'approvisionnement directes. Nous n'avons pas non plus une idée claire des batailles qui ont eu lieu et des tactiques utilisées par notre ennemi. Qu'est-ce qu'on devrait faire en premier?"
 civil_war_debuff.1.a: "Nous devons avoir une idée claire de la chaîne de commandement!"
 civil_war_debuff.1.b: "Nous allons avoir besoin d'armes. Beaucoup d'armes."
 civil_war_debuff.1.c: "Écrivez tout! Nous devons étudier notre ennemi."
 civil_war_debuff.2.t: "Nos militaires se rétablissent!"
 civil_war_debuff.2.d: "Bien que notre armée soit depuis longtemps dans une situation chaotique, la situation s'améliore. Nous avons une idée approximative de qui et où se trouve notre armée, et nous avons réussi à sécuriser certaines lignes d'approvisionnement. Cependant, l'armée manque toujours de cohésion globale et de nombreuses unités et milices opèrent indépendamment du commandement central.\n\nNotre armée a une chaîne de commandement, mais les responsabilités et les autorités ne sont pas toujours respectées. Nous disposons d'un approvisionnement en armes relativement stable, mais de nombreuses unités disposent de leurs propres approvisionnements. Nous n'avons pas non plus défini de tactique commune pour nos troupes. Que devrions-nous faire pour essayer de nous améliorer ?"
 civil_war_debuff.2.a: "Les troupes doivent savoir quelle est leur mission et qui les dirige"
 civil_war_debuff.2.b: "Nous ne pouvons pas nous permettre d'achats militaires incohérent."
 civil_war_debuff.2.c: "Distribuez des manuels de terrain à nos troupes."
 civil_war_debuff.3.t: "Nos militaires se rétablissent!"
 civil_war_debuff.3.d: "La confusion au sein de nos militaires commence à disparaître. La façon dont nos soldats agissent commence désormais à ressembler à celle d'une véritable armée. Quelques problèmes mineurs subsistent.\n\nIl existe des commandements en double où les autorités des commandants se chevauchent. Les commandes d'achats militaires disparaissent parfois et l'argent qui leur est destiné finit hors des troupes. Nous perdons beaucoup d'expérience sur le terrain et de formateurs, car les soldats sont démobilisés sans papiers et les pertes ne sont pas correctement comptabilisées. Que devrions-nous essayer d'améliorer?"
 civil_war_debuff.3.a: "Clarifiez les commandes et résolvez les conflits internes."
 civil_war_debuff.3.b: "Combattez la corruption pour les achats militaires."
 civil_war_debuff.3.c: "Mettez en place un processus de transmission de l'expérience de terrain."
 civil_war_debuff.4.t: "Nos militaires se rétablissent!"
 civil_war_debuff.4.d: "Nous y sommes presque. Bien que quelques problèmes mineurs subsistent, notre armée ressemble presque à ce qu'elle était avant la guerre. Quelques réformes organisationnelles supplémentaires devraient permettre à notre armée de redevenir pleinement professionnelle.\n\nIl existe encore plusieurs milices qui ne sont pas pleinement intégrées à l'armée. Certains équipements que nous achetons et produisons ne sont pas interchangeables. Notre haut commandement demande des ressources supplémentaires pour analyser les expériences de combat de la guerre. Que devrions-nous essayer d'améliorer?"
 civil_war_debuff.4.a: "Intégrez les milices restantes."
 civil_war_debuff.4.b: "Unifiez nos stocks d'équipements."
 civil_war_debuff.4.c: "Affectez des officiers supplémentaires à notre haut commandement."
 civil_war_debuff.5.t: "Nos militaires se rétablissent!"
 civil_war_debuff.5.d: "C'est fait. Après deux années de réforme d'une armée inefficace, nous avons surmonté les dégâts causés par la guerre civile. Nous pouvons maintenant recommencer à obliger nos militaires à nous protéger contre les menaces extérieures, et non internes."
 civil_war_debuff.5.a: "Un grand jour pour [ROOT.GetNameDef]."
 protests.1.t: "Montée des tensions"
 protests.1.d: "L'agitation publique s'accroît en raison du mécontentement à l'égard des dépenses gouvernementales. Les manifestations sont de plus en plus fréquentes et radicalisées. L'administration doit choisir entre adopter une position ferme ou tenter d'apaiser les masses."
 protests.1.a: "Les ignorer"
 protests.1.b: "Faire respecter l'ordre"
 protests.1.c: "Commencer les négociations"
 protests.2.t: "Lutte politique pour le pouvoir"
 protests.2.d: "Avec la montée du mécontentement populaire, les manœuvres politiques deviennent plus précaires. La situation exige de choisir entre sauvegarder le pouvoir politique au risque d'accroître la radicalisation ou prendre un pari qui pourrait avoir des conséquences plus graves."
 protests.2.a: "Jeter les dés"
 protests.2.b: "Maintenir la ligne"
 protests.2.c: "Commencer les négociations"
 protests.3.t: "Crise du leadership"
 protests.3.d: "La popularité du parti au pouvoir vacille en raison des manifestations en cours. Le gouvernement est confronté à une décision cruciale qui pourrait soit renforcer, soit affaiblir son emprise sur le pouvoir. Le résultat pourrait avoir un impact durable sur le paysage politique du pays"
 protests.3.a: "Ignorer les manifestants"
 protests.3.b: "Disperser les radicaux"
 protests.3.c: "Commencer les négociations"
 protests.4.t: "Ingérence étrangère"
 protests.4.d: "Alors que les troubles intérieurs s'intensifient, les puissances étrangères s'y intéressent. Le gouvernement doit choisir entre accepter l'influence étrangère telle qu'elle est ou tenter de contrôler les agents étrangers."
 protests.4.a: "Ne faites pas de démarches hâtives"
 protests.4.b: "Trouvez chacun d'eux"
 protests.4.c: "Commencer les négociations"
 protests.5.t: "Des progrès bloqués"
 protests.5.d: "Les manifestations provoquent un ralentissement important des projets de construction dans tout le pays. L'administration doit choisir entre atténuer les effets pendant une durée plus courte ou tenter de calmer les manifestants, au risque de retards plus longs."
 protests.5.a: "Ça va sûrement s'arrêter dans quelques jours"
 protests.5.b: "Maintenant, la police va avoir du travail"
 protests.5.c: "Commencer les négociations"
 protests.6.t: "Crise de la production militaire"
 protests.6.d: "Les troubles croissants affectent la production militaire et le gouvernement est confronté à une décision cruciale. Devraient-ils appliquer des mesures pour maintenir la production ou tenter de désamorcer les protestations, ce qui pourrait aggraver la crise de la production?"
 protests.6.a: "Ils retourneront bientôt au travail"
 protests.6.b: "Préservez la production par la force"
 protests.6.c: "Commencer les négociations"
 protests.10.t: "Nation au bord du gouffre"
 protests.10.d: "Les troubles publics ont atteint un niveau critique. La décision actuelle du gouvernement pourrait soit conduire à une déstabilisation accrue, soit à une radicalisation encore plus grande de la population. La situation est désastreuse."
 protests.10.a: "Ça leur passera"
 protests.10.b: "Supprimez-les à tout prix"
 protests.10.c: "Accepter leurs demandes"
 protests.11.t: "Troubles politiques"
 protests.11.d: "Le paysage politique est désormais plongé dans le chaos. Il faut choisir entre une perte significative de pouvoir politique ou un jeu risqué avec des pertes potentielles encore plus importantes. Les enjeux sont plus élevés que jamais."
 protests.11.a: "Ça leur passera"
 protests.11.b: "La Garde nationale à la rescousse"
 protests.11.c: "Accepter leurs demandes"
 protests.12.t: "Effondrement de la confiance"
 protests.12.d: "La confiance dans le parti au pouvoir s'érode rapidement. Une décision cruciale qui pourrait encore diminuer la popularité du parti ou risquer un effondrement total de l'autorité politique l'attend. La nation regarde avec haleine."
 protests.12.a: "Ça leur passera"
 protests.12.b: "Utilisez la force"
 protests.12.c: "Accepter leurs demandes"
 protests.13.t: "Arrêt grinçant"
 protests.13.d: "La construction à l'échelle nationale est gravement affectée. Face à l'enjeu, le gouvernement doit choisir entre une réduction drastique de la vitesse pendant une période prolongée ou une négociation potentiellement catastrophique avec les manifestants."
 protests.13.a: "Nous ne pouvons pas résoudre ce problème pour le moment"
 protests.13.b: "Faire respecter le travail"
 protests.13.c: "Accepter leurs demandes"
 protests.14.t: "Machine de guerre chancelante"
 protests.14.d: "Alors que la production militaire est en crise, le gouvernement est confronté à un choix angoissant. Ils doivent soit appliquer des mesures qui affecteront considérablement la production pendant une période prolongée, soit parier sur des conséquences encore plus graves."
 protests.14.a: "Nous ne pouvons pas résoudre ce problème pour le moment"
 protests.14.b: "Où est ma garde nationale?"
 protests.14.c: "Accepter leurs demandes"
 protests.20.t: "Le Point de rupture"
 protests.20.d: "Des années de troubles, d'insatisfaction et d'échec des négociations ont abouti à un moment de catastrophe nationale. Ce qui a commencé comme un murmure de mécontentement s'est transformé en un cri assourdissant en faveur de la révolution, et les rues sont désormais remplies des clameurs du conflit. Malgré les tentatives visant à apaiser les troubles, à aplanir les divergences et à rétablir l'ordre, les efforts du gouvernement se sont révélés infructueux. La confiance de la population s'est érodée et sa patience est à bout. La nation est divisée et le tissu social est déchiré. Les voisins se retournent contre leurs voisins et les anciens amis deviennent des ennemis à mesure que les lignes sont tracées et que les camps sont choisis. Les manifestants ont pris les armes et l'air est chargé de la tension d'une bataille imminente. Un nouveau chapitre de l'histoire de la nation est sur le point d'être écrit, et l'encre est du sang. La guerre civile commence."
 protests.20.a: "Préparez-vous au conflit"
 migrant_event.1.t: "Bidonvilles de migrants"
 migrant_event.1.d: "Certaines zones autour de nos grandes villes ont commencé à développer ce que les habitants appellent des « bidonvilles de migrants ». C'est une zone de migrants et de réfugiés démunis à l'intérieur du pays qui ont essayé de gagner leur vie mais, en raison des bas salaires et du très faible degré d'assimilation dans le pays d'accueil, ils se sont retrouvés dans ces bidonvilles."
 migrant_event.1.a: "Briser les bidonvilles"
 migrant_event.1.b: "Fournir de l'aide"
 migrant_event.1.c: "Réduire les objectifs de migration"
 migrant_event.2.t: "Les nationalistes protestent contre la politique migratoire"
 migrant_event.2.d: "Un groupe de nationalistes a organisé une manifestation dans l'une de nos grandes villes contre les récents migrants arrivés dans le pays. La manifestation appelle à des limitations supplémentaires à la migration et à commencer à réglementer davantage l'immigration et la migration au sein du pays."
 migrant_event.2.a: "Permettre des Démonstrations"
 migrant_event.2.b: "Rompre la manifestation"
 migrant_event.3.t: "Migrants accusés de crimes violents"
 migrant_event.3.d: "Des groupes particuliers de migrants à l'intérieur du pays ont été accusés de divers crimes violents et notre police a arrêté un grand nombre de nouveaux migrants entrant dans le pays. Les manifestants et sympathisants de droite ont commencé à dire au gouvernement que telles seraient les conséquences de la non-fermeture de nos frontières. Comment devons-nous réagir ?"
 migrant_event.3.a: "Ils nous l'ont dit..."
 migrant_event.3.b: "Augmenter le financement de la police."
 LibyaNews.1.a: "Excellent"
 Sudan.1.t: "Ceux qui sont laissés pour compte"
 Sudan.1.d: "Certains de nos territoires situés à notre frontière sud comptent encore une population chrétienne et animiste assez importante. De nombreuses personnes dans ces territoires sont mécontentes d’avoir été exclues du référendum au Soudan du Sud. La dissidence est devenue de plus en plus grande et ces gens exigent maintenant d'être unis à [SSU.GetName], car ils estiment que sous notre gouvernement, ils ne bénéficient pas d'une présentation appropriée."
 Sudan.1.a: "Très bien, nous n'en avons pas besoin"
 Sudan.1.b: "C'est à juste titre notre terre !"
 Sudan.2.t: "Alliance avec [DAR.GetNameDef] ?"
 Sudan.2.d: "Nous ne sommes pas les seuls à lutter contre le gouvernement. Il y a aussi des rebelles au Darfour. Peut-être devrions-nous leur promettre une représentation accrue dans le futur gouvernement soudanais si nous sommes alliés ?"
 Sudan.2.a: "Envoyez-leur une demande"
 Sudan.2.b: "Nous n'en avons pas besoin"
 Sudan.2.a.tt: "S'ils acceptent, alors\n"
 Sudan.3.t: "[FROM.GetNameDef] propose une alliance"
 Sudan.3.d: "[FROM.GetNameDef] nous a proposé une alliance, car eux aussi se battent contre le gouvernement [SUD.GetAdjective]. Ils nous promettent une représentation accrue dans le nouveau gouvernement soudanais qu’ils sont en train de bâtir. Que devons-nous répondre ?"
 Sudan.3.a: "Nous sommes d'accord"
 Sudan.3.b: "Nous n'en avons pas besoin"
 Sudan.4.t: "[FROM.GetNameDef] accepte de nous allier"
 Sudan.4.d: "[FROM.GetNameDef] a accepté de former un front commun contre [SUD.GetLeader] avec nous."
 Sudan.4.a: "Super"
 Sudan.5.t: "[FROM.GetNameDef] refuse de nous allier"
 Sudan.5.d: "[FROM.GetNameDef] a refusé de former un front commun contre [SUD.GetLeader] avec nous."
 Sudan.5.a: "Leur perte"
 Sudan.6.t: "[FROM.GetNameDef] et [DAR.GetNameDef] unissent leurs forces"
 Sudan.6.d: "[FROM.GetNameDef] et [DAR.GetNameDef] ont formé un front commun dans leur lutte contre nous."
 Sudan.6.a: "Mince"
 SudanNews.1.d: "Le conflit au Kordofan méridional et dans le Nil Bleu est enfin terminé. [FROM.GetLeader] a revendiqué la victoire dans le conflit, et il reste à voir dans quelle direction le pays ira à l'avenir."
 SudanNews.2.t: "Conflit au Kordofan Sud et sur le Nil Bleu"
 SudanNews.2.d: "Après l'Accord de paix global, certaines zones de [SUD.GetName] avec des populations chrétiennes et animistes n'ont pas été incluses dans le référendum sur l'indépendance du Soudan du Sud. Les gens qui vivent ici sont de plus en plus fatigués du gouvernement [SUD.GetAdjective] depuis l'accord. Ils estiment ne pas être suffisamment représentés au sein du gouvernement actuel et ont désormais pris les armes contre le gouvernement."
 SudanNews.2.a: "Intéressant"
 SouthSudan.1.t: "Référendum sur l'indépendance du Soudan du Sud"
 SouthSudan.1.d: "Le moment est venu pour le peuple sud-soudanais de voter pour son indépendance. Même si certaines personnes vivant au Soudan ne sont pas heureuses d'avoir été exclues de la zone référendaire, nous avons réussi à englober la majeure partie de la population chrétienne et animiste. Cela ouvrira une nouvelle page en matière de paix et de prospérité pour les deux Soudans."
 SouthSudan.1.a: "Et le gagnant est..."
 SouthSudan.4.t: "[FROM.GetNameDef] demande de l'aide"
 SouthSudan.4.d: "Notre allié de longue date, [FROM.GetLeader] a demandé l'aide militaire dans sa lutte contre [SUD.GetNameDef]. Il a déclaré que sans notre aide militaire, leur effort de guerre s’effondrerait. À la fin des années 80, nos troupes ont participé aux combats au Sud-Soudan, mais avec le conflit au Congo, nous avons dû modifier nos priorités. Le Congo est maintenant réglé, peut-être pouvons-nous accorder quelque chose à [FROM.GetLeader] ?"
 SouthSudan.5.t: "[FROM.GetNameDef] nous soutient"
 SouthSudan.5.d: "[FROM.GetLeader] a accepté de nous aider. Les troupes [FROM.GetAdjective] devraient traverser la frontière d’un jour à l’autre."
 SouthSudan.5.a: "Parfait."
 SouthSudan.6.t: "[FROM.GetNameDef] recule"
 SouthSudan.6.d: "[FROM.GetLeader] a déclaré qu'il ne pouvait pas se permettre de nous aider plus qu'il ne l'a déjà fait."
 SouthSudan.6.a: "Mince"
 SouthSudan.7.t: "[FROM.GetNameDef] Prêt à céder des terres"
 SouthSudan.7.d: "[SUD.GetNameDef] est actuellement plongé dans une guerre civile. La faction adverse de [SSU.GetName] nous a proposé un accord ; Ils nous donneront le contrôle total du territoire du Triangle d’Ilemi et, en échange, nous les aiderons à mettre en place un réseau de ravitaillement militaire. Devons-nous accepter leur offre ?"
 SouthSudan.7.a: "Bien sûr"
 SouthSudan.7.b: "Nous ne sommes pas intéressés"
 SouthSudan.8.t: "[FROM.GetNameDef] accepte notre accord"
 SouthSudan.8.d: "[FROM.GetLeader] a accepté de prendre le contrôle du Triangle d'Ilemi en échange de notre aide militaire."
 SouthSudan.8.a: "Parfait."
 SouthSudan.9.t: "[FROM.GetNameDef] rejette notre accord"
 SouthSudan.9.d: "[FROM.GetLeader] a rejeté notre offre du Triangle d'Ilemi. Ils craignent que cette décision leur vaut des répercussions de la part de [SUD.GetNameDef]."
 SouthSudan.9.a: "Mince"
 SouthSudan.10.t: "Les rebelles congolais franchissent la frontière"
 SouthSudan.10.d: "Nous avons reçu des informations selon lesquelles des groupes armés de grande envergure ont traversé la frontière depuis [DRC.GetNameDef] et ont attaqué les villes de Yambio et Yei. Il semble que ces groupes aient été équipés et recrutés par le gouvernement de [SUD.GetAdjective]. L'opposition de [DRC.GetName] contre [UGA.GetName] les a motivés à autoriser ce franchissement de frontière."
 SouthSudan.10.a: "Au diable les Congolais !"
 SouthSudan.11.t: "Préparation du référendum"
 SouthSudan.11.d: "Avec la signature d'un accord de paix entre le nord et le sud du Soudan, les deux parties ont commencé à préparer le référendum. Les projections actuelles montrent que la grande majorité des [SSU.GetAdjective] voteront pour l'indépendance, car ils ne souhaitent pas être gouvernés par des musulmans radicaux. Cependant, avec l’ingérence politique et le contrôle exercé sur des personnalités clés du gouvernement, il pourrait être possible pour le Nord de reprendre le contrôle du Sud."
 SouthSudan.11.a: "Nous devons préparer"
 SouthSudan.11.tooltip: "La probabilité que les Sud-Soudanais votent pour rester au Soudan est de §Y[SUD.GetAdjective] Influence dans [SSU.GetNameWithFlag] multipliée par 0,75§!. Si l'influence de [SUD.GetAdjective] dans [SSU.GetNameWithFlag] est §Yinférieure à 20 %§!, le référendum aboutira toujours à l'§Yindépendance§!."
 SouthSudan.12.t: "[FROM.GetNameDef] devient indépendant"
 SouthSudan.12.d: "[FROM.GetName] a organisé son référendum sur l'indépendance dans les territoires qu'il contrôlait. Les résultats en faveur de l'indépendance s'élèvent à 99,83 %. Étonnamment, il y a eu très peu de violences électorales avant le vote et, de manière générale, les élections ont été considérées comme équitables."
 SouthSudan.12.a: "Je suppose que c'est au revoir"
 SouthSudan.13.t: "[FROM.GetNameDef] Favorise l'unité"
 SouthSudan.13.d: "[FROM.GetName] a organisé son référendum sur l'indépendance dans les territoires qu'il contrôlait. La course a été serrée, mais les voix en faveur du maintien au Soudan l'ont emporté avec 54 % des voix. De nombreux Sud-Soudanais ont exprimé leurs craintes que tenter de se séparer du Soudan ne ferait que relancer la guerre civile."
 SouthSudan.13.a: "Content de te revoir!"
 SouthSudan.14.t: "Les accidents d'hélicoptère de [ROOT.GetLeader]"
 SouthSudan.14.d: "Pour le week-end, notre président [ROOT.GetLeader] était parti rencontrer son allié de longue date [UGA.GetLeader]. Il n'avait pas parlé de ce voyage au gouvernement [SUD.GetAdjective] et avait plutôt menti en disant qu'il était en vacances à New Kush. [ROOT.GetLeader] cependant, n'est jamais rentré chez lui. Lors de son vol de retour, son hélicoptère s'est écrasé dans une chaîne de montagnes au Sud-Soudan, le tuant ainsi que six de ses collègues et sept membres d'équipage [UGA.GetAdjective]. Notre gouvernement s'efforce de résoudre la question de succession, mais il est probable que le député de [ROOT.GetLeader], Salva Kiir Mayardit, prendra ses fonctions."
 SouthSudan.14.a: "Quelques mois après la paix ? Suspect..."
 SouthSudan.15.t: "Rumeurs d'un coup d'État"
 SouthSudan.15.d: "Nous avons entendu des rumeurs selon lesquelles l'un de nos alliés pendant la guerre civile envisageait de renverser notre gouvernement. Nous pourrions écarter ces rumeurs. Cependant, étant donné que notre armée est actuellement composée de dizaines de petits groupes rebelles, il est plus que probable que quelqu’un tente de s’emparer du trône. Que devons-nous faire ?"
 SouthSudan.15.a: "Nos alliés sont fidèles"
 SouthSudan.15.b: "Purgez les généraux ! La police ! Tout le monde!"
 SouthSudan.15.a.tt: "Si une guerre civile éclate, l’opposition sera §YPlus forte§! que notre côté"
 SouthSudan.15.b.tt: "Si une guerre civile éclate, l’opposition sera §Yplus faible§! que notre côté"
 SouthSudan.16.t: "Qu'y a-t-il dans un nom ?"
 SouthSudan.16.d: "Maintenant que nous sommes indépendants, nous devons décider comment nommer notre pays. Plusieurs suggestions ont été recueillies auprès du public, le Soudan du Sud étant le favori évident. Cependant, nous pourrions choisir un autre nom"
 SouthSudan.16.a: "Le Soudan du Sud va bien"
 SouthSudan.16.b: "Azanie, pour se souvenir de notre histoire"
 SouthSudan.16.c: "La République du Nil est la plus appropriée"
 SouthSudan.16.dd: "La République Kush est la meilleure"
 SouthSudanNews.1.d: "La guerre civile dans [SSU.GetNameDef] a pris fin. La guerre a commencé suite à une lutte de pouvoir entre différents groupes rebelles, peu de temps après que le pays ait finalisé ses affaires avec [SUD.GetNameDef]. Peut-être que le pays pourra désormais commencer à se reconstruire."
 SouthSudanNews.2.t: "L’accord de paix global"
 SouthSudanNews.2.d: "Les factions [SUD.GetAdjective] et [SSU.GetAdjective] sont parvenues à un accord de paix mettant fin à la deuxième guerre civile soudanaise. Avec l'aide des négociateurs de l'Autorité intergouvernementale pour le développement, les deux parties se sont mises d'accord sur un cadre dans lequel [SSU.GetNameDef] bénéficierait de l'autonomie sous le gouvernement [SUD.GetAdjective]. Les parties ont convenu que d'ici 6 ans, un référendum serait organisé sur la pleine indépendance de [SSU.GetNameDef]. Peut-être que cet accord résoudra enfin le conflit ethnique vieux de plusieurs décennies dans la région."
 SouthSudanNews.3.t.SUD: "Les rebelles sud-soudanais écrasés"
 SouthSudanNews.3.t.SSU: "Un nouveau Soudan est né"
 SouthSudanNews.3.d.SUD: "Le dernier épisode du conflit ethnique [SUD.GetAdjective] a pris fin lorsque le gouvernement [SUD.GetAdjective] a écrasé les rebelles dans le sud du pays. Cela laissera [SUD.GetLeader] libre de poursuivre son islamisation et son arabisation du pays, au grand dam de la population chrétienne et animiste du Sud."
 SouthSudanNews.3.d.SSU: "Le dernier épisode du conflit ethnique [SUD.GetAdjective] a pris fin avec le renversement du gouvernement par les rebelles sud-soudanais. L'ancien dirigeant de [SUD.GetAdjective] [SUD.GetLeader] a été emprisonné et attend son procès pour violations des droits humains et crimes de guerre. Le nouveau régime promet un Soudan libre et égalitaire, mais de nombreux analystes ont souligné que le pouvoir [SSU.GetLeader] a déjà pris des mesures pour faire taire toute opposition pendant son mandat à la tête des rebelles."
 SouthSudanNews.3.a: "Intéressant"
 SouthSudanNews.4.t.independence: "[FROM.GetNameDef] devient indépendant"
 SouthSudanNews.4.t.autonomy: "[FROM.GetNameDef] fait toujours partie de [SUD.GetNameDef]"
 SouthSudanNews.4.d.independence: "[FROM.GetNameDef] a organisé un référendum sur l'indépendance, comme convenu dans son accord de paix avec [SUD.GetName]. Les résultats ont été étonnants : 98 % en faveur de la séparation des deux États. Cela fait de [SSU.GetName] le plus jeune pays d'Afrique."
 SouthSudanNews.4.d.autonomy: "[FROM.GetNameDef] a organisé un référendum sur l'indépendance, comme convenu dans son accord de paix avec [SUD.GetName]. Les résultats étaient proches de l'égalité, mais l'option privilégiant l'unité avec [SUD.GetName] l'a emporté par 53 %. On suppose que les craintes d’une reprise de la guerre si [SSU.GetName] se séparait de [SUD.GetName] ont incité les électeurs à privilégier l’unité. Quoi qu'il en soit, [SSU.GetName] s'est vu accorder une certaine autonomie, mais il reste à voir combien de temps cela durera."
 SouthSudanNews.4.a: "Intéressant"
 SouthSudanNews.5.t: "Guerre civile dans [SSU.GetNameDef]"
 SouthSudanNews.5.d: "Une guerre civile a commencé dans la jeune nation de [SSU.GetName]. Quelques années seulement après avoir mis fin à leur conflit avec [SUD.GetName], le conflit a repris. Il semble que depuis qu’il n’y a plus d’ennemi commun pour les différents groupes rebelles, une lutte de pouvoir s’est engagée entre les différents groupes."
 SouthSudanNews.5.a: "Intéressant"
 war_in_darfur_threat: "Guerre au Darfour"
 Darfur.2.t: "Les rebelles du Darfour attaquent Golo"
 Darfur.2.d: "Un groupe de rebelles appartenant au Front de libération du Darfour et au Mouvement pour la justice et l'égalité ont attaqué la petite ville de Golo, chef-lieu du district de Jebel Marra, juste au sud de Kabkabiya. L'attaque a été précédée par des escarmouches de moindre envergure contre des commissariats de police locaux, des avant-postes de l'armée et des convois militaires. Les rebelles sont fatigués de la politique d'arabisation de [SUD.GetLeader] dans la région et exigent leur démission."
 Darfur.2.a: "Mince"
 Darfur.3.t: "Les rebelles du Darfour ferment la frontière tchadienne"
 Darfur.3.d: "Un groupe de rebelles appartenant au Front de libération du Darfour et au Mouvement pour la justice et l'égalité ont occupé la ville frontalière de Tine, près de la frontière tchadienne. Ce faisant, ils ont capturé une grande quantité d’armes et de fournitures. Les rebelles tentent de créer un lien avec le Tchad, où vivent de nombreuses tribus favorables à la cause du Darfour."
 Darfur.3.a: "Mince"
 Darfur.4.t: "Les rebelles du Darfour attaquent El Fasher"
 Darfur.4.d: "Tôt le matin, un groupe de rebelles du Front de libération du Darfour et du Mouvement pour la justice et l'égalité ont attaqué la garnison endormie d'El Fasher. Dans les heures qui ont suivi, plusieurs avions militaires ont été détruits sur la base aérienne locale, faisant 75 morts et 32 ​​​​captures. Les rebelles ont également réussi à capturer un général de division, qui commandait la base aérienne. Cela constitue un revers majeur pour notre armée, et plusieurs unités militaires ont abandonné leurs postes craignant les attaques des rebelles."
 Darfur.4.a: "Mince"
 DarfurNews.1.t: "La guerre au Darfour commence"
 DarfurNews.1.d: "Des décennies de politiques d’arabisation forcée par le gouvernement [SUD.GetAdjective] ont finalement atteint leur point d’ébullition. Deux groupes rebelles, le Front de libération du Darfour et le Mouvement pour la justice et l'égalité, ont fait passer le conflit d'une simple insurrection à une guerre totale. Le temps nous dira si [SUD.GetName] sera capable de gérer ces rebelles."
 DarfurNews.1.a: "Intéressant"
 DarfurNews.2.t: "[DAR.GetNameDef] Autonomie accordée"
 DarfurNews.2.d: "Après des années de conflit entre les rebelles [DAR.GetAdjective] et les forces gouvernementales [SUD.GetAdjective], les deux parties sont parvenues à un accord de paix. [DAR.GetName] bénéficiera d'une autonomie limitée sous [SUD.GetName], ce qui devrait les protéger contre la discrimination. Seul le temps nous dira si [SUD.GetLeader] entend respecter cet accord."
 DarfurNews.2.a: "Intéressant"
 DarfurNews.3.t: "[DAR.GetNameDef] devient indépendant"
 DarfurNews.3.d: "Après des années de conflit entre les rebelles [DAR.GetAdjective] et les forces gouvernementales [SUD.GetAdjective], les forces [DAR.GetAdjective] ont réussi à prendre le dessus. Après des incursions réussies du Darfour au Soudan proprement dit, le gouvernement [SUD.GetAdjective] n'a eu d'autre choix que d'accorder des concessions aux rebelles [DAR.GetAdjective]. La nation de [DAR.GetName] a désormais obtenu une indépendance totale, mais le temps nous dira si [SUD.GetName] utilise simplement cela comme une opportunité pour reconstruire ses forces."
 DarfurNews.3.a: "Intéressant"
 corruption.16.t: "La corruption a augmenté"
 corruption.16.d: "Des espions et des agents d'un autre pays se sont immiscés dans notre pays, augmentant ainsi le taux de corruption dans notre pays. Cette corruption provient de sources diverses telles que des pots-de-vin ciblés, des négociations et des agents subalternes bien placés dans le pays."
 corruption.16.a: "C'est malheureux"
 Israel.1111.t: "Rumeurs d'une 3ème Intifada"
 Israel.1111.d: "Le groupe islamiste palestinien Hamas a appelé à un nouveau soulèvement contre Israël à partir de vendredi. S'exprimant jeudi à Gaza, le chef du Hamas, Ismaïl Haniyeh, a déclaré : « Nous devons appeler au lancement d'une intifada face à l'ennemi sioniste et travailler à son lancement. » Il a également déclaré : « Nous voulons que le soulèvement dure et que Trump et l'occupation continuent à regretter cette décision. »"
 Israel.1111.a: "Euh..."
 Israel.1112.t: "Israël menace de faire la guerre"
 Israel.1112.d: "En raison de notre conflit gelé avec Israël sur les hauteurs du Golan, ils ont menacé de nous déclarer la guerre à moins que nous ne révoquions notre revendication !"
 Israel.1112.a: "Révoquez notre revendication sur le Golan"
 Israel.1112.b: "Guerre！"
 restart_boardcross_expenditure: "Redémarre toutes les dépenses à tous les niveaux"
 god_of_war_event.1.t: "Prêt à relever un défi ?"
 god_of_war_event.1.d: "Normalement, à part la plupart des buffs de base, l'IA dans MD ne triche pas. Elle opte pour des conceptions de style RP pour les véhicules et les divisions, mais avec cette option, l'IA TRICHERA.\nElle créerait des équipements et des divisions à partir de rien, et essaierait plus fort de résister au joueur en général. Ce ne sera pas une expérience Endsieg, l'IA est faite pour défier le joueur, pas pour vous submerger.\n\nP.S. Vous n'avez toujours pas le droit de vous vanter après avoir battu cette IA."
 god_of_war_event.1.a: "Amène-le !"
 god_of_war_event.1.b: "Faites également en sorte que l’IA se concentre davantage sur moi !"
 md4.21.t: "[FROM.GetName]-[Root.GetName] EAEU Integration"
 md4.21.d: "[FROM.GetNameDef] is asking us to allow them into EAEU. We will have priority to export to and import from them and will economically integrate into each other further."
 md4.21.a: "Signons-le"
 md4.21.b: "Refusons"
 md4.22.t: "[FROM.GetNameDef] Has Signed Our Ascension into EAEU!"
 md4.22.d: "[FROM.GetNameDef] has accepted our offer to sign allow us into EAEU."
 md4.22.a: "Cela nous rendra tous les deux prospères !"
 md4.23.t: "[FROM.GetNameDef] Has Refused our offer to sign allow us into EAEU."
 md4.23.d: "[FROM.GetNameDef] has refused our offer to sign a free trade agreement."
 md4.23.a: "Ils ont peur de nos produits de qualité supérieure !"
 EUR_idea_eacu_cooperation: "Coopération de l'UEE"
 EUR_idea_eacu_cooperation_desc: "L'Union douanière eurasiatique (à l'origine Communauté économique eurasiatique) favorise les liens économiques entre la plupart des États post-soviétiques. L'union impose un tarif extérieur commun sur toutes les marchandises entrant dans l'union et agit comme une entité unique lors de la conclusion d'accords commerciaux et de négociations."
 EUR_idea_eacu_cooperation_2: "Coopération intégrée de l'UEE"
 EUR_idea_eacu_cooperation_2_desc: "L'Union douanière eurasiatique (à l'origine Communauté économique eurasiatique) favorise les liens économiques entre la plupart des États post-soviétiques. L'union impose un tarif extérieur commun sur toutes les marchandises entrant dans l'union et agit comme une entité unique lors de la conclusion d'accords commerciaux et de négociations."
 influence.1.c: "Envoyer 15% du PIB comme aide Économique."
 influence.1.e: "En y réfléchissant bien, ils n'en n'ont pas besoin."
 Cameroon.2.t: "Le naufrage du bateau"
 Cameroon.2.d: "Un bateau transportant 150 passagers faisait route du port nigérian d'Oron vers le port gabonais de Gentil lorsque leur embarcation a chaviré. On estime que plus d'une centaine de passagers sont morts, les autres étant dans un état critique, accrochés aux débris flottants du naufrage. Les pêcheurs locaux et les autorités camerounaises de la ville de Kirbi scrutent actuellement les vagues et les eaux à la recherche de survivants, mais la situation s'annonce de plus en plus sombre...\n\nNous pouvons proposer de prendre en charge les frais médicaux des survivants ou organiser une journée de prière pour les âmes des morts et le rétablissement des survivants."
 Cameroon.2.a: "Nous devrions payer les factures médicales."
 Cameroon.2.b: "Une journée de prière s’impose."
 world_war.1.t: "Guerre mondiale scripté activé"
 world_war.1.d: "Traditionnellement, Millennium Dawn est un mod orienté bac à sable, qui s'est éloigné d'une Guerre Mondiale scripté comme on en trouve dans d'autres mods. Cette option a été ajouté pour satisfaire ceux qui souhaitent une expérience de jeu plus centrée sur la guerre. Ce mode de jeu a été créé en respectant les principes de MD, et avec différents scénarios de déclanchement d'un conflit mondial selon la nation que vous jouerez. La guerre commencera aux alentours de 2014, afin de vous laisser un peu de temps pour vous préparer."
 world_war.1.a: "D'accord"
 world_war.2.t: "La Chine lance une offensive contre Taïwan"
 world_war.2.d: "L'APL a annoncé le lancement d'une opération contre la République de Chine, marquant la reprise de la guerre civile chinoise. Bien que cela n'ait pas échappé à nos services de renseignement, nous avions des raisons de croire que la Chine ferait preuve de retenue face à une possible riposte des États-Unis."
 world_war.2.a: "[CHI.GetName] a dépassé nos limites"
 world_war.2.b: "Les problèmes en Asie ne concerne que les asiatiques"
 world_war.3.t: "Intervention américain contre la Chine"
 world_war.3.d: "[USA.GetLeader] a annoncé aujourd'hui qu'il avait ordonné à l'armée des États-Unis de se préparer à une mobilisation générale contre [CHI.GetName]. Cette déclaration intervient après les attaques chinoises contre Taïwan et de la reprise de la guerre civile chinoise. Bien que la Chine ait justifié son invasion, les États-Unis ont déclaré que leur principale motivation était de montrer que 'Les États-Unis soutiendront toujours leurs alliés, quel que soit l'agresseur'. Des inquiétudes grandissantes circulent quant au risque d'escalade dans la région, certains allant jusqu'à qualifier cette intervention comme début de la Troisième Guerre Mondiale."
 world_war.3.a: "Inquiétant..."
 world_war.4.t: "L'Amérique préoccupé par la Chine"
 world_war.4.d: "Les impérialistes de Washington ont lancé une campagne contre nos partenaires en Chine. C'est une opportunité en or. Pendant qu'ils sont distraits avec la Chine, nous avons la possibilité d'agir et reprendre ce qui nous revient de droit, la totalité de la Corée."
 world_war.4.a: "Nous ne pouvons pas manquer une telle opportunité"
 world_war.4.b: "C'est trop risqué"
 world_war.5.t: "Le conflit en Asie s'intensifie"
 world_war.5.d: "La guerre en Asie s'intensifie, le gouvernement nord-coréen ayant lancé une attaque contre la République de Corée dans le but de réunifier l'ensemble de la péninsule coréenne sous le régime de la RPDC. Cette offensive de la République Populaire Démocratique de Corée a poussé le Japon à intervenir en envoyant des troupes en Corée du Sud, déclenchant ainsi un conflit bien plus vaste que prévu. Le monde retient son souffle alors que la guerre, commencé par la Chine, s'est rapidement étendue à la majeure partie de l'Asie de l'Est. Partout dans le monde, notamment en Europe et en Afrique, les nations condamnent la violence en Asie, redoutant l'ouverture d'un nouveau théâtre d'opérations sur le continent européen, conséquence directe du chaos et de l'instabilité croissante qui règnent à l'échelle mondiale."
 world_war.5.a: "La Troisième Guerre Mondiale est là"
 world_war.6.t: "Guerre en Corée"
 world_war.6.d: "La RPDC a intensifié le conflit régional en déclarant illégalement la guerre à la République de Corée. Cette agression menace l'ordre que nous avons patiemment défendu au fil des décennies, et les appels à l'action se multiplient au sein de notre population. Nous devons défendre nos alliés et notre intégrité en soutenant la Corée du Sud, d'une manière ou d'une autre."
 world_war.6.a: "La RPDC a commis une grave erreur aujourd’hui"
 world_war.6.b: "Nous ne pouvons pas intervenir"
 world_war.7.t: "La Russie avance vers l'Ouest"
 world_war.7.d: "Le gouvernement Russe avance vers l'Ouest, déclenchant une guerre totale contre l'Ukraine. Cette expansion inquiète profondément notre commandement militaire ainsi que nos alliés, car l’avenir du continent européen est désormais incertain, et le restera tant que nous n’aurons pas démontré aux Russes que l’Europe n’est pas un gâteau à dévorer."
 world_war.7.a: "La Russie est allée trop loin cette fois-ci"
 world_war.7.b: "Nous ne pouvons pas risquer une guerre"
 world_war.8.t: "Guerre en Europe"
 world_war.8.d: "À la suite des incursions russes en Ukraine, des forces de l’OTAN ont été aperçues entrant sur le territoire ukrainien afin de confronter les troupes russes. Des rapports de premiers accrochages aériens et navals commencent déjà à émerger, annonçant le début d’un conflit de bien plus grande ampleur en Europe. Les organisations internationales à travers le monde qualifient désormais ce conflit de Troisième Guerre mondiale, alors que les forces de l’OTAN sont actuellement engagées contre les forces russes dans toute l’Europe. Presque toutes les nations disposant de l’arme nucléaire sont désormais en guerre les unes contre les autres, et la crainte d’une guerre nucléaire ne cesse de croître. Personne ne sait si le monde touche à sa fin, mais une chose est sûre: le prochain ordre mondial ne sera certainement pas multipolaire."
 world_war.8.a: "Une nouvelle page de l’Histoire s’écrit"
 world_war.9.t: "Nos ambitions dans le monde"
 world_war.9.d: "Aujourd’hui, les Américains, les Chinois et les Japonais sont engagés dans un vaste conflit les uns contre les autres. Avec l’implication croissante des Européens dans l’effort de guerre, notre gouvernement s’inquiète de plus en plus d’une possible expansion européenne vers l’Est, en direction de nos frontières. L’état-major militaire recommande que nous avancions en Ukraine afin de prévenir toute attaque surprise européenne dans un avenir proche."
 world_war.9.a: "Écoutons leurs conseils"
 world_war.9.b: "Nous ne pouvons pas risquer une guerre sur des suppositions"
 world_war.10.t: "La guerre éclate au Moyen-Orient"
 world_war.10.d: "À la suite de plusieurs frappes iraniennes contre Israël, les FDI ont appelé leurs alliés à renverser et démanteler le gouvernement iranien. Cet événement d’ampleur mondiale s’inscrit dans un conflit plus vaste que de nombreux experts qualifient désormais de Troisième Guerre mondiale, avec l’apparition d’un nouveau théâtre d’opérations. La rivalité entre l’Iran et Israël n’est pas nouvelle : elle remonte à la Révolution islamique iranienne de 1979. On ignore si l’Iran possède réellement l’arme nucléaire, mais les craintes d’un échange nucléaire entre l’Axe de la Résistance et Israël ne cessent de croître. On ne sait toujours pas si d’autres puissances interviendront dans ce conflit, mais une chose est certaine : cette guerre pourrait entraîner la destruction du Moyen-Orient ainsi qu’un effondrement des marchés pétroliers mondiaux."
 world_war.10.a: "Y a-t-il un endroit sûr ?"
 world_war.11.t: "Les libérations d'Al-Qods"
 world_war.11.d: "Alors que l’Amérique et les grandes puissances du monde sont distraites par une guerre d’usure, nous avons enfin l’occasion rêvée de frapper Israël et de mettre fin au régime sioniste. Une telle attaque pourrait entraîner la destruction de nos deux États, mais le moment est venu. C’est maintenant ou jamais."
 world_war.11.a: "Attaquer !"
 world_war.11.b: "Nous ne pouvons pas risquer une guerre"
 taiwan.17.t: "Choisir une nouvelle capitale"
 taiwan.17.d: "Alors que nous savourons les fruits de la victoire, nous devons commencer à réfléchir au transfert de notre capitale administrative vers le continent. Taipei est tout simplement trop éloignée des principaux centres de population de Chine continentale, ce qui rend notre capacité à gouverner efficacement le pays de plus en plus difficile. Par conséquent, notre capitale sera…"
 taiwan.17.a: "Pékin"
 taiwan.17.b: "Changhaï"
 taiwan.17.c: "Chongqing"
 taiwan.17.d1: "Le même, Taipei"
 taiwan.17.e: "Nankin"
 city_captured.12.t: "Chute de Baidoa"
 city_captured.12.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Baidoa, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.12.a: "Intéressant"
 city_captured.13.t: "Chute de Kismayo"
 city_captured.13.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Kismayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night.."
 city_captured.13.a: "Intéressant"
 city_captured.14.t: "Chute de Galkayo"
 city_captured.14.d: "[FROM.GetName] forces breached the final defences and captured the strategic city of Galkayo, which was encircled and overrun following a brief but intense skirmish. Though the city is in ruins, they'll celebrate this hard-fought battle throughout the night."
 city_captured.14.a: "Intéressant"
 taiwan.18.t: "La grande course aux puces"
 taiwan.18.d: "À l'aube des années 2000, notre supériorité dans la production de microprocesseurs est menacée. La République populaire de Chine entreprend le développement de son industrie de production de microprocesseurs afin de surpasser nos capacités de production. Nous devons conserver notre avance pour préserver notre position sur la scène internationale."
 taiwan.18.a: "Nous vaincrons !"
 systems.1.t: "Bienvenue à Millennium Dawn"
 systems.1.d: "Welcome to Millennium Dawn! Thank you for downloading and playing the mod. If you're new, we recommend exploring the various menus to familiarize yourself with the features. Menus typically can be opened via buttons at the top of the various screens Need help? Join our Discord community where we're happy to assist you with any questions or issues. You can report bugs in-game using \"Report An Issue\" in the pause menu or through our Discord channels.\n\nImportant Information:\n- Fuel is negative on game start due to power plants and population consumption. Look at the Energy UI in the Construction Menu for more details.\n- Historical focus =/= historical outcomes. We use the historical focus option to encouarge the AI to make the most historical possible choice in given choices and options. This is not a guarantee for a historical game."
 systems.1.a: "D'accord"
 protests.100.t: "Rapport : Des manifestations éclatent à [ROOT.capital.GetCapitalVictoryPointName]"
 protests.100.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that recent political shifts in the nation have resulted in the mass mobilization of people, with the first sparks of revolt breaking out in [ROOT.capital.GetCapitalVictoryPointName]. The state security apparatus is currently awaiting orders from the higher-ups before deciding what to do, but unless protester demands are met, this movement may spiral into seeing our government overthrown.\n\nProtest are projected to spread outside of the capital until it engulfs our nation as a whole.\n\n Signed,\n - Internal Security Directorate"
 protests.100.a: "Nous verrons ce que nous pouvons faire."
 protests.101.t: "Report: Protests Spread!"
 protests.101.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears the protests have continued to spread, reaching new states and provinces nationwide. We will need to determine a method to deal with these protesters so that order and calm is restored in society.\n\n Signed,\n - Internal Security Directorate"
 protests.101.a: "We have to act quick!"
 protests.102.t: "Report: Protests Fizzle Regionally"
 protests.102.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecent public disturbances in the region were addressed by local security and administrative authorities. Demonstrations that had formed in several urban and semi-urban areas were dispersed following coordinated efforts by law enforcement units. Authorities report that order has been restored and essential services remain operational.\n\n Signed,\n - Internal Security Directorate"
 protests.102.a: "Good"
 protests.103.t: "Report: Calm Returns as Protests Disperse"
 protests.103.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nLocal security forces are reporting that protests have become incredibly limited in scale and size, with most cities and streets returning to normal operation. This report isn't from just one region, but several, signaling a general lack of energy amongst protesters. This is likely the end of the protest movement.\n\n Signed,\n - Internal Security Directorate"
 protests.103.a: "Excellent"
 protests.104.t: "Protesters Set Ablaze Industrial Assets!"
 protests.104.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several industrial assets, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.104.a: "Bulldoze it, there's no repairing that"
 protests.104.b: "Use government funds to begin reconstruction"
 protests.105.t: "Protesters Set Office Parks Ablaze!"
 protests.105.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several office parks, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.105.a: "Bulldoze it, there's no repairing that"
 protests.105.b: "Use government funds to begin reconstruction"
 protests.106.t: "Protesters Set Military Factories Ablaze!"
 protests.106.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nIt appears that protesters have set fire to several military factories, creating a tense security environment. We now have to decide as to what we want to do with the damaged buildings.\n\n Signed,\n - Internal Security Directorate"
 protests.106.a: "Bulldoze it, there's no repairing that"
 protests.106.b: "Use government funds to begin reconstruction"
 protests.200.t: "Report: Incoming Protests"
 protests.200.d: "Situation Report\n\nAddressed to their excellency, [ROOT.GetLeader]\n\nRecently, our intelligence agency and security forces have caught wind of plans for a national revolt. This is due to recent developments within our country, creating a clique of dissatisified people. It is alledged that these people are starting to form groups in order to topple our government.\n\n Signed,\n - Internal Security Directorate"
 protests.200.a: "We must act quick"
 influence.5.d1: "Call in Albionis, we're going in"
 recognition.71.t: "The General Assembly Vote Has Passed"
 recognition.71.d: "The General Assembly has voted to admit us to the United Nations. After years of diplomatic effort, our seat is secured."
 recognition.71.a: "[THIS.GetName] takes its seat."
 recognition.72.t: "The General Assembly Vote Has Failed"
 recognition.72.d: "The General Assembly has fallen short of the votes needed to admit us. Our bid for UN membership has stalled for now."
 recognition.72.a: "A setback for our diplomacy."
 recognition.73.t: "General Assembly Rejects [FROM.GetName]'s Bid"
 recognition.73.d: "The General Assembly has voted against the admission of [FROM.GetNameDef] as a member state. The bid has stalled."
 recognition.73.a: "The vote is recorded."
 recognition.12.t: "[FROM.FROM.GetName] sollicite une recommandation du Conseil de sécurité"
 recognition.12.d: "[FROM.FROM.GetName] has petitioned the Security Council for a recommendation to the General Assembly, over the objection of [FROM.GetName]. The Council must now cast its vote."
 recognition.12.a: "Vote Yes"
 recognition.12.b: "Vote No"
 recognition.12.c: "Abstain"
 recognition.15.t: "Vote on [FROM.FROM.GetName] UN Membership"
 recognition.15.d: "With the Security Council's recommendation secured, the question of admitting [FROM.FROM.GetName], opposed by [FROM.GetName], now falls to the General Assembly."
 recognition.15.a: "Vote Yes"
 recognition.15.b: "Vote No"
 recognition.15.c: "Abstain"
 recognition.121.t: "Le Conseil de sécurité recommande [FROM.GetName] pour l'adhésion à l'ONU"
 recognition.121.d: "The Security Council has issued a recommendation in favor of admitting [FROM.GetName] to the United Nations. The matter now passes to the General Assembly."
 recognition.121.a: "A vote moves forward."
 recognition.122.t: "Security Council Rejects [FROM.GetName]'s Bid"
 recognition.122.d: "The Security Council has voted against recommending [FROM.GetName] to the General Assembly. The membership bid stops at this stage."
 recognition.122.a: "The bid stalls."
 UNSC.1.t: "Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all Offensive Wars"
 UNSC.1.d: "A Resolution to Pressure [?global.current_sc_vote_nation.GetName] to end all of their current offensive conflicts is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will have 210 days to resolve all of their ongoing offensive conflicts. If they fail to do so, they will be sanctioned until they finally end all of those conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.1.a: "Yes"
 UNSC.1.b: "No"
 UNSC.1.c: "Abstain"
 UNSC.2.t: "United Nations Security Council Sanctions against [?global.current_sc_vote_nation.GetName]"
 UNSC.2.d: "A Resolution to established UNSC sanctions against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the vote passes, [?global.current_sc_vote_nation.GetName] will be sanctioned until they no longer are an offensive threat to global peace, or until the Security Council removes the sanctions against them.\n\n$unsc_vote_pass_tt$"
 UNSC.2.a: "Yes"
 UNSC.2.b: "No"
 UNSC.2.c: "Abstain"
 UNSC.3.t: "Restrict Foreign Military Volunteers to [?global.current_sc_vote_nation.GetName]"
 UNSC.3.d: "A resolution to prevent foreign military volunteers from being sent to [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, any nation that sends military volunteers to [?global.current_sc_vote_nation.GetName] after the vote will be sanctioned until they either withdraw their volunteers, or the conflict ends.\n\n$unsc_vote_pass_tt$"
 UNSC.3.a: "Yes"
 UNSC.3.b: "No"
 UNSC.3.c: "Abstain"
 UNSC.4.t: "Arms Embargo against [?global.current_sc_vote_nation.GetName]"
 UNSC.4.d: "A Resolution to institute an arms embargo against [?global.current_sc_vote_nation.GetName] is before the Security Council. If the resolution passes, [?global.current_sc_vote_nation.GetName] will be prevented from purchasing arms from the International Market until they end all of their current offensive conflicts.\n\n$unsc_vote_pass_tt$"
 UNSC.4.a: "Yes"
 UNSC.4.b: "No"
 UNSC.4.c: "Abstain"
 UN.6.t: "Confirm UN Security Council seat for [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.6.d: "The United Nations General Assembly is currently voting to confirm the upcoming members of the Security Council. All nations that are nominated must be confirmed by the General Assembly, and will serve a 2 year term, starting January 1st of the year [?global.next_year]\n\n$un_ga_vote_requires_2_3_tt$"
 UN.6.a: "Vote Yes"
 UN.6.b: "Vote No"
 UN.6.c: "Abstain"
 UN.7.t: "Establish Non-Binding Sanctions Against [?global.current_ga_vote_nation.GetNameWithFlag]"
 UN.7.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has conducted a military strike against a foreign nation. In response, they have requested that the §BUnited Nations§! sanction [?global.current_ga_vote_nation.GetNameWithFlag] for the next year as a punishment for this action. If we vote in the affirmative, we will agree to bring sanctions against [?global.current_ga_vote_nation.GetNameWithFlag].\n\n$un_ga_vote_auto_pass_tt$"
 UN.7.a: "Vote Yes"
 UN.7.b: "Vote No"
 UN.7.c: "Abstain"
 UN.8.t: "Decrease the UN General Operating Budget"
 UN.8.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has put forward a proposal to decrease the General Operating Budget for the next year. The decrease would be by 0.01% of GPD. The current contribution rate is [?global.general_operating_budget_contribute_percent|%]. The decrease to the rate would take place at the start of the next UN fiscal year, and would affect all UN Aid programs.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.8.a: "Vote Yes"
 UN.8.b: "Vote No"
 UN.8.c: "Abstain"
 UN.9.t: "Increase the UN General Operating Budget"
 UN.9.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has put forward a proposal to increase the General Operating Budget for the next year. The increase would be by 0.01% of GPD. The current contribution rate is [?global.general_operating_budget_contribute_percent|%]. The increase to the rate would take place at the start of the next UN fiscal year, and would affect all UN Aid programs.\n\n$un_ga_vote_requires_2_3_tt$"
 UN.9.a: "Vote Yes"
 UN.9.b: "Vote No"
 UN.9.c: "Abstain"
 UN.10.t: "Resolution: Poverty Reduction"
 UN.10.d: "[?global.current_ga_vote_nation.GetNameWithFlag] has proposed a non-binding resolution calling on all member states to adopt measures aimed at reducing poverty. Nations that vote in favor will commit to policies that improve stability at the cost of increased consumer goods spending.\n\n$un_ga_vote_requires_majority$"
 UN.10.a: "Vote Yes"
 UN.10.b: "Vote No"
 UN.10.c: "Abstain"
 UN.11.t: "Resolution: Food Security"
