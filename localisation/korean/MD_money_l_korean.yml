 committed_to_reducing_debt: "부채 상환을 약속함"
 bankruptcy_decisions: "국가의 부채"
 bankruptcy_decisions_desc: "\n£MAIN_desctext_dept \n\n\n\n[ROOT.GetFlag]§YOur government§! is currently acquiring more and more §Rdebt§!. We have recently hit a milestone and we are now paying more than §R10%§! interest on our current §Ydebt§!\n\n§YNote to Player§!: Once this decision category becomes active you will start to receive events that will impact your nations debt. This can be in the form of maluses or even small boons such as temporary refinancing.\n\n§YInterest Rate§! is [?interest_rate|1]%               §YDebt-to-GDP Ratio§!: §Y[?debt_ratio|-%1]§!\n§YInterest Paid on Debt§! is §Y$$§! [?debt_rate|-3]\nIdea impact on §YInterest Rate§!: [?interest_rate_multiplier|-2]%\n\nHaving a higher §YInterest Rate§! than §Y10%§! will give us access to emergency decisions to handle our growing debt. After the interest rises above §Y15%§!, our economy will begin to slow down and we will suffer from other adverse effects. At this point, we will have the ability to default on our debt (at a great cost). Once our §YInterest§! goes above §Y20%§!, we won't be able to manually take more debt. If our §YInterest on Debt§! exceeds our §YGross Income§!, our nation will collapse."
 bankruptcy.200.t: "[Western_Autocracy_L] 독재자가 정부를 조롱하다"
 bankruptcy.200.d: "'...그리고 이게 바로 그들이 쫄딱 망해버린 이유입니다. [ROOT.GetLeader](은)는 나약한 지도자이며, 중대한 사안을 결정하는데 있어 안일한 그들의 태도는 [ROOT.GetNameDef]을 혼란에 빠트릴 것입니다. 우리는 효율적으로 경제를 운영하기 위해서 국제통화기금(IMF)과 서방의 동맹국들과 더욱 가까이 지내야 할 것입니다.'\n\n[Western_Autocracy_L] 대표의 한마디는 당 대표의 이름을 외치는 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.200.a: "젠장"
 bankruptcy.200.b: "반격을 시작해라"
 bankruptcy.201.t: "좋았던 지난 시절을 회상하는 [conservatism_L]"
 bankruptcy.201.d: "'국가가 제대로 돌아갔을 때를 기억하십니까? 경제가 호황을 맞이했을 때, 우리나라는 그보다 더욱 발전하고 있었습니다. [ROOT.GetLeader](은)는 그런 추억의 시대에서 벗어난지 오래이며, 그 뒷처리는 모두 우리가 감당하고 있습니다...'\n\n[conservatism_L]  대표의 한마디는 당 대표의 이름을 외치는 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.201.a: "젠장"
 bankruptcy.202.t: "사회적으로 수용가능한 금융 정책을 촉구하는 [liberalism_L]"
 bankruptcy.202.d: "'지금 [ROOT.GetLeader]의 정책은 국가를 빈곤으로 몰아넣고 있습니다. 그저 [show_ruling_party](이)가 일으키는 끊없는 빚을 갚기 위해 기본권도 보장받지 못하는 사람들은 정부의 뒤치다꺼리를 위해 피눈물같은 세금을 갖다 바치고 있습니다...'\n\n[liberalism_L] 대표의 한마디는 당 대표의 이름을 외치는 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.202.a: "젠장"
 bankruptcy.202.b: "반격을 시작해라"
 bankruptcy.203.t: "노동조합을 조롱하는[socialism_L]"
 bankruptcy.203.d: "'언제까지 이런 끔찍한 경제 정책을 우리가 떠안아야 하는 겁니까? 도대체, 나라의 중추인 우리들이 왜 그래야 하는 것입니까! 뼈빠지게 고생하는 우리 노동자는 항상 [show_ruling_party]의 뒤치다꺼리를 감당하느라 피눈물을 흘리고 있습니다...'\n\n[socialism_L] 대표의 한마디는 노동 조합 집회에서 군중들의 열렬한 환호와 함께 노동자들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.203.b: "반격을 시작해라"
 bankruptcy.204.d: "'그들이 우리를 꽁꽁 묶어둔 쇠사슬이 보이지 않습니까? 당신의 자녀들, 손주들은 평생 은행업자들의 노예로 살아가게 될 것입니다. 노동자들의 권리를 도둑질한 정부는 스스로 모든 것을 내려놓고 포기하기를 바랍니다. 그렇지 않는다면 우리가 끌어내겠습니다!\n\n[Communist-State_L] 대표의 한마디는 공장에서 군중들의 열렬한 환호와 함께 노동자들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.204.a: "젠장"
 bankruptcy.204.b: "반격을 시작해라"
 bankruptcy.205.t: "학생 집회를 일으킨 [anarchist_communism_L]"
 bankruptcy.205.d: "'우린 모두 압니다! [ROOT.GetLeader](와)과 [show_ruling_party]의 현 정부는 어떻게 상위 1%의 주머니에 돈을 빼돌릴 수 있는지에만 정신이 팔려 있습니다. 이런 자본주의 세계의 질서에 굴복하는 정부는 무너져야만 합니다!'\n\n[anarchist_communism_L] 대표의 한마디는 여러 대학에서 학생들의 열렬한 환호와 함께 젊은 세대의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.205.a: "젠장"
 bankruptcy.205.b: "반격을 시작해라"
 bankruptcy.206.t: "개발도상국의 정치인들과 회동을 가진 지도자 [Conservative_L]"
 bankruptcy.206.d: "해외 정치인과의 회담에서, 지도자 중 한명인 [Conservative_L](은)는 [ROOT.GetLeader](이)가 경질되는 일이 있더라도, [ROOT.GetNameDef]의 심각한 경제 상황을 타개하기 위해서는 일련의 조치가 취해져야한다고 언급했습니다.\n\n현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.206.a: "젠장"
 bankruptcy.206.b: "반격을 시작해라"
 bankruptcy.207.t: "집회의 지지를 얻는 독재자 [Autocracy_L]"
 bankruptcy.207.d: "'지금 정치인들은 제국주의자들이 권력을 휘어잡고 국가의 흐름을 파괴하도록 모든 걸 내주고 있습니다. 우린 정부를 지원하는데 있어 다른 대안을 찾아야합니다...'\n\n[Autocracy_L] 대표의 한마디는 [ROOT.GetLeader]의 하야를 요구하는 군중들의 열렬한 환호와 함께 시민들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.207.a: "젠장"
 bankruptcy.207.b: "반격을 시작해라"
 bankruptcy.208.t: "열정적인 설교를 진행한 [Mod_Vilayat_e_Faqih_L]"
 bankruptcy.208.d: "'시온주의자의 개와 지옥에서 올라온 타크피리(Takfiri)는 우리 경제를 전복시려는 위대한 사탄의 저주받은 화폐를 사용하고 있습니다. 그들의 목표는 아무래도 독실한 우리 무슬림들을 진압하고 노예로 만드려는게 분명합니다! [ROOT.GetLeader](와)과 시온주의 지도자들은 처단될 것입니다!'\n\n종교 지도자 [Mod_Vilayat_e_Faqih_L]의 한마디는 사원에서 신자들의 열렬한 환호와 함께 종교인들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.208.a: "젠장"
 bankruptcy.208.b: "반격을 시작해라"
 bankruptcy.209.t: "열정적인 설교를 진행한 [Vilayat_e_Faqih_L]"
 bankruptcy.209.d: "'시온주의자의 개와 지옥에서 올라온 타크피리(Takfiri)는 우리 경제를 전복시려는 위대한 사탄의 저주받은 화폐를 사용하고 있습니다. 그들의 목표는 아무래도 독실한 우리 무슬림들을 진압하고 노예로 만드려는게 분명합니다! [ROOT.GetLeader](와)과 시온주의 지도자들은 처단될 것입니다!'\n\n종교 지도자 [Vilayat_e_Faqih_L]의 한마디는 사원에서 신자들의 열렬한 환호와 함께 종교인들의 환영을 받았습니다. 현재 국가의 심각한 경제 상황은 야당의 지지율을 올리는데 완벽한 도구로써 활용될 것입니다."
 bankruptcy.209.a: "젠장"
 bankruptcy.209.b: "반격을 시작해라"
 PERSONAL_INCOME_TAXES: "§C개인세:§!"
 PERSONAL_INCOME_RATE: "$$§G[?population_tax|+3]§!B"
 PERSONAL_INCOME_TAXES_TOOLTIP: "개인세에 따른 수입"
 PERSONAL_INCOME_TAXES_TOOLTIP_DELAYED: "개인세(Population Taxes)는 우리가 시민들에게 부과하는 다양한 종류의 세금입니다. 부가가치세(VAT), 소득세, 부유세, 개인 양도소득세 등을 포함합니다. 우리가 얻는 세금 수입은 인구와 §Y개인세율§!에 따라 달라집니다. §Y개인세 수입§!은 주로 국가의 §Y경기 순환§!과 §Y부패도§!에 의해 보정됩니다. 이 수입은 다양한 국민 정신을 통해서도 변동될 수 있습니다.\n\n개인세가 §Y1%§! 증가할 때마다 사람들은 세금 부담에 대한 서비스 보상을 기대하므로 안정도가 §R-1%§! 감소할 것입니다.\n\n법률, 국민정신 및 기술이 §Y전체 세입§!에 미치는 영향: [?modifier@tax_gain_multiplier_modifier|+%0]\n법률, 국민정신 및 기술이 §Y개인세 세입§!에 미치는 영향: [?modifier@population_tax_income_multiplier_modifier|+%0]\n"
 CORPORATE_INCOME_TAXES: "§L법인세:§!"
 CORPORATE_INCOME_RATE: "$$§G[?corporate_tax|+3]§!B"
 CORPORATE_INCOME_TAXES_TOOLTIP: "법인세로 인한 수입:\n§Y상업화된 농업 지구§!에서 $[?agriculture_district_tax|+3]B\n§Y생계 농업§!에서 $[?agriculture_tax_gain|+3]B\n§Y민간 산업§!에서 $[?civil_fac_tax|+3]B\n§Y군수 산업§!에서 $[?military_fac_tax|+3]B\n§Y해군 조선소§!에서 $[?dockyard_tax|+3]B\n§Y사무 지구§!에서 $[?office_tax|+3]B\n§Y마이크로칩 공장§!에서 $[?microchip_plant_tax|+3]B\n§Y복합소재 공장§!에서 $[?composite_plant_tax|+3]B\n§Y합성 정제소§!에서 $[?synthetic_refinery_tax|+3]B\n§Y원자로§!에서 $[?nuclear_reactor_tax|+3]B\n§Y화석 연료 발전소§!에서 $[?fossil_powerplant_tax|+3]B\n§Y재생 에너지 인프라§!에서 $[?renewable_energy_tax|+3]B\n§Y인터넷 스테이션§!에서 $[?internet_station_tax|+3]B\n§Y보건§!에서 $[?healthcare_tax_gain|+3]B"
 CORPORATE_INCOME_TAXES_TOOLTIP_DELAYED: "법인세(Corporate Taxes)는 우리나라에서 운영되는 기업체에 부과하는 세금입니다. 예를 들면 부가가치세(VAT), 토지세, 그리고 기업 이윤에 대한 세금 등이 있습니다. 우리가 얻는 세금의 양은 국가가 보유한 §Y민간 산업§!, §Y군수 산업§!, §Y해군 조선소§!, §Y사무 지구§! 및 §Y상업화된 농업 지구§!의 수와 §Y법인세율§!에 따라 달라집니다. §Y법인세 수입§!은 주로 국가의 §Y경기 순환§!과 §Y부패도§!에 따라 변동됩니다. 수입은 다양한 국민 정신을 통해서도 변동될 수 있습니다.\n\n법인세는 우리의 §Y조세 비용§! (건설에 사용할 수 없는 §Y민간 산업§!의 개수)을 결정할 뿐만 아니라 타국이 우리 주에 투자하기 위해 지불해야 하는 자금량에도 영향을 줍니다.\n\n법률, 국민정신 및 기술이 §Y전체 세입§!에 미치는 영향: [?modifier@tax_gain_multiplier_modifier|+%0]\n법률, 국민정신 및 기술이 §Y법인세 세입§!에 미치는 영향: [?modifier@corporate_tax_income_multiplier_modifier|+%0]\n생산성이 §Y법인세 세입§!에 미치는 영향: [?productivity_tax_effect_display|+%]\n법률, 국민정신 및 기술이 §Y사무 지구 세입§!에 미치는 영향: [?modifier@office_park_income_tax_modifier|+%0]\n법률, 국민정신 및 기술이 §Y해군 조선소 세입§!에 미치는 영향: [?modifier@dockyard_income_tax_modifier|+%0]\n법률, 국민정신 및 기술이 §Y민간 산업 세입§!에 미치는 영향: [?modifier@civilian_industry_tax_modifier|+%0]\n법률, 국민정신 및 기술이 §Y군수 산업 세입§!에 미치는 영향: [?modifier@military_industry_tax_modifier|+%0]\n법률, 국민정신 및 기술이 §Y상업화된 농업 지구 세입§!에 미치는 영향: [?modifier@agriculture_district_income_tax_modifier|+%0]\n법률, 국민정신 및 기술이 §Y마이크로칩 공장 세입§!에 미치는 영향: [?modifier@microchip_plant_income_tax_modifier|+%0]\n\n법률, 국민정신 및 기술이 §Y복합소재 공장 세입§!에 미치는 영향: [?modifier@composite_plant_income_tax_modifier|+%0]\n\n법률, 국민정신 및 기술이 §Y합성 정제소 세입§!에 미치는 영향: [?modifier@synthetic_refinery_income_tax_modifier|+%0]\n\n법률, 국민정신 및 기술이 §Y보건 수입§!에 미치는 영향: [?modifier@healthcare_income_multiplier_modifier|+%0]\n"
 GOVERNMENT_INVESTMENT: "§G대외 투자:§!"
 GOVERNMENT_INVESTMENT_RATE: "[int_investment_rate_color]"
 GOVERNMENT_INVESTMENT_TOOLTIP: "대외 투자로 인한 수입"
 GOVERNMENT_INVESTMENT_TOOLTIP_DELAYED: "대외 투자는 정부가 보유하고 있는 자산으로써 기업의 주식, 자산 등을 나타냅니다. 대외 투자는 매년 §Y투자 수익률 (ROI)§!을 제공하며 이는 우리 국고에 자동으로 추가됩니다. 보통, 투자 수익률은 6%이나 게임이 진행되면서 변동될 수 있습니다. §Y투자 수익률(ROI)§!은 최대 §Y20%§!로 제한됩니다. 대부분의 §Y대외 투자§!는 우리 §Y국고§!에서 비용을 투자하여 다른 국가에 건설을 진행함에 따라 산출됩니다.\n\n현재 우리의 §Y투자에 대한 수익§!은 [?roi_rate|%0] 입니다.\n\n§Y대외 투자§!의 재투자 토글이 활성화되면, 이 수치는 주간 수익에 포함되지 않을 것입니다.\n\n[int_reinvestment_toggled]\n[int_auto_rejection_toggled]"
 TRADE_INCOME_REVENUES: "§Y자원 수출:§!"
 TRADE_INCOME_RATE: "$$§G[?resource_sale_rate|+3]§!B"
 TRADE_INCOME_REVENUES_TOOLTIP: "자원 수출에 의한 수입:\n§Y화석 연료§!에서 $[?oil_exports|+3]B\n§Y경금속§!에서 $[?aluminium_exports|+3]B\n§Y고무§!에서 $[?rubber_exports|+3]B\n§Y기술금속§!에서 $[?tungsten_exports|+3]B\n§Y강철§!에서 $[?steel_exports|+3]B\n§Y귀금속§!에서 $[?chromium_exports|+3]B\n§Y마이크로칩§!에서 $[?microchip_exports|+3]B\n§Y복합소재§!에서 $[?composite_exports|+3]B"
 TRADE_INCOME_REVENUES_TOOLTIP_DELAYED: "우리가 시장에 내놓은 잉여 자원은 매주 우리에게 현금 수입을 창출합니다. 각 자원은 고유의 단위당 가격을 가지며, §Y마이크로칩§!이 가장 가치가 높고 그 다음이 §Y복합소재§!입니다. 참고: 바닐라 무역 계약을 통해 다른 나라에 판매된 자원은 §Y민간 공장§!(CIC 유입)으로 지불됩니다 — 해당 CIC 지불은 여기에 표시된 현금 수입과 별개이자 추가로 이루어지는 바닐라 무역 시스템입니다.\n\n법률, 국민 정신 및 기술이 §Y자원 수출§!에 미치는 영향: [?modifier@resource_export_multiplier_modifier|+%0]\n법률, 국민 정신 및 기술이 §Y화석 연료 수출§!에 미치는 영향: [?ROOT.modifier@oil_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y강철 수출§!에 미치는 영향: [?ROOT.modifier@steel_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y경금속 수출§!에 미치는 영향: [?ROOT.modifier@aluminium_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y기술 금속 수출§!에 미치는 영향: [?ROOT.modifier@tungsten_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y귀금속 수출§!에 미치는 영향: [?ROOT.modifier@chromium_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y고무 수출§!에 미치는 영향: [?ROOT.modifier@rubber_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y마이크로칩 수출§!에 미치는 영향: [?ROOT.modifier@microchip_export_multiplier_modifier|%+3]\n법률, 국민 정신 및 기술이 §Y복합소재 수출§!에 미치는 영향: [?ROOT.modifier@composite_export_multiplier_modifier|%+3]"
 ADDITIONAL_INCOME_REVENUES: "§H기타 수입:§!"
 ADDITIONAL_INCOME_RATE: "$$§G[?additional_income_rate|+3]§!B"
 ADDITIONAL_INCOME_REVENUES_TOOLTIP: "기타 수입:\n[additional_income_summary_seigniorage][additional_income_summary_turkey_bosphorus_tax][additional_income_summary_full_control_of_suez][additional_income_summary_partial_control_of_suez][additional_income_summary_full_control_of_panama][additional_income_summary_saudi_aid][additional_income_summary_iranian_aid][additional_income_summary_iranian_aid_custom][additional_income_WAA_Narcotics_Producer][additional_income_summary_blood_diamond_trade][additional_income_summary_USA_usaid][additional_income_summary_EU_subsidies][additional_income_pmc][MICROSTATE_fix_scl][additional_income_summary_agrarian_economy][additional_income_drug_trade_money][additional_income_deal_with_devil][AZE_indian_ports_idea_gain][additional_income_gulf_exploitation][SYR_syrian_bakadash][additional_income_summary_iron_control_vdp][additional_income_market_value][additional_income_mnt_yacht][additional_income_DEN_consume_tax][additional_income_summary_FRA_idea_Light_for_Europe][additional_income_summary_FRA_cfa_franc_custodian][additional_income_summary_FRA_space_program][additional_income_LBA_oil_nationalisation][additional_income_civ_guns][additional_income_overlord_subsidies][additional_income_taxing_religious_institutions][additional_income_greenland_colonial_subsidy][additional_income_summary_ENG_ADS_money][additional_income_SOV_baikonur_kaz_idea][additional_income_ARM_marz_arm][additional_income_landmark_kaaba_tourism][additional_income_gateway_to_asia][additional_earn_lgbt_money][additional_income_summary_HOL_dutchaid][additional_income_HLS_holy_idea][additional_income_COM_zanzibar_agreement][additional_income_COM_african_mercenaries][additional_income_summary_BOL_tourism][additional_income_stolen_from_hungarian_trade][additional_income_energy_load_sharing][additional_income_war_reparations][ABK_additional_incomes][AFG_additional_incomes][BLR_additional_incomes][BOS_additional_incomes][BOT_additional_incomes][BUL_additional_incomes][CHE_additional_incomes][CRM_additional_incomes][EGY_additional_incomes][GEO_additional_incomes][GER_additional_incomes][HEZ_additional_incomes][IRQ_additional_incomes][KHM_additional_incomes][KOS_additional_incomes][LIC_additional_incomes][NKO_additional_incomes][NRY_additional_incomes][PER_additional_incomes][RAJ_additional_incomes][SIN_additional_incomes][SMA_additional_incomes][SOO_additional_incomes][SPR_additional_incomes][SWE_additional_incomes][SOV_additional_incomes][TAJ_additional_incomes][TAT_additional_incomes][additional_income_summary_ENG_columbia_oil][additional_income_GRE_golden_visa][additional_income_HOL_BOT][additional_income_KOR_samsung_phone_sales_gain]"
 ADDITIONAL_INCOME_REVENUES_TOOLTIP_DELAYED: "기타 수입은 우리 정부를 위한 기타 다양한 세입원을 모두 포함합니다. 이 추가 수입은 진행 중인 결정이나 국민 정신에서 나올 수 있습니다."
 BUREAU_RATE: "$$§R[?bureaucracy_gain|-3]§!B"
 BUREAUCRACY_EXPENSE_TOOLTIP: "행정 비용"
 BUREAUCRACY_EXPENSE_TOOLTIP_DELAYED: "행정 비용은 국가의 행정을 운영하는데 쓰이는 비용입니다. 기본 비용은 인구 및 §Y행정§! 단계에 따라 조정되는 인프라 및 운영비를 포함합니다. 또한 행정 단계가 높을수록 더 많은 인구를 공무원으로 고용하게 되며, 이들의 급여는 인프라 비용에 추가됩니다. 즉, bureau_05 단계의 주는 가장 높은 운영비 배율과 가장 큰 임금 비용을 모두 지불한다는 의미입니다.\n\n1인당 국내총생산(GDP/C)이 §Y행정 비용§!에 미치는 영향: [?education_cost_gdp_multiplier_display|-%0]\n법률, 국민정신 및 기술이 §Y행정 비용§!에 미치는 영향: [?modifier@bureaucracy_cost_multiplier_modifier|-%0]\n§Y인플레이션§!이 §Y행정 비용§!에 미치는 영향: [?inflation_rate_var|-%]\n\n정부 행정 인력 충원: [?bureaucracy_manpower_fulfillment|%0]"
 DEFENCE_SPENDING: "§O국방:§!"
 DEFENCE_RATE: "$$§R[?defence_gain|-3]§!B"
 DEFENCE_SPENDING_TOOLTIP: "국방 지출 내역:\n§Y기반 비용§!에서 $[?defence_breakdown_industry|-3]B\n§Y육군 작전 비용§!에서 $[?defence_breakdown_land|-3]B\n§Y해군 작전 비용§!에서 $[?defence_breakdown_navy|-3]B\n§Y공군 작전 비용§!에서 $[?defence_breakdown_airforce|-3]B\n§Y사이버 사령부 비용§!에서 $[?defence_breakdown_cyber|-3]B"
 DEFENCE_SPENDING_TOOLTIP_DELAYED: "국방비는 군대 운용에 쓰이는 자금입니다. 국방비는 §Y기반 비용§!과 §Y작전 비용§! 두 가지로 구성됩니다. §Y기반 비용§!은 방위 산업을 유지하는 데 쓰입니다. 군수 공장과 조선소당 기본 비용은 §Y국방비§! 법률을 따릅니다. 법률 단계가 높을수록 비용이 증가합니다. 또한 §Y1인당 국내총생산(GDP/C)§!도 비용을 증가시킵니다. §Y대공 및 미사일 방어§! 비용도 여기에 추가됩니다.\n\n§Y작전 비용§!은 배치된 대대, 함선, 항공기 수와 비축된 장비 및 항공기 수에 따라 책정됩니다. 이 비용은 §Y징병법§!, §Y장교 육성법§!, §Y1인당 국내총생산(GDP/C)§!에 의해 조정됩니다.\n\n§Y사이버 사령부 비용§!은 국가 사이버 프로그램을 유지하기 위한 주간 운영비입니다. 이 비용은 §YGDP§! 및 §Y역량 등급§!에 비례하며, §Y사이버 보안 인프라 비용§! 변동치에 의해 조절됩니다.\n\n1인당 GDP가 §Y기반 비용§!에 미치는 영향: [?defence_breakdown_industry_gdp_modifier|-%0]\n1인당 GDP가 §Y임금§!에 미치는 영향: [?defence_breakdown_personnel_gdp_modifier|-%0]\n법률, 국민정신 및 기술이 §Y임금§!에 미치는 영향: [?modifier@personnel_cost_multiplier_modifier|-%0]\n§Y인플레이션§!이 §Y기반 비용§! 및 §Y장비 비용§!에 미치는 영향: [?inflation_rate_var|-%]\n§Y사이버 비용§! 변동치: [?modifier@cyber_cost_multiplier_modifier|-%0]"
 POLICE_SPENDING: "§8치안:§!"
 POLICE_RATE: "$$§R[?security_gain|-3]§!B"
 POLICE_SPENDING_TOOLTIP: "치안"
 POLICE_SPENDING_TOOLTIP_DELAYED: "치안은 경찰 뿐만 아니라 정보 기관 형태의 외부 안보 시스템과 같은 국내 보안에 필요한 지출을 나타냅니다. 내부 보안의 기본 비용은 전체 인구와 §Y치안 예산§!의 각 단계에 따른 비용 증가에 바탕을 두고 있습니다.\n\n1인당 국내총생산이 §Y내부 보안 비용§!에 미치는 영향: [?education_cost_gdp_multiplier_display|-%0]\n법률, 국민정신 및 기술이 §Y내부 보안 비용§!에 미치는 영향: [?modifier@police_cost_multiplier_modifier|-%0]\n§Y인플레이션§!이 §Y내부 보안 비용§!에 미치는 영향: [?inflation_rate_var|-%]"
 EDUCATION_RATE: "$$§R[?education_gain|-3]§!B"
 EDUCATION_EXPENSE_TOOLTIP: "교육 비용"
 EDUCATION_EXPENSE_TOOLTIP_DELAYED: "교육 비용은 공립 및 사립 학교, 연구와 교육의 지원에 필요한 지출을 나타냅니다. 교육의 기본 비용은 전체 인구와 더불어 §Y교육 예산§! 단계에 따라 달라집니다.\n\n1인당 국내총생산이 §Y교육 비용§!에 미치는 영향: [?education_cost_gdp_multiplier_display|-%0]\n법률, 국민정신 및 기술이 §Y교육 비용§!에 미치는 영향: [?education_cost_multiplier_display|-%0]\n연구 슬롯 개수가 §Y교육 비용§!에 미치는 영향: [?research_slot_modifier|-%0]\n\n§Y실험 시설§!에 지출되는 총 §Y교육 비용§! : $[?total_facilities_spending_display_var|3%]\n§Y인플레이션§!이 §Y교육 비용§!에 미치는 영향: [?inflation_rate_var|-%]"
 HEALTHCARE_EXPENSE: "§P보건:§!"
 HEALTHCARE_RATE: "$$§R[?health_gain|-3]§!B"
 HEALTHCARE_EXPENSE_TOOLTIP: "보건 비용"
 HEALTHCARE_EXPENSE_TOOLTIP_DELAYED: "보건 비용은 보건 의료, 보험비, 의약품 지원 등의 공공 의료 시스템 지원에 필요한 지출을 나타냅니다. 보건 시스템의 기본 비용은 전체 인구와 더불어 §Y보건 예산§! 단계에 따른 비용 증가에 바탕을 두고 있습니다.\n\n1인당 국내총생산이 §Y보건 비용§!에 미치는 영향: [?education_cost_gdp_multiplier_display|-%0]\n법률, 국민정신 및 기술이 §Y보건 비용§!에 미치는 영향: [?modifier@health_cost_multiplier_modifier|-%0]\n§Y인플레이션§!이 §Y보건 비용§!에 미치는 영향: [?inflation_rate_var|-%]"
 WELFARE_RATE: "$$§R[?welfare_gain|-3]§!B"
 WELFARE_EXPENSE_TOOLTIP: "복지 비용"
 WELFARE_EXPENSE_TOOLTIP_DELAYED: "복지 비용은 실업급여, 연금, 그리고 의료 및 보건 시스템과 다른 다양한 혜택을 제공하는 사회 프로그램에 사용되는 지출을 나타냅니다. 복지의 기본 비용은 전체 인구와 더불어 §Y사회 복지 비용§! 단계에 따른 비용 증가에 바탕을 두고 있습니다.\n\n1인당 국내총생산이 §Y복지 비용§!에 미치는 영향: [?education_cost_gdp_multiplier_display|-%0]\n법률, 국민정신 및 기술이 §Y복지 비용§!에 미치는 영향: [?modifier@social_cost_multiplier_modifier|-%0]\n§Y인플레이션§!이 §Y복지 비용§!에 미치는 영향: [?inflation_rate_var|-%]"
 INTEREST_EXPENSE: "§R부채 이자:§!"
 INTEREST_EXPENSE_TOOLTIP: "지불된 이자"
 INTEREST_EXPENSE_TOOLTIP_DELAYED: "We have to pay interest on the debt that our nation has accrued. Our interest rate is mainly dictated by our §YDebt to GDP ratio§!. The higher the ratio is, the less trust various financial institutions have in our ability to pay the debt back, thus leading to a higher interest rate. Our interest rate can be affected by various §YNational Spirits§!.\n\nHaving a higher §YInterest Rate§! than §Y10%§! will give us access to emergency decisions to handle our growing debt. After the interest rises above §Y15%§!, our economy will begin to slow down and we will suffer from other adverse effects. At this point, we will have the ability to default on our debt (at a great cost). Once our §YInterest§! goes above §Y20%§!, we won't be able to manually take more debt. If our §YInterest on Debt§! exceeds our §YGross Income§!, our nation will collapse.\n\nOur current §YInterest Rate§! is [?interest_rate|3]%\n\nOur current Debt-to-GDP Ratio: §Y[?debt_ratio|%1]§!\n\nIdea impact on §YInterest Rate§!: [?interest_rate_multiplier|-2]%\n[debt_automatic_repayment_toggled]"
