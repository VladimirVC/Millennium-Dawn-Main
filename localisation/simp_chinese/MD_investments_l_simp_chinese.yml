 investments_construction_CIC: "§Y民用工厂§!\n该建筑为地区提供生产民用商品或建造新建筑的工业能力。如有需要可转换为军用工厂。\n\n§Y每座建筑基础造价：§! §R$[?global.build_cost_array^1|3]§!B"
 investments_construction_CIC_delayed: "§Y前置条件§!：\n[!investments_building_cic_button_click_enabled]"
 investments_construction_MIC: "§Y军用工厂§!\n此建筑为国家提供生产新军事装备的工业能力，如有需要可转换为民用工业。\n\n§Y每座建筑基础造价：§! §R$[?global.build_cost_array^2|3]§!B"
 investments_construction_MIC_delayed: "§Y前置条件§!：\n[!investments_building_mic_button_click_enabled]"
 investments_construction_NIC: "§Y海军船坞§!\n该建筑为地区提供建造新船只的工业能力。\n\n§Y每座基础造价：§! §R$[?global.build_cost_array^3|3]§!B"
 investments_construction_NIC_delayed: "§Y前置条件§!：\n[!investments_building_nic_button_click_enabled]"
 investments_construction_INF: "§Y基础设施§!\n该建筑可提升地区基建水平，增强战略区域的补给能力，提高部队移动速度，并提高资源开采效率。\n\n§Y每级基础造价：§! §R$[?global.build_cost_array^4|3]§!B"
 investments_construction_INF_delayed: "§Y前置条件§!：\n[!investments_building_infra_button_click_enabled]"
 investments_construction_offices: "§Y办公园区§!\n办公园区代表了除采掘业和重工业之外的所有其他经济产业。这些产业包括金融、客户服务、信息技术、零售业等等。\n\n§Y每座建筑基础成本：§! §R$[?global.build_cost_array^5|3]§!B"
 investments_construction_offices_delayed: "§Y前置条件§!：\n[!investments_building_offices_button_click_enabled]"
 investments_construction_AA: "§Y短程防空系统阵地§!\n§Y短程防空系统阵地§!是由一系列防空武器和战术组成的综合体及编组，专门应对低空空中威胁。这些站点协同运作，将空域划分为可防御区域，为本地军事目标和基础设施提供覆盖从直升机、低空飞机到喷气式战机等各类空中威胁的防空掩护。\n\n§Y每座建筑基础造价：§! §R$[?global.build_cost_array^6|3]§!B"
 investments_construction_AA_delayed: "§Y前置条件§!：\n[!investments_building_antiair_button_click_enabled]"
 investments_construction_RAD: "§Y雷达站§!\n雷达站可使您获取附近地区敌军的情报。其由各类雷达与传感器，以及情报资产和分析局势变化能力构成。\n更高等级将提升有效侦测范围。\n其雷达还能提升该地区对敌方空军的探测能力，使您的战机有更大概率拦截敌机。\n此外，雷达还将增强对海上敌方舰队的侦测。\n\n§Y每座设施基础造价：§! §R$[?global.build_cost_array^7|3]§!B"
 investments_construction_RAD_delayed: "§Y前置条件§!：\n[!investments_building_radar_button_click_enabled]"
 investments_construction_AIR: "§Y空军基地§!\n该建筑为地区提供部署空军的设施。\n\n§Y每级建筑基础花费：§! §R$[?global.build_cost_array^8|3]§!B"
 investments_construction_AIR_delayed: "§Y前置条件§!：\n[!investments_building_airbase_button_click_enabled]"
 investments_construction_fuel_silo: "§Y战略资源储备§!\n该建筑为你的国家提供更多储存§H燃油§!的空间。\n\n§Y每座建筑基础造价：§! §R$[?global.build_cost_array^9|3]§!B"
 investments_construction_fuel_silo_delayed: "§Y前置条件§!：\n[!investments_building_fuel_silos_button_click_enabled]"
 investments_construction_internet_station: "§Y通信基础设施§!\n通信基础设施是用于电信和无线电通信领域的高耸结构，旨在跨越大距离传输信号，或通过地下光纤电缆和云计算系统实现通信。\n\n每级§Y网络基础设施§!提升本地生产力增长速度§G+5.00%§!。\n每级§Y网络基础设施§!缩短§Y国际投资§!持续时间§G-5.00%§!。\n\n§Y每座基础设施基础成本：§! §R$[?global.build_cost_array^10|3]§!B"
 investments_construction_internet_station_delayed: "§Y前置条件§!：\n[!investments_building_internet_station_button_click_enabled]"
 investments_construction_REF: "§Y可再生能源基础设施§!\n可再生能源基础设施是对所有可再生能源的统称，包括但不限于太阳能园区、风力涡轮机、生物燃料精炼厂、木炭厂、生物燃料发电厂等。因此，它利用可再生资源并从这些资源中生产燃料。\n\n§Y每座基础设施基础成本：§! §R[?global.build_cost_array^11|3]§!B"
 investments_construction_REF_delayed: "§Y前置条件§!：\n[!investments_building_ref_button_click_enabled]"
 investments_construction_POWER_PLANT: "§Y化石燃料发电站§!\n是所有基于化石的热电能源的总称。 这些包括但不限于； 煤炭、天然气和石油。这些能源包括但不限于：煤炭、天然气和石油。\n\n§Y每座建筑基础成本：§! §R$[?global.build_cost_array^12|3]§!B"
 investments_construction_POWER_PLANT_delayed: "§Y前置条件§!：\n[!investments_building_power_plant_button_click_enabled]"
 investments_construction_NUCLEAR_REACTOR: "§Y核反应堆§!\n核反应堆建筑将核能转化为电能，在此过程中消耗中浓度浓缩铀。\n\n§Y每座建筑基础造价：§! §R$[?global.build_cost_array^13|3]§!B"
 investments_construction_NUCLEAR_REACTOR_delayed: "§Y前置条件§!：\n[!investments_building_nuclear_reactor_button_click_enabled]"
 investments_construction_agriculture_district: "§Y商业化农业区§!\n商业化农业区是我国所有非自给农业的总称。它包括农业工业、耕地、粮仓、屠宰场等。\n\n§Y每座建筑基础成本：§! §R$[?global.build_cost_array^14|3]§!B"
