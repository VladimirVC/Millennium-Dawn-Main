 belarus_another.41.t: "作戦「新しき日」"
 belarus_another.41.d: "ベラルーシ政府はスヴァウキ回廊問題を解消するためにリトアニアに対する共同軍事作戦を我々に提案している。我々はそのような危険な一歩を踏み出すことに同意するだろうか？"
 belarus_another.41.a: "我々は国境を確保しなければならない。"
 belarus_another.41.b: "我々はリスクを冒さないだろう。"
 belarus_another.42.t: "ベラルーシ、ヴィリニュスを要求。"
 belarus_another.42.d: "ベラルーシ政府はヴィリニュスとその周辺地域を彼らの完全な支配下に置くことを望む意向を表明した。彼らの主張は、これが歴史的なベラルーシの土地であるという事実にに基づいている。我々はこれに同意するだろうか？"
 belarus_another.42.a: "我々はヴィリニュスを彼らに引き渡し、友好関係を強化するだろう"
 belarus_another.42.b: "多分、我々はそれを自分たちのために保持するだろう"
 belarus_another.43.t: "ジーンズ革命の結果"
 belarus_another.43.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change and it is time to cede power to others?"
 belarus_another.43.a: "ありえない"
 belarus_another.43.b: "どうやら変化の時代が来たようだ。"
 belarus_another.44.t: "チハノウスカヤ指導下の抗議。"
 belarus_another.44.d: "We did not expect such strong popular unrest. Perhaps our country truly needs change, and it is time to cede power to others?"
 belarus_another.44.a: "ありえない"
 belarus_another.44.b: "どうやら変化の時代が来たようだ。"
 belarus_GDL.1.t: "ベラルーシ、我が国支配を希望。"
 belarus_GDL.1.d: "Pro-Belarusian nationalists have significant influence in our country, so the Belarusian authorities have issued us an ultimatum — allow them into the government or face the consequences. What do we say to that?"
 belarus_GDL.1.a: "同意しよう。"
 belarus_GDL.1.b: "ありえない"
 belarus_GDL.2.t: "ベラルーシへの編入。"
 belarus_GDL.2.d: "我が国はベラルーシの完全な影響下に置かれた。我々には選択肢がなく、編入法に署名する準備ができている。"
 belarus_GDL.2.a: "これが物語だ。"
 belarus_azot.1.t: "ベラルーシ、化学肥料貿易協定を提案。"
 belarus_azot.1.d: "Belarus recently reached out and proposed an exclusive contract for the best fertilizers they can offer. Accepting it will surely increase our crop yield, though politically this maneuver may be questionable in some eyes."
 belarus_azot.1.a: "もちろんだ。"
 belarus_azot.1.b: "現時点では不可能だ。"
 belarus_azot.2.t: "[From.GetName]、受諾"
 belarus_azot.2.d: "Our efforts to make a deal with [From.GetName] have finally come to a conclusion. The contract was signed and the first payment is about to be received."
 belarus_azot.2.a: "ようやく、良いニュースだ。"
 belarus_azot.3.t: "[From.GetName]、我らが取引を拒否。"
 belarus_azot.3.d: "Our efforts to make a deal with [From.GetName] seem to be futile. We have not received an answer, and the matter appears to be going nowhere."
 belarus_azot.3.a: "くそったれ、[From.GetNameDef]め！"
 belarus_azot.4.t: "[From.GetName]、契約を無効化。"
 belarus_azot.4.d: "We have received stunning news — [From.GetName] is canceling their fertilizer contract with us. We will not be able to sell them our product, at least for now."
 belarus_azot.4.a: "愚か者め！彼らは何を失うか分かっていない！"
 BLR_Azot_category: "グロドノ・アゾト肥料貿易"
 BLR_Azot_category_desc: "グロドノ・アゾトがアクセスできる市場数に焦点を当てることは、ベラルーシ経済の多様性と拡大にとって不可欠である。自由に使える様々な種類の肥料と農薬は、多くの国々にとって有用である可能性がある。他の国々と契約を確立し、我々の肥料生産を拡大することは、国家とベラルーシ人民に大きな歳入をもたらすだろう。\n\n貿易から得られる収入は、署名した契約数に10パーセントを掛けたものによって決定される。\n§Y現在の肥料契約：§! [?current_azot_capacity]/[?current_max_azot_capacity]\n§Y肥料上限：§! [?current_max_azot_capacity]/[?max_azot_capacity]"
