 NKO_milestone_win: "里程碑式的胜利"
 arduous_march_modifiers_desc: "苦难的行军给我们国家带来了沉重的损失。为了确保人民的未来，我们必须采取战略措施，克服这一困难，带领国家走向繁荣。这些措施包括提高农业产量、确保人道主义援助，以及改革我们的内部政策，以确保稳定和增长。"
