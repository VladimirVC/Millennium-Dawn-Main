 indonesia.5865.t: "災害接近！"
 indonesia.5865.d: "インドネシアでは、多くの災害が発生するだろう。インドネシアの安定を確保するために、「ディシジョン」タブを確認し、「インドネシアの恐ろしい運」の下で与えられたタスクを完了することを確認せよ。最初のタスクは、産業災害を防ぐためにカリマンタンに造船所を建設することである、幸運を祈る！"
 indonesia.5865.a: "了解"
 indonesia.76854.t: "インドネシアが併合要請"
 indonesia.76854.d: "地震後の支援を受けた後、インドネシア政府は我々に協力するよう要請している。もし協力すれば、我々が戦ってきた全てを失うことになるが、それは平和の名のもとにだ。協力しなければ、紛争が再び燃え上がるのを目の当たりにするだろう..."
 indonesia.76854.a: "やろう"
 indonesia.76854.b: "今までの努力を無駄にはしない"
 IND_disasters_mechanic_532121: "災害注意喚起"
 indonesia.577.d1: "A disastrous tsunami has hit Banda Aceh, and other parts of the province. The already crippled region from the years of guerilla warfare and resistance is now devastated even more than it was before. It is imperative we begin to look at recovery efforts for this area else we risk another uprising."
 IND_Aceh_insurgency_desc: "Aceh has been in a state of disarray and rebellion since 1976, and it's causing our nation instability and unnecessary bloodshed. Our military is way too focused on dealing with these insurgents, and it is causing us to fall behind militarily."
 IND_Aceh_insurgency2_desc: "Aceh has been in a state of disarray and rebellion since 1976, and it's causing our nation instability and unnecessary bloodshed. Our military is way too focused on dealing with these insurgents, and it is causing us to fall behind militarily."
