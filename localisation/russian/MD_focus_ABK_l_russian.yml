 ABK_unesko: "Пригласить ЮНЕСКО"
 ABK_unesko_desc: "Абхазия — очень древняя земля с богатой историей и культурой. Теперь мы можем пригласить ЮНЕСКО помочь нам сохранить это наследие."
 ABK_free_zone: "Свободная экономическая зона"
 ABK_free_zone_desc: "Теперь мы можем создать полноценную свободную экономическую зону, которая привлечет инвестиции в нашу экономику."
 ABK_we_are_country: "Мы являемся признанным государством."
 ABK_we_are_country_desc: "Наконец-то мы добились того, чего добивались много лет - теперь наше государство признано!"
 ABK_union_state: "Присоединиться к союзному государству"
 ABK_union_state_desc: "Мы готовы присоединиться к Союзному государству. Такой тип отношений с Россией нас вполне устраивает."
 ABK_korea_trade: "Торговля с КНДР"
 ABK_korea_trade_desc: "Мы готовы установить торговые отношения с КНДР."
 ABK_monarchy_eng: "Дружба с английской монархией"
 ABK_monarchy_eng_desc: "Наши монархи должны установить дружеские связи."
 ABK_friend_russia: "Дружба с коммунистической Россией"
 ABK_friend_russia_desc: "Только коммунисты, находящиеся у власти в России, могут быть нашими партнерами и друзьями."
 ABK_friend_georgia: "Дружба с Грузией"
