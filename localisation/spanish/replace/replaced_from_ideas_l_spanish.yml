 nationalism_desc: "Los gobiernos nacionalistas creen haber salido perjudicados por la globalización y buscan un renacimiento nacional basado en el proteccionismo, la militarización y la soberanía nacional y étnica. Detestan las instituciones liberales globales, pero pueden mantener una postura pragmática en sus alianzas internacionales para promover sus objetivos internos o expansionistas."
