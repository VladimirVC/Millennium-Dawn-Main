 EU_news.32.t: "Program OMT"
 EU_news.32.d: "EBC rozpoczął program OMT."
 EU_news.32.a: "Dobra"
 EU_news.33.t: "Program OMT kończy się"
 EU_news.33.d: "Aktualny Program OMT EBC dobiega końca."
 EU_news.33.a: "Dobra"
 EU_news.45.t: "Zmniejsz program OMT"
 EU_news.45.d: "EBC ograniczył swój program OMT.\n§Limit wielkości YOMT§!: Dodaj §R-200$§! miliardów.\nWszystkie państwa członkowskie z §Ystopą procentową§! < §R4.0%§!: Dodaj §G-5%§! Eurosceptycyzm.\nWszystkie państwa członkowskie z §Ystopą procentową§! > §R4,0%§!: Dodaj §R+5%§! Eurosceptycyzm.\n"
 EU_news.45.a: "Dobra"
 EU_news.46.t: "Rozwiń Program OMT"
 EU_news.46.d: "EBC rozszerzył swój program OMT.\n§Limit wielkości YOMT§!: Dodaj §G+200$§! miliardów.\nWszystkie państwa członkowskie z §Ystopą procentową§! < §R4.0%§!: Dodaj §R+5%§! Eurosceptycyzm.\nWszystkie państwa członkowskie z §Ystopą procentową§! > §R4.0%§!: Dodaj §G-5%§! Eurosceptycyzm.\n"
