 CPD_country_action_full_puppet: "§YFull Puppet§!"
 CPD_country_action_ceasefire_TT: "A §YCeasefire§! ends the war with the current front line as the new border. A §Y720-day§! truce holds afterward.\n\nClick to remove from deal."
 CPD_country_action_war_reparations_TT: "§YWar Reparations§! force the loser to pay a weekly portion of their GDP to the receiver for one year.\n\nClick to remove from deal."
 CPD_country_action_forced_neutrality_TT: "§YForced Neutrality§! removes the target from their faction and bars them from joining another for five years.\n\nClick to remove from deal."
 CPD_country_action_regime_change_TT: "§YRegime Change§! installs our ruling party in the target's government. Expect lasting political instability.\n\nClick to remove from deal."
 CPD_country_action_military_basing_TT: "§YMilitary Basing§! grants the receiving party free passage and stationing rights through the other's territory.\n\nClick to remove from deal."
 CPD_country_action_full_puppet_TT: "§YFull Puppet§! reduces the entire target to a subject state.\n\nClick to remove from deal."
