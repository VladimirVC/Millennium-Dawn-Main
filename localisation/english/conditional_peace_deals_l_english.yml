l_english:
 # Peace Deal Builder GUI
 CPD_demands_tab_button_TEXT: "Make Demands"
 CPD_demands_tab_button_TEXT_DELAYED: "We will demand concessions from [THIS.GetNameWithFlag]."
 CPD_concessions_tab_button_TEXT: "Make Concessions"
 CPD_concessions_tab_button_TEXT_DELAYED: "We will offer concessions to [THIS.GetNameWithFlag]."
 CPD_peace_deal_builder_selected_deal_type_title: "[CPD_peace_deal_builder_selected_deal_type_title]"
 CPD_peace_deal_builder_selected_deal_type_title_one: "Currently Demanding Concessions"
 CPD_peace_deal_builder_selected_deal_type_title_two: "Currently Offering Concessions"

 CPD_peace_deal_builder_ACTIONABLE_STATES_TITLE_TEXT: "Actionable States"
 CPD_peace_deal_builder_CURRENT_DEAL_TITLE_TEXT: "Current Deal"

 # Section Headers
 CPD_STATE_ACTIONS_HEADER: "§Y--- State Actions ---§!"
 CPD_COUNTRY_ACTIONS_HEADER: "§Y--- Country Actions ---§!"

 # Button Labels
 CPD_ANNEX_BTN: "Annex State"
 CPD_PUPPET_BTN: "Puppet State"
 CPD_DEMILITARISE_BTN: "Demilitarise"
 CPD_LIBERATE_BTN: "Liberate"
 CPD_RESOURCE_RIGHTS_BTN: "Resource Rights"
 CPD_CEASEFIRE_BTN: "Ceasefire"
 CPD_WAR_REPS_BTN: "War Reparations"
 CPD_NEUTRALITY_BTN: "Neutrality"
 CPD_REGIME_CHANGE_BTN: "Regime Change"
 CPD_MIL_BASING_BTN: "Military Basing"
 CPD_FULL_PUPPET_BTN: "Full Puppet"

 # Resource Rights Button
 CPD_resource_rights_button_TT: "§YResource Rights§!"
 CPD_resource_rights_button_TT_DELAYED: "Securing §YResource Extraction Rights§! diverts the selected states' resource output to us. The states themselves remain under their current owner; only the oil, steel, aluminium, rubber, tungsten, and chromium they produce flow to our economy. The arrangement holds until reversed by another peace deal."

 # Military Basing Button
 CPD_military_basing_button_TT: "§YMilitary Basing§!"
 CPD_military_basing_button_TT_DELAYED: "§YMilitary Basing Rights§! grant our forces free passage through this nation's territory. Our troops may move and station themselves freely until access is revoked."

 # Full Country Puppet Button
 CPD_full_puppet_button_TT: "§YFull Puppet§!"
 CPD_full_puppet_button_TT_DELAYED: "Demanding §YFull Puppet§! turns this entire nation into our subject. They keep their borders and population but lose foreign-policy independence; their economy, manpower, and military answer to us. Any state-puppeting demands already in this deal are subsumed."

 # Ceasefire Button
 CPD_ceasefire_button_TT: "§YCeasefire§!"
 CPD_ceasefire_button_TT_DELAYED: "A §YCeasefire§! ends the war with the front line as it stands. Each side keeps the states they currently control regardless of who held them before. The truce holds for §Y720 days§! before either side may again declare war on the other.\n\nA ceasefire and territorial demands cannot share a deal. Activating ceasefire clears all state-level entries from the current proposal."

 # War Reparations Button
 CPD_war_reparations_button_TT: "§YWar Reparations§!"
 CPD_war_reparations_button_TT_DELAYED: "§YWar Reparations§! oblige the loser to pay a portion of their GDP weekly for one year. The transfer appears as a new expense on the payer's budget and as new income on the receiver's.\n\n[CPD_reparations_preview]"
 CPD_reparations_preview_TT: "Projected transfer for this deal: §Y£[?CPD_rep_preview_temp|.2]B per week§! (~§Y£[?CPD_rep_preview_total_temp|.0]B§! over the year)"

 # Forced Neutrality Button
 CPD_forced_neutrality_button_TT: "§YForced Neutrality§!"
 CPD_forced_neutrality_button_TT_DELAYED: "§YForced Neutrality§! removes this nation from their faction on signing and bars them from joining or forming another for §Yfive years§!."

 # Regime Change Button
 CPD_regime_change_button_TT: "§YRegime Change§!"
 CPD_regime_change_button_TT_DELAYED: "§YRegime Change§! replaces the target's ruling party with the one currently in power in our nation. Their coalition is dissolved and a leader of our political stripe is installed. The new government carries §Ypost-war instability§! for two years, and Islamic nations may see a §Ysalafist backlash§! against foreign-imposed rule."

 # Money-system breakdown line items — surface the weekly reparations transfer
 # in the player's income/expense summary alongside other additional flows.
 additional_income_war_reparations_tt: "$$[?CPD_reparations_weekly|+3] from §YWar Reparations§!\n"
 additional_expense_war_reparations_tt: "$$[?CPD_reparations_weekly|-3] from §YWar Reparations§!\n"

 # Ideas
 CPD_war_reparations_payer: "War Reparations (Paying)"
 CPD_war_reparations_payer_desc: "We are paying war reparations as a result of a peace deal. A weekly cash transfer appears as an additional expense on our budget for §Y1 year§!."
 CPD_war_reparations_receiver: "War Reparations (Receiving)"
 CPD_war_reparations_receiver_desc: "We are receiving war reparations as a result of a peace deal. A weekly cash transfer appears as additional income on our budget for §Y1 year§!."
 CPD_forced_neutrality_spirit: "Enforced Neutrality"
 CPD_forced_neutrality_spirit_desc: "As a condition of the peace deal, our nation is prohibited from joining or creating military alliances."
 CPD_regime_change_instability: "Post-War Political Instability"
 CPD_regime_change_instability_desc: "A forced regime change has destabilized our political system."

 CPD_peace_deal_explainer_ICON_TT: "How the Peace Deals Work"
 CPD_peace_deal_explainer_ICON_TT_DELAYED: "Constructing a peace deal is as simple as selecting a tab above and then choosing what to concede or demand within a state.\n\nBuilding a peace deal that has a §Ynegative§! cost will likely be accepted by an AI, whereas building a peace deal that has a §Ypositive§! cost is less likely to be accepted. You can see the full breakdown of the AI's willingness to accept a deal by hovering over the acceptance box.\n\nAny peace deal built for a player is not affected by these values."

 # Annex State Localization
 CPD_annex_state_button_TT: "[CPD_ANNEX_STATE_TT_LOC]"
 CPD_annex_state_button_TT_DELAYED: "[CPD_ANNEX_STATE_TT_DELAYED_LOC]"

 CPD_annex_state_button_TT_DEMAND: "Demand States"
 CPD_annex_state_button_TT_CONCESSION: "Concede States"

 CPD_annex_state_button_TT_DELAYED_DEMAND: "Selected enemy territories are annexed into our nation along with their people, factories, and resources. States we have cores on cost half the strategic value; claimed states a third. Demanding land the original owner still holds doubles the cost."
 CPD_annex_state_button_TT_DELAYED_CONCESSION: "To §YConcede States§! is to hand them to the enemy. Each conceded territory reduces the overall cost of the deal, sweetening our other demands."

 # Make Puppet Localization
 CPD_make_puppet_button_TT: "[CPD_MAKE_PUPPET_TT_LOC]"
 CPD_make_puppet_button_TT_DELAYED: "[CPD_MAKE_PUPPET_TT_DELAYED_LOC]"

 CPD_make_puppet_button_TT_DEMAND: "Create Puppet Government"
 CPD_make_puppet_button_TT_CONCESSION: "Concede Puppet Government"

 CPD_make_puppet_button_TT_DELAYED_DEMAND: "Demanding a §YPuppet Government§! carves a new subject state out of selected enemy territory. The new puppet inherits its parent's culture but answers to us in foreign policy. Should we already own a subject with cores on the parent nation, those states join that subject instead of spawning a new one."
 CPD_make_puppet_button_TT_DELAYED_CONCESSION: "Conceding a §YPuppet Government§! allows the enemy to carve a subject state from territories we currently hold. The new puppet government answers to them."

 # Demilitarize State Localization
 CPD_demilitarise_state_button_TT: "[CPD_DEMILITARISE_TT_LOC]"
 CPD_demilitarise_state_button_TT_DELAYED: "[CPD_DEMILITARISE_TT_DELAYED_LOC]"

 CPD_demilitarise_state_button_TT_DEMAND: "Demand Demilitarisation of States"
 CPD_demilitarise_state_button_TT_CONCESSION: "Propose Demilitarisation of States"

 CPD_demilitarise_state_button_TT__DELAYED_DEMAND: "Demanding §YDemilitarisation§! turns selected enemy states into zones in which no military may operate. Their owner cannot station troops there nor raise fortifications."
 CPD_demilitarise_state_button_TT__DELAYED_CONCESSION: "Conceding §YDemilitarisation§! places our own states under the same restrictions. We will be unable to move or station forces in the conceded territories."

 # Liberate in State Localization
 CPD_liberate_in_state_button_TT: "[CPD_LIBERATE_TT_LOC]"
 CPD_liberate_in_state_button_TT_DELAYED: "[CPD_LIBERATE_TT_DELAYED_LOC]"

 CPD_liberate_in_state_button_TT_DEMAND: "Liberate States"
 CPD_liberate_in_state_button_TT_CONCESSION: "Grant Independence"

 CPD_liberate_in_state_button_TT_DELAYED_DEMAND: "Demanding §YLiberation§! hands the selected states back to whichever nation rightfully claims them. A still-existing core-holder receives the territory directly; a long-dead one is revived to receive it. Where no core-holder remains, a new splinter state is forged from what is left of the current owner."
 CPD_liberate_in_state_button_TT_DELAYED_CONCESSION: "Conceding §YIndependence§! releases the selected states we hold to their rightful claimant, whether that nation still stands or must be revived from history."

 CPD_COPD_container_TITLE_TEXT: "Peace Deal Cost: [?ROOT.CPD_total_cost_of_built_peace_deal|Y0] £victory_points"

 CPD_add_state_with_parameters_button_TEXT: "[CPD_DEMAND_CONCESSION_COST_SWITCH_LOC]"
