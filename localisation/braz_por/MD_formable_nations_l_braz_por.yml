 form_MAPHI_category: "Mafilindo"
 form_MAPHI_category_desc: "Uma confederação proposta e não política das três nações do Sudeste Asiático no Arquipélago Malaio na década de 1960. O sonho nunca foi realizado devido a conflitos entre as nações da Indonésia e da Federação da Malásia. A unificação das três nações criaria uma nação que rivalizaria com algumas das principais nações ao redor do globo."
 MAPHI_integrate_start: "Begin forming [GetMAPHINameDef]"
 MAPHI_integrate_start_desc: "The unification of Maphilindo is the beginning of a new era for the people of our nations. It is time unify and bring forth a new future for our collective peoples.\n\n"
 MAPHI_integrate_IND: "Integrate [GetMAPHINameAdj] [IND.GetAdjective] Territories"
 MAPHI_integrate_IND_desc: "A Indonésia é uma região rica em recursos essenciais para a nação proposta. É fundamental que integremos a Indonésia pelos recursos e pela população que ela pode trazer."
 MAPHI_integrate_PHI: "Integrate [GetMAPHINameAdj] [PHI.GetAdjective] Territories"
 MAPHI_integrate_PHI_desc: "As Filipinas são um grande centro naval e comercial no Pacífico. Integrar esta nação nos dará uma chance muito maior de começar o domínio do Pacífico."
 MAPHI_integrate_SIN: "Integrate [GetMAPHINameAdj] [SIN.GetAdjective] Territories"
 MAPHI_integrate_SIN_desc: "Cingapura é um hub crítico para a nova nação. Sua posição como um grande porto comercial e um centro financeiro o torna crucial para o sucesso da nova nação."
 MAPHI_integrate_MAY: "Integrate [GetMAPHINameAdj] [MAY.GetAdjective] Territories"
 MAPHI_integrate_MAY_desc: "Politicamente, a Malásia é uma das regiões centrais da nação. Ela nos permite ter acesso a rotas terrestres na Ásia por meio da posse da península."
 MAPHI_integrate_BRU: "Integrate [GetMAPHINameAdj] [BRU.GetAdjective] Territories"
 MAPHI_integrate_BRU_desc: "Brunei é uma nação menor no acordo. A nação é algo imperativo de se integrar, embora seja um estado menor."
 MAPHI_update_flag: "Finish Forming [GetMAPHINameDef]"
 MAPHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetMAPHINameDef], adopting its unified flag and name."
 is_MAPHI: "Has formed [GetMAPHINameDef]"
 form_INDOCHI_category: "Indochina"
 form_INDOCHI_category_desc: "Indochina é uma federação anterior de nações do Vietnã, Camboja e Laos que existiu até 1954. Os três juntos formam uma das maiores economias do globo e acomodam uma população massiva. É uma nação de selvas densas, colinas ondulantes, montanhas e litoral deslumbrante. Sua força está no povo e na vontade que levará o grupo adiante para o futuro."
 INDOCHI_integrate_start: "Begin forming [GetINDOCHINameDef]"
 INDOCHI_integrate_start_desc: "It is time to begin the formation of Indochina.\n\n"
 INDOCHI_integrate_VIE: "Integrate [GetINDOCHINameAdj] [VIE.GetAdjective] Territories"
 INDOCHI_integrate_VIE_desc: "O Vietnã possui uma enorme quantidade de recursos naturais nas montanhas e ao longo da costa. A integração do Vietnã solidificará nossa posição na nação."
 INDOCHI_integrate_LAO: "Integrate [GetINDOCHINameAdj] [LAO.GetAdjective] Territories"
 INDOCHI_integrate_LAO_desc: "O Laos, assim como o Vietnã, também possui enormes quantidades de recursos naturais."
 INDOCHI_integrate_CBD: "Integrate [GetINDOCHINameAdj] [CBD.GetAdjective] Territories"
 INDOCHI_integrate_CBD_desc: "A geografia natural e as terras ricas do Camboja são importantes para a nação. Integrá-los à nação também melhorará a nação de maneira consistente."
 INDOCHI_update_flag: "Finish Forming [GetINDOCHINameDef]"
 INDOCHI_update_flag_desc: "With every constituent territory integrated, we can complete our transformation and proclaim [GetINDOCHINameDef], adopting its unified flag and name."
