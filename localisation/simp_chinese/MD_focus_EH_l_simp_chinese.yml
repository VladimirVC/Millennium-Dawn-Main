 EH_scientist_Jennifer_Doudna_tt: "§Y珍妮弗·道德纳§!"
 EH_scientist_Jennifer_Doudna_tt_delayed: "珍妮弗·道德纳是一位著名的生物化学家，她与埃玛纽埃勒·沙尔庞捷共同开创了CRISPR基因编辑技术。得益于CRISPR技术，我们或许能够更好地了解嵌合体的基因构成，并找到利用其弱点的方法。\n--------------\n§Y效果：§!\n[!EH_hire_Jennifer_Doudna_button_click]\n\n§Y先决条件：§!\n[!EH_scientist_Jennifer_Doudna_click_enabled]"
 EH_scientist_Fabiola_Gianotti_tt: "§Y法比奥拉·吉亚诺提§!"
 EH_scientist_Fabiola_Gianotti_tt_delayed: "法比奥拉·吉亚诺提是一位意大利实验粒子物理学家，现任欧洲核子研究中心总干事。她在粒子物理学方面的专业知识和大型科学合作经验，对于我们理解传送门及其与其他维度的联系至关重要。\n--------------\n§Y效果：§!\n[!EH_hire_Fabiola_Gianotti_button_click]\n\n§Y先决条件：§!\n[!EH_scientist_Fabiola_Gianotti_click_enabled]"
 EH_scientist_Lene_Hau_tt: "§Y莱娜·豪§!"
 EH_scientist_Lene_Hau_tt_delayed: "莱娜·豪是一位丹麦物理学家，以其在减缓和停止光速方面的开创性工作而闻名。她在量子光学和凝聚态物理方面的专业知识或许能够帮助我们深入了解传送门的本质及其能量辐射。\n--------------\n§Y效果：§!\n[!EH_hire_Lene_Hau_button_click]\n\n§Y先决条件：§!\n[!EH_scientist_Lene_Hau_click_enabled]"
 EH_scientist_Emmanuelle_Charpentier_tt: "§Y埃玛纽埃勒·沙尔庞捷§!"
 EH_scientist_Emmanuelle_Charpentier_tt_delayed: "埃玛纽埃勒·沙尔庞捷是一位法国微生物学家和生物化学家。她与珍妮弗·道德纳共同开发了CRISPR-Cas9基因编辑技术。她的知识对于我们理解并可能操控嵌合体的生物学特性至关重要。\n--------------\n§Y效果：§!\n[!EH_hire_Emmanuelle_Charpentier_button_click]\n\n§Y先决条件：§!\n[!EH_scientist_Emmanuelle_Charpentier_click_enabled]"
 EH_scientist_Andrzej_Trautman_tt: "§Y安杰伊·特罗特曼§!"
 EH_scientist_Andrzej_Trautman_tt_delayed: "安杰伊·特罗特曼是一位波兰裔美国理论物理学家，以其在广义相对论和黑洞物理学领域的研究而闻名。他的专业知识或许能够帮助我们理解传送门背后的基本物理原理及其对我们世界的影响。\n--------------\n§Y效果：§!\n[!EH_hire_Andrzej_Trautman_button_click]\n\n§Y先决条件：§!\n[!EH_scientist_Andrzej_Trautman_click_enabled]"
