 UNLOCK_ABILITY_ARMORED_SPEARHEAD: "Déverrouille la capacité : §YFer de lance blindé§!"
 UNLOCK_ABILITY_UNIT_FLEXIBILITY: "Déverrouille la capacité : §YDéfense flexible§!"
 UNLOCK_ABILITY_LAST_STAND: "Déverrouille la capacité : §YDernière chance§!"
 UNLOCK_ABILITY_DEEP_BATTLE: "Déverrouille la capacité : §YBataille en profondeur§!"
 UNLOCK_ABILITY_SIEGE_ARTILLERY: "Déverrouille la capacité : §YArtillerie de siège§!"
 UNLOCK_ABILITY_RELENTLESS_ASSAULT: "Déverrouille la capacité : §YAgressions incessantes§!"
 UNLOCK_ABILITY_GUERILLA_WARFARE: "Déverrouille la capacité : §YGuérilla§!"
 ABILITY_ARMORED_SPEARHEAD: "Fer de lance blindé"
 ABILITY_ARMORED_SPEARHEAD_DESC: "En utilisant nos unités blindées, nous pouvons nous frayer un chemin à travers les retranchements ennemis."
 ABILITY_DEEP_BATTLE: "Bataille en profondeur"
 ABILITY_DEEP_BATTLE_DESC: "La profondeur de la bataille est très importante en dehors de la ligne de contact principale. Perturber les lignes de communication, affaiblir les points forts et les vaincre sur les flancs peut rapidement transformer un combat linéaire en une bataille en profondeur."
 UNLOCK_ABILITY_INFILTRATION_ASSAULT: "Unlock Ability: §YInfiltration Assault§!"
 UNLOCK_ABILITY_WELL_PLANNED_ATTACK: "Unlock Ability: §YWell Planned Attack§!"
 ABILITY_FLEXIBLE_DEFENSE: "Flexible Defense"
 ABILITY_FLEXIBLE_DEFENSE_DESC: "Our army is currently digging in against the enemy. However, they have started to probe our defenses. It may be in our interest to start being more flexible in our defense stance."
 ABILITY_WELL_PLANNED_ATTACK: "Well Planned Attack"
 ABILITY_WELL_PLANNED_ATTACK_DESC: "A well-planned attack will almost always yield good results."
 ABILITY_INFILTRATION_ASSAULT: "Infiltration Assault"
 ABILITY_INFILTRATION_ASSAULT_DESC: "Infiltrating the enemy lines would make it easy to disrupt and defeat the enemy from behind."