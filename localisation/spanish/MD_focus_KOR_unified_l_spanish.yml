 korea.41.t: "Corea del Norte propone una confederación"
 korea.41.d: "Nuestro vecino del Norte ha dejado claro que la integración total de un país con otro es una perspectiva que no tiene sentido perseguir, por lo que propone crear una confederación de dos estados para resolver de una vez por todas los problemas de la cuestión coreana. Naturalmente, quiere tomar la iniciativa en esta confederación, lo que podría poner en peligro la existencia de nuestro país."
 korea.41.a: "La confederación debería ser"
 korea.41.b: "La confederación nunca podrá tener lugar en estos términos..."
 korea.42.t: "¡El Sur ha aceptado nuestros términos para la Confederación!"
 korea.42.d: "Tras extensas negociaciones, el Sur ha acordado la creación de una confederación. Con las relaciones entre las dos Coreas estabilizadas y la confederación en el horizonte, ¡el futuro del pueblo coreano nunca ha parecido más brillante!"
 korea.42.a: "¡Fantásticas noticias!"
 korea.43.t: "¡El Sur ha rechazado nuestras condiciones para la Confederación!"
 korea.43.d: "Lamentablemente, [KOR.GetLeader] ha optado por anteponer su propia posición egoísta a la del pueblo coreano y ha rechazado nuestra oferta de cooperar para crear una confederación. Este rechazo no significa que no podamos hacer otro intento en el futuro, pero sí significa que la confederación no se producirá en un futuro próximo. Debemos sentar las bases para garantizar que nuestro próximo intento tenga un mayor éxito."
 korea.43.a: "Un día triste para el pueblo coreano..."
 KOR_joint_research: "Investigación Conjunta de Joseon"
 KOR_joint_research_desc: "Unificando nuestros esfuerzos científicos, podremos combinar las mentes más brillantes del Norte y del Sur. Un programa conjunto de investigación acelerará la innovación, generará avances tecnológicos y fomentará la confianza entre los pueblos de Joseon."
 KOR_joint_military_might: "Poderío militar de Joseon"
 KOR_joint_military_might_desc: "Un ejército de Joseon unificado garantizará la seguridad y la independencia de nuestro nuevo estado. Al combinar nuestras doctrinas, equipamiento y experiencia, podremos formar una poderosa fuerza armada capaz de defender nuestra patria."
 KOR_joint_military_cooperation: "Cooperación militar conjunta"
 KOR_joint_military_cooperation_desc: "Los ejércitos del Norte y del Sur deben aprender a luchar como uno solo. Mediante ejercicios conjuntos, integración doctrinal e intercambios mutuos, podemos formar una fuerza cohesionada."
 KOR_military_improved: "Integración militar mejorada"
 KOR_military_improved_desc: "Nuestros esfuerzos han dado sus frutos. Las fuerzas combinadas operan ahora con mayor eficiencia, superando las deficiencias en entrenamiento y disciplina."
 KOR_military_exchange_experience: "Experiencia de intercambio militar"
 KOR_military_exchange_experience_desc: "Se intercambiarán oficiales y soldados entre regiones para fomentar la cooperación, eliminar la desconfianza y construir una cadena de mando unificada."
 KOR_combined_airforce_technology: "Tecnología combinada de la Fuerza Aérea"
 KOR_combined_airforce_technology_desc: "Tanto el Norte como el Sur aportan una valiosa experiencia en aviación. Un proyecto conjunto de la fuerza aérea mejorará nuestras capacidades aéreas."
 KOR_finish_the_kf21: "Terminar el KF-21"
 KOR_finish_the_kf21_desc: "El proyecto del caza KF-21 es un símbolo de la ambición de Joseon. Al completar su desarrollo, aseguraremos nuestra posición entre las potencias aéreas más avanzadas del mundo."
 KOR_jet_production: "Producción unificada de aviones"
 KOR_jet_production_desc: "Con la contribución de fábricas de ambos países, la producción de aviones a reacción puede ampliarse para equipar a nuestra fuerza aérea con aeronaves modernas de fabricación nacional."
 KOR_connect_the_people: "Conectar a la gente"
 KOR_connect_the_people_desc: "Para que Joseon se una de verdad, la gente debe sentirse conectada. La infraestructura, la comunicación y la identidad compartida serán cruciales para construir un futuro común."
 KOR_labor_integration: "Integración laboral"
 KOR_labor_integration_desc: "Es necesario armonizar la fuerza laboral del Norte y del Sur. Legislación laboral compartida, salarios justos e industrias integradas estabilizarán la economía."
 KOR_phase_one: "Fase uno"
 KOR_phase_one_desc: "La primera fase de la integración consiste en la fusión de infraestructuras e industrias básicas, sentando las bases para una unidad más profunda."
 KOR_phase_two: "Fase dos"
 KOR_phase_two_desc: "Una vez sentadas las bases, la segunda fase impulsará reformas económicas más amplias y políticas de desarrollo unificadas."
 KOR_population_management: "Gestión de la Población"
 KOR_population_management_desc: "Las diferencias demográficas y de tamaño de población entre el Norte y el Sur deben gestionarse cuidadosamente. La vivienda, el empleo y la estabilidad social son claves para prevenir disturbios."
 KOR_focused_growth: "Crecimiento enfocado"
 KOR_focused_growth_desc: "Al canalizar los recursos hacia sectores clave, podemos equilibrar las disparidades económicas y garantizar que el crecimiento se distribuya equitativamente en todo el país."
 KOR_happy_united_people: "Pueblo unido feliz"
 KOR_happy_united_people_desc: "Un pueblo unido es un pueblo fuerte. Al mejorar las condiciones de vida y fomentar una identidad compartida, Joseon prosperará."
 KOR_josen_economy: "La economía de Joseon"
 KOR_josen_economy_desc: "La fusión de dos economías muy diferentes no es tarea fácil. Una planificación cuidadosa nos permitirá forjar una economía de Joseon nueva y más fuerte."
 KOR_josen_economy_improved: "Mejorar la economía de Joseon"
 KOR_josen_economy_improved_desc: "Nuestras políticas de integración comienzan a dar sus frutos. La economía se está estabilizando, las industrias se están expandiendo y el comercio está floreciendo."
 KOR_josen_economy_integrated: "Economía de Joseon integrada"
 KOR_josen_economy_integrated_desc: "Norte y Sur ya no son dos economías separadas. Son una sola. Con la integración completa, Joseon puede erigirse como una potencia económica."
 kf21_production: "Producción del KF21"
 north_korea_trade_deals: "Acuerdos Comerciales con Corea del Norte"
 KOR_joint_peace: "The Road to Peace"
 KOR_joint_peace_desc: "After decades of frozen hostilities, our nation can take the first step toward genuine peace with our brothers across the parallel. By opening the door to dialogue, we lay the groundwork for the eventual reconciliation of the Korean people."
 KOR_sunshine_moon_policy: "Sunshine Policy"
 KOR_sunshine_moon_policy_desc: "Following the spirit of the Sunshine Policy, we will pursue a path of engagement rather than confrontation. By fostering goodwill, exchanging envoys, and softening our rhetoric, both Koreas can begin to heal old wounds."
 KOR_kaesong_industrial: "Kaesong Industrial Region"
 KOR_kaesong_industrial_desc: "The Kaesong Industrial Region stands as a model of cooperation - Northern labour with Southern capital, building shared prosperity. Reopening and expanding this joint zone will tie our economies together and demonstrate the value of cooperation over confrontation."
 KOR_cultural_exchange: "Cultural Exchange"
 KOR_cultural_exchange_desc: "Joint sporting events, cultural performances, and academic exchanges will remind both Koreas that we share one history, one language, and one people. Beneath the politics, we are all Korean."
 KOR_reduce_dmz_militarization: "Demilitarize the DMZ"
 KOR_reduce_dmz_militarization_desc: "The Demilitarized Zone has been anything but. With trust slowly returning, we can withdraw heavy weapons from the border, dismantle guard posts, and let the world's most heavily fortified frontier finally live up to its name."
 KOR_pursue_peace_treaty: "Pursue a Peace Treaty"
 KOR_pursue_peace_treaty_desc: "More than seventy years after the guns fell silent, the Korean War remains formally unresolved. By signing a long-overdue peace treaty, we can finally close this dark chapter and replace the armistice with genuine peace."
 KOR_improve_relations: "Improve Relations"
 KOR_improve_relations_desc: "With formal peace established, we can deepen ties further still. Closer political dialogue, mutual diplomatic recognition, and shared institutions will bring our two states closer than at any point since the division."
 KOR_our_true_enemy: "Our True Enemy"
 KOR_our_true_enemy_desc: "For too long, the Korean people have been pitted against one another while our true historical antagonist - Imperial Japan and its modern successor - has escaped accountability. By directing our shared grievances outward, we forge a stronger bond between North and South."
 KOR_reunification: "Reunification"
 KOR_reunification_desc: "The time has come to take the final step. Whichever Korea reaches this moment first will offer the other a chance at full reunification - one government, one nation, one people. Should the other side accept, we will absorb them into our state and the Korean nation will be whole once more."
 KOR_confederation: "A Korean Confederation"
 KOR_confederation_desc: "Rather than the full integration of two profoundly different systems, we propose a Confederation - a loose federation in which Pyongyang leads and Seoul retains its autonomy. The South will become our federate, ending the division without dismantling either state."
 KOR_reunification_talks_failed_tt: "§RKOR's reunification proposal was rejected.§!"
