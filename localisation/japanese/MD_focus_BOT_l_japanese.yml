l_japanese:
 botswana_focus: "ボツワナ 国家方針ツリー"
 BOT_model_student_of_africa: "アフリカの模範生"
 BOT_model_student_of_africa_desc: "ボツワナは、アフリカで最も発展した国の一つである。独立以来、安定した民主主義国家であり、紛争はほとんど起きていない。サハラ以南のアフリカ諸国の中で最も高い人間開発指数と、最も低い汚職認識度を誇るボツワナは、アフリカの他の国々にとって模範となる存在だ。\n\n§Rもし我々の §Y政治腐敗度§! が §Y$corruption_level_05$§! より高い場合、このボーナスは失われる！§!"
 BOT_kalahari_expansion: "カラハリの砂漠化"
 BOT_kalahari_expansion_desc: "ボツワナ西部の広大な面積を占めているカラハリ砂漠は、年々拡大を続けている。ボツワナの国土の95%は降雨量が極めて少なく農業が不可能なため、国土の71%が牧畜用地として利用されており、ほとんどの人が地下水から水を確保している。大規模な畜産業は砂漠化を悪化させているが、ボツワナ国民のほぼ半数がそこから収入を得ている。\n\nボツワナ西部には多くの国立公園（国土の20％を占める）があり、その中でも最大規模のカラハリ動物保護区には、サン人が居住しており、ボツワナ最大級のダイヤモンド鉱山の一つも存在している。\n\n§Y毎年1月§! には、カラハリ砂漠の砂漠化状況に関する最新情報が発表される。砂漠は拡大し続けるかもしれない（§Y砂漠化§!）、現状維持となるかもしれない（§Y安定化§!）、あるいは状況が改善するかもしれない（§Y緑化§!）。各結果の発生確率は、§Y$BOT_anti_poaching_decisions$§! ディシジョンカテゴリで確認できる。\n\nすでに苦しんでいるカラハリ砂漠や周辺のサバンナを搾取し続け、砂漠化をさらに悪化させることも、あるいは保全的なアプローチを取り、砂漠化を遅らせ、さらには逆転させることも可能だ。"
 BOT_house_of_chiefs: "首長会議"
 BOT_house_of_chiefs_desc: "首長会議（ツワナ語：Ntlo ya Dikgosi）は、ボツワナ議会の諮問機関である。同会議は、ボツワナの主要8部族の世襲首長、選出された22名の議員、および大統領が指名した5名の首長で構成されている。首長会議には政治的・行政的な権限はないが、ほとんどの法案およびすべての憲法改正案は、国民議会に提出される前に同院で審議されなければならない。首長ら自身は、それぞれの部族に対して儀礼的な権限とわずかな行政権しか有していない。"
 BOT_house_of_chiefs_tt: "政府支出および政策変更コスト:§R+15%§!\n官僚機構支出:§R+5%§!"
 BOT_house_of_chiefs_empowered: "首長会議 - 権限強化"
 BOT_house_of_chiefs_empowered_desc: "首長会議（ツワナ語：Ntlo ya Dikgosi）は、ボツワナ議会の諮問機関である。同会議は、ボツワナの主要8部族の世襲首長、選出された22名の議員、および大統領が指名した5名の首長で構成されている。ほとんどの法案およびすべての憲法改正案は、国民議会に提出される前に同院で審議されなければならない。首長会議には法案を一度拒否する権利があり、部族関連の活動を管轄する立法府を統括する権限を有する。首長ら自身には裁量権と自治権が認められており、国の立法府とは異なる法律を制定することができ、また、在任中は法的措置から免責される。"
 BOT_house_of_chiefs_empowered_tt: "政府支出および政策変更コスト:§R+20%§!\n官僚機構支出:§R+10%§!"
 BOT_house_of_chiefs_militarised: "首長会議  - 軍事化"
 BOT_house_of_chiefs_militarised_desc: "首長会議（ツワナ語：Ntlo ya Dikgosi）は、ボツワナ議会の諮問機関である。同会議は、ボツワナの主要8部族の世襲首長、選出された22名の議員、および大統領が指名した5名の首長で構成されている。首長会議には政治的・行政的な権限はないが、ほとんどの法案およびすべての憲法改正案は、国民議会に提出される前に同院で審議されなければならない。首長ら自身は、それぞれの部族に対して儀礼的な権限とわずかな行政権しか有していない。しかし、彼らには、地域の治安部隊として機能する地元民兵組織を結成し、訓練する権利が認められている。"
 BOT_house_of_chiefs_militarised_tt: "政府支出および政策変更コスト:§R+20%§!\n軍事費:§R+5%§!\n官僚機構支出:§R+5%§!"
 BOT_house_of_chiefs_empowered_and_militarised: "首長会議 - 権限強化および軍事化"
 BOT_house_of_chiefs_empowered_and_militarised_desc: "首長会議（ツワナ語：Ntlo ya Dikgosi）は、ボツワナ議会の諮問機関である。同会議は、ボツワナの主要8部族の世襲首長、選出された22名の議員、および大統領が指名した5名の首長で構成されている。ほとんどの法案およびすべての憲法改正案は、国民議会に提出される前に同院で審議されなければならない。首長会議には法案を一度拒否する権利があり、部族関連の活動を管轄する立法府を統括する権限を有する。首長ら自身には裁量権と自治権が認められており、国の立法府とは異なる法律を制定することができ、また、在任中は法的措置から免責される。さらに、地域の治安部隊として機能する地元民兵組織を結成し、訓練する権利も認められている。"
 BOT_house_of_chiefs_empowered_and_militarised_tt: "政府支出および政策変更コスト:§R+20%§!\n軍事費:§R+5%§!\n官僚機構支出:§R+10%§!\n"
 BOT_ancestral_land_conflict: "先祖代々の土地をめぐる紛争"
 BOT_ancestral_land_conflict_desc: "中央カラハリ動物保護区には、地球上で最も古い文化の一つとも言われる狩猟採集民のサン人（ブッシュマン）、砂漠の名前の由来となったカラハリ人や、その他の先住民族が暮らしている。この動物保護区は、もともと野生動物とサン人の生活様式の両方を保護するために設立された。\n\n1970年代、ボツワナ政府はサン人が動物を過剰に狩猟していると主張すると同時に、この地域が自然保護区であるために、政府がサン人のためのサービス（学校や病院など）を設置できないとした。また、サン人の移住計画が開始されたが、それは偶然にも、この動物保護区内でダイヤモンド鉱脈が発見された時期と重なった。1990年代には、政府が保護区内に住む人々へのサービス提供を制限し始めたことで、移住の圧力はさらに強まった。\n\nサン人は我が国の人口のごく一部に過ぎないため、我々に対抗する実質的な手段を持っていない。だが、彼らに対する扱いは、我が国の国際的なイメージを傷つけるものである。"
 BOT_ancestral_land_conflict_escalated: "先祖代々の土地をめぐる紛争の激化"
 BOT_ancestral_land_conflict_escalated_desc: "中央カラハリ動物保護区には、地球上で最も古い文化の一つとも言われる狩猟採集民のサン人（ブッシュマン）、砂漠の名前の由来となったカラハリ人や、その他の先住民族が暮らしている。この動物保護区は、もともと野生動物とサン人の生活様式の両方を保護するために設立された。\n\n1970年代、ボツワナ政府はサン人が動物を過剰に狩猟していると主張すると同時に、この地域が自然保護区であるために、政府がサン人のためのサービス（学校や病院など）を設置できないとした。また、サン人の移住計画が開始されたが、それは偶然にも、この動物保護区内でダイヤモンド鉱脈が発見された時期と重なった。1990年代には、政府が保護区内に住む人々へのサービス提供を制限し始めたことで、移住の圧力はさらに強まった。\n\nサン人は我が国の人口のごく一部に過ぎないため、我々に対抗する実質的な手段を持っていない。だが、彼らに対する扱いは、我が国の国際的なイメージを傷つけるものである。"
 BOT_BDP_stronghold: "£BOT_Neutral_conservatism ボツワナ民主党の牙城"
 BOT_BDP_stronghold_desc: "建国以来、£BOT_Neutral_conservatism ボツワナ民主党（BDP）が国を統治してきた。選挙のたびに最大政党の座を維持しており、得票率が最も低かった時でも55%を記録している。同党は、保守主義、自由主義、社会主義を融合させた包括政党である。その主な支持基盤はツワナ人にあるため、国内の他の多くの部族は疎外感を抱くことになっている。BDPの政権基盤を崩すには、大規模な政治スキャンダルが必要となるだろう。\n\n§Y£BOT_Neutral_conservatism BDPのAチーム派とバラタ・ファティ派が合流して最大政党を形成している限り、選挙後も£BOT_Neutral_conservatism BDPは政権を維持し続けるだろう。\n\nもし£BOT_Neutral_conservatism BDPが過度に強大化すれば、野党は単一の政党へと統合され、単一の少数政党に影響を与えるような事象は、この新党にも影響を及ぼすことになる。\n\nもし£BOT_Neutral_conservatism BDPの支持率が過度に低下すれば、党内の改革派が独自の政党を結成するだろう。§!"
 BOT_zimbabwean_refugees: "ジンバブエ難民"
 BOT_zimbabwean_refugees_desc: "ジンバブエの経済状況により、何千人もの人々が合法・違法を問わず国境を越えてボツワナへと流入している。ジンバブエ人の約3分の1が不法滞在であり、国境を越える人々の大半は直ちにジンバブエへ強制送還されている。しかし、この大量の難民にはメリットもある。ツワナ人の多くは畜産業で生計を立てているのに対し、ジンバブエ人の多くは鉱業や工業部門で働いており、ボツワナの熟練労働力の大部分を占めているのだ。\n\n§Yジンバブエが存在しないか、あるいは我々の属国となった場合、この国民精神は削除される§!"
 BOT_zimbabwean_refugees_encouraged: "支援されたジンバブエ難民"
 BOT_zimbabwean_refugees_encouraged_desc: "ジンバブエの経済状況により、何千人もの人々が合法・違法を問わず国境を越えてボツワナへと流入している。ジンバブエ人の約3分の1が不法滞在であり、国境を越える人々の大半は直ちにジンバブエへ強制送還されている。しかし、この大量の難民にはメリットもある。ツワナ人の多くは畜産業で生計を立てているのに対し、ジンバブエ人の多くは鉱業や工業部門で働いており、ボツワナの熟練労働力の大部分を占めているのだ。\n\n§Yジンバブエが存在しないか、あるいは我々の属国となった場合、この国民精神は削除される§!"
 BOT_army_of_peacekeepers: "平和維持軍"
 BOT_army_of_peacekeepers_desc: "ボツワナ国防軍は、世界中で平和維持活動を行うために陸軍の再編を行った。もちろん、他国で死ぬことだけが目的で軍隊に入るなんて、誰もあまり乗り気ではないだろう。"
 BOT_army_against_poaching: "対密猟軍"
 BOT_army_against_poaching_desc: "ボツワナ国防軍は、国内の密猟者の取り締まりと、災害救援活動への参加に注力している。"
 BOT_army_against_poaching_tt: "軍事費: §G-10%§!\n国内治安支出: §R+10%§!\n§G排除される密猟者の数が5増加する§!"
 BOT_professional_military: "精鋭軍"
 BOT_professional_military_desc: "ボツワナ国防軍は、密猟対策、平和維持活動、災害救援といった役割から距離を置き、より伝統的な軍隊に近い組織となるための措置を講じている。"
 BOT_coal_focused_energy: "石炭国家への第一歩"
 BOT_coal_focused_energy_desc: "ボツワナは、未開発の石炭資源を活用し、エネルギー生産の自給自足を目指すことを決定した。石炭は安価で入手しやすいが、環境に最も優しい選択肢とは言えない。"
 BOT_coal_focused_energy_tt: "追加支出: $§R0.050§!"
 BOT_coal_focused_energy_self_sufficient: "自給自足の石炭国家"
