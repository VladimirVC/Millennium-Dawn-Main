 tank_diesel_engine_gen1: "12기통 자연흡기"
 tank_diesel_engine_gen1_desc: "12기통 자연흡기 디젤 엔진은 제2차 세계 대전에서 유래했습니다. 일반적으로 냉전 초기 전차에 사용되며 약 500~600마력의 출력을 낼 수 있습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen2: "터보차저 12기통"
 tank_diesel_engine_gen2_desc: "12기통 디젤 엔진에 터보차저를 추가함으로써 엔진에 더 많은 공기를 공급하고 더 많은 출력을 낼 수 있습니다. 일반적으로 냉전 중기 전차에 사용됩니다. 약 800마력의 출력을 낼 수 있습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen3: "트윈터보차저 12기통"
 tank_diesel_engine_gen3_desc: "두 번째 터보차저를 추가하면 더 큰 출력을 얻을 수 있습니다. 이 기술은 80년대 후반에 등장하기 시작했습니다. 엔진은 최대 1000마력에 달하는 출력을 낼 수 있습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen4: "슈퍼차저 12기통"
 tank_diesel_engine_gen4_desc: "터보차저를 슈퍼차저로 교체하면 엔진 출력이 훨씬 더 높아집니다. 2000년대 초기 전차에서 흔히 볼 수 있으며, 1100마력의 출력을 낼 수 있습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen5: "직접 분사식 슈퍼차저 12기통"
 tank_diesel_engine_gen5_desc: "자동차 산업의 기술을 도입함으로써 보다 효율적으로 제어되는 엔진을 가질 수 있습니다. 이 전자 제어식 엔진을 사용하면 전차는 최대 1200마력까지 출력을 낼 수 있습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen6: "터보차저 X12 엔진"
 tank_diesel_engine_gen6_desc: "X12 엔진은 피스톤이 3열로 X자 모양을 이루며 배열되어 있습니다. 1500마력을 낼 수 있는 전차 엔진 기술의 최신 혁신입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_diesel_engine_gen7: "슈퍼차저 X12 엔진"
 tank_diesel_engine_gen7_desc: "X12 전차 엔진에 슈퍼차저를 장착하면 엔진 성능을 상상 이상으로 끌어올릴 수 있습니다. 속도와 파워!\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 tank_gas_turbine_engine_gen1: "냉전기 가스 터빈"
 tank_gas_turbine_engine_gen1_desc: "항공기 산업의 기술을 응용한 부피가 크고 신뢰성이 낮은 초기형 가스 터빈 엔진입니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 tank_gas_turbine_engine_gen2: "냉전 후기 가스 터빈"
 tank_gas_turbine_engine_gen2_desc: "터빈 설계의 대부분의 결함을 수정하여 현장에서 더 유용하게 사용할 수 있도록 개선된 설계입니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 tank_gas_turbine_engine_gen3: "냉전 이후 가스 터빈"
 tank_gas_turbine_engine_gen3_desc: "출력과 연비 향상에 중점을 둔 냉전 후기 가스 터빈 설계입니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 tank_gas_turbine_engine_gen4: "근현대 가스 터빈"
 tank_gas_turbine_engine_gen4_desc: "신뢰성과 출력이 우수한 가스 터빈입니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 tank_gas_turbine_engine_gen5: "현대 가스 터빈"
 tank_gas_turbine_engine_gen5_desc: "가스 터빈 기술 분야에 있어 현대 기술의 정점입니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 tank_gas_turbine_engine_gen6: "저마찰 가스 터빈"
 tank_gas_turbine_engine_gen6_desc: "첨단 소재를 사용하여 가스 터빈의 마찰을 줄임으로써 더 나은 출력과 연비를 제공합니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 tank_electric_engine_gen1: "초기 전기 엔진"
 tank_electric_engine_gen1_desc: "초기형 전기 동력 전달 계통입니다. 지금까지는 보조적인 역할로만 사용되었으나, 이제 전차 전체에 동력을 공급할 수 있는 기술을 확보하였습니다.\n\n§G전기 엔진은 전차에 동력을 공급하는 미래 지향적인 옵션입니다. 비용은 많이 들지만 연료가 거의 필요하지 않습니다. 연료를 절약하려면 전차에 전기 엔진을 장착하십시오.§!"
 tank_electric_engine_gen2: "개선된 전기 엔진"
 tank_electric_engine_gen2_desc: "기존 전기 엔진의 신뢰성을 개선한 버전입니다.\n\n§G전기 엔진은 전차에 동력을 공급하는 미래 지향적인 옵션입니다. 비용은 많이 들지만 연료가 거의 필요하지 않습니다. 연료를 절약하려면 전차에 전기 엔진을 장착하십시오.§!"
 tank_small_medium_cannon: "냉전 초기 경형 전차포"
 tank_small_medium_cannon_desc: "경형 전차포는 냉전 초기의 전차에서 흔히 볼 수 있었습니다. 표준은 소련의 경우 100mm이고 서방 국가의 경우 105mm였으며, 둘 다 당시의 차량과 보병을 처리하기에 충분한 화력을 가지고 있었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 tank_small_medium_cannon_2: "냉전 후기 경형 전차포"
 tank_small_medium_cannon_2_desc: "향상된 주조 기술과 열소매 덕분에 냉전 후기 전차포들은 고장 나기 전까지 더 높은 연사력을 유지할 수 있었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 tank_small_medium_cannon_3: "현대 경형 전차포"
 tank_small_medium_cannon_3_desc: "장주퇴식 저반동 충격 메커니즘과 개선된 약실을 갖춘 현대식 경형 전차포는 특히 개량된 탄약을 사용하는 경우 무거운 차량에 대해서도 치명적입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 tank_medium_cannon: "냉전 초기 중형 전차포"
 tank_medium_cannon_desc: "복합 장갑의 발달로 경형 전차포보다 더 높은 관통력을 가진 주포가 필요해졌습니다. 소련은 T-62의 115mm 주포로 시작했지만, 빠르게 125mm 주포로 업그레이드했습니다. 서방 국가들은 120mm 주포로 빠르게 뒤따랐습니다. 중형 전차포는 그 이후로 전차 무장의 가장 보편적인 선택이 되었습니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 tank_medium_cannon_2: "냉전 후기 중형 전차포"
 tank_medium_cannon_2_desc: "크롬 도금된 포신과 더 긴 길이를 갖춘 이 포는 더 높은 약실 압력을 견딜 수 있습니다. 이러한 압력 상승과 최신 텅스텐 카바이드 분리 철갑탄(APDS)을 통해, 이 포는 10인치 이상의 강철 장갑을 관통할 수 있습니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 tank_medium_cannon_3: "현대 중형 전차포"
 tank_medium_cannon_3_desc: "현대식 스마트 탄약과 개선된 재료를 갖춘 현대식 중형 전차포는 더 짧은 거리에서 거의 40인치의 강철 장갑을 관통할 수 있으며, 다양한 대전차 및 대보병 탄을 발사할 수 있습니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 tank_large_cannon: "초기 중전차포"
 tank_large_cannon_desc: "90년대 들어 관통력을 증대시킬 필요성이 커짐에 따라, 직경 130~135mm급의 중전차포가 구상되었습니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 tank_large_cannon_2: "개선된 중전차포"
 tank_large_cannon_2_desc: "최신 합금 기술과 프로그래밍 탄약을 적용한 2세대 중전차포로, 적 기갑 부대에 치명적인 타격을 입힐 수 있습니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 tank_very_large_cannon: "초기 초중전차포"
 tank_very_large_cannon_desc: "이 대구경 포는 눈에 보이는 거의 모든 것을 파괴할 수 있습니다. 152mm라는 구경 덕분에, 장갑을 관통하지 못하더라도 원거리에서 포탑을 파괴하고 장갑 자체에 균열을 낼 수 있습니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 tank_very_large_cannon_2: "개선된 초중전차포"
 tank_very_large_cannon_2_desc: "기존 대구경 주포에 최신 탄약과 컴퓨터 기술을 적용한 이 주포는 현존하는 육군 기갑 무장 중 최고의 대물 공격력을 자랑합니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 tank_base_tank_turret: "용접 포탑"
 tank_base_tank_turret_desc: "평평한 장갑판을 각도에 맞춰 용접하여 내부 공간과 장갑 효율을 극대화한 포탑입니다. 용접 포탑은 맞춤형 방호 설계가 가능하고, 업그레이드 통합이 용이하며 승무원 인체공학적 설계에 유리합니다. 생산 공정은 더 복잡하지만, 주조 방식에 비해 방호력과 모듈화 측면에서 우수한 성능을 제공합니다.\n\n§G설계 힌트: 공격과 방어 모두를 고려한 균형 잡힌 전차 포탑입니다. 전차의 수량보다 높은 생존성과 품질을 중시하는 경우 사용하십시오.§!"
 tank_soviet_turret: "주조 포탑"
 tank_soviet_turret_desc: "금속을 틀에 부어 굳힌 일체형 포탑으로, 균일한 장갑 두께를 가진 곡선 구조를 형성합니다. 대량 생산에는 유리하지만, 이후 등장한 설계들에 비해 내부 공간이 협소하고 장갑 최적화 측면에서 불리한 경우가 많습니다.\n\n§G설계 힌트: 공격과 방어 모두를 고려한 균형 잡힌 전차 포탑입니다. 높은 품질보다 많은 수량의 전차가 필요할 때 사용하십시오.§!"
 tank_no_turret: "무포탑"
 tank_no_turret_desc: "금속을 틀에 부어 굳힌 일체형 포탑으로, 균일한 장갑 두께를 가진 곡선 구조를 형성합니다. 대량 생산에는 유리하지만, 이후 등장한 설계들에 비해 내부 공간이 협소하고 장갑 최적화 측면에서 불리한 경우가 많습니다.\n\n§G설계 힌트: 공격과 방어 모두를 고려한 균형 잡힌 전차 포탑입니다. 높은 품질보다 많은 수량의 전차가 필요할 때 사용하십시오.§!"
 tank_oscillating_turret: "진동 포탑"
 tank_oscillating_turret_desc: "포가 포탑에 고정되어 있으며, 조준을 위해 포탑 전체가 회전축을 중심으로 회전하는 독특한 설계입니다. 포의 안정성이 뛰어나고 신속하고 유연한 조준이 가능합니다. 다만 구조적 특성상 포탑 링이 외부로 노출되어 방호력이 취약하다는 단점이 있습니다.\n\n§G설계 힌트: 전차의 공격력을 극대화하고 공격적인 운용에만 집중하려면 이 장비를 사용하십시오.§!"
 tank_unmanned_turret: "무인 포탑"
 tank_unmanned_turret_desc: "무인 포탑은 전차 차체 내부에서 원격으로 조작하므로 승무원의 생존성을 크게 높여줍니다. 승무원 공간이 필요 없으므로 포탑을 소형화하고 방호력을 강화할 수 있으나, 외부 영상을 통해 조작해야 하므로 시야 확보가 제한될 수 있습니다.\n\n§G설계 힌트: 무인 포탑은 부유한 국가의 핵심 선택지입니다. 비용을 감수하더라도 전차의 방호력을 극대화하고 싶다면 이 장비를 사용하십시오.§!"
 tank_steel_armor_gen1: "초기 강철 장갑"
 tank_steel_armor_gen1_desc: "1세대 주력 전차에 사용된 초기 압연 균질 장갑(RHA)입니다.\n\n§G설계 힌트: 강철 장갑은 전차를 위한 저예산 장갑 옵션입니다. 현대적인 복합 장갑을 견뎌내지는 못할 것입니다.§!"
 tank_steel_armor_gen2: "개선된 강철 장갑"
 tank_steel_armor_gen2_desc: "개선된 강철 합금 및 주조 기술을 통해 동일한 부피와 질량 대비 더 나은 방어력을 제공합니다.\n\n§G설계 힌트: 강철 장갑은 전차를 위한 저예산 장갑 옵션입니다. 현대적인 복합 장갑을 견뎌내지는 못할 것입니다.§!"
 tank_composite_armor_gen1: "초기 냉전 복합 장갑"
 tank_composite_armor_gen1_desc: "최초의 복합 장갑은 미국의 T95 중전차에서 실험되었습니다. 강판 사이에 용융 실리카 유리(석영 유리) 판을 설치하여 관통에 대한 방어력을 강화했습니다. 실제 양산되지는 않았지만 이후 개발의 영감이 되었습니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 tank_composite_armor_gen2: "냉전기 복합 장갑"
 tank_composite_armor_gen2_desc: "실리카 유리를 유리 섬유로 교체하고 세라믹 커런덤 판을 추가하여 장갑의 강도를 크게 높였습니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 tank_composite_armor_gen3: "현대 복합 장갑"
 tank_composite_armor_gen3_desc: "현대식 복합 장갑은 양쪽에 탄성판이 설치된 금속 벌집 패턴 내부의 세라믹 타일과 장갑 도금으로 구성됩니다. 이 장갑은 전통적인 운동 에너지 관통자는 물론 성형 작약탄(HEAT)에 대해서도 뛰어난 방어력을 제공합니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 tank_composite_armor_gen4: "발전된 복합 장갑"
 tank_composite_armor_gen4_desc: "3D 프린팅, 레이저 소결 및 탄소 나노튜브가 포함된 나노 크기의 알루미나 분말을 적용하여 전차에 최고 수준의 방어력을 제공합니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 tank_battlestation_1: "초기 냉전 배틀스테이션"
 tank_battlestation_1_desc: "라디오와 기초적인 탄도 컴퓨터가 탑재되어 있습니다.\n\n§G설계 힌트: 배틀스테이션은 전차 운용에 필요한 사격 통제, 화기 제어, 광학 장비 및 기타 보조 장비를 나타냅니다. 더 우수한 배틀스테이션을 장착할수록 전차의 전반적인 품질이 향상됩니다.§!"
 tank_battlestation_2: "냉전기 배틀스테이션"
 tank_battlestation_2_desc: "이중화된 라디오 장비와 반자동 디지털 탄도 컴퓨터가 탑재되어 있습니다.\n\n§G설계 힌트: 배틀스테이션은 전차 운용에 필요한 사격 통제, 화기 제어, 광학 장비 및 기타 보조 장비를 나타냅니다. 더 우수한 배틀스테이션을 장착할수록 전차의 전반적인 품질이 향상됩니다.§!"
 tank_battlestation_3: "현대 배틀스테이션"
 tank_battlestation_3_desc: "내비게이션 시스템, 카메라 및 완전 디지털 탄도 컴퓨터가 탑재되어 있습니다.\n\n§G설계 힌트: 배틀스테이션은 전차 운용에 필요한 사격 통제, 화기 제어, 광학 장비 및 기타 보조 장비를 나타냅니다. 더 우수한 배틀스테이션을 장착할수록 전차의 전반적인 품질이 향상됩니다.§!"
 tank_battlestation_4: "발전된 배틀스테이션"
 tank_battlestation_4_desc: "다목적 카메라 세트와 고급 전투 관측 시스템이 탑재되어 있습니다.\n\n§G설계 힌트: 배틀스테이션은 전차 운용에 필요한 사격 통제, 화기 제어, 광학 장비 및 기타 보조 장비를 나타냅니다. 더 우수한 배틀스테이션을 장착할수록 전차의 전반적인 품질이 향상됩니다.§!"
 smoke_launchers: "초기 연막 발사기"
 smoke_launchers_desc: "적의 직접적인 사격으로부터 차량을 엄호하기 위한 연막 발사기 세트입니다.\n\n§G설계 힌트: 연막 발사기를 추가하면 전차의 피탐지율이 감소하여 방어와 공격 모두에서 더욱 유리해집니다.§!"
 smoke_launchers_2: "개선된 연막 발사기"
 smoke_launchers_2_desc: "개선된 화학 조성의 연막탄은 적외선 탐지 장비로부터도 차량을 효과적으로 은폐합니다.\n\n§G설계 힌트: 연막 발사기를 추가하면 전차의 피탐지율이 감소하여 방어와 공격 모두에서 더욱 유리해집니다.§!"
 reactive_armor_gen1: "1세대 폭발반응장갑 (ERA)"
 reactive_armor_gen1_desc: "폭발반응장갑(ERA)은 전차에 설치된 금속 프레임 위에 폭약으로 채워진 블록으로 구성됩니다. 운동관통탄이나 성형작약탄이 블록에 명중하면 내부 폭약이 폭발하며 날아오는 발사체에 대응합니다. 60년대에 초기 성형작약탄에 대응하기 위한 첫 번째 실험이 이루어졌으나, 당시에는 생산으로 이어지지 않았습니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 reactive_armor_gen2: "2세대 폭발반응장갑 (ERA)"
 reactive_armor_gen2_desc: "폭발반응장갑(ERA) 블록의 크기를 늘리고 폭약 양과 프레임 두께를 보강하여, 운동관통탄까지 대응할 수 있도록 폭발력을 높였습니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 reactive_armor_gen3: "3세대 폭발반응장갑 (ERA)"
 reactive_armor_gen3_desc: "새로운 구조를 도입하여 운동관통탄과 성형작약탄 모두에 대한 방어력을 강화했습니다. 특히 폭발반응장갑을 무력화하기 위해 고안된 탠덤 탄두까지 방어할 수 있습니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 reactive_armor_gen4: "4세대 폭발반응장갑 (ERA)"
 reactive_armor_gen4_desc: "매우 발전된 형태의 폭발반응장갑으로, 다양한 환경 조건에서 운용 가능하며 적의 화력 대부분을 효과적으로 무력화합니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 spaced_armor_gen1: "초기형 공간장갑"
 spaced_armor_gen1_desc: "공간장갑은 주장갑과 추가 장갑판 사이에 공간을 둔 장갑 체계입니다. 외부 장갑판은 성형작약탄을 조기에 폭발시켜 관통력을 감소시킵니다. 초기형 공간장갑은 단순한 얇은 장갑판으로 구성됩니다.\n\n§G설계 힌트: 공간장갑은 전차에 더 많은 보호를 제공하기 위한 폭발반응장갑(ERA)의 보급형 버전입니다.§!"
 spaced_armor_gen2: "개선된 공간장갑"
 spaced_armor_gen2_desc: "견고한 강철판 대신 망사나 케이지 구조를 적용하여, 더 적은 무게로도 적의 탄두로부터 전차를 보호할 수 있습니다.\n\n§G설계 힌트: 공간장갑은 전차에 더 많은 보호를 제공하기 위한 폭발반응장갑(ERA)의 보급형 버전입니다.§!"
 wet_ammo_storage: "폭발 패널"
 wet_ammo_storage_desc: "재앙적인 탄약 유폭이 발생할 경우를 대비해, 전차 설계 시에 정해진 약점을 염두에 두는 것이 좋습니다. 그리 하면, 폭발을 승무원 구획이 아닌 전차 외부로 향하게 유도할 수 있습니다.\n\n§G설계 힌트: 폭발 패널은 전차의 생존성을 높이는 데 효과적인 방법입니다.§!"
 automatic_loading: "자동장전 시스템"
 automatic_loading_desc: "소련 및 러시아 전차에서 흔히 볼 수 있는 자동장전 시스템은 기계식 리프트가 탄약을 자동으로 주포에 장전합니다. 이 때문에 탄약은 흔히 주포 아래나 근처의 케로셀(회전식 탄약고)에 저장됩니다. 자동장전장치가 있는 전차는 승무원 거주 구역에 실탄을 함께 적재해야 합니다. 자동장전장치는 수동 장전보다 훨씬 빠른 연사력을 제공하지만, 장갑이 관통될 경우 탄약이 유폭되어 전차와 승무원이 전멸할 위험이 큽니다.\n\n§G설계 힌트: 자동장전장치는 목표물에 대해 지속적인 화력을 투사할 수 있게 해주지만, 피격 시 전차를 완전히 상실할 위험을 높입니다.§!"
 manual_loading: "수동 장전"
 manual_loading_desc: "인간 장전수입니다. 숙련된 장전수는 상황에 따라 기존의 케로셀 자동장전장치보다 더 빠르게 장전할 수도 있습니다. 제4의 승무원(장전수)을 두는 개념은 야전 정비 시 추가적인 인력이 필요하다는 점 때문에 오랫동안 유지되어 왔습니다.\n\n§G설계 힌트: 이는 모든 전차의 표준 장전 시스템입니다. 저렴하고 위험 부담이 낮은 선택지입니다.§!"
 revolver_magazine: "회전식 자동장전장치"
 revolver_magazine_desc: "버슬형 자동장전장치 포탑입니다. 케로셀 방식의 자동장전장치보다 더 빠르고 더 안전합니다. 이 체계의 가장 큰 단점은 비싼 가격입니다.\n\n§G설계 힌트: 추가 비용을 감수할 수 있다면, 회전식 자동장전장치가 전차에 더 적합합니다.§!"
 hardkill_system_gen1: "초기형 능동파괴체계"
 hardkill_system_gen1_desc: "하드킬 시스템은 전차에 장착되는 능동 방어 수단입니다. 이 시스템은 접근하는 탄체를 탐지하여 자체 탄체로 대응합니다. 대응 탄체는 로켓, 미사일 또는 운동 에너지 탄체일 수 있습니다. 초기형 하드킬 시스템은 주로 성형작약탄으로부터 전차를 보호하는 역할을 했습니다.\n\n§G설계 힌트: 하드킬 시스템은 적의 미사일에 대한 전차의 방어 능력을 강화하는 좋은 방법입니다. 또한 이 시스템을 통해 전차가 적의 방어선을 더 효과적으로 돌파할 수 있게 됩니다.§!"
 hardkill_system_gen2: "발전된 능동파괴체계"
 hardkill_system_gen2_desc: "개선된 하드킬 시스템은 고속으로 이동하는 운동 에너지 관통탄과 탠덤 성형작약탄조차도 저지할 수 있습니다. 또한 이 개선된 시스템은 전차를 모든 방향에서 보호합니다.\n\n§G설계 힌트: 하드킬 시스템은 적의 미사일에 대한 전차의 방어 능력을 강화하는 좋은 방법입니다. 또한 이 시스템을 통해 전차가 적의 방어선을 더 효과적으로 돌파할 수 있게 됩니다.§!"
 smoothbore_atgm_gen1: "냉전 초기 활강 ATGM (대전차 유도 미사일)"
 smoothbore_atgm_gen1_desc: "약간의 개조만으로 전차 주포를 통해 대전차 유도 미사일(ATGM)을 발사할 수 있습니다. 초기형 활강 ATGM은 조준기나 조준 망원경과 연동된 적외선 탐색기를 통해 유도되었습니다.\n\n§G설계 힌트: 전차의 주포에서 기존의 운동에너지 관통탄 외에도 ATGM을 발사할 수 있게 개조하면, 적 기갑 부대와의 교전 능력이 비약적으로 향상됩니다.§!"
 smoothbore_atgm_gen2: "냉전 후기 활강 ATGM (대전차 유도 미사일)"
 smoothbore_atgm_gen2_desc: "레이저 표적 지시 조준 방식을 도입하여 조준 왜곡이 줄어들었으며, ATGM이 목표물을 향해 훨씬 정확하게 비행합니다.\n\n§G설계 힌트: 전차의 주포에서 기존의 운동에너지 관통탄 외에도 ATGM을 발사할 수 있게 개조하면, 적 기갑 부대와의 교전 능력이 비약적으로 향상됩니다.§!"
 smoothbore_atgm_gen3: "현대 활강 ATGM (대전차 유도 미사일)"
 smoothbore_atgm_gen3_desc: "발사 후 망각(Fire-and-forget) 방식의 전차 포신 발사형 ATGM을 통해, 미사일로 하나의 목표물을 공격함과 동시에 신속하게 다음 목표물로 화력을 전환할 수 있습니다.\n\n§G설계 힌트: 전차의 주포에서 기존의 운동에너지 관통탄 외에도 ATGM을 발사할 수 있게 개조하면, 적 기갑 부대와의 교전 능력이 비약적으로 향상됩니다.§!"
 smoothbore_atgm_gen4: "발전된 활강 ATGM (대전차 유도 미사일)"
 smoothbore_atgm_gen4_desc: "ATGM 탄두의 탠덤 작약을 개선하여 더욱 견고한 적의 장갑까지 관통할 수 있게 되었습니다.\n\n§G설계 힌트: 전차의 주포에서 기존의 운동에너지 관통탄 외에도 ATGM을 발사할 수 있게 개조하면, 적 기갑 부대와의 교전 능력이 비약적으로 향상됩니다.§!"
 smoothbore_atgm_gen5: "미래 활강 ATGM (대전차 유도 미사일)"
 smoothbore_atgm_gen5_desc: "첨단 AI와 알고리즘이 적용된 이 ATGM은 복잡한 비행 경로를 설정하여 장애물을 회피하고 최적의 접근 각도를 확보합니다. 필요할 경우 비행 중에도 목표물을 변경할 수 있습니다.\n\n§G설계 힌트: 전차의 주포에서 기존의 운동에너지 관통탄 외에도 ATGM을 발사할 수 있게 개조하면, 적 기갑 부대와의 교전 능력이 비약적으로 향상됩니다.§!"
 tank_longer_gun: "포신 연장"
 tank_longer_gun_desc: "포신의 길이를 원래 설계보다 늘림으로써, 발사되는 포탄의 포구 속도를 증가시킬 수 있습니다.\n\n§G설계 힌트: 더 긴 포를 사용할 수 있도록 보강하는 것은 주포 전체를 교체하지 않고도 적의 장갑에 대한 전차의 대응 능력을 향상시킬 수 있는 쉬운 방법입니다.§!"
 tank_aux_engine: "보조 전기 엔진"
 tank_aux_engine_desc: "보조 전기 엔진(또는 보조 동력 장치, APU)을 사용하면 주 엔진을 켜지 않고도 포탑과 같은 전차의 일부 장비를 운용할 수 있습니다. 이를 통해 전차가 정지해 있을 때 일부 기능을 부분적으로 운용하며 연료를 절약할 수 있습니다.\n\n§G설계 힌트: 보조 전기 엔진을 추가하는 것은 가스 터빈 엔진처럼 연료 소모가 많은 엔진에서 가장 효과적입니다.§!"
 tank_aux_engine_2: "개선된 보조 전기 엔진"
 tank_aux_engine_2_desc: "개선된 보조 동력 장치(APU)는 이전 모델보다 더 많은 이점을 제공하며, 훨씬 더 효율적으로 작동합니다.\n\n§G설계 힌트: 보조 전기 엔진을 추가하는 것은 가스 터빈 엔진처럼 연료 소모가 많은 엔진에서 가장 효과적입니다.§!"
 tank_drones: "지원 드론"
 tank_drones_desc: "전차 포탑에는 드론 제어 스테이션을 장착할 수 있습니다. 드론은 주변 전장을 조사하고, 목표물을 획득하고 화력을 관찰하는 데 사용할 수 있습니다.\n\n§G설계 힌트: 전차에 드론을 장착하는 것은 적을 물리치는 데 매우 효과적입니다.§!"
 tank_drones_2: "개선된 지원 드론"
 tank_drones_2_desc: "개선된 지원 드론은 전장을 조사할 수 있을 뿐만 아니라, 직접적으로 사격을 유도하고, 목표물을 고정하여 유도 무기를 운용할 수 있으며, 심지어 다가오는 발사체를 방어할 수도 있습니다.\n\n§G설계 힌트: 전차에 드론을 장착하는 것은 적을 물리치는 데 매우 효과적입니다.§!"
 tank_nsb_armor_upgrade: "장갑"
 ARG_tank_small_medium_cannon_2: "105mm FM K.4 Modelo 1L"
 ARG_tank_small_medium_cannon_2_desc: "파브리카시오네스 밀리타레스에서 제조한 영국제 L7 전차포의 아르헨티나 면허 생산 버전입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 ARG_tank_diesel_engine_gen2: "MB 833 Ka-500, 720마력"
 ARG_tank_diesel_engine_gen2_desc: "MB 833 Ka-500은 본래 MTU에서 제조한 독일제 디젤 엔진입니다. 이 엔진은 아르헨티나에서 TAM 전차에 사용할 수 있도록 개조되었습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 BRA_tank_small_medium_cannon: "105mm L7A3"
 BRA_tank_small_medium_cannon_desc: "독일제 105mm L7A3의 브라질 면허 생산 버전입니다. 이 냉전 시대 무기는 레오파르트 1 전차의 주력 무장이었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 BRA_tank_medium_cannon: "120mm GIAT G1"
 BRA_tank_medium_cannon_desc: "120mm GIAT G1은 프랑스 부르주 기술 연구 제조소(EFAB)에서 제작한 CN120-25의 브라질 면허 생산 버전입니다. 이 냉전 시대 전차포는 지아트 인더스트리(Giat Industries)의 AMX-32 및 AMX-40 전차의 주력 무장이었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 BRA_tank_diesel_engine_gen2: "MWM TBD 234, 1000마력"
 BRA_tank_diesel_engine_gen2_desc: "MWM TBH 234는 독일제 MWM TBD 234를 면허 생산한 브라질 버전으로, 냉전 시대에 설계된 콤팩트하고 고출력을 자랑하는 냉전기 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 CHI_tank_small_medium_cannon: "59식 100mm"
 CHI_tank_small_medium_cannon_desc: "59식은 T-55 시리즈에 사용된 D-10T 전차포의 중국형 복제판입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 CHI_tank_small_medium_cannon_2: "105mm ZPL-81A"
 CHI_tank_small_medium_cannon_2_desc: "ZPL-81A는 영국제 L7A3 포의 중국 면허 생산 버전입니다. 중국형 모델은 자체 제작한 개량형 열소매를 장착하고 있습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 CHI_tank_small_medium_cannon_3: "105mm ZPL-98A"
 CHI_tank_small_medium_cannon_3_desc: "ZPL-98A는 영국제 L7A3 포의 중국 면허 생산 버전입니다. 이 개량형 모델은 자체 개발한 저반동 포구 제동기(머즐 브레이크)를 갖추고 있으며 무게가 더 가볍습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 CHI_tank_medium_cannon: "88식 C 125mm"
 CHI_tank_medium_cannon_desc: "88식 C는 소련제 2A46M 포를 기반으로 한 초기 중국 주력 전차포입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 CHI_tank_medium_cannon_2: "125mm ZPT-98"
 CHI_tank_medium_cannon_2_desc: "ZPT-98은 중국에서 제작한 125mm 주력 전차포로, 포신 중간에 식별이 용이한 배연기가 장착되어 있습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 CHI_tank_diesel_engine_gen1: "Model 12150L V-12, 520마력"
 CHI_tank_diesel_engine_gen1_desc: "Model 12150L은 냉전 초기 중국의 12기통 엔진입니다. 전차에 장착할 경우 5단 수동 변속기와 결합됩니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 CHI_tank_diesel_engine_gen2: "Model 12150L-7BW V-12, 580마력"
 CHI_tank_diesel_engine_gen2_desc: "Model 12150L-7BW는 이전 12150L 모델의 개선형 버전입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 CHI_tank_diesel_engine_gen3: "Model 12150ZL V-12, 730마력"
 CHI_tank_diesel_engine_gen3_desc: "Model 12150ZL은 이전 12150L-7BW 모델의 개선형 버전입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 CHI_tank_diesel_engine_gen4: "KMDB 6TD-2, 1200마력"
 CHI_tank_diesel_engine_gen4_desc: "KMDB 6TD-2는 본래 90-II식 시제 전차를 위해 계획된 러시아제 전차 엔진입니다. 이 전차는 중국군에 제식 채용되지는 않았으나, 파키스탄군에서 알칼리드(Al-Khalid) 전차로 계속 채용되어 운용되었습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 CHI_tank_diesel_engine_gen5: "150HB, 1500마력"
 CHI_tank_diesel_engine_gen5_desc: "150HB는 레오파르트 2에 사용되는 독일제 MB 873 Ka-501을 기반으로 노린코(Norinco)에서 제작한 디젤 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 CHI_reactive_armor_gen1: "FY-I"
 CHI_reactive_armor_gen1_desc: "FY-I은 성형작약탄에 대응하기 위해 설계된 중국제 1세대 폭발반응장갑입니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 CHI_reactive_armor_gen2: "FY-II"
 CHI_reactive_armor_gen2_desc: "FY-II는 성형작약탄과 APFSDS(날개안정분리철갑탄)로부터 전차를 보호하는 중국제 2세대 폭발반응장갑입니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 CHI_reactive_armor_gen3: "FY-IV"
 CHI_reactive_armor_gen3_desc: "FY-IV는 성형작약탄과 탠덤 탄두에 대응 가능한 중국제 3세대 폭발반응장갑입니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 CHI_reactive_armor_gen4: "FY-V"
 CHI_reactive_armor_gen4_desc: "FY-V는 가능한 모든 위협으로부터 전차를 보호하기 위해 설계된 중국제 4세대 폭발반응장갑입니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 CHI_hardkill_system_gen1: "GL5"
 ENG_tank_small_medium_cannon: "105mm L7A1"
 ENG_tank_small_medium_cannon_desc: "로열 오드넌스(Royal Ordnance) L7 전차포는 가장 유명한 전차포 중 하나입니다. 많은 국가에서 면허 생산 및 복제되었으며, 이 포와 다양한 파생형은 냉전 초기 전반에 걸쳐 광범위하게 사용되었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 ENG_tank_small_medium_cannon_2: "105mm L7A2"
 ENG_tank_small_medium_cannon_2_desc: "L7A2는 기존 L7 모델에 열소매를 추가하여 개선한 버전입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 ENG_tank_small_medium_cannon_3: "105mm 로열 오드넌스 IWS"
 ENG_tank_small_medium_cannon_3_desc: "로열 오드넌스 IWS(개량형 무기 체계)는 L7 포를 한층 더 발전시켜 더 높은 약실 압력을 견디도록 설계하고 포신을 연장한 형태입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 ENG_tank_medium_cannon: "120mm L11A5"
 ENG_tank_medium_cannon_desc: "L11A5는 소형 L7 포의 후계자로 설계된 영국제 전차포입니다. L11A5 포는 현재까지도 최장 거리 전차 격파 기록(걸프전 당시 4.7km 거리에서 이라크군 T-55 격파)을 보유하고 있습니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 ENG_tank_medium_cannon_2: "120mm L30A1"
 ENG_tank_medium_cannon_2_desc: "L30 포는 구형 L11 모델의 개선형입니다. 크롬 합금 라이닝을 갖춘 일렉트로 슬래그 재용해 강철로 제작되었습니다. 나토(NATO) 전차 무장으로는 드물게도 이전 모델과 마찬가지로 강선포입니다. 이는 영국 육군이 HESH(점착 유탄)를 많이 사용하기 때문입니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 ENG_tank_diesel_engine_gen1: "롤스로이스 미티어, 650마력"
 ENG_tank_diesel_engine_gen1_desc: "롤스로이스 미티어 엔진은 제2차 세계 대전 시기의 다목적 전차 엔진입니다. 본래 항공기용 엔진에서 유래하였으며, 크롬웰, 코멧 및 센추리온 전차에 사용되었습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 ENG_tank_diesel_engine_gen2: "퍼킨스 CV12-1200TCA, 1200마력"
 ENG_tank_diesel_engine_gen2_desc: "퍼킨스 CV12 엔진은 챌린저 1 및 챌린저 2 전차를 위해 개발된 매우 강력한 디젤 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 ENG_tank_composite_armor_gen1: "초밤"
 ENG_tank_composite_armor_gen1_desc: "초밤 장갑은 챌린저 전차를 위해 개발된 영국식 복합 장갑입니다. 강철과 결합된 세라믹 타일과 그 뒤를 받치는 탄성판으로 구성됩니다. '초밤'이라는 용어는 전차나 제조사와 상관없이 복합 장갑과 동의어로 사용됩니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 ENG_tank_composite_armor_gen2: "도체스터"
 ENG_tank_composite_armor_gen2_desc: "도체스터 장갑은 오리지널 초밤 장갑의 최신 변형으로, 현재 에이브람스와 챌린저 2 전차에 사용되고 있습니다. 개선된 이 버전은 적의 포격에 대해 더 뛰어난 방어력을 제공합니다.\n\n§G설계 힌트: 복합 장갑은 현대 주력 전차의 표준적인 옵션입니다.§!"
 SOV_tank_small_medium_cannon: "90-95mm D-10T2S"
 SOV_tank_small_medium_cannon_desc: "D-10은 제2차 세계 대전 말기에 개발된 소련제 전차포로, SU-100 구축전차에 처음 탑재되었습니다. 냉전 초기, 이 무기는 T-54 및 T-55 시리즈 전차의 주력 무장이 되었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 SOV_tank_small_medium_cannon_2: "115mm U-5TS"
 SOV_tank_small_medium_cannon_2_desc: "U-5TS는 전차용으로 개발된 최초의 활강포입니다. T-55의 100mm 주포는 서방의 새로운 치프틴이나 M48 패튼을 상대하기에는 너무 약했습니다. 이에 대응하여 소련은 115mm 주포를 개발했습니다. 이 주포는 T-62 전차에만 사용되었으며, 이란-이라크 전쟁에서 T-62가 치프틴과 M60을 격파한 사례에서 알 수 있듯이 현대적인 전차를 상대로도 충분히 효과적이었습니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 SOV_tank_small_medium_cannon_3: "100mm 2A70"
 SOV_tank_small_medium_cannon_3_desc: "2A70은 경장갑 차량을 위해 설계된 속사 강선포입니다. 주로 고폭탄(HE) 사용을 목적으로 합니다. 2A70은 BMP-3 시리즈의 주력 무기입니다.\n\n§G설계 힌트: 저구경 포는 포구 속도가 낮아 고폭탄에 적합합니다. 대물 공격보다 대인 공격을 우선시하려면 사용하십시오.§!"
 SOV_tank_medium_cannon: "125mm 2A46"
 SOV_tank_medium_cannon_desc: "2A46은 가장 보편적인 소련제 전차포입니다. 본래 T-64를 위해 개발되었으며, 그 이후 모든 소련 및 러시아 전차뿐만 아니라 다수의 해외 전차에도 사용되었습니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 SOV_tank_medium_cannon_2: "125mm 2A46M"
 SOV_tank_medium_cannon_2_desc: "2A46M은 기존 2A46 포를 계열화하여 개발한 모델로, 향상된 탄약 운용 능력과 전반적인 성능 개선을 이루었습니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 SOV_tank_medium_cannon_3: "125mm 2A82-1M"
 SOV_tank_medium_cannon_3_desc: "러시아 전차 기술의 최신 발전형인 2A82-1M은 신형 T-14 아르마타 전차용입니다. 이 포는 구형 2A46M보다 15~20% 더 뛰어난 명중률을 보이며, 레오파르트 2의 주포보다 더 높은 포구 속도를 가집니다.\n\n§G설계 힌트: 중형 구경 포는 균형 잡힌 전차포입니다. 대인 공격이나 대물 공격 둘 다 선호하지 않는 경우 사용하십시오.§!"
 SOV_tank_large_cannon: "130mm M-65 L/60"
 SOV_tank_large_cannon_desc: "핵폭발을 견딜 수 있도록 설계된 오비옉트 279 중돌격전차에 탑재할 목적으로 개발된 실험용 중전차포입니다. 중전차의 수요가 급감하면서 해당 프로젝트와 함께 개발이 취소되었습니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 SOV_tank_large_cannon_2: "130mm M-65 L/70"
 SOV_tank_large_cannon_2_desc: "오비옉트 279 전차포의 개량형입니다. 이 강선식 중전차포는 T-80 전차의 업그레이드 안인 오비옉트 785에 탑재할 예정이었으나, 프로젝트가 중단되었습니다.\n\n§G설계 힌트: 중전차포는 주로 대전차 임무에 사용됩니다. 약간의 대인 공격 능력을 유지하면서도 대물 공격을 선호할 경우 사용하십시오.§!"
 SOV_tank_very_large_cannon: "152mm LP-83"
 SOV_tank_very_large_cannon_desc: "LP-83은 T-80BV를 대체하기 위해 고안된 오비옉트 292 전차에 테스트된 실험용 초중전차포입니다. 1990년 시제 전차와 포가 제작되었으나 자금 부족과 관심 저하로 프로젝트가 취소되었습니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 SOV_tank_very_large_cannon_2: "152mm 2A83"
 SOV_tank_very_large_cannon_2_desc: "2A83은 소련의 초중전차포 계보를 잇는 모델입니다. 서방 전차들을 완전히 압도하기 위한 T-14 아르마타의 차기 업그레이드안으로 고려되고 있습니다.\n\n§G설계 힌트: 초중전차포는 대전차 임무에 사용됩니다. 대인 공격보다 대물 공격을 압도적으로 선호할 경우 사용하십시오.§!"
 SOV_tank_diesel_engine_gen1: "V-55, 581마력"
 SOV_tank_diesel_engine_gen1_desc: "V-55는 T-55 전차에 사용되었던 12기통 자연흡기 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_diesel_engine_gen2: "5TDF, 700마력"
 SOV_tank_diesel_engine_gen2_desc: "5TDF는 대향 피스톤 및 수평 실린더 설계를 갖춘 2행정, 다종연료, 고출력 슈퍼차저, 수랭식, 직접 분사 디젤 엔진입니다. 본래 T-64를 위해 설계되었으나, T-72의 초기 모델에도 사용되었습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_diesel_engine_gen3: "V-84, 840마력"
 SOV_tank_diesel_engine_gen3_desc: "V-84 전차 엔진은 본래 T-72의 업그레이드용으로 계획되었던 12기통 터보차저 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_diesel_engine_gen4: "V-92S2, 1000마력"
 SOV_tank_diesel_engine_gen4_desc: "V-92S2 터보차저 디젤 엔진은 T-72B3 및 T-90 시리즈 전차를 위해 설계되었습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_diesel_engine_gen5: "V-92S2F, 1130마력"
 SOV_tank_diesel_engine_gen5_desc: "V-92S2F는 구형 V-92S2 모델의 개선형 버전입니다. 구형 모델을 대체할 수 있는 직결형(drop-in) 업그레이드로 개발되었습니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_diesel_engine_gen6: "2V-12-3A, 1500마력"
 SOV_tank_diesel_engine_gen6_desc: "2V-12-3A는 T-14 아르마타(Armata)를 위해 계획되었던 X12 형태의 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_diesel_engine_gen7: "A-85-3A, 1500마력"
 SOV_tank_diesel_engine_gen7_desc: "A-85-3A는 구형 모델의 신뢰성 문제로 인해 아르마타에서 기존의 2V-12-3A 엔진을 대체한 X12 형태의 엔진입니다.\n\n§G설계 힌트: 다종연료 디젤 엔진은 전차의 표준적인 엔진입니다§!"
 SOV_tank_gas_turbine_engine_gen1: "GTD-3TL"
 SOV_tank_gas_turbine_engine_gen1_desc: "GTD-3TL은 T-64 전차의 주력 엔진으로 고려되었던 실험용 가스 터빈 엔진입니다. 이후 이 아이디어는 디젤 엔진을 사용하는 방향으로 변경되면서 폐기되었습니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 SOV_tank_gas_turbine_engine_gen2: "SG-1000"
 SOV_tank_gas_turbine_engine_gen2_desc: "SG-1000은 T-80 전차의 초기형 가스 터빈 엔진입니다. 이후 더 개선된 모델로 빠르게 교체되었습니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 SOV_tank_gas_turbine_engine_gen3: "GTD-1000T"
 SOV_tank_gas_turbine_engine_gen3_desc: "GTD-1000T는 T-80A 및 T-80B 전차를 위해 설계된 가스 터빈입니다. 구형 SG-1000보다 신뢰성이 높고 출력(마력)도 약간 더 우수합니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 원활히 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 SOV_tank_gas_turbine_engine_gen4: "GTD-1250"
 SOV_tank_gas_turbine_engine_gen4_desc: "GTD-1250은 2세대 T-80 전차인 T-80U에 사용된 가스 터빈 엔진입니다. 이 가스 터빈은 보조 동력 장치(APU) 역할을 하는 소형 가스 터빈과 함께 작동합니다.\n\n§G설계 힌트: 가스 터빈 엔진은 디젤 엔진보다 가속력이 좋아 차량의 기동성을 향상시킵니다. 하지만, 설치 비용이 많이 들고 연료 소모도 많습니다. 빠른 전차를 원하고 연료를 공급할 수 있다면 가스 터빈 엔진을 사용하십시오.§!"
 SOV_tank_gas_turbine_engine_gen5: "GTD-1250T"
 SOV_tank_gas_turbine_engine_gen6: "GTD-1500"
 SOV_tank_electric_engine_gen1: "VK-1200V"
 SOV_tank_electric_engine_gen2: "VK-1700V"
 SOV_reactive_armor_gen1: "Kontakt-1"
 SOV_reactive_armor_gen1_desc: "Kontakt-1은 소련에서 개발된 1세대 폭발반응장갑(ERA)입니다. 두 강판 사이에 두 개의 4S20 폭발 소자로 구성됩니다. 매우 안정적이며 성형작약탄에만 반응하도록 설계되었습니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 SOV_reactive_armor_gen2: "Kontakt-5"
 SOV_reactive_armor_gen2_desc: "Kontakt-5는 소련에서 개발된 2세대 폭발반응장갑(ERA)입니다. 폭발 시 블록 내의 강판이 측면으로 이동하여 들어오는 발사체의 관통 경로를 길게 만듭니다. 이러한 방어 방식은 운동관통탄에 대해서도 효과적입니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 SOV_reactive_armor_gen3: "렐릭트"
 SOV_reactive_armor_gen3_desc: "Relikt(렐릭트)는 소련에서 개발된 3세대 폭발반응장갑(ERA)입니다. 고속 및 저속 관통자 모두에 대응 가능하며, 탠덤 성형작약탄으로부터도 전차를 보호할 수 있습니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 SOV_reactive_armor_gen4: "말라히트"
 SOV_reactive_armor_gen4_desc: "Malachit(말라히트)는 T-14 아르마타에 탑재된 4세대 폭발반응장갑(ERA)입니다.\n\n§G설계 힌트: 폭발반응장갑(ERA)은 전차의 장갑을 쉽게 업그레이드할 수 있는 방법입니다.§!"
 SOV_smoothbore_atgm_gen1: "9K112 코브라"
 SOV_smoothbore_atgm_gen2: "9M119 스비리"
 SOV_smoothbore_atgm_gen3: "9M133 코르네트"
 SOV_smoothbore_atgm_gen4: "9M140 우다르"
 SOV_smoothbore_atgm_gen5: "9M143 실라"
 SOV_smoke_launchers: "3D6"
 SOV_smoke_launchers_desc: "투차는 소련에서 개발된 81mm 차량 탑재형 연막탄 발사기입니다. 주로 3D6 및 3D6M형 연막탄을 발사하는 데 사용됩니다.\n\n§G설계 힌트: 연막탄 발사기를 추가하면 전차의 피탐지율이 감소하여 방어와 공격 모두에서 더 유리해집니다.§!"
 SOV_smoke_launchers_2: "3D6M"
 SOV_smoke_launchers_2_desc: "투차는 소련에서 개발된 81mm 차량 탑재형 연막탄 발사기입니다. 주로 3D6 및 3D6M형 연막탄을 발사하는 데 사용됩니다.\n\n§G설계 힌트: 연막탄 발사기를 추가하면 전차의 피탐지율이 감소하여 방어와 공격 모두에서 더 유리해집니다.§!"
 SOV_hardkill_system_gen1: "아레나"
 SOV_hardkill_system_gen1_desc: "아레나(Arena) 능동 방어 시스템은 도플러 레이더를 사용하여 접근하는 미사일을 탐지합니다. 미사일이 탐지되면 시스템은 즉시 요격 로켓을 발사하여 미사일을 방어합니다.\n\n§G설계 힌트: 하드킬 시스템은 적의 미사일에 대한 전차의 방어 능력을 강화하는 좋은 방법입니다. 또한 이 시스템을 통해 전차가 적의 방어선을 더 효과적으로 돌파할 수 있게 됩니다.§!"
 SOV_hardkill_system_gen2: "아프가니트"
 SOV_hardkill_system_gen2_desc: "아프가니트(Afganit)는 러시아에서 개발된 최첨단 능동 방어 시스템입니다. T-14 아르마타 전차에 탑재될 목적으로 설계되었습니다. 이 시스템은 미사일과 운동 에너지 관통탄 모두에 대응할 수 있으며, 초속 1700m 미만으로 비행하는 모든 발사체를 요격할 수 있습니다.\n\n§G설계 힌트: 하드킬 시스템은 적의 미사일에 대한 전차의 방어 능력을 강화하는 좋은 방법입니다. 또한 이 시스템을 통해 전차가 적의 방어선을 더 효과적으로 돌파할 수 있게 됩니다.§!"
