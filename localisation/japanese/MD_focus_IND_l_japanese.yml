 indonesia.59.t: "パプアで災害！"
 indonesia.59.d: "西パプアのインフラ提供失敗は、いくつかの軍事生産施設の損傷につながる産業事故をもたらした。"
 indonesia.59.a: "それは防げた！"
 indonesia.61.t: "東ジャワで災害！"
 indonesia.61.d: "東ジャワの人々への提供失敗は企業事故をもたらし、オフィスビル一つが閉鎖されることになった！"
 indonesia.61.a: "それは防げた！"
 indonesia.62.t: "首都で災害！！"
 indonesia.62.d: "首都でもある西ジャワの人々への提供失敗は、産業工場が崩壊する事件につながった。"
 indonesia.62.a: "それは防げた！"
 indonesia.63.t: "空での災害！"
 indonesia.63.d: "適切な航空装備提供の失敗は、フライトの一つで技術的失敗につながり、多くの人々が死亡した！"
 indonesia.63.a: "それは防げた！"
 indonesia.64.t: "首都で災害！！"
 indonesia.64.d: "首都でもある西ジャワの人々への提供失敗は、いくつかの産業工場が崩壊する事件につながった。"
 indonesia.64.a: "それは防げた！"
 indonesia.988.t: "新首都準備"
 indonesia.988.d: "日本からの助言と援助を受けて、我々はジャカルタから首都を移転する準備を始めるという結論に達した。新首都は東ボルネオに置き、建設計画は直ちに開始する！"
 indonesia.988.a: "前進しよう"
 indonesia.888.t: "新シルクロード"
 indonesia.888.d: "中国との最近の会談がちょうど終わった。彼らは我々のパートナーシップ、そしてインドネシアの産業を無から短期間で何かへと引き上げる能力を称賛した。我々にはまだ多くの仕事があるが、中国議長は我が国を称賛し、「21世紀シルクロード」と名付けた。"
 indonesia.888.a: "非常にお世辞だ"
