 focus__EP_agenda: "§C[EUU.GetFlag]Европейский парламент§! в настоящее время не рассматривает повестку дня.\n"
 vote_pass_desc_tt: "[current_active_vote_desc]"
 EU_show_available_desc_101_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\n«Народы Европы, создавая все более тесный союз между собой, полны решимости разделить мирное будущее, основанное на общих ценностях. Осознавая свое духовное и моральное наследие, Союз основан на неделимых, всеобщих ценностях человеческого достоинства, свободы, равенства и солидарности; он основан на принципах демократии и верховенства права». - Преамбула CFR -\n§YХартия основных прав Европейского Союза§! закрепляет политические, социальные и экономические права граждан и резидентов Европейского Союза в европейском праве. Хартия является частью сферы политики Европейского Союза в области свободы, безопасности и правосудия (AFSJ). Она применяется ко всем границам Европейского Союза и Евратома, которые должны действовать и принимать законы в соответствии с ее положениями."
 EU_show_available_desc_102_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\nПосле принятия Лакенской декларации Европейский совет принял решение созвать Конвент о будущем Союза, чтобы сделать решительный шаг для граждан к более простому Союзу, который будет сильнее в достижении своих основных целей и более определенно представлен в мире."
 EU_show_available_desc_103_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\nЕвропейский Конвент завершился проектом Договора об учреждении Конституции Европы. Этот международный договор должен был заменить существующие европейские договоры, чтобы создать консолидированную конституцию для §C[EUU.GetFlag] Европейского Союза§! и расширить квалифицированное большинство голосований в областях политики, которые ранее решались единогласно среди государств-членов."
 EU_show_available_desc_104_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\nПроцесс, ведущий к Лиссабонскому договору, является результатом негативного результата ратификации Европейской конституции. Лиссабонский договор о внесении изменений в Договор о Европейском союзе и Договор об учреждении Европейского сообщества. Последний переименован в Договор о функционировании Европейского союза."
 EU_show_available_desc_105_loc_key: "§9Предлагаемый закон представляет собой Закон ЕС об офисах.§!\n\nСлужба внешних действий ЕС — дипломатическая служба Европейского союза. Она помогает главе внешнеполитического ведомства ЕС — Верховному представителю по иностранным делам и политике безопасности — проводить в жизнь Общую внешнюю политику и политику безопасности Союза."
 EU_show_available_desc_201_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nЕвропейский центральный банк принял решение о внедрении своих решений по денежно-кредитной политике, а Совет управляющих Европейского центрального банка принял новый набор инструментов и процедур денежно-кредитной политики. Общая документация по денежной политике и инструментам Евросистемы описала, как и в какой степени ЕЦБ может использовать эти инструменты. Одним из таких методов является политика нулевой процентной ставки ЕЦБ, которая поможет достичь целей, поставленных ЕЦБ."
 EU_show_available_desc_202_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nВ ответ на недавний финансовый кризис был создан Европейский банковский союз для более безопасного финансового сектора для единого рынка. Эти инициативы формируют единый свод правил для всех финансовых субъектов в государствах-членах ЕС. Они включают более жесткие пруденциальные требования к банкам, улучшенную защиту вкладчиков и правила управления банками, терпящими неудачу."
 EU_show_available_desc_203_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nЕврооблигации являются новым вариантом финансирования государственного долга. Такой общий выпуск облигаций членами еврозоны будет означать значительное углубление валютного союза. Это создаст новые средства, с помощью которых правительства будут финансировать свой долг, предлагая безопасные и ликвидные инвестиционные возможности для вкладчиков и финансовых учреждений и создавая рынок еврооблигаций, который соответствует рынку облигаций США."
 EU_show_available_desc_204_loc_key: "§GЭтот предложенный закон является экономическим законом ЕС.§!\n\nЕвропейский фонд финансовой стабильности (EFSF) был создан как временный механизм разрешения кризиса государствами-членами еврозоны в ходе европейского долгового кризиса и предоставлял финансовую помощь нескольким государствам-членам. Это финансировалось через выпуск облигаций EFSF и других долговых инструментов на рынках капитала. EFSF больше не предоставляет финансовую помощь, так как эту задачу теперь выполняет исключительно Европейский стабилизационный механизм (ESM)."
 EU_show_available_desc_205_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nМиссия ESM заключается в предоставлении финансовой помощи странам еврозоны, которые испытывают или которым угрожают серьезные финансовые проблемы. Эта помощь предоставляется только в том случае, если доказано, что она необходима для обеспечения финансовой стабильности еврозоны в целом и членов ESM."
 EU_show_available_desc_206_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nФискальный союз предполагает, что государства-члены будут использовать один и тот же общий бюджет. Это означает, что расходы и уровни налогов будут определяться центральным фискальным органом. Фискальный союз предлагается как шаг к дальнейшей европейской интеграции. Это будет означать, что центральный европейский орган будет устанавливать расходы и налоговые ставки для всех государств-членов."
 EU_show_available_desc_207_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nЕвропейское экономическое правительство сделало бы возможной общую фискальную и активную экономическую политику в ЕС. Оно дало бы §C[EUU.GetFlag] Европейскому союзу§! собственный налоговый орган, а центральный орган установил бы минимальную заработную плату для государств-членов."
 EU_show_available_desc_208_loc_key: "§GПредлагаемый закон является экономическим законом ЕС.§!\n\nЕвропейский министр экономики и финансов объединяет в одном офисе политику и полномочия, установленные Фискальным союзом и Европейским экономическим правительством."
 EU_show_available_desc_301_loc_key: "§RПредлагаемый закон представляет собой военный закон ЕС.§!\n\nЕвропейское оборонное агентство было создано для поддержки государств-членов и §C[EUU.GetFlag] Европейского союза§! в их усилиях по улучшению европейского оборонного потенциала в области управления кризисами и для поддержания Европейской политики безопасности и обороны в ее нынешнем виде и в целях ее дальнейшего развития."
 EU_show_available_desc_302_loc_key: "§RПредлагаемый закон представляет собой военный закон ЕС.§!\n\nПостоянное структурированное сотрудничество (PESCO) позволяет таким образом желающим и способным государствам-членам совместно планировать, разрабатывать и инвестировать в проекты совместного потенциала, а также повышать оперативную готовность и вклад своих вооруженных сил. Цель состоит в том, чтобы совместно разработать согласованный пакет сил полного спектра и сделать возможности доступными для государств-членов для национальных и многонациональных миссий и операций."
 EU_show_available_desc_303_loc_key: "§RПредлагаемый закон представляет собой военный закон ЕС.§!\n\nЕвропейский оборонный фонд внесет ключевой вклад в стратегическую автономию Европы, защищая и обороняя ее граждан. Он будет способствовать оборонному сотрудничеству между компаниями и странами ЕС для содействия инновациям и разработки современных оборонных технологий и продуктов. Фонд будет координировать, дополнять и усиливать национальные инвестиции в оборону."
 EU_show_available_desc_304_loc_key: "§RПредлагаемый закон представляет собой военный закон ЕС.§!\n\nЕвропейский совет безопасности (ЕСБ) сделает ЕС более подготовленным к принятию решений по вопросам международной политики. Если ЕС не сможет быстрее принимать и реализовывать согласованные решения, его способность обеспечивать соблюдение правил ЕС и укреплять многосторонние форматы будет ослаблена. Поэтому дипломатические, финансовые и военные ресурсы ЕС должны быть дополнены форматом для более эффективного межправительственного сотрудничества."
 EU_show_available_desc_305_loc_key: "§9Предлагаемый закон является Законом ЕС.§!\n\nДля укрепления военного потенциала §C[EUU.GetFlag] Европейского Союза§! государства-члены могут сформировать общие вооруженные силы. Эти силы будут известны как §YEuroArmy§!"
 EU_show_available_desc_306_loc_key: "§9Предлагаемый закон является Законом ЕС.§!\n\nПоскольку в XXI веке многонациональные флоты и оперативные группы становятся все более распространенными и важными, государства-члены §C[EUU.GetFlag] Европейского Союза§! могут объединить свои силы и передать свои военные корабли в состав единого Европейского военно-морского командования, известного как §YEuroNavy§!."
 EU_show_available_desc_307_loc_key: "§9Предлагаемый закон является Законом ЕС.§!\n\nГосударства-члены решили, что ЕС должен быть постоянным членом Совета Безопасности ООН (СБ ООН). Это делается путем реформирования СБ ООН или путем передачи ЕС места(мест) государств-членов, уже являющихся членами СБ ООН."
 EU_show_available_desc_308_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\nПревращение в ядерную державу усилит политическую мощь ЕС и влияние Союза в мире. Союз приобретет ядерное оружие путем передачи и совместного использования ядерного оружия своих государств-членов или путем разработки собственных ядерных боеголовок."
 EU_show_available_desc_401_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\nОбщий регламент ЕС по защите данных (GDPR) призван: гармонизировать законы о конфиденциальности данных по всей Европе, защитить и расширить возможности обеспечения конфиденциальности данных всех граждан ЕС, а также изменить подход организаций по всему региону к конфиденциальности данных."
 EU_show_available_desc_402_loc_key: "§CПредлагаемый закон является Общим законом ЕС.§!\n\nЦифровые технологии радикально изменили способ создания, распространения и доступа к творческому контенту. Мы адаптируем правила ЕС об авторском праве к новому поведению потребителей в Европе, которая ценит свое культурное разнообразие."
 EU_show_available_desc_403_loc_key: "§pПредлагаемый закон представляет собой закон ЕС о миграции/пограничном контроле.§!\n\nРегламент Дублин II устанавливает принцип, согласно которому только одно государство-член несет ответственность за рассмотрение ходатайства о предоставлении убежища. Цель состоит в том, чтобы избежать отправки просителей убежища из одной страны в другую, а также предотвратить злоупотребление системой путем подачи нескольких ходатайств о предоставлении убежища одним лицом."
 EU_show_available_desc_404_loc_key: "§pПредлагаемый закон представляет собой закон ЕС о миграции/пограничном контроле.§!\n\nПросители убежища с высокими шансами на успешную обработку своих заявлений переселяются из Греции и Италии, куда они прибыли, в другие государства-члены, где их заявления о предоставлении убежища будут обработаны. Если эти заявления будут удовлетворены, заявителям будет предоставлен статус беженца с правом проживания в государстве-члене, в которое они будут перемещены."
 EU_show_available_desc_405_loc_key: "§pПредлагаемый закон представляет собой закон ЕС о миграции/пограничном контроле.§!\n\n§C[EUU.GetFlag] Европейский союз§! и [TUR.GetNameWithFlag] проведут переговоры по соглашению, направленному на прекращение потока нелегальной миграции из Турции в Европу. Все новые нелегальные мигранты и просители убежища, прибывающие из Турции на греческие острова и чьи заявления о предоставлении убежища были признаны неприемлемыми, должны быть возвращены в Турцию. §C[EUU.GetFlag] Европейский союз§! заплатит 3 миллиарда евро за Фонд для беженцев в Турции."
 EU_show_available_desc_406_loc_key: "§pПредлагаемый закон представляет собой закон ЕС о миграции/пограничном контроле.§!\n\nЕвропейская комиссия предложила создать будущее Агентство ЕС по предоставлению убежища, наделенное необходимыми полномочиями, инструментами и финансовыми средствами для предоставления государствам-членам быстрых и полных услуг на протяжении всей процедуры предоставления убежища."
 EU_show_available_desc_407_loc_key: "§pПредлагаемый закон представляет собой закон ЕС о миграции/пограничном контроле.§!\n\nFrontex помогает странам ЕС и странам, ассоциированным с Шенгенской зоной, управлять своими внешними границами. Он также помогает гармонизировать пограничный контроль по всему ЕС. Агентство содействует сотрудничеству между пограничными службами в каждой стране ЕС, предоставляя техническую поддержку и экспертизу."
 EU_show_available_desc_408_loc_key: "§pЭтот предложенный закон относится к законам ЕС о миграции и контроле границ.§!\n\nFrontex становится Европейским агентством пограничной и береговой охраны. В последние годы внешние границы Европы столкнулись с беспрецедентным ростом числа мигрантов и беженцев, желающих попасть в ЕС. Страны, имеющие внешние границы, несут исключительную ответственность за их контроль. Однако Frontex может оказывать дополнительную техническую поддержку странам ЕС, испытывающим серьёзное миграционное давление."
 EU_show_available_desc_601_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\n1 мая 2004 года к ЕС присоединились десять новых стран с общей численностью населения почти 75 миллионов человек. В ЕС, состоящем из 25 стран, сейчас проживает 450 миллионов граждан. В его состав входят три бывшие советские республики (§Y[EST.GetNameWithFlag]§!, §Y[LAT.GetNameWithFlag]§! и §Y[LIT.GetNameWithFlag]§!), четыре бывших сателлита СССР (§Y[POL.GetNameWithFlag]§!, §Y[CZE.GetNameWithFlag]§!, §Y[HUN.GetNameWithFlag]§! и §Y[SLO.GetNameWithFlag]§!), бывшая югославская республика (§Y[SLV.GetNameWithFlag]§!) и два средиземноморских острова (§Y[CYP.GetNameWithFlag]§! и §Y[MLT.GetNameWithFlag]§!)."
 EU_show_available_desc_602_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\nЕще две страны из Восточной Европы — §Y[BUL.GetNameWithFlag]§! и §Y[ROM.GetNameWithFlag]§! — присоединяются к ЕС, в результате чего число государств-членов достигло 27."
 EU_show_available_desc_603_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\n2013 §Y[CRO.GetNameWithFlag]§! присоединилась к ЕС, увеличив число государств-членов до 28."
 EU_show_available_desc_605_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\nСтраны Западных Балкан §Y[ALB.GetNameWithFlag]§!, §Y[SER.GetNameWithFlag]§!, §Y[MNT.GetNameWithFlag]§!, §Y[FYR.GetNameWithFlag]§!, §Y[BOS.GetNameWithFlag]§! и §Y[KOS.GetNameWithFlag]§! становятся кандидатами на вступление в §C[EUU.GetFlag] Европейский Союз§!."
 EU_show_available_desc_606_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\n§Y[TUR.GetNameWithFlag]§! становится кандидатом на вступление в §C[EUU.GetFlag] Европейский Союз§!."
 EU_show_available_desc_607_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\nСтраны Черного моря §Y[MLV.GetNameWithFlag]§! и §Y[UKR.GetNameWithFlag]§! становятся кандидатами на вступление в §C[EUU.GetFlag] Европейский Союз§!."
 EU_show_available_desc_608_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\nСтраны Кавказа §Y[ARM.GetNameWithFlag]§!, §Y[AZE.GetNameWithFlag]§! и §Y[GEO.GetNameWithFlag]§! становятся кандидатами на вступление в §C[EUU.GetFlag] Европейский Союз§!."
 EU_show_available_desc_609_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\nСтраны Европейской экономической зоны, не входящие в ЕС (§Y[SWI.GetNameWithFlag]§!, §Y[NRY.GetNameWithFlag]§! и §Y[ICE.GetNameWithFlag]§!), а также микрогосударства Европы (§Y[HLS.GetNameWithFlag]§!, §Y[SMA.GetNameWithFlag]§!, §Y[MNC.GetNameWithFlag]§!, §Y[ADO.GetNameWithFlag]§! и §Y[LIC.GetNameWithFlag]§!) становятся кандидатами на присоединение к §C[EUU.GetFlag] Европейскому союзу§!."
 EU_show_available_desc_610_loc_key: "§OПредлагаемый закон представляет собой закон о расширении ЕС.§!\n\n§Y[BLR.GetNameWithFlag]§! становится кандидатом на вступление в §C[EUU.GetFlag] Европейский Союз§!."
 EU_show_available_desc_611_loc_key: "§OЭтот предлагаемый закон является законом ЕС о расширении.§!\n\nВнутреннее расширение — это процесс появления новых государств-членов в результате распада или отделения от существующего государства-члена. §Y[CRE.GetNameWithFlag]§!, §Y[SCL.GetNameWithFlag]§!, §Y[SCO.GetNameWithFlag]§!, §Y[VOJ.GetNameWithFlag]§!, §Y[WAS.GetNameWithFlag]§!, §Y[GAL.GetNameWithFlag]§!, §Y[SIL.GetNameWithFlag]§!, §Y[CAT.GetNameWithFlag]§!, §Y[SPA.GetNameWithFlag]§!, §Y[CNR.GetNameWithFlag]§!, §Y[NAV.GetNameWithFlag]§!, §Y[BAY.GetNameWithFlag]§!, §Y[GRN.GetNameWithFlag]§! и §R[RUS.GetNameWithFlag]§! могут стать кандидатами на вступление в §C[EUU.GetFlag] Европейский Союз§!, когда они станут независимыми."
 EU_show_available_desc_110_loc_key: "§YЭтот предложенный закон является законом о федерализации ЕС.§!\n\nПроцесс европейской интеграции достиг такого уровня, что любое дальнейшее объединение приведет к федерализации §C[EUU.GetFlag][EUU.GetName]§!."
 EU_show_available_desc_111_loc_key: "§YЭтот предложенный закон является законом о федерализации ЕС.§!\n\nПосле более чем 70 лет европейской интеграции государства-члены §C[EUU.GetFlag][EUU.GetName]§! решили отказаться от своего суверенитета и создать §C[EUU.GetFlag] Соединенные Штаты Европы§!."
 EU_show_available_desc_112_loc_key: "§YЭтот предлагаемый закон является Законом о федерализации ЕС.§!\n\nГосударства-члены §C[EUU.GetFlag][EUU.GetName]§! приняли решение преобразовать Союз в §C[EUU.GetFlag] Европейскую Федерацию§! с принципом квалифицированного большинства в качестве фундаментального и под руководством §YPresident of the European Federation§!."
