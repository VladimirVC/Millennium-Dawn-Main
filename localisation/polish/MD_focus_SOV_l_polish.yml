 SOV_expand_conscription: "Skomputeryzowana Gospodarka"
 SOV_expand_conscription_desc: "Nasza gospodarka jest przestarzała. Nasi ludzie są na tyle mądrzy, aby używać komputerów dla dobra Rosji. Nasi naukowcy, pracownicy fabryk i pracownicy kompleksu wojskowo-przemysłowego muszą obsługiwać najpotężniejsze i najskuteczniejsze elektroniczne maszyny obliczeniowe, aby usprawnić naszą gospodarkę!"
