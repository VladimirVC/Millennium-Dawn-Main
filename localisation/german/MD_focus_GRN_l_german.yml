l_german:
 greenland_focus: "Greenlandic Focus Tree"
 GRN_intro_to_greenland_shortcut: "Intro To Greenland"
 GRN_greenland_foreign_policy_tree: "Greenland Foreign Policy"
 GRN_focus_The_Great_Ice_Island: "The Great Ice Island"
 GRN_focus_The_Great_Ice_Island_desc: "Greenland is one of the largest known islands in the world after the technically continent of Australia. The island hosts roughly 58 thousand citizen who primarily come from the Inuit culture group. Greenland is seen as the last major frontier of developing earth second only to actively doing something with either north or south pole of the planet itself. Now in the 21st century Greenland and its people see themselves as the last real colony and actively seek for true independence. But will they find themselves free at last or will they fall flat from proving the island can truly stand on its own."
 GRN_focus_The_People: "The People"
 GRN_focus_The_People_desc: "One of the core issues our nation suffers is a lack of people. People need food, shelter and civil services to care and help them when in need. As such we must address these points in order to secure a future where people would want to come and stay in our nation. To create a future of their own in what may seem like a futureless place."
 GRN_focus_Food_Security: "Food Security"
 GRN_focus_Food_Security_desc: "Our main source of food on the island is that of our fisheries. But the fisheries are also our main economic chokepoint, so how can we feed ourselves if we also import the same stuff. Well this is one of the key pillars we must establish if we are to have any sort of stable future."
 GRN_focus_Breaking_Ground_For_Farmlands: "Breaking Ground For \"Farmlands\""
 GRN_focus_Breaking_Ground_For_Farmlands_desc: "Greenhouses and Vertical Farming Projects. These staples will be the bedrock of our nation's new food supplies and as such we need to create the apparatus to grow and cultivate these foods. While the process will be energy intensive, if we set up our infrastructure and look back into our resources we could cobble together some basics to get the ball rolling."
 GRN_focus_East_Farmland_Projects: "East \"Farmland\" Projects"
 GRN_focus_East_Farmland_Projects_desc: "Just like with our initial western foundational work we'll need to do the same in the east. Small food hubs to help with logistics and distribution throughout the nation and our fairly sparse settlements."
 GRN_focus_Growing_Staple_Foods: "Growing Staple Foods"
 GRN_focus_Growing_Staple_Foods_desc: "Our early developments in harsh farming projects will see really only staple foods being grown for the time being. Potatoes, wheat and a small host of core foods that help with caloric intake and are easy to stretch meal wise."
 GRN_focus_Strategic_Cash_Crops: "Strategic Cash Crops"
 GRN_focus_Strategic_Cash_Crops_desc: "The SCC program is a limited corner of our new HFPs as we attempt to bolster the nations domestic food supply we can also look into limited cash crops like cotton and such as a way to foster domestic industrial growth as well."
 GRN_focus_National_Seed_Vault: "National Seed Vault"
 GRN_focus_National_Seed_Vault_desc: "As we expand our HFPs both on a national scale and in local operations, we must be able to diversify and expand the types of crops we can grow. As such we'll create a national seed vault to preserve and properly distribute rotating crops so our nation can enjoy as much of bounties of the world as possible."
 GRN_focus_Stable_Population_Growth: "Stable Population Growth"
 GRN_focus_Stable_Population_Growth_desc: "Our nation over its entire existence has been hampered by the inability to stabilize the population. Many flee due to the harsh conditions or to see the wider world. Which lets be real, we can't blame them for wanting more in their lives, but we can blame ourselves for not working to give folks the reasons to stay. We can't do anything about the weather, but we can develop towns and settlements to be more convincing for folks to want to stay and help improve their homes."
 GRN_focus_Planning_New_Settlements: "Planning New Settlements"
 GRN_focus_Planning_New_Settlements_desc: "The ability to grow our population is hindered by proper housing and planning of new towns as a whole. Everything is mostly formed around the capital of Nuuk so in these early stages of planning and development we'll have to use the capital as a base from which to ferry logistics from for the time being."
 GRN_focus_Spread_Settlement_Planning_East: "Spread Settlement Planning East"
 GRN_focus_Spread_Settlement_Planning_East_desc: "While the capital of Nuuk is our logistics base for the western part of the island, we'll need to establish a sort of \"eastern capital\" per se. This way the eastern half also has a logistics hub to plan and distribute the ability for settlement development and growth of the two main regions of the nation."
 GRN_focus_New_Hope_Settlement: "New Hope Settlement"
 GRN_focus_New_Hope_Settlement_desc: "To strive for a better tomorrow, a better future and just a better life for our citizens, we set forth to establish a brand new centrally northwestern settlement called Neriunneq nutaaq or in english, roughly translates to New Hope. We wish to make this a beacon of our progress in developing the nation and the western half of the island."
 GRN_focus_Great_Star_Settlement: "Great Star Settlement"
 GRN_focus_Great_Star_Settlement_desc: "To attempt to evenly disperse our development and ensure even logistical needs through our continual development efforts, we will be creating an eastern settlement around the same lateral area as the western settlement. Named Annertuumik Stjerne which roughly translates in english as Great Star or \"Big Star\", we hope to use this as a core eastern base as a way to begin spreading development efforts as we handle both coastal growth and look inwards towards the Great Ice Shelf."
 GRN_focus_Development_Living_Grants: "Development Living Grants"
 GRN_focus_Development_Living_Grants_desc: "The DLG program is a government issued grant to encourage immigration to the nation. The core principle is the grant will cover travel costs and settlement costs. Once the individual or individuals are settled and are helped placed at a place of work where they have a stable income then the grant will stop. Essentially its an investment through human resources to encourage population growth through the active development of the nation."
 GRN_focus_Developing_Public_Services: "Developing Public Services"
 GRN_focus_Developing_Public_Services_desc: "Improving and growing our public systems and infrastructure will greatly improve the quality of life for our citizens. We'll do a small host of improvements to education, healthcare, welfare as well as develop a more secure internet service for the future of our nation."
 GRN_focus_Recruiting_More_Teachers: "Recruiting More Teachers"
 GRN_focus_Recruiting_More_Teachers_desc: "A big issue in our education system is a lack of teaching staff. With classes becoming larger per teacher a lot of students are dropping out simply because they have no real way to learn. As such we must recruit and try to get more teachers both domestic and foreign to come and help teach and cultivate our children. This key will hopefully unlock a brighter future for all who can hope to learn and grow from gaining an education."
 GRN_focus_Improving_Medical_Stockpiles: "Improving Medical Stockpiles"
 GRN_focus_Improving_Medical_Stockpiles_desc: "Medicines, staff and equipment. These are the main things we need to be able to properly care for our citizens health needs. As such we must improve storage capacity and handling to ensure we can meet any needs that may arise."
 GRN_focus_Creating_Concentrated_Internet_Services: "Creating Concentrated Internet Services"
 GRN_focus_Creating_Concentrated_Internet_Services_desc: "Internet access as a whole is practically a staple of modern societies and developed economies. We must set up some limited forms of an internet apparatus to ensure our nation can better connect with the wider world. Our citizens and public services could also passively benefit from the efficiencies that internet services could provide in certain areas."
 GRN_focus_Recruiting_More_Social_Workers: "Recruiting More Social Workers"
 GRN_focus_Recruiting_More_Social_Workers_desc: "Improving the staffing quantity and quality will ensure our social services are on top of the nation's needs as the population potentially expands with our development efforts. While the cost is something to worry about, it means nothing if we end up scaring people away if they know they wouldn't be taken care of when in true need."
 GRN_focus_Basic_Eastern_Roadworks: "Basic Eastern Roadworks"
 GRN_focus_Basic_Eastern_Roadworks_desc: "With the east being the more underdeveloped region of the nation, we should give them a boost by improving their logistical support through improved roads. While not meaning the biggest thing in terms of priorities, as we continue to develop and grow the region it would be beneficial to pre-emptively lay out the framework they can follow for lack of better words."
 GRN_focus_Greenlandic_Economy: "The Greenlandic Economy"
 GRN_focus_Greenlandic_Economy_desc: "People need materials, they need a way to live and they need the ability to work and earn a living. As such developing the economy, the ability to extract resources and developing the infrastructure to support these things will need to be planned and invested in."
 GRN_focus_Economic_Diversification: "Economic Diversification"
 GRN_focus_Economic_Diversification_desc: "With our nation being limited in many factors we must develop and ensure the groundwork is laid out so we can expand the means of our economy. Simply having fishing or near feudal styles of economic sustainment is going to get the nation and its people nowhere. We must fix this."
 GRN_focus_Western_Zoning: "Western Zoning"
 GRN_focus_Western_Zoning_desc: "The capital is situated on the west, so we'll begin the early stages of our zoning and development around there. Surveying the land for stability and the needs as well as means to get a dedicated industry up and running will cost a lot more than usual. But if we're to battle the elements at their harshest then we must bear and understand the cost it will have."
 GRN_focus_Eastern_Groundworks: "Eastern Groundworks"
 GRN_focus_Eastern_Groundworks_desc: "If we are ever to get anywhere economically as well as population growth or at the bare minimum, stability, then we must utilize all the available lands that we have. As such laying early groundworks for our eastern projects will be essential in these early stages of planning."
 GRN_focus_Basic_Industrialization: "Basic Industrialization"
 GRN_focus_Basic_Industrialization_desc: "With the groundwork and zoning completed we can establish small but fundamental manufacturing that the nation will need in the future. Of course until we can figure out the mining situation we'll need to rely on imports for materials. Thank god we can use our connection to the EU via Denmark to help us in this matter."
 GRN_focus_Basic_Coastal_Manufacturing: "Basic Coastal Manufacturing"
 GRN_focus_Basic_Coastal_Manufacturing_desc: "While supplementing existing fishing practices we can also setup the metric to create our own trade vessels for which we can use in dealing with both Denmark and those who wish to help us develop and grow as a nation."
 GRN_focus_Babys_First_Economy: "Babys First Economy"
 GRN_focus_Babys_First_Economy_desc: "We now have a core foundation to set the stage for people to come and work. Now we just need to develop infrastructure to support the people and about seven other critical issues which stagnate the nation. But baby steps, baby steps, we'll get there some day."
 GRN_focus_Infrastructure_Development: "Infrastructure Development"
 GRN_focus_Infrastructure_Development_desc: "The best way to connect and grow our nation is to establish a standardized and flexible infrastructure apparatus. To this avail we'll need to hire on experts in geology, engineering, and so on to plan around the types of infrastructure we need. We'll also need to know how is the best way to develop and plan it out for the longest term as possible before overhauls are needed."
 GRN_focus_The_Network_Debate: "The Network Debate"
 GRN_focus_The_Network_Debate_desc: "Establishing a proper roadway network will be just as challenging as pretty much anything we will be attempting to do. As such we'll need to survey and lay the groundwork for the beginning of what our roads will look like. As such starting from the capital of Nuuk will help to set a standard as well as create at least in the western coastal areas, the beating heart for which pumps resources and people throughout the lands."
 GRN_focus_Narrow_Gauge_Standard: "The Narrow Gauge Standard"
 GRN_focus_Narrow_Gauge_Standard_desc: "Creating the national standard for rail equipment and travel will set the pace and bottomline for how we develop our railroads in the future. Using Narrow Gauge allows us to be more flexible with the terrain, is cheaper build and maintaining wise as well as it'll be more cost effective to properly secure the structure and foundation of the track bed."
 GRN_focus_Capital_Course: "Capital Course"
 GRN_focus_Capital_Course_desc: "Starting out from the capital and branching into smaller settlements will allow for a more ease of travel and better connectivity over mid ranged distances. Of course this is merely a single step but you gotta put one foot in front of the other just to walk across the floor, now don't you."
 GRN_focus_Nuuk_Western_Railway: "Nuuk Western Railway"
 GRN_focus_Nuuk_Western_Railway_desc: "With the establishment of the NWR in Greenland we can now better connect the dispered settlements in the near capital region as well as use this as a foundation for future endeavors in both economic and personnel transportation needs of the nation."
 GRN_focus_Infrastructure_Infancy: "Infrastructure Infancy"
 GRN_focus_Infrastructure_Infancy_desc: "With these crucial but simple baby steps taken to start our national infrastructure, we now can set a new and evolving precedent towards growing and developing these lands for which we control."
 GRN_focus_Ministry_For_Mineral_Affairs: "Ministry For Mineral Affairs"
 GRN_focus_Ministry_For_Mineral_Affairs_desc: "The Mineral Affairs Ministry or MMA as some like to jokingly call it, is a dedicated governmental body that will hire experts in geology, structural integrity and general mining practices to ensure that core starting investments into the extraction of our national resources are done in a safe and effective manner from the get go. This will ensure any and all expansions will be in line with the precedent set in these early days."
 GRN_focus_Domesticating_Energy_Needs: "Domesticating Energy Needs"
 GRN_focus_Domesticating_Energy_Needs_desc: "Our nation needs energy on principle. For heating, electricity and basic needs for the economy and its supply chains. As such we'll look into some coal deposits and begin strategic mining operations to reduce imports and improve domestic conditions."
 GRN_focus_Limited_Strategic_Resource_Extraction: "Limited Strategic Resource Extraction"
 GRN_focus_Limited_Strategic_Resource_Extraction_desc: "The LSRE effort is a plan to develop small scale heavy metal or more strategic mineral mining operations within the nation. Things like Titanium which is found not far from the capital itself but also has some decent deposits out east if we wanted to further them."
 GRN_focus_Cornerstone_Creation: "Cornerstone Creation"
 GRN_focus_Cornerstone_Creation_desc: "Aside from concrete, one of the main pillars of a modern economy is its ability to produce steel. Well we have coal and iron ore deposits and so why not just begin baby's first steel mill. It may be small, but we'll certainly be able to utilize the materials for the development of our nation."
 GRN_focus_Extracting_Natural_Capital: "Extracting Natural Capital"
 GRN_focus_Extracting_Natural_Capital_desc: "There be gold in them there hills they say. Well they say is correct and gold can be used for a lot more than wearing on oneself. This more or less \"free capital\" of ours can be used to instigate future projects and help with stabilizing budgets that require more than usual investments."
 GRN_focus_Securing_Mining_Futures: "Securing Mining Futures"
 GRN_focus_Securing_Mining_Futures_desc: "Dealing with red tape, adjusting regulations and putting more emphasis on energy oriented mining operations allows us to cover multiple birds with one energy dense rock."
 GRN_focus_The_Future: "The Future"
 GRN_focus_The_Future_desc: "Fixing the present is the top priority, but one cannot simply fix the present without preparing for the future. As such the ultimate end goal for our nation will be to secure the future of not just those on the coastal areas but to create and build a future for those who want to live on the shelf. After all, ice is just frozen water and we can distill fresh water now can't we."
 GRN_focus_Coastal_Economic_Zones: "Coastal Economic Zones"
 GRN_focus_Coastal_Economic_Zones_desc: "The ultimate end goal for a growing future for Greenland is our ability to tame the interior. Now many say you can't just live on ice and to that we say, well of course. However, what is ice but fresh water and how do we get water from ice, well we melt it. As such we should develop targeted economic zones on the coastline to set the stage and give us the fiscal capabilities to begin distillation processes of the Ice Shelf. It will be a long and tedious affair, but the slow march north through the hinterlands is upon us if we sustain the willpower to do as such."
 GRN_focus_Foreign_Logistics_Hub_One: "Foreign Logistics Hub Number One"
 GRN_focus_Foreign_Logistics_Hub_One_desc: "The most central location towards setting up an economic zone on the coast is actually the furthest southern point on the island. Not far from Tasiusaq we'll use some of the more gentle slopping fjords to mold and create an extensive harbor and port \"city\" like apparatus. This staging ground will help with western advancements on the great trek north."
 GRN_focus_Foreign_Logistics_Hub_Two: "Foreign Logistics Hub Number Two"
 GRN_focus_Foreign_Logistics_Hub_Two_desc: "Supplementing the most central location towards setting up an economic zone on the coast. We'll establish a similar apparatus near the town of Itilleq. This staging ground will help with eastern advancements on the great trek north and combining the two southern zones into one CCEZ or Connected Coastal Economic Zone."
 GRN_focus_West_Hub_Distillation_Facility: "West Hub Distillation Facility"
 GRN_focus_West_Hub_Distillation_Facility_desc: "Establishing a comprehensive distillation facility to begin extraction operations of Ice Shelf ice will allow us to increase domestic water supply and allow us to passive create a pathway north through the ice shelf. This process will be costly and require us to import staff for an extended period until we can train and hire locals. But the long term goal of development and usability of the lands locked beneath the frozen wastes will be worth it."
 GRN_focus_East_Hub_Distillation_Facility: "East Hub Distillation Facility"
 GRN_focus_East_Hub_Distillation_Facility_desc: "Expanding upon the general use of the CCEZ we've created, the second main distillation facility to supplement western advances is now under works. As East Hub Distillation will do the same thing but work towards eastern progress through a united push northwards."
 GRN_focus_Southern_Fjords_Railway: "Southern Fjords Railway"
 GRN_focus_Southern_Fjords_Railway_desc: "Establishing a railway in the region allows us to not only better connect the entirety of the CCEZ, but it also can help us to transport the water supply to different areas on the southern region for both residential and commercial use where possible."
 GRN_focus_Staging_Zones_For_The_Shelf: "Staging Zones For The Shelf"
 GRN_focus_Staging_Zones_For_The_Shelf_desc: "Setting forth our grand ambition to tame the Great Ice Shelf, we first must set up strategic staging zones to ensure we can actually utilize the frozen waters instead of simply just throwing it into the oceans."
 GRN_focus_The_Great_Eastern_Staging_Grounds: "The Great Eastern Staging Grounds"
 GRN_focus_The_Great_Eastern_Staging_Grounds_desc: "The east is the least populated of the island, with this in mind that means we'll need to hire and contract experts to essentially live and set up the ground work for the eventual march into the hinterlands of the Great Ice Shelf. With this we'll use the island of Tingmiarmit as a key staging ground and begin by extracting and smoothing the terrain on the immediate coastline on the main island itself."
 GRN_focus_Capital_Staging_Works: "Capital Staging Works"
 GRN_focus_Capital_Staging_Works_desc: "The region around the capital of Nuuk is one of the most developed areas on the island. As such it makes sense then that the main western staging grounds is set up in the capital area. A dedicated and comprehensive campus of distillation plants, research and development centers as well as a considerable governmental stipend to import experts and teachers to allow for the eventual hand over of the grounds to Greenlanders. This will take a considerable amount of time and resources, but melting all that frozen water and discovering the real bedrock of the inner island is no small task to behold."
 GRN_focus_Meeting_Needs: "Meeting Needs"
 GRN_focus_Meeting_Needs_desc: "To create such an elaborate apparatus as we intend to, we must set up local supply chains or at least as local as possible. Small businesses to meet industrial and commercial needs will supplement development of the staging grounds and as such will set the standards for the eventual push inwards."
 GRN_focus_Supplying_Outposts: "Supplying Outposts"
 GRN_focus_Supplying_Outposts_desc: "Though officially Greenland has no military force, if we are to have any reasonable headway in creating a supply line into the Great Shelf, then we must ensure all kinds of supply needs are met. As such we will establish an extremely minor arms industry that is molded around supplying outposts with arms and munitions helpful for hunting and self defense from potential looters. After all, in the middle of nowhere, who can hear you scream."
 GRN_focus_General_National_Investments: "General National Investments"
 GRN_focus_General_National_Investments_desc: "Mining, transportation and general improvements must be made for the fiscal and internal stability of our nation. With the stages set and groundwork beginning in earnest we now have our theater for which we shall commence the play of our peoples as we tame the Great Ice Shelf in the coming years. With this as well the NWR and SFR rail companies will be linked up to form the Great Western Fjords Railway or GWFR."
 GRN_focus_Greater_Greenland_Act: "Greater Greenland Act"
 GRN_focus_Greater_Greenland_Act_desc: "Dedicated funding to better the families of the nation as well as looking for those of similar cultural and ethnic backgrounds who may want to live in a more united realm then they currently do. This section of the act is dedicated to populating the Western Region."
 GRN_focus_Eastern_Population_Act: "Eastern Population Act"
 GRN_focus_Eastern_Population_Act_desc: "Dedicated funding to better the families of the nation as well as looking for those of similar cultural and ethnic backgrounds who may want to live in a more united realm then they currently do. This section of the act is dedicated to populating the Eastern Region from the Greater Greenland Act."
 GRN_focus_Battle_For_Independence: "Battle For Independence"
 GRN_focus_Battle_For_Independence_desc: "We've reached a cross roads. The Danish parliament have begun to make moves related to our status as a nation. Regardless if it is a positive or negative motion we'll need to secure ourselves and thus we'll begin to invest heavily in pressure campaigns to raise our recognition among nations and hope we can more or less force the hand of a peaceful resolution to independence."
 GRN_focus_Rushed_Mobilization_Efforts: "Rushed Mobilization Efforts"
 GRN_focus_Rushed_Mobilization_Efforts_desc: "We've decided that we wish no longer to bow to Danish oppressive maneuvering. As such we'll hurriedly mobilize the bare minimum we know we'll need to defend the island from any earnest Danish incursion."
 GRN_focus_Organizing_Fundamentals_In_Training: "Organizing Fundamentals In Training"
 GRN_focus_Organizing_Fundamentals_In_Training_desc: "Rushing the establishment of a basic training facility, we'll need this to give the quickest of crash courses if we are to defend our island from the incoming invasion force."
 GRN_focus_If_It_Floats_Its_A_Boat: "If It Floats, It's A Boat"
 GRN_focus_If_It_Floats_Its_A_Boat_desc: "The Danish navy will likely lead the charge to take over the island. While it will be costly, we must throw together something to stall for time if we are ever to be considered a serious nation on the world stage."
 GRN_focus_Removing_The_Last_Loose_Ends: "Removing The Last Loose Ends"
 GRN_focus_Removing_The_Last_Loose_Ends_desc: "By severing our ties with the Danish Crown we now are our own nation and thus don't have the original privileges that the colonial status we once were had. As such we'll need to reorganize certain aspects and look to mend potential shortfalls we may come across."
 GRN_focus_Stabilizing_Domestic_Short_Comings: "Stabilizing Domestic Short Comings"
 GRN_focus_Stabilizing_Domestic_Short_Comings_desc: "Retooling administration efforts and streamlining all government services under our national government will allow us to grasp a real picture of the current situation."
 GRN_focus_Greenland_Armed_Services: "Greenland Armed Services"
 GRN_focus_Greenland_Armed_Services_desc: "With our newfound independence we now have defense fully under our control. We don't have much, but we gotta start somewhere. Right?"
 GRN_focus_A_New_Chapter: "A New Chapter"
 GRN_focus_A_New_Chapter_desc: "From this day forward we turn a new leaf. We strive to build, prosper and improve both the nation and our citizen's lives so that way we may set course for a brighter future for all who wish to see and live in Greenland."
 GRN_focus_Northern_Political_Lights: "Northern Political Lights"
 GRN_focus_Northern_Political_Lights_desc: "With our new found freedoms we can now open the doors to those who wish to run for office. Of course this means we'll also have to deal with those who want to potentially abuse the system. However we are a democratic valued nation and as such we will put our trust in the system and the people."
 GRN_focus_Atassut_Claims_Victory: "Atassut Claims Victory"
 GRN_focus_Atassut_Claims_Victory_desc: "Before the days of independence our politics had been stagnant. Everyone only ever focused on being free from the Danish yoke. Well now that we are, we can begin to forge a new path. A path of steady social values building mixed with fiscally conservative mindedness to balance our nation for the future."
 GRN_focus_Making_New_Greenlandic_Standards: "Making New Greenlandic Standards"
 GRN_focus_Making_New_Greenlandic_Standards_desc: "Reforming the education around our native language, improving teacher numbers and generally just raising the bar for what our students can do will greatly increase our nation's potential."
 GRN_focus_Improving_Medical_Facilities: "Improving Medical Facilities"
 GRN_focus_Improving_Medical_Facilities_desc: "Through general procurement improvements as well as improving medical facility floor plans, we can set a new pace for care and treatment with improved ease of navigation and access to needed resources."
 GRN_focus_Casting_Better_Social_Nets: "Casting Better Social Nets"
 GRN_focus_Casting_Better_Social_Nets_desc: "Reforming social programs to allow for better allocation of resources will secure those in our nation who may be down on their luck or are simply at the end of their journey."
 GRN_focus_Domestic_Agriculture_Projects: "Domestic Agriculture Projects"
 GRN_focus_Domestic_Agriculture_Projects_desc: "Securing domestic agriculture means to have a more stable food source. This coupled with our HFPs \"Harsh Farming Projects\", will continue to benefit and grow our nation's economy and population."
 GRN_focus_Increasing_Industrial_Development: "Increasing Industrial Development"
 GRN_focus_Increasing_Industrial_Development_desc: "Steadily growing and diversifying our economy allows for a more stable and robust approach to both domestic and potential foreign affairs."
 GRN_focus_General_Armaments: "General Armaments"
 GRN_focus_General_Armaments_desc: "Small investments to improving armaments in both quality and general procurement means our rump armed services will be better off in defending our nation and its citizens."
 GRN_focus_Growing_Power_Production: "Growing Power Production"
 GRN_focus_Growing_Power_Production_desc: "Improving our domestic power production capabilities allows us to grow our economy as well as improve the quality of life for our citizens through cheap electricity."
 GRN_focus_National_Alumina_Research_Institute: "National Alumina Research Institute"
 GRN_focus_National_Alumina_Research_Institute_desc: "The NARI complex is a dedicated Alumina and other hard to extract mineral research and development center. The goal is to find ways to improve and make more efficient the ways in which can come by these minerals. Alumina is mainly found in Bauxite ore in high concentration, however we don't have bauxite. But we do have many Feldspar deposits which feldspar minerals tend to have nearly up to 20% of its weight in Alumina and thus through a more costly measure we are able to secure a domestic supply. But its not much and Aluminium is used in a lot of things, so we must expand in this field as much as possible."
 GRN_focus_Military_Investment_Package: "Military Investment Package"
 GRN_focus_Military_Investment_Package_desc: "This general investment package will go to improving equipment quality as well as boosting soldier pay. Some of the funding is also being set aside to better standardize training facilities where need be."
 GRN_focus_Demokraatit_Secures_Victory: "Demokraatit Secures Victory"
 GRN_focus_Demokraatit_Secures_Victory_desc: "The Demokraatit Party has had a long almost underdog like approach to Greenlandic politics. Being fairly in line with the two main parties there are subtle differences that usually back slide the party into a sort of \"continual third place\". However that changes today as with our victory in the independence era we can now assuredly better the nation and its citizens to the best of our ability."
 GRN_focus_Economic_Assimilation_Visas: "Economic Assimilation Visas"
 GRN_focus_Economic_Assimilation_Visas_desc: "Using the visa system to help develop the nation and grow in a steady manner our population will greatly help to the future planning for the nation itself."
 GRN_focus_Improved_Community_Programs: "Improved Community Programs"
 GRN_focus_Improved_Community_Programs_desc: "Common understanding between police and the citizens they protect is a prime driver of cohesion vs discourse. We must ensure consistent measures are taken to keep most on the same page so if and when something does happen, then we don't end up like those in America for example."
 GRN_focus_Rewriting_Mining_Regulations: "Rewriting Mining Regulations"
 GRN_focus_Rewriting_Mining_Regulations_desc: "The regulations related to mining practices are grossly over done as well as they simply do not match the current state of the nation. As such we'll need to reapproach things so we can better standardize the industry."
 GRN_focus_Hospice_Care_Funding: "Hospice Care Funding"
 GRN_focus_Hospice_Care_Funding_desc: "Providing better and more dedicated funding for hospice care will ensure that families can better focus on what they need to do while also not having to worry about their elders being neglected due to simply living life in a day to day manner."
 GRN_focus_Creating_A_Basic_Office_Sector: "Creating A Basic Office Sector"
 GRN_focus_Creating_A_Basic_Office_Sector_desc: "Continuing to diversify our economy means we'll need to invest in small but meaningful office and tech like industries to ensure we can continue to improve our nation and its citizens way of life."
 GRN_focus_Expanding_Existing_HFPs: "Expanding Existing HFPs"
 GRN_focus_Expanding_Existing_HFPs_desc: "Expanding our current Harsh Farming Projects through vertical farming facilities and the distillation infrastructure needed to supply water to them from the Ice Shelf will create a growing domestic supply of food while also contributing to our goal of making our way into the interior."
 GRN_focus_Growing_REM_Industries: "Growing REM Industries"
 GRN_focus_Growing_REM_Industries_desc: "To improve our geo-strategic value we'll need to grow our REM industries or Rare Eath Metals sector. Targeted mining and processing facilities will allow us to use these as negotiations for future trade deals."
 GRN_focus_Growing_Domestic_Arms_Production: "Growing Domestic Arms Production"
 GRN_focus_Growing_Domestic_Arms_Production_desc: "Ensuring we can equip our service members with armaments allows us the comfort in understanding that our military can and will defend our lands from any abusive forces."
 GRN_focus_Expanding_Citizen_Development_Grants: "Expanding Citizen Development Grants"
 GRN_focus_Expanding_Citizen_Development_Grants_desc: "The path to citizenship is marked by sole contribution to the development of the nation and as such we will expand the stipend program to increase the capacity of individuals at one time who can come and go through the path and become new Greenlandic citizens."
 GRN_focus_Siumut_Wins_Once_More: "Siumut Wins Once More"
 GRN_focus_Siumut_Wins_Once_More_desc: "One of the longest in charge parties is that of the Siumut Party. The party has held most of the election victories in the pre-independence era and it looks like they hold steady the course in the post independence era. Now it is time to focus on more than just independence, now we focus on improving the citizen and worker's lives."
 GRN_focus_Encouraging_State_Sanctioned_Immigration: "Encouraging State Sanctioned Immigration"
 GRN_focus_Encouraging_State_Sanctioned_Immigration_desc: "Our domestic growth is not really that good. If we are to fill our job market and grow our economy then we have to look at a form of consistent immigration wherever possible."
 GRN_focus_Immigration_Quotas: "Immigration Quotas"
 GRN_focus_Immigration_Quotas_desc: "With the steady development of our nation our biggest concern now arises as people to actually employ. Growing the economy only does so much when you unironically run out of folks to fill positions. As such we'll start attempting to reach dedicated immigration quotas to ensure our population can match our economy."
 GRN_focus_Expanding_Schooling_Subjects: "Expanding Schooling Subjects"
 GRN_focus_Expanding_Schooling_Subjects_desc: "Expanding the elective courses our schools provide allows students to seek out jobs and futures that they want to do. While also keeping the core general skills improvement that can help our students grow and ready for adulthood."
 GRN_focus_Social_Reserve_Funds: "Social Reserve Funds"
 GRN_focus_Social_Reserve_Funds_desc: "As our nation continues to grow in both population and economy we find a difficult balance in funding and properly allocating budgets to all in need. As such to keep these shortfalls in check we'll create the Social Reserve Fund, which is essentially a federal savings for social programs. Should give more ease of mind to the citizens that would need these safety nets."
 GRN_focus_Tungsten_Industries: "Tungsten Industries"
 GRN_focus_Tungsten_Industries_desc: "In the central eastern lands there are mounds of tungsten deposits ripe for picking. As such we'll create a dedicated industrial complex to mine, process and refine the ore into raw bars or secondary products requiring the resource."
 GRN_focus_Core_Industries_Complex: "Core Industries Complex"
 GRN_focus_Core_Industries_Complex_desc: "Reopening old iron mines that still have material to extract as well as opening new mines will allow us to expand our industrial capabilities. With this in mind we shall make a similar industrial complex to handle the extracted ore into the needs of the nation."
 GRN_focus_Growing_More_Crops: "Growing More Crops"
 GRN_focus_Growing_More_Crops_desc: "Ensuring the ever growing and diverse food supply we hope to create through our Vertical Farming initiatives as well as the pre-planned distillation infrastructure to support these facilities, we now can continue a steady pace of expansion and hope the demands will chip into the Ice Shelf with greater speed that anticipated."
 GRN_focus_Naval_Investments: "Naval Investments"
 GRN_focus_Naval_Investments_desc: "Growing our domestic ship building abilities allows us to field a navy. If we can field a navy then we can secure our coastal waters as well as have some kind of international footprint, regardless of how small it may be at first."
 GRN_focus_Strategic_Stockpiles: "Strategic Stockpiles"
 GRN_focus_Strategic_Stockpiles_desc: "Establishing strategic stockpiles allows for a reserve of accessible firearms to equip our military and if need be the people themselves. Of course we hope it'll never come to such a things but who know what sick and twisted minds are out there."
 GRN_focus_Polar_Party_Wins: "Polar Party Wins?"
 GRN_focus_Polar_Party_Wins_desc: "Considered what was once a defunct party, the polar party is probably the closest thing to a more traditional conservative party that one could get in Greenland. As such their victory while confusing does inspire hope of a steady hand and social calm from all the outside hoopla that some nations are struggling with."
 GRN_focus_Family_Subsidies: "Family Subsidies"
 GRN_focus_Family_Subsidies_desc: "To improve domestic population growth and not relying too much on immigration efforts we'll set up a dedicated subsidy to help families through the early years of childhood. This way the main concern which tends to be fiscal capabilities is no longer a real concern. To prevent abuse we'll limit to how the subsidies are applied to purchase wise and have it place on a national standard form of banking card."
 GRN_focus_Childcare_Act: "Childcare Act"
 GRN_focus_Childcare_Act_desc: "The ability for parents to be able to take care of their children while also trying to pay their bills and such is a delicate and often tedious balance. As such the Childcare Act is a spending package to improve and setup daycare centers and early schooling centers to take care as well as look after children."
 GRN_focus_Foreign_Leasing_Act: "Foreign Leasing Act"
 GRN_focus_Foreign_Leasing_Act_desc: "The FLA is a two stroke piece of legislation. The first part is bettering education and research efforts to improve our understanding of mineral extraction and how best to mine the stuff beneath our lands. The second is to essentially goad foreign companies into doing it for us or at the bare minimum setting up the foundations for things to where we could take it over at any point if need be."
 GRN_focus_Steeling_Resolve_Act: "Steeling Resolve Act"
 GRN_focus_Steeling_Resolve_Act_desc: "The SRA legislation is a targeted investment package related to expanding the domestic supply of iron and coal. These critical resources will help to expand the foundation of our economy and domestic abilities to produce both in industries and in population needs like housing and public institutions."
 GRN_focus_Expand_Petrochemical_Industries: "Expand Petrochemical Industries"
 GRN_focus_Expand_Petrochemical_Industries_desc: "Being able to establish let alone expand what forms of the petrochemicals industry sector will greatly enhance our domestic security from excess trade deficits."
 GRN_focus_Greenlandic_Forestries: "Greenlandic Forestries"
 GRN_focus_Greenlandic_Forestries_desc: "Creating new tree farms through the Greenhouse and Vertical Farming initiatives the nation already has will allow us to have a growing and diverse lumber sector."
 GRN_focus_Industrial_Projects: "Industrial Projects"
 GRN_focus_Industrial_Projects_desc: "Improving the eastern development to make it more on par with the western region will greatly reduce disparity between them, as such improving the industrial sector over there should be plenty beneficial."
 GRN_focus_Eastern_Armaments: "Eastern Armaments"
 GRN_focus_Eastern_Armaments_desc: "Our \"Develop the East\" project is continuing pretty well if I say so myself. Setting up new industries of all kinds on top of ensuring immigration efforts to help employ and supplement domestic job fillings will help to create a robust economy and a bright future for our people."
 GRN_focus_Defensive_Improvements: "Defensive Improvements"
 GRN_focus_Defensive_Improvements_desc: "Improving our abilities to defend from rash enemy incursions will be the bulwark of our national security. Afterall making a landing on the island is no simple matter."
 GRN_focus_Qulleq_Party_Secures_Victory: "Qulleq Party Secures Victory"
 GRN_focus_Qulleq_Party_Secures_Victory_desc: "In an interesting turn of events the Qulleq Party has won the election. Being known as a pro-industrialist type of party they were once known as the \"independence now\" main stay party outside of the core original power holders of the past. While some worry about if this means lower quality of living for the sake of development, many in the party rest assure that because of the more interesting situation that the nation is in, the quality of live will only improve. Whatever the case may be the party will just have to put its money where its mouth is in the coming weeks."
 GRN_focus_On_Site_Family_Support: "On Site Family Support"
 GRN_focus_On_Site_Family_Support_desc: "Bring your kids to work day everyday. Businesses will slowly begin to integrate certain key aspects of child care to allow family members to still come to work without feeling as if they'll abandon their kids."
 GRN_focus_Contractual_Labor_Act: "Contractual Labor Act"
 GRN_focus_Contractual_Labor_Act_desc: "The CLA is a legislation that gives power to the administration to help border and immigration services in finding proper candidates for Labor Visas. These visas will allow entry into the country for an extended time if they wish to work here, it is not a visiting visas but merely an expansion of the Development Grants Program that we already have."
 GRN_focus_Rewriting_The_Tax_Codes: "Rewriting The Tax Codes"
 GRN_focus_Rewriting_The_Tax_Codes_desc: "Fundamentally the tax codes are very anti-business and as such we'll start over and reform them around the current economic makeup."
 GRN_focus_Building_Up_Domestic_Capital: "Building Up Domestic Capital"
 GRN_focus_Building_Up_Domestic_Capital_desc: "Our gold mines can also be supplemented with the extraction of small amounts of diamonds as well. We can use this raw capital as we sell it abroad to fund our domestic development efforts."
 GRN_focus_Securing_Energy_Needs: "Securing Energy Needs"
 GRN_focus_Securing_Energy_Needs_desc: "The vast needs of our ever developing nation are the cornerstone of the development itself. We have the resources and so we must be allowed to use them as we please."
 GRN_focus_Military_Production_Means: "Military Production Means"
 GRN_focus_Military_Production_Means_desc: "Our ability to defend and protect not only our citizens but the natural wealth and ever expanding quality of their lives is paramount. We can not rest on comfort if we know at any point some nation may look to squander it for their own malicious use."
 GRN_focus_Continued_Crop_Diversification_Efforts: "Continued Crop Diversification Efforts"
 GRN_focus_Continued_Crop_Diversification_Efforts_desc: "We continue to utilize the HFPs that were set up in the pre-independence days as the national seed vault itself also continues to grow and become more diverse in what crops it holds. Our nation shall thrive through continual development of distillation centers supporting domestic agriculture facilities where many thought plants would never grow."
 GRN_focus_Expanded_Eastern_Industries: "Expanded Eastern Industries"
 GRN_focus_Expanded_Eastern_Industries_desc: "Workers, businesses and so on. This is the development cycle we hope to continue and also utilize more in the east than the west as the disparity between the two at least in terms of raw population numbers seems to be fairly different. By focusing more on the east we hope to reduce overall disparity on a national level and create a more cohesive distributed economy."
 GRN_focus_Economic_Automation_Act: "Economic Automation Act"
 GRN_focus_Economic_Automation_Act_desc: "The EAA is a legislation to deliberate and eventually choose which economic sector we want to essentially fully push towards automation. This way workers are freed up to pursue other sectors for employment and our overall economic situation will hopefully better stabilize due to such deficits in workforce to jobs available."
 GRN_focus_Inuit_Ataqatigiit_Election_Victory: "Inuit Ataqatigiit Election Victory"
 GRN_focus_Inuit_Ataqatigiit_Election_Victory_desc: "The sort of underdog in Greenlandic politics the IA is seen as a more in-between from the more common democratic socialist thinking and a more traditional market socialism. The party does believe in certain Marxist principles but seems to follow more of the Titoist balance between economic bargaining between blocks of nations and the social cohesion to avoid directly picking a side. Though of course Greenland has been in NATO there is no obligation to conform economically."
 GRN_focus_Greencare_Act: "Greencare Act"
 GRN_focus_Greencare_Act_desc: "The Greencare Act or Greenlandcare Act, is a general budgetary bill to improve medical staff wages, quality of equipment and training as well as looking to expand and or opening new facilities where need be."
 GRN_focus_Steeled_Veins_Act: "Steeled Veins Act"
 GRN_focus_Steeled_Veins_Act_desc: "Coal and iron, the lifeblood of any modern economy. While coal itself is not as useful as it once was given available energy alternatives, we cannot simply ignore the quantity and, in some areas, the raw quality of our coal and iron deposits. We will therefore begin investing in small-scale operations in both to bolster current supplies for domestic and potential foreign export use."
 GRN_focus_Pro_Mining_And_Miners_Act: "Pro Mining & Miners Act"
 GRN_focus_Pro_Mining_And_Miners_Act_desc: "The PMMA bill is designed to improve mining quality and quantity while also doing strategic automation efforts to improve the general standing of being a mine worker through limiting how often and how many workers we'd need in the mine at any time."
 GRN_focus_Feldspar_Extractions_Act: "Feldspar Extractions Act"
 GRN_focus_Feldspar_Extractions_Act_desc: "Under current geological survey data the only earnest source of Alumina oxides is within the Feldspar mineral deposits in the west. While the mineral tends to have upwards of 20% of its weight in Alumina oxide it is not the most commercially viable source. So the mining operation has to come under complete government control until some sort of scientific breakthroughs could change the reality. Regardless we need aluminium for our economy and as such we'll be investing in slowly growing operations to extract the Feldspar and processing the needed materials from the mineral."
 GRN_focus_Feeding_The_People_Act: "Feeding The People Act"
 GRN_focus_Feeding_The_People_Act_desc: "Growing our domestic food situation outside of the prominant fisheries is a great way to grow our economy and our population. With the creation of the national seed vault we have been well underway to making Greenland a model for developments in the greenhouse and vertical farming metrics of agricultural science."
 GRN_focus_The_Continual_Industry_Act: "The Continual Industry Act"
 GRN_focus_The_Continual_Industry_Act_desc: "Growing our economy means improving our manufacturing and general industrial base. Through small investments towards primary and secondary industries we can continue to see growth and development unlike any before."
 GRN_focus_Greenland_Technology_Center: "Greenland Technology Center"
 GRN_focus_Greenland_Technology_Center_desc: "Investing in R&D towards general advancements in developing and sustainment within our ecological environment will be paramount to development efforts going forth."
 GRN_focus_Arming_The_Nation: "Arming The Nation"
 GRN_focus_Arming_The_Nation_desc: "Our defense is key to our continued independence. If we want to stay free then we must develop the means to do so."
 GRN_focus_Silver_And_Gold_Act: "Silver & Gold Act"
 GRN_focus_Silver_And_Gold_Act_desc: "Improving our domestic security through making valuable bargaining chips in international negotiations will allow us to stave off would be invaders for just a little longer than not doing so. As such we'll look to begin limited mining operations around the palladium and some valuable rare earth metals we've got access to."
 GRN_focus_Naleraq_Elective_Victory: "Naleraq Elective Victory"
 GRN_focus_Naleraq_Elective_Victory_desc: "With the nation in the grips of fresh independence its no wonder the more nationalistic oriented party of Naleraq ended up wining. With their policies looking to directly strengthen and prove Greenlandic virtue towards its self made sovereignty. Though some wonder if this may be too much of a quick step towards something a bit more hostile in nature."
 GRN_focus_Efficiency_Education_Courses: "Efficiency Education Courses"
 GRN_focus_Efficiency_Education_Courses_desc: "The EE program is an educational investment project looking to teach as well as experiment with new ways to transmit, store and handle power usage in colder climates. Increasing efficiencies around these allows our economy to be more cost effective without having to worry about employment issues."
 GRN_focus_Family_Planning_And_Assistance_Board: "Family Planning & Assistance Board"
 GRN_focus_Family_Planning_And_Assistance_Board_desc: "The FPAB is a governmental institution devoted towards creating, maintaining and growing the families of the nation. Our population is small and we don't want to flood the nation with random and immigrates if we can just take care of ourselves properly."
 GRN_focus_Family_Homes_Act: "Family Homes Act"
 GRN_focus_Family_Homes_Act_desc: "The Family Homes Act or FHA is a program designed to make sure that family classified homes get to those families in need. We'll ensure that no one is abusing the limited housing stock we have in the nation."
 GRN_focus_Urban_Planning_Commission: "Urban Planning Commission"
 GRN_focus_Urban_Planning_Commission_desc: "The UPC is a government agency designed to pre-plan and begin foundational works for future housing projects and potential city planning styles to work with as these new houses get filled with people who then need jobs and local suppply chains at that rate."
 GRN_focus_Rapid_Agriculture_Expansions: "Rapid Agriculture Expansions"
 GRN_focus_Rapid_Agriculture_Expansions_desc: "The RAE bill is dedicated to expanding our agricultural base and production methods so we can continue to feed our citizens and better grow our population. Of course we'll need to screen and import specialist to train and eventually give the facilities over to native born citizens, but for now we can give them temporary development visas."
 GRN_focus_Industry_Development_Act: "Industry Development Act"
 GRN_focus_Industry_Development_Act_desc: "We'll invest in our manufacturing and general industrial sector to create a reliable but diverse economy. Small improvements and projects will slowly snowball as our population and potential immigration pool we vet may increase as well."
 GRN_focus_Military_Forces_Investment_Act: "Military Forces Investment Act"
 GRN_focus_Military_Forces_Investment_Act_desc: "This spending package and arms development project will work hand in hand to develop our ground and air capabilities as we seek to draft our own designs for certain complex equipments."
 GRN_focus_Western_Strategic_Autarky_Act: "Western Strategic Autarky Act"
 GRN_focus_Western_Strategic_Autarky_Act_desc: "The National Autarky Act is a two phase plan to create strategic mining and general resource extraction operations to ensure a limited but stable domestic supply should any nation come to do us harm via naval or political blockades of sort. Phase one of the plan is known as the WSAA or west strategic autarky act. This creates limited operations on iron ore, feldspar for aluminum as well as oil and coal for for both energy and rubber synthetic operations."
 GRN_focus_Eastern_Strategic_Autarky_Zone: "Eastern Strategic Autarky Zone"
 GRN_focus_Eastern_Strategic_Autarky_Zone_desc: "Phase two of the National Autarky Act is developing oil and coal operations for general energy as well as industrial use. We'll also begin limited REE extraction efforts as well as lithium and similar tech oriented minerals. Our domestic security and foreign bargaining chips are beginning to stack in our favor it seems."
 GRN_focus_Militarize_Greenland_Party_Wins: "Militarize Greenland Party Wins?"
 GRN_focus_Militarize_Greenland_Party_Wins_desc: "While most parties in Greenland are pretty carbon copy, no one expected the military interdiction as apparently the complete underdog and recently formed MGP has somehow taken the victory. The party being essentially a political extension of the newly formed Armed Services of Greenland or ASG, is focused on national defense and the ability to obtain the means to defend our nation. A sort of circular logic to be sure but many can't wonder if this was a subconscious need that most wanted after independence from Denmark."
 GRN_focus_Military_Organized_Education_Act: "Military Organized Education Act"
 GRN_focus_Military_Organized_Education_Act_desc: "The overhaul of how classes, subjects and the general structure of our education should and will be reworked into a military like structure. Early teaching of discipline, organization and how to both listen and give order and information is critical not only in memory retention but also in both post education and potential service lives."
 GRN_focus_Production_Critical_Resources_Act: "Production Critical Resources Act"
 GRN_focus_Production_Critical_Resources_Act_desc: "Steel and energy, these two fundamental pillars of any industrialized society are what we need the most. Be it for civilian or military needs and as such we will invest and expand operations to ensure our domestic needs and defense need are met."
 GRN_focus_Advanced_Materials_And_Minerals_Act: "Advanced Materials & Minerals Act"
 GRN_focus_Advanced_Materials_And_Minerals_Act_desc: "The AMMA bill focuses expanding operations around the mineral extraction of what are deemed advanced production needed resources. Things related to tech development and rare earth elements are some prime examples."
 GRN_focus_Army_Armaments_Improvement_Act: "Army Armaments Improvement Act"
 GRN_focus_Army_Armaments_Improvement_Act_desc: "The general improvement of our army is paramount to any land defense we may have. As such we'll invest in expanding our production capabilities as well as passive R&D funding for these facilities to test new designs where possible."
 GRN_focus_Air_Force_Advancements_Act: "Air Force Advancements Act"
 GRN_focus_Air_Force_Advancements_Act_desc: "Funding the production facilities to actually establish some form of an air force will be better than doing nothing. As a bonus we'll throw in a little R&D funding to try and get the ball rolling on designing new aircraft for the branch of service."
 GRN_focus_Military_Garden_Act: "Military Garden Act"
 GRN_focus_Military_Garden_Act_desc: "Dedicating a portion of the slowly but ever expanding agricultural apparatus that is the HFPs to the military rations program is indeed a beneficial thing to do. Not only does it separate the civilian demands from the military but it also help the quality and quantity control for feeding our service members."
 GRN_focus_Bolstering_Naval_Assets: "Bolstering Naval Assets"
 GRN_focus_Bolstering_Naval_Assets_desc: "Our coastline is massive and as such we'll need to grow or at least create ships that can moderately handle the distances in which to cover. Next to our army the navy is our first true line of defense."
 GRN_focus_Civilian_Improvements_Act: "Civilian Improvements Act"
 GRN_focus_Civilian_Improvements_Act_desc: "To bolster and sustain a large military force we must also have a decent civilian based economy to prop everything up. As such we'll do targeted development projects to make sure our military demands don't race ahead to far from what our real economy can handle."
 GRN_focus_Militarized_Economy_Act: "Militarized Economy Act"
 GRN_focus_Militarized_Economy_Act_desc: "This legislation is a comprehensive reapproach to how we organize and treat our nation's economy. By pre-emptively organizing it around what may be heavy military manpower demands, we can focus on better integrating technologies and production methods to greatly reduce the need for allocating manpower to military armaments production. This in turn will free up workers and potential manpower for the civilian economy and our armed services."
 GRN_focus_Greenland_Monarchist_Party_Victory: "Greenland Monarchist Party Victory"
 GRN_focus_Greenland_Monarchist_Party_Victory_desc: "The Greenland Monarchist Party or also known as the House of Greenland Party, is a political party looking to respect and emulate the very, very long history of Greenland being under the Danish monarchy. As such the party aims to take the existing parliamentary system and integrate it into a quite liberal constitutional monarchy. A considerable amount of people are of course confused, but a decent portion — or at least enough to secure an elective victory — believe that Danish political stability is a key to what we can do here at home to really develop and grow our nation."
 GRN_focus_Education_Investments_Act: "Education Investments Act"
 GRN_focus_Education_Investments_Act_desc: "The EIA is a dedicated expenditure increase to better equip and generally invest into the quality of education as well as the innovations departments at certain institutions. We hope to better the efficiencies of our nation and continue to grow and adapt our abilities to the more continual harshness that is our environment."
 GRN_focus_Medical_Research_Initiatives: "Medical Research Initiatives"
 GRN_focus_Medical_Research_Initiatives_desc: "The MRI plan is to create separate funding for a new dedicated department within our major medical institutions. This new department will be called the Medical Developmental Department or MDD. The MDD is responsible for doing what it can to test and find new ways to advance our knowledge and understanding of medical science, as well as ensure the testing of new equipment and procedures through a complete volunteer program."
 GRN_focus_Public_Security_And_Safety_Act: "Public Security & Safety Act"
 GRN_focus_Public_Security_And_Safety_Act_desc: "Our citizens must be able to live their lives without fear. With this new legislation passed funding will be approved for not just community outreach programs but also better standards for evaluating potential hiring candidates and the training program for which to become a police officer. Remember that a quiet day is a good day, and a good day for you is a good day for the public."
 GRN_focus_Agriculture_Advancements_Act: "Agriculture Advancements Act"
 GRN_focus_Agriculture_Advancements_Act_desc: "Building upon our ever growing HRP program we'll continue to invest in Greenhouse and Vertical Farming facilities where possible. The security and stability of our nation rest on acquiring a diverse and stable food supply after all."
 GRN_focus_Economic_Strengthening_Act: "Economic Strengthening Act"
 GRN_focus_Economic_Strengthening_Act_desc: "Developing the bottomline means the standards of the whole nation rise by proxy or as a byproduct depending on your cynical influences or just general disposition on things in life. Regardless if we want to improve the lives of our citizens we must invest in businesses and industries to diversify and expand the products and means for which our people can come across and handle in their life times."
 GRN_focus_Petrochemical_Development_Efforts: "Petrochemical Development Efforts"
 GRN_focus_Petrochemical_Development_Efforts_desc: "The petrochemicals industry is one of the most influential and diverse economic sectors in the modern age, not to mention its impacts are felt in practically daily lives. As such we must assume the mantle and develop our own sector if we are to truly have a robust and diverse economy. The ability to synthesis things like rubber and other valuable chemicals or materials is almost akin to a national security matter."
 GRN_focus_Lithium_Expansion_Act: "Lithium Expansion Act"
 GRN_focus_Lithium_Expansion_Act_desc: "Investments into critical resource extraction operations is paramount to the growing influences of tech and other modern innovations as our nation continues to grow. We have domestic deposits of things like rare earth elements, lithium and other tech producing minerals. As such we'll begin to expand and develop extraction efforts to supplement our domestic demands and potentially use for future trade deals."
 GRN_focus_Royal_Military_Development_Efforts: "Royal Military Development Efforts"
 GRN_focus_Royal_Military_Development_Efforts_desc: "The RMD program is a general investment package to improve the quality of developing equipment for the army and navy as well as assuring new training standards around the ever evolving equipment."
 GRN_focus_Establishing_The_Kingdom: "Establishing The Kingdom"
 GRN_focus_Establishing_The_Kingdom_desc: "With all our preparation complete we are now ready to officially rename the nation to the Kingdom of Greenland. The people are joyous and unified as we set forth to create a prosperous and proud future for all of our citizens."
 GRN_focus_Armed_Services_Of_Greenland: "Armed Services Of Greenland"
 GRN_focus_Armed_Services_Of_Greenland_desc: "With our independence assured we now need to handle our own national defense. We'll need to essentially start from scratch and make something to be able to defend the vast waters, lands and air space we control."
 GRN_focus_The_Frozen_Army: "The Frozen Army"
 GRN_focus_The_Frozen_Army_desc: "Our lands are cold, frozen and hard to traverse in almost any time of the year. We will and must mold our army service branch to be able to see these conditions as a playground rather than a challenge."
 GRN_focus_Training_Facilities_And_Standards: "Training Facilities & Standards"
 GRN_focus_Training_Facilities_And_Standards_desc: "In order to create a proper army we must establish and create training facilities as well as create acceptable standards for which constitutes a proper soldier. These standards must be built around the conditions of our homeland if we are to truly defend our citizens."
 GRN_focus_Setting_Equipment_Standards: "Setting Equipment Standards"
 GRN_focus_Setting_Equipment_Standards_desc: "By creating a standard of equipment we can create a sense of uniformity in both training as well as bettering the logistics around our soldiers."
 GRN_focus_Securing_Domestic_Smallarms: "Securing Domestic Smallarms"
 GRN_focus_Securing_Domestic_Smallarms_desc: "Setting up our own ability to produce small arms and general infantry adjacent like equipment means we can increase the combat capabilities and readiness of our army."
 GRN_focus_Crude_Combat_Designs: "Crude Combat Designs"
 GRN_focus_Crude_Combat_Designs_desc: "The CCDs are essentially the \"rattle me bones\" sort of vehicle equipment designs. They're stupidly bare bones but they're all domestic models. We can use this and maybe purchase a handful of other nation's equipment so we can do testing and proper design works to ensure that as we build up our army it can genuinely field equipment built for modern combat."
 GRN_focus_Vehicle_Manufacturing_Plants: "Vehicle Manufacturing Plants"
 GRN_focus_Vehicle_Manufacturing_Plants_desc: "With the basics of basic vehicle designs at our disposal, we should be able to manufacture these training dummies and use the collective experience to actually design and build up a potential armored core for our military."
 GRN_focus_Institute_For_Army_Developments: "Institute For Army Developments"
 GRN_focus_Institute_For_Army_Developments_desc: "With our army being practically smaller than an infant, we must invest heavily into the means of developing and improving all aspect of our army service branch. For the sake of the nation, the people and the personnel who serve in the branch."
 GRN_focus_Frozen_Battlefield_Doctrine: "Frozen Battlefield Doctrine"
 GRN_focus_Frozen_Battlefield_Doctrine_desc: "Our military will likely never truly scale to the likes of those on the European continent. However what we can do is defend and protect. Using our climate and homeland as the ultimate battlefield we can goad any enemy force whether aggressive or not to come and attack us. They think we'll be a push over, well we'll see about that when they come here and try to say that to our faces."
 GRN_focus_FBD_Leadership_Promotions: "FBD Leadership Promotions"
 GRN_focus_FBD_Leadership_Promotions_desc: "To solidify and begin reorganizing the army around this new doctrine we'll need leaders who actually want to implement it and understand the ideas and concepts it puts down. As such we'll be promoting a dedicated army general staff to better lead and implement these reforms."
 GRN_focus_From_Field_To_Staff_Command: "From Field To Staff Command"
 GRN_focus_From_Field_To_Staff_Command_desc: "With the field commanders promoted we realize that these unfortunate souls need to also understand the wider administration as well. As such their field commands will be supplemented by general staff positions until we can train and promote other worthy officers into this new way forward."
 GRN_focus_Frozen_Warfare_Training_Program: "Frozen Warfare Training Program"
 GRN_focus_Frozen_Warfare_Training_Program_desc: "Our focus is in defending our homeland, said homeland is cold and frozen, thus we must training and ensure our troops can fight in these conditions for as long as possible."
 GRN_focus_Polar_Logistics: "Polar Logistics"
 GRN_focus_Polar_Logistics_desc: "Assuming our combat will always be on our island, while not the best method, is certainly a secured way of thinking for the defense of our nation. As such we'll begin to refine and improve our logistical apparatus to make fighting in the extreme weather an easier task to handle."
 GRN_focus_General_Improvement_Programs: "General Improvement Programs"
 GRN_focus_General_Improvement_Programs_desc: "The defense of our island is obviously our main priority, however, how can we defend our island if we no little to nothing about the combat worlds around us. We must ensure a balanced and general improvement of our army to ensure it is willing and able to handle as many different situations as possible."
 GRN_focus_GIP_Leadership_Promotions: "GIP Leadership Promotions"
 GRN_focus_GIP_Leadership_Promotions_desc: "Securing the new way forward with how we want to grow and develop our army will require field officers and general officer leadership roles. As such we'll go through and find the best possible candidates to ensure they can help propel this way of thinking to new standards of excellence."
 GRN_focus_General_Staff_Roles: "General Staff Roles"
 GRN_focus_General_Staff_Roles_desc: "While our army is small, we'll need to rely on those who we've just given field commands to also take up administrative roles as well for the time being."
 GRN_focus_Artillery_Corps_Specialist: "Artillery Corps Specialist"
 GRN_focus_Artillery_Corps_Specialist_desc: "Developing and specializing in artillery operations both in defensive and offensive measures means we will be able to do more damage to both personnel and morale to the enemy then they could to us. But artillery are hard to move and the easy to move pieces are expensive. We'll need to find ways to improve on loss prevention if we are to get any real meaning behind this way of tactical planning."
 GRN_focus_Clear_Skys_Project: "Clear Skies Project"
 GRN_focus_Clear_Skys_Project_desc: "The CSP is a dedicated anti-air equipment development program to ensure that the means for our soldiers to be able to fight are not only reliant on whether or not the enemy decides to use their air power or not. Aircraft are expensive, some fun new toys for your average grunt, not so much."
 GRN_focus_Army_Officer_Training_Corps: "Army Officer Training Corps"
 GRN_focus_Army_Officer_Training_Corps_desc: "The AOTC is the culmination and dedication of personnel to become leaders in both the tactical and strategic sense. Our nation is a small one and so we must develop and curb any bad habits before we grow to a point where natural entrenchment can take hold."
 GRN_focus_Navy_Of_Greenland: "Navy of Greenland"
 GRN_focus_Navy_Of_Greenland_desc: "Our navy is nothing more than fishing boats and patrol vessels. If we are to even think about defending our coastal waters then we must ensure we have a navy to begin with but also one which can handle such volatile conditions at times."
 GRN_focus_Naval_Research_Institute: "Naval Research Institute"
 GRN_focus_Naval_Research_Institute_desc: "Establishing the Itilleq Naval Research Institute will allow us to develop and grow our naval knowledge and practical applications to our navy. This cornerstone of development will allow us to create a navy that we want and allow us to properly defend our waters from foreign aggression."
 GRN_focus_Nuuk_Naval_Shipyards: "Nuuk Naval Shipyards"
 GRN_focus_Nuuk_Naval_Shipyards_desc: "Developing the capital regional shipyards will allow us to build new vessels for both military and potential civilian means."
 GRN_focus_Expanding_The_Design_Department: "Expanding The Design Department"
 GRN_focus_Expanding_The_Design_Department_desc: "Strategic naval shipyards near the NRI in the south of the nation will allow us to improve, design and test naval vessels and give our navy the best possible outcomes where possible. This also will help to better update current fielded classes of ships and help them to be refitted to newer designs where possible."
 GRN_focus_Tasiilaq_Shipyards_Complex: "Tasiilaq Shipyards Complex"
 GRN_focus_Tasiilaq_Shipyards_Complex_desc: "Balancing out the general naval developments between strategic end points allows us to logistically support and field our fleets where needed at all extents of our island."
 GRN_focus_Rough_Raft_Designs: "Rough Raft Designs"
 GRN_focus_Rough_Raft_Designs_desc: "The bare minimum to design and field some sort of a naval force means we'll need to work extra hard in R&D efforts to actually acquire and attempt to build real designs in the future."
 GRN_focus_Small_Surface_Fleet_Doctrine: "Small Surface Fleet Doctrine"
 GRN_focus_Small_Surface_Fleet_Doctrine_desc: "Our nation doesn't have the manpower to field many ships in general. As such we'll begin to tool and work our naval doctrine around surface vessels but of the smaller caliber. Make them more modular and adaptable essentially, though nothing larger than say a destroyer due to trainign and manpower concerns."
 GRN_focus_Corvette_Design_Department: "Corvette Design Department"
 GRN_focus_Corvette_Design_Department_desc: "The early program for our SSF doctrine is that of the corvette design department. The department will handle designing, testing and improving the innovations around the standard hull type."
 GRN_focus_Small_Vessel_Fleet_Organization: "Small Vessel Fleet Organization"
 GRN_focus_Small_Vessel_Fleet_Organization_desc: "Our SVF's or Small Fleets, will be organized around the big three. Corvettes, Frigates and Destroyers. These three vessel class of ships will be the best for crewing, adapting and creating new and dynamic designs to make our fleets pack a serious punch against an enemy force."
 GRN_focus_Submersival_Fleet_Doctrine: "Submersival Fleet Doctrine"
 GRN_focus_Submersival_Fleet_Doctrine_desc: "Submarines, they're stealthy and not too much demanding for manpower needs. However submarines do pack a very big punch if they're organized just right. From anti-ship missiles to good old fashioned torpedoes, we can do a lot more with a lot less."
 GRN_focus_Attack_Submarine_Pillar: "Attack Submarine Pillar"
 GRN_focus_Attack_Submarine_Pillar_desc: "The first main pillar to securing the foundation of our navy is that of the attack class of submarine. Designed mostly around direct assualt tactics like torpedoes and mine warfare, the attack class will be the spears of our nation's navy."
 GRN_focus_Missile_Submarine_Pillar: "Missile Submarine Pillar"
 GRN_focus_Missile_Submarine_Pillar_desc: "The second pillar to our naval security is of the missile class submarine. Missiles are heavy hitters, but they're also kinda costly as well. We need to improve and better the effective combat abilities of this pillar of naval prowess if we are to properly combat against foreign foes at sea."
 GRN_focus_Naval_Command_Corps: "Naval Command Corps"
 GRN_focus_Naval_Command_Corps_desc: "Our navy needs a command apparatus and today we establish that very thing. It's a start and we can only go up from here. I hope."
 GRN_focus_Greenlandic_Air_Force: "Greenlandic Air Force"
 GRN_focus_Greenlandic_Air_Force_desc: "The skies over our island are cloudy, cold and barren. We must figure out how to develop and create a sufficient air force to defend our skies."
 GRN_focus_West_Craft_Manufacturing: "West Craft Manufacturing"
 GRN_focus_West_Craft_Manufacturing_desc: "The West craft manufacturing facility is ready to produce and test designs for our air force where and when possible. We hope to utilize this new industrial complex to equip and prepare our air force to defend our skies."
 GRN_focus_Preparing_Air_Institute_Manufacturing: "Preparing Air Institute Manufacturing"
 GRN_focus_Preparing_Air_Institute_Manufacturing_desc: "The ability to produce and test aircraft is paramount to learning and innovating. We'll setup manufacturing capabilities near the planned Air Research Institute to make ease of logistics and planning around the development of new designs and technology testing."
 GRN_focus_Tingmiarmit_Air_Research_Institute: "Tingmiarmit Air Research Institute"
 GRN_focus_Tingmiarmit_Air_Research_Institute_desc: "The TARI is an institution dedicated to the development and innovations around aircraft and air combat capabilities. Though our nation is somewhat large it is also small at the same time and as such we must dedicate these early years to specializing a true form of air doctrine and air security from enemy forces."
 GRN_focus_Infrequent_Flyer_Designs: "Infrequent Flyer Designs"
 GRN_focus_Infrequent_Flyer_Designs_desc: "Cheap designs to do the designated roles they've been assigned to. Not the best but certainly a starting point to begin earnest development for our air force."
 GRN_focus_Air_Supremacy_Prioritization: "Air Supremacy Prioritization"
 GRN_focus_Air_Supremacy_Prioritization_desc: "The enemy may overwhelm our navy, but they should never be allowed to dominate our skies. We should wholely focus on producing and innovating in direct air to air combat capabilities. Securing this allows us to do whatever we want on both air, sea and land by proxy."
 GRN_focus_General_Aviation_Innovations: "General Aviation Innovations"
 GRN_focus_General_Aviation_Innovations_desc: "The TARI facility has been working hard — thank god because we put a lot of money into it, but anyways. General improvements to things like radar detection, fuel efficiency and general consumption efforts as well as a small host of other innovations should be rolling out into field testing in short order."
 GRN_focus_Air_Dominance_Research_Programs: "Air Dominance Research Programs"
 GRN_focus_Air_Dominance_Research_Programs_desc: "Through sole dedication on fighter R&D efforts we shall rid the skies from any foes who seek to blacken our skies with their hateful intentions."
 GRN_focus_Naval_Bombing_Superiority_Force: "Naval Bombing Superiority Force"
 GRN_focus_Naval_Bombing_Superiority_Force_desc: "Dominating the seas through aerial means could open the door to pre-emptive defensive measures and secure offensive capabilities should the need ever arise."
 GRN_focus_Bombing_Research_Priorities: "Bombing Research Priorities"
 GRN_focus_Bombing_Research_Priorities_desc: "Investing our research funding to prioritize innovations around bombing and more air to ground and air to ship combat will prove fruitful to prempt any invasion force we may possibly face."
 GRN_focus_Bomber_Air_Fleets: "Bomber Air Fleets"
 GRN_focus_Bomber_Air_Fleets_desc: "Our air force will have dedicated air fleets to all sorts of bombing efforts. From Strategic to Close Air, we will set the stage that we want to ensure no enemy force will harm our lands for long."
 GRN_focus_Air_Officer_Training_Corps: "Air Officer Training Corps"
 GRN_focus_Air_Officer_Training_Corps_desc: "Developing our Air Force Officer Corps will continue to improve the developmental efforts we strive to acquire as we continue to grow and refine what our air force service branch actually is."
 GRN_focus_Greenlandic_General_Staff_Corps: "Greenlandic General Staff Corps"
 GRN_focus_Greenlandic_General_Staff_Corps_desc: "With the military now ever expanding we've reached a point where we need a more unified general staff command. As such we'll work to create this national command staff and work towards bettering our nation and working to always improve our national defense means."
 GRN_focus_Thawing_The_Economy: "Thawing The Economy"
 GRN_focus_Thawing_The_Economy_desc: "The economy of our nation originally is just fishing and — well, fishing. Of course we do have extremely little footprints in commercial and other economic sectors but the true bulk of the economy comes from our fisheries. We have to change this. Of course we've tried to diversify to fight the battle for our independence but we must continue to figure out what we can do and how to do it. Our economy has potential to grow but we must do something."
 GRN_focus_Energizing_Greenland: "Energizing Greenland"
 GRN_focus_Energizing_Greenland_desc: "As we grow our nation our energy demand continue to rise and rise. We need to establish a stable energy sector that will continue to handle the demands we seek."
 GRN_focus_Fossil_Fuelin: "Fossil Fuelin"
 GRN_focus_Fossil_Fuelin_desc: "Our nation has large untapped deposits of both coal and oil. We can use these for quick and cheap energy to continue the pace of our energy demands as seen fit."
 GRN_focus_Oil_Charter_Dominance: "Oil Charter Dominance"
 GRN_focus_Oil_Charter_Dominance_desc: "By prioritizing the creation of new charters for extraction, we can continue to meet energy demands through expanding overall extraction efforts."
 GRN_focus_Renewable_Revivals: "Renewable Revivals"
 GRN_focus_Renewable_Revivals_desc: "Our lands are a plenty with winds, sunshine and moving waters. We have the arguably best environment to invest in stable renewable energies and as such we'll begin a general and comprehensive investment in both building renewable facilities and the development of better methods to create energy."
 GRN_focus_Harnessing_The_Winds_Of_Fortune: "Harnessing The Winds Of Fortune"
 GRN_focus_Harnessing_The_Winds_Of_Fortune_desc: "We'll continue to prioritize our general developments and assure that we can harness the very nature of our nation to benefit our citizens to be able to live better lives then before."
 GRN_focus_Greenlands_Green_Energy: "Greenland's Green Energy"
 GRN_focus_Greenlands_Green_Energy_desc: "Our island is the perfect place to develop and use nuclear energy. Fairly stable weather patterns, cool and cold temperatures nearly all year round and plenty of water both salt and fresh..frozen water to be used in the steam generation process."
 GRN_focus_Unlimited_Power: "Unlimited Power"
 GRN_focus_Unlimited_Power_desc: "With domestic deposits of nuclear materials we can supply our own facilities. We can also begin to construct and set the stage for getting operations underway. With this massive investment we set the precedent that we are a nation who no longer needs to worry about energy anymore."
 GRN_focus_Secured_Electrical_Grid: "Secured Electrical Grid"
 GRN_focus_Secured_Electrical_Grid_desc: "With our energy direction set our power needs are now more stable or at the very least catching up to becoming more pre-emptive in nature rather than reactive. Let's hope we made the right choice and continue to move forward to a brighter future."
 GRN_focus_Agricultural_Futurism_Plan: "Agricultural Futurism Plan"
 GRN_focus_Agricultural_Futurism_Plan_desc: "Our original HFPs or Harsh Farming Projects have solidified a bedrock of economic and scientific innovations. While it does lead to more energy intensive measures we can utilize this to spearhead agriculture sector dominance in both self sufficiency as well as potential foreign trades and investments."
 GRN_focus_Western_Farming_Complexes: "Western Farming Complexes"
 GRN_focus_Western_Farming_Complexes_desc: "Creating foundations, infrastructure and overall structures to support these methods takes time, but they will prove fruitful in the future. These VFCs or Vertical Farming Complexes are great to grow all kinds of foods pretty much year round. This also allows us to expand our distillation facility apparatus to continue chipping away at the Great Shelf."
 GRN_focus_Eastern_Farming_Complexes: "Eastern Farming Complexes"
 GRN_focus_Eastern_Farming_Complexes_desc: "Continual development of our Vertical Farming Sector will propel our nation's food costs to new lows making food very cheap and allow us to trade foods with other nations near all year round for stuff that regionally would be considered out of season."
 GRN_focus_Supplemental_Industries: "Supplemental Industries"
 GRN_focus_Supplemental_Industries_desc: "Developing our industrial sector will give us some limited diversity among our heavily invested agricultural sector."
 GRN_focus_First_International_Farm: "First International Farm"
 GRN_focus_First_International_Farm_desc: "With all our investments in research and economic development of the greater agricultural sector, we've come to realize that with what demands we may be able to meet we might be the first international farming nation. Like sure there are bread baskets around the globe, but think about it, we could be, THEE, global food bank."
 GRN_focus_Infrastructure_Projects: "Infrastructure Projects"
 GRN_focus_Infrastructure_Projects_desc: "Growing our economy is all fine and dandy, but in order to maintain it we need roads, rails and all manners of infrastructure to connect both people and services to make the economy actually work. As such we'll institute a general list of projects to better integrate our sparsely populated nation."
 GRN_focus_Greater_West_Highway_Project: "Greater West Highway Project"
 GRN_focus_Greater_West_Highway_Project_desc: "Creating a direct \"highway\" that links up the western towns will allow for better travel conditions for citizens as well as reduced travel burdens and time frames to get from one location to another."
 GRN_focus_Improving_Western_Internet_Towers: "Improving Western Internet Towers"
 GRN_focus_Improving_Western_Internet_Towers_desc: "Improving existing towers and constructing new internet towers will allow our citizens and institutions to better work in a more efficient and cohesive manner for daily activities."
 GRN_focus_Sisimuit_Northern_Railway: "Sisimuit Northern Railway"
 GRN_focus_Sisimuit_Northern_Railway_desc: "Expanding the current rail network to encompass as much of the western region as possible is paramount to logistics and economic supply chain cohesion. We'll greatly benefit from this investment due to railways being best and bulk transportation."
 GRN_focus_Great_Eastern_Highway_Project: "Great Eastern Highway Project"
 GRN_focus_Great_Eastern_Highway_Project_desc: "Similar to our western project we'll do our best to connect the eastern towns to make the nation a lot more connected even in the most basic of means if at all possible."
 GRN_focus_East_Region_Internet_Expansions: "East Region Internet Expansions"
 GRN_focus_East_Region_Internet_Expansions_desc: "With the eastern region being usually the less developed compared to the west, we must do what we can to grow and equalize these shortfalls. As such we'll expand what internet infrastructures we have in the region to bring it up to standards."
 GRN_focus_Great_Greenlandic_Eastern_Railroad: "Great Greenlandic Eastern Railroad"
 GRN_focus_Great_Greenlandic_Eastern_Railroad_desc: "The GGERR is one of the largest infrastructure investments as we set forth to connect as much of the coastal lands into one unified rail network. The only barrier for reduced times for travel is the Great Shelf of ice, but maybe we could change that one of these days."
 GRN_focus_Connecting_Greenland: "Connecting Greenland"
 GRN_focus_Connecting_Greenland_desc: "As our nation grows so does our need for infrastructure. To this avail we must continue to invest in not just the infrastructure itself, but the ways we maintain it and how we can make it better for the environment we are building it in."
 GRN_focus_Economic_Modernism_Plan: "Economic Modernism Plan"
 GRN_focus_Economic_Modernism_Plan_desc: "The continued diversification of our economy is paramount to the stability and health of it. We must improve in our shortfalls related to the wider civilian sector and office/tech sector."
 GRN_focus_Office_District_West: "Office District West"
 GRN_focus_Office_District_West_desc: "Developing the general office sector around the western region will allow us to expand the products and services the citizens will be able to enjoy."
 GRN_focus_Tech_Sector_Growth: "Tech Sector Growth"
 GRN_focus_Tech_Sector_Growth_desc: "Growing the office and service sectors is usually complimented by the general development of the technology sector as well. We should secure this to ensure the most diversity is achieved by our economy as possible."
 GRN_focus_Civilian_Sector_Investments: "Civilian Sector Investments"
 GRN_focus_Civilian_Sector_Investments_desc: "Supplementing our drive to develop and diversify the office sector these businesses need industrial backing to make and potentially use their products."
 GRN_focus_National_Economic_Modernity: "National Economic Modernity"
 GRN_focus_National_Economic_Modernity_desc: "Our investments have been diverse and fruitful to say the least, but this is only the beginning. We must do our best to provide the best possible outcome for our citizens and for the future of our nation."
 GRN_focus_Resource_Extraction_Projects: "Resource Extraction Projects"
 GRN_focus_Resource_Extraction_Projects_desc: "The island is teeming with untapped resources. If we are to get anywhere in terms of domestic security and foreign investment and or trades, we must develop our resource extraction sector to the needs of what we believe to be the best for the nation."
 GRN_focus_Iron_Mining_Operations: "Iron Mining Operations"
 GRN_focus_Iron_Mining_Operations_desc: "Iron is a fundamental ore to mine and utilize throughout the economy. We'll begin national investments to start and grow extraction operations to best suit our needs."
 GRN_focus_Project_Alumina_Oxide: "Project Alumina Oxide"
 GRN_focus_Project_Alumina_Oxide_desc: "While so far we have yet to discover any direct bauxite deposits, we have found there are ways to extract the needed alumina oxide from other minerals to make aluminium. As such we'll need heavy investments into operations and isolation research to utilize the most out of what little we do have."
 GRN_focus_Lithium_Mining_Operations: "Lithium Mining Operations"
 GRN_focus_Lithium_Mining_Operations_desc: "The deposits of lithium and similar building block type minerals will be key to expanding our abilities to innovate and grow the tech industries and services sector. Investing in mining operations of things like lithium, cobalt and so on will be a huge boost to our economic flexibility."
 GRN_focus_Project_Rare_Minerals: "Project Rare Minerals"
 GRN_focus_Project_Rare_Minerals_desc: "Greatly investing in rare earth elements like Neodymium and other available mineral deposits will greatly raise our international standing for trade negotiations. We hope by doing such investments that we as a nation can reach new heights and bring in more capital investments to our nation."
 GRN_focus_Black_Gold_Extraction_Efforts: "Black Gold Extraction Efforts"
 GRN_focus_Black_Gold_Extraction_Efforts_desc: "Investing in our oil deposits will give us plenty of cheap energy as well as be a great negotiation chip for future trade deals. As an aside we can also use the extracted oil and coal to bolster our synthetics and petrochemical industries."
 GRN_focus_Project_Glacial_Rubber: "Project Glacial Rubber"
 GRN_focus_Project_Glacial_Rubber_desc: "Vast experimentation and investments into dedicated VFF's specifically tailored to grow rubber trees, to utilizing coal and oil into synthetics and petrochemicals means we can explore every avenue possible to secure a domestic supply of rubber."
 GRN_focus_Polar_Bear_Policies: "Polar Bear Policies"
 GRN_focus_Polar_Bear_Policies_desc: "With our nation stable, developed and equipped for national defense and potential offense we can now begin to look beyond the island. Our foreign policy will dictate our true future and the desires for with we wish to reach with our own hands."
 GRN_focus_The_Atlantic_Stepping_Stone: "The Atlantic Stepping Stone"
 GRN_focus_The_Atlantic_Stepping_Stone_desc: "Lets be real with ourselves, any real foreign policy direction is always going to involve Iceland at some point. So lets get this out of the way and figure out just what exactly we'll be doing. This will not only set the pacing for our future foreign policy endeavors but it will be a suitable test to our abilities to navigate the modern landscape."
 GRN_focus_Investing_In_Brotherhood: "Investing In Brotherhood"
 GRN_focus_Investing_In_Brotherhood_desc: "If we want closer ties and relations let alone any future plans of a potential union between the two of us, then we'll need to build trust. We can do this by a series of investments that benefit them more so than us. If we play the long game with this then it'll benefit both of us in the end. Remember slow and steady wins the race."
 GRN_focus_Reykjavik_Investment_Firm: "Reykjavik Investment Firm"
 GRN_focus_Reykjavik_Investment_Firm_desc: "Iceland is in NATO, this is a problem. We must find a way to cull the reliance and supposed need that Iceland has for the foreigners, namely the Americans help if we are to secure the island for ourselves. As such lets make them an offer they can't refuse. Nevermind that fine print, just sign right here."
 GRN_focus_Operation_Real_Green: "Operation: Real Green"
 GRN_focus_Operation_Real_Green_desc: "We've exhausted all our options, we must secure the island for our sub-regional defense of the high north atlantic ocean area. Fishing, trade secured for our interest and economy. As well as pre-emptive patrolling against aggressive proabing measures will bring better stability to the area."
 GRN_focus_Passive_Administration_Act: "Passive Administration Act"
 GRN_focus_Passive_Administration_Act_desc: "With Iceland now under our more direct control we must help to integrate and form a closer union of similar peoples. As such we'll give a more passive approach essentially forming a soft confederal approach despite the more federal organization."
 GRN_focus_The_North_Sea_Gambit: "The North Sea Gambit"
 GRN_focus_The_North_Sea_Gambit_desc: "The Faroe Islands is the midway of the North Sea. We will secure the islands by any means to set the stage towards instigating Danish reaction. We're hoping to make it to where Denmark will declare war on us and thus bypassing the NATO Article 5 doctrine. By doing so we also can get a foothold onto the continent for a closer base of operations either north or south."
 GRN_focus_Friends_On_The_Other_Side: "Friends On The Other Side"
 GRN_focus_Friends_On_The_Other_Side_desc: "See to secure the hearts and minds of the Faroe Islanders we must look to be benevolent in nature. As such we'll do everything in our best interest to serve their best interest. Some subtle casual talks around the island with the locals and project workers about how Denmark never treated them this good is all we need to set the pace and tone to let the government cave into us."
 GRN_focus_Operation_Fair_Oh: "Operation: Fair Oh"
 GRN_focus_Operation_Fair_Oh_desc: "So the Faroe Islands are under Danish control, but it looks like the Danish don't really care any more than the status quo of things. What if we just yoinked the islands and see what happens. If no blood is spilt or anything in the take over then is it really an attack and if we can convince the people to join us before Denmark makes an appeal at that point who would earnestly go out of their way to help Denmark fight a nation that everyone likely thinks could be handled by Denmark anyways. It's the perfect aggressive but not aggressive plan."
 GRN_focus_Continental_Shenanigans: "Continental Shenanigans"
 GRN_focus_Continental_Shenanigans_desc: "With our North Sea stepping stones secured we now turn our attention to the continent. In other terms we look back to our old overlord to make landfall on the continent before we figure out where exactly we'll be heading towards next."
 GRN_focus_Family_Investments: "Family Investments"
 GRN_focus_Family_Investments_desc: "With Denmark being wise to our shenanigans we must throw them off through a more passive approach to things. Given how our recent history has been we must let them relax and lose their guard so we can handle things in a more peaceful way if possible."
 GRN_focus_Jylland_Investment_Firm: "Jylland Investment Firm"
 GRN_focus_Jylland_Investment_Firm_desc: "We'll practice just like in Iceland. A bulk series of investments which will allow us to sew in some minor public issues to politically isolate Denmark from its alliance commitments."
 GRN_focus_Operation_Middleman: "Operation: Middleman"
 GRN_focus_Operation_Middleman_desc: "Denmark is the middleman between the nordic family members and the continental free for all. We need to secure this if we are to ensure smooth operations further down the road to our end goal."
 GRN_focus_Civil_Service_Integration: "Civil Service Integration"
 GRN_focus_Civil_Service_Integration_desc: "Standardizing and integrating Danish civil services into the current civil service apparatus will allow for a more cohesive and less disruptive daily operations for both the programs themselves and the people who need them."
 GRN_focus_Nordic_Regional_Operations: "Nordic Regional Operations"
 GRN_focus_Nordic_Regional_Operations_desc: "With the central command center achieved through the acquisition of Denmark we now can better generalize our strategic objectives and abilities. We still have the same format but it'll follow now more broader scopes and or at least more indirect approaches for better cohesion."
 GRN_focus_West_Nordic_Interests: "West Nordic Interests"
 GRN_focus_West_Nordic_Interests_desc: "We'll look to gain internal influence over time to secure Norwegian resources and civilian approval of a grander Nordic union as time marches on."
 GRN_focus_North_Fjords_Investment_Firm: "North Fjords Investment Firm"
 GRN_focus_North_Fjords_Investment_Firm_desc: "Similar to how we handled Iceland and Greenland, we'll develop our own interests through developing Norwegian interests."
 GRN_focus_Operation_Fjordsland: "Operation: Fjordsland"
 GRN_focus_Operation_Fjordsland_desc: "Securing Norway gives us unmitigated access to the North Sea trade routes and resources. It gives us a bargaining chip with NATO to help defend against Russia and overall it secures a foothold into the greater nordic region."
 GRN_focus_North_Sea_Negotiations: "North Sea Negotiations"
 GRN_focus_North_Sea_Negotiations_desc: "Working with the population and figuring out what they want out of the new status quo will help to better and smoothen out the general integration process."
 GRN_focus_Central_Nordic_Interests: "Central Nordic Interests"
 GRN_focus_Central_Nordic_Interests_desc: "Doing our best to secure our interests in Sweden and thus the central region of the Nordic nations would be greatly beneficial to our future endeavors."
 GRN_focus_Karlstad_Central_Investments_Agency: "Karlstad Central Investments Agency"
 GRN_focus_Karlstad_Central_Investments_Agency_desc: "Working to invest and develop the region around Karlstad and other cities will both put more favorable opinions on us but will also allow for us to invest in not just Sweden's future but ours as well."
 GRN_focus_Operation_Great_Northern_War: "Operation: Great Northern War"
 GRN_focus_Operation_Great_Northern_War_desc: "The amicable side of politics has failed us despite the Swedish general disposition in the region. As such we've been forced to resort to more forceful means of achieving our end goals."
 GRN_focus_Stockholm_Community_Programs: "Stockholm Community Programs"
 GRN_focus_Stockholm_Community_Programs_desc: "Reaching out to the communities and doing more to foster stable as well as generally more positive impressions will help to better settle integration efforts both with the population and with local administrations."
 GRN_focus_Eastern_Nordic_Interests: "Eastern Nordic Interests"
 GRN_focus_Eastern_Nordic_Interests_desc: "Securing Finland would make us a great bargaining chip between the head butting powers of the US and Russia. Since Finland shares a significant border with the Great Eastern Bear, we might as well see what we can do to benefit our future goals."
 GRN_focus_Suomen_Investment_Agency: "Suomen Investment Agency"
 GRN_focus_Suomen_Investment_Agency_desc: "Securing the developments and future that not only what seems like the Finnish people want but also doing what we can to make easier the future we desire is a great way to see if we can secure Finland for our own means."
 GRN_focus_Operation_Mannerheim: "Operation: Mannerheim"
 GRN_focus_Operation_Mannerheim_desc: "Securing the frozen lands of Finland will be like securing a home away from home. The terrain while a lot more flat in general still has a similar harshness in its environment. As such we should be able to secure these lands with not much difficulty overall."
 GRN_focus_Continued_Peaceable_Autonomy: "Continued Peacable Autonomy"
 GRN_focus_Continued_Peaceable_Autonomy_desc: "The Finnish people are a cherished peoples who enjoy solitude as much as solidarity among their cultural similars. As such with a mutual understanding and more standings of equal type of agreement we will be able to control the territory with ample help as long there was fair treatment and no strong arming of the civilians or government into a will against their own. While this sounds bad for us its actually a lot easier then many seem to realize."
 GRN_focus_Solidifying_Nordic_Unity: "Solidifying Nordic Unity"
 GRN_focus_Solidifying_Nordic_Unity_desc: "With our ambitions reaching a humble conclusion we must simply relax and enjoy the fruits of our labor as we set forth to create a new Nordic union which will rival those other unions around the world."
 GRN_focus_Continental_Ambitions: "Continental Ambitions"
 GRN_focus_Continental_Ambitions_desc: "With the nordic nations now consolidated we can now turn our attention to the south. While these goals are ever larger then we could earnestly fathom in practicality. If we use our diplomatic template as we have so far we should be able to achieve the next step in our foreign ambitions. The Inuit Continental Union."
 GRN_focus_Eastern_Continental_Interests: "Eastern Continental Interests"
 GRN_focus_Eastern_Continental_Interests_desc: "With our northern consolidations set forth we now can look to the south. As such we'll create a great eastern border by gaining a foothold in the Baltic region."
 GRN_focus_Operation_Nordic_Adjacent: "Operation: Nordic Adjacent"
 GRN_focus_Operation_Nordic_Adjacent_desc: "Estonia is the closest landing zone from our Finnish holdings. We can either paradrop or broad naval invade from Helsinki and quickly secure the nation before other powers think of protesting."
 GRN_focus_Operation_Riga_River: "Operation: Riga River"
 GRN_focus_Operation_Riga_River_desc: "Securing Latvia gives us a central plateau to spread out and secure the rest of the Baltic region."
 GRN_focus_Operation_Vilnius: "Operation: Vilnius"
 GRN_focus_Operation_Vilnius_desc: "Lithuania is arguably the most developed power within the Baltic region, we knock them out and the other two will be like a sunday stroll around town."
 GRN_focus_Baltic_Behestment: "Baltic Behestment"
 GRN_focus_Baltic_Behestment_desc: "With local authorities and civilian populations beginning to relax and accept the new status quo of things we can now begin to integrate the former Baltic nations. Though they have a strong will as a people and as such maybe we can work to give them a similar standing like we worked out with Finnish local authorities."
 GRN_focus_North_Sea_Security: "North Sea Security"
 GRN_focus_North_Sea_Security_desc: "Securing the entirety of the North Sea and northern Atlantic will prove immensely useful in terms of global influence. We should work to aligning the Celtic Isles and their respective occupiers so we can pave the way for our more gracious rule."
 GRN_focus_Operation_Albion: "Operation: Albion"
 GRN_focus_Operation_Albion_desc: "Securing the core of what is and or was the \"United\" Kingdom will be crucial for further operations on the Celtic Isles. Not to mention establishing a critical foothold for any western continental shenanigans."
 GRN_focus_Operation_Highlander: "Operation: Highlander"
 GRN_focus_Operation_Highlander_desc: "Securing the Scottish region allows us near full control of the North Sea strategic zone. This will set the foundation for a general southern advance into the main island."
 GRN_focus_Operation_Great_Western_Nation: "Operation: Great Western Nation"
 GRN_focus_Operation_Great_Western_Nation_desc: "Strategic occupation of the Wales and what was once the Great Western Railway will allow us to utilize infrastructure to coordinate towards interests in both the west for Ireland and the southeast with England."
 GRN_focus_Operation_Be_My_Mann: "Operation: Be My Mann"
 GRN_focus_Operation_Be_My_Mann_desc: "Securing the strategic Isle of Mann will give us a critical footnote when handling any naval issues in regards to the whole of the Celtic Isles."
 GRN_focus_Operation_Ulster: "Operation: Ulster"
 GRN_focus_Operation_Ulster_desc: "With the island still divided to this day our best bet is to knock out the weaker northern Irish state of Ulster. Securing this allows us to march south and secure the rest of the emerald isle."
 GRN_focus_Operation_Emerald_Isle: "Operation: Emerald Isle"
 GRN_focus_Operation_Emerald_Isle_desc: "Securing the whole of Ireland will allow us to stage better advances into the western most reaches of the continent. Not to mention it will help as a staging ground for the other island with the \"United\" Kingdom."
 GRN_focus_Celtic_Consolidations: "Celtic Consolidations"
 GRN_focus_Celtic_Consolidations_desc: "Beginning integration efforts and normalizing our rule and authority over the lands and people will take time. But providing aid, services and showing them we can get along under the new banner will allow everyone to get back into the swing of things."
 GRN_focus_Western_European_Advances: "Western European Advances"
 GRN_focus_Western_European_Advances_desc: "Our steady march through the continent will be one giant leap forward as we look towards the western central section of nations."
 GRN_focus_Operation_Bonaparte: "Operation: Bonaparte"
 GRN_focus_Operation_Bonaparte_desc: "France is the cornerstone of the western European theater of operations. Not only that but it serves as the gateway to Iberia when we decide to go down there. It's time to consolidate the western most nation in the central axis of the continent."
 GRN_focus_Operation_Windmill: "Operation: Windmill"
 GRN_focus_Operation_Windmill_desc: "The Netherlands will serve as a fine western foothold onto the continent. With most of the country being coastline we should be able to secure it in no time."
 GRN_focus_Operation_Rhine_Rumble: "Operation: Rhine Rumble"
 GRN_focus_Operation_Rhine_Rumble_desc: "Germany defines the most central point within the continent of Europe as a whole. We secure it and we secure the entire continent in due course."
 GRN_focus_Operation_Chocolate_Waffle: "Operation: Chocolate Waffle"
 GRN_focus_Operation_Chocolate_Waffle_desc: "Belgium, a nation that reasonably shouldn't exist. Being a British creation some hundreds of years ago, the nation serves as a thorn in the side of true European unity. We shall remove this thorn with utmost haste."
 GRN_focus_Operation_Speed_Bump: "Operation: Speed Bump"
 GRN_focus_Operation_Speed_Bump_desc: "It's Luxembourg, its not a threat except when it joins a coalition of other nations. We're gonna take it now, okay byeeee."
 GRN_focus_French_Values_Greenlandic_Leadership: "French Values, Greenlandic Leadership"
 GRN_focus_French_Values_Greenlandic_Leadership_desc: "Ensuring the highly agitation population of france is compliant with the new status quo will take significant amounts of time and effort. But if we can show we don't want to change their values, merely change the leadership in charge then we can hopefully work with the people a lot more."
 GRN_focus_German_Traditions_Greenlandic_Initiative: "German Traditions, Greenlandic Initiatives"
 GRN_focus_German_Traditions_Greenlandic_Initiative_desc: "Germany has a rich history of military traditions. If we can capitalize on this then we are certain for continental hegemony. German martial prowess mixed with Greenlandic self worth ambitions."
 GRN_focus_Low_Countries_Low_Maintainance: "Low Countries, Low Maintenance"
 GRN_focus_Low_Countries_Low_Maintainance_desc: "The expectation of the Low Countries is simply to be treated fairly and to be allowed to remain free-spirited. Considering we are attempting to create a union of equals, this is proving far easier than expected."
 GRN_focus_Iberian_Atlantic_Interests: "Iberian Atlantic Interests"
 GRN_focus_Iberian_Atlantic_Interests_desc: "The Iberian region holds a strategic chokepoint between the mostly central Atlantic region as well as a main access point for the Mediterranean. We must secure this vital trade and logistics point if we are to secure the continent at large."
 GRN_focus_Operation_Castile: "Operation: Castile"
 GRN_focus_Operation_Castile_desc: "Spain is the main dog in Iberia, we secure it and we pretty much secure the region."
 GRN_focus_Operation_Fontainebleau: "Operation: Fontainebleau"
 GRN_focus_Operation_Fontainebleau_desc: "Napoleon once tried to conquer the Portuguese through a treaty with Spain at the time. Today is nothing like that, for we will conquer Portugal for the sake of Iberian unity and European federalism. A new dawn awaits us and Portugal is the gateway to the Iberian consolidation."
 GRN_focus_Operation_The_Other_Galicia: "Operation: The Other Galicia"
 GRN_focus_Operation_The_Other_Galicia_desc: "Most folks outside of Europe if they hear of Galicia they think of the region around western Ukraine. But actually we mean to tackle the Galician nation in the northwest of Iberia."
 GRN_focus_Operation_Basquing_In_the_Sun: "Operation: Basquing In The Sun"
 GRN_focus_Operation_Basquing_In_the_Sun_desc: "Dealing with the Basque nation will be a simple endeavor if we haven't already. Did we? I forget."
 GRN_focus_Operation_Barcelona: "Operation: Barcelona"
 GRN_focus_Operation_Barcelona_desc: "Securing the northeastern section of Iberia allows us to have a foothold on the other side of the mountain ranges which defined the Franco-Spanish border."
 GRN_focus_Operation_Casablanca: "Operation: Casablanca"
 GRN_focus_Operation_Casablanca_desc: "The southern region known as Andalusia within Iberia will give us uncontested control of our half of the Gibraltar strait."
 GRN_focus_Iberian_Idealism: "Iberian Idealism"
 GRN_focus_Iberian_Idealism_desc: "With the region under our total control we can now begin to foster a sense of region unity. Using the cultures and peoples, their history and their spirit to propel forth a sense of new pride. Unity through strength and prosperity, comraderie through good and bad."
 GRN_focus_Alpine_Block_Nations: "Alpine Block Nations"
 GRN_focus_Alpine_Block_Nations_desc: "The South central region is dominated by mountainous terrains. From the Alpine ranges of the northern most parts of Italy's borders to the various ranges going down the Italian nation itself. We must secure this naturally defensive region if we are to move further east."
 GRN_focus_Operation_Neutral_No_More: "Operation: Neutral No More"
 GRN_focus_Operation_Neutral_No_More_desc: "The nation of Switzerland is a nation of mountains. We conquer it and we can conquer just about anything."
 GRN_focus_Operation_Vienna_Calling: "Operation: Vienna Calling"
 GRN_focus_Operation_Vienna_Calling_desc: "From the alps to the hungarian plains, we will secure the nation of Austria and open the path into the east and south."
 GRN_focus_Operation_Slovene_And_Slide: "Operation: Slovene And Slide"
 GRN_focus_Operation_Slovene_And_Slide_desc: "Getting a foothold into the northern Balkans will help us secure the region once we turn our attention towards it."
 GRN_focus_Operation_Gelato: "Operation: Gelato"
 GRN_focus_Operation_Gelato_desc: "The Italian nation sits strategically in the south-centre of Europe and the Mediterranean Sea. We secure this and we secure a vital naval apparatus for further operations."
 GRN_focus_Securing_Local_Interests: "Securing Local Interests"
 GRN_focus_Securing_Local_Interests_desc: "Looking out for the interests of the local populations and their needs will help shine a new and more positive light on the situation. We hope by better reaching out to the people we can have a smoother transition of power."
 GRN_focus_Great_Eastern_Interests: "Great Eastern Interests"
 GRN_focus_Great_Eastern_Interests_desc: "With our foothold in the east secured we can now branch out to the rest of eastern Europe. From the Polish and Czech borderlands to the Belarusian and Ukrainian frontiers. We shall begin our march east."
 GRN_focus_Operation_Heartbeat: "Operation: Heartbeat"
 GRN_focus_Operation_Heartbeat_desc: "Poland is the beating heart of eastern Europe. It has been called the European Texas due to its heavy investment in military preparedness. Now we will put that to the ultimate test."
 GRN_focus_Operation_Carpathia: "Operation: Carpathia"
 GRN_focus_Operation_Carpathia_desc: "The majority of the Slovak nation sits upon the northern curve of the great Carpathian mountain range. If we are to have a general platform to head south into the Balkans then we must cross these mountains."
 GRN_focus_Operation_Final_Rhapsody: "Operation: Final Rhapsody"
 GRN_focus_Operation_Final_Rhapsody_desc: "Securing Czechia allows us to pretty much solidify the complete northern approach into the Balkans. It is but one more step to European unity."
 GRN_focus_Operation_White_Russian: "Operation: White Russian"
 GRN_focus_Operation_White_Russian_desc: "Belarus is the linchpin that holds Russian interest into Europe, aside from just old historical ambitions of course. We'll need to take the winds out of their sails if we're to truly solidify our control on the continent."
 GRN_focus_Operation_Bread_Basket: "Operation: Bread Basket"
 GRN_focus_Operation_Bread_Basket_desc: "Securing the bread basket of the continent would benefit us in many ways, this is a certainty that we must obtain."
 GRN_focus_Operation_Soviet_Storm: "Operation: Soviet Storm"
 GRN_focus_Operation_Soviet_Storm_desc: "Transnistria is a nation that in itself is a time capsule. Being one of the last bastions of the USSR this nation while small is extremely proud and defiant through its almost shadow like machinations which keep it somehow alive as a nation."
 GRN_focus_Operation_Your_Right_No_Your_Other_Right: "Operation: Your Right, No Your Other Right"
 GRN_focus_Operation_Your_Right_No_Your_Other_Right_desc: "We must attack Moldova..no not the Romanian region the nation. Yes I know its confusing but don't ask me, ask them when we get there."
 GRN_focus_Eastern_Territorial_Authority_Bureau: "Eastern Territorial Authority Bureau"
 GRN_focus_Eastern_Territorial_Authority_Bureau_desc: "The ETAB is a dedicated agency to contend with the more free spirited eastern nations. These folks have vast, rural lands that are more or less still untamed in terms of centralization. We can do infrastructure projects and community outreach programs to hopefully calm and quell any prolonged issues we may run into."
 GRN_focus_Balkan_Bounties: "Balkan Bounties"
 GRN_focus_Balkan_Bounties_desc: "The final nails in this extensive project of ours, the Bakan nations. A land of wars and history we will work extensively to tame this volatile zoo of a region."
 GRN_focus_Operation_Nosferatu: "Operation: Nosferatu"
 GRN_focus_Operation_Nosferatu_desc: "The Transylvanian bowl within the Carpathian Mountains is a strategic defensive position. Romainia itself is also host to a fair amount of energy production and as such we can better use those resources for the benefit of all."
 GRN_focus_Operation_Bulgar: "Operation: Bulgar"
 GRN_focus_Operation_Bulgar_desc: "The solidification of the eastern section along the Black Sea will help us to consolidate our efforts towards the interior of the Balkans."
 GRN_focus_Operation_Alexander_Not_So_Great: "Operation: Alexander Not So Great"
 GRN_focus_Operation_Alexander_Not_So_Great_desc: "The nation of Macedonia claims to have the proud historical figure of Alexander The Great. Well I don't see him now so we're just gonna take things over from here."
 GRN_focus_Operation_Trianon: "Operation: Trianon"
 GRN_focus_Operation_Trianon_desc: "The Hungarian nation straddles the north central plateau of the Balkans. If we secure this we have a clear path southwards towards the Mediterranean Sea."
 GRN_focus_Operation_Princip: "Operation: Princip"
 GRN_focus_Operation_Princip_desc: "From the Black Hand causing a world war we now give the Serbian nation a back hand to settle one of the biggest fire starters in the region."
 GRN_focus_Operation_Koso_Woah: "Operation: Koso Woah"
 GRN_focus_Operation_Koso_Woah_desc: "The speed bump that is Kosovo is more of a thorn in the side of Serbia then it will be to us. As such this should be a quick endeavor."
 GRN_focus_Operation_Scissors: "Operation: Scissors"
 GRN_focus_Operation_Scissors_desc: "Securing Croatia allows us to secure a significant coastal apparatus and secures flanking attack positions while we pursue more southern ambitions."
 GRN_focus_Operation_Minefield: "Operation: Minefield"
 GRN_focus_Operation_Minefield_desc: "Our biggest worry with subduing the very divided nation of Bosnia is the fact the entire country is practically a pre-laid minefield. As such we'll need to bring plenty of equipment to handle those if we are to genuinely get anywhere any time soon."
 GRN_focus_Operation_Mountain_Man: "Operation: Mountain Man"
 GRN_focus_Operation_Mountain_Man_desc: "The mountains of Montenegro are a tough cookie to crack, but we'll get there soon enough."
 GRN_focus_Operation_Adriatic_Gateway: "Operation: Adriatic Gateway"
 GRN_focus_Operation_Adriatic_Gateway_desc: "Securing Albania allows us to close off the Adriatic Sea. By doing this we secure a huge naval building potential and essentially secure a huge port network we could utilize for operations in teh Mediterranean Sea."
 GRN_focus_Operation_This_Is_Sparta: "Operation: This Is Sparta"
 GRN_focus_Operation_This_Is_Sparta_desc: "Greece, the peninsular and island nation which holds significant cultural and historical treasures. We will secure this hub of history itself but we must do our best to not destroy historical sites."
 GRN_focus_Southern_Territorial_Authority_Commission: "Southern Territorial Authority Commission"
 GRN_focus_Southern_Territorial_Authority_Commission_desc: "Creating a dedicated commission will allow us to focus integration and unity measures so we don't have a national problem because of a specific area's issues of not keeping their hands to themselves."
 GRN_focus_Establishing_The_Frozen_Federation: "Establishing The Frozen Federation"
 GRN_focus_Establishing_The_Frozen_Federation_desc: "We've finally done it. We have created a united federal nation which unites the frozen northern nations with the rest of the European Continental Union nations. Of course it is not perfect and thus not the whole of the geographically continental region of Europe. But regardless this is our stake in history and we will do our damnedest to hold true to the values and peoples we now hold under our wings. To The Federation!"
 GRN_focus_The_Great_Ice_Shelf: "The Great Ice Shelf"
 GRN_focus_The_Great_Ice_Shelf_desc: "The vast interior of our nation is but a massive sheet of ice. Well with how our nation's development has been coming along we've been able to chip away at the shelf in controlled utilization of the frozen water. Now we can direct our attention towards the interior with full gusto and prepare to settle and properly develop it. For the future is green and we shall discover the lands beneath the ice."
 GRN_focus_Southern_Interior_Development_Projects: "Southern Interior Development Projects"
 GRN_focus_Southern_Interior_Development_Projects_desc: "We'll begin to tackle the southern interior region we've marked for development and logistical setup."
 GRN_focus_Southern_Settlement_Projects: "Southern Settlement Projects"
 GRN_focus_Southern_Settlement_Projects_desc: "To help logistically we'll begin to establish a small series of strategically located settlements to boost not only the local population but to also create a sort of supply chain within the region. This will help us facilitate future projects that we'll endeavor to pursue to finally tame a good section of the Great Ice Shelf."
 GRN_focus_Southern_Infrastructure_Projects: "Southern Infrastructure Projects"
 GRN_focus_Southern_Infrastructure_Projects_desc: "To connect up our settlements and begin any kind of economic activity, we'll need to have some form of infrastructure to ensure we set the gold standard of how to truly tame nature."
 GRN_focus_Southern_Economic_Projects: "Southern Economic Projects"
 GRN_focus_Southern_Economic_Projects_desc: "With people and infrastructure now present within the Southern Interior region we can now begin to slowly build up an internal and or local economic base. This foundation will set the stage for considerable growth as time marches on."
 GRN_focus_Southern_Mining_Projects: "Southern Mining Projects"
 GRN_focus_Southern_Mining_Projects_desc: "With the region slowly stabilizing in economic and social affairs its now time to commence deep bore mining projects. We'll utilize the ice to be able to mine continually down so we can get real geological data as well as avoid equipment overheat due to the temperature differential."
 GRN_focus_Taming_The_Southern_Interior: "Taming The Southern Interior"
 GRN_focus_Taming_The_Southern_Interior_desc: "With the people, infrastructure and resources available we now can say that we have truly tamed part of the Great ice Shelf. Of course our work is not done, far from it. Be we can now confidently look upon the great northern horizon and say that we're on a grand and fruitful journey."
 GRN_focus_Central_Plateau_Development_Projects: "Central Plateau Development Projects"
 GRN_focus_Central_Plateau_Development_Projects_desc: "With the southern region tamed foundationally speaking we can now begin to take the great ice crusade into the central region. With more ice and potential land area we will be able to invest into more foundational metrics."
 GRN_focus_Central_Settlement_Projects: "Central Settlement Projects"
 GRN_focus_Central_Settlement_Projects_desc: "Just like in the southern region we'll begin setting up strategic settlements throughout the plateau."
 GRN_focus_Central_Infrastructure_Projects: "Central Infrastructure Projects"
 GRN_focus_Central_Infrastructure_Projects_desc: "With our settlements established we can begin to create a sufficient infrastructure network to properly link everything together."
 GRN_focus_Central_Economic_Projects: "Central Economic Projects"
 GRN_focus_Central_Economic_Projects_desc: "Population, check. Infrastructure, check. Now we move forward to establish a local economic apparatus."
 GRN_focus_Central_Mining_Projects: "Central Mining Projects"
 GRN_focus_Central_Mining_Projects_desc: "Just like with the southern region we now have finally created the networking both economically and socially to prepare resource extraction operations. The area is a lot large than the south so here's to a fruitful venture."
 GRN_focus_Taming_The_Central_Plateau: "Taming The Central Plateau"
 GRN_focus_Taming_The_Central_Plateau_desc: "With the people, settlements, food, economy and resources all in place we can now officially and confidently say that we have tamed the Great Ice Shelf. Though there will be many difficulties as time marches on, but for now and the foreseeable future we can bask in the grand polar glory of our great and prosperous nation."
 GRN_eu_adjacent_nation: "An EU Adjacent Nation"
 GRN_eu_adjacent_nation_desc: "Greenland is in an interesting situation. Being the most removed from the European continent it is and will likely never be a EU member nation. However due to its status as a Danish Crown Colony it is given the same migration and travel status as any other EU member state. As such many Greenlanders use this as a way to seek better education opportunities due to the island's lack of general development."
 GRN_economic_pains: "Economic Pains"
 GRN_economic_pains_desc: "The population of Greenland has hovered around 50 thousand for decades and has been smaller still as the nation's harsh climate and logistics become the linchpin in development. In the new millennia the problem continues and the nation's leaders must look to do something to adapt and adjust the needs of the economy if it and the nation itself are to become more than just stagnate."
 GRN_idea_colonial_subsidy: "Colonial Subsidy"
 GRN_idea_colonial_subsidy_desc: "Our nation is extremely underdeveloped to a point we rely heavily on Danish subsidies for daily operations. If we are to even think about independence from the Danish crown then we must find a way to no longer require this subsidy as a means of our ability to merely survive."
 GRN_idea_narrow_gauge_nation: "Narrow Gauge Nation"
 GRN_idea_narrow_gauge_nation_desc: "The flexibility and cost effectiveness of narrow gauge track as well as equipment will allow us to spearhead development and connectivity of the nation at large. Plus it has the added safety benefit of being cheaper to make safer compared to conventional standard gauge track and equipment."
 GRN_idea_battle_for_independence: "Battle For Independence"
 GRN_idea_battle_for_independence_desc: "We've reached a point where our independence is assured. We'll begin massive pressure campaigns to ensure our independence will be secured within our lifetime."
 GRN_ideas_political_freedoms: "Political Freedoms"
 GRN_ideas_political_freedoms_desc: "With our nation free to choose what its people desire we feel no restrictions to one specific ideology."
 GRN_ideas_emerging_political_influences: "Emerging Political Influences"
 GRN_ideas_emerging_political_influences_desc: "With our nation now independent we can focus on showing a modern approach to our politics as we emerge into this brave new world."
 GRN_ideas_non_aligned_political_influences: "Non-Aligned Political Influences"
 GRN_ideas_non_aligned_political_influences_desc: "With our nation free to set the path we want, no geo-political side looks to truly benefit us and as such we'll look to focus on ourselves in a more neutral esque like manner."
 GRN_ideas_nationalist_political_influences: "Nationalist Political Influences"
 GRN_ideas_nationalist_political_influences_desc: "Our nation is free, our people are united, our nation is the top priority for our focus on the future. Greenlandic Nationalism Gives Us Peace Of Mind."
 GRN_idea_alumina_research_institute: "Alumina Research Institute"
 GRN_idea_alumina_research_institute_desc: "The creation of the ARI is fundamental to understanding resource extraction, refinement and efficient utilization. This dedicated R&D complex will propel our nation to new heights in terms of foreign trade negotiations as well as more practical means of autarkic policies."
 GRN_idea_economic_development_visas: "Economic Development Visas"
 GRN_idea_economic_development_visas_desc: "Those looking to move and settle in the nation can apply for a class 1 visas which is known as an Economic Development Visa. The EDV is essentially an onboarding process to help new citizens settle in and find employment wherein they can contribute to the development and overall growth of the nation."
 GRN_idea_sanctioned_immigration_efforts: "Sanctioned Immigration Efforts"
 GRN_idea_sanctioned_immigration_efforts_desc: "Through dedicated efforts we'll attempt to ensure a steady population growth through immigration."
 GRN_idea_strategic_mineral_leasing: "Strategic Mineral Leasing"
 GRN_idea_strategic_mineral_leasing_desc: "The declaration of mineral leasing to foreign companies is a very sharp sword to be handling. We must regulate specifically what they can mine, where they can mine and where those minerals will go. As such we can hope to limit any of the more excessive forms of foreign meddling within our political structure where possible while also using them to develop our bargaining chips."
 GRN_idea_contracting_a_workforce: "Contracting A Workforce"
 GRN_idea_contracting_a_workforce_desc: "Using the customs and border security apparatus to help secure a contracted labor force allows us to expand businesses and industries at a steady and more reliable pace. Afterall they did read the contract and sign it."
 GRN_idea_agriculture_automations: "Agriculture Automations"
 GRN_idea_agriculture_automations_desc: "Our chief problem our nation faces is simply keeping a stable workforce to actually employ. As such we've decided that we'll heavily invest in the Agriculture Sector to greatly reduce the need for additional human resources in the sector."
 GRN_idea_war_production_automations: "War Production Automations"
 GRN_idea_war_production_automations_desc: "Our chief problem our nation faces is simply keeping a stable workforce to actually employ. As such we've decided that we'll heavily invest in the War Production Sector to greatly reduce the need for additional human resources in the sector. Freeing up both workers and potential manpower for the military if need be."
 GRN_idea_industrial_automations: "Industrial Automations"
 GRN_idea_industrial_automations_desc: "Our chief problem our nation faces is simply keeping a stable workforce to actually employ. As such we've decided that we'll heavily invest in the Manufacturing Sector to greatly reduce the need for additional human resources in the sector. This ever expanding sector usually requires the most workers due to scaling means and so this should actually prove most beneficial to us."
 GRN_idea_corporate_automations: "Corporate Automations"
 GRN_idea_corporate_automations_desc: "Our chief problem our nation faces is simply keeping a stable workforce to actually employ. As such we've decided that we'll heavily invest in the Office Services & Technology Sectors to greatly reduce the need for additional human resources in the sector. This pretty heavily human resources sector usually requires the most workers due to the raw demands of the sector and so this could actually prove most beneficial to us."
 GRN_idea_strategic_mining_automations: "Strategic Mining Automations"
 GRN_idea_strategic_mining_automations_desc: "By reworking how we mine for resources and focusing on the ability to send less folks into the mines where possible we can maximize mining efforts without the looming risk of potential loss of life. Of course its not going to be perfect, but these autonomous vehicles and certain equipment pieces should allow for way better opportunities to present themselves."
 GRN_idea_pro_military_economic_organization: "Pro-Military Economic Organization"
 GRN_idea_pro_military_economic_organization_desc: "By reorientating the economy around more civilian and enlistment requirements we'll improve manufacturing capabilities of our arms production plants to reduce the overall manpower needed to operate the facilities. Of course doing such a drastic overhaul will cripple the raw production abilities, but once operations are stabilized and online these facilities should be able to produce more with way less."
 GRN_idea_frozen_warfare_training: "Frozen Warfare Training"
 GRN_idea_frozen_warfare_training_desc: "Our training programs will focus majorily on winter and cold climate combat. Of course we'll try to do different trainings when and where possible but our home is cold and thus we must train properly to defend it."
 GRN_idea_polar_logistics_doctrine: "Polar Logistics Doctrine"
 GRN_idea_polar_logistics_doctrine_desc: "Fundamentally building our equipment to be better used in extreme cold allows us to better fight how we want to if an enemy force decides to make landfall on our island."
 GRN_idea_artillery_specialist_corps: "Artillery Specialist Corps"
 GRN_idea_artillery_specialist_corps_desc: "Artillery is the bread and butter for dealing more damage than receiving if you're in a good position. To keep this to our advantage we'll need to develop and grow our artillery corps to a standard which makes our casualties as limited as possible."
 GRN_idea_heavy_anti_air_investments: "Heavy Anti-Air Investments"
 GRN_idea_heavy_anti_air_investments_desc: "In the modern age of combat the new queen of the battlefield is the aircraft. Fighters, bombers whatever you may need done they'll do it. Well since our military is so small we need to find a way to make the enemy not be able to do what they want. As such we'll begin a heavy investment in anti-air equipment designing and developments to ensure our soldiers on the ground will have a real fighting chance."
 GRN_idea_army_officer_corps: "Army Officer Corps"
 GRN_idea_army_officer_corps_desc: "The establishment and standardization of an army officer training corps allows us to mold, refine and improve our tactical and strategic leaders to better not only their own understanding but to better the troops for which they lead."
 GRN_idea_small_ship_developments: "Small Ship Developments"
 GRN_idea_small_ship_developments_desc: "Early developments are proving fruitful, our early corvette designs are showing us that while we can refine and improve, this strategic gain only means anything if we can get the people to properly crew the vessels."
 GRN_idea_expanding_small_vessel_designs: "Expanding Small Vessel Designs"
 GRN_idea_expanding_small_vessel_designs_desc: "Ensuring our corvette department is complimented by similar innovations, we'll focus on frigate and destroyer types to fully flush out our small vessel fleets."
 GRN_idea_attack_submarine_programs: "Attack Submarine Programs"
 GRN_idea_attack_submarine_programs_desc: "The ASP is a series of development and testing programs designed in proving the limits and new technologies most effective means of use."
 GRN_idea_missile_submarine_programs: "Missile Submarine Programs"
 GRN_idea_missile_submarine_programs_desc: "The MSP is a series of development and testing programs designed in proving the most effective way to use missile tech in naval combat."
 GRN_idea_navy_officer_corps: "Navy Officer Corps"
 GRN_idea_navy_officer_corps_desc: "Establishing the Naval Officer Training Corps will allow us to improve the standards of excellence in combat and leadership for our naval service branch."
 GRN_idea_aviation_innovations: "Aviation Innovations"
 GRN_idea_aviation_innovations_desc: "Early results are beginning to bear fruit as the TARI facility has begun to roll out their innovations into the general design and production models for testing and refinement. These could prove useful as we continue to reform and perfect our Air Supremacy Action Plan."
 GRN_idea_air_dominance_program: "Air Dominance Program"
 GRN_idea_air_dominance_program_desc: "The ADP is dedicated to the specific fighter class of aircraft and how to better their overall combat abilities to preserve our skies from enemy harassment."
 GRN_idea_bombing_innovations: "Bombing Innovations"
 GRN_idea_bombing_innovations_desc: "Innovations in air to ground as well as air to ship combat abilities has allowed us to specialize our general bombing efforts to be more effective then ever before. We must continue to capitalize these efforts if we are to prevent any real landfall of enemy forces onto our island."
 GRN_idea_bomber_design_department: "Bomber Design Department"
 GRN_idea_bomber_design_department_desc: "Dedicated to improving and growing the effectiveness of our bombing air fleets, the BDD is the pinnacle of air innovation for our nation."
 GRN_idea_air_officer_corps: "Air Officer Corps"
 GRN_idea_air_officer_corps_desc: "Developing the air force officer corps allows us to improve general effectiveness and innovate in leadership and applied tactics towards the air combat operations."
 GRN_idea_general_staff_corps: "General Staff Corps"
 GRN_idea_general_staff_corps_desc: "With our military finally developed to a point where a unified command staff is need between the branches, our nation has made and will continue to make great strides in our national defense."
 GRN_idea_agricultural_futurist_policies: "Agricultural Futurist Policies"
 GRN_idea_agricultural_futurist_policies_desc: "Prioritizing research efforts as well as economic investments within the greater agricultural sector allows us to stay on top of innovations and continue to properly scale the demands we'll need if we focus on more than just domestic needs."
 GRN_idea_polar_infrastructure_developments: "Polar Infrastructure Developments"
 GRN_idea_polar_infrastructure_developments_desc: "Our continual investments into building our infrastructure as well as investing in ways to making said investments more longer lasting has allowed us to innovate in areas many would not even think about."
 GRN_idea_economic_modernity_policies: "Economic Modernity Policies"
 GRN_idea_economic_modernity_policies_desc: "Our nation is at the forefront of development. We will assuredly continue this grand march to prosperity for the nation and our citizens."
 GRN_ideas_mining_needs: "Mining Needs"
 GRN_ideas_mining_needs_desc: "We've decided on focusing the mining sector around national needs rather than anything really beyond that. This has allowed us to strategically bargain our export prices while also slimming down the demands the sector would have in terms of human resources."
 GRN_ideas_mining_greeds: "Mining Greeds"
 GRN_ideas_mining_greeds_desc: "We've decided on focusing the mining sector around national and internation needs rather than simply what's needed in the moment. As a result we have been able to greatly flaunt our resources and negotiate some real deals in terms of our export efforts. Though a small problem of increased worker demands seems to have permeated the economic sector, the overall benefit seems to justify the means to an end."
 GRN_ideas_intense_foreign_affairs_budgeting: "Intense Foreign Affairs Budgeting"
 GRN_ideas_intense_foreign_affairs_budgeting_desc: "If we are to seriously gain any traction towards diplomatic dealings abroad then we have to seriously focus on these endeavors. With our current strength and such we lack the interior stability due to our population concerns compared to our economy. So we're essentially a hard shell with an empty interior if we don't play our cards right."
 GRN_ideas_political_shenanigans: "Political Shenanigans"
 GRN_ideas_political_shenanigans_desc: "Some recent light has been shown on disgruntled efforts within our nation. They don't seem to be more than an annoyance given the healthy state we are in, but we'll need to figure out who's doing this crap if we want to return to a more calmer state."
 GRN_ideas_domesticating_foreign_policy: "Domesticating Foreign Policy"
 GRN_ideas_domesticating_foreign_policy_desc: "Securing our foreign ambitions means we need to secure the domestic front as well as securing the means to leverage our foreign influence abilities."
 GRN_ideas_the_frozen_federation: "The Frozen Federation"
 GRN_ideas_the_frozen_federation_desc: "Well we've united the continent to the best of our abilities. Now the only thing is we've also united all the problems under one banner. While not the end of the world, it's certainly going to be rough riding for the foreseeable future."
 GRN_domestic_and_civil_affairs_administration: "The Domestic & Civil Affairs Administration"
 GRN_domestic_and_civil_affairs_administration_desc: "Greenland has a number of issues and the core of that stems from its low population count. The domestic & civil affairs administration is tasked with looking out for the citizens of Greenland and reforming, adding or removing policies over time to ensure the best and most fair outcome possible for the citizens of the island."
 GRN_federal_budgets: "National Expenditures"
 GRN_federal_budgets_desc: "The island doesn't have a lot of people but still requires significant spending to upkeep and properly develop things. We'll need to look into better development methods or general budgeting if we are to have a stable fiscal future."
 GRN_revenue_collection_administration: "Revenue Collection Administration"
 GRN_revenue_collection_administration_desc: "The RCA is designated as the tax collection and enforcement agency of the national government. It must work with governmental policy makers to ensure taxes are being levied fairly, efficiently and are being enforced properly to ensure a balanced national budget."
 GRN_economic_development_board: "Economic Development Board"
 GRN_economic_development_board_desc: "The EDB is the backbone of economic policy making and general national growth and development. This part of the government sets out to take policies and programs and try to build up the nation's economy as well as uplift the citizens quality of life where all possible. While the logistics is the biggest hurdle in this regard, the other is simply manpower and capital as well as shear willpower to just do it."
 GRN_national_armed_services_of_greenland: "National Armed Services Of Greenland"
 GRN_national_armed_services_of_greenland_desc: "The Armed Services of Greenland is an interesting institution as the island's population is so small that there isn't a whole lot it can do. However despite this the island does have some kind of military force and does theoretically have the ability to expand it. Now its just up to the future of events to tell just how this expansion may transpire."
 GRN_idea_the_great_ice_shelf: "The Great Ice Shelf"
 GRN_idea_the_great_ice_shelf_desc: "The Greenland Ice Shelf is one of the worlds largest pieces of ice to cover a significant amount of landmass. The ice shelf can be up to two miles deep and is the biggest obstruction to any earnest development outside of the coastal areas."
