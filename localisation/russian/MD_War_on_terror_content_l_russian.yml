l_russian:
 TT_OEF_INCREASED_CHANCE_OF_DETECTING_TERRORISTS: "§GGain §Y15§! intelligence on §YAl-Qaeda§!, and raise the chance of disrupting a major plot from §Y5%§! to §Y15%§!. The better our intelligence on them grows, the better those odds get.§!\n"
 TT_OEF_RAISE_POPULARITIES: "Повысьте популярность §Hправящей коалиции§! на 10%, а популярность главной §Hоппозиционной партии§! — на 5%"
 TT_OEF_LOWER_POPULARITIES: "Снизить популярность §Hправящей коалиции§! на 5% и популярность главной §Hоппозиционной партии§! на 10%"
 TT_OEF_WAR_ON_TERROR_SPEECH_HELD: "The War on Terror speech has been held"
 USA_enduring_freedom: "Операция «Несокрушимая свобода»"
 USA_iraqi_freedom: "Операция «Иракская свобода»"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_KARZAI: "Установить прозападное правительство во главе с популярным кандидатом. §RЭто расстроит более консервативное население!§!\n"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_RABBANI: "Установить неприсоединившееся правительство во главе с консервативным кандидатом.\n"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_MASSOUD: "Установить неприсоединившееся правительство во главе с героем войны. §GЭто принесет стабильность в Афганистан!§!\n"
 TT_AFGHANISTAN_NEW_ADMINISTRATION_ZAHIR_SHAH: "Восстановить Королевство Афганистан. §RЭто сильно разозлит более консервативное население и повредит нашим отношениям с Пакистаном.!§!\n"
 war_on_terror_category: "ОНС и война с террором"
 war_on_terror_category_desc: "Operation Enduring Freedom (OEF) is the official name used by the U.S. government for the Global War on Terrorism. This strategy targets terrorist organizations in foreign countries, and allows the US to strike terrorists and their supporters with impunity"
 KUR_war_on_terror_category: "Операция \"Иракская свобода\""
 KUR_war_on_terror_category_desc: "Соединенные Штаты начали операцию «Иракская свобода», вторжение в Ирак. Для нас это шанс нанести удар по Саддаму Хусейну и еще больше дистанцироваться от иракского ига."
 usa_increase_intelligence_spending: "Увеличение расходов на разведку"
 usa_increase_intelligence_spending_desc: "Поступают разрозненные сообщения о надвигающейся серьёзной террористической угрозе. В настоящее время у нас нет инструментов для её должного противодействия. Нам необходимо увеличить финансирование разведки и расширить полномочия FBI и CIA по наблюдению. Это будет дорого с политической точки зрения, но безопасность нашей страны находится под угрозой."
 usa_demand_extradition_of_bin_laden: "Требовать экстрадиции Усамы бен Ладена"
 usa_demand_extradition_of_bin_laden_desc: "According to our intel, Osama bin Laden was the main force behind the recent terrorist attack. As far as we know, he is currently residing in Afghanistan, under the protection of the Taliban. We should contact the Taliban, and demand that they cut their ties with Al-Qaeda and deliver bin Laden to us."
 usa_operation_enduring_freedom: "Выполнить операцию «Несокрушимая свобода»"
 usa_operation_enduring_freedom_desc: "Талибы отказались выдать нам бен Ладена, поэтому мы должны забрать его сами. Нам нужно подготовить операцию «Несокрушимая свобода», которая позволит нам отправить оборудование и ступить на землю Афганистана."
 usa_homeland_security_act: "Установить Национальную безопасность"
 usa_homeland_security_act_desc: "Администрация выдвинула идею создания нового министерства — «Министерства внутренней безопасности США» (United States Department of Homeland Security). Министерство внутренней безопасности должно поглотить 22 федеральных агентства и офисы, включая Федеральное агентство по управлению чрезвычайными ситуациями.\n\nРасположенное в комплексе на Небраска-авеню, Министерство внутренней безопасности будет отвечать за защиту Соединенных Штатов Америки и их союзников от иностранных подрывных угроз, главным образом от терроризма. В других странах эту задачу обычно возлагают на министерство внутренних дел, однако в Америке оно, очевидно, не справилось с этим."
 usa_setup_new_administration_in_afghanistan: "Создать новую администрацию в Афганистане"
 usa_setup_new_administration_in_afghanistan_desc: "Теперь, когда талибы побеждены, мы должны создать новую администрацию. Есть много кандидатов, кого мы можем назначить лидером Афганистана."
 usa_create_guantanamo_bay: "Создать центр заключения в Гуантанамо"
 usa_create_guantanamo_bay_desc: "Чтобы справиться с будущими подозреваемыми или доказанными террористами, правительству и спецслужбам Соединенных Штатов понадобится надлежащая и безопасная тюрьма, которая не подвергает риску американских гражданских лиц в случае тюремного восстания или бегства оттуда. В идеале такое место должно быть на острове, на котором также находится враждебное правительство, пристально наблюдающее за границей с нашей территорией, и, к счастью, такая договоренность точно существует на Кубе, где Соединенные Штаты арендуют (что больше не признается кубинским правительством) военно-морскую базу в заливе Гуантанамо с 1903 года, срок действия которой был неограниченно продлен в 1934 году.\n\nКроме того, другой плюс этого местоположения заключается в том, что залив Гуантанамо не является ни штатом, ни даже территорией США, а это означает, что закон и даже Конституция США не обязательно применяются там. Это даст ЦРУ несколько интересных вариантов действия..."
 usa_petition_invasion_of_iraq: "Take Iraqi Disarmament to the Security Council"
 usa_petition_invasion_of_iraq_desc: "We know that [IRQ.GetLeader] has weapons of mass destruction. We will put a resolution before the Security Council declaring Iraq in material breach of its disarmament obligations and warning of serious consequences.\n\nIt will not authorise an invasion. No such resolution would survive a vote, and our own lawyers know it. What it will buy us is standing, and if we are going into Baghdad regardless, it is better to go in with the Council behind us than in spite of it."
 usa_run_war_support_campaign_against_iraq: "Кампания в поддержку вторжения в Ирак"
 usa_run_war_support_campaign_against_iraq_desc: "ООН не одобрила наше вторжение в Ирак. Нам нужно провести кампанию в СМИ, чтобы американцы встали на нашу сторону, прежде чем мы приступим к вторжению."
 usa_operation_iraqi_freedom: "Операция «Иракская свобода»"
 usa_operation_iraqi_freedom_desc: "Операция «Иракская свобода» начала фазу предварительного планирования уже в сентябре 2002 года. Однако в действительности планирование стартовало лишь в ноябре этого же года, когда иракское правительство не сумело поддержать конец резолюции, отказавшись разоружить военных и остановить производство оружия массового уничтожения. Если они не будут подчиняться, то у нас не будет иного выбора, кроме как выполнить операцию «Иракская свобода»."
 KUR_join_invasion_of_iraq: "Присоединится к вторжению в Ирак"
 KUR_join_invasion_of_iraq_desc: "Шанс нанести удар по Ираку уже сейчас!"
 wot.2.t: "Крупная террористическая атака на восточном побережье"
 wot.2.da: "Мы получили сообщения о попытке террористической атаки на Восточном побережье. Рано утром сегодня несколько подозреваемых членов Аль-Каиды были арестованы в международном аэропорту Логан в Бостоне и в международном аэропорту Даллес в Вашингтоне. Несмотря на эти ранние предупреждения, пять террористов смогли пройти на рейс 93 в международном аэропорту Ньюарка в Нью-Йорке. Попытавшись захватить самолет, они встретили сопротивление пассажиров, что в итоге привело к крушению самолета в поле в поселке Стоуникурик, штат Пенсильвания. Экипаж из семи человек и 33 пассажира, а также пятеро захватчиков погибли при крушении.\n\nИсходя из текущей разведывательной информации, самолеты должны были быть направлены на несколько целей на Восточном побережье, включая Всемирный торговый центр, Пентагон и здание Капитолия.\n\nК счастью, наши разведывательные службы были на чеку, и нам удалось предотвратить ужасную трагедию."
 wot.2.db: "We have received reports of a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. The fourth plane, Flight 93, which was presumably headed towards the Capitol, crashed at 10:03 AM as the passengers tried to retake it from the hijackers.\n\nOur nation has to recover from a horrifying day. The political situation is completely different from what it was yesterday."
 wot.2.dc: "We have received reports of a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. On the fourth plane, Flight 93, the passengers tried to retake the plane from the hijackers but failed. The terrorists managed to keep the plane in the air and eventually crashed it into the side of the Capitol building at 10:23.\n\nOur nation has to recover from a horrifying day. The political situation is completely different from what it was yesterday."
 wot.2.a: "Мы будем чтить жертв рейса 93"
 wot.2.b: "О человечество!"
 wot.2.c: "О человечество!"
 wot.3.t: "Дипломатический ответ на атаки Всемирного торгового центра"
 wot.3.d: "США были преднамеренно и внезапно атакованы вражескими боевиками-террористами.\n\nПоскольку Соединенные Штаты готовятся к своему дипломатическому и военному ответу на нападения на Всемирный торговый центр и Пентагон, [Root.GetAdjective] министр иностранных дел все чаще настаивает на том, чтобы правительство выпустило твердое и решительное заявление по этому вопросу."
 wot.3.a: "Мы с Америкой! Несмотря ни на что!"
 wot.3.b: "Осудить атаки, но не давать обещаний"
 wot.3.c: "Вот что происходит, когда вмешиваешься в другие страны"
 wot.4.t: "Местный политик поддерживает правительство"
 wot.4.da: "Поскольку республиканская администрация изо всех сил пытается найти решительный ответ на недавний террористический акт, Демократическая партия до сих пор оставалась в стороне и более-менее наблюдала за ситуацией, выступая с осуждением нападавших, но не выдвинула определенных политических обещаний или требований.\n\nТеперь крупный член Демократической партии из пострадавшего штата Нью-Йорк занял центральное место в реакции на нападения: Хиллари Клинтон, сенатор от Нью-Йорка и бывшая первая леди Соединенных Штатов, заняла четкую позицию с речью: «Каждая нация должна быть либо с нами, либо против нас. Те, кто укрывает террористов или финансирует их, заплатят за это».\n\nДемократы по всей стране начали сплочение вокруг заявления Клинтон, сигнализируя не только о солидарности с их сенатором, но и с республиканской администрацией, чтобы использовать любые необходимые средства и найти правильный ответ на эту не только зверскую, но и принципиально антиамериканскую атаку."
 wot.4.db: "В то время как администрация демократов пытается найти решительный ответ на недавний террористический акт, Республиканская партия до сих пор стояла в стороне и более-менее наблюдала за ситуацией, выступая с осуждением нападавших, но не давала определенных политических обещаний или требований.\n\nТеперь крупный член Республиканской партии из пострадавшего штата Нью-Йорк занял центральное место в реакции на нападения: Руди Джулиани, мэр Нью-Йорка и предыдущий прокурор США, выступила с четкой речью: «Каждая нация должна быть либо с нами, либо против нас. Те, кто укрывает террористов или финансирует их, заплатят за это».\n\nРеспубликанцы по всей стране начали сплочение вокруг заявления Джулиани, сигнализируя не только о солидарности с их сенатором, но и с администрацией демократов, чтобы использовать любые необходимые средства и найти правильный ответ на эту не только зверскую, но и принципиально антиамериканскую атаку."
 wot.4.a: "Мы едины!"
 wot.4.b: "Они лишь пытаются извлечь выгоду из трагедии!"
 wot.5.t: "Национальная молитвенная служба"
 wot.5.d: "В Вашингтоне было предложено провести Национальную молитвенную службу для жертв терактов. Несколько бывших президентов Соединенных Штатов будут присутствовать наряду с действующим президентом и религиозными лидерами из нескольких конфессий, включая различные ветви христианства, ислама, индуизма, сикхизма и иудаизма.\n\n[USA.GetLeader] проведет центральную речь поминальной службы."
 wot.5.a: "Это важно!"
 wot.5.b: "Нам не нужно это, чтобы помнить жертв"
 wot.6.t: "Убийство Балбира Сингха Содхи"
 wot.6.d: "Как прямой результат террористических атак, исламофобские настроения и насилие в США резко возросли, но большинство нападений были совершены на расовой или религиозной почве: оскорбления, кражи или повреждения имущества. Но только не в отношении Балбира Сингха Содхи.\n\nРодившийся в Индии сикх был ошибочно идентифицирован как мусульманин (из-за ближневосточного цвета лица и его тюрбана) 42-летним Фрэнком Сильвой Роке на заправочной станции в Месе, Аризона. Впоследствии он был застрелен Роке из своего грузовика из пистолета .380 калибра. Роке скрылся с места происшествия и уже через 20 минут попытался убить другого человека, родившегося в Ливане.\nПосле неудачной попытки покушения Роке на время прекратил террор, укрывшись в своей бывшей резиденции, а затем напал на афганскую семью, стреляя в здание, но не причинив особого ущерба. Он будет арестован на следующий день и приговорен к смертной казни за убийство первой степени."
 wot.6.a: "Мы не сдадимся террористам! Неважно, какой у них цвет кожи!"
 wot.6.b: "Это было понятное недоразумение"
 wot.7.t: "Атака сибирской язвы"
 wot.7.d: "Атака сибирской язвы, также известная как Amerithrax из-за упомининия в деле, заведенном ФБР, началась вскоре после террористической атаки.\n\nПисьма, содержащие споры сибирской язвы, были разосланы нескольким лицам, включая репортеров и двух американских сенаторов. Считается, что инцидент биотерроризма связан с известной террористической атакой на восточном побережье (но продолжающееся расследование ФБР пока не нашло убедительных доказательств), и к настоящему моменту погибли 5 человек и еще 17 получили вред здоровью."
 wot.7.a: "Мы преодолеем все беды"
 wot.7.b: "Мы должны найти тех, кто это сделал!"
 wot.8.t: "Речь о войне с террором"
 wot.8.d: "[USA.GetLeader] выступил с речью перед совместным заседанием Конгресса США, объявив так называемую «Войну с терроризмом».\n\nПрезидент пообещал решительные и прямые меры против терроризма и, как известно, обратился со следующим заявлением ко всем странам мира: «Каждая нация, в каждом регионе, теперь должна сделать выбор. Либо вы с нами, либо вы с террористами»."
 wot.8.a: "Мы принесем справедливость"
 wot.8.b: "Это будет быстро"
 wot.9.t: "США настаивают на экстрадиции бен Ладена"
 wot.9.d: "After the terror attack on the East Coast, the US has contacted our officials and they are demanding that we sever all links to our allies Al-Qaeda and their leader Osama bin Laden. We also have to capture bin Laden and deliver him to the hands of the US. Based on the previous rhetoric, declining the request will surely turn the US into our enemy."
 wot.9.a: "Великий шайтан ничего не получит!"
 wot.9.b: "Возможно, сделка с шайтаном необходима..."
 wot.10.t: "Талибы отказывают в выдаче"
 wot.10.d: "Талибы отказались прекратить сотрудничество с Аль-Каидой и бен Ладеном. Похоже, что единственный способ привлечь преступников к суду - это свергнуть весь режим талибов."
 wot.10.a: "Это не было сюрпризом"
 wot.11.t: "Талибан согласился на экстрадицию"
 wot.11.d: "Удивительно, но талибы согласились выгнать Аль-Каиду из страны и выследить бен Ладена. Они сказали, что готовы сотрудничать с военными США, чтобы привлечь виновных в терактах к ответственности.\n\nМы уже направили группу спецназа для задержания бен Ладена в его последнем известном укрытии!"
 wot.11.a: "Это... странно"
 wot.12.t: "США просит помочь с талибами"
 wot.12.d: "Соединенные Штаты собираются изгнать талибов из Афганистана. Они попросили нашей поддержки в борьбе."
 wot.12.a: "Мы отправим военных!"
 wot.12.b: "Мы вооружим местных ополченцев!"
 wot.12.c: "Мы окажем моральную поддержку! Вперед, друзья!"
 wot.13.t: "Выбор кандидата"
 wot.13.da: "Нам нужно принять решение о том, кого мы должны рекомендовать в качестве правителя Афганистана. Вероятно, что нынешнее местное правительство Афганистана согласится с нашей рекомендацией. У нас есть четыре хороших кандидата на выбор.\n\nНаши варианты — Хамид Карзай, который присоединился к Северному альянсу после того, как его отец был убит Аль-Каидой, Бурхануддин Раббани, нынешний официальный президент Афганистана и лидер консервативной исламистской партии Джамиат Ахмад Шах Масуд, Лев Пайншира, или изгнанный король Афганистана Мохаммед Захир Шах."
 wot.13.db: "Нам нужно принять решение о том, кого мы должны рекомендовать как правителя Афганистана. Вполне вероятно, что нынешнее местное правительство Афганистана согласится с нашей рекомендацией. У нас есть три хороших кандидата на выбор.\n\nМы можем выбрать Хамида Карзая, который вступил в Северный альянс после того, как его отец был убит Аль-Каидой. Бурхануддина Раббани, нынешнего официального президента Афганистана и лидера консервативной исламистской партии Джамиат. Или изгнанного короля Афганистана Мохаммеда Захир Шаха."
 wot.13.a: "Хамид Карзай"
 wot.13.b: "Бурхануддин Раббани"
 wot.13.c: "Ахмад Шах Массуд"
 wot.13.d: "Мохаммед Захир Шах"
 wot.15.t: "The Security Council Has Ruled"
 wot.15.a: "Все равно подготовить вторжение"
 wot.15.b: "Я думаю, нам придется к ним прислушаться..."
 wot.17.t: "Присоединиться к вторжению в Ирак?"
 wot.17.d: "Соединенные Штаты планируют вторгнуться в Ирак, чтобы свергнуть правительство Саддама Хусейна. США просят нас присоединиться к их войне."
 wot.17.a: "Конечно, мы поможем нашим союзникам!"
 wot.17.b: "Это несправедливая война"
 wot.20.t: "Усама бен Ладен избежал поимки"
 wot.20.d: "Наша операция по захвату бен Ладена потерпела полный провал. К тому времени, когда наши силы прибыли в предполагаемое место его расположения, бен Ладен был уже далеко. Вероятно, симпатизирующие ему силы сообщили о нашей операции, дав ему достаточно времени, чтобы скрыться.\n\nПока у нас нет данных о том, куда именно он сбежал, но, скорее всего, он уже на пути из Афганистана."
 wot.20.a: "Мы поймаем его в следующий раз"
 wot.21.t: "Усама бен Ладен схвачен!"
 wot.21.d: "Нашим силам специального назначения удалось захватить Усаму бен Ладена в его убежище в Афганистане. С помощью местных информаторов из Талибана нам удалось точно определить его местонахождение, и он сдался без боя."
 wot.21.a: "Дамы и господа, мы поймали его!"
 wot.22.t: "Найдено убежище Усамы бен Ладена"
 wot.22.d: "Our intelligence services have located the new hideout of Osama bin Laden. We have identified a compound in [event_target:GLOBAL_bin_laden_hideout.GetNameDef]. From drone footage and based on local sources, this is definitely the location of bin Laden. We should inform [event_target:GLOBAL_bin_laden_hideout.GetAdjective] government right away and ask their permission to perform a special operations mission to take out bin Laden"
 wot.22.a: "Немедленно свяжитесь с принимающей стороной!"
 wot.22.b: "Кого заботит один террорист?"
 wot.23.t: "Соединенные Штаты обнаружили бен Ладена"
 wot.23.d: "Сегодня с нами связался секретарь Госдепа США и сообщил, что в нашей стране нашли убежище Усамы бен Ладена. Лидер Аль-Каиды несет ответственность за крупную террористическую атаку на США, проведенную несколько лет назад. Наши собственные спецслужбы смогли проверить некоторую информацию, предоставленную нам США. Вполне вероятно, что бен Ладен действительно находится в секретном месте в нашей стране.\n\nРазрешение США провести эту операцию будет большим ударом по мировому терроризму, но дозволять иностранным спецподразделениям действовать в нашей стране рискованно. Опять же, бен Ладен - один из самых разыскиваемых террористов в мире, и отказ США в доступе к нему, вероятно, не пойдет на пользу ни нам, ни Соединенным Штатам."
 wot.23.a: "Разрешить операцию"
 wot.23.b: "Мы не позволим США поставить под угрозу наш суверенитет!"
 wot.24.t: "[FROM.GetName] согласны на операцию"
 wot.24.d: "[FROM.GetName] дают разрешение нашим спецназовцам войти в их государство и провести рейд против укрытия бен Ладена. Мы должны получить результаты операции через несколько дней."
 wot.24.a: "Отлично"
 wot.25.t: "[FROM.GetName] Отвергают наше требование!"
 wot.25.d: "После многих попыток получения [FROM.GetName] разрешения на поиск бен Ладена на их территории, [FROM.GetLeader] ответил твердым отказом. Некоторые уже взывают к серьезному уроку для [FROM.GetName] за отвержение наших требований в войне против террора, однако мы можем оставить это незамеченным, хоть это и не популярно у нас в стране."
 wot.25.a: "Я думаю, мы должны уважать их независимость."
 wot.25.b: "Сколько они вообще продержаться без нашей помощи?"
 wotnews.1.t: "Крупная террористическая атака на восточном побережье США"
 wotnews.1.da: "Журналисты из Соединенных Штатов сообщили о попытке террористической атаки на Восточном побережье. Рано утром сегодня несколько подозреваемых членов Аль-Каиды были арестованы в международном аэропорту Логан в Бостоне и в международном аэропорту Даллес в Вашингтоне. Несмотря на эти ранние предупреждения, пять террористов смогли пройти на рейс 93 в международном аэропорту Ньюарка в Нью-Йорке. Попытавшись захватить самолет, они встретили сопротивление пассажиров, что в итоге привело к крушению самолета в поле в поселке Стоуникурик, штат Пенсильвания. Экипаж из семи человек и 33 пассажира, а также пять захватчиков погибли при крушении.\n\nИсходя из текущей разведывательной информации, самолеты должны были быть направлены на несколько целей на Восточном побережье, включая Всемирный торговый центр, Пентагон и здание Капитолия.\n\nК счастью, наши разведывательные службы были на чеку, и нам удалось предотвратить ужасную трагедию."
 wotnews.1.db: "News reporters from the United States have brought to our attention a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. The fourth plane, Flight 93, which was presumably headed towards the Capitol, crashed at 10:03 AM as the passengers tried to retake it from the hijackers."
 wotnews.1.dc: "News reporters from the United States have brought to our attention a major terrorist attack on the East Coast. The hijackers, most likely members of Al-Qaeda, used the commercial airliners American Airlines Flight 11, United Airlines Flight 175, American Airlines Flight 77 and United Airlines Flight 93 as flying bombs against the United States. \n\nEarly morning today, at 8:46 AM, Flight 11 hit the North Tower of the World Trade Center in New York City, shortly followed by Flight 175 hitting the South Tower at 9:03 AM. At 9:37 AM, Flight 77 hit the Pentagon in Washington D.C.. On the fourth plane, Flight 93, the passengers tried to retake the plane from the hijackers but failed. The terrorists managed to keep the plane in the air and eventually crashed it into the side of the Capitol building at 10:23.\n\nThis is a horrible day and only shows how far terrorists are willing to go to achieve their goals."
 wotnews.1.o1: "Мы не забудем этого"
 wotnews.1.o2: "В эти времена мы выстоим вместе"
 wotnews.1.o3: "О, человечество!"
 wotnews.1.o4: "Кафиры..."
 wotnews.2.t: "Митинг демократов и республиканцев"
 wotnews.2.d: "В ответ на террористические нападения Демократическая и Республиканская партии приняли решение похоронить топор войны двухпартийного политического конфликта.\n\nВ Нью-Йорке республиканцы под руководством Руди Джулиани и демократы под руководством Хиллари Клинтон уже успешно работают вместе, чтобы дать отпор катастрофе. Похоже, что две стороны будут работать вместе после этого кризиса. Только один раз."
 wotnews.2.a: "Америка объединяется против терроризма"
 wotnews.3.t: "Американская национальная молитвенная служба"
 wotnews.3.d: "Национальная молитвенная служба, проходившая в Вашингтонском национальном соборе, была попыткой дать Соединённым Штатам короткую передышку после постоянных волнений последних трёх дней.\n\nПрезидент [USA.GetLeader] произнёс главную речь на мероприятии, заявив: «Прошло всего три дня с этих событий, и американцы ещё не имеют дистанции истории. Но наша ответственность перед историей уже ясна: ответить на эти атаки и избавить мир от зла»."
 wotnews.3.a: "Нации нужно время, чтобы исцелиться"
 wotnews.4.t: "Убийство Балбира Сингха Содхи"
 wotnews.4.d: "После террористических атак в Соединенных Штатах резко возросло насилие против различных этнических и религиозных групп, включая арабских мусульман и людей, которые выглядят так же, как они.\n\nБалбир Сингх Содхи, сикх, родившийся в Индии и владелец автозаправочной станции в Аризоне, сегодня был жестоко заманен в засаду и убит без провокации со стороны Фрэнка Сильвы Роке, 42-летнего самопровозглашенного американского патриота, который затем продолжал попытки убить нескольких других людей ливанского или афганского происхождения."
 wotnews.4.a: "Насилие порождает насилие"
 wotnews.5.t: "Америка атакована сибирской язвой"
 wotnews.5.d: "ФБР обнародовало информацию о деле «Amerithrax», серии попыток убийства с использованием писем, зараженных спорами сибирской язвы, начавшихся вскоре после террористической атаки на восточном побережье.\n\nСреди получателей писем были лидер большинства в Сенате США Том Дэшл и сенатор Вермонта Патрик Лихи.\n\nПять человек погибли. ФБР еще не опубликовало информацию о каких-либо потенциальных подозреваемых."
 wotnews.5.a: "Террор продолжается..."
 wotnews.6.t: "«Война с террором»"
 wotnews.6.d: "Через две недели после террористических атак на восточном побережье, [USA.GetLeader] произнес то, что может оказаться самой определяющей речью начала 2000-х годов. Он говорил о внутренней и внешней политике, сделав заявление «за нас или против нас», воскликнув следующее: «У каждой нации в каждом регионе теперь есть выбор. Либо вы с нами, либо вы с террористами. С этого дня любая страна, которая продолжает укрывать или поддерживать терроризм, будет рассматриваться Соединенными Штатами как враждебный режим»."
 wotnews.6.a: "Грядет война?"
 wotnews.7.t: "[USA.GetLeader] объявляет о «Несокрушимой свободе»"
 wotnews.7.d: "Президент Соединённых Штатов [USA.GetLeader] уведомил Конгресс США о том, что завтра начнётся военное вторжение в Исламский Эмират Афганистан, находящийся под контролем Талибана.\n\nАмериканская военная операция будет носить название «Операция Несокрушимая свобода». Президент также объявил о намерении каким-то образом привлечь союзные страны к военным действиям.\n\nПравительство Афганистана уже выпустило декларацию протеста, но, поскольку ни одна крупная страна мира фактически не имеет дипломатических отношений с Афганистаном, это вряд ли окажет влияние."
 wotnews.7.a: "Грядет война!"
 wotnews.8.t: "Боннское соглашение"
 wotnews.8.d: "В попытке установить надлежащий послевоенный порядок в Афганистане без движения «Талибан», несколько национальных делегаций из западных стран встретились с 25 афганскими лидерами в городе Бонн, Германия.\n\n[AFG.GetLeader] был признан международным сообществом как законный президент Афганистана. Большинство стран мира уже начали устанавливать дипломатические отношения с Афганистаном."
 wotnews.8.a: "Сможет ли Афганистан наконец обрести мир?"
 wotnews.9.t: "Центр заключения Гуантанамо Бэй"
 wotnews.9.d: "В ответ на теракты 11 сентября правительство Соединенных Штатов искало место для размещения заключенных с высокой степенью риска, которые обвиняются в участии в террористической деятельности или в их активном планировании.\n\nТакой центр в настоящее время создан в контролируемой американцами части острова Куба на военно-морской базе в Гуантанамо. Кубинское правительство, которое не признает продолжающуюся аренду Америкой бухты Гуантанамо, уже выступило с протестом против продолжения американского военного присутствия на острове."
 wotnews.9.a: "Это наверняка будет совершенно законно и гуманно"
 wotnews.11.t: "Начинается война с Ираком"
 wotnews.11.d: "Президент [USA.GetLeader] выступил с прямым обращением вскоре после того, как взрывы потрясли столицу Ирака Багдад, ознаменовав начало операции «Иракская свобода». Кампания под руководством США направлена на свержение диктатора Ирака [IRQ.GetLeader] и ликвидацию его возможности хранить, разрабатывать и использовать запасы оружия массового поражения. Удар последовал всего через несколько дней после того, как президент Ирака [IRQ.GetLeader] проигнорировал 48-часовой срок для покидания страны. В ответ на военное вторжение радио Республики Ирак в Багдаде заявило: «Злые, враги Бога, Родины и человечества, совершили глупую агрессию против нашей Родины и народа». Тем временем источники в американских вооружённых силах сообщили, что в первых атаках были нацелены пять ключевых членов иракского режима, включая [IRQ.GetLeader]."
 wotnews.11.a: "Война с терроризмом продолжается"
 wotnews.12.t: "Саддам Хусейн захвачен"
 wotnews.12.d: "Сегодня силы США захватили бородатого и измученного Саддама Хусейна в подземном укрытии на ферме недалеко от его родного города Тикрит. Арест произошел спустя несколько месяцев после того, как американские войска вошли в иракскую столицу, и положил конец одной из самых интенсивных охот за людьми в истории. В телеобращении сегодня днем президент США [USA.GetLeader] заявил, что Саддам предстанет перед \"справедливостью, которую он отказал миллионам\". Он сказал, что арест бывшего иракского лидера \"означает конец пути для него и всех, кто запугивал и убивал от его имени\". Однако президент также предупредил, что это не означает конец насилию в Ираке."
 wotnews.12.a: "Дамы и господа, мы его взяли!"
 wotnews.13.t: "Саддам Хусейн приговорен к смертной казни"
 wotnews.13.d: "Saddam Hussein was executed at dawn today following his conviction by an Iraqi court for crimes against humanity. The sentence was carried out at a former military intelligence headquarters in a Shia district of Baghdad at 6:05am local time (3:05am GMT). In a prepared statement, [USA.GetLeader] cautioned that Saddam's execution would not stop the violence in Iraq, but said it was \"an important milestone on Iraq's course to becoming a democracy that can govern, sustain, and defend itself, and be an ally in the war on terror\". The office of the Iraqi Prime Minister, released a statement that said Saddam's execution was a \"strong lesson\" to ruthless leaders who commit crimes against their own people."
 wotnews.13.a: "Хорошо"
 wotnews.14.t: "США выводят войска из Ирака"
 wotnews.14.d: "The last convoy of U.S. soldiers pulled out of Iraq, ending nearly nine years of war that inflicted many casualties on both sides, and left a country grappling with political uncertainty. The final column of around 100 mostly U.S. military MRAP armoured vehicles carrying 500 U.S. troops trundled across the southern Iraq desert from their last base through the night and daybreak along an empty highway to the Kuwaiti border. For the United States, the military pullout is the fulfilment of a promise to bring troops home from a conflict, widely considered the most unpopular war since Vietnam and one that tainted America's standing worldwide. For Iraqis, though, the departure brings a sense of sovereignty tempered by nagging fears their country may slide once again into the kind of sectarian violence that killed many thousands of people at its peak in 2006-2007."
 wotnews.14.a: "Сможет ли Ирак наконец обрести мир?"
 wotnews.15.t: "США захватили Усаму бен Ладена"
 wotnews.15.d: "Сегодня [USA.GetAdjective] правительство объявило, что захватило Усаму бен Ладена в Афганистане. Бен Ладен был главным организатором террористической атаки в США. С помощью местных информаторов из Талибана американский спецназ совершил рейд на лагерь бен Ладена. Сообщается, что при встрече со спецназом он сдался без боя."
 wotnews.15.a: "Интересное событие"
 wotnews.16.t: "Усама бен Ладен убит"
 wotnews.16.d: "The United States has announced that they have conducted a counter terrorism operation in [event_target:GLOBAL_bin_laden_hideout.GetNameDef] and have killed Osama bin Laden, the leader of Al-Qaeda, in a secret compound. A group of Navy SEALS raided the location slightly after midnight local time, and reportedly shot the unarmed terrorist leader. His body was flown out of the country for identification to a nearby US carrier, while his dead bodyguards and the rest of his entourage was left for the local security forces to handle. Few hours later, he was buried in the sea in accordance with Islamic tradition.\n\nThe US sees this as a great victory over terrorism, and many extremist groups have already vowed revenge on the Americans."
 wotnews.16.a: "Интересно"
 war_on_terror_leader: "Кампания войны с терроризмом"
 MD_terror.20.t: "Расширение региональной террористической сети"
 MD_terror.20.d: "Разведывательные донесения указывают на то, что террористическая организация, действующая в нашем регионе, вышла за рамки своей первоначальной местной базы. Группа создала сети и ячейки по всему региону. Аналитики по вопросам безопасности предупреждают, что наша страна сейчас может оказаться в пределах досягаемости их оперативного планирования."
 MD_terror.20.a: "Это касается, но пока не является нашей непосредственной проблемой."
 MD_terror.20.b: "Увеличьте наше внутреннее контртеррористическое присутствие."
 MD_terror.21.t: "Террористическая организация достигает глобального охвата"
 MD_terror.21.d: "Разведывательные службы по всему миру пришли к выводу, что крупная террористическая организация достигла оперативного потенциала для проведения терактов в глобальном масштабе. Некогда представлявшая региональную угрозу, организация создала международную сеть ячеек, финансирования и логистики. Ни одна нация не может считать себя недосягаемой для их планирования."
 MD_terror.21.a: "Мы будем сохранять бдительность."
 MD_terror.21.b: "Немедленно усиливайте наши контртеррористические операции."
 USA_failed_to_win_in_iraq: "Ошибка в §Y[IRQ.GetNameWithFlag]§!\n"
 MD_terror.20.c: "Their cause is spreading. Praise be."
 MD_terror.21.c: "The Caliphate's reach now spans the globe."
 TT_REDUCE_RULING_COALITION_POPULARITY_20_PERCENT: "§RThe ruling party and all coalition members will lose 20% relative popularity!\n§!"
 TT_UNSC_NO_PENDING_SUBJECT_VOTE: "The §YSecurity Council§! is not already considering a resolution against them"
 USA_wot_attack_occurred: "Major Terrorist Attack has Happened"
 usa_seek_unsc_extradition_mandate: "Demand bin Laden's Surrender at the Security Council"
 usa_seek_unsc_extradition_mandate_desc: "Before a single soldier crosses into Afghanistan, we should make the Taliban answer to the whole Council and not merely to us.\n\nThe Security Council has demanded bin Laden's surrender before, and the Taliban have ignored it. A fresh resolution, backed by sanctions, will not by itself pry him loose. What it will do is strip the regime of the argument that this is an American quarrel, put every neighbour that shelters them on notice, and make refusal cost them something before we ever reach for the rifle.\n\nIf they still refuse, no one in this chamber will be able to say we did not try."
 wot.25.c: "Then we go in without them."
 wot.26.t: "Washington Offers Terms"
 wot.26.d: "The Americans have sent an intermediary rather than a division, and the terms he carries are these. We keep Afghanistan. We keep our government, our courts and our laws. In exchange the war with the Northern Alliance ends where it stands, and the Emirate lives out its days sanctioned, embargoed and watched, cut off from the markets of the world and answerable to a Security Council that will never once vote in our favour.\n\nThere are those in the shura who say this is surrender dressed as a treaty, that we did not drive out the Soviets to be handed a leash by Washington. There are others who point at the carrier groups in the Arabian Sea and ask what the alternative is.\n\nKabul must still agree. But if we refuse, there will be nothing for Kabul to agree to."
 wot.26.a: "Take the terms. A sanctioned Emirate is still an Emirate."
 wot.26.b: "We did not fight the Soviets to be leashed by Washington."
 wot.27.t: "A Peace We Did Not Ask For"
 wot.27.d: "An American envoy has arrived in the Panjshir with a piece of paper and a proposal, and it is not the one we have spent ten years fighting for.\n\nThe Taliban have accepted Washington's terms. They will hand over the men America wants and submit to sanctions, and in return they keep Kabul, Kandahar and every valley they hold today. The war simply stops. Our dead stay dead, our exile stays permanent, and the men who hanged Najibullah from a lamp post govern the country we were promised.\n\nThe Americans point out, not unkindly, that we are not winning. They are not wrong. But there is a difference between losing a war and signing our name to the loss."
 wot.27.a: "Sign it. We are not winning, and the country is bleeding."
 wot.27.b: "The men who did this do not get to keep Kandahar."
 wot.28.t: "The Settlement Collapses"
 wot.28.d: "The talks are dead. Whichever side walked away from the table, the result is the same on our desk: we have spent the money, spent the credibility, and bought nothing at all.\n\nThe war in Afghanistan goes on without us. The men who hosted bin Laden are still in Kabul, and the argument that diplomacy could have settled this has just been settled the other way, loudly, in public. The hawks are already drafting their statements.\n\nThere is one instrument left, and everybody in this room knows what it is."
 wot.28.a: "Then we do it the other way."
 wotnews.17.t: "Bin Laden Has Slipped Out of Afghanistan"
 wotnews.17.d: "As coalition aircraft pounded the Tora Bora caves, the man they came for was already gone. Intelligence services now believe Osama bin Laden crossed the border weeks ago and is being sheltered in [event_target:GLOBAL_bin_laden_hideout.GetNameDef], moving between safe houses under the protection of sympathisers.\n\nThe Afghan campaign may still be won. The manhunt, however, is only beginning, and it will have to be fought in a country the coalition is not at war with."
 wotnews.17.a: "He cannot hide forever."
 wotnews.19.t: "The Trail Goes Cold"
 wotnews.19.d: "The manhunt for Osama bin Laden has quietly stopped. There is no compound left to watch, no government left to lean on, and no informant left who will take American money. The last of the safe houses that sheltered him are gone, along with the states that tolerated them.\n\nIntelligence officials will say only that he is 'no longer assessed to be an active operational threat'. Pressed on whether he is alive, they decline to answer. Pressed on whether anyone is still looking, they decline to answer that too.\n\nSomewhere, the most wanted man in the world has simply stopped being findable."
 wotnews.19.a: "Some wars end without a body."
 wotnews.20.t: "The Raid Hits an Empty House"
 wotnews.20.d: "American helicopters crossed a sovereign border in the dark, without permission and without warning, and came back with nothing.\n\nThe compound was empty. Whether he was tipped off, whether the intelligence was wrong from the start, or whether he simply moved a week early, nobody in Washington is prepared to say. What is not in dispute is that a foreign special forces unit conducted an armed operation on the soil of a country the United States is not at war with, and killed several of that country's nationals in the process.\n\nThe Security Council convenes tomorrow. The administration has no result to show it."
 wotnews.20.a: "A debacle."
 USA_wot_extradition_accepted: "§YCooperation with Taliban§!"
 USA_unilateral_raid_threat: "Unilateral raid on foreign soil"
 TT_IRAQ_DISARMAMENT_UNSC_PETITION: "Put a disarmament resolution before the §YUN Security Council§!. If it passes, §YIraq§! is declared in material breach, giving us diplomatic cover to invade. If it fails, we go in alone."
 wot.15.da: "The resolution carried. Iraq stands declared in material breach of its disarmament obligations, and the Council has warned of serious consequences should [IRQ.GetLeader] fail to comply.\n\nWhat the resolution does not do is authorise us to invade. It was never going to, and pressing for a second resolution that says so plainly would only hand France a veto and the rest of the chamber an excuse. But we have the Council on record. If we go into Iraq now, we go in with the law arguable and our allies able to follow us."
 wot.15.db: "The resolution has failed. The Council would not put its name to so much as a finding of material breach, and there will be no second attempt.\n\nThat leaves us where we always suspected we would end up: certain that [IRQ.GetLeader] is a threat, and entirely alone in being willing to do something about it. We can still go into Iraq. We will simply be going without cover, and the bill for that will come due long after Baghdad falls."
 TT_IRAQ_INVASION_WITH_COVER: "We invade with the §YSecurity Council§! on record. §GLower international outrage, and our partners can follow us in.§!"
 TT_IRAQ_INVASION_WITHOUT_COVER: "We invade with §Rno diplomatic cover at all§!. §RHeavy international outrage, and the Security Council will not forgive it.§!"
 USA_iraq_invasion_threat: "Invasion of Iraq"
 usa_broker_afghan_settlement: "Broker an Afghan Settlement"
 usa_broker_afghan_settlement_desc: "They gave us bin Laden. They are still at war with the Northern Alliance, and that war is what made Afghanistan a place where men like him could disappear in the first place.\n\nWe can end it without a single American division. Recognise the Taliban as the government of a state we hold at arm's length, sanctioned and watched, and force a peace on the men in Panjshir who have been fighting them for a decade. It will satisfy nobody. Kabul will owe us, Kandahar will hate us, and the hawks at home will call it a surrender.\n\nIt will also be the first war in a generation that America ended instead of starting."
 TT_AFGHAN_SETTLEMENT_OFFERED: "Put terms to the §YTaliban§! and to §YKabul§!. §REither of them can walk away from the table.§!"
 TT_WOT_DIPLOMATIC_VICTORY: "§GWe got him without a war.§! The hawks will not forgive it."
 TT_WOT_INVADE_AFTER_COMPLIANCE: "§RThey gave him up and we are invading anyway.§! The Security Council will not forget it, and neither will our own people."
 TT_WOT_TORE_UP_OUR_OWN_TREATY: "§RWe wrote the peace, we made §YKabul§! sign it, and we are tearing it up ourselves.§! Afghanistan will never trust us again, and §Rour influence there collapses§!."
 USA_wot_unprovoked_invasion: "Invasion of a Complying Regime"
 USA_wot_broken_settlement: "Broke the Afghan Settlement"
 wotnews.18.t: "Peace in Afghanistan"
 wotnews.18.d: "The war that has consumed Afghanistan since the Soviets left ended today, not in Kabul or Kandahar but at a conference table, with American money on one side of it and a Taliban delegation on the other.\n\nThe Taliban keep the country. They keep it sanctioned, embargoed, and watched, with Washington's hand on Kabul's shoulder. Nobody has called it a victory. The men who fought the Panjshir valley for a decade are going home, and Osama bin Laden is in American custody.\n\nThere are those in Washington who wanted the 101st Airborne in Kandahar instead. They will be arguing about this for twenty years."
 wotnews.18.a: "The war is over."
 wot.0.t: "Bin Ladin Determined To Strike in US"
 wot.0.d: "The Presidential Daily Brief on the President's desk this morning runs to a page and a half. It carries no date, no city and no target. It says that Osama bin Laden has wanted to attack inside the United States since 1997, that his followers have been living here for years, and that the Bureau has seen what it calls patterns of suspicious activity consistent with preparations for hijackings.\n\nIt is one memo. There have been dozens like it, and the men who wrote it cannot tell us when, or where, or how. But they are sure of one thing: he is coming, and he intends to do it here.\n\nWe can put the intelligence community on a war footing over a page and a half of speculation, and answer for the cost if nothing happens. Or we can file it."
 wot.0.a: "Put the community on a war footing."
 wot.0.b: "It is one memo among hundreds."
 TT_WOT_PDB_ACT: "Gain §Y10§! intelligence on §YAl-Qaeda§!. Better intelligence raises the chance we disrupt whatever is coming."
 TT_BIN_LADEN_RAID_UNILATERAL: "Send them in without permission. §GA 75% chance the raid kills §YOsama bin Laden§!.§!\n§RA 25% chance the compound is empty: he relocates, the Security Council condemns us, and we answer for it at home.§!"
 TT_WOT_INTEL_COOPERATION: "§GThey keep talking to us. Gain §Y15§! intelligence on §YAl-Qaeda§!.§!"
 TT_WOT_INTEL_PRESSURE: "§GThe sanctuary gets loud. Gain §Y5§! intelligence on §YAl-Qaeda§!, and the network grows more exposed.§!"