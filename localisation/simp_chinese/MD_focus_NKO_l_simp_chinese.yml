 NKO_all_out_war: "全面战争"
 NKO_all_out_war_desc: "时机成熟！让南方傀儡和我们的人民军在战场上决一死战吧！"
 NKO_foment_insurrection: "煽动叛乱"
 NKO_foment_insurrection_desc: ""
 NKO_send_support: "提供支持"
 NKO_send_support_desc: "仅凭石头和燃烧瓶是无法取胜的，我们必须为南方游击队提供他们急需的部分装备。"
 NKO_assert_control: "夺取控制权"
 NKO_assert_control_desc: "将南方游击队的指挥权纳入我军总参谋部，以便我人民军和游击队能够更好地协同作战。"
 NKO_perpetual_war_footing: "请求中国保护"
 NKO_perpetual_war_footing_desc: "我们的军政府是干预的潜在目标。为确保生存，我们必须向中国让渡部分主权。这是必要的举措。"
 korea_north.1.t: "朝鲜要求我们从韩国撤军"
 korea_north.1.d: "朝鲜要求我们从韩国撤出美军并切断与韩国的关系，否则他们将在韩国统一时使用核武器。虽然朝鲜向来以恐吓为主，不打算真正实施其威胁，但这一次似乎是玩真的……"
 korea_north.1.a: "这要求太荒唐了！"
 korea_north.1.b: "我们还是暂避锋芒为好……"
 korea_north.2.t: "朝鲜加入世界贸易组织"
 korea_north.2.d: "经过朝鲜和世界贸易组织（WTO）现有成员的长期谈判，朝鲜加入WTO的申请终于获得批准。朝鲜必须向世贸组织成员，特别是美国、欧盟和中国表明，它正在采取重大措施，向竞争开放其经济。朝鲜的官方媒体将这一事件描述为“朝鲜改革和现代化程序中的一个历史性时刻”。"
 korea_north.2.a: "朝鲜继续向世界开放。"
 korea_north.3.t: "货币制度改革"
 korea_north.3.d: "朝鲜官方宣布进行全面的货币改革，对货币进行重估，每户限兑10万枚旧币。\n旧货币和新货币之间的汇率将是多少？"
 korea_north.3.a: "25旧币兑1新币"
 korea_north.3.b: "100旧币兑1新币"
 korea_north.4.t: "改革成功了"
 korea_north.4.d: "经过我们的努力，我们的货币改革终于成功了！"
 korea_north.4.a: "太棒了！"
 korea_north.5.t: "缓解冲突"
 korea_north.5.d: "最近我们的货币改革导致了一些混乱，人民疯狂兑换外币，咸镜北道甚至发生了一场骚乱。我们是否应该做出一些让步？"
 korea_north.5.a: "维持现状。"
 korea_north.5.b: "放宽货币兑换限制的数量。"
 korea_north.6.t: "改革失败了……"
 korea_north.6.d: "货币改革导致经济混乱，因为商品在国家定价之前无法出售，民众在争相兑换外币中陷入恐慌。\n货币改革后的一周内，朝鲜元兑美元汇率下跌了96%，大米价格在三天内从每公斤17朝鲜元上涨到50朝鲜元。货币改革被宣布彻底失败。"
 korea_north.6.a: "处决责任人！"
 kim_jong_il_death.1.t: "谁将是「王位」的继承人？"
 kim_jong_il_death.1.d: "金正日时日无多，他必须从两个儿子中挑选接班人。\n金正恩倾向于对国家政治和经济体制进行保守改革。金正男则倾向于推行社会主义市场经济改革，以及更为激进的政治体制改革。"
 kim_jong_il_death.1.a: "金正恩！"
 kim_jong_il_death.1.b: "金正男！"
 kim_jong_il_death.2.t: "金正日同志去世了！"
 kim_jong_il_death.2.d: "敬爱的伟大领袖、朝鲜民主主义人民共和国奠基者、共和国永远的总统金正日，在乘坐火车访问地方的途中，因急性心肌梗塞并发心源性休克，于2011年12月17日上午8时30分去世。"
 kim_jong_il_death.2.a: "悲伤的事情……"
 kim_jong_il_death.3.t: "金正恩的报告..."
 kim_jong_il_death.3.d: "金正恩走进父亲的办公室。房间里弥漫着浓浓的烟味，父亲似乎刚抽完一整支雪茄，心情很好。\n“父亲，张成泽同志背地里好像在私下出卖国家利益，我已经整理了一份报告。\"\n他将报告放在桌上，旁边放着一个装满烟头的烟灰缸和半杯没喝完的威士忌。\n金正日拿起来看了看，“卖古董这件事是我带张成泽和39室的人一起干的，国家实在没钱了，不得已而为之的事情……张成泽同志只是奉命行事。除此之外没什么大不了的，有些事情他之前跟我说过，我默许了。\n父亲起身，走到金正恩身边拍了拍他的肩膀，\"正恩，这些都是小事，找张成泽同志私下解决，不要老是把个人恩怨上升到政治高度。去吧，我会和成泽谈谈的。\""
 kim_jong_il_death.3.a: "“张成泽好像也没那么值得信赖……”"
 kim_jong_il_death.4.t: "金正男执掌朝鲜政权！"
 kim_jong_il_death.4.d: "今天上午，金正男正式就任朝鲜国务委员会委员长兼朝鲜劳动党总书记。据悉，其胞兄金正恩已逃往国外，躲藏在某处。"
 kim_jong_il_death.4.a: "这和我们有什么关系？"
 kim_jong_il_death.4.b: "出人意料"
 kim_jong_il_death.5.t: "金正恩执掌朝鲜政权！"
 kim_jong_il_death.5.d: "今天上午，金正恩已正式就任朝鲜国务委员会委员长、朝鲜劳动党总书记，据悉其胞兄金正男已移居海外。"
 kim_jong_il_death.5.a: "这和我们有什么关系？"
 kim_jong_il_death.5.b: "不出所料"
 kim_jong_il_death.6.t: "人民军在朝鲜发动突然政变！"
 kim_jong_il_death.6.d: "令人震惊的消息传来，今晨朝鲜人民军发动军事政变，新成立的军政府宣布将接管金正日逝世后留下的权力真空。新军政府声称，此次政变是“应朝鲜国家和民族的强烈要求”，旨在维护主体思想的纯洁性。"
 kim_jong_il_death.6.a: "这和我们有什么关系？"
 kim_jong_il_death.6.b: "令人惊讶的讯息，这是否代表金氏王朝的彻底消亡？"
 kim_jong_il_death.6.c: "噢天哪……"
 kim_jong_il_death.7.t: "张成泽的请求"
 kim_jong_il_death.7.d: "张成泽访华与[CHI.GetLeader]会面，希望中国介入，帮助金正男掌权。"
 kim_jong_il_death.7.a: "把这个信息告诉金正恩。"
 kim_jong_il_death.7.b: "什么也不做，金正恩跟我有什么关系?"
 NKO_united_front_department: "[Root.38th_parallel]"
 NKO_united_front_department_desc: "自第二次世界大战结束后，朝鲜一直是一个分裂的国家。意识形态上的两极分化和大国冲突使家庭分离，阻碍了朝鲜人民充分实现其潜力。在南方，虽然老一辈人仍然记得一个统一的朝鲜并渴望统一，但对一个统一半岛的认同正逐渐开始消失。\n\n§Y统一支持率§!，加上韩国人对我们的§Y看法§!和§Y新兴主义§!在韩国的支持度，决定了韩国人民在统一谈判中愿意让步的程度。它以每月0.1%的速度递减，并受到决议、国策与事件的影响。如果或当统一发生时，它将需要保持较高支持度，以确保国家团结在一起。"
 NKO_close_kaesong_industrial_park: "关闭开城工业园区"
 NKO_close_kaesong_industrial_park_desc: "非军事区对面的那些家伙不可信任。我们应该关闭开城工业园区，防止他们从中获利。"
 NKO_reopen_kaesong_industrial_park: "重新开放开城工业园区"
 NKO_reopen_kaesong_industrial_park_desc: "我们必须向同胞们表明，我们愿意追求更好的关系。为此，我们应该重新开放开城工业园区。"
 NKO_restart_peace_talks: "重启和平谈判"
 NKO_restart_peace_talks_desc: "南方拒绝了我们的和平提议，但这并不意味着我们不能再次尝试。然而，我们首先应该尽力防止重蹈上次谈判的覆辙。"
