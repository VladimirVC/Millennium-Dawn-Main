 bankruptcy.14.t: "빚을 무효화해버린 [FROM.GetNameDef]!"
 bankruptcy.14.d: "1년 전, [FROM.GetNameDef]는 빚을 갚을 수 없을 것이라 발표하며 채무 불이행 절차를 시작했습니다. 협상을 통해 그들은 불이행한 부채를 지불하거나 청산할 예정이었습니다. 그러나 해결책을 찾는 대신, 그들은 보상할 방법을 찾을 의도도 전혀 없이 기존의 빚을 그냥 말소해 버렸습니다. 우리 정부가 그들과 밀접하게 연관되어 있었기에, 이 일은 이제 그들의 채권자들이 우리를 쫓게 만들었습니다. 우리에게는 [FROM.GetName]이 졌던 돈의 최소한 일부를 보상하는 것 외에 다른 선택의 여지가 없었습니다. 이는 우리 경제에 좋지 않지만, 최소한 우리가 [FROM.GetName]에 대한 지렛대를 가지게 해 줍니다."
 bankruptcy.14.a: "아마 저 수뇌부에 피바람이 한번 불어야할 것 같군"
