 NKO_close_DMZ_desc: ""
 NKO_cease_propaganda_broadcasts_yo_jong: "プロパガンダ放送の停止"
 NKO_cease_propaganda_broadcasts_yo_jong_desc: ""
 NKO_common_trade_belt_of_korea: "朝鮮半島共同貿易地帯"
 NKO_common_trade_belt_of_korea_desc: ""
 NKO_conciliatory_rhetoric: "和解的レトリック"
 NKO_conciliatory_rhetoric_desc: ""
 NKO_offer_negotiations_yo_jong: "交渉提案"
 NKO_offer_negotiations_yo_jong_desc: ""
 NKO_propose_north_led_unification_yo_jong: "統一政府を提案"
 NKO_propose_north_led_unification_yo_jong_desc: "南の指導者たちが、権力から追放され、過去の行為について処罰されるかもしれない合意に同意する可能性は低い。北と南の統一政府こそが、朝鮮統一の大義を実現する最良の方法である。"
 NKO_propose_unity_government_yo_jong: "北主導の統一を提案"
 NKO_propose_unity_government_yo_jong_desc: "我々の公正な福祉制度からより強力な核兵器まで、北朝鮮のモデルが朝鮮半島の前進の道であることは明らかである。統一後の強力な未来に向けて朝鮮を導くものであるべきだと主張しなければならない。"
 NKO_pave_the_way_for_reunification_yo_jong: "統一への道を開く"
 NKO_pave_the_way_for_reunification_yo_jong_desc: "南北関係の正常化に向けて大きな一歩が踏み出された今、我々は統一の準備を始めることができる。"
