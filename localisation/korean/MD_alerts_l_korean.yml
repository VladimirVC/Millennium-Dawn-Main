l_korean:
 md_alert_tooltip: "[Get_md_alert_name]"
 md_alert_desc: "[Get_md_alert_description]\n\n£click_right §Y우클릭§!: 이 알림을 영구적으로 무시합니다.\n£key_shift + £click_left §YShift 좌클릭§!: 무시한 모든 알림을 복구합니다."
 md_negative_nuclear_fuel: "§R핵연료 부족§!"
 md_negative_expected_social_spending: "§R복지 지출 부족§!"
 md_negative_expected_healthcare_spending: "§R의료 지출 부족§!"
 md_negative_expected_administrative_spending: "§R행정 지출 부족§!"
 md_negative_expected_education_spending: "§R교육 예산 부족§!"
 md_negative_expected_police_spending: "§R치안 예산 부족§!"
 md_negative_expected_defense_spending: "§R국방 지출 부족§!"
 md_negative_eletricity: "§R에너지 적자§!"
 md_available_tech_slot_expansion: "§Y연구 슬롯 사용 가능§!"
 md_negative_nuclear_fuel_Desc: "원자로가 생산되는 양보다 더 많은 연료를 소비하고 있습니다. ‘건설’ 탭으로 이동하여 에너지를 관리하세요."
 md_negative_expected_social_spending_Desc: "현재의 복지 법안은 국민들의 기대에 미치지 못하고 있습니다. ‘정치’ 탭으로 이동하여 사회 복지 지출을 늘리세요."
 md_negative_expected_healthcare_spending_Desc: "현재의 의료 관련 법안은 국민들의 기대에 미치지 못하고 있습니다. ‘정치’ 탭으로 이동하여 의료 지출을 늘리세요."
 md_negative_expected_administrative_spending_Desc: "현재의 행정 관련 법안은 국민들의 기대에 미치지 못하고 있습니다. ‘정치’ 탭으로 이동하여 행정 지출을 늘리세요."
 md_negative_expected_education_spending_Desc: "현재의 교육 관련 법안은 국민들의 기대에 미치지 못하고 있습니다. ‘정치’ 탭으로 이동하여 교육 지출을 늘리세요."
 md_negative_expected_police_spending_Desc: "현재의 치안 관련 법안은 국민들의 기대에 미치지 못하고 있습니다. ‘정치’ 탭으로 이동하여 치안 지출을 늘리세요."
 md_negative_expected_defense_spending_Desc: "현재의 국방 관련 법안은 국민들의 기대에 미치지 못하고 있습니다. ‘정치’ 탭으로 이동하여 국방 지출을 늘리세요."
 md_negative_eletricity_Desc: "현재의 에너지 생산량은 총 수요를 충족하지 못하고 있습니다. ‘건설’ 탭으로 이동하여 발전소를 추가로 건설하거나 에너지 소비량을 조정하세요."
 md_available_tech_slot_expansion_Desc: "GDP 또는 1인당 GDP가 충분히 증가하여 새로운 연구 슬롯을 해제할 수 있게 되었습니다. ‘기술’ 탭을 열고 ‘연구 슬롯’ 버튼 £topbar_research 을 클릭하여 이를 확보하세요."
 md_idle_nuclear_reactors: "§R가동되지 않는 원자력 발전소§!"
 md_idle_nuclear_reactors_Desc: "원자로를 건설했지만, 현재 원자력 상태가 ‘비원자력 국가’로 설정되어 있어 원자로가 가동되지 않고 있습니다. ‘정치’ 탭에서 원자력 에너지(또는 그 이상의 상태)로 전환하면 원자력 에너지 생산을 시작할 수 있습니다."