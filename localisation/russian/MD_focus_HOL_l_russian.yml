 landmark_binnenhof: "Бинненхоф"
 landmark_binnenhof_desc: "Бинненхоф — исторический центр голландского управления, который на протяжении веков служит символом демократии и лидерства. Будучи сердцем политической жизни Нидерландов, он продолжает формировать будущее страны, сохраняя её богатое наследие."
