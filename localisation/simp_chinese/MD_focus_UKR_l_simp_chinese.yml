 UKR_hur_expanded_desc: "我们将扩大情报总局的权力，形势需要这样做，战争需要这样做！"
 UKR_tro_expanded: "巩固国土防御"
 UKR_tro_expanded_desc: "紧急扩大国土防御招募，急需战士！"
 UKR_tck: "大规模动员"
 UKR_tck_desc: "我们必须开始大规模动员，因为这实际上是一场关乎我们国家生存的战争。"
 UKR_other_battaions_hur: "新的情报总局营"
 UKR_other_battaions_hur_desc: "情报总局正在积极招募战士加入其部队，其中一些人已经准备好参加战斗。"
 UKR_free_russia_legion: "俄罗斯自由军团"
 UKR_free_russia_legion_desc: "真正的俄罗斯爱国者准备为我们而战，推翻笼罩在俄罗斯的暴政。"
 UKR_rdk: "俄罗斯志愿部队"
 UKR_rdk_desc: "不认同俄罗斯政策的俄罗斯民族主义者在我们的指挥下自发组织起来，组成了俄罗斯志愿军。"
 UKR_republican_army: "民族共和军"
 UKR_republican_army_desc: "来自俄罗斯的逃亡代表组建了一支国家共和军，将对政权进行积极的游击活动。"
 UKR_separatist_battalions: "吸引分离主义营"
 UKR_separatist_battalions_desc: "不仅俄罗斯人，而且其他国家也准备为摆脱俄罗斯帝国主义而斗争。"
 UKR_drone_army: "无人机部队"
 UKR_drone_army_desc: "我们将开始大规模生产无人机。国家需要数千架无人机"
 UKR_tck_mobka: "总动员"
 UKR_tck_mobka_desc: "我们被迫进行几波动员来补充我们的武装力量。"
 UKR_attack_guardia: "进攻卫队"
 UKR_attack_guardia_desc: "我们已准备好转守为攻！防守进攻，击败敌人！"
 UKR_inter_legion_idea: "国际军团"
 UKR_inter_legion_idea_desc: "来自世界各地的许多外国人都愿意支持我们争取独立的斗争。"
 UKR_air_superior_idea: "空中优势战术"
 UKR_air_superior_idea_desc: "我们努力夺取空中优势"
 UKR_hur_other_battalions_created_tt: "§Y情报总局营§!即将创建"
