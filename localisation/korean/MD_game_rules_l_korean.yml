 GEO_help_CHE_behavior: "@GEO 체첸 지원"
 GEO_2008_war_behavior: "@GEO 2008년 전쟁 행동"
 GEO_2013_behavior: "@GEO 2013년 행동"
 GEO_SAAKASHVILI: "친서방 (미하일 사카슈빌리)"
 GEO_SAAKASHVILI_DESC: "에두아르드 셰바르드나제가 재선에 성공하지만, 장미 혁명이 일어나 미하일 사카슈빌리가 집권하게 됩니다."
 GEO_PRO_WEST_SHEVA: "친서방 (에두아르드 셰바르드나제)"
 GEO_PRO_WEST_SHEVA_DESC: "에두아르드 셰바르드나제가 재선에 성공하고 장미 혁명 없이 친서방 노선을 따를 것입니다."
 GEO_PRO_RUS: "친러시아 행동"
 GEO_PRO_RUS_DESC: "에두아르드 셰바르드나제가 친러시아 노선을 따를 것입니다."
 GEO_NATIONALIST: "민족주의 행동"
 GEO_NATIONALIST_DESC: "조지아는 민족주의 노선을 따를 것입니다. 서방이든 동구권이든 전혀 신경 쓰지 않을 것입니다. 그들은 마침내 대조지아를 선포할 것입니다."
 GEO_COMMUNISM: "공산주의 행동"
 GEO_COMMUNISM_DESC: "조지아는 공산주의 노선을 따를 것입니다. 소비에트 공화국을 복원할 것이며, 게임 규칙의 공산주의 행동 설정에 따라 자캅카스 사회주의 연방 소비에트 공화국(ZSFSR)을 수용하거나 독자적인 노선을 따를 것입니다."
 GEO_WILL_FOLLOW_OWN_WAY: "독자적 노선"
 GEO_WILL_FOLLOW_OWN_WAY_DESC: "민족주의 조지아는 독자적인 노선을 따르며 아르메니아와 아제르바이잔을 분쇄할 것입니다."
 GEO_WILL_BE_PRO_ARMENIA: "친아르메니아"
 GEO_WILL_BE_PRO_ARMENIA_DESC: "민족주의 조지아는 아르메니아가 아제르바이잔을 분쇄하도록 도울 것입니다."
 GEO_WILL_BE_PRO_AZERI: "친아제르바이잔"
 GEO_WILL_BE_PRO_AZERI_DESC: "민족주의 조지아는 아제르바이잔이 아르메니아를 분쇄하도록 도울 것입니다."
 GEO_WILL_HELP: "@CHE 체첸을 지원함"
 GEO_WILL_HELP_DESC: "조지아는 러시아와의 전쟁에서 체첸을 도울 것입니다. 체첸은 미래에 조지아를 도울 수 있습니다."
 GEO_WONT_HELP: "@CHE 체첸을 지원하지 않음"
 GEO_WONT_HELP_DESC: "조지아는 러시아와의 전쟁에서 체첸을 돕지 않을 것입니다. 체첸은 조지아에 적대적으로 대할 것입니다."
 GEO_ATTACK_RUS: "전쟁 준비"
 GEO_ATTACK_RUS_DESC: "조지아는 2008년 전쟁을 준비할 것이며 전쟁에서 승리하려 노력할 것입니다."
 GEO_WEAKBOY: "러시아와의 타협"
 GEO_WEAKBOY_DESC: "조지아는 전투 행위를 피하기 위해 러시아와 타협을 모색할 것입니다."
 GEO_GEORGIAN_DREAMS: "친서방 (조지아의 꿈)"
 GEO_GEORGIAN_DREAMS_DESC: "2013년 조지아는 서방 노선을 따를 것이며 집권당은 '조지아의 꿈'이 될 것입니다. 서방과의 협력 및 대러시아 실용주의를 추구합니다."
 GEO_UNITED_NATIONAL_MOVEMENT: "친서방 및 반러시아적 발언 및 메시지(통합국민운동)"
 GEO_UNITED_NATIONAL_MOVEMENT_DESC: "2013년 조지아는 서방 노선을 따를 것이며 집권당은 '통합국민운동'이 될 것입니다. 결국 미하일 사카슈빌리가 대통령이 되고 조지아는 강경한 반러시아적 발언 및 메시지를 펼칠 것입니다."
 GEO_NATIONALIST_2013: "민족주의 (엠자르 크비치아니)"
 GEO_NATIONALIST_2013_DESC: "2013년 조지아는 민족주의 노선을 따를 것입니다. 동구권과의 협력을 심화하고 반LGBTQ 발언 및 메시지를 내세웁니다."
 GEO_UNITED_GEORGIA: "신흥국 성향 (통합조지아)"
 GEO_UNITED_GEORGIA_DESC: "2013년 조지아는 신흥국 노선을 따를 것입니다. 동구권과의 협력을 심화하며 다벡터(Multi-Vector) 정책을 펼칩니다."
 BLR_ai_behavior: "@BLR 벨라루스"
 BLR_union_state_ai_behavior: "@BLR  연방 국가 행동"
 BLR_DEFAULT: "알렉산드르 루카셴코"
 BLR_DEFAULT_DESC: "기본 경로입니다. 루카셴코는 야당을 탄압하고, 러시아를 따르며 그들을 돕고, 또한 동구권과 협력할 것입니다."
 BLR_NATIONALIST: "민족주의 경로"
 BLR_NATIONALIST_DESC: "벨라루스는 민족주의 경로를 따르며, 러시아의 영향력을 줄이고, 유럽의 일부 영토를 요구하며 러시아 곰을 끝장낼 것입니다."
 BLR_COMMUNISM: "공산주의 경로"
 BLR_COMMUNISM_DESC: "벨라루스는 동유럽에 공산주의를 건설할 것이며, 결국 벨라루스는 리트벨(리투아니아-벨로루시 사회주의 소비에트 공화국)이 될 것입니다."
 BLR_POST_LUKA_DEFAULT: "루카셴코의 통치"
 BLR_POST_LUKA_DEFAULT_DESC: "알렉산드르 루카셴코가 세상의 끝까지 국가를 통치할 것입니다."
 BLR_MOMMY: "스뱌틀라나 치하노우스카야"
 BLR_MOMMY_DESC: "스뱌틀라나 치하노우스카야가 시위 이후 정권을 잡고 친서방 노선을 따를 것입니다."
 BLR_WONT_FOLLOW_UNION_STATE: "연맹국으로 가지 않기"
 BLR_WONT_FOLLOW_UNION_STATE_DESC: "벨라루스는 연맹국(Union State)을 결성하지 않을 것이며 러시아의 괴뢰국이 되지도 않을 것입니다."
 BLR_WILL_FOLLOW_UNION_STATE: "연맹국 형성"
 BLR_WILL_FOLLOW_UNION_STATE_DESC: "벨라루스는 연맹국 형성을 시도할 것입니다. 처음에는 러시아의 괴뢰국이 되겠지만, 그 이후에는..."
 BOSNIAN_AI_BEHAVIOR: "@BOS 보스니아 헤르체고비나"
 RULE_OPTION_PRO_BOSNIAN_LEADERSHIP_PEACEFUL: "보스니아인이 이끄는 길"
 RULE_OPTION_PRO_BOSNIAN_LEADERSHIP_PEACEFUL_AI_DESC: "보스니아계가 선거를 주도하여 친보스니아 정부가 수립됩니다. 이 정부는 평화로운 국가를 목표로 다른 파벌들과 협력을 시작할 것입니다. 보스니아는 또한 나토(NATO) 열강들과의 협력을 시작할 것입니다."
 RULE_OPTION_PRO_BOSNIAN_LEADERSHIP_COMMIE: "노동자 전선"
 RULE_OPTION_PRO_BOSNIAN_LEADERSHIP_COMMIE_AI_DESC: "보스니아는 노동조합과 노동자들의 경로를 따라 정부를 전복시키고 인민을 위한 공산주의 정부를 수립할 것입니다."
 RULE_OPTION_PRO_BOSNIAN_LEADERSHIP_MUSLIM_NATION: "보슈냐크 보복주의"
 RULE_OPTION_PRO_BOSNIAN_LEADERSHIP_MUSLIM_NATION_AI_DESC: "보스니아는 이슬람의 참된 길을 따르며 과거의 위대함을 되찾으려 시도할 것입니다."
 RULE_OPTION_PRO_LEADERSHIP_TO_SRPSKA: "스릅스카 협력"
 RULE_OPTION_PRO_LEADERSHIP_TO_SRPSKA_AI_DESC: "친스릅스카 정부가 권력을 잡고 보스니아 인민 및 경쟁 파벌들과 대규모 협력을 진행하는 데 중점을 둘 것입니다. 보스니아는 수호자인 @SOV 러시아 쪽으로 기울기 시작할 것입니다."
 RULE_OPTION_PRO_LEADERSHIP_TO_SRPSKA_SRPSKA_FIRST: "스릅스카 우선"
 RULE_OPTION_PRO_LEADERSHIP_TO_SRPSKA_SRPSKA_FIRST_AI_DESC: "스릅스카는 @SER 유고슬라비아와의 재통합을 위해 보스니아에 대한 완전한 통제권을 장악하려 시도할 것입니다."
 RULE_ALLOW_RELEASE_NATIONS_CHINA_TIB_TOOLTIP: "§Y[ROOT.GetNameDefCap]§!은(는) 먼저 §Y$CHI_Tibet_SAR$§! 중점을 완료하지 않으면 이 국가를 해방할 수 없습니다."
 RULE_ALLOW_RELEASE_NATIONS_CHINA_ETK_TOOLTIP: "§Y[ROOT.GetNameDefCap]§!은(는) 먼저 §Y$CHI_Xinjiang_SAR$§! 중점을 완료하지 않으면 이 국가를 해방할 수 없습니다."
 RULE_ALLOW_MP_OPTIMIZATIONS: "멀티플레이 최적화 허용"
 RULE_YES_ALLOW_MP_OPTIMIZATIONS_DESC: "플레이어가 성능 최적화를 위해 지역 내 국가들을 통합할 수 있도록 허용합니다."
 RULE_NO_ALLOW_MP_OPTIMIZATIONS_DESC: "플레이어가 성능 최적화를 위해 지역 내 국가들을 통합하는 것을 허용하지 않습니다."
 PER_REVOLUTIONARY_PERSIA: "팔라비의 귀환"
 PER_REVOLUTIONARY_PERSIA_DESC: "팔라비 2세가 이란으로 돌아와 세속 국가를 수립할 것입니다."
 PER_PAN_PERSIA: "이란 연방"
 PER_PAN_PERSIA_DESC: "범이란주의자들이 이란의 권력을 장악하고 이란 연방을 창설하기 위해 고군분투할 것입니다!"
 PER_FIRE_HAS_NO_FRIENDS_IRAN: "무자헤딘-에-할크 (MEK)"
 PER_FIRE_HAS_NO_FRIENDS_IRAN_DESC: "무자헤딘-에-할크(MEK)가 인민 공화국을 수립하기 위해 이란의 권력을 장악할 것입니다."
 RULE_DISABLE_GENERALS_KILLED: "전투 중 무작위 장군 전사 비활성화"
 RULE_ENABLE_GENERALS_KILLED_DESC: "장군이 전투 중 일정 확률로 전사할 수 있습니다. 플레이어는 인재 관리에 더욱 주의를 기울여야 합니다."
 RULE_DISABLE_GENERALS_KILLED_DESC: "장군이 전사할 확률을 제거합니다. 더 나은 멀티플레이 경험을 위한 설정입니다."
 RULE_ENABLE_AI_FIGHTING_AUTONOMY_FOCUS: "AI §T자치도 증가 중점§! 사용"
