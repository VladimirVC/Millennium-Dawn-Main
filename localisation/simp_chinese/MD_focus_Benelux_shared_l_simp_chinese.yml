l_simp_chinese:
 BNL_dynmod_union: "比荷卢联盟"
 BNL_benelux_union_treaty: "比荷卢联盟条约"
 BNL_benelux_union_treaty_desc: "2008年在海牙签署的新条约取代了即将到期的1958年协定，并将我们的合作更名为比荷卢联盟。它推进了共同市场的发展，并将我们的合作范围扩大到司法、安全和可持续发展领域，为三国提供了一个统一的现代化框架。"
 BNL_single_market: "比荷卢内部市场"
 BNL_single_market_desc: "比荷卢经济联盟超越了更广泛的欧洲市场，消除了仍然存在于三个经济体之间的行政壁垒。作为欧洲一体化的试验田，该联盟率先推行共同标准和相互承认机制，使企业能够像不受国界限制一样进行贸易和运营。"
 BNL_capital_integration: "资本市场一体化"
 BNL_capital_integration_desc: "阿姆斯特丹的证券交易所、布鲁塞尔的银行以及卢森堡庞大的投资基金行业，已经构成了欧洲最雄厚的资本池之一。协调金融监管和跨境规则，可以让这些资本自由流向欧盟各地最具生产力的企业。"
 BNL_port_cooperation: "鹿特丹和安特卫普"
 BNL_port_cooperation_desc: "鹿特丹和安特卫普是欧洲最大的两个港口。与其争夺同一批货物，不如协调安特卫普-鹿特丹-阿姆斯特丹集群，这将使比荷卢经济联盟的物流成为一个世界级的门户。"
 BNL_freight_corridors: "货运走廊"
 BNL_freight_corridors_desc: "贝图韦铁路和铁莱茵铁路等专用铁路将海港与欧洲腹地连接起来。对这些走廊的联合投资加强了欧盟的工业支柱。"
 BNL_north_sea_wind: "北海之风"
 BNL_north_sea_wind_desc: "根据北海能源合作协议，比荷卢三国共同开发海上风电。通过并网，北海成为共享的可再生能源来源。"
 BNL_gas_hub: "比荷卢天然气中心"
 BNL_gas_hub_desc: "格罗宁根气田和泽布吕赫液化天然气接收站使比荷卢经济联盟成为天然气贸易中心。通过五边能源论坛协调供应，保障了联盟的能源安全。"
 BNL_research_cooperation: "顶尖科技区"
 BNL_research_cooperation_desc: "埃因霍温和鲁汶，以及延伸至亚琛的地区，共同构成了欧洲顶尖科技区，这是欧洲高科技研究最密集的地区之一。通过整合这一跨境三角地带的实验室、资金和人才，比荷卢经济联盟的创新能力超越了规模远大于自身的竞争对手。"
 BNL_university_network: "大学网络"
 BNL_university_network_desc: "代尔夫特、鲁汶、埃因霍温和瓦赫宁根拥有密集的学术网络。将他们的课程和学位联系起来创建了一个共享的人才和知识库。"
 BNL_hightech_triangle: "高科技三角"
 BNL_hightech_triangle_desc: "埃因霍温的智慧港（阿斯麦和NXP的所在地）以及鲁汶的校际微电子研究中心共同构成了欧洲半导体研究的核心。这一产业集群的联合支持使比荷卢经济联盟始终处于高科技领域的前沿。"
 BNL_space_cooperation: "太空合作"
 BNL_space_cooperation_desc: "欧洲空间研究与技术中心位于诺德韦克。协调比荷卢经济联盟对欧洲航天事业的贡献，有助于建立先进的工程能力。"
 BNL_nuclear_research: "原子能研究"
 BNL_nuclear_research_desc: "荷兰佩滕的核研究中心和比利时莫尔的比利时核研究中心（及其米尔哈反应堆项目）引领着欧洲在反应堆和医用同位素领域的研究。一项联合计划推动了欧盟核科学的发展。"
 BNL_innovation_area: "比荷卢创新区"
 BNL_innovation_area_desc: "将研究网络、高科技集群以及核能和航天计划整合到一个创新领域，使比荷卢经济联盟成为地球上研究最密集的地区之一。"
 BNL_benelux_parliament: "比荷卢议会"
 BNL_benelux_parliament_desc: "2015年的一项条约以比荷卢三国议会间大会取代了1955年的旧协商委员会，为联盟提供了一个由三个国家议会组成的议会论坛。加强这一论坛将为三国之间更深层次的政治一体化奠定基础。"
 BNL_benelux_court: "比荷卢法院"
 BNL_benelux_court_desc: "2012年的一项议定书使比荷卢经济联盟法院现代化，将其职权范围从共同市场扩展到知识产权等新领域。该法院协调了三个司法管辖区的法律，并为联盟建立了共同的法律秩序。"
 BNL_shared_foreign_policy: "一致外交政策"
 BNL_shared_foreign_policy_desc: "遵循与联盟本身一样悠久的传统，三国政府在每次欧洲理事会和北约峰会前都会协调各自的立场。凭借统一的声音，比荷卢三国在布鲁塞尔的影响力远远超过其成员国的总规模。"
 BNL_political_union: "政治同盟"
 BNL_political_union_desc: "随着共同的议会、共同的法院和统一的外交政策的建立，这三个政府超越了单纯的合作，将它们的政治机构实际上结合成了一个联盟，只是没有正式名称而已。"
 BNL_treaty_of_union: "条约联盟"
 BNL_treaty_of_union_desc: "数十年来共同建立的制度在此汇聚。随着三国人民深度融合，领导政府将建立单一比荷卢三国的问题提交给各伙伴国。只有得到他们的同意，各自独立的主权才能让位于一个统一的国家。"
 BNL_treaty_of_union_tt: "开启通往统一的比荷卢经济联盟的道路"
 BNL_treaty_of_union_accept_tt: "它们成为我们的臣民，使得比荷卢经济联盟得以通过可成立国家决议形成。"
 BNL_integration_requirement_tt: "比荷卢一体化超过100"
 BNL_integration: "比荷卢一体化"
 BNL_integration_tt: "£GFX_benelux_icon $BNL_integration$: $RIGHT|+=1$"
 BNL_integration_tooltip: "$BNL_integration$: [?BNL_integration]"
 BNL_benelux_defence: "比荷卢防务声明"
 BNL_benelux_defence_desc: "2012年比荷卢防务声明促使比利时、荷兰和卢森堡承诺共同承担国防责任、分担费用并提高联合军事产出。该宣言是三国军队深化合作的框架。"
 BNL_mio_sharing_tt: "比利时、荷兰和卢森堡可以相互使用彼此的军事工业组织。"
 BNL_benelux_air_policing: "比荷卢空中政策"
 BNL_benelux_air_policing_desc: "自2017年以来，比利时和荷兰轮流在单一快速反应警戒下守护这三个国家的领空，并有权在彼此的边界进行拦截。"
 BNL_air_defence_command: "空中指挥和控制中心"
 BNL_air_defence_command_desc: "一个共享的空中指挥控制中心将三个国家的雷达图像和地面防空系统整合到一个协调的系统中。"
 BNL_binational_air_command: "双边空军司令部"
 BNL_binational_air_command_desc: "合并作战空军司令部后，比荷卢三国空军可以作为一个单一组织来计划和执行任务，共享基地、管制员和程序。"
 BNL_mrtt_fleet: "多国多用途加油运输机机队"
 BNL_mrtt_fleet_desc: "驻扎在埃因霍温的空客 A330 多用途加油运输机联合机队由比荷卢经济联盟伙伴国和其他欧洲国家共享，为每个成员国提供空中加油和战略空运服务。"
 BNL_eatc: "欧洲空运司令部"
 BNL_eatc_desc: "欧洲空中运输司令部总部位于埃因霍温，将成员国的军用运输机、加油机和航空医疗飞机集中到一个指挥部下。"
 BNL_belux_a400m: "比荷卢A400M单位"
 BNL_belux_a400m_desc: "比利时和卢森堡将各自的A400M“阿特拉斯”运输机集中到一个位于梅尔斯布鲁克的双边联合基地，共享机组人员、维护和共同的培训中心。卢森堡唯一的一架飞机涂装为比利时国旗颜色，两国共同承担这支机队的成本和飞行时间。"
 BNL_f35_cooperation: "加入F-35维持"
 BNL_f35_cooperation_desc: "比利时和荷兰协调其F-35机队的训练和维护，两国空军共享设施和专业知识。"
 BNL_benesam: "比荷联盟海军协议"
 BNL_benesam_desc: "比利时和荷兰将两国海军视为一体，共享训练、后勤和维护，同时各自指挥自己的部署。深化这项长期协议，使得联合舰队的实力远超各部分之和。"
 BNL_admiral_benelux: "比荷卢海军指挥官"
 BNL_admiral_benelux_desc: "在登海尔德，一个双边海军参谋部负责指挥比利时和荷兰舰队的行动，两国海军司令共用一个联合总部。"
 BNL_vlissingen_class: "弗利辛恩级扫雷舰"
 BNL_vlissingen_class_desc: "比利时和荷兰联合开展的“替代扫雷舰”项目，计划建造十二艘舰艇，以取代老旧的三方扫雷舰“阿尔克马尔”级。这些由法国海军集团建造的远程母舰，配备自主式水面和水下无人机，可在安全距离外进行扫雷作业。荷兰的六艘舰艇被命名为“弗利辛恩”级，与比利时同设计的舰艇一同服役。"
 BNL_hollandklasse_frigate: "荷兰级护卫舰发展"
 BNL_hollandklasse_frigate_desc: "荷兰建造新型荷兰级护卫舰，以更新其海上巡逻和反潜舰队。这些护卫舰配备了现代化的传感器、导弹系统和低可探测性船体，负责保护荷兰水域并支持海外行动。"
 BNL_aswf_frigate: "反潜护卫舰"
 BNL_aswf_frigate_desc: "比利时和荷兰联合用新的反潜战设计替换了他们的M级护卫舰，并共享开发、雷达和作战系统。"
 BNL_para_school: "比荷卢空降兵学校"
 BNL_para_school_desc: "比荷卢三国的伞兵学校合并为一个位于沙芬的训练中心，使这三个国家的空降部队达到共同的标准。"
 BNL_csomtg: "联合特种作战任务组"
 BNL_csomtg_desc: "比利时和荷兰组建了一支联合特种作战海上特遣队，随时准备在陆地和海上共同部署，执行北约的快速任务。"
 benelux.1.t: "比荷卢条约联盟"
 benelux.1.d: "[FROM.GetName]提议我们放弃各自的主权，加入一个统一的比荷卢三国。数十年来共享的机构为此奠定了基础，但放弃国家地位绝非易事。"
 benelux.1.a: "我们将加入联盟"
 benelux.1.b: "我们仍然是我们自己的国家"
 benelux.2.t: "我们的伙伴接受了联盟"
 benelux.2.d: "[FROM.GetName]已同意加入统一的比荷卢经济联盟。随着我们的合作伙伴与我们紧密联系，我们可以完成联盟的组建。"
 benelux.2.a: "一个崭新的国度就此诞生。"
 benelux.3.t: "我们的伙伴拒绝了联盟"
 benelux.3.d: "[FROM.GetName]尚不愿放弃其独立性。联盟要么需要等待，要么需要建立在更坚实的基础上。"
 benelux.3.a: "我们要有耐心"