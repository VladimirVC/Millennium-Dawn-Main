 GRE_unify_cyprus: "Unificar Chipre"
 GRE_failures_capitalism_TT: "§RLa escala del enfoque determina la extensión de la crisis de deuda.§!"
 GRE_communist_takeover_TT: "§GLos griegos exigen elecciones!§!\n\nAsegúrate de tener suficiente Poder Político ahorrado para esto. Si §Rfracasas§! en elegir y formar un gobierno, §Rnecesitarás convocar otra elección extraordinaria§! para empoderar al §Y[Communist-State_L]§!"
 GRE_fascist_takeover_TT: "§GLos griegos exigen elecciones!§!\n\nAsegúrate de tener suficiente Poder Político ahorrado para esto. Si §Rfracasas§! en elegir y formar un gobierno, §Rnecesitarás convocar otra elección extraordinaria§! para empoderar al §Y[Nat_Fascism_L]§!"
 GRE_civil_units_TT: "§RSe sugiere que reubiquemos nuestro ejército en las fronteras estatales de Grecia Central, donde podemos intentar contener a los rebeldes.§!"
 GRE_worsen_debt_TT: "§R¡Empeora la crisis de deuda!§!"
