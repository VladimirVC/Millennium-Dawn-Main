 NKO_juche_for_new_era: "Juche pour la nouvelle ère"
 NKO_juche_for_new_era_desc: "Avec l’investiture du président Kim Yo-jong, la Corée du Nord est entrée dans une nouvelle ère, un avenir plus radieux."
 NKO_for_well_being_of_people: "Pour le bien-être des habitants de Chosun"
 NKO_for_well_being_of_people_desc: "Les origines du Parti des Travailleurs de Corée visent le bonheur et le bien-être du peuple coréen. N'oublions pas nos origines."
 NKO_quality_first: "La qualité avant tout"
 NKO_quality_first_desc: "Les industries civiles locales réduisent sérieusement la qualité de leurs produits afin d’atteindre nos objectifs prévus et cela doit cesser !"
 NKO_chosun_dream: "Rêve de Chosun"
 NKO_chosun_dream_desc: "Le « Rêve Choson » est un nouveau concept lancé par le président [NKO.GetLeader], qui incarne les objectifs personnels et nationaux de la nation coréenne. Il englobe des aspirations dans de nombreux domaines, notamment économiques, politiques et internationaux."
