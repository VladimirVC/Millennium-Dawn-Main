 RULE_DISABLE_AI_DEBT_WAR_TITLE: "AI의 부채 전쟁"
 RULE_DISABLE_AI_DEBT_WAR: "비활성화"
 RULE_DISABLE_AI_DEBT_WAR_DESC: "AI의 부채 전쟁 기능을 비활성화합니다. AI는 더 이상 채무를 불이행한 국가를 침공하는 선택지를 택하지 않을 것입니다."
 RULE_ENABLE_AI_DEBT_WAR: "활성화"
 RULE_ENABLE_AI_DEBT_WAR_DESC: "이 설정은 플레이어가 채무를 불이행할 경우 AI가 부채 전쟁을 선포할 가능성을 높입니다."
 RULE_ALLOW_CHAOTIC_PEACE_CONFERENCE: "혼란스러운 평화협정 허용"
 RULE_OPTION_CHAOTIC_PC_NO: "안된다"
 RULE_OPTION_CHAOTIC_PC_NO_DESC: "이 옵션은 AI 평화협정에서 발생하는 무분별한 땅따먹기를 방지합니다.\n주를 요구할 수 있는 권한을 열강과 세력 지도자로 제한하게 됩니다. (이 기능은 AI에게만 적용되며, 플레이어에게는 영향을 주지 않습니다.)"
 RULE_OPTION_CHAOTIC_PC_YES: "찬성"
 RULE_OPTION_CHAOTIC_PC_YES_DESC: "저주받은 평화협정 그 자체를 즐기시는 분들을 위해 준비했습니다. 12개의 §Y러시아§!를 만들 수 있는데 왜 굳이 세상에 §Y러시아§!를 하나만 남겨둡니까!\n(이 옵션을 활성화해서 벌어지는 결과에 대해 제작자는 책임지지 않습니다!)"
 RULE_ALLOW_PLAYER_LED_PEACE_CONFERENCE: "플레이어 주도 평화협정 활성화"
 RULE_OPTION_PLAYER_LED_PC_NO: "안된다"
 RULE_OPTION_PLAYER_LED_PC_NO_DESC: "이 옵션은 AI가 아무리 멍청한 짓을 하더라도, 스스로 선택을 내리도록 놔둡니다."
 RULE_OPTION_PLAYER_LED_PC_YES: "찬성"
 RULE_OPTION_PLAYER_LED_PC_YES_DESC: "AI가 낫 놓고 기역 자도 제대로 알지 의심스러운 분들을 위해, 평화협정에서 오직 플레이어만이 영유권을 주장할 수 있도록 합니다."
 RULE_OPTION_DEMOCRAT: "민주당 성향"
 RULE_OPTION_DEMOCRAT_AI_DESC: "미국은 민주당 지도부를 선출하고, 현대적 의미의 중도좌파적 합의에 따라 국가를 이끌어 나갈 것입니다."
 RULE_OPTION_REPUBLICAN: "공화당 성향"
 RULE_OPTION_REPUBLICAN_AI_DESC: "미국은 공화당 지도부를 선출하고, 현대적 의미의 중도우파적 합의에 따라 국가를 이끌어 나갈 것입니다."
 RULE_OPTION_REFORMED_REPUBLIC: "개혁된 공화국"
 RULE_OPTION_REFORMED_REPUBLIC_AI_DESC: "국민의 의지가 반영되었습니다. 정치적 압박과 대중의 항의는 제3당의 대표성과 가시성을 높이는 주요 정치·경제 개혁으로 이어졌습니다. 이제 자신들을 가장 잘 대변하는 정당을 선출하는 것은 국민의 몫입니다."
 RULE_OPTION_POST_UNITED: "연방 붕괴 이후"
 RULE_OPTION_POST_UNITED_AI_DESC: "독수리는 단순히 명예를 잃는 것, 그 이상으로 추락합니다.§R역사적 AI를 활성화하지 마십시오.§!"
 NKO_AI_BEHAVIOR: "@NKO 조선민주주의인민공화국"
 RULE_NKO_NAM_RULES: "김정남"
 RULE_NKO_NAM_RULES_DESC: "김정남이 권력을 장악하고 북한을 영원히 \"개혁개방\"의 길로 변화시킬 것입니다."
 RULE_NKO_UN_RULES: "김정은"
 RULE_NKO_UN_RULES_DESC: "김정일이 선택한 후계자 김정은이 주체사상, 반미주의, 자력갱생, 철권통치의 길을 계속 이어갈 것입니다."
 RULE_NKO_JUNTA_RULES: "군사정부 쿠데타"
 RULE_NKO_JUNTA_RULES_DESC: "군부가 주체사상의 순수성을 보존하기 위해 쿠데타를 주도하며, 이들은 항상 주체사상을 수용하고 군사평의회에 권력을 집중시킬 것입니다."
 RULE_NKO_Yo_jong: "김여정"
 RULE_NKO_Yo_jong_ALLOWED_DESC: "김여정이 한반도를 밝은 길로 이끌 것입니다."
 RULE_NKO_Yo_jong_BLOCKED_DESC: "김여정의 집권을 허용하지 않습니다."
 SIN_AI_BEHAVIOR: "@SIN 싱가포르"
 SIN_GLOBAL_DIPLOMACY: "세계 외교"
 SIN_GLOBAL_DIPLOMACY_DESC: "싱가포르의 세계적 목표는 새로운 글로벌 외교 질서를 확립하는 것입니다."
 SIN_SINGAPORE_ALONE: "고립된 싱가포르"
 SIN_SINGAPORE_ALONE_DESC: "역사적 - 싱가포르의 역사적 경로입니다.\n\n싱가포르는 혼자 서는 것이 가장 좋습니다."
 SIN_PRESSURE_SOUTH_ASIAN_SEAS: "남아시아 해역 압박"
 SIN_PRESSURE_SOUTH_ASIAN_SEAS_DESC: "싱가포르의 새로운 힘의 물결이 도래하고 있습니다."
 UKR_AI_BEHAVIOR: "@UKR 우크라이나"
 SPR_CONSERVATIVE_LEANINGS: "보수적 성향"
 SPR_CONSERVATIVE_LEANINGS_DESC: "스페인은 국민당(PP)을 비롯한 보수 정당 쪽으로 크게 기울 것입니다."
 SPR_RENACIMIENTO_NACIONALISTA: "민족주의 르네상스 (Renacimiento Nacionalista)"
 SPR_RENACIMIENTO_NACIONALISTA_DESC: "스페인은 복스(Vox)나 에스파냐 2000(España 2000) 같은 정당 쪽으로 크게 기울 것입니다."
 SPR_NACION_UNIDAD_IMPERIO: "국가 단결 제국 (Nacion Unidad Imperio)"
 SPR_NACION_UNIDAD_IMPERIO_DESC: "스페인은 팔랑헤당 쪽으로 크게 기울 것입니다."
 SPR_SOCIALISM_RISING: "부상하는 사회주의"
 SPR_SOCIALISM_RISING_DESC: "스페인 사회노동당 (POSE)과 사회 민주주의 정당들의 승리 가능성이 높아지며 집권당을 차지하려 할 것입니다."
 SPR_COMMUNIST_REVISIONISM: "공산주의 수정주의"
 SPR_COMMUNIST_REVISIONISM_DESC: "스페인은 공산주의 정당들을 지원하며 나아가려 시도할 것입니다."
 SPR_THE_OLD_WAYS: "구시대의 방식"
 SPR_THE_OLD_WAYS_DESC: "스페인은 스페인 제국의 부활을 추구할 것입니다."
 GEO_AI_BEHAVIOR: "@GEO 조지아"
