 belarus_export.21.a: "令人遗憾"
 belarus_export.22.t: "联合装甲输送车计划"
 belarus_export.22.d: "[FROM.GetNameWithFlag]向我们提供了一个名为眼镜蛇-K的装甲输送车联合项目。该项目将为我们带来老旧设备改造方面的经验和知识。我们是否同意？"
 belarus_export.22.a: "当然，一笔很好的交易。"
 belarus_export.22.b: "不，我们拒绝他们的交易。"
