l_simp_chinese:
 CYP_division_of_the_island: "分裂的岛屿"
 CYP_division_of_the_island_desc: "绿线将塞浦路斯一分为二。北塞浦路斯仍处于土耳其占领之下，而共和国的管辖范围则止于联合国监督的缓冲区。这种悬而未决的分裂局面消耗了各方的政治意愿，并使部分民众和领土处于孤立状态。"
 CYP_eu_membership: "欧盟成员国"
 CYP_eu_membership_desc: "塞浦路斯于2004年加入欧盟，获得了进入单一市场、结构基金以及来自尼科西亚在布鲁塞尔的伙伴的政治支持框架。欧盟成员国身份塑造了该岛的经济发展轨迹和外交姿态。"
 CYP_offshore_gas: "东地中海气田"
 CYP_offshore_gas_desc: "专属经济区内的勘探区块已证实蕴藏着具有商业开采价值的天然气储量。开采收入和许可证交易带来了新的收入来源，同时也使与土耳其的关系变得复杂，因为土耳其对该区域的部分地区拥有主权。"
 CYP_financial_center: "区域金融中心"
 CYP_financial_center_desc: "塞浦路斯因其低税率而享有盛誉，尤其受到控股公司、船舶登记机构和国际资本流动的青睐。该行业带来了可观的服务收入，但其透明度也备受关注。"
 CYP_tourism_economy: "旅游业导向型经济"
 CYP_tourism_economy_desc: "阳光、海岸线和古迹每年吸引着数百万游客。旅游业是塞浦路斯国内生产总值的支柱产业，支撑着酒店业和零售业，同时也缓解了消费型经济体带来的部分进口压力。"
 CYP_foreign_investment_wave: "外国投资推动"
 CYP_foreign_investment_wave_desc: "一系列积极的税收优惠、投资者签证和双边担保措施，为外国直接投资的快速增长创造了短暂的窗口期。新的资本正流入服务业、房地产和轻工业。"
 CYP_develop_offshore_gas: "开发海上天然气田"
 CYP_develop_offshore_gas_desc: "委托开展勘探工作并​​签订许可合同，以启动东地中海天然气区块的生产。这项投资数额巨大，但成功开发将带来长期的收入来源，并巩固塞浦路斯对其专属经济区的主权声索。"
 CYP_eu_accession_push: "欧盟深化倡议"
 CYP_eu_accession_push_desc: "塞浦路斯积极与布鲁塞尔及主要成员国就全面参与欧盟一体化进程进行磋商，包括申根区候选资格申请和欧元区整合等议题。持续不断的游说活动有助于赢得希腊和欧洲对尼科西亚在岛屿争端问题上立场的认可。"
 CYP_bicommunal_talks: "双族对话"
 CYP_bicommunal_talks_desc: "邀请北塞浦路斯代表在联合国主持下进行结构化对话。进展往往不会立竿见影，但持续接触能够保持解决途径畅通，并向希腊和欧洲表明尼科西亚方面是出于善意。"
 CYP_court_foreign_investment: "吸引外国投资"
 CYP_court_foreign_investment_desc: "向有意将塞浦路斯作为运营基地的外国公司提供定向激励措施。虽然初期方案需要动用国库资金，但成功吸引资本将有助于提高服务业收入，并在一定时期内扩大税基。"
 CYP_mobilize_greek_cypriots: "团结希族塞人社群"
 CYP_mobilize_greek_cypriots_desc: "将国家资源直接投入到公民团体、教会和海外侨民中，以巩固对共和国岛屿愿景的支持。一个自信且组织严密的希族塞人社群将增强尼科西亚在塞浦路斯未来走向博弈中的筹码。"
 CYP_outreach_to_north: "跨越绿线"
 CYP_outreach_to_north_desc: "资助跨族群项目、开放贸易以及与北部温和派的非正式接触。每争取到一位支持由尼科西亚主导的共同解决方案的土耳其族塞人，就削弱一次永久分裂的可能性。"
 NCY_mobilize_turkish_cypriots: "团结土耳其塞人社群"
 NCY_mobilize_turkish_cypriots_desc: "动员北方各机构和安卡拉的支持，巩固土耳其族塞人社群对建立独立国家的立场。一个统一的北方更难融入任何由希腊主导的解决方案。"
 NCY_settler_program: "安纳托利亚定居计划"
 NCY_settler_program_desc: "继续推行将安纳托利亚大陆家庭迁往北部的长期政策。这种人口结构的变化巩固了土耳其族塞人在该岛的影响力，但也加深了南部地区的不满，并招致国际社会的批评。"
 CYP_gain_8_strength_TT: "§H希腊裔塞浦路斯人§!§G获得§!§H8点实力§!"
 CYP_reduce_north_TT: "§H土耳其族塞浦路斯人§!§R失去§!§H6点实力§!"
 NCY_gain_8_strength_TT: "§H土耳其族塞浦路斯人§!§G获得§!§H8点实力§!"
 NCY_settler_TT: "§H土耳其族塞浦路斯人§!§G获得§!§H6点实力§!同时§H希腊裔塞浦路斯人§!§R失去§!§H4点实力§!"
 cyprus.1.t: "已确认：东地中海储量可开采"
 cyprus.1.d: "勘测结果已出炉。阿芙罗狄蒂区块及其邻近区块的钻探证实，储量足以支持商业开采。尼科西亚方面正迅速推进许可证合同的最终敲定。土耳其已通过外交渠道提出异议，但我们专属经济区的法律基础稳固。"
 cyprus.1.a: "开始发展"
 cyprus.2.t: "双族对话：一种方法的选择"
 cyprus.2.d: "在联合国斡旋下，希族塞人和土族塞人代表团在尼科西亚举行了会晤。会谈气氛谨慎。双方都存在悬而未决的矛盾，且都不愿急于做出让步。此次会谈的进展将决定下一轮谈判的走向。"
 cyprus.2.a: "积极参与，提出具体建议。"
 cyprus.2.b: "坚持核心立场，拒绝率先行动。"
 cyprus.3.t: "塞浦路斯：在欧洲舞台上占据更深层次的地位"
 cyprus.3.d: "塞浦路斯官员从布鲁塞尔返回后，其在欧盟的地位比以往更加稳固。欧盟伙伴国认可尼科西亚一贯遵守欧盟法律体系，并积极参与欧洲各项机制。塞浦路斯在布鲁塞尔的地位也达到了加入欧盟以来的最高水平。"
 cyprus.3.a: "我们将利用这股势头。"
 cyprus.4.t: "绿线：缓冲区事件"
 cyprus.4.d: "缓冲区一处检查站发生的冲突升级为一起轻微的外交事件。联合国维和部队已恢复秩序，但双方仍在互相指责。此事再次引发尼科西亚关于如何应对北方挑衅的辩论。"
 cyprus.4.a: "发布正式的公开谴责声明。"
 cyprus.4.b: "通过联合国提出这个问题，并避免媒体报道。"