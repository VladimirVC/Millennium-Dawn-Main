 ALG_deep_state_category_desc: "管理军队和情报机构（权力集团）在阿尔及利亚治理中的影响力。\n\n§Y当前深层国家权力：§! [GetDeepStatePowerValue]/30\n§Y风险等级：§! [GetDeepStateRiskLevel]\n\n阈值：\n§G0-5：低§! | §Y6-10：中等§! | §O11-15：较高§!\n§R16-20：高§! | §R21-27：危急§! | §R28+：政变在即！§!"
 ALG_assess_deep_state_desc: "起草一份关于当前军方与情报部门对政府影响力的机密报告。\n\n§Y当前状态：§!\n影响力：[GetDeepStatePowerValue]/30\n等级：[GetDeepStatePower]\n风险：[GetDeepStateRiskLevel]"
 deep_state_warning_low_tt: "§G深层政府影响力：较低（[GetDeepStatePowerValue]/30）\n军方政治影响力有限，局势稳定。§!"
 deep_state_warning_moderate_tt: "§Y深层政府影响力：中等（[GetDeepStatePowerValue]/30）\n军方影响力正在增长。请密切关注局势。§!"
 deep_state_warning_medium_tt: "§O深层政府影响力：膨胀（[GetDeepStatePowerValue]/30）\n情报部门正变得政治活跃。建议采取行动。§!"
 deep_state_warning_high_tt: "§R深层政府影响力：较高（[GetDeepStatePowerValue]/30）\n将领们如同影子政府般运作。建议立即采取行动。§!"
 deep_state_warning_critical_tt: "§R£generic_warning 深层政府影响：危急（[GetDeepStatePowerValue]/30）\n文官政府正面临严重风险！请立即采取极端措施。§!"
 deep_state_warning_coup_imminent_tt: "§R£generic_warning 政变迫在眉睫！([GetDeepStatePowerValue]/30)\n军方随时可能夺取政权！必须采取紧急措施。§!"
 ALG_cabinet_category: "内阁管理"
 ALG_cabinet_category_desc: "在布特弗利卡总统治下，内阁是阿尔及利亚治理体系的公开门面。头衔与职权背后，始终存在着忠诚度、专业能力与权力集团影响力之间的微妙平衡。\n\n内阁忠诚度：[GetCabinetLoyaltyLevel]\n内阁专业能力：[GetCabinetCompetenceLevel]\n内阁深层势力影响：[GetCabinetDeepStateLevel]"
