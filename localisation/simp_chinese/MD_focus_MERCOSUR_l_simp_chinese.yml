 MER_unasul_democratic_clause_vote_suspend_tt: "§Y投票支持暂停成员国资格。§!若暂停方获胜，将采取以下措施："
 MER_unasul_democratic_clause_vote_probation_tt: "§Y投票决定以警告方式将其留在南美洲国家联盟内。§!如果缓期方获胜，将采取以下措施："
 MER_unasul_democratic_clause_suspension_tt: "§Y暂停该国南美洲国家联盟成员资格。§!移除其§Y南美洲国家联盟成员国§!身份，降低所有正式成员国动态国家精神中的§R1%政治点数获取§!和§R1%稳定度§!，若该国属于南美洲国家联盟防御条约，一并移除。"
 MER_unasul_democratic_clause_probation_tt: "§Y将该国置于南美国家联盟观察期内。§!当前及未来的所有南美国家联盟成员国，通过§Y南美洲国家联盟成员国§!身份获得的稳定性降低§R5%§!。"