 ALG_seek_sc_seat_tt: "联合国大会将举行投票，以确认阿尔及利亚在安理会的席位。"
 ALG_eliminate_GIA: "消灭武装伊斯兰团体"
 ALG_eliminate_GIA_desc: "武装伊斯兰组织曾是叛乱中最残暴的代表。随着其网络瓦解和公众支持的崩溃，政府现在正着手瓦解该组织的残余势力，并在全国范围内恢复秩序。"
 ALG_reintegration_programs: "重返社会计划"
 ALG_reintegration_programs_desc: "多年的暴力冲突导致成千上万的前战斗人员及同情者散落在阿尔及利亚社会各处。通过精心监控的重返社会计划，政府将为那些愿意放弃叛乱的人提供回归平民生活的途径。"
 ALG_strengthen_DRS: "加强DRS"
 ALG_strengthen_DRS_desc: "情报与安全局在打击\"黑色十年\"期间的极端主义网络中发挥了决定性作用。加强我们情报机构的能力将确保阿尔及利亚永远不会再次陷入这样的混乱。"
 ALG_coalition_economic_program_tt: "总统联盟启动了一项协调一致的经济发展计划。"
 ALG_governmental_transparency_tt: "政府承诺推行透明度改革，此举虽削弱了根深蒂固的腐败问题，却激怒了军方利益集团。"
