 IND_neutral5: "承诺为苏拉威西人提供更好的照顾"
 IND_neutral_generic: "推动巴布亚和苏拉威西人的征兵计划"
 IND_neutral_generic2: "将用于走私武器的码头军事化"
 IND_neutral_generic3: "将发生冲突的热点地区军事化"
