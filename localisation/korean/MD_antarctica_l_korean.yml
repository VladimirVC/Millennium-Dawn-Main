 leave_antarctica_cannot_be_stopped_tt: "§R이 작업은 중단할 수 없습니다.§!"
 leave_antarctica_treaty_warning_tt: "§R경고:§!\n§C남극§!에 §Y연구 기지§!를 유지한 채 §C남극 조약§!을 탈퇴하면 잠재적인 제재 및 외교적 반발을 포함하여 조약 회원국들의 전 지구적인 대응을 불러일으킬 것입니다. 부정적인 결과를 피하기 위해 조약을 탈퇴하기 전에 §C남극§! 내의 모든 연구 기지를 해체하는 것이 권장됩니다.\n\n그러나 연구 기지를 유지한 채 조약 탈퇴를 강행할 경우, 자원 착취나 군사 주둔 등 §C남극§! 내에서 금지된 활동을 시작하는 것을 막을 조항은 없으나, 이는 국가의 국제적 평판에 심각한 결과를 초래할 수 있습니다."
 antarctica_post_treaty_activity_category: "조약 탈퇴 후 남극 활동"
 antarctica_post_treaty_activity_category_desc: "이 행동들은 남극에 기지를 유지한 채 남극 조약을 탈퇴했기 때문에 표시됩니다."
 antarctica_post_treaty_resource_extraction: "남극 자원 착취"
 antarctica_post_treaty_resource_extraction_desc: "남은 기지 인프라를 활용하여 남극에서 자원을 채굴할 수 있습니다. 이는 수익을 증가시키지만 조약 회원국들의 외교적 반발을 불러일으킵니다."
 antarctica_post_treaty_military_preparations: "군사 인프라 준비"
 antarctica_post_treaty_military_preparations_desc: "기지 시설을 군사 작전 기획 및 보급을 위한 용도로 재단장합니다. 이는 군사적 이점을 제공하지만 심각한 도발로 간주됩니다."
 antarctica_laboratory_dynamic_modifier: "남극 연구 기지 출력"
 antarctica_lab_tech_bonus: "남극 연구 기지 실험실 기술 보너스"
 has_startup_antarctica_station_TT: "2000년 이전 연구 기지 보유 여부"
 antarctica_atcp_application_pending: "[ROOT.GetNameWithFlag] ATCP 신청 대기 중"
 is_antarctica_atcp_consultative_member: "[ROOT.GetNameWithFlag]는 이미 ATCP 회원국입니다"
 increase_antarctica_station_reports_tt: "남극 기지 위반 보고 건수를 §R[?antarctica_station_reports_temp]§!만큼 증가시킵니다 (현재 §R[?antarctica_station_reports]§!/§R7§!)"
 antarctica_reports_warning_tt: "§R경고:§!\n위반 보고 건수가 7회를 초과할 경우, 남극 조약 협의 당사국은 강력한 제재와 ATCP 지위 박탈(보유 시)을 포함한 외교적 조치를 귀국에 취할 수 있습니다. 부정적인 결과를 피하기 위해 위반 보고 건수를 7회 미만으로 유지하는 것이 권장됩니다.\n\n만약 핵 연구가 적발된 상태에서 한계치를 초과할 경우, 각 남극 조약 회원국들에게 귀국에 대한 금수 조치를 가하는 이벤트가 발생합니다."
 antarctica_ccas_member: "현재 CCAS 회원국"
 antarctica_ccamlr_member: "현재 CCAMLR 회원국"
 antarctica_lab_iteration_progress_modifier: "남극 연구 기지 반복 진행도 보너스"
 antarctica_treaty_leave_pending: "[ROOT.GetNameWithFlag] 남극 조약 탈퇴 진행 중"
 antarctica_has_active_station: "§C남극§!에 활성화된 §Y연구 기지§!를 보유하고 있습니다"
 ANT_CATERPILLAR_3512B_EFFECT: "§Y남극 기지§!에 §YCaterpillar 3512B§! 발전소를 설치할 수 있게 됩니다."
 ANT_PREMIUM_LIVING_QUARTERS_EFFECT: "§Y남극 기지§!에 §Y고급 거주 구역§! 거주 시설 모듈을 설치할 수 있게 됩니다."
 MD_antarctica_news.1.t: "[FROM.GetName], 남극 조약 가입 신청"
 MD_antarctica_news.1.d: "[FROM.GetName]이(가) 남극 조약에 가입 신청을 냈습니다. 이는 대외 정책의 잠재적 변화와 환경 보존에 대한 헌신을 나타냅니다. 남극 조약은 남극을 평화적 목적과 과학 연구를 위해서만 사용하도록 규제하며 대륙의 고유한 생태계를 보호하는 국제 협정입니다. [FROM.GetName]의 조약 가입 신청에 국제 사회는 따뜻한 반응을 보였으며, 일부는 이를 국제 협력을 향한 긍정적인 단계로 칭찬한 반면, 다른 일각에서는 [FROM.GetName]의 의도와 조약 원칙에 대한 진정성에 의구심을 표하기도 했습니다. 가입 절차 완료까지는 1개월이 소요될 예정입니다."
 MD_antarctica_news.1.a: "시간이 말해줄 것이다"
 MD_antarctica_news.1.b: "진작에 그랬어야지"
 MD_antarctica_news.2.t: "[FROM.GetName], 남극 조약 가입"
 MD_antarctica_news.2.d: "오늘 [GetDateText], [FROM.GetName]이(가) 남극의 평화적 이용과 과학 연구를 규제하는 국제 협정인 남극 조약에 공식적으로 가입하여 회원국이 되었습니다. 조약에 가입함으로써 [FROM.GetName]은(는) 남극에서의 환경 보존과 국제 협력의 원칙을 지킬 것을 약속했습니다. 이 행보는 국제 사회의 긍정적인 반응을 얻었으며, 많은 이들이 남극의 고유한 생태계를 보호하고 국가 간 평화적 협력을 증진하려는 [FROM.GetName]의 헌신에 찬사를 보냈습니다."
 MD_antarctica_news.2.a: "또 다른 회원국이 늘어났군"
 MD_antarctica_news.2.b: "자, 일하러 가자고!"
 MD_antarctica_news.3.t: "[FROM.GetName], 남극 조약 탈퇴 추진"
 MD_antarctica_news.3.d: "오늘 [FROM.GetName]이(가) 남극 조약을 탈퇴하기로 결정했습니다. 남극해양생물자원보존위원회(CCAMLR)는 남극에 위치한 모든 연구 기지를 해체하고 자원 채굴이나 군사 주둔과 같은 금지된 활동을 방지하기 위해 이들에게 2년의 유예 기간을 부여했습니다. 조약 탈퇴 결정에 대해 국제 사회는 엇갈린 반응을 보이고 있습니다. 일부는 환경 및 국제 협력에 미칠 잠재적 결과에 대해 실망과 우려를 표한 반면, 다른 일각에서는 국제 협정 참여와 관련하여 스스로 결정을 내릴 수 있는 [FROM.GetName]의 권리를 지지하고 있습니다. 조약 탈퇴 절차 완료까지는 2년이 소요될 예정입니다."
 MD_antarctica_news.3.a: "안타까운 일이군"
 MD_antarctica_news.3.b: "우린 더 중요한 할 일들이 있어"
 MD_antarctica_news.4.t: "[FROM.GetName], 남극 조약 공식 탈퇴"
 MD_antarctica_news.4.d: "[MD_antarctica_news_4_desc]"
 MD_antarctica_news.4.a: "조약이 약화되었군"
 MD_antarctica_news.4.b: "어찌 되든 상관없어"
 MD_antarctica_news_4_desc_1: "남극 조약 탈퇴를 선언하고 2년이 지난 후, [FROM.GetName]은(는) 남극의 평화적 이용과 과학 연구를 규제하는 국제 협정에서 공식적으로 탈퇴했습니다. 경고에도 불구하고 [FROM.GetName]은(는) 남극에 연구 기지를 유지한 채 조약을 탈퇴하여, 잠재적인 제재와 외교적 반발을 포함한 조약 회원국들의 전 지구적인 대응을 촉발시켰습니다."
 MD_antarctica_news_4_desc_2: "남극 조약 탈퇴를 선언하고 2년이 지난 후, [FROM.GetName]은(는) 남극의 평화적 이용과 과학 연구를 규제하는 국제 협정에서 공식적으로 탈퇴했습니다. [FROM.GetName]은(는) 남극 내의 모든 연구 기지를 성공적으로 해체하고 자원 채굴이나 군사 주둔과 같은 금지된 활동을 삼가으로써 환경 및 국제 협력에 미칠 잠재적 악영향을 완화했습니다."
 MD_antarctica_news.5.t: "[FROM.GetAdjective] 남극 기지에서 개방형 루프 설비 적발"
 MD_antarctica_news.5.d: "최근 옵서버 임무 동안, 조약 옵서버들이 [FROM.GetAdjective] 남극 연구 기지 중 한 곳에서 개방형 루프 설비(Open-Loop Utilities)가 사용되는 것을 적발했습니다. 이는 환경에 해를 끼치거나 남극 생태계를 교란할 수 있는 모든 활동을 금지하는 남극 조약에 대한 위반입니다. 개방형 루프 설비의 적발은 조약 회원국들 사이에서 우려를 낳았으며, 외교적 파장을 일으킬 수 있습니다."
 MD_antarctica_news.5.a: "비용을 아끼려 들면 이렇게 되지"
 MD_antarctica_news.5.b: "저런"
 MD_antarctica_news.6.t: "[FROM.GetAdjective] 남극 기지에서 불법 실험실 활동 적발"
 MD_antarctica_news.6.d: "최근 옵서버 임무 동안, 조약 옵서버들이 [FROM.GetAdjective] 남극 연구 기지 중 한 곳에서 불법 실험실 활동을 적발했습니다. 이러한 행위는 용납할 수 없으며 명백한 남극 조약 위반입니다. 조약 협의 당사국들은 남극의 고유한 생태계를 보호하고 조약의 완전성을 유지하기 위해 이 문제를 논의하고 적절한 조치를 취할 것입니다."
 MD_antarctica_news.6.a: "이건 받아들일 수 없다"
 MD_antarctica_news.6.b: "우리가 조치를 취해야만 해"
 MD_antarctica_news.7.t: "[FROM.GetAdjective] 남극 기지에서 핵무기 연구 적발"
 MD_antarctica_news.7.d: "최근 옵서버 임무 동안, 조약 옵서버들이 [FROM.GetAdjective] 남극 연구 기지 중 한 곳에서 핵무기 연구를 적발했습니다. 이는 군사 활동이나 남극의 생태계를 교란 및 환경적 피해를 줄 수 있는 모든 활동을 금지하는 남극 조약에 대한 심각한 위반입니다. 평화적인 연구 기지를 핵무기 제작과 실험에 사용하는 것은 전 세계의 안전과 안보를 위협하는 분노할 만한 만행입니다. 조약 협의 당사국들은 즉각적이고 단호한 조치를 취해 이 문제를 해결하고 책임자들에게 책임을 물을 것입니다. 국제 사회는 함께 힘을 모아 이러한 행위를 규탄하고, 남극이 과학 연구와 협력을 위한 평화롭고 보호받는 환경으로 남을 수 있도록 보장해야 합니다."
 MD_antarctica_news.7.a: "이건 천인공노할 만행이다!"
 MD_antarctica_news.7.b: "중요한 일이였지"
 MD_antarctica_news.8.t: "[FROM.GetName], 남극 조약 과다 위반"
 MD_antarctica_news.8.d: "남극 조약을 수차례 위반한 끝에, 조약 협의 당사국들은 임계점에 도달한 [FROM.GetName]을(를) 조약에서 제명하고 강력한 외교적 제재를 가하기로 결정했습니다. 조약의 원칙과 규정을 반복적으로 위반한 행위는 협정의 완전성을 훼손하고 남극의 고유한 생태계 보호를 위협했습니다. 조약 협의 당사국들은 [FROM.GetName]에 책임을 묻고, 남극 조약이 국제 협력과 환경 보존을 위한 강력하고 효과적인 체제로 남을 수 있도록 단호한 조치를 취할 것입니다."
 MD_antarctica_news.8.a: "자업자득이지"
 MD_antarctica_news.8.b: "이건 너무 심하잖아"
 MD_antarctica_news.9.t: "남극 전역에 강풍 발생"
 MD_antarctica_news.9.d: "남극 전역에 연구 기지에 영향을 미치는 강풍이 발생했다는 보고가 접수되었습니다. 조약 협의 당사국들은 상황을 모니터링하며 인원들의 안전과 진행 중인 연구의 안전성을 보장하기 위해 지원을 제공하고 있습니다. 옵서버 임무는 기상 조건이 호전될 때까지 일시적으로 중단됩니다."
 MD_antarctica_news.9.a: "좋지 않군"
 MD_antarctica_news.10.t: "[FROM.GetName], 남극 연구 기지 건설 착수"
 MD_antarctica_news.10.d: "[FROM.GetName]이(가) 해당 지역에서의 과학 연구와 환경 보존에 대한 의지를 알리며 신규 남극 연구 기지의 건설을 시작했습니다. 기지 건설에는 수개월이 소요될 것으로 예상되며, 조약 협의 당사국들은 남극 조약의 원칙과 규정을 준수하는지 확인하기 위해 진행 상황을 면밀히 감시할 것입니다."
 MD_antarctica_news.10.a: "훌륭하군!"
 MD_antarctica.1.t: "옵서버 임무단 접근 중"
 MD_antarctica.1.d: "[FROM.GetName]이(가) 아군의 남극 연구 기지 중 한 곳을 사찰하기 위해 조약 옵서버를 파견했습니다. 임무단은 §Y7일§! 후에 도착할 예정입니다."
 MD_antarctica.1.a: "그들의 도착을 기다리도록 하겠다"
 MD_antarctica.3.t: "옵서버 임무 보고서: 개방형 루프 설비 적발"
 MD_antarctica.3.d: "조약 옵서버들이 아군 남극 연구 기지의 사찰을 완료하고 개방형 루프 설비 사용을 적발하여 보고했습니다. 이는 남극 조약 위반이며 외교적 결과를 초래할 수 있습니다. 조약 협의 당사국들은 보다 친환경적인 설비로 교체할 것을 요구했습니다."
 MD_antarctica.3.a: "치워야 되겠군"
 MD_antarctica.4.t: "옵서버 임무 보고서: 불법 실험실 활동 적발"
 MD_antarctica.4.d: "조약 옵서버들이 아군 남극 연구 기지의 사찰을 완료하고 불법 실험실 활동을 적발하여 보고했습니다. 만약 우리가 기지 내의 모든 불법 활동을 중단한다면, 협의 당사국들은 더 이상의 불이익을 주지 않을 것입니다."
 MD_antarctica.4.a: "우리가 조치를 취해야만 해"
 MD_antarctica.5.t: "옵서버 임무 보고서: 핵무기 연구 적발"
 MD_antarctica.5.d: "조약 옵서버들이 아군 남극 연구 기지의 사찰을 완료하고 핵무기 연구를 적발하여 보고했습니다. 이는 남극 조약에 대한 심각한 위반으로, 즉각적인 외교적 파장을 불러일으킬 것입니다. 조약 협의 당사국들은 이 문제를 해결하고 책임자들에게 책임을 묻기 위해 단호한 조치를 취할 것이며, 우리 기지 내의 모든 핵 연구 활동을 즉각 중단할 것을 요구하고 있습니다."
 MD_antarctica.5.a: "당장 저걸 치워버려야 해!"
 MD_antarctica.6.t: "남극 조약 위반: 과다 위반 경고"
 MD_antarctica.6.d: "[ROOT.GetLeader] 각하께,\n\n귀국 [ROOT.GetName]이(가) 총 [?antarctica_station_reports]회의 위반으로 남극 조약을 너무 많이 위반했음을 알리게 되어 유감입니다. 그 결과, 조약 협의 당사국들은 2년 이내에 조약에서 [ROOT.GetName]을(를) 제명하고 강력한 외교적 제재를 부과하기로 결정했습니다. 조약의 원칙과 규정을 반복적으로 위반한 것은 협정의 완전성을 훼손하고 남극의 고유한 생태계 보호를 위협했습니다. 사태의 심각성을 인지하시고 회원국 자격이 취소되기 전에 연구 기지를 철수시킬 것을 강력히 촉구합니다.\n\n남극 조약 협의 당사국 드림"
 MD_antarctica.6.a: "우리가 자초한 일이다"
 MD_antarctica.7.t: "[FROM.GetName]에 금수 조치를 부과하시겠습니까?"
 MD_antarctica.7.d: "최근 [FROM.GetAdjective] 남극 연구 기지 중 한 곳에서 핵무기 연구가 적발됨에 따라, 남극 조약 협의 당사국들은 [FROM.GetName]에 대한 금수 조치(엠바고) 부과를 검토하고 있습니다. 이는 조약의 원칙과 규정을 위반한 것에 대한 대응으로 [FROM.GetName]과의 무역 및 외교 관계를 제한하는 것을 포함합니다."
 MD_antarctica.7.a: "그들은 자신들의 행동에 대가를 치러야 해"
 MD_antarctica.7.b: "그 정도는 아니다"
 MD_antarctica.9.t: "남극 기지 모듈 손상됨"
 MD_antarctica.9.d: "아군의 남극 연구 기지 중 한 곳의 모듈이 눈보라로 인해 손상되었습니다. 기술자들이 수리를 준비 중이며 기상 조건이 호전되는 즉시 복구 작업을 시작할 것입니다."
 MD_antarctica.9.a: "제기랄 놈의 날씨 같으니!"
 MD_antarctica.10.t: "합병된 국가의 남극 연구 기지 해체"
 MD_antarctica.10.d: "연구 기지를 보유한 국가가 합병됨에 따라, 해당 기지가 해체되었습니다."
 MD_antarctica.10.a: "알겠다"
 ANT_nukes_research_discovered_idea: "남극 기지 핵무기 연구 발각됨"
 ANT_nukes_research_discovered_idea_desc: "이 국가는 핵무기와 관련된 연구를 진행함으로써 남극 내 군사 연구 전면 금지 원칙을 위반했습니다."
 antarctica_small_treaty_admin_cost_1: "남극 소조약 관리"
 antarctica_small_treaty_admin_cost_1_desc: "이 국가는 하나의 남극 소조약(CCAS 또는 CCAMLR)에 서명하여 정치적 조치를 위한 행정 부담이 증가했습니다."
 antarctica_small_treaty_admin_cost_2: "확장된 남극 조약 관리"
 antarctica_small_treaty_admin_cost_2_desc: "이 국가는 두 개의 남극 소조약(CCAS 및 CCAMLR)에 모두 서명하여 더 광범위한 조약 관리 및 규정 준수 자원이 필요합니다."
 ANT_kicked_from_treaty_idea: "남극 조약에서 제명됨"
 ANT_kicked_from_treaty_idea_desc: "남극 조약의 반복적인 위반으로 인해 이 국가는 협정에서 제명되었으며 향후 2년 동안 재가입할 수 없습니다."
 ANT_illegal_extraction_idea: "남극 불법 자원 채굴"
 ANT_illegal_extraction_idea_desc: "우리가 얼어붙은 황무지의 멋진 경치를 보존하겠답시고 귀중한 자원을 포기하지 않으려는 소수 중 하나이기에 다른 국가들과의 관계가 악화되었습니다. 그들은 저 얼음 덩어리에 너무 신경을 쓰고 있습니다."
 ANT_military_training_idea: "남극 불법 군사 훈련"
 ANT_military_training_idea_desc: "우리 병사들에게 동계 공세를 준비시키기에 남극보다 더 좋은 장소는 없습니다."
 antarctica_modifier_small_consequences: "남극 연구 기지 내 개방형 루프 설비 적발"
 antarctica_modifier_medium_consequences: "남극 연구 기지 내 불법 실험실 활동 적발"
 antarctica_modifier_large_consequences: "남극 연구 기지 내 핵무기 연구 적발"
