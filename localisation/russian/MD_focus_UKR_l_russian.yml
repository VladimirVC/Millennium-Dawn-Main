 UKR_vv_tooltip_tt: "§YФинансирование спецназа значительно снизит последствия возможного Майдана§!"
 UKR_arms_rebuild: "Военная промышленность"
 UKR_arms_rebuild_desc: "Наша страна должна защищать себя, и только сильная военная промышленность поможет в этом."
 UKR_arms_build: "Инвестировать в военное производство"
 UKR_arms_build_desc: "We are ready to finance investments in expanding the military production of some of our name factories."
 UKR_polish_ukr_brotherhood: "Польско-украинское братство"
 UKR_polish_ukr_brotherhood_desc: "Only together, Ukraine and Poland will be able to defeat any enemy."
 UKR_belarus_brothers: "Белорусские братья"
 UKR_belarus_brothers_desc: "Белорусский народ - наши братья, которые также находятся в лапах двух крупных политических сил. Мы вытащим их из этих лап."
 UKR_befriend_azerbaijan: "Дружба с Азербайджаном"
 UKR_befriend_azerbaijan_desc: "Азербайджан будет ценным союзником для продвижения нашей политики на Кавказе, где мы сможем активно противостоять влиянию России."
 UKR_befriend_georgia: "Союз с Грузией"
 UKR_befriend_georgia_desc: "Georgia is an important partner and has a strategic position in the Caucasus region. Having such an ally in the Alliance will be very beneficial for us."
 UKR_caucasus_volunteers: "Волонтеры с Кавказа"
 UKR_caucasus_volunteers_desc: "We will invite many volunteers from the Caucasus to form HUR battalions."
 UKR_dagestan_reb_prepare: "Подготовить восстание в Дагестане"
 UKR_dagestan_reb_prepare_desc: "We will begin preparations for a special limited operation in Dagestan."
 UKR_befriend_chechens: "Дружба с Ичкерией"
 UKR_befriend_chechens_desc: "Ичкерия, государство, которое было уничтожено Россией в начале этого века. Мы соберем ее истинных патриотов и попытаемся ее возродить."
 UKR_reconcista: "Украинская реконкиста"
 UKR_reconcista_desc: "European states are mired in chaos, an emigrant crisis. The peoples of Europe are completely under the control of the globalists, which in the future will surely lead Europe to collapse, for the sake of easy profit - we will change this."
 UKR_no_russian_language: "Запрет русского языка"
 UKR_no_russian_language_desc: "It's time to deal with the Russian language completely."
 UKR_kuban_ukrainization: "Украинизация Кубани"
 UKR_kuban_ukrainization_desc: "Kuban will become Ukrainian, we will take care of it."
 UKR_trizub: "Тризуб"
 UKR_trizub_desc: "Tryzub is entrusted with functions of a specific nature that other wings of the Nationalist Congress did not get."
 UKR_christos_nash: "Христианский национализм"
 UKR_christos_nash_desc: "Christianity and nationalism are things that should be united in our Ukrainian state."
 UKR_nationalists_congress: "Политика Конгресса националистов"
 UKR_nationalists_congress_desc: "The real patriots of Ukraine are now running the country, no matter how tough the policy is, it will make our country great."
 UKR_nationalists_right_sector: "Правый сектор"
 UKR_nationalists_una_unso: "УНА УНСО"
 UKR_nationalists_upa: "УПА"
 UKR_nationalists_people_leave: "Миграция из Украины"
 UKR_nationalists_people_leave_desc: "Наша политика привела к массовой миграции из страны, но мы только рады, что все предатели наконец-то уедут отсюда!"
 UKR_nationalists_cleane_ukraine: "Настоящая Украина"
 UKR_nationalists_great_ukraine: "Великая Украина"
 UKR_nationalists_great_ukraine_desc: "Великая Украина начинается здесь!"
 UKR_nationalists_trizub: "Тризуб"
 UKR_nationalists_reconcista: "Возрожденная Реконкиста"
 UKR_nationalists_reconcista_desc: "Ukraine will become a beacon of the revival of Christianity in Europe! The holy march from Kyiv begins."
 did_not_support_the_baltic_black_sea_union: "§YНе поддерживают инициативу Черноморско-Балтийского союза§!"
 ukraine_congress.2.t: "Украина берет Севастополь"
 ukraine_congress.2.d: "The Ukrainian government cancels the lease agreement with us and begins the expulsion of our fleet from Sevastopol."
 ukraine_congress.2.a: "Это наше поражение"
 ukraine_congress.10.t: "Украина предлагает идеи Балто-Черноморья"
 ukraine_congress.10.d: "Балто-Черноморский союз - это концепция, похожая на концепцию Интермариума, давно выдвинутую Польшей. В ней говорится об оборонительном союзе стран, расположенных между Балтийским и Черным морями. Страны будут сотрудничать и объединяться в силовой блок, который будет поддерживать друг друга. Как говорится, сила в количестве.\n\n§YЭто позволяет обеспечить взаимные гарантии через украинское древо§!"
 ukraine_congress.10.a: "Мы должны продолжать изучать этот вопрос."
 ukraine_congress.10.b: "Глупая идея"
 ukraine_congress.11.t: "Балто-Черноморский союз"
 ukraine_congress.11.d: "Разработаны законы и договоры. Народы стран, поддерживающих эту идею, наконец-то объединились. Настало время воплотить амбиции в жизнь. Пришло время заключить союз с теми, кто нас поддерживал. Украина прислала нам последний договор, который мы должны подписать, чтобы закрепить союз. Отступим ли мы сейчас или останемся на прежнем уровне и поддержим наших новообретенных союзников?"
 ukraine_congress.11.a: "Подписать договор"
 ukraine_congress.11.b: "Отступить. Разорвать договор"
 UKR_poroshenko_start: "Президентство Порошенко"
 UKR_poroshenko_start_desc: "The Ukrainian state was headed by an oligarch. The history of Ukraine clearly did not expect such a turn, perhaps it will lead Ukraine to success."
 UKR_poroshenko_decentr: "Децентрализация"
 UKR_poroshenko_decentr_desc: "One of the main political points of Poroshenko's program has been and will be - decentralization. We must reform the Ukrainian state."
 UKR_poroshenko_deccomunism: "Декоммунизация"
 UKR_poroshenko_deccomunism_desc: "The communist past has been hard and scary for our country. Our nation was almost destroyed by the Famine, and we will not allow monuments to our murderers to be all over the country."
 UKR_poroshenko_anti_corruption: "Антикоррупционные реформы"
 UKR_poroshenko_anti_corruption_desc: "Corruption has been and will continue to be a sore topic in our country, and we will carry out a series of anti-corruption reforms."
 UKR_poroshenko_nabu: "Создать НАБУ"
 UKR_poroshenko_nabu_desc: "НАБУ - центральный орган исполнительной власти со специальным статусом, на который возложены функции по предупреждению, выявлению, пресечению, расследованию и раскрытию коррупционных и других уголовных правонарушений, отнесенных к его компетенции, а также предупреждению новых."
 UKR_poroshenko_no_russian_military: "Избавиться от влияния российских ВС"
 UKR_poroshenko_no_russian_military_desc: "Мы должны перестать зависеть от российской армии. Только независимая украинская армия защитит страну."
 UKR_poroshenko_anti_rus_doctrine: "Антироссийская доктрина"
 UKR_poroshenko_anti_rus_doctrine_desc: "Russia has been and will be an aggressor towards us, we must clearly reflect this in our military doctrine."
 UKR_poroshenko_smi_free: "Свобода СМИ"
 UKR_poroshenko_smi_free_desc: "The media should be free and not limited by the dictatorial habits of a few people."
 UKR_poroshenko_kefalia: "Автокефалия украинской церкви"
 UKR_poroshenko_kefalia_desc: "It's time to get rid of the influence of the Moscow Orthodox Church."
 UKR_poroshenko_ukrainisation: "Украинизация"
 UKR_poroshenko_ukrainisation_desc: "We will begin a policy of Ukrainization, and gradually eradicate the Russian language from various social environments."
 UKR_poroshenko_upa: "Чествовать героев УПА"
 UKR_poroshenko_upa_desc: "UPA - they were defenders of Ukraine and we will honor them."
 UKR_poroshenko_es: "Сотрудничество с ЕС"
 UKR_poroshenko_es_desc: "The European Union will be our main economic partner and we will strive to maintain trade relations with them further."
 UKR_poroshenko_canada: "Партнерство с Канадой"
 UKR_poroshenko_canada_desc: "We are ready to conclude several agreements with Canada to improve trade relations."
 UKR_us_friendship: "Партнерство с США"
 UKR_us_friendship_desc: "We are ready to conclude several agreements with USA to improve trade relations."
 UKR_visegrad_coop: "Партнерство с Вишеградской группой"
 UKR_visegrad_coop_desc: "We are ready to conclude several agreements with Visegrád Group to improve trade relations."
 UKR_turkey_invest_req: "Инвестиции из Турции"
 UKR_turkey_invest_req_desc: "We will attract Turkish investors to our territory, their investments will help our economy."
 UKR_kazakh_improve_rel: "Улучшить отношения с Казахстаном"
 UKR_kazakh_improve_rel_desc: "Kazakhstani partners will be an excellent addition to our foreign trade activities."
 UKR_reorient_market: "Переориентация на западный рынок"
 UKR_reorient_market_desc: "The East is closed to us, we will reorient our markets to the west."
 UKR_ukroboronprom_revival: "Инвестиции в оборонную промышленность"
 UKR_ukroboronprom_revival_desc: "Our defense industry needs investments, we will give them."
 UKR_smuggle_parts_through_russia: "Закупать запчасти в России окольными путями"
 UKR_smuggle_parts_through_russia_desc: "Despite our anti-Russian doctrine, we are forced to purchase spare parts from Russian factories, albeit in a roundabout way."
 UKR_reverse_engineering: "Обратная разработка"
 UKR_reverse_engineering_desc: "We will strive to create our own engineering in the field of armored vehicles."
 UKR_western_assistance: "Западная поддержка"
 UKR_western_assistance_desc: "Western investors are also actively investing in our defense industry."
 UKR_poroshenko_nato: "Сотрудничество с НАТО"
 UKR_poroshenko_nato_desc: "NATO is our main military partner, and with their help we are reforming our armed forces."
 UKR_belarus_proposal_non_attack: "Пакт о ненападении с Беларусью"
 UKR_belarus_proposal_non_attack_desc: "Belarus, our northern neighbor, can be used by enemies to attack us from two sides, we must prevent this."
 UKR_language_policies: "Языковая политика"
 UKR_language_policies_desc: "We will continue to expand the percentage of the Ukrainian language in communication and in other areas of citizens' lives."
 UKR_support_patriotism: "Поддержка патриотизма"
 UKR_support_patriotism_desc: "Patriotism will be encouraged by the state as never before."
 UKR_donbass_okopi: "Проект \"Стена\""
 UKR_donbass_okopi_desc: "We urgently need to build a defensive line along the border of our enemy."
 UKR_transnistria_defences: "Укрепить границу с Приднестровьем"
 UKR_transnistria_defences_desc: "Transnistria may become a springboard for an attack on us in the future, we will strengthen the border with them."
 UKR_deoligarchisation: "Деолигархизация"
 UKR_deoligarchisation_desc: "The oligarchs have too much power in our country - we will fix it."
 UKR_rochen_expansion: "Расширить производство Roshen"
 UKR_rochen_expansion_desc: "Roshen factory will now be able to expand its production capabilities with the help of public investments."
 UKR_support_medium_businesses: "Поддержка малого бизнеса"
 UKR_support_medium_businesses_desc: "Small businesses will receive the necessary support."
 UKR_kolomoyski_deal: "Убрать Коломойского"
 UKR_kolomoyski_deal_desc: "Kolomoisky has long been one of the main problems in our country, his influence was too great and it's time to deal with him."
 UKR_purge_church_from_rus: "Ликвидировать влияние РПЦ"
 UKR_purge_church_from_rus_desc: "The Russian Orthodox Church will no longer influence us."
 UKR_greece_letter: "Обращение к Вселенскому Патриарху"
 UKR_greece_letter_desc: "We will appeal to the Ecumenical Patriarch to recognize our church as independent."
 UKR_upc_create: "Создать Украинскую православную церковь"
 UKR_upc_create_desc: "The Ukrainian Orthodox Church will be created! Now we are a spiritually free country as well."
 UKR_poroshenko_army_reform: "Реформа армии"
 UKR_poroshenko_army_reform_desc: "Our army needs major reforms - we will start implementing them now."
 UKR_pmc_instructors: "Инструкторы из западных ЧВК"
 UKR_pmc_instructors_desc: "Western PMCs instructors are ready to support our army."
 UKR_rally_nationalist_support: "Поддержка ветеранов"
 UKR_rally_nationalist_support_desc: "Combat veterans will be the mainstay of our future election campaign."
 UKR_welfare_conseccions: "Увеличить социальную поддержку"
 UKR_welfare_conseccions_desc: "В будущем мы сосредоточим нашу избирательную кампанию на повышении социальных гарантий."
 UKR_anti_russia_propaganda: "Антироссийская пропаганда"
 UKR_anti_russia_propaganda_desc: "Our citizen must understand who his true enemy is, who seeks to absorb our country - Russia."
 UKR_saakashvili_odessa: "Пригласить Саакашвили губернатором Одессы"
 UKR_saakashvili_odessa_desc: "We will invite Saakashvili to be the governor of the Odessa region, perhaps he will show himself well."
 UKR_support_minsk_agreements: "Поддерживать Минские соглашения"
 UKR_support_minsk_agreements_desc: "We will support the Minsk agreements and try to resolve everything peacefully."
 UKR_continue_shelling: "Покончить с сепаратистами"
 UKR_continue_shelling_desc: "No separatists! We will liberate our lands."
 UKR_business_with_rf: "Бизнес с Россией"
 UKR_business_with_rf_desc: "We will continue to do business with Russia."
 UKR_full_rus_embargo_por: "Ввести эмбарго против России"
 UKR_full_rus_embargo_por_desc: "We will impose an embargo on economic cooperation with Russia."
 UKR_osce_watchers: "Наблюдатели ОБСЕ"
 UKR_osce_watchers_desc: "OSCE observers will be invited to Donbass."
 UKR_suppress_easterner: "Подавлять восточников"
 UKR_suppress_easterner_desc: "Supporters of integration with Russia should be suppressed, including through the media."
 UKR_anti_emerg_1plus1: "Усилить антивосточную пропаганду"
 UKR_anti_emerg_1plus1_desc: "We will strengthen the propaganda directed against those who support Russia."
 UKR_eu_compliant_reforms: "Реформы по соблюдению требований ЕС"
 UKR_eu_compliant_reforms_desc: "We will continue compliance reforms for integration with the European Union."
 UKR_european_education_connections: "Сотрудничество с европейскими образовательными учреждениями"
 UKR_european_education_connections_desc: "European education will give us much more than the old, Soviet and totalitarian one."
 UKR_european_defence_program: "Европейская программа защиты"
 UKR_european_defence_program_desc: "We will join the European Defense Program to strengthen our armed forces."
 UKR_nato_application_por: "Программа сотрудничества с НАТО"
 UKR_nato_application_por_desc: "NATO's partnership in the field of armed forces will also allow us to carry out reforms of our army."
 UKR_ukraine_anew: "Новая Украина"
 UKR_ukraine_anew_desc: "Our country has gone through a long way, many reforms, but now it has been reborn and looks positively to the future."
 UKR_apply_to_eu_por: "Программа сотрудничества с ЕС"
 UKR_apply_to_eu_por_desc: "Cooperation with the European Union will continue to be our priority."
 UKR_anti_rus_doctrine: "Антироссийская доктрина"
 UKR_anti_rus_doctrine_desc: "Нашим политическим и идеологическим врагом была и остается Россия. Мы должны принять это и быть готовыми к войне."
 UKR_foreign_advisors_desc: "Foreign instructors from various PMCs are ready to train our soldiers."
 UKR_west_investors: "Западные инвесторы"
 UKR_operation_wall: "Проект \"Стена\""
 UKR_smuggle_parts_from_rus: "Закупка запчастей из России"
 UKR_smuggle_parts_from_rus_desc: "We continue to buy spare parts from Russia, albeit secretly."
 UKR_reverse_engineering_start: "Обратный инжиниринг"
 UKR_reverse_engineering_start_desc: "We aim to create our own production."
 UKR_ato_supports: "Поддержка ветеранов"
 UKR_health_supports: "Поддержка здравоохранения"
 UKR_poroh_prepare_donbass: "Готовиться к реваншу в Донбассе"
 UKR_poroh_prepare_donbass_desc: "We are ready to take revenge from the separatists and solve the problem with the People's republics forever."
 UKR_poroh_osce_ukr: "Наблюдатели ОБСЕ"
 UKR_poroh_osce_ukr_desc: "OSCE observers have been sent to the conflict zone to stabilize the situation on the front line with the unrecognized republics."
 ukraine_poroh.1.t: "Украина предлагает пакт о ненападении"
 ukraine_poroh.1.d: "The Ukrainian government suggests that we conclude a non-aggression pact with them, apparently they see us as potential aggressors against themselves."
 ukraine_poroh.1.a: "Мы подпишем пакт"
 ukraine_poroh.1.b: "В этом нет необходимости"
 ukraine_poroh.2.t: "Пакт о ненападении с Беларусью"
 ukraine_poroh.2.d: "The Belarusian government has agreed to sign a non-aggression pact with us, we are glad that they are on our side."
 ukraine_poroh.2.a: "Хорошо"
 ukraine_poroh.3.t: "Договор о ненападении с Беларусью"
 ukraine_poroh.3.d: "The Belarusian government has refused to sign a non-aggression pact with us, which worries us."
 ukraine_poroh.3.a: "Печально"
 ukraine_poroh.4.t: "Автокефалия Украинской Церкви"
 ukraine_poroh.4.d: "Украинская церковь обратилась к нашему Вселенскому патриарху за разрешением на автокефалию ее церкви. Разрешит ли это наш патриарх?"
 ukraine_poroh.4.a: "Да"
 ukraine_poroh.4.b: "Нет"
 ukraine_poroh.5.t: "Автокефалия Украинской Церкви"
 ukraine_poroh.5.d: "The Ecumenical Patriarch approved the Autocephaly of our Church."
 ukraine_poroh.5.a: "Хорошо"
 ukraine_poroh.6.t: "Автокефалия Украинской Церкви"
 ukraine_poroh.6.d: "The Ecumenical Patriarch did not approve the Autocephaly of our Church."
 ukraine_poroh.6.a: "Печально"
 ukraine_poroh.7.t: "Украина хочет сотрудничества с Вышеградской четверкой"
 ukraine_poroh.7.d: "Украинское правительство четко изложило свои планы по сотрудничеству со странами Вышеградской четверки. Как представитель этой четверки, мы решаем, согласны ли мы на это сотрудничество?"
 ukraine_poroh.7.a: "Да"
 ukraine_poroh.7.b: "Нет"
 ukraine_poroh.8.t: "Сотрудничество с Вышеградскими странами"
 ukraine_poroh.8.d: "They agreed to cooperate."
 ukraine_poroh.8.a: "Хорошо"
 ukraine_poroh.9.t: "Сотрудничество с Вышеградскими странами"
 ukraine_poroh.9.d: "They refused to cooperate with us."
 ukraine_poroh.9.a: "Грустно"
 UKR_kefalia_agree: "Разрешение Вселенского Патриарха"
 UKR_odessa_ssaka: "Последствия губернаторства Саакашвили"
 UKR_odessa_ssak: "Последствия губернаторства Саакашвили"
 ukr_industry_points_cost_35: "35 очков промышленности"
 ukr_industry_points_cost_50: "50 очков промышленности"
 ukr_industry_points_cost_75: "75 очков промышленности"
 UKR_opfl_political_reforms: "Политические реформы"
 UKR_opfl_political_reforms_desc: "После последних событий наша страна нуждается в политических реформах. Без них Украина не сможет развиваться дальше."
 UKR_opfl_lustration_fight: "Борьба с люстрацией"
 UKR_opfl_lustration_fight_desc: "Люстрация - это ограничение доступа к государственным услугам для тех, кто занимал высокие должности при предыдущих политических режимах. После недавних событий эта политика проводится и в Украине. Это безобразие должно быть остановлено."
 UKR_opfl_radicalism: "Борьба с радикализмом"
 UKR_opfl_radicalism_desc: "За несколько лет политического хаоса радикализм распространился по всей Украине. Для мирного существования нашей страны необходимо бороться с любыми проявлениями радикализма в нашей стране."
 UKR_opfl_ukrainisation_policy: "Осуждение украинизации"
 UKR_opfl_ukrainisation_policy_desc: "The policy of Ukrainianisation directly interferes with the development of good relations with our big neighbour - Russia. It is necessary to condemn and stop the propaganda of Ukrainianisation, otherwise no good will come of it."
 UKR_opfl_national_ref: "Проведение общенационального референдума"
 UKR_opfl_national_ref_desc: "Национальный референдум поможет народу нашей страны определить свое будущее. Нам нужно сделать это как можно скорее!"
 UKR_opfl_independence_rep: "Признать независимость республик"
 UKR_opfl_independence_rep_desc: "Что ж, народ республик сделал свой выбор, и мы должны его уважать. Самое время инвестировать и налаживать связи с новыми государствами."
 UKR_opfl_take_republic: "Вернуть силой"
 UKR_opfl_take_republic_desc: "Референдум был всего лишь дымовой завесой. Наша настоящая цель — выявить сепаратистов на нашей территории, и пришло время вернуть наши территории домой! Сепаратисты не будут ходить по украинской земле!"
 UKR_opfl_federalisation_project: "Проект федерализации"
 UKR_opfl_federalisation_project_desc: "Теперь, когда все территориальные споры решены, мы можем смотреть в светлое будущее. Пришло время для Украинской Федерации!"
 UKR_opfl_economic_policy: "Новая экономическая политика"
 UKR_opfl_economic_policy_desc: "New economic policies will help revitalise our economy and subsequently rebuild it."
 UKR_opfl_rural_land: "Сохранение сельских земель"
 UKR_opfl_rural_land_desc: "Rural activities are a big part of our economy. Therefore, it is necessary to secure their legally acquired land. This way we will give them confidence that their land will not be taken away the next day."
 UKR_opfl_tarif_genocide: "Нет! Тарифный геноцид"
 UKR_opfl_tarif_genocide_desc: "Тарифный геноцид - это кошмар для наших граждан. Большая часть их денег уходит на уплату многочисленных и бессмысленных налогов. Мы должны сказать \"НЕТ\" этому беззаконию!"
 UKR_opfl_deindustry: "Остановить деиндустриализацию Украины"
 UKR_opfl_deindustry_desc: "После обретения Украиной независимости старое правительство раздало все промышленные богатства нашей страны кому попало и за бесценок. В результате мы оказались в промышленной яме. Нам нужно возобновить строительство фабрик, заводов и других предприятий."
 UKR_federaliz_tt: "Мы §Yфедерализируем§! Украину"
 UKR_rosava: "ЗАО \"Росава\""
 UKR_rosava_desc: "ЗАО \"Росава\" - крупнейший производитель шин в Украине. Производственные площадки расположены на двух шинных заводах: Росава и по производству крупногабаритных шин. Мощность достигает около 6 млн. шт. шин в год."
 UKR_land_land: "Продолжить земельную реформу"
 UKR_land_land_desc: "We are ready to continue the land reform that began in the last century and move it forward."
 UKR_motor_sich: "Мотор Сич"
 UKR_motor_sich_desc: "Акционерное общество «Мотор Сич» — украинский производитель авиадвигателей со штаб-квартирой в Запорожье. Компания производит двигатели для самолетов и вертолетов, а также промышленные морские газовые турбины и установки."
 UKR_armor_kyv: "The Kyiv Armored Plant"
 UKR_armor_kyv_desc: "The Kyiv Armored Plant is a state-owned enterprise of the armored industry of Ukraine, which performs diagnostics, repair, maintenance, re-equipment and modernization of Soviet-made armored vehicles."
 UKR_pivdenmash_idea: "ПО Пивденмаш"
 UKR_kyvarmor_idea: "Kyiv Armored Plant"
 UKR_zaz_idea: "ЗАЗ"
 UKR_kraz_idea: "КрАЗ"
 UKR_motorsich_idea: "Мотор Сич"
 UKR_start_war_against_poland: "Польско-украинская война"
 UKR_start_war_against_poland_desc: "Наступил решающий момент нашего государства. Мы дадим отпор врагу или исчезнем из мировой истории."
 UKR_hur_expandeds: "Расширить влияние ГУР"
 UKR_hur_expandeds_desc: "Мы будем расширять полномочия ГУР. Этого требует ситуация, этого требует война!"
 UKR_unite_with_russian_genshtab: "Заручиться помощью российского генштаба"
 UKR_unite_with_russian_genshtab_desc: "We are ready to enlist the help of the Russian General Staff for the war with the Polish Army."
 UKR_observer_joint_shtab_kiev: "Создать объединенный штаб"
 UKR_observer_joint_shtab_kiev_desc: "The armed forces of Russia and Ukraine will create a joint general staff in Kyiv."
 UKR_professional_shturm_groups: "Штурмовые бригады"
 UKR_professional_shturm_groups_desc: "Мы начнем набирать людей в штурмовые бригады, чтобы более эффективно противостоять нашим врагам"
 UKR_pmc_zaporozhets: "ЧВК \"Запорожец\""
 UKR_pmc_zaporozhets_desc: "Некоторые ветераны войны создали свою частную военную компанию под названием \"Запорожец\"."
 UKR_start_the_kashubian_uprising: "Подготовить восстание в Кашубии"
 UKR_start_the_kashubian_uprising_desc: "We will prepare an insurgency in this region to undermine Poland's defense."
 UKR_silesian_rebellion: "Подготовить восстание в Силезии"
 UKR_silesian_rebellion_desc: "We will prepare an insurgency in this region to undermine Poland's defense."
 UKR_vilnoe_pospolitoe_rushenie: "Батальон \"Посполитая Русь\""
 UKR_vilnoe_pospolitoe_rushenie_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_belarus_volunteers: "Батальон Рокоссовского"
 UKR_belarus_volunteers_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_legion_free_poland: "Легион Свободы Польши"
 UKR_legion_free_poland_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_polish_hetmanate_army: "Батальон Польского Гетманата"
 UKR_polish_hetmanate_army_desc: "A new operational Battalion of the HUR will be created to conduct special limited operations on enemy territory."
 UKR_air_dominance_tactics: "Тактика авиационного господства"
 UKR_air_dominance_tactics_desc: "We need to suppress Polish Aviation, so we will apply a new doctrine."
 UKR_tro_expandeds: "Укреплять территориальную оборону"
 UKR_tro_expandeds_desc: "Мы расширим набор на территориальную оборону. Нам срочно нужны бойцы!"
 UKR_start_war_against_russia: "Русско-украинская война"
 UKR_start_war_against_russia_desc: "Наступил решающий момент нашего государства. Мы дадим отпор врагу или исчезнем из мировой истории."
 UKR_hur_expanded: "Расширить влияние ГУР"
 UKR_hur_expanded_desc: "Мы будем расширять полномочия ГУР. Этого требует ситуация, этого требует война!"
 UKR_tro_expanded: "Укреплять территориальную оборону"
 UKR_tro_expanded_desc: "Мы расширим набор в территориальную оборону. Нам срочно нужны бойцы!"
 UKR_tck: "Массовая мобилизация"
 UKR_tck_desc: "We will have to start mass mobilization, because this is literally a war for the existence of our state."
 UKR_other_battaions_hur: "Новые батальоны ГУР"
 UKR_other_battaions_hur_desc: "HUR is actively recruiting fighters into its battalions, some of them are already ready to join the battle."
 UKR_free_russia_legion: "Легион Свободы России"
 UKR_free_russia_legion_desc: "Real Russian patriots are ready to fight for us and overthrow the tyranny that hangs over Russia."
 UKR_rdk: "Русский добровольческий корпус"
 UKR_rdk_desc: "Russian nationalists who do not agree with Russia's policy have self-organized under our command into the Russian volunteer corps."
 UKR_republican_army: "Национальная республиканская армия"
 UKR_republican_army_desc: "Fugitive deputies from Russia have created a national Republican Army, which will conduct active guerrilla activities against the regime."
 UKR_separatist_battalions: "Привлечь сепаратистские батальоны"
 UKR_separatist_battalions_desc: "Not only Russians, but also other nations are ready to fight for freedom from Russian imperialism."
 UKR_drone_army: "Армия дронов"
 UKR_drone_army_desc: "We will start mass production of drones. The country needs thousands of drones."
 UKR_tck_mobka: "Тотальная мобилизация"
 UKR_tck_mobka_desc: "We are forced to carry out several waves of mobilization to replenish our armed forces."
 UKR_attack_guardia: "Наступательная гвардия"
 UKR_attack_guardia_desc: "Мы готовы перейти от обороны к наступлению! Атакуйте, чтобы победить врага!"
 UKR_inter_legion_idea: "Международный легион"
 UKR_inter_legion_idea_desc: "Many foreigners from all over the world are ready to support us in our struggle for independence."
 UKR_air_superior_idea: "Тактика воздушного господства"
 UKR_air_superior_idea_desc: "We strive to gain air superiority."
 UKR_hur_other_battalions_created_tt: "§YНовые батальоны ГУР§! будут созданы"
 UKR_free_russia_created_tt: "§YЛегион Свободы России§! будет доступен для специальных ограниченных операций"
 UKR_rdk_created_tt: "§YРусский добровольческий корпус§! будет доступен для специальных ограниченных операций"
 UKR_republican_army_created_tt: "§YРегиональные сепаратистские батальоны§! станут доступны для специальных операций"
 UKR_free_poland_created_tt: "§YЛегион Свободы Польши§! будет доступен для специальных ограниченных операций"
 UKR_rushenie_created_tt: "§YБатальон \"Посполитая Русь\" будет доступен для специальных ограниченных операций"
 UKR_rokossovski_created_tt: "§YБатальон Рокоссовского§! будет доступен для специальных ограниченных операций"
 UKR_hetmanat_created_tt: "§YБатальон Польского Гетманата§! будет доступен для специальных ограниченных операций"
 UKR_polish_army_created_tt: "§YПольская освободительная армия§! будет доступна для специальных ограниченных операций"
 ukraine_firtash.1.t: "Фирташ объявил о создании республики"
 ukraine_firtash.1.d: "Dmitry Firtash, one of the richest oligarchs in Ukraine, announced the creation of the Podolia Republic as an autonomy within Ukraine. This has caused a shock to our government and now we have to decide what to do about it."
 ukraine_firtash.1.a: "Нет автономии"
 ukraine_firtash.1.b: "Возможно, это будет выгодно для нас"
 ukraine_firtash.2.t: "Наша армия"
 ukraine_firtash.2.d: "Those units that we personally funded have sided with us, now they are our main striking force."
 ukraine_firtash.2.a: "За свободу Подолья!"
 ukraine_kolom.1.t: "Коломойский объявил о создании республики"
 ukraine_kolom.1.d: "Igor Kolomoisky, one of the richest oligarchs in Ukraine, announced the creation of the Dnipropetrovsk Republic as an autonomy within Ukraine.  This has caused a shock to our government and now we have to decide what to do about it."
 ukraine_kolom.1.a: "Нет автономии"
 ukraine_kolom.1.b: "Возможно, это будет полезно для нас"
 ukraine_kolom.2.t: "Наша армия"
 ukraine_kolom.2.d: "Those units that we personally funded have sided with us, now they are our main striking force."
 ukraine_kolom.2.a: "За свободу Днепра!"
 UKR_recruit_arestovich: "Завербовать Арестовича"
 UKR_recruit_arestovich_desc: "Arestovich will become an excellent agent of our special services, his outstanding skills will be useful to us."
 UKR_korchinsky_strategy: "Стратегия Корчинского"
 UKR_korchinsky_strategy_desc: "Korchinsky's strategy involves fighting Western elements as well...The fight against the external enemy that really threatens the sovereignty of Ukraine."
 UKR_psiop_operations: "Псиоп-операции"
 UKR_psiop_operations_desc: "We have mastered the technique of psychological operations, and we are ready to use it against our enemies."
 UKR_bratstvo_psiop_idea: "Псиоп-операции"
 UKR_bratstvo_psiop_idea_desc: "The enemy must also be broken mentally, for this we will conduct psyop operations."
 UKR_vitrenko_party: "Новый социализм"
 UKR_vitrenko_party_desc: "Украина уже давно находится в плену националистических и прозападных настроений, которые разрывают страну пополам. Мы же дадим нашим гражданам то, что они ищут - стабильность и процветание. Наш социализм сделает их счастливыми."
 UKR_economic_orthodoxy: "Экономическое православие"
 UKR_economic_orthodoxy_desc: "Наша страна должна быть сильной не только экономически, но и духовно. Почему бы не объединить эти два аспекта?"
 UKR_install_christian_socialism: "Христианский социализм"
 UKR_install_christian_socialism_desc: "We will not give up our socialist ideas, because we continue to believe in God, the ideologists of socialism led it to collapse because they distanced themselves from God, we will not repeat their mistakes."
 UKR_iron_woman: "Стальная женщина"
 UKR_iron_woman_desc: "Natalia Vitrenko, like steel, protects the ideas that she sees as the only right ones for Ukraine and is not going to bend to anyone."
 UKR_resovetization: "Ресоветизация"
 UKR_resovetization_desc: "The Soviet era gave our country a development that it did not see under any government, not under the Tsar, not under the Poles, not under independence. We accept this fact and will promote the cult of Socialism."
 UKR_rally_out_the_coalition: "Национальная коалиция"
 UKR_rally_out_the_coalition_desc: "Supporters of completely different ideas, national Bolsheviks, supporters of the Russian Empire, socialism and Russophiles have united under the banners of our party, all together - we will turn our country into the best state in history."
 UKR_praymaya_electro_demokratia: "Прямая электро-демократия"
 UKR_praymaya_electro_demokratia_desc: "We have had enough of dictatorship and totalitarianism, our people deserve democracy at its best."
 UKR_storm_sturm_at_parliament: "Штурм парламента"
 UKR_storm_sturm_at_parliament_desc: "We will get rid of those who sabotage our activities in our government agencies."
 UKR_befriend_russia_vit: "Партнерство с Россией"
 UKR_befriend_russia_vit_desc: "Historically, we are connected with Russia and will always be connected with it - our partnership with Russia is something that should be obvious as the sunrise."
 UKR_apply_to_union_state: "Присоединиться к Союзному государству"
 UKR_apply_to_union_state_desc: "The Union State is one of the first and most important stages of the unity of our united people, we intend to become part of this project."
 UKR_honor_russian_empire: "Уважать наследие Российской империи"
 UKR_honor_russian_empire_desc: "The Russian Empire was a great power and it would be stupid and unfair to deny its achievements, we remember the greatness of the Romanovs."
 UKR_free_healthcare: "Бесплатное здравоохранение"
 UKR_free_healthcare_desc: "Мы вернем советскую практику бесплатного здравоохранения. Граждане должны быть здоровы!"
 UKR_national_bolshevist_rhetoric: "Национал-большевистская риторика"
 UKR_national_bolshevist_rhetoric_desc: "Our party also borrows many things from the program of the National Bolsheviks, with which we unanimously agree."
 UKR_russo_ukrainian_nationalism: "Русско-украинский национализм"
 UKR_russo_ukrainian_nationalism_desc: "Our peoples must always rise up and remember their greatness, we will actively support the nationalist movements of our countries."
 UKR_naz_pioners: "Национальные пионеры"
 UKR_naz_pioners_desc: "The pioneer was a great idea of the Soviet leadership, we will revive it, but with our special specifics."
 UKR_calm_ruthenia: "Объявить себя наследниками Рутении"
 UKR_calm_ruthenia_desc: "We believe that the legacy of Ancient Ruthenia should also not be forgotten! We will remind everyone that Ruthenia existed on these lands."
 UKR_proclaim_rus_ukraine: "Объявить о возрождении Рутении"
 UKR_proclaim_rus_ukraine_desc: "Рутения возрождается! Именно сегодня, здесь, на землях Украины!"
 UKR_federalize_galicia_and_zakarpat: "Федерализация Галиции"
 UKR_federalize_galicia_and_zakarpat_desc: "It's time to resolve the separatist issue in Galicia, only Federalization will save us."
 UKR_lnr_dnr_peace_integrate: "Федерализация Восточной Украины"
 UKR_lnr_dnr_peace_integrate_desc: "The mistakes committed by the previous government, now we must decide. We are ready for a federalization project to end the division of our country."
 UKR_suppress_western_and_bander: "Подавить западное влияние"
 UKR_suppress_western_and_bander_desc: "The influence of the West should be purposefully weakened in our country."
 UKR_restore_russian_church: "Вернуться к русской церкви"
 UKR_restore_russian_church_desc: "Autocephaly was a mistake, we have spiritually distanced ourselves from our brothers, and we do not intend to repeat such a mistake anymore."
 UKR_no_to_upc: "Расторгнуть Украинскую Православную Церковь"
 UKR_no_to_upc_desc: "Heretics must be disbanded."
 UKR_clear_out_pcu: "Очистить церковь"
 UKR_clear_out_pcu_desc: "The supporters of Autocephaly and all their sympathizers must be brought under our control."
 UKR_restore_apostolacy: "Возвращение РПЦ"
 UKR_restore_apostolacy_desc: "Русская Православная Церковь снова господствует на нашей земле!"
 UKR_full_socialism: "Упор на социализм"
 UKR_full_socialism_desc: "Мы еще глубже погрузимся в доктрины социализма и продолжим внедрять их в нашей стране."
 UKR_install_true_soviet_folk: "Народный социализм"
 UKR_install_true_soviet_folk_desc: "Мы сделаем все, чтобы наш гражданин чувствовал себя счастливым."
 UKR_appease_pro_russian_oligarchs: "Сотрудничать с пророссийскими олигархами"
 UKR_appease_pro_russian_oligarchs_desc: "Мы готовы наладить сотрудничество с пророссийской олигархией, потому что их инвестиции укрепят нашу экономику."
 UKR_loyalist_oligarchy_ens: "Принять лояльных олигархов"
 UKR_loyalist_oligarchy_ens_desc: "Лояльные олигархи также будут на нашей стороне, тем самым обеспечивая свои финансы внутри страны."
 UKR_industrial_revival: "Промышленное возрождение"
 UKR_industrial_revival_desc: "Наша страна осталась без своей промышленной мощи после распада СССР, пришло время возродить её."
 UKR_national_feminism: "Национальный феминизм"
 UKR_national_feminism_desc: "Женщины также должны стать двигателем роста нашей страны, и мы будем поощрять их участие во всех отраслях."
 UKR_foreign_policy_det: "Наш внешнеполитический курс"
 UKR_foreign_policy_det_desc: "Наша страна должна сама решить, какой путь она выберет в внешней политике."
 UKR_fully_antagonize_the_west: "Антагонизм к Западу"
 UKR_fully_antagonize_the_west_desc: "Мы не намерены дружить с Западом, потому что знаем, что у Запада нет друзей - только рабы и слуги."
 UKR_ukr_sov_mil_coop: "Военное сотрудничество с Россией"
 UKR_ukr_sov_mil_coop_desc: "Мы проведем серию военных учений с российской армией."
 UKR_euroscepticism_campaign: "Мощный евроскептицизм"
 UKR_euroscepticism_campaign_desc: "Мы были и останемся евроскептиками."
 UKR_join_csto: "Вступить в ОДКБ"
 UKR_join_csto_desc: "Мы готовы подписать документ о вступлении в ОДКБ. Только Россия может дать нам гарантии безопасности."
 UKR_reconcile_with_west: "Улучшить взаимодействие с Западом"
 UKR_reconcile_with_west_desc: "Мы намерены улучшить взаимодействие с западными странами."
 UKR_nato_ukr_train: "Учения со странами НАТО"
 UKR_nato_ukr_train_desc: "Мы будем частично продвигать доктрину НАТО в наших вооруженных силах, а также проведем с ними ряд учений."
 UKR_join_nato_with_russia: "Вступление в НАТО вместе с Россией"
 UKR_join_nato_with_russia_desc: "Мы намерены вступить в НАТО, но только вместе с Россией, и предложим эту идею российскому правительству."
 UKR_full_nazbol_transition: "Нац-большевистское возрождение"
 UKR_full_nazbol_transition_desc: "Пришло время очередного этапа развития нашей страны и всей славянской семьи в принципе. Мы вступаем на путь единения славян."
 UKR_serbia_unify: "[SER.GetAdjective] революция нацболов"
 UKR_serbia_unify_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
 UKR_bulgaria_unification: "[BUL.GetAdjective] революция нацболов"
 UKR_bulgaria_unification_desc: "Our brothers will finally be freed from the government that oppressed them as a Slavic nation!"
