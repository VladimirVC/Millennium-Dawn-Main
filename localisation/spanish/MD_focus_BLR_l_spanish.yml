 mensk: "Mensk."
 shatilki: "Shatilki."
 berestye: "Berestye."
 blr_union_with_russia_info: "[SOV.GetName] será la marioneta\nEl jugador será transferido a [SOV.GetName]"
 BLR_belarus_nati_modifier: "Política estatal de Bielorrusia"
 BLR_belarus_nati_modifier_desc: "El ascenso al poder de las fuerzas nacionalistas en Bielorrusia ha afectado en gran medida su política interior y exterior. La prioridad era el poder y la fuerza de la nación, la propaganda del gran pasado y el revanchismo, por la grandeza bielorrusa perdida."
 BLR_belarus_police_modifier: "Seguridad interna de Bielorrusia"
 BLR_belarus_police_modifier_desc: "El gobierno bielorruso tiene una gran experiencia desde su época como parte de la URSS en la represión de la disidencia y de los agentes enemigos."
 BLR_belarus_kommi_modifier: "La política de la Bielorrusia comunista"
 BLR_belarus_kommi_modifier_desc: "El gobierno comunista de Bielorrusia está intentando activamente revivir, tanto en la propaganda como en la acción, todo lo mejor que había en la época soviética."
 BLR_Polonez: "Polonez"
 BLR_btr60: "BTR-60"
 BLR_btr70: "BTR-70"
 BLR_kobra_k: "Cobra-K"
 tracktors_TT: "Se producirán nuevos tractores"
 BLR_new_railways: "Nuevos ferrocarriles"
 BLR_constitution_BSSR: "La Constitución de la BSSR"
 BLR_constitution_BSSR_desc: "Para empezar, es necesario restaurar la Constitución de la BSSR."
 BLR_Excursion_Vilnius: "Excursión a Vilnius"
 BLR_Excursion_Vilnius_desc: "Wagner fighters are actively agitating and expressing a desire to arrange an \"excursion\" to Vilnius. We can help them organize it. A border crossing from our territory is theoretically possible, but will Lithuania declare war on us afterwards?"
 BLR_vilnius_return: "Integración de Vilnius"
 BLR_belorusisation_vilnius: "Bielorrusización de Vilnius"
 BLR_belorusisation_vilnius_desc: "Vilnius has long been a disputed region that we sought to possess, but now that we have secured it, we are ready to promote to the masses the idea of settling the region with Belarusians."
 BLR_new_democratic_constitution: "Una nueva constitución democratica"
 BLR_new_democratic_constitution_desc: "It is time to adopt a new constitution consistent with Western democracy."
 BLR_Great_stone_china: "Gran Piedra de China"
 BLR_national_library: "Biblioteca Nacional de Bielorrusia"
 BLR_Transnistria_enemy: "Resolver el problema de Transnistria"
 BLR_Transnistria_enemy_desc: "Transnistria is a small, unrecognized state that has long been a headache for Moldova. We are ready to help them solve this problem — by taking these lands for ourselves, of course."
 BLR_transnistria_claims: "Reclamaciones territoriales a §Y[PMR.GetNamewithFlag]§!"
 BLR_batka_krut_TT: "¡Vamos a §Rlimpiar§! la §Yesfera política§!, dejando sólo §Gunos pocos partidos leales a nosotros§! y §Gcrearemos un verdadero partido patriótico§! para §YLukashenko§!"
 belarus_politics.1.t: "La nueva realidad política"
 belarus_politics.1.d: "Aunque la victoria sobre los manifestantes fue monumental, todavía hay una amplia red de organizaciones y partidos de oposición que esperan la hora de destruir nuestro país. Para evitarlo, tenemos que limpiar por completo el campo político de políticos y organizaciones innecesarias, dejando sólo partidos leales a nosotros, y también podemos necesitar nuestro propio partido político para controlar la esfera política. O podemos dejar todo como está, pero el enemigo seguirá teniendo las herramientas para influir en nosotros a nivel nacional."
 belarus_politics.1.a: "¡Agítalos!"
 belarus_politics.1.b: "No enojemos más a la gente."
 BLR_revoult_army_gco_drone_desc: "We will actively use drones in our army to improve its effectiveness."
 BLR_potato_empire_idea: "Imperio de la Papa"
 BLR_country_for_life_idea: "País para Toda la Vida"
 BLR_pension_reform_idea: "Reforma de pensiones"
 BLR_agriculture2: "Intensificar las empresas rurales privadas"
 BLR_agriculture2_desc: "Further privatization of Belarus' agricultural sector."
 BLR_country_for_life_idea_desc: "'Country for Life' is a slogan and movement associated with Belarusian blogger and activist Sergei Tikhanovsky. It represents a vision of a Belarus where ordinary citizens can live freely and without fear."
 BLR_pension_reform_idea_desc: "Los fondos de pensiones son vitales para el funcionamiento de nuestra sociedad y es necesario realizar algunos cambios para que funcionen mejor."
 BLR_assembly_shop_of_europe: "Taller de montaje de Europa"
 BLR_assembly_shop_of_europe_desc: "As perhaps one of the most overlooked economies, Belarus has the potential to overtake Russia economically. But that will only happen if we focus on fixing the root problems that exist, as for years we have neglected even the most basic investments into our economy."
 BLR_increase_livestock_imports: "Aumento de las importaciones de ganado"
 BLR_increase_livestock_imports_desc: "§C'This milk tastes funny'§!\n\nOur people need animals, not just to eat, but also to produce goods. Cows are particularly valuable for their dairy output. With many use cases, dairy could give a serious boost to our agricultural sector."
 BLR_proportional_mining: "Minería proporcional"
 BLR_proportional_mining_desc: "We cannot dig for resources just anywhere we want; proper infrastructure must be established beforehand. We must establish mines only in areas that warrant the need for resources, and will only construct new mines in areas with an industrial sector. Of course, this will worsen air quality, but at least [BLR.GetLeader] will be able to finance some nice palaces."
 BLR_industrial_wide_reform: "Reforma a nivel industrial"
 BLR_industrial_wide_reform_desc: "While the heart of Belarusian industry is beating strong, it could beat even stronger. We will initiate a series of reforms to enhance knowledge on sustainable industrial expansion."
 BLR_fostering_automotive_innovation: "Fomento de la innovación en la automoción"
 BLR_fostering_automotive_innovation_desc: "While Belarus is not yet world-renowned for its automotive industry, that does not mean the idea is entirely out of the picture. With the right amount of motivation and propaganda (and maybe some funding), we will kick-start an automotive titan to rival the likes of Germany. Maybe."
 BLR_the_fate_of_belarusian_steel_works: "El destino de las acerías bielorrusas"
 BLR_the_fate_of_belarusian_steel_works_desc: "Fundada en 1984, OJSC Belarusian Steel Works suministra a la industria bielorrusa acero de primera calidad, como no se puede encontrar en ningún otro lugar del mundo."
 BLR_tractors: "El tractor más fuerte de Europa"
 BLR_tractors_desc: "One thing Belarusian industry is known for is its reliable tractors, with Belarusian farmers being the envy of Europe. Funding the tractor industry would benefit the economy even further, as we will be able to equip our farms with state-of-the-art equipment."
 BLR_buses: "The East's Bus"
 BLR_buses_desc: "Luckily, our brilliant engineers at several companies have been able to decode the impossible task of constructing somewhat reliable buses. With that in mind, our buses could only improve. With a little luck and some funding, we will get to work and construct the best bus found anywhere east of Britain."
 BLR_trains: "Revitalizar Bielaruskaja Cyhunka"
 BLR_trains_desc: "§R'Faster than any bullet train!'§!\n\nBielaruskaja Čyhunka, also known as Belarusian Railway by the English-speaking world, has been at the forefront of building railway infrastructure for the many citizens living within our borders. Reporting directly to the Ministry of Transport, Belarusian Railway is one of the successor companies from the Soviet era and is currently projected to continue its monopoly on Belarusian railways. We can revitalize Bielaruskaja Čyhunka and also bankroll certain train producers to best fit the needs of Belarusian commuters."
 BLR_infrastructure_contracts: "Proposed Infrastructure Contracts"
 BLR_new_paths: "Todos los caminos llevan a [BLR.capital.GetCapitalVictoryPointName]"
 BLR_revamp_railroads: "Ferrocarriles renovados"
 BLR_revamp_railroads_desc: "El sistema ferroviario nacional adolece de equipos obsoletos y un servicio lento. Modernizarlo con estándares modernos acortará los tiempos de viaje y reducirá los problemas de mantenimiento. Un sistema ferroviario más sólido impulsa el transporte civil e industrial."
 BLR_belneftekhim: "Fortalecer Belneftekhim"
 BLR_belneftekhim_desc: "Belneftekhim desempeña un papel central en la petroquímica bielorrusa, pero necesita modernizarse para seguir siendo competitiva. Invertir en nuevas tecnologías y procesos de refinación aumenta la calidad de nuestros productos. Estas mejoras nos ayudan a consolidar nuestra posición en los mercados globales."
 BLR_the_belaruskali_monopoly: "Mantener el monopolio de Belaruskali"
 BLR_the_belaruskali_monopoly_desc: "Belaruskali es uno de nuestros activos más valiosos, y mantener intacto su monopolio garantiza ingresos predecibles. Fortalecer su posición en el mercado ayuda a proteger la influencia bielorrusa en la industria de la potasa. La estabilidad en este sector favorece una planificación económica más amplia."
 BLR_uplift_grodno_azot: "Mejorar Grodno Azot"
 BLR_uplift_grodno_azot_desc: "Grodno Azot produce productos químicos esenciales para la agricultura y la industria. La modernización de sus instalaciones aumentará la eficiencia y reducirá los residuos. El apoyo a esta planta fortalece nuestro sector químico en su conjunto."
 BLR_tend_to_oil_shale: "La búsqueda de esquisto bituminoso"
 BLR_tend_to_oil_shale_desc: "Bielorrusia posee yacimientos potenciales de esquisto bituminoso que permanecen en gran parte inexplorados. La investigación y el desarrollo de estos yacimientos podrían diversificar nuestras fuentes de energía. Incluso pequeños descubrimientos reducirían la dependencia de las importaciones extranjeras."
 BLR_award_chinese_contractors: "Adjudicar contratos a empresas chinas"
 BLR_award_chinese_contractors_desc: "Las constructoras chinas ofrecen licitaciones competitivas y entregas rápidas de proyectos. Adjudicarles contratos importantes puede acelerar nuestros planes de infraestructura. Esta medida también fortalece los lazos diplomáticos y económicos con Pekín."
 BLR_award_luxembourgian_contractors: "Apaciguar a los luxemburgueses"
 BLR_award_luxembourgian_contractors_desc: "Las empresas luxemburguesas ofrecen trabajos de alta calidad y esperan un acceso justo a nuestros mercados. Otorgarles contratos clave mejora las relaciones y demuestra nuestra disposición a cooperar. Su participación también puede mejorar los estándares de construcción en el país."
 BLR_potash_safety_and_hazards_regulation: "Normativa de seguridad y riesgos de la potasa"
 BLR_potash_safety_and_hazards_regulation_desc: "La minería de potasa conlleva riesgos significativos si se ignoran las normas de seguridad. Establecer regulaciones más estrictas protege a los trabajadores y previene accidentes. Una industria más segura también garantiza una producción más estable y fiable."
 BLR_bountiful_fields: "Cultivar campos abundantes"
 BLR_bountiful_fields_desc: "Bielorrusia tiene un suelo fértil, pero sus rendimientos son irregulares. Extender el apoyo a los agricultores e implementar mejores prácticas puede transformar nuestros campos en cosechas confiables. Este esfuerzo mejora la seguridad alimentaria y fortalece a las comunidades rurales."
 BLR_speed_up_land_reformation: "Acelerar la reforma agraria"
 BLR_speed_up_land_reformation_desc: "La reforma agraria ha avanzado de forma lenta y desigual en todo el país. Acelerar este proceso ayudará a los agricultores a ganar estabilidad y fomentará la inversión. Unas normas de propiedad más claras mejoran la productividad agrícola general."
 BLR_reinforce_government_support_for_agriculture: "Reforzar el apoyo a la agricultura"
 BLR_reinforce_government_support_for_agriculture_desc: "La agricultura sigue siendo un pilar de la sociedad bielorrusa y requiere un fuerte respaldo gubernamental. Aumentar los subsidios, la capacitación y el acceso a equipos aumentará la producción y protegerá a los pequeños agricultores. Un sector agrícola resiliente sustenta la estabilidad nacional."
 BLR_achieving_self_sufficiency: "Perseguir la autosuficiencia"
 BLR_achieving_self_sufficiency_desc: "Reducing reliance on imports strengthens national independence and economic stability. By developing domestic industries and improving productivity, Belarus can meet more of its own needs. Achieving this goal will take time but is essential for long-term resilience."
 BLR_streamline_taxation: "Simplificar la tributación"
 BLR_streamline_taxation_desc: "Un sistema tributario complejo frena el crecimiento empresarial y frustra a los inversores. Simplificar las normas fomenta el emprendimiento y reduce los retrasos burocráticos. Una tributación más clara puede aumentar los ingresos al facilitar el cumplimiento normativo."
 BLR_counterurbanization: "Políticas de contraurbanización"
 BLR_counterurbanization_desc: "Las zonas rurales siguen perdiendo población hacia las ciudades, lo que genera un desarrollo desigual. Las políticas de contraurbanización buscan apoyar a las aldeas mediante nuevas inversiones y mejores servicios. El fortalecimiento de la vida rural contribuye a equilibrar el crecimiento en todo el país."
 BLR_potash_large_reserves: "Grandes reservas de potasa"
 BLR_agriculture_reduced: "Agricultura reducida"
 BLR_belneftekhim_idea: "Belneftekhim"
 BLR_streamlined_taxation: "Tributación simplificada"
 BLR_safety_protocols_in_place: "Protocolos de seguridad implementados"
 BLR_disease_amongst_livestock: "Enfermedades en el ganado"
 BLR_belarusian_trains: "Los Conductores Stede"
 BLR_treading_on_thin_steel: "Pisando acero fino"
 BLR_treading_on_thin_steel_desc: "In terms of our economy, we are treading on thin steel now that all the ice has melted. We will need to reinforce this steel by further advancing our industry, whether through resources or production."
 BLR_agricultural_shock: "Shock agrícola"
 BLR_agricultural_shock_desc: "Avanzamos demasiado rápido en la transición de nuestra economía hacia un enfoque industrial y, como resultado, nuestro sector agrícola se ha visto gravemente afectado."
 BLR_automotive_industry: "Sector automovilístico bielorruso"
 BLR_automotive_industry_desc: "Cuatro puertas y quizás una rueda es todo lo que se necesita para una maquinaria bielorrusa fiable, confiable y moderna. Con nuestra expansión en el sector automotriz, nos aseguraremos de superar a esos incompetentes que trabajan para Mercedes o BMW."
 BLR_activates_fermer_mission_TT: "£text_icon_kaldanger Se activará una §Hmisión§! que nos obliga a construir §HDistritos agrícolas§! in certain regions\n - El incumplimiento de estas demandas puede generar descontento agrario.\n - Si tenemos éxito, recibiremos un impulso a la economía nacional."
 BLR_livestock_warning_TT: "£text_icon_kaldanger Habrá un riesgo de que las enfermedades §Rmaten§! a nuestro ganado dependiendo de nuestro nivel de investigación en §Hingeniería genética§!\n\n§H500§! vacas serán importadas de un estado amigo"
 BLR_steel_warning_TT: "£text_icon_kaldanger Si iniciamos reformas para orientar nuestra economía hacia un §Henfoque industrial§! sin tener §H11 industrias civiles§! primero, podríamos experimentar una breve crisis"
 BLR_potash_purchase_TT: "Haremos un intento de compra de §Hequipos de seguridad§! para nuestros trabajadores, pero no hacemos promesas"
 BLR_oil_shale_TT: "Cada estado con al menos §H3 Reservas de Recursos Estratégicos§! recibirá £oil_texticon §H2§! petróleos"
 BLR_factory_to_steel_TT: "Comenzaremos §Hoperaciones mineras§! en cada estado con §H1 industria Civil§! o más"
 belarus_md.1.t: "Se avecina una crisis agrícola"
 belarus_md.1.d: "Tras nuestro cambio repentino hacia una economía orientada a la industria, nuestro sector agrícola sufrió un shock repentino ya que el apoyo gubernamental se retiró sin ninguna infraestructura adecuada a la que pudiéramos recurrir. Como resultado, nuestro sector agrícola ha sufrido un golpe que tardará un año en recuperarse por completo."
 belarus_md.1.a: "Maldita sea"
 belarus_md.2.t: "¿Privatizar o no?"
 belarus_md.2.d: "The OJSC Belarusian Steel Works was founded in 1984 during the Soviet era. Since then, much has changed, and the collapse of the Union has led us to open our markets to some degree. There have been calls from within the state to privatize the company and tap into the revenue it would generate, but others are warning us against letting such an important enterprise pass into private hands."
 belarus_md.2.a: "¡No privatizaremos!"
 belarus_md.2.b: "La privatización es la única respuesta"
 belarus_md.3.t: "La enfermedad se propaga rápidamente entre el ganado"
 belarus_md.3.d: "Tras la importación de unas 500 vacas de un país amigo, nuestros analistas expertos comenzaron a notar un fuerte aumento de la muerte de ganado en toda Bielorrusia. Tras investigaciones adicionales se determinó que una vaca importada singular era portadora de la encefalopatía espongiforme bovina, también conocida como 'enfermedad de las vacas locas'. Como resultado, algunos ciudadanos ya han sido ingresados ​​en hospitales por contraer una variante de la enfermedad transmitida por una vaca."
 belarus_md.3.a: "Ojalá las cosas salieran bien"
 BLR_peleng_desc: "JSC Peleng es una empresa bielorrusa con sede en Minsk, especializada en el desarrollo y la producción de sistemas optoelectrónicos para fines militares y civiles. Es la empresa líder en la industria optoelectrónica en Bielorrusia."
 BLR_infrastructure_contracts_desc: ""
 BLR_baltic_revolution_category: "Baltic Communist Revolution"
 BLR_baltic_revolution_category_desc: "The workers of Lithuania and Latvia yearn for liberation from their bourgeois overlords. Through a combination of covert operations, political subversion, and popular uprising, we will bring the revolution to the Baltic states and forge a new LitBel state."
 BLR_establish_cooperation_lit: "Establish Cooperation With Lithuanian Communists"
 BLR_establish_cooperation_lit_desc: "Communist elements in Lithuania are fragmented and cut off from power. We must establish covert contact with them to lay the groundwork for future operations."
 BLR_finance_protests_lit: "Finance Communist Protests in Lithuania"
 BLR_finance_protests_lit_desc: "Funding organised demonstrations will draw public attention to communist causes and destabilise the current Lithuanian government."
 BLR_recruit_sympathizers_lit: "Recruit Lithuanian Sympathizers"
 BLR_recruit_sympathizers_lit_desc: "The ethnic Belarusian minority in Lithuania provides a pool of potential sympathisers. We can recruit local operatives to advance our influence."
 BLR_spread_propaganda_lit: "Spread LitBel Propaganda in Lithuania"
 BLR_spread_propaganda_lit_desc: "A coordinated propaganda campaign promoting the strength of a unified Lithuanian-Belarusian state will shift public opinion toward cooperation."
 BLR_bribe_military_lit: "Bribe Lithuanian Military Officers"
 BLR_bribe_military_lit_desc: "Several Lithuanian military officers have expressed dissatisfaction with the current government. Financial incentives may convince them to support our cause."
 BLR_bribe_politicians_lit: "Bribe Lithuanian Politicians"
 BLR_bribe_politicians_lit_desc: "With enough coin, key members of the Lithuanian parliament can be persuaded to advance communist legislation and weaken the ruling coalition."
 BLR_raise_revolt_lit: "Raise a Communist Revolt in Lithuania"
 BLR_raise_revolt_lit_desc: "With sufficient influence over Lithuania, we can trigger a communist uprising, overthrow the government, and install a friendly regime."
 BLR_establish_cooperation_lat: "Establish Cooperation With Latvian Communists"
 BLR_establish_cooperation_lat_desc: "Communist elements in Latvia are fragmented and cut off from power. We must establish covert contact with them to lay the groundwork for future operations."
 BLR_finance_protests_lat: "Finance Communist Protests in Latvia"
 BLR_finance_protests_lat_desc: "Funding organised demonstrations will draw public attention to communist causes and destabilise the current Latvian government."
 BLR_recruit_sympathizers_lat: "Recruit Latvian Sympathizers"
 BLR_recruit_sympathizers_lat_desc: "The ethnic Belarusian minority in Latvia provides a pool of potential sympathisers. We can recruit local operatives to advance our influence."
 BLR_spread_propaganda_lat: "Spread LitBel Propaganda in Latvia"
 BLR_spread_propaganda_lat_desc: "A coordinated propaganda campaign promoting the strength of a unified Latvian-Belarusian state will shift public opinion toward cooperation."
 BLR_bribe_military_lat: "Bribe Latvian Military Officers"
 BLR_bribe_military_lat_desc: "Several Latvian military officers have expressed dissatisfaction with the current government. Financial incentives may convince them to support our cause."
 BLR_bribe_politicians_lat: "Bribe Latvian Politicians"
 BLR_bribe_politicians_lat_desc: "With enough coin, key members of the Latvian parliament can be persuaded to advance communist legislation and weaken the ruling coalition."
 BLR_raise_revolt_lat: "Raise a Communist Revolt in Latvia"
 BLR_raise_revolt_lat_desc: "With sufficient influence over Latvia, we can trigger a communist uprising, overthrow the government, and install a friendly regime."
