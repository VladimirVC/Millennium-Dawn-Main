 faction_manifest_hol_germanic_union: "We, the sons and daughters of the ancient North, declare the rebirth of the Germanic Brotherhood, a union beyond borders, forged in spirit and heritage. In an age of rootless decay, we rise to restore the dignity of our kindred peoples, bound by language, culture, and the eternal call of our ancestors. We reject division, corruption, and the weakness of imposed empires. Our allegiance lies not with nations but with the enduring essence of the Germanic soul. From the fjords to the forests, from the lowlands to the mountains, we unite as one living will to preserve, to strengthen, and to awaken the spirit that once shaped the destiny of Europe."
 HOL_restoring_royal_authority_nationalist: "Restoring Royal Authority"
 HOL_restoring_royal_authority_nationalist_desc: "The return of the monarchy to its rightful place has not come without challenges. Bureaucratic inefficiency and political instability plague the nation, as traditional institutions struggle to reassert control. Yet, with time and effort, royal authority may once again restore unity and strength to the Dutch state."
 HOL_wic_war_preparations: "Revive the Groot Desseyn"
 HOL_wic_war_preparations_desc: "Inspired by the Groot Desseyn, the ambitious 17th-century plan to establish Dutch supremacy in the Americas and Africa, we must prepare for war to restore the West India Company's legacy. By mobilizing our forces and securing vital territories, we can fulfill the vision of Dutch global dominance and reclaim our place as a maritime power."
 HOL_wic_war_preparations_tt: "Will be unlocked when chosing the §YGroot Desseyn Strategy§! for the §YWIC§!"
 HOL_focus_can_only_be_completed_by_coalition_tt: "This focus can only be started by §Y$CHARACTER$§! when they are in our coalition"
 HOL_oranje_nassau-mines: "Reactivate Oranje-Nassau Mines"
 HOL_oranje_nassau-mines_desc: "The Oranje-Nassau collieries in Heerlen were the last Dutch coal mines, closed in 1974 as part of a national energy transition. Reopening them restores domestic steel and aluminium feedstock, reducing import dependency at the cost of increased carbon exposure."
 HOL_military.114.t: "Netherlands Joins the F-35 Program"
 HOL_military.114.d: "The Netherlands has formally committed to the Joint Strike Fighter program, acquiring the F-35 Lightning II as its next-generation multirole fighter. This deepens transatlantic defense ties and strengthens NATO interoperability."
 HOL_military.114.a: "A welcome partner in the program."
 HOL_military.115.t: "Dutch F-35 Procurement in Progress"
 HOL_military.115.d: "The Netherlands has initiated procurement talks for the F-35 Lightning II. Final delivery timelines depend on the program's development schedule, but the commitment marks a significant step in Dutch air force modernization."
 HOL_military.115.a: "We will proceed when the aircraft is ready."
 BEL_referendum_mission: "The Belgian Referendum"
 BEL_referendum_mission_desc: "Belgium has agreed to hold a referendum on the future of the country. The outcome will determine whether Belgium remains a unified state or is absorbed into the Netherlands."
